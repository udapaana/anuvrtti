name: Deploy अनुवृत्ति to anuvrtti.udapaana.in

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build vidyut-prakriya WASM
        run: |
          echo "🔧 Building vidyut-prakriya WASM..."
          git clone --depth 1 https://github.com/ambuda-org/vidyut.git /tmp/vidyut
          cd /tmp/vidyut/vidyut-prakriya
          wasm-pack build --target web --out-dir $GITHUB_WORKSPACE/static/wasm/vidyut-prakriya
          cp www/static/vidyut-prakriya.js $GITHUB_WORKSPACE/static/wasm/vidyut-prakriya/
          sed -i 's|from "./wasm/vidyut_prakriya.js"|from "./vidyut_prakriya.js"|' $GITHUB_WORKSPACE/static/wasm/vidyut-prakriya/vidyut-prakriya.js
          echo "✅ WASM build complete"

      - name: Build
        run: npm run build
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_APP_TOKEN: ${{ secrets.GITHUB_APP_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=anuvrtti --commit-dirty=true

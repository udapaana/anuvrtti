termRoman = "mūrdhanya"
category = "samjna"
meaning = "Retroflex / cerebral — produced at the roof of the mouth (मूर्धन्). Sounds: ऋ, ॠ, ट-वर्ग, र, ष."
related = ["uccāraṇasthāna"]

[[terms]]
term = "दन्त्य"
termRoman = "dantya"
category = "samjna"
meaning = "Dental — produced at the teeth (दन्त). Sounds: ऌ, ॡ, त-वर्ग, ल, स."
related = ["uccāraṇasthāna"]

[[terms]]
term = "ओष्ठ्य"
termRoman = "oṣṭhya"
category = "samjna"
meaning = "Labial — produced at the lips (ओष्ठ). Sounds: उ, ऊ, प-वर्ग."
related = ["uccāraṇasthāna"]

[[terms]]
term = "अघोष"
termRoman = "aghoṣa"
category = "samjna"
meaning = "Voiceless — produced without vibration of the vocal cords. The 1st and 2nd members of each varga."
related = ["ghoṣa", "sparśa"]

[[terms]]
term = "घोष"
termRoman = "ghoṣa"
category = "samjna"
meaning = "Voiced — produced with vibration of the vocal cords. The 3rd, 4th, and 5th members of each varga, plus semivowels."
related = ["aghoṣa", "sparśa"]

[[terms]]
term = "अल्पप्राण"
termRoman = "alpaprāṇa"
category = "samjna"
meaning = "Unaspirated — produced with little breath. The 1st, 3rd, and 5th members of each varga."
related = ["mahāprāṇa"]

[[terms]]
term = "महाप्राण"
termRoman = "mahāprāṇa"
category = "samjna"
meaning = "Aspirated — produced with a strong puff of breath. The 2nd and 4th members of each varga."
related = ["alpaprāṇa"]

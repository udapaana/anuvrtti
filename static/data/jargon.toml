# Pāṇinian grammatical terminology
# Source of truth — edit here, never in src/lib/jargon.ts
#
# Markup in meaning fields:
#   @deva[text]   — Devanagari term (rendered + clickable)
#   @[roman]      — italic Roman term (clickable)
#   @ref[1.1.1]   — link to a sūtra

[[terms]]
term = "संज्ञा"
termRoman = "saṃjñā"
category = "samjna"
meaning = "Technical term or name. Panini defines many samjnas to create a precise metalanguage."

[[terms]]
term = "वृद्धि"
termRoman = "vṛddhi"
category = "samjna"
meaning = "The \"strengthened\" vowel grade: @[ā], @[ai], @[au]. Defined in 1.1.1."
sutraRef = "1.1.1"
related = ["guṇa"]

[[terms]]
term = "गुण"
termRoman = "guṇa"
category = "samjna"
meaning = "The \"medium\" vowel grade: @[a], @[e], @[o]. Defined in 1.1.2."
sutraRef = "1.1.2"
related = ["vṛddhi"]

[[terms]]
term = "स्वर"
termRoman = "svara"
category = "samjna"
meaning = "Vowel. Defined as the pratyahara \"@[ac]\" in 1.1.9."
sutraRef = "1.1.9"
related = ["vyañjana", "ac"]

[[terms]]
term = "व्यञ्जन"
termRoman = "vyañjana"
category = "samjna"
meaning = "Consonant. Defined as the pratyahara \"@[hal]\" in 1.1.10."
sutraRef = "1.1.10"
related = ["svara", "hal"]

[[terms]]
term = "अन्तःस्थ"
termRoman = "antaḥstha"
category = "samjna"
meaning = "Semivowel, literally 'standing between' (vowels and consonants). The four sounds @deva[य], @deva[र], @deva[ल], @deva[व] (y, r, l, v)."
related = ["vyañjana", "yaṇ"]

[[terms]]
term = "ऊष्मन्"
termRoman = "ūṣman"
category = "samjna"
meaning = "Sibilant/fricative, literally 'heat'. The sounds @deva[श], @deva[ष], @deva[स], @deva[ह] (ś, ṣ, s, h)."
related = ["vyañjana"]

[[terms]]
term = "अनुस्वार"
termRoman = "anusvāra"
category = "samjna"
meaning = "The nasal sound @deva[ं] written as a dot above the line. Represents nasalization of the preceding vowel."
related = ["visarga"]

[[terms]]
term = "सवर्ण"
termRoman = "savarṇa"
category = "samjna"
meaning = "Homogeneous sounds - same place and effort of articulation."
sutraRef = "1.1.9"

[[terms]]
term = "आस्य"
termRoman = "āsya"
category = "phonetics"
meaning = "Mouth; place of articulation (स्थान). Used in defining homogeneous sounds."

[[terms]]
term = "प्रयत्न"
termRoman = "prayatna"
category = "phonetics"
meaning = "Articulatory effort. Internal (आभ्यन्तर) and external (बाह्य) efforts define sound production."

[[terms]]
term = "इत्"
termRoman = "it"
category = "samjna"
meaning = "Marker letter (anubandha) that indicates grammatical properties but is deleted."
sutraRef = "1.3.2"
related = ["anubandha"]

[[terms]]
term = "अनुबन्ध"
termRoman = "anubandha"
category = "samjna"
meaning = "Same as \"it\" - a marker letter attached to grammatical elements."
related = ["it"]

[[terms]]
term = "लोप"
termRoman = "lopa"
category = "samjna"
meaning = "Deletion or elision. Markers undergo lopa (1.3.9)."
sutraRef = "1.3.9"

[[terms]]
term = "आदेश"
termRoman = "ādeśa"
category = "samjna"
meaning = "Substitution or replacement. One element replacing another."
related = ["sthānin"]

[[terms]]
term = "स्थानिन्"
termRoman = "sthānin"
category = "samjna"
meaning = "The original element that gets replaced (by an ādeśa)."
related = ["ādeśa"]

[[terms]]
term = "प्रकृति"
termRoman = "prakṛti"
category = "samjna"
meaning = "Base or stem to which affixes are added."
related = ["pratyaya"]

[[terms]]
term = "धातु"
termRoman = "dhātu"
category = "samjna"
meaning = "Verbal root. The base form of verbs listed in the Dhatupatha."
related = ["prakṛti", "prātipadika"]

[[terms]]
term = "प्रातिपदिक"
termRoman = "prātipadika"
category = "samjna"
meaning = "Nominal stem - a meaningful base that takes case endings."
related = ["dhātu"]

[[terms]]
term = "पद"
termRoman = "pada"
category = "samjna"
meaning = "Word - a complete inflected form ending in sup or tiṅ."

[[terms]]
term = "संहिता"
termRoman = "saṃhitā"
category = "samjna"
meaning = "Close proximity of sounds - the domain where sandhi applies."
sutraRef = "1.4.109"

[[terms]]
term = "अधिकार"
termRoman = "adhikāra"
category = "samjna"
meaning = "Governing rule whose scope extends over subsequent sutras."

[[terms]]
term = "अनुवृत्ति"
termRoman = "anuvṛtti"
category = "samjna"
meaning = "Continuation - when a term from a prior sutra carries forward."

[[terms]]
term = "परिभाषा"
termRoman = "paribhāṣā"
category = "samjna"
meaning = "Interpretive rule that governs how other rules are applied."

[[terms]]
term = "विधि"
termRoman = "vidhi"
category = "samjna"
meaning = "Operational rule that prescribes a grammatical operation."

[[terms]]
term = "प्रत्याहार"
termRoman = "pratyāhāra"
category = "pratyahara"
meaning = "A shorthand notation for sound groups using the Shiva Sutras."

[[terms]]
term = "अच्"
termRoman = "ac"
category = "pratyahara"
meaning = "All vowels: @[a], @[i], @[u], @[ṛ], @[ḷ], @[e], @[o], @[ai], @[au]."

[[terms]]
term = "हल्"
termRoman = "hal"
category = "pratyahara"
meaning = "All consonants."

[[terms]]
term = "अण्"
termRoman = "aṇ"
category = "pratyahara"
meaning = "Simple vowels: @[a], @[i], @[u]."

[[terms]]
term = "इक्"
termRoman = "ik"
category = "pratyahara"
meaning = "The vowels i, u, ṛ, ḷ - those that become semivowels."
related = ["yaṇ"]

[[terms]]
term = "यण्"
termRoman = "yaṇ"
category = "pratyahara"
meaning = "Semivowels: @[y], @[v], @[r], @[l]."
related = ["ik"]

[[terms]]
term = "एच्"
termRoman = "ec"
category = "pratyahara"
meaning = "Diphthongs: @[e], @[o], @[ai], @[au]."

[[terms]]
term = "कारक"
termRoman = "kāraka"
category = "karaka"
meaning = "Semantic role - the relation between a noun and the verbal action."

[[terms]]
term = "कर्तृ"
termRoman = "kartṛ"
category = "karaka"
meaning = "Agent - the independent doer of the action."
sutraRef = "1.4.54"

[[terms]]
term = "कर्मन्"
termRoman = "karman"
category = "karaka"
meaning = "Object - what the agent most desires to attain through the action."
sutraRef = "1.4.49"

[[terms]]
term = "करण"
termRoman = "karaṇa"
category = "karaka"
meaning = "Instrument - the most effective means of accomplishing the action."
sutraRef = "1.4.42"

[[terms]]
term = "सम्प्रदान"
termRoman = "sampradāna"
category = "karaka"
meaning = "Recipient - the one for whom the action is intended."
sutraRef = "1.4.32"

[[terms]]
term = "अपादान"
termRoman = "apādāna"
category = "karaka"
meaning = "Source - the fixed point from which movement occurs."
sutraRef = "1.4.24"

[[terms]]
term = "अधिकरण"
termRoman = "adhikaraṇa"
category = "karaka"
meaning = "Locus - the location or support of the action."
sutraRef = "1.4.45"

[[terms]]
term = "विभक्ति"
termRoman = "vibhakti"
category = "vibhakti"
meaning = "Inflectional ending - case endings (sup) or verb endings (tiṅ)."
sutraRef = "1.4.104"

[[terms]]
term = "प्रथमा"
termRoman = "prathamā"
category = "vibhakti"
meaning = "First case (nominative) - used for the subject or naming."

[[terms]]
term = "द्वितीया"
termRoman = "dvitīyā"
category = "vibhakti"
meaning = "Second case (accusative) - used for the direct object."

[[terms]]
term = "तृतीया"
termRoman = "tṛtīyā"
category = "vibhakti"
meaning = "Third case (instrumental) - used for the instrument or agent in passive."

[[terms]]
term = "चतुर्थी"
termRoman = "caturthī"
category = "vibhakti"
meaning = "Fourth case (dative) - used for the recipient or purpose."

[[terms]]
term = "पञ्चमी"
termRoman = "pañcamī"
category = "vibhakti"
meaning = "Fifth case (ablative) - used for source or comparison."

[[terms]]
term = "षष्ठी"
termRoman = "ṣaṣṭhī"
category = "vibhakti"
meaning = "Sixth case (genitive) - used for possession or relation."

[[terms]]
term = "सप्तमी"
termRoman = "saptamī"
category = "vibhakti"
meaning = "Seventh case (locative) - used for location in space or time."

[[terms]]
term = "प्रत्यय"
termRoman = "pratyaya"
category = "pratyaya"
meaning = "Suffix or affix added after a base."
sutraRef = "3.1.1"

[[terms]]
term = "सुप्"
termRoman = "sup"
category = "pratyaya"
meaning = "Nominal case endings (21 total: 7 cases × 3 numbers)."
related = ["subanta"]

[[terms]]
term = "सुबन्त"
termRoman = "subanta"
category = "samjna"
meaning = "A word ending in @[sup] (nominal endings). Declined nouns, adjectives, and pronouns. Contrasts with @[tiṅanta]."
related = ["sup", "tiṅanta", "prātipadika"]

[[terms]]
term = "तिङ्"
termRoman = "tiṅ"
category = "pratyaya"
meaning = "Verbal personal endings (18 total: 3 persons × 3 numbers × 2 padas)."
related = ["tiṅanta"]

[[terms]]
term = "तिङन्त"
termRoman = "tiṅanta"
category = "samjna"
meaning = "A word ending in @[tiṅ] (verbal endings). Conjugated finite verbs. Contrasts with @[subanta]."
related = ["tiṅ", "subanta", "dhātu"]

[[terms]]
term = "कृत्"
termRoman = "kṛt"
category = "pratyaya"
meaning = "Primary suffix added directly to a verbal root."

[[terms]]
term = "तद्धित"
termRoman = "taddhita"
category = "pratyaya"
meaning = "Secondary suffix added to a nominal stem."

[[terms]]
term = "सन्धि"
termRoman = "sandhi"
category = "sandhi"
meaning = "Junction - sound changes when morphemes or words combine."

[[terms]]
term = "दीर्घ"
termRoman = "dīrgha"
category = "sandhi"
meaning = "Long (vowel) - the lengthened version of a vowel."

[[terms]]
term = "ह्रस्व"
termRoman = "hrasva"
category = "sandhi"
meaning = "Short (vowel) - the basic short vowel."

[[terms]]
term = "प्लुत"
termRoman = "pluta"
category = "sandhi"
meaning = "Prolated (vowel) - extra-long, used in calling."

[[terms]]
term = "लकार"
termRoman = "lakāra"
category = "lakara"
meaning = "Tense-mood marker. The 10 lakaras indicate tense, mood, and aspect of verbs."

[[terms]]
term = "लट्"
termRoman = "laṭ"
category = "lakara"
meaning = "Present tense (vartamāna). Used for ongoing or habitual actions."
sutraRef = "3.2.123"

[[terms]]
term = "लङ्"
termRoman = "laṅ"
category = "lakara"
meaning = "Imperfect (anadyatana-bhūta). Past tense not of today."
sutraRef = "3.2.111"

[[terms]]
term = "लोट्"
termRoman = "loṭ"
category = "lakara"
meaning = "Imperative mood. Used for commands, requests, and blessings."
sutraRef = "3.3.162"

[[terms]]
term = "लिङ्"
termRoman = "liṅ"
category = "lakara"
meaning = "Optative/potential mood. Has two forms: @[vidhiliṅ] (prescription) and @[āśīrliṅ] (benediction)."
sutraRef = "3.3.161"

[[terms]]
term = "लिट्"
termRoman = "liṭ"
category = "lakara"
meaning = "Perfect tense (parokṣa-bhūta). Past not witnessed by speaker."
sutraRef = "3.2.115"

[[terms]]
term = "लुट्"
termRoman = "luṭ"
category = "lakara"
meaning = "Periphrastic future. Future not of today."
sutraRef = "3.3.15"

[[terms]]
term = "लृट्"
termRoman = "lṛṭ"
category = "lakara"
meaning = "Simple future. General future tense."
sutraRef = "3.3.13"

[[terms]]
term = "लुङ्"
termRoman = "luṅ"
category = "lakara"
meaning = "Aorist (bhūta). General past tense."
sutraRef = "3.2.110"

[[terms]]
term = "लृङ्"
termRoman = "lṛṅ"
category = "lakara"
meaning = "Conditional. Used for hypothetical conditions."
sutraRef = "3.3.139"

[[terms]]
term = "लेट्"
termRoman = "leṭ"
category = "lakara"
meaning = "Vedic subjunctive. Found only in Vedic texts."
sutraRef = "3.4.7"

[[terms]]
term = "भूत"
termRoman = "bhūta"
category = "lakara"
meaning = "Past time. Action already completed."

[[terms]]
term = "वर्तमान"
termRoman = "vartamāna"
category = "lakara"
meaning = "Present time. Action ongoing or habitual."

[[terms]]
term = "भविष्यत्"
termRoman = "bhaviṣyat"
category = "lakara"
meaning = "Future time. Action yet to occur."

[[terms]]
term = "गण"
termRoman = "gaṇa"
category = "gana"
meaning = "Verb class. The 10 classes determine how roots form their present stem."

[[terms]]
term = "भ्वादि"
termRoman = "bhvādi"
category = "gana"
meaning = "First class (class 1). Adds @[guṇa] and śap vikaraṇa. E.g., @[bhū] → @[bhavati]."

[[terms]]
term = "अदादि"
termRoman = "adādi"
category = "gana"
meaning = "Second class (class 2). No vikaraṇa, root directly takes endings. E.g., @[ad] → @[atti]."

[[terms]]
term = "जुहोत्यादि"
termRoman = "juhotyādi"
category = "gana"
meaning = "Third class (class 3). Reduplication without vikaraṇa. E.g., @[hu] → @[juhoti]."

[[terms]]
term = "दिवादि"
termRoman = "divādi"
category = "gana"
meaning = "Fourth class (class 4). Adds śyan vikaraṇa. E.g., @[div] → @[dīvyati]."

[[terms]]
term = "स्वादि"
termRoman = "svādi"
category = "gana"
meaning = "Fifth class (class 5). Adds śnu vikaraṇa. E.g., @[su] → @[sunoti]."

[[terms]]
term = "तुदादि"
termRoman = "tudādi"
category = "gana"
meaning = "Sixth class (class 6). Adds śa vikaraṇa (accent on ending). E.g., @[tud] → @[tudati]."

[[terms]]
term = "रुधादि"
termRoman = "rudhādi"
category = "gana"
meaning = "Seventh class (class 7). Inserts nasal (śnam) before final consonant. E.g., @[rudh] → @[ruṇaddhi]."

[[terms]]
term = "तनादि"
termRoman = "tanādi"
category = "gana"
meaning = "Eighth class (class 8). Adds u vikaraṇa. E.g., @[tan] → @[tanoti]."

[[terms]]
term = "क्र्यादि"
termRoman = "kryādi"
category = "gana"
meaning = "Ninth class (class 9). Adds śnā vikaraṇa. E.g., @[krī] → @[krīṇāti]."

[[terms]]
term = "चुरादि"
termRoman = "curādi"
category = "gana"
meaning = "Tenth class (class 10). Adds ṇic (causative-like). E.g., @[cur] → @[corayati]."

[[terms]]
term = "समास"
termRoman = "samāsa"
category = "samasa"
meaning = "Compound - multiple words joined into a single unit."
sutraRef = "2.1.3"

[[terms]]
term = "तत्पुरुष"
termRoman = "tatpuruṣa"
category = "samasa"
meaning = "Determinative compound. The second member is primary, first qualifies it."
sutraRef = "2.1.22"

[[terms]]
term = "कर्मधारय"
termRoman = "karmadhāraya"
category = "samasa"
meaning = "Appositional compound. Both members refer to the same thing (subset of @[tatpuruṣa])."
sutraRef = "1.2.42"

[[terms]]
term = "द्विगु"
termRoman = "dvigu"
category = "samasa"
meaning = "Numeral compound. First member is a number (subset of @[tatpuruṣa])."
sutraRef = "2.1.52"

[[terms]]
term = "बहुव्रीहि"
termRoman = "bahuvrīhi"
category = "samasa"
meaning = "Possessive compound. The compound denotes something having what the members describe."
sutraRef = "2.2.23"

[[terms]]
term = "द्वन्द्व"
termRoman = "dvandva"
category = "samasa"
meaning = "Copulative compound. Members are coordinated (X and Y)."
sutraRef = "2.2.29"

[[terms]]
term = "अव्ययीभाव"
termRoman = "avyayībhāva"
category = "samasa"
meaning = "Adverbial compound. First member is an indeclinable, result is neuter singular."
sutraRef = "2.1.5"

[[terms]]
term = "समाहार"
termRoman = "samāhāra"
category = "samasa"
meaning = "Collective sense. When a dvandva denotes the group as a whole (neuter singular)."

[[terms]]
term = "क्त"
termRoman = "kta"
category = "pratyaya"
meaning = "Past passive participle suffix. Forms adjectives meaning 'was done' (@[niṣṭhā])."
sutraRef = "3.2.102"
related = ["ktavatu"]

[[terms]]
term = "क्तवतु"
termRoman = "ktavatu"
category = "pratyaya"
meaning = "Past active participle suffix. Forms adjectives meaning 'one who did' (@[niṣṭhā])."
sutraRef = "3.2.102"
related = ["kta"]

[[terms]]
term = "क्त्वा"
termRoman = "ktvā"
category = "pratyaya"
meaning = "Absolutive suffix. 'Having done X' - connects sequential actions by same agent."
sutraRef = "3.4.21"
related = ["lyap"]

[[terms]]
term = "ल्यप्"
termRoman = "lyap"
category = "pratyaya"
meaning = "Absolutive suffix after upasarga. Same meaning as ktvā but used with prefixed verbs."
sutraRef = "3.4.22"
related = ["ktvā"]

[[terms]]
term = "तुमुन्"
termRoman = "tumun"
category = "pratyaya"
meaning = "Infinitive suffix. Forms verbal nouns meaning 'to do'."
sutraRef = "3.3.10"

[[terms]]
term = "शतृ"
termRoman = "śatṛ"
category = "pratyaya"
meaning = "Present active participle suffix (@[parasmaipada]). 'One who is doing'."
sutraRef = "3.2.124"
related = ["śānac"]

[[terms]]
term = "शानच्"
termRoman = "śānac"
category = "pratyaya"
meaning = "Present participle suffix (@[ātmanepada]). 'One who is doing' (middle voice)."
sutraRef = "3.2.124"
related = ["śatṛ"]

[[terms]]
term = "तव्य"
termRoman = "tavya"
category = "pratyaya"
meaning = "Future passive participle suffix. 'Should be done, must be done'."
sutraRef = "3.1.96"
related = ["anīya", "ṇyat"]

[[terms]]
term = "अनीय"
termRoman = "anīya"
category = "pratyaya"
meaning = "Future passive participle suffix. Same meaning as tavya."
sutraRef = "3.1.96"
related = ["tavya", "ṇyat"]

[[terms]]
term = "ण्यत्"
termRoman = "ṇyat"
category = "pratyaya"
meaning = "Future passive participle suffix (= ya). Same meaning as tavya."
sutraRef = "3.1.124"
related = ["tavya", "anīya"]

[[terms]]
term = "तव्यत्"
termRoman = "tavyat"
category = "pratyaya"
meaning = "Variant of tavya. Future passive participle suffix."
related = ["tavya"]

[[terms]]
term = "विकरण"
termRoman = "vikaraṇa"
category = "pratyaya"
meaning = "Tense-mood affix inserted between root and personal ending."

[[terms]]
term = "शप्"
termRoman = "śap"
category = "pratyaya"
meaning = "Vikaraṇa for class 1 (bhvādi). Adds @[a] to stem."
sutraRef = "3.1.68"

[[terms]]
term = "श्यन्"
termRoman = "śyan"
category = "pratyaya"
meaning = "Vikaraṇa for class 4 (divādi). Adds @[ya] to stem."
sutraRef = "3.1.69"

[[terms]]
term = "श्नु"
termRoman = "śnu"
category = "pratyaya"
meaning = "Vikaraṇa for class 5 (svādi). Adds @[nu]/@[no] to stem."
sutraRef = "3.1.73"

[[terms]]
term = "श्ना"
termRoman = "śnā"
category = "pratyaya"
meaning = "Vikaraṇa for class 9 (kryādi). Adds @[nā]/@[nī] to stem."
sutraRef = "3.1.81"

[[terms]]
term = "श्नम्"
termRoman = "śnam"
category = "pratyaya"
meaning = "Vikaraṇa for class 7 (rudhādi). Inserts nasal before final consonant."
sutraRef = "3.1.78"

[[terms]]
term = "मतुप्"
termRoman = "matup"
category = "pratyaya"
meaning = "Possessive suffix meaning 'having X'. Forms adjectives like @[dhana] → @[dhanavat]."
sutraRef = "5.2.94"

[[terms]]
term = "तल्"
termRoman = "tal"
category = "pratyaya"
meaning = "Abstract noun suffix (= tā). Forms feminine nouns meaning '-ness, -hood'."
sutraRef = "5.1.119"
related = ["tva"]

[[terms]]
term = "त्व"
termRoman = "tva"
category = "pratyaya"
meaning = "Abstract noun suffix (= tva). Forms neuter nouns meaning '-ness, -hood'."
sutraRef = "5.1.119"
related = ["tal"]

[[terms]]
term = "इन्"
termRoman = "in"
category = "pratyaya"
meaning = "Possessive suffix meaning 'having X'. Alternative to matup."

[[terms]]
term = "णिच्"
termRoman = "ṇic"
category = "pratyaya"
meaning = "Causative suffix. Makes verbs causative: @[paca] → @[pācayati] 'causes to cook'."
sutraRef = "3.1.26"

[[terms]]
term = "सन्"
termRoman = "san"
category = "pratyaya"
meaning = "Desiderative suffix. Expresses desire to do: @[piba] → @[pipāsati] 'wishes to drink'."
sutraRef = "3.1.7"

[[terms]]
term = "अङ्ग"
termRoman = "aṅga"
category = "samjna"
meaning = "Stem - the base to which an affix is attached (after certain operations)."
sutraRef = "1.4.13"

[[terms]]
term = "उपसर्ग"
termRoman = "upasarga"
category = "samjna"
meaning = "Verbal prefix. Preverbs like @[pra], @[parā], @[apa], @[sam], etc. that modify verb meaning."
sutraRef = "1.4.59"

[[terms]]
term = "अव्यय"
termRoman = "avyaya"
category = "samjna"
meaning = "Indeclinable - a word that doesn't change form (particles, adverbs)."
sutraRef = "1.1.37"

[[terms]]
term = "उपपद"
termRoman = "upapada"
category = "samjna"
meaning = "Co-occurring word. A word in construction with another that conditions an affix."

[[terms]]
term = "पूर्वपद"
termRoman = "pūrvapada"
category = "samjna"
meaning = "Prior member - the first component of a compound."

[[terms]]
term = "घि"
termRoman = "ghi"
category = "samjna"
meaning = "Technical name for stems ending in short i/u (except @[sakhi] and @[pati] in certain uses)."
sutraRef = "1.4.7"

[[terms]]
term = "घु"
termRoman = "ghu"
category = "samjna"
meaning = "Technical name for the roots @[dā] 'give' and @[dhā] 'place' (and their derivatives)."
sutraRef = "1.1.20"

[[terms]]
term = "नदी"
termRoman = "nadī"
category = "samjna"
meaning = "Technical name for feminine stems in long ī/ū."
sutraRef = "1.4.3"

[[terms]]
term = "सर्वनामस्थान"
termRoman = "sarvanāmasthāna"
category = "samjna"
meaning = "Strong cases - nominative and accusative (singular, dual, plural) where stems strengthen."
sutraRef = "1.1.42"

[[terms]]
term = "अभ्यास"
termRoman = "abhyāsa"
category = "samjna"
meaning = "Reduplication - the repeated portion of a reduplicated form."
sutraRef = "6.1.4"

[[terms]]
term = "सम्प्रसारण"
termRoman = "samprasāraṇa"
category = "samjna"
meaning = "Semivowel-to-vowel change: @[y]→@[i], @[v]→@[u], @[r]→@[ṛ], @[l]→@[ḷ]."
sutraRef = "1.1.45"

[[terms]]
term = "आगम"
termRoman = "āgama"
category = "samjna"
meaning = "Augment - an element inserted into a form."

[[terms]]
term = "इट्"
termRoman = "iṭ"
category = "samjna"
meaning = "Augment @[i] added before certain affixes (@[seṭ] roots)."
sutraRef = "7.2.35"
related = ["aniṭ"]

[[terms]]
term = "अनिट्"
termRoman = "aniṭ"
category = "samjna"
meaning = "Without iṭ augment. Roots that don't take iṭ before certain affixes."
related = ["iṭ"]

[[terms]]
term = "आट्"
termRoman = "āṭ"
category = "samjna"
meaning = "Augment @[ā] added in certain formations."

[[terms]]
term = "औट्"
termRoman = "auṭ"
category = "samjna"
meaning = "Augment @[au] added before certain endings."

[[terms]]
term = "नुम्"
termRoman = "num"
category = "samjna"
meaning = "Nasal augment @[n] inserted in certain forms."
sutraRef = "7.1.58"

[[terms]]
term = "पित्"
termRoman = "pit"
category = "samjna"
meaning = "Having p as marker. Indicates accent on first syllable."
related = ["kit", "ṅit"]

[[terms]]
term = "कित्"
termRoman = "kit"
category = "samjna"
meaning = "Having k as marker. Prevents @[guṇa]/@[vṛddhi]."
related = ["pit", "ṅit"]

[[terms]]
term = "ङित्"
termRoman = "ṅit"
category = "samjna"
meaning = "Having ṅ as marker. Prevents @[guṇa]/@[vṛddhi]; indicates @[ātmanepada]."
related = ["pit", "kit"]

[[terms]]
term = "शित्"
termRoman = "śit"
category = "samjna"
meaning = "Having ś as marker. Indicates @[sārvadhātuka] affix."

[[terms]]
term = "लुक्"
termRoman = "luk"
category = "samjna"
meaning = "Complete deletion with no trace. The deleted element is as if it never existed."
sutraRef = "1.1.61"
related = ["ślu"]

[[terms]]
term = "श्लु"
termRoman = "ślu"
category = "samjna"
meaning = "Deletion that leaves a trace (@[sthānivat]). The deleted element still triggers some rules."
sutraRef = "1.1.62"
related = ["luk"]

[[terms]]
term = "परस्मैपद"
termRoman = "parasmaipada"
category = "samjna"
meaning = "Active voice endings. 'Word for another' - action for another's benefit."
sutraRef = "1.4.99"
related = ["ātmanepada"]

[[terms]]
term = "आत्मनेपद"
termRoman = "ātmanepada"
category = "samjna"
meaning = "Middle voice endings. 'Word for oneself' - action for one's own benefit."
sutraRef = "1.4.100"
related = ["parasmaipada"]

[[terms]]
term = "सार्वधातुक"
termRoman = "sārvadhātuka"
category = "samjna"
meaning = "Conjugational affixes - affixes marked with ś or tiṅ endings. Cause @[guṇa]."
sutraRef = "3.4.113"
related = ["ārdhadhātuka"]

[[terms]]
term = "आर्धधातुक"
termRoman = "ārdhadhātuka"
category = "samjna"
meaning = "Non-conjugational affixes - affixes not marked with ś. Include kṛt affixes. Cause @[vṛddhi]."
sutraRef = "3.4.114"
related = ["sārvadhātuka"]

[[terms]]
term = "अनुदात्त"
termRoman = "anudātta"
category = "samjna"
meaning = "Low-pitched accent (non-acute). Unmarked in pronunciation."

[[terms]]
term = "एकवचन"
termRoman = "ekavacana"
category = "vibhakti"
meaning = "Singular number."

[[terms]]
term = "द्विवचन"
termRoman = "dvivacana"
category = "vibhakti"
meaning = "Dual number."

[[terms]]
term = "बहुवचन"
termRoman = "bahuvacana"
category = "vibhakti"
meaning = "Plural number."

[[terms]]
term = "पुरुष"
termRoman = "puruṣa"
category = "vibhakti"
meaning = "Grammatical person. Sanskrit has three: @[prathama] (third), @[madhyama] (second), @[uttama] (first). Note: Sanskrit counts from the one spoken about."
related = ["prathama", "madhyama", "uttama"]

[[terms]]
term = "प्रथम"
termRoman = "prathama"
category = "vibhakti"
meaning = "Third person (in Sanskrit grammar, 'first' puruṣa refers to the one spoken about)."
related = ["puruṣa", "madhyama", "uttama"]

[[terms]]
term = "प्रथमपुरुष"
termRoman = "prathama puruṣa"
category = "vibhakti"
meaning = "Third person. The one spoken about (he/she/it/they). Called 'first' because grammatically primary."
related = ["puruṣa", "prathama"]

[[terms]]
term = "मध्यम"
termRoman = "madhyama"
category = "vibhakti"
meaning = "Second person (the one spoken to)."
related = ["puruṣa", "prathama", "uttama"]

[[terms]]
term = "मध्यमपुरुष"
termRoman = "madhyama puruṣa"
category = "vibhakti"
meaning = "Second person. The one spoken to (you)."
related = ["puruṣa", "madhyama"]

[[terms]]
term = "उत्तम"
termRoman = "uttama"
category = "vibhakti"
meaning = "First person (the speaker)."
related = ["puruṣa", "prathama", "madhyama"]

[[terms]]
term = "उत्तमपुरुष"
termRoman = "uttama puruṣa"
category = "vibhakti"
meaning = "First person. The speaker (I/we)."
related = ["puruṣa", "uttama"]

[[terms]]
term = "विसर्ग"
termRoman = "visarga"
category = "sandhi"
meaning = "The sound @[ḥ] (@[visarjanīya]). Final aspiration that undergoes sandhi changes."

[[terms]]
term = "क्रिया"
termRoman = "kriyā"
category = "general"
meaning = "Action or verb. The activity denoted by the verbal root."

[[terms]]
term = "भाव"
termRoman = "bhāva"
category = "general"
meaning = "State of being, abstract action, or impersonal passive sense."

[[terms]]
term = "उच्चारण"
termRoman = "uccāraṇa"
category = "general"
meaning = "Pronunciation or articulation."

[[terms]]
term = "वर्ण"
termRoman = "varṇa"
category = "general"
meaning = "Sound or phoneme - the basic unit of speech."

[[terms]]
term = "अक्षर"
termRoman = "akṣara"
category = "general"
meaning = "Syllable - a vowel with optional consonants."

[[terms]]
term = "वर्णमाला"
termRoman = "varṇamālā"
category = "general"
meaning = "The alphabet, literally 'garland of letters'. The systematic arrangement of Sanskrit sounds: vowels (@deva[स्वर]) and consonants (@deva[व्यञ्जन])."
related = ["varṇa", "svara", "vyañjana"]

[[terms]]
term = "प्रक्रिया"
termRoman = "prakriyā"
category = "general"
meaning = "Derivation or grammatical procedure. The step-by-step application of rules to derive a word form from its base elements (@[dhātu], @[prātipadika]) and affixes (@[pratyaya])."
related = ["dhātu", "pratyaya", "prātipadika"]

[[terms]]
term = "व्युत्पत्ति"
termRoman = "vyutpatti"
category = "general"
meaning = "Etymology or derivation. The origin and formation of a word through grammatical rules."
related = ["prakriyā"]

[[terms]]
term = "प्रयोग"
termRoman = "prayoga"
category = "general"
meaning = "Voice or construction. The way a verb relates to its @[kartṛ] and @[karman]."

[[terms]]
term = "कर्तरि प्रयोग"
termRoman = "kartari prayoga"
category = "general"
meaning = "Active voice. The @[kartṛ] (agent) is the grammatical subject and takes @[prathamā]. The verb agrees with the @[kartṛ]."
related = ["karmaṇi prayoga", "kartṛ"]

[[terms]]
term = "कर्मणि प्रयोग"
termRoman = "karmaṇi prayoga"
category = "general"
meaning = "Passive voice. The @[karman] (object) becomes the grammatical subject and takes @[prathamā]. The @[kartṛ] takes @[tṛtīyā]."
related = ["kartari prayoga", "karman"]

[[terms]]
term = "भावे प्रयोग"
termRoman = "bhāve prayoga"
category = "general"
meaning = "Impersonal passive. Used with intransitive verbs. The verb is always third person singular neuter. @[मया गम्यते] 'going is done by me'."
related = ["karmaṇi prayoga"]

[[terms]]
term = "सहार्थ"
termRoman = "sahārtha"
category = "karaka"
meaning = "Accompaniment. Expressed by @[tṛtīyā] with @[saha]: @[पुत्रेण सह गच्छति] 'goes with the son'."
related = ["tṛtīyā"]

[[terms]]
term = "प्रयोजन"
termRoman = "prayojana"
category = "karaka"
meaning = "Purpose or goal. Expressed by @[caturthī]: @[विद्यायै गच्छति] 'goes for knowledge'."
related = ["caturthī", "sampradāna"]

[[terms]]
term = "दान"
termRoman = "dāna"
category = "karaka"
meaning = "Giving. The prototypical action for @[sampradāna] (recipient): @[ब्राह्मणाय गां ददाति] 'gives a cow to the brahmin'."

[[terms]]
term = "साधकतम"
termRoman = "sādhakatama"
category = "karaka"
meaning = "Most effective means. The defining quality of @[karaṇa] (instrument): @[दात्रेण लुनाति] 'cuts with the sickle'."
sutraRef = "1.4.42"
related = ["karaṇa"]

[[terms]]
term = "ईप्सिततम"
termRoman = "īpsitatama"
category = "karaka"
meaning = "Most desired (to affect). The defining quality of @[karman]: what the @[kartṛ] most wishes to accomplish."
sutraRef = "1.4.49"
related = ["karman"]

[[terms]]
term = "स्वतन्त्र"
termRoman = "svatantra"
category = "karaka"
meaning = "Independent. The defining quality of @[kartṛ]: the agent acts of their own accord, not as instrument of another."
sutraRef = "1.4.54"
related = ["kartṛ"]

[[terms]]
term = "आधार"
termRoman = "ādhāra"
category = "karaka"
meaning = "Container or support. The defining quality of @[adhikaraṇa] (locus): where the action takes place."
sutraRef = "1.4.45"
related = ["adhikaraṇa"]

[[terms]]
term = "ध्रुव"
termRoman = "dhruva"
category = "karaka"
meaning = "Fixed point. The defining quality of @[apādāna]: the stationary point from which separation occurs."
sutraRef = "1.4.24"
related = ["apādāna"]

[[terms]]
term = "सम्बोधन"
termRoman = "sambodhana"
category = "vibhakti"
meaning = "Vocative or direct address. Uses @[prathamā] endings but with special forms: @[हे राम] 'O Rama!'"
related = ["prathamā"]

[[terms]]
term = "सति सप्तमी"
termRoman = "sati saptamī"
category = "vibhakti"
meaning = "Locative absolute. A construction where both subject and participle take @[saptamī] to express circumstance: @[सूर्ये उदिते] 'the sun having risen'."
related = ["saptamī", "adhikaraṇa"]

[[terms]]
term = "गत्यर्थ"
termRoman = "gatyartha"
category = "vibhakti"
meaning = "Motion meaning. Verbs of motion (@[गम्], @[या], etc.) whose destination takes @[dvitīyā]: @[ग्रामं गच्छति] 'goes to the village'."
related = ["dvitīyā"]

[[terms]]
term = "काल"
termRoman = "kāla"
category = "vibhakti"
meaning = "Time. Duration takes @[dvitīyā]: @[मासं वसति] 'stays for a month'. Time-when takes @[saptamī]: @[प्रातःकाले] 'in the morning'."

[[terms]]
term = "अध्वन्"
termRoman = "adhvan"
category = "vibhakti"
meaning = "Distance or path. Extent of distance takes @[dvitīyā]: @[क्रोशं गच्छति] 'goes one krośa'."
related = ["dvitīyā"]

[[terms]]
term = "अत्यन्तसंयोग"
termRoman = "atyantasaṃyoga"
category = "vibhakti"
meaning = "Complete connection. When @[dvitīyā] expresses duration, the action pervades the entire time/distance."
sutraRef = "2.3.5"

[[terms]]
term = "लिङ्ग"
termRoman = "liṅga"
category = "samjna"
meaning = "Gender. Sanskrit has three: @[puṃliṅga] (masculine), @[strīliṅga] (feminine), @[napuṃsakaliṅga] (neuter)."

[[terms]]
term = "पुंलिङ्ग"
termRoman = "puṃliṅga"
category = "samjna"
meaning = "Masculine gender. E.g., @[देवः] 'god', @[नरः] 'man'."
related = ["liṅga"]

[[terms]]
term = "स्त्रीलिङ्ग"
termRoman = "strīliṅga"
category = "samjna"
meaning = "Feminine gender. E.g., @[देवी] 'goddess', @[नदी] 'river'."
related = ["liṅga"]

[[terms]]
term = "नपुंसकलिङ्ग"
termRoman = "napuṃsakaliṅga"
category = "samjna"
meaning = "Neuter gender. E.g., @[फलम्] 'fruit', @[वनम्] 'forest'."
related = ["liṅga"]

[[terms]]
term = "वचन"
termRoman = "vacana"
category = "vibhakti"
meaning = "Number. Sanskrit has three: @[ekavacana] (singular), @[dvivacana] (dual), @[bahuvacana] (plural)."

[[terms]]
term = "तपस्"
termRoman = "tapas"
category = "general"
meaning = "Austerity or penance. Spiritual practice involving self-discipline."

[[terms]]
term = "सह"
termRoman = "saha"
category = "general"
meaning = "With (together with). Governs @[tṛtīyā]: @[पुत्रेण सह] 'with the son'."
related = ["sahārtha", "tṛtīyā"]

[[terms]]
term = "शेष"
termRoman = "śeṣa"
category = "karaka"
meaning = "Remainder. षष्ठी (genitive) expresses relations not covered by other कारकs."
sutraRef = "2.3.50"
related = ["ṣaṣṭhī"]

[[terms]]
term = "उपमान"
termRoman = "upamāna"
category = "karaka"
meaning = "Standard of comparison. Takes पञ्चमी (ablative): @[रामात् बलवान्] 'stronger than Rama'."
related = ["pañcamī"]

[[terms]]
term = "स्वामित्व"
termRoman = "svāmitva"
category = "karaka"
meaning = "Ownership. A type of सम्बन्ध expressed by षष्ठी: @[मम गृहम्] 'my house'."
related = ["ṣaṣṭhī", "sambandha"]

[[terms]]
term = "अवयव"
termRoman = "avayava"
category = "karaka"
meaning = "Part or limb. Part-whole relation expressed by षष्ठी: @[वृक्षस्य शाखा] 'branch of tree'."
related = ["ṣaṣṭhī"]

[[terms]]
term = "विकार"
termRoman = "vikāra"
category = "karaka"
meaning = "Modification or transformation. Material relation in षष्ठी: @[सुवर्णस्य भूषणम्] 'ornament of gold'."
related = ["ṣaṣṭhī"]

[[terms]]
term = "औपश्लेषिक"
termRoman = "aupaśleṣika"
category = "karaka"
meaning = "Contact-based अधिकरण. The आधार touches the action: @[कटे आस्ते] 'sits on the mat'."
related = ["adhikaraṇa"]

[[terms]]
term = "वैषयिक"
termRoman = "vaiṣayika"
category = "karaka"
meaning = "Domain-based अधिकरण. Abstract location: @[मोक्षे इच्छा] 'desire for liberation', @[व्याकरणे निपुणः] 'skilled in grammar'."
related = ["adhikaraṇa"]

[[terms]]
term = "अभिव्यापक"
termRoman = "abhivyāpaka"
category = "karaka"
meaning = "Pervading अधिकरण. The located thing pervades the locus: @[तिलेषु तैलम्] 'oil in sesame seeds'."
related = ["adhikaraṇa"]

[[terms]]
term = "कालाधिकरण"
termRoman = "kālādhikaraṇa"
category = "karaka"
meaning = "Temporal location. सप्तमी (locative) expressing time-when: @[प्रातःकाले] 'at dawn', @[मध्याह्ने] 'at midday'."
related = ["adhikaraṇa", "kāla", "saptamī"]

[[terms]]
term = "निमित्त"
termRoman = "nimitta"
category = "karaka"
meaning = "Occasion or circumstance. Expressed by सप्तमी in constructions like सति सप्तमी."
related = ["saptamī"]

[[terms]]
term = "विषय"
termRoman = "viṣaya"
category = "karaka"
meaning = "Domain or subject matter. सप्तमी meaning 'regarding': @[शास्त्रे पण्डितः] 'learned in शास्त्र'."
related = ["saptamī"]

[[terms]]
term = "देश"
termRoman = "deśa"
category = "karaka"
meaning = "Place or location. Spatial अधिकरण: @[गृहे वसति] 'lives in the house'."
related = ["adhikaraṇa"]

[[terms]]
term = "कृदन्त"
termRoman = "kṛdanta"
category = "pratyaya"
meaning = "Word ending in a कृत् suffix. Verbal derivative like @[गत] 'gone', @[कृत] 'done'."
related = ["kṛt"]

[[terms]]
term = "सम्बन्ध"
termRoman = "sambandha"
category = "karaka"
meaning = "Relation or connection. The general meaning of षष्ठी (genitive): @[रामस्य पुत्रः] 'Rama's son'."
related = ["ṣaṣṭhī"]

[[terms]]
term = "भय"
termRoman = "bhaya"
category = "general"
meaning = "Fear. The cause of fear takes पञ्चमी: @[चोरात् बिभेति] 'fears the thief'."
related = ["pañcamī"]

[[terms]]
term = "त्राण"
termRoman = "trāṇa"
category = "general"
meaning = "Protection. The source of danger takes पञ्चमी: @[सिंहात् त्रायते] 'is protected from the lion'."
related = ["pañcamī"]

[[terms]]
term = "निष्ठा"
termRoman = "niṣṭhā"
category = "pratyaya"
meaning = "Collective name for @[kta] and @[ktavatu] suffixes. Past participle affixes defined in 1.1.26."
sutraRef = "1.1.26"
related = ["kta", "ktavatu"]

[[terms]]
term = "क्त्वा"
termRoman = "ktvā"
category = "pratyaya"
meaning = "Absolutive suffix meaning 'having done'. Used for sequential actions by the same agent: @[भुक्त्वा गच्छति] 'having eaten, he goes'."
sutraRef = "3.4.21"
related = ["lyap"]

[[terms]]
term = "सत्"
termRoman = "sat"
category = "pratyaya"
meaning = "Technical name for @[śatṛ] and @[śānac] (present participle suffixes). Defined in 3.2.127."
sutraRef = "3.2.127"
related = ["śatṛ", "śānac"]

[[terms]]
term = "कृत्य"
termRoman = "kṛtya"
category = "pratyaya"
meaning = "Future passive participle suffixes (@[tavya], @[anīya], @[yat]). Express obligation: 'to be done'."
sutraRef = "3.1.96"
related = ["tavya", "anīya"]

[[terms]]
term = "अपत्य"
termRoman = "apatya"
category = "samjna"
meaning = "Offspring or descendant. The meaning expressed by patronymic suffixes like @[aṇ], @[iñ]."
sutraRef = "4.1.92"

[[terms]]
term = "गोत्र"
termRoman = "gotra"
category = "samjna"
meaning = "Clan or lineage. Family name passed through generations, formed with special suffixes."
related = ["apatya"]

[[terms]]
term = "इमनिच्"
termRoman = "imanic"
category = "pratyaya"
meaning = "Abstract noun suffix (= @[iman]). Forms nouns like @[गरिमन्] 'heaviness' with @[vṛddhi]."
sutraRef = "5.1.120"
related = ["tva", "tal"]

[[terms]]
term = "यत्"
termRoman = "yat"
category = "pratyaya"
meaning = "Future passive participle suffix after vowel-final roots. @[गेयम्] 'to be sung'."
sutraRef = "3.1.97"
related = ["tavya", "kṛtya"]

[[terms]]
term = "इञ्"
termRoman = "iñ"
category = "pratyaya"
meaning = "Patronymic suffix (= @[i]) after @[a]-final stems. @[दक्ष] → @[दाक्षिः] 'son of Daksha'."
sutraRef = "4.1.95"
related = ["aṇ", "apatya"]

[[terms]]
term = "ढक्"
termRoman = "ḍhak"
category = "pratyaya"
meaning = "Patronymic suffix (= @[eya]). @[कुन्ती] → @[कौन्तेयः] 'son of Kunti'."
related = ["apatya"]

[[terms]]
term = "वल्"
termRoman = "val"
category = "pratyahara"
meaning = "Pratyahara covering most consonants. Used in @[iṭ] augment rules (7.2.35)."
sutraRef = "7.2.35"

[[terms]]
term = "झल्"
termRoman = "jhal"
category = "pratyahara"
meaning = "Pratyahara for obstruent consonants (stops and sibilants). Used in sandhi rules."

[[terms]]
term = "पररूप"
termRoman = "pararūpa"
category = "sandhi"
meaning = "Substitution by the following element. In @[a/ā + e/o], the @[e/o] replaces both."
sutraRef = "6.1.94"

[[terms]]
term = "पूर्वरूप"
termRoman = "pūrvarūpa"
category = "sandhi"
meaning = "Substitution by the preceding element. The prior vowel replaces both in certain contexts."
sutraRef = "6.1.109"

[[terms]]
term = "प्रकृतिभाव"
termRoman = "prakṛtibhāva"
category = "sandhi"
meaning = "Retention of original form. No sandhi occurs; both elements remain unchanged."

[[terms]]
term = "आयादेश"
termRoman = "āyādeśa"
category = "sandhi"
meaning = "Substitution by @[āy], @[āv], etc. Diphthongs become @[ay], @[av] before vowels."
sutraRef = "6.1.78"

[[terms]]
term = "प्रधान"
termRoman = "pradhāna"
category = "samasa"
meaning = "Primary or principal element. In @[tatpuruṣa], the second member is @[pradhāna]."
related = ["upasarjana"]

[[terms]]
term = "उपसर्जन"
termRoman = "upasarjana"
category = "samasa"
meaning = "Subordinate element. In compounds, the non-primary member that qualifies the @[pradhāna]."
sutraRef = "1.2.43"
related = ["pradhāna"]

[[terms]]
term = "समाहार द्वन्द्व"
termRoman = "samāhāra dvandva"
category = "samasa"
meaning = "Collective @[dvandva]. Members taken as a group; result is neuter singular: @[पाणिपादम्]."
related = ["dvandva"]

[[terms]]
term = "इतरेतर द्वन्द्व"
termRoman = "itaretara dvandva"
category = "samasa"
meaning = "Enumerative @[dvandva]. Members counted individually; result is plural: @[रामलक्ष्मणौ]."
related = ["dvandva"]

[[terms]]
term = "विधिलिङ्"
termRoman = "vidhiliṅ"
category = "lakara"
meaning = "Prescriptive optative. Expresses command, advice, possibility: @[भवेत्] 'should be, may be'."
sutraRef = "3.3.161"
related = ["āśīrliṅ", "liṅ"]

[[terms]]
term = "आशीर्लिङ्"
termRoman = "āśīrliṅ"
category = "lakara"
meaning = "Benedictive optative. Expresses blessing or wish: @[भूयात्] 'may it be!'"
sutraRef = "3.3.173"
related = ["vidhiliṅ", "liṅ"]

[[terms]]
term = "अनद्यतन"
termRoman = "anadyatana"
category = "lakara"
meaning = "Not of today. Time reference excluding the current day; governs @[laṅ] and @[luṭ]."
sutraRef = "3.2.111"

[[terms]]
term = "परोक्ष"
termRoman = "parokṣa"
category = "lakara"
meaning = "Unwitnessed. Past action not seen by the speaker; expressed by @[liṭ] (perfect)."
sutraRef = "3.2.115"
related = ["liṭ"]

[[terms]]
term = "स्थानिवत्"
termRoman = "sthānivat"
category = "samjna"
meaning = "Like the original. A substitute behaves as if it were the replaced element for certain rules."
sutraRef = "1.1.56"

[[terms]]
term = "असिद्ध"
termRoman = "asiddha"
category = "samjna"
meaning = "Non-effected. A rule's result is 'invisible' to certain other rules."
sutraRef = "8.2.1"

[[terms]]
term = "उपधा"
termRoman = "upadhā"
category = "samjna"
meaning = "Penultimate. The letter before the final: in @[पच्], @[अ] is the @[upadhā]."
sutraRef = "1.1.65"

[[terms]]
term = "टि"
termRoman = "ṭi"
category = "samjna"
meaning = "Final portion. The last vowel and what follows it in a word."
sutraRef = "1.1.64"

[[terms]]
term = "nominative"
termRoman = "nominative"
category = "vibhakti"
meaning = "First case (@deva[प्रथमा]). Used for the subject of a sentence or simple naming. Sanskrit: @deva[प्रथमा विभक्ति]."
related = ["prathamā"]

[[terms]]
term = "accusative"
termRoman = "accusative"
category = "vibhakti"
meaning = "Second case (@deva[द्वितीया]). Used for the direct object of a transitive verb. Sanskrit: @deva[द्वितीया विभक्ति]."
related = ["dvitīyā"]

[[terms]]
term = "instrumental"
termRoman = "instrumental"
category = "vibhakti"
meaning = "Third case (@deva[तृतीया]). Used for the instrument or means, also for agent in passive. Sanskrit: @deva[तृतीया विभक्ति]."
related = ["tṛtīyā"]

[[terms]]
term = "dative"
termRoman = "dative"
category = "vibhakti"
meaning = "Fourth case (@deva[चतुर्थी]). Used for the indirect object or recipient. Sanskrit: @deva[चतुर्थी विभक्ति]."
related = ["caturthī"]

[[terms]]
term = "ablative"
termRoman = "ablative"
category = "vibhakti"
meaning = "Fifth case (@deva[पञ्चमी]). Used for source, separation, or comparison. Sanskrit: @deva[पञ्चमी विभक्ति]."
related = ["pañcamī"]

[[terms]]
term = "genitive"
termRoman = "genitive"
category = "vibhakti"
meaning = "Sixth case (@deva[षष्ठी]). Used for possession and various relations. Sanskrit: @deva[षष्ठी विभक्ति]."
related = ["ṣaṣṭhī"]

[[terms]]
term = "locative"
termRoman = "locative"
category = "vibhakti"
meaning = "Seventh case (@deva[सप्तमी]). Used for location in space or time. Sanskrit: @deva[सप्तमी विभक्ति]."
related = ["saptamī"]

[[terms]]
term = "vocative"
termRoman = "vocative"
category = "vibhakti"
meaning = "Case of direct address (@deva[सम्बोधन]). Uses @deva[प्रथमा] endings with special forms. Sanskrit: @deva[सम्बोधन प्रथमा]."
related = ["sambodhana", "prathamā"]

[[terms]]
term = "singular"
termRoman = "singular"
category = "vibhakti"
meaning = "One item (@deva[एकवचन]). Sanskrit: @deva[एकवचनम्]."
related = ["ekavacana"]

[[terms]]
term = "dual"
termRoman = "dual"
category = "vibhakti"
meaning = "Two items (@deva[द्विवचन]). Sanskrit has a special number for exactly two. Sanskrit: @deva[द्विवचनम्]."
related = ["dvivacana"]

[[terms]]
term = "plural"
termRoman = "plural"
category = "vibhakti"
meaning = "More than two items (@deva[बहुवचन]). Sanskrit: @deva[बहुवचनम्]."
related = ["bahuvacana"]

[[terms]]
term = "present"
termRoman = "present"
category = "lakara"
meaning = "Present tense (@deva[लट्]). Expresses ongoing or habitual action. Sanskrit: @deva[वर्तमानकालः]."
related = ["laṭ", "vartamāna"]

[[terms]]
term = "imperfect"
termRoman = "imperfect"
category = "lakara"
meaning = "Past tense not of today (@deva[लङ्]). Sanskrit: @deva[अनद्यतन भूतकालः]."
related = ["laṅ", "anadyatana"]

[[terms]]
term = "perfect"
termRoman = "perfect"
category = "lakara"
meaning = "Past tense unwitnessed (@deva[लिट्]). Action not seen by speaker. Sanskrit: @deva[परोक्ष भूतकालः]."
related = ["liṭ", "parokṣa"]

[[terms]]
term = "aorist"
termRoman = "aorist"
category = "lakara"
meaning = "General past tense (@deva[लुङ्]). Simple past without specific nuance. Sanskrit: @deva[सामान्य भूतकालः]."
related = ["luṅ", "bhūta"]

[[terms]]
term = "future"
termRoman = "future"
category = "lakara"
meaning = "Future tense. Simple future is @deva[लृट्]; periphrastic future is @deva[लुट्]. Sanskrit: @deva[भविष्यत्कालः]."
related = ["lṛṭ", "luṭ", "bhaviṣyat"]

[[terms]]
term = "imperative"
termRoman = "imperative"
category = "lakara"
meaning = "Command mood (@deva[लोट्]). Used for orders, requests, blessings. Sanskrit: @deva[आज्ञार्थः]."
related = ["loṭ"]

[[terms]]
term = "optative"
termRoman = "optative"
category = "lakara"
meaning = "Potential mood (@deva[लिङ्]). Expresses possibility, wish, or prescription. Sanskrit: @deva[विध्यर्थः]."
related = ["liṅ", "vidhiliṅ"]

[[terms]]
term = "conditional"
termRoman = "conditional"
category = "lakara"
meaning = "Hypothetical mood (@deva[लृङ्]). Used for 'would have' scenarios. Sanskrit: @deva[सङ्केतार्थः]."
related = ["lṛṅ"]

[[terms]]
term = "benedictive"
termRoman = "benedictive"
category = "lakara"
meaning = "Blessing mood (@deva[आशीर्लिङ्]). Used for wishes and blessings. Sanskrit: @deva[आशिषि लिङ्]."
related = ["āśīrliṅ"]

[[terms]]
term = "active"
termRoman = "active"
category = "samjna"
meaning = "Active voice (@deva[परस्मैपद]). Action for another's benefit. Sanskrit: @deva[कर्तरि प्रयोगः]."
related = ["parasmaipada", "kartari prayoga"]

[[terms]]
term = "middle"
termRoman = "middle"
category = "samjna"
meaning = "Middle voice (@deva[आत्मनेपद]). Action for one's own benefit. Sanskrit: @deva[आत्मनेपदम्]."
related = ["ātmanepada"]

[[terms]]
term = "passive"
termRoman = "passive"
category = "samjna"
meaning = "Passive voice (@deva[कर्मणि प्रयोग]). Object becomes subject; agent in instrumental. Sanskrit: @deva[कर्मणि प्रयोगः]."
related = ["karmaṇi prayoga"]

[[terms]]
term = "causative"
termRoman = "causative"
category = "pratyaya"
meaning = "Causing another to act (@deva[णिच्]). @deva[पच्] 'cook' → @deva[पाचयति] 'causes to cook'. Sanskrit: @deva[प्रयोजकः]."
related = ["ṇic"]

[[terms]]
term = "desiderative"
termRoman = "desiderative"
category = "pratyaya"
meaning = "Expressing desire to act (@deva[सन्]). @deva[पा] 'drink' → @deva[पिपासति] 'wants to drink'. Sanskrit: @deva[सन्नन्तः]."
related = ["san"]

[[terms]]
term = "intensive"
termRoman = "intensive"
category = "pratyaya"
meaning = "Expressing repeated or intense action (@deva[यङ्]). Also called frequentative. Sanskrit: @deva[यङन्तः]."

[[terms]]
term = "participle"
termRoman = "participle"
category = "pratyaya"
meaning = "Verbal adjective. Present (@deva[शतृ]/[@deva[शानच्]), past (@deva[क्त]), future passive (@deva[तव्य]). Sanskrit: @deva[कृदन्तः]."
related = ["śatṛ", "śānac", "kta", "tavya"]

[[terms]]
term = "infinitive"
termRoman = "infinitive"
category = "pratyaya"
meaning = "Verbal noun 'to do' (@deva[तुमुन्]). @deva[गन्तुम्] 'to go'. Sanskrit: @deva[तुमन्तः]."
related = ["tumun"]

[[terms]]
term = "absolutive"
termRoman = "absolutive"
category = "pratyaya"
meaning = "Gerund 'having done' (@deva[क्त्वा], @deva[ल्यप्]). @deva[गत्वा] 'having gone'. Sanskrit: @deva[क्त्वान्तः]."
related = ["ktvā", "lyap"]

[[terms]]
term = "agent"
termRoman = "agent"
category = "karaka"
meaning = "The doer of the action (@deva[कर्तृ]). Independent performer. Sanskrit: @deva[कर्ता]."
related = ["kartṛ"]

[[terms]]
term = "object"
termRoman = "object"
category = "karaka"
meaning = "What the action affects (@deva[कर्मन्]). What the agent most desires to reach. Sanskrit: @deva[कर्म]."
related = ["karman"]

[[terms]]
term = "instrument"
termRoman = "instrument"
category = "karaka"
meaning = "The means of the action (@deva[करण]). Most effective tool. Sanskrit: @deva[करणम्]."
related = ["karaṇa"]

[[terms]]
term = "recipient"
termRoman = "recipient"
category = "karaka"
meaning = "One who receives (@deva[सम्प्रदान]). Indirect object. Sanskrit: @deva[सम्प्रदानम्]."
related = ["sampradāna"]

[[terms]]
term = "source"
termRoman = "source"
category = "karaka"
meaning = "Point of separation (@deva[अपादान]). Fixed point from which something moves away. Sanskrit: @deva[अपादानम्]."
related = ["apādāna"]

[[terms]]
term = "locus"
termRoman = "locus"
category = "karaka"
meaning = "Location of the action (@deva[अधिकरण]). Where the action occurs. Sanskrit: @deva[अधिकरणम्]."
related = ["adhikaraṇa"]

[[terms]]
term = "masculine"
termRoman = "masculine"
category = "samjna"
meaning = "Masculine gender (@deva[पुंलिङ्ग]). One of three genders in Sanskrit. Sanskrit: @deva[पुंलिङ्गम्]."
related = ["puṃliṅga"]

[[terms]]
term = "feminine"
termRoman = "feminine"
category = "samjna"
meaning = "Feminine gender (@deva[स्त्रीलिङ्ग]). One of three genders in Sanskrit. Sanskrit: @deva[स्त्रीलिङ्गम्]."
related = ["strīliṅga"]

[[terms]]
term = "neuter"
termRoman = "neuter"
category = "samjna"
meaning = "Neuter gender (@deva[नपुंसकलिङ्ग]). One of three genders in Sanskrit. Sanskrit: @deva[नपुंसकलिङ्गम्]."
related = ["napuṃsakaliṅga"]

[[terms]]
term = "first person"
termRoman = "first person"
category = "vibhakti"
meaning = "The speaker (@deva[उत्तम पुरुष]). 'I/we' in English. Sanskrit: @deva[उत्तमपुरुषः]."
related = ["uttama"]

[[terms]]
term = "second person"
termRoman = "second person"
category = "vibhakti"
meaning = "The addressee (@deva[मध्यम पुरुष]). 'You' in English. Sanskrit: @deva[मध्यमपुरुषः]."
related = ["madhyama"]

[[terms]]
term = "third person"
termRoman = "third person"
category = "vibhakti"
meaning = "The one spoken about (@deva[प्रथम पुरुष]). 'He/she/it/they' in English. Sanskrit: @deva[प्रथमपुरुषः]."
related = ["prathama"]

[[terms]]
term = "root"
termRoman = "root"
category = "samjna"
meaning = "Verbal root (@deva[धातु]). The base form from which verbs are derived. Sanskrit: @deva[धातुः]."
related = ["dhātu"]

[[terms]]
term = "stem"
termRoman = "stem"
category = "samjna"
meaning = "Nominal stem (@deva[प्रातिपदिक]) or verbal base (@deva[अङ्ग]). What affixes attach to. Sanskrit: @deva[प्रातिपदिकम्], @deva[अङ्गम्]."
related = ["prātipadika", "aṅga"]

[[terms]]
term = "suffix"
termRoman = "suffix"
category = "pratyaya"
meaning = "Affix added after a base (@deva[प्रत्यय]). Includes case endings, verb endings, and derivational suffixes. Sanskrit: @deva[प्रत्ययः]."
related = ["pratyaya"]

[[terms]]
term = "prefix"
termRoman = "prefix"
category = "samjna"
meaning = "Element added before a root (@deva[उपसर्ग]). Verbal prefixes that modify meaning. Sanskrit: @deva[उपसर्गः]."
related = ["upasarga"]

[[terms]]
term = "compound"
termRoman = "compound"
category = "samasa"
meaning = "Multiple words joined as one (@deva[समास]). Sanskrit has several compound types. Sanskrit: @deva[समासः]."
related = ["samāsa"]

[[terms]]
term = "sandhi"
termRoman = "sandhi"
category = "sandhi"
meaning = "Sound changes at junctions (@deva[सन्धि]). Euphonic combination of sounds. Sanskrit: @deva[सन्धिः]."
related = ["sandhi"]

[[terms]]
term = "vowel"
termRoman = "vowel"
category = "samjna"
meaning = "A sound that can form a syllable alone (@deva[स्वर], @deva[अच्]). Sanskrit has 13 vowels. Sanskrit: @deva[स्वरः]."
related = ["svara", "ac"]

[[terms]]
term = "consonant"
termRoman = "consonant"
category = "samjna"
meaning = "A sound requiring a vowel (@deva[व्यञ्जन], @deva[हल्]). Sanskrit has 33 consonants. Sanskrit: @deva[व्यञ्जनम्]."
related = ["vyañjana", "hal"]

[[terms]]
term = "semivowel"
termRoman = "semivowel"
category = "samjna"
meaning = "Sounds between vowels and consonants (@deva[अन्तःस्थ]): @deva[य], @deva[र], @deva[ल], @deva[व]. Sanskrit: @deva[अन्तःस्थाः]."
related = ["yaṇ"]

[[terms]]
term = "sibilant"
termRoman = "sibilant"
category = "samjna"
meaning = "Fricative sounds (@deva[ऊष्मन्]): @deva[श], @deva[ष], @deva[स], @deva[ह]. Sanskrit: @deva[ऊष्माणः]."

[[terms]]
term = "aspirate"
termRoman = "aspirate"
category = "samjna"
meaning = "Consonant with breath release (@deva[महाप्राण]): @deva[ख], @deva[घ], @deva[छ], etc. Sanskrit: @deva[महाप्राणः]."

[[terms]]
term = "unaspirate"
termRoman = "unaspirate"
category = "samjna"
meaning = "Consonant without breath release (@deva[अल्पप्राण]): @deva[क], @deva[ग], @deva[च], etc. Sanskrit: @deva[अल्पप्राणः]."

[[terms]]
term = "retroflex"
termRoman = "retroflex"
category = "samjna"
meaning = "Sounds made with tongue curled back (@deva[मूर्धन्य]): @deva[ट], @deva[ठ], @deva[ड], @deva[ढ], @deva[ण]. Sanskrit: @deva[मूर्धन्याः]."

[[terms]]
term = "dental"
termRoman = "dental"
category = "samjna"
meaning = "Sounds made at teeth (@deva[दन्त्य]): @deva[त], @deva[थ], @deva[द], @deva[ध], @deva[न]. Sanskrit: @deva[दन्त्याः]."

[[terms]]
term = "guttural"
termRoman = "guttural"
category = "samjna"
meaning = "Sounds made at throat (@deva[कण्ठ्य]): @deva[क], @deva[ख], @deva[ग], @deva[घ], @deva[ङ]. Sanskrit: @deva[कण्ठ्याः]."

[[terms]]
term = "palatal"
termRoman = "palatal"
category = "samjna"
meaning = "Sounds made at palate (@deva[तालव्य]): @deva[च], @deva[छ], @deva[ज], @deva[झ], @deva[ञ]. Sanskrit: @deva[तालव्याः]."

[[terms]]
term = "labial"
termRoman = "labial"
category = "samjna"
meaning = "Sounds made at lips (@deva[ओष्ठ्य]): @deva[प], @deva[फ], @deva[ब], @deva[भ], @deva[म]. Sanskrit: @deva[ओष्ठ्याः]."

[[terms]]
term = "इति"
termRoman = "iti"
category = "general"
meaning = "Thus, so, end-quote marker. Used to mark the end of a quotation or to indicate 'in this sense'."

[[terms]]
term = "च"
termRoman = "ca"
category = "general"
meaning = "And, also. Conjunction indicating addition or inclusion of another element."

[[terms]]
term = "वा"
termRoman = "vā"
category = "general"
meaning = "Or, optionally. Indicates an alternative or optional application of a rule."

[[terms]]
term = "न"
termRoman = "na"
category = "general"
meaning = "Not. Negation particle blocking or excluding something."

[[terms]]
term = "परः"
termRoman = "paraḥ"
category = "samjna"
meaning = "Following, subsequent. Indicates that something comes after or is placed after another element."

[[terms]]
term = "तस्य"
termRoman = "tasya"
category = "general"
meaning = "Of that (genitive). Refers back to a previously mentioned element."

[[terms]]
term = "अस्य"
termRoman = "asya"
category = "general"
meaning = "Of this (genitive). Refers to the current or nearby element under discussion."

[[terms]]
term = "तत्"
termRoman = "tat"
category = "general"
meaning = "That. Demonstrative pronoun referring to something mentioned."

[[terms]]
term = "तत्र"
termRoman = "tatra"
category = "general"
meaning = "There, in that case. Locative adverb indicating context or condition."

[[terms]]
term = "अस्मिन्"
termRoman = "asmin"
category = "general"
meaning = "In this (locative). Indicates the context or domain of application."

[[terms]]
term = "प्रत्ययः"
termRoman = "pratyayaḥ"
category = "pratyaya"
meaning = "Affix, suffix. The nominative form of @deva[प्रत्यय] used in sūtra statements."
related = ["pratyaya"]

[[terms]]
term = "धातोः"
termRoman = "dhātoḥ"
category = "samjna"
meaning = "After a root (ablative). Indicates that something follows or is added after a @deva[धातु]."
related = ["dhātu"]

[[terms]]
term = "अङ्गस्य"
termRoman = "aṅgasya"
category = "samjna"
meaning = "Of the stem (genitive). Refers to operations on the @deva[अङ्ग] (stem before an affix)."
related = ["aṅga"]

[[terms]]
term = "अङ्गात्"
termRoman = "aṅgāt"
category = "samjna"
meaning = "After the stem (ablative). Indicates something follows the @deva[अङ्ग]."
related = ["aṅga"]


id = "5.1.48"
numericId = "51048"

[en]
simple = """
The affix @deva[ठञ्] comes after ordinal numbers and @deva[अर्ध] 'half' in the sense of 'interest, rent, profit, tax, or bribe given therein'. @deva[द्वितीयिकः], @deva[तृतीयिकः], @deva[अर्धिकः].
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the same sense of 'interest, rent, profit, tax, or bribe given therein' after words denoting ordinals (@deva[पूरण]) and after @deva[अर्ध] 'half'. This supersedes @deva[ठक्] and @deva[टिठन्]. Examples: @deva[द्वितीयो वृद्ध्यादिः अस्मिन् दीयते] = @deva[द्वितीयिकः] 'that in which a second (portion) is given as interest etc.'; @deva[तृतीयिकः], @deva[पञ्चमिकः], @deva[सप्तमिकः], @deva[अर्धिकः]. The word @deva[अर्ध] here technically means @deva[रूपकार्ध] 'half a rupee'.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[पूरण] (ordinal) words and @deva[अर्ध] in the @ref[5.1.47] senses. The @deva[ठञ्] supersedes @deva[ठक्] and @deva[टिठन्]. Examples: @deva[द्वितीयिकः], @deva[तृतीयिकः], @deva[पञ्चमिकः], @deva[सप्तमिकः], @deva[अर्धिकः]. The word @deva[अर्ध] is technically @deva[रूपकार्ध] 'half a @deva[रूपक] (monetary unit)'.
"""

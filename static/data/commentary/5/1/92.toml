id = "5.1.92"
numericId = "51092"

[en]
simple = """
The affixes @deva[ख] and @deva[छ] come in Vedic usage after @deva[वत्सर] 'year' when preceded by @deva[सम्] or @deva[परि]. @deva[संवत्सरीणः] and @deva[संवत्सरीयः]; @deva[परिवत्सरीणः] and @deva[परिवत्सरीयः].
"""

standard = """
In the @deva[छन्दस्] (Vedas), the affixes @deva[ख] (adding @deva[ईन]) and @deva[छ] (adding @deva[ईय]) come in the five senses taught in @ref[5.1.76] and @ref[5.1.80] after @deva[वत्सर] 'year' when preceded by @deva[सम्] or @deva[परि]. Examples: @deva[संवत्सरीणः] and @deva[संवत्सरीयः]; @deva[परिवत्सरीणः] and @deva[परिवत्सरीयः].
"""

advanced = """
This @[sūtra] teaches Vedic @deva[ख] and @deva[छ] after @deva[सम्] + @deva[वत्सर] and @deva[परि] + @deva[वत्सर] with the @ref[5.1.76] and @ref[5.1.80] senses. Results: @deva[संवत्सरीणः] ~ @deva[संवत्सरीयः]; @deva[परिवत्सरीणः] ~ @deva[परिवत्सरीयः].
"""

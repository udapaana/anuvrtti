id = "5.1.105"
numericId = "51105"

[en]
simple = """
The affix @deva[अण्] comes after @deva[ऋतु] 'season' meaning 'that has come for it'. @deva[ऋतुः प्राप्तोऽस्य] → @deva[आर्तवं पुष्पम्] 'a flower for which the season has arrived'.
"""

standard = """
The affix @deva[अण्] (adding @deva[अ]) comes in the sense of 'that has come for it' after @deva[ऋतु] 'season'. Example: @deva[ऋतुः प्राप्तोऽस्य] = @deva[आर्तवं पुष्पम्] 'a flower for which the season has arrived' (with @deva[गुण] per @ref[6.4.146]). @deva[वार्त्तिक]: @deva[अण्] also after @deva[उपवस्त्र] etc.: @deva[औपवस्त्रम्], @deva[प्राशित्रम्].
"""

advanced = """
This @[sūtra] teaches @deva[अण्] after @deva[ऋतु] with @deva[प्राप्त] sense. Result: @deva[आर्तवम्] 'seasonal' (with @deva[गुण] per @ref[6.4.146]). A @deva[वार्त्तिक] extends to @deva[उपवस्त्रादि]: @deva[औपवस्त्रम्], @deva[प्राशित्रम्].
"""

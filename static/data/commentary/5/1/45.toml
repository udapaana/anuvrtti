id = "5.1.45"
numericId = "51045"

[en]
simple = """
The affixes (@ref[5.1.18] etc.) come after a word in the @deva[षष्ठी] (genitive) case in the sense of 'sown with that much'. @deva[प्रस्थस्य वापः क्षेत्रम्] → @deva[प्रास्थिकम्] 'a field sown with a @deva[प्रस्थ] of grain'.
"""

standard = """
The affixes mentioned from @ref[5.1.18] onward come after a word in the genitive (@deva[षष्ठी]) case in construction, in the sense of 'sown with that quantity' (@deva[तस्य वापः]). The word @deva[वाप] means 'sown therein', referring to a field. Examples: @deva[प्रस्थस्य वापः क्षेत्रम्] = @deva[प्रास्थिकम्] 'a field sown with a @deva[प्रस्थ] of grain'; @deva[द्रौणिकम्] 'sown with a @deva[द्रोण]'; @deva[खारीकम्] 'sown with a @deva[खारी]'.
"""

advanced = """
This @[sūtra] teaches the @deva[वाप] sense for the @ref[5.1.18] affixes: @deva[तस्य वापः] 'sown with that measure'. The @deva[षष्ठी] (genitive) construction indicates the quantity of seed. The word @deva[वाप] (from √@deva[वप्] 'to sow') denotes 'field as characterized by sowing'. Examples: @deva[प्रस्थस्य वापः क्षेत्रम्] = @deva[प्रास्थिकम्] 'field sown with a @deva[प्रस्थ]-measure of grain'; @deva[द्रोणस्य वापः] = @deva[द्रौणिकम्]; @deva[खार्याः वापः] = @deva[खारीकम्].
"""

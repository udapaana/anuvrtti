id = "5.1.91"
numericId = "51091"

[en]
simple = """
The affix @deva[छ] comes in Vedic usage after stems ending in @deva[वत्सर] 'year' in the five senses of @ref[5.1.76] and @ref[5.1.80]. @deva[इद्वत्सरीयः], @deva[इदावत्सरीयः].
"""

standard = """
In the @deva[छन्दस्] (Vedas), the affix @deva[छ] (adding @deva[ईय]) comes in the five senses taught in @ref[5.1.76] ('always going') and @ref[5.1.80] ('solicited, hired, lasted, will last') after a stem ending in @deva[वत्सर] 'year'. This supersedes @deva[ठञ्]. Examples: @deva[इद्वत्सरीयः], @deva[इदावत्सरीयः].
"""

advanced = """
This @[sūtra] teaches Vedic @deva[छ] after @deva[वत्सर]-final stems with the @ref[5.1.76] and @ref[5.1.80] senses. The @deva[छ] supersedes @deva[ठञ्]. Results: @deva[इद्वत्सरीयः], @deva[इदावत्सरीयः].
"""

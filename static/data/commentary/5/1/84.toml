id = "5.1.84"
numericId = "51084"

[en]
simple = """
The affix @deva[ठन्] comes after @deva[षण्मास] when age is NOT meant. @deva[षण्मासिकः] or @deva[षाण्मास्यो रोगः] 'a disease lasting six months'.
"""

standard = """
The affix @deva[ठन्] (adding @deva[इक]) comes after @deva[षण्मास] 'six months' when age is not meant (@deva[अवयसि]). The @deva[च] draws in @deva[ण्यत्] also. Examples: @deva[षण्मासिकः] (with @deva[ठन्]) or @deva[षाण्मास्यो रोगः] (with @deva[ण्यत्]) 'a disease lasting six months'.
"""

advanced = """
This @[sūtra] teaches @deva[ठन्] (and @deva[ण्यत्] via @deva[च]) after @deva[षण्मास] when @deva[वयस्] is not meant. Results: @deva[षण्मासिकः] ~ @deva[षाण्मास्यः] for non-age contexts like disease duration.
"""

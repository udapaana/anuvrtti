id = "5.1.94"
numericId = "51094"

[en]
simple = """
The affix @deva[ठञ्] comes after a time-denoting word meaning 'abstinence lasting that long' or 'one who practices abstinence that long'. @deva[मासं ब्रह्मचर्यमस्य] → @deva[मासिको ब्रह्मचारी] 'one who observes celibacy for a month'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes after a word denoting time with the sense of 'abstinence (@deva[ब्रह्मचर्य]) lasting that long' or 'who practices abstinence that long'. Two interpretations: (1) Accusative construction: @deva[मासं ब्रह्मचर्यमस्य] = @deva[मासिको ब्रह्मचारी] 'one who observes abstinence for a month'; (2) Nominative construction: @deva[मासो अस्य ब्रह्मचर्यस्य] = @deva[मासिकं ब्रह्मचर्यम्] 'abstinence lasting a month'. Both are valid. @deva[वार्त्तिक]s: (1) @deva[ठञ्] after @deva[महानाम्नी] etc. in genitive: @deva[माहानामिकम्], @deva[गौदानिकम्], @deva[आदित्यव्रतिकम्]; also meaning 'who practices that': @deva[महानाम्नीश्चरति] = @deva[माहानामिकः] (per @ref[6.3.35] @deva[वार्त्तिक] and @ref[6.4.144]); (2) @deva[डिनि] after @deva[अवान्तरदीक्षा] etc.: @deva[अवान्तरदीक्षी], @deva[तिलव्रतिन्]; (3) @deva[ड्वुन्] and @deva[डिनि] after @deva[अष्टचत्वारिंशत्]: @deva[अष्टचत्वारिंशकः] or @deva[अष्टचत्वारिंशिन्]; (4) same after @deva[चतुर्मास्य] with @deva[य]-elision: @deva[चातुर्मासकः] or @deva[चातुर्मासिन्]; (5) @deva[ण्य] after @deva[चतुर्मास] meaning 'produced there': @deva[चातुर्मास्यानि] (sacrifices); (6) @deva[अण्] when a name: @deva[चातुर्मासी पौर्णमासी], @deva[आषाढी], @deva[कार्तिकी], @deva[फाल्गुनी].
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[काल] words with @deva[ब्रह्मचर्य] sense. Two constructions: (1) @deva[द्वितीया]: @deva[मासिको ब्रह्मचारी] 'one who observes for a month'; (2) @deva[प्रथमा]: @deva[मासिकं ब्रह्मचर्यम्] 'month-long abstinence'. Six @deva[वार्त्तिक]s extend the rule: @deva[ठञ्] after @deva[महानाम्न्यादि] (with @deva[षष्ठी]); @deva[डिनि] after @deva[अवान्तरदीक्षादि]; @deva[ड्वुन्]/@deva[डिनि]] after @deva[अष्टचत्वारिंशत्]; same after @deva[चतुर्मास्य] (with @deva[य]-deletion); @deva[ण्य] after @deva[चतुर्मास] for @deva[भव] sense; @deva[अण्] when @deva[संज्ञा] (names like @deva[चातुर्मासी], @deva[आषाढी], etc.).
"""

id = "5.1.27"
numericId = "51027"

[en]
simple = """
The affix @deva[अण्] comes after @deva[शतमान], @deva[विंशतिक], @deva[सहस्र], and @deva[वसन]. @deva[शतमान] + @deva[अण्] → @deva[शातमानम्]; @deva[सहस्र] + @deva[अण्] → @deva[साहस्रम्].
"""

standard = """
The affix @deva[अण्] (adding @deva[अ]) comes in the senses up to @ref[5.1.63] after the words @deva[शतमान] 'a weight of 100 @deva[पल]s', @deva[विंशतिक], @deva[सहस्र] 'thousand', and @deva[वसन] 'cloth'. This supersedes @deva[ठञ्], @deva[ठक्], and @deva[कन्]. Examples: @deva[शतमानेन क्रीतम्] = @deva[शातमानम्]; @deva[वैंशतिकम्]; @deva[साहस्रम्]; @deva[वासनम्].
"""

advanced = """
This @[sūtra] teaches @deva[अण्] after four specified words in the @deva[आर्हीय] senses. The @deva[अण्] supersedes @deva[ठञ्], @deva[ठक्], and @deva[कन्]. Derivations with @deva[वृद्धि]: @deva[शतमान] → @deva[शातमानम्]; @deva[विंशतिक] → @deva[वैंशतिकम्]; @deva[सहस्र] → @deva[साहस्रम्]; @deva[वसन] → @deva[वासनम्]. Note that @deva[विंशतिक] is itself a derivative (from @deva[विंशति] + @deva[कन्]), and @deva[अण्] is added to this secondary stem.
"""

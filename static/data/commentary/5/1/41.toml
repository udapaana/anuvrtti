id = "5.1.41"
numericId = "51041"

[en]
simple = """
The affixes @deva[अण्] and @deva[अञ्] come after @deva[सर्वभूमि] and @deva[पृथ्वी] respectively in the sense of 'relationship or portent for its sake'. @deva[सार्वभौमः], @deva[पार्थिवः].
"""

standard = """
The affix @deva[अण्] (adding @deva[अ]) comes after @deva[सर्वभूमि] 'the whole earth', and @deva[अञ्] (adding @deva[अ]) comes after @deva[पृथ्वी] 'earth', in the sense of 'relationship or portent for its sake'. These supersede @deva[ठक्]. Examples: @deva[सर्वभूमेर्निमित्तं संयोग उत्पातो वा] = @deva[सार्वभौमः]; @deva[पार्थिवः]. In @deva[सार्वभौमः], @deva[वृद्धि] of both compound members occurs per @ref[7.3.20].
"""

advanced = """
This @[sūtra] teaches @deva[अण्] after @deva[सर्वभूमि] and @deva[अञ्] after @deva[पृथ्वी] in the @ref[5.1.38] senses. The affixes supersede @deva[ठक्]. Derivations: @deva[सर्वभूमि] + @deva[अण्] → @deva[सार्वभौमः] (with @deva[वृद्धि] of both members per @ref[7.3.20]); @deva[पृथ्वी] + @deva[अञ्] → @deva[पार्थिवः]. The double @deva[वृद्धि] in @deva[सार्वभौमः] (@deva[सर्व] → @deva[सार्व], @deva[भूमि] → @deva[भौम]) is a special feature of compounds with @deva[अण्].
"""

id = "5.1.30"
numericId = "51030"

[en]
simple = """
The affix is optionally deleted after @deva[द्विगु] compounds of @deva[निष्क] preceded by @deva[द्वि], @deva[त्रि], or @deva[बहु]. @deva[द्विनिष्कम्] or @deva[द्विनैष्किकम्]; @deva[त्रिनिष्कम्] or @deva[त्रिनैष्किकम्].
"""

standard = """
The @deva[आर्हीय] affix (@ref[5.1.63]) is optionally deleted by @deva[लुक्] after @deva[द्विगु] compounds of @deva[निष्क] when preceded by @deva[द्वि] or @deva[त्रि]. The condition @deva[द्विगोः] from @ref[5.1.28] is understood. Examples: @deva[द्विनिष्कम्] or @deva[द्विनैष्किकम्]; @deva[त्रिनिष्कम्] or @deva[त्रिनैष्किकम्]. @deva[वार्त्तिक]: This also applies when @deva[निष्क] is preceded by @deva[बहु]: @deva[बहुनिष्कम्] or @deva[बहुनैष्किकम्]. When the affix is retained, irregular @deva[वृद्धि] of the second term occurs per @ref[7.3.17].
"""

advanced = """
This @[sūtra] teaches optional @deva[लुक्] for @deva[निष्क] in @deva[द्विगु] compounds with @deva[द्वि] or @deva[त्रि]. The @deva[द्विगोः] condition of @ref[5.1.28] is read into this @[sūtra]. Derivations: @deva[द्वाभ्यां निष्काभ्यां क्रीतम्] → @deva[द्विनिष्कम्] (with @deva[लुक्]) or @deva[द्विनैष्किकम्] (without @deva[लुक्], @deva[वृद्धि] per @ref[7.3.17]); similarly @deva[त्रिनिष्कम्] ~ @deva[त्रिनैष्किकम्]. A @deva[वार्त्तिक] extends this to @deva[बहु]: @deva[बहुनिष्कम्] ~ @deva[बहुनैष्किकम्].
"""

id = "5.1.3"
numericId = "51003"

[en]
simple = """
The affix @deva[यत्] comes after @deva[कम्बल] when a name (measure) is meant. @deva[कम्बल] + @deva[यत्] → @deva[कम्बल्यम्] 'a @deva[कम्बल्य] measure of wool (100 palas)'.
"""

standard = """
The affix @deva[यत्] is added after @deva[कम्बल] in the @deva[प्राक्क्रितीय] senses when a proper name is denoted (@deva[संज्ञायाम्]). This supersedes @deva[छ]. Thus @deva[कम्बल] + @deva[यत्] = @deva[कम्बल्यम्], denoting a specific measure of wool equal to 100 @deva[पल]s, as in @deva[कम्बल्यमूर्णा पलशतम्]. When not a name, @deva[छ] applies: @deva[कम्बलीया ऊर्णा] 'wool fit for making a blanket'.
"""

advanced = """
This @[sūtra] restricts @deva[यत्] after @deva[कम्बल] to cases where the derivative is a @deva[संज्ञा] (proper name/technical term). The word @deva[कम्बल्यम्] functions as the name of a specific measure: @deva[कम्बल्यमूर्णा पलशतम्] 'a @deva[कम्बल्य] of wool equals 100 @deva[पल]s'. The condition @deva[संज्ञायाम्] blocks this @deva[यत्] when no name is intended, in which case @deva[छ] applies: @deva[कम्बलीया ऊर्णा] 'wool suitable for a blanket'. This illustrates how @deva[संज्ञा] conditions can restrict otherwise general affix rules.
"""

id = "5.1.99"
numericId = "51099"

[en]
simple = """
The affix @deva[ठञ्] comes after a word in the instrumental case meaning 'fitted for that'. @deva[कर्णवेष्टकाभ्यां संपादि मुखम्] → @deva[कार्णवेष्टकिकं मुखम्] 'a face fitted for earrings'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes after a word in the instrumental (@deva[तृतीया]) case with the sense of 'fitted for that' (@deva[तेन संपादि]). The word @deva[संपत्ति] means 'suitable, proper, fit'. The word @deva[संपादिन्] is formed by @deva[णिनि] with necessity sense per @ref[3.3.170]. Examples: @deva[कर्णवेष्टकाभ्यां संपादि मुखम्] = @deva[कार्णवेष्टकिकं मुखम्] 'a face fitted for earrings'; @deva[वास्त्रयुग्मिकं शरीरम्] 'a body suited for a pair of garments' (i.e., it looks especially good with such).
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[तृतीया] words with @deva[संपादि] ('fit for') sense. The term @deva[संपादिन्] is derived via @deva[णिनि] per @ref[3.3.170] (necessity). Examples: @deva[कार्णवेष्टकिकं मुखम्] 'face suited for earrings', @deva[वास्त्रयुग्मिकं शरीरम्] 'body that looks especially good with a pair of garments'.
"""

id = "5.1.104"
numericId = "51104"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[समय] 'time' in the nominative case meaning 'that has arrived for it'. @deva[समयः प्राप्तोऽस्य] → @deva[सामयिकं कर्म] 'a work for which the time has come'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the sense of 'that has arrived for it' (@deva[प्राप्त]) after @deva[समय] 'time, occasion' in the nominative (@deva[प्रथमा]) case. Example: @deva[समयः प्राप्तोऽस्य] = @deva[सामयिकं कर्म] 'a work for which the time has come'.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[समय] in @deva[प्रथमा] with @deva[प्राप्त] ('arrived') sense. Result: @deva[सामयिकम्] 'timely, for which the time has come'.
"""

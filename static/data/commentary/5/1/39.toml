id = "5.1.39"
numericId = "51039"

[en]
simple = """
The affix @deva[यत्] comes after @deva[गो] and after disyllabic words (except numerals, measures, and @deva[अश्वादि] words) in the sense of 'relationship or portent for its sake'. @deva[गव्यः], @deva[धन्यम्], @deva[स्वर्ग्यम्].
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) is used in the sense of 'relationship or portent for its sake' after @deva[गो] and after disyllabic words, excluding numerals, measures of capacity, and @deva[अश्वादि] words. This supersedes @deva[ठञ्]. Examples: @deva[गो निमित्तं संयोग उत्पातो वा] = @deva[गव्यः] 'connection or portent for a cow'; @deva[धन्यम्], @deva[स्वर्ग्यम्], @deva[यशस्यम्], @deva[आयुष्यम्]. When the base is a numeral, measure, or @deva[अश्वादि]: @deva[पञ्चानां निमित्तम्] = @deva[पञ्चकम्] (by @ref[5.1.22]); @deva[प्रास्थिकम्], @deva[खारीकम्] (by @ref[5.1.18]-19); @deva[आश्विकः]. @deva[वार्त्तिक]: @deva[ब्रह्मवर्चस] should be included: @deva[ब्रह्मवर्चस्यम्] 'relationship with a teacher for acquiring spiritual lustre'. The @deva[अश्वादि] class contains 8 words.
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[गो] and disyllabic words in the @ref[5.1.38] senses (@deva[संयोग]/@deva[उत्पात] @deva[निमित्त]]). Exclusions: @deva[संख्या] (numerals), @deva[परिमाण] (measures), @deva[अश्वादि] (8-word class: @deva[अश्व], @deva[अश्मन्], @deva[गण], @deva[ऊर्णा], @deva[उमा], @deva[गङ्गा], @deva[वर्षा], @deva[वसु]). Examples: @deva[गव्यः], @deva[धन्यम्], @deva[स्वर्ग्यम्], @deva[यशस्यम्], @deva[आयुष्यम्]. Excluded words take their respective affixes: @deva[पञ्चकम्] (by @ref[5.1.22]), @deva[प्रास्थिकम्] (by @ref[5.1.19]), @deva[आश्विकः] (by @ref[5.1.18]). A @deva[वार्त्तिक] adds @deva[ब्रह्मवर्चस]: @deva[ब्रह्मवर्चसस्य निमित्तं गुरुणा संयोगः] = @deva[ब्रह्मवर्चस्यम्] 'connection with a teacher for acquiring @deva[ब्रह्मवर्चस्]'.
"""

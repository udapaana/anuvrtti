id = "5.1.57"
numericId = "51057"

[en]
simple = """
The affixes (@ref[5.1.18] etc.) also mean 'this is its measure'. @deva[प्रस्थः परिमाणमस्य] → @deva[प्रास्थिको राशिः] 'a heap whose measure is a @deva[प्रस्थ]'.
"""

standard = """
The affixes taught from @ref[5.1.18] onward also have the sense 'this is its measure' (@deva[तदस्य परिमाणम्]). The word @deva[तद्] shows the nominative case. Examples: @deva[प्रस्थः परिमाणमस्य] = @deva[प्रास्थिको राशिः] 'a heap whose mass is a @deva[प्रस्थ]'; @deva[खारीकः], @deva[शत्यः], @deva[शतिकः], @deva[साहस्रः], @deva[द्रौणिकः], @deva[कौडविकः], @deva[वार्षशतिकः], @deva[वार्षसहस्रिकः]. Also @deva[षष्टिः जीवितपरिमाणमस्य] = @deva[षाष्ठिकः] 'one whose lifespan is sixty'; @deva[द्विसाप्ततिकः]. The repetition of @deva[तदस्य] (though @deva[अनुवृत्ति] from @ref[5.1.56] could supply it) indicates that affixes are newly ordained here, so the @deva[लुक्] of @ref[5.1.28] doesn't apply: @deva[द्वे षष्टी परिमाणमस्य] = @deva[द्विषाष्ठिकः] (not @deva[द्विषष्टिः]).
"""

advanced = """
This @[sūtra] teaches the @deva[परिमाण] sense: @deva[तदस्य परिमाणम्] 'this is its measure'. Examples: @deva[प्रास्थिको राशिः], @deva[खारीकः], @deva[द्रौणिकः], @deva[षाष्ठिकः], @deva[द्विसाप्ततिकः]. The repetition of @deva[तदस्य] (despite @deva[अनुवृत्ति] from @ref[5.1.56]) signals that the affixes are freshly ordained, blocking @deva[लुक्] of @ref[5.1.28]. Thus @deva[द्वे षष्टी परिमाणमस्य] = @deva[द्विषाष्ठिकः], not *@deva[द्विषष्टिः].
"""

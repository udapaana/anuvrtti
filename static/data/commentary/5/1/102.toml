id = "5.1.102"
numericId = "51102"

[en]
simple = """
The affix @deva[यत्] also comes after @deva[योग] 'union, fitness' meaning 'able to effect that'. @deva[योगाय प्रभवति] → @deva[योग्यः] or @deva[यौगिकः].
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) also comes in the sense of 'able to effect that' after @deva[योग] 'union, fitness, application'. Examples: @deva[योगाय प्रभवति] = @deva[योग्यः] (with @deva[यत्]) or @deva[यौगिकः] (with @deva[ठञ्]) 'fit, suitable, capable'.
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[योग] with the @deva[प्रभवति] sense. The option is with @deva[ठञ्]. Results: @deva[योग्यः] ~ @deva[यौगिकः] 'capable, suitable'.
"""

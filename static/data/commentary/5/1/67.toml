id = "5.1.67"
numericId = "51067"

[en]
simple = """
The affix @deva[यत्] comes in Vedic usage after any @deva[प्रातिपदिक] in the sense of 'deserving that'. @deva[उदक्या वृत्तयः] 'ceremonies deserving water'; @deva[यूप्यः पलाशः] '@deva[पलाश] deserving to be a sacrificial post'.
"""

standard = """
In the @deva[छन्दस्] (Vedas), the affix @deva[यत्] (adding @deva[य]) comes in the sense of 'deserving that' after any @deva[प्रातिपदिक] (nominal stem). This supersedes @deva[ठञ्] etc. Examples: @deva[उदक्या वृत्तयः] 'ceremonies deserving water'; @deva[यूप्यः पलाशः] '@deva[पलाश] tree deserving to be a @deva[यूप] (sacrificial post)'; @deva[गर्त्यो देशः] 'a place deserving a pit'. See @ref[6.1.213] for accent.
"""

advanced = """
This @[sūtra] teaches Vedic @deva[यत्] after any @deva[प्रातिपदिक] in the @deva[अर्हति] sense. The @deva[यत्] supersedes the classical affixes @deva[ठञ्] etc. Examples: @deva[उदक्या वृत्तयः], @deva[यूप्यः पलाशः], @deva[गर्त्यो देशः]. Accent per @ref[6.1.213].
"""

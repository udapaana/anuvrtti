id = "5.1.7"
numericId = "51007"

[en]
simple = """
The affix @deva[यत्] comes after @deva[खल], @deva[यव], @deva[माष], @deva[तिल], @deva[वृष], and @deva[ब्रह्मन्] with the meaning 'good for that'. Examples: @deva[खल्यम्] 'suitable for threshing floor', @deva[ब्रह्मण्यम्] 'suitable for Brahmans'.
"""

standard = """
The affix @deva[यत्] is added in the sense of 'good for that' after the words @deva[खल] 'threshing floor', @deva[यव] 'barley', @deva[माष] 'beans', @deva[तिल] 'sesame', @deva[वृष] 'bull', and @deva[ब्रह्मन्] 'brahman'. This supersedes @deva[छ]. Examples: @deva[खल्यम्], @deva[यव्यम्], @deva[माष्यम्], @deva[तिल्यम्], @deva[वृष्यम्], @deva[ब्रह्मण्यम्]. Note: @deva[वृष्णे हितम्] and @deva[ब्राह्मणेभ्यो हितम्] cannot form derivatives—the full phrases must be used, as these specific forms take neither @deva[छ] nor @deva[यत्]. The word @deva[च] indicates extension to other words, e.g., @deva[रथाय हिता] = @deva[रथ्या].
"""

advanced = """
This @[sūtra] specifies @deva[यत्] after six enumerated words: @deva[खल], @deva[यव], @deva[माष], @deva[तिल], @deva[वृष], @deva[ब्रह्मन्]. The derivatives are: @deva[खल्यम्], @deva[यव्यम्], @deva[माष्यम्], @deva[तिल्यम्], @deva[वृष्यम्], @deva[ब्रह्मण्यम्]. A significant restriction: despite @deva[वृष] being listed, @deva[वृष्णे हितम्] (using @deva[वृषन्]) cannot take an affix; similarly @deva[ब्राह्मणेभ्यो हितम्] (using @deva[ब्राह्मण]) cannot—full periphrasis is required. The @deva[च] in the @[sūtra] signals that the rule extends beyond the enumerated list, as in @deva[रथाय हिता] = @deva[रथ्या] 'road' (lit. 'suitable for chariots').
"""

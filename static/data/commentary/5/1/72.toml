id = "5.1.72"
numericId = "51072"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[पारायण], @deva[तुरायण], and @deva[चान्द्रायण] in the accusative case meaning 'who performs this'. @deva[पारायणिकः छात्रः] 'a student who reads under a teacher'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक], per @ref[5.1.18]) comes in the sense of 'who performs this' (@deva[तत्करोति]) after @deva[पारायण], @deva[तुरायण], and @deva[चान्द्रायण] in the accusative case. The force of @deva[अर्हति] 'deserving' ceases. Examples: @deva[पारायणिकः छात्रः] 'a student who reads/recites under a teacher'; @deva[तौरायणिको यजमानः] 'a sacrificer who performs @deva[तुरायण]'; @deva[चान्द्रायणिकः तपस्वी] 'an ascetic who observes @deva[चान्द्रायण]'. The word @deva[पारायण] means 'teacher' (@deva[परस्य करोति] 'one who acts for another').
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[पारायण], @deva[तुरायण], @deva[चान्द्रायण] in @deva[द्वितीया] with the @deva[तत्करोति] sense. The @deva[अर्हति] sense doesn't apply. Examples: @deva[पारायणिकः] 'one who recites/studies continuously', @deva[तौरायणिकः] 'performer of @deva[तुरायण] rite', @deva[चान्द्रायणिकः] 'observer of lunar-phase fasting'. The word @deva[पारायण] is derived as @deva[परस्य करोति] 'acting for another'.
"""

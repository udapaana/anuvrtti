id = "5.1.17"
numericId = "51017"

[en]
simple = """
The affix @deva[ढञ्] comes after @deva[परिखा] 'moat' in the senses of 'sufficient for' and 'sufficient therein'. @deva[परिखा] + @deva[ढञ्] → @deva[पारिखेयी भूमिः] 'land sufficient to make a moat'.
"""

standard = """
The affix @deva[ढञ्] (adding @deva[एय]) is used after @deva[परिखा] 'moat, ditch' in the senses of 'sufficient for that' and 'sufficient therein'. This supersedes @deva[छ]. Example: @deva[पारिखेयी भूमिः] 'land sufficient to construct a moat'. This @[sūtra] marks the end of the governing force of @deva[छ] and @deva[यत्]; hereafter different affixes are taught.
"""

advanced = """
This @[sūtra] teaches @deva[ढञ्] after @deva[परिखा] in the @ref[5.1.16] senses (sufficiency). The @deva[ढञ्] supersedes @deva[छ]. Example: @deva[पारिखेयी भूमिः] 'land adequate for constructing a moat'. Importantly, this @[sūtra] concludes the @deva[अधिकार] of @deva[छ] and @deva[यत्] that began at @ref[5.1.1]. From @ref[5.1.18] onward, @deva[ठञ्] becomes the governing affix.
"""

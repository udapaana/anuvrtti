id = "5.1.127"
numericId = "51127"

[en]
simple = """
The affix @deva[ढक्] comes after @deva[कपि] 'monkey' and @deva[ज्ञाति] 'kinsman' to express 'nature/action'. @deva[कपि] → @deva[कापेयम्]; @deva[ज्ञाति] → @deva[ज्ञातेयम्].
"""

standard = """
After @deva[कपि] and @deva[ज्ञाति], the affix @deva[ढक्] (realized as @deva[एय]) denotes @deva[भाव/कर्म]. The @deva[यथासंख्य] principle (@ref[1.3.10]) does not apply here, so both bases take @deva[ढक्] (not one @deva[कपि] and another @deva[ज्ञाति]). Examples: @deva[कपेर्भावः कर्म वा] → @deva[कापेयम्] 'monkey-nature/behavior'; @deva[ज्ञातेर्भावः कर्म वा] → @deva[ज्ञातेयम्] 'kinship/kinsman's duty'.
"""

advanced = """
The @deva[ढक्]-affix (= @deva[एय] after @deva[इत्संज्ञालोप]) applies to the dual-item domain {@deva[कपि], @deva[ज्ञाति]}. The explicit note regarding @deva[यथासंख्य]-inapplicability clarifies that both items share the same affix, not a one-to-one pairing. The @deva[वृद्धि] of initial vowel (@deva[कपि] → @deva[कापेय]) follows standard @deva[तद्धित]-phonology. The semantic range covers both @deva[भाव] (abstract state) and @deva[कर्म] (characteristic behavior).
"""

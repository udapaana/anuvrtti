id = "5.1.38"
numericId = "51038"

[en]
simple = """
The affixes also mean 'for its sake' when indicating a relationship or a portent. @deva[शतस्य निमित्तं संयोगः] → @deva[शत्यः] 'a relationship for the sake of a hundred'.
"""

standard = """
The above affixes also have the sense 'for its sake' (@deva[तस्य निमित्तम्]) when the meaning is a relationship (@deva[संयोग]) or a portent (@deva[उत्पात]). The word @deva[तस्य] shows the genitive case in construction. Examples: @deva[शतस्य निमित्तं धनपतिना संयोगः] = @deva[शत्यः] 'a relationship with a rich man for the sake of getting a hundred'; @deva[शतिकः], @deva[साहस्रः]. Also @deva[शतस्य निमित्तम् उत्पातो दक्षिणाक्षिस्पन्दनम्] = @deva[शत्यम्], @deva[शतिकम्], @deva[साहस्रम्] 'the twitching of the right eye as a portent of acquiring or losing a hundred/thousand'. @deva[वार्त्तिक]s: The affixes also come after @deva[वात], @deva[पित्त], @deva[श्लेष्मन्] (the three humors) in senses of allaying or vitiating: @deva[वातिकम्], @deva[पैत्तिकम्], @deva[श्लैष्मिकम्]; also after @deva[सन्निपात]: @deva[सान्निपातिकम्].
"""

advanced = """
This @[sūtra] extends the affix senses to @deva[तस्य निमित्तम्] (genitive construction) when denoting @deva[संयोग] 'relationship' or @deva[उत्पात] 'portent'. Examples: @deva[शतस्य निमित्तं धनपतिना संयोगः] = @deva[शत्यः] 'relationship for acquiring a hundred'; @deva[शतस्य निमित्तम् उत्पातो दक्षिणाक्षिस्पन्दनम्] = @deva[शत्यम्] 'portent regarding a hundred'. Two @deva[वार्त्तिक]s: (1) affixes come after the @deva[त्रिदोष] terms @deva[वात], @deva[पित्त], @deva[श्लेष्मन्] for diseases of allaying (@deva[शमन]) or aggravation (@deva[प्रकोप]): @deva[वातिकम्] 'relating to wind-humor', @deva[पैत्तिकम्] 'bilious', @deva[श्लैष्मिकम्] 'phlegmatic'; (2) after @deva[सन्निपात] 'combination of all three humors': @deva[सान्निपातिकम्].
"""

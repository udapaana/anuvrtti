id = "5.1.35"
numericId = "51035"

[en]
simple = """
The affix @deva[यत्] optionally comes after @deva[शाण] when preceded by @deva[अध्यर्ध] or a numeral in a @deva[द्विगु] compound. @deva[अध्यर्धशाण्यम्] or @deva[अध्यर्धशाणम्].
"""

standard = """
The affix @deva[यत्] comes optionally in the @deva[आर्हीय] senses (@ref[5.1.63]) after @deva[शाण] when preceded by @deva[अध्यर्ध] or a numeral that occasions a @deva[द्विगु] compound. This @deva[यत्] supersedes @deva[ठञ्], which in the alternative is deleted by @ref[5.1.28]. Examples: @deva[अध्यर्धशाण्यम्] or @deva[अध्यर्धशाणम्]; @deva[द्विशाण्यम्] or @deva[द्विशाणम्]; @deva[त्रिशाण्यम्] or @deva[त्रिशाणम्]. @deva[वार्त्तिक]: @deva[यत्] is also optional after @deva[शत]: @deva[अध्यर्धशत्यम्] or @deva[अध्यर्धशतम्], etc.
"""

advanced = """
This @[sūtra] teaches optional @deva[यत्] after @deva[शाण] in @deva[द्विगु] compounds with @deva[अध्यर्ध] or numerals. The @deva[यत्] supersedes @deva[ठञ्]; when @deva[ठञ्] applies instead, it is deleted by @ref[5.1.28]. Results: @deva[अध्यर्धशाण्यम्] (with @deva[यत्]) ~ @deva[अध्यर्धशाणम्] (with @deva[लुक्] of @deva[ठञ्]); similarly @deva[द्विशाण्यम्] ~ @deva[द्विशाणम्], @deva[त्रिशाण्यम्] ~ @deva[त्रिशाणम्]. A @deva[वार्त्तिक] extends the option to @deva[शत]: @deva[अध्यर्धशत्यम्] ~ @deva[अध्यर्धशतम्], @deva[द्विशत्यम्] ~ @deva[द्विशतम्], @deva[त्रिशत्यम्] ~ @deva[त्रिशतम्].
"""

id = "5.1.120"
numericId = "51120"

[en]
simple = """
From this @[sūtra] through @ref[5.1.136], the affixes @deva[त्व] and @deva[तल्] govern. They also express @deva[कर्म] 'action' in @ref[5.1.124].
"""

standard = """
This is a heading @[sūtra] establishing that the affixes @deva[त्व] and @deva[तल्] govern from here through @ref[5.1.136]. Thus in @ref[5.1.122], @deva[त्व] and @deva[तल्] are understood, giving forms like @deva[पृथुत्वम्] and @deva[पृथुता]. This rule ensures these affixes apply despite subsequent @[sūtras] ordaining other affixes. These affixes signify @deva[कर्म] (action) in addition to @deva[भाव] (nature) in @ref[5.1.124]. The @deva[च] in the @[sūtra] ensures their admission despite affixes @deva[नञ्] and @deva[ञ्य] of @ref[6.1.87]. Examples: @deva[स्त्रियाः भावः] = @deva[स्त्रैणम्] (by @deva[ञ्य]), @deva[स्त्रीत्वम्], @deva[स्त्रीता]; @deva[पुंस्त्वम्], @deva[पुंस्ता], @deva[पौंस्नम्].
"""

advanced = """
This @deva[अधिकार] @[sūtra] establishes @deva[त्व] and @deva[तल्] as governing affixes through @ref[5.1.136]. The affixes apply despite competing rules; @deva[च] ensures coexistence with @deva[नञ्]/@deva[ञ्य]] of @ref[6.1.87]. In @ref[5.1.124], they also express @deva[कर्म] (action), not just @deva[भाव]. Examples: @deva[स्त्रैणम्] ~ @deva[स्त्रीत्वम्] ~ @deva[स्त्रीता]; @deva[पौंस्नम्] ~ @deva[पुंस्त्वम्] ~ @deva[पुंस्ता].
"""

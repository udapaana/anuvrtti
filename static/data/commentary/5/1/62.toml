id = "5.1.62"
numericId = "51062"

[en]
simple = """
The affix @deva[अञ्] comes after @deva[त्रिंशत्] 'thirty' and @deva[चत्वारिंशत्] 'forty' in the sense of 'this is its measure' when the word is a name for a @[brāhmaṇa] book. @deva[त्रैंशानि ब्राह्मणानि] 'the @[brāhmaṇa] of thirty chapters'.
"""

standard = """
The affix @deva[अञ्] (adding @deva[अ]) comes in the sense of 'this is its measure' after @deva[त्रिंशत्] 'thirty' and @deva[चत्वारिंशत्] 'forty' when the derivative is a name (@deva[संज्ञा]) denoting a @[brāhmaṇa] book. The word @deva[वर्ग] does not govern this @[sūtra]. The indicatory @deva[ड्] causes elision of the final vowel and following consonant per @ref[6.4.143]. The locative @deva[ब्राह्मणे] means 'when the word denotes a @[brāhmaṇa] itself' (@deva[अभिधेय]), not 'in @[brāhmaṇa] literature' (@deva[विषय]). Examples: @deva[त्रिंशद् अध्यायाः परिमाणम् एषां ब्राह्मणानाम्] = @deva[त्रैंशानि ब्राह्मणानि] 'the @[brāhmaṇa] containing thirty chapters'; @deva[चात्वारिंशानि ब्राह्मणानि] 'the @[brāhmaṇa] of forty chapters'.
"""

advanced = """
This @[sūtra] teaches @deva[अञ्] after @deva[त्रिंशत्] and @deva[चत्वारिंशत्] in the @deva[परिमाण] sense when the derivative names a @[brāhmaṇa] text. The @deva[अनुवृत्ति] of @deva[वर्ग] doesn't apply. The @deva[ड्] (@deva[इत्]) of @deva[अञ्] triggers @deva[टि]-elision per @ref[6.4.143]. The @deva[सप्तमी] in @deva[ब्राह्मणे] has @deva[अभिधेय] force (denoting the @[brāhmaṇa] itself), not @deva[विषय] (in the domain of). Examples: @deva[त्रैंशानि ब्राह्मणानि], @deva[चात्वारिंशानि ब्राह्मणानि]—names of specific @[brāhmaṇa] texts.
"""

id = "5.1.108"
numericId = "51108"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[काल] 'time' in the nominative case meaning 'long-standing'. @deva[प्रकृष्टः कालोऽस्य] → @deva[कालिकम् ऋणम्] 'long-standing debt'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the sense of 'long-standing' (@deva[प्रकृष्ट]) after @deva[काल] 'time' in the nominative (@deva[प्रथमा]) case. Examples: @deva[प्रकृष्टः कालोऽस्य] = @deva[कालिकम् ऋणम्] 'long-standing debt'; @deva[कालिकं वैरम्] 'long-standing enmity'. In this @[sūtra], @deva[काल] and @deva[तदस्य] are understood, but not @deva[प्राप्तम्].
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[काल] in @deva[प्रथमा] with @deva[प्रकृष्ट] ('long-standing') sense. The @deva[अनुवृत्ति] includes @deva[काल] and @deva[तदस्य], but @deva[प्राप्तम्] from previous @[sūtras] doesn't continue. Results: @deva[कालिकम् ऋणम्], @deva[कालिकं वैरम्].
"""

id = "5.1.124"
numericId = "51124"

[en]
simple = """
The affix @deva[ष्यञ्] comes after words expressing quality and the @deva[ब्राह्मणादि] class to express 'nature or action'. @deva[जड] 'dull' → @deva[जाड्यम्] 'dullness/stupidity'. @deva[ब्राह्मण] → @deva[ब्राह्मण्यम्] 'brahmanhood/priestly conduct'.
"""

standard = """
This @[sūtra] extends @deva[ष्यञ्] to quality-words (@deva[गुणवाचिन्]) and the @deva[ब्राह्मणादि] class. The word @deva[च] 'and' in the @[sūtra] includes @deva[भाव] 'nature' alongside @deva[कर्म] 'action/occupation'. Both @deva[भाव] and @deva[कर्म] continue as governing senses through the end of this chapter. Examples: @deva[जडस्य भावः कर्म वा] → @deva[जाड्यम्]; @deva[ब्राह्मणस्य भावः कर्म वा] → @deva[ब्राह्मण्यम्]; @deva[माणवकस्य] → @deva[माणव्यम्].
"""

advanced = """
The @deva[गुणवाचिन्] domain plus @deva[ब्राह्मणादि] @deva[गण] trigger @deva[ष्यञ्] for both @deva[भाव] (abstract nature) and @deva[कर्म] (characteristic activity/occupation). The @deva[अधिकार] of @deva[भाव] and @deva[कर्म] extends to @deva[अध्यायसमाप्ति] (chapter-end). This dual semantic scope distinguishes the @deva[ष्यञ्]-derivatives: @deva[ब्राह्मण्यम्] can mean 'the state of being a @deva[ब्राह्मण]' (@deva[भाव]) or 'the duties/conduct of a @deva[ब्राह्मण]' (@deva[कर्म]).
"""

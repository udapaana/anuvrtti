id = "5.1.25"
numericId = "51025"

[en]
simple = """
The affix @deva[टिठन्] comes after @deva[कंस] 'cup/measure'. The feminine is formed with @deva[ङीप्]. @deva[कंस] + @deva[टिठन्] → @deva[कंसिकः], fem. @deva[कंसिकी].
"""

standard = """
The affix @deva[टिठन्] (adding @deva[इक]) is used in the senses up to @ref[5.1.63] after @deva[कंस] 'cup, measure'. This supersedes @deva[ठञ्]. The @deva[टि] of @deva[टिठन्] indicates that the feminine is formed with @deva[ङीप्] per @ref[4.1.15]. Example: @deva[कंसिकः], fem. @deva[कंसिकी]. @deva[वार्त्तिक]s: @deva[टिठन्] also comes after @deva[अर्ध] (@deva[अर्धिकः], @deva[अर्धिकी]) and @deva[कार्षापण] (@deva[कार्षापणिकः], @deva[कार्षापणिकी]); @deva[प्रति] may substitute for @deva[कार्षापण] before this affix (@deva[प्रतिकः], @deva[प्रतिकी]).
"""

advanced = """
This @[sūtra] teaches @deva[टिठन्] after @deva[कंस]. The @deva[अनुबन्ध]s: @deva[टि] triggers @deva[ङीप्] for feminine (@ref[4.1.15]); @deva[इ] is for pronunciation; @deva[न्] governs accent (@ref[6.1.197]). Result: @deva[कंसिकः], fem. @deva[कंसिकी]. Three @deva[वार्त्तिक]s extend the rule: (1) after @deva[अर्ध] → @deva[अर्धिकः], @deva[अर्धिकी]; (2) after @deva[कार्षापण] → @deva[कार्षापणिकः], @deva[कार्षापणिकी]; (3) @deva[प्रति] optionally substitutes for @deva[कार्षापण] → @deva[प्रतिकः], @deva[प्रतिकी].
"""

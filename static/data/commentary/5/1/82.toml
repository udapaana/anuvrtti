id = "5.1.82"
numericId = "51082"

[en]
simple = """
The affix @deva[यप्] comes after @deva[मास] in a @deva[द्विगु] compound when meaning age. @deva[द्वौ मासौ भूतः] → @deva[द्विमास्यः] 'two months old'.
"""

standard = """
The affix @deva[यप्] (adding @deva[य]) comes after @deva[मास] 'month' when forming a @deva[द्विगु] compound (numeral determinative) and denoting age. Examples: @deva[द्वौ मासौ भूतः] = @deva[द्विमास्यः] 'two months old'; @deva[त्रिमास्यः] 'three months old'.
"""

advanced = """
This @[sūtra] teaches @deva[यप्] after @deva[मास] in @deva[द्विगु] compounds with the @deva[वयस्] sense. Results: @deva[द्विमास्यः], @deva[त्रिमास्यः], etc.
"""

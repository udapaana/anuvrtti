id = "5.1.69"
numericId = "51069"

[en]
simple = """
The affixes @deva[छ] and @deva[यत्] come after @deva[कडङ्गर] 'straw' and @deva[दक्षिणा] 'ritual fee' in the sense of 'deserving that'. @deva[कडङ्गरीयः] or @deva[कडङ्कर्यः]; @deva[दक्षिणीयः] or @deva[दक्षिण्यः].
"""

standard = """
The affixes @deva[छ] (adding @deva[ईय]) and @deva[यत्] (adding @deva[य]) come in the sense of 'deserving that' after @deva[कडङ्गर] 'chaff, straw' and @deva[दक्षिणा] 'ritual fee, alms'. These supersede @deva[ठक्]. Examples: @deva[कडङ्गरमर्हति] = @deva[कडङ्गरीयः] (with @deva[छ]) or @deva[कडङ्कर्यः] (with @deva[यत्]) 'one deserving straw' (e.g., a cow); @deva[दक्षिणीयः] or @deva[दक्षिण्यो ब्राह्मणः] 'a @[brāhmaṇa] deserving alms'.
"""

advanced = """
This @[sūtra] teaches @deva[छ] and @deva[यत्] after @deva[कडङ्गर] and @deva[दक्षिणा] in the @deva[अर्हति] sense. These supersede @deva[ठक्]. Results: @deva[कडङ्गरीयः] ~ @deva[कडङ्कर्यः]; @deva[दक्षिणीयः] ~ @deva[दक्षिण्यः].
"""

id = "5.1.97"
numericId = "51097"

[en]
simple = """
The affix @deva[अण्] comes after @deva[व्युष्टादि] words in the locative case meaning 'given therein' or 'done therein'. @deva[व्युष्टे दीयते कार्यं वा] → @deva[वैयुष्टम्].
"""

standard = """
The affix @deva[अण्] (adding @deva[अ]) comes after @deva[व्युष्टादि] words in the locative (@deva[सप्तमी]) case with the sense of 'given therein' (@deva[तत्र दीयते]) or 'done therein' (@deva[तत्र कार्यम्]). Examples: @deva[व्युष्टे दीयते कार्यं वा] = @deva[वैयुष्टम्]; @deva[नैत्यम्]. @deva[वार्त्तिक]: @deva[अण्] also after @deva[अग्निपद] etc.: @deva[आग्निपदम्], @deva[पैलमूलम्] (these may be included in @deva[व्युष्टादि]). The @deva[व्युष्टादि] class contains 15 words: @deva[व्युष्ट], @deva[नित्य], @deva[निष्क्रमण], @deva[प्रवेशन], @deva[उपसंक्रमण], @deva[तीर्थ], @deva[आस्तरण], @deva[संग्राम], @deva[संघात], @deva[अग्निपद], @deva[पीलुमूल], @deva[प्रवास], @deva[उपवास], @deva[संभ्रम], @deva[दीर्घ].
"""

advanced = """
This @[sūtra] teaches @deva[अण्] after @deva[व्युष्टादि] words in @deva[सप्तमी] with @deva[दीयते]/@deva[कार्यम्]] senses. The @[gaṇa] has 15 words. Examples: @deva[वैयुष्टम्], @deva[नैत्यम्]. A @deva[वार्त्तिक] adds @deva[अग्निपदादि] (@deva[आग्निपदम्], @deva[पैलमूलम्]), which could be subsumed in @deva[व्युष्टादि].
"""

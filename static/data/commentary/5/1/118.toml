id = "5.1.118"
numericId = "51118"

[en]
simple = """
In Vedic usage, the affix @deva[वति] is added to an @deva[उपसर्ग] 'prefix' with the sense of a verbal root. @deva[उद्वतः] = @deva[उद्गतान्] 'those that have gone up'; @deva[निवतः] = @deva[निगतान्] 'those that have gone down'.
"""

standard = """
In the @deva[छन्दस्] (Vedas), the affix @deva[वति] (adding @deva[वत्]) is added to an @deva[उपसर्ग] (preposition/prefix) with the sense of a verbal root (@deva[धात्वर्थ]). Examples: @deva[उद्वतः] and @deva[निवतः] in the @[ṛgvedic] verse (X.142.4): @deva[यदुद्वतो निवतो यासि वप्सत् पृथगेषि प्रगर्धिनीव सेना] 'When you, O Fire, go burning high (@deva[उद्वतः] = @deva[उद्गतान्] 'those that have gone up') and low (@deva[निवतः] = @deva[निगतान्] 'those that have gone down') trees...'
"""

advanced = """
This @[sūtra] teaches Vedic @deva[वति] after @deva[उपसर्ग] with @deva[धात्वर्थ] (verbal root meaning). The @[ṛgvedic] citation (X.142.4) shows @deva[उद्वतः] = @deva[उद्गतान्] and @deva[निवतः] = @deva[निगतान्], where the prefixes @deva[उद्] and @deva[नि] carry the sense of √@deva[गम्] 'go'.
"""

id = "5.1.60"
numericId = "51060"

[en]
simple = """
The words @deva[पञ्चत्] and @deva[दशत्] may be anomalously formed in combination with @deva[वर्ग] in the sense of 'this is its measure'. @deva[पञ्चद्वर्गः] or @deva[पञ्चकोवर्गः] 'a group of five'.
"""

standard = """
The words @deva[पञ्चत्] and @deva[दशत्] may be anomalously formed in combination with @deva[वर्ग] 'class, group' in the sense of 'this is its measure'. This ordains @deva[डति] instead of @deva[कन्] (@ref[5.1.22]), which also comes in the alternative. Examples: @deva[पञ्चद्वर्गः] or @deva[पञ्चकोवर्गः] 'a group whose measure is five'; @deva[दशद्वर्गः] or @deva[दशकोवर्गः] 'a group of ten'.
"""

advanced = """
This @[sūtra] teaches optional @deva[डति] for @deva[पञ्च] and @deva[दश] before @deva[वर्ग] in the @deva[परिमाण] sense, yielding @deva[पञ्चत्] and @deva[दशत्]. The alternative @deva[कन्] (@ref[5.1.22]) is also possible. Results: @deva[पञ्चद्वर्गः] (with @deva[डति]) ~ @deva[पञ्चकोवर्गः] (with @deva[कन्]); @deva[दशद्वर्गः] ~ @deva[दशकोवर्गः]. The @deva[त्] of @deva[पञ्चत्]/@deva[दशत्]] is from @deva[डति].
"""

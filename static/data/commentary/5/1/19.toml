id = "5.1.19"
numericId = "51019"

[en]
simple = """
From here through @ref[5.1.63], the affix @deva[ठक्] applies after numerals and measures. @deva[निष्क] + @deva[ठक्] → @deva[नैष्किकम्] 'purchased for a @deva[निष्क]'.
"""

standard = """
The affix @deva[ठक्] (adding @deva[इक]) applies through @ref[5.1.63] (inclusive, due to the prefix @deva[आ] in @deva[आर्हात्]). This @deva[ठक्] supersedes @deva[ठञ्]. The sense is 'purchased with' (@ref[5.1.37]) etc. Examples: @deva[निष्कया क्रीतम्] = @deva[नैष्किकम्]; @deva[पाणिकम्]. After words denoting numbers or measures, the accent differs: @deva[षाष्टिकम्], @deva[प्रास्थिकम्], @deva[कौडविकम्]. Technical note: @deva[परिमाण] here means measure of capacity/volume (cubic/square measure), distinct from @deva[प्रमाण] (lineal measure), @deva[उन्मान] (weight measure), and @deva[संख्या] (number).
"""

advanced = """
This @deva[अधिकार] teaches @deva[ठक्] from here through @ref[5.1.63]. The term @deva[आर्हात्] (@deva[आ] + @deva[अर्हात्]) is inclusive, so @ref[5.1.63] (@deva[तदर्हति]) also takes @deva[ठक्]. The @deva[ठक्] supersedes @deva[ठञ्]; the difference is accentual. Examples: @deva[नैष्किकम्], @deva[पाणिकम्]. With number/measure words, accent falls on initial: @deva[षाष्टिकम्], @deva[प्रास्थिकम्]. A @deva[कारिका] clarifies the technical terms: @deva[ऊर्ध्वमानं किलोन्मानं परिमाणं तु सर्वतः । आयामस्तु प्रमाणं स्यात् संख्या बाह्या तु सर्वतः ॥] Thus @deva[उन्मान] = weight (e.g., @deva[पल]), @deva[परिमाण] = volume/capacity (e.g., @deva[प्रस्थ]), @deva[प्रमाण] = lineal measure (e.g., @deva[वितस्ति]), and @deva[संख्या] is beyond these three.
"""

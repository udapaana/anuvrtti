id = "5.1.44"
numericId = "51044"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[लोक] and @deva[सर्वलोक] (in the locative) in the sense of 'known therein'. @deva[लोके विदितः] → @deva[लौकिकः] 'known in the world'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the sense of 'known therein' after the words @deva[लोक] 'world' and @deva[सर्वलोक] 'the whole world', when in the locative (@deva[सप्तमी]) case in construction. Examples: @deva[लोके विदितः] = @deva[लौकिकः] 'known in the world, worldly'; @deva[सार्वलौकिकः] 'known throughout all worlds'. Irregular @deva[वृद्धि] of both compound members occurs per @ref[7.3.20].
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[लोक] and @deva[सर्वलोक] in @deva[सप्तमी] construction with the @deva[विदित] sense. Examples: @deva[लोके विदितः] = @deva[लौकिकः] 'worldly, common'; @deva[सर्वलोके विदितः] = @deva[सार्वलौकिकः] 'universally known'. For @deva[सार्वलौकिकः], irregular @deva[वृद्धि] of both compound members occurs per @ref[7.3.20] (@deva[सर्व] → @deva[सार्व], @deva[लोक] → @deva[लौक]).
"""

id = "5.1.12"
numericId = "51012"

[en]
simple = """
An affix comes after a word denoting a product to express that the primitive (raw material) is serviceable for that product. @deva[अङ्गारेभ्यो हितानि काष्ठानि] → @deva[अङ्गारीयाणि काष्ठानि] 'wood fit for making charcoal'.
"""

standard = """
This @[sūtra] establishes the second major sense of @deva[प्राक्क्रितीय] affixes: @deva[प्रकृतौ विकृतेः तदर्थम्]—the primitive (material cause) being serviceable for a specific product. The word @deva[तदर्थ] indicates that the primitive must be specifically serviceable for that particular product. Examples: @deva[अङ्गारीयाणि काष्ठानि] 'wood suitable for charcoal'; @deva[प्राकारीया इष्टकाः] 'bricks suitable for a wall'; @deva[शङ्कव्यं दारु] 'wood suitable for a stake'. Restrictions: (1) @deva[तदर्थम्]—if the primitive serves multiple products, no affix (e.g., @deva[यवानां धानाः] but @deva[सक्तु] comes from many sources); (2) @deva[विकृतेः]—the base must denote a product (not @deva[उदकार्थः कूपः], as water is not a product of the well); (3) @deva[प्रकृतौ]—the derivative must denote a primitive (not @deva[असिर्था कोशी] 'sheath for a sword', as sheath is not the primitive of sword).
"""

advanced = """
This @[sūtra] defines the @deva[प्रकृति-विकृति] sense: the affix comes after a @deva[विकृति] (product) name to denote the @deva[प्रकृति] (primitive/material) that is @deva[तदर्थ] (exclusively serviceable for that product). The word @deva[तदर्थ] signals two requirements: (1) the primitive must be dedicated to that specific product, not general-purpose; (2) the base appears in @deva[चतुर्थी] (dative). The default affix is @deva[छ] (@ref[5.1.1]): @deva[अङ्गारीयाणि काष्ठानि], @deva[प्राकारीया इष्टकाः]. The @deva[यत्] of @ref[5.1.2] applies to @deva[उ]-finals: @deva[शङ्कव्यं दारु], @deva[पिचव्यः कार्पासः]. Three blocking conditions: (1) @deva[तदर्थम्]—no affix if the primitive has multiple products (@deva[धानानां सक्तवः] fails because @deva[सक्तु] also comes from @deva[लाजा] etc.); (2) @deva[विकृतेः]—the base must name a product, not a container (@deva[उदकार्थः कूपः] fails since water is not a @deva[विकार] of the well); (3) @deva[प्रकृतौ]—the derivative must denote a @deva[प्रकृति] (@deva[असिर्था कोशी] fails since sheath is not the material cause of sword). The terms @deva[प्रकृति] and @deva[विकृति] imply that the primitive undergoes transformation (@deva[विकार]).
"""

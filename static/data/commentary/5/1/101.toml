id = "5.1.101"
numericId = "51101"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[संतापादि] words in the dative case meaning 'able to effect that'. @deva[संतापाय प्रभवति] → @deva[सांतापिकः] 'able to cause burning'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes after @deva[संतापादि] words in the dative (@deva[चतुर्थी]) case with the sense of 'able to effect that' (@deva[तस्मै प्रभवति]). The word @deva[प्रभवति] means 'is able, capable'. The dative here has the force of @deva[अलम्] per @ref[2.3.16]. Examples: @deva[संतापाय प्रभवति] = @deva[सांतापिकः] 'able to cause affliction'; @deva[सान्नाहिकः] 'capable of arming'. The @deva[संतापादि] class contains 21 words: @deva[संताप], @deva[संनाह], @deva[संग्राम], @deva[संयोग], @deva[संपराय], @deva[संवेशन], @deva[संपेष], @deva[निष्पेष], @deva[सर्ग], @deva[निसर्ग], @deva[विसर्ग], @deva[उपसर्ग], @deva[प्रवास], @deva[उपवास], @deva[संघात], @deva[संवेष], @deva[संवास], @deva[संमोदन], @deva[सक्तु], @deva[मांसौदनाद्विगृहीतादपि], @deva[असर्ग].
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[संतापादि] words in @deva[चतुर्थी] with @deva[प्रभवति] ('is capable') sense. The @deva[चतुर्थी] has @deva[अलम्]-force per @ref[2.3.16]. The @[gaṇa] has 21 words. Examples: @deva[सांतापिकः], @deva[सान्नाहिकः].
"""

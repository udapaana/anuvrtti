id = "5.1.28"
numericId = "51028"

[en]
simple = """
The affix is deleted by @deva[लुक्] after stems beginning with @deva[अध्यर्ध] 'one and a half' and after @deva[द्विगु] compounds, when not in a name. @deva[द्वाभ्यां शूर्पाभ्यां क्रीतम्] → @deva[द्विशूर्पम्].
"""

standard = """
The affix with senses up to @ref[5.1.63] is deleted by @deva[लुक्] after a stem beginning with @deva[अध्यर्ध] and after a @deva[द्विगु] compound, when not denoting a name (@deva[असंज्ञायाम्]). Examples: @deva[अध्यर्धकंसम्], @deva[द्विकंसम्], @deva[अध्यर्धशूर्पम्], @deva[द्विशूर्पम्], @deva[त्रिकंसम्], @deva[त्रिशूर्पम्]—here affixes @deva[टिठन्] and @deva[अञ्] are deleted. However, in tertiary derivatives (when @deva[द्विगु] compounding doesn't occur with the @deva[तद्धित]), the affix is not deleted: @deva[द्विशूर्पेण क्रीतम्] = @deva[द्विशौर्पिकम्]. The rule: @deva[द्विगोर्लुकि तन्निमित्तग्रहणम्] 'the @deva[लुक्] of @deva[द्विगु] applies only when that @deva[तद्धित] occasions the compounding'. When a name: @deva[पाञ्चलोहितिकम्], @deva[पाञ्चकलायिकम्].
"""

advanced = """
This @[sūtra] teaches @deva[लुक्] (deletion) of @deva[आर्हीय] affixes after @deva[अध्यर्ध]-initial stems and @deva[द्विगु] compounds, provided the context is not @deva[संज्ञा]. Examples: @deva[अध्यर्धकंसम्], @deva[द्विशूर्पम्], @deva[त्रिकंसम्]. The @deva[लुक्] occurs only when the @deva[तद्धित] affix occasions the @deva[द्विगु] compounding (per @ref[2.1.51]). For tertiary derivatives: @deva[द्विशूर्पेण क्रीतम्] = @deva[द्विशौर्पिकम्] (no @deva[लुक्], since no fresh @deva[द्विगु] formation). Maxim: @deva[द्विगोर्लुकि तन्निमित्तग्रहणम्]. In @deva[संज्ञा] contexts, no @deva[लुक्]: @deva[पाञ्चलोहितिकम्], @deva[पाञ्चकलायिकम्] (names of measures). The word @deva[अध्यर्ध] is mentioned separately (though it's a @deva[संख्या] and would form @deva[द्विगु]) as a @deva[ज्ञापक] that @deva[अध्यर्ध] is not always treated as @deva[संख्या]—specifically, it doesn't trigger @deva[कृत्वसुच्] (@ref[5.4.17]).
"""

id = "5.1.76"
numericId = "51076"

[en]
simple = """
The affix @deva[ण] comes after @deva[पन्थ] (substitute for @deva[पथिन्]) meaning 'who always goes'. @deva[पन्थानं नित्यं गच्छति] → @deva[पान्थः] 'a traveler, wanderer'.
"""

standard = """
The affix @deva[ण] (adding @deva[अ] with @deva[वृद्धि]) comes after @deva[पन्थ] (which substitutes for @deva[पथिन्]) with the sense of 'who always goes' (@deva[नित्यं गच्छति]). The word @deva[नित्य] qualifies the affix sense. Example: @deva[पन्थानं नित्यं गच्छति] = @deva[पान्थः] 'a perpetual traveler', as in @deva[पान्थो भिक्षां याचते] 'the wanderer begs for alms'. Without @deva[नित्य]: @deva[पथिकः] (by @ref[5.1.75]).
"""

advanced = """
This @[sūtra] teaches @deva[ण] after @deva[पन्थ] (substitute for @deva[पथिन्]) with the @deva[नित्यं गच्छति] sense. The @deva[नित्य] condition distinguishes this from @ref[5.1.75] (@deva[पथिकः]). Result: @deva[पान्थः] 'one who habitually travels'.
"""

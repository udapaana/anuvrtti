id = "5.1.56"
numericId = "51056"

[en]
simple = """
The affixes (@ref[5.1.18] etc.) also mean 'this is his share, price, or pay'. @deva[पञ्च अंशः अस्य] → @deva[पञ्चकः] 'one whose share/price/pay is five'.
"""

standard = """
The affixes taught from @ref[5.1.18] onward also have the sense 'this is his share (@deva[अंश]), price (@deva[वस्न]), or wages (@deva[भृति])'. The word @deva[सः] indicates the nominative case in construction. @deva[अंश] = share/portion; @deva[वस्न] = price; @deva[भृति] = wages. Example: @deva[पञ्च अंशो वस्नो वा भृतिर्वास्य] = @deva[पञ्चकः] 'one whose share, price, or wages is five'. Similarly @deva[सप्तकः], @deva[साहस्रः].
"""

advanced = """
This @[sūtra] teaches the @deva[अंश]/@deva[वस्न]/@deva[भृति]] sense for the @ref[5.1.18] affixes: @deva[सः अंशो वस्नो भृतिर्वास्य] 'this is his share, price, or wages'. The @deva[प्रथमा] (nominative) @deva[सः] indicates the base's case. Examples: @deva[पञ्च अंशो वस्नो वा भृतिर्वास्य] = @deva[पञ्चकः]; @deva[सप्तकः], @deva[साहस्रः].
"""

id = "5.1.117"
numericId = "51117"

[en]
simple = """
The affix @deva[वति] comes after a word in the accusative case meaning 'befitting that'. @deva[राजानमर्हति] → @deva[राजवत् पालनम्] 'protection befitting a king'.
"""

standard = """
The affix @deva[वति] (adding @deva[वत्]) comes after a word in the accusative (@deva[द्वितीया]) case with the sense of 'befitting or suited to that' (@deva[तमर्हति]). Examples: @deva[राजानमर्हति] = @deva[राजवत् पालनम्] 'protection as befits a king' (i.e., as a king should protect); @deva[ब्राह्मणवत्] 'befitting a @[brāhmaṇa]'; @deva[ऋषिवत्] 'befitting a sage'; @deva[क्षत्रियवत्] 'befitting a warrior'.
"""

advanced = """
This @[sūtra] teaches @deva[वति] after @deva[द्वितीया] with @deva[अर्हति] ('befits') sense. Examples: @deva[राजवत् पालनम्] 'kingly protection', @deva[ब्राह्मणवत्], @deva[ऋषिवत्], @deva[क्षत्रियवत्].
"""

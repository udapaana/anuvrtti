id = "5.1.2"
numericId = "51002"

[en]
simple = """
The affix @deva[यत्] comes after stems ending in @deva[उ] (short or long) and after the @deva[गवादि] words, with the @deva[प्राक्क्रितीय] senses. Examples: @deva[शङ्कव्यं दारु] 'wood fit for a stake', @deva[गव्यम्] 'suitable for cows'.
"""

standard = """
The affix @deva[यत्] is added after @deva[प्रातिपदिक]s ending in @deva[उ] (long or short) and after words in the @deva[गवादि] class, expressing the @deva[प्राक्क्रितीय] senses (@ref[5.1.5], @ref[5.1.12], @ref[5.1.16]). This @deva[यत्] supersedes @deva[छ]. Examples: @deva[शङ्कवे हितम्] = @deva[शङ्कव्यं दारु] 'wood fit for a stake' (by @ref[6.4.146], @ref[6.1.79]); @deva[गव्यम्] 'suitable for cows'; @deva[हविष्यम्] 'suitable for offering'. Special cases in @deva[गवादि]: @deva[नाभि] is replaced by @deva[नभ] before @deva[यत्], giving @deva[नभ्यः] 'axle'; @deva[श्वन्] undergoes @deva[संप्रसारण] to @deva[शुन्य] or @deva[शून्य] 'fit for a dog'; @deva[ऊधस्] takes @deva[अनङ्] replacement giving @deva[ऊधन्यः कूपः] 'a well'.
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[उ]-final stems and @deva[गवादि] words with the three @deva[प्राक्क्रितीय] senses. The @deva[यत्] blocks @deva[छ]. Derivations: @deva[शङ्कु] + @deva[यत्] → @deva[शङ्कव्य] (by @ref[6.4.146] @deva[उ] → @deva[अव्], then @ref[6.1.79]); @deva[पिचु] + @deva[यत्] → @deva[पिचव्यः कार्पासः]. Despite @ref[5.1.15] (for leathers) and @ref[5.1.4] (for offerings), @deva[उ]-final words like @deva[सनङ्गु], @deva[चरु], @deva[सक्तु] take @deva[यत्] here—a case where a prior @[sūtra] is not superseded by a subsequent one (@ref[1.4.2]). The @deva[गवादि] class includes 24 words with special operations: @deva[नाभि] → @deva[नभ] (only when meaning 'nave', not 'navel'); @deva[श्वन्] takes @deva[संप्रसारण] (@deva[व] → @deva[उ]), optional lengthening, and final @deva[उदात्त]; @deva[ऊधस्] takes @deva[अनङ्] substitution for the final.
"""

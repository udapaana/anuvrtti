id = "5.1.114"
numericId = "51114"

[en]
simple = """
The word @deva[आकालिक] is irregularly formed meaning 'what lasts only an instant'. @deva[आकालिकः स्तनयित्नुः] 'thunder lasting an instant'; @deva[आकालिकी विद्युत्] 'lightning lasting a twinkle'.
"""

standard = """
The word @deva[आकालिक] is irregularly formed (@deva[निपातन]) in the sense of 'what coincides with beginning and end', i.e., 'what lasts only an instant'. The word @deva[आकाल] substitutes for @deva[समानकाल] 'equal time'. Examples: @deva[आकालिकः स्तनयित्नुः] 'thunder lasting an instant'; @deva[आकालिकी विद्युत्] 'lightning lasting a twinkle' (dying as soon as born). @deva[वार्त्तिक]: The affixes @deva[ठन्] and @deva[ठञ्] also come after @deva[आकाल]: @deva[आकालिका विद्युत्]. This @[sūtra] marks the end of the governing power of @deva[ठञ्] (@ref[5.1.18]).
"""

advanced = """
This @[sūtra] is a @deva[निपातन] for @deva[आकालिक] 'instantaneous'. The term @deva[आकाल] substitutes for @deva[समानकाल]. Examples: @deva[आकालिकः स्तनयित्नुः], @deva[आकालिकी विद्युत्]. A @deva[वार्त्तिक] adds @deva[ठन्] and @deva[ठञ्] options: @deva[आकालिका विद्युत्]. The @deva[अधिकार] of @deva[ठञ्] (@ref[5.1.18]) ends here.
"""

id = "5.1.74"
numericId = "51074"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[योजन] 'league' in the accusative case meaning 'who goes (that distance)'. @deva[योजनं गच्छति] → @deva[यौजनिकः] 'one who goes a league'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the sense of 'who goes (that distance)' after @deva[योजन] 'league, @deva[योजन]-measure' in the accusative case. Example: @deva[योजनं गच्छति] = @deva[यौजनिकः] 'one who goes a league'. @deva[वार्त्तिक]s: @deva[ठञ्] also comes after @deva[क्रोशशत] and @deva[योजनशत]: @deva[क्रौशशतिकः], @deva[यौजनशतिकः]. These affixes also mean 'worthy of being approached from that distance': @deva[क्रोशशतादभिगमनमर्हति] = @deva[क्रौशशतिको भिक्षुः] 'a mendicant worthy of being approached from a hundred @deva[क्रोश]'; @deva[यौजनशतिकः आचार्यः] 'a teacher worthy of approach from a hundred leagues'.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[योजन] in @deva[द्वितीया] with the @deva[गच्छति] sense. Result: @deva[यौजनिकः]. Two @deva[वार्त्तिक]s: (1) @deva[ठञ्] also after @deva[क्रोशशत], @deva[योजनशत] → @deva[क्रौशशतिकः], @deva[यौजनशतिकः]; (2) these also mean 'worthy of being approached from that distance' → @deva[क्रौशशतिको भिक्षुः], @deva[यौजनशतिकः आचार्यः].
"""

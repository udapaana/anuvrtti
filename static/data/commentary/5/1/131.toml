id = "5.1.131"
numericId = "51131"

[en]
simple = """
The affix @deva[अण्] comes after stems ending in @deva[इक्] vowels (@deva[इ ई उ ऊ ऋ ऌ]) when the preceding syllable is light. @deva[शुचि] 'pure' → @deva[शौचम्] 'purity'. @deva[पटु] 'clever' → @deva[पाटवम्] 'cleverness'.
"""

standard = """
When a stem ends in an @deva[इक्] vowel (@deva[इ], @deva[ई], @deva[उ], @deva[ऊ], @deva[ऋ], or @deva[ऌ]) and the preceding syllable is prosodially light (@deva[लघु]), the affix @deva[अण्] applies for @deva[भाव/कर्म]. Examples: @deva[शुचेर्भावः कर्म वा] → @deva[शौचम्]; @deva[मुनि] → @deva[मौनम्] 'silence'; @deva[नगर] → @deva[नागरम्] (indirect via @deva[नागरिक]); @deva[हरीतकी] → @deva[हारीतकम्]; @deva[पटु] → @deva[पाटवम्]; @deva[लघु] → @deva[लाघवम्] 'lightness'. Counter-example: @deva[गुरु] (heavy penult) does not take @deva[अण्] here.
"""

advanced = """
The conditioning environment is: stem-final @deva[इक्] (= @deva[इ ई उ ऊ ऋ ऌ]) with @deva[लघूपधा] (light penultimate syllable). The @deva[लघु] criterion follows standard prosodic definition: short vowel not followed by conjunct. This explains why @deva[लघु] itself qualifies (@deva[ल] + short @deva[अ] = light) yielding @deva[लाघवम्], while @deva[गुरु] (with heavy penult by position or inherent length) is excluded from this rule and takes @deva[त्व/तल्] instead.
"""

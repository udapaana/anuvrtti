id = "5.1.106"
numericId = "51106"

[en]
simple = """
In Vedic usage, the affix @deva[घस्] comes after @deva[ऋतु] 'season' meaning 'the season has come for it'. @deva[अयं ते योनिर्ऋत्वियः] 'this is your seasonal abode'.
"""

standard = """
In the @deva[छन्दस्] (Vedas), the affix @deva[घस्] (adding @deva[इय]) comes in the sense of 'the season has come for it' after @deva[ऋतु] 'season'. This supersedes @deva[अण्]. Example: @deva[अयं ते योनिर्ऋत्वियः] 'this is your seasonal abode'. Note: There is no @deva[गुण] by @ref[6.4.146] because @deva[ऋतु] before @deva[घस्] gets the designation @deva[पद] per @ref[1.4.16], and the @deva[गुण] rule applies only to @deva[भ] (per @ref[1.4.18]).
"""

advanced = """
This @[sūtra] teaches Vedic @deva[घस्] after @deva[ऋतु] with @deva[प्राप्त] sense, superseding @deva[अण्]. Result: @deva[ऋत्वियः] (not *@deva[आर्त्विय]). The absence of @deva[गुण] is explained: @deva[ऋतु] before @deva[घस्] becomes @deva[पद] per @ref[1.4.16], and @deva[गुण] (@ref[6.4.146]) applies to @deva[भ]-designated stems (@ref[1.4.18]), not @deva[पद].
"""

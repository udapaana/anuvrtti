id = "5.1.50"
numericId = "51050"

[en]
simple = """
The affixes come after @deva[भार] 'load' when preceded by @deva[वंशादि] words, in the sense of 'who carries, conveys, or brings that'. @deva[वंशभारं हरति] → @deva[वांशभारिकः] 'one who carries a load of bamboo'.
"""

standard = """
The above affixes come after @deva[भार] 'load' when preceded by @deva[वंशादि] words, with the base in accusative case, meaning 'who carries away (@deva[हरति]), conveys (@deva[वहति]), or brings (@deva[आवहति]) that'. Examples: @deva[वंशभारं हरति वहति आवहति वा] = @deva[वांशभारिकः] 'one who carries a load of bamboo'; @deva[कौटजभारिकः] 'carrier of @deva[कुटज]-loads'; @deva[बाल्वजभारिकः]. Alternative interpretation: @deva[भाराद् वंशादिभ्यः] means @deva[भारभूतेभ्यो वंशादिभ्यः] 'after @deva[वंशादि] words when denoting a load'—thus @deva[भारभूतान् वंशान् हरति] = @deva[वांशिकः]. The @deva[वंशादि] class has 11 words: @deva[वंश], @deva[कुटज], @deva[बल्वज], @deva[मूल], @deva[स्थूणा], @deva[अक्ष], @deva[अश्मन्], @deva[अश्व], @deva[लक्षण], @deva[इक्षु], @deva[खट्वा].
"""

advanced = """
This @[sūtra] teaches the affixes after @deva[भार] preceded by @deva[वंशादि] words in accusative (@deva[द्वितीया]) construction, expressing 'carrying' (@deva[हरति] = carry away/steal, @deva[वहति] = carry on back/head, @deva[आवहति] = bring/produce). Examples: @deva[वांशभारिकः], @deva[कौटजभारिकः], @deva[बाल्वजभारिकः]. An alternative reading takes @deva[भारात्] as @deva[भारभूतेभ्यः] 'when @deva[वंशादि] words denote a load': @deva[भारभूतान् वंशान् हरति] = @deva[वांशिकः]. Both interpretations are traditional. The @deva[वंशादि] @[gaṇa] contains 11 words. Restrictions: no affix for @deva[वंशं हरति] (not preceded by @deva[भार]) or @deva[भारभूतान् व्रीहीन् वहति] (not in @deva[वंशादि]).
"""

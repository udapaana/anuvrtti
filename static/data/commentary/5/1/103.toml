id = "5.1.103"
numericId = "51103"

[en]
simple = """
The affix @deva[उकञ्] comes after @deva[कर्मन्] meaning 'able to effect that'. @deva[कर्मणे प्रभवति] → @deva[कार्मुकं धनुः] 'a bow (capable for action)'.
"""

standard = """
The affix @deva[उकञ्] (adding @deva[उक]) comes in the sense of 'able to effect that' after @deva[कर्मन्] 'action'. This supersedes @deva[ठञ्]. Example: @deva[कर्मणे प्रभवति] = @deva[कार्मुकं धनुः] 'a bow' (lit. 'capable of action'). The word @deva[कार्मुकम्] always means 'bow' and is never used for anything else.
"""

advanced = """
This @[sūtra] teaches @deva[उकञ्] after @deva[कर्मन्] with @deva[प्रभवति] sense. The @deva[उकञ्] supersedes @deva[ठञ्]. Result: @deva[कार्मुकम्] 'bow'—a @deva[रूढ] (conventional) meaning, never used otherwise.
"""

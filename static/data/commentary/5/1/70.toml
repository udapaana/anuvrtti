id = "5.1.70"
numericId = "51070"

[en]
simple = """
The affixes @deva[छ] and @deva[यत्] come after @deva[स्थालीबिल] 'pot/cauldron' in the sense of 'deserving that'. @deva[स्थालीबिलीयाः तण्डुलाः] or @deva[स्थालीबिल्याः] 'rice deserving the pot' (i.e., cookable rice).
"""

standard = """
The affixes @deva[छ] (adding @deva[ईय]) and @deva[यत्] (adding @deva[य]) come in the sense of 'deserving that' after @deva[स्थालीबिल] 'pot, cauldron'. These supersede @deva[ठक्]. Examples: @deva[स्थालीबिलीयाः तण्डुलाः] (with @deva[छ]) or @deva[स्थालीबिल्याः] (with @deva[यत्]) 'rice deserving the pot', i.e., rice that is ready to be cooked.
"""

advanced = """
This @[sūtra] teaches @deva[छ] and @deva[यत्] after @deva[स्थालीबिल] in the @deva[अर्हति] sense. These supersede @deva[ठक्]. Results: @deva[स्थालीबिलीयाः तण्डुलाः] ~ @deva[स्थालीबिल्याः तण्डुलाः] 'cookable rice'.
"""

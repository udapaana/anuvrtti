id = "5.1.14"
numericId = "51014"

[en]
simple = """
The affix @deva[ञ्य] comes after @deva[ऋषभ] 'bull' and @deva[उपानह्] 'sandal' in the 'primitive for product' sense. @deva[ऋषभ] + @deva[ञ्य] → @deva[आर्षभ्यः वत्सः] 'a calf fit for becoming a bull'.
"""

standard = """
The affix @deva[ञ्य] (adding @deva[य]) is used in the sense of 'primitive serviceable for a product' after @deva[ऋषभ] 'bull' and @deva[उपानह्] 'sandal/shoe'. This supersedes @deva[छ]. Examples: @deva[आर्षभ्यो वत्सः] 'a calf suitable for becoming a bull'; @deva[औपानह्यो मुञ्जः] '@deva[मुञ्ज] grass suitable for sandals'. Notably, even when the primitive is leather (@deva[चर्म]), @deva[ञ्य] applies after @deva[उपानह्], irregularly superseding the @deva[अञ्] of @ref[5.1.15]: @deva[औपानह्यं चर्म] 'leather suitable for sandals'.
"""

advanced = """
This @[sūtra] teaches @deva[ञ्य] after @deva[ऋषभ] and @deva[उपानह्] in the @deva[प्रकृति-विकृति] sense. The @deva[ञ्य] adds @deva[य] with @deva[वृद्धि] of the initial: @deva[ऋषभ] → @deva[आर्षभ्य], @deva[उपानह्] → @deva[औपानह्य]. Examples: @deva[आर्षभ्यो वत्सः] 'a calf destined to become a bull'; @deva[औपानह्यो मुञ्जः] '@deva[मुञ्ज]-grass for making sandals'. The commentary notes an irregularity: even when @deva[चर्म] 'leather' is the primitive, @deva[ञ्य] applies after @deva[उपानह्] (@deva[औपानह्यं चर्म]), overriding the expected @deva[अञ्] of @ref[5.1.15]. This is an @deva[अपवाद] both to @deva[छ] and to @ref[5.1.15].
"""

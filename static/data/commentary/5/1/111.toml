id = "5.1.111"
numericId = "51111"

[en]
simple = """
The affix @deva[छ] comes after @deva[अनुप्रवचनादि] words in the sense of 'that whose purpose is this'. @deva[अनुप्रवचनीयम्], @deva[उत्थापनीयम्].
"""

standard = """
The affix @deva[छ] (adding @deva[ईय]) comes in the sense of 'that whose purpose is this' after @deva[अनुप्रवचनादि] words. This supersedes @deva[ठञ्]. Examples: @deva[अनुप्रवचनं प्रयोजनमस्य] = @deva[अनुप्रवचनीयम्] 'for the purpose of recitation'; @deva[उत्थापनीयम्] 'for raising'. The @deva[अनुप्रवचनादि] class contains 16 words. @deva[वार्त्तिक]s: (1) @deva[छ] also after derivatives in @deva[अन] (@deva[युच्]) from @deva[विश्], @deva[पूर्], @deva[पत्], @deva[रुह्] when preceded by a word: @deva[गृहप्रवेशनीयम्], @deva[प्रपापूरणीयम्], @deva[अश्वप्रपतनीयम्], @deva[प्रासादारोहणीयम्]; (2) @deva[यत्] after @deva[स्वर्ग] etc.: @deva[स्वर्ग्यम्], @deva[यशस्यम्], @deva[आयुष्यम्], @deva[काम्यम्], @deva[धन्यम्]; (3) Affix deleted after @deva[पुण्याहवाचन] etc.: @deva[पुण्याहवाचनम्], @deva[स्वस्तिवाचनम्], @deva[शान्तिवाचनम्].
"""

advanced = """
This @[sūtra] teaches @deva[छ] after @deva[अनुप्रवचनादि] (16 words) with @deva[प्रयोजन] sense, superseding @deva[ठञ्]. Examples: @deva[अनुप्रवचनीयम्], @deva[उत्थापनीयम्]. Three @deva[वार्त्तिक]s: (1) @deva[छ] after @deva[अन]-derivatives from @deva[विश्]/@deva[पूर्]/@deva[पत्]/@deva[रुह्]] when preceded by a @deva[पद]; (2) @deva[यत्] after @deva[स्वर्गादि]; (3) @deva[लुक्] after @deva[पुण्याहवाचनादि].
"""

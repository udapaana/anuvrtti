id = "5.1.8"
numericId = "51008"

[en]
simple = """
The affix @deva[थ्यन्] comes after @deva[अज] 'goat' and @deva[अवि] 'sheep' with the meaning 'good for that'. @deva[अज] + @deva[थ्यन्] → @deva[अजथ्या] 'jasmine good for goats'.
"""

standard = """
The affix @deva[थ्यन्] is added in the sense of 'good for that' after the words @deva[अज] 'goat' and @deva[अवि] 'sheep'. This supersedes @deva[छ]. Examples: @deva[अजथ्या यूथिः] 'the yellow jasmine called @deva[यूथि], good for goats'; @deva[अविथ्या यूथिः] 'jasmine good for sheep'.
"""

advanced = """
This @[sūtra] teaches the rare affix @deva[थ्यन्] after @deva[अज] and @deva[अवि] with the @deva[तस्मै हितम्] sense. The affix @deva[थ्यन्] supersedes @deva[छ]. The examples @deva[अजथ्या यूथिः] and @deva[अविथ्या यूथिः] refer to the yellow jasmine plant (@deva[यूथी]) considered beneficial for goats and sheep respectively. The affix @deva[थ्यन्] is uncommon; its @deva[न्] is @deva[इत्] (indicatory), leaving @deva[थ्य] as the actual addition.
"""

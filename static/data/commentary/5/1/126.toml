id = "5.1.126"
numericId = "51126"

[en]
simple = """
The affix @deva[य] comes after @deva[सखि] 'friend' to express 'nature/action thereof'. @deva[सखि] → @deva[सख्यम्] 'friendship'. By @deva[वार्त्तिक], also @deva[दूत] → @deva[दूत्यम्] and @deva[वणिक्] → @deva[वणिज्यम्].
"""

standard = """
After @deva[सखि] 'friend', the bare affix @deva[य] (not @deva[यत्]) denotes @deva[भाव/कर्म]. Derivation: @deva[सखि] + @deva[य] → @deva[सख्यम्] 'friendship'. A @deva[वार्त्तिक] extends this to @deva[दूत] 'messenger' → @deva[दूत्यम्] 'embassy/message-bearing' and @deva[वणिक्] 'merchant' → @deva[वणिज्यम्] 'trade/commerce'. Note: @deva[वाणिज्यम्] (with @deva[वृद्धि]) is formed by @ref[5.1.124] since @deva[वणिक्] belongs to the @deva[ब्राह्मणादि] class.
"""

advanced = """
The @deva[य]-affix (distinct from @deva[यत्]/@deva[यञ्]/@deva[यक्]) is prescribed specifically for @deva[सखि]. The @deva[इकारलोप] of @deva[सखि] before @deva[य] yields @deva[सख्य] + @deva[अम्] → @deva[सख्यम्]. The @deva[वार्त्तिक] (@deva[दूतवणिग्भ्यां च]) supplements the @[sūtra] for two additional bases. The existence of @deva[वाणिज्यम्] (via @ref[5.1.124], @deva[ब्राह्मणादि]) alongside @deva[वणिज्यम्] (via this @deva[वार्त्तिक]) illustrates derivational doublets from different rule-sources.
"""

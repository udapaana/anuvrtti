id = "5.1.32"
numericId = "51032"

[en]
simple = """
The affix @deva[ख] comes after @deva[विंशतिक] when preceded by @deva[अध्यर्ध] or a numeral in a @deva[द्विगु] compound. @deva[अध्यर्धविंशतिकीनम्], @deva[द्विविंशतिकीनम्].
"""

standard = """
The affix @deva[ख] (adding @deva[ईन]) comes in the @deva[आर्हीय] senses (@ref[5.1.37]-63) after @deva[विंशतिक] when preceded by @deva[अध्यर्ध] or a numeral that occasions a @deva[द्विगु] compound. Examples: @deva[अध्यर्धविंशतिकीनम्], @deva[द्विविंशतिकीनम्], @deva[त्रिविंशतिकीनम्]. Being specifically ordained, this @deva[ख] is not deleted by @ref[5.1.28].
"""

advanced = """
This @[sūtra] teaches @deva[ख] after @deva[विंशतिक] in @deva[द्विगु] compounds with @deva[अध्यर्ध] or numerals. The @deva[ख] adds @deva[ईन]: @deva[अध्यर्धविंशतिकीनम्], @deva[द्विविंशतिकीनम्], @deva[त्रिविंशतिकीनम्]. Since @deva[ख] is specifically taught here, it is not subject to the @deva[लुक्] of @ref[5.1.28]—special rules (@deva[अपवाद]) override general ones. Note that @deva[विंशतिक] is itself derived from @deva[विंशति] + @deva[कन्].
"""

id = "5.1.68"
numericId = "51068"

[en]
simple = """
The affix @deva[घ] as well as @deva[यत्] comes after @deva[पात्र] 'vessel/worthy person' in the sense of 'deserving that'. @deva[पात्रमर्हति] → @deva[पात्र्यः] or @deva[पात्रियः].
"""

standard = """
The affix @deva[घ] (adding @deva[इय]) together with @deva[यत्] (adding @deva[य]) comes in the sense of 'deserving that' after @deva[पात्र] 'vessel, worthy person/measure'. These supersede @deva[ठक्] and @deva[ठञ्]. Examples: @deva[पात्रमर्हति] = @deva[पात्र्यः] (with @deva[यत्]) or @deva[पात्रियः] (with @deva[घ]).
"""

advanced = """
This @[sūtra] teaches @deva[घ] and @deva[यत्] after @deva[पात्र] in the @deva[अर्हति] sense. Both supersede @deva[ठक्] and @deva[ठञ्]. The word @deva[पात्र] also denotes a measure. Results: @deva[पात्र्यः] (with @deva[यत्]), @deva[पात्रियः] (with @deva[घ]).
"""

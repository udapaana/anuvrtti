id = "5.1.93"
numericId = "51093"

[en]
simple = """
The affix @deva[ठञ्] comes after a time-denoting word in the instrumental case meaning 'to be subdued, attained, done, or easily done in that time'. @deva[मासेन जय्यः] → @deva[मासिको व्याधिः] 'a disease conquerable in a month'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes after a word denoting time in the instrumental (@deva[तृतीया]) case with the sense of 'to be subdued (@deva[परिजय्य]), attained (@deva[लभ्य]), done (@deva[कार्य]), or easily done (@deva[सुकर]) in that time'. Examples: @deva[मासेन परिजय्यः] = @deva[मासिको व्याधिः] 'a disease conquerable in a month'; @deva[सांवत्सरिको व्याधिः] 'curable in a year'; @deva[मासेन लभ्यः] = @deva[मासिकः पटः] 'cloth obtainable in a month'; @deva[मासेन कार्यम्] = @deva[मासिकं चान्द्रायणम्] '@deva[चान्द्रायण] to be done in a month'; @deva[मासेन सुकरः] = @deva[मासिकः प्रासादः] 'a palace easily built in a month'.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[काल] words in @deva[तृतीया] with four senses: @deva[परिजय्य] (conquerable), @deva[लभ्य] (obtainable), @deva[कार्य] (to be done), @deva[सुकर] (easily done). Examples: @deva[मासिको व्याधिः], @deva[सांवत्सरिको व्याधिः], @deva[मासिकः पटः], @deva[मासिकं चान्द्रायणम्], @deva[मासिकः प्रासादः].
"""

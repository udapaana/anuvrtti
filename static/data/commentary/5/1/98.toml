id = "5.1.98"
numericId = "51098"

[en]
simple = """
The affixes @deva[ण] and @deva[यत्] come after @deva[यथाकथाच] and @deva[हस्त] respectively in the instrumental case meaning 'given or done in this way'. @deva[याथाकथाचम्]; @deva[हस्त्यम्].
"""

standard = """
The affix @deva[ण] (adding @deva[अ] with @deva[वृद्धि]) comes after @deva[यथाकथाच] 'in a contemptuous manner' (an indeclinable), and @deva[यत्] (adding @deva[य]) comes after @deva[हस्त] 'hand', both being in the instrumental (@deva[तृतीया]) case, with the sense of 'given or done in that way'. The words @deva[दीयते] and @deva[कार्य] apply to both—not @deva[यथासंख्य] (@ref[1.3.10]). Since @deva[यथाकथाच] is indeclinable, it only gives the instrumental sense. Examples: @deva[यथाकथाच दीयते कार्यं वा] = @deva[याथाकथाचम्] 'given/done carelessly'; @deva[हस्तेन दीयते कार्यं वा] = @deva[हस्त्यम्] 'given/done by hand'.
"""

advanced = """
This @[sūtra] teaches @deva[ण] after @deva[यथाकथाच] (indeclinable expressing contempt) and @deva[यत्] after @deva[हस्त], both in @deva[तृतीया] with @deva[दीयते]/@deva[कार्यम्]] senses. The @deva[यथासंख्य] rule (@ref[1.3.10]) doesn't apply—both senses go with both words. Results: @deva[याथाकथाचम्] 'carelessly given/done', @deva[हस्त्यम्] 'manually given/done'.
"""

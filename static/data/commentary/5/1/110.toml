id = "5.1.110"
numericId = "51110"

[en]
simple = """
The affix @deva[अण्] comes after @deva[विशाखा] and @deva[आषाढ] in the sense of 'that whose purpose is this' when combined with @deva[मन्थ] and @deva[दण्ड] respectively. @deva[वैशाखो मन्थः]; @deva[आषाढो दण्डः].
"""

standard = """
The affix @deva[अण्] (adding @deva[अ]) comes in the sense of 'that whose purpose is this' after @deva[विशाखा] (when combined with @deva[मन्थ] 'churning stick') and @deva[आषाढ] (when combined with @deva[दण्ड] 'staff'). Examples: @deva[वैशाखो मन्थः] 'a churning stick (made when @[viśākhā] is the purpose/occasion)'; @deva[आषाढो दण्डः] 'a staff (made during @[āṣāḍha])'. @deva[वार्त्तिक]: @deva[अण्] also after @deva[चडा] etc.: @deva[चडा प्रयोजनमस्य] = @deva[चौडम्] 'tonsure ceremony'; @deva[श्रद्धा प्रयोजनमस्य] = @deva[श्राद्धम्] 'funeral offering'.
"""

advanced = """
This @[sūtra] teaches @deva[अण्] after @deva[विशाखा] (with @deva[मन्थ]) and @deva[आषाढ] (with @deva[दण्ड]) in the @deva[प्रयोजन] sense. Results: @deva[वैशाखो मन्थः], @deva[आषाढो दण्डः]. A @deva[वार्त्तिक] extends to @deva[चडादि]: @deva[चौडम्] 'tonsure', @deva[श्राद्धम्] '@[śrāddha]'.
"""

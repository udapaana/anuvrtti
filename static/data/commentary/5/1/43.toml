id = "5.1.43"
numericId = "51043"

[en]
simple = """
The same affixes @deva[अण्] and @deva[अञ्] come after @deva[सर्वभूमि] and @deva[पृथ्वी] (in the locative) in the sense of 'known therein'. @deva[सर्वभूमौ विदितः] → @deva[सार्वभौमः] 'known in the whole world'.
"""

standard = """
The same affixes @deva[अण्] and @deva[अञ्] come after @deva[सर्वभूमि] and @deva[पृथ्वी] respectively, when in the locative (@deva[सप्तमी]) case in construction, with the sense of 'known therein' (@deva[तत्र विदितः]). The word @deva[विदित] means 'known, published'. Examples: @deva[सर्वभूमौ विदितः] = @deva[सार्वभौमः] 'known in the whole world'; @deva[पार्थिवः] 'known on earth'.
"""

advanced = """
This @[sūtra] teaches another sense for @deva[अण्] (after @deva[सर्वभूमि]) and @deva[अञ्] (after @deva[पृथ्वी]): @deva[तस्मिन् विदितः] 'known therein' with @deva[सप्तमी] (locative) construction. The word @deva[विदित] means 'known, published, famous'. Examples: @deva[सर्वभूमौ विदितः] = @deva[सार्वभौमः] 'one who is known throughout the whole earth'; @deva[पृथिव्यां विदितः] = @deva[पार्थिवः] 'known on earth'.
"""

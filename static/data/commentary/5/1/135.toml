id = "5.1.135"
numericId = "51135"

[en]
simple = """
The affix @deva[छ] (@deva[ईय]) comes after words denoting @deva[होत्रा] priests to express 'nature/action'. @deva[अच्छावाक] → @deva[आच्छावाकीयम्]; @deva[मैत्रावरुण] → @deva[मैत्रावरुणीयम्].
"""

standard = """
Words denoting @deva[होत्रा] (a class of Vedic priests) take @deva[छ] (realized as @deva[ईय]) for @deva[भाव/कर्म]. The @deva[होत्रा] priests include: @deva[अच्छावाक], @deva[मैत्रावरुण], @deva[ब्राह्मणाच्छंसिन्], @deva[आग्नीध्र], @deva[प्रतिप्रस्थातृ], @deva[नेष्टृ], @deva[पोतृ]. Examples: @deva[आच्छावाकीयम्], @deva[मैत्रावरुणीयम्], @deva[ब्राह्मणाच्छंसीयम्], @deva[आग्नीध्रीयम्], @deva[प्रतिप्रस्थात्रीयम्], @deva[नेष्ट्रीयम्], @deva[पोत्रीयम्]. The plural @deva[होत्राभ्यः] prevents @ref[1.1.68] from applying.
"""

advanced = """
The @deva[होत्रावाचिन्] (priest-denoting terms) constitute the domain for @deva[छ]-affixation. The @deva[बहुवचन] (@deva[होत्राभ्यः]) in the @[sūtra] is @deva[जातिवचन] (class-denoting plural), blocking the @deva[एकशेष] provision of @ref[1.1.68]. This ensures the rule applies to each @deva[होत्रा]-term individually. Note: the word @deva[होत्रा] here refers specifically to the priestly office category, not to @deva[होत्र] (oblation) derived from @deva[हु] + @deva[त्र].
"""

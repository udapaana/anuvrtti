id = "5.1.81"
numericId = "51081"

[en]
simple = """
The affixes @deva[यत्] and @deva[खञ्] come after @deva[मास] 'month' when denoting age. @deva[मासं भूतः] → @deva[मास्यः] or @deva[मासीनः] 'a month old'.
"""

standard = """
The affixes @deva[यत्] (adding @deva[य]) and @deva[खञ्] (adding @deva[ईन]) come after @deva[मास] 'month' when the sense is 'age' (@deva[वयस्]). These supersede @deva[ठञ्]. The word @deva[भूतः] from the previous @[sūtra] is understood. Examples: @deva[मासं भूतः] = @deva[मास्यः] (with @deva[यत्]) or @deva[मासीनः] (with @deva[खञ्]) 'a month old'. When not denoting age: @deva[मासिकः] (with @deva[ठञ्]).
"""

advanced = """
This @[sūtra] teaches @deva[यत्] and @deva[खञ्] after @deva[मास] when @deva[वयस्] (age) is meant. These supersede @deva[ठञ्]. The @deva[भूत] sense from @ref[5.1.80] is read in. Results: @deva[मास्यः] ~ @deva[मासीनः] 'one month old'. Without the @deva[वयस्] condition: @deva[मासिकः].
"""

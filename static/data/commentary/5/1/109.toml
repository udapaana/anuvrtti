id = "5.1.109"
numericId = "51109"

[en]
simple = """
The affix @deva[ठञ्] comes after a word in the nominative case meaning 'that whose purpose is this'. @deva[इन्द्रमहः प्रयोजनमस्य] → @deva[ऐन्द्रमहिकम्] 'pertaining to the Indra festival'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the sense of 'that whose occasion or purpose is this' (@deva[तत् प्रयोजनमस्य]) after a word in the nominative (@deva[प्रथमा]) case. Examples: @deva[इन्द्रमहः प्रयोजनमस्य] = @deva[ऐन्द्रमहिकम्] 'pertaining to the Indra festival'; @deva[गाङ्गामहिकम्] 'pertaining to the @[gaṅgā] festival'.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[प्रथमा] words with @deva[प्रयोजन] ('purpose') sense. Examples: @deva[ऐन्द्रमहिकम्], @deva[गाङ्गामहिकम्].
"""

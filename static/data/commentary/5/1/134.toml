id = "5.1.134"
numericId = "51134"

[en]
simple = """
The affix @deva[वुञ्] comes after @deva[गोत्र] (patronymic) names and Vedic school names when expressing boasting, contempt, or 'one who has attained/inquires into that'. @deva[वसिष्ठ]-@deva[गोत्र] + boasting → @deva[वासिष्ठकम्].
"""

standard = """
After @deva[गोत्र] (family/clan names) and @deva[चरण] (Vedic school names), @deva[वुञ्] applies in three semantic contexts: (1) @deva[श्लाघा] 'boasting' - when one boasts of lineage/school; (2) @deva[अत्याकार] 'contempt' - when expressing disdain; (3) @deva[तदवेत] 'one who has attained/inquires' - one who has achieved or investigates that tradition. The term @deva[तदवेत] encompasses both @deva[तत्प्राप्त] 'one who has gained that' and @deva[तज्ज्ञ] 'one who knows/inquires about that'.
"""

advanced = """
The @deva[गोत्र]//@deva[चरण] domain with @deva[वुञ्] is conditioned by pragmatic-semantic factors: @deva[श्लाघा] (self-aggrandizement through lineage), @deva[अत्याकार] (pejorative use), or @deva[तदवेत] (epistemic/acquisitive relation to the tradition). This creates @deva[वुञ्]-derivatives that are contextually marked, unlike neutral @deva[भाव]-formations. The rule addresses specialized registers of discourse about genealogical and scholastic identity.
"""

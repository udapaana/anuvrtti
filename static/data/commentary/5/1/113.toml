id = "5.1.113"
numericId = "51113"

[en]
simple = """
The word @deva[ऐकागारिक] is irregularly formed meaning 'thief'. @deva[एकागारं प्रयोजनमस्य] → @deva[ऐकागारिकः] 'thief', fem. @deva[ऐकागारिकी].
"""

standard = """
The word @deva[ऐकागारिक] is irregularly formed (@deva[निपातन]) in the sense of 'thief'. Example: @deva[एकागारं प्रयोजनमस्य] = @deva[ऐकागारिकः] 'thief' (lit. 'one whose purpose is a single house'), fem. @deva[ऐकागारिकी] (with @deva[ङीप्]). This could be regularly formed with @deva[ठञ्], but the word is restricted to mean 'thief' only. When something else is intended (e.g., @deva[एकागारं प्रयोजनमस्य भिक्षाः] 'alms whose purpose is a single house'), no affix is added. Some say it's formed by adding @deva[इकट्] with irregular @deva[वृद्धि] of the first syllable.
"""

advanced = """
This @[sūtra] is a @deva[निपातन] for @deva[ऐकागारिक] 'thief'. Though derivable by @deva[ठञ्], the form is @deva[रूढ] (conventional) for 'thief' only—not applied to other contexts. Feminine: @deva[ऐकागारिकी] (by @deva[ङीप्]). Alternative analysis: @deva[इकट्] affix with irregular @deva[वृद्धि].
"""

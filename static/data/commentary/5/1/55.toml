id = "5.1.55"
numericId = "51055"

[en]
simple = """
After @deva[कुलिज] in a @deva[द्विगु] compound, the affix is optionally deleted or @deva[ख] is added in the sense of 'capable of holding etc.' Four forms: @deva[द्विकुलिजिकी], @deva[द्विकुलिजीना], @deva[द्विकुलिजा], @deva[द्वैकुलिजिकी].
"""

standard = """
After @deva[कुलिज] as final in a @deva[द्विगु] compound, there is optional deletion of the affix or addition of @deva[ख] (adding @deva[ईन]) in the sense of 'capable of holding etc.' By @deva[च], @deva[ष्ठन्] also applies. The deletion being optional, @deva[ठञ्] (@ref[5.1.18]) may optionally remain (not deleted by @ref[5.1.28]). Four forms result: @deva[द्विकुलिजिकी] (with @deva[ष्ठन्]), @deva[द्विकुलिजीना] (with @deva[ख]), @deva[द्विकुलिजा] (with @deva[ठञ्] + @deva[लुक्]), @deva[द्वैकुलिजिकी] (with @deva[ठञ्] retained). In @deva[द्वैकुलिजिकी], the expected @deva[वृद्धि] of the second term per @ref[7.3.17] doesn't occur—@deva[कुलिज] should be included with @deva[संज्ञा] and @deva[शाण] in the exception of @ref[7.3.17].
"""

advanced = """
This @[sūtra] teaches optional @deva[लुक्] or @deva[ख] after @deva[कुलिज] in @deva[द्विगु] compounds with @ref[5.1.52] senses. By @deva[च], @deva[ष्ठन्] also applies. Four forms: (1) @deva[ष्ठन्]: @deva[द्विकुलिजिकी]; (2) @deva[ख]: @deva[द्विकुलिजीना]; (3) @deva[ठञ्] + @deva[लुक्]: @deva[द्विकुलिजा]; (4) @deva[ठञ्] without @deva[लुक्]: @deva[द्वैकुलिजिकी]. In the fourth form, @deva[वृद्धि] of the second term doesn't occur despite @ref[7.3.17]—explained by including @deva[कुलिज] in the @ref[7.3.17] exception along with @deva[संज्ञा] and @deva[शाण].
"""

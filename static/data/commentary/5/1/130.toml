id = "5.1.130"
numericId = "51130"

[en]
simple = """
The affix @deva[अण्] comes after compounds ending in @deva[हायन] 'year' and the @deva[युवनादि] class to express 'nature/action'. @deva[द्विहायन] 'two-year-old' → @deva[द्वैहायनम्]. @deva[युवन्] 'youth' → @deva[यौवनम्] 'youthfulness'.
"""

standard = """
Compounds ending in @deva[हायन] 'year' and the @deva[युवनादि] class take @deva[अण्] (with @deva[वृद्धि]) for @deva[भाव/कर्म]. Examples: @deva[द्विहायनस्य भावः कर्म वा] → @deva[द्वैहायनम्]; @deva[त्रिहायन] → @deva[त्रैहायनम्]; @deva[युवन्] → @deva[यौवनम्] 'youth'; @deva[स्थविर] → @deva[स्थाविरम्] 'old age'. A @deva[वार्त्तिक] notes that @deva[य] of @deva[श्रोत्रिय] is deleted: @deva[श्रोत्रियस्य भावः कर्म वा] → @deva[श्रौत्रम्] (not *@deva[श्रौत्रियम्]).
"""

advanced = """
The @deva[हायनान्त]-compounds and @deva[युवनादि] @deva[गण] trigger @deva[अण्] with standard @deva[वृद्धि]. The @deva[युवनादि] includes: @deva[युवन्], @deva[स्थविर], @deva[होतृ], @deva[यजमान], @deva[पुरुष] (non-compound), etc. The @deva[वार्त्तिक] (@deva[श्रोत्रियस्य यलोपश्च]) prescribes exceptional @deva[यकारलोप] for @deva[श्रोत्रिय], yielding @deva[श्रौत्रम्] rather than the expected *@deva[श्रौत्रियम्].
"""

id = "5.1.29"
numericId = "51029"

[en]
simple = """
The deletion of the affix after @deva[कार्षापण] and @deva[सहस्र] is optional. @deva[अध्यर्धकार्षापणम्] or @deva[अध्यर्धकार्षापणिकम्]; @deva[द्विसहस्रम्] or @deva[द्विसाहस्रम्].
"""

standard = """
This @[sūtra] makes the @deva[लुक्] deletion optional (whereas @ref[5.1.28] made it compulsory) for @deva[कार्षापण] and @deva[सहस्र]. Examples: @deva[अध्यर्धकार्षापणम्] or @deva[अध्यर्धकार्षापणिकम्]; @deva[द्विकार्षापणम्] or @deva[द्विकार्षापणिकम्]. When the affix is retained, @deva[प्रति] may substitute for @deva[कार्षापण] per @ref[5.1.25]: @deva[अध्यर्धप्रतिकम्], @deva[द्विप्रतिकम्]. For @deva[सहस्र]: @deva[अध्यर्धसहस्रम्] or @deva[अध्यर्धसाहस्रम्], @deva[द्विसहस्रम्] or @deva[द्विसाहस्रम्] (with irregular @deva[वृद्धि] of second term per @ref[7.3.15]). @deva[वार्त्तिक]: @deva[सुवर्ण] and @deva[शतमान] should also be included—@deva[अध्यर्धसुवर्णम्] or @deva[अध्यर्धसौवर्णिकम्], etc.
"""

advanced = """
This @[sūtra] introduces optionality for @deva[लुक्] with @deva[कार्षापण] and @deva[सहस्र] (modifying the obligatory @deva[लुक्] of @ref[5.1.28]). For @deva[कार्षापण]: @deva[अध्यर्धकार्षापणम्] ~ @deva[अध्यर्धकार्षापणिकम्] (or with @deva[प्रति]-substitution: @deva[अध्यर्धप्रतिकम्]). For @deva[सहस्र]: @deva[द्विसहस्रम्] ~ @deva[द्विसाहस्रम्] (when affix retained, @deva[वृद्धि] of second member occurs per @ref[7.3.15]). A @deva[वार्त्तिक] extends this to @deva[सुवर्ण] and @deva[शतमान]: @deva[अध्यर्धसुवर्णम्] ~ @deva[अध्यर्धसौवर्णिकम्], @deva[द्विशतमानम्] ~ @deva[द्विशातमानम्] (irregular @deva[वृद्धि] per @ref[7.3.17]).
"""

id = "5.1.61"
numericId = "51061"

[en]
simple = """
The affix @deva[अञ्] comes after @deva[सप्तन्] 'seven' in Vedic usage when the meaning is a @deva[वर्ग] 'class'. @deva[सप्त साप्तान्यसृजन्] 'the Seven created the seven groups'.
"""

standard = """
In the @deva[छन्दस्] (Vedas), the affix @deva[अञ्] (adding @deva[अ]) comes after @deva[सप्तन्] 'seven' when the meaning is that of a @deva[वर्ग] 'class, group'. The phrase @deva[तदस्य परिमाणम्] 'this is its measure' is understood. Example: @deva[सप्त साप्तान्यसृजन्] 'the Seven (seers) created the seven (classes)'.
"""

advanced = """
This @[sūtra] teaches Vedic @deva[अञ्] after @deva[सप्तन्] when the derivative denotes a @deva[वर्ग]. The @deva[परिमाण] sense (@deva[तदस्य परिमाणम्]) is understood from the preceding context. The Vedic example @deva[सप्त साप्तान्यसृजन्] shows both @deva[सप्त] (base numeral) and @deva[साप्त] (derivative with @deva[अञ्]).
"""

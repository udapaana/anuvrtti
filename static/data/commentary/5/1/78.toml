id = "5.1.78"
numericId = "51078"

[en]
simple = """
In the following @[sūtras] through @ref[5.1.96], the phrase 'after a word denoting time' (@deva[कालात्]) should be understood.
"""

standard = """
This is a heading @[sūtra] establishing that the word @deva[कालात्] 'after a word denoting time' governs the following @[sūtras] through @ref[5.1.96] inclusive. Thus in the next @[sūtra] @deva[तेन निर्वृत्तम्] 'accomplished by means thereof', the word @deva[काल] must be understood. Example: @deva[मासेन निर्वृत्तम्] = @deva[मासिकम्] 'accomplished in a month'.
"""

advanced = """
This @deva[अधिकार] @[sūtra] establishes the @deva[अनुवृत्ति] of @deva[कालात्] 'after a time-denoting word' for @[sūtras] @ref[5.1.79]-@ref[5.1.96]. The following @[sūtras] must be read with this governing phrase to complete their sense.
"""

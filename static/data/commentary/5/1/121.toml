id = "5.1.121"
numericId = "51121"

[en]
simple = """
Affixes meaning 'nature' (taught hereafter) do not come after negative @deva[नञ्] @deva[तत्पुरुष] compounds, except after words like @deva[चतुर], @deva[संगत], @deva[लवण], @deva[वट], @deva[बुध], @deva[कत], @deva[रस], and @deva[लस]. So @deva[अपति] 'husbandless' forms only @deva[अपतित्वम्] or @deva[अपतिता], not *@deva[अपतीयम्] etc.
"""

standard = """
This @[sūtra] restricts the upcoming @deva[भाव]-denoting affixes from applying after @deva[नञ्तत्पुरुष] compounds. Such compounds (negative @deva[तत्पुरुष]) take only @deva[त्व] and @deva[तल्] from @ref[5.1.119-120], not the special affixes taught subsequently. Eight exceptions permit all affixes: @deva[अचतुरत्वम्/अचातुर्यम्] etc. Examples: @deva[अपटु] → @deva[अपटुत्वम्/अपटुता] only; @deva[अरमणीय] → @deva[अरमणीयत्वम्/अरमणीयता] only.
"""

advanced = """
The @deva[प्रत्ययनिवृत्ति] (affix-prohibition) applies to the special @deva[भाव]-affixes of @ref[5.1.122] onward when the base is a @deva[नञ्तत्पुरुष] (negative determinative compound). The eight-item exception list (@deva[चतुरसंगतलवणवटबुधकतरसलसः]) represents stems where negative compounds still take the full range of @deva[भावप्रत्यय] options. The restriction ensures semantic clarity: abstract qualities from negated concepts typically use only the basic @deva[त्व/तल्] derivation, while the listed exceptions permit richer affixal alternatives due to lexical conventionalization.
"""

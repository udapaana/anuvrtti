id = "5.1.80"
numericId = "51080"

[en]
simple = """
The affixes come after a time-denoting word in the @deva[द्वितीया] (accusative) case meaning 'solicited to teach for that period', 'hired for that period', 'lasted that long', or 'will last that long'. @deva[मासमधीष्टः] → @deva[मासिकोऽध्यापकः] 'a teacher engaged for a month'.
"""

standard = """
The above affixes come after a word denoting time in the accusative (@deva[द्वितीया]) case with four senses: @deva[अधीष्ट] 'solicited to teach (without pay)' per @ref[3.3.161], @deva[भृत] 'hired on wages', @deva[भूत] 'the time occupied by its existence', and @deva[भावी] 'will exist for that time'. The time word takes accusative by @ref[2.3.5]. Examples: @deva[मासमधीष्टः] = @deva[मासिकोऽध्यापकः] 'a teacher engaged for a month'; @deva[मासं भृतः] = @deva[मासिकः कर्मकरः] 'a worker hired for a month'; @deva[मासं भूतः] = @deva[मासिको व्याधिः] 'a disease lasting a month'; @deva[मासं भावी] = @deva[मासिकः उत्सवः] 'a festival that will last a month'. Note: The solicitation or hiring itself takes only a moment—it is the result (teaching, serving) that extends over the time period.
"""

advanced = """
This @[sūtra] teaches the affixes after @deva[काल] words in @deva[द्वितीया] with four senses: @deva[अधीष्ट] (honorarily engaged per @ref[3.3.161]), @deva[भृत] (hired), @deva[भूत] (lasted), @deva[भावी] (will last). The @deva[द्वितीया] is by @ref[2.3.5] (time-extent). Examples: @deva[मासिकोऽध्यापकः], @deva[मासिकः कर्मकरः], @deva[मासिको व्याधिः], @deva[मासिकः उत्सवः]. The objection that @deva[अध्येषण]/@deva[भरण]] are momentary is answered: the affix refers to the result (teaching/service), not the act itself.
"""

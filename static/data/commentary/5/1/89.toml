id = "5.1.89"
numericId = "51089"

[en]
simple = """
The affixes are necessarily deleted after @deva[वर्षा] in a @deva[द्विगु] compound when referring to a sentient being's age. @deva[द्विवर्षो दारकः] 'a boy two years old'.
"""

standard = """
The affixes meaning 'accomplished' etc. (per @ref[5.1.76], @ref[5.1.80]) are necessarily deleted (not optionally as in @ref[5.1.88]) after @deva[वर्षा] forming a @deva[द्विगु] compound when referring to a sentient being (@deva[चित्तवत्]). Example: @deva[द्विवर्षो दारकः] 'a boy two years old'. When not referring to a sentient being: @deva[द्विवर्षीणो व्याधिः] (optional deletion per @ref[5.1.88]).
"""

advanced = """
This @[sūtra] teaches compulsory @deva[लुक्] after @deva[वर्षा] in @deva[द्विगु] when @deva[चित्तवत्] (sentient being) is qualified. The deletion here is obligatory, unlike the optional @deva[लुक्] of @ref[5.1.88]. Result: @deva[द्विवर्षो दारकः] 'two-year-old child'. Without @deva[चित्तवत्]: @deva[द्विवर्षीणो व्याधिः] (per @ref[5.1.88]).
"""

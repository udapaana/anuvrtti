id = "5.1.46"
numericId = "51046"

[en]
simple = """
The affix @deva[ष्ठन्] comes after @deva[पात्र] 'vessel/measure' in the sense of 'sown with that much'. @deva[पात्रस्य वापः] → @deva[पात्रिकं क्षेत्रम्] 'a field sown with a @deva[पात्र]-measure of grain'.
"""

standard = """
The affix @deva[ष्ठन्] (adding @deva[इक]) comes in the sense of 'sown with that quantity' after @deva[पात्र] 'vessel, measure of capacity'. This supersedes @deva[ठञ्]. The @deva[न्] of @deva[ष्ठन्] governs accent per @ref[6.1.197]; the @deva[ष्] triggers @deva[ङीष्] for the feminine per @ref[4.1.41]. Example: @deva[पात्रस्य वापः] = @deva[पात्रिकं क्षेत्रम्] 'a field sown with a @deva[पात्र]-measure'; feminine @deva[पात्रिकी क्षेत्रभक्तिः] 'a plot sown with a @deva[पात्र]'.
"""

advanced = """
This @[sūtra] teaches @deva[ष्ठन्] after @deva[पात्र] in the @deva[वाप] sense. The affix supersedes @deva[ठञ्]. The @deva[अनुबन्ध]s: @deva[न्] governs accent (@ref[6.1.197]); @deva[ष्] triggers feminine @deva[ङीष्] (@ref[4.1.41]). Derivation: @deva[पात्रस्य वापः क्षेत्रम्] = @deva[पात्रिकं क्षेत्रम्]; feminine @deva[पात्रिकी क्षेत्रभक्तिः].
"""

id = "5.1.20"
numericId = "51020"

[en]
simple = """
The affix @deva[ठक्] comes after the @deva[निष्कादि] words when they are not part of a compound. @deva[निष्क] + @deva[ठक्] → @deva[नैष्किकम्]; @deva[पाणिकम्], @deva[पादिकम्], @deva[माषिकम्].
"""

standard = """
The affix @deva[ठक्] is added after the @deva[निष्कादि] words (@deva[निष्क], @deva[पण], @deva[माष], @deva[वाहद्रोण], @deva[षष्टि]) when they are not part of a compound (@deva[असमासे]), with senses up to @ref[5.1.63]. This supersedes @deva[ठञ्]. Examples: @deva[नैष्किकम्], @deva[पाणिकम्], @deva[पादिकम्], @deva[माषिकम्]. When in a compound: @deva[परमनैष्किकम्], @deva[उत्तमनैष्किकम्] (with @deva[ठञ्] per @ref[5.1.18], and @deva[वृद्धि] of second member per @ref[7.3.17]). The explicit mention of @deva[असमासे] indicates (@deva[ज्ञापक]) that @deva[तदन्तविधि] (@ref[1.1.72]) applies in prior @[sūtras] but not in subsequent ones (except for @deva[संख्या]-preceded compounds up to @ref[5.1.115]).
"""

advanced = """
This @[sūtra] teaches @deva[ठक्] after @deva[निष्कादि] words in non-compound contexts. The @deva[निष्कादि] class contains 5 words: @deva[निष्क], @deva[पण], @deva[माष], @deva[वाहद्रोण], @deva[षष्टि]. In compounds, @deva[ठञ्] applies instead: @deva[परमनैष्किकम्] (with @deva[वृद्धि] of second term per @ref[7.3.17]). The condition @deva[असमासे] serves as @deva[ज्ञापक]: despite the maxim @deva[ग्रहणवता प्रातिपदिकेन तदन्तविधिर्नास्ति], @deva[तदन्तविधि] (@ref[1.1.72]) does apply in earlier @[sūtras] (e.g., @ref[5.1.2] @deva[गव्यम्], @deva[सुगव्यम्]; @ref[5.1.4] @deva[यवापूप्यम्]; @ref[5.1.6] @deva[राजदन्त्यम्]). In subsequent @[sūtras], @deva[तदन्तविधि] applies only to @deva[संख्या]-prefixed compounds and only up to @ref[5.1.115], and not when the affix is deleted by @deva[लुक्] (e.g., @deva[द्विशूर्पेण क्रीतम्] = @deva[द्विशौर्पिकम्], not @deva[द्विशौर्पम्]). The @deva[इष्टि]: @deva[प्राग्वतेः संख्यापूर्वपदानां तदन्तग्रहणमलुकि].
"""

id = "5.1.37"
numericId = "51037"

[en]
simple = """
The affixes taught from @ref[5.1.18] onward have the sense 'purchased with that price' when the base is in the instrumental case. @deva[सप्तत्या क्रीतम्] → @deva[साप्ततिकम्] 'purchased for seventy'.
"""

standard = """
This @[sūtra] specifies the primary sense of the thirteen affixes taught from @ref[5.1.18] to @ref[5.1.36]: @deva[तेन क्रीतम्] 'purchased with that'. The word @deva[तेन] indicates the instrumental (@deva[तृतीया]) case in construction, and @deva[क्रीतम्] gives the sense 'purchased'. Examples: @deva[सप्तत्या क्रीतम्] = @deva[साप्ततिकम्]; @deva[नैष्किकम्], @deva[पाणिकम्], @deva[पादिकम्], @deva[माषिकम्], @deva[शत्यम्], @deva[शतिकम्], @deva[द्विकम्], @deva[त्रिकम्]. The instrumental must express 'price' (@deva[करण] sense per @ref[2.3.18]), not 'agent'—so no affix in @deva[देवदत्तेन क्रीतम्] or @deva[पाणिना क्रीतम्]. The affix doesn't come after duals or plurals like @deva[प्रस्थाभ्यां क्रीतम्] (not idiomatic), but @deva[द्वि], @deva[त्रि] (inherently dual/plural) and @deva[मुद्ग], @deva[माष] (always used in plural, as one grain can't buy anything) do take the affix.
"""

advanced = """
This @[sūtra] defines the @deva[तेन क्रीतम्] sense for the thirteen affixes of @ref[5.1.18]-@ref[5.1.36]: @deva[ठञ्], @deva[ठक्], @deva[ठन्], @deva[यत्] (twice), @deva[कन्], @deva[ड्वुन्], @deva[टिठन्], @deva[अञ्], @deva[अण्] (twice), @deva[ख], @deva[ईकन्]. The @deva[तृतीया] must have @deva[करण] force (@ref[2.3.18]), not @deva[कर्तृ] force—hence no affix for @deva[देवदत्तेन क्रीतम्]. The affix doesn't apply after dual/plural bases that idiomatically don't function as price units (@deva[प्रस्थाभ्यां क्रीतम्], @deva[प्रस्थैः क्रीतम्]). Exceptions: @deva[द्वि], @deva[त्रि] are inherently dual/plural numerals and take affixes (@deva[द्वाभ्यां क्रीतम्] = @deva[द्विकम्]); @deva[मुद्ग], @deva[माष] are always plural in commercial contexts (@deva[मुद्गैः क्रीतम्] = @deva[मौद्गिकम्]).
"""

id = "5.1.115"
numericId = "51115"

[en]
simple = """
The affix @deva[वति] comes after a word in the instrumental case meaning 'like that' when similarity of action is meant. @deva[ब्राह्मणेन तुल्यं वर्तते] → @deva[ब्राह्मणवत्] 'like a @[brāhmaṇa]'.
"""

standard = """
The affix @deva[वति] (adding @deva[वत्]) comes after a word in the instrumental (@deva[तृतीया]) case with the sense of 'like that' (@deva[तेन तुल्यम्]) when the meaning is similarity of action (@deva[क्रियासामान्य]). Examples: @deva[ब्राह्मणेन तुल्यं वर्तते] = @deva[ब्राह्मणवत्] 'acts like a @[brāhmaṇa]'; @deva[राजवत्] 'like a king'. When the similarity is in quality (@deva[गुण]) rather than action, the affix doesn't apply: @deva[पुत्रेण सह स्थूलः] 'as big as the son', @deva[पुत्रेण तुल्यः पिङ्गलः] 'as tawny as the son'.
"""

advanced = """
This @[sūtra] teaches @deva[वति] after @deva[तृतीया] with @deva[तुल्य] sense when @deva[क्रिया] (action) similarity is meant. Examples: @deva[ब्राह्मणवत्], @deva[राजवत्]. The condition @deva[क्रियासामान्ये] excludes @deva[गुण] (quality) comparisons: *@deva[पुत्रवत् स्थूलः] is not formed.
"""

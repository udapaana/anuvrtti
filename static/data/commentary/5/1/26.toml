id = "5.1.26"
numericId = "51026"

[en]
simple = """
The affix @deva[अञ्] optionally comes after @deva[शूर्प] 'winnowing basket'. @deva[शूर्प] + @deva[अञ्] → @deva[शौर्पम्] or with @deva[ठञ्] → @deva[शौर्पिकम्] 'purchased for a @deva[शूर्प]'.
"""

standard = """
The affix @deva[अञ्] (adding @deva[अ]) comes optionally in the senses up to @ref[5.1.63] after @deva[शूर्प] 'winnowing basket'. This optionally supersedes @deva[ठञ्]. Examples: @deva[शूर्पेण क्रीतम्] = @deva[शौर्पम्] (with @deva[अञ्]) or @deva[शौर्पिकम्] (with @deva[ठञ्]).
"""

advanced = """
This @[sūtra] teaches optional @deva[अञ्] after @deva[शूर्प] in the @deva[आर्हीय] senses. The option is with @deva[ठञ्]: @deva[शूर्पेण क्रीतम्] = @deva[शौर्पम्] (by @deva[अञ्]) ~ @deva[शौर्पिकम्] (by @deva[ठञ्]). Both forms take @deva[वृद्धि] of the initial vowel.
"""

id = "5.1.96"
numericId = "51096"

[en]
simple = """
The affixes having the @deva[भव] sense (@ref[4.3.53], @ref[4.3.11]) come after time-denoting words meaning 'given in that' or 'done in that'. @deva[मासे दीयते कार्यं वा] → @deva[मासिकम्].
"""

standard = """
The affixes having the @deva[तत्र भवः] sense (@ref[4.3.53], @ref[4.3.11]) come after a time-denoting word with the sense of 'what is given in that' (@deva[तत्र दीयते]) and 'what is done in that' (@deva[तत्र कार्यम्]). Examples: @deva[मासे भवम्] = @deva[मासिकम्] (per @ref[4.3.11]), which also means 'given in a month' and 'done in a month'; @deva[सांवत्सरिकम्], @deva[प्रावृषेण्यम्] (@ref[4.3.17]), @deva[वासन्तिकम्] (@ref[4.3.20]), @deva[वासन्तम्] (@ref[4.3.16]), @deva[हैमनम्] (@ref[4.3.22]), @deva[हैमन्तम्] (@ref[4.3.16]), @deva[हैमन्तिकम्] (@ref[4.3.21]), @deva[शारदम्] (@ref[4.3.16]). All these also mean 'given or done in those seasons'. The word @deva[वत्] in @deva[भववत्] indicates that all rules of @ref[4.3.53] apply. This @[sūtra] also connects with @ref[5.1.95]: @deva[तत्र दीयते] applies to sacrifice-names—@deva[आग्निष्टोमिकं भक्तम्] 'food given at @deva[अग्निष्टोम]'. The governance of @deva[काल] (@ref[5.1.78]) ends here.
"""

advanced = """
This @[sūtra] extends the @deva[तत्र भवः] affixes (@ref[4.3.53], @ref[4.3.11]) to the @deva[दीयते]/@deva[कार्यम्]] senses after @deva[काल] words. All @ref[4.3.53] rules apply (indicated by @deva[वत्]). Examples: @deva[मासिकम्], @deva[सांवत्सरिकम्], @deva[प्रावृषेण्यम्], @deva[वासन्तिकम्], @deva[हैमनम्], etc. The @[sūtra] divides: one part joins @ref[5.1.95] (@deva[यज्ञाख्येभ्यः]): @deva[आग्निष्टोमिकं भक्तम्], @deva[राजसूयिकम्]. The @deva[काल]-@deva[अधिकार] of @ref[5.1.78] ends here.
"""

id = "5.1.90"
numericId = "51090"

[en]
simple = """
The anomalous word @deva[षष्टिकाः] means 'what matures in sixty nights'. It is a name for a kind of barley that ripens in sixty days.
"""

standard = """
The word @deva[षष्टिकाः] is an anomalously formed (@deva[निपातन]) derivative meaning 'what are matured in sixty nights'. It may be explained as @deva[षष्टिरात्रि] + @deva[कन्] in the instrumental case with the @deva[पच्यते] 'ripens' sense, then deleting @deva[रात्रि]: @deva[षष्टिरात्रेण पच्यन्ते] = @deva[षष्टिकाः] 'a kind of barley'. This is a proper name for that variety of barley, not applicable to pulses or beans that might also ripen in sixty days.
"""

advanced = """
This @[sūtra] teaches the @deva[निपातन] form @deva[षष्टिकाः] meaning 'ripened in sixty nights'. The derivation: @deva[षष्टिरात्रि] in @deva[तृतीया] + @deva[कन्] with @deva[पाक] sense, then @deva[रात्रि]-elision → @deva[षष्टिकाः]. This is a @deva[संज्ञा] (proper name) for a specific barley variety, not a general term for any grain ripening in 60 days.
"""

id = "5.1.83"
numericId = "51083"

[en]
simple = """
The affixes @deva[ण्य], @deva[यप्], and @deva[ठञ्] come after @deva[षण्मास] 'six months' when meaning age. @deva[षाण्मास्यः], @deva[षण्मास्यः], @deva[षाण्मासिकः].
"""

standard = """
The affixes @deva[ण्य] (adding @deva[य] with @deva[वृद्धि]), @deva[यप्] (adding @deva[य]), and @deva[ठञ्] (adding @deva[इक]) come in the sense of age after @deva[षण्मास] 'six months'. Three forms result: @deva[षाण्मास्यः] (with @deva[ण्य]), @deva[षण्मास्यः] (with @deva[यप्]), @deva[षाण्मासिकः] (with @deva[ठञ्]).
"""

advanced = """
This @[sūtra] teaches three affixes after @deva[षण्मास] in the @deva[वयस्] sense: @deva[ण्य] → @deva[षाण्मास्यः] (with @deva[वृद्धि]); @deva[यप्] → @deva[षण्मास्यः]; @deva[ठञ्] → @deva[षाण्मासिकः].
"""

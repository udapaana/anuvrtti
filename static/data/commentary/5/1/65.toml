id = "5.1.65"
numericId = "51065"

[en]
simple = """
The affix @deva[यत्] as well as the other affixes come after @deva[शीर्षच्छेद] 'beheading' in the accusative case meaning 'who deserves that always'. @deva[शीर्षच्छेद्यः] or @deva[शैर्षच्छेदिकः].
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) as well as the above affixes come after @deva[शीर्षच्छेद] 'beheading' in the accusative case with the sense of 'who deserves that under all circumstances'. Examples: @deva[शिरश्छेदं नित्यमर्हति] = @deva[शीर्षच्छेद्यः] (with @deva[यत्]) or @deva[शैर्षच्छेदिकः] (with @deva[ठञ्]). Note: The word @deva[शिरस्] is irregularly changed to @deva[शीर्ष] before the affix.
"""

advanced = """
This @[sūtra] teaches @deva[यत्] alongside the general affixes after @deva[शीर्षच्छेद] in the @deva[नित्यम् अर्हति] sense. Results: @deva[शीर्षच्छेद्यः] (with @deva[यत्]), @deva[शैर्षच्छेदिकः] (with @deva[ठञ्]). An irregular substitution occurs: @deva[शिरस्] → @deva[शीर्ष] before the affix.
"""

id = "5.1.87"
numericId = "51087"

[en]
simple = """
The affix @deva[ख] optionally comes after @deva[रात्रि] 'night', @deva[अहन्] 'day', and @deva[संवत्सर] 'year' in @deva[द्विगु] compounds with the senses of @ref[5.1.79] and @ref[5.1.82]. @deva[द्विरात्रीणः] or @deva[द्वैरात्रिकः] 'for two nights'.
"""

standard = """
The affix @deva[ख] (adding @deva[ईन]) comes optionally in the senses of @ref[5.1.79] (@deva[तेन निर्वृत्तम्]) and @ref[5.1.82] (@deva[द्विगोर्यप्]) after @deva[रात्रि] 'night', @deva[अहन्] 'day', and @deva[संवत्सर] 'year' when forming a @deva[द्विगु] compound. In the alternative, @deva[ठञ्] applies. Examples: @deva[द्विरात्रीणः] (with @deva[ख]) or @deva[द्वैरात्रिकः] (with @deva[ठञ्]) 'for two nights'; @deva[द्व्यहीनः] (per @ref[6.4.145]) or @deva[द्वैयह्निकः] 'for two days'; @deva[द्विसंवत्सरीणः] or @deva[द्विसांवत्सरिकः] (per @ref[7.3.15]) 'for two years'.
"""

advanced = """
This @[sūtra] teaches optional @deva[ख] after @deva[रात्रि], @deva[अहन्], @deva[संवत्सर] in @deva[द्विगु] compounds with @ref[5.1.79] and @ref[5.1.82] senses. The alternative is @deva[ठञ्]. Results: @deva[द्विरात्रीणः] ~ @deva[द्वैरात्रिकः]; @deva[द्व्यहीनः] (by @ref[6.4.145]) ~ @deva[द्वैयह्निकः]; @deva[द्विसंवत्सरीणः] ~ @deva[द्विसांवत्सरिकः] (with irregular @deva[वृद्धि] per @ref[7.3.15]).
"""

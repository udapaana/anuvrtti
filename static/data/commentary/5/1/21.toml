id = "5.1.21"
numericId = "51021"

[en]
simple = """
The affixes @deva[ठन्] and @deva[यत्] come after @deva[शत्] 'hundred' when it is not part of a compound and when it doesn't merely denote 'a hundred'. @deva[शत] + @deva[यत्] → @deva[शत्यम्] or @deva[शत] + @deva[ठन्] → @deva[शतिकम्] 'purchased for a hundred'.
"""

standard = """
The affixes @deva[ठन्] (adding @deva[इक]) and @deva[यत्] (adding @deva[य]) come in the senses up to @ref[5.1.63] after @deva[शत्] when: (1) it is not part of a compound (@deva[असमासे] from previous @[sūtra] via @deva[च]), and (2) it does not merely mean 'a hundred' (@deva[अशते]). These supersede @deva[कन्] of @ref[5.1.22]. Example: @deva[शतेन क्रीतम्] = @deva[शत्यम्] or @deva[शतिकम्] 'purchased for a hundred coins'. When @deva[शत] merely means 'a hundred' (as in @deva[शतं परिमाणमस्य] = @deva[शतकं निदानम्] 'a band whose measure is hundred'), @deva[कन्] applies instead. In compounds: @deva[द्विशतेन क्रीतम्] = @deva[द्विशतकम्] (with @deva[कन्] per @ref[5.1.22]).
"""

advanced = """
This @[sūtra] teaches @deva[ठन्] and @deva[यत्] after @deva[शत्] with two conditions: @deva[असमासे] (non-compound, via @deva[च] from @ref[5.1.20]) and @deva[अशते] (not meaning merely 'hundred'). The @deva[अशते] condition pertains to affix-sense, not base-sense (the base @deva[शत] always means 'hundred'). When the derivative essentially contains 'hundred' as its integral part (e.g., @deva[शतकः ग्रन्थः] 'a book of hundred chapters'), @deva[कन्] applies per @ref[5.1.58]; but @deva[शत्यं शाटकशतम्] 'a vehicle bought for hundred' doesn't essentially contain hundred. @deva[वार्त्तिक]: @deva[शतप्रतिषेधे अन्यशतत्वे अप्रतिषेधः]—the prohibition of @deva[शत] doesn't apply when a different 'hundred-sense' is involved. For compounds like @deva[द्विशतम्], @deva[त्रिशतम्]: @deva[द्विशतेन क्रीतम्] = @deva[द्विशतकम्] (with @deva[कन्]), applying @deva[तदन्तविधि] per the @deva[इष्टि] of @ref[5.1.20].
"""

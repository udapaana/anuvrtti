id = "5.1.85"
numericId = "51085"

[en]
simple = """
The affix @deva[ख] comes after @deva[समा] 'year' in the four senses of 'solicited', 'hired', 'lasted', and 'will last'. @deva[समामधीष्टः भृतः भूतः भावी वा] → @deva[समीनः].
"""

standard = """
The affix @deva[ख] (adding @deva[ईन]) comes in the four senses of @deva[अधीष्ट] 'solicited', @deva[भृत] 'hired', @deva[भूत] 'lasted', and @deva[भावी] 'will last' after @deva[समा] 'year'. This supersedes @deva[ठञ्]. Example: @deva[समामधीष्टः भृतः भूतः भावी वा] = @deva[समीनः] 'engaged/hired/lasting for a year'. Some say the affix also has the @deva[तेन निर्वृत्तम्] sense (@ref[5.1.79]): @deva[समया निर्वृत्तः] = @deva[समीनः] 'accomplished in a year'.
"""

advanced = """
This @[sūtra] teaches @deva[ख] after @deva[समा] in the @ref[5.1.80] senses (@deva[अधीष्ट], @deva[भृत], @deva[भूत], @deva[भावी]). The @deva[ख] supersedes @deva[ठञ्]. Result: @deva[समीनः]. An alternative view includes the @ref[5.1.79] sense (@deva[निर्वृत्त]): @deva[समया निर्वृत्तः] = @deva[समीनः].
"""

id = "5.1.119"
numericId = "51119"

[en]
simple = """
The affixes @deva[त्व] and @deva[तल्] come after a word in the genitive case meaning 'the nature thereof'. @deva[अश्वस्य भावः] → @deva[अश्वत्वम्] or @deva[अश्वता] 'horse-ness'.
"""

standard = """
The affixes @deva[त्व] (adding @deva[त्व]) and @deva[तल्] (adding @deva[ता]) come after a word in the genitive (@deva[षष्ठी]) case with the sense of 'the nature thereof' (@deva[तस्य भावः]). Examples: @deva[अश्वस्य भावः] = @deva[अश्वत्वम्] or @deva[अश्वता] 'the nature of being a horse, horse-ness'; @deva[गोत्वम्] or @deva[गोता] 'cow-ness'.
"""

advanced = """
This @[sūtra] teaches @deva[त्व] and @deva[तल्] after @deva[षष्ठी] with @deva[भाव] (abstract nature) sense. These are the primary @deva[भाव] affixes. Examples: @deva[अश्वत्वम्] ~ @deva[अश्वता], @deva[गोत्वम्] ~ @deva[गोता].
"""

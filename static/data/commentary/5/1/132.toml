id = "5.1.132"
numericId = "51132"

[en]
simple = """
The affix @deva[वुञ्] comes after polysyllabic stems with penultimate @deva[य्] and heavy penultimate syllable. @deva[रमणीय] 'delightful' → @deva[रामणीयकम्] 'delightfulness'.
"""

standard = """
A polysyllabic stem (@deva[बहुच्]) whose penultimate consonant is @deva[य्] (@deva[योपध]) and whose penultimate syllable is heavy (@deva[गुरूपोत्तम]) takes @deva[वुञ्] (realized as @deva[अक]) for @deva[भाव/कर्म]. The term @deva[उपोत्तम] refers to the syllable before the last. Examples: @deva[रमणीयस्य भावः कर्म वा] → @deva[रामणीयकम्] 'charm/delightfulness'; @deva[वसनीय] → @deva[वासनीयकम्].
"""

advanced = """
The rule targets stems satisfying three conditions: (1) @deva[बहुच्] (trisyllabic or longer), (2) @deva[योपध] (penultimate segment is @deva[य्]), (3) @deva[गुरूपोत्तम] (penultimate syllable is prosodially heavy). The @deva[वुञ्]-affix (= @deva[अक] + @deva[वृद्धि]) derives abstracts from adjectives in @deva[°ईय]. The @deva[गुरु] penult typically results from the long @deva[ई] before @deva[य], as in @deva[रमणीय], @deva[वसनीय], @deva[करणीय], etc.
"""

id = "5.1.75"
numericId = "51075"

[en]
simple = """
The affix @deva[ष्कन्] comes after @deva[पथ्] 'path' in the accusative case meaning 'who goes there'. @deva[पन्थानं गच्छति] → @deva[पथिकः] 'traveler', fem. @deva[पथिकी].
"""

standard = """
The affix @deva[ष्कन्] (adding @deva[इक]) comes in the sense of 'who goes there' after @deva[पथ्] 'path' in the accusative case. The @deva[ष्] of @deva[ष्कन्] triggers @deva[ङीष्] for the feminine per @ref[4.1.41]; the @deva[न्] governs accent per @ref[6.1.197]. Example: @deva[पन्थानं गच्छति] = @deva[पथिकः] 'traveler, wayfarer'; feminine @deva[पथिकी].
"""

advanced = """
This @[sūtra] teaches @deva[ष्कन्] after @deva[पथ्] in @deva[द्वितीया] with the @deva[गच्छति] sense. The @deva[अनुबन्ध]s: @deva[ष्] triggers feminine @deva[ङीष्] (@ref[4.1.41]); @deva[न्] governs accent (@ref[6.1.197]). Result: @deva[पथिकः], fem. @deva[पथिकी] 'one who travels, wayfarer'.
"""

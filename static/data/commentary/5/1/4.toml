id = "5.1.4"
numericId = "51004"

[en]
simple = """
The affix @deva[यत्] optionally comes after words denoting offerings and @deva[अपूपादि] words. @deva[आमिक्षा] + @deva[यत्] → @deva[आमिक्ष्यम्] or with @deva[छ] → @deva[आमिक्षीयम्] 'fit for making curds'.
"""

standard = """
The affix @deva[यत्] comes optionally after words denoting sacrificial offerings (@deva[हवि]-class meanings) and the @deva[अपूपादि] words, in the @deva[प्राक्क्रितीय] senses. Examples: @deva[आमिक्ष्यं दधि] or @deva[आमिक्षीयम्] 'curd fit for making @deva[आमिक्षा]'; @deva[पुरोडाश्याः] or @deva[पुरोडाशीयाः स्तण्डुलाः] 'rice fit for making @deva[पुरोडाश]'. Note: @deva[हवि] in @deva[गवादि] (@ref[5.1.2]) necessarily takes @deva[यत्] without option; here @deva[हवि] refers to offerings in general, not the word-form itself. The @deva[अपूपादि] class includes 25 words like @deva[अपूप], @deva[तण्डुल], @deva[ओदन], @deva[सूप], etc. A @deva[वार्त्तिक] adds that @deva[यत्] optionally comes after words denoting food modifications.
"""

advanced = """
This @[sūtra] teaches optional @deva[यत्] after @deva[हवि]-denoting words and the @deva[अपूपादि] class. The option is with @deva[छ]: @deva[आमिक्ष्यम्] ~ @deva[आमिक्षीयम्], @deva[अपूप्यम्] ~ @deva[अपूपीयम्]. The word @deva[हवि] occurring in @deva[गवादि] (@ref[5.1.2]) takes obligatory @deva[यत्]; here the reference is to the semantic class of offerings, not the specific word @deva[हवि]. The @deva[अपूपादि] @[gaṇa] contains 25 items including @deva[अपूप], @deva[तण्डुल], @deva[अभ्यूष], @deva[पृथुक], @deva[ओदन], @deva[सूप], @deva[पूप], @deva[किण्व], @deva[मुसल], @deva[यूप], @deva[स्थूणा], @deva[अश्व], etc. The @deva[वार्त्तिक] extends optional @deva[यत्] to @deva[अन्नविकार] words; however, @deva[सक्तु] (per @ref[5.1.2]) takes obligatory @deva[यत्] without option.
"""

id = "5.1.40"
numericId = "51040"

[en]
simple = """
The affix @deva[छ] also comes after @deva[पुत्र] 'son', in addition to @deva[यत्], in the sense of 'relationship or portent for its sake'. @deva[पुत्रीयम्] or @deva[पुत्र्यम्].
"""

standard = """
The affix @deva[छ] (adding @deva[ईय]) also comes, as well as @deva[यत्] (adding @deva[य]), after @deva[पुत्र] 'son' in the sense of 'relationship or portent for its sake'. Since @deva[पुत्र] is disyllabic, it would take @deva[यत्] by @ref[5.1.39]; this @[sūtra] ordains @deva[छ] as an additional option. Example: @deva[पुत्रस्य निमित्तं संयोग उत्पातो वा] = @deva[पुत्रीयम्] (with @deva[छ]) or @deva[पुत्र्यम्] (with @deva[यत्]).
"""

advanced = """
This @[sūtra] adds optional @deva[छ] to the @deva[यत्] already applicable to @deva[पुत्र] (a disyllabic word per @ref[5.1.39]). Both affixes express the @ref[5.1.38] sense (@deva[संयोग]/@deva[उत्पात] @deva[निमित्त]]). Results: @deva[पुत्रस्य निमित्तं संयोग उत्पातो वा] = @deva[पुत्रीयम्] (with @deva[छ]) ~ @deva[पुत्र्यम्] (with @deva[यत्]).
"""

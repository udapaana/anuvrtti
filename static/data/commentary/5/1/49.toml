id = "5.1.49"
numericId = "51049"

[en]
simple = """
The affix @deva[यत्] comes after @deva[भाग] 'share' in the sense of 'interest, rent, etc. given therein'. @deva[भाग्यं शतम्] or @deva[भागिकं शतम्] 'a hundred in which a share is given'.
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) comes after @deva[भाग] 'share, portion' in the sense of 'interest, rent, profit, tax, or bribe given therein'. The word @deva[च] in the @[sūtra] also draws in @deva[ठन्]. These supersede @deva[ठञ्]. Examples: @deva[भागो वृद्ध्यादिः अस्मिन् दीयते] = @deva[भाग्यं शतम्] or @deva[भागिकं शतम्] 'a hundred in which a share-portion is given as interest etc.'; @deva[भाग्या विंशतिः] or @deva[भागिका विंशतिः]. The word @deva[भाग] also denotes @deva[रूपकार्ध] 'half a rupee'.
"""

advanced = """
This @[sūtra] teaches @deva[यत्] (and @deva[ठन्] via @deva[च]) after @deva[भाग] in the @ref[5.1.47] senses. These supersede @deva[ठञ्]. Examples: @deva[भाग्यं शतम्] (with @deva[यत्]) ~ @deva[भागिकं शतम्] (with @deva[ठन्]); @deva[भाग्या विंशतिः] ~ @deva[भागिका विंशतिः]. Like @deva[अर्ध], @deva[भाग] technically denotes @deva[रूपकार्ध].
"""

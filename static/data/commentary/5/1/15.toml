id = "5.1.15"
numericId = "51015"

[en]
simple = """
The affix @deva[अञ्] comes after words denoting leather products in the 'primitive for product' sense. @deva[वर्ध्र] + @deva[अञ्] → @deva[वार्ध्रं चर्म] 'leather fit for making a thong'.
"""

standard = """
The affix @deva[अञ्] (adding @deva[अ]) is used in the sense of 'primitive serviceable for a product' after words expressing products made of leather (@deva[चर्मणः विकृति]). This supersedes @deva[छ]. The word @deva[चर्मणः] in the @[sūtra] is in the genitive case. Examples: @deva[वार्ध्रं चर्म] 'leather suitable for making a @deva[वर्ध्र] (leather thong)'; @deva[वारत्रं चर्म] 'leather suitable for making a @deva[वरत्र] (leather strap)'.
"""

advanced = """
This @[sūtra] teaches @deva[अञ्] after @deva[चर्मविकृति] (leather-product) words in the @deva[प्रकृति-विकृति] sense. The genitive @deva[चर्मणः] specifies the domain: products of leather. The @deva[अञ्] adds @deva[अ] with @deva[वृद्धि]: @deva[वर्ध्र] → @deva[वार्ध्र], @deva[वरत्र] → @deva[वारत्र]. Examples: @deva[वार्ध्रं चर्म] 'leather fit for a @deva[वर्ध्र] (thong)', @deva[वारत्रं चर्म] 'leather fit for a @deva[वरत्र] (strap)'. This @deva[अञ्] is an @deva[अपवाद] to @deva[छ], but is itself overridden by @deva[ञ्य] of @ref[5.1.14] for @deva[उपानह्]-derivatives.
"""

id = "5.1.23"
numericId = "51023"

[en]
simple = """
When @deva[कन्] comes after a numeral ending in @deva[वत्], it optionally takes the augment @deva[इट्]. @deva[तावत्] + @deva[कन्] → @deva[तावत्कः] or @deva[तावतिकः] 'that much'.
"""

standard = """
The affix @deva[कन्] following a numeral ending in @deva[वत्] optionally takes the augment @deva[इट्] (adding @deva[इ]), with senses up to @ref[5.1.63]. Words ending in @deva[वत्] are @deva[संख्या] per @ref[1.1.23] and take @deva[कन्] by @ref[5.1.22]. Examples: @deva[तावत्कः] or @deva[तावतिकः] 'of that measure'; @deva[यावत्कः] or @deva[यावतिकः] 'of what measure'.
"""

advanced = """
This @[sūtra] teaches optional @deva[इट्]-augment for @deva[कन्] after @deva[वत्]-final numerals. Since @deva[वत्]-finals are @deva[संख्या] (per @ref[1.1.23]), they take @deva[कन्] by @ref[5.1.22]. This @[sūtra] adds the option of @deva[इट्] before @deva[कन्], yielding @deva[तावतिकः] alongside @deva[तावत्कः], and @deva[यावतिकः] alongside @deva[यावत्कः]. The @deva[इट्] is inserted between the stem and affix.
"""

id = "5.1.123"
numericId = "51123"

[en]
simple = """
The affixes @deva[ष्यञ्] and @deva[इमनिच्] come after words for colors and the @deva[दृढादि] class to express 'nature'. @deva[शुक्ल] 'white' → @deva[शौक्ल्यम्] or @deva[शुक्लिमन्]. @deva[दृढ] 'firm' → @deva[दार्ढ्यम्] or @deva[द्रढिमा].
"""

standard = """
Color-denoting words and the @deva[दृढादि] class take both @deva[ष्यञ्] and @deva[इमनिच्] to express @deva[भाव]. The @deva[ष्] of @deva[ष्यञ्] indicates feminine formation by @deva[ङीष्] (per @ref[3.1.41]). Examples: @deva[शुक्लस्य भावः] → @deva[शौक्ल्यम्] (by @deva[ष्यञ्]) or @deva[शुक्लिमन्] (by @deva[इमनिच्]); also @deva[शुक्लत्वम्/शुक्लता] remain available. @deva[कृष्ण] 'black' → @deva[कार्ष्ण्यम्/कृष्णिमन्/कृष्णत्वम्/कृष्णता]; @deva[दृढ] → @deva[दार्ढ्यम्/द्रढिमा/दृढत्वम्/दृढता].
"""

advanced = """
The @deva[वर्णवाचिन्] (color-words) and @deva[दृढादि] @deva[गण] are co-domains for dual-affix licensing (@deva[ष्यञ्] and @deva[इमनिच्]). The @deva[षकार] of @deva[ष्यञ्] is an @deva[इत्] triggering @ref[3.1.41] for @deva[ङीष्]-feminine. This creates a rich derivational paradigm: for @deva[शुक्ल], four @deva[भाव]-forms exist (@deva[शौक्ल्यम्], @deva[शुक्लिमन्], @deva[शुक्लत्वम्], @deva[शुक्लता]). The @deva[इमनिच्] forms show characteristic @deva[मत्वर्थीय] inflection (nom. sg. @deva[°मा]).
"""

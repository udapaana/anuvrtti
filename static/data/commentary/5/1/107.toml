id = "5.1.107"
numericId = "51107"

[en]
simple = """
The affix @deva[यत्] comes after @deva[काल] 'time' meaning 'the time has come for it'. @deva[काल्यः तापः] 'timely heat'; @deva[काल्यं शीतम्] 'timely cold'.
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) comes in the sense of 'the time has come for it' after @deva[काल] 'time'. Examples: @deva[काल्यः तापः] 'timely/seasonal heat'; @deva[काल्यं शीतम्] 'timely/seasonal cold'. For accent, see @ref[6.1.213].
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[काल] with @deva[प्राप्त] sense. Results: @deva[काल्यः], @deva[काल्यम्] 'timely, seasonal'. Accent per @ref[6.1.213].
"""

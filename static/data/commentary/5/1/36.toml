id = "5.1.36"
numericId = "51036"

[en]
simple = """
The affix @deva[अण्] also optionally comes after @deva[शाण] when preceded by @deva[द्वि] or @deva[त्रि], in addition to @deva[यत्]. @deva[द्विशाण्यम्], @deva[द्वैशाणम्], or @deva[द्विशाणम्].
"""

standard = """
The affix @deva[अण्] (adding @deva[अ]) as well as @deva[यत्] comes optionally in the @deva[आर्हीय] senses (@ref[5.1.37]-63) after @deva[शाण] when preceded by @deva[द्वि] or @deva[त्रि]. The @deva[यत्] is drawn in from the previous @[sūtra] by @deva[च]. Thus three forms are possible: @deva[द्विशाण्यम्] (with @deva[यत्]), @deva[द्वैशाणम्] (with @deva[अण्]), and @deva[द्विशाणम्] (with @deva[लुक्]); similarly @deva[त्रिशाण्यम्], @deva[त्रैशाणम्], @deva[त्रिशाणम्]. Note: The irregular @deva[वृद्धि] of the second term taught in @ref[7.3.15]-@ref[7.3.17] does not apply to @deva[शाण] (see @ref[7.3.17]); the @deva[वृद्धि] here is regular per @ref[7.2.117].
"""

advanced = """
This @[sūtra] teaches optional @deva[अण्] (in addition to @deva[यत्] from @ref[5.1.35]) after @deva[शाण] in compounds with @deva[द्वि] or @deva[त्रि]. Three forms result: (1) @deva[द्विशाण्यम्] with @deva[यत्]; (2) @deva[द्वैशाणम्] with @deva[अण्] (regular @deva[वृद्धि] per @ref[7.2.117]); (3) @deva[द्विशाणम्] with @deva[लुक्] of @deva[ठञ्]. The word @deva[शाण] is specifically excluded from the irregular @deva[वृद्धि] of numeral compounds taught in @ref[7.3.15]-@ref[7.3.17].
"""

id = "5.1.125"
numericId = "51125"

[en]
simple = """
The affix @deva[यत्] comes after @deva[स्तेन] 'thief' to mean 'nature/action thereof', with @deva[न] deleted. @deva[स्तेनस्य भावः कर्म वा] → @deva[स्तेयम्] 'theft/thieving'.
"""

standard = """
After @deva[स्तेन] 'thief' in the genitive, the affix @deva[यत्] (realized as @deva[य]) applies with obligatory deletion of @deva[न्]. Derivation: @deva[स्तेन] + @deva[य] → @deva[स्ते] + @deva[य] (@deva[न्]-deletion) → @deva[स्तेयम्] 'theft'. Some grammarians split this into two rules: (1) @deva[स्तेनात् ष्यञ्] giving @deva[स्तैन्यम्], (2) @deva[ततो यन् न-लोपश्च] giving @deva[स्तेयम्]. Both forms are thus attested.
"""

advanced = """
The @[sūtra] prescribes @deva[यत्]-suffixation with concomitant @deva[नकारलोप] for @deva[स्तेन]-base. The @deva[नलोप] is @deva[अवयवलोप] (stem-internal deletion), yielding @deva[स्ते] + @deva[य] → @deva[स्तेयम्]. An alternative @deva[पाठ] divides the rule, licensing parallel @deva[ष्यञ्]-derivation (@deva[स्तैन्यम्]) alongside @deva[यत्]-derivation (@deva[स्तेयम्]). Both derivatives appear in classical usage with identical @deva[भाव]//@deva[कर्म] semantics.
"""

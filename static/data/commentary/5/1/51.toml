id = "5.1.51"
numericId = "51051"

[en]
simple = """
The affixes @deva[ठन्] and @deva[कन्] come after @deva[वसन] 'cloth' and @deva[द्रव्य] 'goods' respectively in the sense of 'who carries that'. @deva[वस्नं हरति] → @deva[वस्निकः]; @deva[द्रव्यकः].
"""

standard = """
The affix @deva[ठन्] (adding @deva[इक]) comes after @deva[वसन] 'cloth', and @deva[कन्] (adding @deva[क]) comes after @deva[द्रव्य] 'goods, material', when in the accusative case, with the sense of 'who carries or conveys that'. Examples: @deva[वस्नं हरति वहति वा] = @deva[वस्निकः] 'cloth-carrier'; @deva[द्रव्यकः] 'goods-carrier'.
"""

advanced = """
This @[sūtra] specifies @deva[ठन्] for @deva[वसन] and @deva[कन्] for @deva[द्रव्य] in the @ref[5.1.50] sense (carrying). Derivations: @deva[वसन] + @deva[ठन्] → @deva[वस्निकः]; @deva[द्रव्य] + @deva[कन्] → @deva[द्रव्यकः]. The @deva[द्वितीया] (accusative) construction applies.
"""

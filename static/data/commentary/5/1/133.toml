id = "5.1.133"
numericId = "51133"

[en]
simple = """
The affix @deva[वुञ्] comes after @deva[द्वन्द्व] compounds and the @deva[मनोज्ञादि] class to express 'nature/action'. @deva[गोपालपशुपाल] (dvandva) → @deva[गोपालपशुपालिका]. @deva[मनोज्ञ] 'pleasing' → @deva[मानोज्ञकम्].
"""

standard = """
After @deva[द्वन्द्व] compounds (copulative) and the @deva[मनोज्ञादि] class, @deva[वुञ्] (realized as @deva[अक/इक]) denotes @deva[भाव/कर्म]. Examples with @deva[द्वन्द्व]: @deva[गोपालपशुपालानां भावः कर्म वा] → @deva[गोपालपशुपालिका]; @deva[शिष्योपाध्यायानां] → @deva[शैष्योपाध्यायिका]; @deva[कौत्सकुशिकानां] → @deva[कौत्सकुशिकिका]. From @deva[मनोज्ञादि]: @deva[मनोज्ञ] → @deva[मानोज्ञकम्]; @deva[कल्याण] → @deva[कल्याणकम्].
"""

advanced = """
The @deva[द्वन्द्व]-domain and @deva[मनोज्ञादि] @deva[गण] license @deva[वुञ्]. For @deva[द्वन्द्व] compounds, the derivative often takes @deva[इक]-form (feminine-appearing but neuter in gender): @deva[गोपालपशुपालिका]. The @deva[मनोज्ञादि] includes: @deva[मनोज्ञ], @deva[प्रियरूप], @deva[अमिरूप], @deva[कल्याण], @deva[मेधाविन्], @deva[आढ्य], @deva[कुलपुत्र], @deva[छान्दस], @deva[छात्र], @deva[श्रोत्रिय], etc. The semantic output denotes collective/institutional abstracts.
"""

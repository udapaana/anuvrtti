id = "5.1.71"
numericId = "51071"

[en]
simple = """
The affixes @deva[घ] and @deva[खञ्] come after @deva[यज्ञ] 'sacrifice' and @deva[ऋत्विज्] 'priest' respectively in the sense of 'deserving that'. @deva[यज्ञियो ब्राह्मणः] 'a @[brāhmaṇa] worthy of sacrifice'; @deva[आर्त्विजीनो ब्राह्मणः].
"""

standard = """
The affix @deva[घ] (adding @deva[इय]) comes after @deva[यज्ञ] 'sacrifice', and @deva[खञ्] (adding @deva[ईन]) comes after @deva[ऋत्विज्] 'priest', in the sense of 'deserving that'. These supersede @deva[ठक्]. Examples: @deva[यज्ञियो ब्राह्मणः] 'a @[brāhmaṇa] worthy of honor at a sacrifice'; @deva[आर्त्विजीनो ब्राह्मणः] 'a @[brāhmaṇa] deserving priestly status'. @deva[वार्त्तिक]: These affixes also mean 'deserving the performance thereof': @deva[यज्ञकर्मार्हति] = @deva[यज्ञियो देशः] 'a place fit for sacrifice'; @deva[ऋत्विक्कर्मार्हति] = @deva[आर्त्विजीनं ब्राह्मणकुलम्] 'a @[brāhmaṇa] family deserving priestly duties'. This @[sūtra] ends the governing power of @deva[ठक्] (@ref[5.1.19]); henceforth @deva[ठञ्] (@ref[5.1.18]) governs.
"""

advanced = """
This @[sūtra] teaches @deva[घ] after @deva[यज्ञ] and @deva[खञ्] after @deva[ऋत्विज्] in the @deva[अर्हति] sense. These supersede @deva[ठक्]. Results: @deva[यज्ञियः], @deva[आर्त्विजीनः]. A @deva[वार्त्तिक] extends the sense to 'deserving the performance': @deva[यज्ञकर्मार्हति] = @deva[यज्ञियो देशः]; @deva[ऋत्विक्कर्मार्हति] = @deva[आर्त्विजीनं ब्राह्मणकुलम्]. The @deva[अधिकार] of @deva[ठक्] (@ref[5.1.19]) ends here; @deva[ठञ्] (@ref[5.1.18]) resumes governance.
"""

id = "5.1.66"
numericId = "51066"

[en]
simple = """
The affix @deva[यत्] comes after @deva[दण्डादि] words in the accusative case meaning 'who deserves that'. @deva[दण्डमर्हति] → @deva[दण्ड्यः] 'deserving punishment'.
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) comes after @deva[दण्डादि] words in the accusative case with the sense of 'who deserves that'. The word @deva[नित्य] does not govern this @[sūtra]. This @deva[यत्] supersedes @deva[ठक्] (@ref[5.1.19]). Examples: @deva[दण्डमर्हति] = @deva[दण्ड्यः] 'deserving punishment/death'; @deva[मुसल्यः] 'deserving the club'. The @deva[दण्डादि] class contains 15 words: @deva[दण्ड], @deva[मुसल], @deva[मधुपर्क], @deva[कशा], @deva[अर्घ], @deva[मेघ], @deva[मेधा], @deva[सुवर्ण], @deva[उदक], @deva[वध], @deva[युग], @deva[गुहा], @deva[भाग], @deva[इभ], @deva[भङ्ग].
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[दण्डादि] words in the @deva[अर्हति] sense (without @deva[नित्य]). The @deva[यत्] supersedes @deva[ठक्]. The @deva[दण्डादि] @[gaṇa] has 15 words. Examples: @deva[दण्ड्यः] 'punishable', @deva[मुसल्यः], etc. Some texts give the @[sūtra] as @deva[दण्डादिभ्यो यत्]; another reading draws @deva[यत्] from the previous @[sūtra].
"""

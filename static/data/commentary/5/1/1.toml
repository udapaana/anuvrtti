id = "5.1.1"
numericId = "51001"

[en]
simple = """
From this @[sūtra] through @ref[5.1.37], the affix @deva[छ] is the default. Example: @deva[वत्सेभ्यो हितः] → @deva[वत्सीयः] 'fit for calves'.
"""

standard = """
This is a heading @[sūtra] (@deva[अधिकार]) establishing that the affix @deva[छ] governs @[sūtras] @ref[5.1.1] through @ref[5.1.37]. The various senses in this section include 'good for that' (@deva[तस्मै हितम्], @ref[5.1.5]), 'primitive for a product' (@ref[5.1.12]), and 'purchased with' (@ref[5.1.16]). Example: @deva[वत्सेभ्यो हितो गोधुक्] = @deva[वत्सीयः] 'a cow-milker fit for calves'. Note that the jurisdiction of @deva[छ] as an affix extends only to @[sūtra] 17, after which @deva[ठञ्] becomes the ruling affix.
"""

advanced = """
This @deva[अधिकार] @[sūtra] establishes @deva[छ] as the governing affix for the @deva[प्राक्क्रितीय] section (@ref[5.1.1]-@ref[5.1.37]). The three primary senses are: @deva[तस्मै हितम्] 'beneficial for that' (@ref[5.1.5]), @deva[प्रकृतौ विकृतेः] 'primitive serviceable for a product' (@ref[5.1.12]), and @deva[तेन क्रीतम्] 'purchased with' (@ref[5.1.16]). Example derivations: @deva[वत्सेभ्यो हितः] = @deva[वत्सीयः], @deva[करभीयः उष्ट्रः]. The limitation to @[sūtra] 37 pertains to the meaning (@deva[अर्थ]) of the affixes, not the affix @deva[छ] itself, which as an affix-form is superseded by @deva[ठञ्] after @[sūtra] 17.
"""

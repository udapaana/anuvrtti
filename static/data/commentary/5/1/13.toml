id = "5.1.13"
numericId = "51013"

[en]
simple = """
The affix @deva[ढञ्] comes after @deva[छदिस्], @deva[उपधि], and @deva[बालि] in the 'primitive for product' sense. @deva[छदिस्] + @deva[ढञ्] → @deva[छादिषेयाणि तृणानि] 'grass fit for thatching'.
"""

standard = """
The affix @deva[ढञ्] (adding @deva[एय]) is used in the sense of 'primitive serviceable for a product' after the words @deva[छदिस्] 'thatch', @deva[उपधि] 'wheel-part', and @deva[बालि] 'tribute'. This supersedes @deva[छ]. Examples: @deva[छादिषेयाणि तृणानि] 'grass suitable for thatching'; @deva[औपधेयं दारु] 'wood suitable for the wheel-felloe'; @deva[बालेयाः तण्डुलाः] 'rice suitable for tribute'. The affix also comes after @deva[उपधि] without changing the sense: @deva[उपधि] 'that which is placed under' = @deva[रथाङ्ग] 'wheel-part', and @deva[औपधेय] has the same meaning.
"""

advanced = """
This @[sūtra] teaches @deva[ढञ्] after @deva[छदिस्], @deva[उपधि], and @deva[बालि] in the @deva[प्रकृति-विकृति] sense. The affix @deva[ढञ्] adds @deva[एय] (with @deva[वृद्धि]). Examples: @deva[छादिषेयाणि तृणानि] (grass for thatch), @deva[औपधेयं दारु] (wood for wheel-felloe), @deva[बालेयाः तण्डुलाः] (rice for tribute). A note explains that @deva[उपधि] (derived as @deva[उपधीयते इति]) means @deva[रथाङ्ग] 'the part of a wheel between the nave and circumference', and @deva[औपधेय] retains this meaning (the affix is @deva[अर्थाभाव]—meaningless). This is an @deva[अपवाद] to @deva[छ].
"""

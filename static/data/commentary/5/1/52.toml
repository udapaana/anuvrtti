id = "5.1.52"
numericId = "51052"

[en]
simple = """
The affixes also mean 'capable of holding that, takes away that, or cooks that'. @deva[प्रस्थं संभवति] → @deva[प्रास्थिकः] 'a vessel capable of holding a @deva[प्रस्थ]'.
"""

standard = """
The above affixes also have the sense of 'what is capable of holding that (@deva[संभव]), takes away/contains that (@deva[अवहार]), or cooks that (@deva[पचति])'. The base is in the accusative (@deva[तद्]). @deva[संभव] = capacity to hold an exact quantity; @deva[अवहार] = taking away/containing. Examples: @deva[प्रस्थं संभवति] = @deva[प्रास्थिकः] 'a vessel holding a @deva[प्रस्थ]'; @deva[प्रस्थम् अवहरति] or @deva[पचति] = @deva[प्रास्थिकः] 'a vessel or person that takes/cooks a @deva[प्रस्थ]'; @deva[क्रौडविकः], @deva[खारीकः]. The word @deva[संभव] doesn't govern @deva[पचति]: @deva[प्रस्थं पचति ब्राह्मणी] = @deva[प्रास्थिकी] 'a @[brāhmaṇa] woman who cooks a @deva[प्रस्थ]'. @deva[वार्त्तिक]: @deva[अण्] also comes after @deva[द्रोण] in the cooking sense: @deva[द्रोणं पचति ब्राह्मणी] = @deva[द्रौणी] or @deva[द्रौणिकी].
"""

advanced = """
This @[sūtra] extends the affixes to three senses: @deva[संभव] (capacity), @deva[अवहार] (containing/removing), @deva[पाक] (cooking). The @deva[द्वितीया] (accusative) construction applies. Examples: @deva[प्रस्थं संभवति] = @deva[प्रास्थिकः] (vessel); @deva[प्रस्थम् अवहरति पचति वा] = @deva[प्रास्थिकः]; @deva[क्रौडविकः], @deva[खारीकः]. The @deva[संभव] sense doesn't extend to @deva[पचति]—so @deva[प्रस्थं पचति ब्राह्मणी] = @deva[प्रास्थिकी] '@[brāhmaṇa] woman who cooks a @deva[प्रस्थ]'. A @deva[वार्त्तिक] adds @deva[अण्] after @deva[द्रोण] for cooking: @deva[द्रोणं पचति ब्राह्मणी] = @deva[द्रौणी] ~ @deva[द्रौणिकी].
"""

id = "5.1.16"
numericId = "51016"

[en]
simple = """
The affix also comes when the base in the @deva[प्रथमा] (nominative) case is 'sufficient for that' or 'sufficient to be made therein'. @deva[प्राकार आसाम् इष्टकानां स्यात्] → @deva[प्राकारीया इष्टकाः] 'bricks sufficient to raise a wall'.
"""

standard = """
The @deva[प्राक्क्रितीय] affixes come after a word in the nominative (@deva[प्रथमा]) with the force of genitive (@deva[अस्य]) or locative (@deva[अस्मिन्]) when combined with @deva[स्यात्] (potential of @deva[अस्] 'to be'), expressing 'sufficient for that' or 'sufficient therein'. The word @deva[स्यात्] (potential mood per @ref[3.3.154]) conveys @deva[सम्भावन] 'potentiality, sufficiency'. Examples: @deva[प्राकार आसाम् इष्टकानां स्यात्] = @deva[प्राकारीया इष्टकाः] 'bricks sufficient to raise a wall'; @deva[प्रासादीयं दारु] 'wood sufficient for a palace'; @deva[प्राकारो अस्मिन् देशे स्यात्] = @deva[प्राकारीयो देशः] 'land sufficient to make a wall therein'. Unlike @ref[5.1.12], there is no modification of primitive into product here—only adequacy or sufficiency is expressed.
"""

advanced = """
This @[sūtra] extends the @deva[प्राक्क्रितीय] affixes to expressions of sufficiency. The construction places the base in @deva[प्रथमा] (nominative) as subject of @deva[स्यात्] (potential of @deva[अस्]), with the affix sense being genitive (@deva[तद् अस्य स्यात्]) or locative (@deva[तद् अस्मिन् स्यात्]). The potential mood conveys @deva[सम्भावन] (potentiality) per @ref[3.3.154]. Examples: genitive sense—@deva[प्राकार आसाम् इष्टकानां स्यात्] = @deva[प्राकारीया इष्टकाः] 'bricks of which a wall could be made'; locative sense—@deva[प्रासादो अस्मिन् देशे स्यात्] = @deva[प्रासादीया भूमिः] 'land in which a palace could be built'. The double @deva[तद्] in the @[sūtra] establishes the maxim: @deva[अनेकस्मिन् प्रत्ययार्थे प्रत्येकं समर्थविभक्तिः सम्बन्धनीया] 'when the affix has multiple senses, each requires its own case specification'. The @deva[इति] prevents extension to cases like @deva[प्रासादो देवदत्तस्य स्यात्] where secular usage doesn't support affixing.
"""

id = "5.1.116"
numericId = "51116"

[en]
simple = """
The affix @deva[वति] also comes meaning 'like what is therein or thereof'. @deva[मथुरायामिव] → @deva[मथुरावत्] 'like (what is) in @[mathurā]'.
"""

standard = """
The affix @deva[वति] (adding @deva[वत्]) also comes in the sense of 'like what is therein or thereof' (@deva[तत्र इव], @deva[तस्य इव]). Examples: @deva[मथुरायामिव] = @deva[मथुरावत्] 'like (what is) in @[mathurā]', as in @deva[मथुरावत् स्रुघ्ने प्राकारः] 'a wall in Srughna like (the one) in @[mathurā]'; @deva[पाटलिपुत्रवत् साकेते परिखा] 'a moat in @[sāketa] like (the one) in @[pāṭaliputra]'; @deva[देवदत्तस्येव देवदत्तवद् यज्ञदत्तस्य गावः] '@[yajñadatta]'s cows are like Devadatta's'.
"""

advanced = """
This @[sūtra] extends @deva[वति] to @deva[तत्र इव] (locative sense) and @deva[तस्य इव] (genitive sense). Examples: @deva[मथुरावत् स्रुघ्ने प्राकारः] 'Srughna's wall is like @[mathurā]'s'; @deva[देवदत्तवद् यज्ञदत्तस्य गावः] '@[yajñadatta]'s cows are like Devadatta's'.
"""

id = "5.1.33"
numericId = "51033"

[en]
simple = """
The affix @deva[ईकन्] comes after @deva[खारी] when preceded by @deva[अध्यर्ध] or a numeral in a @deva[द्विगु] compound. @deva[अध्यर्धखारीकम्], @deva[द्विखारीकम्].
"""

standard = """
The affix @deva[ईकन्] (adding @deva[ईक]) comes in the @deva[आर्हीय] senses (@ref[5.1.37]-63) after @deva[खारी] 'a measure of grain' when preceded by @deva[अध्यर्ध] or a numeral that occasions a @deva[द्विगु] compound. Examples: @deva[अध्यर्धखारीकम्], @deva[द्विखारीकम्]. @deva[वार्त्तिक]s: @deva[ईकन्] also comes after @deva[खारी] alone (@deva[खारीकम्]) and after @deva[काकिणी] (@deva[अध्यर्धकाकिणीकम्], @deva[द्विकाकिणीकम्], @deva[काकिणीकम्]).
"""

advanced = """
This @[sūtra] teaches @deva[ईकन्] after @deva[खारी] in @deva[द्विगु] compounds with @deva[अध्यर्ध] or numerals. Examples: @deva[अध्यर्धखारीकम्], @deva[द्विखारीकम्]. Two @deva[वार्त्तिक]s extend the rule: (1) @deva[ईकन्] also comes after @deva[खारी] alone: @deva[खारीकम्]; (2) @deva[ईकन्] comes after @deva[काकिणी] in compounds (@deva[अध्यर्धकाकिणीकम्], @deva[द्विकाकिणीकम्], @deva[त्रिकाकिणीकम्]) and alone (@deva[काकिणीकम्]).
"""

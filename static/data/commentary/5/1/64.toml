id = "5.1.64"
numericId = "51064"

[en]
simple = """
The affixes come after @deva[छेदादि] words in the accusative case meaning 'who deserves that always'. @deva[छेदं नित्यमर्हति] → @deva[छैदिकः] 'one who always deserves cutting'.
"""

standard = """
The above affixes come after @deva[छेदादि] words in the accusative case with the sense of 'who deserves that under all circumstances' (@deva[नित्यम् अर्हति]). Examples: @deva[छेदं नित्यमर्हति] = @deva[छैदिकः] 'one who always deserves cutting (punishment)'; @deva[भैदिकः] 'deserving splitting'. The @deva[छेदादि] class contains 17 words: @deva[छेद], @deva[भेद], @deva[द्रोह], @deva[दोह], @deva[मर्त], @deva[कर्ष], @deva[तीर्थ], @deva[संप्रयोग], @deva[विप्रयोग], @deva[प्रयोग], @deva[विप्रकर्ष], @deva[प्रेषण], @deva[संप्रश्न], @deva[विप्रश्न], @deva[विकर्ष], @deva[प्रकर्ष], @deva[विराग] (from which @deva[वैरागिक] and @deva[वैरङ्गिक] are formed).
"""

advanced = """
This @[sūtra] teaches the @deva[नित्यम् अर्हति] sense ('always deserving') after the @deva[छेदादि] class in @deva[द्वितीया]. The @deva[छेदादि] @[gaṇa] has 17 words. Examples: @deva[छैदिकः], @deva[भैदिकः]. The final entry @deva[विराग विरङ्गं च] indicates that from @deva[विराग], both @deva[वैरागिक] and @deva[वैरङ्गिक] are derived.
"""

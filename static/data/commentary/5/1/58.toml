id = "5.1.58"
numericId = "51058"

[en]
simple = """
The affixes come after numerals in the sense of 'this is its measure' when the word means a name, multitude, book, or mode of study. @deva[पञ्चकाः शकुनयः] 'the Five birds'; @deva[अष्टकं पाणिनीयम्] '@[pāṇini]'s Eight (chapters)'.
"""

standard = """
The affixes (@ref[5.1.18] etc.) come after numerals in the sense of 'this is its measure' when the derivative means a name (@deva[संज्ञा]), multitude (@deva[संघ]), book (@deva[सूत्र]), or fixed mode of study (@deva[अध्ययन]). @deva[संज्ञा]: @deva[पञ्चकाः शकुनयः] 'the Five birds' = @deva[पञ्च], @deva[त्रिकाः शालङ्कायनाः] 'the Three @deva[शालङ्कायन]s'. @deva[संघ] (multitude of living beings): @deva[पञ्चकः संघः] 'a group of five', @deva[अष्टकः]. @deva[सूत्र] (book): @deva[अष्टावध्यायाः परिमाणमस्य सूत्रस्य] = @deva[अष्टकं पाणिनीयम्] 'the @deva[अष्टक] of @[pāṇini] (eight chapters)', @deva[त्रिकं काशकृत्स्नम्]. @deva[अध्ययन] (mode of study): @deva[पञ्चकोऽधीतः] 'studied five times/in five ways'. @deva[वार्त्तिक]s: @deva[ड] after @deva[पञ्चदश] etc. when meaning a @deva[स्तोम]: @deva[पञ्चदशः स्तोमः], @deva[सप्तदशः स्तोमः] (the @deva[ड्] causes @deva[टि]-elision per @ref[6.4.143]; @deva[न्] elision per @ref[6.4.141]). In Vedic, @deva[डिनि] after @deva[शत्]/@deva[शन्]]-finals: @deva[पञ्चदशिनोर्द्धमासाः], @deva[त्रिंशिनो मासाः]; also after @deva[विंशति]: @deva[विंशिनोऽङ्गिरसः].
"""

advanced = """
This @[sūtra] teaches the @deva[परिमाण] sense for numerals when the derivative denotes: (1) @deva[संज्ञा] (name)—affix doesn't change meaning: @deva[पञ्चकाः] = @deva[पञ्च]; (2) @deva[संघ] (multitude of beings): @deva[पञ्चकः संघः]; (3) @deva[सूत्र] (book): @deva[अष्टकं पाणिनीयम्] '@[pāṇini]'s work of eight @deva[अध्याय]s'; (4) @deva[अध्ययन] (study mode): @deva[पञ्चकोऽधीतः] 'studied five-fold'. Note: @deva[संघ] applies only to living beings, not to @deva[अध्याय] collections. Three @deva[वार्त्तिक]s: (1) @deva[ड] after @deva[पञ्चदशादि] for @deva[स्तोम] (@deva[पञ्चदशः स्तोमः]; @deva[ड्] triggers @ref[6.4.143] @deva[टि]-elision, @ref[6.4.141] @deva[न्]-elision); (2) Vedic @deva[डिनि] after @deva[शत्]/@deva[शन्]]-finals (@deva[पञ्चदशिनोर्द्धमासाः]); (3) Vedic @deva[डिनि] after @deva[विंशति] (@deva[विंशिनोऽङ्गिरसः]).
"""

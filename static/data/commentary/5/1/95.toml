id = "5.1.95"
numericId = "51095"

[en]
simple = """
The affix @deva[ठञ्] comes after a word naming a sacrifice in the sense of 'the fee thereof'. @deva[अग्निष्टोमस्य दक्षिणा] → @deva[आग्निष्टोमिकी] 'the fee for the @deva[अग्निष्टोम] sacrifice'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes after a word being the name of a sacrifice in the sense of 'the fee (@deva[दक्षिणा]) thereof'. Examples: @deva[अग्निष्टोमस्य दक्षिणा] = @deva[आग्निष्टोमिकी] 'the fee for the @deva[अग्निष्टोम]'; @deva[वाजपेयिकी] 'fee for @deva[वाजपेय]'; @deva[राजसूयिकी] 'fee for @deva[राजसूय]'. The word @deva[आख्या] 'name' in the @[sūtra] indicates that the affix applies even to sacrifice-names that don't denote time (unlike @ref[5.1.78]); without it, the rule would apply only to time-denoting sacrifice-names like @deva[एकाह], @deva[द्वादशाह]. The @deva[वार्त्तिक] of @ref[5.1.20] applies to @deva[द्वादशाह] etc.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after sacrifice-names with @deva[दक्षिणा] sense. The term @deva[आख्या] ensures application to all sacrifice-names, not just @deva[काल]-denoting ones like @deva[एकाह], @deva[द्वादशाह]. Examples: @deva[आग्निष्टोमिकी], @deva[वाजपेयिकी], @deva[राजसूयिकी]. The @deva[इष्टि] of @ref[5.1.20] (@deva[तदन्तग्रहण]) applies to @deva[द्वादशाह] etc. Some texts omit @deva[च] in the @[sūtra].
"""

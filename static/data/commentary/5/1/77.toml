id = "5.1.77"
numericId = "51077"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[उत्तरपथ] 'northern route' in the instrumental case meaning 'conveyed by' or 'passing by that way'. @deva[उत्तरपथेन आहृतम्] or @deva[गच्छति] → @deva[औत्तरपथिकम्/औत्तरपथिकः].
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the sense of 'conveyed by that way' (@deva[आहृतम्]) and 'who passes by that way' (@deva[गच्छति], by @deva[च]) after @deva[उत्तरपथ] 'northern route' in the instrumental case. Examples: @deva[उत्तरपथेन आहृतम्] = @deva[औत्तरपथिकम्] 'conveyed by the northern route'; @deva[उत्तरपथेन गच्छति] = @deva[औत्तरपथिकः] 'one who travels by the northern route'. @deva[वार्त्तिक]s: (1) @deva[ठञ्] also after @deva[पथ] preceded by @deva[वारि], @deva[जङ्गल], @deva[स्थल], @deva[कान्तार]: @deva[वारिपथिकम्]/@deva[वारिपथिकः]], @deva[जाङ्गलपथिकः], @deva[स्थालपथिकः], @deva[कान्तारपथिकः] (neuter for 'conveyed', masculine for 'passing'); (2) after @deva[अजपथ] and @deva[शङ्कुपथ]: @deva[आजपथिकः], @deva[शाङ्कुपथिकः]; (3) @deva[अण्] after @deva[स्थलपथ] when 'honey' or 'pepper' is meant: @deva[स्थालपथं मधुकम्], @deva[स्थालपथं मरिचम्].
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[उत्तरपथ] in @deva[तृतीया] with two senses: @deva[आहृतम्] 'conveyed' and @deva[गच्छति] 'passing' (via @deva[च]). Results: @deva[औत्तरपथिकम्] (neut.), @deva[औत्तरपथिकः] (masc.). Three @deva[वार्त्तिक]s extend this: (1) @deva[ठञ्] after @deva[वारि/जङ्गल/स्थल/कान्तार] + @deva[पथ]; (2) after @deva[अजपथ], @deva[शङ्कुपथ]; (3) @deva[अण्] after @deva[स्थलपथ] when the conveyed item is honey or pepper.
"""

id = "5.1.11"
numericId = "51011"

[en]
simple = """
The affix @deva[खञ्] comes after @deva[माणव] and @deva[चरक] with the meaning 'good for that'. @deva[माणव] + @deva[खञ्] → @deva[माणवीनम्] 'suitable for a student'.
"""

standard = """
The affix @deva[खञ्] is added in the sense of 'good for that' after the words @deva[माणव] 'student' and @deva[चरक] 'wandering ascetic'. This supersedes @deva[छ]. Examples: @deva[माणवाय हितम्] = @deva[माणवीनम्] 'suitable for a student'; @deva[चारकीणम्] 'suitable for a @deva[चरक]'.
"""

advanced = """
This @[sūtra] teaches @deva[खञ्] after @deva[माणव] and @deva[चरक] with the @deva[तस्मै हितम्] sense. The @deva[खञ्] supersedes @deva[छ]. Derivations: @deva[माणव] + @deva[खञ्] → @deva[माणवीनम्]; @deva[चरक] + @deva[खञ्] → @deva[चारकीणम्] (with @deva[वृद्धि] of the initial vowel). The affix @deva[खञ्] adds @deva[ईन] to the stem.
"""

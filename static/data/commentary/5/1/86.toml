id = "5.1.86"
numericId = "51086"

[en]
simple = """
The affix @deva[ख] optionally comes after @deva[समा] 'year' in a @deva[द्विगु] compound with the senses of @ref[5.1.76] and @ref[5.1.80]. @deva[द्विमासीनः] or @deva[द्वैमासिकः] 'for two months'.
"""

standard = """
The affix @deva[ख] (adding @deva[ईन]) comes optionally in the senses taught in @ref[5.1.76] ('always going') and @ref[5.1.80] ('solicited, hired, lasted, will last') after @deva[समा] 'year' forming a @deva[द्विगु] compound. In the alternative, @deva[ठञ्] also applies. The @deva[वार्त्तिक] of @ref[5.1.20] (@deva[प्राग्वतेः संख्यापूर्वपदानां तदन्तग्रहणमलुकि]) applies here. Examples: @deva[द्विमासीनः] (with @deva[ख]) or @deva[द्वैमासिकः] (with @deva[ठञ्]) 'for two months'; @deva[त्रिमासीनः] or @deva[त्रैमासिकः] 'for three months'.
"""

advanced = """
This @[sūtra] teaches optional @deva[ख] after @deva[समा] in @deva[द्विगु] compounds with @ref[5.1.76] and @ref[5.1.80] senses. The alternative is @deva[ठञ्]. The @deva[इष्टि] @deva[प्राग्वतेः संख्यापूर्वपदानां तदन्तग्रहणमलुकि] (from @ref[5.1.20]) applies. Results: @deva[द्विमासीनः] ~ @deva[द्वैमासिकः], @deva[त्रिमासीनः] ~ @deva[त्रैमासिकः].
"""

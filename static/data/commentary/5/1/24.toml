id = "5.1.24"
numericId = "51024"

[en]
simple = """
The affix @deva[ड्वुन्] comes after @deva[विंशति] 'twenty' and @deva[त्रिंशत्] 'thirty' when not denoting a name; the @deva[ति] and @deva[अत्] are dropped. @deva[विंशति] + @deva[ड्वुन्] → @deva[विंशकः]; @deva[त्रिंशत्] + @deva[ड्वुन्] → @deva[त्रिंशकः].
"""

standard = """
The affix @deva[ड्वुन्] (adding @deva[अक]) comes in the senses up to @ref[5.1.63] after @deva[विंशति] and @deva[त्रिंशत्] when not denoting a name (@deva[असंज्ञायाम्]). Before @deva[ड्वुन्], the @deva[ति] of @deva[विंशति] is dropped (by @ref[6.4.142]) and the @deva[अत्] of @deva[त्रिंशत्] is dropped (by @ref[6.4.143]). Examples: @deva[विंशति] + @deva[ड्वुन्] → @deva[विंशकः]; @deva[त्रिंशत्] + @deva[ड्वुन्] → @deva[त्रिंशकः]. When denoting a name: @deva[विंशतिकः], @deva[त्रिंशत्कः] (with @deva[कन्] per @ref[5.1.22]).
"""

advanced = """
This @[sūtra] teaches @deva[ड्वुन्] after @deva[विंशति] and @deva[त्रिंशत्] in non-name contexts. The affix @deva[ड्वुन्] triggers deletion: @deva[ति] of @deva[विंशति] by @ref[6.4.142], @deva[अत्] of @deva[त्रिंशत्] by @ref[6.4.143]. Results: @deva[विंश] + @deva[अक] = @deva[विंशकः]; @deva[त्रिंश्] + @deva[अक] = @deva[त्रिंशकः]. In @deva[संज्ञा] (name) usage, @deva[कन्] applies: @deva[विंशतिकः], @deva[त्रिंशत्कः]. The @[sūtra] can be parsed as two rules: (1) @deva[विंशतित्रिंशद्भ्याम्]—@deva[कन्] applies; (2) @deva[ड्वुनसंज्ञायाम्]—@deva[ड्वुन्] applies when not a name. This division explains why @deva[कन्] can apply despite @ref[5.1.22]'s @deva[अतिशदन्तायाः] restriction.
"""

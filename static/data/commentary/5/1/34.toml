id = "5.1.34"
numericId = "51034"

[en]
simple = """
The affix @deva[यत्] comes after @deva[पण], @deva[पाद], @deva[माष], and @deva[शत] when preceded by @deva[अध्यर्ध] or a numeral in a @deva[द्विगु] compound. @deva[द्विपण्यम्], @deva[द्विपाद्यम्], @deva[द्विमाष्यम्].
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) comes in the @deva[आर्हीय] senses (@ref[5.1.37]-63) after @deva[पण], @deva[पाद], @deva[माष], and @deva[शत] when preceded by @deva[अध्यर्ध] or a numeral that occasions a @deva[द्विगु] compound. Examples: @deva[अध्यर्धपण्यम्], @deva[द्विपण्यम्], @deva[त्रिपण्यम्]; @deva[अध्यर्धपाद्यम्], @deva[द्विपाद्यम्], @deva[त्रिपाद्यम्]; @deva[अध्यर्धमाष्यम्], @deva[द्विमाष्यम्], @deva[त्रिमाष्यम्]; @deva[अध्यर्धशत्यम्], @deva[द्विशत्यम्], @deva[त्रिशत्यम्]. Note: @deva[पाद] here means a measure of capacity, not 'foot' of a living being, so @ref[6.3.53] (@deva[पाद] → @deva[पद]) does not apply.
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[पण], @deva[पाद], @deva[माष], @deva[शत] in @deva[द्विगु] compounds with @deva[अध्यर्ध] or numerals. The forms: @deva[अध्यर्धपण्यम्], @deva[द्विपण्यम्], @deva[त्रिपण्यम्]; @deva[अध्यर्धपाद्यम्], @deva[द्विपाद्यम्], @deva[त्रिपाद्यम्]; @deva[अध्यर्धमाष्यम्], @deva[द्विमाष्यम्], @deva[त्रिमाष्यम्]; @deva[अध्यर्धशत्यम्], @deva[द्विशत्यम्], @deva[त्रिशत्यम्]. The substitution @deva[पाद] → @deva[पद] of @ref[6.3.53] applies only when @deva[पाद] means 'foot of a living being'; here @deva[पाद] denotes a measure (@deva[परिमाण]), so no substitution occurs.
"""

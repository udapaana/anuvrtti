id = "5.1.129"
numericId = "51129"

[en]
simple = """
The affix @deva[अञ्] comes after animal class-names, age-denoting words, and the @deva[उद्गात्रादि] class to express 'nature/action'. @deva[अश्व] → @deva[आश्वम्] 'horse-nature'. @deva[कुमार] → @deva[कौमारम्] 'youth/childhood'.
"""

standard = """
Class-names of animals (@deva[जातिशब्द]), words expressing age (@deva[वयोवाचिन्]), and the @deva[उद्गात्रादि] class take @deva[अञ्] (realized as @deva[अ] with @deva[वृद्धि]) for @deva[भाव/कर्म]. Examples: @deva[अश्वस्य भावः कर्म वा] → @deva[आश्वम्] 'equine nature/behavior'; @deva[उष्ट्र] → @deva[औष्ट्रम्]; @deva[कुमार] → @deva[कौमारम्] 'childhood/youthfulness'; @deva[किशोर] → @deva[कैशोरम्]; @deva[उद्गातृ] → @deva[औद्गात्रम्]; @deva[उन्नेतृ] → @deva[औन्नेत्रम्]. The @deva[उद्गात्रादि] includes Vedic priest-designations.
"""

advanced = """
The @deva[अञ्]-affix covers three semantic domains: (1) @deva[जातिवाचिन्] (animal class-terms), (2) @deva[वयोवाचिन्] (age-terms like @deva[कुमार], @deva[किशोर], @deva[स्थविर]), (3) @deva[उद्गात्रादि] @deva[गण] (priest-terms). The @deva[वृद्धि] triggered by @deva[अञ्] affects the initial syllable. The @deva[गण] includes: @deva[उद्गातृ], @deva[उन्नेतृ], @deva[प्रतिहर्तृ], @deva[प्रशास्तृ], @deva[होतृ], @deva[पोतृ], @deva[कर्तृ], @deva[रथगणक], @deva[पत्तिगणक], etc.
"""

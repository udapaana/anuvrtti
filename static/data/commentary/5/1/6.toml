id = "5.1.6"
numericId = "51006"

[en]
simple = """
The affix @deva[यत्] comes after words denoting body parts with the meaning 'good for that'. @deva[दन्त] + @deva[यत्] → @deva[दन्त्यम्] 'good for the teeth' (dentifrice).
"""

standard = """
The affix @deva[यत्] is added in the sense of 'good for that' after words denoting parts of the body (@deva[शरीरावयव]). This supersedes @deva[छ]. Examples: @deva[दन्त्यम्] 'good for the teeth' (dentifrice), @deva[कण्ठ्यम्] 'good for the throat', @deva[ओष्ठ्यम्] 'good for the lips', @deva[नाभ्यम्] 'good for the navel' (oil), @deva[नस्यम्] 'good for the nose' (snuff). The accent falls on the first syllable per @ref[6.1.213].
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[शरीरावयव] (body-part) words with the @deva[तस्मै हितम्] sense. The term @deva[शरीर] denotes animal organisms. The @deva[यत्] supersedes @deva[छ]. Derivatives include: @deva[दन्त्यम्] (dentifrice), @deva[कण्ठ्यम्] (throat remedy), @deva[ओष्ठ्यम्] (lip salve), @deva[नाभ्यम्] (navel oil), @deva[नस्यम्] (nasal medicine). Per @ref[6.1.213], these forms bear @deva[आद्युदात्त] accent, indicated by the accent marks in the source. Note: @deva[नाभि] here means 'navel' (body part), distinct from @deva[नाभि] 'nave of wheel' which takes @deva[नभ]-substitution per @ref[5.1.2].
"""

id = "5.1.136"
numericId = "51136"

[en]
simple = """
The affix @deva[त्व] comes after @deva[ब्रह्मन्] when it denotes a type of @deva[होत्रा] priest. @deva[ब्रह्मणो भावः कर्म वा] → @deva[ब्रह्मत्वम्] 'the office/nature of the Brahman priest'. This blocks @deva[छ].
"""

standard = """
When @deva[ब्रह्मन्] refers to the @deva[होत्रा] priest (one of the four main Vedic priests), the affix @deva[त्व] applies, blocking @deva[छ] from @ref[5.1.135]. Result: @deva[ब्रह्मणो भावः कर्म वा] → @deva[ब्रह्मत्वम्]. When @deva[ब्रह्मन्] means a Brahmin by caste (not the priestly office), the regular affixes apply: @deva[ब्रह्मत्वम्] or @deva[ब्रह्मता]. This @[sūtra] concludes the @deva[भाव/कर्म] section extending from @ref[4.1.87].
"""

advanced = """
The @deva[त्व]-affix is specifically prescribed for @deva[ब्रह्मन्] in its @deva[होत्रा]-sense (the superintending priest of the Vedic sacrifice), functioning as @deva[अपवाद] to @ref[5.1.135]'s @deva[छ]. The @deva[अधिकार] statement notes that the @deva[मत्]//@deva[स्न] provisions of @ref[4.1.87] extend their scope (@deva[प्रकरण]) through this point. The dual meaning of @deva[ब्रह्मन्] (priest vs. caste) yields identical @deva[ब्रह्मत्वम्] from different derivational paths but with distinct semantic content.
"""

id = "5.1.88"
numericId = "51088"

[en]
simple = """
The affixes @deva[ख] and @deva[ठञ्] may also be deleted after a @deva[द्विगु] compound ending in @deva[वर्षा] 'year'. @deva[द्विवर्षीणः], @deva[द्विवार्षिकी], or @deva[द्विवर्षो व्याधिः] 'a disease lasting two years'.
"""

standard = """
The affixes @deva[ख] and @deva[ठञ्] come in the five senses (@ref[5.1.79], @ref[5.1.80]) after @deva[वर्षा] 'rainy season, year' forming a @deva[द्विगु], and these may also be optionally deleted. Three forms result: @deva[द्विवर्षीणः] (with @deva[ख]), @deva[द्विवार्षिकी] (with @deva[ठञ्]), or @deva[द्विवर्षो व्याधिः] (with deletion) 'a disease lasting two years'. Compare @ref[7.3.16]. When the sense is @deva[भावी] 'will last', the form is @deva[द्वैवर्षिकः].
"""

advanced = """
This @[sūtra] teaches @deva[ख] and @deva[ठञ्] after @deva[वर्षा] in @deva[द्विगु] with the @ref[5.1.79]-@ref[5.1.80] senses, with optional deletion. Three forms: @deva[द्विवर्षीणः] (@deva[ख]), @deva[द्विवार्षिकी] (@deva[ठञ्]), @deva[द्विवर्षः] (@deva[लुक्]). Per @ref[7.3.16], @deva[वृद्धि] differs; with @deva[भावी] sense: @deva[द्वैवर्षिकः].
"""

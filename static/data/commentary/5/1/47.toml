id = "5.1.47"
numericId = "51047"

[en]
simple = """
The affixes also mean 'interest, rent, profit, tax, or bribe given in/for that'. @deva[पञ्च अस्मिन् वृद्धिः दीयते] → @deva[पञ्चकः] 'that in which 5% is given as interest'.
"""

standard = """
The above affixes also have the sense 'interest (@deva[वृद्धि]), rent (@deva[आय]), profit (@deva[लाभ]), tax (@deva[शुल्क]), or bribe (@deva[उपदा]) given in/for that'. The base is in the nominative (@deva[तद्]) and the affix expresses a locative sense (@deva[अस्मिन्]). @deva[वृद्धि] = interest paid to a creditor; @deva[आय] = landlord's share; @deva[लाभ] = profit from sales; @deva[शुल्क] = king's tax; @deva[उपदा] = bribe/present. Example: @deva[पञ्च अस्मिन् वृद्धिः आयः लाभः शुल्कः उपदा वा दीयते] = @deva[पञ्चकः] 'a transaction in which 5% is given as interest, rent, etc.' Similarly @deva[सप्तकः], @deva[शत्यः], @deva[शतिकः], @deva[साहस्रः]. @deva[वार्त्तिक]: The dative sense also applies—@deva[पञ्च अस्मै दीयते] = @deva[पञ्चको देवदत्तः] '@deva[देवदत्त] to whom 5% is given'.
"""

advanced = """
This @[sūtra] extends the affixes to five financial senses: @deva[वृद्धि] (interest on principal), @deva[आय] (rent/revenue share), @deva[लाभ] (trading profit), @deva[शुल्क] (royal tax), @deva[उपदा] (bribe/gift). The @deva[प्रथमा] (nominative) base takes an affix with @deva[सप्तमी] (locative) sense. Example: @deva[पञ्च अस्मिन् वृद्धिर्वा आयो वा लाभो वा शुल्को वा उपदा वा दीयते] = @deva[पञ्चकः]. A @deva[वार्त्तिक] adds @deva[चतुर्थी] (dative) sense: @deva[पञ्च अस्मै दीयते] = @deva[पञ्चको देवदत्तः]. This may be explained by the locative sometimes having dative force, as in @deva[समम् अब्राह्मणे दानम्].
"""

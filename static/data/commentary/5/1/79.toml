id = "5.1.79"
numericId = "51079"

[en]
simple = """
The affix @deva[ठञ्] comes after a time-denoting word in the instrumental case meaning 'to be accomplished in that time'. @deva[अह्ना निर्वृत्तम्] → @deva[आह्निकम्] 'to be done in a day'.
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes after a word denoting time in the instrumental (@deva[तृतीया]) case with the sense of 'to be accomplished in that time' (@deva[तेन निर्वृत्तम्]). Examples: @deva[अह्ना निर्वृत्तम्] = @deva[आह्निकम्] 'a portion (of study etc.) to be accomplished in a day'; @deva[आर्धमासिकम्] 'to be done in a fortnight'; @deva[सांवत्सरिकम्] 'to be done in a year'.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[काल] words in @deva[तृतीया] with the @deva[निर्वृत्त] sense 'accomplished by that time'. Examples: @deva[आह्निकम्] 'daily portion', @deva[आर्धमासिकम्] 'fortnightly', @deva[सांवत्सरिकम्] 'yearly'. The @deva[कालात्] of @ref[5.1.78] governs this @[sūtra].
"""

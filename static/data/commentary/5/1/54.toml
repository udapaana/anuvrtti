id = "5.1.54"
numericId = "51054"

[en]
simple = """
The affixes @deva[ष्ठन्] and @deva[ख] optionally come after @deva[आढक], @deva[आचित], and @deva[पात्र] as final members of @deva[द्विगु] compounds in the sense of 'capable of holding etc.' @deva[द्व्याढकिकी], @deva[द्व्याढकीना], or @deva[द्व्याढकी].
"""

standard = """
The affix @deva[ष्ठन्] (adding @deva[इक]) as well as @deva[ख] (adding @deva[ईन], via @deva[च]) may optionally come after @deva[आढक], @deva[आचित], and @deva[पात्र] when final in a @deva[द्विगु] compound, in the sense of 'capable of holding etc.' Being specifically ordained, these are not deleted by @ref[5.1.28]; but the general @deva[ठञ्] in the alternative is deleted. The @deva[न्] of @deva[ष्ठन्] governs accent (@ref[6.1.197]); @deva[ष्] triggers @deva[ङीष्]. Three forms result: @deva[द्व्याढकिकी] (with @deva[ष्ठन्]), @deva[द्व्याढकीना] (with @deva[ख]), @deva[द्व्याढकी] (with @deva[ठञ्] + @deva[लुक्]). Similarly @deva[द्व्याचितिकी], @deva[द्व्याचितीना], @deva[द्व्याचिता] (no @deva[ङीप्] per @ref[4.1.22]); @deva[द्विपात्रिकी], @deva[द्विपात्रीणा], @deva[द्विपात्री].
"""

advanced = """
This @[sūtra] teaches @deva[ष्ठन्] and @deva[ख] (via @deva[च]) after @deva[आढक], @deva[आचित], @deva[पात्र] in @deva[द्विगु] compounds with the @ref[5.1.52] senses. These specific affixes are not subject to @deva[लुक्] of @ref[5.1.28]; the general @deva[ठञ्] is deleted. Three forms result: (1) @deva[ष्ठन्]: @deva[द्व्याढकिकी], @deva[द्व्याचितिकी], @deva[द्विपात्रिकी]; (2) @deva[ख]: @deva[द्व्याढकीना], @deva[द्व्याचितीना], @deva[द्विपात्रीणा]; (3) @deva[ठञ्] + @deva[लुक्]: @deva[द्व्याढकी], @deva[द्व्याचिता], @deva[द्विपात्री]. For @deva[द्व्याचिता], @deva[ङीप्] is blocked by @ref[4.1.22].
"""

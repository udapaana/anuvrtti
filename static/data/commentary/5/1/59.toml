id = "5.1.59"
numericId = "51059"

[en]
simple = """
The following words are formed anomalously: @deva[पङ्क्ति] 'a verse of five syllables', @deva[विंशति] 'twenty', @deva[त्रिंशत्] 'thirty', @deva[चत्वारिंशत्] 'forty', @deva[पञ्चाशत्] 'fifty', @deva[षष्टि] 'sixty', @deva[सप्तति] 'seventy', @deva[अशीति] 'eighty', @deva[नवति] 'ninety', @deva[शतम्] 'hundred'.
"""

standard = """
These ten words are formed anomalously in the sense of 'this is its measure' (@deva[तदस्य परिमाणम्]): (1) @deva[पङ्क्ति]: @deva[पञ्च] + @deva[ति] (final elided) = 'a verse whose measure is five syllables'; (2) @deva[विंशति]: @deva[विन्] (replacing @deva[द्वयो दशतः] 'two tens') + @deva[शतिच्] = @deva[द्वौ दशतौ परिमाणमस्य संघस्य]; (3) @deva[त्रिंशत्]: @deva[त्रिन्] + @deva[शत्] = 'three tens'; (4-5) @deva[चत्वारिंशत्], @deva[पञ्चाशत्]: @deva[चत्वारिम्]/@deva[पञ्च]] + @deva[शत्]; (6-9) @deva[षष्टि], @deva[सप्तति], @deva[अशीति], @deva[नवति]: similarly formed; (10) @deva[शतम्] 'hundred'. The word @deva[पङ्क्ति] also means 'a row' (@deva[ब्राह्मणपङ्क्तिः] 'a row of @[brāhmaṇas]', @deva[पिपीलिकापङ्क्तिः] 'a row of ants')—this usage has no connection to its etymology.
"""

advanced = """
This @[sūtra] lists ten @deva[निपातन] (anomalous) formations with @deva[परिमाण] sense: (1) @deva[पङ्क्ति] from @deva[पञ्च] + @deva[ति] (with @deva[च]-elision) 'a half-quarter of 5 syllables'; (2) @deva[विंशति] from @deva[विन्] (substitute for @deva[द्वयो दशतः]) + @deva[शतिच्]; (3) @deva[त्रिंशत्] from @deva[त्रिन्] (for @deva[त्रयो दशतः]) + @deva[शत्]; (4) @deva[चत्वारिंशत्] from @deva[चत्वारिम्] + @deva[शत्]; (5) @deva[पञ्चाशत्] from @deva[पञ्च] + @deva[शत्]; (6-9) @deva[षष्टि], @deva[सप्तति], @deva[अशीति], @deva[नवति] similarly; (10) @deva[शतम्]. These are conjectural etymologies from @deva[पतञ्जलि] and @deva[काशिकाकार]. The word @deva[पङ्क्ति] also means 'row, line' independently of its etymology.
"""

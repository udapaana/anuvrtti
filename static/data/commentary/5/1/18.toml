id = "5.1.18"
numericId = "51018"

[en]
simple = """
From this @[sūtra] through @ref[5.1.115], the affix @deva[ठञ्] is the default. The senses are those taught in @ref[5.1.37] and following.
"""

standard = """
This is a heading @[sūtra] (@deva[अधिकार]) establishing that the affix @deva[ठञ्] (adding @deva[इक]) governs @[sūtras] from here through @ref[5.1.115] (exclusive). The affix has the senses given in @ref[5.1.37] and subsequent @[sūtras]. Strictly, @deva[ठञ्] as an affix governs only up to @ref[5.1.110]. Example: @deva[पारायणिकः], @deva[तौरायणिकः], @deva[चान्द्रायणिकः].
"""

advanced = """
This @deva[अधिकार] @[sūtra] establishes @deva[ठञ्] as the governing affix through @ref[5.1.115]. The senses are those of @ref[5.1.37] (@deva[तेन क्रीतम्] 'purchased with') and following. Technically, @deva[ठञ्] governs only up to @ref[5.1.110]; the extension to 115 pertains to the general section structure. Examples from @ref[5.1.72]: @deva[पारायणिकः], @deva[तौरायणिकः], @deva[चान्द्रायणिकः]. The affix @deva[ठञ्] adds @deva[इक] (or @deva[क]) to the stem.
"""

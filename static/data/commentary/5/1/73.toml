id = "5.1.73"
numericId = "51073"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[संशय] 'doubt' in the accusative case meaning 'having fallen into or thrown into that'. @deva[संशयमापन्नः] → @deva[सांशयिकः स्तम्भः] 'a doubtful pillar' (in a precarious state).
"""

standard = """
The affix @deva[ठञ्] (adding @deva[इक]) comes in the sense of 'having fallen into or thrown into that' (@deva[आपन्नः प्राप्तः]) after @deva[संशय] 'doubt' in the accusative case. Example: @deva[संशयमापन्नः प्राप्तः] = @deva[सांशयिकः स्तम्भः] 'a doubtful pillar', i.e., a pillar in a precarious or uncertain state.
"""

advanced = """
This @[sūtra] teaches @deva[ठञ्] after @deva[संशय] in @deva[द्वितीया] with the sense @deva[आपन्नः प्राप्तः] 'having fallen into, reached'. Example: @deva[सांशयिकः स्तम्भः] 'a pillar that has fallen into doubt/uncertainty'—describing something in a precarious condition.
"""

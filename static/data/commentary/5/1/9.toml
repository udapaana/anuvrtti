id = "5.1.9"
numericId = "51009"

[en]
simple = """
The affix @deva[ख] comes after @deva[आत्मन्], @deva[विश्वजन], and compounds ending in @deva[भोग] with the meaning 'good for that'. @deva[आत्मन्] + @deva[ख] → @deva[आत्मनीनम्] 'suitable for oneself'.
"""

standard = """
The affix @deva[ख] is added in the sense of 'good for that' after @deva[आत्मन्], @deva[विश्वजन] (as a @deva[कर्मधारय]), and compounds with @deva[भोग] as the final member. This supersedes @deva[छ]. Examples: @deva[आत्मनीनम्] 'suitable for oneself' (the @deva[न्] retained by @ref[6.4.169]); @deva[विश्वजनीनम्] 'suitable for all men'. When @deva[विश्वजन] is @deva[तत्पुरुष] or @deva[बहुव्रीहि], it takes @deva[छ]: @deva[विश्वजनीयम्]. Compounds with @deva[भोग]: @deva[मातृभोगीनः], @deva[पितृभोगीनः]. @deva[वार्त्तिक]s add: @deva[पञ्चजनीनम्], @deva[सर्वजनीनम्] or @deva[सार्वजनिकम्] (with @deva[ठञ्]), and @deva[माहाजनिकम्] (always @deva[ठञ्] for @deva[महाजन]).
"""

advanced = """
This @[sūtra] teaches @deva[ख] after @deva[आत्मन्], @deva[विश्वजन], and @deva[भोगोत्तरपद] compounds. The irregular retention of @deva[न्] in @deva[आत्मन्] within the @[sūtra] indicates that @deva[भोगोत्तरपद] does not apply to @deva[आत्मन्] and @deva[विश्वजन]—they are independent @deva[प्रकृति]s. For @deva[आत्मन्], the @deva[न्] (normally deleted by @ref[6.4.144]) is preserved by @ref[6.4.169], giving @deva[आत्मनीनम्]. The compound @deva[विश्वजन] must be @deva[कर्मधारय] ('all men') for @deva[ख]; as @deva[तत्पुरुष] or @deva[बहुव्रीहि], it takes @deva[छ]: @deva[विश्वजनीयम्]. @deva[वार्त्तिक]s: @deva[पञ्चजन] (@deva[कर्मधारय]) takes @deva[ख] → @deva[पञ्चजनीनम्]; @deva[सर्वजन] takes @deva[ठञ्] or @deva[ख] → @deva[सार्वजनिकम्] or @deva[सर्वजनीनम्]; @deva[महाजन] always takes @deva[ठञ्] → @deva[माहाजनिकम्] (except in @deva[बहुव्रीहि]). For @deva[भोग]-compounds: @deva[मातृभोगीनः], @deva[पितृभोगीनः]; @deva[राजभोगीनः] and @deva[आचार्यभोगीनः] always take @deva[ख] (with @deva[ण्] not changing to @deva[ण] in the latter per @ref[8.4.2]).
"""

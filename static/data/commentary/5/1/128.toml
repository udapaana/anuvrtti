id = "5.1.128"
numericId = "51128"

[en]
simple = """
The affix @deva[यक्] comes after compounds ending in @deva[पति] and the @deva[पुरोहितादि] class to express 'nature/action'. @deva[सेनापति] → @deva[सैनापत्यम्] 'generalship'. @deva[पुरोहित] → @deva[पौरोहित्यम्] 'priesthood'.
"""

standard = """
Compounds ending in @deva[पति] 'lord/master' and the @deva[पुरोहितादि] class take @deva[यक्] (realized as @deva[य] with @deva[वृद्धि]) for @deva[भाव/कर्म]. Examples: @deva[सेनापतेर्भावः कर्म वा] → @deva[सैनापत्यम्] 'the position/duties of a general'; @deva[गृहपति] → @deva[गार्हपत्यम्]; @deva[प्रजापति] → @deva[प्राजापत्यम्]; @deva[पुरोहित] → @deva[पौरोहित्यम्]; @deva[राजन्] (when not in compound) → @deva[राज्यम्] 'kingship'. The @deva[पुरोहितादि] includes: @deva[पुरोहित], @deva[राजन्] (non-compound), @deva[ग्रामिक], @deva[पिण्डिक], etc.
"""

advanced = """
The @deva[यक्]-affix applies to @deva[पत्यन्त]-compounds (those ending in @deva[पति]) and the @deva[पुरोहितादि] @deva[गण]. The @deva[ककार] of @deva[यक्] is @deva[इत्], leaving @deva[य] with obligatory @deva[वृद्धि] of the base's initial vowel. The @deva[गण] specification @deva[राजासे] indicates @deva[राजन्] takes @deva[यक्] only @deva[असमासे] (outside compounds), yielding @deva[राज्यम्]; in compounds, other rules apply. This @[sūtra] productively generates institutional/positional abstract nouns.
"""

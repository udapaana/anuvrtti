id = "5.1.31"
numericId = "51031"

[en]
simple = """
The affix is optionally deleted after @deva[द्विगु] compounds of @deva[बिस्त] preceded by @deva[द्वि], @deva[त्रि], or @deva[बहु]. @deva[द्विबिस्तम्] or @deva[द्विबैस्तिकम्].
"""

standard = """
The @deva[आर्हीय] affix (@ref[5.1.37]-63) is optionally deleted by @deva[लुक्] after @deva[द्विगु] compounds of @deva[बिस्त] when preceded by @deva[द्वि] or @deva[त्रि] (the word @deva[च] draws in @deva[द्वित्रिपूर्वात्] from the previous @[sūtra]). Examples: @deva[द्विबिस्तम्] or @deva[द्विबैस्तिकम्]; @deva[त्रिबिस्तम्] or @deva[त्रिबैस्तिकम्]; @deva[बहुबिस्तम्] or @deva[बहुबैस्तिकम्]. This @[sūtra] is separated from the previous one for the sake of the subsequent @[sūtra].
"""

advanced = """
This @[sūtra] teaches optional @deva[लुक्] for @deva[बिस्त] in @deva[द्विगु] compounds with @deva[द्वि], @deva[त्रि], or @deva[बहु]. The @deva[च] draws @deva[द्वित्रिपूर्वात्] from @ref[5.1.30]. Examples: @deva[द्विबिस्तम्] ~ @deva[द्विबैस्तिकम्], @deva[त्रिबिस्तम्] ~ @deva[त्रिबैस्तिकम्], @deva[बहुबिस्तम्] ~ @deva[बहुबैस्तिकम्]. The separation of this @[sūtra] from @ref[5.1.30] enables the subsequent @[sūtra] to introduce a different affix.
"""

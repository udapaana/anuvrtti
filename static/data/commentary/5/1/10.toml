id = "5.1.10"
numericId = "51010"

[en]
simple = """
The affixes @deva[ण] and @deva[ढञ्] come after @deva[सर्व] and @deva[पुरुष] with the meaning 'good for that'. @deva[सर्व] + @deva[ण] → @deva[सार्वम्] 'beneficial for all'; @deva[पुरुष] + @deva[ढञ्] → @deva[पौरुषेयम्] 'pertaining to man'.
"""

standard = """
The affixes @deva[ण] and @deva[ढञ्] are added in the sense of 'good for that' after @deva[सर्व] and @deva[पुरुष] respectively. This supersedes @deva[छ]. Examples: @deva[सर्वस्मै हितम्] = @deva[सार्वम्] 'beneficial for all'; @deva[पौरुषेयम्] 'pertaining to/made by man'. @deva[वार्त्तिक]: @deva[ण] is optional after @deva[सर्व], allowing @deva[सर्वीयम्] ~ @deva[सार्वम्]. Another @deva[वार्त्तिक]: @deva[ढञ्] after @deva[पुरुष] extends to senses of slaughter, modification, crowd, or 'made by': @deva[पौरुषेयो वधः] 'man-slaughter', @deva[पौरुषेयो ग्रन्थः] 'book written by man' (vs. @deva[अपौरुषेया वेदाः] 'the Vedas are non-human').
"""

advanced = """
This @[sūtra] assigns @deva[ण] to @deva[सर्व] and @deva[ढञ्] to @deva[पुरुष] in the @deva[तस्मै हितम्] sense. Derivations: @deva[सर्व] + @deva[ण] → @deva[सार्वम्] (with @deva[वृद्धि]); @deva[पुरुष] + @deva[ढञ्] → @deva[पौरुषेयम्]. First @deva[वार्त्तिक]: @deva[ण] is optional after @deva[सर्व], so @deva[सर्वीयम्] (with @deva[छ]) alternates with @deva[सार्वम्]. Second @deva[वार्त्तिक]: @deva[ढञ्] after @deva[पुरुष] applies when the derivative denotes: (1) @deva[वध] 'slaughter' → @deva[पौरुषेयो वधः]; (2) @deva[विकृति] 'modification' → human activity; (3) @deva[समूह] 'crowd' → assembly of men; (4) @deva[तेन कृतम्] 'made by' → @deva[पौरुषेयो ग्रन्थः] 'a humanly-authored text', contrasting with @deva[अपौरुषेया वेदाः] 'the Vedas are not of human origin'.
"""

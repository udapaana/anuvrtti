id = "5.1.122"
numericId = "51122"

[en]
simple = """
The affix @deva[इमनिच्] (@deva[इमन्]) optionally comes after @deva[पृथु] and similar words to express 'nature of'. @deva[पृथु] 'broad' → @deva[प्रथिमा] 'breadth'. The affix @deva[अण्] etc. also apply, giving @deva[पार्थवम्].
"""

standard = """
After the @deva[पृथ्वादि] class, the affix @deva[इमनिच्] (realized as @deva[इमन्]) optionally denotes @deva[भाव] 'nature'. The word @deva[वा] 'optionally' ensures that @deva[अण्] and other affixes from @ref[5.1.119] onward also remain available. Derivation: @deva[पृथोर्भावः] → @deva[पृथु] + @deva[इमन्] → @deva[पृथिमन्] (by @ref[6.4.155] @deva[उ]-deletion, @ref[6.4.161] vowel-change) → nom. @deva[प्रथिमा]. Alternative: @deva[पार्थवम्] by @ref[5.1.131]. Similarly @deva[मृदु] → @deva[म्रदिमा] or @deva[मार्दवम्].
"""

advanced = """
The @deva[पृथ्वादि] @deva[गण] triggers optional @deva[इमनिच्]-suffixation in @deva[भाव] sense. The affix @deva[इमन्] undergoes complex phonological derivation: @deva[पृथु] + @deva[इमन्] → @deva[पृथ्] + @deva[इमन्] (by @ref[6.4.155] @deva[उकारलोप]) → @deva[प्रथ्] + @deva[इमन्] (by @ref[6.4.161] @deva[संप्रसारण]). The @deva[विकल्प] status allows paradigmatic choice between @deva[इमन्]-derivatives and @deva[अण्]-derivatives, creating doublets like @deva[प्रथिमा]//@deva[पार्थवम्] with identical meaning but different stylistic registers.
"""

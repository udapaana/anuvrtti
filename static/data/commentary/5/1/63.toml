id = "5.1.63"
numericId = "51063"

[en]
simple = """
The affixes (@ref[5.1.18] etc.) also mean 'who deserves that'. @deva[श्वेतच्छत्रमर्हति] → @deva[श्वेतच्छत्रिकः] 'one who deserves the white umbrella'.
"""

standard = """
The affixes taught from @ref[5.1.18] onward (@deva[प्राग्वतेष्ठञ्]) also have the sense of 'who deserves that' (@deva[तदर्हति]). The base is in the accusative case. Examples: @deva[श्वेतच्छत्रमर्हति] = @deva[श्वेतच्छत्रिकः] 'one who deserves the white umbrella'; @deva[वास्त्रयुग्मिकः] 'deserving a pair of garments'; @deva[शत्यः], @deva[शतिकः], @deva[साहस्रः].
"""

advanced = """
This @[sūtra] defines the @deva[तदर्हति] sense for the @ref[5.1.18] affixes: 'who deserves that'. The @deva[द्वितीया] (accusative) construction applies. Examples: @deva[श्वेतच्छत्रमर्हति] = @deva[श्वेतच्छत्रिकः] 'deserving the royal white umbrella'; @deva[वास्त्रयुग्मिकः], @deva[शत्यः], @deva[शतिकः], @deva[साहस्रः]. This sense extends through the following @[sūtras] with various bases.
"""

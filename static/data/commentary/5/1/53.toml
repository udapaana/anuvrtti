id = "5.1.53"
numericId = "51053"

[en]
simple = """
The affix @deva[ख] optionally comes after @deva[आढक], @deva[आचित], and @deva[पात्र] in the sense of 'capable of holding etc.' @deva[आढकीना] or @deva[आढकिकी] 'holding an @deva[आढक]'.
"""

standard = """
The affix @deva[ख] (adding @deva[ईन]) may optionally come in the sense of 'capable of holding, taking away, or cooking' after @deva[आढक] (a measure), @deva[आचित] (a measure), and @deva[पात्र] 'vessel'. This @deva[ख] supersedes @deva[ठञ्], which comes in the alternative. Examples: @deva[आढकं संभवति अवहरति पचति वा] = @deva[आढकीना] (with @deva[ख]) or @deva[आढकिकी] (with @deva[ठञ्]); @deva[आचितीना] or @deva[आचितिकी]; @deva[पात्रीणा] or @deva[पात्रिकी].
"""

advanced = """
This @[sūtra] teaches optional @deva[ख] after @deva[आढक], @deva[आचित], @deva[पात्र] in the @ref[5.1.52] senses. The option is with @deva[ठञ्]. Results: @deva[आढकीना] ~ @deva[आढकिकी]; @deva[आचितीना] ~ @deva[आचितिकी]; @deva[पात्रीणा] ~ @deva[पात्रिकी]. The @deva[ख] adds @deva[ईन].
"""

id = "5.1.22"
numericId = "51022"

[en]
simple = """
The affix @deva[कन्] comes after numerals that do not end in @deva[ति] or @deva[शत्], with senses up to @ref[5.1.63]. @deva[पञ्चभिः क्रीतः] → @deva[पञ्चकः] 'purchased for five'.
"""

standard = """
The affix @deva[कन्] (adding @deva[क]) is used after @deva[संख्या] (numerals, per @ref[1.1.23]) that do not end in @deva[ति] or @deva[शत्], with the senses taught up to @ref[5.1.63]. This supersedes @deva[ठञ्]. Examples: @deva[पञ्चभिः क्रीतः] = @deva[पञ्चकः]; @deva[बहुकः], @deva[गणकः]. Words ending in @deva[ति] or @deva[शत्] take @deva[ठञ्] instead: @deva[साप्ततिकः], @deva[चात्वारिंशतकः]. Note: @deva[कतिकः] takes @deva[कन्] because @deva[कति] is formed with the affix @deva[डति]—the @deva[ति] here is @deva[सानुबन्धक] (has an indicatory letter), not the primitive @deva[ति]-ending meant by this rule.
"""

advanced = """
This @[sūtra] teaches @deva[कन्] after @deva[संख्या] (defined in @ref[1.1.23]) excluding @deva[ति]-finals (@deva[सप्ततिः], @deva[अशीतिः], @deva[विंशतिः]) and @deva[शत्]-finals. The @deva[कन्] supersedes @deva[ठञ्]. Examples: @deva[पञ्चकः], @deva[बहुकः], @deva[गणकः]. For @deva[ति]/@deva[शत्]-finals: @deva[साप्ततिकः], @deva[चात्वारिंशतकः] (with @deva[ठञ्]). The word @deva[कति] takes @deva[कन्] → @deva[कतिकः] because its @deva[ति] comes from the affix @deva[डति], not from being a primitive @deva[ति]-ending numeral. Two maxims apply: @deva[अर्थवद्ग्रहणे नानर्थकस्य] 'a meaningful term denotes only that combination having that meaning' and @deva[निरनुबन्धकग्रहणे न सानुबन्धकस्य] 'a term without @deva[इत्] letters doesn't include forms with @deva[इत्] letters'. Thus @deva[ति] in this @[sūtra] means primitive @deva[ति]-endings, not @deva[डति].
"""

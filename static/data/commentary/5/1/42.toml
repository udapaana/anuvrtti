id = "5.1.42"
numericId = "51042"

[en]
simple = """
The same affixes @deva[अण्] and @deva[अञ्] come after @deva[सर्वभूमि] and @deva[पृथ्वी] in the sense of 'lord thereof'. @deva[सर्वभूमेरीश्वरः] → @deva[सार्वभौमः] 'lord of the whole earth'.
"""

standard = """
The same affixes @deva[अण्] and @deva[अञ्] come after @deva[सर्वभूमि] and @deva[पृथ्वी] respectively in the sense of 'lord thereof' (@deva[तस्य ईश्वरः]). Examples: @deva[सर्वभूमेरीश्वरः] = @deva[सार्वभौमः] 'the lord of the whole earth'; @deva[पार्थिवः] 'the lord of the earth'. The word @deva[तस्य] (showing genitive construction) is repeated in this @[sūtra], though its @deva[अनुवृत्ति] was running from @ref[5.1.38], to indicate that the senses of @ref[5.1.38] (@deva[संयोग], @deva[उत्पात]) do not extend further. Had @deva[तस्य] not been repeated, @deva[ईश्वरः] would have been an attribute of @deva[निमित्तः] like @deva[संयोग] and @deva[उत्पात].
"""

advanced = """
This @[sūtra] reuses @deva[अण्] (after @deva[सर्वभूमि]) and @deva[अञ्] (after @deva[पृथ्वी]) with a new sense: @deva[तस्य ईश्वरः] 'lord thereof'. The repetition of @deva[तस्य] (genitive marker) is significant: it signals that the @deva[अनुवृत्ति] of @deva[निमित्त], @deva[संयोग], @deva[उत्पात] from @ref[5.1.38] does not carry forward. Without this repetition, @deva[ईश्वरः] would have been parsed as an attribute of @deva[निमित्त], not as a separate sense. Examples: @deva[सर्वभूमेरीश्वरः] = @deva[सार्वभौमः]; @deva[पृथ्व्या ईश्वरः] = @deva[पार्थिवः].
"""

id = "5.1.112"
numericId = "51112"

[en]
simple = """
The affix @deva[छ] comes after @deva[समापन] 'completion' when it has a word preceding it in composition. @deva[छन्दःसमापनीयम्] 'for completing the study of meters'.
"""

standard = """
The affix @deva[छ] (adding @deva[ईय]) comes in the sense of 'that whose purpose is this' after @deva[समापन] 'completion' when it has a word (@deva[पद]) in composition preceding it. This supersedes @deva[ठञ्]. Examples: @deva[छन्दःसमापनं प्रयोजनमस्य] = @deva[छन्दःसमापनीयम्] 'for the purpose of completing Vedic meters'; @deva[व्याकरणसमापनीयम्] 'for completing grammar study'. The specific mention of @deva[पद] indicates the rule doesn't apply when a non-@deva[पद] (like the affix @deva[बहुच्] per @ref[5.3.68]) precedes @deva[समापन].
"""

advanced = """
This @[sūtra] teaches @deva[छ] after @deva[समापन] when preceded by a @deva[पद], superseding @deva[ठञ्]. The condition @deva[सपूर्वपदात्] specifies that a @deva[पद] must precede; affixes like @deva[बहुच्] (@ref[5.3.68]) don't qualify. Examples: @deva[छन्दःसमापनीयम्], @deva[व्याकरणसमापनीयम्].
"""

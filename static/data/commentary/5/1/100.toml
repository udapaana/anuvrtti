id = "5.1.100"
numericId = "51100"

[en]
simple = """
The affix @deva[यत्] comes after @deva[कर्मन्] 'action' and @deva[वेष] 'costume' in the instrumental case meaning 'fitted with that'. @deva[कर्मण्यं शरीरम्] 'a body fit for work'; @deva[वेष्यो नटः] 'an actor suited to costume'.
"""

standard = """
The affix @deva[यत्] (adding @deva[य]) comes in the sense of 'fitted with that' after @deva[कर्मन्] 'action, work' and @deva[वेष] 'costume, appearance' in the instrumental (@deva[तृतीया]) case. This supersedes @deva[ठञ्]. Examples: @deva[कर्मणा संपद्यते] = @deva[कर्मण्यं शरीरम्] 'a body fit for work'; @deva[वेषेण संपद्यते] = @deva[वेष्यो नटः] 'an actor suited to costume'. For accent, see @ref[6.1.213].
"""

advanced = """
This @[sūtra] teaches @deva[यत्] after @deva[कर्मन्] and @deva[वेष] in @deva[तृतीया] with @deva[संपद्यते] sense. The @deva[यत्] supersedes @deva[ठञ्]. Results: @deva[कर्मण्यम्] 'fit for action', @deva[वेष्यः] 'suited for costume'. Accent per @ref[6.1.213].
"""

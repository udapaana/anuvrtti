id = "5.1.5"
numericId = "51005"

[en]
simple = """
An affix comes after a word in the dative case with the meaning 'good for that'. @deva[वत्सेभ्यो हितः] → @deva[वत्सीयः] 'fit for calves'.
"""

standard = """
This @[sūtra] establishes the primary sense of the @deva[प्राक्क्रितीय] section: @deva[तस्मै हितम्] 'good/beneficial for that'. The base word appears in the dative (@deva[चतुर्थी]) in the underlying construction. Examples: @deva[वत्सेभ्यो हितो गोधुक्] = @deva[वत्सीयः] 'a cow-milker fit for calves'; @deva[पटव्यम्] 'fit for cloth'; @deva[गव्यम्] 'fit for cows'; @deva[हविष्यम्] 'fit for offering'; @deva[अपूप्यम्] or @deva[अपूपीयम्] 'fit for cakes'.
"""

advanced = """
This @[sūtra] defines the @deva[तस्मै हितम्] sense—the primary meaning of the @deva[प्राक्क्रितीय] affixes. The syntactic paraphrase places the base in @deva[चतुर्थी विभक्ति] (dative): @deva[वत्सेभ्यो हितः गोधुक्] = @deva[वत्सीयः] 'beneficial for calves'. This is the foundational sense from which @ref[5.1.6]-@ref[5.1.11] provide specific bases, and @ref[5.1.12] introduces the second major sense (@deva[प्रकृतौ विकृतेः]). The default affix is @deva[छ] per @ref[5.1.1], superseded by @deva[यत्] etc. as specified in particular @[sūtras].
"""

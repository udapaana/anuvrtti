id = "5.4.65"
numericId = "54065"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[शूल] (spit) with verb @deva[कृ] when meaning 'to roast.' Example: @deva[शूला करोति मांसम्] = @deva[शूले पचति] (roasts meat on a spit).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[शूल] with @deva[कृ] when expressing roasting on a spit. Thus @deva[शूले पचति] = @deva[शूला करोति मांसम्] (roasts meat on a spit). The semantic condition requires the cooking/roasting meaning. Without this: @deva[शूलं करोति कदन्नम्] (bad food causes colic)—here @deva[शूल] means 'sharp pain/colic' and the affix doesn't apply.
"""

advanced = """
The word @deva[शूल] has two meanings: (1) a pointed stake or spit for roasting, and (2) sharp/stabbing pain (colic). The @deva[डाच्] affix applies only when the roasting-instrument sense is intended. The transformation @deva[शूले पचति] → @deva[शूला करोति] incorporates the locative into a verbal compound. The counter-example shows @deva[शूल] as 'colic' where @deva[कदन्न] (bad food) is the cause.
"""

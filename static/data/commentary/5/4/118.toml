id = "5.4.118"
numericId = "54118"

[en]
simple = """
The affix @deva[अच्] is added to @deva[नासिका] (nose) in a @[bahuvrīhi] compound when it's a name, with @deva[नस्] substituted for @deva[नासिका]—but not after @deva[स्थूल]. Examples: @deva[द्रुणसः] (tree-nosed), @deva[गोनसः] (cow-nosed). But: @deva[स्थूलनासिकः वराहः] (thick-nosed boar).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[नासिका] in @[bahuvrīhi] when it's a @deva[संज्ञा] (name), with @deva[नस्] substituted for @deva[नासिका]. Thus @deva[द्रुः इव नासिका अस्य] = @deva[द्रुणसः] (tree-nosed, a name), @deva[वाद्ध्रीणसः], @deva[गोणसः] (cow-nosed, a type of snake). @deva[न] → @deva[ण] by @ref[8.4.3]. Not a name: @deva[तुङ्गनासिकः] (high-nosed person). After @deva[स्थूल]: @deva[स्थूलनासिको वराहः] (thick-nosed boar)—no substitution. @[vārttika]: after @deva[खुर/खर], @deva[नासिका] → @deva[नस्] without affix (@deva[खुरणाः], @deva[खरणाः]) or optionally with @deva[अच्] (@deva[खुरणसः], @deva[खरणसः]).
"""

advanced = """
The @deva[संज्ञायाम्] condition restricts this to proper names or technical terms. The @deva[स्थूल]-exception blocks the substitution, preserving @deva[नासिका]. The @[vārttika]'s @deva[खुर/खर] treatment shows variant patterns. Vedic forms @deva[शितिनाः], @deva[अर्चनाः], @deva[अहिनाः] are noted as authoritative (@deva[इष्टि]).
"""

id = "5.4.132"
numericId = "54132"

[en]
simple = """
@deva[अनङ्] (yielding @deva[अन्]) substitutes for the final of @deva[धनुस्] (bow) in a @[bahuvrīhi] compound. Examples: @deva[शार्ङ्गधन्वा] (having the @[śārṅga] bow), @deva[पुष्पधन्वा] (flower-bowed = @[kāma]), @deva[गाण्डीवधन्वा] (having the @[gāṇḍīva] bow).
"""

standard = """
This @[sūtra] prescribes @deva[अनङ्]-substitution for @deva[धनुस्] (bow) in @[bahuvrīhi]. Thus @deva[शार्ङ्गं धनुः अस्य] = @deva[शार्ङ्गधन्वन्], nom. @deva[शार्ङ्गधन्वा] (@[viṣṇu], having the @[śārṅga] bow). Similarly @deva[गाण्डीवधन्वा] (Arjuna), @deva[पुष्पधन्वा] (@[kāmadeva], flower-bowed), @deva[अधिज्यधन्वा] (with strung bow).
"""

advanced = """
The @deva[धनुस्] → @deva[धन्वन्] change transforms the @deva[अस्]-stem to @deva[अन्]-stem. This is obligatory in @[bahuvrīhi], unlike the optional @ref[5.4.133] for names. The epithets for divine/heroic figures (@deva[शार्ङ्गधन्वा] for @[viṣṇu], @deva[गाण्डीवधन्वा] for Arjuna) show common usage.
"""

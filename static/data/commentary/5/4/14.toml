id = "5.4.14"
numericId = "54014"

[en]
simple = """
The affix @deva[अञ्] comes after @deva[णच्]-ending words when feminine. Example: @deva[व्यावक्रोशी] or @deva[व्यावक्रोश्या] (mutual abuse between women).
"""

standard = """
The @deva[स्वार्थ] affix @deva[अञ्] (@deva[अ]) attaches to @deva[णच्]-ending words (@ref[3.3.43], reciprocal action) when the referent is @deva[स्त्री] (feminine). Examples: @deva[व्यावक्रोशी वर्तते] or @deva[व्यावक्रोश्या वर्तते] (mutual reviling occurs among women); @deva[व्यावहासी] (mutual laughter). The @deva[स्त्री] repetition implies: @deva[स्वार्थिक] affixes don't always inherit @deva[लिङ्ग/वचन] from the base.
"""

advanced = """
The @deva[ज्ञापक] (implication) of @deva[स्त्री] repetition: @deva[स्वार्थिकाः प्रत्ययाः प्रकृतितो लिङ्गवचनान्यतिवर्तन्ते ऽपि]—@deva[स्वार्थिक] affixes can override base gender/number. Examples: @deva[गुडकल्पा द्राक्षा], @deva[तैलकल्पा प्रसन्ना] (feminine despite masculine bases); @deva[देव] → @deva[देवता] (gender change).
"""

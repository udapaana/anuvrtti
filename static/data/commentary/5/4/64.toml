id = "5.4.64"
numericId = "54064"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[दुःख] (pain) with verb @deva[कृ] when meaning 'to displease' or 'to act against another's wishes.' Example: @deva[दुःखा करोति भृत्यः] (the servant displeases/pains the master).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[दुःख] with @deva[कृ] when expressing @deva[प्रातिलोम्य] (going against the grain, opposing another's wishes). Thus @deva[दुःखा करोति भृत्यः] means the servant pains or displeases the master. The condition requires intentional opposition or causing displeasure. Without this meaning: @deva[दुःखं करोति कदन्नम्] (bad food causes pain)—the affix doesn't apply because it describes an effect, not intentional opposition.
"""

advanced = """
The term @deva[प्रातिलोम्य] (lit. 'against the hair/grain') is the opposite of @deva[आनुलोम्य] from the previous @[sūtra]. It denotes acting contrary to wishes, causing displeasure, or opposition. The distinction parallels @ref[5.4.63]: @deva[दुःखा करोति] implies intentional causing of displeasure, while @deva[दुःखं करोति] merely describes pain as a result.
"""

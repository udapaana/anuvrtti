id = "5.4.113"
numericId = "54113"

[en]
simple = """
The affix @deva[षच्] is added to @deva[सक्थि] (thigh) and @deva[अक्षि] (eye) at the end of a @[bahuvrīhi] compound when denoting a body part. Examples: @deva[दीर्घसक्थः] (long-thighed), @deva[लोहिताक्षः] (red-eyed), @deva[विशालाक्षः] (wide-eyed).
"""

standard = """
This @[sūtra] prescribes @deva[षच्] (not @deva[टच्]) after @deva[सक्थि] and @deva[अक्षि] in @[bahuvrīhi] compounds denoting body parts. Thus @deva[दीर्घे सक्थि यस्य] = @deva[दीर्घसक्थः], @deva[कल्याणाक्षः], @deva[लोहिताक्षः], @deva[विशालाक्षः]. @[non-bahuvrīhi]: @deva[परमसक्थिः], @deva[परमाक्षिः]. Non-body-part: @deva[दीर्घसक्थि शकटम्] (cart with long shafts), @deva[स्थूलाक्षि इक्षुः] (thick-eyed sugarcane). The @deva[ष्]-indicatory in @deva[षच्] triggers @deva[ङीष्] for feminine (@ref[4.1.41]): @deva[दीर्घसक्थी स्त्री].
"""

advanced = """
The choice of @deva[षच्] over @deva[टच्] is for accent purposes. Per @ref[6.2.198], the final of a @[bahuvrīhi] optionally has @[udātta]. With @deva[टच्], feminine would use @deva[ङीप्] (@ref[4.1.15]), which is @[anudātta] (@ref[3.1.4])—creating accent inconsistency. With @deva[षच्], feminine uses @deva[ङीष्] (@ref[4.1.41]), which is always @[udātta], ensuring consistent accentuation. The @[bahuvrīhi] @[anuvṛtti] extends to chapter's end.
"""

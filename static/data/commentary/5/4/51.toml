id = "5.4.51"
numericId = "54051"

[en]
simple = """
The affix @deva[च्वि] is added to @deva[अरुस्], @deva[मनस्], @deva[चक्षुस्], @deva[चेतस्], @deva[रहस्], and @deva[रजस्], with elision of their final consonant. Examples: @deva[अरू करोति] (makes into a wound), @deva[उन्मनी करोति] (makes distracted), @deva[विरजी भवति] (becomes dustless).
"""

standard = """
This @[sūtra] specifically lists six words that take @deva[च्वि] with elision of the final consonant before the affix. The words are: @deva[अरुस्] (wound), @deva[मनस्] (mind), @deva[चक्षुस्] (eye), @deva[चेतस्] (consciousness), @deva[रहस्] (solitude), @deva[रजस्] (dust/passion). Thus @deva[अरू करोति/भवति/स्यात्], @deva[उन्मनी करोति], @deva[उच्चक्षू करोति], @deva[विचेती करोति], @deva[विरही करोति], @deva[विरजी करोति]. The short @deva[उ] of @deva[अरु] and @deva[चक्षु] is lengthened by @ref[7.4.26]; the @deva[अ] of others becomes @deva[ई] by @ref[7.4.32].
"""

advanced = """
Though @deva[च्वि] would apply by the general rule @ref[5.4.50], this @[sūtra] is needed to teach consonant elision (@deva[हलन्तलोप]). The final @deva[स्] of these words is dropped before @deva[च्वि]. The phonological rules then apply: @ref[7.4.26] lengthens short @deva[उ] in @deva[अरु], @deva[चक्षु]; @ref[7.4.32] changes @deva[अ] to @deva[ई] in @deva[मनस्], @deva[चेतस्], @deva[रहस्], @deva[रजस्].
"""

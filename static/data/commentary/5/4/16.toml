id = "5.4.16"
numericId = "54016"

[en]
simple = """
The affix @deva[अण्] comes after @deva[विसारिन्] (one who glides out) when it means 'fish.' Example: @deva[वैसारिणः] (a fish). Not when @deva[विसारिन्] means a person gliding out.
"""

standard = """
The @deva[स्वार्थ] affix @deva[अण्] (@deva[अ]) attaches to @deva[विसारिन्] specifically when meaning @deva[मत्स्य] (fish). @deva[वृद्धि] applies: @deva[विसारिन्] → @deva[वैसारिणः] (a fish). Not applicable when @deva[विसारिन्] retains its participial meaning: @deva[विसारी देवदत्तः] (Devadatta who is gliding out).
"""

advanced = """
The semantic restriction @deva[मत्स्ये] limits this @deva[स्वार्थ अण्] to the lexical item 'fish.' @deva[विसारिन्] (from @deva[वि] + √@deva[सृ] + @deva[णिनि]) normally means 'one who goes forth/glides.' The fish-meaning is specialized. @deva[अण्] triggers @deva[वृद्धि]: @deva[इ] → @deva[ऐ].
"""

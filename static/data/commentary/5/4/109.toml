id = "5.4.109"
numericId = "54109"

[en]
simple = """
The affix @deva[टच्] is optionally added to an @[avyayībhāva] compound ending in a neuter word with final syllable @deva[अन्]. Examples: @deva[प्रतिचर्मम्] or @deva[प्रतिचर्म], @deva[उपचर्मम्] or @deva[उपचर्म].
"""

standard = """
This @[sūtra] provides optionality where @ref[5.4.108] was obligatory. When the @[avyayībhāva] ends in a neuter word with @deva[अन्] as its final syllable (@deva[टि]), @deva[टच्] is optional. Thus @deva[प्रतिचर्मम्] or @deva[प्रतिचर्म], @deva[उपचर्मम्] or @deva[उपचर्म]. The neuter gender of the final member triggers the option.
"""

advanced = """
The condition @deva[नपुंसके] (in neuter) qualifies the final compound member. Words like @deva[चर्मन्] (neuter, 'skin/hide') allow either @deva[टच्]-form (@deva[उपचर्मम्]) or non-@deva[टच्]-form (@deva[उपचर्म]). The obligatory-vs-optional distinction between masculine @deva[राजन्] (always @deva[उपराजम्]) and neuter @deva[चर्मन्] (either form) is grammatically significant.
"""

id = "5.4.87"
numericId = "54087"

[en]
simple = """
The affix @deva[अच्] is added to @deva[रात्रि] (night) when preceded by @deva[अहन्], @deva[सर्व], a word denoting part of night, @deva[संख्यात], @deva[पुण्य], or a numeral/indeclinable. Examples: @deva[अहोरात्रः] (day and night), @deva[सर्वरात्रः] (all night), @deva[पूर्वरात्रः] (first part of night), @deva[द्विरात्रः] (two nights), @deva[अतिरात्रः].
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[रात्रि] in @[tatpuruṣa] compounds when preceded by specific words. (1) @deva[अहन्]: @deva[अहश्च रात्रिश्च] = @deva[अहोरात्रः] (Dvandva, day and night). (2) @deva[सर्व]: @deva[सर्वरात्रः] (all night). (3) Night-portion words: @deva[पूर्वरात्रः] (first part), @deva[अपररात्रः] (latter part) by @ref[2.2.1]. (4) @deva[संख्यात]: @deva[संख्याता रात्रिः] = @deva[संख्यातरात्रः] by @ref[2.1.57]. (5) @deva[पुण्य]: @deva[पुण्यरात्रः] (auspicious night). (6) Numerals: @deva[द्विरात्रः], @deva[त्रिरात्रः] (@[samāhāra] Dvigu). (7) Indeclinables: @deva[अतिरात्रः] (beyond the night, an overnight sacrifice), @deva[निरात्रः].
"""

advanced = """
The @[sūtra] combines multiple conditions: @deva[अहन्] forms Dvandva; @deva[सर्व] and night-portion words form descriptive compounds; @deva[संख्यात] follows @ref[2.1.57]; numerals form @[samāhāra] Dvigus (collective sense); indeclinables form @[avyayībhāva-type] compounds. The @deva[अतिरात्र] is a specific Vedic sacrifice extending through the night. The @deva[संख्याव्ययादेः] from @ref[5.4.86] continues here via @deva[च].
"""

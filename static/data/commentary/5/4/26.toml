id = "5.4.26"
numericId = "54026"

[en]
simple = """
The affix @deva[ञ्य] comes after @deva[अतिथि] (guest) in dative case meaning 'for the guest.' Example: @deva[आतिथ्यम्] (hospitality, what is for the guest).
"""

standard = """
The affix @deva[ञ्य] (@deva[य] with @deva[वृद्धि]) attaches to @deva[अतिथि] (guest) in dative expressing @deva[तादर्थ्य] (purpose). Example: @deva[अतिथये इदम्] = @deva[आतिथ्यम्] (hospitality—that which is for the guest). @deva[वृद्धि]: @deva[अ] → @deva[आ].
"""

advanced = """
This continues the @deva[तादर्थ्य] pattern from @ref[5.4.24-25]. @deva[ञ्य] (not @deva[यत्]) applies specifically to @deva[अतिथि]. @deva[आतिथ्यम्] = hospitality, guest-reception rites.
"""

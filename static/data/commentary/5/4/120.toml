id = "5.4.120"
numericId = "54120"

[en]
simple = """
These @[bahuvrīhi] compounds are irregularly formed with @deva[अच्]: @deva[सुप्रातः] (having a good morning), @deva[सुश्वः] (having a good tomorrow), @deva[सुदिवः] (having a good day), @deva[शारिकुक्षः] (bird-bellied), @deva[चतुरश्रः] (four-cornered), @deva[एणीपदः] (doe-footed), @deva[अजपदः] (goat-footed), @deva[प्रोष्ठपदः] (bull-footed).
"""

standard = """
This @[sūtra] lists 8 irregular @[bahuvrīhi] formations with @deva[अच्], some involving @deva[टि]-elision. (1-3) @deva[शोभनं प्रातः अस्य] = @deva[सुप्रातः]; @deva[शोभनं श्वः अस्य] = @deva[सुश्वः]; @deva[शोभनं दिवा अस्य] = @deva[सुदिवः]. (4) @deva[शारेः इव कुक्षिः अस्य] = @deva[शारिकुक्षः] (myna-bellied). (5) @deva[चतस्रः अश्रयः अस्य] = @deva[चतुरश्रः] (four-cornered). (6-7) @deva[एण्याः इव पादौ अस्य] = @deva[एणीपदः]; @deva[अजपदः] (goat-footed). (8) @deva[प्रोष्ठः गौः, तस्य इव पादौ अस्य] = @deva[प्रोष्ठपदः] (bull-footed).
"""

advanced = """
The @deva[टि]-elision affects stems like @deva[प्रातर्] → @deva[प्रात], @deva[श्वस्] → @deva[श्व]. The @deva[सु]-prefix compounds with time-words (@deva[प्रातर्], @deva[श्वस्], @deva[दिवा]) express auspiciousness. @deva[चतुरश्र] shows @deva[अश्रि] (corner) becoming @deva[अश्र]. The animal-foot compounds (@deva[एणीपद], @deva[अजपद], @deva[प्रोष्ठपद]) are @[comparison-bahuvrīhis] with @deva[पाद] → @deva[पद].
"""

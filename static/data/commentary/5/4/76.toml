id = "5.4.76"
numericId = "54076"

[en]
simple = """
The affix @deva[अच्] is added to @deva[अक्षि] (eye) when it does NOT mean 'the eye' (i.e., when used metaphorically). Examples: @deva[लवणाक्षम्] (salt-eye = salt-pit), @deva[पुष्कराक्षम्] (lotus-eye = lotus-pond). But: @deva[ब्राह्मणाक्षि] (a Brahmin's eye).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[अक्षि] when it doesn't mean 'eye' literally (@deva[अदर्शने]). These are @[tatpuruṣa] metaphors formed by @ref[2.1.56]. Thus @deva[लवणाक्षम्] (salt-pit) and @deva[पुष्कराक्षम्] (lotus-pond). When @deva[अक्षि] means the actual eye: @deva[ब्राह्मणाक्षि] (a Brahmin's eye) doesn't take the affix. The forms @deva[कबराक्षः] (perforated horse-veil through which horses see) and @deva[गवाक्षः] (window through which people see) are not exceptions—@deva[दर्शन] here means 'eye' as a synonym, not 'seeing.'
"""

advanced = """
The condition @deva[अदर्शने] excludes the literal eye-meaning. The term @deva[दर्शन] in the @[sūtra] is interpreted as a synonym for 'eye' (@deva[अक्षि] = organ of sight), not the act of seeing. Thus @deva[गवाक्ष] (window, lit. 'cow-eye') and @deva[कबराक्ष] (horse-veil with holes) take the affix because @deva[अक्षि] there denotes 'eye-like opening,' not the act of seeing through them. The @ref[2.1.56] reference indicates these are metaphorical @[tatpuruṣas].
"""

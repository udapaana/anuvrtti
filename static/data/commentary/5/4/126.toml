id = "5.4.126"
numericId = "54126"

[en]
simple = """
The form @deva[दक्षिणेर्मा] is an irregular @[bahuvrīhi] compound meaning 'wounded on the right side by a hunter.' Example: @deva[दक्षिणेर्मा मृगः] (a stag wounded by the hunter on the right flank).
"""

standard = """
This @[sūtra] teaches the irregular formation @deva[दक्षिणेर्मन्] (@deva[दक्षिणम् ईर्म अस्य]) used in connection with a hunter (@deva[लुब्ध] = @deva[व्याध], fowler). Thus @deva[दक्षिणेर्मा मृगः] means 'a stag wounded on the right flank by the hunter.' The word @deva[ईर्म] means 'wound.' In the verse @deva[बाली हेमाब्जमाली... दक्षिणेर्मा], it merely denotes hunting. Without hunting context: @deva[दक्षिणेर्मं शकटम्] (a cart with right-side damage).
"""

advanced = """
The @deva[लुब्ध] (hunter) context triggers this specific formation. @deva[ईर्म] (wound, injury) combines with @deva[दक्षिण] (right) to form the @[bahuvrīhi] 'having a wound on the right.' The technical hunting vocabulary shows specialized compound formation for domain-specific terminology.
"""

id = "5.4.57"
numericId = "54057"

[en]
simple = """
The affix @deva[डाच्] is added to imitative sounds (onomatopoeia) whose reduplicated half has at least two syllables, when not followed by @deva[इति], with verbs @deva[कृ], @deva[भू], or @deva[अस्]. Example: @deva[पटपटा करोति] (makes a pattering sound).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] (real affix @deva[आ]) after @deva[अव्यक्तानुकरण] (imitation of inarticulate sounds) when the word's reduplicated half has at least two syllables (@deva[द्व्यजवरार्ध]), and @deva[इति] does not follow. The word is first reduplicated, then @deva[डाच्] is added. Thus @deva[पटत्] → @deva[पटपटत्] → @deva[पटपटा करोति] (makes a pattering sound). Before @deva[डाच्], final @deva[अत्] is elided by @ref[6.4.143]. Examples: @deva[दमदमा करोति], @deva[खरटखरटा करोति], @deva[त्रपटत्रपटा करोति].
"""

advanced = """
The condition @deva[द्व्यजवरार्ध] means: when reduplicated, the half must have at least (@deva[अवर]) two syllables (@deva[द्व्यच्]). Thus four-syllable or larger reduplicated forms qualify. Counter-examples: @deva[दृषत् करोति] (makes stone)—not an imitative sound; @deva[श्रत् करोति]—half has only one syllable. When @deva[इति] follows: @deva[पटिति करोति] (@ref[6.1.98]). The indicatory @deva[च्] prevents svarita accent: @deva[पटपटासि] retains @[udātta] on @deva[आ], not becoming svarita per @ref[8.2.6].
"""

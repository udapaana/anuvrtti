id = "5.4.18"
numericId = "54018"

[en]
simple = """
The affix @deva[सुच्] (becoming @deva[स्]) replaces @deva[कृत्वसुच्] after @deva[द्वि] (2), @deva[त्रि] (3), and @deva[चतुर्] (4). Examples: @deva[द्विः] (twice), @deva[त्रिः] (thrice), @deva[चतुः] (four times).
"""

standard = """
The affix @deva[सुच्] (@deva[स्]) replaces @deva[कृत्वसुच्] after @deva[द्वि], @deva[त्रि], and @deva[चतुर्] for counting action-repetitions. Examples: @deva[द्विर्भुङ्क्ते] (eats twice), @deva[त्रिर्भुङ्क्ते] (thrice), @deva[चतुर्भुङ्क्ते] (four times). For @deva[चतुर्], @deva[स्] is elided by @ref[8.2.24]. The @deva[च्] indicates @deva[अन्तोदात्त]: @deva[चतुर्] (numeral) vs. @deva[चतुः] (four times) differ in accent.
"""

advanced = """
This @deva[अपवाद] provides @deva[सुच्] for the first three numerals above one. @deva[सुच्] → @deva[स्] (the @deva[उच्] is @deva[इत्]). @deva[चतुर्] (from √@deva[चत्] + @deva[उरन्], @[uṇādi] V.58) differs accentually from @deva[चतुः] (@deva[चतुर्] + @deva[सुच्]). @ref[8.2.24] elides final @deva[स्] after @deva[र्].
"""

id = "5.4.135"
numericId = "54135"

[en]
simple = """
@deva[इ] substitutes for the final @deva[अ] of @deva[गन्ध] (smell) in a @[bahuvrīhi] compound when preceded by @deva[उद्], @deva[पूति], @deva[सु], or @deva[सुरभि]. Examples: @deva[उद्गन्धिः] (having rising smell), @deva[पूतिगन्धिः] (foul-smelling), @deva[सुगन्धिः] (fragrant), @deva[सुरभिगन्धिः]. But: @deva[तीव्रगन्धा वातः].
"""

standard = """
This @[sūtra] prescribes @deva[इ]-substitution for the final @deva[अ] of @deva[गन्ध] in @[bahuvrīhi] when preceded by @deva[उद्], @deva[पूति], @deva[सु], or @deva[सुरभि]. Thus @deva[उद्गन्धिः], @deva[पूतिगन्धिः], @deva[सुगन्धिः], @deva[सुरभिगन्धिः]. Without these prefixes: @deva[तीव्रगन्धा वातः] (wind with strong smell). @[vārttika]: @deva[गन्ध] is a material noun (@deva[गन्धान् पिनष्टि], grinds perfumes) and an adjective (@deva[चन्दनगन्धः], having sandal scent). The substitution applies only when @deva[गन्ध] is adjectival/attributive, not when it's a substance: @deva[शोभना गन्धाः अस्य] = @deva[सुगन्ध आपणिकः] (shopkeeper with good perfumes for sale).
"""

advanced = """
The semantic distinction between @deva[गन्ध] as substance (perfume, material) vs. attribute (smell, scent) determines applicability. The listed prefixes (@deva[उद्] = rising, @deva[पूति] = putrid, @deva[सु] = good, @deva[सुरभि] = fragrant) all modify @deva[गन्ध] attributively. The material-noun use (@deva[सुगन्ध आपणिकः]) blocks substitution because @deva[गन्ध] there means perfume-goods, not scent-quality.
"""

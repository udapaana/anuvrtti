id = "5.4.91"
numericId = "54091"

[en]
simple = """
The affix @deva[टच्] is added to @deva[राजन्], @deva[अहन्], and @deva[सखि] at the end of a @[tatpuruṣa] compound. Examples: @deva[महाराजः] (great king), @deva[परमाहः] (supreme day), @deva[राजसखः] (king's friend).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[राजन्], @deva[अहन्], and @deva[सखि] in compound-final position within @[tatpuruṣa]. Thus @deva[महाराजः], @deva[मद्रराजः]; @deva[परमाहः], @deva[उत्तमाहः] (with @deva[अन्]-elision by @ref[6.4.145]); @deva[राज्ञः सखा] = @deva[राजसखः], @deva[ब्राह्मणसखः]. The feminine @deva[राज्ञी] does not take this affix: @deva[मद्राणां राज्ञी] = @deva[मद्रराज्ञी] (not @deva[मद्रराजी]). The word order in the @[sūtra] (@deva[राजन्] before @deva[अहन्] despite being prosodically heavier) indicates only that form whose final lengthens to @deva[आ] in compounding (@deva[राजा]) is intended, not @deva[राज्ञी].
"""

advanced = """
The @[paribhāṣā] @deva[प्रातिपदिकग्रहणं लिङ्गविशिष्टस्यापि ग्रहणम्] would normally include the feminine @deva[राज्ञी]. However, the @[sūtra]'s word order—placing @deva[राजन्] before the lighter @deva[अहन्]—signals that only the masculine/strong stem (which lengthens to @deva[राजा] in compounds) is intended. This syntactic cue excludes the feminine @deva[राज्ञी] from taking @deva[टच्].
"""

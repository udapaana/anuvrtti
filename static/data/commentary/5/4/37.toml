id = "5.4.37"
numericId = "54037"

[en]
simple = """
The affix @deva[अण्] is added to @deva[ओषधि] (medicine/herb) when not referring to a species. Examples: @deva[औषधं पिबति] (he drinks medicine), @deva[औषधं ददाति] (he gives medicine). For species: @deva[औषधयः क्षेत्ररूढाः] (herbs growing in the field).
"""

standard = """
This @[sūtra] prescribes @deva[अण्] after @deva[ओषधि] when it does not denote a @deva[जाति] (species or class). Thus @deva[औषधम्] refers to medicine in a general sense—something one drinks or gives. When @deva[ओषधि] denotes a species (as in @deva[औषधयः क्षेत्ररूढा भवन्ति], 'the herbs are growing in the field'), the affix is not applied because the species meaning is involved.
"""

advanced = """
The condition @deva[अजातौ] excludes the @deva[जाति] (generic/species) sense. When @deva[ओषधि] refers to medicinal substance in actual use (drinking, giving, applying), it takes @deva[अण्] yielding @deva[औषध]. When it refers to the botanical class or species of herbs, the base form is retained. This semantic distinction—individual/substance use vs. class/species reference—determines affix application.
"""

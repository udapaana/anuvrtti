id = "5.4.36"
numericId = "54036"

[en]
simple = """
The affix @deva[अण्] is added to @deva[कर्मन्] (work/occupation) when referring to work done as a commission or in response to a verbal directive. Example: @deva[कार्मणम्] = commissioned work.
"""

standard = """
This @[sūtra] teaches @deva[अण्] after @deva[कर्मन्] when the work is @deva[वाचिक]—done in pursuance of or in response to a verbal message or commission. Thus @deva[कार्मणम्] refers to work performed as a commission agent or delegated task. A @[vārttika] adds that in the Vedas, words like @deva[कुलाल], @deva[वरुड], @deva[निषाद], @deva[कर्मार], @deva[चण्डाल], @deva[मित्र], and @deva[अमित्र] also take @deva[अण्] (yielding @deva[कौलालः], @deva[वारुडः], @deva[नैषादः], etc.).
"""

advanced = """
The context @deva[वाचिके] links this to the previous @[sūtra]—work that arises from a verbal commission or directive. Additional Vedic and secular derivatives with @[svārthika] @deva[अण्] include: @deva[सान्नाय्यः], @deva[आनुजावरः], @deva[आनुषूकः], @deva[आनुष्टुभः], @deva[चातुष्प्राश्यः] (food eaten by four = @deva[ब्रह्मौदन]), @deva[राक्षोघ्नाः] (that by which demons are slain), @deva[वैयातः], @deva[वैकृतः], @deva[वारिवस्कृतः] (one who performs service @deva[वरिवः] = @deva[परिचर्या]), @deva[आग्रायणः], @deva[आग्राहायणः], @deva[सान्तपनः].
"""

id = "5.4.70"
numericId = "54070"

[en]
simple = """
The @deva[समासान्त] affixes are NOT added when @deva[किम्] precedes the compound in the sense of reproach. Examples: @deva[किंराजा] (what kind of king is he who doesn't protect?), @deva[किंसखा], @deva[किंगौः].
"""

standard = """
This @[sūtra] prohibits @deva[समासान्त] when @deva[किम्] precedes with @deva[निन्दा] (reproach) meaning. Thus @deva[किंराजा यो न रक्षति] (he's no king who doesn't protect), @deva[किंसखा योऽभिद्रुह्यति] (he's no friend who betrays), @deva[किंगौर्यो न वहति] (it's no ox that doesn't bear burdens). Compounding follows @ref[2.1.64]. The reproach sense is essential: @deva[कस्य राजा] = @deva[किंराजः] (whose king?), @deva[किंसखः], @deva[किंगवः]—interrogative sense without reproach takes the affix.
"""

advanced = """
The semantic condition @deva[निन्दायाम्] distinguishes reproachful @deva[किम्] ('what kind of X is this?!' = 'this is no X') from interrogative @deva[किम्] ('whose X?'). The reproachful construction denies the very designation: @deva[किंराजा] rhetorically questions whether the person deserves to be called @deva[राजन्]. When @deva[किम्] is genuinely interrogative (asking 'whose?'), the @[samāsānta] affix applies normally.
"""

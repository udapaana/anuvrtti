id = "5.4.61"
numericId = "54061"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[सपत्र] (with feathers) and @deva[निष्पत्र] (through and through) with verb @deva[कृ] when meaning 'to cause intense pain.' Example: @deva[सपत्रा करोति मृगम्] (pierces the deer so deeply that even the arrow's feathers enter).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[सपत्र] and @deva[निष्पत्र] with @deva[कृ] when expressing @deva[अतिव्यथन] (violent pain). Thus @deva[सपत्रा करोति मृगं व्याधः] = @deva[सपत्रं शरमस्य शरीरे प्रवेशयति] (the hunter pierces so violently that the feathered part of the arrow enters the body). @deva[निष्पत्रा करोति] = @deva[शरीरात् शरमपरपार्श्वे निष्क्रामयति] (pierces so that the arrow exits the other side with its feathers). Without this meaning: @deva[सपत्रं वृक्षं करोति] (makes the tree leafy) or @deva[निष्पत्रं वृक्षतलं करोति] (clears the leaves from tree-base).
"""

advanced = """
The semantic condition @deva[अतिव्यथन] (causing intense pain) specifically refers to the violence of arrow-piercing where the depth of penetration is emphasized. @deva[सपत्र] indicates the feathered fletching entering along with the arrowhead; @deva[निष्पत्र] indicates complete penetration and exit. The counter-examples with trees show the literal meanings 'leafy' and 'leafless' where @deva[डाच्] doesn't apply.
"""

id = "5.4.110"
numericId = "54110"

[en]
simple = """
The affix @deva[टच्] is optionally added to an @[avyayībhāva] compound ending in @deva[नदी], @deva[पौर्णमासी], or @deva[आग्रहायणी]. Examples: @deva[उपनदम्] or @deva[उपनदि], @deva[उपपौर्णमासम्] or @deva[उपपौर्णमासि].
"""

standard = """
This @[sūtra] prescribes optional @deva[टच्] after @deva[नदी] (river), @deva[पौर्णमासी] (full-moon day), and @deva[आग्रहायणी] (a specific day/month) in @[avyayībhāva] compounds. Thus @deva[नद्याः समीपम्] = @deva[उपनदम्] or @deva[उपनदि]; @deva[उपपौर्णमासम्] or @deva[उपपौर्णमासि]; @deva[उपाग्रहायणम्] or @deva[उपाग्रहायणि]. The forms without @deva[टच्] retain the @deva[ई]-ending.
"""

advanced = """
These three feminine words specifically get optional treatment. The @deva[टच्] forms show @deva[ई] → @deva[अ] change (@deva[नदी] → @deva[उपनदम्]), while non-@deva[टच्] forms retain @deva[इ] (@deva[उपनदि]). This parallels the neuter optionality in @ref[5.4.109] but for specific feminines.
"""

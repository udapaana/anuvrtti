id = "5.4.31"
numericId = "54031"

[en]
simple = """
The affix @deva[कन्] is added to @deva[लोहित] (red) when referring to a temporary, non-permanent color. Example: @deva[लोहितकः कोपेन] (red with anger). Without the affix: @deva[लोहितो गौः] (a red cow) or @deva[लोहितं रुधिरम्] (red blood)—these refer to permanent color.
"""

standard = """
This @[sūtra] teaches that @deva[कन्] is added to @deva[लोहित] when expressing a non-permanent (@deva[अनित्य]) color—typically caused by emotion or temporary conditions. Thus @deva[लोहितकः कोपेन] means 'red with anger' and @deva[लोहितकः पीडनेन] means 'red from pain.' When the redness is natural or permanent (like @deva[लोहितो गौः] 'a red cow' or @deva[लोहितं रुधिरम्] 'red blood'), the affix does not apply. A @[vārttika] notes that the derivative need not follow the gender of the primitive, yielding forms like @deva[लोहितिका] or @deva[लोहिनिका].
"""

advanced = """
This @[sūtra] restricts @deva[कन्] to @deva[लोहित] in the sense of @deva[वर्णे अनित्ये]—color that is transient or induced by circumstance. The semantic distinction is important: @deva[लोहितकः] conveys temporary redness (anger, exertion, pain), while the base @deva[लोहित] without affix denotes inherent or permanent color. The @[vārttika] (@deva[न प्रकृतिवद्भावो वक्तव्यः]) permits gender independence in the derived form, allowing feminine @deva[लोहितिका] or @deva[लोहिनिका] without requiring agreement with the primitive's gender.
"""

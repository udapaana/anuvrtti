id = "5.4.158"
numericId = "54158"

[en]
simple = """
In Vedic (ancient religious) texts, @deva[बहुव्रीहि] compounds ending in short @deva[ऋ] do NOT get the suffix @deva[कप्]. So Vedic forms like @deva[हतपिता] "one whose father was slain" appear without @deva[कप्].
"""

standard = """
@[sūtra] @ref[5.4.158] prohibits @deva[कप्] in Vedic usage (@deva[छन्दसि]) for @deva[बहुव्रीहि] compounds whose final member ends in short @deva[ऋ]. This is an exception to @ref[5.4.153], which mandates @deva[कप्] for short-@deva[ऋ]-finals in classical Sanskrit.

**Worked example:** @deva[हत] + @deva[पितृ] → @deva[बहुव्रीहि] "one whose father was slain" → in Vedic context, no @deva[कप्] → @deva[हतपिता] (Vedic nom. sg.). In classical Sanskrit, @ref[5.4.153] would require @deva[हतपितृकः].

Other Vedic examples: @deva[हतमाता] "one whose mother was slain," @deva[हतस्वसा] "one whose sister was slain," @deva[सुहोता] "one who is a fine sacrificer" — all classical @deva[ऋ]-stems appearing without @deva[कप्] in Vedic.

The @[sūtra] reflects the general principle that Vedic grammar is more archaic, preserving forms that classical grammar later regularized.
"""

advanced = """
@[sūtra] @ref[5.4.158]: @deva[छन्दसि च ऋतः] — in Vedic (@deva[छन्दस्]), @deva[कप्] is not added after @deva[बहुव्रीहि] compounds ending in short @deva[ऋ]. The @deva[च] indicates this prohibition operates alongside @ref[5.4.157].

**Relationship to @ref[5.4.153]:** In classical Sanskrit (@deva[भाषा]), @ref[5.4.153] mandates @deva[कप्] after @deva[ऋ]-final @deva[बहुव्रीहि]. This @[sūtra] blocks that for Vedic. The result is that @deva[ऋ]-stem @deva[बहुव्रीहि] in Vedic declines as bare @deva[ऋ]-stems.

**Vedic @deva[ऋ]-stem declension:** In the absence of @deva[कप्], the compound takes regular @deva[ऋ]-stem endings. Nom. sg.: @deva[पितृ] → @deva[पिता]; hence @deva[हतपिता], @deva[हतमाता] (from @deva[मातृ]), @deva[सुहोता] (from @deva[होतृ]).

**Vedic examples from the corpus:**
- @deva[हतपिता] — @[ṛgveda]: "one whose father was killed"
- @deva[हतमाता] — parallel formation for mother
- @deva[हतस्वसा] — from @deva[स्वसृ] "sister" (a related @deva[ऋ]-stem)
- @deva[सुहोता] — "one who is an excellent hotr-priest" (@[ṛgvedic] epithet)

**Scope of @deva[छन्दस्]:** The term @deva[छन्दस्] in @[pāṇini] covers all Vedic texts (@[ṛk], @[sāman], Yajus, Atharvan), not just metrical verse. Formations attested anywhere in the Vedic corpus qualify.

**@deva[नदी]-final @deva[ऋ]:** The prohibition in this @[sūtra] covers only short @deva[ऋ]-finals, not @deva[नदी]-type @deva[ई]/@deva[ऊ]-finals. The latter follow @ref[5.4.153] or @ref[5.4.159]–@ref[5.4.160] as appropriate even in Vedic.
"""

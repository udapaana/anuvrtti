id = "5.4.147"
numericId = "54147"

[en]
simple = """
The @[bahuvrīhi] @deva[त्रिककुत्] (three-humped/three-peaked) is specifically the name of a mountain. When not naming a mountain: @deva[त्रिककुदः].
"""

standard = """
This @[sūtra] teaches that @deva[त्रिककुत्] (formed by @deva[द]-elision from @deva[ककुद]) is specifically a mountain name. @deva[त्रीणि ककुदानि अस्य] = @deva[त्रिककुत्] (a three-peaked hill, peaks shaped like humps). This is a @deva[संज्ञा] (proper name) for a particular mountain, not all three-peaked hills. When not naming this specific mountain: @deva[त्रिककुदः] (three-humped).
"""

advanced = """
The @deva[पर्वतस्य] (of a mountain) condition makes this a proper noun formation. The @deva[द]-elision creates a distinctive form for the mountain name. Generic three-peaked/three-humped descriptions use the unelided @deva[त्रिककुद]. This parallels place-name formations where morphological irregularity marks proper-noun status.
"""

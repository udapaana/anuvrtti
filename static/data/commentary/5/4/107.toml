id = "5.4.107"
numericId = "54107"

[en]
simple = """
The affix @deva[टच्] is added to words of the @deva[शरद्] class when forming an @[avyayībhāva] compound. Examples: @deva[उपशरदम्] (near autumn), @deva[प्रतिशरदम्], @deva[उपविपाशम्], @deva[प्रतिविपाशम्]. But: @deva[परमशरत्] (@[tatpuruṣa]).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[शरदादि] words in @[avyayībhāva] compounds. Thus @deva[शरदः समीपम्] = @deva[उपशरदम्], @deva[प्रतिशरदम्]; @deva[उपविपाशम्], @deva[प्रतिविपाशम्]. @[non-avyayībhāva]: @deva[परमशरत्] (supreme autumn). Words ending in @deva[झय्] consonants take @deva[टच्] obligatorily (@deva[नित्य]) despite @ref[5.4.111]'s option. The @deva[अव्ययीभाव] @[anuvṛtti] extends to @ref[5.4.113].
"""

advanced = """
The @deva[शरदादि] @[gaṇa] includes 23 items: @deva[शरद्], @deva[विपाश्], @deva[अनस्], @deva[मनस्], @deva[उपानह्], @deva[अनडुह्], @deva[दिव्], @deva[हिमवत्], @deva[हिरुक्], @deva[विद्], @deva[सद्], @deva[दिश्], @deva[दृश्], @deva[विश्], @deva[चतुर्], @deva[त्यद्], @deva[तद्], @deva[यद्], @deva[कियत्], @deva[जरा/जरस्] (as @deva[उपजरसम्]), @deva[अक्ष्न्] after @deva[प्रति/पर/सम्/अनु] (yielding @deva[प्रत्यक्षम्], @deva[परोक्षः], @deva[समक्षम्], @deva[अन्वक्षम्]), @deva[पथिन्], @deva[सदृश्].
"""

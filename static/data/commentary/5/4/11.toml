id = "5.4.11"
numericId = "54011"

[en]
simple = """
The affix @deva[आम्] is added to @deva[तर]/deva[@deva[तम]] when they follow @deva[किम्], @deva[ए]-ending words, finite verbs, or indeclinables—but not when the comparison is of a substance (only actions/qualities). Examples: @deva[किंतराम्], @deva[पचतितराम्], @deva[उच्चैस्तराम्].
"""

standard = """
The affix @deva[आम्] is added to @deva[तरप्/तमप्] (comparative/superlative) after: @deva[किम्] (@ref[5.3.55]), @deva[ए]-ending words (@ref[6.3.17]), @deva[तिङन्त] (verbs, @ref[5.3.56-57]), or @deva[अव्यय] (indeclinables). Condition: @deva[अद्रव्यप्रकर्ष]—the comparison must be of action/quality, not substance. Examples: @deva[किंतराम्], @deva[पूर्वाह्णेतराम्], @deva[पचतितराम्] (cooks more), @deva[उच्चैस्तराम्] (more loudly). Not: @deva[उच्चैस्तमः तरुः] (tallest tree—substance comparison).
"""

advanced = """
The @deva[अद्रव्यप्रकर्ष] condition restricts @deva[आम्] to adverbial comparisons. @deva[द्रव्य] (substance) itself lacks @deva[प्रकर्ष] (gradation)—only its @deva[गुण] (quality) can be graded. Adjectival comparisons (@deva[उच्चैस्तमः तरुः]) don't take @deva[आम्]. The @deva[घ]-designation (@ref[1.1.22]) covers both @deva[तरप्] and @deva[तमप्].
"""

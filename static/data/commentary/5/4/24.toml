id = "5.4.24"
numericId = "54024"

[en]
simple = """
The affix @deva[यत्] comes after @deva[देवता]-ending stems in dative case meaning 'appointed for that deity.' Examples: @deva[अग्निदेवत्यम्] (sacred to Agni), @deva[पितृदेवत्यम्] (sacred to the @[pitṛs]).
"""

standard = """
The affix @deva[यत्] (@deva[य]) attaches to dative-case stems ending in @deva[देवता] expressing @deva[तादर्थ्य] (purpose—'for the sake of'). Examples: @deva[अग्निदेवतायै इदम्] = @deva[अग्निदेवत्यम्] (offering sacred to Agni); @deva[पितृदेवत्यम्], @deva[वायुदेवत्यम्].
"""

advanced = """
The @deva[तादर्थ्य] (purpose) sense is expressed through dative construction before affixation. @deva[यत्] → @deva[य]. The pattern @deva[X-देवताय इदम्] → @deva[X-देवत्यम्] forms ritual terminology for offerings dedicated to specific deities.
"""

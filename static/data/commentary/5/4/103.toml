id = "5.4.103"
numericId = "54103"

[en]
simple = """
In Vedic usage, the affix @deva[टच्] is optionally added to a neuter @[tatpuruṣa] compound ending in @deva[अन्] or @deva[अस्]. Examples: @deva[हस्तिचर्मम्] (elephant hide), @deva[देवच्छन्दसम्] (divine meter). But: @deva[बिल्वदारु] (bilva wood).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] in @deva[छन्दस्] (Vedic literature) after neuter @[tatpuruṣa] compounds ending in @deva[अन्] or @deva[अस्]. Examples with @deva[अन्]: @deva[हस्ति] + @deva[चर्मन्] = @deva[हस्तिचर्मम्] as in @deva[हस्तिचर्मे जुहोति], @deva[ऋषभचर्मे अभिषिञ्चति]. Examples with @deva[अस्]: @deva[देव] + @deva[छन्दस्] = @deva[देवच्छन्दसम्], @deva[मनुष्यच्छन्दसानि]. Not ending in @deva[अन्/अस्]: @deva[बिल्वदारु जुहोति]. Not neuter: @deva[सुत्रामाणं पृथिवीं द्याम् अनेहसम्]. A @[vārttika] adds @deva[वा] (optionally): @deva[ब्रह्मसाम] or @deva[ब्रह्मसामम्], @deva[देवच्छन्दः] or @deva[देवच्छन्दसम्].
"""

advanced = """
The Vedic restriction (@deva[छन्दसि]) limits this to sacred texts. The dual condition—neuter gender AND @deva[अन्/अस्] ending—is required. The @[vārttika]'s @deva[वा] creates optionality between forms with and without @deva[टच्]. This reflects the greater morphological flexibility in Vedic Sanskrit compared to classical usage.
"""

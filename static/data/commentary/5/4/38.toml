id = "5.4.38"
numericId = "54038"

[en]
simple = """
The affix @deva[अण्] is added to words in the @deva[प्रज्ञ] class without changing their meaning. Example: @deva[प्राज्ञः] = @deva[प्रज्ञः] (wise person). This differs from @deva[प्राज्ञः] formed from @deva[प्रज्ञा] (wisdom) with @deva[मतुप्] sense.
"""

standard = """
This @[sūtra] prescribes @[svārthika] @deva[अण्] after the @deva[प्रज्ञादि] @[gaṇa]. Thus @deva[प्रज्ञः] (from @deva[प्रजानाति], one who knows fully) becomes @deva[प्राज्ञः] with feminine @deva[प्राज्ञी]. This differs from @deva[प्राज्ञः] derived from @deva[प्रज्ञा] (wisdom) by @deva[ण] with @deva[मतुप्] sense (@ref[5.2.101]), which has feminine @deva[प्राज्ञा]. Special forms include @deva[श्रौत्रम्] from @deva[श्रोत्र] when meaning 'body' (vs. @deva[श्रोत्रम्] 'hearing'), @deva[जौह्वतः] from @deva[जुह्वत्] meaning 'black antelope', and @deva[कार्ष्णः] from @deva[कृष्ण] meaning 'black antelope.'
"""

advanced = """
The @deva[प्रज्ञादि] @[gaṇa] contains 36 items with various conditions. The presence of @deva[विदन्] (from @deva[विद्] + @deva[शतृ]) in the list proves that @deva[वसु]-substitution (@ref[7.1.36]) for @deva[शतृ] after @deva[विद्] is optional, allowing @deva[विदन्] alongside @deva[विद्वान्]. The list includes: @deva[प्रज्ञ], @deva[वणिज्], @deva[उशिज्], @deva[उष्णिज्], @deva[प्रत्यक्ष], @deva[विद्वस्], @deva[विदन्], @deva[षोडन्], @deva[विद्या], @deva[मनस्], @deva[श्रोत्र] (body sense), @deva[जुह्वत्], @deva[कृष्ण] (antelope sense), @deva[चिकीर्षत्], @deva[चोर], @deva[शत्रु], @deva[योध], @deva[चक्षुस्], @deva[वसु], @deva[एनस्], @deva[मरुत्], @deva[कुञ्च], @deva[सत्वन्], @deva[दशार्ह], @deva[वयस्], @deva[व्याकृत], @deva[असुर], @deva[रक्षस्], @deva[पिशाच], @deva[अशनि], @deva[कर्षापण], @deva[देवता], @deva[बन्धु], @deva[षोडश], @deva[धूर्त], @deva[राजन्].
"""

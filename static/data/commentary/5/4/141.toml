id = "5.4.141"
numericId = "54141"

[en]
simple = """
@deva[दत्] (with indicatory @deva[ऋ]) substitutes for @deva[दन्त] (tooth) in a @[bahuvrīhi] compound when preceded by a numeral or @deva[सु], and the compound expresses an age/life-stage. Examples: @deva[द्विदन्] (child at the two-tooth stage), @deva[सुदन्] (child with all teeth beautifully grown).
"""

standard = """
This @[sūtra] prescribes @deva[दतृ]-substitution for @deva[दन्त] in age-denoting @[bahuvrīhi] when preceded by a numeral or @deva[सु]. The @deva[ऋ] is indicatory, triggering @ref[7.1.70] (nasal insertion in @[sarvanāmasthāna]) and @ref[4.1.6]. Thus @deva[द्वौ दन्तौ अस्य] = @deva[द्विदन्] (a child at the two-tooth stage), @deva[त्रिदन्], @deva[चतुर्दन्]. @deva[शोभनाः दन्ताः अस्य समस्ताः जाताः] = @deva[सुदन् कुमारः] (a boy at the stage of beautiful full dentition). Without age-meaning: @deva[द्विदन्तः कुञ्जरः] (two-tusked elephant).
"""

advanced = """
The @deva[वयसि] (age-stage) condition restricts this to developmental markers—children's stages marked by tooth eruption. The @deva[उगित्] (indicatory @deva[ऋ]) designation makes these words follow @deva[उगित्] declension patterns, particularly nasal insertion before @deva[त्] in strong cases. Non-age contexts retain @deva[दन्त].
"""

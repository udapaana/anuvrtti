id = "5.4.44"
numericId = "54044"

[en]
simple = """
The affix @deva[तसि] (-@deva[तः]) is optionally added to replace the ablative case when the fifth case arises from connection with the @deva[कर्मप्रवचनीय] @deva[प्रति]. Examples: @deva[वासुदेवतः प्रति] = @deva[वासुदेवात् प्रति] (in relation to @[vāsudeva]).
"""

standard = """
This @[sūtra] prescribes optional @deva[तसि] (yielding -@deva[तः]) after an ablative that arises due to the @deva[कर्मप्रवचनीय] word @deva[प्रति] (as taught in @ref[2.3.11]). Thus @deva[प्रद्युम्नः वासुदेवतः प्रति] or @deva[वासुदेवात् प्रति]. Similarly @deva[अभिमन्युरर्जुनतः प्रति]. The @deva[वा] (optionally) continues, so the regular ablative forms are equally valid. A @[vārttika] adds that @deva[तसि] comes after @deva[आदि]-class words: @deva[आदितः], @deva[मध्यतः], @deva[पार्श्वतः], @deva[पृष्ठतः], etc. This is an @deva[आकृतिगण] (open-ended class).
"""

advanced = """
The ablative governed by @deva[कर्मप्रवचनीय] @deva[प्रति] (per @ref[2.3.11]) can optionally take @deva[तसि]. The @deva[आद्यादि] @[vārttika] establishes an @deva[आकृतिगण]—an open class without exhaustive enumeration—for locational/directional words that take @deva[तसि]: @deva[आदि] (beginning), @deva[मध्य] (middle), @deva[पार्श्व] (side), @deva[पृष्ठ] (back), etc. These forms (@deva[आदितः], @deva[मध्यतः]) are common in both Vedic and classical Sanskrit.
"""

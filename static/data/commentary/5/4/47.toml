id = "5.4.47"
numericId = "54047"

[en]
simple = """
The affix @deva[तसि] is optionally added to a non-agentive instrumental when used with the verb @deva[हीय] (passive of @deva[हा]) or the word @deva[पाप] (sinful). Examples: @deva[वृत्ततः हीयते] = @deva[वृत्तेन हीयते] (falls short in conduct), @deva[वृत्ततः पापः] = @deva[वृत्तेन पापः] (sinful regarding conduct).
"""

standard = """
This @[sūtra] extends @deva[तसि] to non-agentive instrumentals when connected with @deva[हीय] (passive of @deva[हा], to abandon/fall short) or the adjective @deva[पाप] (sinful). Thus @deva[वृत्तेन हीयते] = @deva[वृत्ततः हीयते] (falls short in conduct), and @deva[वृत्तेन पापः] = @deva[वृत्ततः पापः] (sinful regarding conduct). This applies where no censure is implied—merely stating a fact. Where censure is intended, @ref[5.4.46] applies. The @deva[अकर्तरि] condition continues: @deva[देवदत्तेन हीयते] (abandoned by Devadatta) doesn't take the affix.
"""

advanced = """
The distinction from @ref[5.4.46] is semantic: this @[sūtra] applies to neutral statements of fact (@deva[वार्ता]), while the previous @[sūtra] applies when @deva[निन्दा] (censure) is expressed. Both require @deva[अकर्तरि] (non-agentive) and @deva[तृतीया] (instrumental). The word @deva[पाप] as a qualifier takes the instrumental in the same pattern as the verbal constructions.
"""

id = "5.4.150"
numericId = "54150"

[en]
simple = """
The words @deva[सुहृत्] (friend) and @deva[दुर्हृत्] (enemy) are irregular @[bahuvrīhi] compounds formed by eliding @deva[अय] from @deva[हृदय] (heart). Examples: @deva[सुहृत्] (well-hearted = friend), @deva[दुर्हृत्] (ill-hearted = enemy). But: @deva[सुहृदयः कारुणिकः] (kind-hearted person).
"""

standard = """
This @[sūtra] teaches the irregular formations @deva[सुहृत्] and @deva[दुर्हृत्] from @deva[सु/दुर्] + @deva[हृदय], with @deva[अय]-elision. @deva[सुहृत्] means 'one whose heart is favorably disposed' = friend. @deva[दुर्हृत्] means 'one whose heart is evil' = enemy. These specific meanings trigger the formation. Without friend/enemy meaning: @deva[सुहृदयः कारुणिकः] (kind-hearted, merciful person), @deva[दुर्हृदयः चोरः] (evil-hearted thief)—full @deva[हृदय] retained.
"""

advanced = """
The semantic condition (@deva[मित्रामित्रार्थे], in the sense of friend/enemy) restricts the irregular formation. @deva[सुहृत्/दुर्हृत्] are lexicalized as 'friend/enemy' specifically, while @deva[सुहृदय/दुर्हृदय] remain compositional ('good-hearted/bad-hearted'). This shows semantic specialization driving morphological irregularity.
"""

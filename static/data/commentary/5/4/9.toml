id = "5.4.9"
numericId = "54009"

[en]
simple = """
The affix @deva[छ] (becoming @deva[ईय]) comes after stems ending in @deva[जाति] when meaning 'appropriateness.' Example: @deva[ब्राह्मणजातीयः] (appropriate to a @[brāhmaṇa]).
"""

standard = """
The affix @deva[छ] (@deva[ईय]) attaches without sense-change to @deva[जाति]-ending stems expressing @deva[बन्धु] (appropriateness—what regulates/individualizes the class). Examples: @deva[ब्राह्मणजातीयः] (befitting a @[brāhmaṇa]); @deva[क्षत्रियजातीयः]; @deva[वैश्यजातीयः]. Not when @deva[जाति] is the main meaning: @deva[ब्राह्मणजातिः शोभना] (the @[brāhmaṇa] caste is beautiful).
"""

advanced = """
The @deva[बन्धु] sense = @deva[बध्यते नियम्यते स्वतन्त्री क्रियते]—that which regulates, individualizes, distinguishes a class. @deva[छ] is @deva[नित्य] here (between two @deva[विभाषा] rules by maxim). @deva[ब्राह्मणजातीय] = appropriate to/befitting the @[brāhmaṇa] class.
"""

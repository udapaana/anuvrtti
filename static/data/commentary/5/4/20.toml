id = "5.4.20"
numericId = "54020"

[en]
simple = """
The affix @deva[धा] optionally comes after @deva[बहु] (many) when counting action-repetitions occurring in a short time. Example: @deva[बहुधा] or @deva[बहुकृत्वः] (many times a day). Not for long intervals.
"""

standard = """
The affix @deva[धा] optionally replaces @deva[कृत्वसुच्] after @deva[बहु] when @deva[अविप्रकृष्टकाल] (short time interval) is meant. Examples: @deva[बहुधा दिवसस्य भुङ्क्ते] or @deva[बहुकृत्वो दिवसस्य भुङ्क्ते] (eats many times a day). When time is distant (@deva[विप्रकृष्ट]): only @deva[बहुकृत्वो मासस्य भुङ्क्ते] (eats many times in a month—due to poverty, not daily).
"""

advanced = """
The @deva[अविप्रकृष्टकाल] condition restricts @deva[धा] to rapid repetitions. @deva[विप्रकृष्ट] (distant) time-intervals use only @deva[कृत्वसुच्]. @deva[धा] is the same affix as @ref[5.3.42] (manner/distribution). @deva[विकल्प] allows both forms for short intervals.
"""

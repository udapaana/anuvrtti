id = "5.4.95"
numericId = "54095"

[en]
simple = """
The affix @deva[टच्] is added to @deva[तक्षन्] (carpenter) at the end of a @[tatpuruṣa] compound when preceded by @deva[ग्राम] or @deva[कौट]. Examples: @deva[ग्रामतक्षः] (village carpenter), @deva[कौटतक्षः] (independent craftsman).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[तक्षन्] (carpenter) in @[tatpuruṣa] when preceded by @deva[ग्राम] or @deva[कौट]. The @[jāti]/@[saṃjñā] condition from the previous @[sūtra] doesn't continue here. @deva[ग्रामस्य तक्षा] = @deva[ग्रामतक्षः] (the public carpenter shared by all villagers). @deva[कुट्यां भवः] = @deva[कौटः]; @deva[कौटस्य तक्षा] = @deva[कौटतक्षः] (an independent artisan, not bound under engagement to any particular patron—@deva[स्वतन्त्रः कर्मजीवी]).
"""

advanced = """
The @deva[ग्रामतक्ष] is a communal craftsman serving the village collectively (@deva[बहूनां साधारणः]). The @deva[कौटतक्ष] represents the opposite—an independent professional (@deva[न कस्यचित् प्रातिबद्धः]). The semantic distinction reflects social/economic categories of artisans in traditional society. The @deva[कौट] is derived from @deva[कुटी] (hut/workshop) + taddhita.
"""

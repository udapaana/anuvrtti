id = "5.4.104"
numericId = "54104"

[en]
simple = """
The affix @deva[टच्] is added to @deva[ब्रह्मन्] (Brahmin) at the end of a @[tatpuruṣa] compound when the first member denotes a country (making a person of that region). Examples: @deva[सुराष्ट्रब्रह्मः] (a Brahmin from @[suraṣṭra]), @deva[अवन्तिब्रह्मः] (a Brahmin from Avanti). But: @deva[देवब्रह्मा] (bard of the gods).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[ब्रह्मन्] in @[tatpuruṣa] when the compound denotes a @deva[जानपद] (person belonging to a region). The first member must be a country name. Thus @deva[सुराष्ट्रेषु ब्रह्मा] = @deva[सुराष्ट्रब्रह्मः] (a Brahmin of @[suraṣṭra]), @deva[अवन्तिब्रह्मः] (a Brahmin of Avanti). These are Locative @[tatpuruṣas]. Without the regional meaning: @deva[देवब्रह्मा नारदः] (@[nārada] the divine bard)—no affix.
"""

advanced = """
The condition @deva[जानपदे] (denoting regional affiliation) restricts the rule to compounds where a Brahmin is characterized by their geographical origin. The Locative @[tatpuruṣa] structure (@deva[सुराष्ट्रेषु ब्रह्मा] = 'a Brahmin in/of @[suraṣṭra]') yields @deva[सुराष्ट्रब्रह्मः]. When @deva[ब्रह्मन्] has non-regional modifiers (like @deva[देव] = divine), the semantic condition fails.
"""

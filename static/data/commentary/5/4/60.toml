id = "5.4.60"
numericId = "54060"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[समय] (time) with verb @deva[कृ] when meaning 'to pass time' or 'to procrastinate.' Example: @deva[समया करोति] = @deva[कालक्षेपं करोति] (wastes time, procrastinates).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[समय] with verb @deva[कृ] when the meaning is @deva[यापन] (passing time, neglecting, procrastinating). The @deva[कृष] (ploughing) sense ceases. Thus @deva[समया करोति] = @deva[कालक्षेपं करोति]—one who says 'today I'm busy, tomorrow or day after is the time' and thus lets many days pass is said to @deva[समया करोति] (procrastinate). Without this sense: @deva[समयं करोति] (makes an appointment/time) doesn't take the affix.
"""

advanced = """
The term @deva[यापन] (from @deva[यप्] or related to @deva[या]) means 'causing to pass,' hence 'neglecting' or 'wasting' time. The @deva[समय] here refers to leisure or opportunity (@deva[अवकाश]) for duties. @deva[समया करोति] describes procrastination—letting proper time pass without action. The contrast @deva[समयं करोति] (makes an agreement/appointment) shows the basic meaning where @deva[डाच्] is inapplicable.
"""

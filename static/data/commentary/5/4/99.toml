id = "5.4.99"
numericId = "54099"

[en]
simple = """
The affix @deva[टच्] is added to @deva[नौ] (boat) at the end of a Dvigu compound. Examples: @deva[द्विनावम्] (a pair of boats), @deva[त्रिनावम्] (three boats), @deva[द्विनावधनम्] (wealth of two boats). But: @deva[राजनौः] (king's boat), @deva[पञ्चनौः] (bought for five boats—taddhita elided).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[नौ] in Dvigu (numeral) compounds. Thus @deva[द्वे नावौ समाहृते] = @deva[द्विनावम्], @deva[त्रिनावम्]. Also @deva[द्विनावधनम्], @deva[पञ्चनावप्रियः]; and with taddhita: @deva[द्विनावरूप्यम्], @deva[द्विनावमयम्] (@ref[4.3.31]). Non-Dvigu: @deva[राजनौः] (king's boat)—no affix. The @deva[अतद्धितलुकि] condition from @ref[5.4.92] applies: @deva[पञ्चभिर्नौभिः क्रीतः] = @deva[पञ्चनौः], @deva[दशनौः]—no @deva[टच्] because taddhita is elided.
"""

advanced = """
The restriction to @deva[द्विगु] (numeral determinative) compounds means the first member must be a number. The @deva[अतद्धितलुकि] condition carries over: if the compound was formed by eliding a taddhita like @deva[ठक्] (@ref[5.1.37], denoting 'bought for'), @deva[टच्] is blocked. This maintains consistency with @ref[5.4.92]'s principle.
"""

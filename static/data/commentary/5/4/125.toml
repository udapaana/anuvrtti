id = "5.4.125"
numericId = "54125"

[en]
simple = """
The word @deva[जम्भन्] (having already taken @[samāsānta] @deva[अन्]) stands at the end of a @[bahuvrīhi] compound when preceded by @deva[सु], @deva[हरित], @deva[तृण], or @deva[सोम]. Examples: @deva[सुजम्भा] (having good food/teeth), @deva[हरितजम्भा], @deva[तृणजम्भा] (grass-eating), @deva[सोमजम्भा].
"""

standard = """
This @[sūtra] teaches that @deva[जम्भन्] (already containing irregular @[samāsānta] @deva[अन्]) appears as compound-final when preceded by @deva[सु], @deva[हरित], @deva[तृण], or @deva[सोम]. @deva[जम्भ] means 'food' or 'tooth.' Thus @deva[शोभनः जम्भः अस्य] = @deva[सुजम्भा देवदत्तः]; @deva[हरितजम्भा]; @deva[तृणं भक्ष्यं यस्य] = @deva[तृणजम्भा] (grass-eater); @deva[सोमजम्भा]. In the 'tooth' meaning, analyze as @deva[तृणम् इव जम्भः अस्य]. Without these prefixes: @deva[पतितजम्भः].
"""

advanced = """
The @deva[जम्भन्] form already contains the @deva[अन्] affix irregularly, making this a case of citing a pre-formed compound element. The dual meaning—'food' (@deva[भक्ष्य]) and 'tooth' (@deva[दन्त])—requires different @[bahuvrīhi] analyses: possessive for 'having good food/teeth' vs. comparative for 'having grass-like teeth.'
"""

id = "5.4.121"
numericId = "54121"

[en]
simple = """
The affix @deva[अच्] is optionally added to @deva[हलि] (plough) and @deva[सक्थि] (thigh) at the end of a @[bahuvrīhi] compound when preceded by @deva[नञ्], @deva[दुस्], or @deva[सु]. Examples: @deva[अहलः] or @deva[अहलिः], @deva[सुसक्थः] or @deva[सुसक्थिः].
"""

standard = """
This @[sūtra] prescribes optional @deva[अच्] after @deva[हलि] and @deva[सक्थि] in @[bahuvrīhi] when preceded by negative @deva[नञ्], @deva[दुस्] (bad), or @deva[सु] (good). Thus @deva[अविद्यमाना हलिः अस्य] = @deva[अहलः] or @deva[अहलिः]; @deva[दुर्हलः] or @deva[दुर्हलिः]; @deva[सुहलः] or @deva[सुहलिः]. Similarly @deva[असक्थः/असक्थिः], @deva[दुःसक्थः/दुःसक्थिः], @deva[सुसक्थः/सुसक्थिः]. Some read @deva[हलिशक्त्योः], giving @deva[अशक्तिः/अशक्तः], @deva[दुःशक्तिः/दुःशक्तः] (having deformed power), @deva[सुशक्तिः/सुशक्तः].
"""

advanced = """
The @deva[विभाषा] provides choice between @deva[इ]-final (base form) and @deva[अ]-final (with @deva[अच्]). The prefixes @deva[नञ्/दुस्/सु] trigger this optionality. The variant reading @deva[हलिशक्त्योः] substitutes @deva[शक्ति] (power) for @deva[सक्थि] (thigh), showing textual variation in the grammatical tradition.
"""

id = "5.4.124"
numericId = "54124"

[en]
simple = """
The affix @deva[अनिच्] (yielding @deva[अन्]) is added to @deva[धर्म] at the end of a @[bahuvrīhi] compound when @deva[धर्म] alone is the final member or when the first member is a single word. Examples: @deva[कल्याणधर्मा] (having good qualities), @deva[प्रियधर्मा]. But: @deva[परमस्वधर्मः] (supreme own-duty).
"""

standard = """
This @[sūtra] prescribes @deva[अनिच्] after @deva[धर्म] in @[bahuvrīhi] when @deva[धर्म] stands alone as final member (@deva[केवल]) or when the first member is a single word. Thus @deva[कल्याणः धर्मः अस्य] = @deva[कल्याणधर्मन्], nom. @deva[कल्याणधर्मा]; similarly @deva[प्रियधर्मा]. When the first member is itself compound: @deva[परमः स्वः धर्मः अस्य] = @deva[परमस्वधर्मः] (no @deva[अनिच्]). @[kāśikā] says @deva[केवलात्] qualifies @deva[पूर्वपद]; @[kaumudī] allows compound first members treated as units; @[prasādakara] says @deva[केवलात्] qualifies both @deva[धर्म] and @deva[पूर्वपद].
"""

advanced = """
The interpretive debate on @deva[केवलात्] produces different analyses: (1) @[kāśikā]: first member must be a single word; (2) @[kaumudī]: first member can be compound if functioning as single unit, allowing @deva[सन्दिग्धसाध्यधर्मा], @deva[अनुच्छित्तिधर्मा]; (3) @[prasādakara]: both @deva[धर्म] and first member must be @deva[केवल]. The forms show @deva[धर्म] → @deva[धर्मन्] transformation.
"""

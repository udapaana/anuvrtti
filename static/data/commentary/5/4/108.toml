id = "5.4.108"
numericId = "54108"

[en]
simple = """
The affix @deva[टच्] is added to an @[avyayībhāva] compound ending in a word with final @deva[अन्]. Examples: @deva[उपराजम्] (near the king), @deva[अध्यात्मम्] (relating to the self), @deva[प्रत्यात्मम्].
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @[avyayībhāva] compounds whose final member ends in @deva[अन्]. Thus @deva[उपराजम्], @deva[अध्यात्मम्], @deva[प्रत्यात्मम्]. The final @deva[अन्] is elided by @ref[6.4.144]. This rule is obligatory, setting up the optional modification in the following @[sūtra].
"""

advanced = """
The @deva[अन्]-final words include stems like @deva[राजन्], @deva[आत्मन्], etc. The @ref[6.4.144] @deva[अन्]-elision operates before the @deva[टच्] affix. This @[sūtra] establishes the basic rule; @ref[5.4.109] provides optionality for neuter @deva[अन्]-stems specifically.
"""

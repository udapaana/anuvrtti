id = "5.4.34"
numericId = "54034"

[en]
simple = """
The affix @deva[ठक्] (-@deva[इक]) is added to words in the @deva[विनय] class without changing their meaning. Examples: @deva[वैनयिकः] = @deva[विनयः] (modesty), @deva[सामयिकः] = @deva[समयः] (convention), @deva[आकस्मिकः] = @deva[अकस्मात्] (sudden).
"""

standard = """
This @[sūtra] prescribes @deva[ठक्] (yielding -@deva[इक]) after the @deva[विनयादि] @[gaṇa] in a @[svārthika] (self-referential) sense. Thus @deva[विनय] becomes @deva[वैनयिकः], @deva[समय] becomes @deva[सामयिकः], and @deva[उपाय] becomes @deva[औपयिकः] (with shortening of @deva[आ]). For @deva[अकस्मात्], the reading is @deva[अकस्माद्] to ensure @deva[इक्] is applied, yielding @deva[आकस्मिकः]. Words ending in @deva[टि] that are avyayas lose that portion by @ref[6.4.49]. The affix is optional per @ref[4.1.82].
"""

advanced = """
The @deva[विनयादि] @[gaṇa] includes 18 items: @deva[विनय], @deva[समय], @deva[उपाय] (with hrasva), @deva[संप्रति], @deva[संमति], @deva[कथंचित्], @deva[अकस्मात्], @deva[समाचार], @deva[उपचार], @deva[समयाचार], @deva[व्यवहार], @deva[संप्रदान], @deva[समुत्कर्ष], @deva[समूह], @deva[विशेष], @deva[अत्यय], @deva[अस्थि], @deva[कण्डु]. The special phonetic treatment of @deva[उपाय] (hrasva) and @deva[अकस्मात्] (read as @deva[अकस्माद्]) ensures correct derivation. The @deva[टि]-elision for avyayas follows @ref[6.4.49].
"""

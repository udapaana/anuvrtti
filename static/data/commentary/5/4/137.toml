id = "5.4.137"
numericId = "54137"

[en]
simple = """
@deva[इ] substitutes for the final @deva[अ] of @deva[गन्ध] in a @[bahuvrīhi] compound when preceded by a word denoting something being compared. Examples: @deva[पद्मगन्धिः] (having lotus-like fragrance), @deva[उत्पलगन्धिः] (having water-lily fragrance), @deva[करीषगन्धिः] (having cow-dung smell).
"""

standard = """
This @[sūtra] prescribes @deva[इ]-substitution for @deva[गन्ध] when preceded by an @deva[उपमान] (object of comparison). Thus @deva[पद्मस्य इव गन्धः अस्य] = @deva[पद्मगन्धिः] (having fragrance like a lotus), @deva[उत्पलगन्धिः] (like a water-lily), @deva[करीषगन्धिः] (like cow-dung). The comparison expresses 'having a smell resembling X.'
"""

advanced = """
The @deva[उपमान] condition creates comparative @[bahuvrīhis]. Combined with @ref[5.4.135] (specific prefixes) and @ref[5.4.136] (@deva[अल्प] sense), this completes the @deva[गन्ध] → @deva[गन्धि] transformation contexts. The three @[sūtras] cover: (1) quality-prefixes, (2) quantity sense, (3) comparison sense.
"""

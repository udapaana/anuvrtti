id = "5.4.58"
numericId = "54058"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[द्वितीय], @deva[तृतीय], @deva[शम्ब], and @deva[बीज] with verb @deva[कृ] when meaning 'to plough in that manner.' Examples: @deva[द्वितीया करोति] (does second ploughing), @deva[बीजा करोति] (ploughs with seed).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[द्वितीय], @deva[तृतीय], @deva[शम्ब], and @deva[बीज] specifically with verb @deva[कृ] (not @deva[भू] or @deva[अस्]) when the meaning is ploughing (@deva[कृष]). Thus @deva[द्वितीया करोति] = @deva[द्वितीयं कर्षणं करोति] (does the second ploughing). @deva[तृतीया करोति] (third ploughing). @deva[शम्बा करोति] = ploughs contrariwise (@deva[अनुलोमं कृष्टं क्षेत्रं प्रतिलोमं कृषति]). @deva[बीजा करोति] = @deva[सहबीजेन विलेखनं करोति] (ploughs with seed).
"""

advanced = """
The repetition of @deva[कृ] in this @[sūtra] indicates that @deva[भू] and @deva[अस्] do not apply—this is restricted to agricultural contexts with 'making/doing.' The semantic condition @deva[कृषे] (in the sense of ploughing) is essential. @deva[द्वितीयं करोति पदम्] (makes a second step) doesn't qualify because it's not about ploughing. @deva[शम्ब] denotes cross-ploughing; @deva[बीज] denotes ploughing with simultaneous seeding.
"""

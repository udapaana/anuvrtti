id = "5.4.122"
numericId = "54122"

[en]
simple = """
The affix @deva[असिच्] (yielding @deva[अस्]) is invariably added to @deva[प्रजा] (offspring) and @deva[मेधा] (intelligence) at the end of a @[bahuvrīhi] compound when preceded by @deva[नञ्], @deva[दुस्], or @deva[सु]. Examples: @deva[अप्रजाः], @deva[सुप्रजाः], @deva[दुर्मेधाः], @deva[सुमेधाः].
"""

standard = """
This @[sūtra] prescribes @deva[असिच्] (→ @deva[अस्]) after @deva[प्रजा] and @deva[मेधा] in @[bahuvrīhi] when preceded by @deva[नञ्], @deva[दुस्], or @deva[सु]. This is @deva[नित्य] (invariable), unlike the previous @[sūtra]'s option. Thus @deva[अविद्यमाना प्रजा अस्य] = @deva[अप्रजस्], nom. @deva[अप्रजाः]; @deva[दुष्प्रजाः], @deva[सुप्रजाः]; @deva[अमेधाः], @deva[दुर्मेधाः], @deva[सुमेधाः]. The @deva[नित्य] term also indicates the affix applies with other first members: e.g., @deva[अल्पमेधस्] as in @deva[मन्दकस्य अल्पमेधसः].
"""

advanced = """
The @deva[नित्य] specification (1) blocks the previous @[sūtra]'s optionality, and (2) extends the rule beyond @deva[नञ्/दुस्/सु] to any first member. The @[rāmāyaṇa] citation @deva[मन्दकस्यालपमेधसः] shows @deva[अल्प] + @deva[मेधा] → @deva[अल्पमेधस्], demonstrating the broader application signaled by @deva[नित्य].
"""

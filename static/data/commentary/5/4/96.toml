id = "5.4.96"
numericId = "54096"

[en]
simple = """
The affix @deva[टच्] is added to @deva[श्वन्] (dog) at the end of a @[tatpuruṣa] compound when preceded by @deva[अति]. Examples: @deva[अतिश्वः वराहः] (a boar faster than a dog), @deva[अतिश्वः सेवकः] (a servant more devoted than a dog), @deva[अतिश्वी सेवा] (service lower than a dog's).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[श्वन्] in @[tatpuruṣa] when preceded by @deva[अति] (surpassing). Thus @deva[अतिक्रान्तः श्वानम्] = @deva[अतिश्वः वराहः] (a boar swifter than a dog, @deva[जववान्]). @deva[अतिश्वः सेवकः] (a servant more devoted to his master than a dog). @deva[अतिश्वी सेवा] (service more menial/degraded than a dog's, @deva[अतिनीचा सेवा]).
"""

advanced = """
The @deva[अति]-prefix creates comparative compounds: exceeding or surpassing the standard of comparison (@deva[श्वन्]). The semantic range includes: (1) positive comparison (swifter/more devoted than a dog), (2) negative comparison (more degraded/menial than dog-service). The @deva[टच्] transforms @deva[श्वन्] to @deva[श्व] in compound-final position.
"""

id = "5.4.154"
numericId = "54154"

[en]
simple = """
For all other @deva[बहुव्रीहि] compounds not already covered by the earlier rules, you may optionally add the suffix @deva[कप्]. Both forms — with and without @deva[कप्] — are correct.
"""

standard = """
@[sūtra] @ref[5.4.154] is a residual (@deva[शेष], "remainder") rule: after any @deva[बहुव्रीहि] compound not covered by the specific rules @ref[5.4.151]–@ref[5.4.153], @deva[कप्] is optionally (@deva[वा]) added. This makes @deva[कप्] the default optional marker for @deva[बहुव्रीहि] in general.

**Worked example:** @deva[बहु] + @deva[खट्वा] (cot) → @deva[बहुव्रीहि] → optionally + @deva[कप्] → @deva[बहुखट्वकः] or @deva[बहुखट्वाकः] or @deva[बहुखट्वः] (three variants depending on whether @deva[आ] shortens).

The @deva[अ]-suffix variant (by @ref[5.4.74]) can create semantic distinctions: @deva[बह्वृचः] means "a member of the @deva[बह्वृच] school" (a title/designation), while @deva[बह्वृक्कम्] means "many hymns" (literal count). This rule also covers the dual/plural of @[urasādi]-words left optional by @ref[5.4.151].
"""

advanced = """
@[sūtra] @ref[5.4.154]: @deva[शेषे वा] — in the remaining cases (i.e., @deva[बहुव्रीहि] compounds not covered by @ref[5.4.151]–@ref[5.4.153]), @deva[कप्] is optionally added. The word @deva[शेष] picks up all compounds falling outside the specific conditioning environments of the preceding @[sūtras].

**Three-way optionality for @deva[आ]-finals:** @deva[बहुखट्वा] can yield:
1. @deva[बहुखट्वकः] — @deva[कप्] added, @deva[आ] shortens before @deva[क] by @ref[7.3.102] (@deva[सुपि च])
2. @deva[बहुखट्वाकः] — @deva[कप्] added, @deva[आ] not shortened (optional shortening)
3. @deva[बहुखट्वः] — @deva[कप्] not added

**Semantic disambiguation via @ref[5.4.74]:** The @deva[अच्] affix (by @ref[5.4.74]) can replace @deva[कप्] in some compounds, creating distinct meanings: @deva[बह्वृचः] (school member, @deva[चरण] designation) vs. @deva[बह्वृक्कम्] (many @deva[ऋक्]-hymns, literal). This distinction is critical for proper-name contexts blocked by @ref[5.4.155].

**Dual/plural of @[urasādi]-words:** The @[sūtra] @ref[5.4.151] attaches @deva[कप्] only in singular for @[urasādi]-words listed in nominative form. For dual and plural, @ref[5.4.154] makes @deva[कप्] optional: @deva[द्विपुमान्] or @deva[द्विपुंस्कः] (both valid).

**Debarments:** @ref[5.4.155] (proper names), @ref[5.4.156] (@deva[ईयस्]-finals), @ref[5.4.157] (@deva[भ्रातृ] in praise-sense), @ref[5.4.158] (Vedic @deva[ऋ]-finals), and @ref[5.4.159]–@ref[5.4.160] (specific words) all bar @deva[कप्] and thus also debar the optional form under this rule.
"""

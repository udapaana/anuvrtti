id = "5.4.78"
numericId = "54078"

[en]
simple = """
The affix @deva[अच्] is added to @deva[वर्चस्] (brilliance/strength) when preceded by @deva[ब्रह्म] or @deva[हस्ति]. Examples: @deva[ब्रह्मवर्चसम्] (Brahmic brilliance), @deva[हस्तिवर्चसम्] (elephant's strength).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[वर्चस्] (meaning 'light' or 'strength') when preceded by @deva[ब्रह्म] or @deva[हस्ति]. Thus @deva[ब्रह्मवर्चसम्] (spiritual radiance/power) and @deva[हस्तिवर्चसम्] (elephant-like strength). A @[vārttika] extends this to @deva[पल्ल्य] and @deva[राजन्]: @deva[पल्ल्यवर्चसम्] and @deva[राजवर्चसम्].
"""

advanced = """
The word @deva[वर्चस्] denotes both 'radiance/brilliance' and 'strength/vigor.' The compounds express metaphorical qualities: @deva[ब्रह्मवर्चस्] is the spiritual power or brilliance associated with Brahman/Vedic learning; @deva[हस्तिवर्चस्] is elephant-like strength. The @[vārttika] extensions suggest a broader pattern with excellence-denoting first members.
"""

id = "5.4.5"
numericId = "54005"

[en]
simple = """
When a word meaning 'half' (like @deva[सामि], @deva[अर्ध]) precedes a @deva[क्त]-participle, @deva[कन्] is not added. Examples: @deva[सामिकृतम्] (half-done), @deva[अर्धकृतम्]—not *@deva[सामिकृतकम्].
"""

standard = """
When @deva[सामि] or synonyms (@deva[अर्ध], @deva[नेम]) meaning 'half' precede a @deva[क्त]-participle in compound, @deva[कन्] is prohibited. The 'half' word itself indicates incompleteness. Examples: @deva[सामिकृतम्] (half-made by @ref[2.1.27]), @deva[सामिभुक्तम्], @deva[अर्धकृतम्], @deva[नेमकृतम्]. This also prohibits @deva[स्वार्थ कन्] after comparatives: @deva[भिन्नतरकः] is valid elsewhere but not with @deva[सामि]-compounds.
"""

advanced = """
This prohibition covers both @deva[अनत्यन्तगति कन्] (@ref[5.4.4]) and @deva[स्वार्थ कन्]. The @deva[ज्ञापक] (implication): @deva[स्वार्थ कन्] exists—as in @deva[भिन्नतरकः], @deva[भिन्नतमकः] (comparatives with meaningless @deva[कन्]). @[patañjali] uses @deva[अभिन्नतरकं भवति], @deva[बहुतरकं व्याप्यते]. The word @deva[वचन] indicates synonyms of @deva[सामि] are included.
"""

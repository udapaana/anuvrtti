id = "5.4.63"
numericId = "54063"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[सुख] (pleasure) and @deva[प्रिय] (dear) with verb @deva[कृ] when meaning 'to please' or 'to gratify.' Example: @deva[सुखा करोति स्वामिन्] = @deva[स्वामिनः चित्तम् आराधयति] (tries to please the master's heart).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[सुख] and @deva[प्रिय] with @deva[कृ] when expressing @deva[आनुलोम्य] (going with the grain, conforming to another's wishes). Thus @deva[सुखा करोति] or @deva[प्रिया करोति स्वामिन्] = @deva[स्वाम्यादेः चित्तम् आराधयति] (tries to please the master's heart). The affix applies when the pleasant act aims to gratify another. Without this intent: @deva[सुखं करोति औषधपानम्] (drinking medicine gives pleasure) or @deva[प्रियं करोति] (does something pleasant)—the affix doesn't apply.
"""

advanced = """
The term @deva[आनुलोम्य] (lit. 'going with the hair/grain') denotes conforming to wishes, pleasing, or ingratiating behavior. The semantic condition distinguishes intentional gratification of another (@deva[सुखा/प्रिया करोति]) from actions that merely produce pleasure (@deva[सुखं/प्रियं करोति]). The former implies agency directed at pleasing someone; the latter describes the effect of an action.
"""

id = "5.4.3"
numericId = "54003"

[en]
simple = """
The affix @deva[कन्] comes after @deva[स्थूल] and similar words in the sense of 'type/kind' (@deva[प्रकार]). This blocks @deva[जातीयर्] (@ref[5.3.69]). Examples: @deva[स्थूलकः] (bulky type), @deva[अणुकः] (fine type).
"""

standard = """
The affix @deva[कन्] replaces @deva[जातीयर्] (@ref[5.3.69]) after @deva[स्थूलादि] words for @deva[प्रकार] (type/kind) sense. The class includes @deva[स्थूल], @deva[अणु], @deva[माष], etc. @[vārttika]: @deva[चञ्चत्] and @deva[बृहत्] (or @deva[चञ्चा/बृहा]) are included. Long final vowels shorten by @ref[7.4.13]: @deva[सुरा] + @deva[कन्] → @deva[सुरकः] (snake-like).
"""

advanced = """
The @deva[स्थूलादि] @deva[गण] (14 items) takes @deva[कन्] in @deva[प्रकारार्थ], blocking @deva[जातीयर्]. Special meanings: @deva[कृष्णकाः] (@deva[तिल]—sesame); @deva[यवकाः] (@deva[व्रीहि]—rice); @deva[इक्षुतिलपाद्यकालावदाताः] → @deva[सुरा] (wine); @deva[गोमूत्रकः] (covering); @deva[सुरकः] (snake, by @ref[7.4.13]); @deva[जीर्णकाः] (@deva[शालि]—aged rice). Class: @deva[स्थूल], @deva[अणु], @deva[माष], @deva[इषु], etc.
"""

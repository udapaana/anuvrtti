id = "5.4.82"
numericId = "54082"

[en]
simple = """
The affix @deva[अच्] is added to @deva[उरस्] (chest) when preceded by @deva[प्रति] with locative meaning. Example: @deva[प्रत्युरसम्] = @deva[उरसि वर्तते] (situated on the chest). But: @deva[प्रत्युरः] = @deva[प्रतिगतम् उरः] (gone towards the chest).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[उरस्] (chest) when preceded by @deva[प्रति] in an @[avyayībhāva] compound with locative sense (@ref[2.1.6]). Thus @deva[प्रत्युरसम्] = @deva[उरसि वर्तते] (something situated on the chest). Without the locative sense: @deva[प्रत्युरः] = @deva[प्रतिगतम् उरः] (gone towards/opposite the chest)—here the affix doesn't apply.
"""

advanced = """
The condition @deva[सप्तम्यर्थे] (having locative meaning) is crucial. @[avyayībhāva] compounds with @deva[प्रति] can have different case meanings. When @deva[प्रति] + @deva[उरस्] means 'on the chest' (locative), @deva[अच्] applies yielding @deva[प्रत्युरसम्]. When the meaning is directional ('towards the chest'), the compound is @deva[प्रत्युरः] without the @[samāsānta] affix.
"""

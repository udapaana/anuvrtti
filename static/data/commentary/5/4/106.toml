id = "5.4.106"
numericId = "54106"

[en]
simple = """
The affix @deva[टच्] is added to a @[samāhāra] Dvandva (collective copulative compound) when it ends in a palatal, @deva[द्], @deva[ष्], or @deva[ह्]. Examples: @deva[वाक्त्वचम्] (speech and skin), @deva[समिद्दृषदम्] (fuel and millstone), @deva[छत्रोपानहम्] (umbrella and shoes).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @[samāhāra] Dvandva (collective Dvandva, always neuter singular) compounds ending in palatals (@deva[च]-class) or @deva[द्], @deva[ष्], @deva[ह्]. The @[tatpuruṣa] @[anuvṛtti] from @ref[5.4.86] ceases. Examples: @deva[वाक् च त्वक् च] = @deva[वाक्त्वचम्], @deva[स्रक्त्वचम्], @deva[श्रीस्रजम्], @deva[इडूर्जम्], @deva[वागूर्जम्], @deva[समिद्दृषदम्], @deva[संपद्विपदम्], @deva[वाग्विप्रुषम्], @deva[छत्रोपानहम्], @deva[धेनुगोदुहम्]. Non-Dvandva @[tatpuruṣa] doesn't qualify: @deva[पञ्च वाचः समाहृताः] = @deva[पञ्चवाक्]. Wrong ending: @deva[वाक्समित्]. @[non-samāhāra] (Itaretara) Dvandva: @deva[प्रावृट्शरदौ] (dual, not neuter singular).
"""

advanced = """
The consonant classes specified are: (1) palatals (@deva[च]-class: @deva[च्, छ्, ज्, झ्, ञ्]), (2) @deva[द्], (3) @deva[ष्], (4) @deva[ह्]. The restriction to @deva[समाहारद्वन्द्व] (collective, neuter singular) excludes @deva[इतरेतरद्वन्द्व] (mutual, preserving number). The @deva[झय्] @[pratyāhāra] (all mutes) appears in @ref[5.4.111] for @[avyayībhāva], but here specific consonants are enumerated.
"""

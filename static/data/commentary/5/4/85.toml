id = "5.4.85"
numericId = "54085"

[en]
simple = """
The affix @deva[अच्] is added to @deva[अध्वन्] (path/journey) when preceded by an upasarga (verbal prefix). Examples: @deva[प्राध्वम्] (gone on the path), @deva[निरध्वम्], @deva[प्रत्यध्वम्]. But: @deva[परमाध्वा], @deva[उत्तमाध्वा] (supreme path).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[अध्वन्] (path, road, journey) when preceded by an @deva[उपसर्ग] (verbal prefix). Thus @deva[प्रगतः अध्वानम्] = @deva[प्राध्वः रथः] (a chariot that has traveled), @deva[प्राध्वं शकटम्], @deva[निरध्वम्], @deva[प्रत्यध्वम्]. When preceded by non-upasargas: @deva[परमाध्वा], @deva[उत्तमाध्वा] (the highest/best path)—the affix doesn't apply.
"""

advanced = """
The condition @deva[उपसर्गात्] restricts @deva[अच्] to compounds where the first member is a verbal prefix (@deva[प्र], @deva[नि], @deva[प्रति], etc.). These express movement or direction relative to the path. When the first member is an adjective like @deva[परम] or @deva[उत्तम] (supreme, highest), it's not an upasarga, so the @[samāsānta] doesn't apply. This maintains the distinction between directional and descriptive compounds.
"""

id = "5.4.12"
numericId = "54012"

[en]
simple = """
In Vedic, the affix @deva[अम्] (in addition to @deva[आम्]) is added to @deva[तर]/deva[@deva[तम]] under the same conditions. Example: @deva[प्रतरम्] or @deva[प्रतराम्] (more forward).
"""

standard = """
In @deva[छन्दस्] (Vedic), @deva[अम्] is added alongside @deva[आम्] to @deva[तरप्/तमप्] after @deva[किम्], @deva[ए]-ending words, @deva[तिङन्त], or @deva[अव्यय] in adverbial comparisons. The @deva[चकार] includes @deva[आम्]. Example: @deva[प्रतरम् नयामः] or @deva[प्रतराम् वस्यः] (@deva[प्रतर] = @deva[प्रकृष्टतर], more excellent). Words ending in @deva[आम्]/deva[@deva[अम्]] are @deva[अव्यय] by @deva[स्वरादि]-inclusion (@ref[1.1.37]).
"""

advanced = """
This @deva[छन्दस्] rule provides @deva[अम्] as Vedic alternative to @deva[आम्]. Both are @deva[निपात] (indeclinables) per @deva[स्वरादि] (@ref[1.1.37]). The same @deva[अद्रव्यप्रकर्ष] condition applies. Vedic forms: @deva[प्रतरम्], @deva[प्रतराम्].
"""

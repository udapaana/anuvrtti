id = "5.4.28"
numericId = "54028"

[en]
simple = """
The affix @deva[क] comes after @deva[अवि] (sheep) without changing meaning. Example: @deva[अविकः] (= @deva[अविः], a sheep).
"""

standard = """
The @deva[स्वार्थ] affix @deva[क] attaches to @deva[अवि] (sheep) without sense-change. Example: @deva[अविकः] = @deva[अविः] (sheep).
"""

advanced = """
Simple @deva[स्वार्थ क] after @deva[अवि]. The word @deva[अवि] (sheep) is @deva[इकारान्त] (@deva[इ]-ending); @deva[क] attaches directly: @deva[अवि] + @deva[क] → @deva[अविक].
"""

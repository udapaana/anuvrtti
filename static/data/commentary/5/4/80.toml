id = "5.4.80"
numericId = "54080"

[en]
simple = """
The affix @deva[अच्] is added to @deva[वसीयस्] (better) and @deva[श्रेयस्] (better/prosperity) when preceded by @deva[श्वस्] (tomorrow). Examples: @deva[श्वोवसीयसम्], @deva[श्वःश्रेयसम्] (may you have prosperity tomorrow).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[वसीयस्] and @deva[श्रेयस्] when preceded by @deva[श्वस्] (tomorrow). These compounds belong to the @deva[मयूरव्यंसकादि] class (@ref[2.1.72]). The word @deva[श्वः] here expresses blessing or praise: @deva[श्वःश्रेयसं ते भूयात्] = @deva[शोभनं श्रेयस्ते भूयात्] (may good fortune be yours tomorrow/hereafter). @deva[वसीयस्] is derived from @deva[वसु] (praiseworthy/wealthy) with @deva[ईयसुन्] (@ref[5.3.57]).
"""

advanced = """
The @deva[मयूरव्यंसकादि] class (@ref[2.1.72]) allows unusual compound formations. @deva[श्वस्] in benedictory contexts means 'in the future/hereafter' rather than literally 'tomorrow.' Both @deva[वसीयस्] and @deva[श्रेयस्] are comparative forms meaning 'better' or 'more excellent.' The compounds express wishes for future prosperity. @deva[श्वोवसीयसम्] shows sandhi of @deva[श्वस्] + @deva[व].
"""

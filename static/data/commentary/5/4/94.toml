id = "5.4.94"
numericId = "54094"

[en]
simple = """
The affix @deva[टच्] is added to @deva[अनस्], @deva[अश्मन्], @deva[अयस्], and @deva[सरस्] at the end of a @[tatpuruṣa] compound when denoting a genus (@[jāti]) or a name (@[saṃjñā]). Examples: @deva[उपानसम्], @deva[अमृताश्मः], @deva[कालायसम्], @deva[मण्डूकसरसम्]. But: @deva[सदनः], @deva[सदश्मा], @deva[सत्सरः].
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[अनस्] (cart), @deva[अश्मन्] (stone), @deva[अयस्] (iron), and @deva[सरस्] (lake) in @[tatpuruṣa] when the compound denotes a @deva[जाति] (genus/species) or @deva[संज्ञा] (proper name). @[jāti] examples: @deva[उपानसम्] (a type of vehicle), @deva[अमृताश्मः] (a type of stone), @deva[कालायसम्] (a kind of iron), @deva[मण्डूकसरसम्] (a lake type). @[saṃjñā] examples: @deva[महानसम्], @deva[पिण्डाश्मः], @deva[लोहितायसम्], @deva[जलसरसम्]. Without @[jāti]/@[saṃjñā] meaning: @deva[सत् अनः] = @deva[सदनः], @deva[सत् अश्मा] = @deva[सदश्मा], @deva[सत् सरः] = @deva[सत्सरः].
"""

advanced = """
The dual condition @deva[जातौ संज्ञायां च] covers technical terminology (species names) and proper nouns (names of specific places/objects). When the compound is merely descriptive (@deva[सत्] + noun = 'good X'), it's not a technical term or name, so @deva[टच्] doesn't apply. This distinguishes classificatory/naming compounds from ordinary attributive ones.
"""

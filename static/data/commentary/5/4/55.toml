id = "5.4.55"
numericId = "54055"

[en]
simple = """
The affix @deva[त्रा] (as well as @deva[साति]) is added when the meaning is 'giving to that person,' with verbs @deva[कृ], @deva[भू], @deva[अस्], or @deva[सम्पद्]. Example: @deva[ब्राह्मणत्रा करोति] = gives to Brahmins (an item that ought to be given to them).
"""

standard = """
This @[sūtra] adds the affix @deva[त्रा] alongside @deva[साति] when the meaning includes @deva[देय] (to be given)—placing something under another's control by offering it as a gift. Thus @deva[ब्राह्मणाधीनं देयं करोति] = @deva[ब्राह्मणत्रा करोति] or @deva[ब्राह्मणसात् करोति] (he gives it to the Brahmins as a proper offering). Similarly @deva[ब्राह्मणत्रा भवति] (it becomes given to the Brahmins). Without the @deva[देय] sense: @deva[राजसात् भवति राष्ट्रम्] (the kingdom comes under the king's control)—here @deva[त्रा] doesn't apply.
"""

advanced = """
The condition @deva[देय] (to be given) qualifies @deva[तदधीन] from the previous @[sūtra]. When a thing known as a proper gift (@deva[देय]) for recipients (like Brahmins) is placed under their control through offering, @deva[त्रा] applies. The distinction: @deva[राजसात्] (under royal control) involves dominion, not gifting; @deva[ब्राह्मणत्रा] involves ritual giving of appropriate items. Both @deva[त्रा] and @deva[साति] are available for the @deva[देय] sense.
"""

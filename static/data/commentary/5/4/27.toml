id = "5.4.27"
numericId = "54027"

[en]
simple = """
The affix @deva[तल्] comes after @deva[देव] (god) without changing meaning. Example: @deva[देवता] (= @deva[देवः], deity). The word is always feminine.
"""

standard = """
The @deva[स्वार्थ] affix @deva[तल्] (@deva[ता]) attaches to @deva[देव] without sense-change. The @deva[तादर्थ्य] meaning ceases here. Example: @deva[देवता] = @deva[देवः] (deity). The result is always feminine (@deva[स्त्री])—another case where @deva[स्वार्थिक] affixes don't preserve base gender.
"""

advanced = """
The @deva[तल्] affix normally forms feminine abstract nouns. Here it's @deva[स्वार्थ]—no meaning change. @deva[देवता] (fem.) = @deva[देव] (masc.) illustrates gender shift with @deva[स्वार्थिक] affixes (cf. @ref[5.4.14] @deva[ज्ञापक]).
"""

id = "5.4.98"
numericId = "54098"

[en]
simple = """
The affix @deva[टच्] is added to @deva[सक्थि] (thigh) at the end of a @[tatpuruṣa] compound when preceded by @deva[उत्तर], @deva[मृग], @deva[पूर्व], or when something is compared to it. Examples: @deva[उत्तरसक्थम्], @deva[मृगसक्थम्], @deva[पूर्वसक्थम्], @deva[फलकसक्थम्] (board-like thigh).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[सक्थि] (thigh) in @[tatpuruṣa] when preceded by @deva[उत्तर], @deva[मृग], or @deva[पूर्व], as well as in comparative compounds (@deva[उपमानात्] continues via @deva[च]). Thus @deva[उत्तरसक्थम्] (upper/northern thigh), @deva[मृगसक्थम्] (deer's thigh), @deva[पूर्वसक्थम्] (front/eastern thigh). In comparison: @deva[फलकम् इव सक्थि] = @deva[फलकसक्थम्] (a board-like thigh).
"""

advanced = """
The @deva[च] in the @[sūtra] draws in @deva[उपमानात्] from @ref[5.4.97], extending the comparison condition to @deva[सक्थि]. The anatomical/directional terms (@deva[उत्तर], @deva[पूर्व]) and @deva[मृग] (deer) are specifically listed, possibly reflecting common collocations in medical or descriptive texts. The @deva[टच्] changes @deva[सक्थि] to @deva[सक्थ] in compound-final position.
"""

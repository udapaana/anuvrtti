id = "5.4.138"
numericId = "54138"

[en]
simple = """
The final @deva[अ] of @deva[पाद] (foot) is elided in a @[bahuvrīhi] compound when preceded by an object of comparison—but not after words in the @deva[हस्त्यादि] list. Examples: @deva[व्याघ्रपात्] (tiger-footed), @deva[सिंहपात्] (lion-footed). But: @deva[हस्तिपादः], @deva[कटोलपादः].
"""

standard = """
This @[sūtra] prescribes @deva[अ]-elision from @deva[पाद] in @[comparison-bahuvrīhi] (@deva[उपमानात्]). Thus @deva[व्याघ्रस्य इव पादौ अस्य] = @deva[व्याघ्रपात्] (having feet like a tiger), @deva[सिंहपात्]. The @deva[हस्त्यादि] @[gaṇa] (19 words) blocks elision: @deva[हस्तिपादः], @deva[कटोलपादः], @deva[अश्वपादः], @deva[कपोतपादः], etc.
"""

advanced = """
The @deva[हस्त्यादि] @[gaṇa] includes: @deva[हस्तिन्], @deva[कुदाल], @deva[अश्व], @deva[कशिक], @deva[कुरुत], @deva[कटोल/कटोलक], @deva[गण्डोल/गण्डोलक], @deva[कण्डोल/कण्डोलक], @deva[अज], @deva[कपोत], @deva[जाल], @deva[गण्ड], @deva[महेल] (@deva[महिला]), @deva[दासी], @deva[गणिका], @deva[कुसूल]. These retain @deva[पाद] in comparison compounds.
"""

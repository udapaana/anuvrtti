id = "5.4.43"
numericId = "54043"

[en]
simple = """
The affix @deva[शस्] is optionally added to numerals and words denoting coin units (in singular) to express distribution. Examples: @deva[द्विशः] = two each, @deva[त्रिशः] = three each, @deva[कार्षापणशः] = one @[kārṣāpaṇa] each.
"""

standard = """
This @[sūtra] prescribes optional @deva[शस्] after numerals and singular coin-denomination words to express distributive sense (@deva[विभागे]). Thus @deva[द्वौ द्वौ मोदकौ ददाति] = @deva[द्विशो मोदकौ ददाति] (he gives two sweets to each). Similarly @deva[त्रिशः]. For coin units: @deva[कार्षापणशो ददाति] (he gives one @[kārṣāpaṇa] to each), @deva[माषशः], @deva[पादशः]. The rule requires @deva[कारक] relation (not genitive): @deva[द्वयोर्द्वयोः स्वामी] (lord of two each) retains case forms. This @[sūtra] is an exception to @ref[8.1.4].
"""

advanced = """
The term @deva[एकवचन] (singular) applies to coin-denomination words which, though functionally distributing to many recipients, express 'one to each.' The @deva[कारक] requirement continues from @ref[5.4.42]. The exception to @ref[8.1.4] is significant for proper @deva[पद]-formation. Counter-examples show the dual requirement: @deva[घटं घटं ददाति] (a pot to each) doesn't apply because @deva[घट] is neither a numeral nor a coin unit; @deva[द्वौ ददाति] (he gives two) doesn't apply because there's no distributive sense.
"""

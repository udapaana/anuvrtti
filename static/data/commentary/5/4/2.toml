id = "5.4.2"
numericId = "54002"

[en]
simple = """
The affix @deva[वुन्] also comes after @deva[पाद] and @deva[शत] (with numeral) when expressing punishment or donation (not just distribution). Examples: @deva[द्विपदिकां दण्डितः] (fined two @[pādas]), @deva[द्विशतिकां व्यवसृजति] (donates two hundred).
"""

standard = """
The affix @deva[वुन्] applies to @deva[पाद] and @deva[शत] preceded by numerals in @deva[दण्ड] (punishment/fine) or @deva[व्यवसर्ग] (donation/gift) senses. This extends beyond @deva[वीप्सा] (distribution). Examples: @deva[द्वौ पादौ दण्डितः] = @deva[द्विपदिकां दण्डितः] (fined two quarter-coins); @deva[द्वौ पादौ व्यवसृजति] = @deva[द्विपदिकां व्यवसृजति] (donates two @[pādas]).
"""

advanced = """
This @[sūtra] shows @deva[वीप्सा] is not required—@deva[दण्ड] (punishment) and @deva[व्यवसर्ग] (donation) are additional contexts for @deva[वुन्]. The compound formation and @deva[लोप] rules from @ref[5.4.1] continue to apply. @deva[दण्ड] = fine/punishment; @deva[व्यवसर्ग] = gift/charitable giving.
"""

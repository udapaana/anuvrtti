id = "5.4.40"
numericId = "54040"

[en]
simple = """
The affixes @deva[स] and @deva[स्न] are added to @deva[मृद्] when expressing excellence. Results: @deva[मृत्सा] and @deva[मृत्स्ना] = excellent clay/mud.
"""

standard = """
This @[sūtra] prescribes @deva[स] and @deva[स्न] (dual form @deva[स्नौ]) after @deva[मृद्] to express @deva[प्रशस्त] (excellent, superior). Thus @deva[प्रशस्ता मृद्] = @deva[मृत्सा] or @deva[मृत्स्ना] (excellent mud/clay). This rule debars @deva[रूपप्] from @ref[5.3.66]. These affixes are @deva[नित्य] (invariable)—whenever superiority of clay is expressed, these affixes must be used. The invariability is inferred because @deva[अन्यतरस्याम्] (optionally) appears in the following @[sūtra] @ref[5.4.42], indicating this @[sūtra] is not optional.
"""

advanced = """
The dual affix @deva[स्नौ] provides the forms @deva[स] and @deva[स्न] as alternatives. The rule specifically overrides @deva[रूपप्] (@ref[5.3.66]) which would otherwise apply for @deva[प्रशंसा] (excellence). The @deva[नित्य] (obligatory) nature is established by inference from the sequence: @deva[अन्यतरस्याम्] follows in @ref[5.4.42], so this @[sūtra] must be non-optional. Compare with optional @[svārthika] affixes like those in @ref[5.4.7] and @ref[5.4.10].
"""

id = "5.4.130"
numericId = "54130"

[en]
simple = """
@deva[ज्ञु] may optionally substitute for @deva[जानु] (knee) when preceded by @deva[ऊर्ध्व] (upward). Examples: @deva[ऊर्ध्वजानुः] or @deva[ऊर्ध्वज्ञुः] (with upraised knees).
"""

standard = """
This @[sūtra] provides optional @deva[ज्ञु]-substitution for @deva[जानु] when preceded by @deva[ऊर्ध्व] (upward). Thus @deva[ऊर्ध्वे जानुनी अस्य] = @deva[ऊर्ध्वजानुः] or @deva[ऊर्ध्वज्ञुः] (having upraised knees). This contrasts with the obligatory substitution after @deva[प्र/सम्] in the previous @[sūtra].
"""

advanced = """
The @deva[विभाषा] here allows both forms, unlike @ref[5.4.129] which mandates substitution. This suggests @deva[ऊर्ध्वजानु] was common enough in usage that both forms remained acceptable, while @deva[प्रजानु] and @deva[संजानु] had been entirely replaced by @deva[प्रज्ञु/संज्ञु].
"""

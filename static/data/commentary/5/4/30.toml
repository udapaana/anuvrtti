id = "5.4.30"
numericId = "54030"

[en]
simple = """
The affix @deva[कन्] comes after @deva[लोहित] (red) when it means 'a precious stone' (ruby). Example: @deva[लोहितकः] (= @deva[लोहितः], a ruby). Not when @deva[लोहित] means 'red.'
"""

standard = """
The @deva[स्वार्थ] affix @deva[कन्] attaches to @deva[लोहित] when meaning @deva[मणि] (precious stone/ruby), not when meaning 'red.' Example: @deva[लोहितकः] = @deva[लोहितः] (ruby). Not: @deva[लोहितः] (red color).
"""

advanced = """
The semantic restriction @deva[मणौ] (precious stone) distinguishes @deva[लोहितक] (ruby) from @deva[लोहित] (red). This is @deva[स्वार्थ कन्] with lexical specialization—the affix signals the gemstone meaning.
"""

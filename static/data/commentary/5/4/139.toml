id = "5.4.139"
numericId = "54139"

[en]
simple = """
The words @deva[कुम्भपदी] (pot-footed) and others in the @deva[कुम्भपद्यादि] list are formed by eliding the final @deva[अ] of @deva[पाद], with @deva[पद्] substituted before feminine @deva[ई]. Examples: @deva[कुम्भपदी], @deva[शतपदी] (centipede), @deva[एकपदी].
"""

standard = """
This @[sūtra] validates the @deva[कुम्भपद्यादि] @[gaṇa] (41 words) formed by @deva[अ]-elision from @deva[पाद], with @deva[पद्] substituted for @deva[पात्] before @deva[ङीप्] (@ref[4.1.130]). Thus @deva[कुम्भपदी], @deva[शतपदी] (centipede). Words whose first members are comparison-objects or numerals would elide @deva[अ] by @ref[5.4.138] or @ref[5.4.140]; this @[sūtra] additionally mandates @deva[ङीप्], blocking the option in @ref[4.1.8].
"""

advanced = """
The @[gaṇa] includes: @deva[कुम्भपदी], @deva[एकपदी], @deva[जालपदी], @deva[शूलपदी], @deva[मुनिपदी], @deva[गुणपदी], @deva[शतपदी], @deva[सूत्रपदी], @deva[गोधापदी], @deva[कलशीपदी], @deva[विपदी], @deva[तृणपदी], @deva[द्विपदी], @deva[त्रिपदी], @deva[षट्पदी], @deva[दासीपदी], @deva[शितिपदी], @deva[विष्णुपदी], @deva[सुपदी], @deva[निष्पदी], @deva[आर्द्रपदी], @deva[कुणिपदी], @deva[कृष्णपदी], @deva[शुचिपदी], @deva[द्रोणपदी], @deva[द्रुपदी], @deva[सूकरपदी], @deva[शकृत्पदी], @deva[अष्टापदी], @deva[स्थूणापदी], @deva[अपदी], @deva[सूचीपदी], @deva[मालापदी], @deva[गोपदी], @deva[घृतपदी], @deva[सूपपदी], @deva[पञ्चपदी], @deva[अर्वपदी], @deva[स्तनपदी], @deva[कलहंसपदी], @deva[विषपदी].

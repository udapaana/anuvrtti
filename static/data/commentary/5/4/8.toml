id = "5.4.8"
numericId = "54008"

[en]
simple = """
The affix @deva[ख] optionally comes after @deva[अञ्च्]-ending words (direction-words) when not feminine and not meaning 'direction.' Examples: @deva[प्राक्] or @deva[प्राचीनम्] (old/former), @deva[अर्वाक्] or @deva[अर्वाचीनम्] (new/recent).
"""

standard = """
The affix @deva[ख] (@deva[ईन]) optionally attaches to @deva[अञ्चति]-ending words (direction-words) when: (1) not in @deva[स्त्री] (feminine); or (2) not meaning @deva[दिश्] (compass direction). Examples: @deva[प्राक्]/deva[@deva[प्राचीनम्]] (old); @deva[अर्वाक्]/deva[@deva[अर्वाचीनम्]] (new). Not: @deva[प्राची दिक्] (eastern direction—feminine direction-word). But: @deva[प्राचीना ब्राह्मणी] (feminine non-direction); @deva[प्राचीनं दिग्रमणीयम्] (neuter direction-word).
"""

advanced = """
The @deva[विकल्प] has three conditions: @deva[अञ्चति] ending; @deva[अदिक्] (not direction sense) or @deva[अस्त्री] (not feminine). Feminine direction-words (@deva[प्राची दिक्]) are excluded. Non-feminine direction-words (@deva[प्राचीनं दिग्रमणीयम्]) and feminine non-directions (@deva[प्राचीना ब्राह्मणी]) take @deva[ख] optionally.
"""

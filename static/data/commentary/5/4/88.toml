id = "5.4.88"
numericId = "54088"

[en]
simple = """
When @deva[अहन्] (day) is preceded by @deva[सर्व], @deva[संख्यात], night-portion words, or numerals/indeclinables, @deva[अह्न] is substituted for @deva[अहन्]. Examples: @deva[द्व्यह्नः] (relating to two days), @deva[त्र्यह्नः], @deva[सर्वाह्णः] (all day), @deva[पूर्वाह्णः] (forenoon), @deva[अपराह्णः] (afternoon).
"""

standard = """
This @[sūtra] substitutes @deva[अह्न] for @deva[अहन्] when preceded by the words listed in @ref[5.4.87] (except @deva[अहन्] itself, since @deva[अहन्] + @deva[अहन्] @[tatpuruṣa] is impossible). With @deva[टच्] affix (anticipating @ref[5.4.91]): @deva[द्वयोः अह्नोः भवः] = @deva[द्व्यह्नः], @deva[त्र्यह्नः]. With indeclinables: @deva[अत्यह्नः], @deva[निरह्नः]. With @deva[सर्व]: @deva[सर्वाह्णः] (@ref[8.4.7] applies). With day-portions: @deva[पूर्वाह्णः] (forenoon), @deva[अपराह्णः] (afternoon). Some read @deva[संख्याताहः] rather than @deva[संख्याताह्नः] (see @ref[5.4.90]).
"""

advanced = """
The @[vārttikakāra] considers this substitution redundant: @deva[अहन्] + @deva[अच्] would yield @deva[अह्न] anyway via @ref[6.4.134] (middle @deva[अ] elision). The specific @deva[टच्] would only affect feminine formation (@ref[4.1.15]) and @deva[अन्]-elision (@ref[6.4.145]). But @deva[अहन्]-compounds are always masculine (@ref[2.4.29]), so feminine doesn't arise. The desired form @deva[द्व्यह्नः] makes @ref[6.4.145] inapplicable. Thus @deva[अच्] suffices, making the substitution technically superfluous.
"""

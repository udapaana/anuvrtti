id = "5.4.10"
numericId = "54010"

[en]
simple = """
The affix @deva[छ] optionally comes after @deva[स्थान]-ending compounds when meaning 'equal position/substitute.' Examples: @deva[पितृस्थानीयः] or @deva[पितृस्थानः] (in father's place), @deva[मातृस्थानीयः] (in mother's place).
"""

standard = """
The affix @deva[छ] (@deva[ईय]) optionally attaches to @deva[स्थान]-ending compounds expressing @deva[सस्थान] (equal place/substitute status). @deva[सस्थान] = @deva[समानं स्थानमस्य] (whose place is equal). Examples: @deva[पित्रा तुल्यः] = @deva[पितृस्थानीयः] or @deva[पितृस्थानः] (like a father, in father's place); @deva[राजस्थानीयः]/deva[@deva[राजस्थानः]]. Not: @deva[गोस्थानम्] (cow-shed), @deva[अश्वस्थानम्] (stable)—concrete place-meanings.
"""

advanced = """
The condition @deva[सस्थानेन] specifies @deva[बहुव्रीहि] sense (@deva[समानं स्थानमस्य]), not @deva[तत्पुरुष] (@deva[समानं च तत् स्थानं च]). The @deva[इति] is @deva[प्रत्यवयवकरण] (distinctness marker). @deva[चेत्] (when) is conjunctive. @deva[छ] is @deva[विकल्प] here; rule @ref[5.4.9] between two optional rules is @deva[नित्य].
"""

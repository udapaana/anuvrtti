id = "5.4.146"
numericId = "54146"

[en]
simple = """
The final @deva[द] of @deva[ककुद] (hump) is elided in a @[bahuvrīhi] compound when it denotes an animal's age or condition. Examples: @deva[असंजातककुत्] (young animal, hump not yet formed), @deva[पूर्णककुत्] (middle-aged), @deva[उन्नतककुत्] (old, hump raised), @deva[स्थूलककुत्] (strong).
"""

standard = """
This @[sūtra] prescribes @deva[द]-elision from @deva[ककुद] (hump) in @[bahuvrīhi] when denoting @deva[अवस्था] (condition/life-stage of animals). @deva[असंजातं ककुदम् अस्य] = @deva[असंजातककुत्] (young, hump not developed). @deva[पूर्णककुत्] (middle-aged, full hump). @deva[उन्नतककुत्] (old, raised hump). @deva[स्थूलककुत्] (strong, thick hump). @deva[यष्टिककुत्] (neither fat nor thin). Without condition-meaning: @deva[श्वेतककुदः] (white-humped)—no elision.
"""

advanced = """
The @deva[अवस्था] (condition/stage) restriction parallels @ref[5.4.141]'s @deva[वयसि] for @deva[दन्त]. The hump serves as an age/condition indicator for cattle: undeveloped (young), full (prime), raised (old). This creates specialized vocabulary for animal husbandry contexts. Color descriptions (@deva[श्वेतककुद]) are not condition-markers, so they retain @deva[ककुद].
"""

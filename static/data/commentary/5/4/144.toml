id = "5.4.144"
numericId = "54144"

[en]
simple = """
@deva[दत्] optionally substitutes for @deva[दन्त] in a @[bahuvrīhi] compound when preceded by @deva[श्याव] (brown) or @deva[अरोक] (dark). Examples: @deva[श्यावदन्] or @deva[श्यावदन्तः], @deva[अरोकदन्] or @deva[अरोकदन्तः].
"""

standard = """
This @[sūtra] prescribes optional @deva[दत्]-substitution for @deva[दन्त] when preceded by @deva[श्याव] (brown, tawny) or @deva[अरोक] (dark, non-luminous). Thus @deva[श्यावदन्तः] or @deva[श्यावदन्] (having brown teeth), @deva[अरोकदन्तः] or @deva[अरोकदन्] (having dark teeth). The @deva[संज्ञायाम्] from the previous @[sūtra] continues: when not a name, substitution doesn't occur: @deva[श्यावदन्तः], @deva[अरोकदन्तः].
"""

advanced = """
The optionality here applies specifically when the compound functions as a name. The color-terms @deva[श्याव] and @deva[अरोक] (both describing tooth discoloration) may have been common enough in names to warrant this rule. Non-name descriptive uses retain @deva[दन्त].
"""

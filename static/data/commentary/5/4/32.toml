id = "5.4.32"
numericId = "54032"

[en]
simple = """
The affix @deva[कन्] is added to @deva[लोहित] when referring to something dyed red. Example: @deva[लोहितकः कम्बलः] (a red-dyed blanket), @deva[लोहितकः पटः] (a red-dyed cloth), @deva[लोहितिका शाटी] (a red-dyed garment).
"""

standard = """
This @[sūtra] extends the use of @deva[कन्] with @deva[लोहित] to items that have been dyed red (@deva[रक्त]). Thus @deva[लोहितकः कम्बलः] means a blanket dyed red, and @deva[लोहितकः पटः] means a cloth dyed red. In the feminine, forms like @deva[लोहितिका शाटी] or @deva[लोहिनिका शाटी] are used for a red-dyed garment.
"""

advanced = """
This @[sūtra] provides the second context for @deva[कन्] after @deva[लोहित]: the meaning @deva[रक्त] (dyed). While the previous @[sūtra] (@ref[5.4.31]) covered transient natural color, this covers artificial coloring through dyeing. The affix marks that the redness is applied rather than inherent. The feminine formations @deva[लोहितिका]/@deva[लोहिनिका] follow from the gender-independence principle stated in the @[vārttika] to the previous @[sūtra].
"""

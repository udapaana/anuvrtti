id = "5.4.92"
numericId = "54092"

[en]
simple = """
The affix @deva[टच्] is added to @deva[गो] (cow/ox) at the end of a @[tatpuruṣa] compound when no taddhita affix has been elided. Examples: @deva[परमगवः] (supreme cow), @deva[पञ्चगवम्] (five cows). But: @deva[पञ्चगुः] (bought for five cows—taddhita elided).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[गो] in @[tatpuruṣa] compounds when no taddhita affix has been elided (@deva[अतद्धितलुकि]). Thus @deva[परमगवः], @deva[उत्तमगवः], @deva[पञ्चगवम्], @deva[दशगवम्]. When taddhita @deva[ठक्] (@ref[5.1.37]) is elided by @ref[5.1.28]: @deva[पञ्चभिर्गोभिः क्रीतः] = @deva[पञ्चगुः], @deva[दशगुः]—no @deva[टच्]. The prohibition applies only to taddhita elision, not sup-elision: @deva[राजगवम् इच्छति] = @deva[राजगवीयति] (@ref[3.1.8], @ref[2.4.71]). Adding a taddhita (not eliding) still allows @deva[टच्]: @deva[पञ्चगवरुप्यम्], @deva[पञ्चगवमयम्].
"""

advanced = """
The condition @deva[अतद्धितलुकि] distinguishes between: (1) taddhita elision blocking @deva[टच्] (@deva[पञ्चगुः] where @deva[ठक्] is elided), (2) sup-elision not blocking (@deva[राजगवीयति]), and (3) taddhita addition not blocking (@deva[पञ्चगवरुप्यम्] where @deva[रुप्य] is added but not elided). The @deva[टच्] affix transforms @deva[गो] to @deva[गव] in compound-final position.
"""

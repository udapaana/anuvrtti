id = "5.4.128"
numericId = "54128"

[en]
simple = """
The words @deva[द्विदण्डि] (with two sticks) and others in the @deva[द्विदण्ड्यादि] list are valid formations with @deva[इच्]. Examples: @deva[द्विदण्डि प्रहरति] (strikes with two sticks), @deva[उभयाहस्ति], @deva[एकपदि].
"""

standard = """
This @[sūtra] validates the @deva[द्विदण्ड्यादि] @[gaṇa] as @deva[इच्] formations used in fixed senses. Thus @deva[द्विदण्डि प्रहरति] (strikes with two sticks), @deva[द्विमुसलि प्रहरति] (strikes with two pestles). But not @deva[द्विदण्डा शाला] (a hall with two pillars). Though the context is @[bahuvrīhi], some are @[tatpuruṣa]: @deva[निकुच्य कर्णौ धावति] = @deva[निकुच्यकर्णि धावति] (runs with ears bent back). Compounding by @ref[2.1.72].
"""

advanced = """
The @[gaṇa] (21 items) includes: @deva[द्विदण्डि], @deva[द्विमुसलि], @deva[उभाञ्जलि/उभयाञ्जलि], @deva[उभादन्ति/उभयादन्ति], @deva[उभाहस्ति/उभयाहस्ति], @deva[उभाकर्णि/उभयाकर्णि], @deva[उभापाणि/उभयापाणि], @deva[उभाबाहु/उभयाबाहु], @deva[एकपदि], @deva[प्रोह्यपदि], @deva[आढ्यपदि], @deva[सपदि], @deva[निकुच्यकर्णि], @deva[संहतपुच्छि], @deva[अन्तेवासि]. The dative @deva[द्विदण्ड्यादिभ्यः] means 'for the purpose of forming these words.'
"""

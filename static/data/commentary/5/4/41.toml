id = "5.4.41"
numericId = "54041"

[en]
simple = """
In Vedic usage, the affixes @deva[तिल्] and @deva[तातिल्] are added to @deva[वृक] and @deva[ज्येष्ठ] when expressing excellence. Examples: @deva[वृकतिः] or @deva[वृकतातिः] (excellent wolf), @deva[ज्येष्ठतातिः] (excellent eldest).
"""

standard = """
This @[sūtra] is restricted to @deva[छन्दस्] (Vedic literature) and prescribes @deva[तिल्] and @deva[तातिल्] after @deva[वृक] (wolf) and @deva[ज्येष्ठ] (eldest) when @deva[प्रशंसा] (excellence) is expressed. Thus @deva[वृकतिः] or @deva[वृकतातिः]. The Rig Veda example is: @deva[योनो मरुतो वृकतातिमर्त्यः] (RV 11.34.9). Similarly @deva[ज्येष्ठतातिः]. This rule debars @deva[रूपप्] (@ref[5.3.66]).
"""

advanced = """
The restriction @deva[छन्दसि] limits these affixes to Vedic usage. The condition @deva[प्रशंसायाम्] continues from the previous @[sūtra]. Both @deva[तिल्] and @deva[तातिल्] are available, the latter being the extended form. The Vedic citation @deva[योनो मरुतो वृकतातिमर्त्यः] demonstrates actual usage. Like @ref[5.4.40], this rule overrides the general @deva[रूपप्] prescription of @ref[5.3.66] for excellence expressions.
"""

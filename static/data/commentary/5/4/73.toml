id = "5.4.73"
numericId = "54073"

[en]
simple = """
The affix @deva[डाच्] is added to @[bahuvrīhi] compounds denoting numerals, EXCEPT when the final term is @deva[बहु] or @deva[गण]. Examples: @deva[उपदशाः], @deva[उपविंशाः], @deva[द्वित्राः], @deva[पञ्चषाः]. But: @deva[उपबहवः], @deva[उपगणाः].
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @[bahuvrīhi] compounds with numeral meaning, formed per @ref[2.2.25]. Examples: @deva[उपदशाः], @deva[उपविंशाः], @deva[उपत्रिंशाः], @deva[आसप्तदशाः], @deva[अदूरदशाः], @deva[अधिकदशाः], @deva[द्वित्राः], @deva[पञ्चषाः], @deva[पञ्चदशाः]. The exceptions @deva[बहु] and @deva[गण] don't take @deva[डाच्]: @deva[उपबहवः], @deva[उपगणाः] (accent falls on first member, not final). Non-numeral @[bahuvrīhis] don't qualify: @deva[चित्रगुः], @deva[शबलगुः]. A @[vārttika] extends @deva[डाच्] to @[tatpuruṣa] numerals like @deva[निस्त्रिंश]: @deva[निस्त्रिंशानि वर्षाणि] (more than thirty years).
"""

advanced = """
The @deva[संख्या] (numeral) condition limits this to compounds with numerical meaning. The @deva[बहु]/deva[@deva[गण]] exception reflects that these general quantity words don't pattern like specific numerals. The @[vārttika] extending to @[tatpuruṣa] numerals (@deva[निस्त्रिंश]) shows the semantic principle: expressing 'more than X' or 'approximately X' with numerals triggers @deva[डाच्] regardless of compound type. The accent difference in @deva[उपगणाः] (first-member accent) vs. @deva[उपदशाः] (final accent from @deva[डाच्]) is diagnostically significant.
"""

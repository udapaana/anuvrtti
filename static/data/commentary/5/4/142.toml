id = "5.4.142"
numericId = "54142"

[en]
simple = """
In Vedic usage, @deva[दत्] substitutes for @deva[दन्त] (tooth) at the end of any @[bahuvrīhi] compound. Examples: @deva[पत्रदत् आलभेत], @deva[उभयदत् आलभेत].
"""

standard = """
This @[sūtra] prescribes @deva[दत्]-substitution for @deva[दन्त] in all @[bahuvrīhi] compounds within @deva[छन्दस्] (Vedic literature). Thus @deva[पत्रदत् आलभेत] (having leaf-like teeth), @deva[उभयदत् आलभेत] (having teeth on both sides). This is broader than the classical restriction to age-contexts.
"""

advanced = """
The Vedic license extends @deva[दत्]-substitution beyond the @deva[वयसि] (age-stage) condition of @ref[5.4.141]. In classical Sanskrit, @deva[दत्] is restricted to developmental stages; in Vedic, it applies generally to @deva[दन्त]-final @[bahuvrīhis]. This reflects the greater morphological freedom in Vedic.
"""

id = "5.4.42"
numericId = "54042"

[en]
simple = """
The affix @deva[शस्] is optionally added to words meaning 'much' (@deva[बहु]) or 'little' (@deva[अल्प]) when used as a @[kāraka] (case relation to a verb). Examples: @deva[बहुशो ददाति] = @deva[बहूनि ददाति] (gives much), @deva[अल्पशो ददाति] = @deva[अल्पं ददाति] (gives little).
"""

standard = """
This @[sūtra] prescribes optional @deva[शस्] after words meaning 'much' or 'little' when they function as @deva[कारक] (in grammatical relation to a verb). Thus @deva[बहूनि ददाति] or @deva[बहुभिर्ददाति] = @deva[बहुशो ददाति] (he gives much). Similarly @deva[अल्पशो ददाति] (he gives a little). The rule does not apply in genitive constructions: @deva[बहूनां स्वामी] (lord of many) retains the genitive since the 6th case is not a @deva[कारक]. By the word 'signifying,' synonyms are included: @deva[भूरिशो ददाति], @deva[स्तोकशो ददाति]. Usage note: @deva[बहुशो देहि] applies to auspicious occasions; @deva[अल्पशो देहि] to inauspicious occasions like funerals.
"""

advanced = """
The condition @deva[कारके] excludes the sixth case (@deva[षष्ठी]) which is not a @deva[कारक] by definition—it expresses relation (@deva[सम्बन्ध]) rather than verbal dependency. The semantic extension via @deva[वाचि] (signification) includes all synonyms of @deva[बहु] (like @deva[भूरि]) and @deva[अल्प] (like @deva[स्तोक]). The practical usage distinction—@deva[बहुशो] for @deva[अभ्युदयिक] (auspicious/prosperity) occasions vs. @deva[अल्पशो] for @deva[अनिष्ट] (inauspicious) occasions like @deva[श्राद्ध]—reflects ritual propriety.
"""

id = "5.4.136"
numericId = "54136"

[en]
simple = """
@deva[इ] substitutes for the final @deva[अ] of @deva[गन्ध] in a @[bahuvrīhi] compound when @deva[गन्ध] means 'a little' (just a trace). Examples: @deva[सूपगन्धि भोजनम्] (food with just a trace of broth), @deva[घृतगन्धि] (with a mere scent of ghee), @deva[क्षीरगन्धि].
"""

standard = """
This @[sūtra] prescribes @deva[इ]-substitution for @deva[गन्ध] when it means @deva[अल्प] (a little, a mere trace). Thus @deva[सूपः अल्पः अस्मिन्] = @deva[सूपगन्धि भोजनम्] (food with just a little broth). Similarly @deva[घृतगन्धि] (with a mere trace of ghee), @deva[क्षीरगन्धि] (with a trace of milk). Here @deva[गन्ध] is synonymous with @deva[अल्प] (little/slight).
"""

advanced = """
The semantic extension of @deva[गन्ध] from 'smell/scent' to 'a mere trace' (as in 'just a whiff') triggers this substitution. The @deva[इ]-final forms express 'having only a trace of X' rather than 'having the smell of X.' This metaphorical use of 'scent' for 'trace amount' is common cross-linguistically.
"""

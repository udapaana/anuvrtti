id = "5.4.148"
numericId = "54148"

[en]
simple = """
The final @deva[द] of @deva[काकुद] (palate) is elided in a @[bahuvrīhi] compound when preceded by @deva[उद्] or @deva[वि]. Examples: @deva[उत्काकुत्] (with raised palate), @deva[विकाकुत्] (with open/separated palate).
"""

standard = """
This @[sūtra] prescribes @deva[द]-elision from @deva[काकुद] (palate) in @[bahuvrīhi] when preceded by @deva[उद्] (up) or @deva[वि] (apart). Thus @deva[उद्गतं काकुदम् अस्य] = @deva[उत्काकुत्] (having raised palate). Similarly @deva[विकाकुत्] (having separated/open palate).
"""

advanced = """
The word @deva[काकुद] means 'palate' (distinct from @deva[ककुद] 'hump'). The prefixes @deva[उद्] and @deva[वि] describe palate conditions or positions. This rule is specific to these two prefixes, unlike the broader condition-based rule for @deva[ककुद] in @ref[5.4.146].
"""

id = "5.4.79"
numericId = "54079"

[en]
simple = """
The affix @deva[अच्] is added to @deva[तमस्] (darkness) when preceded by @deva[अव], @deva[सम्], or @deva[अन्ध]. Examples: @deva[अवतमसम्] (deep darkness), @deva[सन्तमसम्] (complete darkness), @deva[अन्धतमसम्] (blind/pitch darkness).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[तमस्] (darkness) when preceded by @deva[अव], @deva[सम्], or @deva[अन्ध]. Thus @deva[अवतमसम्], @deva[सन्तमसम्] (with @deva[सम्] + @deva[तमस्]), and @deva[अन्धतमसम्] (pitch/total darkness). These are @[avyayībhāva] or intensifying compounds expressing degrees of darkness.
"""

advanced = """
The three prefixes intensify @deva[तमस्] in different ways: @deva[अव] suggests 'down into,' @deva[सम्] suggests 'complete,' and @deva[अन्ध] (blind) adds the sense of impenetrable darkness. The @deva[सम्] + @deva[तमस्] sandhi yields @deva[सन्तमसम्]. These compounds function as intensified expressions of darkness in various contexts.
"""

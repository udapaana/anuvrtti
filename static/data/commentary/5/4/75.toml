id = "5.4.75"
numericId = "54075"

[en]
simple = """
The affix @deva[अच्] is added to @deva[सामन्] (@[sāman]) and @deva[लोमन्] (hair) when preceded by @deva[प्रति], @deva[अनु], or @deva[अव]. Examples: @deva[प्रतिसामम्], @deva[अनुसामम्], @deva[अवसामम्], @deva[प्रतिलोमम्], @deva[अनुलोमम्], @deva[अवलोमम्].
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[सामन्] and @deva[लोमन्] when the prefixes @deva[प्रति], @deva[अनु], or @deva[अव] precede. Thus @deva[प्रतिसामम्], @deva[अनुसामम्], @deva[अवसामम्]; @deva[प्रतिलोमम्], @deva[अनुलोमम्], @deva[अवलोमम्]. @[vārttikas] extend @deva[अच्] to: (1) @deva[भूमि] after @deva[कृष्ण], @deva[उदक्], @deva[पाण्डु]: @deva[कृष्णभूमः], @deva[पाण्डुभूमः], @deva[उदग्भूमः]; (2) @deva[गोदावरी] and @deva[नदी] after numerals: @deva[पञ्चनदम्], @deva[सप्तगोदावरम्]; (3) @deva[भूमि] after numerals: @deva[द्विभूमः प्रासादः], @deva[त्रिभूमः]; (4) other words: @deva[पद्मनाभः], @deva[ऊर्णनाभः], @deva[समरात्रः], @deva[दीर्घरात्रः], @deva[अरात्रः].
"""

advanced = """
The @[vārttikas] significantly expand this @[sūtra]'s scope. The final note suggests the @[sūtra] can be split: (1) @deva[अच्] as a general @[samāsānta], and (2) the specific @deva[प्रत्यन्वव] + @deva[सामन्]/@deva[लोमन्] condition. This interpretation allows @deva[अच्] after compounds like @deva[नाभि] → @deva[पद्मनाभः] and @deva[रात्रि] → @deva[समरात्रः]. The directional terms @deva[अनुलोम] (with the grain) and @deva[प्रतिलोम] (against the grain) are semantically productive formations.
"""

id = "5.4.21"
numericId = "54021"

[en]
simple = """
The affix @deva[मयट्] (becoming @deva[मय], feminine @deva[मयी]) comes after nominative-case words meaning 'made of that' or 'abounding in that.' Examples: @deva[अन्नमयम्] (made of food/abounding in food), @deva[अपूपमयम्] (made of cakes).
"""

standard = """
The affix @deva[मयट्] (@deva[मय], fem. @deva[मयी] with @deva[ङीप्]) attaches to nominative-case words expressing @deva[प्रकृत] (made of/abundant in). Two interpretations: (1) @deva[अन्नमयम्] = abundance of food; (2) @deva[अन्नमयो यज्ञः] = a feast abounding in food. @deva[वचन] (from √@deva[वच्] + @deva[ल्युट्]) allows both 'nature of' and 'site of' meanings.
"""

advanced = """
The @deva[मयट्] affix: @deva[ट्] indicates @deva[ङीप्] feminine (@deva[मयी]). Two senses from @deva[ल्युट्] in @deva[वचन]: @deva[भाव] (nature—@deva[अन्नमयम्] = food-abundance) and @deva[अधिकरण] (site—@deva[अन्नमयो यज्ञः] = feast where food is abundant). Both are valid per @[sūtra] construction.
"""

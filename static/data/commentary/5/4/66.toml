id = "5.4.66"
numericId = "54066"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[सत्य] (truth) with verb @deva[कृ] when NOT meaning 'to swear.' Example: @deva[सत्या करोति वणिक् भाण्डम्] (the merchant finalizes the bargain/settles the purchase).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[सत्य] with @deva[कृ] when the meaning is NOT swearing (@deva[अशपथे]). Thus @deva[सत्या करोति वणिक् भाण्डम्] means the merchant concludes or finalizes the bargain—settling that he will purchase. The swearing sense (as in @deva[सत्येन शापयेत् विप्रम्], 'one should make a Brahmin swear by truth') is excluded. When meaning 'to swear': @deva[सत्यं करोति ब्राह्मणः] (the Brahmin swears)—no affix.
"""

advanced = """
The prohibition @deva[अशपथे] excludes oath-taking (@deva[शपथ]) from this rule. @deva[सत्या करोति] in commercial contexts means 'to make true/final'—confirming a transaction. The verb @deva[शप्] (to curse/swear) is semantically connected to @deva[सत्य] in oath-contexts, but this rule specifically excludes that usage. The counter-example @deva[सत्यं करोति ब्राह्मणः] shows the swearing sense.
"""

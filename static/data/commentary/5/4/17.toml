id = "5.4.17"
numericId = "54017"

[en]
simple = """
The affix @deva[कृत्वसुच्] (becoming @deva[कृत्वस्]) comes after numerals when counting repetitions of an action. Example: @deva[पञ्चकृत्वः] (five times), from @deva[पञ्च वारान् भुङ्क्ते] (he eats five times).
"""

standard = """
The @deva[स्वार्थ] affix @deva[कृत्वसुच्] (@deva[कृत्वस्]) attaches to numerals for @deva[क्रियाभ्यावृत्तिगणन] (counting repetitions of action). Examples: @deva[पञ्च वारान् भुङ्क्ते] = @deva[पञ्चकृत्वो भुङ्क्ते] (eats five times); @deva[सप्तकृत्वः] (seven times). Not after non-numerals: @deva[भूरीन् वारान् भुङ्क्ते] (eats many times—no affix). Not for counting actions themselves: @deva[पञ्चपाकाः] (five cookings).
"""

advanced = """
The three conditions are: (1) @deva[संख्या] (numeral); (2) @deva[क्रिया] (action); (3) @deva[अभ्यावृत्ति] (repetition) + @deva[गणन] (counting). @deva[क्रिया] continues into @ref[5.4.19]. @deva[गणन] ensures application to both @deva[संख्येय]-numerals (1-10, denoting things counted) and @deva[संख्यान]-numerals (11+, denoting the counting process itself).
"""

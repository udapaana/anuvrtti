id = "5.4.62"
numericId = "54062"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[निष्कुल] with verb @deva[कृ] when meaning 'to disembowel' or 'to extract the inner contents.' Examples: @deva[निष्कुला करोति पशून्] (disembowels animals), @deva[निष्कुला करोति दाडिमम्] (extracts pomegranate seeds).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[निष्कुल] with @deva[कृ] when the meaning is @deva[निष्कोषण] (extracting inner organs or contents). Thus @deva[निष्कुला करोति पशून्] means disemboweling or gutting animals. Similarly @deva[निष्कुला करोति दाडिमम्] means extracting the seeds or kernel of a pomegranate. The condition is essential: @deva[निष्कुलान् करोति शत्रून्] (makes enemies family-less) doesn't take the affix because it means destroying families, not extracting contents.
"""

advanced = """
The term @deva[निष्कोषण] covers both literal evisceration (of animals) and metaphorical extraction (of seeds from fruit). The @deva[कुल] element here relates to 'inner contents' or 'core' rather than 'family.' When @deva[निष्कुल] means 'family-less' (in social/genealogical sense), the @deva[डाच्] transformation is blocked. This semantic distinction parallels similar conditions in preceding @[sūtras].
"""

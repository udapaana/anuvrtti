id = "5.4.157"
numericId = "54157"

[en]
simple = """
When a @deva[बहुव्रीहि] compound ends in @deva[भ्रातृ] (brother) and is used to praise or compliment someone, the suffix @deva[कप्] is NOT added. For example, @deva[सुभ्राता] "one with a fine brother" (used as a compliment) stays without @deva[कप्].
"""

standard = """
@[sūtra] @ref[5.4.157] prohibits @deva[कप्] after a @deva[बहुव्रीहि] ending in @deva[भ्रातृ] when the compound carries the sense of @deva[प्रशंसा] (praise, commendation). Outside this sense, @deva[कप्] applies normally by @ref[5.4.153] (since @deva[भ्रातृ] ends in short @deva[ऋ]).

**Worked example:** @deva[सु] + @deva[भ्रातृ] → @deva[बहुव्रीहि] with "praise" sense → no @deva[कप्] → nom. sg. @deva[सुभ्राता] "one with an excellent brother" (complimenting the person).

When NOT in a praise sense: @deva[मूर्ख] + @deva[भ्रातृ] → @deva[बहुव्रीहि] (neutral/negative) → + @deva[कप्] by @ref[5.4.153] → @deva[मूर्खभ्रातृकः] "one whose brother is a fool."

The semantic condition (@deva[प्रशंसा]) is determined by context. The rule thus introduces a pragmatic/semantic constraint into morphology.
"""

advanced = """
@[sūtra] @ref[5.4.157]: @deva[भ्रातरि च प्रशंसायाम्] — @deva[कप्] does not apply in a @deva[बहुव्रीहि] ending in @deva[भ्रातृ] when the meaning is praise. The @deva[च] connects this to the chain of prohibitions from @ref[5.4.155].

**Why @deva[भ्रातृ] specifically?** @deva[भ्रातृ] ends in short @deva[ऋ], which normally triggers @deva[कप्] by @ref[5.4.153]. This rule carves out an exception for the culturally loaded context of "praising someone's brother."

**Semantic analysis of @deva[प्रशंसा]:** The "praise" sense means the compound is used as a term of honor or compliment — the speaker is extolling the person addressed or described. This is distinct from neutral description.

**Contrast:**
- @deva[सुभ्राता] — "one with a fine brother" (praise; no @deva[कप्])
- @deva[मूर्खभ्रातृकः] — "one with a foolish brother" (non-praise, @deva[कप्] by @ref[5.4.153])
- @deva[द्विभ्रातृकः] — "one with two brothers" (count, neutral; @deva[कप्] applies)

**Morphology of @deva[सुभ्राता]:** @deva[सु] + @deva[भ्रातृ] → @deva[बहुव्रीहि] → no @deva[कप्] → declension follows @deva[ऋ]-stem pattern → nom. sg. @deva[सुभ्राता] (by @ref[7.1.94] @deva[ऋत इद् धातोः] and related rules for @deva[भ्रातृ] in weak stem).

**Broader pattern:** Rules @ref[5.4.155]–@ref[5.4.160] form a cluster of semantic/contextual prohibitions on @deva[कप्]. This one uniquely introduces a pragmatic (praise-context) condition rather than purely structural criteria.
"""

id = "5.4.46"
numericId = "54046"

[en]
simple = """
The affix @deva[तसि] (-@deva[तः]) is optionally added to an instrumental case (3rd) that is not an agent, when used with verbs meaning 'to excel,' 'not to yield,' or 'to blame.' Examples: @deva[वृत्ततः अतिगृह्यते] = @deva[वृत्तेन अतिगृह्यते] (excels through conduct), @deva[वृत्ततः क्षिप्तः] (blamed for conduct).
"""

standard = """
This @[sūtra] prescribes optional @deva[तसि] after a non-agentive instrumental when the governing verbs express excelling (@deva[अतिगृह्य]), not yielding (@deva[न व्यथ्]), or blaming (@deva[क्षिप]). Thus @deva[वृत्तेन अतिगृह्यते] = @deva[वृत्ततः अतिगृह्यते] (surpasses through conduct). Similarly @deva[वृत्ततः न व्यथते] (doesn't waver due to conduct) and @deva[वृत्ततः क्षिप्तः] (blamed for conduct). The condition @deva[अकर्तरि] excludes agentive instrumentals: @deva[देवदत्तेन क्षिप्तः] (blamed by Devadatta) does not take the affix.
"""

advanced = """
The three semantic conditions—@deva[अतिशय] (excelling), @deva[अदान] (not giving way/yielding), and @deva[निन्दा] (blame)—define when the non-agentive instrumental can take @deva[तसि]. The restriction @deva[अकर्तरि] is crucial: the instrumental must express cause or means, not the agent performing the action. In @deva[देवदत्तेन क्षिप्तः], Devadatta is the agent of blaming, so @deva[तसि] is blocked.
"""

id = "5.4.67"
numericId = "54067"

[en]
simple = """
The affix @deva[डाच्] is added to @deva[मद्र] (auspicious) with verb @deva[कृ] when meaning 'to shave' (on an auspicious occasion). Example: @deva[मद्रा करोति] = @deva[मङ्गलं मुण्डनं करोति] (performs auspicious head-shaving).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after @deva[मद्र] with @deva[कृ] when meaning @deva[परिवापण] (shaving). @deva[मद्र] means 'auspicious.' Thus @deva[मद्रा करोति] = @deva[मङ्गलं मुण्डनं करोति] (performs auspicious head-shaving, as for a child's first haircut). A @[vārttika] extends this to @deva[भद्र]: @deva[भद्रा करोति नापितं कुमारम्] (the barber shaves the boy's hair on the auspicious occasion). Without the shaving meaning: @deva[मद्रं करोति] or @deva[भद्रं करोति] (makes auspicious)—no affix.
"""

advanced = """
The term @deva[परिवापण] specifically means ritual shaving or tonsure. Both @deva[मद्र] and @deva[भद्र] mean 'auspicious,' and the @[vārttika]'s extension of @deva[भद्र] suggests lexical synonymy in this context. The ritual context—ceremonial first haircut (@deva[चूडाकरण]) or other auspicious shaving—triggers the affix. General auspiciousness without the shaving sense doesn't qualify.
"""

id = "5.4.115"
numericId = "54115"

[en]
simple = """
The affix @deva[ष] is added to @deva[मूर्धन्] (head) at the end of a @[bahuvrīhi] compound when preceded by @deva[द्वि] or @deva[त्रि]. Examples: @deva[द्विमूर्धः] (two-headed), @deva[त्रिमूर्धः] (three-headed). But: @deva[उच्चैर्मूर्धा] (high-headed).
"""

standard = """
This @[sūtra] prescribes @deva[ष] (just the consonant, yielding @deva[अ]) after @deva[मूर्धन्] in @[bahuvrīhi] when preceded by @deva[द्वि] or @deva[त्रि]. Thus @deva[द्विमूर्धः] (two-headed), @deva[त्रिमूर्धः] (three-headed). Feminine formed by @deva[ङीष्]. Accent regulated by @ref[6.2.197]. When not preceded by @deva[द्वि/त्रि]: @deva[उच्चैर्मूर्धा] (with high head)—no @[samāsānta] affix.
"""

advanced = """
The restriction to @deva[द्वि] and @deva[त्रि] suggests these specific numeral + @deva[मूर्धन्] compounds were common enough to warrant explicit treatment. The @deva[ष्]-indicatory ensures @deva[ङीष्] feminine. The @deva[अन्]-elision from @deva[मूर्धन्] and affix-addition yield @deva[मूर्ध].
"""

id = "5.4.114"
numericId = "54114"

[en]
simple = """
The affix @deva[षच्] is added to @deva[अङ्गुलि] (finger) at the end of a @[bahuvrīhi] compound when the compound means 'a piece of wood' (finger-shaped implement). Examples: @deva[द्व्यङ्गुलम् दारु], @deva[त्र्यङ्गुलम् दारु], @deva[पञ्चाङ्गुलम्].
"""

standard = """
This @[sūtra] prescribes @deva[षच्] after @deva[अङ्गुलि] in @[bahuvrīhi] when the compound refers to @deva[दारु] (wood)—specifically a wooden implement shaped like fingers. Thus @deva[द्व्यङ्गुलं दारु], @deva[त्र्यङ्गुलं दारु], @deva[पञ्चाङ्गुलम्] (a five-fingered wooden spoon/fork for scattering grain). @[non-bahuvrīhi]: @deva[द्व्यङ्गुलयष्टिः] = @deva[द्वे अङ्गुली प्रमाणमस्याः] (a stick two fingers in size—@[tatpuruṣa] by @ref[5.4.86] with @deva[अच्]). Not meaning wood: @deva[पञ्चाङ्गुलिर्हस्तः] (five-fingered hand).
"""

advanced = """
The semantic condition @deva[दारुणि] restricts this to wooden implements. The @deva[अङ्गुलि] here refers to finger-like prongs or shape, not measurement. The distinction from @ref[5.4.86] (which gives @deva[अच्] for measurement-sense @deva[अङ्गुलि] in @[tatpuruṣa]) is important: shape-in-wood = @deva[षच्]; size-measurement = @deva[अच्].
"""

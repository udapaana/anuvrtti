id = "5.4.13"
numericId = "54013"

[en]
simple = """
The affix @deva[ठक्] comes after @deva[अनुगादिन्] (one who echoes/repeats) without changing meaning. Example: @deva[आनुगादिकः] (a repeater, an echoer).
"""

standard = """
The @deva[स्वार्थ] affix @deva[ठक्] (@deva[इक]) attaches to @deva[अनुगादिन्] (one who repeats/echoes back) without changing meaning. @deva[वृद्धि] applies: @deva[अनुगादिन्] → @deva[आनुगादिकः] (one who echoes, a repeater).
"""

advanced = """
This is @deva[स्वार्थ ठक्]—the affix doesn't alter the meaning of @deva[अनुगादिन्] (from @deva[अनु] + √@deva[गद्] + @deva[णिनि], 'one who speaks after/echoes'). @deva[ठक्] → @deva[इक] with @deva[वृद्धि]: @deva[अ] → @deva[आ].
"""

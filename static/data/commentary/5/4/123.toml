id = "5.4.123"
numericId = "54123"

[en]
simple = """
In Vedic usage, the form @deva[बहुप्रजाः] (with @deva[असिच्]) is valid after @deva[बहु]. Example: @deva[बहुप्रजा निर्ऋतिम् आविवेश]. In classical Sanskrit: @deva[बहुप्रजः] (without the affix).
"""

standard = """
This @[sūtra] validates the Vedic form @deva[बहुप्रजाः] with @deva[असिच्] after @deva[बहु]. Thus @deva[बहुप्रजा निर्ऋतिम् आविवेश] (Vedic). In secular/classical literature, the form is @deva[बहुप्रजः], as in @deva[बहुप्रजो ब्राह्मणः] (a Brahmin with many offspring).
"""

advanced = """
The Vedic license extends @deva[असिच्] after @deva[बहु] + @deva[प्रजा], whereas classical usage follows @ref[5.4.122] which requires @deva[नञ्/दुस्/सु] as triggers. The contrast @deva[बहुप्रजाः] (Vedic) vs. @deva[बहुप्रजः] (Laukika) illustrates the broader morphological freedom in Vedic Sanskrit.
"""

id = "5.4.19"
numericId = "54019"

[en]
simple = """
For @deva[एक] (one), the substitute @deva[सकृत्] is used with @deva[सुच्] when counting an action (not repetition, since 'one' cannot repeat). Example: @deva[सकृद्भुङ्क्ते] (eats once).
"""

standard = """
The word @deva[सकृत्] substitutes for @deva[एक] before @deva[सुच्] when counting an action (not repetition—impossible for 'one'). Only @deva[क्रिया] continues here, not @deva[अभ्यावृत्ति]. Example: @deva[सकृद्भुङ्क्ते] (eats once); @deva[सकृदधीते] (studies once). The @deva[स्] is elided by @ref[8.2.23]. Not: *@deva[एकः पाकः] (against usage).
"""

advanced = """
Since @deva[एक] (one) cannot express @deva[अभ्यावृत्ति] (repetition), only @deva[क्रिया] (action-counting) applies. @deva[सकृत्] is the @deva[आदेश] (substitute) for @deva[एक] + @deva[सुच्]. By @ref[8.2.23], @deva[स्] → @deva[त्] / @deva[द्] in @deva[पद]-final position: @deva[सकृत्] → @deva[सकृद्] before voiced sounds.
"""

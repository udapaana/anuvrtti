id = "5.4.56"
numericId = "54056"

[en]
simple = """
The affix @deva[त्रा] is added to @deva[देव], @deva[मनुष्य], @deva[पुरुष], @deva[पुरु], and @deva[मर्त्य] to replace accusative or locative case. Examples: @deva[देवत्रा गच्छति] = @deva[देवान् गच्छति] (goes to the gods), @deva[देवत्रा वसति] = @deva[देवेषु वसति] (dwells among the gods).
"""

standard = """
This @[sūtra] prescribes @deva[त्रा] after five words—@deva[देव], @deva[मनुष्य], @deva[पुरुष], @deva[पुरु], @deva[मर्त्य]—to express either accusative (2nd) or locative (7th) case meanings. Thus @deva[देवान् गच्छति] = @deva[देवत्रा गच्छति] (goes to the gods); @deva[देवेषु वसति] = @deva[देवत्रा वसति] (dwells among the gods). Similarly @deva[मनुष्यत्रा], @deva[पुरुषत्रा], @deva[पुरुत्रा], @deva[मर्त्यत्रा]. The word @deva[विभाषा] (diversely) indicates extension to other words: @deva[बहुत्रा जीवतो मनः] (the mind lives in many places).
"""

advanced = """
The @deva[साति] @[anuvṛtti] ceases; @deva[त्रा] alone applies. The verbs @deva[कृ/भू/अस्] have no scope here—this is a general case-replacement rule. The term @deva[विभाषा] here means 'diversely' or 'variously,' allowing extension beyond the listed five words. The @deva[द्विवचन] (dual) case function (accusative or locative) makes @deva[त्रा] versatile for directional and locational expressions with these animate-denoting nouns.
"""

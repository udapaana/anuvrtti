id = "5.4.100"
numericId = "54100"

[en]
simple = """
The affix @deva[टच्] is added to @deva[नौ] (boat) at the end of a @[tatpuruṣa] compound when preceded by @deva[अर्ध] (half). Example: @deva[अर्धनावम्] (half a boat).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[नौ] in @[tatpuruṣa] when preceded by @deva[अर्ध] (half). Thus @deva[अर्धं नावः] = @deva[अर्धनावम्]. Compounding by @ref[2.2.2]. The compound is neuter gender, not following the feminine gender of @deva[नौ] as @ref[2.4.26] would normally require. This is because gender is determined by usage (@deva[लोकाश्रयत्वं लिङ्गस्य]) rather than strict grammatical rules.
"""

advanced = """
The @deva[अर्ध]-compound represents fractional expressions. The neuter gender @deva[अर्धनावम्] (rather than feminine @deva[अर्धनौः] following @deva[नौ]) illustrates the principle that gender conventions override strict grammatical derivation. The @ref[2.2.2] reference indicates the compounding rule for fractional terms. This @[sūtra] extends @deva[टच्] beyond Dvigu to include @deva[अर्ध]-@[tatpuruṣa].
"""

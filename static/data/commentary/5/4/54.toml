id = "5.4.54"
numericId = "54054"

[en]
simple = """
The affix @deva[साति] is added to words meaning 'master' or 'lord' to express 'bringing under that person's control,' with verbs @deva[कृ], @deva[भू], @deva[अस्], or @deva[सम्पद्]. Example: @deva[राजसात् करोति] = @deva[राजाधीनं करोति] (brings under the king's control).
"""

standard = """
This @[sūtra] prescribes @deva[साति] after words denoting a master or proprietor to express @deva[तदधीन] (dependence on that person, coming under their control). The verbs @deva[कृ], @deva[भू], @deva[अस्], @deva[सम्पद्] apply. Thus @deva[राजाधीनं करोति] = @deva[राजसात् करोति] (a king brings a kingdom under his dominion). Similarly @deva[राजसात् भवति/स्यात्/सम्पद्यते]. Also @deva[ब्राह्मणसात् भवति/करोति/स्यात्/सम्पद्यते] (comes under Brahmin control).
"""

advanced = """
The @deva[अभूततद्भाव] condition ceases here—a new semantic domain (@deva[तदधीन]) is introduced. The word @deva[तदधीन] means 'under the supremacy, control, or proprietorship of that.' Both the proprietor generally and the object of rulership are indicated. The four verbs continue from previous @[sūtras]. This differs from transformation—it's about subjugation or bringing under authority.
"""

id = "5.4.7"
numericId = "54007"

[en]
simple = """
The affix @deva[ख] (becoming @deva[ईन]) comes after @deva[अषडक्ष], @deva[आशितङ्गु], @deva[अलंकर्मन्], @deva[अलंपुरुष], and stems ending in @deva[अधि]. Examples: @deva[अषडक्षीणम्] (a secret between two), @deva[राजाधीनः] (dependent on the king).
"""

standard = """
The @deva[स्वार्थ] affix @deva[ख] (@deva[ईन]) attaches invariably to: @deva[अषडक्ष] (not having six eyes → a secret known to two only); @deva[आशितङ्गु] (where cattle grazed → abundant pasture); @deva[अलंकर्मन्] (competent for work); @deva[अलंपुरुष] (fit for a man → a rival). Also @deva[अधि]-ending compounds (by @ref[2.1.40]): @deva[राजाधीनः] (king-dependent).
"""

advanced = """
The @deva[ख] here is @deva[नित्य] (invariable)—these words always appear with the affix. This is inferred because @deva[विभाषा] appears in the next @[sūtra]; by the maxim @deva[द्वयोर्विभाषयोर्नित्या विधयः], rules between two optional rules are @deva[नित्य]. @deva[अषडक्ष] = @deva[षट्] + @deva[अक्ष्णि] + @deva[षच्] (@ref[5.4.113]) + @deva[ख]. @deva[आशितङ्गु] has irregular @deva[मुम्]-augment.
"""

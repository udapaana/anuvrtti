id = "5.4.90"
numericId = "54090"

[en]
simple = """
The substitution of @deva[अह्न] for @deva[अहन्] also does NOT occur after @deva[पुण्य] and @deva[एक]. Examples: @deva[पुण्याहः] (auspicious day), @deva[एकाहः] (one-day period).
"""

standard = """
This @[sūtra] adds two more exceptions to the @deva[अह्न]-substitution: (1) @deva[पुण्य] (the last word in the list of @ref[5.4.87], referred to as @deva[उत्तम] 'last'); (2) @deva[एक] (one). Thus @deva[पुण्याहः] (an auspicious day) and @deva[एकाहः] (a one-day sacrifice/period). Some grammarians extend the prohibition to @deva[संख्यात] (the penultimate word), preferring @deva[संख्याताहः] over @deva[संख्याताह्नः].
"""

advanced = """
The term @deva[उत्तम] (last) is used as stylistic variation (@deva[वैचित्र्य]) instead of directly saying @deva[पुण्य]. The @deva[एक] exception ensures @deva[एकाहः] rather than @deva[एकाह्नः]. The optional extension to @deva[संख्यात] creates two valid forms: @deva[संख्याताहः] (if @deva[संख्यात] is included in the prohibition) or @deva[संख्याताह्नः] (if it follows the general @deva[अह्न]-substitution).
"""

id = "5.4.145"
numericId = "54145"

[en]
simple = """
@deva[दत्] optionally substitutes for @deva[दन्त] in a @[bahuvrīhi] compound when preceded by a word ending in @deva[अग्र], or by @deva[शुद्ध], @deva[शुभ्र], or @deva[वराह]. Examples: @deva[कुड्मलाग्रदन्] or @deva[कुड्मलाग्रदन्तः], @deva[शुद्धदन्] or @deva[शुद्धदन्तः], @deva[वराहदन्] or @deva[वराहदन्तः].
"""

standard = """
This @[sūtra] prescribes optional @deva[दत्]-substitution for @deva[दन्त] when preceded by: (1) words ending in @deva[अग्र] (tip/front), (2) @deva[शुद्ध] (pure/white), (3) @deva[शुभ्र] (bright/white), (4) @deva[वराह] (boar). Thus @deva[कुड्मलाग्रदन्]/deva[@deva[कुड्मलाग्रदन्तः]] (bud-tip-toothed), @deva[शुद्धदन्]/deva[@deva[शुद्धदन्तः]], @deva[शुभ्रदन्]/deva[@deva[शुभ्रदन्तः]], @deva[वराहदन्]/deva[@deva[वराहदन्तः]] (boar-tusked). The @deva[च] indicates extension to other words: @deva[अहिदन्]/deva[@deva[अहिदन्तः]], @deva[मूषिकदन्]/deva[@deva[मूषिकदन्तः]], @deva[गर्दभदन्]/deva[@deva[गर्दभदन्तः]], @deva[शिखरदन्]/deva[@deva[शिखरदन्तः]].
"""

advanced = """
The @deva[च] ('and') signals that the list is extensible. The pattern suggests @deva[दत्]-substitution is broadly optional in @[comparison-bahuvrīhis] and descriptive compounds. The enumerated words (@deva[अग्र]-final, @deva[शुद्ध], @deva[शुभ्र], @deva[वराह]) and the extensions (@deva[अहि], @deva[मूषिक], @deva[गर्दभ], @deva[शिखर]) all describe tooth qualities through comparison or attribute.
"""

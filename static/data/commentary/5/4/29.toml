id = "5.4.29"
numericId = "54029"

[en]
simple = """
The affix @deva[कन्] comes after @deva[याव] and similar words without changing meaning. Examples: @deva[यावकः] (= @deva[यावः], barley gruel), @deva[मणिकः] (= @deva[मणिः], jewel).
"""

standard = """
The @deva[स्वार्थ] affix @deva[कन्] attaches to @deva[यावादि] words without sense-change. The class includes: @deva[याव], @deva[मणि], @deva[अस्थि], @deva[तालु], @deva[जानु], etc. Special meanings: @deva[उष्णक/शीतक] (seasons); @deva[लूनक/वियातक] (animals); @deva[अणुक] (clever); @deva[पुत्रक] (artificial son); @deva[स्नातक] (graduate); @deva[शून्यक] (empty vessel); @deva[दानक] (contemptible gift); @deva[तनुक] (thread); @deva[श्रेयस्क] (@deva[ईयसुन्]-ending).
"""

advanced = """
The @deva[यावादि] (21 items) takes @deva[स्वार्थ कन्] with various semantic restrictions: @deva[ऋतौ] for @deva[उष्ण/शीत]; @deva[पशौ] for @deva[लून/वियात]; @deva[निपुणे] for @deva[अणु]; @deva[कृत्रिमे] for @deva[पुत्र]; @deva[वेदसमाप्तौ] for @deva[स्नात]; @deva[रिक्ते] for @deva[शून्य]; @deva[कुत्सिते] for @deva[दान]; @deva[सूत्रे] for @deva[तनु]. Also @deva[कुमारीक्रीडनक] (girls' toys) like @deva[कन्दुक] (ball).
"""

id = "5.4.1"
numericId = "54001"

[en]
simple = """
The affix @deva[वुन्] comes after @deva[पाद] (quarter) and @deva[शत] (hundred) when preceded by a numeral in distributive sense, with final deletion. Examples: @deva[द्विपदिकाम्] (two quarters each), @deva[द्विशतिकाम्] (two hundred each).
"""

standard = """
The affix @deva[वुन्] (@deva[अक]) attaches to @deva[पाद] and @deva[शत] preceded by numerals expressing @deva[वीप्सा] (distributive sense—'to each'), with deletion of the final @deva[अ]. By @ref[6.4.130], @deva[पाद्] → @deva[पद्]. Examples: @deva[द्वौ द्वौ पादौ ददाति] = @deva[द्विपदिकां ददाति] (gives two quarters to each); @deva[द्वे द्वे शते ददाति] = @deva[द्विशतिकां ददाति]. The compound is @deva[तद्धितार्थ तत्पुरुष] by @ref[2.1.51].
"""

advanced = """
The explicit @deva[लोप] statement indicates this deletion is not caused by the affix (unlike @ref[6.4.148]), avoiding @deva[स्थानिवद्भाव] by @ref[1.1.57]. This allows @ref[6.4.130] (@deva[पाद्] → @deva[पद्] in @deva[भ]-base) to apply. Process: @deva[द्विपाद] + @deva[वुन्] → @deva[द्विपाद्] + @deva[अक] → @deva[द्विपद्] + @deva[अक] → @deva[द्विपदिक] (by @ref[7.3.44] @deva[अ] → @deva[इ]). The enumeration of @deva[पाद/शत] is illustrative; other words like @deva[मोदक] also apply.
"""

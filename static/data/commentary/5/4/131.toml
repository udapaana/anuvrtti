id = "5.4.131"
numericId = "54131"

[en]
simple = """
@deva[अनङ्] (yielding @deva[अन्]) substitutes for the final of @deva[ऊधस्] (udder) in a feminine @[bahuvrīhi] compound. Examples: @deva[कुण्डोध्नी] (pot-uddered cow), @deva[घटोध्नी] (jar-uddered cow). Masculine: @deva[महोधाः पर्जन्यः].
"""

standard = """
This @[sūtra] prescribes @deva[अनङ्]-substitution for @deva[ऊधस्] (udder) in feminine @[bahuvrīhi]. Thus @deva[कुण्डम् इव ऊधः अस्याः] = @deva[कुण्डोध्नी] (a cow with pot-like udder); @deva[घटोध्नी]. Derivation: @deva[ऊधस्] + @deva[अन्] = @deva[ऊधन्] (@ref[6.4.148]); @deva[ऊधन्] + @deva[ङीष्] = @deva[ऊध्न्] + @deva[ई] (@deva[अ] elided by @ref[6.4.134]) = @deva[ऊध्नी]. Feminine by @deva[ङीष्] (@ref[4.1.25]). No substitution in masculine: @deva[महोधाः पर्जन्यः] (rain-cloud with great udder); @deva[घटोधः धैनुकम्].
"""

advanced = """
The restriction to feminine reflects that udder-compounds typically describe cows (feminine). The @deva[अनङ्] designation includes the @deva[ङ्] for technical reasons while the effective affix is @deva[अन्]. The masculine forms retain @deva[ऊधस्] without substitution, showing gender-conditioned allomorphy.
"""

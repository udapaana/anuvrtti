id = "5.4.160"
numericId = "54160"

[en]
simple = """
The word @deva[निष्प्रवाणि] (cloth freshly taken off the loom) is a special exception — it is formed WITHOUT the suffix @deva[कप्] even though the rules would normally require it. This is a fixed form that must simply be memorized.
"""

standard = """
@[sūtra] @ref[5.4.160] establishes @deva[निष्प्रवाणि] as an exceptional form: the compound @deva[निर्] + @deva[प्रवाणी] (weaving shuttle) forms a @deva[बहुव्रीहि] meaning "cloth from which the shuttle has been removed (i.e., freshly woven cloth)." Despite @deva[प्रवाणी] being a @deva[नदी]-type word (long-@deva[ई] final), @deva[कप्] is NOT added, contrary to @ref[5.4.153].

**Worked example:** @deva[निर्] + @deva[प्रवाणी] → @deva[बहुव्रीहि] "devoid of shuttle" → exceptional: no @deva[कप्] → the @deva[ई] shortens in @[upasarjana] position (@ref[1.2.48]) → @deva[निष्प्रवाणि] + @deva[सु] → @deva[निष्प्रवाणिः] @deva[पटः] "freshly-woven cloth."

The @deva[र्] of @deva[निर्] → @deva[ष्] before @deva[प्] by @ref[8.4.29] and @deva[न→ण] by retroflexion rule.

This @[sūtra] preserves the traditional form of this specific Sanskrit textile term.
"""

advanced = """
@[sūtra] @ref[5.4.160]: @deva[निष्प्रवाणि च] — the word @deva[निष्प्रवाणि] is prescribed as an exceptional form without @deva[कप्], with @deva[च] connecting it to the preceding block of exceptions.

**Etymology of @deva[प्रवाणी]:** From the root @deva[वे] (= @deva[वि]) "to weave" + @deva[ल्युट्] (verbal noun suffix @deva[अन]) + feminine @deva[ई] → @deva[प्रवाणी] (weaving shuttle or loom-beater). The @deva[अन] of @deva[ल्युट्] gives @deva[अण] after @deva[प्र-वे] with @deva[ण]-retroflexion by @ref[8.4.29].

**Why exceptional?** @deva[प्रवाणी] is a @deva[नदी]-type word (ends in long @deva[ई]), so @ref[5.4.153] would normally mandate @deva[कप्] → *@deva[निष्प्रवाणीकः] (or @deva[निष्प्रवाणिकः] after shortening). The traditional form @deva[निष्प्रवाणि] lacks @deva[कप्] entirely. @[pāṇini] codifies this as a @[nipatana] (exceptional listing).

**Phonological analysis of @deva[निष्प्रवाणि]:**
1. @deva[निर्] + @deva[प्रवाणी] → @deva[बहुव्रीहि]
2. @deva[ई] → @deva[इ] by @ref[1.2.48] (@[upasarjana] shortening)
3. @deva[र्] → @deva[ष्] by @ref[8.4.29] (@deva[रः पदान्तस्य] before @deva[प्]) → @deva[निष्प्रवाणि]
4. Nom. sg. + @deva[सु] → @deva[निष्प्रवाणिः]

**Semantic note:** @deva[निष्प्रवाणिः] @deva[पटः] = cloth "without the shuttle" = cloth just removed from the loom, hence "freshly woven cloth" — a specific textile term in Sanskrit technical vocabulary.

**Status as @[nipatana]:** @[pāṇini]'s use of @deva[च] and the specific naming of the form signals that this is a @[siddha] (@[nipatana]) — an irregular form that cannot be derived by rule and must be listed. Commentators (e.g., @[kāśikā]) note this explicitly.
"""

id = "5.4.33"
numericId = "54033"

[en]
simple = """
The affix @deva[कन्] is added to @deva[काल] (dark/black) when referring to either a temporary color or something dyed dark. Examples: @deva[कालकं मुखं वैलक्ष्येण] (face dark with shame), @deva[कालकः पटः] (a blue-black dyed cloth), @deva[कालिका शाटी] (a dark-dyed garment).
"""

standard = """
This @[sūtra] extends the @deva[कन्] affix rules from @deva[लोहित] to @deva[काल], applicable in both senses: temporary color (@deva[वर्णे अनित्ये]) and dyed items (@deva[रक्ते]). Thus @deva[कालकं मुखं वैलक्ष्येण] means 'face darkened with shame or confusion'—a temporary coloring. And @deva[कालकः पटः] means 'a cloth dyed blue-black.' The feminine form is @deva[कालिका शाटी] for a dark-dyed garment.
"""

advanced = """
This @[sūtra] applies both conditions from @ref[5.4.31] (@deva[वर्णे अनित्ये]) and @ref[5.4.32] (@deva[रक्ते]) to @deva[काल]. The term @deva[काल] denotes dark or blue-black color. The dual applicability—transient natural darkening (as from shame) and artificial dyeing—is indicated by understanding both prior conditions. The feminine @deva[कालिका] parallels the @deva[लोहित] derivatives.
"""

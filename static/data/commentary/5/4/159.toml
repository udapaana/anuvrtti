id = "5.4.159"
numericId = "54159"

[en]
simple = """
When a @deva[बहुव्रीहि] compound ends in @deva[नाडी] (channel/tube) or @deva[तन्त्री] (sinew/string) and refers to body parts or organic structures, the suffix @deva[कप्] is NOT added. For example, "a body with many channels" is @deva[बहुनाडिः] @deva[कायः], not *@deva[बहुनाडीकः].
"""

standard = """
@[sūtra] @ref[5.4.159] prohibits @deva[कप्] when the @deva[बहुव्रीहि] compound ends in @deva[नाडी] or @deva[तन्त्री] and the sense pertains to body anatomy (body channels, veins, sinews). This is an exception to @ref[5.4.153] which normally mandates @deva[कप्] for @deva[नदी]-type words.

**Worked example:** @deva[बहु] + @deva[नाडी] (body-channels sense) → @deva[बहुव्रीहि] → no @deva[कप्] → @deva[बहुनाडी] → but the final @deva[ई] shortens in @[upasarjana] position by @ref[1.2.48] → @deva[बहुनाडिः] @deva[कायः] "a body with many channels."

When NOT meaning body parts: @deva[बहु] + @deva[नाडी] (flute/pipe sense) → + @deva[कप्] by @ref[5.4.153] → @deva[बहुनाडीकः] @deva[स्तम्भः] "a pillar with many pipes."

The semantic distinction (body vs. non-body) is the determining factor.
"""

advanced = """
@[sūtra] @ref[5.4.159]: @deva[नाडीतन्त्र्योश्च] — @deva[कप्] is not added after @deva[बहुव्रीहि] ending in @deva[नाडी] or @deva[तन्त्री]. This is another exception to @ref[5.4.153].

**Conditioning sense:** The prohibition applies specifically when @deva[नाडी] and @deva[तन्त्री] denote anatomical structures (bodily channels, sinews, veins). When these words refer to non-anatomical objects (musical strings, reeds, pipes), @ref[5.4.153] applies and @deva[कप्] is added.

**Interaction with @ref[1.2.48]** (@deva[उपसर्जनस्य]): In @deva[बहुव्रीहि], the final @deva[नदी]-word is @[upasarjana] (secondary member). The @deva[ई] of @deva[नाडी] and @deva[तन्त्री] therefore shortens to @deva[इ] → @deva[बहुनाडि], @deva[बहुतन्त्रि]. Case endings are then added to these short-@deva[इ]-stems.

**Forms:**
- @deva[बहुनाडिः] @deva[कायः] — body with many @[nāḍī-channels] (no @deva[कप्], @deva[ई]→@deva[इ] by @ref[1.2.48])
- @deva[बहुतन्त्रिः] @deva[देहः] — body with many sinews (same pattern)
- @deva[बहुनाडीकः] @deva[वेणुः] — flute with many channels (non-body, @deva[कप्] by @ref[5.4.153])
- @deva[बहुतन्त्रीकः] @deva[वीणा] — lute with many strings (non-body, @deva[कप्] applies)

**Lexical note on @deva[नाडी]:** The word means both (1) bodily channel/vein (in @[āyurveda] and yoga contexts) and (2) a tube or pipe. The former triggers this prohibition; the latter falls under @ref[5.4.153].

**@deva[तन्त्री]:** Means both sinew/tendon (body) and musical string (instrument). Same semantic split applies.
"""

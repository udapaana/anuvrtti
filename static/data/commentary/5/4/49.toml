id = "5.4.49"
numericId = "54049"

[en]
simple = """
The affix @deva[तसि] is optionally added to a genitive case (6th) denoting a disease when the meaning is 'curing that disease.' Example: @deva[प्रवाहिकातः प्रतीकारं कुरु] = @deva[प्रवाहिकायाः प्रतीकारं कुरु] (make a remedy for dysentery).
"""

standard = """
This @[sūtra] prescribes optional @deva[तसि] after a genitive denoting a @deva[रोग] (disease) when @deva[अपनयन] (healing, curing) is meant. Thus @deva[प्रवाहिकायाः प्रतीकारं कुरु] = @deva[प्रवाहिकातः कुरु] (make a remedy for dysentery). Similarly @deva[छर्दिकातः कुरु] (cure the vomiting). The condition requires the sense of healing: @deva[प्रवाहिकायाः प्रकोपनं कुरु] (aggravate the dysentery) does not qualify.
"""

advanced = """
The dual conditions—@deva[रोग] (disease) and @deva[अपनयन] (removal/healing)—must both be present. The genitive expresses the disease being treated. When the action is @deva[प्रकोपन] (aggravation) rather than @deva[अपनयन] (curing), the transformation is blocked. This reflects the positive therapeutic context required for the affix.
"""

id = "5.4.86"
numericId = "54086"

[en]
simple = """
The affix @deva[अच्] is added to @deva[अङ्गुलि] (finger/finger-breadth) in a @[tatpuruṣa] compound when preceded by a numeral or indeclinable. Examples: @deva[द्व्यङ्गुलम्] (two finger-breadths), @deva[त्र्यङ्गुलम्], @deva[निरङ्गुलम्] (without fingers).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[अङ्गुलि] in @[tatpuruṣa] compounds when preceded by a numeral or indeclinable. Thus @deva[द्वे अङ्गुली प्रमाणमस्य] = @deva[द्व्यङ्गुलम्] (measuring two finger-breadths). Compounding by @ref[2.1.51]. These are @[taddhitārtha] compounds where the @deva[मात्रच्] affix denoting measure is elided (@[vārttika] to @ref[5.2.37]). With indeclinables: @deva[निर्गतम् अङ्गुलिभ्यः] = @deva[निरङ्गुलम्], @deva[अत्यङ्गुलिः पुरुषः]. @[non-tatpuruṣa]: @deva[पञ्चाङ्गुलिः] (@[bahuvrīhi])—no affix.
"""

advanced = """
The @deva[तत्पुरुष] condition is essential. @deva[द्व्यङ्गुलम्] is a measurement compound (how many finger-breadths), while @deva[पञ्चाङ्गुलिः] (five-fingered) is @[bahuvrīhi] describing someone with five fingers. The @[vārttika] @deva[प्रमाणे लो द्विगोर्नित्यम्] teaches obligatory elision of @deva[मात्रच्] in Dvigu compounds denoting measure. The @deva[तत्पुरुष] specification continues through @ref[5.4.106].
"""

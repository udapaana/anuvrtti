id = "5.4.149"
numericId = "54149"

[en]
simple = """
The final @deva[द] of @deva[काकुद] (palate) is optionally elided in a @[bahuvrīhi] compound when preceded by @deva[पूर्ण] (full). Examples: @deva[पूर्णकाकुत्] or @deva[पूर्णकाकुदः] (with full palate).
"""

standard = """
This @[sūtra] prescribes optional @deva[द]-elision from @deva[काकुद] when preceded by @deva[पूर्ण]. Thus @deva[पूर्णं काकुदम् अस्य] = @deva[पूर्णकाकुत्] or @deva[पूर्णकाकुदः] (having a full/complete palate). This provides optionality where @ref[5.4.148] was obligatory.
"""

advanced = """
The @deva[विभाषा] for @deva[पूर्ण] contrasts with the obligatory elision after @deva[उद्/वि] in @ref[5.4.148]. This suggests @deva[पूर्णकाकुद] was common enough in usage to warrant preserving both forms. The optionality may reflect dialectal or stylistic variation.
"""

id = "5.4.116"
numericId = "54116"

[en]
simple = """
The affix @deva[अप्] is added at the end of a @[bahuvrīhi] compound ending in a feminine ordinal numeral or @deva[प्रमाणी] (authority/witness). Examples: @deva[कल्याणीपञ्चमा रात्रयः] (nights whose fifth is auspicious), @deva[स्त्रीप्रमाणाः कुटुम्बिनः] (householders having a woman as authority).
"""

standard = """
This @[sūtra] prescribes @deva[अप्] after @[bahuvrīhi] compounds ending in feminine ordinal numerals (@deva[पूरणी], from @ref[5.2.48] ff.) or @deva[प्रमाणी] (witness/authority). Thus @deva[कल्याणा पञ्चमी आसां रात्रीणाम्] = @deva[कल्याणीपञ्चमा रात्रयः] (nights whose fifth is auspicious). @deva[स्त्री प्रमाणी एषाम्] = @deva[स्त्रीप्रमाणाः कुटुम्बिनः] (householders having a woman as authority, @deva[आर्याप्रधानाः]). @[vārttikas] add: (1) @deva[अप्] applies when ordinal is @deva[प्रधान]; (2) @deva[अप्] after @deva[नेतृ] with asterism names (@deva[मृगनेत्रा रात्रयः]); (3) @deva[अप्] after @deva[नेतृ] in Vedas (@deva[बृहस्पतिनेत्रा देवाः]); (4) @deva[टच्] after @deva[मास] with wage-ordinal (@deva[पञ्चकमासिकः]).
"""

advanced = """
The @deva[पूरणी]-condition requires the ordinal to be in feminine form and function as principal (@deva[प्रधान]) in the @[bahuvrīhi]. The @[vārttika] clarifying @deva[प्रधान]-status notes that @deva[पुंवद्भाव] (@ref[6.3.24]) prohibition also applies. The @deva[नेतृ] extensions (asterism-leader and Vedic contexts) and the @deva[मास] + wage-ordinal rule show the scope of similar patterns.
"""

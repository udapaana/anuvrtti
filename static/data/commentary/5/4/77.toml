id = "5.4.77"
numericId = "54077"

[en]
simple = """
This @[sūtra] lists 25 irregular formations with affix @deva[अच्]. Examples include: @deva[अचतुरः] (lacking four), @deva[स्त्रीपुंसौ] (man and woman), @deva[धेन्वनडुहौ] (cow and bull), @deva[ऋक्सामे] (@[ṛk] and @[sāman]), @deva[रात्रिंदिवम्] (night and day), @deva[जातोक्षः] (newborn bull).
"""

standard = """
This @[sūtra] lists irregular compounds taking @deva[अच्]: (1-3) @[bahuvrīhis]: @deva[अचतुरः] (whose four are absent), @deva[विचतुरः] (whose four are gone), @deva[सुचतुरः] (whose four are good). (4-14) Dvandvas: @deva[स्त्रीपुंसौ], @deva[धेन्वनडुहौ], @deva[ऋक्सामे], @deva[वाङ्मनसे], @deva[अक्षिभ्रुवम्] (singular by @ref[2.4.2] as body parts), @deva[दारगवम्], @deva[ऊर्वष्ठीवम्], @deva[पदष्ठीवम्], @deva[नक्तंदिवम्], @deva[रात्रिंदिवम्], @deva[अहर्दिवम्] (distributive: day by day). (15-16) @[avyayībhāvas]: @deva[सरजसम्] (completely), @deva[उपशुनम्] (near the dog). (17-20) @[tatpuruṣas]: @deva[निःश्रेयसम्], @deva[पुरुषायुषम्], @deva[द्व्यायुषम्], @deva[त्र्यायुषम्], @deva[ऋग्यजुषम्]. (21-23) @[karmadhārayas]: @deva[जातोक्षः], @deva[महोक्षः], @deva[वृद्धोक्षः]. (24-25) @deva[गोष्ठश्वः] (Locative @[tatpuruṣa]). A @[vārttika] adds @deva[त्रिचतुराः], @deva[उपचतुराः].
"""

advanced = """
Each compound type has specific counter-examples where @deva[अच्] doesn't apply. @deva[स्त्रीपुमान्] (brave towards women) is @[tatpuruṣa], not Dvandva. @deva[सरजः पङ्कजम्] (lotus with pollen) is @[bahuvrīhi], not @[avyayībhāva]. @deva[निश्रेयस्कः पुरुषः] uses @deva[क] affix. @deva[पुरुषायुषी] is Dvandva (man and lifespan together). @deva[द्व्यायुः]/deva[@deva[त्र्यायुः]] are @[non-samāhāra] Dvigus. @deva[जातोक्षा ब्राह्मणाः] is @[bahuvrīhi]. @deva[उपशुनम्] shows irregular non-elision of @deva[टि] and @deva[सम्प्रसारण] of @deva[श्वन्] to @deva[शुन्].
"""

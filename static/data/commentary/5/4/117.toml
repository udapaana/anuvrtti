id = "5.4.117"
numericId = "54117"

[en]
simple = """
The affix @deva[अप्] is added to @deva[लोमन्] (hair/fur) at the end of a @[bahuvrīhi] compound when preceded by @deva[अन्तर्] or @deva[बहिस्]. Examples: @deva[अन्तर्लोमः प्रावारः] (a cloak with fur inside), @deva[बहिर्लोमः पटः] (cloth with hair outside).
"""

standard = """
This @[sūtra] prescribes @deva[अप्] after @deva[लोमन्] in @[bahuvrīhi] when preceded by @deva[अन्तर्] (inside) or @deva[बहिस्] (outside). Thus @deva[अन्तर्गतानि लोमानि अस्य] = @deva[अन्तर्लोमः प्रावारः] (a cloak/blanket with the hairy surface facing inward). Similarly @deva[बहिर्लोमः पटः] (cloth with hair on the outside). These describe textile orientation.
"""

advanced = """
The @deva[अन्तर्/बहिस्] prefixes indicate the position of the hairy surface. The @[bahuvrīhi] structure describes possessive attribution: 'that which has its hair inside/outside.' The @deva[अप्] affix (yielding @deva[अ]) replaces the @deva[अन्]-ending of @deva[लोमन्].
"""

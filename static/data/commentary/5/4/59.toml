id = "5.4.59"
numericId = "54059"

[en]
simple = """
The affix @deva[डाच्] is added to numerals followed by @deva[गुण] when meaning 'to plough that many times.' Examples: @deva[द्विगुणा करोति क्षेत्रम्] (ploughs the field twice), @deva[त्रिगुणा करोति] (ploughs thrice).
"""

standard = """
This @[sūtra] prescribes @deva[डाच्] after numerals compounded with @deva[गुण] when the meaning is @deva[कृष] (ploughing). The verb @deva[कृ] is understood. Thus @deva[द्विगुणा करोति क्षेत्रम्] = @deva[द्विगुणं विलेखनं करोति क्षेत्रस्य] (ploughs the field twice). Similarly @deva[त्रिगुणा करोति] (ploughs thrice). The ploughing sense is essential: @deva[द्विगुणां करोति रज्जुम्] (doubles the rope) doesn't qualify.
"""

advanced = """
The @deva[कृष] condition continues from the previous @[sūtra]. The numeral + @deva[गुण] compound indicates multiplicative ploughing—how many times the field is worked. Without the agricultural context, the same compound has its ordinary meaning (doubling, tripling) and @deva[डाच्] doesn't apply. The verb @deva[कृ] is carried forward by @[anuvṛtti].
"""

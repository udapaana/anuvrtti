id = "5.4.4"
numericId = "54004"

[en]
simple = """
The affix @deva[कन्] comes after @deva[क्त]-participles (past passive) when the action is not fully completed. Examples: @deva[भिन्नकः] (not wholly divided), @deva[छिन्नकः] (not wholly cut).
"""

standard = """
The affix @deva[कन्] attaches to @deva[क्तान्त] (past participles) expressing @deva[अनत्यन्तगति] (action not fully accomplished/incomplete). Examples: @deva[भिन्न] + @deva[कन्] → @deva[भिन्नकः] (not completely divided); @deva[छिन्नकः] (not completely cut). Without @deva[कन्]: @deva[भिन्नम्] (totally divided), @deva[छिन्नम्] (totally cut).
"""

advanced = """
The @deva[अनत्यन्तगति] (incomplete action) sense triggers @deva[कन्] after @deva[क्त]-participles. @deva[अत्यन्तगति] = fully accomplished; @deva[अनत्यन्तगति] = not fully accomplished. The @deva[कन्] signals partial completion. This is distinct from @deva[स्वार्थ कन्] (which doesn't change meaning).
"""

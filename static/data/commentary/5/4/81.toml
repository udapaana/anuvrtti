id = "5.4.81"
numericId = "54081"

[en]
simple = """
The affix @deva[अच्] is added to @deva[रहस्] (secret/solitude) when preceded by @deva[अनु], @deva[अव], or @deva[तप्त]. Examples: @deva[अनुरहसम्] (in secret/privately), @deva[अवरहसम्] (secretly), @deva[तप्तरहसम्] (heated secret/passion).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[रहस्] (secret, solitude) when preceded by @deva[अनु], @deva[अव], or @deva[तप्त]. Thus @deva[अनुरहसम्], @deva[अवरहसम्], and @deva[तप्तरहसम्]. These are typically @[avyayībhāva] compounds used adverbially to mean 'in secret' or 'privately.'
"""

advanced = """
The word @deva[रहस्] means 'secret,' 'solitude,' or 'private place.' The prefixes modify this: @deva[अनु] (following/according to), @deva[अव] (down/away), and @deva[तप्त] (heated/intense). @deva[अनुरहसम्] and @deva[अवरहसम्] function as adverbs meaning 'secretly' or 'in private.' @deva[तप्तरहसम्] may refer to intense or passionate secrets.
"""

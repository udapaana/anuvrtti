id = "5.4.35"
numericId = "54035"

[en]
simple = """
The affix @deva[ठक्] is added to @deva[वाच्] (speech) when referring to a verbal message spoken by another. Example: @deva[वाचिकं कथयति] (he relates the verbal message). Without this sense: @deva[मधुरा वाक् देवदत्तस्य] (the speech of Devadatta is sweet).
"""

standard = """
This @[sūtra] teaches that @deva[ठक्] is added to @deva[वाच्] when the meaning is @deva[व्याहृतार्थ]—a message or communication expressed by one person and conveyed by another. Thus @deva[वाचिकम्] means 'a verbal message' or 'tiding.' The condition is that it refers to something previously spoken by another and now being relayed. Some authorities extend this to written messages as well. When @deva[वाच्] simply means 'speech' without this messenger sense, the affix does not apply, as in @deva[मधुरा वाक् देवदत्तस्य] (Devadatta's speech is sweet).
"""

advanced = """
The technical term @deva[व्याहृतार्थ] specifies the semantic condition: speech that was 'declared, expressed' (@deva[व्याहृत]) by one party and is being communicated as a message or news by a third party. The derivative @deva[वाचिक] thus specifically denotes a 'verbal message' or 'oral communication being relayed.' The extension to written messages (@deva[लिखितम्]) by some grammarians reflects practical usage. The counter-example @deva[मधुरा वाक्] shows that mere attribution of speech quality does not trigger the affix.
"""

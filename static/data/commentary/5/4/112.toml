id = "5.4.112"
numericId = "54112"

[en]
simple = """
According to grammarian Senaka, the affix @deva[टच्] is optionally added to an @[avyayībhāva] compound ending in @deva[गिरि] (mountain). Examples: @deva[अन्तर्गिरम्] or @deva[अन्तर्गिरि], @deva[उपगिरम्] or @deva[उपगिरि].
"""

standard = """
This @[sūtra] attributes to grammarian Senaka the optional @deva[टच्] after @deva[गिरि] (mountain) in @[avyayībhāva] compounds. Thus @deva[अन्तर्गिरम्] or @deva[अन्तर्गिरि], @deva[उपगिरम्] or @deva[उपगिरि]. Senaka's name is mentioned for respect (@deva[पूजार्थ]), since @deva[अन्यतरस्याम्] (optionality) was already understood from context.
"""

advanced = """
The citation of Senaka reflects the tradition of acknowledging individual grammarians' contributions. The optionality (@deva[विभाषा]) was already flowing from previous @[sūtras], making Senaka's explicit mention honorific rather than technically necessary. @deva[गिरि] is an @deva[इ]-stem, so the @deva[टच्] form shows @deva[इ] → @deva[अ].
"""

id = "5.4.111"
numericId = "54111"

[en]
simple = """
The affix @deva[टच्] is optionally added to an @[avyayībhāva] compound ending in a @deva[झय्] (mute consonant). Examples: @deva[उपसमिधम्] or @deva[उपसमित्], @deva[उपदृषदम्] or @deva[उपदृषत्].
"""

standard = """
This @[sūtra] prescribes optional @deva[टच्] after @[avyayībhāva] compounds ending in a @deva[झय्]-class consonant (all mute consonants). Thus @deva[उपसमिधम्] or @deva[उपसमित्], @deva[उपदृषदम्] or @deva[उपदृषत्]. Without @deva[टच्], the word retains its original consonant ending.
"""

advanced = """
The @deva[झय्] @[pratyāhāra] includes all 25 stops (mutes): @deva[क्]-class through @deva[प्]-class. This creates a broad optional rule for consonant-final @[avyayībhāvas]. Note that @ref[5.4.107] (@deva[शरदादि]) makes @deva[टच्] obligatory for its @[gaṇa] members even though they end in @deva[झय्], overriding this optionality.
"""

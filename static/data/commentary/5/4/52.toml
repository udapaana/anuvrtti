id = "5.4.52"
numericId = "54052"

[en]
simple = """
The affix @deva[साति] may optionally replace @deva[च्वि] when something is completely transformed into something else. Examples: @deva[अग्निसात् भवति शस्त्रम्] (the weapon becomes entirely fire), @deva[उदकसात् भवति लवणम्] (the salt becomes entirely water).
"""

standard = """
This @[sūtra] provides the optional affix @deva[साति] in place of @deva[च्वि] when the transformation is @deva[कृत्स्न] (complete, total). The condition @deva[अभूततद्भाव] with verbs @deva[कृ], @deva[भू], @deva[अस्] continues. Thus @deva[अग्निसात् भवति शस्त्रम्] or @deva[अग्नी भवति शस्त्रम्] (the weapon becomes entirely fire). Similarly @deva[उदकसात् भवति लवणम्] or @deva[उदकी भवति लवणम्] (salt dissolves completely into water). The optionality follows the @deva[महाविभाषा] of @ref[4.1.82].
"""

advanced = """
The term @deva[कृत्स्न] specifies that one individual thing is transformed in all its parts. Compare with @deva[अभिविधि] in the next @[sūtra], which covers many things partially transformed. @deva[साति] and @deva[च्वि] are interchangeable here; both express complete transformation of a single object. The optional alternation is governed by the @deva[महाविभाषा] principle from @ref[4.1.82] (referenced via @ref[5.3.1]).
"""

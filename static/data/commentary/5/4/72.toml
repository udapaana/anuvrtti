id = "5.4.72"
numericId = "54072"

[en]
simple = """
For @deva[पथिन्] (path) preceded by @deva[नञ्] in a @[tatpuruṣa] compound, the @deva[समासान्त] affix is OPTIONAL. Results: @deva[अपथम्] or @deva[अपन्थाः].
"""

standard = """
This @[sūtra] provides an option where the previous rule would have required omission. For @deva[न] + @deva[पथिन्] in @[tatpuruṣa], both forms are allowed: @deva[अपथम्] (with @deva[अ] by @ref[5.4.74]) or @deva[अपन्थाः] (without the affix, showing the @deva[नञ्]-@[tatpuruṣa] form by @ref[2.4.30]). This is an exception to the categorical prohibition in @ref[5.4.71].
"""

advanced = """
The @deva[विभाषा] (option) here creates a paradigm where @deva[अपथम्] shows the @[samāsānta] @deva[अ] applied (@ref[5.4.74]), while @deva[अपन्थाः] shows the bare stem-form preserved per @ref[2.4.30] (which teaches stem-forms of @deva[पथिन्] in compounds). Both are grammatically valid for @deva[न] + @deva[पथिन्] @[tatpuruṣa], unlike @deva[राजन्] etc. where @ref[5.4.71] categorically blocks the affix.
"""

id = "5.4.89"
numericId = "54089"

[en]
simple = """
The substitution of @deva[अह्न] for @deva[अहन्] does NOT occur when a numeral forms a collective (@[samāhāra]) compound meaning a group of days. Examples: @deva[द्व्यहः] (a period of two days), @deva[त्र्यहः] (a three-day period). But: @deva[द्व्यह्नः] (relating to two days).
"""

standard = """
This @[sūtra] prohibits @deva[अह्न]-substitution in @[samāhāra-tatpuruṣa] (collective) compounds with numerals. Thus @deva[द्वे अहनी समाहृते] = @deva[द्व्यहः] (a two-day period as a unit), @deva[त्र्यहः]. Here @ref[5.4.91] applies directly. When the meaning is 'relating to/occurring in two days' (@[taddhitārtha] Dvigu): @deva[द्वयोः अह्नोः भवः] = @deva[द्व्यह्नः], @deva[त्र्यह्नः]—formed by @ref[1.1.5] with @deva[अण्] elided by @ref[4.1.88] and final @deva[अन्] elided by @ref[6.4.145].
"""

advanced = """
The distinction is between @deva[समाहार] (collective unity: 'a two-day period') and @deva[तद्धितार्थ] (adjectival: 'pertaining to two days'). In @deva[द्व्यहः], the two days are viewed as a single unit; in @deva[द्व्यह्नः], the reference is to something occurring across or relating to two days. This semantic distinction triggers different derivational paths and different final forms.
"""

id = "5.4.84"
numericId = "54084"

[en]
simple = """
The words @deva[द्विस्तावा] and @deva[त्रिस्तावा] are irregular formations meaning an altar (@deva[वेदि]) twice or thrice the normal size. But for other objects: @deva[द्विस्तावती रज्जुः] (a rope twice as long).
"""

standard = """
This @[sūtra] teaches irregular formations @deva[द्विस्तावा] and @deva[त्रिस्तावा] with @deva[अच्] and @deva[टि]-elision, specifically for altars (@deva[वेदि]). These are compounds of @deva[द्विः]/deva[@deva[त्रिः]] (twice/thrice) + @deva[तावत्] (as much). Thus @deva[द्विस्तावा वेदिः] (an altar twice the standard size) and @deva[त्रिस्तावा वेदिः] (thrice). When not referring to altars: @deva[द्विस्तावती रज्जुः], @deva[त्रिस्तावती रज्जुः] (a rope twice/thrice as long)—regular formation.
"""

advanced = """
The restriction @deva[वेदौ] (when referring to an altar) limits this irregular formation to ritual contexts. The @deva[टि]-elision removes the final portion of @deva[तावत्]. For non-altar referents, the regular feminine @deva[तावती] is used. This reflects the special treatment of ritual terminology in Sanskrit grammar.
"""

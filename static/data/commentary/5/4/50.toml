id = "5.4.50"
numericId = "54050"

[en]
simple = """
The affix @deva[च्वि] is added when something becomes what it was not before, used with verbs @deva[कृ] (make), @deva[भू] (become), or @deva[अस्] (be). Example: @deva[शुक्ली करोति] = makes white (something that was not white becomes white).
"""

standard = """
This @[sūtra] teaches @deva[च्वि] when expressing @deva[अभूततद्भाव]—becoming what the thing previously was not. The affix applies when the @deva[सम्पाद्य कर्ता] (the agent that attains the new state) is involved, with verbs @deva[कृ], @deva[भू], or @deva[अस्]. Thus @deva[अशुक्लः शुक्लः सम्पद्यते] → @deva[शुक्ली करोति] (he whitens—makes something that was not white become white). Formation: @deva[शुक्ल] + @deva[च्वि] → @deva[शुक्ली] (by @ref[7.4.32], @deva[अ] → @deva[ई]; by @ref[6.1.67], affix elision). Similarly @deva[घटी करोति मृदम्] (makes clay into a pot).
"""

advanced = """
The term @deva[अभूततद्भाव] (attaining a state that was not before) is from the @[vārttikakāra], incorporated by @[kāśikā]. The @deva[सम्पाद्य कर्ता] condition specifies that the transformation must apply to the agent of attainment, not other @[kārakas]. Thus @deva[अदेवगृहे देवगृहे भवति] (a tree becoming in a temple where it wasn't) doesn't take @deva[च्वि] because the locative, not the agent, undergoes the 'becoming.' Without expressed object: @deva[शुक्लं करोति] (he makes white) doesn't apply because the transformed entity isn't specified.
"""

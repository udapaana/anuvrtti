id = "5.4.83"
numericId = "54083"

[en]
simple = """
The word @deva[अनुगवम्] is irregularly formed, meaning 'suited to the length of cows/oxen.' Example: @deva[अनुगवं यानम्] (a chariot suited to the oxen's length). But: @deva[गवां पश्चात्] = @deva[अनुगु] (behind the cows).
"""

standard = """
This @[sūtra] teaches the irregular formation @deva[अनुगवम्] with @deva[अच्], meaning 'suited to the length' (@deva[प्रमाण]) of cows or oxen. The compound is formed by @ref[2.1.16]. Thus @deva[अनुगवं यानम्] means 'a chariot whose dimensions suit the length of the draft oxen.' When the meaning is 'behind the cows' (not length): @deva[गवां पश्चात्] = @deva[अनुगु]—the affix doesn't apply.
"""

advanced = """
The condition @deva[प्रमाणे] (in the sense of measure/length) restricts this formation. @deva[अनुगव] specifically refers to proportional sizing—a vehicle dimensioned to match its draft animals. The alternative formation @deva[अनुगु] (following/behind cows) without @deva[अच्] shows the positional rather than proportional meaning. The @ref[2.1.16] reference indicates the compounding rule for proportional expressions.
"""

id = "5.4.53"
numericId = "54053"

[en]
simple = """
The affix @deva[साति] is used with the verb @deva[सम्पद्] (and also @deva[कृ], @deva[भू], @deva[अस्]) when all things of a kind are transformed, even partially. Example: @deva[सर्वं शस्त्रम् अग्निसात् सम्पद्यते] (all weapons become fire).
"""

standard = """
This @[sūtra] prescribes @deva[साति] when the meaning is @deva[अभिविधि] (pervasion)—all things of a similar kind undergoing transformation, even if only partially. The verb @deva[सम्पद्] is specifically mentioned, but @deva[कृ], @deva[भू], @deva[अस्] also apply via @deva[च]. Thus @deva[अस्यां सेनायाम् उत्पातेन सर्वं शस्त्रम् अग्निसात् सम्पद्यते] (all weapons in this army become fire due to the portent). By @deva[विभाषा], @deva[च्वि] can also be used with @deva[कृ/भू/अस्], but not with @deva[सम्पद्].
"""

advanced = """
The distinction between @deva[कार्त्स्न्य] (@ref[5.4.52]) and @deva[अभिविधि] (this @[sūtra]): @deva[कार्त्स्न्य] = one object transformed completely in all parts; @deva[अभिविधि] = all objects of a class (@deva[प्रकारकार्त्स्न्य]) transformed, even partially. Example: all weapons (@deva[सर्वं शस्त्रम्])—swords, lances, etc.—catching fire represents @deva[अभिविधि]. @deva[च्वि] may substitute for @deva[साति] via @deva[विभाषा], but only with @deva[कृ/भू/अस्], not @deva[सम्पद्].
"""

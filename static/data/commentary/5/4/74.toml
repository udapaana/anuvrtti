id = "5.4.74"
numericId = "54074"

[en]
simple = """
The affix @deva[अ] is added to @deva[ऋच्], @deva[पुर्], @deva[अप्], @deva[धुर्], and @deva[पथिन्] when they are final in a compound—but not to @deva[धुर्] when combined with @deva[अक्ष]. Examples: @deva[बह्वृचः], @deva[ललाटपुरम्], @deva[द्वीपम्], @deva[राजधुरा], @deva[जलपथः].
"""

standard = """
This @[sūtra] prescribes @[samāsānta] @deva[अ] after five words in compound-final position. @deva[ऋच्]: @deva[अनृचः], @deva[बह्वृचः], @deva[अर्द्धर्चः]. @deva[पुर्]: @deva[ललाटपुरम्], @deva[नान्दीपुरम्]. @deva[अप्]: @deva[द्वीपम्] (from @deva[द्वि] + @deva[अप्], with @deva[ई] by @ref[6.3.97]), @deva[अन्तरीपम्], @deva[समीपम्]. @deva[धुर्]: @deva[राजधुरा], @deva[महाधुरा]. @deva[पथिन्]: @deva[जलपथः]. Exception: @deva[अक्ष] + @deva[धुर्] = @deva[अक्षधूः] (not @deva[अक्षधुरा]), @deva[दृढधूरक्षः]. Note: @deva[अनृचः]/deva[@deva[बह्वृचः]] apply to @[ṛg] Veda students; for Vedic text reference, no affix: @deva[अनृक् साम], @deva[बह्वृक् सूक्तम्].
"""

advanced = """
The @deva[अनक्षे] condition specifically restricts @deva[धुर्]—the axle-element in @deva[अक्षधूः] blocks @[samāsānta]. The @deva[ऋच्] restriction (students vs. Vedic texts) shows semantic differentiation: @deva[बह्वृचः] for a person who has studied many @[ṛk] verses, but @deva[बह्वृक् सूक्तम्] for a hymn with many verses. This @[sūtra] applies to all compound types, not just @[bahuvrīhi] (unlike @ref[5.4.73]).
"""

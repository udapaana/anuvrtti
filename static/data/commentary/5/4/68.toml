id = "5.4.68"
numericId = "54068"

[en]
simple = """
This @[sūtra] begins the section on @deva[समासान्त] (compound-final) affixes. These affixes are added to the end of compounds without changing their meaning.
"""

standard = """
This is an @deva[अधिकार] (governing) @[sūtra] that extends to the end of this chapter. It teaches that certain affixes become the final portion of compounds (@deva[समासान्त]). These affixes complete the formation of @[avyayībhāva], Dvigu, Dvandva, @[tatpuruṣa], and @[bahuvrīhi] compounds. Example: @deva[उप] + @deva[राजन्] = @deva[उपराजन्]; adding @deva[डच्] (@ref[5.4.108]) gives @deva[उपराज], then @deva[अम्] (@ref[2.4.83]) yields @deva[उपराजम्]. Similarly @deva[द्विपुरी], @deva[त्रिपुरी] (with @deva[अ] by @ref[5.4.74], then @deva[ङीप्] by @ref[4.1.21]).
"""

advanced = """
The term @deva[समासान्त] ('compound-final') indicates these affixes complete compound formation—without them, technical designations like @[avyayībhāva] or Dvigu don't fully apply. The word @deva[अन्त] in the @[sūtra] specifies that when rules mention compound types, they presuppose the @[samāsānta] affix is already added. Thus @ref[4.1.21] (feminine @deva[ई] for Dvigu in @deva[अ]) applies to @deva[द्विधुरः] (already having @deva[अ] from @ref[5.4.74]), not to bare @deva[द्विधुर्] which ends in @deva[र्]. Examples span all compound types: @[tatpuruṣa] @deva[विधुरः], @deva[प्रधुरः]; @[bahuvrīhi] @deva[उचैर्धुरः], @deva[नीचैर्धुरः] with appropriate accent patterns.
"""

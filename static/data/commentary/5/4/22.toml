id = "5.4.22"
numericId = "54022"

[en]
simple = """
When the thing 'made of' or 'abounding in' is a multitude, collective affixes (@ref[4.2.37] etc.) can also be used alongside @deva[मयट्]. Examples: @deva[मौदकिकम्] or @deva[मोदकमयम्] (made of sweets/abounding in sweets).
"""

standard = """
When @deva[समूह] (multitude) is the base, both @deva[समूह]-affixes (@ref[4.2.37] ff.) and @deva[मयट्] can express @deva[प्रकृत] sense. The @deva[चकार] includes @deva[मयट्]. Examples: @deva[मोदकाः प्रकृताः] = @deva[मौदकिकम्] (@ref[4.2.47]) or @deva[मोदकमयम्]; @deva[शाष्कुलिकम्] or @deva[शष्कुलीमयम्]. Also: @deva[मौदकिको यज्ञः] or @deva[मोदकमयो यज्ञः] (feast abounding in sweets).
"""

advanced = """
This extends @deva[प्रकृत]-meaning to @deva[समूहार्थ] affixes from @ref[4.2.37]. When the base denotes a collective, both @deva[समूह]-affixes and @deva[मयट्] apply with identical meaning. The @deva[चकार] signals @deva[मयट्] also remains available.
"""

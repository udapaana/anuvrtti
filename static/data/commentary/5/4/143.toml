id = "5.4.143"
numericId = "54143"

[en]
simple = """
@deva[दत्] substitutes for @deva[दन्त] in a feminine @[bahuvrīhi] compound when it's a proper name. Examples: @deva[अयोदती] (iron-toothed, a name), @deva[फालदती] (plough-toothed, a name). But: @deva[समदन्ती], @deva[स्निग्धदन्ती] (not names).
"""

standard = """
This @[sūtra] prescribes @deva[दत्]-substitution for @deva[दन्त] in feminine @[bahuvrīhi] when the compound is a @deva[संज्ञा] (proper name). Thus @deva[अयोदती] (iron-toothed, a name), @deva[फालदती] (plough-toothed, a name). Without name-status: @deva[समदन्ती] (even-toothed), @deva[स्निग्धदन्ती] (smooth-toothed)—these are descriptive, not names, so retain @deva[दन्त].
"""

advanced = """
The @deva[स्त्रियां संज्ञायाम्] condition combines gender (feminine) and semantic status (name). This allows @deva[दत्] in personal names for women/female beings, preserving the distinctive @deva[दती] form. Descriptive adjectives (not functioning as names) retain @deva[दन्ती].
"""

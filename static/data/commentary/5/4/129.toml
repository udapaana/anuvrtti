id = "5.4.129"
numericId = "54129"

[en]
simple = """
@deva[ज्ञु] is substituted for @deva[जानु] (knee) in a @[bahuvrīhi] compound when preceded by @deva[प्र] or @deva[सम्]. Examples: @deva[प्रज्ञुः] (with prominent knees), @deva[संज्ञुः] (with joined knees).
"""

standard = """
This @[sūtra] prescribes @deva[ज्ञु]-substitution for @deva[जानु] in @[bahuvrīhi] when preceded by @deva[प्र] or @deva[सम्]. Thus @deva[प्रकृष्टे जानुनी अस्य] = @deva[प्रज्ञुः] (having prominent/extended knees). Similarly @deva[संज्ञुः] (having joined knees). This is obligatory with these prefixes.
"""

advanced = """
The @deva[जानु] → @deva[ज्ञु] substitution involves significant phonological reduction. The prefixes @deva[प्र] (forth, prominent) and @deva[सम्] (together) specifically trigger this change. The resulting forms are more compact than the unsubstituted alternatives would be.
"""

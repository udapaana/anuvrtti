id = "5.4.133"
numericId = "54133"

[en]
simple = """
When the @[bahuvrīhi] compound with @deva[धनुस्] is a name (@deva[संज्ञा]), the @deva[अनङ्]-substitution is optional. Examples: @deva[शतधनुः] or @deva[शतधन्वा], @deva[दृढधनुः] or @deva[दृढधन्वा].
"""

standard = """
This @[sūtra] provides optionality for @deva[अनङ्]-substitution when the @deva[धनुस्]-@[bahuvrīhi] is a proper name. Thus @deva[शतधनुः] or @deva[शतधन्वा] (hundred-bowed, a name), @deva[दृढधनुः] or @deva[दृढधन्वा] (firm-bowed, a name). This declares an option where @ref[5.4.132] made substitution obligatory.
"""

advanced = """
The @deva[संज्ञायाम्] condition recognizes that proper names may preserve archaic or variant forms. The optionality allows @deva[शतधनुः] (with @deva[उस्]-stem retained) alongside @deva[शतधन्वा] (with @deva[अनङ्]-substitution). This reflects the tendency for personal names to resist regular morphological processes.
"""

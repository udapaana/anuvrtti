id = "5.4.127"
numericId = "54127"

[en]
simple = """
The affix @deva[इच्] (yielding @deva[इ]) is added to a @[bahuvrīhi] compound expressing reciprocal action. Examples: @deva[केशाकेशि] (hair-to-hair grappling), @deva[दण्डादण्डि] (stick-to-stick fighting), @deva[मुसलामुसलि].
"""

standard = """
This @[sūtra] prescribes @deva[इच्] after @[bahuvrīhi] compounds denoting @deva[विप्रतिषेध] (reciprocity of action), formed by @ref[2.2.27]. Thus @deva[केशेषु केशेषु गृहीत्वा इदं युद्धं प्रवृत्तम्] = @deva[केशाकेशि] (fighting by grabbing each other's hair). Similarly @deva[कचाकचि], @deva[मुसलामुसलि], @deva[दण्डादण्डि]. The @deva[इच्] affix also forms @[avyayībhāva] compounds, listed in @deva[तिष्ठद्गु] words (@ref[2.1.17]).
"""

advanced = """
The @deva[विप्रतिषेध] (mutual opposition/reciprocity) semantic triggers this formation for combat or conflict vocabulary. The reduplication pattern (@[x-ā-x-i]) expresses 'X against X.' The @ref[2.2.27] compounding rule specifically handles these reciprocal @[bahuvrīhis]. The note about @deva[तिष्ठद्गु] indicates @deva[इच्] can form adverbial compounds too.
"""

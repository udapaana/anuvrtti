id = "5.4.102"
numericId = "54102"

[en]
simple = """
The affix @deva[टच्] is added to @deva[अञ्जलि] (cupped hands) at the end of a Dvigu compound when preceded by @deva[द्वि] or @deva[त्रि]. Examples: @deva[द्व्यञ्जलम्] (two handfuls), @deva[त्र्यञ्जलम्] (three handfuls). But: @deva[द्व्यञ्जलिः] (relating to two handfuls—non-Dvigu).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[अञ्जलि] (cupped hands, handful) in Dvigu compounds when preceded by @deva[द्वि] or @deva[त्रि]. Thus @deva[द्वौ अञ्जली समाहृतौ] = @deva[द्व्यञ्जलम्], @deva[त्र्यञ्जलम्]. The @deva[द्विगोः] condition continues: non-Dvigu @deva[द्वयोः अञ्जलिः] = @deva[द्व्यञ्जलिः] (without @deva[टच्]). The @deva[अतद्धितलुकि] condition applies: @deva[द्वाभ्याम् अञ्जलिभ्यां क्रीतः] = @deva[द्व्यञ्जलिः], @deva[त्र्यञ्जलिः] (@ref[5.1.28]). The Eastern grammarians' option continues: alternatively @deva[द्व्यञ्जलिप्रियः].
"""

advanced = """
The restriction to @deva[द्वि] and @deva[त्रि] specifically limits which numerals trigger @deva[टच्]. The Dvigu requirement distinguishes collective measurement (@deva[द्व्यञ्जलम्] = 'a double-handful as a unit') from relational expressions (@deva[द्व्यञ्जलिः] = 'pertaining to two handfuls'). The @deva[प्राचाम्] from @ref[5.4.101] continues, indicating these are optionally applicable forms.
"""

id = "5.4.45"
numericId = "54045"

[en]
simple = """
The affix @deva[तसि] (-@deva[तः]) is optionally added to replace the ablative case when the fifth case has @deva[अपादान] sense arising from verbs like @deva[हीय] (passive of @deva[हा], to abandon) and @deva[रुह] (to ascend). Examples: @deva[ग्रामतः आगच्छति] = @deva[ग्रामात् आगच्छति] (comes from the village).
"""

standard = """
This @[sūtra] prescribes optional @deva[तसि] after an ablative that has @deva[अपादान] sense when that sense arises from verbs like @deva[हीय] (passive of @deva[हा]) and @deva[रुह]. Thus @deva[ग्रामतः आगच्छति] or @deva[ग्रामात्]; @deva[चोरतो बिभेति] or @deva[चोरात्]; @deva[अध्ययनतः पराजयते] or @deva[अध्ययनात्]. The rule does not apply when @deva[हीय] or @deva[रुह] themselves govern the ablative: @deva[सार्थात् हीयते] (is left behind by the caravan), @deva[पर्वतात् अवरोहति] (descends from the mountain). The form @deva[हीय] indicates @deva[जहाति] (from @deva[हा]) not @deva[जिहीति].
"""

advanced = """
The @[sūtra] distinguishes @deva[अपादान]-sense ablatives arising from verbs like @deva[हा] and @deva[रुह] (per @ref[1.4.24], @ref[1.4.25], @ref[1.4.26]) from ablatives directly governed by these verbs. In @deva[सार्थात् हीयते], the caravan is the agent of separation, not the locus of departure. The specification @deva[हीय] ensures @deva[जहाति] (@deva[हा] = abandon) rather than @deva[जिहीति] (@deva[हा] = go). The verse @deva[मन्त्रो हीनः स्वरतो वर्णतो वा] is explained as having instrumental sense (@deva[स्वरेण वर्णेन वा हीनः]), not ablative, hence @deva[तसि] applies differently there.
"""

id = "5.4.6"
numericId = "54006"

[en]
simple = """
The affix @deva[कन्] comes after @deva[बृहती] when it means 'a garment/dress.' Example: @deva[बृहतिका] (an upper garment/mantle). Not when @deva[बृहती] means the Vedic metre.
"""

standard = """
The affix @deva[कन्] attaches to @deva[बृहती] meaning @deva[प्रावार] (upper garment/mantle), not the Vedic metre. By @ref[7.4.13], the long vowel shortens. Example: @deva[बृहती] + @deva[कन्] → @deva[बृहतिका] (a kind of cloak). Not: @deva[बृहती छन्दः] (the @[bṛhatī] metre).
"""

advanced = """
This is @deva[स्वार्थ कन्] (meaning-preserving). The semantic restriction @deva[प्रावारे] (garment) distinguishes from @deva[बृहती छन्दस्] (metre name). By @ref[7.4.13], @deva[ई] → @deva[इ] before @deva[कन्]: @deva[बृहती] → @deva[बृहति] + @deva[क] → @deva[बृहतिका].
"""

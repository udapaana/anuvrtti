id = "5.4.93"
numericId = "54093"

[en]
simple = """
The affix @deva[टच्] is added to @deva[उरस्] (chest) at the end of a @[tatpuruṣa] compound when it means 'the most excellent of its kind.' Examples: @deva[अश्वोरसम्] (the finest horse), @deva[हस्त्युरसम्] (the finest elephant). But: @deva[देवदत्तोरः] (Devadatta's chest).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[उरस्] in @[tatpuruṣa] when the meaning is @deva[अग्र] (principal, most excellent). Since @deva[उरस्] (chest) is the principal member of an animal's body, it metonymically means 'the chief/best.' Thus @deva[अश्वानाम् उरः] = @deva[अश्वोरसम्] (the most excellent horse), @deva[हस्त्युरसम्] (the finest elephant). Without this meaning: @deva[देवदत्तस्य उरः] = @deva[देवदत्तोरः] (Devadatta's chest)—no affix.
"""

advanced = """
The metonymic extension from @deva[उरस्] (chest as the principal body part) to 'the principal/best of a class' triggers @deva[टच्]. This is a semantic condition: when @deva[उरस्] denotes physical chest, no affix; when it denotes 'chief/foremost' (as in 'the cream of the crop'), @deva[टच्] applies. The genitive @[tatpuruṣa] @deva[अश्वानाम् उरः] = 'the chest of horses' → 'the best of horses.'
"""

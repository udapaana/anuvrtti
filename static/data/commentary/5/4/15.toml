id = "5.4.15"
numericId = "54015"

[en]
simple = """
The affix @deva[अञ्] comes after @deva[इनुण्]-ending words without changing meaning. Examples: @deva[सांराविणम्] (general noise), @deva[सांकूटिनम्] (general confusion).
"""

standard = """
The @deva[स्वार्थ] affix @deva[अञ्] (@deva[अ]) attaches to @deva[इनुण्]-ending words (@ref[3.3.44], condition from universal co-operation of action) without sense-change. @deva[इनुण्] forms incomplete words requiring @deva[अञ्] for completion. Examples: @deva[सांराविणं वर्तते] (general shouting prevails); @deva[सांकूटिनम्] (general pounding/confusion).
"""

advanced = """
By @ref[3.3.44], @deva[इनुण्] expresses a condition arising from universal participation in an action. @deva[इनुण्]-derivatives are incomplete (@deva[अपूर्ण]) and require @deva[स्वार्थ अञ्] for proper word-formation. Generally, @deva[स्वार्थ] affixes complete underdeveloped (@deva[अपूर्ण]) stems.
"""

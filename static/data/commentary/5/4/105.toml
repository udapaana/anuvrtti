id = "5.4.105"
numericId = "54105"

[en]
simple = """
The affix @deva[टच्] is optionally added to @deva[ब्रह्मन्] (Brahmin) at the end of a @[tatpuruṣa] compound when preceded by @deva[कु] (bad) or @deva[महत्] (great). Examples: @deva[कुब्रह्मः] or @deva[कुब्रह्मा], @deva[महाब्रह्मः] or @deva[महाब्रह्मा].
"""

standard = """
This @[sūtra] prescribes optional @deva[टच्] after @deva[ब्रह्मन्] in @[tatpuruṣa] when preceded by @deva[कु] (bad, inferior) or @deva[महत्] (great). Thus @deva[कुब्रह्मः] or @deva[कुब्रह्मा] (a bad/inferior Brahmin), @deva[महाब्रह्मः] or @deva[महाब्रह्मा] (a great Brahmin). The word @deva[ब्रह्मन्] here is synonymous with @deva[ब्राह्मण] (a Brahmin, member of the priestly class).
"""

advanced = """
The optionality (@deva[विभाषा]) allows both @[samāsānta] and @[non-samāsānta] forms. @deva[कु] is a pejorative prefix (cf. @deva[कुपुत्र], @deva[कुस्त्री]); @deva[महत्] is laudatory. The dual treatment—optional @deva[टच्]—contrasts with the obligatory application in @ref[5.4.104] where regional affiliation is involved. The note that @deva[ब्रह्मन्] = @deva[ब्राह्मण] clarifies the denotation.
"""

id = "5.4.69"
numericId = "54069"

[en]
simple = """
The @deva[समासान्त] affixes are NOT added when the first member of the compound is a word of praise like @deva[सु] or @deva[अति]. Examples: @deva[सुराजा] (not @deva[सुराजः]), @deva[अतिराजा], @deva[सुगौः], @deva[अतिगौः].
"""

standard = """
This @[sūtra] prohibits @deva[समासान्त] affixes when the first compound member expresses praise. Thus @deva[महा] + @deva[राजन्] = @deva[महाराजः] (with @deva[टच्] by @ref[5.4.91]), but @deva[सु] + @deva[राजन्] = @deva[सुराजा] (no affix). Similarly @deva[अतिराजा], @deva[सुगौः], @deva[अतिगौः]. A @[vārttika] specifies that only @deva[सु] and @deva[अति] trigger this prohibition—not other praise words: @deva[परमराजः], @deva[परमगवः] take the affix. Another @[vārttika] limits this prohibition to @[sūtras] through @ref[5.4.113] exclusive: @deva[सुसक्थः], @deva[अतिसक्थः], @deva[स्वक्षः], @deva[अत्यक्षः] (with @deva[पच्] from @ref[5.4.113]) are allowed.
"""

advanced = """
The praise-word restriction is narrowly defined by @[vārttika] to @deva[सु] and @deva[अति] specifically. The scope limitation (@deva[त्रयोदशावर्जं] 'excluding @ref[5.4.113]') means the @deva[पच्] affix of @ref[5.4.113] is immune to this prohibition. This technical precision prevents over-application of the prohibition while maintaining the special status of @deva[सु] and @deva[अति] as markers of excellence that block @[samāsānta].
"""

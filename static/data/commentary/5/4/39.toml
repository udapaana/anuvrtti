id = "5.4.39"
numericId = "54039"

[en]
simple = """
The affix @deva[तिकन्] is added to @deva[मृद्] (mud/clay) without changing its meaning. Result: @deva[मृत्तिका] = @deva[मृद्] (mud, clay).
"""

standard = """
This @[sūtra] teaches that @deva[तिकन्] is added to @deva[मृद्] in a @[svārthika] sense, yielding @deva[मृत्तिका] as a synonym for @deva[मृद्] (mud, clay, earth). Unlike many @[svārthika] affixes in this section which are @deva[नित्य] (obligatory), this affix is optional, following the general optionality stated in @ref[5.4.7].
"""

advanced = """
The affix @deva[तिकन्] produces @deva[मृत्तिका] as a stylistic or emphatic variant of @deva[मृद्]. The commentary clarifies that this is not a @deva[नित्य] (invariable) affix like those in some other @[svārthika] rules, but follows the optional pattern established by @ref[5.4.7]. The doubling of @deva[त्] results from standard sandhi when @deva[तिकन्] follows @deva[मृद्].
"""

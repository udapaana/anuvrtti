id = "5.4.25"
numericId = "54025"

[en]
simple = """
The affix @deva[यत्] comes after @deva[पाद] (foot) and @deva[अर्घ] (offering) in dative case meaning 'for that purpose.' Examples: @deva[पाद्यम्] (foot-washing water), @deva[अर्घ्यम्] (guest-offering).
"""

standard = """
The affix @deva[यत्] (@deva[य]) attaches to @deva[पाद] and @deva[अर्घ] in dative expressing @deva[तादर्थ्य] (purpose). Examples: @deva[पादार्थम् उदकम्] = @deva[पाद्यम्] (water for washing feet); @deva[अर्घ्यम्] (offering for guest). Accent by @ref[6.1.213]: @deva[उदात्त] on first syllable. The @deva[चकार] extends to other words in Veda: @deva[वसव्य], @deva[उदक्य], @deva[मर्त्य], @deva[सूर्य], etc.
"""

advanced = """
@[vārttikas] add: @deva[आवतु] after @deva[सम] (@deva[समावत् वसति]); @deva[नू] for @deva[नव] + @deva[त्नप्/तनप्/ख] (@deva[नूत्न/नूतन/नवीन]); @deva[प्र] (old) + @deva[म/त्न/तन/ख] (@deva[प्रण/प्रत्न/प्रतन/प्रीण]); @deva[धेय] after @deva[भाग/रूप/नाम] (@deva[भागधेय/रूपधेय/नामधेय]); @deva[अञ्] after @deva[आग्नीध्र/साधारण] (@deva[आग्नीध्र/साधारण], fem. @deva[आग्नीध्री]).
"""

id = "5.4.97"
numericId = "54097"

[en]
simple = """
The affix @deva[टच्] is added to @deva[श्वन्] (dog) at the end of a @[tatpuruṣa] compound when a non-living thing is compared to it. Examples: @deva[आकर्षश्वः] (a dog-like bow), @deva[फलकश्वः] (a dog-like blade). But: @deva[वानरश्वा] (a dog-like monkey—living thing).
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[श्वन्] in @[tatpuruṣa] when a non-living object (@deva[अचेतन]) is compared to a dog. Compounding by @ref[2.1.56] (metaphorical @[tatpuruṣa]). Thus @deva[आकर्षः श्व इव] = @deva[आकर्षश्वः] (a dog-like bow), @deva[फलकश्वः] (a dog-like blade). When the thing compared is living: @deva[वानरः श्व इव] = @deva[वानरश्वा] (a dog-like monkey)—no affix. The @[kāśikā]'s counter-example @deva[अश्वा लोष्टः] is problematic since @deva[नञ्]-@[tatpuruṣa] is already blocked by @ref[5.4.71]; better example: @deva[निःश्वा लोष्टः].
"""

advanced = """
The condition @deva[अचेतन] (non-living) restricts the comparison: inanimate objects metaphorically called 'dogs' take @deva[टच्], but animate creatures (like monkeys) compared to dogs don't. The @ref[2.1.56] reference indicates these are @deva[उपमान]-@[tatpuruṣas] (metaphorical compounds). The distinction between @deva[अतिश्व] (@ref[5.4.96], surpassing) and @deva[उपमानश्व] (this @[sūtra], resembling) is significant.
"""

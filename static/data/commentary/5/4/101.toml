id = "5.4.101"
numericId = "54101"

[en]
simple = """
According to Eastern grammarians, the affix @deva[टच्] is added to @deva[खारी] (a measure) at the end of a Dvigu compound or when preceded by @deva[अर्ध]. Examples: @deva[द्विखारम्] or @deva[द्विखारी], @deva[अर्धखारम्] or @deva[अर्धखारी].
"""

standard = """
This @[sūtra] prescribes @deva[टच्] after @deva[खारी] (a grain measure) in Dvigu or @deva[अर्ध]-@[tatpuruṣa] compounds, according to the Eastern grammarians (@deva[प्राचाम्]). Both @deva[द्विगोः] and @deva[अर्धात्] are understood. Thus @deva[द्वे खार्यौ समाहृते] = @deva[द्विखारम्] or @deva[द्विखारी]. Similarly @deva[अर्धं खार्याः] = @deva[अर्धखारम्] or @deva[अर्धखारी]. According to @[padamañjarī], this @[sūtra] is dispensable since @deva[खार] (a variant of @deva[खारी]) is governed by the @[vārttika] @deva[ठन्येभ्योऽपि दृश्यते] under @ref[5.1.57-58].
"""

advanced = """
The designation @deva[प्राचाम्] (of the Eastern grammarians) indicates a regional grammatical tradition. The optional forms (@deva[द्विखारम्]/deva[@deva[द्विखारी]]) suggest the affix itself may be optional. The @[padamañjarī]'s comment that @deva[खार] = @deva[खारी] points to lexical variation that could render this rule redundant under broader @[vārttika] coverage.
"""

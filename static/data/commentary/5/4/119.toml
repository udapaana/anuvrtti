id = "5.4.119"
numericId = "54119"

[en]
simple = """
The affix @deva[अच्] is added to @deva[नासिका] (nose) in a @[bahuvrīhi] compound when an upasarga (prefix) precedes it, with @deva[नस्] substituted—even when not a name. Examples: @deva[उन्नसः] (upturned-nosed), @deva[प्रणसः] (prominent-nosed).
"""

standard = """
This @[sūtra] prescribes @deva[अच्] after @deva[नासिका] in @[bahuvrīhi] when preceded by an @deva[उपसर्ग] (verbal prefix), with @deva[नस्] substituted. This applies where the compound is NOT a name (unlike @ref[5.4.118]). Thus @deva[उन्नता नासिका अस्य] = @deva[उन्नसः] (upturned nose), @deva[प्रणसः] (prominent nose). @deva[न] → @deva[ण] by @ref[8.4.28]. @[vārttika]: @deva[ग्र] is substituted for @deva[नासिका] after @deva[वि]: @deva[विगता नासिका अस्य] = @deva[विग्रः]; also @deva[विख्यः] in the same sense.
"""

advanced = """
The @deva[उपसर्ग] condition (@deva[उद्], @deva[प्र], etc.) triggers the substitution even for non-names. This extends the @deva[नस्]-substitution beyond the name-context of @ref[5.4.118]. The @[vārttika]'s @deva[विग्र/विख्य] forms show alternative substitutions (@deva[ग्र] for @deva[नासिका] after @deva[वि]).
"""

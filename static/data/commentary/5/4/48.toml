id = "5.4.48"
numericId = "54048"

[en]
simple = """
The affix @deva[तसि] is optionally added to a genitive case (6th) when expressing party affiliation or taking sides. Example: @deva[देवा अर्जुनतः अभवन्] = @deva[देवा अर्जुनस्य पक्षे अभवन्] (the Devas became Arjunites).
"""

standard = """
This @[sūtra] prescribes optional @deva[तसि] after a genitive expressing @deva[व्याश्रय] (party affiliation or taking sides with a faction). Thus @deva[देवा अर्जुनस्य पक्षे अभवन्] = @deva[देवा अर्जुनतः अभवन्] (the Devas became partisans of Arjuna). Similarly @deva[आदित्याः कर्णतः अभवन्] (the @[ādityas] became @[karṇa]'s supporters). The affix does not apply to ordinary genitives: @deva[वृक्षस्य शाखा] (the branch of the tree) retains the genitive.
"""

advanced = """
The term @deva[व्याश्रय] technically means 'taking refuge with' or 'siding with' a faction. The semantic condition requires a context of political or factional allegiance. The @deva[षष्ठी] (genitive) here expresses the leader or faction-head whose side is taken. Ordinary possessive or relational genitives like @deva[वृक्षस्य शाखा] do not qualify for this transformation.
"""

id = "5.4.134"
numericId = "54134"

[en]
simple = """
@deva[निङ्] (yielding @deva[नि]) substitutes for the final of @deva[जाया] (wife) in a @[bahuvrīhi] compound. Examples: @deva[युवजानिः] (having a young wife), @deva[वृद्धजानिः] (having an old wife).
"""

standard = """
This @[sūtra] prescribes @deva[निङ्]-substitution for @deva[जाया] (wife) in @[bahuvrīhi]. Thus @deva[युवतिः जाया यस्य] = @deva[युवजानिः] (having a young wife). Derivation: @deva[जाया] + @deva[निङ्] = @deva[जाय्] + @deva[नि] → @deva[जानि] (@deva[य्] elided by @ref[6.1.66]). Similarly @deva[वृद्धजानिः] (having an old wife). There is also @deva[पुंवद्भाव] (masculine treatment).
"""

advanced = """
The @deva[निङ्] affix produces @deva[जानि] from @deva[जाया]. The @deva[य्]-elision follows @ref[6.1.66]. The @deva[पुंवद्भाव] reference indicates the compound is treated as masculine grammatically despite @deva[जाया] being feminine. The @deva[जानि]-form is distinct from the independent word @deva[जानि] (wife).
"""

id = "5.4.71"
numericId = "54071"

[en]
simple = """
The @deva[समासान्त] affixes are NOT added when the negative @deva[नञ्] precedes a @[tatpuruṣa] compound of @deva[राजन्] and similar words. Examples: @deva[अराजा], @deva[असखा], @deva[अगौः].
"""

standard = """
This @[sūtra] prohibits @deva[समासान्त] in @[tatpuruṣa] compounds where @deva[नञ्] (negative particle) precedes words like @deva[राजन्]. Thus @deva[अराजा] (not @deva[अराजः]), @deva[असखा], @deva[अगौः]. The restriction applies only to @[tatpuruṣa]: in other compound types, the affix applies. Examples: @deva[अनृचः मानवकः] (a boy who hasn't studied the @[ṛg] Veda)—here @deva[अनृच] is @[bahuvrīhi] and takes the affix by @ref[5.4.74]. Similarly @deva[अधुरं शकटम्] (a cart without a yoke-pole).
"""

advanced = """
The @[tatpuruṣa] restriction is significant: @deva[न] + @deva[राजन्] as @[tatpuruṣa] (meaning 'non-king') doesn't take @[samāsānta], yielding @deva[अराजा]. But the same elements in @[bahuvrīhi] ('that which lacks a king' or 'one without X') do take the affix. The examples @deva[अनृचः] and @deva[अधुरम्] show @ref[5.4.74] applying in @[non-tatpuruṣa] contexts despite the negative prefix.
"""

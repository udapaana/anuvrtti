id = "5.4.140"
numericId = "54140"

[en]
simple = """
The final @deva[अ] of @deva[पाद] (foot) is elided in a @[bahuvrīhi] compound when preceded by a numeral or @deva[सु] (good). Examples: @deva[द्विपात्] (two-footed), @deva[त्रिपात्] (three-footed), @deva[सुपात्] (well-footed).
"""

standard = """
This @[sūtra] prescribes @deva[अ]-elision from @deva[पाद] when preceded by a numeral or @deva[सु]. Thus @deva[द्वौ पादौ अस्य] = @deva[द्विपात्] (two-footed), @deva[त्रिपात्] (three-footed). @deva[शोभनौ पादौ अस्य] = @deva[सुपात्] (having good/beautiful feet).
"""

advanced = """
This extends @deva[पाद]-elision beyond comparison (@ref[5.4.138]) to numeral and @deva[सु]-prefixed compounds. The resulting @deva[पात्] forms are consonant-final. Combined with the previous @[sūtras], this covers the major contexts for @deva[पाद] → @deva[पात्/पद्] transformations in @[bahuvrīhi].
"""

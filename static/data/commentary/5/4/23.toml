id = "5.4.23"
numericId = "54023"

[en]
simple = """
The affix @deva[ञ्य] comes after @deva[अनन्त], @deva[आवसथ], @deva[इतिह], and @deva[भेषज] without changing meaning. Examples: @deva[आनन्त्यम्] (= @deva[अनन्तः]), @deva[ऐतिह्यम्] (tradition, from @deva[इति ह]).
"""

standard = """
The @deva[स्वार्थ] affix @deva[ञ्य] (@deva[य] with @deva[वृद्धि]) attaches to @deva[अनन्त], @deva[आवसथ], @deva[इतिह], and @deva[भेषज] without sense-change. Examples: @deva[आनन्त्यम्] = @deva[अनन्तः] (infinite); @deva[आवसथ्यम्] = @deva[आवसथः] (dwelling/sanctuary); @deva[ऐतिह्यम्] = @deva[इति ह] (traditional account—from @deva[इति ह स्म उपाध्यायाः कथयन्ति] 'thus the teachers say'); @deva[भैषज्यम्] = @deva[भेषजम्] (medicine).
"""

advanced = """
Note @deva[इतिह] is not a @deva[प्रातिपदिक] but a phrase (@deva[इति ह])—the affix attaches exceptionally. @deva[ञ्य] triggers @deva[वृद्धि]: @deva[अ] → @deva[आ], @deva[इ] → @deva[ऐ]. The affix is optional per @ref[4.1.82] (@deva[महाविभाषा]).
"""

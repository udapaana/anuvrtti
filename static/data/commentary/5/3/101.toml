id = "5.3.101"
numericId = "53101"

[en]
simple = """
The affix @deva[ढञ्] comes after @deva[वस्ति] (bladder/abdomen) in the sense of 'like this.' Example: @deva[वास्तेयः] (like a bladder), feminine @deva[वास्तेयी].
"""

standard = """
The affix @deva[ढञ्] (@deva[एय]) attaches to @deva[वस्ति] (bladder/abdomen) expressing @deva[इव] (resemblance). From this @[sūtra] forward, affixes apply generally (not limited to images). Example: @deva[वस्तिरिव] = @deva[वास्तेयः] (bladder-like); feminine @deva[वास्तेयी].
"""

advanced = """
This begins a series of @deva[इवार्थ] affixes for general resemblance (not @deva[प्रतिकृति]-specific). @deva[ढञ्] triggers @deva[वृद्धि]: @deva[वस्ति] → @deva[वास्त] + @deva[एय] → @deva[वास्तेय]. The @deva[ञ्] indicates @deva[ङीप्] for feminine: @deva[वास्तेयी].
"""

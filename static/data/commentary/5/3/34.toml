id = "5.3.34"
numericId = "53034"

[en]
simple = """
The affix @deva[अति] comes after @deva[उत्तर] (north) and @deva[दक्षिण] (south) with @deva[अस्ताति]-meaning. Examples: @deva[उत्तरात्] (northward/from north), @deva[दक्षिणात्] (southward/from south).
"""

standard = """
The affix @deva[अति] (@deva[आत्]) attaches to @deva[उत्तर] and @deva[दक्षिण] in @deva[अस्ताति]-senses. Examples: @deva[उत्तरस्यां दिशि वसति] = @deva[उत्तराद्वसति]; @deva[उत्तरादागतः]; @deva[उत्तराद्रमणीयम्]. Similarly @deva[दक्षिणात्] and @deva[अधरात्].
"""

advanced = """
The affix @deva[अति] applies to @deva[उत्तर] and @deva[दक्षिण] with @deva[अस्ताति]-force (@deva[दिक्/देश/काल] in @deva[सप्तमी/पञ्चमी/प्रथमा]). The affix becomes @deva[आत्] after vowel-final stems. Forms: @deva[उत्तरात्], @deva[दक्षिणात्], @deva[अधरात्] (the last by extension). These coexist with @deva[अतस्]-forms from @ref[5.3.28].
"""

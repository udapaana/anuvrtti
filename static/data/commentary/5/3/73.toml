id = "5.3.73"
numericId = "53073"

[en]
simple = """
The affixes @deva[क] and @deva[अकच्] come when something unknown is spoken of—expressing uncertainty about possession or relation. Examples: @deva[अश्वकः] (whose horse?), @deva[उच्चकैः] (is it high?).
"""

standard = """
The affixes @deva[क] (@ref[5.3.70]) and @deva[अकच्] (@ref[5.3.71]) express @deva[अज्ञात] (unknown)—uncertainty about the relation of something, not the thing itself. Examples: @deva[अश्वकः] (whose horse is this?); @deva[गर्दभकः] (whose donkey?); @deva[उच्चकैः] (is it high?); @deva[पचतकि] (does he cook?).
"""

advanced = """
The @deva[अज्ञात] sense refers to unknown @deva[संबन्ध] (relation), not the object itself. @deva[क] applies to @deva[सुबन्त], @deva[अकच्] to @deva[अव्यय/सर्वनामन्/तिङन्त]. Examples: @deva[अश्वकः] = 'horse (whose?)'; @deva[सर्वके] = 'was it all agreed?'; @deva[पचतकि] = 'does he cook?' The affix adds a questioning/uncertain nuance.
"""

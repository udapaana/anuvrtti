id = "5.3.44"
numericId = "53044"

[en]
simple = """
After @deva[एक] (one), the substitute @deva[ऐकध्य] optionally replaces @deva[धा]. So both @deva[एकधा] and @deva[ऐकध्यम्] mean 'in one way' or 'into one.'
"""

standard = """
After @deva[एक], the form @deva[ऐकध्य] optionally replaces @deva[एकधा] in both @deva[विधार्थ] and @deva[अधिकरणविचाल] senses. The repetition of @deva[धा] in the @[sūtra] indicates both meanings apply. Examples: @deva[एकधा भुङ्क्ते] or @deva[ऐकध्यं भुङ्क्ते]; @deva[एकधा कुरु] or @deva[ऐकध्यं कुरु].
"""

advanced = """
The substitute @deva[ऐकध्य] involves @deva[वृद्धि] of @deva[एक] → @deva[ऐक] + modified @deva[धा] → @deva[ध्य]. The repetition @deva[धा धा] in the @[sūtra] signals both @deva[विधार्थ] (@ref[5.3.42]) and @deva[अधिकरणविचाल] (@ref[5.3.43]) contexts accept this substitution. Without repetition, only @deva[अधिकरणविचाल] (immediately preceding) would apply.
"""

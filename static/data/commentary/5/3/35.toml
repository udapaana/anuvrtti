id = "5.3.35"
numericId = "53035"

[en]
simple = """
The affix @deva[एनप्] (becoming @deva[एन]) optionally comes after @deva[उत्तर] and @deva[दक्षिण] in locative/nominative sense (not ablative) when the reference is nearby. Examples: @deva[उत्तरेण वसति] (lives nearby to the north).
"""

standard = """
The affix @deva[एनप्] (@deva[एन]) optionally comes after @deva[उत्तर] and @deva[दक्षिण] with locative or nominative (not ablative) force, when the location is not distant (@deva[अदूर]). Examples: @deva[उत्तरेण वसति] or @deva[उत्तराद्वसति] (lives nearby northward); but @deva[उत्तरादागतः] (came from north—ablative, so no @deva[एनप्]).
"""

advanced = """
The affix @deva[एनप्] applies optionally after @deva[उत्तर]/deva[@deva[दक्षिण]] under two conditions: (1) @deva[अदूर]—referent is not distant; (2) @deva[अपञ्चमी]—not ablative sense. The @deva[पकार] is for accent by @ref[3.1.4]. Some hold this is a general rule for all @deva[दिक्शब्द], yielding @deva[पूर्वेण ग्रामम्], @deva[अपरेण ग्रामम्] per @ref[2.3.31]. @deva[अपञ्चम्याः] governs through @ref[5.3.39].
"""

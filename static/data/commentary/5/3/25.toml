id = "5.3.25"
numericId = "53025"

[en]
simple = """
The affix @deva[थमु] also comes after @deva[किम्] to denote manner. Example: @deva[किम्] + @deva[थमु] → @deva[कथम्] (how, in what manner).
"""

standard = """
The affix @deva[थमु] (@deva[थम्]) also attaches to @deva[किम्] in @deva[प्रकार] sense, blocking @deva[थाल्]. By @ref[7.2.103], @deva[किम्] → @deva[क], giving @deva[कथम्] (how, in what manner).
"""

advanced = """
This extends @deva[थमु] from @ref[5.3.24] to @deva[किम्] in @deva[प्रकारार्थ]. By @ref[7.2.103] @deva[किमः कः], @deva[किम्] → @deva[क] before @deva[थमु]. Derivation: @deva[किम्] → @deva[क] + @deva[थम्] → @deva[कथम्] 'how?' (@deva[केन प्रकारेण]). Both @deva[इत्थम्] and @deva[कथम्] take @deva[थमु] as @deva[अपवाद] to @deva[थाल्].
"""

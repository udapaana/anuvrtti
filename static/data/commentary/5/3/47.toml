id = "5.3.47"
numericId = "53047"

[en]
simple = """
The affix @deva[पाशप्] (becoming @deva[पाश]) indicates contempt or insignificance. Example: @deva[वैयाकरणपाशः] (a very bad grammarian).
"""

standard = """
The affix @deva[पाशप्] (@deva[पाश]) denotes @deva[याप्य] (contempt, trifling nature) when added to a stem. Examples: @deva[वैयाकरणपाशः] (a worthless grammarian), @deva[याज्ञिकपाशः] (a poor ritualist). This applies to professional incompetence, not moral character.
"""

advanced = """
The affix @deva[पाशप्] forms derogatory terms indicating professional inadequacy. @deva[याप्य] = contempt, triviality. The affix does not apply to moral failings—a skilled but immoral grammarian would not be @deva[वैयाकरणपाशः]. The @deva[पकार] is @deva[इत्] for accent. Examples: @deva[वैयाकरणपाशः] (incompetent in grammar); @deva[याज्ञिकपाशः] (incompetent in ritual).
"""

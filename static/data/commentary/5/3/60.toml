id = "5.3.60"
numericId = "53060"

[en]
simple = """
The word @deva[प्रशस्य] (praiseworthy) becomes @deva[श्र] before @deva[इष्ठन्] and @deva[ईयसुन्]. Examples: @deva[श्रेष्ठः] (best), @deva[श्रेयान्] (better).
"""

standard = """
Before @deva[इष्ठन्] and @deva[ईयसुन्], @deva[प्रशस्य] (praiseworthy) is replaced by @deva[श्र]. Though @deva[प्रशस्य] is not strictly @deva[गुणवचन], this rule permits the affixes. Examples: @deva[प्रशस्यतमः] = @deva[श्रेष्ठः] (best); @deva[प्रशस्यतरः] = @deva[श्रेयान्] (better). @ref[6.4.163] prevents elision of @deva[श्र]'s @deva[अ].
"""

advanced = """
This @deva[आदेश] teaches @deva[प्रशस्य] → @deva[श्र] before @deva[अजादि] affixes. The @[sūtra] must be read as @deva[प्रशस्यस्य श्रो ऽजाद्योः] (locative). Though @deva[प्रशस्य] isn't @deva[गुणवचन], this rule specially permits @deva[इष्ठन्]/deva[@deva[ईयसुन्]]. By @ref[6.4.163], the @deva[अकार] of @deva[श्र] is protected from @ref[6.4.148] and @ref[6.4.155]. Results: @deva[श्रेष्ठः], @deva[श्रेयान्] = @deva[प्रशस्यतमः], @deva[प्रशस्यतरः].
"""

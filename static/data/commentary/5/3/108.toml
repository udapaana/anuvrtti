id = "5.3.108"
numericId = "53108"

[en]
simple = """
The affix @deva[ठक्] comes after @deva[अङ्गुली] and similar words in the sense of 'like this.' Examples: @deva[आङ्गुलिकः] (finger-like), @deva[भारुजिकः].
"""

standard = """
The affix @deva[ठक्] (@deva[इक]) attaches to @deva[अङ्गुल्यादि] words expressing @deva[इव] (resemblance). Examples: @deva[आङ्गुलिकः] (finger-like, = @deva[अङ्गुलीय]); @deva[भारुजिकः]. The class includes: @deva[अङ्गुलि], @deva[भरुज], @deva[बभ्रु], @deva[वल्गु], @deva[मण्डर], @deva[मण्डल], @deva[शष्कुली], @deva[हरि], @deva[कपि], @deva[मुनि], @deva[रुह], @deva[खल], @deva[उदश्वित्], @deva[गोणी], @deva[उरस्], @deva[कुलिश], @deva[शिखा].
"""

advanced = """
The @deva[अङ्गुल्यादि] @deva[गण] takes @deva[ठक्] → @deva[इक] (or @deva[क] after certain finals per @ref[7.3.50-51]). @deva[वृद्धि] applies: @deva[अङ्गुलि] → @deva[आङ्गुलिक]. The class includes body parts, colors, and shapes used for comparison.
"""

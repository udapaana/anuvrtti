id = "5.3.58"
numericId = "53058"

[en]
simple = """
The vowel-initial affixes @deva[ईयसुन्] and @deva[इष्ठन्] come only after words denoting qualities (adjectives). Example: @deva[लघीयान्], @deva[लघिष्ठः] (from @deva[लघु]), but @deva[पाचकतरः], @deva[पाचकतमः] (not *@deva[पाचकीयान्]).
"""

standard = """
The @deva[अजादि] (vowel-initial) affixes @deva[ईयसुन्] and @deva[इष्ठन्] are restricted to @deva[गुणवचन] (quality-denoting words/adjectives). After adjectives: @deva[लघीयान्], @deva[लघिष्ठः]; @deva[पटीयान्], @deva[पटिष्ठः]. After non-adjectives like @deva[पाचक] (cook): only @deva[पाचकतरः], @deva[पाचकतमः]. Note: @deva[तरप्]/deva[@deva[तमप्]] remain available for adjectives too: @deva[पटुतरः], @deva[पटुतमः].
"""

advanced = """
This restricts @deva[अजादि] affixes (@deva[ईयसुन्], @deva[इष्ठन्]) to @deva[गुणवचन प्रातिपदिक] (adjectival stems). The word @deva[एव] limits the affixes, not the bases—so @deva[गुणवचन] can still take @deva[तरप्]/deva[@deva[तमप्]]. Agent nouns like @deva[पाचक] take only @deva[तरप्]/deva[@deva[तमप्]]: @deva[पाचकतरः], @deva[पाचकतमः] (not *@deva[पाचकीयान्], *@deva[पाचकिष्ठः]).
"""

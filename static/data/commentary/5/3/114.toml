id = "5.3.114"
numericId = "53114"

[en]
simple = """
The affix @deva[ञ्यञ्] comes after warrior-class (@deva[आयुधजीविसंघ]) names among @deva[वाहीक] people, but not for @[brāhmaṇas] or @deva[राजन्य]. Examples: @deva[कौण्डीबृस्यः], plural @deva[कौण्डीबृसाः]; @deva[मालव्यः], plural @deva[मालवाः].
"""

standard = """
The affix @deva[ञ्यञ्] (@deva[य]) attaches to @deva[आयुधजीविसंघ] (warrior-guild) names among @deva[वाहीक] people, excluding @[brāhmaṇas] and the word @deva[राजन्य]. The @deva[अस्त्रियाम्] restriction doesn't apply here. Examples: @deva[कौण्डीबृस्यः], dual @deva[कौण्डीबृस्यौ], plural @deva[कौण्डीबृसाः], feminine @deva[कौण्डीबृसी]; @deva[क्षौद्रक्यः], plural @deva[क्षुद्रकाः]; @deva[मालव्यः], plural @deva[मालवाः].
"""

advanced = """
This applies to @deva[वाहीक] (northwestern) warrior-guilds (@deva[आयुधजीविसंघ]). Exclusions: @deva[ब्राह्मण] names (@deva[गोपालवा ब्राह्मणाः]); @deva[राजन्य] word-form (@deva[शालङ्कायना राजन्याः]). Unlike @ref[5.3.113], feminine is permitted here: @deva[कौण्डीबृसी], @deva[मालवी].
"""

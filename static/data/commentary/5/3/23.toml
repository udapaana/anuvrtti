id = "5.3.23"
numericId = "53023"

[en]
simple = """
The affix @deva[थाल्] comes after @deva[किम्], pronouns, and @deva[बहु] to denote manner or kind. Examples: @deva[तथा] (in that manner, so), @deva[यथा] (as, in which manner), @deva[सर्वथा] (in every way).
"""

standard = """
The affix @deva[थाल्] (@deva[था]) attaches to @deva[किम्], @deva[सर्वनामन्], and @deva[बहु] (excluding @deva[द्वि] etc.) to express @deva[प्रकार] (manner, kind). The @deva[ल्] is @deva[इत्]. Examples: @deva[तेन प्रकारेण] = @deva[तथा] (so); @deva[येन प्रकारेण] = @deva[यथा] (as); @deva[सर्वेण प्रकारेण] = @deva[सर्वथा] (in all ways).
"""

advanced = """
The affix @deva[थाल्] applies per @ref[5.3.2] (@deva[किंसर्वनामबहुभ्यो ऽद्व्यादिभ्यः]) in @deva[प्रकारार्थ] (manner-meaning). The @deva[अनुवृत्ति] of @deva[सप्तम्याः काले] ceases. @deva[प्रकार] = differentiating quality of a species. Unlike @deva[जातीयर्] (@ref[5.3.69]) which applies to things possessing the quality, @deva[थाल्] denotes the mode itself. Hence both @deva[तथाजातीयः] and @deva[तथा] coexist.
"""

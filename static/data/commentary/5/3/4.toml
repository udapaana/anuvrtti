id = "5.3.4"
numericId = "53004"

[en]
simple = """
@deva[इदम्] becomes @deva[एत] before affixes starting with @deva[र], and @deva[इत] before affixes starting with @deva[थ]. So @deva[इदम्] + @deva[र्हिल्] → @deva[एतर्हि] (now).
"""

standard = """
The substitutes @deva[एत] and @deva[इत] replace @deva[इदम्] before @deva[प्राग्दिशीय] affixes beginning with @deva[र] and @deva[थ] respectively. This blocks the general substitute @deva[इश्] from @ref[5.3.3]. Example: @deva[इदम्] + @deva[र्हिल्] → @deva[एतर्हि] (at this time, now).
"""

advanced = """
Before @deva[रादि] (@deva[र]-initial) @deva[प्राग्दिशीय] affixes, @deva[इदम्] → @deva[एत]; before @deva[थादि] (@deva[थ]-initial), @deva[इदम्] → @deva[इत]. This is @deva[अपवाद] to @ref[5.3.3]. The final @deva[अ] in @deva[एत]/deva[@deva[इत]] is @deva[उच्चारणार्थ] (for pronunciation), not part of the substitute. Thus @deva[इदम्] + @deva[र्हिल्] → @deva[एतर्हि]; @deva[इदम्] + @deva[था] → @deva[इतिथा] (rarely used).
"""

id = "5.3.16"
numericId = "53016"

[en]
simple = """
The affix @deva[र्हिल्] comes after @deva[इदम्] (this) when time is meant, in locative sense. Example: @deva[इदम्] + @deva[र्हिल्] → @deva[एतर्हि] (at this time, now). This blocks the affix @deva[ह].
"""

standard = """
The affix @deva[र्हिल्] attaches to @deva[इदम्] in @deva[सप्तमी] (locative) sense denoting time. This blocks @deva[ह] from @ref[5.3.11]. The @deva[ल्] is @deva[इत्] for accent. By @ref[5.3.4], @deva[इदम्] → @deva[एत] before @deva[र]-initial affixes, giving @deva[एतर्हि] (at this time).
"""

advanced = """
The affix @deva[र्हिल्] is @deva[अपवाद] to @deva[ह] (@ref[5.3.11]) after @deva[इदम्] in @deva[सप्तम्यर्थे काले]. The @deva[लकार] is @deva[उच्चारणार्थ] for accent (@deva[स्वर]). By @ref[5.3.4], @deva[रादि प्राग्दिशीय] triggers @deva[इदम्] → @deva[एत]. Derivation: @deva[इदम्] → @deva[एत] + @deva[र्हि] → @deva[एतर्हि] 'now, at this time'. The condition @deva[काले] distinguishes from @deva[इह] (place).
"""

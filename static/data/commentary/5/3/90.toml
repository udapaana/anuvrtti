id = "5.3.90"
numericId = "53090"

[en]
simple = """
The affix @deva[ष्टरच्] (becoming @deva[तर], feminine @deva[तरी]) comes after @deva[कासू] (lance) and @deva[गोणी] (sack) to express small size. Examples: @deva[कासूतरी] (small lance), @deva[गोणीतरी] (small sack).
"""

standard = """
The affix @deva[ष्टरच्] (@deva[तर]) replaces @deva[क] after @deva[कासू] and @deva[गोणी] in @deva[ह्रस्वार्थ]. The feminine is formed with @deva[ङीष्] by @ref[4.1.40]. Examples: @deva[ह्रस्वा कासूः] = @deva[कासूतरी] (small lance); @deva[ह्रस्वा गोणी] = @deva[गोणीतरी] (small sack).
"""

advanced = """
The affix @deva[ष्टरच्]: @deva[ष्] triggers @deva[वृद्धि] (inapplicable here); @deva[ट्] indicates @deva[ङीप्] feminine (but @ref[4.1.40] @deva[अन्यतो ङीष्] applies instead). @deva[तर] remains. Results: @deva[कासूतरी] (small lance—feminine); @deva[गोणीतरी] (small sack—feminine).
"""

id = "5.3.85"
numericId = "53085"

[en]
simple = """
The affixes @deva[क] etc. come to express smallness of quantity or number. Examples: @deva[तैलकम्] (a little oil), @deva[घृतकम्] (a little ghee), @deva[पचतकि] (cooks a little).
"""

standard = """
The affixes @deva[क] (@ref[5.3.70]) and related affixes express @deva[अल्पता] (small quantity/number). Examples: @deva[अल्पं तैलं] = @deva[तैलकम्] (a little oil); @deva[सर्वकम्], @deva[घृतकम्]; @deva[उच्चकैः] (somewhat high), @deva[नीचकैः] (somewhat low); @deva[पचतकि] (cooks a little), @deva[जल्पतकि] (speaks somewhat).
"""

advanced = """
This @deva[स्वार्थिक] use expresses @deva[अल्पीयस्त्व] (diminished quantity/degree). @deva[क] applies to nominals: @deva[तैलकम्], @deva[घृतकम्]. @deva[अकच्] applies to @deva[अव्यय/सर्वनामन्/तिङ्]: @deva[उच्चकैः], @deva[पचतकि]. The meaning shifts from 'some' to 'a little of'—a quantitative diminutive.
"""

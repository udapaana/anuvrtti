id = "5.3.80"
numericId = "53080"

[en]
simple = """
According to Eastern grammarians, @deva[अडच्] and @deva[वुच्] also come after human names beginning with @deva[उप]. Example: @deva[उपेन्द्रदत्त] → @deva[उपडः] (@deva[अडच्]), @deva[उपकः] (@deva[वुच्]).
"""

standard = """
Per @deva[प्राचाम्] (Eastern grammarians), @deva[अडच्] (@deva[अड]) and @deva[वुच्] (@deva[अक]) also apply to human names beginning with @deva[उप]. The @deva[चकार] includes previous affixes. From @deva[उपेन्द्रदत्त]: @deva[उपेन्द्रदत्तकः] (@deva[कन्]), @deva[उपिकः] (@deva[ठच्]), @deva[उपिलः] (@deva[इलच्]), @deva[उपियः] (@deva[घन्]), @deva[उपकः] (@deva[वुच्]), @deva[उपडः] (@deva[अडच्]).
"""

advanced = """
The @deva[प्राचाम्] marker indicates Eastern grammatical opinion. @deva[अडच्] → @deva[अड] and @deva[वुच्] → @deva[अक] are additional options for @deva[उपादि मनुष्यनामन्]. @deva[प्राचाम्] is @deva[पूजार्थ] (respectful citation), since @deva[वा] was already understood from @ref[5.3.78]. Shortening by @ref[5.3.83] applies. Full paradigm from @deva[उपेन्द्रदत्त]: six forms.
"""

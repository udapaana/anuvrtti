id = "5.3.82"
numericId = "53082"

[en]
simple = """
When a human name ends in @deva[अजिन] (skin), @deva[कन्] is added and @deva[अजिन] is deleted. Examples: @deva[व्याघ्राजिनः] → @deva[व्याघ्रकः]; @deva[सिंहाजिनः] → @deva[सिंहकः].
"""

standard = """
After human names ending in @deva[अजिन] (animal skin), the affix @deva[कन्] is added with @deva[लोप] (deletion) of @deva[अजिन], expressing compassion. @deva[व्याघ्राजिन] and @deva[सिंहाजिन] are human names. Examples: @deva[व्याघ्राजिनः] → @deva[व्याघ्रकः]; @deva[सिंहाजिनः] → @deva[सिंहकः].
"""

advanced = """
This @deva[लोप]-rule deletes @deva[अजिन] before @deva[कन्] in @deva[अनुकम्पार्थ]. @deva[कन्] and @deva[मनुष्यनाम्नः] are understood from context. @deva[व्याघ्राजिन] (tiger-skin, as a name) → @deva[व्याघ्र] + @deva[क] → @deva[व्याघ्रकः]. This produces the same surface form as @ref[5.3.81], but the underlying derivation differs.
"""

id = "5.3.7"
numericId = "53007"

[en]
simple = """
The affix @deva[तसिल्] (becoming @deva[तस्]) comes after @deva[किम्], pronouns, and @deva[बहु] when ablative (fifth case) sense is meant. Examples: @deva[कुतः] (from where), @deva[ततः] (from there), @deva[यतः] (from which).
"""

standard = """
The affix @deva[तसिल्] is added after @deva[किम्], @deva[सर्वनामन्], and @deva[बहु] in ablative sense. The @deva[इल्] is @deva[इत्], leaving @deva[तस्]. By @ref[7.2.102-104], stem changes occur: @deva[किम्] → @deva[कु] → @deva[कुतः]; @deva[तद्] → @deva[त] → @deva[ततः]; @deva[यद्] → @deva[य] → @deva[यतः].
"""

advanced = """
The affix @deva[तसिल्] attaches to @deva[किम्], @deva[सर्वनामन्], and @deva[बहु] when @deva[पञ्चमी] (ablative) sense is expressed. The @deva[इल्] is @deva[इत्] by @ref[1.3.3], and @deva[सिल्] indicates @deva[सर्वादेश] of @deva[सुप्] by @ref[1.1.63]. Stem modifications: @deva[किम्] → @deva[कु] by @ref[7.2.104]; @deva[तद्]/deva[@deva[यद्]] → @deva[त]/deva[@deva[य]] by @ref[7.2.102-103]. Results: @deva[कुतः], @deva[ततः], @deva[यतः], @deva[सर्वतः], @deva[बहुतः].
"""

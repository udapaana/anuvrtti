id = "5.3.70"
numericId = "53070"

[en]
simple = """
The affix @deva[क] is understood in all @[sūtras] up to @ref[5.3.96] @deva[इवे प्रतिकृतौ]. This @deva[क] does not come after verbs; @deva[अकच्] (@ref[5.3.71]) comes after verbs instead.
"""

standard = """
The affix @deva[क] governs as @deva[अधिकार] (heading) through @ref[5.3.96] (technically through @ref[5.3.86]). Example: @deva[अश्वकः], @deva[गर्दभकः]. This @deva[क] does not apply after @deva[तिङन्त] (verbs)—for verbs, @deva[अकच्] (@ref[5.3.71]) applies. The @deva[तिङश्च] (@ref[5.3.56]) should connect with @ref[5.3.71], not this @[sūtra].
"""

advanced = """
This @deva[अधिकारसूत्र] establishes @deva[क] as the default affix through @ref[5.3.96] (or @ref[5.3.86] per some). The @deva[क] applies to @deva[प्रातिपदिक]/deva[@deva[सुबन्त]] only. The @deva[अनुवृत्ति] of @deva[तिङश्च] from @ref[5.3.56] connects with @ref[5.3.71] (@deva[अकच्]), not here—verbs take @deva[अकच्], not @deva[क].
"""

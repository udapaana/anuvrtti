id = "5.3.69"
numericId = "53069"

[en]
simple = """
The affix @deva[जातीयर्] (becoming @deva[जातीय]) comes after a declined noun expressing 'type' or 'kind.' Examples: @deva[पटुजातीयः] (of the clever type, reckoned among clever people).
"""

standard = """
The affix @deva[जातीयर्] (@deva[जातीय]) attaches to @deva[सुबन्त] (declined nouns) expressing @deva[प्रकार] (type/specialty). It means 'belonging to the class of.' Examples: @deva[पटुजातीयः] (one who may be reckoned among clever people); @deva[मृदुजातीयः], @deva[दर्शनीयजातीयः]. Unlike @deva[थाल्] (@ref[5.3.23]) which denotes manner itself, @deva[जातीयर्] denotes one possessing that type.
"""

advanced = """
The affix @deva[जातीयर्] expresses @deva[प्रकारवचन]—having the @deva[प्रकार] (distinguishing quality). Distinction from @deva[थाल्] (@ref[5.3.23]): @deva[जातीयर्] = @deva[प्रकारवान्] (one possessing the type); @deva[थाल्] = @deva[प्रकारमात्र] (the manner itself). @deva[पटुजातीयः] = 'belonging to the class of clever people.' @deva[प्रकार] = that which distinguishes one thing from another.
"""

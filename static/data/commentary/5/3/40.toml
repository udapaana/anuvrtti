id = "5.3.40"
numericId = "53040"

[en]
simple = """
The same stem substitutions (@deva[पुर्], @deva[अध्], @deva[अव्]) occur when the affix @deva[अस्ताति] follows. Examples: @deva[पुरस्तात्] (in front), @deva[अधस्तात्] (below), @deva[अवस्तात्] (down).
"""

standard = """
When @deva[अस्ताति] follows, the same substitutions apply: @deva[पूर्व] → @deva[पुर्], @deva[अधर] → @deva[अध्], @deva[अवर] → @deva[अव्]. This implies @deva[अस्ताति] is not blocked by @deva[असि]. Examples: @deva[पुरस्तात् वसति], @deva[पुरस्तादागतः]; @deva[अधस्तात्], @deva[अवस्तात्].
"""

advanced = """
This @[sūtra] confirms @deva[अस्ताति] (@ref[5.3.27]) coexists with @deva[असि] after these bases—@deva[असि] is not an exclusive @deva[अपवाद]. The substitutions @deva[पुर्]/deva[@deva[अध्]]/deva[@deva[अव्]] apply uniformly. @deva[जञापक]: the need to state this implies both affixes are valid options. Forms: @deva[पुरस्तात्]/deva[@deva[पुरस्]], @deva[अधस्तात्]/deva[@deva[अधस्]], @deva[अवस्तात्]/deva[@deva[अवस्]].
"""

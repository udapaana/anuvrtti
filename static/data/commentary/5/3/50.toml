id = "5.3.50"
numericId = "53050"

[en]
simple = """
After @deva[षष्ठ] (sixth) and @deva[अष्टम] (eighth), both @deva[ञ] (causing @deva[वृद्धि]) and @deva[अन्] come for 'part' meaning (not in Vedic). Examples: @deva[षष्ठः] or @deva[षाष्ठः] (one-sixth); @deva[अष्टमः] or @deva[आष्टमः] (one-eighth).
"""

standard = """
The affixes @deva[ञ] (@deva[अ] with @deva[वृद्धि]) and @deva[अन्] come after @deva[षष्ठ] and @deva[अष्टम] in @deva[भाग] meaning (non-Vedic). @deva[ञ] triggers @deva[वृद्धि]: @deva[षष्ठ] → @deva[षाष्ठः]; @deva[अष्टम] → @deva[आष्टमः]. With @deva[अन्]: @deva[षष्ठः], @deva[अष्टमः] (accent-shifted).
"""

advanced = """
This teaches @deva[ञ] alongside @deva[अन्] for @deva[षष्ठ]/deva[@deva[अष्टम]] in @deva[भागार्थ अछन्दसि]. The @deva[ञकार] triggers @deva[वृद्धि] by @ref[7.2.117]: @deva[षष्ठ] → @deva[षाष्ठः]; @deva[अष्टम] → @deva[आष्टमः]. The @deva[चकार] draws in @deva[अन्]. Both options are valid: @deva[षष्ठः]/deva[@deva[षाष्ठः]], @deva[अष्टमः]/deva[@deva[आष्टमः]].
"""

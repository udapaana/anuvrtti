id = "5.3.111"
numericId = "53111"

[en]
simple = """
In Vedic, the affix @deva[थाल्] comes after @deva[प्रत्न] (ancient), @deva[पूर्व] (previous), @deva[विश्व] (all), and @deva[इम] (@deva[इदम्]) in the sense of 'like this.' Example: @deva[प्रत्नथा पूर्वथा विश्वथेमथा] (as the ancients, as predecessors, as all, as these).
"""

standard = """
In @deva[छन्दस्] (Vedic), the affix @deva[थाल्] (@deva[था]) attaches to @deva[प्रत्न], @deva[पूर्व], @deva[विश्व], and @deva[इम] (= @deva[इदम्]) expressing @deva[इव] (resemblance/manner). Vedic example: @deva[तं प्रत्नथा पूर्वथा विश्वथेमथा ज्येष्ठताति बर्हिषदं स्वर्विदम्] (@[ṛg] Veda V.44.1)—'Him, as the ancients, as predecessors, as all beings, and as these living men have worshipped.'
"""

advanced = """
This @deva[छन्दस्] rule extends @deva[थाल्] (@ref[5.3.23]) to four words in @deva[इवार्थ]. @deva[थाल्] → @deva[था]. Forms: @deva[प्रत्नथा] (as the ancients), @deva[पूर्वथा] (as predecessors), @deva[विश्वथा] (as all), @deva[इमथा] (as these). The Vedic citation shows all four in sequence.
"""

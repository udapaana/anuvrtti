id = "5.3.9"
numericId = "53009"

[en]
simple = """
The affix @deva[तसिल्] also comes after @deva[परि] (all around) and @deva[अभि] (on both sides). Examples: @deva[परितः] (all around), @deva[अभितः] (on both sides).
"""

standard = """
The affix @deva[तसिल्] attaches to @deva[परि] (meaning 'all') and @deva[अभि] (meaning 'both sides'). This extends beyond the @deva[किम्]/deva[@deva[सर्वनामन्]]/deva[@deva[बहु]] scope of @ref[5.3.7]. Examples: @deva[परितः] = @deva[सर्वतः] (all round); @deva[अभितः] (on both sides).
"""

advanced = """
The @deva[चकार] in this @[sūtra] extends @deva[तसिल्] beyond the three bases of @ref[5.3.7] to include @deva[परि] and @deva[अभि]. Semantically, @deva[परि] here means @deva[सर्व] (totality), and @deva[अभि] means @deva[उभय] (duality). Thus @deva[ग्रामं परितः] = 'all around the village'; @deva[ग्रामम् अभितः] = 'on both sides of the village'.
"""

id = "5.3.88"
numericId = "53088"

[en]
simple = """
The affix @deva[र] comes after @deva[कुटी] (hut), @deva[शमी] (acacia), and @deva[शुण्डा] (elephant's trunk) to express small size. Examples: @deva[कुटीरः] (small hut), @deva[शमीरः], @deva[शुण्डारः]. The results are masculine.
"""

standard = """
The affix @deva[र] replaces @deva[क] after @deva[कुटी], @deva[शमी], and @deva[शुण्डा] in @deva[ह्रस्वार्थ] (smallness). The @deva[संज्ञा] condition doesn't apply here. Examples: @deva[ह्रस्वा कुटी] = @deva[कुटीरः] (small hut); @deva[शमीरः] (small acacia); @deva[शुण्डारः] (small trunk). The derivatives become masculine despite feminine primitives.
"""

advanced = """
This @deva[अपवाद] teaches @deva[र] for three specific words in @deva[ह्रस्वार्थ]. The @deva[संज्ञायाम्] from @ref[5.3.87] doesn't continue—these are descriptive, not names. Gender shift: @deva[कुटी] (fem.) → @deva[कुटीरः] (masc.). This @deva[र]-affix is distinct from other @deva[र]-affixes in the grammar.
"""

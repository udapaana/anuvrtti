id = "5.3.24"
numericId = "53024"

[en]
simple = """
The affix @deva[थमु] comes after @deva[इदम्] to denote manner, blocking @deva[थाल्]. Example: @deva[इदम्] + @deva[थमु] → @deva[इत्थम्] (in this manner, thus).
"""

standard = """
The affix @deva[थमु] (@deva[थम्]) replaces @deva[थाल्] after @deva[इदम्] in @deva[प्रकार] sense. The @deva[उ] protects @deva[म्] from becoming @deva[इत्] (see @ref[1.3.4]). By @ref[5.3.4], @deva[इदम्] → @deva[इत] before @deva[थ]-initial, giving @deva[इत्थम्] (in this manner).
"""

advanced = """
The affix @deva[थमु] is @deva[अपवाद] to @deva[थाल्] after @deva[इदम्] in @deva[प्रकारार्थ]. The @deva[उकार] is @deva[इत्संज्ञाप्रतिषेधार्थ]—preventing @deva[म्] from being @deva[इत्] by @ref[1.3.4] @deva[न विभक्तौ तुस्माः]. By @ref[5.3.4], @deva[थादि प्राग्दिशीय] triggers @deva[इदम्] → @deva[इत]. Derivation: @deva[इदम्] → @deva[इत्] + @deva[थम्] → @deva[इत्थम्] 'thus'.
"""

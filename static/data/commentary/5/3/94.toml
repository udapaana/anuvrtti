id = "5.3.94"
numericId = "53094"

[en]
simple = """
According to Eastern grammarians, @deva[डतरच्] and @deva[डतमच्] also come after @deva[एक] (one) for specification. Examples: @deva[एकतरः] (one of two), @deva[एकतमः] (one of many).
"""

standard = """
Per @deva[प्राचाम्] (Eastern grammarians), @deva[डतरच्] and @deva[डतमच्] also apply to @deva[एक] for specification: @deva[डतरच्] for one from two, @deva[डतमच्] for one from many. The @deva[जातिपरिप्रश्न] restriction doesn't apply here. Examples: @deva[एकतरो भवतोर्देवदत्तः] (one of you two is Devadatta); @deva[एकतमो भवतां देवदत्तः] (one of you all is Devadatta).
"""

advanced = """
This extends @deva[डतरच्]/deva[@deva[डतमच्]] to @deva[एक] per Eastern opinion. @deva[प्राचाम्] is @deva[पूजार्थ] (respectful citation) since @deva[वा] was already understood. The @deva[जातिपरिप्रश्न] condition from @ref[5.3.93] doesn't continue—this is a general rule for @deva[एक]. @deva[चकार] draws in @deva[डतरच्] alongside @deva[डतमच्].
"""

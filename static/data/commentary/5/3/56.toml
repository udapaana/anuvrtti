id = "5.3.56"
numericId = "53056"

[en]
simple = """
The affix @deva[तमप्] also comes after a finite verb to express 'surpassing.' Example: @deva[पचतितमाम्] (cooks surprisingly well).
"""

standard = """
The affix @deva[तमप्] (@deva[तम]) also applies after @deva[तिङन्त] (finite verbs) for @deva[अतिशायन]. Since @ref[4.1.1] @deva[ङ्याप्प्रातिपदिकात्] restricts taddhitas to nominals, this @[sūtra] extends @deva[तमप्] to verbs. @deva[आम्] is added by @ref[5.4.11]. Example: @deva[पचतितमाम्] (he cooks most excellently). @deva[इष्ठन्] never comes after verbs (restricted to adjectives by @ref[5.3.58]).
"""

advanced = """
This extends @deva[तमप्] beyond @deva[प्रातिपदिक] to @deva[तिङन्त] (conjugated verbs). By @ref[4.1.1], taddhitas normally follow only nominals; this @[sūtra] overrides that. @deva[आम्] is mandated by @ref[5.4.11] after @deva[तिङ्] + @deva[तम]. Example: @deva[सर्व इमे पचन्ति, अयमेषामतिशयेन पचति] = @deva[पचतितमाम्]. @deva[इष्ठन्] is excluded by @ref[5.3.58] (@deva[गुणवचन]-restriction).
"""

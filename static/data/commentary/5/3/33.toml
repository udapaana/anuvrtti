id = "5.3.33"
numericId = "53033"

[en]
simple = """
In Vedic usage, @deva[पश्च] and @deva[पश्चा] are irregular forms alongside @deva[पश्चात्], all meaning 'behind/after/westward.'
"""

standard = """
In @deva[छन्दस्] (Vedic texts), @deva[पश्च] and @deva[पश्चा] are @deva[निपातन] with @deva[अस्ताति]-force. The @deva[चकार] includes @deva[पश्चात्]. Example: @deva[पुरा व्याघ्रो जायते, पश्च/पश्चा/पश्चात् सिंहः] 'first a tiger is born, then a lion.' Vedic: @deva[पश्चात् पुरस्तादधरादुदक्तात्] (@[ṛg] Veda X.87.21).
"""

advanced = """
This @deva[छन्दस्] rule adds @deva[पश्च] and @deva[पश्चा] as @deva[निपातन] with @deva[अस्ताति]-sense. The @deva[चकार] draws in @deva[पश्चात्] from @ref[5.3.32]. Vedic attestations: @deva[पश्चात् पुरस्तादधरादुदक्तात्] (@[ṛg] Veda X.87.21); @deva[पश्चेदमन्यदभवद्यज्जात्रम्] (@[ṛg] Veda X.149.3). All three variants (@deva[पश्च], @deva[पश्चा], @deva[पश्चात्]) appear in Vedic texts.
"""

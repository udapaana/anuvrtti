id = "5.3.11"
numericId = "53011"

[en]
simple = """
The affix @deva[ह] comes after @deva[इदम्] (this) in locative sense, blocking @deva[त्रल्]. Example: @deva[इदम्] + @deva[ह] → @deva[इह] (here).
"""

standard = """
The affix @deva[ह] replaces @deva[त्रल्] after @deva[इदम्] in locative sense. By @ref[5.3.3], @deva[इदम्] → @deva[इ], giving @deva[इह] (here). This @deva[ह] is an @deva[अपवाद] (exception) to the general @deva[त्रल्] rule @ref[5.3.10].
"""

advanced = """
The affix @deva[ह] is @deva[अपवाद] to @deva[त्रल्] specifically after @deva[इदम्] in @deva[सप्तम्यर्थ]. The base undergoes @deva[इश्]-substitution by @ref[5.3.3]: @deva[इदम्] → @deva[इ] + @deva[ह] → @deva[इह]. Since @deva[ह] is @deva[प्राग्दिशीय], it bears @deva[विभक्ति] @deva[संज्ञा] and the operations thereof.
"""

id = "5.3.5"
numericId = "53005"

[en]
simple = """
@deva[एतद्] (that) becomes @deva[अ] when a @deva[प्राग्दिशीय] affix follows. For example, @deva[एतद्] + @deva[त्र] → @deva[अत्र] (there).
"""

standard = """
The substitute @deva[अश्] replaces @deva[एतद्] before @deva[प्राग्दिशीय] affixes. The @deva[श्] marks @deva[सर्वादेश] by @ref[1.1.55]. Thus @deva[एतद्] + @deva[त्रल्] → @deva[अत्र] (there); @deva[एतद्] + @deva[तसिल्] → @deva[अतः] (from there).
"""

advanced = """
The @deva[आदेश] @deva[अश्] replaces @deva[एतद्] before @deva[प्राग्दिशीय] affixes. By @ref[1.1.55], the @deva[शित्] marker triggers @deva[सर्वादेश]. According to @[patañjali], @deva[एतद्] alone undergoes this substitution, not @deva[एत] (which is itself a substitute for @deva[इदम्]). This yields @deva[अत्र], @deva[अतः], @deva[अदा] etc.
"""

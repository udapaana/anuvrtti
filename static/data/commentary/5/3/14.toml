[en]
simple = """
These @deva[प्राग्दिशीय] affixes are also seen after @deva[किम्], pronouns, and @deva[बहु] with case-meanings other than just locative and @deva[पञ्चमी] (ablative). This accounts for exceptional Vedic and irregular forms.
"""

standard = """
The @deva[प्राग्दिशीय] affixes appear after @deva[किम्], @deva[सर्वनामन्], and @deva[बहु] with case-meanings beyond the seventh (locative) and fifth (ablative). This is an @deva[उपसंख्यान] (supplementary rule) accounting for usages like @deva[भवत्त्रयम्] etc.
"""

advanced = """
This @deva[उपसंख्यान] extends the @deva[प्राग्दिशीय] domain to @deva[विभक्ति]-senses beyond @deva[सप्तमी]/deva[@deva[पञ्चमी]]. Forms like @deva[भवत्त्रयम्] 'your three' show @deva[त्रय] after honorific @deva[भवत्]. The rule legitimizes @deva[आर्ष] (archaic) and @deva[प्रयोगदर्शन] (usage-based) forms outside the standard @deva[विधि].
"""

id = "5.3.100"
numericId = "53100"

[en]
simple = """
After @deva[देवपथ] and similar words, @deva[कन्] is deleted when expressing imitation or as a name. This is an @deva[आकृतिगण] (open class). Examples: @deva[देवपथः] (path-like-sky), @deva[हंसपथः].
"""

standard = """
After @deva[देवपथादि] (an @deva[आकृतिगण]), @deva[कन्] undergoes @deva[लुप्] in @deva[इव] (resemblance) and @deva[संज्ञा] (name) senses. The class includes: @deva[देवपथ], @deva[हंसपथ], @deva[वारिपथ], @deva[रथपथ], @deva[राजपथ], @deva[शतपथ], etc. @[kārikā]: @deva[लुप्] also applies to worshipped images, paintings, and flag-emblems: @deva[शिवः], @deva[विष्णुः] (gods); @deva[अर्जुनः], @deva[दुर्योधनः] (paintings); @deva[कपिः], @deva[गरुडः] (flag-emblems).
"""

advanced = """
The @deva[देवपथादि] is @deva[आकृतिगण] (open/extensible class). @[kārikā] specifies three additional contexts for @deva[कन्-लोप]: (1) @deva[पूजनार्था अर्चाः] (worshipped images); (2) @deva[चित्रकर्म] (paintings); (3) @deva[ध्वज] (flag-emblems). Examples: @deva[शिवः] (@[śiva] image); @deva[अर्जुनः] (Arjuna painting); @deva[कपिध्वजः] (monkey-flag of Arjuna).
"""

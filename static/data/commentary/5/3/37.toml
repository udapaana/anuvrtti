id = "5.3.37"
numericId = "53037"

[en]
simple = """
The affix @deva[आहि] comes after @deva[दक्षिण] when the reference is distant, alongside @deva[आच्]. Examples: @deva[दक्षिणाहि वसति] or @deva[दक्षिणा वसति] (lives far away in the south).
"""

standard = """
The affix @deva[आहि] and @deva[आच्] come after @deva[दक्षिण] when the location is distant (@deva[दूर]). Examples: @deva[दक्षिणाहि वसति] or @deva[दक्षिणा वसति] (lives far southward). When not distant, @deva[दक्षिणतो वसति] applies. The @deva[अपञ्चमी] condition continues: @deva[दक्षिणत आगतः].
"""

advanced = """
This teaches @deva[आहि] alongside @deva[आच्] after @deva[दक्षिण] specifically in @deva[दूर] (distant) contexts. The doublet @deva[दक्षिणाहि]/deva[@deva[दक्षिणा]] occurs in locative/nominative senses only (@deva[अपञ्चमी] continues). For nearby references, other affixes (@deva[एनप्], @deva[अतसुच्]) apply. Ablative remains @deva[दक्षिणतः].
"""

id = "5.3.27"
numericId = "53027"

[en]
simple = """
The affix @deva[अस्ताति] (becoming @deva[अस्तात्]) comes after direction-words in locative, ablative, or nominative sense without changing meaning. Examples: @deva[पुरस्तात्] (in the east / from the east / previously).
"""

standard = """
The affix @deva[अस्ताति] (@deva[अस्तात्]) attaches to @deva[दिक्शब्द] (direction-words) in @deva[सप्तमी] (locative), @deva[पञ्चमी] (ablative), or @deva[प्रथमा] (nominative) senses denoting direction, place, or time. This is @deva[स्वार्थिक] (same-meaning). Examples: @deva[पुरस्तात् वसति] (lives eastward); @deva[पुरस्तात् आगतः] (came from east); @deva[पुरस्तात् रमणीयम्] (it was pleasant before).
"""

advanced = """
The affix @deva[अस्ताति] applies to primitive @deva[दिक्शब्द] (direction-words)—not derivatives like @deva[ऐन्द्री]—when expressing @deva[दिक्], @deva[देश], or @deva[काल] in @deva[सप्तमी/पञ्चमी/प्रथमा] senses. This is @deva[स्वार्थिक] like preceding affixes. @deva[यथासंख्य] (one-to-one correspondence) does not apply—any case with any meaning is valid. Non-application: @deva[पूर्वस्मिन् गुरौ] (metaphorical 'first guru').
"""

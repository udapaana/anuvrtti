id = "5.3.10"
numericId = "53010"

[en]
simple = """
The affix @deva[त्रल्] comes after @deva[किम्], pronouns, and @deva[बहु] when locative (seventh case) sense is meant. Examples: @deva[कुत्र] (where), @deva[तत्र] (there), @deva[बहुत्र] (in many places).
"""

standard = """
The affix @deva[त्रल्] is added after @deva[किम्], @deva[सर्वनामन्], and @deva[बहु] in locative sense. The @deva[ल्] is @deva[इत्], leaving @deva[त्र]. Stem changes by @ref[7.2.102-104]: @deva[कुत्र] (where), @deva[तत्र] (there), @deva[यत्र] (where/which), @deva[सर्वत्र] (everywhere), @deva[बहुत्र] (in many places).
"""

advanced = """
The affix @deva[त्रल्] with @deva[लकार इत्] attaches to @deva[किम्], @deva[सर्वनामन्], and @deva[बहु] for @deva[सप्तमी] (locative) sense. Being @deva[प्राग्दिशीय], it receives @deva[विभक्ति] @deva[संज्ञा]. The @deva[त्र] replaces the entire @deva[सुप्] by @ref[1.1.63] @deva[सुप्तिङन्तं पदम्]. Stem modifications follow @ref[7.2.102-104] as with @deva[तसिल्].
"""

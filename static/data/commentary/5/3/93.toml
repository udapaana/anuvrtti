id = "5.3.93"
numericId = "53093"

[en]
simple = """
The affix @deva[डतमच्] (becoming @deva[अतम]) optionally comes after @deva[किम्], @deva[यद्], and @deva[तद्] when determining one out of many, especially regarding caste. Examples: @deva[कतमः] (which of many), @deva[यतमः], @deva[ततमः].
"""

standard = """
The affix @deva[डतमच्] (@deva[अतम]) optionally attaches to @deva[किम्], @deva[यद्], and @deva[तद्] for @deva[निर्धारण] (specification) of one from many when @deva[जाति] (caste/class) is questioned. Examples: @deva[कतमो भवतां कठः] (which of you all is a @[kaṭha]?). @deva[वा] indicates @deva[अकच्] also applies: @deva[यको भवतां कठः]. @deva[जातिपरिप्रश्न] applies to @deva[किम्] specifically.
"""

advanced = """
This teaches @deva[डतमच्] for @deva[बहूनां निर्धारण] (specification from many) with @deva[जातिपरिप्रश्न] (caste-inquiry). @deva[विकल्प] allows @deva[अकच्]: @deva[यकः], @deva[तकः]. The @deva[जाति] condition applies to questioning (@deva[परिप्रश्न]) with @deva[किम्]; @deva[यद्]/deva[@deva[तद्]] aren't interrogative but still take @deva[जाति]-sense. Some hold @deva[डतरच्] also applies per @ref[4.1.63] @deva[कतरकतमौ जातिपरिप्रश्ने].
"""

id = "5.3.61"
numericId = "53061"

[en]
simple = """
The word @deva[प्रशस्य] (praiseworthy) also becomes @deva[ज्य] before @deva[इष्ठन्] and @deva[ईयसुन्]. Examples: @deva[ज्येष्ठः] (best/eldest), @deva[ज्यायान्] (better/elder).
"""

standard = """
In addition to @deva[श्र] (@ref[5.3.60]), @deva[प्रशस्य] is also replaced by @deva[ज्य] before @deva[इष्ठन्] and @deva[ईयसुन्]. The @deva[ई] of @deva[ईयस्] becomes @deva[आ] by @ref[6.4.160]. Forms: @deva[ज्येष्ठः] (best, eldest); @deva[ज्यायान्] (better, elder).
"""

advanced = """
This provides an alternative @deva[आदेश]: @deva[प्रशस्य] → @deva[ज्य] before @deva[अजादि] affixes. By @ref[6.4.160], @deva[ईयस्] → @deva[आयस्] after @deva[ज्य]: @deva[ज्य] + @deva[ईयस्] → @deva[ज्यायस्] → @deva[ज्यायान्]. Thus from @deva[प्रशस्य]: @deva[श्रेष्ठः]/deva[@deva[ज्येष्ठः]] (superlative); @deva[श्रेयान्]/deva[@deva[ज्यायान्]] (comparative). Context determines usage (age vs. quality).
"""

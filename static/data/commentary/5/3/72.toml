id = "5.3.72"
numericId = "53072"

[en]
simple = """
When @deva[अकच्] is added to an indeclinable ending in @deva[क्], that @deva[क्] becomes @deva[द्]. Examples: @deva[धिक्] → @deva[धकित्]; @deva[हिरुक्] → @deva[हिरकुत्]; @deva[पृथक्] → @deva[पृथकत्].
"""

standard = """
When @deva[अकच्] (@deva[अक्]) is added to @deva[अव्यय] (indeclinables) ending in @deva[क्], the final @deva[क्] is replaced by @deva[द्]. No pronoun ends in @deva[क्], so this applies only to indeclinables. Examples: @deva[धिक्] + @deva[अक्] → @deva[धकित्]/deva[@deva[धकिद्]]; @deva[हिरुक्] → @deva[हिरकुत्]; @deva[पृथक्] → @deva[पृथकत्].
"""

advanced = """
This @deva[आदेश] teaches @deva[क्] → @deva[द्] for @deva[अव्ययान्त ककार] when @deva[अकच्] follows. The rule applies only to @deva[अव्यय] (no @deva[सर्वनामन्] ends in @deva[क्]). Process: @deva[हिरुक्] + @deva[अक्] → @deva[हिर्] + @deva[अक्] + @deva[उक्] → @deva[हिरकुक्] → @deva[हिरकुद्] (by this rule) → @deva[हिरकुत्] (sentence-final).
"""

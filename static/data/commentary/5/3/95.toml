id = "5.3.95"
numericId = "53095"

[en]
simple = """
The affix @deva[कन्] comes after a stem to express scoffing or derision. Examples: @deva[व्याकरणकः] (mere grammar—mockingly), @deva[याज्ञिक्यकः] (mere ritualism).
"""

standard = """
The affix @deva[कन्] expresses @deva[हास्य] (scoffing, derision) after a stem. Used when knowledge produces pride worthy of mockery. Examples: @deva[व्याकरणकेन नाम त्वं गर्वितः] (you're proud just because you've read grammar!); @deva[याज्ञिक्यकेन नाम त्वं गर्वितः]. This mocks the subject of pride, not the person—@ref[5.3.74] handles personal contempt.
"""

advanced = """
This @deva[हास्यार्थ] (derision) use of @deva[कन्] targets the source of unwarranted pride, not the person. Distinction: @deva[व्याकरणकः] mocks grammar as cause of pride; @deva[देवदत्तकः] (@ref[5.3.74]) mocks Devadatta himself. This concludes the @deva[क]-@deva[अधिकार] from @ref[5.3.70].
"""

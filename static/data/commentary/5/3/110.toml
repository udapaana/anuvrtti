id = "5.3.110"
numericId = "53110"

[en]
simple = """
The affix @deva[ईकक्] (becoming @deva[ईक]) comes after @deva[कर्क] (white horse) and @deva[लोहित] (red) in the sense of 'like this.' Examples: @deva[कार्कीकः] (white-horse-like), @deva[लौहितीकः] (appearing red).
"""

standard = """
The affix @deva[ईकक्] (@deva[ईक]) attaches to @deva[कर्क] and @deva[लोहित] expressing @deva[इव] (resemblance). Examples: @deva[कार्कीकः] (like @deva[कर्क], a white horse); @deva[लौहितीकः स्फटिकः] (a crystal that appears red due to reflection, though not itself red).
"""

advanced = """
The affix @deva[ईकक्] → @deva[ईक] with @deva[वृद्धि]: @deva[कर्क] → @deva[कार्कीक]; @deva[लोहित] → @deva[लौहितीक]. The @deva[लौहितीक] example illustrates apparent resemblance: a transparent crystal appearing red through reflection.
"""

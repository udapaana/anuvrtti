id = "5.3.62"
numericId = "53062"

[en]
simple = """
The word @deva[वृद्ध] (old) also becomes @deva[ज्य] before @deva[इष्ठन्] and @deva[ईयसुन्]. Examples: @deva[ज्येष्ठः] (oldest), @deva[ज्यायान्] (older). Also @deva[वर्षिष्ठः], @deva[वर्षीयान्] by @ref[6.4.157].
"""

standard = """
The substitute @deva[ज्य] also replaces @deva[वृद्ध] (old/senior) before @deva[इष्ठन्] and @deva[ईयसुन्], giving @deva[ज्येष्ठः] (oldest) and @deva[ज्यायान्] (older). By @ref[6.4.157], @deva[वर्षि] also substitutes for @deva[वृद्ध], yielding @deva[वर्षिष्ठः] and @deva[वर्षीयान्]. Though @deva[वृद्ध] is not strictly @deva[गुणवचन], this rule permits the affixes.
"""

advanced = """
This teaches @deva[वृद्ध] → @deva[ज्य] before @deva[अजादि] affixes, yielding @deva[ज्येष्ठः]/deva[@deva[ज्यायान्]]. Alternatively, @ref[6.4.157] provides @deva[वृद्ध] → @deva[वर्षि], yielding @deva[वर्षिष्ठः]/deva[@deva[वर्षीयान्]]. The @deva[ज्ञापक] (implication) is that @deva[वृद्ध], though not @deva[गुणवचन], takes @deva[इष्ठन्]/deva[@deva[ईयसुन्]] by this rule's special provision.
"""

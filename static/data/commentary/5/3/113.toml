id = "5.3.113"
numericId = "53113"

[en]
simple = """
The affix @deva[ञ्य] comes after @deva[व्रात] (wild band) names ending in @deva[च्फञ्], but not in feminine. Examples: @deva[कपोतपाक्यः] (of the pigeon-eaters), plural @deva[कपोतपाकाः]; feminine @deva[कपोतपाकी] (no @deva[ञ्य]).
"""

standard = """
The affix @deva[ञ्य] (@deva[य]) attaches to @deva[व्रात] (wild band living by violence) names ending in @deva[च्फञ्] (@ref[4.1.98]), but not in feminine (@deva[अस्त्रियाम्]). Examples: @deva[कपोतपाक्यः] (wild band living off pigeons), dual @deva[कपोतपाक्यौ], plural @deva[कपोतपाकाः]; @deva[व्रैहिमत्यः], plural @deva[व्रीहिमताः]. Feminines: @deva[कपोतपाकी], @deva[व्रीहिमती], @deva[कौञ्जायनी] (no @deva[ञ्य]).
"""

advanced = """
The @deva[व्रात] = violent band of mixed castes. @deva[ञ्य] applies after @deva[च्फञ्]-ending patronymics when denoting such bands. @deva[अस्त्रियाम्] excludes feminines from taking @deva[ञ्य]—they retain the base form. Plural @deva[लुक्] by @ref[2.4.62]: @deva[कपोतपाकाः].
"""

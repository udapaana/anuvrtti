id = "5.3.17"
numericId = "53017"

[en]
simple = """
The word @deva[अधुना] (now) is an irregular form with the same meaning. Here @deva[इदम्] becomes @deva[अ], and the affix @deva[धुन] is added.
"""

standard = """
The word @deva[अधुना] (at this time, now) is listed as @deva[निपातन] (irregular formation). The substitute @deva[अश्] replaces @deva[इदम्], and the irregular affix @deva[धुन] is added. Meaning: @deva[अस्मिन् काले] = @deva[अधुना] (at this time).
"""

advanced = """
This is @deva[निपातन]—an irregularly formed word requiring special enumeration. The derivation involves @deva[इदम्] → @deva[अश्] (paralleling @ref[5.3.5] for @deva[एतद्]) + @deva[धुन] (an otherwise unattested affix). The form @deva[अधुना] replaces expected @deva[*एतर्हि] or @deva[*इदानीम्] in certain contexts. @deva[अस्मिन् काले] = @deva[अधुना].
"""

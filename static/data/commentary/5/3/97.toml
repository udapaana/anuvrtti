id = "5.3.97"
numericId = "53097"

[en]
simple = """
The affix @deva[कन्] also means 'like this' when the whole word is a name (not an imitation). Examples: @deva[अश्वकः] (something named for resembling a horse), @deva[उष्ट्रकः].
"""

standard = """
When @deva[प्रतिकृति] (imitation) is not meant but the word serves as a @deva[संज्ञा] (name), @deva[कन्] expresses @deva[सादृश्य] (resemblance). Examples: @deva[अश्वसदृशस्य संज्ञा] = @deva[अश्वकः] (something named for horse-like quality); @deva[उष्ट्रकः]; @deva[गर्दभकः]. These are names given due to resemblance, not artificial replicas.
"""

advanced = """
This distinguishes @deva[संज्ञायाम्] use from @deva[प्रतिकृतौ] (@ref[5.3.96]). Here @deva[कन्] applies when the derivative becomes a @deva[संज्ञा] (proper designation) based on resemblance—not an artificial model. @deva[अश्वकः] here = 'something named for resembling a horse' (vs. 'toy horse' in previous @[sūtra]).
"""

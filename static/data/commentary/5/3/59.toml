id = "5.3.59"
numericId = "53059"

[en]
simple = """
In Vedic, the affixes @deva[इष्ठन्] and @deva[ईयसुन्] come after stems ending in @deva[तृ] (agent suffixes). Examples: @deva[करिष्ठः] (most doing), @deva[दोहीयसी] (milking better).
"""

standard = """
In @deva[छन्दस्] (Vedic), @deva[इष्ठन्] and @deva[ईयसुन्] extend to @deva[तृ]-ending stems (@deva[तृन्] or @deva[तृच्] agent nouns), beyond the @deva[गुणवचन] restriction. The @deva[तृ] is elided by @ref[6.4.154]. Examples: @deva[अतिशयेन कर्ता] = @deva[करिष्ठः]; @deva[दोहीयसी धेनुः] (cow that milks better).
"""

advanced = """
This @deva[छन्दस्] rule extends @deva[इष्ठन्]/deva[@deva[ईयसुन्]] to @deva[तृन्न्त/तृजन्त] (agent nouns), overriding @ref[5.3.58]. By @ref[6.4.154], @deva[तृ] is deleted: @deva[कर्तृ] + @deva[इष्ठ] → @deva[कर्] + @deva[इष्ठ] → @deva[करिष्ठः]. Vedic: @deva[आसुर्ति करिष्ठः]. For @deva[दोहीयसी], @[vārttika] under @ref[6.3.35] changes @deva[दोहित्री] to @deva[दोहितृ] before @deva[ईयस्].
"""

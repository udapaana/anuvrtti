id = "5.3.42"
numericId = "53042"

[en]
simple = """
The affix @deva[धा] comes after numeral stems to express manner or way of doing something. Examples: @deva[एकधा] (in one way), @deva[द्विधा] (in two ways), @deva[त्रिधा] (in three ways).
"""

standard = """
The affix @deva[धा] attaches to @deva[संख्या] (numeral) stems to express @deva[विधा] (manner/mode of action). The resulting adverbs apply to any action. Examples: @deva[एकधा भुङ्क्ते] (eats once/in one way); @deva[द्विधा गच्छति] (goes in two ways); @deva[त्रिधा], @deva[चतुर्धा], @deva[पञ्चधा].
"""

advanced = """
The affix @deva[धा] applies to @deva[संख्यावाचक प्रातिपदिक] (numeral stems) in @deva[विधार्थ] (manner-meaning). @deva[विधा] = @deva[प्रकार] (mode/way). These become @deva[क्रियाविशेषण] (adverbs) applicable to all verbs. Unlike @deva[थाल्] (@ref[5.3.23]) which applies to pronouns, @deva[धा] is specifically for numerals.
"""

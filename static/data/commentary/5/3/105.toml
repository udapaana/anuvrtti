id = "5.3.105"
numericId = "53105"

[en]
simple = """
The affix @deva[छ] comes after @deva[कुशाग्र] (tip of @[kuśa] grass) in the sense of 'like this.' Examples: @deva[कुशाग्रीया बुद्धिः] (intellect sharp as @[kuśa-tip]), @deva[कुशाग्रीयं शस्त्रम्] (weapon sharp as @[kuśa-tip]).
"""

standard = """
The affix @deva[छ] (@deva[ईय]) attaches to @deva[कुशाग्र] (tip of @[kuśa] grass) expressing @deva[इव] (resemblance). The comparison is to the sharpness/fineness of @[kuśa-tips]. Examples: @deva[कुशाग्रमिव सूक्ष्मत्वात्] = @deva[कुशाग्रीया बुद्धिः] (razor-sharp intellect); @deva[कुशाग्रीयं शस्त्रम्] (extremely sharp weapon).
"""

advanced = """
The affix @deva[छ] → @deva[ईय]. @deva[कुशाग्र] (tip of @deva[कुश] grass) is proverbially fine/sharp. @deva[कुशाग्रीय] describes things resembling @[kuśa-tip] in @deva[सूक्ष्मत्व] (fineness/sharpness). Common usage: @deva[कुशाग्रीया बुद्धिः] = extremely sharp, penetrating intellect.
"""

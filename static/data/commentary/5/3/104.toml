id = "5.3.104"
numericId = "53104"

[en]
simple = """
The word @deva[द्रव्य] is an irregular formation meaning 'beautiful' or 'excellent.' Example: @deva[द्रव्योऽयं राजपुत्रः] (how excellent this prince is!).
"""

standard = """
The word @deva[द्रव्य] is @deva[निपातन] (irregular), formed from @deva[द्रु] + @deva[यत्], meaning @deva[भव्य] (beautiful, excellent, proper, fit). Examples: @deva[द्रव्योऽयं राजपुत्रः] (this prince is excellent!); @deva[द्रव्योऽयं माणवकः] (this young man is excellent!).
"""

advanced = """
This @deva[निपातन] teaches @deva[द्रव्य] as irregular. Derivation: @deva[द्रु] + @deva[यत्] → @deva[द्रव्य]. Meaning: @deva[भव्य] = nice, excellent, proper, having all desired qualities. Not the common meaning 'substance/wealth' but an archaic adjectival sense expressing admiration.
"""

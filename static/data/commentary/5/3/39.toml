id = "5.3.39"
numericId = "53039"

[en]
simple = """
The affix @deva[असि] (becoming @deva[अस्]) comes after @deva[पूर्व], @deva[अधर], and @deva[अवर], which become @deva[पुर्], @deva[अध्], and @deva[अव्] respectively. Examples: @deva[पुरः] (in front), @deva[अधः] (below), @deva[अवः] (down).
"""

standard = """
The affix @deva[असि] (@deva[अस्]) attaches to @deva[पूर्व], @deva[अधर], @deva[अवर] with stem substitutions: @deva[पूर्व] → @deva[पुर्]; @deva[अधर] → @deva[अध्]; @deva[अवर] → @deva[अव्]. The @deva[अपञ्चमी] restriction does not apply here. Examples: @deva[पुरो वसति], @deva[पुर आगतः]; @deva[अधो वसति], @deva[अध आगतः]; @deva[अवो वसति], @deva[अव आगतः].
"""

advanced = """
The affix @deva[असि] applies to three bases with @deva[सर्वादेश]: @deva[पूर्व] → @deva[पुर्], @deva[अधर] → @deva[अध्], @deva[अवर] → @deva[अव्]. The @deva[अपञ्चम्याः] condition ceases here—all three case-senses (@deva[सप्तमी/पञ्चमी/प्रथमा]) apply. @deva[विसर्ग] appears before consonants: @deva[पुरो वसति]; @deva[अस्] before vowels: @deva[पुर आगतः]. Forms: @deva[पुरस्], @deva[अधस्], @deva[अवस्].
"""

id = "5.3.6"
numericId = "53006"

[en]
simple = """
@deva[सर्व] (all) optionally becomes @deva[स] before @deva[प्राग्दिशीय] affixes starting with @deva[द]. So we get both @deva[सर्वदा] and @deva[सदा] (always).
"""

standard = """
The substitute @deva[स] optionally replaces @deva[सर्व] before @deva[द]-initial @deva[प्राग्दिशीय] affixes. This gives doublets: @deva[सर्वदा] ~ @deva[सदा] (always). When the affix is not @deva[प्राग्दिशीय], only @deva[सर्वदा] occurs.
"""

advanced = """
Before @deva[दादि] @deva[प्राग्दिशीय] affixes, @deva[सर्व] → @deva[स] is @deva[विकल्प]. This produces @deva[सदा]/deva[@deva[सर्वदा]]. The substitution is restricted to @deva[प्राग्दिशीय] @deva[दकारादि] affixes only—the @deva[दा] of @deva[सर्वदा] 'giving everything' (from √@deva[दा]) does not trigger this rule since it is @deva[कृत्], not @deva[प्राग्दिशीय].
"""

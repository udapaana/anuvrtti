id = "5.3.48"
numericId = "53048"

[en]
simple = """
After ordinal numerals ending in @deva[तीय] (like @deva[द्वितीय], @deva[तृतीय]), the affix @deva[अन्] comes when 'part' is meant. This rule is primarily for accent. Example: @deva[द्वितीयः] (second) → @deva[द्वितीयः] (half, moiety).
"""

standard = """
The affix @deva[अन्] attaches to ordinals ending in @deva[तीय] when @deva[भाग] (part/fraction) is meant. The rule primarily affects accent: @deva[द्वितीयः] (ordinal, accent on @deva[ती]) → @deva[द्वितीयः] (fraction, accent shifts to @deva[द्वि] by @ref[6.1.197]). Similarly @deva[तृतीयः] (one-third).
"""

advanced = """
This @deva[स्वार्थिक] @[sūtra] teaches @deva[अन्] after @deva[तीयान्त पूरण] (ordinals in @deva[तीय]) for @deva[भागार्थ]. The sole purpose is @deva[स्वर]-shift: @deva[द्वितीयः] (ordinal) has @deva[उदात्त] on @deva[ती] by @ref[3.1.3]; with @deva[अन्], accent moves to @deva[द्वि] by @ref[6.1.197]. The term @deva[पूरण] continues into subsequent @[sūtras]. @deva[तीय] in non-affixal words like @deva[मुखतीय] is irrelevant.
"""

id = "5.3.67"
numericId = "53067"

[en]
simple = """
The affixes @deva[कल्पप्], @deva[देश्य], and @deva[देशीयर्] come after a stem to express 'slight incompleteness' or 'almost.' Examples: @deva[पटुकल्पः] (almost clever), @deva[पटुदेश्यः], @deva[पटुदेशीयः].
"""

standard = """
The affixes @deva[कल्पप्] (@deva[कल्प]), @deva[देश्य], and @deva[देशीयर्] (@deva[देशीय]) express @deva[ईषदसमाप्ति] (slight incompleteness—almost but not quite). Examples: @deva[पटुकल्पः], @deva[पटुदेश्यः], @deva[पटुदेशीयः] (tolerably clever). After verbs: @deva[पचतिकल्पम्], @deva[जल्पतिकल्पम्] (almost cooks/speaks).
"""

advanced = """
These three affixes express @deva[ईषदसमाप्ति]—@deva[ईषत्] (slightly) + @deva[असमाप्ति] (non-completion): 'almost but not fully.' @deva[समाप्ति] = fullness of quality. All three are synonymous: @deva[पटुकल्पः] = @deva[पटुदेश्यः] = @deva[पटुदेशीयः] (nearly clever). The @deva[तिङश्च] @deva[अनुवृत्ति] permits verbal bases: @deva[पचतिकल्पम्].
"""

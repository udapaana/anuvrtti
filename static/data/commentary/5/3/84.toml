id = "5.3.84"
numericId = "53084"

[en]
simple = """
For names beginning with @deva[शेवल], @deva[सुपरि], @deva[विशाल], @deva[वरुण], or @deva[आर्यमान्], deletion occurs after the THIRD vowel instead. Examples: @deva[शेवलदत्त] → @deva[शेवलिकः]; @deva[सुपरिदत्त] → @deva[सुपरिकः].
"""

standard = """
For human names beginning with @deva[शेवल], @deva[सुपरि], @deva[विशाल], @deva[वरुण], or @deva[आर्यमन्], the portion after the THIRD vowel is deleted (overriding @ref[5.3.83]). Examples: @deva[शेवलदत्त] → @deva[शेवलिकः], @deva[शेवलियः], @deva[शेवलिलः]; @deva[सुपरिदत्त] → @deva[सुपरिकः], @deva[सुपरियः], @deva[सुपरिलः]. Similarly @deva[विशालिकः], @deva[वरुणिकः], @deva[अर्यमिकः].
"""

advanced = """
This @deva[अपवाद] to @ref[5.3.83] specifies @deva[तृतीयादूर्ध्वम्] deletion for five @deva[आदि]-words. @[vārttika]: the 'third vowel' must be original, not resulting from @deva[सन्धि]. Thus @deva[शेवलेन्द्रदत्त] (from @deva[शेवल] + @deva[इन्द्र]) deletes after original third vowel (@deva[अ] of @deva[शेवल]), giving @deva[शेवलिकः], not *@deva[शेवलेयिकः].
"""

id = "5.3.81"
numericId = "53081"

[en]
simple = """
The affix @deva[कन्] comes after human names that are actually species-names (like @deva[व्याघ्र], @deva[सिंह]) used metaphorically. Examples: @deva[व्याघ्रकः] (dear Tiger), @deva[सिंहकः] (dear Lion).
"""

standard = """
The affix @deva[कन्] applies to @deva[जातिनामन्] (species-names like @deva[व्याघ्र], @deva[सिंह]) when used as human names metaphorically, expressing compassion. The @deva[बह्वच्] restriction doesn't apply here. Examples: @deva[व्याघ्रकः], @deva[सिंहकः], @deva[शरभकः]. With @deva[वा] understood, other affixes also: @deva[व्याघ्रिलः], @deva[सिंहिलः].
"""

advanced = """
This is a general rule for @deva[जातिनामन्] (species-epithets) functioning as @deva[मनुष्यनामन्]. @deva[जाति] + @deva[नामन्] prevents application to the word @deva[जाति] itself by @ref[1.1.68]. The @deva[बह्वच्] condition doesn't continue (@deva[व्याघ्र] is trisyllabic, but disyllables also qualify). @deva[विकल्प] allows @deva[घन्]/deva[@deva[इलच्]]: @deva[व्याघ्रिलः].
"""

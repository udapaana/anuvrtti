id = "5.3.46"
numericId = "53046"

[en]
simple = """
The substitute @deva[एधा] optionally replaces @deva[धा] after @deva[द्वि] (two) and @deva[त्रि] (three). Examples: @deva[द्वेधा] or @deva[द्विधा]; @deva[त्रेधा] or @deva[त्रिधा].
"""

standard = """
The substitute @deva[एधाच्] (@deva[एधा]) optionally replaces @deva[धा] after @deva[द्वि] and @deva[त्रि]. This gives three options: @deva[द्विधा] (base form), @deva[द्वेधा] (@deva[गुण] by @ref[6.4.148]), and @deva[द्वैधम्] (@deva[धमुञ्] from @ref[5.3.45]). Similarly @deva[त्रिधा], @deva[त्रेधा], @deva[त्रैधम्].
"""

advanced = """
The @deva[एधाच्] substitute adds a third option alongside @deva[धा] and @deva[धमुञ्]. The @deva[ए] triggers @deva[गुण] of the numeral's vowel: @deva[द्वि] + @deva[एधा] → @deva[द्वेधा] by @ref[6.4.148]. Complete paradigm: @deva[द्विधा]/deva[@deva[द्वेधा]]/deva[@deva[द्वैधम्]]; @deva[त्रिधा]/deva[@deva[त्रेधा]]/deva[@deva[त्रैधम्]]. All three express @deva[विधार्थ] and @deva[अधिकरणविचाल] senses.
"""

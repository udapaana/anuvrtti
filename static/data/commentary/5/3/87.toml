id = "5.3.87"
numericId = "53087"

[en]
simple = """
When the small thing is referred to by name (as a proper noun), @deva[कन्] is used instead of @deva[क]. Examples: @deva[वंशकः] (the small bamboo), @deva[वेणुकः], @deva[दण्डकः].
"""

standard = """
When the @deva[ह्रस्व] (small) thing functions as a @deva[संज्ञा] (proper name/designation), @deva[कन्] replaces @deva[क]. Examples: @deva[वंशकः] (name for a particular small bamboo), @deva[वेणुकः], @deva[दण्डकः]. This @deva[कन्] blocks the default @deva[क].
"""

advanced = """
This @deva[अपवाद] provides @deva[कन्] when the diminutive becomes a @deva[संज्ञा] (proper designation/name). Distinction: @deva[क] for general description of small size; @deva[कन्] when the word becomes a standardized name. @deva[वंशकः] as a specific type/name of small bamboo, not just 'a small bamboo.'
"""

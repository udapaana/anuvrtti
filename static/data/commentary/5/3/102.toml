id = "5.3.102"
numericId = "53102"

[en]
simple = """
The affix @deva[ढ] comes after @deva[शिला] (stone) in the sense of 'like this.' Example: @deva[शिलेयं दधिः] (curd hard as stone). Some also allow @deva[ढञ्]: @deva[शैलेयम्].
"""

standard = """
The affix @deva[ढ] (@deva[एय]) attaches to @deva[शिला] (stone) expressing @deva[इव] (resemblance). Example: @deva[शिलेव] = @deva[शिलेयं दधिः] (curd hard as stone). According to some, @deva[ढञ्] also applies, yielding @deva[शैलेयम्] (with @deva[वृद्धि]).
"""

advanced = """
The affix @deva[ढ] → @deva[एय] (no @deva[वृद्धि] since @deva[ञ्] is absent): @deva[शिला] + @deva[एय] → @deva[शिलेय]. Some authorities permit @deva[ढञ्] → @deva[शैलेय] (with @deva[वृद्धि]: @deva[शि] → @deva[शै]). Both express 'stone-like hardness.'
"""

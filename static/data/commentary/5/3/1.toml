id = "5.3.1"
numericId = "53001"

[en]
simple = """
The affixes taught from this @[sūtra] up to @ref[5.3.27] (exclusive) are called @deva[विभक्ति] (case-like suffixes). These affixes do not change the meaning of the base—they simply add a locative or @deva[पञ्चमी] (ablative) sense to pronouns.
"""

standard = """
The @deva[प्राग्दिशीय] affixes taught from this @[sūtra] through @ref[5.3.26] are called @deva[विभक्ति]. The term @deva[प्राक्] (before) + @deva[दिशः] (direction) gives @deva[प्राग्दिशीय], meaning 'affixes before the @[direction-sūtra].' These are @deva[स्वार्थिक] (same-meaning) affixes—they don't change the base meaning but add locative or @deva[पञ्चमी] (ablative) sense.
"""

advanced = """
The @deva[प्राग्दिशीय] affixes from @ref[5.3.1] to @ref[5.3.26] are designated @deva[विभक्ति] by this @deva[संज्ञासूत्र]. The term @deva[प्राग्दिशीय] is derived as @deva[प्राक् दिशः] → @deva[प्राग्दिश्] → @deva[प्राग्दिशीय] (affixes before @ref[5.3.27] @deva[दिक्शब्देभ्यः]). The @deva[विभक्ति] designation by @ref[1.1.72] @deva[येन विधिस्तदन्तस्य] extends to the entire stem+affix combination, enabling further operations.
"""

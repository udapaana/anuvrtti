id = "5.3.2"
numericId = "53002"

[en]
simple = """
These @deva[प्राग्दिशीय] affixes come after @deva[किम्] (what), @deva[सर्वनामन्] pronouns, and @deva[बहु] (many)—but not after @deva[द्वि] (two) etc., even though @deva[द्वि] is also classified as @deva[सर्वनामन्].
"""

standard = """
The @deva[प्राग्दिशीय] affixes apply after @deva[किम्], words called @deva[सर्वनामन्], and @deva[बहु]. However, @deva[द्वि] and similar numerals, though technically @deva[सर्वनामन्] by @ref[1.1.27], are excluded. The word @deva[बहु] is separately mentioned because it takes affixes in both @deva[एकवचन] (singular) and plural, unlike regular pronouns.
"""

advanced = """
The three bases—@deva[किम्], @deva[सर्वनामन्], and @deva[बहु]—are the @deva[प्रकृति] for @deva[प्राग्दिशीय] affixes. Although @deva[द्वि] etc. are @deva[सर्वनामन्] by @ref[1.1.27] @deva[सर्वादीनि सर्वनामानि], they are excluded here. The separate mention of @deva[बहु] allows forms like @deva[बहुत्र] (singular) alongside @deva[बहुषु] (plural), whereas @deva[तत्र] etc. occur only singularly.
"""

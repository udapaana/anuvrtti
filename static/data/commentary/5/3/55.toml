id = "5.3.55"
numericId = "53055"

[en]
simple = """
The affixes @deva[तमप्] and @deva[इष्ठन्] come after a stem to express superlative degree ('surpassing'). Examples: @deva[आढ्यतमः] (richest), @deva[पटिष्ठः] (most skillful).
"""

standard = """
The affixes @deva[तमप्] (@deva[तम]) and @deva[इष्ठन्] (@deva[इष्ठ]) form superlatives expressing @deva[अतिशायन] (surpassing all). The term @deva[अतिशायन] (irregular for @deva[अतिशयन]) qualifies the primitive's sense. Examples: @deva[आढ्यतमः] (richest among many rich people); @deva[पटिष्ठः], @deva[गरिष्ठः] (by @ref[6.4.155]), @deva[लघिष्ठः]. Even superlatives can take further affixes: @deva[श्रेष्ठतमः].
"""

advanced = """
These @deva[स्वार्थिक] affixes form superlatives. @deva[अतिशायन] = @deva[अतिशय] + @deva[ल्युट्] (irregular). Meaning: @deva[सर्व इमे आढ्याः, अयमेषामतिशयेनाढ्यः] = @deva[आढ्यतमः]. @deva[इष्ठन्] triggers @deva[उपधालोप] by @ref[6.4.155]: @deva[पटु] → @deva[पटिष्ठः]; @deva[गुरु] → @deva[गरिष्ठः]. Double superlatives possible: @deva[श्रेष्ठतमः] (Vedic: @deva[देवो वः सविता प्रार्पयतु श्रेष्ठतमाय कर्मणे]).
"""

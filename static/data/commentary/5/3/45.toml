id = "5.3.45"
numericId = "53045"

[en]
simple = """
After @deva[द्वि] (two) and @deva[त्रि] (three), the substitute @deva[धमुञ्] optionally replaces @deva[धा]. Examples: @deva[द्विधा] or @deva[द्वैधम्]; @deva[त्रिधा] or @deva[त्रैधम्].
"""

standard = """
The substitute @deva[धमुञ्] (@deva[धम्] with @deva[वृद्धि]) optionally replaces @deva[धा] after @deva[द्वि] and @deva[त्रि] in both @deva[विधार्थ] and @deva[अधिकरणविचाल] senses. The @deva[चकार] draws in @deva[विकल्प]. Forms: @deva[द्विधा] ~ @deva[द्वैधम्]; @deva[त्रिधा] ~ @deva[त्रैधम्]. @[vārttika]: @deva[ड]-affix (@deva[अ]) yields @deva[द्वैध], @deva[त्रैध] as adjectives.
"""

advanced = """
The @deva[धमुञ्] substitute triggers @deva[वृद्धि]: @deva[द्वि] → @deva[द्वै] + @deva[धम्] → @deva[द्वैधम्]; @deva[त्रि] → @deva[त्रै] + @deva[धम्] → @deva[त्रैधम्]. Both @deva[विधार्थ] and @deva[अधिकरणविचाल] apply (like @ref[5.3.44]). @[vārttika] adds @deva[ड] (@deva[अ]) after @deva[धमुञ्]-ending words for @deva[स्वार्थ]: @deva[द्वैध], @deva[त्रैध] (as in @deva[पथि द्वैधानि संश्रयन्ते]).
"""

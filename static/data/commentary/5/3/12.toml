id = "5.3.12"
numericId = "53012"

[en]
simple = """
The affix @deva[अत्] comes after @deva[किम्] in locative sense, blocking @deva[त्रल्]. By @ref[7.2.105], @deva[किम्] → @deva[क्व], giving @deva[क्व] (where).
"""

standard = """
The affix @deva[अत्] (@deva[अ] after @deva[त्] drops) replaces @deva[त्रल्] after @deva[किम्] in locative sense. By @ref[7.2.105], @deva[किम्] + @deva[अत्] → @deva[क्व] + @deva[अ] → @deva[क्व] (where). The final @deva[अ] merges by @deva[सवर्णदीर्घ].
"""

advanced = """
The affix @deva[अत्] is @deva[अपवाद] to @deva[त्रल्] after @deva[किम्] in @deva[सप्तम्यर्थ]. The @deva[तकार] is @deva[इत्] by @ref[1.3.3]. By @ref[7.2.105] @deva[किमः क्वः], @deva[किम्] → @deva[क्व] before vowel-initial @deva[प्राग्दिशीय]. Result: @deva[क्व] + @deva[अ] → @deva[क्वा̆] → @deva[क्व] (with @deva[प्लुतः] optionally in sentence-final position).
"""

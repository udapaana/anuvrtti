id = "5.3.118"
numericId = "53118"

[en]
simple = """
The affix @deva[यञ्] comes after @deva[अभिजित्] and six other words when they already end in patronymic @deva[अण्]. Examples: @deva[आभिजित्यः], plural @deva[आभिजिताः]; @deva[बैदभृत्यः], plural @deva[बैदभृताः].
"""

standard = """
The affix @deva[यञ्] (@deva[य]) attaches to @deva[अभिजित्], @deva[बिदभृत्], @deva[शालावत्], @deva[शिखावत्], @deva[शामीवत्], @deva[ऊर्णावत्], and @deva[श्रुमत्] when these words already end in patronymic @deva[अण्]. The @deva[आयुधजीविसंघ] condition doesn't apply here. Examples: @deva[अभिजितोऽपत्यम्] = @deva[आभिजित्] + @deva[यञ्] → @deva[आभिजित्यः], plural @deva[आभिजिताः]; @deva[शालावत्यः], plural @deva[शालावताः].
"""

advanced = """
This applies specifically when @deva[अण्] is @deva[गोत्र] (patronymic), not other @deva[अण्] uses. Contrast: @deva[आभिजिति मुहूर्तः] (@deva[अण्] by @ref[4.2.3] for @deva[नक्षत्र]-time) doesn't take @deva[यञ्]. The seven words listed take @deva[यञ्] after their patronymic @deva[अण्] derivatives.
"""

id = "5.3.38"
numericId = "53038"

[en]
simple = """
The affixes @deva[आच्] and @deva[आहि] come after @deva[उत्तर] (north) when the reference is distant. Examples: @deva[उत्तरा वसति] or @deva[उत्तराहि वसति] (lives far northward).
"""

standard = """
The affixes @deva[आच्] (@deva[आ]) and @deva[आहि] come after @deva[उत्तर] in @deva[अस्ताति]-sense when the location is distant (@deva[दूर]). Examples: @deva[उत्तरा वसति] or @deva[उत्तराहि वसति] (lives far northward). When not distant: @deva[उत्तरेण प्रयाति]. Ablative: @deva[उत्तरादागतः].
"""

advanced = """
This extends @deva[आच्]/deva[@deva[आहि]] to @deva[उत्तर] under @deva[दूर] condition. The @deva[अपञ्चमी] condition from @ref[5.3.35] continues—ablative uses @deva[अति] (@ref[5.3.34]) or @deva[अतसुच्] (@ref[5.3.28]). For non-distant locations, @deva[एनप्] (@deva[उत्तरेण]) applies. This completes the special affixes for @deva[उत्तर]/deva[@deva[दक्षिण]].
"""

id = "5.3.18"
numericId = "53018"

[en]
simple = """
The affix @deva[दानीम्] also comes after @deva[इदम्] in locative sense when time is meant. Example: @deva[इदम्] + @deva[दानीम्] → @deva[इदानीम्] (at this time, now).
"""

standard = """
The affix @deva[दानीम्] attaches to @deva[इदम्] in @deva[सप्तमी] (locative) sense denoting time. By @ref[5.3.3], @deva[इदम्] → @deva[इ], giving @deva[इदानीम्] (at this time, now). This provides an alternative to @deva[एतर्हि].
"""

advanced = """
The affix @deva[दानीम्] is an alternative to @deva[र्हिल्] (@ref[5.3.16]) after @deva[इदम्] in @deva[सप्तम्यर्थे काले]. By @ref[5.3.3], @deva[इदम्] → @deva[इश्] → @deva[इ]. Derivation: @deva[इदम्] → @deva[इ] + @deva[दानीम्] → @deva[इदानीम्] 'now'. Both @deva[इदानीम्] and @deva[एतर्हि] mean @deva[अस्मिन् काले].
"""

id = "5.3.89"
numericId = "53089"

[en]
simple = """
The affix @deva[डुपच्] (becoming @deva[उप]) comes after @deva[कुतू] (jar) to express small size. Example: @deva[कुतुपः] or @deva[कुतुपम्] (a small leather oil-vessel).
"""

standard = """
The affix @deva[डुपच्] (@deva[उप]) replaces @deva[क] after @deva[कुतू] (jar) in @deva[ह्रस्वार्थ]. The @deva[ड्] causes deletion of the final long @deva[ऊ]. Result: @deva[कुतुपः] (masc.) or @deva[कुतुपम्] (neut.)—a small leather vessel for oil.
"""

advanced = """
The @deva[डुपच्] affix: @deva[ड्] is @deva[इत्] (triggers @deva[उपधालोप] of final @deva[ऊ] by @ref[6.4.143]); @deva[उप] remains. @deva[कुतू] + @deva[उप] → @deva[कुत्] + @deva[उप] → @deva[कुतुपः]. The derivative is used in both masculine and neuter: @deva[कुतुपः], @deva[कुतुपम्] (small oil-vessel).
"""

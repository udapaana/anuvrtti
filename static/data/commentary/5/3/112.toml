id = "5.3.112"
numericId = "53112"

[en]
simple = """
The affix @deva[ञ्य] comes after words denoting a @deva[पूग] (horde/guild of mixed castes), but not when derived from the leader's name. Examples: @deva[लौहध्वज्यः] (of the iron-banner horde), plural @deva[लौहध्वजाः].
"""

standard = """
The @deva[स्वार्थिक] affix @deva[ञ्य] (@deva[य]) attaches to @deva[पूग] (horde of mixed castes seeking wealth) names, but not when derived from the leader's name. Examples: @deva[लौहध्वज्यः] (member of iron-banner horde), dual @deva[लौहध्वज्यौ], plural @deva[लौहध्वजाः] (affix elided by @ref[2.4.62]); @deva[शैब्यः], plural @deva[शिबयः]; @deva[चातक्यः], plural @deva[चातकाः]. Not: @deva[देवदत्तकाः] (named after leader Devadatta, by @ref[5.2.78]).
"""

advanced = """
This begins the @deva[तद्राज] (king-denoting) affixes. @deva[पूग] = mixed-caste guild/horde. @deva[ञ्य] applies to horde-names not derived from leaders (@deva[अग्रामणीपूर्व]). In plural, the affix undergoes @deva[लुक्] by @ref[2.4.62]. @deva[ञ्य] also means 'leader of the horde.'
"""

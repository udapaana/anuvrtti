id = "5.3.98"
numericId = "53098"

[en]
simple = """
When a human figure/effigy is meant, the affix @deva[कन्] is deleted (@deva[लुप्]), but the word retains its number and gender. Examples: @deva[चञ्चा] (straw-man effigy), @deva[दासी] (female servant figure).
"""

standard = """
When an imitation of a human (@deva[मनुष्य]) is denoted, @deva[कन्] undergoes @deva[लुप्] (deletion) while the word retains its original @deva[लिङ्ग] (gender) and @deva[वचन] (number). Examples: @deva[चञ्चा] (straw-man—@deva[चञ्चेव मनुष्यः]); @deva[दासी] (servant-figure); @deva[खरकुटी]. For accent, see @ref[6.1.204].
"""

advanced = """
This @deva[लुप्] rule deletes @deva[कन्] when @deva[मनुष्यप्रतिकृति] is meant. @deva[लुप्] differs from @deva[लुक्] in @deva[स्थानिवद्भाव] effects. The original @deva[लिङ्ग/वचन] is preserved: @deva[चञ्चा] (fem., like @deva[चञ्चा] 'chaff'). This may be seen as extending @ref[5.3.100].
"""

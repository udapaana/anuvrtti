id = "5.3.103"
numericId = "53103"

[en]
simple = """
The affix @deva[यत्] comes after @deva[शाखा] and similar words in the sense of 'like this.' Examples: @deva[शाख्यः] (branch-like), @deva[मुख्यः] (chief/primary), @deva[जघन्यः] (hindmost).
"""

standard = """
The affix @deva[यत्] (@deva[य]) attaches to @deva[शाखादि] words expressing @deva[इव] (resemblance). Examples: @deva[शाखेव] = @deva[शाख्यः]; @deva[मुख्यः] (by @ref[6.1.213]); @deva[जघन्यः]. The class includes: @deva[शाखा], @deva[मुख], @deva[जघन], @deva[शृङ्ग], @deva[मेघ], @deva[अभ्र], @deva[चरण], @deva[स्कन्ध], @deva[उरस्], @deva[शिरस्], @deva[अग्र], @deva[शरण].
"""

advanced = """
The @deva[शाखादि] class takes @deva[यत्] in @deva[इवार्थ]. @deva[यत्] → @deva[य] with @deva[अन्तोदात्त]. @deva[मुख्य] by @ref[6.1.213] shows @deva[य]-treatment. The class items: @deva[शाखा] (branch), @deva[मुख] (face/chief), @deva[जघन] (hip/rear), @deva[शृङ्ग] (horn/peak), @deva[मेघ] (cloud), @deva[अभ्र] (cloud), @deva[चरण] (foot), @deva[स्कन्ध] (shoulder), @deva[उरस्] (chest), @deva[शिरस्] (head), @deva[अग्र] (front), @deva[शरण] (shelter).
"""

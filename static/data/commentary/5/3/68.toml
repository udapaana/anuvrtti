id = "5.3.68"
numericId = "53068"

[en]
simple = """
The affix @deva[बहुच्] (becoming @deva[बहु]) optionally comes BEFORE a declined noun (not after) to express 'almost.' Example: @deva[बहुपटुः] (almost clever). This is the only affix that precedes its base.
"""

standard = """
The affix @deva[बहुच्] (@deva[बहु]) uniquely precedes (rather than follows) a declined noun (@deva[सुप्]) to express @deva[ईषदसमाप्ति]. The @deva[चकार] indicates final-vowel accent by @ref[6.1.163]. Examples: @deva[बहुपटुः] (almost clever), @deva[बहुमृदुः] (almost soft). The word 'optionally' allows @deva[कल्प] etc. as alternatives. Does not apply to verbs.
"""

advanced = """
This is the sole exception to the rule that affixes follow bases. @deva[बहुच्] is placed before @deva[सुबन्त] (declined noun), not @deva[प्रातिपदिक]. The @deva[चकार] is @deva[उदात्तनिर्देश] by @ref[6.1.163]—accent falls on the word's final vowel: @deva[बहुपटुः]. Restricted to nominals (@deva[सुपः])—not @deva[तिङन्त] (verbs). @deva[विकल्प] permits @deva[कल्प]/deva[@deva[देश्य]]/deva[@deva[देशीय]] alternatives.
"""

id = "5.3.21"
numericId = "53021"

[en]
simple = """
The affix @deva[र्हिल्] optionally comes after @deva[किम्], pronouns, and @deva[बहु] when denoting time that is not the current day. Examples: @deva[कर्हि] or @deva[कदा] (when), @deva[तर्हि] or @deva[तदा] (then).
"""

standard = """
The affix @deva[र्हिल्] optionally attaches to @deva[किम्], @deva[सर्वनामन्], and @deva[बहु] when time not of the current day is denoted. This creates doublets with @deva[दा]: @deva[कर्हि] ~ @deva[कदा] (when), @deva[यर्हि] ~ @deva[यदा] (when), @deva[तर्हि] ~ @deva[तदा] (then).
"""

advanced = """
This is a general rule (not @deva[छन्दस्]) for @deva[र्हिल्] with @deva[विकल्प] against @deva[दा]. The condition @deva[अनद्यतने] restricts to non-current-day time reference. Stem changes by @ref[7.2.102-104]: @deva[किम्] → @deva[क], @deva[तद्] → @deva[त], @deva[यद्] → @deva[य]. Forms: @deva[कर्हि]/deva[@deva[कदा]], @deva[यर्हि]/deva[@deva[यदा]], @deva[तर्हि]/deva[@deva[तदा]]. The @deva[अनुवृत्ति] of @deva[छन्दसि] does not continue here.
"""

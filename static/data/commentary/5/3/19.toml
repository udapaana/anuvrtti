id = "5.3.19"
numericId = "53019"

[en]
simple = """
After @deva[तद्] (that) in locative sense when time is meant, the affixes @deva[दा] and @deva[दानीम्] come. Examples: @deva[तदा] (at that time, then), @deva[तदानीम्] (at that time).
"""

standard = """
The affixes @deva[दा] and @deva[दानीम्] attach to @deva[तद्] in @deva[सप्तमी] (locative) sense denoting time. Results: @deva[तस्मिन् काले] = @deva[तदा] or @deva[तदानीम्] (at that time). The @deva[दा] portion is actually redundant since @ref[5.3.15] already teaches @deva[दा] after @deva[तद्].
"""

advanced = """
This @[sūtra] teaches @deva[दा] and @deva[दानीम्] after @deva[तद्] in @deva[सप्तम्यर्थे काले]. The @deva[चकार] draws in @deva[दानीम्] from @ref[5.3.18]. The @deva[दा] portion is @deva[व्यर्थ] (redundant) per @ref[5.3.15], but serves to establish @deva[दानीम्] as an alternative. By @ref[7.2.102], @deva[तद्] → @deva[त]. Results: @deva[तदा], @deva[तदानीम्].
"""

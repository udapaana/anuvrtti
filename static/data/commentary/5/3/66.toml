id = "5.3.66"
numericId = "53066"

[en]
simple = """
The affix @deva[रूपप्] (becoming @deva[रूप]) comes after a stem to express praise without changing meaning. Examples: @deva[वैयाकरणरूपः] (a celebrated grammarian), @deva[चोररूपः] (an expert thief).
"""

standard = """
The affix @deva[रूपप्] (@deva[रूप]) attaches to stems expressing @deva[प्रशंसा] (praise) without changing denotation. As a @deva[स्वार्थिक] affix, it highlights a particular meaning. Examples: @deva[प्रशस्तो वैयाकरणः] = @deva[वैयाकरणरूपः] (celebrated grammarian); @deva[चोररूपः] (expert thief—praising skill, not morality). After verbs: @deva[पचतिरूपम्] (one who cooks excellently).
"""

advanced = """
The @deva[स्वार्थिक] affix @deva[रूपप्] expresses @deva[प्रशंसा] (praise/excellence) of the base meaning. The term @deva[प्रशंसा] qualifies the @deva[प्रकृत्यर्थ]—when the base connotes praise. Even negative terms like @deva[चोर] (thief) can take @deva[रूप] to praise skill. By @deva[अनुवृत्ति] of @deva[तिङश्च] (@ref[5.3.56]), verbs also take @deva[रूप]: @deva[पचतिरूपम्], @deva[पचन्तिरूपम्] (neuter, singular only since action is one).
"""

id = "5.3.115"
numericId = "53115"

[en]
simple = """
The affix @deva[टेण्यण्] comes after @deva[वृक] when it denotes a warrior-class. Example: @deva[वार्केण्यः], plural @deva[वृकाः], feminine @deva[वार्केणी]. Does not apply when @deva[वृक] means 'wolf.'
"""

standard = """
The affix @deva[टेण्यण्] (@deva[एण्य]) attaches to @deva[वृक] when denoting a warrior-class (@deva[आयुधजीविसंघ]). Examples: @deva[वार्केण्यः] (of the @[vṛka] warriors), dual @deva[वार्केण्यौ], plural @deva[वृकाः], feminine @deva[वार्केणी]. Not when @deva[वृक] means 'wolf': @deva[कामक्रोधौ मनुष्याणां खादितारौ वृकाविव] (lust and anger devour men like wolves).
"""

advanced = """
The @deva[टेण्यण्] → @deva[एण्य] with @deva[वृद्धि]: @deva[वृक] → @deva[वार्केण्य]. This is specific to the @deva[वृक] warrior-tribe. The @deva[वृक]-wolf meaning doesn't trigger this affix—that @deva[वृक] remains unchanged in compounds.
"""

id = "5.3.76"
numericId = "53076"

[en]
simple = """
The affixes @deva[क] and @deva[अकच्] come when compassion or endearment is expressed. Examples: @deva[पुत्रकः] (poor little child), @deva[वत्सकः] (dear calf), @deva[स्वपितकि] (alas, he sleeps!).
"""

standard = """
The affixes @deva[क] and @deva[अकच्] express @deva[अनुकम्पा] (compassion, pity, endearment). Examples: @deva[पुत्रकः] (poor child), @deva[वत्सकः], @deva[दुर्बलकः] (poor weak one), @deva[बुभुक्षितकः] (poor hungry one). After verbs: @deva[विश्वसितकि] (alas, he trusts!), @deva[स्वपितकि] (alas, he sleeps!).
"""

advanced = """
The @deva[अनुकम्पा] (compassion/endearment) sense extends @deva[क]/deva[@deva[अकच्]] beyond @deva[अज्ञात] and @deva[कुत्सित]. @deva[अनुकम्पा] includes pity, sympathy, and affectionate diminutives. @deva[क] applies to nominals: @deva[पुत्रकः], @deva[वत्सकः]. @deva[अकच्] applies to @deva[अव्यय/सर्वनामन्/तिङ्]: @deva[स्वपितकि] (from @deva[स्वपिति]).
"""

id = "5.3.79"
numericId = "53079"

[en]
simple = """
The affixes @deva[घन्] and @deva[इलच्] also come after polysyllabic human names for compassion/courtesy. Examples: @deva[देवदत्त] → @deva[देवियः] (@deva[घन्]), @deva[देविलः] (@deva[इलच्]).
"""

standard = """
The affixes @deva[घन्] (@deva[य]) and @deva[इलच्] (@deva[इल]) also apply to polysyllabic human names for @deva[अनुकम्पा/नीति]. The @deva[चकार] includes @deva[कन्] and @deva[ठच्]. From @deva[देवदत्त]: @deva[देवियः] (@deva[घन्]), @deva[देविलः] (@deva[इलच्]), @deva[देविकः] (@deva[ठच्]), @deva[देवदत्तकः] (@deva[कन्]). From @deva[यज्ञदत्त]: @deva[यज्ञियः], @deva[यज्ञिलः], @deva[यज्ञिकः], @deva[यज्ञदत्तकः].
"""

advanced = """
This adds @deva[घन्] and @deva[इलच्] to the affixes for polysyllabic @deva[मनुष्यनामन्]. @deva[घन्] → @deva[य] (the @deva[न्] is @deva[इत्]); @deva[इलच्] → @deva[इल]. Both trigger the shortening of @ref[5.3.83]. The @deva[चकार] indicates @deva[कन्] and @deva[ठच्] from @ref[5.3.78] also apply. Complete paradigm: @deva[देवियः], @deva[देविलः], @deva[देविकः], @deva[देवदत्तकः].
"""

id = "5.3.54"
numericId = "53054"

[en]
simple = """
After a stem in genitive case, @deva[रूप्य] and @deva[चरट्] come when 'formerly belonged to' is meant. Examples: @deva[देवदत्तस्य भूतपूर्वो गौः] = @deva[देवदत्तरूप्यः] or @deva[देवदत्तचरः] (cow that formerly belonged to Devadatta).
"""

standard = """
The affixes @deva[रूप्य] and @deva[चरट्] (@deva[चर]) attach to genitive-ending stems when @deva[भूतपूर्व] refers to former ownership. Here @deva[भूतपूर्व] qualifies the affix's meaning (former possession), not the base. Examples: @deva[देवदत्तस्य भूतपूर्वः गौः] = @deva[देवदत्तरूप्यः] or @deva[देवदत्तचरः] (Devadatta's former cow).
"""

advanced = """
Unlike @ref[5.3.53] where @deva[भूतपूर्व] qualifies the @deva[प्रकृति] (base meaning), here it qualifies the @deva[प्रत्ययार्थ] (affix meaning)—former ownership. The genitive (@deva[षष्ठी]) indicates the former possessor. Both @deva[रूप्य] and @deva[चरट्] apply: @deva[देवदत्तरूप्यः गौः] = @deva[देवदत्तचरः गौः] = cow that was Devadatta's.
"""

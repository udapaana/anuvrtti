id = "5.3.20"
numericId = "53020"

[en]
simple = """
In Vedic usage, @deva[इदम्] takes @deva[दा], and @deva[तद्] takes @deva[र्हिल्], along with other affixes. Examples: @deva[इदा] (now), @deva[तर्हि] (then).
"""

standard = """
In @deva[छन्दस्] (Vedic texts), @deva[दा] comes after @deva[इदम्], and @deva[र्हिल्] after @deva[तद्], in addition to other affixes. By @ref[5.3.3], @deva[इदम्] → @deva[इ] + @deva[दा] → @deva[इदा] (now). By @ref[7.2.102], @deva[तद्] → @deva[त] + @deva[र्हि] → @deva[तर्हि] (then).
"""

advanced = """
This @deva[छन्दस्] rule reverses the standard distribution: @deva[इदम्] takes @deva[दा] (normally for @deva[तद्] etc.), and @deva[तद्] takes @deva[र्हिल्] (normally for @deva[इदम्]). Forms: @deva[इदा] (@deva[इ] + @deva[दा]); @deva[तर्हि] (@deva[त] + @deva[र्हि]). Vedic attestation: @deva[इदा हि यमुपस्तुतिभिदा वामस्य भक्तये] (@[ṛg] Veda VIII.27.11). Also @deva[इदानीम्], @deva[तदानीम्] apply.
"""

id = "5.3.8"
numericId = "53008"

[en]
simple = """
The affix @deva[तसिल्] also replaces the @deva[तस्] taught in @ref[5.4.44-45] when following @deva[किम्], pronouns, or @deva[बहु]. This ensures these forms receive the @deva[विभक्ति] designation.
"""

standard = """
The affix @deva[तसिल्] substitutes for @deva[तस्] from @ref[5.4.44] @deva[प्रतियोगे पञ्चम्यास्तसिः] and @ref[5.4.45] @deva[अपादाने चाहीयरुहोः] when following @deva[किम्], @deva[सर्वनामन्], or @deva[बहु]. This substitution ensures accent rules and @deva[विभक्ति] designation apply.
"""

advanced = """
This @deva[आदेश] of @deva[तसिल्] for @deva[तस्] (@ref[5.4.44-45]) serves two purposes: (1) accent—@deva[तसिल्] being @deva[प्राग्दिशीय] carries specific @deva[स्वर] properties, and (2) @deva[संज्ञा]—the @deva[विभक्ति] designation from @ref[5.3.1] applies. The substitution is conditioned on @deva[किम्]/deva[@deva[सर्वनामन्]]/deva[@deva[बहु]] as base.
"""

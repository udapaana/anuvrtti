id = "5.3.43"
numericId = "53043"

[en]
simple = """
The affix @deva[धा] also comes after numerals to express division or distribution of things. Example: @deva[पञ्चधा कुरु] (divide into five parts).
"""

standard = """
The affix @deva[धा] attaches to numerals when expressing @deva[अधिकरणविचाल] (change in distribution/apportionment of substances). This means dividing one into many or combining many into one. Examples: @deva[एकं राशिं पञ्चधा कुरु] (divide one heap into five); @deva[अनेकमेकधा कुरु] (make many into one).
"""

advanced = """
The affix @deva[धा] here applies in @deva[अधिकरणविचाल] sense—redistribution of @deva[द्रव्य] (substance/matter). @deva[विचाल] = change in number/arrangement. This is distinct from @deva[विधार्थ] (manner) of @ref[5.3.42]. Examples: @deva[पञ्चधा राशिं कुरु] (divide heap into five); @deva[अष्टधा कुरु] (into eight).
"""

id = "5.3.64"
numericId = "53064"

[en]
simple = """
Before @deva[इष्ठन्] and @deva[ईयसुन्], @deva[कन्] optionally substitutes for @deva[युवन्] (young) and @deva[अल्प] (little). Examples: @deva[कनिष्ठः] or @deva[यविष्ठः] (youngest); @deva[कनीयान्] or @deva[अल्पीयान्] (younger/smaller).
"""

standard = """
The substitute @deva[कन्] (@deva[क]) optionally replaces @deva[युवन्] (young) and @deva[अल्प] (little) before @deva[इष्ठन्] and @deva[ईयसुन्]. From @deva[युवन्]: @deva[कनिष्ठः]/deva[@deva[यविष्ठः]] (youngest), @deva[कनीयान्]/deva[@deva[यवीयान्]] (younger). From @deva[अल्प]: @deva[कनिष्ठः]/deva[@deva[अल्पिष्ठः]], @deva[कनीयान्]/deva[@deva[अल्पीयान्]].
"""

advanced = """
This @deva[विकल्प] rule provides @deva[कन्] as optional substitute for @deva[युवन्] and @deva[अल्प] before @deva[अजादि] affixes. For @deva[युवन्]: @deva[कनिष्ठः]/deva[@deva[कनीयान्]] (with @deva[कन्]) or @deva[यविष्ठः]/deva[@deva[यवीयान्]] (direct). For @deva[अल्प]: @deva[कनिष्ठः]/deva[@deva[कनीयान्]] or @deva[अल्पिष्ठः]/deva[@deva[अल्पीयान्]]. Both sets express superlative/comparative of 'young' or 'small'.
"""

id = "5.3.109"
numericId = "53109"

[en]
simple = """
The affix @deva[ठच्] also optionally comes after @deva[एकशाला] (one-roomed) in the sense of 'like this.' Examples: @deva[एकशालिकः] (with @deva[ठच्]) or @deva[ऐकशालिकः] (with @deva[ठक्]).
"""

standard = """
The affix @deva[ठच्] (@deva[इक]) optionally attaches to @deva[एकशाला] (one-roomed/single-halled) expressing @deva[इव] (resemblance). This provides an alternative to @deva[ठक्]. Examples: @deva[एकशालिकः] (by @deva[ठच्], no @deva[वृद्धि]) or @deva[ऐकशालिकः] (by @deva[ठक्], with @deva[वृद्धि]).
"""

advanced = """
This @deva[विकल्प] rule offers @deva[ठच्] alongside @deva[ठक्] for @deva[एकशाला]. @deva[ठच्] → @deva[इक] without @deva[वृद्धि]: @deva[एकशालिकः]. @deva[ठक्] → @deva[इक] with @deva[वृद्धि]: @deva[ऐकशालिकः]. Both express 'like a single-roomed structure.'
"""

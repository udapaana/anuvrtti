id = "5.3.13"
numericId = "53013"

[en]
simple = """
In Vedic usage, the affix @deva[ह] optionally comes after @deva[किम्] in locative sense. So both @deva[कुह] and @deva[कुत्र] (where) are found in the Vedas.
"""

standard = """
In @deva[छन्दस्] (Vedic texts), the affix @deva[ह] optionally comes after @deva[किम्] in locative sense alongside other affixes. By @ref[7.2.104], @deva[किम्] → @deva[कु], giving @deva[कुह] (where). Both @deva[कुह], @deva[क्व], and @deva[कुत्र] appear in Vedic literature.
"""

advanced = """
This @deva[छन्दस्] rule allows @deva[ह] after @deva[किम्] in @deva[सप्तम्यर्थ] as @deva[विकल्प] with @deva[अत्] and @deva[त्रल्]. The @deva[कु]-@deva[आदेश] applies by @ref[7.2.104]. Vedic forms: @deva[कुह] (with @deva[ह]), @deva[क्व] (with @deva[अत्]), @deva[कुत्र] (with @deva[त्रल्]). The multiplicity reflects @deva[छान्दस] license.
"""

id = "5.3.53"
numericId = "53053"

[en]
simple = """
The affix @deva[चरट्] (becoming @deva[चर]) comes after a stem when 'this had been before' (@deva[भूतपूर्व]) is meant. Feminine takes @deva[ङीप्]. Examples: @deva[आढ्यचरः] (formerly rich), @deva[आढ्यचरी] (fem.).
"""

standard = """
The affix @deva[चरट्] (@deva[चर], fem. @deva[चरी] by @deva[ङीप्]) indicates @deva[भूतपूर्व] (something that existed before but no longer). Examples: @deva[आढ्यो भूतपूर्वः] = @deva[आढ्यचरः] (once wealthy); @deva[सुकुमारचरः] (once delicate). The @deva[ट्] signals @deva[ङीप्] for feminine.
"""

advanced = """
The affix @deva[चरट्] conveys @deva[भूतपूर्व] (compound of @deva[पूर्व] + @deva[भूत] by @deva[सुप्सुपा])—a past state no longer current. The @deva[टकार] triggers @deva[ङीप्] for @deva[स्त्री]. Note: @deva[चकार] is not @deva[इत्] despite @ref[1.3.7] @deva[चुटू], showing that rule is @deva[अनित्य]. Placement after @ref[5.2.18] would cause @deva[खञ्] to block @deva[चरट्].
"""

id = "5.3.77"
numericId = "53077"

[en]
simple = """
The affixes also come on things offered as courteous relief to someone deserving compassion. Examples: @deva[हन्त ते धानकाः] (alas, here are barley for you), @deva[एहकि] (O dear, come!), @deva[अद्धकि] (O dear, eat!).
"""

standard = """
The affixes @deva[क]/deva[@deva[अकच्]] attach to objects or actions offered as courteous relief (@deva[नीति]) to someone deserving compassion. The previous @[sūtra] added affixes to the object of pity; here, to the means of relief. Examples: @deva[धानकाः] (barley offered to the hungry), @deva[तिलकाः] (sesame); imperatives: @deva[एहकि] (come!), @deva[अद्धकि] (eat!).
"""

advanced = """
This complements @ref[5.3.76]: there, affixes attach to the @deva[अनुकम्प्य] (object of pity); here, to the @deva[अनुकम्पानीति] (means of showing compassion). @deva[नीति] = policy/expedient (like gifts of relief). @deva[तद्युक्त] = connected with that compassion. @deva[एहकि] is from @deva[एहि] (imperative of @deva[आ] + √@deva[इ]) + @deva[अकच्]. Context: entreating a starving person with gifts.
"""

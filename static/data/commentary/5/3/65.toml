id = "5.3.65"
numericId = "53065"

[en]
simple = """
The affixes @deva[विन्] and @deva[मत्] (possessive suffixes) are deleted (@deva[लुक्]) when @deva[इष्ठन्] and @deva[ईयसुन्] follow. Examples: @deva[स्रग्विन्] → @deva[स्रजिष्ठः] (most garlanded); @deva[त्वग्वत्] → @deva[त्वचिष्ठः] (most skinned).
"""

standard = """
The possessive affixes @deva[विन्] and @deva[मत्]/deva[@deva[वत्]] undergo @deva[लुक्] (deletion) before @deva[इष्ठन्] and @deva[ईयसुन्]. The comparative/superlative is formed on the base noun. Examples: @deva[स्रग्विन्] (garlanded) → @deva[स्रजिष्ठः], @deva[स्रजीयान्]; @deva[त्वग्वत्] (having skin) → @deva[त्वचिष्ठः], @deva[त्वचीयान्].
"""

advanced = """
This @deva[लुक्] rule deletes @deva[विन्] and @deva[मत्]/deva[@deva[वत्]] before @deva[अजादि] affixes, exposing the base for direct affixation. @deva[स्रग्विन्] → @deva[स्रज्] + @deva[इष्ठ] → @deva[स्रजिष्ठः]; @deva[त्वग्वत्] → @deva[त्वच्] + @deva[इष्ठ] → @deva[त्वचिष्ठः]. The @deva[ज्ञापक] (implication): @deva[विन्]/deva[@deva[मत्]]-ending words do form comparatives/superlatives with @deva[ईयस्]/deva[@deva[इष्ठ]].
"""

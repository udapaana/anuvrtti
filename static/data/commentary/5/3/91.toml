id = "5.3.91"
numericId = "53091"

[en]
simple = """
The affix @deva[ष्टरच्] comes after @deva[वत्स] (calf), @deva[उक्षन्] (bull), @deva[अश्व] (horse), and @deva[ऋषभ] (bull) to express slenderness. Examples: @deva[वत्सतरः] (weaned calf), @deva[अश्वतरः] (mule).
"""

standard = """
The affix @deva[ष्टरच्] (@deva[तर]) expresses @deva[तनुत्व] (slenderness) after @deva[वत्स], @deva[उक्षन्], @deva[अश्व], and @deva[ऋषभ]. The @deva[ह्रस्व] (smallness) meaning ceases. Examples: @deva[वत्सतरः] (weaned calf becoming slender); @deva[उक्षतरः] (slender bull in third stage); @deva[अश्वतरः] (mule—slender due to mixed parentage); @deva[वृषभतरः] (slender bull).
"""

advanced = """
The @deva[तनुत्वार्थ] (slenderness meaning) replaces @deva[ह्रस्वार्थ] for these four words. @deva[वत्सतरः] = calf transitioning to second life-stage (becoming slender when weaned). @deva[अश्वतरः] = mule, explained as @deva[तस्य तनुत्वमन्यपितृकता] (slenderness from different sire). @deva[ष्टरच्] → @deva[तर] with feminine @deva[तरी].
"""

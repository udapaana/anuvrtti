id = "5.3.106"
numericId = "53106"

[en]
simple = """
The affix @deva[छ] comes after a compound that already contains the sense of 'like' (@deva[इव]) when a further comparison is needed. Example: @deva[काकतालीयम्] (like the crow-and-palm-fruit coincidence—an unexpected event).
"""

standard = """
The affix @deva[छ] (@deva[ईय]) attaches to compounds that inherently contain @deva[इव] (comparison) sense, when a second @deva[इव] is to be expressed. This implies that @deva[सुप्सुपा] (@ref[2.1.4]) compounds with hidden @deva[इव]-sense exist. Examples: @deva[काकतालीयम्] (like the crow killed by falling palm-fruit—an unexpected coincidence); @deva[अजाकृपाणीयम्] (like a goat accidentally killed by falling sword); @deva[अन्धकवर्तिकीयम्] (like a vulture accidentally caught by a blind man).
"""

advanced = """
This @deva[जञापक] (indicatory rule) implies @deva[इवार्थ समास] exists under @deva[सुप्सुपा] (@ref[2.1.4]), though not explicitly taught. @deva[छ] applies when the compound (@deva[इवार्थविषय]) requires further comparison. @deva[काकताल] = the coincidence of crow + palm-fruit; @deva[काकतालीय] = an event resembling that coincidence. These express @deva[अतर्कित] (unexpected) and @deva[चित्रीकरण] (curious) coincidences.
"""

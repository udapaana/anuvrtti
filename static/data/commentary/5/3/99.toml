id = "5.3.99"
numericId = "53099"

[en]
simple = """
The affix @deva[कन्] is also deleted when religious images are used as livelihood (but not sold). Examples: @deva[वासुदेवः] (idol of @[vāsudeva]), @deva[शिवः] (image of @[śiva]).
"""

standard = """
When an image (@deva[प्रतिकृति]) is a means of livelihood (@deva[जीविका]) but not merchandise (@deva[अपण्य])—like religious idols exhibited door-to-door—@deva[कन्] undergoes @deva[लुप्]. Examples: @deva[वासुदेवः] (@[vāsudeva] idol), @deva[शिवः], @deva[स्कन्दः], @deva[विष्णुः], @deva[आदित्यः]. But when sold: @deva[हस्तिकान् विक्रीणीते] (sells elephant-figurines—@deva[कन्] retained).
"""

advanced = """
The conditions are: (1) @deva[जीविका] (livelihood use); (2) @deva[अपण्य] (not sold). This covers religious images exhibited by certain @[brāhmaṇas] for alms. @deva[पण्य] = bought/sold; @deva[अपण्य] = not commercially traded. When sold as merchandise, @deva[कन्] applies: @deva[हस्तिकान्], @deva[अश्वकान्], @deva[रथकान्]. This extends @ref[5.3.100].
"""

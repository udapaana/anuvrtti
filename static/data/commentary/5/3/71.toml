id = "5.3.71"
numericId = "53071"

[en]
simple = """
The affix @deva[अकच्] (becoming @deva[अक्]) is inserted before the final vowel of indeclinables and pronouns. Examples: @deva[उच्चैः] → @deva[उच्चकैः]; @deva[सर्वे] → @deva[सर्वके]. Also applies to verbs: @deva[पचति] → @deva[पचतकि].
"""

standard = """
The affix @deva[अकच्] (@deva[अक्]) is inserted before the final vowel (@deva[प्राक् टेः]) of @deva[अव्यय] (indeclinables) and @deva[सर्वनामन्] (pronouns). The @deva[चकार] indicates final accent by @ref[6.1.163]. Examples: @deva[उच्चैः] → @deva[उच्चकैः]; @deva[नीचैः] → @deva[नीचकैः]; @deva[सर्वे] → @deva[सर्वके]. By @deva[तिङश्च], verbs also: @deva[पचतकि], @deva[जल्पतकि].
"""

advanced = """
The affix @deva[अकच्] is an @deva[आगम] (insertion) @deva[प्राक् टेः] (before final vowel) of @deva[अव्यय] and @deva[सर्वनामन्]. It blocks @deva[क]. The @deva[चकार] marks @deva[अन्तोदात्त] by @ref[6.1.163]. For pronouns, sometimes added to @deva[प्रातिपदिक] (@deva[युष्मकाभिः]), sometimes to @deva[सुबन्त] (@deva[त्वयका]). @[vārttika]: @deva[काम्] after @deva[तूष्णीम्] → @deva[तूष्णीकाम्]. @deva[तिङश्च] extends to verbs: @deva[पचतकि].
"""

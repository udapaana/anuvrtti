id = "5.3.92"
numericId = "53092"

[en]
simple = """
The affix @deva[डतरच्] (becoming @deva[अतर]) comes after @deva[किम्], @deva[यद्], and @deva[तद्] when determining one out of two. The final syllables @deva[इम्] and @deva[अद्] are deleted. Examples: @deva[कतरः] (which of two), @deva[यतरः], @deva[ततरः].
"""

standard = """
The affix @deva[डतरच्] (@deva[अतर]) attaches to @deva[किम्], @deva[यद्], and @deva[तद्] for @deva[निर्धारण] (specification/determination) of one from two. Final syllables are deleted. Examples: @deva[कतरो भवतोः कठः] (which of you two is a @[kaṭha]?); @deva[यतरो भवतोः देवदत्तः, ततर आगच्छतु] (whichever of you two is Devadatta, let him come).
"""

advanced = """
This @deva[स्वार्थिक] affix expresses @deva[द्वयोर्निर्धारण] (specification from two). @deva[निर्धारण] = differentiation by @deva[जाति/क्रिया/गुण/संज्ञा]. @deva[ड्] triggers deletion of final @deva[इम्]/deva[@deva[अद्]] by @ref[6.4.143]. Forms: @deva[किम्] → @deva[क] + @deva[तर] → @deva[कतर]; similarly @deva[यतर], @deva[ततर]. By @deva[महाविभाषा] (@ref[4.1.82]), sentences like @deva[को भवतोः] are also valid.
"""

id = "5.3.74"
numericId = "53074"

[en]
simple = """
The affixes @deva[क] and @deva[अकच्] also come when something is spoken of with contempt. Examples: @deva[अश्वकः] (a sorry horse), @deva[पचतकि] (he cooks contemptibly).
"""

standard = """
The affixes @deva[क] and @deva[अकच्] also express @deva[कुत्सित] (contempt/disparagement). Examples: @deva[अश्वकः] (a worthless horse); @deva[गर्दभकः], @deva[उष्ट्रकः]; @deva[उच्चकैः], @deva[नीचकैः]; @deva[पचतकि] (he cooks contemptibly); @deva[जल्पतकि] (he speaks insignificantly).
"""

advanced = """
The @deva[कुत्सितार्थ] (contemptuous sense) is another meaning for @deva[क]/deva[@deva[अकच्]]. The same forms express either @deva[अज्ञात] (@ref[5.3.73]) or @deva[कुत्सित]—context determines meaning. @deva[अश्वकः] = 'whose horse?' (unknown) or 'a sorry horse' (contempt). @deva[पचतकि] = 'does he cook?' or 'he cooks poorly.'
"""

id = "5.3.116"
numericId = "53116"

[en]
simple = """
The affix @deva[छ] comes after @deva[दामनि] and similar words, and after the six @deva[त्रिगर्त] warrior-clans. Examples: @deva[दामनीयः], plural @deva[दामनयः]; @deva[कौण्डोपरथीयः], plural @deva[कौण्डोपरथाः].
"""

standard = """
The affix @deva[छ] (@deva[ईय]) attaches without changing sense to @deva[दामन्यादि] words and the six @deva[त्रिगर्त षष्ठ] (Trigarta warrior-clans). The six Trigarta clans are: @deva[कौण्डोपरथ], @deva[दाण्डकि], @deva[कौष्ठिक], @deva[जालमानि], @deva[ब्रह्मगुप्त], @deva[जानकि]. Examples: @deva[दामनीयः], plural @deva[दामनयः]; @deva[औलपीयः], plural @deva[उलपयः]; @deva[कौण्डोपरथीयः], plural @deva[कौण्डोपरथाः].
"""

advanced = """
The @deva[दामन्यादि] is a listed @deva[गण] (24 items). The @deva[त्रिगर्तषष्ठ] are six warrior-clans of Trigarta region, enumerated in the @[kārikā]. @deva[छ] → @deva[ईय]. Plural @deva[लुक्] by @ref[2.4.62] removes the affix.
"""

id = "5.3.3"
numericId = "53003"

[en]
simple = """
@deva[इदम्] (this) becomes @deva[इ] when a @deva[प्राग्दिशीय] affix follows. For example, @deva[इदम्] + @deva[ह] → @deva[इह] (here).
"""

standard = """
The substitute @deva[इश्] replaces @deva[इदम्] before @deva[प्राग्दिशीय] affixes. The @deva[श्] is @deva[इत्] (marker) indicating @deva[सर्वादेश] (whole-word replacement) by @ref[1.1.55]. Thus @deva[इदम्] + @deva[ह] → @deva[इ] + @deva[ह] → @deva[इह] (here).
"""

advanced = """
The @deva[आदेश] @deva[इश्] replaces @deva[इदम्] when @deva[प्राग्दिशीय] affixes follow. The @deva[शकार] is @deva[इत्] by @ref[1.3.8] @deva[लशक्वतद्धिते], triggering @deva[सर्वादेश] via @ref[1.1.55] @deva[अनेकाल्शित्सर्वस्य]. This yields @deva[इह] from @deva[इदम्] + @deva[ह], and @deva[इतः] from @deva[इदम्] + @deva[तसिल्].
"""

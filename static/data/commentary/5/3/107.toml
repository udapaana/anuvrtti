id = "5.3.107"
numericId = "53107"

[en]
simple = """
The affix @deva[अण्] comes after @deva[शर्करा] and similar words in the sense of 'like this.' Examples: @deva[शार्करम्] (gravel-like), @deva[कापालिकम्] (skull-like).
"""

standard = """
The affix @deva[अण्] (@deva[अ] with @deva[वृद्धि]) attaches to @deva[शर्करादि] words expressing @deva[इव] (resemblance). Examples: @deva[शर्करेव] = @deva[शार्करम्] (like gravel); @deva[कापालिकम्] (skull-like). The class includes: @deva[शर्करा], @deva[कपालिका], @deva[कपाटिका], @deva[कनिष्ठिका], @deva[पुण्डरीक], @deva[शतपत्र], @deva[गोलोमन्], @deva[लोमन्], @deva[गोपुच्छ], @deva[नराची], @deva[नकुल], @deva[सिकता].
"""

advanced = """
The @deva[शर्करादि] is a closed @deva[गण]. @deva[अण्] triggers @deva[वृद्धि] of the initial vowel: @deva[शर्करा] → @deva[शार्कर]; @deva[कपालिका] → @deva[कापालिक]. The class items relate to textures, shapes, and natural objects used for comparison.
"""

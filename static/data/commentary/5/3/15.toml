id = "5.3.15"
numericId = "53015"

[en]
simple = """
The affix @deva[दा] comes after @deva[सर्व], @deva[एक], @deva[अन्य], @deva[किम्], @deva[यद्], and @deva[तद्] when time is meant. Examples: @deva[सर्वदा] (always), @deva[एकदा] (once), @deva[कदा] (when), @deva[यदा] (when), @deva[तदा] (then).
"""

standard = """
The affix @deva[दा] is added after @deva[सर्व], @deva[एक], @deva[अन्य], @deva[किम्], @deva[यद्], and @deva[तद्] to denote time. These words remain uninflected (@deva[अव्यय]). Examples: @deva[सर्वदा] (always), @deva[एकदा] (once), @deva[अन्यदा] (at another time), @deva[कदा] (when), @deva[यदा] (when), @deva[तदा] (then).
"""

advanced = """
The affix @deva[दा] attaches to six specified bases in @deva[कालार्थ] (time-meaning). The resulting @deva[तद्धितान्त] words are @deva[अव्यय] by @ref[1.1.38] @deva[तद्धितश्चासर्वविभक्तिः]. Stem changes: @deva[किम्] → @deva[क] by @ref[7.2.103]; @deva[तद्]/deva[@deva[यद्]] → @deva[त]/deva[@deva[य]] by @ref[7.2.102]. Being @deva[प्राग्दिशीय], @deva[दा] receives @deva[विभक्ति] @deva[संज्ञा].
"""

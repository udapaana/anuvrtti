id = "5.3.32"
numericId = "53032"

[en]
simple = """
The word @deva[पश्चात्] (behind, after, westward) is irregular. @deva[अपर] becomes @deva[पश्च], and the affix @deva[आति] is added. Example: @deva[अपरस्यां दिशि] = @deva[पश्चात्] (in the west).
"""

standard = """
The word @deva[पश्चात्] is @deva[निपातन]: @deva[अपर] → @deva[पश्च] + @deva[आति] → @deva[पश्चात्]. Examples: @deva[पश्चाद्वसति] (lives westward), @deva[पश्चादागतः] (came from west). @[vārttika]: When @deva[अपर] is preceded by direction-words, the same change occurs: @deva[दक्षिणपश्चात्], @deva[उत्तरपश्चात्]. Also @deva[पश्चार्धः] (latter half).
"""

advanced = """
This @deva[निपातन] teaches @deva[अपर] → @deva[पश्च] + @deva[आति] → @deva[पश्चात्] in @deva[अस्ताति]-sense. Three @[vārttikas] extend this: (1) @deva[दिक्पूर्व अपर] → @deva[पश्च] + @deva[आति]: @deva[दक्षिणपश्चात्], @deva[उत्तरपश्चात्]; (2) with @deva[अर्ध] following: @deva[दक्षिणपश्चार्धः]; (3) @deva[अपर] alone before @deva[अर्ध]: @deva[पश्चार्धः] (western half / latter portion).
"""

id = "5.3.78"
numericId = "53078"

[en]
simple = """
The affix @deva[ठच्] (becoming @deva[इक]) optionally comes after polysyllabic human names to express compassion. Alternatively @deva[कन्] comes. Examples: @deva[देवदत्त] → @deva[देविकः] or @deva[देवदत्तकः].
"""

standard = """
The affix @deva[ठच्] (@deva[इक]) optionally attaches to @deva[बह्वच्] (polysyllabic) @deva[मनुष्यनामन्] (human names) expressing compassion or courtesy. @deva[कन्] is the alternative. @deva[ठच्] triggers shortening by @ref[5.3.83]. Examples: @deva[देवदत्तः] → @deva[देविकः] (shortened) or @deva[देवदत्तकः] (with @deva[कन्]); @deva[यज्ञदत्तः] → @deva[यज्ञिकः] or @deva[यज्ञदत्तकः].
"""

advanced = """
This introduces @deva[ठच्] for @deva[अनुकम्पा/नीति] after polysyllabic human names. @deva[ठच्] → @deva[इक] (or @deva[क] per @ref[7.3.50-51]). By @ref[5.3.83], portions after the second vowel are deleted: @deva[देवदत्त] → @deva[देव] + @deva[इक] → @deva[देविकः]. @deva[कन्] doesn't trigger shortening: @deva[देवदत्तकः]. Restrictions: @deva[बह्वच्] (not @deva[दत्तकः], @deva[गुप्तकः]); @deva[मनुष्यनामन्] (not epithets like @deva[मद्रबाहुक]).
"""

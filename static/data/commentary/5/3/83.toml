id = "5.3.83"
numericId = "53083"

[en]
simple = """
When @deva[ठ] or vowel-initial affixes follow, everything after the second vowel of a human name is deleted. Example: @deva[देवदत्त] + @deva[इक] → @deva[देव] + @deva[इक] → @deva[देविकः].
"""

standard = """
When @deva[ठ] (@ref[5.3.78]) or vowel-initial affixes (@ref[5.3.79-80]) follow a human name, the portion after the second vowel (@deva[द्वितीयादूर्ध्वम्]) is deleted. Example: @deva[देवदत्त] → @deva[देव] (after second vowel @deva[अ]) + @deva[इक] → @deva[देविकः]. @[vārttika]: after fourth vowel for @deva[बृहस्पतिदत्त] → @deva[बृहस्पतिकः]. Optional with non-vowel-initial affixes: @deva[देवदत्तकः] or @deva[देवकः].
"""

advanced = """
This @deva[लोपविधि] deletes @deva[द्वितीयादूर्ध्वम्] (everything after second vowel) before @deva[ठच्] or @deva[अजादि] affixes (@deva[घन्], @deva[इलच्], @deva[अडच्], @deva[वुच्]). @deva[ठ] is specified separately because its substitute @deva[क] (after @deva[उ/ऋ/त्/इस्/उस्]) wouldn't otherwise be @deva[अजादि]. @[vārttikas]: (1) after 4th vowel for certain names; (2) optional with @deva[कन्]; (3) first member deletion possible; (4) @deva[इल] → @deva[ल] after @deva[उ/ऋ]; (5) @deva[ओ/औ/ए/ऐ] as 2nd vowel is also deleted.
"""

id = "5.3.96"
numericId = "53096"

[en]
simple = """
The affix @deva[कन्] means 'like this' (@deva[इव]) when expressing an imitation or replica. Examples: @deva[अश्वकः] (imitation horse—in wood or clay), @deva[उष्ट्रकः] (toy camel).
"""

standard = """
The affix @deva[कन्] expresses @deva[प्रतिकृति] (imitation, replica) with the sense 'like this' (@deva[इव]). Examples: @deva[अश्व इवायमश्व प्रतिकृतिः] = @deva[अश्वकः] (imitation horse in wood/clay); @deva[उष्ट्रकः] (toy camel); @deva[गर्दभकः] (toy donkey). Not for natural resemblance: @deva[गौरिव गवयः] (gayal resembles cow—no affix).
"""

advanced = """
This @deva[इवार्थ] use of @deva[कन्] is restricted to @deva[प्रतिकृति] (artificial imitation/replica), not natural resemblance. @deva[अश्वकः] = toy/model horse; distinct from a real horse resembling another. The restriction @deva[प्रतिकृतौ] excludes natural likenesses like @deva[गवय] (gayal) resembling @deva[गो] (cow).
"""

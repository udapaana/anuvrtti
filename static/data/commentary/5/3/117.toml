id = "5.3.117"
numericId = "53117"

[en]
simple = """
The affix @deva[अण्] comes after @deva[पर्शु] and similar words; @deva[अञ्] comes after @deva[यौधेय] and similar words—for warrior-classes. Examples: @deva[पार्शवः], plural @deva[पर्शवः]; @deva[यौधेयः], plural @deva[यौधेयाः].
"""

standard = """
The affix @deva[अण्] (@deva[अ]) attaches to @deva[पर्श्वादि] words, and @deva[अञ्] (@deva[अ]) to @deva[यौधेयादि] words, for warrior-class names without sense-change. @deva[पर्श्वादि] includes: @deva[पर्शु], @deva[असुर], @deva[रक्षस्], @deva[बाहीक], @deva[वयस्], @deva[वसु], @deva[मरुत्], etc. @deva[यौधेयादि] includes: @deva[यौधेय], @deva[कौशेय], @deva[शौक्रेय], @deva[त्रिगर्त], @deva[भरत], @deva[उशीनर], etc.
"""

advanced = """
Two @deva[गण]s: @deva[पर्श्वादि] (12 items) takes @deva[अण्]; @deva[यौधेयादि] (12 items) takes @deva[अञ्]. Both trigger @deva[वृद्धि]: @deva[पर्शु] → @deva[पार्शव]; @deva[असुर] → @deva[आसुर]. See also @ref[5.1.178]. These are @deva[तद्राज] affixes for warrior-clan derivations.
"""

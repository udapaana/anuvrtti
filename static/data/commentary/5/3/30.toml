id = "5.3.30"
numericId = "53030"

[en]
simple = """
When direction-words end in @deva[अञ्च्] (like @deva[प्राच्], @deva[प्रत्यच्]), the affix @deva[अस्ताति] undergoes @deva[लुक्] (deletion). Example: @deva[प्राच्यां दिशि] → @deva[प्राक्] (eastward). The feminine affix is also deleted.
"""

standard = """
After @deva[अञ्चति]-ending direction-words, @deva[अस्ताति] is deleted by @deva[लुक्]. Examples: @deva[प्राच्यां दिशि वसति] = @deva[प्राग् वसति] (lives eastward); @deva[प्रत्यक्] (westward). The feminine marker @deva[ङीप्] of @deva[प्राची] is also elided when the @deva[तद्धित] is @deva[लुक्]-deleted (see @ref[1.2.49]).
"""

advanced = """
After @deva[दिक्शब्द] ending in @deva[अञ्च्]-pratyaya (@deva[प्राच्], @deva[प्रत्यच्], @deva[उदच्] etc.), @deva[अस्ताति] undergoes @deva[लुक्] (elision with @deva[स्थानिवद्भाव]). The @deva[स्त्रीप्रत्यय] @deva[ङीप्] is also deleted by @ref[1.2.49] @deva[लुकि स्त्रियाः च] when @deva[तद्धित] is @deva[लुक्]. Forms: @deva[प्राक्] (from @deva[प्राची] + @deva[अस्ताति] → @deva[लुक्]); @deva[प्रत्यक्]; @deva[उदक्] (northward).
"""

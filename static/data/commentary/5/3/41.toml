id = "5.3.41"
numericId = "53041"

[en]
simple = """
The substitution of @deva[अव्] for @deva[अवर] is optional when @deva[अस्ताति] follows. So both @deva[अवस्तात्] and @deva[अवरस्तात्] are correct.
"""

standard = """
The @deva[अव्]-substitution for @deva[अवर] is optional (@deva[विकल्प]) before @deva[अस्ताति], creating doublets: @deva[अवस्तात्] ~ @deva[अवरस्तात्]. Examples: @deva[अवस्तात् वसति] or @deva[अवरस्तात् वसति]; similarly with @deva[आगतः], @deva[रमणीयम्].
"""

advanced = """
This @deva[विकल्प] rule overrides the obligatory substitution implied by @ref[5.3.40]. For @deva[अवर] specifically, both @deva[अव्] and the unchanged @deva[अवर] are valid before @deva[अस्ताति]. Note @deva[पूर्व] → @deva[पुर्] and @deva[अधर] → @deva[अध्] remain obligatory. Doublet: @deva[अवस्तात्]/deva[@deva[अवरस्तात्]].
"""

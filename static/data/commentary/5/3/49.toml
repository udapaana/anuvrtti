id = "5.3.49"
numericId = "53049"

[en]
simple = """
After ordinal numerals from fourth to tenth, the affix @deva[अन्] comes for 'part' meaning (not in Vedic). This affects accent. Examples: @deva[चतुर्थः] (fourth/quarter), @deva[पञ्चमः] (fifth/one-fifth).
"""

standard = """
The affix @deva[अन्] applies to ordinals from @deva[चतुर्थ] through @deva[दशम] (before eleven) for @deva[भाग] meaning, affecting accent. This does not apply in @deva[छन्दस्]. Examples: @deva[चतुर्थः], @deva[पञ्चमः], @deva[सप्तमः], @deva[नवमः], @deva[दशमः] (all with shifted accent). Not @deva[एकादशः], @deva[द्वादशः] (no change by @ref[6.1.223]).
"""

advanced = """
This rule extends @deva[अन्] to @deva[प्राग्एकादश पूरण] (ordinals before eleven) in @deva[भागार्थ], with @deva[स्वर]-shift as the primary effect. Excluded: @deva[छन्दस्] (where Vedic accents like @deva[पञ्चम] with final @deva[उदात्त] from @deva[डट्] + @deva[मट्] by @ref[5.2.48-49] remain). @deva[एकादश] onwards retain original accent by @ref[6.1.223].
"""

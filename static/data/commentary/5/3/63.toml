id = "5.3.63"
numericId = "53063"

[en]
simple = """
The word @deva[अन्तिक] (near) becomes @deva[नेद], and @deva[बाढ] (much/very) becomes @deva[साध] before @deva[इष्ठन्] and @deva[ईयसुन्]. Examples: @deva[नेदिष्ठम्] (nearest), @deva[नेदीयस्] (nearer); @deva[साधिष्ठः] (most), @deva[साधीयान्] (more).
"""

standard = """
Before @deva[इष्ठन्] and @deva[ईयसुन्]: @deva[अन्तिक] (near) → @deva[नेद]; @deva[बाढ] (much) → @deva[साध]. Examples: @deva[सर्वाणीमान्यन्तिकानि, इदमेषामतिशयेन] = @deva[नेदिष्ठम्] (nearest); @deva[इदमनयोरतिशयेन] = @deva[नेदीयस्] (nearer). Similarly @deva[साधिष्ठः], @deva[साधीयान्] from @deva[बाढ].
"""

advanced = """
These are @deva[आदेश] (substitutions): @deva[अन्तिक] → @deva[नेद]; @deva[बाढ] → @deva[साध] before @deva[अजादि] affixes. @deva[अन्तिक] 'near' and @deva[बाढ] 'much/emphatic' take these affixes via special substitution despite not being typical @deva[गुणवचन]. Forms: @deva[नेदिष्ठम्]/deva[@deva[नेदीयस्]]; @deva[साधिष्ठः]/deva[@deva[साधीयान्]].
"""

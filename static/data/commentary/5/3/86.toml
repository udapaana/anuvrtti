id = "5.3.86"
numericId = "53086"

[en]
simple = """
The affixes @deva[क] etc. come to express shortness of length or small size. Examples: @deva[वृक्षकः] (a small tree), @deva[प्लक्षकः] (a small fig tree), @deva[स्तम्भकः] (a small pillar).
"""

standard = """
The affixes @deva[क] etc. express @deva[ह्रस्व] (short length, small size)—opposed to @deva[दीर्घ] (long). Examples: @deva[ह्रस्वो वृक्षः] = @deva[वृक्षकः] (a small tree); @deva[प्लक्षकः] (small fig tree); @deva[स्तम्भकः] (small pillar).
"""

advanced = """
The @deva[ह्रस्वार्थ] (diminutive size) sense complements @deva[अल्पार्थ] (@ref[5.3.85], quantity). @deva[ह्रस्व] here means physical smallness, not the phonetic term. @deva[क] forms size-diminutives: @deva[वृक्षकः] = small/short tree. This is a common productive use of the @deva[क]-affix in Sanskrit.
"""

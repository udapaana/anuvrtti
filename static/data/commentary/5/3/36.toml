id = "5.3.36"
numericId = "53036"

[en]
simple = """
The affix @deva[आच्] (becoming @deva[आ]) comes after @deva[दक्षिण] with @deva[अस्ताति]-meaning but not in ablative sense. Example: @deva[दक्षिणा वसति] (lives southward), but @deva[दक्षिणत आगतः] (came from south).
"""

standard = """
The affix @deva[आच्] (@deva[आ]) attaches to @deva[दक्षिण] in @deva[अस्ताति]-sense excluding ablative (@deva[अपञ्चमी]). The @deva[अदूर] condition from @ref[5.3.35] does not apply here. Examples: @deva[दक्षिणा वसति] or @deva[दक्षिणा रमणीयम्]; but @deva[दक्षिणत आगतः] (ablative uses @deva[अतस्]).
"""

advanced = """
The affix @deva[आच्] is conditioned by @deva[अपञ्चमी] but not @deva[अदूर]. The @deva[चकार] is not for accent (since @deva[आ] is @deva[उदात्त] by @ref[3.1.3]) but distinguishes this @deva[आ] from that of @ref[2.3.29]. By @ref[6.1.163], the @deva[च्] prevents confusion. Ablative uses @deva[अतसुच्]: @deva[दक्षिणत आगतः].
"""

id = "5.3.52"
numericId = "53052"

[en]
simple = """
After @deva[एक] (one), the affix @deva[आकिनिच्] (becoming @deva[आकिन्]) comes when 'alone/without companion' is meant. Also @deva[कन्] or @deva[लुक्] apply. Examples: @deva[एकाकी] (alone), @deva[एककः], @deva[एकः].
"""

standard = """
The affix @deva[आकिनिच्] (@deva[आकिन्]) attaches to @deva[एक] meaning 'alone' (@deva[असहाय]). The @deva[चकार] also allows @deva[कन्] and @deva[लुक्]. Forms: @deva[एकाकी] (nom. of @deva[एकाकिन्]), @deva[एककः], @deva[एकः]. Since @deva[एक] here means 'alone' (not numeral 'one'), duals and plurals exist: @deva[एकाकिनौ], @deva[एकाकिनः].
"""

advanced = """
The affix @deva[आकिनिच्] applies to @deva[एक] in @deva[असहायार्थ] (solitary sense), not @deva[संख्यार्थ] (numeral). @deva[एक] has multiple meanings: @deva[अन्यार्थे, प्रधाने, प्रथमे, केवले, साधारणे, समाने, अल्पे, संख्यायां]. Here @deva[केवल] (alone) applies. The @deva[चकार] permits @deva[कन्] → @deva[एककः] and @deva[लुक्] → @deva[एकः]. Dual/plural possible: @deva[एकाकिनौ], @deva[एकाकिनः].
"""

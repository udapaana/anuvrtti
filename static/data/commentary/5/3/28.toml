id = "5.3.28"
numericId = "53028"

[en]
simple = """
The affix @deva[अतसुच्] (becoming @deva[अतस्]) comes after @deva[दक्षिण] (south) and @deva[उत्तर] (north) in the same senses, blocking @deva[अस्ताति]. Examples: @deva[दक्षिणतः] (to/from the south), @deva[उत्तरतः] (to/from the north).
"""

standard = """
The affix @deva[अतसुच्] (@deva[अतस्]) replaces @deva[अस्ताति] after @deva[दक्षिण] and @deva[उत्तर] for direction/place/time meanings. @deva[दक्षिण] only takes direction and place senses (not time). Examples: @deva[दक्षिणतो वसति] (lives southward); @deva[दक्षिणत आगतः] (came from south); @deva[उत्तरतः] (northward/from north/later).
"""

advanced = """
The affix @deva[अतसुच्] is @deva[अपवाद] to @deva[अस्ताति] after @deva[दक्षिण] and @deva[उत्तर]. The @deva[उच्] is @deva[इत्], leaving @deva[अतस्]. The initial @deva[अ] distinguishes from @deva[तस्] in rules like @ref[2.3.30]. @deva[दक्षिण] semantically excludes @deva[काल], so only @deva[दिक्/देश] apply. @deva[उत्तर] takes all three (@deva[उत्तरतः काले] = 'afterwards').
"""

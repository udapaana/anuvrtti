id = "5.3.75"
numericId = "53075"

[en]
simple = """
When the entire word is a proper name and expresses contempt, @deva[कन्] (not @deva[क]) is used. Examples: @deva[शूद्रकः] (the lowly @[śūdraka]), @deva[धारकः], @deva[चूर्णकः].
"""

standard = """
When the whole word functions as a @deva[संज्ञा] (proper name) with contemptuous sense, the affix @deva[कन्] (@deva[क]) replaces @deva[क]. The @deva[कुत्सित] meaning from @ref[5.3.74] continues. Examples: @deva[शूद्रकः] (name expressing contempt); @deva[धारकः]; @deva[चूर्णकः]. @deva[कन्] blocks @deva[क].
"""

advanced = """
This @deva[अपवाद] provides @deva[कन्] instead of @deva[क] when the @deva[समुदाय] (entire word) is a @deva[संज्ञा] (proper name) in @deva[कुत्सितार्थ]. The @deva[अनुवृत्ति] of @deva[कुत्सिते] continues from @ref[5.3.74]. @deva[कन्] differs from @deva[क] in accent and certain phonological behaviors. Names: @deva[शूद्रकः], @deva[धारकः], @deva[चूर्णकः].
"""

id = "5.3.26"
numericId = "53026"

[en]
simple = """
In Vedic usage, the affix @deva[था] comes after @deva[किम्] to denote cause or manner. Example: @deva[कथा] (why, wherefore; or how).
"""

standard = """
In @deva[छन्दस्] (Vedic texts), the affix @deva[था] comes after @deva[किम्] to denote @deva[हेतु] (cause) or @deva[प्रकार] (manner). The @deva[चकार] includes @deva[प्रकार]. Examples: @deva[कथा ग्रामं न पृच्छसि] = 'why don't you ask about the village?'; @deva[कथा देवा आसन्] = 'how were the gods?'
"""

advanced = """
This @deva[छन्दस्] rule teaches @deva[था] after @deva[किम्] in @deva[हेतु] (cause) and @deva[प्रकार] (manner) senses. The @deva[चकार] draws in @deva[प्रकारवचने] from context. @deva[कथा] = @deva[केन हेतुना] (for what reason) or @deva[केन प्रकारेण] (in what manner). This marks the end of @deva[विभक्तिसंज्ञक] affixes (@deva[इत्येते विभक्तिसंज्ञकाः]).
"""

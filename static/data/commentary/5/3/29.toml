id = "5.3.29"
numericId = "53029"

[en]
simple = """
The affix @deva[अतसुच्] also optionally comes after @deva[पर] (far) and @deva[अवर] (near), alongside @deva[अस्ताति]. Examples: @deva[परतः] or @deva[परस्तात्] (beyond); @deva[अवरतः] or @deva[अवरस्तात्] (near).
"""

standard = """
The affix @deva[अतसुच्] (@deva[अतस्]) optionally comes after @deva[पर] and @deva[अवर] in @deva[अस्ताति]-senses (direction/place/time). This creates doublets: @deva[परतः] ~ @deva[परस्तात्] (beyond, farther); @deva[अवरतः] ~ @deva[अवरस्तात्] (near, closer).
"""

advanced = """
This rule extends @deva[अतसुच्] to @deva[पर] and @deva[अवर] with @deva[विकल्प] against @deva[अस्ताति]. Both affixes apply in @deva[दिक्/देश/काल] senses. Forms: @deva[परतः]/deva[@deva[परस्तात्]] (@deva[दूरे] 'far'); @deva[अवरतः]/deva[@deva[अवरस्तात्]] (@deva[समीपे] 'near'). Unlike @ref[5.3.28], here @deva[अतसुच्] doesn't block @deva[अस्ताति].
"""

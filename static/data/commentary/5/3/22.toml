id = "5.3.22"
numericId = "53022"

[en]
simple = """
The following words are irregular formations for time: @deva[सद्यः] (same day), @deva[परुत्] (last year), @deva[परारि] (year before last), @deva[ऐषमः] (this year), @deva[परेद्यवि] (another day), @deva[अद्य] (today), and various @deva[-एद्युस्] compounds (on X day).
"""

standard = """
These fourteen time-words are @deva[निपातन] (irregular): @deva[सद्यः] (@deva[समान] → @deva[स] + @deva[द्यस्], same day), @deva[परुत्] (@deva[पूर्व] → @deva[पर] + @deva[उत्], last year), @deva[परारि] (year before last), @deva[ऐषमः] (@deva[इदम्] → @deva[इश] + @deva[समस्], this year), @deva[परेद्यवि] (other day), @deva[अद्य] (@deva[अद्य]-substitute + @deva[द्यस्], today), and @deva[-एद्युस्] forms: @deva[पूर्वेद्युस्], @deva[अन्येद्युस्], @deva[अन्यतरेद्युस्], @deva[इतरेद्युस्], @deva[अपरेद्युस्], @deva[अधरेद्युस्], @deva[उभयेद्युस्], @deva[उत्तरेद्युस्].
"""

advanced = """
This @deva[निपातन] lists fourteen irregular time-adverbs requiring special derivations: (1) @deva[सद्यः]: @deva[समान] → @deva[स] + @deva[द्यस्] (@deva[अहन्]-meaning); (2) @deva[परुत्]: @deva[पूर्व]/deva[@deva[पूर्वतर]] → @deva[पर] + @deva[उत्] (@deva[संवत्सर]); (3) @deva[परारि]: @deva[पूर्वतर] → @deva[पर] + @deva[आरि]; (4) @deva[ऐषमः]: @deva[इदम्] → @deva[इश] + @deva[समस्]; (5) @deva[परेद्यवि]: @deva[पर] + @deva[एद्यवि]; (6) @deva[अद्य]: @deva[अद्य]-@deva[आदेश] + @deva[द्यस्]; (7-14) @deva[पूर्व/अन्य/अन्यतर/इतर/अपर/अधर/उभय/उत्तर] + @deva[एद्युस्] (@deva[अहन्]-meaning).
"""

id = "5.3.31"
numericId = "53031"

[en]
simple = """
The words @deva[उपरि] (above) and @deva[उपरिष्टात्] (from above) are irregular formations from @deva[ऊर्ध्व] (upward). Examples: @deva[उपरि वसति] (lives above), @deva[उपरिष्टात् आगतः] (came from above).
"""

standard = """
The words @deva[उपरि] and @deva[उपरिष्टात्] are @deva[निपातन] with @deva[अस्ताति]-sense. @deva[ऊर्ध्व] is replaced by @deva[उप], then affixes @deva[रिल्] and @deva[रिष्टातिल्] are added respectively. Examples: @deva[ऊर्ध्वायां दिशि वसति] = @deva[उपरि वसति]; @deva[उपर्यागतः]; @deva[उपरिष्टाद्वसति].
"""

advanced = """
These are @deva[निपातन] forms with @deva[अस्ताति]-force. The derivation involves: @deva[ऊर्ध्व] → @deva[उप] (irregular substitution) + @deva[रिल्] → @deva[उपरि]; or @deva[उप] + @deva[रिष्टातिल्] → @deva[उपरिष्टात्]. Both express @deva[सप्तमी/पञ्चमी/प्रथमा] senses: @deva[उपरि वसति] (locative), @deva[उपर्यागतः] (ablative), @deva[उपरि रमणीयम्] (nominative).
"""

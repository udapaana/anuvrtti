id = "5.3.57"
numericId = "53057"

[en]
simple = """
The affixes @deva[तरप्] and @deva[ईयसुन्] come for comparative degree when comparing two things or distinguishing items. Examples: @deva[आढ्यतरः] (richer of two), @deva[पटीयान्] (more skillful of two).
"""

standard = """
The affixes @deva[तरप्] (@deva[तर]) and @deva[ईयसुन्] (@deva[ईयस्]) form comparatives in two contexts: (1) @deva[द्विवचन]—comparison between two: @deva[द्वाविमावाढ्यौ, अयमनयोरतिशयेन] = @deva[आढ्यतरः]; (2) @deva[विभज्योपपद]—distinguishing groups: @deva[माथुराः पाटलिपुत्रकेभ्य आढ्यतराः]. Examples: @deva[पटीयान्], @deva[लघीयान्] (from @deva[ईयसुन्]).
"""

advanced = """
These affixes form comparatives. @deva[द्विवचन] = expression involving two (not grammatical dual). @deva[विभज्योपपद] = differentiated @deva[उपपद] (correlate requiring distinction). @deva[यथासंख्य] (@ref[1.3.10]) doesn't apply—either affix with either condition. After verbs: @deva[पचतितराम्] (@deva[आम्] by @ref[5.4.11]). Plural comparatives: @deva[पटीयांसः], @deva[लघीयांसः] (for groups).
"""

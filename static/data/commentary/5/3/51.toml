id = "5.3.51"
numericId = "53051"

[en]
simple = """
After @deva[षष्ठ], @deva[कन्] comes when a part of @deva[मान] (measure/weight) is meant. After @deva[अष्टम], @deva[लुक्] (deletion) occurs when a part of an animal's body is meant. Examples: @deva[षष्ठकः] (one-sixth of a measure); @deva[अष्टमः] (one-eighth of an animal's body).
"""

standard = """
Special rules for @deva[षष्ठ] and @deva[अष्टम]: (1) @deva[कन्] comes after @deva[षष्ठ] for @deva[मान]-fraction: @deva[षष्ठकः भागः] (one-sixth of a grain-weight); (2) @deva[लुक्] of affixes occurs after @deva[अष्टम] for animal-body-parts: @deva[अष्टमः भागः] (one-eighth of an animal). Other affixes (@deva[ञ], @deva[अन्]) also apply optionally.
"""

advanced = """
This @[sūtra] provides specialized affixes: @deva[कन्] after @deva[षष्ठ] in @deva[मानभागार्थ] (@deva[मान] = grain-weight measure); @deva[लुक्] after @deva[अष्टम] in @deva[पश्वङ्गभागार्थ] (animal body-parts). @deva[लुक्] elides both @deva[ञ] and @deva[अन्]. The @deva[चकार] permits @deva[षाष्ठः]/deva[@deva[षष्ठः]] and @deva[आष्टमः]/deva[@deva[अष्टमः]] as alternatives. Context determines which affix applies.
"""

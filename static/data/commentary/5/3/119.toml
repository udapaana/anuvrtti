id = "5.3.119"
numericId = "53119"

[en]
simple = """
The affixes @deva[ञ्य] and others taught from @ref[5.3.112] onward are called @deva[तद्राज] (king-denoting affixes). This designation is used in @ref[2.4.62] for @deva[बहुवचन] (plural) elision.
"""

standard = """
The affixes starting from @deva[ञ्य] (@ref[5.3.112]) through the end of this section are designated @deva[तद्राज] (affixes denoting 'king thereof' or 'leader thereof'). This @deva[संज्ञा] (technical term) is referenced in @ref[2.4.62] @deva[तद्राजस्य बहुषु तेनैवास्त्रियाम्] for plural elision.
"""

advanced = """
This @deva[संज्ञासूत्र] establishes @deva[तद्राज] as the designation for affixes from @ref[5.3.112] onward (@deva[ञ्य], @deva[ञ्यञ्], @deva[टेण्यण्], @deva[छ], @deva[अण्], @deva[अञ्], @deva[यञ्]). The term @deva[तद्राज] = 'king/ruler of that (group).' By @ref[2.4.62], @deva[तद्राज] affixes undergo @deva[लुक्] in plural non-feminine forms.
"""

id = "5.2.5"
numericId = "52005"

[en]
simple = """
The affixes @deva[ख] and @deva[खञ्] come after @deva[सर्वचर्मन्] to mean 'wholly made of leather'. @deva[सर्वचर्मणा कृतः] → @deva[सर्वचर्मीणः] or @deva[सार्वचर्मीणः] 'made entirely of leather'.
"""

standard = """
After @deva[सर्वचर्मन्] 'whole leather', both @deva[ख] and @deva[खञ्] (both realized as @deva[ईन]) denote 'wholly made thereof' (@deva[सर्वेण कृतः]). The word @deva[सर्व] joins semantically with @deva[कृतः] 'made', not with @deva[चर्मन्] 'leather'. The compounding is affix-induced. Examples: @deva[सर्वचर्मणा कृतः] → @deva[सर्वचर्मीणः] (by @deva[ख]) or @deva[सार्वचर्मीणः] (by @deva[खञ्] with @deva[वृद्धि]).
"""

advanced = """
The dual-affix prescription (@deva[ख]//@deva[खञ्]) for @deva[सर्वचर्मन्] yields forms with and without @deva[वृद्धि]. The @deva[सर्व] component contributes to the affix-meaning (@deva[प्रत्ययार्थ]) as 'wholly/entirely', semantically binding with @deva[कृत] rather than forming a standard compound with @deva[चर्मन्]. This illustrates @deva[प्रत्ययकृतसमास] where the affix itself induces compounding.
"""

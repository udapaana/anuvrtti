id = "5.2.124"
numericId = "52124"

[en]
simple = """
The affix @deva[ग्मिनि] comes after @deva[वाच्] 'speech' with @deva[मतुप्]-sense. @deva[वाग्मी] 'eloquent'.
"""

standard = """
After @deva[वाच्] 'speech', the affix @deva[ग्मिनि] (= @deva[ग्मिन्]) comes with @deva[मतुप्]-sense. Result: @deva[वाग्मी] (dual @deva[वाग्मिनौ], plural @deva[वाग्मिनः]) 'eloquent speaker'. The affix is @deva[ग्मिनि], not @deva[मिन्]; if it were @deva[मिन्], the form would be @deva[वाङ्मिन्] by @ref[8.4.45] @deva[वार्त्तिक] (nasal assimilation).
"""

advanced = """
The @deva[ग्मिनि]-affix (not @deva[मिनि]) for @deva[वाच्] avoids the @deva[अनुनासिकसंधि] of @ref[8.4.45]-@deva[वार्त्तिक]. With @deva[ग्मिन्], the derivation is @deva[वाच्] + @deva[ग्मिन्] → @deva[वाग्मिन्] (no nasalization). If @deva[मिन्] were the affix, @deva[वाच्] + @deva[मिन्] → *@deva[वाङ्मिन्] would result.
"""

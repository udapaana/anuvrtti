id = "5.2.31"
numericId = "52031"

[en]
simple = """
The affixes @deva[टीटच्], @deva[नाटच्], and @deva[भ्रटच्] come after @deva[अव] to mean 'a hooked/bent nose' (when forming a name). @deva[नासिकाया नतम्] → @deva[अवटीटम्], @deva[अवनाटम्], or @deva[अवभ्रटम्].
"""

standard = """
After @deva[अव] 'down', the affixes @deva[टीटच्] (= @deva[टीट]), @deva[नाटच्] (= @deva[नाट]), and @deva[भ्रटच्] (= @deva[भ्रट]) denote 'a hooked nose' (@deva[नासिकाया नतम्] 'bend of the nose') when forming a name (@deva[संज्ञायाम्]). Examples: @deva[अवटीटम्], @deva[अवनाटम्], @deva[अवभ्रटम्]. The word signifies both the nose and a person with such a nose: @deva[अवटीटा नासिका] 'a hooked nose', @deva[अवटीटः पुरुषः] 'a hook-nosed person'.
"""

advanced = """
The triple-affix prescription (@deva[टीटच्], @deva[नाटच्], @deva[भ्रटच्]) for @deva[अव] creates @deva[संज्ञा] (proper names/epithets) denoting @deva[नासिकानति] (nasal curvature). The derived forms function both attributively (@deva[अवटीटा नासिका]) and substantively (@deva[अवटीटः पुरुषः]). These @deva[नामधेय] terms exemplify physical-characteristic naming.
"""

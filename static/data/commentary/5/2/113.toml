id = "5.2.113"
numericId = "52113"

[en]
simple = """
The affix @deva[वलच्] comes after @deva[दन्त] 'tooth/tusk' and @deva[शिखा] 'crest' when forming a name with @deva[मतुप्]-sense. @deva[दन्तावलः] 'elephant'; @deva[शिखावलम्] 'a city name'.
"""

standard = """
After @deva[दन्त] 'tooth/tusk' and @deva[शिखा] 'crest/peak', the affix @deva[वलच्] comes with @deva[मतुप्]-sense when forming a proper name (@deva[संज्ञायाम्]). Examples: @deva[दन्तावलः सैन्यः] 'an elephant (in army)'; @deva[दन्तावलो गजः] 'tusked elephant'; @deva[शिखावलं नगरम्] 'the city @[śikhāvala]'; @deva[शिखावलः स्थूणा] 'a crested pillar'. The final vowel of @deva[दन्त] is lengthened before @deva[वल] by @ref[6.3.118].
"""

advanced = """
The @deva[वलच्]-affix in @deva[संज्ञा]-context applies to @deva[दन्त] and @deva[शिखा] with @deva[दीर्घ] by @ref[6.3.118] (@deva[दन्त] → @deva[दन्ता] before @deva[वल]). @deva[दन्तावल] becomes a name for tusked elephants; @deva[शिखावल] for places/objects with crests. The @deva[संज्ञा]-restriction limits productive use.
"""

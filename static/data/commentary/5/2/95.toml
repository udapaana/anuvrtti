id = "5.2.95"
numericId = "52095"

[en]
simple = """
The affix @deva[मतुप्] comes after @deva[रस] 'taste/essence' and similar words with possessive meaning. @deva[रसवान्] 'having taste', @deva[रूपवान्] 'having form', @deva[गन्धवान्] 'having smell'.
"""

standard = """
After @deva[रस] and similar words (@deva[रसादि]), the affix @deva[मतुप्] comes with possessive meaning. Examples: @deva[रसवान्] 'having taste/flavor', @deva[रूपवान्] 'having form/beauty', @deva[गन्धवान्] 'having smell/fragrance'. Why this special @[sūtra] when @deva[मतुप्] applies generally? To prevent other @deva[मतुप्]-sense affixes from applying to these words. However, @deva[रूपिणी कन्या], @deva[रूपिकः दारकः] do occur — these are rare/exceptional forms.
"""

advanced = """
The @deva[रसादि] @deva[गण] receives @deva[मतुप्] by this specific rule to create @deva[नियम] (restriction): other @deva[मतुप्]-@deva[अर्थक] affixes (@deva[इनि], @deva[ठन्], etc.) are blocked. The attested @deva[रूपिन्], @deva[रूपिक] forms are explained as @deva[अप्रसिद्ध] (rare) or @deva[अन्यार्थ] (different meaning). The @deva[गण] includes sensory-quality terms: @deva[रस], @deva[रूप], @deva[गन्ध], etc.
"""

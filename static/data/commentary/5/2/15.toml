id = "5.2.15"
numericId = "52015"

[en]
simple = """
The affix @deva[ख] comes after @deva[अनुगु] to mean 'one fit to follow (the cows)'. @deva[अनुगु पर्याप्तं गच्छति] → @deva[अनुगवीनः] 'a cowherd'.
"""

standard = """
After @deva[अनुगु] 'after the cow' (= @deva[गोः पश्चात्]), the affix @deva[ख] denotes 'one who is fit/able to follow'. Example: @deva[अनुगु पर्याप्तं गच्छति] → @deva[अनुगवीनः] 'one suited or able to follow after the cows', i.e., a cowherd. The word @deva[अनुगु] is formed from @deva[अनु] 'after' + @deva[गु] (= @deva[गो]).
"""

advanced = """
The @deva[ख]-affix with @deva[पर्याप्ति/अनुसरणयोग्यता] meaning applies to @deva[अनुगु] (@deva[अव्ययीभाव]: @deva[अनु] + @deva[गु], where @deva[गु] is a @deva[गो]-variant). The derived @deva[अनुगवीन] denotes 'one capable of following cattle', a technical term for cowherds. The @deva[पर्याप्त] element in the gloss indicates suitability/capability for the herding task.
"""

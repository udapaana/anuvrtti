id = "5.2.82"
numericId = "52082"

[en]
simple = """
The affix @deva[कन्] comes after food-words (nominative) to mean 'this is the principal food of this occasion', when forming a name. @deva[गुडापूपाः प्रायेण अन्नम् अस्याः पौर्णमास्याम्] → @deva[गुडापूपिका पौर्णमासी] 'the Jaggery-cake Full-moon day'.
"""

standard = """
After words denoting food in the nominative, the affix @deva[कन्] means @deva[प्रायेण अन्नम्] 'principal food (of an occasion)', when forming a proper name (@deva[संज्ञायाम्]). Example: @deva[गुडापूपाः प्रायेण अन्नम् अस्याः पौर्णमास्याम्] → @deva[गुडापूपिका पौर्णमासी] 'the @deva[गुडापूपिका] Full-moon' — that particular full-moon when jaggery-cakes are the principal food. Similarly: @deva[तिलापूपिका], @deva[कृशरिका].
"""

advanced = """
The @deva[कन्]-affix with @deva[प्रायान्न]-meaning (predominant food) applies to @deva[प्रथमान्त अन्नवाचिन्] bases in @deva[संज्ञा] (naming) context. The derived forms become calendrical names: specific full-moon days characterized by their ritual food offerings. @deva[गुडापूप] (jaggery-cakes), @deva[तिलापूप] (sesame-cakes), @deva[कृशर] (rice-sesame dish) mark different @deva[पौर्णमासी] observances.
"""

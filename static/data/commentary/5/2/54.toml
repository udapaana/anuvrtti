id = "5.2.54"
numericId = "52054"

[en]
simple = """
The affix @deva[तीय] comes after @deva[द्वि] 'two' to mean 'completer thereof'. @deva[द्वयोः पूरणः] → @deva[द्वितीयः] 'second'.
"""

standard = """
After @deva[द्वि] 'two', the affix @deva[तीय] denotes @deva[पूरण] 'completer' (ordinal sense). This blocks @deva[डट्]. Example: @deva[द्वयोः पूरणः] → @deva[द्वितीयः] 'the second' — that which completes the two.
"""

advanced = """
The @deva[तीय]-affix is an @deva[अपवाद] (exception) to @deva[डट्] for @deva[द्वि]. The direct suffixation @deva[द्वि] + @deva[तीय] → @deva[द्वितीय] creates the ordinal 'second'. Unlike the @deva[डट्]-derived ordinals, @deva[तीय] is a full affix rather than requiring augments.
"""

id = "5.2.1"
numericId = "52001"

[en]
simple = """
The affix @deva[खञ्] (@deva[ईन]) comes after grain-names to mean 'a field where it grows'. @deva[धान्य] 'grain' → @deva[धान्यम् भवति यत्र क्षेत्रम्] → @deva[धानीनम्] 'a grain-field'.
"""

standard = """
After names of grain (@deva[धान्यशब्द]) in the genitive, the affix @deva[खञ्] (realized as @deva[ईन]) denotes 'a field where it grows' (@deva[भवनं क्षेत्रम्]). The word @deva[धान्यानाम्] in the @[sūtra] indicates that the base must be a grain-type. Examples: @deva[धान्यानां भवनं क्षेत्रम्] → @deva[धानीनम्] 'a field for growing grain'.
"""

advanced = """
The @deva[खञ्]-affix applies to @deva[धान्यवाचिन्] bases with the specialized meaning @deva[भवनं क्षेत्रम्] (a field as place of growth). The genitive relation in the @[sūtra] (@deva[धान्यानाम्]) establishes the semantic frame 'field of X (grain)'. This begins a section on @deva[तद्धित] affixes denoting fields, containers, and related spatial-functional concepts.
"""

id = "5.2.93"
numericId = "52093"

[en]
simple = """
The word @deva[इन्द्रिय] (with final acute accent) is irregularly formed, meaning 'organ of sense'. Multiple etymologies exist involving @deva[इन्द्र]: inferred from, seen by, created by, wished by, or given by @deva[इन्द्र].
"""

standard = """
The word @deva[इन्द्रिय] (with @deva[उदात्त] on final syllable) is an irregular formation (@deva[निपातन]) meaning 'organ of sense' (eyes, ears, etc.). Its derivation is obscure, with multiple proposed etymologies: (1) @deva[इन्द्रलिङ्ग] — characteristic from which @deva[इन्द्र]'s existence is inferred; (2) @deva[इन्द्रदृष्ट] — seen by @deva[इन्द्र]; (3) @deva[इन्द्रसृष्ट] — created by @deva[इन्द्र]; (4) @deva[इन्द्रइष्ट] — wished by @deva[इन्द्र]; (5) @deva[इन्द्रदत्त] — given by @deva[इन्द्र].
"""

advanced = """
The @deva[निपातन] @deva[इन्द्रिय] with @deva[अन्तोदात्त] accent is a primitive term for sense-organs. Five etymological interpretations are offered: @deva[लिङ्ग] (inferential mark of @deva[इन्द्र]/soul), @deva[दृष्ट/सृष्ट/इष्ट/दत्त] (seen/created/wished/given by @deva[इन्द्र]). None is derivationally transparent; the word functions as @deva[रूढि] (conventional designation) in philosophical and medical contexts.
"""

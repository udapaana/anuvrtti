id = "5.2.126"
numericId = "52126"

[en]
simple = """
The word @deva[स्वामिन्] is irregularly formed, meaning 'lord/master'. @deva[स्व] 'own' + @deva[आमिन्] → @deva[स्वामिन्] 'owner, lord'.
"""

standard = """
The word @deva[स्वामिन्] 'lord/master' is an irregular formation (@deva[निपातन]). The affix @deva[आमिन्] comes after @deva[स्व] 'own' with meaning of lordship (@deva[ऐश्वर्य]). Example: @deva[स्वम् अस्य अस्ति] = @deva[ऐश्वर्यम् अस्य अस्ति] → @deva[स्वामिन्] 'owner, lord, master'. Why 'when meaning lord'? @deva[स्ववान्] simply means 'having one's own (property)'.
"""

advanced = """
The @deva[निपातन] @deva[स्वामिन्] derives from @deva[स्व] + @deva[आमिन्] with @deva[ऐश्वर्य]-meaning (lordship/ownership), not mere possession. The semantic restriction to 'lord/master' distinguishes it from regular @deva[स्ववत्] 'property-owner'. @deva[स्वामिन्] is lexicalized for authority/sovereignty contexts.
"""

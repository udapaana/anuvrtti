id = "5.2.33"
numericId = "52033"

[en]
simple = """
The affixes @deva[इनच्] and @deva[पिटच्] come after @deva[नि] to mean 'hooked nose', with @deva[नि] replaced by @deva[चिक्] and @deva[चि] respectively. @deva[नि] + @deva[इनच्] → @deva[चिकिनः]; @deva[नि] + @deva[पिटच्] → @deva[चिपिटः].
"""

standard = """
After @deva[नि], the affixes @deva[इनच्] and @deva[पिटच्] denote 'hooked nose', with @deva[नि] being replaced: @deva[चिक्] replaces @deva[नि] before @deva[इनच्], and @deva[चि] replaces @deva[नि] before @deva[पिटच्]. Derivations: @deva[नि] + @deva[इनच्] → @deva[चिक्] + @deva[इनच्] → @deva[चिकिनः]; @deva[नि] + @deva[पिटच्] → @deva[चि] + @deva[पिटच्] → @deva[चिपिटः]. A @deva[वार्त्तिक] adds: @deva[क] also comes with @deva[चिक्] replacing @deva[नि] → @deva[चिक्] + @deva[क] → @deva[चिल्लः].
"""

advanced = """
The @deva[इनच्]//@deva[पिटच्] affixes trigger @deva[आदेश] (substitution) of @deva[नि]: @deva[चिक्] before @deva[इनच्] (→ @deva[चिकिन]), @deva[चि] before @deva[पिटच्] (→ @deva[चिपिट]). A @deva[वार्त्तिक] supplements @deva[क]-affix with @deva[चिक्]-substitution yielding @deva[चिल्ल] (with @deva[ककारलोप] and @deva[द्वित्व]). These represent @deva[स्थानिवद्भाव]-exempt irregular formations.
"""

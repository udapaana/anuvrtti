id = "5.2.22"
numericId = "52022"

[en]
simple = """
The word @deva[साप्तपदीन] is irregular, meaning 'friendship'. It derives from @deva[सप्तपद] 'seven steps'. @deva[सप्तभिः पदैः अवाप्यते] → @deva[साप्तपदीनम्] 'formed by walking seven steps together'.
"""

standard = """
The word @deva[साप्तपदीन] is an irregular formation (@deva[निपातन]) meaning 'friendship' (@deva[मैत्री]). It derives from @deva[सप्तपद] 'seven steps'. The explanation: @deva[सप्तभिः पदैः अवाप्यते] 'attained by (walking) seven steps' → @deva[साप्तपदीनम्]. This may relate to the marriage ritual where bride and groom circumambulate the sacred fire in seven steps (@deva[सप्तपदी]), making the marriage irrevocable and establishing permanent friendship.
"""

advanced = """
The @deva[निपातन] @deva[साप्तपदीन] (from @deva[सप्तपद] with @deva[खञ्]-like derivation and @deva[वृद्धि]) denotes @deva[मैत्री] (friendship/alliance). The etymological gloss @deva[सप्तपदैः अवाप्यते] connects to the Vedic marriage rite @deva[सप्तपदी] (seven-step circumambulation around @deva[अग्नि]), which creates indissoluble bonds. The semantic extension from ritual to general friendship is culturally grounded.
"""

id = "5.2.10"
numericId = "52010"

[en]
simple = """
The affix @deva[ख] comes after @deva[परोवर], @deva[परम्पर], and @deva[पुत्रपौत्र] (accusative) to mean 'one who witnesses/experiences that'. @deva[परांश्च अवरांश्च अनुभवति] → @deva[परोवरीणः] 'one who lives to see high and low'.
"""

standard = """
After @deva[परोवर] 'high and low', @deva[परम्पर] 'successive', and @deva[पुत्रपौत्र] 'sons and grandsons' (accusative), the affix @deva[ख] denotes 'one who witnesses/experiences'. @deva[परोवर] is compounded from @deva[पर] + @deva[अवर] with irregular @deva[ओ] (affix-induced). Examples: @deva[परांश्च अवरांश्च अनुभवति] → @deva[परोवरीणः] 'one who lives to see high and low (generations)'; @deva[पुत्रान् पौत्रांश्च अनुभवति] → @deva[पुत्रपौत्रीणः] 'one who lives to see sons and grandsons'.
"""

advanced = """
The @deva[ख]-affix with @deva[अनुभव]-meaning (experiencing/witnessing) applies to @deva[द्वन्द्व]-type bases: @deva[परोवर] (@deva[पर] + @deva[अवर], irregular @deva[ओ] by @deva[प्रत्ययकृत] compounding), @deva[परम्पर] (@deva[पर] + @deva[पर] with @deva[मुक्-आगम]), @deva[पुत्रपौत्र]. These derivatives describe longevity or comprehensiveness of experience across generations or extremes.
"""

id = "5.2.81"
numericId = "52081"

[en]
simple = """
The affix @deva[कन्] comes after words expressing time or cause/effect (of disease) when an illness is denoted. @deva[द्वितीये अह्नि भवः] → @deva[द्वितीयकः ज्वरः] 'fever recurring on the second day'.
"""

standard = """
When denoting illness (@deva[आमय]), the affix @deva[कन्] comes after words expressing: (1) @deva[काल] 'time' (days, etc.) or (2) @deva[प्रयोजन] 'cause or effect of the disease'. Examples: @deva[द्वितीये अह्नि भवः] → @deva[द्वितीयको ज्वरः] 'fever coming on the second day'; @deva[चतुर्थकः] 'quartan fever' (recurring every fourth day). With @deva[प्रयोजन]: @deva[विषपुष्पैः जनितः] → @deva[विषपुष्पको ज्वरः] 'fever caused by poisonous flowers'.
"""

advanced = """
The @deva[कन्]-affix in @deva[आमयवाचक] (disease-denoting) context applies to @deva[कालवाचिन्] (time-expressions) and @deva[प्रयोजनवाचिन्] (cause/effect expressions). @deva[काल] refers to periodicity (@deva[द्वितीयक] = tertian, @deva[चतुर्थक] = quartan fevers). @deva[प्रयोजन] encompasses both @deva[हेतु] (cause: @deva[विषपुष्पक]) and @deva[फल] (symptomatic effect). This creates medical terminology.
"""

id = "5.2.86"
numericId = "52086"

[en]
simple = """
The affix @deva[इनि] comes after @deva[पूर्व] 'before/formerly' to mean 'by whom something was done formerly'. @deva[पूर्वं गतम् अनेन] → @deva[पूर्वी] 'one who went before'.
"""

standard = """
After @deva[पूर्व] 'formerly/before', the affix @deva[इनि] (= @deva[इन्]) denotes @deva[अनेन] 'by whom (something was done)' in the past. The @deva[अनेन] from the previous @[sūtra] continues, but not @deva[भुक्त]; a general verb ('doing', 'going', etc.) must be supplied. Example: @deva[पूर्वं गतम् अनेन] → @deva[पूर्वी] 'one who went before'; similarly @deva[पूर्वं भुक्तम्], @deva[पूर्वं पीतम्] → @deva[पूर्वी] 'one who formerly ate/drank'.
"""

advanced = """
The @deva[इनि]-affix with @deva[पूर्वं कृतम् अनेन]-meaning (past-action by agent) applies to @deva[पूर्व]. The @deva[अनुवृत्ति] of @deva[अनेन] (instrumental agent) continues from @ref[5.2.85], but @deva[भुक्त] does not; a generic @deva[क्रिया] (action) must be contextually supplied. The derived @deva[पूर्विन्] indicates prior performance of unspecified actions.
"""

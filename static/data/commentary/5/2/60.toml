id = "5.2.60"
numericId = "52060"

[en]
simple = """
When expressing @deva[अध्याय] (chapter) or @deva[अनुवाक] (section), the @deva[छ] affix (with @deva[मतुप्]-sense) undergoes @deva[लुक्] (total elision). @deva[गर्दभाण्डो अध्यायः] 'chapter having @deva[गर्दभाण्ड]'.
"""

standard = """
When denoting an @deva[अध्याय] (chapter/lesson) or @deva[अनुवाक] (Vedic section), the affix @deva[छ] (= @deva[ईय]) with @deva[मतुप्]-sense undergoes @deva[लुक्] (complete elision). This @[sūtra] implies (@deva[ज्ञापक]) that @deva[छ] does come after a nominal stem for @deva[अध्याय]//@deva[अनुवाक] designation. According to @[patañjali], the elision is optional. Example: @deva[गर्दभाण्ड शब्दः अस्मिन् अस्ति] → @deva[गर्दभाण्डो अध्यायः] (with @deva[लुक्]) or @deva[गर्दभाण्डीयो अध्यायः] (without @deva[लुक्]).
"""

advanced = """
The @deva[छ-लुक्] (elision of @deva[छ]) for @deva[अध्याय]//@deva[अनुवाक] contexts is @deva[ज्ञापक] (indicator) that @deva[छ] is indeed prescribed for these textual divisions. The @deva[लुक्]-operation per @ref[1.1.61] leaves no trace. @[patañjali]'s @deva[विकल्प] interpretation allows both @deva[गर्दभाण्ड] (zero-derived) and @deva[गर्दभाण्डीय] (with @deva[छ]) as @deva[अध्याय]-names.
"""

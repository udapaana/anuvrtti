id = "5.2.91"
numericId = "52091"

[en]
simple = """
The affix @deva[इनि] comes after @deva[साक्षात्] 'directly' to mean 'a spectator/witness', when forming a name. @deva[साक्षात् द्रष्टा] → @deva[साक्षी] 'eye-witness'.
"""

standard = """
After the indeclinable @deva[साक्षात्] 'directly/in person', the affix @deva[इनि] (= @deva[इन्]) denotes @deva[द्रष्टृ] 'one who sees', when forming a name (@deva[संज्ञायाम्]). Example: @deva[साक्षात् द्रष्टा] → @deva[साक्षी] (dual @deva[साक्षिणौ], plural @deva[साक्षिणः]) 'eye-witness'. In transactions like loans, three persons directly see: the giver, taker, and observer — all may be called @deva[द्रष्टृ], but @deva[साक्षिन्] specifically names the witness.
"""

advanced = """
The @deva[इनि]-affix with @deva[द्रष्टृ]-meaning applies to the @deva[अव्यय] @deva[साक्षात्] in @deva[संज्ञा] (naming) context. The word @deva[संज्ञा] restricts the derivation to proper designation (legal/formal witness), not casual seeing. The @deva[साक्षात्] + @deva[इनि] → @deva[साक्षिन्] formation is lexicalized for 'witness' in legal/testimonial contexts.
"""

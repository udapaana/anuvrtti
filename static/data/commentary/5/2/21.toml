id = "5.2.21"
numericId = "52021"

[en]
simple = """
The affix @deva[खञ्] comes after @deva[व्रात] 'a mixed-caste group' (instrumental) to mean 'one who lives by this'. @deva[व्रातेन जीवति] → @deva[व्रातीनः] 'one who lives by manual labor'.
"""

standard = """
After @deva[व्रात] 'a multitude of mixed castes' (instrumental), the affix @deva[खञ्] denotes 'one who leads this life/lives by this'. The word @deva[व्रात] refers to a group composed of various castes without fixed employment, living by violence or bodily labor. Example: @deva[व्रातेन जीवति] → @deva[व्रातीनः] 'a person who lives by bodily labor (not intellectual work)'.
"""

advanced = """
The @deva[खञ्]-affix with @deva[तेन जीवति]-meaning applies to @deva[तृतीयान्त] @deva[व्रात]. The @deva[व्रात] denotes a social aggregate (@deva[वर्णसंकर]) without hereditary occupation, sustaining through physical labor or quasi-mercenary activity. The derived @deva[व्रातीन] characterizes livelihood-mode as distinguished from @deva[बुद्धिजीविन्] (intellectual workers).
"""

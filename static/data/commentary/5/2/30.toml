id = "5.2.30"
numericId = "52030"

[en]
simple = """
The affixes @deva[कुटारच्] and @deva[कटच्] come after @deva[अव] 'down'. @deva[अव] → @deva[अवकुटारम्] or @deva[अवकटम्] 'downwards, very deep'.
"""

standard = """
After @deva[अव] 'down/downward', both affixes @deva[कुटारच्] (= @deva[कुटार]) and @deva[कटच्] (= @deva[कट]) apply. Examples: @deva[अव] + @deva[कुटारच्] → @deva[अवकुटारम्]; @deva[अव] + @deva[कटच्] → @deva[अवकटम्]. Both mean 'downwards' or 'very deep'.
"""

advanced = """
The dual-affix prescription (@deva[कुटारच्]//@deva[कटच्]) for @deva[अव] creates synonymous @deva[अव्यय]-forms @deva[अवकुटार] and @deva[अवकट], both denoting downward direction or depth. These are @deva[क्रियाविशेषण] (adverbial) forms intensifying the directional sense of @deva[अव].
"""

id = "5.2.74"
numericId = "52074"

[en]
simple = """
The words @deva[अनुक], @deva[अभिक], and @deva[अभीक] are irregular formations meaning 'being at liberty/fond of'. @deva[अनुकामयते] → @deva[अनुकः] 'desirous'; @deva[अभिकामयते] → @deva[अभिकः]/@deva[अभीकः]] 'lover'.
"""

standard = """
The words @deva[अनुक], @deva[अभिक], and @deva[अभीक] are irregular (@deva[निपातन]) meaning @deva[स्वातन्त्र्य] 'being at liberty' or @deva[कामुकता] 'being fond of'. Examples: @deva[अनुकामयते] (desires freely) → @deva[अनुकः] 'desirous, libidinous'; @deva[अभिकामयते] (desires intensely) → @deva[अभिकः] or @deva[अभीकः] 'a lover, voluptuous person'.
"""

advanced = """
The @deva[निपातन] forms @deva[अनुक], @deva[अभिक], @deva[अभीक] derive irregularly with @deva[कामयते]-related semantics. The @deva[अनु]//@deva[अभि] prefixes contribute directional nuance: @deva[अनु] = following/according to (free will); @deva[अभि] = towards (intense desire). The @deva[अभीक] variant shows @deva[दीर्घ] of @deva[इ]. All denote libidinal/volitional states.
"""

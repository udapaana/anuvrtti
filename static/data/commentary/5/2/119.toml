id = "5.2.119"
numericId = "52119"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[शत] 'hundred' and @deva[सहस्र] 'thousand' when preceded by @deva[निष्क] 'gold coin' with @deva[मतुप्]-sense. @deva[निष्कशतम् अस्य अस्ति] → @deva[नैष्कशतिकः] 'having a hundred @[niṣkas]'.
"""

standard = """
After @deva[शत] 'hundred' and @deva[सहस्र] 'thousand' when following @deva[निष्क] 'gold coin/weight', the affix @deva[ठञ्] comes with @deva[मतुप्]-sense. Examples: @deva[निष्कशतम् अस्य अस्ति] → @deva[नैष्कशतिकः] 'possessing a hundred @[niṣkas]'; @deva[नैष्कसहस्रिकः] 'having a thousand @[niṣkas]'. But not after @deva[सुवर्णनिष्कशतम्] — such usage is not attested.
"""

advanced = """
The @deva[ठञ्]-affix for @deva[निष्क]-preceded @deva[शत]//@deva[सहस्र] creates wealth-possession terms: @deva[नैष्कशतिक], @deva[नैष्कसहस्रिक]. The restriction against @deva[सुवर्णनिष्कशत]-derivation reflects actual linguistic usage (@deva[लोक]-@deva[प्रयोग]-absence). @deva[निष्क] is a standard gold-weight/currency unit.
"""

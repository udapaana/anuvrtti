id = "5.2.69"
numericId = "52069"

[en]
simple = """
The affix @deva[कन्] comes after @deva[अंश] 'share' (accusative) to mean 'one who must take that'. @deva[अंशं हारी] → @deva[अंशकः] 'one entitled to a share, shareholder'.
"""

standard = """
After @deva[अंश] 'share/portion' in the accusative, the affix @deva[कन्] (= @deva[क]) denotes @deva[हारिन्] 'one who must take' (sense of necessity/entitlement). The accusative @deva[अंशम्] in the @[sūtra] shows required construction. @deva[हारिन्] (nom. @deva[हारी]) is from @deva[हृ] + @deva[णिनि] with necessity-sense (per @ref[3.3.170]). @deva[हारिन्] governs accusative, not genitive. Example: @deva[अंशं हारी] → @deva[अंशकः] 'shareholder, heir'.
"""

advanced = """
The @deva[कन्]-affix with @deva[हारिन्]-meaning (necessitative 'must take') applies to @deva[द्वितीयान्त] @deva[अंश]. The @deva[हारिन्] is derived per @ref[3.3.170] (@deva[णिनि] with @deva[विध्यर्थ]). The accusative government (@deva[अंशं हारी], not *@deva[अंशस्य हारी]) is specified by the @[sūtra]'s own case-usage. @deva[अंशक] = legal heir/shareholder.
"""

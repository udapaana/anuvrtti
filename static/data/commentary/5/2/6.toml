id = "5.2.6"
numericId = "52006"

[en]
simple = """
The affixes @deva[ख] and @deva[खञ्] come after @deva[यथामुख] and @deva[संमुख] to mean 'a mirror' (something that shows). @deva[यथामुखं दर्शनम्] → @deva[यथामुखीनः] 'mirror'.
"""

standard = """
After @deva[यथामुख] 'like the face' and @deva[संमुख] 'facing', both @deva[ख] and @deva[खञ्] denote @deva[दर्शन] 'a mirror/reflecting surface'. The word @deva[दर्शन] means 'that in which something is seen' (a reflective surface). @deva[यथामुख] is an @deva[अव्ययीभाव] compound where @deva[यथा] means 'likeness' (per @ref[2.1.6]). Example: @deva[यथामुखं दर्शनम्] → @deva[यथामुखीनः] 'showing the likeness of the face' = mirror.
"""

advanced = """
The @deva[ख]//@deva[खञ्] affixes apply to @deva[यथामुख] and @deva[संमुख] with the specialized @deva[दर्शन]-meaning (reflective instrument). The @deva[यथामुख] base is an @deva[अव्ययीभाव] (@deva[यथा] + @deva[मुख]) per @ref[2.1.6], where @deva[यथा] conveys @deva[सादृश्य] (likeness). The derived form @deva[यथामुखीन] denotes an object that displays the face-likeness, hence 'mirror'.
"""

id = "5.2.121"
numericId = "52121"

[en]
simple = """
The affix @deva[विनि] comes after stems ending in @deva[अस्] and after @deva[माया], @deva[मेधा], @deva[स्रज्] with @deva[मतुप्]-sense. @deva[पयस्विन्] 'having milk'; @deva[मायाविन्] 'possessing illusion'; @deva[मेधाविन्] 'intelligent'; @deva[स्रग्विन्] 'garlanded'.
"""

standard = """
After stems ending in @deva[अस्] and after @deva[माया], @deva[मेधा], and @deva[स्रज्], the affix @deva[विनि] (= @deva[विन्]) comes with @deva[मतुप्]-sense. Examples: @deva[पयस्] → @deva[पयस्विन्] 'milky'; @deva[यशस्] → @deva[यशस्विन्] 'famous'; @deva[माया] → @deva[मायाविन्] 'illusionist'; @deva[मेधा] → @deva[मेधाविन्] 'intelligent'; @deva[स्रज्] → @deva[स्रग्विन्] 'garlanded'. Since @deva[माया] is in the @deva[व्रीह्यादि] class, it also takes @deva[इनि] and @deva[ठञ्] by @ref[5.2.116]: @deva[मायी], @deva[मायिकः].
"""

advanced = """
The @deva[विनि]-affix applies to @deva[असन्त] (stems in @deva[अस्]) and three specified stems (@deva[माया], @deva[मेधा], @deva[स्रज्]). For @deva[असन्त], @deva[विनि] is the default @deva[मतुप्]-affix. @deva[माया] has multiple options via @deva[व्रीह्यादि]-membership: @deva[विनि] (here), @deva[इनि], @deva[ठञ्] (@ref[5.2.116]). @deva[मेधा] and @deva[स्रज्] take @deva[विनि] specifically.
"""

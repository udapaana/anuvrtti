id = "5.2.104"
numericId = "52104"

[en]
simple = """
The affix @deva[अण्] comes after @deva[सिकता] 'sand' and @deva[शर्करा] 'gravel' with @deva[मतुप्]-sense. @deva[सैकटो घटः] 'sandy pot'; @deva[शार्करं मधु] 'gravelly honey'.
"""

standard = """
After @deva[सिकता] 'sand' and @deva[शर्करा] 'gravel/pebbles', the affix @deva[अण्] (with @deva[वृद्धि]) comes with @deva[मतुप्]-sense. Examples: @deva[सैकटो घटः] 'a pot (made of/containing) sand'; @deva[शार्करं मधु] 'honey (containing) gravel/crystals'. These examples are when the words do not denote a place. When denoting locality, they take @deva[इल्] with @deva[लुप्] (next @[sūtra]).
"""

advanced = """
The @deva[अण्]-affix for @deva[सिकता]//@deva[शर्करा] with @deva[मतुप्]-sense applies in non-@deva[देशवाचक] (non-locality) contexts. The @deva[वृद्धि] yields @deva[सैकत], @deva[शार्कर]. The @deva[देश]-meaning triggers different affixal options per @ref[5.2.105]. @deva[शार्करं मधु] = crystallized/granulated honey.
"""

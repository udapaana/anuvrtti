id = "5.2.66"
numericId = "52066"

[en]
simple = """
The affix @deva[कन्] comes after body-part words (locative) to mean 'one devoted to caring for it'. @deva[केशेषु प्रसितः] → @deva[केशकः] 'one devoted to hair-care'.
"""

standard = """
After words denoting one's own body-parts (@deva[स्वाङ्ग]) in the locative, the affix @deva[कन्] (= @deva[क]) denotes @deva[प्रसित] 'devoted to, intent upon, taking care of'. @deva[तत्र] and @deva[कन्] are understood from prior context. Example: @deva[केशेषु प्रसितः] → @deva[केशकः] 'one devoted to hair-arrangement'. The plural @deva[स्वाङ्गेभ्यः] indicates the affix applies even to collective compounds of body-parts.
"""

advanced = """
The @deva[कन्]-affix with @deva[प्रसित]-meaning (devoted care) applies to @deva[सप्तम्यन्त] @deva[स्वाङ्गवाचिन्] (body-part terms). The @deva[बहुवचन] (@deva[स्वाङ्गेभ्यः]) licenses application to @deva[समाहारद्वन्द्व] compounds of body-parts. The @deva[प्रसित] sense implies habitual attention to grooming/care of the specified body-part.
"""

id = "5.2.23"
numericId = "52023"

[en]
simple = """
The word @deva[हैयंगवीन] is irregular, meaning 'fresh butter'. It derives from @deva[ह्यस्] 'yesterday' and @deva[गो] 'cow'. @deva[ह्यो गोदोहस्य विकारः] 'a product of yesterday's milking' → @deva[हैयंगवीनम्].
"""

standard = """
The word @deva[हैयंगवीन] is an irregular formation (@deva[निपातन]) meaning 'fresh butter'. It comes from @deva[ह्यस्] 'yesterday' + @deva[गो] 'cow': @deva[ह्यो गोदोहस्य विकारः] 'prepared from yesterday's milk' → @deva[हैयंगवीनम्] 'fresh butter'. The affix does not apply to any general @deva[विकार] (derivative product). When meaning @deva[उदश्चित्] 'whey', there is no such derivation.
"""

advanced = """
The @deva[निपातन] @deva[हैयंगवीन] shows complex irregular formation from @deva[ह्यस्] (yesterday) + @deva[गो] (cow) with @deva[वृद्धि] and @deva[ख]-like suffixation. The meaning 'fresh butter' (@deva[नवनीत]) specifies @deva[विकार] from previous day's milking. The scope restriction excludes @deva[उदश्चित्] (whey/buttermilk), which uses other expressions. The form exemplifies @deva[आख्यातनिबन्धन] derivation.
"""

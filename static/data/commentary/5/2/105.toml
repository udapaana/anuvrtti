id = "5.2.105"
numericId = "52105"

[en]
simple = """
When meaning 'locality', the @deva[मतुप्]-affixes may undergo @deva[लुप्] (elision), or @deva[इलच्], @deva[अण्], and @deva[मतुप्] may apply, after @deva[सिकता] and @deva[शर्करा]. @deva[सिकताः अस्मिन्] → @deva[सिकता] (with @deva[लुप्]) or @deva[सिकतिलः] or @deva[सैकतः] or @deva[सिकतावान्].
"""

standard = """
When denoting @deva[देश] 'locality/place', after @deva[सिकता] and @deva[शर्करा], either: (1) @deva[लुप्] (complete elision) of @deva[मतुप्]-sense affixes occurs (preserving gender/number), or (2) the affixes @deva[इलच्], @deva[अण्], and @deva[मतुप्] apply. The @deva[च्] introduces @deva[अण्] and @deva[मतुप्]. @deva[लुप्] refers to @deva[मतुप्] and all affixes generally. Example: @deva[सिकताः अस्मिन् विद्यन्ते] (sand is in this place) → @deva[सिकता] (@deva[लुप्]), @deva[सिकतिलः], @deva[सैकतः], or @deva[सिकतावान्] @deva[देशः]].
"""

advanced = """
The @deva[देशार्थ] (locality-meaning) context triggers @deva[बहुविकल्प] for @deva[सिकता]//@deva[शर्करा]: @deva[लुप्] (zero-derivation with @deva[लिङ्गसंख्यास्थिति]), @deva[इलच्], @deva[अण्], @deva[मतुप्]. The @deva[लुप्] option creates @deva[सिकता] as locational substantive ('sandy place'). The @deva[च्] enables @deva[अनुकर्षण] of @deva[अण्] and @deva[मतुप्] alongside @deva[इलच्].
"""

id = "5.2.85"
numericId = "52085"

[en]
simple = """
The affixes @deva[इनि] and @deva[ठन्] come after @deva[श्राद्ध] 'obsequial rite' to mean 'one who has eaten this'. @deva[श्राद्धं भुक्तम् अनेन] → @deva[श्राद्धी] or @deva[श्राद्धिकः] 'one who has eaten obsequial food'.
"""

standard = """
After @deva[श्राद्ध] 'obsequial rite/food', the affixes @deva[इनि] (= @deva[इन्]) and @deva[ठन्] (= @deva[इक]) denote @deva[भुक्तम् अनेन] 'this has been eaten by him'. Example: @deva[श्राद्धं भुक्तम् अनेन] → @deva[श्राद्धी] or @deva[श्राद्धिकः] 'one who has eaten obsequial food'. This refers to eating on the day of the @deva[श्राद्ध] ceremony, not at other times or stale food. Note: @deva[अद्य भुक्ते श्राद्धे श्वः श्राद्धिक इति मा भूत्].
"""

advanced = """
The @deva[इनि]//@deva[ठन्] affixes with @deva[भुक्त अनेन]-meaning apply to @deva[श्राद्ध]. The semantic restriction (@deva[तद्दिने भुक्त], not @deva[परेद्युः]) specifies same-day consumption of fresh @deva[श्राद्ध] offerings. The derived @deva[श्राद्धिन्]//@deva[श्राद्धिक] mark ritual participation, not general food-consumption.
"""

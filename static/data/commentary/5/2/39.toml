id = "5.2.39"
numericId = "52039"

[en]
simple = """
The affix @deva[वतुप्] comes after @deva[यद्], @deva[तद्], and @deva[एतद्] (nominative) to mean 'that whose volume-measure is this'. @deva[यत् परिमाणम् अस्य] → @deva[यावान्] 'of which measure'.
"""

standard = """
After @deva[यद्], @deva[तद्], and @deva[एतद्] (demonstratives) in the nominative, the affix @deva[वतुप्] (= @deva[वत्]) denotes @deva[परिमाण] 'measure of volume/quantity'. Examples: @deva[यत् परिमाणम् अस्य] → @deva[यावान्] 'of which measure/as much as'; @deva[तद् परिमाणम्] → @deva[तावान्] 'of that measure/so much'; @deva[एतद् परिमाणम्] → @deva[एतावान्] 'of this measure'. Derivation: @deva[यद्] + @deva[वतुप्] → @deva[यावत्], nom. @deva[यावान्].
"""

advanced = """
The @deva[वतुप्]-affix applies to pronominal bases @deva[यद्]//@deva[तद्]//@deva[एतद्] with @deva[परिमाण]-meaning (volumetric/quantitative measure). A @deva[कारिका] notes: @deva[ड]-@deva[वतु] are distinguished by semantic specialization; @deva[मात्रादि] affixes are not blocked; the @deva[भाव] (abstract) sense is also established for @deva[ड]-@deva[वतु]. The derived forms are @deva[सर्वनामस्थान]-inflected.
"""

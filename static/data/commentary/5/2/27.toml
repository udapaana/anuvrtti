id = "5.2.27"
numericId = "52027"

[en]
simple = """
The affix @deva[ना] comes after @deva[वि] to form @deva[विना] 'without'. The affix @deva[नाञ्] comes after @deva[नञ्] to form @deva[नाना] 'variously/separately'.
"""

standard = """
Two affixes meaning 'not being together' (@deva[असंहति]): (1) @deva[ना] comes after @deva[वि] → @deva[विना] 'without, apart from'; (2) @deva[नाञ्] comes after @deva[नञ्] (the negative particle) → @deva[नाना] 'variously, severally, in different ways'. Both express separation or non-togetherness.
"""

advanced = """
The @deva[ना]//@deva[नाञ्] affixes with @deva[असंहति]-meaning (non-aggregation) create two fundamental @deva[अव्यय] (indeclinables): @deva[वि] + @deva[ना] → @deva[विना] (privative 'without'); @deva[नञ्] + @deva[नाञ्] → @deva[नाना] (distributive 'variously/separately'). Both encode concepts of separation, distinction, or non-unity in different semantic registers.
"""

id = "5.2.114"
numericId = "52114"

[en]
simple = """
The words @deva[ज्योत्स्ना] 'moonlight', @deva[तमिस्रा] 'night', @deva[शृङ्गिण] 'horned', @deva[ऊर्जस्विन्] 'vigorous', @deva[ऊर्जस्वल] 'energetic', @deva[गोमिन्] 'having cows', @deva[मलिन] 'dirty', and @deva[मलीमस] 'very dirty' are irregularly formed with @deva[मतुप्]-sense.
"""

standard = """
Eight words are irregularly formed (@deva[निपातन]) in @deva[मतुप्]-sense: (1) @deva[ज्योतिस्] + @deva[न] → @deva[ज्योत्स्ना] 'moonlight' (@deva[इ]-elision); (2) @deva[तमस्] + @deva[र] → @deva[तमिस्रा] 'night' (@deva[इ]-insertion; also @deva[तमिस्रं नभः] 'dark sky'); (3) @deva[शृङ्ग] + @deva[इन] → @deva[शृङ्गिण] 'horned'; (4-5) @deva[ऊर्जस्] + @deva[विन्/वल] → @deva[ऊर्जस्विन्], @deva[ऊर्जस्वल] 'vigorous'; (6) @deva[गो] + @deva[मिन्] → @deva[गोमिन्] 'cow-owner'; (7-8) @deva[मल] + @deva[इन/ईमस] → @deva[मलिन], @deva[मलीमस] 'dirty'.
"""

advanced = """
Eight @deva[निपातन] forms with @deva[मतुप्]-@deva[अर्थ]: @deva[ज्योत्स्ना] (< @deva[ज्योतिस्] + @deva[न], @deva[इकारलोप]); @deva[तमिस्रा] (< @deva[तमस्] + @deva[र], @deva[इट्-आगम]); @deva[शृङ्गिण] (non-standard @deva[इन]); @deva[ऊर्जस्विन्]//@deva[ऊर्जस्वल] (@deva[विन्]//@deva[वल] after @deva[अस्]-stem); @deva[गोमिन्] (anomalous @deva[मिन्] for @deva[गो]); @deva[मलिन]//@deva[मलीमस] (variant @deva[मतुप्]-forms for @deva[मल]). All are listed as @deva[संज्ञा] (established names).
"""

id = "5.2.135"
numericId = "52135"

[en]
simple = """
The affix @deva[इनि] comes after @deva[पुष्कर]-class words when a locality is denoted with @deva[मतुप्]-sense. @deva[पुष्करिणी] 'a tank/lotus-pond'.
"""

standard = """
After @deva[पुष्कर] and similar words (@deva[पुष्करादि]), the affix @deva[इनि] (= @deva[इन्]) comes with @deva[मतुप्]-sense when denoting a @deva[देश] 'locality'. Examples: @deva[पुष्करिणी] 'a tank/lotus-pond'; @deva[पद्मिनी] 'lotus-pond'. Why @deva[देश]-meaning? @deva[पुष्करवान् हस्ती] 'an elephant with @deva[पुष्कर] (trunk-tip)' — no locality, just possession. @deva[वार्त्तिक]: @deva[इन्] comes after @deva[बल] preceded by @deva[बाहु]//@deva[ऊरु]: @deva[बाहुबलिन्], @deva[ऊरुबलिन्]. Also after @deva[सर्व]-preceded words: @deva[सर्वधनिन्], @deva[सर्वबीजिन्].
"""

advanced = """
The @deva[इनि]-affix for @deva[पुष्करादि] with @deva[देशार्थ] (locality-sense) creates place-names: @deva[पुष्करिणी] (lotus-tank), @deva[पद्मिनी] (lotus-pond). The @deva[वार्त्तिक] extends @deva[इनि] to @deva[बाहुबल]//@deva[ऊरुबल] (limb-strength compounds) and @deva[सर्व]-prefixed terms.
"""

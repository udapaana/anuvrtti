id = "5.2.109"
numericId = "52109"

[en]
simple = """
The affix @deva[व] comes optionally after @deva[केश] 'hair' with @deva[मतुप्]-sense. Four forms exist: @deva[केशवः], @deva[केशी], @deva[केशिकः], @deva[केशवान्].
"""

standard = """
After @deva[केश] 'hair', the affix @deva[व] comes optionally with @deva[मतुप्]-sense. Though @deva[अन्यतरस्याम्] is understood from @ref[5.2.96], its repetition here shows that alternatives include not just @deva[मतुप्] but also @deva[इनि] and @deva[ठन्] (per @ref[5.2.115]). Thus four forms: @deva[केशवः] (by @deva[व]), @deva[केशी] (by @deva[इनि]), @deva[केशिकः] (by @deva[ठन्]), @deva[केशवान्] (by @deva[मतुप्]). @deva[वार्त्तिक]: @deva[व] also occurs after other words: @deva[मणिवः] 'a kind of serpent', @deva[हिरण्यवः].
"""

advanced = """
The @deva[व]-@deva[विकल्प] for @deva[केश] creates quadruple options: @deva[व], @deva[इनि], @deva[ठन्], @deva[मतुप्]. The @deva[अन्यतरस्याम्]-repetition explicitly enables @deva[इनि]//@deva[ठन्] alternatives (from @ref[5.2.115]), not just @deva[मतुप्]. The @deva[वार्त्तिक] extends @deva[व] to @deva[मणि], @deva[हिरण्य], etc.
"""

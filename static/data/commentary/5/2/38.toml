id = "5.2.38"
numericId = "52038"

[en]
simple = """
The affixes @deva[अण्], @deva[द्वयसच्], @deva[दघ्नच्], and @deva[मात्रच्] come after @deva[पुरुष] 'man' and @deva[हस्ति] 'elephant' (nominative) to mean 'that whose measure is this'. @deva[पुरुषः प्रमाणम्] → @deva[पौरुषम्], @deva[पुरुषद्वयसम्], etc.
"""

standard = """
After @deva[पुरुष] 'man' and @deva[हस्ति] 'elephant' in the nominative, four affixes (@deva[अण्], @deva[द्वयसच्], @deva[दघ्नच्], @deva[मात्रच्]) denote 'that whose measure is this' (@deva[तदस्य प्रमाणम्]). The @deva[च्] draws in the three affixes from the previous @[sūtra]. Examples: @deva[पुरुषः प्रमाणम् अस्य] → @deva[पौरुषम्] (by @deva[अण्]), @deva[पुरुषद्वयसम्], @deva[पुरुषदघ्नम्], @deva[पुरुषमात्रम्] 'man-height'; @deva[हस्तिद्वयसम्], @deva[हस्तिदघ्नम्], @deva[हस्तिमात्रम्] 'elephant-height'.
"""

advanced = """
The quadruple-affix prescription (@deva[अण्] + the three from @ref[5.2.37]) for @deva[पुरुष] and @deva[हस्ति] creates @deva[प्रमाणवाचक] terms using canonical height-references. The @deva[अण्]-derivative @deva[पौरुष] (with @deva[वृद्धि]) is additional to the @deva[द्वयसच्]//@deva[दघ्नच्]//@deva[मात्रच्] forms. @deva[पुरुष] and @deva[हस्ति] serve as standard units of measurement in traditional metrics.
"""

id = "5.2.71"
numericId = "52071"

[en]
simple = """
The words @deva[ब्राह्मणक] and @deva[उष्णिक] are irregular formations used as names. @deva[ब्राह्मणको देशः] 'a region of warrior-Brahmins'; @deva[उष्णिका यवागूः] 'thin gruel'.
"""

standard = """
The words @deva[ब्राह्मणक] and @deva[उष्णिक] are irregular (@deva[निपातन]) when used as proper names. @deva[ब्राह्मणक] (with @deva[कन्] added to @deva[ब्राह्मण]) means 'a place where Brahmins living by military profession dwell': @deva[ब्राह्मणको देशः]. @deva[उष्णिक] means @deva[अल्पान्न] 'having little food': @deva[उष्णिका यवागूः] 'thin gruel'.
"""

advanced = """
Both @deva[ब्राह्मणक] and @deva[उष्णिक] are @deva[निपातित संज्ञा] (irregularly listed names). @deva[ब्राह्मणक] with @deva[कन्] denotes a geographical/social designation: region of @deva[शस्त्रजीविन् ब्राह्मण] (Brahmins living by arms). @deva[उष्णिक] glossed as @deva[अल्पान्न] describes sparse/thin food-preparations. The semantic connections are conventionalized rather than derivationally transparent.
"""

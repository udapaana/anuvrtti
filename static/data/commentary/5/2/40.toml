id = "5.2.40"
numericId = "52040"

[en]
simple = """
After @deva[किम्] and @deva[इदम्], @deva[घ] (= @deva[इय्]) replaces @deva[व्] of @deva[वतुप्]. @deva[किम्] + @deva[वतुप्] → @deva[कियत्] 'how much'; @deva[इदम्] + @deva[वतुप्] → @deva[इयत्] 'this much'.
"""

standard = """
After @deva[किम्] 'what' and @deva[इदम्] 'this', the @deva[व्] of @deva[वतुप्] is replaced by @deva[घ] (= @deva[इय्]). Derivation: @deva[किम्] + @deva[वतुप्] → @deva[की] + @deva[वतुप्] (by @ref[6.3.90]) → @deva[क्] + @deva[घतुप्] (by @ref[6.4.148]) → @deva[कियत्], nom. @deva[कियान्] 'how much/how great'. Similarly: @deva[इदम्] + @deva[वतुप्] → @deva[इयत्], nom. @deva[इयान्] 'this much/this great'.
"""

advanced = """
The @deva[व्]-to-@deva[घ] substitution (@deva[घ] = @deva[इय्]) applies to @deva[किम्] and @deva[इदम्] before @deva[वतुप्]. The derivational chain involves @ref[6.3.90] (@deva[किम्] → @deva[की]) and @ref[6.4.148] (@deva[व्] → @deva[घ]). The resulting @deva[कियत्]//@deva[इयत्] are interrogative and demonstrative @deva[परिमाणवाचक] forms respectively, inflecting as @deva[मत्वर्थीय] stems.
"""

id = "5.2.67"
numericId = "52067"

[en]
simple = """
The affix @deva[ठक्] comes after @deva[उदर] 'belly' to mean 'voracious'. @deva[उदरे अविजिगीषुः] → @deva[औदरिकः] 'one who cannot control hunger, gluttonous'.
"""

standard = """
After @deva[उदर] 'belly/stomach', the affix @deva[ठक्] (= @deva[इक]) applies. Per Böhtlingk, it simply means 'voracious'. Per @[kāśikā], the @deva[अनुवृत्ति] of @deva[प्रसित] continues: @deva[ठक्] comes after @deva[उदर] in locative with @deva[प्रसित]-sense when meaning 'voracious'. A person excessively distressed by hunger: @deva[उदरे अविजिगीषुः] → @deva[औदरिकः] 'gluttonous/voracious'.
"""

advanced = """
The @deva[ठक्]-affix (= @deva[इक] with @deva[वृद्धि] → @deva[औदरिक]) for @deva[उदर] has interpretive variation: Böhtlingk takes it as direct 'voracious' meaning; @[kāśikā] reads @deva[प्रसित]-@deva[अनुवृत्ति] with specialized gloss @deva[उदरे अविजिगीषु] (uncontrollable hunger-craving). Both yield the semantic outcome: one dominated by belly/appetite.
"""

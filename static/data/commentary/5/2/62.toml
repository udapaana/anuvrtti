id = "5.2.62"
numericId = "52062"

[en]
simple = """
The affix @deva[वुन्] comes after @deva[गोषद्]-class words with @deva[मतुप्]-sense when expressing @deva[अध्याय] or @deva[अनुवाक]. @deva[गोषद् शब्दः अस्मिन् अस्ति] → @deva[गोषदकः अध्यायः].
"""

standard = """
After @deva[गोषद्] and similar words (@deva[गोषदादि]), the affix @deva[वुन्] (= @deva[अक]) comes with @deva[मतुप्]-sense when denoting an @deva[अध्याय] or @deva[अनुवाक]. Examples: @deva[गोषद् शब्दः अस्मिन् अस्ति] → @deva[गोषदकः अध्यायः/अनुवाकः]; @deva[इषे त्वा] → @deva[इषेत्वकः]; @deva[मातरिश्वन्] → @deva[मातरिश्वकः]. The @deva[गोषदादि] includes: @deva[गोषद्], @deva[इषे त्वा], @deva[मातरिश्वन्], @deva[देवस्य त्वा], @deva[देवीरापः], @deva[कृष्णोऽस्या], etc.
"""

advanced = """
The @deva[वुन्]-affix (= @deva[अक]) with @deva[मतुप्]-@deva[अर्थ] applies to @deva[गोषदादि] @deva[गण] for @deva[अध्याय]//@deva[अनुवाक] naming. An alternative reading has @deva[गोषद] (with @deva[अनुबन्ध] on final consonant). The @deva[गण] includes Vedic phrases used as section-markers: @deva[इषे त्वा], @deva[देवस्य त्वा], @deva[देवीरापः], etc.
"""

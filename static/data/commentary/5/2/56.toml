id = "5.2.56"
numericId = "52056"

[en]
simple = """
After @deva[विंशति] 'twenty' and similar words, @deva[तमट्] is optionally added to @deva[डट्]. @deva[विंशतेः पूरणः] → @deva[विंशतितमः] or @deva[विंशः] 'twentieth'.
"""

standard = """
After @deva[विंशति] and similar words (@deva[विंशत्यादि]), the augment @deva[तमट्] (= @deva[तम], feminine by @deva[ङीप्]) is optionally added to @deva[डट्] in @deva[पूरण] sense. Examples: @deva[विंशतेः पूरणः] → @deva[विंशतितमः] (with @deva[तमट्]) or @deva[विंशः] (without) 'twentieth'; @deva[एकविंशतितमः] or @deva[एकविंशः] '21st'; @deva[त्रिंशत्तमः] or @deva[त्रिंशः] '30th'.
"""

advanced = """
The @deva[तमट्]-@deva[विकल्प] (optional augment) for @deva[विंशत्यादि] before @deva[डट्] creates doublet ordinals: @deva[विंशतितम]//@deva[विंश], @deva[त्रिंशत्तम]//@deva[त्रिंश]. The @deva[तमट्] adds explicit ordinal marking; without it, @deva[डट्] alone (with @deva[टिलोप]) yields the shorter form. Both are grammatically valid in @deva[पूरण]-meaning.
"""

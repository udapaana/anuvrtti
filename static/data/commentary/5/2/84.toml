id = "5.2.84"
numericId = "52084"

[en]
simple = """
The word @deva[श्रोत्रिय] is irregularly formed, meaning 'one who has studied the Vedas'. @deva[श्रोत्रियो ब्राह्मणः] 'a Brahmin learned in the Vedas'.
"""

standard = """
The word @deva[श्रोत्रिय] meaning 'one who has studied the @deva[छन्दस्] (Vedas)' is an irregular formation (@deva[निपातन]). The @deva[न्] in @deva[श्रोत्रियन्] is for accent (yielding @deva[श्रोत्रियः]). Example: @deva[श्रोत्रियो ब्राह्मणः] 'a Brahmin learned in the Vedas'. The word may be: (1) a condensed expression for @deva[छन्दः अधीते] with no identifiable base/affix, or (2) @deva[छन्दस्] replaced by @deva[श्रोत्र] + affix @deva[घन्].
"""

advanced = """
The @deva[निपातन] @deva[श्रोत्रिय] has disputed derivation: either (1) @deva[वाक्यसंक्षेप] (sentence-condensation) of @deva[छन्दोऽधीते] without analyzable @deva[प्रकृति]-@deva[प्रत्यय], or (2) @deva[छन्दस्] → @deva[श्रोत्र] (@deva[आदेश]) + @deva[घन्] (affix). The @deva[नकार] (@deva[श्रोत्रियन्]) is @deva[स्वरार्थ] (for accent). The semantic equation @deva[श्रोत्रिय] = @deva[छन्दोविद्] is conventionalized.
"""

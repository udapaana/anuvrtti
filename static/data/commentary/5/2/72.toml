id = "5.2.72"
numericId = "52072"

[en]
simple = """
The affix @deva[कन्] comes after @deva[शीत] 'cold' and @deva[उष्ण] 'hot' to mean 'one who works thus'. @deva[शीतं करोति] → @deva[शीतकः] 'lazy'; @deva[उष्णं करोति] → @deva[उष्णकः] 'energetic'.
"""

standard = """
After @deva[शीत] 'cold' and @deva[उष्ण] 'hot' (used adverbially in accusative), the affix @deva[कन्] denotes 'one who works thus' (@deva[तथा करोति]). Examples: @deva[शीतं करोति] 'who works coldly' → @deva[शीतकः] = @deva[अलसः], @deva[जडः] 'lazy, sluggish person'; @deva[उष्णं करोति] 'who works hotly' → @deva[उष्णकः] = @deva[शीघ्रकारी], @deva[दक्षः] 'quick worker, energetic person'.
"""

advanced = """
The @deva[कन्]-affix applies to @deva[शीत]//@deva[उष्ण] in adverbial (@deva[क्रियाविशेषण]) accusative with @deva[करोति]-meaning (manner of working). The metaphorical extension: @deva[शीत] = sluggish/cold manner → @deva[अलस/जड] (lazy); @deva[उष्ण] = heated/intense manner → @deva[शीघ्रकारिन्/दक्ष] (energetic/skilled). This creates character-epithets from temperature-adverbs.
"""

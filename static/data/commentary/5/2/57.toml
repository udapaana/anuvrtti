id = "5.2.57"
numericId = "52057"

[en]
simple = """
After @deva[शत] 'hundred', etc., and after @deva[मास] 'month', @deva[अर्धमास] 'fortnight', @deva[संवत्सर] 'year', @deva[तमट्] is always added to @deva[डट्]. @deva[शतस्य पूरणः] → @deva[शततमः] 'hundredth'.
"""

standard = """
After @deva[शत] and higher numerals, and after time-words @deva[मास] 'month', @deva[अर्धमास] 'fortnight', and @deva[संवत्सर] 'year', the augment @deva[तमट्] is obligatory (not optional) with @deva[डट्]. @deva[मास] etc. are not numerals but take @deva[डट्] by implication. Examples: @deva[शतस्य पूरणः] → @deva[शततमः] 'hundredth'; @deva[सहस्रतमः] 'thousandth'; @deva[लक्षतमः] 'hundred-thousandth'; @deva[मासस्य पूरणः] → @deva[मासतमो दिवसः] 'the month-completing day'.
"""

advanced = """
The @deva[नित्य]-@deva[तमट्] (obligatory augment) applies to @deva[शतादि] (high numerals: @deva[शत], @deva[सहस्र], @deva[लक्ष], etc.) and time-units (@deva[मास], @deva[अर्धमास], @deva[संवत्सर]). The latter receive @deva[डट्]-applicability via this @[sūtra]'s @deva[ज्ञापन]. This creates ordinals for calendrical positions: @deva[मासतम] 'the last day of a month'.
"""

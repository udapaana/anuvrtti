id = "5.2.55"
numericId = "52055"

[en]
simple = """
The affix @deva[तीय] comes after @deva[त्रि] 'three' with @deva[संप्रसारण] (semivowel → vowel). @deva[त्रि] + @deva[तीय] → @deva[तृतीयः] 'third'.
"""

standard = """
After @deva[त्रि] 'three', the affix @deva[तीय] applies with @deva[संप्रसारण] (vowel substitution for semivowel, per @ref[1.1.45]). Derivation: @deva[त्रि] + @deva[तीय] → @deva[तृ] + @deva[इ] + @deva[तीय] (@deva[र्] → @deva[ऋ]) → @deva[तृतीयः] (by @ref[6.1.108], @deva[इ] merges with prior @deva[ऋ]). In @deva[तृतीय], the @deva[ऋ] is not lengthened by @ref[6.4.2] (which applies only in certain environments).
"""

advanced = """
The @deva[तीय]-affix for @deva[त्रि] triggers @deva[संप्रसारण]: @deva[र्] → @deva[ऋ] per @ref[1.1.45]. The subsequent @ref[6.1.108] (@deva[सवर्णदीर्घ]) would merge @deva[ऋ] + @deva[इ], but the actual process yields @deva[तृतीय] without lengthening. The @ref[6.4.2] non-application is due to the affix being @deva[तीय] (not @deva[ति]-initial @deva[कित्/ङित्]).
"""

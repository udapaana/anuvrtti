id = "5.2.2"
numericId = "52002"

[en]
simple = """
The affix @deva[ढक्] comes after @deva[व्रीहि] 'rice' and @deva[शालि] 'a variety of rice' to mean 'a field where it grows'. @deva[व्रीहि] → @deva[व्रैहेयम्]; @deva[शालि] → @deva[शालेयम्] 'a rice-field'.
"""

standard = """
After @deva[व्रीहि] and @deva[शालि] (both rice varieties), the affix @deva[ढक्] (realized as @deva[एय]) denotes 'a field fit for growing'. This supersedes the general @deva[खञ्] of @ref[5.2.1]. Examples: @deva[व्रीहीणां भवने क्षेत्रे] → @deva[व्रैहेयम्] 'a field for growing @deva[व्रीहि]-rice'; @deva[शालीनां भवने क्षेत्रे] → @deva[शालेयम्].
"""

advanced = """
The @deva[ढक्]-affix (= @deva[एय] after @deva[इत्संज्ञालोप]) is prescribed specifically for @deva[व्रीहि] and @deva[शालि], functioning as @deva[अपवाद] to the @deva[खञ्] of @ref[5.2.1]. The @deva[वृद्धि] yields @deva[व्रैहेय], @deva[शालेय]. Both terms refer to varieties of cultivated rice (@deva[ओरिज़ा सतिवा]).
"""

id = "5.2.28"
numericId = "52028"

[en]
simple = """
The affixes @deva[शालच्] and @deva[शङ्कटच्] come after @deva[वि] without changing the sense. @deva[वि] + @deva[शालच्] → @deva[विशाल] 'large'; @deva[वि] + @deva[शङ्कटच्] → @deva[विशङ्कट].
"""

standard = """
After the prefix @deva[वि], the affixes @deva[शालच्] (= @deva[शाल]) and @deva[शङ्कटच्] (= @deva[शंकट]) come without changing the meaning. Examples: @deva[विगते शृङ्गे] (hornless) → @deva[विशालः], @deva[विशंकटः]. These may describe a cow (without horns). According to some, these words are adjectives meaning 'great, large' etc. There is no clear semantic connection between base and affix here.
"""

advanced = """
The @deva[शालच्]//@deva[शङ्कटच्] affixes attach to @deva[वि] with @deva[अविशेष्यलिङ्ग] (no meaning-change). The gloss @deva[विगते शृङ्गे] (hornless) may explain original use for cattle. Alternative interpretation treats @deva[विशाल]//@deva[विशंकट] as general adjectives ('large/great'). The lack of transparent @deva[प्रकृत्यर्थ]-@deva[प्रत्ययार्थ] connection suggests @deva[रूढि] (conventionalized usage).
"""

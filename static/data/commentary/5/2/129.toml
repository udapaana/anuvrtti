id = "5.2.129"
numericId = "52129"

[en]
simple = """
The augment @deva[कुक्] comes before @deva[इनि] after @deva[वात] 'wind/rheumatism' and @deva[अतिसार] 'diarrhea'. @deva[वातकी] 'rheumatic'; @deva[अतिसारकी] 'suffering from diarrhea'.
"""

standard = """
Before @deva[इनि] after @deva[वात] 'wind/rheumatism' and @deva[अतिसार] 'diarrhea' (both disease names taking @deva[इनि] by @ref[5.2.128]), the augment @deva[कुक्] (= @deva[क्]) is added. Examples: @deva[वातकी] 'one with rheumatism'; @deva[अतिसारकी] 'one with diarrhea' (another reading: @deva[अतीसारकी]). @deva[वार्त्तिक]: Also after @deva[पिशाच]: @deva[पिशाचकी वैश्रवणः] 'Kubera (lord of @deva[पिशाच]s)'. This applies when @deva[वात] and @deva[अतिसार] denote diseases.
"""

advanced = """
The @deva[कुक्]-@deva[आगम] before @deva[इनि] for @deva[वात]//@deva[अतिसार] (disease-senses) yields @deva[वातकिन्], @deva[अतिसारकिन्]. The @deva[वार्त्तिक] extends @deva[कुक्] to @deva[पिशाच] (for Kubera's epithet). The augment is specific to disease-naming contexts, not general @deva[वात] (wind) usage.
"""

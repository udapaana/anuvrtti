id = "5.2.63"
numericId = "52063"

[en]
simple = """
The affix @deva[वुन्] comes after @deva[पथिन्] 'road' (locative) to mean 'versed/skilled therein'. @deva[पथि कुशलः] → @deva[पथकः] 'one skilled in roads, a guide'.
"""

standard = """
After @deva[पथिन्] 'road/path' in the locative, the affix @deva[वुन्] (= @deva[अक]) denotes @deva[कुशल] 'versed in, skilled in'. Derivation: @deva[पथि कुशलः] → @deva[पथिन्] + @deva[वुन्] → @deva[पथ्] + @deva[वुन्] (by @ref[6.4.144], @deva[न्]-deletion) → @deva[पथ्] + @deva[अक्] (by @ref[7.1.1]) → @deva[पथकः] 'one skilled in roads, a guide'.
"""

advanced = """
The @deva[वुन्]-affix with @deva[कुशल]-meaning applies to @deva[सप्तम्यन्त] @deva[पथिन्]. The derivation shows @deva[अनलोप] by @ref[6.4.144] (@deva[पथिन्] → @deva[पथ्]) before the @deva[वुन्] → @deva[अक्] conversion per @ref[7.1.1]. The resulting @deva[पथक] denotes professional expertise in navigation/guidance.
"""

id = "5.2.76"
numericId = "52076"

[en]
simple = """
The affix @deva[ठक्] comes after @deva[अयःशूल] 'iron-spike/violence', and @deva[ठञ्] after @deva[दण्डाजिन] 'staff and hide', both meaning 'one who strives to gain by that'. @deva[आयःशूलिकः] 'violent person'; @deva[दण्डाजिनीनः] 'hypocrite'.
"""

standard = """
After @deva[अयःशूल] 'iron spike' (= violent means) and @deva[दण्डाजिन] 'staff and hide' (= outward signs of false devotion), the affixes @deva[ठक्] and @deva[ठञ्] respectively come with @deva[अन्विच्छति]-sense ('strives to gain thereby'). Examples: @deva[अयःशूलेन अन्विच्छति] → @deva[आयःशूलिकः] = @deva[साहसिकः] 'one who uses violent means'; @deva[दण्डाजिनेन अन्विच्छति] → @deva[दण्डाजिनीनः] 'hypocrite who seeks gain through false religious appearance'.
"""

advanced = """
The @deva[ठक्]//@deva[ठञ्] affixes with @deva[तेन अन्विच्छति]-meaning apply to @deva[अयःशूल] and @deva[दण्डाजिन] respectively. @deva[अयःशूल] denotes @deva[साहस] (violent/forceful means); @deva[दण्डाजिन] denotes ascetic accoutrements (@deva[दण्ड] 'staff' + @deva[अजिन] 'hide') used as badges of feigned piety. Both derivatives characterize persons exploiting these means for gain.
"""

id = "5.2.19"
numericId = "52019"

[en]
simple = """
The affix @deva[खञ्] comes after @deva[अश्व] 'horse' (genitive) to mean 'what can be traversed in one day by horse'. @deva[अश्वस्य एकाहगमः अध्वा] → @deva[आश्वीनः] 'a day's horse-journey'.
"""

standard = """
After @deva[अश्व] 'horse' in the genitive, the affix @deva[खञ्] denotes @deva[एकाहगम] 'what is traversed in one day'. The genitive @deva[अश्वस्य] shows the required construction. @deva[एकाहगम] = @deva[एकाहेन गम्यते] 'gone over in one day'. Example: @deva[अश्वस्य एकाहगमो अध्वा] → @deva[आश्वीनः] 'a horse's one-day journey distance'. Usage: @deva[आश्वीनानि शतं पतित्वा] 'having flown a hundred horse-day units' = the number of @deva[योजन] traversable in one day.
"""

advanced = """
The @deva[खञ्]-affix applies to @deva[षष्ठ्यन्त] @deva[अश्व] with the specialized @deva[एकाहगम]-meaning (single-day traversal). The derived @deva[आश्वीन] functions as a distance-measure (@deva[अध्वमान]) calibrated by equine travel capacity. The @deva[वृद्धि] produces @deva[आश्वीन], used substantively for 'one day's horse-journey' in distance calculations.
"""

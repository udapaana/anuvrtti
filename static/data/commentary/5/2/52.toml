id = "5.2.52"
numericId = "52052"

[en]
simple = """
The augment @deva[तिथुक्] comes before @deva[डट्] after @deva[बहु], @deva[पूग], @deva[गण], and @deva[संघ]. @deva[बहूनां पूरणः] → @deva[बहुतिथः] 'the manieth'.
"""

standard = """
Before @deva[डट्], the augment @deva[तिथुक्] (= @deva[तिथ्]) is added after @deva[बहु] 'many', @deva[पूग] 'group', @deva[गण] 'class', and @deva[संघ] 'assembly'. @deva[डटि] (locative) is understood. @deva[पूग] and @deva[संघ] are not numerals but take @deva[डट्] by this rule. Examples: @deva[बहूनां पूरणः] → @deva[बहुतिथः] 'the manieth' (completing many); @deva[पूगतिथः]; @deva[गणतिथः]; @deva[संघतिथः].
"""

advanced = """
The @deva[तिथुक्]-@deva[आगम] (@deva[उकार इत्]) applies to @deva[बहु] (numeral-like), @deva[पूग], @deva[गण], @deva[संघ] (collective nouns). The latter three receive @deva[डट्]-applicability via this @[sūtra]'s implication. The resulting forms (@deva[बहुतिथ], @deva[पूगतिथ], etc.) denote ordinal positions within pluralities or groups.
"""

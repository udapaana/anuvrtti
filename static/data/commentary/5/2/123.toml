id = "5.2.123"
numericId = "52123"

[en]
simple = """
In the Vedas, the affix @deva[युस्] comes after @deva[ऊर्णा] 'wool' with @deva[मतुप्]-sense. @deva[ऊर्णायुः] 'wooly'.
"""

standard = """
In Vedic (@deva[छन्दस्]), the affix @deva[युस्] (= @deva[यु]) comes after @deva[ऊर्णा] 'wool' with @deva[मतुप्]-sense. The @deva[स्] of @deva[युस्] makes @deva[ऊर्णा] a @deva[पद] (per @ref[1.4.16]); consequently, @deva[भ]-rules (like @ref[6.1.148] which would delete final @deva[आ]) do not apply. Result: @deva[ऊर्णायुः] 'woolly/having wool'. According to some, @deva[छन्दसि] is to be read in this @[sūtra]. @[siddhāntakaumudī] treats this as a general rule.
"""

advanced = """
The @deva[युस्]-affix (with @deva[सकार] making @deva[पद]-@deva[संज्ञा] per @ref[1.4.16]) for @deva[ऊर्णा] prevents @deva[भसंज्ञा] operations like @ref[6.1.148] (@deva[आकारलोप]). This preserves @deva[ऊर्णा] + @deva[युस्] → @deva[ऊर्णायु] (not *@deva[ऊर्ण्यु]). The @deva[छन्दस्]-restriction is debated; some extend it to classical usage.
"""

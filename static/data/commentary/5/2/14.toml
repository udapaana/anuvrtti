id = "5.2.14"
numericId = "52014"

[en]
simple = """
The word @deva[आगवीन] is irregularly formed, meaning 'a day-labourer'. It comes from @deva[आ] + @deva[गो] + @deva[ख] → @deva[आगवीनः] 'one engaged until the cows return'.
"""

standard = """
The word @deva[आगवीन] is an irregular formation (@deva[निपातन]). It is derived by adding @deva[ख] to @deva[गो] 'cow' preceded by the preposition @deva[आ]: @deva[आगो] + @deva[ख] → @deva[आगवीनः]. The meaning is 'a servant/day-labourer' — a person engaged in work until the return of the cows, i.e., one who works from dawn to dusk.
"""

advanced = """
The @deva[निपातन] @deva[आगवीन] shows irregular derivation: @deva[आ] (preposition 'until') + @deva[गो] (cow) + @deva[ख] → @deva[आगवीन]. The semantic interpretation @deva[गवां प्रत्यागमनपर्यन्तं कर्मणि नियुक्तः] (engaged in work until cows' return) reflects ancient pastoral time-reckoning where cattle-return marked day's end. The form is @deva[निपातित] because standard derivation would not yield this meaning.
"""

id = "5.2.120"
numericId = "52120"

[en]
simple = """
The affix @deva[यप्] comes after @deva[रूप] 'form/image' when meaning 'stamped/coined' or 'praised' with @deva[मतुप्]-sense. @deva[आहतं रूपम् अस्य] → @deva[रूप्यः] 'stamped coin'; @deva[प्रशस्तं रूपम्] → @deva[रूप्यः] 'beautiful'.
"""

standard = """
After @deva[रूप] 'form/image', the affix @deva[यप्] (= @deva[य]) comes with @deva[मतुप्]-sense when denoting: (1) @deva[आहत] 'stamped/coined' — impressed form, or (2) @deva[प्रशस्त] 'praised' — beautiful form. Examples: @deva[आहतं रूपम् अस्य] → @deva[रूप्यो दीनारः] 'a dinar having a stamped image (of a king)'; @deva[रूप्यः केदारः], @deva[रूप्यं कार्षापणम्]; @deva[प्रशस्तं रूपम् अस्य अस्ति] → @deva[रूप्यः पुरुषः] 'a handsome/lovely person'. @deva[आहत] refers to the form impressed by hammering.
"""

advanced = """
The @deva[यप्]-affix for @deva[रूप] is semantically conditioned: @deva[आहतरूप] (stamped/minted image, hence currency) or @deva[प्रशस्तरूप] (praiseworthy form, hence beauty). The @deva[रूप्य] derived for coinage sense relates to the impressed royal/divine image on coins. The @deva[प्रशस्त]-sense yields aesthetic descriptions (@deva[रूप्य पुरुष] = handsome man).
"""

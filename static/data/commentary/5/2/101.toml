id = "5.2.101"
numericId = "52101"

[en]
simple = """
The affix @deva[ण्] comes after @deva[प्रज्ञा] 'wisdom', @deva[श्रद्धा] 'faith', and @deva[अर्चा] 'worship' with @deva[मतुप्]-sense; @deva[मतुप्] is also optional. @deva[प्राज्ञः] or @deva[प्रज्ञावान्] 'wise'.
"""

standard = """
After @deva[प्रज्ञा] 'wisdom', @deva[श्रद्धा] 'faith', and @deva[अर्चा] 'worship', the affix @deva[ण्] (= @deva[अ] with @deva[वृद्धि]) comes with @deva[मतुप्]-sense, along with @deva[मतुप्] as alternative. Examples: @deva[प्राज्ञः] or @deva[प्रज्ञावान्] 'wise'; @deva[श्राद्धः] or @deva[श्रद्धावान्] 'faithful'; @deva[आर्चः] or @deva[अर्चावान्] 'worshipful'. @[kāśikā] includes @deva[वृत्ति] from the @deva[वार्त्तिक] @deva[वृत्तेश्च]: @deva[वार्त्तः] or @deva[वृत्तिमान्].
"""

advanced = """
The @deva[ण्]-affix (with @deva[वृद्धि]: @deva[प्रज्ञा] → @deva[प्राज्ञ]) applies to the three-item domain plus @deva[वृत्ति] (per @deva[वार्त्तिक]). The @deva[मतुप्]-@deva[विकल्प] provides non-@deva[वृद्धि] alternatives. The @deva[ण्] vs @deva[मतुप्] choice affects morphophonology (@deva[प्राज्ञ] vs @deva[प्रज्ञावत्]) but not meaning.
"""

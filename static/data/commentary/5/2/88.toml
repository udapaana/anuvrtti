id = "5.2.88"
numericId = "52088"

[en]
simple = """
The affix @deva[इनि] comes after @deva[इष्ट]-class words to mean 'by whom this was done'. @deva[इष्टम् अनेन] → @deva[इष्टी] 'one who has sacrificed'; @deva[पूर्तम् अनेन] → @deva[पूर्ती] 'one who has done charity'.
"""

standard = """
After @deva[इष्ट] and similar words (@deva[इष्टादि]), the affix @deva[इनि] (= @deva[इन्]) denotes @deva[अनेन] 'by whom (this was done)'. Examples: @deva[इष्टम् अनेन] → @deva[इष्टी] (in context of sacrifice); @deva[पूर्तम् अनेन] → @deva[पूर्ती] (in context of charitable acts). The @deva[इष्टिन्], @deva[पूर्तिन्] forms govern locative instead of accusative (per @deva[वार्त्तिक] under @ref[2.3.36]). The @deva[इष्टादि] includes: @deva[इष्ट], @deva[पूर्त], @deva[उपासादित], @deva[निगदित], @deva[परिगदित], @deva[परिवादित], @deva[निकथित], etc.
"""

advanced = """
The @deva[इनि]-affix with @deva[कर्तृ]-meaning applies to @deva[इष्टादि] @deva[गण]. The derived @deva[इष्टिन्], @deva[पूर्तिन्] etc. show exceptional @deva[सप्तमी]-government (not @deva[द्वितीया]) per @deva[वार्त्तिक] on @ref[2.3.36]. @deva[इष्ट] = Vedic sacrifice; @deva[पूर्त] = charitable works (wells, temples). The @deva[गण] includes various past-participle bases.
"""

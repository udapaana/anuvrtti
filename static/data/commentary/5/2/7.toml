id = "5.2.7"
numericId = "52007"

[en]
simple = """
The affix @deva[ख] comes after @deva[सर्वपथि], @deva[सर्वाङ्ग], @deva[सर्वकर्मन्], @deva[सर्वपत्र], or @deva[सर्वपात्र] (accusative) to mean 'pervading/filling the whole'. @deva[सर्वपथं व्याप्नोति] → @deva[सर्वपथीनः] 'pervading all roads'.
"""

standard = """
When @deva[पथि], @deva[अङ्ग], @deva[कर्मन्], @deva[पत्र], or @deva[पात्र] is preceded by @deva[सर्व] in the accusative, the affix @deva[ख] (= @deva[ईन]) denotes 'what pervades or fills the whole'. Examples: @deva[सर्वपथं व्याप्नोति] → @deva[सर्वपथीनो रथः] 'a chariot that travels all roads'; @deva[सर्वाङ्गीणस्तापः] 'heat pervading all limbs'; @deva[सर्वकर्मीणः पुरुषः] 'a man engaged in all work'; @deva[सर्वपत्रीणः सारथिः]; @deva[सर्वपात्रीण ओदनः].
"""

advanced = """
The @deva[ख]-affix with @deva[व्याप्ति]-meaning (pervading/filling) requires @deva[सर्व] as @deva[पूर्वपद] with specific @deva[उत्तरपद] bases (@deva[पथि], @deva[अङ्ग], @deva[कर्मन्], @deva[पत्र], @deva[पात्र]) in @deva[द्वितीया] (accusative) relation. The semantic frame is @deva[सर्वं X व्याप्नोति] → @deva[सर्व-X-ईन]. This creates adjectives describing comprehensive coverage or engagement.
"""

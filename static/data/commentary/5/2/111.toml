id = "5.2.111"
numericId = "52111"

[en]
simple = """
The affixes @deva[ईरन्] and @deva[ईरच्] come after @deva[काण्ड] and @deva[अण्ड] respectively with @deva[मतुप्]-sense. @deva[काण्डीरः] 'having a stalk'; @deva[अण्डीरः] 'having eggs'.
"""

standard = """
After @deva[काण्ड] 'stalk/section' and @deva[अण्ड] 'egg', the affixes @deva[ईरन्] (= @deva[ईर]) and @deva[ईरच्] (= @deva[ईर]) come respectively with @deva[मतुप्]-sense. Examples: @deva[काण्डीरः] 'having a stalk/stem'; @deva[अण्डीरः] 'having eggs/ovate'. Another reading has @deva[आण्ड] base, yielding @deva[आण्डीरः].
"""

advanced = """
The @deva[ईरन्]//@deva[ईरच्] affixes follow @deva[यथासंख्य]: @deva[ईरन्] ↔ @deva[काण्ड], @deva[ईरच्] ↔ @deva[अण्ड]. Both yield @deva[ईर]-ending forms. An alternative @deva[पाठ] reads @deva[आण्ड] (with initial @deva[आ]), producing @deva[आण्डीर]. The accent pattern follows the respective @deva[अनुबन्ध] specifications.
"""

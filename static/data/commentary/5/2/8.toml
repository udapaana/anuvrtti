id = "5.2.8"
numericId = "52008"

[en]
simple = """
The affix @deva[ख] comes after @deva[आप्रपद] to mean 'reaching thereto'. @deva[आप्रपदं प्राप्नोति] → @deva[आप्रपदीनः पटः] 'cloth reaching to the top of the feet'.
"""

standard = """
After @deva[आप्रपद] 'up to the top of the foot', the affix @deva[ख] (= @deva[ईन]) denotes 'reaching thereto'. The word @deva[प्रपद] means 'top of the foot' and @deva[आ] means 'up to'. @deva[आप्रपद] is an @deva[अव्ययीभाव] compound. Example: @deva[आप्रपदं प्राप्नोति] → @deva[आप्रपदीनः पटः] 'cloth reaching to the end of the feet', describing the width/length of cloth measured against the body.
"""

advanced = """
The @deva[ख]-affix applies to @deva[आप्रपद] (@deva[अव्ययीभाव]: @deva[आ] + @deva[प्रपद]) with @deva[प्राप्ति]-meaning (reaching to). The @deva[प्रपद] denotes the front/top portion of the foot (@deva[पादाग्र]). The derived @deva[आप्रपदीन] describes garments or objects measured by body-extension, a common textile-measurement convention.
"""

id = "5.2.136"
numericId = "52136"

[en]
simple = """
The affixes @deva[मतुप्] and @deva[इनि] come after @deva[बल]-class words with @deva[मतुप्]-sense. @deva[बलवान्] or @deva[बली] 'strong'.
"""

standard = """
After @deva[बल] and similar words (@deva[बलादि]), both @deva[मतुप्] and @deva[इनि] (alternative) come with @deva[मतुप्]-sense. Examples: @deva[बलवान्] or @deva[बली] (stem @deva[बलिन्]) 'strong'; @deva[उत्साहवान्] or @deva[उत्साही] (stem @deva[उत्साहिन्]) 'enthusiastic'. The @deva[बलादि] includes: @deva[बल], @deva[उत्साह], @deva[उद्भास], @deva[उद्वास], @deva[उद्दास], @deva[शिखा], @deva[कुल], @deva[चूडा], @deva[सुल], @deva[कूल], @deva[आयाम], @deva[व्यायाम], @deva[उपयाम], @deva[आर्...], etc.
"""

advanced = """
The @deva[मतुप्]//@deva[इनि] @deva[विकल्प] for @deva[बलादि] creates doublets: @deva[बलवत्]//@deva[बलिन्], @deva[उत्साहवत्]//@deva[उत्साहिन्]. The @deva[गण] includes strength/energy/structure terms: @deva[बल], @deva[उत्साह], @deva[शिखा], @deva[कुल], @deva[चूडा], @deva[आयाम], @deva[व्यायाम], etc.
"""

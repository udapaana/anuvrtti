id = "5.2.94"
numericId = "52094"

[en]
simple = """
The affix @deva[मतुप्] comes after nominative words to mean 'whose it is' or 'in whom it is'. @deva[गावः अस्य सन्ति] → @deva[गोमान्] 'having cows'; @deva[वृक्षाः अस्मिन् सन्ति] → @deva[वृक्षवान्] 'having trees'.
"""

standard = """
After a word in the nominative, the affix @deva[मतुप्] denotes @deva[तदस्यास्ति] 'whose this is' or @deva[तदस्मिन्नस्ति] 'in whom this is'. Examples: @deva[गावः अस्य सन्ति] → @deva[गोमत्] (nom. @deva[गोमान्]) 'having cows'; @deva[वृक्षाः अस्मिन् सन्ति] → @deva[वृक्षवत्] (nom. @deva[वृक्षवान्], with @deva[म्] → @deva[व्] by @ref[8.2.9]) 'having trees' (describing a mountain). Similarly: @deva[यवमान्], @deva[प्लक्षमान्]. The @deva[इति] indicates these two senses specifically.
"""

advanced = """
The @deva[मतुप्]-affix (@deva[तद्धित]) applies to @deva[प्रथमान्त] bases with possessive meaning: @deva[तदस्यास्ति] (ownership: 'his cows') or @deva[तदस्मिन्नस्ति] (location: 'trees in it'). The @deva[म्] → @deva[व्] change after non-@deva[अ] stems follows @ref[8.2.9]. The @deva[इति] in @deva[तदस्यास्त्यस्मिन्निति] delimits the semantic range to these two relational meanings.
"""

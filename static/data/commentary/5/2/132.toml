id = "5.2.132"
numericId = "52132"

[en]
simple = """
The affix @deva[इनि] comes (exclusively) after stems ending in @deva[धर्म], @deva[शील], or @deva[वर्ण] with @deva[मतुप्]-sense. @deva[ब्राह्मणधर्मी] 'following Brahmin-duty'; @deva[ब्राह्मणशीली] 'having Brahmin-character'.
"""

standard = """
After nominal stems ending in @deva[धर्म] 'duty', @deva[शील] 'character', or @deva[वर्ण] 'color/caste', the affix @deva[इनि] (= @deva[इन्]) comes (exclusively) with @deva[मतुप्]-sense. Examples: @deva[ब्राह्मणानां धर्मः] = @deva[ब्राह्मणधर्मः], @deva[सः अस्य अस्ति] → @deva[ब्राह्मणधर्मी] 'one who follows Brahmin-duty'; @deva[ब्राह्मणशीलिन्] 'having Brahmin-conduct'; @deva[ब्राह्मणवर्णिन्] 'having Brahmin-caste'.
"""

advanced = """
The @deva[इनि]-@deva[नियम] for @deva[धर्मान्त]//@deva[शीलान्त]//@deva[वर्णान्त] compounds creates exclusive @deva[इनि]-derivation. These compound-types denote adherence to class-specific duty/character/identity. The restriction blocks @deva[मतुप्] and other alternatives.
"""

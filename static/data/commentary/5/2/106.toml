id = "5.2.106"
numericId = "52106"

[en]
simple = """
The affix @deva[उरच्] comes after @deva[दन्त] 'tooth' to mean 'having projecting teeth'. @deva[दन्ताः उन्नताः अस्य सन्ति] → @deva[दन्तुरः] 'buck-toothed'.
"""

standard = """
After @deva[दन्त] 'tooth', the affix @deva[उरच्] (= @deva[उर]) denotes @deva[उन्नत] 'projecting/prominent'. Example: @deva[दन्ताः उन्नताः अस्य सन्ति] → @deva[दन्तुरः] 'one with projecting teeth, buck-toothed'. The words in the @[sūtra] are @deva[प्रथमा] (nominative) or locative but function with ablative sense. Why 'projecting'? @deva[दन्तवान्] simply means 'having teeth' (general @deva[मतुप्]-sense).
"""

advanced = """
The @deva[उरच्]-affix specifically denotes @deva[उन्नतदन्त] (prominent/protruding teeth), distinct from general @deva[मतुप्]-possession (@deva[दन्तवत्] 'toothed'). The @deva[विभक्त्यर्थ] of the @[sūtra] implies ablative-like relation (@deva[अपादानलक्षणा]). The semantic restriction to @deva[उन्नत] creates specialized dental terminology.
"""

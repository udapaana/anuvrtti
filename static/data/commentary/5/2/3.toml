id = "5.2.3"
numericId = "52003"

[en]
simple = """
The affix @deva[यत्] comes after @deva[यव] 'barley', @deva[यवक], and @deva[षष्टिक] 'sixty-day rice' to mean 'a field where it grows'. @deva[यव] → @deva[यव्यम्] 'a barley-field'.
"""

standard = """
After @deva[यव], @deva[यवक], and @deva[षष्टिक] (a quick-maturing rice variety), the affix @deva[यत्] (= @deva[य]) denotes 'a field for growing'. This blocks @deva[खञ्]. Examples: @deva[यवानां भवनं क्षेत्रम्] → @deva[यव्यम्]; @deva[यवकस्य] → @deva[यवक्यम्]; @deva[षष्टिकस्य] → @deva[षष्टिक्यम्]. See @ref[6.1.213] for accent rules.
"""

advanced = """
The @deva[यत्]-affix (@deva[अपवाद] to @deva[खञ्]) applies to three grain-terms: @deva[यव] (barley), @deva[यवक] (a barley variety), @deva[षष्टिक] (rice maturing in 60 days). The accent pattern (@deva[यव्यम्]) follows @ref[6.1.213]. The @deva[षष्टिक] etymology reflects the sixty-day (@deva[षष्टि]-@deva[दिन]) growing period.
"""

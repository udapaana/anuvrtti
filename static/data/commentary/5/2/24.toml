id = "5.2.24"
numericId = "52024"

[en]
simple = """
The affix @deva[कुणप्] means 'ripening season' after @deva[पीलु]-class words. The affix @deva[जाहच्] means 'root' after @deva[कर्ण]-class words. @deva[पीलूनां पाकः] → @deva[पीलुकुणः]; @deva[कर्णस्य मूलम्] → @deva[कर्णजाहम्].
"""

standard = """
Two affixes with distinct meanings: (1) @deva[कुणप्] (= @deva[कुण]) comes after @deva[पीलु]-class words in the genitive, meaning @deva[पाक] 'ripening/fruiting season'; (2) @deva[जाहच्] (= @deva[जाह]) comes after @deva[कर्ण]-class words, meaning @deva[मूल] 'root'. Examples: @deva[पीलूनां पाकः] → @deva[पीलुकुणः] 'ripening season of @deva[पीलु] fruit'; @deva[कर्कन्धूनां पाकः] → @deva[कर्कन्धुकुणः]; @deva[कर्णस्य मूलम्] → @deva[कर्णजाहम्] 'root/base of the ear'.
"""

advanced = """
Two specialized affixes: @deva[कुणप्] (→ @deva[कुण]) applies to @deva[पीलवादि] with @deva[पाक]-meaning (fruit-ripening season); @deva[जाहच्] (→ @deva[जाह]) applies to @deva[कर्णादि] with @deva[मूल]-meaning (root/base). The @deva[तस्य] indicates @deva[षष्ठी]-relation. These represent highly specialized semantic-affix pairings for botanical/anatomical terminology.
"""

id = "5.2.4"
numericId = "52004"

[en]
simple = """
The affix @deva[यत्] optionally comes after @deva[तिल] 'sesame', @deva[माष] 'bean', @deva[उमा] 'linseed', @deva[भङ्गा] 'hemp', and @deva[अणु]. Otherwise @deva[खञ्] applies. @deva[तिल] → @deva[तिल्यम्] or @deva[तैलीनम्].
"""

standard = """
After @deva[तिल], @deva[माष], @deva[उमा], @deva[भङ्गा], and @deva[अणु], the affix @deva[यत्] is optional; when not applied, @deva[खञ्] takes effect. Examples: @deva[तिलानां भवनं क्षेत्रम्] → @deva[तिल्यम्] (by @deva[यत्]) or @deva[तैलीनम्] (by @deva[खञ्]); @deva[माष] → @deva[माष्यम्] or @deva[माषीणम्]; @deva[उमा] → @deva[उम्यम्] or @deva[औमीनम्]; @deva[भङ्गा] → @deva[भङ्ग्यम्] or @deva[भाङ्गीनम्].
"""

advanced = """
The @deva[विकल्प] between @deva[यत्] and @deva[खञ्] creates derivational doublets for five seed/grain crops: @deva[तिल] (sesame), @deva[माष] (black gram/bean), @deva[उमा] (linseed/flax), @deva[भङ्गा] (hemp/cannabis), @deva[अणु] (a millet variety). The @deva[यत्]-forms show no @deva[वृद्धि] while @deva[खञ्]-forms show initial @deva[वृद्धि].
"""

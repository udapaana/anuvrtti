id = "5.2.79"
numericId = "52079"

[en]
simple = """
The affix @deva[कन्] comes after @deva[शृङ्खल] 'clog/fetter' to mean 'one whose fetter is this', when denoting a young camel. @deva[शृंखलं बन्धनम् अस्य करभस्य] → @deva[शृंखलकः] 'a clog-fettered young camel'.
"""

standard = """
After @deva[शृंखल] 'wooden clog/fetter', the affix @deva[कन्] denotes @deva[बन्धन] 'fetter', when the resulting word means 'a young camel' (@deva[करभ]). Example: @deva[शृंखलं बन्धनम् अस्य करभस्य] → @deva[शृंखलकः] 'a young camel fettered with a clog'. Young camels (@deva[करभ]) have wooden clogs on their feet to prevent straying. Though ropes are also used, @deva[शृंखल] being the principal restraint is called @deva[बन्धन].
"""

advanced = """
The @deva[कन्]-affix with @deva[बन्धन]-meaning applies to @deva[शृंखल] specifically when denoting @deva[करभ] (camel-calf). The semantic restriction to camel-husbandry context limits the derivation. The @deva[शृंखल] (wooden clog) is the @deva[प्रधानबन्धन] (principal restraint) despite auxiliary ropes, hence the metonymic naming.
"""

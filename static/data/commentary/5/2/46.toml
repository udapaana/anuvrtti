id = "5.2.46"
numericId = "52046"

[en]
simple = """
The affix @deva[ड] comes after numerals ending in @deva[शत्] and after @deva[विंशति] (with elision of @deva[अत्] and @deva[अति]) to mean 'surplus'. @deva[त्रिंशत् अधिका अस्मिन् शते] → @deva[त्रिंशं शतम्] '130'.
"""

standard = """
After numerals ending in @deva[शत्] and after @deva[विंशति], the affix @deva[ड] (= @deva[अ]) denotes @deva[अधिक] 'surplus', with elision of @deva[अत्] (for @deva[शत्]-ending) and @deva[अति] (for @deva[विंशति]) per @ref[6.4.142]. Examples: @deva[त्रिंशत् अधिका अस्मिन् शते] → @deva[त्रिंशं शतम्] '130'; @deva[एकत्रिंशं शतम्] '131'; @deva[एकचत्वारिंशं शतम्] '141'. This applies to abstract numerals only; hence not *@deva[गोत्रिंशम्] for '30 cows added to 100 cows'.
"""

advanced = """
The @deva[ड]-affix for @deva[अधिक]-meaning applies to @deva[शदन्त] numerals and @deva[विंशति], with @deva[टिलोप] by @ref[6.4.142]. The rule is restricted to @deva[संख्यामात्र] (abstract numbers); when counting concrete objects (@deva[गोशत] 'hundred cows'), the affix doesn't apply, preserving full forms like @deva[गोत्रिंशदधिका अस्मिन् गोशते].
"""

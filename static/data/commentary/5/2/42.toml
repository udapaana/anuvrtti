id = "5.2.42"
numericId = "52042"

[en]
simple = """
The affix @deva[तयप्] comes after numerals to mean 'that which has so many parts'. @deva[पञ्च अवयवाः अस्य] → @deva[पञ्चतयम्] 'a group of five'.
"""

standard = """
After a numeral, the affix @deva[तयप्] (= @deva[तय]) denotes 'that whose parts are so many' (@deva[तदस्य अवयवाः]). Since parts connect with the whole, the affix denotes the whole. Examples: @deva[पञ्च अवयवा अस्य] → @deva[पञ्चतयम्] 'having five parts, a pentad'; @deva[दशतयम्] 'a group of ten, decade'; @deva[चतुष्टयम्] 'a tetrad' (see @ref[8.3.101] and @ref[4.5.15] for @deva[चतुष्टयी]).
"""

advanced = """
The @deva[तयप्]-affix applies to @deva[संख्यावाचिन्] (numerals) with @deva[अवयव]-meaning (parts constituting a whole). The derived @deva[°तय] forms function as collective nouns: @deva[पञ्चतय] 'pentad', @deva[दशतय] 'decade'. The part-whole relation (@deva[अवयवावयविभाव]) allows the affix to denote the composite entity rather than its constituents.
"""

id = "5.2.48"
numericId = "52048"

[en]
simple = """
The affix @deva[डट्] comes after numerals (genitive) to mean 'making full this number' (ordinal). @deva[एकादशानां पूरणः] → @deva[एकादशः] 'eleventh'.
"""

standard = """
After a numeral in the genitive, the affix @deva[डट्] (= @deva[अ] with elision of final vowel + following consonant) denotes @deva[पूरण] 'completing/making full the number' — forming ordinals. That which completes a count is @deva[पूरण]. Examples: @deva[एकादशानां पूरणः] → @deva[एकादशः] 'the eleventh' (the one completing eleven); @deva[त्रयोदशानां पूरणः] → @deva[त्रयोदशः] 'thirteenth'. The rule doesn't apply to cardinal meanings.
"""

advanced = """
The @deva[डट्]-affix (@deva[टिलोप]-causing per @ref[6.4.142]) creates @deva[पूरणसंख्या] (ordinal numerals) from @deva[षष्ठ्यन्त] cardinals. The @deva[पूरण] concept: the ordinal designates the element that 'completes' the count to reach the given number. This semantic analysis distinguishes ordinals from cardinals: @deva[एकादश] (cardinal 'eleven') vs. @deva[एकादश] (ordinal 'eleventh').
"""

id = "5.2.89"
numericId = "52089"

[en]
simple = """
In the Vedas, @deva[परिपन्थिन्] and @deva[परिपरिन्] are irregularly formed with @deva[इनि], meaning 'antagonist/adversary'.
"""

standard = """
In Vedic (@deva[छन्दस्]), the words @deva[परिपन्थिन्] and @deva[परिपरिन्] are irregular formations (@deva[निपातन]) with @deva[इनि], meaning @deva[पर्यवस्थातृ] 'antagonist/adversary'. Vedic usage: @deva[मा त्वा परिपरिणो विदन् मा त्वा परिपन्थिनो विदन्] (Yajurveda IV.34) 'May neither adversary find you'. These words are archaic in secular literature (but see Bhagavad @[gītā] III.34).
"""

advanced = """
The @deva[छान्दस निपातन] forms @deva[परिपन्थिन्] and @deva[परिपरिन्] with @deva[इनि]-affix denote @deva[पर्यवस्थातृ] (one who obstructs/opposes). The Vedic citation (@deva[यजुर्वेद] IV.34) preserves archaic usage. @deva[परिपन्थिन्] (from @deva[परि] + @deva[पन्थन्] 'path' + @deva[इनि]) = 'one who blocks the path'. Classical survival is limited (@[gītā] III.34).
"""

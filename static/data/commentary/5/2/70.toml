id = "5.2.70"
numericId = "52070"

[en]
simple = """
The affix @deva[कन्] comes after @deva[तन्त्र] 'loom' (ablative) to mean 'recently taken off therefrom'. @deva[तन्त्रात् अचिरापहृतः] → @deva[तन्त्रकः] 'cloth just off the loom'.
"""

standard = """
After @deva[तन्त्र] 'loom' in the ablative (as indicated by the @[sūtra]'s own case-usage), the affix @deva[कन्] denotes @deva[अचिरापहृत] 'taken off not long ago/recently removed'. @deva[अचिर] means 'short time'; @deva[अपहृत] means 'taken off'. Example: @deva[तन्त्रात् अचिरापहृतः] → @deva[तन्त्रकः पटः] 'a cloth just taken off the loom', i.e., an unbleached/fresh cloth.
"""

advanced = """
The @deva[कन्]-affix with @deva[अचिरापहृत]-meaning applies to @deva[पञ्चम्यन्त] @deva[तन्त्र] (the @[sūtra]'s ablative usage is @deva[विभक्त्यर्थबोधक]). The derived @deva[तन्त्रक] specifically denotes newly-woven cloth before processing (bleaching, etc.). This is a technical textile term.
"""

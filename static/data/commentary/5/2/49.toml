id = "5.2.49"
numericId = "52049"

[en]
simple = """
The augment @deva[मट्] comes before @deva[डट्] after numerals ending in @deva[न्] when no other numeral precedes. @deva[पञ्चानां पूरणः] → @deva[पञ्चमः] 'fifth'.
"""

standard = """
Before @deva[डट्] (ordinal affix), the augment @deva[मट्] (= @deva[म]) is added after numerals ending in @deva[न्] (@deva[नकारान्त]) when not preceded by another numeral. Examples: @deva[पञ्चानां पूरणः] → @deva[पञ्चमः] 'fifth'; @deva[सप्तानां पूरणः] → @deva[सप्तमः] 'seventh'. Why @deva[नकारान्त]? @deva[विंशतेः पूरणः] → @deva[विंशः] 'twentieth' (no @deva[म्]). Why 'not preceded by numeral'? @deva[एकादशानां पूरणः] → @deva[एकादशः] (no @deva[म्]).
"""

advanced = """
The @deva[मट्]-@deva[आगम] applies to @deva[नकारान्त संख्या] (@deva[पञ्चन्], @deva[सप्तन्], @deva[नवन्], @deva[दशन्]) before @deva[डट्], conditioned by @deva[असंख्यापूर्वक] (not preceded by another numeral). This yields @deva[पञ्चम], @deva[सप्तम], @deva[नवम], @deva[दशम]. Compound numerals like @deva[एकादशन्] take @deva[डट्] directly without @deva[मट्].
"""

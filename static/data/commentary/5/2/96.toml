id = "5.2.96"
numericId = "52096"

[en]
simple = """
The affix @deva[लच्] optionally comes after long @deva[आ]-ending stems (denoting something found in living beings) with @deva[मतुप्]-sense. @deva[चूडा] → @deva[चूडालः] or @deva[चूडावान्] 'having a crest'.
"""

standard = """
After stems ending in long @deva[आ], when the word denotes something found only in living beings (@deva[प्राणिनि]), the affix @deva[लच्] (= @deva[ल]) optionally comes with @deva[मतुप्]-sense. Examples: @deva[चूडा] 'crest' → @deva[चूडालः] or @deva[चूडावान्] 'having a crest'; @deva[कर्णिका] → @deva[कर्णिकालः] or @deva[कर्णिकावान्]. Why 'in living beings'? @deva[शिखावान् प्रदीपः] 'crested lamp-flame' — no @deva[लच्]. Why '@deva[आ]-ending'? @deva[हस्तवान्], @deva[पादवान्] — only @deva[मतुप्].
"""

advanced = """
The @deva[लच्]-@deva[विकल्प] for @deva[आकारान्त] stems is conditioned by @deva[प्राणिधर्म] (attribute of animate beings): @deva[चूडा], @deva[कर्णिका] qualify; @deva[शिखा] (flame-crest, inanimate) does not. The @deva[आकारान्त] restriction excludes @deva[हस्त], @deva[पाद] (consonant-final). A @deva[वार्त्तिक] may extend the rule.
"""

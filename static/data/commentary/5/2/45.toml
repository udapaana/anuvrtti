id = "5.2.45"
numericId = "52045"

[en]
simple = """
The affix @deva[ड] comes after numerals ending in @deva[दशन्] (nominative) to mean 'this is surplus in it'. @deva[एकादश अधिका अस्मिन् शते] → @deva[एकादशं शतम्] 'a hundred plus eleven = 111'.
"""

standard = """
After a numeral ending in @deva[दशन्] 'ten' in the nominative, the affix @deva[ड] (= @deva[अ] with elision of @deva[अन्] from the base) denotes @deva[अधिक] 'surplus/additional'. Example: @deva[एकादश अधिका अस्मिन् शते] → @deva[एकादशं शतम्] 'hundred + eleven = 111'. A @deva[कारिका] states: for @deva[अधिक]-meaning with @deva[शत] or @deva[सहस्र], when both belong to the same category, @deva[ड] should be applied to express the surplus numeral.
"""

advanced = """
The @deva[ड]-affix (with @deva[अन्-लोप] of @deva[दशन्]-final numerals) expresses @deva[आधिक्य] (surplus/excess) in compound numerals. The @deva[कारिका] specifies: @deva[अधिके समानजाताविष्टं शतसहस्रयोः] — when the surplus is within the same class (e.g., both counting units), @deva[ड] applies to the @deva[संख्या] expressing the excess. This creates forms like @deva[एकादशं शतम्] (100+11=111).
"""

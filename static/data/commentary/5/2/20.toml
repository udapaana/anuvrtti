id = "5.2.20"
numericId = "52020"

[en]
simple = """
The words @deva[शालीन] 'modest' and @deva[कौपीन] 'shameful act/loincloth' are irregularly formed from @deva[शाला] 'hall' and @deva[कूप] 'well'.
"""

standard = """
The words @deva[शालीन] and @deva[कौपीन] are irregular formations (@deva[निपातन]). @deva[शालीन] (from @deva[शाला] 'hall') means @deva[अधृष्ट] 'not proud, modest' — perhaps 'one worthy of entering a hall' (@deva[शालाप्रवेशम् अर्हति]). @deva[कौपीन] (from @deva[कूप] 'well') means @deva[अकार्यम्] 'an unfit/shameful act' — or a loincloth. The semantic connections between base and meaning are not transparent.
"""

advanced = """
Both @deva[शालीन] and @deva[कौपीन] are @deva[निपातित] (listed as irregular). The @deva[खञ्]-like derivation from @deva[शाला] and @deva[कूप] yields forms whose meanings (@deva[अधृष्ट] 'modest', @deva[अकार्य] 'shameful') lack clear etymological motivation. Proposed explanations (@deva[शालाप्रवेशार्ह], @deva[कूपावतारार्ह]) are post-hoc rationalizations. @deva[कौपीन] also denotes a loincloth in later usage.
"""

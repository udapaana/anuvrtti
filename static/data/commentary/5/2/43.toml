id = "5.2.43"
numericId = "52043"

[en]
simple = """
The affix @deva[अयच्] optionally replaces @deva[तयप्] after @deva[द्वि] 'two' and @deva[त्रि] 'three'. @deva[द्वौ अवयवौ अस्य] → @deva[द्वयम्] or @deva[द्वितयम्] 'a pair'.
"""

standard = """
After @deva[द्वि] 'two' and @deva[त्रि] 'three', the affix @deva[अयच्] (= @deva[अय]) optionally substitutes for @deva[तयप्]. Examples: @deva[द्वौ अवयवौ अस्य] → @deva[द्वयम्] (by @deva[अयच्]) or @deva[द्वितयम्] (by @deva[तयप्]) 'a pair, couple'; @deva[त्रयः अवयवाः अस्य] → @deva[त्रयम्] or @deva[त्रितयम्] 'a triad' (see @ref[6.4.148]). The word @deva[तय] in the @[sūtra] indicates the @deva[स्थानिन्] (item to be replaced).
"""

advanced = """
The @deva[विकल्प] between @deva[अयच्] and @deva[तयप्] for @deva[द्वि]//@deva[त्रि] creates doublets: @deva[द्वय]//@deva[द्वितय], @deva[त्रय]//@deva[त्रितय]. The explicit mention of @deva[तय] as @deva[स्थानिन्] clarifies the substitution relation; without it, @deva[अयच्] would simply be an additional affix. The @deva[अयच्]-forms (@deva[द्वय], @deva[त्रय]) are more common in classical usage.
"""

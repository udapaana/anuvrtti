id = "5.2.51"
numericId = "52051"

[en]
simple = """
The augment @deva[थुक्] comes before @deva[डट्] after @deva[षट्], @deva[कति], @deva[कतिपय], and @deva[चतुर्]. @deva[षण्णां पूरणः] → @deva[षष्ठः] 'sixth'; @deva[चतुर्णां पूरणः] → @deva[चतुर्थः] 'fourth'.
"""

standard = """
Before @deva[डट्], the augment @deva[थुक्] (= @deva[थ्]) is added after @deva[षट्] 'six', @deva[कति] 'how many', @deva[कतिपय] 'several', and @deva[चतुर्] 'four'. @deva[डट्] must be read into this @[sūtra] in the locative (@deva[डटि] 'when @deva[डट्] follows'). @deva[कतिपय] is not a numeral but takes @deva[डट्] by this rule. Examples: @deva[षण्णां पूरणः] → @deva[षष्ठः] 'sixth'; @deva[कतिथः] 'which in order?'; @deva[कतिपयथः] 'the one after several'; @deva[चतुर्थः] 'fourth'.
"""

advanced = """
The @deva[थुक्]-@deva[आगम] applies to a closed set: @deva[षट्], @deva[कति], @deva[कतिपय], @deva[चतुर्]. The @deva[उकार] of @deva[थुक्] is @deva[इत्] (elided). @deva[कतिपय] (not technically a @deva[संख्या]) receives @deva[डट्] by implication of this @[sūtra]. The @deva[षट्] + @deva[थ] + @deva[अ] derivation shows @deva[ष्टुत्व] (@deva[ट] → @deva[ठ] after @deva[ष्]): @deva[षष्ठ].
"""

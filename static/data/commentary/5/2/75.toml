id = "5.2.75"
numericId = "52075"

[en]
simple = """
The affix @deva[कन्] comes after @deva[पार्श्व] 'side/crooked means' (instrumental) to mean 'one who strives to gain by that'. @deva[पार्श्वेन प्राप्नोति] → @deva[पार्श्वकः] 'a cheat, juggler'.
"""

standard = """
After @deva[पार्श्व] 'side/flank' (= fraudulent/crooked expedient) in the instrumental, the affix @deva[कन्] denotes 'one who strives to gain something thereby'. @deva[पार्श्व] literally means 'rib, a crooked thing'; figuratively, 'a devious method'. Example: one who endeavors to obtain anything by fraud → @deva[पार्श्वकः] = @deva[मायाविन्] 'magician', @deva[कौसृतिकः] 'deceiver', @deva[जालिकः] 'juggler', or 'a partisan'.
"""

advanced = """
The @deva[कन्]-affix with @deva[तेन प्राप्तुम् इच्छति]-meaning (striving to gain by X) applies to @deva[तृतीयान्त] @deva[पार्श्व]. The semantic extension: @deva[पार्श्व] 'side/flank' → 'oblique/devious means' → one using such means = @deva[पार्श्वक] (cheat/trickster/partisan). Glosses include @deva[मायाविन्], @deva[कौसृतिक], @deva[जालिक] — all denoting deceptive practitioners.
"""

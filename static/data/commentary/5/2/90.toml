id = "5.2.90"
numericId = "52090"

[en]
simple = """
The word @deva[अनुपदिन्] is irregularly formed with @deva[इनि], meaning 'one who goes after/searches'. @deva[अनुपदी गवाम्] 'one who searches for cows'.
"""

standard = """
The word @deva[अनुपदिन्] is an irregular formation (@deva[निपातन]) with @deva[इनि], meaning 'one who goes after/searches'. Examples: @deva[अनुपदी गवाम्] 'one who searches for cows'; @deva[अनुपदी उष्ट्राणाम्] 'one who searches for camels'. The form derives from @deva[अनुपद] 'following the track' + @deva[इनि].
"""

advanced = """
The @deva[निपातन] @deva[अनुपदिन्] (< @deva[अनुपद] + @deva[इनि]) means @deva[अनुगन्तृ]//@deva[अन्वेषक] (tracker/searcher). The @deva[अनुपद] base (@deva[अनु] + @deva[पद] 'foot/track') + @deva[इनि] creates an agent-noun for those who follow tracks of animals. The genitive object (@deva[गवाम्], @deva[उष्ट्राणाम्]) specifies the search-target.
"""

id = "5.2.108"
numericId = "52108"

[en]
simple = """
The affix @deva[म] comes after @deva[द्यु] 'sky/brightness' and @deva[द्रु] 'tree' with @deva[मतुप्]-sense. @deva[द्युमः] 'bright'; @deva[द्रुमः] 'tree'.
"""

standard = """
After @deva[द्यु] 'sky/light' and @deva[द्रु] 'tree/wood', the affix @deva[म] comes with @deva[मतुप्]-sense. Examples: @deva[द्युमः] 'bright/luminous'; @deva[द्रुमः] 'tree' (having wood). These are primitive words and therefore do not take @deva[मतुप्] as an alternative.
"""

advanced = """
The @deva[म]-affix for @deva[द्यु] and @deva[द्रु] creates @deva[रूढ] (lexicalized) forms: @deva[द्युम] (luminosity-possessing), @deva[द्रुम] (wood-possessing = tree). As @deva[प्रातिपदिक] (primitives), these lack @deva[मतुप्]-@deva[विकल्प]; the @deva[म]-forms are the only derivatives.
"""

id = "5.2.92"
numericId = "52092"

[en]
simple = """
The word @deva[क्षेत्रिय] is irregularly formed, meaning 'curable in another body' = 'incurable in this life'. @deva[क्षेत्रियो व्याधिः] 'an incurable disease'.
"""

standard = """
The word @deva[क्षेत्रिय] (with acute accent on last syllable) is an irregular formation (@deva[निपातन]) meaning @deva[परक्षेत्रे चिकित्स्य] 'curable in another body' = incurable in this life. It may be formed by adding @deva[घच्] to @deva[परक्षेत्र] 'another body' (with @deva[पर]-elision). Example: @deva[क्षेत्रियो व्याधिः] 'incurable disease' — one that cannot be cured in this body/lifetime.
"""

advanced = """
The @deva[निपातन] @deva[क्षेत्रिय] has disputed derivation: either (1) whole-word listing with meaning @deva[परक्षेत्रे चिकित्स्य], or (2) @deva[परक्षेत्र] + @deva[घच्] (= @deva[य]) with @deva[पर-लोप]. The @deva[अन्तोदात्त] accent distinguishes it. The medical-philosophical meaning: disease whose karmic cure requires another birth/body.
"""

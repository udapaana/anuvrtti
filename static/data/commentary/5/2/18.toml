id = "5.2.18"
numericId = "52018"

[en]
simple = """
The affix @deva[खञ्] comes after @deva[गोष्ठ] 'cow-pen' to mean 'it formerly had been (a cow-pen)'. @deva[गोष्ठो भूतपूर्वः] → @deva[गौष्ठीनो देशः] 'a place that was formerly a cow-pen'.
"""

standard = """
After @deva[गोष्ठ] 'cow-pen' (compound of @deva[गो] + @deva[स्था], the area around a cow-pen), the affix @deva[खञ्] denotes @deva[भूतपूर्व] 'it formerly had been'. Example: @deva[गोष्ठो भूतपूर्वः] → @deva[गौष्ठीनो देशः] 'a place which was formerly a @deva[गोष्ठ]'. When not meaning 'formerly', one simply says @deva[गोष्ठो वर्तते] 'it is a cow-pen'.
"""

advanced = """
The @deva[खञ्]-affix with @deva[भूतपूर्व]-meaning (former state) applies specifically to @deva[गोष्ठ] (< @deva[गो] + @deva[स्था], 'cow-station'). The @deva[वृद्धि] yields @deva[गौष्ठीन]. This specialized temporal-semantic application distinguishes past-state description from present-state predication; the latter uses simple @deva[वर्तते] without derivation.
"""

id = "5.2.50"
numericId = "52050"

[en]
simple = """
In the Vedas, @deva[थट्] is optionally the augment (alongside @deva[मट्]) before @deva[डट्] after @deva[न्]-ending numerals not preceded by another numeral. @deva[पञ्चथः] or @deva[पञ्चमः] 'fifth'.
"""

standard = """
In Vedic (@deva[छन्दस्]), the augment @deva[थट्] (= @deva[थ]) optionally comes before @deva[डट्] after @deva[न्]-ending numerals not preceded by another numeral, alongside @deva[मट्]. Examples: @deva[पञ्चथः] or @deva[पञ्चमः] 'fifth'; @deva[सप्तथः] or @deva[सप्तमः] 'seventh'. Vedic usage: @deva[पर्णमयानि पञ्चथानि भवन्ति]; @deva[पञ्चमम् इन्द्रियम् अस्य आपाञ्च्यमन्].
"""

advanced = """
The @deva[थट्]-@deva[आगम] is a @deva[छान्दस] (Vedic) @deva[विकल्प] to @deva[मट्] for @deva[नकारान्त असंख्यापूर्वक संख्या] before @deva[डट्]. This creates Vedic doublets: @deva[पञ्चथ]//@deva[पञ्चम], @deva[सप्तथ]//@deva[सप्तम]. The @deva[थ]-forms are archaic, preserved in Vedic texts but replaced by @deva[म]-forms in classical Sanskrit.
"""

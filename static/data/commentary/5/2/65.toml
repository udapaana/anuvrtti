id = "5.2.65"
numericId = "52065"

[en]
simple = """
The affix @deva[कन्] comes after @deva[धन] 'wealth' and @deva[हिरण्य] 'gold' (locative) to mean 'desire for'. @deva[धने कामः] → @deva[धनकः] 'one desirous of wealth'.
"""

standard = """
After @deva[धन] 'wealth' and @deva[हिरण्य] 'gold' in the locative, the affix @deva[कन्] (= @deva[क]) denotes @deva[काम] 'desire'. The word @deva[काम] means 'wish, craving'. Examples: @deva[धने कामः] → @deva[धनकः देवदत्तस्य] 'Devadatta's desire for wealth' (= one desirous of wealth); @deva[हिरण्ये कामः] → @deva[हिरण्यकः देवदत्तस्य].
"""

advanced = """
The @deva[कन्]-affix with @deva[काम]-meaning (desire/craving) applies to @deva[सप्तम्यन्त] @deva[धन] and @deva[हिरण्य]. The derived @deva[धनक]//@deva[हिरण्यक] function as @deva[भाववाचक] or @deva[कर्तृवाचक] depending on context: @deva[धनकः देवदत्तस्य] = 'D.'s wealth-desire' or 'D. who desires wealth'.
"""

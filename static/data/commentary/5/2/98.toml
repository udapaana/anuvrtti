id = "5.2.98"
numericId = "52098"

[en]
simple = """
The affix @deva[लच्] comes after @deva[वत्स] 'calf' meaning 'love' and after @deva[अंस] 'shoulder' meaning 'strength'. @deva[वत्सलः] 'loving/tender'; @deva[अंसलः] 'strong/lusty'.
"""

standard = """
After @deva[वत्स] 'calf' and @deva[अंस] 'shoulder', the affix @deva[लच्] comes with meanings 'love' and 'strength' respectively. @deva[वत्सलः] 'loving the calf' → 'loving, tender' (applied to father, master: @deva[वत्सलः स्वामी], @deva[वत्सलः पिता]); @deva[अंसलः] 'having strong shoulders' → 'strong, lusty'. In these cases, @deva[लच्] has no @deva[मतुप्]-meaning but specialized senses.
"""

advanced = """
The @deva[लच्]-affix after @deva[वत्स] and @deva[अंस] shows semantic specialization: @deva[वत्स] (calf) + @deva[ल] → @deva[वत्सल] 'affectionate' (extended beyond calf-love to general tenderness); @deva[अंस] (shoulder) + @deva[ल] → @deva[अंसल] 'strong' (metonymically from shoulder-strength). These are @deva[निपातनप्राय] (semi-irregular) with lexicalized meanings beyond literal @deva[मतुप्]-sense.
"""

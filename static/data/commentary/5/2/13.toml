id = "5.2.13"
numericId = "52013"

[en]
simple = """
The word @deva[अद्यश्वीन] is irregular, meaning 'a female near delivery'. @deva[अद्य वा श्वो वा विजायते] → @deva[अद्यश्वीना गौः] 'a cow about to give birth today or tomorrow'.
"""

standard = """
The word @deva[अद्यश्वीन] is formed irregularly (@deva[निपातन]) meaning 'a female animal near delivery' (@deva[अवष्टब्धप्रसव] 'imminent parturition'). The understood verb is @deva[विजायते]. @deva[अवष्टब्ध] 'imminent/near' is from @deva[अव] + @deva[स्तम्भ्] + @deva[क्त], with @deva[स्] → @deva[ष्] by @ref[8.3.68]. Example: @deva[अद्य वा श्वो वा विजायते] → @deva[अद्यश्वीना गौः] 'a cow likely to calve today or tomorrow'; similarly @deva[अद्यश्वीना वडवा].
"""

advanced = """
The @deva[निपातन] @deva[अद्यश्वीन] derives from @deva[अद्य] 'today' + @deva[श्वस्] 'tomorrow' with irregular @deva[ख]-affixation and phonological fusion. The semantic gloss @deva[अवष्टब्धप्रसव] (imminent delivery) involves @deva[अवष्टब्ध] (< @deva[अव-स्तम्भ्-क्त], 'approached/imminent') with @deva[षत्व] by @ref[8.3.68]. Some commentators omit @deva[विजायते] from the @deva[अधिकार], treating the form as purely lexical.
"""

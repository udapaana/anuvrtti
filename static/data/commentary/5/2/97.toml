id = "5.2.97"
numericId = "52097"

[en]
simple = """
The affix @deva[लच्] comes after @deva[सिध्म]-class words with @deva[मतुप्]-sense; @deva[मतुप्] is also optional. @deva[सिध्मलः] or @deva[सिध्मवान्] 'having white leprosy'; @deva[गडुलः] or @deva[गडुवान्] 'having goiter'.
"""

standard = """
After @deva[सिध्म] and similar words (@deva[सिध्मादि]), the affix @deva[लच्] (= @deva[ल]) comes with @deva[मतुप्]-sense; @deva[मतुप्] itself is also available alternatively. The @deva[अन्यतरस्याम्] understood in this @[sūtra] causes @deva[मतुप्] as the alternative (not making @deva[लच्] itself optional). Examples: @deva[सिध्मलः] or @deva[सिध्मवान्] 'having white leprosy'; @deva[गडुलः] or @deva[गडुवान्] 'having goiter'. If @deva[लच्] were simply optional, @deva[इनि] and @deva[ठन्] would apply by @ref[5.2.115].
"""

advanced = """
The @deva[लच्]//@deva[मतुप्] alternation for @deva[सिध्मादि] is structured: @deva[लच्] is prescribed, @deva[मतुप्] is the @deva[विकल्प] (not @deva[लच्] being optional). This prevents @deva[इनि]//@deva[ठन्] (from @ref[5.2.115]) from applying when @deva[लच्] is 'declined'. The @deva[गण] includes disease/defect terms: @deva[सिध्म] (leucoderma), @deva[गडु] (goiter), etc.
"""

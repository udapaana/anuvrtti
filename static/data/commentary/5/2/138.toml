id = "5.2.138"
numericId = "52138"

[en]
simple = """
Seven affixes (@deva[ब], @deva[भ], @deva[युस्], @deva[ति], @deva[तु], @deva[त], @deva[यस्]) come after @deva[कम्] 'water/happiness' and @deva[शम्] 'happiness' with @deva[मतुप्]-sense. @deva[कम्बः], @deva[शम्भः], @deva[कन्तिः], @deva[शन्तिः], etc.
"""

standard = """
After @deva[कम्] 'water/happiness' and @deva[शम्] 'happiness', seven affixes come with @deva[मतुप्]-sense: @deva[ब], @deva[भ], @deva[युस्], @deva[ति], @deva[तु], @deva[त], @deva[यस्]. Examples from @deva[कम्]: @deva[कम्बः], @deva[कम्भः], @deva[कंयुः], @deva[कन्तिः], @deva[कन्तुः], @deva[कन्तः], @deva[कंयः]. From @deva[शम्]: @deva[शम्बः], @deva[शम्भः], @deva[शंयुः], @deva[शन्तिः], @deva[शन्तुः], @deva[शन्तः], @deva[शंयः]. The @deva[स्] in @deva[युस्] and @deva[यस्] makes the stem a @deva[पद] (per @ref[1.4.16]).
"""

advanced = """
The septuple-affix provision for @deva[कम्]//@deva[शम्] creates extensive @deva[मतुप्]-derivatives. The @deva[सकार] in @deva[युस्]//@deva[यस्] triggers @deva[पदसंज्ञा] (@ref[1.4.16]), affecting sandhi. @deva[शन्ति] and @deva[कन्ति] show @deva[म्] → @deva[न्] before @deva[त]-initial affixes. These forms are often lexicalized with specialized meanings.
"""

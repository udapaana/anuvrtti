id = "5.2.77"
numericId = "52077"

[en]
simple = """
The affix @deva[कन्] comes after ordinal numbers to mean 'acquiring a subject after that many attempts', with optional elision of the ordinal affix. @deva[द्वितीयेन रूपेण गृह्णाति] → @deva[द्विकं ग्रहणम्] or @deva[द्वितीयकम्] 'learned on second attempt'.
"""

standard = """
After ordinal-denoting words (typified by @deva[तावतिथ] per @ref[5.2.53]), the affix @deva[कन्] means @deva[ग्रहण] 'acquiring/learning after so many attempts'. The ordinal affix is optionally elided. Examples: @deva[द्वितीयेन रूपेण ग्रन्थं गृह्णाति] → @deva[द्विकं ग्रहणम्] (with elision) or @deva[द्वितीयकम्] (without elision) 'comprehension on second attempt'.
"""

advanced = """
The @deva[कन्]-affix with @deva[ग्रहण]-meaning (acquisition after X attempts) applies to @deva[पूरणान्त] (ordinal-suffixed) bases. The @deva[विकल्प] permits @deva[पूरणप्रत्ययलोप] (elision of ordinal affix): @deva[द्वितीय] + @deva[क] → @deva[द्वितीयक]; or @deva[द्वि] + @deva[क] → @deva[द्विक] (with @deva[तीय]-elision). Both mean 'understood on second reading/attempt'.
"""

id = "5.2.9"
numericId = "52009"

[en]
simple = """
The affix @deva[ख] comes after @deva[अनुपद] (meaning 'bound'), @deva[सर्वान्न] (meaning 'eating'), and @deva[आयन] (meaning 'carrying'). @deva[अनुपदं बद्धा] → @deva[अनुपदीना] 'a kind of shoe'.
"""

standard = """
The affix @deva[ख] (= @deva[ईन]) applies in three contexts: (1) after @deva[अनुपद] with meaning 'so bound' → @deva[अनुपदीना] 'a shoe' (always feminine, meaning 'bound to the measure of a foot'); (2) after @deva[सर्वान्न] with meaning 'eating all food' → @deva[सर्वान्नीनो भिक्षुः] 'a mendicant who eats all food'; (3) after @deva[आयन] with meaning 'to carry thereto'.
"""

advanced = """
Three distinct base-meaning pairs share @deva[ख]-affixation: @deva[अनुपद] + @deva[बद्ध] (bound), @deva[सर्वान्न] + @deva[भक्षयति] (eats), @deva[आयन] + carrying-sense. The @deva[अनुपद] form is @deva[नित्यस्त्री] (invariably feminine), denoting footwear 'bound to foot-measure'. The @deva[अनु] here conveys 'likeness' or 'measure' (@deva[प्रमाण]) rather than 'following'.
"""

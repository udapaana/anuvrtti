id = "5.2.32"
numericId = "52032"

[en]
simple = """
The affixes @deva[बिडच्] and @deva[बिरीसच्] come after @deva[नि] to mean 'a hooked nose' (when forming a name). @deva[नि] → @deva[निबिडम्], @deva[निबिरीसम्].
"""

standard = """
After @deva[नि] 'down', the affixes @deva[बिडच्] (= @deva[बिड]) and @deva[बिरीसच्] (= @deva[बिरीस]) denote 'a hooked nose' when forming a name. Examples: @deva[निबिडम्], @deva[निबिरीसम्]. Question: How do we explain @deva[निबिडाः केशाः] 'thick hair' or @deva[निबिडं वस्त्रम्] 'dense cloth'? Answer: By analogical extension.
"""

advanced = """
The @deva[बिडच्]//@deva[बिरीसच्] affixes apply to @deva[नि] with @deva[नासिकानति]-meaning in @deva[संज्ञा] context. The semantic extension to @deva[निबिड] 'thick/dense' (as in @deva[निबिडाः केशाः], @deva[निबिडं वस्त्रम्]) represents @deva[सादृश्य] (analogical) usage beyond the primary nasal-curvature sense.
"""

id = "5.2.68"
numericId = "52068"

[en]
simple = """
The affix @deva[कन्] comes after @deva[सस्य] 'good quality' (instrumental) to mean 'abundantly supplied with it'. @deva[सस्येन परिजातः] → @deva[सस्यकः] 'full of good qualities'.
"""

standard = """
After @deva[सस्य] 'good quality' (not 'corn' in this context) in the instrumental, the affix @deva[कन्] (not @deva[ठक्]) denotes @deva[परिजात] 'richly/fully supplied with'. The word @deva[परि] means 'all, everywhere'. Example: @deva[सस्येन परिजातः] → @deva[सस्यकः] 'fully endowed with good qualities, having no defect'. An alternative reading has @deva[शस्य].
"""

advanced = """
The @deva[कन्]-affix (continuing from @deva[अनुवृत्ति], not @deva[ठक्]) with @deva[परिजात]-meaning (abundantly supplied) applies to @deva[तृतीयान्त] @deva[सस्य]. The semantic specification @deva[सस्य] = @deva[सुगुण] (good quality), not @deva[धान्य] (grain), is crucial. An alternative @deva[पाठ] has @deva[शस्य]. The @deva[परि]-element implies comprehensive presence without deficiency.
"""

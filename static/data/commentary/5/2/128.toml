id = "5.2.128"
numericId = "52128"

[en]
simple = """
The affix @deva[इनि] comes after @deva[द्वन्द्व] compounds, disease names, and fault-denoting words (for living beings) with @deva[मतुप्]-sense. @deva[कटकवलयिनी] 'woman with bracelet and armlet'; @deva[कुष्ठी] 'leper'.
"""

standard = """
After @deva[द्वन्द्व] compounds, names of diseases, and fault-denoting words (when found in living beings), the affix @deva[इनि] (= @deva[इन्]) comes with @deva[मतुप्]-sense. Examples with @deva[द्वन्द्व]: @deva[कटकवलयिनी] 'woman having bracelet and armlet'; @deva[शङ्खनूपुरिणी] 'woman having conch-bracelet and anklet'. With diseases: @deva[कुष्ठी] 'leper'; @deva[किलासी] 'one with vitiligo'. With faults: @deva[ककुदावर्ती], @deva[काकतालुकी].
"""

advanced = """
The @deva[इनि]-affix applies to three domains in @deva[प्राणिन्] (animate) context: (1) @deva[द्वन्द्व]-compounds of ornaments/attributes; (2) @deva[रोगवाचिन्] (disease names); (3) @deva[दोषवाचिन्] (fault/defect terms). The @deva[प्राणिनि]-restriction excludes inanimate applications.
"""

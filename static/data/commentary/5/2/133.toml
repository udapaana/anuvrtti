id = "5.2.133"
numericId = "52133"

[en]
simple = """
The affix @deva[इनि] comes after @deva[हस्त] 'hand/trunk' when a genus (animal species) is denoted with @deva[मतुप्]-sense. @deva[हस्तः अस्य अस्ति] → @deva[हस्तिन्] 'elephant'.
"""

standard = """
After @deva[हस्त] 'hand/trunk', the affix @deva[इनि] (= @deva[इन्]) comes with @deva[मतुप्]-sense when the derived word denotes a @deva[जाति] 'genus/species'. Example: @deva[हस्तः अस्य अस्ति] → @deva[हस्तिन्] 'elephant' (= the trunk-possessing animal). Why @deva[जाति]-meaning? @deva[हस्तवान् पुरुषः] 'a man having hands' — no @deva[इनि], just @deva[मतुप्].
"""

advanced = """
The @deva[इनि]-affix for @deva[हस्त] is conditioned by @deva[जातिवाचकत्व] (species-designation). @deva[हस्तिन्] = 'elephant' (trunk-possessor as species-name) is @deva[रूढ] (lexicalized). For humans, @deva[हस्तवत्] 'handed' applies (mere possession, not species).
"""

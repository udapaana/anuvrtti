id = "5.2.11"
numericId = "52011"

[en]
simple = """
The affix @deva[ख] comes after @deva[अवारपार], @deva[अत्यन्त], and @deva[अनुकाम] (accusative) to mean 'one who purposes to go'. @deva[अवारपारं गामी] → @deva[अवारपारीणः] 'intending to go to the far shore'.
"""

standard = """
After @deva[अवारपार] 'near and far shore', @deva[अत्यन्त] 'to the end', and @deva[अनुकाम] 'according to desire' (accusative), the affix @deva[ख] denotes 'one who purposes/intends to go' (@deva[गामी] = @deva[गमिष्यति], per @ref[3.3.3]). The genitive is blocked by @ref[2.3.70] since @deva[गामी] governs accusative. Example: @deva[अवारपारं गामी] → @deva[अवारपारीणः]. A @deva[वार्त्तिक] notes: reversed order also works (@deva[पारावारीणः]).
"""

advanced = """
The @deva[ख]-affix with @deva[गमनेच्छा] (intention-to-go) meaning applies to @deva[अवारपार] (this-shore-and-far-shore), @deva[अत्यन्त] (extreme end), @deva[अनुकाम] (following desire). The @deva[द्वितीया] is mandated as @deva[गामी] (= @deva[गमिष्यन्], per @ref[3.3.3]) takes accusative, not genitive (blocked by @ref[2.3.70]). The @deva[वार्त्तिक] permits @deva[व्यत्यय] (reversal): @deva[पारावारीणः].
"""

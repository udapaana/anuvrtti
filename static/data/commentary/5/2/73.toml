id = "5.2.73"
numericId = "52073"

[en]
simple = """
The word @deva[अधिक] 'more/superior' is irregularly formed from @deva[अध्यारूढ] with elision of the second part before @deva[कन्].
"""

standard = """
The word @deva[अधिक] meaning 'more, superior' is an irregular formation (@deva[निपातन]). It is derived by adding @deva[कन्] to @deva[अध्यारूढ] 'ascended upon/surpassing', with elision of the second term (@deva[आरूढ]) before the affix. Examples: @deva[अधिको द्रोणः खार्याम्] 'a @deva[द्रोण] is superior to a @deva[खारी]'; @deva[अधिका खारी द्रोणेन] 'a @deva[खारी] is inferior to a @deva[द्रोण]'. @deva[अध्यारूढ] governs either nominative or accusative.
"""

advanced = """
The @deva[निपातन] @deva[अधिक] derives from @deva[अध्यारूढ] (= @deva[अधि] + @deva[आरूढ] 'surpassing') with irregular @deva[उत्तरपदलोप] before @deva[कन्]: @deva[अध्य्-आरूढ] → @deva[अधि] + @deva[क] → @deva[अधिक]. The comparative sense (@deva[अतिशय]) comes from the @deva[अध्यारूढ] semantics. The dual case-government (@deva[प्रथमा]//@deva[द्वितीया]) allows flexible syntactic constructions.
"""

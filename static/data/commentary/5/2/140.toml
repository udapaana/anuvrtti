id = "5.2.140"
numericId = "52140"

[en]
simple = """
The affix @deva[युस्] comes after @deva[अहम्] 'I' and the indeclinable @deva[शुभम्] 'good' with @deva[मतुप्]-sense. @deva[अहंयुः] 'egotistic'; @deva[शुभंयुः] 'auspicious'.
"""

standard = """
After @deva[अहम्] 'I/self' and the indeclinable @deva[शुभम्] 'good/auspicious', the affix @deva[युस्] (= @deva[यु]) comes with @deva[मतुप्]-sense. Examples: @deva[अहंयुः] = @deva[अहंकारवान्] 'selfish, haughty' (having ego); @deva[शुभंयुः] = @deva[कल्याणवान्] 'auspicious' (having good fortune). The @deva[स्] of @deva[युस्] makes @deva[अहम्] and @deva[शुभम्] @deva[पद]s (per @ref[1.4.16]); @deva[म्] becomes @deva[अनुस्वार] by @ref[8.3.23]. See @ref[5.2.123].
"""

advanced = """
The @deva[युस्]-affix for @deva[अहम्]//@deva[शुभम्] creates @deva[अहंयु] (ego-possessing) and @deva[शुभंयु] (fortune-possessing). The @deva[सकार] triggers @deva[पदसंज्ञा], leading to @deva[अनुस्वार] by @ref[8.3.23] (@deva[म्] → @deva[ं] in @deva[पद]-final). This parallels @ref[5.2.123] (@deva[ऊर्णायु]).
"""

id = "5.2.83"
numericId = "52083"

[en]
simple = """
The affix @deva[अण्] comes after @deva[कुल्माष] 'parched barley' to mean 'principal food of the occasion', when forming a name. @deva[कुल्माषाः प्रायेण अन्नम्] → @deva[कौल्माषी पौर्णमासी] 'the Parched-barley Full-moon'.
"""

standard = """
After @deva[कुल्माष] 'parched barley/grain', the affix @deva[अञ्] (= @deva[अ] with @deva[वृद्धि]; @deva[ञ्] for accent) denotes 'principal food of the occasion', when forming a name. Example: @deva[कुल्माषाः प्रायेण अन्नम् अस्याम्] → @deva[कौल्माषी पौर्णमासी] 'the @deva[कौल्माषी] Full-moon' — characterized by parched grain as principal food.
"""

advanced = """
The @deva[अञ्]-affix (@deva[ञकार] for @deva[वृद्धि] and accent) with @deva[प्रायान्न]-meaning applies specifically to @deva[कुल्माष]. This is an @deva[अपवाद] to the general @deva[कन्] of @ref[5.2.82]. The @deva[वृद्धि] yields @deva[कौल्माष], then feminine @deva[ई] for agreement with @deva[पौर्णमासी].
"""

id = "5.2.116"
numericId = "52116"

[en]
simple = """
The affixes @deva[इनि] and @deva[ठन्] come after @deva[व्रीहि]-class words with @deva[मतुप्]-sense; @deva[मतुप्] is also optional. @deva[व्रीही], @deva[व्रीहिकः], @deva[व्रीहिमान्] 'having rice'.
"""

standard = """
After @deva[व्रीहि] and similar words (@deva[व्रीह्यादि]), the affixes @deva[इनि] and @deva[ठन्] come with @deva[मतुप्]-sense, along with @deva[मतुप्] as alternative. Examples: @deva[व्रीहिन्] (nom. @deva[व्रीही]), @deva[व्रीहिकः], @deva[व्रीहिमान्] 'having rice'; @deva[मायी], @deva[मायिकः], @deva[मायावान्] 'having illusion/magic'. However, not all @deva[व्रीह्यादि] words take both affixes. Per @[patañjali]: @deva[इनि] after @deva[शिखादि] subdivision; @deva[ठन्] (@deva[इकन्]) after @deva[यवखदादि] subdivision.
"""

advanced = """
The @deva[व्रीह्यादि] @deva[गण] subdivides for @deva[इनि]//@deva[ठन्] distribution: @deva[शिखादि] takes @deva[इनि]; @deva[यवखदादि] takes @deva[ठन्] (= @deva[इकन्]). @[patañjali]'s analysis refines the @[sūtra]'s apparent generality. The @deva[मतुप्]-@deva[विकल्प] remains universal for the @deva[गण].
"""

id = "5.2.107"
numericId = "52107"

[en]
simple = """
The affix @deva[र] comes after @deva[ऊष] 'salt', @deva[सुषि] 'hole', @deva[मुष्क] 'testicle', and @deva[मधु] 'sweet' with @deva[मतुप्]-sense. @deva[ऊषरम्] 'saline'; @deva[सुषिरम्] 'perforated'; @deva[मुष्करः] 'having testicles'; @deva[मधुरः] 'sweet'.
"""

standard = """
After @deva[ऊष], @deva[सुषि], @deva[मुष्क], and @deva[मधु], the affix @deva[र] comes with @deva[मतुप्]-sense. Examples: @deva[ऊषरं क्षेत्रम्] 'barren/saline field (containing @deva[ऊष]/salt)'; @deva[सुषिरं काष्ठम्] 'perforated wood (having @deva[सुषि]/holes)'; @deva[मुष्करः पशुः] 'a beast having testicles'; @deva[मधुरो गुडः] 'sweet sugar'. The @deva[इति] indicates these @deva[र]-formed words are names for specific things.
"""

advanced = """
The @deva[र]-affix with @deva[मतुप्]-meaning applies to a closed four-item set: @deva[ऊष] (alkaline salt), @deva[सुषि] (cavity), @deva[मुष्क] (scrotum/testicle), @deva[मधु] (honey/sweetness). The @deva[इति] suggests @deva[संज्ञा]-status (technical names): @deva[ऊषर] for saline soil, @deva[सुषिर] for hollow objects, @deva[मुष्कर] for male animals, @deva[मधुर] for sweet substances.
"""

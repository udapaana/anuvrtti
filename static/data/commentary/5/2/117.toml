id = "5.2.117"
numericId = "52117"

[en]
simple = """
The affix @deva[इलच्] also comes after @deva[तुन्द]-class words with @deva[मतुप्]-sense. Four forms: @deva[तुन्दिलः], @deva[तुन्दी], @deva[तुन्दिकः], @deva[तुन्दवान्] 'pot-bellied'.
"""

standard = """
After @deva[तुन्द] and similar words (@deva[तुन्दादि]), the affix @deva[इलच्] (= @deva[इल]) also comes with @deva[मतुप्]-sense. The @deva[च्] indicates that @deva[इनि], @deva[ठन्], and @deva[मतुप्] also apply. Examples: @deva[तुन्दिलः], @deva[तुन्दी], @deva[तुन्दिकः], @deva[तुन्दवान्] 'pot-bellied'; similarly @deva[उदरिलः], @deva[उदरी], @deva[उदरिकः], @deva[उदरवान्] 'big-bellied'. The @deva[तुन्दादि] includes: @deva[तुन्द], @deva[उदर], @deva[पिचण्ड], @deva[घट], @deva[यव], @deva[व्रीहि], @deva[स्वाङ्ग]...
"""

advanced = """
The @deva[इलच्]-addition for @deva[तुन्दादि] creates quadruple options: @deva[इलच्], @deva[इनि], @deva[ठन्], @deva[मतुप्]. The @deva[च्]-@deva[अनुकर्षण] draws in the prior affixes. The @deva[तुन्दादि] @deva[गण] includes body-part and grain terms: @deva[तुन्द] (belly), @deva[उदर] (stomach), @deva[पिचण्ड] (belly), @deva[घट] (pot/belly), @deva[यव] (barley), @deva[व्रीहि] (rice), @deva[स्वाङ्ग] (own limb).
"""

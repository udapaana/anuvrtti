id = "5.2.99"
numericId = "52099"

[en]
simple = """
The affixes @deva[इलच्] and @deva[लच्] come after @deva[फेन] 'foam' with @deva[मतुप्]-sense; @deva[मतुप्] is also optional. @deva[फेनिलः], @deva[फेनलः], or @deva[फेनवान्] 'foamy'.
"""

standard = """
After @deva[फेन] 'foam/froth', both affixes @deva[इलच्] (= @deva[इल]) and @deva[लच्] (= @deva[ल]) come with @deva[मतुप्]-sense. The @deva[च्] draws in @deva[लच्], and @deva[अन्यतरस्याम्] understood adds @deva[मतुप्] as alternative. Examples: @deva[फेनिलः] (by @deva[इलच्]), @deva[फेनलः] (by @deva[लच्]), @deva[फेनवान्] (by @deva[मतुप्]) — all meaning 'foamy, frothy'.
"""

advanced = """
The triple-option (@deva[इलच्], @deva[लच्], @deva[मतुप्]) for @deva[फेन] creates synonymous @deva[मत्वर्थीय] derivatives: @deva[फेनिल], @deva[फेनल], @deva[फेनवत्]. The @deva[च्]-@deva[अनुकर्षण] includes @deva[लच्]; the understood @deva[अन्यतरस्याम्] provides @deva[मतुप्]-alternative. All three mean 'having foam, foamy'.
"""

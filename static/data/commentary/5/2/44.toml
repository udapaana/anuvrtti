id = "5.2.44"
numericId = "52044"

[en]
simple = """
After @deva[उभ] 'both', @deva[अयच्] always replaces @deva[तयप्], with @deva[उदात्त] accent on the first syllable. @deva[उभ] → @deva[उभयम्] 'both kinds'.
"""

standard = """
After @deva[उभ] 'both', the affix @deva[अयच्] invariably (not optionally) substitutes for @deva[तयप्], with the @deva[उदात्त] (acute) accent on its first syllable (@deva[अ]). By @ref[6.1.163], @deva[अयच्] (with indicatory @deva[च्]) would normally have accent on the final syllable (@deva[य]); the special mention of @deva[उदात्त] shifts it to the first syllable. Result: @deva[उभयम्] 'both (kinds)'.
"""

advanced = """
The @deva[नित्य]-substitution of @deva[अयच्] for @deva[तयप्] after @deva[उभ] (unlike the @deva[विकल्प] of @ref[5.2.43]) is accompanied by irregular @deva[आद्युदात्त] accentuation. The @deva[चकार] of @deva[अयच्] normally triggers @ref[6.1.163] (@deva[अन्तोदात्त]), but the @[sūtra]'s explicit @deva[उदात्त]-specification overrides this, placing accent on @deva[अ]: @deva[उ॑भयम्].
"""

id = "5.2.25"
numericId = "52025"

[en]
simple = """
The affix @deva[ति] comes after @deva[पक्ष] 'wing' (genitive) to mean 'the root of it'. @deva[पक्षस्य मूलम्] → @deva[पक्षतिः] 'the wing-joint/root'.
"""

standard = """
After @deva[पक्ष] 'wing' in the genitive, the affix @deva[ति] denotes @deva[मूल] 'root'. Only @deva[मूल] from the previous @[sūtra] continues here, not @deva[पाक]. Example: @deva[पक्षस्य मूलम्] → @deva[पक्षतिः] 'the root/base of the wing'. This illustrates the principle @deva[क्वचित् एकदेशोऽपि अनुवर्तते] 'sometimes only a part of a rule continues' — an exceptional case of @deva[अनुवृत्ति].
"""

advanced = """
The @deva[ति]-affix applies to @deva[षष्ठ्यन्त] @deva[पक्ष] with @deva[मूल]-meaning only (@deva[पाक] does not carry over). This partial @deva[अनुवृत्ति] exemplifies the maxim @deva[क्वचित् एकदेशोऽप्यनुवर्तते]: in exceptional cases, only a portion of interconnected terms from a prior rule continues. The derived @deva[पक्षति] denotes the anatomical wing-joint or wing-root in avian contexts.
"""

id = "5.2.35"
numericId = "52035"

[en]
simple = """
The affix @deva[अठच्] comes after @deva[कर्मन्] 'work' (locative) to mean 'one who zealously engages in it'. @deva[कर्मणि घटते] → @deva[कर्मठः] 'a diligent/proficient person'.
"""

standard = """
After @deva[कर्मन्] 'work/action' in the locative, the affix @deva[अठच्] (= @deva[अठ]) denotes @deva[घट] 'zealous engagement'. The word @deva[घटः] means 'zealous/strenuous work'. Example: @deva[कर्मणि घटते] (one who strives in work) → @deva[कर्मठः पुरुषः] 'a clever, proficient, industrious person'.
"""

advanced = """
The @deva[अठच्]-affix applies to @deva[सप्तम्यन्त] @deva[कर्मन्] with @deva[घट]-meaning (zealous exertion). The derived @deva[कर्मठ] denotes @deva[कर्मनिष्ठ]//@deva[उद्योगशील] (industrious/diligent). The locative relation (@deva[कर्मणि]) specifies the domain of zealous application.
"""

id = "5.2.36"
numericId = "52036"

[en]
simple = """
The affix @deva[इतच्] comes after @deva[तारका]-class words (nominative) to mean 'that in which this is observed'. @deva[तारकाः संजाताः अस्य] → @deva[तारकितं नभः] 'a starry sky'.
"""

standard = """
After @deva[तारका] and similar words (@deva[तारकादि] class) in the nominative, the affix @deva[इतच्] (= @deva[इत]) denotes 'that in which this is observed/has appeared'. Examples: @deva[तारकाः संजाता अस्य नभसः] → @deva[तारकितं नभः] 'a starry sky' (a night with visible stars); @deva[पुष्पाणि संजातानि अस्य] → @deva[पुष्पितो वृक्षः] 'a flowering tree'. The @deva[तारकादि] class is an @deva[आकृतिगण] (open class).
"""

advanced = """
The @deva[इतच्]-affix applies to @deva[प्रथमान्त] @deva[तारकादि] bases with @deva[संजात/उत्पन्न]-meaning (that in which X has appeared). The @deva[तारकादि] @deva[गण] is @deva[आकृतिगण] (pattern-based, open class), including: @deva[तारका], @deva[पुष्प], @deva[कर्णक], @deva[मञ्जरी], @deva[ऋजीष], etc. The derived forms function as @deva[विशेषण] (adjectives) describing presence of the base-entity.
"""

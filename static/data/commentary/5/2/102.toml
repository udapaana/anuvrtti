id = "5.2.102"
numericId = "52102"

[en]
simple = """
The affixes @deva[विनि] and @deva[इनि] come after @deva[तपस्] 'austerity' and @deva[सहस्र] 'thousand' respectively with @deva[मतुप्]-sense. @deva[तपस्विन्] 'ascetic'; @deva[सहस्रिन्] 'possessing a thousand'.
"""

standard = """
After @deva[तपस्] and @deva[सहस्र], the affixes @deva[विनि] (= @deva[विन्]) and @deva[इनि] (= @deva[इन्]) come respectively with @deva[मतुप्]-sense. @deva[तपस्] (ending in @deva[अस्]) would take @deva[विनि] by @ref[5.2.121]; @deva[सहस्र] (ending in @deva[अ]) would take @deva[इनि] by @ref[5.2.115]. Why this @[sūtra]? Because the next @[sūtra] also prescribes @deva[अण्] for these words, and without this rule, they might take only @deva[अण्]. Examples: @deva[तपस्विन्] 'ascetic'; @deva[सहस्रिन्] 'having a thousand'.
"""

advanced = """
The @deva[विनि]//@deva[इनि] prescription for @deva[तपस्]//@deva[सहस्र] is @deva[पर्युदास]-preventive: though these words would take these affixes by general rules (@ref[5.2.121], @ref[5.2.115]), stating them explicitly here preserves these options when @deva[अण्] is also introduced in @ref[5.2.103]. This creates genuine @deva[विकल्प] rather than @deva[अण्]-exclusivity.
"""

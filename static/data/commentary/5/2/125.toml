id = "5.2.125"
numericId = "52125"

[en]
simple = """
The affixes @deva[आलच्] and @deva[आटच्] come after @deva[वाच्] 'speech' to mean 'talkative', blocking @deva[ग्मिन्]. @deva[वाचालः] 'garrulous'; @deva[वाचाटः] 'chatterbox'.
"""

standard = """
After @deva[वाच्] 'speech', the affixes @deva[आलच्] (= @deva[आल]) and @deva[आटच्] (= @deva[आट]) come when denoting 'talkative' (@deva[बहुवादिन्]). This blocks @deva[ग्मिन्] from @ref[5.2.124]. Result: @deva[वाचालः] 'garrulous', @deva[वाचाटः] 'chatterbox'. @deva[वार्त्तिक]: These affixes express @deva[निन्दा] 'contempt'. An orator (@deva[वाग्मी]) also speaks much but purposefully; he is not called @deva[वाचाल] or @deva[वाचाट].
"""

advanced = """
The @deva[आलच्]//@deva[आटच्] affixes with @deva[बहुवादिन्]-meaning function as @deva[अपवाद] to @deva[ग्मिनि]. The @deva[वार्त्तिक] specifies @deva[निन्दार्थ] (pejorative): @deva[वाचाल]//@deva[वाचाट] = excessive/purposeless talker (negative), vs. @deva[वाग्मिन्] = eloquent speaker (positive). The semantic distinction is pragmatic, not grammatical.
"""

id = "5.2.139"
numericId = "52139"

[en]
simple = """
The affix @deva[भ] comes after @deva[तुन्दि] 'belly', @deva[वलि] 'wrinkle', and @deva[वटि] with @deva[मतुप्]-sense. @deva[तुन्दिभः] 'pot-bellied'; @deva[वलिभः] 'wrinkled'.
"""

standard = """
After @deva[तुन्दि] 'protuberant belly', @deva[वलि] 'wrinkle/fold', and @deva[वटि], the affix @deva[भ] comes with @deva[मतुप्]-sense. Examples: @deva[तुन्दिभः] 'having a protuberant belly'; @deva[वलिभः] 'having wrinkles'; @deva[वटिभः]. Another form @deva[बलिभः] exists because @deva[बलि] is in the @deva[पामादि] class (@ref[5.2.100]). Forms like @deva[तुन्दिलः] are valid by @ref[5.2.117].
"""

advanced = """
The @deva[भ]-affix for @deva[तुन्दि]//@deva[वलि]//@deva[वटि] creates @deva[तुन्दिभ], @deva[वलिभ], @deva[वटिभ]. @deva[बलि] (variant reading or separate item) belongs to @deva[पामादि], hence takes @deva[न] as well. Cross-reference to @ref[5.2.117] (@deva[इलच्]) permits @deva[तुन्दिल] alongside @deva[तुन्दिभ].
"""

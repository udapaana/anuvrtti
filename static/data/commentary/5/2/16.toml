id = "5.2.16"
numericId = "52016"

[en]
simple = """
The affixes @deva[यत्] and @deva[ख] come after @deva[अध्वन्] 'road/journey' to mean 'one fit to travel'. @deva[अध्वानम् अलं गामी] → @deva[अध्वन्यः] or @deva[अध्वनीनः] 'able to undertake a journey'.
"""

standard = """
After @deva[अध्वन्] 'road/journey', both @deva[यत्] and @deva[ख] denote 'one who is fit or able to follow/travel'. Examples: @deva[अध्वानम् अलं गामी] → @deva[अध्वन्यः] (by @deva[यत्]) or @deva[अध्वनीनः] (by @deva[ख]). By @ref[6.4.168-169], the word @deva[अध्वन्] retains its full form before @deva[य] and @deva[ख], not losing final @deva[अन्] as it would before other affixes (per @ref[6.4.144]).
"""

advanced = """
The @deva[यत्]//@deva[ख] affixes apply to @deva[अध्वन्] with @deva[गमनयोग्यता]-meaning. The @deva[अनकारस्थिति] (retention of @deva[अन्]) is governed by @ref[6.4.168-169], creating an exception to the general @deva[अनुदात्तोपदेशवनतितनोत्यादीनाम्] @deva[अनलोप] of @ref[6.4.144]. This yields @deva[अध्वन्य] and @deva[अध्वनीन] rather than *@deva[अध्व्य], *@deva[अध्वीन].
"""

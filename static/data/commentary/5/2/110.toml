id = "5.2.110"
numericId = "52110"

[en]
simple = """
The affix @deva[व] comes after @deva[गाण्डी] and @deva[अजग] with @deva[मतुप्]-sense when forming a name. @deva[गाण्डीवम्] 'Arjuna's bow @[gāṇḍīva]'; @deva[अजगवम्] '@[śiva]'s bow Ajagava'.
"""

standard = """
After @deva[गाण्डी] and @deva[अजग], the affix @deva[व] comes with @deva[मतुप्]-sense when forming a proper name (@deva[संज्ञायाम्]). Examples: @deva[गाण्डीवम्] 'the bow @[gāṇḍīva] of Arjuna'; @deva[अजगवम्] 'the bow Ajagava of @[śiva]'. Shortening also occurs: @deva[गाण्डिवम्]. The @[sūtra] is framed to include both @deva[गाण्डी] and @deva[गाण्डि] as bases.
"""

advanced = """
The @deva[व]-affix in @deva[संज्ञा] (naming) context applies to @deva[गाण्डी]//@deva[गाण्डि] and @deva[अजग], creating famous bow-names: @deva[गाण्डीव] (Arjuna's), @deva[अजगव] (@[śiva]'s). The @deva[ह्रस्व]-@deva[विकल्प] (@deva[गाण्डिव]) shows the @[sūtra] encompasses both @deva[दीर्घ] and @deva[ह्रस्व] base-variants.
"""

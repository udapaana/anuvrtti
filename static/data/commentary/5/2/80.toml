id = "5.2.80"
numericId = "52080"

[en]
simple = """
The word @deva[उत्क] is irregularly formed, meaning 'longing/yearning'. @deva[उद्] + @deva[कन्] → @deva[उत्कः] = @deva[उत्सुकः] 'eager, anxious'.
"""

standard = """
The word @deva[उत्क] is an irregular formation (@deva[निपातन]) meaning @deva[उन्मनस्] 'one whose mind anxiously desires/yearns'. It is formed by adding @deva[कन्] to the prefix @deva[उद्] 'up/out'. Examples: @deva[उत्को देवदत्तः] 'Devadatta is yearning'; @deva[उत्कः प्रवासी] 'a traveler longing (for home)' = @deva[उत्सुकः], @deva[उत्कण्ठितः] 'eager, anxious'.
"""

advanced = """
The @deva[निपातन] @deva[उत्क] derives from @deva[उद्] + @deva[कन्] with irregular semantics: @deva[उद्] (upward/outward motion) + affective @deva[क] → 'mind directed outward' = yearning. Synonyms: @deva[उत्सुक], @deva[उत्कण्ठित], @deva[उन्मनस्]. The formation is lexicalized rather than productively derived.
"""

id = "5.2.122"
numericId = "52122"

[en]
simple = """
In the Vedas, the affix @deva[विनि] is added diversely with @deva[मतुप्]-sense. @deva[अग्ने तेजस्विन्] (with @deva[विनि]); @deva[सूर्यो वर्चस्वान्] (with @deva[मतुप्], not @deva[विनि]).
"""

standard = """
In Vedic (@deva[छन्दस्]), the affix @deva[विनि] is added variably (@deva[बहुलम्]) with @deva[मतुप्]-sense. Examples: @deva[अग्ने तेजस्विन्] (with @deva[विनि]); sometimes not added: @deva[सूर्यो वर्चस्वान्] (with @deva[मतुप्]). @deva[वार्त्तिक]: In Vedic, the final @deva[अ] of @deva[इय], @deva[उभय], and @deva[हृदय] is optionally lengthened before @deva[विनि]; and @deva[विनि] comes after @deva[अष्ट्रा], @deva[मेखला], @deva[रुजा]: @deva[अष्ट्रावी], @deva[मेखलावी], @deva[इयावी], @deva[उभयावी], @deva[रुजावी], @deva[हृदयावी].
"""

advanced = """
The @deva[छान्दस] @deva[बहुल]-provision for @deva[विनि] creates Vedic variation: @deva[विनि] applies irregularly (sometimes yes, sometimes @deva[मतुप्] instead). The @deva[वार्त्तिक] specifies @deva[दीर्घ]-@deva[विकल्प] for @deva[इय]//@deva[उभय]//@deva[हृदय] and extends @deva[विनि] to @deva[अष्ट्रा]//@deva[मेखला]//@deva[रुजा].
"""

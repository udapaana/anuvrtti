id = "5.2.59"
numericId = "52059"

[en]
simple = """
When expressing @deva[सूक्त] (Vedic hymn) or @deva[साम] (@[sāmaveda] chant), the affix @deva[छ] (@deva[ईय]) comes after a nominal stem with @deva[मतुप्]-sense ('having this'). @deva[अच्छावाकीयं सूक्तम्] 'hymn having @deva[अच्छावाक्]'.
"""

standard = """
When denoting a @deva[सूक्त] (Vedic hymn-collection) or @deva[साम] (@[sāman] chant), the affix @deva[छ] (= @deva[ईय]) comes after a nominal stem with the sense of @deva[मतुप्] — 'that which has this' or 'that in which this is found' (per @ref[5.2.94]: @deva[तदस्यास्त्यस्मिन्निति मतुप्]). Examples: @deva[अच्छावाक् शब्दः अस्मिन्] → @deva[अच्छावाकीयं सूक्तम्] 'hymn containing @deva[अच्छावाक्] word'; @deva[मित्रावरुणीयम्]; @deva[यज्ञायज्ञीयं साम].
"""

advanced = """
The @deva[छ]-affix with @deva[मतुप्]-@deva[अर्थ] (@deva[तदस्यास्ति]//@deva[तदस्मिन्नस्ति]) applies in @deva[सूक्त]//@deva[साम] designation contexts. This creates technical names for Vedic textual units based on their characteristic content: @deva[अच्छावाकीय] names a @deva[सूक्त] containing the word @deva[अच्छावाक्]. The @deva[मतुप्]-sense distinguishes this from other @deva[छ] applications.
"""

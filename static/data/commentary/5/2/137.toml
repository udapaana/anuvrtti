id = "5.2.137"
numericId = "52137"

[en]
simple = """
The affix @deva[इनि] comes after stems ending in @deva[मन्] or @deva[म] when forming a name with @deva[मतुप्]-sense. @deva[प्रथिमिनी] (a name); @deva[होमिनी], @deva[सोमिनी].
"""

standard = """
After stems ending in @deva[मन्] or @deva[म], the affix @deva[इनि] (= @deva[इन्]) comes with @deva[मतुप्]-sense when forming a proper name (@deva[संज्ञायाम्]). Derivation: @deva[प्रथिमन्] + @deva[इनि] → @deva[प्रथिम्] + @deva[इन्] (by @ref[6.4.144]) → @deva[प्रथिमिन्], fem. @deva[प्रथिमिनी]. Similarly: @deva[दामिनी] (fem. name); @deva[होमिनी], @deva[सोमिनी] (from @deva[होम], @deva[सोम]). Why @deva[संज्ञा]-meaning? @deva[सोमवान्], @deva[होमवान्] — general possession, not names.
"""

advanced = """
The @deva[इनि]-affix for @deva[मनन्त]//@deva[मकारान्त] stems in @deva[संज्ञा]-context creates proper names. @deva[मनन्त] stems show @deva[अनलोप] by @ref[6.4.144] before @deva[इनि]. The @deva[संज्ञा]-restriction limits productive derivation; non-name uses take @deva[मतुप्] (@deva[सोमवत्], @deva[होमवत्]).
"""

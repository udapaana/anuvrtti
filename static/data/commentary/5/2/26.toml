id = "5.2.26"
numericId = "52026"

[en]
simple = """
The affixes @deva[चुञ्चुप्] and @deva[चणप्] come after words in the instrumental to mean 'celebrated/known through this'. @deva[विद्यया वित्तः] → @deva[विद्याचुञ्चुः] or @deva[विद्याचणः] 'famous for learning'.
"""

standard = """
After a word in the instrumental, the affixes @deva[चुञ्चुप्] (= @deva[चुञ्चु]) and @deva[चणप्] (= @deva[चण]) denote @deva[वित्त] 'celebrated/known/illustrious'. Examples: @deva[विद्यया वित्तः] → @deva[विद्याचुञ्चुः] or @deva[विद्याचणः] 'celebrated for learning'; @deva[केशैः वित्तः] → @deva[केशचणः] 'known for (beautiful) hair'. The initial @deva[च्] in these affixes is not @deva[इत्] (per @ref[1.3.7]).
"""

advanced = """
The @deva[चुञ्चुप्]//@deva[चणप्] affixes apply to @deva[तृतीयान्त] bases with @deva[वित्त/प्रसिद्ध] meaning (fame/renown through X). The @deva[चकार] is @deva[अनित्] (not @deva[इत्]) per @ref[1.3.7], hence retained. These rare affixes create distinctive epithets: @deva[विद्याचुञ्चु]//@deva[विद्याचण] 'famed for knowledge', @deva[केशचण] 'renowned for hair'.
"""

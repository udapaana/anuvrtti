id = "5.2.58"
numericId = "52058"

[en]
simple = """
After @deva[षष्टि] 'sixty' and similar words (when not preceded by another numeral), @deva[तमट्] is always added to @deva[डट्]. @deva[षष्टेः पूरणः] → @deva[षष्टितमः] 'sixtieth'.
"""

standard = """
After @deva[षष्टि] and similar (@deva[षष्ट्यादि]) when not preceded by another numeral, the augment @deva[तमट्] is obligatory (not optional as in @ref[5.2.56]). Examples: @deva[षष्टितमः] 'sixtieth'; @deva[सप्ततितमः] 'seventieth'. Why 'not preceded by numeral'? @deva[एकषष्टः] or @deva[एकषष्टितमः] '61st' — here @ref[5.2.56] applies (optional), since @deva[एक] precedes.
"""

advanced = """
The @deva[नित्य]-@deva[तमट्] for @deva[षष्ट्यादि] (@deva[षष्टि], @deva[सप्तति], @deva[अशीति], @deva[नवति]) overrides the @deva[विकल्प] of @ref[5.2.56] when @deva[असंख्यापूर्वक]. With preceding numeral (@deva[एकषष्टि], etc.), @ref[5.2.56]'s optional @deva[तमट्] applies: @deva[एकषष्ट]//@deva[एकषष्टितम].
"""

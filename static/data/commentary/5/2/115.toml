id = "5.2.115"
numericId = "52115"

[en]
simple = """
The affixes @deva[इनि] and @deva[ठन्] come after stems ending in short @deva[अ] with @deva[मतुप्]-sense; @deva[मतुप्] is also optional. @deva[दण्डिन्], @deva[दण्डिकः], @deva[दण्डवान्] 'having a staff'.
"""

standard = """
After stems ending in short @deva[अ], the affixes @deva[इनि] (= @deva[इन्]) and @deva[ठन्] (= @deva[इक]) come with @deva[मतुप्]-sense; @deva[मतुप्] is also available by @deva[अन्यतरस्याम्] understood from @ref[5.2.96]. Examples: @deva[दण्डिन्] (nom. @deva[दण्डी]), @deva[दण्डिकः], @deva[दण्डवान्] 'having a staff'; @deva[छत्रिन्] (nom. @deva[छत्री]), @deva[छत्रिकः], @deva[छत्रवान्] 'having an umbrella'. Why 'short @deva[अ]'? @deva[खट्वावान्] — no @deva[इनि] or @deva[ठन्] after long @deva[आ]-ending stems.
"""

advanced = """
The @deva[इनि]//@deva[ठन्]//@deva[मतुप्] triple-option applies to @deva[अकारान्त] (short @deva[अ]-final) stems. The @deva[अन्यतरस्याम्]-@deva[अनुवृत्ति] from @ref[5.2.96] provides the @deva[मतुप्]-@deva[विकल्प]. Long @deva[आ]-ending stems (@deva[खट्वा]) take only @deva[मतुप्], not @deva[इनि]//@deva[ठन्]. This is the general @deva[मतुप्]-domain rule for @deva[अकारान्त] bases.
"""

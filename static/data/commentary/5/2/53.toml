id = "5.2.53"
numericId = "52053"

[en]
simple = """
The augment @deva[तिथुक्] comes before @deva[डट्] after stems ending in @deva[वतु]. @deva[यावतां पूरणः] → @deva[यावतिथः] 'the as-manieth'.
"""

standard = """
Before @deva[डट्], the augment @deva[तिथुक्] (= @deva[तिथ्]) is added after stems ending in @deva[वतु] (from @deva[वतुप्] affix). Words ending in @deva[वतु] are numerals per @ref[1.1.23] and take @deva[डट्] by @ref[5.2.48]; this @[sūtra] specifies the augment. @deva[डटि] is understood. Examples: @deva[यावतां पूरणः] → @deva[यावतिथः] 'the as-manieth'; @deva[तावतिथः] 'the so-manieth'; @deva[एतावतिथः] 'the this-manieth'.
"""

advanced = """
The @deva[तिथुक्]-@deva[आगम] for @deva[वत्वन्त] stems applies to @deva[यावत्], @deva[तावत्], @deva[एतावत्], @deva[कियत्], @deva[इयत्] (all @deva[वतुप्]-derivatives per @ref[5.2.39-40]). These are @deva[संख्या] by @ref[1.1.23], hence @deva[डट्]-eligible. The resulting @deva[°वतिथ] forms are ordinals of indefinite/correlative quantifiers.
"""

id = "5.2.12"
numericId = "52012"

[en]
simple = """
The affix @deva[ख] comes after @deva[समांसमाम्] to mean 'one who bears in the womb (year after year)'. @deva[समांसमां विजायते] → @deva[समांसमीना गौः] 'a cow that calves every year'.
"""

standard = """
After @deva[समांसमाम्] 'year after year', the affix @deva[ख] denotes 'one who bears in the womb' (@deva[विजायते] = @deva[गर्भे धारयति]). The verb @deva[विजायते] governs the accusative of time @deva[समांसमाम्] by @ref[2.1.29]. Example: @deva[समांसमां विजायते] → @deva[समांसमीना गौः] 'a cow that gives birth year after year'; @deva[समांसमीना वडवा] 'a mare that foals annually'. A @deva[वार्त्तिक] alternatively interprets @deva[विजायते] as 'to give birth/get young'.
"""

advanced = """
The @deva[ख]-affix applies to the @deva[अव्यय] @deva[समांसमाम्] (year-after-year, an iterative temporal expression) with @deva[विजायते]-meaning (bearing offspring). The @deva[कालाधिकरण] accusative follows @ref[2.1.29]. The derived @deva[समांसमीन] describes regular annual breeding/calving, applicable to @deva[गो] (cow) or @deva[वडवा] (mare). The @deva[वार्त्तिक] offers semantic expansion beyond gestation to include parturition.
"""

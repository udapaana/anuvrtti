id = "5.2.100"
numericId = "52100"

[en]
simple = """
The affixes @deva[श], @deva[न], and @deva[इलच्] come after @deva[लोमादि], @deva[पामादि], and @deva[पिच्छादि] classes respectively with @deva[मतुप्]-sense; @deva[मतुप्] is also optional. @deva[लोमशः] 'hairy'; @deva[पामनः] 'scabby'; @deva[पिच्छिलः] 'slimy'.
"""

standard = """
Three affixes with @deva[मतुप्]-sense apply to three word-classes respectively, with @deva[मतुप्] as alternative: (1) @deva[श] after @deva[लोमादि] → @deva[लोमशः] or @deva[लोमवान्] 'hairy'; (2) @deva[न] after @deva[पामादि] → @deva[पामनः] or @deva[पामवान्] 'scabby'; (3) @deva[इलच्] (= @deva[इल]) after @deva[पिच्छादि] → @deva[पिच्छिलः] or @deva[पिच्छवान्] 'slimy/feathery'.
"""

advanced = """
The @deva[यथासंख्य] (sequential correspondence) principle applies: @deva[श] ↔ @deva[लोमादि], @deva[न] ↔ @deva[पामादि], @deva[इलच्] ↔ @deva[पिच्छादि]. Each @deva[गण] also permits @deva[मतुप्]-alternative. @deva[लोमादि] includes hair/fur terms; @deva[पामादि] includes skin-disease terms; @deva[पिच्छादि] includes texture/secretion terms.
"""

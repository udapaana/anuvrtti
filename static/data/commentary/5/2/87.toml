id = "5.2.87"
numericId = "52087"

[en]
simple = """
The affix @deva[इनि] comes after @deva[पूर्व] also when another word precedes it. @deva[कृतपूर्वी कटम्] = @deva[पूर्वं कृतम् अनेन] 'who formerly made (a mat)'.
"""

standard = """
After @deva[पूर्व] 'formerly', the affix @deva[इनि] applies also when another word precedes (@deva[समासे]). First @deva[कृत] and @deva[पूर्व] are compounded by @ref[2.1.4], then @deva[इनि] is added. Examples: @deva[कृतपूर्वी कटम्] = @deva[पूर्वं कृतम् अनेन] 'who formerly made (a mat)'; @deva[भुक्तपूर्वी ओदनम्] 'who formerly ate rice'. These two @[sūtra]s (@ref[5.2.86-87]) give rise to the maxim @deva[ग्रहणवता प्रातिपदिकेन...].
"""

advanced = """
The @deva[इनि]-affix for @deva[पूर्व] extends to @deva[समस्तपद] (compound) contexts: @deva[कृतपूर्व], @deva[भुक्तपूर्व], etc. The compounding precedes affixation per @ref[2.1.4]. The resulting @deva[कृतपूर्विन्], @deva[भुक्तपूर्विन्] govern accusative for the object of the prior action. The @deva[परिभाषा] @deva[ग्रहणवता प्रातिपदिकेन] derives from these @[sūtra]s.
"""

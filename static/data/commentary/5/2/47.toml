id = "5.2.47"
numericId = "52047"

[en]
simple = """
The affix @deva[मयट्] (feminine @deva[ङीप्]) comes after numerals to mean 'containing so many times more' (in exchange). @deva[पञ्च गुणः अस्य विनिमयः] → @deva[पञ्चमयः] 'fivefold (in value)'.
"""

standard = """
After a numeral in the nominative with genitive sense (@deva[तदस्य]), the affix @deva[मयट्] (= @deva[मय], feminine by @deva[ङीप्]) denotes @deva[विनिमय] 'exchange ratio' — 'containing so many times more' or 'the price-portion ratio'. The meaning is: 'a portion of this equals so many equal portions of that'. The @deva[तदस्य] from @ref[5.2.36] is understood.
"""

advanced = """
The @deva[मयट्]-affix with @deva[विनिमयार्थ] (exchange-meaning) applies to @deva[संख्यावाचक] in @deva[प्रथमा] with implicit @deva[षष्ठी] relation. The semantic frame involves trade ratios: @deva[X-मय] means 'X times the value/portion'. The feminine @deva[ङीप्] applies per standard @deva[तद्धित] rules. This creates commercial/exchange-rate terminology.
"""

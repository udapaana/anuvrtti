id = "5.2.29"
numericId = "52029"

[en]
simple = """
The affix @deva[कटच्] comes after @deva[सम्], @deva[प्रत्], @deva[उद्], and @deva[वि]. @deva[सम्] → @deva[संकटम्] 'narrow/difficult'; @deva[उद्] → @deva[उत्कटम्] 'excessive'; @deva[वि] → @deva[विकटम्] 'dreadful'.
"""

standard = """
The affix @deva[कटच्] (= @deva[कट]) comes after @deva[सम्], @deva[प्रत्], @deva[उद्], and @deva[वि] (the @deva[च] draws in @deva[वि]). Examples: @deva[संकटम्] 'narrow passage/difficulty', @deva[प्रकटम्] 'manifest', @deva[उत्कटम्] 'excessive/intense', @deva[विकटम्] 'dreadful/hideous'. A @deva[वार्त्तिक] adds: @deva[कटच्] comes after @deva[अलाबु], @deva[तिल], @deva[उमा], @deva[भङ्गा] meaning 'dust thereof' → @deva[अलाबूकटम्], @deva[तिलकटम्], @deva[उमाकटम्], @deva[भंगाकटम्].
"""

advanced = """
The @deva[कटच्]-affix applies to four @deva[उपसर्ग] bases: @deva[सम्], @deva[प्रत्], @deva[उद्], @deva[वि]. The @deva[च्]-particle enables @deva[अनुकर्षण] of @deva[वि] from @ref[5.2.28]. A @deva[वार्त्तिक] extends @deva[कटच्] to crop-terms (@deva[अलाबु] 'gourd', @deva[तिल] 'sesame', @deva[उमा] 'flax', @deva[भङ्गा] 'hemp') with @deva[रजस्]-meaning (dust/powder thereof).
"""

id = "5.2.103"
numericId = "52103"

[en]
simple = """
The affix @deva[अण्] also comes after @deva[तपस्] and @deva[सहस्र] with @deva[मतुप्]-sense. @deva[तापसः] 'ascetic'; @deva[साहस्रः] 'relating to a thousand'.
"""

standard = """
After @deva[तपस्] and @deva[सहस्र], the affix @deva[अण्] (with @deva[वृद्धि]) also comes with @deva[मतुप्]-sense. Examples: @deva[तापसः] 'ascetic' (alongside @deva[तपस्विन्]); @deva[साहस्रः] 'possessing a thousand' (alongside @deva[सहस्रिन्]). This @[sūtra] is separated from the previous for two reasons: (1) @deva[अण्] continues into subsequent @[sūtra]s; (2) @deva[यथासंख्य] (@ref[1.3.10]) would have incorrectly applied if @deva[अण्] were in the previous @[sūtra]. @deva[वार्त्तिक]: @deva[ज्योत्स्ना] etc. also take @deva[अण्].
"""

advanced = """
The separate statement of @deva[अण्] enables its @deva[अनुवृत्ति] into subsequent rules and avoids @deva[यथासंख्य]-misapplication (which would pair @deva[विनि] with @deva[तपस्] only, @deva[इनि] with @deva[सहस्र] only, @deva[अण्] with nothing). The @deva[वार्त्तिक] extends @deva[अण्] to @deva[ज्योत्स्नादि] words.
"""

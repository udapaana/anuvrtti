id = "5.2.34"
numericId = "52034"

[en]
simple = """
The affix @deva[त्यकन्] comes after @deva[उप] and @deva[अधि] to mean 'nearness' (when forming names). @deva[उप] → @deva[उपत्यका] 'lowland/foothill'; @deva[अधि] → @deva[अधित्यका] 'highland/tableland'.
"""

standard = """
After @deva[उप] 'near/below' and @deva[अधि] 'above/on', the affix @deva[त्यकन्] (= @deva[त्यका]) denotes @deva[आसन्न] 'nearness' when forming names. Examples: @deva[उपत्यका] = @deva[पर्वतस्य आसन्नम्] 'lowland, land at the foot of a mountain'; @deva[अधित्यका] = @deva[पर्वतस्य आरूढम्] 'highland, tableland'. Rule @ref[7.3.44] does not apply, so we don't get *@deva[उपत्यिका] or *@deva[अधित्यिका].
"""

advanced = """
The @deva[त्यकन्]-affix applies to @deva[उप] and @deva[अधि] with @deva[आसन्न/समीप]-meaning, creating geographical terms. @deva[उपत्यका] denotes @deva[पर्वतसमीपभूमि] (foothill/piedmont); @deva[अधित्यका] denotes @deva[पर्वतोपरिभूमि] (plateau/tableland). The non-application of @ref[7.3.44] (@deva[इयङ्]) preserves @deva[त्यका] without @deva[इकार]-insertion.
"""

id = "5.2.41"
numericId = "52041"

[en]
simple = """
The affixes @deva[डति] and @deva[वतुप्] come after @deva[किम्] (nominative) to mean 'numerical quantity'. @deva[का संख्या परिमाणम् एषाम्] → @deva[कति] 'how many' or @deva[कियान्] 'how much'.
"""

standard = """
After @deva[किम्] in the nominative, both @deva[डति] (realized as @deva[अति] with @deva[इम्]-elision from the base) and @deva[वतुप्] (→ @deva[घतुप्] = @deva[इयत्]) denote @deva[संख्यापरिमाण] 'numerical quantity' (@deva[संख्यायाः परिमाणम्] = @deva[संख्यापरिच्छेदः] 'estimate by counting'). Example: @deva[का संख्या परिमाणम् एषां ब्राह्मणानाम्] → @deva[कति ब्राह्मणाः] 'how many brahmins?'
"""

advanced = """
The @deva[डति]-affix (with @deva[इम्-लोप] of @deva[किम्]) yields @deva[कति] 'how many' (numerical interrogative), while @deva[वतुप्] → @deva[घतुप्] yields @deva[कियत्] 'how much' (quantitative interrogative). The @deva[संख्यापरिमाण] sense distinguishes discrete counting (@deva[कति]) from continuous measurement (@deva[कियत्]). The @deva[च्] includes @deva[वतुप्] via @deva[अनुकर्षण].
"""

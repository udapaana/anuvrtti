id = "5.2.17"
numericId = "52017"

[en]
simple = """
The affixes @deva[छ], @deva[यत्], and @deva[ख] come after @deva[अभ्यमित्र] to mean 'one able to advance against enemies'. @deva[अभ्यमित्रम् अलं गामी] → @deva[अभ्यमित्रीयः], @deva[अभ्यमित्र्यः], or @deva[अभ्यमित्रीणः] 'a valiant warrior'.
"""

standard = """
After @deva[अभ्यमित्र] 'towards the enemy' (= @deva[अमित्राभिमुखम्]), three affixes @deva[छ] (= @deva[ईय]), @deva[यत्] (= @deva[य]), and @deva[ख] (= @deva[ईन]) denote 'one able to go/advance'. The @deva[च्] in the @[sūtra] draws in @deva[यत्] and @deva[ख] from previous rules. Examples: @deva[अभ्यमित्रं सुष्ठु गच्छति अलं गामी] → @deva[अभ्यमित्रीयः], @deva[अभ्यमित्र्यः], @deva[अभ्यमित्रीणः] 'a warrior who valiantly encounters his enemy'.
"""

advanced = """
The triple-affix prescription (@deva[छ], @deva[यत्], @deva[ख]) for @deva[अभ्यमित्र] (@deva[अव्ययीभाव]: @deva[अभि] + @deva[अमित्र]) creates three synonymous derivatives denoting martial valor. The @deva[च्]-particle functions as @deva[अनुकर्षण] (drawing in) for the preceding affixes. The semantic frame @deva[अमित्राभिमुखं सुष्ठु गच्छति] highlights bold advance against enemies.
"""

id = "5.2.131"
numericId = "52131"

[en]
simple = """
The affix @deva[इनि] comes (exclusively) after @deva[सुख]-class words with @deva[मतुप्]-sense. @deva[सुखिन्] 'happy'; @deva[दुःखिन्] 'suffering'.
"""

standard = """
After @deva[सुख] and similar words (@deva[सुखादि]), the affix @deva[इनि] (= @deva[इन्]) comes (to the exclusion of others) with @deva[मतुप्]-sense. Examples: @deva[सुखिन्] (nom. @deva[सुखी]) 'happy'; @deva[दुःखिन्] 'suffering'. When @deva[निन्दा] (censure) is implied, @deva[इन्] comes after @deva[माला] (excluding @deva[मतुप्]): @deva[माली] 'garlanded (with negative connotation)'. The @deva[सुखादि] includes: @deva[सुख], @deva[दुःख], @deva[तृप्त], @deva[कृच्छ], @deva[आश्र], @deva[अस्र], @deva[अलीक], @deva[करुण], etc.
"""

advanced = """
The @deva[इनि]-@deva[नियम] for @deva[सुखादि] blocks other @deva[मतुप्]-sense affixes. The @deva[गण] includes emotional/state terms: @deva[सुख] (happiness), @deva[दुःख] (suffering), @deva[तृप्त] (satisfied), @deva[कृच्छ] (distress), etc. @deva[माला] takes @deva[इनि] specifically in @deva[निन्दा]-context.
"""

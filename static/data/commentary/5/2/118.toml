id = "5.2.118"
numericId = "52118"

[en]
simple = """
The affix @deva[ठञ्] always comes after @deva[अ]-ending stems preceded by @deva[एक] or @deva[गो] in compound with @deva[मतुप्]-sense. @deva[एकशतम् अस्य अस्ति] → @deva[ऐकशतिकः] 'having one hundred'.
"""

standard = """
After stems ending in @deva[अ] which are preceded in compound by @deva[एक] 'one' or @deva[गो] 'cow', the affix @deva[ठञ्] (= @deva[इक] with @deva[वृद्धि]) always comes with @deva[मतुप्]-sense. Examples: @deva[एकशतम् अस्य अस्ति] → @deva[ऐकशतिकः] 'possessing one hundred'; @deva[गौशतिकः] 'having a hundred cows'; @deva[गौसहस्रिकः] 'having a thousand cows'. The @deva[अतः] from @ref[5.2.115] is understood; non-@deva[अ]-ending stems are excluded: @deva[एकविंशतिः अस्य अस्ति] — no affix.
"""

advanced = """
The @deva[नित्य]-@deva[ठञ्] for @deva[एक]//@deva[गो]-preceded @deva[अकारान्त] compounds creates @deva[वृद्धि]-derivatives: @deva[ऐकशतिक], @deva[गौशतिक], @deva[गौसहस्रिक]. The @deva[अतः]-@deva[अनुवृत्ति] excludes @deva[एकविंशति] (non-@deva[अ] final). The form @deva[ऐकगविक] is explained as @deva[समासान्त]-based, not exceptional.
"""

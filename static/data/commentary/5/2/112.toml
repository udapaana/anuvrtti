id = "5.2.112"
numericId = "52112"

[en]
simple = """
The affix @deva[वलच्] comes after @deva[रजस्] 'menses', @deva[कृषि] 'farming', @deva[आसुति] 'distilling', and @deva[परिषद्] 'assembly' with @deva[मतुप्]-sense. @deva[रजस्वला] 'menstruating woman'; @deva[कृषीवलः] 'farmer'.
"""

standard = """
After @deva[रजस्], @deva[कृषि], @deva[आसुति], and @deva[परिषद्], the affix @deva[वलच्] (= @deva[वल]) comes with @deva[मतुप्]-sense. Examples: @deva[रजस्वला स्त्री] 'menstruating woman'; @deva[कृषीवलः कुटुम्बी] 'farmer/householder'; @deva[आसुतीवलः शौण्डिकः] 'distiller'; @deva[परिषद्वलो राजा] 'king with an assembly'. The vowel-lengthening in @deva[कृषि] and @deva[आसुति] occurs by @ref[6.3.118]. @deva[वलच्] applies only under specific senses and conditions shown in examples.
"""

advanced = """
The @deva[वलच्]-affix with @deva[मतुप्]-meaning applies to four specified bases with @deva[दीर्घ] by @ref[6.3.118] for @deva[इकारान्त] stems (@deva[कृषि] → @deva[कृषी], @deva[आसुति] → @deva[आसुती]). The affixation is context-sensitive: @deva[रजस्वला] for menstrual state (not general 'dusty'); @deva[कृषीवल] for agricultural profession; @deva[परिषद्वल] for assembly-holding royalty.
"""

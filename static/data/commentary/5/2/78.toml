id = "5.2.78"
numericId = "52078"

[en]
simple = """
The affix @deva[कन्] comes after a nominative word (with genitive sense) to mean 'he is their leader'. @deva[देवदत्तः ग्रामणीः एषाम्] → @deva[देवदत्तकाः] 'those whose leader is Devadatta'.
"""

standard = """
After a word in the nominative (with @deva[षष्ठी]-force), the affix @deva[कन्] denotes @deva[ग्रामणी] 'leader/headman'. Examples: @deva[देवदत्तो ग्रामणीः एषाम्] → @deva[देवदत्तकाः] 'those whose leader is Devadatta'; @deva[यज्ञदत्तकाः] 'those led by @[yajñadatta]'. Why 'when meaning leader'? @deva[देवदत्तः शत्रुः एषाम्] 'Devadatta is their enemy' — no affix applies here.
"""

advanced = """
The @deva[कन्]-affix with @deva[ग्रामणी]-meaning (leadership relation) applies to @deva[प्रथमान्त] bases with implicit @deva[षष्ठी] relation. The derived form characterizes the group by their leader: @deva[देवदत्तक] = 'those whose @deva[ग्रामणी] is Devadatta'. The semantic restriction excludes other relational meanings (@deva[शत्रु], etc.).
"""

id = "5.2.64"
numericId = "52064"

[en]
simple = """
The affix @deva[कन्] comes after @deva[आकर्ष]-class words (locative) to mean 'skilled therein'. @deva[आकर्षे कुशलः] → @deva[आकर्षकः] 'one skilled in dragging/attraction'.
"""

standard = """
After @deva[आकर्ष] and similar words (@deva[आकर्षादि]) in the locative, the affix @deva[कन्] (= @deva[क]) denotes @deva[कुशल] 'skilled in'. Examples: @deva[आकर्षे कुशलः] → @deva[आकर्षकः]; @deva[त्सरौ कुशलः] → @deva[त्सरुकः]. The @deva[आकर्षादि] includes: @deva[आकर्ष] (or @deva[आकष]), @deva[त्सरु], @deva[पिशाच], @deva[पिचण्ड], @deva[अशनि], @deva[अश्मन्], @deva[निचय], @deva[चय], @deva[विजय], @deva[जय], etc.
"""

advanced = """
The @deva[कन्]-affix with @deva[कुशल]-meaning applies to @deva[सप्तम्यन्त] @deva[आकर्षादि] bases. An alternative reading has @deva[आकष] as the @deva[गण]-head. The @deva[गण] includes action-nouns and implements: @deva[आकर्ष] (dragging), @deva[त्सरु] (sword-hilt), @deva[पिशाच], @deva[अशनि] (thunderbolt), @deva[अश्मन्] (stone), @deva[चय/निचय/विचय] (accumulation/selection), @deva[जय/विजय] (conquest).
"""

id = "5.2.127"
numericId = "52127"

[en]
simple = """
The affix @deva[अच्] comes after @deva[अर्शस्]-class words with @deva[मतुप्]-sense. @deva[अर्शांसि अस्य विद्यन्ते] → @deva[अर्शसः] 'having piles'.
"""

standard = """
After @deva[अर्शस्] and similar words (@deva[अर्शआदि]), the affix @deva[अच्] (= @deva[अ]) comes with @deva[मतुप्]-sense. Examples: @deva[अर्शांसि अस्य विद्यन्ते] → @deva[अर्शसः] 'having hemorrhoids'; @deva[उरसः] 'having a chest'. After body-part words, @deva[अच्] comes when defect is meant: @deva[खञ्जः पादः अस्य अस्ति] → @deva[खञ्जः] 'lame'; @deva[काणः] 'one-eyed'. After color words: @deva[शुक्लः अस्य अस्ति] → @deva[शुक्लः पटः] 'white cloth'.
"""

advanced = """
The @deva[अच्]-affix applies to @deva[अर्शादि] @deva[गण] (disease/defect terms) with @deva[मतुप्]-sense. The @deva[गण] includes: @deva[अर्शस्], @deva[उरस्], @deva[तुन्द], @deva[चतुर], @deva[पलित], etc. Extended uses: body-part + @deva[अच्] for defects (@deva[खञ्ज], @deva[काण]); color + @deva[अच्] for colored objects (@deva[शुक्ल पट]).
"""

id = "5.2.37"
numericId = "52037"

[en]
simple = """
The affixes @deva[द्वयसच्], @deva[दघ्नच्], and @deva[मात्रच्] come after words (nominative) to mean 'that whose lineal measure is this'. @deva[ऊरुः प्रमाणम् अस्य] → @deva[ऊरुद्वयसम्], @deva[ऊरुदघ्नम्], or @deva[ऊरुमात्रम्] 'thigh-high'.
"""

standard = """
After a word in the nominative, the affixes @deva[द्वयसच्] (= @deva[द्वयस]), @deva[दघ्नच्] (= @deva[दघ्न]), and @deva[मात्रच्] (= @deva[मात्र]) denote 'that whose lineal measure is this' (@deva[तदस्य प्रमाणम्]). Examples: @deva[ऊरुः प्रमाणम् अस्य] → @deva[ऊरुद्वयसम्], @deva[ऊरुदघ्नम्], @deva[ऊरुमात्रम्] 'reaching up to the thigh'; similarly @deva[जानुमात्रम्], @deva[जानुद्वयसम्], @deva[जानुदघ्नम्] 'knee-high'. Usage: @deva[ऊरुद्वयसम् उदकम्] 'water reaching up to the thigh'.
"""

advanced = """
The triple-affix prescription (@deva[द्वयसच्], @deva[दघ्नच्], @deva[मात्रच्]) for @deva[प्रथमान्त] bases creates synonymous @deva[प्रमाणवाचक] (measure-denoting) forms. All three express @deva[आयामप्रमाण] (lineal/vertical measure). Some authorities distinguish: @deva[द्वयस] and @deva[दघ्न] specifically denote vertical height (reaching up to X), while @deva[मात्र] is more general.
"""

id = "5.2.130"
numericId = "52130"

[en]
simple = """
The affix @deva[इनि] comes after ordinal numerals when age is denoted with @deva[मतुप्]-sense. @deva[पञ्चमः अस्य अस्ति मासः] → @deva[पञ्चमी उष्ट्रः] 'five-month-old camel'.
"""

standard = """
After ordinal numerals, the affix @deva[इनि] (= @deva[इन्]) comes with @deva[मतुप्]-sense when age (@deva[वयस्]) is denoted. Example: @deva[पञ्चमः अस्य अस्ति मासः संवत्सरो वा] → @deva[पञ्चमिन्] 'five months/years old', as @deva[पञ्चमी उष्ट्रः] 'five-month-old camel'. Similarly: @deva[नवमी], @deva[दशमी]. By @ref[5.2.115], @deva[इनि] would apply anyway; this @[sūtra] is restrictive, teaching that @deva[ठन्] does not come in age-sense.
"""

advanced = """
The @deva[इनि]-prescription for @deva[पूरण] (ordinals) in @deva[वयस्]-meaning is @deva[नियमक] (restrictive): only @deva[इनि] applies (not @deva[ठन्] from @ref[5.2.115]). The @deva[वयसि]-condition specifies age-designation, not general possession of ordinal rank.
"""

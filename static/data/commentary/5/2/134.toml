id = "5.2.134"
numericId = "52134"

[en]
simple = """
The affix @deva[इनि] comes after @deva[वर्ण] 'caste' when the word means @deva[ब्रह्मचारिन्] 'celibate student' with @deva[मतुप्]-sense. @deva[वर्णिन्] 'a @[brahmacārin]'.
"""

standard = """
After @deva[वर्ण] 'caste/class', the affix @deva[इनि] (= @deva[इन्]) comes with @deva[मतुप्]-sense when the derived word means @deva[ब्रह्मचारिन्] 'celibate student'. Result: @deva[वर्णिन्] 'a @[brahmacārin]' — specifically, members of the first three @deva[वर्ण] (castes) entitled to sacred thread investiture who lead the student life. When not meaning @[brahmacārin]: @deva[वर्णवान्] 'having caste/color'.
"""

advanced = """
The @deva[इनि]-affix for @deva[वर्ण] with @deva[ब्रह्मचारिन्]-meaning is semantically specialized: @deva[वर्णिन्] = @deva[त्रैवर्णिक ब्रह्मचारिन्] (celibate student from the three upper castes). The @deva[संज्ञा]-restriction distinguishes from general @deva[वर्णवत्] 'having class/color'.
"""

id = "5.2.61"
numericId = "52061"

[en]
simple = """
The affix @deva[अण्] comes after @deva[विमुक्त]-class words with @deva[मतुप्]-sense when expressing @deva[अध्याय] or @deva[अनुवाक]. @deva[विमुक्तशब्दः अस्मिन् अस्ति] → @deva[वैमुक्तः अध्यायः] or @deva[अनुवाकः].
"""

standard = """
After @deva[विमुक्त] and similar words (@deva[विमुक्तादि]), the affix @deva[अण्] (with @deva[वृद्धि]) comes with @deva[मतुप्]-sense ('having this word') when denoting an @deva[अध्याय] (chapter) or @deva[अनुवाक] (Vedic section). Examples: @deva[विमुक्त शब्दः अस्मिन् अस्ति] → @deva[वैमुक्तः अध्यायः/अनुवाकः]; @deva[देवासुर] → @deva[दैवासुरः]. The @deva[विमुक्तादि] includes: @deva[विमुक्त], @deva[देवासुर], @deva[रक्षोऽसुर], @deva[उपसद्], @deva[सुवर्ण], etc.
"""

advanced = """
The @deva[अण्]-affix with @deva[मतुप्]-@deva[अर्थ] applies to the @deva[विमुक्तादि] @deva[गण] in @deva[अध्याय]//@deva[अनुवाक] contexts. This is an alternative to @deva[छ] (@ref[5.2.59]) for this specific word-class. The @deva[गण] includes textual markers: @deva[विमुक्त], @deva[देवासुर], @deva[रक्षोऽसुर], @deva[उपसद्], @deva[सुवर्ण]//@deva[सुपर्ण], @deva[परिसारक], @deva[सदसत्], @deva[वसु], @deva[मरुत्]//@deva[मरुत्वत्], @deva[पत्नीवत्], @deva[वसुमत्].
"""

id = "3.2.131"
numericId = "32131"

[en]
simple = """
The affix @deva[शतृ] comes after @deva[द्विष्] 'to hate' when the agent means 'enemy'. @deva[अमित्र] = enemy. Examples: @deva[द्विषन्] 'enemy', @deva[द्विषन्तौ] 'two enemies', @deva[द्विषन्तः] 'enemies'. Without 'enemy' meaning: @deva[द्वेष्टि भार्या पतिम्] 'the wife hates her husband' (uses finite verb, not participle).
"""

standard = """
@deva[शतृ] follows @deva[द्विष्] when @deva[अमित्र] (enemy) is denoted. Examples: @deva[द्विषन्], @deva[द्विषन्तौ], @deva[द्विषन्तः] 'enemy/enemies'. Without @deva[अमित्रार्थ]: @deva[द्वेष्टि भार्या पतिम्] 'the wife hates her husband'.
"""

advanced = """
@deva[शतृ] follows @deva[द्विष्] with @deva[अमित्रार्थ]. Examples: @deva[द्विषन्], @deva[द्विषन्तौ], @deva[द्विषन्तः]. Without @deva[अमित्रार्थ]: @deva[द्वेष्टि भार्या पतिम्].
"""

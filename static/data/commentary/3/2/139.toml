id = "3.2.139"
numericId = "32139"

[en]
simple = """
The affix @deva[क्स्नु] comes after @deva[ग्ला] 'to be weary', @deva[जि] 'to conquer', @deva[स्था] 'to stand', and @deva[भू] 'to be' in the sense of 'agent having such habit etc.' Examples: @deva[ग्लास्नुः] 'languid', @deva[जिष्णुः] 'victorious', @deva[स्थास्नुः] 'immovable', @deva[भूष्णुः] 'being'. The @deva[छन्दस्] condition does not continue here. The indicatory letter is actually @deva[ग] (not @deva[क])—therefore no long @deva[ई] substitute for @deva[आ] of @deva[स्था] (@ref[6.4.66]). In @ref[1.1.5] and @ref[7.2.11], @deva[क] includes @deva[ग], so this affix doesn't cause @deva[गुण] and @deva[भूष्णु] has no @deva[इट्]. @[vārttika]: In @deva[छन्दस्], after @deva[दंश्] 'to bite'—@deva[दङ्क्ष्णवः पशवः] 'biting beasts'.
"""

standard = """
@deva[क्स्नु] follows @deva[ग्ला], @deva[जि], @deva[स्था], @deva[भू] with @deva[तच्छीलादि]. Examples: @deva[ग्लास्नुः], @deva[जिष्णुः], @deva[स्थास्नुः], @deva[भूष्णुः]. @deva[छन्दसि] @deva[अनुवृत्ति] stops. The @deva[इत्] is @deva[ग] (not @deva[क])—no @deva[ईत्व] for @deva[स्था] (@ref[6.4.66]). In @ref[1.1.5] (@deva[क्ङिति च]) and @ref[7.2.11] (@deva[श्रयुकः किति]), @deva[क] includes @deva[ग]—so no @deva[गुण] and no @deva[इट्] in @deva[भूष्णु]. @deva[वार्त्तिक]: In @deva[छन्दस्], after @deva[दंश्]: @deva[दङ्क्ष्णवः पशवः].
"""

advanced = """
@deva[क्स्नु] follows @deva[ग्ला], @deva[जि], @deva[स्था], @deva[भू] with @deva[तच्छीलादि]. Examples: @deva[ग्लास्नुः], @deva[जिष्णुः], @deva[स्थास्नुः], @deva[भूष्णुः]. @deva[छन्दसि] @deva[अनुवृत्ति] absent. @deva[इत्] = @deva[ग] (not @deva[क])—no @deva[ईत्व] (@ref[6.4.66]). @ref[1.1.5]/@ref[7.2.11] include @deva[ग] in @deva[क]—no @deva[गुण], no @deva[इट्]. @deva[वार्त्तिक]: @deva[छन्दस्] @deva[दंश्]: @deva[दङ्क्ष्णवः पशवः].
"""

id = "3.2.23"
numericId = "32023"

[en]
simple = """
The affix @deva[ट] is **not** used after @deva[कृ] 'to make' when these words are in composition: @deva[शब्द] 'sound', @deva[श्लोक] 'verse', @deva[कलह] 'quarrel', @deva[गाथा] 'praise', @deva[वैर] 'enmity', @deva[चाटु] 'flattery', @deva[सूत्र] 'aphorism', @deva[मन्त्र] 'hymn', @deva[पद] 'word'.

Instead, the general affix @deva[अण्] applies.

**Examples:**
- @deva[शब्दकारः] 'one who makes sound'
- @deva[श्लोककारः] 'verse-maker, poet'
- @deva[सूत्रकारः] 'author of @[sūtras]'
- @deva[मन्त्रकारः] 'composer of mantras'
"""

standard = """
The affix @deva[ट] does **not** come after @deva[कृञ्] when these words are in composition:

@deva[शब्द], @deva[श्लोक], @deva[कलह], @deva[गाथा], @deva[वैर], @deva[चाटु], @deva[सूत्र], @deva[मन्त्र], @deva[पद]

This prohibition applies even when the meaning is @deva[हेतु/ताच्छील्य/आनुलोम्य] (from @ref[3.2.20]). The general affix @deva[अण्] is used instead.

| Word | + @deva[कृ] + @deva[अण्] | Meaning |
|------|---------|--------|
| @deva[शब्द] | @deva[शब्दकारः] | sound-maker |
| @deva[श्लोक] | @deva[श्लोककारः] | verse-maker |
| @deva[कलह] | @deva[कलहकारः] | quarrel-fomenter |
| @deva[गाथा] | @deva[गाथाकारः] | @[gāthā-writer] |
| @deva[वैर] | @deva[वैरकारः] | enemy |
| @deva[चाटु] | @deva[चाटुकारः] | flatterer |
| @deva[सूत्र] | @deva[सूत्रकारः] | @[sūtra-author] |
| @deva[मन्त्र] | @deva[मन्त्रकारः] | mantra-composer |
| @deva[पद] | @deva[पदकारः] | @[padapāṭha-author] |
"""

advanced = """
The affix @deva[ट] is prohibited after @deva[कृञ्] when these @deva[उपपद]s are in composition: @deva[शब्द], @deva[श्लोक], @deva[कलह], @deva[गाथा], @deva[वैर], @deva[चाटु], @deva[सूत्र], @deva[मन्त्र], @deva[पद].

This prohibition applies even when @deva[हेतु], @deva[ताच्छील्य], or @deva[आनुलोम्य] meanings are present. The general affix @deva[अण्] (@ref[3.2.1]) takes its place.

**Examples:**
- @deva[शब्दकारः] 'sounding, sonorous'
- @deva[श्लोककारः] 'verse-maker'
- @deva[कलहकारः] 'quarrel-fomenter'
- @deva[गाथाकारः] 'writer of @[gāthās] (Prakrit verses)'
- @deva[वैरकारः] 'enemy'
- @deva[चाटुकारः] 'flatterer'
- @deva[सूत्रकारः] '@[sūtra-author]'
- @deva[मन्त्रकारः] 'mantra-composer'
- @deva[पदकारः] 'author of @[padapāṭha]'
"""

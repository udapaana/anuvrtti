id = "3.2.123"
numericId = "32123"

[en]
simple = """
The affix @deva[लट्] (Present tense) comes after a verb when denoting a present action. @deva[वर्तमान] means an action that has begun but has not yet ended—still continuing. Examples: @deva[पचति] 'he is cooking', @deva[पठति] 'he is reading'. The Present tense also expresses what is constant or regular: @deva[तिष्ठन्ति पर्वताः] 'the mountains stand', @deva[स्रवन्ति नद्यः] 'the rivers flow'.
"""

standard = """
@deva[लट्] (Present tense) follows a @deva[धातु] with @deva[वर्तमानार्थ] (present action). @deva[वर्तमान] = action begun but not yet ended. Examples: @deva[पचति], @deva[पठति]. Also expresses @deva[नित्य] (constant/regular): @deva[तिष्ठन्ति पर्वताः], @deva[स्रवन्ति नद्यः].
"""

advanced = """
@deva[लट्] follows @deva[धातु] with @deva[वर्तमानार्थ]. @deva[वर्तमान] = @deva[प्रवृत्तानवृत्त] (begun, not ended). Examples: @deva[पचति], @deva[पठति]. Also @deva[नित्यवृत्ति]: @deva[तिष्ठन्ति पर्वताः], @deva[स्रवन्ति नद्यः].
"""

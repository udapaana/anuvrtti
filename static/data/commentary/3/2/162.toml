id = "3.2.162"
numericId = "32162"

[en]
simple = """
The affix @deva[कुरच्] comes after three verbs to denote habitual action: @deva[विद्] (to know), @deva[भिद्] (to divide), @deva[छिद्] (to pierce). Examples: @deva[विदुरः पण्डितः] (a knowing scholar), @deva[भिदुरं काष्ठम्] (splitting wood), @deva[छिदुरा रज्जुः] (a breaking rope). After @deva[भिद्] and @deva[छिद्], the affix gives reflexive sense - what splits or breaks by itself.

@[vārtika]: @deva[कुरच्] also comes after @deva[व्यध्] (to kill), with semivowel vocalization → @deva[विधुरः].
"""

standard = """
The affix @deva[कुरच्] applies after @deva[विद्], @deva[भिद्], @deva[छिद्] in @deva[तच्छीलादि] sense. Examples: @deva[विदुरः पण्डितः] (learned scholar), @deva[भिदुरं काष्ठम्] (fragile wood - reflexive: wood that splits), @deva[छिदुरा रज्जुः] (a rope that breaks easily). The affix conveys reflexive meaning after @deva[भिद्] and @deva[छिद्].

@[vārtika]: @deva[कुरच्] also after @deva[व्यध्] (to pierce) with @deva[सम्प्रसारण] of the semivowel → @deva[विधुरः] (distressed, separated).
"""

advanced = """
@deva[कुरच्] after @deva[विद्], @deva[भिद्], @deva[छिद्] in @deva[तच्छीलादि] sense. After @deva[भिद्] and @deva[छिद्], reflexive meaning obtains. Examples: @deva[विदुरः पण्डितः] (sage Vidura - the wise one), @deva[भिदुरं काष्ठम्] (self-splitting wood), @deva[छिदुरा रज्जुः] (self-breaking rope).

@note[type=@[vārtika]]: @deva[कुरच्] also after @deva[व्यध्] with @deva[सम्प्रसारण] (vocalization of @deva[य्] → @deva[इ]): @deva[व्यध्] → @deva[विध्] → @deva[विधुरः] (afflicted, bereft).
"""

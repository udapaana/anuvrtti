id = "3.2.21"
numericId = "32021"

[en]
simple = """
The affix @deva[ट] is used after @deva[कृ] when a long list of specific words are in composition, **regardless of the meanings** in @ref[3.2.20].

**Examples:**
- @deva[दिवाकरः] 'the sun' (day-maker)
- @deva[निशाकरः] 'the moon' (night-maker)
- @deva[भास्करः] 'the sun' (light-maker)
- @deva[किङ्करः] 'a servant' (what-doer)
- @deva[बलिकरः] 'one who offers oblations'

These forms apply even without the @deva[हेतु/ताच्छील्य/आनुलोम्य] meanings of @ref[3.2.20].
"""

standard = """
The affix @deva[ट] comes after @deva[कृञ्] when these specific words are in composition:

@deva[दिवा], @deva[विभा], @deva[निशा], @deva[प्रभा], @deva[भास्], @deva[कार], @deva[अन्त], @deva[अनन्त], @deva[आदि], @deva[बहु], @deva[नान्दी], @deva[किम्], @deva[लिपि], @deva[लिबि], @deva[बलि], @deva[भक्ति], @deva[कर्तृ], @deva[चित्र], @deva[क्षेत्र], @deva[संख्या], @deva[जङ्घा], @deva[बाहु], @deva[अहस्], @deva[यत्], @deva[तत्], @deva[धनुस्], @deva[अरुस्]

| Example | Meaning |
|---------|--------|
| @deva[दिवाकरः] | the sun |
| @deva[निशाकरः] | the moon |
| @deva[भास्करः] | the sun |
| @deva[किङ्करः] | servant |
| @deva[चित्रकरः] | painter |
| @deva[क्षेत्रकरः] | cultivator |

This applies regardless of @deva[हेतु/ताच्छील्य/आनुलोम्य].

**@[vārtika]:** @deva[अच्] after @deva[कृ] with @deva[किम्], @deva[यत्], @deva[तत्], @deva[बहु]: @deva[किङ्करा], @deva[यत्करा], @deva[तत्करा], @deva[बहुकरा] (fem. @deva[आ], not @deva[ई]).
"""

advanced = """
The affix @deva[ट] comes after the verb @deva[कृञ्] 'to make' when the following words are in composition with it - 1. @deva[दिवा] 'by day' 2. @deva[विभा] 'light' 3. @deva[निशा] 'night' 4. @deva[प्रभा] 'splendour' 5. @deva[भाः] 'light' 6. @deva[कार] 'work' 7. @deva[अन्त] 'end' 8. @deva[अनन्त] 'endless' 9. @deva[आदि] 'beginning' 10. @deva[बहु] 'many' 11. @deva[नान्दी] 'benediction' 12. @deva[किम्] 'what' 13. @deva[लिपि] 'writing' 14. @deva[लिबि] 'writing' 15. @deva[बलि] 'oblation' 16. @deva[भक्ति] 'devotion' 17. @deva[कर्तृ] 'agent' 18. @deva[चित्र] 'painting' 19. @deva[क्षेत्र] 'field' 20. @deva[संख्या] - words denoting numerals 21. @deva[जङ्घा] 'thigh' 22. @deva[बाहु] 'hand' 23. @deva[अहः] 'day' 24. @deva[यत्] 'what' 25. @deva[तत्] 'that' 26. @deva[धनुस्] 'bow' 27. @deva[अरुस्] 'wound'. Both the words '@[karma]' and '@[sup]' are understood in this aphorism; that is to say, sometimes these @[upapadas] stand as @deva[द्वितीया] (accusative) case and sometimes they have other cases, as the construction may require. This affix @deva[ट] comes when the sense is not that of cause &c., as it was in the last @[sutra]. Thus @deva[दिवाकरः] 'the sun'. The word @deva[दिवा] is an indeclinable and means 'in the day time'. There the @[upapada], therefore, is in the @deva[सप्तमी] (locative) case. The sun is so called, because it makes creatures active in the day time. So @deva[विभाकरः] 'the sun' (light-maker); @deva[निशाकरः] 'the moon' (the night-maker); @deva[प्रभाकरः] 'the sun'; @deva[भास्करः] 'the sun' (the letter @deva[स] is not changed into @[visarga], as it has been so read in the @[sutra]); @deva[कारकरः] 'agent'; @deva[अन्तकरः] 'death' (end-maker); @deva[अनन्तकरः] 'magnifying to any extent'; @deva[आदिकरः] 'the creator'; @deva[बहुकरः] 'the busy'; @deva[नान्दीकरः] 'the speaker of benediction'; @deva[किङ्करः] 'a servant'; @deva[लिपिकरः] 'a scribe'; @deva[लिबिकरः] 'a scribe'; @deva[बलिकरः] 'offering sacrifice'; @deva[भक्तिकरः] 'a devotee'; @deva[कर्तृकरः] 'an agent'; @deva[चित्रकरः] 'a painter'; @deva[क्षेत्रकरः] 'a cultivator'; @deva[एककरः] 'doing only one thing', @deva[द्विकरः] 'doing two things'; @deva[त्रिकरः] 'doing three things'; @deva[जङ्घाकरः] 'a runner, an express'; @deva[बाहुकरः] 'a hero', 'a manual labourer'; @deva[अहस्करः] 'the sun'; @deva[तत्करः] 'doing that'; @deva[यत्करः] 'doing that'; @deva[धनुष्करः] 'bow-maker'; @deva[अरुस्करः] 'causing or inflicting wounds'. Var:- The affix @deva[अच्] comes after the verb @deva[कृ] when @deva[किम्], @deva[यत्], @deva[तद्] and @deva[बहु] are in composition with it. The speciality of @deva[ट] affix is that the feminine of words derived from it is formed by long @deva[ई]; while the feminine of words derived by @deva[अच्] is formed by long @deva[आ]. Thus @deva[किङ्करा], @deva[यत्करा], @deva[तत्करा] and @deva[बहुकरा]; these words might be said to belong to the @deva[अजादि] class (See @ref[4.1.31]).
"""

id = "3.2.182"
numericId = "32182"

[en]
simple = """
The affix @deva[ष्ट्रन्] comes after thirteen verbs to denote the instrument: @deva[दाप्] (to cut), @deva[नी] (to lead), @deva[शस्] (to hurt), @deva[यु] (to join), @deva[युज्] (to join), @deva[स्तु] (to praise), @deva[तुद्] (to strike), @deva[सि] (to bind), @deva[सिच्] (to sprinkle), @deva[मिह्] (to urinate), @deva[पत्] (to fall), @deva[दश्] (to bite), @deva[नह्] (to bind). Examples: @deva[दात्रम्] (sickle), @deva[नेत्रम्] (eye), @deva[शस्त्रम्] (weapon), @deva[स्तोत्रम्] (hymn), @deva[तोत्रम्] (goad), @deva[पत्रम्] (vehicle/leaf), @deva[दंष्ट्रा] (fang).
"""

standard = """
The affix @deva[ष्ट्रन्] applies in @deva[करण] (instrument) sense after @deva[दाप्], @deva[नी], @deva[शस्], @deva[यु], @deva[युज्], @deva[स्तु], @deva[तुद्], @deva[सि], @deva[सिच्], @deva[मिह्], @deva[पत्], @deva[दश्], @deva[नह्]. Examples: @deva[दात्रम्] (sickle); @deva[नेत्रम्] (eye - instrument of leading); @deva[शस्त्रम्] (weapon, by @ref[7.2.9]); @deva[योत्रम्] (yoke-tie); @deva[योक्त्रम्] (yoke-strap); @deva[स्तोत्रम्] (panegyric); @deva[तोत्रम्] (elephant goad); @deva[सेत्रम्] (ligament); @deva[सेक्त्रम्] (sprinkler); @deva[मेढ्रम्] (penis); @deva[पत्रम्] (wing/leaf/vehicle); @deva[दंष्ट्रा] (fang - @deva[अजादि] class, so @deva[टाप्] not @deva[ई] by @ref[4.1.4]); @deva[नह्] → @deva[नद्ध्री] (thong, by @ref[8.2.34]).

Note: @deva[दश्] is written without nasal, implying nasal-loss before some affixes (e.g., @deva[ल्युट्] → @deva[दशनम्] 'tooth').
"""

advanced = """
@deva[ष्ट्रन्] after @deva[दाप्], @deva[नी], @deva[शस्], @deva[यु], @deva[युज्], @deva[स्तु], @deva[तुद्], @deva[सि], @deva[सिच्], @deva[मिह्], @deva[पत्], @deva[दश्], @deva[नह्] in @deva[करणे] sense. Derivations: @deva[दात्रम्] (sickle); @deva[नेत्रम्] (eye); @deva[शस्त्रम्] (by @ref[7.2.9]); @deva[योत्रम्], @deva[योक्त्रम्] (yoke-ties); @deva[स्तोत्रम्] (hymn); @deva[तोत्रम्] (goad); @deva[सेत्रम्] (bond); @deva[सेक्त्रम्] (sprinkler); @deva[मेढ्रम्] (phallus); @deva[पत्रम्] (leaf/wing/letter); @deva[दंष्ट्रा] (@deva[अजादि] → @deva[टाप्] by @ref[4.1.4], not @deva[ई]); @deva[नह्] + @deva[ष्ट्रन्] → @deva[नद्ध्र], fem. @deva[नद्ध्री] (by @ref[8.2.34], @ref[8.2.40]).

The root @deva[दश्] (without nasal @deva[दंश्]) indicates nasal-deletion before certain affixes: @deva[ल्युट्] → @deva[दशनम्] (tooth).
"""

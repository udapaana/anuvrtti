id = "3.2.125"
numericId = "32125"

[en]
simple = """
@deva[शतृ] and @deva[शानच्] substitute for @deva[लट्] (Present tense) even when agreeing with a nominative word, provided it is in the vocative case. Examples: @deva[हे पचन्] or @deva[हे पचमान] 'O thou who art cooking'.
"""

standard = """
@deva[शतृ] and @deva[शानच्] substitute for @deva[लट्] even with @deva[प्रथमान्त] when @deva[सम्बोधन] (vocative). Examples: @deva[हे पचन्], @deva[हे पचमान] 'O thou who art cooking'.
"""

advanced = """
@deva[शतृ]/@deva[शानच्] replace @deva[लट्] with @deva[प्रथमान्त] when @deva[सम्बोधन]. Examples: @deva[हे पचन्], @deva[हे पचमान].
"""

id = "3.2.143"
numericId = "32143"

[en]
simple = """
This rule prescribes the affix @deva[घिनुण्] after four specific verb roots when they are compounded with the prefix @deva[वि]: @deva[कष्] (to injure), @deva[लस्] (to sport), @deva[कत्थ्] (to boast), and @deva[स्रम्भ्] (to trust).

Examples: @deva[विकाषी] (one who habitually injures), @deva[विलासी] (one who is sportive or sensuous by nature), @deva[विकत्थी] (one who characteristically boasts), @deva[विस्रम्भी] (one who is naturally confiding or trusting).

The prefix @deva[वि] is required -- without it, these roots would take the default @deva[तृन्] affix from @ref[3.2.135] instead. For instance, without @deva[वि], one would say @deva[कषिता] (one who injures) rather than *@deva[काषी].
"""

standard = """
This @[vidhi] prescribes @deva[घिनुण्] after @deva[कष्], @deva[लस्], @deva[कत्थ्], and @deva[स्रम्भ्] in the @deva[तच्छीलादि] sense, with the condition that @deva[वि] must be present as an @deva[उपसर्ग] (preverb).

Worked examples:

1. @deva[वि] + @deva[कष्] + @deva[घिनुण्] = @deva[विकाषी] (one who characteristically injures or scratches).
2. @deva[वि] + @deva[लस्] + @deva[घिनुण्] = @deva[विलासी] (one given to sport or dalliance).
3. @deva[वि] + @deva[कत्थ्] + @deva[घिनुण्] = @deva[विकत्थी] (a habitual braggart).
4. @deva[वि] + @deva[स्रम्भ्] + @deva[घिनुण्] = @deva[विस्रम्भी] (one who characteristically confides or trusts).

The @deva[उपसर्ग] condition is restrictive: without @deva[वि], the general rule @ref[3.2.135] applies, giving @deva[तृन्] instead (@deva[कषिता], @deva[लसिता], etc.).

Scope: This is an extension of @ref[3.2.142], adding four more roots under the same affix but with the additional condition of @deva[वि]-prefixation.
"""

advanced = """
This rule extends @deva[घिनुण्] to four additional roots under the @deva[तच्छीलादि] @deva[अधिकार] of @ref[3.2.134], with the @deva[नियम] that the @deva[उपसर्ग] @deva[वि] must be present.

The @deva[अनुवृत्ति] chain: @deva[घिनुण्] from @ref[3.2.142]; @deva[तच्छीलादि] from @ref[3.2.134]; @deva[धातोः] from @ref[3.1.91].

The @deva[उपसर्ग]-condition here functions as a @deva[नियम]: these roots take @deva[घिनुण्] only when prefixed with @deva[वि]. Without the prefix, the @deva[उत्सर्ग] rule @ref[3.2.135] (@deva[तृन्]) applies. This pattern of @deva[उपसर्ग]-conditioned affix prescription recurs at @ref[3.2.144] and @ref[3.2.145].

The word @deva[विलासी] formed here is widely attested in classical literature for a person given to amorous sport. @deva[विकत्थी] appears in the @[mahābhārata] for boastful warriors.

Cross-references: @ref[3.2.142] (source of @deva[घिनुण्] @deva[अनुवृत्ति]), @ref[3.2.144] (next rule, also @deva[उपसर्ग]-conditioned @deva[घिनुण्]).
"""

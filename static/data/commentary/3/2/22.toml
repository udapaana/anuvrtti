id = "3.2.22"
numericId = "32022"

[en]
simple = """
The affix @deva[ट] is used after @deva[कृ] when @deva[कर्म] is in composition and the meaning is **wages/hire** (@deva[भृति]).

**Example:**
- @deva[कर्म करोति] = @deva[कर्मकरः] 'hired laborer' (not a slave)

**Without 'wages' meaning:** @deva[अण्] applies — @deva[कर्मकारः] 'artisan'.

Note: @deva[कर्म] here refers to the word itself, not the grammatical term 'object'.
"""

standard = """
The affix @deva[ट] comes after @deva[कृञ्] when @deva[कर्म] is in composition and the sense is @deva[भृति] (wages/hire).

| Form | Affix | Meaning |
|------|-------|--------|
| @deva[कर्मकरः] | @deva[ट] | hired laborer (works for wages) |
| @deva[कर्मकारः] | @deva[अण्] | artisan (works on objects) |

The word @deva[भृति] means 'service for hire' or 'wages'. The word @deva[कर्म] here is the specific word-form, not the grammatical term 'object'.
"""

advanced = """
The affix @deva[ट] comes after the verb @deva[कृञ्] 'to make' when the word @deva[कर्म] is in composition with it and the sense of the word to be formed is that of wages. The word @deva[भृति] means service for hire, wages. The word @deva[कर्म] does not mean the grammatical object but the word-form @deva[कर्म]; as @deva[कर्मकरः] 'a hired labourer' (not a slave); otherwise the affix is @deva[अण्]; as @deva[कर्मकारः] 'an artisan'.
"""

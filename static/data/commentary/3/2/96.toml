id = "3.2.96"
numericId = "32096"

[en]
simple = """
The affix @deva[क्वनिप्] comes after the verbs @deva[युध्] 'to fight' and @deva[कृ] 'to make' with past-time meaning when the particle @deva[सह] 'with' is in composition. Examples: @deva[सहयुध्वन्] 'one who has made someone fight alongside', @deva[सहकृत्वन्] 'one who has done something along with another'. Since @deva[सह] is a particle (not a noun), it cannot take any case ending.
"""

standard = """
@deva[क्वनिप्] follows @deva[युध्] and @deva[कृ] with @deva[भूतार्थ] when the particle @deva[सह] is in composition. Examples: @deva[सहयुध्वन्] 'one who has fought alongside'; @deva[सहकृत्वन्] 'one who has acted together with another'. @deva[सह] being @deva[निपात] (particle), not @deva[द्रव्यवाचक], cannot take @deva[विभक्ति].
"""

advanced = """
@deva[क्वनिप्] follows @deva[युध्] and @deva[कृ] with @deva[भूतार्थ] when @deva[निपात] @deva[सह] is @deva[उपपद]. Examples: @deva[सहयुध्वन्], @deva[सहकृत्वन्]. @deva[सह] being @deva[अद्रव्यवाचक निपात] takes no @deva[विभक्ति].
"""

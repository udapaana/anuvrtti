id = "3.2.122"
numericId = "32122"

[en]
simple = """
Optionally, @deva[लुङ्] (Aorist) and @deva[लट्] (Present) come after a verb in denoting past time not belonging to the current day when @deva[पुरा] 'formerly' is used, provided @deva[स्म] is not used. When @deva[लट्] and @deva[लुङ्] are not used, the proper tenses apply. Examples: @deva[वसन्तीह पुरा छात्राः] (Present) 'The pupils lived here formerly', or Aorist @deva[अवात्सुः पुरा छात्राः], Imperfect @deva[अवसन्निह पुरा छात्राः], Perfect @deva[ऊषुरिह पुरा छात्राः]. When @deva[स्म] is used, @ref[3.2.118] applies: @deva[यजति स्म पुरा युधिष्ठिरः].
"""

standard = """
@deva[लुङ्] and @deva[लट्] come @deva[विभाषया] with @deva[भूतार्थ] in @deva[अनद्यतन] when @deva[पुरा] is used, @deva[अस्मप्रयोगे] (provided @deva[स्म] is not used). The @deva[अनद्यतन] @deva[अनुवृत्ति] resumes here via @deva[मण्डूकप्लुति] (frog's leap—skipping @ref[3.2.120]-@ref[3.2.121]). Examples: @deva[वसन्तीह पुरा छात्राः] (@deva[लट्]) 'The pupils lived here formerly'; @deva[अवात्सुः पुरा छात्राः] (@deva[लुङ्]); @deva[अवसन्निह पुरा छात्राः] (@deva[लङ्]); @deva[ऊषुरिह पुरा छात्राः] (@deva[लिट्]). With @deva[स्म]: @ref[3.2.118] applies—@deva[यजति स्म पुरा युधिष्ठिरः].
"""

advanced = """
@deva[लुङ्] and @deva[लट्] @deva[विभाषया] with @deva[भूतार्थ], @deva[अनद्यतन] when @deva[पुरा] @deva[योग], @deva[अस्मप्रयोगे]. @deva[अनद्यतन] @deva[अनुवृत्ति] resumes via @deva[मण्डूकप्लुति]. Examples: @deva[वसन्तीह पुरा छात्राः] / @deva[अवात्सुः पुरा छात्राः] / @deva[अवसन्निह पुरा छात्राः] / @deva[ऊषुरिह पुरा छात्राः]. With @deva[स्म]: @ref[3.2.118]—@deva[यजति स्म पुरा युधिष्ठिरः].
"""

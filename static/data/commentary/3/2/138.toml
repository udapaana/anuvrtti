id = "3.2.138"
numericId = "32138"

[en]
simple = """
In Vedic literature, the affix @deva[इष्णुच्] in the sense of 'agent having such habit etc.' also comes after @deva[भू] 'to be' and similar verbs. Example: @deva[भविष्णुः] 'becoming'. The separation of this @[sūtra] from the previous one (@deva[योगविभाग]) is for the sake of subsequent @[sūtras]. The word 'also' indicates other verbs not in the previous two @[sūtras] also take this affix, as in @deva[भ्राजिष्णुना लोहितचन्दनेन].
"""

standard = """
In @deva[छन्दस्], @deva[इष्णुच्] with @deva[तच्छीलादि] also follows @deva[भू] etc. Example: @deva[भविष्णुः] 'becoming'. The @deva[योगविभाग] from @ref[3.2.137] serves subsequent @[sūtras]. The @deva[अपि] indicates other verbs beyond @ref[3.2.136]-@ref[3.2.137] also take this affix: @deva[भ्राजिष्णुना लोहितचन्दनेन].
"""

advanced = """
In @deva[छन्दस्], @deva[इष्णुच्] with @deva[तच्छीलादि] follows @deva[भ्वादि]. Example: @deva[भविष्णुः]. @deva[योगविभाग] for subsequent @[sūtras]. @deva[अपि] extends to other @deva[धातु]s: @deva[भ्राजिष्णुना लोहितचन्दनेन].
"""

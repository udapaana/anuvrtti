id = "3.2.159"
numericId = "32159"

[en]
simple = """
The affix @deva[रु] comes after five verbs: @deva[दा] (to give), @deva[धेट्] (to suck), @deva[सि] (to bind), @deva[शद्] (to fall), @deva[सद्] (to sit). Examples: @deva[दारुः] (generous person), @deva[धारुः] (suckling - as in @deva[धारुर्वत्सो मातरम्] 'a calf suckling its mother'), @deva[सरुः] (binding), @deva[शद्रुः] (falling), @deva[सद्रुः] (resting).
"""

standard = """
The affix @deva[रु] applies after @deva[दा], @deva[धेट्], @deva[सि], @deva[शद्], @deva[सद्] in @deva[तच्छीलादि] sense. Examples: @deva[दारुः] (munificent), @deva[धारुर्वत्सो मातरम्] (a suckling calf), @deva[सरुः] (binder), @deva[शद्रुः] (one who falls), @deva[सद्रुः] (one who rests). Note: the genitive is blocked here by @ref[2.3.69], as @deva[रु] is treated like @deva[उ].
"""

advanced = """
@deva[रु] after @deva[दा], @deva[धेट्], @deva[सि], @deva[शद्], @deva[सद्] in @deva[तच्छीलादि] sense. The genitive (@deva[षष्ठी]) is blocked by @ref[2.3.69] since @deva[रु] is equivalent to @deva[उ] for this purpose. Derivations: @deva[दा] + @deva[रु] → @deva[दारुः] (liberal giver); @deva[धेट्] + @deva[रु] → @deva[धारुः] (suckling); @deva[सि] + @deva[रु] → @deva[सरुः]; @deva[शद्] + @deva[रु] → @deva[शद्रुः]; @deva[सद्] + @deva[रु] → @deva[सद्रुः]. Example: @deva[धारुर्वत्सो मातरम्].
"""

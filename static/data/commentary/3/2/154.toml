id = "3.2.154"
numericId = "32154"

[en]
simple = """
The affix @deva[उकञ्] comes after ten verbs to denote an agent with a habitual tendency: @deva[लष्] (to desire), @deva[पत्] (to fall), @deva[पद्] (to go), @deva[स्था] (to stand), @deva[भू] (to be), @deva[वृष्] (to rain), @deva[हन्] (to strike), @deva[कम्] (to desire), @deva[गम्] (to go), @deva[शॄ] (to injure). Examples: @deva[प्रपातुक] (prone to miscarriage), @deva[प्रवर्षुक] (tending to rain), @deva[कामुक] (lustful), @deva[आगामुक] (about to come).
"""

standard = """
The affix @deva[उकञ्] forms agent nouns with habitual sense from these ten roots: @deva[लष्], @deva[पत्], @deva[पद्], @deva[स्था], @deva[भू], @deva[वृष्], @deva[हन्], @deva[कम्], @deva[गम्], @deva[शॄ]. Examples: @deva[अपलाषुक] (without desire), @deva[प्रपातुका गर्भाः] (embryos prone to miscarriage), @deva[उपस्थायुक] (attendant), @deva[प्रभावुक] (effective), @deva[आघातुक] (striking). Note: @deva[स्था] gets @deva[य] by @ref[7.3.33] → @deva[उपस्थायुक]; @deva[हन्] becomes @deva[घात्] by @ref[7.3.32].
"""

advanced = """
@deva[उकञ्] applies after @deva[लष्], @deva[पत्], @deva[पद्], @deva[स्था], @deva[भू], @deva[वृष्], @deva[हन्], @deva[कम्], @deva[गम्], @deva[शॄ] in @deva[तच्छीलादि] sense. Phonetic changes: @deva[स्था] + @deva[उकञ्] → @deva[स्थायुक] by @ref[7.3.33] (→ @deva[उपस्थायुक]); @deva[हन्] → @deva[घात्] by @ref[7.3.32] (→ @deva[आघातुक]). Examples: @deva[अपलाषुकं वृषलसङ्गतम्], @deva[प्रपातुका गर्भा भवन्ति], @deva[उपपादुकं सत्वम्], @deva[प्रभावुकम् अन्नं भवति], @deva[प्रवर्षुकाः पर्जन्याः], @deva[कामुकं एनं स्त्रियो भवन्ति], @deva[किंशारुकं तीक्ष्णम् आहुः].
"""

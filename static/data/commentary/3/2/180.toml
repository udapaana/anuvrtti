id = "3.2.180"
numericId = "32180"

[en]
simple = """
The affix @deva[डु] comes after @deva[भू] (to be) when preceded by @deva[वि], @deva[प्र], or @deva[सम्], provided the word is not a proper name. Examples: @deva[विभुः] (all-pervading), @deva[प्रभुः] (lord, master), @deva[सम्भुः] (creator). Compare @deva[विभूः] (a person's name) which takes @deva[क्विप्].

@[vārtika]: Words like @deva[मितद्रु] (sea) and @deva[शम्भुः] (causing happiness) also take this affix.
"""

standard = """
The affix @deva[डु] applies after @deva[भू] with @deva[वि], @deva[प्र], @deva[सम्] when NOT a proper name. Examples: @deva[विभुः] (omnipresent), @deva[प्रभुः] (lord), @deva[सम्भुः] (beneficent, Brahma). When it IS a name: @deva[विभूः] (takes @deva[क्विप्] by @ref[3.2.179]).

Why @deva[डु] not @deva[क्विप्]? Two reasons: (1) to prevent @deva[धातु] rules from applying; (2) to prevent @deva[तुक्] augment (@ref[6.1.71]). Thus @deva[मितद्रु]: dual @deva[मितद्रू], pl. @deva[मितद्रवः] - no @deva[उकङ्] (@ref[6.4.77]) since @deva[द्रु] loses @deva[धातु] status.

@[vārtika]: @deva[मितद्रु] (ocean), @deva[शम्भुः] (bliss-giver) also included.
"""

advanced = """
@deva[डु] after @deva[भू] with @deva[वि]/​@deva[प्र]/​@deva[सम्] when @deva[असंज्ञायाम्] (not a proper name). Forms: @deva[विभुः], @deva[प्रभुः], @deva[सम्भुः]. When @deva[संज्ञा], @deva[क्विप्] applies (@ref[3.2.179]): @deva[विभूः].

Why @deva[डु] over @deva[क्विप्]? (1) Blocks @deva[धात्वधिकार] - so @ref[6.4.77] (@deva[उकङ्] substitution) doesn't apply: @deva[मितद्रु] → dual @deva[मितद्रू], pl. @deva[मितद्रवः]. (2) Blocks @deva[तुक्] (@ref[6.1.71]). (3) Accent rule @ref[6.1.175] doesn't apply to inst. @deva[मितद्र्वा].

@note[type=@[vārtika]]: @deva[मितद्रु] (ocean - 'measured flow'), @deva[शम्भुः] (happiness-causer). Etymology: @deva[मितं द्रवति] = @deva[मितद्रुः].
"""

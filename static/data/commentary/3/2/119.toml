id = "3.2.119"
numericId = "32119"

[en]
simple = """
The affix @deva[लट्] (Present) comes after a verb when the particle @deva[स्म] is in connection with it, denoting past action not belonging to the current day, when the action was perceived by the agent (the speaker witnessed his own action in the past). Examples: @deva[एवं स्म पिता ब्रवीति] 'Thus said the father'; @deva[इति स्मोपाध्यायः कथयति] 'Thus said the preceptor'.
"""

standard = """
@deva[लट्] follows a verb when @deva[स्म] is @deva[योग], with @deva[भूतार्थ] and @deva[अनद्यतन], when the action was @deva[प्रत्यक्ष] (perceived by the agent). Examples: @deva[एवं स्म पिता ब्रवीति] 'Thus said the father'; @deva[इति स्मोपाध्यायः कथयति] 'Thus said the preceptor'.
"""

advanced = """
@deva[लट्] with @deva[स्म] when @deva[भूतार्थ], @deva[अनद्यतन], @deva[कर्तृप्रत्यक्ष]. Examples: @deva[एवं स्म पिता ब्रवीति]; @deva[इति स्मोपाध्यायः कथयति].
"""

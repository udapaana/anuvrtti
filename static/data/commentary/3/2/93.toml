id = "3.2.93"
numericId = "32093"

[en]
simple = """
The affix @deva[इनि] comes after the compound verb @deva[विकृ] 'to sell' with past-time meaning when an accusative word is in composition. This applies only when the object carries censure on the agent. Examples: @deva[सोमविक्रयिन्] 'seller of soma plant', @deva[रसविक्रयिन्] 'seller of liquors'—these professions carry disapproval. But @deva[धान्यविक्रायः] 'seller of paddy' (without censure) uses a different affix.
"""

standard = """
@deva[इनि] follows the compound verb @deva[विक्रि] 'to sell' with @deva[भूतार्थ] when the @deva[द्वितीयान्त] @deva[उपपद] carries @deva[निन्दा] (censure) on the agent. Examples: @deva[सोमविक्रयिन्] 'soma-seller', @deva[रसविक्रयिन्] 'liquor-seller'—these professions are disapproved. The repetition of @deva[कर्मणि] (though available via @deva[अनुवृत्ति]) indicates the censure condition. Without @deva[निन्दा]: @deva[धान्यविक्रायः] 'paddy-seller' (uses @deva[अण्]).
"""

advanced = """
@deva[इनि] follows @deva[विक्रि] with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] implies @deva[निन्दा] on the @deva[कर्तृ]. Examples: @deva[सोमविक्रयिन्], @deva[रसविक्रयिन्]. The @deva[कर्मणि] repetition (despite @deva[अनुवृत्ति]) signals the @deva[निन्दार्थ] condition. Counter-example: @deva[धान्यविक्रायः] (no @deva[निन्दा], uses @deva[अण्]).
"""

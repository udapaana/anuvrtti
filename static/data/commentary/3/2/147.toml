id = "3.2.147"
numericId = "32147"

[en]
simple = """
The affix @deva[वुञ्] comes after @deva[देव्] 'to lament' and @deva[क्रुश्] 'to cry' when an @deva[उपसर्ग] is in composition. Examples: @deva[आदेवकः] 'one who laments', @deva[आक्रोशकः] 'reviler', @deva[परिदेवकः], @deva[परिक्रोशकः]. Without @deva[उपसर्ग]: @deva[देवयिता] and @deva[क्रोष्टा] (using @deva[तृन्] from @ref[3.2.135]).
"""

standard = """
@deva[वुञ्] follows @deva[देव्] and @deva[क्रुश्] with @deva[तच्छीलादि] when @deva[उपसर्गयोग]. Examples: @deva[आदेवकः], @deva[आक्रोशकः], @deva[परिदेवकः], @deva[परिक्रोशकः]. Without @deva[उपसर्ग]: @deva[देवयिता], @deva[क्रोष्टा] (@deva[तृन्] by @ref[3.2.135]).
"""

advanced = """
@deva[वुञ्] follows @deva[देव्], @deva[क्रुश्] with @deva[तच्छीलादि] when @deva[उपसर्गयोग]. Examples: @deva[आदेवकः], @deva[आक्रोशकः]. Without @deva[उपसर्ग]: @deva[देवयिता], @deva[क्रोष्टा] (@deva[तृन्]).
"""

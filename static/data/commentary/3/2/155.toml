id = "3.2.155"
numericId = "32155"

[en]
simple = """
The affix @deva[षाकन्] comes after five verbs to denote habitual action: @deva[जल्प्] (to chatter), @deva[भिक्ष्] (to beg), @deva[कुट्ट] (to cut), @deva[लुण्ट] (to steal), @deva[वृङ्] (to choose). The @deva[ष्] marker means feminine forms take @deva[ङीष्] (long @deva[ई]). Examples: @deva[जल्पाकः] (talkative person), @deva[भिक्षाकः] (beggar), @deva[कुट्टाकः] (cutter), @deva[लुण्टाकः] (thief), @deva[वराकः] (miserable). Feminine: @deva[जल्पाकी].
"""

standard = """
The affix @deva[षाकन्] applies after @deva[जल्प्], @deva[भिक्ष्], @deva[कुट्ट], @deva[लुण्ट], @deva[वृङ्] in @deva[तच्छीलादि] sense. The @deva[ष्] is @deva[इत्], indicating by @ref[4.1.41] that feminines take @deva[ङीष्] (long @deva[ई]). Examples: @deva[जल्पाकः] (chatterbox), @deva[भिक्षाकः] (professional beggar), @deva[कुट्टाकः] (one who cuts), @deva[लुण्टाकः] (robber), @deva[वराकः] (lowly, wretched). Feminine forms: @deva[जल्पाकी], @deva[भिक्षाकी], etc.
"""

advanced = """
@deva[षाकन्] after @deva[जल्प्], @deva[भिक्ष्], @deva[कुट्ट], @deva[लुण्ट], @deva[वृङ्] in @deva[तच्छीलादि] sense. The @deva[ष्] is @deva[इत्] by @ref[1.3.3], triggering @deva[ङीष्] in feminine by @ref[4.1.41]. Derivations: @deva[जल्पाकः] (talkative), @deva[भिक्षाकः] (mendicant), @deva[कुट्टाकः] (cutter), @deva[लुण्टाकः] (plunderer), @deva[वराकः] (from @deva[वृङ्] - pitiable, wretched). Feminine paradigm: @deva[जल्पाकी], @deva[भिक्षाकी], etc.
"""

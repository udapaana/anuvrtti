id = "3.2.97"
numericId = "32097"

[en]
simple = """
The affix @deva[ड] comes after the verb @deva[जन्] 'to be born' with past-time meaning when the upapada is in the locative case. Examples: @deva[उपसरजः] 'born of the first conception' (from @deva[उपसरे जातः]), @deva[मन्दुरजः] 'born in the stable'. Derivation: @deva[जन्] + @deva[ड] → @deva[ज] (@ref[6.4.143] elides the @deva[न्]).
"""

standard = """
@deva[ड] follows @deva[जन्] 'to be born' with @deva[भूतार्थ] when the @deva[उपपद] is @deva[सप्तम्यन्त] (locative). Examples: @deva[उपसरे जातः] = @deva[उपसरजः] 'born of the first conception'; @deva[मन्दुरजः] 'born in the stable'. Derivation: @deva[जन्] + @deva[ड] → @deva[ज्] + @deva[अ] (@ref[6.4.143] @deva[नलोप]) → @deva[ज].
"""

advanced = """
@deva[ड] follows @deva[जन्] with @deva[भूतार्थ] when @deva[उपपद] is @deva[सप्तम्यन्त]. Examples: @deva[उपसरजः], @deva[मन्दुरजः]. Derivation: @deva[जन्] + @deva[ड] → @deva[ज्] + @deva[अ] (@ref[6.4.143]) → @deva[ज].
"""

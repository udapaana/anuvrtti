id = "3.2.87"
numericId = "32087"

[en]
simple = """
The affix @deva[क्विप्] comes after the verb @deva[हन्] 'to kill' with past-time meaning when the accusative upapada is @deva[ब्रह्म], @deva[भ्रूण] 'fetus', or @deva[वृत्र]. Examples: @deva[ब्रह्महा] 'one who has killed a @[brāhmaṇa]', @deva[भ्रूणहा] 'one who has killed a fetus', @deva[वृत्रहा] 'slayer of @[vṛtra]' (epithet of Indra). This is a restrictive rule: @deva[हन्] takes @deva[क्विप्] only with these specific upapadas.
"""

standard = """
@deva[क्विप्] follows @deva[हन्] with @deva[भूतार्थ] when the @deva[द्वितीयान्त] @deva[उपपद] is @deva[ब्रह्म], @deva[भ्रूण], or @deva[वृत्र]. Examples: @deva[ब्रह्महन्], nominative @deva[ब्रह्महा] '@[brāhmaṇa-slayer]'; @deva[भ्रूणहा] 'fetus-slayer'; @deva[वृत्रहा] '@[vṛtra-slayer]' (Indra's epithet). Though @deva[क्विप्] was already available via @ref[3.2.76], this @[sūtra] makes a @deva[नियम]: four-fold restriction applies—(1) @deva[उपपद] must be @deva[ब्रह्म] etc., (2) verb must be @deva[हन्], (3) only @deva[क्विप्] for past sense, (4) past tense only. Counter-examples: @deva[पुरुषं हतवान्]; @deva[ब्राह्मणं हन्ति].
"""

advanced = """
@deva[क्विप्] follows @deva[हन्] with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] is @deva[ब्रह्म], @deva[भ्रूण], or @deva[वृत्र]. Examples: @deva[ब्रह्महन्] → @deva[ब्रह्महा], @deva[भ्रूणहा], @deva[वृत्रहा]. Despite @deva[क्विप्] being available via @ref[3.2.76], this @[sūtra] establishes a @deva[नियम] with four-fold restriction (@deva[चातुर्विध्य]): (1) @deva[उपपद] restricted to @deva[ब्रह्म] etc., (2) @deva[धातु] restricted to @deva[हन्], (3) only @deva[क्विप्] for @deva[भूतार्थ], (4) @deva[भूतकाल] only. This anticipates the @deva[बहुलम्] of the next @[sūtra].
"""

id = "3.2.127"
numericId = "32127"

[en]
simple = """
The affixes @deva[शतृ] and @deva[शानच्] are collectively called @deva[सत्]. This name frees them from the previous conditions—they can replace not only @deva[लट्] (Present tense) affixes but also Future (@ref[3.3.14]) and other tenses. Examples: @deva[ब्राह्मणस्य कुर्वन्], @deva[करिष्यन्], @deva[कुर्वाणः], @deva[करिष्यमाणः]. The term @deva[सत्] appears in @ref[2.2.11] etc.
"""

standard = """
@deva[शतृ] and @deva[शानच्] are collectively termed @deva[सत्]. This @deva[संज्ञा] removes the restrictions—they replace not only @deva[लट्] but also @deva[लृट्] (@ref[3.3.14]) and other @deva[लकार]s. Examples: @deva[ब्राह्मणस्य कुर्वन्], @deva[करिष्यन्], @deva[कुर्वाणः], @deva[करिष्यमाणः]. The term @deva[सत्] occurs in @ref[2.2.11] etc.
"""

advanced = """
@deva[शतृ]/@deva[शानच्] are termed @deva[सत्]—removing restrictions. They replace @deva[लट्], @deva[लृट्] (@ref[3.3.14]), etc. Examples: @deva[कुर्वन्], @deva[करिष्यन्], @deva[कुर्वाणः], @deva[करिष्यमाणः]. @deva[सत्] in @ref[2.2.11] etc.
"""

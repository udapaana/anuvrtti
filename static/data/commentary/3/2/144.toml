id = "3.2.144"
numericId = "32144"

[en]
simple = """
This rule prescribes the affix @deva[घिनुण्] after the verb @deva[लष्] (to desire) when it is compounded with either the prefix @deva[अप] or the prefix @deva[वि]. The word @deva[च] (and) in the sūtra brings in @deva[वि] alongside @deva[अप].

Examples: @deva[अपलाषी] (one who is characteristically without desire, or one who is thirsty), @deva[विलाषी] (one who is desirous or coquettish by nature).

Without either prefix, @deva[लष्] would take the default @deva[तृन्] affix from @ref[3.2.135], producing @deva[लषिता] instead.
"""

standard = """
This @[vidhi] prescribes @deva[घिनुण्] after @deva[लष्] (to desire) in the @deva[तच्छीलादि] sense, conditioned on the presence of @deva[अप] or @deva[वि] as @deva[उपसर्ग].

Worked examples:

1. @deva[अप] + @deva[लष्] + @deva[घिनुण्] = @deva[अपलाषी] (one habitually without desire; or one who is thirsty).
2. @deva[वि] + @deva[लष्] + @deva[घिनुण्] = @deva[विलाषी] (one given to desirous or coquettish behavior).

The @deva[वि] is supplied by @deva[च] (the conjunction "and" in the sūtra text), which extends the rule beyond @deva[अप] alone.

Scope: Without either @deva[उपसर्ग], the general @deva[तृन्] rule (@ref[3.2.135]) applies, giving @deva[लषिता].
"""

advanced = """
This rule continues the @deva[घिनुण्] prescription under the @deva[तच्छीलादि] @deva[अधिकार] of @ref[3.2.134], specifying @deva[लष्] with @deva[अप] or @deva[वि] as @deva[उपसर्ग].

The @deva[अनुवृत्ति] chain: @deva[घिनुण्] from @ref[3.2.142]; @deva[तच्छीलादि] from @ref[3.2.134]. The @deva[वि] is read from @ref[3.2.143] by the force of @deva[च].

This is the third consecutive @deva[उपसर्ग]-conditioned @deva[घिनुण्] rule after @ref[3.2.143]. The pattern of specifying individual @deva[उपसर्ग] combinations rather than allowing free prefixation demonstrates that the @deva[घिनुण्] affix is tightly restricted -- it applies only in the enumerated combinations, not as a general option for any prefix with these roots.

Cross-references: @ref[3.2.142] (main @deva[घिनुण्] rule), @ref[3.2.143] (preceding @deva[उपसर्ग]-conditioned rule), @ref[3.2.145] (next rule, also @deva[उपसर्ग]-conditioned @deva[घिनुण्]).
"""

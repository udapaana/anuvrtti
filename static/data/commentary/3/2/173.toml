id = "3.2.173"
numericId = "32173"

[en]
simple = """
The affix @deva[आरु] comes after @deva[शॄ] (to injure) and @deva[वन्द्] (to praise, salute) to denote habitual action. Examples: @deva[शरारुः] (noxious, a mischievous animal), @deva[वन्दारुः] (praising, a bard).
"""

standard = """
The affix @deva[आरु] applies after @deva[शॄ] (to harm) and @deva[वन्द्] (to praise, bow) in @deva[तच्छीलादि] sense. Formations: @deva[शरारुः] (harmful creature, mischief-maker); @deva[वन्दारुः] (one who habitually praises - a bard, panegyrist).
"""

advanced = """
@deva[आरु] after @deva[शॄ] and @deva[वन्द्] in @deva[तच्छीलादि] sense. Derivations: @deva[शॄ] + @deva[आरु] = @deva[शरारुः] (injurious - epithet for harmful animals); @deva[वन्द्] + @deva[आरु] = @deva[वन्दारुः] (eulogist, bard - one habitually engaged in praise).
"""

id = "3.2.15"
numericId = "32015"

[en]
simple = """
The affix @deva[अच्] is used after @deva[शी] 'to lie/sleep' when the @deva[उपपद] denotes a **location** (locative case).

**Example:**
- @deva[खे शेते] = @deva[खशयः] 'one who lies in the sky'

**Also with @deva[पार्श्व] etc.:**
- @deva[पार्श्वाभ्यां शेते] = @deva[पार्श्वशयः] 'one who lies on his sides'
- @deva[उदरेण शेते] = @deva[उदरशयः] 'one who lies on stomach'
- @deva[पृष्ठेन शेते] = @deva[पृष्ठशयः] 'one who lies on back'
"""

standard = """
The affix @deva[अच्] comes after @deva[शी] 'to lie down' when in composition with a locative word indicating location (@deva[अधिकरण]).

| Sentence | Compound | Meaning |
|----------|----------|--------|
| @deva[खे शेते] | @deva[खशयः] | lying in the sky |
| @deva[पार्श्वाभ्यां शेते] | @deva[पार्श्वशयः] | lying on sides |
| @deva[उदरेण शेते] | @deva[उदरशयः] | lying on stomach |
| @deva[पृष्ठेन शेते] | @deva[पृष्ठशयः] | lying on back |

**@[vārtika] 1:** @deva[अच्] after @deva[शी] with @deva[पार्श्व] etc., even when not strictly locative.

**@[vārtika] 2:** With @deva[उत्तान] etc. in nominative denoting agent: @deva[उत्तानशयः] 'one who lies supine'.

**Vedic:** @deva[डच्] after @deva[शी] with @deva[गिरि]: @deva[गिरिशः] 'who lies on the mountain'.
"""

advanced = """
The affix @deva[अच्] comes after the verb @deva[शी] 'to lie down' when in composition with a case-inflected word indicating location i.e. in the Locative -7th-case. The word @deva[सुप्] @ref[3.2.4] a noun ending in a case-affix is understood in this aphorism. As @deva[खे] @deva[शेते] = @deva[खशयः] 'who lies in the sky'. Vart:- The affix @deva[अच्] comes after the verb @deva[शी] when in composition with the words @deva[पार्श्व] 'ribs', &c., though not necessarily denoting location; as @deva[पार्श्वाभ्यां] @deva[शेते] = @deva[पार्श्वशयः] 'who reclines on his sides', @deva[उदरशयः] 'who lies on his stomach', @deva[पृष्ठशयः] 'who lies on his back'. Vart:- And when the verb @deva[शी] is preceded by the word @deva[दिग्धसह]; as @deva[दिग्धेन] @deva[सह] @deva[शेते] = @deva[दिग्धसहशयः] @deva[॥] Vart:- So also when the words @deva[उत्तान] &c. are in composition with it denoting agent and in the nominative case. As @deva[उत्तानः] @deva[शेते] = @deva[उत्तानशयः] I @deva[अवमूर्द्धा] @deva[शेते] = @deva[अवमूर्द्धाशयः] @deva[।] Vart:- In the @[chhandas] the affix @deva[डच्] comes after the verb @deva[शी] when in composition with the word @deva[गिरि] in the locative. As @deva[गिरौ] @deva[शेते] = @deva[गिरिशः] 'who lies on the mountain'. The letter @deva[ड] of @deva[डच्] is indicatory denoting that there is elision of the final vowel with what follows it @ref[1.1.64].
"""

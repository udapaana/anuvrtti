id = "3.2.150"
numericId = "32150"

[en]
simple = """
The affix @deva[युच्] comes after @deva[जु] 'to go quickly', @deva[चङ्क्रम्य] 'to move about', @deva[दन्द्रम्य] 'to wander', @deva[सृ] 'to flow', @deva[गृध्] 'to be greedy', @deva[ज्वल्] 'to burn', @deva[शुच्] 'to grieve', @deva[लष्] 'to desire', @deva[पत्] 'to fall', @deva[पद्] 'to move' in the sense of 'agent having such habit etc.' @deva[जु] is a @deva[सौत्र धातु] (taught only in @[sūtras], not in @[dhātupāṭha]). Examples: @deva[जवनः] 'swift horse' (@ref[7.1.1], @ref[7.3.84], @ref[6.1.78]), @deva[चङ्क्रमणः] 'moving about' (@ref[2.4.74] @deva[यलोप]), @deva[दन्द्रमणः] 'wandering', @deva[सरणः] 'flowing', @deva[गर्धनः] 'greedy', @deva[ज्वलनः] 'burning', @deva[शोचनः] 'grieving', @deva[लषणः] 'desiring', @deva[पतनः] 'falling', @deva[पदनः] 'moving'. The inclusion of @deva[पद्] (a @deva[चलनार्थ] verb covered by @ref[3.2.148]) indicates either: (1) this @[sūtra] applies to transitive verbs too, or (2) establishes the @deva[परिभाषा] that @ref[3.1.94] doesn't apply to @deva[तच्छील] affixes.
"""

standard = """
@deva[युच्] follows @deva[जु], @deva[चङ्क्रम्य], @deva[दन्द्रम्य], @deva[सृ], @deva[गृध्], @deva[ज्वल्], @deva[शुच्], @deva[लष्], @deva[पत्], @deva[पद्] with @deva[तच्छीलादि]. @deva[जु] is @deva[सौत्र धातु] (not in @[dhātupāṭha]). Examples: @deva[जु] + @deva[युच्] = @deva[जो] + @deva[अन] (@ref[7.1.1], @ref[7.3.84]) = @deva[जवनः] (@ref[6.1.78]) 'swift horse'; @deva[चङ्क्रम्य] + @deva[युच्] = @deva[चङ्क्रमणः] (@ref[2.4.74] @deva[यलोप]); @deva[दन्द्रमणः], @deva[सरणः], @deva[गर्धनः], @deva[ज्वलनः], @deva[शोचनः], @deva[लषणः], @deva[पतनः], @deva[पदनः]. @deva[पद्] inclusion (@deva[चलनार्थ], covered by @ref[3.2.148]) indicates: (1) transitive verbs included, or (2) @deva[ज्ञापक] for @deva[परिभाषा] that @ref[3.1.94] doesn't apply to @deva[तच्छीलादि]. The @deva[ज्ञापक] is @deva[अनित्य]: @deva[गन्ता खेटं विकत्थनः] (both affixes).
"""

advanced = """
@deva[युच्] follows @deva[जु], @deva[चङ्क्रम्य], @deva[दन्द्रम्य], @deva[सृ], @deva[गृध्], @deva[ज्वल्], @deva[शुच्], @deva[लष्], @deva[पत्], @deva[पद्] with @deva[तच्छीलादि]. @deva[जु] = @deva[सौत्र]. @deva[जवनः], @deva[चङ्क्रमणः] (@ref[2.4.74]), etc. @deva[पद्] = @deva[ज्ञापक] for @deva[परिभाषा] (@ref[3.1.94] non-application to @deva[तच्छीलादि]). @deva[अनित्य]: @deva[गन्ता खेटं विकत्थनः].
"""

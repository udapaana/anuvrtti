id = "3.2.98"
numericId = "32098"

[en]
simple = """
The affix @deva[ड] comes after the verb @deva[जन्] 'to be born' with past-time meaning when the upapada is in the @deva[पञ्चमी] (ablative) case and does not denote a genus. Examples: @deva[बुद्धिजः] 'born through understanding', @deva[संस्कारजः] 'born of habit', @deva[दुःखजः] 'born through pain'. When genus is denoted, no compound: @deva[हस्तिनो जातः] 'born of elephant', @deva[अश्वाज्जातः] 'born of horse'.
"""

standard = """
@deva[ड] follows @deva[जन्] with @deva[भूतार्थ] when the @deva[उपपद] is @deva[पञ्चम्यन्त] (ablative) and non-@deva[जातिवाचक]. Examples: @deva[बुद्धिजः] 'born through understanding'; @deva[संस्कारजः] 'born of habit'; @deva[दुःखजः] 'born through pain'. With @deva[जातिवाचक] @deva[उपपद], no compound: @deva[हस्तिनो जातः] 'born of elephant'; @deva[अश्वाज्जातः] 'born of horse'.
"""

advanced = """
@deva[ड] follows @deva[जन्] with @deva[भूतार्थ] when @deva[उपपद] is @deva[पञ्चम्यन्त] and non-@deva[जातिवाचक]. Examples: @deva[बुद्धिजः], @deva[संस्कारजः], @deva[दुःखजः]. @deva[जातिवाचक] blocks: @deva[हस्तिनो जातः], @deva[अश्वाज्जातः] (no @deva[समास]).
"""

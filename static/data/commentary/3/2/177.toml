id = "3.2.177"
numericId = "32177"

[en]
simple = """
The affix @deva[क्विप्] comes after eight verbs to denote habitual action: @deva[भ्राज्] (to shine), @deva[भास्] (to shine), @deva[धुर्व्] (to injure), @deva[द्युत्] (to shine), @deva[ऊर्ज्] (to be strong), @deva[पॄ] (to fill), @deva[जु] (to move rapidly), and @deva[स्तु] (to praise) when preceded by @deva[ग्रावन्] (stone). Examples: @deva[विभ्राट्] (splendid), @deva[भाः] (light), @deva[धूः] (injurer), @deva[विद्युत्] (lightning), @deva[पूः] (filler), @deva[जूः] (swift), @deva[ग्रावस्तुत्] (stone-worshipper).
"""

standard = """
The affix @deva[क्विप्] applies after @deva[भ्राज्], @deva[भास्], @deva[धुर्व्], @deva[द्युत्], @deva[ऊर्ज्], @deva[पॄ], @deva[जु], and @deva[ग्रावस्तु] in @deva[तच्छीलादि] sense. Formations: @deva[विभ्राज्] → @deva[विभ्राट्] (resplendent); @deva[भास्] → @deva[भाः] (light); @deva[धुर्व्] + @deva[क्विप्] = @deva[धुर्] (by @ref[6.4.21]) → @deva[धूः] (injurer); @deva[द्युत्] → @deva[विद्युत्] (lightning); @deva[पॄ] → @deva[पूः] (filler); @deva[जु] → @deva[जूः] (swift - with vowel lengthening); @deva[ग्रावन्] + @deva[स्तु] + @deva[क्विप्] = @deva[ग्रावस्तुत्] (stone-worshipper, by @ref[6.1.71]).

Though @ref[3.2.76] generally allows @deva[क्विप्], this repetition shows @deva[वासरूपविधि] doesn't apply in @deva[तच्छीलादि] affixes.
"""

advanced = """
@deva[क्विप्] after @deva[भ्राज्], @deva[भास्], @deva[धुर्व्], @deva[द्युत्], @deva[ऊर्ज्], @deva[पॄ], @deva[जु], @deva[ग्रावस्तु] in @deva[तच्छीलादि] sense. Derivations: @deva[भ्राज्] + @deva[क्विप्] = @deva[विभ्राज्], nom. @deva[विभ्राट्]; @deva[भास्] → @deva[भाः]; @deva[धुर्व्] → @deva[धुर्] (by @ref[6.4.21]) → @deva[धूः]; @deva[द्युत्] → @deva[विद्युत्]; @deva[ऊर्ज्] → @deva[ऊर्क्]; @deva[पॄ] → @deva[पूः]; @deva[जु] → @deva[जूः] (vowel lengthening); @deva[ग्रावन्] + @deva[स्तु] → @deva[ग्रावस्तुत्] (by @ref[6.1.71] for @deva[तुक्]). This repetition despite @ref[3.2.76] demonstrates that @deva[वासरूपविधि] is inapplicable in @deva[तच्छीलादि] domain.
"""

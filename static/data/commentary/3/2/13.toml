id = "3.2.13"
numericId = "32013"

[en]
simple = """
The affix @deva[अच्] is used after @deva[रम्] 'to sport' and @deva[जप्] 'to whisper' when @deva[स्तम्ब] 'grass-clump' and @deva[कर्ण] 'ear' are in composition respectively.

**Examples:**
- @deva[स्तम्बे रमते] = @deva[स्तम्बेरमः] 'elephant' (one who sports in grass-clumps)
- @deva[कर्णे जपति] = @deva[कर्णेजपः] 'tale-bearer' (one who whispers in ears)

These are specialized formations with specific meanings.
"""

standard = """
The affix @deva[अच्] comes after @deva[रम्] 'to sport' and @deva[जप्] 'to whisper' when @deva[स्तम्ब] and @deva[कर्ण] are in composition.

| Root | @deva[उपपद] | Compound | Meaning |
|------|------------|----------|--------|
| @deva[रम्] | @deva[स्तम्ब] | @deva[स्तम्बेरमः] | elephant |
| @deva[जप्] | @deva[कर्ण] | @deva[कर्णेजपः] | tale-bearer, slanderer |

Since @deva[रम्] is intransitive and @deva[जप्] takes limited objects, the @deva[उपपद] here is a general case-inflected word (@deva[सुप्]), not necessarily accusative.

**@[vārtika]:** This applies only when the meanings are 'elephant' and 'tale-bearer'. Otherwise: @deva[स्तम्बे रन्ता] 'one who plays in grass', @deva[कर्णे जपिता मशकः] 'the mosquito that hums near the ear'.
"""

advanced = """
The affix @deva[अच्] comes after the verb @deva[रम्] 'to sport' and @deva[जप्] 'to whisper' when the case-inflected words @deva[स्तम्भ] 'a clump of grass' and @deva[कर्ण] 'ear' are in composition with them respectively. The verb @deva[रम्] is intransitive and the verb @deva[जप्] can take an object under very limited circumstances, only namely when the object denotes @[sabda] ; therefore in the case of both these verbs, the object cannot be in composition as an @deva[द्वितीया] (accusative) case; therefore, the @[upapada] here must be a general case-inflected word. Hence we have read the @[anuvritti] of the word @deva[सुप्] from @[sutra] 4 into this, the @[anuvritti] of the word @deva[कर्म्म] being inapplicable here. Vart:- The words to be formed must have the sense of 'elephant' and a 'tale-bearer'. Thus @deva[स्तम्बेरमते] = @deva[स्तम्बेरमः] 'an elephant (lit. who sports in cluster of grass)' @deva[कर्णे] @deva[जपति] = @deva[कर्णेजपः] 'a slanderer (lit. who whispers in the ear)'. The affix @deva[अच्] is not employed when the words to be formed do not mean an 'elephant' and a 'traducer'. Thus @deva[स्तम्बे] @deva[रन्ता] 'who plays in clusters of grass'. @deva[कर्णे] @deva[जपिता] @deva[मशकः] 'the mosquito that hums near the ear'.
"""

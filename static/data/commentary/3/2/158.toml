id = "3.2.158"
numericId = "32158"

[en]
simple = """
The affix @deva[आलुच्] comes after seven verbs to denote habitual tendency: @deva[स्पृह्] (to desire), @deva[गृह्] (to seize), @deva[पत्] (to go), @deva[दय्] (to give/protect), @deva[निद्रा] (to sleep), @deva[तन्द्रा] (to be tired), @deva[श्रद्धा] (to venerate). Examples: @deva[स्पृहयालुः] (desirous), @deva[गृहयालुः] (grasping), @deva[पतयालुः] (prone to fall), @deva[दयालुः] (compassionate), @deva[निद्रालुः] (sleepy), @deva[तन्द्रालुः] (slothful), @deva[श्रद्धालुः] (faithful).
"""

standard = """
The affix @deva[आलुच्] applies after @deva[स्पृह्], @deva[गृह्], @deva[पत्], @deva[दय्], @deva[निद्रा], @deva[तन्द्रा], @deva[श्रद्धा] in @deva[तच्छीलादि] sense. The first three are @deva[चुरादि] (class 10) and take @deva[णिच्]. Etymology: @deva[निद्रा] = @deva[नि] + @deva[द्रा] (to go crookedly); @deva[तन्द्रा] = @deva[तद्] + @deva[द्रा] with @deva[द्] → @deva[न्]; @deva[श्रद्धा] = @deva[श्रत्] + @deva[धा]. The @deva[अय्] is added by @ref[6.4.55]. Examples: @deva[दयालुः] (merciful), @deva[श्रद्धालुः] (devout).

@[vārtika]: @deva[आलुच्] also comes after @deva[शीङ्] (to lie down) → @deva[शयालुः] (prone to lying down).
"""

advanced = """
@deva[आलुच्] after @deva[स्पृह्], @deva[गृह्], @deva[पत्], @deva[दय्], @deva[निद्रा], @deva[तन्द्रा], @deva[श्रद्धा] in @deva[तच्छीलादि] sense. The @deva[चुरादि] roots (@deva[स्पृह्], @deva[गृह्], @deva[पत्]) take @deva[णिच्]. Etymology: @deva[निद्रा] = @deva[नि] + @deva[द्रा]; @deva[तन्द्रा] = @deva[तम्] + @deva[द्रा] with @deva[म्] → @deva[न्]; @deva[श्रद्धा] = @deva[श्रत्] + @deva[डुधाञ्]. The @deva[अय्] augment by @ref[6.4.55]. Formations: @deva[स्पृहयालुः], @deva[गृहयालुः], @deva[पतयालुः], @deva[दयालुः], @deva[निद्रालुः], @deva[तन्द्रालुः], @deva[श्रद्धालुः].

@note[type=@[vārtika]]: @deva[आलुच्] also after @deva[शीङ्] → @deva[शयालुः].
"""

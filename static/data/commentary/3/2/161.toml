id = "3.2.161"
numericId = "32161"

[en]
simple = """
The affix @deva[घुरच्] comes after three verbs to denote habitual action: @deva[भञ्ज्] (to break), @deva[भास्] (to shine), @deva[भिद्] (to be fat). The @deva[घ्] marker causes palatals to become gutturals. Examples: @deva[भङ्गुरः] (brittle, fragile), @deva[भासुरं ज्योतिः] (splendid light), @deva[मेदुरः पशुः] (a fat beast). After @deva[भञ्ज्], it gives reflexive meaning - that which naturally breaks of itself.
"""

standard = """
The affix @deva[घुरच्] applies after @deva[भञ्ज्], @deva[भास्], @deva[भिद्] (= @deva[मिद्] 'to be fat') in @deva[तच्छीलादि] sense. The @deva[घ्] is @deva[इत्], causing @deva[कुत्व] (palatal → guttural) by @ref[7.3.52]. Derivation of @deva[भङ्गुर]: @deva[भञ्ज्] + @deva[घुरच्] → @deva[भङ्ग्] + @deva[उर] → @deva[भङ्गुरः] (brittle). Similarly: @deva[भासुरम्] (radiant), @deva[मेदुरः] (corpulent). After @deva[भञ्ज्], the affix gives reflexive sense - what breaks by itself.
"""

advanced = """
@deva[घुरच्] after @deva[भञ्ज्], @deva[भास्], @deva[मिद्] (to be fat) in @deva[तच्छीलादि] sense. The @deva[घ्] is @deva[इत्], triggering @deva[कुत्व] by @ref[7.3.52]. Derivation: @deva[भञ्ज्] + @deva[घुरच्] = @deva[भङ्ग्] + @deva[उर] = @deva[भङ्गुरः] (fragile - reflexive sense: breaks of itself). @deva[भास्] + @deva[घुरच्] = @deva[भासुरम्] (resplendent). @deva[मिद्] + @deva[घुरच्] = @deva[मेदुरः] (fat). Examples: @deva[भासुरं ज्योतिः] (brilliant light), @deva[मेदुरः पशुः] (corpulent animal).
"""

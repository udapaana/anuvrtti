id = "3.2.100"
numericId = "32100"

[en]
simple = """
The affix @deva[ड] comes after the verb @deva[जन्] 'to be born' with past-time meaning when the prefix @deva[अनु] is used and an accusative word is in composition. Examples: @deva[पुमनुजा] 'a girl born after a male child' (i.e., a girl with an elder brother), @deva[स्त्र्यनुजः] 'a boy born after a female child' (i.e., a boy with an elder sister).
"""

standard = """
@deva[ड] follows @deva[जन्] with @deva[भूतार्थ] when @deva[अनु] is the @deva[उपसर्ग] and a @deva[द्वितीयान्त] word is in composition. Examples: @deva[पुमनुजा] 'a girl born after a male' (girl with elder brother); @deva[स्त्र्यनुजः] 'a boy born after a female' (boy with elder sister).
"""

advanced = """
@deva[ड] follows @deva[अनुजन्] with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] is in composition. Examples: @deva[पुमनुजा] 'girl born after male'; @deva[स्त्र्यनुजः] 'boy born after female'.
"""

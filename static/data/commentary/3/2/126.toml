id = "3.2.126"
numericId = "32126"

[en]
simple = """
@deva[शतृ] and @deva[शानच्] substitute for @deva[लट्] (Present tense) when expressing an attendant characteristic (@deva[लक्षण]) or the cause (@deva[हेतु]) of an action. For @deva[लक्षण]: @deva[शयानाः भुञ्जते यवनाः] 'the Yavanas eat lying down'; @deva[तिष्ठन्तोऽनुशासति गणकाः] 'the accountants teach standing'. For @deva[हेतु]: @deva[हरिं पश्यन् मुच्यते] 'by seeing Hari, he gets liberation'; @deva[अधीयानो वसति] 'he dwells here for the sake of study'. Not when participle characterizes a substance or quality: @deva[यः कम्पते सोऽश्वत्थः] 'that which shakes is the @[aśvattha] tree'.
"""

standard = """
@deva[शतृ]/@deva[शानच्] replace @deva[लट्] when expressing @deva[क्रियालक्षण] (action's characteristic) or @deva[क्रियाहेतु] (action's cause). @deva[लक्षण] examples: @deva[शयानाः भुञ्जते यवनाः] 'Yavanas eat lying down'; @deva[तिष्ठन्तोऽनुशासति गणकाः]. @deva[हेतु] examples: @deva[हरिं पश्यन् मुच्यते] 'seeing Hari, he is liberated'; @deva[अधीयानो वसति] 'he dwells for study'. Not @deva[द्रव्य]/@deva[गुण] characteristic: @deva[यः कम्पते सोऽश्वत्थः]; @deva[यदुत्प्लवते तल्लघु]; @deva[यन्निषीदति तद्गुरु]. @deva[वार्त्तिक]s: defines @deva[कर्तृ]—@deva[योऽधीयान आस्ते स देवदत्तः]; states @deva[नित्य]—@deva[शयाना वर्धते दूर्वा], @deva[आसीनं वर्धते बिसम्]. The compound @deva[लक्षणहेत्वोः] contradicts @ref[2.2.14] (fewer syllables first)—showing that rule is not universal.
"""

advanced = """
@deva[शतृ]/@deva[शानच्] replace @deva[लट्] when @deva[क्रियालक्षण] or @deva[क्रियाहेतु]. @deva[लक्षण]: @deva[शयानाः भुञ्जते यवनाः]. @deva[हेतु]: @deva[हरिं पश्यन् मुच्यते]. Not @deva[द्रव्य]/@deva[गुणलक्षण]: @deva[यः कम्पते सोऽश्वत्थः]. @deva[वार्त्तिक]s: @deva[कर्तृनिर्धारण]—@deva[योऽधीयान आस्ते स देवदत्तः]; @deva[नित्यत्व]—@deva[शयाना वर्धते दूर्वा]. @deva[लक्षणहेत्वोः] compound contradicts @ref[2.2.14]—@deva[अनित्यता].
"""

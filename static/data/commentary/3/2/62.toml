id = "3.2.62"
numericId = "32062"

[en]
simple = """
The affix @deva[ण्वि] comes after @deva[भज्] 'to share' when in composition with a case-ending word (including @deva[उपसर्ग]).

**Examples:**
- @deva[अर्धं भजते] = @deva[अर्धभाक्] 'sharing a half'
- @deva[प्रभाक्] 'division' (with @deva[उपसर्ग] @deva[प्र])
"""

standard = """
The affix @deva[ण्वि] comes after @deva[भज्] 'to share' with @deva[सुप्]-ending word (including @deva[उपसर्ग]).

@deva[उपसर्ग] and @deva[सुपि] understood from @ref[3.2.61].

**Derivation:** @deva[अर्धं भजते] = @deva[अर्धभाज्], nom. @deva[अर्धभाक्] 'sharing a half'

**With @deva[उपसर्ग]:** @deva[प्रभाक्] 'division'
"""

advanced = """

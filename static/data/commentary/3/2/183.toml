id = "3.2.183"
numericId = "32183"

[en]
simple = """
The affix @deva[ष्ट्रन्] comes after @deva[पू] (to purify) in the instrumental sense when the word denotes a part of a plough or of a hog. The verb @deva[पू] includes both @deva[पूङ्] and @deva[पूञ्]. Examples: @deva[पोत्रम्] (ploughshare), @deva[पोत्रम्] (snout of a hog).
"""

standard = """
The affix @deva[ष्ट्रन्] applies after @deva[पू] (to purify) in @deva[करण] (instrument) sense when denoting a body part of a plough or hog. Both @deva[पूङ्] and @deva[पूञ्] are included. Formations: @deva[पोत्रम्] (ploughshare - the 'purifying' part that turns earth); @deva[पोत्रम्] (hog's snout - used for rooting).
"""

advanced = """
@deva[ष्ट्रन्] after @deva[पू] in @deva[करणे] sense when denoting @deva[सीरावयव] (plough-part) or @deva[वराहावयव] (hog-part). Both @deva[पूङ्] (@[bhvādi]) and @deva[पूञ्] (@[svādi]) are covered. Formation: @deva[पू] + @deva[ष्ट्रन्] = @deva[पोत्रम्] (ploughshare; hog's snout). The semantic restriction (@deva[नियम]) limits this to agricultural implements and animal anatomy.
"""

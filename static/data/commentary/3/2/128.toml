id = "3.2.128"
numericId = "32128"

[en]
simple = """
The affix @deva[शानन्] comes after the verbs @deva[पू] 'to purify' and @deva[यज्] 'to sacrifice'. Examples: @deva[पवमानः] 'purifier' (fire or air), @deva[यजमानः] 'sacrificer'. Question: Is @deva[शानन्] an independent affix or a @deva[ल]-substitute like @deva[शतृ]/@deva[शानच्]? If independent, @ref[2.3.65] would require genitive; if @deva[ल]-substitute, @ref[2.3.69] would block genitive. Answer: They are not @deva[ल]-substitutes (not so taught), yet @ref[2.3.69] applies because @deva[तृन्] in that @[sūtra] is a @deva[प्रत्याहार] from @deva[शतृ] to @deva[तृन्] (@ref[3.2.135]), including @deva[शानन्] etc.
"""

standard = """
@deva[शानन्] follows @deva[पू] 'to purify' and @deva[यज्] 'to sacrifice'. Examples: @deva[पवमानः] 'purifier'; @deva[यजमानः] 'sacrificer'. Question: Is @deva[शानन्] @deva[प्रत्यय] or @deva[लादेश]? If @deva[प्रत्यय], @ref[2.3.65] requires @deva[षष्ठी]; if @deva[लादेश], @ref[2.3.69] blocks @deva[षष्ठी]. Answer: Not @deva[लादेश] (not so taught). Yet @deva[सोमं पवमानः], @deva[नडमाघ्नानः] show @deva[द्वितीया]. Explanation: @deva[तृन्] in @ref[2.3.69] is @deva[प्रत्याहार] from @deva[शतृ] (@ref[3.2.124]) to @deva[तृन्] (@ref[3.2.135])—including @deva[शानन्] etc. @deva[वार्त्तिक]: @ref[2.3.69] is @deva[विभाषा] with @deva[द्विष्] + @deva[शतृ]: @deva[चोरस्य] or @deva[चोरं द्विषन्].
"""

advanced = """
@deva[शानन्] follows @deva[पू], @deva[यज्]. Examples: @deva[पवमानः], @deva[यजमानः]. Not @deva[लादेश] (not taught so). @ref[2.3.69] applies because @deva[तृन्] there is @deva[प्रत्याहार] @deva[शतृ]-to-@deva[तृन्] (@ref[3.2.124]-@ref[3.2.135]), including @deva[शानन्]. @deva[वार्त्तिक]: @ref[2.3.69] @deva[विभाषा] with @deva[द्विष्] + @deva[शतृ]: @deva[चोरस्य]/@deva[चोरं] @deva[द्विषन्].
"""

id = "3.2.92"
numericId = "32092"

[en]
simple = """
The affix @deva[क्विप्] comes after the verb @deva[चि] with past-time meaning when the accusative upapada denotes an object, provided the complete word is a name of fire (arranged for sacrifice). Examples: @deva[श्येनचित्] 'fire arranged in the shape of a hawk', @deva[कङ्कचित्] 'fire arranged in the shape of a heron'. These are @deva[रूढि] (conventional) words—their meaning depends on usage, referring to specific brick arrangements in sacrificial contexts.
"""

standard = """
@deva[क्विप्] follows @deva[चि] with @deva[भूतार्थ] when the @deva[द्वितीयान्त] @deva[उपपद] denotes @deva[कर्म] and the complete word is @deva[आख्या] (name) of a fire. Examples: @deva[श्येनचित्] 'fire arranged like a hawk'; @deva[कङ्कचित्] 'fire arranged like a heron'. The @deva[आख्या] indicates these are @deva[रूढि] words—their sense depends on convention (@deva[रूढ्यर्थ]) rather than etymology. These names refer to specific arrangements of bricks (@deva[इष्टका]) for sacrificial fires.
"""

advanced = """
@deva[क्विप्] follows @deva[चि] with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] denotes @deva[कर्म] and the @deva[समुदितार्थ] is @deva[अग्न्याख्या]. Examples: @deva[श्येनचित्], @deva[कङ्कचित्]. The term @deva[आख्या] indicates @deva[रूढि]—meaning determined by usage rather than etymology. These denote specific @deva[इष्टकाचयन] (brick arrangements) for sacrificial fires.
"""

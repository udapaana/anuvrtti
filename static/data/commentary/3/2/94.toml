id = "3.2.94"
numericId = "32094"

[en]
simple = """
The affix @deva[क्वनिप्] comes after the verb @deva[दृश्] 'to see' with past-time meaning when an accusative word is in composition. Examples: @deva[मेरुदृश्वा] 'one who has seen Mount Meru', @deva[परलोकदृश्वा] 'one who has seen the hereafter'. Though @deva[क्वनिप्] was already available by @ref[3.2.75], its repetition here shows that no other affix applies in this sense after @deva[दृश्].
"""

standard = """
@deva[क्वनिप्] follows @deva[दृश्] 'to see' with @deva[भूतार्थ] when a @deva[द्वितीयान्त] @deva[उपपद] is in composition. Examples: @deva[मेरुदृश्वन्], nominative @deva[मेरुदृश्वा] 'one who has seen Meru'; @deva[परलोकदृश्वा] 'one who has seen the hereafter'. Though @deva[क्वनिप्] was available via @ref[3.2.75], its repetition establishes a @deva[नियम]: only @deva[क्वनिप्] (no other affix) applies to @deva[दृश्] with this meaning.
"""

advanced = """
@deva[क्वनिप्] follows @deva[दृश्] with @deva[भूतार्थ] and @deva[द्वितीयान्त] @deva[उपपद]. Examples: @deva[मेरुदृश्वन्] → @deva[मेरुदृश्वा], @deva[परलोकदृश्वा]. Despite @deva[क्वनिप्] being available via @ref[3.2.75], this repetition establishes a @deva[नियम]: only @deva[क्वनिप्] applies to @deva[दृश्] in @deva[भूतार्थ].
"""

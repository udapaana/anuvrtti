id = "3.2.185"
numericId = "32185"

[en]
simple = """
The affix @deva[इत्र] comes after @deva[पू] (to purify) in the instrumental sense when the meaning is simply a name (appellative), not descriptive. Both @deva[पूङ्] and @deva[पूञ्] are included. This forms @deva[पवित्रम्] - a purifying instrument like a sieve or strainer, also the two blades of kusha grass used in sacrifices, the sacred thread, or clarified butter.
"""

standard = """
The affix @deva[इत्र] applies after @deva[पू] in @deva[करण] sense when @deva[संज्ञायाम्] (simply appellative, not descriptive). Both @deva[पूङ्] and @deva[पूञ्] are covered. Formation: @deva[पवित्रम्] (purifying instrument). Meanings: (1) strainer/sieve, (2) two kusha-grass blades for sacrificial purification and sprinkling ghee, (3) sacred thread, (4) clarified butter, etc.
"""

advanced = """
@deva[इत्र] after @deva[पू] in @deva[करणे] sense when @deva[संज्ञायाम्] (appellative, not @deva[गुणवचन]). Both @deva[पूङ्] (@[bhvādi]) and @deva[पूञ्] (@[svādi]) included. Formation: @deva[पू] + @deva[इत्र] = @deva[पवित्रम्]. Semantic range: strainer/filter; ritual purifier (@deva[द्विवचन] (dual) kusha blades for lustrating ghee at sacrifices); @deva[यज्ञोपवीत] (sacred thread); clarified butter - all items that effect purification. Contrast with @ref[3.2.186] where agent sense applies.
"""

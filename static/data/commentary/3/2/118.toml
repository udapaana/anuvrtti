id = "3.2.118"
numericId = "32118"

[en]
simple = """
The affix @deva[लट्] (Present) comes after a verb when the particle @deva[स्म] is in connection with it, denoting past time not belonging to the current day and unperceived by the speaker. This overrides @deva[लिट्] (Perfect). Examples: @deva[यजति स्म युधिष्ठिरः] '@[yudhiṣṭhira] sacrificed'; @deva[नलेन स्म पुराधीयते] 'It was formerly studied by Nala'.
"""

standard = """
@deva[लट्] (Present) follows a verb when particle @deva[स्म] is @deva[योग], with @deva[भूतार्थ], @deva[अनद्यतन], @deva[परोक्ष]. This @deva[अपवाद] overrides @deva[लिट्]. Examples: @deva[यजति स्म युधिष्ठिरः] '@[yudhiṣṭhira] sacrificed'; @deva[नलेन स्म पुराधीयते]; @deva[ऊर्णया स्म पराधीयते].
"""

advanced = """
@deva[लट्] applies when @deva[स्म] is @deva[योग] with @deva[भूतार्थ], @deva[अनद्यतन], @deva[परोक्ष]—@deva[अपवाद] to @deva[लिट्]. Examples: @deva[यजति स्म युधिष्ठिरः]; @deva[नलेन स्म पुराधीयते].
"""

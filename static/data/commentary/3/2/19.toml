id = "3.2.19"
numericId = "32019"

[en]
simple = """
The affix @deva[ट] is used after @deva[सृ] 'to go' when @deva[पूर्व] is in composition, **if denoting the agent** (@deva[कर्तरि]).

**Example:**
- @deva[पूर्वः सरति] = @deva[पूर्वसरः] 'one who goes in front'

**Not for object:** When @deva[पूर्व] denotes direction (object), @deva[अण्] applies:
- @deva[पूर्वदेशं सरति] = @deva[पूर्वसारः] 'going to the east'
"""

standard = """
The affix @deva[ट] comes after @deva[सृ] 'to go' when @deva[पूर्व] is in composition, denoting the **agent** (@deva[कर्तरि]).

**Agent meaning:** @deva[पूर्वः सरति] = @deva[पूर्वसरः] 'going in front'

**Object meaning (direction):** @deva[अण्] applies instead — @deva[पूर्वदेशं सरति] = @deva[पूर्वसारः] 'going to the east'

The condition @deva[कर्तरि] distinguishes between the @deva[उपपद] being the agent itself vs. being an object of the action.
"""

advanced = """
The affix @deva[ट] comes after the verb @deva[सृ] 'to go' when @deva[पूर्व] is in composition with it, denoting the agent.

**Example:** @deva[पूर्वः सरति] = @deva[पूर्वसरः] 'going in front'.

**Why @deva[कर्तरि]?** Otherwise @deva[अण्] applies: @deva[पूर्वदेशं सरति] = @deva[पूर्वसारः] 'going to the east'.

The distinction is whether @deva[पूर्व] describes the agent ('the one who is first goes') or the object/destination ('goes to the east').
"""

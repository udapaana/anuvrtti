id = "3.2.135"
numericId = "32135"

[en]
simple = """
The affix @deva[तृन्] comes after all verbs in the sense of 'agent having such habit etc.' The @deva[न्] is indicatory and regulates accent (@ref[6.1.197]). Examples: @deva[कृ] + @deva[तृन्] = @deva[कर्तृ], nominative @deva[कर्ता]. For habit: @deva[कर्ता कटान्] 'accustomed to making mats'. For nature: @deva[मुण्डयितारः श्राविष्ठायना भवति वधूमूढाम्] 'the @[śrāviṣṭhāyanas] shave widows' heads'; @deva[अन्नमपहर्तार आह्वरका भवन्ति श्राद्धे सिद्धे] 'the @[āhvarakas] steal food after @[śrāddha]'. For skill: @deva[कर्ता कटम्] 'skillful mat-maker'. @[vārttikas]: (1) Simple verbs without @deva[उपसर्ग] take @deva[तृन्] for priest names: @deva[होता], @deva[पोता]; with @deva[उपसर्ग]: @deva[उद्गाता], @deva[प्रतिहर्ता] use @deva[तृच्] (same form, different accent). (2) @deva[षुक्] augment with @deva[नी]: @deva[नेष्टा]. (3) @deva[त्विष्] → @deva[त्वष्टा] '@[tvaṣṭṛ]' (deity, irregular).
"""

standard = """
@deva[तृन्] follows all @deva[धातु]s with @deva[तच्छीलादि] sense. The @deva[न्] is @deva[इत्] for accent (@ref[6.1.197]). Examples: @deva[कर्तृ] → @deva[कर्ता]. @deva[तच्छील]: @deva[कर्ता कटान्]. @deva[तद्धर्म]: @deva[मुण्डयितारः श्राविष्ठायना]; @deva[अन्नमपहर्तार आह्वरका]; @deva[उन्नेतारस्तौल्वलायना]. @deva[तत्साधुकारि]: @deva[कर्ता कटम्]; @deva[गन्ताऽऽखेटम्]. @deva[वार्त्तिक]s: (1) @deva[अनुपसर्ग] verbs + @deva[तृन्] for @deva[ऋत्विज्] names: @deva[होता], @deva[पोता]. With @deva[उपसर्ग]: @deva[उद्गाता], @deva[प्रतिहर्ता] use @deva[तृच्]—same form, different accent (@ref[6.1.197] vs @ref[6.1.163]). (2) @deva[षुक्] with @deva[नी]: @deva[नेष्टा]. (3) @deva[त्विष्] + @deva[तृन्] → @deva[त्वष्टा] (deity)—@deva[अ] for @deva[इ], no @deva[इट्]. (4) @deva[क्षद्] + @deva[तृन्] → @deva[क्षता] 'door-keeper'. (5) In @deva[छन्दस्]: @deva[क्षद्] + @deva[तृच्] → @deva[क्षता] (different accent).
"""

advanced = """
@deva[तृन्] follows all @deva[धातु]s with @deva[तच्छीलादि]. @deva[न्] is @deva[उदात्तनिमित्त] (@ref[6.1.197]). @deva[तच्छील]: @deva[कर्ता कटान्]. @deva[तद्धर्म]: @deva[मुण्डयितारः श्राविष्ठायना]. @deva[तत्साधुकारि]: @deva[कर्ता कटम्]. @deva[वार्त्तिक]s: (1) @deva[अनुपसर्ग] + @deva[ऋत्विज्]: @deva[होता], @deva[पोता]; with @deva[उपसर्ग]: @deva[तृच्]—@deva[उद्गाता], @deva[प्रतिहर्ता]. (2) @deva[षुगागम] with @deva[नी]: @deva[नेष्टा]. (3) @deva[त्विष्] → @deva[त्वष्टा] (@deva[देवतायाम्])—@deva[अत्वम्], @deva[निषेधाभाव]. (4) @deva[क्षद्] → @deva[क्षता] (@deva[अध्यक्षार्थ]). (5) @deva[छन्दस्]: @deva[क्षद्] + @deva[तृच्].
"""

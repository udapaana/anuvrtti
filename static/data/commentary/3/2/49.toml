id = "3.2.49"
numericId = "32049"

[en]
simple = """
This rule prescribes the affix @deva[ड] after the root @deva[हन्] (to kill) when a word denoting the object is in composition and the speaker intends a benediction (@deva[आशीः]) — a wish or blessing.

For example, @deva[तिमिहः] means 'may he kill the whale!' and @deva[शत्रुहः] means 'may he kill the enemy!' These express a pious wish, not a statement of fact.

When benediction is not intended, a different affix applies. For instance, @deva[शत्रुघातः] (one who kills enemies) uses the general affix @deva[अण्] and simply describes someone's characteristic action without any benedictory overtone.
"""

standard = """
This @[vidhi] rule prescribes @deva[ड] after @deva[हन्] when the @deva[कर्म] (object) is in composition and @deva[आशीः] (benediction) is intended. The rule type is a conditional @[kṛt]-affix prescription.

Derivation of @deva[तिमिहः]: @deva[तिमि] + @deva[हन्] + @deva[ड] → @deva[टि]-deletion of @deva[अन्] → @deva[तिमि] + @deva[ह्] + @deva[अ] → @deva[तिमिहः] (may he kill the whale).

Similarly: @deva[शत्रुहः] (may he kill the enemy).

Without @deva[आशीः]: @deva[शत्रुघातः] (one who kills enemies), using the general affix @deva[अण्].

@[vārttika] notes:
1. @deva[आहन्] + @deva[दारु] + @deva[अण्] = @deva[दार्वाघाटः] (woodpecker), with final @deva[त] → @deva[ट]
2. @deva[चारु] + @deva[आहन्]: @deva[चार्वाघाटः] or @deva[चार्वाघातः] (optional final change)
3. @deva[सम्] + @deva[हन्] + @deva[अण्] with optional final → @deva[ट]: @deva[वर्णसङ्घाटः] / @deva[वर्णसङ्घातः] (alphabet)
"""

advanced = """
This rule prescribes @deva[ड] after @deva[हन्] with @deva[कर्म] in composition when @deva[आशीः] (benediction) is expressed. The @deva[अनुवृत्ति] of @deva[ड] comes from @ref[3.2.48], and @deva[कर्मणि] is understood from context.

The benedictory condition is crucial: without it, the general affix @deva[अण्] applies by @ref[3.2.1], yielding forms like @deva[शत्रुघातः] (enemy-killer as a descriptive epithet). With @deva[आशीः], the @deva[ड] affix produces @deva[शत्रुहः] — expressing the wish 'may he kill the enemy'.

@[vārttikas]:
1. @deva[अण्] after @deva[आहन्] with @deva[दारु], final → @deva[ट], in @deva[संज्ञा] sense: @deva[दार्वाघाटः] (woodpecker)
2. Optional final change with @deva[चारु]: @deva[चार्वाघाटः] or @deva[चार्वाघातः]
3. @deva[सम्] + @deva[हन्] + @deva[अण्], final optionally → @deva[ट]: @deva[वर्णसङ्घाटः] / @deva[वर्णसङ्घातः] (alphabet), @deva[पदसङ्घाटः] / @deva[पदसङ्घातः] (annotator)

The subsequent @[sūtras] (@ref[3.2.50] onward) continue to prescribe affixes after @deva[हन्] under various other semantic conditions.
"""

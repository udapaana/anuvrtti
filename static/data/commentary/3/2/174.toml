id = "3.2.174"
numericId = "32174"

[en]
simple = """
The affixes @deva[क्रु] and @deva[क्लुकन्] come after @deva[भी] (to fear) to denote habitual tendency. Examples: @deva[भीरुः] (fearful, timid), @deva[भीलुकः] (timorous - also denotes bear, tiger, jackal).

@[vārtika]: The affix @deva[क्रुकन्] is also stated → @deva[भीरुकः] (timid).
"""

standard = """
The affixes @deva[क्रु] and @deva[क्लुकन्] apply after @deva[भी] (to fear) in @deva[तच्छीलादि] sense. The @deva[क्] is @deva[इत्]. Formations: @deva[भी] + @deva[क्रु] = @deva[भीरुः] (cowardly); @deva[भी] + @deva[क्लुकन्] = @deva[भीलुकः] (fearful - also names for bear, tiger, jackal).

@[vārtika]: @deva[क्रुकन्] also applies → @deva[भीरुकः] (timorous).
"""

advanced = """
@deva[क्रु] and @deva[क्लुकन्] after @deva[भी] in @deva[तच्छीलादि] sense. The @deva[क्] in both is @deva[इत्]. Derivations: @deva[भी] + @deva[क्रु] = @deva[भीरुः] (timid, coward); @deva[भी] + @deva[क्लुकन्] = @deva[भीलुकः] (fearful - also used for animals: bear, tiger, jackal).

@note[type=@[vārtika]]: @deva[क्रुकन्] also listed: @deva[भी] + @deva[क्रुकन्] = @deva[भीरुकः] (timorous).
"""

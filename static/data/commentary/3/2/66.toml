id = "3.2.66"
numericId = "32066"

[en]
simple = """
In the Vedas, the affix @deva[ञ्युट्] comes after @deva[वह्] 'to carry' with @deva[हव्य] 'oblation to gods'—but **only** when the word does not occur in the middle of a verse-quarter (@deva[पाद]).

**At end of @deva[पाद]:** @deva[अग्निश्च हव्यवाहनः] 'fire, carrier of oblation to gods' (@deva[ऋग्वेद] I.44.2)

**At beginning/middle:** @deva[हव्यवाट्] (uses @deva[ण्वि] from @ref[3.2.64] instead)
"""

standard = """
In @deva[छन्दस्], the affix @deva[ञ्युट्] comes after @deva[वह्] with @deva[हव्य] 'oblation to gods', provided the word is **not** in the middle of a @deva[पाद] (verse-quarter).

**At @deva[पाद]-end:** @deva[अग्निश्च हव्यवाहनः] 'fire, carrier of oblation' (@deva[ऋग्वेद] I.44.2)

**At @deva[पाद]-beginning/middle:** @deva[हव्यवाट्] (by @deva[ण्वि], @ref[3.2.64])
- @deva[हव्यवाडग्निरजरः पिता नः] (@deva[ऋग्वेद] III.2.2)
"""

advanced = """
In @deva[छन्दस्], the affix @deva[ञ्युट्] comes after @deva[वह्] with @deva[हव्य] 'oblation to gods', conditioned by position: **not** in middle of @deva[पाद].

**At @deva[पाद]-end:** @deva[अग्निश्च हव्यवाहनः] 'fire, carrier of oblation' (@deva[ऋग्वेद] I.44.2)

**At @deva[पाद]-beginning/middle:** @deva[हव्यवाट्] (by @deva[ण्वि], @ref[3.2.64])
- @deva[हव्यवाडग्निरजरः पिता नः] 'the undecaying fire that carries oblation is our father' (@deva[ऋग्वेद] III.2.2)
"""

id = "3.2.86"
numericId = "32086"

[en]
simple = """
The affix @deva[णिनि] comes after the verb @deva[हन्] 'to kill' with past-time meaning when the upapada is in the accusative case. Examples: @deva[पितृव्यघातिन्] 'one who has killed his paternal uncle', @deva[मातुलघातिन्] 'one who has killed his maternal uncle'. Derivation: @deva[हन्] + @deva[णिनि] → @deva[घन्] (@ref[7.3.54]) → @deva[घत्] (@ref[7.3.32]) → @deva[घातिन्] (@ref[7.2.116]). This affix applies only when censure is implied—not in @deva[चोरं हतवान्] 'he has killed the thief'.
"""

standard = """
@deva[णिनि] follows @deva[हन्] 'to kill' with @deva[भूतार्थ] when the @deva[उपपद] is @deva[द्वितीयान्त] (accusative). Examples: @deva[पितृव्यघातिन्], @deva[मातुलघातिन्]. Derivation: @deva[हन्] + @deva[णिनि] → @deva[घन्] + @deva[णिनि] (@ref[7.3.54]) → @deva[घत्] + @deva[णिनि] (@ref[7.3.32]) → @deva[घातिन्] (@ref[7.2.116]). This affix applies only when @deva[निन्दा] (censure) is implied; not in @deva[चोरं हतवान्] 'he has killed the thief'. The @deva[कर्मणि] @deva[अनुवृत्ति] extends to @ref[3.2.96].
"""

advanced = """
@deva[णिनि] follows @deva[हन्] with @deva[भूतार्थ] when @deva[उपपद] is @deva[द्वितीयान्त]. Examples: @deva[पितृव्यघातिन्], @deva[मातुलघातिन्]. Derivation: @deva[हन्] + @deva[णिनि] → @deva[घन्] (@ref[7.3.54] @deva[हन्तेर्घत्]) → @deva[घत्] (@ref[7.3.32]) → @deva[घातिन्] (@ref[7.2.116] @deva[अतो णिनि]). Condition: @deva[निन्दा] must be implied; not @deva[चोरं हतवान्]. The @deva[कर्मणि] @deva[अनुवृत्ति] governs through @ref[3.2.96].
"""

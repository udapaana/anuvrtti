id = "3.2.110"
numericId = "32110"

[en]
simple = """
The affix @deva[लुङ्] (Aorist) comes after a verb with past-time meaning. @deva[लुङ्] forms the Aorist tense—the entire affix is replaced by personal terminations (see @ref[3.1.43]ff.). The Aorist expresses past time indefinitely or very recently (within the current day). The Perfect and @deva[लङ्] (Imperfect) narrate remote past events; the Aorist is used in dialogues referring to recent past. Examples: @deva[अकार्षीत्] 'he did', @deva[अहार्षीत्] 'he took'. @[vārttika]: @deva[लुङ्] after @deva[वस्] 'to dwell' when 'end of the present night' is indicated—@deva[अमुत्रावात्सम्] 'I passed the night there' (not @deva[अमुत्रावसम्]). This applies only after regular sleep.
"""

standard = """
@deva[लुङ्] (Aorist) follows a @deva[धातु] with @deva[भूतार्थ]. @deva[लुङ्] is the name of the Aorist—entirely replaced by @deva[तिङ्] (see @ref[3.1.43]ff.). The Aorist expresses @deva[भूतकाल] indefinitely or very recently (@deva[अद्यतन]—within the current day). @deva[लिट्] and @deva[लङ्] narrate remote past; @deva[लुङ्] appears in dialogues about recent actions. Examples: @deva[अकार्षीत्] 'he did', @deva[अहार्षीत्] 'he took'. @deva[वार्त्तिक]: @deva[लुङ्] after @deva[वस्] when @deva[रात्र्यवसान] (night's end) is indicated: @deva[अमुत्रावात्सम्] 'I dwelt there' (not @deva[अमुत्रावसम्]). Applies only after @deva[सुप्तोत्थान] (waking from proper sleep).
"""

advanced = """
@deva[लुङ्] follows @deva[धातु] with @deva[भूतार्थ]. It is @deva[आगमसंज्ञा] for Aorist—replaced by @deva[तिङ्] (@ref[3.1.43]ff.). Expresses @deva[भूतकाल] indefinitely or @deva[अद्यतन] (recent). @deva[लिट्]/@deva[लङ्] for narration; @deva[लुङ्] for dialogue. Examples: @deva[अकार्षीत्], @deva[अहार्षीत्]. @deva[वार्त्तिक]: @deva[लुङ्] after @deva[वस्] with @deva[रात्र्यवसान]: @deva[अमुत्रावात्सम्]. Requires @deva[सुप्तोत्थान].
"""

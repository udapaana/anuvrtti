id = "3.2.187"
numericId = "32187"

[en]
simple = """
Verbs marked with the indicatory @deva[ञि] in the @[dhātupāṭha] take the affix @deva[क्त] with present-tense meaning. Normally @deva[क्त] is a past participle (by @ref[3.2.102]), but these @deva[ञित्] verbs are exceptions. Examples: @deva[ञिमिदा] (to feel affection) → @deva[मिन्नः] (feeling affection - present); @deva[ञिक्ष्विदा] → @deva[क्ष्विण्णः] (sounding inarticulately - present); @deva[ञिधृषा] → @deva[धृष्टः] (bold - present).
"""

standard = """
Roots marked with @deva[ञि] in the @[dhātupāṭha] take @deva[क्त] in present-tense sense (continuing @deva[वर्तमाने] from @ref[3.2.123]). Usually @deva[क्त] denotes past (by @ref[3.2.102]), but @deva[ञित्] roots are exceptions. Examples: @deva[ञिमिदा] → @deva[मिद्] + @deva[क्त] = @deva[मिन्नः] (by @ref[8.2.42]) 'affectionate' (present); @deva[ञिक्ष्विदा] → @deva[क्ष्विण्णः] 'making inarticulate sound'; @deva[ञिधृषा] → @deva[धृष्टः] 'bold, daring'.
"""

advanced = """
@deva[ञित्] roots take @deva[क्त] in @deva[वर्तमाने] (present tense), overriding the default past sense of @deva[निष्ठा] (@ref[3.2.102]). The @deva[वर्तमाने] carries over from @ref[3.2.123]. Derivations: @deva[ञिमिदा] 'to feel affection' → @deva[मिद्] + @deva[क्त] = @deva[मिङ्] + @deva[त] = @deva[मिन्] + @deva[न] (by @ref[8.2.42]) = @deva[मिन्नः] (currently affectionate). @deva[ञिक्ष्विदा] → @deva[क्ष्विण्णः] (presently making inarticulate sounds). @deva[ञिधृषा] → @deva[धृष्टः] (presently bold). The @deva[ञि] marker in the @[dhātupāṭha] specifically signals this present-tense usage of @deva[क्त].
"""

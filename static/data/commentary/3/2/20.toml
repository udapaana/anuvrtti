id = "3.2.20"
numericId = "32020"

[en]
simple = """
The affix @deva[ट] is used after @deva[कृ] 'to make' when the object is in composition and the meaning is **cause** (@deva[हेतु]), **habit** (@deva[ताच्छील्य]), or **compliance** (@deva[आनुलोम्य]).

**Examples:**
- @deva[हेतु] (cause): @deva[शोककरी कन्या] 'the daughter who causes sorrow'
- @deva[ताच्छील्य] (habit): @deva[श्राद्धकरः] 'one who habitually performs obsequies'
- @deva[आनुलोम्य] (compliance): @deva[वचनकरः] 'one who regularly does as told'

**Without these meanings:** @deva[अण्] applies — @deva[कुम्भकारः] 'potter'.
"""

standard = """
The affix @deva[ट] comes after @deva[कृञ्] 'to make' when the object is in composition, denoting @deva[हेतु] (cause), @deva[ताच्छील्य] (habit), or @deva[आनुलोम्य] (compliance/concession).

| Meaning | Example | Translation |
|---------|---------|-------------|
| @deva[हेतु] (cause) | @deva[शोककरी कन्या] | daughter causing sorrow |
| @deva[हेतु] | @deva[यशस्करी विद्या] | honorable science |
| @deva[ताच्छील्य] (habit) | @deva[श्राद्धकरः] | one who performs obsequies |
| @deva[आनुलोम्य] (compliance) | @deva[वचनकरः] | one who does as told |

**@deva[हेतु]:** Final/conclusive cause (not grammatical @deva[हेतु] = agent).
**@deva[ताच्छील्य]:** Being accustomed to that.
**@deva[आनुलोम्य]:** 'With the grain' — favorable, compliant.

**Without these senses:** @deva[अण्] applies — @deva[कुम्भकारः] 'potter', @deva[नगरकारः] 'city-maker'.
"""

advanced = """
The affix @deva[ट] comes after the verb @deva[कृञ्] 'to make' when the object is in composition with it denoting cause, habit and going with the grain (concession). The word @deva[हेतु] of this @[sutra] means the final or conclusive cause, and is not the grammatical @deva[हेतु] meaning agent. @deva[ताच्छील्य] means habit, and literally, the act of being accustomed to that. @deva[आनुलोम्य] comes from @deva[अनुलोम] meaning 'with the hair', that is to say, regular, in natural order, successive, and hence favourable, and agreeable complaisance, acquiescence &c. Of @deva[हेतु], we have @deva[शोककरी] @deva[कन्या] 'the daughter that causes sorrow'; @deva[यशस्करी] @deva[विद्या] 'honorable science'; @deva[कुलकरं] @deva[धनं] 'the family making wealth'. Of @deva[ताच्छील्य], we have @deva[श्राद्धकरः] 'who performs obsequies'; @deva[अर्थकरः] 'who amasses wealth'. Of @deva[आनुलोम्य], we have @deva[प्रैषकरः] 'who promptly does what he is directed'; @deva[वचनकरः] 'who regularly does what he is told'. Why do we say 'when having these senses'? Otherwise the affix will be @deva[अण्]. As @deva[कुम्भकारः] 'potter', @deva[नगरकारः] 'city-maker'.
"""

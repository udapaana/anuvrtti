id = "3.2.8"
numericId = "32008"

[en]
simple = """
The affix @deva[टक्] (= @deva[अ]) is used after @deva[गै] 'to sing' and @deva[पा] 'to drink' when there is no prefix and the object is in composition.

**Examples:**
- @deva[शक्रं गायति] = @deva[शक्रगः] 'singer of @[śakra] hymns' (fem. @deva[शक्रगी])
- @deva[सामानि गायति] = @deva[सामगः] 'singer of @[sāma-veda]' (fem. @deva[सामगी])
- @deva[सुरां पिबति] = @deva[सुरापः] 'wine-drinker' (fem. @deva[सुरापी])

The @deva[ट्] indicates that the feminine is formed with @deva[ङीप्] (= @deva[ई]).
"""

standard = """
The affix @deva[टक्] comes after @deva[गै] 'to sing' and @deva[पा] 'to drink' when used without a prefix (@deva[अनुपसर्गे]) and the object is in composition.

| Root | Sentence | Compound | Meaning | Feminine |
|------|----------|----------|--------|----------|
| @deva[गै] | @deva[शक्रं गायति] | @deva[शक्रगः] | @[śakra-singer] | @deva[शक्रगी] |
| @deva[गै] | @deva[सामानि गायति] | @deva[सामगः] | @[sāma-singer] | @deva[सामगी] |
| @deva[पा] | @deva[सुरां पिबति] | @deva[सुरापः] | wine-drinker | @deva[सुरापी] |
| @deva[पा] | @deva[शीधुं पिबति] | @deva[शीधुपः] | spirit-drinker | @deva[शीधुपी] |

This debars @deva[क]. The indicatory @deva[ट्] shows feminine is @deva[ङीप्] (@ref[4.1.14]).

**@[vārtika]:** @deva[टक्] after @deva[पा] 'to drink' applies only with @deva[सुरा] and @deva[शीधु]. Otherwise: @deva[क्षीरपा ब्राह्मणी] (fem. @deva[आ], not @deva[ई]).

**With @deva[उपसर्ग]:** @deva[अण्] applies — @deva[शक्रसङ्गायः], @deva[सामसङ्गायः].
"""

advanced = """
The affix @deva[टक्] comes after the verbs @deva[गै] 'to sing' and @deva[पा] 'to drink' when used without a preposition and the object is in composition.

The phrase @deva[अनुपसर्गे] is to be read into this @[sūtra] by @deva[अनुवृत्ति] from @ref[3.2.3], though it lay dormant in @[sūtras] 6 and 7.

This debars @deva[क]. Of the affix @deva[टक्], both @deva[ट्] and @deva[क्] are indicatory; the @deva[ट्] shows that the feminine is formed by @deva[ङीप्] (@ref[4.1.14]).

**Examples:**
- @deva[शक्रं गायति] = @deva[शक्रगः] (by @ref[6.4.64]) 'who sings @[śakra] hymns' (fem. @deva[शक्रगी])
- @deva[सामगः] 'singer of @[sāma]' (fem. @deva[सामगी])

**@[vārtika] 1:** @deva[टक्] comes after @deva[पा] 'to drink' only when in composition with @deva[सुरा] 'wine' and @deva[शीधु] 'spirits': @deva[सुरापः] (fem. @deva[सुरापी]) 'wine-bibber', @deva[शीधुपः] (fem. @deva[शीधुपी]) 'spirit-drinker'.

With other objects: @deva[क्षीरपा ब्राह्मणी] 'the milk-drinking @[brāhmaṇī]' — formed by @deva[क], feminine @deva[आ] (not @deva[ई]).

When @deva[पा] means 'to protect': @deva[सुरापा] 'who protects wine'.

**With @deva[उपसर्ग]:** @deva[अण्] applies — @deva[शक्रसङ्गायः], @deva[सामसङ्गायः].

**@[vārtika] 2:** In the Chhandas there is diversity: @deva[या ब्राह्मणी सुरापी] or @deva[सुरापा भवति नैनां देवाः पतिलोकं नयन्ति] 'the gods do not carry that wine-drinking @[brāhmaṇī] to her husband's realm'.
"""

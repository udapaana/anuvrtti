id = "3.2.6"
numericId = "32006"

[en]
simple = """
The affix @deva[क] is used after @deva[दा] 'to give' and @deva[ज्ञा] 'to know' when preceded by the prefix @deva[प्र], with the object in composition.

**Examples:**
- @deva[सर्वं प्रददाति] = @deva[सर्वप्रदः] 'giver of all, liberal'
- @deva[पन्थानं प्रजानाति] = @deva[पथिप्रज्ञः] 'acquainted with roads'

With other prefixes, @deva[अण्] applies instead: @deva[गोसन्दायः] (with @deva[सम्]).
"""

standard = """
The affix @deva[क] comes after @deva[दा] 'to give' and @deva[ज्ञा] 'to know' when taking the prefix @deva[प्र], with the object in the accusative.

| Root | Sentence | Compound | Meaning |
|------|----------|----------|--------|
| @deva[प्रदा] | @deva[सर्वं प्रददाति] | @deva[सर्वप्रदः] | liberal, giver of all |
| @deva[प्रज्ञा] | @deva[पन्थानं प्रजानाति] | @deva[पथिप्रज्ञः] | knowing roads |

The long @deva[आ] is elided by @ref[6.4.64]. This debars @deva[अण्].

**With other @deva[उपसर्ग]s:** @deva[अण्] applies — @deva[गोसन्दायः] 'one who ceremoniously gives a cow' (with @deva[सम्]).
"""

advanced = """
The affix @deva[क] comes after @deva[दा] 'to give' and @deva[ज्ञा] 'to know' when taking the preposition @deva[प्र], in composition with a word in the accusative case.

By @ref[3.2.3], @deva[क] was applied after verbs ending in long @deva[आ] without @deva[उपसर्ग]. Now begins the treatment of verbs with @deva[उपसर्ग].

This debars @deva[अण्].

**Examples:**
- @deva[सर्वप्रदः] (by @ref[6.4.64]) 'giver of all; liberal'
- @deva[पथिप्रज्ञः] (by @ref[6.4.64]) 'acquainted with roads'

The long @deva[आ] of @deva[दा] and @deva[ज्ञा] is elided by @ref[6.4.64].

**Why @deva[प्र]?** With any other @deva[उपसर्ग], these verbs take @deva[अण्]: @deva[गोसन्दायः] 'who ceremoniously gives a cow' (with @deva[सम्]).
"""

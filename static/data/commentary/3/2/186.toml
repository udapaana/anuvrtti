id = "3.2.186"
numericId = "32186"

[en]
simple = """
The affix @deva[इत्र] comes after @deva[पू] (to purify) with agent or instrumental sense depending on whether it refers to a deity or a sage. When applied to a sage (@deva[ऋषि]), the meaning is instrumental (through whom one is purified). When applied to a deity (@deva[देवता]), the meaning is agentive (one who purifies). Examples: @deva[पवित्रोऽयमृषिः] (this sage is sanctifying - instrumental); @deva[अग्निः पवित्रम्] (Agni is the purifier - agent).
"""

standard = """
The affix @deva[इत्र] applies after @deva[पू] with @deva[करण] or @deva[कर्तृ] sense depending on referent. For @deva[ऋषि] (sage): @deva[करण] sense - @deva[पवित्रोऽयम् ऋषिः] 'this sage is sacred' (through whose agency one is sanctified). For @deva[देवता] (deity): @deva[कर्तृ] sense - @deva[अग्निः पवित्रं स मा पुनातु] 'Agni is the purifier; may he purify me.' Similarly: @deva[वायुः], @deva[सोमः], @deva[सूर्यः], @deva[इन्द्रः पवित्रं ते मा पुनन्तु].
"""

advanced = """
@deva[इत्र] after @deva[पू] with semantic variation: @deva[ऋष्यर्थे करणम्] (instrumental for sages) vs. @deva[देवतार्थे कर्ता] (agentive for deities). For @deva[ऋषि]: @deva[पवित्रोऽयम् ऋषिः] - 'this sage is a means of purification' (one is purified through his instrumentality). For @deva[देवता]: @deva[अग्निः पवित्रं स मा पुनातु] - 'Agni is the purifier; may he purify me' (Agni as active agent). Also: @deva[वायुः सोमः सूर्य इन्द्रः पवित्रं ते मा पुनन्तु] (may @[vāyu], Soma, @[sūrya], Indra - all purifiers - purify me).
"""

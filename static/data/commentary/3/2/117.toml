id = "3.2.117"
numericId = "32117"

[en]
simple = """
Both @deva[लङ्] (Imperfect) and @deva[लिट्] (Perfect) come after a verb expressing past time not belonging to the current day and unperceived by the speaker, when the past referred to is recent and the sentence is interrogative. Examples: @deva[अगच्छद् देवदत्तः] or @deva[जगाम देवदत्तः] 'Did Devadatta go / Has Devadatta gone (just now)?'; @deva[अयजद् देवदत्तः] or @deva[इयाज देवदत्तः] 'Did Devadatta sacrifice?'. Without the question, only Perfect: @deva[जगाम देवदत्तः]. Without recent time: @deva[जघान कंसं किल वासुदेवः] (remote past).
"""

standard = """
Both @deva[लङ्] and @deva[लिट्] follow a verb with @deva[भूतार्थ], @deva[अनद्यतन], @deva[परोक्ष] when @deva[आसन्नकाल] (recent past) and @deva[प्रश्न] (interrogative). Examples: @deva[अगच्छद् देवदत्तः] or @deva[जगाम देवदत्तः] 'Did Devadatta go?'; @deva[अयजद् देवदत्तः] or @deva[इयाज देवदत्तः] 'Did Devadatta sacrifice?'. Without @deva[प्रश्न]: @deva[जगाम देवदत्तः] (only @deva[लिट्]). Without @deva[आसन्नकाल]: @deva[भवन्तं पृच्छामि जघान कंसं किल वासुदेवः] (remote past → @deva[लिट्] only).
"""

advanced = """
@deva[लङ्] and @deva[लिट्] both apply with @deva[भूतार्थ], @deva[अनद्यतन], @deva[परोक्ष] when @deva[आसन्नकाल] and @deva[प्रश्न]. Examples: @deva[अगच्छद् देवदत्तः] / @deva[जगाम देवदत्तः]; @deva[अयजद् देवदत्तः] / @deva[इयाज देवदत्तः]. Without @deva[प्रश्न]: @deva[लिट्] only. Without @deva[आसन्नकाल]: @deva[लिट्] only.
"""

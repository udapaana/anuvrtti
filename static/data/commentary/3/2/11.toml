id = "3.2.11"
numericId = "32011"

[en]
simple = """
The affix @deva[अच्] is used after @deva[हृ] with the prefix @deva[आङ्] when the meaning indicates **habitual inclination** (@deva[ताच्छील्य]).

**Examples:**
- @deva[पुष्पान् आहरति] = @deva[पुष्पाहरः] 'one who habitually collects flowers'
- @deva[फलान् आहरति] = @deva[फलाहरः] 'one who habitually gathers fruits'

**Without habitual meaning:** @deva[अण्] applies — @deva[भारमाहरति] = @deva[भाराहारः] 'one who brings a load'.
"""

standard = """
The affix @deva[अच्] comes after @deva[हृञ्] with @deva[आङ्] when the sense is @deva[ताच्छील्य] (natural inclination or habitual occupation).

| Sentence | Compound | Meaning |
|----------|----------|--------|
| @deva[पुष्पान् आहरति] | @deva[पुष्पाहरः] | habitual flower-gatherer |
| @deva[फलान् आहरति] | @deva[फलाहरः] | habitual fruit-gatherer |

@deva[ताच्छील्य] = natural tendency or habitual occupation.

**Without @deva[ताच्छील्य]:** @deva[अण्] applies — @deva[भारमाहरति] = @deva[भाराहारः] 'load-bringer'.
"""

advanced = """
The affix @deva[अच्] comes after the verb @deva[हृञ्] (when the object is in composition with it) the root taking the preposition @deva[आङ्] and the sense of the word to be formed in inclination or accustomed occupation. The word @deva[ताच्छील्यं] means a natural inclination or habitual occupation; as @deva[पुष्पाहरः] (@deva[पुष्प] + @deva[आहरति] = @deva[पुष्प] + @deva[आहर]) 'he who has a natural tendency towards fetching flowers or whose habitual occupation is to collect flowers'; so also @deva[फलाहरः] @deva[।] Why do we say 'when denoting inclination'? Otherwise the affix will be @deva[अण्]; as @deva[भारमाहरति] = @deva[भाराहारः] 'who brings load'.
"""

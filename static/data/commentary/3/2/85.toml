id = "3.2.85"
numericId = "32085"

[en]
simple = """
The affix @deva[णिनि] comes after the verb @deva[यज्] 'to sacrifice' with past-time meaning when the upapada is in the instrumental case. Example: @deva[अग्निष्टोमयाजिन्] 'one who has sacrificed with @[agniṣṭoma]'. Here @[agniṣṭoma] is the instrument for attaining the desired fruit. Note: @deva[णिनि] (not @deva[खश्]) is understood here.
"""

standard = """
@deva[णिनि] (not @deva[खश्]) follows @deva[यज्] 'to sacrifice' with @deva[भूतार्थ] (past meaning) when the @deva[उपपद] is in the @deva[तृतीया] (instrumental case). Example: @deva[अग्निष्टोमयाजिन्] 'one who has sacrificed with @[agniṣṭoma]'. The @[agniṣṭoma] is the @deva[करण] (instrument) for attaining the desired @deva[फल]. The @deva[अनुवृत्ति] of @deva[णिनि] (not @deva[खश्]) is to be read into this @[sūtra].
"""

advanced = """
@deva[णिनि] (via @deva[अनुवृत्ति], not @deva[खश्]) follows @deva[यज्] with @deva[भूतार्थ] when the @deva[उपपद] is @deva[तृतीयान्त]. Example: @deva[अग्निष्टोमयाजिन्] 'one who has sacrificed with @[agniṣṭoma]'. The @deva[उपपद] denotes the @deva[करण] for @deva[फलप्राप्ति].
"""

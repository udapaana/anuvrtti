id = "3.2.80"
numericId = "32080"

[en]
simple = """
The affix @deva[णिनि] comes after a verb with a case-inflected word in composition when a religious vow is expressed. The 'vow' condition applies to the complete derived word. Examples: @deva[स्थण्डिलशायिन्] 'one who has vowed to sleep only on bare ground', @deva[अश्राद्धभोजिन्] 'one who has vowed not to eat during @[śrāddha] ceremonies'. Without the vow sense, no compound forms: @deva[स्थण्डिले शेते देवदत्तः] 'Devadatta sleeps on bare ground' (mere fact, not a vow).
"""

standard = """
@deva[णिनि] follows a verb with a @deva[सुबन्त] in composition when @deva[व्रत] (religious vow, scripturally ordained) is expressed. The @deva[व्रत]-condition qualifies the @deva[समुदितार्थ] (complete derived word including root, @deva[उपपद], and affix). Examples: @deva[स्थण्डिलशायिन्] 'vowed to sleep on bare ground'; @deva[अश्राद्धभोजिन्] 'vowed not to eat at @[śrāddha]'. Without @deva[व्रतार्थ], no @deva[समास]: @deva[स्थण्डिले शेते देवदत्तः]. This is an exception to @ref[3.2.78], applying when @deva[शील] is absent or @deva[जाति] is expressed.
"""

advanced = """
@deva[णिनि] follows a verb with @deva[सुबन्त] when @deva[व्रत] (scriptural vow) is expressed. The @deva[व्रत]-@deva[उपाधि] qualifies the @deva[समुदितार्थ] (complete derived word), not individual components. Examples: @deva[स्थण्डिलशायिन्], @deva[अश्राद्धभोजिन्]. Without @deva[व्रतार्थ], no @deva[समास]: @deva[स्थण्डिले शेते देवदत्तः]. This is @deva[अपवाद] to @ref[3.2.78] when @deva[शील] is absent or @deva[जाति] is expressed.
"""

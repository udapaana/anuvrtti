id = "3.2.25"
numericId = "32025"

[en]
simple = """
The affix @deva[इन्] is used after @deva[हृ] 'to carry' when @deva[ददृति] 'leather bag' or @deva[नाथ] 'master' is in composition, and the agent is an **animal**.

**Examples:**
- @deva[दृतिहरिः] 'dog' (carrier of skin/leather)
- @deva[नाथहरिः] 'beast' (carrier of its master)

**For non-animals:** @deva[अण्] applies — @deva[दृतिहारः] 'water-carrier', @deva[नाथहारः] 'one who carries his master'.
"""

standard = """
The affix @deva[इन्] comes after @deva[हृ] 'to take/carry' when @deva[ददृति] 'leather bag' or @deva[नाथ] 'master' is in composition, **if the agent is an animal**.

| Form | Agent | Meaning |
|------|-------|--------|
| @deva[दृतिहरिः] | animal | dog (skin-carrier) |
| @deva[नाथहरिः] | animal | beast (master-carrier) |

**When not denoting animals:** @deva[अण्] applies:
- @deva[दृतिहारः] 'water-carrier (human)'
- @deva[नाथहारः] 'one who carries his master'
"""

advanced = """
The affix @deva[इन्] comes after @deva[हृ] 'to take/carry' when @deva[ददृति] 'leather bag' or @deva[नाथ] 'master' is in composition, **when the indicated agent is an animal**.

**Examples:**
- @deva[दृतिहरिः] 'a dog' (carrier of skin/leather bag)
- @deva[नाथहरिः] 'a beast' (that which carries its master)

**When not denoting animals:** @deva[अण्] applies:
- @deva[दृतिहारः] 'water-carrier' (human who carries a leather water-bag)
- @deva[नाथहारः] 'carrier of his master'
"""

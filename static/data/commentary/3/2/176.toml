id = "3.2.176"
numericId = "32176"

[en]
simple = """
The affix @deva[वरच्] comes after the verb @deva[या] (to go) when it has the intensive affix @deva[यङ्]. This forms @deva[यायावरः] (a vagrant, wandering ascetic). See @ref[1.1.58] for intensives.
"""

standard = """
The affix @deva[वरच्] applies after @deva[या] when combined with @deva[यङ्] (intensive affix) in @deva[तच्छीलादि] sense. Formation: @deva[या] + @deva[यङ्] = @deva[यायाय्], then + @deva[वरच्] = @deva[यायावरः] (wanderer, itinerant ascetic). See @ref[1.1.58] for intensive formation.
"""

advanced = """
@deva[वरच्] after @deva[यङन्त] form of @deva[या] in @deva[तच्छीलादि] sense. Derivation: @deva[या] + @deva[यङ्] = @deva[यायाय्] (intensive stem) + @deva[वरच्] = @deva[यायावरः] (nomadic ascetic, vagrant). The intensive conveys habitual/repeated action - one who habitually wanders. Cf. @ref[1.1.58] for @deva[यङ्] formation.
"""

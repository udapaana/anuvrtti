id = "3.2.121"
numericId = "32121"

[en]
simple = """
The affix @deva[लट्] (Present) optionally comes after a verb in denoting past time, in reply to a question, when the particles @deva[न] 'not' or @deva[नु] 'what of that' are used. Examples: @deva[अकार्षीः कटं देवदत्त? — न करोमि भोः] or @deva[नाकार्षम्] 'Did you make the mat? — No, I did not'; @deva[अहं नु करोमि] or @deva[अहं न्वकार्षम्] 'What of that, I did'.
"""

standard = """
@deva[लट्] comes @deva[विभाषया] with @deva[भूतार्थ] in @deva[प्रत्युत्तर] when @deva[न] or @deva[नु] is used. Examples: @deva[अकार्षीः कटं देवदत्त? — न करोमि भोः] or @deva[नाकार्षम्] 'Did you make the mat? — No, I did not'; @deva[अहं नु करोमि] or @deva[अहं न्वकार्षम्] 'What of that, I did'.
"""

advanced = """
@deva[लट्] @deva[विभाषया] with @deva[भूतार्थ] in @deva[प्रत्युत्तर] when @deva[न] or @deva[नु]. Examples: @deva[न करोमि भोः] / @deva[नाकार्षम्]; @deva[अहं नु करोमि] / @deva[अहं न्वकार्षम्].
"""

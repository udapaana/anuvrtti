id = "3.2.124"
numericId = "32124"

[en]
simple = """
The affixes @deva[शतृ] and @deva[शानच्] substitute for @deva[लट्] (Present tense) when the participle agrees with a word not in the nominative case. Examples: @deva[पचमानं देवदत्तं पश्य] 'behold Devadatta who is cooking' (accusative); @deva[पचता कृतम्] or @deva[पचमानेन कृतम्] 'done by one who is cooking' (instrumental). Derivation: @deva[पच्] + @deva[शानच्] → @deva[पच्] + @deva[शप्] + @deva[शानच्] (@ref[3.4.113], @ref[3.1.68]) → @deva[पचमान] (@ref[7.2.82]). When the word is nominative: @deva[देवदत्तः पचति] 'Devadatta cooks' (uses @deva[लट्], not participle). The repetition of @deva[लट्] extends the rule: @deva[सन् ब्राह्मणः] = @deva[अस्ति ब्राह्मणः]. @[vārttika]: with @deva[माङ्] expressing curse—@deva[मा पचन्], @deva[मा पचमानः] 'may he not cook'.
"""

standard = """
@deva[शतृ] and @deva[शानच्] substitute for @deva[लट्] when agreeing with a non-@deva[प्रथमान्त] (non-nominative) word. Examples: @deva[पचमानं देवदत्तं पश्य] (acc.); @deva[पचता कृतम्] / @deva[पचमानेन कृतम्] (inst.). Derivation: @deva[पच्] + @deva[शानच्] → @deva[पच्] + @deva[शप्] + @deva[शानच्] (@ref[3.4.113], @ref[3.1.68]) → @deva[पच्] + @deva[अ] + @deva[मुक्] + @deva[आन] (@ref[7.2.82]) → @deva[पचमान]. Similarly @deva[पच्] + @deva[शप्] + @deva[शतृ] → @deva[पचत्]. With @deva[प्रथमा]: @deva[देवदत्तः पचति] (no participle). The @deva[लट्] repetition extends the rule to some nominatives: @deva[सन् ब्राह्मणः] = @deva[अस्ति ब्राह्मणः]; @deva[विद्यमानो ब्राह्मणः]; @deva[जुहुत्]/@deva[जुहोति]; @deva[अधीयानः]/@deva[अधीते]. @deva[वार्त्तिक]: with @deva[माङ्] + @deva[निन्दा]—@deva[मा पचन्], @deva[मा पचमानः]. The @deva[विभाषा] from @ref[3.2.121] is @deva[व्यवस्थितविभाषा] (limited option).
"""

advanced = """
@deva[शतृ]/@deva[शानच्] replace @deva[लट्] when agreeing with non-@deva[प्रथमान्त]. Examples: @deva[पचमानं देवदत्तं पश्य]; @deva[पचता कृतम्]. Derivation: @deva[पच्] + @deva[शानच्] → @deva[पचमान] (@ref[3.4.113], @ref[3.1.68], @ref[7.2.82]). @deva[लट्] repetition extends to some @deva[प्रथमा]: @deva[सन् ब्राह्मणः], @deva[विद्यमानो ब्राह्मणः], @deva[जुहुत्], @deva[अधीयानः]. @deva[वार्त्तिक]: @deva[माङ्] + @deva[निन्दा] → @deva[मा पचन्]. @deva[विभाषा] from @ref[3.2.121] is @deva[व्यवस्थितविभाषा].
"""

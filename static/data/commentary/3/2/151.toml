id = "3.2.151"
numericId = "32151"

[en]
simple = """
The affix @deva[युच्] comes after verbs meaning 'to be angry' (@deva[क्रुधर्थ]) and 'to adorn' (@deva[मण्डार्थ]) in the sense of 'agent having such habit etc.' Examples: @deva[क्रोधनः] 'wrathful', @deva[रोषणः] 'irascible', @deva[मण्डनः] 'adorning', @deva[भूषणः] 'ornament'. But not @deva[अलंकृ], which takes @deva[इष्णुच्] by @ref[3.2.136].
"""

standard = """
@deva[युच्] follows @deva[क्रुधर्थ] and @deva[मण्डार्थ] verbs with @deva[तच्छीलादि]. Examples: @deva[क्रोधनः], @deva[रोषणः]; @deva[मण्डनः], @deva[भूषणः]. Not @deva[अलंकृ]—@ref[3.2.136] (@deva[इष्णुच्]) applies.
"""

advanced = """
@deva[युच्] follows @deva[क्रुधर्थ] and @deva[मण्डार्थ] verbs with @deva[तच्छीलादि]. Examples: @deva[क्रोधनः], @deva[मण्डनः]. @deva[अलंकृ]: @ref[3.2.136] (@deva[इष्णुच्]).
"""

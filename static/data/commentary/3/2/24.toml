id = "3.2.24"
numericId = "32024"

[en]
simple = """
The affix @deva[इन्] is used after @deva[कृ] 'to make' when @deva[स्तम्ब] 'sheaf' or @deva[शकृत्] 'dung' is in composition.

**Examples:**
- @deva[स्तम्बकरिः] 'rice' (lit. sheaf-maker)
- @deva[शकृत्करिः] 'calf' (lit. dung-maker)

These words have specialized meanings: 'rice' and 'calf' respectively.

**Without these meanings:** @deva[अण्] applies — @deva[स्तम्बकारः] 'sheaf-maker', @deva[शकृत्कारः] 'dung-maker'.
"""

standard = """
The affix @deva[इन्] comes after @deva[कृञ्] when @deva[स्तम्ब] 'sheaf' or @deva[शकृत्] 'ordure' is in composition.

**Derivation:** @deva[स्तम्ब] + @deva[कृ] + @deva[इन्] = @deva[स्तम्बकरि], nom. @deva[स्तम्बकरिः]

| Form | Meaning (specialized) |
|------|--------|
| @deva[स्तम्बकरिः] | rice |
| @deva[शकृत्करिः] | calf |

**@[vārtika]:** These specialized meanings ('rice', 'calf') are required. Without them, @deva[अण्] applies: @deva[स्तम्बकारः] 'sheaf-maker', @deva[शकृत्कारः] 'dung-maker'.
"""

advanced = """
The affix @deva[इन्] comes after @deva[कृञ्] when @deva[स्तम्ब] 'sheaf' or @deva[शकृत्] 'ordure' is in composition.

**Derivation:** @deva[स्तम्ब] + @deva[कृ] + @deva[इन्] = @deva[स्तम्बकरि], nom. sing. @deva[स्तम्बकरिः]; similarly @deva[शकृत्करिः].

**@[vārtika]:** This rule applies when the meanings are 'rice' and 'calf' respectively. @deva[स्तम्बकरिः] = 'rice' (that which makes/produces sheaves); @deva[शकृत्करिः] = 'calf' (that which produces dung).

**Without specialized meanings:** @deva[अण्] applies:
- @deva[स्तम्बकारः] 'sheaf-maker'
- @deva[शकृत्कारः] 'ordure-maker'
"""

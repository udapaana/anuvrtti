id = "3.2.10"
numericId = "32010"

[en]
simple = """
The affix @deva[अच्] is also used after @deva[हृ] when the meaning indicates **age** (@deva[वयस्]) — i.e., reaching the age appropriate for the action.

**Examples:**
- @deva[अस्थिहरः श्वा] 'the dog old enough to chew bones'
- @deva[कवचहरः क्षत्रियकुमारः] 'the @[kṣatriya] boy old enough to bear a shield'

Here @deva[हृ] has the sense of 'raising up' which was excluded in the previous @[sūtra], but is allowed when describing age.
"""

standard = """
The affix @deva[अच्] comes after @deva[हृञ्] when the meaning describes **age** (@deva[वयस्]) — attaining the appropriate age for the @deva[उपपद] action.

| Compound | Meaning |
|----------|--------|
| @deva[अस्थिहरः श्वा] | dog old enough to chew bones |
| @deva[कवचहरः क्षत्रियकुमारः] | @[kṣatriya] boy old enough to bear a shield |

In this @[sūtra], @deva[हृ] has the sense of @deva[उद्यमन] 'raising up' — which was excluded in @ref[3.2.9]. But when describing age, @deva[अच्] still applies.

The word @deva[वयस्] means 'the condition of the body as dependent upon time'.
"""

advanced = """
The affix @deva[अच्] comes after the verb @deva[हृञ्] when the object is in composition and the meaning describes age (@deva[वयसि]).

In this @[sūtra], the verb @deva[हृञ्] has the sense of @deva[उद्यमन] 'to raise up' — which was specifically excluded in @ref[3.2.9]. But when the meaning relates to age, @deva[अच्] applies.

The word @deva[वयस्] means the condition of the human body as dependent upon time. This rule applies to words indicating:
- Attainment of the appropriate age for accomplishing the @deva[उपपद] action
- Reaching the age in which the @deva[उपपद] naturally takes place

**Examples:**
- @deva[अस्थिहरः श्वा] 'the dog that has reached the age when it can chew bones' (lit. 'raise them up')
- @deva[कवचहरः क्षत्रियकुमारः] 'the @[kṣatriya] boy old enough to wear (lit. 'raise up or bear') the shield'

Here the verb has the sense of 'raising up', yet @deva[अच्] applies because the meaning relates to age.
"""

id = "3.2.120"
numericId = "32120"

[en]
simple = """
The affix @deva[लट्] (Present) is used after a verb in denoting past action when the particle @deva[ननु] is used and an answer is given to a question. The @deva[अनद्यतन] and @deva[परोक्ष] conditions do not apply here—this is a general rule for past time. This overrides @deva[लुङ्] (Aorist). Examples: @deva[अकार्षीः कटं देवदत्त? — ननु करोमि भोः] 'Devadatta, did you make the mat? — Oh yes, I did'; @deva[अवोचस्तत्र किञ्चिद् देवदत्त? — ननु ब्रवीमि भोः] 'Did you speak anything there? — Oh yes, I did'. Without the reply: @deva[नन्वकार्षीन् माणवकः] 'Certainly the boy did it' (uses @deva[लुङ्]).
"""

standard = """
@deva[लट्] follows a verb with @deva[भूतार्थ] when @deva[ननु] is used @deva[प्रत्युत्तरे] (in reply to a question). The @deva[अनद्यतन] and @deva[परोक्ष] @deva[अनुवृत्ति] do not extend here—general @deva[भूतकाल] rule. This @deva[अपवाद] overrides @deva[लुङ्]. Examples: @deva[अकार्षीः कटं देवदत्त? — ननु करोमि भोः] 'Did you make the mat? — Yes, I did'; @deva[अवोचस्तत्र किञ्चिद् देवदत्त? — ननु ब्रवीमि भोः]. Without @deva[प्रत्युत्तर]: @deva[नन्वकार्षीन् माणवकः] (uses @deva[लुङ्]).
"""

advanced = """
@deva[लट्] with @deva[भूतार्थ] when @deva[ननु] in @deva[प्रत्युत्तर]. @deva[अनद्यतन]/@deva[परोक्ष] @deva[अनुवृत्ति] stops—general @deva[भूत] rule. @deva[अपवाद] to @deva[लुङ्]. Examples: @deva[अकार्षीः कटं देवदत्त? — ननु करोमि भोः]; @deva[अवोचस्तत्र किञ्चिद् देवदत्त? — ननु ब्रवीमि भोः]. Without @deva[प्रत्युत्तर]: @deva[नन्वकार्षीन् माणवकः].
"""

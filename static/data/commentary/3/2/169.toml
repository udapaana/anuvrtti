id = "3.2.169"
numericId = "32169"

[en]
simple = """
The words @deva[विन्दु] and @deva[इच्छु] are formed irregularly with the affix @deva[उ]. For @deva[विन्दु]: @deva[विद्] (to know) + augment @deva[नुम्] + @deva[उ] = @deva[विन्दुः] (intelligent). For @deva[इच्छु]: @deva[इष्] (to wish) with @deva[ष] replaced by @deva[छ] = @deva[इच्छुः] (desirous).
"""

standard = """
This @[sūtra] lists @deva[निपातन] (irregular formations) with @deva[उ]. @deva[विन्दु]: @deva[विद्] + @deva[नुम्] augment + @deva[उ] = @deva[विन्दुः] (knowledgeable, @deva[वेदनशीलः]) by @ref[1.1.47]. @deva[इच्छु]: @deva[इष्] with @deva[ष] → @deva[छ] substitution = @deva[इच्छुः] (desirous, @deva[एषणशीलः]).
"""

advanced = """
@deva[निपातन] for @deva[विन्दु] and @deva[इच्छु] with @deva[उ] in @deva[तच्छीलादि] sense. @deva[विन्दु]: @deva[विद्] + @deva[नुम्] (by @ref[1.1.47]) + @deva[उ] = @deva[विन्दुः] (= @deva[वेदनशीलः], habitually knowing). @deva[इच्छु]: @deva[इष्] with @deva[ष] → @deva[छ] substitution + @deva[उ] = @deva[इच्छुः] (= @deva[एषणशीलः], habitually desiring). Both are listed exceptions to regular formation rules.
"""

id = "3.2.103"
numericId = "32103"

[en]
simple = """
The affix @deva[ङ्वनिप्] comes after the verbs @deva[सु] 'to press out juice' and @deva[यज्] 'to sacrifice' with past-time meaning. Examples: @deva[सुत्वा] 'one who has pressed out juice' (via @deva[सु] + @deva[ङ्वनिप्] = @deva[सुत्वन्] with @deva[त्] by @ref[6.1.71]), @deva[यज्वा] 'one who has sacrificed' (from @deva[यज्वन्]).
"""

standard = """
@deva[ङ्वनिप्] follows @deva[सु] 'to extract juice' and @deva[यज्] 'to sacrifice' with @deva[भूतार्थ]. Examples: @deva[सु] + @deva[ङ्वनिप्] = @deva[सुत्] + @deva[वन्] (@ref[6.1.71] @deva[तुगागम]) = @deva[सुत्वन्], nominative @deva[सुत्वा] 'juice-presser'; @deva[यज्वन्], nominative @deva[यज्वा] 'sacrificer'. See @[ṛg] Veda @ref[1.3.1].
"""

advanced = """
@deva[ङ्वनिप्] follows @deva[सु] and @deva[यज्] with @deva[भूतार्थ]. Examples: @deva[सुत्वन्] (@ref[6.1.71] @deva[तुगागम]) → @deva[सुत्वा]; @deva[यज्वन्] → @deva[यज्वा]. Cf. @[ṛg] Veda @ref[1.3.1].
"""

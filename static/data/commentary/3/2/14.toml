id = "3.2.14"
numericId = "32014"

[en]
simple = """
The affix @deva[अच्] is used after roots when @deva[शम्] 'well/good' is in composition and the word is a **proper name** (@deva[संज्ञा]).

**Examples:**
- @deva[शं करोति] = @deva[शङ्करः] '@[śaṅkara]' (lit. 'one who does good')
- @deva[शं भवति] = @deva[शम्भवः] '@[śambhava]'
- @deva[शं वहति] = @deva[शंवहः] '@[śaṃvaha]'

These are all proper nouns. The feminine of @deva[शङ्कर] is @deva[शङ्करा] (not @deva[शङ्करी]).
"""

standard = """
The affix @deva[अच्] comes after roots when @deva[शम्] 'well' is in composition and the word denotes a name (@deva[संज्ञा]).

| Sentence | Compound | Meaning |
|----------|----------|--------|
| @deva[शं करोति] | @deva[शङ्करः] | @[śaṅkara] (does good) |
| @deva[शं भवति] | @deva[शम्भवः] | @[śambhava] |
| @deva[शं वहति] | @deva[शंवहः] | @[śaṃvaha] |

All these are proper nouns.

**Why repeat @deva[धातोः]?** The repetition shows that @deva[अच्] (not @deva[ट]) applies even when the sense is causative, habitual, etc. (@ref[3.2.20]). Thus the feminine of @deva[शङ्कर] is @deva[शङ्करा] (not @deva[शङ्करी], which would result from @deva[ट]).
"""

advanced = """
The affix @deva[अच्] is used after the verbal roots when @deva[शम्] 'well' is in composition and the word to be formed denotes a name. As @deva[शम्] + @deva[कृ] + @deva[अच्] = @deva[शङ्करः] lit. 'who does good'. So also @deva[सम्भवः] @deva[संवहः] @deva[।] All these are proper nouns. Why have we repeated the word @[dhatu] in this aphorism, when it was understood by @[anuvritti] from @[sutra] @ref[3.1.91]? To this the reply is, that the repetition of the word @[dhatu] shows that there is prohibition of the affix @deva[ट], that comes after the verb @deva[कृ] in certain senses @ref[3.2.20], when the word @deva[शम्] is in composition. The affix @deva[अच्] will be employed after the verb @deva[कृ] and not the affix @deva[ट्], when @deva[शम्] is an @[upapada], even when the sense to be indicated is that of cause, habit &c. @ref[3.2.20]. The result is that the feminine of @deva[शङ्कर] will be @deva[शङ्करा], and not @deva[शङ्करी], which, had the affix been @deva[ट], would have been the proper feminine (See @ref[4.1.14]). @deva[शङ्करा] means 'a female-ascetic', 'a vulture' and 'one having the habit of doing good'.
"""

id = "3.2.9"
numericId = "32009"

[en]
simple = """
The affix @deva[अच्] (= @deva[अ]) is used after @deva[हृ] 'to take/carry' when it does **not** mean 'to raise up' (@deva[उद्यमन]), with the object in composition.

**Examples:**
- @deva[अंशं हरति] = @deva[अंशहरः] 'sharer' (one who takes a share)
- @deva[रिक्थं हरति] = @deva[रिक्थहरः] 'heir' (one who takes inheritance)

**When meaning 'to raise up':** @deva[अण्] applies — @deva[भारहारः] 'porter' (burden-bearer).
"""

standard = """
The affix @deva[अच्] comes after @deva[हृञ्] 'to take' when it does not mean 'to raise up' (@deva[उद्यमन]), with the object in composition.

| Sentence | Compound | Meaning |
|----------|----------|--------|
| @deva[अंशं हरति] | @deva[अंशहरः] | sharer |
| @deva[रिक्थं हरति] | @deva[रिक्थहरः] | heir |

Derivation: @deva[हृञ्] + @deva[अच्] = @deva[हर्] + @deva[अ] = @deva[हर] (by @ref[7.3.84]).

This debars @deva[अण्].

**When @deva[उद्यमन] 'raising up':** @deva[अण्] applies — @deva[भारहारः] 'porter'.

**@[vārtika]:** @deva[अच्] after @deva[ग्रह्] with @deva[शक्ति], @deva[लाङ्गल], @deva[अङ्कुश], @deva[यष्टि], @deva[तोमर], @deva[घट], @deva[घटी], @deva[धनुष्]: @deva[शक्तिग्रहः] 'lancer', @deva[लाङ्गलग्रहः] 'ploughman', @deva[धनुग्रहः] 'bow-bearer'.
"""

advanced = """
The affix @deva[अच्] comes after the verb @deva[हृञ्] when it does not mean 'to raise up' (@deva[उद्यमन]), with the object in composition.

This debars @deva[अण्]. The word @deva[उद्यमन] means 'to raise a load'.

**Examples:**
- @deva[अंशं हरति] = @deva[अंशहरः] 'who takes a share, a sharer'
- @deva[रिक्थहरः] 'an heir'

**Derivation:** @deva[हृञ्] + @deva[अच्] = @deva[हर्] + @deva[अ] = @deva[हरः] (by @ref[7.3.84]).

**Why @deva[अनुद्यमने]?** When @deva[हृ] means 'to raise up', @deva[अण्] applies: @deva[भारहारः] 'a burden-bearer, a porter'.

**@[vārtika] 1:** @deva[अच्] comes after @deva[ग्रह्] when in composition with @deva[शक्ति] 'spear', @deva[लाङ्गल] 'plough', @deva[अङ्कुश] 'goad', @deva[यष्टि] 'staff', @deva[तोमर] 'club', @deva[घट] 'jar', @deva[घटी] 'small jar', @deva[धनुष्] 'bow':
- @deva[शक्तिग्रहः] 'a lancer'
- @deva[लाङ्गलग्रहः] 'a ploughman'
- @deva[अङ्कुशग्रहः] 'an elephant driver'
- @deva[यष्टिग्रहः] 'a staff-bearer'
- @deva[धनुग्रहः] 'a bow-bearer'

**@[vārtika] 2:** @deva[अच्] after @deva[ग्रह्] with @deva[सूत्र] when meaning 'holding': @deva[सूत्रग्रहः] 'a thread-holder'. Otherwise: @deva[सूत्रग्राहः] 'a thread-taker'.
"""

id = "3.2.116"
numericId = "32116"

[en]
simple = """
@deva[लङ्] (Imperfect) also comes after a verb when the particles @deva[ह] (alas) or @deva[शश्वत्] (repeatedly) are in connection with it, denoting past action not witnessed by the speaker and before the current day. The @deva[च] 'and' indicates @deva[लिट्] (Perfect) may also be used. Examples: @deva[इति हाकरोत्] or @deva[इति ह चकार] 'Alas, he did it'; @deva[शश्वदकरोत्] or @deva[शश्वच्चकार] 'again and again he did it'.
"""

standard = """
@deva[लङ्] (Imperfect) also follows a verb when particles @deva[ह] or @deva[शश्वत्] are used, with @deva[भूतार्थ], @deva[अनद्यतन], and @deva[परोक्ष]. The @deva[च] permits @deva[लिट्] as alternative. Examples: @deva[इति हाकरोत्] (Imperfect) or @deva[इति ह चकार] (Perfect) 'Alas, he did it'; @deva[शश्वदकरोत्] or @deva[शश्वच्चकार] 'he did it repeatedly'.
"""

advanced = """
@deva[लङ्] also applies when @deva[ह] or @deva[शश्वत्] is @deva[योग] with @deva[भूतार्थ], @deva[अनद्यतन], @deva[परोक्ष]. @deva[च] permits @deva[लिट्]. Examples: @deva[इति हाकरोत्] / @deva[इति ह चकार]; @deva[शश्वदकरोत्] / @deva[शश्वच्चकार].
"""

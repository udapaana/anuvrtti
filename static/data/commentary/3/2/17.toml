id = "3.2.17"
numericId = "32017"

[en]
simple = """
The affix @deva[ट] is also used after @deva[चर्] when @deva[भिक्षा] 'alms', @deva[सेना] 'army', or @deva[आदाय] 'having taken' are in composition.

**Examples:**
- @deva[भिक्षां चरति] = @deva[भिक्षाचरः] 'beggar' (one who goes for alms)
- @deva[सेनां चरति] = @deva[सेनाचरः] 'one who goes with an army'
- @deva[आदाय चरति] = @deva[आदायचरः] 'one who goes after having taken'

These are not locatives, so a separate rule is needed.
"""

standard = """
The affix @deva[ट] comes after @deva[चर्] 'to go' when @deva[भिक्षा], @deva[सेना], or @deva[आदाय] are in composition.

| @deva[उपपद] | Compound | Meaning |
|------------|----------|--------|
| @deva[भिक्षा] | @deva[भिक्षाचरः] | beggar |
| @deva[सेना] | @deva[सेनाचरः] | one going with army |
| @deva[आदाय] | @deva[आदायचरः] | one going after taking |

The @deva[अनुवृत्ति] of 'locative case' (@deva[अधिकरणे]) does not extend to this @[sūtra] — hence a separate rule is needed for these non-locative @deva[उपपद]s.
"""

advanced = """
The affix @deva[ट] is used after the verb @deva[चर्] 'to go' when the words in composition with it @deva[भिक्षा] 'alms', @deva[सेना] 'army' and @deva[आदाय] 'having taken'. The @[anuvritti] of the words 'in the @deva[सप्तमी] (locative) case' does not extend to this aphorism, and hence the necessity of making a distinct and separate @[sutra]. Thus @deva[भिक्षाचरः] 'a beggar' (who goes for alms); @deva[सेनाचरः] 'one who goes with an army'; @deva[आदायचरः] 'one who goes after having taken'.
"""

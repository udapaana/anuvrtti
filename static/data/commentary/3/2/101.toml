id = "3.2.101"
numericId = "32101"

[en]
simple = """
The affix @deva[ड] is also seen after @deva[जन्] 'to be born' with past-time meaning even when the upapada has cases other than those mentioned in previous @[sūtras]. Examples: @deva[अजः] 'unborn' (from @deva[न जायते]), @deva[द्विजः] 'twice-born' (from @deva[द्विर्जातः]). The word @deva[अपि] 'though' frees this rule from restrictions—the affix applies after other verbs and cases too, as in @deva[परिखा] 'moat' (from @deva[परितः खाता] 'dug all around').
"""

standard = """
@deva[ड] is seen after @deva[जन्] with @deva[भूतार्थ] even with @deva[उपपद]s in cases other than those specified in @ref[3.2.97]-@ref[3.2.100]. Examples: @deva[अजः] 'unborn' (= @deva[न जायते]); @deva[द्विजः] 'twice-born' (= @deva[द्विर्जातः]). The @deva[अपि] frees this from restrictions: it applies even when @deva[जाति] is expressed (@deva[ब्राह्मणजो धर्मः]), when sense is not purely appellative (@deva[अभिजाः] 'hair'), when no @deva[कर्म] is present (@deva[अनुजः] 'younger brother'). It extends to other verbs: @deva[परिखा] 'moat' (= @deva[परितः खाता]).
"""

advanced = """
@deva[ड] is @deva[दृश्यते] (observed) after @deva[जन्] with @deva[भूतार्थ] beyond the restrictions of @ref[3.2.97]-@ref[3.2.100]. Examples: @deva[अजः], @deva[द्विजः]. The @deva[अपि] indicates @deva[निर्बन्धमुक्ति]: applies when @deva[जाति] is expressed (@deva[ब्राह्मणजो धर्मः]); when not purely @deva[आख्या] (@deva[अभिजाः]); without @deva[कर्म] (@deva[अनुजः]). Extends to other @deva[धातु]s: @deva[परिखा] (= @deva[परितः खाता]), @deva[आखा].
"""

id = "3.2.163"
numericId = "32163"

[en]
simple = """
The affix @deva[क्वरप्] comes after four verbs to denote habitual action: @deva[इ] (to go), @deva[नश्] (to destroy), @deva[जि] (to conquer), @deva[सृ] (to flow). The @deva[प्] marker triggers the augment @deva[तुक्] between root and affix. Examples: @deva[इत्वरः] (traveler), @deva[नश्वरः] (transitory), @deva[जित्वरः] (victorious), @deva[सृत्वरः] (going, a river). Feminine: @deva[इत्वरी], @deva[नश्वरी], etc.
"""

standard = """
The affix @deva[क्वरप्] applies after @deva[इ], @deva[नश्], @deva[जि], @deva[सृ] in @deva[तच्छीलादि] sense. The @deva[प्] is @deva[इत्], causing @deva[तुक्] augment by @ref[6.1.71]. Derivation: @deva[इ] + @deva[क्वरप्] = @deva[इ] + @deva[त्] + @deva[वर] = @deva[इत्वरः] (wayfarer). Similarly: @deva[नश्वरः] (perishable), @deva[जित्वरः] (conquering), @deva[सृत्वरः] (flowing - hence 'river'). Feminines in @deva[ई]: @deva[इत्वरी], @deva[नश्वरी], @deva[जित्वरी], @deva[सृत्वरी]. Note: though the affix begins with @deva[वल्] letters, @deva[इट्] is blocked by @ref[7.2.8].
"""

advanced = """
@deva[क्वरप्] after @deva[इ], @deva[नश्], @deva[जि], @deva[सृ] in @deva[तच्छीलादि] sense. The @deva[प्] is @deva[इत्], triggering @deva[तुक्] by @ref[6.1.71]. Formation: @deva[इ] + @deva[त्] + @deva[वर] = @deva[इत्वरः]; @deva[नश्] + @deva[त्] + @deva[वर] = @deva[नश्वरः]; @deva[जि] + @deva[त्] + @deva[वर] = @deva[जित्वरः]; @deva[सृ] + @deva[त्] + @deva[वर] = @deva[सृत्वरः]. Though the affix begins with @deva[वल्] @deva[प्रत्याहार] letters (which would require @deva[इट्] by @ref[7.2.35]), this is blocked by @ref[7.2.8]. Feminine forms: @deva[इत्वरी], @deva[नश्वरी], @deva[जित्वरी], @deva[सृत्वरी].
"""

id = "3.2.78"
numericId = "32078"

[en]
simple = """
When habit is expressed, the affix @deva[णिनि] comes after a verb with a case-inflected word in composition, provided that word does not denote a genus (class of beings). Examples: @deva[उष्णभोजी] 'one who habitually eats hot food', @deva[शीतभोजी] 'one who habitually eats cold food'. When the upapada denotes a genus, this affix does not apply: we say @deva[ब्राह्मणानामन्त्रयिता] 'inviter of @[brāhmaṇas]', not *@deva[ब्राह्मणानामन्त्रयी]. Without the habitual sense, no compound forms: @deva[उष्णं भुङ्क्ते कदाचित्] 'he sometimes eats hot food'.
"""

standard = """
When @deva[शील] (habitual action) is expressed, @deva[णिनि] follows a verb with a @deva[सुबन्त] (case-inflected word) in composition, provided the @deva[उपपद] does not denote @deva[जाति] (genus). Examples: @deva[उष्णभोजिन्], nominative @deva[उष्णभोजी] 'habitual hot-food eater'; @deva[शीतभोजी] 'habitual cold-food eater'. With a @deva[जातिवाचक] @deva[उपपद]: @deva[ब्राह्मणानामन्त्रयिता] (not *@deva[ब्राह्मणानामन्त्रयी]). Without @deva[शील]: @deva[उष्णं भुङ्क्ते कदाचित्] 'he sometimes eats hot'. The repetition of @deva[सुपि] (though available via @deva[अनुवृत्ति]) excludes @deva[उपसर्ग]s—though @[siddhānta] @[kaumudī] allows forms like @deva[अनुनायिन्], @deva[उपजीविन्]. @[vārttikas] add: @deva[आसृ] with @deva[उद्]/@deva[प्रति] (@deva[उदासारिन्], @deva[प्रत्यासारिन्]); skill-sense (@deva[साधुकारी], @deva[साधुदायी]); @deva[ब्रह्मवादिन्] after @deva[वद्] with @deva[ब्रह्म].
"""

advanced = """
@deva[शील] (habitual action) triggers @deva[णिनि] after a verb with @deva[सुबन्त] when the @deva[उपपद] is non-@deva[जातिवाचक]. Examples: @deva[उष्णभोजिन्], @deva[शीतभोजिन्]. @deva[जातिवाचक] blocks the affix: @deva[ब्राह्मणानामन्त्रयिता] (not *@deva[ब्राह्मणानामन्त्रयी]). The @deva[सुपि] repetition (despite @deva[अनुवृत्ति]) excludes @deva[उपसर्ग]—contested by @[siddhānta] @[kaumudī] which permits @deva[अनुनायिन्], @deva[उपजीविन्]. @deva[वार्त्तिक]s: (1) @deva[आसृ] with @deva[उद्]/@deva[प्रति] (@deva[उदासारिन्], @deva[प्रत्यासारिणी]); (2) @deva[कौशल]-sense (@deva[साधुकारी] 'skilled worker', @deva[साधुदायी] 'generous giver'); (3) @deva[ब्रह्मवादिन्] after @deva[वद्] with @deva[ब्रह्म].
"""

id = "3.2.137"
numericId = "32137"

[en]
simple = """
In Vedic literature, the affix @deva[इष्णुच्] in the sense of 'agent having such habit etc.' comes after verbs ending in the causative @deva[णि]. Examples: @deva[दृषदं धारयिष्णवः] 'who hold the stones', @deva[वीरुधः पारयिष्णवः] 'who complete the herbs'.
"""

standard = """
In @deva[छन्दस्], @deva[इष्णुच्] with @deva[तच्छीलादि] follows @deva[णिच्]-ending (@deva[ण्यन्त]) verbs. Examples: @deva[दृषदं धारयिष्णवः] 'who hold the stones'; @deva[वीरुधः पारयिष्णवः].
"""

advanced = """
In @deva[छन्दस्], @deva[इष्णुच्] with @deva[तच्छीलादि] follows @deva[ण्यन्त] @deva[धातु]s. Examples: @deva[धारयिष्णवः], @deva[पारयिष्णवः].
"""

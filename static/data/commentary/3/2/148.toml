id = "3.2.148"
numericId = "32148"

[en]
simple = """
The affix @deva[युच्] comes after intransitive verbs denoting motion or sound, in the sense of 'agent having such habit etc.' Examples: @deva[चलनः] 'moving' (@ref[7.1.1]), @deva[चोपनः] 'creeping', @deva[शब्दनः] 'sounding', @deva[रवणः] 'roaring'. Why 'intransitive'? With transitive verbs: @deva[पठिता विद्याम्] (uses @deva[तृन्], not @deva[युच्]).
"""

standard = """
@deva[युच्] follows @deva[अकर्मक] (intransitive) verbs with @deva[गत्यर्थ] (motion) or @deva[शब्दार्थ] (sound) meaning, in @deva[तच्छीलादि] sense. Examples: @deva[चल्] + @deva[युच्] = @deva[चलनः] (@ref[7.1.1]); @deva[चोपनः], @deva[शब्दनः], @deva[रवणः]. @deva[अकर्मक] restriction: @deva[पठिता विद्याम्] (transitive → @deva[तृन्]).
"""

advanced = """
@deva[युच्] follows @deva[अकर्मक] @deva[गत्यर्थ]/@deva[शब्दार्थ] verbs with @deva[तच्छीलादि]. Examples: @deva[चलनः], @deva[शब्दनः]. @deva[अकर्मक] only: @deva[पठिता विद्याम्].
"""

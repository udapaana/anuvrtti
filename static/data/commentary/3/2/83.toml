id = "3.2.83"
numericId = "32083"

[en]
simple = """
The affix @deva[खश्] also comes after @deva[मन्] 'to think' when the upapada is case-inflected and the meaning is 'thinking oneself to be such'. The @deva[च] ('and') indicates @deva[णिनि] is also permitted. Examples: @deva[दर्शनीयम्मन्यः] or @deva[दर्शनीयमानी] 'one who thinks himself handsome', @deva[पण्डितम्मन्यः] or @deva[पण्डितमानी] 'one who thinks himself learned'. When self-reference is absent, only @deva[णिनि]: @deva[दर्शनीयमानी देवदत्तस्य यज्ञदत्तः] '@[yajñadatta] thinks Devadatta handsome'.
"""

standard = """
@deva[खश्] also follows @deva[मन्] with a @deva[सुबन्त] when @deva[आत्ममान] (thinking of oneself as such) is expressed. The @deva[च] allows @deva[णिनि] as an alternative. Examples: @deva[दर्शनीयम्मन्यः] or @deva[दर्शनीयमानी]; @deva[पण्डितम्मन्यः] or @deva[पण्डितमानी]. Without @deva[आत्ममान]: @deva[दर्शनीयमानी देवदत्तस्य यज्ञदत्तः] '@[yajñadatta] thinks Devadatta handsome' (only @deva[णिनि]). The @deva[ख्] triggers @deva[मुम्] augment (@ref[6.3.66]); @deva[श्] makes @deva[खश्] @deva[सार्वधातुक], triggering appropriate @deva[विकरण]s. Affixes treated so far apply in all tenses; subsequent affixes denote specific times.
"""

advanced = """
@deva[खश्] also follows @deva[मन्] with @deva[सुबन्त] when @deva[आत्ममान] is expressed. The @deva[च] permits @deva[णिनि] optionally. Examples: @deva[दर्शनीयम्मन्यः]/@deva[दर्शनीयमानी], @deva[पण्डितम्मन्यः]/@deva[पण्डितमानी]. Without @deva[आत्ममान]: @deva[दर्शनीयमानी देवदत्तस्य यज्ञदत्तः]. The @deva[ख्] is @deva[इत्] causing @deva[मुमागम] (@ref[6.3.66]); @deva[श्] makes @deva[खश्] @deva[सार्वधातुक], triggering @deva[विकरण]s. Affixes up to this point apply across all tenses; subsequent affixes denote specific times (@deva[भूतकाल]).
"""

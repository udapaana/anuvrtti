id = "3.2.134"
numericId = "32134"

[en]
simple = """
From this @[sūtra] up to and including @deva[क्विप्] in @ref[3.2.177], the affixes should be understood in the sense of agents having such a habit (@deva[तच्छील]), such a nature (@deva[तद्धर्म]), or having skill in such action (@deva[तत्साधुकारि]). @deva[तच्छील] = natural inclination toward an action not prompted by considering its result. @deva[तद्धर्म] = entering upon an action thinking it is one's duty (not from habit). @deva[तत्साधुकारि] = doing the action excellently.
"""

standard = """
From this @[sūtra] through @deva[क्विप्] in @ref[3.2.177] (@deva[आ] = inclusive limit), affixes express @deva[तच्छीलतद्धर्मतत्साधुकारि] (agent having such habit, nature, or skill). @deva[तच्छील] = natural inclination toward action without @deva[फलचिन्तन]. @deva[तद्धर्म] = performing action as @deva[कर्तव्य] (duty), not from habit. @deva[तत्साधुकारि] = excellent performer of the action. Illustrations follow in subsequent @[sūtras].
"""

advanced = """
@deva[अधिकार] from here through @deva[क्विप्] (@ref[3.2.177])—@deva[आ] is @deva[समुच्चयार्थ]. Affixes express @deva[तच्छीलतद्धर्मतत्साधुकारि]. @deva[तच्छील] = @deva[फलानपेक्षप्रवृत्ति]. @deva[तद्धर्म] = @deva[कर्तव्यबुद्धिप्रवृत्ति]. @deva[तत्साधुकारि] = @deva[उत्कर्षेण क्रियाकरण].
"""

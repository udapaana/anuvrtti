id = "3.2.129"
numericId = "32129"

[en]
simple = """
The affix @deva[चानश्] comes after a verb when expressing habit (@deva[ताच्छील्य]), standard of age (@deva[वयस्]), or inability/capacity (@deva[शक्ति]). Habit: @deva[भोजं भुञ्जानः] 'habituated to enjoy'. Age: @deva[कवचं बिभ्राणः] 'wearing armor' (at the age for armor). Capacity: @deva[शत्रुं निघ्नानः] 'able to destroy his foe'. Also: @deva[मुण्डयमानाः], @deva[भूषयमानाः], @deva[कवचं पर्यस्यमानाः], @deva[शिखण्डं वहमानाः], @deva[पचमानाः].
"""

standard = """
@deva[चानश्] follows a verb when expressing @deva[ताच्छील्य] (habit/disposition), @deva[वयस्] (age condition), or @deva[शक्ति] (capacity). @deva[ताच्छील्य]: @deva[भोजं भुञ्जानः] 'habitually enjoying'. @deva[वयस्]: @deva[कवचं बिभ्राणः] 'wearing armor at appropriate age'. @deva[शक्ति]: @deva[शत्रुं निघ्नानः] 'capable of destroying foe'. Also: @deva[मुण्डयमानाः], @deva[भूषयमानाः], @deva[कवचं पर्यस्यमानाः], @deva[शिखण्डं वहमानाः], @deva[पचमानाः].
"""

advanced = """
@deva[चानश्] follows @deva[धातु] with @deva[ताच्छील्य], @deva[वयस्], or @deva[शक्ति]. @deva[ताच्छील्य]: @deva[भोजं भुञ्जानः]. @deva[वयस्]: @deva[कवचं बिभ्राणः]. @deva[शक्ति]: @deva[शत्रुं निघ्नानः]. Also: @deva[मुण्डयमानाः], @deva[भूषयमानाः], @deva[पचमानाः].
"""

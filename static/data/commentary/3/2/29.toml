id = "3.2.29"
numericId = "32029"

[en]
simple = """
The affix @deva[खश्] is used after @deva[ध्मा] 'to blow' and @deva[धे] 'to suck' when @deva[नासिका] 'nose' or @deva[स्तन] 'breast' is in composition.

**Examples:**
- @deva[स्तनन्धयः] 'infant' (breast-sucker)
- @deva[नासिकन्धमः] 'one who breathes through the nose'
- @deva[नासिकन्धयः] 'one who drinks through the nose'

Note: @deva[यथासंख्य] (one-to-one correspondence) does not apply here—both @deva[उपपद]s can combine with both roots.
"""

standard = """
The affix @deva[खश्] comes after @deva[ध्मा] 'to blow' and @deva[धेट्] 'to suck' when @deva[नासिका] 'nose' or @deva[स्तन] 'breast' is in composition.

**Key example:** @deva[स्तनन्धयः] 'infant'
- Derivation: @deva[स्तन] + @deva[मुम्] + @deva[धे] + @deva[शप्] + @deva[खश्] = @deva[स्तनम्धयअ] = @deva[स्तनन्धयः]

**@deva[नासिका] combinations:**
- @deva[नासिकन्धमः] 'breathing through nose' (with @deva[ध्मा])
- @deva[नासिकन्धयः] 'drinking through nose' (with @deva[धे])

**Note:** @deva[यथासंख्य] (@ref[1.3.10]) does not apply—indicated by the irregular @deva[द्वन्द्व] @deva[नासिकास्तनयोः] (should be @deva[स्तननासिकयोः] by @ref[2.2.34]).

**Feminine:** @deva[स्तनन्धयी] (root @deva[धे] has indicatory @deva[ट्]).
"""

advanced = """
The affix @deva[खश्] comes after @deva[ध्मा] 'to blow' and @deva[धेट्] 'to suck' when @deva[नासिका] 'nose' or @deva[स्तन] 'breast' is in composition as object.

**@deva[यथासंख्य] does not apply:** The irregular @deva[द्वन्द्व] compound @deva[नासिकास्तनयोः] in the @[sūtra] (violating @ref[2.2.34] which requires fewer syllables first) indicates @deva[यथासंख्य] (@ref[1.3.10]) is suspended.

**@deva[स्तन] + @deva[धेट्]:**
@deva[स्तन] + @deva[धे] + @deva[खश्] = @deva[स्तन] + @deva[मुम्] + @deva[धे] + @deva[शप्] + @deva[खश्] = @deva[स्तनम्] + @deva[धय्] + @deva[अ] + @deva[अ] = @deva[स्तनन्धयः] 'infant' (by @ref[6.3.66], @ref[6.3.67], @ref[7.3.78])

**@deva[नासिका] + @deva[ध्मा]/[@deva[धे]]:**
- @deva[नासिकन्धमः] 'breathing through nose' (@ref[6.3.66], @ref[6.3.67], @ref[7.3.78])
- @deva[नासिकन्धयः] 'drinking through nose'

**Feminine:** @deva[स्तनन्धयी] (root @deva[धे] has @deva[ट्], hence long @deva[ई]).
"""

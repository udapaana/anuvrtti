id = "3.2.30"
numericId = "32030"

[en]
simple = """
The affix @deva[खश्] is used after @deva[ध्मा] 'to blow' and @deva[धे] 'to suck' when @deva[नाडी] 'tube' or @deva[मुष्टि] 'fist' is in composition.

**Examples:**
- @deva[नाडिन्धमः] 'blowing through a tube'
- @deva[मुष्टिन्धमः] 'blowing through the fist'
- @deva[नाडिन्धयः] 'sucking through a tube' (infant)
- @deva[मुष्टिन्धयः] 'infant'

The @deva[च] 'and' indicates other similar words: @deva[घटिन्धमः], @deva[खारिन्धमः], @deva[वातन्धमः] 'mountain'.
"""

standard = """
The affix @deva[खश्] comes after @deva[ध्मा] 'to blow' and @deva[धेट्] 'to suck' when @deva[नाडी] 'tube' or @deva[मुष्टि] 'fist' is in composition.

| @deva[उपपद] | + @deva[ध्मा] | + @deva[धे] |
|------|---------|--------|
| @deva[नाडी] | @deva[नाडिन्धमः] | @deva[नाडिन्धयः] |
| @deva[मुष्टि] | @deva[मुष्टिन्धमः] | @deva[मुष्टिन्धयः] |

**Note:** Irregular @deva[द्वन्द्व] @deva[नाडीमुष्टि] (should be @deva[मुष्टिनाडी] by @ref[2.2.32], as @deva[मुष्टि] is @deva[घि]) indicates @deva[यथासंख्य] doesn't apply.

**@deva[च] indicates extensions:** @deva[घटिन्धमः], @deva[घटिन्धयः], @deva[खारिन्धमः], @deva[खारिन्धयः], @deva[वातन्धमः], @deva[वातन्धयः] 'mountain'.

**Note:** This @[sūtra] is actually a @deva[वार्तिक] elevated to @[sūtra] status by the @[kāśikā].
"""

advanced = """
The affix @deva[खश्] comes after @deva[ध्मा] 'to blow' and @deva[धेट्] 'to suck' when @deva[नाडी] 'tube' or @deva[मुष्टि] 'fist' is in composition.

**@deva[यथासंख्य] non-applicability:** The irregular @deva[द्वन्द्व] @deva[नाडीमुष्टि] (violating @ref[2.2.32]—@deva[घि] words like @deva[मुष्टि] should precede) signals suspension of @deva[यथासंख्य].

**Examples:**
- @deva[नाडिन्धमः] 'blowing through tube'
- @deva[मुष्टिन्धमः] 'blowing through fist'
- @deva[नाडिन्धयः] 'infant (sucking through tube)'
- @deva[मुष्टिन्धयः] 'infant'

**@deva[च] indicates extensions:** @deva[घटिन्धमः], @deva[घटिन्धयः], @deva[खारिन्धमः], @deva[खारिन्धयः], @deva[वातन्धमः], @deva[वातन्धयः] 'mountain'.

**Historical note:** This @[sūtra] is actually a @deva[वार्तिक] elevated to @[sūtra] rank by the @[kāśikā]. The @[vārtikakāra] divides the previous @[sūtra] as: (1) @deva[स्तने धेटः], (2) @deva[ततो मुष्टो ध्मश्च], (3) @deva[नासिकायां ध्मश्च धेटश्च], (4) @deva[नाडी मुष्टि घटोखारीष्विति वक्तव्यम्].
"""

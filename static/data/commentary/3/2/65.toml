id = "3.2.65"
numericId = "32065"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), the affix @deva[ञ्युट्] comes after @deva[वह्] 'to carry' when @deva[कव्य] 'oblation to ancestors', @deva[पुरीष] 'faeces', or @deva[पुरीष्य] 'water' is in composition.

**Examples:**
- @deva[कव्यवाहनः पितॄणाम्] 'fire that carries oblations to the ancestors'
- @deva[पुरीषवाहनः] 'carrier of water'

Feminine is formed with long @deva[ई].
"""

standard = """
In @deva[छन्दस्], the affix @deva[ञ्युट्] comes after @deva[वह्] 'to carry' with @deva[कव्य], @deva[पुरीष], or @deva[पुरीष्य].

**Examples:**
- @deva[कव्यवाहनः पितॄणाम्] 'fire carrying oblation to @deva[पितृ]s' (@deva[यजुर्वेद] II.29)
- @deva[पुरीषवाहनः] 'carrier of water'
- @deva[पुरीष्यवाहनः] (@deva[यजुर्वेद] XI.44)

**Feminine:** with long @deva[ई].
"""

advanced = """
In @deva[छन्दस्], the affix @deva[ञ्युट्] comes after @deva[वह्] with @deva[कव्य] 'oblation to deceased ancestors', @deva[पुरीष] 'faeces', or @deva[पुरीष्य] 'water'.

**Examples:**
- @deva[कव्यवाहनः पितॄणाम्] 'fire carrying oblation to @deva[पितृ]s' (@deva[यजुर्वेद] II.29)
- @deva[पुरीषवाहनः] 'carrier of water'
- @deva[पुरीष्यवाहनः] (@deva[यजुर्वेद] XI.44)

**Feminine:** formed by adding long @deva[ई].
"""

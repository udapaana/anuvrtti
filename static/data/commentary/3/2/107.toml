id = "3.2.107"
numericId = "32107"

[en]
simple = """
In Vedic literature, the affix @deva[क्वसु] optionally replaces @deva[लिट्] (Perfect). Examples: @deva[जक्षिवान्] 'eaten' (Yajur Veda VIII.19), @deva[पपिवान्] 'drunk'. Being optional, @deva[लिट्] forms also occur, as in @deva[अहं सूर्यमुभयतो ददर्श] (@ref[3.2.105]). This @[sūtra] is separated from the previous one so that @deva[क्वसु] alone (not @deva[कानच्]) continues into subsequent @[sūtras].
"""

standard = """
In @deva[छन्दस्], @deva[क्वसु] optionally replaces @deva[लिट्]. Examples: @deva[जक्षिवस्], nominative @deva[जक्षिवान्] 'eaten' (Yaj. Ved. VIII.19); @deva[पपिवस्], nominative @deva[पपिवान्] 'drunk'. Being @deva[विभाषा], @deva[लिट्] also occurs (@deva[ददर्श] in @ref[3.2.105]). The separation from @ref[3.2.106] is @deva[योगविभागार्थ]: only @deva[क्वसु] (not @deva[कानच्]) continues in @deva[अनुवृत्ति] into subsequent @[sūtras].
"""

advanced = """
In @deva[छन्दस्], @deva[क्वसु] @deva[विभाषया] replaces @deva[लिट्]. Examples: @deva[जक्षिवान्] (Yaj. VIII.19), @deva[पपिवान्]. @deva[विभाषा] permits @deva[लिट्] (@deva[ददर्श]). The @deva[योगविभाग] from @ref[3.2.106] ensures only @deva[क्वसु] (not @deva[कानच्]) continues in @deva[अनुवृत्ति].
"""

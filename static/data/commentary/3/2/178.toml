id = "3.2.178"
numericId = "32178"

[en]
simple = """
The affix @deva[क्विप्] comes after verbs beyond those listed above, as seen in actual usage. Examples: @deva[युक्] (joining), @deva[छित्] (piercing), @deva[भित्] (dividing). The phrase 'as seen' implies concurrent rules apply - sometimes vowel lengthening, sometimes reduplication, sometimes @deva[सम्प्रसारण] of semivowels.
"""

standard = """
The affix @deva[क्विप्] applies after other verbs as attested in usage (@deva[दृष्ट]). Examples: @deva[युज्] → @deva[युक्] (joining); @deva[छिद्] → @deva[छित्]; @deva[भिद्] → @deva[भित्]. The word @deva[दृष्ट] (seen) implies other rules apply concurrently: vowel lengthening, reduplication, or @deva[सम्प्रसारण] depending on the root.

@[vārtikas]: (1) Vowel lengthening for @deva[वच्], @deva[प्रच्छ्], @deva[आयतस्तु], @deva[कटप्रु], @deva[जु], @deva[श्री] (no @deva[सम्प्रसारण] by @ref[6.1.16]): @deva[वाक्], @deva[प्राट्], @deva[जूः], @deva[श्रीः]. (2) Reduplication for @deva[द्युत्], @deva[गम्], @deva[हु]: @deva[विद्युत्], @deva[जगत्], @deva[जुहूः]. (3) @deva[ध्या] has @deva[सम्प्रसारण]: @deva[धीः].
"""

advanced = """
@deva[क्विप्] after other roots @deva[दृष्टेः] (as attested). Examples: @deva[युक्], @deva[छित्], @deva[भित्]. The term @deva[दृष्ट] indicates concurrent application of other rules.

@note[type=@[vārtika]]: Vowel lengthening for @deva[वच्], @deva[प्रच्छ्], @deva[आयतस्तु], @deva[कटप्रु], @deva[जु], @deva[श्री], with no @deva[सम्प्रसारण] (blocking @ref[6.1.16]): @deva[वाक्]; @deva[प्रच्छ्] → @deva[प्रश्] (@ref[6.1.10]) → @deva[प्रष्] (@ref[8.2.36]) → @deva[प्राट्] (@ref[8.4.56]); @deva[जूः]; @deva[श्रीः] (@[lakṣmī]).

@note[type=@[vārtika]]: Reduplication for @deva[द्युत्], @deva[गम्], @deva[हु]: @deva[विद्युत्], @deva[जगत्] (world), @deva[जुहूः] (with lengthening - the sacrificial ladle).

@note[type=@[vārtika]]: @deva[तॄ] shortens: @deva[दतृत्]. @deva[ध्या] has @deva[सम्प्रसारण]: @deva[धीः] (thought, intellect).
"""

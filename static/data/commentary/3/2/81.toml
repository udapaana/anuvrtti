id = "3.2.81"
numericId = "32081"

[en]
simple = """
The affix @deva[णिनि] optionally comes after a verb when continued repetition of an action (zealous practice, not mere habit) is expressed. Examples: @deva[कषायपायिणो गान्धाराः] 'the people of @[gāndhāra] are @[kaṣāya-drinkers]', @deva[क्षीरपायिण उशीनाराः] 'the people of @[uśīnara] are milk-drinkers', @deva[सौवीरपायिणो बाह्लीकाः] 'the people of @[bāhlīka] are @[sauvīra-drinkers]'. The word 'diversely' indicates this affix is not universally applied—e.g., @deva[कुल्माषखादः] 'grain-eater' uses a different affix.
"""

standard = """
@deva[णिनि] comes @deva[विभाषया] (optionally) when @deva[आभीक्ष्ण्य] (assiduous practice—distinct from mere @deva[शील]) is expressed. Examples: @deva[कषायपायिन्] (with @deva[युक्] augment by @ref[7.3.33]), nominative plural @deva[कषायपायिणो गान्धाराः]; @deva[क्षीरपायिण उशीनाराः]; @deva[सौवीरपायिणो बाह्लीकाः]. The @deva[बहुलम्] indicates non-application elsewhere: @deva[कुल्माषखादः] (not *@deva[कुल्माषखादी]).
"""

advanced = """
@deva[णिनि] comes @deva[विभाषया] when @deva[आभीक्ष्ण्य] (zealous repetition, distinct from @deva[शील]) is expressed. Examples: @deva[कषायपायिन्] (@ref[7.3.33] @deva[युगागम]), @deva[क्षीरपायिन्], @deva[सौवीरपायिन्]. The @deva[बहुलम्] restricts application: @deva[कुल्माषखादः] uses @deva[अच्] (not @deva[णिनि]). @deva[आभीक्ष्ण्य] denotes zealous, assiduous practice—not mere habitual action.
"""

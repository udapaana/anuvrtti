id = "3.2.5"
numericId = "32005"

[en]
simple = """
The affix @deva[क] is used after @deva[परिमृज्] 'to wipe' and @deva[अपनुद्] 'to drive away' when @deva[तुन्द] 'navel' and @deva[शोक] 'grief' are in composition respectively.

**Examples:**
- @deva[तुन्दं परिमृजते] = @deva[तुन्दपरिमृज्] 'lazy person' (one who just rubs his belly)
- @deva[शोकम् अपनुदति] = @deva[शोकापनुद्] 'dispeller of sorrow'

These are specialized formations with specific idiomatic meanings.
"""

standard = """
The affix @deva[क] comes after @deva[परिमृज्] 'to wipe' and @deva[अपनुद्] 'to drive away' when @deva[तुन्द] 'navel' and @deva[शोक] 'grief' are in composition.

| Root | @deva[उपपद] | Compound | Meaning |
|------|------------|----------|--------|
| @deva[परिमृज्] | @deva[तुन्द] | @deva[तुन्दपरिमृज्] | lazy person |
| @deva[अपनुद्] | @deva[शोक] | @deva[शोकापनुद्] | dispeller of sorrow |

**@[vārtika]:** This applies only when the meanings are 'lazy' and 'giver of happiness'. Otherwise:
- @deva[तुन्दपरिमार्जः] (with @deva[अण्]) = 'one who actually cleans his navel'
- @deva[शोकापनोदः] (with @deva[अण्]) = 'removal of sorrow'

**Additional @deva[क]-forms:** @deva[मूलविभुजः] 'chariot', @deva[नखमुचः] 'bow', @deva[कुमुदम्] 'lotus' (@deva[कौ मोदते]).
"""

advanced = """
The affix @deva[क] comes after the verbs @deva[परिमृज्] 'to wash out' and @deva[अपनुद्] 'to drive away' when in composition with @deva[तुन्द] 'navel' and @deva[शोक] 'grief' respectively.

**Examples:**
- @deva[तुन्दं परिमृजते आस्ते] = @deva[तुन्दपरिमृज्] 'he lay lazy'
- @deva[शोकापनुदः पुत्रो जातः] 'a son, destroyer of sorrow, is born'

**@[vārtika] 1:** This affix applies only when the meaning is 'lazy' and 'giver of happiness'.

**@[vārtika] 2:** @deva[तुन्दपरिमृजः] is applied to a lazy person; @deva[तुन्दपरिमार्जः] means 'one who clears his navel'. Similarly, @deva[शोकापनुदः] means 'giver of happiness', while @deva[शोकापनोदः] means 'removal of sorrow'.

**@[vārtika] 3:** The words @deva[मूलविभुजः] 'a chariot' and others should be included among @deva[क]-formations. These can only be recognized by their form, as there is no list:
- @deva[मूलविभुजः] 'a chariot'
- @deva[नखमुचः] 'a bow'
- @deva[काकगुह] 'sesamums'
- @deva[कुमुदम्] (@deva[कौ मोदते]) 'a lotus'
"""

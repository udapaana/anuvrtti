id = "3.2.179"
numericId = "32179"

[en]
simple = """
The affix @deva[क्विप्] comes after @deva[भू] (to be) when the resulting word denotes a name or a surety. Examples: @deva[विभूः] (a person named Vibhu), @deva[प्रतिभूः] (a surety - one who stands between debtor and creditor).
"""

standard = """
The affix @deva[क्विप्] applies after @deva[भू] when denoting a proper name or surety. Examples: @deva[विभूः] (the name 'Vibhu'); @deva[प्रतिभूः] (guarantor - one who stands as intermediary between debtor and creditor). This is distinct from the @deva[डु] affix rule in @ref[3.2.180].
"""

advanced = """
@deva[क्विप्] after @deva[भू] when the word denotes @deva[संज्ञा] (proper name) or @deva[प्रतिभू] (surety). Formations: @deva[वि] + @deva[भू] + @deva[क्विप्] = @deva[विभूः] (personal name); @deva[प्रति] + @deva[भू] + @deva[क्विप्] = @deva[प्रतिभूः] (guarantor - literally 'one who exists in place of'). Contrast with @ref[3.2.180] where @deva[डु] applies when NOT a proper name.
"""

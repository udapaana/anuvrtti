id = "3.2.114"
numericId = "32114"

[en]
simple = """
@deva[लृट्] (2nd Future) optionally applies in the past sense when a word implying recollection is used (with or without @deva[यत्]), provided two verbs in the same sentence are interdependent—one necessary to complete the meaning of the other. Example: @deva[अभिजानासि देवदत्त कश्मीरान् गमिष्यामः, तत्र सक्तून् पास्यामः] or @deva[...गच्छाम, तत्र सक्तून् पिबाम] 'Do you remember, Devadatta, we went to Kashmir and drank saktu there'. The first verb (going) is the sign; the second (drinking) is what is really signified.
"""

standard = """
@deva[लृट्] comes @deva[विभाषया] with @deva[भूतार्थ] when @deva[अभिज्ञावचन] (with or without @deva[यत्]) is used and the two verbs are @deva[साकाङ्क्ष] (interdependent—each necessary for the other to complete the speaker's meaning). @deva[साकाङ्क्षा] = relation between @deva[लिङ्ग] (sign) and @deva[लिङ्गिन्] (signified). Examples: @deva[अभिजानासि देवदत्त कश्मीरान् गमिष्यामः, तत्र सक्तून् पास्यामः] or @deva[...गच्छाम, ...पिबाम]; with @deva[यत्]: @deva[अभिजानासि देवदत्त यत् कश्मीरान् गमिष्यामः यत् तत्रौदनं भोक्ष्यामहे] or @deva[यत्...गच्छाम, यत्...अभुञ्ज्महि]. The first verb (going) introduces; the second (eating/drinking) is the main thought.
"""

advanced = """
@deva[लृट्] @deva[विभाषया] with @deva[भूतार्थ] when @deva[अभिज्ञावचन] (±@deva[यत्]) and @deva[साकाङ्क्षक्रिया]—two verbs in @deva[लिङ्गलिङ्गिभाव]. Examples: @deva[अभिजानासि देवदत्त कश्मीरान् गमिष्यामः तत्र सक्तून् पास्यामः] / @deva[गच्छाम...पिबाम]. First @deva[क्रिया] is @deva[लिङ्ग]; second is @deva[लिङ्गिन्]. @deva[विभाषा] permits @deva[लृट्] or other @deva[लकार]s.
"""

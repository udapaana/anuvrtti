id = "3.2.153"
numericId = "32153"

[en]
simple = """
The affix @deva[युच्] is blocked after three specific verbs: @deva[सूद्] (to strike), @deva[दीप्] (to shine), and @deva[दीक्ष्] (to initiate). These verbs are @deva[अनुदात्तेत्] (have an @deva[अनुदात्त] marker), which would normally allow @deva[युच्] by @ref[3.2.149]. Instead, they take @deva[तृन्]. Examples: @deva[सूदिता] (one who strikes), @deva[दीपिता] (one who shines), @deva[दीक्षिता] (one who initiates).
"""

standard = """
This @[sūtra] blocks @deva[युच्] after the @deva[अनुदात्तेत्] verbs @deva[सूद्], @deva[दीप्], and @deva[दीक्ष्], which would otherwise take @deva[युच्] by @ref[3.2.149]. Instead, @deva[तृन्] applies. Examples: @deva[सूदितृ] → @deva[सूदिता] (striker), @deva[दीपितृ] (illuminator), @deva[दीक्षितृ] (initiator). Note that @ref[3.2.167] separately prescribes @deva[र] after @deva[दीप्], but the @deva[वासरूपविधि] @[paribhāṣā] does not universally prevent @deva[युच्] - forms like @deva[कम्रा] and @deva[कम्पना] both exist.
"""

advanced = """
This blocks @deva[युच्] (from @ref[3.2.149]) after @deva[सूद्], @deva[दीप्], and @deva[दीक्ष्], forcing @deva[तृन्] instead. The @[sūtra] addresses a potential objection: since @ref[3.2.167] prescribes @deva[र] after @deva[दीप्], that @deva[अपवाद] should already block @deva[युच्]. The answer is that the @deva[वासरूपविधि] @[paribhāṣā] (from @ref[3.2.146], @ref[3.2.150]) is not universal - both @deva[कम्रा] and @deva[कम्पना] are valid, as are @deva[कम्प्रा] and @deva[कम्पना]. For @deva[मधुसूदन], @deva[रिपुसूदन]: (1) this is an @deva[अनित्य] rule (inferred from @deva[योगविभाग]), (2) these belong to @deva[मन्दादि] taking @deva[ल्यु] by @ref[3.1.134], or (3) they form by @deva[ल्युट्] via @ref[3.3.113].
"""

id = "3.2.166"
numericId = "32166"

[en]
simple = """
The affix @deva[ऊक] comes after intensive (@deva[यङन्त]) forms of three verbs: @deva[यज्] (to sacrifice), @deva[जप्] (to mutter), @deva[दश्] (to bite). The intensive expresses repeated action. Examples: @deva[यायजूकः] (one who performs frequent sacrifices), @deva[जञ्जपूकः] (one who constantly mutters prayers), @deva[दन्दशूकः] (what bites frequently - a snake).
"""

standard = """
The affix @deva[ऊक] applies after @deva[यङन्त] (intensive) forms of @deva[यज्], @deva[जप्], @deva[दश्] in @deva[तच्छीलादि] sense. The intensive denotes repeated or intensified action. Formations: @deva[यायज्] + @deva[ऊक] = @deva[यायजूकः] (frequent sacrificer); @deva[जञ्जप्] + @deva[ऊक] = @deva[जञ्जपूकः] (constant mutterer of prayers); @deva[दन्दश्] + @deva[ऊक] = @deva[दन्दशूकः] (habitual biter - epithet for snakes).
"""

advanced = """
@deva[ऊक] after @deva[यङन्त] (intensive) stems of @deva[यज्], @deva[जप्], @deva[दश्] in @deva[तच्छीलादि] sense. The @deva[य्] in the @[sūtra] refers to verbs ending in the affix @deva[यङ्] (intensive marker). Intensives are formed with reduplication: @deva[यज्] → @deva[यायज्]; @deva[जप्] → @deva[जञ्जप्]; @deva[दश्] → @deva[दन्दश्]. Final forms: @deva[यायजूकः] (assiduous sacrificer), @deva[जञ्जपूकः] (habitual prayer-mutterer), @deva[दन्दशूकः] (snake - 'the constant biter').
"""

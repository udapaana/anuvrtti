id = "3.2.112"
numericId = "32112"

[en]
simple = """
When a word implying 'recollection' is in connection with a verb, the verb takes @deva[लृट्] (2nd Future) in the sense of past time before the current day. This overrides @deva[लङ्]. Example: @deva[अभिजानासि देवदत्त कश्मीरेषु वत्स्यामः] 'Do you remember, Devadatta, we were dwelling in Kashmir' (literally 'we will dwell'). The term @deva[वचन] 'signification' indicates the same applies to synonyms of @deva[अभिज्ञा]: @deva[स्मरसि] 'do you remember', @deva[बुध्यसे] 'do you know', @deva[चेतयसे] 'do you reflect'.
"""

standard = """
When @deva[अभिज्ञावचन] (word implying recollection) is connected with a verb, @deva[लृट्] (2nd Future) applies with @deva[भूतार्थ] in @deva[अनद्यतन]. This @deva[अपवाद] to @deva[लङ्]. Example: @deva[अभिजानासि देवदत्त कश्मीरेषु वत्स्यामः] 'Do you remember, Devadatta, we dwelt in Kashmir' (lit. 'will dwell'). The term @deva[वचन] indicates synonyms of @deva[अभिज्ञा] also apply: @deva[स्मरसि], @deva[बुध्यसे], @deva[चेतयसे].
"""

advanced = """
@deva[अभिज्ञावचन] triggers @deva[लृट्] with @deva[भूतार्थ] in @deva[अनद्यतन]—@deva[अपवाद] to @deva[लङ्]. Example: @deva[अभिजानासि देवदत्त कश्मीरेषु वत्स्यामः]. The @deva[वचन] extends to @deva[अभिज्ञा]-@deva[पर्याय]s: @deva[स्मरसि], @deva[बुध्यसे], @deva[चेतयसे].
"""

id = "3.2.105"
numericId = "32105"

[en]
simple = """
In Vedic literature, the affix @deva[लिट्] (Perfect tense) comes after a verb with past-time meaning. Examples: @deva[अहं सूर्यमुभयतो ददर्श] 'I saw the sun from both sides', @deva[अहं द्यावापृथिवी आततान] 'I stretched heaven and earth'. Here @deva[ददर्श] and @deva[आततान] have the force of @deva[निष्ठा] (past participles). This differs from @ref[3.4.61] which requires syntactic relation between verbs.
"""

standard = """
In @deva[छन्दस्] (Vedic), @deva[लिट्] (Perfect) follows a @deva[धातु] with @deva[भूतार्थ]. Examples: @deva[अहं सूर्यमुभयतो ददर्श] 'I saw the sun from both sides'; @deva[अहं द्यावापृथिवी आततान] 'I stretched heaven and earth' (Yajur Veda VIII.9). Here @deva[ददर्श] and @deva[आततान] function like @deva[निष्ठा]. This differs from @ref[3.4.61] (where @deva[लुङ्], @deva[लङ्], @deva[लिट्] apply in @deva[छन्दस्] with @deva[धातुसम्बन्ध])—the present rule is general, without such limitation.
"""

advanced = """
In @deva[छन्दस्], @deva[लिट्] follows @deva[धातु] with @deva[भूतार्थ]. Examples: @deva[ददर्श], @deva[आततान] (Yaj. Ved. VIII.9)—functioning as @deva[निष्ठा]. This differs from @ref[3.4.61] (requires @deva[धातुसम्बन्ध] per @ref[3.4.1]); the present rule is @deva[सामान्य] without such @deva[नियम].
"""

id = "3.2.168"
numericId = "32168"

[en]
simple = """
The affix @deva[उ] comes after desiderative (@deva[सन्]) roots, and after @deva[आशंस्] (to wish) and @deva[भिक्ष्] (to beg), to denote habitual tendency. The @deva[सन्] here refers to the desiderative affix, not the verb @deva[सन्]. Examples: @deva[चिकीर्षुः] (desirous of doing), @deva[जिहीर्षुः] (desirous of taking), @deva[आशंसुः] (desirous), @deva[भिक्षुः] (beggar, mendicant). Note: @deva[आशंस्] is @deva[आ] + @deva[शसि] (to desire), not @deva[शंसि] (to praise).
"""

standard = """
The affix @deva[उ] applies after @deva[सनन्त] (desiderative) stems, and after @deva[आशंस्] and @deva[भिक्ष्], in @deva[तच्छीलादि] sense. The @deva[सन्] refers to the desiderative affix (not the verb @deva[सन्], which never takes this affix). Examples: @deva[चिकीर्षुः] (wishing to do), @deva[जिहीर्षुः] (wishing to take), @deva[आशंसुः] (hopeful), @deva[भिक्षुः] (mendicant). The verb @deva[आशंस्] = @deva[आ] + @deva[शसि] 'to desire', distinct from @deva[शंसि] 'to praise'.
"""

advanced = """
@deva[उ] after @deva[सनन्त] stems, @deva[आशंस्], and @deva[भिक्ष्] in @deva[तच्छीलादि] sense. The term @deva[सन्] denotes the desiderative affix, not the homonymous verb (which never combines with this @deva[उ]). Formations: @deva[चिकीर्षुः] (desirous of doing - from @deva[कृ] + @deva[सन्] + @deva[उ]), @deva[जिहीर्षुः] (desirous of taking - from @deva[हृ] + @deva[सन्] + @deva[उ]), @deva[आशंसुः] (hopeful), @deva[भिक्षुः] (monk, beggar). Note: @deva[आशंस्] = @deva[आ] + @deva[शसि] (to desire), not @deva[शंसि] (to praise).
"""

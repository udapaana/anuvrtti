id = "3.2.111"
numericId = "32111"

[en]
simple = """
The affix @deva[लङ्] (Imperfect) comes after a verb with past-time meaning when the action occurred before the current day (@deva[अनद्यतन]). The entire affix is replaced by conjugational terminations. Examples: @deva[अकरोत्] 'he did', @deva[अहरत्] 'he took'. @deva[अनद्यतन] is a @[bahuvrīhi] compound meaning 'not belonging to today'. When there is doubt about whether the action was today or yesterday, use @deva[लुङ्] (not @deva[लङ्]): @deva[अद्य ह्यो वा अभुञ्ज्महि] 'we ate today or yesterday'. @[vārttika]: @deva[लङ्] also applies for unwitnessed recent public events: @deva[अरुणद् यवनः साकेतम्] 'the Yavanas besieged @[sāketa]'.
"""

standard = """
@deva[लङ्] (Imperfect) follows a @deva[धातु] with @deva[भूतार्थ] when @deva[अनद्यतन] (before the current day). @deva[अनद्यतन] is @deva[बहुव्रीहि]: 'that which has not occurred during @deva[अद्यतन]'. The entire @deva[लकार] is replaced by @deva[तिङ्]. Examples: @deva[अकरोत्], @deva[अहरत्]. When time is doubtful (today or yesterday), use @deva[लुङ्]: @deva[अद्य ह्यो वा अभुञ्ज्महि]. @deva[वार्त्तिक]: @deva[लङ्] applies for @deva[अप्रत्यक्ष] (unwitnessed) events that are @deva[प्रसिद्ध] (well-known public) and @deva[प्रत्यक्षविषय] (potentially perceivable by speaker): @deva[अरुणद् यवनः साकेतम्], @deva[अरुणद् यवनः माध्यमिकान्]. Counter-examples: @deva[उदगात् आदित्यः] (witnessed); @deva[चकार कटं देवदत्तः] (not public); @deva[जघान कंसं किल वासुदेवः] (not perceivable).
"""

advanced = """
@deva[लङ्] follows @deva[धातु] with @deva[भूतार्थ] when @deva[अनद्यतन]. @deva[अनद्यतन] is @deva[बहुव्रीहि]: non-@deva[अद्यतन]. Replaced by @deva[तिङ्]. Examples: @deva[अकरोत्], @deva[अहरत्]. Doubt → @deva[लुङ्]: @deva[अद्य ह्यो वा अभुञ्ज्महि]. @deva[वार्त्तिक]: @deva[लङ्] for @deva[अप्रत्यक्ष] + @deva[प्रसिद्ध] + @deva[प्रत्यक्षविषय]: @deva[अरुणद् यवनः साकेतम्]. Counter: @deva[उदगात् आदित्यः] (@deva[प्रत्यक्ष]); @deva[चकार कटं देवदत्तः] (non-@deva[प्रसिद्ध]); @deva[जघान कंसं किल वासुदेवः] (non-@deva[प्रत्यक्षविषय]).
"""

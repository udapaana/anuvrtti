id = "3.2.149"
numericId = "32149"

[en]
simple = """
The affix @deva[युच्] comes after intransitive verbs that are @deva[आत्मनेपदी], begin with a consonant, and have an @deva[अनुदात्त] indicatory vowel, in the sense of 'agent having such habit etc.' Examples: @deva[वर्तनः] 'being', @deva[वर्धनः] 'growing'. Why @deva[अनुदात्तेत्]? @deva[भविता] (not @deva[अनुदात्त]). Why consonant-initial? @deva[एधिता] (vowel-initial, uses @deva[तृन्]). Why @deva[आदि] in the @[sūtra]? For @deva[जुगुप्सनः], @deva[मीमांसनः]—without it, the rule would mean 'consonant-final', wrongly including @deva[एध्] and excluding vowel-final @deva[जुगुप्स्]. This rule doesn't apply if transitive: @deva[वसिता वस्त्रम्].
"""

standard = """
@deva[युच्] follows @deva[अकर्मक] @deva[आत्मनेपदिन्] verbs that are @deva[हलादि] (consonant-initial) and @deva[अनुदात्तेत्], with @deva[तच्छीलादि]. Examples: @deva[वर्तनः], @deva[वर्धनः]. Counter-examples: @deva[भविता] (not @deva[अनुदात्तेत्]); @deva[एधिता] (@deva[अजादि], uses @deva[तृन्]). The term @deva[आदि] is crucial: without it, @deva[अनुदात्तेतश्च हलः] would mean 'consonant-final' (@ref[1.1.72]), wrongly including @deva[एध्] and excluding @deva[जुगुप्स्] (vowel-final). With @deva[आदि]: @deva[जुगुप्सनः], @deva[मीमांसनः]. Transitive blocks: @deva[वसिता वस्त्रम्].
"""

advanced = """
@deva[युच्] follows @deva[अकर्मक] @deva[आत्मनेपदिन्] @deva[हलादि] @deva[अनुदात्तेत्] verbs with @deva[तच्छीलादि]. Examples: @deva[वर्तनः], @deva[वर्धनः]. @deva[भविता] (non-@deva[अनुदात्तेत्]); @deva[एधिता] (@deva[अजादि]). @deva[आदि] prevents @ref[1.1.72] reading: @deva[जुगुप्सनः], @deva[मीमांसनः]. Transitive: @deva[वसिता वस्त्रम्].
"""

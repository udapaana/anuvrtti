id = "3.2.31"
numericId = "32031"

[en]
simple = """
The affix @deva[खश्] is used after @deva[रुज्] 'to break' and @deva[वह्] 'to carry' when preceded by the prefix @deva[उद्], and @deva[कूल] 'bank' is in composition.

**Examples:**
- @deva[कूलमुद्रुजः] 'bank-breaker' (a chariot, river, or elephant)
- @deva[कूलमुद्वहः] 'bank-carrier' (that which tears up the bank)
"""

standard = """
The affix @deva[खश्] comes after @deva[रुजि] 'to break' and @deva[वह्] 'to carry' when preceded by @deva[उपसर्ग] @deva[उद्], and @deva[कूल] 'bank' is in composition as object.

**Examples:**
| Form | Meaning | Usage |
|------|---------|-------|
| @deva[कूलमुद्रुजः] | bank-breaker | chariot, river, elephant |
| @deva[कूलमुद्वहः] | bank-carrier | that which tears/carries away the bank |
"""

advanced = """
The affix @deva[खश्] comes after @deva[रुजि] 'to break into pieces' and @deva[वह्] 'to carry', when preceded by @deva[उपसर्ग] @deva[उद्] and @deva[कूल] 'bank' is in composition as object.

**Examples:**
- @deva[कूलमुद्रुजति] = @deva[कूलमुद्रुजः] 'breaking down banks' (applicable to a chariot, river, elephant, etc.)
- @deva[कूलमुद्वहः] 'tearing up or carrying away the bank'
"""

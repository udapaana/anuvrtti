id = "3.2.82"
numericId = "32082"

[en]
simple = """
The affix @deva[णिनि] comes after the verb @deva[मन्] 'to think' when a case-inflected word is in composition. Examples: @deva[दर्शनीयमानी] 'one who thinks himself handsome', @deva[शोभनम्मानी] 'one who thinks himself beautiful'. The verb here is from the 4th conjugation (@deva[दिवादि]), not the 8th (@deva[तनादि]).
"""

standard = """
@deva[णिनि] follows @deva[मन्] 'to think' (4th conjugation, @deva[दिवादि]) with a @deva[सुबन्त] in composition. Examples: @deva[दर्शनीयमानिन्], nominative @deva[दर्शनीयमानी] 'one who thinks himself handsome'; @deva[शोभनम्मानी] 'one who thinks himself beautiful'. The @deva[दिवादि] @deva[मन्] is intended (not @deva[तनादि]) because @deva[विभाषा] continues in @deva[अनुवृत्ति]. While both yield @deva[मानिन्] here, the distinction matters in the next @[sūtra] with @deva[खश्].
"""

advanced = """
@deva[णिनि] follows @deva[मन्] (@deva[दिवादि], not @deva[तनादि]) with @deva[सुबन्त]. Examples: @deva[दर्शनीयमानिन्], @deva[शोभनम्मानिन्]. The @deva[दिवादि] specification is significant because @deva[विभाषा] continues in @deva[अनुवृत्ति]. While both @deva[गण]s yield @deva[मानिन्] here, the distinction becomes relevant in the next @[sūtra] with @deva[खश्], where @deva[श्यन्] @deva[विकरण] applies to @deva[दिवादि] but not @deva[तनादि].
"""

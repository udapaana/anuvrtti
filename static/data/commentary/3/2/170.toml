id = "3.2.170"
numericId = "32170"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), the affix @deva[उ] comes after denominative (@deva[क्यन्त]) roots to denote habitual action. The term @deva[क्य] covers three affixes: @deva[क्यच्], @deva[क्यङ्], and @deva[क्यष्]. Examples: @deva[मित्रयुः], @deva[संस्वेदयुः], @deva[सुम्नयुः] (@[ṛg] Veda I.3.4). In classical Sanskrit, @deva[तृन्] is used instead, yielding @deva[मित्रीयिता].
"""

standard = """
In @deva[छन्दस्] (Vedic literature), @deva[उ] applies after @deva[क्यन्त] (denominative) stems in @deva[तच्छीलादि] sense. The term @deva[क्य] encompasses @deva[क्यच्], @deva[क्यङ्], and @deva[क्यष्] (see @ref[3.1.8] etc.). Vedic examples: @deva[मित्रयुः], @deva[संस्वेदयुः], @deva[सुम्नयुः] (RV I.3.4). In @deva[लौकिक] Sanskrit, @deva[तृन्] applies instead (e.g., @deva[मित्रीयिता]). Note: @ref[7.4.33] prescribes long @deva[ई] for final @deva[अ] before @deva[क्यच्], but @ref[7.4.35] suspends this in Vedic.
"""

advanced = """
In @deva[छन्दस्], @deva[उ] after @deva[क्यन्त] (denominative) stems in @deva[तच्छीलादि] sense. @deva[क्य] = @deva[क्यच्], @deva[क्यङ्], @deva[क्यष्] (see @ref[3.1.8], @ref[3.1.11], etc.). Vedic examples: @deva[मित्रयुः], @deva[संस्वेदयुः], @deva[सुम्नयुः] (RV I.3.4). In classical Sanskrit, @deva[तृन्] is used: @deva[मित्रीयिता]. Why no long @deva[ई] in @deva[मित्रयुः]? Rule @ref[7.4.33] (long @deva[ई] for @deva[अ] before @deva[क्यच्]) is suspended in @deva[छन्दस्] by @ref[7.4.35].
"""

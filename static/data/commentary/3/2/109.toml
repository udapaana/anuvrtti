id = "3.2.109"
numericId = "32109"

[en]
simple = """
The forms @deva[उपेयिवान्], @deva[अनाश्वान्], and @deva[अनूचानः] are irregular. For @deva[उपेयिवान्]: @deva[उप] + @deva[इ] + @deva[क्वसु] → reduplicate with long @deva[ई] (@ref[7.4.69]) → irregular @deva[इट्] augment (against @ref[7.2.67]) → @deva[इ] replaced by @deva[य] (@ref[6.4.81]) → @deva[उपेयिवान्]. This form occurs with other prefixes too: @deva[समीयिवान्], @deva[ईयिवान्]. For @deva[अनाश्वान्]: @deva[अन्] + @deva[अश्] + @deva[क्वसु] (no @deva[इट्]). For @deva[अनूचानः]: @deva[अनु] + @deva[वच्] + @deva[कानच्]. By @deva[विभाषा], alternative tense forms also apply.
"""

standard = """
The forms @deva[उपेयिवान्], @deva[अनाश्वान्], @deva[अनूचानः] are @deva[निपातन] (irregular). @deva[उपेयिवान्]: @deva[उप] + @deva[इ] + @deva[क्वसु] → @deva[उप] + @deva[ई] + @deva[इ] + @deva[क्वसु] (reduplication with long @deva[ई] by @ref[7.4.69]) → irregular @deva[इट्] augment contrary to @ref[7.2.67] → @deva[इ] → @deva[य] (@ref[6.4.81]) → @deva[उपेयिवस्], nominative @deva[उपेयिवान्]. @deva[इट्] drops in @deva[भ]-forms where @deva[वस्] → @deva[उष्]: @deva[उपेयुषः] (acc. pl.), @deva[उपेयुषा] (inst.). Also @deva[समीयिवान्], @deva[ईयिवान्]. Alternates: Aorist @deva[उपागात्], Imperfect @deva[उपैत्], Perfect @deva[उपेयाय]. @deva[अनाश्वान्]: @deva[अन्] + @deva[अश्] + @deva[क्वसु] (no @deva[इट्]); alternates: @deva[नाशीत्], @deva[नाश्नात्], @deva[आनाश]. @deva[अनूचानः]: @deva[अनु] + @deva[वच्] + @deva[कानच्]; alternates: @deva[अन्ववोचत्], @deva[अन्वब्रवीत्], @deva[अनूवाच].
"""

advanced = """
@deva[निपातन] forms: @deva[उपेयिवान्], @deva[अनाश्वान्], @deva[अनूचानः]. @deva[उपेयिवान्]: @deva[उपि] + @deva[क्वसु] → reduplication (@ref[7.4.69] @deva[दीर्घ]) → @deva[इट्] against @ref[7.2.67] → @deva[इयादेश] (@ref[6.4.81]) → @deva[उपेयिवान्]. @deva[इट्] drops in @deva[भसंज्ञक]: @deva[उपेयुषः], @deva[उपेयुषा]. Also @deva[समीयिवान्], @deva[ईयिवान्]. @deva[अनाश्वान्]: @deva[अनश्] + @deva[क्वसु] (no @deva[इट्]). @deva[अनूचानः]: @deva[अनुवच्] + @deva[कानच्].
"""

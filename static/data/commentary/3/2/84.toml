id = "3.2.84"
numericId = "32084"

[en]
simple = """
From this point forward, all affixes should be understood as having past-time meaning. This is a governing rule extending up to @ref[3.2.123]. Example: the next @[sūtra] teaches @deva[णिनि] after @deva[यज्] with an instrumental upapada—meaning 'one who has sacrificed'. Without past meaning, the affix does not apply: @deva[अग्निष्टोमेन यजति] 'he sacrifices with @[agniṣṭoma]' (present tense, no compound).
"""

standard = """
The phrase @deva[भूते] (past time sense) establishes an @deva[अधिकार] (governing rule) extending to @ref[3.2.123]. The @deva[धातोः] from @ref[3.1.91] also continues in @deva[अनुवृत्ति]. Example from the next @[sūtra]: @deva[अग्निष्टोमयाजिन्] 'one who has sacrificed with @[agniṣṭoma]' = @deva[अग्निष्टोमेन इष्टवान्]. The @deva[भूते] condition must be satisfied; without past meaning: @deva[अग्निष्टोमेन यजति] 'he sacrifices' (present, no affix).
"""

advanced = """
@deva[भूते] establishes an @deva[अधिकार] governing @[sūtras] through @ref[3.2.123]. The @deva[धातोः] @deva[अनुवृत्ति] from @ref[3.1.91] also applies. These affixes express @deva[भूतकाल]. Example: @deva[अग्निष्टोमयाजिन्] = @deva[अग्निष्टोमेन इष्टवान्] 'one who has sacrificed with @[agniṣṭoma]'. Without @deva[भूतार्थ], the affix does not apply: @deva[अग्निष्टोमेन यजति] (present tense).
"""

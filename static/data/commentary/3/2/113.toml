id = "3.2.113"
numericId = "32113"

[en]
simple = """
@deva[लृट्] (2nd Future) is not applied in the past sense when the word denoting recollection is connected with the particle @deva[यत्]. This prohibits the @deva[लृट्] from @ref[3.2.112]. Example: @deva[अभिजानासि देवदत्त यत् कश्मीरेष्ववसाम] 'You remember, Devadatta, how we dwelt in Kashmir'. Here the mere fact of dwelling is recollected without any dependent idea.
"""

standard = """
@deva[लृट्] is prohibited with @deva[भूतार्थ] when @deva[अभिज्ञावचन] is connected with particle @deva[यत्]—this blocks @ref[3.2.112]. Example: @deva[अभिजानासि देवदत्त यत् कश्मीरेष्ववसाम] 'You remember how we dwelt in Kashmir'. Here @deva[वास] alone is recollected without dependent action. The next @[sūtra] applies when recollection includes another dependent idea necessary for completing the sense.
"""

advanced = """
@deva[यत्] with @deva[अभिज्ञावचन] blocks @deva[लृट्] of @ref[3.2.112]. Example: @deva[अभिजानासि देवदत्त यत् कश्मीरेष्ववसाम]. Simple @deva[वास] recollected; @ref[3.2.114] applies when @deva[साकाङ्क्षक्रिया] is present.
"""

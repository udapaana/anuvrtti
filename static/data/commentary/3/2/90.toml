id = "3.2.90"
numericId = "32090"

[en]
simple = """
The affix @deva[क्विप्] comes after the verb @deva[सु] 'to press out juice' with past-time meaning when the accusative upapada is @deva[सोम]. Example: @deva[सोमसुत्] 'one who has pressed the soma juice'; dual @deva[सोमसुतौ], plural @deva[सोमसुतः]. This is a restrictive rule with four-fold restriction: verb (@deva[सु]), tense (past), upapada (@deva[सोम]), and affix (@deva[क्विप्]).
"""

standard = """
@deva[क्विप्] follows @deva[सु] 'to press out juice' with @deva[भूतार्थ] when the @deva[द्वितीयान्त] @deva[उपपद] is @deva[सोम]. Example: @deva[सोमसुत्] 'soma-presser'; dual @deva[सोमसुतौ]; plural @deva[सोमसुतः]. This @deva[नियम] has four-fold restriction (@deva[चातुर्विध्य]): @deva[धातु] (@deva[सु]), @deva[काल] (past), @deva[उपपद] (@deva[सोम]), @deva[प्रत्यय] (@deva[क्विप्]).
"""

advanced = """
@deva[क्विप्] follows @deva[सु] 'to extract' with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] is @deva[सोम]. Example: @deva[सोमसुत्]; dual @deva[सोमसुतौ]; plural @deva[सोमसुतः]. This establishes a @deva[नियम] with @deva[चातुर्विध्यनियम]: @deva[धातु], @deva[काल], @deva[उपपद], @deva[प्रत्यय].
"""

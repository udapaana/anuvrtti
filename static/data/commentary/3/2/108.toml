id = "3.2.108"
numericId = "32108"

[en]
simple = """
In modern Sanskrit, the affix @deva[क्वसु] optionally replaces @deva[लिट्] (Perfect) after the verbs @deva[सद्] 'to sit', @deva[वस्] 'to dwell', and @deva[श्रु] 'to hear' with past-time meaning. Being a substitute, the original @deva[लिट्] forms also apply. Examples: @deva[उपसेदिवान् कौत्सः पाणिनिम्] 'Kautsa served @[pāṇini]' (or Aorist @deva[उपासदत्], Imperfect @deva[उपासीदत्], Perfect @deva[उपससाद]); @deva[अनूषिवान्] (or @deva[अन्ववासीत्], @deva[अन्ववसत्], @deva[अनूवास]); @deva[उपशुश्रुवान्] (or @deva[उपाश्रौषीत्], @deva[उपाश्रुणोत्], @deva[उपशुश्राव]). The affix @deva[क्वसु] has the force of @deva[लुङ्] and @deva[लङ्] as well.
"""

standard = """
In @deva[भाषा] (modern Sanskrit), @deva[क्वसु] optionally replaces @deva[लिट्] after @deva[सद्], @deva[वस्], @deva[श्रु] with @deva[भूतार्थ]. Being @deva[आदेश], original @deva[लिट्] is also valid. Examples: @deva[उपसेदिवान् कौत्सः पाणिनिम्] 'Kautsa served @[pāṇini]' (alternates: Aorist @deva[उपासदत्], Imperfect @deva[उपासीदत्], Perfect @deva[उपससाद]); @deva[अनूषिवान्] (alternates: @deva[अन्ववासीत्], @deva[अन्ववसत्], @deva[अनूवास]); @deva[उपशुश्रुवान्] (alternates: @deva[उपाश्रौषीत्], @deva[उपाश्रुणोत्], @deva[उपशुश्राव]). @deva[क्वसु] functions with @deva[लुङ्] and @deva[लङ्] force as well.
"""

advanced = """
In @deva[भाषा], @deva[क्वसु] @deva[विभाषया] replaces @deva[लिट्] after @deva[सद्], @deva[वस्], @deva[श्रु] with @deva[भूतार्थ]. Being @deva[आदेश], @deva[लिट्] also valid. Examples: @deva[उपसेदिवान्] (alternates: @deva[उपासदत्], @deva[उपासीदत्], @deva[उपससाद]); @deva[अनूषिवान्]; @deva[उपशुश्रुवान्]. @deva[क्वसु] operates with @deva[लुङ्]/@deva[लङ्] force.
"""

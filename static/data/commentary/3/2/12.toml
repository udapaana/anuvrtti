id = "3.2.12"
numericId = "32012"

[en]
simple = """
The affix @deva[अच्] is used after @deva[अर्ह्] 'to deserve/respect' when the object is in composition.

**Examples:**
- @deva[पूजाम् अर्हति] = @deva[पूजार्हा] 'deserving of worship'
- @deva[गन्धम् अर्हति] = @deva[गन्धार्हा] 'deserving of perfume'
- @deva[मालाम् अर्हति] = @deva[मालार्हा] 'deserving of garlands'

These words are typically feminine in gender.
"""

standard = """
The affix @deva[अच्] comes after @deva[अर्ह्] 'to deserve' when the object is in composition.

| Sentence | Compound | Meaning |
|----------|----------|--------|
| @deva[पूजाम् अर्हति] | @deva[पूजार्हा] | deserving worship |
| @deva[गन्धम् अर्हति] | @deva[गन्धार्हा] | deserving perfume |
| @deva[मालाम् अर्हति] | @deva[मालार्हा] | deserving garlands |

This debars @deva[अण्]. Words formed by this rule are especially feminine in gender.
"""

advanced = """
The affix @deva[अच्] comes after the verb @deva[अर्ह्] 'to respect', when the object is in composition.

This debars @deva[अण्]. The words so formed are especially of feminine gender.

**Examples:**
- @deva[पूजार्हा] 'deserving of respect'
- @deva[गन्धार्हा] 'deserving of perfume'
- @deva[मालार्हा] 'deserving of garlands'
"""

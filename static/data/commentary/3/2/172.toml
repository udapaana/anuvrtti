id = "3.2.172"
numericId = "32172"

[en]
simple = """
The affix @deva[नजिङ्] comes after @deva[स्वप्] (to sleep) and @deva[तृष्] (to be thirsty) to denote habitual action. Examples: @deva[स्वप्नज्] (nominative @deva[स्वप्नक्]) meaning 'sleepy, drowsy'; @deva[तृष्णज्] (nominative @deva[तृष्णक्]) meaning 'thirsty, covetous'.

@[vārtika]: @deva[नजिङ्] also comes after @deva[धृष्] (to be bold) → @deva[धृष्णज्] (nominative @deva[धृष्णक्]) meaning 'bold, impudent'.
"""

standard = """
The affix @deva[नजिङ्] applies after @deva[स्वप्] and @deva[तृष्] in @deva[तच्छीलादि] sense. Formations: @deva[स्वप्] + @deva[नजिङ्] = @deva[स्वप्नज्], nom. sg. @deva[स्वप्नक्] (habitually sleepy); @deva[तृष्] + @deva[नजिङ्] = @deva[तृष्णज्], nom. sg. @deva[तृष्णक्] (habitually thirsty, greedy).

@[vārtika]: Also after @deva[धृष्] (to be bold) → @deva[धृष्णज्], nom. sg. @deva[धृष्णक्] (bold, audacious).
"""

advanced = """
@deva[नजिङ्] after @deva[स्वप्] and @deva[तृष्] in @deva[तच्छीलादि] sense. The @deva[ङ्] is @deva[इत्], making this @deva[ङित्]. Derivations: @deva[स्वप्] + @deva[नजिङ्] = @deva[स्वप्नज्] (stem), nom. sg. @deva[स्वप्नक्] (drowsy); @deva[तृष्] + @deva[नजिङ्] = @deva[तृष्णज्], nom. sg. @deva[तृष्णक्] (thirsty, avaricious).

@note[type=@[vārtika]]: Also after @deva[धृष्]: @deva[धृष्णज्], nom. sg. @deva[धृष्णक्] (impudent, daring).
"""

id = "3.2.89"
numericId = "32089"

[en]
simple = """
The affix @deva[क्विप्] comes after the verb @deva[कृ] 'to make' with past-time meaning when the accusative upapada is @deva[सु] 'well', @deva[कर्म] 'action', @deva[पाप] 'sin', @deva[मन्त्र] 'hymn', or @deva[पुण्य] 'virtue'. Examples: @deva[सुकृत्] 'one who has done well', @deva[कर्मकृत्] 'one who has performed actions', @deva[पापकृत्] 'sinner', @deva[मन्त्रकृत्] 'hymn-composer', @deva[पुण्यकृत्] 'one who has done virtuous deeds'. The @deva[त्] is added by @ref[6.1.71]. Unlike @ref[3.2.87], there is no verb restriction—hence @deva[शास्त्रकृत्], @deva[भाष्यकृत्].
"""

standard = """
@deva[क्विप्] follows @deva[कृ] with @deva[भूतार्थ] when the @deva[द्वितीयान्त] @deva[उपपद] is @deva[सु], @deva[कर्मन्], @deva[पाप], @deva[मन्त्र], or @deva[पुण्य]. @deva[सु] is @deva[अव्यय] (indeclinable), so 'accusative' applies to the others. Examples: @deva[सुकृत्] (@ref[6.1.71] adds @deva[त्]), @deva[कर्मकृत्], @deva[पापकृत्], @deva[मन्त्रकृत्], @deva[पुण्यकृत्]. This establishes a @deva[नियम] with three-fold restriction: @deva[काल] (past), @deva[उपपद] (listed words), @deva[प्रत्यय] (@deva[क्विप्] only)—but no @deva[धातु] restriction. Hence @deva[शास्त्रकृत्], @deva[भाष्यकृत्] with other upapadas.
"""

advanced = """
@deva[क्विप्] follows @deva[कृ] with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] is @deva[सु], @deva[कर्मन्], @deva[पाप], @deva[मन्त्र], or @deva[पुण्य]. @deva[सु] being @deva[अव्यय] takes no @deva[विभक्ति]. Examples: @deva[सुकृत्] (@ref[6.1.71] @deva[तुगागम]), @deva[कर्मकृत्], @deva[पापकृत्], @deva[मन्त्रकृत्], @deva[पुण्यकृत्]. This @deva[नियम] has three-fold restriction (@deva[त्रैविध्य]): @deva[काल], @deva[उपपद], @deva[प्रत्यय]—but no @deva[धातुनियम]. Hence @deva[शास्त्रकृत्], @deva[भाष्यकृत्] with other @deva[उपपद]s.
"""

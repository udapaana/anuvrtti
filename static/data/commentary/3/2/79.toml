id = "3.2.79"
numericId = "32079"

[en]
simple = """
The affix @deva[णिनि] comes after a verb when the upapada denotes a standard of comparison for the agent. The meaning is 'one who acts like X'. Examples: @deva[उष्ट्रक्रोशी] 'one who makes noise like a camel' (from @deva[उष्ट्र इव क्रोशति]), @deva[ध्वाङ्क्षराविन्] 'one who caws like a crow'. This applies even when habit is not indicated or when genus is expressed. If the standard of comparison is the object rather than the agent, no compound forms: @deva[अपूपानिव भक्षयति माषान्] 'he eats @[māṣa] like @[apūpa]' (@[apūpa] is object, not agent).
"""

standard = """
@deva[णिनि] follows a verb when the @deva[सुबन्त] @deva[उपपद] is an @deva[उपमान] (standard of comparison) for the @deva[कर्तृ]. The meaning is 'one who acts like the @deva[उपमान]'. Examples: @deva[उष्ट्र इव क्रोशति] = @deva[उष्ट्रक्रोशिन्] 'camel-like noise-maker'; @deva[ध्वाङ्क्षराविन्] 'crow-like noise-maker'. This @[sūtra] applies even without @deva[शील] or when @deva[जाति] is expressed—serving as an exception to @ref[3.2.78]. Condition: the @deva[उपमान] must be @deva[कर्तृ]; if @deva[कर्म], no @deva[समास]: @deva[अपूपानिव भक्षयति माषान्]. For accent, see @ref[6.2.80].
"""

advanced = """
@deva[णिनि] follows a verb when the @deva[सुबन्त] @deva[उपपद] is @deva[उपमान] (comparison standard) for the @deva[कर्तृ]—the @deva[प्रत्ययार्थ] is 'acting like the @deva[उपमान]'. Examples: @deva[उष्ट्रक्रोशिन्], @deva[ध्वाङ्क्षराविन्]. This is @deva[अपवाद] to @ref[3.2.78] when @deva[शील] is absent or @deva[जाति] is expressed. Restriction: @deva[उपमान] must be @deva[कर्तृ]; if @deva[कर्म], no @deva[समास] (@deva[अपूपानिव भक्षयति माषान्]). For accent treatment, see @ref[6.2.80].
"""

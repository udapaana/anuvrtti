id = "3.2.184"
numericId = "32184"

[en]
simple = """
The affix @deva[इत्र] comes after seven verbs to denote the instrument: @deva[ऋ] (to go), @deva[लू] (to cut), @deva[धू] (to shake), @deva[सू] (to bring forth), @deva[खन्] (to dig), @deva[सह्] (to bear), @deva[चर्] (to go). Examples: @deva[अरित्रम्] (rudder, oar), @deva[लवित्रम्] (sickle), @deva[धवित्रम्] (fan), @deva[सवित्रम्] (cause of production), @deva[खनित्रम्] (spade), @deva[सहित्रम्] (patience), @deva[चरित्रम्] (conduct, narrative).
"""

standard = """
The affix @deva[इत्र] applies in @deva[करण] sense after @deva[ऋ], @deva[लू], @deva[धू], @deva[सू], @deva[खन्], @deva[सह्], @deva[चर्]. Formations: @deva[अरित्रम्] (oar/rudder - instrument of going across); @deva[लवित्रम्] (sickle - cutting instrument); @deva[धवित्रम्] (fan - shaking instrument); @deva[सवित्रम्] (generative cause); @deva[खनित्रम्] (spade - digging tool); @deva[सहित्रम्] (forbearance - instrument of enduring); @deva[चरित्रम्] (conduct/story - means of proceeding).
"""

advanced = """
@deva[इत्र] after @deva[ऋ], @deva[लू], @deva[धू], @deva[सू], @deva[खन्], @deva[सह्], @deva[चर्] in @deva[करणे] sense. Derivations: @deva[ऋ] + @deva[इत्र] = @deva[अरित्रम्] (oar - 'that by which one goes across'); @deva[लू] + @deva[इत्र] = @deva[लवित्रम्] (sickle); @deva[धू] + @deva[इत्र] = @deva[धवित्रम्] (winnowing fan); @deva[सू] + @deva[इत्र] = @deva[सवित्रम्] (productive agent); @deva[खन्] + @deva[इत्र] = @deva[खनित्रम्] (excavating tool); @deva[सह्] + @deva[इत्र] = @deva[सहित्रम्] (patience - abstract instrument); @deva[चर्] + @deva[इत्र] = @deva[चरित्रम्] (conduct, biography).
"""

id = "3.2.156"
numericId = "32156"

[en]
simple = """
The affix @deva[इनि] comes after @deva[प्रजु] (to hasten forward) to denote habitual action. This forms @deva[प्रजविन्] (a swift messenger, courier). The nominative singular is @deva[प्रजवी], dual @deva[प्रजविनौ].
"""

standard = """
The affix @deva[इनि] applies after @deva[प्रजु] (to move swiftly forward) in @deva[तच्छीलादि] sense. Result: @deva[प्रजविन्] (express courier). Declension: nom. sg. @deva[प्रजवी], nom. du. @deva[प्रजविनौ]. The @deva[प्र] is the @deva[उपसर्ग] (preverb) attached to @deva[जु] (to move rapidly).
"""

advanced = """
@deva[इनि] after @deva[प्रजु] (@deva[प्र] + @deva[जु] 'to hasten') in @deva[तच्छीलादि] sense. Formation: @deva[प्रजु] + @deva[इनि] → @deva[प्रजविन्]. Paradigm: nom. sg. @deva[प्रजवी], nom. du. @deva[प्रजविनौ], etc. The word denotes an express messenger or courier - one habitually swift.
"""

id = "3.2.141"
numericId = "32141"

[en]
simple = """
The affix @deva[घिनुण्] comes after the eight verbs beginning with @deva[शम्] 'to be calm' in the sense of 'agent having such habit etc.' These eight verbs (ending with @deva[मद्]) are: @deva[शम्], @deva[तम्], @deva[दम्], @deva[श्रम्], @deva[भ्रम्], @deva[क्लम्], @deva[क्षम्], @deva[मद्]. The real affix is @deva[इन्]; @deva[घ] causes guttural substitution for final palatals; @deva[उ] is euphonic; @deva[ण्] causes @deva[वृद्धि] (@ref[7.2.116])—but @ref[7.3.34] blocks @deva[वृद्धि] for @deva[म्]-ending roots, so only @deva[मद्] takes it. Examples: @deva[शमी] 'calm', @deva[तमी] 'desiring', @deva[दमी] 'taming', @deva[श्रमी] 'laborious', @deva[भ्रमी] 'whirling', @deva[क्लमी] 'fatiguing', @deva[क्षमी] 'forbearing', @deva[प्रमादी]/@deva[उन्मादी] 'mad'. @deva[उन्मद्] takes @deva[इष्णुच्] by @ref[3.2.136] but also @deva[घिनुण्] by @deva[वासरूप] (@ref[3.1.94]). All are @deva[दिवादि]. For other verbs: @deva[असिता].
"""

standard = """
@deva[घिनुण्] follows the 8 verbs @deva[शमादि] (from @deva[शम्] to @deva[मद्]) with @deva[तच्छीलादि]. @deva[इति] = 'beginning'. The real affix is @deva[इन्]; @deva[घ] = guttural substitution; @deva[उ] = euphony/@ref[6.3.45]; @deva[ण्] = @deva[वृद्धि] (@ref[7.2.116])—blocked for @deva[मकारान्त] by @ref[7.3.34], so only @deva[मद्] gets @deva[वृद्धि]. Examples: @deva[शमी], @deva[तमी], @deva[दमी], @deva[श्रमी], @deva[भ्रमी], @deva[क्लमी], @deva[क्षमी], @deva[प्रमादी]/@deva[उन्मादी]. @deva[उन्मद्] takes both @deva[इष्णुच्] (@ref[3.2.136]) and @deva[घिनुण्] by @deva[वासरूप] (@ref[3.1.94]). All @deva[दिवादि]. Other verbs: @deva[असिता].
"""

advanced = """
@deva[घिनुण्] follows @deva[शमादि] (8 verbs @deva[शम्]-to-@deva[मद्]) with @deva[तच्छीलादि]. @deva[इन्] is @deva[प्रत्यय]; @deva[घ] = @deva[कुत्वविधान]; @deva[उ] = @deva[स्वरार्थ]/@ref[6.3.45]; @deva[ण्] = @deva[वृद्धि] (@ref[7.2.116])—@ref[7.3.34] blocks for @deva[मकारान्त]. Examples: @deva[शमी], @deva[प्रमादी]. @deva[उन्मद्]: both @deva[इष्णुच्] (@ref[3.2.136]) and @deva[घिनुण्] (@ref[3.1.94] @deva[वासरूप]). All @deva[दिवादि].
"""

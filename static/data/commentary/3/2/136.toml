id = "3.2.136"
numericId = "32136"

[en]
simple = """
The affix @deva[इष्णुच्] comes after the following verbs in the sense of 'agent having such habit etc.': @deva[अलंकृ] 'to adorn', @deva[निराकृ] 'to expel', @deva[प्रजन्] 'to be born', @deva[उत्पच्] 'to ripen', @deva[उत्पत्] 'to fly', @deva[उन्मद्] 'to be mad', @deva[रुच्] 'to shine', @deva[अपत्रप्] 'to be ashamed', @deva[वृत्] 'to move', @deva[वृध्] 'to grow', @deva[सह्] 'to bear', @deva[चर्] 'to walk'. Examples: @deva[अलङ्करिष्णुः] 'decorating', @deva[निराकरिष्णुः] 'repudiating', @deva[प्रजनिष्णुः] 'procreative', @deva[उत्पचिष्णुः] 'apt to ripen', @deva[उत्पतिष्णुः] 'flying', @deva[उन्मदिष्णुः] 'mad', @deva[रोचिष्णुः] 'bright', @deva[अपत्रपिष्णुः] 'bashful', @deva[वर्तिष्णुः] 'revolving', @deva[वर्धिष्णुः] 'growing', @deva[सहिष्णुः] 'patient', @deva[चरिष्णुः] 'moveable'.
"""

standard = """
@deva[इष्णुच्] follows these verbs with @deva[तच्छीलादि]: @deva[अलंकृ], @deva[निराकृ], @deva[प्रजन्], @deva[उत्पच्], @deva[उत्पत्], @deva[उन्मद्], @deva[रुच्], @deva[अपत्रप्], @deva[वृत्], @deva[वृध्], @deva[सह्], @deva[चर्]. Examples: @deva[अलङ्करिष्णुः], @deva[निराकरिष्णुः], @deva[प्रजनिष्णुः], @deva[उत्पचिष्णुः], @deva[उत्पतिष्णुः], @deva[उन्मदिष्णुः], @deva[रोचिष्णुः], @deva[अपत्रपिष्णुः], @deva[वर्तिष्णुः], @deva[वर्धिष्णुः], @deva[सहिष्णुः], @deva[चरिष्णुः]. @deva[वार्त्तिक]: @deva[इष्णुच्] anticipatorily blocks @deva[युच्] (@ref[3.2.151]) after @deva[अलंकृ] with decorating sense.
"""

advanced = """
@deva[इष्णुच्] follows @deva[अलंकृ], @deva[निराकृ], @deva[प्रजन्], @deva[उत्पच्], @deva[उत्पत्], @deva[उन्मद्], @deva[रुच्], @deva[अपत्रप्], @deva[वृत्], @deva[वृध्], @deva[सह्], @deva[चर्] with @deva[तच्छीलादि]. Examples: @deva[अलङ्करिष्णुः], @deva[सहिष्णुः], etc. @deva[वार्त्तिक]: @deva[इष्णुच्] @deva[पूर्वविप्रतिषेध] to @deva[युच्] (@ref[3.2.151]) after @deva[अलंकृ].
"""

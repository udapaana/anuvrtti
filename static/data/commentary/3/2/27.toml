**Vedic citations:**
- @deva[ब्रह्मवनिं त्वा क्षत्रवनिम्] (VS 1.17, 5.12, 6.3)
- @deva[उत नो गोपतिम्] (RV 6.53.10)
- @deva[यै ते श्वानौ पथिरक्षः] (RV 10.14.11)
- @deva[इन्द्रा यातूनामभवत् पाराशरो हविर्मथीनाम्] (RV 7.104.21)
"""


id = "3.2.27"
numericId = "32027"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), the affix @deva[इन्] is used after @deva[वन्] 'to honor', @deva[सन्] 'to worship', @deva[रक्ष्] 'to protect', and @deva[अथ्] 'to agitate', when an object is in composition.

**Vedic examples:**
- @deva[ब्रह्मवनिम्] 'honoring Brahman' (RV)
- @deva[गोपतिम्] 'protector of cows' (RV 6.53.10)
- @deva[पथिरक्षिः] 'path-protector' (RV 10.14.11)
- @deva[हविर्मथिः] 'oblation-churner' (RV 7.104.21)
"""

standard = """

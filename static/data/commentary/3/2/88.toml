id = "3.2.88"
numericId = "32088"

[en]
simple = """
In Vedic literature, the affix @deva[क्विप्] optionally comes after @deva[हन्] with past-time meaning even when the accusative upapada is not one of those mentioned in the previous @[sūtra]. Examples: @deva[मातृहा] 'matricide' (from @deva[मातृहा सप्तमं नरकं प्रविशेत्] 'may the matricide enter the seventh hell'), @deva[पितृहा] 'patricide'. In the alternative, @deva[णिनि] can also apply: @deva[मातृघातः], @deva[पितृघातः].
"""

standard = """
In @deva[छन्दस्] (Vedic literature), @deva[क्विप्] comes @deva[विभाषया] (optionally) after @deva[हन्] with @deva[भूतार्थ] even when the @deva[द्वितीयान्त] @deva[उपपद] is other than @deva[ब्रह्म] etc. This extends beyond the @deva[नियम] of the previous @[sūtra]. Examples: @deva[मातृहा] 'matricide' (as in @deva[मातृहा सप्तमं नरकं प्रविशेत्]); @deva[पितृहा] 'patricide'. The @deva[बहुलम्] allows alternatives: @deva[मातृघातः], @deva[पितृघातः] (with @deva[णिनि]).
"""

advanced = """
In @deva[छन्दस्], @deva[क्विप्] comes @deva[बहुलम्] after @deva[हन्] with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] is other than @deva[ब्रह्म] etc.—extending beyond the @deva[नियम] of @ref[3.2.87]. Examples: @deva[मातृहा], @deva[पितृहा]. The @deva[बहुलम्] permits @deva[णिनि] alternatively: @deva[मातृघातः], @deva[पितृघातः].
"""

id = "3.2.18"
numericId = "32018"

[en]
simple = """
The affix @deva[ट] is used after @deva[सृ] 'to move/go' when @deva[पुरः], @deva[अग्रतः], or @deva[अग्रे] (all meaning 'in front') are in composition.

**Examples:**
- @deva[पुरः सरति] = @deva[पुरःसरः] 'harbinger' (one who goes in front)
- @deva[अग्रतः सरति] = @deva[अग्रतःसरः] 'leader'
- @deva[अग्रे सरति] = @deva[अग्रसरः] 'leader' (going in front)
"""

standard = """
The affix @deva[ट] comes after @deva[सृ] 'to move' when @deva[पुरः], @deva[अग्रतः], or @deva[अग्रे] (all meaning 'in front/before') are in composition.

| @deva[उपपद] | Compound | Meaning |
|------------|----------|--------|
| @deva[पुरः] | @deva[पुरःसरः] | harbinger, one going in front |
| @deva[अग्रतः] | @deva[अग्रतःसरः] | leader |
| @deva[अग्रे] | @deva[अग्रसरः] | leader, going in front |
"""

advanced = """
The affix @deva[ट] comes after the verb @deva[सृ] 'to move' when the words in composition are @deva[पुरः], @deva[अग्रतः], and @deva[अग्रे], all meaning 'in front or before'.

**Examples:**
- @deva[पुरः सरति] = @deva[पुरःसरः] 'who goes in front, a harbinger'
- @deva[अग्रतःसरः] 'going in front'
- @deva[अग्रसरः] 'going in front, a leader'
"""

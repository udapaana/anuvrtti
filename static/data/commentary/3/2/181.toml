id = "3.2.181"
numericId = "32181"

[en]
simple = """
The affix @deva[ष्ट्रन्] comes after the verb @deva[धा] (to feed/suckle) to denote the object (what is fed). The @deva[ष्] indicates feminine forms take @deva[ङीप्] (@deva[ई]). Examples: @deva[धात्री] (a wet-nurse - whom children suckle), also the @[āmalakī] fruit (which holds medicinal properties).
"""

standard = """
The affix @deva[ष्ट्रन्] applies after @deva[धा] (= @deva[धे] 'to suck/nurse') in @deva[कर्म] (object) sense. The @deva[ष्] is @deva[इत्], indicating @deva[ङीप्] (@deva[ई]) in feminine by @ref[4.1.41]. Formation: @deva[धात्री] (wet-nurse - one whom babies suck; also @[āmalakī] fruit - which 'holds' all medicines).
"""

advanced = """
@deva[ष्ट्रन्] after @deva[धा] (= @deva[धेट्] 'to suck') in @deva[कर्मणि] sense. The @deva[ष्] is @deva[इत्], triggering @deva[ङीप्] feminine. Formation: @deva[धात्री] (nurse - object of suckling by children; also @deva[आमलकी] - 'that which holds/contains all medicinal properties'). Note the semantic shift: the nurse is technically the object being suckled, hence @deva[कर्म].
"""

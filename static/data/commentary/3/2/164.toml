id = "3.2.164"
numericId = "32164"

[en]
simple = """
The word @deva[गत्वर] is formed irregularly. The @deva[म्] of @deva[गम्] is deleted, and the affix @deva[क्वरप्] is added. Result: @deva[गत्वरः] (locomotive, transient). Feminine: @deva[गत्वरी].
"""

standard = """
This @[sūtra] states that @deva[गत्वर] is an irregular formation. The root @deva[गम्] loses its @deva[म्] before @deva[क्वरप्]: @deva[गम्] → @deva[ग] + @deva[त्वर] = @deva[गत्वरः] (moving, transient). Feminine: @deva[गत्वरी]. This is a @deva[निपातन] (listed exception).
"""

advanced = """
@deva[निपातन] for @deva[गत्वर]. Irregular derivation: @deva[गम्] drops @deva[म्] before @deva[क्वरप्] → @deva[ग] + @deva[त्] + @deva[वर] = @deva[गत्वरः] (locomotive, transient). Regular derivation would yield @deva[*गंत्वर] or similar. Feminine: @deva[गत्वरी].
"""

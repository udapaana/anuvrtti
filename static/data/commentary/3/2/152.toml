id = "3.2.152"
numericId = "32152"

[en]
simple = """
The affix @deva[युच्] is not used after verbs ending in @deva[य]. This overrides @ref[3.2.149]. Instead, @deva[तृन्] (@ref[3.2.135]) is used. Examples: @deva[क्नूयिता] 'making creaking sound', @deva[क्षमायिता] 'trembling' (not *@deva[क्नूयनः], *@deva[क्षमायनः]).
"""

standard = """
@deva[युच्] is blocked after @deva[यकारान्त] verbs—this overrides @ref[3.2.149]. @deva[तृन्] (@ref[3.2.135]) applies instead. Examples: @deva[क्नूयिता], @deva[क्षमायिता].
"""

advanced = """
@deva[युच्] blocked after @deva[यकारान्त]—@deva[अपवाद] to @ref[3.2.149]. @deva[तृन्] applies. Examples: @deva[क्नूयिता], @deva[क्षमायिता].
"""

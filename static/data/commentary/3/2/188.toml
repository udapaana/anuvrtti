id = "3.2.188"
numericId = "32188"

[en]
simple = """
The affix @deva[क्त] is also used with present-tense meaning after verbs denoting inclination (@deva[मति]), understanding (@deva[बुद्धि]), or respect (@deva[पूजा]). Examples: @deva[राज्ञां मतः/इष्टः] (desired by kings - present), @deva[बुद्धः/ज्ञातः] (known - present), @deva[पूजितः] (honored - present). The word @deva[च] (and) indicates other verbs are also included where @deva[क्त] doesn't mean only past time.
"""

standard = """
The affix @deva[क्त] applies with present-tense force after verbs expressing @deva[मति] (wish), @deva[बुद्धि] (cognition), or @deva[पूजा] (respect). Examples: @deva[राज्ञां मतः], @deva[इष्टः] (wished by kings), @deva[बुद्धः], @deva[ज्ञातः] (known), @deva[पूजितः] (honored). The @deva[च] (and) extends this to other cases where @deva[क्त] transcends past time: @deva[शीलितः] (practiced), @deva[रक्षितः] (protected), @deva[क्षान्तः] (forbearing), @deva[जुष्टः] (pleased), @deva[रुष्टः] (angry), @deva[तृष्टः]/​@deva[तुष्टः] (satisfied), @deva[कान्तः] (beloved), @deva[संयतः] (restrained), @deva[उद्यतः] (ready), @deva[कष्टम्] (misery - future sense), @deva[अमृत] (immortal), @deva[सुप्तः] (sleeping), @deva[शयितः] (lying), @deva[तृप्तः] (content).
"""

advanced = """
@deva[क्त] in @deva[वर्तमाने] after @deva[मत्यर्थ] (wishing), @deva[बुद्ध्यर्थ] (knowing), @deva[पूजार्थ] (honoring) verbs. Examples: @deva[राज्ञां मतः/इष्टः/बुद्धः/ज्ञातः/पूजितः] - all with present (not exclusively past) sense.

The @deva[च] extends coverage beyond these three semantic domains. Additional @deva[क्त] forms with present/general (not purely past) sense: @deva[शीलितः] (habitually practiced), @deva[रक्षितः] (under protection), @deva[क्षान्तः] (patient), @deva[आक्रुष्टः] (being censured), @deva[जुष्टः] (pleased), @deva[रुष्टः]/​@deva[रुषितः] (angry), @deva[अभिव्याहृतः] (being uttered), @deva[तृष्टः]/​@deva[तुष्टः] (content), @deva[कान्तः] (beloved), @deva[संयतः] (controlled), @deva[उद्यतः] (prepared), @deva[कष्टम्] (misery - with future implication), @deva[अमृत] (immortal). Also present-sense participles: @deva[सुप्तः] (sleeping), @deva[शयितः] (reclining), @deva[आशितः] (having eaten/eating), @deva[लिप्तः] (smeared), @deva[तृप्तः] (satisfied).
"""

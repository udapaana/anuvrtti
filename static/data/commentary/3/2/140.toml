id = "3.2.140"
numericId = "32140"

[en]
simple = """
The affix @deva[क्नु] comes after @deva[त्रस्] 'to tremble', @deva[गृध्] 'to be greedy', @deva[धृष्] 'to be bold', and @deva[क्षिप्] 'to throw' in the sense of 'agent having such habit etc.' Examples: @deva[त्रस्नुः] 'trembling', @deva[गृध्नुः] 'greedy', @deva[धृष्णुः] 'bold', @deva[क्षिप्णुः] 'throwing'.
"""

standard = """
@deva[क्नु] follows @deva[त्रस्], @deva[गृध्], @deva[धृष्], @deva[क्षिप्] with @deva[तच्छीलादि]. Examples: @deva[त्रस्नुः], @deva[गृध्नुः], @deva[धृष्णुः], @deva[क्षिप्णुः].
"""

advanced = """
@deva[क्नु] follows @deva[त्रस्], @deva[गृध्], @deva[धृष्], @deva[क्षिप्] with @deva[तच्छीलादि]. Examples: @deva[त्रस्नुः], @deva[गृध्नुः], @deva[धृष्णुः], @deva[क्षिप्णुः].
"""

id = "3.2.91"
numericId = "32091"

[en]
simple = """
The affix @deva[क्विप्] comes after the verb @deva[चि] 'to collect, arrange' with past-time meaning when the accusative upapada is @deva[अग्नि]. Example: @deva[अग्निचित्] 'one who has arranged the sacred fire'; dual @deva[अग्निचितौ], plural @deva[अग्निचितः]. Like the previous @[sūtra], this has four-fold restriction.
"""

standard = """
@deva[क्विप्] follows @deva[चि] 'to collect, arrange' with @deva[भूतार्थ] when the @deva[द्वितीयान्त] @deva[उपपद] is @deva[अग्नि]. Example: @deva[अग्निचित्] 'one who has arranged the sacred fire'; dual @deva[अग्निचितौ]; plural @deva[अग्निचितः]. Like @ref[3.2.90], this @deva[नियम] has four-fold restriction (@deva[चातुर्विध्य]).
"""

advanced = """
@deva[क्विप्] follows @deva[चि] with @deva[भूतार्थ] when @deva[द्वितीयान्त] @deva[उपपद] is @deva[अग्नि]. Example: @deva[अग्निचित्]; dual @deva[अग्निचितौ]; plural @deva[अग्निचितः]. This @deva[नियम] has @deva[चातुर्विध्यनियम] as in @ref[3.2.90].
"""

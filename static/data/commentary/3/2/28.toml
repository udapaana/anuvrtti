id = "3.2.28"
numericId = "32028"

[en]
simple = """
The affix @deva[खश्] is used after the **causative** of @deva[एज्] 'to tremble' when an object is in composition.

The real affix is @deva[अ]. The @deva[ख्] causes @deva[मुम्] augment on the @deva[उपपद]; the @deva[श्] makes it @deva[सार्वधातुक].

**Examples:**
- @deva[अङ्गमेजयः] 'one who awes/shakes limbs'
- @deva[जनमेजयः] 'one who awes mankind'

**@[vārtika] extensions:** @deva[वातमजः] 'swift antelope', @deva[शुनिन्धयः] 'bitch-sucker', @deva[तिलन्तुदः] 'oilman', @deva[शर्धञ्जहा] 'a kind of bean'.
"""

standard = """
The affix @deva[खश्] comes after the causative (@deva[णिच्]) of @deva[एजृ] 'to tremble' when an object is in composition.

**Affix analysis:**
- Real affix: @deva[अ]
- @deva[ख्] (indicatory): triggers @deva[मुम्] augment on vowel-final @deva[उपपद] (@ref[6.3.67])
- @deva[श्] (indicatory): marks it as @deva[सार्वधातुक] (@ref[3.4.113]), so @deva[शप्] applies (@ref[3.1.68])

**Derivation:** @deva[अङ्ग] + @deva[एजि] + @deva[शप्] + @deva[खश्] = @deva[अङ्गम्] + @deva[एजय] + @deva[अ] = @deva[अङ्गमेजयः] 'one who awes the limbs'

**Examples:** @deva[अङ्गमेजयः], @deva[जनमेजयः] 'one who awes mankind'

**@[vārtika]:** @deva[खश्] also after @deva[अज्], @deva[धेट्], @deva[तुद्], @deva[हा] with @deva[वात], @deva[शुनी], @deva[तिल], @deva[शर्ध]:
- @deva[वातमजाः मृगाः] 'swift antelopes'
- @deva[शुनिन्धयः] 'bitch-sucker' (@deva[ई] shortened by @ref[6.3.66])
- @deva[तिलन्तुदः] 'oilman'
- @deva[शर्धञ्जहा माषाः] 'a kind of bean'
"""

advanced = """
The affix @deva[खश्] comes after the causative of @deva[एजृ] 'to tremble' when the object is in composition.

**Affix structure:** @deva[ख्] and @deva[श्] are @deva[इत्]; real affix is @deva[अ].
- @deva[ख्]: triggers @deva[मुम्] augment on vowel-final @deva[उपपद] (@ref[6.3.67])
- @deva[श्]: marks as @deva[सार्वधातुक] (@ref[3.4.113]), requiring @deva[विकरण]s like @deva[शप्] (@ref[3.1.68])

**Derivation:** @deva[अङ्ग] + @deva[एज्] + @deva[णिच्] + @deva[शप्] + @deva[खश्] = @deva[अङ्गम्] + @deva[एजय] + @deva[अ] = @deva[अङ्गमेजयः] 'who awes the limbs'

Similarly: @deva[जनमेजयः] 'who awes mankind'

**@[vārtika]:** @deva[खश्] also comes after @deva[अज्] 'to go', @deva[धेट्] 'to suck', @deva[तुद्] 'to strike', @deva[हा] 'to leave' with @deva[वात], @deva[शुनी], @deva[तिल], @deva[शर्ध]:
- @deva[वातमजाः मृगाः] 'swift antelopes' (going with wind)
- @deva[शुनिन्धयः] 'bitch-sucker' (long @deva[ई] shortened by @ref[6.3.66])
- @deva[तिलन्तुदः] 'oilman'
- @deva[शर्धञ्जहा माषाः] 'a bean that causes/cures flatulence'
"""

id = "3.2.175"
numericId = "32175"

[en]
simple = """
The affix @deva[वरच्] comes after five verbs to denote habitual action: @deva[स्था] (to stand), @deva[ईश्] (to rule), @deva[भास्] (to shine), @deva[पिस्] (to go), @deva[कस्] (to go). Examples: @deva[स्थावरः] (immovable), @deva[ईश्वरः] (ruler, God), @deva[पेस्वरः] (going, destructive), @deva[विकस्वरः] (opening, expanding).
"""

standard = """
The affix @deva[वरच्] applies after @deva[स्था], @deva[ईश्], @deva[भास्], @deva[पिस्], @deva[कस्] in @deva[तच्छीलादि] sense. Formations: @deva[स्थावरः] (stationary, immobile); @deva[ईश्वरः] (lord, sovereign); @deva[भास्वरः] (radiant - though not in examples); @deva[पेस्वरः] (moving, destructive); @deva[विकस्वरः] (blooming, expanding).
"""

advanced = """
@deva[वरच्] after @deva[स्था], @deva[ईश्], @deva[भास्], @deva[पिस्], @deva[कस्] in @deva[तच्छीलादि] sense. Derivations: @deva[स्था] + @deva[वरच्] = @deva[स्थावरः] (stationary - opposite of @deva[जङ्गम]); @deva[ईश्] + @deva[वरच्] = @deva[ईश्वरः] (lord, God); @deva[पिस्] + @deva[वरच्] = @deva[पेस्वरः] (going); @deva[कस्] + @deva[वरच्] = @deva[विकस्वरः] (blossoming). Note: @deva[भास्वर] (luminous) also derives from this.
"""

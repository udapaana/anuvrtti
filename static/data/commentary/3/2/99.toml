id = "3.2.99"
numericId = "32099"

[en]
simple = """
The affix @deva[ड] comes after the verb @deva[जन्] 'to be born' with past-time meaning when an @deva[उपसर्ग] (prefix) is in composition and the resulting word is simply appellative (its meaning cannot be derived from its parts). Example: @deva[प्रजाः] 'people' or 'offspring' (as in @deva[अथेमा मानवी प्रजाः])—the meaning depends on usage, not etymology.
"""

standard = """
@deva[ड] follows @deva[जन्] with @deva[भूतार्थ] when an @deva[उपसर्ग] is in composition and the sense is @deva[आख्या] (simply appellative, not etymologically derivable). Example: @deva[प्रजाः] 'people' or 'offspring' (as in @deva[अथेमा मानवी प्रजाः]). The @deva[आख्या] condition means the word is @deva[रूढि]—its sense depends on convention, not component analysis.
"""

advanced = """
@deva[ड] follows @deva[जन्] with @deva[भूतार्थ] when @deva[उपसर्ग] is @deva[उपपद] and sense is @deva[आख्यामात्र] (purely appellative). Example: @deva[प्रजाः] 'people/offspring'. The @deva[आख्या] indicates @deva[रूढ्यर्थ]—meaning determined by usage, not etymology.
"""

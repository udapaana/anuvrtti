id = "3.2.157"
numericId = "32157"

[en]
simple = """
The affix @deva[इनि] comes after ten verbs to denote habitual action: @deva[जि] (to conquer), @deva[दृ] (to respect), @deva[क्षि] (to waste/dwell), @deva[विश्रि] (to shelter), @deva[इ] (to go), @deva[वम्] (to vomit), @deva[अव्यथ] (not to pain), @deva[अभ्यम्] (to injure), @deva[परिभू] (to humiliate), @deva[प्रसू] (to beget). Examples: @deva[जयी] (conquering), @deva[क्षयी] (wasting), @deva[अत्ययी] (exceeding), @deva[वमी] (vomiting), @deva[परिभवी] (humiliating), @deva[प्रसवी] (procreating).
"""

standard = """
The affix @deva[इनि] applies after these ten roots in @deva[तच्छीलादि] sense: @deva[जि], @deva[दृ], @deva[क्षि], @deva[विश्रि], @deva[इ], @deva[वम्], @deva[अव्यथ], @deva[अभ्यम्], @deva[परिभू], @deva[प्रसू]. Nominative singular forms: @deva[जयी] (victorious), @deva[दरी] (respectful), @deva[क्षयी] (decaying), @deva[विश्रयी] (sheltering), @deva[अत्ययी] (transgressing), @deva[वमी] (one who vomits), @deva[अव्यथी] (free from pain), @deva[अभ्यमी] (injurious), @deva[परिभवी] (insulting), @deva[प्रसवी] (generative).
"""

advanced = """
@deva[इनि] after @deva[जि], @deva[दृ], @deva[क्षि], @deva[विश्रि], @deva[इ], @deva[वम्], @deva[अव्यथ], @deva[अभ्यम्], @deva[परिभू], @deva[प्रसू] in @deva[तच्छीलादि] sense. Several have @deva[उपसर्ग]: @deva[विश्रि] = @deva[वि] + @deva[श्रि]; @deva[अव्यथ] = @deva[अ] (negative) + @deva[व्यथ्]; @deva[अभ्यम्] = @deva[अभि] + @deva[अम्]; @deva[परिभू] = @deva[परि] + @deva[भू]; @deva[प्रसू] = @deva[प्र] + @deva[सू]. Stems: @deva[जयिन्], @deva[दरिन्], @deva[क्षयिन्], @deva[विश्रयिन्], @deva[अत्ययिन्], @deva[वमिन्], @deva[अव्यथिन्], @deva[अभ्यमिन्], @deva[परिभविन्], @deva[प्रसविन्].
"""

id = "3.2.167"
numericId = "32167"

[en]
simple = """
The affix @deva[र] comes after seven verbs to denote habitual action: @deva[नम्] (to bow), @deva[कम्प्] (to shake), @deva[स्मि] (to smile), @deva[अजस्] (not to cease), @deva[कम्] (to desire), @deva[हिंस्] (to injure), @deva[दीप्] (to shine). Examples: @deva[नम्रं काष्ठम्] (soft/flexible wood), @deva[कम्प्रा शाखा] (shaking branch), @deva[स्मेरं मुखम्] (smiling face), @deva[अजस्रम्] (perpetually - an adverb), @deva[कम्रा युवतिः] (beautiful maiden), @deva[हिंस्रं रक्षः] (injuring demon), @deva[दीप्रं काष्ठम्] (brilliant wood).
"""

standard = """
The affix @deva[र] applies after @deva[नम्], @deva[कम्प्], @deva[स्मि], @deva[अजस्], @deva[कम्], @deva[हिंस्], @deva[दीप्] in @deva[तच्छीलादि] sense. Examples: @deva[नम्रम्] (pliant), @deva[कम्प्रा] (trembling), @deva[स्मेरम्] (smiling), @deva[अजस्रम्] (perpetual - adverb), @deva[कम्रा] (lovely), @deva[हिंस्रम्] (violent), @deva[दीप्रम्] (radiant). The word @deva[अजस्रम्] is derived from @deva[अ] (negative) + @deva[जस्] (to release) + @deva[र] = 'unceasing.'
"""

advanced = """
@deva[र] after @deva[नम्], @deva[कम्प्], @deva[स्मि], @deva[अजस्], @deva[कम्], @deva[हिंस्], @deva[दीप्] in @deva[तच्छीलादि] sense. Formations: @deva[नम्रम्] (flexible), @deva[कम्प्रा शाखा] (quivering branch), @deva[स्मेरं मुखम्] (smiling face), @deva[कम्रा युवतिः] (comely maiden), @deva[हिंस्रं रक्षः] (violent demon), @deva[दीप्रं काष्ठम्] (resplendent wood). Etymology of @deva[अजस्रम्]: @deva[अ] + @deva[जस्] (to release, set free) + @deva[र] = 'without cessation' (functions as adverb: @deva[अजस्रं जुहोति] 'he sacrifices perpetually').
"""

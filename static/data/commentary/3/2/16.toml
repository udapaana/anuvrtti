id = "3.2.16"
numericId = "32016"

[en]
simple = """
The affix @deva[ट] (= @deva[अ]) is used after @deva[चर्] 'to go/wander' when the @deva[उपपद] denotes a **location** (locative).

**Examples:**
- @deva[कुरुषु चरति] = @deva[कुरुचरः] 'one who wanders among the Kurus' (fem. @deva[कुरुचरी])
- @deva[मद्रेषु चरति] = @deva[मद्रचरः] 'one who wanders among the Madras' (fem. @deva[मद्रचरी])

The indicatory @deva[ट्] shows that the feminine is formed with @deva[ङीप्] (= @deva[ई]).
"""

standard = """
The affix @deva[ट] comes after @deva[चर्] 'to go' when a case-inflected word denoting location is in composition.

| Sentence | Compound | Meaning | Feminine |
|----------|----------|--------|----------|
| @deva[कुरुषु चरति] | @deva[कुरुचरः] | wanderer among Kurus | @deva[कुरुचरी] |
| @deva[मद्रेषु चरति] | @deva[मद्रचरः] | wanderer among Madras | @deva[मद्रचरी] |

The @deva[अधिकरण] (location) from @ref[3.2.15] continues here.

Of the affix @deva[ट], the real affix is @deva[अ]; the @deva[ट्] is indicatory, showing that the feminine is formed by @deva[ङीप्] (@ref[4.1.14]).
"""

advanced = """
The affix @deva[ट] comes after the verb @deva[चर्] 'to go' when a case-inflected word in composition with it denotes a location. The word @[adhikarana] of the last @[sutra] is understood in this. As @deva[कुरुषु] @deva[चरति] = @deva[कुरुचरः] 'who goes among the @[kurus]'. @deva[मद्रचरः] 'who goes among the Madras'. Of the affix @deva[ट] the real affix is @deva[अ], the letter @deva[ट] being indicatory, showing that the feminine of these words is formed by the affix @deva[ङीप्]. (See. @ref[4.1.14]), as @deva[कुरुचरी], @deva[मद्रचरी] @deva[।]
"""

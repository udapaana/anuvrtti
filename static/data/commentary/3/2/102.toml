id = "3.2.102"
numericId = "32102"

[en]
simple = """
The affixes called @deva[निष्ठा] (@deva[क्त] and @deva[क्तवतु], see @ref[1.1.26]) come after a verb with past-time meaning. Examples: @deva[कृतम्] 'made' (@deva[कृ] + @deva[क्त]), @deva[कृतवान्] 'one who made' (@deva[कृ] + @deva[क्तवतु]); @deva[भुक्तम्] 'eaten', @deva[भुक्तवान्] 'one who ate'. A @[vārttika] adds: @deva[निष्ठा] applies when @deva[आदिकर्म] (action commenced but possibly incomplete) is meant, as in @deva[प्रकृतः कटं देवदत्तः] 'Devadatta has begun making a mat'.
"""

standard = """
The @deva[निष्ठा] affixes (@deva[क्त] and @deva[क्तवतु], defined at @ref[1.1.26]) follow a @deva[धातु] with @deva[भूतार्थ]. Examples: @deva[कृ] + @deva[क्त] = @deva[कृतम्] 'made'; @deva[कृ] + @deva[क्तवतु] = @deva[कृतवत्], nominative @deva[कृतवान्] 'one who made'; @deva[भुक्तम्], @deva[भुक्तवान्] 'eaten'. @deva[वार्त्तिक]: @deva[निष्ठा] applies when @deva[आदिकर्म] (commenced action) is meant. For @deva[आदिकर्म], see @ref[3.4.71]. Example: @deva[प्रकृतः कटं देवदत्तः], @deva[प्रकृतवान् कटं देवदत्तः].
"""

advanced = """
@deva[निष्ठा] (@deva[क्त], @deva[क्तवतु]; @ref[1.1.26]) follows @deva[धातु] with @deva[भूतार्थ]. Examples: @deva[कृतम्], @deva[कृतवान्]; @deva[भुक्तम्], @deva[भुक्तवान्]. @deva[वार्त्तिक]: @deva[निष्ठा] applies with @deva[आदिकर्मार्थ]. See @ref[3.4.71] for @deva[आदिकर्म]. Examples: @deva[प्रकृतः कटं देवदत्तः], @deva[प्रकृतवान् कटं देवदत्तः].
"""

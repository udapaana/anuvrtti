id = "3.2.115"
numericId = "32115"

[en]
simple = """
The affix @deva[लिट्] (Perfect) comes after a verb with past-time meaning when the action occurred before the current day and was not witnessed by the speaker. @deva[परोक्ष] 'unperceived' qualifies both @deva[भूत] and @deva[अनद्यतन]. Examples: @deva[चकार] 'he did', @deva[जहार] 'he took'. The Perfect should not normally be used in the @deva[उत्तमपुरुष] (first person) (the speaker witnessed his own action), but if the speaker was unconscious or distracted, it may be used: @deva[सुप्तोऽहं किल विललाप] 'I prated while asleep'. @[vārttika]: Perfect is used for total denial regardless of time or perception: @deva[कलिङ्गेषु स्थितोऽसि? नाहं कलिङ्गं जगाम] 'Did you live in @[kaliṅga]? I didn't even go there'.
"""

standard = """
@deva[लिट्] (Perfect) follows a @deva[धातु] with @deva[भूतार्थ] when @deva[अनद्यतन] and @deva[परोक्ष] (unwitnessed by speaker). @deva[परोक्ष] qualifies both @deva[भूत] and @deva[अनद्यतन]. Examples: @deva[चकार], @deva[जहार]. @deva[लिट्] should not be used in @deva[उत्तमपुरुष] (first person) since the agent witnesses his own action. Exception: when speaker was @deva[सुप्त]/unconscious: @deva[सुप्तोऽहं किल विललाप] 'I prated while asleep'. @deva[वार्त्तिक]: @deva[लिट्] for @deva[अत्यन्तनिषेध] (total denial) regardless of @deva[काल]/@deva[प्रत्यक्ष]: @deva[कलिङ्गेषु स्थितोऽसि? नाहं कलिङ्गं जगाम]; @deva[दक्षिणापथं प्रविष्टोऽसि? नाहं दक्षिणापथं प्रविवेश].
"""

advanced = """
@deva[लिट्] follows @deva[धातु] with @deva[भूतार्थ] when @deva[अनद्यतन] and @deva[परोक्ष]. Examples: @deva[चकार], @deva[जहार]. @deva[लिट्] inappropriate in @deva[उत्तमपुरुष] (self-witnessed). Exception: @deva[सुप्त] etc.—@deva[सुप्तोऽहं किल विललाप]. @deva[वार्त्तिक]: @deva[अत्यन्तनिषेध] triggers @deva[लिट्] regardless of @deva[काल]/@deva[परोक्षत्व]: @deva[नाहं कलिङ्गं जगाम], @deva[नाहं दक्षिणापथं प्रविवेश].
"""

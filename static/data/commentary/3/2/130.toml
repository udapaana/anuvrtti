id = "3.2.130"
numericId = "32130"

[en]
simple = """
The affix @deva[शतृ] comes after @deva[इङ्] 'to go' (in the sense of studying) and @deva[धारि] (causative of @deva[धृ]) 'to master' when the agent does the action without difficulty. @deva[अकृच्छ्र] = accomplished with ease. Examples: @deva[अधीयन् पारायणम्] 'the facile reading of the @[purāṇa]', @deva[धारयन्नुपनिषदम्] 'easily mastering the @[upaniṣad]'. Without ease: @deva[कृच्छ्रेणाधीते] 'he reads with difficulty', @deva[कृच्छ्रेण धारयति] 'he remembers with difficulty'.
"""

standard = """
@deva[शतृ] follows @deva[इङ्] 'to study' and @deva[धारि] 'to master' (causative of @deva[धृ]) when @deva[अकृच्छ्र] (ease, facility) is indicated. Examples: @deva[अधीयन् पारायणम्] 'facile reading of @[purāṇa]'; @deva[धारयन्नुपनिषदम्] 'easily mastering @[upaniṣad]'. Without @deva[अकृच्छ्रार्थ]: @deva[कृच्छ्रेणाधीते]; @deva[कृच्छ्रेण धारयति].
"""

advanced = """
@deva[शतृ] follows @deva[इङ्] and @deva[धारि] (@deva[धृ]-@deva[णिच्]) with @deva[अकृच्छ्रार्थ]. Examples: @deva[अधीयन् पारायणम्]; @deva[धारयन्नुपनिषदम्]. Without @deva[अकृच्छ्र]: @deva[कृच्छ्रेणाधीते], @deva[कृच्छ्रेण धारयति].
"""

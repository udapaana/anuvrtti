id = "3.2.160"
numericId = "32160"

[en]
simple = """
The affix @deva[क्मरच्] comes after three verbs to denote habitual action: @deva[सृ] (to flow), @deva[घसि] (to eat), @deva[अद्] (to eat). Examples: @deva[सृमरः] (going, a kind of deer), @deva[घस्मरः] (gluttonous), @deva[अद्मरः] (voracious).
"""

standard = """
The affix @deva[क्मरच्] applies after @deva[सृ], @deva[घसि], @deva[अद्] in @deva[तच्छीलादि] sense. The @deva[क्] is @deva[इत्]. Formations: @deva[सृमरः] (moving, a type of deer), @deva[घस्मरः] (glutton), @deva[अद्मरः] (voracious eater).
"""

advanced = """
@deva[क्मरच्] after @deva[सृ], @deva[घसि], @deva[अद्] in @deva[तच्छीलादि] sense. The @deva[क्] is @deva[इत्] by @ref[1.3.8]. Derivations: @deva[सृ] + @deva[क्मरच्] → @deva[सृमरः] (moving creature, a deer species); @deva[घसि] + @deva[क्मरच्] → @deva[घस्मरः] (gluttonous); @deva[अद्] + @deva[क्मरच्] → @deva[अद्मरः] (voracious).
"""

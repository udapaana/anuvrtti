id = "3.2.145"
numericId = "32145"

[en]
simple = """
The affix @deva[घिनुण्] comes after @deva[लप्] 'to speak', @deva[सृ] 'to flow', @deva[द्रु] 'to run', @deva[मथ्] 'to churn', @deva[वद्] 'to speak', @deva[वस्] 'to dwell' when compounded with @deva[प्र]. Examples: @deva[प्रलापी] 'prattling', @deva[प्रसारी] 'extending', @deva[प्रद्रावी] 'fugitive', @deva[प्रमाथी] 'tormenting', @deva[प्रवादी] 'reporting', @deva[प्रवासी] 'traveler'. Note: @deva[वस्] here is @deva[भ्वादि] 'to dwell', not @deva[अदादि] 'to cover' (which elides @deva[विकरण]).
"""

standard = """
@deva[घिनुण्] follows @deva[लप्], @deva[सृ], @deva[द्रु], @deva[मथ्], @deva[वद्], @deva[वस्] with @deva[तच्छीलादि] when @deva[प्र] is @deva[उपसर्ग]. Examples: @deva[प्रलापी], @deva[प्रसारी], @deva[प्रद्रावी], @deva[प्रमाथी], @deva[प्रवादी], @deva[प्रवासी]. @deva[वस्] = @deva[भ्वादि] 'to dwell', not @deva[अदादि] 'to cover' (which has @deva[विकरणलोप]).
"""

advanced = """
@deva[घिनुण्] follows @deva[प्रलप्], @deva[प्रसृ], @deva[प्रद्रु], @deva[प्रमथ्], @deva[प्रवद्], @deva[प्रवस्] with @deva[तच्छीलादि]. @deva[वस्] = @deva[भ्वादि], not @deva[अदादि]. Examples: @deva[प्रलापी], @deva[प्रसारी], @deva[प्रवासी].
"""

id = "3.2.106"
numericId = "32106"

[en]
simple = """
In Vedic literature, the affix @deva[लिट्] (Perfect) may optionally be replaced by @deva[कानच्]. Examples: @deva[अग्निं चिक्यानः] 'he consecrated the fire', @deva[सोमं सुषुवाणः] 'he pressed the soma juice'. Being optional, @deva[लिट्] forms also occur (as in the previous @[sūtra]). The substitute @deva[कानच्] replaces not only the special @deva[लिट्] of @ref[3.2.105] but also the general Perfect @deva[लिट्], forming verbal adjectives as well as Perfect tense forms. This affix applies only to @[ātmanepada] verbs.
"""

standard = """
In @deva[छन्दस्], @deva[लिट्] is optionally replaced by @deva[कानच्]. Examples: @deva[अग्निं चिक्यानः] 'he consecrated the fire'; @deva[सोमं सुषुवाणः] 'he pressed soma'. Being @deva[विभाषा], @deva[लिट्] forms also occur. The @deva[लिट्] repetition indicates @deva[कानच्] replaces both the special @deva[लिट्] of @ref[3.2.105] and the general Perfect @deva[लिट्]—forming @deva[कृदन्त] (verbal adjectives) as well as @deva[लकार] (tense forms). Applies only to @deva[आत्मनेपद] verbs (@ref[1.4.100]). Cf. @deva[तूतुजान] (@[ṛg] Veda @ref[1.3.6]).
"""

advanced = """
In @deva[छन्दस्], @deva[लिट्] is @deva[विभाषया] replaced by @deva[कानच्]. Examples: @deva[चिक्यानः], @deva[सुषुवाणः]. The @deva[लिट्] repetition (not just @deva[अनुवृत्ति]) indicates @deva[कानच्] replaces both @ref[3.2.105]'s special @deva[लिट्] and general Perfect @deva[लिट्]—forming @deva[कृदन्त] and @deva[लकारार्थ]. Restricted to @deva[आत्मनेपदिन्] (@ref[1.4.100]). Cf. @deva[तूतुजान] (@[ṛ].V. @ref[1.3.6]).
"""

id = "3.2.133"
numericId = "32133"

[en]
simple = """
The affix @deva[शतृ] comes after @deva[अर्ह्] 'to deserve' when expressing praise. Examples: @deva[अर्हन्निह भवान्विद्याम्] 'thou art worthy of this knowledge here', @deva[अर्हन्निह भवान्पूजाम्] 'thou art worthy of honor'. When not praising: @deva[अर्हति चौरो वधम्] 'the thief deserves death' (uses finite verb).
"""

standard = """
@deva[शतृ] follows @deva[अर्ह्] when @deva[स्तुति] (praise) is expressed. Examples: @deva[अर्हन्निह भवान्विद्याम्] 'thou art worthy of knowledge'; @deva[अर्हन्निह भवान्पूजाम्]. Without @deva[स्तुत्यर्थ]: @deva[अर्हति चौरो वधम्] 'the thief deserves death'.
"""

advanced = """
@deva[शतृ] follows @deva[अर्ह्] with @deva[स्तुत्यर्थ]. Examples: @deva[अर्हन्निह भवान्विद्याम्], @deva[अर्हन्निह भवान्पूजाम्]. Without @deva[स्तुति]: @deva[अर्हति चौरो वधम्].
"""

id = "3.2.165"
numericId = "32165"

[en]
simple = """
The affix @deva[ऊक] comes after @deva[जागृ] (to be awake) to denote habitual action. This forms @deva[जागरूकः] (wakeful, vigilant).
"""

standard = """
The affix @deva[ऊक] applies after @deva[जागृ] (to wake) in @deva[तच्छीलादि] sense, forming @deva[जागरूकः] (habitually wakeful, vigilant). The root undergoes @deva[गुण] → @deva[जागर्] + @deva[ऊक] = @deva[जागरूकः].
"""

advanced = """
@deva[ऊक] after @deva[जागृ] in @deva[तच्छीलादि] sense. Formation: @deva[जागृ] undergoes @deva[गुण] of @deva[ऋ] → @deva[अर्], yielding @deva[जागर्] + @deva[ऊक] = @deva[जागरूकः] (wakeful, alert). This is a commonly used word for someone habitually awake or vigilant.
"""

id = "3.2.26"
numericId = "32026"

[en]
simple = """
The words @deva[फलेग्रहिः] 'tree' and @deva[आत्मम्भरिः] 'selfish person' are **irregularly** formed.

**@deva[फलेग्रहिः]:** From @deva[फल] 'fruit' + @deva[ग्रह्] 'to seize' + @deva[इन्]. The @deva[उपपद] ends in @deva[ए] irregularly. Means 'fruit-bearer' = tree.

**@deva[आत्मम्भरिः]:** From @deva[आत्मन्] + @deva[भृ] 'to bear' + @deva[इन्], with augment @deva[मुम्] (@deva[म्]). Means 'self-feeder' = selfish person.

**Similar forms:** @deva[कुक्षिम्भरिः] 'glutton' (belly-feeder), @deva[उदम्भरिः] 'selfish'.
"""

standard = """
The words @deva[फलेग्रहिः] and @deva[आत्मम्भरिः] are @deva[निपातन] (irregular formations).

**@deva[फलेग्रहिः]** 'tree' (fruit-bearer):
- @deva[फलानि गृह्णाति] = @deva[फलेग्रहिः]
- Irregular: @deva[उपपद] @deva[फल] ends in @deva[ए]

**@deva[आत्मम्भरिः]** 'selfish person':
- @deva[आत्मानं बिभर्ति] = @deva[आत्मम्भरिः]
- @deva[मुम्] augment (@deva[म्]) added to @deva[आत्मन्]
- @deva[इन्] affix after @deva[भृञ्]

**Similar formations (indicated by @deva[च]):**
- @deva[कुक्षिम्भरिः] 'glutton' (belly-feeder)
- @deva[उदम्भरिः] 'selfish'
"""

advanced = """
The words @deva[फलेग्रहिः] and @deva[आत्मम्भरिः] are @deva[निपातन].

**@deva[फलेग्रहिः]** 'fruit-bearer, tree':
- @deva[फलानि गृह्णाति] = @deva[फलेग्रहिः]
- Irregular: @deva[उपपद] ends in @deva[ए] (not expected case ending)
- Affix @deva[इन्] after @deva[ग्रह्]

**@deva[आत्मम्भरिः]** 'selfish (one who feeds only himself)':
- @deva[आत्मानं बिभर्ति] = @deva[आत्मम्भरिः]
- @deva[मुम्] augment (@deva[म्]) added to @deva[उपपद] @deva[आत्मन्]
- Affix @deva[इन्] after @deva[भृञ्]

**The @deva[च] indicates similar formations:**
- @deva[कुक्षिम्भरिः] 'glutton' (one caring only to feed his belly)
- @deva[उदम्भरिः] 'selfish'
"""

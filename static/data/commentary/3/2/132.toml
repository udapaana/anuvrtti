id = "3.2.132"
numericId = "32132"

[en]
simple = """
The affix @deva[शतृ] comes after @deva[सु] 'to press out juice' when the meaning involves association with sacrifice. @deva[यज्ञसंयोग] = connection with sacrifice. Derivation: @deva[सु] + @deva[नु] + @deva[शतृ] (@ref[3.1.76], @ref[3.4.113]) → @deva[सुनु] + @deva[अत्] (@ref[1.2.4]) → @deva[सुन्वत्] (@ref[6.1.77]), nominative singular @deva[सुन्वन्], plural @deva[सुन्वन्तः] 'the sacrificers', as in @deva[सर्वे सुन्वन्तः] 'all share in the sacrifice'. @deva[संयोग] indicates the principal sacrificer (@deva[यजमान]), not subordinate priests (@deva[याजकाः]). Without sacrifice connection: @deva[सुनोति सुराम्] 'he distills liquor'.
"""

standard = """
@deva[शतृ] follows @deva[सु] 'to extract juice' when @deva[यज्ञसंयोग] (sacrifice connection) is expressed. @deva[यज्ञसंयोग] is @deva[तृतीयातत्पुरुष]. Derivation: @deva[सु] + @deva[नु] + @deva[शतृ] (@ref[3.1.76], @ref[3.4.113]) → @deva[सुनु] + @deva[अत्] (@ref[1.2.4] @deva[ङित्]) → @deva[सुन्वत्] (@ref[6.1.77]); nominative @deva[सुन्वन्], plural @deva[सुन्वन्तः] 'sacrificers'. @deva[संयोग] = @deva[यजमान] (principal sacrificer), not @deva[याजक] (priest). Without @deva[यज्ञसंयोग]: @deva[सुनोति सुराम्] 'he distills liquor'.
"""

advanced = """
@deva[शतृ] follows @deva[सु] with @deva[यज्ञसंयोग]. Derivation: @deva[सु] + @deva[नु] + @deva[शतृ] → @deva[सुन्वत्] (@ref[3.1.76], @ref[3.4.113], @ref[1.2.4], @ref[6.1.77]); nominative @deva[सुन्वन्]. @deva[संयोग] = @deva[यजमान], not @deva[याजक]. Without @deva[यज्ञसंयोग]: @deva[सुनोति सुराम्].
"""

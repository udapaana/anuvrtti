id = "3.2.32"
numericId = "32032"

[en]
simple = """
The affix @deva[खश्] is used after @deva[लिह्] 'to lick' when @deva[वह] 'shoulder of an ox' or @deva[अभ्र] 'cloud' is in composition.

**Examples:**
- @deva[वहंलिहो गौः] 'the shoulder-licking cow'
- @deva[अभ्रंलिहो वायुः] 'the cloud-licking wind'
"""

standard = """
The affix @deva[खश्] comes after @deva[लिह्] 'to lick' when @deva[वह] 'shoulder of an ox' or @deva[अभ्र] 'cloud' is in composition as object.

**Examples:**
| Form | Meaning |
|------|--------|
| @deva[वहंलिहः] | shoulder-licker (cow) |
| @deva[अभ्रंलिहः] | cloud-licker (wind) |

**Usage:**
- @deva[वहंलिहो गौः] 'the shoulder-licking cow'
- @deva[अभ्रंलिहो वायुः] 'the cloud-licking wind'
"""

advanced = """
The affix @deva[खश्] comes after @deva[लिह्] 'to lick' when @deva[वह] 'shoulder of an ox' or @deva[अभ्र] 'cloud' is in composition as object.

**Examples:**
- @deva[वहंलिहो गौः] 'the shoulder-licking cow' (a cow that licks the shoulder of the ox)
- @deva[अभ्रंलिहो वायुः] 'the cloud-licking wind' (wind that reaches/touches the clouds)
"""

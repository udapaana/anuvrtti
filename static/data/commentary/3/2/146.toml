id = "3.2.146"
numericId = "32146"

[en]
simple = """
The affix @deva[वुञ्] comes after @deva[निन्द्] 'to blame', @deva[हिंस्] 'to injure', @deva[क्लिश्] 'to torment', @deva[खाद्] 'to eat', @deva[विनश्] 'to destroy', @deva[परिक्षिप्], @deva[परिरट्], @deva[परिवद्], @deva[व्याभाष्], and @deva[असूय्] in the sense of 'agent having such habit etc.' Examples: @deva[निन्दकः] 'blaming' (@ref[7.1.1]), @deva[हिंसकः] 'injuring', @deva[क्लेशकः] 'tormenting', @deva[खादकः] 'eating', @deva[विनाशकः] 'destroying', @deva[असूयकः] 'detracting'. Note: The same forms could come from @deva[ण्वुल्] (@ref[3.1.133]); the separate statement here establishes a @deva[परिभाषा]: the @deva[वासरूप] rule (@ref[3.1.94]) does not apply to @deva[तच्छील] affixes (@ref[3.2.134]-@ref[3.2.177])—so @deva[तृच्] etc. are not added in @deva[तच्छील] sense.
"""

standard = """
@deva[वुञ्] follows @deva[निन्द्], @deva[हिंस्], @deva[क्लिश्], @deva[खाद्], @deva[विनश्], @deva[परिक्षिप्], @deva[परिरट्], @deva[परिवद्], @deva[व्याभाष्], @deva[असूय्] with @deva[तच्छीलादि]. Examples: @deva[निन्दकः] (@ref[7.1.1]), @deva[हिंसकः], @deva[क्लेशकः], @deva[खादकः], @deva[विनाशकः], @deva[परिक्षेपकः], @deva[परिराटकः], @deva[परिवादकः], @deva[व्याभाषकः], @deva[असूयकः]. The same forms arise from @deva[ण्वुल्] (@ref[3.1.133]); the separate statement establishes @deva[परिभाषा]: @ref[3.1.94] (@deva[वासरूप] rule) doesn't apply to @deva[तच्छीलादि] affixes (@ref[3.2.134]-@ref[3.2.177])—so @deva[तृच्] etc. don't come with @deva[तच्छीलार्थ].
"""

advanced = """
@deva[वुञ्] follows @deva[निन्द्], @deva[हिंस्], @deva[क्लिश्], @deva[खाद्], @deva[विनश्], @deva[परिक्षिप्], @deva[परिरट्], @deva[परिवद्], @deva[व्याभाष्], @deva[असूय्] with @deva[तच्छीलादि]. Same as @deva[ण्वुल्] (@ref[3.1.133]); separate statement yields @deva[परिभाषा]: @ref[3.1.94] doesn't apply to @ref[3.2.134]-@ref[3.2.177] affixes.
"""

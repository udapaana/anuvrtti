id = "3.2.171"
numericId = "32171"

[en]
simple = """
In the Vedas, the affixes @deva[कि] and @deva[किन्] come after verbs ending in long @deva[आ] or @deva[ऋ/ॠ], and after @deva[गम्] (to go), @deva[हन्] (to kill), @deva[जन्] (to be born). These affixes operate like @deva[लिट्] (perfect tense), causing reduplication. Examples: @deva[पपिः] (drinking), @deva[जग्मिः] (going, wind), @deva[जघ्निः] (killing). The @deva[क्] is @deva[इत्] to prevent @deva[गुण] of @deva[ॠ].
"""

standard = """
In @deva[छन्दस्], @deva[कि] and @deva[किन्] apply after verbs ending in @deva[आ] or @deva[ऋ/ॠ], plus @deva[गम्], @deva[हन्], @deva[जन्], in @deva[तच्छीलादि] sense. They cause @deva[लिट्]-like reduplication. Examples: @deva[पा] + @deva[कि] = @deva[पपिः] (drinking soma); @deva[गम्] + @deva[किन्] = @deva[जग्मिः] (wind - always moving); @deva[हन्] + @deva[किन्] = @deva[जघ्निः] (slayer). The @deva[क्] is @deva[इत्] to prevent @deva[गुण] of @deva[ॠ] that @ref[7.4.11] would otherwise cause.

@[vārtika]: @deva[कि]/​@deva[किन्] are universal in Vedas (not limited to listed roots). In secular Sanskrit, they apply after @deva[धाञ्], @deva[कृञ्], @deva[सृ], @deva[जनि], @deva[गमि], @deva[नमि]: @deva[दधिः], @deva[चक्रिः], @deva[जग्मिः], @deva[नेमिः].
"""

advanced = """
In @deva[छन्दस्], @deva[कि] and @deva[किन्] after @deva[आकारान्त] and @deva[ऋकारान्त] roots, plus @deva[गम्], @deva[हन्], @deva[जन्], in @deva[तच्छीलादि] sense. They behave like @deva[लिट्], triggering reduplication. The @deva[द्] in @deva[आद्ऋतः] (not @deva[त्]) ensures both short and long @deva[ऋ] are included (cf. @ref[1.1.70] @deva[तपर]).

Examples: @deva[पपिः सोमम्] (RV); @deva[ददिर्गाः] (RV VI.23.4); @deva[जग्मिः] (wind); @deva[जघ्निवृत्रम्] (RV IX.61.2). The @deva[क्] is @deva[इत्] to block @deva[गुण] by @ref[7.4.11] (otherwise @deva[ॠ] → @deva[अर्] before @deva[लिट्]-like affixes).

@note[type=@[vārtika]]: @deva[कि]/​@deva[किन्] universal in @deva[छन्दस्]: @deva[सेदिः] (YV XII.105), @deva[नेमिः] (RV II.5.3). In @deva[लौकिक]: after @deva[धाञ्], @deva[कृञ्], @deva[सृ], @deva[जनि], @deva[गमि], @deva[नमि]. Also after @deva[यङन्त] of @deva[सह्], @deva[वह्], @deva[चल्], @deva[यत्]: @deva[सासहिः], @deva[वावहिः], @deva[चाचलिः], @deva[यायतिः] (cf. @ref[7.4.83]).
"""

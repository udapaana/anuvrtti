id = "3.2.70"
numericId = "32070"

[en]
simple = """
The affix @deva[कप्] comes after @deva[दुह्] 'to milk' when a case-ending word is in composition, and the final @deva[ह्] is replaced by @deva[घ].

**Examples:**
- @deva[कामदुघा धेनुः] 'a milch cow giving abundance of milk'
- @deva[अर्थदुघा] 'yielding wealth'
- @deva[धर्मदुघा] 'yielding merit'
"""

standard = """
The affix @deva[कप्] comes after @deva[दुह्] 'to milk' with @deva[सुप्]-ending word, and final @deva[ह्] → @deva[घ].

**Derivation:** @deva[कामं दोग्धि] = @deva[कामदुघा धेनुः] 'milch cow giving abundance of milk'

**Examples:** @deva[कामदुघा], @deva[अर्थदुघा] 'wealth-yielding', @deva[धर्मदुघा] 'merit-yielding'
"""

advanced = """
The affix @deva[कप्] comes after @deva[दुह्] with @deva[सुप्]-ending word; final @deva[ह्] → @deva[घ].

**Examples:** @deva[कामदुघा धेनुः] 'milch cow', @deva[अर्थदुघा], @deva[धर्मदुघा]
"""

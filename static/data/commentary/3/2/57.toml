id = "3.2.57"
numericId = "32057"

[en]
simple = """
The affixes @deva[खिष्णुच्] and @deva[खुकञ्] come after @deva[भू] 'to become' when the sense is **agent** (@deva[कर्तृ]) and the @deva[उपपद] has @deva[च्वि]-sense but doesn't end in @deva[च्वि].

**Examples:**
- @deva[आढ्यम्भविष्णुः] or @deva[आढ्यम्भावुकः] 'one becoming rich'
- @deva[सुभगम्भविष्णुः] or @deva[सुभगम्भावुकः] 'one becoming fortunate'

These apply to the same @deva[उपपद]s as the previous @[sūtra].
"""

standard = """
The affixes @deva[खिष्णुच्] (= @deva[इष्णु]) and @deva[खुकञ्] (= @deva[उक]) come after @deva[भू] 'to become' with the same @deva[उपपद]s as @ref[3.2.56], when @deva[कर्तृ] (agent) is intended and @deva[च्वि]-sense but not @deva[च्वि]-ending.

| @deva[उपपद] | @deva[खिष्णुच्] | @deva[खुकञ्] |
|------|---------|---------|
| @deva[आढ्य] | @deva[आढ्यम्भविष्णुः] | @deva[आढ्यम्भावुकः] |
| @deva[सुभग] | @deva[सुभगम्भविष्णुः] | @deva[सुभगम्भावुकः] |
| @deva[नग्न] | @deva[नग्नम्भविष्णुः] | @deva[नग्नम्भावुकः] |

**Why @deva[कर्तृ]?** Not for instrumental sense.

**Not with @deva[च्वि]-ending:** @deva[आढ्यी भविता] 'he will be rich' — affixes don't apply.
"""

advanced = """
The affixes @deva[खिष्णुच्] and @deva[खुकञ्] come after @deva[भू] when @deva[कर्तृ] is intended with @deva[च्वि]-sense but not @deva[च्वि]-ending.

**Examples:** @deva[आढ्यम्भविष्णुः]/[@deva[आढ्यम्भावुकः]] 'becoming rich', @deva[प्रियम्भविष्णुः]/[@deva[प्रियम्भावुकः]] 'becoming an object of affection, amiable'

**Conditions:**
1. @deva[कर्तृ] sense (not instrumental)
2. @deva[च्वि]-sense present
3. @deva[उपपद] not ending in @deva[च्वि]

**Counter-example:** @deva[आढ्यी भविता] 'he will be rich' (actual @deva[च्वि]-ending) — affixes don't apply
"""

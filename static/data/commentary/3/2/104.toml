id = "3.2.104"
numericId = "32104"

[en]
simple = """
The affix @deva[अतृन्] comes after the verb @deva[जृ] 'to grow old' with past-time meaning. Example: @deva[जरत्] → nominative singular @deva[जरन्], dual @deva[जरन्तौ], plural @deva[जरन्तः] 'grown old'. Derivation: @deva[जृ] + @deva[अतृन्] → @deva[जर्] + @deva[अत्] (@ref[7.3.84] @[guṇa]) → @deva[जरत्] (@ref[6.1.7]). By @deva[वासरूप] (@ref[3.1.94]), @deva[निष्ठा] affixes also apply: @deva[जीर्णः], @deva[जीर्णवान्].
"""

standard = """
@deva[अतृन्] follows @deva[जृ] 'to grow old' with @deva[भूतार्थ]. Example: @deva[जृ] + @deva[अतृन्] → @deva[जर्] + @deva[अत्] (@ref[7.3.84] @deva[गुण]) → @deva[जरत्] (@ref[6.1.7]); nominative singular @deva[जरन्], dual @deva[जरन्तौ], plural @deva[जरन्तः] 'grown old'. By @deva[वासरूप] (@ref[3.1.94]), @deva[निष्ठा] also applies: @deva[जृ] + @deva[क्त] → @deva[जिर्] + @deva[त] (@ref[7.1.100], @ref[1.1.51]) → @deva[जिर्] + @deva[न] (@ref[8.2.42]) → @deva[जीर्ण] (@ref[8.2.77], @ref[8.4.1]).
"""

advanced = """
@deva[अतृन्] follows @deva[जृ] with @deva[भूतार्थ]. Derivation: @deva[जृ] + @deva[अतृन्] → @deva[जर्] + @deva[अत्] (@ref[7.3.84]) → @deva[जरत्] (@ref[6.1.7]); nominative @deva[जरन्]. By @deva[वासरूप] (@ref[3.1.94]), @deva[निष्ठा] also valid: @deva[जृ] + @deva[क्त] → @deva[जिर्त] (@ref[7.1.100], @ref[1.1.51]) → @deva[जिर्न] (@ref[8.2.42]) → @deva[जीर्ण] (@ref[8.2.77], @ref[8.4.1]).
"""

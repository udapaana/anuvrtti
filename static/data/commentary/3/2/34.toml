id = "3.2.34"
numericId = "32034"

[en]
simple = """
The affix @deva[खश्] is used after @deva[पच्] 'to cook' when @deva[मित] 'little/measured' or @deva[नख] 'nail' is in composition—but **not** when they denote measures (which was covered in the previous @[sūtra]).

**Examples:**
- @deva[मितम्पचा ब्राह्मणी] 'a niggardly Brahmin woman' (who cooks only a little)
- @deva[नखम्पचा यवागूः] 'nail-scorching barley gruel' (so hot it burns the nails)
"""

standard = """
The affix @deva[खश्] comes after @deva[पच्] 'to cook' when @deva[मित] 'measured/little' or @deva[नख] 'nail' is in composition—this applies when **not** denoting measures (cf. @ref[3.2.33]).

**Examples:**
- @deva[मितम्पचा ब्राह्मणी] 'a niggardly Brahmin woman' (cooks only a little)
- @deva[नखम्पचा यवागूः] 'nail-scorching barley gruel' (so hot it burns the nails)

**Scope distinction:** @ref[3.2.33] covers @deva[परिमाण] (actual measures); this @[sūtra] covers other senses.
"""

advanced = """
The affix @deva[खश्] comes after @deva[पच्] 'to cook' when @deva[मित] 'measured portion' or @deva[नख] 'nail' is in composition as object. This @[sūtra] applies when the words do **not** denote measures (which was the case in @ref[3.2.33]).

**Examples:**
- @deva[मितम्पचा ब्राह्मणी] 'the Brahmin woman who cooks little' (i.e., niggardly)
- @deva[नखम्पचा यवागूः] 'nail-scorching barley gruel' (so hot it burns the nails)

**Scope distinction from @ref[3.2.33]:** The previous @[sūtra] applies when the @deva[उपपद] denotes an actual @deva[परिमाण] (unit of measure). This @[sūtra] has its scope when the formed words do not denote measures.
"""

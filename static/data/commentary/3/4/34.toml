id = "3.4.34"
numericId = "34034"

[en]
simple = """
@deva[णमुल्] is added to @deva[कष्] (to scrape) when @deva[निमूल] or @deva[समूल] (with roots) is in accusative composition. Examples: @deva[निमूलकाषं कषति] 'he scrapes down to the roots'; @deva[समूलकाषं कषति] 'he scrapes up the roots'. The gerund and main verb are from the same root. Note: from this @[sūtra] to @ref[3.4.46], the main verb must be from the same root as the gerund.
"""

standard = """
@deva[णमुल्] after @deva[कष्] with @deva[निमूल]/​@deva[समूल] in @deva[द्वितीया] composition. @deva[निमूलकाषं कषति] = @deva[निमूलं कषति] 'scrapes to the roots'; @deva[समूलकाषं कषति] 'scrapes including roots'. The gerund and governing verb share the same root. This establishes a pattern: from @ref[3.4.34] to @ref[3.4.46], @deva[अनुप्रयोग] (following verb) must derive from the same @deva[धातु] as the @deva[णमुल्]-formed gerund.
"""

advanced = """
@deva[णमुल्] after @deva[कष्] with @deva[निमूल]/​@deva[समूल] @deva[द्वितीयान्त उपपद]. @deva[निमूलकाषं कषति] (= @deva[निमूलं कषति]); @deva[समूलकाषं कषति]. The @deva[णमुल्]-compound and main verb express the same action - redundancy for emphasis. This begins a series (through @ref[3.4.46]) requiring @deva[सधातुक अनुप्रयोग] (cognate subsequent verb). See @ref[3.4.46] for the @deva[नियम].
"""

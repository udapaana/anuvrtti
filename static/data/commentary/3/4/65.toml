id = "3.4.65"
numericId = "34065"

[en]
simple = """
The affix @deva[तुमुन्] (forming the infinitive) is added to any verb when the main verb has the sense of: @deva[शक्] 'to be able', @deva[धृष्] 'to dare', @deva[ज्ञा] 'to know', @deva[ग्लै] 'to be weary', @deva[घट्] 'to strive', @deva[रभ्] 'to begin', @deva[लभ्] 'to obtain', @deva[क्रम्] 'to proceed', @deva[सह्] 'to bear', @deva[अर्ह्] 'to deserve', or @deva[अस्] 'to be'. Example: @deva[शक्नोमि] @deva[भोक्तुम्] 'I am able to eat'. This differs from @ref[3.3.10] where the infinitive expresses purpose; here it expresses the complement of these verbs.
"""

standard = """
@deva[तुमुन्] is added to a verb when the governing verb has the sense of @deva[शक्]/@deva[धृष्]/@deva[ज्ञा]/@deva[ग्लै]/@deva[घट्]/@deva[रभ्]/@deva[लभ्]/@deva[क्रम्]/@deva[सह्]/@deva[अर्ह्]/@deva[अस्]. Unlike @ref[3.3.10] (infinitive of purpose), here the infinitive has no purposive force—it complements the modal/auxiliary verb. @deva[शक्नोमि] @deva[भोक्तुम्] 'I can eat'; @deva[जानाति]/@deva[ग्लायति]/@deva[घटते]/@deva[आरभते]/@deva[लभते]/@deva[प्रक्रमते]/@deva[सहते]/@deva[अर्हति]/@deva[अस्ति]/@deva[भवति]/@deva[विद्यते] @deva[भोक्तुम्]. Per @[bhaṭṭoji] @[dīkṣita], @deva[अर्थ] connects only with @deva[अस्]; but classical usage (@[kālidāsa], etc.) shows synonyms of all these verbs also take infinitives.
"""

advanced = """
@deva[तुमुन्] follows a @deva[धातु] when the @deva[अनुप्रयोग] has @deva[शक्]/@deva[धृष्]/@deva[ज्ञा]/@deva[ग्लै]/@deva[घट्]/@deva[रभ्]/@deva[लभ्]/@deva[क्रम्]/@deva[सह्]/@deva[अर्ह्]/@deva[अस्]-meaning. Distinguished from @ref[3.3.10]: here no @deva[तादर्थ्य] (purposive) sense; the @deva[अनुप्रयोग] is verbal @deva[उपपद]. @[bhaṭṭoji]'s view: @deva[अर्थग्रहणमस्तिनैव] @deva[सम्बध्यते] @deva[अनन्तरत्वात्]—@deva[अर्थ] qualifies @deva[अस्] only, listing roots @deva[शक्]–@deva[अर्ह्] plus @deva[अस्]-synonyms. But classical evidence contradicts: @deva[न] @deva[पारयामि] @deva[निवेदयितुम्] (@[śāk]. 4), @deva[न] @deva[च] @deva[वेद] @deva[सम्यग्] @deva[द्रष्टुम्] (R. VI.30) show @deva[पारय]/@deva[विद्] (synonyms of @deva[शक्]/@deva[ज्ञा]) governing infinitives. Hence @deva[अर्थ] likely qualifies all listed roots.
"""

id = "3.4.23"
numericId = "34023"

[en]
simple = """
@deva[णमुल्] and @deva[क्त्वा] are not used when @deva[यद्] is in a self-contained sentence (no @deva[आकाङ्क्षा] - interdependence with another clause). Example: @deva[यद् अयं भुङ्क्ते ततः पचति] 'when he eats, then he cooks' - no gerund because the @deva[यद्...ततः] construction is complete. But with @deva[आकाङ्क्षा]: @deva[यद् अयं भुक्त्वा व्रजति] 'when he goes having eaten...' (incomplete, needs more).
"""

standard = """
@deva[णमुल्] and @deva[क्त्वा] are blocked when @deva[यद्] is in composition and the sentence lacks @deva[आकाङ्क्षा] (syntactic incompleteness/dependency). @deva[आकाङ्क्षा] = inability to convey full sense without another clause. Without @deva[आकाङ्क्षा]: @deva[यद् अयं भुङ्क्ते ततः पचति] 'when he eats, he cooks' - complete with @deva[यद्...ततः]. With @deva[आकाङ्क्षा]: @deva[यद् अयं भुक्त्वा व्रजति] (needs complement) - gerund allowed. Böhtlingk: 'With @deva[यद्], absolutives don't apply unless the verbs require another as complement.'
"""

advanced = """
@deva[णमुल्] and @deva[क्त्वा] blocked with @deva[यद्] when @deva[अनाकाङ्क्षा] (self-sufficient sentence). @deva[आकाङ्क्षा] = syntactic incompleteness requiring another element. Self-sufficient @deva[यद्]-clause: @deva[यद् अयं भुङ्क्ते ततः पचति], @deva[यद् अयम् अधीते ततः शेते] - prior-subsequent actions complete the sense; no gerund. With @deva[आकाङ्क्षा]: @deva[यद् अयं भुक्त्वा व्रजति, अधीत एव ततः परम्] - the @deva[यद्]-clause is incomplete without complement; gerund permitted.
"""

id = "3.4.20"
numericId = "34020"

[en]
simple = """
@deva[क्त्वा] expresses relative position (@deva[परावरयोग]) - being on this side (@deva[अवर]) or the far side (@deva[पर]) of something. Example: @deva[अप्राप्य नदीं पर्वतः स्थितः] 'the mountain stands without reaching the river' = 'the mountain is on this side of the river'. Similarly: @deva[अतिक्रम्य पर्वतं नदी स्थिता] 'having crossed the mountain, the river stands' = 'the river is beyond the mountain'. Here the gerund doesn't denote prior action.
"""

standard = """
@deva[क्त्वा] denotes @deva[परावरयोग] (relative spatial position: @deva[पर] = far side, @deva[अवर] = near side). The gerund here doesn't indicate temporal sequence. Examples: @deva[अप्राप्य नदीं पर्वतः स्थितः] 'the mountain stands, not having reached the river' = 'the mountain is on this side of the river' (river is @deva[पर]); @deva[अतिक्रम्य पर्वतं नदी स्थिता] 'the river stands, having crossed the mountain' = 'the river is beyond the mountain'. The gerund expresses spatial reference, not prior action.
"""

advanced = """
@deva[क्त्वा] for @deva[परावरयोग] (spatial relation): @deva[पर] (far side), @deva[अवर] (near side). This is another exception where the gerund doesn't denote prior action. @deva[अप्राप्य नदीं पर्वतः स्थितः] - the mountain, as agent of 'not reaching,' is @deva[अवर] relative to the river. @deva[अतिक्रम्य पर्वतं नदी स्थिता] - the river is @deva[पर] relative to the mountain. Per G.P.: 'The gerund implies the situation of a thing with reference to another, though the gerund action is not temporally prior.'
"""

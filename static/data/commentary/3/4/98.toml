id = "3.4.98"
numericId = "34098"

[en]
simple = """
In Vedic @deva[लेट्] (subjunctive), the final @deva[स्] of first person endings may optionally be dropped.
"""

standard = """
In @deva[लेट्] (Vedic Subjunctive), the @deva[स्] of first person endings is optionally elided. Thus @deva[करवाव] or @deva[करवावः], @deva[करवाम] or @deva[करवामः]. The specification 'first person' indicates @deva[स्] is not elided in other persons.
"""

advanced = """
For @deva[लेट्] (Vedic Subjunctive), this @[sūtra] teaches optional deletion of final @deva[स्] in @deva[उत्तमपुरुष] (first person) endings. The dual @deva[वस्] → @deva[व] (optional), and plural @deva[मस्] → @deva[म] (optional). By specifying @deva[उत्तमस्य], non-first-person forms retain @deva[स्]. This rule is specific to @deva[लेट्] and superseded by @ref[3.4.99] for @deva[ङित्] @[lakāras].
"""

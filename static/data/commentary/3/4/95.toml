id = "3.4.95"
numericId = "34095"

[en]
simple = """
In Vedic texts, the endings @deva[तन्] and @deva[आम्] may optionally replace the regular plural endings.
"""

standard = """
In Vedic usage, @deva[तन्] and @deva[आम्] can optionally serve as substitutes for regular plural @deva[परस्मैपद] endings. These archaic forms appear in Vedic texts where classical Sanskrit would use standard conjugational endings.
"""

advanced = """
The Vedas permit @deva[तन्] and @deva[आम्] as optional alternatives to standard plural @deva[तिङ्] endings. These substitute various @deva[बहुवचन] (plural) endings in @deva[परस्मैपद], yielding archaic Vedic forms not found in classical usage.
"""

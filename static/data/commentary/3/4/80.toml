id = "3.4.80"
numericId = "34080"

[en]
simple = """
In the six @deva[टित्] tenses, @deva[थास्] (2nd person singular @deva[आत्मनेपद]) is replaced by @deva[से]. Examples: @deva[पचसे] (@deva[लट्]), @deva[पेचिषे] (@deva[लिट्]), @deva[पक्तासे] (@deva[लुट्]), @deva[पक्ष्यसे] (@deva[लृट्]).
"""

standard = """
@deva[थास्] → @deva[से] in @deva[टित्] @deva[ल]s (six tenses). @deva[लट्]: @deva[पचसे]; @deva[लिट्]: @deva[पेचिषे]; @deva[लुट्]: @deva[पक्तासे]; @deva[लृट्]: @deva[पक्ष्यसे].
"""

advanced = """
@deva[थास्] → @deva[से] in @deva[टित्] @deva[लकार]s. Paradigm forms: @deva[पचसे] (@deva[लट्]), @deva[पेचिषे] (@deva[लिट्]), @deva[पक्तासे] (@deva[लुट्]), @deva[पक्ष्यसे] (@deva[लृट्]). See conjugation tables in preceding commentary.
"""

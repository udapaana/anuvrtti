id = "3.4.76"
numericId = "34076"

[en]
simple = """
The @deva[क्त] affix denotes location (@deva[अधिकरण]) in addition to its other meanings when it follows verbs meaning: (1) @deva[ध्रौव्य] (fixedness/staying in place), (2) motion (@deva[गत्यर्थ]), or (3) taking/eating (@deva[प्रत्यवसानार्थ]). For fixedness verbs: @deva[आसितो] @deva[देवदत्तः] 'D. sat' (agent); @deva[आसितं] @deva[तेन] 'sitting by him' (act); @deva[इदमेषामासितम्] 'this was their seat' (location). For motion verbs: @deva[यातो] @deva[देवदत्तः] @deva[ग्रामम्] (agent); @deva[यातः] @deva[ग्रामः] @deva[देवदत्तेन] (object); @deva[यातं] @deva[देवदत्तेन] (act); @deva[इदमेषां] @deva[यातम्] 'this is where they went' (location). For eating verbs: @deva[भुक्तः] @deva[ओदनः] @deva[देवदत्तेन] (object); @deva[देवदत्तेन] @deva[भुक्तम्] (act); @deva[इदमेषां] @deva[भुक्तम्] 'this is where they ate' (location).
"""

standard = """
@deva[क्त] additionally denotes @deva[अधिकरण] (location) after @deva[ध्रौव्यार्थ] (fixedness), @deva[गत्यर्थ] (motion), and @deva[प्रत्यवसानार्थ] (eating/taking) verbs. @deva[ध्रौव्यार्थ] verbs are @deva[अकर्मक]—@deva[क्त] expresses @deva[कर्तृ], @deva[भाव], and @deva[अधिकरण]. @deva[गत्यर्थ] verbs: @deva[कर्तृ], @deva[कर्मन्], @deva[भाव], @deva[अधिकरण]. @deva[प्रत्यवसानार्थ] verbs: @deva[कर्मन्], @deva[भाव], @deva[अधिकरण]. Examples: @deva[इदमेषामासितम्] (@deva[अधिकरण]—'their seat'); @deva[इदमेषां] @deva[यातम्] ('their route'); @deva[इदमेषां] @deva[भुक्तम्] ('their eating place'). The @deva[आ] in @deva[भुक्ता] @deva[ब्राह्मणाः], @deva[पीता] @deva[गावः] has @deva[मतुप्]-force (@ref[4.2.85]): @deva[भुक्तमेषामस्ति].
"""

advanced = """
@deva[क्त] takes @deva[अधिकरण] in addition to standard meanings after: @deva[ध्रौव्यार्थ] (agent/@deva[भाव]/location); @deva[गत्यर्थ] (agent/object/@deva[भाव]/location); @deva[प्रत्यवसानार्थ] (object/@deva[भाव]/location). Examples: @deva[आसितो] @deva[देवदत्तः] (@deva[कर्तृ]); @deva[आसितं] @deva[तेन] (@deva[भाव]); @deva[इदमेषामासितम्] (@deva[अधिकरण]). @deva[यातो] @deva[देवदत्तो] @deva[ग्रामम्]/@deva[यातः] @deva[ग्रामः] @deva[देवदत्तेन]/@deva[यातं] @deva[देवदत्तेन]/@deva[इदमेषां] @deva[यातम्]. @deva[भुक्तः] @deva[ओदनः] @deva[देवदत्तेन]/@deva[देवदत्तेन] @deva[भुक्तम्]/@deva[इदमेषां] @deva[भुक्तम्]. @deva[भुक्ता] @deva[ब्राह्मणाः], @deva[पीता] @deva[गावः]—@deva[आ] = @deva[मतुप्] (@ref[4.2.85]).
"""

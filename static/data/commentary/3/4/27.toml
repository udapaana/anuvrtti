id = "3.4.27"
numericId = "34027"

[en]
simple = """
@deva[णमुल्] is added to @deva[कृ] when @deva[अन्यथा] (otherwise), @deva[एवम्] (so), @deva[कथम्] (how), or @deva[इत्थम्] (thus) is in composition, provided @deva[कृ] could be omitted without changing meaning. Examples: @deva[अन्यथाकारं भुङ्क्ते] = @deva[अन्यथा भुङ्क्ते] 'he eats otherwise'. But when @deva[कृ] is essential: @deva[अन्यथा कृत्वा शिरो भुङ्क्ते] 'having turned his head aside, he eats' - here @deva[णमुल्] doesn't apply.
"""

standard = """
@deva[णमुल्] after @deva[कृ] with @deva[अन्यथा], @deva[एवम्], @deva[कथम्], @deva[इत्थम्] in composition when @deva[कृञः अप्रयोग उपपद्यते] (non-use of @deva[कृ] would be valid). The sentence should remain correct without @deva[कृ]. Examples: @deva[अन्यथाकारं भुङ्क्ते] = @deva[अन्यथा भुङ्क्ते] 'eats otherwise'; @deva[एवङ्कारं भुङ्क्ते] = @deva[एवं भुङ्क्ते]; @deva[कथङ्कारं भुङ्क्ते] 'how does he eat?'; @deva[इत्थङ्कारं भुङ्क्ते] 'eats thus'. Counterexample: @deva[अन्यथा कृत्वा शिरो भुङ्क्ते] - @deva[कृ] is essential (turning head), so @deva[क्त्वा] not @deva[णमुल्].
"""

advanced = """
@deva[णमुल्] after @deva[कृ] with @deva[अन्यथा]/​@deva[एवम्]/​@deva[कथम्]/​@deva[इत्थम्] when @deva[कृञः अप्रयोग उपपद्यते] - the sentence would be grammatical and semantically equivalent without @deva[कृ]. @deva[अन्यथाकारं भुङ्क्ते] = @deva[अन्यथा भुङ्क्ते]; @deva[एवङ्कारं], @deva[कथङ्कारं], @deva[इत्थङ्कारं] similarly. When @deva[कृ] contributes essential meaning: @deva[अन्यथा कृत्वा शिरो भुङ्क्ते] 'having positioned his head otherwise, he eats' - @deva[कृ] is indispensable; @deva[क्त्वा] applies, not @deva[णमुल्].
"""

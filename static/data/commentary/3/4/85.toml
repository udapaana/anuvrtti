id = "3.4.85"
numericId = "34085"

[en]
simple = """
The @deva[लोट्] (imperative) endings are like those of @deva[लङ्] (imperfect) for certain forms. Specifically, @deva[ताम्], @deva[तम्], @deva[त], @deva[व], @deva[म] appear in @deva[लोट्] as they do in @deva[लङ्]. Examples: @deva[पचताम्], @deva[पचतम्], @deva[पचत], @deva[पचाव], @deva[पचाम]. This is an @deva[अतिदेश] (analogy) rule. However, @deva[लोट्] doesn't take @deva[लङ्]-specific features like the @deva[अट्]/@deva[आट्] augment or @deva[जुस्]/@deva[झि] substitution (@ref[3.4.111])—the @deva[वा] from @ref[3.4.83] applies here too, making this a limited analogy.
"""

standard = """
This @deva[अतिदेश] makes @deva[लोट्] endings parallel @deva[लङ्] for @deva[ताम्]/@deva[तम्]/@deva[त]/@deva[व]/@deva[म]. @deva[पचताम्], @deva[पचतम्], @deva[पचत], @deva[पचाव], @deva[पचाम]. Q: Why no @deva[अट्]/@deva[आट्] augment or @deva[जुस्] substitution (@ref[3.4.111]) in @deva[लोट्]? A: The @deva[वा] from @ref[3.4.83] applies here—the @deva[लोट्] ≈ @deva[लङ्] analogy is @deva[व्यवस्थितविभाषा] (limited optionality), not extending all @deva[लङ्]-rules to @deva[लोट्].
"""

advanced = """
@deva[अतिदेशसूत्र]: @deva[लोट्] takes @deva[लङ्]-style @deva[ताम्]/@deva[तम्]/@deva[त]/@deva[व]/@deva[म]. @deva[पचताम्]/@deva[पचतम्]/@deva[पचत]/@deva[पचाव]/@deva[पचाम]. The analogy is limited (@deva[व्यवस्थितविभाषा] via @deva[वा] of @ref[3.4.83])—@deva[लङ्]-specific rules (@deva[अट्]/@deva[आट्] augment, @deva[जुस्] for @deva[झि] @ref[3.4.111]) don't extend to @deva[लोट्].
"""

id = "3.4.26"
numericId = "34026"

[en]
simple = """
@deva[णमुल्] is added to @deva[कृ] when a word meaning 'sweet' (@deva[स्वादु]) is in composition, with same-agent and prior-action applying. Example: @deva[स्वादुङ्कारं भुङ्क्ते] 'he eats, having made [the food] sweet'. The @deva[म्] in @deva[स्वादुम्] in the @[sūtra] prevents @ref[4.1.44] from applying, so even with feminine @deva[यवागू], we use @deva[स्वादु] (not @deva[स्वाद्वी]). By @ref[3.1.94], @deva[क्त्वा] alternative: @deva[स्वादु कृत्वा भुङ्क्ते].
"""

standard = """
@deva[णमुल्] after @deva[कृ] with @deva[स्वादु]-type @deva[उपपद] in composition. @deva[अनुवृत्ति] of @deva[समानकर्तृक] and @deva[पूर्वकाल] from @ref[3.4.21]. Examples: @deva[स्वादुङ्कारं भुङ्क्ते] 'eats having sweetened'; @deva[लक्षणङ्कारं भुङ्क्ते] 'eats having seasoned'. The anomalous @deva[स्वादुम्] (with @deva[म्]) in the @[sūtra] indicates that @ref[4.1.44] (feminine @deva[ई] for @deva[उ]-ending) doesn't apply: @deva[स्वादुङ्कारं यवागूं भुङ्क्ते] (not @deva[स्वाद्वीम्]). With @deva[च्वि] sense (@deva[अस्वाद्वीं स्वाद्वीं कृत्वा]): @deva[स्वादुङ्कारं भुङ्क्ते]. @deva[क्त्वा] alternative by @ref[3.1.94]: @deva[स्वादु कृत्वा भुङ्क्ते]. Passive construction not valid: *@deva[स्वादुङ्कारं यवागूर् भुज्यते देवदत्तेन].
"""

advanced = """
@deva[णमुल्] after @deva[कृ] with @deva[स्वादु]-class @deva[उपपद]. @deva[अनुवृत्ति]: @deva[समानकर्तृक], @deva[पूर्वकाल] (@ref[3.4.21]). The @deva[म्] in @deva[स्वादुम्] is @deva[निपातन] blocking @ref[4.1.44] (so @deva[स्वादुङ्कारं यवागूम्], not @deva[स्वाद्वीम्]). Why not @deva[खमुञ्] (previous @[sūtra])? @deva[खमुञ्] gives @deva[मुम्] augment (@ref[6.3.67]) but not in @deva[अव्यय] contexts; with @deva[च्वि] (@deva[अस्वाद्वीं स्वाद्वीम्]), the result is @deva[अव्यय] by @ref[1.4.61], so @deva[मुम्] wouldn't apply. Hence @deva[णमुल्] is specified. These affixes convey @deva[भाव] (@deva[तुमर्थ], @ref[3.4.16]). Passive invalid: *@deva[स्वादुङ्कारं भुज्यते].
"""

id = "3.4.108"
numericId = "34108"

[en]
simple = """
In @deva[लिङ्], the ending @deva[झि] (first person plural @deva[परस्मैपद]) is replaced by @deva[जुस्].
"""

standard = """
In @deva[लिङ्] (optative and benedictive), @deva[झि] (first person plural @deva[परस्मैपद]) is replaced by @deva[जुस्], not by the usual @deva[अन्त] (@ref[7.1.3]). Forms: @deva[पचेयुः], @deva[यजेयुः].
"""

advanced = """
This @[sūtra] substitutes @deva[जुस्] for @deva[झि] (1st plural @deva[परस्मैपद]) in @deva[लिङ्], overriding @ref[7.1.3] (@deva[झ] → @deva[अन्त]). Note the distinction: @deva[झ] (3rd plural) → @deva[रन्] by @ref[3.4.105], while @deva[झि] (1st plural) → @deva[जुस्] by this rule. Forms: @deva[पचेयुः], @deva[यजेयुः]. The @deva[स्] of @deva[जुस्] takes @deva[विसर्ग] in pause.
"""

id = "3.4.78"
numericId = "34078"

[en]
simple = """
The 18 personal endings (@deva[तिङ्]) that replace @deva[ल] are: @deva[तिप्], @deva[तस्], @deva[झि], @deva[सिप्], @deva[थस्], @deva[थ], @deva[मिप्], @deva[वस्], @deva[मस्] (@deva[परस्मैपद]—9 endings); @deva[त], @deva[आताम्], @deva[झ], @deva[थास्], @deva[आथाम्], @deva[ध्वम्], @deva[इट्], @deva[वहि], @deva[महिङ्] (@deva[आत्मनेपद]—9 endings). The indicatory letters (@deva[प्] in @deva[तिप्]/etc., @deva[ट्] in @deva[इट्], @deva[ङ्] in @deva[महिङ्]) serve technical purposes: @deva[प्] for accent (@ref[3.1.4]), @deva[ट्] for distinguishing @deva[इट्] (@ref[3.4.106]), @deva[ङ्] for forming the @deva[प्रत्याहार] @deva[तिङ्]. These affixes undergo changes in different tenses.
"""

standard = """
The 18 @deva[तिङ्]-pratyayas substituting for @deva[ल]: @deva[परस्मैपद]—@deva[तिप्], @deva[तस्], @deva[झि] (3rd); @deva[सिप्], @deva[थस्], @deva[थ] (2nd); @deva[मिप्], @deva[वस्], @deva[मस्] (1st). @deva[आत्मनेपद]—@deva[त], @deva[आताम्], @deva[झ] (3rd); @deva[थास्], @deva[आथाम्], @deva[ध्वम्] (2nd); @deva[इट्], @deva[वहि], @deva[महिङ्] (1st). @deva[इत्]-functions: @deva[प्] in @deva[तिप्]/@deva[सिप्]/@deva[मिप्] for accent (@ref[3.1.4]); @deva[ट्] in @deva[इट्] for @ref[3.4.106]; @deva[ङ्] in @deva[महिङ्] forms @deva[प्रत्याहार] @deva[तिङ्]. See @ref[1.4.8], @ref[3.1.33] for modifications. Only @deva[लट्] applies these directly without alteration in some cases.
"""

advanced = """
The 18 conjugational affixes (@deva[तिङ्]) replace @deva[ल]: @deva[परस्मैपद] 3rd @deva[तिप्]/@deva[तस्]/@deva[झि], 2nd @deva[सिप्]/@deva[थस्]/@deva[थ], 1st @deva[मिप्]/@deva[वस्]/@deva[मस्]; @deva[आत्मनेपद] 3rd @deva[त]/@deva[आताम्]/@deva[झ], 2nd @deva[थास्]/@deva[आथाम्]/@deva[ध्वम्], 1st @deva[इट्]/@deva[वहि]/@deva[महिङ्]. @deva[अनुबन्ध] functions: @deva[प्] (@deva[तिप्]/@deva[सिप्]/@deva[मिप्]) for accent (@ref[3.1.4]); @deva[ट्] (@deva[इट्]) for distinguishing in @ref[3.4.106]; @deva[ङ्] (@deva[महिङ्]) forms @deva[प्रत्याहार] @deva[तिङ्]—the collective designation for all 18 personal endings. Stripped of @deva[इत्]s, the tables in Vasu show actual forms per tense.
"""

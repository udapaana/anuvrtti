id = "3.4.94"
numericId = "34094"

[en]
simple = """
In Vedic texts, @deva[ताम्] and @deva[तम्] can also become @deva[ताम्] and @deva[तम्] (i.e., remain unchanged or undergo specific substitutions) in certain persons.
"""

standard = """
In Vedic usage, the dual and plural forms @deva[ताम्] and @deva[थम्] (which are themselves substitutes for @deva[तस्] and @deva[थस्] in @deva[ङित्] @[lakāras] by @ref[3.4.101]) can be used for various persons. This shows Vedic flexibility in personal ending distribution.
"""

advanced = """
This @[sūtra] addresses Vedic interchange of @deva[ताम्] and @deva[थम्] across persons. The forms @deva[ताम्] (@deva[तस्] substitute) and @deva[थम्] (@deva[थस्] substitute) from @ref[3.4.101] can appear in non-standard person positions in the Vedas. Example: @deva[वर्धताम्] may function for third dual even where standard rules would produce different forms.
"""

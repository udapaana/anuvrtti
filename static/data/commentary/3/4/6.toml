id = "3.4.6"
numericId = "34006"

[en]
simple = """
In Vedic literature (@deva[छन्दस्]), the aorist (@deva[लुङ्]), imperfect (@deva[लङ्]), and perfect (@deva[लिट्]) can optionally be used for any tense. Examples: @deva[देवो देवेभिर् आगमत्] 'O Agni, come with the gods!' - aorist with imperative sense; @deva[इदं तेभ्योऽकरं नमः] 'I make salutation' - aorist with present sense; @deva[अद्य ममार] = @deva[अद्य म्रियते] 'he dies today' - perfect with present sense.
"""

standard = """
In @deva[छन्दस्], @deva[लुङ्], @deva[लङ्], and @deva[लिट्] are optionally used for tenses other than their primary ones. The @deva[धातुसम्बन्ध] and @deva[विकल्प] continue from context. Examples: @deva[देवो देवेभिर् आगमत्] (RV I.1.5) - @deva[लुङ्] for imperative; @deva[इदं तेभ्योऽकरं नमः] (RV X.85.17) - @deva[लुङ्] for present; @deva[अग्निम् अद्य होतारम् अवृणीत अयं यजमानः] - @deva[लङ्] for @deva[लट्]; @deva[अद्य ममार] = @deva[अद्य म्रियते] - @deva[लिट्] for @deva[लट्].
"""

advanced = """
In @deva[छन्दस्], @deva[लुङ्], @deva[लङ्], @deva[लिट्] are @deva[विकल्प] for all tenses via @deva[धातुसम्बन्ध]. By @deva[अन्यतरस्याम्], other @deva[लकार]s may similarly substitute. Vedic examples: @deva[देवो देवेभिर् आगमत्] (RV I.1.5) - @deva[लुङ्] = @deva[लोट्] (imperative); @deva[ये भूतस्य प्रचेतस इदं तेभ्योऽकरं नमः] (RV X.85.17) - @deva[अकरम्] (@deva[लुङ्]) = @deva[करोमि] (@deva[लट्]); @deva[अग्निम् अद्य होतारम् अवृणीत] - @deva[लङ्] = @deva[लट्]; @deva[अद्य ममार] - @deva[लिट्] = @deva[लट्]. This flexibility is Vedic-only.
"""

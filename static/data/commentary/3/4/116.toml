id = "3.4.116"
numericId = "34116"

[en]
simple = """
The @deva[तिङ्] endings of the benedictive @deva[लिङ्] (@deva[आशीर्लिङ्]) are also @deva[आर्धधातुक].
"""

standard = """
When @deva[लिङ्] expresses benediction (@deva[आशिषि]), its @deva[तिङ्] endings are classified as @deva[आर्धधातुक]. This blocks @deva[शप्]-class @[vikaraṇas] and triggers @deva[इट्]. From @deva[लू] → @deva[लविषीष्ट], from @deva[पू] → @deva[पविषीष्ट] (with @deva[इट्]). In contrast, the optative (@deva[विधिलिङ्]) retains @deva[सार्वधातुक] treatment with @[vikaraṇas]: @deva[लुनीयात्], @deva[पुनीयात्].
"""

advanced = """
The @deva[आशीर्लिङ्] (benedictive @deva[लिङ्]) has @deva[आर्धधातुक] @deva[तिङ्] endings, contrasting with @deva[विधिलिङ्] (optative) which remains @deva[सार्वधातुक]. Consequences for @deva[आशीर्लिङ्]: (1) @deva[इट्] augment: @deva[लविषीष्ट], @deva[पविषीष्ट]; (2) no @[vikaraṇas]. For @deva[विधिलिङ्]: @deva[लुनीयात्], @deva[पुनीयात्] (with @deva[श्ना] @[vikaraṇa]). This distinction explains the morphological differences between 'may you cut' (benedictive wish) vs. 'you should cut' (potential/optative).
"""

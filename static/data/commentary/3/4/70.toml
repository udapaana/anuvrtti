id = "3.4.70"
numericId = "34070"

[en]
simple = """
The @deva[कृत्य] affixes (like @deva[तव्य], @deva[अनीयर्], @deva[य]), the @deva[क्त] affix, and affixes with @deva[खल्]-meaning (@ref[3.3.126]) denote only action (@deva[भाव]) and object (@deva[कर्मन्])—not the agent. Examples: @deva[कर्तव्यः] @deva[कटः] 'the mat must be made' (object); @deva[आशितव्यं] @deva[भवता] 'you must eat' (impersonal action); @deva[कृतः] @deva[कटः] 'the mat was made' (object); @deva[आसितं] @deva[भवता] 'you sat' (action); @deva[सुकरः] 'easy to make' (object).
"""

standard = """
@deva[कृत्य]-pratyayas, @deva[क्त], and @deva[खलर्थ]-pratyayas (@ref[3.3.126]) denote @deva[भाव] and @deva[कर्मन्] only—@deva[एव] excludes @deva[कर्तृ]. @deva[कृत्य]: @deva[कर्तव्यः] @deva[कटः] (object); @deva[आशितव्यं] @deva[भवता] (@deva[भाव]—impersonal, neuter singular). @deva[क्त]: @deva[कृतः] @deva[कटः] (object); @deva[आसितं] @deva[भवता] (@deva[भाव]). @deva[खलर्थ]: @deva[ईषत्करः] @deva[कटः] (object); @deva[ईषदाढ्यंभवं] @deva[भवता] (@deva[भाव]). After @deva[सकर्मक] verbs, these affixes denote @deva[कर्मन्] only, never @deva[भाव].
"""

advanced = """
@deva[कृत्य], @deva[क्त], and @deva[खलर्थ] pratyayas (@ref[3.3.126]) are restricted to @deva[तयोः] (@deva[भाव] and @deva[कर्मन्])—@deva[एव] excludes @deva[कर्तृ]. @deva[कृत्य] examples: @deva[कर्तव्यः] @deva[कटो] @deva[भवता] (@deva[कर्मन्]); @deva[आशितव्यं] @deva[भवता] (@deva[भाव]—neuter singular, genderless action). @deva[क्त]: @deva[कृतः] @deva[कटो] @deva[भवता] (@deva[कर्मन्]); @deva[आसितं] @deva[भवता] (@deva[भाव]). @deva[खलर्थ]: @deva[ईषत्करः]/@deva[सुकरः]/@deva[दुष्करः] @deva[कटः] (@deva[कर्मन्]); @deva[ईषदाढ्यंभवं] @deva[भवता] (@deva[भाव]). With @deva[सकर्मक] @deva[धातु]s, these denote @deva[कर्मन्] exclusively, never @deva[भाव] (impersonal usage blocked).
"""

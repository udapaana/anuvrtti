id = "3.4.36"
numericId = "34036"

[en]
simple = """
@deva[णमुल्] is added to three root-@deva[उपपद] pairs: (1) @deva[समूल] + @deva[हन्] → @deva[समूलघातं हन्ति] 'destroys utterly, uprooting'; (2) @deva[अकृत] + @deva[कृ] → @deva[अकृतकारं करोति] 'does what was not done before'; (3) @deva[जीव] + @deva[ग्रह्] → @deva[जीवग्राहं गृह्णाति] 'captures alive'. Same-root verbs required.
"""

standard = """
@deva[णमुल्] after specific root-@deva[उपपद] combinations: (1) @deva[समूल] + @deva[हन्]: @deva[समूलघातं हन्ति] (@ref[8.3.32], @ref[8.3.54]) 'destroys root and all'; (2) @deva[अकृत] + @deva[कृ]: @deva[अकृतकारं करोति] 'does the unprecedented'; (3) @deva[जीव] + @deva[ग्रह्]: @deva[जीवग्राहं गृह्णाति] 'captures alive'. Each requires cognate @deva[अनुप्रयोग].
"""

advanced = """
@deva[णमुल्] with three @deva[उपपद]-@deva[धातु] pairs: @deva[समूल] + @deva[हन्] → @deva[समूलघातं हन्ति] (total annihilation; @ref[8.3.32], @ref[8.3.54] for @deva[घात्]); @deva[अकृत] + @deva[कृ] → @deva[अकृतकारं करोति] (doing the undone); @deva[जीव] + @deva[ग्रह्] → @deva[जीवग्राहं गृह्णाति] (capturing alive, preserving life). @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

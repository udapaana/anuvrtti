id = "3.4.102"
numericId = "34102"

[en]
simple = """
In @deva[लिङ्] (optative and benedictive), all @deva[तिङ्] endings receive the augment @deva[सीयुट्] added before them.
"""

standard = """
The @deva[तिङ्] endings of @deva[लिङ्] (both optative and benedictive) take the augment @deva[सीयुट्]. The @deva[ट्] indicates the augment is prefixed to the ending (@ref[1.1.46]). In the optative, @deva[स्] is elided by @ref[7.2.79] and @deva[य्] by @ref[6.1.66] before consonant-initial endings, yielding forms like @deva[पचेत्], @deva[पचेरन्]. In the benedictive, the augment appears more fully: @deva[पक्षीष्ट].
"""

advanced = """
This @[sūtra] teaches that all @deva[तिङ्] replacements of @deva[लिङ्] receive @deva[सीयुट्] as an @[āgama]. The @deva[ट्] is an @deva[इत्] marking placement before the pratyaya (@ref[1.1.46]); @deva[उ] is for pronunciation. For @deva[विधिलिङ्] (optative): @deva[स्] deletes by @ref[7.2.79]; @deva[य्] deletes before consonant by @ref[6.1.66]; result: @deva[पचेत्], @deva[पचेयाताम्], @deva[पचेरन्] (@ref[3.4.105]). For @deva[आशीर्लिङ्] (benedictive): @deva[पक्षीष्ट], @deva[पक्षीयास्ताम्], @deva[पक्षीरन्].
"""

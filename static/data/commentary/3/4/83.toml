id = "3.4.83"
numericId = "34083"

[en]
simple = """
The nine @deva[लिट्] affixes (from @ref[3.4.82]) may optionally be used in @deva[लट्] (present tense) after @deva[विद्] 'to know'. So alongside regular present forms, we get @deva[लिट्]-style forms: 3rd—@deva[वेद]/@deva[वेत्ति], @deva[विदतुः]/@deva[वित्तः], @deva[विदुः]/@deva[विदन्ति]; 2nd—@deva[वेत्थ]/@deva[वेत्सि], @deva[विदथुः]/@deva[वित्थः], @deva[विद]/@deva[वित्थ]; 1st—@deva[वेद]/@deva[वेद्मि], @deva[विद्व]/@deva[विद्वः], @deva[विद्म]/@deva[विद्मः].
"""

standard = """
The nine @deva[लिट्] @deva[परस्मैपद] substitutes (@ref[3.4.82]) optionally apply in @deva[लट्] after @deva[विद्] (2P, 'to know'). Dual paradigms: @deva[वेद] or @deva[वेत्ति]/@deva[विदतुः] or @deva[वित्तः]/@deva[विदुः] or @deva[विदन्ति] (3rd); @deva[वेत्थ] or @deva[वेत्सि]/@deva[विदथुः] or @deva[वित्थः]/@deva[विद] or @deva[वित्थ] (2nd); @deva[वेद] or @deva[वेद्मि]/@deva[विद्व] or @deva[विद्वः]/@deva[विद्म] or @deva[विद्मः] (1st).
"""

advanced = """
@deva[लिट्] @deva[परस्मैपद] affixes (@ref[3.4.82]) are @deva[विकल्प] in @deva[लट्] after @deva[विद्] (2P, 'know'). Resulting optionality: 3rd @deva[वेद]/@deva[वेत्ति], @deva[विदतुः]/@deva[वित्तः], @deva[विदुः]/@deva[विदन्ति]; 2nd @deva[वेत्थ]/@deva[वेत्सि], @deva[विदथुः]/@deva[वित्थः], @deva[विद]/@deva[वित्थ]; 1st @deva[वेद]/@deva[वेद्मि], @deva[विद्व]/@deva[विद्वः], @deva[विद्म]/@deva[विद्मः].
"""

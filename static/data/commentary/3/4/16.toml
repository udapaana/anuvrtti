id = "3.4.16"
numericId = "34016"

[en]
simple = """
In Vedic, the affix @deva[तोसुन्] forms infinitives after eight roots when expressing mere action-name (@deva[भावलक्षण]): @deva[स्था], @deva[इ], @deva[कृ], @deva[वद्], @deva[चर्], @deva[हु], @deva[तम्], @deva[जन्]. Examples: @deva[आ संस्थातोः वेद्यां सीदन्ति] 'they sit on the altar until the conclusion'; @deva[पुरा सूर्यस्य उदेतोः] 'before the rising of the sun'; @deva[आ होतोः] 'until the sacrifice'.
"""

standard = """
In @deva[छन्दस्], @deva[तोसुन्] forms @deva[भावलक्षण] infinitives (denoting mere action) after @deva[स्था], @deva[इण्], @deva[कृञ्], @deva[वद्], @deva[चर्], @deva[हु], @deva[तम्], @deva[जन्]. Unlike @ref[3.4.14], @deva[कृत्यार्थ] does not apply. Examples: @deva[आ संस्थातोः वेद्यां सीदन्ति] = @deva[आसमाप्तेः]; @deva[पुरा सूर्यस्योदेतोः आधेयः]; @deva[पुरा वत्सानाम् अपाकर्तोः]; @deva[पुरा प्रवदितोः अग्नौ प्रहोतव्यम्] (Gopatha Br. II.2.10); @deva[आ होतोः अप्रमत्तस् तिष्ठति]; @deva[आ तमितोः आसोत] (Taitt. Br. I.4.4.2); @deva[आ विजनितोः सम्भवाम] (Taitt. S. II.5.1.5).
"""

advanced = """
@deva[तोसुन्] in @deva[छन्दस्] after @deva[स्था], @deva[इण्], @deva[कृञ्], @deva[वद्], @deva[चर्], @deva[हु], @deva[तम्], @deva[जन्] with @deva[भावलक्षण] sense (action-name, not @deva[कृत्यार्थ]). @deva[भावलक्षण] = @deva[भावो लक्ष्यते येन]. Examples: @deva[स्था] → @deva[आ संस्थातोः वेद्यां सीदन्ति]; @deva[इण्] → @deva[पुरा सूर्यस्योदेतोः आधेयः]; @deva[कृञ्] → @deva[पुरा वत्सानाम् अपाकर्तोः]; @deva[वद्] → @deva[पुरा प्रवदितोः अग्नौ प्रहोतव्यम्]; @deva[चर्] → @deva[पुरा प्रचरितोः आग्नीध्रीये होतव्याः] (Gopatha Br. II.2.10); @deva[हु] → @deva[आ होतोः अप्रमत्तस् तिष्ठति]; @deva[तम्] → @deva[आ तमितोः आसोत] (Taitt. Br. I.4.4.2); @deva[जन्] → @deva[आ विजनितोः सम्भवाम] (Taitt. S. II.5.1.5).
"""

id = "3.4.30"
numericId = "34030"

[en]
simple = """
@deva[णमुल्] is added to @deva[विद्] (to know/obtain) and @deva[जीव्] (to live) when @deva[यावत्] is in composition. Examples: @deva[यावद्वेदं भुङ्क्ते] 'he eats all that he gets/knows' (as much as obtained); @deva[यावज्जीवम् अधीते] 'he studies throughout his life' (as long as he lives).
"""

standard = """
@deva[णमुल्] after @deva[विद्] and @deva[जीव्] with @deva[यावत्] in composition. Examples: @deva[यावद्वेदं भुङ्क्ते] 'he eats as much as he gets/knows'; @deva[यावज्जीवम् अधीते] 'he studies lifelong' (= throughout his life). The @deva[यावत्] expresses extent - either quantity (@deva[विद्]) or duration (@deva[जीव्]).
"""

advanced = """
@deva[णमुल्] after @deva[विद्] and @deva[जीव्] with @deva[यावत्] in composition. @deva[यावद्वेदं भुङ्क्ते] - @deva[यावत्] quantifies what is known/obtained; @deva[यावज्जीवम् अधीते] - @deva[यावत्] indicates duration (lifelong). Both express extent: @deva[परिमाण] (measure) with @deva[विद्], @deva[काल] (time) with @deva[जीव्].
"""

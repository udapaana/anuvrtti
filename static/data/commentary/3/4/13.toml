id = "3.4.13"
numericId = "34013"

[en]
simple = """
In Vedic, when @deva[ईश्वर] 'able, capable' is in composition, infinitives are formed with @deva[तोसुन्] or @deva[कसुन्]. Examples: @deva[ईश्वरोऽभिचरितोः] = @deva[अभिचरितुम्] 'able to practice sorcery'; @deva[ईश्वरो विलिखः] = @deva[विलिखितुम्] 'able to scratch'; @deva[ईश्वरो वितृदः] = @deva[वितर्दितुम्] 'able to pierce'.
"""

standard = """
In @deva[छन्दस्] with @deva[ईश्वर] in composition, infinitives take @deva[तोसुन्] or @deva[कसुन्]. The @deva[क्] in @deva[कसुन्] blocks @deva[गुण]/​@deva[वृद्धि]. Examples: @deva[ईश्वरोऽभिचरितोः] = @deva[अभिचरितुम्] (capable of sorcery); @deva[ईश्वरो विलिखः] = @deva[विलिखितुम्] (capable of scratching); @deva[ईश्वरो वितृदः] = @deva[वितर्दितुम्] (capable of piercing).
"""

advanced = """
With @deva[ईश्वर] in @deva[समास], @deva[छन्दस्] uses @deva[तोसुन्] or @deva[कसुन्] for @deva[तुमर्थ]. @deva[कसुन्]: @deva[क्] is @deva[इत्], blocking @deva[गुण]/​@deva[वृद्धि]. Formations: @deva[ईश्वरोऽभिचरितोः] = @deva[अभिचरितुम्]; @deva[ईश्वरो विलिखः] = @deva[विलिखितुम्]; @deva[ईश्वरो वितृदः] = @deva[वितर्दितुम्]. These express capability with infinitive sense.
"""

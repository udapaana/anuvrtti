id = "3.4.48"
numericId = "34048"

[en]
simple = """
The affix @deva[णमुल्] comes after roots meaning @deva[हिंस्] 'to strike/injure' when (1) the object of the gerund is the same as the object of the main verb, and (2) an instrumental-case word is compounded. Example: @deva[दण्डोपघातम्] @deva[गाः] @deva[कालयति] 'he gathers cows, beating them with a club'. Compounding is optional (@ref[2.2.21]): @deva[दण्डेनोपघातम्]. If the objects differ, @deva[णमुल्] doesn't apply: @deva[चोरम्] @deva[दण्डेनोपहत्य], @deva[गोपालको] @deva[गाः] @deva[कालयति] 'having beaten the thief, the cowherd gathers the cows'.
"""

standard = """
Roots with @deva[हिंस्]-meaning take @deva[णमुल्] when: (1) the gerund's @deva[कर्मन्] equals the main verb's @deva[कर्मन्], and (2) an instrumental-ending noun is compounded. @deva[दण्डोपघातम्] @deva[गाः] @deva[कालयति] 'he gathers cows by beating them with a stick'—both verbs share @deva[गाः] as object. Optional compounding (@ref[2.2.21]) yields @deva[दण्डेनोपघातम्]. Similarly @deva[दण्डताडम्] or @deva[दण्डेन] @deva[ताडम्]. When objects differ—@deva[चोरम्] @deva[दण्डेनोपहत्य], @deva[गाः] @deva[कालयति]—regular @deva[क्त्वा]/@deva[ल्यप्] applies instead.
"""

advanced = """
@deva[हिंसार्थ] roots take @deva[णमुल्] under two conditions: @deva[कर्मसामान्य] (shared object between gerund and @deva[अनुप्रयोग]) and instrumental @deva[उपपद]. @deva[दण्डोपघातम्] @deva[गाः] @deva[कालयति]—@deva[गाः] is @deva[कर्मन्] of both @deva[उपघात्] (beating) and @deva[कालय्] (gathering). @ref[2.2.21] makes compounding optional. The @deva[कर्मसामान्य] condition excludes cases like @deva[चोरम्] @deva[दण्डेनोपहत्य], @deva[गोपालको] @deva[गाः] @deva[कालयति] where @deva[चोर] and @deva[गो] are distinct objects.
"""

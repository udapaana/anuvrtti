id = "3.4.15"
numericId = "34015"

[en]
simple = """
The Vedic word @deva[अवचक्षे] is an irregular gerundive. In @deva[रिपुणा नावचक्षे] (RV IV.58.5) = @deva[नावख्यातव्यम्] 'not to be told to an enemy'. It's formed as @deva[अव] + @deva[चक्ष्] + @deva[एश्] = @deva[अवचक्षे]. Rule @ref[2.4.54] does not apply here.
"""

standard = """
@deva[निपातन] for @deva[अवचक्षे] as Vedic @deva[कृत्य] (gerundive). @deva[रिपुणा नावचक्षे] (RV IV.58.5) = @deva[नावख्यातव्यम्] 'not to be declared to an enemy'. Derivation: @deva[अव] + @deva[चक्ष्] + @deva[एश्] = @deva[अवचक्षे]. The rule @ref[2.4.54] (which would apply to @deva[चक्ष्]) is suspended here.
"""

advanced = """
@deva[निपातन]: @deva[अवचक्षे] as @deva[कृत्यार्थ] in @deva[छन्दस्]. @deva[रिपुणा नावचक्षे] (RV IV.58.5) = @deva[न] + @deva[आख्यातव्यम्] 'not to be revealed to an enemy'. Formation: @deva[अव] + @deva[चक्ष्] + @deva[एश्] = @deva[अवचक्षे]. The expected application of @ref[2.4.54] is blocked (@deva[अनित्य]) for this Vedic form.
"""

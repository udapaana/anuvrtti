id = "3.4.105"
numericId = "34105"

[en]
simple = """
In @deva[लिङ्], the ending @deva[झ] (third person plural @deva[परस्मैपद]) is replaced by @deva[रन्].
"""

standard = """
In @deva[लिङ्] (both optative and benedictive), @deva[झ] (third person plural @deva[परस्मैपद]) is replaced by @deva[रन्], not by the usual @deva[अन्त] (@ref[7.1.3]). Forms: @deva[पचेरन्] (optative 'they may cook'), @deva[यजेरन्], @deva[कृषीरन्].
"""

advanced = """
This @[sūtra] provides @deva[रन्] as the substitute for @deva[झ] (3rd plural @deva[परस्मैपद]) specifically in @deva[लिङ्], overriding the general @deva[झ] → @deva[अन्त] of @ref[7.1.3]. The @deva[र्] appears after the @deva[सीयुट्]/@deva[यासुट्] augments. Forms: @deva[विधिलिङ्] @deva[पचेरन्], @deva[यजेरन्], @deva[कृषीरन्]; @deva[आशीर्लिङ्] @deva[पक्षीरन्]. This @deva[रन्] substitute is unique to @deva[लिङ्].
"""

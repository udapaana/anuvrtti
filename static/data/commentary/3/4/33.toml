id = "3.4.33"
numericId = "34033"

[en]
simple = """
@deva[णमुल्] is added to the causative @deva[क्नोपि] (from @deva[क्नूय्] 'to wet') when a word meaning 'clothing' is in composition and the sense is rainfall measure. Examples: @deva[चेलक्नोपं वृष्टो देवः] 'it rained enough to wet clothes'; similarly @deva[वस्त्रक्नोपम्], @deva[वसनक्नोपम्].
"""

standard = """
@deva[णमुल्] after @deva[क्नोपि] (causative of @deva[क्नूय्] 'to wet') with @deva[वस्त्रवाचिन्] (clothing-denoting) @deva[द्वितीया उपपद] in @deva[वृष्टिमाण] sense. @deva[क्नूय्] + @deva[णिच्] = @deva[क्नोपि] (causative stem). Examples: @deva[चेलक्नोपं वृष्टो देवः] 'rained wetting clothes'; @deva[वस्त्रक्नोपम्], @deva[वसनक्नोपम्] similarly.
"""

advanced = """
@deva[णमुल्] after @deva[क्नोपि] (@deva[क्नूय्] + @deva[णिच्]) with @deva[वस्त्रवाचिन्] @deva[द्वितीयान्त उपपद] in @deva[वृष्टिमाण] context. @deva[चेलक्नोपं वृष्टो देवः] 'it rained [enough] to wet garments'. The causative @deva[क्नोपि] (from @deva[क्नूय्] 'to moisten') takes @deva[णमुल्] to express the extent of rainfall via clothing-dampening.
"""

id = "3.4.53"
numericId = "34053"

[en]
simple = """
The affix @deva[णमुल्] is added when an accusative-case (second case) word is compounded and haste (@deva[परीप्सा]) is expressed. Example: @deva[यष्टिग्राहम्] @deva[युध्यन्ते] 'they fight, having hastily grabbed sticks'—so rushed that they grab whatever is at hand (sticks, stones) rather than proper weapons. Alternatively: @deva[यष्टिं] @deva[ग्राहम्] (uncompounded). Similarly @deva[लोष्ट्रग्राहम्] or @deva[लोष्ट्रं] @deva[ग्राहम्] 'grabbing clods'.
"""

standard = """
@deva[णमुल्] applies with @[dvitīyā] @deva[उपपद] when @deva[परीप्सा] (haste) is intended. @deva[यष्टिग्राहम्] @deva[युध्यन्ते] 'they fight, hastily seizing sticks'—too rushed to take proper weapons, grabbing whatever is at hand. Optionally uncompounded: @deva[यष्टिं] @deva[ग्राहम्]. Similarly @deva[लोष्ट्रग्राहम्] or @deva[लोष्ट्रं] @deva[ग्राहम्] 'seizing clods in haste'.
"""

advanced = """
@[dvitīyā] @deva[उपपद] with @deva[परीप्सा] triggers @deva[णमुल्]. @deva[यष्टिग्राहम्] (or @deva[यष्टिं] @deva[ग्राहम्]) @deva[युध्यन्ते] 'fight having hastily grabbed sticks'—no time for proper weapons. @deva[लोष्ट्रग्राहम्] or @deva[लोष्ट्रं] @deva[ग्राहम्] 'grabbing clods'. The @deva[परीप्सा] condition distinguishes this from @ref[3.4.50] (@deva[समासत्ति]).
"""

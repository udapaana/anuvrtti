id = "3.4.96"
numericId = "34096"

[en]
simple = """
In @deva[लोट्], the @deva[आत्मनेपद] endings replace their corresponding @deva[परस्मैपद] endings when preceded by the word @deva[मा] (prohibition marker).
"""

standard = """
When the prohibitive particle @deva[मा] precedes the verb, the @deva[आत्मनेपद] endings of @deva[लोट्] are used in place of the corresponding @deva[परस्मैपद] endings. Thus @deva[मा] @deva[भूथाः] 'do not be' uses @deva[आत्मनेपद] @deva[थास्] instead of @deva[परस्मैपद].
"""

advanced = """
This @[sūtra] mandates @deva[आत्मनेपद] substitution in prohibitive constructions with @deva[मा]. After @deva[मा], even verbs that ordinarily take @deva[परस्मैपद] use @deva[आत्मनेपद] endings. The technical term is @deva[माङि] @deva[लुङ्लोटोः]—but here specifically for @deva[लोट्]. Forms: @deva[मा] @deva[भूथाः], @deva[मा] @deva[कार्षीष्ठाः]. This parallels @ref[3.3.175] and @ref[3.3.176] for @deva[लुङ्].
"""

id = "3.4.114"
numericId = "34114"

[en]
simple = """
All other verbal affixes—those that are neither @deva[तिङ्] nor marked with @deva[श्]—are called @deva[आर्धधातुक].
"""

standard = """
Verbal affixes that are not @deva[तिङ्] and lack indicatory @deva[श्] are called @deva[आर्धधातुक] ('pertaining to half the verb'). These include @deva[तृ], @deva[तुम्], @deva[तव्य], etc. @deva[आर्धधातुक] affixes trigger @deva[इट्] augment by @ref[7.2.35]. Examples: @deva[लविता], @deva[लवितुम्], @deva[लवितव्यम्]. The @deva[धातोः] from @ref[3.1.91] continues—only affixes applied to verbal roots receive these designations; nominal affixes like @deva[भ्याम्] after @deva[लू] don't.
"""

advanced = """
The @deva[आर्धधातुक] designation applies to verbal affixes that are neither @deva[तिङ्] nor @deva[शित्]—the residue after @ref[3.4.113]. These include @[kṛt] affixes like @deva[तृच्], @deva[तुमुन्], @deva[तव्यत्], @deva[क्त], @deva[क्त्वा]. They trigger @deva[इट्] (@ref[7.2.35]), @[guṇa] (@ref[7.3.84]), and don't take @deva[शप्]-class @[vikaraṇas]. The @deva[धातोः] @[anuvṛtti] (@ref[3.1.91]) restricts this: case endings like @deva[भ्याम्] after @deva[लू] aren't @deva[आर्धधातुक] (hence @deva[लूभ्याम्], @deva[लूभिः] without @[guṇa]). Similarly @deva[सन्] after @deva[गुप्], @deva[तिज्], @deva[कित्] (@ref[3.1.5]) without @deva[धातोः] @[anuvṛtti] isn't @deva[आर्धधातुक]: @deva[जुगुप्सते] (no @deva[इट्]).
"""

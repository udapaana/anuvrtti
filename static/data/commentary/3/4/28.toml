id = "3.4.28"
numericId = "34028"

[en]
simple = """
@deva[णमुल्] is added to @deva[कृ] when @deva[यथा] or @deva[तथा] is in composition and an angry reply is intended (if @deva[कृ] could be omitted). Example: @deva[तथाकारं भोक्ष्ये, किं तवानेन] 'I'll eat that way - what's it to you?' Similarly @deva[यथाकारं भोक्ष्ये]. Without anger: @deva[यथा कृत्वाऽहं भोक्ष्ये तथा त्वं द्रक्ष्यसि] 'in what way I'll eat, that you'll see'. When @deva[कृ] is essential: @deva[यथा कृत्वाऽहं शिरो भोक्ष्ये] 'in what way turning my head...'
"""

standard = """
@deva[णमुल्] after @deva[कृ] with @deva[यथा]/​@deva[तथा] in @deva[प्रतिकूलप्रतिवचन] (angry reply) context, when @deva[कृञः अप्रयोगः] is valid. Examples: @deva[तथाकारं भोक्ष्ये, किं तवानेन] 'I'll eat that way - what's it to you?'; @deva[यथाकारं भोक्ष्ये, किं तवानेन]. Without anger (neutral statement): @deva[यथा कृत्वाऽहं भोक्ष्ये तथा त्वं द्रक्ष्यसि] 'in what way I'll eat, that you'll see' - @deva[क्त्वा] used. When @deva[कृ] is essential: @deva[यथा कृत्वा शिरो भोक्ष्ये, किं तवानेन] - @deva[क्त्वा] even with anger.
"""

advanced = """
@deva[णमुल्] after @deva[कृ] with @deva[यथा]/​@deva[तथा] when @deva[प्रतिकूलप्रतिवचन] (indignant/angry reply) and @deva[कृञः अप्रयोग उपपद्यते]. @deva[तथाकारं भोक्ष्ये, किं तवानेन]; @deva[यथाकारं भोक्ष्ये, किं तवानेन]. Without @deva[प्रतिकूलता]: @deva[यथा कृत्वाऽहं भोक्ष्ये तथा त्वं द्रक्ष्यसि] - neutral statement, @deva[क्त्वा] applies. When @deva[कृ] is indispensable: @deva[यथा कृत्वा शिरो भोक्ष्ये किं तवानेन] - @deva[क्त्वा] even in angry context because @deva[कृ] contributes essential meaning.
"""

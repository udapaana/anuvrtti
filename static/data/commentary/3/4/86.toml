id = "3.4.86"
numericId = "34086"

[en]
simple = """
In @deva[लोट्] (imperative), @deva[इ] is replaced by @deva[उ]. So @deva[ति] → @deva[तु], @deva[अन्ति] → @deva[अन्तु]. This rule applies only to @deva[ति] and @deva[झि], not to @deva[हि] or @deva[नि] (which have special rules), and not to @deva[सि] (which becomes @deva[हि] by the next rule). Examples: @deva[पचतु], @deva[पचन्तु].
"""

standard = """
In @deva[लोट्], @deva[इ] → @deva[उ]: @deva[ति] → @deva[तु], @deva[अन्ति] → @deva[अन्तु]. A @deva[वार्तिक] prohibits this for @deva[हि] and @deva[नि]—either because they're taught separately or because @deva[वा] (@ref[3.4.83]) makes this @deva[व्यवस्थितविभाषा]. This @[sūtra] applies to @deva[ति]/@deva[झि] only; @deva[सि] takes @deva[हि] by @ref[3.4.87]. Examples: @deva[पचतु], @deva[पचन्तु].
"""

advanced = """
@deva[लोट्]: @deva[इ] → @deva[उ] for @deva[ति]/@deva[झि] only. @deva[ति] → @deva[तु]; @deva[झि] (→ @deva[अन्ति]) → @deva[अन्तु]. @deva[वार्तिक]: @deva[हि]/@deva[नि] exempt—either explicitly taught or via @deva[व्यवस्थितविभाषा] (@deva[वा] of @ref[3.4.83]). @deva[सि] → @deva[हि] by @ref[3.4.87], not this rule. @deva[पचतु], @deva[पचन्तु].
"""

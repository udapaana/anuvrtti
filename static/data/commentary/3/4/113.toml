id = "3.4.113"
numericId = "34113"

[en]
simple = """
All the @deva[तिङ्] personal endings and all affixes marked with @deva[श्] are called @deva[सार्वधातुक].
"""

standard = """
Two categories of affixes are designated @deva[सार्वधातुक] ('pertaining to the whole verb'): (1) all 18 @deva[तिङ्] endings enumerated in @ref[3.4.78], and (2) any affix with indicatory @deva[श्]. This designation affects various operations including @[vikaraṇa] application and vowel changes. Examples: @deva[स्वपिति], @deva[रोदिति], @deva[पचमानः]. Exceptions: @deva[लिट्] and @deva[आशीर्लिङ्] are treated separately.
"""

advanced = """
This @[sūtra] defines @deva[सार्वधातुक] to include: (1) @deva[तिङ्] (@deva[तिप्]-through-@deva[महिङ्], @ref[3.4.78]), and (2) @deva[शित्] affixes (those with indicatory @deva[श्]). The term applies to verbal affixes only (@[anuvṛtti] of @deva[धातोः] from @ref[3.1.91]). @deva[सार्वधातुक] affixes trigger @deva[शप्]-class @[vikaraṇas] and block @deva[इट्] augment. Examples: @deva[पचति] (@deva[तिङ्] = @deva[सार्वधातुक]), @deva[पचमानः] (@deva[शानच्] is @deva[शित्] = @deva[सार्वधातुक]). Contrast @deva[लिट्] and @deva[आशीर्लिङ्] treated by @ref[3.4.115]-@ref[3.4.116].
"""

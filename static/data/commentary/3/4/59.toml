id = "3.4.59"
numericId = "34059"

[en]
simple = """
Both @deva[क्त्वा] and @deva[णमुल्] come after @deva[कृ] 'to make' when an indeclinable word (@deva[अव्यय]) is compounded and the meaning involves communicating something inappropriately (@deva[अयथाभिप्रेताख्यान])—like announcing bad news loudly or good news softly. Examples: @deva[नीचैःकृत्य], @deva[नीचैःकृत्वा], or @deva[नीचैःकारम्] @deva[आचक्षे] 'he tells in a low voice (when he shouldn't)'. Similarly @deva[उच्चैःकृत्वा]/@deva[उच्चैःकृत्य]/@deva[उच्चैःकारम्] for loud announcement. Optional compounding by @ref[2.2.22].
"""

standard = """
Both @deva[क्त्वा] and @deva[णमुल्] apply after @deva[कृ] with @deva[अव्यय] @deva[उपपद] when @deva[अयथाभिप्रेताख्यान] (communication in an inappropriate manner) is meant—announcing bad news loudly, good news softly, etc. @deva[नीचैःकृत्य]/@deva[नीचैःकृत्वा]/@deva[नीचैःकारम्] @deva[आचक्षे] 'he tells in low voice (inappropriately)'. Similarly @deva[उच्चैःकृत्वा]/@deva[उच्चैःकृत्य]/@deva[उच्चैःकारम्]. @ref[2.2.22] governs compounding. The repetition of @deva[क्त्वा] (available via @ref[3.1.94]) is for enabling @deva[समास]; @deva[णमुल्] repetition extends @deva[अनुवृत्ति] to subsequent @[sūtras].
"""

advanced = """
@deva[क्त्वा] and @deva[णमुल्] both apply after @deva[कृ] with @deva[अव्यय] @deva[उपपद] under @deva[अयथाभिप्रेताख्यान] (inappropriate mode of communication). @deva[नीचैःकृत्य]/@deva[नीचैःकृत्वा]/@deva[नीचैःकारम्] @deva[आचक्षे]; @deva[उच्चैः]- forms parallel. @ref[2.2.22] for @deva[समास]. Q: Why repeat @deva[क्त्वा] when @ref[3.1.94] (@deva[वाऽसरूप]) supplies it? A: For enabling @deva[समास]. Q: Why repeat @deva[णमुल्]? A: To run @deva[अनुवृत्ति] of both @deva[क्त्वा] and @deva[णमुल्] into subsequent @[sūtras]. Without @deva[अयथाभिप्रेताख्यान]: @deva[उच्चैःकृत्वाऽऽचक्षे] @deva[पुत्रस्ते] @deva[जातः] (only @deva[क्त्वा]).
"""

id = "3.4.25"
numericId = "34025"

[en]
simple = """
The affix @deva[खमुञ्] is added to @deva[कृ] (to make) when an accusative word is in composition and the sense is abuse/reproach. The real affix is @deva[अम्]; @deva[ख्] triggers the augment @deva[मुम्] (@ref[6.3.67]). Example: @deva[चोरं कारम् आक्रोशति] 'he reviles him as a thief' - calling someone a thief in anger, not actually making him one.
"""

standard = """
@deva[खमुञ्] after @deva[कृ] with accusative in composition when expressing @deva[आक्रोश] (abuse/reproach). The affix is @deva[अम्]; @deva[ख्] is @deva[इत्], triggering @deva[मुम्] augment by @ref[6.3.67]. Example: @deva[चोरं कारम् आक्रोशति] 'he abuses him calling [him] a thief' - the person isn't actually made a thief; expressing indignation by @deva[चोरं करोति].
"""

advanced = """
@deva[खमुञ्] after @deva[कृ] with @deva[द्वितीया] @deva[उपपद] in @deva[आक्रोश] (reproach) sense. The effective portion is @deva[अम्]; @deva[ख्] (@deva[इत्]) triggers @deva[मुम्] (@ref[6.3.67]). @deva[चोरं कारम् आक्रोशति] 'he reviles [him] as a thief' - figurative 'making' to express indignation, not actual transformation. The @deva[आक्रोश] semantics are essential; without it, regular @deva[कृ] usage applies.
"""

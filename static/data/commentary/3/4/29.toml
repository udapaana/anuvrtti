id = "3.4.29"
numericId = "34029"

[en]
simple = """
@deva[णमुल्] is added to @deva[दृश्] (to see) or @deva[विद्] (to know) when an object is in composition and the sense is the totality of such objects. Examples: @deva[कन्यादर्शं वरयति] 'he woos every girl he sees' (all the girls seen); @deva[ब्राह्मणवेदं भोजयति] 'he feeds every Brahmin he knows' (all the Brahmins known). Without totality sense: @deva[ब्राह्मणं दृष्ट्वा भोजयति] 'having seen the Brahmin, he feeds him'.
"""

standard = """
@deva[णमुल्] after @deva[दृश्] or @deva[विद्] with @deva[कर्म] (object) in composition when @deva[पर्याप्ति] (totality/completeness) is intended. Examples: @deva[कन्यादर्शं वरयति] 'he woos every girl seen' (= all girls seen); @deva[ब्राह्मणवेदं भोजयति] 'he feeds every Brahmin known' (= all Brahmins he knows). Without @deva[पर्याप्ति]: @deva[ब्राह्मणं दृष्ट्वा भोजयति] 'having seen a/the Brahmin, he feeds [him]' - @deva[क्त्वा] applies normally.
"""

advanced = """
@deva[णमुल्] after @deva[दृश्]/​@deva[विद्] with @deva[कर्म] @deva[उपपद] in @deva[पर्याप्ति] (totality) sense. @deva[कन्यादर्शं वरयति] = @deva[यावत्यः कन्या दृष्टास् तावत्यो वरयति] (all girls seen); @deva[ब्राह्मणवेदं भोजयति] = @deva[यावन्तो ब्राह्मणा विदितास् तावतो भोजयति] (all Brahmins known). Without @deva[पर्याप्ति]: @deva[ब्राह्मणं दृष्ट्वा भोजयति] - simple prior-action gerund.
"""

id = "3.4.75"
numericId = "34075"

[en]
simple = """
Words formed by @deva[उणादि] affixes denote meanings other than @deva[सम्प्रदान] (recipient) and @deva[अपादान] (source). Since @deva[उणादि] affixes are a type of @deva[कृत्], they would normally denote agent (@ref[3.4.67]). This rule extends their meaning to include object (@deva[कर्मन्]), instrument (@deva[करण]), and location (@deva[अधिकरण]). Examples: @deva[कृषि] 'agriculture' (what is ploughed—object); @deva[तन्तु] 'thread' (what is stretched—object); @deva[वर्त्म] 'path' (where one goes—location); @deva[चर्म] 'skin' (where one lives—location).
"""

standard = """
@deva[उणादि] pratyayas (being @deva[कृत्]) would denote @deva[कर्तृ] by @ref[3.4.67]. This @[sūtra] specifies they denote @deva[कारक]s other than @deva[सम्प्रदान] and @deva[अपादान]—i.e., @deva[कर्मन्], @deva[करण], @deva[अधिकरण] (besides @deva[कर्तृ]). @deva[ताभ्याम्] 'other than those two' includes @deva[सम्प्रदान] by implication (had it been @deva[अन्यत्रोणादयः], only nearest @deva[अपादान] would be excluded). Examples: @deva[कृषि] (@[uṇ]. IV.120) = object; @deva[तन्तु] (@[uṇ]. I.69) = object; @deva[वर्त्म] (@[uṇ]. IV.145) = location; @deva[चर्म] (@[uṇ]. IV.145) = location.
"""

advanced = """
@deva[उणादि] pratyayas, being @deva[कृत्]-subdivision, would take @deva[कर्तृ]-sense (@ref[3.4.67]). This @[sūtra] permits @deva[कर्मन्], @deva[करण], @deva[अधिकरण]—everything except @deva[सम्प्रदान]/@deva[अपादान]. The dual @deva[ताभ्याम्] (not singular @deva[अन्यत्र]) ensures both @deva[सम्प्रदान] and @deva[अपादान] are excluded (singular would exclude only nearest @deva[अपादान]). Examples: @deva[कृषि] (@[uṇ]. IV.120) = @deva[कृषितोऽसौ] (@deva[कर्मन्]); @deva[तन्तु] (@[uṇ]. I.69) = @deva[तन्यते] @deva[इति] (@deva[कर्मन्]); @deva[वर्त्म] (@[uṇ]. IV.145) = @deva[वृत्तम्] (@deva[अधिकरण]); @deva[चर्म] (@[uṇ]. IV.145) = @deva[चरितम्] (@deva[अधिकरण]—'in which they live').
"""

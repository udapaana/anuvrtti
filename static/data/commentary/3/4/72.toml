id = "3.4.72"
numericId = "34072"

[en]
simple = """
The @deva[क्त] affix denotes agent, object, and action after: (1) verbs of motion (@deva[गत्यर्थ]), (2) intransitive verbs (@deva[अकर्मक]), and (3) the specific verbs @deva[श्लिष्] 'to embrace', @deva[शि] 'to lie', @deva[स्था] 'to stand', @deva[आस्] 'to sit', @deva[वस्] 'to dwell', @deva[जन्] 'to be born', @deva[रुह्] 'to mount', @deva[जृ] 'to age'. Examples: @deva[गतो] @deva[देवदत्तो] @deva[ग्रामम्] 'Devadatta has gone to the village' (agent); @deva[गतः] @deva[ग्रामो] @deva[देवदत्तेन] 'the village was gone to' (object); @deva[गतं] @deva[देवदत्तेन] 'going was done' (action).
"""

standard = """
@deva[क्त] denotes @deva[कर्तृ], @deva[कर्मन्], and @deva[भाव] after: @deva[गत्यर्थ] (motion verbs), @deva[अकर्मक] (intransitives), and @deva[श्लिष्]/@deva[शि]/@deva[स्था]/@deva[आस्]/@deva[वस्]/@deva[जन्]/@deva[रुह्]/@deva[जृ]. @deva[च] draws @deva[भाव]/@deva[कर्मन्] from prior @[sūtras]. Motion verbs: @deva[गतो] @deva[देवदत्तः] @deva[ग्रामम्] (agent); @deva[गतः] @deva[ग्रामः] @deva[देवदत्तेन] (object); @deva[गतं] @deva[देवदत्तेन] (act). Intransitives: @deva[ग्लानो] @deva[भवान्] (agent); @deva[ग्लानं] @deva[भवता] (act)—object impossible. The listed verbs @deva[श्लिष्] etc. become @deva[सकर्मक] with certain @deva[उपसर्ग]s, hence separate mention.
"""

advanced = """
@deva[क्त] takes triple @deva[कारकार्थ] (@deva[कर्तृ], @deva[कर्मन्], @deva[भाव]) after @deva[गत्यर्थ], @deva[अकर्मक], and @deva[श्लिष्]/@deva[शि]/@deva[स्था]/@deva[आस्]/@deva[वस्]/@deva[जन्]/@deva[रुह्]/@deva[जृ]. @deva[गत्यर्थ] examples: @deva[गतो] @deva[देवदत्तो] @deva[ग्रामम्]/@deva[गतः] @deva[ग्रामो] @deva[देवदत्तेन]/@deva[गतं] @deva[देवदत्तेन]. @deva[अकर्मक]: agent/@deva[भाव] only (no object)—@deva[ग्लानो] @deva[भवान्]/@deva[ग्लानं] @deva[भवता]. The eight listed @deva[धातु]s are inherently @deva[अकर्मक] but become @deva[सकर्मक] with certain @deva[उपसर्ग]s, necessitating separate enumeration: @deva[उपश्लिष्टो] @deva[गुरुम्] @deva[भवान्] (agent), @deva[उपश्लिष्टो] @deva[गुरुः] @deva[भवता] (object), @deva[उपश्लिष्टं] @deva[भवता] (act). Full paradigms for @deva[उपशि], @deva[उपस्था], @deva[उपास्], @deva[अनुवस्], @deva[अनुजन्], @deva[आरुह्], @deva[अनुजृ] follow the same pattern.
"""

id = "3.4.54"
numericId = "34054"

[en]
simple = """
The affix @deva[णमुल्] comes after a verb when an accusative word denoting a non-vital limb (@deva[स्वाङ्ग] + @deva[अध्रुव]) is compounded. A @deva[स्वाङ्ग] is a body part; @deva[अध्रुव] means 'non-vital'—a limb whose loss doesn't destroy life. Example: @deva[भ्रूविक्षेपं] @deva[कथयति] 'he narrates, throwing his eyebrows about'. @deva[अक्षिनिकाणम्] @deva[जल्पति] 'he chatters with eyes closed'. But for vital organs like the head, @deva[णमुल्] doesn't apply: @deva[उत्क्षिप्य] @deva[शिरः] @deva[कथयति] 'he narrates, having tilted his head' uses @deva[क्त्वा]/@deva[ल्यप्].
"""

standard = """
@deva[णमुल्] applies when a @[dvitīyā] @deva[स्वाङ्ग] (body-part word) denoting an @deva[अध्रुव] (non-vital) limb is compounded. @deva[स्वाङ्ग]: a perceptible, non-liquid, non-gaseous part existing in a living being. @deva[अध्रुव]: a limb whose loss doesn't destroy life. @deva[भ्रूविक्षेपं] @deva[कथयति] 'narrates while raising eyebrows'; @deva[अक्षिनिकाणम्] @deva[जल्पति] 'chatters with eyes shut'. Vital organs exclude @deva[णमुल्]: @deva[उत्क्षिप्य] @deva[शिरः] @deva[कथयति] (head is @deva[ध्रुव]). See @ref[6.2.177].
"""

advanced = """
@[dvitīyā] @deva[स्वाङ्ग] + @deva[अध्रुव] (non-vital body part) conditions @deva[णमुल्]. @deva[स्वाङ्ग] definition: perceptible, solid, naturally present in living beings, or known primarily as such. @deva[अध्रुव]: limb whose removal doesn't cause death. @deva[भ्रूविक्षेपं] @deva[कथयति]; @deva[अक्षिनिकाणम्] @deva[जल्पति]. @deva[ध्रुव] (vital) organs exclude this: @deva[उत्क्षिप्य] @deva[शिरः] @deva[कथयति]—@deva[शिरस्] is @deva[ध्रुव], so @deva[क्त्वा]/@deva[ल्यप्] applies. Cross-reference: @ref[6.2.177].
"""

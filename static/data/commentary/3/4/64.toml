id = "3.4.64"
numericId = "34064"

[en]
simple = """
Both @deva[क्त्वा] and @deva[णमुल्] come after @deva[भू] when compounded with @deva[अन्वक्] meaning 'favorably disposed' (@deva[आनुलोम्य]). Examples: @deva[अन्वग्भूय], @deva[अन्वग्भूत्वा], @deva[अन्वग्] @deva[भावमास्ते] 'he is favorably disposed'. The @deva[आनुलोम्य] condition matters: @deva[अन्वग्भूत्वा] @deva[तिष्ठति] 'he remains behind' (spatial sense, not 'favorable')—here only @deva[क्त्वा] applies.
"""

standard = """
@deva[भू] with @deva[अन्वक्] in the sense of @deva[आनुलोम्य] (being agreeable/favorably disposed) takes @deva[क्त्वा]/@deva[णमुल्]. @deva[अन्वग्भूय]/@deva[अन्वग्भूत्वा]/@deva[अन्वग्] @deva[भावमास्ते] 'he is favorably disposed'. The @deva[आनुलोम्य] condition distinguishes from literal/spatial uses: @deva[अन्वग्भूत्वा] @deva[तिष्ठति] 'remains behind' (only @deva[क्त्वा]).
"""

advanced = """
@deva[भू] with @deva[अन्वक्] under @deva[आनुलोम्य] (favorable disposition, acting per another's wish) takes @deva[क्त्वा]/@deva[णमुल्]: @deva[अन्वग्भूय]/@deva[अन्वग्भूत्वा]/@deva[अन्वग्] @deva[भावमास्ते]. Without @deva[आनुलोम्य]: @deva[अन्वग्भूत्वा] @deva[तिष्ठति] 'stands behind' (spatial)—@deva[क्त्वा] only.
"""

id = "3.4.90"
numericId = "34090"

[en]
simple = """
In @deva[लोट्] (imperative), @deva[आम्] replaces what would otherwise become @deva[ए] (via @ref[3.4.79]) in the @deva[आत्मनेपद] 3rd person endings. So @deva[त], @deva[आताम्], @deva[झ] (which would become @deva[ते], @deva[आते], @deva[अन्ते]) instead become @deva[ताम्], @deva[आताम्], @deva[अन्ताम्]. Examples: @deva[पचताम्], @deva[पचेताम्], @deva[पचन्ताम्].
"""

standard = """
In @deva[लोट्] @deva[आत्मनेपद], @deva[आम्] replaces what @ref[3.4.79] would make @deva[ए]. @deva[त] (→ @deva[ते]) → @deva[ताम्]; @deva[आताम्] (→ @deva[आते]) → @deva[आताम्]; @deva[झ] (→ @deva[अन्ते]) → @deva[अन्ताम्]. @deva[पचताम्], @deva[पचेताम्], @deva[पचन्ताम्].
"""

advanced = """
@deva[लोट्] @deva[आत्मनेपद] 3rd: @deva[आम्] substitutes for @deva[ए] that @ref[3.4.79] would produce. @deva[त]/@deva[आताम्]/@deva[झ] → @deva[ताम्]/@deva[आताम्]/@deva[अन्ताम्] (not @deva[ते]/@deva[आते]/@deva[अन्ते]). @deva[पचताम्], @deva[पचेताम्], @deva[पचन्ताम्].
"""

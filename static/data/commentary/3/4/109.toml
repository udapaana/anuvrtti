id = "3.4.109"
numericId = "34109"

[en]
simple = """
The ending @deva[झि] also becomes @deva[जुस्] in the aorist (@deva[लुङ्]) with @deva[सिच्], in the imperfect (@deva[लङ्]) of reduplicated verbs, and after the root @deva[विद्] 'to know'.
"""

standard = """
In @deva[ङित्] tenses other than @deva[लिङ्], @deva[झि] is replaced by @deva[जुस्] in three contexts: (1) aorist (@deva[लुङ्]) formed with @deva[सिच्], (2) imperfect (@deva[लङ्]) of reduplicated verbs, (3) forms of @deva[विद्] 'to know'. The term @deva[ङितः] from @ref[3.4.99] continues. Examples: @deva[अकार्षुः] (sic-aorist), @deva[अबिभयुः] (reduplicated imperfect), @deva[अविदुः] (@deva[विद्] imperfect).
"""

advanced = """
This @[sūtra] extends @deva[जुस्] substitution for @deva[झि] beyond @deva[लिङ्] to: (1) @deva[सिच्]-aorist (@deva[लुङ्]): @deva[अकार्षुः], @deva[अहार्षुः]; (2) @deva[लङ्] of reduplicated verbs (@deva[अभ्यस्त]): @deva[अबिभयुः], @deva[अजिहयुः], @deva[अजागरुः]; (3) @deva[विद्] 'to know': @deva[अविदुः]. The @[anuvṛtti] of @deva[ङितः] (@ref[3.4.99]) restricts this to imperfect of reduplicated verbs specifically.
"""

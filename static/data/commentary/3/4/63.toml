id = "3.4.63"
numericId = "34063"

[en]
simple = """
Both @deva[क्त्वा] and @deva[णमुल्] come after @deva[भू] 'to be' when compounded with @deva[तूष्णीम्] 'silently'. Examples: @deva[तूष्णीम्भूय], @deva[तूष्णीं] @deva[भूत्वा], @deva[तूष्णीम्भावम्] 'having become silent'. The @[sūtra] repeats @deva[भू] to indicate that @deva[कृ] (from previous rules) no longer applies here.
"""

standard = """
@deva[क्त्वा]/@deva[णमुल्] apply after @deva[भू] with @deva[तूष्णीम्] @deva[उपपद]. @deva[तूष्णीम्भूय]/@deva[तूष्णीं] @deva[भूत्वा]/@deva[तूष्णीम्भावम्] 'having become silent'. The repetition of @deva[भू] signals that @deva[कृ]'s @deva[अनुवृत्ति] from previous @[sūtras] ceases entirely here.
"""

advanced = """
@deva[भू] with @deva[तूष्णीम्] takes @deva[क्त्वा]/@deva[णमुल्]: @deva[तूष्णीम्भूय]/@deva[तूष्णीं] @deva[भूत्वा]/@deva[तूष्णीम्भावम्]. The explicit restatement of @deva[भू] terminates @deva[कृ]'s @deva[अनुवृत्ति] from @ref[3.4.59]ff.
"""

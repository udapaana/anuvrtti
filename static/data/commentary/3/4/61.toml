id = "3.4.61"
numericId = "34061"

[en]
simple = """
Both @deva[क्त्वा] and @deva[णमुल्] come after @deva[कृ] 'to make' and @deva[भू] 'to be' when a @deva[स्वाङ्ग] word (denoting one's own body part) ending in the @deva[तस्] affix (@ref[5.3.78]) is compounded. Both affixes apply to both roots—no 'respective allocation' (@ref[1.3.10]). Examples with @deva[कृ]: @deva[मुखतः] @deva[कृत्य] @deva[गतः], @deva[मुखतः] @deva[कृत्वा] @deva[गतः], @deva[मुखतः] @deva[कारं] @deva[गतः] 'having turned face-forward, he went'. With @deva[भू]: @deva[पृष्ठतःभूय] @deva[तिष्ठति], @deva[पृष्ठतः] @deva[भूत्वा] @deva[तिष्ठति], @deva[पृष्ठतः] @deva[भावं] @deva[तिष्ठति] 'having turned back, he stands'. The rule requires @deva[तस्] as an affix—not when @deva[तस्] is a verb root: @deva[मुखतः] @deva[कृत्वा] @deva[गतः] (where @deva[मुखतः] = @deva[मुखे] @deva[तस्यति] 'throws in the mouth').
"""

standard = """
@deva[क्त्वा]/@deva[णमुल्] apply to @deva[कृ]/@deva[भू] when a @deva[स्वाङ्ग] word (body part, defined @ref[3.4.54]) ends in the @deva[तसिल्]/@deva[तसि] affix (@ref[5.3.78]ff.). No @deva[यथासंख्य] (@ref[1.3.10])—both affixes apply to both roots. @deva[मुखतः] @deva[कृत्य]/@deva[कृत्वा]/@deva[कारं] @deva[गतः]; @deva[पृष्ठतः] @deva[भूय]/@deva[भूत्वा]/@deva[भावं] @deva[तिष्ठति]. Without @deva[स्वाङ्ग]: @deva[सर्वतः] @deva[कृत्वा] @deva[गतः]. Without @deva[तस्]-affix: @deva[मुखीकृत्य] @deva[गतः], @deva[मुखीभूय] @deva[गतः]. The word @deva[प्रत्यय] in the @[sūtra] ensures @deva[तस्] must be an affix—not a @deva[धातु]: @deva[मुखे] @deva[तस्यति] = @deva[मुखतः] (verbal form) doesn't qualify.
"""

advanced = """
@deva[क्त्वा]/@deva[णमुल्] after @deva[कृ]/@deva[भू] with @deva[स्वाङ्ग] + @deva[तसिल्]/@deva[तसि] (@ref[5.3.78]ff.) @deva[उपपद]. @deva[यथासंख्य] (@ref[1.3.10]) is explicitly inapplicable—both pratyayas govern both @[dhātus]. Examples: @deva[मुखतः] @deva[कृत्य]/@deva[कृत्वा]/@deva[कारं] @deva[गतः]; @deva[पृष्ठतः] @deva[भूय]/@deva[भूत्वा]/@deva[भावं] @deva[तिष्ठति]. Counter-examples: non-@deva[स्वाङ्ग] (@deva[सर्वतः] @deva[कृत्वा] @deva[गतः]); non-@deva[तस्]-affix (@deva[मुखीकृत्य], @deva[मुखीभूय]). @deva[प्रत्यय] in @[sūtra] excludes verbal @deva[तस्]: @deva[मुखे] @deva[तस्यति] = @deva[मुखतः] (from @deva[तस्] 4P) doesn't trigger this rule.
"""

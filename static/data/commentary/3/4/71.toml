id = "3.4.71"
numericId = "34071"

[en]
simple = """
The @deva[क्त] affix also denotes the agent when the action has merely begun (@deva[आदिकर्मन्]). The word @deva[च] includes @deva[भाव] and @deva[कर्मन्] from the previous rule. Examples with @deva[प्र] + @deva[कृ]: @deva[प्रकृतः] @deva[कटं] @deva[देवदत्तः] 'Devadatta has begun making the mat' (agent); @deva[प्रकृतः] @deva[कटो] @deva[देवदत्तेन] 'the mat was begun by Devadatta' (object); @deva[प्रकृतं] @deva[देवदत्तेन] 'it was begun by Devadatta' (action).
"""

standard = """
@deva[क्त] additionally denotes @deva[कर्तृ] when expressing @deva[आदिकर्मन्] (inchoative—action merely begun). The @deva[च] retains @deva[भाव]/@deva[कर्मन्] from @ref[3.4.70]. @deva[प्रकृतः] @deva[कटं] @deva[देवदत्तः] (@deva[कर्तृ]—'D. has begun the mat'); @deva[प्रकृतः] @deva[कटो] @deva[देवदत्तेन] (@deva[कर्मन्]); @deva[प्रकृतं] @deva[देवदत्तेन] (@deva[भाव]). Similarly @deva[प्रभुक्त] @deva[ओदनं] @deva[देवदत्तः] (agent); @deva[प्रभुक्त] @deva[ओदनो] @deva[देवदत्तेन] (object); @deva[प्रभुक्तं] @deva[देवदत्तेन] (act).
"""

advanced = """
@deva[आदिकर्मन्] (inchoative sense—action at its inception) permits @deva[क्त] to denote @deva[कर्तृ] in addition to @deva[भाव]/@deva[कर्मन्] (@deva[च] retains @ref[3.4.70]). @deva[प्रकृतः] @deva[कटं] @deva[देवदत्तः] (@deva[कर्तरि] @deva[क्त]); @deva[प्रकृतः] @deva[कटो] @deva[देवदत्तेन] (@deva[कर्मणि]); @deva[प्रकृतं] @deva[देवदत्तेन] (@deva[भावे]). Same triple possibility: @deva[प्रभुक्तम्] @deva[ओदनं] @deva[देवदत्तः]/@deva[प्रभुक्त] @deva[ओदनो] @deva[देवदत्तेन]/@deva[प्रभुक्तं] @deva[देवदत्तेन].
"""

id = "3.4.100"
numericId = "34100"

[en]
simple = """
In verb forms with @deva[ङ्]-marked tenses, the @deva[इ] of @deva[परस्मैपद] endings is dropped.
"""

standard = """
When a @deva[ङित्] @[lakāra] (@deva[लङ्], @deva[लिङ्], @deva[लुङ्], @deva[लृङ्]) governs the form, the @deva[इ] of @deva[परस्मैपद] endings is elided. Thus @deva[ति] → @deva[त्], @deva[सि] → @deva[स्]. However, @deva[आत्मनेपद] @deva[इ] is not elided since @deva[परस्मैपद] continues in @[anuvṛtti] from @ref[3.4.97]. Forms: @deva[अपचत्], @deva[अपाक्षीत्] (not @deva[अपचति]).
"""

advanced = """
This @[sūtra] elides the final @deva[इ] of @deva[परस्मैपद] endings when governed by a @deva[ङित्] @[lakāra]. The @deva[परस्मैपदानाम्] specification (continuing from @ref[3.4.97]) excludes @deva[आत्मनेपद]. Thus: @deva[अपचत्] (@deva[ति] → @deva[त्]), @deva[अपाक्षीत्], but @deva[आत्मनेपद] forms like @deva[अपचावहि], @deva[अपचामहि] retain @deva[इ]. Cross-reference @ref[7.1.3] for general @deva[झ] → @deva[अन्त] substitution.
"""

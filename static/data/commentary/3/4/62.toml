id = "3.4.62"
numericId = "34062"

[en]
simple = """
Both @deva[क्त्वा] and @deva[णमुल्] come after @deva[कृ] and @deva[भू] when compounded with: (1) words ending in the @deva[ना] affix (@deva[नाना] 'various', @deva[विना] 'without'—@ref[5.2.27]); (2) words ending in affixes with @deva[धा]-meaning (like @deva[धा], @deva[ध्यम्], @deva[धम्]—@ref[5.3.42]ff., added to numerals meaning 'fold/part'); (3) words with @deva[च्वि]-meaning (@ref[5.4.50]—'becoming what it wasn't before'). Examples: @deva[नाना] @deva[कृत्य]/@deva[कृत्वा]/@deva[नानाकारं] @deva[गतः] 'having made various, went'; @deva[विना] @deva[कृत्य]/@deva[कृत्वा]/@deva[कारं] @deva[गतः] 'having made without, went'; @deva[द्विधा]/@deva[द्वैधं] @deva[कृत्य]/@deva[कृत्वा]/@deva[कारं] @deva[गतः] 'having made twofold, went'. But @deva[हिरुक्] @deva[कृत्वा], @deva[पृथक्] @deva[कृत्वा] (words with @deva[ना]/@deva[धा] sense but not formed by those affixes) don't qualify.
"""

standard = """
@deva[क्त्वा]/@deva[णमुल्] apply after @deva[कृ]/@deva[भू] with @deva[उपपद] ending in: (1) @deva[ना]-affix (@ref[5.2.27]): @deva[नाना], @deva[विना]; (2) @deva[धार्थ]-affix (@ref[5.3.42]–46): @deva[धा], @deva[ध्यम्], @deva[धम्], @deva[एधा] (added to numerals for 'fold/part'); (3) @deva[च्व्यर्थ] (@ref[5.4.50]): expressing 'becoming what wasn't before'. @deva[नाना]/@deva[विना] @deva[कृत्य]/@deva[कृत्वा]/@deva[कारं] @deva[गतः]; @deva[नाना]/@deva[विना] @deva[भूय]/@deva[भूत्वा]/@deva[भावं] @deva[गतः]; @deva[द्विधा]/@deva[द्वैधं] @deva[कृत्य]/etc. The @[sūtra] uses @deva[प्रत्यय] to exclude words with mere @deva[ना]/@deva[धा] sense: @deva[हिरुक्] @deva[कृत्वा] ('except'), @deva[पृथक्] @deva[कृत्वा] ('separately'). @deva[अर्थ] qualifies @deva[धा] only (multiple @deva[धार्थ] affixes exist), not @deva[ना] (single affix). @ref[2.2.22] for optional @deva[समास].
"""

advanced = """
@deva[क्त्वा]/@deva[णमुल्] after @deva[कृ]/@deva[भू] with: @deva[ना]-@[pratyayānta] (@ref[5.2.27]: @deva[नाना], @deva[विना]); @deva[धार्थ]-@[pratyayānta] (@ref[5.3.42]–46: @deva[धा], @deva[ध्यम्], @deva[धम्], @deva[एधा]); @deva[च्व्यर्थ] @deva[उपपद] (@ref[5.4.50]). Examples: @deva[नाना]/@deva[विना] @deva[कृत्य]/@deva[कृत्वा]/@deva[कारं]/@deva[भूय]/@deva[भूत्वा]/@deva[भावं] @deva[गतः]; @deva[द्विधा]/@deva[द्वैधं] + same forms. The term @deva[प्रत्यय] excludes words with mere @deva[ना]/@deva[धा] sense but different derivation: @deva[हिरुक्] @deva[कृत्वा], @deva[पृथक्] @deva[कृत्वा]. @deva[अर्थ] in @deva[नाधार्थ] qualifies @deva[धा] only (multiple @deva[धार्थ] pratyayas), not @deva[ना] (unique pratyaya @ref[5.2.27]). @deva[च्व्यर्थ] condition: @deva[नाना] @deva[कृत्वा] @deva[काष्ठानि] @deva[गतः] (literal 'various', not @deva[च्वि]-sense) uses only @deva[क्त्वा]. @ref[2.2.22] governs @deva[समास].
"""

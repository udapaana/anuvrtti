id = "3.4.111"
numericId = "34111"

[en]
simple = """
According to @deva[शाकटायन], @deva[जुस्] replaces @deva[झि] in the imperfect of roots ending in long @deva[आ].
"""

standard = """
In @deva[शाकटायन]'s view, @deva[जुस्] optionally replaces @deva[झि] in @deva[लङ्] (imperfect) for roots ending in long @deva[आ]. Thus @deva[या] → @deva[अयुः] or @deva[अयान्]; @deva[वा] → @deva[अवुः] or @deva[अवान्]. The repetition of @deva[लङ्] indicates this applies to actual @deva[लङ्], not to @deva[लोट्] treated like @deva[लङ्]. Hence @deva[लोट्] forms: @deva[बिभ्यतु], @deva[जाग्रतु], @deva[विदन्तु] (no @deva[जुस्]).
"""

advanced = """
Per @deva[शाकटायन], @deva[जुस्] optionally substitutes @deva[झि] in @deva[लङ्] of @deva[आकारान्त] roots: @deva[अयुः]/@deva[अयान्], @deva[अवुः]/@deva[अवान्]. The explicit @deva[लङ्] mention (despite contextual availability) creates a @deva[जñापक] (interpretive implication): this rule applies only to true @deva[लङ्], not to @[lakāras] treated as @deva[लङ्] (like @deva[लोट्] by @ref[3.4.85]). Thus @ref[3.4.109]'s @deva[जुस्] doesn't extend to @deva[लोट्]: @deva[बिभ्यतु], @deva[जाग्रतु], @deva[विदन्तु]. The @deva[एव] anticipates the next @[sūtra].
"""

id = "3.4.47"
numericId = "34047"

[en]
simple = """
The affix @deva[णमुल्] comes after the root @deva[दंश्] 'to bite' when preceded by @deva[उप] and compounded with a word in the instrumental case (third case). This forms expressions like @deva[मूलकोपदंशम्] @deva[भुङ्क्ते] 'he eats while relishing radish (as a side dish)'. The compounding is optional by @ref[2.2.21], so you can also say @deva[मूलकेनोपदंशम्] @deva[भुङ्क्ते]. By @ref[3.1.94], @deva[क्त्वा] (becoming @deva[ल्यप्]) may optionally replace @deva[णमुल्]: @deva[मूलकेनोपदश्य] @deva[भुङ्क्ते].
"""

standard = """
After @deva[उप] + @deva[दंश्] 'to bite/relish', @deva[णमुल्] is added when an instrumental-ending word is compounded. The @deva[उपपद] @deva[समास] is optional (@ref[2.2.21]): @deva[मूलकोपदंशम्] @deva[भुङ्क्ते] or @deva[मूलकेनोपदंशम्] @deva[भुङ्क्ते] 'he eats, relishing radish'. The @deva[उपपद] (@deva[मूलक] etc.) is the object of @deva[उपदंश्] and the instrument of @deva[भुज्]. By @deva[वाऽसरूप] (@ref[3.1.94]), @deva[क्त्वा]/@deva[ल्यप्] may substitute: @deva[मूलकेनोपदश्य] @deva[भुङ्क्ते].
"""

advanced = """
With @deva[उप] + @deva[दंश्], @deva[णमुल्] is conditioned on an instrumental-ending @deva[उपपद]. @ref[2.2.21] makes compounding optional: @deva[मूलकोपदंशम्] or @deva[मूलकेनोपदंशम्] @deva[भुङ्क्ते], @deva[आर्द्रकोपदंशम्] or @deva[आर्द्रकेणोपदंशम्] 'relished with ginger'. The @deva[उपपद] serves dual @deva[कारक] roles: @deva[कर्मन्] of @deva[उपदंश्], @deva[करण] of @deva[भुज्]. @deva[वाऽसरूप] (@ref[3.1.94]) permits @deva[क्त्वा]/@deva[ल्यप्] as alternatives throughout this section.
"""

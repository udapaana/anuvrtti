id = "3.4.107"
numericId = "34107"

[en]
simple = """
In @deva[लिङ्], the augment @deva[सुट्] is added before endings beginning with @deva[त] or @deva[थ].
"""

standard = """
The augment @deva[सुट्] is added before @deva[लिङ्] endings that begin with @deva[त] or @deva[थ]. This applies to @deva[आत्मनेपद] endings like @deva[त], @deva[थास्], etc. Note that @deva[सीयुट्] applies to @deva[लिङ्] as a whole (@deva[आगमी] = @deva[लिङ्]), while @deva[सुट्] applies specifically to @deva[त]/@deva[थ]-initial endings. In the optative, @deva[स्] elides by @ref[7.2.79]. Forms: @deva[कृषीष्ट], @deva[कृषीयास्ताम्], @deva[कृषीष्ठाः].
"""

advanced = """
This @[sūtra] adds @deva[सुट्] before @deva[ति]-initial (@deva[त], @deva[थ]) endings in @deva[लिङ्]. The distinction from @deva[सीयुट्] (@ref[3.4.102]): @deva[सीयुट्]'s @deva[आगमी] is @deva[लिङ्] itself, while @deva[सुट्]'s @deva[आगमी] is the @deva[त]/@deva[थ]-initial pratyaya. Since their scopes differ, no mutual exclusion occurs. The @deva[इ] in @deva[ति] is for pronunciation only. Forms: benedictive @deva[कृषीष्ट], @deva[कृषीयास्ताम्], @deva[कृषीरन्], @deva[कृषीष्ठाः], @deva[कृषीयास्थाम्]. In optative, @deva[स्] deletes by @ref[7.2.79].
"""

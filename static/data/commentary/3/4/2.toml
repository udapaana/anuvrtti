id = "3.4.2"
numericId = "34002"

[en]
simple = """
When expressing repeated action (@deva[क्रियासमभिहार]), use the imperative (@deva[लोट्]) with the verb doubled. The 2nd person endings @deva[हि], @deva[स्व] (singular) or @deva[त], @deva[ध्वम्] (plural) are used, regardless of the main verb's person/number/tense. Example: @deva[लुनीहि लुनीहि इत्य् एवायं लुनाति] 'he cuts repeatedly' (as if someone keeps saying 'cut! cut!'). This works for any person: @deva[लुनीहि लुनीहि इत्य् एव त्वं लुनासि] 'you cut repeatedly'.
"""

standard = """
For @deva[क्रियासमभिहार] (repeated/frequent action), @deva[लोट्] is used with verb reduplication. Only 2nd person @deva[परस्मैपद] (@deva[हि], @deva[त]) and @deva[आत्मनेपद] (@deva[स्व], @deva[ध्वम्]) substitute for @deva[लोट्], regardless of actual subject. Examples: @deva[लुनीहि लुनीहि इत्य् एवायं लुनाति] (3rd sg.), @deva[इमौ लुनीतः] (3rd du.), @deva[इमे लुनन्ति] (3rd pl.) - all mean 'cuts repeatedly'. Similarly: @deva[अधीष्व अधीष्व इत्य् एवायम् अधीते] 'he studies diligently'. Unlike @deva[यङ्] (intensive) which has inherent frequentative sense, here doubling expresses it. See @ref[8.1.4].
"""

advanced = """
@deva[क्रियासमभिहार] (action-repetition) triggers @deva[लोट्] with verb doubling. The @deva[धातुसम्बन्ध] from @ref[3.4.1] continues. Only 2nd person terminations (@deva[हि]/​@deva[स्व] sg., @deva[त]/​@deva[ध्वम्] pl.) substitute, but apply across all persons/numbers/tenses of the main verb. Paradigm: @deva[लुनीहि लुनीहि इत्य् एव] + @deva[अयं लुनाति], @deva[इमौ लुनीतः], @deva[इमे लुनन्ति], @deva[त्वं लुनासि], @deva[युवां लुनीथः], @deva[यूयं लुनीथ]. For @deva[आत्मनेपद]: @deva[अधीष्व अधीष्व इत्य् एव] + any person. Contrast with @deva[यङन्त] verbs where frequentative meaning is lexically inherent (no doubling needed). This usage is grammatically valid but rare in literature (Böhtlingk).
"""

id = "3.4.82"
numericId = "34082"

[en]
simple = """
In @deva[लिट्] (perfect tense), the @deva[परस्मैपद] affixes are replaced by special forms: 3rd person—@deva[णल्] (@deva[अ]), @deva[अतुस्] (@deva[अतुः]), @deva[उस्] (@deva[उः]); 2nd person—@deva[थल्] (@deva[थ]), @deva[अथुस्] (@deva[अथुः]), @deva[अ]; 1st person—@deva[णल्] (@deva[अ]), @deva[व], @deva[म]. The @deva[ल्] in @deva[णल्]/@deva[थल्] governs accent (@ref[6.1.193]). The @deva[ण्] causes @deva[वृद्धि] (@ref[7.2.25]). Examples from @deva[पच्]: @deva[पपाच], @deva[पेचतुः], @deva[पेचुः]; @deva[पेचिथ]/@deva[पपक्थ], @deva[पेचथुः], @deva[पेच]; @deva[पपाच]/@deva[पपच], @deva[पेचिव], @deva[पेचिम].
"""

standard = """
@deva[लिट्] @deva[परस्मैपद] substitutes: 3rd @deva[णल्]/@deva[अतुस्]/@deva[उस्]; 2nd @deva[थल्]/@deva[अथुस्]/@deva[अ]; 1st @deva[णल्]/@deva[व]/@deva[म]. @deva[ल्] (@deva[णल्]/@deva[थल्]) for accent (@ref[6.1.193]); @deva[ण्] for @deva[वृद्धि] (@ref[7.2.25]). @deva[पच्] paradigm: @deva[पपाच]/@deva[पेचतुः]/@deva[पेचुः] (3rd); @deva[पेचिथ] or @deva[पपक्थ]/@deva[पेचथुः]/@deva[पेच] (2nd); @deva[पपाच] or @deva[पपच]/@deva[पेचिव]/@deva[पेचिम] (1st).
"""

advanced = """
@deva[लिट्] @deva[परस्मैपद] replacements: 3rd @deva[णल्] (@deva[अ])/@deva[अतुस्] (@deva[अतुः])/@deva[उस्] (@deva[उः]); 2nd @deva[थल्] (@deva[थ])/@deva[अथुस्] (@deva[अथुः])/@deva[अ]; 1st @deva[णल्] (@deva[अ])/@deva[व]/@deva[म]. @deva[इत्]-functions: @deva[ल्] for accent (@ref[6.1.193]); @deva[ण्] for @deva[वृद्धि] (@ref[7.2.25]). @deva[पच्]: @deva[पपाच]/@deva[पेचतुः]/@deva[पेचुः]; @deva[पेचिथ] or @deva[पपक्थ]/@deva[पेचथुः]/@deva[पेच]; @deva[पपाच] or @deva[पपच]/@deva[पेचिव]/@deva[पेचिम].
"""

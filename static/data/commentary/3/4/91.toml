id = "3.4.91"
numericId = "34091"

[en]
simple = """
When expressing a wish or benediction, the second person singular @deva[लोट्] ending @deva[सिप्] becomes @deva[तात्], while the verb stays the same as when no suffix were added.
"""

standard = """
In expressions of benediction (@deva[आशिषि]), the @deva[परस्मैपद] second person singular ending @deva[सिप्] of @deva[लोट्] is replaced by @deva[तात्]. Additionally, the verbal base retains its uninflected form (@deva[धातुस्वरूप])—that is, the stem appears as if no personal ending were attached. Example: @deva[भवतात्] 'may you prosper', @deva[एधतात्] 'may you thrive'.
"""

advanced = """
This @[sūtra] teaches that when @deva[लोट्] conveys benediction (@deva[आशिषि]), @deva[सिप्] (second person singular @deva[परस्मैपद]) is replaced by @deva[तात्], and the @deva[अङ्ग] remains @deva[धातुस्वरूप]—appearing in its root form without @[vikaraṇa-induced] modifications. The term @deva[धातुस्वरूप] indicates the base stays as if no @deva[तिङ्] were following. Forms: @deva[भू] → @deva[भवतात्], @deva[एध्] → @deva[एधतात्]. This contrasts with ordinary @deva[लोट्] second singular @deva[भव] where @deva[सिप्] becomes @deva[हि] and then is elided.
"""

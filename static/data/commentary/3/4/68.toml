id = "3.4.68"
numericId = "34068"

[en]
simple = """
The words @deva[भव्य], @deva[गेय], @deva[प्रवचनीय], @deva[उपस्थानीय], @deva[जन्य], @deva[आप्लाव्य], and @deva[आपात्य] may optionally denote the agent, though they're formed with @deva[कृत्य] affixes (which normally denote object/action by @ref[3.4.70]). So @deva[गेय] can mean 'singer' (agent), 'song' (object), or 'singing' (action). Example: @deva[गेयो] @deva[माणवकः] @deva[साम्नाम्] 'the boy is the singer of the @[sāmas]' (agent) vs. @deva[गेयानि] @deva[माणवकेन] @deva[सामानि] 'the @[sāmas] ought to be sung by the boy' (object).
"""

standard = """
These seven @deva[कृत्य]-formed words optionally denote @deva[कर्तृ] (agent), besides their regular @deva[भाव]/@deva[कर्मन्] senses (@ref[3.4.70]): @deva[भव्य] ('one who exists'/'existence'/'what exists'); @deva[गेय] ('singer'/'song'/'singing'); @deva[प्रवचनीय] ('explainer'/'explanation'/'what's to be explained'); @deva[उपस्थानीय] ('attendant'/'attendance'/'what's to be served'); @deva[जन्य] ('father'/'birth'/'what's born'); @deva[आप्लाव्य] ('immerser'/'immersion'/'what's immersed'); @deva[आपात्य] ('faller'/'falling'/'what falls'). Examples: @deva[गेयो] @deva[माणवकः] @deva[साम्नाम्] (agent); @deva[गेयानि] @deva[माणवकेन] @deva[सामानि] (object).
"""

advanced = """
These @deva[कृत्यप्रत्ययान्त] words optionally take @deva[कर्तृ]-sense in addition to their default @deva[भाव]/@deva[कर्मन्] (@ref[3.4.70]): @deva[भव्य], @deva[गेय], @deva[प्रवचनीय], @deva[उपस्थानीय], @deva[जन्य], @deva[आप्लाव्य], @deva[आपात्य]. Triple meanings: @deva[गेय] = @deva[गायकः] (agent) / @deva[गानम्] (action) / @deva[गातव्यम्] (object). @deva[जन्य] = @deva[जायते] @deva[असौ] (agent: father) or @deva[जन्यमनेन] (object: what's born). Usage: @deva[गेयो] @deva[माणवकः] @deva[साम्नाम्] (agent); @deva[गेयानि] @deva[माणवकेन] @deva[सामानि] (object); @deva[उपस्थानीयोऽन्तेवासी] @deva[गुरोः] (agent) vs. @deva[उपस्थानीयः] @deva[शिष्येण] @deva[गुरुः] (object).
"""

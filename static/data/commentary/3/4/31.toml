id = "3.4.31"
numericId = "34031"

[en]
simple = """
@deva[णमुल्] is added to @deva[पॄ] (to fill) when @deva[चर्मन्] (skin) or @deva[उदर] (belly) is in composition. Examples: @deva[उदरपूरं भुङ्क्ते] 'he eats to fill his belly'; @deva[चर्मपूरं स्तृणाति] 'he spreads [something] to cover the skin'.
"""

standard = """
@deva[णमुल्] after @deva[पॄ] with @deva[चर्मन्] or @deva[उदर] in composition. Examples: @deva[उदरपूरं भुङ्क्ते] 'eats filling the belly'; @deva[चर्मपूरं स्तृणाति] 'spreads so as to cover the hide'. The @deva[उपपद] indicates the extent or goal of the filling action.
"""

advanced = """
@deva[णमुल्] after @deva[पॄ] with @deva[चर्मन्]/​@deva[उदर] @deva[उपपद]. @deva[उदरपूरं भुङ्क्ते] = @deva[उदरं पूरयन् भुङ्क्ते]; @deva[चर्मपूरं स्तृणाति] = @deva[चर्म पूरयन् स्तृणाति]. The @deva[णमुल्]-formed compound specifies the extent/goal of the action.
"""

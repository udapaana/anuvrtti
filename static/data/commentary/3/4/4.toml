id = "3.4.4"
numericId = "34004"

[en]
simple = """
For the repeated-action construction (@ref[3.4.2]), the main verb must be from the same root as the imperative. You cannot say @deva[लुनीहि लुनीहि इत्य् एवायं छिनत्ति] (mixing @deva[लू] 'cut' with @deva[छिद्] 'cut'). The main verb must also be @deva[लुनाति]. Similarly, @deva[अधीष्व अधीष्व] requires @deva[अधीते], not a synonym like @deva[पठति].
"""

standard = """
For @deva[क्रियासमभिहार] (@ref[3.4.2]), the main clause verb must derive from the same root as the imperative. Invalid: @deva[लुनीहि लुनीहि इत्य् एवायं छिनत्ति] (imperative from @deva[लू], main verb from @deva[छिद्] - both mean 'cut' but are different roots). Valid: @deva[लुनीहि लुनीहि इत्य् एवायं लुनाति]. Similarly: @deva[अधीष्व अधीष्व] requires @deva[अधीते], not synonymous @deva[पठति].
"""

advanced = """
This restricts @ref[3.4.2]: the @deva[उत्तरपद] (subsequent verb) must share the same @deva[धातु] as the @deva[लोट्] form. Invalid: @deva[लुनीहि लुनीहि इत्य् एवायं छिनत्ति] - though @deva[लू] and @deva[छिद्] are synonymous ('to cut'), they are distinct roots. Valid: any form of @deva[लू] (@deva[लुनाति], @deva[लुनीतः], etc.). The @deva[समभिहार] construction requires root-identity, not mere semantic equivalence.
"""

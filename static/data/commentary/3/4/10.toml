id = "3.4.10"
numericId = "34010"

[en]
simple = """
Three irregularly-formed Vedic infinitives: (1) @deva[प्रयै] = @deva[प्रयातुम्] 'to go forth' (RV I.142.6), from @deva[प्र] + @deva[या] + @deva[कै]; (2) @deva[रोहिष्यै] = @deva[रोहणाय] 'for growing' (from @deva[रुह्] + @deva[इष्यै]); (3) @deva[अव्यथिष्यै] = @deva[अव्यथनाय] 'for not causing pain' (from @deva[अ] + @deva[व्यथ्] + @deva[इष्यै]).
"""

standard = """
Three @deva[निपातन] (irregular) Vedic infinitives: (1) @deva[प्रयै] (RV I.142.6): @deva[प्र] + @deva[या] + @deva[कै] = @deva[प्रयातुम्]; (2) @deva[रोहिष्यै]: @deva[रुह्] + @deva[इष्यै] = @deva[रोहिष्यै] = @deva[रोहणाय] (in @deva[अपाम् ओषधीनां रोहिष्यै]); (3) @deva[अव्यथिष्यै]: @deva[अ] + @deva[व्यथ्] + @deva[इष्यै] = @deva[अव्यथनाय]. These are listed exceptions.
"""

advanced = """
@deva[निपातन] for three Vedic infinitives: (1) @deva[प्रयै] (RV I.142.6) = @deva[प्र] + @deva[या] + @deva[कै] → @deva[प्रयातुम्] (@deva[प्रयै देवेभ्यो महीः]); (2) @deva[रोहिष्यै] = @deva[रुह्] + @deva[इष्यै] → @deva[रोहणाय] (@deva[अपाम् ओषधीनां रोहिष्यै]); (3) @deva[अव्यथिष्यै] = @deva[अ] + @deva[व्यथ्] + @deva[इष्यै] → @deva[अव्यथनाय]. These are individually enumerated as they don't follow regular patterns.
"""

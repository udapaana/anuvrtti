id = "3.4.7"
numericId = "34007"

[en]
simple = """
In Vedic, the subjunctive (@deva[लेट्]) may optionally replace the benedictive (@deva[लिङ्]) wherever @deva[लिङ्] can be used (commands, wishes, etc.). Examples: @deva[जोषिषत्] 'may he make beautiful' (RV II.35.1), @deva[तारिषत्] 'may he increase' (RV I.25.12), @deva[पताति विद्युत्] 'may the thunderbolt fall' (RV VII.25.1), @deva[भवाति] 'may he become' (RV V.37.5).
"""

standard = """
In @deva[छन्दस्], @deva[लेट्] (Vedic subjunctive) optionally replaces @deva[लिङ्] (benedictive/potential) in senses like command, wish, blessing. @deva[लेट्] is exclusively Vedic. Examples: @deva[जोषिषत्] (RV II.35.1) 'may he beautify'; @deva[तारिषत्] (RV I.25.12) 'may he increase'; @deva[पताति विद्युत्] (RV VII.25.1) 'may lightning fall'; @deva[भवाति] (RV V.37.5) 'may he become'. Also: @deva[मन्दिषत्], @deva[नेता], @deva[नेषत्], @deva[तक्षिषत्], @deva[उदधिं च्यावयाति].
"""

advanced = """
@deva[लेट्] (Vedic subjunctive) is @deva[विकल्प] for @deva[लिङ्] in @deva[छन्दस्]. It covers @deva[आशीः] (benediction), @deva[विधि] (command), etc. - wherever @deva[लिङ्] applies. Forms: @deva[जोषिषत्] (RV II.35.1), @deva[तारिषत्] (RV I.25.12), @deva[पताति विद्युत्] (RV VII.25.1), @deva[भवाति] (RV V.37.5), @deva[मन्दिषत्], @deva[नेता], @deva[नेषत्], @deva[तक्षिषत्], @deva[उदधिं च्यावयाति]. @deva[लेट्] is confined to Vedic; classical Sanskrit uses @deva[लिङ्] for these senses.
"""

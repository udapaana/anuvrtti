id = "3.4.103"
numericId = "34103"

[en]
simple = """
For @deva[परस्मैपद] forms in the optative specifically, the augment @deva[यासुट्] replaces @deva[सीयुट्], and the endings are treated as if they had @deva[ङ्].
"""

standard = """
When @deva[परस्मैपद] endings of @deva[लिङ्] follow, they take @deva[यासुट्] (not @deva[सीयुट्]) as their augment. This @deva[यासुट्] is specially marked as @deva[उदात्त] (acutely accented). The endings are treated as @deva[ङित्] for purposes of blocking @[guṇa]/@[vṛddhi]. Forms: @deva[कुर्यात्], @deva[कुर्याताम्], @deva[कुर्युः]. In optative, @deva[स्] of @deva[यासुट्] elides by @ref[7.2.79].
"""

advanced = """
This @[sūtra] provides @deva[यासुट्] as the augment for @deva[परस्मैपद] @deva[लिङ्], overriding @deva[सीयुट्] of @ref[3.4.102]. The @deva[उट्] is @deva[इत्], leaving @deva[यास्] as the actual @[āgama]. Marked @deva[उदात्त] (exception to general @deva[अनुदात्त] @[āgamas]). The statement @deva[ङितश्च] reintroduces @deva[ङित्] treatment for the endings—this establishes the @[paribhāṣā] @deva[लकाराश्रयङित्वमादेशानां न भवति]: inherent @deva[ङ्] of @[lakāras] doesn't transfer to substitutes. @deva[स्] elides by @ref[7.2.79]: @deva[कुर्यात्], @deva[कुर्याताम्]; with @ref[3.4.108] and @ref[6.1.96]: @deva[कुर्युः].
"""

id = "3.4.104"
numericId = "34104"

[en]
simple = """
For the benedictive (@deva[आशीर्लिङ्]), @deva[यासुट्] is also used with @deva[उदात्त] accent, and the endings are treated as having @deva[क्].
"""

standard = """
The benedictive @deva[लिङ्] (expressing wishes/blessings) also takes @deva[यासुट्] with @deva[उदात्त] accent. Its endings are treated as @deva[कित्] (having indicatory @deva[क्]), which affects vowel strengthening and semi-vowel changes differently than @deva[ङित्]. @deva[कित्] and @deva[ङित्] both block @[guṇa]/@[vṛddhi] but differ regarding @deva[जागृ] (@ref[7.3.85]) and semi-vowel vocalization (@ref[6.1.15], @ref[6.1.16]). Forms: @deva[इष्यात्], @deva[जागर्यात्]; in optative @deva[वच्यात्] (no @[samprasāraṇa]), in benedictive @deva[उच्यात्] (with vocalization).
"""

advanced = """
The @deva[आशीर्लिङ्] (benedictive) takes @deva[यासुट्] (@deva[उदात्त] accented) per this @[sūtra], with endings treated as @deva[कित्] rather than @deva[ङित्]. While both @deva[ङित्] and @deva[कित्] block @[guṇa]/@[vṛddhi] by @ref[1.1.5], they differ in: (1) @deva[ङित्] triggers @[guṇa] of @deva[जागृ] by @ref[7.3.85], @deva[कित्] doesn't; (2) @[samprasāraṇa] rules @ref[6.1.15]-@ref[6.1.16] apply differently. Thus @deva[विधिलिङ्] @deva[वच्यात्] (no @[samprasāraṇa]) vs. @deva[आशीर्लिङ्] @deva[उच्यात्] (vocalization occurs). Similarly @deva[जागृयात्] (optative) but @deva[जागर्यात्] (benedictive, no @[guṇa]).
"""

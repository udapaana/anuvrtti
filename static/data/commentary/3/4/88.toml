id = "3.4.88"
numericId = "34088"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), the @deva[हि] substitute (for 2nd singular @deva[लोट्]) is optionally treated as @deva[अपित्]. This creates two forms: @deva[प्रीणाहि] (with @deva[गुण], as if @deva[पित्]) or @deva[प्रीणीहि] (without @deva[गुण], as @deva[अपित्]); @deva[युयोधि] (with @deva[गुण]) or @deva[युयुधि] (without). The @deva[धि] for @deva[हि] substitution occurs by @ref[6.4.103]. Vedic example: @deva[युयोध्यस्मज्जुहुराणमेनो] (@[ṛg] 1.189.1).
"""

standard = """
In @deva[छन्दस्], @deva[हि]'s @deva[अपित्]-status is optional (@deva[वा]). With @deva[पित्]: @deva[गुण] occurs; with @deva[अपित्]: no @deva[गुण]. @deva[प्रीणाहि]/@deva[प्रीणीहि]; @deva[युयोधि]/@deva[युयुधि]. @deva[हि] → @deva[धि] by @ref[6.4.103]. Vedic citation: @deva[युयोध्यस्मज्जुहुराणमेनो] (@[ṛg] 1.189.1, Yajur 40.16).
"""

advanced = """
@deva[छन्दस्]-@deva[विकल्प]: @deva[हि] optionally @deva[अपित्]. @deva[पित्] → @deva[गुण]; @deva[अपित्] → no @deva[गुण]. Forms: @deva[प्रीणाहि]/@deva[प्रीणीहि]; @deva[युयोधि]/@deva[युयुधि]. @deva[हि] → @deva[धि] by @ref[6.4.103]. Citation: @deva[अग्ने] @deva[नय] @deva[सुपथाराये]..@deva[युयोध्यस्मज्जुहुराणमेनो] (@[ṛg] 1.189.1).
"""

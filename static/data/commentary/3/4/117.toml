id = "3.4.117"
numericId = "34117"

[en]
simple = """
In Vedic texts, the distinction between @deva[सार्वधातुक] and @deva[आर्धधातुक] is not strictly maintained.
"""

standard = """
In Vedic Sanskrit (@deva[छन्दसि]), the @deva[सार्वधातुक]/@deva[आर्धधातुक] distinction is applied flexibly. Sometimes @deva[तिङ्] and @deva[शित्] affixes are treated as @deva[आर्धधातुक] (@deva[वर्धन्तु] for @deva[वर्धयन्तु], with @deva[णिच्] elision by @ref[6.4.51]). Sometimes @deva[आर्धधातुक] affixes are treated as @deva[सार्वधातुक] (@deva[विशृण्विरे], with @deva[श्नु] @[vikaraṇa] in @deva[लिट्]). Sometimes both treatments apply simultaneously (@deva[उपस्थेयाम्]: @deva[स्] elides as if @deva[सार्वधातुक], @deva[आ] → @deva[ए] as if @deva[आर्धधातुक]).
"""

advanced = """
This @[sūtra] declares Vedic flexibility regarding @deva[सार्वधातुक]/@deva[आर्धधातुक]. Examples: (1) @deva[तिङ्]/@deva[शित्] as @deva[आर्धधातुक]: @deva[वर्धन्तु] (not @deva[वर्धयन्तु])—@deva[लोट्] treated as @deva[आर्धधातुक], so @deva[णिच्] elides by @ref[6.4.51]. (2) @deva[आर्धधातुक] as @deva[सार्वधातुक]: @deva[विशृण्विरे]—@deva[लिट्] treated as @deva[सार्वधातुक], taking @deva[श्नु] @[vikaraṇa]; @deva[वि] + @deva[शृ] + @deva[श्नु] + @deva[इरे] → @deva[विशृण्विरे] (@deva[उ] → @deva[व्] by @ref[6.4.87]). Similarly @deva[सुन्विरे]. (3) Simultaneous both: @deva[उपस्थेयाम्] @deva[शरणं] @deva[बृहन्तम्]—@deva[स्] elides (@ref[7.2.79], treating as @deva[सार्वधातुक]) while @deva[आ] → @deva[ए] (treating as @deva[आर्धधातुक]). Also @deva[स्वस्ति]: treated as @deva[सार्वधातुक], so @deva[अस्] → @deva[भू] (@ref[2.4.52]) doesn't occur.
"""

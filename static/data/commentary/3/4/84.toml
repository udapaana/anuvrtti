id = "3.4.84"
numericId = "34084"

[en]
simple = """
After @deva[ब्रू] 'to speak', the first five @deva[लट्] (present) affixes may optionally take @deva[लिट्] forms, with @deva[आह] substituting for @deva[ब्रू]. So: 3rd—@deva[आह]/@deva[ब्रवीति], @deva[आहतुः]/@deva[ब्रूतः], @deva[आहुः]/@deva[ब्रुवन्ति]; 2nd—@deva[आत्थ]/@deva[ब्रवीषि], @deva[आहथुः]/@deva[ब्रूथः], @deva[ब्रूथ] (no @deva[लिट्] form). The word @deva[आदितः] 'first' restricts this to the first five positions only. The repetition of @deva[ब्रुवः] shows this applies only to @deva[परस्मैपद].
"""

standard = """
After @deva[ब्रू] (2P, 'speak'), the first five @deva[लट्] affixes optionally take @deva[लिट्] forms with @deva[ब्रू] → @deva[आह]. @deva[आदितः] restricts to first five (3rd sg/du/pl, 2nd sg/du): @deva[आह]/@deva[ब्रवीति], @deva[आहतुः]/@deva[ब्रूतः], @deva[आहुः]/@deva[ब्रुवन्ति] (3rd); @deva[आत्थ]/@deva[ब्रवीषि], @deva[आहथुः]/@deva[ब्रूथः] (2nd sg/du). 2nd pl and 1st person retain regular forms: @deva[ब्रूथ], @deva[ब्रवीमि], @deva[ब्रूवः], @deva[ब्रूमः]. @deva[ब्रुवः] repetition indicates @deva[परस्मैपद] only.
"""

advanced = """
@deva[ब्रू] (2P) optionally takes @deva[लिट्]-substitutes for first five @deva[लट्] affixes, with @deva[आह]-@[ādeśa]. @deva[आदितः] = first five positions (3sg–2du). 3rd: @deva[आह]/@deva[ब्रवीति], @deva[आहतुः]/@deva[ब्रूतः], @deva[आहुः]/@deva[ब्रुवन्ति]; 2nd sg/du: @deva[आत्थ]/@deva[ब्रवीषि], @deva[आहथुः]/@deva[ब्रूथः]. Last four (2pl, 1st) = regular @deva[लट्]: @deva[ब्रूथ], @deva[ब्रवीमि], @deva[ब्रूवः], @deva[ब्रूमः]. Repetition of @deva[ब्रुवः] marks @deva[परस्मैपद]-restriction.
"""

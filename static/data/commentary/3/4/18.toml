id = "3.4.18"
numericId = "34018"

[en]
simple = """
According to Eastern grammarians (@deva[प्राचाम्]), @deva[क्त्वा] (gerund) is used with @deva[अलम्] or @deva[खलु] to express prohibition. The Vedic @deva[अनुवृत्ति] stops here. Examples: @deva[अलं कृत्वा] 'don't make!', @deva[खलु पीत्वा] 'don't drink!', @deva[अलं काले रुदित्वा] 'don't weep, girl!' This is optional, so alternatively: @deva[अलं रोदनेन] 'enough crying'. Note: @deva[अलम्] here means prohibition, not decoration (@deva[अलङ्कारः]).
"""

standard = """
Per @deva[प्राचाम्] (Eastern grammarians), @deva[क्त्वा] follows a root when @deva[अलम्] or @deva[खलु] expresses @deva[प्रतिषेध] (prohibition). The @deva[छन्दस्] @deva[अनुवृत्ति] ends here. Examples: @deva[अलं कृत्वा] 'don't make'; @deva[खलु पीत्वा] 'don't drink'; @deva[अलं काले रुदित्वा] 'don't weep, O girl'. Without @deva[अलम्]/​@deva[खलु]: @deva[माकार्षीः] 'don't make'. Without prohibition sense: @deva[अलङ्कारः] 'ornament'. The @deva[प्राचाम्] makes this optional; alternatively @deva[अलं रोदनेन]. Or @deva[प्राचाम्] is merely honorific (@deva[पूजार्थ]) per @ref[3.1.94].
"""

advanced = """
Per @deva[प्राचाम्], @deva[क्त्वा] with @deva[अलम्]/​@deva[खलु] expressing @deva[प्रतिषेध]. The @deva[छन्दस्] @deva[अनुवृत्ति] terminates. Examples: @deva[अलं कृत्वा], @deva[खलु पीत्वा], @deva[अलं काले रुदित्वा]. Counterexamples: without @deva[अलम्]/​@deva[खलु] → @deva[माकार्षीः]; without @deva[प्रतिषेध] → @deva[अलङ्कारः]. The @deva[प्राचाम्] indicates @deva[विकल्प]: alternative is @deva[अलं रोदनेन]. Or per @ref[3.1.94], @deva[प्राचाम्] is @deva[पूजार्थ] (honorific mention) with no functional difference.
"""

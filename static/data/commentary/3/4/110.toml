id = "3.4.110"
numericId = "34110"

[en]
simple = """
When @deva[सिच्] is deleted, @deva[जुस्] replaces @deva[झि] only if the verb stem ends in long @deva[आ].
"""

standard = """
When @deva[सिच्] is elided (by @ref[2.4.77]-@ref[2.4.79]), @deva[जुस्] replaces @deva[झि] only after stems ending in long @deva[आ]. Examples: @deva[अदुः], @deva[अधुः], @deva[अस्थुः]. This restricts @ref[3.4.109]: after non-@deva[आ]-final stems where @deva[सिच्] is elided, the regular @deva[अन्त] applies instead. Thus @deva[भू] with @deva[सिच्]-elision gives @deva[अभूवन्] (not @deva[अभूवुः]).
"""

advanced = """
This @[sūtra] is a @deva[नियम] (restriction) on @ref[3.4.109]. When @deva[सिच्] is elided by @ref[2.4.77]-@ref[2.4.79], @deva[जुस्] replaces @deva[झि] only for @deva[आकारान्त] stems. The maxim @ref[1.1.62] (@deva[प्रत्ययलोपे प्रत्ययलक्षणम्]) would otherwise extend @deva[जुस्] to all @deva[सिच्]-elision contexts. Restriction: @deva[भू] (not @deva[आ]-final) with @deva[सिच्] deleted → @deva[अभूवन्] (standard @deva[अन्त]), not @deva[अभूवुः]. But @deva[दा]/@[sthā] (@deva[आ]-final) → @deva[अदुः], @deva[अस्थुः]. When @deva[सिच्] is retained: @deva[अकार्षुः], @deva[अहार्षुः] (@deva[जुस्] applies per @ref[3.4.109]).
"""

id = "3.4.5"
numericId = "34005"

[en]
simple = """
For the enumeration construction (@ref[3.4.3]), the main verb should express a meaning common to all the listed imperatives. Example: @deva[ओदनं भुङ्क्ष्व, सक्तून् पिब, धानाः खाद इत्य् एवायम् अभ्यवहरति] 'he takes food - eating rice, drinking saktu, chewing fried grain'. Here @deva[अभ्यवहरति] (to consume) encompasses eating, drinking, and chewing.
"""

standard = """
For @deva[समुच्चय] (@ref[3.4.3]), the main verb should have a sense subsuming all the listed actions. Example: @deva[ओदनं भुङ्क्ष्व, सक्तून् पिब, धानाः खाद इत्य् एवायम् अभ्यवहरति] - the verb @deva[अभ्यवहरति] 'he consumes' is hypernymic to @deva[भुज्] (eat), @deva[पा] (drink), @deva[खाद्] (chew). This avoids repeating each verb separately. However, in colloquial usage, such brevity is often avoided.
"""

advanced = """
For @deva[समुच्चय] (@ref[3.4.3]), the @deva[उत्तरपद] should express @deva[सामान्यार्थ] (generic sense) covering all listed @deva[लोट्] verbs. Example: @deva[ओदनं भुङ्क्ष्व, सक्तून् पिब, धानाः खाद इत्य् एवायम् अभ्यवहरति] - @deva[अभ्यवहृ] subsumes @deva[भुज्], @deva[पा], @deva[खाद्]. The purpose is to prevent @deva[पुनरुक्ति] (repetition) of multiple verbs. Böhtlingk notes this brevity (@deva[लाघव]) is often avoided in @deva[लौकिक] usage.
"""

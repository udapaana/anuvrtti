id = "3.4.60"
numericId = "34060"

[en]
simple = """
Both @deva[क्त्वा] and @deva[णमुल्] come after @deva[कृ] 'to make' when @deva[तिर्यक्] (an indeclinable meaning 'sideways/obliquely') is compounded and the sense is 'completing/finishing' (@deva[अपवर्ग]). Example: @deva[तिर्यक्] @deva[कृत्य], @deva[तिर्यक्] @deva[कृत्वा], or @deva[तिर्यक्कारं] @deva[गतः] = @deva[समाप्य] @deva[गतः] 'having finished, he went'. Without @deva[अपवर्ग] sense: @deva[तिर्यक्] @deva[कृत्वा] @deva[काष्ठं] @deva[गतः] 'having placed the wood obliquely, he went'—here @deva[णमुल्] doesn't apply.
"""

standard = """
@deva[क्त्वा]/@deva[णमुल्] apply after @deva[कृ] with @deva[तिर्यक्] @deva[उपपद] when @deva[अपवर्ग] (completion/finishing) is meant. @deva[तिर्यक्] @deva[कृत्य]/@deva[तिर्यक्] @deva[कृत्वा]/@deva[तिर्यक्कारं] @deva[गतः] = @deva[समाप्य] @deva[गतः] 'having completed, went away'. Without @deva[अपवर्ग]: @deva[तिर्यक्] @deva[कृत्वा] @deva[काष्ठं] @deva[गतः] 'having placed wood obliquely, went' (only @deva[क्त्वा], not @deva[णमुल्]). @ref[2.2.22] governs compounding.
"""

advanced = """
@deva[कृ] with @deva[तिर्यक्] takes @deva[क्त्वा]/@deva[णमुल्] when @deva[अपवर्ग] (completion) is intended. @deva[तिर्यक्] @deva[कृत्य]/@deva[कृत्वा]/@deva[तिर्यक्कारं] @deva[गतः] = @deva[समाप्य] @deva[गतः]. The @deva[तिर्यचि] in the @[sūtra] is locative of the @deva[शब्दरूप] @deva[तिर्यच्], not the @deva[पद] @deva[तिर्यच्] (cf. @deva[एतदोश्] @ref[5.3.5], @deva[अदसो] @deva[मात्] @ref[1.1.12] for parallel word-form citations). Without @deva[अपवर्ग]: @deva[तिर्यक्] @deva[कृत्वा] @deva[काष्ठं] @deva[गतः] (literal 'obliquely'—only @deva[क्त्वा]). @ref[2.2.22] for @deva[समास].
"""

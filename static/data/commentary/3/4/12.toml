id = "3.4.12"
numericId = "34012"

[en]
simple = """
In Vedic, when governed by @deva[शक्] 'to be able', infinitives are formed with @deva[णमुल्] or @deva[कमुल्]. In @deva[णमुल्], @deva[ण्] causes @deva[वृद्धि] (@ref[7.2.115]), @deva[ल्] regulates accent (@ref[6.1.193]). In @deva[कमुल्], @deva[क्] prevents @deva[गुण]/​@deva[वृद्धि] (@ref[1.1.5]). Examples: @deva[अग्निं वै देवा विभाजं नाशक्नुवन्] 'the gods could not divide Agni' (@deva[विभाजम्] = @deva[विभक्तुम्]); @deva[अपलुपं नाशक्नुवन्] = @deva[अपलोप्तुम्].
"""

standard = """
In @deva[छन्दस्] with @deva[शक्] (to be able), infinitives take @deva[णमुल्] or @deva[कमुल्] instead of @deva[तुमुन्]. @deva[णमुल्]: real affix is @deva[अम्]; @deva[ण्] triggers @deva[वृद्धि] (@ref[7.2.115]); @deva[ल्] sets accent (@ref[6.1.193]). @deva[कमुल्]: @deva[क्] blocks @deva[गुण]/​@deva[वृद्धि] (@ref[1.1.5]). Examples: @deva[विभज्] + @deva[णमुल्] = @deva[विभाजम्] = @deva[विभक्तुम्] (@deva[अग्निं वै देवा विभाजं नाशक्नुवन्] 'gods couldn't divide Agni'); @deva[अपलुपम्] = @deva[अपलोप्तुम्] (@deva[अपलुपं नाशक्नुवन्]).
"""

advanced = """
With @deva[शक्] in @deva[छन्दस्], @deva[तुमर्थ] is expressed by @deva[णमुल्] or @deva[कमुल्]. @deva[णमुल्]: affix @deva[अम्]; @deva[ण्] → @deva[वृद्धि] (@ref[7.2.115]); @deva[ल्] → accent (@ref[6.1.193]). @deva[कमुल्]: @deva[क्] → @deva[क्ङिति] blocks @deva[गुण]/​@deva[वृद्धि]. Derivations: @deva[विभज्] + @deva[णमुल्] = @deva[विभाजम्] (= @deva[विभक्तुम्]): @deva[अग्निं वै देवा विभाजं नाशक्नुवन्]. @deva[अप] + @deva[लुप्] + @deva[कमुल्] = @deva[अपलुपम्] (= @deva[अपलोप्तुम्], no @deva[गुण] due to @deva[क्]).
"""

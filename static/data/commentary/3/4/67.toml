id = "3.4.67"
numericId = "34067"

[en]
simple = """
The @deva[कृत्] affixes (verb-deriving suffixes) denote the agent (@deva[कर्तृ]) when no special sense is assigned elsewhere. Examples: @deva[कारकः] 'doer', @deva[कर्ता] 'maker', @deva[नन्दनः] 'one who causes joy', @deva[ग्राही] 'seizer', @deva[पचः] 'cook'. This default applies to affixes like @deva[ण्वुल्], @deva[तृच्] (@ref[3.1.133]), but not to affixes with specially assigned senses like @deva[ख्युन्] (@ref[3.2.5]–6).
"""

standard = """
@deva[कृत्] affixes denote @deva[कर्तृ] (agent) as their default meaning. This @deva[उत्सर्ग] applies when no @deva[अपवाद] assigns a specific sense. @deva[कारकः] 'doer' (@deva[ण्वुल्]); @deva[कर्ता] 'agent' (@deva[तृच्]); @deva[नन्दनः] 'joy-causer'; @deva[ग्राही] 'seizer'; @deva[पचः] 'cook'. Doesn't apply to @deva[कृत्] affixes with assigned senses: @deva[ख्युन्] (@ref[3.2.5]–6), etc.
"""

advanced = """
@deva[कृत्]-pratyayas denote @deva[कर्तृ] by default (@deva[उत्सर्ग]). Examples: @deva[कारकः] (@deva[ण्वुल्]), @deva[कर्ता] (@deva[तृच्] @ref[3.1.133]), @deva[नन्दनः], @deva[ग्राही], @deva[पचः]. Inapplicable to pratyayas with specific sense-assignments: @deva[ख्युन्] (@ref[3.2.5]–6), etc. This establishes the default @deva[कारकार्थ] for @deva[कृदन्त] formation.
"""

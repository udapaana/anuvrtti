id = "3.4.87"
numericId = "34087"

[en]
simple = """
In @deva[लोट्] (imperative), @deva[सि] (2nd singular @deva[परस्मैपद]) is replaced by @deva[हि], and this @deva[हि] is treated as @deva[अपित्] (without indicatory @deva[प्]). Since @deva[सिप्] has indicatory @deva[प्], the substitute would normally inherit this (@ref[1.1.56]), but this @[sūtra] explicitly states @deva[हि] is @deva[अपित्]. Being @deva[अपित्], it becomes @deva[ङित्] (@ref[1.2.4]), preventing @deva[गुण]. Examples: @deva[लुनीहि], @deva[पुनीहि], @deva[राध्नुहि], @deva[तक्ष्णुहि].
"""

standard = """
In @deva[लोट्], @deva[सि] → @deva[हि] with @deva[अपित्] status. By @ref[1.1.56], the substitute would inherit @deva[पित्] from @deva[सिप्], but the @[sūtra] explicitly marks @deva[हि] as @deva[अपित्]. Being @deva[अपित्], @ref[1.2.4] makes it @deva[ङित्], blocking @deva[गुण]. @deva[लुनीहि], @deva[पुनीहि], @deva[राध्नुहि], @deva[तक्ष्णुहि].
"""

advanced = """
@deva[लोट्] @deva[सि] → @deva[हि], explicitly @deva[अपित्] (overriding @deva[स्थानिवद्भाव] @ref[1.1.56] which would inherit @deva[पित्] from @deva[सिप्]). Being @deva[अपित्], @ref[1.2.4] assigns @deva[ङित्]-status, preventing @deva[गुण]. @deva[लुनीहि], @deva[पुनीहि], @deva[राध्नुहि], @deva[तक्ष्णुहि].
"""

id = "3.4.77"
numericId = "34077"

[en]
simple = """
This is an @deva[अधिकार] (governing) rule. It states that in the following @[sūtras], various affixes will be substituted for @deva[ल] (the abstract tense/mood marker). The ten @deva[ल]-affixes are: @deva[लट्] (present), @deva[लिट्] (perfect), @deva[लुट्] (first future), @deva[लृट्] (second future), @deva[लोट्] (imperative), @deva[लेट्] (Vedic subjunctive), @deva[लङ्] (imperfect), @deva[लिङ्] (potential/benedictive), @deva[लुङ्] (aorist), @deva[लृङ्] (conditional). Six have indicatory @deva[ट्] and four have indicatory @deva[ङ्].
"""

standard = """
This @deva[अधिकार] @[sūtra] governs subsequent rules. @deva[लस्य] (genitive of @deva[ल]) indicates that substitutes will replace @deva[ल]. The @deva[अ] in @deva[ल] is for pronunciation. @deva[ल] denotes the ten @deva[लकार]s: @deva[लट्] (present), @deva[लिट्] (perfect), @deva[लुट्] (periphrastic future), @deva[लृट्] (simple future), @deva[लोट्] (imperative), @deva[लेट्] (Vedic subjunctive), @deva[लङ्] (imperfect), @deva[लिङ्] (optative/benedictive), @deva[लुङ्] (aorist), @deva[लृङ्] (conditional). Six are @deva[टित्] (@deva[लट्], @deva[लिट्], @deva[लुट्], @deva[लृट्], @deva[लोट्], @deva[लेट्]); four are @deva[ङित्] (@deva[लङ्], @deva[लिङ्], @deva[लुङ्], @deva[लृङ्]).
"""

advanced = """
@deva[अधिकारसूत्र] establishing @deva[लस्य] (genitive singular of @deva[ल्], with euphonic @deva[अ]). Per Böhtlingk: 'in the following @[sūtras], supply @deva[लस्य]—i.e., affixes substituting for personal endings known collectively as @deva[ल].' The ten @deva[लकार]s: @deva[लट्] (present), @deva[लिट्] (perfect), @deva[लुट्] (1st future), @deva[लृट्] (2nd future), @deva[लोट्] (imperative), @deva[लेट्] (Vedic subjunctive), @deva[लङ्] (imperfect), @deva[लिङ्] (optative/precative), @deva[लुङ्] (aorist), @deva[लृङ्] (conditional). @deva[टित्]: @deva[लट्]–@deva[लेट्]; @deva[ङित्]: @deva[लङ्]–@deva[लृङ्].
"""

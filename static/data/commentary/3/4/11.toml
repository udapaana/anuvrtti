id = "3.4.11"
numericId = "34011"

[en]
simple = """
Two more irregular Vedic infinitives: @deva[दृशे] = @deva[द्रष्टुम्] 'to see' (as in @deva[दृशे विश्वाय सूर्यम्] 'to see the sun for all', RV I.50.1); @deva[विख्ये] = @deva[विख्यातुम्] 'to proclaim' (as in @deva[विख्ये त्वा हरामि] 'I carry you to proclaim').
"""

standard = """
@deva[निपातन] for two Vedic infinitives: (1) @deva[दृशे] (RV I.50.1): @deva[दृशे विश्वाय सूर्यम्] = @deva[द्रष्टुम्] 'to see the sun for all'; (2) @deva[विख्ये]: @deva[विख्ये त्वा हरामि] = @deva[विख्यातुम्] 'I carry you to proclaim'. Both are irregular formations.
"""

advanced = """
@deva[निपातन]: (1) @deva[दृशे] (RV I.50.1) = @deva[द्रष्टुम्] (@deva[दृशे विश्वाय सूर्यम्]); (2) @deva[विख्ये] = @deva[विख्यातुम्] (@deva[विख्ये त्वा हरामि]). These irregular infinitives are individually listed as they cannot be derived by regular rules.
"""

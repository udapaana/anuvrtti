id = "3.4.97"
numericId = "34097"

[en]
simple = """
In Vedic texts, @deva[परस्मैपद] endings may also remain as @deva[परस्मैपद] even after @deva[मा].
"""

standard = """
In Vedic usage, the substitution of @deva[आत्मनेपद] for @deva[परस्मैपद] after @deva[मा] is optional—@deva[परस्मैपद] endings may be retained. Thus both @deva[मा] @deva[कृथाः] (@deva[आत्मनेपद]) and @deva[मा] @deva[कृधि] (@deva[परस्मैपद]) are possible in the Vedas.
"""

advanced = """
This @[sūtra] makes the @deva[आत्मनेपद] substitution after @deva[मा] optional in Vedic texts. While @ref[3.4.96] mandates @deva[आत्मनेपद] after @deva[मा] in classical Sanskrit, the Vedas permit both padas. The @deva[परस्मैपद] of @deva[लोट्] continues in @[anuvṛtti] from @ref[3.4.85] for context.
"""

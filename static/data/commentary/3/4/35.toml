id = "3.4.35"
numericId = "34035"

[en]
simple = """
@deva[णमुल्] is added to @deva[पिष्] (to grind) when @deva[शुष्क] (dry), @deva[चूर्ण] (powder), or @deva[रूक्ष] (rough/dry) is in accusative composition. Examples: @deva[शुष्कपेषं पिनष्टि] = @deva[शुष्कं पिनष्टि] 'grinds it dry'; @deva[चूर्णपेषं पिनष्टि] 'grinds to powder'; @deva[रूक्षपेषं पिनष्टि] 'grinds it rough/dry'. Same-root verb required.
"""

standard = """
@deva[णमुल्] after @deva[पिष्] with @deva[शुष्क]/​@deva[चूर्ण]/​@deva[रूक्ष] in @deva[द्वितीया] composition. @deva[शुष्कपेषं पिनष्टि] = @deva[शुष्कं पिनष्टि] 'grinds dry'; @deva[चूर्णपेषं पिनष्टि] 'grinds to powder'; @deva[रूक्षपेषं पिनष्टि] 'grinds rough'. Per @ref[3.4.46], the governing verb must be from @deva[पिष्].
"""

advanced = """
@deva[णमुल्] after @deva[पिष्] with @deva[शुष्क]/​@deva[चूर्ण]/​@deva[रूक्ष] @deva[द्वितीयान्त उपपद]. @deva[शुष्कपेषं पिनष्टि], @deva[चूर्णपेषं पिनष्टि], @deva[रूक्षपेषं पिनष्टि]. The @deva[उपपद] specifies the resultant state (dry) or form (powder) of grinding. @deva[सधातुक अनुप्रयोग] applies (@ref[3.4.46]).
"""

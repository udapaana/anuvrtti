id = "3.4.39"
numericId = "34039"

[en]
simple = """
@deva[णमुल्] is added to @deva[वर्ति] (causative of @deva[वृत्]) and @deva[ग्रह्] when a word meaning 'hand' in the instrumental is in composition. Examples: @deva[हस्तवर्तं वर्तयति] = @deva[हस्तेन वर्तयति] 'revolves by hand'; @deva[हस्तग्राहं गृह्णाति] 'takes by the hand'; similarly @deva[पाणिवर्तम्], @deva[करग्राहम्]. Same-root verbs required.
"""

standard = """
@deva[णमुल्] after @deva[वर्ति] (causative of @deva[वृत्]) and @deva[ग्रह्] with @deva[हस्तवाचिन्] (hand-denoting) @deva[तृतीयान्त उपपद]. @deva[हस्तवर्तं वर्तयति], @deva[करवर्तं वर्तयति], @deva[पाणिवर्तं वर्तयति] = @deva[हस्तेन वर्तयति] 'spins by hand'. @deva[हस्तग्राहं गृह्णाति], @deva[पाणिग्राहम्], @deva[करग्राहम्] 'takes by the hand'. @deva[सधातुक अनुप्रयोग] applies.
"""

advanced = """
@deva[णमुल्] after @deva[वर्ति] (@deva[वृत्] + @deva[णिच्]) and @deva[ग्रह्] with @deva[हस्तवाचिन्] @deva[तृतीयान्त उपपद]. @deva[हस्तवर्तं]/​@deva[करवर्तं]/​@deva[पाणिवर्तं वर्तयति] 'revolves manually'. @deva[हस्तग्राहं]/​@deva[पाणिग्राहं]/​@deva[करग्राहं गृह्णाति] 'grasps by hand'. @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

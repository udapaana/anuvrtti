id = "3.4.99"
numericId = "34099"

[en]
simple = """
For verb forms marked with @deva[ङ्] (like @deva[लङ्], @deva[लुङ्], @deva[लिङ्], @deva[लृङ्]), the final @deva[स्] of first person endings is always dropped.
"""

standard = """
When the @[lakāra] has indicatory @deva[ङ्] (@deva[लङ्], @deva[लिङ्], @deva[लुङ्], @deva[लृङ्]), the @deva[स्] of first person endings is obligatorily (not optionally) elided. Thus @deva[अपचाव], @deva[अपचाम] (not @deva[अपचावः], @deva[अपचामः]). The word @deva[नित्यम्] 'always' blocks the @[anuvṛtti] of 'optionally' from the previous @[sūtra].
"""

advanced = """
This @[sūtra] mandates @deva[स्]-elision in @deva[उत्तमपुरुष] for all @deva[ङित्] @[lakāras]: @deva[लङ्] (imperfect), @deva[लिङ्] (optative/benedictive), @deva[लुङ्] (aorist), @deva[लृङ्] (conditional). The term @deva[नित्यम्] makes this obligatory, overriding the optionality of @ref[3.4.98]. Forms: @deva[अपचाव] (1st dual imperfect), @deva[अपचाम] (1st plural imperfect).
"""

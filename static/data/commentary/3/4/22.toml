id = "3.4.22"
numericId = "34022"

[en]
simple = """
@deva[णमुल्] and @deva[क्त्वा] express reiteration (@deva[आवृत्ति]) when the verb is doubled. The same-agent and prior-action conditions from @ref[3.4.21] apply. Examples: @deva[भोजं भोजं व्रजति] 'having eaten repeatedly, he goes'; @deva[भुक्त्वा भुक्त्वा व्रजति] (same meaning); @deva[पायं पायं व्रजति] 'having drunk repeatedly, he goes'. See @ref[8.1.4] for the doubling rule.
"""

standard = """
@deva[णमुल्] and @deva[क्त्वा] express @deva[आवृत्ति] (reiteration) with verb doubling. The @deva[समानकर्तृक] and @deva[पूर्वकाल] conditions continue from @ref[3.4.21]. The @deva[च] introduces @deva[क्त्वा] alongside @deva[णमुल्]. Examples: @deva[भोजं भोजं व्रजति] 'repeatedly eating, he goes'; @deva[भुक्त्वा भुक्त्वा व्रजति]; @deva[पायं पायं व्रजति]. The doubling is essential - single usage doesn't convey reiteration. See @ref[8.1.4].
"""

advanced = """
@deva[णमुल्] and @deva[क्त्वा] (via @deva[च]) for @deva[आवृत्ति] with doubling. @deva[अनुवृत्ति] of @deva[समानकर्तृक] and @deva[पूर्वकाल] from @ref[3.4.21]. The affixes convey reiteration only when doubled (@ref[8.1.4]); single usage doesn't. Examples: @deva[भोजं भोजं व्रजति], @deva[भुक्त्वा भुक्त्वा व्रजति], @deva[पायं पायं व्रजति]. This is distinct from @deva[यङन्त] (intensive) where frequentative meaning is lexically inherent without doubling.
"""

id = "3.4.38"
numericId = "34038"

[en]
simple = """
@deva[णमुल्] is added to @deva[पिष्] (to grind) when a word meaning 'liquid' in the instrumental is in composition. Examples: @deva[उदपेषं पिनष्टि] (@ref[6.3.58]) = @deva[उदकेन पिनष्टि] 'grinds with water'; @deva[तैलपेषं पिनष्टि] 'grinds with oil'. Same-root verb required.
"""

standard = """
@deva[णमुल्] after @deva[पिष्] with @deva[द्रववाचिन्] (liquid-denoting) @deva[तृतीयान्त उपपद]. @deva[उदपेषं पिनष्टि] (by @ref[6.3.58]) = @deva[उदकेन पिनष्टि] 'grinds with water'; @deva[तैलपेषं पिनष्टि] 'grinds with oil'. @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

advanced = """
@deva[णमुल्] after @deva[पिष्] with @deva[द्रववाचिन्] @deva[तृतीयान्त उपपद]. @deva[उदपेषम्] (@deva[उदक] + @deva[पेषम्] by @ref[6.3.58]); @deva[तैलपेषम्]. The liquid serves as the medium for grinding. @deva[सधातुक अनुप्रयोग] applies (@ref[3.4.46]).
"""

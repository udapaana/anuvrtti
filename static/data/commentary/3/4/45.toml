id = "3.4.45"
numericId = "34045"

[en]
simple = """
@deva[णमुल्] is added after a root when an object or agent of comparison (@deva[उपमान]) is in composition. Example with object: @deva[घृतनिधायं निहितं जलम्] 'water was kept as ghee would be kept' = @deva[घृतम् इव निहितम्]. Example with agent: @deva[अजनाशं नष्टः] 'he perished like a goat' (@deva[अज] as agent); similarly @deva[चूडकनाशम्], @deva[दन्तनाशम्].
"""

standard = """
@deva[णमुल्] with @deva[उपमानवाचिन्] (comparison-denoting) @deva[कर्मन्] or @deva[कर्तृ] (via @deva[च]). @deva[उपमान] = standard of comparison (= @deva[इव]). With @deva[कर्म]: @deva[घृतनिधायं निहितं जलम्] = @deva[घृतम् इव निहितम्] 'water kept like ghee'; @deva[सुवर्णनिधायं निहितः] 'kept like gold'. With @deva[कर्तृ]: @deva[अजनाशं नष्टः] 'perished like a goat'; @deva[चूडकनाशम्], @deva[दन्तनाशम्].
"""

advanced = """
@deva[णमुल्] with @deva[उपमानवाचिन्] @deva[कर्मन्] or @deva[कर्तृ] (latter by @deva[च]). @deva[उपमान] = object of comparison, conveying @deva[इव]-sense. @deva[कर्म] example: @deva[घृतनिधायं निहितं जलम्] = @deva[घृतम् इव निहितम्]; @deva[सुवर्णनिधायम्]. @deva[कर्तृ] example: @deva[अजनाशं नष्टः] 'perished goat-like'; @deva[चूडकनाशम्], @deva[दन्तनाशम्]. The @deva[णमुल्]-compound expresses manner via comparison.
"""

id = "3.4.9"
numericId = "34009"

[en]
simple = """
In Vedic, fifteen special infinitive affixes replace @deva[तुमुन्]: @deva[से], @deva[सेन्], @deva[असे], @deva[असेन्], @deva[क्से], @deva[क्सेन्], @deva[अध्यै], @deva[अध्यैन्], @deva[कध्यै], @deva[कध्यैन्], @deva[शध्यै], @deva[शध्यैन्], @deva[तवै], @deva[तवेङ्], @deva[तवेन्]. Examples: @deva[जीवसे] 'to live' (RV III.36.10), @deva[पिबध्यै] 'to drink' (RV IV.27.5), @deva[सूतवे] 'to beget' (RV X.184.3).
"""

standard = """
Fifteen Vedic infinitive affixes with @deva[तुमर्थ] (infinitive sense = @deva[भाव]): The @deva[इत्] letters are @deva[न्] (first-syllable @deva[उदात्त] by @ref[6.1.197]), @deva[क्] (blocks @deva[गुण]/​@deva[वृद्धि]), @deva[श्] (makes @deva[सार्वधातुक], triggering @deva[विकरण]), @deva[ङ्] (accent). The five real affixes: (1) @deva[से] (@deva[से], @deva[सेन्], @deva[क्से]); (2) @deva[असे] (@deva[असे], @deva[असेन्], @deva[कसेन्]); (3) @deva[अध्यै] (@deva[अध्यै], @deva[अध्यैन्], @deva[कध्यै], @deva[कध्यैन्], @deva[शध्यै], @deva[शध्यैन्]); (4) @deva[तवै]; (5) @deva[तवे] (@deva[तवेङ्], @deva[तवेन्]). Examples: @deva[जीवसे] (RV III.36.10, X.57.4), @deva[आहुवध्यै] (RV VI.60.13), @deva[पिबध्यै] (RV IV.27.5), @deva[सूतवे] (RV X.184.3), @deva[गन्तवे] (RV I.46.7).
"""

advanced = """
Fifteen Vedic @deva[तुमर्थ] affixes classified by @deva[इत्]: @deva[न्] triggers @ref[6.1.197] (@deva[आद्युदात्त]); @deva[क्] blocks @deva[गुण]/​@deva[वृद्धि] (@ref[1.1.5]); @deva[श्] makes @deva[सार्वधातुक] (root takes class @deva[विकरण]); @deva[ङ्] regulates accent. Real affixes: @deva[से], @deva[असे], @deva[अध्यै], @deva[तवै], @deva[तवे]. @deva[से] = @deva[से], @deva[सेन्], @deva[क्से]. @deva[असे] = @deva[असे], @deva[असेन्], @deva[कसेन्]. @deva[अध्यै] = @deva[अध्यै], @deva[अध्यैन्], @deva[कध्यै], @deva[कध्यैन्], @deva[शध्यै], @deva[शध्यैन्]. @deva[तवै] has dual accent (@ref[6.1.200], @ref[6.2.51]). Examples: @deva[वक्षे रायः]; @deva[तवामेषे स्थानाम्] (RV V.66.3); @deva[जीवसे] (RV III.36.10); @deva[श्रियसे] (RV V.59.3); @deva[आहुवध्यै] (RV VI.60.13); @deva[पिबध्यै] (RV IV.27.5); @deva[पातवै]; @deva[सूतवे] (RV X.184.3); @deva[गन्तवे] (RV I.46.7).
"""

id = "3.4.21"
numericId = "34021"

[en]
simple = """
When two actions have the same agent, @deva[क्त्वा] is added to the verb whose action occurs first in time. Example: @deva[भुक्त्वा व्रजति] 'having eaten, he goes' - eating precedes going. Multiple gerunds: @deva[स्नात्वा पीत्वा भुक्त्वा दत्वा व्रजति] 'having bathed, drunk, eaten, and given, he goes'. Different agents require locative absolute: @deva[भुक्तवति ब्राह्मणे गच्छति देवदत्तः] 'the Brahmin having eaten, Devadatta goes'. Simultaneous actions use @deva[च]: @deva[व्रजति च जल्पति च] 'he goes and chatters'.
"""

standard = """
@deva[क्त्वा] attaches to the root of the temporally prior action when @deva[समानकर्तृक] (same agent). @deva[भुक्त्वा व्रजति] 'having eaten, he goes'. Multiple: @deva[स्नात्वा पीत्वा भुक्त्वा दत्वा व्रजति]. Conditions: (1) @deva[समानकर्तृक] - different agents require @deva[सप्तमी] absolute (@deva[भुक्तवति ब्राह्मणे गच्छति देवदत्तः]); (2) @deva[पूर्वकाल] - coeval actions use @deva[च] (@deva[व्रजति च जल्पति च]).

@[vārtika]: @deva[आस्यं व्यादाय स्वपिति] 'he sleeps with mouth open', @deva[सम्मील्य हसति] 'he laughs with eyes closed' - valid despite gerund not denoting strictly prior action (manner/concomitance).
"""

advanced = """
@deva[क्त्वा] after the @deva[पूर्वकालिन्] (temporally prior) root when @deva[समानकर्तृक]. @deva[भुक्त्वा व्रजति], @deva[पीत्वा व्रजति]. The rule extends to chains: @deva[स्नात्वा पीत्वा भुक्त्वा दत्वा व्रजति]. Conditions: @deva[समानकर्तृक] - otherwise @deva[सप्तम्यन्त] @deva[क्त्वन्त] (@deva[भुक्तवति ब्राह्मणे गच्छति देवदत्तः]); @deva[पूर्वकाल] - otherwise coordinate @deva[च] (@deva[व्रजति च जल्पति च] for simultaneous actions).

@note[type=@[vārtika]]: @deva[आस्यं व्यादाय स्वपिति], @deva[सम्मील्य हसति] are valid - the gerund expresses manner/concomitant circumstance, not strict temporal priority.
"""

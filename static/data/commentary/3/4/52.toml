id = "3.4.52"
numericId = "34052"

[en]
simple = """
The affix @deva[णमुल्] is added when an ablative-case (fifth case) word is compounded and haste (@deva[परीप्सा]) is expressed. Example: @deva[शय्योत्थायं] @deva[धावति] 'having risen from bed, he runs'—so hastily that he skips ablutions. Alternatively: @deva[शय्याया] @deva[उत्थायं] (uncompounded ablative). Similarly: @deva[रन्ध्रापकर्षम्] @deva[पयः] @deva[पिबति] 'he drinks milk from a hole'—too hurried to use the proper opening; @deva[भ्राष्ट्रापकर्षमपूपान्] @deva[भक्षयति] 'he eats cakes straight from the pan'. Without haste: @deva[आसनादुत्थाय] @deva[गच्छति] uses @deva[क्त्वा]/@deva[ल्यप्] instead.
"""

standard = """
@deva[णमुल्] applies with @[pañcamī] @deva[उपपद] when @deva[परीप्सा] (haste/hurry) is meant. @deva[शय्योत्थायं] @deva[धावति] 'he runs immediately upon rising from bed'—omitting even ablutions. Optionally uncompounded (@ref[2.2.21]): @deva[शय्याया] @deva[उत्थायम्]. @deva[रन्ध्रापकर्षम्] @deva[पयः] @deva[पिबति] 'drinks milk from a hole in the vessel' (too rushed for proper aperture). @deva[भ्राष्ट्रापकर्षमपूपान्] @deva[भक्षयति] 'eats cakes hot from the frying pan'. Without @deva[परीप्सा], regular @deva[क्त्वा]/@deva[ल्यप्] applies: @deva[आसनादुत्थाय] @deva[गच्छति].
"""

advanced = """
@[pañcamī] @deva[उपपद] with @deva[परीप्सा] (haste) triggers @deva[णमुल्]. @deva[शय्योत्थायम्] (or @deva[शय्याया] @deva[उत्थायम्]) @deva[धावति] 'runs upon rising from bed'—such haste that ablutions are omitted. @deva[रन्ध्रापकर्षम्] @deva[पयः] @deva[पिबति] 'drinks milk from a hole' (bypassing proper opening). @deva[भ्राष्ट्रापकर्षमपूपान्] @deva[भक्षयति] 'eats cakes directly from pan'. Absent @deva[परीप्सा], use @deva[क्त्वा]/@deva[ल्यप्]: @deva[आसनादुत्थाय] @deva[गच्छति]. @ref[2.2.21] for optional @deva[समास].
"""

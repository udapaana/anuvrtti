id = "3.4.101"
numericId = "34101"

[en]
simple = """
In @deva[ङ्]-marked tenses, the endings @deva[तस्], @deva[थस्], @deva[थ], and @deva[मिप्] are replaced by @deva[ताम्], @deva[तम्], @deva[त], and @deva[आम्] respectively.
"""

standard = """
For @deva[ङित्] @[lakāras], four @deva[परस्मैपद] endings undergo substitution: @deva[तस्] → @deva[ताम्], @deva[थस्] → @deva[तम्], @deva[थ] → @deva[त], @deva[मिप्] → @deva[आम्]. Examples: @deva[अपचताम्] (3rd dual), @deva[अपचतम्] (2nd dual), @deva[अपचत] (2nd plural), @deva[अपचम्] (1st singular aorist @deva[अपाक्षम्]).
"""

advanced = """
This @[sūtra] provides specific substitutes for four @deva[परस्मैपद] endings in @deva[ङित्] @[lakāras]: (1) @deva[तस्] (3rd dual) → @deva[ताम्], (2) @deva[थस्] (2nd dual) → @deva[तम्], (3) @deva[थ] (2nd plural) → @deva[त], (4) @deva[मिप्] (1st singular) → @deva[आम्]. The @deva[आम्] substitute for @deva[मिप्] combines with prior @deva[स्]-elision to yield forms like @deva[अपचम्], @deva[अपाक्षम्]. Compare the standard @deva[लट्] paradigm where @deva[मिप्] → @deva[मि].
"""

id = "3.4.79"
numericId = "34079"

[en]
simple = """
In the six @deva[टित्] tenses (@deva[लट्], @deva[लिट्], @deva[लुट्], @deva[लृट्], @deva[लोट्], @deva[लेट्]), the final @deva[टि] portion of @deva[आत्मनेपद] endings is replaced by @deva[ए]. So @deva[त] → @deva[ते], @deva[आताम्] → @deva[आते], @deva[झ] → @deva[अन्ते] (via @deva[झे]), etc. This rule applies only to @deva[तिङ्] affixes (the 18 personal endings), not to participial affixes like @deva[शानच्] and @deva[कानच्] (hence @deva[पचमानः], @deva[यजमानः] retain @deva[आन], not @deva[ए]).
"""

standard = """
In @deva[टित्] @deva[ल]s (six tenses with indicatory @deva[ट्]: @deva[लट्], @deva[लिट्], @deva[लुट्], @deva[लृट्], @deva[लोट्], @deva[लेट्]), @deva[ए] replaces the @deva[टि] (final vowel + following consonant) of @deva[आत्मनेपद] substitutes. @deva[त] → @deva[ते]; @deva[आताम्] → @deva[आते]; @deva[झ] → @deva[झे] (→ @deva[अन्ते]). The term @deva[आत्मनेपदानाम्] refers contextually to @deva[तिङ्]-included @deva[आत्मनेपद] only—so @deva[शानच्]/@deva[कानच्] (also @deva[आत्मनेपद]) don't undergo this: @deva[पचमानः], @deva[यजमानः].
"""

advanced = """
@deva[टित्] @deva[ल]s (@deva[लट्]/@deva[लिट्]/@deva[लुट्]/@deva[लृट्]/@deva[लोट्]/@deva[लेट्]) trigger @deva[ए]-substitution for @deva[टि] of @deva[आत्मनेपद] @deva[तिङ्]. @deva[त] → @deva[ते]; @deva[आताम्] → @deva[आते]; @deva[झ] → @deva[झे] (→ @deva[अन्ते] by @ref[7.1.3]ff.). @deva[आत्मनेपदानाम्] contextually = @deva[तिङ्]-@[pratyāhāra-included] affixes. Hence @deva[शानच्]/@deva[कानच्] (participial @deva[आत्मनेपद]) unaffected: @deva[पचमानः], @deva[यजमानः].
"""

id = "3.4.112"
numericId = "34112"

[en]
simple = """
According to @deva[शाकटायन], @deva[जुस्] also replaces @deva[झि] in the imperfect of the root @deva[द्विष्] 'to hate'.
"""

standard = """
Per @deva[शाकटायन], @deva[जुस्] optionally replaces @deva[झि] in @deva[लङ्] of @deva[द्विष्] 'to hate'. Thus @deva[अद्विषुः] (@[śākaṭāyana]'s form) or @deva[अद्विषन्] (others' view).
"""

advanced = """
This @[sūtra] extends @deva[शाकटायन]'s @deva[जुस्] option to @deva[द्विष्] in @deva[लङ्], though @deva[द्विष्] is not @deva[आ]-final. This is a separate provision: @deva[अद्विषुः] (@deva[शाकटायन]) vs. @deva[अद्विषन्] (others). The continued @deva[एव] from @ref[3.4.111] marks this as @deva[शाकटायन]-specific.
"""

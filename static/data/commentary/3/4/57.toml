id = "3.4.57"
numericId = "34057"

[en]
simple = """
The affix @deva[णमुल्] comes after @deva[अस्] 'to throw' and @deva[तृष्] 'to be thirsty' when an accusative word denoting time is compounded and intermission of action (@deva[क्रियान्तर]) is expressed. Example: @deva[द्व्यहात्यासं] @deva[गाः] @deva[पाययति] 'he waters the cows every third day' (after a two-day interval). Or: @deva[द्व्यहतर्षं] @deva[गाः] @deva[पाययति] 'having kept the cows thirsty for two days, he waters them'. Without the time-interval sense, @deva[णमुल्] doesn't apply: @deva[द्व्यहमुपोष्य] @deva[भुङ्क्ते] uses @deva[क्त्वा]/@deva[ल्यप्].
"""

standard = """
@deva[अस्]/@deva[तृष्] take @deva[णमुल्] when a @[dvitīyā] time-word is compounded expressing @deva[क्रियान्तर] (interval between actions). @deva[द्व्यहात्यासं] or @deva[द्व्यहमत्यासम्] @deva[गाः] @deva[पाययति] 'waters cows after a two-day interval (every third day)'. @deva[द्व्यहतर्षं] or @deva[द्व्यहं] @deva[तर्षं] @deva[गाः] @deva[पाययति] 'waters cows after keeping them thirsty for two days'. The rule requires: (1) @deva[अस्]/@deva[तृष्], (2) time-denoting @deva[उपपद], (3) @deva[क्रियान्तर] sense. Without @deva[क्रियान्तर]: @deva[द्व्यहमुपोष्य] @deva[भुङ्क्ते] 'having fasted two days'. Space intervals also exclude: @deva[योजनमत्यस्य] @deva[गाः] @deva[पाययति] uses @deva[ल्यप्].
"""

advanced = """
@deva[अस्] (4P, 'to throw') and @deva[तृष्] (4P, 'to thirst') take @deva[णमुल्] with @[dvitīyā] @deva[कालवाचिन्] @deva[उपपद] when @deva[क्रियान्तर] (temporal interval between actions) is meant. @deva[द्व्यहात्यासम्]/@deva[द्व्यहमत्यासम्] @deva[गाः] @deva[पाययति] 'waters cows every third day'. @deva[द्व्यहतर्षम्]/@deva[द्व्यहं] @deva[तर्षम्] @deva[गाः] @deva[पाययति] 'waters after two-day thirst'. Conditions: (1) roots @deva[अस्]/@deva[तृष्] only; (2) time-denoting noun; (3) @deva[क्रियान्तर] sense. Counter-examples: @deva[द्व्यहमुपोष्य] @deva[भुङ्क्ते] (different root); @deva[योजनमत्यस्य] @deva[गाः] @deva[पाययति] (spatial, not temporal interval).
"""

id = "3.4.41"
numericId = "34041"

[en]
simple = """
@deva[णमुल्] is added to @deva[बन्ध्] (to bind) when a word expressing location is in composition. Examples: @deva[चक्रबन्धं बध्नाति] 'binds to the wheel'; @deva[कूटबन्धं बध्नाति] 'binds in a snare'; @deva[मुष्टिबन्धं बध्नाति] 'binds in the fist'; @deva[चोरकबन्धं बध्नाति] = @deva[चोरके बध्नाति] 'binds in a chorak'. Same-root verb required.
"""

standard = """
@deva[णमुल्] after @deva[बन्ध्] with @deva[आधारवाचिन्] (location-denoting) @deva[उपपद]. @deva[चक्रबन्धं बध्नाति] 'binds to wheel'; @deva[कूटबन्धं बध्नाति] 'binds in trap'; @deva[मुष्टिबन्धं बध्नाति] 'binds in fist'; @deva[चोरकबन्धं बध्नाति] = @deva[चोरके बध्नाति]. @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

advanced = """
@deva[णमुल्] after @deva[बन्ध्] with @deva[आधारवाचिन्] @deva[उपपद]. @deva[चक्रबन्धम्] (wheel), @deva[कूटबन्धम्] (snare), @deva[मुष्टिबन्धम्] (fist), @deva[चोरकबन्धम्] (chorak) - each denotes the locus of binding. @deva[सधातुक अनुप्रयोग] applies (@ref[3.4.46]).
"""

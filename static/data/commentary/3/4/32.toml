id = "3.4.32"
numericId = "34032"

[en]
simple = """
@deva[णमुल्] is added to @deva[पॄ] (to fill) when expressing rainfall measure, with optional shortening of @deva[ऊ] to @deva[अ]. Examples: @deva[गोष्पदपूरं वृष्टो देवः] or @deva[गोष्पदप्रं वृष्टो देवः] 'it rained enough to fill cow-hoofprints'; @deva[सीतापूरम्] or @deva[सीताप्रम्] 'filling furrows'. The shortening applies only to @deva[पॄ], not to any long vowel in the @deva[उपपद] (e.g., @deva[मूषिकाबिलपूरम्]/​@deva[मूषिकाबिलप्रम्] - @deva[मू] remains long).
"""

standard = """
@deva[णमुल्] after @deva[पॄ] for @deva[वृष्टिमाण] (rainfall measure), with @deva[विकल्प] shortening of the root's @deva[ऊ]. @deva[गोष्पदपूरं] or @deva[गोष्पदप्रं वृष्टो देवः] 'rained filling cow-hoofprints'; @deva[सीतापूरम्]/​@deva[सीताप्रम्] 'filling furrows'. The @deva[अस्य] in the @[sūtra] specifies: only @deva[पॄ]'s @deva[ऊ] shortens, not @deva[उपपद] vowels. Thus @deva[मूषिकाबिलपूरम्]/​@deva[मूषिकाबिलप्रम्] - the @deva[ऊ] in @deva[मूषिका] remains.
"""

advanced = """
@deva[णमुल्] after @deva[पॄ] in @deva[वृष्टिमाण] (rain-measure) sense with @deva[विकल्प] @deva[ह्रस्व] of @deva[ऊ]. @deva[गोष्पदपूरम्]/​@deva[गोष्पदप्रम्] (filling hoofprints); @deva[सीतापूरम्]/​@deva[सीताप्रम्] (filling furrows). The @deva[अस्य] (@deva[पूर्]'s) restricts shortening to the root vowel only: @deva[मूषिकाबिलपूरम्]/​@deva[मूषिकाबिलप्रम्] - @deva[मू] in @deva[उपपद] unchanged.
"""

id = "3.4.55"
numericId = "34055"

[en]
simple = """
The affix @deva[णमुल्] comes after a root when an accusative word denoting a body part that is completely affected (@deva[परिक्लिश्यमान]) is compounded. Unlike the previous rule, this applies even to vital organs. Example: @deva[उरःपेषं] @deva[युध्यन्ते] 'they fight, crushing their whole chest'; alternatively @deva[उरः] @deva[प्रतिपेषम्]. Similarly @deva[शिरःपेषं] or @deva[शिरःप्रतिपेषम्] 'crushing the head'.
"""

standard = """
@deva[णमुल्] applies when a @[dvitīyā] @deva[स्वाङ्ग] that is @deva[परिक्लिश्यमान] (completely affected/afflicted) is compounded. Unlike @ref[3.4.54], this includes vital organs (@deva[ध्रुव]). @deva[उरःपेषं] or @deva[उरः] @deva[प्रतिपेषं] @deva[युध्यन्ते] = @deva[कृत्स्नमुरः] @deva[पीडयन्तः] 'they fight afflicting their whole chest'. Similarly @deva[शिरःपेषं] or @deva[शिरःप्रतिपेषम्] 'completely crushing the head'.
"""

advanced = """
@deva[परिक्लिश्यमान] (complete affliction of the body part) conditions @deva[णमुल्] with @[dvitīyā] @deva[स्वाङ्ग]. This differs from @ref[3.4.54] in applying to @deva[ध्रुव] (vital) organs like @deva[उरस्], @deva[शिरस्]. @deva[उरःपेषं] or @deva[उरः] @deva[प्रतिपेषं] @deva[युध्यन्ते] = @deva[कृत्स्नमुरः] @deva[पीडयन्तः] 'fight crushing entire chest'. @deva[शिरःपेषं]/@deva[शिरःप्रतिपेषम्] 'crushing the head completely'.
"""

id = "3.4.44"
numericId = "34044"

[en]
simple = """
@deva[णमुल्] is added to @deva[शुष्] (to dry) and @deva[पॄ] (to fill) when @deva[ऊर्ध्व] (upward/standing) as agent is in composition. Examples: @deva[ऊर्ध्वशोषं शुष्यति वृक्षः] = @deva[ऊर्ध्वे शुष्यति] 'the tree dries standing upright'; @deva[ऊर्ध्वपूरं पूर्यते] 'is filled to the brim'. Same-root verbs required.
"""

standard = """
@deva[णमुल्] after @deva[शुष्] and @deva[पॄ] with @deva[ऊर्ध्व] as @deva[कर्तृवाचिन्] @deva[उपपद]. @deva[ऊर्ध्वशोषं शुष्यति वृक्षः] = @deva[ऊर्ध्वः शुष्यति] 'the tree dries standing' (cf. @deva[यद्वोर्ध्वशोषतृणवद्विशुष्कः] @[bhaṭṭi] III.14); @deva[ऊर्ध्वपूरं पूर्यते] 'is filled to the top/brim'. @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

advanced = """
@deva[णमुल्] after @deva[शुष्] and @deva[पॄ] with @deva[ऊर्ध्व]-@deva[कर्तृ उपपद]. @deva[ऊर्ध्वशोषं शुष्यति वृक्षः] - tree dries while upright (= @deva[ऊर्ध्वः सन् शुष्यति]); @deva[ऊर्ध्वपूरं पूर्यते] - filled to capacity/brimming. Literary attestation: @deva[यद्वोर्ध्वशोषतृणवद्विशुष्कः] (@[bhaṭṭi] III.14). @deva[सधातुक अनुप्रयोग] applies.
"""

id = "3.4.92"
numericId = "34092"

[en]
simple = """
This @deva[तात्] ending can also be used for the third person singular, optionally.
"""

standard = """
The substitute @deva[तात्] that replaces @deva[सिप्] in benedictions may optionally replace @deva[तिप्] (third person singular) as well. Thus one can say either @deva[एधतात्] (for 'may he thrive') or the regular @deva[एधतु]. The option (@deva[वा]) allows both forms.
"""

advanced = """
This @[sūtra] extends the scope of @deva[तात्] substitution: it optionally replaces @deva[तिप्] (third person singular @deva[परस्मैपद]) in addition to @deva[सिप्]. The @deva[वा] indicates optionality. Forms: @deva[एधतु] (regular) or @deva[एधतात्] (benedictive alternate), @deva[भवतु] or @deva[भवतात्]. The @deva[धातुस्वरूप] condition from @ref[3.4.91] continues in @[anuvṛtti].
"""

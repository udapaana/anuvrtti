id = "3.4.73"
numericId = "34073"

[en]
simple = """
The words @deva[दाश] and @deva[गोघ्न] are irregular formations where the @deva[कृत्] affix denotes the recipient (@deva[सम्प्रदान]), not the agent. @deva[दाश] (from @deva[दाशृ] 'to give' + @deva[अच्] by @ref[3.1.134]) means 'one to whom something is given'—a servant. @deva[गोघ्न] means 'one for whom a cow is killed'—a guest (not 'cow-killer'). Thus @deva[दाशः] = @deva[दाशन्ति] @deva[तस्मै] 'they give to him'; @deva[गोघ्नः] = @deva[तस्मै] @deva[दातुं] @deva[गां] @deva[घ्नन्ति] 'they kill a cow to give to him'.
"""

standard = """
@deva[दाश] and @deva[गोघ्न] are irregular @deva[कृदन्त]s denoting @deva[सम्प्रदान] (recipient) instead of @deva[कर्तृ] (@ref[3.4.67]). @deva[दाश] = @deva[दाशृ] + @deva[अच्] (@ref[3.1.134]): 'one to whom they give' = servant. @deva[गोघ्न]: not 'cow-slayer' but 'one for whose arrival a cow is slaughtered' = guest. This irregular @deva[गोघ्न] applies to priests, guests, sons-in-law; the regular @deva[गोघ्न] ('cow-killer') denotes a @deva[चण्डाल]. @deva[दाशः] = @deva[दाशन्ति] @deva[तस्मै]; @deva[गोघ्नः] = @deva[तस्मै] @deva[दातुं] @deva[गां] @deva[घ्नन्ति].
"""

advanced = """
@deva[दाश]/@deva[गोघ्न] are @deva[निपातन]-forms where @deva[कृत्] denotes @deva[सम्प्रदान] rather than default @deva[कर्तृ] (@ref[3.4.67]). @deva[दाश]: @deva[दाशृ] + @deva[अच्] (@ref[3.1.134]) = @deva[दाशन्ति] @deva[तस्मै] 'servant/recipient'. @deva[गोघ्न]: @deva[तस्मै] @deva[दातुं] @deva[गां] @deva[घ्नन्ति] 'guest' (cow killed for his sake)—applicable to @deva[ऋत्विज्], @deva[अतिथि], @deva[जामातृ], etc. Distinguished from regular @deva[गोघ्न] (= @deva[गां] @deva[हन्ति], agent-sense = cow-killer/@deva[चण्डाल]).
"""

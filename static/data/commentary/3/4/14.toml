id = "3.4.14"
numericId = "34014"

[en]
simple = """
In Vedic, four affixes express @deva[कृत्य] (gerundive) sense: @deva[तवै], @deva[केन्], @deva[केन्य], @deva[त्वन्]. @deva[कृत्य] affixes denote action (@deva[भाव]) or object (@deva[कर्मन्]). Examples: @deva[अन्वेतवै] = @deva[अन्वेतव्यम्] 'to be followed'; @deva[दिदृक्षेण्यः] (RV I.146.5) = @deva[दिदृक्षितव्यम्] 'worth seeing'; @deva[कर्त्वम्] (RV I.10.2) = @deva[कर्तव्यम्] 'to be done'.
"""

standard = """
Four Vedic affixes with @deva[कृत्यार्थ] (gerundive sense - @deva[भाव] and @deva[कर्मन्]): @deva[तवै], @deva[केन्], @deva[केन्य], @deva[त्वन्]. Note: @deva[तवै] also appeared in @ref[3.4.9] as infinitive; here it has passive participle sense. Examples: @deva[अन्वेतवै] = @deva[अन्वेतव्यम्]; @deva[परिधातवै] = @deva[परिधातव्यम्]; @deva[नावगाहे] = @deva[नावगाहितव्यम्]; @deva[दिदृक्षेण्यः] (RV I.146.5) = @deva[दिदृक्षितव्यम्]; @deva[शुश्रूषेण्यः] = @deva[शुश्रूषितव्यम्]; @deva[कर्त्वम्] (RV I.10.2) = @deva[कर्तव्यम्]. For @deva[तवै] accent, see @ref[6.1.200], @ref[6.2.51].
"""

advanced = """
Four Vedic @deva[कृत्यार्थ] affixes (@deva[भाव]/​@deva[कर्मन्] sense): @deva[तवै], @deva[केन्], @deva[केन्य], @deva[त्वन्]. @deva[तवै] here differs from @ref[3.4.9] (infinitive) - here it's @deva[कृत्य] (gerundive). Formations: @deva[अन्वेतवै] = @deva[अन्वेतव्यम्]; @deva[परिधातवै] = @deva[परिधातव्यम्]; @deva[नावगाहे] = @deva[नावगाहितव्यम्]; @deva[दिदृक्षेण्यः] (RV I.146.5) = @deva[दिदृक्षितव्यम्]; @deva[शुश्रूषेण्यः] = @deva[शुश्रूषितव्यम्]; @deva[कर्त्वम्] (RV I.10.2) = @deva[कर्तव्यम्]. Accent for @deva[तवै]: @ref[6.1.200], @ref[6.2.51].
"""

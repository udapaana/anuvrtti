In @deva[लोट्] (imperative), @deva[मि] (1st singular @deva[परस्मैपद]) is replaced by @deva[नि]. This overrides both the @deva[इ] → @deva[उ] change and any @deva[लोप] (deletion) rules. Examples: @deva[पचानि], @deva[पठानि].
"""


id = "3.4.51"
numericId = "34051"

[en]
simple = """
The affix @deva[णमुल्] comes after a root when an instrumental or locative word is compounded and a measure of length (@deva[प्रमाण]) is expressed. Example: @deva[द्व्यङ्गुलोत्कर्षं] @deva[खण्डिकां] @deva[छिनत्ति] 'he cuts pieces two fingers in length'. Without compounding (@ref[2.2.21]): @deva[द्व्यङ्गुले] @deva[उत्कर्षम्] (locative) or @deva[द्व्यङ्गुलेनोत्कर्षम्] (instrumental).
"""

standard = """
@deva[णमुल्] applies when @deva[प्रमाण] (measure of length/extension) is intended, with @[tṛtīyā] or @[saptamī] @deva[उपपद]. @deva[द्व्यङ्गुलोत्कर्षं] @deva[खण्डिकां] @deva[छिनत्ति] 'he cuts pieces measuring two fingers'. Optional non-compounding (@ref[2.2.21]): @deva[द्व्यङ्गुले] @deva[उत्कर्षम्] or @deva[द्व्यङ्गुलेनोत्कर्षम्].
"""

advanced = """
@deva[प्रमाण] (linear measure/extension) conditions @deva[णमुल्] with @[tṛtīyā] or @[saptamī] @deva[उपपद]. @deva[द्व्यङ्गुलोत्कर्षं] (compound) or @deva[द्व्यङ्गुले] @deva[उत्कर्षम्] (@[saptamī]) or @deva[द्व्यङ्गुलेनोत्कर्षम्] (@[tṛtīyā]) @deva[खण्डिकां] @deva[छिनत्ति] 'cuts pieces two-fingers long'. @ref[2.2.21] for optional @deva[समास].
"""

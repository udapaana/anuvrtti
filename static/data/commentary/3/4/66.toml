id = "3.4.66"
numericId = "34066"

[en]
simple = """
The affix @deva[तुमुन्] is added to a verb when @deva[अलम्] 'enough/capable' or a synonym expressing capability (@deva[पर्याप्ति]) is in construction. Examples: @deva[अलं] @deva[भोक्तुम्] 'capable of eating'; @deva[समर्थः] @deva[प्रोज्झितुम्] 'able to abandon'; @deva[पारयति] @deva[भोक्तुम्] 'is capable of eating'. The rule requires the @deva[पर्याप्ति] sense—so @deva[अलम्कृत्वा] (where @deva[अलम्] means 'enough' as adornment) doesn't apply.
"""

standard = """
@deva[तुमुन्] follows a @deva[धातु] when @deva[अलम्] or an @deva[अलम्]-synonym (@deva[समर्थ], @deva[प्रवीण], @deva[कुशल], @deva[पटु], etc.) expressing @deva[पर्याप्ति] (capability) is compounded. @deva[अलं] @deva[भोक्तुम्]; @deva[कः] @deva[समर्थः] @deva[प्रोज्झितुम्] (Hitop.); @deva[अलं] @deva[दग्धुम्] @deva[लोकान्] (@[kumāra]. II.56); @deva[भोक्तुम्] @deva[प्रवीणः]/@deva[कुशलः]/@deva[पटुः]. Alternative reading: @deva[पर्याप्ति]/@deva[अलम्]/@deva[अलमर्थ]-word in @deva[उपपद] triggers @deva[तुमुन्]. Without @deva[पर्याप्ति] sense: @deva[अलम्कृत्वा] ('having adorned'). Note: @deva[शक्] (@ref[3.4.65]) differs from @deva[अलम्]-sense; with @deva[अलम्]-sense: @deva[शक्यमेवं] @deva[कर्तुम्].
"""

advanced = """
@deva[तुमुन्] applies when @deva[अलम्] or @deva[अलमर्थ] (synonym expressing @deva[पर्याप्ति]) is @deva[उपपद]. Two interpretations: (1) @deva[अलम्] and its synonyms in @deva[पर्याप्ति]-sense; (2) the words @deva[पर्याप्ति], @deva[अलम्], or @deva[अलमर्थ]-synonyms. Examples: @deva[अलं] @deva[भोक्तुम्]; @deva[पर्याप्तो] @deva[भोक्तुम्]; @deva[भोक्तुम्] @deva[पारयति]. @deva[पर्याप्ति] condition excludes non-capability senses: @deva[अलम्कृत्वा]. @deva[शक्] in @ref[3.4.65] lacks @deva[अलम्]-sense there; with @deva[अलम्]-sense, this @[sūtra] applies: @deva[शक्यमेवं] @deva[कर्तुम्].
"""

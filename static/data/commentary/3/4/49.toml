id = "3.4.49"
numericId = "34049"

[en]
simple = """
The affix @deva[णमुल्] comes after @deva[पीड्] 'to press', @deva[रुध्] 'to obstruct', and @deva[कृष्] 'to draw' when preceded by @deva[उप] and compounded with a locative-case or instrumental-case word. Example: @deva[पार्श्वोपपीडं] @deva[शेते] 'he sleeps pressing on his sides'. Compounding is optional (@ref[2.2.21]): @deva[पार्श्वयोरुपपीडम्] or @deva[पार्श्वाभ्यामुपपीडम्]. Similarly: @deva[व्रजोपरोधम्] @deva[गाः] @deva[स्थापयति] 'he stations cows blocking the fold', @deva[पाण्युपकर्षं] @deva[धानाः] @deva[सङ्गृह्णाति] 'he gathers grains drawing with the hand'. The root @deva[कृष्] here is @deva[भ्वादि], not @deva[तुदादि].
"""

standard = """
After @deva[उप] + @deva[पीड्]/@deva[रुध्]/@deva[कृष्], @deva[णमुल्] applies with locative or instrumental @deva[उपपद]. The word @deva[च] in the @[sūtra] draws in the instrumental from the previous rule. @deva[पार्श्वोपपीडं] @deva[शेते] 'sleeps pressing sides'; optionally (@ref[2.2.21]) @deva[पार्श्वयोरुपपीडम्] (loc.) or @deva[पार्श्वाभ्यामुपपीडम्] (instr.). @deva[व्रजोपरोधम्] or @deva[व्रजे] @deva[उपरोधम्] or @deva[व्रजेनोपरोधम्] @deva[गाः] @deva[स्थापयति]. @deva[पाण्युपकर्षं] @deva[धानाः] @deva[सङ्गृह्णाति]. The @deva[कृष्] intended is @deva[भ्वादि] @deva[कृष्], not @deva[तुदादि].
"""

advanced = """
@deva[उप] + @deva[पीड्]/@deva[रुध्]/@deva[कृष्] take @deva[णमुल्] with @[saptamī] or @[tṛtīyā] @deva[उपपद]. The @deva[च] draws @deva[तृतीया] from the previous @[sūtra]. Examples: @deva[पार्श्वोपपीडं] @deva[शेते]; with optional non-compounding (@ref[2.2.21]): @deva[पार्श्वयोरुपपीडम्] (@[saptamī]) or @deva[पार्श्वाभ्यामुपपीडम्] (@[tṛtīyā]). @deva[व्रजोपरोधम्]/@deva[व्रजे] @deva[उपरोधम्]/@deva[व्रजेनोपरोधम्] @deva[गाः] @deva[स्थापयति]. @deva[पाण्युपकर्षं]/@deva[पाणावुपकर्षम्]/@deva[पाणिनोपकर्षम्] @deva[धानाः] @deva[सङ्गृह्णाति]. The @deva[कृष्] is @deva[भ्वादि] (not @deva[तुदादि]).
"""

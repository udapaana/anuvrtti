id = "3.4.93"
numericId = "34093"

[en]
simple = """
In Vedic language, @deva[तात्] can also be used for the first person, replacing @deva[मिप्].
"""

standard = """
In Vedic usage (@deva[छन्दसि]), @deva[तात्] optionally replaces @deva[मिप्] (first person singular @deva[परस्मैपद]) as well. This extends the benedictive @deva[तात्] substitution to all three singular persons in the Vedas.
"""

advanced = """
For Vedic texts, @deva[तात्] optionally substitutes @deva[मिप्] (first singular @deva[परस्मैपद]) in addition to the second and third persons. The continued @[anuvṛtti] of @deva[वा] makes this optional. This rule demonstrates the greater flexibility of Vedic morphology compared to classical Sanskrit.
"""

id = "3.4.81"
numericId = "34081"

[en]
simple = """
In @deva[लिट्] (perfect tense), @deva[एश्] replaces @deva[त] (3rd singular @deva[आत्मनेपद]) and @deva[इरेच्] replaces @deva[झ] (3rd plural @deva[आत्मनेपद]). The @deva[श्] in @deva[एश्] indicates whole-affix replacement (@ref[1.1.55]). The @deva[च्] in @deva[इरेच्] is for accent (@ref[6.1.165]). Examples: @deva[पेचे] (3sg), @deva[पेचाते] (3du), @deva[पेचिरे] (3pl).
"""

standard = """
In @deva[लिट्], @deva[त] → @deva[ए] (via @deva[एश्]—@deva[श्] = @deva[सर्वादेश] by @ref[1.1.55]); @deva[झ] → @deva[इरे] (via @deva[इरेच्]—@deva[च्] for accent @ref[6.1.165]). @deva[आत्मनेपद] 3rd person @deva[लिट्]: @deva[पेचे] (sg), @deva[पेचाते] (du), @deva[पेचिरे] (pl).
"""

advanced = """
@deva[लिट्] @deva[आत्मनेपद] 3rd person: @deva[त] → @deva[ए] (via @deva[एश्]—@deva[श्] marks @deva[सर्वादेश] @ref[1.1.55]); @deva[झ] → @deva[इरे] (via @deva[इरेच्]—@deva[च्] for accent @ref[6.1.165]). Forms: @deva[पेचे], @deva[पेचाते], @deva[पेचिरे].
"""

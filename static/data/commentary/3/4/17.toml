id = "3.4.17"
numericId = "34017"

[en]
simple = """
In Vedic, the affix @deva[कसुन्] forms infinitives after @deva[सृप्] (to creep) and @deva[तृद्] (to injure) with action-name sense. Examples: @deva[पुरा क्रूरस्य विसृपः] 'before the creeping of the cruel one' (Yaj. I.28); @deva[पुरा अत्रुभ्य आतृदः] 'before injuring' (RV VIII.1.12). These forms are indeclinable by @ref[1.1.40].
"""

standard = """
In @deva[छन्दस्], @deva[कसुन्] forms @deva[भावलक्षण] infinitives after @deva[सृप्] and @deva[तृद्]. The @deva[क्] blocks @deva[गुण]/​@deva[वृद्धि]. Examples: @deva[विसृपः] (@deva[पुरा क्रूरस्य विसृपः], Yaj. I.28); @deva[आतृदः] (@deva[पुरा अत्रुभ्य आतृदः], RV VIII.1.12). By @ref[1.1.40], these are @deva[अव्यय] (indeclinable).
"""

advanced = """
@deva[कसुन्] in @deva[छन्दस्] after @deva[सृप्] and @deva[तृद्] with @deva[भावलक्षण] sense. @deva[क्] is @deva[इत्], blocking @deva[गुण]/​@deva[वृद्धि] (@ref[1.1.5]). Formations: @deva[वि] + @deva[सृप्] + @deva[कसुन्] = @deva[विसृपः] (Yaj. I.28: @deva[पुरा क्रूरस्य विसृपः]); @deva[आ] + @deva[तृद्] + @deva[कसुन्] = @deva[आतृदः] (RV VIII.1.12). These are @deva[अव्यय] by @ref[1.1.40].
"""

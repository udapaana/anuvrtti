id = "3.4.69"
numericId = "34069"

[en]
simple = """
The @deva[ल]-affixes (the ten tense/mood markers: @deva[लट्], @deva[लिट्], @deva[लुट्], @deva[लृट्], @deva[लोट्], @deva[लेट्], @deva[लङ्], @deva[लिङ्], @deva[लुङ्], @deva[लृङ्]) denote the agent and the object. After intransitive verbs, they also denote the action (@deva[भाव]). In active voice, the affix marks the agent: @deva[गच्छति] @deva[देवदत्तः] 'Devadatta goes'. In passive of transitives, it marks the object: @deva[गम्यते] @deva[ग्रामो] @deva[देवदत्तेन] 'the village is gone to by Devadatta'. In passive of intransitives, it marks mere action (impersonal): @deva[आस्यते] @deva[देवदत्तेन] 'it is sat by Devadatta'.
"""

standard = """
The @deva[ल]-pratyayas (all ten @deva[लकार]s) denote @deva[कर्तृ] and @deva[कर्मन्]; after @deva[अकर्मक] (intransitive) verbs, they also denote @deva[भाव] (action). The word @deva[च] draws @deva[कर्ता] from @ref[3.4.67]. After @deva[सकर्मक] verbs: active voice = @deva[कर्तृ] (@deva[गच्छति] @deva[देवदत्तः]); passive = @deva[कर्मन्] (@deva[गम्यते] @deva[ग्रामः] @deva[देवदत्तेन]). @deva[सकर्मक] verbs never denote @deva[भाव] (can't be used impersonally). After @deva[अकर्मक] verbs: @deva[आस्ते] @deva[देवदत्तः] (agent); @deva[आस्यते] @deva[देवदत्तेन] (impersonal @deva[भाव]).
"""

advanced = """
@deva[ल]-pratyayas (collective term for @deva[लट्]–@deva[लृङ्], @deva[लः] being nominative plural of @deva[ल्]) denote @deva[कर्तृ] and @deva[कर्मन्]; @deva[अकर्मक]-@deva[धातु]s add @deva[भाव]. The @deva[च] draws @deva[कर्ता] via @deva[अनुवृत्ति] from @ref[3.4.67]. @deva[सकर्मक] @deva[धातु]s: @deva[कर्तरि] @deva[प्रयोग] = agent; @deva[कर्मणि] @deva[प्रयोग] = object. @deva[भाव] is impossible—transitives can't be impersonal. @deva[अकर्मक] @deva[धातु]s: active = @deva[कर्तृ] (@deva[आस्ते] @deva[देवदत्तः]); impersonal passive = @deva[भाव] (@deva[आस्यते] @deva[देवदत्तेन]). Böhtlingk: 'A finite verb expresses agent and object; intransitives additionally express impersonal action.'
"""

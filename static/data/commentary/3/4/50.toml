id = "3.4.50"
numericId = "34050"

[en]
simple = """
The affix @deva[णमुल्] comes after a root when a locative or instrumental word is compounded and immediate physical contact is expressed (@deva[समासत्ति]). Example: @deva[केशग्राहम्] @deva[युध्यन्ते] 'they fight, having grabbed each other by the hair'. This can also appear uncompounded: @deva[केशेषु] @deva[ग्राहम्] (locative) or @deva[केशैर्ग्राहम्] (instrumental). Similarly: @deva[हस्तग्राहम्] 'seizing hands', @deva[यष्टिग्राहम्] 'grabbing a stick', @deva[लोष्ट्रग्राहम्] 'grabbing a clod'. Compounding is optional by @ref[2.2.21].
"""

standard = """
@deva[णमुल्] applies when @deva[समासत्ति] (immediate contiguity/close contact) is meant, with @[saptamī] or @[tṛtīyā] @deva[उपपद]. @deva[केशग्राहम्] @deva[युध्यन्ते] 'they fight, closely grabbing hair'; alternatively @deva[केशेषु] @deva[ग्राहम्] or @deva[केशैर्ग्राहम्]. Similarly @deva[हस्तग्राहम्]/@deva[हस्तेषु] @deva[ग्राहम्]/@deva[हस्तैर्ग्राहम्]; @deva[यष्टिग्राहम्] 'seizing a stick'; @deva[लोष्ट्रग्राहम्] 'seizing a clod'. @ref[2.2.21] governs optional compounding.
"""

advanced = """
@deva[समासत्ति] (immediate physical contact) conditions @deva[णमुल्] with @[saptamī] or @[tṛtīyā] @deva[उपपद]. @deva[केशग्राहम्] (compound) or @deva[केशेषु] @deva[ग्राहम्] (@[saptamī]) or @deva[केशैर्ग्राहम्] (@[tṛtīyā]) @deva[युध्यन्ते] 'they fight grabbing each other's hair'. Parallel forms: @deva[हस्तग्राहम्]/@deva[हस्तेषु] @deva[ग्राहम्]/@deva[हस्तैर्ग्राहम्]; @deva[यष्टिग्राहम्]; @deva[लोष्ट्रग्राहम्]. See @ref[2.2.21] for optional @deva[समास].
"""

id = "3.4.56"
numericId = "34056"

[en]
simple = """
The affix @deva[णमुल्] comes after @deva[विश्] 'to enter', @deva[पत्] 'to fall', @deva[पद्] 'to go', and @deva[स्कन्द्] 'to leap' when an accusative word is compounded and either @deva[व्याप्ति] (complete pervasion of all objects) or @deva[आसेवा] (repeated performance) is meant. Example: @deva[गेहानुप्रवेशमास्ते] 'he sits, having entered the house'. With @deva[व्याप्ति] (all objects): @deva[गेहं] @deva[गेहमनुप्रवेशमास्ते] 'having entered every house'. With @deva[आसेवा] (frequency): @deva[गेहमनुप्रवेशमनुप्रवेशमास्ते] 'having entered repeatedly'.
"""

standard = """
@deva[णमुल्] applies after @deva[विश्]/@deva[पत्]/@deva[पद्]/@deva[स्कन्द्] with @[dvitīyā] @deva[उपपद] when @deva[व्याप्ति] (complete pervasion of all objects) or @deva[आसेवा] (assiduous repetition) is intended. These correspond to @deva[नित्य] and @deva[वीप्सा] in @ref[8.1.4]. Without compounding (@ref[2.2.21]), repetition expresses the meaning: noun repetition for @deva[व्याप्ति], verb repetition for @deva[आसेवा]. @deva[गेहानुप्रवेशमास्ते]; @deva[गेहं] @deva[गेहमनुप्रवेशमास्ते] (every house); @deva[गेहमनुप्रवेशमनुप्रवेशमास्ते] (repeatedly). Same pattern for @deva[पत्], @deva[पद्], @deva[स्कन्द्].
"""

advanced = """
@deva[विश्]/@deva[पत्]/@deva[पद्]/@deva[स्कन्द्] take @deva[णमुल्] with @[dvitīyā] @deva[उपपद] when @deva[व्याप्ति] (pervasion—the action affects all such objects) or @deva[आसेवा] (frequency—the action is repeated) is meant. These parallel @deva[नित्य]/@deva[वीप्सा] (@ref[8.1.4]), requiring repetition when not compounded. With compounding (@ref[2.2.21]): @deva[गेहानुप्रवेशमास्ते]. Without: @deva[गेहं] @deva[गेहमनुप्रवेशमास्ते] (@deva[व्याप्ति]—every house) or @deva[गेहमनुप्रवेशमनुप्रवेशमास्ते] (@deva[आसेवा]—repeatedly). Same constructions for @deva[गेहानुप्रपातम्], @deva[गेहानुप्रपादम्], @deva[गेहावस्कन्दम्]. Without @deva[व्याप्ति]/@deva[आसेवा]: @deva[गेहमनुप्रविश्य] @deva[भुङ्क्ते] (ordinary gerund).
"""

id = "3.4.24"
numericId = "34024"

[en]
simple = """
@deva[णमुल्] and @deva[क्त्वा] are optional after the prior-action verb when @deva[अग्रे] (first), @deva[प्रथमम्] (first), or @deva[पूर्वम्] (before) is in composition. Example: @deva[अग्रे भोजं भुक्त्वा व्रजति] 'having first eaten, he goes'. The option allows regular tenses too: @deva[अग्रे भुङ्क्ते ततः व्रजति] 'he eats first, then goes'. Note: @ref[3.1.94] doesn't apply when both @deva[क्त्वा] and @deva[णमुल्] are enjoined together, so the option must be stated.
"""

standard = """
@deva[णमुल्] and @deva[क्त्वा] are @deva[विकल्प] (optional) with @deva[अग्रे], @deva[प्रथमम्], @deva[पूर्वम्] in composition. @deva[समानकर्तृक] and @deva[पूर्वकाल] continue. @deva[आवृत्ति] is not understood here. Examples: @deva[अग्रे/प्रथमं/पूर्वं भोजं भुक्त्वा व्रजति]. The @deva[विकल्प] allows @deva[लट्] etc.: @deva[अग्रे भुङ्क्ते ततः व्रजति]. The explicit @deva[विकल्प] indicates a @deva[परिभाषा]: @ref[3.1.94] doesn't apply when @deva[क्त्वा] and @deva[णमुल्] are co-enjoined. For reiteration (@ref[3.4.22]), only @deva[क्त्वा]/​@deva[णमुल्] apply. No @deva[उपपद समास] by @ref[2.2.20] because both affixes are enjoined.
"""

advanced = """
@deva[णमुल्] and @deva[क्त्वा] with @deva[विकल्प] when @deva[अग्रे]/​@deva[प्रथम]/​@deva[पूर्व] compose. @deva[अनुवृत्ति]: @deva[समानकर्तृक], @deva[पूर्वकाल] (not @deva[आवृत्ति]). This is @deva[अप्राप्तविभाषा]. Examples: @deva[अग्रे भोजं भुक्त्वा व्रजति], @deva[प्रथमं भोजं व्रजति]. The explicit @deva[विकल्प] establishes a @deva[परिभाषा]: @ref[3.1.94] (@deva[वासरूप]) doesn't govern when @deva[क्त्वा] and @deva[णमुल्] are co-enjoined by one rule. Hence @deva[आवृत्ति] uses only @deva[क्त्वा]/​@deva[णमुल्], not @deva[लट्] etc. No @deva[उपपदसमास] (@ref[2.2.20]) since @deva[एव] there requires single-affix scenario.
"""

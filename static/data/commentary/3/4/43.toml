id = "3.4.43"
numericId = "34043"

[en]
simple = """
@deva[णमुल्] is added to @deva[नश्] (to perish) with @deva[जीव] (life) as agent, and to @deva[वह्] (to carry) with @deva[पुरुष] (person) as agent. Examples: @deva[जीवनाशं नश्यति] = @deva[जीवो नश्यति] 'perishes so that his life perishes (= dies)'; @deva[पुरुषवाहं वहति] = @deva[पुरुषः प्रेष्यो भूत्वा वहति] 'carries as a servant'. Note: when not expressing agent sense - @deva[जीवेन नष्टः] 'destroyed by life' - this doesn't apply.
"""

standard = """
@deva[णमुल्] after @deva[नश्] and @deva[वह्] with @deva[कर्तृवाचिन्] (agent-denoting) @deva[उपपद]: @deva[जीव] + @deva[नश्], @deva[पुरुष] + @deva[वह्]. @deva[जीवनाशं नश्यति] = @deva[जीवो नश्यति] 'dies (life perishes)'; @deva[पुरुषवाहं वहति] = @deva[पुरुषः प्रेष्यो भूत्वा वहति] 'a man carries [another] as servant'. When @deva[उपपद] is not @deva[कर्तृ]: @deva[जीवेन नष्टः] 'destroyed by [taking] life', @deva[पुरुषेण ऊढः] 'carried by a man' - this rule doesn't apply.
"""

advanced = """
@deva[णमुल्] after @deva[नश्] with @deva[जीव]-@deva[कर्तृ], @deva[वह्] with @deva[पुरुष]-@deva[कर्तृ]. @deva[जीवनाशं नश्यति] (life as agent of perishing = death); @deva[पुरुषवाहं वहति] (man as agent of carrying = servant bearing loads). The @deva[कर्तृत्व] condition is crucial: with @deva[करण] (@deva[जीवेन नष्टः]) or @deva[कर्तृ] in instrumental (@deva[पुरुषेण ऊढः]), this @[sūtra] doesn't govern.
"""

id = "3.4.1"
numericId = "34001"

[en]
simple = """
This is a heading rule (@deva[अधिकार]) that governs the entire section on verb-related affixes. It states: when a word formed with an affix is syntactically connected to a verb, the time expressed by that affix adjusts to match the verb's time. For example, in @deva[अग्निष्टोमयाज्यस्य पुत्रो जनिता] 'a son will be born to the one who will perform the Agnishtoma sacrifice,' the word @deva[याजिन्] (one who sacrifices) is formed with an affix that normally has past meaning (by @ref[3.2.85]), yet here it takes on future meaning because the main verb @deva[जनिता] is future tense. The same principle applies to nominal affixes too: @deva[गोमान् आसीत्] 'he had cows' and @deva[गोमान् भविता] 'he will have cows' both use the same affix @deva[मतुप्] (which normally has present sense), but it adapts to past or future based on the main verb.
"""

standard = """
This @deva[अधिकार] (heading rule) establishes that affixes denoting time are subordinate to the main verb when a syntactical relation (@deva[धातुसम्बन्ध]) exists between them. The qualifier-qualified (@deva[विशेषण-विशेष्य]) relationship governs time agreement: the affix's inherent time yields to the verb's time.

Examples: (1) @deva[अग्निष्टोमयाज्यस्य पुत्रो जनिता] — @deva[याजिन्] is formed by @ref[3.2.85] with past-tense sense, yet combines with the future verb @deva[जनिता]. (2) @deva[तत्र वसन् ददर्श] 'living there, he saw' — the present participle @deva[वसन्] (by @ref[3.2.124]) pairs with the past verb @deva[ददर्श]. The mention of @deva[प्रत्यय] (affix) in the plural extends the scope to @deva[तद्धित] affixes as well: @deva[गोमान् आसीत्] / @deva[गोमान् भविता] — the present-sense @deva[मतुप्] (by @ref[5.2.94]) adjusts to past or future.
"""

advanced = """
This @deva[अधिकार] governs the time-relation between affixes and verbs throughout the section. The compound @deva[धातुसम्बन्ध] is understood as @deva[धात्वर्थसम्बन्ध] (relation of verb-senses). When @deva[विशेषण-विशेष्य] (qualifier-qualified) relation obtains, the affix's temporal sense is subordinated to the verb's tense.

The @deva[अनुवृत्ति] of @deva[धातुसम्बन्धे प्रत्ययाः] runs through subsequent rules in this @deva[पाद]. The plural @deva[प्रत्ययाः] extends scope beyond @deva[कृत्] to @deva[तद्धित] affixes. Examples: @deva[अग्निष्टोमयाज्यस्य पुत्रो जनिता] — past-sense @deva[याजिन्] (@ref[3.2.85]) with future verb; @deva[तत्र वसन् ददर्श] — present @deva[शतृ] (@ref[3.2.124]) with past verb; @deva[कृतः कटः श्वो भविता] 'tomorrow he will be a mat-maker.' For @deva[तद्धित]: @deva[गोमान्] (@deva[मतुप्] by @ref[5.2.94], present sense) validly combines with @deva[आसीत्] or @deva[भविता]. This principle of temporal subordination is central to understanding how @deva[कृदन्त] and @deva[तद्धितान्त] forms function in relation to finite verbs.
"""

id = "3.4.74"
numericId = "34074"

[en]
simple = """
The words in the @deva[भीमादि] list are irregular formations that denote @deva[अपादान] (ablation—the source from which something moves away). These are formed by @deva[उणादि] affixes: @deva[भीम] (@deva[भी] + @deva[मक्]), @deva[भीष्म] (@deva[भी] + @deva[षुक्] + @deva[मक्]), etc. Normally @deva[उणादि] words don't denote recipient or ablation (@ref[3.4.75]), but this rule makes an exception for these words. The list includes: @deva[भीम], @deva[भीष्म], @deva[भयानक], @deva[वरु], @deva[चरु], @deva[भूमि], @deva[रजस्], @deva[संस्कार], @deva[सङ्क्रन्दन], @deva[प्रपतन], @deva[समुद्र], @deva[स्रुच्]/
@deva[स्रुव], @deva[स्रज्], @deva[खलति].
"""

standard = """
@deva[भीमादि] words (formed by @deva[उणादि] affixes) irregularly denote @deva[अपादान]. @deva[भीम]: @deva[भी] + @deva[मक्] (@[uṇ]. I.145); @deva[भीष्म]: @deva[भी] + @deva[षुक्] + @deva[मक्] (@[uṇ]. I.148). By @ref[3.4.75], @deva[उणादि] words normally exclude @deva[सम्प्रदान]/@deva[अपादान]; this @[sūtra] excepts @deva[भीमादि]. The @deva[गण] includes: @deva[भीम], @deva[भीष्म], @deva[भयानक] (@[uṇ]. III.82), @deva[वरु], @deva[चरु] (@[uṇ]. I.7), @deva[भूमि] (@[uṇ]. IV.45), @deva[रजस्] (@[uṇ]. IV.217), @deva[संस्कार], @deva[सङ्क्रन्दन], @deva[प्रपतन], @deva[समुद्र], @deva[स्रुच्]/@deva[स्रुव] (@[uṇ]. II.61), @deva[स्रज्] (@[uṇ]. II.62), @deva[खलति].
"""

advanced = """
@deva[भीमादि] @deva[गण] (formed by @deva[उणादि] pratyayas) takes @deva[अपादान]-sense, excepted from @ref[3.4.75]'s exclusion of @deva[सम्प्रदान]/@deva[अपादान] for @deva[उणादि] formations. Derivations: @deva[भीम] = @deva[भी] + @deva[मक्] (@[uṇ]. I.145.148); @deva[भीष्म] = @deva[भी] + @deva[षुक्] + @deva[मक्] (@[uṇ]. I.148). Complete @deva[गण]: @deva[भीम], @deva[भीष्म], @deva[भयानक] (@[uṇ]. III.82), @deva[वरु], @deva[चरु] (@[uṇ]. I.7), @deva[भूमि] (@[uṇ]. IV.45), @deva[रजस्] (@[uṇ]. IV.217), @deva[संस्कार], @deva[सङ्क्रन्दन], @deva[प्रपतन], @deva[समुद्र], @deva[स्रुच्]/@deva[स्रुव] (@[uṇ]. II.61), @deva[स्रज्] (@[uṇ]. II.62), @deva[खलति].
"""

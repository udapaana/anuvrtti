id = "3.4.3"
numericId = "34003"

[en]
simple = """
The imperative (@deva[लोट्]) is optionally used when listing multiple topics or actions in sequence. Example: @deva[छन्दोऽधीष्व, व्याकरणम् अधीष्व, निरुक्तम् अधीष्व इत्य् एवायम् अधीते] 'he studies, studying prosody, studying grammar, studying Nirukta'. Unlike the previous rule, the imperative is not doubled here.
"""

standard = """
When expressing @deva[समुच्चय] (enumeration of multiple items/actions), @deva[लोट्] is optionally used with 2nd person endings (@deva[हि], @deva[स्व], @deva[त], @deva[ध्वम्]). Unlike @ref[3.4.2], no doubling occurs. Example: @deva[छन्दोऽधीष्व, व्याकरणम् अधीष्व, निरुक्तम् अधीष्व इत्य् एवायम् अधीते] 'he studies prosody, grammar, and Nirukta'. Being optional (@deva[वा]), alternatives exist: @deva[व्याकरणम् अधीते, छन्दोऽधीते, निरुक्तम् अधीते इत्य् एवायम् अधीते].
"""

advanced = """
@deva[समुच्चय] (aggregation of themes) optionally takes @deva[लोट्] with 2nd person endings. No verb doubling (contrast @ref[3.4.2]). Examples: @deva[भ्राष्ट्रम् अट, मठम् अट, खदूरम् अट, स्थाल्यपिधानम् अट इत्य् एवायम् अटति] or @deva[इमौ अटतः] or @deva[इमे अटन्ति]. Being @deva[विकल्प], one may alternatively use: @deva[छन्दोऽधीये, व्याकरणम् अधीये, निरुक्तम् अधीये इत्य् एवाहम् अधीये]. The option extends across all persons/numbers.
"""

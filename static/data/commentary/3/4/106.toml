id = "3.4.106"
numericId = "34106"

[en]
simple = """
In @deva[लिङ्], for the @deva[आत्मनेपद] first person singular, the @deva[इ] of the ending is replaced by short @deva[अ].
"""

standard = """
In @deva[लिङ्] (optative and benedictive), the @deva[इ] of the @deva[आत्मनेपद] first person singular ending (@deva[इड्]) is replaced by short @deva[अ]. Forms: @deva[पचेय], @deva[यजेय], @deva[कृषीय], @deva[हृषीय]. The @deva[त्] in @deva[अत्] belongs to the @deva[विभक्ति] (case ending notation) and is not part of the substitute.
"""

advanced = """
This @[sūtra] replaces the @deva[इ] of @deva[आत्मनेपद] first singular ending (@deva[इड्]) with @deva[अ] in @deva[लिङ्]. The @deva[अत्] notation uses @deva[त्] as a grammatical marker (not @deva[इत्] by @ref[1.3.4], as it belongs to @deva[विभक्ति]). The @deva[इट्] in the @[sūtra] refers to the @deva[आत्मनेपद] ending, not the augment @deva[इट्], per the maxim @deva[अर्थवद्ग्रहणे नानर्थकस्य]—meaningful forms exclude non-meaningful homophonous elements. Forms: @deva[पचेय], @deva[यजेय], @deva[कृषीय].
"""

id = "3.4.46"
numericId = "34046"

[en]
simple = """
This rule restricts which verb can follow gerunds formed with @deva[णमुल्] from @deva[कष्] and similar roots (covered in @ref[3.4.34] through @ref[3.4.45]). The gerund must be followed by a verb derived from the same root. For example, @deva[निमूलकाषं] @deva[कषति] 'he scrapes down to the roots' uses @deva[कष्] for both the gerund and the main verb. This is a @deva[नियम] (restriction) rule—it limits what would otherwise be free choice.
"""

standard = """
This @deva[नियम] (restrictive) rule governs @[sūtras] @ref[3.4.34]–@ref[3.4.45]. In those rules, the @deva[णमुल्]-ending gerund must be followed by an @deva[अनुप्रयोग] (governing verb) derived from the same @deva[धातु]. Since this @deva[अध्याय] concerns @deva[धातुसम्बन्धे] @deva[प्रत्ययाः] (affixes expressing relations between verbs, see @ref[3.4.1]), a gerund in @deva[णमुल्] naturally requires some following verb. This @[sūtra] restricts that verb to sharing the same root as the gerund.
"""

advanced = """
This @deva[नियमसूत्र] applies to @ref[3.4.34]–@ref[3.4.45]. The @deva[णमुल्]-formed gerund requires an @deva[अनुप्रयोग] from the identical @deva[धातु]. The chapter heading @deva[धातुसम्बन्धे] @deva[प्रत्ययाः] (@ref[3.4.1]) establishes that these affixes express syntactic relations between verbs, so a gerund necessarily takes a governing verb—this @[sūtra] restricts which verb qualifies. Examples under @ref[3.4.34]–@ref[3.4.45] illustrate: @deva[निमूलकाषं] @deva[कषति], @deva[शुष्कपेषं] @deva[पिनष्टि], etc.
"""

id = "3.4.42"
numericId = "34042"

[en]
simple = """
@deva[णमुल्] is added to @deva[बन्ध्] (to bind) when the resulting word is an appellative (name for a type of knot/binding). Examples: @deva[क्रौञ्चबन्धं बध्नाति] 'ties a heron-knot'; @deva[मयूरिकाबन्धं बध्नाति] 'ties a peacock-knot'; @deva[अट्टालिकाबन्धं बद्धः] 'bound with an attalika-knot'. These are names of specific binding styles. Same-root verb required.
"""

standard = """
@deva[णमुल्] after @deva[बन्ध्] when @deva[संज्ञायाम्] (appellative - naming a type of knot). @deva[क्रौञ्चबन्धं बध्नाति] 'ties @[krauñca-bandha] (heron-knot)'; @deva[मयूरिकाबन्धं बध्नाति]/​@deva[बद्धः] 'ties/is tied with peacock-knot'; @deva[अट्टालिकाबन्धं बद्धः]. These are technical names for binding methods. @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

advanced = """
@deva[णमुल्] after @deva[बन्ध्] in @deva[संज्ञायाम्] - the compound names a specific binding type (@deva[बन्धविशेष]). @deva[क्रौञ्चबन्धम्], @deva[मयूरिकाबन्धम्], @deva[अट्टालिकाबन्धम्] are technical terms for knot varieties. @deva[सधातुक अनुप्रयोग] applies (@ref[3.4.46]).
"""

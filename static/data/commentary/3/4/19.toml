id = "3.4.19"
numericId = "34019"

[en]
simple = """
Per Eastern grammarians, @deva[क्त्वा] is added to @deva[मेङ्] (to exchange) even when the gerund action is not prior to the main verb - an exception to @ref[3.4.21]. Example: @deva[अपमित्य याचते] 'having offered exchange, he asks' (here asking may precede exchanging). Derivation: @deva[अप] + @deva[मे] + @deva[क्त्वा] → @deva[अपमित्य] (via @ref[6.1.45], @ref[6.1.71], @ref[7.4.40]). Being optional, alternative is: @deva[याचित्वा अपमयते] (normal order).
"""

standard = """
Per @deva[प्राचाम्], @deva[क्त्वा] after @deva[मेङ्] in @deva[विनिमय] (exchange) sense, even when the gerund action isn't temporally prior (exception to @ref[3.4.21]). @deva[अपमित्य याचते] 'offering exchange, he asks'. Derivation: @deva[अप] + @deva[मे] + @deva[क्त्वा] = @deva[अप] + @deva[मा] + @deva[ल्यप्] = @deva[अपमित्य] (@ref[6.1.45], @ref[6.1.71], @ref[7.4.40]). Alternative (normal usage): @deva[याचित्वा अपमयते]. The root appears as @deva[माङ्] (not @deva[मेङ्]) in the @[sūtra], indicating a @[paribhāṣā]: roots ending in @deva[ए]/​@deva[ओ]/​@deva[ऐ] retain that status even with @deva[अनुबन्ध].
"""

advanced = """
Per @deva[प्राचाम्], @deva[क्त्वा] after @deva[मेङ्] in @deva[विनिमय] sense - an @deva[अपवाद] to @ref[3.4.21] (prior-action requirement). @deva[अपमित्य याचते]: @deva[अप] + @deva[मे] + @deva[क्त्वा] → @deva[अप] + @deva[मा] (by @ref[6.1.45]) + @deva[ल्यप्] → @deva[अप] + @deva[मि] + @deva[तुक्] + @deva[य] (@ref[6.1.71]) → @deva[अपमित्य] (@ref[7.4.40]). The root is shown as @deva[माङ्] (not @deva[मेङ्]), indicating the @deva[परिभाषा]: roots ending in @deva[ए]/​@deva[ओ]/​@deva[ऐ] without @deva[अनुबन्ध] retain that status with @deva[अनुबन्ध]. Thus @deva[दैप्] → @deva[दाप्] possible (hence excluded from @deva[घु] by @ref[1.1.20]).
"""

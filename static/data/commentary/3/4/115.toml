id = "3.4.115"
numericId = "34115"

[en]
simple = """
The @deva[तिङ्] endings of @deva[लिट्] (perfect tense) are also classified as @deva[आर्धधातुक].
"""

standard = """
Though @deva[तिङ्] endings are normally @deva[सार्वधातुक] (@ref[3.4.113]), the @deva[तिङ्] endings of @deva[लिट्] (perfect) are exceptionally classified as @deva[आर्धधातुक]. This means they trigger @deva[इट्] (@deva[पेचिथ], @deva[शेकिथ]) and don't take @deva[शप्]-class @[vikaraṇas]. From @deva[ग्लै] → @deva[जग्ले] (where @deva[आ] elides by @ref[6.4.64] because the affix is @deva[आर्धधातुक]).
"""

advanced = """
This @[sūtra] overrides @ref[3.4.113] for @deva[लिट्]: its @deva[तिङ्] endings are @deva[आर्धधातुक], not @deva[सार्वधातुक]. Consequences: (1) @deva[इट्] augment applies (@ref[7.2.35]): @deva[पेचिथ], @deva[शेकिथ]; (2) no @deva[शप्]-class @[vikaraṇas]; (3) @deva[आकार]-elision by @ref[6.4.64] applies: @deva[ग्लै] → @deva[ग्ला] (@ref[6.1.45]) → @deva[जग्ले] (@deva[आ] elides before @deva[आर्धधातुक]); similarly @deva[म्लै] → @deva[मम्ले]. The @deva[लिट्] thus patterns with @[kṛt] affixes rather than other @deva[तिङ्]-bearing @[lakāras].
"""

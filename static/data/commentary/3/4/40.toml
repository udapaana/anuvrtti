id = "3.4.40"
numericId = "34040"

[en]
simple = """
@deva[णमुल्] is added to @deva[पुष्] (to nourish) when a word with @deva[स्व]-sense ('self', 'kinsmen', or 'property') in the instrumental is in composition. Examples: @deva[स्वपोषं पुष्णाति] 'nourishes oneself'; @deva[आत्मपोषम्], @deva[गोपोषम्] (property), @deva[पितृपोषम्], @deva[मातृपोषम्] (kinsmen), @deva[धनपोषम्]. See @ref[1.1.68]. Same-root verb required.
"""

standard = """
@deva[णमुल्] after @deva[पुष्] with @deva[स्वार्थ] (self/kinsmen/property) @deva[तृतीयान्त उपपद]. @deva[स्व] encompasses @deva[आत्मन्] (self), @deva[ज्ञाति] (kinsmen), @deva[धन] (wealth) per @ref[1.1.68]. Examples: @deva[स्वपोषं पुष्णाति] 'nourishes oneself'; @deva[आत्मपोषम्], @deva[गोपोषम्], @deva[पितृपोषम्], @deva[मातृपोषम्], @deva[धनपोषम्], @deva[रैपोषम्]. @deva[सधातुक अनुप्रयोग] applies.
"""

advanced = """
@deva[णमुल्] after @deva[पुष्] with @deva[स्वार्थ] @deva[तृतीयान्त उपपद]. @deva[स्व] per @ref[1.1.68] covers @deva[आत्मन्], @deva[स्वजन], @deva[स्वीय] (property). @deva[स्वपोषं पुष्णाति]; @deva[आत्मपोषं], @deva[गोपोषं], @deva[पितृपोषं], @deva[मातृपोषं], @deva[धनपोषं], @deva[रैपोषं पुष्णाति]. @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

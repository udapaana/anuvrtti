id = "3.4.37"
numericId = "34037"

[en]
simple = """
@deva[णमुल्] is added to @deva[हन्] (to strike) when an instrumental word is in composition. Examples: @deva[पाणिघातं वेदिं हन्ति] = @deva[पाणिना वेदिं हन्ति] 'strikes the altar with the hand'; @deva[पादघातं भूमिं हन्ति] 'strikes the ground with the foot'. Here @deva[हन्] means 'to strike', not 'to kill'. Same-root verb required. Per @[patañjali], this also applies when @deva[हन्] means 'to injure': @deva[असिघातं हन्ति] 'kills with sword'.
"""

standard = """
@deva[णमुल्] after @deva[हन्] with @deva[तृतीयान्त] (instrumental) @deva[उपपद]. @deva[पाणिघातं वेदिं हन्ति] (@ref[7.3.32], @ref[7.3.54]) = @deva[पाणिना वेदिं हन्ति] 'strikes altar with hand'; @deva[पादघातं भूमिं हन्ति] 'stamps ground with foot'. Here @deva[हन्] = 'strike' (contrast @ref[3.4.48] where @deva[हन्] = 'injure'). Per @[patañjali], this @[sūtra] anticipates @ref[3.4.48] and applies even with @deva[हिंसार्थ]: @deva[असिघातं हन्ति], @deva[शरघातं हन्ति]. @deva[सधातुक अनुप्रयोग] applies.
"""

advanced = """
@deva[णमुल्] after @deva[हन्] with @deva[तृतीयान्त उपपद]. @deva[पाणिघातं वेदिं हन्ति] = @deva[पाणिना वेदिं हन्ति]; @deva[पादघातं भूमिं हन्ति]. Here @deva[हन्] = @deva[आघात] (strike), distinct from @ref[3.4.48] (@deva[हिंसार्थ]). Per @[patañjali], this @[sūtra] by @deva[पूर्वविप्रतिषेध] overrides @ref[3.4.48] even for @deva[हिंसार्थ हन्]: @deva[असिघातं हन्ति], @deva[शरघातं हन्ति]. The @deva[उपपदसमास] like @deva[पादघातम्] is formed here. @deva[सधातुक अनुप्रयोग] per @ref[3.4.46].
"""

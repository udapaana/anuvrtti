id = "3.4.8"
numericId = "34008"

[en]
simple = """
In Vedic, the subjunctive (@deva[लेट्]) must be used (not optionally) when expressing a contingent promise (@deva[उपसंवाद]) or apprehension (@deva[आशङ्का]). @deva[उपसंवाद] is a reciprocal agreement: 'if you do X, I'll do Y'. @deva[आशङ्का] is fearing/inferring a consequence. Example: @deva[नेज् जिह्यायन्तो नरकं पताम] 'lest acting crookedly we fall into hell' - expressing fear of consequence.
"""

standard = """
In @deva[छन्दस्], @deva[लेट्] is obligatory (not optional, contra @ref[3.4.7]) for @deva[उपसंवाद] (reciprocal promise: 'if you do X for me, I'll give Y to you') and @deva[आशङ्का] (apprehension of result from cause). Examples: @deva[अहम् एव पशूनाम् ईशै], @deva[मदग्रा एव वो ग्रहा गृह्यान्तै], @deva[मद्देवत्यान्य् एव वः पात्राण्य् उच्यान्तै], @deva[नेज् जिह्यायन्तो नरकं पताम] (= @deva[जिह्माचरणेन नरकपात आशङ्कयते]). Though semantically potential, @deva[लेट्] (not @deva[लिङ्]) is required.
"""

advanced = """
@deva[लेट्] is @deva[नित्य] (obligatory) - not @deva[विकल्प] - for @deva[उपसंवाद] (reciprocal contract: @deva[यदि मे भवान् इदं कुर्याद् अहम् अपि भवत इदं दास्यामि]) and @deva[आशङ्का] (inference of result from cause). Nirukta examples: @deva[अहम् एव पशूनाम् ईशै], @deva[मदग्रा एव वो ग्रहा गृह्यान्तै], @deva[नेज् जिह्यायन्तो नरकं पताम] = @deva[जिह्माचरणेन नरकपातम् आशङ्कते]. The @deva[विकल्प] @deva[अनुवृत्ति] from @ref[3.4.7] is suspended here.
"""

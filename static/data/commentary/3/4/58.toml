id = "3.4.58"
numericId = "34058"

[en]
simple = """
The affix @deva[णमुल्] comes after @deva[आदिश्] 'to point out' and @deva[ग्रह्] 'to seize' when the accusative word @deva[नामन्] 'name' is compounded. Examples: @deva[नामादेशमाचष्टे] 'he mentions, telling the name'; @deva[नामग्राहं] @deva[मामाह्वयति] 'he calls me by name'.
"""

standard = """
@deva[आदिश्]/@deva[ग्रह्] take @deva[णमुल्] when @deva[नामन्] in the @[dvitīyā] is compounded. @deva[नामादेशमाचष्टे] 'he mentions it, stating the name'. @deva[नामग्राहं] @deva[मामाह्वयति] 'he calls me by (taking my) name'.
"""

advanced = """
@deva[आदिश्]/@deva[ग्रह्] with @[dvitīyā] @deva[नामन्] take @deva[णमुल्]. @deva[नामादेशमाचष्टे] 'mentions stating name'. @deva[नामग्राहं] @deva[मामाह्वयति] 'calls me by name'. The @deva[उपपद] is specifically @deva[नामन्] (not other nouns).
"""

id = "3.3.162"
numericId = "33162"

[en]
simple = """
The imperative (@deva[लोट्]) is also used in the same contexts of commanding, inviting, permitting, etc. Example: @deva[कटं तावद् भवान् करोतु] 'please make the mat'.
"""

standard = """
@deva[लोट्] (imperative) applies under the same six circumstances from @ref[3.3.161]. Separation from the previous @[sūtra] allows @deva[लोट्]-anuv̥tti in subsequent rules where @deva[लिङ्] doesn't continue. Examples: @deva[कटं भवान् करोतु] 'make the mat'; @deva[ग्रामं भवान् आगच्छतु] 'come to the village'.
"""

advanced = """
The separation (@deva[पृथक्करण]) enables @deva[लोट्]-only anuv̥tti in following @[sūtras]. Both @deva[लिङ्] and @deva[लोट्] serve @deva[विध्यादि]-artha, but @deva[लोट्] is more direct/immediate. For @deva[निमन्त्रण/आमन्त्रण]: @deva[अमुत्र भवान् आस्ताम्] (invitation/permission). The imperative complements the optative for directive functions.
"""

id = "3.3.32"
numericId = "33032"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[स्तॄ] 'to spread' with @deva[प्र], when NOT referring to sacrifice. Examples: @deva[शङ्खप्रस्तारः] 'a bed of conch shells'; @deva[मणिप्रस्तारः] 'strewing of gems'.
"""

standard = """
With @deva[प्र] + @deva[स्तॄ] 'to spread/strew', @deva[घञ्] applies when the word does NOT refer to sacrifice (@deva[अनध्वरे]). Thus: @deva[शङ्खप्रस्तारः] 'a layer/bed of conch shells'; @deva[मणिप्रस्तारः] 'strewing of gems'. For sacrificial spreading, a different formation would apply.
"""

advanced = """
This @deva[सूत्र] complements @ref[3.3.31] by specifying the non-sacrificial condition. The restriction @deva[अनध्वरे] ensures that @deva[प्रस्तार] forms with @deva[घञ्] apply only to secular contexts (beds of shells, gems, etc.), not to the ritual spreading of sacred materials in sacrifice.
"""

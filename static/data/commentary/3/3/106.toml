id = "3.3.106"
numericId = "33106"

[en]
simple = """
The affix @deva[अङ्] comes after @deva[आ]-final verbs when an @deva[उपसर्ग] is in composition, to form feminine words. This supersedes @deva[क्तिन्]. Examples: @deva[प्रदा]; @deva[प्रधा]; @deva[उपदा]; @deva[उपधा]. Also: @deva[श्रद्धा] 'faith'; @deva[अन्तर्धा] 'disappearance'.
"""

standard = """
After verbs ending in long @deva[आ] with an @deva[उपसर्ग], @deva[अङ्] applies for feminine, superseding @deva[क्तिन्]. Examples: @deva[प्रदा] 'giving'; @deva[प्रधा] 'placing forth'; @deva[उपदा]; @deva[उपधा]. A @deva[वार्तिक] treats @deva[श्रत्] and @deva[अन्तर्] as @deva[उपसर्गs] for this rule: hence @deva[श्रद्धा] 'faith' (@ref[1.4.59]); @deva[अन्तर्धा] 'disappearance'.
"""

advanced = """
The @deva[आकारान्त-उपसर्गयुक्त] condition specifies @deva[आ]-final roots with prefixes. The @deva[वार्तिक] extension to @deva[श्रत्] and @deva[अन्तर्] (normally not @deva[उपसर्गs]) allows @deva[श्रद्धा] and @deva[अन्तर्धा] under this rule. This @deva[अपवाद] blocks @deva[क्तिन्] for these compound feminine forms.
"""

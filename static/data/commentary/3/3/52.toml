id = "3.3.52"
numericId = "33052"

[en]
simple = """
The affix @deva[घञ्] is optionally used after @deva[ग्रह्] with @deva[प्र] when relating to commerce (specifically, the string of a balance). Example: @deva[तुलाप्रग्राहः] or @deva[तुलाप्रग्रहः] 'balance string'.
"""

standard = """
With @deva[प्र] + @deva[ग्रह्] meaning @deva[वाणिज्य] (commerce), specifically the string by which a balance is held, @deva[घञ्] is optional. Thus @deva[तुलाप्रग्राहेण चरति] or @deva[तुलाप्रग्रहेण चरति] 'he walks with the balance string'—applicable to anyone, not just merchants. Without commerce meaning: @deva[प्रग्रहो देवदत्तस्य] 'Devadatta's whip/rein'.
"""

advanced = """
The condition @deva[वाणिज्ये] 'in commerce' specifically refers to @deva[तुलारज्जु] (the cord/string of a balance), not commerce generally. The @deva[प्रग्राह/प्रग्रह] forms both refer to the gripping string of a weighing scale. This technical usage distinguishes it from @deva[प्रग्रह] meaning 'whip' or 'rein'.
"""

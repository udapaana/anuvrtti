id = "3.3.1"
numericId = "33001"

[en]
simple = """
The @deva[उणादि] affixes (beginning with @deva[उण्]) are applied in present-tense, appellative sense, but their application is diverse—they don't follow strict rules. Example: @deva[कृ] + @deva[उण्] → @deva[कारुः] 'artisan'; @deva[वायुः] 'wind'; @deva[साधुः] 'virtuous one'.
"""

standard = """
This @deva[सूत्र] introduces the @deva[उणादि] affixes—a special set not enumerated by @[pāṇini] but collected separately. They apply with @deva[वर्तमान] (present) sense and @deva[संज्ञा] (appellative) meaning, but @deva[बहुलम्] 'diversely' signals irregular application. The affix @deva[उण्] comes after @deva[कृ], @deva[वा], @deva[पा], @deva[जि], @deva[मि], @deva[स्वद्], @deva[साध्], @deva[अश्]: thus @deva[कारुः] 'artisan', @deva[वायुः] 'wind', @deva[पायुः] 'anus', @deva[स्वादुः] 'sweet', @deva[साधुः] 'virtuous', @deva[आशुः] 'swift'.
"""

advanced = """
The @deva[उणादि] affixes constitute a supplementary system outside the main @deva[अष्टाध्यायी]. The @deva[अनुवृत्ति] of @deva[वर्तमाने] (from @ref[3.2.123]) and @deva[संज्ञायाम्] (from @ref[3.2.185]) applies. The term @deva[बहुलम्] indicates: (1) affixes apply to roots beyond those explicitly listed; (2) some applications must be inferred from attested forms; (3) the operations are @deva[सशेष] (not exhaustively specified). The @[śākaṭāyana] school held all nouns are @deva[धातुज] (root-derived), so unanalyzable words require inferring appropriate @deva[प्रकृति] and @deva[प्रत्यय].
"""

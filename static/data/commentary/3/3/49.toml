id = "3.3.49"
numericId = "33049"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[श्रि] 'to resort', @deva[यु] 'to join', @deva[पू] 'to purify', @deva[द्रु] 'to run' with @deva[उत्]. Examples: @deva[उच्छ्रायः] 'rising (of planet)'; @deva[उद्यावः] 'mixing'; @deva[उत्पावः] 'purifying ghee'; @deva[उद्द्रावः] 'flight'.
"""

standard = """
With @deva[उत्], the roots @deva[श्रि], @deva[यु], @deva[पू], @deva[द्रु] take @deva[घञ्], blocking @deva[अच्] (@ref[3.3.56]). Examples: @deva[उच्छ्रायः] 'rising of a planet'; @deva[उद्यावः] 'mixing'; @deva[उत्पावः] 'purifying ghee'; @deva[उद्द्रावः] 'flight'. The form @deva[समुच्छ्रयः] in @deva[पतनान्ताः समुच्छ्रयाः] 'elevations end in fall' uses the option from the next @deva[सूत्र] applied retrospectively.
"""

advanced = """
The existence of @deva[समुच्छ्रयः] alongside @deva[उच्छ्रायः] demonstrates @deva[सिंहावलोकनन्याय] 'the maxim of the lion's backward glance'—the @deva[विभाषा] 'option' of @ref[3.3.50] extends retrospectively to this @deva[सूत्र]. This allows optional @deva[घञ्] even with additional prefixes beyond @deva[उत्].
"""

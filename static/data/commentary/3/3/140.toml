id = "3.3.140"
numericId = "33140"

[en]
simple = """
The conditional (@deva[लृङ्]) is also used when the sense is past tense and the action was not completed. This expresses 'if X had happened (but didn't), Y would have happened'.
"""

standard = """
Extending @ref[3.3.139], @deva[लृङ्] (conditional) is also used for past tense when non-completion of action is implied. The conditional has both past and future significations. Example: @deva[यद्यभविष्यत्] 'if it had happened (but it didn't)'—expressing unfulfilled past conditions.
"""

advanced = """
The @ref[3.3.139] extends to @deva[भूतकाल]: @deva[लृङ्] applies for @deva[लिङ्]-nimittas with @deva[क्रियातिपत्ति] in past sense. @deva[लृङ्] thus covers both @deva[भविष्यत्] (@ref[3.3.139]) and @deva[भूत] (this @[sūtra]) counterfactuals. The conditional expresses @deva[अनिष्पन्न]-@[kriyā]: what would have been but wasn't, or would be but won't.
"""

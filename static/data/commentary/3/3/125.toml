id = "3.3.125"
numericId = "33125"

[en]
simple = """
Both @deva[घ] and @deva[घञ्] can be added after the verb @deva[खन्] 'to dig' when forming an appellative meaning instrument or location. Thus we get both @deva[आखानः] and @deva[आखनः] meaning 'a spade or hoe'. A @[vārttika] adds that @deva[ड] also applies, giving @deva[आखः].
"""

standard = """
After @deva[खन्] 'to dig', both @deva[घ] and @deva[घञ्] are permitted for instrumental/locative appellatives. Thus @deva[आ + खन् + घ = आखनः] and @deva[आ + खन् + घञ् = आखानः], both meaning 'spade, hoe'. A @[vārttika] extends this to include @deva[ड], yielding @deva[आखः] (the @deva[ड्] indicating final portion deletion).
"""

advanced = """
The word @deva[च] brings @deva[घञ्] into the @[sūtra] alongside @deva[घ]. Both yield @[karaṇa]/@[adhikaraṇa-saṃjñā] forms: @deva[आखनः] (with @deva[घ]) and @deva[आखानः] (with @deva[घञ्]). @[vārttika]: @deva[डश्च]—@deva[आ + खन् + ड = आखः]. The @deva[ड्] as @deva[इत्] triggers @deva[अङ्गस्य अन्त्यलोपः].
"""

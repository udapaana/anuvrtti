id = "3.3.104"
numericId = "33104"

[en]
simple = """
The affix @deva[अङ्] comes after @deva[षित्] (indicatory @deva[ष्]) verbs and the @deva[भिदादि] class to form feminine words. Examples: @deva[जरा] 'old age'; @deva[त्रपा] 'shame'; @deva[भिदा] 'breaking'; @deva[छिदा] 'cutting'; @deva[धारा] 'stream'.
"""

standard = """
Verbs with indicatory @deva[षि] (like @deva[जॄष्], whose real root is @deva[जॄ]) and the @deva[भिदादि] class take @deva[अङ्] for feminine. Examples: @deva[जॄष्] → @deva[जरा] 'old age' (@ref[7.4.16]); @deva[त्रपुष्] → @deva[त्रपा] 'bashfulness'. @deva[भिदादि]: @deva[भिदा] 'breaking' (alternative: @deva[भित्तिः]); @deva[छिदा] 'cutting'; @deva[आरा] 'knife'; @deva[धारा] 'stream'.
"""

advanced = """
The @deva[भिदादि] class is collected from various @deva[गणs]: @deva[भिदा], @deva[छिदा], @deva[विदा], @deva[क्षिपा], @deva[गुहा], @deva[श्रद्धा], @deva[मेधा], @deva[गोधा], @deva[आरा], @deva[हारा], @deva[कारा], @deva[क्षिपा], @deva[भारा], @deva[धारा], @deva[लेखा], @deva[रेखा], @deva[चूडा], @deva[पीडा], @deva[वपा], @deva[वसा], @deva[मृजा], @deva[सृजा], @deva[कृपा] (with @deva[संप्रसारण]).
"""

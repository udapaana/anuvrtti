id = "3.3.35"
numericId = "33035"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[ग्रह्] 'to seize' with @deva[उत्]. Example: @deva[उद्ग्राहः] 'lifting up'. A @deva[वार्तिक] notes Vedic @deva[निग्राभ] (with @deva[नि] and @deva[ह] → @deva[भ]).
"""

standard = """
With @deva[उत्] + @deva[ग्रह्] 'to seize/lift', @deva[घञ्] applies, blocking @deva[अप्]. Thus @deva[उद्ग्राहः] 'lifting up'. A @deva[वार्तिक] notes that in Vedic, with @deva[नि] also, @deva[घञ्] applies and @deva[ह] changes to @deva[भ]: @deva[उद्ग्राभं च निग्राभं च ब्रह्मदेवा अवीवृधन्] 'the Brahmadevas increased the lifting up and putting down (of the sacrificial ladle)'.
"""

advanced = """
The @deva[अपवाद] blocks @deva[अप्] (@ref[3.3.57]). The Vedic @deva[वार्तिक] extends @deva[घञ्] to @deva[नि] + @deva[ग्रह्] with the irregular change @deva[ह] → @deva[भ], yielding @deva[निग्राभ] alongside @deva[उद्ग्राभ]. These forms refer to the ritual raising and lowering of the sacrificial ladle (@deva[स्रुव]).
"""

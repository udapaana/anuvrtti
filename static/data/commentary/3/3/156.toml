id = "3.3.156"
numericId = "33156"

[en]
simple = """
The potential (@deva[लिङ्]) is optionally used for verbs expressing both the condition (cause) and its consequence (effect) in conditional sentences. Example: @deva[यदि वर्षेत् यवा रोहेयुः] 'if it rains, the barley may grow'.
"""

standard = """
@deva[हेतु] (cause/condition) and @deva[हेतुमत्] (consequence/effect) both optionally take @deva[लिङ्]. In conditional sentences, the potential may be used in both the protasis and apodosis. This supersedes other tenses. Example: @deva[यदि वर्षेत् यवा रोहेयुः] 'if it should rain, the barley might grow'.
"""

advanced = """
For @deva[हेतुहेतुमद्भाव] (causal relationship), @deva[लिङ्] is @deva[विकल्पेन] available for both @deva[हेतु] (protasis/condition) and @deva[हेतुमत्] (apodosis/consequence). This creates optionality in conditional sentences: @deva[लिङ्] in one or both clauses, or time-appropriate @[lakāras]. This is the @deva[हेतु]-condition referenced in @ref[3.3.139].
"""

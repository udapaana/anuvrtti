id = "3.3.145"
numericId = "33145"

[en]
simple = """
When expressing that something is not likely to happen (@deva[अनवक्लृप्ति]) or is intolerable (@deva[अमर्ष]), the potential (@deva[लिङ्]) and first future (@deva[लृट्]) are used, even without an interrogative word.
"""

standard = """
The @deva[गर्हा]-anuv̥tti ceases. For @deva[अनवक्लृप्ति] (impossibility, disbelief) or @deva[अमर्ष] (intolerance), @deva[लिङ्] and @deva[लृट्] are mandated, excluding all other tenses. No interrogative upapada is required. These affixes express strong incredulity or indignation about an action.
"""

advanced = """
@deva[गर्हा]-anuv̥tti ends; new conditions @deva[अनवक्लृप्ति] (disbelief in occurrence) and @deva[अमर्ष] (non-toleration) govern. @deva[लिङ्] and @deva[लृट्] are @deva[नित्य], superseding contextual tenses. @deva[किमादि]-upapada is not required—the semantic content (@deva[अनवक्लृप्ति/अमर्ष]) alone triggers this tense-selection.
"""

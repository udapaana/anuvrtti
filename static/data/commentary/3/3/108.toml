id = "3.3.108"
numericId = "33108"

[en]
simple = """
The affix @deva[ण्वुल्] comes after verbs when the feminine word formed is a disease name. This blocks @deva[क्तिन्] etc. Examples: @deva[प्रच्छर्दिका] 'vomiting'; @deva[प्रवाहिका] 'diarrhea'; @deva[विवर्चिका] 'itch'. Sometimes not: @deva[शिरोर्तिः] 'headache'.
"""

standard = """
When forming feminine @deva[आख्या] (appellative) for disease names, @deva[ण्वुल्] applies after roots, blocking @deva[क्तिन्] etc. The @deva[बहुलम्] 'diversely' indicates usual grammatical license. Examples: @deva[प्रच्छर्दिका] 'vomiting' (@ref[7.1.1]); @deva[प्रवाहिका] 'diarrhea'; @deva[विवर्चिका] 'itch/scab'. Exceptions: @deva[शिरोर्तिः] 'headache' (not @deva[ण्वुल्]).
"""

advanced = """
@deva[वार्तिकs]: (1) @deva[ण्वुल्] for simply pointing out root meaning: @deva[आशिका], @deva[शायिका]. (2) @deva[इक्] and @deva[श्तिप्] for root-indication: @deva[भिदिः], @deva[पचतिः] (used in @deva[सूत्रs] to display roots). (3) @deva[कार] for letters: @deva[ककारः] 'letter @deva[क]', @deva[अकारः]. (4) @deva[इफ] for @deva[र]: @deva[रेफ]. (5) @deva[इञ्] after @deva[अज्] etc.: @deva[आजिः], @deva[आतिः], @deva[आदिः]. (6) @deva[इक्] after @deva[कृष्] etc.: @deva[कृषिः], @deva[किरिः].
"""

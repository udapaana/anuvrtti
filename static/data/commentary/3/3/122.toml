id = "3.3.122"
numericId = "33122"

[en]
simple = """
The words @deva[अध्याय] (chapter), @deva[न्याय] (logic/justice), @deva[उद्याव], @deva[संहार] (collection), @deva[आधार] (support), and @deva[आवय] are formed irregularly with @deva[घञ्] even though their roots end in vowels.
"""

standard = """
These six words take @deva[घञ्] irregularly instead of @deva[घ] which would normally apply by @ref[3.3.118] since their roots end in vowels. @deva[अधि] + @deva[इ] + @deva[घञ्] = @deva[अध्यायः] 'chapter' (that in which they read); @deva[नि] + @deva[ई] + @deva[घञ्] = @deva[न्यायः] 'logic, justice' (that by which men are led).
"""

advanced = """
Being @deva[अच्-अन्त]-roots, these should take @deva[घ] by @ref[3.3.118], but @deva[घञ्] is prescribed anomalously. Derivations: @deva[अधि + इण् + घञ् = अध्यायः] (@[adhikaraṇa]—where reading occurs); @deva[नि + ईङ् + घञ् = न्यायः] (@[karaṇa]—means of leading); @deva[उत् + यु + घञ् = उद्यावः]; @deva[सम् + हृ + घञ् = संहारः]; @deva[आ + धा + घञ् = आधारः]; @deva[आ + वी + घञ् = आवयः].
"""

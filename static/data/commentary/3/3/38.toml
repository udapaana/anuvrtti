id = "3.3.38"
numericId = "33038"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[इ] 'to go' with @deva[परि] when meaning 'regular succession/turn'. Example: @deva[पर्यायः] 'turn' (@deva[तव पर्यायः] 'your turn'). For other meanings: @deva[कालस्य पर्ययः] 'lapse of time'.
"""

standard = """
With @deva[परि] + @deva[इ] meaning @deva[अनुपात्यय] (regular succession, turn), @deva[घञ्] applies. Thus @deva[पर्यायः] 'turn, succession'—@deva[तव पर्यायः] 'your turn'; @deva[मम पर्यायः] 'my turn'. Without the 'succession' meaning: @deva[कालस्य पर्ययः] 'the passing of time'.
"""

advanced = """
The condition @deva[अनुपात्यये] means @deva[क्रमप्राप्तस्य अनतिपातः] 'not breaking the order of what comes in sequence'—hence 'regular turn/succession'. The contrast between @deva[पर्यायः] (with @deva[घञ्], meaning 'turn') and @deva[पर्ययः] (without @deva[घञ्], meaning 'lapse/change') shows semantic conditioning.
"""

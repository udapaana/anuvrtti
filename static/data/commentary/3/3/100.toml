id = "3.3.100"
numericId = "33100"

[en]
simple = """
After @deva[कृ] 'to do', both @deva[श] and @deva[क्यप्] (plus @deva[क्तिन्]) come for feminine words. Examples: @deva[क्रिया] (with @deva[श]); @deva[कृत्या] (with @deva[क्यप्]); @deva[कृतिः] (with @deva[क्तिन्]).
"""

standard = """
After @deva[कृञ्] 'to do', both @deva[श] and @deva[क्यप्] apply (the @deva[च] draws @deva[क्यप्] from previous rules; @deva[क्तिन्] by @deva[योगविभाग]). Thus: @deva[क्रिया] 'action' (with @deva[श]; root becomes @deva[क्रिय] by @ref[3.1.67]); @deva[कृत्या] 'deed' (with @deva[क्यप्], @ref[6.1.71]); @deva[कृतिः] 'act' (with @deva[क्तिन्]).
"""

advanced = """
By @deva[योगविभाग] (rule-splitting), this @deva[सूत्र] yields: (1) @deva[कृञः] 'after @deva[कृ], @deva[क्तिन्]'; (2) @deva[श च] 'and @deva[श] as well as @deva[क्यप्]'. The @deva[श] affix triggers @deva[कृ] → @deva[क्रिय्] by @ref[3.1.67]. All three formations are productive: @deva[क्रिया] 'action (philosophical term)', @deva[कृत्या] 'deed/ritual', @deva[कृतिः] 'making/composition'.
"""

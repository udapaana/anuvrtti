id = "3.3.169"
numericId = "33169"

[en]
simple = """
The @deva[कृत्य] affixes and @deva[तृच्] (forming agent nouns like @deva[वोढृ]) are used when fitness or suitability regarding the agent is implied, along with the potential (@deva[लिङ्]). Example: @deva[भवान् खलु कन्यां वहेत्] 'you indeed should marry the girl'.
"""

standard = """
For @deva[कर्तृ-साधुकार] (agent's fitness/propriety), @deva[कृत्य], @deva[तृच्], and @deva[लिङ्] (drawn by @deva[च]) are used. Examples: @deva[भवता कन्या वोढव्या/वाह्या/वहनीया] (@[kṛtya] forms); @deva[भवान् कन्यया वोढा] (@[tṛc]); @deva[भवान् कन्यां वहेत्] (@[liṅ]) 'your honor should/is fit to marry the girl'.
"""

advanced = """
@deva[कर्तृसाधुकार] = agent's suitability/propriety for action. @deva[कृत्य]-affixes form gerundives (@deva[वोढव्य], @deva[वाह्य], @deva[वहनीय]); @deva[तृच्] forms agent nouns (@deva[वोढृ] → @deva[वोढा]); @deva[लिङ्] provides optative (@deva[वहेत्]). All three express 'X is fit/proper to do Y'—obligation from agent's status.
"""

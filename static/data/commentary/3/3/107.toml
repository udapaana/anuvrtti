id = "3.3.107"
numericId = "33107"

[en]
simple = """
The affix @deva[युच्] comes after @deva[णि]-ending verbs (causatives), @deva[आस्] 'to sit', and @deva[श्रन्थ्] 'to loosen', to form feminine words. Examples: @deva[कारणा] 'causing to do'; @deva[हारणा] 'causing to take'; @deva[आसना] 'sitting'; @deva[श्रन्थना] 'loosening'.
"""

standard = """
After @deva[णि]-ending (causative) verbs, @deva[आस्] 'to sit', and @deva[श्रन्थ्] 'to loosen', @deva[युच्] applies for feminine, excluding @deva[अ] (@ref[3.3.102]). Examples: @deva[कारि] (@deva[कृ] + @deva[णिच्]) + @deva[युच्] → @deva[कारणा] 'causing' (@deva[इ] elided by @ref[6.4.51]); @deva[हारणा]; @deva[आसना]; @deva[श्रन्थना]. @deva[वार्तिकs] add @deva[घट्ट] → @deva[घट्टना]; @deva[वन्द] → @deva[वन्दना]; @deva[विद्] → @deva[वेदना]; @deva[इष्] (non-desiderative) → @deva[अध्येषणा], @deva[अन्वेषणा].
"""

advanced = """
Feminine affixes inter se supersede each other totally, but not general @deva[कृत्] affixes. @deva[युच्] blocks @deva[अ] (@ref[3.3.102]) but not @deva[ण्यत्]—hence @deva[आस्या] (feminine of @deva[आस्य] from @deva[ण्यत्]) coexists with @deva[आसना]. The @deva[श्रन्थि] here is @deva[क्र्यादि] class 'to loosen', not @deva[चुरादि] (which would be @deva[णिजन्त] automatically). @deva[वार्तिक]: @deva[परि] + @deva[इष्] optionally yields @deva[पर्येषणा] or @deva[परीष्टिः].
"""

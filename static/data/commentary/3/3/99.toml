id = "3.3.99"
numericId = "33099"

[en]
simple = """
The affix @deva[क्यप्] with @deva[उदात्त] accent comes after @deva[समज्], @deva[निषद्], @deva[निपत्], @deva[मन्], @deva[विद्], @deva[षुञ्], @deva[शीङ्], @deva[भृञ्], @deva[इण्] to form feminine appellatives. Examples: @deva[समज्या] 'assembly'; @deva[निषद्या] 'couch'; @deva[विद्या] 'knowledge'; @deva[शय्या] 'bed'; @deva[भृत्या] 'wages'.
"""

standard = """
For feminine @deva[संज्ञा] (appellatives), @deva[क्यप्] with @deva[उदात्त] accent follows: @deva[समज्] → @deva[समज्या] 'assembly'; @deva[निषद्] → @deva[निषद्या] 'couch'; @deva[निपत्] → @deva[निपत्या] 'slippery ground'; @deva[मन्] → @deva[मन्या] 'thinking'; @deva[विद्] → @deva[विद्या] 'knowledge'; @deva[षुञ्] → @deva[सुत्या] 'soma extraction' (@ref[6.1.71]); @deva[शीङ्] → @deva[शय्या] 'bed'; @deva[भृञ्] → @deva[भृत्या] 'wages, service'; @deva[इण्] → @deva[इत्या] 'palanquin'.
"""

advanced = """
Though @deva[भृ] would take @deva[क्यप्] by @ref[3.1.112], that rule's @deva[असञ्ज्ञायाम्] must be qualified 'except in feminine'—since @deva[सञ्ज्ञा]-denoting feminine forms exist here. The test case: @deva[भार्या] 'wife' uses @deva[ण्यत्] (not @deva[क्यप्]), showing @ref[3.1.112] applies to masculine @deva[सञ्ज्ञा] but not feminine.
"""

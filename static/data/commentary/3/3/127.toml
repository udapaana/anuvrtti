id = "3.3.127"
numericId = "33127"

[en]
simple = """
The affix @deva[खल्] comes after @deva[भू] 'to be' and @deva[कृ] 'to do' when the upapada is an agent (for @deva[भू]) or object (for @deva[कृ]), preceded by @deva[ईषत्], @deva[दुर्], or @deva[सु]. Example: @deva[दुराढ्यंभवम्] 'to be enriched with difficulty'.
"""

standard = """
With @deva[भू], the upapada denotes agent; with @deva[कृ], it denotes object. Combined with @deva[ईषत्]/etc., @deva[खल्] is added. Thus @deva[ईषदाढ्यंभवम्] 'being enriched easily', @deva[दुराढ्यंभवम्] 'being enriched with difficulty', @deva[स्वाढ्यङ्करो देवदत्तो भवता] 'Devadatta can be made rich by you easily'.
"""

advanced = """
The @[sūtra] specifies @deva[कर्तृ]-upapada for @deva[भू] (intransitive—the agent undergoes the state) and @deva[कर्मन्]-upapada for @deva[कृ] (transitive—the object is affected). Derivation: @deva[ईषत् + आढ्य + भू + खल् = ईषदाढ्यंभवः]; @deva[सु + आढ्य + कृ + खल् = स्वाढ्यङ्करः]. @[vārttika] notes extension to other @[kāraka] relations.
"""

id = "3.3.113"
numericId = "33113"

[en]
simple = """
The @deva[कृत्य] affixes and @deva[ल्युट्] apply diversely—in places and senses beyond their original prescriptions. The @deva[भाव]/@deva[अकर्तृ] conditions from @ref[3.3.18-19] cease here. Examples: @deva[स्नानीयं चूर्णम्] 'bathing powder' (instrument); @deva[दानीयो ब्राह्मणः] '@[brāhmaṇa] to be given to' (recipient).
"""

standard = """
The @deva[कृत्य] affixes (@ref[3.1.95]) and @deva[ल्युट्] are @deva[बहुलम्] (diversely applicable)—they occur beyond their prescribed domains. The @deva[अनुवृत्ति] of @deva[भावे] and @deva[अकर्तरि कारके] from @ref[3.3.18-19] ends here. @deva[कृत्य] affixes (normally for action/object) apply to other @deva[कारकs]: @deva[स्नानीयं चूर्णम्] 'bathing powder' (instrument, 3rd case); @deva[दानीयो ब्राह्मणः] '@[brāhmaṇa] to give to' (recipient, 4th case). @deva[ल्युट्] similarly extends.
"""

advanced = """
The @deva[बहुलम्] principle allows @deva[कृत्य] and @deva[ल्युट्] in @deva[कारकs] beyond @deva[कर्म]. @deva[ल्युट्] examples: @deva[राजभोजनाः शालयः] 'halls for royal eating'; @deva[राजाच्छादनानि वासांसि] 'garments to cover the king'. Even general @deva[कृत्] affixes extend: @deva[पादहारकः] 'carried by feet'; @deva[गलेचोपकः] 'smeared on throat' (@ref[6.2.150] for accent).
"""

id = "3.3.78"
numericId = "33078"

[en]
simple = """
The word @deva[अन्तर्घन] is formed from @deva[अन्तर्] + @deva[हन्] + @deva[अप्] (with @deva[घन्] substitute) when meaning 'a country'. Example: @deva[अन्तर्घनः] 'name of a @[bāhīka] country' (also: an open court before a house). Some write @deva[अन्तर्घणः].
"""

standard = """
With @deva[अन्तर्] 'within/between', @deva[हन्] takes @deva[अप्] with @deva[घन्] substitute when meaning @deva[देश] (country). Thus @deva[अन्तर्घनः] 'name of a @[bāhīka] country'; also 'a porch or open court between entrance and house'. The spelling @deva[अन्तर्घणः] (with @deva[ण]) is also valid. Without country meaning: @deva[अन्तर्घातः] 'striking in the middle'.
"""

advanced = """
The @deva[देश] semantic condition restricts @deva[घन्]-substitution to place-name usage. The form @deva[अन्तर्घन] denotes both a geographical region (@[bāhīka] territory) and an architectural feature (courtyard between door and house). The variant @deva[अन्तर्घण] with cerebral @deva[ण] is accepted as valid alternative.
"""

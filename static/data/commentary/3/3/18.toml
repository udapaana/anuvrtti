id = "3.3.18"
numericId = "33018"

[en]
simple = """
The affix @deva[घञ्] comes after any root when mere action (@deva[भाव]) is denoted. Examples: @deva[पाकः] 'cooking'; @deva[त्यागः] 'abandonment'; @deva[रागः] 'coloring'.
"""

standard = """
When the sense is @deva[भाव] (mere action, the verbal noun), @deva[घञ्] may follow any root. Examples: @deva[पच्] + @deva[घञ्] → @deva[पाकः] 'cooking' (@ref[7.2.116], @ref[7.3.52]); @deva[त्यज्] → @deva[त्यागः] 'abandonment'; @deva[रञ्ज्] → @deva[रागः] 'coloring' (@ref[6.4.27]). These words may take any gender or number: @deva[पक्तिः], @deva[पचनम्], @deva[पाकौ], @deva[पाकाः]. They form verbal nouns or abstract nouns of action.
"""

advanced = """
The @deva[भाव] sense expresses the action in its completed state as a general abstraction. Since the root's meaning can be conveyed by the root itself, @deva[घञ्] and similar affixes come after all roots when expressing this abstract sense. The resulting @deva[भाववाचक] nouns (verbal nouns, nouns of action) are not restricted to masculine @deva[एकवचन] (singular)—they may appear in any gender/number combination appropriate to the context.
"""

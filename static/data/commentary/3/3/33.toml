id = "3.3.33"
numericId = "33033"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[स्तॄ] 'to spread' with @deva[वि] when meaning 'extent/expansion' and NOT referring to words. Example: @deva[पटस्य विस्तारः] 'the extent of a cloth'. For word-prolixity: @deva[विस्तरो वचसाम्].
"""

standard = """
With @deva[वि] + @deva[स्तॄ], @deva[घञ्] applies when the meaning is @deva[प्रथन] (extension, extent) and when NOT referring to words (@deva[अवचने]). Thus @deva[पटस्य विस्तारः] 'the extent/expansion of the garment'. Counter-examples: @deva[तृणविस्तरः] 'collection of grass' (not extent); @deva[विस्तरो वचसाम्] 'prolixity of words' (referring to words).
"""

advanced = """
Two conditions apply: (1) @deva[प्रथने] 'when meaning extent/circuit/range' and (2) @deva[अवचने] 'not referring to words'. Both must be satisfied for @deva[घञ्]. The first condition excludes meanings like 'collection/heap'; the second excludes verbal/linguistic contexts where @deva[विस्तर] (without @deva[घञ्]) is used.
"""

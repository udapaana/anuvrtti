id = "3.3.51"
numericId = "33051"

[en]
simple = """
The affix @deva[घञ्] is optionally used after @deva[ग्रह्] 'to seize' with @deva[अव] when meaning 'withholding of rain' (drought). Example: @deva[अवग्राहः] or @deva[अवग्रहः] 'drought'.
"""

standard = """
With @deva[अव] + @deva[ग्रह्] meaning @deva[वर्षप्रतिबन्ध] (obstruction of rain, drought), @deva[घञ्] is optional. Thus @deva[अवग्राहो देवस्य] or @deva[अवग्रहो देवस्य] 'the drought (withholding of rain by the god)'. Without drought meaning: @deva[अवग्रहः पदस्य] 'separation/pause of a word'.
"""

advanced = """
The semantic condition @deva[वर्षप्रतिबन्धे] specifies rain-withholding—when the season has arrived but rain is obstructed. The @deva[विभाषा] allows both @deva[अवग्राह] (with @deva[घञ्]) and @deva[अवग्रह] (without). The latter is the common grammatical term for 'pause' or 'separation' in compound analysis.
"""

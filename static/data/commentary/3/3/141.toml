id = "3.3.141"
numericId = "33141"

[en]
simple = """
This @[sūtra] introduces a section (up to @ref[3.3.152]) where optionally the conditional (@deva[लृङ्]) may be used instead of other tenses when expressing past time and non-completion of action.
"""

standard = """
This is an @deva[अधिकार]-@[sūtra] governing rules up to @ref[3.3.152]. The conditions from @ref[3.3.139]-@ref[3.3.140] continue: where @deva[लिङ्]-reasons exist and non-completion (@deva[क्रियातिपत्ति]) is implied, @deva[लृङ्] (conditional) may optionally replace other tenses for past-time expressions.
"""

advanced = """
This establishes @deva[अधिकार] extending to @ref[3.3.152]. The governing conditions are: @deva[लिङ्]-nimitta presence, @deva[क्रियातिपत्ति], and @deva[भूतार्थ]. Within this domain, @deva[लृङ्] is @deva[विकल्पेन] available alongside tenses that would otherwise apply. The optionality (@deva[वा]) is carried forward from preceding @[sūtras].
"""

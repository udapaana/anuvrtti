id = "3.3.74"
numericId = "33074"

[en]
simple = """
The word @deva[आहाव] is irregularly formed (with @deva[वृद्धि] of the vowel) when meaning 'a water trough'. Example: @deva[आहावः] 'a trough near a well for watering cattle'. Otherwise: @deva[आह्वायः] 'calling'.
"""

standard = """
The word @deva[आहावः] is formed irregularly from @deva[आ] + @deva[ह्वे] when meaning @deva[उदपान] 'a water trough'. Derivation: @deva[आ] + @deva[ह्वे] + @deva[अप्] → @deva[आहु] + @deva[अ] (by @deva[सम्प्रसारण]) → @deva[आहौ] + @deva[अ] (by @deva[वृद्धि]) → @deva[आहावः] 'a trough near a well where cattle are invited to drink'. Without this meaning: @deva[आह्वायः] 'calling'.
"""

advanced = """
The irregular @deva[वृद्धि] (@deva[उ] → @deva[औ]) distinguishes this formation. The semantic connection: it's the place where cattle are 'called' or 'invited' to drink. This @deva[निपातन] (irregular formation) shows @deva[सम्प्रसारण] + @deva[वृद्धि], contrasting with @ref[3.3.73]'s @deva[सम्प्रसारण] + @deva[गुण].
"""

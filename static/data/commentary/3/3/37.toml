id = "3.3.37"
numericId = "33037"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[परि] + @deva[नी] meaning 'game/gambling' and @deva[नि] + @deva[इ] meaning 'propriety/law'. Examples: @deva[परिणायः] 'chess move'; @deva[न्यायः] 'justice, logic'. Other meanings: @deva[परिणयः] 'marriage'; @deva[न्ययम्] 'decay'.
"""

standard = """
By @ref[1.3.10], @deva[परि] pairs with @deva[नी] and @deva[नि] with @deva[इ]. With meanings @deva[द्यूत] 'gambling/game' and @deva[अभ्रेष] 'propriety/law' respectively, @deva[घञ्] applies. Thus @deva[परिणायः] 'moving chess pieces from all sides, winning the game'; @deva[न्यायः] (@deva[नि] + @deva[इ] + @deva[घञ्] → @deva[नि] + @deva[आय]) 'justice, logic'. Without these senses: @deva[परिणयः] 'marriage'; @deva[न्ययम्] 'decay'.
"""

advanced = """
The @deva[यथासंख्य] principle pairs items: @deva[परि]-@deva[नी] with @deva[द्यूत] sense; @deva[नि]-@deva[इ] with @deva[अभ्रेष] sense (@deva[पदार्थानाम् अनपचारो यथापापकरणम्] 'proper arrangement of matters, doing things correctly'). The derivation @deva[नि] + @deva[इ] + @deva[घञ्] → @deva[नि] + @deva[ऐ] (by @deva[वृद्धि]) + @deva[अ] → @deva[न्याय].
"""

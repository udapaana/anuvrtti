id = "3.3.175"
numericId = "33175"

[en]
simple = """
The aorist (@deva[लुङ्]) is used when the prohibitive particle @deva[माङ्] (with indicatory @deva[ङ्]) is used. This sets aside all other tenses. Examples: @deva[मा कार्षीत्] 'let him not do', @deva[मा हार्षीत्] 'let him not take'.
"""

standard = """
@deva[माङ्] (the @deva[मा] with indicatory @deva[ङ्]) requires @deva[लुङ्] (aorist) exclusively, superseding other tenses. Examples: @deva[मा कार्षीत्] 'let him not do'; @deva[मा हार्षीत्] 'let him not take'. Sentences like @deva[मा भवतु] or @deva[मा भविष्यति] use a different @deva[मा] (without @deva[ङ्]) which permits other tenses.
"""

advanced = """
@deva[माङ्] (prohibitive, marked with @deva[ङ्] as @deva[इत्]) triggers @deva[लुङ्] exclusively—@deva[सर्वलकार-प्रतिषेध]. Forms like @deva[मा भवतु] (@[loṭ]), @deva[मा भविष्यति] (@[lṛṭ]) use @deva[मा] without @deva[ङ्]-@deva[इत्], a different particle permitting other @[lakāras]. @deva[माङ्] + @deva[लुङ्] = canonical prohibition construction.
"""

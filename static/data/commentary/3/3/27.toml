id = "3.3.27"
numericId = "33027"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[द्रु] 'to run', @deva[स्तु] 'to praise', and @deva[स्रु] 'to flow' when compounded with @deva[प्र]. Examples: @deva[प्रद्रावः]; @deva[प्रस्तावः]; @deva[प्रस्रावः]. Without @deva[प्र]: @deva[द्रवः], @deva[स्तवः], @deva[स्रवः].
"""

standard = """
With the prefix @deva[प्र], the roots @deva[द्रु] 'to run', @deva[स्तु] 'to praise', and @deva[स्रु] 'to flow' take @deva[घञ्]. Examples: @deva[प्र] + @deva[द्रु] → @deva[प्रद्रावः] 'flight'; @deva[प्र] + @deva[स्तु] → @deva[प्रस्तावः] 'introduction, prelude'; @deva[प्र] + @deva[स्रु] → @deva[प्रस्रावः] 'urination'. Without @deva[प्र]: @deva[द्रवः] 'running', @deva[स्तवः] 'praise', @deva[स्रवः] 'flow'.
"""

advanced = """
Each root shows @deva[वृद्धि] before @deva[घञ्]: @deva[द्रु] → @deva[द्राव]; @deva[स्तु] → @deva[स्ताव]; @deva[स्रु] → @deva[स्राव]. The term @deva[प्रस्तावः] has acquired the specialized meaning 'introduction' or 'prelude' (as in musical/literary contexts), demonstrating semantic development beyond the literal 'praising forth'.
"""

id = "3.3.168"
numericId = "33168"

[en]
simple = """
When @deva[यत्] is in composition along with @deva[काल], @deva[समय], or @deva[वेला], the potential (@deva[लिङ्]) is used instead of the infinitive. Example: @deva[कालो यद् भवान् भुञ्जीत] 'it is time that you should eat'.
"""

standard = """
With @deva[यत्] + @deva[काल/समय/वेला], @deva[लिङ्] is mandated, superseding @deva[तुमुन्] from @ref[3.3.167]. Examples: @deva[कालः/समयः/वेला यद् भवान् भुञ्जीत] 'it is time that your honor should take meals'. The @deva[यत्]-clause creates a subordinate structure requiring finite @deva[लिङ्].
"""

advanced = """
@deva[यत्]-upapada with time-words triggers @deva[लिङ्], an @deva[अपवाद] to @ref[3.3.167]'s @deva[तुमुन्]. The @deva[यत्]-clause introduces subordination: @deva[कालो यद् भुञ्जीत] 'time that (one) should eat'. @deva[लिङ्] provides the finite verb form required in @deva[यत्]-headed complement clauses.
"""

id = "3.3.142"
numericId = "33142"

[en]
simple = """
The present tense (@deva[लट्]) is used after a verb when @deva[अपि] or @deva[जातु] is in composition with it and the sentence expresses censure. This applies regardless of when the action actually occurred.
"""

standard = """
@deva[लट्] (present tense) is used when @deva[अपि] or @deva[जातु] accompanies the verb in expressions of @deva[गर्हा] (censure, blame). Though @deva[लट्] normally denotes present time, here it applies regardless of actual time—the present is used rhetorically to express strong disapproval.
"""

advanced = """
When @deva[अपि] or @deva[जातु] are @deva[उपपद]-s and @deva[गर्हा] (censure) is the intent, @deva[लट्] applies irrespective of @deva[काल]. This is @deva[सर्वकालिक]-usage: present tense conveys vivid reproach regardless of whether the censured action is past, present, or future. The @deva[लट्] here functions as @deva[गर्हार्थक], not @deva[वर्तमानार्थक].
"""

id = "3.3.101"
numericId = "33101"

[en]
simple = """
The form @deva[इच्छा] 'desire' is irregular. From @deva[इष्] + @deva[श] = @deva[इच्छा], without the @deva[यक्] that @ref[3.1.67] would require. @deva[वार्तिकs] add: @deva[परिसर्या] 'perambulation'; @deva[परिचर्या] 'service'; @deva[मृगया] 'hunting'.
"""

standard = """
The word @deva[इच्छा] 'desire' is irregularly formed: @deva[इष्] + @deva[श] → @deva[इच्छ्] + @deva[अ] → @deva[इच्छा]. The irregularity: @deva[यक्] (required by @ref[3.1.67]) is not added. @deva[वार्तिकs] add other irregular forms: @deva[परिसर्या] 'perambulation'; @deva[परिचर्या] 'attendance, service'; @deva[मृगया] 'hunting'; @deva[अटाट्या] 'habit of wandering as mendicant'. From @deva[जागृ]: either @deva[जागरा] (with @deva[अ]) or @deva[जागर्या] (with @deva[श] bringing @deva[यक्]) 'waking'.
"""

advanced = """
The @deva[निपातन] of @deva[इच्छा] blocks expected @deva[यक्]-insertion before @deva[श]. The @deva[वार्तिक] forms (@deva[परिसर्या], @deva[परिचर्या], @deva[मृगया], @deva[अटाट्या]) are similarly irregular feminine nominals. The @deva[जागृ] doublet (@deva[जागरा]/@deva[जागर्या]) shows the expected @deva[यक्] in one form but not the other.
"""

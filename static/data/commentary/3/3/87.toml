id = "3.3.87"
numericId = "33087"

[en]
simple = """
The word @deva[निघ] is irregularly formed when meaning 'as high as broad' (square/cubic proportions). Example: @deva[निघा वृक्षाः] 'trees as high as broad'; @deva[निघा शालयः] 'square halls'. Otherwise: @deva[निघातः] 'a blow'.
"""

standard = """
The word @deva[निघः] is formed irregularly from @deva[नि] + @deva[हन्] when meaning @deva[निमित] (measured all around, i.e., 'as high as broad'). Examples: @deva[निघा वृक्षाः] 'trees of equal height and breadth'; @deva[निघा शालयः] 'square or cubic halls'. Without this meaning: @deva[निघातः] 'striking down, a blow'.
"""

advanced = """
The term @deva[निमित] = @deva[समन्तान्मितम्] or @deva[समारोहपरिणाहम्] 'measured equally in all dimensions'. It may derive from @deva[मा] 'to measure' or @deva[मि] 'to erect'. The @deva[निपातन] restricts @deva[निघ] to architectural/natural proportional descriptions. Reference: @[āpastamba] @[dharmasūtra] I.20.30.
"""

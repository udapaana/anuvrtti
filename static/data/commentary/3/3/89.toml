id = "3.3.89"
numericId = "33089"

[en]
simple = """
This rule teaches that roots marked with @deva[टु] in the @deva[धातुपाठ] (root catalogue) take the affix @deva[अथुच्] to form nouns denoting the action itself.

The @deva[टु] is a label attached to certain roots in the catalogue — it has no meaning of its own, but triggers this affix. The resulting nouns are masculine and typically describe bodily or physical processes.

**Examples:**
- @deva[वेपृ] (to tremble) + @deva[अथुच्] → @deva[वेपथुः] "trembling"
- @deva[श्वि] (to swell) + @deva[अथुच्] → @deva[श्वयथुः] "swelling"
- @deva[क्षु] (to sneeze) + @deva[अथुच्] → @deva[क्षवथुः] "sneezing"
- @deva[दु] (to burn) + @deva[अथुच्] → @deva[दवथुः] "burning sensation"

These words name the process itself — @deva[वेपथुः] means "the act of trembling," not "one who trembles."
"""

standard = """
Roots bearing the indicatory @deva[टु] in the @deva[धातुपाठ] take the @deva[कृत्] affix @deva[अथुच्] in the @deva[भाव] (action) and related senses. The @deva[च्] in @deva[अथुच्] is @deva[इत्] (an indicatory marker that drops in the final form), leaving the operational form @deva[अथु].

**Derivations:**
- @deva[टुवेपृ] "to tremble" → @deva[वेपथुः] "trembling"
- @deva[टुओश्वि] "to swell" → @deva[श्वयथुः] "swelling"
- @deva[टुक्षुः] "to sneeze" → @deva[क्षवथुः] "sneezing"
- @deva[टुदु] "to burn" → @deva[दवथुः] "burning"

The affix produces masculine nouns. The @deva[टु] marker in the @deva[धातुपाठ] entry is the sole trigger — only roots so marked qualify.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[भावे] etc. from @ref[3.3.18].

The @deva[टु]-marker in @deva[धातुपाठ] entries is @deva[इत्] by @ref[1.3.5] and triggers this affix prescription. The operational form after @deva[इत्]-deletion of @deva[च्] is @deva[अथु], producing masculine nouns that denote processes or bodily states — particularly involuntary physical conditions like trembling, swelling, sneezing, and burning sensations.

The affix @deva[अथुच्] is listed among the @deva[उणादि] affixes by some grammarians, but @[pāṇini] treats it within the regular @deva[कृत्] system. The resulting forms are @deva[भाववाचक] (action-denoting), not agent-denoting.

Cross-reference: The @deva[टु]-marker also triggers @deva[आत्मनेपद] by @ref[1.3.12], so these roots share both properties — @deva[आत्मनेपद] conjugation and the @deva[अथुच्] nominal affix.
"""

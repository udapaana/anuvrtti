id = "3.3.67"
numericId = "33067"

[en]
simple = """
The affix @deva[अप्] comes after @deva[मद्] 'to be intoxicated/proud' when NO @deva[उपसर्ग] is present. Examples: @deva[विद्यामदः] 'pride of learning'; @deva[धनमदः] 'pride of wealth'. With prefix: @deva[उन्मादः] 'madness'; @deva[प्रमादः] 'carelessness'.
"""

standard = """
Without @deva[उपसर्ग], @deva[मद्] 'to be intoxicated/proud' takes @deva[अप्], blocking @deva[घञ्]. Examples: @deva[विद्यामदः] 'pride of knowledge'; @deva[धनमदः] 'pride of wealth'; @deva[कुलमदः] 'pride of lineage'. With prefixes: @deva[उन्मादः] 'madness, frenzy'; @deva[प्रमादः] 'error, carelessness' (using @deva[घञ्]).
"""

advanced = """
The @deva[अनुपसर्ग] condition restricts @deva[अप्] to prefix-less forms. With prefixes, @deva[घञ्] applies, yielding @deva[वृद्धि]: @deva[उन्माद], @deva[प्रमाद]. The compound forms like @deva[विद्यामद] use the @deva[अप्]-derived @deva[मद] as the final member.
"""

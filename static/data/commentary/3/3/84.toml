id = "3.3.84"
numericId = "33084"

[en]
simple = """
The affix @deva[क] comes after @deva[हन्] with @deva[परि] in instrumental sense, with @deva[घ] replacing @deva[हन्]. Example: @deva[परिघः] or @deva[पलिघः] 'an iron bar for locking gates, iron club'.
"""

standard = """
With @deva[परि] and instrumental meaning, @deva[हन्] takes @deva[क] with @deva[घ] (not @deva[घन्] or @deva[घ्न]) as substitute. Thus @deva[परिघः] or @deva[पलिघः] (@ref[8.2.22], @deva[र] → @deva[ल]) 'an iron beam for barring/locking gates, an iron club'.
"""

advanced = """
The unique @deva[घ]-substitute (not @deva[घन्] or @deva[घ्न]) distinguishes this rule. The variant @deva[पलिघ] with @deva[ल] follows @ref[8.2.22] (optional @deva[र] → @deva[ल] in certain environments). The @deva[परिघ] is a defensive/offensive implement—either a door-bolt or a weapon.
"""

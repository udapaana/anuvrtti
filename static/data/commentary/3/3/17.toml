id = "3.3.17"
numericId = "33017"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[सृ] 'to flow/move' when the agent is permanently fixed. Example: @deva[सारः] 'essence' (as in @deva[चन्दनसारः] 'essence of sandalwood').
"""

standard = """
After @deva[सृ] 'to move/flow', @deva[घञ्] applies when the agent is @deva[स्थिर] 'permanent/fixed'. Thus @deva[सारः] 'essence'—that which remains constant while moving through time. Examples: @deva[चन्दनसारः] 'sandalwood essence'; @deva[खदिरसारः] 'catechu essence'. Without @deva[स्थिर] condition: @deva[सर्त्ता] 'one who moves', @deva[सारकः] 'that which flows'.
"""

advanced = """
The semantic condition @deva[स्थिर] 'permanently fixed' defines the applicability: the @deva[कर्तृ] (agent) must be something that remains constant over time while the action (@deva[सरण]) occurs. A @deva[वार्तिक] extends @deva[सारः] to disease (@deva[अतिसारः] 'dysentery'), fish (@deva[विसारः]), and strength (@deva[सारः] 'vigor'). These specialized meanings show the word's semantic range beyond the prototypical 'essence'.
"""

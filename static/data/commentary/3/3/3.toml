id = "3.3.3"
numericId = "33003"

[en]
simple = """
Words like @deva[गामि] have future-tense meaning. Examples: @deva[गामी ग्रामम्] 'intending to go to the village'; @deva[आगामी] 'that which will come'; @deva[भावी] 'what will be'.
"""

standard = """
This @deva[सूत्र] extends @deva[उणादि] application to future sense for the @deva[गामि]-class words. Examples: @deva[गामी] 'one about to go', @deva[आगामी] 'forthcoming', @deva[प्रस्थायी] 'about to depart', @deva[प्रतिरोधी] 'one who will obstruct', @deva[भावी] 'what will happen'. A @deva[वार्तिक] specifies this must be @deva[अनद्यतन] future (not today)—corresponding to @deva[लुट्] (first future), not @deva[लृट्] (second future).
"""

advanced = """
The @deva[गाम्यादि] class takes @deva[उणादि] affixes with @deva[भविष्यत्] (future) meaning. The @deva[वार्तिक] restriction to @deva[अनद्यतन] (non-today) future aligns these forms with @deva[लुट्] rather than @deva[लृट्]—@deva[श्वो गामी ग्रामम्] 'he will go to the village tomorrow' is valid, but same-day future requires different forms. Listed examples: @deva[गामी], @deva[आगामी], @deva[प्रस्थायी], @deva[प्रतिरोधी], @deva[प्रतिबोधी], @deva[प्रतियोधी], @deva[प्रतियोगी], @deva[प्रतियायी], @deva[आयायी], @deva[भावी].
"""

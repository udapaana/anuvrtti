id = "3.3.40"
numericId = "33040"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[चि] 'to gather' when meaning 'taking by hand' and NOT stealing. Examples: @deva[पुष्पप्रचायः] 'gathering flowers by hand'; @deva[फलप्रचायः] 'gathering fruits by hand'. For theft: @deva[पुष्पप्रचयश्चौर्येण].
"""

standard = """
After @deva[चि] 'to gather' meaning @deva[हस्तादान] (taking by hand, implying close proximity), @deva[घञ्] applies when NOT meaning theft (@deva[अचौर्ये]). Thus @deva[पुष्पप्रचायः] 'hand-gathering of flowers'; @deva[फलप्रचायः] 'hand-gathering of fruits'. Counter-examples: using a stick (@deva[यष्टया प्रचयम्]); stealing (@deva[पुष्पप्रचयश्चौर्येण])—neither takes @deva[घञ्].
"""

advanced = """
Two conditions: (1) @deva[हस्तादाने] 'taking by hand'—indicating proximity of gatherer to gathered; (2) @deva[अचौर्ये] 'not theft'. A @deva[वार्तिक] notes @deva[उच्चय] 'gathering' is also prohibited from @deva[घञ्]: hence @deva[पुष्पोच्चयः] 'flower-gathering by hand' (not *@deva[पुष्पोच्चायः]).
"""

id = "3.3.36"
numericId = "33036"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[ग्रह्] 'to seize' with @deva[सम्] when the meaning relates to fist/clenching. Example: @deva[मल्लस्य सङ्ग्राहः] 'the wrestler's clenching of fist'. For other meanings: @deva[सङ्ग्रहो धान्यस्य] 'collection of grain'.
"""

standard = """
With @deva[सम्] + @deva[ग्रह्], @deva[घञ्] applies when the meaning relates to @deva[मुष्टि] 'fist/boxing'. Thus @deva[मल्लस्य सङ्ग्राहः] 'the wrestler's firm grip'; @deva[मुष्ठिकस्य सङ्ग्राहः] 'the boxer's clenching'. Without the fist-meaning: @deva[सङ्ग्रहो धान्यस्य] 'a collection of grain'.
"""

advanced = """
The semantic condition @deva[मुष्टिविषये] restricts @deva[घञ्] to contexts involving fisting, clenching, or boxing. The word @deva[मुष्टि] denotes both the closed fist and the act of boxing. Outside this semantic domain, the regular formation @deva[सङ्ग्रह] applies.
"""

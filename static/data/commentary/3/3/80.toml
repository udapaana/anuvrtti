id = "3.3.80"
numericId = "33080"

[en]
simple = """
The word @deva[उद्घन] is irregularly formed when meaning 'bench'. Example: @deva[उद्घनः] 'a carpenter's bench' (the wood on which other planks are placed for carving). Otherwise: @deva[उद्घातः] 'uneven'.
"""

standard = """
The word @deva[उद्घनः] is formed irregularly (@deva[निपातन]) from @deva[उत्] + @deva[हन्] when meaning @deva[आसन्दी] (bench). Thus @deva[उद्घनः] 'a carpenter's bench'—the wooden surface on which planks are placed for carving work. Without the bench meaning: @deva[उद्घातः] 'striking up, uneven surface'.
"""

advanced = """
The @deva[निपातन] restricts @deva[उद्घन] to the specialized 'bench' meaning. The semantic connection: the bench is where wood is 'struck' or worked. This contrasts with @deva[उद्घात] 'striking upward, unevenness', which uses regular @deva[घञ्] derivation without the @deva[घन्] substitute.
"""

id = "3.3.111"
numericId = "33111"

[en]
simple = """
The affix @deva[ण्वुच्] comes optionally after a root when expressing succession, merit, debt, or production. This supersedes @deva[क्तिन्] etc. Examples: @deva[शयिका] 'turn of sleeping'; @deva[इक्षुभक्षिका] 'meal of sugarcane owed/deserved/produced'.
"""

standard = """
The affix @deva[ण्वुच्] applies optionally after roots in four senses: (1) @deva[पर्याय] (turn/succession): @deva[भवतः शयिका] 'your turn of sleeping'; (2) @deva[अर्ह] (worthiness): @deva[अर्हति भवान् इक्षुभक्षिकाम्] 'you deserve a sugarcane meal'; (3) @deva[ऋण] (debt): @deva[इक्षुभक्षिकां मे धारयसि] 'you owe me a sugarcane meal'; (4) @deva[उत्पत्ति] (production): @deva[इक्षुभक्षिका मे उदपादि]. Option: @deva[चिकीर्षा उत्पद्यते].
"""

advanced = """
The @deva[ण्वुच्] and @deva[ण्वुल्] yield identical forms; the difference is accent (@ref[6.1.193], @ref[6.1.163]). The four semantic conditions (@deva[पर्याय], @deva[अर्ह], @deva[ऋण], @deva[उत्पत्ति]) extend beyond the basic @deva[भाव]/@deva[कारक] senses. The @deva[विभाषा] allows other affixes too.
"""

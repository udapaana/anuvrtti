id = "3.3.19"
numericId = "33019"

[en]
simple = """
The affix @deva[घञ्] comes after a root when forming an appellative, where the word relates to the verb's action but NOT as agent. Examples: @deva[प्रासः] 'dart' (what is thrown); @deva[आहारः] 'food' (from which juice is extracted).
"""

standard = """
In @deva[संज्ञा] (appellative) sense, @deva[घञ्] follows a root when the word relates to the verbal action as a @deva[कारक] other than @deva[कर्तृ] (agent). Examples: @deva[प्रासः] 'dart' (@deva[प्र] + @deva[अस्]—what is thrown); @deva[प्रसेवः] 'sack' (what is stitched together); @deva[आहारः] 'food' (from which essence is taken). Counter-example: @deva[मेषः] 'sheep' (related as agent—'one who gazes helplessly')—takes different affix.
"""

advanced = """
The @deva[अकर्तरि] 'non-agent' condition uses @deva[नञ्] with @deva[प्रसज्य-प्रतिषेध] force (simple prohibition), not @deva[पर्युदास] (exclusion implying other @deva[कारकs]). The word @deva[कारक] is included to clarify this. The @deva[च] indicates optional irregular application even without @deva[संज्ञा] sense: @deva[को भवता दायो दत्तः] 'what gift was given by you?' Both @deva[भाव] and @deva[अकर्तरि कारक] senses continue as @deva[अनुवृत्ति] into subsequent @deva[सूत्रs].
"""

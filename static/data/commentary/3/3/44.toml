id = "3.3.44"
numericId = "33044"

[en]
simple = """
The affix @deva[इनुण्] comes after a root denoting condition when expressing 'co-extensiveness' (complete relation between action and quality). Examples: @deva[सांराविणम्] 'general uproar'; @deva[सांकुटिनम्] 'general confusion'.
"""

standard = """
For @deva[भाव] (condition/state) with @deva[अभिविधि] (co-extensiveness, complete comprehension), @deva[इनुण्] is used. The stem takes @deva[अण्] (@ref[5.4.15-16]). Examples: @deva[सम्] + @deva[रु] + @deva[इनुण्] + @deva[अण्] → @deva[सांराविणम्] 'tumultuous uproar'; @deva[सांकुटिनम्] 'general confusion'; @deva[सांस्राविणम्] 'general flow'. Without co-extensiveness: @deva[सङ्कोटः], @deva[संरावः], @deva[सन्द्रावः].
"""

advanced = """
The word @deva[भाव] is repeated (though continuing from @ref[3.3.18]) to block @deva[वाऽसरूप] (@ref[3.1.94])—ensuring @deva[घञ्] never applies here. @[patañjali] notes the repetition also prohibits @deva[क्त] etc. in neuter @deva[भाव] sense with co-extensiveness. The @deva[इनुण्] stem is incomplete until @deva[अण्] is added. The affix @deva[ल्युट्] is not blocked: hence @deva[सङ्कुटनम्] is valid (@ref[3.3.113]).
"""

id = "3.3.48"
numericId = "33048"

[en]
simple = """
This rule teaches that the affix @deva[घञ्] is added after the root @deva[वृ] (to cover, to choose) when preceded by @deva[नि] (down, into), provided the meaning is grain (@deva[धान्य]).

The resulting word is @deva[नीवार] "wild rice" — grain that grows without cultivation. The @deva[ई] in @deva[नीवार] comes from the @deva[वृद्धि] substitution triggered by @deva[घञ्].

Without the grain meaning, a different form arises: @deva[निवरा कन्या] "a virgin girl" (one who is chosen or set apart).
"""

standard = """
With @deva[नि] + @deva[वृ] (encompassing both @deva[वृङ्] "to choose" and @deva[वृञ्] "to cover") in the sense of @deva[धान्य] (grain), @deva[घञ्] applies, blocking @deva[अप्] which would otherwise apply by @ref[3.3.57].

Derivation: @deva[नि] + @deva[वृ] + @deva[घञ्] → @deva[नीवार] (with @deva[वृद्धि]: @deva[इ] → @deva[ई]; @deva[ॠ] → @deva[आर्]).

Example: @deva[नीवाराः] "wild rice, grain growing without cultivation."

Counter-example: @deva[निवरा कन्या] "a virgin girl" — without grain meaning, a different formation applies.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[घञ्] from @ref[3.3.16].

The root @deva[वृ] encompasses both @deva[वृङ्] "to choose" and @deva[वृञ्] "to cover." Since @deva[वृ] ends in @deva[ॠ], the affix @deva[अप्] would normally apply by @ref[3.3.57]. This rule overrides that for the grain sense.

The derivation involves @deva[वृद्धि] of both the prefix vowel (@deva[इ] → @deva[ई]) and the root vowel (@deva[ॠ] → @deva[आर्]): @deva[नि] + @deva[वृ] + @deva[घञ्] → @deva[नीवार]. The semantic restriction to @deva[धान्य] creates the well-known botanical term @deva[नीवार] "wild rice" (@[nīvāra]), distinguishing it from other @deva[नि] + @deva[वृ] formations.
"""

id = "3.3.157"
numericId = "33157"

[en]
simple = """
The potential (@deva[लिङ्]) or imperative (@deva[लोट्]) is used when another verb expressing wishing is in construction. Example: @deva[इच्छामि भुञ्जीत भवान्] or @deva[इच्छामि भुङ्क्तां भवान्] 'I wish that you may eat'.
"""

standard = """
When verbs meaning 'wish' (@deva[इष्], @deva[कम्], @deva[प्रार्थ्], etc.) govern another verb, @deva[लिङ्] or @deva[लोट्] is used for the governed verb. Both supersede other tenses. Examples: @deva[इच्छामि/कामये/प्रार्थये भुञ्जीत भवान्] or @deva[भुङ्क्तां भवान्] 'I wish/desire/pray that you eat'.
"""

advanced = """
When @deva[इच्छादि]-@[dhātus] (desiderative verbs) govern a subordinate verb, that verb takes @deva[लिङ्] or @deva[लोट्], both superseding contextual @[lakāras]. The choice between @deva[लिङ्] and @deva[लोट्] depends on politeness/directness: @deva[लिङ्] for optative wish, @deva[लोट्] for more direct request-form.
"""

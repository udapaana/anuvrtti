id = "3.3.118"
numericId = "33118"

[en]
simple = """
The affix @deva[घ] generally comes for instrument or location sense after a root when forming masculine appellatives. Examples: @deva[दन्तच्छदः] 'lip' (tooth-coverer); @deva[उरच्छदः] 'breastplate'; @deva[आकरः] 'mine' (where they work); @deva[आलयः] 'house'.
"""

standard = """
@deva[घ] applies @deva[प्रायेण] (generally, not universally) for @deva[करण]/@deva[अधिकरण] sense when forming masculine @deva[संज्ञा] (appellatives). For instruments: @deva[दन्तच्छदः] 'lip' (tooth-coverer; @deva[छादि] + @deva[घ] → @deva[छद] by @ref[6.4.96]); @deva[उरच्छदः] 'breastplate'; @deva[घटः] 'pot'. For locations: @deva[आकरः] 'mine' (where men work); @deva[आलयः] 'house' (where they settle). Non-masculine: @deva[प्रसाधनम्] 'comb' (neuter, uses @deva[ल्युट्]). Non-appellative: @deva[प्रहरणो दण्डः] 'the beating stick'.
"""

advanced = """
The @deva[घ्]-@deva[इत्] serves @ref[6.4.96]: causative @deva[छादि] with @deva[घ] shortens @deva[आ]. The @deva[प्रायेण] indicates exceptions exist. The @deva[पुंलिङ्ग] and @deva[संज्ञा] conditions distinguish this from @deva[ल्युट्] (which creates neuter nouns).
"""

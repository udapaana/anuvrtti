id = "3.3.7"
numericId = "33007"

[en]
simple = """
When the sentence indicates that success will come to another by fulfilling the speaker's desire, @deva[लट्] (present tense) may optionally express future meaning. Example: @deva[यो भक्तं ददाति स स्वर्गं गच्छति] 'he who gives food goes to heaven'.
"""

standard = """
When @deva[लिप्स्यमानसिद्धि] (success accruing to another from fulfilling the speaker's desire) is indicated, @deva[लट्] may optionally express future. The term is an ablative @deva[तत्पुरुष]: @deva[लिप्स्यमानात् सिद्धि] 'success from what is desired'. Example: @deva[यो भक्तं ददाति स स्वर्गं गच्छति] 'who gives food goes to heaven'—the speaker desires food, and promises heaven as the giver's reward.
"""

advanced = """
This differs from @ref[3.3.6] in not requiring @deva[किम्] in the sentence. The conditional structure 'if X, then Y' allows @deva[लट्] when Y represents @deva[सिद्धि] (success/reward) for the agent of X. The speaker's @deva[लिप्सा] (desire for food) motivates the statement; the @deva[सिद्धि] (heaven) accrues to the giver. Alternative: @deva[यो भक्तं दास्यति स स्वर्गं गमिष्यति] with explicit futures. This usage corresponds to conditional sentences promising compensation for granting a wish.
"""

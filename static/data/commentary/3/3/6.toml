id = "3.3.6"
numericId = "33006"

[en]
simple = """
When @deva[किम्] 'what/who' or its derivatives appear, and the speaker desires to gain something, the @deva[लट्] (present tense) may optionally express future meaning. Example: @deva[कं भवन्तो भोजयन्ति] 'whom will you feed?' (implying: 'please feed me too').
"""

standard = """
When @deva[किम्] or its derivatives (@deva[कतर], @deva[कतम]) are in construction with a verb, and the speaker has @deva[लिप्सा] (desire to gain/acquire), @deva[लट्] may optionally express future. Example: @deva[कं भवन्तो भोजयन्ति] or @deva[भोजयितारः] 'whom will you feed?' implies a request. Without @deva[लिप्सा], future tense is required: @deva[कः पाटलीपुत्रं गमिष्यति] 'who will go to @[pāṭaliputra]?'
"""

advanced = """
The term @deva[वृत्त] with @deva[किम्] extends the rule to derivatives formed with @deva[डतर] and @deva[डतम] (@deva[कतर] 'which of two', @deva[कतम] 'which of many'). The semantic condition @deva[लिप्सा] 'desire to obtain' distinguishes begging/requesting contexts from neutral interrogatives. The examples @deva[कतरो भिक्षां ददाति/दास्यति/दाता] 'which one gives/will give alms?' illustrate the optional nature when @deva[लिप्सा] is present.
"""

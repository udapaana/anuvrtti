id = "3.3.94"
numericId = "33094"

[en]
simple = """
The affix @deva[क्तिन्] is added to express action in feminine gender. This supersedes @deva[घञ्], @deva[अच्], @deva[अप्]. Examples: @deva[कृतिः] 'action'; @deva[चितिः] 'gathering'; @deva[मतिः] 'understanding'.
"""

standard = """
To express @deva[भाव] etc. in feminine, @deva[क्तिन्] is added, superseding @deva[घञ्], @deva[अच्], @deva[अप्]. Examples: @deva[कृतिः] 'action'; @deva[चितिः] 'gathering'; @deva[मतिः] 'understanding'. @deva[वार्तिकs] add: after @deva[आप्] etc. (@deva[आप्तिः] 'attainment', @deva[लब्धिः] 'gain'); after @deva[श्रु], @deva[यज्], @deva[स्तु] in instrumental sense (@deva[श्रुतिः] 'ear', @deva[इष्टिः] 'sacrifice', @deva[स्तुतिः] 'praise').
"""

advanced = """
Multiple @deva[वार्तिकs] supplement this rule: (1) After @deva[ग्लै], @deva[म्लै], @deva[ज्या], @deva[हा], affix @deva[नि] applies: @deva[ग्लानिः], @deva[म्लानिः], @deva[ज्यानिः], @deva[हानिः]. (2) After @deva[ॠ]-ending and @deva[लू]-class roots, @deva[क्तिन्] behaves like @deva[निष्ठा]: @deva[कॄ] + @deva[क्तिन्] → @deva[कीर्णिः] (by @ref[7.1.100], @ref[8.2.77], @ref[8.2.42]); similarly @deva[लूनिः], @deva[धूनिः]. (3) After @deva[सम्पत्] etc., @deva[क्विप्] applies: @deva[सम्पत्], @deva[विपत्]; @deva[क्तिन्] also valid: @deva[सम्पत्तिः], @deva[विपत्तिः].
"""

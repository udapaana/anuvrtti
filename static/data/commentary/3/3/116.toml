id = "3.3.116"
numericId = "33116"

[en]
simple = """
The affix @deva[ल्युट्] applies when the accusative @deva[उपपद] denotes something whose contact gives bodily pleasure to the agent. This creates a @deva[नित्य] (obligatory) compound. Examples: @deva[पयःपानं सुखम्] 'the pleasure of drinking milk'; @deva[ओदनभोजनं सुखम्] 'the pleasure of eating rice'.
"""

standard = """
@deva[ल्युट्] applies with accusative @deva[उपपद] when contact with that object produces @deva[शारीरसुखस्पर्श] (bodily pleasant sensation) to the @deva[कर्तृ]. The compound is @deva[नित्य] (invariable, cannot be analyzed). Examples: @deva[पयःपानं सुखम्] 'milk-drinking pleasure'; @deva[ओदनभोजनं सुखम्] 'rice-eating pleasure'. Counter-examples disallowing compound: ablative @deva[उपपद] (@deva[तूलिकायाः उत्थानम्]); no contact (@deva[अग्निकुण्डस्य उपासनम्]); non-agent (@deva[गुरोः स्नापनम्]); mental-only pleasure (@deva[पुत्रस्य परिष्वञ्जनम्]); painful (@deva[कण्टकानां मर्दनम्]).
"""

advanced = """
Five conditions required: (1) accusative @deva[उपपद], (2) contact involved, (3) agent experiences, (4) bodily (not merely mental) sensation, (5) pleasant (not painful). Failure of any blocks the @deva[नित्य-समास]. See @ref[2.2.19] for compound obligatoriness.
"""

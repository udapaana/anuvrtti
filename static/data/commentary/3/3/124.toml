id = "3.3.124"
numericId = "33124"

[en]
simple = """
The word @deva[आनाय] meaning 'a net' is formed irregularly. Examples: @deva[आनायो मत्स्यानाम्] 'a net for fish', @deva[आनायो मृगाणाम्] 'a net for deer'.
"""

standard = """
The word @deva[आनायः] 'net' is formed irregularly in the instrumental sense (that by which creatures are caught). Derivation: @deva[आ] + @deva[नी] + @deva[घञ्] = @deva[आनायः]. It specifically applies when the meaning is 'net' for catching fish, deer, etc.
"""

advanced = """
This @deva[निपातन] specifies @deva[आनायः] with the meaning @deva[जाल] (net). The @[karaṇa-saṃjñā] applies: @deva[आ + नी + घञ् = आनायः]—'that by which (fish etc.) are led/caught'. The irregular formation is meaning-specific; other senses of @deva[आ + नी] follow regular derivation.
"""

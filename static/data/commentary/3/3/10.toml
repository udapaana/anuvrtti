id = "3.3.10"
numericId = "33010"

[en]
simple = """
The affixes @deva[तुमुन्] and @deva[ण्वुल्] are added with future meaning when the main verb expresses an action done for the purpose of the infinitive action. Example: @deva[भोक्तुं व्रजति] 'he goes to eat'; @deva[भोजको व्रजति] 'he goes (as) an eater'.
"""

standard = """
After a root, @deva[तुमुन्] and @deva[ण्वुल्] are used with future sense when the @deva[उपपद] (accompanying verb) denotes action performed @deva[क्रियार्थ] (for the sake of the future action). Examples: @deva[भोक्तुं व्रजति] 'he goes to eat'; @deva[भोजको व्रजति] 'he goes as one who will eat'. The @deva[उपपद] must be a verb denoting purposive action, not a noun.
"""

advanced = """
Though @deva[ण्वुल्] was already taught in @ref[3.1.133], its repetition here blocks @deva[वाऽसरूप] (@ref[3.1.94])—the principle allowing similar affixes to substitute. Accordingly, @deva[तृच्] cannot replace @deva[ण्वुल्] here: @deva[*कर्ता व्रजति] is invalid; only @deva[कर्तुं व्रजति] or @deva[कारको व्रजति] work. Counter-examples: @deva[भिक्षिष्ये इति अस्य जटाः] 'his matted hair is for begging' (noun @deva[उपपद], rule does not apply); @deva[धावतस्ते पतिष्यति दण्डः] 'your stick will fall while running' (not purposive action).
"""

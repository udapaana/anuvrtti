id = "3.3.121"
numericId = "33121"

[en]
simple = """
After a verb ending in a consonant, the affix @deva[घञ्] is used (instead of @deva[घ]) when forming masculine nouns that express instrument or location. Examples: @deva[लेखः] 'a writing' (that in which something is inscribed), @deva[वेदः] 'the Veda' (that by which all is known), @deva[वेषः] 'dress' (that which surrounds).
"""

standard = """
This @[sūtra] specifies that @deva[घञ्] (not @deva[घ]) follows consonant-ending roots when the derived masculine noun denotes instrument or location, continuing from @ref[3.3.118]. The palatal of the root changes to guttural. Thus @deva[लिख्] + @deva[घञ्] → @deva[लेखः] 'writing'; @deva[विद्] + @deva[घञ्] → @deva[वेदः] 'Veda'; @deva[विष्] + @deva[घञ्] → @deva[वेषः] 'dress'.
"""

advanced = """
The phrase @deva[संज्ञायां भृतृस्थानयोरिति] from @ref[3.3.118] extends here. @deva[घञ्] is mandated over @deva[घ] specifically after @deva[हलन्त]-roots. The @deva[घ्] indicatory causes palatals to become gutturals (@deva[लिख्] → @deva[लेख्]). Examples: @deva[लेखः] (@[karmaṇi]/@[adhikaraṇa]), @deva[वेदः] (@[karaṇa]—that by which knowledge occurs), @deva[वेषः] (@[karaṇa]—that by which one is surrounded).
"""

id = "3.3.34"
numericId = "33034"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[स्तॄ] with @deva[वि] when the word forms part of a metre's name. Example: @deva[विष्टारः] as in the metre @deva[विष्टारपङ्क्ति].
"""

standard = """
When @deva[वि] + @deva[स्तॄ] forms (part of) a metrical name (@deva[छन्दोनाम्नि]), @deva[घञ्] applies. Thus @deva[वि] + @deva[स्तृ] + @deva[घञ्] → @deva[विष्टारः] (with @deva[ष्] by @ref[8.3.94]), occurring in the metre name @deva[विष्टारपङ्क्ति]. The word @deva[छन्द] here means prosodic metres (@[gāyatrī] etc.), not the Vedas.
"""

advanced = """
The locative @deva[छन्दोनाम्नि] means 'when occurring in (part of) a metre's name'—@deva[विष्टार] itself isn't a complete metre name but a component of @deva[विष्टारपङ्क्ति]. The sandhi @deva[वि] + @deva[स्तार] → @deva[विष्टार] involves @deva[स्] → @deva[ष्] after @deva[इ] by @ref[8.3.94]. The @deva[नाम्नि] specification excludes this from the previous @deva[सूत्र]'s conditions.
"""

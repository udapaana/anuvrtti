id = "3.3.153"
numericId = "33153"

[en]
simple = """
The potential (@deva[लिङ्]) is used when expressing one's wish, except when @deva[कच्चित्] is in composition. Example: @deva[कामो मे भुञ्जीत भवान्] 'it is my wish that you eat'. But with @deva[कच्चित्]: @deva[कच्चिज्जीवति ते माता] 'I hope your mother lives' (not @deva[लिङ्]).
"""

standard = """
For @deva[कामप्रवेदन] (expression of one's wish), @deva[लिङ्] is used, debarring other tenses. @deva[कामो मे भुञ्जीत भवान्] = @deva[अभिलाषो मे भुञ्जीत भवान्] 'my wish is that you eat'. The @deva[कच्चित्]-exception allows other tenses: @deva[कच्चिज्जीवति ते माता] 'I hope your mother lives'.
"""

advanced = """
@deva[कामप्रवेदना] is the verbal expression of wish/desire. @deva[लिङ्] mandatorily applies except with @deva[कच्चित्]-upapada. The @deva[कच्चित्]-exclusion (@deva[कच्चिद्वर्जम्]) permits contextually-appropriate @[lakāras]: @deva[कच्चिज्जीवति] uses @deva[लट्] for present. This distinguishes hopeful inquiry from direct wish-expression.
"""

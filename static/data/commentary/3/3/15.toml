id = "3.3.15"
numericId = "33015"

[en]
simple = """
The affix @deva[लुट्] (first future) is used for actions that will happen but not today. Examples: @deva[श्वः कर्ता] 'he will do tomorrow'; @deva[श्वो भोक्ता] 'he will eat tomorrow'.
"""

standard = """
@deva[लुट्] (first future, also called periphrastic future) expresses @deva[अनद्यतन] (non-today) future—events beyond the current day. It blocks @deva[लृट्] in such contexts. Examples: @deva[श्वः कर्ता] 'he will do tomorrow'; @deva[श्वो भोक्ता] 'he will eat tomorrow'. When there's uncertainty or mixture of today/tomorrow, @deva[लृट्] applies: @deva[अद्य श्वो वा भविष्यति] 'it will happen today or tomorrow'.
"""

advanced = """
The term @deva[अनद्यतन] is a @deva[बहुव्रीहि] compound meaning 'that for which today is not (the time)'. A @deva[वार्तिक] allows @deva[लुट्] with @deva[लृट्] sense when expressing sorrow/impatience: @deva[इयं तु कदा गन्ता] 'oh when will she go!' (lamenting slow walking); @deva[अयं तु कदाऽध्येता] 'when will he ever learn!' (expressing frustration at inattentiveness).
"""

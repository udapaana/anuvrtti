id = "3.3.77"
numericId = "33077"

[en]
simple = """
The affix @deva[अप्] comes after @deva[हन्] 'to kill' when meaning 'solidity/mass', and @deva[घन्] is the substitute. Examples: @deva[अभ्रघनः] 'mass of clouds'; @deva[दधिघनः] 'solid curd'; @deva[घनं दधि] 'thick curd'.
"""

standard = """
When @deva[हन्] + @deva[अप्] means @deva[मूर्ति] (solidity, hardness, mass), @deva[घन्] substitutes for @deva[हन्]. Examples: @deva[अभ्रघनः] 'a dense mass of clouds'; @deva[दधिघनः] 'solidified curd'. In @deva[घनं दधि] 'thick curd', the quality (@deva[घन] 'solid') stands for the thing qualified.
"""

advanced = """
The substitution @deva[हन्] → @deva[घन्] before @deva[अप्] in @deva[मूर्ति] sense creates @deva[घन] 'solid mass, dense'. The semantic extension from 'striking' to 'solid/compact' reflects the idea of something firmly packed or struck together. The derivative @deva[घन] then functions as an adjective meaning 'dense, solid'.
"""

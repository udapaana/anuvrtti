id = "3.3.150"
numericId = "33150"

[en]
simple = """
The potential (@deva[लिङ्]) is used in all tenses when @deva[यच्च] and @deva[यत्र] are used and the sense is wonder or astonishment. Example: 'it is astonishing that you should sacrifice for a @[śūdra]'.
"""

standard = """
@deva[लिङ्] is used with @deva[यच्च/यत्र] for all times when @deva[चित्रीकरण] (wonder, astonishment) is expressed. This debars other tenses. Example: @deva[यच्च तत्र भवान् वृषलं याजयेत् आश्चर्यमेतत्] 'this is wondrous that you should sacrifice for a @[śūdra]'. When non-completion is implied, the conditional may also be used.
"""

advanced = """
@deva[चित्रीकरण] (wonder, strangeness) joins @deva[गर्हा] as a semantic trigger. With @deva[यच्च/यत्र] + @deva[चित्रीकरण], @deva[लिङ्] applies @deva[सर्वकालिकम्]. When @deva[क्रियातिपत्ति] (non-realization) is additionally implied, @deva[लृङ्] (conditional) becomes available per the @deva[अधिकार] of @ref[3.3.139]-@ref[3.3.141].
"""

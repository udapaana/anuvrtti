id = "3.3.98"
numericId = "33098"

[en]
simple = """
The affix @deva[क्यप्] with @deva[उदात्त] accent comes after @deva[व्रज्] 'to go' and @deva[यज्] 'to worship' to form feminine action-words. This supersedes @deva[क्तिन्]. Examples: @deva[व्रज्या] 'wandering'; @deva[इज्या] 'worshipping'.
"""

standard = """
After @deva[व्रज्] and @deva[यज्], @deva[क्यप्] with @deva[उदात्त] accent applies for feminine @deva[भाव] words, superseding @deva[क्तिन्]. Thus @deva[व्रज्या] 'wandering about'; @deva[इज्या] 'worship, sacrifice' (@ref[6.1.15]). The @deva[प्] in @deva[क्यप्] is @deva[इत्], serving a purpose in the next @deva[सूत्र]—it enables @deva[त]-addition by @ref[5.1.7].
"""

advanced = """
The @deva[क्यप्] affix (operational form @deva[य] after @deva[इत्]-deletion) creates @deva[आ]-final feminine nouns. The @deva[प्]-@deva[इत्] marker, while unnecessary here, is crucial for @ref[3.3.99]'s derivatives which use @ref[5.1.7]. The @deva[यज्] → @deva[इज्] involves @deva[संप्रसारण] by @ref[6.1.15].
"""

id = "3.3.130"
numericId = "33130"

[en]
simple = """
In the Vedas, @deva[युच्] is also seen after verbs other than those meaning 'to go'. Examples: @deva[सुदोह] 'easy to milk', @deva[सुवेद] 'easy to know' (@[ṛg] Veda X.112.8). A @[vārttika] states that in modern Sanskrit, @deva[युच्] comes after @deva[आस्], @deva[युध्], @deva[दृश्], @deva[धृष्], and @deva[मृष्], as in @deva[दुःशासनः] and @deva[दुर्योधनः].
"""

standard = """
Vedic usage extends @deva[युच्] beyond motion verbs: @deva[सुदोह] 'easy to milk', @deva[सुवेद] 'easy to know' (RV X.112.8). A @[vārttika] permits @deva[युच्] in classical Sanskrit after specific roots: @deva[आस्] (sit), @deva[युध्] (fight), @deva[दृश्] (see), @deva[धृष्] (dare), @deva[मृष्] (endure)—yielding @deva[दुःशासनः] '@[duḥśāsana]', @deva[दुर्योधनः] 'Duryodhana'.
"""

advanced = """
The Vedic @deva[युच्] extends to non-@deva[गत्यर्थ] roots: @deva[दुह्] → @deva[सुदोहः]; @deva[विद्] → @deva[सुवेदः]. @[vārttika] (@deva[भाषायाम्]): @deva[युच्] after @deva[आस्], @deva[युध्], @deva[दृश्], @deva[धृष्], @deva[मृष्]. Thus: @deva[दुर् + शास् + युच् = दुःशासनः]; @deva[दुर् + युध् + युच् = दुर्योधनः]; @deva[दुर् + दृश् + युच् = दुर्दर्शनः]. These are @deva[भाषा]-sanctioned formations.
"""

id = "3.3.144"
numericId = "33144"

[en]
simple = """
When interrogative words like @deva[किम्] are in composition with a verb and censure is implied, the potential (@deva[लिङ्]) and first future (@deva[लृट्]) are used. These exclude other tenses.
"""

standard = """
With @deva[किम्]-@[ādi] interrogatives and @deva[गर्हा]-intent, @deva[लिङ्] (potential) and @deva[लृट्] (first future) are used exclusively, superseding time-appropriate tenses. The repetition of @deva[लिङ्] excludes @deva[लट्] (unlike @ref[3.3.143]). No optionality—these two affixes are mandatory.
"""

advanced = """
The @deva[लिङ्]-repetition is @deva[लट्]-@deva[निवृत्त्यर्थ] (to exclude @deva[लट्] from @ref[3.3.142]-@ref[3.3.143]). @deva[गर्हा] continues in anuv̥tti; @deva[वा] does not. With @deva[किमादि] + @deva[गर्हा], only @deva[लिङ्] and @deva[लृट्] apply—@deva[नित्यम्], not @deva[विकल्पेन]. This creates a stricter tense-selection than the preceding @deva[कथम्]-rule.
"""

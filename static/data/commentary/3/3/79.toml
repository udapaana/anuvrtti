id = "3.3.79"
numericId = "33079"

[en]
simple = """
The words @deva[प्रघण] and @deva[प्रघाण] are irregularly formed when meaning 'a portion of a house'. Example: @deva[प्रघणः] or @deva[प्रघाणः] 'a porch, portico before a door'. Otherwise: @deva[प्रघातः].
"""

standard = """
The words @deva[प्रघणः] and @deva[प्रघाणः] are formed irregularly (@deva[निपातन]) from @deva[प्र] + @deva[हन्] when meaning @deva[गृहावयव] (a part of a dwelling). Both forms mean 'a porch before the door, a portico'. Without this house-part meaning: @deva[प्रघातः] 'striking forth'.
"""

advanced = """
This @deva[निपातन] provides two variant forms for the same meaning. The @deva[घण/घाण] alternation (with cerebral @deva[ण]) represents dialectal or stylistic variation. The architectural sense 'portico, verandah' specializes from the general @deva[प्र] + @deva[हन्] combination.
"""

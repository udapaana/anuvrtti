id = "3.3.96"
numericId = "33096"

[en]
simple = """
In Vedic @deva[मन्त्र] literature, @deva[क्तिन्] with acute accent comes after @deva[वृष्] 'to rain', @deva[इष्] 'to wish', @deva[पच्] 'to cook', @deva[मन्] 'to think', @deva[विद्] 'to know', @deva[भू] 'to be', @deva[वि] 'to go', @deva[रा] 'to give'. Examples: @deva[वृष्टिः]; @deva[इष्टिः]; @deva[पक्तिः]; @deva[मतिः]; @deva[वित्तिः]; @deva[भूतिः]; @deva[वीतिः]; @deva[रातिः].
"""

standard = """
In @deva[मन्त्र] (Vedic text), @deva[क्तिन्] with @deva[उदात्त] accent follows @deva[वृष्], @deva[इष्], @deva[पच्], @deva[मन्], @deva[विद्], @deva[भू], @deva[वि], @deva[रा]. The @deva[सूत्र] uses nominative (not ablative) case unusually. Examples: @deva[वृष्टिः] 'rain'; @deva[इष्टिः] 'wish'; @deva[पक्तिः] 'cooking'; @deva[मतिः] 'thought'; @deva[वित्तिः] 'knowledge'; @deva[भूतिः] 'prosperity'; @deva[वीतिः] 'consumption'; @deva[रातिः] 'giving'.
"""

advanced = """
Though @deva[क्तिन्] is generally available by @ref[3.3.94], this @deva[सूत्र] regulates accent for these specific Vedic forms. From @deva[इष्] there are three forms: irregular @deva[इच्छा] (@ref[2.3.10]), general @deva[क्तिन्] form with first-syllable acute, and this Vedic form. See @[ṛgveda] I.116.12, II.5.6, etc. for attestations.
"""

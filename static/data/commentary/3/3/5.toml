id = "3.3.5"
numericId = "33005"

[en]
simple = """
The present tense @deva[लट्] may optionally express future meaning with @deva[कदा] 'when?' or @deva[कर्हि] 'at what time?'. Example: @deva[कदा भुङ्क्ते] or @deva[कदा भोक्ष्यते] 'when will he eat?'
"""

standard = """
When the interrogative adverbs @deva[कदा] 'when' or @deva[कर्हि] 'at what time' are used, @deva[लट्] may optionally replace future tenses. Thus @deva[कदा भुङ्क्ते] (present), @deva[कदा भोक्ष्यते] (@deva[लृट्]), or @deva[कदा भोक्ता] (@deva[लुट्]) are all valid for 'when will he eat?' The option (@deva[वा]) allows either present or future forms.
"""

advanced = """
This @deva[सूत्र] extends the @deva[लट्]-for-future substitution to interrogative temporal contexts. Both @deva[कदा] and @deva[कर्हि] trigger optional application. The three alternatives shown—@deva[भुङ्क्ते] (present), @deva[भोक्ष्यते] (@deva[लृट्], second future), @deva[भोक्ता] (@deva[लुट्], first future)—demonstrate that the option is between @deva[लट्] and either future tense, not a three-way choice of equal status.
"""

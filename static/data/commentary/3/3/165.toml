id = "3.3.165"
numericId = "33165"

[en]
simple = """
When the particle @deva[स्म] is used and the reference is to time after a @deva[मुहूर्त], the imperative (@deva[लोट्]) is used exclusively, superseding the potential and @deva[कृत्य] forms. Example: @deva[ऊर्ध्वं मुहूर्ताद् भवान् कटं करोतु स्म] 'you must make the mat after an hour'.
"""

standard = """
With @deva[स्म]-particle and @deva[मुहूर्त]-future reference, @deva[लोट्] alone is used, superseding @deva[लिङ्] and @deva[कृत्य]. Examples: @deva[ऊर्ध्वं मुहूर्ताद् भवान् कटं करोतु स्म] 'make the mat after a @[muhūrta]'; @deva[ग्रामं गच्छतु स्म] 'let him go to the village'.
"""

advanced = """
@deva[स्म]-upapada with @deva[मुहूर्त]-future triggers @deva[लोट्] exclusively—@deva[लिङ्]-@deva[कृत्य]-@deva[प्रतिषेध]. The @deva[स्म] particle adds emphatic or assertive force. For @deva[प्रैषादि]-contexts with @deva[स्म] + @deva[ऊर्ध्वं मुहूर्तात्], only imperative applies, not optative or gerundive forms.
"""

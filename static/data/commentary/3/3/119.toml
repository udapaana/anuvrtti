id = "3.3.119"
numericId = "33119"

[en]
simple = """
The words @deva[गोचर] 'pasture', @deva[संचर] 'passage', @deva[वह] 'vehicle', @deva[व्रज] 'cow-pen', @deva[व्यज] 'fan', @deva[आपण] 'market', @deva[निगम] 'Veda/market' are irregularly formed with @deva[घ].
"""

standard = """
These words are irregular @deva[घ]-formations (exception to @ref[3.3.121] which prescribes @deva[घञ्] after consonant-final roots): @deva[गोचरः] 'pasturage' (where cows graze); @deva[संचरः] 'passage' (through which they move); @deva[वहः] 'vehicle' (by which carried); @deva[व्रजः] 'cow-pen' (where they go); @deva[व्यजः] 'fan' (irregularly not @deva[वीज] by @ref[2.4.56]); @deva[आपणः] 'market' (where they trade); @deva[निगमः] 'Veda, market' (into which they enter). The @deva[च] includes others: @deva[कषः], @deva[निकषः] 'touchstone'.
"""

advanced = """
These @deva[निपातनs] block @deva[घञ्] expected by @ref[3.3.121]. The @deva[व्यज] irregularity: @deva[वि] + @deva[अज्] doesn't undergo @deva[अज्] → @deva[वी] substitution (@ref[2.4.56]). The @deva[च] extends the list beyond enumerated items.
"""

id = "3.3.123"
numericId = "33123"

[en]
simple = """
The word @deva[उदङ्क] (a vessel) is formed irregularly when the meaning refers to something other than water. Example: @deva[तैलोदङ्कः] 'a leather vessel for oil'.
"""

standard = """
The word @deva[उदङ्क] is formed with @deva[घञ्] from @deva[उत्] + @deva[अञ्च्] meaning 'a vessel'. This separate rule prohibits the formation when the referent is water. Thus @deva[तैलोदङ्कः] 'a leather vessel for oil' is valid, but not when referring to a water container.
"""

advanced = """
Though @deva[घञ्] would apply by @ref[3.3.121] (consonant-ending root), this @deva[निपातन] specifies the restriction @deva[अनुदकार्थस्य]—excluding water-related senses. Derivation: @deva[उत् + अञ्च् + घञ् = उदङ्कः]. The separate statement serves as @deva[प्रतिषेध] for @deva[उदक]-related meanings, permitting forms like @deva[तैलोदङ्कः] (oil vessel) while blocking *@deva[जलोदङ्कः].
"""

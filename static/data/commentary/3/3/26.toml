id = "3.3.26"
numericId = "33026"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[नी] 'to lead' when compounded with @deva[अव] or @deva[उत्]. Examples: @deva[अवनायः] 'throwing down'; @deva[उन्नायः] 'elevation'.
"""

standard = """
With prefixes @deva[अव] 'down' or @deva[उत्] 'up', @deva[नी] takes @deva[घञ्]. Thus: @deva[अव] + @deva[नी] + @deva[घञ्] → @deva[अवनायः] 'throwing down'; @deva[उत्] + @deva[नी] → @deva[उन्नायः] 'elevation'. The form @deva[उन्नयः] in @deva[उन्नयः पदार्थानाम्] 'elevation of objects' uses @deva[अच्] by @ref[3.3.113] instead.
"""

advanced = """
This @deva[सूत्र] specifies two prefixes (@deva[अव], @deva[उत्]) for @deva[नी] to take @deva[घञ्]. The existence of @deva[उन्नयः] alongside @deva[उन्नायः] demonstrates the @deva[बहुलम्] (diverse/optional) nature of affix application mentioned in @ref[3.3.113]. Both forms are attested with the same prefix but different affixes.
"""

id = "3.3.131"
numericId = "33131"

[en]
simple = """
Affixes used for @deva[लट्] (present tense) may optionally also be used for past or future time that is not remote from the present. This allows present-tense forms to describe events in the near past or near future.
"""

standard = """
The affixes denoting present time (@deva[लट्]) may optionally express past or future events when that time is close to the present (@deva[सामीप्य]). The term @deva[सामीप्य] derives from @deva[समीप] + @deva[ष्यञ्], indicating proximity. This reflects the principle that tense distinctions can be blurred for events temporally near.
"""

advanced = """
Present-tense @[lakāras] may optionally (@deva[वा]) denote @deva[भूत] or @deva[भविष्यत्] when @deva[सामीप्य] (temporal proximity) applies. The @deva[ष्यञ्]-derivation (@deva[समीप] → @deva[सामीप्य]) is noted as @deva[स्वरूपविधि] (self-descriptive). This optionality applies when past/future events are perceived as contiguous with the present moment.
"""

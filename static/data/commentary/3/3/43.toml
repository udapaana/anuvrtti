id = "3.3.43"
numericId = "33043"

[en]
simple = """
The affix @deva[णच्] comes after a root to express reciprocal action, and the resulting word is feminine. Example: @deva[व्यावक्रोशी] 'mutual abuse' (formed via @deva[णच्] + @deva[अञ्] + @deva[ङीष्]).
"""

standard = """
The affix @deva[णच्] expresses @deva[व्यतिहार] (reciprocity/interchange of action) and the word is feminine. Derivation: @deva[वि] + @deva[अव] + @deva[क्रुश्] + @deva[णच्] + @deva[अञ्] (@ref[5.4.14]) + @deva[ङीष्] → @deva[व्यावक्रोशी] 'mutual abuse'. Similarly @deva[व्यावहासी] 'mutual laughter', @deva[व्यावलेखी] 'mutual writing'. The @deva[च्] in @deva[णच्] is distinguishing (@deva[अनुबन्ध]).
"""

advanced = """
This @deva[सूत्र] is placed separately from the @deva[क्तिन्]-class (@ref[3.3.94]) to avoid being blocked by affixes that block @deva[क्तिन्]. The forms @deva[व्यावचोरी] and @deva[व्यावचर्ची] are valid even though @deva[चुर्] (a @deva[ण्यन्त] root) would take @deva[युच्] (@ref[3.3.107]) and @deva[चर्च्] would take @deva[अङ्] (@ref[3.3.104]). However, @deva[ईक्ष्] and @deva[ईह्] still take @deva[अ] (@ref[3.3.102-103]): hence @deva[व्यतीक्षा], @deva[व्यतीहा] (not *@deva[व्यतीक्षी]). These variations exemplify @deva[बहुलम्] (@ref[3.3.113]).
"""

id = "3.3.58"
numericId = "33058"

[en]
simple = """
The affix @deva[अप्] comes after @deva[ग्रह्] 'to seize', @deva[वृ] 'to choose', @deva[दृ] 'to tear', @deva[निश्चि] 'to determine', @deva[गम्] 'to go'. Examples: @deva[ग्रहः] 'planet'; @deva[वरः] 'boon'; @deva[दरः] 'cave'; @deva[निश्चयः] 'certainty'; @deva[गमः] 'march'.
"""

standard = """
The affix @deva[अप्] (blocking @deva[घञ्]) follows @deva[ग्रह्], @deva[वृ], @deva[दृ], @deva[निश्चि], @deva[गम्]. For @deva[निश्चि], @deva[अप्] blocks @deva[अच्]. Examples: @deva[ग्रहः] 'planet'; @deva[वरः] 'boon'; @deva[दरः] 'tearing, cave'; @deva[निश्चयः] 'certainty'; @deva[गमः] 'march'. A @deva[वार्तिक] adds @deva[वश्] → @deva[वशः] 'obedient' and @deva[रण्] → @deva[रणः] 'battle'.
"""

advanced = """
For @deva[निश्चि], @deva[अप्] blocks the otherwise applicable @deva[अच्] (@ref[3.3.56]), creating accent difference. A @deva[वार्तिक] prescribes affix @deva[क] (with @deva[घञ्] sense) after @deva[स्था], @deva[स्ना], @deva[पा], @deva[व्यध्], @deva[हन्], @deva[युध्]: @deva[प्रस्थः] 'tableland'; @deva[प्रस्नः] 'bathing vessel'; @deva[प्रपाः] 'watering place'; @deva[आविधः] 'awl' (@ref[6.1.16]); @deva[विघ्नः] 'obstacle'; @deva[आयुधः] 'weapon'.
"""

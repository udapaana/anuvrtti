id = "3.3.63"
numericId = "33063"

[en]
simple = """
The affix @deva[अप्] comes optionally after @deva[यम्] 'to restrain' with @deva[सम्], @deva[उप], @deva[नि], @deva[वि], or without any prefix. Examples: @deva[संयामः]/@deva[संयमः] 'restraint'; @deva[नियामः]/@deva[नियमः] 'rule'; @deva[यामः]/@deva[यमः].
"""

standard = """
With prefixes @deva[सम्], @deva[उप], @deva[नि], @deva[वि], or without prefix, @deva[यम्] 'to restrain' takes @deva[अप्] optionally, blocking @deva[घञ्]. Examples: @deva[संयामः] or @deva[संयमः] 'restraint'; @deva[उपयामः] or @deva[उपयमः] 'marriage'; @deva[नियामः] or @deva[नियमः] 'restrictive rule'; @deva[वियामः] or @deva[वियमः] 'check, distress'; @deva[यामः] or @deva[यमः].
"""

advanced = """
This @deva[सूत्र] lists specific prefixes (@deva[सम्], @deva[उप], @deva[नि], @deva[वि]) plus the prefix-less condition where @deva[अप्] is optional. The @deva[च] 'and' includes the @deva[अनुपसर्ग] condition. With other prefixes not listed, the option may not apply. The @deva[यम्] root yields @deva[याम] (with @deva[घञ्], showing @deva[वृद्धि]) or @deva[यम] (with @deva[अप्], showing @deva[गुण]).
"""

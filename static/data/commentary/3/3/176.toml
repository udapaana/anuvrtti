id = "3.3.176"
numericId = "33176"

[en]
simple = """
When @deva[मा] is followed by @deva[स्म], both the imperfect (@deva[लङ्]) and aorist (@deva[लुङ्]) may be used. Examples: @deva[मास्म करोत्] or @deva[मास्म कार्षीत्] 'let him not make'; @deva[मास्म हरत्] or @deva[मास्म हार्षीत्] 'let him not take'.
"""

standard = """
With @deva[मा] + @deva[स्म] (= @deva[मास्म]), both @deva[लङ्] (imperfect) and @deva[लुङ्] (aorist, drawn by @deva[च]) are permitted. Examples: @deva[मास्म करोत्] (@[laṅ]) or @deva[मास्म कार्षीत्] (@[luṅ]) 'let him not make'. This creates optionality between the two past-tense forms for prohibition.
"""

advanced = """
@deva[स्म] joins @deva[माङ्] to form @deva[मास्म]. The @deva[च] draws @deva[लुङ्] from @ref[3.3.175]. With @deva[मास्म], @deva[विकल्प] arises between @deva[लङ्] and @deva[लुङ्]: @deva[मास्म करोत्] (imperfect @deva[लङ्]) ~ @deva[मास्म कार्षीत्] (aorist @deva[लुङ्]). Both convey prohibitive sense with @deva[स्म]-emphasis. This concludes @[pāda] 3.3.
"""

id = "3.3.148"
numericId = "33148"

[en]
simple = """
The potential (@deva[लिङ्]) is used in all tenses when @deva[यच्च] and @deva[यत्र] are in composition with the verb and censure is implied. This supersedes the first future.
"""

standard = """
With @deva[यच्च] or @deva[यत्र] as upapadas expressing @deva[गर्हा] (censure returns here), @deva[लिङ्] is used for all times (@deva[सर्वकाल]), superseding @deva[लृट्]. This @[sūtra] is separated from the previous for subsequent rule-making. Example: @deva[यच्च/यत्र त्वमेवं कुर्याः न श्रद्दधे न मर्षयामि].
"""

advanced = """
@deva[गर्हा] returns as the semantic condition (not @deva[अनवक्लृप्ति/अमर्ष]). With @deva[यच्च/यत्र] + @deva[गर्हा], @deva[लिङ्] applies @deva[सर्वकालिकम्], excluding @deva[लृट्]. The rule @ref[1.3.10] (@deva[यथासंख्यमनुदेशः]) doesn't apply—both @deva[यच्च] and @deva[यत्र] independently trigger @deva[लिङ्]. Separation from @ref[3.3.147] enables distinct following rules.
"""

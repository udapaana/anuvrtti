id = "3.3.9"
numericId = "33009"

[en]
simple = """
When the future time is more than a @deva[मुहूर्त] (48 minutes) away, either @deva[लट्] (present) or @deva[लिङ्] (potential) may be used under the same conditions as above. Example: @deva[उपाध्यायश्चेदागच्छेत्] 'if the teacher should come (after an hour)'.
"""

standard = """
Under the conditions of @ref[3.3.8] (action as condition for an imperative), when the future is @deva[ऊर्ध्वमौहूर्तिक] (beyond one @deva[मुहूर्त], i.e., more than 48 minutes away), either @deva[लट्] or @deva[लिङ्] (potential/optative) may be used. The @deva[च] 'and' carries forward @deva[लट्] from the previous @deva[सूत्र]. Example: @deva[उपाध्यायश्चेदागच्छेत्] (@deva[लिङ्]) or @deva[आगच्छति] (@deva[लट्]) @deva[अथ त्वं छन्दोऽधीष्व].
"""

advanced = """
The compound @deva[ऊर्ध्वमौहूर्तिक] derives irregularly from @deva[ऊर्ध्व-मुहूर्त], with @deva[वृद्धि] of @deva[उ] in @deva[मु] (not the initial @deva[ऊ] as expected). It means 'pertaining to time beyond one @deva[मुहूर्त]'. The addition of @deva[लिङ्] to @deva[लट्] provides a hypothetical/potential nuance appropriate for more distant future events. All conditions from @ref[3.3.8] apply: the @deva[लक्षण-लक्ष्य] relationship and @deva[लोट्] in the main clause.
"""

id = "3.3.56"
numericId = "33056"

[en]
simple = """
The affix @deva[अच्] comes after roots ending in @deva[इ] or @deva[ई]. Examples: @deva[चयः] 'collecting'; @deva[जयः] 'victory'; @deva[क्षयः] 'decay'. A @deva[वार्तिक] adds @deva[भयम्] 'fear', @deva[वर्षम्] 'rain'.
"""

standard = """
After roots ending in @deva[इ] or @deva[ई], the affix @deva[अच्] applies (with @deva[भाव] and @deva[अकर्तरि कारक] senses from @ref[3.3.18-19] continuing through @ref[3.3.113]). This blocks @deva[घञ्]. Examples: @deva[चयः] 'collecting'; @deva[अयः] 'going'; @deva[जयः] 'victory'; @deva[क्षयः] 'wasting'. A @deva[वार्तिक] includes @deva[भय] etc.: @deva[भी] + @deva[अच्] → @deva[भयम्] 'fear'; @deva[वर्षम्] 'rain' (neuter, otherwise would take @deva[क्त]).
"""

advanced = """
The @deva[च्] in @deva[अच्] is qualitative (@deva[संज्ञार्थ]) for rules like @ref[6.2.144]. The @deva[अनुवृत्ति] of @deva[भावे] and @deva[अकर्तरि कारके संज्ञायाम्] applies from @ref[3.3.18-19] through @ref[3.3.113]. A Vedic @deva[वार्तिक] notes @deva[जव] and @deva[सव] (from @deva[जु], @deva[सु]) use @deva[अच्] rather than @deva[अप्], with accent difference: @deva[ऊर्वोरस्तु मे जवः]; @deva[पञ्चोदनसवः].
"""

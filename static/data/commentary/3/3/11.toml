id = "3.3.11"
numericId = "33011"

[en]
simple = """
Affixes like @deva[घञ्] that denote mere action (@deva[भाव]) can also express future meaning when the main verb indicates purposive action. Examples: @deva[पाकाय व्रजति] 'he goes to cook'; @deva[भूतये व्रजति] 'he goes for success'.
"""

standard = """
The @deva[भाववाचक] (action-denoting) affixes like @deva[घञ्] also take future sense when the @deva[उपपद] (accompanying verb) expresses @deva[क्रियार्थ] (action for the sake of another action). Examples: @deva[पाकाय व्रजति] 'he goes for cooking'; @deva[भूतये व्रजति] 'he goes for prosperity'. These nouns must be properly formed @deva[वाचक] (expressive)—using the correct affix with the correct base.
"""

advanced = """
This extends the @deva[क्रियार्थ] construction from @ref[3.3.10] to @deva[भाववाचक] affixes. Since @deva[वाऽसरूप] doesn't apply to infinitives (@ref[3.3.10]), @deva[तुमुन्] would block other affixes; hence this separate provision. The term @deva[वचन] requires the affixes to be @deva[वाचक]—properly applied to their designated bases in the prescribed manner. Only genuine @deva[भाववाच्य] (verbal noun) formations qualify, not arbitrary noun usages.
"""

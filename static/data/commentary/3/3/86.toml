id = "3.3.86"
numericId = "33086"

[en]
simple = """
The words @deva[सङ्घ] 'collection' and @deva[उद्घ] 'praise/excellence' are irregularly formed. Examples: @deva[सङ्घः पशूनाम्] 'herd of cattle'; @deva[उद्घो मनुष्यः] 'excellent man'. Otherwise: @deva[सङ्घातः] 'union'.
"""

standard = """
The words @deva[सङ्घः] and @deva[उद्घः] are formed irregularly from @deva[सम्]/@deva[उत्] + @deva[हन्] + @deva[अप्] with specific meanings: @deva[सङ्घ] 'collection/group' and @deva[उद्घ] 'praise/excellence' respectively (by @ref[1.3.10] sequential pairing). Derivation: @deva[सम्] + @deva[हन्] + @deva[अप्] → @deva[सं] + @deva[ह्] + @deva[अ] → @deva[सं] + @deva[घ्] + @deva[अ] → @deva[सङ्घः]. Examples: @deva[सङ्घः पशूनाम्] 'a herd'; @deva[उद्घो मनुष्यः] 'a praised/excellent man'. Without these senses: @deva[सङ्घातः] 'compact union'.
"""

advanced = """
The @deva[यथासंख्य] principle pairs @deva[सम्]-meaning with 'collection' and @deva[उत्]-meaning with 'praise/excellence'. The phonological reduction @deva[हन्] → @deva[ह्] (penultimate deletion) → @deva[घ्] (by sandhi) is irregular for @deva[अप्] forms. The common word @deva[सङ्घ] 'community, assembly' derives from this formation.
"""

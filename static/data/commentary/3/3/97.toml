id = "3.3.97"
numericId = "33097"

[en]
simple = """
The words @deva[ऊति] 'protection', @deva[यूति] 'joining', @deva[जूति] 'speed', @deva[साति] 'destruction', @deva[हेति] 'weapon', @deva[कीर्ति] 'fame' are irregular forms with @deva[उदात्त] accent.
"""

standard = """
These anomalous @deva[उदात्त]-accented forms are: @deva[ऊतिः] 'protection/sport' (from @deva[अव्] + @deva[क्तिन्] → @deva[ऊ] + @deva[ति] by @ref[6.4.20]); @deva[यूतिः] 'joining' (irregular @deva[उ] → @deva[ऊ] lengthening); @deva[जूतिः] 'velocity' (same lengthening); @deva[सातिः] 'destruction' (irregular: @deva[आ] not → @deva[इ] as @ref[7.4.40] requires, or from @deva[सन्] + @deva[क्तिन्]); @deva[हेतिः] 'weapon' (from @deva[हन्] or @deva[हिनोति]); @deva[कीर्तिः] 'fame'.
"""

advanced = """
The @deva[मन्त्रे] condition doesn't continue here; only @deva[उदात्त] accent does. Irregularities: @deva[यूति/जूति] show unexpected @deva[उ]-lengthening; @deva[साति] blocks @ref[7.4.40]'s @deva[आ] → @deva[इ] (or derives regularly from @deva[सन्] via @ref[6.4.42]); @deva[हेति] has dual possible derivations. Vedic citation: @deva[उग्र उग्राभिरूतिभिः] (@[ṛgveda] I.7.4) 'with mighty protections'.
"""

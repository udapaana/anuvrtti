id = "3.3.128"
numericId = "33128"

[en]
simple = """
The affix @deva[युच्] (which forms words ending in @deva[अन]) comes after roots ending in long @deva[आ] when @deva[ईषत्], @deva[दुर्], or @deva[सु] are prefixed. This supersedes @deva[खल्]. Example: @deva[ईषत्पानः सोमः] 'soma that can be lightly drunk', @deva[सुपानः] 'easy to drink'.
"""

standard = """
After @deva[आकारान्त]-roots (roots ending in @deva[आ]), @deva[युच्] replaces @deva[खल्] when @deva[ईषत्]/etc. upapadas express ease or difficulty. The @deva[कर्तृकर्मणा] phrase does not continue. Thus @deva[पा] + @deva[युच्] → @deva[पानः]: @deva[ईषत्पानः] 'lightly drinkable', @deva[दुष्पानः] 'hard to drink', @deva[सुपानः] 'easy to drink'.
"""

advanced = """
For @deva[आदन्त]-@[dhātus], @deva[युच्] (@deva[अन] with @deva[य्] and @deva[च्] as @deva[इत्]) supersedes @deva[खल्] from @ref[3.3.126]. Only @deva[ईषदादि] continues; @deva[कर्तृकर्मणा] does not. Derivation: @deva[ईषत् + पा + युच् = ईषत्पानः]; @deva[दुर् + पा + युच् = दुष्पानः]; @deva[सु + पा + युच् = सुपानः]. The @deva[युच्] affix is @deva[कृत्].
"""

id = "3.3.81"
numericId = "33081"

[en]
simple = """
The word @deva[अपघन] is irregularly formed when meaning 'a limb/member of the body'. Example: @deva[अपघनः] 'a bodily limb (hand, foot, etc.)'. Otherwise: @deva[अपघातः].
"""

standard = """
The word @deva[अपघनः] is formed irregularly (@deva[निपातन]) from @deva[अप] + @deva[हन्] when meaning @deva[अङ्ग] (a member of the body). The term @deva[अङ्ग] here means a portion like hand or foot, not the whole body. Without this meaning: @deva[अपघातः] 'striking away'.
"""

advanced = """
This @deva[निपातन] assigns @deva[अपघन] to the anatomical sense. The @deva[घन्]-substitution applies irregularly with @deva[अप]-prefix for body-part meaning. This specialized usage distinguishes from @deva[अपघात] 'injury, assault', which uses regular @deva[घञ्] derivation.
"""

id = "3.3.163"
numericId = "33163"

[en]
simple = """
The @deva[कृत्य] affixes (forming words like @deva[करणीय], @deva[कर्तव्य]) and the imperative (@deva[लोट्]) are used for direction, permission, and when the proper time for action has arrived. Example: @deva[भवता कटः करणीयः] 'the mat should be made by you'.
"""

standard = """
@deva[कृत्य]-affixes and @deva[लोट्] apply for @deva[प्रैष] (direction), @deva[अतिसर्ग] (permission), and @deva[प्राप्तकाल] (arrival of appropriate time). Examples: @deva[भवता कटः करणीयः/कर्तव्यः/कार्यः] 'the mat is to be made by you'; @deva[ग्रामं गच्छतु] 'let him go to the village'.
"""

advanced = """
@deva[प्रैष] = direction; @deva[अतिसर्ग] = permission/license; @deva[प्राप्तकाल] = opportune moment. @deva[च] draws @deva[लोट्] into the @[sūtra] alongside @deva[कृत्य]. @deva[कृत्य]-affixes (@deva[तव्य], @deva[अनीय], @deva[य] etc.) form gerundives: @deva[करणीय], @deva[कर्तव्य], @deva[कार्य]. Both @deva[कृत्य] and @deva[लोट्] serve obligation/propriety meanings.
"""

id = "3.3.164"
numericId = "33164"

[en]
simple = """
The potential (@deva[लिङ्]) along with @deva[कृत्य] and imperative is used when referring to future time by a @deva[मुहूर्त] (48 minutes), or to 'this very moment'. Example: actions to be done within the hour or right now.
"""

standard = """
@deva[लिङ्] joins @deva[कृत्य] and @deva[लोट्] for @deva[प्रैष]/etc. when the time reference is @deva[ऊर्ध्वं मुहूर्तात्] (after a @[muhūrta], ~48 minutes) or @deva[इदानीम्] (right now). The @deva[च] draws @deva[कृत्य] and @deva[लोट्] from @ref[3.3.163]. All three express imminent obligation or permission.
"""

advanced = """
For @deva[मुहूर्त]-future or @deva[इदानीम्]-present contexts with @deva[प्रैषादि]-artha, @deva[लिङ्], @deva[कृत्य], and @deva[लोट्] are all available. @deva[मुहूर्त] = 48-minute unit (1/30 of a day). This temporal specification adds @deva[लिङ्] to the options from @ref[3.3.163], creating three-way optionality for near-time obligations.
"""

id = "3.3.159"
numericId = "33159"

[en]
simple = """
The potential (@deva[लिङ्]) is also used when wish-verbs are in construction and the agent is the same. Example: @deva[भुञ्जीय इति इच्छति] 'he wishes that he may eat' (same person wishing and eating).
"""

standard = """
With same-agent wish-constructions, @deva[लिङ्] can also be used (alongside @deva[तुमुन्] from @ref[3.3.158]). Examples: @deva[भुञ्जीयेतीच्छति] 'he wishes he may eat'; @deva[अधीयीयेतीच्छति] 'he wishes he will read'. When non-completion is implied, the conditional applies per @ref[3.3.139].
"""

advanced = """
This extends @ref[3.3.158]: @deva[समानकर्तृक] + @deva[इच्छादि] permits both @deva[तुमुन्] and @deva[लिङ्]. @deva[लिङ्] carries @deva[इति]-quotative structure: @deva[भुञ्जीय इति इच्छति]. For @deva[क्रियातिपत्ति], @deva[लृङ्] applies per @ref[3.3.139] @deva[अधिकार]. This creates three options: @deva[तुमुन्], @deva[लिङ्], or @deva[लृङ्] (with non-completion).
"""

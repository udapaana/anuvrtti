id = "3.3.173"
numericId = "33173"

[en]
simple = """
The potential (@deva[लिङ्]) and imperative (@deva[लोट्]) are used for benedictions (blessings). The @deva[लिङ्] here is specifically the benedictive (@deva[आशीर्लिङ्]). Example: @deva[चिरं जीव्याद् भवान्] or @deva[चिरं जीवतु भवान्] 'may you live long!'
"""

standard = """
For @deva[आशीस्] (benediction, expression of good wishes), @deva[लिङ्] and @deva[लोट्] are used. The @deva[लिङ्] here is @deva[आशीर्लिङ्] (benedictive), conjugated differently from ordinary @deva[विधिलिङ्] (potential/optative). Examples: @deva[चिरं जीव्यात् भवान्] (@[āśīrliṅ]) or @deva[चिरं जीवतु भवान्] (@[loṭ]) 'may you live long!'
"""

advanced = """
@deva[आशीस्] = wish for desired object, blessing. @deva[लिङ्] here is @deva[आशीर्लिङ्]—distinct conjugation from @deva[विधिलिङ्]. @deva[आशीर्लिङ्] uses @deva[यासुट्] augment: @deva[जीव् + लिङ् = जीव्यात्]. @deva[लोट्] alternative: @deva[जीवतु]. Both express optative blessing. Not @deva[आशीस्]? Then context-appropriate @[lakāra] applies.
"""

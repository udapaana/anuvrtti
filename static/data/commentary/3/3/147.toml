id = "3.3.147"
numericId = "33147"

[en]
simple = """
The potential (@deva[लिङ्]) is used when @deva[जातु] and @deva[यत्] are in composition with the verb, expressing disbelief or intolerance. This excludes the first future. A @[vārttika] adds @deva[यदा] and @deva[यदि] to this rule.
"""

standard = """
With @deva[जातु] and @deva[यत्] as upapadas expressing @deva[अनवक्लृप्ति/अमर्ष], only @deva[लिङ्] is used, excluding @deva[लृट्]. Example: @deva[जातु तन्न भवान् वृषलं याजयेत्] 'surely you wouldn't sacrifice for a @[śūdra]'. A @[vārttika] extends this to @deva[यदा] and @deva[यदि].
"""

advanced = """
This is @deva[लृट्]-@deva[प्रतिषेध]: with @deva[जातु] + @deva[यत्] under @deva[अनवक्लृप्ति/अमर्ष], @deva[लिङ्] alone applies. @[vārttika]: @deva[यदायद्योश्च]—@deva[यदा] and @deva[यदि] are added to the upapada-list. Examples: @deva[यन्नाम तत्र भवान् वृषलं याजयेत् न श्रद्दधे न मर्षयामि].
"""

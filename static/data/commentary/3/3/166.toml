id = "3.3.166"
numericId = "33166"

[en]
simple = """
When polite wish (@deva[अधीष्ट]) is expressed along with @deva[स्म], the imperative (@deva[लोट्]) is used, superseding the potential. Example: @deva[अङ्ग स्म राजन् माणवकमध्यापय] 'O King, I wish that you teach the boy'.
"""

standard = """
@deva[स्म] continues from @ref[3.3.165]. For @deva[अधीष्ट] (polite wish, explained in @ref[3.3.161]) with @deva[स्म], @deva[लोट्] supersedes @deva[लिङ्]. Examples: @deva[अङ्ग स्म राजन् माणवकमध्यापय] 'O King, please teach the boy'; @deva[अङ्ग स्म राजन्नग्निहोत्रं जुहुधि] 'O King, please perform the Agnihotra'.
"""

advanced = """
@deva[स्म] continues in anuv̥tti; @deva[अधीष्ट] (reverential request per @ref[3.3.161]) is specified. With @deva[अधीष्ट] + @deva[स्म], @deva[लोट्] replaces @deva[लिङ्]. The @deva[अङ्ग] particle adds affectionate/reverential address. This creates a formal imperative for polite wish-expression.
"""

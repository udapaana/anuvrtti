id = "3.3.61"
numericId = "33061"

[en]
simple = """
The affix @deva[अप्] comes after @deva[व्यध्] 'to pierce' and @deva[जप्] 'to mutter' when NO @deva[उपसर्ग] is present. Examples: @deva[व्यधः] 'wound'; @deva[जपः] 'muttering'. With prefix: @deva[आव्याधः], @deva[उपजापः].
"""

standard = """
Without an @deva[उपसर्ग], @deva[व्यध्] 'to pierce' and @deva[जप्] 'to mutter' take @deva[अप्], blocking @deva[घञ्]. Thus @deva[व्यधः] 'wound, piercing'; @deva[जपः] 'muttering, recitation'. With prefixes, different forms occur: @deva[आव्याधः] 'piercing through'; @deva[उपजापः] 'whispering, intrigue'.
"""

advanced = """
The condition @deva[अनुपसर्गात्] restricts @deva[अप्] to unprefixed forms. With prefixes, @deva[घञ्] applies, yielding @deva[आव्याध] and @deva[उपजाप] with their characteristic @deva[वृद्धि]. The distinction allows different derivational paths depending on prefix presence.
"""

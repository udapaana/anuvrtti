id = "3.3.21"
numericId = "33021"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[इङ्] 'to study'. Examples: @deva[अध्यायः] 'a lesson/chapter'; @deva[उपाध्यायः] 'a teacher' (one from whom one studies).
"""

standard = """
After @deva[इङ्] 'to read/study', @deva[घञ्] is added, blocking @deva[अच्] (@ref[3.3.56]). Thus @deva[अधि] + @deva[इ] + @deva[घञ्] → @deva[अध्यायः] 'lesson, chapter'; @deva[उपाध्यायः] 'teacher' (one near whom one studies). A @deva[वार्तिक] notes: when related as ablative, feminine forms @deva[उपाध्याया] or @deva[उपाध्यायी] (with optional @deva[ङीष्]) are valid for 'female teacher'.
"""

advanced = """
The derivation: @deva[अधि] + @deva[इ] + @deva[घञ्] → @deva[अधि] + @deva[ऐ] + @deva[अ] (by @deva[वृद्धि]) → @deva[अध्याय]. A @deva[वार्तिक] extends @deva[घञ्] to @deva[शॄ] when the meaning is 'wind', 'color', or 'cessation': @deva[शारः] 'wind', 'green color'. The Vedic citation @deva[गौरिवाकृतमीशारः प्रायेण शिशिरे कृशः] illustrates this usage.
"""

id = "3.3.136"
numericId = "33136"

[en]
simple = """
When speaking of a spatial limit 'on this side' (@deva[अवर]) of another place, the first future (@deva[लुट्]) is used instead of the second future. Example: stating that food will be eaten before reaching @[pāṭaliputra], at the nearer point of @[kauśāmbī].
"""

standard = """
When @deva[अवर] (this side, nearer) indicates a spatial limit, @deva[लुट्] is used instead of @deva[लृट्] for non-current-day future. The 'continuity' and 'immediacy' conditions of @ref[3.3.135] do not apply. Example: @deva[योऽयमध्वागन्तव्य आपाटलिपुत्रात्तस्य यदवरं कौशाम्ब्यास्तत्रोदनं भोक्तास्मि] 'on this road to @[pāṭaliputra], at the nearer point from @[kauśāmbī], I will eat rice'.
"""

advanced = """
This extends @deva[नानद्यतनवत्] from @ref[3.3.135]. When @deva[अवर] denotes spatial limit (@deva[देशावधि])—'on the hither side'—@deva[लुट्] replaces @deva[लृट्] for @deva[अनद्यतन भविष्यत्]. The @deva[सातत्य/सामीप्य] conditions don't apply; the spatial @deva[अवधि] alone triggers the substitution.
"""

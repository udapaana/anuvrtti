id = "3.3.171"
numericId = "33171"

[en]
simple = """
The @deva[कृत्य] affixes are also used when expressing necessity or obligation. Examples: @deva[भवता अवश्यं कटः कर्तव्यः/करणीयः/कार्यः] 'you ought to make the mat'; @deva[भवता शतं दातव्यं/देयम्] 'you ought to pay a hundred'.
"""

standard = """
@deva[कृत्य]-affixes apply for @deva[अवश्य] (necessity/obligation). Though @deva[कृत्य]-affixes are general and would seem to apply anyway, this explicit statement prevents @deva[णिनि] (from @ref[3.3.170]) from being the exclusive affix for obligation. Examples: @deva[कर्तव्य], @deva[करणीय], @deva[कार्य], @deva[कृत्य] for 'must/ought to do'.
"""

advanced = """
Why this @[sūtra] when @deva[कृत्य] is @deva[सामान्य] (general)? To prevent @deva[बाध] (supersession) by @deva[णिनि] from @ref[3.3.170] for @deva[अवश्यार्थ]. Without this, @deva[णिनि] as @deva[विशेष] might exclude @deva[कृत्य]. This @deva[पृथक्-विधान] establishes @deva[कृत्य] as @deva[विकल्प] with @deva[णिनि] for necessity/obligation expressions.
"""

id = "3.3.54"
numericId = "33054"

[en]
simple = """
The affix @deva[घञ्] is optionally used after @deva[वृ] 'to cover/choose' with @deva[प्र] when meaning 'a covering/cloak'. Example: @deva[प्रावारः] or @deva[प्रवरः] 'a cloak, veil'.
"""

standard = """
With @deva[प्र] + @deva[वृ] meaning @deva[वेष्टन] (a covering, wrapper), @deva[घञ्] is optional. Thus @deva[प्रावारः] (with @deva[घञ्]) or @deva[प्रवरः] (without) 'a cloak, mantle, veil'. Without covering meaning: @deva[प्रवरौ] (dual) referring to the best/excellent ones.
"""

advanced = """
The semantic restriction @deva[वेष्टने] 'when meaning covering' triggers the option. The word @deva[प्रावार] specifically denotes an outer garment or wrap. The form @deva[प्रवर] without @deva[घञ्] has the additional meaning 'excellent, best' (from @deva[वृ] 'to choose'), showing how affix choice affects semantic range.
"""

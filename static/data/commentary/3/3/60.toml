id = "3.3.60"
numericId = "33060"

[en]
simple = """
Both @deva[ण] and @deva[अप्] come after @deva[अद्] 'to eat' with @deva[नि]. Examples: @deva[न्यादः] 'feeding' (with @deva[ण]); @deva[निघसः] 'eating, food' (with @deva[अप्]).
"""

standard = """
With @deva[नि] + @deva[अद्], both @deva[ण] and @deva[अप्] apply. With @deva[ण]: @deva[नि] + @deva[अद्] + @deva[ण] → @deva[नि] + @deva[आद्] + @deva[अ] (@ref[7.2.116]) → @deva[न्यादः] 'feeding'. With @deva[अप्]: @deva[नि] + @deva[अद्] + @deva[अप्] → @deva[नि] + @deva[घस्] + @deva[अ] (@ref[2.4.38]) → @deva[निघसः] 'eating, food'.
"""

advanced = """
This @deva[सूत्र] specifies that @deva[नि] triggers both @deva[ण] and @deva[अप्] after @deva[अद्]. The @deva[ण] affix causes @deva[वृद्धि] of the root vowel (@deva[अ] → @deva[आ]) by @ref[7.2.116], yielding @deva[न्यादः]. The @deva[अप्] pathway uses the @deva[घस्] substitution, yielding @deva[निघसः]. Both forms are valid with the @deva[नि] prefix.
"""

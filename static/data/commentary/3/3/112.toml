id = "3.3.112"
numericId = "33112"

[en]
simple = """
The affix @deva[अनि] comes after a verb when @deva[नञ्] (negative) is in composition and the meaning is 'curse'. Example: @deva[अकरणिस्ते वृषल भूयात्] 'may failure befall you, O sinner!' Without curse: @deva[अकृतिः] 'non-making'.
"""

standard = """
When @deva[नञ्] is in composition and the sense is @deva[आक्रोश] (cursing), @deva[अनि] applies, superseding @deva[क्तिन्] etc. Examples: @deva[अकरणिस्ते वृषल भूयात्] 'may failure befall you, O sinner!'; @deva[तस्य अकरणिरेव अस्तु] 'may he be disappointed'. Without curse meaning: @deva[अकृतिस्तस्य कटस्य] 'the non-making of his mat'. Without @deva[नञ्]: @deva[सृतिस्ते भूयात्] 'may death befall you!'
"""

advanced = """
The @deva[विभाषा] does not continue here—@deva[अनि] is mandatory in cursing contexts with @deva[नञ्]. Two conditions required: (1) @deva[नञ्]-composition, (2) @deva[आक्रोश] sense. Either condition absent triggers different treatment.
"""

id = "3.3.2"
numericId = "33002"

[en]
simple = """
The @deva[उणादि] affixes can also have past-tense meaning in certain words. Examples: @deva[वर्त्मन्] 'road' (what was established); @deva[चर्मन्] 'skin' (what was lived in); @deva[भस्मन्] 'ashes' (what was burnt).
"""

standard = """
While @ref[3.3.1] establishes present-tense meaning for @deva[उणादि] affixes, this @deva[सूत्र] notes that past-tense meaning is also 'seen' (@deva[दृश्यते]) in specific cases. The phrase @deva[दृश्यते] indicates no general rule—we infer past meaning from attested usage. Examples with @deva[मनिन्]: @deva[वृत्] → @deva[वर्त्मन्] 'road'; @deva[चर्] → @deva[चर्मन्] 'skin'; @deva[भस्मन्] 'ashes'.
"""

advanced = """
The word @deva[दृश्यते] 'is seen' signals empirical observation rather than prescriptive rule. Past-tense @deva[उणादि] formations are attested but cannot be systematically predicted. The affix @deva[मनिन्] (leaving @deva[मन्] after @deva[इत्]-deletion) appears in the cited examples. The semantic logic: @deva[वर्त्मन्] 'that which has been established as a path'; @deva[चर्मन्] 'that in which life was lived' (the body's covering); @deva[भस्मन्] 'that which has been reduced to ash'.
"""

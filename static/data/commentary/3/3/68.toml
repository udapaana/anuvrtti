id = "3.3.68"
numericId = "33068"

[en]
simple = """
The words @deva[प्रमद] and @deva[सम्मद] are irregularly formed with meaning 'joy/delight'. Examples: @deva[कन्यानां प्रमदः] 'joy of girls'; @deva[कोकिलानां सम्मदः] 'rejoicing of cuckoos'. For other meanings: @deva[प्रमादः], @deva[सम्मादः].
"""

standard = """
The words @deva[प्रमद] and @deva[सम्मद] are formed irregularly (@deva[निपातन]) when meaning @deva[हर्ष] 'joy, delight'. Examples: @deva[कन्यानां प्रमदः] 'the joy of maidens'; @deva[कोकिलानां सम्मदः] 'the rejoicing of cuckoos'. Without the 'delight' meaning: @deva[प्रमादः] 'carelessness'; @deva[सम्मादः] 'frenzy'.
"""

advanced = """
Rather than stating '@deva[मद्] with @deva[प्र]/@deva[सम्] takes @deva[अप्]', the full forms are given to indicate these are @deva[रूढि] (conventionalized) words—the root meaning isn't fully visible. The @deva[अप्] forms @deva[प्रमद]/@deva[सम्मद] contrast with @deva[घञ्] forms @deva[प्रमाद]/@deva[सम्माद], which have different semantic ranges.
"""

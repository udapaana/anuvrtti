id = "3.3.75"
numericId = "33075"

[en]
simple = """
The affix @deva[अप्] comes after @deva[ह्वे] 'to call' (with semivowel change) when NO @deva[उपसर्ग] is present and mere action is denoted. Example: @deva[हवः] 'calling'. Vedic: @deva[हवे हवे सुहवं शूरमिन्द्रम्].
"""

standard = """
Without @deva[उपसर्ग], @deva[ह्वे] 'to call' takes @deva[अप्] with @deva[सम्प्रसारण] in @deva[भाव] (action) sense. Thus @deva[हवः] 'calling, invocation'. Vedic usage: @deva[हवे हवे सुहवं शूरमिन्द्रम्] 'in every call, [we invoke] the well-invoked hero Indra'. With @deva[उपसर्ग]: @deva[आह्वायः] (using @deva[घञ्]).
"""

advanced = """
The repetition of @deva[भावे] here (though continuing from @ref[3.3.18]) excludes the @deva[अनुवृत्ति] of @ref[3.3.19]'s @deva[अकर्तरि कारके] condition. This allows @deva[हव] to apply even in @deva[कर्तृ] (agent) sense. The @deva[सम्प्रसारण] is obligatory for prefix-less @deva[ह्वे] in @deva[भाव] sense.
"""

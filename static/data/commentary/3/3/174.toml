id = "3.3.174"
numericId = "33174"

[en]
simple = """
The affixes @deva[क्तिच्] and @deva[क्त] are used after a root when benediction is intended and the resulting word is an appellative (proper name or designation). Examples: @deva[तन्तिः] 'weaver' (may he weave!), @deva[भूतिः] 'success' (may it be!), @deva[भूतः] 'a name'.
"""

standard = """
@deva[क्तिच्] and @deva[क्त] form appellatives (@deva[संज्ञा]) with benedictive sense—the action is the object of someone's prayer/wish. Examples: @deva[तन्तिः] = @deva[तनुतात्] 'weaver' (may he weave); @deva[भूतिः] = @deva[भवतात्] 'success, prosperity'; @deva[सातिः] = @deva[सनुतात्] 'wealth, gift'. @deva[क्त]: @deva[भूतः] as a name.
"""

advanced = """
@deva[क्तिच्] (→ @deva[ति]) and @deva[क्त] (→ @deva[त]) form @deva[आशीर्-अर्थक] appellatives. The derived word names something whose action is prayed for: @deva[तन्तिः] 'may he weave!' → 'weaver'; @deva[भूतिः] 'may it be!' → 'prosperity'. @deva[संज्ञा]-restriction means these forms are lexicalized names/designations, not productive benedictives.
"""

id = "3.3.114"
numericId = "33114"

[en]
simple = """
The affix @deva[क्त] is added when action is expressed in neuter gender. Examples: @deva[हसितम्] 'laugh'; @deva[जल्पितम्] 'speech'; @deva[शायितम्] 'sleeping'; @deva[गतम्] 'going'.
"""

standard = """
When @deva[भाव] (action) is expressed in neuter gender, @deva[क्त] applies. These form neuter abstract nouns. Examples: @deva[हसितम्] 'laugh, laughter'; @deva[जल्पितम्] 'speech'; @deva[शायितम्] 'sleeping'; @deva[गतम्] 'going'; @deva[सहितम्] 'association'.
"""

advanced = """
The @deva[क्त] affix here functions as @deva[भाववाचक] (action-denoting), not @deva[भूतकालवाचक] (past-participle). The neuter gender condition distinguishes this from participial @deva[क्त]. These @deva[क्त]-derived neuter nouns denote the abstract action itself.
"""

id = "3.3.28"
numericId = "33028"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[पू] 'to purify' with @deva[निर्], and after @deva[लू] 'to cut' with @deva[अभि]. Examples: @deva[निष्पावः] 'winnowing'; @deva[अभिलावः] 'moving'. Without these prefixes: @deva[पवः], @deva[लवः].
"""

standard = """
By @ref[1.3.10] (which pairs items in sequence), @deva[निर्] goes with @deva[पू] and @deva[अभि] with @deva[लू]. Thus: @deva[निर्] + @deva[पू] + @deva[घञ्] → @deva[निष्पावः] 'winnowing' (the @deva[स्] of @deva[निस्] becomes @deva[ष्] before @deva[प]); @deva[अभि] + @deva[लू] → @deva[अभिलावः] 'moving'. @deva[पू] includes both @deva[पूङ्] and @deva[पूञ्]. Without the specified prefixes: @deva[पवः] 'wind', @deva[लवः] 'cutting'.
"""

advanced = """
The @deva[यथासंख्य] (sequential correspondence) principle of @ref[1.3.10] pairs @deva[निर्]-@deva[पू] and @deva[अभि]-@deva[लू]. The sandhi @deva[निर्] + @deva[पू] → @deva[निष्पाव] involves @deva[विसर्ग] → @deva[ष्] before @deva[प]. Both variants of @deva[पू] (@deva[पूङ्] and @deva[पूञ्], ninth conjugation) are included.
"""

id = "3.3.172"
numericId = "33172"

[en]
simple = """
The potential (@deva[लिङ्]) as well as @deva[कृत्य] affixes are used when the sense is capability or ability. Example: @deva[भवता भारो वोढव्यः] or @deva[भवान् भारं वहेत्] 'you can carry the load'.
"""

standard = """
@deva[लिङ्] and @deva[कृत्य] apply when @deva[शक्ति] (capability) is expressed—the root itself conveys ability. Examples: @deva[भवता भारो वोढव्यः/वहनीयः/वाह्यः] (@[kṛtya]) or @deva[भवान् भारं वहेत्] (@[liṅ]) 'you are capable of carrying the load'. This mention prevents @deva[णिनि] from excluding @deva[कृत्य].
"""

advanced = """
@deva[शक्ति]-artha resides in the @deva[धातु] itself (inherent capability). @deva[कृत्य] is general, but explicit mention prevents @deva[णिनि]-@deva[बाध]. The @deva[च] draws @deva[कृत्य] from @ref[3.3.171]. @deva[लिङ्] + @deva[कृत्य] both express potential/ability: gerundive (@deva[वोढव्य]) or optative (@deva[वहेत्]).
"""

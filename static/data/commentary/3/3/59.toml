id = "3.3.59"
numericId = "33059"

[en]
simple = """
The affix @deva[अप्] comes after @deva[अद्] 'to eat' when an @deva[उपसर्ग] is in composition. Examples: @deva[विघसः] 'half-eaten morsel'; @deva[प्रघसः] 'voracious'. Without prefix: @deva[घासः] 'grass'.
"""

standard = """
With an @deva[उपसर्ग], @deva[अद्] 'to eat' takes @deva[अप्]. The derivation involves @deva[अद्] → @deva[घस्] (@ref[2.4.38]). Examples: @deva[विघसः] 'half-chewed morsel'; @deva[प्रघसः] 'voracious'. Without @deva[उपसर्ग]: @deva[अद्] + @deva[घञ्] → @deva[घस्] + @deva[अ] = @deva[घासः] 'grass, fodder'.
"""

advanced = """
The substitution @deva[अद्] → @deva[घस्] by @ref[2.4.38] applies before the affix. With @deva[उपसर्ग], @deva[अप्] is used: @deva[वि] + @deva[घस्] + @deva[अ] = @deva[विघसः]. Without prefix, @deva[घञ्] applies: @deva[घस्] + @deva[अ] (from @deva[घञ्]) = @deva[घासः]. The @deva[उपसर्ग] condition distinguishes the two affix environments.
"""

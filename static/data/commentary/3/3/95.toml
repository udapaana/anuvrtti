id = "3.3.95"
numericId = "33095"

[en]
simple = """
After @deva[स्था] 'to stand', @deva[गा] 'to sing', @deva[पा] 'to drink', @deva[पच्] 'to cook', @deva[क्तिन्] is used for feminine @deva[भाव]-words. This blocks @deva[अङ्]. Examples: @deva[प्रस्थितिः] 'journey'; @deva[उद्गीतिः] 'loud singing'; @deva[प्रपीतिः] 'cistern'; @deva[पक्तिः] 'cooking'.
"""

standard = """
After @deva[स्था], @deva[गा], @deva[पा], @deva[पच्], @deva[क्तिन्] applies for feminine @deva[भाव] words, blocking @deva[अङ्] (@ref[3.3.106]) which normally supersedes @deva[क्तिन्] for @deva[आ]-final compound verbs. Examples: @deva[प्रस्थितिः] 'journey' (@ref[7.4.40]); @deva[उद्गीतिः] 'singing aloud' (@deva[गै] + @deva[क्तिन्] → @deva[गी] + @deva[ति] by @ref[6.4.66]); @deva[सगीतिः] 'concert'; @deva[प्रपीतिः] 'cistern'; @deva[सम्पीतिः] 'drinking together'; @deva[पक्तिः] 'cooking'.
"""

advanced = """
The @deva[भाव] repetition excludes other significances—only pure action sense triggers @deva[क्तिन्] here. Forms like @deva[अवस्था], @deva[संस्था], @deva[व्यवस्था] (using @deva[अङ्]) are justified by @[pāṇini]'s own usage in @ref[1.1.34], demonstrating that @deva[अङ्] can still apply despite this rule—showing optional application.
"""

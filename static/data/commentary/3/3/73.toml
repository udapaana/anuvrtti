id = "3.3.73"
numericId = "33073"

[en]
simple = """
The affix @deva[अप्] comes after @deva[ह्वे] 'to call' with @deva[आ] (and semivowel change) when meaning 'battle'. Example: @deva[आहवः] 'battle' (where they challenge each other). Otherwise: @deva[आह्वायः] 'calling'.
"""

standard = """
With @deva[आ] + @deva[ह्वे] meaning @deva[युद्ध] (battle), @deva[अप्] applies with @deva[सम्प्रसारण]. Thus @deva[आहवः] 'battle'—where combatants call/challenge each other. Without the battle meaning: @deva[आह्वायः] 'a calling, summons' (using @deva[घञ्] without @deva[सम्प्रसारण]).
"""

advanced = """
The semantic condition @deva[युद्धे] restricts the @deva[सम्प्रसारण]-with-@deva[अप्] combination to battle contexts. The word @deva[आहव] etymologically suggests mutual calling/challenging—a poetic designation for combat. The phonological process mirrors @ref[3.3.72].
"""

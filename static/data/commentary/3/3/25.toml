id = "3.3.25"
numericId = "33025"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[क्षु] 'to sneeze' and @deva[स्रु] 'to flow' when compounded with @deva[वि]. Examples: @deva[विक्षावः] 'cough'; @deva[विश्रावः] 'flowing forth, celebrated'. Without @deva[वि]: @deva[क्षवः], @deva[स्रवः].
"""

standard = """
When the prefix @deva[वि] is in composition, @deva[घञ्] (blocking @deva[अप्] of @ref[3.3.57]) follows @deva[क्षु] 'to sneeze' and @deva[स्रु] 'to flow/move'. Thus: @deva[वि] + @deva[क्षु] + @deva[घञ्] → @deva[विक्षावः] 'cough'; @deva[वि] + @deva[स्रु] → @deva[विश्रावः] 'flowing forth' or 'celebrated'. Without the prefix: @deva[क्षवः] 'sneeze'; @deva[स्रवः] 'flow'.
"""

advanced = """
The @deva[वि] prefix condition creates an @deva[अपवाद] to @ref[3.3.57]. The root @deva[स्रु] (listed as @deva[श्रु] in some readings) means 'to move/flow' here. The form @deva[विश्रावः] with meaning 'celebrated' shows semantic extension from the literal 'flowing/spreading forth' (of fame).
"""

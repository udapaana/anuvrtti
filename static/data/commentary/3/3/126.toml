id = "3.3.126"
numericId = "33126"

[en]
simple = """
The affix @deva[खल्] is added to verbs when @deva[ईषत्] (slightly), @deva[दुर्] (with difficulty), or @deva[सु] (easily) are prefixed, expressing that an action is hard or easy to perform. Example: @deva[ईषत्करः] 'easy to do', @deva[दुष्करः] 'difficult to do'.
"""

standard = """
When @deva[ईषत्], @deva[दुर्], or @deva[सु] serve as upapadas conveying 'with difficulty' (@deva[कृच्छ्र]) or 'easily' (@deva[अकृच्छ्र]), the affix @deva[खल्] is added. The anuv̥tti of 'instrument or location' does not continue. Examples: @deva[ईषत्करः] 'slightly doable', @deva[दुष्करः] 'hard to do', @deva[सुकरः] 'easy to do'.
"""

advanced = """
This @[sūtra] introduces a new domain—@deva[कृच्छ्राकृच्छ्रार्थ] (ease/difficulty of action). @deva[दुर्] conveys @deva[कृच्छ्र]; @deva[ईषत्] and @deva[सु] convey @deva[अकृच्छ्र]. The @deva[भृतृस्थान]-anuv̥tti ceases. @deva[खल्] (= @deva[अ] with @deva[ख्] and @deva[ल्] as @deva[इत्]) produces: @deva[ईषत् + कृ + खल् = ईषत्करः]; @deva[दुर् + कृ + खल् = दुष्करः]; @deva[सु + कृ + खल् = सुकरः].
"""

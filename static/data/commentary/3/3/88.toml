id = "3.3.88"
numericId = "33088"

[en]
simple = """
The affix @deva[क्त्रि] comes after roots marked with @deva[डु] in the @[dhātupāṭha], with @deva[मप्] always added. Examples: @deva[पक्त्रिमम्] 'what is cooked/ripe'; @deva[उप्त्रिमम्] 'sown'; @deva[कृत्रिमम्] 'artificial'.
"""

standard = """
Roots with indicatory @deva[डु] take @deva[क्त्रि] in @deva[भाव] etc. senses. By @ref[4.4.20], @deva[मप्] is always added to @deva[क्त्रि], giving @deva[त्रिम]. Examples: @deva[डुपचष्] 'to cook' → @deva[पक्त्रिमम्] 'cooked/ripe'; @deva[डुवप्] → @deva[उप्त्रिमम्] 'sown' (@ref[6.1.15]); @deva[डुकृञ्] → @deva[कृत्रिमम्] 'artificial, man-made'.
"""

advanced = """
The @deva[क्त्रि] affix cannot stand alone—it requires @deva[मप्] augment by @ref[4.4.20], forming @deva[त्रिम]. The @deva[डु] marker in @[dhātupāṭha] entries identifies roots taking this affix. The @deva[उप्त्रिम] form involves @deva[संप्रसारण] by @ref[6.1.15]. These @deva[त्रिम]-ending words are adjectival, often with nuance of artificiality or process-completion.
"""

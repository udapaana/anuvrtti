id = "3.3.155"
numericId = "33155"

[en]
simple = """
The potential (@deva[लिङ्]) is optionally used when a verb expressing expectation accompanies another verb, but not when @deva[यत्] is used. Example: @deva[संभावयामि देवदत्तो ग्रामं गच्छेत्] 'I suppose Devadatta may go to the village'.
"""

standard = """
When a verb expressing @deva[संभावन] (expectation, supposition)—like @deva[संभावय], @deva[अपि], @deva[अपिनाम]—governs another verb, @deva[लिङ्] is optionally used for the governed verb. The @deva[यत्]-exception means @deva[यत्]-constructions don't follow this. The @deva[अलम्]-qualification from @ref[3.3.154] continues.
"""

advanced = """
The @deva[संभाव्य]-verb (expressing supposition) is called @deva[उपश्लेष]-@[dhātu]. @deva[लिङ्] is @deva[विकल्पेन] for the subordinate verb under @deva[संभावन]-artha governed by @deva[अलम्]-conditions. @deva[यत्]-exclusion: @deva[यत्]-headed constructions follow different rules. Optionality allows time-appropriate alternatives.
"""

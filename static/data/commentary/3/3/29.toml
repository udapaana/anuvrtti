id = "3.3.29"
numericId = "33029"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[गॄ] 'to sound/swallow' when compounded with @deva[उत्] or @deva[नि]. Examples: @deva[उद्गारः] 'roaring' (of sea); @deva[निगारः] 'swallowing'. Without prefix: @deva[गरः].
"""

standard = """
With prefixes @deva[उत्] or @deva[नि], @deva[गॄ] (covering both 'to sound' and 'to swallow') takes @deva[घञ्]. Thus: @deva[उत्] + @deva[गॄ] → @deva[उद्गारः] 'roaring, belching' (@deva[उद्गारः समुद्रस्य] 'the ocean's roar'); @deva[नि] + @deva[गॄ] → @deva[निगारः] 'swallowing'. Without these prefixes: @deva[गरः] 'poison'.
"""

advanced = """
The root @deva[गॄ] has two meanings: 'to make sound' (@deva[शब्दे]) and 'to swallow' (@deva[निगरणे]). Both meanings are covered by this @deva[सूत्र]. The prefix @deva[उत्] typically yields the 'sounding/emitting' sense, while @deva[नि] yields 'swallowing'. The unprefixed @deva[गरः] 'poison' relates to the 'swallowing' sense (that which is swallowed with difficulty).
"""

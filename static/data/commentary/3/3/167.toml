id = "3.3.167"
numericId = "33167"

[en]
simple = """
The infinitive @deva[तुमुन्] is used when words meaning 'time'—@deva[काल], @deva[समय], @deva[वेला]—are in composition. Examples: @deva[कालो भोक्तुम्] 'time to eat'; @deva[समयः स्नातुम्] 'time to bathe'.
"""

standard = """
With @deva[काल], @deva[समय], or @deva[वेला] (all meaning 'time') as upapadas, @deva[तुमुन्] (infinitive) is used. Examples: @deva[कालो भोक्तुम्] 'time to eat'; @deva[समयः खलु स्नानभोजने सेवितुम्] 'it is indeed time to bathe and eat'; @deva[अवसरोऽयमात्मानं प्रकाशयितुम्] 'this is the time to reveal oneself'.
"""

advanced = """
Time-denoting upapadas (@deva[काल], @deva[समय], @deva[वेला], and synonyms like @deva[अवसर]) trigger @deva[तुमुन्]. This is @deva[कृत्]-formation for purpose/occasion expressions. Why these three specifically? They represent formal time-designations; colloquial synonyms may require different treatment per usage.
"""

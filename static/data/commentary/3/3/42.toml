id = "3.3.42"
numericId = "33042"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[चि] with @deva[च] → @deva[क] when meaning 'assembly' (of qualified beings), not a mere crowd. Examples: @deva[भिक्षुकनिकायः] 'assembly of monks'; @deva[ब्राह्मणनिकायः] 'assembly of @[brāhmaṇas]'. For mere herds: @deva[सूकरनिचयः] 'herd of hogs'.
"""

standard = """
After @deva[चि] with @deva[च] → @deva[क], @deva[घञ्] applies when meaning @deva[सङ्घ] 'organized assembly' of living beings sharing common qualifications—not a mere confused crowd (@deva[अश्रेणीगण]). Examples: @deva[भिक्षुकनिकायः] 'assembly of mendicants'; @deva[ब्राह्मणनिकायः] 'assembly of @[brāhmaṇas]'; @deva[वैयाकरणनिकायः] 'assembly of grammarians'. Counter-examples: @deva[सूकरनिचयः] 'herd of hogs' (mere collection); @deva[प्रमाणसमुच्चयः] 'collection of proofs' (not living beings).
"""

advanced = """
The term @deva[सङ्घ] has two senses: organized assembly with common qualifications, and mere confused gathering. This @deva[सूत्र] uses @deva[पर्युदास] (exclusion) to specify the former. The restriction to @deva[प्राणिन्] (living beings) excludes inanimate collections. The @deva[श्रेणीगण] refers to guilds or organized groups with shared characteristics.
"""

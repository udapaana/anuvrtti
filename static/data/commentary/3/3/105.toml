id = "3.3.105"
numericId = "33105"

[en]
simple = """
Both @deva[अङ्] and @deva[युच्] come after @deva[चिन्त्] 'to think', @deva[पूज्] 'to worship', @deva[कथ्] 'to narrate', @deva[कुम्ब्] 'to cover', @deva[चर्च्] 'to learn' for feminine words. Examples: @deva[चिन्ता]/@deva[चिन्तना] 'thought'; @deva[पूजा]/@deva[पूजना] 'worship'; @deva[कथा]/@deva[कथना] 'narration'.
"""

standard = """
After @deva[चिन्त्], @deva[पूज्], @deva[कथ्], @deva[कुम्ब्], @deva[चर्च्] (all @deva[चुरादि]/10th class verbs), both @deva[अङ्] and @deva[युच्] apply for feminine. The @deva[च] draws @deva[युच्] from @ref[3.3.107]. Examples with @deva[अङ्]: @deva[चिन्ता] 'thought'; @deva[पूजा] 'worship'; @deva[कथा] 'narration'; @deva[कुम्बा] 'covering, thick petticoat'; @deva[चर्चा] 'recitation'. With @deva[युच्]: @deva[चिन्तना], @deva[पूजना] etc. (@ref[7.1.1]).
"""

advanced = """
These @deva[चुरादि] verbs would exclusively take @deva[युच्] by @ref[3.3.107] (being @deva[णिजन्त]). This @deva[सूत्र] provides @deva[अङ्] as an alternative, creating doublets. The @deva[अङ्] forms (@deva[चिन्ता], @deva[पूजा]) are more common than the @deva[युच्] forms (@deva[चिन्तना], @deva[पूजना]).
"""

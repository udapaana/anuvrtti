id = "3.3.46"
numericId = "33046"

[en]
simple = """
This rule teaches that the affix @deva[घञ्] is added after the root @deva[ग्रह्] (to seize) when preceded by the prefix @deva[प्र] (forth), provided the meaning involves a desire to acquire something (@deva[लिप्सा]).

For example, @deva[पात्रप्रग्राहेण चरति भिक्षुः] means "the mendicant walks carrying a vessel to receive alms." Here @deva[प्रग्राह] denotes the act of holding out a receptacle with the intention of receiving. The @deva[वृद्धि] substitution (@deva[अ] → @deva[आ]) marks this as the @deva[घञ्]-derived form.

Without the acquisitive meaning, the regular form @deva[प्रग्रहः] (with @deva[अप्]) is used instead, as in @deva[प्रग्रहो देवदत्तस्य] "Devadatta's grip."
"""

standard = """
With @deva[प्र] + @deva[ग्रह्] in the sense of @deva[लिप्सा] (desire to acquire or receive), @deva[घञ्] applies, blocking the otherwise applicable @deva[अप्] from @ref[3.3.58].

Derivation: @deva[प्र] + @deva[ग्रह्] + @deva[घञ्] → @deva[प्रग्राह] (with @deva[वृद्धि] @deva[अ] → @deva[आ]).

Examples: @deva[पात्रप्रग्राहेण चरति भिक्षुः पिण्डार्थी] "the mendicant walks with vessel in hand, seeking alms"; @deva[स्रुवप्रग्राहेण चरति द्विजो दक्षिणार्थी] "the @[brāhmaṇa] walks with a ladle, seeking his ritual fee."

Counter-example: @deva[प्रग्रहो देवदत्तस्य] "Devadatta's grip" — no acquisitive sense, so @deva[अप्] applies.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[घञ्] from @ref[3.3.16]; @deva[ग्रह्] from @ref[3.3.45].

The condition @deva[लिप्सायाम्] restricts @deva[घञ्] to contexts of begging, soliciting, or seeking donations. The @deva[प्रग्राह] form specifically denotes holding a receptacle for receiving. This is distinct from @ref[3.3.52] (which provides optional @deva[घञ्] for @deva[प्र] + @deva[ग्रह्] in commerce meaning) and @ref[3.3.53] (optional @deva[घञ्] for rein meaning). Each semantic domain for @deva[प्र] + @deva[ग्रह्] has its own rule, reflecting the system's precision in correlating form and meaning.
"""

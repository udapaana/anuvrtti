id = "3.3.24"
numericId = "33024"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[श्रि] 'to resort to', @deva[नी] 'to lead', and @deva[भू] 'to be' when NOT compounded with an @deva[उपसर्ग]. Examples: @deva[श्रायः] 'shelter'; @deva[नायः] 'means'; @deva[भावः] 'condition'. With prefixes: @deva[प्रश्रयः], @deva[प्रणयः], @deva[प्रभवः].
"""

standard = """
Without an @deva[उपसर्ग], @deva[घञ्] (blocking @deva[अच्] of @ref[3.3.56]) follows @deva[श्रि], @deva[नी], @deva[भू]: @deva[श्रायः] 'shelter'; @deva[नायः] 'means/method'; @deva[भावः] 'state/condition'. With prefixes, different affixes apply: @deva[प्रश्रयः] 'respect'; @deva[प्रणयः] 'love'; @deva[प्रभवः] 'source'. Note: @deva[प्रभाव] ('splendor') is a @deva[समास] compound (@deva[प्र] + @deva[भाव] 'excellent condition'), not @deva[प्रभू] + @deva[घञ्].
"""

advanced = """
The condition @deva[अनुपसर्गात्] (without prefix) restricts these three roots. The form @deva[नय] in @deva[नयो राज्ञः] 'the king's policy' uses @deva[अच्] by @ref[3.3.113] (@deva[बहुलम्] provision). The distinction between @deva[प्रभाव] (compound) and *@deva[प्रभाव] (hypothetical prefixed form) shows how semantic analysis determines derivational path.
"""

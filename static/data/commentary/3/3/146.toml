id = "3.3.146"
numericId = "33146"

[en]
simple = """
The first future (@deva[लृट्]) is used after a verb when @deva[किंकिल] (an expression of anger) or words meaning @deva[अस्ति] 'is' are in composition, when expressing disbelief or intolerance.
"""

standard = """
@deva[लृट्] alone is used when @deva[किंकिल] (expressing anger, taken as one upapada) or @deva[अस्ति]-synonyms (@deva[अस्ति], @deva[भवति], @deva[विद्यते]) accompany the verb, within contexts of @deva[अनवक्लृप्ति] or @deva[अमर्ष]. This excludes @deva[लिङ्] which was available in @ref[3.3.145].
"""

advanced = """
@deva[किंकिल] is a single @deva[निपात]-upapada conveying @deva[क्रोध] (anger); @deva[अस्त्यर्थ] words include @deva[अस्ति], @deva[भवति], @deva[विद्यते] etc. With these upapadas under @deva[अनवक्लृप्ति/अमर्ष], only @deva[लृट्] applies—@deva[लिङ्] is excluded. This narrows tense-selection to first future alone.
"""

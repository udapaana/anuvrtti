id = "3.3.138"
numericId = "33138"

[en]
simple = """
When a statement involves the word @deva[पर] (that side, further) indicating a time limit, both the first and second futures may optionally be used.
"""

standard = """
When @deva[पर] (the far side of a limit) is used for a time division (excluding day/night), both @deva[लुट्] and @deva[लृट्] are optionally permitted for non-current-day future. This extends the previous rule: @deva[पर] allows optionality where @deva[अवर] mandated @deva[लृट्].
"""

advanced = """
The full @ref[3.3.137] context applies with @deva[पर] replacing @deva[अवर]. For @deva[पर] + @deva[कालभाग] (excluding @deva[अहोरात्र]), @deva[विकल्प] arises between @deva[लुट्] and @deva[लृट्] for @deva[अनद्यतन भविष्यत्]. The @deva[पर]-specification creates optionality versus the @deva[अवर]-mandated @deva[लृट्] of @ref[3.3.137].
"""

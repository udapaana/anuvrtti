id = "3.3.92"
numericId = "33092"

[en]
simple = """
The affix @deva[कि] comes after @deva[घु] verbs (@deva[दा], @deva[धा], @deva[दाप्]) when an @deva[उपसर्ग] is in composition. The @deva[क्] causes final @deva[आ] elision. Examples: @deva[प्रदिः] 'a gift'; @deva[प्रधिः] 'wheel rim'; @deva[उपाधिः] 'fraud'; @deva[अन्तर्धिः] 'disappearance'.
"""

standard = """
The @deva[घु] verbs (@deva[दा], @deva[धा], @deva[दाप्] by @ref[1.1.20]) take @deva[कि] when compounded with an @deva[उपसर्ग]. The @deva[क्] is @deva[इत्], causing final @deva[आ]-elision by @ref[6.4.64]. Examples: @deva[प्र] + @deva[दा] + @deva[कि] → @deva[प्रदिः] 'a present/gift'; @deva[प्रधिः] 'wheel periphery'; @deva[उपाधिः] 'deception'; @deva[अन्तर्धिः] 'vanishing'.
"""

advanced = """
The @deva[घु]-designation (@ref[1.1.20]) identifies @deva[दा] 'to give', @deva[धा] 'to place', and @deva[दाप्] 'to purify' as taking @deva[कि] with prefixes. The @deva[क्]-@deva[इत्] triggers @deva[आ]-elision (@ref[6.4.64]), yielding @deva[द्] + @deva[इ] → @deva[दि]. These forms are productive with various prefixes.
"""

id = "3.3.62"
numericId = "33062"

[en]
simple = """
The affix @deva[अप्] comes optionally after @deva[स्वन्] 'to sound' and @deva[हस्] 'to laugh' when NO @deva[उपसर्ग] is present. Examples: @deva[स्वनः] or @deva[स्वानः] 'sound'; @deva[हसः] or @deva[हासः] 'laughter'. With prefix: only @deva[प्रस्वानः], @deva[प्रहासः].
"""

standard = """
Without @deva[उपसर्ग], @deva[स्वन्] and @deva[हस्] take @deva[अप्] optionally. Thus @deva[स्वनः] (with @deva[अप्]) or @deva[स्वानः] (with @deva[घञ्]) 'sound'; @deva[हसः] or @deva[हासः] 'laughter'. With prefixes, only one form applies: @deva[प्रस्वानः] 'loud noise'; @deva[प्रहासः] 'loud laughter'.
"""

advanced = """
The @deva[विभाषा] creates optional @deva[अप्]/@deva[घञ्] selection only without prefix. The presence of an @deva[उपसर्ग] removes the option, leaving only @deva[घञ्] forms (@deva[प्रस्वान], @deva[प्रहास]). This demonstrates how prefix-presence can eliminate otherwise available options.
"""

id = "3.3.8"
numericId = "33008"

[en]
simple = """
The present tense @deva[लट्] may optionally express future meaning when one action serves as a condition for another action expressed in the imperative. Example: @deva[उपाध्यायश्चेदागच्छति अथ त्वं छन्दोऽधीष्व] 'if the teacher comes, then read prosody'.
"""

standard = """
When a verb's action is the @deva[लक्षण] (condition/sign) for another action expressed in @deva[लोट्] (imperative), @deva[लट्] may optionally express future. The term @deva[लोडर्थ] means 'having imperative sense'. Example: @deva[उपाध्यायश्चेदागच्छति] (or @deva[आगमिष्यति/आगन्ता]) @deva[अथ त्वं छन्दोऽधीष्व] 'if the professor comes (will come), then you read prosody'. The teacher's coming is the @deva[लक्षण] for the command to read.
"""

advanced = """
The technical structure: one verb (the condition) stands in @deva[लक्षण] relation to another verb in @deva[लोट्] (the @deva[लक्ष्य], thing signified/commanded). The @deva[लक्षण-लक्ष्य] relationship is that of sign to signified—the conditional action signals when the commanded action should occur. The @deva[वा] 'optionally' allows @deva[लट्], @deva[लृट्], or @deva[लुट्] in the conditional clause while the main clause remains in @deva[लोट्].
"""

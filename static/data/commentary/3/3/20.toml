id = "3.3.20"
numericId = "33020"

[en]
simple = """
The affix @deva[घञ्] comes after all roots when the resulting word is a name of measure. Examples: @deva[निचायः] 'a heap' (measure of grains); @deva[कारः] 'a throw' (measure of scattering).
"""

standard = """
When the word formed is @deva[परिमाणाख्य] (a name of measure), @deva[घञ्] follows all roots—even those that would otherwise take @deva[अच्] (@ref[3.3.56]) or @deva[अप्] (@ref[3.3.57]). Examples: @deva[नि] + @deva[चि] + @deva[घञ्] → @deva[निचायः] 'a heap' (@deva[एकस्तण्डुलनिचायः] 'one heap of rice'); @deva[कॄ] + @deva[घञ्] → @deva[कारः] 'a throw'. For feminine measures, @deva[क्तिन्] is used instead (@ref[3.3.94]).
"""

advanced = """
The word @deva[सर्वेभ्यः] 'after all (roots)' supersedes both @deva[अच्] and @deva[अप्] for measure-names. The @deva[आख्या] term indicates these are not @deva[रूढि] (primitive/underived) words—numerals are included alongside measures like @deva[प्रस्थ], @deva[पल]. A @deva[वार्तिक] adds: after causative @deva[दारि] and @deva[जारि] with @deva[णिच्]-elision (@deva[लुक्]), @deva[घञ्] applies in @deva[कर्तृ] sense: @deva[दाराः] 'wife' (who divides brothers); @deva[जाराः] 'paramour' (who inflames).
"""

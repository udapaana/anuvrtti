id = "3.3.64"
numericId = "33064"

[en]
simple = """
The affix @deva[अप्] comes optionally after @deva[गद्] 'to speak', @deva[नद्] 'to sound', @deva[पठ्] 'to read', @deva[स्वन्] 'to sound' with @deva[नि]. Examples: @deva[निगदः]/@deva[निगादः] 'recitation'; @deva[निनदः]/@deva[निनादः] 'noise'; @deva[निपठः]/@deva[निपाठः] 'reading'.
"""

standard = """
With @deva[नि], the roots @deva[गद्], @deva[नद्], @deva[पठ्], @deva[स्वन्] take @deva[अप्] optionally. Examples: @deva[निगदः] or @deva[निगादः] 'recitation'; @deva[निनदः] or @deva[निनादः] 'noise, sound'; @deva[निपठः] or @deva[निपाठः] 'reading'; @deva[निस्वनः] or @deva[निस्वानः] 'a noise'.
"""

advanced = """
The prefix @deva[नि] triggers optional @deva[अप्] for these four roots. The @deva[अप्] forms show @deva[गुण] (@deva[निगद], @deva[निनद], @deva[निपठ], @deva[निस्वन]) while @deva[घञ्] forms show @deva[वृद्धि] (@deva[निगाद], @deva[निनाद], @deva[निपाठ], @deva[निस्वान]). Both are valid in this context.
"""

id = "3.3.16"
numericId = "33016"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[पद्] 'to step', @deva[रुज्] 'to pain', @deva[विश्] 'to enter', and @deva[स्पृश्] 'to touch'. Examples: @deva[पादः] 'foot'; @deva[रोगः] 'disease'; @deva[वेशः] 'entrance'.
"""

standard = """
From this @deva[सूत्र], the @deva[अनुवृत्ति] of 'future' ceases. The affixes now taught apply in all tenses. @deva[घञ्] follows @deva[पद्], @deva[रुज्], @deva[विश्], @deva[स्पृश्]: thus @deva[पादः] 'foot'; @deva[रोगः] 'disease' (with @deva[गुण]); @deva[वेशः] 'entrance'. A @deva[वार्तिक] notes that @deva[स्पृश्] + @deva[घञ्] → @deva[स्पर्शः] means 'disease/warmth'; for 'touch', @deva[अच्] is used (@ref[3.1.134]).
"""

advanced = """
The derivations involve @deva[गुण]: @deva[पद्] → @deva[पाद्] + @deva[अ] → @deva[पाद]; @deva[रुज्] → @deva[रोग्] + @deva[अ] → @deva[रोग]; @deva[विश्] → @deva[वेश्] + @deva[अ] → @deva[वेश]. For @deva[स्पृश्], the @deva[वार्तिक] distinguishes: @deva[स्पर्शः] (from @deva[घञ्]) means 'affliction' or 'heat'; @deva[स्पर्शः] (from @deva[अच्]) means 'touch' as in @deva[स्पर्शो देवदत्तः] 'Devadatta who touches'. The two differ in accent.
"""

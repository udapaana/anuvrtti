id = "3.3.13"
numericId = "33013"

[en]
simple = """
The affix @deva[लृट्] (second future) is used for remaining cases of simple futurity and in purposive constructions. Examples: @deva[करिष्यामि इति व्रजति] 'he goes (thinking) I will do'; @deva[करिष्यति] 'he will do'.
"""

standard = """
@deva[लृट्] (the second future tense) applies in remaining future contexts—both for simple futurity and in dependent clauses with purposive construction. Examples: @deva[करिष्यामि इति व्रजति] 'he goes thinking "I will do"'; @deva[हरिष्यामि इति व्रजति] 'he goes thinking "I will take"'. Also simple: @deva[करिष्यति] 'he will do'; @deva[हरिष्यति] 'he will take'.
"""

advanced = """
This @deva[सूत्र] establishes @deva[लृट्] as the default future tense after the special provisions of @ref[3.3.10]-@ref[3.3.12]. It covers both independent sentences (@deva[करिष्यति] 'he will do') and dependent/quoted sentences within purposive constructions (@deva[करिष्यामि इति व्रजति]). The term @deva[शेष] 'remaining' indicates @deva[लृट्] applies wherever the specialized affixes don't.
"""

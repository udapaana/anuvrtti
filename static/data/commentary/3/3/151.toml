id = "3.3.151"
numericId = "33151"

[en]
simple = """
When wonder is expressed by words other than @deva[यच्च] and @deva[यत्र], the first future (@deva[लृट्]) is used—except when @deva[यदि] is used. Example: @deva[आश्चर्यम् अन्धो नाम पर्वतमारोक्ष्यति] 'wonder! a blind man will climb the mountain'.
"""

standard = """
For @deva[चित्रीकरण] (wonder) expressed without @deva[यच्च/यत्र] (which take @deva[लिङ्] by @ref[3.3.150]), and without @deva[यदि], the first future @deva[लृट्] is used instead of the potential. Examples: @deva[आश्चर्यम्], @deva[चित्रम्], @deva[अद्भुतम्] + @deva[अन्धो नाम पर्वतमारोक्ष्यति] 'it's astonishing that a blind man will climb the mountain'.
"""

advanced = """
This complements @ref[3.3.150]: @deva[यच्च/यत्र] + @deva[चित्रीकरण] → @deva[लिङ्]; other @deva[चित्रीकरण]-expressions (excluding @deva[यदि]) → @deva[लृट्]. The @deva[यदि]-exclusion (@deva[यद्यवर्जम्]) means @deva[यदि]-clauses expressing wonder don't take @deva[लृट्] mandatorily. @deva[लृट्] supersedes @deva[लिङ्] in non-@deva[यच्च/यत्र] wonder contexts.
"""

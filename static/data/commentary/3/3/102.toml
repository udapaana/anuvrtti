id = "3.3.102"
numericId = "33102"

[en]
simple = """
After derivative verbs (desideratives, causatives, intensives, denominatives), the affix @deva[अ] is used to form feminine words. Examples: @deva[चिकीर्षा] 'desire to do'; @deva[जिहीर्षा] 'desire to take'; @deva[पुत्रकाम्या] 'desire for a son'.
"""

standard = """
After @deva[प्रत्ययान्त] (affix-ending) verbs—derivative roots like desideratives, causatives, intensives, denominatives—the affix @deva[अ] forms feminine nouns. Though taking affixes, these are called @deva[धातु] by @ref[3.1.32]. Examples: @deva[कृ] + @deva[सन्] = @deva[चिकीर्ष्] → @deva[चिकीर्ष्] + @deva[अ] (@ref[6.4.48]) + @deva[टाप्] (@ref[4.1.4]) = @deva[चिकीर्षा] 'desire to do'; @deva[जिहीर्षा] 'desire to take'; @deva[पुत्रकाम्या] 'desire for a son'; @deva[कण्डूया] 'itch'.
"""

advanced = """
The @deva[प्रत्ययान्त] condition identifies secondary/derived roots formed by @deva[सन्] (desiderative), @deva[णिच्] (causative), @deva[यङ्] (intensive), or denominative affixes. These take @deva[अ] + @deva[टाप्] for feminine abstract nouns expressing desire, causing, intensity, etc. The rule appears also as @deva[अः प्रत्ययात्].
"""

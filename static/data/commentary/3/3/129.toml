id = "3.3.129"
numericId = "33129"

[en]
simple = """
In Vedic usage, the affix @deva[युच्] comes after verbs meaning 'to go' when @deva[ईषत्], @deva[दुर्], or @deva[सु] (meaning easily or with difficulty) are prefixed. This supersedes @deva[खल्]. Example: @deva[सूपसदनोऽग्निः] 'fire that is easy to approach'.
"""

standard = """
In the Vedas (@deva[छन्दस्]), @deva[युच्] replaces @deva[खल्] after roots meaning 'to go' when combined with @deva[ईषत्]/etc. upapadas. Examples from @[taittirīya] @[saṃhitā]: @deva[सूपसदनोऽग्निः] 'fire easy to approach', @deva[सूपसदनमन्तरिक्षम्] 'atmosphere easy to reach'.
"""

advanced = """
This is a @deva[छान्दस] provision: @deva[युच्] applies after @deva[गत्यर्थ]-@[dhātus] (verbs of motion) in Vedic, superseding @deva[खल्]. Examples: @deva[सु + उप + सद् + युच् = सूपसदनः] (T.S. 7.5.20). The @deva[छन्दस्]-restriction indicates this formation is not productive in @deva[भाषा] (classical Sanskrit).
"""

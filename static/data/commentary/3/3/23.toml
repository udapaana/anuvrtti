id = "3.3.23"
numericId = "33023"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[यु] 'to join', @deva[द्रु] 'to run', and @deva[दु] 'to burn' when compounded with @deva[सम्]. Examples: @deva[संयावः]; @deva[सन्द्रावः]; @deva[सन्दावः]. But: @deva[प्रयवः] (with different prefix).
"""

standard = """
After @deva[यु], @deva[द्रु], and @deva[दु] compounded specifically with @deva[सम्], @deva[घञ्] is prescribed. Thus: @deva[सम्] + @deva[यु] + @deva[घञ्] → @deva[संयावः]; @deva[सम्] + @deva[द्रु] → @deva[सन्द्रावः]; @deva[सम्] + @deva[दु] → @deva[सन्दावः]. With other prefixes, @deva[घञ्] doesn't apply: @deva[प्रयवः] (not *@deva[प्रयावः]).
"""

advanced = """
The restriction to @deva[सम्] demonstrates the precise conditioning of affix application. The three roots @deva[यु] (second conjugation, 'to mix/join'), @deva[द्रु] (first conjugation, 'to run'), and @deva[दु] (first conjugation, 'to burn/distress') each show @deva[वृद्धि] of the root vowel before @deva[घञ्]: @deva[यु] → @deva[याव]; @deva[द्रु] → @deva[द्राव]; @deva[दु] → @deva[दाव].
"""

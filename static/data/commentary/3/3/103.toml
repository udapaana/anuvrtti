id = "3.3.103"
numericId = "33103"

[en]
simple = """
The affix @deva[अ] comes after verbs with a heavy (long/conjunct) vowel that end in a consonant, to form feminine words. This blocks @deva[क्तिन्]. Examples: @deva[कुण्डा] 'adulteress'; @deva[ईहा] 'effort'; @deva[ऊहा] 'supplying an ellipsis'.
"""

standard = """
After verbs with @deva[गुरु] (prosodically heavy) vowel ending in a consonant, @deva[अ] applies for feminine words, blocking @deva[क्तिन्]. Examples: @deva[कुण्डा] 'adulteress'; @deva[हुण्डा] 'tigress'; @deva[ईहा] 'effort'; @deva[ऊहा] 'inference, supplying ellipsis'. Without heavy vowel: @deva[भक्तिः] 'devotion'. Without consonant ending: @deva[नीतिः] 'policy'.
"""

advanced = """
The @deva[गुरु] condition requires a prosodically heavy vowel—long vowel or vowel followed by conjunct consonant. The @deva[हलन्त] condition requires consonant-final roots. Both conditions must be met for @deva[अ] to apply. Counter-examples show @deva[क्तिन्] applies when either condition fails: @deva[भक्ति] (short vowel), @deva[नीति] (vowel-final).
"""

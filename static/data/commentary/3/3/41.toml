id = "3.3.41"
numericId = "33041"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[चि] 'to collect' with @deva[च] → @deva[क] substitution, in four senses: dwelling, funeral fire, body, collection. Examples: @deva[निकायः] 'dwelling'; @deva[आकाय] 'funeral fire'; @deva[कायः] 'body'.
"""

standard = """
After @deva[चि] 'to collect', @deva[घञ्] applies with initial @deva[च] → @deva[क] substitution when the meaning is: (1) @deva[निवास] 'dwelling', (2) @deva[चिताग्नि] 'funeral pyre fire', (3) @deva[शरीर] 'body', (4) @deva[उपसमाधान] 'heap/collection'. Examples: @deva[काशीनिकायः] '@[kāśī-dwelling]'; @deva[आकायम् अग्निं चिन्वीत] 'let him arrange the funeral fire'; @deva[कायः] 'body'; @deva[गोमयनिकायः] 'heap of cow-dung'.
"""

advanced = """
The substitution @deva[च] → @deva[क] is irregular (@deva[आदेश]). The four semantic conditions (@deva[निवास], @deva[चिताग्नि], @deva[शरीर], @deva[उपसमाधान]) restrict @deva[घञ्] with this substitution. Without these meanings: @deva[चयः] 'gathering'. Note: @deva[काष्ठनिचयः] 'heap of wood' doesn't use @deva[घञ्] because it expresses multiplicity (@deva[बाहुल्य]), not aggregation (@deva[उपसमाधान]).
"""

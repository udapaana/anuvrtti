id = "3.3.57"
numericId = "33057"

[en]
simple = """
The affix @deva[अप्] comes after roots ending in @deva[ॠ], @deva[उ], or @deva[ऊ]. Examples: @deva[करः] 'scattering'; @deva[गरः] 'poison'; @deva[यवः] 'barley'; @deva[लवः] 'cutting'; @deva[पवः] 'winnowing'.
"""

standard = """
After roots ending in @deva[ॠ], short @deva[उ], or long @deva[ऊ], @deva[अप्] applies, blocking @deva[घञ्]. The @deva[प्] is @deva[इत्] for accent (@ref[3.1.3]). Examples: @deva[कृ] → @deva[करः] 'scattering'; @deva[गॄ] → @deva[गरः] 'beverage, poison'; @deva[शॄ] → @deva[शरः] 'arrow'; @deva[यु] → @deva[यवः] 'barley'; @deva[लू] → @deva[लवः] 'reaping'; @deva[पू] → @deva[पवः] 'winnowing'.
"""

advanced = """
The @deva[द्] in @deva[ॠद्] is euphonic, not a @deva[तपर] marker—otherwise only short @deva[उ] (not long @deva[ऊ]) would be covered by @ref[1.1.70]. The @deva[गुण] substitute applies: @deva[ॠ] → @deva[अर्]; @deva[उ/ऊ] → @deva[अव्]. The @deva[अप्] affix (with @deva[प्] as @deva[इत्]) creates specific accent patterns distinguishing these from @deva[घञ्] formations.
"""

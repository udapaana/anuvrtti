id = "3.3.70"
numericId = "33070"

[en]
simple = """
The word @deva[ग्लह] is irregularly formed (from @deva[ग्रह्] with @deva[र] → @deva[ल]) when meaning 'gambling'. Example: @deva[अक्षस्य ग्लहः] 'cast of dice'. For other meanings: @deva[ग्रहः] 'grip, planet'.
"""

standard = """
The word @deva[ग्लह] is derived irregularly from @deva[ग्रह्] 'to seize' when referring to @deva[द्यूत] (gambling). @deva[ग्रह्] + @deva[अप्] → @deva[ग्रह], then @deva[र] → @deva[ल] irregularly → @deva[ग्लह]. Example: @deva[अक्षस्य ग्लहः] 'a throw of dice'. Without gambling meaning: @deva[ग्रहः पादस्य] 'grip of the foot'.
"""

advanced = """
Alternative analysis: some derive @deva[ग्लह] regularly from a separate root @deva[ग्लह्] 'to gamble' + @deva[अप्], blocking @deva[घञ्]. Their counter-example: @deva[ग्लाहः] 'receiving' (with @deva[घञ्]). The @deva[निपातन] (irregular formation) approach treats @deva[र] → @deva[ल] as an exceptional change; the alternative posits a distinct root.
"""

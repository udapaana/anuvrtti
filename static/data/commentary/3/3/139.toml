id = "3.3.139"
numericId = "33139"

[en]
simple = """
When there is a reason for using the benedictive (@deva[लिङ्]) but the action is understood as not completed, the conditional (@deva[लृङ्]) is used for future tense. This expresses 'if X had happened, Y would happen'.
"""

standard = """
When conditions for @deva[लिङ्] (as in @ref[3.3.156]-@ref[3.3.157] for cause-effect relations) exist but non-completion (@deva[अनिष्पत्ति]) of the action is implied, @deva[लृङ्] (conditional) is used for future sense. The conditional expresses hypothetical situations where the action did not or will not occur.
"""

advanced = """
When @deva[लिङ्]-nimittas (per @ref[3.3.156]ff—@deva[हेतुहेतुमद्भाव] etc.) apply but @deva[क्रियातिपत्ति] (non-realization of action) is intended, @deva[लृङ्] (conditional mood) replaces @deva[लिङ्] in @deva[भविष्यत्]-artha. @deva[लृङ्] conveys counterfactual or unfulfilled conditions: 'if X were to happen (but won't/didn't)...'.
"""

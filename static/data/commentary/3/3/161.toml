id = "3.3.161"
numericId = "33161"

[en]
simple = """
The potential (@deva[लिङ्]) is used when the speaker commands, invites, permits, politely expresses a wish, asks questions, or prays. These six contexts all call for the potential mood.
"""

standard = """
@deva[लिङ्] is mandated for six semantic functions: @deva[विधि] (command to subordinate), @deva[निमन्त्रण] (invitation), @deva[आमन्त्रण] (permission), @deva[अधीष्ट] (polite wish-expression), @deva[संप्रश्न] (question), and @deva[प्रार्थना] (prayer). This excludes other tense-affixes for these communicative acts.
"""

advanced = """
This @[sūtra] specifies six @deva[अर्थ]-conditions for @deva[लिङ्]: (1) @deva[विधि]—directing subordinates; (2) @deva[निमन्त्रण]—inviting; (3) @deva[आमन्त्रण]—granting leave; (4) @deva[अधीष्ट]—expressing wish politely; (5) @deva[संप्रश्न]—questioning; (6) @deva[प्रार्थना]—entreating. @deva[लिङ्] serves as the modal form for directive and optative speech acts.
"""

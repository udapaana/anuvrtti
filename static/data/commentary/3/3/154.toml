id = "3.3.154"
numericId = "33154"

[en]
simple = """
The potential (@deva[लिङ्]) is used when expressing expectation or belief in someone's ability to do something, as conveyed by @deva[अलम्] 'capable'—but not when expressing alarm. Example: @deva[अलं देवदत्तो ग्रामं गच्छेत्] 'Devadatta is capable of going to the village'.
"""

standard = """
@deva[संभावन] means expectation or supposition of ability. When @deva[अलम्] (capable, enough) expresses this (not alarm @deva[त्रास]), @deva[लिङ्] is used. Example: @deva[अलं देवदत्तो ग्रामं गच्छेत्] 'Devadatta is quite capable of going to the village'. The @deva[अलम्]-qualifier distinguishes ability-expectation from fear-based expectation.
"""

advanced = """
@deva[संभावन] qualified by @deva[अलम्]-artha (capability, sufficiency) triggers @deva[लिङ्]. The @deva[त्रास]-exclusion (@deva[त्रासवर्जम्]) means alarm/fear contexts don't take mandatory @deva[लिङ्]. @deva[अलम्] here denotes @deva[शक्ति/पर्याप्ति]: 'X has the capacity for Y'. This captures confident expectation, not anxious apprehension.
"""

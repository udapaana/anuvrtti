id = "3.3.117"
numericId = "33117"

[en]
simple = """
The affix @deva[ल्युट्] is added when the word relates to the verb as instrument or location. Examples: @deva[इध्मप्रव्रश्चनः] 'wood-cutting axe'; @deva[गोदोहनी] 'milk-pail' (vessel into which milk is milked); @deva[सक्तुधानी] 'flour-container'.
"""

standard = """
When the word formed relates as @deva[करण] (instrument) or @deva[अधिकरण] (location) to the verb, @deva[ल्युट्] applies. This expresses instrumental (3rd case) and locative (7th case) relations. Examples: @deva[इध्मप्रव्रश्चनः] 'an axe' (instrument for cutting firewood); @deva[गोदोहनी] 'milk-pail' (location/receptacle for milking); @deva[सक्तुधानी] 'flour-holder'.
"""

advanced = """
The @deva[करणाधिकरणयोश्च] specification adds instrumental and locative senses to @deva[ल्युट्]'s domain. Combined with @ref[3.3.113]'s @deva[बहुलम्], @deva[ल्युट्] becomes highly productive for naming tools, containers, and places of action.
"""

id = "3.3.170"
numericId = "33170"

[en]
simple = """
The affix @deva[णिनि] (forming words like @deva[कारिन्]) is used for agent nouns when there is necessity, obligation, or indebtedness connected with the action. Examples: @deva[अवश्यंकारी] 'one who must do', @deva[शतं दायी] 'one who ought to give a hundred'.
"""

standard = """
@deva[णिनि] (producing @deva[इन्]-ending agent nouns) is used when the agent has @deva[अवश्य] (necessity), @deva[ऋण] (debt), or obligation regarding the action. Compounding occurs by @ref[2.1.72]. Examples: @deva[अवश्यंकारी] 'one bound to do'; @deva[शतं दायी] 'one obligated to give a hundred'; @deva[निष्कं दायी] 'obligated to give a @[niṣka]'.
"""

advanced = """
@deva[णिनि] produces @deva[इन्]-stem agent nouns. When @deva[अवश्यम्], debt (@deva[ऋण]), or obligation attaches to the @deva[कर्तृ], @deva[णिनि] applies. Compounding per @ref[2.1.72] (@deva[मयूरव्यंसकादि]). Examples: @deva[अवश्यम् + कृ + णिनि = अवश्यंकारिन्] → @deva[अवश्यंकारी]; @deva[शतं दायी] (obligation to give 100). The affix marks obligated agency.
"""

id = "3.3.83"
numericId = "33083"

[en]
simple = """
The affix @deva[क] also comes after @deva[हन्] when @deva[स्तम्ब] 'clump' is in composition with instrumental meaning. Examples: @deva[स्तम्बघ्नः] or @deva[स्तम्बघनः] 'a hoe for weeding grass clumps'. Without instrument meaning: @deva[स्तम्बघातः].
"""

standard = """
With @deva[स्तम्ब] 'clump/tuft' and @deva[करण] (instrument) sense, @deva[हन्] takes either @deva[क] or @deva[अप्] (from previous @deva[सूत्र], with @deva[घन्] substitute). Thus @deva[स्तम्बघ्नः] (with @deva[क]: @deva[हन्] + @deva[क] → @deva[ह्न्] (@ref[6.4.98]) → @deva[घ्न] (@ref[7.3.54])) or @deva[स्तम्बघनः] (with @deva[अप्], @deva[घन्] substitute) 'a small hoe for weeding'. Feminine: @deva[स्तम्बघ्ना] or @deva[स्तम्बघना].
"""

advanced = """
The @deva[च] draws @deva[अप्] from the previous rule. With @deva[क]: @deva[हन्] → @deva[ह्न्] (penultimate @deva[अ] deletion by @ref[6.4.98]) → @deva[घ्न] (@deva[ह्] → @deva[घ्] by @ref[7.3.54]). With @deva[अप्]: total replacement @deva[हन्] → @deva[घन्]. Both yield instrumental-meaning words for grass-tuft removal tools.
"""

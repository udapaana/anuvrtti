id = "3.3.50"
numericId = "33050"

[en]
simple = """
The affix @deva[घञ्] is optionally used after @deva[रू] 'to roar' and @deva[प्लु] 'to float' with @deva[आ]. Examples: @deva[आरावः] or @deva[आरवः] 'noise'; @deva[आप्लावः] or @deva[आप्लवः] 'bathing'.
"""

standard = """
With @deva[आ] + @deva[रू] 'to roar' and @deva[आ] + @deva[प्लु] 'to float', @deva[घञ्] is optional (@deva[विभाषा]). Thus: @deva[आरावः] (with @deva[घञ्]) or @deva[आरवः] (without) 'noise'; @deva[आप्लावः] or @deva[आप्लवः] 'bathing, flooding'. Both forms are valid.
"""

advanced = """
The @deva[विभाषा] creates optional application of @deva[घञ्]. As noted in @ref[3.3.49], this option can apply retrospectively (@deva[सिंहावलोकनन्याय]) to the previous @deva[सूत्र]'s roots as well. The paired forms (@deva[आराव]/@deva[आरव], @deva[आप्लाव]/@deva[आप्लव]) demonstrate free variation in these contexts.
"""

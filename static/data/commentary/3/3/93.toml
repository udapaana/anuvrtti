id = "3.3.93"
numericId = "33093"

[en]
simple = """
The affix @deva[कि] comes after @deva[घु] verbs when a word in accusative is in composition and the meaning is 'location'. Examples: @deva[जलधिः] 'ocean' (where water is held); @deva[शरधिः] 'quiver' (where arrows are placed).
"""

standard = """
When a @deva[द्वितीया]-ending word is in composition with @deva[घु] verbs, and the relationship is @deva[आधार] (location), @deva[कि] applies. Examples: @deva[जलधिः] 'ocean' (in which water is held); @deva[शरधिः] 'quiver' (that in which arrows are put). The @deva[च] draws @deva[कि] from the previous @deva[सूत्र].
"""

advanced = """
The @deva[आधारे] condition specifies locational relationship—the container/receptacle sense. The words formed should have no other significance. The @deva[घु]-verbs here function in their 'holding/placing' sense. Compare @deva[जलधि] 'ocean' (water-holder) with non-locational usages of the same roots.
"""

id = "3.3.91"
numericId = "33091"

[en]
simple = """
The affix @deva[नन्] comes after @deva[स्वप्] 'to sleep'. The final @deva[न्] regulates accent. Example: @deva[स्वप्नः] 'a dream'.
"""

standard = """
After @deva[स्वप्] 'to sleep', the affix @deva[नन्] is used in @deva[भाव] etc. senses. The final @deva[न्] is @deva[इत्], regulating accent by @ref[6.1.197]. Thus @deva[स्वप्नः] 'a dream, sleep'.
"""

advanced = """
The @deva[नन्] affix (operational form @deva[न] after @deva[इत्]-deletion of the first @deva[न्]) creates the common noun @deva[स्वप्न] 'dream'. The @deva[इत्]-@deva[न्] at the end determines the word's accent pattern by @ref[6.1.197], distinguishing it from other @deva[न]-ending derivatives.
"""

id = "3.3.82"
numericId = "33082"

[en]
simple = """
The affix @deva[अप्] comes after @deva[हन्] with @deva[अयस्] 'iron', @deva[वि], or @deva[द्रु] 'wood' when meaning an instrument, with @deva[घन्] as substitute. Examples: @deva[अयोघनः] 'forge-hammer'; @deva[विघनः] 'mallet'; @deva[द्रुघनः] 'axe'.
"""

standard = """
When @deva[अयस्] 'iron', @deva[वि], or @deva[द्रु] 'wood' is in composition with @deva[हन्], and the word is related as @deva[करण] (instrument), @deva[अप्] applies with @deva[घन्] substitute. Examples: @deva[अयोघनः] 'iron-hammer' (tool that strikes iron); @deva[विघनः] 'mallet'; @deva[द्रुघनः] or @deva[द्रुघणः] 'axe' (wood-striker). The @deva[ण] variant follows either @ref[8.4.3] or inclusion in @deva[आरोहणादि] class (@ref[4.2.80]).
"""

advanced = """
The @deva[करणे] condition specifies instrumental relationship—the tool by which the object is struck. The @deva[अयस्]-compound shows @deva[अयस्] → @deva[अयो] in composition. The @deva[द्रुघण] variant with cerebral @deva[ण] is explained either by regular retroflex assimilation or by lexical listing in the @deva[आरोहणादि] class.
"""

id = "3.3.109"
numericId = "33109"

[en]
simple = """
The affix @deva[ण्वुल्] comes after verbs when the feminine word is an appellative (name). Examples: @deva[उद्दालकपुष्पभञ्जिका] 'a game of crushing @[uddālaka] flowers'; @deva[शालभञ्जिका] 'a game'; @deva[तालभञ्जिका].
"""

standard = """
When forming feminine @deva[संज्ञा] (appellatives/names), @deva[ण्वुल्] applies after roots. Examples: @deva[उद्दालकपुष्पभञ्जिका] 'a game played in eastern districts crushing @[uddālaka] flowers'; @deva[वरणपुष्पप्रवाहिका] 'a game'; @deva[आभ्यूषखादिका]; @deva[आचोषखादिका]; @deva[शालभञ्जिका]; @deva[तालभञ्जिका].
"""

advanced = """
The @deva[संज्ञायाम्] condition specifies appellative/naming function. These compound feminine nouns denote specific games, activities, or items. The @deva[ण्वुल्] → @deva[अक] (@ref[7.1.1]) with @deva[टाप्] feminine creates @deva[इका]-ending words.
"""

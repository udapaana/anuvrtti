id = "3.3.65"
numericId = "33065"

[en]
simple = """
The affix @deva[अप्] comes optionally after @deva[क्वण्] 'to jingle' with @deva[नि], without prefix, or when meaning 'flute' (with any prefix). Examples: @deva[निक्वणः]/@deva[निक्वाणः] 'musical tone'; @deva[क्वणः]/@deva[क्वाणः] 'sound'; @deva[प्रक्वणा वीणा] 'flute'.
"""

standard = """
The root @deva[क्वण्] 'to jingle' takes @deva[अप्] optionally under three conditions: (1) with @deva[नि], (2) without any @deva[उपसर्ग], (3) when referring to 'flute' (with any prefix). Examples: @deva[निक्वणः] or @deva[निक्वाणः] 'musical tone'; @deva[क्वणः] or @deva[क्वाणः] 'sound'; @deva[कल्याणप्रक्वणा वीणा] 'beautiful-sounding flute'.
"""

advanced = """
Three distinct conditions trigger optional @deva[अप्]: @deva[नि]-prefixed, prefix-less, or flute-referring (with mandatory prefix). Counter-example: @deva[अतिक्वाणो वर्तते]—prefix @deva[अति] without flute-meaning allows no option; only @deva[घञ्] applies. The flute condition requires some prefix but not necessarily @deva[नि].
"""

id = "3.3.4"
numericId = "33004"

[en]
simple = """
The present tense (@deva[लट्]) can express future meaning when used with @deva[यावत्] or @deva[पुरा]. Example: @deva[यावत् प्रेषयामि] 'I shall send' (lit. 'as long as I send').
"""

standard = """
When the particles @deva[यावत्] 'as long as' or @deva[पुरा] 'before' are in construction with a verb, the present tense @deva[लट्] may express future meaning. Examples: @deva[आलोके ते निपतति पुरा] 'he will surely fall in your sight'; @deva[यावद् शत्रुघ्नं प्रेषयामि] 'I shall send @[śatrughna]'. These words must function as adverbs (@deva[निपात]), not as relative pronouns or nouns.
"""

advanced = """
The @deva[अनुवृत्ति] of @deva[भविष्यत्] continues from @ref[3.3.3]. The restriction requires @deva[यावत्] and @deva[पुरा] to function as @deva[निपात] (particles), not as @deva[सर्वनाम] or other parts of speech. Counter-examples: @deva[यावद् दास्यति तावद् भोक्ष्यते] 'as long as he gives, so long he will eat' (here @deva[यावत्] is correlative); @deva[पुरा व्रजिष्यति] 'he goes along the city' (here @deva[पुरा] is instrumental of @deva[पुर्] 'city'). In such cases, @deva[लट्] cannot substitute for future.
"""

id = "3.3.132"
numericId = "33132"

[en]
simple = """
Affixes for past or @deva[लट्] (present tense) may optionally be used to express future time when hope or expectation is expressed. For example, past-tense forms can indicate a hoped-for future outcome.
"""

standard = """
When @deva[आशंसा] (hope, expectation of obtaining something not yet possessed) is expressed, past or @deva[लट्] (present tense) affixes may optionally denote future time. The restriction of 'near the present' does not apply here. The word @deva[च] draws both past and present into the rule.
"""

advanced = """
@deva[आशंसा] is the wish for an unattained object, inherently future-oriented. The @deva[च] indicates @deva[भूतवर्तमान]-@[lakāras] apply to @deva[भविष्यत्] when hope is expressed. The @deva[सामीप्य]-condition from @ref[3.3.131] does not carry over. This allows @deva[लङ्], @deva[लट्] etc. to convey @deva[भविष्यत्]-artha under @deva[आशंसा].
"""

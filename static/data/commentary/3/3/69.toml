id = "3.3.69"
numericId = "33069"

[en]
simple = """
The affix @deva[अप्] comes after @deva[अज्] 'to drive' with @deva[सम्] or @deva[उत्] when referring to cattle/beasts. Examples: @deva[समजः पशूनाम्] 'herd of cattle'; @deva[उदजः पशूनाम्] 'driving forth of cattle'. For people: @deva[समाजः], @deva[उदाजः].
"""

standard = """
With @deva[सम्] or @deva[उत्], @deva[अज्] 'to go, drive' takes @deva[अप्] when referring to @deva[पशु] (cattle, beasts). Examples: @deva[समजः पशूनाम्] 'a herd/collection of cattle'; @deva[उदजः पशूनाम्] 'driving forth of cattle'. When not referring to cattle: @deva[समाजो ब्राह्मणानाम्] 'assembly of @[brāhmaṇas]'; @deva[उदाजः क्षत्रियाणाम्] 'expedition of @[kṣatriyas]'.
"""

advanced = """
The semantic restriction @deva[पशौ] confines @deva[अप्] to animal contexts. With @deva[सम्], @deva[अज्] means 'collection/assembly'; with @deva[उत्], it means 'driving out'. The @deva[घञ्] forms (@deva[समाज], @deva[उदाज]) apply to human assemblies/expeditions, showing semantic specialization based on affix choice.
"""

id = "3.3.149"
numericId = "33149"

[en]
simple = """
The potential (@deva[लिङ्]) is used in all tenses when @deva[यच्च] and @deva[यत्र] are in composition and censure is implied. Example: 'we censure you who, being a wealthy Brahmin, would sacrifice for a @[śūdra]'.
"""

standard = """
The @deva[अनवक्लृप्ति/अमर्ष] conditions cease; @deva[गर्हा] continues. @deva[लिङ्] is mandated for all tenses with @deva[यच्च/यत्र] + @deva[गर्हा], debarring other tense-affixes. Example: @deva[यच्च तत्र भवान् वृषलं याजयेत् ॠद्धौ वृद्धः सन् ब्राह्मणः गर्हामहे] 'we censure you, a prosperous elderly Brahmin, that you should sacrifice for a @[śūdra]'.
"""

advanced = """
@deva[अनवक्लृप्ति/अमर्ष]-anuv̥tti ends; @deva[गर्हा] governs. With @deva[यच्च/यत्र] + @deva[गर्हा], @deva[लिङ्] is @deva[नित्य] for @deva[सर्वकाल], excluding all other @[lakāras]. The example shows @deva[गर्हा] explicitly: @deva[गर्हामहे] 'we censure'. This completes the @deva[यच्च/यत्र] rules for censure contexts.
"""

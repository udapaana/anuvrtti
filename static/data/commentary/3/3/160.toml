id = "3.3.160"
numericId = "33160"

[en]
simple = """
For roots meaning 'to wish' themselves, the potential (@deva[लिङ्]) may optionally be used for present tense. Examples: @deva[इच्छति] or @deva[इच्छेत्] 'he wishes'; @deva[कामयते] or @deva[कामयेत] 'he desires'.
"""

standard = """
For @deva[इच्छादि]-@[dhātus] (wish-roots), @deva[लिङ्] is optionally used where @deva[लट्] (present) would otherwise apply. Examples: @deva[इच्छति/इच्छेत्] 'he wishes'; @deva[वष्टि/उश्यात्] 'he desires'; @deva[कामयते/कामयेत] 'he wishes'. This ordains @deva[लिङ्] as a present-tense alternative.
"""

advanced = """
This ordains @deva[लिङ्] for @deva[वर्तमान]-artha specifically with @deva[इच्छादि]-@[dhātus] themselves. @deva[विकल्पेन] between @deva[लट्] and @deva[लिङ्]: @deva[इच्छति] (@deva[लट्]) ~ @deva[इच्छेत्] (@deva[लिङ्]); @deva[वष्टि] ~ @deva[उश्यात्]; @deva[कामयते] ~ @deva[कामयेत]. The potential conveys wish-nature even in stating present desire.
"""

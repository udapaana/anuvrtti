id = "3.3.152"
numericId = "33152"

[en]
simple = """
When @deva[उत] and @deva[अपि] are used with the same meaning (namely 'surely, certainly'), the potential (@deva[लिङ्]) is used for all tenses. Examples: @deva[उत कुर्यात्] 'surely he does', @deva[अपि कुर्यात्] 'certainly he does'.
"""

standard = """
@deva[लिङ्] is mandated for all times when @deva[उत] and @deva[अपि] share the meaning @deva[बाढम्] (surely, certainly, assuredly). This excludes all other tense-affixes. Examples: @deva[उत कुर्यात्] / @deva[अपि कुर्यात्] 'certainly he does'; @deva[उताधीयीत] / @deva[अप्यधीयीत] 'certainly he studies (will study, studied)'.
"""

advanced = """
The condition @deva[समर्थयोः] means both @deva[उत] and @deva[अपि] must convey @deva[बाढम्]-artha (affirmation). With this @deva[समानार्थ]-condition, @deva[लिङ्] applies @deva[सर्वकालिकम्], excluding all other @[lakāras]. This concludes the @deva[अधिकार] begun at @ref[3.3.141].
"""

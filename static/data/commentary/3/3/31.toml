id = "3.3.31"
numericId = "33031"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[स्तु] 'to praise' with @deva[सम्] when the reference is to sacrifice. Example: @deva[संस्तावः] 'the place where chanters gather at a sacrifice'. For non-sacrificial use: @deva[संस्तवः] 'mutual praise'.
"""

standard = """
After @deva[सम्] + @deva[स्तु] 'to praise together', @deva[घञ्] applies when the word refers to sacrificial matters (@deva[अध्वर]). Thus @deva[संस्तावश्छन्दोगानाम्] 'the @[saṃstāva] of the Chandogas'—the place at a sacrifice where @[brāhmaṇas] reciting hymns gather. Without sacrificial reference: @deva[संस्तवश्छात्रयोः] 'the mutual praising of two students'.
"""

advanced = """
The semantic restriction @deva[अध्वरे] 'in sacrifice' triggers @deva[घञ्] for @deva[सम्] + @deva[स्तु]. The word @deva[संस्ताव] specifically denotes @deva[समेत्य स्तुवन्ति यस्मिन् देशे छन्दोगाः स देशः] 'the place where Chandogas (@[sāmaveda] chanters) come together and praise'. Outside sacrificial contexts, the regular formation @deva[संस्तवः] applies.
"""

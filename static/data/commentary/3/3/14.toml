id = "3.3.14"
numericId = "33014"

[en]
simple = """
The participial affixes @deva[शतृ] and @deva[शानच्] (called @deva[सत्]) may optionally substitute for @deva[लृट्], forming future participles. Examples: @deva[करिष्यन्तं देवदत्तं पश्य] 'behold Devadatta about to do'; @deva[करिष्यमाणः] 'being about to be done'.
"""

standard = """
The @deva[सत्] affixes (@deva[शतृ] and @deva[शानच्], defined in @ref[3.2.127]) optionally replace @deva[लृट्] to form future participles. When the word doesn't end in nominative (@deva[प्रथमा]), @deva[सत्] obligatorily replaces @deva[लृट्] (per @ref[3.2.124]); otherwise it's optional. Examples: @deva[करिष्यन्तं देवदत्तं पश्य] 'see Devadatta about to act'; @deva[अर्जयिष्यमाणो वसति] 'he dwells intending to earn'. Nominative: @deva[करिष्यन्] or @deva[करिष्यति] both valid.
"""

advanced = """
The derivation: @deva[कृ] + @deva[लृट्] → @deva[कृ] + @deva[स्य] (by @ref[3.1.33]) + @deva[शतृ] → @deva[कर्] + @deva[इट्] + @deva[स्य] + @deva[अत्] → @deva[करिष्यत्], nominative @deva[करिष्यन्]. The @deva[सत्] affixes attach after the future sign @deva[स्य], creating future participles. The option applies only with @deva[प्रथमा]-ending words; with other cases, @deva[सत्] is mandatory per @ref[3.2.124]. These forms express intention/purpose as well as simple futurity.
"""

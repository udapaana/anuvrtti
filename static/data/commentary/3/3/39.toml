id = "3.3.39"
numericId = "33039"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[शी] 'to lie down' with @deva[वि] or @deva[उप] when meaning 'turn/succession' (of sleeping). Examples: @deva[विशायः] 'turn of rest'; @deva[उपशायः] 'turn of sleeping near'. Other meanings: @deva[विशयः] 'doubt'; @deva[उपशयः] 'lying in ambush'.
"""

standard = """
With @deva[वि] + @deva[शी] or @deva[उप] + @deva[शी] meaning @deva[पर्याय] (turn/succession), @deva[घञ्] applies. Thus @deva[विशायः] 'turn of sleeping/rest' (as for sentinels on watch); @deva[राजोपशायः] 'turn of sleeping near the king'. Without succession meaning: @deva[विशयः] 'doubt'; @deva[उपशयः] 'lying by the side, ambush'.
"""

advanced = """
The @deva[पर्याये] condition restricts @deva[घञ्] to rotation/succession contexts. The examples @deva[तव विशायः] and @deva[राजानम् उपशयितुं पर्यायः] illustrate the rotational sense—guards taking turns to rest. Without this semantic condition, @deva[विशय] and @deva[उपशय] have entirely different meanings.
"""

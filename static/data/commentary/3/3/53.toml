id = "3.3.53"
numericId = "33053"

[en]
simple = """
The affix @deva[घञ्] is optionally used after @deva[ग्रह्] with @deva[प्र] when meaning 'rein'. Example: @deva[प्रग्राहः] or @deva[प्रग्रहः] 'a rein (for controlling horses)'.
"""

standard = """
With @deva[प्र] + @deva[ग्रह्] meaning @deva[रश्मि] (rein, bridle), @deva[घञ्] is optional. The @deva[रश्मि] is the strap by which horses etc. attached to a carriage are controlled. Thus @deva[प्रग्राहः] or @deva[प्रग्रहः] 'a rein'—both forms are valid.
"""

advanced = """
This @deva[सूत्र] adds another semantic condition for optional @deva[घञ्] after @deva[प्र] + @deva[ग्रह्]. The @deva[रश्मि] 'rein' meaning joins @deva[लिप्सा] (@ref[3.3.46]) and @deva[वाणिज्य] (@ref[3.3.52]) as contexts where @deva[प्रग्राह/प्रग्रह] variation occurs. Each semantic domain has its own provision.
"""

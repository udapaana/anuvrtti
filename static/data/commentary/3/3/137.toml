id = "3.3.137"
numericId = "33137"

[en]
simple = """
The second future (@deva[लृट्]) is used instead of the first future when @deva[अवर] (this side) refers to a time division, but not when that division means 'day' or 'night'.
"""

standard = """
When @deva[अवर] indicates a time limit (@deva[कालावधि]) combined with a time-division word (excluding 'day' or 'night'), @deva[लृट्] is used for non-current-day future instead of @deva[लुट्]. This differs from @ref[3.3.136] which covers both space and time; this @[sūtra] addresses only temporal limits with specific exclusions.
"""

advanced = """
Unlike @ref[3.3.136] (covering @deva[देशकालावधि]), this addresses @deva[कालावधि] alone. When @deva[अवर] + @deva[कालभाग] (time-portion word, excluding @deva[अहन्] and @deva[रात्रि]) expresses the temporal limit, @deva[लृट्] (not @deva[लुट्]) applies. The @deva[अहोरात्र]-exclusion creates a specific domain for this second-future usage.
"""

id = "3.3.158"
numericId = "33158"

[en]
simple = """
The infinitive affix @deva[तुमुन्] is used when a verb meaning 'to wish' is in construction, provided the agent of both verbs is the same. Example: @deva[इच्छति भोक्तुम्] 'he wishes to eat'.
"""

standard = """
When the same agent controls both the 'wish'-verb and the dependent verb, @deva[तुमुन्] (infinitive) is used. Examples: @deva[इच्छति/वष्टि/वाञ्छति भोक्तुम्] 'he wishes to eat'; @deva[पिनाकपाणिं पतिमाप्तुमिच्छति] 'she wishes to obtain the @[pināka-handed] (@[śiva]) as husband'. Different agents preclude @deva[तुमुन्].
"""

advanced = """
@deva[समानकर्तृक]-condition: when @deva[इच्छादि]-verb and dependent verb share @deva[कर्तृ], @deva[तुमुन्] applies. This is @deva[कृत्]-formation, not @deva[तिङ्]. Different @deva[कर्तृ] triggers @deva[लिङ्]/etc. per @ref[3.3.157]. Example: @deva[इच्छामि भुञ्जीत भवान्] (different agents) vs. @deva[इच्छामि भोक्तुम्] (same agent).
"""

id = "3.3.85"
numericId = "33085"

[en]
simple = """
The word @deva[उपघ्न] is irregularly formed when meaning 'an inclined place for support/leaning'. Examples: @deva[पर्वतोपघ्नः] 'mountain slope'; @deva[ग्रामोपघ्नः] 'village border'. Otherwise: @deva[पर्वतोपघातः].
"""

standard = """
The word @deva[उपघ्नः] is formed irregularly from @deva[उप] + @deva[हन्] + @deva[अप्] when meaning @deva[आश्रय] (proximity, support, inclination). The irregularity: eliding penultimate @deva[अ] of @deva[हन्], then @deva[हन्] → @deva[घ्न] by sandhi. Examples: @deva[पर्वतोपघ्नः] 'the mountain slope/vicinity'; @deva[ग्रामोपघ्नः] 'bordering the village'. Without support meaning: @deva[पर्वतोपघातः].
"""

advanced = """
The @deva[निपातन] here could theoretically be achieved by @deva[क] without irregularity, but the form is listed specifically. The @deva[आश्रय] 'proximity/contiguity' sense applies to slopes, borders, and areas adjacent to landmarks. The semantic specialization from 'striking' to 'leaning against' reflects spatial metaphor.
"""

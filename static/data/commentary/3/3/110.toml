id = "3.3.110"
numericId = "33110"

[en]
simple = """
The affix @deva[इञ्] comes optionally after roots when expressing question and answer, along with @deva[ण्वुल्] and other affixes. Example Q: @deva[कां कारिम् अकार्षीः] 'what work did you do?' A: @deva[सर्वां कारिम् अकार्षम्] 'I did all work'. Alternatives: @deva[कारिकाम्], @deva[कृत्याम्], @deva[कृतिम्], @deva[क्रियाम्].
"""

standard = """
In @deva[आख्यानपरिप्रश्न] (question-and-answer) contexts, @deva[इञ्] applies optionally alongside @deva[ण्वुल्] (from previous rule) and other applicable affixes. The @deva[च] draws @deva[ण्वुल्]; @deva[वा] 'optionally' allows subsequent-rule affixes. Q: @deva[कां त्वं कारिम् अकार्षीः] 'what work did you do?' A: @deva[सर्वां कारिम् अकार्षम्]. Alternatives: @deva[कारिकाम्], @deva[कृत्याम्], @deva[कृतिम्], @deva[क्रियाम्].
"""

advanced = """
The compound @deva[आख्यानपरिप्रश्न] ('answer-question', logically reversed) follows @ref[2.2.34] (fewer syllables first). The @deva[वा] creates optionality with all applicable affixes: @deva[इञ्] → @deva[कारि]; @deva[ण्वुल्] → @deva[कारिका]; @deva[क्यप्] → @deva[कृत्या]; @deva[क्तिन्] → @deva[कृति]; @deva[श] → @deva[क्रिया]. Without Q&A context: only @deva[कृतिः], @deva[हृतिः] etc.
"""

id = "3.3.22"
numericId = "33022"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[रू] 'to roar' when an @deva[उपसर्ग] (prefix) is in composition. Examples: @deva[संरावः] 'clamor'; @deva[उपरावः] 'secondary sound'. Without prefix: @deva[रवः] 'sound'.
"""

standard = """
When @deva[रू] 'to roar/sound' is compounded with an @deva[उपसर्ग], @deva[घञ्] is applied, blocking @deva[अप्] (@ref[3.3.57]). Examples: @deva[सम्] + @deva[रू] + @deva[घञ्] → @deva[संरावः] 'clamor'; @deva[उप] + @deva[रू] + @deva[घञ्] → @deva[उपरावः]. Without @deva[उपसर्ग], @deva[अप्] applies: @deva[रवः] 'sound'.
"""

advanced = """
The condition @deva[सोपसर्गात्] restricts @deva[घञ्] to prefixed forms of @deva[रू]. The @deva[अपवाद] relationship blocks @deva[अप्] (@ref[3.3.57]) when the prefix condition is met. This distinction creates minimal pairs: @deva[संरावः] (with @deva[घञ्]) vs. @deva[रवः] (with @deva[अप्]).
"""

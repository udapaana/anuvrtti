id = "3.3.115"
numericId = "33115"

[en]
simple = """
The affix @deva[ल्युट्] is added when naming an action in neuter gender. Examples: @deva[हसनम्] 'laughter'; @deva[शोभनम्] 'beauty'; @deva[जल्पनम्] 'speech'; @deva[शयनम्] 'sleep'; @deva[आसनम्] 'seat'.
"""

standard = """
When @deva[भाव] (action) is expressed as a name (@deva[नाम]) in neuter gender, @deva[ल्युट्] applies. Examples: @deva[हसनं छात्रस्य] 'the laughter of the student'; @deva[शोभनम्] 'beauty'; @deva[जल्पनम्] 'speech'; @deva[शयनम्] 'sleep'; @deva[आसनम्] 'seat'. This @deva[सूत्र] is separate from @ref[3.3.114] so @deva[ल्युट्] (not @deva[क्त]) continues into subsequent rules.
"""

advanced = """
The separation from @ref[3.3.114] ensures @deva[ल्युट्]'s @deva[अनुवृत्ति] continues into @ref[3.3.116]-@ref[3.3.117], while @deva[क्त] does not. Both @deva[क्त] and @deva[ल्युट्] create neuter @deva[भाववाचक] nouns, but @deva[ल्युट्]'s scope extends to instrumental/locative senses.
"""

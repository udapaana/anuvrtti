id = "3.3.90"
numericId = "33090"

[en]
simple = """
The affix @deva[नङ्] comes after @deva[यज्] 'to sacrifice', @deva[याच्] 'to ask', @deva[यत्] 'to strive', @deva[विच्छ्] 'to shine', @deva[प्रच्छ्] 'to ask', @deva[रक्ष्] 'to protect'. The @deva[ङ्] blocks @deva[गुण/वृद्धि]. Examples: @deva[यज्ञः] 'sacrifice'; @deva[याच्ञा] 'request'; @deva[यत्नः] 'effort'; @deva[प्रश्नः] 'question'.
"""

standard = """
The affix @deva[नङ्] follows @deva[यज्], @deva[याच्], @deva[यत्], @deva[विच्छ्], @deva[प्रच्छ्], @deva[रक्ष्] in @deva[भाव] etc. senses. The @deva[ङ्] is @deva[इत्], blocking @deva[गुण/वृद्धि] (@ref[1.1.5]). Examples: @deva[यज्ञः] 'sacrifice'; @deva[याच्ञा] 'solicitation'; @deva[यत्नः] 'effort'; @deva[विश्नः] 'lustre' (@ref[6.4.19]); @deva[प्रश्नः] 'question'; @deva[रक्ष्णः] 'protection'.
"""

advanced = """
The @deva[प्रच्छ्] root should undergo @deva[र] → @deva[ॠ] before @deva[ङित्] affix by @ref[6.1.16], but doesn't—an irregularity @[pāṇini] himself accepts by using @deva[प्रश्न] in @ref[3.2.117]. The @deva[विच्छ्] → @deva[विश्न] transformation involves @ref[6.4.19]. These @deva[न]-ending words are productive nominal forms from the listed roots.
"""

id = "3.3.71"
numericId = "33071"

[en]
simple = """
The affix @deva[अप्] comes after @deva[सृ] 'to move/flow' when meaning 'impregnation' (covering of cows etc.). Example: @deva[गवाम् उपसरः] 'impregnation of cows'; @deva[पशूनाम् उपसरः] 'impregnation of cattle'.
"""

standard = """
After @deva[सृ] 'to flow/move' in the sense of @deva[प्रजन] (impregnation, the first covering of a cow by a bull), @deva[अप्] applies, blocking @deva[घञ्]. Examples: @deva[गवाम् उपसरः] 'the impregnation of cows'; @deva[पशूनाम् उपसरः] 'the impregnation of cattle'.
"""

advanced = """
The semantic condition @deva[प्रजने] 'in the sense of impregnation' restricts @deva[अप्] to reproductive contexts. The term @deva[प्रजन] specifically refers to the first mating/covering. The @deva[उप] prefix with @deva[सृ] yields @deva[उपसर] 'approaching for mating'.
"""

id = "3.3.66"
numericId = "33066"

[en]
simple = """
The affix @deva[अप्] comes invariably after @deva[पण्] 'to barter' when meaning 'measure'. Examples: @deva[मूलकपणः] 'handful of radishes'; @deva[शाकपणः] 'handful of vegetables'. For trade: @deva[पणः] (with option).
"""

standard = """
When @deva[पण्] 'to barter' means @deva[परिमाण] 'measure' (specifically, a handful), @deva[अप्] applies invariably (@deva[नित्यम्])—blocking the option. Examples: @deva[मूलकपणः] 'a handful of radishes'; @deva[शाकपणः] 'a handful of vegetables'. These words secondarily denote 'a measure equal to a handful'. Without measure meaning: @deva[पणः] 'trade, stake' (with option).
"""

advanced = """
The word @deva[नित्यम्] 'invariably' stops the @deva[अनुवृत्ति] of @deva[विभाषा] from previous @deva[सूत्रs]. The @deva[परिमाण] sense specifically refers to quantity measured by hand. Outside this semantic domain, the regular optional treatment resumes for @deva[पण्].
"""

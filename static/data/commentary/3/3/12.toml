id = "3.3.12"
numericId = "33012"

[en]
simple = """
The affix @deva[अण्] comes after a root with future meaning when the @deva[उपपद] is in the accusative case and the action is purposive. Example: @deva[गोदायो व्रजति] 'he goes to give cows'.
"""

standard = """
When the @deva[उपपद] is in the accusative (@deva[द्वितीया]) and the action is @deva[क्रियार्थ] (purposive), @deva[अण्] is added with future sense. This extends @ref[3.2.1]'s general @deva[अण्] rule to purposive contexts. It overrides restrictions like @ref[3.2.3] (which blocked @deva[अण्] after @deva[आ]-final roots). Thus @deva[गोदायो व्रजति] 'he goes to give cows' (@deva[दा] + @deva[अण्] = @deva[दाय] by @ref[7.3.33]), not *@deva[गोदः].
"""

advanced = """
This @deva[सूत्र] serves as @deva[अपवाद] to @ref[3.2.1] and @ref[3.2.3]. By @deva[परत्व] (@ref[1.4.2]), it also blocks affixes like @deva[क] etc. The @deva[ण्वुल्] of @ref[3.3.10] would otherwise apply (since @deva[वाऽसरूप] doesn't work for infinitives), but this @deva[अण्] takes precedence for accusative-@deva[उपपद] constructions. Examples: @deva[काण्डलावो व्रजति] 'he goes to cut wood'; @deva[कम्बलदायो व्रजति] 'he goes to give a blanket'.
"""

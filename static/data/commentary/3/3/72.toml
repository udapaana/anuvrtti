id = "3.3.72"
numericId = "33072"

[en]
simple = """
The affix @deva[अप्] comes after @deva[ह्वे] 'to call' with @deva[नि], @deva[अभि], @deva[उप], @deva[वि], and the semivowel becomes its corresponding vowel. Examples: @deva[निहवः] 'invocation'; @deva[अभिहवः] 'invocation'; @deva[उपहवः] 'invitation'; @deva[विहवः] 'calling'. With @deva[प्र]: @deva[प्रह्वायः].
"""

standard = """
With @deva[नि], @deva[अभि], @deva[उप], or @deva[वि], @deva[ह्वे] 'to call' takes @deva[अप्] with @deva[सम्प्रसारण] (semivowel → vowel). Derivation: @deva[नि] + @deva[ह्वे] + @deva[अप्] → @deva[नि] + @deva[हु] (@ref[6.1.108]) → @deva[नि] + @deva[हो] (@ref[7.3.84]) → @deva[निहव] (@ref[6.1.78]). Similarly: @deva[अभिहवः], @deva[उपहवः], @deva[विहवः]. With other prefixes like @deva[प्र]: @deva[प्रह्वायः] (using @deva[घञ्]).
"""

advanced = """
The four specified prefixes trigger both @deva[अप्] and @deva[सम्प्रसारण] (@deva[व्] → @deva[उ]). The phonological chain: @deva[ह्वे] → @deva[हु] (by @ref[6.1.108]), then @deva[गुण] @deva[उ] → @deva[ओ] before @deva[अ] (@ref[7.3.84]), then coalescence @deva[ओ] + @deva[अ] → @deva[अव] (@ref[6.1.78]). With other prefixes, @deva[घञ्] applies without @deva[सम्प्रसारण]: @deva[प्रह्वाय].
"""

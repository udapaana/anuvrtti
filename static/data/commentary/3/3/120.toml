id = "3.3.120"
numericId = "33120"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[तॄ] 'to cross' and @deva[स्तॄ] 'to spread' with @deva[अव], when forming appellatives in instrument/location sense. This supersedes @deva[घ]. Examples: @deva[अवतारः] 'descent, incarnation'; @deva[अवस्तारः] 'screen around a tent'.
"""

standard = """
After @deva[अव] + @deva[तॄ] or @deva[अव] + @deva[स्तॄ] meaning @deva[संज्ञा] in @deva[करण]/@deva[अधिकरण] sense, @deva[घञ्] applies, superseding @deva[घ]. The @deva[ञ्] causes @deva[वृद्धि] of @deva[ॠ] (@ref[7.2.115]) and regulates accent (@ref[6.1.195], @ref[6.1.197]). Examples: @deva[अवतारः] 'descent, divine incarnation'; @deva[अवस्तारः] 'a screen/curtain around a tent'. Non-appellative use (@deva[अवतारो नद्याः] 'river's descent') is allowed since @deva[प्राय] continues from @ref[3.3.118].
"""

advanced = """
The @deva[घ्]-@deva[इत्] portion triggers palatal → guttural changes in subsequent rules. The @deva[प्राय] @deva[अनुवृत्ति] from @ref[3.3.118] allows non-appellative uses of @deva[अवतार] etc., providing flexibility beyond the strict @deva[संज्ञा] condition.
"""

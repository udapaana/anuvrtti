id = "3.3.143"
numericId = "33143"

[en]
simple = """
When @deva[कथम्] (how?) is in composition with a verb and censure is implied, both the potential (@deva[लिङ्]) and present (@deva[लट्]) may be used optionally. Other tenses appropriate to the time may also be used.
"""

standard = """
With @deva[कथम्]-upapada expressing @deva[गर्हा], both @deva[लिङ्] (potential) and @deva[लट्] (present, drawn from @ref[3.3.142]) are optionally available. The word @deva[वा] indicates that time-appropriate tenses are not excluded. Example: @deva[कथं भवान् वृषलं याजयेत्] or @deva[कथं भवान् याजयति] 'how could/can you sacrifice for a @[śūdra]?'
"""

advanced = """
The @deva[च] draws @deva[लट्] from @ref[3.3.142]; @deva[वा] permits time-appropriate alternatives. With @deva[कथम्] + @deva[गर्हा], we get @deva[त्रैकाल्य]-optionality: @deva[लिङ्], @deva[लट्], or the contextually-appropriate @[lakāra]. This distinguishes from @ref[3.3.142] where @deva[लट्] alone was mandated.
"""

id = "3.3.76"
numericId = "33076"

[en]
simple = """
The affix @deva[अप्] comes after @deva[हन्] 'to kill' when NO @deva[उपसर्ग] is present in @deva[भाव] sense, and @deva[वध] substitutes for @deva[हन्]. Example: @deva[वधश्चोराणाम्] 'killing of thieves'. With prefix or non-@deva[भाव]: @deva[घातः], @deva[प्रघातः].
"""

standard = """
Without @deva[उपसर्ग] in @deva[भाव] (action) sense, @deva[हन्] 'to kill' takes @deva[अप्] with the substitute @deva[वध]. Examples: @deva[वधश्चोराणाम्] 'the slaying of thieves'; @deva[वधो दस्यूनाम्] 'the killing of robbers'. The @deva[वध] has @deva[उदात्त] on its final. When not @deva[भाव] sense: @deva[घातः] 'a blow'. With @deva[उपसर्ग]: @deva[प्रघातः].
"""

advanced = """
The @deva[च] in the @deva[सूत्र] doesn't coordinate @deva[हन्] with @deva[वध] (no coordination possible); it refers to the affixes, indicating @deva[घञ्] also applies: hence @deva[घातः] exists. The @deva[वध]-substitution with @deva[अप्] (which is normally @deva[अनुदात्त] by @ref[3.1.4]) results in final @deva[उदात्त] accent.
"""

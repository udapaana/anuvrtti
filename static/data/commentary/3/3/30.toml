id = "3.3.30"
numericId = "33030"

[en]
simple = """
The affix @deva[घञ्] comes after @deva[कॄ] 'to scatter' with @deva[उत्] or @deva[नि], when referring to grain. Examples: @deva[उत्कारो धान्यस्य] 'winnowing of grain'; @deva[निकारो धान्यस्य]. For non-grain: @deva[उत्करः] 'heap'.
"""

standard = """
With @deva[उत्] or @deva[नि], @deva[कॄ] 'to scatter' takes @deva[घञ्] when the reference is to grain (@deva[धान्य]). Thus: @deva[उत्कारो धान्यस्य] 'winnowing of grain'; @deva[निकारो धान्यस्य] 'same'. When not referring to grain, @deva[घञ्] doesn't apply: @deva[भैक्षवोत्करः] 'heap of alms'; @deva[पुष्पनिकरः] 'heap of flowers'.
"""

advanced = """
The semantic restriction @deva[धान्ये] 'when referring to grain' limits @deva[घञ्] application. The root @deva[कॄ] meaning 'to scatter' (not 'to injure') is intended—no words with the 'injure' sense are formed by this affix. The contrast between @deva[उत्कारः] (grain-winnowing, with @deva[घञ्]) and @deva[उत्करः] (heap, without @deva[घञ्]) shows the semantic conditioning.
"""

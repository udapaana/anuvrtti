id = "3.3.47"
numericId = "33047"

[en]
simple = """
This rule teaches that the affix @deva[घञ्] is added after the root @deva[ग्रह्] (to seize) when preceded by @deva[परि] (around), provided the context is a Vedic sacrifice (@deva[अध्वर]).

For example, @deva[उत्तरपरिग्राहः] means "the northern fencing of the sacrificial altar" and @deva[अधरपरिग्राहः] means "the southern fencing." These refer to the enclosures that mark out the ritual space. The @deva[वृद्धि] vowel (@deva[आ]) signals the @deva[घञ्] affix.

Outside the sacrificial context, the regular form @deva[परिग्रहः] is used, as in @deva[परिग्रहो देवदत्तस्य] "Devadatta's possessions" — here @deva[अप्] applies instead.
"""

standard = """
With @deva[परि] + @deva[ग्रह्] in the context of @deva[अध्वर] (sacrifice), @deva[घञ्] applies, blocking @deva[अप्] from @ref[3.3.58].

Derivation: @deva[परि] + @deva[ग्रह्] + @deva[घञ्] → @deva[परिग्राह] (with @deva[वृद्धि]).

Examples: @deva[उत्तरपरिग्राहः] "northern enclosure of the sacrificial altar"; @deva[अधरपरिग्राहः] "southern enclosure of the altar."

Counter-example: @deva[परिग्रहो देवदत्तस्य] "Devadatta's enclosure/possession" — outside sacrifice, @deva[अप्] yields @deva[परिग्रह].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[घञ्] from @ref[3.3.16]; @deva[ग्रह्] from @ref[3.3.45].

The semantic restriction @deva[अध्वरे] confines @deva[घञ्] to ritual terminology. The @deva[परिग्राह] specifically denotes the fencing or boundary (@deva[वेदीपरिधि]) of the sacrificial space. Outside ritual contexts, the regular formation @deva[परिग्रह] "possession, household, enclosure" applies with @deva[अप्]. This illustrates how Vedic ritual vocabulary preserves distinct morphological forms that would otherwise merge with everyday language.
"""

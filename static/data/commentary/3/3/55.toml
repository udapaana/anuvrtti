id = "3.3.55"
numericId = "33055"

[en]
simple = """
The affix @deva[घञ्] is optionally used after @deva[भू] 'to be' with @deva[परि] when meaning 'disregard/contempt'. Example: @deva[परिभावः] or @deva[परिभवः] 'insult, humiliation'.
"""

standard = """
With @deva[परि] + @deva[भू] meaning @deva[अवज्ञान] (disregard, contempt, neglect), @deva[घञ्] is optional. Thus @deva[परिभावः] or @deva[परिभवः] 'insult, humiliation, disregard'. Without contempt meaning: @deva[परिभवः] could mean @deva[सर्वतोभवनम्] 'surrounding, being all around'.
"""

advanced = """
The condition @deva[अवज्ञाने] restricts the option to the 'contempt/disregard' sense. The word @deva[परिभव] without @deva[घञ्] can have the compositional meaning 'existence all around' (@deva[परि] + @deva[भव]), while @deva[परिभाव] with @deva[घञ्] tends toward the specialized 'humiliation' sense, though the @deva[विभाषा] allows both in the contempt meaning.
"""

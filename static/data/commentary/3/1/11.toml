id = "3.1.11"
numericId = "31011"

[en]
simple = """
The affix @deva[क्यङ्] is optionally used to form a verb meaning "behaves like X" when the subject is compared to something. If the noun ends in @deva[स्], that @deva[स्] is deleted.

**Examples:**
- @deva[श्येनायते] "behaves like a hawk" (@deva[श्येनेवाचरति काकः] — the crow behaves like a hawk)
- @deva[अप्सरायते] "behaves like an apsara"
- @deva[पयायते] or @deva[पयस्यते] "becomes milk" (the @deva[स्] is optionally deleted)
"""

standard = """
The @deva[क्यङ्] affix optionally forms denominatives meaning "behaves like" when the agent is compared to something (@deva[उपमान]).

**Final @deva[स्] deletion:** Words ending in @deva[स्] lose it: @deva[ओजस्] → @deva[औजायते], @deva[अप्सरस्] → @deva[अप्सरायते]. For @deva[पयस्], deletion is optional: @deva[पयायते] or @deva[पयस्यते].

**Derivation:** @deva[श्येन] + @deva[क्यङ्] → @deva[श्येना] + @deva[य] (by @ref[7.4.25]) → @deva[श्येनाय] + @deva[ते]

**Non-final @deva[स्]:** When @deva[स] is followed by a vowel (not final), no deletion: @deva[हंस] → @deva[हंसायते], @deva[सारस] → @deva[सारसायते].
"""

advanced = """
@deva[क्यङ्] optionally forms denominatives expressing @deva[आचार] (behavior) with @deva[उपमान] (comparison of agent).

**@deva[सलोप]:** Final @deva[स्] is deleted. Obligatory for @deva[ओजस्] → @deva[औजायते], @deva[अप्सरस्] → @deva[अप्सरायते]. Optional for @deva[पयस्] → @deva[पयायते] / @deva[पयस्यते].

**Non-application:** @deva[स] not word-final (followed by vowel) is retained: @deva[हंस] → @deva[हंसायते] (by @ref[1.1.52]: @deva[अलोऽन्त्यस्य]).

**@[vārtika] 1:** After @deva[अवगल्भ], @deva[क्लीब], @deva[होड], optionally @deva[क्विप्]: @deva[अवगल्भते] / @deva[अवगल्भायते].

**@[vārtika] 2:** Some grammarians allow @deva[क्विप्] after all @deva[प्रातिपदिक]s: @deva[अश्वति] / @deva[अश्वायते].
"""

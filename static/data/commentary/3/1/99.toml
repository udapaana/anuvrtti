id = "3.1.99"
numericId = "31099"

[en]
simple = """
This rule says that the affix @deva[यत्] is added after the roots @deva[शकॢ] 'to be able' and @deva[सह] 'to bear'. Examples: @deva[शक्] + @deva[यत्] = @deva[शक्यम्] 'possible'; @deva[सह्] + @deva[यत्] = @deva[सह्यम्] 'endurable, bearable'.
"""

standard = """
The affix @deva[यत्] is added after @deva[शकॢ] 'to be able' and @deva[सह] 'to bear'. This overrides @deva[ण्यत्] which would otherwise apply to these consonant-final roots. Examples: @deva[शक्यम्] 'possible, capable of being done'; @deva[सह्यम्] 'endurable, bearable'. The @deva[ॢ] in @deva[शकॢ] is an @deva[इत्] marker indicating certain properties in the @[dhātupāṭha].
"""

advanced = """
This @[sūtra] prescribes @deva[यत्] specifically for @deva[शकॢ] 'to be able' and @deva[सह] 'to endure', overriding @deva[ण्यत्] (@ref[3.1.124]). Despite being consonant-final roots not covered by @ref[3.1.97] (vowel-final) or @ref[3.1.98] (@deva[अत्पूर्वपवर्गान्त]), these are explicitly enumerated for @deva[यत्]. Derivations: @deva[शक्] + @deva[य] → @deva[शक्यम्] 'possible'; @deva[सह्] + @deva[य] → @deva[सह्यम्] 'bearable'. The @deva[ॢ] in @deva[शकॢ] is a @[dhātupāṭha] @deva[इत्] marker (indicating @deva[अनुदात्तेत्] per @ref[1.3.12]).
"""

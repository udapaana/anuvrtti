id = "3.1.131"
numericId = "31131"

[en]
simple = """
These words are **irregularly** formed when they are **names of fire**:

- @deva[परिचाय्यः] 'sacrificial fire arranged in a circle'
- @deva[उपचाय्यः] 'a kind of sacred fire'
- @deva[समूह्यः] 'a kind of fire'

**Regular forms (when not fire-names):**
- @deva[परिचेयम्] 'to be heaped'
- @deva[उपचेयम्] 'to be increased'
- @deva[संवाह्यम्] 'to be carried'
"""

standard = """
These words are **irregularly** formed when they are **names of fire**:

| Irregular | Meaning | Derivation | Regular form |
|-----------|---------|------------|-------------|
| @deva[परिचाय्यः] | 'fire arranged in circle' | @deva[परि] + @deva[चि] + @deva[ण्यत्] | @deva[परिचेयम्] |
| @deva[उपचाय्यः] | 'a kind of sacred fire' | @deva[उप] + @deva[चि] + @deva[ण्यत्] | @deva[उपचेयम्] |
| @deva[समूह्यः] | 'a kind of fire' | @deva[सम्] + @deva[वह्/ऊह्] + @deva[ण्यत्] | @deva[संवाह्यम्] |

**Sandhi note:** @deva[ऐ] → @deva[आय्] before @deva[य] (by analogy of @ref[6.1.79])

**Example:** @deva[समूह्यं चिन्वीत पशुकामः] 'let him kindle the @[samūhya] fire desirous of cattle'
"""

advanced = """
The words @deva[परिचाय्यः], @deva[उपचाय्यः], and @deva[समूह्यः] are irregularly formed when they are names of fire.

**Derivations:**

**@deva[परिचाय्यः]** 'sacrificial fire arranged in a circle':
- @deva[परि] + @deva[चि] + @deva[ण्यत्] = @deva[परि] + @deva[चै] + @deva[य] = @deva[परि] + @deva[चाय] + @deva[य] = @deva[परिचाय्यः]
- @deva[ऐ] → @deva[आय्] by analogy of @ref[6.1.79]

**@deva[उपचाय्यः]** 'a kind of sacred fire':
- @deva[उप] + @deva[चि] + @deva[ण्यत्] = @deva[उपचाय्यः]

**@deva[समूह्यः]** 'a kind of fire':
- @deva[सम्] + @deva[वह्/ऊह्] + @deva[ण्यत्] = @deva[सम्] + @deva[ऊह्] + @deva[य] = @deva[समूह्यः]
- Example: @deva[समूह्यं चिन्वीत पशुकामः] 'let him kindle the @[samūhya] fire desirous of a victim'

**Semantic restriction:** These irregular forms apply only when denoting types of fire.

**Regular forms (other meanings):**
- @deva[परिचेयम्] 'to be heaped'
- @deva[उपचेयम्] 'to be increased'
- @deva[संवाह्यम्] 'to be carried'
"""

id = "3.1.13"
numericId = "31013"

[en]
simple = """
The affix @deva[क्यष्] is used after @deva[लोहित] (red) and words ending in @deva[डाच्] (onomatopoeia) to express "becoming what one was not."

**Examples:**
- @deva[लोहितायते] or @deva[लोहितायति] "becomes red"
- @deva[पटपटायते] or @deva[पटपटायति] "makes a patapata sound"

Unlike @deva[क्यङ्], these verbs can be either @deva[आत्मनेपद] or @deva[परस्मैपद].
"""

standard = """
The @deva[क्यष्] affix forms denominatives expressing @deva[अभूततद्भाव] (becoming what one was not) from:
1. @deva[लोहित] and similar words
2. Words ending in @deva[डाच्] (onomatopoeic affix from @ref[5.4.57])

**Both voices allowed:** Unlike @deva[क्यङ्] (@deva[आत्मनेपद] only), @deva[क्यष्] forms are optionally @deva[उभयपद] by @ref[1.3.90]: @deva[लोहितायति] / @deva[लोहितायते].

**Derivation:** @deva[लोहित] + @deva[क्यष्] = @deva[लोहिता] + @deva[य] (by @ref[7.4.25]) = @deva[लोहिताय]

**@deva[लोहितादि] includes:** @deva[लोहित], @deva[नील], @deva[हरित], @deva[पीत], @deva[मद्र], @deva[फेन], @deva[मन्द], etc.
"""

advanced = """
@deva[क्यष्] forms denominatives in @deva[अभूततद्भाव] from @deva[लोहित] etc. and @deva[डाच्]-ending words (not taking @deva[च्वि]).

**@deva[उभयपद]:** By @ref[1.3.90], @deva[क्यष्] allows both @deva[परस्मैपद] and @deva[आत्मनेपद] - contrast with @deva[क्यङ्] (@ref[3.1.12]) which is @deva[आत्मनेपद] only.

**Examples:** @deva[वर्मायति]/@deva[वर्मायते], @deva[निद्रायति]/@deva[निद्रायते], @deva[करुणायति]/@deva[करुणायते].

**@deva[डाच्] words:** @deva[डाच्] (@ref[5.4.57]) forms onomatopoeia with @deva[कृ]/@deva[भू]/@deva[अस्]. When @deva[क्यष्] follows, that restriction is lifted: @deva[पटपटायते] stands alone.

**The @deva[क्]:** Not for blocking @deva[गुण]/@deva[वृद्धि] (since @deva[क्यष्] attaches to nominal stems, not @deva[धातु]s). It groups @deva[क्यच्], @deva[क्यङ्], @deva[क्यष्] as @deva[क्य] (@ref[1.4.15]).

**@deva[अच्वेः] continues:** From @ref[3.1.12]; @deva[च्वि] (@ref[5.4.50]) is excluded.
"""

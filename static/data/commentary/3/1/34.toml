id = "3.1.34"
numericId = "31034"

[en]
simple = """
This rule introduces the affix @deva[सिप्] for the Vedic subjunctive mood. The @deva[लेट्] tense (subjunctive) is found only in Vedic Sanskrit, not in classical usage. When @deva[लेट्] follows, the affix @deva[सिप्] is optionally added to the root.

Examples with @deva[सिप्]: @deva[जोषिषत्] (may he enjoy), @deva[तारिषत्] (may he cross), @deva[मन्दिषत्] (may he rejoice).

Examples without @deva[सिप्]: @deva[पतति], @deva[दिद्युत्], @deva[उदधिं ज्यावयाति].

From the Rig Veda: @deva[वक्षति] (may he convey) shows @deva[लेट्] with @deva[सिप्].
"""

standard = """
The affix @deva[सिप्] is optionally added to roots when @deva[लेट्] (Vedic subjunctive) follows. The word @deva[विभाषा] indicates that @deva[सिप्] is not obligatory—the subjunctive can form with or without it.

With @deva[सिप्]: @deva[जोषिषत्], @deva[तारिषत्], @deva[मन्दिषत्].

Without @deva[सिप्]: @deva[पतति], @deva[दिद्युत्], @deva[ज्यावयाति].

Vedic example: @deva[वक्षति] (Rig Veda @ref[1.1.2]) shows @deva[लेट्] formed with @deva[सिप्].

@deva[लेट्] is exclusively Vedic; it does not occur in classical Sanskrit.
"""

advanced = """
The affix @deva[सिप्] is optionally (@deva[विभाषा]) introduced before @deva[लेट्] (Vedic subjunctive). The @deva[प्] of @deva[सिप्] is @deva[इत्] by @ref[1.3.3], indicating @deva[पित्]-status.

With @deva[सिप्]: @deva[जोषिषत्], @deva[तारिषत्], @deva[मन्दिषत्].

Without @deva[सिप्]: @deva[पतति], @deva[दिद्युत्], @deva[उदधिं ज्यावयाति].

Vedic attestation: @deva[वक्षति] (RV @ref[1.1.2]).

@note[type=observation]: @deva[लेट्] is restricted to the @deva[वेद]; classical Sanskrit employs @deva[विधिलिङ्] or @deva[लिङ्] for similar modal functions. The optional @deva[सिप्] accounts for the variation in Vedic subjunctive formations.
"""

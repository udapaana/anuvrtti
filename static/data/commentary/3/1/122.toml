id = "3.1.122"
numericId = "31122"

[en]
simple = """
The word @deva[अमावस्या] 'new moon day' is **optionally** irregular (without @deva[वृद्धि]).

**Both forms valid:**
- @deva[अमावस्या] (irregular, no @deva[वृद्धि])
- @deva[अमावास्या] (regular, with @deva[वृद्धि])

**Meaning:** The day when sun and moon 'dwell together' (@deva[अमा] 'together' + @deva[वस्] 'to dwell') in the same constellation.
"""

standard = """
The word @deva[अमावस्या] is **optionally** irregular.

**Derivation:**
@deva[अमा] 'together' + @deva[वस्] 'to dwell' + @deva[ण्यत्] (in sense of time-location)

**Both forms valid:**
| Form | @deva[वृद्धि] | Status |
|------|---------|--------|
| @deva[अमावस्या] | No | Irregular (by this @[sūtra]) |
| @deva[अमावास्या] | Yes (@deva[अ] → @deva[आ]) | Regular |

**Meaning:** The new moon day—when the sun and moon dwell together in the same constellation.

**Note:** Both forms are considered the same word by the @deva[परिभाषा]: @deva[एकदेशविकृतस्यानन्यत्वम्] 'a partial change does not make a word different'.
"""

advanced = """
Optionally the word @deva[अमावस्या] is irregular (without @deva[वृद्धि]).

**Derivation:**
@deva[अमा] 'together' + @deva[वस्] 'to dwell' + @deva[ण्यत्] (denoting time-location)

**Option (@deva[विभाषा]):**
- @deva[अमावस्या] — @deva[वृद्धि] blocked (irregular)
- @deva[अमावास्या] — @deva[वृद्धि] applies regularly (@deva[अ] → @deva[आ])

**Semantic:** The new moon day—when the sun and moon dwell together (@deva[अमा]) in the same constellation.

**Technical note:** The final @deva[त्] in the @[sūtra] reading @deva[अमावस्यत्] is indicatory (@deva[इत्]), showing accent placement.

**@deva[परिभाषा]:** Both forms are treated as identical by @deva[एकदेशविकृतस्यानन्यत्वम्] 'that which has undergone partial change is not thereby different'. Therefore @ref[4.3.30] (@deva[अमावास्याया वा]) applies to @deva[अमावस्या] as well.
"""

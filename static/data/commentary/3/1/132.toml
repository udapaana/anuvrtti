id = "3.1.132"
numericId = "31132"

[en]
simple = """
These words are **irregularly** formed:

- @deva[चित्यः] 'collected fire, funeral pyre'
- @deva[अग्निचित्या] 'arranging the fire'

**Regular form:** @deva[चेयम्] 'to be gathered'

**Usage:** @deva[चित्योऽग्निः] 'the funeral pile fire'
"""

standard = """
The words @deva[चित्यः] and @deva[अग्निचित्या] are **irregularly** formed.

| Irregular | Meaning | Root | Regular form |
|-----------|---------|------|-------------|
| @deva[चित्यः] | 'collected fire, funeral pyre' | @deva[चि] 'to collect' | @deva[चेयम्] |
| @deva[अग्निचित्या] | 'arranging the fire' | @deva[अग्नि] + @deva[चि] | — |

**Usage:** @deva[चित्योऽग्निः] 'the funeral pile fire'

**Technical note:** The affix @deva[य] is added with augment @deva[तुक्] (@deva[त्]) to denote condition. Both words have @deva[उदात्त] accent on the last vowel.
"""

advanced = """
The words @deva[चित्यः] and @deva[अग्निचित्या] are irregularly formed.

**@deva[चित्यः]** 'collected fire, funeral pyre':
- From @deva[चि] 'to collect'
- Meaning: fire, i.e., that which is collected
- Usage: @deva[चित्योऽग्निः] 'the funeral pile fire'

**@deva[अग्निचित्या]** 'arranging the fire':
- From @deva[अग्नि] + @deva[चि]
- The affix @deva[य] is added with augment @deva[तुक्] (@deva[त्]) to denote condition

**Accent:** Both words have @deva[उदात्त] accent on the last vowel.

**Regular form:** @deva[चेयम्] 'to be gathered'
"""

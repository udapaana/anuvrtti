id = "3.1.20"
numericId = "31020"

[en]
simple = """
The affix @deva[णिङ्] is used after @deva[पुच्छ] (tail), @deva[भाण्ड] (pot), and @deva[चीवर] (rag) in the sense of "making," with specific meanings for each.

**Examples:**
- @deva[उत्पुच्छयते] "lifts up the tail"
- @deva[सम्भाण्डायते] "collects pots in a heap"
- @deva[सञ्चीवरायते भिक्षुः] "the beggar collects/wears rags"

These verbs are @deva[आत्मनेपद] (middle voice) only.
"""

standard = """
The @deva[णिङ्] affix attaches to @deva[पुच्छ], @deva[भाण्ड], @deva[चीवर] in @deva[करण] sense, with specific meanings.

**Specific senses:**
- @deva[पुच्छ]: lifting/throwing about - @deva[उत्पुच्छयते] "lifts tail"
- @deva[भाण्ड]: accumulation - @deva[सम्भाण्डायते] "heaps pots"
- @deva[चीवर]: acquiring/wearing - @deva[सञ्चीवरायते] "collects rags"

**The affix @deva[णिङ्]:** Only @deva[इ] is the real affix; @deva[ण्] triggers @ref[6.4.51]; @deva[ङ्] indicates @deva[आत्मनेपद] by @ref[1.3.12].
"""

advanced = """
@deva[णिङ्] after @deva[पुच्छ], @deva[भाण्ड], @deva[चीवर] in @deva[करण] sense.

**@[vārtika-specified] senses:**
- @deva[पुच्छ]: @deva[उत्क्षेपण] (lifting/throwing) - @deva[उत्पुच्छयते]
- @deva[भाण्ड]: @deva[राशीकरण] (heaping) - @deva[सम्भाण्डायते]
- @deva[चीवर]: @deva[उपार्जन]/wearing - @deva[सञ्चीवरायते भिक्षुः]

**Analysis of @deva[णिङ्]:**
- @deva[इ] = the actual affix
- @deva[ण्] = triggers @ref[6.4.51] (@deva[णेरनिटि] - applies to @deva[णि]-containing affixes)
- @deva[ङ्] = @deva[आत्मनेपद] by @ref[1.3.12]

This affix applies uniformly to @deva[णिच्], @deva[णिङ्], etc.
"""

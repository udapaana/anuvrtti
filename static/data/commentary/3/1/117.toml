id = "3.1.117"
numericId = "31117"

[en]
simple = """
This rule says that the irregularly formed words @deva[विपूय], @deva[विनीय], and @deva[जित्य] mean '@[muñja] grass', 'sediment/sin', and 'plough' respectively. @deva[विपूयः] (from @deva[वि] + @deva[पू]) means 'what needs purifying for rope-making'. @deva[विनीयम्] (from @deva[वि] + @deva[नी]) means 'sediment'. @deva[जित्या] (from @deva[जि]) means 'plough' (conquered by strength). Regular forms would be @deva[विपाव्यम्], @deva[विनेयम्], @deva[जेयम्].
"""

standard = """
The words @deva[विपूय] '@[muñja] grass', @deva[विनीय] 'sediment/sin', and @deva[जित्या] 'plough' are @deva[निपातन] with @deva[क्यप्]. Derivations: @deva[वि] + @deva[पू] + @deva[क्यप्] = @deva[विपूयः] (grass that must be purified for rope-making); @deva[वि] + @deva[नी] + @deva[क्यप्] = @deva[विनीयम्] (sediment, also 'sin'); @deva[जि] + @deva[क्यप्] = @deva[जित्या] (plough—conquered by strength/effort). Regular @deva[ण्यत्]/@deva[यत्] forms would be: @deva[विपाव्यम्], @deva[विनेयम्], @deva[जेयम्].
"""

advanced = """
This @[sūtra] establishes @deva[विपूय], @deva[विनीय], @deva[जित्या] as @deva[निपातन] with @deva[क्यप्] and specific lexical meanings. Derivations: @deva[वि] + @deva[पू] + @deva[क्यप्] → @deva[विपूय] '@[muñja] grass' (etymologically: 'requiring purification' for rope-making); @deva[वि] + @deva[नी] + @deva[क्यप्] → @deva[विनीय] 'sediment, sin' (what is to be led away/removed); @deva[जि] + @deva[क्यप्] → @deva[जित्य] 'plough' (tool requiring conquest/exertion). The irregular @deva[त्]-augment in @deva[जित्या] is part of the @deva[निपातन]. Standard derivations: @deva[विपाव्यम्] (@deva[ण्यत्]), @deva[विनेयम्] (@deva[यत्]), @deva[जेयम्] (@deva[यत्]).
"""

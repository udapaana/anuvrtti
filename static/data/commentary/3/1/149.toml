id = "3.1.149"
numericId = "31149"

[en]
simple = """
The affix @deva[वुन्] (= @deva[अक]) is used after @deva[प्रु] 'to go', @deva[सृ] 'to move', @deva[स्रु] 'to flow', and @deva[लू] 'to cut' when the action is done repeatedly or well.

**Examples:**
- @deva[प्लवकः] 'one who swims well/repeatedly'
- @deva[सरकः] 'one who moves well/repeatedly'
- @deva[स्रवकः] 'one who flows repeatedly'
- @deva[लवकः] 'one who cuts repeatedly'
"""

standard = """
The affix @deva[वुन्] (= @deva[अक]) is used after @deva[प्रु], @deva[सृ], @deva[स्रु], and @deva[लू] when @deva[समभिहार] (repetition/excellence) is meant.

| Root | Form | Meaning |
|------|------|---------|
| @deva[प्रु] 'to go' | @deva[प्लवकः] | one who swims/jumps repeatedly |
| @deva[सृ] 'to move' | @deva[सरकः] | one who moves repeatedly |
| @deva[स्रु] 'to flow' | @deva[स्रवकः] | one who flows repeatedly |
| @deva[लू] 'to cut' | @deva[लवकः] | one who cuts repeatedly |

**@deva[समभिहार]:** Indicates the action is performed well or repeatedly. Not used when the action is poorly performed.
"""

advanced = """
The affix @deva[वुन्] (= @deva[अक]) is used after @deva[प्रु] 'to go', @deva[सृ] 'to move', @deva[स्रु] 'to flow', and @deva[लू] 'to cut' when @deva[समभिहार] (repetition/excellence) is meant.

**Derivations:**
- @deva[प्रु] + @deva[वुन्] = @deva[प्रो] + @deva[अक] @ref[7.1.1] = @deva[प्लवकः]
- @deva[सृ] + @deva[वुन्] = @deva[सरकः]
- @deva[स्रु] + @deva[वुन्] = @deva[स्रवकः]
- @deva[लू] + @deva[वुन्] = @deva[लवकः]

**On @deva[समभिहार]:** This term indicates the action must be well performed. Consequently:
- The affix is used when action is performed well, even at the first attempt
- Not used when the action is repeatedly performed poorly

The emphasis is on quality of performance, not mere repetition.
"""

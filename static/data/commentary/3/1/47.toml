id = "3.1.47"
numericId = "31047"

[en]
simple = """
This rule is an exception: @deva[क्स] does NOT replace @deva[च्लि] after the root @deva[दृश्] (to see).

Even though @deva[दृश्] meets the conditions of @ref[3.1.45] (@deva[शल्]-final, @deva[इक्]-penultimate), it is explicitly excluded from the @deva[क्स]-aorist.

Instead, @deva[दृश्] forms its aorist using either:
- @deva[अङ्] (root aorist): @deva[अदर्शत्] (he saw)
- @deva[सिच्] (sigmatic aorist): @deva[अद्राक्षीत्] (he saw)

Both forms mean the same thing.
"""

standard = """
This is an exception (@deva[अपवाद]) to @ref[3.1.45]: @deva[क्स] does not substitute for @deva[च्लि] after @deva[दृश्] (to see).

Though @deva[दृश्] satisfies @ref[3.1.45]'s conditions (@deva[शल्]-final with @deva[श], @deva[इक्]-penultimate with @deva[ऋ]), it is excluded.

@deva[दृश्] forms its aorist by @ref[3.1.57] with either:
- @deva[अङ्]: @deva[अदर्शत्]
- @deva[सिच्]: @deva[अद्राक्षीत्]

Both are grammatically correct aorist forms of @deva[दृश्].
"""

advanced = """
This @deva[अपवादसूत्र] excludes @deva[दृश्] from @ref[3.1.45]'s @deva[क्स] substitution despite meeting the phonological conditions (@deva[शल्]-final, @deva[ऋ]-penultimate = @deva[इक्], @deva[अनिट्]).

Instead, @deva[दृश्] takes @deva[अङ्] and @deva[सिच्] by @ref[3.1.57]:
- @deva[अङ्]-aorist: @deva[अदर्शत्] (with @deva[सम्प्रसारण] @deva[ऋ] → @deva[अर्])
- @deva[सिच्]-aorist: @deva[अद्राक्षीत्] (with @deva[वृद्धि])

@note[type=observation]: The exclusion of @deva[दृश्] from @deva[क्स] allows for the distinctive aorist forms @deva[अदर्शत्] and @deva[अद्राक्षीत्], which are well-attested in classical literature.
"""

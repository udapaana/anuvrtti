id = "3.1.24"
numericId = "31024"

[en]
simple = """
The affix @deva[यङ्] always expresses contempt (@deva[गर्हा]) - poor or censurable performance - after these roots: @deva[लुप्] (cut), @deva[सद्] (sit), @deva[चर्] (walk), @deva[जप्] (mutter), @deva[जभ्] (yawn), @deva[दह्] (burn), @deva[दश्] (bite), @deva[गृ] (swallow).

**Examples:**
- @deva[लोलुप्यते] "cuts badly"
- @deva[जञ्जप्यते] "recites badly"
- @deva[सासद्यते] "sits improperly"
"""

standard = """
After @deva[लुप्], @deva[सद्], @deva[चर्], @deva[जप्], @deva[जभ्], @deva[दह्], @deva[दश्], @deva[गृ], the @deva[यङ्] affix is @deva[नित्य] (obligatory) in @deva[भावगर्हा] sense (contempt for the action).

**Examples:**
- @deva[लोलुप्यते] "cuts badly"
- @deva[सासद्यते] "sits badly"
- @deva[चञ्चूर्यते] "walks badly"
- @deva[जञ्जप्यते] "recites badly"
- @deva[जञ्जभ्यते], @deva[दन्दह्यते], @deva[दन्दश्यते], @deva[निजेगिल्यते]

**Restriction:** @deva[यङ्] does not express repetition/intensity after these roots. For that, use a phrase: @deva[भृशं लुम्पति].

**Condition:** @deva[भावगर्हा] - contempt regarding the action. @deva[साधु जपति] "recites well" - no @deva[यङ्] (no contempt).
"""

advanced = """
After @deva[लुप्], @deva[सद्], @deva[चर्], @deva[जप्], @deva[जभ्], @deva[दह्], @deva[दश्], @deva[गृ], @deva[यङ्] is @deva[नित्य] in @deva[भावगर्हा] (contempt for the action) sense.

**Examples:** @deva[लोलुप्यते], @deva[सासद्यते], @deva[चञ्चूर्यते], @deva[जञ्जप्यते], @deva[जञ्जभ्यते], @deva[दन्दह्यते], @deva[दन्दश्यते], @deva[निजेगिल्यते]

**@deva[भावगर्हा] vs. @deva[कर्तृगर्हा]:** Contempt must be for the action itself. In @deva[मन्त्रं जपति वृषलः] "a Sudra recites mantras" - the contempt is for the agent, not the action; no @deva[यङ्].

**@deva[नित्य] continues:** From @ref[3.1.23]. These roots take @deva[यङ्] only in contempt sense, not repetition/intensity.
"""

id = "3.1.123"
numericId = "31123"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), these words are **irregularly** formed:

- @deva[निष्टर्क्यम्] (from @deva[निस्] + @deva[कृत्] 'to cut')
- @deva[देवहूयः] (@deva[देव] + @deva[हू] 'to invoke')
- @deva[प्रणीयः], @deva[उन्नीयः] (from @deva[नी] 'to lead')
- @deva[खन्यः], @deva[खान्यः] (from @deva[खन्] 'to dig')
- @deva[देवयज्या] (fem., @deva[देव] + @deva[यज्] 'to sacrifice')
- @deva[भाव्यः] (from @deva[भू] 'to be')
- @deva[स्ताव्यः] (from @deva[स्तु] 'to praise')

These are **Vedic only** and do not follow regular derivational rules.
"""

standard = """
In the Vedas (@deva[छन्दस्]), the following words are **irregularly** formed:

| Word | Derivation | Irregularity |
|------|------------|-------------|
| @deva[निष्टर्क्य] | @deva[निस्] + @deva[कृत्] + @deva[ण्यत्] | Root transposed to @deva[तृक्] |
| @deva[देवहूय] | @deva[देव] + @deva[हू] + @deva[क्यप्] | Vowel lengthened, no @deva[तुक्] |
| @deva[प्रणीय] | @deva[प्र] + @deva[नी] + @deva[क्यप्] | Irregular @deva[क्यप्] |
| @deva[उन्नीय] | @deva[उत्] + @deva[नी] + @deva[क्यप्] | Irregular @deva[क्यप्] |
| @deva[उच्छिष्य] | @deva[उत्] + @deva[शिष्] + @deva[क्यप्] | Irregular |
| @deva[मर्य] | @deva[मृ] + @deva[यत्] | Irregular |
| @deva[स्तर्या] | @deva[स्तृ] + @deva[यत्] | Always feminine |
| @deva[खन्य] | @deva[खन्] + @deva[यत्] | Irregular @deva[यत्] |
| @deva[खान्य] | @deva[खन्] + @deva[ण्यत्] | With @deva[वृद्धि] |
| @deva[देवयज्या] | @deva[देव] + @deva[यज्] + @deva[यत्] | Always feminine |
| @deva[भाव्य] | @deva[भू] + @deva[ण्यत्] | Vedic irregular |
| @deva[स्ताव्य] | @deva[स्तु] + @deva[ण्यत्] | Vedic irregular |

These are exclusively **Vedic** formations.
"""

advanced = """
In the @deva[छन्दस्] (Vedas) the following words are irregularly formed (@deva[निपातन]):

**List of Vedic irregulars:**
- @deva[निष्टर्क्य]: @deva[निस्] + @deva[कृत्] 'to cut' + @deva[ण्यत्] (root transposed to @deva[तृक्]); e.g., @deva[निष्टर्क्ये चिन्वीत् पशुकामः]
- @deva[देवहूय]: @deva[देव] + @deva[हू] 'to invoke' + @deva[क्यप्] (vowel lengthened, @deva[तुक्] @ref[6.1.71] blocked)
- @deva[प्रणीय]: @deva[प्र] + @deva[नी] + @deva[क्यप्]
- @deva[उन्नीय]: @deva[उत्] + @deva[नी] + @deva[क्यप्]
- @deva[उच्छिष्य]: @deva[उत्] + @deva[शिष्] 'to leave' + @deva[क्यप्]
- @deva[मर्य]: @deva[मृ] 'to die' + @deva[यत्]
- @deva[स्तर्या]: @deva[स्तृ] 'to cover' + @deva[यत्] (always feminine)
- @deva[ध्वर्य]: @deva[ध्वृ] 'to bend' + @deva[यत्]
- @deva[खन्य]: @deva[खन्] 'to dig' + @deva[यत्]
- @deva[खान्य]: @deva[खन्] + @deva[ण्यत्] (with @deva[वृद्धि])
- @deva[देवयज्या]: @deva[देव] + @deva[यज्] 'to sacrifice' + @deva[यत्] (always feminine)
- @deva[आपृच्छ्य]: @deva[आ] + @deva[पृच्छ्] 'to ask' + @deva[क्यप्]
- @deva[प्रतिषीव्य]: @deva[प्रति] + @deva[सीव्] 'to sew' + @deva[क्यप्]
- @deva[ब्रह्मवाद्य]: @deva[ब्रह्मन्] + @deva[वद्] 'to speak' + @deva[ण्यत्]
- @deva[भाव्य]: @deva[भू] 'to be' + @deva[ण्यत्]
- @deva[स्ताव्य]: @deva[स्तु] 'to praise' + @deva[ण्यत्]
- @deva[उपचाय्यपृड्]: @deva[उप] + @deva[चि] + @deva[ण्यत्] + @deva[पृड्] (only when meaning 'gold'; otherwise @deva[उपचेयपृडम्])

These formations are extremely irregular and found only in Vedic literature.
"""

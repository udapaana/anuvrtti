id = "3.1.87"
numericId = "31087"

[en]
simple = """
This rule says that when the agent undergoes the action in the same way as the object would, the agent is treated grammatically like an object. This applies to reflexive or middle-voice constructions. For example: @deva[भिद्यते काष्ठं स्वयमेव] 'the wood splits by itself'—here 'wood' is the agent but receives passive-like treatment because it undergoes the splitting action like an object would.
"""

standard = """
When the action affecting the agent resembles the action affecting the object (@deva[कर्मणा तुल्यक्रिया]), the @deva[ल्]-affix denoting the agent is treated as if it denotes the object. This triggers: @deva[यक्] (@ref[3.1.67]), @deva[आत्मनेपद] (@ref[1.3.13]), @deva[चिण्] substitution (@ref[3.1.66]), and @ref[6.4.62] operations. Example: @deva[भिद्यते काष्ठं स्वयमेव] 'the wood splits itself'. The word @deva[वत्] 'like' indicates agent rules also apply: @deva[भिद्यते कुसूलेन] uses instrumental. The similarity must be with the object, not instrument or location.
"""

advanced = """
This @[sūtra] establishes @deva[कर्मवद्भाव] (object-like treatment) for the agent when @deva[कर्मणा तुल्यक्रिया]—the action affects the agent as it would affect the object. The @deva[ल्]-affix (@deva[कर्तरि]) triggers operations normally reserved for @deva[कर्मणि]: @deva[यक्] by @ref[3.1.67], @deva[आत्मनेपद] by @ref[1.3.13], @deva[चिण्] for @deva[च्लि] by @ref[3.1.66], and @deva[लोप] by @ref[6.4.62]. The @deva[वत्] indicates partial identification: agent-specific rules (@deva[तृतीया] for co-agents) remain applicable. The condition @deva[कर्मणा] restricts this to object-similarity, excluding @deva[करण] (instrument) or @deva[अधिकरण] (location) similarities.
"""

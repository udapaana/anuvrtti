id = "3.1.45"
numericId = "31045"

[en]
simple = """
This rule says that @deva[क्स] replaces @deva[च्लि] after roots that:
1. End in a @deva[शल्] consonant (@deva[श], @deva[ष], or @deva[ह])
2. Have an @deva[इक्] vowel (@deva[इ], @deva[उ], @deva[ऋ], or @deva[ऌ]) as their penultimate
3. Do not take the augment @deva[इट्] (by @ref[7.2.10])

This creates the @deva[क्स]-aorist (also called @deva[इष्]-aorist or thematic aorist).

Examples: @deva[दुह्] (to milk) → @deva[अधुक्षत्] (he milked); @deva[लिड्] (to lick) → @deva[अलिक्षत्] (he licked); @deva[मृश्] → @deva[अमृक्षत्]; @deva[कृष्] → @deva[अकृक्षत्].

Counterexamples:
- Roots not ending in @deva[शल्]: @deva[भिद्] → @deva[अभैत्सीत्] (uses @deva[सिच्], not @deva[क्स])
- Penultimate not @deva[इक्]: @deva[दाह्] → @deva[अधाक्षीत्] (uses @deva[सिच्])
- Takes @deva[इट्]: @deva[कुष्] → @deva[अकोषीत्], @deva[मुष्] → @deva[अमोषीत्] (uses @deva[सिच्])
"""

standard = """
@deva[क्स] substitutes for @deva[च्लि] after roots ending in @deva[शल्] (@deva[श], @deva[ष], @deva[ह]) with @deva[इक्] (@deva[इ], @deva[उ], @deva[ऋ], @deva[ऌ]) penultimate, provided @deva[इट्] is not taken per @ref[7.2.10].

@deva[परस्मैपद] endings: @deva[सम्], @deva[साव], @deva[साम्]; @deva[सः], @deva[सत], @deva[सत]; @deva[सत्], @deva[सताम्], @deva[सत्].

@deva[आत्मनेपद] endings: @deva[सि], @deva[सीवहि], @deva[सीमहि]; @deva[सथाः]/@deva[थाः], @deva[साथाम्], @deva[सध्वम्]/@deva[ध्वम्]; @deva[सत]/@deva[त], @deva[साताम्], @deva[सन्त].

Examples: @deva[दुह्] → @deva[अधुक्षत्]; @deva[लिड्] → @deva[अलिक्षत्]; @deva[मृश्] → @deva[अमृक्षत्]; @deva[कृष्] → @deva[अकृक्षत्].

Condition violations:
- Not @deva[शल्]-final: @deva[भिद्] → @deva[अभैत्सीत्] (@deva[सिच्])
- Not @deva[इक्] penultimate: @deva[दाह्] → @deva[अधाक्षीत्] (@deva[सिच्])
- Takes @deva[इट्]: @deva[कुष्] → @deva[अकोषीत्], @deva[मुष्] → @deva[अमोषीत्] (@deva[सिच्]; cf. @ref[7.2.4], @ref[8.2.28])
"""

advanced = """
@deva[क्स] is the @deva[आदेश] for @deva[च्लि] after roots that are @deva[शल्]-final (@deva[श], @deva[ष], @deva[ह]), @deva[इक्]-penultimate (@deva[इ], @deva[उ], @deva[ऋ], @deva[ऌ]), and @deva[अनिट्] (not taking @deva[इट्] per @ref[7.2.10] @deva[एकाच उपदेशेऽनुदात्तात्]).

@deva[परस्मैपद] @deva[लुङ्] endings with @deva[क्स]: @deva[सम्], @deva[साव], @deva[साम्]; @deva[सः], @deva[सत], @deva[सत]; @deva[सत्], @deva[सताम्], @deva[सत्].

@deva[आत्मनेपद]: @deva[सि], @deva[सीवहि], @deva[सीमहि]; @deva[सथाः]/@deva[थाः], @deva[साथाम्], @deva[सध्वम्]/@deva[ध्वम्]; @deva[सत]/@deva[त], @deva[साताम्], @deva[सन्त].

Examples: @deva[अधुक्षत्] (@deva[दुह्]), @deva[अलिक्षत्] (@deva[लिड्]), @deva[अमृक्षत्] (@deva[मृश्]), @deva[अकृक्षत्] (@deva[कृष्]).

Condition analysis:
- @deva[शल्]-final: @deva[भिद्] (not @deva[शल्]) → @deva[अभैत्सीत्] (@deva[सिच्])
- @deva[इक्] penultimate: @deva[दाह्] (@deva[आ] penultimate) → @deva[अधाक्षीत्] (@deva[सिच्])
- @deva[अनिट्]: @deva[कुष्], @deva[मुष्] (@deva[सेट्] by @ref[7.2.4], @ref[8.2.28]) → @deva[अकोषीत्], @deva[अमोषीत्] (@deva[सिच्])

@note[type=observation]: The @deva[क्स]-aorist (also called @deva[इष्]-aorist) is characterized by the @deva[क्ष] cluster before the endings.
"""

id = "3.1.16"
numericId = "31016"

[en]
simple = """
The affix @deva[क्यङ्] is used after @deva[वाष्प] (vapor) and @deva[ऊष्म] (heat) to express "emitting" or "ejecting."

**Examples:**
- @deva[वाष्पायते] "it emits vapor"
- @deva[ऊष्मायते] "it sends out heat"
- @deva[फेनायते] "it ejects froth"
"""

standard = """
The @deva[क्यङ्] affix attaches to @deva[वाष्प] and @deva[ऊष्म] when these are objects of ejection or emission.

**Examples:**
- @deva[वाष्पायते] "emits vapor"
- @deva[ऊष्मायते] "sends out heat"
- @deva[फेनायते] "ejects froth"

The sense is @deva[उद्वमन] (ejecting/emitting).
"""

advanced = """
@deva[क्यङ्] after @deva[वाष्प] and @deva[ऊष्म] in @deva[उद्वमन] (ejection) sense.

**Examples:**
- @deva[वाष्पायते] "emits vapor"
- @deva[ऊष्मायते] "sends out heat"
- @deva[फेनायते] "ejects froth"

These denominatives express emission of the named substance.
"""

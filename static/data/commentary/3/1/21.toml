id = "3.1.21"
numericId = "31021"

[en]
simple = """
The affix @deva[णिच्] is used after @deva[मुण्ड] (shaving), @deva[मिश्र] (mixture), @deva[श्लक्ष्ण] (soft), @deva[लवण] (salt), @deva[व्रत] (vow), @deva[वस्त्र] (dress), @deva[हल] (plough), @deva[कल] (strife), @deva[कृत] (done), and @deva[तूस्त] (matted hair) in the sense of "making."

**Examples:**
- @deva[मुण्डयति] "he shaves"
- @deva[मिश्रयति] "he mixes"
- @deva[लवणयति] "he salts"
- @deva[हलयति] "he ploughs"
"""

standard = """
The @deva[णिच्] affix attaches to @deva[मुण्ड], @deva[मिश्र], @deva[श्लक्ष्ण], @deva[लवण], @deva[व्रत], @deva[वस्त्र], @deva[हल], @deva[कल], @deva[कृत], @deva[तूस्त] in @deva[करण] sense.

**Examples:**
- @deva[मुण्डयति] "shaves"
- @deva[मिश्रयति] "mixes"
- @deva[श्लक्ष्णयति] "softens"
- @deva[लवणयति] "salts"
- @deva[पयोव्रतयति] "fasts on milk"
- @deva[संवस्त्रयति] "dresses"
- @deva[हलयति] "ploughs"
- @deva[कलयति] "makes war"
- @deva[कृतयति] "appreciates kindness"
- @deva[वितूस्तयति] "combs hair"

**Special senses:** @deva[व्रत] = eating/abstaining; @deva[वस्त्र] = covering; @deva[हल]/@deva[कल] = taking.
"""

advanced = """
@deva[णिच्] after @deva[मुण्ड], @deva[मिश्र], @deva[श्लक्ष्ण], @deva[लवण], @deva[व्रत], @deva[वस्त्र], @deva[हल], @deva[कल], @deva[कृत], @deva[तूस्त] in @deva[करण] sense.

**Specific senses:**
- @deva[व्रत]: eating/abstaining - @deva[पयोव्रतयति] "drinks only milk"
- @deva[वस्त्र]: covering - @deva[संवस्त्रयति]
- @deva[हल]/@deva[कल]: taking - @deva[हलिं गृह्णाति] = @deva[हलयति]
- @deva[तूस्त]: hair, matted hair, or sin

**Aorist anomaly:** The listing as @deva[हल]/@deva[कल] (not @deva[हलि]/@deva[कलि]) shows that in @deva[चङ्] aorist (@ref[3.1.48]), reduplication differs from @deva[सन्वद्भाव]. Aorists: @deva[अजहलत्], @deva[अचकलत्] (not *@deva[अजीहलत्], *@deva[अचीकलत्] as @ref[7.4.79], @ref[7.4.94] would give with @deva[सन्वद्भाव]).
"""

id = "3.1.93"
numericId = "31093"

[en]
simple = """
This rule defines what a @deva[कृत्] affix is. Any affix taught in this portion of the grammar (dealing with verbal roots) except the @deva[तिङ्] (personal verb endings) is called @deva[कृत्]. @deva[कृत्] affixes like @deva[तव्यम्] form nouns from roots: @deva[कृ] + @deva[तव्यम्] = @deva[कर्तव्यम्] 'to be done'. Words formed with @deva[कृत्] become @deva[प्रातिपदिक]s (nominal stems). @deva[तिङ्] is excluded because it forms verbs: @deva[चीयात्] 'may he collect'.
"""

standard = """
Within the @deva[धातु]-domain of the third chapter, any affix except @deva[तिङ्] (the ten personal endings) is called @deva[कृत्] (primary affix). @deva[कृत्] affixes form @deva[प्रातिपदिक]s (nominal bases) from roots per @ref[1.2.46]. Examples: @deva[कृ] + @deva[तव्यम्] = @deva[कर्तव्यम्] 'to be done'; @deva[भू] + @deva[क्त] = @deva[भूत] 'become'. The exclusion of @deva[तिङ्] ensures that verb forms like @deva[चीयात्] 'may he collect' and @deva[स्तुयात्] 'may he praise' remain finite verbs, not nominal derivatives.
"""

advanced = """
This @[sūtra] defines @deva[कृत्] (@deva[कृत्प्रत्यय]): any affix taught in the @deva[धातु]-domain (governed by @ref[3.1.91]) other than @deva[तिङ्] is @deva[कृत्]. The @deva[कृत्] affixes derive @deva[प्रातिपदिक]s from @deva[धातु]s (@ref[1.2.46] @deva[कृत्तद्धितसमासाश्च]). The exclusion of @deva[तिङ्] (@deva[तिप्तस्झि...] of @ref[3.4.78]) maintains the distinction between nominal derivation (@deva[कृत्]) and verbal conjugation (@deva[तिङन्त]). Forms like @deva[चीयात्] (@deva[चि] + @deva[यात्]) remain @deva[तिङन्त] (finite verbs), not @deva[कृदन्त] (nominal derivatives).
"""

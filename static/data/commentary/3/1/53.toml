id = "3.1.53"
numericId = "31053"

[en]
simple = """
This rule says that @deva[अङ्] replaces @deva[च्लि] after the roots @deva[लिप्] (to paint, to write), @deva[सिच्] (to sprinkle), and @deva[ह्वे] (to call) when the agent is signified.

Examples:
- @deva[लिप्]: @deva[अलिपत्] (he painted/wrote)
- @deva[सिच्]: @deva[असिचत्] (he sprinkled)
- @deva[ह्वे]: @deva[आहूत्] (he called/challenged)

This creates the root aorist for these verbs.
"""

standard = """
@deva[अङ्] substitutes for @deva[च्लि] after @deva[लिप्] (to paint/write), @deva[सिच्] (to sprinkle), and @deva[ह्वे] (to call) in @deva[कर्तरि लुङ्].

Examples:
- @deva[लिप्]: @deva[अलिपत्]
- @deva[सिच्]: @deva[असिचत्]
- @deva[ह्वे]: @deva[आहूत्]

The @deva[ङ्] of @deva[अङ्] blocks @deva[गुण]/@deva[वृद्धि] by @ref[1.1.5], preserving the root vowel.
"""

advanced = """
@deva[अङ्] is the @deva[आदेश] for @deva[च्लि] after @deva[लिप्], @deva[सिच्], and @deva[ह्वे] in @deva[कर्तरि लुङ्].

Examples: @deva[अलिपत्], @deva[असिचत्], @deva[आहूत्].

The @deva[ङ्] is @deva[इत्] per @ref[1.3.3], triggering @ref[1.1.5] @deva[क्ङिति च] to block vowel strengthening.

@note[type=observation]: For @deva[ह्वे], the aorist @deva[आहूत्] shows @deva[ऊ] (from @deva[ह्वे] → @deva[हू] by @deva[सम्प्रसारण]). These three roots are singled out for @deva[अङ्] despite not falling under the general @deva[अङ्] provisions of @ref[3.1.55] ff.
"""

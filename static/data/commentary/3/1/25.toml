id = "3.1.25"
numericId = "31025"

[en]
simple = """
The affix @deva[णिच्] is used after @deva[सत्य] (truth), @deva[पाश] (fetter), @deva[रूप] (form), @deva[वीणा] (lute), @deva[तूल] (cotton), @deva[श्लोक] (verse), @deva[सेना] (army), @deva[लोम] (hair), @deva[त्वच] (skin), @deva[वर्म] (armor), @deva[वर्ण] (color), @deva[चूर्ण] (powder), and the @deva[चुरादि] (tenth class) roots.

**Examples:**
- @deva[सत्यापयति] "speaks truly"
- @deva[विपाशयति] "liberates"
- @deva[रूपयति] "looks"
- @deva[चोरयति] "steals" (@deva[चुरादि])
"""

standard = """
The @deva[णिच्] affix attaches to specific nouns and all @deva[चुरादि] (10th class) roots.

**Examples:**
- @deva[सत्यापयति] "speaks truly"
- @deva[विपाशयति] "liberates"
- @deva[रूपयति] "looks"
- @deva[उपवीणयति] "sings with lute"
- @deva[अनुतूलयति] "makes a brush"
- @deva[उपश्लोकयति] "praises in verse"
- @deva[वर्णयति] "describes/colors"
- @deva[अवचूर्णयति] "pulverizes"

**@deva[चुरादि]:** After 10th class roots, @deva[णिच्] is added without change of meaning: @deva[चोरयति] "steals", @deva[चिन्तयति] "thinks."

**@[vārtika]:** @deva[अर्थ], @deva[वेद], @deva[सत्य] take augment @deva[आप्]: @deva[सत्यापयति], @deva[अर्थापयति], @deva[वेदापयति].
"""

advanced = """
@deva[णिच्] after @deva[सत्याप], @deva[पाश], @deva[रूप], @deva[वीणा], @deva[तूल], @deva[श्लोक], @deva[सेना], @deva[लोम], @deva[त्वच], @deva[वर्म], @deva[वर्ण], @deva[चूर्ण], and @deva[चुरादि] roots.

**Specific senses:**
- @deva[पाश]: unfettering - @deva[विपाशयति]
- @deva[रूप]: seeing - @deva[रूपयति]
- @deva[वीणा]: accompaniment - @deva[उपवीणयति]
- @deva[तूल]: brushing - @deva[अनुतूलयति]
- @deva[श्लोक]: praising - @deva[उपश्लोकयति]
- @deva[सेना]: leading - @deva[अभिषेणयति]
- @deva[लोम]: rubbing - @deva[अनुलोमयति]
- @deva[त्वच]: taking - @deva[त्वचयति]
- @deva[वर्म]: putting on - @deva[संवर्मयति]
- @deva[वर्ण]: coloring/describing - @deva[वर्णयति]

**@[vārtika]:** @deva[अर्थ], @deva[वेद], @deva[सत्य] + @deva[आपुक्] + @deva[णिच्]: @deva[अर्थापयति], @deva[वेदापयति], @deva[सत्यापयति]. The @deva[टि] (@deva[आप्]) is not elided by @ref[6.4.155] - if it were to be elided, adding it would be pointless.

**@deva[चुरादि]:** @deva[णिच्] without semantic change: @deva[चोरयति], @deva[चिन्तयति].
"""

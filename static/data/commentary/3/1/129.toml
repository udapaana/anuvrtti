id = "3.1.129"
numericId = "31129"

[en]
simple = """
These words are **irregularly** formed:

- @deva[पाय्यम्] 'a measure' (from @deva[मा] 'to measure', with @deva[म] → @deva[प])
- @deva[सान्नाय्यम्] 'an oblation to fire' (from @deva[सम्] + @deva[नी])
- @deva[निकाय्यः] 'a dwelling' (from @deva[नि] + @deva[चि] 'to collect')
- @deva[धाय्या] 'a sacrificial prayer' (fem., from @deva[धा] 'to put')

**Regular forms:** @deva[मेयम्], @deva[सन्नेयम्], @deva[निचेयम्], @deva[धेयम्]
"""

standard = """
The following words are **irregularly** formed:

| Irregular | Meaning | Derivation | Regular form |
|-----------|---------|------------|-------------|
| @deva[पाय्यम्] | 'a measure' | @deva[मा] + @deva[ण्यत्], @deva[म] → @deva[प], extra @deva[य] | @deva[मेयम्] |
| @deva[सान्नाय्यम्] | 'oblation to fire' | @deva[सम्] + @deva[नी] + @deva[ण्यत्] | @deva[सन्नेयम्] |
| @deva[निकाय्यः] | 'a dwelling' | @deva[नि] + @deva[चि] + @deva[ण्यत्] | @deva[निचेयम्] |
| @deva[धाय्या] | 'sacrificial prayer' | @deva[धा] + @deva[ण्यत्] (fem.) | @deva[धेयम्] |

**Notes:**
- @deva[पाय्यम्]: @deva[म] irregularly changes to @deva[प]; extra @deva[य] by @ref[7.3.33]
- @deva[सान्नाय्यम्]: applies to a specific type of oblation
- @deva[धाय्या]: refers to @deva[सामधेनी] hymns used in rituals
"""

advanced = """
The words @deva[पाय्य], @deva[सान्नाय्य], @deva[निकाय्य], and @deva[धाय्या] are irregularly formed.

**@deva[पाय्यम्]** 'a measure':
- @deva[मा] 'to measure' + @deva[ण्यत्] = @deva[पाय्यम्]
- @deva[म] → @deva[प] (irregular)
- Extra @deva[य] added by @ref[7.3.33]
- Regular form: @deva[मा] + @deva[ण्यत्] = @deva[मेयम्] @ref[6.4.65]

**@deva[सान्नाय्यम्]** 'an oblation to fire':
- @deva[सम्] + @deva[नी] 'to lead' + @deva[ण्यत्] = @deva[सान्नाय्यम्]
- A crude form denoting a specific kind of oblation
- Regular form: @deva[सन्नेयम्]

**@deva[निकाय्यः]** 'a dwelling':
- @deva[नि] + @deva[चि] 'to collect' + @deva[ण्यत्] = @deva[नि] + @deva[चै] + @deva[य] = @deva[नि] + @deva[चाय] + @deva[य] = @deva[निकाय्यः]
- Regular form: @deva[निचेयम्]

**@deva[धाय्या]** 'a sacrificial prayer' (fem.):
- @deva[धा] 'to put' + @deva[ण्यत्] = @deva[धाय्या]
- The @deva[सामधेनी] are certain @deva[ऋक्] hymns used as supplemental verses in a litany
- Regular form: @deva[धेयम्]
"""

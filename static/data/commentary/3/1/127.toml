id = "3.1.127"
numericId = "31127"

[en]
simple = """
The word @deva[आनाय्यः] 'impermanent (fire)' is **irregularly** formed.

**Derivation:**
@deva[आङ्] + @deva[नी] 'to lead/bring' + @deva[ण्यत्] = @deva[आनाय्यः]

**Usage:** @deva[आनाय्यो दक्षिणाग्निः] 'the impermanent southern fire' (fire brought from the @deva[गार्हपत्य] hearth)

**Regular form:** When not meaning 'impermanent fire':
@deva[आ] + @deva[नी] + @deva[ण्यत्] = @deva[आनेयम्] 'what ought to be brought'
"""

standard = """
The word @deva[आनाय्यः] is **irregularly** formed when meaning 'impermanent' (applied to sacred fire).

**Derivation:**
@deva[आङ्] + @deva[नी] + @deva[ण्यत्] = @deva[आ] + @deva[नै] + @deva[य] = @deva[आनाय्य] (@deva[ऐ] → @deva[आय्] by analogy of @ref[6.1.79])

**Usage:** @deva[आनाय्यो दक्षिणाग्निः] — a type of @deva[दक्षिणाग्नि] (southern fire) that is brought from the @deva[गार्हपत्य] fire and not permanently maintained.

**Semantic restriction:** Applies only to consecrated fire, not to impermanent objects generally.

**Regular form:** @deva[आ] + @deva[नी] + @deva[ण्यत्] = @deva[आनेयम्] 'what ought to be brought' (general meaning)
"""

advanced = """
The word @deva[आनाय्यः] is irregularly formed when meaning 'impermanent' (applied to sacred fire).

**Derivation:**
@deva[आङ्] + @deva[नी] + @deva[ण्यत्] = @deva[आ] + @deva[नै] + @deva[य] = @deva[आनाय्य] (the @deva[ऐ] changes to @deva[आय्] by analogy of @ref[6.1.79])

**Usage:** @deva[आनाय्यो दक्षिणाग्निः] — a species of @deva[दक्षिणाग्नि] fire.

**Context:** The @deva[आनाय्य] fire is brought from the @deva[गार्हपत्य] fire and is not permanently kept alive. It is not coextensive with @deva[दक्षिणाग्नि] generally—a @deva[दक्षिणाग्नि] may be taken from various sources (a prosperous @deva[वैश्य] family, a frying place, or the @deva[गार्हपत्य]). When taken from @deva[गार्हपत्य], it is @deva[आनाय्य दक्षिणाग्निः]. The @deva[आहवनीय] is also taken from @deva[गार्हपत्य].

**Semantic restriction:** Not everything impermanent is @deva[आनाय्य]—a fragile pot would not be called so. The term applies only to consecrated fire.

**Regular form:** @deva[आ] + @deva[नी] + @deva[ण्यत्] = @deva[आनेयम्] 'what ought to be brought' (without the special meaning)
"""

id = "3.1.10"
numericId = "31010"

[en]
simple = """
The affix @deva[क्यच्] is optionally used to form a verb meaning "treats X as Y" (comparison or metaphor).

**Example:** @deva[पुत्रीयति छात्रम्] = @deva[पुत्रमिवाचरति छात्रम्] "he treats the pupil as (if he were) a son"

The @deva[पुत्र] is the standard of comparison.
"""

standard = """
The @deva[क्यच्] affix (continuing from @ref[3.1.8]) optionally expresses @deva[आचार] (treatment) with comparison: treating something as if it were something else.

**Example:** @deva[पुत्रीयति छात्रम्] = "treats the pupil as a son"

The @deva[सुबन्त] to which @deva[क्यच्] attaches is the @deva[उपमान] (standard of comparison).

**@[vārtika]:** Also applies with locative case:
- @deva[प्रासादीयति कुड्ये] "treats the hut as a palace" (lives in a hut as if it were a palace)
- @deva[पर्यङ्कीयति मञ्चके] "treats the cot as a royal bed"
"""

advanced = """
@deva[क्यच्] (from @ref[3.1.8]) optionally expresses @deva[आचार] with @deva[उपमान] (comparison).

**Structure:** The @deva[सुबन्त] taking @deva[क्यच्] is the @deva[उपमान]; the accusative is the @deva[उपमेय].

**Example:** @deva[पुत्रीयति छात्रम्] = @deva[पुत्रमिवाचरति छात्रम्]
- @deva[पुत्र] = @deva[उपमान] (standard)
- @deva[छात्र] = @deva[उपमेय] (thing compared)

**@[vārtika]:** @deva[क्यच्] also applies with locative:
- @deva[प्रासादीयति कुड्ये] "dwells in a hut as if it were a palace"
- @deva[पर्यङ्कीयति मञ्चके] "lies on a cot as if it were a royal bed"

**Note:** Only @deva[क्यच्] (not @deva[काम्यच्]) continues here—hence the separate @deva[सूत्र] @ref[3.1.9].
"""

id = "3.1.134"
numericId = "31134"

[en]
simple = """
Three affixes for specific root classes denoting agent:

1. **@deva[ल्यु]** (= @deva[अन]) after @deva[नन्द]-class roots
   - @deva[नन्द्] + @deva[ल्यु] = @deva[नन्दनः] 'son' (lit. 'one who gladdens')

2. **@deva[णिनि]** (= @deva[इन्]) after @deva[ग्रह]-class roots
   - @deva[ग्रह्] + @deva[णिनि] = @deva[ग्राही] 'seizer'

3. **@deva[अच्]** (= @deva[अ]) after @deva[पच्]-class roots
   - @deva[पच्] + @deva[अच्] = @deva[पचः] 'cook'
"""

standard = """
Three affixes are prescribed for specific root classes denoting **agent**:

**1. @deva[ल्यु]** (= @deva[अन]) after @deva[नन्दादि] roots:
- @deva[नन्द्] 'to rejoice' → @deva[नन्दनः] 'son, one who gladdens'
- @deva[मद्] → @deva[मदनः] 'Cupid'
- @deva[तप्] → @deva[तपनः] 'sun'

**2. @deva[णिनि]** (= @deva[इन्]) after @deva[ग्रहादि] roots:
- @deva[ग्रह्] 'to seize' → @deva[ग्राही] 'seizer'
- @deva[स्था] → @deva[स्थायिन्] 'one who stands'
- @deva[मन्त्र] → @deva[मन्त्रिन्] 'counselor'

**3. @deva[अच्]** (= @deva[अ]) after @deva[पचादि] roots:
- @deva[पच्] 'to cook' → @deva[पचः] 'cook'
- @deva[वद्] → @deva[वदः] 'speaker'

**Note:** @deva[पचादि] is an @deva[आकृतिगण] (open class)—@deva[अच्] effectively applies to all roots, debarring @deva[अण्].
"""

advanced = """
After roots of the @deva[नन्द], @deva[ग्रह], and @deva[पच्] classes come the affixes @deva[ल्यु] (= @deva[अन]), @deva[णिनि] (= @deva[इन्]), and @deva[अच्] (= @deva[अ]) respectively, denoting agent.

**1. @deva[ल्यु]** after @deva[नन्दादि] roots:
- @deva[नन्द्] + @deva[ल्यु] = @deva[नन्द्] + @deva[युच्] @ref[1.3.8] = @deva[नन्द्] + @deva[अन] @ref[7.1.1] = @deva[नन्दनः] 'son'
- Names formed: @deva[मदनः], @deva[तपनः], @deva[दमनः], @deva[रमणः], @deva[दर्पणः], @deva[जनार्दनः], @deva[पवनः], @deva[मधुसूदनः], @deva[विभीषणः]
- Note: @deva[लवणः] has irregular @deva[ण]

**2. @deva[णिनि]** after @deva[ग्रहादि] roots:
- @deva[ग्रह्] → @deva[ग्राही]; @deva[उत्सह्] → @deva[उत्साही]; @deva[स्था] → @deva[स्थायिन्]; @deva[मन्त्र] → @deva[मन्त्रिन्]
- With @deva[नि]-: @deva[निवासिन्], @deva[निश्राविन्], @deva[निशायिन्]
- With @deva[अ]-: @deva[अयाचिन्], @deva[अवादिन्], @deva[अवासिन्]

**3. @deva[अच्]** after @deva[पचादि] roots:
- List includes: @deva[पच], @deva[वच], @deva[वप], @deva[वद], @deva[चल], @deva[तप], @deva[पत], etc.
- @deva[ट्] in @deva[नदट्] etc. indicates feminine in @deva[ई] @ref[4.1.15]
- @deva[पचादि] is an @deva[आकृतिगण] (open class)—@deva[अच्] effectively applies universally, debarring @deva[अण्], enabling forms like @deva[श्वपचः] 'dog-cooker'
"""

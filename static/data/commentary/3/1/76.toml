id = "3.1.76"
numericId = "31076"

[en]
simple = """
This rule says that the affix @deva[श्नु] is optionally used after the root @deva[तक्ष्] (to bore, to hew) when a @deva[सार्वधातुक] affix denoting the agent follows.

Since @deva[श्नु] is optional:
- @deva[तक्षति] (@deva[शप्]) or @deva[तक्ष्णोति] (@deva[श्नु]) – both mean "he hews"

Example: @deva[तक्षति काष्ठम्] or @deva[तक्ष्णोति काष्ठम्] (he hews the wood).

But with prefix @deva[सम्]: @deva[सन्तक्षति वाग्भिः] (he cuts with speech) – here the option may be restricted.
"""

standard = """
The affix @deva[श्नु] is optionally (@deva[विभाषा]) used after @deva[तक्ष्] (to bore/hew) when @deva[सार्वधातुक] follows in @deva[कर्तरि].

Alternate forms:
- @deva[तक्षति] (@deva[शप्]) / @deva[तक्ष्णोति] (@deva[श्नु])

Example: @deva[तक्षति काष्ठम्] / @deva[तक्ष्णोति काष्ठम्] (he hews the wood).

With @deva[सम्]: @deva[सन्तक्षति वाग्भिः] (he cuts with speech).

This gives @deva[तक्ष्] dual class membership, allowing either @deva[भ्वादि] or @deva[स्वादि] conjugation.
"""

advanced = """
@deva[श्नु] optionally applies after @deva[तक्ष्] in @deva[कर्तरि सार्वधातुक].

Alternate forms:
- @deva[तक्षति] / @deva[तक्ष्णोति]

Example: @deva[तक्षति काष्ठम्] / @deva[तक्ष्णोति काष्ठम्].

With @deva[सम्]: @deva[सन्तक्षति वाग्भिः].

This rule (@deva[तक्षश्च]) parallels @ref[3.1.75] (@deva[अक्षो विभाषा]), providing optional @deva[स्वादि] conjugation for @deva[तक्ष्].

@note[type=observation]: The Vasu commentary suggests the option may be contextually conditioned—physical hewing may prefer different forms than metaphorical cutting. Both roots @deva[अक्ष्] and @deva[तक्ष्] share this optional @deva[श्नु].
"""

id = "3.1.27"
numericId = "31027"

[en]
simple = """
The affix @deva[यक्] is used after the roots of the @deva[कण्ड्वादि] class. These words function as both roots and nouns.

**Example:** @deva[कण्डूयति] or @deva[कण्डूयते] "itches" or "scratches" (from @deva[कण्डू])

These verbs can take either @deva[परस्मैपद] or @deva[आत्मनेपद] endings.
"""

standard = """
The @deva[यक्] affix attaches to the @deva[कण्ड्वादि] class - words that are both @deva[धातु]s and @deva[प्रातिपदिक]s, listed separately from the main @deva[धातुपाठ].

**Example:** @deva[कण्डूयति] / @deva[कण्डूयते] "itches/scratches"

These verbs are @deva[उभयपद] (both voices).

**@deva[कण्ड्वादि] class includes:** @deva[कण्डू], @deva[मन्तु], @deva[ह्रणी], @deva[वल्गु], @deva[अस्त्र], @deva[मनस्], @deva[महि], @deva[लेट्], @deva[लोट्], @deva[इरस्], @deva[इरज्], @deva[इरञ्], @deva[द्रवस्], @deva[मेधा], @deva[कुषुभ], @deva[मगध], @deva[सुख], @deva[दुःख], @deva[भिषज्], @deva[चरण], @deva[गद्गद], @deva[एला], @deva[केला], @deva[खेला], etc.
"""

advanced = """
@deva[यक्] after @deva[कण्ड्वादि] - words functioning as both @deva[धातु] and @deva[प्रातिपदिक], listed in a separate @deva[गण].

**Example:** @deva[कण्डूयति] / @deva[कण्डूयते]

**@deva[उभयपद]:** No indicatory letter restricts voice.

**@deva[कण्ड्वादि गण]:** @deva[कण्डूञ्], @deva[मन्तु], @deva[ह्रणीञ्], @deva[वल्गु], @deva[अस्त्र], @deva[मनस्], @deva[महीङ्], @deva[लेट्], @deva[लोट्], @deva[इरस्], @deva[इरज्], @deva[इरञ्], @deva[द्रवस्], @deva[मेधा], @deva[कुषुभ], @deva[मगध], @deva[तन्तस्], @deva[पम्पस्], @deva[सुख], @deva[दुःख], @deva[सपर], @deva[अर], @deva[भिषज्], @deva[भिष्णज्], @deva[इषुध], @deva[चरण], @deva[चुरण], @deva[भुरण], @deva[तुरण], @deva[गद्गद], @deva[एला], @deva[केला], @deva[खेला], @deva[लिट्], @deva[लोट्].

**Note:** The affix applies to these as @deva[धातु]s, not as @deva[प्रातिपदिक]s.
"""

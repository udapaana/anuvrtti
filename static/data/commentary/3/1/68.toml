id = "3.1.68"
numericId = "31068"

[en]
simple = """
This rule says that the affix @deva[शप्] is added after a root when a @deva[सार्वधातुक] (conjugational) affix follows and signifies the agent (active voice).

This @deva[शप्] affix is technically called a @deva[विकरण] (conjugation marker). It comes after roots of the @deva[भू] class (1st conjugation) and after compound roots formed by @deva[सन्], etc. (by @ref[3.1.32]).

Breaking down @deva[शप्]:
- The @deva[श] makes it a @deva[सार्वधातुक] affix (by @ref[3.4.113])
- The @deva[प्] indicates @deva[अनुदात्त] accent (by @ref[3.1.4])
- The actual affix is @deva[अ]

Example derivation: @deva[भू] + @deva[शप्] + @deva[तिप्] → @deva[भू] + @deva[अ] + @deva[ति] → @deva[भो] + @deva[अ] + @deva[ति] (by @ref[7.3.84]) → @deva[भवति] (he is/becomes).

Similarly: @deva[पचति] (he cooks).
"""

standard = """
The affix @deva[शप्] is added after roots when @deva[सार्वधातुक] affixes follow in @deva[कर्तरि] (active voice). This is the @deva[विकरण] (class marker) for @deva[भ्वादि] (1st class) roots and @deva[सनादि]-derived @deva[धातु]s (@ref[3.1.32]).

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्], making @deva[शप्] a @deva[सार्वधातुक] affix by @ref[3.4.113]
- @deva[प्] is @deva[इत्], indicating @deva[अनुदात्त] accent by @ref[3.1.4]
- Operative portion: @deva[अ]

Derivation: @deva[भू] + @deva[शप्] + @deva[तिप्] → @deva[भू] + @deva[अ] + @deva[ति] → @deva[भो] + @deva[अ] + @deva[ति] (@deva[गुण] by @ref[7.3.84]) → @deva[भवति].

Examples: @deva[भवति], @deva[पचति], @deva[बुभूषति] (@deva[सन्] + @deva[शप्]).
"""

advanced = """
The affix @deva[शप्] is introduced after roots when @deva[सार्वधातुक] follows in @deva[कर्तरि]. This is the @deva[विकरण] for @deva[भ्वादि] (@deva[गण] 1) and @deva[सनादि]-derived @deva[धातु]s (per @ref[3.1.32]).

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्] by @ref[1.3.8], triggering @ref[3.4.113] (@deva[शप्] is @deva[सार्वधातुक])
- @deva[प्] is @deva[इत्] by @ref[1.3.3], triggering @ref[3.1.4] (@deva[अनुदात्त] accent)
- Operative: @deva[अ]

Derivation: @deva[भू] + @deva[शप्] + @deva[तिप्] → @deva[भू] + @deva[अ] + @deva[ति] → @deva[भो] + @deva[अ] + @deva[ति] (@ref[7.3.84] @deva[सार्वधातुकार्धधातुकयोः]) → @deva[भवति].

@note[type=observation]: @deva[शप्] is the most common @deva[विकरण], covering the largest verb class. Its @deva[शित्]-status makes the entire @deva[धातु] + @deva[शप्] complex @deva[अङ्ग], triggering operations like @deva[गुण] (@ref[7.3.84]).

@note[type=observation]: This begins the section on @deva[विकरण] affixes (@ref[3.1.68]-@ref[3.1.90]), the class markers that distinguish the ten conjugational classes.
"""

id = "3.1.9"
numericId = "31009"

[en]
simple = """
The affix @deva[काम्यच्] can also be used to form a verb meaning "wishing for X for oneself," just like @deva[क्यच्].

**Example:** @deva[पुत्र] "son" → @deva[पुत्रकाम्यति] "he wishes for a son (for himself)"

This is an alternative to @deva[पुत्रीयति] from the previous rule.
"""

standard = """
Like @deva[क्यच्], the affix @deva[काम्यच्] forms denominatives expressing self-directed wishing from @deva[सुबन्त] bases.

**Example:** @deva[पुत्र] + @deva[काम्यच्] → @deva[पुत्रकाम्यति] "wishes for a son for himself"

**Why a separate @[sūtra]?** This allows only @deva[क्यच्] (not @deva[काम्यच्]) to continue into @ref[3.1.10].

The @deva[क्] in @deva[काम्यच्] is part of the affix itself (not indicatory), or the affix may be analyzed as @deva[च्काम्य] with an initial indicatory @deva[च्].
"""

advanced = """
@deva[काम्यच्] is an alternative to @deva[क्यच्] for denominatives expressing @deva[इच्छा] for oneself.

**Example:** @deva[पुत्रकाम्यति] = @deva[पुत्रमात्मन इच्छति]

**Separation from @ref[3.1.8]:** This separate @deva[सूत्र] ensures that only @deva[क्यच्] (via @deva[अनुवृत्ति]) applies in @ref[3.1.10], not @deva[काम्यच्].

**The @deva[क्]:** Not indicatory here—it is part of the affix. @ref[1.3.8] (@deva[लशक्वतद्धिते]) would make @deva[क्] indicatory, but no purpose is served. Alternatively, the affix is @deva[च्काम्य] with indicatory @deva[च्].
"""

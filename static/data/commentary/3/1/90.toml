id = "3.1.90"
numericId = "31090"

[en]
simple = """
This rule says that according to Eastern grammarians, the affix @deva[श्यन्] is added after @deva[कुष्] 'to pull' and @deva[रञ्ज्] 'to colour' in reflexive constructions, with @deva[परस्मैपद] endings. This replaces the usual @deva[यक्] and @deva[आत्मनेपद]. Examples: @deva[कुष्यति पादः स्वयमेव] 'the foot draws up by itself'; @deva[रज्यति वस्त्रं स्वयमेव] 'the cloth colours by itself'. Since this is an Eastern opinion, the standard forms @deva[कुष्यते] and @deva[रज्यते] are also valid.
"""

standard = """
According to Eastern grammarians (@deva[प्राचाम्]), the affix @deva[श्यन्] with @deva[परस्मैपद] replaces @deva[यक्] with @deva[आत्मनेपद] for @deva[कुष्] 'to pull' and @deva[रञ्ज्] 'to colour' in @deva[कर्मवद्भाव] constructions. Examples: @deva[कुष्यति पादः स्वयमेव] 'the foot draws up by itself'; @deva[रज्यति वस्त्रं स्वयमेव] 'the cloth colours by itself'. The phrase @deva[प्राचाम्] indicates optionality: the standard @deva[यक्] forms @deva[कुष्यते] and @deva[रज्यते] remain valid alternatives.
"""

advanced = """
This @[sūtra] records the Eastern grammarians' (@deva[प्राचाम्]) view that @deva[श्यन्] with @deva[परस्मैपद] replaces @deva[यक्] with @deva[आत्मनेपद] for @deva[कुष्] and @deva[रञ्ज्] in @deva[कर्मवद्भाव]. The @deva[श्यन्] affix (normally a 4th-class marker) here functions as an alternative @deva[विकरण] in reflexive contexts. The attribution to @deva[प्राच्] (Eastern school) creates @deva[विभाषा]: both @deva[कुष्यति]/​@deva[रज्यति] (@deva[श्यन्] + @deva[परस्मैपद]) and @deva[कुष्यते]/​@deva[रज्यते] (@deva[यक्] + @deva[आत्मनेपद]) are grammatically valid.
"""

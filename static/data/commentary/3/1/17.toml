id = "3.1.17"
numericId = "31017"

[en]
simple = """
The affix @deva[क्यङ्] is used after @deva[शब्द] (sound), @deva[वैर] (hostility), @deva[कलह] (strife), @deva[अभ्र] (cloud), @deva[कण्व] (sin), and @deva[मेघ] (cloud) to express "making."

**Examples:**
- @deva[शब्दायते] = @deva[शब्दं करोति] "makes a noise"
- @deva[वैरायते] "creates hostility"
- @deva[कलहायते] "causes strife"
"""

standard = """
The @deva[क्यङ्] affix attaches to @deva[शब्द], @deva[वैर], @deva[कलह], @deva[अभ्र], @deva[कण्व], @deva[मेघ] in the sense of @deva[करण] (making).

**Examples:**
- @deva[शब्दं करोति] = @deva[शब्दायते] "makes noise"
- @deva[वैरायते] "creates enmity"
- @deva[कलहायते] "causes quarrel"
- @deva[अभ्रायते], @deva[कण्वायते], @deva[मेघायते]

**Note:** @deva[करण] here means "making" in the primary sense, not the grammatical @deva[करण] (instrumental).

**@[vārtika]:** Also includes @deva[सुदिन], @deva[दुर्दिन], @deva[नीहार], @deva[अटा], @deva[अट्टा], @deva[शीका], etc.
"""

advanced = """
@deva[क्यङ्] after @deva[शब्द], @deva[वैर], @deva[कलह], @deva[अभ्र], @deva[कण्व], @deva[मेघ] in @deva[करण] (making) sense.

**@deva[करण]:** Primary meaning "making/doing," not grammatical @deva[करण] (instrumental case).

**Examples:** @deva[शब्दायते] = @deva[शब्दं करोति]; @deva[वैरायते], @deva[कलहायते], @deva[अभ्रायते], @deva[कण्वायते], @deva[मेघायते].

**@[vārtika] 1:** Add @deva[सुदिन], @deva[दुर्दिन], @deva[नीहार]: @deva[सुदिनायते], @deva[दुर्दिनायते], @deva[नीहारायते].

**@[vārtika] 2:** Add @deva[अटा], @deva[अट्टा], @deva[शीका], @deva[कोटा], @deva[पोटा], @deva[सोटा], @deva[कष्टा]: @deva[अटायते], @deva[अट्टायते], @deva[शीकायते], etc.
"""

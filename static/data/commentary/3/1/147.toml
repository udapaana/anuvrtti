id = "3.1.147"
numericId = "31147"

[en]
simple = """
The affix @deva[ण्युट्] (= @deva[अन]) is **also** used after @deva[गै] 'to sing' when the agent denotes a professional singer.

**Example:** @deva[गै] + @deva[ण्युट्] → @deva[गायनः] 'singer' (f. @deva[गायनी])

The @deva[य्] is added by @ref[7.3.33] before @deva[ण्]-marked affixes after @deva[आ]-final roots.
"""

standard = """
The affix @deva[ण्युट्] (= @deva[अन]) is also used after @deva[गै] 'to sing' when the agent denotes a professional artist (@deva[शिल्पिन्]).

**Derivation:** @deva[गै] + @deva[ण्युट्] = @deva[गा] + @deva[अन] @ref[7.1.1] = @deva[गा] + @deva[य्] + @deva[अन] @ref[7.3.33] = @deva[गायनः]

**Feminine:** @deva[गायनी]

**@deva[योगविभाग]:** This @[sūtra] is separated from @ref[3.1.146] so that only @deva[ण्युट्] (not @deva[थकन्]) continues into subsequent @[sūtras].
"""

advanced = """
The affix @deva[ण्युट्] (= @deva[अन]) is also used after @deva[गै] 'to sing' when the agent denotes a professional artist (@deva[शिल्पिन्]).

The word @deva[च] 'also' draws @deva[गै] from the previous @[sūtra].

**Derivation:** @deva[गै] + @deva[ण्युट्] = @deva[गा] + @deva[अन] @ref[7.1.1] = @deva[गायनः] (f. @deva[गायनी])

The @deva[य्] augment is added by @ref[7.3.33] before @deva[ण्]-@deva[मित्] affixes after @deva[आ]-final roots.

**@deva[योगविभाग] (rule-splitting):** Had @deva[गाथकन्] and @deva[ण्युट् च] been combined into one @[sūtra], both affixes would continue into subsequent @[sūtras]. By separating them, only @deva[ण्युट्] continues via @deva[अनुवृत्ति] to @ref[3.1.148] and beyond.
"""

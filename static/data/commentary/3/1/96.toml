id = "3.1.96"
numericId = "31096"

[en]
simple = """
This rule teaches that the affixes @deva[तव्यत्], @deva[तव्य], and @deva[अनीयर्] are added after verbal roots. These form gerundives meaning 'ought to be done'. Examples: @deva[कृ] + @deva[तव्यत्] = @deva[कर्तव्यम्] 'to be done'; @deva[कृ] + @deva[तव्य] = @deva[कर्तव्यम्]; @deva[कृ] + @deva[अनीयर्] = @deva[करणीयम्] 'to be done'. When denoting the action itself, these are neuter @deva[एकवचन] (singular).
"""

standard = """
The affixes @deva[तव्यत्], @deva[तव्य], and @deva[अनीयर्] are added after @deva[धातु]s (by @deva[अनुवृत्ति] from @ref[3.1.91]). The final @deva[त्] of @deva[तव्यत्] and @deva[र्] of @deva[अनीयर्] are @deva[इत्] markers for accent: @deva[त्] indicates @deva[स्वरित] (@ref[6.1.185]), @deva[र्] indicates penultimate @deva[उदात्त] (@ref[6.1.217]). Examples: @deva[कर्तव्यम्], @deva[करणीयम्] 'to be done' (neuter when denoting action). @note[type=@[vārtika]] After @deva[वस्] 'to dwell' with agent sense, @deva[तव्यत्] is treated as @deva[णित्], causing @[vṛddhi]: @deva[वास्तव्यः] 'dweller'. @note[type=@[vārtika]] @deva[केलिमर्] is also listed: @deva[पचेलिमा माषाः] 'beans fit to be cooked'.
"""

advanced = """
This @[sūtra] prescribes @deva[तव्यत्], @deva[तव्य], and @deva[अनीयर्] after @deva[धातु]s. The @deva[इत्] markers @deva[त्] and @deva[र्] determine accent: @deva[त्] = @deva[स्वरित] by @ref[6.1.185]; @deva[र्] = penultimate @deva[उदात्त] by @ref[6.1.217], overriding the default @deva[कृत्] accent of @ref[3.1.3]. Derivations: @deva[कृ] + @deva[तव्य(त्)] → @deva[कर्तव्यम्]; @deva[कृ] + @deva[अनीय] → @deva[करणीयम्]. @note[type=@[vārtika]] @deva[वसेस्तव्यतो णित्कर्तरि]: @deva[वस्] + @deva[तव्यत्] (with @deva[णित्] treatment) → @deva[वास्तव्यः] (agent, masculine) with @[vṛddhi]. @note[type=@[vārtika]] @deva[केलिमर्] is additionally prescribed, restricted to @deva[कर्मन्] sense only: @deva[पचेलिमा माषाः], @deva[भिदेलिमानि काष्ठानि].
"""

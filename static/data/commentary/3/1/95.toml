id = "3.1.95"
numericId = "31095"

[en]
simple = """
This is a heading rule that defines the @deva[कृत्य] class of affixes. From this @[sūtra] up to @ref[3.1.133] (@deva[ण्वुल्तृचौ]), all affixes taught are called @deva[कृत्य]. These are gerundive affixes like @deva[तव्य], @deva[अनीय], etc., expressing obligation or necessity ('ought to be done'). They form potential participles similar to Latin '-ndus'. Examples: @deva[कर्तव्य] 'to be done', @deva[करणीय] 'to be done'.
"""

standard = """
This @deva[अधिकार] defines @deva[कृत्य] affixes: all affixes from @ref[3.1.95] through @ref[3.1.133] are @deva[कृत्य], a subclass of @deva[कृत्]. @deva[कृत्य] affixes (@deva[तव्य], @deva[अनीय], @deva[यत्], @deva[ण्यत्], @deva[क्यप्], etc.) form gerundives expressing @deva[कर्तव्यता] (obligation/necessity). They function as passive potential participles, similar to Latin gerundives in '-ndus'. Per @ref[3.4.70], they also serve as declinable verbal terminations. The term @deva[कृत्य] appears in compounding rules (@ref[2.1.33]) and case rules (@ref[2.3.71]).
"""

advanced = """
This @deva[अधिकार सूत्र] establishes the @deva[कृत्य] designation for affixes @ref[3.1.95]–@ref[3.1.133]. @deva[कृत्य] is a subdivision of @deva[कृत्] denoting gerundive (@deva[विध्यर्थ]) affixes that express @deva[कर्तव्यता] (obligation) or @deva[भविष्यत्] (futurity). The 38 following @[sūtras] teach affixes (@deva[तव्य], @deva[तव्यत्], @deva[अनीयर्], @deva[यत्], @deva[ण्यत्], @deva[क्यप्], @deva[घञर्थे कविधानम्]) forming passive potential participles. By @ref[3.4.70] (@deva[तव्यत्तव्यानीयरः]), @deva[कृत्य] affixes can function as @deva[तिङ्]-like verbal terminations. The designation @deva[कृत्य] triggers specific rules: @ref[2.1.33] (compounding), @ref[2.3.71] (case assignment).
"""

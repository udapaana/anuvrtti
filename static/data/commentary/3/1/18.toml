id = "3.1.18"
numericId = "31018"

[en]
simple = """
The affix @deva[क्यङ्] is used after @deva[सुख] (pleasure) and similar words to express "feeling" when the agent experiences that feeling.

**Examples:**
- @deva[सुखायते] "he feels pleasure"
- @deva[दुःखायते] "he feels pain"

The agent must be the one who experiences the feeling.
"""

standard = """
The @deva[क्यङ्] affix attaches to @deva[सुखादि] words in the sense of @deva[वेदन] (feeling), when the feeling belongs to the agent.

**Examples:**
- @deva[सुखायते] "feels pleasure"
- @deva[दुःखायते] "feels pain"

**Condition:** The agent must experience the feeling. Thus @deva[सुखं वेदयति प्रसाधको देवदत्तस्य] "the valet knows his masters happiness" - no @deva[क्यङ्], since the valet is not the one feeling it.

**@deva[सुखादि] class:** @deva[सुख], @deva[दुःख], @deva[तृप्त], @deva[गहन], @deva[कृच्छ्र], @deva[अस्], @deva[अलीक], @deva[प्रतीप], @deva[करुण], @deva[कृपण], @deva[सोट].
"""

advanced = """
@deva[क्यङ्] after @deva[सुखादि] in @deva[वेदन] (feeling) sense, when the @deva[कर्तृ] is the experiencer.

**Restriction:** @deva[स्वस्य वेदने] - the feeling must belong to the agent. Counterexample: @deva[सुखं वेदयति प्रसाधको देवदत्तस्य] - no @deva[क्यङ्] because the valet perceives anothers happiness.

**@deva[सुखादि गण]:** @deva[सुख], @deva[दुःख], @deva[तृप्त], @deva[गहन], @deva[कृच्छ्र], @deva[अस्], @deva[अलीक], @deva[प्रतीप], @deva[करुण], @deva[कृपण], @deva[सोट].

**Examples:** @deva[सुखायते] "feels pleasure"; @deva[दुःखायते] "feels pain."
"""

id = "3.1.14"
numericId = "31014"

[en]
simple = """
The affix @deva[क्यङ्] is used after @deva[कष्ट] (mischief/hardship) with the dative case to express "striving for evil" or "plotting."

**Example:** @deva[कष्टायते] = @deva[कष्टाय कर्मणे क्रामति] "he plots" (literally: he strives for mischief)

This affix does not apply when the sense is not evil.
"""

standard = """
The @deva[क्यङ्] affix attaches to @deva[कष्ट] (with @deva[चतुर्थी] construction) to express effort toward dishonesty or harm.

**Example:** @deva[कष्टाय कर्मणे क्रामति] = @deva[कष्टायते] "he plots, strives for mischief"

**Condition:** The sense must be evil intent. Without this, no affix: @deva[अजः कष्टं क्रामति] "the goat goes toward hardship" - no denominative.

**@[vārtika]:** @deva[क्यङ्] also applies after @deva[सत्र], @deva[कक्ष], @deva[कृच्छ्र], @deva[गहन]: @deva[सत्रायते], @deva[कक्षायते], @deva[कृच्छ्रायते], @deva[गहनायते].
"""

advanced = """
@deva[क्यङ्] after @deva[कष्ट] with @deva[चतुर्थी] expresses @deva[असत्क्रिया] (striving for evil).

**Analysis:** @deva[कष्टाय कर्मणे क्रामति] = @deva[कष्टायते] "plots, exerts for dishonesty"

**Restriction:** Applies only in evil sense. Neutral usage: @deva[अजः कष्टं क्रामति] (no @deva[क्यङ्]).

**@[vārtika]:** Extended to @deva[सत्र], @deva[कष्ट], @deva[कक्ष], @deva[कृच्छ्र], @deva[गहन] in @deva[असत्क्रिया] sense:
- @deva[सत्रायते] "plots"
- @deva[कक्षायते] "strives harmfully"
- @deva[कृच्छ्रायते] "endeavors in difficulty"
- @deva[गहनायते] "proceeds into difficulty"
"""

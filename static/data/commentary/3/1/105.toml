id = "3.1.105"
numericId = "31105"

[en]
simple = """
This rule says that the word @deva[अजर्यम्] 'imperishable' is irregularly formed when it qualifies the word @deva[सङ्गतम्] 'friendship' (whether expressed or understood). It is formed as @deva[अ] + @deva[जॄ] + @deva[यत्] = @deva[अजर्यम्]. Example: @deva[अजर्यं नोऽस्तु सङ्गतम्] 'let our friendship be imperishable'. When not qualifying 'friendship', the regular form is used: @deva[अजरिता कम्बलः] 'an undecaying blanket'.
"""

standard = """
The word @deva[अजर्यम्] 'imperishable' is listed as irregular when qualifying @deva[सङ्गतम्] 'friendship' (explicit or implied). Formation: @deva[अ] (negative) + @deva[जॄ] 'to decay' + @deva[यत्] = @deva[अजर्यम्]. Examples: @deva[अजर्यं नोऽस्तु सङ्गतम्] 'let our friendship be imperishable'; @deva[अजर्यमार्यसङ्गतम्] 'imperishable noble friendship'. When not with @deva[सङ्गतम्], other forms apply: @deva[अजरिता कम्बलः] 'undecaying blanket' (uses @deva[क्त] affix instead).
"""

advanced = """
This @[sūtra] establishes @deva[अजर्यम्] as @deva[निपातन] from @deva[न] + @deva[जॄ] + @deva[यत्] when qualifying @deva[सङ्गतम्] 'friendship/association'. The @deva[न] becomes @deva[अ] by @ref[6.3.73]. The condition @deva[सङ्गतप्रयोगे] restricts this irregular form to friendship contexts. Derivation: @deva[न] + @deva[जर्] (@deva[जॄ] + @deva[य]) + @deva[अम्] → @deva[अजर्यम्]. Examples: @deva[अजर्यं नोऽस्तु सङ्गतम्]; @deva[अजर्यमार्यसङ्गतम्]. In non-@deva[सङ्गत] contexts, alternate derivations apply (e.g., @deva[अजरित] with @deva[क्त]).
"""

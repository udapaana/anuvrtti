id = "3.1.110"
numericId = "31110"

[en]
simple = """
This rule says that roots with penultimate short @deva[ऋ] take the affix @deva[क्यप्], except @deva[कॢप्] 'to be able' and @deva[चृत्] 'to hurt'. Examples: @deva[वृत्] + @deva[क्यप्] = @deva[वृत्यम्]; @deva[वृध्] + @deva[क्यप्] = @deva[वृध्यम्]. The exceptions take @deva[ण्यत्]: @deva[कल्प्यम्], @deva[चर्त्यम्]. The @deva[त्] in @deva[ऋत्] indicates short @deva[ऋ] by @ref[1.1.70]; roots with long @deva[ॠ] like @deva[कॄत्] take @deva[ण्यत्]: @deva[कीर्त्यम्].
"""

standard = """
Roots with penultimate short @deva[ऋ] (@deva[ऋत्]) take @deva[क्यप्], except @deva[कॢप्] 'to be able' and @deva[चृत्] 'to hurt'. Examples: @deva[वृत्यम्], @deva[वृध्यम्]. Exceptions take @deva[ण्यत्]: @deva[कल्प्यम्], @deva[चर्त्यम्]. The @deva[त्] in @deva[ऋत्] restricts to short @deva[ऋ] per @ref[1.1.70]; long @deva[ॠ]-penultimate roots use @deva[ण्यत्]: @deva[कॄत्] → @deva[कीर्त्यम्]. @note[type=@[vārtika]] @deva[सृज्] with @deva[पाणि] takes @deva[ण्यत्]: @deva[पाणिसर्ग्या रज्जुः] 'a rope'. @note[type=@[vārtika]] @deva[सृज्] with @deva[सम्] + @deva[अव] takes @deva[ण्यत्]: @deva[समवसर्ग्या].
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] for @deva[ऋदुपधा] (short @deva[ऋ]-penultimate) roots, excepting @deva[कॢप्] and @deva[चृत्]. The @deva[त्]-marker in @deva[ऋत्] specifies short @deva[ऋ] (one @[mātrā]) by @ref[1.1.70], excluding long @deva[ॠ] roots. Derivations: @deva[वृत्] + @deva[क्यप्] → @deva[वृत्यम्]; exceptions: @deva[कॢप्]/​@deva[चृत्] + @deva[ण्यत्] → @deva[कल्प्यम्]/​@deva[चर्त्यम्]. Long @deva[ॠ]-penultimate: @deva[कॄत्] + @deva[ण्यत्] → @deva[कीर्त्यम्] (with @[vṛddhi]). @note[type=@[vārtika]] @deva[पाणौ सृजः]: @deva[पाणि] + @deva[सृज्] + @deva[ण्यत्] → @deva[पाणिसर्ग्या] 'rope'. @note[type=@[vārtika]] @deva[समवपूर्वाच्च]: @deva[सम्] + @deva[अव] + @deva[सृज्] + @deva[ण्यत्] → @deva[समवसर्ग्या].
"""

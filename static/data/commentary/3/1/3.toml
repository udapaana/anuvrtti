id = "3.1.3"
numericId = "31003"

[en]
simple = """
By default, an affix carries @deva[उदात्त] (high-pitched) accent on its first vowel. Whenever a @deva[प्रत्यय] (affix) is added to a base, the first vowel of that affix receives the raised pitch unless a special rule overrides this default.

**Example:** @deva[कृ] + @deva[तव्य] → @deva[कर्तव्यम्] "to be done." The affix @deva[तव्य] has @deva[उदात्त] on its first vowel @deva[अ].

This matters because Vedic recitation preserves these pitch accents, and the grammar must account for where the accent falls in every derived word.
"""

standard = """
This rule establishes the default accent pattern for affixes: @deva[उदात्त] (acute accent) falls on the first vowel of the @deva[प्रत्यय]. If the affix contains multiple vowels, only the first receives @deva[उदात्त]; the rest are @deva[अनुदात्त].

**Example:** @deva[कर्तव्यम्] — the affix @deva[तव्य] has @deva[उदात्त] on the first @deva[अ].

**Exceptions by indicatory letter (@deva[अनुबन्ध]):**
- @deva[चित्] (@ref[6.1.163]): @deva[उदात्त] shifts to the final vowel of the affix
- @deva[रित्] (@ref[6.1.217]): @deva[उदात्त] on the middle vowel
- @deva[पित्]: affix becomes @deva[अनुदात्त] entirely (see @ref[3.1.4])
- @deva[ञित्] (@ref[6.1.193]): @deva[उदात्त] falls on the syllable preceding the affix
- @deva[कित्] in @deva[तद्धित] (@ref[6.1.165]): @deva[उदात्त] on the final vowel

**Rule type:** @deva[परिभाषासूत्र] — an interpretive principle establishing the default accent for all affixes in the system.
"""

advanced = """
This @deva[परिभाषासूत्र] (or @deva[अधिकारसूत्र] according to some) assigns @deva[उदात्त] to the first vowel of every @deva[प्रत्यय]. The @deva[अनुवृत्ति] of @deva[प्रत्ययः] comes from @ref[3.1.1].

**Override hierarchy by @deva[अनुबन्ध]:**
- @deva[चित्] → @deva[उदात्त] on final vowel (@ref[6.1.163])
- @deva[रित्] → @deva[उदात्त] on middle vowel (@ref[6.1.217])
- @deva[पित्] → entire affix is @deva[अनुदात्त] (see @ref[3.1.4])
- @deva[ञित्] → @deva[उदात्त] on the syllable preceding the affix (@ref[6.1.193])
- @deva[प्रित्]/@deva[नित्] → @deva[उदात्त] on the first syllable of the whole word (@ref[6.1.197])
- @deva[कित्] in @deva[तद्धित] → @deva[उदात्त] on final vowel (@ref[6.1.165])
- @deva[तित्] → @deva[स्वरित] accent (@ref[6.1.185])

**Systemic significance:** This rule, together with @ref[3.1.4], provides the accent framework for the entire @deva[प्रत्यय] section. The indicatory letters (@deva[अनुबन्ध]s) attached to affixes throughout Books 3-5 encode accent information that overrides this default. The system is designed so that the unmarked case (no special @deva[अनुबन्ध]) yields @deva[उदात्त] on the first vowel, and marked cases require explicit indicatory letters.

**Example:** @deva[कर्तव्यम्] — @deva[उदात्त] on first @deva[अ] of @deva[तव्य], since @deva[तव्य] has no accent-modifying @deva[अनुबन्ध].
"""

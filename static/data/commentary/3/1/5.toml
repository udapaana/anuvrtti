id = "3.1.5"
numericId = "31005"

[en]
simple = """
The roots @deva[गुप्] (to protect), @deva[तिज्] (to sharpen), and @deva[कित्] (to dwell) take the affix @deva[सन्] when they mean "despise," "endure," and "heal" respectively.

**Examples:**
- @deva[जुगुप्सते] "he despises" (from @deva[गुप्] + @deva[सन्])
- @deva[तितिक्षते] "he endures patiently" (from @deva[तिज्] + @deva[सन्])
- @deva[चिकित्सते] "he heals" (from @deva[कित्] + @deva[सन्])

The root is reduplicated (doubled) when @deva[सन्] is added.
"""

standard = """
The roots @deva[गुप्], @deva[तिज्], and @deva[कित्] take @deva[सन्] to express special meanings:

| Root | Ordinary meaning | With @deva[सन्] |
|------|-----------------|----------------|
| @deva[गुप्] | protect (@deva[गोपायति]) | despise (@deva[जुगुप्सते]) |
| @deva[तिज्] | sharpen (@deva[तेजयति]) | endure (@deva[तितिक्षते]) |
| @deva[कित्] | dwell (@deva[सङ्केतयति]) | heal (@deva[चिकित्सते]) |

**Derivation:** @deva[गुप्] + @deva[सन्] → @deva[गुप्स] (by @ref[7.4.62]) → @deva[जुगुप्स] (reduplication) + @deva[ते] → @deva[जुगुप्सते].

Reduplication occurs by @ref[6.1.9].
"""

advanced = """
The @deva[धातु]s @deva[गुप्] (protect), @deva[तिज्] (sharpen), @deva[कित्] (dwell) take @deva[सन्] with semantic shift:

- @deva[गुप्] → @deva[जुगुप्सते] "despises" (not @deva[गोपायति] "protects")
- @deva[तिज्] → @deva[तितिक्षते] "endures" (not @deva[तेजयति] "sharpens")
- @deva[कित्] → @deva[चिकित्सते] "heals" (not @deva[सङ्केतयति] "signals")

**Derivation of @deva[जुगुप्सते]:**
1. @deva[गुप्] + @deva[सन्] = @deva[गुप्स] (by @ref[7.4.62], @deva[प्] is @deva[अघोष])
2. Reduplication by @ref[6.1.9]: @deva[जुगुप्स्]
3. + @deva[अते] (3sg @deva[आत्मनेपद]) = @deva[जुगुप्सते]

**Note:** These are @deva[आत्मनेपद] verbs. The @deva[सन्] here is obligatory for these meanings, unlike the optional desiderative @deva[सन्] of @ref[3.1.7].
"""

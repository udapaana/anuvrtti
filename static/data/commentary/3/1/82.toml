id = "3.1.82"
numericId = "31082"

[en]
simple = """
This rule says that both @deva[श्ना] and @deva[श्नु] can be added after the roots @deva[स्तम्भ्]/​@deva[स्तुम्भ्] 'to hinder, be dull', @deva[स्कम्भ्]/​@deva[स्कुम्भ्] 'to support', and @deva[स्कु] 'to go by leaps', when an affix marking the agent follows. This gives optional forms like @deva[स्तभ्नाति] or @deva[स्तभ्नोति]. These roots are called @deva[सौत्र] because they appear in the @[sūtras], not in the @[dhātupāṭha].
"""

standard = """
Both @deva[श्ना] and @deva[श्नु] are optionally added after @deva[स्तम्भ्]/​@deva[स्तुम्भ्] 'to hinder', @deva[स्कम्भ्]/​@deva[स्कुम्भ्] 'to support', and @deva[स्कु] 'to go by leaps' before @deva[सार्वधातुक] affixes signifying the agent. This yields doublets: @deva[स्तभ्नाति]/​@deva[स्तभ्नोति], @deva[स्तुभ्नाति]/​@deva[स्तुभ्नोति], @deva[स्कभ्नाति]/​@deva[स्कभ्नोति], @deva[स्कुभ्नाति]/​@deva[स्कुभ्नोति], @deva[स्कुनाति]/​@deva[स्कुनोति]. These roots are @deva[सौत्र] (found in @[sūtras] rather than the @[dhātupāṭha]).
"""

advanced = """
This @[sūtra] prescribes optional @deva[श्ना] and @deva[श्नु] after @deva[स्तम्भ्], @deva[स्तुम्भ्], @deva[स्कम्भ्], @deva[स्कुम्भ्], and @deva[स्कु] before @deva[सार्वधातुक] @deva[कर्तरि] affixes. The option (@deva[विभाषा]) yields parallel paradigms: @deva[स्तभ्नाति]/​@deva[स्तभ्नोति]. These are @deva[सौत्रधातवः]—roots attested in grammatical @[sūtras] but absent from the traditional @[dhātupāṭha]. Their @deva[द्विवचन] (dual) conjugation pattern (9th and 5th class forms) is thus specifically sanctioned by this rule rather than inherited from @deva[गण] membership.
"""

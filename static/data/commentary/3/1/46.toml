id = "3.1.46"
numericId = "31046"

[en]
simple = """
This rule says that @deva[क्स] replaces @deva[च्लि] after the root @deva[श्लिष्] (to embrace, to cling) only when it means "embracing."

Example: @deva[आश्लिक्षत् कन्याम्] (he embraced the girl).

But when @deva[श्लिष्] means "joining" or "adhering" (not specifically embracing), it uses the regular @deva[सिच्] aorist instead: @deva[समाश्लिषज्जतुकाष्ठम्] (the glue joined the wood).

This is a restrictive rule—@deva[क्स] is limited to the "embracing" sense of @deva[श्लिष्].
"""

standard = """
This @deva[नियमसूत्र] (restrictive rule) specifies that @deva[क्स] replaces @deva[च्लि] after @deva[श्लिष्] only in the sense of "embracing" (@deva[आलिङ्गन]).

With @deva[क्स]: @deva[आश्लिक्षत् कन्याम्] (he embraced the girl).

Without @deva[क्स] (using @deva[सिच्]): @deva[समाश्लिषज्जतुकाष्ठम्] (the glue joined the wood)—here @deva[श्लिष्] means "to adhere/join," not "to embrace."

Though @deva[श्लिष्] meets the phonological conditions of @ref[3.1.45] (@deva[शल्]-final, @deva[इक्]-penultimate, @deva[अनिट्]), this rule restricts @deva[क्स] to semantic contexts involving embracing.
"""

advanced = """
This is a @deva[नियमसूत्र] restricting @deva[क्स] after @deva[श्लिष्] to the @deva[आलिङ्गन] (embracing) sense.

@deva[क्स]-aorist: @deva[आश्लिक्षत् कन्याम्] (embracing sense).

@deva[सिच्]-aorist: @deva[समाश्लिषज्जतुकाष्ठम्] (adherence sense).

Although @deva[श्लिष्] satisfies @ref[3.1.45]'s conditions (@deva[शल्]-final, @deva[इक्]-penultimate, @deva[अनिट्]), this rule (@deva[आलिङ्गने]) restricts the @deva[क्स] substitution to a specific semantic domain. In non-embracing senses, @deva[सिच्] applies by @ref[3.1.44].

@note[type=observation]: The root @deva[श्लिष्] has both transitive ("to embrace") and intransitive ("to cling, adhere") uses. This rule disambiguates the aorist formation based on meaning.
"""

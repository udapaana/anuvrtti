id = "3.1.143"
numericId = "31143"

[en]
simple = """
The affix @deva[ण] is **optionally** used after @deva[ग्रह्] 'to seize'.

**Two forms:**
- With @deva[ण]: @deva[ग्राहः] 'crocodile, shark' (water animals)
- With @deva[अच्]: @deva[ग्रहः] 'planet' (celestial bodies)

This is a @deva[व्यवस्थितविभाषा] (definite option): the meaning determines which affix applies.
"""

standard = """
The affix @deva[ण] is optionally used after @deva[ग्रह्] 'to seize'.

This debars @deva[अच्] (@ref[3.1.134]).

| With @deva[ण] | With @deva[अच्] |
|---------------|------------------|
| @deva[ग्राहः] 'crocodile, shark' | @deva[ग्रहः] 'planet' |

**@deva[व्यवस्थितविभाषा] (definite option):**
- @deva[ण] for water animals (crocodile, shark)
- @deva[अच्] for celestial bodies (planets)

**Derivation:** @deva[ग्रह्] + @deva[ण] = @deva[ग्रा] + @deva[अ] @ref[7.2.116] = @deva[ग्राहः]

**@[vārtika]:** Extends to @deva[भू] 'to be': @deva[भावः] 'condition' vs. @deva[भवः] 'existence'.
"""

advanced = """
The affix @deva[ण] is optionally used after @deva[ग्रह्] 'to seize'.

This debars @deva[अच्] (@ref[3.1.134]).

**Derivation:**
- @deva[ग्रह्] + @deva[ण] = @deva[ग्रा] + @deva[अ] @ref[7.2.116] = @deva[ग्राहः] 'seizing', 'crocodile'
- @deva[ग्रह्] + @deva[अच्] = @deva[ग्रहः] 'planet'

**@deva[व्यवस्थितविभाषा] (definite option):** The option is not arbitrary but determined by meaning:
- @deva[ण] → @deva[ग्राहः] for water animals (crocodile, shark)
- @deva[अच्] → @deva[ग्रहः] for celestial bodies (planets)

**@[vārtika]:** This rule extends to @deva[भू] 'to be': @deva[भावः] 'condition, state' (with @deva[ण]) vs. @deva[भवः] 'existence, being' (with @deva[अच्]).
"""

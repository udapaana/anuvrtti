id = "3.1.15"
numericId = "31015"

[en]
simple = """
The affix @deva[क्यङ्] is used after @deva[रोमन्थ] (rumination) and @deva[तपस्] (austerity) when these are the objects of repeating and performing.

**Examples:**
- @deva[रोमन्थायते गौः] = @deva[रोमन्थं वर्तयति] "the cow ruminates"
- @deva[तपस्यति] = @deva[तपश्चरति] "he performs austerity"
"""

standard = """
The @deva[क्यङ्] affix attaches to @deva[रोमन्थ] and @deva[तपस्] when used as objects of specific actions.

**@deva[रोमन्थ]:** @deva[रोमन्थं वर्तयति] = @deva[रोमन्थायते] "ruminates"

**@deva[तपस्]:** @deva[तपश्चरति] = @deva[तपस्यति] "performs austerity"

**@[vārtika] 1:** @deva[रोमन्थ] applies only to jaw movements. Thus @deva[कीटो रोमन्थं वर्तयति] (an insect) cannot take @deva[क्यङ्].

**@[vārtika] 2:** @deva[तपस्] takes @deva[परस्मैपद]: @deva[तपस्यति] (not @deva[तपस्यते]).
"""

advanced = """
@deva[क्यङ्] after @deva[रोमन्थ] and @deva[तपस्] when these are @deva[कर्मन्] of @deva[वर्तन] and @deva[चरण] respectively.

**@deva[रोमन्थ]:** @deva[रोमन्थं वर्तयति] = @deva[रोमन्थायते]

**@deva[तपस्]:** @deva[तपश्चरति] = @deva[तपस्यति]

**@[vārtika] 1:** Restricted to @deva[हन्वोः संवर्तन] (jaw movements). Excluded: @deva[कीटो रोमन्थं वर्तयति].

**@[vārtika] 2:** @deva[तपस्] + @deva[क्यङ्] takes @deva[परस्मैपद] affixes: @deva[तपस्यति]. This overrides the default @deva[आत्मनेपद] of @deva[ङित्] affixes (@ref[1.3.12]).
"""

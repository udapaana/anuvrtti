id = "3.1.114"
numericId = "31114"

[en]
simple = """
This rule lists words irregularly formed with @deva[क्यप्]: @deva[राजसूय] 'coronation sacrifice', @deva[सूर्य] 'sun', @deva[मृषोद्य] 'false speech', @deva[रुच्य] 'agreeable lover', @deva[कुप्य] 'base metal', @deva[कृष्टपच्य] 'self-ripening in cultivated land', and @deva[अव्यथ्य] 'snake' (what doesn't move by legs). These are irregular forms (@deva[निपातन]) that don't follow standard derivation rules.
"""

standard = """
The words @deva[राजसूय], @deva[सूर्य], @deva[मृषोद्य], @deva[रुच्य], @deva[कुप्य], @deva[कृष्टपच्य], and @deva[अव्यथ्य] are @deva[निपातन] (irregularly listed) with @deva[क्यप्]. Derivations: @deva[राज] + @deva[सू] + @deva[क्यप्] = @deva[राजसूयः] 'coronation sacrifice'; @deva[सृ]/​@deva[सू] + @deva[क्यप्] = @deva[सूर्यः] 'sun' (mover/impeller); @deva[मृष] + @deva[वद्] + @deva[क्यप्] = @deva[मृषोद्यम्] 'falsehood' (exception to @ref[3.1.106]); @deva[रुच्] + @deva[क्यप्] = @deva[रुच्य] 'agreeable'; @deva[गुप्] + @deva[क्यप्] = @deva[कुप्यम्] 'base metal'; @deva[न] + @deva[व्यथ्] = @deva[अव्यथ्यः] 'snake'.
"""

advanced = """
This @[sūtra] establishes @deva[निपातन] (listed irregular forms) with @deva[क्यप्]: @deva[राजसूय] (@deva[राजन्] + @deva[सू] 'to impel' + @deva[क्यप्]) 'coronation sacrifice'; @deva[सूर्य] (@deva[सृ] 'to move' or @deva[सू] 'to impel' + @deva[क्यप्]) 'sun'; @deva[मृषोद्य] (@deva[मृषा] + @deva[वद्] + @deva[क्यप्]) 'false speech'—this blocks the optional @deva[यत्] of @ref[3.1.106]; @deva[रुच्य] (@deva[रुच्] + @deva[क्यप्]) 'agreeable'; @deva[कुप्य] (@deva[गुप्] + @deva[क्यप्] with @deva[ग्] → @deva[क्] irregularly) 'base metal' (alternate: @deva[गोप्यम्]); @deva[कृष्टपच्य] (@deva[कृष्ट] + @deva[पच्] + @deva[क्यप्]) 'self-ripening in tilled land'; @deva[अव्यथ्य] (@deva[न] + @deva[व्यथ्] + @deva[क्यप्]) 'snake' (non-walker).
"""

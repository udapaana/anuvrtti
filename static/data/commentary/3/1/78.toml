id = "3.1.78"
numericId = "31078"

[en]
simple = """
This rule says that the affix @deva[श्नम्] is added after roots of the @deva[रुधादि] class (7th conjugation) when a @deva[सार्वधातुक] affix denoting the agent follows.

This @deva[श्नम्] blocks the general @deva[शप्] affix.

The key feature of @deva[श्नम्]: the @deva[म्] indicates that the @deva[न] is inserted after the last vowel of the root (by @ref[1.1.47]). This creates the characteristic nasal infix of the 7th class.

Example derivation: @deva[रुध्] + @deva[श्नम्] + @deva[तिप्] → @deva[रुध्] + @deva[न] + @deva[ति] → @deva[रु] + @deva[न] + @deva[ध्] + @deva[ति] → @deva[रुणद्धि] (he obstructs).

Similarly: @deva[भिद्] + @deva[श्नम्] + @deva[ति] → @deva[भिनत्ति] (he splits).
"""

standard = """
The affix @deva[श्नम्] is added after @deva[रुधादि] (7th class) roots when @deva[सार्वधातुक] follows in @deva[कर्तरि]. This @deva[विकरण] replaces @deva[शप्] for this class.

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्], making this @deva[सार्वधातुक] by @ref[3.4.113]; also triggers @ref[6.4.23]
- @deva[म्] is @deva[इत्] by @ref[1.3.3], indicating by @ref[1.1.47] that @deva[न] is placed after the final vowel of the root (nasal infix)
- Operative portion: @deva[न]

Derivation: @deva[रुध्] + @deva[श्नम्] + @deva[तिप्] → @deva[रु] + @deva[न] + @deva[ध्] + @deva[ति] → @deva[रुणद्धि].

Examples: @deva[रुणद्धि] (he obstructs), @deva[भिनत्ति] (he splits), @deva[युनक्ति] (he joins).
"""

advanced = """
The affix @deva[श्नम्] is introduced after @deva[रुधादि] (@deva[गण] 7) roots when @deva[सार्वधातुक] follows in @deva[कर्तरि]. This is the @deva[विकरण] for the 7th conjugational class.

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्] by @ref[1.3.8], triggering @ref[3.4.113] (@deva[सार्वधातुक]) and @ref[6.4.23] (@deva[शश्च])
- @deva[म्] is @deva[इत्] by @ref[1.3.3], triggering @ref[1.1.47] @deva[मिदचोऽन्त्यात् परः] (placement after final vowel)
- Operative: @deva[न]

Derivation: @deva[रुध्] → @deva[रु] | @deva[न] | @deva[ध्] (infix by @deva[मित्]) + @deva[ति] → @deva[रुणद्धि] (with @deva[ण] by @ref[8.4.14]).

Examples: @deva[रुणद्धि], @deva[भिनत्ति], @deva[युनक्ति], @deva[पिनष्टि].

@note[type=observation]: @deva[रुधादि] is unique in having a nasal infix (@deva[श्नम्]) rather than a suffix. The @deva[मित्] indicator (@deva[म्] as @deva[इत्]) signals this infixation pattern, distinguishing @deva[श्नम्] from other @deva[विकरण]s.
"""

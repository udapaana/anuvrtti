id = "3.1.113"
numericId = "31113"

[en]
simple = """
This rule says that the affix @deva[क्यप्] is optionally used after the root @deva[मृज्] 'to cleanse'. By @ref[3.1.110], @deva[मृज्] (having penultimate @deva[ऋ]) would normally take @deva[क्यप्]; this rule makes it optional. Examples: @deva[परिमृज्यः] (with @deva[क्यप्]) or @deva[परिमार्ग्यः] (with @deva[ण्यत्]) 'to be cleansed'.
"""

standard = """
The affix @deva[क्यप्] is optionally used after @deva[मृज्] 'to cleanse/wipe'. This is a @deva[प्राप्तविभाषा] (exception creating option where a rule would otherwise be obligatory). By @ref[3.1.110], @deva[ऋदुपधा] roots take @deva[क्यप्]; this @[sūtra] makes it optional for @deva[मृज्]. Derivations: @deva[परिमृज्यः] (@deva[क्यप्]); @deva[परि] + @deva[मृज्] + @deva[ण्यत्] → @deva[परिमृग्य] (@ref[7.3.52]) → @deva[परिमार्ग्य] (@ref[7.2.114] @[vṛddhi]) 'to be cleansed'.
"""

advanced = """
This @[sūtra] establishes @deva[विभाषा] for @deva[क्यप्] after @deva[मृज्], creating an exception to the obligatory @deva[क्यप्] of @ref[3.1.110] for @deva[ऋदुपधा] roots. This is @deva[प्राप्तविभाषा]—where a rule that would otherwise necessarily apply is made optional. Derivations: (1) @deva[परि] + @deva[मृज्] + @deva[क्यप्] → @deva[परिमृज्य]; (2) @deva[परि] + @deva[मृज्] + @deva[ण्यत्] → @deva[परिमृग्य] (by @ref[7.3.52] @deva[च्छ्वोः शूड्] → @deva[ज्] → @deva[ग्]) → @deva[परिमार्ग्य] (by @ref[7.2.114] @[vṛddhi] @deva[ऋ] → @deva[आर्]). Both forms mean 'to be cleansed'.
"""

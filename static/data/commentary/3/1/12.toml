id = "3.1.12"
numericId = "31012"

[en]
simple = """
The affix @deva[क्यङ्] is used after words in the @deva[भृशादि] class to express "becoming what one was not before." If the word ends in a consonant, that consonant is deleted.

**Examples:**
- @deva[भृशायते] "becomes much" (from being little)
- @deva[शीघ्रायते] "becomes swift" (from being slow)

These verbs are always @deva[आत्मनेपद] (middle voice).
"""

standard = """
The @deva[क्यङ्] affix attaches to words of the @deva[भृशादि] class (not taking @deva[च्वि]) to express @deva[अभूततद्भाव] - becoming what one previously was not.

**Final consonant deletion:** @deva[भृश्] -> @deva[भृशायते], @deva[शीघ्र] -> @deva[शीघ्रायते].

**Always @deva[आत्मनेपद]:** By @ref[1.3.12], verbs formed with @deva[ङित्] affixes take @deva[आत्मनेपद].

**The @deva[भृशादि] class includes:** @deva[भृश्], @deva[शीघ्र], @deva[मन्द], @deva[चपल], @deva[पण्डित], @deva[उत्सुक], etc.
"""

advanced = """
@deva[क्यङ्] forms denominatives expressing @deva[अभूततद्भाव] from @deva[भृशादि] words not taking @deva[च्वि].

**@deva[हललोप]:** Final consonant is deleted: @deva[भृश्] -> @deva[भृशायते].

**@deva[आत्मनेपद] only:** By @ref[1.3.12], the @deva[ङ्] marker makes these @deva[आत्मनेपद].

**The @deva[अच्वेः] condition:** @deva[भृशादि] words never take @deva[च्वि] (@ref[5.4.50]) in @deva[अभूततद्भाव] sense; this is an @deva[अपवाद] to @ref[5.4.50].

**@deva[भृशादि]:** @deva[भृश्], @deva[शीघ्र], @deva[मन्द], @deva[चपल], @deva[पण्डित], @deva[उत्सुक], @deva[उन्मनस्], @deva[सुमनस्], @deva[दुर्मनस्], @deva[रहस्], @deva[शश्वत्], @deva[ओजस्], @deva[वर्चस्], etc.
"""

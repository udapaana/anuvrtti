id = "3.1.79"
numericId = "31079"

[en]
simple = """
This rule says that the affix @deva[उ] is added after roots of the @deva[तनादि] class (8th conjugation) and after the root @deva[कृ] 'to make', when an affix marking the agent follows. This replaces the default @deva[शप्]. For example: @deva[तन्] + @deva[उ] + @deva[ति] = @deva[तनोति] 'he expands'; @deva[कृ] + @deva[उ] + @deva[ति] = @deva[करोति] 'he makes'.
"""

standard = """
The affix @deva[उ] is added after @deva[तनादि] (8th class) roots and after @deva[कृ] 'to make', when a @deva[सार्वधातुक] affix signifying the agent follows. This replaces the default @deva[शप्] (@ref[3.1.68]). Though @deva[कृ] appears in the @deva[तनादि] list, its separate mention here restricts it: @deva[कृ] takes @deva[उ] but does not undergo other @deva[तनादि] operations. Thus @ref[2.4.79] does not apply to @deva[कृ], giving aorist forms @deva[अकृत] and @deva[अकृत्याः] with obligatory @deva[सिच्] deletion.
"""

advanced = """
The affix @deva[उ] is prescribed after @deva[तनादि] (@deva[गण] 8) roots and after @deva[कृ] 'to make' before @deva[सार्वधातुक] affixes signifying @deva[कर्तृ]. This replaces the general @deva[शप्] of @ref[3.1.68]. The separate mention of @deva[कृ] (despite its inclusion in the @deva[तनादिगण]) creates a @deva[नियम]: @deva[कृ] is @deva[तनादि] only for the purpose of taking @deva[उ], not for other @deva[तनादि]-specific operations. Consequently, @ref[2.4.79] (@deva[तनादिकृञ्भ्य उः]) does not apply to @deva[कृ] regarding @deva[सिच्] deletion optionality—the deletion is obligatory, yielding @deva[अकृत], @deva[अकृत्याः].
"""

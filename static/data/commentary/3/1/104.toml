id = "3.1.104"
numericId = "31104"

[en]
simple = """
The word @deva[उपसर्या] is an irregular formation meaning "a female animal that has reached the time for first conception" — specifically, a cow or mare ready for breeding. It comes from @deva[उप] + @deva[सृ] (to go/approach) + @deva[यत्].

For example, @deva[उपसर्या गौः] means "a cow ready for the bull" and @deva[उपसर्या वडवा] means "a mare ready for the horse."

When the meaning is simply "approachable" without the breeding connotation, the regular @deva[ण्यत्] form applies with @[vṛddhi]: @deva[उपसार्या शरदि मधुरा] means "@[madhurā] (the city) is approachable in autumn."
"""

standard = """
This is a @deva[निपातन] prescribing @deva[उपसर्या] from @deva[उप] + @deva[सृ] "to go/approach" + @deva[यत्] (instead of @deva[ण्यत्]) when the meaning is @deva[काल्या प्रजनम्] — having reached the time for first conception/breeding.

Examples: @deva[उपसर्या गौः] "a cow ready for breeding"; @deva[उपसर्या वडवा] "a mare ready for breeding." The feminine gender (@deva[उपसर्या]) is inherent to this meaning, since the term applies only to female animals in oestrus.

When meaning simply "approachable," the regular @deva[ण्यत्] applies with @[vṛddhi]: @deva[उपसार्या शरदि मधुरा] "@[madhurā] is approachable in autumn."
"""

advanced = """
@[anuvṛtti]: The @deva[कृत्य] context from @ref[3.1.96].

This @[sūtra] establishes @deva[उपसर्या] as @deva[निपातन] from @deva[उप] + @deva[सृ] + @deva[यत्] under the semantic condition @deva[काल्यायां प्रजनम्] — having reached the time suitable for first breeding. The expected form @deva[उपसार्या] (with @deva[ण्यत्] and @[vṛddhi] by @ref[7.2.115]) applies in all other senses.

The semantic restriction limits the irregular form to female animals in oestrus. The feminine gender is intrinsic to this meaning. In the general "approachable" sense — applicable to cities, locations, or persons — @deva[ण्यत्] yields @deva[उपसार्या] regularly. This follows the pattern of meaning-restricted @deva[निपातन] forms seen in @ref[3.1.101]--@ref[3.1.103].
"""

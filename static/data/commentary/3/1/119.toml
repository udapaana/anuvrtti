id = "3.1.119"
numericId = "31119"

[en]
simple = """
This rule says that @deva[ग्रह्] 'to seize' takes @deva[क्यप्] when the derivative means: (1) a grammatical word (@deva[शब्द])—like @deva[प्रगृह्यम्] 'pragrihya words' (not subject to sandhi, defined in @ref[1.1.11]); (2) a dependent (@deva[अस्वैरिन्])—@deva[गृह्यकाः शुकाः] 'captive parrots'; (3) outside (@deva[बाह्य])—@deva[ग्रामगृह्या सेना] 'army outside the village'; (4) a partisan (@deva[पक्ष्य])—@deva[वासुदेवगृह्याः] 'partisans of @[vāsudeva]'.
"""

standard = """
The root @deva[ग्रह्] takes @deva[क्यप्] when meaning: @deva[शब्द] (word)—@deva[प्रगृह्यम्], @deva[अवगृह्यम्] (pragrihya words per @ref[1.1.11]); @deva[अस्वैरिन्] (dependent/captive)—@deva[गृह्यकाः शुकाः] 'captive parrots'; @deva[बाह्य] (external/outside)—@deva[ग्रामगृह्या सेना] 'army stationed outside the village' (feminine @deva[बाह्या] indicates the derivative must be feminine); @deva[पक्ष्य] (partisan)—@deva[वासुदेवगृह्याः] '@[vāsudeva]'s partisans', @deva[अर्जुनगृह्याः] 'Arjuna's followers'.
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] for @deva[ग्रह्] in four semantic domains: (1) @deva[शब्दे]—@deva[प्रगृह्य], @deva[अवगृह्य] as grammatical technical terms (pragrihya vowels per @ref[1.1.11]); (2) @deva[अस्वैरिणि]—'dependent/not-free': @deva[गृह्यकाः] 'captives'; (3) @deva[बाह्ये]—'external': @deva[ग्रामगृह्या सेना] 'army outside village'—the feminine @deva[बाह्या] restricts this sense to feminine derivatives; (4) @deva[पक्ष्ये]—'partisan': @deva[वासुदेवगृह्याः], @deva[अर्जुनगृह्याः]. Outside these specific senses, @deva[ण्यत्] applies: @deva[ग्राह्यम्].
"""

id = "3.1.89"
numericId = "31089"

[en]
simple = """
This rule says that the affixes @deva[यक्] and @deva[चिण्] are not used with the roots @deva[दुह्] 'to milk', @deva[स्नु] 'to drip', and @deva[नम्] 'to bow' in reflexive constructions. For @deva[दुह्], @deva[चिण्] is optionally used by @ref[3.1.63]. Examples: @deva[दुग्धे]/​@deva[अदुग्ध] or @deva[अदोहि] 'the cow flows by itself'; @deva[प्रस्नुते]/​@deva[प्रास्नीष्ट] 'it drips'; @deva[नमते]/​@deva[अनंस्त] 'it bends by itself'.
"""

standard = """
The affixes @deva[यक्] (@ref[3.1.67]) and @deva[चिण्] (@ref[3.1.66]) are prohibited for @deva[दुह्] 'to milk', @deva[स्नु] 'to drip', and @deva[नम्] 'to bow' in @deva[कर्मवद्भाव] (reflexive) constructions. For @deva[दुह्], only @deva[यक्] is blocked; @deva[चिण्] remains optional per @ref[3.1.63]: @deva[दुग्धे]/​@deva[अदुग्ध] or @deva[अदोहि गौः स्वयमेव]. For @deva[स्नु]: @deva[प्रस्नुते]/​@deva[प्रास्नीष्ट]. For @deva[नम्]: @deva[नमते]/​@deva[अनंस्त दण्डः स्वयमेव]. This prohibition extends to @deva[णिच्]-derivatives, @deva[श्रन्थ्], @deva[मन्थ्], @deva[ब्रू], and @deva[आत्मनेपदिन्] intransitives.
"""

advanced = """
This @[sūtra] prohibits @deva[यक्] and @deva[चिण्] for @deva[दुह्], @deva[स्नु], @deva[नम्] in @deva[कर्मवद्भाव] contexts. For @deva[दुह्], only @deva[यक्] is blocked; @deva[चिण्] remains optionally available per @ref[3.1.63] (@deva[दुहश्च]). The prohibition extends (by @deva[वार्तिक]) to: (1) @deva[णिजन्त] forms: @deva[कारयते]/​@deva[अचीकरत्]; (2) @deva[श्रन्थ्], @deva[मन्थ्]: @deva[श्रथ्नीते]/​@deva[अश्रथ्निष्ट]; (3) @deva[ब्रू]: @deva[ब्रूते]/​@deva[अवोचत्]; (4) @deva[आत्मनेपदिन्] intransitives: @deva[आहते]/​@deva[आवधिष्ट माणवकः स्वयमेव]. The rationale is that these verbs' reflexive meaning is adequately expressed through @deva[आत्मनेपद] without @deva[यक्].
"""

id = "3.1.61"
numericId = "31061"

[en]
simple = """
This rule says that @deva[चिण्] optionally replaces @deva[च्लि] when the third person singular @deva[आत्मनेपद] ending @deva[त] follows after the roots: @deva[दीप्] (to shine), @deva[जन्] (to be produced), @deva[बुध्] (to know), @deva[पूर्] (to be full), @deva[ताय्] (to extend/protect), and @deva[प्याय्] (to grow/smell).

Since @deva[चिण्] is optional, both forms are correct:
- @deva[दीप्]: @deva[अदीपि] (@deva[चिण्]) or @deva[अदीपिष्ट] (@deva[सिच्])
- @deva[जन्]: @deva[अजनि] or @deva[अजनिष्ट]
- @deva[बुध्]: @deva[अबोधि] or @deva[अबुद्ध]
- @deva[पूर्]: @deva[अपूरि] or @deva[अपूरिष्ट]
- @deva[ताय्]: @deva[अतायि] or @deva[अतायिष्ट]
- @deva[प्याय्]: @deva[अप्यायि] or @deva[अप्यायिष्ट]
"""

standard = """
@deva[चिण्] optionally (@deva[विभाषा]) substitutes for @deva[च्लि] after @deva[दीप्], @deva[जन्], @deva[बुध्], @deva[पूर्], @deva[ताय्], and @deva[प्याय्] when @deva[आत्मनेपद] 3rd singular @deva[त] follows.

Alternate forms (@deva[चिण्] / @deva[सिच्]):
- @deva[दीप्]: @deva[अदीपि] / @deva[अदीपिष्ट]
- @deva[जन्]: @deva[अजनि] / @deva[अजनिष्ट]
- @deva[बुध्]: @deva[अबोधि] / @deva[अबुद्ध]
- @deva[पूर्]: @deva[अपूरि] / @deva[अपूरिष्ट]
- @deva[ताय्]: @deva[अतायि] / @deva[अतायिष्ट]
- @deva[प्याय्]: @deva[अप्यायि] / @deva[अप्यायिष्ट]

The @deva[चिण्] forms show @deva[वृद्धि] of the root vowel and deletion of @deva[त] by @ref[6.4.104].
"""

advanced = """
@deva[चिण्] optionally applies after @deva[दीप्], @deva[जन्], @deva[बुध्], @deva[पूर्], @deva[ताय्], and @deva[प्याय्] when @deva[आत्मनेपद] 3rd singular @deva[त] follows.

Alternate forms (@deva[चिण्] / @deva[सिच्]):
- @deva[दीप्]: @deva[अदीपि] / @deva[अदीपिष्ट]
- @deva[जन्]: @deva[अजनि] / @deva[अजनिष्ट]
- @deva[बुध्]: @deva[अबोधि] / @deva[अबुद्ध]
- @deva[पूर्]: @deva[अपूरि] / @deva[अपूरिष्ट]
- @deva[ताय्]: @deva[अतायि] / @deva[अतायिष्ट]
- @deva[प्याय्]: @deva[अप्यायि] / @deva[अप्यायिष्ट]

@deva[चिण्] triggers @deva[वृद्धि] by @ref[7.2.1], and @deva[त] undergoes @deva[लोप] by @ref[6.4.104].

@note[type=observation]: These roots are typically intransitive, making the @deva[चिण्]-aorist (normally passive-like) semantically appropriate. The optionality reflects variation between the @deva[चिण्] and @deva[सिच्] formations for these intransitive verbs.
"""

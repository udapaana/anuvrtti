id = "3.1.42"
numericId = "31042"

[en]
simple = """
This rule lists six irregular Vedic forms that use the @deva[आम्] affix in unexpected ways:

1. @deva[अभ्युत्सादयामकः] – aorist of causative @deva[सद्] (to sit) + @deva[आम्] + auxiliary @deva[अकः]
2. @deva[प्रजनयामकः] – aorist of causative @deva[जन्] (to be born) + @deva[आम्] + @deva[अकः]
3. @deva[चिकयामकः] – aorist of @deva[चि] (to collect) with reduplication and @deva[च] → @deva[क] + @deva[आम्] + @deva[अकः]
4. @deva[रमयामकः] – aorist of causative @deva[रम्] (to sport) + @deva[आम्] + @deva[अकः]
5. @deva[पावयांक्रियाद्] – potential of causative @deva[पू] (to purify) + @deva[आम्] + auxiliary @deva[क्रियात्]
6. @deva[विदामक्रन्] – aorist of @deva[विद्] (to know) + @deva[आम्] + auxiliary @deva[अक्रन्]

These are archaic Vedic forms. The modern classical equivalents are: @deva[अभ्युदसीषदत्], @deva[प्राजीजनत्], @deva[अचैषीत्], @deva[अरीरमत्], @deva[पाव्याद], @deva[अवेदिषुः].
"""

standard = """
This rule records six irregular Vedic forms using @deva[आम्] with various tenses:

1. @deva[अभ्युत्सादयामकः] – @deva[लुङ्] (aorist) of @deva[णिच्]-derived @deva[सद्] + @deva[आम्] + @deva[अकः]
2. @deva[प्रजनयामकः] – @deva[लुङ्] of @deva[णिच्]-derived @deva[जन्] + @deva[आम्] + @deva[अकः]
3. @deva[चिकयामकः] – @deva[लुङ्] of @deva[चि] (with reduplication, @deva[च] → @deva[क]) + @deva[आम्] + @deva[अकः]
4. @deva[रमयामकः] – @deva[लुङ्] of @deva[णिच्]-derived @deva[रम्] + @deva[आम्] + @deva[अकः]
5. @deva[पावयांक्रियाद्] – @deva[लिङ्] (potential) of @deva[णिच्]-derived @deva[पू] + @deva[आम्] + @deva[क्रियात्]
6. @deva[विदामक्रन्] – @deva[लुङ्] of @deva[विद्] + @deva[आम्] + @deva[अक्रन्]

Modern equivalents: @deva[अभ्युदसीषदत्], @deva[प्राजीजनत्], @deva[अचैषीत्], @deva[अरीरमत्], @deva[पाव्याद], @deva[अवेदिषुः].

These forms extend @deva[आम्] beyond its standard @deva[लिट्] domain to @deva[लुङ्] and @deva[लिङ्] in Vedic usage.
"""

advanced = """
This @deva[निपातन] (irregular listing) records six archaic Vedic forms using @deva[आम्] in tenses beyond the standard @deva[लिट्] domain:

1. @deva[अभ्युत्सादयामकः] – @deva[लुङ्] of @deva[सद्] + @deva[णिच्] + @deva[आम्] + auxiliary @deva[अकः]
2. @deva[प्रजनयामकः] – @deva[लुङ्] of @deva[जन्] + @deva[णिच्] + @deva[आम्] + @deva[अकः]
3. @deva[चिकयामकः] – @deva[लुङ्] of @deva[चि] (reduplicated, @deva[च] → @deva[क]) + @deva[आम्] + @deva[अकः]
4. @deva[रमयामकः] – @deva[लुङ्] of @deva[रम्] + @deva[णिच्] + @deva[आम्] + @deva[अकः]
5. @deva[पावयांक्रियाद्] – @deva[लिङ्] of @deva[पू] + @deva[णिच्] + @deva[आम्] + @deva[क्रियात्]
6. @deva[विदामक्रन्] – @deva[लुङ्] of @deva[विद्] + @deva[आम्] + @deva[अक्रन्]

Classical equivalents: @deva[अभ्युदसीषदत्], @deva[प्राजीजनत्], @deva[अचैषीत्], @deva[अरीरमत्], @deva[पाव्याद], @deva[अवेदिषुः].

@note[type=observation]: The extension of @deva[आम्] to @deva[लुङ्] and @deva[लिङ्] is uniquely Vedic (@deva[छन्दसि]). Classical Sanskrit restricts @deva[आम्] to @deva[लिट्] (and optionally @deva[लोट्] for @deva[विद्] per @ref[3.1.41]).
"""

id = "3.1.83"
numericId = "31083"

[en]
simple = """
This rule says that @deva[शानच्] replaces @deva[श्ना] when a root ends in a consonant and the affix @deva[हि] (2nd person singular imperative) follows. For example: @deva[पुष्] + @deva[आन] + @deva[हि] = @deva[पुषाण] 'do nourish!'; @deva[ग्रह्] + @deva[आन] + @deva[हि] = @deva[गृहाण] 'do take!' But @deva[क्री] + @deva[ना] + @deva[हि] = @deva[क्रीणीहि] 'do buy!' keeps @deva[श्ना] because the root ends in a vowel.
"""

standard = """
The affix @deva[शानच्] substitutes for @deva[श्ना] after consonant-final roots when @deva[हि] (2nd singular imperative from @deva[लोट्]) follows. The @deva[श्] and @deva[च्] are @deva[इत्] markers, leaving @deva[आन] as the replacement. Examples: @deva[पुष्] + @deva[आन] = @deva[पुषाण] 'nourish!'; @deva[ग्रह्] + @deva[आन] = @deva[गृहाण] 'take!' Vowel-final roots retain @deva[श्ना]: @deva[क्री] + @deva[ना] + @deva[हि] = @deva[क्रीणीहि] 'buy!' The repetition of @deva[श्ना] in the @[sūtra] indicates @deva[शानच्] is a substitute (@deva[आदेश]), not an independent affix.
"""

advanced = """
The affix @deva[शानच्] is prescribed as @deva[आदेश] for @deva[श्ना] after @deva[हलन्त] (consonant-final) roots when @deva[हि] (2nd singular @deva[लोट्]) follows. The @deva[श्] marks @deva[सार्वधातुकत्व], while @deva[च्] indicates @deva[पित्] status. The explicit mention of @deva[श्ना] (@deva[श्नाभ्यस्तयोरातः]) signals that @deva[शानच्] functions as a substitute, inheriting the properties of @deva[श्ना]. Derivations: @deva[पुष्] + @deva[आन] → @deva[पुषाण]; @deva[ग्रह्] + @deva[आन] → @deva[गृहाण] (with @[samprasāraṇa]). Vowel-final roots like @deva[क्री] retain @deva[श्ना]: @deva[क्रीणीहि].
"""

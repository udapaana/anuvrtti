id = "3.1.130"
numericId = "31130"

[en]
simple = """
The words @deva[कुण्डपाय्यः] and @deva[सञ्चाय्यः] are **irregularly** formed when meaning 'a sacrifice'.

- @deva[कुण्डपाय्यः] 'the sacrifice in which Soma is drunk with a bowl'
- @deva[सञ्चाय्यः] 'the sacrifice in which Soma is collected'

**Regular forms (when not meaning sacrifice):**
- @deva[कुण्डपानम्] 'drinking from a bowl'
- @deva[सञ्चेयः] 'to be collected'
"""

standard = """
The words @deva[कुण्डपाय्यः] and @deva[सञ्चाय्यः] are **irregularly** formed when meaning 'a sacrifice'.

| Irregular | Meaning | Derivation | Regular form |
|-----------|---------|------------|-------------|
| @deva[कुण्डपाय्यः] | Soma sacrifice (drunk from bowl) | @deva[कुण्ड] + @deva[पा] + @deva[यत्] + extra @deva[य] | @deva[कुण्डपानम्] |
| @deva[सञ्चाय्यः] | Soma sacrifice (Soma collected) | @deva[सम्] + @deva[चि] + @deva[ण्यत्] | @deva[सञ्चेयः] |

**Technical notes:**
- @deva[कुण्डपाय्यः]: extra @deva[य] added by @ref[7.3.33]; accent on first syllable by @ref[6.1.213]
- Both forms apply specifically to sacrificial contexts
"""

advanced = """
The words @deva[कुण्डपाय्यः] and @deva[सञ्चाय्यः] are irregularly formed when meaning 'a sacrifice'.

**@deva[कुण्डपाय्यः]** 'the sacrifice in which Soma is drunk with a bowl':
- @deva[कुण्ड] + @deva[पा] 'to drink' + @deva[यत्] = @deva[कुण्ड] + @deva[पा] + @deva[य] + @deva[य] @ref[7.3.33] = @deva[कुण्डपाय्यः]
- Accent falls on the first syllable by @ref[6.1.213]

**@deva[सञ्चाय्यः]** 'the sacrifice in which Soma is collected':
- @deva[सम्] + @deva[चि] 'to collect' + @deva[ण्यत्] = @deva[सञ्चाय्यः]

**Semantic restriction:** These irregular forms apply only when denoting specific sacrifices.

**Regular forms (when not meaning sacrifice):**
- @deva[कुण्डपानम्] 'drinking from a bowl'
- @deva[सञ्चेयः] 'to be collected'
"""

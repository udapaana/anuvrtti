id = "3.1.100"
numericId = "31100"

[en]
simple = """
This rule says that the affix @deva[यत्] is added after @deva[गद्] 'to speak', @deva[मद्] 'to be intoxicated', @deva[चर्] 'to go, eat', and @deva[यम्] 'to restrain', when these roots are not preceded by a preposition. Examples: @deva[गद्यम्] 'prose' (what is to be spoken); @deva[मद्यम्] 'wine'; @deva[चर्यम्] 'what is to be followed'; @deva[यम्यम्] 'what is to be restrained'. With a preposition, they take @deva[ण्यत्]: @deva[प्रगाद्यम्], @deva[प्रमाद्यम्].
"""

standard = """
The affix @deva[यत्] is added after @deva[गद्] 'to speak', @deva[मद्] 'to be intoxicated', @deva[चर्] 'to move/eat', and @deva[यम्] 'to restrain' when not compounded with an @deva[उपसर्ग] (preposition). Examples: @deva[गद्यम्] 'prose', @deva[मद्यम्] 'wine', @deva[चर्यम्] 'to be followed', @deva[यम्यम्] 'to be restrained'. With @deva[उपसर्ग], they take @deva[ण्यत्]: @deva[प्रगाद्यम्], @deva[प्रमाद्यम्]. Though @deva[यम्] would qualify under @ref[3.1.98], its mention here restricts @deva[यत्] to simple roots. @note[type=@[vārtika]] @deva[आङ्] + @deva[चर्] takes @deva[यत्] when not meaning 'teacher': @deva[आचर्यो देशः] 'accessible land'; but @deva[आचार्यः] 'teacher' uses @deva[ण्यत्].
"""

advanced = """
This @[sūtra] prescribes @deva[यत्] for @deva[गद्], @deva[मद्], @deva[चर्], @deva[यम्] in @deva[अनुपसर्गे] (without prefix). Derivations: @deva[गद्यम्] 'prose', @deva[मद्यम्] 'wine', @deva[चर्यम्], @deva[यम्यम्]. With @deva[उपसर्ग], @deva[ण्यत्] applies: @deva[प्रगाद्यम्]. For @deva[यम्] (already qualifying under @ref[3.1.98] as @deva[अत्पूर्वपवर्गान्त]), this enumeration creates a @deva[नियम]: @deva[यत्] only without prefix; @deva[संयम्य] etc. take @deva[ण्यत्]. @note[type=@[vārtika]] @deva[आङ्पूर्वाच्चरेरनाचार्ये]: @deva[आ] + @deva[चर्] + @deva[यत्] → @deva[आचर्यः] when not denoting @deva[आचार्य] 'teacher'; for 'teacher' sense, @deva[ण्यत्] → @deva[आचार्यः] (with @[vṛddhi]).
"""

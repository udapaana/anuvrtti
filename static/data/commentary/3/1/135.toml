id = "3.1.135"
numericId = "31135"

[en]
simple = """
The affix @deva[क] (= @deva[अ]) is used after:

1. **Consonant-final roots with @deva[इक्] penultimate** (@deva[इ], @deva[उ], @deva[ऋ]):
   - @deva[विक्षिप्] → @deva[विक्षिपः]
   - @deva[बुध्] → @deva[बुधः] 'who knows'

2. **Roots @deva[ज्ञा], @deva[प्री], @deva[कॄ]:**
   - @deva[ज्ञा] → @deva[ज्ञः] 'knower'
   - @deva[प्री] → @deva[प्रियः] 'dear, pleasing'
   - @deva[कॄ] → @deva[किरः] 'scatterer, hog'
"""

standard = """
The affix @deva[क] (= @deva[अ]) is used after:

**1. Consonant-final roots with @deva[इक्] penultimate:**
- @deva[विक्षिप्] + @deva[क] = @deva[विक्षिपः]
- @deva[विलिख्] + @deva[क] = @deva[विलिखः] 'inscription'
- @deva[बुध्] + @deva[क] = @deva[बुधः] 'who knows'
- @deva[कृश्] + @deva[क] = @deva[कृशः] 'lean'

**2. Roots @deva[ज्ञा], @deva[प्री], @deva[कॄ]:**
- @deva[ज्ञा] + @deva[क] = @deva[ज्ञः] @ref[6.4.64] 'knower'
- @deva[प्री] + @deva[क] = @deva[प्रियः] 'dear, pleasing'
- @deva[कॄ] + @deva[क] = @deva[कि] + @deva[अ] @ref[7.1.100] = @deva[किरः] @ref[1.1.51] 'scatterer, hog'

**Note:** @deva[देव], @deva[सेव], @deva[मेष] take @deva[अच्] (from @deva[पचादि] @ref[3.1.134]), not @deva[क].
"""

advanced = """
The affix @deva[क] (= @deva[अ]) comes after:

**1. Consonant-final roots with penultimate @deva[इक्]** (@deva[इ], @deva[उ], @deva[ऋ]—short or long):
- @deva[विक्षिप्] + @deva[क] = @deva[विक्षिपः]
- @deva[विलिख्] + @deva[क] = @deva[विलिखः] 'inscription'
- @deva[बुध्] + @deva[क] = @deva[बुधः] 'who knows'
- @deva[कृश्] + @deva[क] = @deva[कृशः] 'lean'

**2. Roots @deva[ज्ञा], @deva[प्री], @deva[कॄ]:**
- @deva[ज्ञा] + @deva[क] = @deva[ज्ञः] 'who knows' (long @deva[आ] elided by @ref[6.4.64])
- @deva[प्री] + @deva[क] = @deva[प्रियः] 'what pleases'
- @deva[कॄ] + @deva[क] = @deva[कि] + @deva[अ] @ref[7.1.100] = @deva[किर्] + @deva[अ] @ref[1.1.51] = @deva[किरः] 'who scatters, a hog'

**Note:** The words @deva[देव] 'God', @deva[सेव] 'service', and @deva[मेष] 'ram' are formed with @deva[अच्] from @deva[पचादि] @ref[3.1.134], not @deva[क].
"""

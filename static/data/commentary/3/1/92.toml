id = "3.1.92"
numericId = "31092"

[en]
simple = """
This rule defines what an @deva[उपपद] is within the third chapter. When a word is shown in the @deva[सप्तमी] (locative) case (7th) in a @[sūtra] about verbal roots, the word it implies is called an @deva[उपपद] (dependent word). For example, in the @[sūtra] @deva[कर्मण्यण्], the locative @deva[कर्मणि] implies an accusative object; this object word becomes the @deva[उपपद]. Example: @deva[कुम्भम्] + @deva[कृ] + @deva[अण्] = @deva[कुम्भकारः] 'potter'—here @deva[कुम्भम्] is the @deva[उपपद].
"""

standard = """
Within the third @deva[अध्याय], when a term appears in the locative (@deva[सप्तमी]) in @[sūtras] dealing with @deva[धातु]s, the word implied by that locative is called @deva[उपपद] (dependent word). For instance, @ref[3.2.1] @deva[कर्मण्यण्] has @deva[कर्मणि] in locative; the accusative object implied is the @deva[उपपद]. Example: @deva[कुम्भम्] + @deva[कृ] + @deva[अण्] = @deva[कुम्भकारः] 'potter'—the object @deva[कुम्भम्] functions as @deva[उपपद] conditioning the affix @deva[अण्].
"""

advanced = """
This @[sūtra] establishes the technical term @deva[उपपद] for the third @deva[अध्याय]. When a @deva[सप्तम्यन्त] (locative) term appears in a @deva[धातु]-governing @[sūtra], the word denoted by that locative becomes the @deva[उपपद]. The @deva[उपपद] is a syntactically dependent element that conditions @deva[कृत्] affix selection. In @ref[3.2.1] @deva[कर्मण्यण्], @deva[कर्मणि] implies the @deva[द्वितीयान्त] (accusative) word; this accusative becomes @deva[उपपद]. Derivation: @deva[कुम्भम्] (@deva[उपपद]) + @deva[कृ] + @deva[अण्] → @deva[कुम्भकारः]. The @deva[उपपद] compounds with the @deva[कृदन्त] by @ref[2.2.19] @deva[उपपदमतिङ्].
"""

id = "3.1.107"
numericId = "31107"

[en]
simple = """
This rule says that after the root @deva[भू] 'to be', when it has a case-inflected @deva[उपपद] and no preposition, the affix @deva[क्यप्] is used to denote condition (@deva[भाव]). Examples: @deva[ब्रह्मभुवम्] = @deva[ब्रह्मत्वम्] 'Brahmanhood'; @deva[देवभुवम्] = @deva[देवत्वम्] 'divinity'. Without @deva[उपपद], @deva[यत्] applies: @deva[भव्यम्]. With preposition: @deva[प्रभव्यम्].
"""

standard = """
After @deva[भू] 'to be' with a @deva[सुबन्त] @deva[उपपद] and without @deva[उपसर्ग], the affix @deva[क्यप्] is used to denote @deva[भाव] (abstract condition/state). The @deva[अनुवृत्ति] of @deva[यत्] does not extend here. Examples: @deva[ब्रह्मभुवम्] (= @deva[ब्रह्मत्वं गतः]) 'attained Brahmanhood'; @deva[देवभुवम्] (= @deva[देवत्वं गतः]) 'attained divinity'. The word @deva[भाव] governs subsequent @[sūtras]. Without @deva[सुबन्तोपपद]: @deva[भू] + @deva[यत्] = @deva[भव्यम्] (by @ref[6.1.79]). With @deva[उपसर्ग]: @deva[प्रभव्यम्].
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] for @deva[भू] with @deva[सुबन्तोपपद], without @deva[उपसर्ग], in @deva[भाव] (abstract state) sense. The @deva[अनुवृत्ति] of @deva[यत्] from @ref[3.1.97] does not extend here—only @deva[क्यप्] applies. Derivation: @deva[ब्रह्मन्] + @deva[भू] + @deva[क्यप्] → @deva[ब्रह्मभुवम्] 'Brahmanhood'. The term @deva[भाव] becomes an @deva[अधिकार] governing subsequent @[sūtras]. Without @deva[सुबन्त] @deva[उपपद], @deva[यत्] applies: @deva[भू] + @deva[य] → @deva[भो] + @deva[य] → @deva[भव्य] (by @ref[6.1.79] @deva[वान्तो यि प्रत्यये]). With @deva[उपसर्ग]: @deva[प्र] + @deva[भू] + @deva[यत्] → @deva[प्रभव्यम्].
"""

id = "3.1.108"
numericId = "31108"

[en]
simple = """
This rule says that after the root @deva[हन्] 'to kill', when it has a case-inflected @deva[उपपद] and no preposition, the affix @deva[क्यप्] is used to denote condition (@deva[भाव]), and @deva[त] replaces the final @deva[न्] of the root. Examples: @deva[ब्रह्म] + @deva[हन्] + @deva[क्यप्] = @deva[ब्रह्महत्या] 'Brahman-murder'; @deva[अश्वहत्या] 'horse-killing'. Without @deva[उपपद]: @deva[घातः] 'a blow'. With preposition: @deva[प्रघातो वर्तते] 'there is combat'.
"""

standard = """
After @deva[हन्] 'to kill' with @deva[सुबन्त] @deva[उपपद] and without @deva[उपसर्ग], the affix @deva[क्यप्] applies in @deva[भाव] sense, with @deva[त] replacing final @deva[न्]. Derivation: @deva[ब्रह्मन्] + @deva[हन्] + @deva[क्यप्] → @deva[ब्रह्मन्] + @deva[हत्] + @deva[य] → @deva[ब्रह्महत्या] 'Brahman-murder' (by @ref[6.1.71]). Also @deva[अश्वहत्या] 'horse-killing'. Without @deva[सुबन्त] @deva[उपपद]: @deva[घातः] 'blow' (from @deva[हन्] + @deva[णिच्] + @deva[घञ्]). The verb doesn't take @deva[ण्यत्] in @deva[भाव] sense. With @deva[उपसर्ग]: @deva[प्रघातः] 'combat'.
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] for @deva[हन्] with @deva[सुबन्तोपपद], without @deva[उपसर्ग], in @deva[भाव] sense, with simultaneous @deva[तकारादेश] (replacement of final @deva[न्] by @deva[त]). Derivation: @deva[ब्रह्मन्] + @deva[हत्] (@deva[न्] → @deva[त्]) + @deva[य] → @deva[ब्रह्महत्य] → @deva[ब्रह्महत्या] (feminine in @deva[भाव]). The @deva[तकारादेश] is specific to this @deva[भाव] context. Without @deva[सुबन्त] @deva[उपपद], the @deva[भाव] form is @deva[घातः] (@deva[हन्] + @deva[णिच्] + @deva[घञ्]), not *@deva[हात्यम्]/@deva[घात्यम्]. With @deva[उपसर्ग]: @deva[प्रघातः वर्तते] 'there is combat'.
"""

id = "3.1.26"
numericId = "31026"

[en]
simple = """
The affix @deva[णिच्] is used after a root to form the causative - expressing that someone causes another to do the action.

**Examples:**
- @deva[कटं कारयति] "he causes (someone) to make a mat"
- @deva[ओदनं पाचयति] "he has the rice cooked"

The @deva[हेतु] (causer) is the one who directs or motivates the actual doer.
"""

standard = """
The @deva[णिच्] affix forms causatives, expressing @deva[हेतुमत्] - operation relating to a causer (@deva[हेतु], defined in @ref[1.4.55] as the mover of the independent agent).

**Examples:**
- @deva[कटं कारयति] "causes a mat to be made"
- @deva[ओदनं पाचयति] "has rice cooked"

**@[vārtika] 1:** After @deva[सूत्र] etc., @deva[णिच्] means "he does that": @deva[सूत्रयति] "makes a sutra."

**@[vārtika] 2:** After @deva[कृत्]-ending legend words, @deva[णिच्] means "he narrates that": @deva[कंसवधमाचष्टे] = @deva[कंसं घातयति] "narrates the killing of Kamsa."
"""

advanced = """
@deva[णिच्] forms causatives expressing @deva[हेतुमत्] - action related to the @deva[हेतु] (causer, @ref[1.4.55]).

**Examples:** @deva[कटं कारयति], @deva[ओदनं पाचयति]

**@[vārtika] 1:** After @deva[सूत्र] etc., sense is "does that": @deva[सूत्रयति] = @deva[सूत्रं करोति].

**@[vārtika] 2:** After @deva[कृत्]-ending legend words, @deva[णिच्] means "narrates"; @deva[कृत्] is elided, base returns to @deva[प्राकृतिक] form, base becomes agent:
- @deva[कंसवधमाचष्टे] = @deva[कंसं घातयति]
- @deva[बलिबन्धमाचष्टे] = @deva[बलिं बन्धयति]

**@[vārtika] 3:** With time-limit expressions, @deva[आ] is elided: @deva[आरात्रिविवासमाचष्टे] = @deva[रात्रिं विवासयति].

**@[vārtika] 4:** Sense of "making wonderful/attaining": @deva[सूर्यमुद्गमयति] (attains sunrise).

**@[vārtika] 5:** With asterism + "knowing": @deva[पुष्ययोगं जानाति] = @deva[पुष्येण योजयति].
"""

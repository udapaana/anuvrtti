id = "3.1.81"
numericId = "31081"

[en]
simple = """
This rule says that the affix @deva[श्ना] is added after roots of the @deva[क्र्यादि] class (9th conjugation) when an affix marking the agent follows. This replaces the default @deva[शप्]. For example: @deva[क्री] + @deva[श्ना] + @deva[ति] = @deva[क्रीणाति] 'he buys'; @deva[प्री] + @deva[श्ना] + @deva[ति] = @deva[प्रीणाति] 'he pleases'.
"""

standard = """
The affix @deva[श्ना] is added after @deva[क्र्यादि] (9th class) roots when a @deva[सार्वधातुक] affix signifying the agent follows. This replaces the default @deva[शप्] (@ref[3.1.68]). The @deva[श्] is an @deva[इत्] marker, leaving @deva[ना] as the actual affix. Examples: @deva[क्री] + @deva[ना] + @deva[ति] = @deva[क्रीणाति] 'he buys'; @deva[प्री] + @deva[ना] + @deva[ति] = @deva[प्रीणाति] 'he pleases'.
"""

advanced = """
The affix @deva[श्ना] is prescribed after @deva[क्र्यादि] (@deva[गण] 9) roots before @deva[सार्वधातुक] @deva[कर्तरि] affixes. The @deva[श्] is an @deva[इत्] by @ref[1.3.8], marking the affix as @deva[सार्वधातुक] and indicating @deva[ङित्] status which blocks @[guṇa] of the root vowel. The @deva[न्] of @deva[ना] becomes @deva[ण्] by @ref[8.4.2] (@deva[अट्कुप्वाङ्नुम्व्यवायेऽपि]) when preceded by @deva[ऋ], @deva[र्], or @deva[ष्]. Derivation: @deva[क्री] + @deva[ना] + @deva[ति] → @deva[क्रीणाति].
"""

id = "3.1.102"
numericId = "31102"

[en]
simple = """
The word @deva[वह्यम्] (a vehicle) is an irregular formation from the root @deva[वह्] (to carry). It uses the affix @deva[यत्] instead of the expected @deva[ण्यत्], but only when the meaning is "instrument of carrying" — that is, a vehicle or conveyance.

For example, @deva[वह्यं शकटम्] means "a cart (vehicle)." The irregularity is that @deva[वह्यम्] lacks the @[vṛddhi] strengthening that @deva[ण्यत्] would cause.

When the meaning is not specifically "vehicle," the regular @deva[ण्यत्] form is used: @deva[वाह्यः] means "an ox" or "what should be carried," with the expected @[vṛddhi] (@deva[अ] to @deva[आ]).
"""

standard = """
This is a @deva[निपातन] (irregular listing) prescribing @deva[वह्यम्] when the root @deva[वह्] "to carry" is used in the @deva[करण] (instrumental) sense — specifically denoting a vehicle.

The expected formation would be @deva[वह्] + @deva[ण्यत्] = @deva[वाह्यम्] (with @[vṛddhi]), but in the @deva[करण] sense the irregular @deva[यत्] form @deva[वह्यम्] is prescribed instead. The absence of @[vṛddhi] marks the irregularity.

Examples: @deva[वह्यं शकटम्] "a cart (vehicle)." In non-@deva[करण] senses — @deva[कर्मन्] (object: "what is to be carried") or agent — the regular @deva[ण्यत्] applies: @deva[वाह्यः] "an ox," @deva[वाह्यम्] "what should be transported."
"""

advanced = """
@[anuvṛtti]: The @deva[कृत्य] context from @ref[3.1.96].

This @[sūtra] establishes @deva[वह्यम्] as @deva[निपातन] from @deva[वह्] + @deva[यत्] specifically in the @deva[करणे] (instrumental) sense. The semantic condition @deva[करणे] restricts the irregular form to contexts where the derivative denotes an instrument of carrying (= vehicle/conveyance).

The expected derivation @deva[वह्] + @deva[ण्यत्] would yield @deva[वाह्यम्] with @[vṛddhi] by @ref[7.2.115]. The @deva[निपातन] blocks this and gives @deva[वह्यम्] (without @[vṛddhi]). In the @deva[कर्मन्] sense ("what should be carried") and other non-instrumental senses, the regular @deva[ण्यत्] formation @deva[वाह्यम्]/@deva[वाह्यः] remains operative. Compare the parallel @deva[करण]-restricted @deva[निपातन] pattern seen in @ref[3.1.101].
"""

id = "3.1.111"
numericId = "31111"

[en]
simple = """
This rule says that after the root @deva[खन्] 'to dig', the affix @deva[क्यप्] is used and long @deva[ई] replaces the final @deva[अन्] of the root. Thus: @deva[खन्] + @deva[क्यप्] → @deva[ख] + @deva[ई] + @deva[य] = @deva[खेयम्] 'to be dug'. The long @deva[ई] prevents @ref[6.4.43] from lengthening the @deva[अ] of @deva[खन्] to @deva[आ].
"""

standard = """
After @deva[खन्] 'to dig', the affix @deva[क्यप्] is used with long @deva[ई] substituting for the final. Derivation: @deva[खन्] → @deva[ख] + @deva[ई] + @deva[य] → @deva[खेयम्] 'to be dug'. The use of long @deva[ई] (rather than short @deva[इ]) indicates that @ref[6.4.43] (@deva[आ च खनः]) does not apply; that rule would otherwise lengthen the @deva[अ] to @deva[आ] before @deva[क्यप्]. The long @deva[ई] blocks this lengthening by replacing the environment for that rule.
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] for @deva[खन्] with simultaneous @deva[ईकारादेश] for the root-final. Derivation: @deva[खन्] + @deva[क्यप्] → @deva[ख] + @deva[ई] + @deva[य] → @deva[खेय] (by @[guṇa] @deva[ई] + @deva[अ] → @deva[ए]). The specification of long @deva[ई] (not short @deva[इ]) is significant: it preempts @ref[6.4.43] (@deva[आ च खनः]) which would lengthen @deva[अ] → @deva[आ] before @deva[पित्] @deva[कृत्] affixes. By replacing the final entirely with @deva[ई], the environment for @ref[6.4.43] is eliminated, ensuring @deva[खेयम्] rather than *@deva[खायम्] or *@deva[खानेयम्].
"""

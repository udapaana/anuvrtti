id = "3.1.133"
numericId = "31133"

[en]
simple = """
The affixes @deva[ण्वुल्] (= @deva[अक]) and @deva[तृच्] (= @deva[तृ]) are used after **all roots** to denote the **agent**.

**Examples:**
- @deva[कृ] 'to do' + @deva[ण्वुल्] = @deva[कारकः] 'doer'
- @deva[कृ] + @deva[तृच्] = @deva[कर्ता] 'maker'
- @deva[हृ] 'to take' + @deva[ण्वुल्] = @deva[हारकः] 'taker'
- @deva[हृ] + @deva[तृच्] = @deva[हर्ता] 'one who takes'

These are the **general agent-noun affixes** applicable to any root.
"""

standard = """
The affixes @deva[ण्वुल्] (= @deva[अक]) and @deva[तृच्] (= @deva[तृ]) are used after **all roots** to denote the **agent** (@deva[कर्तृ]).

**This is the general rule** for forming agent nouns.

**Examples with @deva[ण्वुल्]:**
- @deva[कृ] + @deva[ण्वुल्] = @deva[कार] @ref[7.2.115] + @deva[अक] @ref[7.1.1] = @deva[कारकः] 'doer'
- @deva[हृ] + @deva[ण्वुल्] = @deva[हारकः] 'taker'

**Examples with @deva[तृच्]:**
- @deva[कृ] + @deva[तृच्] = @deva[कर्तृ] @ref[7.3.84] → nom. @deva[कर्ता] 'maker'
- @deva[हृ] + @deva[तृच्] = @deva[हर्ता] 'one who takes'

**Note:** The @deva[च्] of @deva[तृच्] distinguishes it from @deva[तृन्]; bare @deva[तृ] includes both (see @ref[5.3.59], @ref[6.4.154]).
"""

advanced = """
The affixes @deva[ण्वुल्] (= @deva[अक्]) and @deva[तृच्] (= @deva[तृ]) are placed after all verbal roots, expressing the agent.

**This is the general rule** for forming agent nouns (@deva[कर्तृवाचक]).

**Derivation with @deva[ण्वुल्]:**
- @deva[कृ] 'to do' + @deva[ण्वुल्] = @deva[कार] + @deva[युच्] @ref[7.2.115] = @deva[कार] + @deva[अक] @ref[7.1.1] = @deva[कारकः] 'doer'
- @deva[हृ] + @deva[ण्वुल्] = @deva[हारकः] 'taker'

**Derivation with @deva[तृच्]:**
- @deva[कृ] + @deva[तृच्] = @deva[कर्] + @deva[तृ] @ref[7.3.84] = @deva[कर्तृ], nom. sing. @deva[कर्ता] 'maker'
- @deva[हृ] + @deva[तृच्] = @deva[हर्ता] 'one who takes'

**Technical note:** The @deva[च्] of @deva[तृच्] is not indicatory (@deva[इत्]), but serves to distinguish this affix from @deva[तृन्]. The simple designation @deva[तृ] includes both @deva[तृच्] and @deva[तृन्], as in @ref[5.3.59] and @ref[6.4.154].
"""

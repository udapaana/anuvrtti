id = "3.1.144"
numericId = "31144"

[en]
simple = """
The affix @deva[क] is used after @deva[ग्रह्] 'to seize' when the meaning is 'house'.

**Derivation:** @deva[ग्रह्] + @deva[क] → @deva[गृहम्] 'house' (with @deva[सम्प्रसारण]: @deva[र] → @deva[ॠ])

**Plural forms:**
- @deva[गृहाः] = 'wife' (she who constitutes the house)
- @deva[गृहाणि] = 'houses' (buildings)
"""

standard = """
The affix @deva[क] is used after @deva[ग्रह्] 'to seize' when the agent denotes 'house'.

**Derivation:** @deva[ग्रह्] + @deva[क] → @deva[गृहम्] @ref[6.1.16] 'house'

The @deva[र] undergoes @deva[सम्प्रसारण] (semivowel → vowel): @deva[र] → @deva[ॠ].

| Form | Meaning |
|------|---------|
| @deva[गृहम्] (sg.) | house |
| @deva[गृहाः] (pl.) | wife (she who constitutes the home) |
| @deva[गृहाणि] (pl.) | houses (buildings) |

The word @deva[गृहाः] 'wife' uses masculine plural endings because she is the person who truly constitutes the home.
"""

advanced = """
The affix @deva[क] is used after @deva[ग्रह्] 'to seize' when the agent denotes 'house'.

**Derivation:** @deva[ग्रह्] + @deva[क] = @deva[गृहम्] @ref[6.1.16] 'house'

The @deva[र] undergoes @deva[सम्प्रसारण] (semivowel vocalization): @deva[र] → @deva[ॠ].

**Plural distinctions:**
- @deva[गृहाः] (pl. masc.) = 'wife' — she is especially the person that constitutes the house
- @deva[गृहाणि] (pl. neut.) = 'houses' as buildings

This irregular formation (@deva[निपातन]) provides the word @deva[गृह] 'house' from @deva[ग्रह्] 'to seize' (i.e., that which holds/contains the family).
"""

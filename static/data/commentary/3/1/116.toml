id = "3.1.116"
numericId = "31116"

[en]
simple = """
This rule says that the words @deva[पुष्य] and @deva[सिद्ध्य] are irregularly formed with @deva[क्यप्] when used as names of asterisms (@deva[नक्षत्र]). @deva[पुष्यः] (from @deva[पुष्] 'to nourish') is the @[puṣya] asterism—things are nourished under its influence. @deva[सिद्ध्यः] (from @deva[सिध्] 'to accomplish') is another name for @[puṣya]—things are accomplished under this star. When not asterism names: @deva[पोषणम्] 'nourishing', @deva[सेधनम्] 'accomplishing'.
"""

standard = """
The words @deva[पुष्य] and @deva[सिद्ध्य] are @deva[निपातन] with @deva[क्यप्] when denoting asterisms (@deva[नक्षत्र]). @deva[पुष्] + @deva[क्यप्] = @deva[पुष्यः] '@[puṣya] asterism'—named because things flourish under its influence. @deva[सिध्] + @deva[क्यप्] = @deva[सिद्ध्यः] 'Siddhya asterism' (alternate name of @[puṣya])—named because endeavors succeed under this star. The @deva[नक्षत्रे] restriction limits the irregular form; in other senses, regular forms apply: @deva[पोषणम्] 'nourishment', @deva[सेधनम्] 'accomplishment'.
"""

advanced = """
This @[sūtra] establishes @deva[पुष्य] and @deva[सिद्ध्य] as @deva[निपातन] with @deva[क्यप्] restricted to @deva[नक्षत्र] (asterism) denotation. Derivations: @deva[पुष्] + @deva[क्यप्] → @deva[पुष्य] (@[puṣya], 8th lunar mansion); @deva[सिध्] + @deva[क्यप्] → @deva[सिद्ध्य] (alternate designation). The etymological significance: @deva[पुष्य] = 'under which things are nourished' (@deva[पुष्यति अस्मिन्]); @deva[सिद्ध्य] = 'under which things succeed' (@deva[सिध्यति अस्मिन्]). Outside @deva[नक्षत्र] context, standard @deva[भाव] derivatives apply: @deva[पोषणम्], @deva[सेधनम्].
"""

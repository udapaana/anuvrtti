id = "3.1.91"
numericId = "31091"

[en]
simple = """
This is a heading rule (@deva[अधिकार]) that governs all the following @[sūtras] until the end of the third chapter. It states that the affixes taught from here onward are added after verbal roots (@deva[धातु]). These affixes are broadly classified into @deva[कृत्] (primary nominal) and @deva[कृत्य] (gerundive) categories.
"""

standard = """
This is an @deva[अधिकार सूत्र] (governing rule) extending to the end of the third @deva[अध्याय]. It specifies that all affixes taught from @ref[3.1.91] through @ref[3.4.117] are to be understood as following a @deva[धातु] (verbal root). This domain covers @deva[कृत्] affixes (forming primary derivatives like agent nouns, action nouns) and @deva[कृत्य] affixes (forming gerundives expressing obligation).
"""

advanced = """
This @deva[अधिकार] establishes @deva[धातोः] as the governing condition (@deva[अनुवृत्ति]) for @[sūtras] @ref[3.1.91]–@ref[3.4.117]. All affixes taught within this domain attach to @deva[धातु]s. The affixes fall into two major categories: @deva[कृत्] (primary derivatives—@deva[कर्तृ], @deva[भाव], @deva[करण], etc.) and @deva[कृत्य] (potential/gerundive—expressing @deva[कर्तव्यता]). This @deva[अधिकार] distinguishes @deva[धातु]-based derivation from @deva[प्रातिपदिक]-based derivation governed by @deva[तद्धित] rules elsewhere.
"""

id = "3.1.84"
numericId = "31084"

[en]
simple = """
This rule says that in Vedic Sanskrit, @deva[शायच्] can also replace @deva[श्ना] after consonant-final roots when @deva[हि] follows. This is in addition to @deva[शानच्] from the previous rule. For example: @deva[गृभाय] in @deva[गृभाय जिह्वया मधु] (@[ṛg] Veda VIII.17.5). The regular @deva[शानच्] form @deva[बधान] 'kill!' is also used.
"""

standard = """
In the @deva[छन्दस्] (Vedas), @deva[शायच्] is an additional substitute for @deva[श्ना] after consonant-final roots when @deva[हि] follows. This is optional alongside @deva[शानच्] (@ref[3.1.83]). Vedic example: @deva[गृभाय जिह्वया मधु] 'grasp the honey with your tongue' (@[ṛg] Veda VIII.17.5). The @deva[शानच्] form also occurs: @deva[बधान पशून्] 'kill the beasts'. The @deva[श्] and @deva[च्] are @deva[इत्] markers, leaving @deva[आय] as the actual substitute.
"""

advanced = """
This @[sūtra] extends Vedic usage by adding @deva[शायच्] as an optional @deva[आदेश] for @deva[श्ना] after @deva[हलन्त] roots when @deva[हि] follows, alongside @deva[शानच्] of @ref[3.1.83]. The @deva[श्] indicates @deva[सार्वधातुकत्व], @deva[च्] indicates @deva[पित्]. The operative portion is @deva[आय]. Vedic attestation: @deva[गृभाय] in @deva[गृभाय जिह्वया मधु] (RV VIII.17.5) from @deva[ग्रभ्] with @deva[शायच्]. Both substitutes coexist in @deva[छन्दस्]: @deva[बधान पशून्] uses @deva[शानच्].
"""

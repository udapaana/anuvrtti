id = "3.1.128"
numericId = "31128"

[en]
simple = """
The word @deva[प्रणाय्यः] 'disapproved, to be disliked' is **irregularly** formed.

**Derivation:**
@deva[प्र] + @deva[नी] 'to lead' + @deva[ण्यत्] = @deva[प्रणाय्यः]

**Usage:** @deva[प्रणाय्यश्चोरः] 'the thief is to be disliked'

**Regular form:** When not meaning 'disapproved':
@deva[प्र] + @deva[नी] + @deva[यत्] = @deva[प्रणेयः] 'tractable, to be led'
"""

standard = """
The word @deva[प्रणाय्यः] is **irregularly** formed when meaning 'disapproved' (@deva[असम्मति]).

**Derivation:**
@deva[प्र] + @deva[नी] + @deva[ण्यत्] = @deva[प्रणाय्यः] (with @deva[ऐ] → @deva[आय्] sandhi)

**Usage:** @deva[प्रणाय्यश्चोरः] 'the thief is to be disliked'

**Alternative meaning:** @deva[असम्मति] also means 'free from worldly attachment' (@deva[अभिलाष]-less). Thus:
@deva[ज्येष्ठाय पुत्राय पिता ब्रह्म प्रब्रूयात्, प्रणाय्याय अन्तेवासिने नान्यस्मै कस्मैचन] — 'Let the father teach the Secret Doctrine to his eldest son, or to a pupil free from attachment, and to no one else.'

**Regular form:** @deva[प्र] + @deva[नी] + @deva[यत्] = @deva[प्रणेयः] 'tractable'
"""

advanced = """
The word @deva[प्रणाय्यः] is irregularly formed when meaning 'disapproved' (@deva[असम्मति]).

**Derivation:**
@deva[प्र] + @deva[नी] + @deva[ण्यत्] = @deva[प्र] + @deva[नै] + @deva[य] = @deva[प्रणाय्य] (the @deva[ऐ] changes to @deva[आय्] by analogy of @ref[6.1.79])

**Usage:** @deva[प्रणाय्यश्चोरः] 'the thief is to be disliked'

**Semantic note:** The word @deva[असम्मति] means 'non-agreement, disrespect'. But @deva[सम्मति] also means @deva[अभिलाष] 'desire', so @deva[असम्मति] can mean 'free from worldly attachment'.

**Example with alternative meaning:**
@deva[ज्येष्ठाय पुत्राय पिता ब्रह्म प्रब्रूयात्, प्रणाय्याय अन्तेवासिने नान्यस्मै कस्मैचन]
'Let the father teach the Secret Doctrine to his eldest son, or to such pupil who is free from worldly attachment, and to no one else.'

**Regular form:** @deva[प्र] + @deva[नी] + @deva[यत्] = @deva[प्रणेयः] 'tractable, to be led'
"""

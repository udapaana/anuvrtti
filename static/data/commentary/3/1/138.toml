id = "3.1.138"
numericId = "31138"

[en]
simple = """
The affix @deva[श] is used after certain roots when there is no @deva[उपसर्ग] (prefix).

**Roots covered:** @deva[लिप्], @deva[विद्], @deva[धारि], @deva[पारि], @deva[वेदि], @deva[उदेजि], @deva[चेति], @deva[साति], @deva[साहि]

**Examples:**
- @deva[लिम्पः] 'one who smears'
- @deva[विन्दः] 'one who finds'
- @deva[धारयः] 'one who holds'
- @deva[वेदयः] 'one who knows'

With a prefix, @deva[क] is used instead: @deva[प्रलिपः] (not *@deva[प्रलिम्पः]).
"""

standard = """
The affix @deva[श] is used after @deva[लिप्], @deva[विद्], @deva[धारि], @deva[पारि], @deva[वेदि], @deva[उदेजि], @deva[चेति], @deva[साति], and @deva[साहि] when there is no @deva[उपसर्ग].

| Root | Form | Meaning |
|------|------|---------|
| @deva[लिप्] | @deva[लिम्पः] | one who smears |
| @deva[विद्] | @deva[विन्दः] | one who finds |
| @deva[धारि] | @deva[धारयः] | one who holds |
| @deva[पारि] | @deva[पारयः] | one who ferries |
| @deva[वेदि] | @deva[वेदयः] | one who knows |
| @deva[चेति] | @deva[चेतयः] | one who perceives |

**Condition:** Without prefix. With prefix, @deva[क] is used: @deva[प्रलिपः].

**@[vārtikas]:**
1. @deva[लिप्] with @deva[नि] takes @deva[श]: @deva[निलिम्पाः] 'certain deities'
2. @deva[विद्] with @deva[गो] etc. takes @deva[श] for proper nouns: @deva[गोविन्दः] 'Krishna', @deva[अरविन्दः] 'lotus'
"""

advanced = """
The affix @deva[श] is used after @deva[लिप्], @deva[विद्], @deva[धारि], @deva[पारि], @deva[वेदि], @deva[उदेजि], @deva[चेति], @deva[साति], and @deva[साहि] when there is no @deva[उपसर्ग].

**Examples:**
- @deva[लिम्पः] 'smearing'
- @deva[विन्दः] 'acquiring'
- @deva[धारयः] 'holding'
- @deva[पारयः] 'ferrying'
- @deva[वेदयः] 'knowing'
- @deva[उपेजयः] 'shaking'
- @deva[चेतयः] 'perceiving'
- @deva[सातयः], @deva[साहयः]

**Restriction:** Without an @deva[उपसर्ग]. With a prefix, @deva[क] applies: @deva[प्रलिपः].

**@[vārtika] 1:** @deva[लिप्] with @deva[नि] takes @deva[श]: @deva[निलिम्पाः] 'the name of certain deities' or 'a cow'.

**@[vārtika] 2:** @deva[विद्] when compounded with @deva[गो] etc. takes @deva[श] for proper nouns: @deva[गोविन्दः] 'Krishna' (protector of cows), @deva[अरविन्दः] 'lotus' (having petals like spokes).
"""

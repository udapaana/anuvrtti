id = "3.1.73"
numericId = "31073"

[en]
simple = """
This rule says that the affix @deva[श्नु] is added after roots of the @deva[स्वादि] class (5th conjugation) when a @deva[सार्वधातुक] affix denoting the agent follows.

This @deva[श्नु] blocks the general @deva[शप्] affix.

Breaking down @deva[श्नु]:
- The @deva[श] makes it a @deva[सार्वधातुक] affix
- The actual affix is @deva[नु]

Example derivation: @deva[सु] + @deva[श्नु] + @deva[तिप्] → @deva[सु] + @deva[नु] + @deva[ति] → @deva[सुनोति] (he presses out, extracts soma).

The @deva[स्वादि] class is the 5th conjugational class.
"""

standard = """
The affix @deva[श्नु] is added after @deva[स्वादि] (5th class) roots when @deva[सार्वधातुक] follows in @deva[कर्तरि]. This @deva[विकरण] replaces @deva[शप्] for this class.

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्], making @deva[श्नु] a @deva[सार्वधातुक] affix by @ref[3.4.113]
- Operative portion: @deva[नु]

Derivation: @deva[सु] + @deva[श्नु] + @deva[तिप्] → @deva[सु] + @deva[नु] + @deva[ति] → @deva[सुनोति].

Examples: @deva[सुनोति] (he presses out), @deva[चिनोति] (he gathers), @deva[आप्नोति] (he obtains).
"""

advanced = """
The affix @deva[श्नु] is introduced after @deva[स्वादि] (@deva[गण] 5) roots when @deva[सार्वधातुक] follows in @deva[कर्तरि]. This is the @deva[विकरण] for the 5th conjugational class.

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्] by @ref[1.3.8], triggering @ref[3.4.113] (@deva[सार्वधातुक])
- Operative: @deva[नु]

Derivation: @deva[सु] + @deva[श्नु] + @deva[तिप्] → @deva[सु] + @deva[नु] + @deva[ति] → @deva[सुनोति] (@deva[गुण] of @deva[नु] → @deva[नो] by @ref[7.3.84]).

Examples: @deva[सुनोति], @deva[चिनोति], @deva[आप्नोति], @deva[शक्नोति].

@note[type=observation]: The @deva[नु] element of @deva[श्नु] gives @deva[स्वादि] roots their distinctive @deva[-नोति]/@deva[-नुते] pattern. @deva[गुण] applies to @deva[नु] → @deva[नो] before consonant-initial endings (@deva[ति], @deva[तः], etc.).
"""

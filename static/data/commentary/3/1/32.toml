id = "3.1.32"
numericId = "31032"

[en]
simple = """
Roots formed by adding @deva[सन्] and other affixes are called @deva[धातु] (verbal roots). These derivative roots can take tense affixes and function like original roots.

**Examples:**
- @deva[चिकीर्ष] "to wish to do" (from @deva[कृ] + @deva[सन्]) is a @deva[धातु]
- @deva[कारि] "to cause to do" (from @deva[कृ] + @deva[णिच्]) is a @deva[धातु]
- @deva[चेक्रिय] "to do repeatedly" (intensive) is a @deva[धातु]
"""

standard = """
This extends the definition of @deva[धातु] (@ref[1.3.1]) to include derivative roots - forms created by adding @deva[सन्], @deva[णिच्], @deva[यङ्], etc.

**Derivative roots are independent @deva[धातु]s:**
- @deva[चिकीर्ष] (desiderative of @deva[कृ])
- @deva[कारि] (causative of @deva[कृ])
- @deva[चेक्रिय] (intensive of @deva[कृ])

These function as separate roots, taking tense affixes like @deva[शप्] and other verbal terminations.
"""

advanced = """
This @deva[सूत्र] extends @deva[धातुसंज्ञा] (root designation, @ref[1.3.1]) to @deva[सनाद्यन्त]s - forms ending in @deva[सन्], @deva[णिच्], @deva[यङ्], etc.

**Consequence:** These derivative roots:
1. Are independent @deva[धातु]s, not identical to base roots
2. Take @deva[शप्] and other @deva[विकरण]s
3. Can take all tense/mood affixes

**Examples:**
- @deva[चिकीर्षा] (@deva[सन्नन्त])
- @deva[कारि] (@deva[णिजन्त])
- @deva[चेक्रिय] (@deva[यङन्त])

**Note:** "@deva[सन्] and others" (@deva[सनादि]) includes all the affixes taught from @ref[3.1.5] onward.
"""

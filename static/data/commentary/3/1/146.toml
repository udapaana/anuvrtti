id = "3.1.146"
numericId = "31146"

[en]
simple = """
The affix @deva[थकन्] (= @deva[थक]) is used after @deva[गै] 'to sing' when the agent denotes a professional singer.

**Example:** @deva[गै] + @deva[थकन्] → @deva[गाथकः] 'singer' (f. @deva[गाथिका])
"""

standard = """
The affix @deva[थकन्] (= @deva[थक]) is used after @deva[गै] 'to sing' when the agent denotes a professional artist (@deva[शिल्पिन्]).

**Derivation:** @deva[गै] + @deva[थकन्] = @deva[गा] + @deva[थक] @ref[6.1.45] = @deva[गाथकः] 'singer'

**Feminine:** @deva[गाथिका] (with @deva[इ] insertion before @deva[क])
"""

advanced = """
The affix @deva[थकन्] (= @deva[थक]) is used after @deva[गै] 'to sing' when the agent denotes a professional artist (@deva[शिल्पिन्]).

**Derivation:** @deva[गै] + @deva[थकन्] = @deva[गा] + @deva[थक] @ref[6.1.45] = @deva[गाथकः] 'singer'

**Feminine:** @deva[गाथिका]

This @[sūtra] is separated from the next (@ref[3.1.147]) for @deva[योगविभाग] purposes: only @deva[ण्युट्] (not @deva[थकन्]) continues into subsequent @[sūtras].
"""

id = "3.1.112"
numericId = "31112"

[en]
simple = """
This rule says that the affix @deva[क्यप्] is used after the root @deva[भृञ्] 'to bear/support' when not used as a proper name. Example: @deva[भृ] + @deva[क्यप्] = @deva[भृत्यः] (plural @deva[भृत्याः]) 'those who ought to be supported', i.e., 'servants'. When used as a name, @deva[ण्यत्] applies: @deva[क्षृ] + @deva[ण्यत्] = @deva[क्षार्यः] 'a @[kṣatriya]'.
"""

standard = """
After @deva[भृञ्] 'to support/maintain', @deva[क्यप्] is used when not in @deva[संज्ञा] (proper name) sense. Derivation: @deva[भृ] + @deva[क्यप्] → @deva[भृत्यः] 'servant' (one to be maintained). When the word is a proper name/designation, @deva[ण्यत्] applies: @deva[क्षारः]/​@deva[क्षार्यः] '@[kṣatriya]'. @note[type=@[vārtika]] With @deva[सम्], @deva[क्यप्] is optional: @deva[सम्भृत्याः] or @deva[सम्भार्याः] 'those to be supported collectively'.
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] for @deva[भृञ्] in non-@deva[संज्ञा] contexts. Derivation: @deva[भृ] + @deva[त्] (@ref[6.1.71]) + @deva[य] → @deva[भृत्य] 'servant' (those requiring maintenance). The @deva[असंज्ञायाम्] restriction ensures that when functioning as an appellative (@deva[संज्ञा]), @deva[ण्यत्] applies instead: @deva[क्षार्य] '@[kṣatriya]' (from cognate root). @note[type=@[vārtika]] @deva[सम्पूर्वाद्वा]: @deva[सम्] + @deva[भृ] optionally takes @deva[क्यप्] or @deva[ण्यत्]: @deva[सम्भृत्य]/​@deva[सम्भार्य]. The compound @deva[भृत्य] has lexicalized as 'servant' in classical usage.
"""

id = "3.1.148"
numericId = "31148"

[en]
simple = """
The affix @deva[ण्युट्] is also used after @deva[हा] when the agent denotes 'rice' or 'time'.

**Examples:**
- @deva[हायनाः] (pl.) = a kind of rice (that which 'leaves off' water)
- @deva[हायनः] = a year (that which 'goes through' all seasons)

Two roots @deva[हा] are involved: @deva[ओहाक्] 'to abandon' (@deva[जहाति]) and @deva[ओहाङ्] 'to go' (@deva[जिहीते]).
"""

standard = """
The affix @deva[ण्युट्] (= @deva[अन]) is also used after @deva[हा] when the agent denotes 'rice' (@deva[व्रीहि]) or 'time' (@deva[काल]).

| Root | Meaning | Form | Sense |
|------|---------|------|-------|
| @deva[ओहाक्] 'to abandon' | @deva[जहाति] | @deva[हायनाः] | rice (that which leaves off water) |
| @deva[ओहाङ्] 'to go' | @deva[जिहीते] | @deva[हायनः] | year (that which goes through seasons) |

Both roots belong to @[juhotyādi] (3rd class).

**Accent difference:** The two words have different accents — @deva[उदात्त] on the middle vs. on the last syllable.
"""

advanced = """
The affix @deva[ण्युट्] (= @deva[अन]) is also used after @deva[हा] when the agent denotes 'rice' (@deva[व्रीहि]) or 'time' (@deva[काल]).

**Two roots @deva[हा]:**
1. @deva[ओहाक्] 'to abandon' (@[juhotyādi]) — @deva[जहाति] (3rd sg. parasmaipada)
2. @deva[ओहाङ्] 'to go' (@[juhotyādi]) — @deva[जिहीते] (3rd sg. @[ātmanepada])

**Derivation:** @deva[हा] + @deva[ण्युट्] = @deva[हायनः]

| Meaning | Etymology |
|---------|------------|
| @deva[हायनाः] 'a kind of rice' | from @deva[जहाति] — that which leaves off all water |
| @deva[हायनः] 'a year' | from @deva[जिहीते] — that which goes through all conditions |

**Accent:** The two words differ in accent placement: @deva[उदात्त] on the middle syllable for one, on the final for the other.
"""

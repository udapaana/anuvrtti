id = "3.1.65"
numericId = "31065"

[en]
simple = """
This rule says that @deva[चिण्] does NOT replace @deva[च्लि] after the root @deva[तप्] (to suffer, to perform austerity) when used reflexively and when expressing the sense of remorse or repentance.

This prohibition applies to passive and impersonal constructions as well.

Examples (no @deva[चिण्], uses @deva[सिच्] instead):
- @deva[अतप्त तपस्तापसः] (the ascetic performed austerity)
- @deva[अन्वतप्त पापेन कर्मणा] (he repented from evil deeds)

@deva[तप्] does not take @deva[चिण्] in these semantic contexts.
"""

standard = """
@deva[चिण्] does NOT substitute for @deva[च्लि] after @deva[तप्] (to suffer/perform austerity) in @deva[कर्मकर्तरि] (reflexive) when expressing @deva[अनुताप] (remorse/repentance).

This prohibition extends to @deva[कर्मणि] (passive) and @deva[भावे] (impersonal) constructions.

Examples (@deva[सिच्], not @deva[चिण्]):
- @deva[अतप्त तपस्तापसः] (the ascetic performed austerity)
- @deva[अन्वतप्त पापेन कर्मणा] (he repented from evil deeds)

@deva[तप्] uses @deva[सिच्]-aorist instead of @deva[चिण्] in these contexts.
"""

advanced = """
This @deva[प्रतिषेधसूत्र] blocks @deva[चिण्] after @deva[तप्] in @deva[कर्मकर्तरि] when @deva[अनुताप] (remorse) is expressed.

The prohibition extends to @deva[कर्मणि] and @deva[भावे] constructions.

Examples (@deva[सिच्]):
- @deva[अतप्त तपस्तापसः]
- @deva[अन्वतप्त पापेन कर्मणा]

@deva[तप्] takes @deva[सिच्]-aorist (@deva[अतप्त]) by @ref[3.1.44], not @deva[चिण्].

@note[type=observation]: The semantic restriction (@deva[अनुतापे]) is significant—@deva[तप्] in the sense of "performing austerity" or "repenting" does not take @deva[चिण्]. In other senses, @deva[चिण्] may apply per general rules.
"""

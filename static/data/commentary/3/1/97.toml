id = "3.1.97"
numericId = "31097"

[en]
simple = """
This rule says that the affix @deva[यत्] is added after roots ending in a vowel. The @deva[त्] is an @deva[इत्] marker indicating accent. Examples: @deva[गा] + @deva[यत्] = @deva[गेयम्] 'to be sung'; @deva[पा] + @deva[यत्] = @deva[पेयम्] 'to be drunk'; @deva[जि] + @deva[यत्] = @deva[जेयम्] 'to be conquered'. The @deva[आ] of @deva[गा]/​@deva[पा] becomes @deva[ए] by @ref[6.4.65].
"""

standard = """
The affix @deva[यत्] is added after vowel-final (@deva[अजन्त]) roots. The @deva[त्] is @deva[इत्] marking first-vowel @deva[उदात्त] (@ref[6.1.213]). Examples: @deva[गेयम्] 'to be sung', @deva[पेयम्] 'to be drunk', @deva[जेयम्] 'to be conquered'. Consonant-final roots take @deva[ण्यत्] by @ref[3.1.124]. Roots that become consonant-final through derivation (like desideratives @deva[दित्स्] from @deva[दो]) still take @deva[यत्]: @deva[दित्स्यम्]. @note[type=@[vārtika]] @deva[तक्], @deva[शच्], @deva[चत्], @deva[यत्], @deva[जन्] (consonant-final) also take @deva[यत्]: @deva[तक्यम्], @deva[शस्यम्], @deva[जन्यम्]. @note[type=@[vārtika]] For @deva[हन्], @deva[वध्] optionally substitutes before @deva[यत्]: @deva[वध्यम्] or @deva[घात्यम्].
"""

advanced = """
The affix @deva[यत्] is prescribed after @deva[अजन्त] (vowel-final) roots. The @deva[त्] is @deva[इत्] by @ref[1.3.3], indicating @deva[आद्युदात्त] (first-syllable @deva[उदात्त]) per @ref[6.1.213]. Derivations: @deva[गा] + @deva[य] → @deva[गेय] (by @ref[6.4.65] @deva[आयादय आर्धधातुके] → @deva[एयादेशः]). The @deva[अजन्त] condition refers to the base root form, not post-sandhi: desiderative @deva[दित्स] (from @deva[दो], originally vowel-final) takes @deva[यत्] → @deva[दित्स्यम्] despite surface consonant ending. @note[type=@[vārtika]] @deva[तक्शच्चत्यत्जनीनां च]: these consonant-final roots are enumerated to take @deva[यत्]. @note[type=@[vārtika]] @deva[हनो वध्यतो वा]: @deva[वध्] substitutes for @deva[हन्] optionally before @deva[यत्]; otherwise @deva[ण्यत्] applies yielding @deva[घात्यम्] (with @ref[7.3.32], @ref[7.3.54]).
"""

id = "3.1.75"
numericId = "31075"

[en]
simple = """
This rule says that the affix @deva[श्नु] is optionally used after the root @deva[अक्ष्] (to pervade, to obtain) when a @deva[सार्वधातुक] affix denoting the agent follows.

Since @deva[श्नु] is optional:
- @deva[अक्ष्णोति] (@deva[श्नु]) or @deva[अक्षति] (@deva[शप्]) – both mean "he pervades/obtains"

This allows @deva[अक्ष्] to conjugate either like a @deva[स्वादि] (5th class) root or a @deva[भ्वादि] (1st class) root.
"""

standard = """
The affix @deva[श्नु] is optionally (@deva[विभाषा]) used after @deva[अक्ष्] (to pervade/obtain) when @deva[सार्वधातुक] follows in @deva[कर्तरि].

Alternate forms:
- @deva[अक्ष्णोति] (@deva[श्नु]) / @deva[अक्षति] (@deva[शप्])

This gives @deva[अक्ष्] dual class membership: it can behave as either @deva[स्वादि] (with @deva[श्नु]) or @deva[भ्वादि] (with @deva[शप्]).

Note: The @[sūtra] mentions @deva[सम्], but the rule applies to @deva[अक्ष्] generally, not just with that prefix.
"""

advanced = """
@deva[श्नु] optionally applies after @deva[अक्ष्] in @deva[कर्तरि सार्वधातुक].

Alternate forms:
- @deva[अक्ष्णोति] / @deva[अक्षति]

This rule (@deva[अक्षो विभाषा]) provides optional @deva[स्वादि] conjugation for @deva[अक्ष्], which is otherwise @deva[भ्वादि]. When @deva[श्नु] applies, @deva[गुण] gives @deva[अक्ष्णोति]; when @deva[शप्] applies, we get @deva[अक्षति].

@note[type=observation]: The optionality may reflect dialectal or historical variation in how this root was conjugated. Both forms are grammatically correct.
"""

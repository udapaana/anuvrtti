id = "3.1.6"
numericId = "31006"

[en]
simple = """
The roots @deva[मान्] (to honor), @deva[बध्] (to bind), @deva[दान्] (to cut), and @deva[शान्] (to whet) take @deva[सन्], with the reduplicative syllable lengthened to @deva[ई].

**Examples:**
- @deva[मीमांसते] "he investigates" (from @deva[मान्])
- @deva[बीभत्सते] "he loathes" (from @deva[बध्])
- @deva[दीदांसते] "he straightens" (from @deva[दान्])
- @deva[शीशांसते] "he sharpens" (from @deva[शान्])

These verbs look like desideratives but have special meanings.
"""

standard = """
The roots @deva[मान्], @deva[बध्], @deva[दान्], @deva[शान्] take @deva[सन्] with @deva[इ] → @deva[ई] in the @deva[अभ्यास] (reduplicative syllable) by @ref[7.4.79].

| Root | Meaning | With @deva[सन्] |
|------|---------|----------------|
| @deva[मान्] | honor | @deva[मीमांसते] "investigates" |
| @deva[बध्] | bind | @deva[बीभत्सते] "loathes" |
| @deva[दान्] | cut | @deva[दीदांसते] "straightens" |
| @deva[शान्] | whet | @deva[शीशांसते] "sharpens" |

These forms are desiderative in structure but not in meaning (like @ref[3.1.5]).

**Alternative:** The @deva[सन्] is optional. Causative forms also work: @deva[मानयति], @deva[बाधयति], @deva[दानयति], @deva[निशानयति].
"""

advanced = """
The @deva[धातु]s @deva[मान्], @deva[बध्], @deva[दान्], @deva[शान्] take @deva[सन्] with lengthening of the @deva[अभ्यास] vowel (@deva[इ] → @deva[ई]) by @ref[7.4.79].

**Semantic shift (like @ref[3.1.5]):**
- @deva[मान्] → @deva[मीमांसते] "investigates" (not "honors")
- @deva[बध्] → @deva[बीभत्सते] "loathes" (not "binds")
- @deva[दान्] → @deva[दीदांसते] "straightens" (not "cuts")
- @deva[शान्] → @deva[शीशांसते] "sharpens" (not "whets")

**Optionality:** By reading @deva[वा] from @ref[3.1.7] into this rule, the @deva[सन्] is optional. Alternatives: @deva[मानयति], @deva[बाधयति], @deva[दानयति], @deva[निशानयति].

**Note:** Unlike the true desiderative (@ref[3.1.7]), the @deva[सन्] in @ref[3.1.5] and this rule does not denote "wishing."
"""

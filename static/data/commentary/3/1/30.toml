id = "3.1.30"
numericId = "31030"

[en]
simple = """
The affix @deva[णिङ्] is used after the root @deva[कम्] (desire).

**Examples:**
- @deva[कामयते] "desires"
- @deva[कामयेते] (dual)
- @deva[कामयन्ते] (plural)

The @deva[ण्] causes @deva[वृद्धि] (@deva[अ] -> @deva[आ]), and @deva[ङ्] indicates @deva[आत्मनेपद].
"""

standard = """
The @deva[णिङ्] affix attaches to @deva[कम्] "to desire."

**Examples:** @deva[कामयते], @deva[कामयेते], @deva[कामयन्ते]

**The affix @deva[णिङ्]:**
- @deva[ण्]: Triggers @deva[वृद्धि] by @ref[7.2.115] (@deva[अचो ञ्णिति]) - @deva[कम्] -> @deva[काम]
- @deva[ङ्]: Specifies @deva[आत्मनेपद] by @ref[1.3.12]
"""

advanced = """
@deva[णिङ्] after @deva[कम्] "to desire."

**Examples:** @deva[कामयते], @deva[कामयेते], @deva[कामयन्ते]

**Analysis of @deva[णिङ्]:**
- @deva[ण्]: @deva[णित्] triggers @deva[वृद्धि] by @ref[7.2.115] - @deva[कम्] -> @deva[काम]
- @deva[इ]: The actual affix element
- @deva[ङ्]: @deva[ङित्] specifies @deva[आत्मनेपद] by @ref[1.3.12]

**Derivation:** @deva[कम्] + @deva[णिङ्] = @deva[काम] + @deva[य] + @deva[ते] = @deva[कामयते]
"""

id = "3.1.19"
numericId = "31019"

[en]
simple = """
The affix @deva[क्यङ्] is used after @deva[नमस्] (adoration), @deva[वरिवस्] (honor), and @deva[चित्र] (wonder) in the sense of "making."

**Examples:**
- @deva[नमस्यति देवान्] "he worships the gods"
- @deva[वरिवस्यति गुरून्] "he honors the elders"
- @deva[चित्रीयते] "he astonishes" (@deva[आत्मनेपद] only)
"""

standard = """
The @deva[क्यङ्] affix attaches to @deva[नमस्], @deva[वरिवस्], @deva[चित्र] in @deva[करण] (making) sense.

**Examples:**
- @deva[नमस्यति देवान्] "worships the gods"
- @deva[वरिवस्यति गुरून्] "honors/serves the elders"
- @deva[चित्रीयते] "astonishes"

**@deva[चित्र] is @deva[आत्मनेपद] only:** The @deva[ङ्] in @deva[चित्रङ्] indicates it takes only @deva[आत्मनेपद] affixes.

**Derivation:** @deva[चित्र] + @deva[य] = @deva[चित्री] + @deva[य] (by @ref[7.4.33]) = @deva[चित्रीय]
"""

advanced = """
@deva[क्यङ्] after @deva[नमस्], @deva[वरिवस्], @deva[चित्रङ्] in @deva[करण] sense.

**Examples:**
- @deva[नमस्यति देवान्] "worships the gods"
- @deva[वरिवस्यति गुरून्] "honors the elders"
- @deva[चित्रीयते] "astonishes"

**@deva[चित्रङ्]:** The @deva[ङ्] marker specifies @deva[आत्मनेपद] only by @ref[1.3.12].

**Derivation of @deva[चित्रीयते]:** @deva[चित्र] + @deva[क्यङ्] = @deva[चित्री] + @deva[य] (by @ref[7.4.33]: @deva[अ] -> @deva[ई] before @deva[य]) = @deva[चित्रीय] + @deva[ते]
"""

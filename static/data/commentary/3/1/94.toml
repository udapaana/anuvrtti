id = "3.1.94"
numericId = "31094"

[en]
simple = """
This rule says that in the @deva[धातु]-domain, when a special (@deva[अपवाद]) affix differs in form from a general (@deva[उत्सर्ग]) affix, it only optionally supersedes the general affix. For example, @deva[क्] (from @ref[3.1.135]) for @deva[इक्]-penultimate roots optionally supersedes the general @deva[ण्वुल्]/​@deva[तृच्] (from @ref[3.1.133]): @deva[विक्षिपः] or @deva[विक्षेपकः]/​@deva[विक्षेप्ता]. But this doesn't apply to feminine affixes—there the special always supersedes.
"""

standard = """
In the @deva[धातु]-domain, a special affix (@deva[अपवाद]) that differs in form from a general affix (@deva[उत्सर्ग]) only optionally supersedes it. Example: @deva[क्] (@ref[3.1.135]) for @deva[इक्]-penultimate roots and the general @deva[ण्वुल्]/​@deva[तृच्] (@ref[3.1.133]) are @deva[असरूप] (dissimilar), so both can apply: @deva[विक्षिपः] (@deva[क्]) or @deva[विक्षेपकः]/​@deva[विक्षेप्ता] (@deva[ण्वुल्]/​@deva[तृच्]). If affixes are @deva[सरूप] (same form after removing @deva[इत्]s), like @deva[अण्] and @deva[क], the special always supersedes. Exception: feminine affixes—@deva[अ] (@ref[3.3.102]) always supersedes @deva[क्तिन्] (@ref[3.3.94]).
"""

advanced = """
This @[sūtra] establishes @deva[विकल्प] (optionality) for @deva[असरूप] (dissimilar) @deva[अपवाद]/@deva[उत्सर्ग] pairs in the @deva[धातु]-domain. When an @deva[अपवाद] affix differs in operative form from the @deva[उत्सर्ग], both may apply optionally. Example: @deva[क्] (@ref[3.1.135]) vs @deva[ण्वुल्]/​@deva[तृच्] (@ref[3.1.133])—being @deva[असरूप], both apply to @deva[इक्]-penultimate roots: @deva[विक्षिपः], @deva[विक्षेपकः], @deva[विक्षेप्ता]. When @deva[सरूप] (same operative element, e.g., @deva[अण्]/​@deva[क] both reduce to @deva[अ]), the @deva[अपवाद] obligatorily supersedes. The @deva[स्त्रियाम्] exception: feminine affixes like @deva[अ] (@ref[3.3.102]) obligatorily supersede @deva[क्तिन्] (@ref[3.3.94]) regardless of form.
"""

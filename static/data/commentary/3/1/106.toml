id = "3.1.106"
numericId = "31106"

[en]
simple = """
This rule says that after the root @deva[वद्] 'to speak', when it has a case-inflected @deva[उपपद] (dependent word) and no preposition, the affix @deva[क्यप्] can be added (in addition to @deva[यत्]). Examples: @deva[ब्रह्म] + @deva[वद्] + @deva[क्यप्] = @deva[ब्रह्मोद्यम्] 'proclaimed by Vedas'; or with @deva[यत्]: @deva[ब्रह्मवद्यम्]. Also @deva[सत्योद्यम्] or @deva[सत्यवद्यम्] 'truth-telling'. Without @deva[उपपद]: @deva[वाद्यम्] 'musical instrument'. With preposition: @deva[प्रवाद्यम्] 'rumour'.
"""

standard = """
After @deva[वद्] 'to speak' with a @deva[सुबन्त] (case-inflected) @deva[उपपद] and without @deva[उपसर्ग], the affix @deva[क्यप्] applies optionally alongside @deva[यत्]. The @deva[क्] and @deva[प्] are @deva[इत्] markers, leaving @deva[य] as the affix. Examples: @deva[ब्रह्मोद्यम्] (@deva[क्यप्]) or @deva[ब्रह्मवद्यम्] (@deva[यत्]) 'declared by Brahman'; @deva[सत्योद्यम्]/​@deva[सत्यवद्यम्] 'truth-speaking'. Without @deva[सुबन्तोपपद]: @deva[वाद्यम्] 'instrument' (uses @deva[ण्यत्]). With @deva[उपसर्ग]: @deva[प्रवाद्यम्] 'rumour' (uses @deva[ण्यत्]).
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] optionally for @deva[वद्] when accompanied by a @deva[सुबन्तोपपद] and without @deva[उपसर्ग] (by @deva[अनुवृत्ति] from @ref[3.1.100]). The @deva[क्] causes @deva[सम्प्रसारण] (@deva[वद्] → @deva[उद्]) by @ref[6.1.15]. The @deva[च] indicates @deva[यत्] also applies. Derivations: @deva[ब्रह्मन्] + @deva[वद्] + @deva[क्यप्] → @deva[ब्रह्मोद्य] (with @[samprasāraṇa] and sandhi); @deva[ब्रह्मन्] + @deva[वद्] + @deva[यत्] → @deva[ब्रह्मवद्य]. Without @deva[सुबन्त] @deva[उपपद], @deva[ण्यत्] applies: @deva[वाद्यम्]. With @deva[उपसर्ग], @deva[ण्यत्]: @deva[प्रवाद्यम्].
"""

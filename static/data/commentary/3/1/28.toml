id = "3.1.28"
numericId = "31028"

[en]
simple = """
The affix @deva[आय] is used after @deva[गुपू] (protect), @deva[धूप] (heat), @deva[विच्छ] (approach), @deva[पण] (praise), and @deva[पन] (praise).

**Examples:**
- @deva[गोपायति] "protects"
- @deva[धूपायति] "heats"
- @deva[विच्छायति] "approaches"
- @deva[पणायति] "praises"
- @deva[पनायति] "praises"
"""

standard = """
The @deva[आय] affix attaches to @deva[गुपू], @deva[धूप], @deva[विच्छ], @deva[पण], @deva[पन].

**Examples:**
- @deva[गोपायति] "protects"
- @deva[धूपायति] "heats"
- @deva[विच्छायति] "approaches"
- @deva[पणायति], @deva[पनायति] "praises"

**@deva[पण्] restriction:** Since @deva[पण्] is listed with @deva[पन्] "to praise," the affix applies only when @deva[पण्] means "praise," not "contract." Thus @deva[शतस्य पणते] "contracts for a hundred" - no @deva[आय].

**Voice:** These verbs do not take @deva[आत्मनेपद] - no indicatory letter specifies it.
"""

advanced = """
@deva[आय] after @deva[गुपू], @deva[धूप], @deva[विच्छ], @deva[पण], @deva[पन].

**Examples:** @deva[गोपायति], @deva[धूपायति], @deva[विच्छायति], @deva[पणायति], @deva[पनायति]

**@deva[पण्] semantic restriction:** By listing @deva[पण्] with @deva[पन्] ("praise"), the affix applies only in "praise" sense. @deva[शतस्य पणते], @deva[सहस्रस्य पणते] "contracts for 100/1000" - no @deva[आय] ("contract" sense).

**@deva[परस्मैपद] only:** No @deva[ङित्] marker, so these take @deva[परस्मैपद].
"""

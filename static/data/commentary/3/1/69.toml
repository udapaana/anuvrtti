id = "3.1.69"
numericId = "31069"

[en]
simple = """
This rule says that the affix @deva[श्यन्] is added after roots of the @deva[दिवादि] class (4th conjugation) when a @deva[सार्वधातुक] affix denoting the agent follows.

This @deva[श्यन्] blocks the general @deva[शप्] affix.

Breaking down @deva[श्यन्]:
- The @deva[श] makes it a @deva[सार्वधातुक] affix
- The @deva[न्] indicates that the @deva[उदात्त] accent falls on the root, not the affix (by @ref[6.1.197])
- The actual affix is @deva[य]

Example derivation: @deva[दिव्] + @deva[श्यन्] + @deva[तिप्] → @deva[दीव्] + @deva[य] + @deva[ति] (by @ref[7.2.77]) → @deva[दीव्यति] (he plays).

Similarly: @deva[सीव्यति] (he sews).
"""

standard = """
The affix @deva[श्यन्] is added after @deva[दिवादि] (4th class) roots when @deva[सार्वधातुक] follows in @deva[कर्तरि]. This @deva[विकरण] replaces @deva[शप्] for this class.

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्], making @deva[श्यन्] a @deva[सार्वधातुक] affix
- @deva[न्] is @deva[इत्] by @ref[1.3.3], triggering @ref[6.1.197] (root bears @deva[उदात्त], not affix)
- Operative portion: @deva[य]

Derivation: @deva[दिव्] + @deva[श्यन्] + @deva[तिप्] → @deva[दीव्] + @deva[य] + @deva[ति] (@ref[7.2.77] lengthens root vowel) → @deva[दीव्यति].

Examples: @deva[दीव्यति] (he plays), @deva[सीव्यति] (he sews), @deva[नश्यति] (he perishes).
"""

advanced = """
The affix @deva[श्यन्] is introduced after @deva[दिवादि] (@deva[गण] 4) roots when @deva[सार्वधातुक] follows in @deva[कर्तरि]. This is the @deva[विकरण] for the 4th conjugational class, replacing @deva[शप्].

@deva[इत्]-analysis:
- @deva[श] is @deva[इत्] by @ref[1.3.8], triggering @ref[3.4.113] (@deva[सार्वधातुक])
- @deva[न्] is @deva[इत्] by @ref[1.3.3], triggering @ref[6.1.197] (@deva[उदात्त] on @deva[धातु])
- Operative: @deva[य]

Derivation: @deva[दिव्] + @deva[श्यन्] + @deva[तिप्] → @deva[दीव्] + @deva[य] + @deva[ति] (@ref[7.2.77] @deva[श्यन्परे दीर्घ इकः]) → @deva[दीव्यति].

@note[type=observation]: @deva[श्यन्] is characterized by the @deva[य] element, giving @deva[दिवादि] roots their distinctive @deva[-यति] pattern: @deva[दीव्यति], @deva[सीव्यति], @deva[मन्यते], @deva[पश्यति].

@note[type=observation]: The @deva[निदित्] (@deva[न्]) marker distinguishes @deva[श्यन्] from @deva[शप्] in accent: @deva[श्यन्] has @deva[उदात्त] on the root, while @deva[शप्] (being @deva[पित्]) has @deva[अनुदात्त] on the affix.
"""

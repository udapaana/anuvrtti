id = "3.1.85"
numericId = "31085"

[en]
simple = """
This rule says that in Vedic Sanskrit, the various @deva[विकरण] affixes (@deva[शप्] etc.) can be interchanged or used differently from the standard rules. For example, @deva[भेदति] (using @deva[शप्]) appears instead of expected @deva[भिनत्ति] (using @deva[श्नम्]) from the 7th class root @deva[भिद्] 'to split'. Sometimes two @deva[विकरण]s are used together, as in @deva[नेषतु] and @deva[तरुषेम].
"""

standard = """
In @deva[छन्दस्] (Vedic literature), the @deva[विकरण] affixes taught from @ref[3.1.68] onward can be interchanged (@deva[व्यत्यय]) or combined. Examples: @deva[भेदति] (RV VIII.40.11) uses @deva[शप्] instead of expected @deva[श्नम्] for @deva[रुधादि] root @deva[भिद्]; @deva[मरते] (RV X.86.11) uses @deva[शप्] instead of @deva[श] for @deva[तुदादि] root @deva[मृ]. Double @deva[विकरण]s also occur: @deva[नेषतु] has both @deva[सिप्] and @deva[शप्]; @deva[तरुषेम] from @deva[तॄ] has @deva[उ] + @deva[सिप्] + @deva[शप्].
"""

advanced = """
This @[sūtra] licenses @deva[व्यत्यय] (interchange/irregularity) of @deva[विकरण] affixes in @deva[छन्दस्]. The term @deva[व्यत्यय] covers: (1) substitution of one @deva[विकरण] for another—@deva[भेदति] (@deva[भिद्] + @deva[शप्]) for expected @deva[भिनत्ति] (@deva[भिद्] + @deva[श्नम्]); (2) simultaneous use of multiple @deva[विकरण]s—@deva[नेषतु] (@deva[नी] + @deva[सिप्] + @deva[शप्]) for expected @deva[नयतु]; @deva[तरुषेम] (@deva[तॄ] + @deva[उ] + @deva[सिप्] + @deva[शप्] + @deva[इय्] + @deva[अम्]) for classical @deva[तरेम]/​@deva[तीर्याम]. This @[sūtra] is a general license for Vedic verbal irregularities regarding class markers.
"""

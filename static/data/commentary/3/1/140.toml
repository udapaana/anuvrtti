id = "3.1.140"
numericId = "31140"

[en]
simple = """
The affix @deva[ण] is **optionally** used after the @deva[ज्वलादि] roots (from @deva[ज्वल्] to @deva[कस्]) when there is no @deva[उपसर्ग] (prefix).

**Key examples:**
- @deva[ज्वल्] → @deva[ज्वालः] (with @deva[ण]) or @deva[ज्वलः] (with @deva[अच्])
- @deva[चल्] → @deva[चालः] or @deva[चलः]

The @deva[ण्] causes @deva[वृद्धि] of the penultimate @deva[अ] (e.g., @deva[अ] → @deva[आ]).

With a prefix, only @deva[अच्] is used: @deva[प्रज्वलः] 'luminous'.
"""

standard = """
The affix @deva[ण] is optionally used after the @deva[ज्वलादि] roots (about 56 roots from @deva[ज्वल्] to @deva[कस्], @[bhvādi] class) when there is no @deva[उपसर्ग].

This debars @deva[अच्] (@ref[3.1.134]).

| Root | With @deva[ण] | With @deva[अच्] |
|------|---------------|------------------|
| @deva[ज्वल्] | @deva[ज्वालः] | @deva[ज्वलः] |
| @deva[चल्] | @deva[चालः] | @deva[चलः] |

**@deva[ण्] effect:** The indicatory @deva[ण्] causes @deva[वृद्धि] of the penultimate @deva[अ].

**With prefix:** Only @deva[अच्] applies: @deva[प्रज्वलः] 'luminous'.

**@[vārtika]:** @deva[तन्] 'to stretch' is included; @deva[ण] is mandatory even with prefix: @deva[अवतानः].
"""

advanced = """
The affix @deva[ण] is optionally used after the @deva[ज्वलादि] roots (approximately 56 roots from @deva[ज्वल्] 'to shine' to @deva[कस्] 'to go', all @[bhvādi] class) when there is no @deva[उपसर्ग].

This debars @deva[अच्] (@ref[3.1.134]).

| Root | With @deva[ण] (@deva[वृद्धि]) | With @deva[अच्] |
|------|------------------------------|------------------|
| @deva[ज्वल्] | @deva[ज्वालः] | @deva[ज्वलः] |
| @deva[चल्] | @deva[चालः] | @deva[चलः] |

**@deva[ण्] effect:** The indicatory @deva[ण्] in @deva[ण] causes @deva[वृद्धि] of the penultimate @deva[अ]. When @deva[ण] is not used, @deva[अच्] applies with no @deva[वृद्धि].

**With prefix:** Compound verbs take only @deva[अच्]: @deva[प्रज्वलः] 'luminous'.

**@[vārtika]:** @deva[तन्] 'to stretch' must be included in this list. It takes @deva[ण] obligatorily, even with an @deva[उपसर्ग]: @deva[अवतानः]. The conditions 'option' and 'without prefix' do not apply to @deva[तन्].
"""

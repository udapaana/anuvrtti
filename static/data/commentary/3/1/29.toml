id = "3.1.29"
numericId = "31029"

[en]
simple = """
The affix @deva[ईयङ्] is used after the root @deva[ऋ] (reproach/pity) when listed as @deva[ऋति] in the @deva[धातुपाठ].

**Examples:**
- @deva[ऋतीयते] "reproaches" or "pities"
- @deva[ऋतीयाते] (dual)
- @deva[ऋतीयन्ते] (plural)

The @deva[ङ्] in @deva[ईयङ्] indicates @deva[आत्मनेपद] (middle voice).
"""

standard = """
The @deva[ईयङ्] affix attaches to the @deva[सूत्र]-listed root @deva[ऋति] "to reproach/pity."

**Examples:** @deva[ऋतीयते], @deva[ऋतीयाते], @deva[ऋतीयन्ते]

**Voice:** The @deva[ङ्] marker indicates @deva[आत्मनेपद] affixes by @ref[1.3.12].
"""

advanced = """
@deva[ईयङ्] after @deva[सूत्रधातु] @deva[ऋति] "to reproach/pity."

**Examples:** @deva[ऋतीयते], @deva[ऋतीयाते], @deva[ऋतीयन्ते]

**@deva[ङित्]:** The @deva[ङ्] specifies @deva[आत्मनेपद] by @ref[1.3.12].

**Note:** This root is listed as @deva[ऋति] in the @deva[धातुपाठ] (@deva[सूत्रधातु]), not simply as @deva[ऋ].
"""

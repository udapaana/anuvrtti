id = "3.1.121"
numericId = "31121"

[en]
simple = """
The word @deva[युग्यम्] 'vehicle, carrier' is **irregularly** formed from @deva[युज्] 'to yoke'.

**Irregular features:**
- @deva[ज] → @deva[ग] (irregular consonant change)
- Uses @deva[क्यप्] affix

**Examples:**
- @deva[युग्यो गौः] 'the yoked bull, carrier bull'
- @deva[युग्यो हस्ती] 'the harnessed elephant'

**Regular form:** When not meaning 'carrier/vehicle': @deva[युज्] + @deva[ण्यत्] = @deva[योग्यम्] 'suitable, proper'
"""

standard = """
The word @deva[युग्यम्] is **irregularly** formed meaning 'a vehicle' or 'carrier'.

**Derivation:**
@deva[युज्] 'to yoke' + @deva[क्यप्] = @deva[युग्यम्]

**Irregularities:**
1. @deva[ज] → @deva[ग] (unexpected consonant change)
2. @deva[क्यप्] used instead of expected @deva[ण्यत्]

**Usage:**
- @deva[युग्यो गौः] 'the carrier bull, yoked bull'
- @deva[युग्यो हस्ती] 'the harnessed elephant ready to carry'

**Contrast with regular form:**
When not meaning 'carrier/vehicle', the regular form applies:
@deva[युज्] + @deva[ण्यत्] = @deva[योग्यम्] 'suitable, fit, proper' (with @deva[वृद्धि])
"""

advanced = """
The word @deva[युग्यम्] is irregularly formed meaning 'a vehicle' or 'carrier'.

**Derivation:**
@deva[युज्] 'to yoke' + @deva[क्यप्] = @deva[युग्यम्]

**Irregularities (@deva[निपातन]):**
1. @deva[ज] → @deva[ग] (irregular consonant substitution)
2. @deva[क्यप्] affix employed (not derivable by general rules)

**Examples:**
- @deva[युग्यो गौः] 'the carrier bull, yoked bull'
- @deva[युग्यो हस्ती] 'the harnessed elephant ready to carry'

**Semantic restriction:** This irregular form applies only when the meaning is 'vehicle' or 'carrier' (that which is harnessed to carry).

**Regular formation:** When not denoting 'carrier/vehicle', the regular form @deva[योग्यम्] 'suitable, fit' is used: @deva[युज्] + @deva[ण्यत्] = @deva[योग्यम्] (with @deva[वृद्धि] by @ref[7.2.115]).
"""

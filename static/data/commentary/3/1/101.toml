id = "3.1.101"
numericId = "31101"

[en]
simple = """
The words @deva[अवद्य] (condemnable), @deva[पण्य] (saleable), and @deva[वर्या] (a bride who chooses freely) are irregular formations. They do not follow the standard rules for adding @deva[कृत्य] affixes to their respective roots.

For example, @deva[अवद्यं पापम्] means "censurable sin," and @deva[पण्यः कम्बलः] means "a saleable blanket." The word @deva[वर्या] refers specifically to a woman exercising the right of self-choice in marriage: @deva[शतेन वर्या] means "unobstructable by a hundred (suitors)."

If formed regularly, these words would be @deva[अनुद्यम्], @deva[पाण्यम्], and @deva[वृत्या] respectively. This rule matters because it authorizes widely-used words whose forms cannot be predicted from general grammar.
"""

standard = """
This is a @[nipātana] (irregular listing) rule, prescribing three words whose derivations deviate from general @deva[कृत्य] formation.

The three words and their irregular features:
- @deva[अवद्य] "condemnable" — from @deva[अ] + @deva[वद्] "to speak" + @deva[क्यप्]; the expected regular form is @deva[अनुद्यम्] (with @[samprasāraṇa])
- @deva[पण्य] "saleable" — from @deva[पण्] "to transact" + @deva[ण्यत्]; the expected regular form is @deva[पाण्यम्] (with @[vṛddhi])
- @deva[वर्या] "a bride choosing freely" — from @deva[वृ] "to choose" + @deva[क्यप्]; the expected regular form is @deva[वृत्या]

Examples: @deva[अवद्यं पापम्] "censurable sin"; @deva[पण्याः गावः] "saleable cows"; @deva[शतेन वर्या] "a bride unobstructable by a hundred suitors." The word @deva[वर्या] is feminine only; the masculine form is the regular @deva[वार्यः].
"""

advanced = """
@[anuvṛtti]: None specific — this @[sūtra] is a self-contained @deva[निपातन] (irregular listing).

The three listed forms override expected derivations: @deva[अ] + @deva[वद्] + @deva[क्यप्] would yield @deva[अनुद्यम्] (with @[samprasāraṇa] by @ref[6.1.15]); @deva[पण्] + @deva[ण्यत्] would yield @deva[पाण्यम्] (with @[vṛddhi] by @ref[7.2.115]); @deva[वृ] + @deva[क्यप्] would yield @deva[वृत्या]. The @deva[निपातन] overrides all these.

The word @deva[वर्या] is restricted to @deva[स्त्रीलिङ्ग] (feminine gender), denoting a @deva[स्वयंवरा] bride — one who exercises the rite of self-choice. The masculine retains the regular @deva[ण्यत्] formation: @deva[वार्यः ऋत्विजः] "an obstructable priest." The words @deva[अवद्य] and @deva[पण्य] apply across all genders. This @[sūtra] belongs to the closing @deva[निपातन] section of the @deva[कृत्य] topic that began at @ref[3.1.96].
"""

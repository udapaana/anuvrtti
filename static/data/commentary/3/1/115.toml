id = "3.1.115"
numericId = "31115"

[en]
simple = """
This rule says that the words @deva[भिद्य] and @deva[उद्ध्य] are irregularly formed with @deva[क्यप्] when meaning 'river'. @deva[भिद्यः] is from @deva[भिद्] 'to break'—a river that breaks its banks. @deva[उद्ध्यः] is from @deva[ऊह्] 'to overflow'—a river whose waters overflow. When not meaning 'river', regular forms are used: @deva[भेत्ता], @deva[उज्झिता].
"""

standard = """
The words @deva[भिद्य] and @deva[उद्ध्य] are @deva[निपातन] with @deva[क्यप्] when denoting rivers. @deva[भिद्] + @deva[क्यप्] = @deva[भिद्यः] 'a river breaking its banks' (name of @[bhidyā] river). @deva[ऊह्] + @deva[क्यप्] = @deva[उद्ध्यः] 'an overflowing river' (name of @[uddhyā] river)—the @deva[झ्] changes to @deva[ध्]. The @deva[नद्याम्] restriction limits this irregular form to river names; in other senses, regular forms apply: @deva[भेत्ता] 'one who breaks', @deva[उज्झिता] 'one who overflows'.
"""

advanced = """
This @[sūtra] establishes @deva[भिद्य] and @deva[उद्ध्य] as @deva[निपातन] with @deva[क्यप्] restricted to @deva[नदी] (river) denotation. Derivations: @deva[भिद्] + @deva[क्यप्] → @deva[भिद्य] (river breaking banks); @deva[ऊह्] (@deva[उज्झ्]) + @deva[क्यप्] → @deva[उद्ध्य] (with @deva[झ्] → @deva[ध्] irregular change) 'overflowing river'. These are proper names of rivers characterized by the described actions. The semantic restriction @deva[नद्याम्] ensures that general usage takes regular @deva[कृत्] formations: @deva[भेत्तृ]/​@deva[भेत्ता] from @deva[भिद्], @deva[उज्झितृ]/​@deva[उज्झिता] from @deva[उज्झ्].
"""

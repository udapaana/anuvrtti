id = "3.1.49"
numericId = "31049"

[en]
simple = """
This rule says that @deva[चङ्] optionally replaces @deva[च्लि] after the roots @deva[धे] (to suck) and @deva[श्वि] (to grow) when the agent is signified.

Since @deva[चङ्] is optional, these roots can form their aorist in multiple ways:

For @deva[धे] (to suck):
- With @deva[चङ्]: @deva[अदधत्] (he sucked)
- With @deva[सिच्]: @deva[अधात्] or @deva[अधासीत्] (by @ref[2.4.78])

For @deva[श्वि] (to grow):
- With @deva[चङ्]: @deva[अशिश्वियत्] (he grew)
- With @deva[अङ्] (by @ref[3.1.58]): @deva[अश्वत्] or @deva[अश्वयीत्]
"""

standard = """
@deva[चङ्] optionally (@deva[विभाषा]) substitutes for @deva[च्लि] after @deva[धे] (to suck) and @deva[श्वि] (to grow) when @deva[कर्तरि] (active voice).

@deva[धे]:
- @deva[चङ्]-aorist: @deva[अदधत्]
- @deva[सिच्]-aorist: @deva[अधात्], @deva[अधासीत्] (by @ref[2.4.78] @deva[धेट्शदोः])

@deva[श्वि]:
- @deva[चङ्]-aorist: @deva[अशिश्वियत्]
- @deva[अङ्]-aorist (by @ref[3.1.58]): @deva[अश्वत्], @deva[अश्वयीत्]

The optionality allows stylistic variation between reduplicated (@deva[चङ्]) and non-reduplicated aorist forms.
"""

advanced = """
@deva[चङ्] optionally applies after @deva[धे] and @deva[श्वि] in @deva[कर्तरि लुङ्].

@deva[धे]:
- @deva[चङ्]: @deva[अदधत्] (reduplicated)
- @deva[सिच्]: @ref[2.4.78] @deva[धेट्शदोः] causes @deva[लुक्] of @deva[सिच्], yielding @deva[अधात्]; or with @deva[इट्], @deva[अधासीत्]

@deva[श्वि]:
- @deva[चङ्]: @deva[अशिश्वियत्]
- @deva[अङ्] (by @ref[3.1.58]): @deva[अश्वत्] (thematic @deva[अ]) or @deva[अश्वयीत्] (with @deva[यक्])

@note[type=observation]: The three-way alternation for @deva[धे] (@deva[चङ्]/@deva[सिच्]-@deva[लुक्]/@deva[सिच्]+@deva[इट्]) and two-way for @deva[श्वि] (@deva[चङ्]/@deva[अङ्]) provides considerable formal variety in the aorist paradigm.
"""

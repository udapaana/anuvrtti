id = "3.1.88"
numericId = "31088"

[en]
simple = """
This rule restricts the previous rule for the verb @deva[तप्] 'to heat'. The agent becomes object-like only when the object is @deva[तपस्] 'austerity' itself. For example: @deva[तप्यते तपस्तापसः] 'the ascetic performs austerity'—passive construction is allowed. But @deva[उत्तपति सुवर्णं सुवर्णकारः] 'the goldsmith heats gold'—no passive construction here because the object is not @deva[तपस्].
"""

standard = """
The @deva[कर्मवद्भाव] (object-like treatment) of @ref[3.1.87] applies to the root @deva[तप्] 'to heat' only when the object is the word @deva[तपस्] 'austerity'. Example: @deva[तप्यते तपस्तापसः] 'the ascetic performs austerity'—the agent @deva[तापस] receives passive treatment. Counter-example: @deva[उत्तपति सुवर्णं सुवर्णकारः] 'the goldsmith heats gold'—active construction because @deva[सुवर्ण] is not @deva[तपस्]. This is a @deva[नियम] (restriction) on the general rule.
"""

advanced = """
This @[sūtra] restricts @deva[कर्मवद्भाव] for @deva[तप्] (@deva[तपस्तपोऽनुतापे]) to contexts where @deva[तपस्] is the @deva[कर्मन्]. The restriction (@deva[नियम]) implies that @deva[तप्] in other object contexts (e.g., @deva[सुवर्णं तपति]) does not undergo @deva[कर्मवद्भाव]. Thus @deva[तप्यते तपस्तापसः] with @deva[यक्] and @deva[आत्मनेपद], but @deva[उत्तपति सुवर्णं सुवर्णकारः] with active @deva[परस्मैपद]. The philosophical rationale: in performing @deva[तपस्], the ascetic transforms himself like the object of transformation, justifying reflexive treatment.
"""

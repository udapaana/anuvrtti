id = "3.1.103"
numericId = "31103"

[en]
simple = """
The word @deva[अर्य] is an irregular formation meaning either "lord" or "a member of the @[vaiśya] (merchant) class." It comes from the root @deva[ऋ] (to go/reach) with the affix @deva[यत्], instead of the expected @deva[ण्यत्].

For example, @deva[अर्यः स्वामी] means "honored lord." When the meaning is not specifically "lord" or "@[vaiśya]," the regular @deva[ण्यत्] form applies with @[vṛddhi]: @deva[आर्यो ब्राह्मणः] means "the respectable @[brāhmaṇa]."

This rule creates an important distinction: @deva[अर्यः] (irregular, without @[vṛddhi]) means "lord" or "@[vaiśya]," while @deva[आर्यः] (regular, with @[vṛddhi]) means "noble" or "respectable."
"""

standard = """
This is a @deva[निपातन] prescribing @deva[अर्य] from @deva[ऋ] "to go/reach" + @deva[यत्] (instead of @deva[ण्यत्] per @ref[3.1.124]) when the meaning is @deva[स्वामिन्] (lord) or @deva[वैश्य] (merchant class).

Examples: @deva[अर्यः स्वामी] "honored lord"; @deva[अर्ये वैश्यः] "a @[vaiśya]." For other meanings, @deva[ण्यत्] applies with @[vṛddhi]: @deva[आर्यः ब्राह्मणः] "respectable @[brāhmaṇa]."

A @[vārtika] notes an accent irregularity: in the "lord" sense, @deva[अर्य] takes @deva[अन्तोदात्त] (final accent), overriding the @deva[आद्युदात्त] (initial accent) that @deva[यत्] normally produces by @ref[6.1.213].
"""

advanced = """
@[anuvṛtti]: The @deva[कृत्य] context from @ref[3.1.96].

This @[sūtra] establishes @deva[अर्य] as @deva[निपातन] from @deva[ऋ] + @deva[यत्] in two restricted senses: @deva[स्वामिन्] (lord/master) and @deva[वैश्य] (the third @deva[वर्ण]). The expected @deva[ण्यत्] formation (per @ref[3.1.124] for @deva[ऋ]-final roots) would yield @deva[आर्य] with @[vṛddhi], which applies in all other contexts.

A @[vārtika] records: @deva[स्वाम्यर्थे अन्तोदात्तः] — in the "lord" sense, @deva[अर्य] takes final accent (@deva[अन्तोदात्त]), overriding the @deva[आद्युदात्त] prescribed by @ref[6.1.213] for @deva[यत्] derivatives. This creates a formally homophonous but accentually distinct pair: @deva[अर्यः] (lord/@[vaiśya], irregular @deva[यत्]) versus @deva[आर्यः] (noble, regular @deva[ण्यत्]). The semantic restriction ensures the two forms partition the meaning space cleanly.
"""

id = "3.1.145"
numericId = "31145"

[en]
simple = """
The affix @deva[ष्वुन्] (= @deva[अक]) is used when the agent denotes a professional artist/craftsman.

**Examples:**
- @deva[नृत्] → @deva[नर्तकः] 'dancer' (f. @deva[नर्तकी])
- @deva[खन्] → @deva[खनकः] 'digger, miner' (f. @deva[खनकी])
- @deva[रञ्ज्] → @deva[रजकः] 'washerman, dyer' (f. @deva[रजकी])

The @deva[व्] in @deva[ष्वुन्] indicates feminine @deva[ङीप्] (@ref[4.1.41]).
"""

standard = """
The affix @deva[ष्वुन्] (= @deva[अक]) is used when the agent denotes a professional artist/craftsman (@deva[शिल्पिन्]).

**@[vārtika]:** Confined to @deva[नृत्], @deva[खन्], and @deva[रञ्ज्].

| Root | Form | Feminine | Meaning |
|------|------|----------|---------|
| @deva[नृत्] | @deva[नर्तकः] | @deva[नर्तकी] | dancer |
| @deva[खन्] | @deva[खनकः] | @deva[खनकी] | digger, miner |
| @deva[रञ्ज्] | @deva[रजकः] | @deva[रजकी] | washerman, dyer |

**@deva[व्] indicator:** The @deva[व्] in @deva[ष्वुन्] is @deva[इत्] (@ref[1.3.6]), indicating feminine @deva[ङीप्] by @ref[4.1.41].

For @deva[रञ्ज्], the nasal is elided.
"""

advanced = """
The affix @deva[ष्वुन्] (= @deva[अक]) is used when the agent denotes a professional artist/craftsman (@deva[शिल्पिन्]).

**@[vārtika]:** This affix is confined to @deva[नृत्] 'to dance', @deva[खन्] 'to dig', and @deva[रञ्ज्] 'to dye'.

**Derivations:**
- @deva[नृत्] + @deva[ष्वुन्] = @deva[नर्त] + @deva[अक] @ref[7.1.1] = @deva[नर्तकः] 'dancer' (f. @deva[नर्तकी])
- @deva[खन्] + @deva[ष्वुन्] = @deva[खनकः] 'miner' (f. @deva[खनकी])
- @deva[रञ्ज्] + @deva[ष्वुन्] = @deva[रजकः] 'washerman' (f. @deva[रजकी]) — nasal elided

**@deva[व्] indicator:** The @deva[व्] in @deva[ष्वुन्] is @deva[इत्] (@ref[1.3.6]). By @ref[4.1.41], affixes with indicatory @deva[च्] take feminine @deva[ङीप्].

**@[mahābhāṣya] view:** Only @deva[नृत्] and @deva[खन्] take @deva[ष्वुन्]; @deva[रञ्ज्] takes @deva[क्वुन्]: @deva[रञ्ज्] + @deva[क्वुन्] = @deva[रज्] + @deva[यु] @ref[6.4.37] = @deva[रजकः] (f. @deva[रजिका]).
"""

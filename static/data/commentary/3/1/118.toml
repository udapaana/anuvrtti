id = "3.1.118"
numericId = "31118"

[en]
simple = """
This rule says that in Vedic Sanskrit, the root @deva[ग्रह्] 'to seize' takes the affix @deva[क्यप्] when preceded by the prepositions @deva[प्रति] and @deva[अपि]. Vedic example: @deva[मत्तस्य न प्रतिग्राह्यं तस्मान्नापिगृह्यम्]. In classical Sanskrit, the proper forms use @deva[ण्यत्]: @deva[प्रतिगृह्यम्], @deva[अपिग्राह्यम्].
"""

standard = """
In @deva[छन्दस्] (Vedic), @deva[ग्रह्] 'to seize' with @deva[प्रति] or @deva[अपि] takes @deva[क्यप्]. Vedic example: @deva[प्रतिग्राह्यम्], @deva[अपिगृह्यम्] (showing Vedic forms). In classical Sanskrit (@deva[भाषा]), the standard derivations use @deva[ण्यत्]: @deva[प्रतिगृह्यम्] 'to be received', @deva[अपिग्राह्यम्] 'to be seized'. The Vedic license allows @deva[क्यप्] where @deva[ण्यत्] would normally apply.
"""

advanced = """
This @[sūtra] licenses @deva[क्यप्] for @deva[प्रति]/​@deva[अपि] + @deva[ग्रह्] in @deva[छन्दस्]. Vedic attestation: @deva[मत्तस्य न प्रतिग्राह्यं तस्मान्नापिगृह्यम्] shows the forms @deva[प्रतिग्राह्य] and @deva[अपिगृह्य]. In @deva[भाषा] (classical Sanskrit), @deva[ण्यत्] applies: @deva[प्रति] + @deva[ग्रह्] + @deva[ण्यत्] → @deva[प्रतिगृह्यम्] (with @[samprasāraṇa]); @deva[अपि] + @deva[ग्रह्] + @deva[ण्यत्] → @deva[अपिग्राह्यम्] (with @[vṛddhi]). The Vedic @deva[क्यप्] forms show absence of the @[vṛddhi] that @deva[ण्यत्] would cause.
"""

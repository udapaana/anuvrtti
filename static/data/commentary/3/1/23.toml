id = "3.1.23"
numericId = "31023"

[en]
simple = """
The affix @deva[यङ्] is always used after verbs of motion to express "crookedness" or "moving in a zigzag manner." It never expresses repetition or intensity after these verbs.

**Example:** @deva[चङ्क्रम्यते] "moves crookedly" (from @deva[क्रम्] "to move")

To express repetition with motion verbs, use a phrase like @deva[भृशं क्रामति] "wanders much."
"""

standard = """
After @deva[गतिधातु]s (verbs of motion), the @deva[यङ्] affix invariably (@deva[नित्य]) expresses @deva[जिह्मगति] (crooked motion), not repetition or intensity.

**Examples:**
- @deva[क्रम्] -> @deva[चङ्क्रम्यते] "moves crookedly"
- @deva[द्रम्] -> @deva[दन्द्रम्यते]

**Restriction:** The word @deva[नित्य] indicates @deva[यङ्] has only the crooked-motion sense after these verbs. For repetition/intensity, use a phrase: @deva[भृशं क्रामति] "wanders much."
"""

advanced = """
After @deva[गतिधातु]s, @deva[यङ्] is @deva[नित्य] (obligatory) in @deva[जिह्मगति] (crooked motion) sense.

**Examples:** @deva[चङ्क्रम्यते], @deva[दन्द्रम्यते]

**Implication of @deva[नित्य]:** @deva[यङ्] cannot express @deva[क्रियासमभिहार] (repetition/intensity) after motion verbs - only crooked motion. For intensity, use: @deva[भृशं क्रामति].

**Contrast with @ref[3.1.22]:** General @deva[यङ्] expresses repetition/intensity; here after motion verbs, it is restricted to crookedness.
"""

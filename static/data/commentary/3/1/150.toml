id = "3.1.150"
numericId = "31150"

[en]
simple = """
The affix @deva[वुन्] (= @deva[अक]) is used after **all** roots when @deva[आशीः] (benediction/blessing) is intended.

**Examples (as names expressing blessings):**
- @deva[जीवकः] 'may he live'
- @deva[नन्दकः] 'may he be happy'

These are often used as proper names expressing a prayer or wish for the person.
"""

standard = """
The affix @deva[वुन्] (= @deva[अक]) is used after all roots when @deva[आशीः] (benediction) is intended.

| Root | Form | Benedictory Meaning |
|------|------|---------------------|
| @deva[जीव्] 'to live' | @deva[जीवकः] | may he live |
| @deva[नन्द्] 'to be happy' | @deva[नन्दकः] | may he be happy |

**@deva[आशीः]:** A prayer or blessing relating to action. The affix expresses an agent whose action is the object of a prayer — someone wishes that action for that agent.

These forms are commonly used as proper names (e.g., @deva[जीवकः], the famous physician).
"""

advanced = """
The affix @deva[वुन्] (= @deva[अक]) is used after all roots when @deva[आशीः] (benediction) is intended.

**Examples:**
- @deva[जीव्] + @deva[वुन्] = @deva[जीवकः] 'may he live'
- @deva[नन्द्] + @deva[वुन्] = @deva[नन्दकः] 'may he be happy'

**On @deva[आशीः]:** The word means 'a prayer or blessing' and relates to action. The semantic force of this affix is: 'an agent with the addition that the action is simply the object of a prayer of someone who wishes that may be the action of that agent.'

In other words, the word denotes not just an agent but an agent whose action is desired/prayed for by someone. These forms are commonly used as proper names expressing parental blessings.
"""

id = "3.1.109"
numericId = "31109"

[en]
simple = """
This rule says that the affix @deva[क्यप्] is added after the roots @deva[इ] 'to go', @deva[स्तु] 'to praise', @deva[शास्] 'to govern', @deva[वृ] 'to choose/respect', and @deva[जुष्] 'to please'. Examples: @deva[इत्यः] 'to be gone'; @deva[स्तुत्यः] 'to be praised'; @deva[शिष्यः] 'pupil' (to be instructed); @deva[वृत्यः] 'to be chosen'; @deva[जुष्यः] 'to be served'. By @ref[6.1.71], @deva[त्] is added after short vowels before @deva[क्यप्].
"""

standard = """
The affix @deva[क्यप्] is prescribed generally after @deva[इ] 'to go', @deva[स्तु] 'to praise', @deva[शास्] 'to govern', @deva[वृ] 'to choose', and @deva[जुष्] 'to please'. The @deva[अनुवृत्ति] of @deva[सुपि], @deva[अनुपसर्गे], @deva[भावे] does not apply here. By @ref[6.1.71], @deva[त्] augment is added after short vowels before @deva[क्यप्]. Derivations: @deva[इत्यः]; @deva[स्तुत्यः]; @deva[शिष्यः] (with @ref[6.4.34]); @deva[वृत्यः]; @deva[जुष्यः]. The @deva[वृ] here is @deva[वृञ्] 'to choose', not @deva[वृङ्] (which gives @deva[वार्यः]). @note[type=@[vārtika]] @deva[शस्], @deva[दुह्], @deva[गुह्] optionally take @deva[क्यप्]: @deva[शस्यम्]/​@deva[शंस्यम्]; @deva[दुह्यम्]/​@deva[दोह्यम्].
"""

advanced = """
This @[sūtra] prescribes @deva[क्यप्] generally for @deva[इण्] (@deva[अदादि]), @deva[स्तु], @deva[शास्], @deva[वृञ्], @deva[जुष्]—without the @deva[भाव]/​@deva[सुबन्तोपपद]/​@deva[अनुपसर्ग] restrictions of prior @[sūtras]. The repetition of @deva[क्यप्] blocks @deva[ण्यत्] (e.g., @ref[3.1.125] for @deva[स्तु]). By @ref[6.1.71] (@deva[ह्रस्वस्य पितः कृति तुक्]), @deva[त्]-augment precedes @deva[क्यप्] after short vowels: @deva[इ] + @deva[त्] + @deva[य] → @deva[इत्य]. For @deva[शास्]: @deva[आ] → @deva[इ] by @ref[6.4.34], yielding @deva[शिष्य]. The @deva[वृ] is @deva[वृञ्] 'to choose' (not @deva[वृङ्] which yields @deva[वार्य] by @deva[ण्यत्]). @note[type=@[vārtika]] @deva[शसिदुहिगुहिभ्यश्च]: @deva[शस्], @deva[दुह्], @deva[गुह्] optionally take @deva[क्यप्]. @note[type=@[vārtika]] @deva[आङ्पूर्वादञ्जेः संज्ञायाम्]: @deva[आ] + @deva[अञ्ज्] + @deva[क्यप्] → @deva[आज्यम्] 'ghee' (as proper name).
"""

id = "3.1.41"
numericId = "31041"

[en]
simple = """
This rule teaches an optional irregular form: @deva[विदाङ्कुर्वन्तु] (let them know). It is formed by adding @deva[आम्] to the root @deva[विद्] (to know) when followed by @deva[लोट्] (imperative). The @deva[लोट्] endings are then deleted, and the imperative of the auxiliary @deva[कृ] is added instead.

The form @deva[विदाङ्कुर्वन्तु] is an alternative to the regular @deva[विदन्तु] (let them know).

Though the @[sūtra] cites the third person @deva[बहुवचन] (plural) form, this pattern applies to all persons and numbers of the imperative: @deva[विदाङ्करोतु] (let him know), @deva[विदाङ्कुरुताम्] (let them two know), etc.
"""

standard = """
The form @deva[विदाङ्कुर्वन्तु] is optionally used as an irregular periphrastic imperative of @deva[विद्] (to know). Formation: @deva[विद्] + @deva[आम्] + @deva[लोट्] of @deva[कृ].

The @deva[लोट्] endings of @deva[विद्] undergo @deva[लुक्] (deletion), and no @deva[गुण] occurs (blocking @ref[7.3.86]). The auxiliary @deva[कृ] then supplies the imperative endings.

Alternative: @deva[विदाङ्कुर्वन्तु] or @deva[विदन्तु] (regular imperative).

Though the @[sūtra] exemplifies third plural, the @deva[इति] indicates all persons and numbers may use this formation: @deva[विदाङ्करोतु], @deva[विदाङ्कुरुताम्], @deva[विदाङ्कुर्वन्तु], etc.
"""

advanced = """
The form @deva[विदाङ्कुर्वन्तु] is an optional (@deva[विभाषा]) periphrastic imperative of @deva[विद्]. The derivation parallels the periphrastic perfect: @deva[विद्] + @deva[आम्], with @deva[लुक्] of original @deva[लोट्] endings, no @deva[गुण] (blocking @ref[7.3.86]), then @deva[लोट्] of @deva[कृ].

Alternate forms: @deva[विदाङ्कुर्वन्तु] / @deva[विदन्तु].

The @deva[इति] in the @[sūtra] (@deva[विदाङ्कुर्वन्त्विति]) signals that the citation is exemplary, not restrictive—all @deva[लोट्] forms are available: @deva[विदाङ्करोतु], @deva[विदाङ्कुरुताम्], @deva[विदाङ्कुर्वन्तु], @deva[विदाङ्करवाणि], etc.

@note[type=observation]: This extends the periphrastic formation from @deva[लिट्] (perfect) to @deva[लोट्] (imperative) for @deva[विद्], providing a stylistic alternative to the regular imperative.
"""

id = "3.1.74"
numericId = "31074"

[en]
simple = """
This rule says that @deva[श्नु] is replaced by @deva[शृ] after the root @deva[श्रु] (to hear), and @deva[श्नु] is still added after that, when a @deva[सार्वधातुक] affix denoting the agent follows.

Example derivation: @deva[श्रु] + @deva[श्नु] → @deva[शृ] + @deva[नु] + @deva[ति] → @deva[शृणोति] (he hears).

Dual: @deva[शृणुतः] (they two hear).

The root @deva[श्रु] belongs to the @deva[स्वादि] (5th) class.
"""

standard = """
After @deva[श्रु] (to hear), @deva[शृ] substitutes for the initial portion, and @deva[श्नु] is added, when @deva[सार्वधातुक] follows in @deva[कर्तरि].

Derivation: @deva[श्रु] + @deva[श्नु] + @deva[तिप्] → @deva[शृ] + @deva[नु] + @deva[ति] → @deva[शृणोति] (@deva[गुण] of @deva[नु] → @deva[नो]).

Examples: @deva[शृणोति] (he hears), @deva[शृणुतः] (they two hear), @deva[शृण्वन्ति] (they hear).

The @deva[च] indicates that both the substitution (@deva[शृ] for @deva[श्रु]) and the @deva[श्नु] affix apply together.
"""

advanced = """
After @deva[श्रु], @deva[शृ] is the @deva[आदेश] (substitute), and @deva[श्नु] is added in @deva[कर्तरि सार्वधातुक].

Derivation: @deva[श्रु] → @deva[शृ] (root substitute) + @deva[नु] + @deva[ति] → @deva[शृणोति].

The substitution @deva[शृ] for @deva[श्रु] is @deva[सर्वादेश] (whole-word replacement). Combined with @deva[श्नु], we get the characteristic @deva[शृणो-] stem.

Examples: @deva[शृणोति], @deva[शृणुतः], @deva[शृण्वन्ति].

@note[type=observation]: @deva[श्रु] is unique among @deva[स्वादि] roots in requiring this special @deva[शृ] substitution. Without it, we would expect *@deva[श्रुणोति].
"""

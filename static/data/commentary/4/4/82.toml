id = "4.4.82"
numericId = "44082"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[जनी] (bride) in the accusative case, in the sense of 'what bears that'. The resulting word is used as a name.

Example: @deva[जनीं वहति] 'bears the bride' → @deva[जन्यः] 'friend of the bridegroom', f. @deva[जन्या] 'bridesmaid'

@deva[जन्या] literally means 'one who carries the shy bride to the bridegroom'—at the time of ceremonial play, etc.
"""

standard = """
After @deva[जनी] (in @deva[द्वितीया]), @deva[यत्] applies in sense @deva[वहति]. Result is a @deva[संज्ञा].

Example: @deva[जन्यः] 'bridegroom's friend', f. @deva[जन्या] 'bridesmaid'.

@deva[जनी] = bride. @deva[जन्या] = 'one who bears/leads the bride' (at ceremonial play, etc.).
"""

advanced = """
@deva[जनी] (in @deva[द्वितीया]) takes @deva[यत्] in sense @deva[वहति]. @deva[संज्ञायाम्].

Example: @deva[जन्यः] f. @deva[जन्या].

@deva[जनी] = @deva[वधू]. @deva[जन्या] = one who carries the bride (@deva[क्रीडाकाले]).
"""

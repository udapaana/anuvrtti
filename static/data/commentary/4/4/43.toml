id = "4.4.43"
numericId = "44043"

[en]
simple = """
Both affixes @deva[ठन्] and @deva[ठक्] come after words denoting 'combination/assembly' in the @deva[द्वितीया] (accusative) case, in the sense of 'one who assembles there'.

The word @deva[समवाय] means 'combination, collection, assembly'.

Examples:
- @deva[समवायान् समवैति] 'joins assemblies' → @deva[सामवायिकः]
- @deva[समाजं समवैति] → @deva[सामाजिकः]
- @deva[समूहं समवैति] → @deva[सामूहिकः]
- @deva[सन्निवेशं समवैति] → @deva[सान्निवेशिकः]

The plural @deva[समवायान्] in the @[sūtra] indicates that @ref[1.1.69] (@deva[स्वरूपविधि]) does not apply—the affix applies to all synonyms of @deva[समवाय], not just that word.
"""

standard = """
After @deva[समवायवाचिन्] (words denoting assembly) in @deva[द्वितीया], @deva[ठन्] and @deva[ठक्] apply in sense @deva[समवैति] (assembles).

Examples: @deva[सामवायिकः], @deva[सामाजिकः], @deva[सामूहिकः], @deva[सान्निवेशिकः].

The plural @deva[समवायान्] blocks @ref[1.1.69]—affix applies to all @deva[समवायार्थक] words, not just @deva[समवाय].
"""

advanced = """
After @deva[समवायवाचिन्] (in @deva[द्वितीया]), @deva[ठन्]/@deva[ठक्] in sense @deva[समवैति].

Examples: @deva[सामवायिकः], @deva[सामाजिकः], @deva[सामूहिकः], @deva[सान्निवेशिकः].

The plural @deva[समवायान्] is @deva[स्वरूपविधिनिवृत्त्यर्थ]—by @ref[1.1.68], applies to @deva[तद्वाचिन्], not just @deva[स्वरूप].
"""

id = "4.4.21"
numericId = "44021"

[en]
simple = """
The affixes @deva[कक्] and @deva[कन्] come after the words @deva[अपमित्य] and @deva[याचित] respectively, in the sense of completion.

Examples:
- @deva[अपमित्य] + @deva[कक्] → @deva[आपमित्यकम्] 'debt'
- @deva[याचित] + @deva[कन्] → @deva[याचितकम्] 'a thing borrowed'

The word @deva[अपमित्य] is formed from @deva[अप] + @deva[मा] with @deva[क्त्वा] (@ref[3.4.19]), changed to @deva[ल्यप्], with @deva[आ] → @deva[इ] by @ref[6.4.70]. Since @deva[अपमित्य] is an @deva[अव्यय] (indeclinable), the @deva[तेन] (instrumental) sense does not apply here.
"""

standard = """
After @deva[अपमित्य], @deva[कक्] applies; after @deva[याचित], @deva[कन्] applies—both in sense of completion.

Examples:
- @deva[आपमित्यकम्] 'debt'
- @deva[याचितकम्] 'a borrowed item'

@deva[अपमित्य]: @deva[अप] + √@deva[मा] + @deva[क्त्वा] (@ref[3.4.19]) → @deva[ल्यप्], with @deva[आ] → @deva[इ] by @ref[6.4.70]. Being @deva[अव्यय], @deva[तेन] does not apply here.
"""

advanced = """
@deva[अपमित्य] takes @deva[कक्]; @deva[याचित] takes @deva[कन्]—in sense @deva[निर्वृत्तम्].

Examples: @deva[आपमित्यकम्] 'debt', @deva[याचितकम्] 'borrowed thing'.

@deva[अपमित्य]: @deva[अप] + √@deva[मा] + @deva[क्त्वा] (@ref[3.4.19]) → @deva[ल्यप्] with @deva[आ] → @deva[इ] (@ref[6.4.70]). Being @deva[अव्यय], the @deva[अनुवृत्ति] of @deva[तेन] does not run here.
"""

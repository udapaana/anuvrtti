id = "4.4.48"
numericId = "44048"

[en]
simple = """
The affix @deva[अण्] (instead of @deva[ठक्]) comes after the words in the @deva[महिष्यादि] list in the sense of 'its customary practice'.

Examples:
- @deva[महिष्याः धर्म्यम्] 'the usage of a queen' → @deva[माहिषम्] 'queen's customs'
- @deva[प्रजापतेः धर्म्यम्] → @deva[प्राजापतम्]

The @deva[महिष्यादि] list includes: @deva[महिषी], @deva[प्रजापति], @deva[प्रजावती], @deva[प्रलेपिका], @deva[विलेपिका], @deva[अनुलेपिका], @deva[पुरोहित], @deva[वणिपाली], @deva[अनुचारक], @deva[होतृ], @deva[यजमान].
"""

standard = """
After @deva[महिष्यादि], @deva[अण्] (not @deva[ठक्]) applies in sense @deva[धर्म्यम्].

Examples: @deva[माहिषम्] 'queen's customs', @deva[प्राजापतम्].

@deva[महिष्यादि] @[gaṇa] (11): @deva[महिषी], @deva[प्रजापति], @deva[प्रजावती], @deva[प्रलेपिका], @deva[विलेपिका], @deva[अनुलेपिका], @deva[पुरोहित], @deva[वणिपाली], @deva[अनुचारक] (@deva[अनुवारक]), @deva[होतृ], @deva[यजमान].
"""

advanced = """
@deva[महिष्यादि] takes @deva[अण्] (not @deva[ठक्]) in sense @deva[धर्म्यम्].

Examples: @deva[माहिषम्], @deva[प्राजापतम्].

@deva[महिष्यादि] @[gaṇa] (11): @deva[महिषी], @deva[प्रजापति], @deva[प्रजावती], @deva[प्रलेपिका], @deva[विलेपिका], @deva[अनुलेपिका], @deva[पुरोहित], @deva[वणिपाली], @deva[अनुचारक], @deva[होतृ], @deva[यजमान].
"""

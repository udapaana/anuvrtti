id = "4.4.60"
numericId = "44060"

[en]
simple = """
The affix @deva[ठक्] comes after the words @deva[अस्ति] (it exists), @deva[नास्ति] (it does not exist), and @deva[दिष्ट] (fate) in the sense of 'one whose belief is that'.

Examples:
- @deva[अस्ति इति मतिः अस्य] 'his belief is that it exists' → @deva[आस्तिकः] 'one who believes in a hereafter, a believer'
- @deva[नास्ति इति मतिः अस्य] 'his belief is that it doesn't exist' → @deva[नास्तिकः] 'an atheist, one who denies the hereafter'
- @deva[दिष्टं मतिः अस्य] 'his belief is in fate' → @deva[दैष्टिकः] 'a fatalist'

@deva[दिष्ट] = @deva[दैव] (fate). @deva[दैष्टिकः] can also mean 'a positivist'—one who believes only in what is demonstrated.
"""

standard = """
After @deva[अस्ति], @deva[नास्ति], @deva[दिष्ट], @deva[ठक्] applies in sense @deva[मतिः अस्य] (this is his belief).

Examples:
- @deva[आस्तिकः] 'believer' (@deva[परलोकोऽस्ति इति यस्य मतिः])
- @deva[नास्तिकः] 'atheist' (denies hereafter)
- @deva[दैष्टिकः] 'fatalist' (@deva[दिष्ट] = @deva[दैव])

The rule applies to specific beliefs (about @deva[परलोक], @deva[दैव]), not general opinions.
"""

advanced = """
@deva[अस्ति], @deva[नास्ति], @deva[दिष्ट] take @deva[ठक्] in sense @deva[मतिः अस्य].

Examples:
- @deva[आस्तिकः]: @deva[परलोकोऽस्ति इति यस्य मतिः]
- @deva[नास्तिकः]: denies @deva[परलोक]
- @deva[दैष्टिकः]: @deva[दिष्टं मतिः] (@deva[दिष्ट] = @deva[दैव]); also 'positivist' (believes only demonstrated truths)

The sense is restricted to @deva[विशिष्टमति] (specific belief), not general @deva[मति].
"""

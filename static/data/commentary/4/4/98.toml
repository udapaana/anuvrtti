id = "4.4.98"
numericId = "44098"

[en]
simple = """
The affix @deva[यत्] comes after a word in the locative case in the sense of 'excellent/skilled in that'.

Examples:
- @deva[सामसु साधुः] 'excellent in @[sāma-veda]' → @deva[सामन्यः] 'conversant with @[sāma-veda]' (by @ref[6.4.168])
- @deva[वेमनि साधुः] → @deva[वेमन्यः]
- @deva[कर्मणि साधुः] → @deva[कर्मण्यः] 'skilled in work'
- @deva[शरणि साधुः] → @deva[शरण्यः]

The word @deva[साधु] here means @deva[प्रवीण] (expert) or @deva[योग्य] (fit), not @deva[उपकारक] (benefactor). For the sense 'good/beneficial', see @ref[5.1.5] @deva[तस्मै हितम्].
"""

standard = """
After a @deva[सप्तम्यन्त] word, @deva[यत्] applies in sense @deva[साधुः] (excellent in).

Examples: @deva[सामन्यः] (@ref[6.4.168]) 'skilled in @[sāma]', @deva[वेमन्यः], @deva[कर्मण्यः], @deva[शरण्यः].

@deva[साधु] = @deva[प्रवीण]/[@deva[योग्य] (expert/fit), not @deva[उपकारक]. For 'beneficial', see @ref[5.1.5] @deva[तस्मै हितम्].
"""

advanced = """
After @deva[सप्तम्यन्त], @deva[यत्] in sense @deva[साधुः] (expert in).

Examples: @deva[सामन्यः] (@ref[6.4.168]), @deva[वेमन्यः], @deva[कर्मण्यः], @deva[शरण्यः].

@deva[साधु] = @deva[प्रवीण]/[@deva[योग्य], not @deva[उपकारक]. For @deva[हित] sense, use @ref[5.1.5].
"""

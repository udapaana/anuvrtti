id = "4.4.16"
numericId = "44016"

[en]
simple = """
The affix @deva[ष्ठन्] (instead of @deva[ठक्]) comes after the words in the @deva[भस्त्रादि] list when in the instrumental case, in the sense of 'one who conveys thereby'.

Examples:
- @deva[भस्त्रया हरति] → @deva[भस्त्रिकः] 'one who carries using a leather bag', f. @deva[भस्त्रिकी]
- @deva[भरटेन हरति] → @deva[भरटिकः], f. @deva[भरटिकी]

The word @deva[भस्त्र] means a leather bellows (for heating iron) or a leather bag for carrying grain.

The @deva[भस्त्रादि] list includes: @deva[भस्त्रा], @deva[भरट], @deva[भरण], @deva[शीर्षभार], @deva[शीर्षेभार], @deva[असंभार], @deva[अंसेभार].
"""

standard = """
After @deva[भस्त्रादि] (in @deva[तृतीया]), @deva[ष्ठन्] (not @deva[ठक्]) applies in sense @deva[हरति] (conveys).

Examples:
- @deva[भस्त्रया हरति] → @deva[भस्त्रिकः] 'carrier', f. @deva[भस्त्रिकी] (by @ref[4.1.41])
- @deva[भरटिकः], f. @deva[भरटिकी]

@deva[भस्त्र] = leather bellows or carrying bag.

@deva[भस्त्रादि] @[gaṇa] (7): @deva[भस्त्रा], @deva[भरट], @deva[भरण] (@deva[भारण]), @deva[शीर्षभार], @deva[शीर्षेभार], @deva[असंभार], @deva[अंसेभार].
"""

advanced = """
After @deva[भस्त्रादि] (in @deva[तृतीया]), @deva[ष्ठन्] in sense @deva[हरति].

Examples: @deva[भस्त्रिकः] f. @deva[भस्त्रिकी], @deva[भरटिकः] f. @deva[भरटिकी].

@deva[ष्ठन्]: @deva[ष्] is @deva[इत्] for @deva[ङीष्] (@ref[4.1.41]); @deva[न्] is @deva[इत्] for accent (@ref[6.1.197]).

@deva[भस्त्रादि] @[gaṇa] (7): @deva[भस्त्रा], @deva[भरट], @deva[भरण] (@deva[भारण]), @deva[शीर्षभार], @deva[शीर्षेभार], @deva[असंभार], @deva[अंसेभार].
"""

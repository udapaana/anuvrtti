id = "4.4.136"
numericId = "44136"

[en]
simple = """
The affix @deva[घ] is added to @deva[सहस्र] in Vedic usage with the meaning 'possessing'. @deva[सहस्र] + @deva[घ] → @deva[सहस्रियः] 'possessing a thousand'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[घ] is added after @deva[सहस्र] with the force of @deva[मतुप्] (possession). @deva[सहस्रयस्य विद्यते] = @deva[सहस्रियः] 'one who has a thousand'. This @deva[घ] affix supersedes the regular @deva[मत्वर्थ] affixes @deva[विनि], @deva[इनि], and @deva[अण्] taught in @ref[5.2.102] and @ref[5.2.103].
"""

advanced = """
This @[sūtra] provides a Vedic-specific affix @deva[घ] after @deva[सहस्र] to express possession (@deva[मत्वर्थ]). The derivation @deva[सहस्रयस्य विद्यते] = @deva[सहस्रियः] illustrates the possessive sense 'having a thousand'. By the principle of @deva[अपवाद], this @deva[घ] blocks the general @deva[मत्वर्थ] affixes @deva[विनि] (@ref[5.2.94]), @deva[इनि] (@ref[5.2.94]), and @deva[अण्] taught in @ref[5.2.102] (@deva[तदस्यास्त्यस्मिन्निति मतुप्]) and @ref[5.2.103] (@deva[रसादिभ्यश्च]).
"""

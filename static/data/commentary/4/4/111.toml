id = "4.4.111"
numericId = "44111"

[en]
simple = """
In the Vedas, the affix @deva[ड्यण्] comes after the words @deva[पाथस्] (firmament) and @deva[नदी] (river) in the sense of 'what stays there'. The @deva[ड्] causes elision of the final vowel plus following consonant.

This supersedes @deva[यत्].

Examples:
- @deva[पाथसि भवः] → @deva[पाथ्यः] (as in @deva[तमुत्वा पाथ्यो वृषा])
- @deva[नद्यां भवः] → @deva[नाद्यः] (as in @deva[च नो दधीत नाद्यो गिरो मे])

@deva[पाथस्] means 'firmament'.
"""

standard = """
In @deva[छन्दस्], after @deva[पाथस्] and @deva[नदी], @deva[ड्यण्] applies in sense @deva[भवः]. @deva[ड्] causes elision of final vowel + consonant.

Examples:
- @deva[पाथ्यः] (@deva[तमुत्वा पाथ्यो वृषा])
- @deva[नाद्यः] (@deva[च नो दधीत नाद्यो गिरो मे])

@deva[पाथस्] = firmament.
"""

advanced = """
@deva[पाथस्] and @deva[नदी] take @deva[ड्यण्] in @deva[छन्दस्], sense @deva[भवः]. @deva[ड्] → @deva[अन्त्यलोप].

Examples: @deva[पाथ्यः], @deva[नाद्यः].
"""

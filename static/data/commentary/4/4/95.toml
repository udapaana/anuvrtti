id = "4.4.95"
numericId = "44095"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[हृदय] (heart) in the genitive case, in the sense of 'loved by that'.

Example: @deva[हृदयस्य प्रियः] 'dear to the heart' → @deva[हृद्यः] 'pleasant to the heart'

Usages: @deva[हृद्यः देशः] 'a pleasant region', @deva[हृद्यं वनम्] 'a pleasant forest'

But @deva[हृद्यः पुत्रः] 'a son dear to the heart' is not valid—the word @deva[संज्ञायाम्] from @ref[4.4.89] restricts this to specific uses.
"""

standard = """
After @deva[हृदय] (in @deva[षष्ठी]), @deva[यत्] applies in sense @deva[प्रियः] (loved). @deva[संज्ञायाम्] (@ref[4.4.89]).

Example: @deva[हृदयस्य प्रियः] → @deva[हृद्यः] 'pleasant to heart'.

Valid: @deva[हृद्यः देशः], @deva[हृद्यं वनम्]
Invalid: @deva[*हृद्यः पुत्रः] (restricted by @deva[संज्ञायाम्])
"""

advanced = """
@deva[हृदय] (in @deva[षष्ठी]) takes @deva[यत्] in sense @deva[प्रियः]. @deva[संज्ञायाम्] (@ref[4.4.89]).

Example: @deva[हृद्यः].

Restricted use: @deva[हृद्यः देशः], @deva[हृद्यं वनम्]—not @deva[*हृद्यः पुत्रः].
"""

id = "4.4.19"
numericId = "44019"

[en]
simple = """
The affix @deva[ठक्] comes after the words in the @deva[अक्षद्यूतादि] list when in the instrumental case, in the sense of 'completed thereby'.

Examples:
- @deva[अक्षद्यूतेन निर्वृत्तम्] 'completed by gambling' → @deva[आक्षद्यूतिकं वैरम्] 'enmity that was brought to a head through gambling'
- @deva[जानुप्रहृतेन निर्वृत्तम्] → @deva[जानुप्रहृतिकम्]

The @deva[अक्षद्यूतादि] list includes: @deva[अक्षद्यूत], @deva[जानुप्रहृत], @deva[जङ्घाप्रहृत], @deva[जङ्घाप्रहत], @deva[पादस्वेदन], @deva[कण्टकमर्दन], @deva[गतानुगत], @deva[गतागत], @deva[यातोपयात], @deva[अनुगत].
"""

standard = """
After @deva[अक्षद्यूतादि] (in @deva[तृतीया]), @deva[ठक्] applies in sense @deva[निर्वृत्तम्] (completed thereby).

Examples:
- @deva[अक्षद्यूतेन निर्वृत्तम्] → @deva[आक्षद्यूतिकं वैरम्] 'enmity brought to completion through gambling'
- @deva[जानुप्रहृतिकम्]

@deva[अक्षद्यूतादि] @[gaṇa] (10): @deva[अक्षद्यूत], @deva[जानुप्रहृत], @deva[जङ्घाप्रहृत], @deva[जङ्घाप्रहत], @deva[पादस्वेदन], @deva[कण्टकमर्दन], @deva[गतानुगत], @deva[गतागत], @deva[यातोपयात], @deva[अनुगत].
"""

advanced = """
After @deva[अक्षद्यूतादि] (in @deva[तृतीया]), @deva[ठक्] in sense @deva[निर्वृत्तम्] (completed).

Examples: @deva[आक्षद्यूतिकं वैरम्], @deva[जानुप्रहृतिकम्].

@deva[अक्षद्यूतादि] @[gaṇa] (10): @deva[अक्षद्यूत], @deva[जानुप्रहृत] (@deva[प्रहूत]), @deva[जङ्घाप्रहृत] (@deva[प्रहूत]), @deva[जङ्घाप्रहत], @deva[पादस्वेदन], @deva[कण्टकमर्दन], @deva[गतानुगत], @deva[गतागत], @deva[यातोपयात], @deva[अनुगत].
"""

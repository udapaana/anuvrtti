id = "4.4.121"
numericId = "44121"

[en]
simple = """
In the Vedas, the affix @deva[यत्] comes after the words @deva[रक्षस्] (demon) and @deva[यातु] (sorcerer) in the genitive case, in the sense of 'killer of that'.

The word @deva[हननी] means 'that which kills'.

Examples:
- @deva[रक्षस्य] 'killer of @[rākṣasas]' as in @deva[याते अग्ने रक्षस्या तनः] 'O Agni, your bodies are killers of @[rākṣasas]' (@deva[रक्षसां हननी])
- @deva[यातव्याः तनूः] 'bodies that kill @[yātus]'

The plural is used as a mark of respect.
"""

standard = """
In @deva[छन्दस्], after @deva[रक्षस्] and @deva[यातु] (in @deva[षष्ठी]), @deva[यत्] applies in sense @deva[हननी] (killer).

Examples:
- @deva[रक्षस्य] = @deva[रक्षसां हननी] (@deva[याते अग्ने रक्षस्या तनः])
- @deva[यातव्याः तनूः]

Plural used for respect.
"""

advanced = """
@deva[रक्षस्] and @deva[यातु] (in @deva[षष्ठी]) take @deva[यत्] in @deva[छन्दस्], sense @deva[हननी].

Examples: @deva[रक्षस्य], @deva[यातव्य].
"""

id = "4.4.65"
numericId = "44065"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting food, in the nominative case, in the sense of 'one for whom that is wholesome food'.

Examples:
- @deva[अपूपभक्षणं हितम् अस्मै] 'eating cakes is good for him' → @deva[आपूपिकः] 'one who benefits from eating cakes; one fond of cakes'
- @deva[शष्कुली हिता अस्मै] → @deva[शाष्कुलिकः]
- @deva[मोदकाः हिताः अस्मै] → @deva[मौदकिकः]

Note: @deva[हित] governs the dative (@ref[2.3.13] @deva[वार्त्तिक]), so the analysis uses @deva[अस्मै] (dative), though the @[sūtra] uses @deva[अस्य] (genitive).
"""

standard = """
After a @deva[भक्षवाचक] (food-word) in @deva[प्रथमा], @deva[ठक्] applies in sense @deva[तदस्मै हितं भक्षाः] (this is wholesome food for him).

Examples: @deva[आपूपिकः], @deva[शाष्कुलिकः], @deva[मौदकिकः].

@deva[हित] governs @deva[चतुर्थी] (@ref[2.3.13] @deva[वार्त्तिक]). In @deva[विग्रह], use @deva[हितम्] or synonym plus eating verb.
"""

advanced = """
After @deva[भक्षवाचक] (in @deva[प्रथमा]), @deva[ठक्] in sense @deva[हितं भक्षाः तदस्मै].

Examples: @deva[आपूपिकः], @deva[शाष्कुलिकः], @deva[मौदकिकः].

@deva[हित] governs @deva[चतुर्थी] (@ref[2.3.13] @deva[वार्त्तिक]). The @[sūtra] @deva[तदस्य] should be read @deva[तदस्मै].

Best reading: @ref[4.4.65] @deva[हितं भक्षाः तदस्मै]; @ref[4.4.66] @deva[दीयते नियुक्तम्].
"""

id = "4.4.41"
numericId = "44041"

[en]
simple = """
The affix @deva[ठक्] comes after the word @deva[धर्म] in the accusative case, in the sense of 'one who practices that'.

Example: @deva[धर्मं चरति] 'practices dharma' → @deva[धार्मिकः] 'religious, righteous'

A @deva[वार्त्तिक] extends this to @deva[अधर्म]: @deva[अधर्मं चरति] → @deva[आधार्मिकः] 'irreligious, unrighteous'
"""

standard = """
After @deva[धर्म] (in @deva[द्वितीया]), @deva[ठक्] applies in sense @deva[चरति] (practices).

Example: @deva[धर्मं चरति] → @deva[धार्मिकः] 'religious'.

@note[type=@[vārtika]]: @deva[अधर्मं चरति] → @deva[आधार्मिकः] 'irreligious'.
"""

advanced = """
@deva[धर्म] (in @deva[द्वितीया]) takes @deva[ठक्] in sense @deva[चरति].

Example: @deva[धार्मिकः].

@note[type=@[vārtika]]: @deva[अधर्मादपि] — @deva[आधार्मिकः] 'irreligious'.
"""

id = "4.4.15"
numericId = "44015"

[en]
simple = """
The affix @deva[ठक्] comes after the words in the @deva[उत्सङ्गादि] list when in the instrumental case, in the sense of 'conveyed or carried thereby'.

The word @deva[हरति] means 'to carry' or 'to transport'.

Examples:
- @deva[उत्सङ्गेन हरति] → @deva[औत्सङ्गिकः] 'carried on the hip'
- @deva[उडुपेन हरति] → @deva[औडुपिकः] 'carried on a raft'

The @deva[उत्सङ्गादि] list includes: @deva[उत्सङ्ग], @deva[उडुप्], @deva[उत्पुत], @deva[उत्पन्न], @deva[उत्पुट], @deva[पिटक], @deva[पिटाक], @deva[उडप].
"""

standard = """
After @deva[उत्सङ्गादि] (in @deva[तृतीया]), @deva[ठक्] applies in sense @deva[हरति] (conveys/carries thereby).

Examples:
- @deva[उत्सङ्गेन हरति] → @deva[औत्सङ्गिकः] 'carried on the hip'
- @deva[उडुपेन हरति] → @deva[औडुपिकः] 'carried on a raft'

@deva[उत्सङ्गादि] @[gaṇa]: @deva[उत्सङ्ग], @deva[उडुप्], @deva[उत्पुत] (@deva[उत्पत]), @deva[उत्पन्न], @deva[उत्पुट], @deva[पिटक], @deva[पिटाक], @deva[उडप].
"""

advanced = """
After @deva[उत्सङ्गादि] (in @deva[तृतीया]), @deva[ठक्] in sense @deva[हरति] (conveys).

Examples: @deva[औत्सङ्गिकः] 'borne on hip', @deva[औडुपिकः] 'borne on raft'.

@deva[उत्सङ्गादि] @[gaṇa] (8): @deva[उत्सङ्ग], @deva[उडुप्], @deva[उत्पुत] (@deva[उत्पत]), @deva[उत्पन्न], @deva[उत्पुट], @deva[पिटक], @deva[पिटाक], @deva[उडप].
"""

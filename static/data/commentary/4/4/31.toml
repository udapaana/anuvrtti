id = "4.4.31"
numericId = "44031"

[en]
simple = """
The affixes @deva[ष्ठन्] and @deva[ष्ठच्] come after the words @deva[कुसीद] and @deva[दशैकादश] respectively, in the sense of 'one who gives with a blameworthy motive'.

@deva[कुसीद] means 'interest on money'. @deva[दशैकादश] refers to lending 10 on condition of receiving 11 after a month.

Examples:
- @deva[कुसीदं प्रयच्छति] → @deva[कुसीदिकः] 'money-lender', f. @deva[कुसीदिकी]
- @deva[दशैकादशं प्रयच्छति] → @deva[दशैकादशिकः] 'one who lends at 10% monthly interest', f. @deva[दशैकादशिकी]

The difference between @deva[ष्ठन्] and @deva[ष्ठच्] is in accent (see @ref[6.1.197] and @ref[6.1.163]).
"""

standard = """
After @deva[कुसीद], @deva[ष्ठन्] applies; after @deva[दशैकादश], @deva[ष्ठच्] applies—both in sense @deva[गर्ह्यं प्रयच्छति].

@deva[कुसीद] = interest. @deva[दशैकादश] = lending 10 to receive 11 (10% monthly).

Examples:
- @deva[कुसीदिकः] f. @deva[कुसीदिकी] (@ref[4.1.41])
- @deva[दशैकादशिकः] f. @deva[दशैकादशिकी]

@deva[ष्ठन्] vs @deva[ष्ठच्]: accent difference (@ref[6.1.197], @ref[6.1.163]).
"""

advanced = """
@deva[कुसीद] takes @deva[ष्ठन्]; @deva[दशैकादश] takes @deva[ष्ठच्]—in sense @deva[गर्ह्यं प्रयच्छति].

Examples: @deva[कुसीदिकः] f. @deva[कुसीदिकी], @deva[दशैकादशिकः] f. @deva[दशैकादशिकी].

@deva[ष्ठन्]: @deva[आद्युदात्त] by @ref[6.1.197]. @deva[ष्ठच्]: @deva[अन्तोदात्त] by @ref[6.1.163]. Both @deva[षित्] → @deva[ङीष्] by @ref[4.1.41].
"""

id = "4.4.56"
numericId = "44056"

[en]
simple = """
The affix @deva[अण्] optionally comes after the words @deva[मड्डुक] and @deva[झर्झर] (types of drums) in the sense of 'one whose art is that'. When @deva[अण्] is not used, the regular @deva[ठक्] applies.

Examples:
- With @deva[अण्]: @deva[मड्डुकवादनं शिल्पम् अस्य] → @deva[माड्डुकः]
- With @deva[ठक्]: @deva[माड्डुकिकः]
- With @deva[अण्]: @deva[झर्झरवादनं शिल्पम् अस्य] → @deva[झार्झरः]
- With @deva[ठक्]: @deva[झार्झरिकः]
"""

standard = """
After @deva[मड्डुक] and @deva[झर्झर], @deva[अण्] optionally applies in sense @deva[शिल्पम् अस्य]. Otherwise @deva[ठक्].

Examples:
- @deva[माड्डुकः] / @deva[माड्डुकिकः]
- @deva[झार्झरः] / @deva[झार्झरिकः]
"""

advanced = """
@deva[मड्डुक] and @deva[झर्झर] optionally take @deva[अण्] (otherwise @deva[ठक्]) in sense @deva[शिल्पम् अस्य].

Examples: @deva[माड्डुकः]/@deva[माड्डुकिकः], @deva[झार्झरः]/@deva[झार्झरिकः].
"""

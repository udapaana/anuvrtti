id = "4.4.125"
numericId = "44125"

[en]
simple = """
In the Vedas, the affix @deva[यत्] comes after a @deva[प्रातिपदिक] (nominal stem) ending in @deva[मतुप्], when it denotes a mantra used in putting up (@deva[उपधान]) sacrificial bricks (@deva[इष्टका]). When @deva[यत्] is added, the @deva[मतुप्] affix is elided.

Example: @deva[वर्चस्वान्] is a mantra containing @deva[वर्चस्]. Bricks put up with recitation of this mantra are called @deva[वर्चस्या]:

@deva[वर्चस्वत्] + @deva[यत्] → @deva[वर्चस्] + @deva[यत्] (@deva[मतुप्] elided) → @deva[वर्चस्या] (f.)
"""

standard = """
In @deva[छन्दस्], after @deva[मतुबन्त] @deva[प्रातिपदिक] (in @deva[प्रथमा]), @deva[यत्] applies in sense @deva[आसाम् इष्टकानाम् उपधाने मन्त्रः] (mantra for brick-laying). @deva[मतुप्] undergoes @deva[लुक्].

Example: @deva[वर्चस्वत्] + @deva[यत्] → @deva[वर्चस्] + @deva[यत्] → @deva[वर्चस्या] (bricks laid with @deva[वर्चस्वान्] mantra).
"""

advanced = """
In @deva[छन्दस्], @deva[मतुबन्त] (in @deva[प्रथमा]) takes @deva[यत्] in sense @deva[आसाम् इष्टकानाम् उपधाने मन्त्रः]. @deva[मतुप्]-@deva[लुक्].

Example: @deva[वर्चस्वत्] → @deva[वर्चस्या].
"""

id = "4.4.61"
numericId = "44061"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the nominative case in the sense of 'one whose habit is that'.

Examples:
- @deva[अपूपभक्षणं शीलम् अस्य] 'eating cakes is his habit' → @deva[आपूपिकः] 'one who habitually eats cakes'
- @deva[शष्कुलीभक्षणं शीलम् अस्य] → @deva[शाष्कुलिकः]
- @deva[मोदकभक्षणं शीलम् अस्य] → @deva[मौदकिकः]

The act of eating and the habit of doing so are both understood in the meaning of the affix.
"""

standard = """
After a word (in @deva[प्रथमा]) denoting an action, @deva[ठक्] applies in sense @deva[शीलम् अस्य] (this is his habit).

Examples: @deva[आपूपिकः] 'habitual cake-eater', @deva[शाष्कुलिकः], @deva[मौदकिकः].

Both the act (@deva[भक्षण]) and its habitual nature (@deva[शील]) are understood in the affix's meaning.
"""

advanced = """
After @deva[प्रथमान्त], @deva[ठक्] in sense @deva[शीलम् अस्य].

Examples: @deva[आपूपिकः], @deva[शाष्कुलिकः], @deva[मौदकिकः].

@deva[भक्षण] and @deva[शील] are both understood in the @deva[प्रत्ययार्थ].
"""

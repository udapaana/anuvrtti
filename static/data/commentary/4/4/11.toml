id = "4.4.11"
numericId = "44011"

[en]
simple = """
Both affixes @deva[ठञ्] and @deva[ष्ठन्] come after the word @deva[श्वगण] (pack of dogs) in the sense of 'one who goes/lives by means thereof'.

Examples:
- With @deva[ठञ्]: @deva[श्वगणेन चरति] → @deva[श्वागणिकः] 'one who lives by dogs', f. @deva[श्वागणिकी]
- With @deva[ठन्]: @deva[श्वगणिकः], f. @deva[श्वगणिका]

The form @deva[श्वागणिकः] is irregular. By @ref[7.2.117], @deva[ञ्] should trigger @deva[वृद्धि] of @deva[अ] in @deva[श्व], and @ref[7.3.4] would give @deva[औ] before @deva[व]—yielding @deva[*शौवगणिकः]. But the prohibition in @ref[7.3.8] (for @deva[श्वन्] + @deva[इञ्]) extends to @deva[श्वन्] + any @deva[इकारादि] affix.
"""

standard = """
After @deva[श्वगण], both @deva[ठञ्] and @deva[ष्ठन्] apply in sense @deva[चरति].

Examples:
- @deva[ठञ्]: @deva[श्वागणिकः], f. @deva[श्वागणिकी]
- @deva[ठन्]: @deva[श्वगणिकः], f. @deva[श्वगणिका]

The form @deva[श्वागणिकः] is irregular: @ref[7.2.117] requires @deva[वृद्धि], and @ref[7.3.4] would substitute @deva[औ] for @deva[वृद्धि] before @deva[व] in @deva[श्वन्], giving @deva[*शौवगणिकः]. But the prohibition in @ref[7.3.8] (blocking @ref[7.3.4] before @deva[इञ्]) extends to any affix beginning with @deva[इ]—so @deva[श्व] simply takes @deva[वृद्धि] → @deva[श्वा].
"""

advanced = """
@deva[श्वगण] takes @deva[ठञ्] or @deva[ष्ठन्] in sense @deva[चरति].

Examples: @deva[श्वागणिकः] f. @deva[श्वागणिकी] (by @deva[ठञ्]); @deva[श्वगणिकः] f. @deva[श्वगणिका] (by @deva[ठन्]).

Derivation of @deva[श्वागणिकः]: @deva[श्वगण] + @deva[ठञ्] → by @ref[7.2.117], @deva[ञित्] requires @deva[वृद्धि]. By @ref[7.3.4], @deva[श्वन्] etc. take @deva[औ] instead of @deva[वृद्धि] before @deva[व]—expected: @deva[*शौवगणिकः]. But @ref[7.3.8] blocks @ref[7.3.4] when @deva[श्वन्] is followed by @deva[इञ्]. This extends to any @deva[इकारादि] affix. Result: simple @deva[वृद्धि] → @deva[श्वागणिकः].
"""

id = "4.4.140"
numericId = "44140"

[en]
simple = """
The affix @deva[यत्] is added to @deva[वसु] in Vedic usage with two meanings: 'a collection' and 'possessing'. @deva[वसु] + @deva[यत्] → @deva[वसव्य] 'a collection of wealth' or 'wealthy'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[यत्] comes after @deva[वसु] 'wealth' with the sense of @deva[समूह] (collection) as well as @deva[मतुप्] (possession). Thus @deva[वसव्यः] = @deva[समूहः] 'a collection'. A @deva[वार्त्तिक] states that @deva[यत्] also comes after @deva[छन्दस्] without changing the sense when referring to collections of letters, as in @deva[छन्दस्यः] 'metrical'. Another @deva[वार्त्तिक] teaches that @deva[यत्] comes after @deva[वसु] without altering the meaning, as @deva[वसव्यैः] = @deva[वसुभिः] 'with wealth' and @deva[वसव्यस्य] = @deva[वसोः] 'of wealth'.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[यत्] after @deva[वसु] expressing both @deva[समूह] (collective) and @deva[मत्वर्थ] (possessive) senses. @deva[वसव्यः] = @deva[समूहः] illustrates the collective sense. The first @deva[वार्त्तिक] extends this: @deva[यत्] comes after @deva[छन्दस्] when referring to collections of syllables, as in @deva[सप्तादशाक्षरश्छन्दस्यः प्रजापतियज्ञो मन्त्रे विहिता]—the 17 syllables being @deva[ओ श्रावय] (4), @deva[अस्तु श्रौषट्] (4), @deva[यज] (2), @deva[ये यजामहे] (5), and @deva[वषट्] (2). The second @deva[वार्त्तिक] teaches that @deva[यत्] comes after @deva[वसु] without changing the meaning: @deva[हस्तौ गृहीतस्य बहुभिर्वसव्यैः] where @deva[वसव्यैः] = @deva[वसुभिः], and @deva[अग्निरीशे वसव्यस्य] = @deva[वसोः].
"""

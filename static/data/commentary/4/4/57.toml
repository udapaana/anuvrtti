id = "4.4.57"
numericId = "44057"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting a weapon, in the nominative case, in the sense of 'one whose weapon is that'.

Examples:
- @deva[असिः प्रहरणम् अस्य] 'a sword is his weapon' → @deva[आसिकः] 'a swordsman'
- @deva[प्रासः प्रहरणम् अस्य] → @deva[प्रासिकः] 'a spearman'
- @deva[चक्रं प्रहरणम् अस्य] → @deva[चाक्रिकः] 'one who fights with a discus'
- @deva[धनुः प्रहरणम् अस्य] → @deva[धानुष्कः] 'an archer'
"""

standard = """
After a @deva[प्रहरणवाचिन्] (word denoting weapon) in @deva[प्रथमा], @deva[ठक्] applies in sense @deva[प्रहरणम् अस्य] (this is his weapon).

Examples: @deva[आसिकः] 'swordsman', @deva[प्रासिकः], @deva[चाक्रिकः], @deva[धानुष्कः].
"""

advanced = """
After @deva[प्रहरणवाचिन्] (in @deva[प्रथमा]), @deva[ठक्] in sense @deva[प्रहरणम् अस्य].

Examples: @deva[आसिकः], @deva[प्रासिकः], @deva[चाक्रिकः], @deva[धानुष्कः].
"""

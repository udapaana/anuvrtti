id = "4.4.115"
numericId = "44115"

[en]
simple = """
In the Vedas, the affix @deva[घन्] comes after the word @deva[तुग्र] in the sense of 'what stays there'.

This supersedes @deva[यत्].

Example: @deva[तुग्रियः] as in @deva[त्वमग्रे वृषभः तुग्रियाणाम्]

It also appears as @deva[तुग्र्य] (with accent shift): @deva[आवः शमं वृषभं तुग्र्यासु] (@deva[ऋग्वेद] I.34.15)

@deva[तुग्र्य] means 'sunk in waters'. The word @deva[तुग्र] has meanings: food, firmament, sacrifice, and @deva[वरिष्ठ].
"""

standard = """
In @deva[छन्दस्], after @deva[तुग्र], @deva[घन्] applies in sense @deva[भवः].

Examples: @deva[तुग्रियः] (@deva[त्वमग्रे वृषभः तुग्रियाणाम्]); @deva[तुग्र्य] (@deva[ऋग्वेद] I.34.15: @deva[आवः शमं वृषभं तुग्र्यासु]).

@deva[तुग्र्य] = sunk in waters. @deva[तुग्र] = food, firmament, sacrifice, @deva[वरिष्ठ].
"""

advanced = """
@deva[तुग्र] takes @deva[घन्] in @deva[छन्दस्], sense @deva[भवः].

Examples: @deva[तुग्रियः], @deva[तुग्र्य] (@deva[ऋग्वेद] I.34.15).

@deva[तुग्र] = @deva[अन्न], @deva[अन्तरिक्ष], @deva[यज्ञ], @deva[वरिष्ठ].
"""

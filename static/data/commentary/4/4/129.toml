id = "4.4.129"
numericId = "44129"

[en]
simple = """
In the Vedas, the affixes @deva[यत्] and @deva[ष] with the force of @deva[मतुप्] come after the word @deva[मधु] (honey).

Examples:
- With @deva[ष]: @deva[माधवः] 'month of honey' (@[vaiśākha])
- With @deva[यत्]: @deva[मधव्यः]
- With @deva[लुक्] (affix elided): @deva[मधुः]

All three forms mean the month of @[vaiśākha] or a body (@deva[तनु]).
"""

standard = """
In @deva[छन्दस्], after @deva[मधु], @deva[यत्] and @deva[ष] apply with @deva[मत्वर्थ].

Forms: @deva[माधवः] (@deva[ष]), @deva[मधव्यः] (@deva[यत्]), @deva[मधुः] (@deva[लुक्]).

All = @[vaiśākha] month or @deva[तनु]: @deva[माधवाः], @deva[मधव्या], @deva[मधुः].
"""

advanced = """
@deva[मधु] takes @deva[यत्] and @deva[ष] in @deva[छन्दस्], @deva[मत्वर्थ].

Forms: @deva[माधवः], @deva[मधव्यः], @deva[मधुः] (@deva[लुक्]).
"""

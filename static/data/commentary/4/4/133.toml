id = "4.4.133"
numericId = "44133"

[en]
simple = """
The affixes @deva[इन्], @deva[ख], and @deva[य] come after the word @deva[पूर्व] (ancestors) in the instrumental case, in the sense of 'made by them'.

Note: The @deva[अनुवृत्ति] of @deva[मत्वर्थ] now ceases.

Examples:
- With @deva[इन्]: @deva[पूर्वैः कृतम्] → @deva[पूर्विणः] 'made by ancestors' (i.e., a road)
- With @deva[य]: @deva[पूर्व्यः]
- With @deva[ख]: @deva[पूर्वीणः]

These words usually appear in plural, meaning 'roads widened by the forefathers':
- @deva[गम्भीरेभिः पथिभिः पूर्विणेभिः]
- @deva[ये ते पन्थाः सवितः पूर्व्यासः] (@deva[ऋग्वेद] I.35.11)
"""

standard = """
After @deva[पूर्व] (in @deva[तृतीया]), @deva[इन्], @deva[ख], @deva[य] apply in sense @deva[कृतम्] (made). @deva[मत्वर्थ]-@deva[अनुवृत्ति] ceases.

Examples: @deva[पूर्विणः]/[@deva[पूर्व्यः]/[@deva[पूर्वीणः] = roads widened by ancestors.

Vedic usage (plural): @deva[पथिभिः पूर्विणेभिः]; @deva[पन्थाः...पूर्व्यासः] (@deva[ऋग्वेद] I.35.11).
"""

advanced = """
@deva[पूर्व] (in @deva[तृतीया]) takes @deva[इन्]/[@deva[ख]/[@deva[य] in sense @deva[कृतम्]. @deva[मत्वर्थ] ceases.

Forms: @deva[पूर्विणः], @deva[पूर्व्यः], @deva[पूर्वीणः].

@deva[ऋग्वेद] I.35.11: @deva[ये ते पन्थाः सवितः पूर्व्यासः].
"""

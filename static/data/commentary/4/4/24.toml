id = "4.4.24"
numericId = "44024"

[en]
simple = """
The affix @deva[ठक्] undergoes @deva[लुक्] (elision) after the word @deva[लवण] (salt) in the sense of 'mixed therewith'.

This means the affix is dropped entirely, and the base word alone expresses the derivative meaning.

Examples:
- @deva[लवणेन संसृष्टः] 'mixed with salt' → @deva[लवणः] (the derivative has the same form as the base)
- @deva[लवणः सूपः] 'soup mixed with salt'
- @deva[लवणं शाकम्] 'vegetables with salt'
- @deva[लवणा यवगूः] 'barley gruel with salt' (by @ref[1.1.51])

The @deva[लुक्] applies when @deva[लवण] is used as an adjective, not as a noun.
"""

standard = """
After @deva[लवण], @deva[ठक्] undergoes @deva[लुक्]-elision in sense @deva[संसृष्टम्].

Examples:
- @deva[लवणेन संसृष्टः] → @deva[लवणः] (not @deva[*लावणिकः])
- @deva[लवणः सूपः] 'salted soup', @deva[लवणं शाकम्], @deva[लवणा यवगूः] (@ref[1.1.51])

@deva[लुक्] applies when @deva[लवण] functions as an adjective.
"""

advanced = """
@deva[लवण] takes @deva[ठक्] with @deva[लुक्] in sense @deva[संसृष्टम्].

Examples: @deva[लवणः सूपः], @deva[लवणं शाकम्], @deva[लवणा यवगूः] (@ref[1.1.51]).

@deva[लुक्]-elision occurs when @deva[लवण] is @deva[विशेषण] (adjective), not @deva[विशेष्य] (substantive).
"""

id = "4.4.83"
numericId = "44083"

[en]
simple = """
The affix @deva[यत्] comes after a word in the accusative case in the sense of 'what pierces that'—but only when the piercing is not done with a bow.

Examples:
- @deva[पादौ विध्यन्ति] 'pierce the feet' → @deva[पद्याः शर्कराः] 'pebbles' (by @ref[6.3.53])
- @deva[ऊरू विध्यन्ति] → @deva[ऊरव्याः कण्टकाः] 'thorns that pierce the thigh'

The condition @deva[अधनुषा] (not with a bow) excludes: @deva[पादौ विध्यति धनुषा] → no affix.

This restriction indicates the piercing must be natural, not by weapon. Therefore no affix in @deva[चौरं विध्यति], @deva[शत्रुं विध्यति].
"""

standard = """
After a @deva[द्वितीयान्त] word, @deva[यत्] applies in sense @deva[विध्यति] (pierces)—excluding bow-piercing (@deva[अधनुषा]).

Examples: @deva[पद्याः शर्कराः] (@ref[6.3.53]) 'foot-piercing pebbles', @deva[ऊरव्याः कण्टकाः] 'thigh-piercing thorns'.

Condition @deva[अधनुषा]: excludes @deva[पादौ विध्यति धनुषा]. This excludes weapon-piercing generally: no affix for @deva[चौरं विध्यति], @deva[शत्रुं विध्यति].
"""

advanced = """
After @deva[द्वितीयान्त], @deva[यत्] in sense @deva[विध्यति] (@deva[अधनुषा]).

Examples: @deva[पद्याः शर्कराः] (@ref[6.3.53]), @deva[ऊरव्याः कण्टकाः].

@deva[अधनुषा]: excludes bow-piercing; by extension, excludes weapon-piercing (@deva[चौरं विध्यति], etc.).
"""

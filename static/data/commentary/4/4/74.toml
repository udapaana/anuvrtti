id = "4.4.74"
numericId = "44074"

[en]
simple = """
The affix @deva[ष्ठल्] (instead of @deva[ठक्]) comes after the word @deva[आवसथ] (dwelling, house) in the locative case, in the sense of 'one who dwells there'.

The @deva[ल्] in @deva[ष्ठल्] affects accent (@ref[6.1.193]). The @deva[ष्] triggers @deva[ङीष्] for feminine (@ref[4.1.41]).

Example: @deva[आवसथे वसति] → @deva[आवसथिकः] 'one who dwells in a house—a householder', f. @deva[आवसथिकी]

This marks the end of the @deva[ठक्]-@deva[अधिकार] that began at @ref[4.4.1]. From here on, other affixes will be prescribed.
"""

standard = """
After @deva[आवसथ] (in @deva[सप्तमी]), @deva[ष्ठल्] (not @deva[ठक्]) applies in sense @deva[वसति].

Example: @deva[आवसथे वसति] → @deva[आवसथिकः] 'householder (vs. ascetic)', f. @deva[आवसथिकी].

@deva[ष्ठल्]: @deva[ल्] for accent (@ref[6.1.193]); @deva[ष्] for @deva[ङीष्] (@ref[4.1.41]).

This ends the @deva[ठक्]-@deva[अधिकार] from @ref[4.4.1]. Henceforth other affixes are prescribed.
"""

advanced = """
@deva[आवसथ] (in @deva[सप्तमी]) takes @deva[ष्ठल्] in sense @deva[वसति].

Example: @deva[आवसथिकः] f. @deva[आवसथिकी] 'householder'.

@deva[ष्ठल्]: @deva[ल्] is @deva[इत्] for @deva[स्वरितोदात्त] (@ref[6.1.193]); @deva[ष्] is @deva[इत्] for @deva[ङीष्] (@ref[4.1.41]).

This @[sūtra] concludes the @deva[ठगधिकार] of @ref[4.4.1]. Subsequent @[sūtras] prescribe other affixes.
"""

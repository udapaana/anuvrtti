id = "4.4.130"
numericId = "44130"

[en]
simple = """
The affixes @deva[यत्] and @deva[ख] with the force of @deva[मतुप्] come after the word @deva[ओजस्] (vigor) when 'a day' (@deva[अहन्]) is meant.

Examples:
- With @deva[यत्]: @deva[ओजस्यम्] 'day' (lit. full of heat)
- With @deva[ख]: @deva[ओजसीनम्]
"""

standard = """
After @deva[ओजस्], @deva[यत्] and @deva[ख] apply with @deva[मत्वर्थ] when meaning @deva[अहन्] (day).

Forms: @deva[ओजस्यम्] (@deva[यत्]), @deva[ओजसीनम्] (@deva[ख]) = @deva[अहः] 'day'.
"""

advanced = """
@deva[ओजस्] takes @deva[यत्]/[@deva[ख] with @deva[मत्वर्थ], @deva[अहन्] sense.

Forms: @deva[ओजस्यम्], @deva[ओजसीनम्].
"""

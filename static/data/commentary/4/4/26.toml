id = "4.4.26"
numericId = "44026"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting a condiment (@deva[उपसेचन], something used to moisten food) in the instrumental case, in the sense of 'sprinkled therewith'.

Examples:
- @deva[दध्ना उपसिक्तम्] 'sprinkled with curd' → @deva[दाधिकम्]
- @deva[सूपेन उपसिक्तम्] → @deva[सौपिकम्] 'sprinkled with broth'
- @deva[खारेण उपसिक्तम्] → @deva[खारिकम्] 'sprinkled with alkaline water'

The word must denote a condiment. Counter-example: @deva[उदकेन उपसिक्तः ओदनः] 'rice sprinkled with water' does not take @deva[ठक्] because water is not a condiment.
"""

standard = """
After an @deva[उपसेचन]-denoting word (condiment) in @deva[तृतीया], @deva[ठक्] applies in sense @deva[उपसिक्तम्] (sprinkled therewith).

Examples: @deva[दाधिकम्], @deva[सौपिकम्], @deva[खारिकम्].

Restriction: Only condiments qualify. @deva[उदकेन उपसिक्तः ओदनः] takes no affix—water is not @deva[उपसेचन].
"""

advanced = """
After @deva[उपसेचनवाचिन्] (condiment) in @deva[तृतीया], @deva[ठक्] in sense @deva[उपसिक्तम्].

Examples: @deva[दाधिकम्], @deva[सौपिकम्], @deva[खारिकम्].

Condition: Base must denote @deva[उपसेचन]. @deva[उदकेन उपसिक्तः ओदनः] → no affix (water is not @deva[उपसेचन]).
"""

id = "4.4.42"
numericId = "44042"

[en]
simple = """
Both affixes @deva[ठन्] and @deva[ठक्] come after the word @deva[प्रतिपथ] in the accusative case, in the sense of 'one who goes'.

Example: @deva[प्रतिपथम् एति] 'goes along the road' →
- With @deva[ठन्]: @deva[प्रतिपथिकः] (no @deva[वृद्धि])
- With @deva[ठक्]: @deva[प्रातिपथिकः] (@deva[वृद्धि] by @ref[7.2.118])
"""

standard = """
After @deva[प्रतिपथ] (in @deva[द्वितीया]), both @deva[ठन्] and @deva[ठक्] apply in sense @deva[एति] (goes).

Example: @deva[प्रतिपथम् एति] →
- @deva[ठन्]: @deva[प्रतिपथिकः] (no @deva[वृद्धि])
- @deva[ठक्]: @deva[प्रातिपथिकः] (@deva[वृद्धि] by @ref[7.2.118])
"""

advanced = """
@deva[प्रतिपथ] (in @deva[द्वितीया]) takes @deva[ठन्] or @deva[ठक्] in sense @deva[एति].

@deva[ठन्]: @deva[प्रतिपथिकः] (no @deva[वृद्धि]—@deva[न्] is @deva[इत्] but not @deva[ञित्]/[@deva[णित्])
@deva[ठक्]: @deva[प्रातिपथिकः] (@deva[वृद्धि] by @ref[7.2.118])
"""

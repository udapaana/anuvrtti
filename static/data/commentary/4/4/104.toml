id = "4.4.104"
numericId = "44104"

[en]
simple = """
The affix @deva[ठञ्] (instead of @deva[यत्]) comes after the words @deva[पथिन्] (road), @deva[अतिथि] (guest), @deva[वसति] (dwelling), and @deva[स्वपति] (sleeping) in the sense of 'excellent in that'.

Examples:
- @deva[पथि साधुः] → @deva[पाथेयम्] 'provision for journey' (by @ref[7.1.2])
- @deva[अतिथौ साधुः] → @deva[आतिथेयम्] 'hospitality'
- @deva[वसतौ साधुः] → @deva[वासतेयम्] 'habitable' (as in @deva[वासतेयी रात्रिः] 'a night fit for staying')
- @deva[स्वपतौ साधुः] → @deva[स्वापतेयम्] 'wealth, property'
"""

standard = """
After @deva[पथिन्], @deva[अतिथि], @deva[वसति], @deva[स्वपति], @deva[ठञ्] (not @deva[यत्]) applies in sense @deva[साधुः].

Examples:
- @deva[पाथेयम्] (@ref[7.1.2]) 'journey provisions'
- @deva[आतिथेयम्] 'hospitality'
- @deva[वासतेयम्] 'habitable' (@deva[वासतेयी रात्रिः])
- @deva[स्वापतेयम्] 'wealth'
"""

advanced = """
@deva[पथिन्], @deva[अतिथि], @deva[वसति], @deva[स्वपति] take @deva[ठञ्] in sense @deva[साधुः].

Examples: @deva[पाथेयम्], @deva[आतिथेयम्], @deva[वासतेयम्] (@deva[वासतेयी रात्रिः]), @deva[स्वापतेयम्].
"""

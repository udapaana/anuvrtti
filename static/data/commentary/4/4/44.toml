id = "4.4.44"
numericId = "44044"

[en]
simple = """
The affix @deva[ण्य] (instead of @deva[ठक्]) comes after the word @deva[परिषद्] (council/assembly) in the sense of 'one who assembles there'.

Example: @deva[परिषदं समवैति] 'assembles in a council' → @deva[पारिषद्यः] 'a councillor, an assessor'
"""

standard = """
After @deva[परिषद्], @deva[ण्य] (not @deva[ठक्]) applies in sense @deva[समवैति].

Example: @deva[परिषदं समवैति] → @deva[पारिषद्यः] 'councillor'.
"""

advanced = """
@deva[परिषद्] takes @deva[ण्य] (not @deva[ठक्]) in sense @deva[समवैति].

Example: @deva[पारिषद्यः].

@deva[ण्य] = @deva[य] with @deva[वृद्धि] by @ref[7.2.117].
"""

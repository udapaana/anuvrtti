id = "4.4.93"
numericId = "44093"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[छन्दस्] (will/desire) in the instrumental case, in the sense of 'made thereby'.

Example: @deva[छन्दसा निर्मितम्] 'made at will' → @deva[छन्दस्यः] 'made according to one's wish'

Note: @deva[छन्दस्] here means @deva[इच्छा] (will, desire, fancy), not 'metre' or 'Veda'.
"""

standard = """
After @deva[छन्दस्] (in @deva[तृतीया]), @deva[यत्] applies in sense @deva[निर्मितम्] (made).

Example: @deva[छन्दसा निर्मितम्] → @deva[छन्दस्यः] 'made at will'.

@deva[छन्दस्] = @deva[इच्छा] (will/desire), not metre or Veda.
"""

advanced = """
@deva[छन्दस्] (in @deva[तृतीया]) takes @deva[यत्] in sense @deva[निर्मितम्].

Example: @deva[छन्दस्यः].

@deva[छन्दस्] = @deva[इच्छा], not @deva[वेद]/[@deva[वृत्त].
"""

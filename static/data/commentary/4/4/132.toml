id = "4.4.132"
numericId = "44132"

[en]
simple = """
In the Vedas, the affix @deva[ख] with the force of @deva[मतुप्] comes after the words @deva[वेशोभग] and @deva[यशोभग].

Examples:
- @deva[वेशोभगीनः] 'possessing strength and fortune'
- @deva[यशोभगीनः] 'possessing fame and fortune'

This @[sūtra] is separated from the previous to prevent @deva[यथासंख्य] (@ref[1.3.10])—otherwise @deva[यल्] would apply only to @deva[वेशोभग] and @deva[ख] only to @deva[यशोभग]. Also, only @deva[ख] (not @deva[यल्]) continues to the next @[sūtra].
"""

standard = """
In @deva[छन्दस्], after @deva[वेशोभग] and @deva[यशोभग], @deva[ख] applies with @deva[मत्वर्थ].

Examples: @deva[वेशोभगीनः], @deva[यशोभगीनः].

Separate from @ref[4.4.131] to avoid @deva[यथासंख्य] (@ref[1.3.10]). Only @deva[ख] (not @deva[यल्]) continues to @ref[4.4.133].
"""

advanced = """
@deva[वेशोभग]/[@deva[यशोभग] takes @deva[ख] in @deva[छन्दस्], @deva[मत्वर्थ].

Examples: @deva[वेशोभगीनः], @deva[यशोभगीनः].

Separate @[sūtra]: @deva[यथासंख्यनिवृत्ति]; @deva[ख]-@deva[अनुवृत्ति] to @ref[4.4.133].
"""

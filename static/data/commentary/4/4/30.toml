id = "4.4.30"
numericId = "44030"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the accusative case in the sense of 'one who gives with a blameworthy motive'.

This applies when someone lends money expecting excessive returns—usury.

Examples:
- @deva[द्विगुणं प्रयच्छति] 'gives for double' → @deva[द्वैगुणिकः] 'a usurer who charges 100% interest'
- @deva[त्रिगुणं प्रयच्छति] → @deva[त्रैगुणिकः] 'one who charges 200% interest'

A @deva[वार्त्तिक] states that @deva[वृद्धि] changes to @deva[वृधुषि] before this affix: @deva[वृद्धिं प्रयच्छति] → @deva[वार्धुषिकः] 'a usurer'.

The condition @deva[गर्ह्यम्] (blameworthy) is essential. When a debtor repays double (@deva[द्विगुणं प्रयच्छति अधर्मणः]), no affix applies—the motive is not blameworthy.
"""

standard = """
After a @deva[द्वितीया]-ending word, @deva[ठक्] applies in sense @deva[गर्ह्यं प्रयच्छति] (gives with blameworthy motive).

Examples:
- @deva[द्विगुणं प्रयच्छति] → @deva[द्वैगुणिकः] 'usurer (100% interest)'
- @deva[त्रैगुणिकः] '200% interest'

@note[type=@[vārtika]]: @deva[वृद्धेर्वृधुषिरादेशः] — @deva[वृद्धि] → @deva[वृधुषि]: @deva[वृद्धिं प्रयच्छति] → @deva[वार्धुषिकः] 'usurer'.

Condition @deva[गर्ह्यम्]: When debtor repays double (@deva[द्विगुणं प्रयच्छति अधर्मणः]), no affix—not blameworthy.
"""

advanced = """
After @deva[द्वितीयान्त], @deva[ठक्] in sense @deva[गर्ह्यं प्रयच्छति] (gives blameworthily).

Examples: @deva[द्वैगुणिकः], @deva[त्रैगुणिकः].

@note[type=@[vārtika]]: @deva[वृद्धेर्वृधुषिरादेशः] — @deva[वृद्धि] → @deva[वृधुषि] before this affix: @deva[वार्धुषिकः] 'usurer'. Alternatively, @deva[वृधुषि] is a separate @deva[प्रातिपदिक] synonymous with @deva[वृद्धि].

Condition: @deva[गर्ह्यम्] (blameworthy). @deva[द्विगुणं प्रयच्छति अधर्मणः] (debtor repays double) → no affix.
"""

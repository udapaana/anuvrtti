id = "4.4.45"
numericId = "44045"

[en]
simple = """
The affix @deva[ण्य] optionally comes after the word @deva[सेना] (army) in the sense of 'one who assembles there'. When @deva[ण्य] is not used, the regular @deva[ठक्] applies.

Examples:
- With @deva[ण्य]: @deva[सेनां समवैति] → @deva[सैन्यः] 'a soldier'
- With @deva[ठक्]: @deva[सेनां समवैति] → @deva[सैनिकः] 'a soldier'
"""

standard = """
After @deva[सेना], @deva[ण्य] optionally applies in sense @deva[समवैति]. Otherwise @deva[ठक्].

Examples:
- @deva[ण्य]: @deva[सैन्यः] 'soldier'
- @deva[ठक्]: @deva[सैनिकः] 'soldier'
"""

advanced = """
@deva[सेना] optionally takes @deva[ण्य] (otherwise @deva[ठक्]) in sense @deva[समवैति].

Examples: @deva[सैन्यः] (by @deva[ण्य]), @deva[सैनिकः] (by @deva[ठक्]).
"""

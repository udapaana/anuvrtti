id = "4.4.13"
numericId = "44013"

[en]
simple = """
The affix @deva[ठन्] (instead of @deva[ठक्]) comes after the words @deva[वस्न] (hire), @deva[क्रय] (purchase), and @deva[विक्रय] (sale) when in the instrumental case, in the sense of 'one who lives thereby'.

Examples:
- @deva[वस्नेन जीवति] → @deva[वस्निकः] 'one who lives by hire, a hireling'
- @deva[क्रयेण जीवति] → @deva[क्रयिकः] 'one who lives by buying'
- @deva[विक्रयेण जीवति] → @deva[विक्रयिकः] 'one who lives by selling'
- @deva[क्रयविक्रयेण जीवति] → @deva[क्रयविक्रयिकः] 'a trader'
"""

standard = """
After @deva[वस्न], @deva[क्रय], and @deva[विक्रय] (in @deva[तृतीया]), @deva[ठन्] (not @deva[ठक्]) applies in sense @deva[जीवति].

Examples:
- @deva[वस्निकः] 'hireling'
- @deva[क्रयिकः], @deva[विक्रयिकः]
- @deva[क्रयविक्रयिकः] 'trader' (affix to compound and members)
"""

advanced = """
@deva[वस्न], @deva[क्रय], @deva[विक्रय] take @deva[ठन्] (not @deva[ठक्]) in sense @deva[जीवति].

Examples: @deva[वस्निकः], @deva[क्रयिकः], @deva[विक्रयिकः], @deva[क्रयविक्रयिकः].

For @deva[क्रय] and @deva[विक्रय], the affix applies @deva[समासे चाव्ययवयोः]—to compound and individual words.
"""

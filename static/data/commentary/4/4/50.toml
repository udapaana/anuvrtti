id = "4.4.50"
numericId = "44050"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the genitive case in the sense of 'the tax/toll of that'.

The word @deva[अवक्रय] means 'government tax, toll, price, rent'—from the root @deva[अव-क्री] 'to purchase'.

Examples:
- @deva[शुल्कशालायाः अवक्रयः] 'the tax of a custom-house' → @deva[शौल्कशालिकः]
- @deva[आपणस्य अवक्रयः] → @deva[आपणिकः] 'marketplace tax'
- @deva[गुल्मस्य अवक्रयः] → @deva[गौल्मिकः]
- @deva[आकरस्य अवक्रयः] → @deva[आकरिकः] 'mining tax'

Distinction: @deva[धर्म्य] (@ref[4.4.47]) is a legal due according to @deva[धर्म]; @deva[अवक्रय] can be a tax exacted by oppression, even transgressing @deva[धर्म].
"""

standard = """
After a @deva[षष्ठ्यन्त] word, @deva[ठक्] applies in sense @deva[अवक्रयः] (its tax/toll).

@deva[अवक्रय] = government tax, toll, rent (from @deva[अव-क्री]).

Examples: @deva[शौल्कशालिकः], @deva[आपणिकः], @deva[गौल्मिकः], @deva[आकरिकः].

Distinction: @deva[धर्म्य] (@ref[4.4.47]) = lawful due; @deva[अवक्रय] = tax (may be oppressive, contrary to @deva[धर्म]).
"""

advanced = """
After @deva[षष्ठ्यन्त], @deva[ठक्] in sense @deva[अवक्रयः] (tax).

Examples: @deva[शौल्कशालिकः], @deva[आपणिकः], @deva[गौल्मिकः], @deva[आकरिकः].

@deva[धर्म्य] (@ref[4.4.47]) vs @deva[अवक्रय]: @deva[धर्म्य] = @deva[धर्मानुकूल विधि]; @deva[अवक्रय] = @deva[कर] (may be @deva[अधार्मिक]).
"""

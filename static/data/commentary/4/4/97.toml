id = "4.4.97"
numericId = "44097"

[en]
simple = """
The affix @deva[यत्] comes after specific words (in the genitive case) with specific senses:

1. @deva[मत] in sense 'means': @deva[मतस्य करणम्] → @deva[मत्यः] 'means of acquiring knowledge'

2. @deva[जन] in sense 'gossip': @deva[जनस्य जल्पः] → @deva[जन्यः] 'rumour, gossip'

3. @deva[हल] in sense 'drawing/ploughing': @deva[हलस्य कर्षः] → @deva[हल्यः] 'ploughed'

Also @deva[द्विहल्यः] 'ploughed twice', @deva[त्रिहल्यः] 'ploughed thrice'—@deva[तदन्तविधि] applies (see @deva[रथसीताहलेभ्यो यद्विधौ]).
"""

standard = """
After specific words (in @deva[षष्ठी]) with specific senses, @deva[यत्] applies:

1. @deva[मत] + @deva[करणम्] → @deva[मत्यः] 'means of knowledge'
2. @deva[जन] + @deva[जल्पः] → @deva[जन्यः] 'rumour'
3. @deva[हल] + @deva[कर्षः] → @deva[हल्यः] 'ploughed'

@deva[तदन्तविधि] applies: @deva[द्विहल्यः], @deva[त्रिहल्यः] (@deva[रथसीताहलेभ्यो यद्विधौ]).
"""

advanced = """
@deva[यत्] after @deva[षष्ठ्यन्त] with specific senses:

1. @deva[मत] + @deva[करणम्] → @deva[मत्यः]
2. @deva[जन] + @deva[जल्पः] → @deva[जन्यः]
3. @deva[हल] + @deva[कर्षः] → @deva[हल्यः]

@deva[तदन्तविधि]: @deva[द्विहल्यः], @deva[त्रिहल्यः].
"""

id = "4.4.52"
numericId = "44052"

[en]
simple = """
The affix @deva[ठञ्] (instead of @deva[ठक्]) comes after the word @deva[लवण] (salt) in the sense of 'one whose saleable commodity is that'.

The difference between @deva[ठक्] and @deva[ठञ्] is in accent.

Example: @deva[लवणं पण्यम् अस्य] → @deva[लावणिकः] 'a salt-vendor'
"""

standard = """
After @deva[लवण], @deva[ठञ्] (not @deva[ठक्]) applies in sense @deva[पण्यम् अस्य].

Example: @deva[लावणिकः] 'salt-vendor'.

@deva[ठञ्] vs @deva[ठक्]: accent difference.
"""

advanced = """
@deva[लवण] takes @deva[ठञ्] (not @deva[ठक्]) in sense @deva[पण्यम् अस्य].

Example: @deva[लावणिकः].

@deva[ठञ्] vs @deva[ठक्]: @deva[ञित्] vs @deva[कित्] accent.
"""

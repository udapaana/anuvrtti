id = "4.4.75"
numericId = "44075"

[en]
simple = """
This is a governing rule: the affix @deva[यत्] applies in each @[sūtra] from here through @ref[5.1.5] @deva[तस्मै हितम्].

The affix @deva[यत्] must be supplied in the following @[sūtras].

Example from the next @[sūtra] (@ref[4.4.76]): @deva[तद् वहति रथयुगप्रासङ्गम्] — with @deva[यत्] we get @deva[रथ्यः] 'fit for a chariot', @deva[युग्यः] 'fit for a yoke', @deva[प्रासङ्ग्यः] 'fit for a trace-rope'.
"""

standard = """
This @deva[अधिकारसूत्र] establishes @deva[यत्] as the governing affix from here through @ref[5.1.5] @deva[तस्मै हितम्].

Example from @ref[4.4.76]: @deva[तद् वहति रथयुगप्रासङ्गम्] + @deva[यत्] → @deva[रथ्यः], @deva[युग्यः], @deva[प्रासङ्ग्यः].
"""

advanced = """
@deva[अधिकार]: @deva[यत्] governs through @ref[5.1.5] @deva[तस्मै हितम्].

Example (@ref[4.4.76]): @deva[रथ] + @deva[यत्] → @deva[रथ्यः]; @deva[युग] + @deva[यत्] → @deva[युग्यः]; @deva[प्रासङ्ग] + @deva[यत्] → @deva[प्रासङ्ग्यः].
"""

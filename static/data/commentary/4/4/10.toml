id = "4.4.10"
numericId = "44010"

[en]
simple = """
The affix @deva[ष्ठन्] (instead of @deva[ठक्]) comes after the words @deva[पर्प], @deva[अश्व], @deva[अश्वत्थ], @deva[रथ], @deva[जाल], @deva[न्यास], @deva[व्याल], and @deva[पाद] in the sense of 'one who goes on by means thereof'.

Examples:
- @deva[पर्पेण चरति] → @deva[पर्पिकः], f. @deva[पर्पिकी]
- @deva[अश्वेन चरति] → @deva[अश्विकः], f. @deva[अश्विकी]
- @deva[पादेन चरति] → @deva[पदिकः], f. @deva[पदिकी] (@deva[पाद] becomes @deva[पद्] by @ref[6.3.52])

The @deva[न्] in @deva[ष्ठन्] affects accent. The @deva[ष्] triggers @deva[ङीष्] (→ @deva[ई]) in feminines.
"""

standard = """
After @deva[पर्पादि] (@deva[पर्प], @deva[अश्व], @deva[अश्वत्थ], @deva[रथ], @deva[जाल], @deva[न्यास], @deva[व्याल], @deva[पाद]), @deva[ष्ठन्] (not @deva[ठक्]) applies in sense @deva[चरति].

Examples:
- @deva[पर्पिकः], f. @deva[पर्पिकी]
- @deva[अश्विकः], f. @deva[अश्विकी]
- @deva[पदिकः], f. @deva[पदिकी] (@deva[पाद] → @deva[पद्] by @ref[6.3.52])

@deva[ष्ठन्]: @deva[न्] is @deva[इत्] for accent (@ref[6.1.197]); @deva[ष्] is @deva[इत्] for @deva[ङीष्] (@ref[4.1.41]).
"""

advanced = """
@deva[पर्पादि] (@deva[पर्प], @deva[अश्व], @deva[अश्वत्थ], @deva[रथ], @deva[जाल], @deva[न्यास], @deva[व्याल], @deva[पाद]) take @deva[ष्ठन्] in sense @deva[चरति].

Examples: @deva[पर्पिकः] f. @deva[पर्पिकी], @deva[अश्विकः] f. @deva[अश्विकी], @deva[पदिकः] f. @deva[पदिकी].

@deva[ष्ठन्]: @deva[न्] is @deva[इत्] for @deva[आद्युदात्त] by @ref[6.1.197]; @deva[ष्] is @deva[इत्] for @deva[ङीष्] by @ref[4.1.41].

@deva[पाद] → @deva[पद्] before @deva[ष्ठन्] by @ref[6.3.52] (@deva[पादः पदादिष्वचि]).
"""

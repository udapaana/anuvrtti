id = "4.4.128"
numericId = "44128"

[en]
simple = """
In the Vedas, the affix @deva[यत्] with the force of @deva[मतुप्] comes after a word in the nominative case, when the derived word means 'a month' or 'a body'.

This supersedes @deva[मतुप्] and affixes with @deva[मतुप्] sense.

Month names:
- @deva[नभांसि विद्यन्ते यस्मिन् मासे] → @deva[नभस्यः] 'month of clouds' (June-July)
- @deva[सहस्यः] (@[pauṣa], Nov-Dec)
- @deva[तपस्यः] (@[phālguna], Feb-March)
- @deva[मधव्यः] (@[vaiśākha], April-May) — derived: @deva[मधु] + @deva[यत्] → @deva[मधा] (@ref[6.4.146]) + @deva[यत्] → @deva[मधव्यः] (@ref[6.1.79]) 'month of honey'

Body: @deva[ओजस्या तनूः] 'bodies full of vigor'

Condition: Must denote month or body. Otherwise @deva[मतुप्]: @deva[मधुमता पात्रेण चरति].

@deva[वार्त्तिक]: @deva[यत्] optionally when sense is 'immediately after': @deva[माधव्यः] or @deva[माधवः मासः].

@deva[वार्त्तिक]: Sometimes affix elided; sometimes @deva[अ], @deva[इ], @deva[र] serve same purpose: @deva[तपः]/[@deva[तपस्यः], @deva[इषो मासः], @deva[शुचिर्मासः].
"""

standard = """
In @deva[छन्दस्], @deva[यत्] with @deva[मत्वर्थ] comes after @deva[प्रथमान्त] when result means @deva[मास] (month) or @deva[तनु] (body). Supersedes @deva[मतुप्].

Months: @deva[नभस्यः] (@[śrāvaṇa]), @deva[सहस्यः] (@[pauṣa]), @deva[तपस्यः] (@[phālguna]), @deva[मधव्यः] (@[vaiśākha]).

Body: @deva[ओजस्या तनूः].

Condition: @deva[मास]/[@deva[तनु] sense. Otherwise @deva[मतुप्]: @deva[मधुमता पात्रेण].

@note[type=@[vārtika]]: Optional @deva[यत्] for 'immediately after': @deva[माधव्यः]/[@deva[माधवः].
@note[type=@[vārtika]]: @deva[लुक्] possible; @deva[अ]/[@deva[इ]/[@deva[र] alternatives: @deva[तपः], @deva[इषो मासः], @deva[शुचिर्मासः].
"""

advanced = """
@deva[यत्] with @deva[मत्वर्थ] after @deva[प्रथमान्त] in @deva[छन्दस्], @deva[मास]/[@deva[तनु] sense. Supersedes @deva[मतुप्].

Examples: @deva[नभस्यः], @deva[सहस्यः], @deva[तपस्यः], @deva[मधव्यः] (@ref[6.4.146], @ref[6.1.79]); @deva[ओजस्या तनूः].

@note[type=@[vārtika]]: @deva[अनन्तरार्थे विभाषा]: @deva[माधव्यः]/[@deva[माधवः].
@note[type=@[vārtika]]: @deva[लुक्], @deva[अ]/[@deva[इ]/[@deva[र] alternatives.
"""

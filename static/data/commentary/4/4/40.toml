id = "4.4.40"
numericId = "44040"

[en]
simple = """
The affix @deva[ठक्] comes after the words @deva[प्रतिकण्ठ], @deva[अर्थ], and @deva[ललाम], in the accusative case, in the sense of 'one who takes that'.

Examples:
- @deva[प्रतिकण्ठं गृह्णाति] → @deva[प्रातिकण्ठिकः]
- @deva[अर्थं गृह्णाति] → @deva[आर्थिकः]
- @deva[ललामं गृह्णाति] → @deva[लालामिकः]

Note: @deva[प्रतिकण्ठ] here is an @deva[अव्ययीभाव] compound meaning 'from throat to throat' (@deva[कण्ठं कण्ठं प्रति]), not a @deva[बहुव्रीहि] meaning 'one whose throat is opposed'.
"""

standard = """
After @deva[प्रतिकण्ठ], @deva[अर्थ], @deva[ललाम] (in @deva[द्वितीया]), @deva[ठक्] applies in sense @deva[गृह्णाति].

Examples: @deva[प्रातिकण्ठिकः], @deva[आर्थिकः], @deva[लालामिकः].

@deva[प्रतिकण्ठ] is @deva[अव्ययीभाव] (@deva[कण्ठं कण्ठं प्रति]), not @deva[बहुव्रीहि] (@deva[प्रतिगतः कण्ठम्])—the latter takes no affix.
"""

advanced = """
@deva[प्रतिकण्ठ], @deva[अर्थ], @deva[ललाम] (in @deva[द्वितीया]) take @deva[ठक्] in sense @deva[गृह्णाति].

Examples: @deva[प्रातिकण्ठिकः], @deva[आर्थिकः], @deva[लालामिकः].

@deva[प्रतिकण्ठ]: @deva[अव्ययीभाव] (@deva[कण्ठं कण्ठं प्रति]), not @deva[बहुव्रीहि] (@deva[प्रतिगतः कण्ठं यस्य])—latter takes no affix.
"""

id = "4.4.38"
numericId = "44038"

[en]
simple = """
Both affixes @deva[ठञ्] and @deva[ठक्] come after the word @deva[आक्रन्द] in the accusative case, in the sense of 'one who runs there'.

The word @deva[आक्रन्द] means 'a place where people cry out'—e.g., a battlefield. It also means 'weeping' or 'invoking'.

Example: @deva[आक्रन्दं धावति] 'runs to cries of distress' → @deva[आक्रन्दिकः] 'one who runs to help those in distress', f. @deva[आक्रन्दिकी]

The difference between @deva[ठक्] and @deva[ठञ्] is in accent.
"""

standard = """
After @deva[आक्रन्द] (in @deva[द्वितीया]), both @deva[ठञ्] and @deva[ठक्] apply in sense @deva[धावति].

@deva[आक्रन्द] = place of weeping/crying out (battlefield); also weeping, invoking.

Example: @deva[आक्रन्दं धावति] → @deva[आक्रन्दिकः] f. @deva[आक्रन्दिकी] 'one who runs to distress calls'

@deva[ठक्] vs @deva[ठञ्]: accent difference.
"""

advanced = """
@deva[आक्रन्द] (in @deva[द्वितीया]) takes @deva[ठञ्] or @deva[ठक्] in sense @deva[धावति].

@deva[आक्रन्द] = @deva[रोदनस्थान] (battlefield), also @deva[रोदन], @deva[आह्वान].

Example: @deva[आक्रन्दिकः] f. @deva[आक्रन्दिकी].

@deva[ठञ्] vs @deva[ठक्]: accent difference (@deva[ञित्] vs @deva[कित्]).
"""

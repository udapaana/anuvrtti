id = "4.4.71"
numericId = "44071"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting an improper place or time, in the @deva[सप्तमी] (locative) case, in the sense of 'one who studies there'.

The word @deva[अदेशकाल] refers to times or places prohibited for study by sacred rules.

Examples of improper places:
- @deva[श्मशाने अधीते] 'studies in a cremation ground' → @deva[श्माशानिकः]
- @deva[चतुष्पथे अधीते] 'studies at a crossroads' → @deva[चातुष्पथिकः]

Examples of improper times:
- @deva[चतुर्दश्यां अधीते] 'studies on the 14th lunar day' → @deva[चातुर्दशिकः]
- @deva[अमावास्यायां अधीते] → @deva[आमावास्यिकः]

Counter-examples (proper places/times): @deva[स्रुघ्ने अधीते], @deva[पूर्वाह्णे अधीते] → no affix applies.
"""

standard = """
After @deva[अदेशकालवाचक] (improper place/time) in @deva[सप्तमी], @deva[ठक्] applies in sense @deva[अध्यायिन्] (one who studies there).

@deva[अदेशकाल] = place/time prohibited by @deva[शास्त्र] for study.

Improper places: @deva[श्माशानिकः], @deva[चातुष्पथिकः]
Improper times: @deva[चातुर्दशिकः], @deva[आमावास्यिकः]

Proper place/time → no affix: @deva[स्रुघ्ने अधीते], @deva[पूर्वाह्णे अधीते].
"""

advanced = """
After @deva[अदेशकालवाचक] (in @deva[सप्तमी]), @deva[ठक्] in sense @deva[तत्र अधीते].

Improper places: @deva[श्माशानिकः], @deva[चातुष्पथिकः]
Improper times: @deva[चातुर्दशिकः], @deva[आमावास्यिकः]

Condition @deva[अदेशकाल] excludes proper places/times: @deva[स्रुघ्ने], @deva[पूर्वाह्णे].
"""

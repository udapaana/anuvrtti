id = "4.4.80"
numericId = "44080"

[en]
simple = """
The affix @deva[अण्] comes after the word @deva[शकट] (cart) in the accusative case, in the sense of 'what bears that'.

Example: @deva[शकटं वहति] → @deva[शाकटः] 'a cart-ox'

This could also be derived by @ref[4.3.120] @deva[तस्येदम्] + @deva[अण्]: @deva[शाकटस्य वोढ] = @deva[शाकटः].

The specific mention indicates @deva[तदन्तविधि] applies: @deva[द्वे शकटे वहति] → @deva[द्वैशकटः], and @deva[लुक्] by @ref[4.1.88] doesn't apply.
"""

standard = """
After @deva[शकट] (in @deva[द्वितीया]), @deva[अण्] applies in sense @deva[वहति].

Example: @deva[शाकटः] 'cart-ox'.

Alternatively derivable by @deva[तस्येदम्] (@ref[4.3.120]): @deva[शाकटस्य वोढ] = @deva[शाकटः].

Specification indicates @deva[तदन्तविधि] and no @deva[लुक्] (@ref[4.1.88]): @deva[द्वैशकटः].
"""

advanced = """
@deva[शकट] (in @deva[द्वितीया]) takes @deva[अण्] in sense @deva[वहति].

Example: @deva[शाकटः].

Alternatively: @deva[तस्येदम्] @deva[अण्] (@ref[4.3.120]): @deva[शाकटस्य वोढ].

Specification: @deva[तदन्तविधि] applies; no @deva[लुक्] by @ref[4.1.88]: @deva[द्वैशकटः].
"""

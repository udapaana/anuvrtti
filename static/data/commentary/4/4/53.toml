id = "4.4.53"
numericId = "44053"

[en]
simple = """
The affix @deva[ष्ठन्] (instead of @deva[ठक्]) comes after the words in the @deva[किशरादि] list in the sense of 'one whose saleable commodity is that'.

The @deva[किशरादि] words all denote perfumes.

Examples:
- @deva[किशराः पण्यम् अस्य] → @deva[किशरिकः] 'perfume-seller', f. @deva[किशरिकी]
- @deva[नरदाः पण्यम् अस्य] → @deva[नरदिकः], f. @deva[नरदिकी]

The @deva[किशरादि] list includes: @deva[किशर], @deva[नरद], @deva[नलद], @deva[स्थागल], @deva[तगर], @deva[गुग्गुलु], @deva[उशीर], @deva[हरिद्रा], @deva[हरिद्रु], @deva[पर्णी], @deva[सुमङ्गल], @deva[हरिद्रायणी].
"""

standard = """
After @deva[किशरादि], @deva[ष्ठन्] (not @deva[ठक्]) applies in sense @deva[पण्यम् अस्य].

@deva[किशरादि] words denote perfumes.

Examples: @deva[किशरिकः] f. @deva[किशरिकी] (@ref[4.1.41]), @deva[नरदिकः] f. @deva[नरदिकी].

@deva[किशरादि] @[gaṇa] (12): @deva[किशर], @deva[नरद], @deva[नलद], @deva[स्थागल], @deva[तगर], @deva[गुग्गुलु], @deva[उशीर], @deva[हरिद्रा], @deva[हरिद्रु], @deva[पर्णी], @deva[सुमङ्गल], @deva[हरिद्रायणी].
"""

advanced = """
@deva[किशरादि] takes @deva[ष्ठन्] in sense @deva[पण्यम् अस्य].

Examples: @deva[किशरिकः] f. @deva[किशरिकी], @deva[नरदिकः] f. @deva[नरदिकी].

@deva[ष्ठन्]: @deva[ष्] is @deva[इत्] for @deva[ङीष्] (@ref[4.1.41]).

@deva[किशरादि] @[gaṇa] (12): @deva[किशर] (@deva[किसर]), @deva[नरद], @deva[नलद], @deva[स्थागल], @deva[तगर], @deva[गुग्गुलु], @deva[उशीर], @deva[हरिद्रा], @deva[हरिद्रु], @deva[पर्णी], @deva[सुमङ्गल], @deva[हरिद्रायणी].
"""

id = "4.4.106"
numericId = "44106"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), the affix @deva[ढ] (instead of @deva[यत्]) comes after the word @deva[सभा] in the sense of 'excellent in that'.

Example: @deva[सभेयः] 'fit for society' in the Vedic verse @deva[सभेयोऽस्य युवा यजमानस्य वीरो जायताम्] 'let a refined, youthful hero be born to this sacrificer'
"""

standard = """
In @deva[छन्दस्], after @deva[सभा], @deva[ढ] (not @deva[यत्]) applies in sense @deva[साधुः].

Example: @deva[सभेयः] in @deva[सभेयोऽस्य युवा यजमानस्य वीरो जायताम्].
"""

advanced = """
@deva[सभा] takes @deva[ढ] (not @deva[यत्]) in @deva[छन्दस्], sense @deva[साधुः].

Example: @deva[सभेयोऽस्य युवा यजमानस्य वीरो जायताम्].
"""

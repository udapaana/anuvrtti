id = "4.4.51"
numericId = "44051"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting a thing to be sold, in the nominative case (first case, @deva[प्रथमा]), in the sense of 'one whose saleable commodity is that'.

Examples:
- @deva[अपूपाः पण्यम् अस्य] 'cakes are his merchandise' → @deva[आपूपिकः] 'a cake-seller'
- @deva[शष्कुलाः पण्यम् अस्य] → @deva[शाष्कुलिकः] 'a pastry-seller'
- @deva[मोदकाः पण्यम् अस्य] → @deva[मौदकिकः] 'a sweetmeat-seller'
"""

standard = """
After a @deva[पण्यवाचिन्] (word denoting merchandise) in @deva[प्रथमा], @deva[ठक्] applies in sense @deva[पण्यम् अस्य] (this is his merchandise).

Examples: @deva[आपूपिकः] 'cake-vendor', @deva[शाष्कुलिकः], @deva[मौदकिकः].
"""

advanced = """
After @deva[पण्यवाचिन्] (in @deva[प्रथमा]), @deva[ठक्] in sense @deva[पण्यम् अस्य].

Examples: @deva[आपूपिकः], @deva[शाष्कुलिकः], @deva[मौदकिकः].
"""

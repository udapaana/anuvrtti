id = "4.4.90"
numericId = "44090"

[en]
simple = """
The affix @deva[ञ्य] comes after the word @deva[गृहपति] (householder) in the instrumental case, in the sense of 'joined with that'.

Example: @deva[गृहपतिना संयुक्तः] 'joined with the householder' → @deva[गार्हपत्यः] 'the @[gārhapatya] Fire'

The @deva[गार्हपत्य] fire is a sacred fire particularly consecrated by the householder. The word @deva[संज्ञायाम्] from the previous @[sūtra] applies—@deva[गार्हपत्य] is a specific name for a particular fire, not everything relating to a @deva[गृहपति].

The fire in which a householder (@deva[गृहपति]), together with his wife, performs sacrifice is called @deva[गार्हपत्य]. Alternatively, a fire in which @deva[गृहपति]-hymns are recited.
"""

standard = """
After @deva[गृहपति] (in @deva[तृतीया]), @deva[ञ्य] applies in sense @deva[संयुक्तः] (joined with). @deva[संज्ञायाम्].

Example: @deva[गृहपतिना संयुक्तः] → @deva[गार्हपत्यः] '@[gārhapatya] Fire'.

@deva[गार्हपत्य] = specific @deva[अग्नि] consecrated by @deva[गृहपति], not general 'relating to @deva[गृहपति]'.

Meaning: Fire in which @deva[गृहपति] with wife (@deva[संयुक्त]) performs @deva[यज्ञ]; or fire for @deva[गृहपति]-@deva[मन्त्र]s. Cannot use @deva[दक्षिणाग्नि] for this.
"""

advanced = """
@deva[गृहपति] (in @deva[तृतीया]) takes @deva[ञ्य] in sense @deva[संयुक्तः]. @deva[संज्ञायाम्].

Example: @deva[गार्हपत्यः] (specific @deva[अग्निसंज्ञा]).

Meaning: @deva[अग्नि] in which @deva[गृहपति] + @deva[पत्नी] perform @deva[यज्ञ]; or @deva[गृहपतिमन्त्राध्ययनाग्नि]. Not @deva[दक्षिणाग्नि].
"""

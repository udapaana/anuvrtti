id = "4.4.73"
numericId = "44073"

[en]
simple = """
The affix @deva[ठक्] comes after the locative word @deva[निकट] (near) in the sense of 'one who dwells there'.

This forms epithets for those permitted by sacred rules to dwell near human habitations.

Example: @deva[निकटे वसति] 'dwells nearby' → @deva[नैकटिकः] 'an ascetic allowed to live near human habitations'

Contrast: @deva[आरण्यकाः] are ascetics ordained to dwell in forests, at least two miles from habitations. @deva[नैकटिकाः] are those whose order permits living near habitations.
"""

standard = """
After @deva[निकट] (in @deva[सप्तमी]), @deva[ठक्] applies in sense @deva[वसति] (dwells).

Example: @deva[निकटे वसति] → @deva[नैकटिकः] 'ascetic permitted to dwell near habitations'.

Contrast: @deva[आरण्यक] (must dwell in forests) vs @deva[नैकटिक] (may dwell near human settlements).
"""

advanced = """
@deva[निकट] (in @deva[सप्तमी]) takes @deva[ठक्] in sense @deva[वसति].

Example: @deva[नैकटिकः] 'ascetic of @deva[नैकटिक] order'.

These are ascetics whose @deva[आचार] permits dwelling @deva[निकट] (near habitations), unlike @deva[आरण्यक]s who must dwell @deva[अरण्ये].
"""

id = "4.4.70"
numericId = "44070"

[en]
simple = """
The affix @deva[ठन्] (instead of @deva[ठक्]) comes after words ending in @deva[अगार] (house/chamber) in the sense of 'one who is appointed there'.

The difference from @deva[ठक्] is in accent and the absence of @deva[वृद्धि].

Examples:
- @deva[देवागारे नियुक्तः] 'appointed at a temple' → @deva[देवागारिकः] (not @deva[*दैवागारिकः])
- @deva[कोष्ठागारे नियुक्तः] → @deva[कोष्ठागारिकः] 'treasury keeper'
- @deva[भाण्डागारे नियुक्तः] → @deva[भाण्डागारिकः] 'storehouse keeper'
"""

standard = """
After @deva[अगारान्त] (words ending in @deva[अगार]), @deva[ठन्] (not @deva[ठक्]) applies in sense @deva[तत्र नियुक्तः].

Difference: accent and no @deva[वृद्धि].

Examples: @deva[देवागारिकः] 'temple-keeper', @deva[कोष्ठागारिकः], @deva[भाण्डागारिकः].
"""

advanced = """
@deva[अगारान्त] takes @deva[ठन्] (not @deva[ठक्]) in sense @deva[तत्र नियुक्तः].

@deva[ठन्] vs @deva[ठक्]: accent difference; no @deva[वृद्धि] with @deva[ठन्].

Examples: @deva[देवागारिकः], @deva[कोष्ठागारिकः], @deva[भाण्डागारिकः].
"""

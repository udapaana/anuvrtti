id = "4.4.23"
numericId = "44023"

[en]
simple = """
The affix @deva[इनि] (instead of @deva[ठक्]) comes after the word @deva[चूर्ण] (powder) in the sense of 'mixed therewith'.

Examples:
- @deva[चूर्णैः संसृष्टाः] → @deva[चूर्णिनः अपूपाः] 'cakes sprinkled with powder'
- @deva[चूर्णिन्यः धानाः] 'parched grains mixed with powder'
"""

standard = """
After @deva[चूर्ण], @deva[इनि] (not @deva[ठक्]) applies in sense @deva[संसृष्टम्].

Examples: @deva[चूर्णिनः अपूपाः] 'cakes with powder', @deva[चूर्णिन्यः धानाः] 'powdered grains'.
"""

advanced = """
@deva[चूर्ण] takes @deva[इनि] (not @deva[ठक्]) in sense @deva[संसृष्टम्].

Examples: @deva[चूर्णिनः अपूपाः], @deva[चूर्णिन्यः धानाः].

@deva[इनि] = @deva[इन्] by @ref[1.3.2] (@deva[उपदेशेऽजनुनासिक इत्]).
"""

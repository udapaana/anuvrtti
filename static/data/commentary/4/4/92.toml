id = "4.4.92"
numericId = "44092"

[en]
simple = """
The affix @deva[यत्] comes after the words @deva[धर्म], @deva[पथिन्], @deva[अर्थ], and @deva[न्याय] in the ablative case, in the sense of 'not deviating from that'.

Examples:
- @deva[धर्मात् अनपेतम्] 'not deviating from dharma' → @deva[धर्म्यम्] 'just, righteous'
- @deva[पथः अनपेतम्] → @deva[पथ्यम्] 'wholesome diet' (not deviating from the path prescribed by @[śāstra])
- @deva[अर्थात् अनपेतम्] → @deva[अर्थ्यम्] 'fit, appropriate'
- @deva[न्यायात् अनपेतम्] → @deva[न्याय्यम्] 'just, suitable'

The word @deva[संज्ञायाम्] from @ref[4.4.89] applies—these are specific names with defined meanings. A thief who doesn't deviate from the road (@deva[पथात् अनपेतः]) would not be called @deva[पथ्य].
"""

standard = """
After @deva[धर्म], @deva[पथिन्], @deva[अर्थ], @deva[न्याय] (in @deva[पञ्चमी]), @deva[यत्] applies in sense @deva[अनपेतम्] (not deviating). @deva[संज्ञायाम्] from @ref[4.4.89] applies.

Examples:
- @deva[धर्म्यम्] 'just' (not deviating from @deva[धर्म])
- @deva[पथ्यम्] 'wholesome' (@deva[शास्त्रीयात् पथो यदनपेतम्])—a thief on the road is not @deva[पथ्य]
- @deva[अर्थ्यम्] 'fit'
- @deva[न्याय्यम्] 'suitable'
"""

advanced = """
@deva[धर्म], @deva[पथिन्], @deva[अर्थ], @deva[न्याय] (in @deva[पञ्चमी]) take @deva[यत्] in sense @deva[अनपेतम्]. @deva[संज्ञायाम्] (@ref[4.4.89]).

Examples: @deva[धर्म्यम्], @deva[पथ्यम्] (@deva[शास्त्रीयपथानपेत], not @deva[चोरः]), @deva[अर्थ्यम्], @deva[न्याय्यम्].
"""

id = "4.4.29"
numericId = "44029"

[en]
simple = """
The affix @deva[ठक्] comes after the word @deva[परिमुख] (and similar words) in the accusative case, in the sense of 'one who exists in relation to that'.

Example: @deva[परिमुखं वर्तते] → @deva[पारिमुखिकः] 'one who is before the face, present, nearby'

The @deva[च] in the @[sūtra] indicates that other similar words also take this affix, such as @deva[परिपार्श्व] → @deva[पारिपार्श्विकः] 'one who is at the side'.

@deva[परिमुख] is an @deva[अव्ययीभाव] compound (@ref[2.1.12]). If @deva[परि] means 'exclusion' (@ref[1.4.88]), then @deva[पारिमुखिकः] means 'a servant who avoids the master's face'. If @deva[परि] means 'around', it means 'a servant always in the master's presence'.
"""

standard = """
After @deva[परिमुख] etc. (in @deva[द्वितीया]), @deva[ठक्] applies in sense @deva[वर्तते].

Example: @deva[परिमुखं वर्तते] → @deva[पारिमुखिकः] 'present before the face'.

The @deva[च] extends to similar words: @deva[पारिपार्श्विकः] (from @deva[परिपार्श्व]).

@deva[परिमुख] is @deva[अव्ययीभाव] (@ref[2.1.12]). Two senses based on @deva[परि]: if @deva[वर्जन] (@ref[1.4.88]), 'servant who avoids master's face'; if @deva[सर्वतोभाव], 'servant always in master's presence'.
"""

advanced = """
@deva[परिमुख] etc. (in @deva[द्वितीया]) take @deva[ठक्] in sense @deva[वर्तते].

Example: @deva[पारिमुखिकः]; also @deva[पारिपार्श्विकः] (by @deva[च]).

@deva[परिमुख]: @deva[अव्ययीभाव] by @ref[2.1.12]. Two meanings: (1) @deva[परि] = @deva[वर्जन] (@ref[1.4.88]): @deva[स्वामिनो मुखं वर्जयित्वा सेवको वर्त्तते]; (2) @deva[परि] = @deva[सर्वतस्]: @deva[यतः स्वामिनो मुखं ततस्ततो वर्त्तते].
"""

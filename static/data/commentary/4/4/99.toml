id = "4.4.99"
numericId = "44099"

[en]
simple = """
The affix @deva[खञ्] (instead of @deva[यत्]) comes after the words in the @deva[प्रतिजनादि] list in the sense of 'excellent in that'.

Examples:
- @deva[प्रतिजने साधुः] → @deva[प्रातिजनीनः] 'suitable against an adversary' or 'excellent for every person' (by @ref[7.1.2])
- @deva[एवं युगे साधुः] → @deva[एवंयुगीनः]
- @deva[संयुगे साधुः] → @deva[सांयुगीनः]

The @deva[प्रतिजनादि] list includes: @deva[प्रतिजन], @deva[इदंयुग], @deva[संयुग], @deva[समयुग], @deva[परयुग], @deva[परकुल], @deva[परस्यकुल], @deva[अमुष्यकुल], @deva[सर्वजन], @deva[विश्वजन], @deva[महाजन], @deva[पञ्चजन].
"""

standard = """
After @deva[प्रतिजनादि], @deva[खञ्] (not @deva[यत्]) applies in sense @deva[साधुः].

Examples: @deva[प्रातिजनीनः] (@ref[7.1.2]) 'suitable against adversary', @deva[एवंयुगीनः], @deva[सांयुगीनः].

@deva[प्रतिजनादि] @[gaṇa] (12): @deva[प्रतिजन], @deva[इदंयुग], @deva[संयुग], @deva[समयुग], @deva[परयुग], @deva[परकुल], @deva[परस्यकुल], @deva[अमुष्यकुल], @deva[सर्वजन], @deva[विश्वजन], @deva[महाजन], @deva[पञ्चजन].
"""

advanced = """
@deva[प्रतिजनादि] takes @deva[खञ्] in sense @deva[साधुः].

Examples: @deva[प्रातिजनीनः], @deva[एवंयुगीनः], @deva[सांयुगीनः].

@deva[प्रतिजनादि] @[gaṇa] (12): @deva[प्रतिजन], @deva[इदंयुग], @deva[संयुग], @deva[समयुग], @deva[परयुग], @deva[परकुल], @deva[परस्यकुल], @deva[अमुष्यकुल], @deva[सर्वजन], @deva[विश्वजन], @deva[महाजन], @deva[पञ्चजन].
"""

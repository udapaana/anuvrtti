id = "4.4.67"
numericId = "44067"

[en]
simple = """
The affix @deva[टिठन्] (instead of @deva[ठक्]) comes after the words @deva[श्राणा] (rice gruel) and @deva[मांसौदन] (meat and rice) in the sense of 'one to whom that is rightfully given'.

The @deva[ट्] in @deva[टिठन्] causes the feminine to be formed by @deva[ङीप्] (@ref[4.1.15]).

Examples:
- @deva[श्राणा नियुक्तम् अस्मै दीयते] → @deva[श्राणिकः] 'one entitled to rice gruel', f. @deva[श्राणिकी]
- @deva[मांसौदनिकः] 'one entitled to meat-rice', f. @deva[मांसौदनिकी]

The difference between @deva[ठक्] and @deva[टिठन्] is in accent. @deva[टिठन्] resembles @deva[ठञ्] in both accent (@ref[6.1.197]) and feminine (@ref[4.1.15]), but @deva[टिठन्] is used because it doesn't cause @deva[वृद्धि]—allowing @deva[ओदन] + @deva[टिठन्] = @deva[ओदनिकः] (not @deva[*औदनिकः]).
"""

standard = """
After @deva[श्राणा] and @deva[मांसौदन], @deva[टिठन्] (not @deva[ठक्]) applies in sense @deva[नियुक्तं दीयते].

@deva[टिठन्]: @deva[इ] is @deva[उच्चारणार्थ]; @deva[ट्] triggers @deva[ङीप्] (@ref[4.1.15]).

Examples: @deva[श्राणिकः] f. @deva[श्राणिकी], @deva[मांसौदनिकः] f. @deva[मांसौदनिकी].

@deva[ठक्] vs @deva[टिठन्]: @deva[ठक्] is @deva[अन्तोदात्त] (@ref[6.1.165]); @deva[टिठन्] is @deva[आद्युदात्त] (@ref[6.1.197]).

Why @deva[टिठन्] not @deva[ठञ्]? @deva[टिठन्] lacks @deva[वृद्धि]: @deva[ओदन] + @deva[टिठन्] = @deva[ओदनिकः]; @deva[ठञ्] would give @deva[*औदनिकः].
"""

advanced = """
@deva[श्राणा] and @deva[मांसौदन] take @deva[टिठन्] in sense @deva[नियुक्तं दीयते].

Examples: @deva[श्राणिकः] f. @deva[श्राणिकी], @deva[मांसौदनिकः] f. @deva[मांसौदनिकी].

@deva[टिठन्]: @deva[ट्] for @deva[ङीप्] (@ref[4.1.15]); @deva[इ] is @deva[उच्चारणार्थ]; no @deva[वृद्धि] (unlike @deva[ठञ्]).

@deva[ठक्]: @deva[अन्तोदात्त] (@ref[6.1.165]). @deva[टिठन्]: @deva[आद्युदात्त] (@ref[6.1.197]).

@deva[ठञ्] would also work for @deva[श्राणा]/[@deva[मांसौदन], but @deva[टिठन्] needed for @deva[ओदन] alone: @deva[ओदन] + @deva[टिठन्] = @deva[ओदनिकः] (not @deva[*औदनिकः] by @deva[ठञ्]).
"""

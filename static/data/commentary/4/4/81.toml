id = "4.4.81"
numericId = "44081"

[en]
simple = """
The affix @deva[ठक्] comes after the words @deva[हल] (plough) and @deva[सीर] (ploughshare) in the accusative case, in the sense of 'what bears that'.

Examples:
- @deva[हलं वहति] → @deva[हालिकः] 'a ploughman'
- @deva[सीरं वहति] → @deva[सैरिकः] 'a plough-ox'

@deva[ठक्] could apply by @ref[4.3.124], but the specific mention indicates @deva[तदन्तविधि] and no @deva[लुक्]-elision: @deva[द्वैहालिकः], @deva[त्रैसैरिकः].
"""

standard = """
After @deva[हल] and @deva[सीर] (in @deva[द्वितीया]), @deva[ठक्] applies in sense @deva[वहति].

Examples: @deva[हालिकः] 'ploughman', @deva[सैरिकः] 'plough-ox'.

@deva[ठक्] could come by @ref[4.3.124], but specification indicates @deva[तदन्तविधि] and no @deva[लुक्]: @deva[द्वैहालिकः], @deva[त्रैसैरिकः].
"""

advanced = """
@deva[हल] and @deva[सीर] (in @deva[द्वितीया]) take @deva[ठक्] in sense @deva[वहति].

Examples: @deva[हालिकः], @deva[सैरिकः].

@deva[ठक्] available by @ref[4.3.124]; specification for @deva[तदन्तविधि] and no @deva[लुक्]: @deva[द्वैहालिकः], @deva[त्रैसैरिकः].
"""

id = "4.4.94"
numericId = "44094"

[en]
simple = """
Both affixes @deva[अण्] and @deva[यत्] come after the word @deva[उरस्] (chest/loins) in the instrumental case, in the sense of 'made/produced thereby'.

Examples:
- With @deva[अण्]: @deva[उरसा निर्मितः] → @deva[औरसः] 'one's own son' (not adopted—produced from one's own loins)
- With @deva[यत्]: @deva[उरस्यः]

The word @deva[संज्ञायाम्] from @ref[4.4.89] applies—these words specifically denote 'son', not just anything produced from the chest.
"""

standard = """
After @deva[उरस्] (in @deva[तृतीया]), @deva[अण्] and @deva[यत्] apply in sense @deva[निर्मितः].

Examples:
- @deva[अण्]: @deva[औरसः] 'own son' (not adopted)
- @deva[यत्]: @deva[उरस्यः]

@deva[संज्ञायाम्] (@ref[4.4.89]): specifically means 'son', not general 'loin-produced'.
"""

advanced = """
@deva[उरस्] (in @deva[तृतीया]) takes @deva[अण्] and @deva[यत्] in sense @deva[निर्मितः]. @deva[संज्ञायाम्].

Examples: @deva[औरसः] (@deva[अण्]), @deva[उरस्यः] (@deva[यत्])—both mean 'own son'.
"""

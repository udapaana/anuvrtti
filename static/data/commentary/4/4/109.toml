id = "4.4.109"
numericId = "44109"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[सोदर] (same womb) in the locative case, in the sense of 'one who sleeps there'.

By @ref[6.3.88], @deva[समान] is optionally changed to @deva[स] before @deva[उदर] when @deva[यत्] follows.

Example: @deva[समानोदरे शयितः] → @deva[सोदर्यः] 'uterine brother'

Here the @deva[उदात्त] falls on @deva[य], not on @deva[ओ] as in the previous @[sūtra].
"""

standard = """
After @deva[सोदर] (in @deva[सप्तमी]), @deva[यत्] applies in sense @deva[शयितः].

@ref[6.3.88]: @deva[समान] optionally → @deva[स] before @deva[उदर] when @deva[यत्] follows.

Example: @deva[सोदर्यः] 'uterine brother' (@deva[य]-@deva[उदात्त], not @deva[ओ]-@deva[उदात्त] as in @ref[4.4.108]).
"""

advanced = """
@deva[सोदर] (in @deva[सप्तमी]) takes @deva[यत्] in sense @deva[शयितः].

@ref[6.3.88]: @deva[समान] → @deva[स] optionally.

Example: @deva[सोदर्यः] (@deva[यकारोदात्त]).
"""

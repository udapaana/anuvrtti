id = "4.4.123"
numericId = "44123"

[en]
simple = """
In the Vedas, the affix @deva[यत्] (instead of @deva[अण्]) comes after the word @deva[असुर] (demon) in the genitive case, in the sense of 'belonging to'.

Example: @deva[असुर्यम्] 'belonging to the Asuras' as in:
- @deva[असुर्यं वा एतत् पात्रं यच्चक्रधृतं कुलालकृतम्] 'This vessel made on a wheel by a potter belongs to the Asuras' (@deva[मैत्रायणी संहिता] I.8.3)
- @deva[असुर्यं देवेभिर्धायि विश्वम्]
"""

standard = """
In @deva[छन्दस्], after @deva[असुर] (in @deva[षष्ठी]), @deva[यत्] (not @deva[अण्]) applies in sense 'property/belonging'.

Example: @deva[असुर्यम्] 'belonging to Asuras' (@deva[मैत्रायणी संहिता] I.8.3: @deva[असुर्यं वा एतत् पात्रं यच्चक्रधृतं कुलालकृतम्]).
"""

advanced = """
@deva[असुर] (in @deva[षष्ठी]) takes @deva[यत्] (not @deva[अण्]) in @deva[छन्दस्], sense 'property'.

Example: @deva[असुर्यम्] (@deva[मैत्रायणी संहिता] I.8.3).
"""

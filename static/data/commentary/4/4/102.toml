id = "4.4.102"
numericId = "44102"

[en]
simple = """
The affix @deva[ठक्] comes after the words in the @deva[कथादि] list in the sense of 'excellent in that'.

Example: @deva[कथायां साधुः] 'excellent in stories' → @deva[काथिकः] 'a storyteller' (@deva[कथा] + @deva[ठक्] → @deva[कथ्] + @deva[ठक्] by @ref[6.4.148] → @deva[काथ्] + @deva[इक्] by @ref[7.2.116])

Also @deva[वैकथिकः], etc.

The @deva[कथादि] list includes: @deva[कथा], @deva[विकथा], @deva[विश्वकथा], @deva[संकथा], @deva[वितण्डा], @deva[कुष्ठविद्], @deva[जनवाद], @deva[जनेवाद], @deva[जानोवाद], @deva[वृत्ति], @deva[संग्रह], @deva[गुण], @deva[गण], @deva[आयुर्वेद].
"""

standard = """
After @deva[कथादि], @deva[ठक्] applies in sense @deva[साधुः].

Example: @deva[कथायां साधुः] → @deva[काथिकः] (@deva[कथा] + @deva[ठक्] → @deva[कथ्] by @ref[6.4.148] → @deva[काथ्] + @deva[इक्] by @ref[7.2.116]) 'storyteller'.

@deva[कथादि] @[gaṇa] (14): @deva[कथा], @deva[विकथा], @deva[विश्वकथा], @deva[संकथा], @deva[वितण्डा], @deva[कुष्ठविद्], @deva[जनवाद], @deva[जनेवाद], @deva[जानोवाद], @deva[वृत्ति], @deva[संग्रह] (@deva[सद्ग्रह]), @deva[गुण], @deva[गण], @deva[आयुर्वेद].
"""

advanced = """
@deva[कथादि] takes @deva[ठक्] in sense @deva[साधुः].

Derivation: @deva[कथा] + @deva[ठक्] → @deva[कथ्] (@ref[6.4.148]) + @deva[ठक्] → @deva[काथिकः] (@ref[7.2.116]).

@deva[कथादि] @[gaṇa] (14): @deva[कथा], @deva[विकथा], @deva[विश्वकथा], @deva[संकथा], @deva[वितण्डा], @deva[कुष्ठविद्], @deva[जनवाद], @deva[जनेवाद], @deva[जानोवाद], @deva[वृत्ति], @deva[संग्रह], @deva[गुण], @deva[गण], @deva[आयुर्वेद].
"""

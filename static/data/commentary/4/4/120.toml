id = "4.4.120"
numericId = "44120"

[en]
simple = """
In the Vedas, the affix @deva[यत्] comes after the word @deva[दूत] (messenger) in the genitive case, in the sense of 'its share' or 'its duty'.

Example: @deva[दूत्यम्] 'the work/share of a messenger' as in @deva[यत् ते अग्ने दूत्यम्] 'what is your duty as messenger, O Agni'

Note on accent: By @ref[6.1.213], the accent should be @deva[दूत्यम्] (initial @deva[उदात्त]), but the accented Vedic text reads @deva[दूत्यम्] (final @deva[उदात्त]).
"""

standard = """
In @deva[छन्दस्], after @deva[दूत] (in @deva[षष्ठी]), @deva[यत्] applies in sense @deva[भाग] (share) or @deva[कर्म] (duty).

Example: @deva[दूत्यम्] (@deva[यत् ते अग्ने दूत्यम्]).

Accent: @ref[6.1.213] predicts @deva[दूत्यम्] (initial @deva[उदात्त]); actual Vedic text has final @deva[उदात्त].
"""

advanced = """
@deva[दूत] (in @deva[षष्ठी]) takes @deva[यत्] in @deva[छन्दस्], sense @deva[भाग]/[@deva[कर्म].

Example: @deva[दूत्यम्].

Accent: @ref[6.1.213] → @deva[दूत्यम्] (@deva[आद्युदात्त]); actual @deva[पाठ] has @deva[अन्तोदात्त].
"""

id = "4.4.84"
numericId = "44084"

[en]
simple = """
The affix @deva[यत्] comes after the words @deva[धन] (wealth) and @deva[गण] (group) in the accusative case, in the sense of 'one who obtains that'.

Examples:
- @deva[धनं लब्धा] 'one who obtains wealth' → @deva[धन्यः] 'fortunate, wealthy'
- @deva[गणं लब्धा] → @deva[गण्यः] 'one who has obtained a group; distinguished'

@deva[लब्धृ] (from √@deva[लभ्] + @deva[तृन्]) takes accusative case.
"""

standard = """
After @deva[धन] and @deva[गण] (in @deva[द्वितीया]), @deva[यत्] applies in sense @deva[लब्धा] (obtainer).

Examples: @deva[धन्यः] 'fortunate', @deva[गण्यः] 'distinguished'.

@deva[लब्धृ] = √@deva[लभ्] + @deva[तृन्] (takes @deva[द्वितीया]).
"""

advanced = """
@deva[धन] and @deva[गण] (in @deva[द्वितीया]) take @deva[यत्] in sense @deva[लब्धा].

Examples: @deva[धन्यः], @deva[गण्यः].

@deva[लब्धृ] = √@deva[लभ्] + @deva[तृन्] (@deva[द्वितीयाकर्मक]).
"""

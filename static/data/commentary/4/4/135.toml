id = "4.4.135"
numericId = "44135"

[en]
simple = """
In the Vedas, the affix @deva[घ] comes after the word @deva[सहस्र] (thousand) in the instrumental case, in the sense of 'equal to that'.

Example: @deva[सहस्रेण संमितः] 'equal to a thousand' → @deva[सहस्रियः] 'like unto a thousand'

As in:
- @deva[सहस्रियासो अपां नोर्मयः] 'the waves of water are thousand-like'
- @deva[अयम् अग्निः सहस्रियः] 'this fire is like a thousand'

The word @deva[संमित] means @deva[तुल्य] (equal). Some read @deva[समित] instead, with the same meaning.
"""

standard = """
In @deva[छन्दस्], after @deva[सहस्र] (in @deva[तृतीया]), @deva[घ] applies in sense @deva[संमितः] (equal to).

Example: @deva[सहस्रियः] 'equal to a thousand' (@deva[सहस्रियासो अपां नोर्मयः]; @deva[अयम् अग्निः सहस्रियः]).

@deva[संमित] = @deva[तुल्य]. Variant: @deva[समित].
"""

advanced = """
@deva[सहस्र] (in @deva[तृतीया]) takes @deva[घ] in @deva[छन्दस्], sense @deva[संमितः/तुल्यः].

Example: @deva[सहस्रियः].
"""

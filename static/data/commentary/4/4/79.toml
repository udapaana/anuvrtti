id = "4.4.79"
numericId = "44079"

[en]
simple = """
The affix @deva[ख] optionally comes after the word @deva[एकधुरा] (single yoke) in the accusative case, in the sense of 'what bears that'. The affix can also be elided (@deva[लुक्]).

Examples:
- With @deva[ख]: @deva[एकधुरां वहति] → @deva[एकधुरीणः] 'one who bears a single yoke'
- With @deva[लुक्]: @deva[एकधुरः] (affix elided)

The compound @deva[एकधुर] (@deva[एकां धुरं वहति]) takes @deva[समासान्त] @deva[अ], then optionally @deva[ख].
"""

standard = """
After @deva[एकधुरा] (in @deva[द्वितीया]), @deva[ख] optionally applies in sense @deva[वहति]. Alternatively, @deva[लुक्]-elision.

Examples: @deva[एकधुरीणः] (with @deva[ख]) or @deva[एकधुरः] (with @deva[लुक्]).

Compounding: @deva[तद्धितार्थ] (@deva[एकां धुरं वहति]) + @deva[समासान्त] @deva[अ], then @deva[ख] (optionally elided).
"""

advanced = """
@deva[एकधुरा] (in @deva[द्वितीया]) takes @deva[ख] optionally; alternatively @deva[लुक्].

Examples: @deva[एकधुरीणः], @deva[एकधुरः].

Compounding: @deva[तद्धितार्थसमास] (@deva[एकां धुरं वहति]) + @deva[समासान्त] @deva[अ] + @deva[ख] (optional @deva[लुक्]).
"""

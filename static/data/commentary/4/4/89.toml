id = "4.4.89"
numericId = "44089"

[en]
simple = """
The word @deva[धेनुष्या] is an irregular formation used as a name.

It is formed by adding @deva[षुक्] and @deva[य] to @deva[धेनु] (milk-cow). The word has @deva[उदात्त] on the final syllable.

@deva[धेनुष्या] means a cow given to a creditor in discharge of a debt, or as a pledge—the creditor being satisfied from her milk. It is also called @deva[पीतदुग्धा] (one whose milk has been drunk).

Usage: @deva[धेनुष्यां भवते ददामि] 'I give you a @deva[धेनुष्या]'.
"""

standard = """
@deva[धेनुष्या] is a @deva[निपातन] (irregular formation), used as @deva[संज्ञा].

Formation: @deva[धेनु] + @deva[षुक्] + @deva[य]. Final @deva[उदात्त].

Meaning: Cow given to creditor as debt-pledge, creditor taking her milk as payment. = @deva[पीतदुग्धा].

Usage: @deva[धेनुष्यां भवते ददामि].
"""

advanced = """
@deva[धेनुष्या]: @deva[निपातन], @deva[संज्ञायाम्].

Formation: @deva[धेनु] + @deva[षुक्] + @deva[य]. @deva[अन्तोदात्त].

Meaning: @deva[पीतदुग्धा]—cow pledged to creditor for milk.

Usage: @deva[धेनुष्यां भवते ददामि].
"""

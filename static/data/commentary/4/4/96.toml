id = "4.4.96"
numericId = "44096"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[हृदय] (heart) in the genitive case, in the sense of 'a hymn that binds the heart'.

Example: @deva[हृदयस्य बन्धनम् ऋषिः] 'a hymn that binds the heart' → @deva[हृद्यः] 'a mantra for bringing another's heart under control'

This refers to @deva[वशीकरणमन्त्र]—spells for enchantment.

The word @deva[ऋषि] here means 'Vedic hymn' or 'mantra'. @deva[बन्धन] = 'that by which something is bound'.
"""

standard = """
After @deva[हृदय] (in @deva[षष्ठी]), @deva[यत्] applies in sense @deva[बन्धनम् ऋषिः] (hymn that binds).

Example: @deva[हृदयस्य बन्धनम् ऋषिः] → @deva[हृद्यः] 'enchantment mantra' (@deva[वशीकरणमन्त्र]).

@deva[ऋषि] = Vedic hymn/mantra. @deva[बन्धन] = that which binds.
"""

advanced = """
@deva[हृदय] (in @deva[षष्ठी]) takes @deva[यत्] in sense @deva[बन्धनम् ऋषिः].

Example: @deva[हृद्यः] = @deva[वशीकरणमन्त्रः].

@deva[ऋषि] = @deva[वेदमन्त्र]. @deva[बन्धन] = @deva[येन बध्यते तत्].
"""

id = "4.4.137"
numericId = "44137"

[en]
simple = """
The affix @deva[य] is added to @deva[सोम] (in the accusative) in Vedic usage meaning 'who deserves that'. @deva[सोम] + @deva[य] → @deva[सौम्य] as in @deva[सौम्या ब्राह्मणाः] '@[brāhmaṇas] worthy of Soma'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[य] comes after the word @deva[सोम] when in accusative construction, expressing 'one who deserves that'. @deva[सोममर्हन्ति] = @deva[सौम्या ब्राह्मणाः] 'the @[brāhmaṇas] who deserve Soma', i.e., those honorable and learned ones worthy of performing sacrifices. The distinction between @deva[यत्] and @deva[घ] lies in accent.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[य] after @deva[सोम] in accusative (@deva[द्वितीया]) construction with the sense @deva[तदर्हति] 'deserving that'. The example @deva[सोममर्हन्ति] = @deva[सौम्या ब्राह्मणाः] denotes '@[brāhmaṇas] worthy of receiving Soma oblations'—qualifying them as learned and eligible to officiate in rituals. The difference between this @deva[य] and the @deva[घ] of the previous @[sūtra] is accentual (@deva[स्वर]).
"""

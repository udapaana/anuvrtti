id = "4.4.117"
numericId = "44117"

[en]
simple = """
In the Vedas, the affixes @deva[घच्] and @deva[छ] come after the word @deva[अग्र] in the sense of 'what stays there'.

Examples:
- With @deva[यत्]: @deva[अग्र्यम्]
- With @deva[छ]: @deva[अग्रीयम्]
- With @deva[घच्]: @deva[अग्रियम्]
- With @deva[घन्] (from @ref[4.4.115]): @deva[अग्रियम्]

See @deva[ऋग्वेद] I.13.10: @deva[इह त्वष्टारम् अग्रियम्]
"""

standard = """
In @deva[छन्दस्], after @deva[अग्र], @deva[घच्] and @deva[छ] apply in sense @deva[भवः].

Forms:
- @deva[यत्]: @deva[अग्र्यम्]
- @deva[छ]: @deva[अग्रीयम्]
- @deva[घच्]: @deva[अग्रियम्]
- @deva[घन्] (@ref[4.4.115]): @deva[अग्रियम्]

@deva[ऋग्वेद] I.13.10: @deva[इह त्वष्टारम् अग्रियम्].
"""

advanced = """
@deva[अग्र] takes @deva[घच्]/[@deva[छ] in @deva[छन्दस्], sense @deva[भवः].

Forms: @deva[अग्र्यम्] (@deva[यत्]), @deva[अग्रीयम्] (@deva[छ]), @deva[अग्रियम्] (@deva[घच्]/[@deva[घन्]).

@deva[ऋग्वेद] I.13.10 (@[sāyaṇa]): @deva[इह त्वष्टारम् अग्रियम्].
"""

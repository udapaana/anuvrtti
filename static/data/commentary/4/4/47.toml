id = "4.4.47"
numericId = "44047"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the genitive case (sixth case, @deva[षष्ठी]) in the sense of 'the customary practice/usage of that'.

The word @deva[धर्म्य] means 'customary, relating to established practice'.

Examples:
- @deva[शुल्कशालायाः धर्म्यम्] 'the usage of a custom-house' → @deva[शौल्कशालिकम्] 'custom-house regulations'
- @deva[आकरस्य धर्म्यम्] → @deva[आकरिकम्] 'mining regulations'
- @deva[आपणस्य धर्म्यम्] → @deva[आपणिकम्] 'marketplace practices'
- @deva[गुल्मस्य धर्म्यम्] → @deva[गौल्मिकम्] 'outpost regulations'
"""

standard = """
After a @deva[षष्ठ्यन्त] word, @deva[ठक्] applies in sense @deva[धर्म्यम्] (its customary practice).

@deva[धर्म्य] = customary, relating to established practice.

Examples: @deva[शौल्कशालिकम्] 'custom-house laws', @deva[आकरिकम्], @deva[आपणिकम्], @deva[गौल्मिकम्].
"""

advanced = """
After @deva[षष्ठ्यन्त], @deva[ठक्] in sense @deva[धर्म्यम्] (its usage/custom).

Examples: @deva[शौल्कशालिकम्], @deva[आकरिकम्], @deva[आपणिकम्], @deva[गौल्मिकम्].
"""

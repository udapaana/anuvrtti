id = "4.4.68"
numericId = "44068"

[en]
simple = """
The affix @deva[अण्] optionally comes after the word @deva[भक्त] (food, cooked rice) in the sense of 'one to whom that is rightfully given'. When @deva[अण्] is not used, the regular @deva[ठक्] applies.

Examples:
- With @deva[अण्]: @deva[भक्तम् अस्मै दीयते नियुक्तम्] → @deva[भाक्तः] 'a regularly fed retainer'
- With @deva[ठक्]: @deva[भाक्तिकः]
"""

standard = """
After @deva[भक्त], @deva[अण्] optionally applies in sense @deva[नियुक्तं दीयते]. Otherwise @deva[ठक्].

Examples: @deva[भाक्तः] (by @deva[अण्]), @deva[भाक्तिकः] (by @deva[ठक्]) 'a regularly fed person, retainer'.
"""

advanced = """
@deva[भक्त] optionally takes @deva[अण्] (otherwise @deva[ठक्]) in sense @deva[नियुक्तं दीयते].

Examples: @deva[भाक्तः], @deva[भाक्तिकः].
"""

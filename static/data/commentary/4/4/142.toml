id = "4.4.142"
numericId = "44142"

[en]
simple = """
The affix @deva[तातिल्] is added to @deva[सर्व] 'all' and @deva[देव] 'god' in Vedic usage without changing the meaning. @deva[सर्व] + @deva[तातिल्] → @deva[सर्वताति]; @deva[देव] + @deva[तातिल्] → @deva[देवताति].
"""

standard = """
In the @deva[छन्दस्], the affix @deva[तातिल्] comes after the words @deva[सर्व] and @deva[देव] without altering the meaning. The examples are: @deva[सर्वतातिः] and @deva[देवतातिः], as in the Vedic hymns @deva[सविता नः सुवतु सर्वतातिम्] 'may @[savitṛ] grant us all prosperity' and @deva[प्रदक्षिणिद्देवतातिर्मुराणः] 'the host of gods moving rightward'.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[तातिल्] after @deva[सर्व] and @deva[देव] in an @deva[अर्थाभाव] capacity—the affix adds no new meaning. The formations @deva[सर्वतातिः] and @deva[देवतातिः] are attested in Vedic: @deva[सविता नः सुवतु सर्वतातिम्] 'may @[savitṛ] bestow upon us all good things' and @deva[प्रदक्षिणिद्देवतातिर्मुराणः] 'the assembly of gods proceeding circumambulatorily'. The @deva[तातिल्] affix here functions merely as a Vedic variant form.
"""

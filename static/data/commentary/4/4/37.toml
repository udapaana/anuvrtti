id = "4.4.37"
numericId = "44037"

[en]
simple = """
The affix @deva[ठक्] comes after words having @deva[माथ] as their second member, and after @deva[पदवी] and @deva[अनुपद], in the sense of 'one who runs'.

The word @deva[माथ] means 'a way/road'.

Examples:
- @deva[दण्डमाथं धावति] 'runs on a highway' → @deva[दाण्डमाथिकः]
- @deva[शुल्कमाथं धावति] → @deva[शौल्कमाथिकः]
- @deva[पदवीं धावति] → @deva[पादविकः]
- @deva[अनुपदं धावति] → @deva[आनुपदिकः]
"""

standard = """
After @deva[माथान्त] (words ending in @deva[माथ]) and @deva[पदवी], @deva[अनुपद], @deva[ठक्] applies in sense @deva[धावति] (runs).

@deva[माथ] = way/road.

Examples:
- @deva[दाण्डमाथिकः] 'who runs on a highway'
- @deva[शौल्कमाथिकः]
- @deva[पादविकः], @deva[आनुपदिकः]
"""

advanced = """
After @deva[माथोत्तरपद] and @deva[पदवी], @deva[अनुपद], @deva[ठक्] in sense @deva[धावति].

@deva[माथ] = @deva[मार्ग].

Examples: @deva[दाण्डमाथिकः], @deva[शौल्कमाथिकः], @deva[पादविकः], @deva[आनुपदिकः].
"""

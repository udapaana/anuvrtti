id = "4.4.101"
numericId = "44101"

[en]
simple = """
The affix @deva[ण्य] (instead of @deva[यत्]) comes after the word @deva[परिषद्] (assembly/council) in the sense of 'excellent in that'.

Example: @deva[परिषदि साधुः] → @deva[पारिषद्यः] 'one versed in council affairs'

The affix @deva[ण] is also used: @deva[परिषदि साधुः] → @deva[पारिषदः] 'a minister, one skilled in assemblies'
"""

standard = """
After @deva[परिषद्], @deva[ण्य] (not @deva[यत्]) applies in sense @deva[साधुः]. Also @deva[ण].

Examples:
- @deva[ण्य]: @deva[पारिषद्यः]
- @deva[ण]: @deva[पारिषदः] 'minister'
"""

advanced = """
@deva[परिषद्] takes @deva[ण्य] (also @deva[ण]) in sense @deva[साधुः].

Examples: @deva[पारिषद्यः], @deva[पारिषदः].
"""

id = "4.4.12"
numericId = "44012"

[en]
simple = """
The affix @deva[ठक्] comes after the words in the @deva[वेतनादि] list when in the instrumental case, in the sense of 'one who lives thereby'.

Examples:
- @deva[वेतनेन जीवति] 'lives by wages' → @deva[वैतनिकः] 'a wage-earner, servant'
- @deva[धनुर्दण्डेन जीवति] → @deva[धानुर्दण्डिकः] 'one who lives by bow and staff'

For @deva[धनुर्दण्ड], the affix applies to both the compound and its parts separately: @deva[धानुर्दण्डिकः] (from compound), @deva[धानुष्कः] (from @deva[धनुस्]), @deva[दाण्डिकः] (from @deva[दण्ड]).

The @deva[वेतनादि] list includes: @deva[वेतन], @deva[वाहन], @deva[अर्धवाहन], @deva[धनुर्दण्ड], @deva[जाल], @deva[वेश], @deva[उपवेश], @deva[प्रेषण], @deva[उपवस्ति], @deva[सुख], @deva[शय्या], @deva[शक्ति], @deva[उपनिषद्], @deva[उपदेश], @deva[स्फिज्], @deva[पाद], @deva[उपस्थ], @deva[उपस्थान], @deva[उपहस्त], @deva[स्रज्].
"""

standard = """
After @deva[वेतनादि] (in @deva[तृतीया]), @deva[ठक्] applies in sense @deva[जीवति] (lives thereby).

Examples:
- @deva[वेतनेन जीवति] → @deva[वैतनिकः] 'a menial'
- @deva[धनुर्दण्डेन जीवति] → @deva[धानुर्दण्डिकः]

For @deva[धनुर्दण्ड], the affix applies to compound and members: @deva[धानुर्दण्डिकः], @deva[धानुष्कः], @deva[दाण्डिकः].

@deva[वेतनादि] @[gaṇa]: @deva[वेतन], @deva[वाहन], @deva[अर्धवाहन], @deva[धनुर्दण्ड], @deva[जाल], @deva[वेश], @deva[उपवेश], @deva[प्रेषण], @deva[उपवस्ति], @deva[सुख], @deva[शय्या], @deva[शक्ति], @deva[उपनिषद्], @deva[उपदेश], @deva[स्फिज्], @deva[पाद], @deva[उपस्थ], @deva[उपस्थान], @deva[उपहस्त], @deva[स्रज्].
"""

advanced = """
After @deva[वेतनादि] (in @deva[तृतीया]), @deva[ठक्] in sense @deva[जीवति].

Examples: @deva[वैतनिकः], @deva[धानुर्दण्डिकः].

For @deva[धनुर्दण्ड], affix applies @deva[समासे चाव्ययवयोः]—to compound and individual members: @deva[धानुर्दण्डिकः], @deva[धानुष्कः], @deva[दाण्डिकः].

@deva[वेतनादि] @[gaṇa] (20): @deva[वेतन], @deva[वाहन] (@deva[वाह]), @deva[अर्धवाहन] (@deva[अर्धवाह]), @deva[धनुर्दण्ड], @deva[जाल], @deva[वेश] (@deva[वेस]), @deva[उपवेश] (@deva[उपवेष]/etc.), @deva[प्रेषण], @deva[उपवस्ति] (@deva[उपस्ति]), @deva[सुख], @deva[शय्या], @deva[शक्ति], @deva[उपनिषद्], @deva[उपदेश], @deva[स्फिज्], @deva[पाद], @deva[उपस्थ], @deva[उपस्थान], @deva[उपहस्त], @deva[स्रज्].
"""

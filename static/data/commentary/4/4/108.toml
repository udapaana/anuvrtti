id = "4.4.108"
numericId = "44108"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[समानोदर] (same womb) in the locative case, in the sense of 'one who sleeps there'. The @deva[उदात्त] accent falls on the @deva[ओ].

The word @deva[शयित] is equivalent to @deva[स्थितः] (remained).

Example: @deva[समानोदरे शयितः] 'one who remained in the same womb' → @deva[समानोदर्यः] 'uterine brother' (see @ref[6.3.88])
"""

standard = """
After @deva[समानोदर] (in @deva[सप्तमी]), @deva[यत्] applies in sense @deva[शयितः] (slept/remained). @deva[उदात्त] on @deva[ओ].

@deva[शयित] = @deva[स्थितः].

Example: @deva[समानोदरे शयितः] → @deva[समानोदर्यः] 'uterine brother' (@ref[6.3.88]).
"""

advanced = """
@deva[समानोदर] (in @deva[सप्तमी]) takes @deva[यत्] in sense @deva[शयितः]. @deva[ओकारोदात्त].

Example: @deva[समानोदर्यः] (@ref[6.3.88]).
"""

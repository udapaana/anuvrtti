id = "4.4.114"
numericId = "44114"

[en]
simple = """
The affix @deva[यन्] comes after the words @deva[सगर्भ] (same womb), @deva[सयूथ] (same herd), and @deva[सनुत] (hidden) in the sense of 'what stays there'.

This supersedes @deva[यत्], with the difference being in accent (@ref[6.1.197]).

Examples:
- @deva[सगर्भ्यः] = @deva[अनुभ्राता] 'younger brother' (one from the same womb)
- @deva[सयूथ्यः] = @deva[अनुसखा] 'younger friend' (one from the same group)
- @deva[सनुत्यः] 'thief' (one who stays in a hidden place) as in @deva[ऋग्वेद] II.31.9: @deva[यो नः सनुत्यः उत वा जिघन्तु]

Note: In Vedas, @deva[समान] is always changed to @deva[स] (@ref[6.3.84]).
"""

standard = """
After @deva[सगर्भ], @deva[सयूथ], @deva[सनुत], @deva[यन्] applies in sense @deva[भवः]. Supersedes @deva[यत्] (accent difference by @ref[6.1.197]).

Examples:
- @deva[सगर्भ्यः] 'younger brother'
- @deva[सयूथ्यः] 'younger friend'
- @deva[सनुत्यः] 'thief' (@deva[ऋग्वेद] II.31.9: @deva[यो नः सनुत्यः उत वा जिघन्तु])

In @deva[छन्दस्], @deva[समान] → @deva[स] always (@ref[6.3.84]).
"""

advanced = """
@deva[सगर्भ], @deva[सयूथ], @deva[सनुत] take @deva[यन्] in sense @deva[भवः]. Accent differs from @deva[यत्] (@ref[6.1.197]).

Examples: @deva[सगर्भ्यः], @deva[सयूथ्यः], @deva[सनुत्यः] (@deva[ऋग्वेद] II.31.9).

@deva[समान] → @deva[स] in @deva[छन्दस्] (@ref[6.3.84]).
"""

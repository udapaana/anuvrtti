id = "4.4.126"
numericId = "44126"

[en]
simple = """
In the Vedas, the affix @deva[अण्] comes after the word @deva[अश्विमान्] (containing @deva[अश्विन्]) to denote bricks put up with mantras containing @deva[अश्विन्]. The @deva[मतुप्] is elided.

Example: @deva[आश्विनी] (f.) 'bricks put up with mantras containing @deva[अश्विन्]'

Derivation: @deva[अश्विमान्] + @deva[अण्] → @deva[अश्वि] + @deva[अण्] (@deva[मतुप्] elided by @ref[4.4.125]) → @deva[अश्विन्] + @deva[अण्] (by @ref[6.4.164]) → @deva[आश्विन]

As in @deva[यजुर्वेद तैत्तिरीय संहिता] 5.3.1.1: @deva[आश्विनीः उपदधाति] 'he lays @[āśvinī] bricks'
"""

standard = """
In @deva[छन्दस्], after @deva[अश्विमान्], @deva[अण्] applies for bricks laid with @deva[अश्विन्]-mantras. @deva[मतुप्]-@deva[लुक्].

Derivation: @deva[अश्विमान्] + @deva[अण्] → @deva[अश्वि] + @deva[अण्] (@ref[4.4.125]) → @deva[अश्विन्] + @deva[अण्] (@ref[6.4.164]) → @deva[आश्विन]

Example (@deva[तैत्तिरीय संहिता] 5.3.1.1): @deva[आश्विनीः उपदधाति].
"""

advanced = """
@deva[अश्विमान्] takes @deva[अण्] in @deva[छन्दस्] for brick-@deva[उपधान]. @deva[मतुप्]-@deva[लुक्].

Derivation: @deva[अश्विमान्] → @deva[अश्वि] (@ref[4.4.125]) → @deva[अश्विन्] (@ref[6.4.164]) + @deva[अण्] → @deva[आश्विनी].

@deva[तैत्तिरीय संहिता] 5.3.1.1: @deva[आश्विनीः उपदधाति].
"""

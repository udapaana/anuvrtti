id = "4.4.72"
numericId = "44072"

[en]
simple = """
The affix @deva[ठक्] comes after compounds ending in @deva[कठिन] (hard/rough terrain) and after @deva[प्रस्तार], in the locative case, in the sense of 'one who transacts business there'.

Examples:
- @deva[वंशकठिने व्यवहरति] 'transacts business in a bamboo thicket' → @deva[वांशकठिनिकः] 'one whose occupation is in bamboo groves'
- @deva[वार्ध्रकठिने व्यवहरति] → @deva[वार्ध्रकठिनिकः]
- @deva[प्रस्तारे व्यवहरति] → @deva[प्रास्तारिकः]
- @deva[संस्थाने व्यवहरति] → @deva[सांस्थानिकः]
"""

standard = """
After @deva[कठिनान्त] compounds and @deva[प्रस्तार] (in @deva[सप्तमी]), @deva[ठक्] applies in sense @deva[व्यवहरति] (transacts business).

Examples: @deva[वांशकठिनिकः] (works in bamboo thicket), @deva[वार्ध्रकठिनिकः], @deva[प्रास्तारिकः], @deva[सांस्थानिकः].

Meaning: @deva[तस्मिन् देशे या क्रिया यथानुष्ठेया तां तथैवानुतिष्ठति].
"""

advanced = """
After @deva[कठिनोत्तरपद] and @deva[प्रस्तार] (in @deva[सप्तमी]), @deva[ठक्] in sense @deva[व्यवहरति].

Examples: @deva[वांशकठिनिकः], @deva[वार्ध्रकठिनिकः], @deva[प्रास्तारिकः], @deva[सांस्थानिकः].

@deva[व्यवहरति] = @deva[तस्मिन् देशे या क्रिया यथानुष्ठेया तां तथैवानुतिष्ठति].
"""

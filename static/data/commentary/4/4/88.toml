id = "4.4.88"
numericId = "44088"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[मूल] (root) in the nominative case, in the sense of 'that whose root is pulled up'.

The word @deva[आबर्हि] (from √@deva[बृह्] 'to uproot') means 'uprooting'.

Example: @deva[मूलम् एषाम् आबर्हि] 'their root is pulled up' → @deva[मूल्याः] 'a kind of pulse' (e.g., @deva[माषाः], @deva[मुद्गाः])

These are cereals that cannot be harvested without uprooting the whole plant.

Note: According to @deva[पदमञ्जरी], the word should be @deva[आवर्हि] (with @deva[व]), not @deva[आबर्हि] (with @deva[ब]).
"""

standard = """
After @deva[मूल] (in @deva[प्रथमा]), @deva[यत्] applies in sense @deva[आबर्हि] (uprooted).

@deva[आबर्हि] = @deva[उत्पाटनम्] (from √@deva[बृह्]).

Example: @deva[मूलम् एषाम् आबर्हि] → @deva[मूल्याः] 'pulse' (@deva[माषाः], @deva[मुद्गाः])—cereals requiring uprooting.

@deva[पदमञ्जरी]: @deva[आवर्हि] (with @deva[व]), not @deva[आबर्हि].
"""

advanced = """
@deva[मूल] (in @deva[प्रथमा]) takes @deva[यत्] in sense @deva[आबर्हि].

@deva[आबर्हि] = @deva[उत्पाटनम्] (√@deva[वृहू]).

Example: @deva[मूल्याः] (@deva[माषाः], @deva[मुद्गाः]).

@deva[पदमञ्जरी]: @deva[आवर्हि] preferred over @deva[आबर्हि].
"""

id = "4.4.122"
numericId = "44122"

[en]
simple = """
In the Vedas, the affix @deva[यत्] comes after the words @deva[रेवती] (star-name), @deva[जगती] (a Vedic metre), and @deva[हविष्य] (offerings) in the genitive case, in the sense of 'praising'.

The word @deva[प्रशस्य] means 'praising, extolling' (from √@deva[शंस्] + @deva[क्यप्] with @deva[भाव] sense).

Examples:
- @deva[रेवत्यम्] 'praising of @[revatī]'
- @deva[जगत्यम्] 'praising of @[jagatī]'
- @deva[हविष्यम्] 'praising of offerings'

Derivation of @deva[हविष्यम्]: @deva[हविषे हिता] = @deva[हविष्याः] 'things fit for offering' (butter, etc.) by @ref[5.1.4]. Then @deva[हविष्यानां प्रशंसनम्] = @deva[हविष्यम्] by @ref[4.4.122], with @deva[अ]-elision by @ref[6.4.148] and @deva[य]-elision by @ref[8.4.64].
"""

standard = """
In @deva[छन्दस्], after @deva[रेवती], @deva[जगती], @deva[हविष्य] (in @deva[षष्ठी]), @deva[यत्] applies in sense @deva[प्रशस्य] (praising).

@deva[प्रशस्य] = @deva[प्रशंसन] (√@deva[शंस्] + @deva[क्यप्], @deva[भाव]).

Examples: @deva[रेवत्यम्], @deva[जगत्यम्], @deva[हविष्यम्].

@deva[हविष्यम्] derivation: @deva[हविषे हिता] = @deva[हविष्याः] (@ref[5.1.4]); @deva[हविष्यानां प्रशंसनम्] = @deva[हविष्यम्] (this @[sūtra]) with @deva[अ]-@deva[लोप] (@ref[6.4.148]) and @deva[य]-@deva[लोप] (@ref[8.4.64]).
"""

advanced = """
@deva[रेवती], @deva[जगती], @deva[हविष्य] (in @deva[षष्ठी]) take @deva[यत्] in @deva[छन्दस्], sense @deva[प्रशस्य].

Examples: @deva[रेवत्यम्], @deva[जगत्यम्], @deva[हविष्यम्].

@deva[हविष्यम्]: @deva[हविष्य] (@ref[5.1.4]) + @deva[यत्] → @deva[हविष्य्] (@ref[6.4.148]) + @deva[यत्] → @deva[हविष्यम्] (@ref[8.4.64]).
"""

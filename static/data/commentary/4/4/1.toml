id = "4.4.1"
numericId = "44001"

[en]
simple = """
This is a governing rule: the affix @deva[ठक्] applies in the senses listed from here through @ref[4.4.76]. The affix @deva[ठक्] adds @deva[इक] to the base with @deva[वृद्धि] (vowel strengthening) of the first syllable.

Several @deva[वार्त्तिक]s extend this rule:
- After @deva[माशब्द] etc., @deva[ठक्] means 'one who says that': @deva[माशब्द] + @deva[ठक्] → @deva[माशब्दिकः] 'one who says "don't make noise"'
- After @deva[प्रभूत] etc., in the sense 'one who says': @deva[प्रभूतम् आह] → @deva[प्राभूतिकः]
- After @deva[सुस्नात] etc., in the sense 'one who asks': @deva[सुस्नातं पृच्छति] → @deva[सौस्नातिकः] 'one who asks "have you bathed well?"'
- After @deva[परदार] etc., in the sense 'one who goes to': @deva[परदारान् गच्छति] → @deva[पारदारिकः] 'an adulterer'
"""

standard = """
This @deva[अधिकारसूत्र] establishes @deva[ठक्] as the governing affix for @[sūtras] through @ref[4.4.76]. The affix adds @deva[इक] with @deva[वृद्धि] of the first vowel (@ref[7.2.117]).

@deva[वार्त्तिक]s extend @deva[ठक्] to additional senses:
- @deva[माशब्दादयः] in sense 'he said that': @deva[माशब्दिकः], @deva[कार्यशब्दिकः] (affix to a sentence)
- @deva[प्रभूतादयः] in sense 'he said': @deva[प्राभूतिकः], @deva[पार्याप्तिकः] (affix to an adverb)
- @deva[सुस्नातादयः] in sense 'he asks': @deva[सौस्नातिकः], @deva[सौखशायनिकः]
- @deva[परदारादयः] in sense 'he goes to': @deva[पारदारिकः], @deva[गौरुतल्पिकः] (@deva[तल्प] here = wife)
"""

advanced = """
This @deva[अधिकारसूत्र] governs @deva[ठक्] through @ref[4.4.76]. The affix @deva[ठक्] = @deva[इक] with @deva[वृद्धि] by @ref[7.2.117], @deva[ठ्] being @deva[इत्] by @ref[1.3.7].

@note[type=@[vārtika]]: @deva[माशब्दादिभ्य इत्याहार्थे] — After @deva[माशब्द] etc., @deva[ठक्] in sense 'he said that': @deva[माशब्दिकः] (affix to a @deva[वाक्य]).

@note[type=@[vārtika]]: @deva[प्रभूतादिभ्य इत्याहार्थे] — @deva[प्राभूतिकः] (affix to @deva[अव्यय]).

@note[type=@[vārtika]]: @deva[सुस्नातादिभ्यः पृच्छत्यर्थे] — @deva[सौस्नातिकः] 'one who asks "have you bathed well?"'

@note[type=@[vārtika]]: @deva[परदारादिभ्यो गच्छत्यर्थे] — @deva[पारदारिकः], @deva[गौरुतल्पिकः] (@deva[तल्प] = @deva[भार्या]).
"""

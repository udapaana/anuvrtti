id = "4.4.112"
numericId = "44112"

[en]
simple = """
In the Vedas, the affix @deva[अण्] comes after the words @deva[वेशन्त] and @deva[हिमवत्] in the sense of 'what stays there'.

This supersedes @deva[यत्].

Examples from Vedic mantras:
- @deva[वैशन्तीभ्यः स्वाहा] 'Oblation to those dwelling in @deva[वेशन्त]'
- @deva[हैमवतीभ्यः स्वाहा] 'Oblation to those dwelling in the Himalayas'
"""

standard = """
In @deva[छन्दस्], after @deva[वेशन्त] and @deva[हिमवत्], @deva[अण्] applies in sense @deva[भवः].

Examples: @deva[वैशन्तीभ्यः स्वाहा], @deva[हैमवतीभ्यः स्वाहा].
"""

advanced = """
@deva[वेशन्त] and @deva[हिमवत्] take @deva[अण्] in @deva[छन्दस्], sense @deva[भवः].

Examples: @deva[वैशन्तीभ्यः स्वाहा], @deva[हैमवतीभ्यः स्वाहा].
"""

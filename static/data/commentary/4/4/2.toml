id = "4.4.2"
numericId = "44002"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the instrumental case (third case, @deva[तृतीया]) in the sense of 'one who plays, digs, conquers, or is conquered by means of that thing'.

Examples:
- @deva[अक्षैः दीव्यति] 'plays with dice' → @deva[आक्षिकः] 'a dicer'
- @deva[शलाकया दीव्यति] → @deva[शालाकिकः] 'one who plays with sticks'
- @deva[अभ्र्या खनति] 'digs with a hoe' → @deva[आभ्रिकः]
- @deva[कुद्दालेन खनति] → @deva[कौद्दालिकः] 'one who digs with a spade'
- @deva[अक्षैः जयति] 'conquers with dice' → @deva[आक्षिकः]
- @deva[अक्षैः जितम्] 'conquered by dice' → @deva[आक्षिकम्]

The rule applies only where usage supports it. Not every instrumental produces a derivative—@deva[देवदत्तेन जितम्] does not yield @deva[*दैवदत्तिकः].
"""

standard = """
After a @deva[तृतीया]-ending word, @deva[ठक्] applies in the senses @deva[दीव्यति] (plays), @deva[खनति] (digs), @deva[जयति] (conquers), or @deva[जितम्] (is conquered).

Examples:
- @deva[अक्षैः दीव्यति] → @deva[आक्षिकः] 'a dicer'
- @deva[अभ्र्या खनति] → @deva[आभ्रिकः], @deva[कौद्दालिकः]
- @deva[अक्षैः जयति] → @deva[आक्षिकः]; @deva[अक्षैः जितम्] → @deva[आक्षिकम्]

Though the verbs appear in 3rd person singular present, the derivative is not restricted—@deva[आक्षिकौ], @deva[आक्षिकाः], @deva[आक्षिकस्त्वम्], @deva[आक्षिकोऽहम्] are all valid.

The rule is limited by usage (@deva[लोकाश्रय]): @deva[देवदत्तेन जितम्] does not yield @deva[*दैवदत्तिकः], nor does @deva[अङ्गुल्या खनति] produce a derivative.
"""

advanced = """
After @deva[तृतीयान्त], @deva[ठक्] applies in senses @deva[दीव्यति], @deva[खनति], @deva[जयति], @deva[जितम्].

Examples: @deva[अक्षैः दीव्यति] → @deva[अक्ष] + @deva[ठक्] → @deva[आक्षिकः] by @ref[7.3.50]. Similarly @deva[शालाकिकः], @deva[आभ्रिकः], @deva[कौद्दालिकः].

The @deva[तिङन्त] forms (@deva[दीव्यति] etc.) indicate the sense, not grammatical restrictions—derivatives function across all @deva[पुरुष], @deva[वचन], and @deva[काल]: @deva[आक्षिकौ], @deva[आक्षिकाः], @deva[अक्षैरदीव्यत्] → @deva[आक्षिकः].

The rule is @deva[लोकाश्रय]—not every @deva[तृतीयान्त] yields a derivative. @deva[देवदत्तेन जितम्] gives no @deva[*दैवदत्तिकः]; @deva[अङ्गुल्या खनति] gives no derivative.

Though sentences are @deva[क्रियाप्रधान] (verb-principal), the @deva[तद्धित] makes the @deva[करण] principal.
"""

id = "4.4.143"
numericId = "44143"

[en]
simple = """
The affix @deva[तातिल्] is added to @deva[शिव] 'auspicious', @deva[शम्] 'happiness', and @deva[अरिष्ट] 'unharmed' in Vedic usage when the base is in the @deva[षष्ठी] (genitive) case and the meaning is 'one who does/makes'. @deva[शिव] + @deva[तातिल्] → @deva[शिवताति] 'one who creates auspiciousness'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[तातिल्] comes after @deva[शिव], @deva[शम्], and @deva[अरिष्ट] when these words are in the genitive case in construction, with the sense 'one who does that' (@deva[करः] = @deva[करोति]). The word @deva[करः] is equivalent to @deva[करोति], formed by @deva[अच्] per @ref[3.1.134]. The genitive construction has accusative force with @deva[कृत्]-formed words: @deva[शिवस्य करः] = @deva[शिवं करोति]. Thus @deva[शिवताति], @deva[शन्ताति], and @deva[अरिष्टताति]. As in the @[ṛgveda]: @deva[याभिः शन्तातीभवथो ददाशुषे] (@ref[Ṛg] I.112.20), where @deva[शंताती] is the dual of @deva[शन्तातिः] meaning @deva[सुखस्य कर्तारौ] 'the two makers of happiness'.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[तातिल्] after @deva[शिव], @deva[शम्], and @deva[अरिष्ट] in genitive (@deva[षष्ठी]) construction with the agentive sense @deva[करः] 'doer'. The technical note explains that @deva[करः] = @deva[करोति] via the @deva[अच्] affix of @ref[3.1.134]. With @deva[कृत्]-derived words, the genitive base has accusative semantic force: @deva[शिवस्य करः] = @deva[शिवं करोति] 'does/creates auspiciousness'. The formations are @deva[शिवतातिः], @deva[शन्तातिः], and @deva[अरिष्टतातिः]. The @[ṛgvedic] citation @deva[याभिः शन्तातीभवथो ददाशुषे] (I.112.20) contains the dual @deva[शंताती] meaning @deva[सुखस्य कर्तारौ] 'the two who create happiness'. Similarly @deva[अथो अरिष्टतातये] is attested.
"""

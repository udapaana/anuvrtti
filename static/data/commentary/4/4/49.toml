id = "4.4.49"
numericId = "44049"

[en]
simple = """
The affix @deva[अञ्] (instead of @deva[ठक्]) comes after @deva[प्रातिपदिक]s (nominal stems) ending in @deva[ऋ], in the sense of 'its customary practice or office'.

Examples:
- @deva[पोतुः धर्म्यम्] 'the office of a @deva[पोतृ]' → @deva[पौत्रम्]
- @deva[उद्गातुः धर्म्यम्] 'the office of an @deva[उद्गातृ]' → @deva[औद्गात्रम्]
- @deva[होतुः धर्म्यम्] 'the office of a @deva[होतृ]' → @deva[हौत्रम्]

@[vārttikas]:
- After @deva[नर], @deva[अञ्] applies: @deva[नरस्य धर्म्या] → @deva[नारी] 'woman'
- After @deva[विशसितृ], with @deva[इट्]-elision: @deva[वैशस्त्रम्]
- After @deva[विभाजयितृ], with @deva[णि]-elision: @deva[वैभाजित्रम्]
"""

standard = """
After @deva[ऋकारान्त प्रातिपदिक]s, @deva[अञ्] (not @deva[ठक्]) applies in sense @deva[धर्म्यम्].

Examples: @deva[पौत्रम्] (@deva[पोतृ]-office), @deva[औद्गात्रम्], @deva[हौत्रम्].

Note: @deva[होतृ] in @ref[4.4.48] means @deva[ऋत्विज्]; here it means @deva[आह्वातृ] (invoker).

@note[type=@[vārtika]]: @deva[नरादपि] — @deva[नारी] 'woman'.
@note[type=@[vārtika]]: @deva[विशसितुरिटो लोपश्च] — @deva[वैशस्त्रम्].
@note[type=@[vārtika]]: @deva[विभाजयितुर्ण्यलोपश्च] — @deva[वैभाजित्रम्].
"""

advanced = """
@deva[ऋकारान्त प्रातिपदिक] takes @deva[अञ्] in sense @deva[धर्म्यम्].

Examples: @deva[पौत्रम्], @deva[औद्गात्रम्], @deva[हौत्रम्].

@deva[पद्मञ्जरी] places @deva[हौत्रम्] here (@deva[होतृ] = @deva[आह्वातृ]), distinct from @ref[4.4.48] (@deva[होतृ] = @deva[ऋत्विज्]).

@note[type=@[vārtika]]: @deva[नरादपि] — @deva[नारी].
@note[type=@[vārtika]]: @deva[विशसितुरिटो लोपश्च] — @deva[वैशस्त्रम्] (@deva[इट्]-elision).
@note[type=@[vārtika]]: @deva[विभाजयितुर्ण्यलोपश्च] — @deva[वैभाजित्रम्] (@deva[णि]-elision).
"""

id = "4.4.46"
numericId = "44046"

[en]
simple = """
The affix @deva[ठक्] comes after the words @deva[ललाट] (forehead) and @deva[कुक्कुटी] (hen) in the accusative case, in the sense of 'one who sees that'. The resulting word is used as a name.

Examples:
- @deva[ललाटं पश्यति] 'looks at foreheads' → @deva[लालाटिकः] 'a non-attentive servant' (one who always looks at the master's forehead from a distance, keeping aloof rather than approaching to work)
- @deva[कुक्कुटीं पश्यति] → @deva[कौक्कुटिकः] 'a religious mendicant, a @deva[भिक्षु]'

@deva[कुक्कुटी] here refers to the short distance a hen can fly. The mendicant walks looking down at this small space of ground, hence the name. It also means 'a hypocrite with downcast eyes'.
"""

standard = """
After @deva[ललाट] and @deva[कुक्कुटी] (in @deva[द्वितीया]), @deva[ठक्] applies in sense @deva[पश्यति] (sees). The result is a @deva[संज्ञा] (name).

Examples:
- @deva[ललाटं पश्यति] → @deva[लालाटिकः] 'inattentive servant' (watches master's forehead from afar, avoids approaching)
- @deva[कौक्कुटिकः] 'mendicant' (@deva[कुक्कुटी] = the short flying distance of a hen; hence one who walks looking at small ground space)

@deva[कौक्कुटिकः] also means 'hypocrite with downcast eyes'.
"""

advanced = """
@deva[ललाट] and @deva[कुक्कुटी] (in @deva[द्वितीया]) take @deva[ठक्] in sense @deva[पश्यति]. Result is @deva[संज्ञा].

Examples: @deva[लालाटिकः] (inattentive servant), @deva[कौक्कुटिकः] (@deva[भिक्षु] who walks looking at @deva[कुक्कुटीगति]-distance ground; also, hypocrite).
"""

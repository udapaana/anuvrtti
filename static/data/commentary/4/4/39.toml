id = "4.4.39"
numericId = "44039"

[en]
simple = """
The affix @deva[ठक्] comes after words having @deva[पद] (word/foot) as their second member, in the accusative case, in the sense of 'one who takes/grasps that'.

Examples:
- @deva[पूर्वपदं गृह्णाति] 'takes the first word' → @deva[पौर्वपदिकः]
- @deva[उत्तरपदं गृह्णाति] 'takes the second word' → @deva[औत्तरपदिकः]

The word @deva[उत्तरपद] is mentioned to prevent the rule from applying when @deva[पद] follows @deva[बहु] (as in @deva[बहुपद]).
"""

standard = """
After @deva[पदोत्तरपद] (compounds with @deva[पद] as second member) in @deva[द्वितीया], @deva[ठक्] applies in sense @deva[गृह्णाति] (takes).

Examples: @deva[पौर्वपदिकः], @deva[औत्तरपदिकः].

@deva[उत्तरपद] is mentioned to exclude @deva[बहुपद] from this rule.
"""

advanced = """
After @deva[पदोत्तरपद] (in @deva[द्वितीया]), @deva[ठक्] in sense @deva[गृह्णाति].

Examples: @deva[पौर्वपदिकः], @deva[औत्तरपदिकः].

@deva[उत्तरपदग्रहण] is @deva[बहुपदनिवृत्त्यर्थ]—excludes @deva[बहुपद] from the rule.
"""

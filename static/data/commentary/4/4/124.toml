id = "4.4.124"
numericId = "44124"

[en]
simple = """
In the Vedas, the affix @deva[अण्] (instead of @deva[यत्]) comes after the word @deva[असुर] in the genitive case, in the sense of 'glamour/magic'.

Example: @deva[असुरस्य माया] 'the magic of Asuras' → @deva[आसुरी] (feminine) as in:
@deva[आसुरी माया स्वधया कृतासि] 'You are made by @[āsurī] (demonic) magic with self-power'
"""

standard = """
In @deva[छन्दस्], after @deva[असुर] (in @deva[षष्ठी]), @deva[अण्] (not @deva[यत्]) applies in sense @deva[माया] (glamour).

Example: @deva[असुरस्य माया] → @deva[आसुरी] (f.) (@deva[आसुरी माया स्वधया कृतासि]).
"""

advanced = """
@deva[असुर] (in @deva[षष्ठी]) takes @deva[अण्] in @deva[छन्दस्], sense @deva[माया].

Example: @deva[आसुरी माया].
"""

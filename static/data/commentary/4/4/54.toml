id = "4.4.54"
numericId = "44054"

[en]
simple = """
The affix @deva[ष्ठन्] optionally comes after the word @deva[शलालु] (a type of perfume) in the sense of 'one whose saleable commodity is that'. When @deva[ष्ठन्] is not used, the regular @deva[ठक्] applies.

Examples:
- With @deva[ष्ठन्]: @deva[शलालु पण्यम् अस्य] → @deva[शलालुकः], f. @deva[शलालुकी]
- With @deva[ठक्]: @deva[शालालुकः], f. @deva[शालालुकी]
"""

standard = """
After @deva[शलालु], @deva[ष्ठन्] optionally applies in sense @deva[पण्यम् अस्य]. Otherwise @deva[ठक्].

@deva[शलालु] = a type of perfume.

With @deva[ष्ठन्]: @deva[शलालुकः] f. @deva[शलालुकी]
With @deva[ठक्]: @deva[शालालुकः] f. @deva[शालालुकी]
"""

advanced = """
@deva[शलालु] optionally takes @deva[ष्ठन्] (otherwise @deva[ठक्]) in sense @deva[पण्यम् अस्य].

@deva[ष्ठन्]: @deva[शलालुकः] f. @deva[शलालुकी]
@deva[ठक्]: @deva[शालालुकः] f. @deva[शालालुकी]
"""

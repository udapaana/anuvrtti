id = "4.4.103"
numericId = "44103"

[en]
simple = """
The affix @deva[ठञ्] (instead of @deva[यत्]) comes after the words in the @deva[गुडादि] list in the sense of 'excellent in that'.

Examples:
- @deva[गुडे साधुः] 'excellent for sugar' → @deva[गौडिकः] 'sugarcane' (excellent for making sugar)
- @deva[कुल्माषे साधुः] → @deva[कौलमाषिकः] 'a kind of pulse' (excellent for making gruel)
- @deva[सक्तुषु साधुः] → @deva[साक्तुकः] 'barley' (suitable for making @deva[सक्तु])

The @deva[गुडादि] list includes: @deva[गुड], @deva[कुल्माष], @deva[सक्तु], @deva[अपूप], @deva[मांसौदन], @deva[इक्षु], @deva[वेणु], @deva[संग्राम], @deva[संघात], @deva[संक्राम], @deva[संवाह], @deva[प्रवास], @deva[निवास], @deva[उपवास].
"""

standard = """
After @deva[गुडादि], @deva[ठञ्] (not @deva[यत्]) applies in sense @deva[साधुः].

Examples: @deva[गौडिकः] 'sugarcane', @deva[कौलमाषिकः] 'pulse for gruel', @deva[साक्तुकः] 'barley for @deva[सक्तु]'.

@deva[गुडादि] @[gaṇa] (14): @deva[गुड], @deva[कुल्माष], @deva[सक्तु], @deva[अपूप], @deva[मांसौदन], @deva[इक्षु], @deva[वेणु], @deva[संग्राम], @deva[संघात], @deva[संक्राम], @deva[संवाह], @deva[प्रवास], @deva[निवास], @deva[उपवास].
"""

advanced = """
@deva[गुडादि] takes @deva[ठञ्] in sense @deva[साधुः].

Examples: @deva[गौडिकः], @deva[कौलमाषिकः], @deva[साक्तुकः].

@deva[गुडादि] @[gaṇa] (14): @deva[गुड], @deva[कुल्माष], @deva[सक्तु], @deva[अपूप], @deva[मांसौदन], @deva[इक्षु], @deva[वेणु], @deva[संग्राम], @deva[संघात], @deva[संक्राम], @deva[संवाह], @deva[प्रवास], @deva[निवास], @deva[उपवास].
"""

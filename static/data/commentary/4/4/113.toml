id = "4.4.113"
numericId = "44113"

[en]
simple = """
In the Vedas, the affixes @deva[ड्यत्] and @deva[ड्य] come after the word @deva[स्रोतस्] (stream) in the sense of 'what stays there'. Before these affixes, the final @deva[अस्] of @deva[स्रोतस्] is elided.

This supersedes @deva[यत्], which may also be used optionally.

Examples:
- With @deva[ड्यत्]: @deva[स्रोतसि भवः] → @deva[स्रोत्यः]
- With @deva[ड्य]: @deva[स्रोत्यः] (different accent by @ref[3.1.3], @ref[6.1.185])
- With @deva[यत्]: @deva[स्रोतस्यः]
"""

standard = """
In @deva[छन्दस्], after @deva[स्रोतस्], @deva[ड्यत्] and @deva[ड्य] apply in sense @deva[भवः]. @deva[ड्] causes @deva[अस्]-elision. @deva[यत्] optional.

Examples:
- @deva[ड्यत्]: @deva[स्रोत्यः]
- @deva[ड्य]: @deva[स्रोत्यः] (different accent: @ref[3.1.3], @ref[6.1.185])
- @deva[यत्]: @deva[स्रोतस्यः]
"""

advanced = """
@deva[स्रोतस्] takes @deva[ड्यत्]/[@deva[ड्य] in @deva[छन्दस्], sense @deva[भवः]. @deva[ड्] → @deva[अस्]-@deva[लोप]. @deva[यत्] optional.

Examples: @deva[स्रोत्यः] (@deva[ड्यत्]/[@deva[ड्य]), @deva[स्रोतस्यः] (@deva[यत्]). Accent differs by @ref[3.1.3], @ref[6.1.185].
"""

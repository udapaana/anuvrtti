id = "4.4.127"
numericId = "44127"

[en]
simple = """
In the Vedas, the affix @deva[मतुप्] is added to the word @deva[मूर्धन्वत्] when expressing bricks collected with mantras containing the word @deva[वयस्].

The @deva[मतुप्] supersedes @deva[यत्].

A mantra containing both @deva[वयस्] and @deva[मूर्धन्] is both @deva[वयस्वान्] and @deva[मूर्धन्वान्]. For bricks with such mantras, @deva[यत्] applies to @deva[वयस्वान्] (→ @deva[वयस्या]) but @deva[मतुप्] applies to @deva[मूर्धन्वान्] (→ @deva[मूर्धन्वती]).

Example: @deva[मूर्धन्वतीः उपदधाति] 'he lays @[mūrdhanvatī] bricks'

If the mantra contains only @deva[मूर्धन्] (not @deva[वयस्]), then @deva[यत्] applies: @deva[मूर्धन्याः].

See @ref[6.1.176].
"""

standard = """
In @deva[छन्दस्], @deva[मूर्धन्वत्] takes @deva[मतुप्] (not @deva[यत्]) when denoting bricks laid with mantras containing @deva[वयस्].

Mantras with both @deva[वयस्] and @deva[मूर्धन्]: @deva[वयस्वान्] → @deva[वयस्या] (@deva[यत्]); @deva[मूर्धन्वान्] → @deva[मूर्धन्वती] (@deva[मतुप्]).

Example: @deva[मूर्धन्वतीः उपदधाति].

Without @deva[वयस्], only @deva[मूर्धन्]: @deva[मूर्धन्याः] (@deva[यत्]).

See @ref[6.1.176].
"""

advanced = """
@deva[मूर्धन्वत्] takes @deva[मतुप्] in @deva[छन्दस्] for @deva[वयस्या] bricks.

@deva[वयस्या] and @deva[मूर्धन्वत्या] denote same object. @deva[मूर्धन्] alone → @deva[मूर्धन्याः].

@ref[6.1.176].
"""

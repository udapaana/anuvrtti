id = "4.4.105"
numericId = "44105"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[सभा] (assembly/society) in the sense of 'excellent in that'. The difference from the general @deva[यत्] is in accent (see @ref[3.1.3] and @ref[6.1.185]).

Example: @deva[सभायां साधुः] 'excellent in society' → @deva[सभ्यः] 'refined, civilized' (fit for society)
"""

standard = """
After @deva[सभा], @deva[यत्] applies in sense @deva[साधुः]. The specification is for accent (@ref[3.1.3], @ref[6.1.185]).

Example: @deva[सभायां साधुः] → @deva[सभ्यः] 'refined' (fit for society).
"""

advanced = """
@deva[सभा] takes @deva[यत्] in sense @deva[साधुः]. Specification for accent: @ref[3.1.3], @ref[6.1.185].

Example: @deva[सभ्यः].
"""

id = "4.4.118"
numericId = "44118"

[en]
simple = """
In the Vedas, the affix @deva[घ] comes after the words @deva[समुद्र] (ocean) and @deva[अभ्र] (cloud) in the sense of 'what stays there'.

This supersedes @deva[यत्].

Examples:
- @deva[समुद्रियः] as in @deva[समुद्रिया अप्सरसो मनीषिणम्]
- @deva[अभ्रियः] as in @deva[नानदतो अभ्रियस्येव घोषाः] 'like the thundering of one dwelling in clouds'

Note: @deva[अभ्र], being shorter than @deva[समुद्र], should come first—its placement second is irregular.
"""

standard = """
In @deva[छन्दस्], after @deva[समुद्र] and @deva[अभ्र], @deva[घ] applies in sense @deva[भवः].

Examples:
- @deva[समुद्रियः] (@deva[समुद्रिया अप्सरसो मनीषिणम्])
- @deva[अभ्रियः] (@deva[नानदतो अभ्रियस्येव घोषाः])

Note: @deva[अभ्र] (shorter) should precede @deva[समुद्र]; order is irregular.
"""

advanced = """
@deva[समुद्र] and @deva[अभ्र] take @deva[घ] in @deva[छन्दस्], sense @deva[भवः].

Examples: @deva[समुद्रियः], @deva[अभ्रियः].

@deva[अभ्र] (@deva[अल्पाच्तर]) listed second is @deva[अनित्यक्रम].
"""

id = "4.4.33"
numericId = "44033"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the accusative case in the sense of 'one who aids or protects that'.

Examples:
- @deva[समाजं रक्षति] 'protects/supports an assembly' → @deva[सामाजिकः] 'a spectator' (one who aids an assembly by presence)
- @deva[सन्निवेशं रक्षति] → @deva[सान्निवेशिकः] 'one who protects a settlement'
"""

standard = """
After a @deva[द्वितीया]-ending word, @deva[ठक्] applies in sense @deva[रक्षति] (aids/protects).

Examples:
- @deva[समाजं रक्षति] → @deva[सामाजिकः] 'spectator' (aids assembly by presence)
- @deva[सान्निवेशिकः]
"""

advanced = """
After @deva[द्वितीयान्त], @deva[ठक्] in sense @deva[रक्षति] (protects).

Examples: @deva[सामाजिकः], @deva[सान्निवेशिकः].
"""

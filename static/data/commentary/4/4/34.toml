id = "4.4.34"
numericId = "44034"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the accusative case in the sense of 'one who makes that sound'.

Examples:
- @deva[शब्दं करोति] 'makes sound' → @deva[शाब्दिकः] 'one who deals with sounds'—i.e., a grammarian
- @deva[दर्दुरवत् शब्दं करोति] → @deva[दार्दुरिकः] 'one who makes frog-like croaking'—i.e., a potter (whose wheel makes such sounds)
"""

standard = """
After a @deva[द्वितीया]-ending word, @deva[ठक्] applies in sense @deva[शब्दं करोति] (makes sound).

Examples:
- @deva[शब्दं करोति] → @deva[शाब्दिकः] 'grammarian' (one who works with @deva[शब्द])
- @deva[दार्दुरिकः] 'potter' (makes frog-like croaking—@deva[दर्दुर] = frog)
"""

advanced = """
After @deva[द्वितीयान्त], @deva[ठक्] in sense @deva[शब्दं करोति].

Examples: @deva[शाब्दिकः] 'grammarian', @deva[दार्दुरिकः] 'potter' (wheel's @deva[दर्दुर]-like sound).
"""

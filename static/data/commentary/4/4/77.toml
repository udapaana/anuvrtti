id = "4.4.77"
numericId = "44077"

[en]
simple = """
Both affixes @deva[यत्] and @deva[ढक्] come after the word @deva[धुर्] (pole/yoke) in the accusative case, in the sense of 'what bears that'.

Examples:
- With @deva[यत्]: @deva[धुरं वहति] → @deva[धुर्यः] 'a beast of burden' (lengthening by @ref[8.2.77] prevented by @ref[7.2.79] since @deva[धुर्] is a @deva[भ]-stem)
- With @deva[ढक्]: @deva[धौरेयः] 'a beast of burden' (by @ref[7.1.2])

Note: This @[sūtra] could have been simply @deva[धुरो ढक् च], since @deva[यत्] carries over from @ref[4.4.75].
"""

standard = """
After @deva[धुर्] (in @deva[द्वितीया]), @deva[यत्] and @deva[ढक्] apply in sense @deva[वहति].

Examples:
- @deva[यत्]: @deva[धुर्यः] (no lengthening: @ref[8.2.77] blocked by @ref[7.2.79], @deva[धुर्] being @deva[भ]-stem)
- @deva[ढक्]: @deva[धौरेयः] (@ref[7.1.2])

Both mean 'beast of burden'.
"""

advanced = """
@deva[धुर्] (in @deva[द्वितीया]) takes @deva[यत्] and @deva[ढक्] in sense @deva[वहति].

@deva[यत्]: @deva[धुर्यः] (@deva[धुर्] is @deva[भसंज्ञक], so @ref[8.2.77] blocked by @ref[7.2.79]—no lengthening).
@deva[ढक्]: @deva[धौरेयः] (@ref[7.1.2]).

@[sūtra] could be @deva[धुरो ढक् च], with @deva[यत्] from @ref[4.4.75].
"""

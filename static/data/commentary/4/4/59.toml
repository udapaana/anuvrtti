id = "4.4.59"
numericId = "44059"

[en]
simple = """
The affix @deva[ईकक्] (instead of @deva[ठक्]) comes after the words @deva[शक्ति] (spear/lance) and @deva[यष्टि] (staff) in the sense of 'one whose weapon is that'.

Examples:
- @deva[शक्तिः प्रहरणम् अस्य] → @deva[शाक्तीकः] 'a lanceman'
- @deva[यष्टिः प्रहरणम् अस्य] → @deva[याष्टीकः] 'a staff-wielder'
"""

standard = """
After @deva[शक्ति] and @deva[यष्टि], @deva[ईकक्] (not @deva[ठक्]) applies in sense @deva[प्रहरणम् अस्य].

Examples: @deva[शाक्तीकः] 'lanceman', @deva[याष्टीकः].
"""

advanced = """
@deva[शक्ति] and @deva[यष्टि] take @deva[ईकक्] (not @deva[ठक्]) in sense @deva[प्रहरणम् अस्य].

Examples: @deva[शाक्तीकः], @deva[याष्टीकः].

@deva[ईकक्] = @deva[ईक] with @deva[वृद्धि] by @ref[7.2.117].
"""

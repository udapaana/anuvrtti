id = "4.4.64"
numericId = "44064"

[en]
simple = """
The affix @deva[ठच्] (instead of @deva[ठक्]) comes after compounds whose prior member is polysyllabic, in the sense of 'one whose act (occurring in study) is that'.

Examples:
- @deva[द्वादश अन्यानि कर्माणि अध्ययने वृत्तानि अस्य] → @deva[द्वादशान्यिकः] 'one who made twelve mistakes'
- @deva[त्रयोदशान्यिकः] 'one who made thirteen mistakes'
- @deva[चतुर्दशान्यिकः] 'one who made fourteen mistakes'

@deva[ठच्] differs from @deva[ठक्] in accent.
"""

standard = """
After compounds with @deva[अनेकाच्] (polysyllabic) @deva[पूर्वपद], @deva[ठच्] (not @deva[ठक्]) applies in sense @deva[अध्ययने कर्मवृत्तम् अस्य].

Examples: @deva[द्वादशान्यिकः] (12 errors), @deva[त्रयोदशान्यिकः], @deva[चतुर्दशान्यिकः].

@deva[ठच्] vs @deva[ठक्]: accent difference.
"""

advanced = """
After @deva[अनेकाच्पूर्वपद] compounds, @deva[ठच्] in sense @deva[अध्ययने कर्मवृत्तम् अस्य].

Examples: @deva[द्वादशान्यिकः], @deva[त्रयोदशान्यिकः], @deva[चतुर्दशान्यिकः].

@deva[ठच्] vs @deva[ठक्]: @deva[चित्] vs @deva[कित्] accent.
"""

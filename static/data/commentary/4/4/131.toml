id = "4.4.131"
numericId = "44131"

[en]
simple = """
In the Vedas, the affix @deva[यल्] with the force of @deva[मतुप्] comes after the word @deva[भग] (fortune) when it has @deva[वेशस्] (strength) or @deva[यशस्] (fame) as its first member.

The @deva[ल्] of @deva[यल्] indicates the accent falls on the preceding vowel (@ref[6.1.193]).

Examples:
- @deva[वेशोभगो विद्यते यस्य स] → @deva[वेशोभग्यः] 'possessing strength and fortune'
- @deva[यशोभग्यः] 'possessing fame and fortune'

@deva[भग] means fortune, desire, effort, greatness, virility, and fame. @deva[वेशोभग] may be a @deva[द्वन्द्व] of @deva[वेशस्] (force) and @deva[भग] (fortune).
"""

standard = """
In @deva[छन्दस्], after @deva[भग] with @deva[वेशस्]/[@deva[यशस्] as @deva[पूर्वपद], @deva[यल्] applies with @deva[मत्वर्थ].

@deva[ल्] → accent on preceding vowel (@ref[6.1.193]).

Examples: @deva[वेशोभग्यः], @deva[यशोभग्यः].

@deva[वेशोभग] possibly @deva[द्वन्द्व]: @deva[वेशस्] + @deva[भग].
"""

advanced = """
@deva[वेशोयशआदिभगान्त] takes @deva[यल्] in @deva[छन्दस्], @deva[मत्वर्थ].

Examples: @deva[वेशोभग्यः], @deva[यशोभग्यः].

@deva[ल्] for @deva[उपोत्तमोदात्त] (@ref[6.1.193]).
"""

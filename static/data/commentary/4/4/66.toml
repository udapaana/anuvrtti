id = "4.4.66"
numericId = "44066"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting something to be given, in the @deva[प्रथमा] (nominative) case, in the sense of 'one to whom that is rightfully given'.

The word @deva[नियुक्त] means 'appointed, rightful'—i.e., to be given as a fixed entitlement.

Examples:
- @deva[अग्रे भोजनम् अस्मै नियुक्तं दीयते] 'he is entitled to food first' → @deva[आग्रभोजनिकः] 'a @[brāhmaṇa] entitled to the foremost seat at dinner'
- @deva[अपूपाः नियुक्तम् अस्मै दीयन्ते] → @deva[आपूपिकः] 'one entitled to receive cakes'
- @deva[शाष्कुलिकः]

Some interpret @deva[नियुक्त] as @deva[नित्य] (always): @deva[आपूपिकः] = 'one to whom cakes are always given'.
"""

standard = """
After a @deva[देयवाचक] (word denoting something to be given) in @deva[प्रथमा], @deva[ठक्] applies in sense @deva[तदस्मै नियुक्तं दीयते] (this is rightfully given to him).

@deva[नियुक्त] = @deva[नियोगेन/अव्यभिचारेण] (by appointment, rightfully).

Examples: @deva[आग्रभोजनिकः] 'entitled to first food', @deva[आपूपिकः], @deva[शाष्कुलिकः].

Alternative: @deva[नियुक्त] = @deva[नित्य] (always): @deva[अपूपा नित्यमस्मै दीयन्ते].
"""

advanced = """
After @deva[देयवाचक] (in @deva[प्रथमा]), @deva[ठक्] in sense @deva[नियुक्तं दीयते] (rightfully given).

@deva[नियुक्त] = @deva[अव्यभिचारेण] (without exception) or @deva[नित्य] (always).

Examples: @deva[आग्रभोजनिकः], @deva[आपूपिकः], @deva[शाष्कुलिकः].
"""

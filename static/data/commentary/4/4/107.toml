id = "4.4.107"
numericId = "44107"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[समानतीर्थ] in the locative case, in the sense of 'one who resides there'.

Note: The @deva[अनुवृत्ति] of @deva[साधुः] (excellent) now ceases.

Here @deva[तीर्थ] means @deva[गुरु] (preceptor).

Example: @deva[समाने तीर्थे वासी] 'one who dwells with the same preceptor' → @deva[सतीर्थ्यः] 'a fellow-student' (by @ref[6.3.87])
"""

standard = """
After @deva[समानतीर्थ] (in @deva[सप्तमी]), @deva[यत्] applies in sense @deva[वासी] (resident). @deva[साधुः]-@deva[अनुवृत्ति] ceases.

@deva[तीर्थ] = @deva[गुरु] (preceptor).

Example: @deva[समाने तीर्थे वासी] → @deva[सतीर्थ्यः] 'fellow-student' (@ref[6.3.87]).
"""

advanced = """
@deva[समानतीर्थ] (in @deva[सप्तमी]) takes @deva[यत्] in sense @deva[वासी]. @deva[साधु]-@deva[अनुवृत्ति] ceases.

@deva[तीर्थ] = @deva[गुरु].

Example: @deva[सतीर्थ्यः] (@ref[6.3.87]).
"""

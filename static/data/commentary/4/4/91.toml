id = "4.4.91"
numericId = "44091"

[en]
simple = """
The affix @deva[यत्] comes after specific words (all in the instrumental case) with specific senses:

1. @deva[नौ] (boat) in sense 'to be crossed': @deva[नावा तार्यम्] → @deva[नाव्यम्] 'water, river' (what can be crossed by boat)

2. @deva[वयस्] (age) in sense 'like': @deva[वयसा तुल्यः] → @deva[वयस्यः] 'a friend' (one of similar age)

3. @deva[धर्म] (merit) in sense 'attainable': @deva[धर्मेण प्राप्यम्] → @deva[धर्म्यम्] 'attainable through dharma' (refers to fruit, not act)

4. @deva[विष] (poison) in sense 'to be killed': @deva[विषेण वध्यः] → @deva[विष्यः] 'one who deserves death by poison'

5. @deva[मूल] (root) in sense 'to be bent down': @deva[मूलेन आनाम्यम्] → @deva[मूल्यम्] 'price' (to be overpowered from the root)

6. @deva[मूल] (capital) in sense 'equivalent to': @deva[मूल्यम्]

7. @deva[सीता] (furrow) in sense 'united with': @deva[सीत्यम्]

8. @deva[तुला] (balance) in sense 'equally measured': @deva[तुल्यम्]
"""

standard = """
After specific words (in @deva[तृतीया]) with specific senses, @deva[यत्] applies:

1. @deva[नौ] + @deva[तार्यम्] → @deva[नाव्यम्] 'crossable by boat' (water/river)
2. @deva[वयस्] + @deva[तुल्यः] → @deva[वयस्यः] 'friend' (age-equal)
3. @deva[धर्म] + @deva[प्राप्यम्] → @deva[धर्म्यम्] 'attainable by dharma' (fruit, distinct from @ref[4.4.92] which means 'consistent with dharma')
4. @deva[विष] + @deva[वध्यः] → @deva[विष्यः] 'deserving poison-death'
5. @deva[मूल] + @deva[आनाम्यम्] → @deva[मूल्यम्] 'price' (@deva[आनाम्य] = @deva[अभिभवनीय])
6. @deva[मूल] (capital) + equivalent → @deva[मूल्यम्]
7. @deva[सीता] + united → @deva[सीत्यम्]
8. @deva[तुला] + equal measure → @deva[तुल्यम्]
"""

advanced = """
@deva[यत्] after specific @deva[तृतीयान्त] words with specific senses:

1. @deva[नौ] + @deva[तार्यम्] → @deva[नाव्यम्]
2. @deva[वयस्] + @deva[तुल्यः] → @deva[वयस्यः]
3. @deva[धर्म] + @deva[प्राप्यम्] → @deva[धर्म्यम्] (= @deva[फल]; distinct from @ref[4.4.92] = @deva[कर्म])
4. @deva[विष] + @deva[वध्यः] → @deva[विष्यः]
5. @deva[मूल] + @deva[आनाम्यम्] → @deva[मूल्यम्] (@deva[आनाम्य] by √@deva[नम्] + @deva[ण्यत्], irregularly per @ref[3.1.98])
6-8. @deva[मूल]/[@deva[सीता]/[@deva[तुला] with respective senses.
"""

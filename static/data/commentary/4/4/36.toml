id = "4.4.36"
numericId = "44036"

[en]
simple = """
The affix @deva[ठक्] comes after the word @deva[परिपन्थ] in the accusative case, in the sense of 'one who stays there' or 'one who kills'.

Example: @deva[परिपन्थं तिष्ठति] 'stays at the roadside' → @deva[पारिपन्थिकः] 'a highway robber'

The word can mean: (1) one who stays off the road (avoiding it), or (2) one who occupies the road (blocking it).

The @deva[च] in the @[sūtra] connects this to the previous rule's @deva[हन्ति] sense: @deva[परिपन्थं हन्ति] also gives @deva[पारिपन्थिकः].

The accusative form @deva[परिपन्थम्] in the @[sūtra] shows the @deva[लौकिक] (common usage) form, distinguishing it from @deva[परिपन्थिन्] which has other meanings.
"""

standard = """
After @deva[परिपन्थ] (in @deva[द्वितीया]), @deva[ठक्] applies in sense @deva[तिष्ठति] (stays) and @deva[हन्ति] (kills, from @ref[4.4.35]).

Example: @deva[परिपन्थं तिष्ठति] → @deva[पारिपन्थिकः] 'highwayman'

Two interpretations: @deva[पन्थानं वर्जयित्वा तिष्ठति] (stays avoiding the road) or @deva[पन्थानं व्याप्य तिष्ठति] (occupies the road).

The @deva[च] joins @deva[हन्ति] from previous @[sūtra]. @deva[परिपन्थम्] (accusative) in the @[sūtra] shows @deva[लौकिकरूप], distinguishing from @deva[परिपन्थिन्].
"""

advanced = """
@deva[परिपन्थ] (in @deva[द्वितीया]) takes @deva[ठक्] in senses @deva[तिष्ठति] and @deva[हन्ति] (by @deva[च]).

Example: @deva[पारिपन्थिकः] 'highwayman'.

@deva[परिपन्थं तिष्ठति]: @deva[यः पन्थानं वर्जयित्वा तिष्ठति] or @deva[यो वा पन्थानं व्याप्य तिष्ठति].

@deva[परिपन्थम्] in @[sūtra] is @deva[लौकिकरूपदर्शनार्थ]—@deva[परिपन्थ] (not @deva[परिपन्थिन्]) is the base.
"""

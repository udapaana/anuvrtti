id = "4.4.110"
numericId = "44110"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), the affix @deva[यत्] comes after a word in the locative case in the sense of 'what stays there'.

This supersedes @deva[अण्], @deva[घ], etc. from @ref[4.3.53], though those affixes may also be used optionally due to Vedic flexibility.

Examples from @deva[यजुर्वेद] (16.5.38): @deva[नमो मेघ्याय च विदुत्याय च] 'Homage to that which dwells in clouds and lightning'

All @[sūtras] from here to the end of the chapter are Vedic. The word @deva[भवः] (dwells) governs @[sūtras] through @ref[4.4.118].
"""

standard = """
In @deva[छन्दस्], after @deva[सप्तम्यन्त], @deva[यत्] applies in sense @deva[भवः] (dwells). This supersedes @deva[अण्]/[@deva[घ] (@ref[4.3.53]), though those may optionally apply in Vedas.

Example (@deva[यजुर्वेद] 16.5.38): @deva[नमो मेघ्याय च विदुत्याय च].

All remaining @[sūtras] in this chapter are @deva[छान्दस]. @deva[भवः] governs through @ref[4.4.118].
"""

advanced = """
In @deva[छन्दस्], @deva[सप्तम्यन्त] takes @deva[यत्] in sense @deva[तत्र भवः]. Supersedes @deva[अण्]/[@deva[घ] (@ref[4.3.53]); alternative use possible.

Example: @deva[मेघ्यः], @deva[विदुत्यः] (@deva[यजुर्वेद] 16.5.38).

All subsequent @[sūtras] are @deva[छान्दस]. @deva[भवः] governs through @ref[4.4.118].
"""

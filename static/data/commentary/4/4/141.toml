id = "4.4.141"
numericId = "44141"

[en]
simple = """
The affix @deva[घ] is added to @deva[नक्षत्र] 'star' in Vedic usage without changing the meaning. @deva[नक्षत्र] + @deva[घ] → @deva[नक्षत्रिय] as in @deva[नक्षत्रियेभ्यः स्वाहा] 'hail to the stars'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[घ] comes after @deva[नक्षत्र] 'star, constellation' without altering the meaning. The @deva[अनुवृत्ति] of @deva[समूह] (collection) does not extend to this @[sūtra]. Thus @deva[नक्षत्रियेभ्यः स्वाहा] = @deva[नक्षत्रेभ्यः स्वाहा] 'hail to the constellations'.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[घ] after @deva[नक्षत्र] in an @deva[अर्थाभाव] (meaningless) function—the derivative means the same as the base. Importantly, the @deva[अनुवृत्ति] of @deva[समूह] from the previous @[sūtra] does not carry forward here. The Vedic usage @deva[नक्षत्रियेभ्यः स्वाहा] = @deva[नक्षत्रेभ्यः स्वाहा] 'oblation to the stars' demonstrates that @deva[नक्षत्रिय] simply means @deva[नक्षत्र] with no additional semantic content.
"""

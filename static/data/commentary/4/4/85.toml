id = "4.4.85"
numericId = "44085"

[en]
simple = """
The affix @deva[ण] comes after the word @deva[अन्न] (food) in the accusative case, in the sense of 'one who obtains that'.

Example: @deva[अन्नं लब्धा] 'one who has obtained food' → @deva[आन्नः] 'fed, one who has received food'
"""

standard = """
After @deva[अन्न] (in @deva[द्वितीया]), @deva[ण] applies in sense @deva[लब्धा].

Example: @deva[आन्नः] 'fed, one who has obtained food'.
"""

advanced = """
@deva[अन्न] (in @deva[द्वितीया]) takes @deva[ण] in sense @deva[लब्धा].

Example: @deva[आन्नः].
"""

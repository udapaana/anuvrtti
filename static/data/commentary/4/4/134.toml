id = "4.4.134"
numericId = "44134"

[en]
simple = """
In the Vedas, the affix @deva[यत्] comes after the word @deva[अपस्] (water) in the instrumental case, in the sense of 'sanctified thereby'.

Example: @deva[अप्यम्] 'offering purified with water' as in:
@deva[यस्येदम् अप्यं हविः] 'whose offering is purified with water'
"""

standard = """
In @deva[छन्दस्], after @deva[अपस्] (in @deva[तृतीया]), @deva[यत्] applies in sense @deva[संस्कृतम्] (sanctified).

Example: @deva[अप्यम्] 'water-sanctified offering' (@deva[यस्येदम् अप्यं हविः]).
"""

advanced = """
@deva[अपस्] (in @deva[तृतीया]) takes @deva[यत्] in @deva[छन्दस्], sense @deva[संस्कृतम्].

Example: @deva[अप्यम्] (@deva[यस्येदम् अप्यं हविः]).
"""

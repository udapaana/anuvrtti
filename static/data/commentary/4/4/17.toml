id = "4.4.17"
numericId = "44017"

[en]
simple = """
The affix @deva[ष्ठन्] optionally comes after the words @deva[विवध] and @deva[वीवध] in the sense of 'one who conveys thereby'. When @deva[ष्ठन्] is not used, the regular @deva[ठक्] applies.

Both words mean 'a carrying-pole' — a piece of wood carried on the shoulders to transport loads.

With @deva[ष्ठन्]:
- @deva[विवधेन हरति] → @deva[विवधिकः] 'a porter', f. @deva[विवधिकी]
- @deva[वीवधेन हरति] → @deva[वीवधिकः], f. @deva[वीवधिकी]

With @deva[ठक्]:
- @deva[वैवधिकः] (same for both bases), f. @deva[वैवधिका]
"""

standard = """
After @deva[विवध] and @deva[वीवध], @deva[ष्ठन्] optionally applies in sense @deva[हरति]. Otherwise @deva[ठक्] applies.

@deva[विवध]/[@deva[वीवध] = carrying-pole for loads.

With @deva[ष्ठन्]: @deva[विवधिकः] f. @deva[विवधिकी]; @deva[वीवधिकः] f. @deva[वीवधिकी]
With @deva[ठक्]: @deva[वैवधिकः] f. @deva[वैवधिका]

The @[sūtra] text is @deva[विभाषा विवधात्]; @deva[वीवध] is added from a @deva[वार्त्तिक].
"""

advanced = """
@deva[विवध] and @deva[वीवध] optionally take @deva[ष्ठन्] (otherwise @deva[ठक्]) in sense @deva[हरति].

With @deva[ष्ठन्]: @deva[विवधिकः] f. @deva[विवधिकी], @deva[वीवधिकः] f. @deva[वीवधिकी]
With @deva[ठक्]: @deva[वैवधिकः] f. @deva[वैवधिका]

The @[sūtra] is @deva[विभाषा विवधात्]. @deva[वीवध] is from a @deva[वार्त्तिक] cited by @deva[काशिका].
"""

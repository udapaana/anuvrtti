id = "4.4.78"
numericId = "44078"

[en]
simple = """
The affix @deva[ख] comes after the word @deva[सर्वधुरा] (all yokes/all burdens) in the accusative case, in the sense of 'what bears that'.

Example: @deva[सर्वधुरां वहति] → @deva[सर्वधुरीणः] 'one who bears all burdens' (by @ref[7.1.2])

The affix @deva[ख] applies to other compounds ending in @deva[धुर्]: @deva[उत्तरधुरीणः] 'bearing the right-side yoke', @deva[दक्षिणधुरीणः] 'bearing the left-side yoke'.

@deva[सर्वधुर] is a compound of @deva[सर्व] + @deva[धुर्] (@ref[2.1.49]) with @deva[समासान्त] @deva[अ] by @ref[5.4.74]. Though @deva[धूः] is feminine, making the compound feminine by @ref[2.4.26], the @[sūtra]'s @deva[सर्वधुरात्] (masculine) doesn't regulate gender—it's the @deva[प्रातिपदिक].
"""

standard = """
After @deva[सर्वधुरा] (in @deva[द्वितीया]), @deva[ख] applies in sense @deva[वहति].

Example: @deva[सर्वधुरीणः] (@ref[7.1.2]) 'one who bears all burdens'.

@deva[ख] extends to @deva[धुरन्त] compounds: @deva[उत्तरधुरीणः], @deva[दक्षिणधुरीणः].

@deva[सर्वधुर] = @deva[सर्व] + @deva[धुर्] (@ref[2.1.49]) + @deva[समासान्त] @deva[अ] (@ref[5.4.74]). @deva[धूः] is feminine, so compound is feminine by @ref[2.4.26]. @[sūtra]'s @deva[सर्वधुरात्] is @deva[प्रातिपदिकनिर्देश], not gender-specification.
"""

advanced = """
@deva[सर्वधुरा] (in @deva[द्वितीया]) takes @deva[ख] in sense @deva[वहति].

Example: @deva[सर्वधुरीणः].

@deva[ख] applies to @deva[धुरन्त] compounds: @deva[उत्तरधुरीणः], @deva[दक्षिणधुरीणः].

@deva[सर्वधुर]: @deva[सर्व] + @deva[धुर्] (@ref[2.1.49]) + @deva[समासान्त] @deva[अ] (@ref[5.4.74]). @deva[धूः] is @deva[स्त्रीलिङ्ग], compound @deva[स्त्रीलिङ्ग] by @ref[2.4.26]. @deva[सर्वधुरात्] is @deva[प्रातिपदिकनिर्देश].
"""

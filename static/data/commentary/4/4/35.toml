id = "4.4.35"
numericId = "44035"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting birds, fish, or wild animals, in the @deva[द्वितीया] (accusative) case, in the sense of 'one who kills that'.

The rule applies not just to the specific words @deva[पक्षिन्], @deva[मत्स्य], @deva[मृग], but to all words denoting those creatures (by @ref[1.1.68]).

Examples with birds (@deva[पक्षिन्]):
- @deva[पक्षिणः हन्ति] → @deva[पाक्षिकः] 'bird-killer'
- @deva[शकुनीन् हन्ति] → @deva[शाकुनिकः]; @deva[मायूरिकः], @deva[तैत्तिरिकः]

Examples with fish (@deva[मत्स्य]):
- @deva[मत्स्यान् हन्ति] → @deva[मात्स्यिकः] 'fisherman'
- @deva[मैनिकः], @deva[शाफरिकः], @deva[शाकुलिकः]

Examples with animals (@deva[मृग]):
- @deva[मृगान् हन्ति] → @deva[मार्गिकः] 'hunter'
- @deva[हारिणिकः], @deva[सौकरिकः], @deva[सारङ्गिकः]
"""

standard = """
After words denoting @deva[पक्षिन्] (birds), @deva[मत्स्य] (fish), or @deva[मृग] (wild animals) in @deva[द्वितीया], @deva[ठक्] applies in sense @deva[हन्ति] (kills).

By @ref[1.1.68], the affix applies to all words denoting these creatures, not just @deva[पक्षिन्]/[@deva[मत्स्य]/[@deva[मृग] themselves.

Birds: @deva[पाक्षिकः], @deva[शाकुनिकः], @deva[मायूरिकः], @deva[तैत्तिरिकः]
Fish: @deva[मात्स्यिकः], @deva[मैनिकः], @deva[शाफरिकः], @deva[शाकुलिकः]
Animals: @deva[मार्गिकः], @deva[हारिणिकः], @deva[सौकरिकः], @deva[सारङ्गिकः]
"""

advanced = """
After @deva[पक्षिमत्स्यमृगवाचिन्] (in @deva[द्वितीया]), @deva[ठक्] in sense @deva[हन्ति].

By @ref[1.1.68], applies to all @deva[तद्वाचिन्], not just @deva[स्वरूप].

Birds: @deva[पाक्षिकः], @deva[शाकुनिकः], @deva[मायूरिकः], @deva[तैत्तिरिकः]
Fish: @deva[मात्स्यिकः], @deva[मैनिकः], @deva[शाफरिकः], @deva[शाकुलिकः]
Animals: @deva[मार्गिकः], @deva[हारिणिकः], @deva[सौकरिकः], @deva[सारङ्गिकः]
"""

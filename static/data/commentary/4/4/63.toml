id = "4.4.63"
numericId = "44063"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the nominative case in the sense of 'one whose act (occurring during study/recitation) is that'.

This refers to errors made during recitation or examination.

Examples:
- @deva[एकम् अन्यत् अध्ययने कर्म वृत्तम् अस्य] 'one error occurred in his recitation' → @deva[ऐकान्यिकः] 'one who made one mistake'
- @deva[द्वयोः अन्ययोः...] → @deva[द्वैयन्यिकः] 'one who made two mistakes'
- @deva[त्रयाणाम् अन्येषाम्...] → @deva[त्रैयन्यिकः] 'one who made three mistakes'

@deva[अन्यत्] here means 'error'—especially accent errors (pronouncing @deva[उदात्त] as @deva[अनुदात्त] or vice versa).
"""

standard = """
After a word denoting @deva[अध्ययने कर्मवृत्तम्] (act occurring in study) in @deva[प्रथमा], @deva[ठक्] applies in sense @deva[अस्य] (his).

Refers to recitation errors.

Examples: @deva[ऐकान्यिकः] (one error), @deva[द्वैयन्यिकः] (two errors), @deva[त्रैयन्यिकः] (three errors).

@deva[अन्यत्] = error, especially @deva[स्वर]-errors (@deva[उदात्त] ↔ @deva[अनुदात्त] confusion).

In @deva[विग्रह], use full phrase @deva[अध्ययने कर्मवृत्तम्].
"""

advanced = """
After @deva[अध्ययने कर्मवृत्तवाचक] (in @deva[प्रथमा]), @deva[ठक्] in sense @deva[अस्य].

Examples: @deva[ऐकान्यिकः], @deva[द्वैयन्यिकः], @deva[त्रैयन्यिकः].

@deva[अन्यत्] = @deva[स्खलन] (error), especially @deva[स्वरस्खलन] (@deva[उदात्त]/[@deva[अनुदात्त] confusion).

In @deva[विग्रह]: @deva[एकमन्यदध्ययने कर्मवृत्तमस्य].
"""

id = "4.4.69"
numericId = "44069"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the locative case (seventh case, @deva[सप्तमी]) in the sense of 'one who is appointed there'.

Examples:
- @deva[शुल्कशालायां नियुक्तः] 'appointed at the custom-house' → @deva[शौल्कशालिकः] 'a custom-house superintendent'
- @deva[आकरे नियुक्तः] → @deva[आकरिकः] 'mine superintendent'
- @deva[आपणे नियुक्तः] → @deva[आपणिकः] 'market superintendent'
- @deva[गुल्मे नियुक्तः] → @deva[गौल्मिकः] 'outpost commander'
- @deva[द्वारे नियुक्तः] → @deva[दौवारिकः] 'doorkeeper'

Note: @deva[नियुक्त] here has a different meaning than in @ref[4.4.66]—hence it is stated again.
"""

standard = """
After a @deva[सप्तम्यन्त] word, @deva[ठक्] applies in sense @deva[तत्र नियुक्तः] (appointed there).

Examples: @deva[शौल्कशालिकः] 'custom-house official', @deva[आकरिकः], @deva[आपणिकः], @deva[गौल्मिकः], @deva[दौवारिकः].

@deva[तत्रनियुक्त] is @deva[तत्पुरुष] by @ref[2.1.46]. @deva[नियुक्त] here differs from @ref[4.4.66]—hence restated.
"""

advanced = """
After @deva[सप्तम्यन्त], @deva[ठक्] in sense @deva[तत्र नियुक्तः].

Examples: @deva[शौल्कशालिकः], @deva[आकरिकः], @deva[आपणिकः], @deva[गौल्मिकः], @deva[दौवारिकः].

@deva[तत्रनियुक्त]: @deva[तत्पुरुष] by @ref[2.1.46]. @deva[नियुक्त] repeated from @ref[4.4.66] with different sense.
"""

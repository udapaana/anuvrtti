id = "4.4.138"
numericId = "44138"

[en]
simple = """
The affix @deva[य] is added to @deva[सोम] in Vedic usage with the meaning of @deva[मतुप्] (possession). @deva[सोम] + @deva[य] → @deva[सोम्य] as in @deva[सोम्यं मधुः] 'honey made of or containing Soma'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[य] is added after @deva[सोम] with the force of @deva[मतुप्]. The affix @deva[मयट्] typically conveys senses like 'coming from that' (@ref[4.3.74], @ref[4.3.82]), 'modification or part of' (@ref[4.3.134], @ref[4.3.143]), and 'made of' (@ref[5.4.21]). The case in construction varies according to the intended sense. Thus @deva[सोम्यं मधुः पिबन्ति] = @deva[सोममयं मधुः] 'honey consisting of Soma'.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[य] after @deva[सोम] to express possession (@deva[मत्वर्थ]). The commentary notes that the @deva[मयट्] affix conveys various derivative senses: @deva[ततः आगतः] 'coming from that' (per @ref[4.3.74], @ref[4.3.82]), @deva[विकारावयव] 'modification or constituent' (per @ref[4.3.134], @ref[4.3.143]), and @deva[प्रकृत] 'made of' (per @ref[5.4.21]). The case relation (@deva[विभक्ति]) varies with the specific sense. The example @deva[सोम्यं मधुः पिबन्ति] = @deva[सोममयं मधुः] illustrates 'honey made of Soma'.
"""

id = "4.4.6"
numericId = "44006"

[en]
simple = """
The affix @deva[ठञ्] (instead of @deva[ठक्]) comes after the word @deva[गोपुच्छ] (cow's tail) in the sense of 'one who crosses thereby'.

The difference between @deva[ठक्] and @deva[ठञ्] is only in accent (the placement of the @deva[उदात्त]).

Example: @deva[गोपुच्छेन तरति] → @deva[गौपुच्छिकः] 'one who crosses holding a cow's tail'
"""

standard = """
After @deva[गोपुच्छ], @deva[ठञ्] (not @deva[ठक्]) applies in the sense @deva[तरति].

@deva[ठञ्] differs from @deva[ठक्] only in accent—@deva[ञ्] affects @deva[उदात्त] placement.

Example: @deva[गोपुच्छेन तरति] → @deva[गौपुच्छिकः]
"""

advanced = """
@deva[गोपुच्छ] takes @deva[ठञ्] (not @deva[ठक्]) in sense @deva[तरति].

@deva[ठञ्] vs @deva[ठक्]: The @deva[ञ्] is @deva[इत्] for accent by @ref[1.3.3]—it marks @deva[ञित्] for @ref[6.1.197] (@deva[आद्युदात्त]).

Example: @deva[गौपुच्छिकः].
"""

id = "4.4.144"
numericId = "44144"

[en]
simple = """
The affix @deva[तातिल्] is added to @deva[शिव], @deva[शम्], and @deva[अरिष्ट] in Vedic usage when the base is in the genitive case and the meaning is 'the state or condition of'. @deva[शिव] + @deva[तातिल्] → @deva[शिवताति] 'the state of auspiciousness'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[तातिल्] comes after @deva[शिव], @deva[शम्], and @deva[अरिष्ट] in the genitive case construction when the sense is @deva[भाव] (state, condition). Thus @deva[शिवस्य भावः] = @deva[शिवतातिः] 'the condition of blissfulness', @deva[शन्तातिः] 'the state of happiness or peace', and @deva[अरिष्टतातिः] 'the state of being unharmed'. Here these words function as verbal nouns.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[तातिल्] after @deva[शिव], @deva[शम्], and @deva[अरिष्ट] in genitive (@deva[षष्ठी]) construction with @deva[भाव] (abstract state) meaning. The derivation @deva[शिवस्य भावः] = @deva[शिवतातिः] 'the condition of auspiciousness' illustrates this. Similarly @deva[शन्तातिः] 'the state of peace/happiness' and @deva[अरिष्टतातिः] 'the state of being uninjured'. The commentary notes that these formations have the force of verbal nouns (@deva[भाववाचक]), expressing the abstract quality rather than an agent as in the previous @[sūtra].
"""

id = "4.4.100"
numericId = "44100"

[en]
simple = """
The affix @deva[ण] (instead of @deva[यत्]) comes after the word @deva[भक्त] (food) in the sense of 'excellent in that'.

Examples:
- @deva[भक्ते साधुः] 'excellent for food' → @deva[भाक्तः शालिः] 'rice (excellent for eating)'
- @deva[भाक्ताः तण्डुलाः] 'rice grains suitable for food'
"""

standard = """
After @deva[भक्त], @deva[ण] (not @deva[यत्]) applies in sense @deva[साधुः].

Examples: @deva[भाक्तः शालिः] 'food-suitable rice', @deva[भाक्ताः तण्डुलाः].
"""

advanced = """
@deva[भक्त] takes @deva[ण] in sense @deva[साधुः].

Examples: @deva[भाक्तः शालिः], @deva[भाक्ताः तण्डुलाः].
"""

id = "4.4.139"
numericId = "44139"

[en]
simple = """
The affix @deva[यत्] is added to @deva[मधु] in Vedic usage with the meaning of @deva[मतुप्] (possession). @deva[मधु] + @deva[यत्] → @deva[मधव्य] as in @deva[मधव्यान् स्तोकान्] 'drops containing honey'.
"""

standard = """
In the @deva[छन्दस्], the affix @deva[यत्] comes after @deva[मधु] 'honey' with the force of @deva[मतुप्] (possession). The example @deva[मधव्यान् स्तोकान्] = @deva[मधुमयान्] means 'drops that are full of or made of honey'.
"""

advanced = """
This @[sūtra] teaches the Vedic affix @deva[यत्] after @deva[मधु] to express @deva[मत्वर्थ] (possessive sense). The derivation @deva[मधव्यान् स्तोकान्] = @deva[मधुमयान्] 'drops consisting of honey' demonstrates the possessive/compositional meaning. This Vedic-specific form supersedes the regular @deva[मत्वर्थ] affixes in classical Sanskrit.
"""

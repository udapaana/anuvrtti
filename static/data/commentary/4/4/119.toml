id = "4.4.119"
numericId = "44119"

[en]
simple = """
In the Vedas, the affix @deva[यत्] comes after the word @deva[बर्हिस्] (sacred grass) in the locative case, in the sense of 'given'.

Note: The @deva[अनुवृत्ति] of @deva[तत्र भवः] (dwells there) now ceases.

Example from @deva[ऋग्वेद] I.15.5: @deva[बर्हिष्येषु निधिषु प्रियेषु] 'among the offerings placed on the sacred grass'
"""

standard = """
In @deva[छन्दस्], after @deva[बर्हिस्] (in @deva[सप्तमी]), @deva[यत्] applies in sense @deva[दत्तम्] (given). @deva[तत्र भवः]-@deva[अनुवृत्ति] ceases.

Example (@deva[ऋग्वेद] I.15.5): @deva[बर्हिष्येषु निधिषु प्रियेषु].
"""

advanced = """
@deva[बर्हिस्] (in @deva[सप्तमी]) takes @deva[यत्] in @deva[छन्दस्], sense @deva[दत्तम्]. @deva[तत्र भवः] ceases.

Example: @deva[बर्हिष्येषु निधिषु प्रियेषु] (@deva[ऋग्वेद] I.15.5).
"""

id = "4.4.22"
numericId = "44022"

[en]
simple = """
The affix @deva[ठक्] comes after a word in the instrumental case in the sense of 'mixed therewith'.

The word @deva[संसृष्ट] means 'mixed' or 'combined'.

Examples:
- @deva[दध्ना संसृष्टम्] 'mixed with curd' → @deva[दाधिकम्] 'smeared with curd'
- @deva[मरीचेन संसृष्टम्] → @deva[मारीचिकम्] 'mixed with pepper'
- @deva[शृङ्गवेरेण संसृष्टम्] → @deva[शार्ङ्गवेरिकम्] 'mixed with ginger'
- @deva[पिप्पल्या संसृष्टम्] → @deva[पैप्पलिकम्] 'mixed with long pepper'

Note: @deva[संस्कृत] (@ref[4.4.3]) implies enhancement; @deva[संसृष्ट] simply means mixing without the idea of improvement.
"""

standard = """
After a @deva[तृतीया]-ending word, @deva[ठक्] applies in sense @deva[संसृष्टम्] (mixed therewith).

Examples: @deva[दाधिकम्] 'smeared with curd', @deva[मारीचिकम्], @deva[शार्ङ्गवेरिकम्], @deva[पैप्पलिकम्].

Distinction: @deva[संस्कृत] (@ref[4.4.3]) implies enhancement/refinement; @deva[संसृष्ट] is mere mixing without improvement.
"""

advanced = """
After @deva[तृतीयान्त], @deva[ठक्] in sense @deva[संसृष्टम्] (mixed).

Examples: @deva[दाधिकम्], @deva[मारीचिकम्], @deva[शार्ङ्गवेरिकम्], @deva[पैप्पलिकम्].

@deva[संस्कृत] vs @deva[संसृष्ट]: @deva[संस्कृत] (@ref[4.4.3]) = refinement/enhancement; @deva[संसृष्ट] = mere combination without qualitative improvement.
"""

id = "4.4.116"
numericId = "44116"

[en]
simple = """
In the Vedas, the affix @deva[यत्] comes after the word @deva[अग्र] (foremost) in the sense of 'what stays there'.

Example: @deva[अग्रे भवम्] → @deva[अग्र्यम्] 'foremost'

Why state this separately when @deva[यत्] would come by the general rule @ref[4.4.110]? The repetition indicates that @deva[यत्] is not superseded by @deva[घ] and @deva[छ] of the next @[sūtra]—without this, those affixes would have blocked @deva[यत्].
"""

standard = """
In @deva[छन्दस्], after @deva[अग्र], @deva[यत्] applies in sense @deva[भवः].

Example: @deva[अग्र्यम्].

Why restate? @deva[यत्] comes by @ref[4.4.110]. Repetition shows @deva[यत्] is not blocked by @deva[घच्]/[@deva[छ] of @ref[4.4.117].
"""

advanced = """
@deva[अग्र] takes @deva[यत्] in @deva[छन्दस्], sense @deva[भवः].

Example: @deva[अग्र्यम्].

Repetition from @ref[4.4.110] indicates @deva[यत्] not blocked by @deva[घच्]/[@deva[छ] (@ref[4.4.117]).
"""

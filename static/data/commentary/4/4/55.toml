id = "4.4.55"
numericId = "44055"

[en]
simple = """
The affix @deva[ठक्] comes after a word denoting an art or craft, in the @deva[प्रथमा] (nominative) case, in the sense of 'one whose art is that'.

Examples:
- @deva[मृदङ्गवादनं शिल्पम् अस्य] 'playing the @deva[मृदङ्ग] drum is his art' → @deva[मार्दङ्गिकः] 'a drummer'
- @deva[पणववादनं शिल्पम् अस्य] → @deva[पाणविकः] 'a tabor-player'
- @deva[वीणावादनं शिल्पम् अस्य] → @deva[वैणिकः] 'a lute-player'
"""

standard = """
After a @deva[शिल्पवाचिन्] (word denoting art/craft) in @deva[प्रथमा], @deva[ठक्] applies in sense @deva[शिल्पम् अस्य] (this is his art).

Examples: @deva[मार्दङ्गिकः] 'drummer', @deva[पाणविकः], @deva[वैणिकः].
"""

advanced = """
After @deva[शिल्पवाचिन्] (in @deva[प्रथमा]), @deva[ठक्] in sense @deva[शिल्पम् अस्य].

Examples: @deva[मार्दङ्गिकः], @deva[पाणविकः], @deva[वैणिकः].
"""

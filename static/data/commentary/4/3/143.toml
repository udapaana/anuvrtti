id = "4.3.143"
numericId = "43143"

[en]
simple = """
The affix @deva[मयट्] comes optionally after any base in the @deva[विकार] (modification) and @deva[अवयव] (part) senses in secular language (@deva[भाषा]), but not when referring to food or clothing.

**Examples:**
- @deva[आश्ममयम्] or @deva[आश्मनम्] (from @ref[4.3.134])
- @deva[मूर्वामयम्] or @deva[मौर्वम्] (from @ref[4.3.135])

Why 'in secular language'? In Vedic usage: @deva[बैल्वः खादिरो वा यूपः स्यात्] (the sacrificial post should be of Bilva or Khadira wood) — @deva[मयट्] is not used.

Why 'not food or clothing'? For food: @deva[मौद्गः सूपः] 'soup made of kidney beans.' For clothing: @deva[कार्पासम् आच्छादनम्] 'cotton garment.' These don't take @deva[मयट्].

The word @deva[एतयोः] ('in these two senses') in the rule indicates that even the special affixes taught in @ref[4.3.135], @ref[4.3.136] etc. can be replaced by @deva[मयट्]: @deva[कपोतमयम्] or @deva[कापोतम्], @deva[लोहमयम्] or @deva[लौहम्].
"""

standard = """
The affix @deva[मयट्] comes optionally in the @deva[विकार]/​@deva[अवयव] senses in @deva[भाषा] (secular language), excluding @deva[अन्न] (food) and @deva[वस्त्र] (clothing).

**Examples:** @deva[आश्ममयम्]/​@deva[आश्मनम्] (@ref[4.3.134]), @deva[मूर्वामयम्]/​@deva[मौर्वम्] (@ref[4.3.135])

**@deva[भाषायाम्]:** In @deva[छन्दस्]: @deva[बैल्वः खादिरो वा यूपः स्यात्] (no @deva[मयट्]).

**@deva[अनन्नवस्त्रयोः]:** Food: @deva[मौद्गः सूपः]. Clothing: @deva[कार्पासम् आच्छादनम्]. No @deva[मयट्].

**@deva[एतयोः]:** Indicates @deva[मयट्] can replace specific affixes: @deva[कपोतमयम्]/​@deva[कापोतम्] (@ref[4.3.135]), @deva[लोहमयम्]/​@deva[लौहम्].
"""

advanced = """
This @deva[सूत्र] makes @deva[मयट्] optional in the @deva[विकार]/​@deva[अवयव] senses for @deva[भाषा] (secular), with @deva[अनन्न] and @deva[अवस्त्र] conditions.

**Examples:** @deva[आश्ममयम्]/​@deva[आश्मनम्], @deva[मूर्वामयम्]/​@deva[मौर्वम्]

**@deva[भाषायाम्]:** @deva[छन्दसि] excluded: @deva[बैल्वः खादिरो वा यूपः स्यात्].

**@deva[अनन्नवस्त्रयोः]:** @deva[अन्न]: @deva[मौद्गः सूपः]. @deva[वस्त्र]: @deva[कार्पासम् आच्छादनम्].

**@deva[एतयोः]:** Despite @deva[अनुवृत्ति], explicit mention indicates @deva[मयट्] can substitute for specific affixes (@ref[4.3.135] ff.): @deva[कपोतमयम्]/​@deva[कापोतम्], @deva[लोहमयम्]/​@deva[लौहम्].
"""

id = "4.3.98"
numericId = "43098"

[en]
simple = """
The affix @deva[वुञ्] comes after @deva[वासुदेव] and @deva[अर्जुन] to mean 'this is his object of devotion.' This overrides @deva[छ] and @deva[अण्].

**Examples:**
- @deva[वासुदेवः भक्तिः अस्य] → @deva[वासुदेवकः] 'a devotee of @[vāsudeva]'
- @deva[अर्जुनः भक्तिः अस्य] → @deva[अर्जुनकः] 'a devotee of Arjuna'

Question: @deva[वासुदेव] as a @[kṣatriya] name would take @deva[वुञ्] by the next rule anyway. Why mention it here?

Answer: Here @deva[वासुदेव] means God (the one in whom all beings dwell: @deva[वसति अस्मिन्]), not the @[kṣatriya] designation.

Note: By @ref[2.2.34], a word with fewer vowels should come first in a compound. Placing @deva[वासुदेव] before @deva[अर्जुन] indicates that words denoting objects of reverence are placed first.
"""

standard = """
The affix @deva[वुञ्] comes after @deva[वासुदेव] and @deva[अर्जुन] in the @deva[भक्ति] sense, debarring @deva[छ] and @deva[अण्].

**Examples:** @deva[वासुदेवकः], @deva[अर्जुनकः]

Why include @deva[वासुदेव] when @deva[वुञ्] would apply by @ref[4.3.99] for @[kṣatriya] names? Here @deva[वासुदेव] denotes God (@deva[वसति अस्मिन्]—'in whom all dwell'), not a @[kṣatriya].

The ordering—@deva[वासुदेव] before @deva[अर्जुन] despite having more vowels—is a @deva[ज्ञापक] that words denoting reverence take precedence over the @deva[अल्पाच्तर] rule (@ref[2.2.34]).
"""

advanced = """
This @deva[सूत्र] prescribes @deva[वुञ्] after @deva[वासुदेव] and @deva[अर्जुन] in the @deva[भक्ति] sense, debarring @deva[छ] and @deva[अण्].

**Examples:** @deva[वासुदेवकः], @deva[अर्जुनकः]

**Why @deva[वासुदेव] here?** The next @deva[सूत्र] (@ref[4.3.99]) teaches @deva[वुञ्] after @[kṣatriya] names. But @deva[वासुदेव] here denotes the deity (@deva[वसति अस्मिन्] 'in whom all dwell'), not the @[kṣatriya].

**@deva[ज्ञापक]:** The ordering @deva[वासुदेव]-@deva[अर्जुन] violates @ref[2.2.34] (@deva[अल्पाच्तरम्]). This indicates a meta-rule: words denoting @deva[पूज्य] (objects of reverence) are placed first.
"""

id = "4.3.127"
numericId = "43127"

[en]
simple = """
The affix @deva[अण्] comes in the sense of 'this is their congregation, mark, sign, or hamlet' after @deva[गोत्र] words ending in @deva[अञ्], @deva[यञ्], or @deva[इञ्]. This overrides @deva[वुञ्].

Four meanings:
- @deva[संघ] = congregation
- @deva[लक्षण] = distinguishing mark (inherent to the person/thing)
- @deva[अङ्क] = ownership mark (shows the thing belongs to someone else)
- @deva[घोष] = hamlet, cow-pen (added by @[vārtika])

**Examples:**
- From @deva[अञ्]-ending (@ref[4.1.104]): @deva[बैदः] 'a congregation/mark/sign/hamlet of the Bidas'
- From @deva[यञ्]-ending (@ref[4.1.105]): @deva[गार्ग्य] + @deva[अण्] → @deva[गार्गः] (by @ref[6.4.148], @ref[6.4.151])
- From @deva[इञ्]-ending (@ref[4.1.95]): @deva[दाक्षि] + @deva[अण्] → @deva[दाक्षः]

The @deva[ण्] of @deva[अण्] doesn't cause additional @deva[वृद्धि] here (the words already have it). Using @deva[अण्] (not just @deva[अ]) ensures feminine @deva[ङीप्] (@ref[4.1.15]): @deva[बैदी]. It also prevents @deva[पुंवद्भाव] in compounds (@ref[6.3.39]): @deva[बैदीविद्यः].
"""

standard = """
The affix @deva[अण्] comes after @deva[गोत्र] words ending in @deva[अञ्], @deva[यञ्], or @deva[इञ्] when denoting @deva[संघ] (congregation), @deva[लक्षण] (mark), @deva[अङ्क] (sign), or @deva[घोष] (hamlet). This debars @deva[वुञ्] of @ref[4.3.126].

**Semantic distinctions:**
- @deva[लक्षण]: inherent distinguishing feature (e.g., @deva[विद्या] for the Bidas)
- @deva[अङ्क]: ownership mark (e.g., brand on a cow)

**@[vārtika]:** @deva[घोष] (cow-pen/hamlet) is added. The four senses don't follow @deva[यथासंख्यम्] (@ref[1.3.10]).

**Examples:**
- @deva[अञन्त] (@ref[4.1.104]): @deva[बैदः]
- @deva[यञन्त] (@ref[4.1.105]): @deva[गार्गः] (@ref[6.4.148], @ref[6.4.151])
- @deva[इञन्त] (@ref[4.1.95]): @deva[दाक्षः]

**Why @deva[अण्]?** The words already have @deva[वृद्धि] from @deva[अञ्]/​@deva[यञ्]/​@deva[इञ्]. @deva[अण्] (vs. @deva[अ]) ensures @deva[ङीप्] feminine (@ref[4.1.15]): @deva[बैदी]. It also blocks @deva[पुंवद्भाव] (@ref[6.3.39]): @deva[बैदीविद्यः].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अण्] after @deva[गोत्र] words ending in @deva[अञ्], @deva[यञ्], or @deva[इञ्] for the senses @deva[संघ], @deva[लक्षण], @deva[अङ्क], debarring @deva[वुञ्] of @ref[4.3.126].

**@deva[लक्षण] vs. @deva[अङ्क]:** @deva[लक्षण] = inherent property; @deva[अङ्क] = extrinsic ownership mark.

**@[vārtika]:** @deva[घोषश्च] — @deva[घोष] (hamlet/cow-pen) is a fourth sense. The @deva[यथासंख्यम्] (@ref[1.3.10]) doesn't apply.

**Examples:**
- @deva[अञन्त] (@ref[4.1.104]): @deva[बैदः]
- @deva[यञन्त] (@ref[4.1.105]): @deva[गार्ग्य] + @deva[अण्] → @deva[गार्गः] (@ref[6.4.148], @ref[6.4.151])
- @deva[इञन्त] (@ref[4.1.95]): @deva[दाक्षि] + @deva[अण्] → @deva[दाक्षः]

**Why @deva[अण्] (not @deva[अ])?** The @deva[ण्] doesn't add @deva[वृद्धि] (already present). But @deva[अण्] triggers @deva[ङीप्] (@ref[4.1.15]): @deva[बैदी]. It also blocks @deva[पुंवद्भाव] (@ref[6.3.39]) in compounds: @deva[बैदी विद्या अस्य] = @deva[बैदीविद्यः].
"""

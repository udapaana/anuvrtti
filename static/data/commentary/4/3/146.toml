id = "4.3.146"
numericId = "43146"

[en]
simple = """
The affix @deva[मयट्] comes invariably in the @deva[विकार] (modification) or @deva[अवयव] (part) sense after the word @deva[पिष्ट] (flour). This overrides @deva[अण्].

**Example:** @deva[पिष्टमयं भस्म] 'ashes made from flour'

In other senses, @deva[अण्] applies: @deva[पैष्टी सुरा] 'liquor belonging to flour' (with @deva[तस्येदम्] sense).
"""

standard = """
The affix @deva[मयट्] comes invariably after @deva[पिष्ट] in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[अण्].

**Example:** @deva[पिष्टमयं भस्म]

In @deva[तस्येदम्] sense: @deva[पैष्टी सुरा] (with @deva[अण्]).
"""

advanced = """
This @deva[सूत्र] makes @deva[मयट्] obligatory after @deva[पिष्ट] in the @deva[विकार]/​@deva[अवयव] sense, as @deva[अपवाद] to @deva[अण्].

**Example:** @deva[पिष्टमयं भस्म]

**@deva[तस्येदम्]:** @deva[पैष्टी सुरा] (@deva[अण्]).
"""

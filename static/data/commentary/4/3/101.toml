id = "4.3.101"
numericId = "43101"

[en]
simple = """
An affix (from the @deva[प्राग्दीव्यतोऽण्] set, @ref[4.1.83]) comes after a word in the instrumental case (third case) to mean 'enounced or taught by him.'

The word @deva[प्रोक्त] means 'preeminently spoken'—teaching or promulgating, as distinct from @deva[कृत] ('composed'). The sense of @deva[कृत] was already taught at @ref[4.3.16].

**Examples:**
- @deva[पाणिनिना प्रोक्तम्] → @deva[पाणिनीयम्] 'the grammar taught by @[pāṇini]'
- @deva[आपिशलम्], @deva[काशकृत्स्नम्]
- @deva[अन्येन कृता माथुरेण प्रोक्ता] = @deva[माथुरी वृत्तिः] 'a commentary composed by one person but taught by a Mathura scholar'

This rule applies to the Vedas (which are eternal, not 'composed') and to works where the author and the promulgator are different people.
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) comes after a word in @deva[तृतीया विभक्ति] (instrumental) in the @deva[प्रोक्त] (enounced/taught) sense.

@deva[प्रोक्त] (@deva[प्रकर्षेण उक्तम्]) means 'promulgated' or 'taught,' distinct from @deva[कृत] ('composed'), which was treated at @ref[4.3.16].

**Examples:** @deva[पाणिनीयम्] (taught by @[pāṇini]), @deva[आपिशलम्], @deva[काशकृत्स्नम्]

**Application:** Works like @deva[छन्दस्] (Vedas), which are eternal and hence not 'composed' but only 'revealed' by seers, or works where the author and teacher differ: @deva[माथुरी वृत्तिः] (composed by one, promulgated by a Mathura scholar).

Some argue this @deva[सूत्र] overlaps with @ref[4.3.16]. The distinction: @deva[प्रोक्त] = revelation/teaching; @deva[कृत] = authorship.
"""

advanced = """
This @deva[सूत्र] introduces the @deva[प्रोक्त] sense for @deva[प्राग्दीव्यतोऽण्] affixes (@ref[4.1.83]), with the base in @deva[तृतीया विभक्ति].

@deva[प्रोक्त] = @deva[प्रकर्षेण उक्तम्]—teaching, promulgating—as opposed to @deva[कृत] (composing), which is covered by @ref[4.3.16] (@deva[कृते ग्रन्थे]).

**Examples:** @deva[पाणिनीयम्], @deva[आपिशलम्], @deva[काशकृत्स्नम्]

**Scope:** This applies when:
1. The work is @deva[अपौरुषेय] (like @deva[छन्दस्])—not composed but revealed. The @deva[ऋषि]s 'remember' the eternal @deva[वेद] and promulgate it anew each @deva[कल्प]: @deva[काठकम्], @deva[कालापकम्], @deva[मौदकम्].
2. The author and teacher differ: @deva[माथुरी वृत्तिः] (composed by another, taught by a Mathura scholar).

Some consider this @deva[सूत्र] nearly redundant with @ref[4.3.16], but the distinction between @deva[प्रोक्त] (revelation/teaching) and @deva[कृत] (composition) is significant.
"""

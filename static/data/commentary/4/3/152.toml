id = "4.3.152"
numericId = "43152"

[en]
simple = """
The affix @deva[अण्] comes in the @deva[विकार] (modification) or @deva[अवयव] (part) sense after words in the @deva[तालादि] list. This overrides @deva[मयट्] etc.

**Examples:**
- @deva[तालं धनुः] 'a bow made of @[tāla] palm'
- @deva[बार्हिणम्], @deva[ऐन्द्रालिशम्]

**@deva[तालादि] list:** @deva[ताल] (for bows), @deva[बर्हिण], @deva[इन्द्रालिश], @deva[इन्द्रादृश], @deva[इन्द्रायुध], @deva[चय], @deva[श्यामाक], @deva[पीयूक्षा].
"""

standard = """
The affix @deva[अण्] comes after @deva[तालादि] words in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[मयट्] etc.

**Examples:** @deva[तालं धनुः], @deva[बार्हिणम्], @deva[ऐन्द्रालिशम्]

**@deva[तालादि] @deva[गण] (8):** @deva[ताल] (@deva[धनुषि]), @deva[बर्हिण], @deva[इन्द्रालिश], @deva[इन्द्रादृश], @deva[इन्द्रायुध], @deva[चय]/​@deva[चाप]/​@deva[चर्ग], @deva[श्यामाक], @deva[पीयूक्षा].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अण्] after @deva[तालादि] words in the @deva[विकार]/​@deva[अवयव] sense, as @deva[अपवाद] to @deva[मयट्] etc.

**Examples:** @deva[तालं धनुः], @deva[बार्हिणम्], @deva[ऐन्द्रालिशम्]

**@deva[तालादि] @deva[गण]:** @deva[ताल] (@deva[धनुषि]), @deva[बर्हिण], @deva[इन्द्रालिश], @deva[इन्द्रादृश], @deva[इन्द्रायुध], @deva[चय] (@deva[चाप], @deva[चर्ग]), @deva[श्यामाक], @deva[पीयूक्षा].
"""

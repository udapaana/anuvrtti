id = "4.3.24"
numericId = "43024"

[en]
simple = """
After @deva[पूर्वाह्ण] (forenoon) and @deva[अपराह्ण] (afternoon), the affixes @deva[ट्यु] and @deva[ट्युल्] optionally apply with the augment @deva[तुट्].

In the alternative, @deva[ठञ्] from @ref[4.3.11] also applies.

Examples:
• With @deva[ट्यु]/@deva[ट्युल्]]: @deva[पूर्वाह्णेतनम्], @deva[अपराह्णेतनम्]
• With @deva[ठञ्]: @deva[पौर्वाह्णिकम्], @deva[आपराह्णिकम्]

The locative sign is not elided by @ref[6.3.17]. When the word is treated as not having a case-affix: @deva[पूर्वाह्णतनम्] or @deva[पूर्वाह्णतनः].
"""

standard = """
After @deva[पूर्वाह्ण] and @deva[अपराह्ण], @deva[ट्यु]/@deva[ट्युल्]] with @deva[तुट्] apply optionally; alternatively @deva[ठञ्] (@ref[4.3.11]).

Examples: @deva[पूर्वाह्णेतनम्], @deva[अपराह्णेतनम्] (with @deva[ट्यु]/@deva[ट्युल्]]); @deva[पौर्वाह्णिकम्], @deva[आपराह्णिकम्] (with @deva[ठञ्]).

@deva[सुब्लोप] (@ref[6.3.17]) does not apply. When analyzed as @deva[अविभक्तिक]: @deva[पूर्वाह्णतनम्], @deva[पूर्वाह्णतनः].
"""

advanced = """
@deva[ट्यु]/@deva[ट्युल्]] with @deva[तुट्] optionally apply after @deva[पूर्वाह्ण]/@deva[अपराह्ण]]; @deva[ठञ्] (@ref[4.3.11]) is the alternative.

Examples: @deva[पूर्वाह्णेतनम्], @deva[अपराह्णेतनम्]; @deva[पौर्वाह्णिकम्], @deva[आपराह्णिकम्].

@ref[6.3.17] (@deva[सुब्लोप]) is inapplicable. @deva[अविभक्तिक]-analysis: @deva[पूर्वाह्णतनम्], @deva[पूर्वाह्णतनः].
"""

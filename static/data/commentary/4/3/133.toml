id = "4.3.133"
numericId = "43133"

[en]
simple = """
The affix @deva[अण्] comes in the sense of 'this belongs to them' after @deva[आथर्वणिक], and the penultimate @deva[इक्] is deleted. This overrides @deva[वुञ्].

**Example:** @deva[आथर्वणिकस्य अयम्] → @deva[आथर्वणः धर्मः आम्नायो वा] 'the Law or Tradition of the @[ātharvaṇikas]'

The phrase @deva[चरणाद् धर्माम्नाययोः] is understood here. This rule is essentially a @deva[वार्त्तिक].
"""

standard = """
The affix @deva[अण्] comes after @deva[आथर्वणिक] in the @deva[धर्म]/​@deva[आम्नाय] sense, with deletion of penultimate @deva[इक्], debarring @deva[वुञ्] of @ref[4.3.126].

**Example:** @deva[आथर्वणः] (@deva[आथर्वणिकस्य धर्मः आम्नायो वा])

@deva[चरणाद् धर्माम्नाययोः] continues. This @deva[सूत्र] is a @deva[वार्त्तिक].
"""

advanced = """
This @deva[सूत्र] (as @deva[वार्त्तिक]) prescribes @deva[अण्] after @deva[आथर्वणिक] with @deva[उपधालोप] of @deva[इक्], in the @deva[धर्माम्नाय] sense, debarring @deva[वुञ्] of @ref[4.3.126].

**Example:** @deva[आथर्वणः]

@deva[चरणाद् धर्माम्नाययोः] continues from @ref[4.3.126].
"""

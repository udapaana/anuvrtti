id = "4.3.44"
numericId = "43044"

[en]
simple = """
An affix comes after a word denoting time in the locative case, in the sense of 'sown therein' (@deva[उप्त]).

Examples: @deva[हेमन्ते उप्यन्ते] = @deva[हैमन्ता यवाः] (barley sown in winter), @deva[ग्रैष्मा व्रीहयः] (rice sown in summer).

This rule is separated from @ref[4.3.43] so that the @deva[अनुवृत्ति] of @deva[उप्त] alone continues to the next rule.
"""

standard = """
An affix applies after @deva[कालवाचिन्] (@deva[सप्तम्यन्त]) in @deva[उप्त] (sown therein) sense.

Examples: @deva[हैमन्ता यवाः] (winter-sown barley), @deva[ग्रैष्मा व्रीहयः] (summer-sown rice).

Separation from @ref[4.3.43] enables @deva[अनुवृत्ति] of @deva[उप्त] alone into @ref[4.3.45].
"""

advanced = """
Affixes apply after @deva[कालवाचिन्] in @deva[उप्त] sense.

Examples: @deva[हैमन्ता यवाः], @deva[ग्रैष्मा व्रीहयः].

@deva[योगविभाग] from @ref[4.3.43]: only @deva[उप्त] continues to @ref[4.3.45].
"""

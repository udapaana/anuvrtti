id = "4.3.123"
numericId = "43123"

[en]
simple = """
The affix @deva[अञ्] comes after a word denoting a draught animal, and also after @deva[अध्वर्यु] and @deva[परिषद्], in the sense of 'this belongs to it.' This overrides @deva[अण्].

Here @deva[पत्र] means @deva[वाहन] (vehicle/carrier). When the sense is 'a thing to be carried,' @deva[अञ्] is added to draught-animal words.

**Examples (things suited to be carried by...):**
- @deva[अश्वस्य इदं वहनीयम्] → @deva[आश्वम्] 'a load for a horse'
- @deva[औष्ट्रम्] 'for a camel'
- @deva[गार्दभम्] 'for a donkey'

**Other examples:**
- @deva[आध्वर्यवम्] 'belonging to the Adhvaryu priest'
- @deva[पारिषदम्] 'belonging to an assembly'
"""

standard = """
The affix @deva[अञ्] comes after @deva[पत्र] (draught-animal) words, @deva[अध्वर्यु], and @deva[परिषद्] in the @deva[तस्येदम्] sense, debarring @deva[अण्].

@deva[पत्र] = @deva[वाहन]. The sense here is 'suited to be carried by.'

**@deva[पत्र] examples:** @deva[आश्वम्] (horse-load), @deva[औष्ट्रम्], @deva[गार्दभम्]

**Other:** @deva[आध्वर्यवम्], @deva[पारिषदम्]
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अञ्] after @deva[पत्र] (draught-animal) words, @deva[अध्वर्यु], and @deva[परिषद्] in the @deva[तस्येदम्] sense, as @deva[अपवाद] to @deva[अण्].

@deva[पत्र] = @deva[वाहन]; the derivative means 'suited/intended to be carried.'

**Examples:** @deva[आश्वम्], @deva[औष्ट्रम्], @deva[गार्दभम्]; @deva[आध्वर्यवम्], @deva[पारिषदम्]
"""

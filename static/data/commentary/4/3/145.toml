id = "4.3.145"
numericId = "43145"

[en]
simple = """
The affix @deva[मयट्] comes after the word @deva[गो] (cow) to mean 'its dung.'

**Example:** @deva[गोमयम्] 'cow dung'

Dung is neither a @deva[विकार] (modification) nor an @deva[अवयव] (part) of a cow. This separate rule is needed because the general @deva[विकार]/​@deva[अवयव] sense doesn't cover dung.

Why 'meaning dung'? For other products: @deva[गव्यम्] = milk. Here @deva[यत्] comes by @ref[4.3.160] in the product/part sense (though strictly, milk is neither a true @deva[अवयव] nor @deva[विकार] of @deva[गो]).
"""

standard = """
The affix @deva[मयट्] comes after @deva[गो] in the sense of @deva[शकृत्] (dung).

**Example:** @deva[गोमयम्]

@deva[शकृत्] is neither @deva[विकार] nor @deva[अवयव] of @deva[गो]; hence this separate @deva[सूत्र].

**Restriction:** For other senses: @deva[गव्यम्] (milk) — @deva[यत्] by @ref[4.3.160] (though milk too is technically neither @deva[अवयव] nor @deva[विकार]).
"""

advanced = """
This @deva[सूत्र] teaches @deva[मयट्] after @deva[गो] specifically in the @deva[शकृत्] (dung) sense.

**Example:** @deva[गोमयम्]

@deva[शकृत्] is neither @deva[विकार] nor @deva[अवयव]; hence a separate @deva[सूत्र].

**@deva[शकृद्ग्रहणे किम्]:** For @deva[क्षीर] etc.: @deva[गव्यम्] (@deva[यत्] by @ref[4.3.160])—though @deva[क्षीर] is also not strictly @deva[अवयव]/​@deva[विकार].
"""

id = "4.3.163"
numericId = "43163"

[en]
simple = """
The affix denoting @deva[विकार] (modification) or @deva[अवयव] (part) is deleted by @deva[लुक्] when the product is a fruit (@deva[फल]).

**Examples:**
- @deva[आमलक्याः फलम्] → @deva[आमलकी] + @deva[मयट्] + @deva[लुक्] → @deva[आमलकम्] 'the fruit of the @[āmalakī] tree (myrobalan)'
- @deva[वदरम्] 'jujube fruit'

The fruit is both a @deva[विकार] and an @deva[अवयव] of a fruit-bearing tree.
"""

standard = """
The @deva[विकार]/​@deva[अवयव] affix undergoes @deva[लुक्] when @deva[फल] (fruit) is denoted.

**Examples:** @deva[आमलक्याः फलम्] → @deva[आमलकम्]; @deva[वदरम्]

Fruit is both @deva[विकार] and @deva[अवयव] of the tree.
"""

advanced = """
This @deva[सूत्र] ordains @deva[लुक्] of the @deva[विकार]/​@deva[अवयव] affix when @deva[फल] (fruit) is meant.

**Examples:** @deva[आमलकम्], @deva[वदरम्]

@deva[फल] is both @deva[विकार] and @deva[अवयव] of the tree.
"""

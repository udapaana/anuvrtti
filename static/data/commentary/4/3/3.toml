id = "4.3.3"
numericId = "43003"

[en]
simple = """
When referring to a single individual, @deva[युष्मद्] (you) becomes @deva[तवक] and @deva[अस्मद्] (I) becomes @deva[ममक] before the affixes @deva[खञ्] and @deva[अण्].

Examples: @deva[तावकीनः] (belonging to you, singular), @deva[मामकीनः] (belonging to me). Also @deva[तावकः] and @deva[मामकः]. But with @deva[छ], the forms are @deva[त्वदीयः] (yours) and @deva[मदीयः] (mine).

The term @deva[एकवचने] means 'expressing one individual', not the singular case-affix @deva[सु], since that affix is elided (@deva[लुक्]) after these pronouns.
"""

standard = """
When denoting a single referent, @deva[तवक] and @deva[ममक] substitute for @deva[युष्मद्] and @deva[अस्मद्] before @deva[खञ्] and @deva[अण्].

Examples: @deva[तावकीनः] (thine), @deva[मामकीनः] (mine); @deva[तावकः], @deva[मामकः]. With @deva[छ]: @deva[त्वदीयः], @deva[मदीयः].

The phrase @deva[एकवचने] means @deva[एकार्थे] (denoting one), not the @deva[सु] affix. Since @deva[सु] undergoes @deva[लुक्] after @deva[युष्मद्]/@deva[अस्मद्], if @deva[एकवचने] meant that affix, @ref[1.1.63] (@deva[प्रत्ययलक्षणम्]) would block this rule.
"""

advanced = """
This @[sūtra] provides singular-referent substitutes: @deva[तवक] for @deva[युष्मद्], @deva[ममक] for @deva[अस्मद्], conditioned on @deva[खञ्]/@deva[अण्]].

Derivations: @deva[तवक] + @deva[खञ्] → @deva[तावकीनः]; @deva[ममक] + @deva[अण्] → @deva[मामकः]. With @deva[छ]: @deva[त्वदीयः], @deva[मदीयः].

@deva[एकवचने] = @deva[एकार्थे], not @deva[सु]-@deva[प्रत्यय]. Since @deva[सु] undergoes @deva[लुक्] after these stems, construing @deva[एकवचने] as the affix would invoke @ref[1.1.63] (@deva[न लुमताङ्गस्य]), blocking application.
"""

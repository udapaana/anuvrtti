id = "4.3.5"
numericId = "43005"

[en]
simple = """
The affix @deva[यत्] comes after @deva[अर्ध] (half) when it is preceded by the words @deva[पर] (further), @deva[अवर] (nearer), @deva[अधम] (lowest), or @deva[उत्तम] (highest).

Examples: @deva[परार्ध्यम्] (belonging to the further half), @deva[अवरार्ध्यम्] (belonging to the nearer half), @deva[अधमार्ध्यम्] (belonging to the lowest half), @deva[उत्तमार्ध्यम्] (belonging to the highest half).

The word @deva[पूर्वात्] (preceded by) is used because @deva[पर] and @deva[अवर] have other meanings besides direction, and the @[vārtika] under the previous @[sūtra] would have applied @deva[ठञ्].
"""

standard = """
The affix @deva[यत्] applies after @deva[अर्ध] preceded by @deva[पर], @deva[अवर], @deva[अधम], or @deva[उत्तम].

Examples: @deva[परार्ध्यम्], @deva[अवरार्ध्यम्], @deva[अधमार्ध्यम्], @deva[उत्तमार्ध्यम्].

The term @deva[पूर्वात्] is significant: @deva[पर] and @deva[अवर] have non-directional senses (e.g., @deva[परं सुखम्] 'highest pleasure'). Without this specification, @ref[4.3.6] might apply @deva[ठञ्] when they denote direction. The @deva[वार्त्तिक] @deva[सपूर्वपदात् ठञ्] from @ref[4.3.4] would otherwise govern.
"""

advanced = """
@deva[यत्] is ordained after @deva[अर्ध] when @deva[पूर्वपद] is @deva[पर], @deva[अवर], @deva[अधम], or @deva[उत्तम].

Derivations: @deva[परार्ध्यम्], @deva[अवरार्ध्यम्], @deva[अधमार्ध्यम्], @deva[उत्तमार्ध्यम्].

@deva[पूर्वात्] blocks the @deva[वार्त्तिक] @deva[सपूर्वपदात् ठञ्] from @ref[4.3.4]. It also preempts @ref[4.3.6], which would apply @deva[ठञ्] when @deva[पूर्वपद] is @deva[दिक्]-denoting. Since @deva[पर]/@deva[अवर]] can mean direction (@deva[परा दिक्]) or non-direction (@deva[परं सुखम्]), this @[sūtra] ensures @deva[यत्] applies regardless of sense.
"""

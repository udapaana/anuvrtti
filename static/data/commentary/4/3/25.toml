id = "4.3.25"
numericId = "43025"

[en]
simple = """
The affixes taught previously and hereafter come after a word in the @deva[सप्तमी] (locative) case (7th) in the sense of 'born there', 'grown there', or 'originated there/then'.

This defines one of the @deva[तद्धित] senses: @deva[तत्र जातः] (born therein).

Examples:
• @deva[स्रुघ्ने जातः] = @deva[स्रौघ्नः] (born in Srughna)
• @deva[माथुरः] (born in Mathura)
• @deva[औत्सः] (born in Utsa)
• @deva[औदपानः] (born in @[udapāna])
• @deva[राष्ट्रियः] (@ref[4.2.93]), @deva[अवारपारीणः] (@ref[4.2.93]), @deva[शाकलिकः] (@ref[4.2.117]), @deva[ग्राम्यः] (@ref[4.2.94]), @deva[ग्रामीणः] (@ref[4.2.94]), @deva[कात्रेयकः] (@ref[4.2.95]), @deva[औम्भेयकः] (@ref[4.2.95]).
"""

standard = """
The previously and subsequently taught affixes apply after a @deva[सप्तम्यन्त] (locative) word in the sense @deva[तत्र जातः] (born/grown/originated therein).

This assigns the @deva[तद्धितार्थ] @deva[जात] to the affixes from @ref[4.2.92] onward.

Examples: @deva[स्रुघ्ने जातः] → @deva[स्रौघ्नः]; @deva[माथुरः], @deva[औत्सः], @deva[औदपानः]; @deva[राष्ट्रियः] (@ref[4.2.93]), @deva[अवारपारीणः] (@ref[4.2.93]), @deva[शाकलिकः] (@ref[4.2.117]), @deva[ग्राम्यः] (@ref[4.2.94]), @deva[ग्रामीणः] (@ref[4.2.94]), @deva[कात्रेयकः] (@ref[4.2.95]), @deva[औम्भेयकः] (@ref[4.2.95]).
"""

advanced = """
The affixes from @ref[4.2.92] onward apply after @deva[सप्तम्यन्त] in @deva[तत्र जातः] sense.

Examples: @deva[स्रौघ्नः], @deva[माथुरः], @deva[औत्सः], @deva[औदपानः]; @deva[राष्ट्रियः] (@ref[4.2.93]), @deva[अवारपारीणः] (@ref[4.2.93]), @deva[शाकलिकः] (@ref[4.2.117]), @deva[ग्राम्यः]/@deva[ग्रामीणः]] (@ref[4.2.94]), @deva[कात्रेयकः]/@deva[औम्भेयकः]] (@ref[4.2.95]).

This @deva[अर्थसूत्र] governs the @deva[जात]-sense for @deva[तद्धित]s in this @deva[अधिकार].
"""

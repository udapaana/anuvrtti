id = "4.3.164"
numericId = "43164"

[en]
simple = """
The affix @deva[अण्] comes in the @deva[विकार]/​@deva[अवयव] sense (specifically for fruits) after words in the @deva[प्लक्षादि] list. This overrides @deva[अञ्].

**Examples:** @deva[प्लाक्षम्] 'fig fruit', @deva[नैयग्रोधम्] 'banyan fruit'

**@deva[प्लक्षादि] list:** @deva[प्लक्ष], @deva[न्यग्रोध], @deva[अश्वत्थ], @deva[इङ्गुदी], @deva[शिग्रु], @deva[रुरु], @deva[कक्षतु], @deva[बृहती].
"""

standard = """
The affix @deva[अण्] comes after @deva[प्लक्षादि] words when @deva[फल] (fruit) is meant, debarring @deva[अञ्].

**Examples:** @deva[प्लाक्षम्], @deva[नैयग्रोधम्]

**@deva[प्लक्षादि] @deva[गण] (8):** @deva[प्लक्ष], @deva[न्यग्रोध], @deva[अश्वत्थ], @deva[इङ्गुदी], @deva[शिग्रु], @deva[रुरु], @deva[कक्षतु]/​@deva[कर्कन्धु]/​@deva[कर्कन्तु]/​@deva[ऋक्रतु], @deva[बृहती].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अण्] after @deva[प्लक्षादि] words for @deva[फल], as @deva[अपवाद] to @deva[अञ्].

**Examples:** @deva[प्लाक्षम्], @deva[नैयग्रोधम्]

**@deva[प्लक्षादि] @deva[गण]:** @deva[प्लक्ष], @deva[न्यग्रोध], @deva[अश्वत्थ], @deva[इङ्गुदी], @deva[शिग्रु], @deva[रुरु], @deva[कक्षतु] (@deva[कर्कन्धु], @deva[कर्कन्तु], @deva[ऋक्रतु]), @deva[बृहती].
"""

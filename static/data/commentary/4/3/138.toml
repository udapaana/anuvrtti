id = "4.3.138"
numericId = "43138"

[en]
simple = """
The affix @deva[अण्] with the augment @deva[षुक्] comes in the sense of 'modification' after @deva[त्रपु] (tin) and @deva[जतु] (lac). This overrides @deva[अञ्].

**Examples:**
- @deva[त्रपुणः विकारः] → @deva[त्रापुषम्] 'product made from tin'
- @deva[जातुषम्] 'product made from lac'

Since @deva[त्रपु] and @deva[जतु] are non-living substances, the @deva[अवयव] (part) sense doesn't apply — only @deva[विकार] (modification).
"""

standard = """
The affix @deva[अण्] with @deva[षुक्] augment comes after @deva[त्रपु] and @deva[जतु] in the @deva[विकार] sense, debarring @deva[अञ्] of @ref[4.3.139].

**Examples:** @deva[त्रापुषम्], @deva[जातुषम्]

These denote non-organic substances; @deva[अवयव] sense doesn't apply.
"""

advanced = """
This @deva[सूत्र] prescribes @deva[षुगण्] (@deva[अण्] with @deva[षुक्]) after @deva[त्रपु] and @deva[जतु] in the @deva[विकार] sense, as @deva[अपवाद] to @deva[अञ्] of @ref[4.3.139].

**Examples:** @deva[त्रापुषम्], @deva[जातुषम्]

Being @deva[अचेतन], only @deva[विकार] (not @deva[अवयव]) applies.
"""

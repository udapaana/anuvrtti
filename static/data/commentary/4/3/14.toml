id = "4.3.14"
numericId = "43014"

[en]
simple = """
The affix @deva[ठञ्] optionally comes after the words @deva[निशा] (night) and @deva[प्रदोष] (evening/dusk).

By the previous rule @ref[4.3.11], @deva[ठञ्] would be obligatory for time-words. This rule makes it optional, allowing @deva[अण्] as well.

Examples: @deva[नैशम्] or @deva[नैशिकम्] (nocturnal), @deva[प्रादोषम्] or @deva[प्रादोषिकम्] (relating to dusk).
"""

standard = """
The affix @deva[ठञ्] optionally applies after @deva[निशा] and @deva[प्रदोष], where @ref[4.3.11] would make @deva[ठञ्] obligatory. This permits @deva[अण्] as an alternative.

Examples: @deva[नैशम्] / @deva[नैशिकम्] (nocturnal); @deva[प्रादोषम्] / @deva[प्रादोषिकम्] (pertaining to dusk).
"""

advanced = """
@deva[ठञ्] is made optional after @deva[निशा] and @deva[प्रदोष], where @ref[4.3.11] (@deva[कालात्]) would ordinarily mandate it.

Examples: @deva[नैशम्] (with @deva[अण्]) / @deva[नैशिकम्] (with @deva[ठञ्]); @deva[प्रादोषम्] / @deva[प्रादोषिकम्].
"""

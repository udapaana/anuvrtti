id = "4.3.167"
numericId = "43167"

[en]
simple = """
The fruit-denoting affix is deleted by @deva[लुप्] after words in the @deva[हरीतक्यादि] list.

With @deva[लुप्], there is gender concordance (@ref[1.2.51]).

**Examples:**
- @deva[हरीतक्याः फलम्] → @deva[हरीतकी] (not @deva[हरीतकम्])
- @deva[कोशातकी], @deva[नखरजनी]

According to @[patañjali], concordance is in gender only; number follows the sense: @deva[हरीतकी फलम्] (singular), @deva[हरीतक्यः फलानि] (plural).

**@deva[हरीतक्यादि] list:** @deva[हरीतकी], @deva[कोशातकी], @deva[नखरजनी], @deva[शष्कण्डी], @deva[दाडी], @deva[दोडी], @deva[श्वेतपाकी], @deva[अर्जुनपाकी], @deva[द्राक्षा], @deva[काला], @deva[ध्वाक्षा], @deva[गभीका], @deva[कण्टकारिका], @deva[पिप्पली], @deva[चिञ्चा], @deva[शेफालिका], @deva[दडी].
"""

standard = """
The @deva[फल]-affix undergoes @deva[लुप्] after @deva[हरीतक्यादि] words, with gender concordance (@ref[1.2.51]).

**Examples:** @deva[हरीतकी], @deva[कोशातकी], @deva[नखरजनी]

Per @[patañjali]: gender concordance only; number by sense: @deva[हरीतकी फलम्], @deva[हरीतक्यः फलानि].

**@deva[हरीतक्यादि] @deva[गण] (17):** @deva[हरीतकी], @deva[कोशातकी], @deva[नखरजनी]/​@deva[नखररजनी], @deva[शष्कण्डी]/​@deva[शाकण्डी], @deva[दाडी], @deva[दोडी], @deva[श्वेतपाकी], @deva[अर्जुनपाकी], @deva[द्राक्षा], @deva[काला], @deva[ध्वाक्षा]/​@deva[ध्वाङ्क्षा], @deva[गभीका]/​@deva[गर्गरिका], @deva[कण्टकारिका], @deva[पिप्पली], @deva[चिञ्चा]/​@deva[चिम्पा], @deva[शेफालिका], @deva[दडी].
"""

advanced = """
This @deva[सूत्र] ordains @deva[लुप्] of @deva[फल]-affixes after @deva[हरीतक्यादि], with @deva[लिङ्गसाधारण्य] (@ref[1.2.51]).

**Examples:** @deva[हरीतकी], @deva[कोशातकी], @deva[नखरजनी]

Per @[patañjali]: @deva[लिङ्ग]-concordance only; @deva[संख्या] by @deva[अर्थ]: @deva[हरीतकी फलम्], @deva[हरीतक्यः फलानि].

**@deva[हरीतक्यादि] @deva[गण]:** @deva[हरीतकी], @deva[कोशातकी], @deva[नखरजनी] (@deva[नखररजनी]), @deva[शष्कण्डी] (@deva[शाकण्डी]), @deva[दाडी], @deva[दोडी], @deva[श्वेतपाकी], @deva[अर्जुनपाकी], @deva[द्राक्षा], @deva[काला], @deva[ध्वाक्षा] (@deva[ध्वाङ्क्षा]), @deva[गभीका] (@deva[गर्गरिका]), @deva[कण्टकारिका], @deva[पिप्पली], @deva[चिञ्चा] (@deva[चिम्पा]), @deva[शेफालिका], @deva[दडी].
"""

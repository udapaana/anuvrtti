id = "4.3.107"
numericId = "43107"

[en]
simple = """
The affix denoting 'enounced by him' is deleted (@deva[लुक्]) after the words @deva[कठ] and @deva[चरक].

@deva[कठ] would normally take @deva[णिनि] (as a pupil of @[vaiśampāyana]), and @deva[चरक] would take @deva[अण्]. Both affixes are elided.

**Examples:**
- @deva[कठाः] 'those who study the Veda taught by @[kaṭha]' (no affix visible)
- @deva[चरकाः] 'those who study the teaching of Caraka'

This applies only to Vedic works. For secular verses: @deva[काठाः श्लोकाः], @deva[चारकाः श्लोकाः] (with regular affixes).
"""

standard = """
The @deva[प्रोक्त]-sense affix undergoes @deva[लुक्] (deletion) after @deva[कठ] and @deva[चरक].

@deva[कठ] would take @deva[णिनि] by @ref[4.3.104] (as @deva[वैशम्पायनान्तेवासी]); @deva[चरक] would take @deva[अण्]. Both are elided.

**Examples:** @deva[कठाः], @deva[चरकाः] (students of their respective Vedic teachings)

**@deva[छन्दसि] restriction:** For @deva[श्लोक] (secular verses): @deva[काठाः श्लोकाः], @deva[चारकाः श्लोकाः]—regular affixes apply.
"""

advanced = """
This @deva[सूत्र] ordains @deva[लुक्] of the @deva[प्रोक्त]-sense affix after @deva[कठ] and @deva[चरक].

@deva[कठ] is a @deva[वैशम्पायनान्तेवासी], hence would take @deva[णिनि] by @ref[4.3.104]. @deva[चरक] would take @deva[अण्] by @ref[4.1.83].

**Examples:** @deva[कठाः], @deva[चरकाः]

**@deva[छन्दसि] continues:** The @deva[लुक्] applies only in @deva[छन्दस्] context. For @deva[श्लोक]: @deva[काठाः श्लोकाः], @deva[चारकाः श्लोकाः].
"""

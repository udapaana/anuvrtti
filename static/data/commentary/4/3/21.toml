id = "4.3.21"
numericId = "43021"

[en]
simple = """
In Vedic literature (@deva[छन्दस्]), the affix @deva[ठञ्] comes after @deva[हेमन्त] (winter) in the remaining senses.

This replaces @deva[अण्] from @ref[4.3.16].

Example: @deva[सहश्च सहस्यश्च हैमन्तिकावृतू] (Saha and Sahasya are the two winter months).

Rules @ref[4.3.20] and @ref[4.3.21] are kept separate so that the next rule (@ref[4.3.22]) can continue only @deva[हेमन्त] by @deva[अनुवृत्ति].
"""

standard = """
In @deva[छन्दस्], @deva[ठञ्] applies after @deva[हेमन्त] in @deva[शेष] senses, debarring @deva[ऋतु]-@deva[अण्] (@ref[4.3.16]).

Example: @deva[सहश्च सहस्यश्च हैमन्तिकावृतू].

This @[sūtra] is separated from @ref[4.3.20] so @deva[हेमन्त] alone continues to @ref[4.3.22] by @deva[अनुवृत्ति].
"""

advanced = """
In @deva[छन्दस्], @deva[ठञ्] supersedes @deva[ऋतु]-@deva[अण्] (@ref[4.3.16]) after @deva[हेमन्त].

Example: @deva[सहश्च सहस्यश्च हैमन्तिकावृतू].

@deva[योगविभाग] from @ref[4.3.20]: only @deva[हेमन्त] carries to @ref[4.3.22].
"""

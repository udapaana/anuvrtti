id = "4.3.117"
numericId = "43117"

[en]
simple = """
An affix comes after a word in the @deva[तृतीया] (instrumental) case to mean 'made by him,' when the resulting word is a proper name.

**Examples:** Words for 'honey' (literally 'made by bees'):
- @deva[मक्षिकाभिः कृतम्] → @deva[माक्षिकम्] 'honey' (made by @deva[मक्षिका], a bee)
- @deva[कार्मुकम्], @deva[सारघम्], @deva[पौत्तिकम्] (from @deva[सरघा] and @deva[पुत्तिका], other words for 'bee')

Derivation: @deva[मक्षिका] + @deva[अण्] → @deva[माक्षिक] (by @ref[6.4.148]).

The @deva[ग्रन्थ] (book) condition from the previous rule does not apply here—this is about names for substances.
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) comes after a word in @deva[तृतीया] in the @deva[कृत] sense when the derivative is a @deva[संज्ञा] (proper name).

**Examples (names for honey):**
- @deva[मक्षिकाभिः कृतम्] → @deva[माक्षिकम्]
- @deva[कार्मुकम्], @deva[सारघम्], @deva[पौत्तिकम्]

@deva[मक्षिका], @deva[सरघा], @deva[पुत्तिका] = different words for 'bee.'

Derivation: @deva[मक्षिका] + @deva[अण्] → @deva[माक्षिक] by @ref[6.4.148].

The @deva[ग्रन्थे] restriction of @ref[4.3.116] does not continue.
"""

advanced = """
This @deva[सूत्र] teaches @deva[कृत] sense with @deva[संज्ञा] (proper name) as result, distinct from @deva[ग्रन्थ] (@ref[4.3.116]).

**Examples:** @deva[माक्षिकम्], @deva[कार्मुकम्], @deva[सारघम्], @deva[पौत्तिकम्] (all names for honey, 'made by bees').

@deva[मक्षिका], @deva[सरघा], @deva[पुत्तिका] = bee.

Derivation: @deva[मक्षिका] + @deva[अण्] → @deva[माक्षिक] by @ref[6.4.148].

The @deva[अनुवृत्ति] of @deva[ग्रन्थ] ceases.
"""

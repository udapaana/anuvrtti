id = "4.3.129"
numericId = "43129"

[en]
simple = """
The affix @deva[ञ्य] comes in the sense of 'this is their Law or Tradition' after the words @deva[छान्दोग], @deva[औक्थिक], @deva[याज्ञिक], @deva[बह्वृच], and @deva[नट]. This overrides @deva[अण्] and @deva[वुञ्].

The phrase @deva[चरणाद् धर्माम्नाययोः] ('from a school, in the sense of law or tradition') continues from @ref[4.3.126] and applies even to @deva[नट].

**Examples:**
- @deva[छन्दोगानां धर्मः वा आम्नायो वा] → @deva[छान्दोग्यम्] 'the Law or Tradition of the @[chāndogas]'
- @deva[औक्थिक्यम्], @deva[याज्ञिक्यम्], @deva[बाह्वृच्यम्], @deva[नाट्यम्]

Without this sense: @deva[छान्दोगं कुलम्] 'the family of @[chāndoga]' (with @deva[अण्], not @deva[ञ्य]).
"""

standard = """
The affix @deva[ञ्य] comes after @deva[छान्दोग], @deva[औक्थिक], @deva[याज्ञिक], @deva[बह्वृच], and @deva[नट] in the @deva[धर्म]/​@deva[आम्नाय] sense, debarring @deva[अण्] and @deva[वुञ्].

The @deva[अनुवृत्ति] of @deva[संघ] etc. ceases; @deva[चरणाद् धर्माम्नाययोः] from @ref[4.3.126] applies even to @deva[नट].

**Examples:** @deva[छान्दोग्यम्], @deva[औक्थिक्यम्], @deva[याज्ञिक्यम्], @deva[बाह्वृच्यम्], @deva[नाट्यम्]

**Counter-example:** @deva[छान्दोगं कुलम्] (not @deva[धर्म]/​@deva[आम्नाय] sense).
"""

advanced = """
This @deva[सूत्र] prescribes @deva[ञ्य] after @deva[छान्दोग], @deva[औक्थिक], @deva[याज्ञिक], @deva[बह्वृच], @deva[नट] in the @deva[धर्म]/​@deva[आम्नाय] sense, debarring @deva[अण्] and @deva[वुञ्].

The @deva[अनुवृत्ति] of @deva[संघ] etc. stops; @deva[चरणाद् धर्माम्नाययोः] from @ref[4.3.126] extends to @deva[नट].

**Examples:** @deva[छान्दोग्यम्], @deva[औक्थिक्यम्], @deva[याज्ञिक्यम्], @deva[बाह्वृच्यम्], @deva[नाट्यम्]

**Non-@deva[धर्माम्नाय]:** @deva[छान्दोगं कुलम्].
"""

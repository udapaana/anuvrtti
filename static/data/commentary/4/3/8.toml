id = "4.3.8"
numericId = "43008"

[en]
simple = """
The affix @deva[म] comes after @deva[मध्य] (middle) in the remaining senses, replacing @deva[अण्].

Example: @deva[मध्यमः] means 'middlemost' or 'belonging to the middle'.

Supplementary rules (@deva[वार्त्तिक]):
• After @deva[आदि] (beginning): @deva[आदिमः] (first, primordial).
• After @deva[अवस्] (below) and @deva[अधस्] (under): the final @deva[स्] is dropped, giving @deva[अवमम्] (lowest) and @deva[अधमम्] (lowest).
"""

standard = """
The affix @deva[म] applies after @deva[मध्य] in @deva[शेष] senses, debarring @deva[अण्].

Example: @deva[मध्यमः] (middlemost).

@note[type=@[vārtika]]: After @deva[आदि]: @deva[आदिमः] (primordial).
@note[type=@[vārtika]]: After @deva[अवस्] and @deva[अधस्], with @deva[स्]-@deva[लोप]: @deva[अवमम्], @deva[अधमम्].
"""

advanced = """
@deva[म] is ordained after @deva[मध्य] in @deva[शेष] senses, superseding @deva[अण्].

Example: @deva[मध्यमः].

@note[type=@[vārtika]]: @deva[आदेश्च]—@deva[आदिमः].
@note[type=@[vārtika]]: @deva[अवसोऽधसश्च सलोपश्च]—@deva[अवमम्], @deva[अधमम्], with @deva[स्]-elision.
"""

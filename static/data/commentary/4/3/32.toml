id = "4.3.32"
numericId = "43032"

[en]
simple = """
The affix @deva[कन्] comes after @deva[सिन्धु] (the Indus river) and @deva[अपकर] (a place name) in the sense of 'born therein'.

@deva[सिन्धु] is in the @deva[कच्छादि] class and would take @deva[अण्] and @deva[वुञ्] by @ref[4.2.133]. @deva[अपकर] would take general @deva[अण्]. This rule replaces both.

Examples: @deva[सिन्धुकः] (born in Sindhu), @deva[अपकरकः] (born in Apakara).
"""

standard = """
The affix @deva[कन्] applies after @deva[सिन्धु] and @deva[अपकर] in @deva[जात]-sense, debarring @deva[अण्]/@deva[वुञ्]] (@ref[4.2.133]) for @deva[सिन्धु] and general @deva[अण्] for @deva[अपकर].

Examples: @deva[सिन्धुकः], @deva[अपकरकः].
"""

advanced = """
@deva[कन्] is ordained after @deva[सिन्धु] (@deva[कच्छादि], @ref[4.2.133]) and @deva[अपकर] in @deva[जात]-sense, superseding @deva[अण्]/@deva[वुञ्]] and general @deva[अण्] respectively.

Examples: @deva[सिन्धुकः], @deva[अपकरकः].
"""

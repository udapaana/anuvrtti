id = "4.3.95"
numericId = "43095"

[en]
simple = """
An affix (from the @deva[प्राग्दीव्यतोऽण्] set, @ref[4.1.83]) comes after a word in the first case (@deva[प्रथमा] (nominative)) to mean 'this is his object of devotion or love.'

The word @deva[भक्ति] here means 'worshipping,' 'serving,' or 'loving.'

**Example:** @deva[स्रुघ्नः भक्तिः अस्य] ('Srughna is his object of devotion') → @deva[स्रौघ्नः] 'one devoted to Srughna'

Other examples: @deva[माथुरः] (devoted to @[mathurā]), @deva[राष्ट्रियः] (devoted to the kingdom)

Note: The @deva[अनुवृत्ति] of @deva[अभिजनः] ceases here. The words @deva[सः] and @deva[अस्य] must be supplied.
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) comes after a word in the @deva[प्रथमा विभक्ति] (nominative) in the sense of @deva[भक्ति] (devotion, worship, or love).

**Example:** @deva[स्रुघ्नः भक्तिः अस्य] → @deva[स्रौघ्नः] 'one devoted to Srughna'

Other examples: @deva[माथुरः], @deva[राष्ट्रियः]

The @deva[अनुवृत्ति] of @deva[अभिजनः] from earlier @deva[सूत्र]s ceases. The construction requires @deva[सः] and @deva[अस्य] to be read in.
"""

advanced = """
This @deva[सूत्र] introduces a new @deva[अर्थ]—@deva[भक्ति] (devotion, worship, love)—for the @deva[प्राग्दीव्यतोऽण्] affixes (@ref[4.1.83]).

The @deva[प्रातिपदिक] stands in @deva[प्रथमा विभक्ति] in the @deva[योग] (syntactic construction). The @deva[अनुवृत्ति] of @deva[अभिजनः] stops here; instead, @deva[सः भक्तिः अस्य] ('that is his object of devotion') must be supplied.

**Examples:** @deva[स्रुघ्नः भक्तिः अस्य] → @deva[स्रौघ्नः]; @deva[माथुरः], @deva[राष्ट्रियः]
"""

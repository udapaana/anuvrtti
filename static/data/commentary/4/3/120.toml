id = "4.3.120"
numericId = "43120"

[en]
simple = """
An affix (from the @deva[प्राग्दीव्यतोऽण्] set, @ref[4.1.83]) comes after a word in the genitive (sixth) case to mean 'this belongs to him.'

The five universal affixes @deva[अण्] etc. (@ref[4.1.83]) and the @deva[घ] etc. affixes (@ref[4.2.93]) apply in this sense.

**Examples:**
- @deva[उपगोः इदम्] → @deva[औपगवम्] 'belonging to Upagu'
- @deva[कापटवम्], @deva[राष्ट्रियम्], @deva[अवारपारीणम्]

The affixes do not apply when the possessed item is @deva[अनन्तर] etc. Thus: @deva[देवदत्तस्य अनन्तरम्] (no affix). The possessed thing should be property, village, kingdom, or dependents.

**@[vārtikas]:**
1. The verb @deva[वह्] takes @deva[तृ] and @deva[अण्] with @deva[इट्]: @deva[सवोढुः स्वम्] → @deva[सांवहित्रम्]
2. @deva[रञ्] comes after @deva[अग्नीध्] meaning 'house'; the base is @deva[भ]-designated: @deva[अग्नीध्रम्] (the @deva[ध] doesn't change to @deva[द] by @ref[8.2.39])
3. @deva[श्येन्यन्] comes after @deva[समिध्] meaning 'placing': @deva[सामिधेन्यः मन्त्रः] (verses recited while placing fuel on fire), @deva[सामिधेनी ऋक्] (@ref[4.1.41])
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) and @deva[घादि] (@ref[4.2.93]) comes after a word in @deva[षष्ठी] in the sense @deva[तस्येदम्] ('this belongs to him').

**Examples:** @deva[औपगवम्], @deva[कापटवम्], @deva[राष्ट्रियम्], @deva[अवारपारीणम्]

**Restriction:** The possessed item must be property, village, kingdom, or dependents—not @deva[अनन्तर] etc. Thus: @deva[देवदत्तस्य अनन्तरम्] (no affix).

**@[vārtikas]:**
1. @deva[वह्] + @deva[तृ] + @deva[इट्] + @deva[अण्] → @deva[सांवहित्रम्] (@deva[सवोढुः स्वम्])
2. @deva[अग्नीध्] + @deva[रञ्] = @deva[अग्नीध्रम्] (house); @deva[भ]-designation blocks @ref[8.2.39]
3. @deva[समिध्] + @deva[श्येन्यन्] = @deva[सामिधेनी] (verses for placing fuel); see @ref[4.1.41]
"""

advanced = """
This @deva[सूत्र] introduces the @deva[तस्येदम्] (possession) sense for @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) and @deva[घादि] (@ref[4.2.93]) affixes, with @deva[षष्ठी] case.

**Examples:** @deva[औपगवम्], @deva[कापटवम्], @deva[राष्ट्रियम्], @deva[अवारपारीणम्]

**Restriction:** The possessed must be @deva[स्व] (property), @deva[ग्राम], @deva[राष्ट्र], or @deva[जन]—not @deva[अनन्तर] etc.: @deva[देवदत्तस्य अनन्तरम्].

**@[vārtikas]:**
1. @deva[वह्] + @deva[तृ]/​@deva[तृण्]/​@deva[तृच्] + @deva[इट्] + @deva[अण्] → @deva[सांवहित्रम्]
2. @deva[अग्नीध्] + @deva[रञ्] → @deva[अग्नीध्रम्] (house); @deva[भ]-@deva[संज्ञा] blocks @deva[ध] → @deva[द] (@ref[8.2.39])
3. @deva[समिध्] + @deva[श्येन्यन्] → @deva[सामिधेनी] (fuel-placing mantras); @deva[सामिधेनी ऋक्] by @ref[4.1.41]
"""

id = "4.3.97"
numericId = "43097"

[en]
simple = """
The affix @deva[ठञ्] comes after @deva[महाराज] to mean 'this is his object of devotion.' This overrides @deva[अण्].

**Example:** @deva[महाराजः भक्तिः अस्य] → @deva[माहाराजिकः] 'one who serves or loves the @[mahārāja]'

The difference between @deva[ठञ्] (this rule) and @deva[ठक्] (previous rule) is only in accent.
"""

standard = """
The affix @deva[ठञ्] comes after @deva[महाराज] in the @deva[भक्ति] sense, debarring @deva[अण्].

**Example:** @deva[माहाराजिकः] 'one devoted to the @[mahārāja]'

The distinction between @deva[ठञ्] and @deva[ठक्] (@ref[4.3.96]) lies in accent only.
"""

advanced = """
This @deva[सूत्र] prescribes @deva[ठञ्] specifically after @deva[महाराज] in the @deva[भक्ति] sense. It debars @deva[अण्] from @ref[4.1.83].

**Example:** @deva[माहाराजिकः]

The difference between @deva[ठञ्] and @deva[ठक्] (@ref[4.3.96]) is accentual: @deva[ठञ्] has @deva[ञ्] as @deva[इत्] for accent purposes.
"""

id = "4.3.153"
numericId = "43153"

[en]
simple = """
The affix @deva[अण्] comes after words meaning 'gold' (@deva[जातरूप] etc.) when the product is a weight or measure. This overrides @deva[मयट्] etc.

The plural @deva[जातरूपेभ्यः] in the rule indicates all gold-synonyms are included.

**Examples:**
- @deva[हाटकः निष्कः] 'a gold @[niṣka] (a measure)'
- @deva[हाटकं कार्षापणम्], @deva[जातरूपम्], @deva[तापनीयम्]

Why 'meaning a measure'? For non-measures: @deva[यष्टिरियं हाटकमयी] 'this staff is made of gold' (with @deva[मयट्]).
"""

standard = """
The affix @deva[अण्] comes after gold-denoting words (@deva[जातरूप] etc.) when @deva[परिमाण] (measure/weight) is meant, debarring @deva[मयट्] etc.

The plural @deva[जातरूपेभ्यः] includes all gold-synonyms.

**Examples:** @deva[हाटकः निष्कः], @deva[हाटकं कार्षापणम्], @deva[जातरूपम्], @deva[तापनीयम्]

**@deva[परिमाणे]:** Non-measure: @deva[यष्टिरियं हाटकमयी] (with @deva[मयट्]).
"""

advanced = """
This @deva[सूत्र] teaches @deva[अण्] after @deva[जातरूप]-synonyms (gold words) when @deva[परिमाण] (measure) is meant, debarring @deva[मयट्] etc.

The @deva[बहुवचन] (@deva[जातरूपेभ्यः]) indicates all synonyms.

**Examples:** @deva[हाटकः निष्कः], @deva[हाटकं कार्षापणम्], @deva[जातरूपम्], @deva[तापनीयम्]

**@deva[परिमाणे] condition:** @deva[यष्टिरियं हाटकमयी] (non-measure, with @deva[मयट्]).
"""

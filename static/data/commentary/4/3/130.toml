id = "4.3.130"
numericId = "43130"

[en]
simple = """
The affix @deva[वुञ्] is not used after a @deva[गोत्र] (family/patronymic) word when it denotes beginner students (@deva[दण्डमाणव]) or boarding students (@deva[अन्तेवासिन्]).

@deva[दण्डमाणव] means a young student whose only sign of studentship is the rod (@deva[दण्ड]) — a mere beginner. @deva[अन्तेवासिन्] means pupils who reside in their teacher's house.

**Examples:**
- @deva[दाक्षाः] 'the junior or senior pupils of @[dakṣi]' (with @deva[अण्], not @deva[वुञ्])
- @deva[माहकाः]
- @deva[गौकक्षाः दण्डमाणवाः] or @deva[अन्तेवासिनो वा]
"""

standard = """
The affix @deva[वुञ्] (@ref[4.3.126]) does not apply to @deva[गोत्र] words when the meaning is @deva[दण्डमाणव] (beginner pupil) or @deva[अन्तेवासिन्] (boarding pupil).

@deva[दण्डमाणव] = a @deva[माणव] whose @deva[दण्ड] is the only sign of studentship — a beginner. (@deva[न] → @deva[ण] by @ref[4.1.161] @deva[कारिका].)

@deva[अन्तेवासिन्] = resident pupils.

**Examples:** @deva[दाक्षाः], @deva[माहकाः]; @deva[गौकक्षाः दण्डमाणवाः अन्तेवासिनो वा]
"""

advanced = """
This @deva[सूत्र] blocks @deva[वुञ्] (@ref[4.3.126]) after @deva[गोत्र] words when the referent is @deva[दण्डमाणव] or @deva[अन्तेवासिन्].

@deva[दण्डमाणव] = beginner pupil (whose @deva[दण्ड] is the sole mark of studentship). @deva[न] → @deva[ण] per @ref[4.1.161] @deva[कारिका].

@deva[अन्तेवासिन्] = boarding pupil.

**Examples:** @deva[दाक्षाः], @deva[माहकाः]; @deva[गौकक्षाः दण्डमाणवाः अन्तेवासिनो वा]
"""

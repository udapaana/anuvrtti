id = "4.3.115"
numericId = "43115"

[en]
simple = """
An affix (from the @deva[प्राग्दीव्यतोऽण्] set) comes after a word in the instrumental case to mean 'discovered by him.'

The word @deva[उपज्ञात] means knowledge discovered by oneself without being taught—an intuition or self-taught discovery.

**Examples:**
- @deva[पाणिनिना उपज्ञातम्] → @deva[पाणिनीयम् अकालकं व्याकरणम्] 'the grammar discovered by @[pāṇini]'
- @deva[काशकृत्स्नम् गुरुलाघवम्] 'the science of weights (or economics) discovered by @[kāśakṛtsna]'
- @deva[आपिशलम् दुष्करणम्] 'the work called @[duṣkaraṇa] discovered by @[āpiśala]'

@[pāṇini]'s grammar is called @deva[अकालक] because it doesn't define tenses (@deva[काल]). @deva[गुरुलाघव] is the science of weighing options. @deva[दुष्करण] is a grammar named after its technical term @deva[दुषू].
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) comes after a word in @deva[तृतीया] in the @deva[उपज्ञात] (discovered) sense.

@deva[उपज्ञात] = knowledge acquired by oneself without being taught; intuition or original discovery.

**Examples:**
- @deva[पाणिनीयम् अकालकं व्याकरणम्] (@[pāṇini]'s grammar)
- @deva[काशकृत्स्नम् गुरुलाघवम्] (@[kāśakṛtsna]'s work on weighing methods)
- @deva[आपिशलम् दुष्करणम्] (@[āpiśala]'s grammar)

**Terminology:**
- @deva[अकालक]: doesn't define @deva[काल] (tenses)
- @deva[गुरुलाघव]: science of weighing options (@deva[यत्र उपायानां गौरवं लाघवं च चिन्त्यते])
- @deva[दुष्करण]: named for its technical term @deva[दुषू]; some say it means @deva[कामशास्त्र]

Compare @ref[2.4.21].
"""

advanced = """
This @deva[सूत्र] introduces the @deva[उपज्ञात] sense for @deva[प्राग्दीव्यतोऽण्] affixes (@ref[4.1.83]), with the base in @deva[तृतीया].

@deva[उपज्ञात] = self-discovered knowledge (intuition), as opposed to @deva[प्रोक्त] (transmitted teaching) or @deva[कृत] (composed work).

**Examples:**
- @deva[पाणिनीयम् अकालकं व्याकरणम्]
- @deva[काशकृत्स्नम् गुरुलाघवम्]
- @deva[आपिशलम् दुष्करणम्]

**Terminology:**
- @deva[अकालक]: lacks @deva[काल]-definitions
- @deva[गुरुलाघव]: @deva[यत्र उपायानां गौरवं लाघवं च चिन्त्यते] (weighing pros/cons)
- @deva[दुष्करण]: grammar with @deva[दुषू] as @deva[संज्ञा]; alternatively, @deva[कामशास्त्र]

See also @ref[2.4.21].
"""

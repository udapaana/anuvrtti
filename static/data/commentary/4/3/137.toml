id = "4.3.137"
numericId = "43137"

[en]
simple = """
The affix @deva[अण्] comes in the sense of 'modification or part' after a word that has @deva[क्] as its penultimate consonant. This overrides @deva[अञ्].

**Examples:**
- @deva[तर्कु] → @deva[तार्कवम्]
- @deva[तित्तिडीक] → @deva[तैत्तिडीकम्]
- @deva[माण्डूकम्], @deva[दार्दुरकम्], @deva[माधूकम्]

Words like @deva[तित्तिडीक] have acute accent on the middle syllable (by @[phiṭ-sūtra] II.16).
"""

standard = """
The affix @deva[अण्] comes after words with @deva[क्] as @deva[उपधा] (penultimate) in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[अञ्].

**Examples:** @deva[तार्कवम्] (from @deva[तर्कु]), @deva[तैत्तिडीकम्], @deva[माण्डूकम्], @deva[दार्दुरकम्], @deva[माधूकम्]

@deva[तित्तिडीक] etc. have @deva[मध्योदात्त] by @[phiṭ-sūtra] II.16.
"""

advanced = """
This @deva[सूत्र] teaches @deva[अण्] after @deva[कोपधा] (penultimate @deva[क्]) words in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[अञ्].

**Examples:** @deva[तार्कवम्], @deva[तैत्तिडीकम्], @deva[माण्डूकम्], @deva[दार्दुरकम्], @deva[माधूकम्]

@deva[तित्तिडीक] etc.: @deva[मध्योदात्त] per @[phiṭ-sūtra] II.16.
"""

id = "4.3.103"
numericId = "43103"

[en]
simple = """
The affix @deva[णिनि] comes in the @deva[प्रोक्त] (enounced) sense after the words @deva[काश्यप] and @deva[कौशिक], when they denote Vedic seers (@deva[ऋषि]s). This overrides @deva[छ].

The @deva[ण्] in @deva[णिनि] causes @deva[वृद्धि] of the first vowel.

**Examples:**
- @deva[काश्यपेन प्रोक्तम्] → @deva[काश्यपिनः] 'those who study the Kalpa taught by the seer @[kāśyapa]'
- @deva[कौशिकिनः] 'those who study the work taught by @[kauśika]'

Like the previous rule, this applies only to Vedic works.

Why 'Vedic seers'? For a modern person of the @[kāśyapa] gotra: @deva[इदानीन्तनेन गोत्रकाश्यपेन प्रोक्तम्] → @deva[काश्यपीयम्] (with @deva[छ], not @deva[णिनि]).
"""

standard = """
The affix @deva[णिनि] comes after @deva[काश्यप] and @deva[कौशिक] in the @deva[प्रोक्त] sense when they denote @deva[ऋषि]s (Vedic seers). This debars @deva[छ].

The @deva[ण्] causes @deva[वृद्धि].

**Examples:** @deva[काश्यपिनः], @deva[कौशिकिनः]

Restricted to Vedic works, as with @ref[4.3.102].

**Counter-example:** A modern @deva[गोत्र]-@[kāśyapa]: @deva[इदानीन्तनेन गोत्रकाश्यपेन प्रोक्तम्] → @deva[काश्यपीयम्] (with @deva[छ]).
"""

advanced = """
This @deva[सूत्र] teaches @deva[णिनि] after @deva[काश्यप] and @deva[कौशिक] in the @deva[प्रोक्त] sense, restricted to @deva[ऋषि]s (Vedic seers). It debars @deva[छ].

The @deva[ण्] in @deva[णिनि] triggers @deva[वृद्धि] (relevant for the subsequent @deva[सूत्र]).

**Examples:** @deva[काश्यपिनः], @deva[कौशिकिनः]

**Restriction:** @deva[ऋषिभ्यः]—only ancient seers, not modern @deva[गोत्र] members. Counter-example: @deva[इदानीन्तनेन गोत्रकाश्यपेन प्रोक्तम्] → @deva[काश्यपीयम्] (with @deva[छ]).
"""

id = "4.3.67"
numericId = "43067"

[en]
simple = """
The affix @deva[ठञ्] comes in the senses of 'staying therein' and 'a commentary thereon' after a polysyllabic word (@deva[बह्वच्]) with @deva[उदात्त] (acute accent) on the final.

This replaces @deva[अण्].

Examples: @deva[षात्वणत्विकम्] (a commentary on @deva[ष]-@deva[ण] substitution rules), @deva[नातानतिकम्] (a commentary on @deva[उदात्त] and @deva[अनुदात्त] accents). These compounds have final accent by @ref[6.1.169].

Why @deva[बह्वच्] (polysyllabic)? Observe @deva[सौपम्], @deva[तैङम्]—two syllables take @deva[ठक्] (@ref[4.3.72]).

Why @deva[अन्तोदात्त] (final accent)? Observe @deva[सांहितम्] from @deva[संहिता]—initial accent by @ref[6.2.49].
"""

standard = """
The affix @deva[ठञ्] applies after @deva[बह्वच्] (polysyllabic) @deva[अन्तोदात्त] words in @deva[व्याख्यातव्य] context, debarring @deva[अण्].

Examples: @deva[षात्वणत्विकम्], @deva[नातानतिकम्]—final accent by @ref[6.1.169].

Conditions: @deva[बह्वच्]—counter: @deva[सौपम्] (2 syllables → @deva[ठक्] @ref[4.3.72]). @deva[अन्तोदात्त]—counter: @deva[सांहितम्] (initial accent by @ref[6.2.49]).
"""

advanced = """
@deva[ठञ्] applies after @deva[बह्वच्]-@deva[अन्तोदात्त] @deva[व्याख्यातव्यनामन्], superseding @deva[अण्].

Examples: @deva[षात्वणत्विकम्], @deva[नातानतिकम्] (final accent per @ref[6.1.169]).

Conditions: @deva[बह्वच्] (cf. @deva[सौपम्] → @deva[ठक्] @ref[4.3.72]); @deva[अन्तोदात्त] (cf. @deva[सांहितम्] → @ref[6.2.49]).
"""

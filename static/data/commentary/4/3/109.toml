id = "4.3.109"
numericId = "43109"

[en]
simple = """
The affix @deva[ढिनुक्] comes in the @deva[प्रोक्त] (enounced) sense after the word @deva[छगलिन्]. This overrides the @deva[णिनि] that would come by the @[pupil-of-kalāpin] rule.

**Example:** @deva[छागलेयिनः] 'those who study the Vedic teaching of Chagalin'

@deva[छगलिन्] is a pupil of @deva[कलापिन्] and would normally take @deva[णिनि] by @ref[4.3.104], but this rule substitutes @deva[ढिनुक्].
"""

standard = """
The affix @deva[ढिनुक्] comes after @deva[छगलिन्] in the @deva[प्रोक्त] sense, debarring @deva[णिनि] of @ref[4.3.104].

@deva[छगलिन्] is a @deva[कलाप्यन्तेवासी] (pupil of @[kalāpin]).

**Example:** @deva[छागलेयिनः]
"""

advanced = """
This @deva[सूत्र] prescribes @deva[ढिनुक्] after @deva[छगलिन्] in the @deva[प्रोक्त] sense, as @deva[अपवाद] to @deva[णिनि] of @ref[4.3.104] (for @deva[कलाप्यन्तेवासी] words).

**Example:** @deva[छागलेयिनः]
"""

id = "4.3.28"
numericId = "43028"

[en]
simple = """
The affix @deva[वुञ्] comes after the words @deva[पूर्वाह्ण] (forenoon), @deva[अपराह्ण] (afternoon), @deva[आर्द्रा] (the asterism @[ārdrā]), @deva[मूला] (the asterism @[mūla]), @deva[प्रदोष] (dusk), and @deva[अवस्कर] (rubbish heap), in the sense of 'born therein', when the result is a proper name.

Examples:
• @deva[पूर्वाह्णकः], @deva[अपराह्णकः] (replaces @ref[4.3.24])
• @deva[आर्द्रकः], @deva[मूलकः] (replaces @deva[अण्] from @ref[4.3.16])
• @deva[प्रदोषकः] (replaces @deva[ठञ्] from @ref[4.3.14])
• @deva[अवस्करकः] (replaces general @deva[अण्])

When not a name, the other affixes apply.
"""

standard = """
The affix @deva[वुञ्] applies after @deva[पूर्वाह्ण], @deva[अपराह्ण], @deva[आर्द्रा], @deva[मूला], @deva[प्रदोष], @deva[अवस्कर] in @deva[जात]-@deva[संज्ञा] sense.

Examples: @deva[पूर्वाह्णकः], @deva[अपराह्णकः] (debarring @ref[4.3.24]); @deva[आर्द्रकः], @deva[मूलकः] (debarring @deva[अण्] @ref[4.3.16]); @deva[प्रदोषकः] (debarring @deva[ठञ्] @ref[4.3.14]); @deva[अवस्करकः] (debarring general @deva[अण्]).

Non-@deva[संज्ञा] contexts take standard affixes.
"""

advanced = """
@deva[वुञ्] applies after @deva[पूर्वाह्ण], @deva[अपराह्ण], @deva[आर्द्रा], @deva[मूला], @deva[प्रदोष], @deva[अवस्कर] in @deva[जात]-@deva[संज्ञा] sense.

Debarments: @deva[पूर्वाह्णकः]/@deva[अपराह्णकः]] (@ref[4.3.24]); @deva[आर्द्रकः]/@deva[मूलकः]] (@ref[4.3.16]); @deva[प्रदोषकः] (@ref[4.3.14]); @deva[अवस्करकः] (general @deva[अण्]).

Non-@deva[संज्ञा]: standard affixes apply.
"""

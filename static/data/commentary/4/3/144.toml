id = "4.3.144"
numericId = "43144"

[en]
simple = """
The affix @deva[मयट्] comes invariably in the @deva[विकार] (modification) and @deva[अवयव] (part) senses — when not referring to food or clothing — after @deva[वृद्ध] words (those beginning with a @deva[वृद्धि] vowel: @deva[आ], @deva[ऐ], @deva[औ]) and after words in the @deva[शरादि] list.

**@deva[वृद्ध] examples:**
- @deva[आम्रमयम्] 'made of mango'
- @deva[शालमयम्], @deva[शाकमयम्]

**@deva[शरादि] examples:**
- @deva[शरमयम्] 'made of reeds'
- @deva[हर्ममयम्], @deva[मृन्मयम्]

Why the word @deva[नित्यम्] ('invariably')? According to @[patañjali], @deva[मयट्] comes invariably after monosyllabic words as well: @deva[त्वङ्मयम्], @deva[स्रङ्मयम्], @deva[वाङ्मयम्].

**@deva[शरादि] list:** @deva[शर], @deva[दर्भ], @deva[मृद्], @deva[कुटी], @deva[तृण], @deva[सोम], @deva[बल्वज].
"""

standard = """
The affix @deva[मयट्] comes invariably (@deva[नित्यम्]) in the @deva[विकार]/​@deva[अवयव] senses (excluding @deva[अन्न]/​@deva[वस्त्र]) after @deva[वृद्ध] words and @deva[शरादि] words.

**@deva[वृद्ध]:** @deva[आम्रमयम्], @deva[शालमयम्], @deva[शाकमयम्]

**@deva[शरादि]:** @deva[शरमयम्], @deva[हर्ममयम्], @deva[मृन्मयम्]

**@deva[नित्यम्]:** Per @[patañjali], also applies obligatorily to monosyllabic words: @deva[त्वङ्मयम्], @deva[स्रङ्मयम्], @deva[वाङ्मयम्].

**@deva[शरादि] @deva[गण] (7):** @deva[शर], @deva[दर्भ], @deva[मृद्], @deva[कुटी], @deva[तृण], @deva[सोम], @deva[बल्वज]/​@deva[वल्वज].
"""

advanced = """
This @deva[सूत्र] makes @deva[मयट्] obligatory (@deva[नित्यम्]) in the @deva[विकार]/​@deva[अवयव] senses (@deva[अनन्नवस्त्रयोः]) after @deva[वृद्ध] words and @deva[शरादि].

**@deva[वृद्ध]:** @deva[आम्रमयम्], @deva[शालमयम्], @deva[शाकमयम्]

**@deva[शरादि]:** @deva[शरमयम्], @deva[हर्ममयम्], @deva[मृन्मयम्]

**@deva[नित्यम्]:** Though a separate @deva[सूत्र] would itself make the affix obligatory, @deva[नित्य] explicitly extends to @deva[एकाच्] (monosyllabic) words per @[patañjali]: @deva[त्वङ्मयम्], @deva[स्रङ्मयम्], @deva[वाङ्मयम्].

**@deva[शरादि] @deva[गण]:** @deva[शर], @deva[दर्भ], @deva[मृद्], @deva[कुटी], @deva[तृण], @deva[सोम], @deva[बल्वज] (@deva[वल्वज]).
"""

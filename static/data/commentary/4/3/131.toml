id = "4.3.131"
numericId = "43131"

[en]
simple = """
The affix @deva[छ] comes in the sense of 'this belongs to them' after the words in the @deva[रैवतिकादि] list. This overrides @deva[वुञ्].

All these words end with @deva[गोत्र] affixes and would normally take @deva[वुञ्] by @ref[4.3.126], but this rule substitutes @deva[छ].

**Examples:** @deva[रैवतिकीयः], @deva[स्वापिशीयः]

**@deva[रैवतिकादि] list:** @deva[रैवतिक], @deva[स्वापिशि], @deva[क्षैमवृद्धि], @deva[गौरग्रीवि], @deva[औदमेघि], @deva[औदवापि], @deva[बैजवापि].
"""

standard = """
The affix @deva[छ] comes after @deva[रैवतिकादि] words in the @deva[तस्येदम्] sense, overriding @deva[वुञ्] of @ref[4.3.126].

These words end with @deva[गोत्र] affixes.

**Examples:** @deva[रैवतिकीयः], @deva[स्वापिशीयः]

**@deva[रैवतिकादि] @deva[गण] (7):** @deva[रैवतिक], @deva[स्वापिशि], @deva[क्षैमवृद्धि], @deva[गौरग्रीवि]/​@deva[गौरग्रीव], @deva[औदमेघि]/​@deva[औदमेयि], @deva[औदवापि]/​@deva[औदवाहि], @deva[बैजवापि].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[छ] after @deva[रैवतिकादि] words in the @deva[तस्येदम्] sense, as @deva[अपवाद] to @deva[वुञ्] of @ref[4.3.126].

**Examples:** @deva[रैवतिकीयः], @deva[स्वापिशीयः]

**@deva[रैवतिकादि] @deva[गण]:** @deva[रैवतिक], @deva[स्वापिशि], @deva[क्षैमवृद्धि], @deva[गौरग्रीवि] (@deva[गौरग्रीव]), @deva[औदमेघि] (@deva[औदमेयि]), @deva[औदवापि] (@deva[औदवाहि]), @deva[बैजवापि].
"""

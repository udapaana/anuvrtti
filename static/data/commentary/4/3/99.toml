id = "4.3.99"
numericId = "43099"

[en]
simple = """
The affix @deva[वुञ्] optionally comes after a word denoting a @deva[गोत्र] (patronymic lineage) or a @[kṣatriya] to mean 'this is his object of devotion.' This overrides @deva[अण्] and @deva[छ].

**@deva[गोत्र] examples:**
- @deva[ग्लौचुकायनी भक्तिः अस्य] → @deva[ग्लौचुकायनकः] 'devotee of @[glaucukāyanī]'
- @deva[औपगवकः], @deva[कापटवकः]

**@[kṣatriya] examples:**
- @deva[नाकुलकः] 'devotee of Nakula'
- @deva[साहदेवकः] 'devotee of Sahadeva'
- @deva[साम्बकः] 'devotee of @[sāmba]'

The word @deva[आख्या] in the rule indicates these must be names of famous, well-known @[kṣatriyas], not just anyone of that profession.

The word @deva[बहुलम्] ('variously') shows this rule is not universal. Counter-example: @deva[पाणिनोः भक्तिः अस्य] → @deva[पाणिनीयः] (using @deva[छ], not @deva[वुञ्]).

Note: @deva[गोत्र] here means any word formed with a patronymic affix, not just grammatical @deva[गोत्र] in the technical sense.
"""

standard = """
The affix @deva[वुञ्] comes optionally (@deva[बहुलम्]) after @deva[गोत्र] or @deva[क्षत्रियाख्या] words in the @deva[भक्ति] sense, debarring @deva[अण्] and @deva[छ].

**@deva[गोत्र] examples:** @deva[ग्लौचुकायनकः], @deva[औपगवकः], @deva[कापटवकः]

**@deva[क्षत्रिय] examples:** @deva[नाकुलकः], @deva[साहदेवकः], @deva[साम्बकः]

@deva[आख्या] indicates these must be famous @[kṣatriya] names, not ordinary warriors.

@deva[बहुलम्] shows optionality. Counter-examples using @deva[छ]: @deva[पाणिनीयः], @deva[पौरवीयः]

The term @deva[गोत्र] here means any patronymically-derived word, not the technical grammatical @deva[गोत्र].
"""

advanced = """
This @deva[सूत्र] teaches @deva[वुञ्] after @deva[गोत्र] and @deva[क्षत्रियाख्या] words in the @deva[भक्ति] sense, debarring @deva[अण्] and @deva[छ].

**Examples:** @deva[ग्लौचुकायनकः], @deva[औपगवकः], @deva[कापटवकः]; @deva[नाकुलकः], @deva[साहदेवकः], @deva[साम्बकः]

**@deva[आख्या]:** The term restricts application to well-known @[kṣatriya] names, not ordinary professionals.

**@deva[बहुलम्]:** The rule is optional. Alternatives: @deva[पाणिनीयः], @deva[पौरवीयः] (with @deva[छ]).

**Technical note:** @deva[गोत्र] here encompasses any @deva[युवापत्यप्रत्ययान्त] (word with a patronymic affix), not just @deva[गोत्र] in the strict grammatical sense of @ref[4.1.162].
"""

id = "4.3.150"
numericId = "43150"

[en]
simple = """
In Vedic literature (@deva[छन्दस्]), the affix @deva[मयट्] comes in the @deva[विकार] (modification) or @deva[अवयव] (part) sense after a disyllabic word (@deva[द्व्यच्]).

This extends @deva[मयट्] to sacred literature — @ref[4.3.143] dealt with secular language.

**Vedic examples:**
- @deva[पर्णमयी जुहूः] 'a ladle made of leaves' (from @deva[यस्य पर्णमयी जुहूर् भवति])
- @deva[दर्भमयं वासः] 'garment made of Darbha grass'
- @deva[शरमयं बर्हिः] 'sacrificial grass made of reeds'
"""

standard = """
In @deva[छन्दस्], the affix @deva[मयट्] comes after @deva[द्व्यच्] (disyllabic) words in the @deva[विकार]/​@deva[अवयव] sense.

This ordains @deva[मयट्] in sacred literature; @ref[4.3.143] covered @deva[भाषा] (secular).

**Vedic examples:** @deva[पर्णमयः], @deva[दर्भमयम्], @deva[शरमयम्]

From: @deva[यस्य पर्णमयी जुहूर् भवति], @deva[दर्भमयं वासो भवति], @deva[शरमयं बर्हिर् भवति].
"""

advanced = """
This @deva[सूत्र] teaches @deva[मयट्] after @deva[द्व्यच्] words in the @deva[विकार]/​@deva[अवयव] sense, specifically for @deva[छन्दस्]. @ref[4.3.143] governed @deva[भाषा].

**Vedic examples:** @deva[पर्णमयः], @deva[दर्भमयम्], @deva[शरमयम्]

From: @deva[यस्य पर्णमयी जुहूर् भवति], @deva[दर्भमयं वासो भवति], @deva[शरमयं बर्हिर् भवति].
"""

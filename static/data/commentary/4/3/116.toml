id = "4.3.116"
numericId = "43116"

[en]
simple = """
An affix comes after a word in the @deva[तृतीया] (instrumental) case to mean 'composed by him,' when the thing composed is a book (@deva[ग्रन्थ]).

**Examples:**
- @deva[वररुचिना कृताः] → @deva[वाररुचाः श्लोकाः] 'verses composed by Vararuci'
- @deva[हैकुपादः ग्रन्थः] 'book composed by @[haikupāda]'
- @deva[भैकुराटः ग्रन्थः], @deva[जालूकः]

Why 'a book'? For other things: @deva[तक्षकृतः प्रासादः] 'palace made by @[takṣa]' (no affix—not a book).

Distinction: @deva[कृत] means 'originated' (an art, a composition); @deva[उपज्ञात] (@ref[4.3.115]) means 'discovered' (existing laws or knowledge found for the first time).
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) comes after a word in @deva[तृतीया] in the @deva[कृत] (composed) sense when a @deva[ग्रन्थ] (book) is meant.

**Examples:** @deva[वाररुचाः श्लोकाः], @deva[हैकुपादः ग्रन्थः], @deva[भैकुराटः ग्रन्थः], @deva[जालूकः]

**@deva[ग्रन्थे] restriction:** @deva[तक्षकृतः प्रासादः] (non-book)—no affix.

**Distinction:** @deva[कृत] = originated (composition, art); @deva[उपज्ञात] = discovered (pre-existing knowledge revealed for the first time).
"""

advanced = """
This @deva[सूत्र] teaches the @deva[कृत] (composed) sense for @deva[प्राग्दीव्यतोऽण्] affixes, with @deva[ग्रन्थे] (book) as the referent and @deva[तृतीया] case for the agent.

**Examples:** @deva[वाररुचाः श्लोकाः], @deva[हैकुपादः ग्रन्थः], @deva[भैकुराटः ग्रन्थः], @deva[जालूकः]

**@deva[ग्रन्थे] condition:** Non-books: @deva[तक्षकृतः प्रासादः]—affix doesn't apply.

**@deva[कृत] vs. @deva[उपज्ञात]:** @deva[कृत] = origination (art, composition); @deva[उपज्ञात] = discovery of pre-existing knowledge.
"""

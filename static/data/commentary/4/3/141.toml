id = "4.3.141"
numericId = "43141"

[en]
simple = """
The affix @deva[अञ्] comes optionally in the sense of 'modification or part' after words in the @deva[पलाशादि] list.

**Examples (both forms valid):**
- @deva[पालाशम्] or @deva[पालाशम्] (from @deva[पलाश])
- @deva[खादिरम्] or @deva[खादिरम्] (from @deva[खदिर])
- @deva[यावासम्] or @deva[यावासम्] (from @deva[यवास])

This rule is both @deva[प्राप्तविभाषा] (making optional what would be obligatory) and @deva[अप्राप्तविभाषा] (introducing an option where none existed). For @deva[पलाश], @deva[खदिर], @deva[शिंशपा], @deva[स्यन्दन] — which are @deva[अनुदात्तादि] — @deva[अञ्] was obligatory by @ref[4.3.140]; this makes it optional. For the others, it introduces @deva[अञ्] as an option.

**@deva[पलाशादि] list:** @deva[पलाश], @deva[खदिर], @deva[शिंशपा], @deva[स्यन्दन], @deva[पूलाक], @deva[करीर], @deva[शिरीष], @deva[यवास], @deva[विकङ्कत].
"""

standard = """
The affix @deva[अञ्] comes optionally after @deva[पलाशादि] words in the @deva[विकार]/​@deva[अवयव] sense.

**Examples:** @deva[पालाशम्]/​@deva[पालाशम्], @deva[खादिरम्]/​@deva[खादिरम्], @deva[यावासम्]/​@deva[यावासम्]

This is @deva[प्राप्तविभाषा] for @deva[पलाश], @deva[खदिर], @deva[शिंशपा], @deva[स्यन्दन] (which are @deva[अनुदात्तादि], hence @deva[अञ्] was obligatory by @ref[4.3.140]). For others, it's @deva[अप्राप्तविभाषा].

**@deva[पलाशादि] @deva[गण] (9):** @deva[पलाश], @deva[खदिर], @deva[शिंशपा], @deva[स्यन्दन]/​@deva[स्पन्दन], @deva[पूलाक], @deva[करीर], @deva[शिरीष], @deva[यवास], @deva[विकङ्कत].
"""

advanced = """
This @deva[सूत्र] makes @deva[अञ्] optional after @deva[पलाशादि] words in the @deva[विकार]/​@deva[अवयव] sense.

This is @deva[प्राप्तविभाषा] for @deva[अनुदात्तादि] members (@deva[पलाश], @deva[खदिर], @deva[शिंशपा], @deva[स्यन्दन]) where @deva[अञ्] was obligatory by @ref[4.3.140]; @deva[अप्राप्तविभाषा] for the rest.

**@deva[पलाशादि] @deva[गण]:** @deva[पलाश], @deva[खदिर], @deva[शिंशपा], @deva[स्यन्दन] (@deva[स्पन्दन]), @deva[पूलाक], @deva[करीर], @deva[शिरीष], @deva[यवास], @deva[विकङ्कत].
"""

id = "4.3.154"
numericId = "43154"

[en]
simple = """
The affix @deva[अञ्] comes in the @deva[विकार] (modification) or @deva[अवयव] (part) sense after words denoting living beings (@deva[प्राणिन्]) and after words in the @deva[रजतादि] list. This overrides @deva[अण्] etc.

The affix @deva[अञ्] was already taught for @deva[अनुदात्तादि] words (@ref[4.3.140]). This rule extends it to other words.

**@deva[प्राणिन्] examples:**
- @deva[कापोतम्] 'of/from a pigeon'
- @deva[मायूरम्] 'of/from a peacock'
- @deva[तैत्तिरम्] 'of/from a partridge'

**@deva[रजतादि] examples:**
- @deva[राजतम्] 'made of silver'
- @deva[सैसम्] 'made of lead'
- @deva[लौहम्] 'made of iron'

Some @deva[रजतादि] words like @deva[रजत] and @deva[कण्टकार] are @deva[अनुदात्तादि] and would take @deva[अञ्] anyway by @ref[4.3.140]; their inclusion here blocks @deva[मयट्].

**@deva[रजतादि] list:** @deva[रजत], @deva[सीस], @deva[लोह], @deva[उदुम्बर], @deva[नीप], @deva[दारु], @deva[रोहीतक], @deva[विभीतक], @deva[पीतदारु], @deva[तीव्रदारु], @deva[त्रिकण्टक], @deva[कण्टकार].
"""

standard = """
The affix @deva[अञ्] comes after @deva[प्राणिन्] (living beings) and @deva[रजतादि] words in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[अण्] etc.

@deva[अञ्] was taught for @deva[अनुदात्तादि] words at @ref[4.3.140]. This extends to non-@deva[अनुदात्तादि] words.

**@deva[प्राणिन्]:** @deva[कापोतम्], @deva[मायूरम्], @deva[तैत्तिरम्]

**@deva[रजतादि]:** @deva[राजतम्], @deva[सैसम्], @deva[लौहम्]

Words like @deva[रजत], @deva[कण्टकार] (which are @deva[अनुदात्तादि]) are included to block @deva[मयट्].

**@deva[रजतादि] @deva[गण] (12):** @deva[रजत], @deva[सीस], @deva[लोह], @deva[उदुम्बर], @deva[नीप]/​@deva[नीच]/​@deva[नील], @deva[दारु], @deva[रोहीतक]/​@deva[रोहितक], @deva[विभीतक], @deva[पीतदारु]/​@deva[कपीतदारु], @deva[तीव्रदारु], @deva[त्रिकण्टक], @deva[कण्टकार].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अञ्] after @deva[प्राणिन्] and @deva[रजतादि] words in the @deva[विकार]/​@deva[अवयव] sense, as @deva[अपवाद] to @deva[अण्] etc.

@deva[अञ्] for @deva[अनुदात्तादि] was at @ref[4.3.140]; this extends to non-@deva[अनुदात्तादि].

**@deva[प्राणिन्]:** @deva[कापोतम्], @deva[मायूरम्], @deva[तैत्तिरम्]

**@deva[रजतादि]:** @deva[राजतम्], @deva[सैसम्], @deva[लौहम्]

@deva[अनुदात्तादि] members (@deva[रजत], @deva[कण्टकार]) are included specifically to block @deva[मयट्].

**@deva[रजतादि] @deva[गण]:** @deva[रजत], @deva[सीस], @deva[लोह], @deva[उदुम्बर], @deva[नीप] (@deva[नीच], @deva[नील]), @deva[दारु], @deva[रोहीतक] (@deva[रोहितक]), @deva[विभीतक], @deva[पीतदारु] (@deva[कपीतदारु]), @deva[तीव्रदारु], @deva[त्रिकण्टक], @deva[कण्टकार].
"""

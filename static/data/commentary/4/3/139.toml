id = "4.3.139"
numericId = "43139"

[en]
simple = """
The affix @deva[अण्] comes in the sense of 'modification or part' after words that do not have @deva[अनुदात्त] (grave) accent on the first syllable.

**Examples:**
- @deva[देवदारु] → @deva[देवदारवम्]
- @deva[भद्रदारु] → @deva[भाद्रदारवम्]

The words @deva[देवदारु] and @deva[भद्रदारु] have @deva[उदात्त] (acute) on the first syllable according to @[phiṭ-sūtra] II.14 (trees denoting soft timber have acute on the first).
"""

standard = """
The affix @deva[अण्] comes after non-@deva[अनुदात्तादि] words in the @deva[विकार]/​@deva[अवयव] sense.

**Examples:** @deva[देवदारवम्], @deva[भाद्रदारवम्]

@deva[देवदारु], @deva[भद्रदारु]: @deva[आद्युदात्त] by @[phiṭ-sūtra] II.14 (@deva[पीतद्र्वर्थानाम्] — soft-timber trees have initial acute).
"""

advanced = """
This @deva[सूत्र] teaches @deva[अण्] after words not having @deva[अनुदात्त] on the first syllable, in the @deva[विकार]/​@deva[अवयव] sense.

**Examples:** @deva[देवदारवम्], @deva[भाद्रदारवम्]

@deva[देवदारु], @deva[भद्रदारु]: @deva[आद्युदात्त] per @[phiṭ-sūtra] II.14 (@deva[पीतद्र्वर्थानाम्]).
"""

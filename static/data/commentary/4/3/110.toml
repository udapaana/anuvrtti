id = "4.3.110"
numericId = "43110"

[en]
simple = """
The affix @deva[णिनि] comes in the @deva[प्रोक्त] (enounced) sense after @deva[पाराशर्य] and @deva[शिलालिन्], specifically for the @deva[भिक्षुसूत्र] (treatise on mendicants' duties) and @deva[नटसूत्र] (treatise on dancers/performers).

**Examples:**
- @deva[पाराशर्य] + @deva[णिनि] → @deva[पाराशरिणः] 'those who study the mendicants' manual taught by @[pārāśarya]'
- @deva[शिलालिन्] + @deva[णिनि] → @deva[शैलालिनः] 'those who study the performers' manual taught by @[śailālin]'

These treatises are treated metaphorically as @deva[छन्दस्] (Vedic texts).

Why 'for these specific treatises'? For other works: @deva[पाराशरम्], @deva[शैलालम्] (with different affixes).
"""

standard = """
The affix @deva[णिनि] comes after @deva[पाराशर्य] and @deva[शिलालिन्] in the @deva[प्रोक्त] sense when referring to @deva[भिक्षुसूत्र] and @deva[नटसूत्र] respectively.

**Examples:**
- @deva[पाराशरिणः भिक्षवः] 'mendicants who study @[pārāśarya]'s treatise'
- @deva[शैलालिनः नटाः] 'performers who study @[śailālin]'s treatise'

Derivation of @deva[पाराशरिन्]: @deva[पाराशर्य] + @deva[णिनि] → @deva[पाराशर] + @deva[णिनि] (@ref[6.4.152]) → @deva[पाराशरिन्]

These works are treated as @deva[छन्दस्] metaphorically. The @deva[तद्विषय] sense (@ref[4.2.66]) also applies.

**Restriction:** For other works by these authors: @deva[पाराशरम्], @deva[शैलालम्].
"""

advanced = """
This @deva[सूत्र] teaches @deva[णिनि] (not @deva[ढिनुक्] from preceding context) after @deva[पाराशर्य] and @deva[शिलालिन्] in the @deva[प्रोक्त] sense, restricted to @deva[भिक्षुसूत्र] and @deva[नटसूत्र].

**Examples:** @deva[पाराशरिणः भिक्षवः], @deva[शैलालिनः नटाः]

**Derivation:** @deva[पाराशर्य] + @deva[णिनि] → @deva[पाराशर] + @deva[इन्] by @ref[6.4.152] (@deva[य] deletion) → @deva[पाराशरिन्]

These @deva[सूत्र]s are @deva[उपचारेण छन्दस्] (metaphorically Vedic). The @deva[तद्विषय] relation (@ref[4.2.66]) also holds: @deva[पाराशरिणः] = 'students of @[pārāśarya]'s @deva[भिक्षुसूत्र].'

Some hold this expresses only @deva[तद्विषयता], never @deva[प्रोक्त] alone.

**Counter-examples (other works):** @deva[पाराशरम्], @deva[शैलालम्].
"""

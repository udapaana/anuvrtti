id = "4.3.134"
numericId = "43134"

[en]
simple = """
An affix (from the @deva[प्राग्दीव्यतोऽण्] set, @ref[4.1.83]) comes after a word in the genitive case to mean 'a modification of that' (@deva[विकार]).

The word @deva[विकार] means 'change of condition' or 'transformation' of the original substance.

The repetition of @deva[तस्य] (though available from earlier rules) indicates that the governing force of @deva[शेषे] (@ref[4.2.92]) does not extend further. The @deva[घ], @deva[ख] etc. affixes taught under @deva[शेषे] do not have this @deva[विकार] sense.

The general affix @deva[अण्] applies here, as well as specific affixes taught in subsequent rules. For examples, we need words not covered by later rules — not denoting living animals (@deva[अञ्] by @ref[4.3.154]), not @deva[अनुदात्तादि] (@deva[अञ्] by @ref[4.3.140]), not having @deva[वृद्धि] in the first syllable (@deva[मयट्] by @ref[4.3.144]).

**Examples:**
- @deva[अश्मनः विकारः] → @deva[आश्मनः] or @deva[आश्मः] (with optional @deva[टि]-deletion) 'made from stone'
- @deva[भास्मनः], @deva[मार्तिकः]
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) comes after a word in @deva[षष्ठी] in the @deva[विकार] (modification/transformation) sense.

@deva[विकार] = change of condition of the original substance.

**Technical note:** @deva[तस्य] is repeated (though available by @deva[अनुवृत्ति]) to indicate @deva[शेषे] (@ref[4.2.92]) doesn't extend here. The @deva[घ], @deva[ख] etc. affixes don't have @deva[विकार] sense.

The general @deva[अण्] applies; subsequent @deva[सूत्र]s provide specific affixes. Valid examples must not be covered by @ref[4.3.154] (animals), @ref[4.3.140] (@deva[अनुदात्तादि]), @ref[4.3.144] (@deva[वृद्धि]-initial).

**Examples:** @deva[आश्मनः]/​@deva[आश्मः] (from @deva[अश्मन्], stone), @deva[भास्मनः], @deva[मार्तिकः]

@deva[अश्मन्] and @deva[भस्मन्] are formed by @deva[मनिन्] (@[uṇ]. IV.146,145); @deva[मृत्तिका] by @deva[तिकन्] (@ref[5.4.39]). All are @deva[आद्युदात्त] due to @deva[नित्] accent.
"""

advanced = """
This @deva[सूत्र] introduces the @deva[विकार] (transformation) sense for @deva[प्राग्दीव्यतोऽण्] affixes (@ref[4.1.83]), with @deva[षष्ठी] case.

@deva[विकार] = transformation of original substance.

**@deva[तस्य] repetition:** Though @deva[अनुवृत्ति] would supply it, explicit @deva[तस्य] indicates @deva[शेषे] (@ref[4.2.92]) doesn't govern. Hence @deva[घ], @deva[ख] etc. lack @deva[विकार] sense.

No specific affix here; @deva[अण्] of @ref[4.1.83] applies, plus subsequent @deva[सूत्र]-specific affixes. Valid examples: non-@deva[प्राणिन्] (@ref[4.3.154]), non-@deva[अनुदात्तादि] (@ref[4.3.140]), non-@deva[वृद्ध्यादि] (@ref[4.3.144]).

**Examples:** @deva[अश्मन्] → @deva[आश्मनः]/​@deva[आश्मः] (optional @deva[टि]-@deva[लोप] per @deva[वार्त्तिक] to @ref[6.4.144]); @deva[भास्मनः], @deva[मार्तिकः]

@deva[अश्मन्], @deva[भस्मन्]: @deva[मनिन्] (@[uṇ]. IV.146,145); @deva[मृत्तिका]: @deva[तिकन्] (@ref[5.4.39]). All @deva[आद्युदात्त] via @deva[नित्] accent.
"""

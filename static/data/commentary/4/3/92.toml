id = "4.3.92"
numericId = "43092"

[en]
simple = """
The affix @deva[ञ्य] comes after words in the @deva[शण्डिकादि] list to mean 'this is his native land.' This overrides the default @deva[अण्].

**Examples:**
- @deva[शण्डिक] + @deva[ञ्य] → @deva[शाण्डिक्यः]
- @deva[सर्वसेन] + @deva[ञ्य] → @deva[सार्वसेन्यः]

**The @deva[शण्डिकादि] list:** @deva[शण्डिक], @deva[सर्वसेन], @deva[सर्वकेश], @deva[शक], @deva[शट] (or @deva[सट]), @deva[रक], @deva[शङ्ख], @deva[बोध].
"""

standard = """
The affix @deva[ञ्य] comes after words in the @deva[शण्डिकादि] class in the @deva[अभिजन] sense, debarring @deva[अण्] and other affixes.

**Examples:** @deva[शाण्डिक्यः], @deva[सार्वसेन्यः]

**@deva[शण्डिकादि] @deva[गण]:**
1. @deva[शण्डिक] 2. @deva[सर्वसेन] 3. @deva[सर्वकेश] 4. @deva[शक] 5. @deva[शट]/​@deva[सट] 6. @deva[रक] 7. @deva[शङ्ख] 8. @deva[बोध]
"""

advanced = """
This @deva[सूत्र] prescribes @deva[ञ्य] after @deva[शण्डिकादि] words in the @deva[अभिजन] sense, as an @deva[अपवाद] to the general @deva[अण्] of @ref[4.1.83].

**Examples:** @deva[शाण्डिक्यः], @deva[सार्वसेन्यः]

**@deva[शण्डिकादि] @deva[गण]:** @deva[शण्डिक], @deva[सर्वसेन], @deva[सर्वकेश], @deva[शक], @deva[शट] (@deva[सट]), @deva[रक], @deva[शङ्ख], @deva[बोध].
"""

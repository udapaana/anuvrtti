id = "4.3.88"
numericId = "43088"

[en]
simple = """
The affix @deva[छ] comes in the sense of 'a book made about that subject' after @deva[शिशुक्रन्द], @deva[यमसभ], @deva[द्वन्द्व] compounds, and the words @deva[इन्द्रजननादि].

This replaces @deva[अण्].

Examples:
• @deva[शिशुक्रन्दीयः] (a book about infant-crying)
• @deva[यमसभीयः] (a book about Yama's court)
• @deva[द्वन्द्व] compounds: @deva[अग्निकाश्यपीयः], @deva[श्येनकपोतीयः], @deva[शब्दार्थसंबन्धीयं प्रकरणम्], @deva[वाक्यपदीयम्]
• @deva[इन्द्रजननादि] (@deva[आकृतिगण]): @deva[इन्द्रजननीयम्], @deva[प्रद्युम्नागमनीयम्]

Supplementary rule (@deva[वार्त्तिक]): @deva[द्वन्द्व] compounds like @deva[देवासुर] take @deva[अण्] instead: @deva[दैवासुरम्] (the book of Gods and Demons), @deva[राक्षोसुरम्], @deva[गौणमुख्यम्].
"""

standard = """
The affix @deva[छ] applies after @deva[शिशुक्रन्द], @deva[यमसभ], @deva[द्वन्द्व], and @deva[इन्द्रजननादि] in @deva[अधिकृत्य ग्रन्थे] sense, debarring @deva[अण्].

Examples: @deva[शिशुक्रन्दीयः], @deva[यमसभीयः]; @deva[अग्निकाश्यपीयः], @deva[वाक्यपदीयम्]; @deva[इन्द्रजननीयम्].

@deva[इन्द्रजननादि] = @deva[आकृतिगण].

@note[type=@[vārtika]]: @deva[देवासुरादि]-@deva[द्वन्द्व] takes @deva[अण्]: @deva[दैवासुरम्], @deva[राक्षोसुरम्].
"""

advanced = """
@deva[छ] applies after @deva[शिशुक्रन्द]/@deva[यमसभ]]/@deva[द्वन्द्व]]/@deva[इन्द्रजननादि]] in @deva[अधिकृत्य ग्रन्थे] sense, superseding @deva[अण्].

Examples: @deva[शिशुक्रन्दीयः], @deva[अग्निकाश्यपीयः], @deva[इन्द्रजननीयम्]. @deva[इन्द्रजननादि] = @deva[आकृतिगण].

@note[type=@[vārtika]]: @deva[देवासुरादेरण्]—@deva[दैवासुरम्], @deva[गौणमुख्यम्].
"""

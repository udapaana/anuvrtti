id = "4.3.16"
numericId = "43016"

[en]
simple = """
The affix @deva[अण्] comes after words in the @deva[संधिवेलादि] list (words like @deva[संधिवेला], @deva[संध्या], etc.) and after words denoting seasons (@deva[ऋतु]) or asterisms (@deva[नक्षत्र]).

All these words must express time. This rule replaces @deva[ठञ्] from @ref[4.3.11]. The repetition of @deva[अण्] also prevents @deva[छ] for @deva[वृद्ध] words.

Examples:
• @deva[संधिवेलादि]: @deva[सान्धिवेलम्] (relating to twilight-time), @deva[सान्ध्यम्] (relating to dusk).
• Seasons: @deva[ग्रैष्मम्] (summery), @deva[शैशिरम्] (wintry).
• Asterisms: @deva[तैषम्] (of @[tiṣya]), @deva[पौषम्] (of @[puṣya]).

@deva[संवत्सर] takes @deva[अण्] when meaning 'fruit' or 'festival': @deva[सांवत्सरं फलम्] or @deva[पर्व].

The @deva[संधिवेलादि] list: @deva[संधिवेला], @deva[संध्या], @deva[अमावास्या], @deva[त्रयोदशी], @deva[चतुर्दशी], @deva[पञ्चदशी], @deva[पौर्णमासी], @deva[प्रतिपद्], and @deva[संवत्सर] (when denoting fruit/festival).
"""

standard = """
The affix @deva[अण्] applies after @deva[संधिवेलादि] words, @deva[ऋतु]-denoting words, and @deva[नक्षत्र] names—all must express @deva[काल]. This supersedes @deva[ठञ्] (@ref[4.3.11]); repetition of @deva[अण्] also bars @deva[छ] for @deva[वृद्ध] words (@ref[4.2.114]).

Examples: @deva[सान्धिवेलम्], @deva[सान्ध्यम्]; @deva[ग्रैष्मम्], @deva[शैशिरम्]; @deva[तैषम्], @deva[पौषम्].

@deva[संवत्सर] + @deva[अण्] when denoting @deva[फल] or @deva[पर्व]: @deva[सांवत्सरं फलम्/पर्व].

@deva[संधिवेलादि] @[gaṇa]: @deva[संधिवेला], @deva[संध्या], @deva[अमावास्या], @deva[त्रयोदशी], @deva[चतुर्दशी], @deva[पञ्चदशी], @deva[पौर्णमासी], @deva[प्रतिपद्], @deva[संवत्सरात्फलपर्वणोः].
"""

advanced = """
@deva[अण्] is ordained after @deva[संधिवेलादि], @deva[ऋतु]-@deva[वाचक], and @deva[नक्षत्र] words (all @deva[कालवाचिन्]), superseding @deva[ठञ्] (@ref[4.3.11]). The @deva[पुनर्वचन] of @deva[अण्] blocks @deva[छ] (@ref[4.2.114]) for @deva[वृद्ध] members.

Examples: @deva[सान्धिवेलम्], @deva[सान्ध्यम्]; @deva[ग्रैष्मम्], @deva[शैशिरम्]; @deva[तैषम्], @deva[पौषम्]. @deva[संवत्सर] + @deva[अण्] (@deva[फल]/@deva[पर्व]]-@deva[अर्थ]): @deva[सांवत्सरं फलम्].

@deva[संधिवेलादि]: @deva[संधिवेला], @deva[संध्या], @deva[अमावास्या], @deva[त्रयोदशी], @deva[चतुर्दशी], @deva[पञ्चदशी], @deva[पौर्णमासी], @deva[प्रतिपद्], @deva[संवत्सरात्फलपर्वणोः].
"""

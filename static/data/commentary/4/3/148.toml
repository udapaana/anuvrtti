id = "4.3.148"
numericId = "43148"

[en]
simple = """
The affix @deva[मयट्] comes after @deva[व्रीहि] (rice/barley) when referring to a @deva[पुरोडाश] (sacred cake). This overrides @deva[अण्] from @ref[4.3.136].

**Example:** @deva[व्रीहिमयः पुरोडाशः] 'a sacred cake made of barley'

In other senses: @deva[व्रैहम्] (with @deva[अण्]).
"""

standard = """
The affix @deva[मयट्] comes after @deva[व्रीहि] when the product is @deva[पुरोडाश] (sacred cake), debarring @deva[अण्] of @ref[4.3.136].

**Example:** @deva[व्रीहिमयः पुरोडाशः]

Otherwise: @deva[व्रैहम्].
"""

advanced = """
This @deva[सूत्र] teaches @deva[मयट्] after @deva[व्रीहि] specifically for @deva[पुरोडाश], as @deva[अपवाद] to @deva[अण्] of @ref[4.3.136].

**Example:** @deva[व्रीहिमयः पुरोडाशः]

Otherwise: @deva[व्रैहम्].
"""

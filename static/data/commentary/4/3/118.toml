id = "4.3.118"
numericId = "43118"

[en]
simple = """
The affix @deva[वुञ्] comes in the @deva[कृत] (made by) sense after words in the @deva[कुलालादि] list, when the resulting word is a proper name.

**Examples:**
- @deva[कौलालकम्] 'porcelain' (literally 'made by a potter')
- @deva[वारुडकम्]

**@deva[कुलालादि] list:** @deva[कुलाल] (potter), @deva[वरुड], @deva[चण्डाल], @deva[निषाद], @deva[कर्मार], @deva[सेना], @deva[सिरिध्र], @deva[सैरिन्ध्र], @deva[देवराज], @deva[परिषद्], @deva[वधू], @deva[मधु], @deva[रुरु], @deva[रुद्र], @deva[अनडुह्], @deva[ब्रह्मन्], @deva[कुम्भकार], @deva[श्वपाक], @deva[ध्रुव].
"""

standard = """
The affix @deva[वुञ्] comes after @deva[कुलालादि] words in the @deva[कृत] sense when the derivative is a @deva[संज्ञा].

**Examples:** @deva[कौलालकम्] (porcelain, made by a potter), @deva[वारुडकम्]

**@deva[कुलालादि] @deva[गण] (19):** @deva[कुलाल], @deva[वरुड], @deva[चण्डाल], @deva[निषाद], @deva[कर्मार], @deva[सेना], @deva[सिरिध्र]/​@deva[सिरिन्ध्र], @deva[सैरिन्ध्र]/​@deva[सेन्द्रिय], @deva[देवराज], @deva[परिषद्]/​@deva[पर्षद्], @deva[वधू], @deva[मधु], @deva[रुरु], @deva[रुद्र], @deva[अनडुह्], @deva[ब्रह्मन्], @deva[कुम्भकार], @deva[श्वपाक], @deva[ध्रुव].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[वुञ्] after @deva[कुलालादि] words in the @deva[कृत] sense with @deva[संज्ञा] result.

**Examples:** @deva[कौलालकम्], @deva[वारुडकम्]

**@deva[कुलालादि] @deva[गण] (19):** @deva[कुलाल], @deva[वरुड], @deva[चण्डाल], @deva[निषाद], @deva[कर्मार], @deva[सेना], @deva[सिरिध्र] (@deva[सिरिन्ध्र]), @deva[सैरिन्ध्र] (@deva[सेन्द्रिय]), @deva[देवराज], @deva[परिषद्] (@deva[पर्षद्]), @deva[वधू], @deva[मधु], @deva[रुरु], @deva[रुद्र], @deva[अनडुह्], @deva[ब्रह्मन्], @deva[कुम्भकार], @deva[श्वपाक], @deva[ध्रुव].
"""

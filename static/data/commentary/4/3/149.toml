id = "4.3.149"
numericId = "43149"

[en]
simple = """
The affix @deva[मयट्] comes in the @deva[विकार] (product) sense after @deva[तिल] (sesame) and @deva[यव] (barley) — but not when the resulting word is a proper name (@deva[संज्ञा]).

**Examples:** @deva[तिलमयम्], @deva[यवमयम्]

Why 'not a name'? When the word is a name: @deva[तैलम्] 'oil' (a name), @deva[यावकः] formed with @deva[कन्] by @ref[5.4.29].
"""

standard = """
The affix @deva[मयट्] comes after @deva[तिल] and @deva[यव] in the @deva[विकार] sense when not a @deva[संज्ञा].

**Examples:** @deva[तिलमयम्], @deva[यवमयम्]

**@deva[असंज्ञायाम्]:** @deva[संज्ञा]: @deva[तैलम्] (oil), @deva[यावकः] (@deva[कन्] by @ref[5.4.29]).
"""

advanced = """
This @deva[सूत्र] teaches @deva[मयट्] after @deva[तिल] and @deva[यव] in the @deva[विकार] sense, conditioned by @deva[असंज्ञायाम्].

**Examples:** @deva[तिलमयम्], @deva[यवमयम्]

**@deva[संज्ञा]:** @deva[तैलम्], @deva[यावकः] (@deva[कन्] by @ref[5.4.29]).
"""

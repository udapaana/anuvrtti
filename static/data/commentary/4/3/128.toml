id = "4.3.128"
numericId = "43128"

[en]
simple = """
The affix @deva[अण्] optionally comes after @deva[शाकल] in the sense of 'this is their congregation, mark, sign, or hamlet.' This overrides @deva[वुञ्].

**Examples:**
- @deva[शाकलेन प्रोक्तम् अधीयते] → @deva[शाकलाः] (by @ref[4.3.101], @ref[4.2.64])
- @deva[शाकलानां संघः] → @deva[शाकलः] (with @deva[अण्]) or @deva[शाकलकः] (with @deva[वुञ्] from @ref[4.3.126])

Both forms mean 'a congregation of students of the science revealed by @[śakala].'
"""

standard = """
The affix @deva[अण्] optionally comes after @deva[शाकल] in the @deva[संघ]/​@deva[लक्षण]/​@deva[अङ्क]/​@deva[घोष] sense, debarring @deva[वुञ्] of @ref[4.3.126].

**Examples:**
- @deva[शाकलाः] (students, by @ref[4.3.101], @ref[4.2.64])
- @deva[शाकलानां संघः] → @deva[शाकलः] (@deva[अण्]) or @deva[शाकलकः] (@deva[वुञ्])
"""

advanced = """
This @deva[सूत्र] makes @deva[अण्] optional after @deva[शाकल] in the @deva[संघ] etc. senses, as @deva[विकल्प] to @deva[वुञ्] of @ref[4.3.126].

**Examples:** @deva[शाकलाः] (by @ref[4.3.101], @ref[4.2.64]); @deva[शाकलानां संघः] → @deva[शाकलः] or @deva[शाकलकः]
"""

id = "4.3.102"
numericId = "43102"

[en]
simple = """
The affix @deva[छण्] comes in the @deva[प्रोक्त] (enounced) sense after the words @deva[तित्तिरि], @deva[वरतन्तु], @deva[खण्डिक], and @deva[उख].

**Examples:**
- @deva[तित्तिरिणा प्रोक्तम्] → @deva[तैत्तिरीयाः] 'those who study the Veda taught by Tittiri'
- @deva[वारतन्तवीयाः], @deva[खाण्डिकीयाः], @deva[औखीयाः]

According to the @[kāśikā], this rule applies only to Vedic works (@deva[छन्दस्]), not to secular verses. So @deva[तित्तिरिणा प्रोक्तः श्लोकः] would not take this affix.
"""

standard = """
The affix @deva[छण्] comes after @deva[तित्तिरि], @deva[वरतन्तु], @deva[खण्डिक], and @deva[उख] in the @deva[प्रोक्त] sense.

**Examples:** @deva[तैत्तिरीयाः], @deva[वारतन्तवीयाः], @deva[खाण्डिकीयाः], @deva[औखीयाः]

Per the @[kāśikā], this is restricted to @deva[छन्दस्] (Vedic literature); the sense @deva[तद्विषयता] (@ref[4.2.66]) continues. Secular compositions (@deva[श्लोक]) by @deva[तित्तिरि] would not take this affix.
"""

advanced = """
This @deva[सूत्र] teaches @deva[छण्] after @deva[तित्तिरि], @deva[वरतन्तु], @deva[खण्डिक], and @deva[उख] in the @deva[प्रोक्त] sense.

**Examples:** @deva[तैत्तिरीयाः], @deva[वारतन्तवीयाः], @deva[खाण्डिकीयाः], @deva[औखीयाः]

**Restriction:** Per the @[kāśikā], @deva[छन्दस्] continues from @ref[4.3.106], and @deva[तद्विषयता] from @ref[4.2.66]. Thus this applies only to Vedic works, not to secular @deva[श्लोक]s: @deva[तित्तिरिणा प्रोक्तः श्लोकः] would not take @deva[छण्].
"""

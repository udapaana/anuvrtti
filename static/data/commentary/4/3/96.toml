id = "4.3.96"
numericId = "43096"

[en]
simple = """
After a word denoting something without consciousness (@deva[अचेतन])—but not a country name or a time word—the affix @deva[ठक्] is used to mean 'this is his object of devotion.'

This overrides @deva[अण्] and @deva[छ].

**Examples:**
- @deva[अपूपः भक्तिः अस्य] ('cakes are his love') → @deva[आपूपिकः] 'one who loves cakes'
- @deva[शाष्कुलिकः] 'one who loves @[śaṣkuli] (a type of pastry)'
- @deva[पायसिकः] 'one who loves @[pāyasa] (rice pudding)'

Why 'without consciousness'? For a conscious being: @deva[दैवदत्तः] (uses @deva[अण्], not @deva[ठक्])

Why 'not a country'? For a country: @deva[स्रौघ्नः] (uses @deva[अण्])

Why 'not time'? For a season: @deva[ग्रैष्मः] 'who loves summer' (uses @deva[अण्])
"""

standard = """
The affix @deva[ठक्] comes in the @deva[भक्ति] sense after @deva[अचेतन] (non-conscious) words that are neither @deva[जनपद] (country) names nor @deva[काल] (time) words. This debars @deva[अण्] and @deva[छ].

**Examples:** @deva[आपूपिकः] (loves cakes), @deva[शाष्कुलिकः], @deva[पायसिकः]

**Counter-examples:**
- @deva[चेतन] (conscious): @deva[दैवदत्तः] (devotee of Devadatta)—@deva[अण्]
- @deva[जनपद]: @deva[स्रौघ्नः] (devoted to Srughna)—@deva[अण्]
- @deva[काल]: @deva[ग्रैष्मः] (loves summer)—@deva[अण्]
"""

advanced = """
This @deva[सूत्र] teaches @deva[ठक्] after @deva[अचेतन] words in the @deva[भक्ति] sense, excluding @deva[जनपद] and @deva[काल] words. It serves as an @deva[अपवाद] to @deva[अण्] (@ref[4.1.83]) and @deva[छ].

**Examples:** @deva[अपूपभक्तिः अस्य] → @deva[आपूपिकः]; @deva[शाष्कुलिकः], @deva[पायसिकः]

**Counter-examples:**
- @deva[चेतन]: @deva[दैवदत्तः]—@deva[अण्] by @ref[4.1.83]
- @deva[जनपद]: @deva[स्रौघ्नः]—@deva[अण्] by @ref[4.3.95]
- @deva[काल]: @deva[ग्रैष्मः]—@deva[अण्] by @ref[4.1.83]
"""

id = "4.3.111"
numericId = "43111"

[en]
simple = """
The affix @deva[इनि] (without @deva[ण्]) comes in the @deva[प्रोक्त] (enounced) sense after @deva[कर्मन्द] and @deva[कृशाश्व], specifically for the @deva[भिक्षुसूत्र] (mendicants' treatise) and @deva[नटसूत्र] (performers' treatise).

**Examples:**
- @deva[कर्मन्दिनः भिक्षवः] 'mendicants who study Karmandin's treatise'
- @deva[कृशाश्विनः नटाः] 'performers who study @[kṛśāśvin]'s treatise'

For other works by these authors: @deva[कार्मन्दकम्], @deva[कार्शाश्वम्] (with @deva[अण्]).
"""

standard = """
The affix @deva[इनि] comes after @deva[कर्मन्द] and @deva[कृशाश्व] in the @deva[प्रोक्त] sense for @deva[भिक्षुसूत्र] and @deva[नटसूत्र].

**Examples:** @deva[कर्मन्दिनः भिक्षवः], @deva[कृशाश्विनः नटाः]

The @deva[तद्विषय] sense (@ref[4.2.66]) also applies.

**For other works:** @deva[कार्मन्दकम्], @deva[कार्शाश्वम्] (with @deva[अण्]).
"""

advanced = """
This @deva[सूत्र] teaches @deva[इनि] (not @deva[णिनि]) after @deva[कर्मन्द] and @deva[कृशाश्व] in the @deva[प्रोक्त] sense, restricted to @deva[भिक्षुसूत्र] and @deva[नटसूत्र].

**Examples:** @deva[कर्मन्दिनः भिक्षवः], @deva[कृशाश्विनः नटाः]

The @deva[तद्विषय] sense (@ref[4.2.66]) is inherent. For other works: @deva[कार्मन्दकम्], @deva[कार्शाश्वम्].
"""

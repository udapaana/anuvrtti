id = "4.3.122"
numericId = "43122"

[en]
simple = """
When @deva[रथ] (chariot) is preceded by a word denoting a draught animal (@deva[पत्र]), the affix @deva[अञ्] is used in the sense of 'this belongs to it.' This overrides @deva[यत्].

The word @deva[पत्र] here means 'vehicle' or 'draught animal' — what carries something.

**Examples:**
- @deva[आश्वरथं चक्रम्] 'wheel of a horse-cart'
- @deva[औष्ट्ररथम्] 'of a camel-cart'
- @deva[गार्दभरथम्] 'of a donkey-cart'
"""

standard = """
When @deva[रथ] is preceded by a @deva[पत्र] (draught-animal) word, @deva[अञ्] applies in the @deva[तस्येदम्] sense, debarring @deva[यत्] of @ref[4.3.121].

@deva[पत्र] = @deva[वाहन] (that by which one goes), i.e., a draught animal. It's formed by @deva[ष्ट्रन्] (@ref[3.2.182]).

**Examples:** @deva[आश्वरथं चक्रम्] (horse-cart wheel), @deva[औष्ट्ररथम्], @deva[गार्दभरथम्]
"""

advanced = """
This @deva[सूत्र] teaches @deva[अञ्] after @deva[पत्र] + @deva[रथ] compounds in the @deva[तस्येदम्] sense, debarring @deva[यत्] of @ref[4.3.121].

@deva[पत्र] = @deva[वाहन] (draught animal), formed by @deva[ष्ट्रन्] per @ref[3.2.182].

**Examples:** @deva[आश्वरथम्], @deva[औष्ट्ररथम्], @deva[गार्दभरथम्]
"""

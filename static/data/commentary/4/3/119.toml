id = "4.3.119"
numericId = "43119"

[en]
simple = """
The affix @deva[अञ्] comes in the @deva[कृत] (made by) sense after the words @deva[क्षुद्रा], @deva[भ्रमर], @deva[वटर], and @deva[पादप], when the resulting word is a proper name. This overrides @deva[अण्].

The difference between @deva[अण्] and @deva[अञ्] is only in accent.

**Examples (names for honey):**
- @deva[क्षुद्राभिः कृतम्] → @deva[क्षौद्रम्] 'honey' (made by @deva[क्षुद्रा], small bees)
- @deva[भ्रामरम्], @deva[वाटरम्], @deva[पादपम्]
"""

standard = """
The affix @deva[अञ्] comes after @deva[क्षुद्रा], @deva[भ्रमर], @deva[वटर], and @deva[पादप] in the @deva[कृत] sense with @deva[संज्ञा] result. This debars @deva[अण्].

The distinction between @deva[अण्] and @deva[अञ्] is accentual.

**Examples:** @deva[क्षौद्रम्] (honey, from small bees), @deva[भ्रामरम्], @deva[वाटरम्], @deva[पादपम्]
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अञ्] after @deva[क्षुद्रा], @deva[भ्रमर], @deva[वटर], and @deva[पादप] in the @deva[कृत] sense with @deva[संज्ञा] result, as @deva[अपवाद] to @deva[अण्].

The @deva[अण्]/​@deva[अञ्] difference is accentual only.

**Examples:** @deva[क्षौद्रम्], @deva[भ्रामरम्], @deva[वाटरम्], @deva[पादपम्]
"""

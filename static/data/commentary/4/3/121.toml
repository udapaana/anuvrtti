id = "4.3.121"
numericId = "43121"

[en]
simple = """
The affix @deva[यत्] comes after @deva[रथ] (chariot) in the sense of 'this belongs to it.' This overrides @deva[अण्].

**Example:** @deva[रथस्य इदम्] → @deva[रथ्यम्] 'belonging to the chariot' (e.g., wheel, axle)

The word @deva[रथ्य] specifically denotes parts of a chariot.

A @deva[वार्त्तिक] states that this rule also applies to compounds ending in @deva[रथ], @deva[सीता], and @deva[हल] — there is @deva[तदन्तविधि] (the rule applies to words ending with these).

**Compound examples:** @deva[परमरथ्यम्], @deva[उत्तमरथ्यम्]
"""

standard = """
The affix @deva[यत्] comes after @deva[रथ] in the @deva[तस्येदम्] sense, debarring @deva[अण्].

**Example:** @deva[रथस्य इदम्] → @deva[रथ्यम्] (parts of a chariot: wheel, axle)

**@[vārtika]:** @deva[रथसीताहलेभ्यो यद्विधौ] — when applying @deva[यत्] to @deva[रथ], @deva[सीता], and @deva[हल], there is @deva[तदन्तविधि]. Thus compounds ending in these words also take @deva[यत्]: @deva[परमरथ्यम्], @deva[उत्तमरथ्यम्].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[यत्] after @deva[रथ] in the @deva[तस्येदम्] sense, as @deva[अपवाद] to @deva[अण्].

**Example:** @deva[रथ्यम्] (chariot parts)

**@[vārtika]:** @deva[रथसीताहलेभ्यो यद्विधौ] — @deva[तदन्तविधि] operates for @deva[रथ], @deva[सीता], @deva[हल] when @deva[यत्] is applied. Hence: @deva[परमरथ्यम्], @deva[उत्तमरथ्यम्].
"""

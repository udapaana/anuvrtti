id = "4.3.19"
numericId = "43019"

[en]
simple = """
In Vedic literature (@deva[छन्दस्]), the word @deva[वर्षा] takes the affix @deva[ठञ्] in the remaining senses.

This replaces @deva[ठक्] from @ref[4.3.18]. The form looks the same, but the accent differs.

Example: @deva[नभश्च नभस्यश्च वार्षिकावृतू] (Nabha and Nabhasya are the two rainy months).

Here @deva[ऋतु] means 'month'—Nabha and Nabhasya are the two months of the rainy season.
"""

standard = """
In @deva[छन्दस्], @deva[ठञ्] applies after @deva[वर्षा] in @deva[शेष] senses, debarring @deva[ठक्] (@ref[4.3.18]). The surface form is identical; the difference is in @deva[स्वर].

Example: @deva[नभश्च नभस्यश्च वार्षिकावृतू]. Here @deva[ऋतु] = month (Nabha and Nabhasya are the two rainy months).
"""

advanced = """
In @deva[छन्दस्], @deva[ठञ्] supersedes @deva[ठक्] (@ref[4.3.18]) after @deva[वर्षा]. The @deva[प्रकृति] and @deva[प्रत्यय] yield identical forms; distinction is @deva[स्वर]-based.

Example: @deva[नभश्च नभस्यश्च वार्षिकावृतू]—@deva[ऋतु] here = @deva[मास] (Nabha, Nabhasya).
"""

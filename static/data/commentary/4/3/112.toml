id = "4.3.112"
numericId = "43112"

[en]
simple = """
An affix (from the @deva[प्राग्दीव्यतोऽण्] set, @ref[4.1.83]) comes after a word in the instrumental case to mean 'in the same direction as that.'

The phrase @deva[एकदिक्] means 'having a common direction' (@deva[तुल्यदिक्]).

**Examples:**
- @deva[सुदाम्ना एकदिक्] → @deva[सौदामनी विद्युत्] 'lightning (that goes) in the same direction as the @[sudāman] mountain'
- @deva[हैमवती] 'in the same direction as Himavat'
- @deva[त्रैककुदी], @deva[पैलुमूली]

Note: The repetition of @deva[तेन] in this rule (though available from @ref[4.3.101]) indicates that the @deva[छन्दस्] context governing the previous ten rules does not continue here. Thus @deva[तद्विषयता] (@ref[4.2.66]) does not apply.
"""

standard = """
An affix from @deva[प्राग्दीव्यतोऽण्] (@ref[4.1.83]) comes after a word in @deva[तृतीया] in the sense of @deva[एकदिक्] (same direction, @deva[तुल्यदिक्]).

**Examples:** @deva[सुदाम्ना एकदिक्] → @deva[सौदामनी विद्युत्]; @deva[हैमवती], @deva[त्रैककुदी], @deva[पैलुमूली]

**Technical note:** The explicit @deva[तेन] (though available by @deva[अनुवृत्ति] from @ref[4.3.101]) signals that @deva[छन्दसि] from the preceding ten @deva[सूत्र]s does not continue. Consequently, @deva[तद्विषयता] (@ref[4.2.66]) does not apply here.
"""

advanced = """
This @deva[सूत्र] introduces the @deva[एकदिक्] (common direction) sense for @deva[प्राग्दीव्यतोऽण्] affixes (@ref[4.1.83]), with the base in @deva[तृतीया].

@deva[एकदिक्] = @deva[तुल्यदिक्] (same direction).

**Examples:** @deva[सौदामनी विद्युत्] (lightning in @[sudāman]'s direction), @deva[हैमवती], @deva[त्रैककुदी], @deva[पैलुमूली]

**@deva[तेन] repetition:** Though @deva[तेन] could come by @deva[अनुवृत्ति] from @ref[4.3.101], its explicit statement indicates @deva[छन्दसि] from the preceding ten @deva[सूत्र]s (@ref[4.3.102]–@ref[4.3.111]) does not continue. Hence @deva[तद्विषयता] (@ref[4.2.66]) is inapplicable.
"""

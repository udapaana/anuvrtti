id = "4.3.166"
numericId = "43166"

[en]
simple = """
The fruit-denoting affix is optionally deleted by @deva[लुप्] (not @deva[लुक्]) after @deva[जम्बु].

The difference: with @deva[लुप्], there is gender/number concordance (@ref[1.2.51]).

**Examples:**
- @deva[जम्बू] + @deva[अञ्] + @deva[लुप्] → @deva[जम्बूः फलम्] 'rose-apple fruit' (singular feminine, matching @deva[फलम्])
- Optionally: @deva[जम्ब्वाः फलम्] = @deva[जम्बुफलम्], or @deva[जाम्बवम्]

**@[vārtikas]:**
1. @deva[लुप्] applies to plants that wither after fruiting: @deva[व्रीहिः], @deva[यवाः], @deva[माषाः], @deva[मुद्गाः], @deva[तिलाः]
2. Optionally for flowers and roots: @deva[मल्लिका] (flower), @deva[विदारी] (root). Sometimes no concordance: @deva[पाटलानि पुष्पाणि], @deva[शाल्वानि मूलानि]; @deva[कदम्बं पुष्पम्], @deva[बैल्वानि फलानि].
"""

standard = """
The @deva[फल]-denoting affix optionally undergoes @deva[लुप्] after @deva[जम्बु]. @deva[लुप्] (unlike @deva[लुक्]) involves concordance (@ref[1.2.51]).

**Example:** @deva[जम्बूः फलम्] (@deva[लुप्] with concordance)

Optionally: @deva[जम्बु फलम्], @deva[जाम्बवम्]

**@[vārtika] 1:** @deva[लुप्] for @deva[ओषधि] (plants withering at fruit-time): @deva[व्रीहिः], @deva[यवाः], @deva[माषाः], @deva[मुद्गाः], @deva[तिलाः]

**@[vārtika] 2:** @deva[बहुलम्] for flowers/roots: @deva[मल्लिका] (flower), @deva[विदारी] (root). Sometimes no concordance: @deva[पाटलानि पुष्पाणि], @deva[कदम्बं पुष्पम्], @deva[बैल्वानि फलानि].
"""

advanced = """
This @deva[सूत्र] makes @deva[लुप्] optional for @deva[फल]-affixes after @deva[जम्बु]. @deva[लुप्] involves @deva[लिङ्गसंख्यासाधारण्य] (@ref[1.2.51]).

**Example:** @deva[जम्बूः फलम्]

Optionally: @deva[जम्बु फलम्], @deva[जाम्बवम्]

**@[vārtika] 1:** @deva[फलपाके श्लिष्यमाणोषधेः लुप्] — @deva[व्रीहिः], @deva[यवाः], @deva[माषाः], @deva[मुद्गाः], @deva[तिलाः]

**@[vārtika] 2:** @deva[पुष्पमूलयोश्च बहुलम्] — @deva[मल्लिका] (@deva[पुष्प]), @deva[विदारी] (@deva[मूल]). @deva[बहुलम्] allows non-concordance: @deva[पाटलानि पुष्पाणि], @deva[शाल्वानि मूलानि], @deva[कदम्बं पुष्पम्], @deva[बैल्वानि फलानि].
"""

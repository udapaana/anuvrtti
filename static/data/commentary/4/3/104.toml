id = "4.3.104"
numericId = "43104"

[en]
simple = """
The affix @deva[णिनि] comes in the @deva[प्रोक्त] (enounced) sense after words denoting the direct pupils of @deva[कलापि] and @deva[वैशम्पायन]. This overrides @deva[अण्] and @deva[छ].

**Pupils of @deva[कलापि]:** @deva[हरिद्रु], @deva[छगली], @deva[तुम्बुरु], @deva[उलप]

**Pupils of @deva[वैशम्पायन]:** @deva[आलम्बि], @deva[चरक], @deva[पलङ्ग], @deva[कमल], @deva[ॠचाभ], @deva[आरुणि], @deva[ताण्ड्य], @deva[श्यामायन], @deva[कठ], @deva[कलापि]

**Examples:**
- @deva[हारिद्रविणः] 'those who study works taught by Haridru'
- @deva[तुम्बुरविणः], @deva[औलपिनः]
- @deva[आलम्बिनः], @deva[पालङ्गिनः], @deva[आरुणिनः], @deva[कामलिनः], @deva[ताण्डिनः], @deva[श्यामायनिनः]

Special cases: @deva[छगली] takes @deva[धिनुक्] (@ref[4.3.109]); @deva[कठ] has the affix elided (@ref[4.3.107]); @deva[कलापी] takes @deva[अण्] (@ref[4.3.108]).

'Direct pupils' means immediate disciples, not pupils of pupils. Otherwise @deva[कलापि], being a pupil of @deva[वैशम्पायन], would be redundant.
"""

standard = """
The affix @deva[णिनि] comes after words denoting direct pupils of @deva[कलापि] and @deva[वैशम्पायन] in the @deva[प्रोक्त] sense, debarring @deva[अण्] and @deva[छ].

**@deva[कलापि]-@deva[शिष्याः]:** @deva[हरिद्रु], @deva[छगली], @deva[तुम्बुरु], @deva[उलप]

**@deva[वैशम्पायन]-@deva[शिष्याः]:** @deva[आलम्बि], @deva[पलङ्ग], @deva[कमल], @deva[ॠचाभ], @deva[आरुणि], @deva[ताण्ड्य], @deva[श्यामायन], @deva[कठ], @deva[कलापि]

@deva[चरक] = @deva[वैशम्पायन], hence @deva[चरकाः] = pupils of @deva[वैशम्पायन].

**Examples:** @deva[हारिद्रविणः], @deva[तुम्बुरविणः], @deva[औलपिनः]; @deva[आलम्बिनः], @deva[पालङ्गिनः], @deva[आर्चाभिनः], @deva[आरुणिनः], @deva[कामलिनः], @deva[ताण्डिनः], @deva[श्यामायनिनः]

**Special cases:**
- @deva[छगली] → @deva[धिनुक्] (@ref[4.3.109])
- @deva[कठ] → affix @deva[लुक्] (@ref[4.3.107])
- @deva[कलापी] → @deva[अण्] (@ref[4.3.108])

'Pupils' means direct disciples only. @deva[खाण्डायन] (pupil of @deva[कठ], who is pupil of @deva[वैशम्पायन]) appears in @deva[शौनकादि] (@ref[4.3.106]), not here.
"""

advanced = """
This @deva[सूत्र] teaches @deva[णिनि] after words denoting direct pupils of @deva[कलापि] and @deva[वैशम्पायन] in the @deva[प्रोक्त] sense, debarring @deva[अण्] and @deva[छ].

**@[kārikā]:**
@deva[हरिद्रुरेषां प्रथमस्ततश्छगलितुम्बुरू] @deva[।]
@deva[उलपेन चतुर्थेन कालापकमिहोच्यते] @deva[॥]
@deva[आलम्बिश्चरकः प्राचां पलङ्गकमलावुभौ] @deva[।]
@deva[ऋचाभारुणिताण्ड्याश्च मद्ध्यमीयास्त्रयोऽपरे] @deva[॥]
@deva[श्यामायन उदीच्येषु उक्तः कठकलापिनोः] @deva[।]

**@deva[कलापि]-@deva[शिष्याः] (4):** @deva[हरिद्रु], @deva[छगली], @deva[तुम्बुरु], @deva[उलप]

**@deva[वैशम्पायन]-@deva[शिष्याः] (9):** @deva[आलम्बि], @deva[पलङ्ग], @deva[कमल], @deva[ॠचाभ], @deva[आरुणि], @deva[ताण्ड्य], @deva[श्यामायन], @deva[कठ], @deva[कलापि]

@deva[चरक] = @deva[वैशम्पायन], hence @deva[चरकाः] = his pupils.

**Examples:** @deva[हारिद्रविणः], @deva[तुम्बुरविणः], @deva[औलपिनः]; @deva[आलम्बिनः], @deva[पालङ्गिनः], @deva[आर्चाभिनः], @deva[आरुणिनः], @deva[कामलिनः], @deva[ताण्डिनः], @deva[श्यामायनिनः]

**Special rules:**
- @deva[छगली] → @deva[धिनुक्] by @ref[4.3.109]
- @deva[कठ] → @deva[लुक्] by @ref[4.3.107]
- @deva[कलापी] → @deva[अण्] by @ref[4.3.108]

**Direct pupils only:** Had 'pupil of pupil' been meant, @deva[कलापि] (pupil of @deva[वैशम्पायन]) would include @deva[कलापि]'s own pupils, making separate mention redundant. Similarly, @deva[खाण्डायन] (pupil of @deva[कठ]) appears in @deva[शौनकादि] (@ref[4.3.106]), confirming direct-pupil restriction.
"""

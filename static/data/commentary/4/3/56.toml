id = "4.3.56"
numericId = "43056"

[en]
simple = """
The affix @deva[ढञ्] comes in the sense of 'what stays there' after @deva[दृति] (leather bag), @deva[कुक्षि] (belly), @deva[कलशि] (pot), @deva[वस्ति] (bladder), @deva[अस्ति] (existence/substance), and @deva[अहि] (snake).

Examples: @deva[दार्तेयम्] (what stays in a leather bag), @deva[कौक्षेयम्], @deva[कालशेयम्], @deva[वास्तेयम्], @deva[आस्तेयम्], @deva[आहेयम्] (snake-poison, a type of venom).

@deva[अस्ति] here is a noun (as in @deva[अस्तिक्षीरा गौः] 'a cow with milk', @deva[अस्तिमान्] = @deva[धनवान्] 'wealthy'), not the verb.
"""

standard = """
The affix @deva[ढञ्] applies after @deva[दृति], @deva[कुक्षि], @deva[कलशि], @deva[वस्ति], @deva[अस्ति], @deva[अहि] in @deva[भव] sense.

Examples: @deva[दार्तेयम्], @deva[कौक्षेयम्], @deva[कालशेयम्], @deva[वास्तेयम्], @deva[आस्तेयम्], @deva[आहेयम्] (snake-poison).

@deva[अस्ति] = noun (cf. @deva[अस्तिक्षीरा गौः], @deva[अस्तिमान्] = @deva[धनवान्]), not verb.
"""

advanced = """
@deva[ढञ्] applies after @deva[दृति], @deva[कुक्षि], @deva[कलशि], @deva[वस्ति], @deva[अस्ति], @deva[अहि] in @deva[भव] sense.

Examples: @deva[दार्तेयम्], @deva[कौक्षेयम्], @deva[कालशेयम्], @deva[वास्तेयम्], @deva[आस्तेयम्], @deva[आहेयम्]. @deva[अस्ति] = nominal (cf. @deva[अस्तिक्षीरा गौः]).
"""

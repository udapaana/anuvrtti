id = "4.3.30"
numericId = "43030"

[en]
simple = """
The affix @deva[वुञ्] optionally comes after @deva[अमावास्या] (new moon day) in the sense of 'born therein'.

This replaces @deva[अण्] from @ref[4.3.16].

Examples: @deva[अमावास्यकः] (with @deva[वुञ्]) or @deva[आमावास्यः] (with @deva[अण्]).

The word @deva[अमावस्य] (variant form) also takes these affixes based on the principle that a word changed in one part remains essentially the same (@deva[एकदेशविकृतस्यानन्यत्वात्]). Thus: @deva[अमावस्यकः] or @deva[आमावस्यः].
"""

standard = """
The affix @deva[वुञ्] optionally applies after @deva[अमावास्या] in @deva[जात]-sense, debarring @deva[अण्] (@ref[4.3.16]).

Examples: @deva[अमावास्यकः] (with @deva[वुञ्]) or @deva[आमावास्यः] (with @deva[अण्]).

@deva[अमावस्य] (variant) also takes these by @deva[एकदेशविकृतस्यानन्यत्वात्]: @deva[अमावस्यकः], @deva[आमावस्यः].
"""

advanced = """
@deva[वुञ्] optionally applies after @deva[अमावास्या] in @deva[जात]-sense, superseding @deva[अण्] (@ref[4.3.16]).

Examples: @deva[अमावास्यकः] / @deva[आमावास्यः].

@deva[अमावस्य] is governed by @deva[एकदेशविकृतस्यानन्यत्वात्]-@deva[न्याय]: @deva[अमावस्यकः], @deva[आमावस्यः].
"""

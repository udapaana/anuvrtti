id = "4.3.100"
numericId = "43100"

[en]
simple = """
For words denoting @[kṣatriya] princes (lords of territories) that have the same form in the @deva[बहुवचन] (plural) as the territory name, the base and affix for the @deva[भक्ति] (devotion) sense are the same as those for the territory word.

**Example:** The word @deva[अङ्गाः] means both 'the @[aṅga] country' and 'the @[kṣatriya] princes of @[aṅga].'
- @deva[अङ्गाः जनपदः भक्तिः अस्य] → @deva[आङ्गकः] (by @deva[वुञ्] from @ref[4.2.125]) 'one who loves the @[aṅga] country'
- @deva[अङ्गाः क्षत्रियाः भक्तिः अस्य] → @deva[आङ्गकः] 'one who loves the @[aṅga] princes'

The word @deva[सर्वम्] ('everything') in the rule means not just the affixes but also the bases are treated alike.

For @deva[एकवचन] (singular)/dual forms of prince-denoting words (which differ from territory words), the plural base @deva[मद्राः] is still used: @deva[मद्रः भक्तिः अस्य] or @deva[माद्रौ भक्तिः अस्य] → @deva[मद्रकः].

Why 'princes' (@deva[जनपदिनाम्])? For @[brāhmaṇas]: @deva[पंचालाः ब्राह्मणाः भक्तिः अस्य] → @deva[पांचालः] (with general @deva[अण्]).
"""

standard = """
For @deva[जनपदिन्] (territorial lords/princes) whose plural form matches the @deva[जनपद] (territory) name, the @deva[भक्ति]-sense derivative follows the same pattern as the @deva[जनपद] derivative.

**Principle:** @deva[जनपदवत् सर्वम्]—'everything is like the @deva[जनपद] word.'

**Example:** @deva[अङ्गाः] = both '@[aṅga] country' and '@[aṅga] princes'
- From territory: @deva[आङ्गकः] (by @deva[वुञ्], @ref[4.2.125])
- From princes: @deva[आङ्गकः] (same)

Similarly: @deva[वाङ्गकः], @deva[सौह्मकः], @deva[पौन्द्रकः]

**Singular/dual:** The @deva[ताद्राज] affix is elided only in plural. Yet this rule extends to singular/dual—the @deva[जनपद] base is used: @deva[माद्रः] or @deva[माद्रौ भक्तिः अस्य] → @deva[मद्रकः] (not @deva[माद्रकः]).

**Restriction:** @deva[जनपदिनाम्] limits this to princes. @deva[पंचालाः ब्राह्मणाः भक्तिः अस्य] → @deva[पांचालः] (general @deva[अण्]).

**@deva[समानशब्द]:** The prince and territory words must have identical plural forms. Counter-example: @deva[अनुषण्डः जनपदः], @deva[पौरवः राजा] → @deva[पौरवीयः] (different words).
"""

advanced = """
This @deva[सूत्र] establishes an @deva[अतिदेश] (analogical extension): @deva[जनपदिन्] (territorial princes) whose @deva[बहुवचन] form matches the @deva[जनपद] name take @deva[भक्ति]-affixes exactly as @deva[जनपद] words do.

**Analysis:** @deva[जनपदिनां बहुवचने जनपदेन समानशब्दानां जनपदवत् सर्वम्]

- @deva[जनपदिनाम्]: gen. pl. of @deva[जनपदिन्] (lords of territories)
- @deva[बहुवचने]: in the plural
- @deva[जनपदेन समानशब्दानाम्]: having the same form as the @deva[जनपद] word
- @deva[जनपदवत् सर्वम्]: everything follows @deva[जनपद] pattern

**Application:** The @deva[भक्ति] affixes from @ref[4.2.124] ff. apply. Thus @deva[अङ्गाः क्षत्रियाः भक्तिः अस्य] → @deva[आङ्गकः] (by @deva[वुञ्], @ref[4.2.125]).

**@deva[सर्वम्]:** Both affix and base follow @deva[जनपद]. In singular/dual, @deva[ताद्राज] is not elided for princes (@deva[माद्रः], @deva[माद्रौ]), yet the @deva[जनपद]-base @deva[मद्र] is used: @deva[मद्रकः].

**@deva[बहुवचने]:** Though @deva[समानशब्दता] occurs only in plural, the @deva[अतिदेश] extends to singular/dual.

**Counter-examples:**
- Non-princes: @deva[पंचालाः ब्राह्मणाः भक्तिः अस्य] → @deva[पांचालः] (@deva[अण्])
- Non-@deva[समानशब्द]: @deva[अनुषण्डः जनपदः], @deva[पौरवः राजा] → @deva[पौरवीयः]
"""

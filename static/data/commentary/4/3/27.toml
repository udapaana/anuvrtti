id = "4.3.27"
numericId = "43027"

[en]
simple = """
The affix @deva[वुञ्] comes after @deva[शरद्] (autumn) in the locative case, in the sense of 'born therein', when the resulting word is a proper name (@deva[संज्ञा]).

This replaces @deva[अण्].

Examples: @deva[शारदका दर्भाः] (grass named @[śāradaka]), @deva[शारदका मुद्गाः] (pulse named @[śāradaka]).

When not a name: @deva[शारदं सस्यम्] (autumnal crop, with @deva[अण्]).

Some say @deva[संज्ञायाम्] governs all @[sūtras] up to @ref[4.3.38].
"""

standard = """
The affix @deva[वुञ्] applies after @deva[शरद्] (locative) in @deva[जात]-sense when @deva[संज्ञा] (proper name), debarring @deva[अण्].

Examples: @deva[शारदका दर्भाः], @deva[शारदका मुद्गाः].

Non-@deva[संज्ञा]: @deva[शारदं सस्यम्].

Some hold @deva[संज्ञायाम्] governs through @ref[4.3.38].
"""

advanced = """
@deva[वुञ्] applies after @deva[शरद्] (@deva[सप्तम्यन्त]) in @deva[जात]-@deva[संज्ञा] sense, superseding @deva[अण्].

Examples: @deva[शारदका दर्भाः], @deva[शारदका मुद्गाः]. Counter-example: @deva[शारदं सस्यम्].

@deva[संज्ञायाम्] may extend as @deva[अधिकार] through @ref[4.3.38].
"""

id = "4.3.136"
numericId = "43136"

[en]
simple = """
The affix @deva[अण्] comes in the sense of 'modification or part' after words in the @deva[बिल्वादि] list. This overrides @deva[अञ्] and @deva[मयट्].

**Example:** @deva[बैल्वः] 'modification or part of the Bilva tree'

The word @deva[गवेधुका] appears in this list. It would also take @deva[अण्] by the next rule (@ref[4.3.137]), but its inclusion here specifically blocks @deva[मयट्].

**@deva[बिल्वादि] list:** @deva[बिल्व], @deva[व्रीहि], @deva[काण्ड], @deva[मुद्ग], @deva[मसूर], @deva[गोधूम], @deva[इक्षु], @deva[वेणु], @deva[गवेधुका], @deva[कर्पासी], @deva[पाटली], @deva[कर्कन्धू], @deva[कुटीर].
"""

standard = """
The affix @deva[अण्] comes after @deva[बिल्वादि] words in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[अञ्] and @deva[मयट्].

**Example:** @deva[बैल्वः]

@deva[गवेधुका] appears in both this list and would qualify for @ref[4.3.137]; its inclusion here specifically blocks @deva[मयट्].

**@deva[बिल्वादि] @deva[गण] (13):** @deva[बिल्व], @deva[व्रीहि], @deva[काण्ड], @deva[मुद्ग], @deva[मसूर], @deva[गोधूम], @deva[इक्षु], @deva[वेणु], @deva[गवेधुका], @deva[कर्पासी], @deva[पाटली], @deva[कर्कन्धू], @deva[कुटीर].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अण्] after @deva[बिल्वादि] words in the @deva[विकार]/​@deva[अवयव] sense, as @deva[अपवाद] to @deva[अञ्] and @deva[मयट्].

**Example:** @deva[बैल्वः]

@deva[गवेधुका] would take @deva[अण्] by @ref[4.3.137] as well; its inclusion here is specifically to block @deva[मयट्].

**@deva[बिल्वादि] @deva[गण]:** @deva[बिल्व], @deva[व्रीहि], @deva[काण्ड], @deva[मुद्ग], @deva[मसूर], @deva[गोधूम], @deva[इक्षु], @deva[वेणु], @deva[गवेधुका], @deva[कर्पासी], @deva[पाटली], @deva[कर्कन्धू], @deva[कुटीर].
"""

id = "4.3.155"
numericId = "43155"

[en]
simple = """
The affix @deva[अञ्] comes in the @deva[विकार] (modification) or @deva[अवयव] (part) sense after a word that already ends in a @deva[ञित्] affix (an affix with indicatory @deva[ञ्]) used in the @deva[विकार]/​@deva[अवयव] sense.

The @deva[ञित्] affixes in this sense are: @deva[अञ्] (@ref[4.3.139], @ref[4.3.154]), @deva[ट्लञ्] (@ref[4.3.142]), @deva[वुञ्] (@ref[4.3.157]), @deva[ढञ्] (@ref[4.3.159]), @deva[यञ्] (@ref[4.3.168]).

When forming a tertiary derivative from such words, @deva[अञ्] is used.

**Examples:**
- @deva[दैवदारवम्] (from @deva[दैवदारव]) → @deva[दैवदारवम्]
- @deva[दाधित्थम्], @deva[पालाशम्], @deva[शामीलम्], @deva[कापोतम्], @deva[औष्ट्रकम्], @deva[ऐणेयम्], @deva[कांस्यम्], @deva[पारशवम्]

Why '@deva[ञित्]'? After non-@deva[ञित्] affixes, @deva[मयट्] applies: @deva[बैल्वमयम्] (from @deva[बैल्व], which has @deva[अण्] by @ref[4.3.136]).
"""

standard = """
The affix @deva[अञ्] comes after a word ending in a @deva[ञित्] @deva[विकार]/​@deva[अवयव] affix, when forming a further derivative in the same sense.

**@deva[ञित्] affixes in this sense:** @deva[अञ्] (@ref[4.3.139], @ref[4.3.154]), @deva[ट्लञ्] (@ref[4.3.142]), @deva[वुञ्] (@ref[4.3.157]), @deva[ढञ्] (@ref[4.3.159]), @deva[यञ्] (@ref[4.3.168]).

**Examples:** @deva[दैवदारवम्], @deva[दाधित्थम्], @deva[पालाशम्], @deva[शामीलम्], @deva[कापोतम्], @deva[औष्ट्रकम्], @deva[ऐणेयम्], @deva[कांस्यम्], @deva[पारशवम्]

**@deva[ञितः] condition:** After non-@deva[ञित्]: @deva[बैल्वमयम्] (from @deva[बैल्व], @deva[अण्] by @ref[4.3.136]); @deva[बैदमयम्].
"""

advanced = """
This @deva[सूत्र] teaches @deva[अञ्] after @deva[ञित्] @deva[विकार]/​@deva[अवयव] affixes for tertiary derivatives.

**@deva[ञित्] @deva[विकारार्थ] affixes:** @deva[अञ्] (@ref[4.3.139], @ref[4.3.154]), @deva[ट्लञ्] (@ref[4.3.142]), @deva[वुञ्] (@ref[4.3.157]), @deva[ढञ्] (@ref[4.3.159]), @deva[यञ्] (@ref[4.3.168]).

**Examples:** @deva[दैवदारवम्], @deva[दाधित्थम्], @deva[पालाशम्], @deva[शामीलम्], @deva[कापोतम्], @deva[औष्ट्रकम्], @deva[ऐणेयम्], @deva[कांस्यम्], @deva[पारशवम्]

**@deva[ञितः]:** Non-@deva[ञित्] bases take @deva[मयट्]: @deva[बैल्वमयम्] (@deva[बैल्व] has @deva[अण्], @ref[4.3.136]), @deva[बैदमयम्].
"""

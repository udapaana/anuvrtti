id = "4.3.53"
numericId = "43053"

[en]
simple = """
An affix comes after a word in the locative case in the sense of 'who stays there' (@deva[तत्र भवः]).

The @deva[अनुवृत्ति] of @deva[काल] ceases here. @deva[भव] here means 'existence' or 'dwelling', not 'birth'—that sense was covered in @deva[तत्र जातः] (@ref[4.3.25]).

Examples: @deva[स्रुघ्ने भवः] = @deva[स्रौघ्नः] (one who dwells in Srughna), @deva[माथुरः], @deva[राष्ट्रियः].

The repetition of @deva[तत्र] (though its @deva[अनुवृत्ति] could continue) is to stop the continuation of @deva[तदस्य] from earlier rules.
"""

standard = """
An affix applies after @deva[सप्तम्यन्त] in @deva[तत्र भवः] sense (dwelling there). @deva[कालात्]-@deva[अनुवृत्ति] ceases. @deva[भव] = existence/dwelling, not birth (@ref[4.3.25] = @deva[जात]).

Examples: @deva[स्रौघ्नः], @deva[माथुरः], @deva[राष्ट्रियः].

Repetition of @deva[तत्र] terminates @deva[तदस्य]-@deva[अनुवृत्ति].
"""

advanced = """
Affixes apply after @deva[सप्तम्यन्त] in @deva[तत्र भवः] sense. @deva[कालात्]-@deva[अनुवृत्ति] terminates. @deva[भव] ≠ @deva[जात] (@ref[4.3.25]).

Examples: @deva[स्रौघ्नः], @deva[माथुरः], @deva[राष्ट्रियः]. @deva[तत्र]-repetition blocks @deva[तदस्य]-@deva[अनुवृत्ति].
"""

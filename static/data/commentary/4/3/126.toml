id = "4.3.126"
numericId = "43126"

[en]
simple = """
The affix @deva[वुञ्] comes in the sense of 'this belongs to them' after @deva[गोत्र] (family/patronymic) words denoting Vedic schools (@deva[चरण]). This overrides @deva[अण्] and @deva[छ].

According to @[patañjali], @deva[चरण] here means @deva[धर्म] (duties/doctrines) and @deva[आम्नाय] (traditions), not just 'Vedic school.'

**Examples:**
- @deva[कठानां धर्मः आम्नायो वा] → @deva[काठकम्] 'the @[dharma-sūtras] or tradition of the @[kaṭha] school'
- @deva[कालापकम्], @deva[मौदकम्], @deva[पैप्पलादकम्]

Also for patronymics: @deva[ग्लौचुकायनकम्], @deva[औपगवकम्]
"""

standard = """
The affix @deva[वुञ्] comes after @deva[गोत्र] words of @deva[चरण]s (Vedic schools) in the @deva[तस्येदम्] sense, debarring @deva[अण्] and @deva[छ].

Per @[patañjali], @deva[चरण] = @deva[धर्म] (doctrines) and @deva[आम्नाय] (traditions).

**Examples:** @deva[काठकम्] (@deva[कठानां धर्मः आम्नायो वा]), @deva[कालापकम्], @deva[मौदकम्], @deva[पैप्पलादकम्]

**@deva[गोत्र]:** @deva[ग्लौचुकायनकम्], @deva[औपगवकम्]
"""

advanced = """
This @deva[सूत्र] teaches @deva[वुञ्] after @deva[गोत्र] words in the @deva[चरण] (Vedic school) context, in the @deva[तस्येदम्] sense, debarring @deva[अण्] and @deva[छ].

Per @[patañjali]: @deva[चरण] = @deva[धर्म] + @deva[आम्नाय], not merely 'school.'

**Examples:** @deva[काठकम्] (@deva[कठानां धर्मः आम्नायो वा]), @deva[कालापकम्], @deva[मौदकम्], @deva[पैप्पलादकम्]

**@deva[गोत्र]:** @deva[ग्लौचुकायनकम्], @deva[औपगवकम्]
"""

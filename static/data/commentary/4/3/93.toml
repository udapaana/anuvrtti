id = "4.3.93"
numericId = "43093"

[en]
simple = """
The affix @deva[अण्] comes after words in the @deva[सिन्ध्वादि] list, and @deva[अञ्] comes after words in the @deva[तक्षशिलादि] list, both meaning 'this is his native land.'

**@deva[सिन्ध्वादि] examples (take @deva[अण्]):**
- @deva[सिन्धु] → @deva[सैन्धवः]
- @deva[वर्णु] → @deva[वार्णवः]

**@deva[तक्षशिलादि] examples (take @deva[अञ्]):**
- @deva[तक्षशिला] → @deva[ताक्षशिलः]
- @deva[वत्सोद्धरण] → @deva[वात्सोद्धरणः]

Many words in @deva[सिन्ध्वादि] also appear in @deva[कच्छादि] (@ref[4.2.133]). This rule prevents @deva[वुञ्] (@ref[4.2.134]) when the @deva[अभिजन] sense is added.
"""

standard = """
The affixes @deva[अण्] and @deva[अञ्] come respectively after @deva[सिन्ध्वादि] and @deva[तक्षशिलादि] words in the @deva[अभिजन] sense.

**@deva[सिन्ध्वादि] (+ @deva[अण्]):** @deva[सैन्धवः], @deva[वार्णवः]

**@deva[तक्षशिलादि] (+ @deva[अञ्]):** @deva[ताक्षशिलः], @deva[वात्सोद्धरणः]

Many @deva[सिन्ध्वादि] words overlap with @deva[कच्छादि] (@ref[4.2.133]), which would otherwise take @deva[वुञ्] by @ref[4.2.134]. This @deva[सूत्र] overrides that when @deva[अभिजन] is meant.

**@deva[सिन्ध्वादि]:** @deva[सिन्धु], @deva[वर्णु], @deva[मधुमत्], @deva[कम्बोज], @deva[साल्व], @deva[कश्मीर], @deva[गन्धार], @deva[किष्किन्धा], @deva[उरसा], @deva[दरद्], @deva[गन्दिका], @deva[कुलून], @deva[दिरसा]

**@deva[तक्षशिलादि]:** @deva[तक्षशिला], @deva[वत्सोद्धरण], @deva[कैर्मेदुर], @deva[ग्रामणी], @deva[छगल], @deva[क्रोष्टुकर्ण], @deva[सिंहकर्ण], @deva[संकुचित], @deva[किंनर], @deva[काण्डधार], @deva[पर्वत], @deva[अवसान], @deva[बर्बर], @deva[कंस], @deva[सरालक]
"""

advanced = """
This @deva[सूत्र] teaches @deva[अण्] after @deva[सिन्ध्वादि] and @deva[अञ्] after @deva[तक्षशिलादि] in the @deva[अभिजन] sense.

**Examples:** @deva[सैन्धवः], @deva[वार्णवः]; @deva[ताक्षशिलः], @deva[वात्सोद्धरणः]

Many @deva[सिन्ध्वादि] words also appear in @deva[कच्छादि] (@ref[4.2.133]) and would take @deva[अण्] by that rule. This @deva[सूत्र] prevents @deva[वुञ्] (@ref[4.2.134]) when the additional @deva[अभिजन] sense applies.

**@deva[सिन्ध्वादि] @deva[गण]:** @deva[सिन्धु], @deva[वर्णु], @deva[मधुमत्], @deva[कम्बोज], @deva[साल्व], @deva[कश्मीर], @deva[गन्धार], @deva[किष्किन्धा], @deva[उरसा]/​@deva[उरस], @deva[दरद्]/​@deva[दरद], @deva[गन्दिका]/​@deva[गब्दिका], @deva[कुलून], @deva[दिरसा]

**@deva[तक्षशिलादि] @deva[गण]:** @deva[तक्षशिला], @deva[वत्सोद्धरण], @deva[कैर्मेदुर]/​@deva[कौमेदुर], @deva[ग्रामणी], @deva[छगल], @deva[क्रोष्टुकर्ण]/​@deva[कर्णकोष्ठ], @deva[सिंहकर्ण]/​@deva[सिंहकोष्ठ], @deva[संकुचित], @deva[किंनर], @deva[काण्डधार]/​@deva[काण्डवारण], @deva[पर्वत], @deva[अवसान], @deva[बर्बर], @deva[कंस], @deva[सरालक]
"""

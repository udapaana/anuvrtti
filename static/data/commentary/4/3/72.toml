id = "4.3.72"
numericId = "43072"

[en]
simple = """
The affix @deva[ठक्] comes in the senses of 'occurring therein' or 'commentary thereon' after:
• A word of two syllables (@deva[द्व्यच्])
• A word ending in short @deva[ऋ]
• The words @deva[ब्राह्मण], @deva[ऋक्], @deva[प्रथम], @deva[पुरश्चरण], @deva[नाम], @deva[आख्यात], @deva[नामाख्यात]

These must be names of explainable works.

This replaces @deva[अण्] and @deva[ठञ्].

Examples:
• Two syllables: @deva[ऐष्टिकः], @deva[पाशुकः]
• Ending in @deva[ऋ]: @deva[चातुर्होतृकः], @deva[पाञ्चहोतृकः]
• Named words: @deva[ब्राह्मणिकः], @deva[आर्चिकः], @deva[प्राथमिकः], @deva[आध्वरिकः], @deva[पौरश्चरणिकः], @deva[नामिकः], @deva[आख्यातिकः], @deva[नामाख्यातिकः]
"""

standard = """
The affix @deva[ठक्] applies after @deva[द्व्यच्] (disyllabic), @deva[ऋदन्त] (short @deva[ऋ]-ending), and @deva[ब्राह्मण]/@deva[ऋक्]]/@deva[प्रथम]]/@deva[पुरश्चरण]]/@deva[नाम]]/@deva[आख्यात]]/@deva[नामाख्यात]] in @deva[भव]/@deva[व्याख्यान]] senses, debarring @deva[अण्]/@deva[ठञ्]].

Examples: @deva[ऐष्टिकः], @deva[पाशुकः] (disyllabic); @deva[चातुर्होतृकः], @deva[पाञ्चहोतृकः] (@deva[ऋदन्त]); @deva[ब्राह्मणिकः], @deva[आर्चिकः], @deva[प्राथमिकः], @deva[आध्वरिकः], @deva[पौरश्चरणिकः], @deva[नामिकः], @deva[आख्यातिकः], @deva[नामाख्यातिकः].
"""

advanced = """
@deva[ठक्] applies after @deva[द्व्यच्], @deva[ऋदन्त], and @deva[ब्राह्मणादि] in @deva[भव]/@deva[व्याख्यान]] senses, superseding @deva[अण्]/@deva[ठञ्]].

Examples: @deva[ऐष्टिकः], @deva[पाशुकः]; @deva[चातुर्होतृकः], @deva[पाञ्चहोतृकः]; @deva[ब्राह्मणिकः], @deva[आर्चिकः], @deva[प्राथमिकः], @deva[पौरश्चरणिकः], @deva[नामिकः], @deva[आख्यातिकः], @deva[नामाख्यातिकः].
"""

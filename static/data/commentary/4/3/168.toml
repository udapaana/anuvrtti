id = "4.3.168"
numericId = "43168"

[en]
simple = """
The affixes @deva[यञ्] and @deva[अञ्] come respectively in the @deva[विकार] (product) sense after @deva[कंसीय] and @deva[परशव्य], and the prior affixes (@deva[छ] and @deva[यत्]) are deleted by @deva[लुक्].

The word @deva[कंसीय] is formed by @deva[छ] (@ref[5.1.1]); @deva[परशव्य] by @deva[यत्] (@ref[5.1.2]). These affixes are elided when @deva[यञ्] and @deva[अञ्] are added.

**Derivations:**
- @deva[कंसीय] + @deva[यञ्] → @deva[कंस] + @deva[यञ्] → @deva[कांस्यः] 'bronze' (product measured by @deva[कंस])
- @deva[परशव्य] + @deva[अञ्] → @deva[परशु] + @deva[अञ्] → @deva[पारशवः] 'axe-product'

The word @deva[लुक्] applies to affixes only (@ref[1.1.61]), not bases. So @deva[स] (in @deva[कंस], from @[uṇ]. III.62) and @deva[उ] (in @deva[परशु], from @[uṇ]. I.33) are not deleted — they were added to @deva[धातु]s, not @deva[प्रातिपदिक]s.

@deva[परशव्य] is @deva[आद्यनुदात्त] by @ref[6.1.185] and would take @deva[अञ्] by @ref[4.3.140] anyway; this rule specifically teaches @deva[लुक्] of @deva[यत्].
"""

standard = """
The affixes @deva[यञ्] and @deva[अञ्] come after @deva[कंसीय] and @deva[परशव्य] respectively in the @deva[विकार] sense, with @deva[लुक्] of their @deva[छ] and @deva[यत्] affixes.

@deva[कंसीय]: @deva[कंस] + @deva[छ] (@ref[5.1.1])
@deva[परशव्य]: @deva[परशु] + @deva[यत्] (@ref[5.1.2])

**Derivations:**
- @deva[कंसीय] + @deva[यञ्] = @deva[कंस] + @deva[यञ्] = @deva[कांस्यः]
- @deva[परशव्य] + @deva[अञ्] = @deva[परशु] + @deva[अञ्] = @deva[पारशवः]

@deva[लुक्] applies only to affixes following a @deva[प्रातिपदिक] (@ref[1.1.61]). The @[uṇādi] affixes @deva[स] (@deva[कम्] + @deva[स], @[uṇ]. III.62) and @deva[उ] (@deva[परशृ] + @deva[उ], @[uṇ]. I.33) are added to @deva[धातु]s, hence preserved.

@deva[परशव्य] is @deva[आद्यनुदात्त] (@ref[6.1.185]); @deva[अञ्] would come by @ref[4.3.140]. This @deva[सूत्र] specifically teaches @deva[लुक्] of @deva[यत्].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[यञ्] after @deva[कंसीय] and @deva[अञ्] after @deva[परशव्य] in the @deva[विकार] sense, with @deva[लुक्] of their prior affixes @deva[छ] and @deva[यत्].

@deva[कंसीय]: @deva[कम्] + @deva[स] (@[uṇ]. III.62) + @deva[छ] (@ref[5.1.1])
@deva[परशव्य]: @deva[पर] + @deva[शृ] + @deva[उ] (@[uṇ]. I.33) + @deva[यत्] (@ref[5.1.2])

**Derivations:**
- @deva[कंसीय] + @deva[यञ्] → @deva[लुक्] of @deva[छ] → @deva[कंस] + @deva[यञ्] → @deva[कांस्यः]
- @deva[परशव्य] + @deva[अञ्] → @deva[लुक्] of @deva[यत्] → @deva[परशु] + @deva[अञ्] → @deva[पारशवः]

**Why @deva[स]/​@deva[उ] preserved?** @deva[लुक्] applies only to affixes after @deva[प्रातिपदिक] (@ref[1.1.61]). @deva[स] and @deva[उ] follow @deva[धातु]s.

@deva[परशव्य] is @deva[आद्यनुदात्त] (@ref[6.1.185]) → @deva[अञ्] by @ref[4.3.140]. This @deva[सूत्र] adds @deva[लुक्] of @deva[यत्].

**Objection:** @ref[6.4.148] + @ref[6.4.150] would delete final @deva[य्]. **Answer:** @ref[6.4.150] requires a following @deva[दीर्घ ई] affix, which isn't the case here.
"""

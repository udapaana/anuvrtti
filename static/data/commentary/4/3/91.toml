id = "4.3.91"
numericId = "43091"

[en]
simple = """
The affix @deva[छ] comes after a word denoting a mountain to mean 'this is his ancestral homeland,' when referring to mercenary soldiers (people who earn their living by arms).

@deva[आयुधजीविन्] means one who lives by weapons—a professional soldier. The phrase @deva[सोऽस्याभिजनः] ('that is his native place') is understood.

**Examples:**
- @deva[हृद्गोल] (a mountain) + @deva[छ] → @deva[हृद्गोलीयाः] 'mercenary soldiers whose ancestral home is the @[hṛdgola] mountain'
- @deva[अन्धकवर्त्तीयाः], @deva[रोहितगिरीयाः]

Why 'for mercenaries'? For @[brāhmaṇas] from the @[ṛkṣoda] mountains, we say @deva[आर्क्षोदाः], not with @deva[छ]. Why 'mountains'? For mercenaries from the town @[sāṅkāśya], we say @deva[सांकाश्यकाः], using a different affix.
"""

standard = """
The affix @deva[छ] is added after mountain names in the sense of @deva[अभिजन] (ancestral homeland), but only when the referent is @deva[आयुधजीविन्] (one who lives by arms).

**Examples:**
- @deva[हृद्गोलः पर्वतः अभिजनः एषाम् आयुधजीविनाम्] → @deva[हृद्गोलीयाः] 'mercenaries from @[hṛdgola] mountain'
- @deva[अन्धकवर्त्तीयाः], @deva[रोहितगिरीयाः]

**Restrictions:**
- @deva[आयुधजीविभ्यः] — For non-mercenaries: @deva[आर्क्षोदाः ब्राह्मणाः] (@[brāhmaṇas] from @[ṛkṣoda] use @deva[अण्])
- Mountains only — For mercenaries from a town: @deva[सांकाश्यकाः आयुधजीविनः] (from @[sāṅkāśya], not a mountain)
"""

advanced = """
This @deva[सूत्र] teaches @deva[छ] after @deva[पर्वत]-denoting words in the @deva[अभिजन] sense, restricted to @deva[आयुधजीविन्] (mercenary soldiers).

The phrase @deva[सोऽस्याभिजनः] continues from earlier. The @deva[ईय] results from @deva[छ] after the base.

**Examples:** @deva[हृद्गोलीयाः], @deva[अन्धकवर्त्तीयाः], @deva[रोहितगिरीयाः].

**Counter-examples:**
- Non-@deva[आयुधजीविन्]: @deva[आर्क्षोदाः ब्राह्मणाः] — @deva[अण्] applies by @ref[4.1.83]
- Non-@deva[पर्वत]: @deva[सांकाश्यकाः आयुधजीविनः] — different affix for town names
"""

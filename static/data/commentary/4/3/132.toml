id = "4.3.132"
numericId = "43132"

[en]
simple = """
The affix @deva[अण्] comes in the sense of 'this belongs to them' after @deva[कौपिञ्जल] and @deva[हास्तिपद]. This overrides @deva[वुञ्].

**Examples:** @deva[कौपिञ्जलः], @deva[हास्तिपदः]

This rule is essentially a @deva[वार्त्तिक].
"""

standard = """
The affix @deva[अण्] comes after @deva[कौपिञ्जल] and @deva[हास्तिपद] in the @deva[तस्येदम्] sense, debarring @deva[वुञ्] of @ref[4.3.126].

**Examples:** @deva[कौपिञ्जलः], @deva[हास्तिपदः]

This @deva[सूत्र] is essentially a @deva[वार्त्तिक].
"""

advanced = """
This @deva[सूत्र] (functioning as a @deva[वार्त्तिक]) prescribes @deva[अण्] after @deva[कौपिञ्जल] and @deva[हास्तिपद] in the @deva[तस्येदम्] sense, as @deva[अपवाद] to @deva[वुञ्] of @ref[4.3.126].

**Examples:** @deva[कौपिञ्जलः], @deva[हास्तिपदः]
"""

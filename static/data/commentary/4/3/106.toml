id = "4.3.106"
numericId = "43106"

[en]
simple = """
The affix @deva[णिनि] comes in the @deva[प्रोक्त] (enounced) sense after words in the @deva[शौनकादि] list when referring to Vedic literature (@deva[छन्दस्]). This overrides @deva[छ] and @deva[अण्].

**Examples:**
- @deva[शौनकेन प्रोक्तम् अधीयते] → @deva[शौनकिनः] 'those who study the Veda taught by @[śaunaka]'
- @deva[वाजसनेयिनः] (students of @[vājasaneya]'s teaching)

Why 'Vedic literature'? For non-Vedic works: @deva[शौनकीया शिक्षा] 'the phonetics manual of @[śaunaka]' (uses @deva[छ], not @deva[णिनि]).

Note: @deva[कठशाठ] in this list must be taken as a compound. For @deva[कठ] alone, the affix is elided by the next rule.

**@deva[शौनकादि] list:** @deva[शौनक], @deva[वाजसनेय], @deva[शार्ङ्गरव], @deva[शापेय], @deva[शाष्पेय], @deva[खाडायन], @deva[स्तम्भ], @deva[स्कन्ध], @deva[देवदर्शन], @deva[रज्जुभार], @deva[रज्जुकण्ठ], @deva[कठशाठ], @deva[कषाय], @deva[तल], @deva[दण्ड], @deva[पुरुषांसक], @deva[अश्वपेज], @deva[साङ्गरव], @deva[स्कन्द], @deva[देवदत्तशठ], @deva[तलवकार].
"""

standard = """
The affix @deva[णिनि] comes after @deva[शौनकादि] words in the @deva[प्रोक्त] sense when the reference is to @deva[छन्दस्] (Vedic texts). This debars @deva[छ] and @deva[अण्].

**Examples:** @deva[शौनकिनः] (students of @[śaunaka]'s Vedic teaching), @deva[वाजसनेयिनः]

**Restriction to @deva[छन्दस्]:** @deva[शौनकीया शिक्षा] (@[śaunaka]'s phonetics, a non-@deva[छन्दस्] work) uses @deva[छ].

**@deva[कठशाठ]:** Must be taken as a compound → @deva[काठशाठिनः]. For @deva[कठ] alone, see @ref[4.3.107].

**@deva[शौनकादि] @deva[गण]:** @deva[शौनक], @deva[वाजसनेय], @deva[शार्ङ्गरव], @deva[शापेय]/​@deva[सांपेय], @deva[शाष्पेय]/​@deva[शाखेय], @deva[खाडायन], @deva[स्तम्भ]/​@deva[स्कम्भ], @deva[स्कन्ध], @deva[देवदर्शन], @deva[रज्जुभार], @deva[रज्जुकण्ठ], @deva[कठशाठ], @deva[कषाय]/​@deva[कशाय], @deva[तल], @deva[दण्ड], @deva[पुरुषांसक]/​@deva[पुरुषासक], @deva[अश्वपेज]/​@deva[अश्वपेठा], @deva[साङ्गरव], @deva[स्कन्द], @deva[देवदत्तशठ], @deva[तलवकार].
"""

advanced = """
This @deva[सूत्र] teaches @deva[णिनि] after @deva[शौनकादि] words in the @deva[प्रोक्त] sense, qualified by @deva[छन्दसि] (for Vedic literature). It debars @deva[छ] and @deva[अण्].

**Examples:** @deva[शौनकेन प्रोक्तम् अधीयते] → @deva[शौनकिनः]; @deva[वाजसनेयिनः]

**@deva[छन्दसि] restriction:** For @deva[शिक्षा] (non-@deva[छन्दस्]): @deva[शौनकीया शिक्षा]

**@deva[कठशाठ]:** Treated as @deva[द्वन्द्व] → @deva[काठशाठिनः]. For @deva[कठ] alone, @deva[लुक्] by @ref[4.3.107].

**@deva[शौनकादि] @deva[गण] (21):** @deva[शौनक], @deva[वाजसनेय], @deva[शार्ङ्गरव], @deva[शापेय] (@deva[सांपेय]), @deva[शाष्पेय] (@deva[शाखेय]), @deva[खाडायन], @deva[स्तम्भ] (@deva[स्कम्भ]), @deva[स्कन्ध], @deva[देवदर्शन], @deva[रज्जुभार], @deva[रज्जुकण्ठ], @deva[कठशाठ], @deva[कषाय] (@deva[कशाय]), @deva[तल], @deva[दण्ड], @deva[पुरुषांसक] (@deva[पुरुषासक]), @deva[अश्वपेज] (@deva[अश्वपेठा]), @deva[साङ्गरव], @deva[स्कन्द], @deva[देवदत्तशठ], @deva[तलवकार].
"""

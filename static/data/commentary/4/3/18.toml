id = "4.3.18"
numericId = "43018"

[en]
simple = """
The affix @deva[ठक्] comes after @deva[वर्षा] (the rains) in the remaining senses.

This replaces @deva[अण्] from @ref[4.3.16].

Example: @deva[वार्षिकम् अनुलेपनम्] (the annual ointment/unguent).

Here @deva[ठक्] carries the sense of @deva[साधु] (proper for) etc., as defined in @ref[4.3.43].
"""

standard = """
The affix @deva[ठक्] applies after @deva[वर्षा] in @deva[शेष] senses, debarring @deva[अण्] (@ref[4.3.16]).

Example: @deva[वार्षिकम् अनुलेपनम्].

The @deva[ठक्] here has the force of @deva[साधु] etc. from @ref[4.3.43].
"""

advanced = """
@deva[ठक्] is ordained after @deva[वर्षा] in @deva[शेष] senses, superseding @deva[अण्] (@ref[4.3.16]).

Example: @deva[वार्षिकम् अनुलेपनम्]. The @deva[ठक्] conveys @deva[साधु]-@deva[आदि] senses (@ref[4.3.43]).
"""

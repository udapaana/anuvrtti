id = "4.3.54"
numericId = "43054"

[en]
simple = """
The affix @deva[यत्] comes after the words @deva[दिश्] (direction), @deva[वर्ग] (class), and others in the @deva[दिगादि] list, in the sense of 'who stays there'.

This replaces @deva[अण्] and @deva[छ].

Examples: @deva[दिशि भवम्] = @deva[दिश्यम्] (lying in a direction), @deva[वर्ग्यम्].

@deva[मुख] and @deva[जघन] here don't mean 'mouth' and 'hip' but 'van' and 'rear' of an army: @deva[सेनामुख्यम्] (at the front), @deva[सेनाजघन्यम्] (at the rear).

@deva[उदक्] takes @deva[यत्] when forming a name: @deva[उदक्या] = @deva[रजस्वला] (a menstruating woman). Otherwise: @deva[औदको मत्स्यः] (aquatic fish).

The @deva[दिगादि] list: @deva[दिश्], @deva[वर्ग], @deva[पूग], @deva[गण], @deva[पक्ष], @deva[धाय्य], @deva[मित्र], @deva[मेधा], @deva[अन्तर], @deva[पथिन्], @deva[रहस्], @deva[अलीक], @deva[उखा], @deva[साक्षिन्], @deva[देश], @deva[आदि], @deva[अन्त], @deva[मुख], @deva[जघन], @deva[मेघ], @deva[यूथ], @deva[उदकात्संज्ञायाम्], @deva[न्याय], @deva[वंश], @deva[वेश], @deva[काल], @deva[आकाश], @deva[अनुवंश].
"""

standard = """
The affix @deva[यत्] applies after @deva[दिगादि] words in @deva[भव] sense, debarring @deva[अण्]/@deva[छ]].

Examples: @deva[दिश्यम्], @deva[वर्ग्यम्]; @deva[सेनामुख्यम्] (van), @deva[सेनाजघन्यम्] (rear).

@deva[उदक्] + @deva[यत्] (@deva[संज्ञायाम्]): @deva[उदक्या] = @deva[रजस्वला]; otherwise @deva[औदको मत्स्यः].

@deva[दिगादि] @[gaṇa]: @deva[दिश्], @deva[वर्ग], @deva[पूग], @deva[गण], @deva[पक्ष], @deva[धाय्य], @deva[मित्र], @deva[मेधा], @deva[अन्तर], @deva[पथिन्], @deva[रहस्], @deva[अलीक], @deva[उखा], @deva[साक्षिन्], @deva[देश], @deva[आदि], @deva[अन्त], @deva[मुख], @deva[जघन], @deva[मेघ], @deva[यूथ], @deva[उदकात्संज्ञायाम्], @deva[न्याय], @deva[वंश], @deva[वेश], @deva[काल], @deva[आकाश], @deva[अनुवंश].
"""

advanced = """
@deva[यत्] applies after @deva[दिगादि] in @deva[भव] sense, superseding @deva[अण्]/@deva[छ]].

Examples: @deva[दिश्यम्], @deva[वर्ग्यम्], @deva[सेनामुख्यम्], @deva[सेनाजघन्यम्]. @deva[उदक्] + @deva[यत्] (@deva[संज्ञायाम्]): @deva[उदक्या]; else @deva[औदको मत्स्यः].

@deva[दिगादि]: @deva[दिश्], @deva[वर्ग], @deva[पूग], @deva[गण], @deva[पक्ष], @deva[धाय्य], @deva[मित्र], @deva[मेधा], @deva[अन्तर], @deva[पथिन्], @deva[रहस्], @deva[अलीक], @deva[उखा], @deva[साक्षिन्], @deva[देश], @deva[आदि], @deva[अन्त], @deva[मुख], @deva[जघन], @deva[मेघ], @deva[यूथ], @deva[उदकात्संज्ञायाम्], @deva[न्याय], @deva[वंश], @deva[वेश], @deva[काल], @deva[आकाश], @deva[अनुवंश].

id = "4.3.125"
numericId = "43125"

[en]
simple = """
The affix @deva[वुञ्] comes in the sense of 'this belongs to them' after @deva[द्वन्द्व] compounds (copulative compounds) of words denoting either mutual enmity or matrimonial relationship. This overrides @deva[अण्] and @deva[छ].

**Enmity examples:**
- @deva[बाभ्रव्यशालङ्कायनिका] (the enmity between @[bābhravya] and @[śālṅkāyana])
- @deva[काकोलूकिका] (the enmity between crows and owls)

**Marriage examples:**
- @deva[अत्रिभरद्वाजिका] (the married couple Atri and @[bharadvāja])
- @deva[कुत्सकुशिकिका]

@deva[द्वन्द्व] compounds of natural enemies become singular neuter by @ref[2.4.9]. The secondary derivatives, however, are feminine.

**@[vārtika]:** The words @deva[देवासुर] etc. are exceptions: @deva[देवासुरम्], @deva[राक्षोऽसुरं वैरम्] (not with @deva[वुञ्]).
"""

standard = """
The affix @deva[वुञ्] comes after @deva[द्वन्द्व] compounds denoting @deva[विरोध] (mutual enmity) or @deva[मिथुन] (marital pair) in the @deva[तस्येदम्] sense, debarring @deva[अण्] and @deva[छ].

**@deva[विरोध]:** @deva[बाभ्रव्यशालङ्कायनिका], @deva[काकोलूकिका]

**@deva[मिथुन]:** @deva[अत्रिभरद्वाजिका], @deva[कुत्सकुशिकिका]

@deva[द्वन्द्व]s of natural enemies are neuter singular by @ref[2.4.9]; their @deva[तद्धित] derivatives are feminine.

**@[vārtika]:** @deva[देवासुर] etc. are exceptions: @deva[देवासुरम्], @deva[राक्षोऽसुरं वैरम्].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[वुञ्] after @deva[द्वन्द्व] compounds expressing @deva[विरोध] (enmity) or @deva[मिथुन] (matrimony) in the @deva[तस्येदम्] sense, debarring @deva[अण्] and @deva[छ].

**@deva[विरोध]:** @deva[बाभ्रव्यशालङ्कायनिका], @deva[काकोलूकिका]

**@deva[मिथुन]:** @deva[अत्रिभरद्वाजिका], @deva[कुत्सकुशिकिका]

@deva[द्वन्द्व]s of @deva[प्रकृतिविरोधिन्]s are @deva[एकवद्भाव] neuter singular by @ref[2.4.9]; @deva[तद्धितान्त]s are feminine.

**@[vārtika]:** @deva[देवासुरादेः प्रतिषेधः] — @deva[देवासुरम्], @deva[राक्षोऽसुरं वैरम्] (no @deva[वुञ्]).
"""

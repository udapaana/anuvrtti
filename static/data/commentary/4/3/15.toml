id = "4.3.15"
numericId = "43015"

[en]
simple = """
The affix @deva[ठञ्] optionally comes after @deva[श्वस्] (tomorrow), and the augment @deva[तुट्] is added before the affix.

@deva[श्वस्] normally takes @deva[त्यप्] by rule 4.2.10. This rule adds @deva[ठञ्] as an option. Without either, @deva[त्यु] and @deva[त्युल्] affixes can apply by @ref[4.3.23].

Example: @deva[श्वस्] + @deva[तुट्] + @deva[ठञ्] = @deva[शौवस्तिकः] (belonging to tomorrow, ephemeral).

Other forms: @deva[श्वस्त्यः] and @deva[श्वस्तनः].
"""

standard = """
The affix @deva[ठञ्] optionally applies after @deva[श्वस्] with the augment @deva[तुट्]. @deva[श्वस्] normally takes @deva[त्यप्] (@ref[4.2.10]); freed from both rules, @deva[त्यु]/@deva[त्युल्]] apply (@ref[4.3.23]).

Derivation: @deva[श्वस्] + @deva[तुट्] + @deva[ठञ्] = @deva[शौवस्त्] + @deva[इक] (@ref[7.3.3]) = @deva[शौवस्तिकः] (ephemeral).

Alternatives: @deva[श्वस्त्यः] (with @deva[त्यप्]), @deva[श्वस्तनः] (with @deva[त्युल्]).
"""

advanced = """
@deva[ठञ्] optionally applies after @deva[श्वस्] with @deva[तुट्]-@deva[आगम]. @deva[त्यप्] (@ref[4.2.10]) is the default; beyond both, @deva[त्यु]/@deva[त्युल्]] (@ref[4.3.23]) are available.

Derivation: @deva[श्वस्] + @deva[तुट्] + @deva[ठञ्] → @deva[शौवस्त्] + @deva[इक] (@ref[7.3.3]) → @deva[शौवस्तिकः].

Alternatives: @deva[श्वस्त्यः], @deva[श्वस्तनः].
"""

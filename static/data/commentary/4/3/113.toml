id = "4.3.113"
numericId = "43113"

[en]
simple = """
The affix @deva[तसि] also comes in the sense of 'in the same direction as that.' This is in addition to @deva[अण्] and the other affixes.

Words formed with @deva[तसि] are indeclinable (@deva[अव्यय]) by @ref[1.1.37].

**Examples:**
- @deva[हिमवतः] 'in the same direction as Himavat'
- @deva[पीलुमूलतः], @deva[सुदामतः]
"""

standard = """
The affix @deva[तसि] comes in the @deva[एकदिक्] sense, in addition to @deva[अण्] etc.

Words with @deva[तसि] are @deva[अव्यय] by @ref[1.1.37].

**Examples:** @deva[हिमवतः], @deva[पीलुमूलतः], @deva[सुदामतः]
"""

advanced = """
This @deva[सूत्र] adds @deva[तसि] to the @deva[एकदिक्] sense, alongside @deva[अण्] etc. from @ref[4.3.112].

@deva[तस्यादिति] affixes are @deva[अव्यय] by @ref[1.1.37].

**Examples:** @deva[हिमवतः], @deva[पीलुमूलतः], @deva[सुदामतः]
"""

id = "4.3.142"
numericId = "43142"

[en]
simple = """
The affix @deva[ट्लञ्] comes in the sense of 'modification or part' after the word @deva[शमी] (the @[śamī] tree). This overrides @deva[अञ्].

**Examples:**
- @deva[शामीलं भस्म] 'ashes of the @[śamī] tree'
- @deva[शामीली स्रुक्] 'sacrificial ladle made of @[śamī] wood' (feminine by @ref[4.1.60])
"""

standard = """
The affix @deva[ट्लञ्] comes after @deva[शमी] in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[अञ्].

**Examples:** @deva[शामीलं भस्म], @deva[शामीली स्रुक्] (@ref[4.1.60])
"""

advanced = """
This @deva[सूत्र] prescribes @deva[ट्लञ्] after @deva[शमी] in the @deva[विकार]/​@deva[अवयव] sense, as @deva[अपवाद] to @deva[अञ्].

**Examples:** @deva[शामीलं भस्म], @deva[शामीली स्रुक्] (feminine by @ref[4.1.60]).
"""

id = "4.3.68"
numericId = "43068"

[en]
simple = """
The affix @deva[ठञ्] comes in the senses of 'occurring therein' and 'a commentary thereon' after the name of an explainable work relating to a @deva[क्रतु] (Soma sacrifice) or @deva[यज्ञ] (sacrifice in general).

This replaces @deva[अण्].

Examples for @deva[क्रतु]: @deva[अग्निष्टोमिकः], @deva[वाजपेयिकः], @deva[राजसूयिकः].
Examples for @deva[यज्ञ]: @deva[पाकयज्ञिकः], @deva[नावयज्ञिकः], @deva[पाञ्चौदनिकः], @deva[दाशौदनिकः].

This rule applies to words that are not @deva[अन्तोदात्त] (e.g., @deva[वाजपेय], @deva[राजसूय] have middle accent). The separate mention of @deva[यज्ञ] implies non-Soma sacrifices are included, since @deva[क्रतु] technically means only Soma sacrifices.

The plural prevents @deva[स्वरूपविधि] (@ref[1.1.68]) from applying to the word-forms @deva[क्रतु] and @deva[यज्ञ] themselves.
"""

standard = """
The affix @deva[ठञ्] applies after @deva[क्रतु]/@deva[यज्ञ]]-related @deva[व्याख्यातव्यनामन्] in @deva[भव]/@deva[व्याख्यान]] senses, debarring @deva[अण्].

@deva[क्रतु] (Soma): @deva[अग्निष्टोमिकः], @deva[वाजपेयिकः], @deva[राजसूयिकः]. @deva[यज्ञ] (non-Soma): @deva[पाकयज्ञिकः], @deva[नावयज्ञिकः], @deva[पाञ्चौदनिकः].

Scope: non-@deva[अन्तोदात्त] words (@deva[वाजपेय]/@deva[राजसूय]] = middle accent). @deva[यज्ञ] separate mention includes non-Soma @deva[यज्ञ]s. Plural prevents @deva[स्वरूपविधि] (@ref[1.1.68]).
"""

advanced = """
@deva[ठञ्] applies after @deva[क्रतु]/@deva[यज्ञ]]-@deva[व्याख्यातव्यनामन्] in @deva[भव]/@deva[व्याख्यान]] senses, superseding @deva[अण्].

Examples: @deva[अग्निष्टोमिकः], @deva[वाजपेयिकः], @deva[राजसूयिकः]; @deva[पाकयज्ञिकः], @deva[पाञ्चौदनिकः].

Scope: non-@deva[अन्तोदात्त]; @deva[यज्ञ]-mention includes non-Soma. Plural blocks @deva[स्वरूपविधि] (@ref[1.1.68]).
"""

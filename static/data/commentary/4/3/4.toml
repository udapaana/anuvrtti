id = "4.3.4"
numericId = "43004"

[en]
simple = """
The affix @deva[यत्] comes after the word @deva[अर्ध] (half) in the remaining senses, replacing the general @deva[अण्].

Example: @deva[अर्ध्यम्] means 'belonging to half' or 'worth half'.

A @deva[वार्त्तिक] (supplementary rule) states: when @deva[अर्ध] has a prior member in a compound, the affix @deva[ठञ्] is used instead. Examples: @deva[बालेयार्धिकम्] (related to half of what is youthful), @deva[गौतमार्धिकम्] (related to half of Gautama's portion).
"""

standard = """
The affix @deva[यत्] applies after @deva[अर्ध] in @deva[शेष] senses, debarring @deva[अण्].

Example: @deva[अर्ध्यम्] (pertaining to half).

@note[type=@[vārtika]]: When @deva[अर्ध] has a @deva[पूर्वपद], @deva[ठञ्] is used. As @deva[बालेयार्धिकम्] (@deva[बल्यर्थं वस्तु] = @deva[बालेयं], then + @deva[अर्ध] + @deva[ठञ्]); @deva[गौतमार्धिकम्].
"""

advanced = """
@deva[यत्] is ordained after @deva[अर्ध] in @deva[शेष] senses, superseding @deva[अण्].

Example: @deva[अर्ध्यम्].

@note[type=@[vārtika]]: @deva[सपूर्वपदात् ठञ्]—when @deva[अर्ध] is @deva[उत्तरपद] in a compound, @deva[ठञ्] applies: @deva[बालेयार्धिकम्], @deva[गौतमार्धिकम्]. This @deva[वार्त्तिक] establishes the governing condition for @ref[4.3.5]–@ref[4.3.7].
"""

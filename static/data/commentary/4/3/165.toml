id = "4.3.165"
numericId = "43165"

[en]
simple = """
The affix @deva[अण्] optionally comes in the fruit sense after the word @deva[जम्बु] (rose-apple). This overrides @deva[अञ्].

**Examples:**
- With @deva[अण्]: @deva[जम्बु] + @deva[अण्] → @deva[जाम्बवानि फलानि] 'rose-apple fruits'
- With @deva[अञ्] (then @deva[लुक्] by @ref[4.3.163]): @deva[जम्बू] + @deva[अञ्] → @deva[जम्बूनि फलानि] (by @ref[6.4.8])
"""

standard = """
The affix @deva[अण्] comes optionally after @deva[जम्बु] when @deva[फल] is meant, debarring @deva[अञ्].

**With @deva[अण्]:** @deva[जाम्बवानि फलानि]

**With @deva[अञ्] + @deva[लुक्] (@ref[4.3.163]):** @deva[जम्बूनि फलानि] (@ref[6.4.8])
"""

advanced = """
This @deva[सूत्र] makes @deva[अण्] optional after @deva[जम्बु] for @deva[फल], as @deva[अपवाद] to @deva[अञ्].

**@deva[अण्]:** @deva[जाम्बवानि फलानि]

**@deva[अञ्]:** → @deva[लुक्] (@ref[4.3.163]) → @deva[जम्बूनि फलानि] (@ref[6.4.8])
"""

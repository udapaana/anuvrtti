id = "4.3.22"
numericId = "43022"

[en]
simple = """
The affix @deva[अण्] always comes after @deva[हेमन्त] (winter), and before this affix the letter @deva[त] of @deva[हेमन्त] is elided.

Examples: @deva[हैमनं वासः] (wintry garment), @deva[हैमनम् उपलेपनम्] (winter ointment).

The word @deva[सर्वत्र] indicates this applies in both Vedic and secular literature.

@deva[हेमन्त] can also take @deva[अण्] without @deva[त]-elision by @ref[4.3.16]: @deva[हैमन्ती पङ्क्तिः]. So there are three forms: @deva[हैमन्तः] (@ref[4.3.16]), @deva[हैमन्तिकम्] (@ref[4.3.21]), and @deva[हैमनम्] (this rule).
"""

standard = """
The affix @deva[अण्] applies universally after @deva[हेमन्त] with @deva[त]-@deva[लोप].

Examples: @deva[हैमनं वासः], @deva[हैमनम् उपलेपनम्].

@deva[सर्वत्र] indicates applicability in @deva[छन्दस्] and @deva[भाषा] alike.

@deva[हेमन्त] + @deva[अण्] (@ref[4.3.16]) without @deva[त]-@deva[लोप]: @deva[हैमन्ती पङ्क्तिः]. Three forms exist: @deva[हैमन्तः] (@ref[4.3.16]), @deva[हैमन्तिकम्] (@ref[4.3.21]), @deva[हैमनम्] (this rule).
"""

advanced = """
@deva[अण्] applies after @deva[हेमन्त] with obligatory @deva[त]-@deva[लोप], valid @deva[सर्वत्र] (both @deva[छन्दस्] and @deva[भाषा]).

Examples: @deva[हैमनं वासः], @deva[हैमनम् उपलेपनम्].

Without @deva[त]-@deva[लोप]: @deva[हैमन्ती पङ्क्तिः] (@ref[4.3.16]). Three derivatives: @deva[हैमन्तः] (@ref[4.3.16]), @deva[हैमन्तिकम्] (@ref[4.3.21]), @deva[हैमनम्].
"""

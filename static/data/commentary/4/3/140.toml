id = "4.3.140"
numericId = "43140"

[en]
simple = """
The affix @deva[अञ्] comes in the sense of 'modification or part' after a word that has @deva[अनुदात्त] (grave) accent on the first syllable. This overrides @deva[अण्].

**Examples:**
- @deva[दधित्थ] → @deva[दाधित्थम्]
- @deva[कपित्थ] → @deva[कापित्थम्]
- @deva[महित्थ] → @deva[माहित्थम्]

The word @deva[दधित्थ] is a compound of @deva[दधि] + @deva[स्थ] (with @deva[स्] changing to @deva[त्]). It has final acute accent by the @deva[कृदुत्तरपदप्रकृतिखर] rule.
"""

standard = """
The affix @deva[अञ्] comes after @deva[अनुदात्तादि] words in the @deva[विकार]/​@deva[अवयव] sense, debarring @deva[अण्].

**Examples:** @deva[दाधित्थम्], @deva[कापित्थम्], @deva[माहित्थम्]

@deva[दधित्थ]: @deva[उपपदसमास] of @deva[दधि] + @deva[स्थ] (with @deva[स्] → @deva[त्]); @deva[अन्त्योदात्त] by @deva[कृदुत्तरपदप्रकृतिखर].
"""

advanced = """
This @deva[सूत्र] prescribes @deva[अञ्] after @deva[अनुदात्तादि] words in the @deva[विकार]/​@deva[अवयव] sense, as @deva[अपवाद] to @deva[अण्].

**Examples:** @deva[दाधित्थम्], @deva[कापित्थम्], @deva[माहित्थम्]

@deva[दधित्थ]: @deva[उपपदसमास] (@deva[दधि] + @deva[स्थ], @deva[स्] → @deva[त्]); @deva[अन्त्योदात्त] per @deva[कृदुत्तरपदप्रकृतिखर].
"""

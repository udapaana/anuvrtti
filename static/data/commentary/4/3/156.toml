id = "4.3.156"
numericId = "43156"

[en]
simple = """
After a word denoting a measure (@deva[परिमाण]), the affix for the @deva[विकार] (modification) sense is the same as the affix for the @deva[क्रीत] (purchased) sense. This overrides @deva[अण्] etc.

The @deva[क्रीत] affixes are taught at @ref[5.1.18] ff. Those same affixes apply here.

**Examples:**
- @deva[निष्केन क्रीतम्] = @deva[नैष्किकम्] (by @deva[ठक्], @ref[5.1.20])
- @deva[निष्कस्य विकारः] = @deva[नैष्किकः] (same @deva[ठक्])
- @deva[शतेन क्रीतम्] = @deva[शत्यम्] or @deva[शतिकम्] (@ref[5.1.21])
- @deva[शतस्य विकारः] = @deva[शत्यः] or @deva[शतिकः]
- @deva[सहस्रेण क्रीतम्] = @deva[साहस्रम्] (@ref[5.1.27])
- @deva[सहस्रस्य विकारः] = @deva[साहस्रः]

The word @deva[वत्] ('like') indicates complete similarity — including affix elision (@ref[5.1.28]): @deva[द्विसहस्रः] or @deva[द्विसाहस्रः], @deva[द्विनिष्कः] or @deva[द्विनैष्किकः].

The word @deva[परिमाण] here includes @deva[संख्या] (numerals), though technically @deva[परिमाण] doesn't include @deva[संख्या] (see @ref[4.1.22], @ref[5.1.19]).
"""

standard = """
After @deva[परिमाण] (measure) words, the @deva[विकार]-sense affix is the same as the @deva[क्रीत]-sense affix taught at @ref[5.1.18] ff. This debars @deva[अण्] etc.

**Examples:**
- @deva[निष्क]: @deva[नैष्किकम्] (purchased) / @deva[नैष्किकः] (product) — @deva[ठक्] (@ref[5.1.20])
- @deva[शत]: @deva[शत्यम्]/​@deva[शतिकम्] ↔ @deva[शत्यः]/​@deva[शतिकः] — @deva[ठन्]/​@deva[यत्] (@ref[5.1.21])
- @deva[सहस्र]: @deva[साहस्रम्] ↔ @deva[साहस्रः] — @deva[अण्] (@ref[5.1.27])

**@deva[वत्]:** Complete similarity includes @deva[लुक्] (@ref[5.1.28]): @deva[द्विसहस्रः]/​@deva[द्विसाहस्रः], @deva[द्विनिष्कः]/​@deva[द्विनैष्किकः].

**@deva[परिमाण]:** Here includes @deva[संख्या], unlike the technical usage (cf. @ref[4.1.22], @ref[5.1.19]).
"""

advanced = """
This @deva[सूत्र] extends the @deva[क्रीत]-sense affixes (@ref[5.1.18] ff.) to the @deva[विकार] sense after @deva[परिमाण] words, debarring @deva[अण्] etc.

**Examples:**
- @deva[निष्क]: @deva[नैष्किकम्] (@deva[क्रीत]) = @deva[नैष्किकः] (@deva[विकार]) — @deva[ठक्] (@ref[5.1.20])
- @deva[शत]: @deva[शत्यम्]/​@deva[शतिकम्] = @deva[शत्यः]/​@deva[शतिकः] — @deva[ठन्]/​@deva[यत्] (@ref[5.1.21])
- @deva[सहस्र]: @deva[साहस्रम्] = @deva[साहस्रः] — @deva[अण्] (@ref[5.1.27])

**@deva[क्रीतवत्]:** @deva[वत्] indicates full parity, including @deva[लुक्] (@ref[5.1.28]): @deva[द्विसहस्रः]/​@deva[द्विसाहस्रः], @deva[द्विनिष्कः]/​@deva[द्विनैष्किकः].

**@deva[परिमाण]:** Encompasses @deva[संख्या] here, unlike its technical sense (cf. @ref[4.1.22], @ref[5.1.19]).
"""

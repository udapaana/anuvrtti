id = "4.1.140"
numericId = "41140"

[en]
simple = """
When @deva[कुल] is not preceded by a @deva[पद] (complete word), @deva[यत्] and @deva[ढकञ्] optionally apply. Examples: @deva[कुल्यः], @deva[कौलेयकः], @deva[कुलीनः].
"""

standard = """
After @deva[कुल] when not the final member of a compound (@deva[अपूर्वपद]—not preceded by a @deva[पद] as defined in @ref[1.4.14]), @deva[यत्] and @deva[ढकञ्] are optional: @deva[कुल्यः] (by @deva[यत्], accent @deva[आद्युदात्त] @ref[6.1.213]), @deva[कौलेयकः] (by @deva[ढकञ्]). The word 'optionally' also permits @deva[ख]: @deva[कुलीनः]. Since @deva[बहु] is not a @deva[पद] (@deva[सुब्विभक्त्यन्त]), @deva[बहुकुल] takes these affixes: @deva[बहुकुल्यः], @deva[बाहुकुलेयकः], @deva[बहुकुलीनः].
"""

advanced = """
This @[sūtra] provides optional @deva[यत्]/@deva[ढकञ्] for @deva[कुल] when @deva[अपूर्वपद] (not compound-final): @deva[कुल्यः] (@deva[यत्], @deva[आद्युदात्त] @ref[6.1.213]), @deva[कौलेयकः] (@deva[ढकञ्]). @deva[विभाषा] permits @deva[ख]: @deva[कुलीनः]. @deva[बहु] ≠ @deva[पद] (@ref[1.4.14]), so @deva[बहुकुल्यः], @deva[बाहुकुलेयकः], @deva[बहुकुलीनः].
"""

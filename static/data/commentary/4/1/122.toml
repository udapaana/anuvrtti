id = "4.1.122"
numericId = "41122"

[en]
simple = """
Dissyllabic words ending in short @deva[इ] (but not @deva[इञ्] affix) take @deva[ढक्] for descendant meaning. Example: @deva[आत्रेयः] (son of Atri), @deva[नैधेयः] (son of Nidhi).
"""

standard = """
After dissyllabic stems ending in short @deva[इ] (not the @deva[इञ्] patronymic affix), @deva[ढक्] is used. The @deva[च] draws @deva[द्व्यचः] from @ref[4.1.121]. @deva[अत्रि] + @deva[ढक्] = @deva[आत्रेयः], @deva[निधि] + @deva[ढक्] = @deva[नैधेयः]. Conditions: (1) ending in short @deva[इ]—@deva[दक्ष] (ends in @deva[अ]) → @deva[दाक्षिः] (by @deva[इञ्]); (2) @deva[इ] must not be @deva[इञ्] affix—@deva[दाक्षि] (formed by @deva[इञ्] @ref[4.1.95]) → @deva[दाक्षायणः] (by @deva[फक्]), not @deva[ढक्]; (3) must be dissyllabic—@deva[मरीचि] (3 syllables) → @deva[मारीचः] (by @deva[अण्]).
"""

advanced = """
This @[sūtra] provides @deva[ढक्] for dissyllabic @deva[इकारान्त] stems (excluding @deva[इञन्त]). @deva[स्त्री] anu@deva[वृत्ति] excluded; @deva[द्व्यचः] drawn by @deva[च]. @deva[आत्रेयः], @deva[नैधेयः]. Exclusions: (1) @deva[अकारान्त]—@deva[दाक्षिः]; (2) @deva[इञन्त]—@deva[दाक्षायणः], @deva[प्लाक्षायणः] (@deva[इञ्] @ref[4.1.95]); (3) @deva[त्र्यच्]—@deva[मारीचः].
"""

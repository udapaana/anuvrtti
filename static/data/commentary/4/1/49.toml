id = "4.1.49"
numericId = "41049"

[en]
simple = """
The augment @deva[आनुक्] (@deva[आन्]) is added to certain words before @deva[ङीष्]: @deva[इन्द्र], @deva[वरुण], @deva[भव], @deva[शर्व], @deva[रुद्र], @deva[मृड], @deva[हिम], @deva[अरण्य], @deva[यव], @deva[यवन], @deva[मातुल], @deva[आचार्य]. Example: @deva[इन्द्राणी] (wife of Indra), @deva[हिमानी] (glacier).
"""

standard = """
The augment @deva[आनुक्] (= @deva[आन्]) is added before @deva[ङीष्] for listed words. Proper nouns (deity names) @deva[इन्द्र] through @deva[मृड]: @deva[इन्द्राणी], @deva[वरुणानी], @deva[भवानी], @deva[शर्वाणी], @deva[रुद्राणी], @deva[मृडानी]—these would take @deva[ङीष्] by @ref[4.1.48] anyway; this @[sūtra] adds @deva[आनुक्]. For @deva[हिम]/@deva[अरण्य]: @deva[आनुक्] with meaning 'great quantity'—@deva[हिमानी] (glacier), @deva[अरण्यानी] (great forest); otherwise neuter. @deva[यव]: @deva[यवानी] (oat—inferior barley-imitator). @deva[यवन]: @deva[यवनानी] (Yavana script). @deva[मातुल]/@deva[उपाध्याय]: optional—@deva[मातुलानी]/@deva[मातुली], @deva[उपाध्यायानी]/@deva[उपाध्यायी]]. @deva[आचार्य]: @deva[आचार्यानी] (no @deva[ण्]-change). Vedic @deva[मुद्गल]: @deva[मुद्गलानी] (with @deva[ल्]-@deva[इत्] → preceding vowel @deva[उदात्त]).
"""

advanced = """
This @[sūtra] teaches @deva[आनुक्]-augment + @deva[ङीष्] for listed stems. Two functions: (1) for @deva[इन्द्रादि] deity names through @deva[मृड], only @deva[आनुक्] is new (@deva[ङीष्] would come by @ref[4.1.48]): @deva[इन्द्राणी], @deva[वरुणानी], etc. (2) for @deva[हिमादि], both @deva[आनुक्] and @deva[ङीष्] are taught. @[vārtikas]: @deva[हिम]/@deva[अरण्य] + @deva[आनुक्] for 'greatness' sense (@deva[हिमानी], @deva[अरण्यानी]); @deva[यव] + @deva[आनुक्] for 'fault' sense (inferior grain imitation); @deva[यवन] for 'script' (@deva[यवनानी] = Yavana writing); @deva[मातुल]/@deva[उपाध्याय] optional for 'wife'; @deva[आचार्य]—no @deva[ण्]-change (@ref[8.4.2] blocked): @deva[आचार्यानी]; @deva[अर्य]/@deva[क्षत्रिय] optional for non-wife sense (@deva[अर्याणी]/@deva[अर्या]], but wife-sense: @deva[अर्यी], @deva[क्षत्रियी]); Vedic @deva[मुद्गल]: @deva[मुद्गलानी] with @deva[लित्]-treatment → @deva[उदात्त] on preceding vowel (@ref[6.1.193]).
"""

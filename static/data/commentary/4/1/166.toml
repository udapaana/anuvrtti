id = "4.1.166"
numericId = "41166"

[en]
simple = """
A @deva[गोत्र]-descendant is optionally called @deva[युवन्] when respectful reference is intended. Examples: @deva[तत्र भवान् गार्ग्यायणः] or @deva[गार्ग्यः] (honored @[gārgya]).
"""

standard = """
When respectful reference (@deva[आदर]) is intended, a @deva[गोत्र]-person (@deva[वृद्ध]) may optionally be called by the @deva[युवन्] form: @deva[तत्र भवान् गार्ग्यायणः] or @deva[गार्ग्यः] ('you honored @[gārgya]/@[gārgyāyaṇa]'). Similarly @deva[वात्स्यायणः] or @deva[वात्स्यः]; @deva[दाक्षायणः] or @deva[दाक्षिः]. Note: This is actually a @[vārtika], not an original @[sūtra] of @[pāṇini]. Without respect: only @deva[वात्स्यः], @deva[गार्ग्यः]. Other grammarians define @deva[वृद्ध] as @deva[अपत्यमन्तर्हितम्] (descendant of an intervening [ancestor]).
"""

advanced = """
This @[sūtra] (actually @[vārtika]) allows optional @deva[युवसंज्ञा] for @deva[गोत्र] (@deva[वृद्ध]) when @deva[आदर] is intended: @deva[गार्ग्यायणः]/@deva[गार्ग्यः], @deva[वात्स्यायणः]/@deva[वात्स्यः], @deva[दाक्षायणः]/@deva[दाक्षिः]. Non-@deva[आदर]: only @deva[गोत्र] form. Other grammarians: @deva[अपत्यमन्तर्हितं वृद्धम्].
"""

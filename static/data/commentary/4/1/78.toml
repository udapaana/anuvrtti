id = "4.1.78"
numericId = "41078"

[en]
simple = """
For @deva[गोत्र] words formed by @deva[अण्] or @deva[इञ्] (not @deva[ऋषि]-names, with heavy penultimate), @deva[ष्यङ्] replaces these affixes in the feminine (followed by @deva[चाप्]). Examples: @deva[कारीषगन्ध्या], @deva[वाराह्या], @deva[बालाक्या].
"""

standard = """
In forming feminine @deva[गोत्र] words from stems formed by @deva[अण्] or @deva[इञ्], when: (1) the @deva[गोत्र] is non-@deva[ऋषि] (@deva[अनार्षे]), (2) the penultimate syllable is heavy (@deva[गुरूपोत्तम]), then @deva[ष्यङ्] replaces @deva[अण्]/@deva[इञ्], followed by @deva[चाप्] (@ref[4.1.74]). The @deva[उत्तम] (superlative) implies at least three syllables—doesn't apply to @deva[दाक्षि] etc. @deva[ष्यङ्] = @deva[य] (the @deva[ष्] and @deva[ङ्] are @deva[इत्]). Forms: @deva[करीषगन्धि] + @deva[अण्] → replace by @deva[ष्य] → @deva[कारीषगन्ध्या]. Similarly @deva[कौमुदगन्ध्या], @deva[वाराह्या], @deva[बालाक्या]. Exclusions: @deva[आर्तभागा] (takes @deva[अञ्], not @deva[अण्]/@deva[इञ्]); @deva[वासिष्ठी], @deva[वैश्वामित्री] (@deva[ऋषि] names); @deva[औपगवी], @deva[कापटवी] (non-heavy penultimate); @deva[आहिच्छत्री], @deva[कान्यकुब्जी] (non-@deva[गोत्र]).
"""

advanced = """
This @[sūtra] provides @deva[ष्यङ्]-substitution for @deva[अण्]/@deva[इञ्] in feminine @deva[गोत्र] formation when: (1) @deva[अनार्ष] (non-@deva[ऋषि]); (2) @deva[गुरूपोत्तम] (heavy penultimate); (3) @deva[गोत्रे] (patronymic sense). The @deva[उत्तम] (superlative suffix @deva[तमप्]) implies minimum three syllables. @deva[ष्यङ्]: @deva[ष्] differentiates from @deva[ञ्यङ्]; @deva[ङ्] provides common @deva[प्रत्याहार]. @deva[चाप्] follows by @ref[4.1.74]. Derivation: @deva[करीषगन्धि] + @deva[अण्] → @deva[ष्य] substitution → @deva[कारीषगन्ध्या]. Exclusions: @deva[आर्तभागा] (@deva[अञ्], not @deva[अण्]/@deva[इञ्]); @deva[वासिष्ठी] (@deva[ऋषि]); @deva[औपगवी] (light penultimate); @deva[आहिच्छत्री] (non-@deva[गोत्र] = place-born).
"""

id = "4.1.167"
numericId = "41167"

[en]
simple = """
A @deva[युवन्]-descendant is optionally called @deva[गोत्र] when contemptuous reference is intended. Examples: @deva[गार्ग्यो जाल्मः] or @deva[गार्ग्यायणो जाल्मः] (contemptible @[gārgya]).
"""

standard = """
When contempt (@deva[कुत्सा]) is intended, a @deva[युवन्]-person may optionally be called by the @deva[गोत्र] form: @deva[गार्ग्यो जाल्मः] (contemptible @[gārgya]) or @deva[गार्ग्यायणो जाल्मः]. Without contempt: only @deva[गार्ग्यायणः]. Note: This is also a @[vārtika], not an original @[sūtra] of @[pāṇini].
"""

advanced = """
This @[sūtra] (actually @[vārtika]) allows optional @deva[गोत्रसंज्ञा] for @deva[युवन्] when @deva[कुत्सा] is intended: @deva[गार्ग्यो जाल्मः]/@deva[गार्ग्यायणो] @deva[जाल्मः]. Non-@deva[कुत्सा]: only @deva[युवन्] form.
"""

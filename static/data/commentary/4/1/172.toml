id = "4.1.172"
numericId = "41172"

[en]
simple = """
After @deva[कुरु] and @deva[न]-initial words (when @[country-kṣatriya]), @deva[ण्य] is used. Examples: @deva[कौरव्यः], @deva[नैषध्यः] (son/king of Kuru/@[niṣadha]).
"""

standard = """
After @deva[कुरु] and words beginning with @deva[न] (when denoting @[country-kṣatriya]), @deva[ण्य] (not @deva[अञ्]/@deva[अण्]) is used: @deva[कौरव्यः] (son/king of Kuru), @deva[नैषध्यः] (son/king of @[niṣadha]). The affix also denotes 'king thereof': @deva[कौरव्यो राजा]. Question: how to explain @deva[नैषधोऽर्हति चेदघम्]? Answer: archaic/Vedic form. @deva[सनैषधस्यार्थपतेः सुतायाम्]? Poetic license.
"""

advanced = """
This @[sūtra] provides @deva[ण्य] (debarring @deva[अञ्]/@deva[अण्]) for @deva[कुरु] and @deva[नकारादि] @deva[जनपद]-@deva[क्षत्रिय]: @deva[कौरव्यः], @deva[नैषध्यः]. Also denotes @deva[राजन्]. @deva[नैषधोऽर्हति चेदघम्] = archaic/Vedic; @deva[सनैषधस्यार्थपतेः सुतायाम्] = poetic license.
"""

id = "4.1.24"
numericId = "41024"

[en]
simple = """
@deva[ङीप्] is optionally used after @deva[द्विगु] compounds ending in @deva[पुरुष] when @deva[तद्धित] is dropped and measurement is meant. Example: @deva[द्विपुरुषा] or @deva[द्विपुरुषी] @deva[परिखा] (a moat two @[puruṣas] wide).
"""

standard = """
For @deva[द्विगु] compounds ending in @deva[पुरुष] with @deva[तद्धितलुक्], @deva[ङीप्] is optional when @deva[परिमाण] (measure) is intended. Thus @deva[द्विपुरुषा]/@deva[द्विपुरुषी] @deva[परिखा], @deva[त्रिपुरुषा]/@deva[त्रिपुरुषी]. This creates optionality where @ref[4.1.22] would have prohibited universally. But when not meaning measure: @deva[द्विपुरुषा] only (purchased for two males). In @deva[समाहारद्विगु]: @deva[द्विपुरुषी], @deva[त्रिपुरुषी] (only @deva[ङीप्]).
"""

advanced = """
This @[sūtra] establishes @deva[प्राप्तविभाषा] for @deva[पुरुषान्त]-@deva[द्विगु] with @deva[तद्धितलुक्] in @deva[परिमाणार्थ]. Without this, @ref[4.1.22] would universally block @deva[ङीप्] (since @deva[पुरुष] isn't @deva[परिमाणवाचक]). Now optional: @deva[द्विपुरुषा]/@deva[द्विपुरुषी] @deva[परिखा]. Restriction @deva[परिमाणे]: non-measure sense (@deva[द्विपुरुषा] = purchased for two males) has no option. @deva[समाहारद्विगु]: @deva[द्विपुरुषी], @deva[त्रिपुरुषी] (no @deva[तद्धितलुक्], so @deva[ङीप्] by @ref[4.1.21]).
"""

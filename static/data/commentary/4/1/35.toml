id = "4.1.35"
numericId = "41035"

[en]
simple = """
In certain compounds like @deva[सपत्नि], @deva[एकपत्नि], etc., the @deva[न्]-substitution is always (not optionally) made. Example: @deva[सपत्नी] (co-wife), @deva[एकपत्नी] (devoted to one husband).
"""

standard = """
For specific compounds, @deva[न्]-substitution is obligatory (@deva[नित्य]), not optional: @deva[सपत्नी] (co-wife), @deva[एकपत्नी] (woman devoted to one husband). The words compounding with @deva[पत्नी] are: @deva[समान] (equal), @deva[एक] (one), @deva[वीर] (hero), @deva[पिण्ड] (offering-cake), @deva[भ्रातृ] (brother), @deva[पुत्र] (son), @deva[दास] (slave—Vedic only).
"""

advanced = """
This @[sūtra] makes @deva[न्]-substitution @deva[नित्य] for the listed compound-initials with @deva[पति]: (1) @deva[समान] → @deva[सपत्नी]; (2) @deva[एक] → @deva[एकपत्नी]; (3) @deva[वीर] → @deva[वीरपत्नी]; (4) @deva[पिण्ड] → @deva[पिण्डपत्नी]; (5) @deva[भ्रातृ] → @deva[भ्रातृपत्नी]; (6) @deva[पुत्र] → @deva[पुत्रपत्नी]; (7) @deva[दास] → @deva[दासपत्नी] (Vedic only). The @deva[नित्य] specification overrides @ref[4.1.34]'s optionality for these specific forms.
"""

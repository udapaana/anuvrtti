id = "4.1.114"
numericId = "41114"

[en]
simple = """
After @deva[ऋषि] names or names of persons from @deva[अन्धक], @deva[वृष्णि], or @deva[कुरु] families, @deva[अण्] is used for descendant meaning. Examples: @deva[वासिष्ठः], @deva[वैश्वामित्रः], @deva[वासुदेवः].
"""

standard = """
After names of @deva[ऋषि]-s (sages like @deva[वसिष्ठ], @deva[विश्वामित्र]) or names of persons from @deva[अन्धक], @deva[वृष्णि], @deva[कुरु] clans, @deva[अण्] (not @deva[इञ्]) is used for descendant meaning. @deva[ऋषि]-s: @deva[वासिष्ठः], @deva[वैश्वामित्रः]. @deva[अन्धक] family: @deva[श्वाफल्कः], @deva[रान्धसः]. @deva[वृष्णि] family: @deva[वासुदेवः], @deva[आनुरुद्धः]. @deva[कुरु] family: @deva[नकुलः], @deva[साहदेवः]. Exception by @ref[1.4.2]: @deva[अत्रि] (@deva[ऋषि]) → @deva[आत्रेयः] (by @deva[ढक्] @ref[4.1.122], not @deva[अण्]); @deva[उग्रसेन] (@deva[अन्धक]) → @deva[औग्रसेन्यः] (by @deva[ण्य] @ref[4.1.152]); @deva[वैष्वकसेन] (@deva[वृष्णि]) → @deva[वैष्वकसेन्यः]; @deva[भीमसेन] (@deva[कुरु]) → @deva[भैमसेन्यः].
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[इञ्]) for @deva[ऋषिशब्द] and @deva[अन्धक]/@deva[वृष्णि]/@deva[कुरु] family names. @deva[वासिष्ठः], @deva[वैश्वामित्रः]; @deva[श्वाफल्कः] (@deva[अन्धक]); @deva[वासुदेवः] (@deva[वृष्णि]); @deva[नकुलः] (@deva[कुरु]). @ref[1.4.2] (@deva[विप्रतिषेधे परं कार्यम्]) exceptions: @deva[अत्रि] → @deva[आत्रेयः] (@deva[ढक्] @ref[4.1.122]); @deva[उग्रसेन]/@deva[वैष्वकसेन]/@deva[भीमसेन] → @deva[ण्य] @ref[4.1.152]. Note: words are eternal (@deva[नित्य]); family designations are conventional classifications, not causal conditions for rule application. Some hold families themselves are eternal; alternatively, @deva[शक]-designation analogy applies.
"""

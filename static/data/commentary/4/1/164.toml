id = "4.1.164"
numericId = "41164"

[en]
simple = """
When an elder brother is alive, the younger brother gets @deva[युवन्] designation. Example: younger brother @deva[गार्ग्यायणः] when elder brother @deva[गार्ग्यः] is alive.
"""

standard = """
Even when @deva[वंश्य] (ancestors) are not alive, the younger brother gets @deva[युवन्] designation when the elder brother is alive. A brother is not @deva[वंश्य] (one doesn't arise from a brother). Example: @deva[गर्गः] (dead) → @deva[गार्गिः] (dead) → @deva[गार्ग्यः] (dead) → two sons: elder @deva[गार्ग्यः], younger @deva[गार्ग्यायणः]. The younger is called @deva[गार्ग्यायणः] with reference to elder @deva[गार्ग्यः]. Similarly @deva[वात्स्यायणः], @deva[दाक्षायणः], @deva[प्लाक्षायणः].
"""

advanced = """
This @[sūtra] extends @deva[युवसंज्ञा] to younger brothers when elder brother is alive, even without living @deva[वंश्य]. Brother ≠ @deva[वंश्य] (not source of origin). @deva[गर्गः] (dead) → @deva[गार्गिः] (dead) → @deva[गार्ग्यः] (dead) → elder @deva[गार्ग्यः], younger @deva[गार्ग्यायणः]. Similarly @deva[वात्स्यायणः], @deva[दाक्षायणः], @deva[प्लाक्षायणः].
"""

id = "4.1.30"
numericId = "41030"

[en]
simple = """
In Vedic texts and for names, @deva[ङीप्] is always used after the following stems: @deva[केवल], @deva[मामक], @deva[भागधेय], @deva[पाप], @deva[अपर], @deva[समान], @deva[प्रवण], @deva[आर्यकृत], @deva[सुमङ्गल], @deva[भेषज]. Example: @deva[केवली] (Vedic) vs. @deva[केवला] (ordinary).
"""

standard = """
The @deva[संज्ञाछन्दसोः] domain from @ref[4.1.29] continues. The listed stems take @deva[ङीप्] obligatorily in Vedic/names but @deva[टाप्] ordinarily: @deva[केवली]/@deva[केवला], @deva[मामकी]/@deva[मामिका], @deva[भागधेयी]/@deva[भागधेया] (as in @deva[मित्रावरुणयोर्भागधेयी]), @deva[पापी]/@deva[पापा], @deva[अपरी]/@deva[अपरा] (@[ṛgveda] I.1.13: @deva[उताऽपरीभ्यो...]), @deva[समानी]/@deva[समाना], @deva[प्रवाणी]/@deva[प्रवाणा], @deva[आर्यकृती]/@deva[आर्यकृता], @deva[सुमङ्गली]/@deva[सुमङ्गला] (@[ṛgveda] X.85.33), @deva[भेषजी]/@deva[भेषजा]. Note: @deva[सुमङ्गल] also takes @deva[ङीष्] by @ref[4.1.41] as @deva[गौरादि] #86.
"""

advanced = """
The @deva[संज्ञाछन्दसोः] condition from @ref[4.1.29] governs this @[sūtra]. Listed stems: @deva[केवल], @deva[मामक], @deva[भागधेय], @deva[पाप], @deva[अपर], @deva[समान], @deva[प्रवण], @deva[आर्यकृत], @deva[सुमङ्गल], @deva[भेषज]—all take obligatory @deva[ङीप्] in Vedic/names, optional elsewhere. Vedic citations: @deva[उताऽपरीभ्योमघवा विजिग्ये] (@[ṛgveda] I.1.13); @deva[सुमङ्गली] (@[ṛgveda] X.85.33). @deva[सुमङ्गल] also qualifies under @ref[4.1.41] (@deva[गौरादि] #86) for @deva[ङीष्].
"""

id = "4.1.133"
numericId = "41133"

[en]
simple = """
The final vowel of @deva[पितृष्वसृ] is elided when @deva[ढक्] follows. Example: @deva[पैतृष्वसेयः].
"""

standard = """
When @deva[ढक्] is added to @deva[पितृष्वसृ], the final @deva[ऋ] is elided: @deva[पितृष्वस्] + @deva[ढक्] = @deva[पैतृष्वसेयः]. This @[sūtra] indicates by @deva[ज्ञापक] that @deva[पितृष्वसृ] also takes @deva[ढक्] (in addition to @deva[छण्] from @ref[4.1.132]).
"""

advanced = """
This @[sūtra] elides final @deva[ऋ] of @deva[पितृष्वसृ] before @deva[ढक्]: @deva[पैतृष्वसेयः]. @deva[ज्ञापक]: @deva[पितृष्वसृ] takes both @deva[छण्] (@ref[4.1.132]) and @deva[ढक्].
"""

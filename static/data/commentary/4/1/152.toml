id = "4.1.152"
numericId = "41152"

[en]
simple = """
After stems ending in @deva[सेना], after @deva[लक्षण], and after artisan words, @deva[ण्य] is used for descendant meaning. Examples: @deva[हारिषेण्यः], @deva[लाक्षण्यः], @deva[तान्तुवाय्यः], @deva[कौम्भकार्यः].
"""

standard = """
After @deva[सेनान्त] (stems ending in @deva[सेना]), after @deva[लक्षण], and after @deva[कारि]-words (artisan terms—weavers, barbers, potters), @deva[ण्य] is used. @deva[हरिषेण] → @deva[हारिषेण्यः]; @deva[लक्षण] → @deva[लाक्षण्यः]; @deva[तन्तुवाय] (weaver) → @deva[तान्तुवाय्यः]; @deva[कुम्भकार] (potter) → @deva[कौम्भकार्यः]; @deva[नापित] (barber) → @deva[नापित्यः].
"""

advanced = """
This @[sūtra] provides @deva[ण्य] for @deva[सेनान्त]/@deva[लक्षण]/@deva[कारि] (artisans): @deva[हारिषेण्यः], @deva[लाक्षण्यः], @deva[तान्तुवाय्यः], @deva[कौम्भकार्यः], @deva[नापित्यः].
"""

id = "4.1.87"
numericId = "41087"

[en]
simple = """
The affixes @deva[नञ्] and @deva[स्नञ्] come after @deva[स्त्री] and @deva[पुंस्] respectively, in @deva[प्राग्दीव्यतीय] senses. Examples: @deva[स्त्रैणम्] (feminine/of women), @deva[पौंस्नम्] (masculine/of men).
"""

standard = """
In senses from @ref[4.1.87] to @ref[5.2.1], @deva[नञ्] comes after @deva[स्त्री] → @deva[स्त्रैणम्]; @deva[स्नञ्] after @deva[पुंस्] → @deva[पौंस्नम्]. These derivatives have multiple meanings: @deva[स्त्रीषु भवम्] @ref[4.3.53], @deva[स्त्रीणां समूहः] @ref[4.2.37], @deva[स्त्रीभ्य आगतम्] @ref[4.3.74], @deva[स्त्रीभ्यो हितम्] @ref[5.1.5], etc. Exception: not in @deva[वत्] sense (@ref[5.1.115])—@[pāṇini]'s use of @deva[पुंवत्] (not @deva[पौंस]) in @ref[6.3.34] is @deva[ज्ञापक]. Forms @deva[स्त्रीत्वम्], @deva[स्त्रीता], @deva[पुंस्त्वम्], @deva[पुंस्ता] are exceptions (@ref[5.1.121]). The @deva[स्] of @deva[पुंस्] elides before @deva[स्नञ्] by @ref[8.2.23]—hence two separate affixes are taught.
"""

advanced = """
This @[sūtra] provides @deva[नञ्] after @deva[स्त्री] and @deva[स्नञ्] after @deva[पुंस्] for senses through @ref[5.2.1]. @deva[स्त्रैणम्], @deva[पौंस्नम्] have polyvalent meaning: @deva[भवार्थ] @ref[4.3.53], @deva[समूहार्थ] @ref[4.2.37], @deva[आगतार्थ] @ref[4.3.74], @deva[हितार्थ] @ref[5.1.5]. Exclusion: @deva[वत्]-sense (@ref[5.1.115])—@deva[ज्ञापक] from @deva[पुंवत्] in @ref[6.3.34]. @deva[स्त्रीत्वम्], @deva[पुंस्त्वम्] are @deva[निपातन] (@ref[5.1.121]). @deva[पुंस्] loses @deva[स्] before @deva[स्नञ्] by @ref[8.2.23]—motivating two-affix statement.
"""

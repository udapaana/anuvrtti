id = "4.1.170"
numericId = "41170"

[en]
simple = """
After dissyllabic @[country-kṣatriya] words and @deva[मगध], @deva[कलिङ्ग], @deva[सूरमस], @deva[अण्] (not @deva[अञ्]) is used. Examples: @deva[आङ्गः], @deva[वाङ्गः], @deva[मागधः], @deva[कालिङ्गः].
"""

standard = """
After dissyllabic (@deva[द्व्यच्]) words and @deva[मगध], @deva[कलिङ्ग], @deva[सूरमस] (when denoting both country and @[kṣatriya]), @deva[अण्] (not @deva[अञ्]) is used: @deva[आङ्गः], @deva[वाङ्गः], @deva[मागधः], @deva[कालिङ्गः], @deva[सौरमसः] (son/king of @[aṅga], @[vaṅga], Magadha, @[kaliṅga], @[sūramasa]). Similarly @deva[पौण्ड्रः], @deva[सौह्मः]. @[vārtika] @deva[तस्य राजनि] applies: @deva[आङ्गो राजा].
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[अञ्]) for @deva[द्व्यच्] @deva[जनपद]-@deva[क्षत्रिय] words and @deva[मगध]/@deva[कलिङ्ग]/@deva[सूरमस]: @deva[आङ्गः], @deva[वाङ्गः], @deva[मागधः], @deva[कालिङ्गः], @deva[सौरमसः], @deva[पौण्ड्रः], @deva[सौह्मः]. @[vārtika] @deva[तस्य राजनि].
"""

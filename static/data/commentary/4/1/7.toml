id = "4.1.7"
numericId = "41007"

[en]
simple = """
When a stem ends in @deva[वन्], the @deva[न्] changes to @deva[र्] and @deva[ङीप्] is added. Example: @deva[धीवन्] (artisan) → @deva[धीवरी] (female artisan); @deva[शर्वन्] → @deva[शर्वरी] (night).
"""

standard = """
For stems ending in @deva[वन्] (from affixes like @deva[वनिप्], @deva[क्वनिप्], @deva[ङ्वनिप्]), @deva[ङीप्] is added with @deva[न्] replaced by @deva[र्]. Examples: @deva[धीवन्] → @deva[धीवरी], @deva[पीवन्] → @deva[पीवरी], @deva[शर्वन्] → @deva[शर्वरी]. Though @deva[वन्]-final stems already end in @deva[न्] and would take @deva[ङीप्] by @ref[4.1.5], this @[sūtra] specifically teaches the @deva[न्] → @deva[र्] change. @[vārtika]: If @deva[वन्] follows a @deva[हश्] consonant (soft consonant), the rule doesn't apply—@deva[सहयुध्वन्] is both masculine and feminine.
"""

advanced = """
This @[sūtra] provides @deva[न्] → @deva[र्] replacement and @deva[ङीप्] for @deva[वनन्त] stems. Since @deva[वन्]-stems end in @deva[न्], @ref[4.1.5] would already provide @deva[ङीप्]—this @[sūtra]'s purpose is the @deva[रादेश]. Affixes producing @deva[वन्]-stems: @deva[वनिप्] (@ref[3.2.74]), @deva[क्वनिप्], @deva[ङ्वनिप्] (@ref[3.2.103]). Forms: @deva[धीवन्] (@deva[दो] + @deva[वनिप्]) → @deva[धीवरी], @deva[पीवन्] → @deva[पीवरी], @deva[शर्वन्] (@deva[शृ] + @deva[वनिप्]) → @deva[शर्वरी]. @[vārtika]: @deva[हशः यदि वन् विधीयते तदा न]—when @deva[वन्] is ordained after @deva[हश्] (soft consonant), neither @deva[ङीप्] nor @deva[र्]-substitution applies: @deva[सहयुध्वन्] is common gender. Note: @deva[शर्वन्] has @deva[र्] before @deva[वन्], but @deva[वन्] is ordained after @deva[शृ] (then @deva[गुण]), not after @deva[शर्]—@[vārtika] doesn't apply.
"""

id = "4.1.165"
numericId = "41165"

[en]
simple = """
When a more senior @deva[सपिण्ड] (other than brother) is alive, the living descendant of a @deva[गोत्र] is optionally called @deva[युवन्]. Examples: @deva[गार्ग्यायणः] or @deva[गार्ग्यः] (when uncle/great-uncle is alive).
"""

standard = """
When a @deva[स्थविरतर सपिण्ड] (more senior relative within seven degrees, other than brother) is alive, the living @deva[पौत्रप्रभृत्यपत्य] (grandson+ descendant) is optionally called @deva[युवन्] (or @deva[गोत्र]). @deva[स्थविर] = senior; @deva[स्थविरतर] = more senior (by degree and age). The @[sūtra] repeats @deva[जीवति]: one @deva[जीवति] qualifies the descendant, the anu@deva[वृत्ति] @deva[जीवति] from @ref[4.1.163] qualifies the @deva[सपिण्ड]. Example: @deva[गर्गः] (dead) → @deva[गार्गिः] (alive—uncle/grandfather's brother) → @deva[गार्ग्यः] (dead) → descendant = @deva[गार्ग्यायणः] or @deva[गार्ग्यः] (optional).
"""

advanced = """
This @[sūtra] makes @deva[युवसंज्ञा] optional when @deva[स्थविरतर सपिण्ड] (more senior sapinda, non-brother) is alive and descendant is alive. @deva[सपिण्ड] extends 7 degrees. @deva[स्थविरतर] = senior by both descent and age. Two @deva[जीवति]: @[sūtra]'s qualifies descendant; anu@deva[वृत्ति] from @ref[4.1.163] qualifies sapinda. @deva[गर्गः] (dead) → @deva[गार्गिः] (alive) → @deva[गार्ग्यः] (alive or dead) → descendant = @deva[गार्ग्यायणः] or @deva[गार्ग्यः] (optional).
"""

id = "4.1.13"
numericId = "41013"

[en]
simple = """
After stems ending in @deva[अन्], and after @deva[बहुव्रीहि] compounds, the feminine affix @deva[डाप्] (adding @deva[आ] after dropping the final syllable) may optionally be used. Example: @deva[पामन्] → @deva[पामा] or @deva[पामानौ]; @deva[बहुराजन्] → @deva[बहुराजा] or @deva[बहुराजानौ].
"""

standard = """
The affix @deva[डाप्] optionally applies to: (1) @deva[अनन्त] stems, and (2) @deva[बहुव्रीहि] compounds ending in @deva[अन्]. The @deva[ड्] of @deva[डाप्] indicates @deva[टि]-deletion (@ref[1.1.64])—the final @deva[अन्] portion is dropped before adding @deva[आ]. Thus @deva[पामन्] → @deva[पाम्] + @deva[आ] = @deva[पामा]; duals: @deva[पामे] or @deva[पामानौ]. For @[bahuvrīhis]: @deva[बहुराजा/बहुराजे] or @deva[बहुराजानौ]. This optionality extends to @ref[4.1.7]: @deva[बहुधीवा] or @deva[बहुधीवरी].
"""

advanced = """
This @[sūtra] provides optional @deva[डाप्] for @deva[अनन्त] stems and @deva[अनन्त]-@[bahuvrīhis]. The @deva[ड्]-@deva[इत्] triggers @deva[टि]-@deva[लोप] (@ref[1.1.64]): @deva[पामन्] → @deva[पाम्] + @deva[आ] = @deva[पामा]. Forms: @deva[पामा/पामे]/@deva[पामानौ], @deva[पामाः/पामानः]; @deva[सीमा/सीमे/सीमानौ]. For @[bahuvrīhis] in @deva[अन्]: @deva[बहुराजा/बहुराजे/बहुराजानौ], @deva[बहुतक्षा/बहुतक्षे/बहुतक्षाणौ]. The @deva[वा] extends to @ref[4.1.7] contexts: @deva[वनन्त]-@[bahuvrīhis] get @deva[डाप्] option alongside @deva[ङीप्]+@deva[र्]: @deva[बहुधीवा] or @deva[बहुधीवरी], @deva[बहुपीवा] or @deva[बहुपीवरी].
"""

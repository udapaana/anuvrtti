id = "4.1.128"
numericId = "41128"

[en]
simple = """
After @deva[चटका], the affix @deva[ऐरक्] is used for patronymic. Example: @deva[चाटकैरः].
"""

standard = """
After @deva[चटका] (and masculine @deva[चटक] by @[vārtika]), the special affix @deva[ऐरक्] is used: @deva[चाटकैरः] (son of @[caṭaka]). @[vārtika]: feminine descendant has @deva[लुक्]-elision of affix, giving @deva[चटका] (with @deva[टाप्] by @deva[अजादि] @ref[4.1.4]).
"""

advanced = """
This @[sūtra] provides @deva[ऐरक्] for @deva[चटका]: @deva[चाटकैरः]. @[vārtikas]: (1) @deva[चटकाच्च]—masculine @deva[चटक] also takes @deva[ऐरक्]; (2) @deva[स्त्रियां लुक्]—feminine descendant: @deva[चटका] (@deva[टाप्] @ref[4.1.4], @deva[अजादि]).
"""

id = "4.1.41"
numericId = "41041"

[en]
simple = """
After stems formed by affixes with indicatory @deva[ष्], and after @deva[गौर] class words, @deva[ङीष्] is used. Example: @deva[नर्तकी] (actress, from @deva[ष्वुन्]); @deva[गौरी], @deva[मत्सी], @deva[ब्राह्मणी].
"""

standard = """
Two categories take @deva[ङीष्]: (1) stems ending in @deva[षित्] affixes (with indicatory @deva[ष्])—e.g., @deva[नर्तकी] (from @deva[ष्वुन्] @ref[3.1.145]); (2) @deva[गौरादि] class words (161 items). Examples: @deva[गौरी], @deva[मत्सी], @deva[मनुष्यी], @deva[ब्राह्मणी]. The @deva[गौरादि] list includes: @deva[गौर] (though color, made final-@deva[उदात्त] by this rule), @deva[जाति]-words like @deva[मत्स्य]/@deva[हय]/@deva[गवय] (with penultimate @deva[य्], which @ref[4.1.63] would exclude), @deva[श्वन्]/@deva[तक्षन्] (would take @deva[डाप्] by @ref[4.1.13]), and many others with specific reasons for inclusion.
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for: (1) @deva[षित्]-affix-formed stems (e.g., @deva[ष्वुन्] @ref[3.1.145] → @deva[नर्तकी], @deva[खनकी], @deva[रजकी]); (2) @deva[गौरादि] @[gaṇa] (161 words). Notable @deva[गौरादि] members: @deva[गौर] (color-word, now final-@deva[उदात्त]); @deva[मत्स्य]/@deva[हय]/@deva[गवय]/@deva[मनुष्य]] (@deva[जाति] with penultimate @deva[य्]—would be excluded by @ref[4.1.63] without this); @deva[श्वन्]/@deva[तक्षन्] (would take @deva[डाप्] by @ref[4.1.13]); @deva[एषण] (formed by @deva[ल्युट्]—would take @deva[ङीप्] by @ref[4.1.15]); @deva[गौतम] (also in @ref[4.1.73]); @deva[मातामह]/@deva[पितामह] (by @[vārtika] @deva[मातरि षिच्च] under @ref[4.2.36], @deva[आमह] is @deva[षित्])—inclusion indicates @deva[षित्]-based @deva[ङीष्] isn't universal (@deva[अनित्यः षिल्लक्षणो ङीष्]), allowing @deva[दंष्ट्रा] etc.
"""

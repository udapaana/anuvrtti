id = "4.1.176"
numericId = "41176"

[en]
simple = """
In feminine, the @deva[तद्राज] affix is elided after @deva[अवन्ति], @deva[कुन्ति], and @deva[कुरु]. Examples: @deva[अवन्ती], @deva[कुन्ती], @deva[कुरू] (princess of Avanti/Kunti/Kuru).
"""

standard = """
In feminine formation, the @deva[तद्राज] affix is elided after @deva[अवन्ति], @deva[कुन्ति], @deva[कुरु]: @deva[ञ्यङ्] (@ref[4.1.171]) elided after @deva[अवन्ति]/@deva[कुन्ति]; @deva[ण्य] elided after @deva[कुरु]. Thus: @deva[अवन्ती] (princess of Avanti), @deva[कुन्ती] (princess of Kunti), @deva[कुरू] (princess of Kuru—takes @deva[ऊङ्] by @ref[4.1.66]). In masculine: @deva[आवन्त्यः], @deva[कौन्त्यः], @deva[कौरव्यः].
"""

advanced = """
This @[sūtra] elides @deva[तद्राज] in feminine for @deva[अवन्ति]/@deva[कुन्ति] (@deva[ञ्यङ्] @ref[4.1.171])/@deva[कुरु] (@deva[ण्य]): @deva[अवन्ती], @deva[कुन्ती], @deva[कुरू] (@deva[ऊङ्] @ref[4.1.66]). Masculine: @deva[आवन्त्यः], @deva[कौन्त्यः], @deva[कौरव्यः].
"""

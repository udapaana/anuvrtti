id = "4.1.57"
numericId = "41057"

[en]
simple = """
@deva[ङीष्] is NOT used after body-part words when preceded by @deva[सह] (with), @deva[नञ्] (negation), or @deva[विद्यमान] (existing). Example: @deva[सकेशा], @deva[अकेशा], @deva[विद्यमानकेशा].
"""

standard = """
Body-part words (@deva[स्वाङ्ग]) when @deva[उपसर्जन] and preceded by @deva[सह], @deva[नञ्], or @deva[विद्यमान] don't take @deva[ङीष्]. Forms: @deva[सकेशा], @deva[अकेशा], @deva[विद्यमानकेशा]; @deva[सनासिका], @deva[अनासिका], @deva[विद्यमाननासिका]. This governs both @ref[4.1.54] and @ref[4.1.55]—the latter's listed words (@deva[नासिका] etc.) are also affected.
"""

advanced = """
This @[sūtra] prohibits @deva[ङीष्] for @deva[उपसर्जन]-@deva[स्वाङ्गान्त] compounds when preceded by @deva[सह]/@deva[नञ्]/@deva[विद्यमान]]. This qualifies both @ref[4.1.54] (general @deva[स्वाङ्ग]) and @ref[4.1.55] (@deva[नासिकादि] list). Forms: @deva[सकेशा], @deva[अकेशा], @deva[विद्यमानकेशा]; @deva[सनासिका], @deva[अनासिका], @deva[विद्यमाननासिका].
"""

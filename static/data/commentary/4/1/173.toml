id = "4.1.173"
numericId = "41173"

[en]
simple = """
After subdivisions of @deva[साल्व] country and after @deva[प्रत्यग्रथ], @deva[कलकूट], @deva[अश्मक], @deva[इञ्] is used. Examples: @deva[औदुम्बरिः], @deva[प्रात्यग्रथिः], @deva[आश्मकिः].
"""

standard = """
After @deva[साल्वावयव] (subdivisions of @[sālva] country) and after @deva[प्रत्यग्रथ], @deva[कलकूट], @deva[अश्मक] (country-tribe names), @deva[इञ्] is used. @[kārikā] lists 6 @deva[साल्वावयव] subdivisions: @deva[उदुम्बर], @deva[तिलखल], @deva[मद्रकार], @deva[युगन्धर], @deva[भुलिङ्ग], @deva[शरदण्ड]. Patronymics: @deva[औदुम्बरिः], @deva[तैलखलिः], @deva[माद्रकारिः], @deva[यौगन्धरिः], @deva[भौलिङ्गिः], @deva[शारदण्डिः]. Also: @deva[प्रात्यग्रथिः], @deva[कालकूटिः], @deva[आश्मकिः]. Affix also denotes 'king thereof': @deva[औदुम्बरो राजा]. Note: @deva[साल्वा] (@[kṣatriya] woman) → @deva[साल्वेयः] (@deva[ढक्] @ref[4.1.121]) or @deva[साल्वः] (@deva[अण्]). @[mahābhāṣya] adds: @deva[बूस], @deva[अजमीढ], @deva[अजकन्द] also take @deva[इञ्]: @deva[बौसः], @deva[आजमीढिः], @deva[आजकन्दिः].
"""

advanced = """
This @[sūtra] provides @deva[इञ्] for @deva[साल्वावयव] (6 subdivisions per @[kārikā]: @deva[उदुम्बर], @deva[तिलखल], @deva[मद्रकार], @deva[युगन्धर], @deva[भुलिङ्ग], @deva[शरदण्ड]) and @deva[प्रत्यग्रथ]/@deva[कलकूट]/@deva[अश्मक]: @deva[औदुम्बरिः], @deva[प्रात्यग्रथिः], @deva[कालकूटिः], @deva[आश्मकिः]. Also = @deva[राजन्]. @deva[साल्वा] (@deva[स्त्री]) → @deva[साल्वेयः] (@deva[ढक्] @ref[4.1.121])/@deva[साल्वः] (@deva[अण्]). @[mahābhāṣya]: @deva[बूस]/@deva[अजमीढ]/@deva[अजकन्द] + @deva[इञ्].
"""

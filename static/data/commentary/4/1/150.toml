id = "4.1.150"
numericId = "41150"

[en]
simple = """
After @deva[फाण्टाहृति] and @deva[मिमत], both @deva[ण] and @deva[फिञ्] apply for @deva[सौवीर] descendant meaning. Examples: @deva[फाण्टाहृतः]/@deva[फाण्टाहृतायनिः], @deva[मैमतः]/@deva[मैमतायनिः].
"""

standard = """
After @deva[फाण्टाहृति] and @deva[मिमत], both @deva[ण] and @deva[फिञ्] apply for @deva[सौवीर]-descendants (debarring @deva[फक्]). The shorter word @deva[मिमत] isn't placed first (violating @ref[2.2.34])—this indicates @ref[1.3.10] doesn't apply, so both affixes apply to both words: @deva[फाण्टाहृतः] or @deva[फाण्टाहृतायनिः]; @deva[मैमतः] or @deva[मैमतायनिः]. @[non-sauvīra]: @deva[फाण्टाहृतायनः] and @deva[मैमतायनः] (by @deva[फक्] @ref[4.1.101], @ref[4.1.99]). @deva[मिमत] ∈ @deva[नडादि] (@ref[4.1.99]).
"""

advanced = """
This @[sūtra] provides @deva[ण]/@deva[फिञ्] for @deva[फाण्टाहृति]/@deva[मिमत] in @deva[सौवीरार्थ], debarring @deva[फक्]. Word-order (@deva[मिमत] not first despite fewer syllables) indicates @ref[1.3.10] inapplicable—both affixes for both words: @deva[फाण्टाहृतः]/@deva[फाण्टाहृतायनिः], @deva[मैमतः]/@deva[मैमतायनिः]. @[non-sauvīra]: @deva[फाण्टाहृतायनः], @deva[मैमतायनः] (@deva[फक्] @ref[4.1.101], @ref[4.1.99]). @deva[मिमत] ∈ @deva[नडादि].
"""

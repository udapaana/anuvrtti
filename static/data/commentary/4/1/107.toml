id = "4.1.107"
numericId = "41107"

[en]
simple = """
The words @deva[कपि] and @deva[बोध] take @deva[यञ्] for @deva[गोत्र] meaning when they specifically denote descendants of the @deva[अङ्गिरस्] family. Examples: @deva[काप्यः], @deva[बौध्यः].
"""

standard = """
After @deva[कपि] and @deva[बोध], @deva[यञ्] applies only for @deva[आङ्गिरस] (@deva[अङ्गिरस्] family) descendants: @deva[कपि] + @deva[यञ्] = @deva[काप्यः] (@[āṅgirasa] descendant). Otherwise: @deva[कापेयः] (by @deva[ढक्] @ref[4.1.122]); @deva[बौधिः] (by @deva[इञ्], since @deva[बोध] ∈ @deva[बह्वादि] @ref[4.1.96]). The word @deva[कपि] appears in @deva[गर्गादि] class; this @[sūtra] restricts @deva[यञ्] to @deva[आङ्गिरस] context. Being ∈ @deva[गर्गादि] enables @ref[4.1.18]: @deva[काप्यायनी].
"""

advanced = """
This @deva[नियमसूत्र] restricts @deva[यञ्] for @deva[कपि]/@deva[बोध] to @deva[आङ्गिरस]-descendants: @deva[काप्यः], @deva[बौध्यः]. @[non-āṅgirasa]: @deva[कापेयः] (@deva[ढक्] @ref[4.1.122]); @deva[बौधिः] (@deva[इञ्], @deva[बोध] ∈ @deva[बह्वादि] @ref[4.1.96] or as @deva[अनृषि]). @deva[कपि] ∈ @deva[गर्गादि] for @ref[4.1.18] application: @deva[काप्यायनी].
"""

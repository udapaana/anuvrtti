id = "4.1.70"
numericId = "41070"

[en]
simple = """
In Vedic texts, @deva[ऊङ्] is used after @deva[ऊरु] when preceded by @deva[संहित] (joined), @deva[शफ] (hoof), @deva[लक्षण] (mark), or @deva[वाम] (beautiful). Examples: @deva[संहितोरूः], @deva[शफोरूः], @deva[वामोरूः].
"""

standard = """
In @deva[छन्दस्], @deva[ऊङ्] comes after @deva[ऊरु] when preceded by @deva[संहित], @deva[शफ], @deva[लक्षण], or @deva[वाम]—without comparison sense. Forms: @deva[संहितोरूः] (joined thighs—from obesity), @deva[शफोरूः] (thighs put together like cow's hoofs), @deva[लक्षणोरूः] (marked thighs), @deva[वामोरूः] (beautiful thighs). @[vārtika]: @deva[सहित] and @deva[सह] also: @deva[सहितोरूः], @deva[सहोरूः].
"""

advanced = """
In @deva[छन्दस्], @deva[ऊङ्] applies to @deva[ऊर्वन्त] compounds with @deva[संहित]/@deva[शफ]/@deva[लक्षण]/@deva[वाम]—not requiring @deva[उपमान] sense (unlike @ref[4.1.69]). @deva[संहितोरूः], @deva[शफोरूः], @deva[लक्षणोरूः], @deva[वामोरूः]. @[vārtika]: @deva[सहित] and @deva[सह] also: @deva[सहितोरूः], @deva[सहोरूः].
"""

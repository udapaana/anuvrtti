id = "4.1.177"
numericId = "41177"

[en]
simple = """
In feminine formation, when the masculine ends in @deva[तद्राज] @deva[अ], the affix is elided. Examples: m. @deva[शौरसेनः] → f. @deva[शूरसेनी]; m. @deva[माद्रः] → f. @deva[मद्री].
"""

standard = """
In feminine formation, when the masculine word ends in @deva[तद्राज] affix @deva[अ], the affix is elided: m. @deva[शौरसेनः] → f. @deva[शूरसेनी]; m. @deva[माद्रः] → f. @deva[मद्री]. Note: @deva[अतः] should not be construed per @deva[तदन्तविधि] (@ref[1.1.72])—that would mean 'all affixes ending in @deva[अ]', which would make @ref[4.1.176] redundant. By @deva[ज्ञापक], @deva[तदन्तविधि] doesn't apply here. Thus @deva[ञ्यङ्]-formed words retain affix in feminine: @deva[आम्बष्ठ्यः] → f. @deva[आम्बष्ठ्या]; @deva[सौवीर्यः] → f. @deva[सौवीर्या].
"""

advanced = """
This @[sūtra] elides @deva[तद्राज] @deva[अ] in feminine: m. @deva[शौरसेनः] → f. @deva[शूरसेनी]; m. @deva[माद्रः] → f. @deva[मद्री]. @deva[अतः] ≠ @deva[तदन्तविधि] (@ref[1.1.72])—else @ref[4.1.176] redundant. @deva[ज्ञापक]: @deva[तदन्त] doesn't apply. Thus @deva[ञ्यङन्त]: @deva[आम्बष्ठ्या], @deva[सौवीर्या] (affix retained). Five @deva[तद्राज] affixes: @deva[अञ्] (@deva[अ]), @deva[अण्] (@deva[अ]), @deva[ञ्यङ्] (@deva[य]), @deva[ण्य] (@deva[य]), @deva[इञ्] (@deva[इ])—first four end in @deva[अ], but rule applies only when masculine word ends in @deva[अ].
"""

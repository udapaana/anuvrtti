id = "4.1.31"
numericId = "41031"

[en]
simple = """
In Vedic texts and for names, @deva[ङीप्] is used after the word @deva[रात्रि] (night), except when the nominative plural ending @deva[जस्] follows. Example: @deva[या रात्री सृष्टा], @deva[रात्रीभिः], but nominative plural: @deva[रात्रयः].
"""

standard = """
In @deva[छन्दस्] and @deva[संज्ञा] contexts, @deva[रात्रि] takes @deva[ङीप्]—except before @deva[जस्] (nominative plural). Thus: @deva[या रात्री सृष्टा] (@[ṛgveda] X.127), @deva[रात्रीभिः] (instrumental plural). But nominative plural: @deva[यास्ता रात्रयः] (not @deva[रात्र्यः]). @[vārtika] (@[kātyāyana]): The exception extends to all @deva[जस्]-initial endings (accusative @deva[रात्रिं] etc.). Note: @deva[रात्र्यः] (with @deva[ङीप्]) exists—this is @deva[ङीप्]-formed @deva[रात्री] in nominative plural, accent distinguishing from @deva[ङीष्]-formed @deva[रात्री].
"""

advanced = """
For @deva[संज्ञाछन्दसोः], @deva[रात्रि] takes @deva[ङीप्] except before @deva[जस्]. Vedic: @deva[या रात्री सृष्टा] (@[ṛg]. X.127.1), @deva[रात्रीभिः] (@[ṛg]. I.35.1). Exception: @deva[जस्]-triggered nominative plural → @deva[रात्रयः]. @[kātyāyana]'s @[vārtika]: @deva[जसादिषु च]—exception covers all @deva[जस्]-onwards endings, thus accusative @deva[रात्रिं सहोषित्वा]. The form @deva[रात्र्यः] (in @deva[तिमिरपटलैरवगुण्ठिताश्च रात्र्यः]) uses @deva[ङीप्], not @deva[ङीष्]—accent differs (@deva[ङीष्] = final @deva[उदात्त]; @deva[ङीप्] = initial @deva[उदात्त]). @deva[रात्रि] is formed by @deva[त्रिप्] (@[uṇ]. IV.67), thus belongs to @deva[बह्वादि] class (@ref[4.1.45]), taking @deva[ङीष्] ordinarily.
"""

id = "4.1.118"
numericId = "41118"

[en]
simple = """
After @deva[पीला], @deva[अण्] optionally applies for descendant meaning. Examples: @deva[पैलः] or @deva[पैलेयः].
"""

standard = """
After @deva[पीला] (a woman's name), @deva[अण्] is optional. Since @deva[पीला] is a dissyllabic feminine word, it would take @deva[ढक्] by @ref[4.1.121], which would block @deva[अण्] from @ref[4.1.113]. This @[sūtra] provides optional @deva[अण्]: @deva[पैलः] (by @deva[अण्]) or @deva[पैलेयः] (by @deva[ढक्]).
"""

advanced = """
This @[sūtra] makes @deva[अण्] optional for @deva[पीला], a dissyllabic feminine name. @deva[पीला] would normally take @deva[ढक्] @ref[4.1.121] (blocking @deva[अण्] @ref[4.1.113]). This @[sūtra] reintroduces @deva[अण्] optionally: @deva[पैलः] (@deva[अण्]) or @deva[पैलेयः] (@deva[ढक्]).
"""

id = "4.1.4"
numericId = "41004"

[en]
simple = """
The feminine affix @deva[टाप्] (which adds @deva[आ]) is used after words in the @deva[अज] class and after any stem ending in short @deva[अ]. Example: @deva[अज] (he-goat) → @deva[अजा] (she-goat); @deva[देवदत्त] → @deva[देवदत्ता].
"""

standard = """
The affix @deva[टाप्] is added after (1) words listed in the @deva[अजादि] class and (2) stems ending in short @deva[अ]. Of @deva[टाप्], @deva[ट्] and @deva[प्] are @deva[इत्]—the actual affix is @deva[आ]. The @deva[प्] indicates @deva[अनुदात्त] accent (@ref[3.1.4]); @deva[ट्] distinguishes it from @deva[डाप्] and @deva[चाप्]. The @deva[अजादि] class includes @deva[अज], @deva[एडक], @deva[कोकिल], @deva[अश्व], @deva[शूद्र], etc.—words that would otherwise take different feminine affixes. The @deva[त्] in @deva[अत्] (@ref[1.1.70]) restricts to short @deva[अ] only, excluding long @deva[आ]-final stems like @deva[कीलालपा].
"""

advanced = """
This @[sūtra] provides @deva[टाप्] for @deva[अजादि]-class words and @deva[अकारान्त] stems. The @deva[इत्] analysis: @deva[ट्] distinguishes from @deva[चाप्]/@deva[डाप्]; @deva[प्] marks @deva[अनुदात्त] by @ref[3.1.4]. The @deva[अत्] specification (@deva[त्]-marked @deva[अ]) excludes @deva[दीर्घ] @deva[आ] by @ref[1.1.70]—hence @deva[शुभंया], @deva[कीलालपा] don't take @deva[टाप्]. The @deva[अजादि] class includes: (1-6) @deva[जाति] words: @deva[अज], @deva[एडक], @deva[कोकिल], @deva[चटक], @deva[अश्व], @deva[मूषिक]—would take @deva[ङीष्] by @ref[4.2.63]; (7-12) age words: @deva[बाल], @deva[होड], @deva[पाक], @deva[वत्स], @deva[मन्द], @deva[विलात]—would take @deva[ङीप्] by @ref[4.1.20]; (13-14) @deva[ल्युट्]-formed: @deva[पूर्वापहरण], @deva[अपरापहरण]—would take @deva[ङीप्] by @ref[4.1.15] as @deva[टित्]; (27) @deva[शूद्र] → @deva[शूद्रा], but @deva[शूद्री] for 'wife of @[śūdra]' or in @deva[महाशूद्री].
"""

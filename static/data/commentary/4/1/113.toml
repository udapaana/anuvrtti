id = "4.1.113"
numericId = "41113"

[en]
simple = """
When words are names of rivers or women and do not have @deva[वृद्धि] in the first syllable, they take @deva[अण्] for descendant meaning. Examples: @deva[यामुनः], @deva[शैक्षितः].
"""

standard = """
After @deva[अवृद्ध] (non-@deva[वृद्धि]-initial) words that are proper names of rivers or women, @deva[अण्] is used for descendant meaning. River names: @deva[यमुना] → @deva[यामुनः], @deva[इरावती] → @deva[ऐरावतः], @deva[वितस्ता] → @deva[वैतस्तः], @deva[नर्मदा] → @deva[नार्मदः]. Women's names: @deva[शिक्षिता] → @deva[शैक्षितः], @deva[चिन्तिता] → @deva[चैन्तितः]. Conditions: (1) word must not have @deva[वृद्धि] in first syllable—@deva[चन्द्रभागा] (@deva[वृद्ध]) → @deva[चान्द्रभागेयः] by @deva[ढक्] (@ref[4.1.120]); (2) must be proper name—@deva[शोभनाया अपत्यम्] (adj.) → @deva[शौभनेयः]. This debars @deva[ढक्] (@ref[4.1.120]).
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[अवृद्ध] (non-@deva[वृद्धि]-initial per @ref[1.1.73]) @deva[संज्ञाशब्द] (proper names) of @deva[नदी]/@deva[मानुषी]. Rivers: @deva[यामुनः], @deva[ऐरावतः], @deva[वैतस्तः], @deva[नार्मदः]. Women: @deva[शैक्षितः], @deva[चैन्तितः]. Exclusions: @deva[वृद्ध]—@deva[चान्द्रभागेयः], @deva[वासवदत्तेयः] (@deva[ढक्] @ref[4.1.120]); non-@deva[नदी]/@deva[मानुषी]—@deva[सौपर्णेयः], @deva[वैनतेयः]; non-@deva[संज्ञा] (adjective)—@deva[शौभनेयः]. This debars @deva[ढक्] @ref[4.1.120].
"""

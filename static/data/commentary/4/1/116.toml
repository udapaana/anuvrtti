id = "4.1.116"
numericId = "41116"

[en]
simple = """
After @deva[कन्या], @deva[अण्] is used for descendant meaning, with @deva[कनीन] substituting for @deva[कन्या]. Example: @deva[कानीनः] (son of a virgin—like @[karṇa] or @[vyāsa]).
"""

standard = """
After @deva[कन्या] (virgin/unmarried girl), @deva[अण्] applies with the substitute @deva[कनीन]: @deva[कन्या] + @deva[अण्] → @deva[कनीन] + @deva[अण्] = @deva[कानीनः] (son of a virgin). This debars @deva[ढक्] (@ref[4.1.121]). A @deva[कानीन] is born through immaculate conception—examples: @[karṇa] (son of @[kuntī]), @[vyāsa] (son of @[satyavatī]). The term @deva[कन्या] refers to a woman who retains her virginity even after union, through divine grace.
"""

advanced = """
This @[sūtra] provides @deva[अण्] with @deva[कनीन]-@deva[आदेश] for @deva[कन्या], debarring @deva[ढक्] @ref[4.1.121]: @deva[कानीनः]. A @deva[कानीन] is conceived through @deva[मुनिदेवतामाहात्म्य]—@deva[पुंयोगेऽपि न कन्यात्वं जहाति]: @[kuntī], @[satyavatī]. Alternative: @deva[कान्यायनेयः] by @deva[ढक्] for regular patronymic.
"""

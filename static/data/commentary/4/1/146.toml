id = "4.1.146"
numericId = "41146"

[en]
simple = """
The @deva[रेवती] class words take @deva[ठक्] for descendant meaning. Examples: @deva[रैवतिकः], @deva[आश्वपालिकः].
"""

standard = """
After @deva[रेवतीयादि] words, @deva[ठक्] (debarring @deva[ढक्]) is used: @deva[रेवती] + @deva[ठक्] = @deva[रैवतिकः] ('son of @[revatī]'); @deva[अश्वपाली] + @deva[ठक्] = @deva[आश्वपालिकः] (@ref[7.3.50]). 12-word list: @deva[रेवती], @deva[अश्वपाली], @deva[मणिपाली], @deva[द्वारपाली], @deva[वृकवञ्चिन्], @deva[वृकबन्धु], @deva[वृकग्राह], @deva[कर्णग्राह], @deva[दण्डग्राह], @deva[कुक्कूटाक्ष], @deva[ककुदाक्ष], @deva[चामरग्राह].
"""

advanced = """
This @[sūtra] provides @deva[ठक्] for @deva[रेवतीयादि], debarring @deva[ढक्]: @deva[रैवतिकः], @deva[आश्वपालिकः] (@ref[7.3.50]). 12 words: @deva[रेवती], @deva[अश्वपाली], @deva[मणिपाली], @deva[द्वारपाली], @deva[वृकवञ्चिन्], @deva[वृकबन्धु], @deva[वृकग्राह], @deva[कर्णग्राह], @deva[दण्डग्राह], @deva[कुक्कूटाक्ष], @deva[ककुदाक्ष], @deva[चामरग्राह].
"""

id = "4.1.39"
numericId = "41039"

[en]
simple = """
After color words that end in a @deva[अनुदात्त]-accented vowel and have @deva[त्] as the penultimate letter, @deva[ङीप्] is optionally used with @deva[न्] replacing @deva[त्]. Example: @deva[एत] (variegated) → @deva[एता] or @deva[एनी]; @deva[हरित] (green) → @deva[हरिता] or @deva[हरिणी].
"""

standard = """
Color-denoting stems ending in @deva[अनुदात्त]-vowel with penultimate @deva[त्] optionally take @deva[ङीप्] with @deva[त्] → @deva[न्]. Forms: @deva[एता]/@deva[एनी] (variegated), @deva[श्येता]/@deva[श्येनी] (black), @deva[हरिता]/@deva[हरिणी] (green). These words have initial @deva[उदात्त] by @ref[6.1.197] (formed by @[uṇādi] @deva[तन्]/@deva[इतन्]) or Phit. II.10. Conditions: (1) @deva[वर्णवचन] (color-denoting)—not @deva[प्रहृता], @deva[प्ररुता]; (2) @deva[अनुदात्तान्त]—not @deva[श्वेता] (final @deva[उदात्त] by Phit. I.21); (3) @deva[तोपधा]—not @deva[ङीष्]-eligible. @[vārtikas]: @deva[पिशङ्ग] also takes @deva[ङीप्]: @deva[पिशङ्गी]. Prohibition for @deva[असित]/@deva[पलित]: @deva[असिता], @deva[पलिता]. Vedic @deva[क्नम्]-substitute: @deva[आसिक्नी] (@[ṛg]. IX.73.29), @deva[पलिक्नी] (@[ṛg]. V.2.4).
"""

advanced = """
This @[sūtra] provides optional @deva[ङीप्] with @deva[त्] → @deva[न्] for @deva[वर्णवचन] (color) stems that are @deva[अनुदात्तान्त] and @deva[तोपध]. Accent: initial @deva[उदात्त] by @ref[6.1.197] (@deva[ञ्/न्]-@deva[इत्] @[uṇādi] @deva[तन्]/@deva[इतन्]) or Phit. II.10 (@deva[वर्णानां तण-/ति-/नि-/त-अन्तानाम्]). Exclusions: (1) non-@deva[वर्ण]: @deva[प्रहृता], @deva[प्ररुता] (initial @deva[उदात्त] by @ref[6.2.49] but not color); (2) non-@deva[अनुदात्तान्त]: @deva[श्वेता] (Phit. I.21 @deva[घृतादीनां च]—final @deva[उदात्त]); (3) non-@deva[अकारान्त]: @deva[शितिर्ब्राह्मणी] (@deva[शिति] formed by @deva[क्तिन्], @deva[अनुदात्तान्त] by @ref[6.1.197], @deva[तोपध]—but ends in @deva[इ]). @[vārtikas]: @deva[पिशङ्गी]; prohibition for @deva[असित]/@deva[पलित]; Vedic @deva[क्नम्]: @deva[आसिक्नी], @deva[पलिक्नी].
"""

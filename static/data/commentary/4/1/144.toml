id = "4.1.144"
numericId = "41144"

[en]
simple = """
After @deva[भ्रातृ] (brother), @deva[व्यत्] applies for descendant meaning. @deva[छ] also applies. Examples: @deva[भ्रातृव्यः], @deva[भ्रात्रीयः] (brother's son).
"""

standard = """
After @deva[भ्रातृ] (brother), @deva[व्यत्] is used, debarring @deva[अण्]. The @deva[च] indicates @deva[छ] also applies. @deva[भ्रातृ] + @deva[व्यत्] = @deva[भ्रातृव्यः] ('brother's son'); @deva[भ्रातृ] + @deva[छ] = @deva[भ्रात्रीयः]. The @deva[त्] of @deva[व्यत्] regulates accent, making it @deva[स्वरित].
"""

advanced = """
This @[sūtra] provides @deva[व्यत्] (debarring @deva[अण्]) for @deva[भ्रातृ]; @deva[च] draws @deva[छ]: @deva[भ्रातृव्यः] or @deva[भ्रात्रीयः]. @deva[त्] in @deva[व्यत्] → @deva[स्वरितस्वर].
"""

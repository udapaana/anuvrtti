id = "4.1.95"
numericId = "41095"

[en]
simple = """
The affix @deva[इञ्] comes after stems ending in short @deva[अ] to denote a descendant. Example: @deva[दाक्षिः] (descendant of @[dakṣa]).
"""

standard = """
After stems ending in short @deva[अ] (indicated by @deva[अत्] with @deva[त्] per @ref[1.1.69]-@ref[1.1.70]), @deva[इञ्] (not @deva[अण्]) is used for descendant meaning. @deva[दक्षस्यापत्यम्] = @deva[दाक्षिः]. Exclusion: stems ending in long @deva[आ] like @deva[शुभंयाः], @deva[कीलालपाः]. Note: @deva[दशरथ] can form @deva[दाशरथिः] (by @deva[इञ्]) or @deva[दाशरथः] (by @deva[अण्])—the latter seen in @deva[प्रदीयतां दाशरथाय मैथिली].
"""

advanced = """
This @[sūtra] provides @deva[इञ्] for @deva[अदन्त] (@deva[ह्रस्व]-@deva[अ]-final) stems in @deva[अपत्यार्थ], debarring @deva[अण्]. @deva[दाक्षिः]. The @deva[त्] in @deva[अत्] indicates @deva[ह्रस्व] by @ref[1.1.69]-@ref[1.1.70]. Exclusion: @deva[दीर्घान्त] (@deva[शुभंयाः], @deva[कीलालपाः]). Alternative forms: @deva[दाशरथिः] (@deva[इञ्]) vs. @deva[दाशरथः] (@deva[अण्])—@deva[प्रदीयतां दाशरथाय मैथिली].
"""

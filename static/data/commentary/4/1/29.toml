id = "4.1.29"
numericId = "41029"

[en]
simple = """
In Vedic texts and for names, @deva[ङीप्] is always (not optionally) used after @deva[बहुव्रीहि] compounds ending in @deva[अन्] that lose their penultimate vowel. Example: @deva[सुराज्ञी] (city name), @deva[एकदाम्नी] (Vedic).
"""

standard = """
In @deva[छन्दस्] (Vedic) and @deva[संज्ञा] (proper names), the optionality of @ref[4.1.28] becomes obligatory—@deva[ङीप्] must be used. Names: @deva[सुराज्ञी], @deva[अतिराज्ञी] (cities). Vedic: @deva[गौः पञ्चदाम्नी], @deva[एकदाम्नी], @deva[द्विदाम्नी] (cows with various numbers of udders); @deva[एकमूर्ध्नी], @deva[समानमूर्ध्नी].
"""

advanced = """
This @[sūtra] converts @ref[4.1.28]'s option to @deva[नित्य] for @deva[संज्ञा] (names) and @deva[छन्दस्] (Vedas). Names: @deva[सुराज्ञी], @deva[अतिराज्ञी] (place names). Vedic usage: @deva[गौः पञ्चदाम्नी/एकदाम्नी/द्विदाम्नी], @deva[एकमूर्ध्नी], @deva[समानमूर्ध्नी]. The @deva[संज्ञाछन्दसोः] domain continues to @ref[4.1.30].
"""

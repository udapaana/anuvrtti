id = "4.1.92"
numericId = "41092"

[en]
simple = """
The affix @deva[अण्] (and those following) denote 'the descendant of someone'. Example: @deva[औपगवः] (descendant of Upagu).
"""

standard = """
This @[sūtra] specifies the meaning of the affixes from @ref[4.1.83] onwards: they denote @deva[अपत्य] (descendant) when added to a genitive-case word in construction. @deva[उपगोरपत्यम्] (Upagu's offspring) → @deva[उपगु] + @deva[अण्] → @deva[औपगवः]. Examples: @deva[आश्वपतः] (@ref[4.1.84]), @deva[दैत्यः] (@ref[4.1.85]), @deva[औत्सः] (@ref[4.1.86]), @deva[स्त्रैणः], @deva[पौंस्नः] (@ref[4.1.87]). The universal @deva[तस्येदम्] (@ref[4.3.120]) could include @deva[अपत्य] meaning; this @[sūtra] specifically debars affixes like @deva[छ] (@ref[4.3.114]) that would otherwise override @deva[अण्]. Thus @deva[भानोरपत्यम्] = @deva[भानवः] (not @deva[भानवीयः]).
"""

advanced = """
This @[sūtra] assigns @deva[अपत्यार्थ] to @deva[अण्]-etc. affixes for genitive-case words in construction (@deva[षष्ठीसमर्थ]). @deva[औपगवः], @deva[आश्वपतः], @deva[दैत्यः], @deva[औत्सः], @deva[स्त्रैणः], @deva[पौंस्नः]. The @deva[तस्येदम्] (@ref[4.3.120]) includes @deva[अपत्य]; this @[sūtra] debars @deva[शैषिक] affixes like @deva[छ] that override @deva[अण्]. The @deva[उत्सर्ग] affixes are treated as @deva[शैषिक] for @deva[बाधन] purposes. @[kārikā]: @deva[तस्येदमित्यपत्येऽपि बाधनार्थं कृतं भवेत्। उत्सर्गः शेष एवासौ वृद्धान्यस्य प्रयोजनम्॥]
"""

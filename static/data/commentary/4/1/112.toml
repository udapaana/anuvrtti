id = "4.1.112"
numericId = "41112"

[en]
simple = """
The @deva[शिव] class words take @deva[अण्] for descendant meaning (not restricted to @deva[गोत्र]). Example: @deva[शैवः] (descendant of @[śiva]).
"""

standard = """
After @deva[शिवादि] words, @deva[अण्] (not @deva[इञ्]) is used for general descendant meaning. The @deva[गोत्र] restriction from @ref[4.1.98] does not extend here. @deva[शिव] + @deva[अण्] = @deva[शैवः], @deva[प्रौष्ठः]. Special cases: @deva[तक्षन्] ('carpenter') ∈ @deva[शिवादि] prevents @deva[इञ्] (@ref[4.1.153]), but not @deva[ण्य] (@ref[4.1.152]): @deva[ताक्ष्णः] (by @deva[अण्]) or @deva[ताक्ष्ण्यः] (by @deva[ण्य]); @deva[गंगा] appears in @deva[शिवादि], @deva[शुभ्रादि] (@ref[4.1.123]), and @deva[तिकादि] (@ref[4.1.154]): @deva[गांगः], @deva[गांगायनिः], @deva[गांगेयः]; @deva[विपाशा] ∈ @deva[शिवादि] and @deva[कुञ्जादि] (@ref[4.1.98]): @deva[वैपाशः] or @deva[वैपाशायन्यः]. @[vārtika]: river names of two syllables take @deva[अण्]; @deva[त्रिवेणी] → @deva[त्रैवेणः]/@deva[त्रिवणः]. This is an @deva[आकृतिगण] with 92 words.
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[शिवादि] (debarring @deva[इञ्]) without @deva[गोत्र] restriction (@ref[4.1.98] @deva[anuवृत्ति] excluded). @deva[शैवः], @deva[प्रौष्ठः]. @deva[तक्षन्]: @deva[ताक्ष्णः] (@deva[अण्]—@deva[अ]-@deva[लोप] @ref[6.4.134]) or @deva[ताक्ष्ण्यः] (@deva[ण्य] @ref[4.1.152]—not blocked). @deva[गंगा] ∈ three classes: @deva[गांगः] (here), @deva[गांगायनिः] (@ref[4.1.154]), @deva[गांगेयः] (@ref[4.1.123]). @deva[विपाशा] ∈ @deva[शिवादि] and @deva[कुञ्जादि]: @deva[वैपाशः]/@deva[वैपाशायन्यः]. @[vārtika]: @deva[द्व्यचो नद्याः] rivers take @deva[अण्] (blocking @deva[ढक्] @ref[4.1.121]); @deva[त्रिवेणी त्रिवणं च]. @deva[आकृतिगण], 92 words: @deva[शिव], @deva[प्रोष्ठ], @deva[चण्ड], @deva[जम्भ], @deva[भूरि], @deva[दण्ड], @deva[कुठार], @deva[सुख], @deva[संधि], @deva[मुनि], @deva[ककुत्स्थ], @deva[कहोड], @deva[रोध], @deva[वतण्ड], @deva[हैहय], @deva[गंगा], @deva[विपाश], @deva[यस्क], @deva[द्रुह्य], @deva[भूमि], @deva[इला], @deva[सपत्नी], etc.
"""

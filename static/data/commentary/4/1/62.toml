id = "4.1.62"
numericId = "41062"

[en]
simple = """
The forms @deva[सखी] (female friend) and @deva[अशिश्वी] (childless woman) are irregular @deva[ङीष्] formations in spoken Sanskrit. Example: @deva[सखीयं मे ब्राह्मणी] (this @[brāhmaṇī] is my friend).
"""

standard = """
The words @deva[सखी] and @deva[अशिश्वी] are irregular @deva[ङीष्] forms in @deva[लौकिक] (secular/spoken) Sanskrit. @deva[सखी] = female friend; @deva[अशिश्वी] = @deva[नास्याः शिशुरस्ति] (she who has no child). In Vedic, different forms occur: @deva[सखा सप्तपदी भव] and @deva[अशिशुमिव माम्]. Sometimes Vedic also uses these forms: @deva[आधेनवो धुनयन्तामशिश्वी], @deva[सखी सप्तपदी भव].
"""

advanced = """
This @[sūtra] teaches irregular @deva[ङीष्] for @deva[सखी] and @deva[अशिश्वी] in @deva[लोक] (vernacular). @deva[सखी] = friend (@deva[सखीयं मे ब्राह्मणी]); @deva[अशिश्वी] = childless (@deva[नास्याः शिशुरस्तीति]). @deva[छन्दस्] has: @deva[सखा सप्तपदी भव], @deva[अशिशुमिव मामयं शिशुरभिमन्यते]. Rare Vedic occurrences with @deva[ङीष्]: @deva[आधेनवो धुनयन्तामशिश्वी], @deva[सखी सप्तपदी भव].
"""

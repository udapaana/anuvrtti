id = "4.1.98"
numericId = "41098"

[en]
simple = """
The @deva[कुञ्ज] class words take @deva[च्फञ्] for @deva[गोत्र] (remote descendant) meaning. Example: @deva[कौञ्जायन्यः] (gotra descendant of @[kuñja]).
"""

standard = """
After @deva[कुञ्जादि] words, @deva[च्फञ्] (not @deva[इञ्]) is used for @deva[गोत्र] (grandson+) descendants. The @deva[ञ्] distinguishes from @deva[फञ्] (for @ref[5.3.113]); causes @deva[वृद्धि] (@ref[7.2.117]); @deva[फ्] → @deva[आयन्] (@ref[7.1.2]). Then @deva[य] by @ref[5.3.113] completes the word. @deva[कुञ्ज] + @deva[च्फञ्] = @deva[कौञ्ज] + @deva[आयन्] + @deva[अ] = @deva[कौञ्जायन] + @deva[य] (@ref[5.3.113]) = @deva[कौञ्जायन्यः]. Plural: @deva[कौञ्जायनाः] (@deva[ञ्य] elided by @ref[2.5.62] as @deva[तद्राज] @ref[4.1.174]). Similarly @deva[ब्राध्रायन्यः], @deva[ब्राध्रायनाः]. Immediate son: @deva[कौञ्जिः] (@deva[इञ्] @ref[4.1.95]). Accent: singular/dual by @deva[ञ्य]'s @deva[ञ्] (@deva[आद्युदात्त] @ref[6.1.197]); plural by @deva[च्] of @deva[च्फञ्] (@deva[अन्तोदात्त] @ref[6.1.164]).
"""

advanced = """
This @[sūtra] provides @deva[च्फञ्] for @deva[कुञ्जादि] in @deva[गोत्रार्थ], debarring @deva[इञ्]. The @deva[ञ्] differentiates from @deva[फञ्]; triggers @deva[वृद्धि] (@ref[7.2.117]); @deva[फ्] → @deva[आयन्] (@ref[7.1.2]). Full word requires @deva[ञ्य] (@ref[5.3.113]): @deva[कौञ्जायन्यः], dual @deva[कौञ्जायन्यौ], plural @deva[कौञ्जायनाः] (@deva[ञ्य]-@deva[लुक्] by @ref[2.5.62] for @deva[तद्राज] @ref[4.1.174]). Accent: singular/dual @deva[आद्युदात्त] by @deva[ञ्य]'s @deva[ञ्] (@ref[6.1.197]); plural @deva[अन्तोदात्त] by @deva[च्] (@ref[6.1.164]). The @deva[गोत्रे] governs through @ref[4.1.112]. List: @deva[कुञ्ज], @deva[ब्रध्र], @deva[शंख], @deva[भस्मन्], @deva[गण], @deva[लोमन्], @deva[शत], @deva[शाक], @deva[शुण्डा], @deva[शुभ], @deva[विपाश्], @deva[स्कन्द], @deva[स्कम्भ], @deva[शकट], @deva[शुम्भा], @deva[शिव], @deva[शुभंयि].
"""

id = "4.1.174"
numericId = "41174"

[en]
simple = """
The affixes from @ref[4.1.168] to @ref[4.1.173] are called @deva[तद्राज] (king-denoting affixes).
"""

standard = """
The affixes taught in @ref[4.1.168]-@ref[4.1.173] (6 @[sūtras]) are called @deva[तद्राज] ('the king thereof' affixes). The pronoun @deva[ते] refers only to these six @[sūtras]—not to earlier affixes (which have @deva[गोत्र]/@deva[युवन्] designation per @ref[2.4.62]). Examples already given under each @[sūtra].
"""

advanced = """
This @[sūtra] defines @deva[तद्राजसंज्ञा] for affixes in @ref[4.1.168]-@ref[4.1.173]. @deva[ते] = these only (not earlier affixes with @deva[गोत्र]/@deva[युवन्] @deva[संज्ञा] per @ref[2.4.62]).
"""

id = "4.1.94"
numericId = "41094"

[en]
simple = """
A @deva[युवन्] affix is added only after a @deva[गोत्र]-formed word. In the feminine, there is no @deva[युवन्] designation. Example: @deva[गार्ग्यायणः] (@deva[युवन्] descendant of @[gārgya]).
"""

standard = """
This @deva[नियम] declares: (1) @deva[युवन्] affixes attach only to @deva[गोत्र]-formed bases; (2) feminine forms don't receive @deva[युवन्] designation. Thus @deva[गार्ग्य] (@deva[गोत्र]) + @deva[फक्] (@ref[4.1.101]) = @deva[गार्ग्यायणः] (@deva[युवन्]). Similarly @deva[वात्स्यायणः], @deva[दाक्षायणः], @deva[प्लाक्षायणः], @deva[औपगविः], @deva[नाडायनिः]. Why @deva[अस्त्रियाम्]? Feminine @deva[दाक्षी] serves for both @deva[गोत्र] (@deva[दाक्षिः]) and @deva[युवन्] (@deva[दाक्षायणः]). The @deva[युवन्] designation is blocked in feminine—@deva[गोत्र] designation always applies.
"""

advanced = """
This @deva[नियमसूत्र] has two elements: (1) @deva[गोत्राद्] @deva[युनि] @deva[प्रत्ययो] @deva[भवति]—@deva[युवन्] affixes attach to @deva[गोत्र]-bases; (2) @deva[ततोऽस्त्रियाम्]—@deva[युवन्]-designation doesn't apply in feminine. @deva[गार्ग्यायणः], @deva[वात्स्यायणः], @deva[औपगविः], @deva[नाडायनिः]. Feminine: @deva[दाक्षी] = both @deva[दाक्षिः] (@deva[गोत्र]) and @deva[दाक्षायणः] (@deva[युवन्]). The @deva[अस्त्रियाम्] prohibition: @deva[युवन्]-name is blocked, so feminine is always @deva[गोत्र]. Without this, @deva[गोत्रसंज्ञा] would be superseded by @deva[युवसंज्ञा].
"""

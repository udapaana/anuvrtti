id = "4.1.65"
numericId = "41065"

[en]
simple = """
The affix @deva[ङीष्] is used after short-@deva[इ]-ending words denoting races of men. Examples: @deva[अवन्ती] (woman of Avanti), @deva[कुन्ती] (woman of Kunti), @deva[दाक्षी], @deva[प्लाक्षी].
"""

standard = """
After stems ending in short @deva[इ] that denote @deva[मनुष्यजाति] (human races/classes), @deva[ङीष्] applies. Thus @deva[अवन्ति] → @deva[अवन्ती], @deva[कुन्ति] → @deva[कुन्ती], @deva[दाक्षि] → @deva[दाक्षी], @deva[प्लाक्षि] → @deva[प्लाक्षी]. The feminine of @deva[ञ्यङ्]-formed words (@ref[4.1.171]) has affix elision by @ref[4.1.176]. Why short @deva[इ]? @deva[विट्] (@[vaiśya]), @deva[दरत्] don't qualify. Why @deva[मनुष्यजाति]? @deva[तित्तिरिः] (partridge) doesn't qualify. @deva[जाति]-repetition here indicates @deva[ङीष्] even with @deva[य्]-penultimate: @deva[औदमयी]. @[vārtika]: @deva[इञ्]-formed words (@ref[4.2.80]) take @deva[ङीष्] even without denoting @deva[जाति]: @deva[सौतंगमी], @deva[मौनचित्ती].
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for short-@deva[इ]-final @deva[मनुष्यजातिवाचक] stems. @deva[अवन्ती], @deva[कुन्ती], @deva[दाक्षी], @deva[प्लाक्षी]. Derivation: @deva[अवन्ति] + @deva[ञ्यङ्] (@ref[4.1.171]) → @deva[आवन्त्यः]; feminine by @ref[4.1.176] elision. Exclusions: @deva[विट्], @deva[दरत्] (not short-@deva[इ]); @deva[तित्तिरि] (not @deva[मनुष्यजाति]). The @deva[जाति]-repetition (despite possible @[anuvṛtti] from @ref[4.1.63]) signals @deva[ङीष्] even for @deva[य्]-penultimate: @deva[औदमयी]. @[vārtika]: @deva[इञ्] (@ref[4.2.80])—the quadruply-significant affix—triggers @deva[ङीष्] even without @deva[जाति] sense: @deva[सौतंगमी], @deva[मौनचित्ती].
"""

id = "4.1.110"
numericId = "41110"

[en]
simple = """
The @deva[अश्व] class words take @deva[फञ्] for @deva[गोत्र] meaning. Example: @deva[आश्वायनः] (gotra descendant of @[aśva]).
"""

standard = """
After @deva[अश्वादि] words, @deva[फञ्] is used for @deva[गोत्र] descendants. @deva[अश्व] + @deva[फञ्] = @deva[आश्वायनः] (@deva[फ्] → @deva[आयन्] by @ref[7.1.2], @deva[वृद्धि] by @ref[7.2.117]). Similarly @deva[आश्मायनः]. Some words in this list already bear a patronymic affix (@deva[आत्रेय], @deva[वैल्य], @deva[आनडुह्य])—for these, @deva[फञ्] functions as @deva[युवन्]. Special conditions: @deva[शय] → @deva[शायायनः] only when @deva[आत्रेय], else @deva[शायिः]/@deva[शायः]; @deva[जात] → @deva[जातायनः] for male's offspring, @deva[जातेयः] for female's (@deva[ढक्]); @deva[आत्रेय] → @deva[आत्रेयायनः] when @deva[भारद्वाज], else @deva[आत्रेयः] (@deva[इञ्] elided by @ref[2.4.58]).
"""

advanced = """
This @[sūtra] provides @deva[फञ्] for @deva[अश्वादि] in @deva[गोत्रार्थ]. @deva[आश्वायनः], @deva[आश्मायनः]. @deva[आत्रेय]/@deva[वैल्य]/@deva[आनडुह्य] already bear @deva[गोत्र]-affixes, so @deva[फञ्] = @deva[युवन्]. Conditions: @deva[शय आत्रेये] → @deva[शायायनः], else @deva[शायिः]/@deva[शायः]; @deva[जात पुंसि] → @deva[जातायनः], @deva[जाताया अपत्यम्] → @deva[जातेयः] (@deva[ढक्]); @deva[आत्रेय भरद्वाजे] → @deva[आत्रेयायनः], else @deva[आत्रेयः] (@deva[इञ्]-@deva[लुक्] @ref[2.4.58]); @deva[भरद्वाज आत्रेये] (adoption case) → @deva[भारद्वाजायनः], else @deva[भारद्वाजः] (@deva[अञ्] @ref[4.1.104]). 81-word list includes @deva[अश्व], @deva[अश्मन्], @deva[शंख], @deva[विद], @deva[रोहिण], @deva[बस्त], @deva[भडिल], @deva[काश], @deva[अर्क], @deva[चक्र], @deva[गोमिन्], @deva[श्याम], @deva[धूम], @deva[वाग्मिन्], @deva[विशंप], @deva[गिरि], @deva[दासक], @deva[वैल्य], @deva[अर्जुन], @deva[सुमनस्], @deva[नम], @deva[आत्रेय], @deva[भरद्वाज], @deva[उत्स], @deva[कितव], @deva[शिव], @deva[खदिर], @deva[नड], etc.
"""

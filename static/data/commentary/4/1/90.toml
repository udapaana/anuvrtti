id = "4.1.90"
numericId = "41090"

[en]
simple = """
The @deva[युवन्] @deva[गोत्र] affix is mentally elided when a vowel-initial @deva[प्राग्दीव्यतीय] affix follows. Example: @deva[फाण्टाहृताः] (disciples of @[phāṇṭāhṛtaḥ]), not @deva[फाण्टाहृतीयाः].
"""

standard = """
When adding a vowel-initial @deva[प्राग्दीव्यतीय] affix after a @deva[युवन्] word, mentally elide the @deva[युवन्] affix first, then determine the appropriate affix for the resulting @deva[गोत्र]-form. @deva[फाण्टाहृतः] (@deva[युवन्] by @deva[ण] @ref[4.1.150] from @deva[फाण्टाहृतिः]) → elide @deva[ण] → @deva[फाण्टाहृति] → add @deva[अण्] @ref[4.2.112] → @deva[फाण्टाहृताः] (disciples). Similarly: @deva[भागवित्तिकः] (@deva[युवन्] of @deva[भागवित्ति]) → disciples = @deva[भागवित्ताः]; @deva[तैकायनीयः] (@deva[युवन्] of @deva[तैकायनि]) → disciples = @deva[तैकायनीयाः]; @deva[कापिञ्जलाद्यः] (@deva[युवन्]) → @deva[कापिञ्जलादाः]. Restrictions: vowel-initial (@deva[फाण्टाहृतरूप्यम्], @deva[फाण्टाहृतमयम्] retain @deva[युवन्]); @deva[प्राग्दीव्यतीय] (@deva[भागवित्तिकाय हितम्] = @deva[भागवित्तीयम्]).
"""

advanced = """
This @[sūtra] provides mental @deva[लुक्] of @deva[युवन्] affix when vowel-initial @deva[प्राग्दीव्यतीय] follows. Process: @deva[फाण्टाहृतः] (@deva[युवन्]) → elide @deva[ण] (@ref[4.1.150]) → @deva[फाण्टाहृति] (@deva[गोत्र]) → @deva[अण्] (@ref[4.2.112]) → @deva[फाण्टाहृताः]. Derivation chains: @deva[भागवित्त] → @deva[भागवित्ति] (@ref[4.1.25]) → @deva[भागवित्तिकः] (@deva[युवन्] @ref[4.1.148]) → disciples @deva[भागवित्ताः]; @deva[तिक] → @deva[तैकायनि] (@deva[फिञ्] @ref[4.1.154]) → @deva[तैकायनीयः] (@deva[युवन्] @deva[छ] @ref[4.1.149]) → disciples @deva[तैकायनीयाः]; @deva[कपिञ्जलाद] → @deva[कपिञ्जलादि] → @deva[कापिञ्जलाद्य] (@deva[युवन्] @ref[4.1.151]) → disciples @deva[कापिञ्जलादाः]; @deva[ग्लुचुक] → @deva[ग्लुचुकायनि] (@ref[4.1.160]) → @deva[ग्लौचुकायनः] (@deva[युवन्] @ref[4.1.83]) → disciples @deva[ग्लौचुकायनाः]. Restrictions: @deva[अजादि] (not @deva[फाण्टाहृतरूप्यम्]); @deva[प्राग्दीव्यतीय] (not @deva[भागवित्तीयम्] 'fit for').
"""

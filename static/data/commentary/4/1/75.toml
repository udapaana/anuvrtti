id = "4.1.75"
numericId = "41075"

[en]
simple = """
The affix @deva[चाप्] is also used after @deva[आवट्य]. Example: @deva[आवट्या] (female descendant of @[avaṭa]).
"""

standard = """
The word @deva[अवट] (belonging to @deva[गर्गादि] @ref[4.1.105]) takes @deva[यञ्] → @deva[आवट्य]. In the feminine, @deva[चाप्] applies: @deva[आवट्या]. This would otherwise have taken @deva[ङीप्] by @ref[4.1.16]. According to Eastern Grammarians (@deva[प्राच्य]), the form @deva[आवट्यायनी] is proper (with @deva[फक्] + @deva[ङीन्], per @ref[4.1.17]).
"""

advanced = """
@deva[अवट] ∈ @deva[गर्गादि] (@ref[4.1.105]) → @deva[यञ्] → @deva[आवट्य]. This @[sūtra] provides @deva[चाप्]: @deva[आवट्या], debarring @deva[ङीप्] (@ref[4.1.16]). @deva[प्राच्य] (Eastern) view: @deva[आवट्यायनी] proper (with @deva[फक्] + @deva[ङीन्] per @ref[4.1.17]).
"""

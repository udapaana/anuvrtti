id = "4.1.59"
numericId = "41059"

[en]
simple = """
The Vedic form @deva[दीर्घजिह्वी] (long-tongued) is irregular. Example: @deva[दीर्घजिह्वी वै देवानां हव्यमलेट्].
"""

standard = """
The form @deva[दीर्घजिह्वी] is an irregular Vedic feminine. Since @deva[जिह्व] has conjunct penultimate, @ref[4.1.54] wouldn't apply. This @[sūtra] exceptionally provides @deva[ङीष्]. Vedic usage: @deva[दीर्घजिह्वी वै देवानां हव्यमलेट्]. The @deva[च] draws @deva[संज्ञा] from @ref[4.1.58]—@deva[दीर्घजिह्वी] is always a name. Using the feminine form @deva[दीर्घजिह्वी] in the @[sūtra] indicates @deva[ङीष्] is obligatory, not optional.
"""

advanced = """
This @[sūtra] provides irregular @deva[ङीष्] for Vedic @deva[दीर्घजिह्वी]. @deva[जिह्व] has @deva[संयोगोपध] (@deva[ह्व]), so @ref[4.1.54] wouldn't apply. The @deva[च] implies @deva[संज्ञा]-@[anuvṛtti] from @ref[4.1.58]—@deva[दीर्घजिह्वी] is always a name. Using feminine form in @[sūtra] signals @deva[नित्य] application. Citation: @deva[दीर्घजिह्वी वै देवानां हव्यमलेट्].
"""

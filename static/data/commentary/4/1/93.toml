id = "4.1.93"
numericId = "41093"

[en]
simple = """
The same @deva[गोत्र] affix is used for all descendants from grandson onwards—no new affix for each generation. Example: All descendants of Garga are @deva[गार्ग्यः].
"""

standard = """
This @deva[नियम] (restrictive) @[sūtra] declares that one @deva[गोत्र] affix applies to all descendants from grandson onwards—the affix doesn't accumulate for each generation. @deva[गर्ग] → @deva[गार्गिः] (son, by @deva[इञ्] @ref[4.1.95]) → @deva[गार्ग्यः] (grandson, by @deva[यञ्] @ref[4.1.105]). The son of @deva[गार्ग्यः] is also @deva[गार्ग्यः]—no further affix. Alternatively: the base remains constant (@deva[गर्ग]), and @deva[यञ्] is added regardless of how many generations have passed.
"""

advanced = """
This @deva[नियमसूत्र] restricts @deva[गोत्र]-affix application: one affix for all descendants from grandson onwards. Two interpretations: (1) @deva[प्रत्ययनियम]—the affix doesn't iterate per generation; (2) @deva[प्रकृतिनियम]—the base remains constant. @deva[गार्ग्यः] (grandson of @deva[गर्ग]) → son = @deva[गार्ग्यः] (not @deva[गार्ग्य] + new affix). The @deva[यञ्] is always added to @deva[गर्ग], not to @deva[गार्ग्य].
"""

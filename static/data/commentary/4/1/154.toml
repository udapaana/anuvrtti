id = "4.1.154"
numericId = "41154"

[en]
simple = """
The @deva[तिक] class words take @deva[फिञ्] for descendant meaning. Example: @deva[तैकायनिः], @deva[कैतवायनिः]. This is a 48-word class.
"""

standard = """
After @deva[तिकादि] words, @deva[फिञ्] is used: @deva[तैकायनिः], @deva[कैतवायनिः]. Special cases: @deva[वृष] adds intermediate @deva[य]: @deva[वार्ष्यायणिः]. @deva[कौरव्य] (∈ this list) = @[kṣatriya] (follows @deva[औरश] 'born of the chest' = @[kṣatriya]), so its son takes @deva[अञ्] (@ref[4.1.168]). But @deva[कौरव्य] formed by @deva[ण्य] of @ref[4.1.151] takes @deva[इञ्], not @deva[फिञ्] (@ref[2.4.58], @ref[2.4.68]). 48-word list includes @deva[तिक], @deva[कितव], @deva[संज्ञा], @deva[बाल], @deva[शिखा], @deva[उरस्], @deva[सैन्धव], @deva[यमुन्द], @deva[नील], @deva[गौकक्ष्य], @deva[देवरथ], @deva[कौरव्य], @deva[गङ्गा], @deva[वृष], @deva[यज्ञ], @deva[वसु], @deva[बन्धु], etc.
"""

advanced = """
This @[sūtra] provides @deva[फिञ्] for @deva[तिकादि]: @deva[तैकायनिः], @deva[कैतवायनिः]. @deva[वृष] + intermediate @deva[य] → @deva[वार्ष्यायणिः]. @deva[कौरव्य] (after @deva[औरश] = @[kṣatriya]) → son by @deva[अञ्] (@ref[4.1.168]). @deva[कौरव्य] by @deva[ण्य] @ref[4.1.151] → @deva[इञ्], not @deva[फिञ्] (@ref[2.4.58], @ref[2.4.68]). 48 words.
"""

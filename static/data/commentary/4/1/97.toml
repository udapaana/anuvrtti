id = "4.1.97"
numericId = "41097"

[en]
simple = """
After @deva[सुधातृ], @deva[इञ्] is used with @deva[अकङ्] substituting for final @deva[ऋ]. Example: @deva[सौधातकिः] (descendant of @[sudhātṛ]).
"""

standard = """
The word @deva[सुधातृ] takes @deva[इञ्] with @deva[अकङ्] replacing final @deva[ऋ]: @deva[सुधातृ] + @deva[इञ्] → @deva[सुधातक] + @deva[इञ्] → @deva[सौधातकिः]. @[vārtika]: @deva[अकङ्] also replaces finals of @deva[व्यास], @deva[वरुड], @deva[निषाद], @deva[चण्डाल], @deva[बिम्ब] before patronymic @deva[इञ्]: @deva[वैयासकिः], @deva[वारुडकिः], @deva[नैषादकिः], @deva[चाण्डालकिः], @deva[बैम्बकिः].
"""

advanced = """
This @[sūtra] provides @deva[इञ्] after @deva[सुधातृ] with @deva[अकङ्]-@deva[आदेश] for @deva[ऋ]: @deva[सौधातकिः]. @[vārtika] @deva[व्यासवरुडनिषादचण्डालबिम्बानामकङ् इञि]: @deva[वैयासकिः], @deva[वारुडकिः], @deva[नैषादकिः], @deva[चाण्डालकिः], @deva[बैम्बकिः].
"""

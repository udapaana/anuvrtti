id = "4.1.77"
numericId = "41077"

[en]
simple = """
The affix @deva[ति] is added to @deva[युवन्] to form the feminine @deva[युवतिः] (young woman). This @deva[ति] is a @deva[तद्धित] affix.
"""

standard = """
The affix @deva[ति] comes after @deva[युवन्] and is designated @deva[तद्धित]. Result: @deva[युवतिः] (young maiden). This debars @deva[ङीप्] of @ref[4.1.5]. The word @deva[युवति] ends in @deva[इ] but doesn't take @deva[ङीष्] of @ref[4.1.65] because @deva[ति] itself is a feminine-marking affix (though a @deva[तद्धित]); alternatively, @deva[युवन्] may be considered non-@deva[जाति].
"""

advanced = """
This @[sūtra] provides @deva[ति] → @deva[तद्धित] after @deva[युवन्]: @deva[युवतिः]. This debars @deva[ङीप्] (@ref[4.1.5]). No @deva[ङीष्] (@ref[4.1.65]) because: (1) @deva[ति] itself is @deva[स्त्रीप्रत्यय] though @deva[तद्धित], or (2) @deva[युवन्] is @deva[अजाति].
"""

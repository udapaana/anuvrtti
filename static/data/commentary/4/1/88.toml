id = "4.1.88"
numericId = "41088"

[en]
simple = """
When a @deva[द्विगु] compound is formed with @deva[तद्धित] sense, the @deva[तद्धित] affix is elided—except for @deva[गोत्र] (patronymic) sense. Examples: @deva[पञ्चकपालः] (prepared in five cups), @deva[द्विवेदः] (studying two Vedas).
"""

standard = """
@deva[प्राग्दीव्यतीय] @deva[तद्धित] affixes are elided (@deva[लुक्]) when @deva[द्विगु] compound conveys the same meaning—except for @deva[गोत्र] sense. @deva[पञ्चसु कपालेषु संस्कृतः] = @deva[पञ्चकपालः] (@deva[संस्कृतं] @ref[4.2.16] affix elided). @deva[द्विवेदः], @deva[त्रिवेदः] (@deva[अधीते] @ref[4.2.59] affix elided). Exception—@deva[गोत्र]: @deva[द्वैदेवदत्तिः] (descendant of two Devadattas)—patronymic affix retained. Why @deva[प्राग्दीव्यतीय]? @deva[द्वैपारायणिकः] (non-@deva[प्राग्दीव्यतीय] not elided). The @deva[द्विगोः] genitive can be @deva[स्थानषष्ठी]: @deva[लुक्] substitutes for the @deva[द्विगु]-triggering affix. Forms like @deva[पाञ्चकपालम्] show @deva[द्विगु] becoming @deva[प्रातिपदिक] for further derivation.
"""

advanced = """
@deva[प्राग्दीव्यतीय] affixes undergo @deva[लुक्] when @deva[द्विगु] compound expresses the meaning—@deva[गोत्र] excepted. @deva[पञ्चकपालः] (@deva[संस्कृतम्] @ref[4.2.16] elided), @deva[द्विवेदः] (@deva[अधीते] @ref[4.2.59] elided). @deva[गोत्र] exception: @deva[द्वैदेवदत्तिः], @deva[त्रैदेवदत्तिः]. @deva[प्राग्दीव्यत्] restriction: @deva[द्वैपारायणिकः] (non-@deva[प्राग्दीव्यतीय] retained). The @deva[द्विगोः] is @deva[स्थानषष्ठी]—@deva[लुक्] replaces affix causing @deva[द्विगु]. Post-@deva[द्विगु] derivation: @deva[पञ्चकपालस्येदम्] = @deva[पाञ्चकपालम्]. Anomaly @deva[पञ्चकपाल्यां संस्कृतः] = @deva[पञ्चकपालः]—no @deva[तद्धित] added; valid forms: @deva[वाक्य], @deva[समाहारद्विगु], or @deva[तद्धितार्थद्विगु]. Forms @deva[त्रैविद्यः], @deva[पाञ्चनदः], @deva[षाट्कुलः] analyzed: @deva[त्र्यवयवा विद्या] = @deva[त्रिविद्या] → @deva[त्रैविद्यः].
"""

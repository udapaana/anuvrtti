id = "4.1.132"
numericId = "41132"

[en]
simple = """
After @deva[पितृष्वसृ] (father's sister), @deva[छण्] is used for descendant meaning, debarring @deva[अण्]. Example: @deva[पैतृष्वस्रीयः] (son of father's sister).
"""

standard = """
After @deva[पितृष्वसृ] (paternal aunt), @deva[छण्] (not @deva[अण्]) is used: @deva[पितृष्वसृ] + @deva[छण्] = @deva[पैतृष्वस्रीयः]. The @deva[छ] → @deva[ईय].
"""

advanced = """
This @[sūtra] provides @deva[छण्] (debarring @deva[अण्]) for @deva[पितृष्वसृ]: @deva[पैतृष्वस्रीयः]. @deva[छ] → @deva[ईय].
"""

id = "4.1.2"
numericId = "41002"

[en]
simple = """
After nominal stems or feminine-marked words, the following case endings are used: @deva[सु], @deva[औ], @deva[जस्] for nominative; @deva[अम्], @deva[औट्], @deva[शस्] for accusative; @deva[टा], @deva[भ्याम्], @deva[भिस्] for instrumental; and so on for all seven cases in @deva[एकवचन] (singular), dual, and plural.
"""

standard = """
The 21 @deva[सुप्] (case) affixes are: Nominative @deva[सु], @deva[औ], @deva[जस्]; Accusative @deva[अम्], @deva[औट्], @deva[शस्]; Instrumental @deva[टा], @deva[भ्याम्], @deva[भिस्]; Dative @deva[ङे], @deva[भ्याम्], @deva[भ्यस्]; Ablative @deva[ङसि], @deva[भ्याम्], @deva[भ्यस्]; Genitive @deva[ङस्], @deva[ओस्], @deva[आम्]; Locative @deva[ङि], @deva[ओस्], @deva[सुप्]. Letters like @deva[प्] in @deva[सुप्] are @deva[इत्] markers for forming the @deva[प्रत्याहार] @deva[सुप्] (collective name for all 21). Examples: @deva[कुमारी], @deva[कुमार्यौ], @deva[कुमार्यः]; @deva[खट्वा], @deva[खट्वे], @deva[खट्वाः]; @deva[दृषद्], @deva[दृषदौ], @deva[दृषदः].
"""

advanced = """
This @[sūtra] enumerates the 21 @deva[सुप्] pratyayas applied after @deva[ङ्याप्प्रातिपदिक]. The @deva[इत्] letters (@deva[उ] in @deva[सु], @deva[प्] in @deva[सुप्], @deva[ट्] in @deva[औट्], etc.) serve pronunciation or marking purposes—@deva[प्] forms the @[pratyāhāra] @deva[सुप्]. Full declension paradigms: @deva[कुमारी] (@deva[ङीप्]-stem): @deva[कुमारी/कुमार्यौ/कुमार्यः], @deva[कुमारीम्/कुमार्यौ/कुमारीः], @deva[कुमार्या/कुमारीभ्याम्/कुमारीभिः], etc. @deva[खट्वा] (@deva[टाप्]-stem): @deva[खट्वा/खट्वे/खट्वाः], etc. @deva[दृषद्] (consonant-stem): @deva[दृषद्/दृषदौ/दृषदः], with @deva[दृषत्सु] in locative plural showing @deva[द्] → @deva[त्] before @deva[स्].
"""

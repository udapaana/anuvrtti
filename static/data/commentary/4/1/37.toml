id = "4.1.37"
numericId = "41037"

[en]
simple = """
The words @deva[वृषाकपि], @deva[अग्नि], @deva[कुसति], and @deva[कुसीद] substitute @deva[ऐ] (with @deva[उदात्त] accent) for their final before @deva[ङीप्]. Example: @deva[वृषाकपायी] (wife of @[vṛṣākapi]), @deva[अग्नायी] (wife of Agni).
"""

standard = """
The finals of @deva[वृषाकपि], @deva[अग्नि], @deva[कुसति], @deva[कुसीद] are replaced by @deva[उदात्त]-accented @deva[ऐ] before @deva[ङीप्]. Thus: @deva[वृषाकपायी] (@[ṛgveda] X.86.13), @deva[अग्नायी] (@[ṛgveda] I.22.12), @deva[कुसितायी], @deva[कुसीदायी]. @deva[वृषाकपि]/@deva[कुसीद] have middle-@deva[उदात्त] (Phit. II.19); the feminine shifts to final @deva[उदात्त]. @deva[अग्नि] etc. already have final @deva[उदात्त] (Phit. I.1). This applies only for 'wife' meaning; otherwise: @deva[वृषाकपिः स्त्री].
"""

advanced = """
This @[sūtra] provides @deva[उदात्त]-marked @deva[ऐ]-substitution for @deva[वृषाकपि], @deva[अग्नि], @deva[कुसति], @deva[कुसीद] finals. @deva[वृषाकपि]/@deva[कुसीद]: middle-@deva[उदात्त] by Phit. II.19; feminine @deva[ऐ] becomes final-@deva[उदात्त]. @deva[अग्नि] etc.: already final-@deva[उदात्त] (Phit. I.1); @deva[स्थानिवद्भाव] would preserve this anyway, but explicit @deva[उदात्त] specification confirms. Vedic citations: @deva[वृषाकपायी] (@[ṛg]. X.86.13), @deva[अग्नायी] (@[ṛg]. I.22.12). @deva[पुंयोग]-semantic restriction: non-'wife' → @deva[वृषाकपिः स्त्री]. @deva[वृष]-accent: see @ref[6.1.203].
"""

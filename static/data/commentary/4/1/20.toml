id = "4.1.20"
numericId = "41020"

[en]
simple = """
After stems ending in @deva[अ] that denote young age, the feminine affix @deva[ङीप्] is used. Example: @deva[कुमार] → @deva[कुमारी] (girl); @deva[किशोर] → @deva[किशोरी] (young girl).
"""

standard = """
Stems ending in @deva[अ] expressing young age (@deva[अचरमे वयसि]) take @deva[ङीप्]. Examples: @deva[कुमारी], @deva[किशोरी], @deva[बर्करी] (she-kid). Why 'young age'? Words for old age take @deva[टाप्]: @deva[स्थविरा], @deva[वृद्धा]. Why 'ending in @deva[अ]'? @deva[शिशु] is common gender (no feminine affix). @[vārtika]: The rule should be @deva[आचरमे वयसि] (not old age)—including words for maturity: @deva[वधूटी], @deva[चिरण्टी]. Exception: @deva[कन्या] (girl) takes @deva[टाप्], acknowledged by @[pāṇini]'s own usage in @ref[4.1.116].
"""

advanced = """
This @[sūtra] provides @deva[ङीप्] for @deva[अकारान्त] stems denoting @deva[वयस्] (age-stage), specifically youth. Condition: @deva[अचरमे वयसि]—early age, not final/old age. Forms: @deva[कुमारी], @deva[किशोरी], @deva[बर्करी]. Restrictions: (1) @deva[वयोवचन]—@deva[स्थविरा], @deva[वृद्धा] (old age) take @deva[टाप्]; (2) @deva[अकारान्त]—@deva[शिशु] stays common gender. @[vārtika]: @deva[आचरमे] (not just first stage, but non-final) includes matured youth: @deva[वधूटी], @deva[चिरण्टी]. Exception: @deva[कन्या] anomalously takes @deva[टाप्] (@[pāṇini] uses it in @ref[4.1.116]). Non-qualifying: metaphorical age-words like @deva[उत्तानशया], @deva[लोहितपादिका] don't trigger @deva[ङीप्].
"""

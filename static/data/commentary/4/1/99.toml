id = "4.1.99"
numericId = "41099"

[en]
simple = """
The @deva[नड] class words take @deva[फक्] for @deva[गोत्र] meaning. Example: @deva[नाडायनः] (gotra descendant of @[naḍa]).
"""

standard = """
After @deva[नडादि] words, @deva[फक्] is used for @deva[गोत्र] descendants. @deva[नड] + @deva[फक्] = @deva[नाड] + @deva[आयन] (@ref[7.2.118], @ref[7.1.2]) = @deva[नाडायनः]. Similarly @deva[चारायणः]. Son of @deva[नड]: @deva[नाडिः] (@ref[4.1.95]). Special cases: @deva[शलंकु] → @deva[शलंक] before affix → @deva[शालंकायनः]; @deva[अग्निशर्मन्] takes @deva[फक्] only for @deva[वृषगण] @deva[गोत्र] → @deva[आग्निशर्मायणः] = @deva[वार्ष्यगण्यः], otherwise @deva[आग्निशर्मः]; @deva[कृष्ण] takes @deva[फक्] for @[brāhmaṇa] → @deva[कार्ष्णायनः], otherwise @deva[कार्ष्णिः]; @deva[राण] takes @deva[फक्] for @[vāsiṣṭha] → @deva[राणायनः] = @deva[वासिष्ठः]; @deva[क्रोष्टु] → @deva[क्रोष्ट] → @deva[क्रौष्टायनः].
"""

advanced = """
This @[sūtra] provides @deva[फक्] for @deva[नडादि] in @deva[गोत्रार्थ]. @deva[नाडायनः], @deva[चारायणः]. Special formations: @deva[शलंकु] → @deva[शलंक] (@deva[शालंकायनः]); @deva[शालंकिः] in @deva[पैलादि] (@ref[2.4.59]) has @deva[युवन्]-@deva[लुक्], so @deva[शालंकिः] = father and son; @deva[अग्निशर्मन्] @deva[वृषगणे] → @deva[आग्निशर्मायणः], else @deva[आग्निशर्मः]; @deva[कृष्णरणौ ब्राह्मणवासिष्ठे] → @deva[कार्ष्णायनः]/@deva[राणायनः], else @deva[कार्ष्णिः]/@deva[राणिः]; @deva[क्रोष्टु] → @deva[क्रोष्ट] (@deva[क्रौष्टायनः]). Extensive list: 84 words including @deva[नड], @deva[चर], @deva[बक], @deva[मुंज], @deva[इतिक], @deva[उपक], @deva[एक], @deva[शलंकु], @deva[तिक], @deva[अग्निशर्मन्], @deva[प्राण], @deva[नर], @deva[काश्यप], @deva[अज], @deva[कृष्ण], @deva[लिगु], @deva[चित्र], @deva[कुमार], @deva[क्रोष्टु], @deva[पञ्चाल], @deva[ब्रह्मदत्त], @deva[उदुम्बर], etc.
"""

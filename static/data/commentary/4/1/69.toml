id = "4.1.69"
numericId = "41069"

[en]
simple = """
The affix @deva[ऊङ्] is used after @deva[ऊरु] (thigh) compounds when expressing comparison. Examples: @deva[कदलीस्तम्भोरूः] (thighs like plantain stems), @deva[करभोरूः] (thighs like elephant's trunk).
"""

standard = """
When a compound ending in @deva[ऊरु] expresses comparison (@deva[उपमान]), @deva[ऊङ्] applies. Forms: @deva[कदलास्तम्भोरूः] (thighs like plantain stem), @deva[नागनासोरूः] (thighs like elephant's nose), @deva[करभोरूः] (thighs like the tapering ulnar side of hand). When not expressing comparison: @deva[वृत्तोरूः स्त्री] (woman with round thighs)—no special treatment. Poetic irregularity: @deva[विचकरे च करेणुकरोरुभिः] (@deva[करेणुकरोरु]).
"""

advanced = """
This @[sūtra] provides @deva[ऊङ्] for @deva[ऊर्वन्त] compounds in @deva[उपमान] (simile) sense. @deva[कदलास्तम्भोरूः], @deva[नागनासोरूः], @deva[करभोरूः]. The @deva[उपमाने] restriction: non-simile @deva[वृत्तोरूः स्त्री] doesn't trigger this rule. Poetic license: @deva[विचकरे च करेणुकरोरुभिः] (elephant-trunk-thighed).
"""

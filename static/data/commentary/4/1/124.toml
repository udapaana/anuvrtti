id = "4.1.124"
numericId = "41124"

[en]
simple = """
The words @deva[विकर्ण] and @deva[कुषीतक] take @deva[ढक्] when meaning @deva[काश्यप] descendants. Examples: @deva[वैकर्णेयः] = @deva[काश्यपः], @deva[कौषीतकेयः] = @deva[काश्यपः].
"""

standard = """
After @deva[विकर्ण] and @deva[कुषीतक], @deva[ढक्] applies only when meaning @deva[काश्यप] descendants: @deva[वैकर्णेयः] = @deva[काश्यपः], @deva[कौषीतकेयः] = @deva[काश्यपः]. Otherwise: @deva[वैकर्णिः] and @deva[कौषीतकिः] (by @deva[इञ्] @ref[4.1.95]).
"""

advanced = """
This @deva[नियमसूत्र] restricts @deva[ढक्] for @deva[विकर्ण]/@deva[कुषीतक] to @deva[काश्यप]-context: @deva[वैकर्णेयः], @deva[कौषीतकेयः] = @deva[काश्यपः]. @[non-kāśyapa]: @deva[वैकर्णिः], @deva[कौषीतकिः] (@deva[इञ्] @ref[4.1.95]).
"""

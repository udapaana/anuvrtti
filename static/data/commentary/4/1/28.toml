id = "4.1.28"
numericId = "41028"

[en]
simple = """
After @deva[बहुव्रीहि] compounds ending in @deva[अन्] that lose their penultimate vowel, @deva[ङीप्] may optionally be used. Example: @deva[बहुराजन्] → @deva[बहुराज्ञी] (having many kings) or @deva[बहुराजा]/@deva[बहुराजानौ].
"""

standard = """
@[bahuvrīhi] compounds ending in @deva[अन्] that undergo @deva[अल्लोप] (penultimate @deva[अ]-elision by @ref[6.4.134]) optionally take @deva[ङीप्]. Thus @deva[बहुराजन्] → @deva[बहुराज्ञी]; alternatively, @deva[डाप्] by @ref[4.1.13]: @deva[बहुराजा/बहुराजे/बहुराजाः]; or prohibition by @ref[4.1.12]: @deva[बहुराजा/बहुराजानौ/बहुराजानः]. When @deva[अल्लोप] doesn't occur (@ref[6.4.137] blocks it for @deva[सुपर्वन्] etc.), only the latter two options exist: @deva[सुपर्वा/सुपर्वे/सुपर्वाः] or @deva[सुपर्वा/सुपर्वाणौ/सुपर्वाणः].
"""

advanced = """
This @[sūtra] provides optional @deva[ङीप्] for @deva[अनन्त]-@[bahuvrīhis] undergoing @deva[अल्लोप] (@ref[6.4.134]). Three options when @deva[अल्लोप] occurs: (1) @deva[ङीप्]: @deva[बहुराज्ञी]; (2) @deva[डाप्] (@ref[4.1.13]): @deva[बहुराजा/बहुराजे/बहुराजाः]; (3) prohibition (@ref[4.1.12]): @deva[बहुराजा/बहुराजानौ/बहुराजानः]. When @deva[अल्लोप] is blocked by @ref[6.4.137] (@deva[न संयोगाद्वमन्तात्]—after @deva[व्/म्]-final conjuncts), @deva[ङीप्] unavailable: @deva[सुपर्वन्] → @deva[सुपर्वा/सुपर्वे/सुपर्वाः] or @deva[सुपर्वा/सुपर्वाणौ/सुपर्वाणः].
"""

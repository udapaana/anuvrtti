id = "4.1.151"
numericId = "41151"

[en]
simple = """
The @deva[कुरु] class words take @deva[ण्य] for descendant meaning. Example: @deva[कौरव्यः]. This is a 53-word class including names and castes.
"""

standard = """
After @deva[कुर्वादि] words, @deva[ण्य] is used for descendant meaning. @deva[कुरु] + @deva[ण्य] = @deva[कौरव्यः]. Note: @deva[कुरु] also takes @deva[ण्य] by @ref[4.1.172] (@[country-kṣatriya] rule), but with a difference: the @deva[ण्य] of @ref[4.1.172] is @deva[तद्राज] and elides in plural; the @deva[ण्य] here is retained in plural. @deva[कौरव्य] ∈ @deva[तिकादि] (@ref[4.1.154]) takes @deva[फिञ्]: @deva[कौरव्यायणिः]. Special cases: @deva[रथकार] = caste (takes @deva[ण्य] here); artisan 'chariot-maker' takes @deva[ण्य] by @ref[4.1.152]. @deva[केशिनी] → @deva[कैशिन्यः] (no @deva[पुंवद्भाव]—@deva[केशिनी] read with feminine affix to avoid @deva[टि]-@deva[लोप] → *@deva[कैश्य]). @deva[वेन] takes @deva[ण्य] only in Vedic: @deva[वैन्य] (modern form incorrect). @deva[वामरथ] treated like @deva[कण्वादि] except accent (governed by @deva[ण्य]). 53-word list.
"""

advanced = """
This @[sūtra] provides @deva[ण्य] for @deva[कुर्वादि]: @deva[कौरव्यः]. @deva[कुरु] also by @ref[4.1.172] (@deva[तद्राज]), but @ref[4.1.172]'s @deva[ण्य] has @deva[लुक्] in plural; here's doesn't. @deva[कौरव्य] ∈ @deva[तिकादि] → @deva[फिञ्]: @deva[कौरव्यायणिः]. @deva[रथकार]: caste → @deva[ण्य] here; artisan → @deva[ण्य] @ref[4.1.152]. @deva[केशिनी] → @deva[कैशिन्यः]: no @deva[पुंवद्भाव] @ref[6.3.34]; listed with @deva[स्त्रीप्रत्यय] to block @deva[टि]-@deva[लोप] (@ref[6.4.144]) → *@deva[कैश्य]. @deva[वेनाच्छन्दसि]: Vedic only. @[vārtika]: @deva[वामरथस्य कण्वादिवत्स्वरवर्जम्]. 53 words: @deva[कुरु], @deva[गर्ग], @deva[मङ्गुष], @deva[अजमार], @deva[रथकार], @deva[वावदूक], @deva[सम्राज् क्षत्रिये], @deva[कवि], @deva[विमति], @deva[वाक्], @deva[वामरथ], @deva[पितृमत्], @deva[इन्द्रजालि], @deva[एजि], @deva[वातकि], @deva[कुट], @deva[शलाका], @deva[सुर], @deva[पुर], @deva[शुभ्र], @deva[अभ्र], @deva[दर्भ], @deva[केशिनी], @deva[वेन], @deva[श्यावरथ], @deva[सत्यंकार], @deva[मूढ], @deva[शकन्धु], @deva[शालीन], @deva[कर्तृ], @deva[हर्तृ], @deva[काक], @deva[बुद्धिकार], etc.
"""

id = "4.1.12"
numericId = "41012"

[en]
simple = """
@deva[ङीप्] is not used after @deva[बहुव्रीहि] compounds that end in @deva[अन्] (where the penultimate vowel isn't dropped). These compounds remain the same for feminine. Example: @deva[सुपर्वन्] (with good joints) → @deva[सुपर्वा], @deva[सुपर्वाणौ], @deva[सुपर्वाणः].
"""

standard = """
@[bahuvrīhi] compounds ending in @deva[अन्] that retain their penultimate @deva[अ] don't take @deva[ङीप्]—they're common gender. Thus @deva[सुपर्वन्] (having beautiful joints), @deva[सुशर्मन्] (well-protected) decline as: @deva[सुपर्वा/सुपर्वाणौ/सुपर्वाणः]. When the penultimate is elided (@ref[6.4.134]), @deva[ङीप्] becomes optional by @ref[4.1.28]. This rule specifically targets @[bahuvrīhis]—other compounds like @deva[अव्ययीभाव] @deva[अतिराजन्] still take @deva[ङीप्]: @deva[अतिराज्ञी].
"""

advanced = """
This @[sūtra] prohibits @deva[ङीप्] for @deva[बहुव्रीहि] compounds ending in @deva[अन्] when @deva[उपधा] (penultimate) is not elided. When @ref[6.4.134] (@deva[अल्लोपोऽनः]) doesn't apply due to @ref[6.4.137] (@deva[न संयोगाद्वमन्तात्]—no elision after @deva[व्/म्]-final conjuncts), forms stay common: @deva[सुपर्वा/सुपर्वाणौ/सुपर्वाणः], @deva[सुशर्मा/सुशर्माणौ/सुशर्माणः]. The restriction @deva[बहुव्रीहौ] matters: @deva[अव्ययीभाव] @deva[अतिराजन्] → @deva[अतिराज्ञी] (takes @deva[ङीप्]).
"""

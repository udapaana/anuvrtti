id = "4.1.6"
numericId = "41006"

[en]
simple = """
The affix @deva[ङीप्] is also used after words formed by affixes that have @deva[उ], @deva[ऋ], or @deva[ऌ] as an indicatory letter (@deva[उगित्]). Example: @deva[भवत्] → @deva[भवती] (madam); @deva[पचत्] → @deva[पचन्ती] (female cooking).
"""

standard = """
Stems formed by affixes with indicatory @deva[उक्] (@deva[उ], @deva[ऋ], @deva[ऌ]) take @deva[ङीप्] in the feminine. The pronoun @deva[भवत्] (formed with @deva[भवतु]) yields @deva[भवती]; by @deva[तदन्तविधि], compounds like @deva[अतिभवत्] → @deva[अतिभवती]. Words from @deva[शतृ] (which has @deva[ऋ]): @deva[पचत्] → @deva[पचन्ती] (with @deva[नुम्] by @ref[7.1.82]). Exception (@[vārtika]): verbal roots with indicatory @deva[उक्] don't trigger this—@deva[उखास्रत्] stays uninflected for feminine.
"""

advanced = """
This @[sūtra] extends @deva[ङीप्] to @deva[उगित्] stems—those ending in affixes marked with @deva[उक्] (@deva[उ], @deva[ऋ], @deva[ऌ] @[pratyāhāra]). Types: (1) @deva[प्रातिपदिक] itself @deva[उगित्]: @deva[भवत्] (@[sarvanāman] @deva[भवतु]) → @deva[भवती]; (2) affix is @deva[उगित्]: @deva[क्तवतु], @deva[शतृ] → @deva[पचत्] → @deva[पचन्ती] (@deva[नुम्] by @ref[7.1.82]); (3) substitute letter @deva[उगित्]: @deva[तृ] for @deva[त्] in @ref[6.4.127] → @deva[अर्वत्] → @deva[अर्वती]. @[vārtika]: @deva[धातूगितो निषेधः]—roots like @deva[स्रंसु], @deva[ध्वंसु] don't cause @deva[ङीप्] for derived @deva[उखास्रत्], @deva[पर्णध्वत्]. @[counter-vārtika]: @deva[अञ्चु]-ending compounds do take @deva[ङीप्]: @deva[प्राची], @deva[प्रतीची], @deva[उदीची].
"""

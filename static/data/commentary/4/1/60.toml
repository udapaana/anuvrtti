id = "4.1.60"
numericId = "41060"

[en]
simple = """
When a direction-word precedes a body-part compound, @deva[ङीप्] (not @deva[ङीष्]) is used. Example: @deva[प्राङ्मुखी] or @deva[प्राङ्मुखा] (east-facing).
"""

standard = """
When the first member of a compound is a @deva[दिश्]-word (direction), @deva[ङीप्] replaces @deva[ङीष्] where the latter would have applied. Thus @deva[प्राङ्मुखी]/@deva[प्राङ्मुखा], @deva[प्राङ्नासिकी]/@deva[प्राङ्नासिका]. The forms are identical except for accent (@deva[ङीप्] is @deva[अनुदात्त] by @ref[3.1.4]). This rule only operates where @deva[ङीष्] would have come—not for @deva[प्राग्गुल्फा], @deva[प्राक्क्रोडा], @deva[प्राग्जघना] (these don't take @deva[ङीष्] by @ref[4.1.56]). The @[sūtra] has two readings: (1) @deva[ङीष्] applies to @deva[दिश्]-prefixed @deva[स्वाङ्ग]/@deva[नासिकादि] compounds (non-conjunct penultimate); (2) @deva[ङीप्] substitutes for @deva[ङीष्] when @deva[दिश्]-prefixed. Hence @deva[ङीष्]-@[anuvṛtti] continues to @ref[4.1.61].
"""

advanced = """
This @[sūtra] provides @deva[ङीप्] as substitute for @deva[ङीष्] when @deva[दिश्] (direction-word) is first member. @deva[प्राङ्मुखी]/@deva[प्राङ्मुखा], @deva[प्राङ्नासिकी]/@deva[प्राङ्नासिका]. The difference is accent only (@deva[ङीप्] = @deva[अनुदात्त] by @ref[3.1.4]). Scope: only where @deva[ङीष्] would apply—@deva[प्राग्गुल्फा], @deva[प्राक्क्रोडा], @deva[प्राग्जघना] don't take @deva[ङीष्] by @ref[4.1.56], so no @deva[ङीप्] substitution. Two-rule reading: (1) @deva[ङीष्] for @deva[दिश्]-prefixed @deva[स्वाङ्ग]/@deva[नासिकादि] (non-@deva[संयोगोपध]); (2) @deva[ङीप्] substitutes. This establishes @deva[ङीष्]-@[anuvṛtti] for @ref[4.1.61], not @deva[ङीप्].
"""

id = "4.1.55"
numericId = "41055"

[en]
simple = """
The words @deva[नासिका], @deva[उदर], @deva[ओष्ठ], @deva[जंघा], @deva[दन्त], @deva[कर्ण], and @deva[शृङ्ग] optionally take @deva[ङीष्] at compound-end (even if conjunct penultimate or polysyllabic). Example: @deva[तुङ्गनासिकी] or @deva[तुङ्गनासिका].
"""

standard = """
Seven body-part words optionally take @deva[ङीष्] as compound-finals: @deva[नासिका], @deva[उदर], @deva[ओष्ठ], @deva[जंघा], @deva[दन्त], @deva[कर्ण], @deva[शृङ्ग]. This is an exception to @ref[4.1.54] (conjunct penultimate) and @ref[4.1.56] (polysyllabic), but governed by @ref[4.1.57]. Forms: @deva[तुङ्गनासिकी]/@deva[तुङ्गनासिका], @deva[तिलोदरी]/@deva[तिलोदरा], @deva[बिम्बोष्ठी]/@deva[बिम्बोष्ठा], @deva[दीर्घजंघी]/@deva[दीर्घजंघा], @deva[समदन्ती]/@deva[समदन्ता], @deva[चारुकर्णी]/@deva[चारुकर्णा], @deva[तीक्ष्णशृङ्गी]/@deva[तीक्ष्णशृङ्गा]. @[vārtikas]: @deva[पुच्छ] also included: @deva[कल्याणपुच्छी]/@deva[कल्याणपुच्छा]; but @deva[ङीष्] obligatory for @deva[पुच्छ] with @deva[कबर]/@deva[मणि]/@deva[विष]/@deva[शर]: @deva[कबरपुच्छी] (peahen), @deva[विषपुच्छी] (scorpion); also obligatory for @deva[पक्ष]/@deva[पुच्छ] in simile-sense: @deva[उलूकपक्षी सेना], @deva[उलूकपुच्छी शाला].
"""

advanced = """
This @[sūtra] lists seven @deva[स्वाङ्ग]-words taking optional @deva[ङीष्] despite @deva[संयोगोपधत्व] or @deva[बहुच्]-status. This excepts @ref[4.1.54] (conjunct) and @ref[4.1.56] (polysyllabic) but is qualified by @ref[4.1.57] (@deva[सह]/@deva[नञ्]/@deva[विद्यमान]-initial prohibition). @[vārtikas]: (1) @deva[पुच्छ] also: @deva[कल्याणपुच्छी]/@deva[कल्याणपुच्छा]; (2) @deva[पुच्छ] with @deva[कबर]/@deva[मणि]/@deva[विष]/@deva[शर] obligatory: @deva[कबरपुच्छी] (peahen), @deva[मणिपुच्छी], @deva[विषपुच्छी] (scorpion), @deva[शरपुच्छी]; (3) @deva[पक्ष]/@deva[पुच्छ] in @deva[उपमान] (simile) obligatory: @deva[उलूकपक्षी सेना], @deva[उलूकपुच्छी शाला].
"""

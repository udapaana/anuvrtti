id = "4.1.68"
numericId = "41068"

[en]
simple = """
The affix @deva[ऊङ्] is used after @deva[पङ्गु] (lame). Example: @deva[पङ्गूः] (lame woman).
"""

standard = """
The word @deva[पङ्गु] takes @deva[ऊङ्] in the feminine: @deva[पङ्गूः]. @[vārtika]: @deva[श्वशुर] also takes @deva[ऊङ्] with elision of both @deva[उ] and final @deva[अ]: @deva[श्वशुर] → @deva[श्वश्रूः] (mother-in-law). This debars the @deva[पुंयोग]-@deva[ङीष्] of @ref[4.1.48].
"""

advanced = """
This @[sūtra] provides @deva[ऊङ्] for @deva[पङ्गु]: @deva[पङ्गूः]. @[vārtika]: @deva[श्वशुर] + @deva[ऊङ्] with @deva[उकारलोप] and @deva[अकारलोप] → @deva[श्वश्रूः] (mother-in-law). This debars @deva[पुंयोग]-@deva[ङीष्] (@ref[4.1.48]).
"""

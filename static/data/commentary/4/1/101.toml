id = "4.1.101"
numericId = "41101"

[en]
simple = """
The affix @deva[फक्] comes after stems ending in @deva[यञ्] or @deva[इञ्] to denote a descendant (as @deva[युवन्]). Examples: @deva[गार्ग्यायणः], @deva[दाक्षायणः].
"""

standard = """
After @deva[यञन्त] and @deva[इञन्त] stems, @deva[फक्] functions as a @deva[युवन्] affix (since added to @deva[गोत्र]-formed bases). @deva[गर्ग] + @deva[यञ्] (@ref[4.1.105]) = @deva[गार्ग्यः]; @deva[गार्ग्य] + @deva[फक्] = @deva[गार्ग्यायणः]. @deva[दक्ष] + @deva[इञ्] = @deva[दाक्षिः]; @deva[दाक्षि] + @deva[फक्] = @deva[दाक्षायणः]. Restriction: only @deva[गोत्र]-sense @deva[यञ्]/@deva[इञ्]—not @deva[द्वीप] + @deva[यञ्] (@ref[4.3.10]) → @deva[द्वैप्यः] (proximity to sea, not @deva[गोत्र]); not @deva[सौतंगमि] by @deva[इञ्] (@ref[4.2.80], @deva[चातुरर्थिक]).
"""

advanced = """
This @[sūtra] provides @deva[फक्] (with @deva[युवन्] force) after @deva[यञन्त]/@deva[इञन्त] @deva[गोत्र]-words. @deva[गार्ग्यायणः] (@deva[गर्ग] + @deva[यञ्] → @deva[गार्ग्य] + @deva[फक्]); @deva[दाक्षायणः] (@deva[दक्ष] + @deva[इञ्] → @deva[दाक्षि] + @deva[फक्]). The @deva[यञ्]/@deva[इञ्] must be @deva[गोत्रार्थ]—exclusions: @deva[द्वैप्यः] (@deva[यञ्] for @deva[समीपार्थ] @ref[4.3.10]); @deva[सौतंगमिः] (@deva[इञ्] for @deva[चातुरर्थिक] @ref[4.2.80]).
"""

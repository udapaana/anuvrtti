id = "4.1.34"
numericId = "41034"

[en]
simple = """
When @deva[पति] is preceded by another word (in a compound), the @deva[न्]-substitution is optional. Example: @deva[वृद्धपतिः] or @deva[वृद्धपत्नी] (woman with an old husband).
"""

standard = """
When @deva[पति] follows another word in a compound (and is not @deva[उपसर्जन]), the @deva[इ] → @deva[न्] substitution of @ref[4.1.33] becomes optional. Forms: @deva[वृद्धपतिः] or @deva[वृद्धपत्नी], @deva[स्थूलपतिः] or @deva[स्थूलपत्नी]. This is @deva[अप्राप्तविभाषा]—free from the @deva[यज्ञसंयोग] restriction of @ref[4.1.33]. Condition: @deva[पति] must be preceded by a word (@deva[सपूर्व]). Standalone @deva[पति]: @deva[पतिरियं ब्राह्मणी ग्रामस्य] (she is mistress—no @deva[न्]).
"""

advanced = """
This @[sūtra] establishes @deva[विभाषा] for @deva[न्]-substitution when @deva[पति] is compound-final (@deva[सपूर्व]) and not @deva[उपसर्जन]. Forms: @deva[वृद्धपतिः]/@deva[वृद्धपत्नी], @deva[स्थूलपतिः]/@deva[स्थूलपत्नी]. This is @deva[अप्राप्तविभाषा]—optionality without the @deva[यज्ञसंयोग] semantic restriction of @ref[4.1.33]. The @deva[सपूर्वस्य] condition: @deva[पति] must have a preceding element; standalone @deva[पति] → @deva[पतिरियं ब्राह्मणी ग्रामस्य] (no substitution).
"""

id = "4.1.15"
numericId = "41015"

[en]
simple = """
The feminine affix @deva[ङीप्] is used after stems ending in short @deva[अ] when the final affix has indicatory @deva[ट्], or is @deva[ढ], @deva[अण्], @deva[अञ्], @deva[द्वयसच्], @deva[दघ्नच्], @deva[मात्रच्], @deva[तयप्], @deva[ठक्], @deva[ठञ्], @deva[कञ्], or @deva[क्वरप्]. Example: @deva[कुरुचर] → @deva[कुरुचरी] (@deva[ट]-affix); @deva[कुम्भकार] → @deva[कुम्भकारी] (@deva[अण्]-affix).
"""

standard = """
This @[sūtra] lists affixes after which @deva[अकारान्त] stems take @deva[ङीप्] instead of @deva[टाप्]: (1) @deva[टित्] affixes (with indicatory @deva[ट्]): @deva[कुरुचर] (from @deva[ट] @ref[3.2.16]) → @deva[कुरुचरी]; (2) @deva[ढक्]: @deva[सौपर्णेय] → @deva[सौपर्णेयी]; (3) @deva[अण्] (@[kṛt] or taddhita): @deva[कुम्भकार] → @deva[कुम्भकारी], @deva[औपगव] → @deva[औपगवी]; (4) @deva[अञ्]: @deva[औत्स] → @deva[औत्सी]; (5) @deva[द्वयसच्/दघ्नच्/मात्रच्]: @deva[ऊरुद्वयसी], @deva[ऊरुदघ्नी], @deva[ऊरुमात्री]; (6) @deva[तयप्]: @deva[पञ्चतयी]; (7) @deva[ठक्/ठञ्]: @deva[आक्षिकी], @deva[लावणिकी]; (8) @deva[कञ्]: @deva[यादृशी]; (9) @deva[क्वरप्]: @deva[इत्वरी].
"""

advanced = """
This @[sūtra] enumerates affixes triggering @deva[ङीप्] for @deva[अकारान्त] stems, overriding @deva[टाप्] (@ref[4.1.4]). Analysis: (1) @deva[टित्]: @deva[ट]-indicatory affixes like @deva[ट] (@ref[3.2.16])—but not @deva[लट्] (two @deva[इत्]s: @deva[ल्], @deva[ट्]) or @[āgama] @deva[ट्] (@deva[तुट्] in @ref[4.3.23]). @deva[पचमान] (from @deva[शानच्], substitute of @deva[लट्]) → @deva[पचमाना] (not @deva[ङीप्]). (2) @deva[ढ] = @deva[ढक्] (no @deva[अनुबन्ध]-less @deva[ढ] exists for feminine). (3) @deva[अण्]: both @[kṛt] (@ref[3.2.1]) and taddhita. Sometimes @deva[ण] acts like @deva[अण्]: @deva[चौरी], @deva[तापसी]; sometimes not: @deva[दाण्डा], @deva[मौष्टा]. (4) @deva[अञ्]: re-specified to block @deva[ङीष्] from @ref[4.1.63] even for @deva[जाति]. @[vārtika]: also @deva[नञ्/स्नञ्] (@ref[4.1.87]), @deva[ईकक्] (@ref[4.4.59]), @deva[ख्युन्] (@ref[3.2.56]), @deva[तरुण/तलुन]: @deva[स्त्रैणी], @deva[पौंस्नी], @deva[शाक्तीकी], @deva[आढ्यंकरणी], @deva[तरुणी/तलुनी].
"""

id = "4.1.168"
numericId = "41168"

[en]
simple = """
After words denoting both a country and a @[kṣatriya] tribe, @deva[अञ्] is used for descendant meaning. Examples: @deva[पाञ्चालः], @deva[वैदेहः] (son/king of @[pañcāla]/Videha).
"""

standard = """
After words that denote both a @deva[जनपद] (country) and a @deva[क्षत्रिय] tribe, @deva[अञ्] is used: @deva[पाञ्चालः] (son of @[pañcāla]), @deva[ऐक्ष्वाकः], @deva[वैदेहः]. If the word denotes only @[kṣatriya] (not country), @deva[अण्] (not @deva[अञ्]) is used—the difference is in accent: @deva[द्रौह्यवः] (son of Druhya), @deva[पौरवः] (son of Puru). If a @[brāhmaṇa]: @deva[पाञ्चालिः], @deva[वैदेहिः] (@deva[इञ्] @ref[4.1.95]). @[vārtika]: same affix also denotes 'king thereof': @deva[पञ्चालानां राजा] = @deva[पाञ्चालः], @deva[वैदेहः]. Words like @deva[पञ्चाल] originally = @[kṣatriya] tribe names; secondarily = country (affix for 'country inhabited by' elided by @ref[4.2.81]). Country sense = plural (@deva[पञ्चालाः]); @[kṣatriya] sense = singular.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[जनपदशब्द क्षत्रियवाचिन्]: @deva[पाञ्चालः], @deva[ऐक्ष्वाकः], @deva[वैदेहः]. Non-@deva[जनपद] @[kṣatriya]: @deva[अण्] (@deva[द्रौह्यवः], @deva[पौरवः])—accent differs. @[brāhmaṇa]: @deva[पाञ्चालिः] (@deva[इञ्] @ref[4.1.95]). @[vārtika] @deva[तस्य राजनि]: @deva[पाञ्चालः] = king also. @deva[पञ्चाल] etc.: primarily @[kṣatriya] tribe; secondarily country (@ref[4.2.81] affix-@deva[लुक्]). Country = plural; @[kṣatriya] = singular.
"""

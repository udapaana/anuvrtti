id = "4.1.45"
numericId = "41045"

[en]
simple = """
After @deva[बहु] class words (including words ending in @deva[इ] that are body-part names or formed by @[kṛt] affixes other than @deva[क्तिन्]), @deva[ङीष्] is optionally used. Example: @deva[बहुः] or @deva[बह्वी]; @deva[रात्रिः] or @deva[रात्री].
"""

standard = """
The @deva[बह्वादि] class includes @deva[बहु] (already @deva[गुणवचन], but specified for subsequent @ref[4.1.46]) and many words ending in @deva[इ]. Two sub-rules: (1) @deva[इकारान्त] body-part names optionally take @deva[ङीष्]: @deva[धमनिः]/@deva[धमनी]; (2) @deva[इकारान्त] @[kṛt-affix-formed] words (except @deva[क्तिन्]) optionally take @deva[ङीष्]: @deva[रात्रिः]/@deva[रात्री]. Some say any @deva[इकारान्त] without @deva[क्तिन्]-sense qualifies. This is an @deva[आकृतिगण] (open class). Additional members: @deva[चण्ड], @deva[अराल], @deva[कृपण], etc.
"""

advanced = """
The @deva[बह्वादि] @[gaṇa] provides optional @deva[ङीष्] for listed words. Sub-rules from @[gaṇapāṭha]: (1) @deva[इतः प्राप्यङ्गात्]—@deva[इकारान्त] @deva[स्वाङ्ग]-names: @deva[धमनिः]/@deva[धमनी]; (2) @deva[कृदिकारादक्तिनः]—@deva[इकारान्त] @[kṛt] (not @deva[क्तिन्]): @deva[रात्रि] (from @deva[त्रिप्]) → @deva[रात्रिः]/@deva[रात्री]; (3) @deva[सर्वतोऽक्तिन्नर्थादित्येके]—some extend to all non-@deva[क्तिन्]-sense @deva[इकारान्त]. @deva[बहु] is @deva[गुणवचन] (would qualify by @ref[4.1.44]), but specified for @ref[4.1.46]'s Vedic @deva[नित्य]. This is @deva[आकृतिगण].
"""

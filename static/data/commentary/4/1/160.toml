id = "4.1.160"
numericId = "41160"

[en]
simple = """
According to Eastern Grammarians, after non-@deva[वृद्ध] words, @deva[फिञ्] is used diversely. Examples: @deva[ग्लुचुकायनिः] or @deva[ग्लौचुकिः].
"""

standard = """
According to @deva[प्राचाम्] (Eastern Grammarians), after @deva[अवृद्ध] (non-@deva[वृद्धि]-initial) words, @deva[फिञ्] is used @deva[बहुलम्] (diversely/irregularly): @deva[ग्लुचुकायनिः] or @deva[ग्लौचुकिः] (son of Gluchuka); @deva[अहिचुम्बकायनिः] or @deva[आहिचुम्बिः]. Condition: non-@deva[वृद्ध]—@deva[राजदन्तिः] (@deva[राजदन्त] has @deva[वृद्धि]). Both @deva[प्राचाम्] and @deva[बहुलम्] indicate optionality; @deva[प्राचाम्] shows respect, @deva[बहुलम्] indicates non-uniformity. In some cases @deva[फिञ्] doesn't apply: @deva[दाक्षिः], @deva[प्लाक्षिः].
"""

advanced = """
This @[sūtra] provides @deva[फिञ्] (@deva[प्राचाम्], @deva[बहुलम्]) for @deva[अवृद्ध] words: @deva[ग्लुचुकायनिः]/@deva[ग्लौचुकिः], @deva[अहिचुम्बकायनिः]/@deva[आहिचुम्बिः]. Exclusion: @deva[वृद्ध] → @deva[राजदन्तिः]. @deva[प्राचाम्] = respect; @deva[बहुलम्] = non-uniformity. Non-application: @deva[दाक्षिः], @deva[प्लाक्षिः].
"""

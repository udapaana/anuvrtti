id = "4.1.14"
numericId = "41014"

[en]
simple = """
The following rules (up to @ref[4.1.77]) only apply when the stem is the main element of a compound, not when it's a subordinate part (@deva[उपसर्जन]).
"""

standard = """
This @deva[अधिकार] governs through @ref[4.1.77], restricting feminine affixes to @deva[प्रधान] (principal) members of compounds, not @deva[उपसर्जन] (subordinate) members. In @deva[बहुव्रीहि] compounds where all members are @deva[उपसर्जन] (@ref[2.2.35]), rules like @ref[4.1.15] don't apply. Thus @deva[कुरुचरी] (feminine of @deva[कुरुचर] alone), but @deva[बहुकुरुचरा] @deva[मधुरा] (in @[bahuvrīhi], @deva[कुरुचर] is @deva[उपसर्जन]).
"""

advanced = """
This @deva[अधिकार] establishes @deva[नोपसर्जनम्]—the subsequent rules (@ref[4.1.15]-@ref[4.1.77]) don't apply when the target stem is @deva[उपसर्जन]. This implies @deva[तदन्तविधि] (@ref[1.1.72]) does apply for feminine affixes when the stem is @deva[प्रधान]. In @[bahuvrīhi] (all members @deva[उपसर्जन] by @ref[2.2.35]): @deva[बहुकुरुचरा], @deva[बहुकुक्कुटा], @deva[बहुशूकरा] (no @deva[ङीप्]). But @deva[तत्पुरुष] with @deva[प्रधान] final: @deva[कुम्भकारी], @deva[नगरकारी] (@deva[ङीप्] by @ref[4.1.15]). This @[jñāpaka] establishes that @deva[तदन्तविधि] applies for @[strī-pratyaya] when not @deva[उपसर्जन].
"""

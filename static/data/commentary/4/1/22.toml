id = "4.1.22"
numericId = "41022"

[en]
simple = """
@deva[ङीप्] is NOT used when a @deva[तद्धित] affix is dropped after a @deva[द्विगु] compound that doesn't end in a measurement word, or ends in @deva[बिस्त], @deva[आचित], or @deva[कम्बल्य]. Example: @deva[पञ्चाश्वा] (purchased for five horses), not @deva[पञ्चाश्वी].
"""

standard = """
When a @deva[तद्धित] affix is elided (@deva[लुक्]) after a @deva[द्विगु] compound, @deva[ङीप्] is blocked if: (1) the final word doesn't denote @deva[परिमाण] (measure), or (2) the final is @deva[बिस्त], @deva[आचित], or @deva[कम्बल्य] (which do denote measure). Thus @deva[पञ्चाश्वा] (purchased for five horses—@deva[ठञ्] @ref[5.1.37] elided by @ref[5.1.28]). Time/number words aren't @deva[परिमाण]: @deva[द्विवर्षा], @deva[त्रिशता]. @deva[बिस्त]-class: @deva[द्विबिस्ता], @deva[द्व्याचिता]. But @deva[परिमाण]-final words take @deva[ङीप्]: @deva[द्व्याढकी]. In @deva[समाहारद्विगु] (collective), @deva[ङीप्] applies: @deva[पञ्चाश्वी], @deva[दशाश्वी].
"""

advanced = """
This @[sūtra] prohibits @deva[ङीप्] for @deva[द्विगु] compounds with @deva[तद्धितलुक्] when: (1) final isn't @deva[परिमाणवाचक], or (2) final is @deva[बिस्त]/@deva[आचित]/@deva[कम्बल्य] (though these are @deva[परिमाण], they're exceptions). @deva[पञ्चाश्व] (@deva[ठञ्] by @ref[5.1.37], @deva[लुक्] by @ref[5.1.28]) → @deva[पञ्चाश्वा]. Distinction: @deva[संख्या] (number) and @deva[काल] (time) aren't @deva[परिमाण]: @deva[द्विवर्षा], @deva[त्रिशता]. @deva[बिस्त]-class treated specially: @deva[द्विबिस्ता], @deva[त्र्याचिता], @deva[द्विकम्बल्या]. Actual @deva[परिमाण]-finals take @deva[ङीप्]: @deva[द्व्याढकी] (@deva[आढक] = measure). @deva[समाहारद्विगु] (aggregate sense) still takes @deva[ङीप्]: @deva[पञ्चाश्वी], @deva[दशाश्वी].
"""

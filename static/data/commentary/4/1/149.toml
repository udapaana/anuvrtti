id = "4.1.149"
numericId = "41149"

[en]
simple = """
When contempt is intended, @deva[छ] (and @deva[ठक्]) comes after @deva[फिञन्त] stems denoting @deva[सौवीर गोत्र]. Examples: @deva[यामुन्दायनीयः], @deva[यामुन्दायनिकः].
"""

standard = """
When contempt is expressed, @deva[छ] and @deva[ठक्] apply after @deva[फिञन्त] stems denoting @deva[सौवीर गोत्र]-s. @[kārikā]: three @deva[तिकादि] words—@deva[यमुन्द], @deva[सुयामा], @deva[वार्ष्यायणि] (from @deva[वृष]). @deva[यामुन्दायनिः] (@deva[फिञ्] @ref[4.1.154]) → son with contempt = @deva[यामुन्दायनीयः] (@deva[छ]) or @deva[यामुन्दायनिकः] (@deva[ठक्]). Without contempt: @deva[यामुन्दायनि] + @deva[अण्] = @deva[यामुन्दायनिः] (affix elides by @ref[2.4.58]). @[non-sauvīra]: @deva[तैकायनिः] (no @deva[छ]). Note: @deva[फेः] means @deva[फिञ्] (not @deva[फिन्])—@deva[फिन्]-formed words lack @deva[वृद्धि] and wouldn't be @deva[वृद्ध].
"""

advanced = """
This @[sūtra] provides @deva[छ]/@deva[ठक्] for @deva[वृद्ध फिञन्त सौवीरगोत्र] in @deva[कुत्सार्थ]. @[kārikā]: @deva[यमुन्द], @deva[सुयामा], @deva[वार्ष्यायणि] (∈ @deva[तिकादि]). @deva[यामुन्दायनीयः] or @deva[यामुन्दायनिकः]. Non-contempt: @deva[यामुन्दायनिः] (@deva[अण्] + @ref[2.4.58] @deva[लुक्]). @[non-sauvīra]: @deva[तैकायनिः]. @deva[फेः] = @deva[फिञ्] (not @deva[फिन्])—@deva[फिन्]-words lack @deva[वृद्धि].
"""

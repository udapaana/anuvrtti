id = "4.1.71"
numericId = "41071"

[en]
simple = """
In Vedic texts, @deva[ऊङ्] is used after @deva[कद्रु] (tawny) and @deva[कमण्डलु] (water pot). Examples: @deva[कद्रूः], @deva[कमण्डलूः].
"""

standard = """
In @deva[छन्दस्], @deva[कद्रु] and @deva[कमण्डलु] take @deva[ऊङ्]. Vedic citations: @deva[कद्रूश्च वै सुपर्णी च], @deva[मास्म कमण्डलूं शूद्राय दद्यात्]. Outside Vedic: @deva[कद्रुः], @deva[कमण्डलुः] (short @deva[उ]). @[vārtika]: Also @deva[गुग्गुलु], @deva[मधु], @deva[जतु], @deva[पतयालु] take @deva[ऊङ्]: @deva[गुग्गुलूः], @deva[मधूः], @deva[जतूः], @deva[पतयालूः].
"""

advanced = """
In @deva[छन्दस्], @deva[कद्रु] and @deva[कमण्डलु] take @deva[ऊङ्]. Citations: @deva[कद्रूश्च वै सुपर्णी च], @deva[मास्म कमण्डलूं शूद्राय दद्यात्]. Non-Vedic: @deva[कद्रुः], @deva[कमण्डलुः]. @[vārtika]: @deva[गुग्गुलु]/@deva[मधु]/@deva[जतु]/@deva[पतयालु] also: @deva[गुग्गुलूः], @deva[मधूः], @deva[जतूः], @deva[पतयालूः].
"""

id = "4.1.51"
numericId = "41051"

[en]
simple = """
When a compound has an instrumental-case first member and ends in a @deva[क्त]-formed word, and the meaning conveys 'a little', @deva[ङीष्] is used. Example: @deva[अभ्रविलिप्ती] @deva[द्यौः] (sky slightly covered with clouds).
"""

standard = """
When a compound ends in a @deva[क्त]-participle, has an instrumental-sense first member (@deva[करणपूर्व]), and the whole expresses 'little quantity' (@deva[अल्पाख्या]), @deva[ङीष्] applies. Forms: @deva[अभ्रविलिप्ती द्यौः] (sky slightly cloud-covered), @deva[सूपविलिप्ती पात्री] (dish slightly soup-covered). The @deva[अल्पाख्यायाम्] qualifies the whole compound. Counter-example without 'little' sense: @deva[चन्दनानुलिप्ता ब्राह्मणी] (@[brāhmaṇī] covered with sandalwood—no @deva[ङीष्]).
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for @deva[करणपूर्व]-@deva[क्तान्त] compounds conveying @deva[अल्पार्थ]. The @deva[करणपूर्वात्] continues from @ref[4.1.50]. The @deva[क्त]-participle must have instrumental-case first member expressing 'slight amount'. @deva[अभ्रविलिप्ती द्यौः], @deva[सूपविलिप्ती पात्री]. The @deva[अल्पाख्यायाम्] condition: without diminutive sense → @deva[चन्दनानुलिप्ता ब्राह्मणी] (no @deva[ङीष्]).
"""

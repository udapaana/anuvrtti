id = "4.1.117"
numericId = "41117"

[en]
simple = """
The words @deva[विकर्ण], @deva[शुङ्ग], @deva[छगल] take @deva[अण्] when meaning @deva[वात्स], @deva[भारद्वाज], @deva[आत्रेय] respectively. Examples: @deva[वैकर्णः] = @deva[वात्सः], @deva[शौङ्गः] = @deva[भारद्वाजः].
"""

standard = """
Three words take @deva[अण्] with specific clan meanings: @deva[विकर्ण] → @deva[वैकर्णः] = @deva[वात्सः] (Vatsa descendant), otherwise @deva[वैकर्णिः] (by @deva[इञ्]); @deva[शुङ्ग] → @deva[शौङ्गः] = @deva[भारद्वाजः], otherwise @deva[शौङ्गिः]; @deva[छगल] → @deva[छागलः] = @deva[आत्रेयः], otherwise @deva[छागलिः]. Variant reading: @deva[शुङ्गा] (feminine) → @[non-bhāradvāja] form @deva[शौङ्गेयः] (by @deva[ढक्] @ref[4.1.120]).
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[विकर्ण]/@deva[शुङ्ग]/@deva[छगल] with clan-specific meanings: @deva[वैकर्णः] = @deva[वात्सः] (else @deva[वैकर्णिः]); @deva[शौङ्गः] = @deva[भारद्वाजः] (else @deva[शौङ्गिः]); @deva[छागलः] = @deva[आत्रेयः] (else @deva[छागलिः]). Variant @deva[शुङ्गा] (feminine): @[non-bhāradvāja] → @deva[शौङ्गेयः] (@deva[ढक्] @ref[4.1.120]).
"""

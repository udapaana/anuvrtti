id = "4.1.10"
numericId = "41010"

[en]
simple = """
No feminine affix is added after the numerals from 5 onwards (@deva[षट्] class) or after words like @deva[स्वसृ] (sister). These words remain the same in feminine. Example: @deva[पञ्च] @deva[ब्राह्मण्यः] (five Brahmin women).
"""

standard = """
Feminine affixes are prohibited after: (1) @deva[षट्]-@deva[संज्ञा] words (numerals from @deva[पञ्च] onwards, as defined in @ref[1.1.24]), and (2) @deva[स्वसृादि] words. These remain unchanged for feminine. @deva[षट्]: @deva[पञ्च], @deva[सप्त], @deva[नव], @deva[दश], etc. @deva[स्वसृादि]: @deva[स्वसृ] (sister), @deva[दुहितृ] (daughter), @deva[ननान्दृ] (husband's sister), @deva[यातृ] (brother's wife), @deva[मातृ] (mother), @deva[तिसृ] (three f.), @deva[चतसृ] (four f.).
"""

advanced = """
This @[sūtra] prohibits all @deva[स्त्रीप्रत्यय] after two categories: (1) @deva[षड्भ्यो लुक्] (@ref[1.1.24]): @deva[षट्]-designated numerals (@deva[पञ्च] and higher)—these are gender-invariant; (2) @deva[स्वसृादि]: @deva[स्वसृ], @deva[दुहितृ], @deva[ननान्दृ], @deva[यातृ], @deva[मातृ], @deva[तिसृ], @deva[चतसृ]—inherently feminine stems requiring no additional marking. This is universal prohibition (@deva[निषेध]), not optionality.
"""

id = "4.1.139"
numericId = "41139"

[en]
simple = """
After @deva[कुल] and compounds ending in @deva[कुल], @deva[ख] (= @deva[ईन]) is used for descendant meaning. Examples: @deva[कुलीनः], @deva[आढ्यकुलीनः], @deva[श्रोत्रियकुलीनः].
"""

standard = """
After @deva[कुल] and @deva[कुलान्त] compounds, @deva[ख] (= @deva[ईन]) is used: @deva[कुलीनः] (from good family), @deva[आढ्यकुलीनः] (from wealthy family), @deva[श्रोत्रियकुलीनः] (from learned family). The next @[sūtra] (@ref[4.1.140]) teaches @deva[यत्]/@deva[ढकञ्] for simple @deva[कुल]—this implies by @deva[ज्ञापक] that @deva[ख] applies to both simple @deva[कुल] and @deva[कुलान्त] compounds.
"""

advanced = """
This @[sūtra] provides @deva[ख] (= @deva[ईन]) for @deva[कुल] and @deva[कुलान्त] compounds: @deva[कुलीनः], @deva[आढ्यकुलीनः], @deva[श्रोत्रियकुलीनः]. @deva[ज्ञापक] from @ref[4.1.140]: @deva[यत्]/@deva[ढकञ्] for @deva[अपूर्वपद कुल] implies @deva[ख] here covers both simple and compound @deva[कुल].
"""

id = "4.1.147"
numericId = "41147"

[en]
simple = """
When contempt is intended, @deva[ण] (and @deva[ठक्]) comes after a feminine @deva[गोत्र] word for descendant meaning. Examples: @deva[गार्गः जाल्मः], @deva[गार्गिकः].
"""

standard = """
When contempt (@deva[कुत्सा]) is expressed, @deva[ण] is used after feminine @deva[गोत्र]-words, debarring normal affixes. The @deva[च] also permits @deva[ठक्]. When a person is identified through their mother (father unknown), it implies illegitimacy. @deva[गार्गी] (female @deva[गोत्र]-descendant) → son = @deva[गार्गः जाल्मः] (contemptuous) or @deva[गार्गिकः]. @deva[ग्लुचुकायनी] → @deva[ग्लौचुकायनः] or @deva[ग्लौचुकायनिकः]. This @deva[ण] has @deva[युवन्] force (added to @deva[गोत्र]-word). Conditions: (1) @deva[गोत्र]-descendant—not @deva[कारिकेयः] (@deva[ढक्] @ref[4.1.120]); (2) feminine—not @deva[औपगविः]; (3) contemptuous—not @deva[गार्गेयः माणवकः] (neutral @deva[युवन्]).
"""

advanced = """
This @[sūtra] provides @deva[ण] for feminine @deva[गोत्रशब्द] in @deva[कुत्सार्थ]; @deva[च] adds @deva[ठक्]: @deva[गार्गः जाल्मः], @deva[गार्गिकः]; @deva[ग्लौचुकायनः], @deva[ग्लौचुकायनिकः]. @deva[ण] has @deva[युवन्] force (post-@deva[गोत्र]). Exclusions: non-@deva[गोत्र] (@deva[कारिकेयः] @ref[4.1.120]); masculine (@deva[औपगविः]); non-contempt (@deva[गार्गेयो माणवकः]—@deva[मातामहोपलक्षणार्थ], not @deva[कुत्सा]).
"""

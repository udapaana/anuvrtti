id = "4.1.163"
numericId = "41163"

[en]
simple = """
When an ancestor (@deva[वंश्य]) is alive, the descendant of a @deva[गोत्र] is called @deva[युवन्] only. Example: @deva[गार्ग्यायणः] (@deva[युवन्] when Garga/@[gārgi] etc. is alive).
"""

standard = """
When a @deva[वंश्य] (lineal ancestor—father, grandfather, etc.) is alive, the descendant of a @deva[गोत्र] (grandson+) is called @deva[युवन्] (not @deva[गोत्र]). The phrase @deva[पौत्रप्रभृतेर्यदपत्यम्] means 'descendant of a grandson+'. @deva[युवन्] applies to at least the 4th generation from the propositus. @deva[गर्गः] → @deva[गार्गिः] (son) → @deva[गार्ग्यः] (@deva[गोत्र]) → @deva[गार्ग्यायणः] (@deva[युवन्], if Garga/@[gārgi]/@[gārgya] is alive). The @deva[तु] indicates: @deva[युवन्] only, not @deva[गोत्र] simultaneously.
"""

advanced = """
This @[sūtra] defines @deva[युवसंज्ञा]: when @deva[वंश्य] (lineal ancestor) is alive (@deva[जीवति]), @deva[पौत्रप्रभृतेरपत्यम्] = @deva[युवन्]. Parse: @deva[पौत्रप्रभृतेर् यद् अपत्यम्] (descendant of grandson+). @deva[युवन्] = 4th+ generation. @deva[गर्गः] → @deva[गार्गिः] (@deva[पुत्र]) → @deva[गार्ग्यः] (@deva[गोत्र]) → @deva[गार्ग्यायणः] (@deva[युवन्] if ancestor alive). @deva[तु] = @deva[युवन् एव], not @deva[गोत्र].
"""

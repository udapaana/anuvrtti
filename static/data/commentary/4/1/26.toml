id = "4.1.26"
numericId = "41026"

[en]
simple = """
After @deva[बहुव्रीहि] compounds ending in @deva[ऊधस्] that begin with a numeral or indeclinable, @deva[ङीप्] (not @deva[ङीष्]) is used. Example: @deva[द्व्यूध्नी] (having two udders), @deva[अत्यूध्नी] (many-uddered).
"""

standard = """
When @deva[ऊधसन्त]-@[bahuvrīhis] begin with @deva[संख्या] (numeral) or @deva[अव्यय] (indeclinable), @deva[ङीप्] applies (overriding @deva[ङीष्] of @ref[4.1.25]). Examples: @deva[द्व्यूध्नी], @deva[त्र्यूध्नी] (numeral-initial); @deva[अत्यूध्नी], @deva[निरूध्नी] (indeclinable-initial). The phrase 'beginning with' extends to compounds where the first element itself begins with a numeral: @deva[द्विविधोध्नी], @deva[त्रिविधोध्नी].
"""

advanced = """
This @[sūtra] specifies @deva[ङीप्] (not @deva[ङीष्]) for @deva[ऊधसन्त]-@[bahuvrīhis] with @deva[संख्या]/@deva[अव्यय] as first member. @deva[संख्यापूर्व]: @deva[द्व्यूध्नी], @deva[त्र्यूध्नी]. @deva[अव्ययपूर्व]: @deva[अत्यूध्नी], @deva[निरूध्नी]. The @deva[पूर्व] extends to compounds where the first element begins with @deva[संख्या]: @deva[द्विविधोध्नी], @deva[त्रिविधोध्नी] (@deva[द्विविध]/@deva[त्रिविध] begin with numerals though aren't themselves @deva[संख्या]).
"""

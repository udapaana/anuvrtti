id = "4.1.96"
numericId = "41096"

[en]
simple = """
The @deva[बहु] class words take @deva[इञ्] for descendant meaning. Example: @deva[बाहविः] (descendant of Bahu clan).
"""

standard = """
After @deva[बह्वादि] words, @deva[इञ्] applies even when @ref[4.1.95] conditions aren't met (non-short-@deva[अ] ending) or another rule would prohibit @deva[इञ्]. This is an @deva[आकृतिगण] (form-recognizable class). Forms: @deva[बाहविः]. List includes: @deva[बाहु], @deva[उपबाहु], @deva[वृषली], @deva[चूडा], @deva[बलाका], @deva[देवशर्मन्], @deva[अग्निशर्मन्], @deva[पञ्चन्], @deva[सप्तन्], @deva[अष्टन्], @deva[शिरस्], @deva[माष], @deva[मरीची], @deva[कृष्ण], @deva[युधिष्ठिर], @deva[अर्जुन], etc. @[vārtikas]: (1) @deva[बह्वादि] words must be proper names (clan founders)—private @deva[बाहु]'s son = @deva[बाहवः]; (2) relation-words (@deva[श्वशुर]) when proper names take @deva[इञ्] (@deva[श्वाशुरिः]), otherwise @deva[श्वशुर्यः].
"""

advanced = """
This @[sūtra] provides @deva[इञ्] for @deva[बह्वादि], an @deva[आकृतिगण]. These words either don't end in short @deva[अ] (excluding @ref[4.1.95]) or would be prohibited by another rule. @deva[बाहविः]. @[vārtikas]: (1) @deva[संज्ञाश्रयम्]—@deva[बह्वादि] must be proper names: @deva[बाहु] (clan) → @deva[बाहविः]; private person @deva[बाहु] → @deva[बाहवः]; (2) @deva[बन्धुनाम्नि]—relation-words as names: @deva[श्वशुर] (father-in-law) → @deva[श्वशुर्यः]; @deva[श्वशुर] (proper name) → @deva[श्वाशुरिः]. The @deva[च] indicates extended membership: @deva[जाम्बिः], @deva[ऐन्दशर्मिः], @deva[आजधेनविः].
"""

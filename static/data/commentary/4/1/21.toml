id = "4.1.21"
numericId = "41021"

[en]
simple = """
After a @deva[द्विगु] compound (numeral compound) ending in @deva[अ], the feminine affix @deva[ङीप्] is used. Example: @deva[दशपूली], @deva[पञ्चपूली]. But @deva[त्रिफला] uses @deva[टाप्] because it's in the @deva[अजादि] class.
"""

standard = """
@deva[द्विगु] (numeral determinative) compounds ending in @deva[अ] take @deva[ङीप्] in the feminine. Examples: @deva[दशपूली] (ten bundles), @deva[पञ्चपूली]. Exception: @deva[त्रिफला] (three myrobalans) takes @deva[टाप्] because it's listed in @deva[अजादि] (@ref[4.1.4]).
"""

advanced = """
This @[sūtra] assigns @deva[ङीप्] to @deva[अकारान्त] @deva[द्विगु] compounds. The @deva[द्विगु] is a @deva[तत्पुरुष] subtype with a numeral as first member (@ref[2.1.51]-@ref[2.1.52]). Examples: @deva[दशपूली], @deva[पञ्चपूली]. Exception by @ref[4.1.4]: @deva[त्रिफला] (in @deva[अजादि] list) takes @deva[टाप्]. Note: @deva[त्रिफला] as @deva[द्विगु] = @deva[टाप्]; as @deva[बहुव्रीहि] = @deva[ङीप्] (@deva[त्रिफली]).
"""

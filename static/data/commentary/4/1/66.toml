id = "4.1.66"
numericId = "41066"

[en]
simple = """
After short-@deva[उ]-ending words denoting races of men (without @deva[य्] penultimate), the feminine affix is @deva[ऊङ्]. Examples: @deva[कुरूः] (Kuru woman), @deva[ब्रह्मबन्धूः], @deva[जीवबन्धूः].
"""

standard = """
After @deva[मनुष्यजाति]-denoting stems ending in short @deva[उ] without @deva[य्]-penultimate, the feminine affix is @deva[ऊङ्] (long @deva[ऊ]). Forms: @deva[कुरूः], @deva[ब्रह्मबन्धूः], @deva[जीवबन्धूः]. Derivation: @deva[कुरु] + @deva[ण्य] (@ref[4.1.172]) → @deva[कौरव्यः]; feminine by @ref[4.1.176] elision → @deva[कुरु] + @deva[ऊङ्] → @deva[कुरूः]. The @deva[ङ्] in @deva[ऊङ्] distinguishes it in @[sūtras] like @ref[6.1.175] @deva[नोङ् धात्वोः]. Long @deva[ऊ] debars @deva[कप्] (@ref[5.4.154]) by @deva[विप्रतिषेध]. Why not @deva[य्]-penultimate? @deva[अध्वर्युर्ब्राह्मणी] (not @deva[ऊङ्]). @[vārtika]: @deva[ऊङ्] also for non-animate @deva[जाति] except @deva[रज्ज्वादि]: @deva[अलाबूः], @deva[कर्कन्धूः]; not @deva[कृकवाकुः] (animate); not @deva[रज्जुः], @deva[हनुः].
"""

advanced = """
This @[sūtra] provides @deva[ऊङ्] for @deva[मनुष्यजाति]-denoting short-@deva[उ]-final @deva[अयोपध] stems. @deva[कुरूः], @deva[ब्रह्मबन्धूः], @deva[जीवबन्धूः]. Derivation: @deva[कुरु] + @deva[ण्य] → elision by @ref[4.1.176]. The @deva[ङ्] in @deva[ऊङ्] enables reference in @ref[6.1.175] @deva[नोङ् धात्वोः]. Long @deva[ऊ] debars @deva[कप्] (@ref[5.4.154]) by @deva[विप्रतिषेध]. Exclusion: @deva[अध्वर्यु]-class (@deva[य्]-penultimate) → @deva[अध्वर्युर्ब्राह्मणी]. @[vārtika]: @deva[अजातौ] (non-animate @deva[जाति]) except @deva[रज्ज्वादि]: @deva[अलाबूः] (gourd), @deva[कर्कन्धूः] (jujube); excluded: @deva[कृकवाकुः] (animate—lizard), @deva[रज्जुः], @deva[हनुः].
"""

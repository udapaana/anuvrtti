id = "4.1.16"
numericId = "41016"

[en]
simple = """
After stems ending in the affix @deva[यञ्] (from @ref[4.1.105]), the feminine affix @deva[ङीप्] is used. Example: @deva[गार्ग्य] → @deva[गार्गी] (female descendant of Garga); @deva[वात्स्य] → @deva[वात्सी].
"""

standard = """
Stems formed by @deva[यञ्] (@ref[4.1.105], @deva[गर्गादि] class) take @deva[ङीप्] in the feminine. The process: @deva[गार्ग्य] + @deva[ङीप्] → @deva[गार्ग्य] + @deva[ई] (@ref[6.4.148]) → @deva[गार्ग्] + @deva[ई] (@ref[6.4.150]) = @deva[गार्गी]. Similarly @deva[वात्सी]. @[vārtika]: This applies only when @deva[यञ्] denotes descent (@deva[अपत्य])—not otherwise. Hence @deva[द्वैप्य] (from @deva[द्वीप] + @deva[यञ्] @ref[4.3.10], meaning 'relating to an island') → @deva[द्वैप्या] (not @deva[द्वैप्यी]). This @[sūtra] is separated from @ref[4.1.15] to establish @deva[यञ्] @[anuvṛtti] for subsequent rules.
"""

advanced = """
This @[sūtra] provides @deva[ङीप्] for @deva[यञन्त] stems (from @ref[4.1.105] @deva[गर्गादि] class). Derivation: @deva[गार्ग्य] + @deva[ङीप्] → @deva[ई] replaces @deva[य] by @ref[6.4.148] → @deva[य्] + @deva[ई] by @ref[6.4.150] (@deva[य्]-lopa) = @deva[गार्गी]. @[vārtika]: @deva[अपत्येऽयं विधिः]—applies only for @deva[अपत्यार्थ], not other @deva[यञ्] usages. Thus @deva[द्वैप्य] (@ref[4.3.10], 'island-related') → @deva[द्वैप्या]. The separation from @ref[4.1.15] establishes @deva[यञ्]-@[anuvṛtti] for @ref[4.1.17]-@ref[4.1.19], excluding other @ref[4.1.15] affixes.
"""

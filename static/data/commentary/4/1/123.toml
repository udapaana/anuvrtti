id = "4.1.123"
numericId = "41123"

[en]
simple = """
The @deva[शुभ्र] class words take @deva[ढक्] for descendant meaning. This is an @deva[आकृतिगण] (expandable class). Example: @deva[शौभ्रेयः], @deva[गाङ्गेयः], @deva[पाण्डवेयः].
"""

standard = """
After @deva[शुभ्रादि] words, @deva[ढक्] is used, debarring @deva[इञ्] and other affixes. The @deva[च] indicates this is an @deva[आकृतिगण]—words like @deva[गङ्गा], @deva[पाण्डव] (not in the list) also take @deva[ढक्]: @deva[गाङ्गेयः], @deva[पाण्डवेयः]. @deva[शुभ्र] + @deva[ढक्] = @deva[शौभ्रेयः]. Special: @deva[लक्ष्मण], @deva[श्याम] take @deva[ढक्] only when meaning @deva[वासिष्ठ] descendants. The 93-word list includes @deva[शुभ्र], @deva[विष्टपुर], @deva[रोहिणी], @deva[रुक्मिणी], @deva[विधवा], @deva[शकुनि], @deva[उग्र], @deva[बन्धकी], @deva[अतिथि], @deva[गोधा], @deva[भरत], @deva[मृकण्डु], @deva[कद्रु], @deva[अम्बिका], @deva[श्वन्], @deva[अश्व], etc.
"""

advanced = """
This @[sūtra] provides @deva[ढक्] for @deva[शुभ्रादि], an @deva[आकृतिगण] (indicated by @deva[च]). Debars @deva[इञ्] etc. @deva[शौभ्रेयः]. Extended: @deva[गाङ्गेयः], @deva[पाण्डवेयः]. Condition: @deva[लक्ष्मणश्यामयोर्वासिष्ठे]—@deva[ढक्] only for @[vāsiṣṭha] context. 93 words: @deva[शुभ्र], @deva[विष्टपुर], @deva[ब्रह्मकृत], @deva[शतद्वार], @deva[रोहिणी], @deva[रुक्मिणी], @deva[धर्मिणी], @deva[दिश्], @deva[शालूक], @deva[अजवस्ति], @deva[शकंधि], @deva[विमातृ], @deva[विधवा], @deva[शुक], @deva[विश], @deva[देवतर], @deva[शकुनि], @deva[शुक्र], @deva[उग्र], @deva[बन्धकी], @deva[सृकण्डु], @deva[अतिथि], @deva[गोदन्त], @deva[कुशाम्ब], @deva[सुनामन्], @deva[गोधा], @deva[कृकलास], @deva[अणीब], @deva[प्रवाहण], @deva[भरत], @deva[मृकण्डु], @deva[कर्पूर], @deva[कद्रु], @deva[अम्बिका], @deva[परिधि], @deva[वायुदत्त], @deva[श्वन्], @deva[अश्मन्], @deva[अश्व], @deva[अजिर], @deva[अजिन], etc.
"""

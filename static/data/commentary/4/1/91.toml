id = "4.1.91"
numericId = "41091"

[en]
simple = """
The @deva[युवन्] affixes @deva[फक्] and @deva[फिञ्] are optionally elided when a vowel-initial @deva[प्राग्दीव्यतीय] affix follows. Example: @deva[गार्गीयाः] or @deva[गार्ग्यायणीयाः] (disciples of @[gārgya]).
"""

standard = """
By @ref[4.1.90], all @deva[युवन्] affixes are elided before vowel-initial @deva[प्राग्दीव्यतीय] affixes. This @[sūtra] makes that elision optional for @deva[फक्] and @deva[फिञ्]. Thus @deva[गार्ग्य] (@deva[गोत्र] by @deva[यञ्] @ref[4.1.105]) → @deva[गार्ग्यायणः] (@deva[युवन्] by @deva[फक्] @ref[4.1.101]) → disciples: @deva[गार्गीयाः] (@deva[फक्] elided) or @deva[गार्ग्यायणीयाः] (@deva[फक्] retained). Similarly: @deva[वात्सीयाः] or @deva[वात्स्यायनीयाः]; @deva[यास्कीयाः] or @deva[यास्कायनीयाः] (from @deva[यास्कायनि] @deva[युवन्] by @deva[फिञ्] @ref[4.1.146]).
"""

advanced = """
This @[sūtra] makes @deva[युवन्]-@deva[लुक्] optional for @deva[फक्] and @deva[फिञ्] (obligatory for other @deva[युवन्] affixes by @ref[4.1.90]). @deva[गार्ग्यायणः] (@deva[युवन्]) → disciples: @deva[गार्गीयाः] (elision) or @deva[गार्ग्यायणीयाः] (retention). @deva[फिञ्] example: @deva[यास्क] → @deva[यास्कः] (@ref[4.1.112]) → @deva[यास्कायनि] (@deva[युवन्] @ref[4.1.146]) → disciples: @deva[यास्कीयाः] or @deva[यास्कायनीयाः].
"""

id = "4.1.142"
numericId = "41142"

[en]
simple = """
After @deva[दुष्कुल], @deva[ढक्] optionally applies. Examples: @deva[दौष्कुलेयः], @deva[दुष्कुलीनः].
"""

standard = """
After @deva[दुष्कुल] (bad family), @deva[ढक्] is optional: @deva[दौष्कुलेयः] (by @deva[ढक्]). The word 'optionally' permits @deva[ख] (@ref[4.1.139]): @deva[दुष्कुलीनः].
"""

advanced = """
This @[sūtra] makes @deva[ढक्] optional for @deva[दुष्कुल]: @deva[दौष्कुलेयः]. @deva[विभाषा] permits @deva[ख] (@ref[4.1.139]): @deva[दुष्कुलीनः].
"""

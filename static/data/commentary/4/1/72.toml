id = "4.1.72"
numericId = "41072"

[en]
simple = """
The affix @deva[ऊङ्] is used after @deva[कद्रु] and @deva[कमण्डलु] when they are proper names (in non-Vedic usage). Examples: @deva[कद्रूः] (@[kadrū]—wife of @[kaśyapa]), @deva[कमण्डलूः].
"""

standard = """
In non-Vedic usage, @deva[कद्रु] and @deva[कमण्डलु] take @deva[ऊङ्] when denoting proper names (@deva[संज्ञा]). Thus @deva[कद्रूः] (the wife of @[kaśyapa] named @[kadrū]), @deva[कमण्डलूः] (a name). When not a name: @deva[कद्रूः] (tawny color), @deva[कमण्डलुः] (a water-gourd)—these are common nouns.
"""

advanced = """
In @deva[लोक] (non-Vedic), @deva[कद्रु]/@deva[कमण्डलु] take @deva[ऊङ्] only when @deva[संज्ञा]: @deva[कद्रूः] (@[kaśyapa]'s wife), @deva[कमण्डलूः] (name). Non-@deva[संज्ञा]: @deva[कद्रूः] (color), @deva[कमण्डलुः] (pot)—common nouns without @deva[ऊङ्].
"""

id = "4.1.171"
numericId = "41171"

[en]
simple = """
After @deva[वृद्ध] words, @deva[इकारान्त] words, and @deva[कोसल]/@deva[अजाद] (when @[country-kṣatriya]), @deva[ञ्यङ्] is used. Examples: @deva[आम्बष्ठ्यः], @deva[सौवीर्यः], @deva[आवन्त्यः], @deva[कौसल्यः].
"""

standard = """
After @deva[वृद्ध] (@deva[वृद्धि]-initial) words, @deva[इकारान्त] (short-@deva[इ]-final) words, and @deva[कोसल]/@deva[अजाद] (when denoting @[country-kṣatriya]), @deva[ञ्यङ्] (not @deva[अञ्]) is used: @deva[वृद्ध] examples: @deva[आम्बष्ठ्यः], @deva[सौवीर्यः] (sons/kings of @[āmbaṣṭha], @[sauvīra]); @deva[इकारान्त] examples: @deva[आवन्त्यः], @deva[कौन्त्यः] (sons/kings of Avanti, Kunti); neither @deva[वृद्ध] nor @deva[इकारान्त]: @deva[कौसल्यः], @deva[आजाद्यः]. @[vārtika]: @deva[पाण्डु] (@[country-kṣatriya]) takes @deva[ढ्यण्]: @deva[पाण्ड्यः]; otherwise @deva[पाण्डवः] (@ref[4.1.74]).
"""

advanced = """
This @[sūtra] provides @deva[ञ्यङ्] (debarring @deva[अञ्]) for @deva[वृद्ध]/@deva[इकारान्त]/@deva[कोसल]/@deva[अजाद] @deva[जनपद]-@deva[क्षत्रिय]: @deva[आम्बष्ठ्यः], @deva[सौवीर्यः]; @deva[आवन्त्यः], @deva[कौन्त्यः]; @deva[कौसल्यः], @deva[आजाद्यः]. @[vārtika]: @deva[पाण्डु] + @deva[ढ्यण्] = @deva[पाण्ड्यः] (@deva[जनपद]-@deva[क्षत्रिय]); else @deva[पाण्डवः] (@ref[4.1.74]).
"""

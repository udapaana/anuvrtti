id = "4.1.23"
numericId = "41023"

[en]
simple = """
@deva[ङीप्] is NOT used after a @deva[द्विगु] compound ending in @deva[काण्ड] when the @deva[तद्धित] is dropped AND it refers to field measurement. Example: @deva[द्विकाण्डा] @deva[क्षेत्रभक्तिः] (a field division of two @[kāṇḍas]). But for a rope: @deva[द्विकाण्डी] @deva[रज्जुः].
"""

standard = """
When @deva[द्विगु] compounds end in @deva[काण्ड] with @deva[तद्धितलुक्] (elided by @[vārtika] @deva[प्रमाणे लुक् द्विगोर्नित्यम्] under @ref[5.2.37]) and refer to superficial land measure (@deva[क्षेत्र]), @deva[ङीप्] is blocked. Thus @deva[द्विकाण्डा क्षेत्रभक्तिः], @deva[त्रिकाण्डा क्षेत्रभक्तिः]. But for linear measure (rope): @deva[द्विकाण्डी रज्जुः], @deva[त्रिकाण्डी रज्जुः]. This @[sūtra] regulates @ref[4.1.22]'s prohibition.
"""

advanced = """
This @deva[नियम] @[sūtra] restricts @ref[4.1.22]: the @deva[ङीप्]-prohibition for @deva[काण्डान्त]-@deva[द्विगु] applies only when @deva[क्षेत्र] (field/land measure) is meant. @deva[काण्ड] is @deva[अपरिमाणवाचक], so @ref[4.1.22] would universally block @deva[ङीप्]; this @[sūtra] limits that to land measure contexts. Field: @deva[द्विकाण्डा क्षेत्रभक्तिः]. Non-field (linear, like rope): @deva[द्विकाण्डी रज्जुः], @deva[त्रिकाण्डी रज्जुः] (@deva[ङीप्] applies).
"""

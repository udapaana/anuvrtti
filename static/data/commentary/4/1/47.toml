id = "4.1.47"
numericId = "41047"

[en]
simple = """
In Vedic texts, stems ending in @deva[भु] (bhu, short @deva[उ]) — such as @deva[विभु] (vibhu, "pervading"), @deva[प्रभु] (prabhu, "powerful") — always take the feminine affix @deva[ङीष्] (ṅīṣ). This produces forms like @deva[विभ्वी] (vibhvī), @deva[प्रभ्वी] (prabhvī), @deva[सुभ्वी] (subhvī), and @deva[शम्भ्वी] (śambhvī). Note that @deva[स्वयंभू] (svayambhū), which ends in long @deva[ऊ], is excluded — this rule only covers short-@deva[उ] finals.
"""

standard = """
In @deva[छन्दस्], stems ending in @deva[भु] (short @deva[उ]) obligatorily take @deva[ङीष्]. The @deva[नित्यम्] (obligatorily) carries forward from @ref[4.1.46]. Examples: @deva[विभ्वी], @deva[प्रभ्वी], @deva[सुभ्वी], @deva[शम्भ्वी]. The restriction to short @deva[उ] comes from the @[anuvṛtti] of @deva[उतः] from @ref[4.1.44], which excludes long-@deva[ऊ] stems like @deva[स्वयंभू]. The sūtra-form @deva[भुवः] (ablative of @deva[भु]) is irregular — it shows @deva[उवङ्]-substitution, a formation specific to this grammatical context rather than a general phonological rule.
"""

advanced = """
In @deva[छन्दस्], @deva[भ्वन्त] (short-@deva[उ]) stems take @deva[ङीष्] obligatorily. The @deva[नित्यम्] from @ref[4.1.46] carries over — this is the primary purpose of stating @deva[नित्य] in that rule. Forms: @deva[विभ्वी], @deva[प्रभ्वी], @deva[सुभ्वी], @deva[शम्भ्वी]. The @[anuvṛtti] of @deva[उतः] from @ref[4.1.44] restricts the domain to short @deva[उ], excluding @deva[स्वयंभू] (long @deva[ऊ]). The @[sūtra]-form @deva[भुवः] exhibits irregular @deva[उवङ्]-substitution in the ablative — a @[sūtra]-specific formation not derivable by general rules of @deva[उ]-stem declension.
"""

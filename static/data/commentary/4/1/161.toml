id = "4.1.161"
numericId = "41161"

[en]
simple = """
After @deva[मनु], @deva[अञ्] and @deva[यत्] apply with augment @deva[षुक्], when the meaning is @deva[जाति] (class/mankind). Examples: @deva[मानुषः], @deva[मनुष्यः] (mankind). Descendant = @deva[मानवः].
"""

standard = """
After @deva[मनु], @deva[अञ्] and @deva[यत्] apply with augment @deva[षुक्] when the result denotes @deva[जाति] (class/species): @deva[मनु] + @deva[षुक्] + @deva[अञ्] = @deva[मानुषः] (mankind); @deva[मनु] + @deva[षुक्] + @deva[यत्] = @deva[मनुष्यः]. These are not patronymics, so not elided in plural: @deva[मानुषाः] (men). For actual descendant, @deva[अण्] applies: @deva[मानवः] (son of Manu), as in @deva[मानवी प्रजा]. @[kārikā]: @deva[माणवः] (with @deva[न] → @deva[ण]) implies contempt or dullness.
"""

advanced = """
This @[sūtra] provides @deva[अञ्]/@deva[यत्] with @deva[षुक्]-@deva[आगम] for @deva[मनु] in @deva[जात्यर्थ]: @deva[मानुषः], @deva[मनुष्यः]. Not patronymic → no plural @deva[लुक्]: @deva[मानुषाः]. Descendant = @deva[मानवः] (@deva[अण्] @ref[4.1.83]): @deva[मानवी प्रजा]. @[kārikā]: @deva[अपत्ये कुत्सिते मूढे मनोरौत्सर्गिकः स्मृतः। नकारस्य च मूर्धन्यस्तेन सिद्ध्यति माणवः॥]—@deva[माणवः] (@deva[न] → @deva[ण]) = contempt/dullness.
"""

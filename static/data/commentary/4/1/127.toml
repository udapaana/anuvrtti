id = "4.1.127"
numericId = "41127"

[en]
simple = """
After @deva[कुलटा] (unchaste woman), @deva[ढक्] is used with optional @deva[इनङ्] substitution. Examples: @deva[कौलटिनेयः] or @deva[कौलटेयः].
"""

standard = """
After @deva[कुलटा] (etymology: @deva[कुल] + @deva[अटति]—one who wanders from family to family, i.e., unchaste woman), @deva[ढक्] applies with optional @deva[इनङ्]: @deva[कुलटा] → @deva[कौलटिनेयः] (with @deva[इनङ्]) or @deva[कौलटेयः] (without). Since @deva[कुलटा] denotes contempt, it also takes @deva[ढ्रक्] by @ref[4.1.131]: @deva[कौलटेरः].
"""

advanced = """
This @[sūtra] makes @deva[इनङ्] optional before @deva[ढक्] for @deva[कुलटा] (already takes @deva[ढक्] by @ref[4.1.120]): @deva[कौलटिनेयः] (@deva[इनङ्]) or @deva[कौलटेयः]. Being @deva[कुत्सित], @deva[कुलटा] also takes @deva[ढ्रक्] @ref[4.1.131]: @deva[कौलटेरः].
"""

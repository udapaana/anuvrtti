id = "4.1.148"
numericId = "41148"

[en]
simple = """
When contempt is intended, @deva[ठक्] is added (diversely) after @deva[वृद्ध] words denoting @deva[सौवीर] gotra. Examples: @deva[भागवित्तिकः], @deva[तार्णबिन्दविकः].
"""

standard = """
When contempt is expressed, @deva[ठक्] applies (diversely/optionally) after @deva[वृद्ध]-words denoting @deva[सौवीर गोत्र]-s. @[kārikā] names three words: @deva[भागवित्ति], @deva[तार्णबिन्दव], @deva[आकशापेय]. @deva[भागवित्तिकः] (son of @[bhāgavitti]); @deva[तार्णबिन्दविकः] (@deva[तृणबिन्दु] + @deva[अण्] → @deva[तार्णबिन्दवः], then + @deva[ठक्]). Alternative: @deva[फक्] (@ref[4.1.101]) gives @deva[भागवित्तायनः], @deva[तार्णबिन्दविः]. @deva[आकशापेयः] (from @deva[अकशाप] ∈ @deva[शुभ्रादि] @ref[4.1.123]) → son = @deva[आकशापेयिकः] or @deva[आकशापेयिः]. Without contempt: only @deva[भागवित्तायनः]. The word @deva[वृद्ध] stops @deva[स्त्रियाः] @deva[anuवृत्ति] from @ref[4.1.147]. The @deva[बहुल] indicates anomalous application across @ref[4.1.147]-@ref[4.1.150].
"""

advanced = """
This @[sūtra] provides @deva[ठक्] (@deva[बहुलम्]) for @deva[वृद्ध सौवीरगोत्र] words in @deva[कुत्सार्थ]. @[kārikā]: @deva[भागवित्ति], @deva[तार्णबिन्दव], @deva[आकशापेय] (3 words). @deva[भागवित्तिकः]; @deva[तार्णबिन्दविकः]; @deva[आकशापेयिकः]/@deva[आकशापेयिः]. Alternative @deva[फक्] @ref[4.1.101]: @deva[भागवित्तायनः]. @deva[वृद्ध] blocks @deva[स्त्रियाः] @deva[anuवृत्ति]. @deva[बहुल] = anomalous: @ref[4.1.147] (@deva[कुत्सा] only), @ref[4.1.150] (@deva[सौवीर] only), @ref[4.1.148]-@ref[4.1.149] (both).
"""

id = "4.1.19"
numericId = "41019"

[en]
simple = """
The affix @deva[ष्फ] is added after @deva[कौरव्य] and @deva[माण्डूक] to form feminines. Example: @deva[कौरव्यायणी], @deva[माण्डूकायनी].
"""

standard = """
Two specific words take @deva[ष्फ] in the feminine: @deva[कौरव्य] (from @deva[कुरु] + @deva[ण्य] @ref[4.1.151])—which would otherwise take @deva[टाप्] (@ref[4.1.4])—and @deva[माण्डूक] (from @deva[मण्डूक] + @deva[अण्] @ref[4.1.119])—which would take @deva[ङीप्] (@ref[4.1.15]). Forms: @deva[कौरव्यायणी], @deva[माण्डूकायनी]. Note: @deva[कौरवी सेना] uses @deva[कौरव] (from @deva[कुरु] + @deva[अण्] @ref[4.3.120]), not @deva[कौरव्य]. @[vārtika]: @deva[आसुरि] should be included: @deva[आसुरायणी].
"""

advanced = """
This @[sūtra] specifies @deva[ष्फ] for @deva[कौरव्य] and @deva[माण्डूक]. Analysis: @deva[कौरव्य] (@deva[कुरु] + @deva[ण्य], @ref[4.1.151]) ends in @deva[अ], would take @deva[टाप्] by @ref[4.1.4]; @deva[माण्डूक] (@deva[मण्डूक] + @deva[अण्], @ref[4.1.119]) would take @deva[ङीप्] by @ref[4.1.15]. Both now take @deva[ष्फ]: @deva[कौरव्यायणी], @deva[माण्डूकायनी]. Distinction: @deva[कौरवी] (in @deva[कौरवी सेना]) derives from @deva[कौरव] (@ref[4.3.120]), not @deva[कौरव्य]. @[vārtika]: @deva[आसुरि] (@deva[असुर] + @deva[इञ्]) joins this list: @deva[आसुरायणी]. Per @[patañjali], @deva[आसुरि]'s @deva[शैषिक] derivative uses @deva[छ] (@ref[4.2.114]): @deva[आसुरीयः कल्पः].
"""

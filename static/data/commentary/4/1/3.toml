id = "4.1.3"
numericId = "41003"

[en]
simple = """
When we want to show that something is feminine, we use the affixes taught in the following rules (up to @[sūtra] 81).
"""

standard = """
This @deva[अधिकार] @[sūtra] introduces the domain of feminine affixes (@deva[स्त्रीप्रत्यय]), governing rules through @ref[4.1.81]. The @[anuvṛtti] of @deva[प्रातिपदिकात्] from @ref[4.1.1] applies here, but not @deva[ङ्याप्]—since we are now teaching how to form @deva[ङी] and @deva[आप्] stems themselves.
"""

advanced = """
This @deva[अधिकार] establishes @deva[स्त्रियाम्] (for denoting feminine) as the governing condition for @ref[4.1.4]-@ref[4.1.81]. The @[anuvṛtti] of @deva[प्रातिपदिकात्] continues from @ref[4.1.1], but @deva[ङ्याप्] does not—we're defining how to create @deva[ङी]/@deva[आप्] forms. This domain covers: @deva[टाप्] (@ref[4.1.4]), @deva[ङीप्] (@ref[4.1.5]), @deva[ङीष्] (@ref[4.1.40]), @deva[ङीन्] (@ref[4.1.73]), @deva[डाप्] (@ref[4.1.13]), @deva[चाप्] (@ref[4.1.73]).
"""

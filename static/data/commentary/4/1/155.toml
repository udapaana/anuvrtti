id = "4.1.155"
numericId = "41155"

[en]
simple = """
After @deva[कौसल्य] and @deva[कार्मार्य], @deva[फिञ्] is used (debarring @deva[इञ्]). Examples: @deva[कौसल्यायनिः], @deva[कार्मार्यायणिः]. These mean 'son of Kosala/@[karmāra]' (not Kausalya/@[kārmārya]).
"""

standard = """
After @deva[कौसल्य] and @deva[कार्मार्य], @deva[फिञ्] (not @deva[इञ्]) is used: @deva[कौसल्यायनिः], @deva[कार्मार्यायणिः]. Important: these mean 'son of @deva[कोसल]/@deva[कर्मार]', not 'son of @deva[कौसल्य]/@deva[कार्मार्य]'. @[vārtika]: @deva[दगु], @deva[कोसल], @deva[कर्मार], @deva[छाग], @deva[वृष] take augment @deva[युट्] before @deva[फिञ्]: @deva[दागव्यायनिः], @deva[कौसल्यायनिः], @deva[कार्मार्यायणिः], @deva[छाग्यायनिः], @deva[वार्ष्यायणिः].
"""

advanced = """
This @[sūtra] provides @deva[फिञ्] (debarring @deva[इञ्]) for @deva[कौसल्य]/@deva[कार्मार्य]: @deva[कौसल्यायनिः], @deva[कार्मार्यायणिः]. Semantics: 'son of @deva[कोसल]/@deva[कर्मार]' (not Kausalya/@[kārmārya]). @[vārtika]: @deva[युट्]-@deva[आगम] before @deva[फिञ्] for @deva[दगु], @deva[कोसल], @deva[कर्मार], @deva[छाग], @deva[वृष]: @deva[दागव्यायनिः], @deva[कौसल्यायनिः], @deva[कार्मार्यायणिः], @deva[छाग्यायनिः], @deva[वार्ष्यायणिः].
"""

id = "4.1.137"
numericId = "41137"

[en]
simple = """
After @deva[राजन्] and @deva[श्वशुर], @deva[यत्] is used for descendant meaning. @deva[राजन्यः] means '@[kṣatriya] class' (not 'son of a king'). @deva[श्वशुर्यः] means 'son of father-in-law'.
"""

standard = """
After @deva[राजन्] and @deva[श्वशुर], @deva[यत्] (not @deva[अण्]/@deva[अञ्]) is used. @deva[राजन्यः] means 'a @[kṣatriya]' (class designation, not 'son of a king'—that would be @deva[राजनः]). @deva[श्वशुर] + @deva[यत्] = @deva[श्वशुर्यः] ('son of father-in-law'). The affix @deva[यत्] is specifically for class/relationship designation here.
"""

advanced = """
This @[sūtra] provides @deva[यत्] for @deva[राजन्]/@deva[श्वशुर], debarring @deva[अण्]/@deva[अञ्]: @deva[राजन्यः] = @deva[क्षत्रियजाति] (not @deva[राजापत्य]—that = @deva[राजनः]); @deva[श्वशुर्यः]. @ref[4.4.168] also references @deva[राजन्य].
"""

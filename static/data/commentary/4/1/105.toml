id = "4.1.105"
numericId = "41105"

[en]
simple = """
The @deva[गर्ग] class words take @deva[यञ्] for @deva[गोत्र] meaning. Example: @deva[गार्ग्यः] (gotra descendant of Garga).
"""

standard = """
After @deva[गर्गादि] words, @deva[यञ्] is used for @deva[गोत्र] descendants. @deva[गार्ग्यः], @deva[वात्स्यः], etc. Special cases: @deva[रथकार] in this class = the caste @deva[रथकार] (takes @deva[यञ्] here); when meaning 'chariot-maker' artisan, takes @deva[ण्य] by @ref[4.1.152]. @deva[केशिनी] → @deva[कैशिन्यः] (no @deva[पुंवद्भाव]—@deva[केशिनी] read with feminine affix in list to prevent @deva[टि]-@deva[लोप] → *@deva[कैश्य]). @deva[वेन] takes @deva[यञ्] only in Vedic: @deva[वैन्य] (modern form incorrect). @deva[वामरथ] treated like @deva[कण्वादि] (@deva[गर्गादि] subclass) except for accent. @deva[मनु] ∈ @deva[लोहितादि] subclass: @deva[मानवी प्रजा] (descendant sense by @deva[अण्] @ref[4.1.83]). @deva[जमदग्न्य]/@deva[पाराशर्य]: exceptions by @deva[गोत्ररूपाध्यारोप] (gotra-form superimposition); regular forms = @deva[जामदग्नः]/@deva[पाराशरः] by @deva[ऋष्यण्] @ref[4.1.114].
"""

advanced = """
This @[sūtra] provides @deva[यञ्] for @deva[गर्गादि] in @deva[गोत्रार्थ]. @deva[गार्ग्यः], @deva[वात्स्यः]. Special: @deva[रथकार] (caste) → @deva[यञ्] here; artisan → @deva[ण्य] (@ref[4.1.152]). @deva[केशिनी] → @deva[कैशिन्यः]: no @deva[पुंवद्भाव] (@ref[6.3.34]) because @deva[केशिनी] listed with @deva[स्त्रीप्रत्यय]—avoids @deva[टि]-@deva[लोप] (@ref[6.4.144]) → *@deva[कैश्य]. @deva[वेनाच्छन्दसि]: @deva[वैन्य] Vedic only. @deva[वामरथ] = @deva[कण्वादिवत्] (disciples by @deva[अण्] @ref[4.2.111]; plural @ref[2.4.64]; feminine @ref[4.1.16]/17; @deva[युवन्] @ref[4.1.101]; collection @ref[4.3.127]) @deva[स्वरवर्जम्] (accent differs—governed by @deva[ण्य]). Anomalies @deva[जामदग्न्य]/@deva[पाराशर्य]: @deva[गोत्ररूपाध्यारोप] exceptions; regular = @deva[जामदग्नः]/@deva[पाराशरः] (@deva[ऋष्यण्] @ref[4.1.114]). List: 116 words including @deva[गर्ग], @deva[वत्स], @deva[संस्कृति], @deva[अज], @deva[व्याघ्रपात्], @deva[अगस्ति], @deva[चमस], @deva[रेभ], @deva[अग्निवेश], @deva[शंख], @deva[धूम], @deva[अवट], @deva[मनस्], @deva[धनंजय], @deva[लोहित], @deva[शंसित], @deva[बभ्र], @deva[मण्डु], @deva[शंकु], @deva[मनु], @deva[तन्तु], @deva[कथक], @deva[ऋक्ष], @deva[तण्ड], @deva[भूत], @deva[कवि], @deva[पुरुकुत्स], @deva[शक्ति], @deva[कण्व], @deva[गोकक्ष], @deva[कुण्डिनी], @deva[यज्ञवल्क], @deva[जमदग्नि], @deva[पराशर], @deva[शर्कराक्ष], @deva[उलूक], @deva[भिषज्], @deva[दल्भ], @deva[देवहू], @deva[पिप्पल], @deva[उक्थ], @deva[संहित], @deva[विष्णुज], etc.
"""

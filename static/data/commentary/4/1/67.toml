id = "4.1.67"
numericId = "41067"

[en]
simple = """
The affix @deva[ऊङ्] is used for proper names ending in @deva[बाहु]. Examples: @deva[भद्रबाहूः] (@[bhadrabāhu]—a name), @deva[जालबाहूः].
"""

standard = """
When a compound ending in @deva[बाहु] is a proper name (@deva[संज्ञा]), @deva[ऊङ्] is used in the feminine. Thus @deva[भद्रबाहूः], @deva[जालबाहूः]. The long @deva[ऊ] indicates this is a name. When not a name (mere attribute): @deva[वृत्तबाहुः] (woman with rounded arms)—takes regular treatment. In other words, @deva[बाहु]-final compounds take long @deva[ऊ] only when denoting names.
"""

advanced = """
This @[sūtra] provides @deva[ऊङ्] for @deva[बाह्वन्त] compounds when @deva[संज्ञा] (proper name). @deva[भद्रबाहूः], @deva[जालबाहूः]. The @deva[संज्ञायाम्] restriction: non-@deva[संज्ञा] (attributive) @deva[वृत्तबाहुः] doesn't take @deva[ऊङ्]. This distinguishes naming from description.
"""

id = "4.1.33"
numericId = "41033"

[en]
simple = """
The substitute @deva[न्] replaces the final @deva[इ] of @deva[पति] before @deva[ङीप्] when the resulting word means 'wife' (one who participates in her husband's rituals). Example: @deva[पति] → @deva[पत्नी] (wife).
"""

standard = """
When @deva[पति] denotes a wife in the sense of @deva[यज्ञसंयोग] (one entitled to participate in her husband's sacrifices), the final @deva[इ] is replaced by @deva[न्] before @deva[ङीप्], yielding @deva[पत्नी]. This technical term (@deva[पत्नी]) refers to the legitimate wife who shares sacrificial fruits. But when meaning simply 'master/mistress': @deva[ग्रामस्य पतिरियं ब्राह्मणी] (this @[brāhmaṇī] is mistress of the village—no @deva[न्]-substitution). The term @deva[पत्नी] extends to @[śūdra] wives by analogy, as their marriages also involve fire-witness.
"""

advanced = """
This @[sūtra] substitutes @deva[न्] for final @deva[इ] of @deva[पति] before @deva[ङीप्] when @deva[यज्ञसंयोग] (ritual participation eligibility) is meant. The term @deva[यज्ञसंयोग] (instrumental @[tatpuruṣa]) = 'connected through sacrifice'—the wife who shares sacrificial merit and participates in rituals. Thus @deva[पत्नि वाचं यच्छ]. Non-@deva[यज्ञसंयोग] sense: @deva[ग्रामस्य पतिरियं ब्राह्मणी]—@deva[पति] unchanged. Extension to @[śūdra]: though @[śūdras] cannot perform sacrifice (@deva[अधिकार]-less), @deva[पत्नी] applies by analogy since their marriage includes @deva[अग्निसाक्षिक] ceremony.
"""

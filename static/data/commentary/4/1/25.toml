id = "4.1.25"
numericId = "41025"

[en]
simple = """
After @deva[बहुव्रीहि] compounds ending in @deva[ऊधस्] (udder), the feminine affix @deva[ङीप्] is used. Example: @deva[कुण्डोध्नी] (woman with full bosom), @deva[घटोध्नी] (cow with jar-like udders).
"""

standard = """
@[bahuvrīhi] compounds ending in @deva[ऊधस्] take @deva[ङीप्]. The final @deva[ऊधस्] is replaced by @deva[अनङ्] (@ref[5.4.131]): @deva[कुण्ड] + @deva[ऊधस्] → @deva[कुण्डोधन्]; then @deva[ङीप्] with @deva[अ]-elision (@ref[6.4.134]): @deva[कुण्डोध्नी]. This overrides rules @ref[4.1.12], @ref[4.1.13], and @ref[4.1.28]. The @deva[अन्]-substitution only occurs when feminine is expressed—masculine: @deva[महोधा पर्जन्यः] (big-bosomed cloud). Not for @deva[तत्पुरुष]: @deva[प्राप्तोधाः] (@ref[2.2.4]).
"""

advanced = """
This @[sūtra] provides @deva[ङीप्] for @deva[ऊधसन्त]-@[bahuvrīhis]. Process: @deva[ऊधस्] → @deva[अनङ्] by @ref[5.4.131] (only for feminine); then @deva[अल्लोप] (@ref[6.4.134]) before @deva[ङीप्]: @deva[कुण्डोधन्] → @deva[कुण्डोध्नी], @deva[घटोध्नी]. This overrides @ref[4.1.12] (@deva[मनन्त]-prohibition), @ref[4.1.13] (@deva[डाप्]), and @ref[4.1.28] (optional @deva[ङीप्] for @deva[अल्लोप]-@[bahuvrīhis]). Restriction: @deva[बहुव्रीहौ]—@[tatpuruṣa] @deva[प्राप्तोधाः] (@ref[2.2.4]) excluded. The @deva[अनङ्]-substitution is feminine-specific; masculine: @deva[महोधा पर्जन्यः].
"""

id = "4.1.103"
numericId = "41103"

[en]
simple = """
The words @deva[द्रोण], @deva[पर्वत], @deva[जीवन्त] optionally take @deva[फक्] for @deva[गोत्र] meaning. Examples: @deva[द्रौणायनः] or @deva[द्रौणिः].
"""

standard = """
After @deva[द्रोण], @deva[पर्वत], @deva[जीवन्त], @deva[फक्] is optional (otherwise @deva[इञ्] by @ref[4.1.95]). @deva[द्रौणायनः] or @deva[द्रौणिः], @deva[पार्वतायनः] or @deva[पार्वतिः], @deva[जैवन्तायनः] or @deva[जैवन्तिः]. Note: @deva[फक्] denotes remote (@deva[गोत्र]) offspring, not immediate son. Why then @deva[अश्वत्थामा द्रौणायनः]? The @deva[द्रोण] here refers to an ancient clan founder, not the @[mahābhārata] @[droṇa]—by similarity of names, @[aśvatthāmā] was called @deva[द्रौणायन].
"""

advanced = """
This @[sūtra] makes @deva[फक्] optional for @deva[द्रोण]/@deva[पर्वत]/@deva[जीवन्त] in @deva[गोत्रार्थ], debarring @deva[इञ्] (@ref[4.1.95]). @deva[द्रौणायनः]/@deva[द्रौणिः], @deva[पार्वतायनः]/@deva[पार्वतिः], @deva[जैवन्तायनः]/@deva[जैवन्तिः]. @deva[फक्] = @deva[गोत्र] (remote), not immediate son. @deva[अश्वत्थामा द्रौणायनः]: @deva[द्रोण] = ancient clan-founder (not @[mahābhārata] @[droṇa])—@deva[शब्दसाधर्म्यात्] later applied to @[aśvatthāmā].
"""

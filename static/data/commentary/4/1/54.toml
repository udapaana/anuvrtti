id = "4.1.54"
numericId = "41054"

[en]
simple = """
When a body-part word is subordinate in a compound and its penultimate letter is not a conjunct consonant, @deva[ङीष्] is optional. Example: @deva[चन्द्रमुखी] or @deva[चन्द्रमुखा] (moon-faced).
"""

standard = """
When a @deva[स्वाङ्ग] (body-part) word is @deva[उपसर्जन] (subordinate) in a compound and lacks a conjunct-consonant penultimate, @deva[ङीष्] is optional. Examples: @deva[चन्द्रमुखी]/@deva[चन्द्रमुखा], @deva[अतिकेशी]/@deva[अतिकेशा]]. The @deva[अतिकेश] is @[tatpuruṣa] (@deva[अतिक्रान्ता केशान्]—@deva[केश] is @deva[उपसर्जन] by @ref[1.2.44]). Conditions: (1) @deva[स्वाङ्ग]-final; (2) @deva[उपसर्जन]; (3) non-conjunct penultimate. Counter-examples: @deva[बहुयवा] (not @deva[स्वाङ्ग]); @deva[अशिखा] (@deva[शिखा] not @deva[उपसर्जन]); @deva[सुगुल्फा], @deva[सुपार्श्वा] (conjunct penultimate). @[vārtika]: @deva[अङ्ग], @deva[गात्र], @deva[कण्ठ] take option despite conjunct penultimate: @deva[मृद्वङ्गी]/@deva[मृद्वङ्गा], @deva[सुगात्री]/@deva[सुगात्रा], @deva[स्निग्धकण्ठी]/@deva[स्निग्धकण्ठा].
"""

advanced = """
This @[sūtra] provides optional @deva[ङीष्] for @deva[स्वाङ्गान्त] compounds where the @deva[स्वाङ्ग] is @deva[उपसर्जन] and @deva[असंयोगोपधा] (non-conjunct penultimate). @deva[स्वाङ्ग] definition: @deva[अद्रवं मूर्तिमत्स्वाङ्गं प्राणिस्थमविकारजम्। अतत्स्थं तत्रदृष्टं चेत् तेन चेत् तत्तथायुतम्॥]—non-fluid, perceptible, existing in living beings, not change-produced; or if elsewhere, originally known in beings, or having similar relation. The @deva[अन्तोदात्तात् क्तान्तात्] @[anuvṛtti] doesn't extend here, but @deva[वा] does. @[vārtika]: @deva[अङ्ग]/@deva[गात्र]/@deva[कण्ठ] take option despite @deva[संयोगोपध]: @deva[मृद्वङ्गी]/@deva[मृद्वङ्गा]], etc.
"""

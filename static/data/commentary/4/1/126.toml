id = "4.1.126"
numericId = "41126"

[en]
simple = """
The @deva[कल्याणी] class words take @deva[ढक्] with @deva[इनङ्] substituting for the final. Examples: @deva[कल्याणिनेयः], @deva[सौभागिनेयः], @deva[दौर्भागिनेयः].
"""

standard = """
After @deva[कल्याणी] etc., @deva[ढक्] is used with @deva[इनङ्] replacing the final. For feminine-affix-ending words, this @[sūtra] teaches @deva[इनङ्]-substitution (they already take @deva[ढक्] by @ref[4.1.120]); for others, both @deva[इनङ्] and @deva[ढक्] are taught. @deva[कल्याणी] → @deva[कल्याणिन्] + @deva[ढक्] = @deva[कल्याणिनेयः]. @deva[सुभगा] → @deva[सुभगिन्] + @deva[ढक्] = @deva[सौभागिनेयः]. @deva[दुर्भगा] → @deva[दौर्भागिनेयः] (double @deva[वृद्धि] of @deva[उ] and @deva[अ] by @ref[7.3.19]). List: @deva[कल्याणी], @deva[सुभगा], @deva[दुर्भगा], @deva[बन्धकी], @deva[अनुदृष्टि], @deva[अनुसृति], @deva[जरती], @deva[बलीवर्दी], @deva[ज्येष्ठा], @deva[कनिष्ठा], @deva[मध्यमा], @deva[परस्त्री].
"""

advanced = """
This @[sūtra] provides @deva[ढक्] with @deva[इनङ्]-@deva[आदेश] for @deva[कल्याणीयादि]. @deva[स्त्रीप्रत्ययान्त] words: @deva[इनङ्] only (already @deva[ढक्] by @ref[4.1.120]); others: both. @deva[कल्याणिनेयः], @deva[सौभागिनेयः], @deva[दौर्भागिनेयः] (double @deva[वृद्धि] @ref[7.3.19]). 12-word list: @deva[कल्याणी], @deva[सुभगा], @deva[दुर्भगा], @deva[बन्धकी], @deva[अनुदृष्टि], @deva[अनुसृति], @deva[जरती], @deva[बलीवर्दी], @deva[ज्येष्ठा], @deva[कनिष्ठा], @deva[मध्यमा], @deva[परस्त्री].
"""

id = "4.1.32"
numericId = "41032"

[en]
simple = """
The augment @deva[नुक्] is added to @deva[अन्तर्वत्] (pregnant) and @deva[पतिवत्] (having a husband) before @deva[ङीप्]. Example: @deva[अन्तर्वत्नी] (pregnant woman), @deva[पतिवत्नी] (woman whose husband is living).
"""

standard = """
The stems @deva[अन्तर्वत्] and @deva[पतिवत्] receive the augment @deva[नुक्] (= @deva[न्]) before @deva[ङीप्], yielding @deva[अन्तर्वत्नी] and @deva[पतिवत्नी]. The augment is added finally (@ref[1.1.46]). This special formation applies only when meaning 'pregnant' and 'having husband living' respectively. Other uses: @deva[प्रथते त्वया पतिमती पृथिवी] (earth has a lord—regular @deva[पतिमती]). The @deva[म्] → @deva[व्] change in @deva[अन्तर्वत्] is by @ref[8.2.9]; in @deva[पतिवत्] it's irregular. Vedic optionality: @deva[सान्तर्वत्नी] or @deva[सान्तर्वती].
"""

advanced = """
This @[sūtra] teaches @deva[नुक्]-augment for @deva[अन्तर्वत्]/@deva[पतिवत्] before @deva[ङीप्]. Process: @deva[अन्तर्वत्] + @deva[नुक्] + @deva[ङीप्] → @deva[अन्तर्वत्नी]. The @deva[नुक्] augment (= @deva[न्]) is final-positioned by @ref[1.1.46]. Semantic restriction: only for 'pregnant' and 'husband-living' senses. @deva[मतुप्] in @deva[अन्तर्वत्] is irregular—@deva[अन्तर्] (locative sense) doesn't normally take @deva[मतुप्] (@ref[5.2.94] requires @deva[अस्ति] apposition). The @deva[म्] → @deva[व्] is regular for @deva[अन्तर्वत्] (@ref[8.2.9]), but irregular for @deva[पतिवत्]. Vedic: optional @deva[नुक्]—@deva[सान्तर्वत्नी]/@deva[सान्तर्वती] @deva[देवानुपैत्]].
"""

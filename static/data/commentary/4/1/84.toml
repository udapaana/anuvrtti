id = "4.1.84"
numericId = "41084"

[en]
simple = """
The @deva[अश्वपति] class words take @deva[अण्] (instead of @deva[ण्य]) in @deva[प्राग्दीव्यतीय] senses. Example: @deva[आश्वपतम्] (descendant/belonging to @[aśvapati]).
"""

standard = """
This @[sūtra] excepts @deva[अश्वपत्यादि] words from @ref[4.1.85] (which would give @deva[ण्य] after @deva[पति]-ending words), providing @deva[अण्] instead. @deva[अश्वपति] + @deva[अण्] = @deva[आश्वपतम्] (by @ref[7.2.117] @deva[वृद्धि]; @deva[इ] of @deva[पति] elided by @ref[6.4.148]). List includes: @deva[अश्वपति], @deva[ज्ञानपति], @deva[शतपति], @deva[गणपति], @deva[स्थानपति], @deva[यज्ञपति], @deva[राष्ट्रपति], @deva[कुलपति], @deva[गृहपति], @deva[धान्यपति], @deva[धन्वपति], @deva[बन्धुपति], @deva[धर्मपति], @deva[सभापति], @deva[प्राणपति], @deva[क्षेत्रपति].
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[अश्वपत्यादि], excepting @ref[4.1.85] (@deva[ण्य] for @deva[पत्यन्त]). Derivation: @deva[अश्वपति] + @deva[अण्] → @deva[आश्वपतम्] (@ref[7.2.117] @deva[तद्धितेष्वचामादेः]; @ref[6.4.148] @deva[यस्येति च] elides @deva[इ]). List: @deva[अश्वपति], @deva[ज्ञानपति], @deva[शतपति], @deva[गणपति], @deva[स्थानपति], @deva[यज्ञपति], @deva[राष्ट्रपति], @deva[कुलपति], @deva[गृहपति], @deva[पशुपति], @deva[धान्यपति], @deva[धन्वपति], @deva[बन्धुपति], @deva[धर्मपति], @deva[सभापति], @deva[प्राणपति], @deva[क्षेत्रपति].
"""

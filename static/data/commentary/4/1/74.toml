id = "4.1.74"
numericId = "41074"

[en]
simple = """
The feminine affix @deva[चाप्] is used after words formed with @deva[ञ्यङ्] or @deva[ष्यङ्]. Examples: @deva[आम्बष्ठ्या], @deva[कौसल्या], @deva[कारीषगन्ध्या], @deva[बालाक्या].
"""

standard = """
After stems formed by @deva[ञ्यङ्] (@ref[4.1.171]) or @deva[ष्यङ्] (@ref[4.1.78]), the feminine affix is @deva[चाप्] (final @deva[आ]). @deva[ञ्यङ्]-examples: @deva[आम्बष्ठ्या], @deva[सौवीर्या], @deva[कौसल्या]. @deva[ष्यङ्]-examples: @deva[कारीषगन्ध्या], @deva[वाराह्या], @deva[बालाक्या]. The @deva[प्] creates the common term @deva[आप्] with @deva[डाप्] and @deva[टाप्]; the @deva[च्] makes final @deva[उदात्त] (@ref[6.1.163]). @[vārtika]: @deva[चाप्] also after @deva[यञ्]-formed words when @deva[ष्] immediately precedes @deva[यञ्]: @deva[शार्कराक्ष्या], @deva[पौतिमाष्या], @deva[गौकाक्ष्या]. Note: no @deva[संप्रसारण] of @deva[य्] when @deva[पुत्र]/@deva[पति] is added: @deva[गौकाक्ष्यापुत्रः] (not @deva[गौकाक्षीपुत्रः]).
"""

advanced = """
This @[sūtra] provides @deva[चाप्] for @deva[ञ्यङन्त] and @deva[ष्यङन्त] stems. @deva[यङ्] denotes both @deva[ञ्यङ्] (@ref[4.1.171]) and @deva[ष्यङ्] (@ref[4.1.78]) as common element. @deva[ञ्यङ्]-forms: @deva[आम्बष्ठ्या], @deva[सौवीर्या], @deva[कौसल्या]. @deva[ष्यङ्]-forms: @deva[कारीषगन्ध्या], @deva[वाराह्या], @deva[बालाक्या]. The @deva[प्] enables @deva[आप्]-@deva[प्रत्याहार]; @deva[च्] → @deva[अन्तोदात्त] (@ref[6.1.163]). @[vārtika]: @deva[षकारपूर्व]-@deva[यञ्] also takes @deva[चाप्]: @deva[शार्कराक्ष्या], @deva[पौतिमाष्या], @deva[गौकाक्ष्या] (these would otherwise take @deva[ङीप्] by @ref[4.1.16]). No @deva[संप्रसारण] by @ref[6.1.13]: @deva[गौकाक्ष्यापुत्रः].
"""

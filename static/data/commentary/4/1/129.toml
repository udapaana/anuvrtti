id = "4.1.129"
numericId = "41129"

[en]
simple = """
After @deva[गोधा], the affix @deva[ढ्रक्] is used for descendant meaning. Example: @deva[गौधेरः].
"""

standard = """
After @deva[गोधा], @deva[ढ्रक्] is used: @deva[गोधा] + @deva[ढ्रक्] = @deva[गौधेरः]. The @deva[ढ्] → @deva[एय्] (@ref[7.1.2]), @deva[क्] causes @deva[वृद्धि] (@ref[7.2.118]) and @deva[उदात्त] accent on final (@ref[4.1.165]). The actual affix is @deva[एय्र], but @deva[य्] elides by @ref[6.1.66], giving @deva[एर]. Since @deva[गोधा] ∈ @deva[शुभ्रादि] (@ref[4.1.123]), it also takes @deva[ढक्]: @deva[गौधेयः].
"""

advanced = """
This @[sūtra] provides @deva[ढ्रक्] for @deva[गोधा]: @deva[गौधेरः]. Process: @deva[ढ्] → @deva[एय्] (@ref[7.1.2]); @deva[क्] → @deva[वृद्धि] (@ref[7.2.118]), @deva[अन्तोदात्त] (@ref[4.1.165]); @deva[य्]-@deva[लोप] (@ref[6.1.66]) → final affix @deva[एर]. @deva[गोधा] ∈ @deva[शुभ्रादि] (@ref[4.1.123]) also → @deva[गौधेयः] (@deva[ढक्]).
"""

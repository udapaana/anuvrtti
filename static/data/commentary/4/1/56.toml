id = "4.1.56"
numericId = "41056"

[en]
simple = """
@deva[ङीष्] is NOT used after @deva[क्रोड] class body-part words or after polysyllabic body-part words. Example: @deva[कल्याणक्रोडा], @deva[सुभगा], @deva[सुजघना], @deva[महाललाटा].
"""

standard = """
The @deva[क्रोडादि] class (body-part words established by usage) and polysyllabic (@deva[बह्वच्]) body-part words don't take @deva[ङीष्]. @deva[क्रोडादि] examples: @deva[कल्याणक्रोडा], @deva[कल्याणखुरा], @deva[कल्याणबाला], @deva[कल्याणशफा], @deva[कल्याणगुदा], @deva[कल्याणघाणा], @deva[सुभगा], @deva[सुगला]. Polysyllabic examples: @deva[सुजघना], @deva[पृथुजघना], @deva[महाललाटा]. The @deva[क्रोडादि] is an @deva[आकृतिगण] (usage-based open class). Note: @deva[क्रोड] (feminine) loses gender-marking by @deva[पुंवद्भाव] when @deva[उपसर्जन] in @[bahuvrīhi], and shortens by @ref[1.2.48].
"""

advanced = """
This @[sūtra] prohibits @deva[ङीष्] for: (1) @deva[क्रोडादि] @[gaṇa]—@deva[आकृतिगण] (open, usage-established); (2) @deva[बह्वच्] (polysyllabic) @deva[स्वाङ्ग]. @deva[क्रोडादि]: @deva[कल्याणक्रोडा], @deva[कल्याणखुरा], @deva[कल्याणउखा], @deva[कल्याणबाला], etc. Polysyllabic: @deva[सुजघना], @deva[पृथुजघना], @deva[महाललाटा]. The @deva[क्रोड] (inherently feminine) undergoes @deva[पुंवद्भाव] when @deva[उपसर्जन] in @[bahuvrīhi], shortening by @ref[1.2.48].
"""

id = "4.1.5"
numericId = "41005"

[en]
simple = """
The feminine affix @deva[ङीप्] (which adds @deva[ई]) is used after stems ending in @deva[ऋ] or @deva[न्]. Example: @deva[कर्तृ] → @deva[कर्त्री] (female doer); @deva[दण्डिन्] → @deva[दण्डिनी] (female staff-bearer).
"""

standard = """
The affix @deva[ङीप्] applies after @deva[प्रातिपदिक] stems ending in @deva[ऋ] or @deva[न्]. Of @deva[ङीप्], @deva[ङ्] creates a common designation with @deva[ङीष्] and @deva[ङीन्], while @deva[प्] distinguishes it from them; the actual affix is @deva[ई]. Examples: @deva[कर्तृ] → @deva[कर्त्री], @deva[हर्तृ] → @deva[हर्त्री]; @deva[दण्डिन्] → @deva[दण्डिनी], @deva[छत्रिन्] → @deva[छत्रिनी].
"""

advanced = """
This @[sūtra] teaches @deva[ङीप्] after @deva[ऋकारान्त] and @deva[नकारान्त] stems. The @deva[ङ्] of @deva[ङीप्]/@deva[ङीष्]/@deva[ङीन्] forms a common designation for the @deva[ङी] class referenced in @ref[4.1.1]. The @deva[प्] marks @deva[अनुदात्त] accent (@ref[3.1.4]) and distinguishes from @deva[ष्]/@deva[न्] of other @deva[ङी] affixes. For @deva[ऋ]-stems (agent nouns in @deva[तृच्]): @deva[कर्तृ] → @deva[कर्त्री], @deva[हर्तृ] → @deva[हर्त्री]. For @deva[न्]-stems (@deva[मतुप्]/@deva[इन्]-formed): @deva[दण्डिन्] → @deva[दण्डिनी], @deva[छत्रिन्] → @deva[छत्रिनी].
"""

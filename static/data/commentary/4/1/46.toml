id = "4.1.46"
numericId = "41046"

[en]
simple = """
This rule says that in Vedic usage, the @deva[बह्वादि] (bahvādi) class of words obligatorily takes the feminine affix @deva[ङीष्] (ṅīṣ). The word @deva[नित्यम्] (nityam, "always") removes the optionality that @ref[4.1.45] allows for these words in ordinary Sanskrit. For example, @deva[बह्वी] (bahvī) appears in the Vedic phrase @deva[बह्वीषु हित्वा प्रपिवन्] (drinking among the bahvī herbs), where @deva[बह्वी] is a plant name. This matters because Vedic usage preserves older, obligatory feminine formations that later became optional.
"""

standard = """
In @deva[छन्दस्] (Vedic texts), the @deva[बह्वादि] class words obligatorily take @deva[ङीष्] — the optionality granted by @ref[4.1.45] does not apply. The key term @deva[नित्यम्] (obligatorily) signals that these forms are invariable in Vedic. Example: @deva[बह्वीषु हित्वा प्रपिवन्], where @deva[बह्वी] is a plant name. The word @deva[नित्य] in this rule primarily serves the next rule (@ref[4.1.47]) rather than this one, since without it, this rule would already produce obligatory application by the principle of @deva[आरम्भसामर्थ्य] (the very act of stating a rule implies it must produce a result).
"""

advanced = """
In @deva[छन्दस्], @deva[बह्वादि]-class words take @deva[ङीष्] obligatorily (@deva[नित्यम्]). The @deva[नित्य] specification primarily serves @ref[4.1.47] — without it, this rule would already be @deva[नित्यविधि] by the principle @deva[आरम्भसामर्थ्यादेव नित्यो विधिः सिद्धः] (a separately stated rule is obligatory by virtue of its very formulation). The @deva[नित्य] carries forward into @ref[4.1.47] to ensure that @deva[भ्वन्त] stems also take @deva[ङीष्] without exception in Vedic. Vedic citation: @deva[बह्वीषु हित्वा प्रपिवन्] — @deva[बह्वी] as a herb name. The @deva[बह्वादि] is a closed @deva[गण] for Vedic feminine forms.
"""

id = "4.1.178"
numericId = "41178"

[en]
simple = """
The @deva[तद्राज] @deva[अ] is NOT elided in feminine for Eastern @[kṣatriyas], @deva[भर्ग] class, and @deva[यौधेय] class. Examples: @deva[पाञ्चाली], @deva[वैदेही], @deva[भार्गी], @deva[यौधेयी].
"""

standard = """
This @[sūtra] blocks the @deva[तद्राज]-@deva[अ] elision (@ref[4.1.177]) for three groups: (1) Eastern @[kṣatriyas] (@deva[प्राची] = east of @[sarasvatī]): @deva[पाञ्चाली], @deva[वैदेही], @deva[आङ्गी], @deva[वाङ्गी], @deva[मागधी]; (2) @deva[भर्गादि] (8 words): @deva[भार्गी], @deva[कारूषी], @deva[कैकेयी]; (3) @deva[यौधेयादि] (9 words): @deva[यौधेयी], @deva[शौभ्रेयी], @deva[शौक्रेयी]. Note: Five @deva[तद्राज] affixes exist here, but others exist in @ref[5.3.112]-@ref[5.3.119]. @deva[यौधेय] is formed by @deva[अञ्] of @ref[5.3.117]. This implies @ref[4.1.177]'s elision rule applies to @ref[5.3.112]-@ref[5.3.119] @deva[तद्राज] affixes too: e.g., m. @deva[पार्शवः] (@deva[अण्] @ref[5.3.117]) → f. @deva[पर्शू]; m. @deva[आसुरः] → f. @deva[असुरी]. @deva[भर्गादि]: @deva[भर्ग], @deva[करूष], @deva[केकय], @deva[कश्मीर], @deva[साल्व], @deva[सुस्थाल], @deva[उरस्], @deva[कौरव्य]. @deva[यौधेयादि]: @deva[यौधेय], @deva[कौकेय], @deva[शौभ्रेय], @deva[ज्याबाणेय], @deva[धौर्तेय], @deva[त्रिगर्त], @deva[भरत], @deva[उशीनर], @deva[वार्तेय].
"""

advanced = """
This @[sūtra] blocks @deva[तद्राज]-@deva[अ]-@deva[लुक्] (@ref[4.1.177]) for: (1) @deva[प्राची क्षत्रिय] (east of @[sarasvatī]): @deva[पाञ्चाली], @deva[वैदेही], @deva[आङ्गी], @deva[वाङ्गी], @deva[मागधी]; (2) @deva[भर्गादि] (8): @deva[भार्गी], @deva[कारूषी], @deva[कैकेयी]; (3) @deva[यौधेयादि] (9): @deva[यौधेयी], @deva[शौभ्रेयी], @deva[शौक्रेयी]. @deva[ज्ञापक]: @ref[4.1.177] applies to @ref[5.3.112]-@ref[5.3.119] @deva[तद्राज] too: @deva[पार्शवः] → @deva[पर्शू]; @deva[आसुरः] → @deva[असुरी]. @deva[भर्गादि]: @deva[भर्ग], @deva[करूष], @deva[केकय], @deva[कश्मीर], @deva[साल्व], @deva[सुस्थाल], @deva[उरस्], @deva[कौरव्य]. @deva[यौधेयादि]: @deva[यौधेय], @deva[कौकेय], @deva[शौभ्रेय], @deva[ज्याबाणेय], @deva[धौर्तेय], @deva[त्रिगर्त], @deva[भरत], @deva[उशीनर], @deva[वार्तेय].
"""

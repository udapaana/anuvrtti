id = "4.1.82"
numericId = "41082"

[en]
simple = """
@deva[तद्धित] affixes are optionally added to the first word (in @deva[षष्ठी] (genitive) case) of a phrase expressing the meaning. Example: @deva[उपगोरपत्यम्] = @deva[औपगवः] (descendant of Upagu).
"""

standard = """
This @deva[अधिकारसूत्र] has three governing elements extending through @ref[5.3.1]: (1) @deva[समर्थानाम्] 'among words in construction'; (2) @deva[प्रथमात्] 'after the first'; (3) @deva[वा] 'optionally'. The @deva[तद्धित] affix comes after the word in the genitive case that represents the first element of the analytical sentence. Thus @deva[उपगोरपत्यम्] (Upagu's offspring) → @deva[उपगु] + @deva[अण्] → @deva[औपगवः]. The same meaning can be expressed by: (1) sentence (@deva[उपगोरपत्यम्]); (2) compound (@deva[उपग्वपत्यम्]); (3) @deva[तद्धित] (@deva[औपगवः]). The genitive @deva[समर्थानाम्] has @deva[निर्धारण] (specification) force.
"""

advanced = """
This @deva[अधिकारसूत्र] governs through @ref[5.3.1] with three elements: @deva[समर्थानाम्] (@deva[निर्धारणषष्ठी]—specifying among connected words), @deva[प्रथमात्] (first word), @deva[वा] (optionality). The affix attaches to the genitive-case word representing @deva[तस्य] in analytical @deva[वाक्य]. @deva[उपगोरपत्यम्] → @deva[औपगवः]. Alternatives: @deva[वाक्य] (@deva[उपगोरपत्यम्]), @deva[समास] (@deva[उपग्वपत्यम्]), @deva[तद्धित] (@deva[औपगवः]). Examples: @deva[तेन रक्तं] @ref[4.2.1] → @deva[काषायम्] (affix on instrumental); @deva[तत्र भवः] @ref[4.3.53] → @deva[स्रौघ्नः] (affix on locative).
"""

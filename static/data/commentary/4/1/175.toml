id = "4.1.175"
numericId = "41175"

[en]
simple = """
After @deva[कम्बोज] (and similar words), the @deva[तद्राज] affix is elided. Examples: @deva[कम्बोजः], @deva[चोलः], @deva[केरलः], @deva[शकः], @deva[यवनः] (king of Kamboja, etc.).
"""

standard = """
After @deva[कम्बोज], the @deva[तद्राज] affix @deva[अञ्] (which would apply by @ref[4.1.168]) is elided by @deva[लुक्]: @deva[कम्बोजः] (king of Kamboja). This should be understood as '@deva[कम्बोज] and similar words'—the affix is also elided after @deva[चोल], @deva[केरल], @deva[शक], @deva[यवन]: @deva[चोलः] (king of Cholas), @deva[केरलः], @deva[शकः], @deva[यवनः].
"""

advanced = """
This @[sūtra] elides @deva[तद्राज] affix (@deva[अञ्] @ref[4.1.168]) by @deva[लुक्] for @deva[कम्बोज]: @deva[कम्बोजः]. Extended (@deva[आदिशब्द]): @deva[चोलः], @deva[केरलः], @deva[शकः], @deva[यवनः].
"""

id = "4.1.42"
numericId = "41042"

[en]
simple = """
Certain words take @deva[ङीष्] only in specific meanings. Example: @deva[जानपदी] (profession), @deva[कुण्डी] (bowl), @deva[गोणी] (grain sack), @deva[नीली] (indigo plant or blue animal), etc.
"""

standard = """
Eleven words take @deva[ङीष्] in specific senses: (1) @deva[जानपद] → @deva[जानपदी] (profession); otherwise @deva[जानपदी] by @deva[अञ्] + @deva[ङीप्] with different accent; (2) @deva[कुण्ड] → @deva[कुण्डी] (bowl); otherwise @deva[कुण्डा] (name of @[durgā]); (3) @deva[गोण] → @deva[गोणी] (grain sack); (4) @deva[स्थल] → @deva[स्थली] (natural ground); (5) @deva[भाज] → @deva[भाजी] (cooked rice-gruel); (6) @deva[नाग] → @deva[नागी] (stout woman; but @deva[नागी] for @deva[जाति]); (7) @deva[काल] → @deva[काली] (black); (8) @deva[नील] → @deva[नीली] (indigo plant or blue animal); (9) @deva[कुश] → @deva[कुशी] (plough-share); (10) @deva[कामुक] → @deva[कामुकी] (lustful woman); (11) @deva[कबर] → @deva[कबरी] (hair-braid).
"""

advanced = """
This @[sūtra] specifies @deva[ङीष्] for 11 words in particular meanings: @deva[जानपद] (@deva[वृत्ति] 'livelihood'); @deva[कुण्ड] (@deva[भाजन] 'vessel'); @deva[गोण] (@deva[शूर्प] 'grain-sack'); @deva[स्थल] (@deva[स्वभाव] 'natural spot'); @deva[भाज] (@deva[पक्व]/@deva[ओदन] 'cooked'); @deva[नाग] (@deva[स्थूल] 'stout'—@deva[गुणवचन] sense, not @deva[जाति]); @deva[काल] (@deva[कृष्णवर्ण]); @deva[नील] (@deva[अनाच्छादन]—plant/animal, not cloth); @deva[कुश] (@deva[फाल] 'plough-share'); @deva[कामुक] (@deva[कामिनी] 'lustful'); @deva[कबर] (@deva[वेणी] 'hair-braid'). Outside these senses, standard @deva[टाप्] applies.
"""

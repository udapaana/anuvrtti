id = "4.1.143"
numericId = "41143"

[en]
simple = """
After @deva[स्वसृ] (sister), @deva[छ] is used for descendant meaning, debarring @deva[अण्]. Example: @deva[स्वस्रीयः] (sister's son).
"""

standard = """
After @deva[स्वसृ] (sister), @deva[छ] (not @deva[अण्]) is used: @deva[स्वसृ] + @deva[छ] = @deva[स्वस्रीयः] ('the sister's son', i.e., nephew through sister).
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्]) for @deva[स्वसृ]: @deva[स्वस्रीयः] (sister's son).
"""

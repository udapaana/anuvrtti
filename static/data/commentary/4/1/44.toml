id = "4.1.44"
numericId = "41044"

[en]
simple = """
After quality-denoting stems ending in short @deva[उ], @deva[ङीष्] is optionally used. Example: @deva[पटु] (clever) → @deva[पट्वी] or @deva[पटुः]; @deva[मृदु] (soft) → @deva[मृद्वी] or @deva[मृदुः].
"""

standard = """
Stems ending in short @deva[उ] that denote quality (@deva[गुणवचन]) optionally take @deva[ङीष्]. Forms: @deva[पट्वी]/@deva[पटुः], @deva[मृद्वी]/@deva[मृदुः]. Conditions: (1) @deva[उकारान्त]—not @deva[शुचिः] (ends in @deva[इ]); (2) @deva[गुणवचन]—not @deva[आखुः] (mouse—@deva[जाति]). @deva[गुण] definition: quality expressible as adjective (like @deva[शुक्ल]), not merely quality-denoting nouns (like @deva[रूप]). @[vārtikas]: @deva[वसु] takes @deva[ङीप्] (not @deva[ङीष्]) for initial accent: @deva[वस्वी]. Prohibition for @deva[खरु] and conjunct-penultimate words: @deva[खरुरियं ब्राह्मणी], @deva[पाण्डुरियं ब्राह्मणी].
"""

advanced = """
This @[sūtra] provides optional @deva[ङीष्] for @deva[उकारान्त] @deva[गुणवचन] stems. @deva[गुण] definition: @deva[सत्वे निविशते पैति पृथग् जातिषु दृश्यते। आधेयश्चाक्रियाजश्च सोऽसत्त्वप्रकृतिर्गुणः॥]—quality inhering in substance, seen across categories, not substance-natured, non-action-produced. Exclusions: @deva[इकारान्त] (@deva[शुचिः]); non-@deva[गुण] (@deva[आखुः]). @[vārtikas]: @deva[वसु] takes @deva[ङीप्] for initial @deva[उदात्त]: @deva[वस्वी] (@deva[वसु] formed by @deva[उ], @[uṇ]. I.10, @deva[नित्] → @deva[आद्युदात्त]). Prohibition: @deva[खरु]; conjunct-penultimate (@deva[पाण्डु]—@deva[ण्ड्] is conjunct).
"""

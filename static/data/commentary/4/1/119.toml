id = "4.1.119"
numericId = "41119"

[en]
simple = """
After @deva[मण्डूक], both @deva[ढक्] and @deva[अण्] optionally apply for descendant meaning. Examples: @deva[मांडूकेयः], @deva[मांण्डूकः], @deva[मांडूकिः].
"""

standard = """
After @deva[मण्डूक], @deva[ढक्] and @deva[अण्] are both optional, giving three forms: @deva[मण्डूक] + @deva[ढक्] = @deva[मांडूकेयः]; @deva[मण्डूक] + @deva[अण्] = @deva[मांण्डूकः]; @deva[मण्डूक] + @deva[इञ्] = @deva[मांडूकिः] (by @ref[4.1.95] default). The optionality applies to both @deva[ढक्] and @deva[अण्].
"""

advanced = """
This @[sūtra] makes both @deva[ढक्] and @deva[अण्] optional for @deva[मण्डूक]: @deva[मांडूकेयः] (@deva[ढक्]), @deva[मांण्डूकः] (@deva[अण्]), @deva[माण्डूकिः] (@deva[इञ्] @ref[4.1.95] by default).
"""

id = "4.1.53"
numericId = "41053"

[en]
simple = """
When a @deva[बहुव्रीहि] compound ends in @deva[क्त] with final @deva[उदात्त] accent but the first member is NOT a body-part word, @deva[ङीष्] is optional. Example: @deva[शार्ङ्गजग्धी] or @deva[शार्ङ्गजग्धा] (eaten by a tiger).
"""

standard = """
When the @[bahuvrīhi] ends in @deva[अन्तोदात्त] @deva[क्त] but the first member is not @deva[स्वाङ्ग] (body-part), @deva[ङीष्] becomes optional. Forms: @deva[शार्ङ्गजग्धी]/@deva[शार्ङ्गजग्धा] (@deva[शार्ङ्ग] is @deva[जाति], not @deva[स्वाङ्ग]), @deva[पलाण्डुभक्षिती]/@deva[पलाण्डुभक्षिता], @deva[सुरापीती]/@deva[सुरापीता]. When first member IS @deva[स्वाङ्ग]: @deva[शंखभिन्नी], @deva[ऊरुभिन्नी] (only one form—@ref[4.1.52]). When not @deva[अन्तोदात्त]: @deva[वस्त्रछन्ना], @deva[वसनछन्ना] (not final @deva[उदात्त] per @ref[6.2.170]—@deva[आच्छादन]-words excepted). @[vārtika]: Vedic/names allow diversity: @deva[प्रवृद्धविलूनी]/@deva[प्रवृद्धविलूना].
"""

advanced = """
This @[sūtra] provides @deva[विभाषा] (optionality) for @deva[अन्तोदात्त] @deva[क्तान्त]-@[bahuvrīhis] when first member is non-@deva[स्वाङ्ग]. @deva[शार्ङ्गजग्ध] (@deva[जाति]-initial, not @deva[स्वाङ्ग]) → @deva[शार्ङ्गजग्धी]/@deva[शार्ङ्गजग्धा]. The option is triggered by non-@deva[स्वाङ्ग] status. @deva[स्वाङ्ग]-initial: obligatory @deva[ङीष्] per @ref[4.1.52]. Non-@deva[अन्तोदात्त]: @deva[वस्त्रछन्ना] (not @deva[अन्तोदात्त] by @ref[6.2.170]—@deva[आच्छादन]-word exception). @[vārtika]: @deva[छन्दसि संज्ञायां च विभाषा]—@deva[प्रवृद्धविलूनी]/@deva[प्रवृद्धविलूना].
"""

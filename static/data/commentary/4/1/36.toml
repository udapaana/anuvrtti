id = "4.1.36"
numericId = "41036"

[en]
simple = """
The word @deva[पूतक्रतु] substitutes @deva[ऐ] for its final before @deva[ङीप्]. Example: @deva[पूतक्रतायी] (wife of @[pūtakratu]).
"""

standard = """
Before @deva[ङीप्], the final vowel of @deva[पूतक्रतु] is replaced by @deva[ऐ], yielding @deva[पूतक्रतायी] (wife of @[pūtakratu]). This and the following two @[sūtras] relate to @ref[4.1.48]—the 'wife of' sense. When not meaning 'wife': @deva[पूतक्रतुः] remains common gender ('one by whom sacrifices are purified').
"""

advanced = """
This @[sūtra] provides @deva[ऐ]-substitution for the final of @deva[पूतक्रतु] before @deva[ङीप्]: @deva[पूतक्रतायी]. This connects with @ref[4.1.48] (@deva[पुंयोगादाख्यायाम्])—the 'wife' sense. Semantic restriction: only for @deva[पुंयोग] meaning; otherwise @deva[पूतक्रतुः] (common gender) = 'one by whom @deva[क्रतवः] (sacrifices) are @deva[पूताः] (purified)'.
"""

id = "4.1.76"
numericId = "41076"

[en]
simple = """
The @deva[तद्धित] affixes are taught from here onwards. Example: @deva[युवतिः] (young woman) formed by adding @deva[ति] to @deva[युवन्].
"""

standard = """
This is an @deva[अधिकार] (governing) @[sūtra]. All affixes taught from here to the end of the Fifth Book are called @deva[तद्धित]. Words formed with these become @deva[प्रातिपदिक] (nominal stems). The plural @deva[तद्धिताः] (not singular like @deva[प्रत्ययः] @ref[3.1.1]) indicates inclusion of affixes not explicitly taught here, such as: @deva[पृथिव्य ञाञौ] → @deva[पार्थिव]; @deva[अग्रादि पश्चाड् डिमच्] → @deva[अग्रिम], @deva[आदिम], @deva[पश्चिम]. The term @deva[तद्धित] is used in @[sūtras] like @ref[1.2.46] @deva[कृत्तद्धितसमासाश्च].
"""

advanced = """
This @deva[अधिकारसूत्र] establishes @deva[तद्धित]-designation for all affixes taught through Book 5. The plural form @deva[तद्धिताः] (unlike singular @deva[प्रत्ययः] in @ref[3.1.1]) signals inclusion of affixes taught elsewhere: @deva[पृथिव्य ञाञौ], @deva[अग्रादि पश्चाड् डिमच्] (yielding @deva[पार्थिव], @deva[अग्रिम], @deva[आदिम], @deva[पश्चिम]). See @[vārtika] IV.3.23. The @deva[तद्धित]-@[saṃjñā] appears in @ref[1.2.46] @deva[कृत्तद्धितसमासाश्च].
"""

id = "4.1.8"
numericId = "41008"

[en]
simple = """
After a stem ending in @deva[पाद्] (meaning 'foot'), @deva[ङीप्] is optionally used. Example: @deva[द्विपात्] (two-footed) → @deva[द्विपदी] or @deva[द्विपात्] (the same form for feminine).
"""

standard = """
Stems ending in @deva[पाद्] (formed by @ref[5.4.140] in @[bahuvrīhi] compounds) optionally take @deva[ङीप्]. When @deva[ङीप्] is added, @deva[पाद्] becomes @deva[पद्] by @ref[6.4.130]. Thus: @deva[द्विपात्] or @deva[द्विपदी], @deva[त्रिपात्] or @deva[त्रिपदी], @deva[चतुष्पात्] or @deva[चतुष्पदी].
"""

advanced = """
This @[sūtra] makes @deva[ङीप्] optional for @deva[पादन्त] (specifically @deva[पाद्]-final) stems. The @deva[पाद्] form arises from @deva[पाद] by @ref[5.4.140] in certain @[bahuvrīhi] compounds. When @deva[ङीप्] applies, @deva[पाद्] → @deva[पद्] by @ref[6.4.130] (read with @ref[1.4.18]). This is @deva[प्राप्तविभाषा]—without this @[sūtra], @deva[ङीप्] would be obligatory by @ref[4.1.5] (ends in consonant via @ref[5.4.140]). Forms: @deva[द्विपात्]/@deva[द्विपदी], @deva[त्रिपात्]/@deva[त्रिपदी], @deva[चतुष्पात्]/@deva[चतुष्पदी].
"""

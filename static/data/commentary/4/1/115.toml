id = "4.1.115"
numericId = "41115"

[en]
simple = """
After @deva[मातृ] preceded by a numeral or by @deva[सम्]/@deva[भद्र], @deva[अण्] is used and @deva[उ] replaces final @deva[ऋ]. Example: @deva[द्वैमातुरः] (son of two mothers).
"""

standard = """
After @deva[मातृ] (mother) preceded by numerals (@deva[द्वि], @deva[षट्]) or by @deva[सम्]/@deva[भद्र], @deva[अण्] is used with @deva[उ] substituting for final @deva[ऋ]: @deva[द्विमातृ] + @deva[अण्] = @deva[द्वैमात्] + @deva[उ] + @deva[अ] (@deva[र्] by @ref[1.1.51]) = @deva[द्वैमातुरः] (son of two mothers—one birth mother, one adoptive). Similarly @deva[षाण्मातुरः], @deva[सांमातुरः], @deva[भाद्रमातुरः]. The @[sūtra] uses feminine @deva[पूर्वायाः] to indicate the rule applies only when @deva[मातृ] means 'mother' (female). Counter-example: @deva[संमातृ] (one who measures together) → @deva[सांमात्रः] (no @deva[उ]-substitution); @deva[धान्यमातृ] (barley measurer) likewise unaffected.
"""

advanced = """
This @[sūtra] provides @deva[अण्] with @deva[उ]-@deva[आदेश] for @deva[ऋ] after @deva[सङ्ख्या]/@deva[सम्]/@deva[भद्र]-preceded @deva[मातृ]: @deva[द्वैमातुरः], @deva[षाण्मातुरः], @deva[सांमातुरः], @deva[भाद्रमातुरः]. The @deva[पूर्वायाः] (feminine ablative) indicates @deva[मातृ] must denote female—@deva[संमातृ] (measure-together) → @deva[सांमात्रः]; @deva[धान्यमातृ] → unaffected. @deva[वैमात्रेयः] is formed by @ref[4.1.123] (@deva[शुभ्रादि] membership).
"""

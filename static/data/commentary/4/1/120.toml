id = "4.1.120"
numericId = "41120"

[en]
simple = """
Words ending in feminine affixes (@deva[टाप्] etc.) take @deva[ढक्] for @deva[गोत्र] meaning. Example: @deva[वैनतेयः] (son of @[vinatā]).
"""

standard = """
After words ending in feminine affixes (@deva[टाप्], @deva[डाप्], @deva[चाप्]—words in long @deva[आ] or @deva[ई]), @deva[ढक्] is used for patronymic formation. @deva[विनता] + @deva[ढक्] = @deva[वैनतेयः] (@ref[4.1.2]), @deva[सुपर्णी] + @deva[ढक्] = @deva[सौपर्णेयः]. But @deva[इडविडा] and @deva[दरद] (feminine without feminine affixes) take @deva[अण्]: @deva[ऐडविडः], @deva[दारदः]. @[vārtikas]: (1) @deva[वडवा] → @deva[वाडवेयः] = @deva[वृषः] (bull—not patronymic); patronymic = @deva[वाडवः]; (2) @deva[क्रुञ्चा], @deva[कोकिला] take @deva[अण्]: @deva[क्रौञ्चः], @deva[कौकिलः].
"""

advanced = """
This @[sūtra] provides @deva[ढक्] for @deva[स्त्रीप्रत्ययान्त] (feminine-affix-ending) words in @deva[गोत्रार्थ]: @deva[वैनतेयः] (@ref[4.1.2]), @deva[सौपर्णेयः]. Exclusion: @deva[इडविडा]/@deva[दरद] (feminine without @deva[स्त्रीप्रत्यय]) → @deva[ऐडविडः], @deva[दारदः] (@deva[अण्]). @[vārtikas]: @deva[वडवा वृषे] → @deva[वाडवेयः] = bull (non-patronymic); patronymic = @deva[वाडवः]; @deva[क्रुञ्चाकोकिलयोरण्] → @deva[क्रौञ्चः], @deva[कौकिलः].
"""

id = "4.1.159"
numericId = "41159"

[en]
simple = """
After @deva[पुत्रान्त] (words ending in @deva[पुत्र]), @deva[कुक्] is optional before @deva[फिञ्]. Three forms: @deva[गार्गीपुत्रकायणिः], @deva[गार्गीपुत्रायणिः], @deva[गार्गीपुत्रिः].
"""

standard = """
After stems ending in @deva[पुत्र], augment @deva[कुक्] is optional before @deva[फिञ्]. The @deva[उदीचाम्] + @deva[वृद्ध] + @deva[अगोत्र] conditions from @ref[4.1.157] apply (a @deva[पुत्रान्त] word can't be @deva[गोत्र], since @deva[गोत्र] = grandson+). Three forms: @deva[गार्गीपुत्रकायणिः] (with @deva[कुक्]); @deva[गार्गीपुत्रायणिः] (without @deva[कुक्], with @deva[फिञ्]); @deva[गार्गीपुत्रिः] (with @deva[इञ्]). Similarly @deva[वात्सीपुत्रकायणिः], @deva[वात्सीपुत्रायणिः], @deva[वात्सीपुत्रिः].
"""

advanced = """
This @[sūtra] makes @deva[कुक्] optional for @deva[पुत्रान्त] before @deva[फिञ्]. @deva[उदीचाम् वृद्धाद् अगोत्रात्] conditions from @ref[4.1.157] apply (@deva[पुत्रान्त] ≠ @deva[गोत्र] by definition). Three forms: @deva[गार्गीपुत्रकायणिः] (@deva[कुक्] + @deva[फिञ्]), @deva[गार्गीपुत्रायणिः] (@deva[फिञ्]), @deva[गार्गीपुत्रिः] (@deva[इञ्]). Similarly @deva[वात्सीपुत्रकायणिः]/@deva[वात्सीपुत्रायणिः]/@deva[वात्सीपुत्रिः].
"""

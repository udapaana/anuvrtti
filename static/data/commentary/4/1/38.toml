id = "4.1.38"
numericId = "41038"

[en]
simple = """
The word @deva[मनु] optionally substitutes @deva[औ] for its final (in addition to @deva[ऐ]) before @deva[ङीप्]. Example: @deva[मनायी] or @deva[मनावी] or @deva[मनुः] (wife of Manu).
"""

standard = """
The final of @deva[मनु] is optionally replaced by @deva[औ] (in addition to @deva[ऐ]) before @deva[ङीप्], both with @deva[उदात्त] accent. Three forms for 'wife of Manu': @deva[मनायी], @deva[मनावी], or @deva[मनुः] (no feminine affix). @deva[मनु] has initial @deva[उदात्त] (formed by @deva[उ], @[uṇ]. I.10, which is @deva[नित्]—@[uṇ]. I.9 treats it as @deva[मित्], and @deva[नित्] affixes give initial accent by @ref[6.1.197]).
"""

advanced = """
This @[sūtra] adds optional @deva[औ] (alongside @deva[ऐ]) as substitute for @deva[मनु]-final, both @deva[उदात्त]. The @deva[वा] triggers three options: (1) @deva[ऐ] → @deva[मनायी]; (2) @deva[औ] → @deva[मनावी]; (3) no substitution → @deva[मनुः]. @deva[मनु] accent: formed by @deva[उ] (@[uṇ]. I.10) from @deva[मन्]; by @[uṇ]. I.9 this @deva[उ] is @deva[मित्] (treated as @deva[नित्]); @deva[नित्] affixes → initial @deva[उदात्त] by @ref[6.1.197].
"""

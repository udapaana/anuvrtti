id = "4.1.158"
numericId = "41158"

[en]
simple = """
The @deva[वाकिन] class words take augment @deva[कुक्] before @deva[फिञ्]. Examples: @deva[वाकिनकायनिः], @deva[गौरधकायनिः]. Optionally @deva[वाकिनिः], @deva[गौरधिः].
"""

standard = """
After @deva[वाकिनादि] words, augment @deva[कुक्] (= @deva[क्]) is added before @deva[फिञ्] (debarring @deva[इञ्]): @deva[वाकिनकायनिः], @deva[गौरधकायनिः]. If @deva[उदीचाम्] anu@deva[वृत्ति] applies, it's optional: @deva[वाकिनिः], @deva[गौरधिः] (without @deva[कुक्], by @deva[इञ्]). 6-word list: @deva[वाकिन], @deva[गौधेर], @deva[कार्कष], @deva[काक], @deva[लङ्का]. @[vārtika]: @deva[चर्मिन्]/@deva[वर्मिन्] also have @deva[न]-@deva[लोप].
"""

advanced = """
This @[sūtra] provides @deva[कुक्]-@deva[आगम] for @deva[वाकिनादि] before @deva[फिञ्] (debarring @deva[इञ्]): @deva[वाकिनकायनिः], @deva[गौरधकायनिः]. @deva[उदीचाम्] anu@deva[वृत्ति] → optional: @deva[वाकिनिः], @deva[गौरधिः] (@deva[इञ्]). 6 words: @deva[वाकिन], @deva[गौधेर], @deva[कार्कष], @deva[काक], @deva[लङ्का]. @[vārtika]: @deva[चर्मिवर्मिणोर्नलोपश्च].
"""

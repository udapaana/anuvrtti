id = "4.1.121"
numericId = "41121"

[en]
simple = """
Dissyllabic words ending in feminine affixes take @deva[ढक्] for descendant meaning. Example: @deva[दात्तेयः] (son of @[dattā]), @deva[गौपेयः] (son of @[gopī]).
"""

standard = """
After dissyllabic (@deva[द्व्यच्]) words ending in feminine affixes, @deva[ढक्] is used for descendant meaning, debarring @deva[अण्] of @ref[4.1.113]. @deva[दत्ता] + @deva[ढक्] = @deva[दात्तेयः], @deva[गोपी] + @deva[ढक्] = @deva[गौपेयः]. Condition: must be dissyllabic—trisyllabic @deva[यमुना] → @deva[यामुनः] (by @deva[अण्] @ref[4.1.113], not @deva[ढक्]).
"""

advanced = """
This @[sūtra] provides @deva[ढक्] for dissyllabic @deva[स्त्रीप्रत्ययान्त] words, debarring @deva[अण्] @ref[4.1.113]: @deva[दात्तेयः], @deva[गौपेयः]. Exclusion: @deva[त्र्यच्]—@deva[यमुना] (3 syllables) → @deva[यामुनः] (@deva[अण्]).
"""

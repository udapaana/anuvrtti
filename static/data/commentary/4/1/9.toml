id = "4.1.9"
numericId = "41009"

[en]
simple = """
When referring to a @deva[ऋच्] (Vedic verse), @deva[टाप्] (not @deva[ङीप्]) is used after @deva[पाद्]-ending stems. Example: @deva[द्विपदा] @deva[ऋक्] (a @[two-pāda] verse), not @deva[द्विपदी].
"""

standard = """
When a @deva[पाद्]-ending compound denotes a @deva[ऋच्] (Vedic verse), @deva[टाप्] applies instead of @deva[ङीप्]. Thus: @deva[द्विपदा] @deva[ऋक्] (two-quarter verse), @deva[त्रिपदा] @deva[ऋक्], @deva[चतुष्पदा] @deva[ऋक्]. This overrides the option in @ref[4.1.8]. But for a woman: @deva[द्विपदी] @deva[देवदत्ता] (@[devadattā] having two feet).
"""

advanced = """
This @[sūtra] mandates @deva[टाप्] (not @deva[ङीप्]) for @deva[पादन्त] stems when denoting @deva[ऋच्] (@[ṛgvedic] verses). This is a @deva[नियम] restricting @ref[4.1.8]'s option. Forms: @deva[द्विपदा ऋक्], @deva[त्रिपदा ऋक्], @deva[चतुष्पदा ऋक्]. The restriction: @deva[ऋचि] 'when denoting a @[ṛk]'—for other meanings (like 'having feet'), @ref[4.1.8]'s option applies: @deva[द्विपदी देवदत्ता].
"""

id = "4.1.85"
numericId = "41085"

[en]
simple = """
The affix @deva[ण्य] comes after @deva[दिति], @deva[अदिति], @deva[आदित्य], and @deva[पति]-ending words. Examples: @deva[दैत्यः] (son of Diti), @deva[आदित्यः], @deva[प्राजापत्यम्].
"""

standard = """
In @deva[प्राग्दीव्यतीय] senses, @deva[ण्य] comes after: (1) @deva[दिति] → @deva[दैत्यः]; (2) @deva[अदिति] → @deva[आदित्यः]; (3) @deva[आदित्य] → @deva[आदित्यम्]; (4) @deva[पत्यन्त] words → @deva[प्राजापत्यम्], @deva[सैनापत्यम्]. @[vārtikas]: @deva[यम] → @deva[याम्यम्]; Vedic @deva[वाच्], @deva[मति], @deva[पितृमत्] → @deva[वाच्यम्], @deva[मात्यम्], @deva[पैतृमत्यम्]; @deva[पृथिवी] → @deva[ञ्] or @deva[अञ्] → @deva[पार्थिव] (feminine @deva[पार्थिवा] by @ref[4.1.4] or @deva[पार्थिवी] by @ref[4.1.15]); @deva[देव] → @deva[यञ्] or @deva[अञ्] → @deva[दैव्यम्] or @deva[दैवम्]; @deva[बहिस्] → @deva[टि]-elision + @deva[यञ्] → @deva[बाह्यः], or @deva[ईकक्] → @deva[बाहीकः]. These affixes debar other @deva[प्राग्दीव्यतीय] affixes by @deva[विप्रतिषेध].
"""

advanced = """
This @[sūtra] provides @deva[ण्य] for @deva[दित्यादि] and @deva[पत्यन्त] in @deva[प्राग्दीव्यतीय] senses. @deva[दैत्यः], @deva[आदित्यः], @deva[आदित्यम्], @deva[प्राजापत्यम्], @deva[सैनापत्यम्]. @[vārtikas]: @deva[यमाच्च] → @deva[याम्यम्]; @deva[छन्दसि वाङ्मतिपितृमद्भ्यः] → @deva[वाच्यम्], @deva[मात्यम्], @deva[पैतृमत्यम्]; @deva[पृथिव्य ञाञौ] → @deva[पार्थिव] (feminine by @ref[4.1.4] vs. @ref[4.1.15]); @deva[देवाद्यञञौ] → @deva[दैव्यम्]/@deva[दैवम्]; @deva[बहिषस्टेर्लोपो यञ्च] → @deva[बाह्यः]; @deva[ईककश्च] → @deva[बाहीकः]; @deva[छन्दस्यीकञ्] → @deva[बाहीकः] (different accent by @ref[6.1.197]). These debar specialized @deva[प्राग्दीव्यतीय] affixes. Note: @deva[दैतेयः] is from @deva[दिती] (feminine of @deva[दिति] by @deva[ङीष्] @ref[4.1.45]) + @deva[ढक्].
"""

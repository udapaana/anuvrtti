id = "4.1.40"
numericId = "41040"

[en]
simple = """
Other color words ending in @deva[अनुदात्त]-accented vowels (those not covered by the previous rule) take @deva[ङीष्]. Example: @deva[सारङ्गी] (spotted), @deva[कल्माषी], @deva[शबली].
"""

standard = """
Color-denoting stems ending in @deva[अनुदात्त]-vowel that don't have penultimate @deva[त्] (thus not governed by @ref[4.1.39]) take @deva[ङीष्]. The difference from @deva[ङीप्] is accent: @deva[ङीप्] is @deva[अनुदात्त] (@ref[3.1.4]); @deva[ङीष्] is @deva[उदात्त]. Forms: @deva[सारङ्गी], @deva[कल्माषी], @deva[शबली]. Non-color words: @deva[खट्वा] (bedstead—not color). Non-@deva[अनुदात्तान्त]: @deva[कृष्णा], @deva[कपिला] (take @deva[टाप्]).
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for @deva[वर्णवचन] @deva[अनुदात्तान्त] stems not governed by @ref[4.1.39] (i.e., non-@deva[तोपध]). The @deva[वा] of @ref[4.1.38] doesn't extend here—this is obligatory. @deva[ङीष्] vs. @deva[ङीप्]: accent difference (@deva[ङीप्] = @deva[अनुदात्त] by @ref[3.1.4]; @deva[ङीष्] = @deva[उदात्त]). Examples: @deva[सारङ्गी], @deva[कल्माषी], @deva[शबली]. Exclusions: non-@deva[वर्ण] (@deva[खट्वा]); non-@deva[अनुदात्तान्त] (@deva[कृष्णा], @deva[कपिला]).
"""

id = "4.1.102"
numericId = "41102"

[en]
simple = """
The words @deva[शरद्वत्], @deva[शुनक], @deva[दर्भ] take @deva[फक्] for @deva[गोत्र] meaning when they denote descendants of @deva[भृगु], @deva[वत्स], @deva[अग्रायण] respectively. Examples: @deva[शारद्वतायनः] = @deva[भार्गवः].
"""

standard = """
Three words take @deva[फक्] for @deva[गोत्र] with specific clan restrictions: @deva[शरद्वत्] (when meaning @deva[भृगु] descendant) → @deva[शारद्वतायनः] = @deva[भार्गवः], otherwise @deva[शारद्वतः] (by @deva[अञ्]); @deva[शुनक] (when meaning @deva[वत्स] descendant) → @deva[शौनकायनः] = @deva[वात्स्यः], otherwise @deva[शौनकः]; @deva[दर्भ] (when meaning @deva[अग्रायण] descendant) → @deva[दार्भायणः] = @deva[आग्रायणः], otherwise @deva[दार्भिः] (by @deva[इञ्] @ref[4.1.95]). @deva[शरद्वत्] and @deva[शुनक] belong to @deva[बिदादि], so would take @deva[अञ्] by @ref[4.1.104]—this @[sūtra] overrides in specified cases.
"""

advanced = """
This @[sūtra] provides @deva[फक्] for @deva[शरद्वत्]/@deva[शुनक]/@deva[दर्भ] with clan-specific @deva[गोत्र] restrictions: @deva[शारद्वतायनः] = @deva[भार्गवः] (else @deva[शारद्वतः] by @deva[अञ्]); @deva[शौनकायनः] = @deva[वात्स्यः] (else @deva[शौनकः]); @deva[दार्भायणः] = @deva[आग्रायणः] (else @deva[दार्भिः] by @deva[इञ्]). @deva[शरद्वत्]/@deva[शुनक] ∈ @deva[बिदादि] would take @deva[अञ्] (@ref[4.1.104])—overridden here.
"""

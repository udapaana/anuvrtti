id = "4.1.63"
numericId = "41063"

[en]
simple = """
The feminine affix @deva[ङीष्] is used after words denoting species (@deva[जाति]) that are not inherently feminine and don't have @deva[य्] as penultimate. Examples: @deva[कुक्कुटी] (hen), @deva[ब्राह्मणी] (@[brāhmaṇa] woman), @deva[वृषली] (@[śūdra] woman).
"""

standard = """
After @deva[जातिवाचक] (species-denoting) words that (1) are not inherently feminine and (2) don't have @deva[य्] as penultimate, @deva[ङीष्] applies. Examples: @deva[कुक्कुटी], @deva[सूकरी], @deva[ब्राह्मणी], @deva[वृषली], @deva[नाडायनी], @deva[कटी] (woman of @deva[कठ]-reading @[brāhmaṇas]), @deva[बह्वृची] (woman of @[ṛgveda-reading] @[brāhmaṇas]). Counter-examples: @deva[मुण्डा] (not @deva[जाति]—just 'shaven'); @deva[मक्षिका] (inherently feminine); @deva[क्षत्रिया] (@deva[य्]-penultimate). @[vārtika]: @deva[गवय], @deva[हय], @deva[मुकय], @deva[मत्स्य], @deva[मनुष्य] take @deva[ङीष्] despite @deva[य्]-penultimate: @deva[गवयी], @deva[हयी], @deva[मनुषी] (@deva[य्] elided by @ref[6.4.150]), @deva[मत्सी] (@deva[य्] elided by @[vārtika]).
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for @deva[जाति]-denoting stems that are @deva[अस्त्रीलिङ्ग] and @deva[अयोपध]. @deva[जाति] definition: @deva[प्रादुर्भावविनाशाभ्यां सत्यस्य युगपद्गुणैः। असर्वलिङ्गां बह्वर्थो तां जातिं कवयो विदुः॥] Exclusions: @deva[मुण्डा] (quality, not @deva[जाति]); @deva[मक्षिका] (inherently feminine); @deva[क्षत्रिया] (@deva[य्]-penultimate). @[vārtika]: @deva[गवयादि] (@deva[गवय], @deva[हय], @deva[मुकय], @deva[मत्स्य], @deva[मनुष्य]) take @deva[ङीष्] despite @deva[य्]-penultimate—these are also @deva[गौरादि] (@ref[4.1.41]). @deva[य्]-elision by @ref[6.4.150] @deva[हलस्तद्धितस्य]; @deva[मत्स्य] by @[vārtika] @deva[मत्स्यस्य ङ्याम्].
"""

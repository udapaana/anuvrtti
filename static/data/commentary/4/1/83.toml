id = "4.1.83"
numericId = "41083"

[en]
simple = """
The affix @deva[अण्] is the default @deva[तद्धित] affix from here until @ref[4.4.2]. Examples: @deva[औपगवः] (descendant of Upagu), @deva[कापटवः] (descendant of @[kapaṭu]).
"""

standard = """
This @deva[अधिकार] establishes @deva[अण्] as the default affix from @ref[4.1.83] to @ref[4.4.2], unless specifically superseded. This may be viewed as @deva[अधिकार], @deva[परिभाषा], or @deva[विधि] @[sūtra]. Applications: @ref[4.1.92] @deva[तस्यापत्यम्] → @deva[औपगवः], @deva[कापटवः]. The affix @deva[अण्] carries various meanings: patronymic (@ref[4.1.92]), 'colored by' (@ref[4.2.1]), sidereal time (@ref[4.1.3]), revealed @[sāmaveda] (@ref[4.1.7]), covered car (@ref[4.2.10]), etc.
"""

advanced = """
This @deva[अधिकारसूत्र] establishes @deva[अण्] as default @deva[प्राग्दीव्यतः] affix (@ref[4.1.83]–@ref[4.4.2]). Its status: @deva[अधिकार], @deva[परिभाषा], or @deva[विधि]. The @deva[अण्] has polyvalent application: @deva[अपत्य] (@ref[4.1.92]), @deva[तेन रक्तम्] (@ref[4.2.1]), @deva[नक्षत्रेण युक्तः] (@ref[4.1.3]), @deva[तेन प्रोक्तम्] (@ref[4.1.7]), @deva[तदस्यास्त्यस्मिन्निति] (@ref[4.2.10]).
"""

id = "4.1.73"
numericId = "41073"

[en]
simple = """
The feminine affix @deva[ङीन्] is used after @deva[शार्ङ्गरव] class words and words ending in @deva[अञ्]. Examples: @deva[शार्ङ्गरवी], @deva[कापटवी], @deva[बैदी], @deva[और्वी].
"""

standard = """
After @deva[शार्ङ्गरवादि]-class words and @deva[अञ्]-ending words (denoting @deva[जाति]), @deva[ङीन्] applies instead of @deva[ङीष्]. Thus @deva[शार्ङ्गरवी], @deva[कापटवी], @deva[बैदी] (female descendant of @deva[बिद]), @deva[और्वी]. The difference between @deva[ङीष्] and @deva[ङीन्] is accent only—forms are identical. @deva[ङीन्]-formed words have @deva[आद्युदात्त] accent by @ref[6.1.197]; @deva[ङीष्]-formed words have accent on the affix. Thus @deva[बैदी] (descendant) vs. @deva[बैदी] (wife of @deva[बैद])—same form, different accent. This rule debars @deva[ङीष्] of @ref[4.1.63] for @deva[जाति]-words but not the @deva[पुंयोग]-@deva[ङीष्] of @ref[4.1.48].
"""

advanced = """
This @[sūtra] provides @deva[ङीन्] for @deva[शार्ङ्गरवादि] and @deva[अञन्त] @deva[जातिवाचक] words, debarring @deva[ङीष्]. @deva[शार्ङ्गरवी], @deva[कापटवी]; @deva[बैदी], @deva[और्वी]. Difference: accent only. @deva[ङीन्] → @deva[आद्युदात्त] (@ref[6.1.197] @deva[ञ्नित्यादिर्नित्यम्]); @deva[ङीष्] → affix-accent. Thus @deva[बैदी] (descendant) vs. @deva[बैदी] (wife)—homophonous, different @deva[स्वर]. This debars @deva[जाति]-@deva[ङीष्] (@ref[4.1.63]) but not @deva[पुंयोग]-@deva[ङीष्] (@ref[4.1.48]). @deva[शार्ङ्गरवादि] list includes: @deva[शार्ङ्गरव], @deva[कापटव], @deva[गौग्गुलव], @deva[ब्राह्मण], @deva[बैद], @deva[गौतम] (by @deva[अण्]); @deva[कामण्डलेय], @deva[ब्राह्मकृतेय] (by @deva[ढक्]/@deva[ढञ्]); @deva[वात्स्यायन], @deva[मौञ्जायन] (by @deva[फक्]); @deva[नृ], @deva[नर] (take @deva[वृद्धि]: @deva[नारी]).
"""

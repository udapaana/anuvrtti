id = "4.1.52"
numericId = "41052"

[en]
simple = """
After @deva[बहुव्रीहि] compounds ending in a @deva[क्त]-formed word with final @deva[उदात्त] accent, @deva[ङीष्] is used (when the first member is a body-part word). Example: @deva[शंखभिन्नी] (having a cracked temple-bone), @deva[ऊरुभिन्नी], @deva[केशलूनी].
"""

standard = """
@[bahuvrīhi] compounds ending in @deva[क्त]-participles with final @deva[उदात्त] accent take @deva[ङीष्] when the first member is a @deva[स्वाङ्ग] (body-part) word. Examples: @deva[शंखभिन्नी], @deva[ऊरुभिन्नी], @deva[गलकोत्कृन्नी], @deva[केशलूनी]. The @deva[निष्ठा] (@deva[क्त]) stands second by @[vārtika] @deva[जातिकालसुखादिश्यः परवचनम्] under @ref[2.2.36]. Final @deva[उदात्त] comes from @ref[6.2.170]. Not for @[tatpuruṣa]: @deva[पादपतिता] (ablative @[tatpuruṣa] @ref[2.2.38], accent by @ref[6.2.144]). @[vārtikas]: prohibition for @deva[जात]: @deva[दन्तजाता], @deva[स्तनजाता]; @deva[पाणिगृहीती] only for @deva[अग्निसाक्षिक] marriage (otherwise @deva[पाणिगृहीता] = concubine); exceptions for @deva[बहु]/@deva[नञ्]/@deva[सु]/@deva[काल]/@deva[सुख]-initial: @deva[बहुकृता], @deva[अकृता], @deva[मासजाता], etc.
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for @deva[बहुव्रीहि] @deva[क्तान्त] compounds with @deva[अन्तोदात्त] accent when first member is @deva[स्वाङ्ग]. @deva[स्वाङ्ग]-initial examples: @deva[शंखभिन्नी], @deva[ऊरुभिन्नी] (@deva[शंख]/@deva[ऊरु] are @deva[जाति] words with final @deva[उदात्त] by @ref[6.2.170]). @deva[निष्ठा] position: second by @[vārtika] under @ref[2.2.36]. Exclusion: @[tatpuruṣa] @deva[पादपतिता] (@ref[2.2.38], @ref[2.1.32]; accent by @ref[6.2.144]). @[vārtikas]: (1) @deva[जात]-prohibition: @deva[दन्तजाता], @deva[स्तनजाता]; (2) @deva[पाणिगृहीत्यादि]-specific senses: @deva[पाणिगृहीती] for @deva[अग्निसाक्षिक] marriage, @deva[पाणिगृहीता] otherwise; (3) @deva[बहु]/@deva[नञ्]/@deva[सु]/@deva[काल]/@deva[सुखादि]-initial exceptions: @deva[बहुकृता], @deva[अकृता], @deva[सुकृता], @deva[मासजाता], @deva[संवत्सरजाता], @deva[सुखजाता]. Final @deva[उदात्त] per @ref[6.2.170] ff.
"""

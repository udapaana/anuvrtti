id = "4.1.79"
numericId = "41079"

[en]
simple = """
For non-principal @deva[गोत्र] words (family names, not famous lineages), @deva[ष्यङ्] replaces @deva[अण्]/@deva[इञ्] even without heavy penultimate. Examples: @deva[पौणिक्या], @deva[भौणिक्या], @deva[मौखर्या].
"""

standard = """
For @deva[गोत्रावयव] (= @deva[अवयवगोत्र] or @deva[अप्रधानगोत्र]—minor lineages not in @deva[प्रवराध्याय], technically called @deva[कुल]), @deva[ष्यङ्] substitutes for @deva[अण्]/@deva[इञ्] without requiring heavy penultimate. Forms: @deva[पौणिक्या], @deva[भौणिक्या], @deva[मौखर्या]. The word @deva[अवयव] has various senses: 'separate from', 'part of', 'individual members'. If 'immediate descendant' sense is taken: @deva[दैवदत्त्या], @deva[याज्ञदत्त्या] (also explainable via @deva[कौड्यादि] @ref[4.1.80]).
"""

advanced = """
This @[sūtra] extends @deva[ष्यङ्]-substitution to @deva[गोत्रावयव] (= @deva[अप्रधानगोत्र], @deva[कुलाख्या]—families like @deva[पुणिक], @deva[भुणिक], @deva[मुखर] not in @deva[प्रवर] lists). The @deva[गुरूपोत्तम] condition doesn't apply here. @deva[गोत्रावयव] = @deva[अवयवगोत्र] (@[karmadhāraya])—@deva[गोत्र]s not in @deva[प्रवराध्याय], technically @deva[कुल]. Forms: @deva[पौणिक्या], @deva[भौणिक्या], @deva[मौखर्या]. If @deva[अवयव] = 'immediate descendant': @deva[दैवदत्त्या], @deva[याज्ञदत्त्या].
"""

id = "4.1.157"
numericId = "41157"

[en]
simple = """
According to Northern Grammarians, after @deva[वृद्ध] (@deva[वृद्धि]-initial) non-@deva[गोत्र] words, @deva[फिञ्] is used. Examples: @deva[आम्रगुप्तायनिः], @deva[नापितायनिः].
"""

standard = """
According to @deva[उदीचाम्] (Northern Grammarians), after @deva[वृद्ध] (@deva[वृद्धि] in first syllable) words that are not @deva[गोत्र]-names, @deva[फिञ्] is used: @deva[आम्रगुप्तायनिः] (son of @[āmragupta]), @deva[ग्रामरक्षायणिः] (son of @[grāmarakṣa]), @deva[नापितायनिः] (son of barber—despite @ref[4.1.152], @ref[1.4.2] applies). Conditions: (1) Northern Grammarians—otherwise @deva[आम्रगुप्तिः]; (2) @deva[वृद्धि]-initial—@deva[याज्ञदत्तिः] (@deva[यज्ञदत्त] lacks @deva[वृद्धि]); (3) non-@deva[गोत्र]—@deva[औपगविः] (@deva[गोत्र]-name).
"""

advanced = """
This @[sūtra] provides @deva[फिञ्] (@deva[उदीचाम्]) for @deva[वृद्ध अगोत्र] words: @deva[आम्रगुप्तायनिः], @deva[ग्रामरक्षायणिः], @deva[नापितायनिः] (@ref[1.4.2] overrides @ref[4.1.152]). Exclusions: non-@deva[उदीचाम्] → @deva[आम्रगुप्तिः]; non-@deva[वृद्ध] → @deva[याज्ञदत्तिः]; @deva[गोत्र] → @deva[औपगविः].
"""

id = "4.1.108"
numericId = "41108"

[en]
simple = """
The word @deva[वतण्ड] takes @deva[यञ्] for @deva[गोत्र] meaning when it specifically denotes a descendant of @deva[अङ्गिरस्]. Example: @deva[वातण्ड्यः] (@[āṅgirasa]).
"""

standard = """
After @deva[वतण्ड], @deva[यञ्] applies only for @deva[आङ्गिरस] descendants: @deva[वतण्ड] + @deva[यञ्] = @deva[वातण्ड्यः]. Otherwise @deva[वातण्डः] (by @deva[अण्] from @deva[शिवादि] @ref[4.1.112]). The word @deva[वतण्ड] appears in both @deva[गर्गादि] (@ref[4.1.105]) and @deva[शिवादि] (@ref[4.1.112])—this @[sūtra] specifies that when meaning @deva[आङ्गिरस], @deva[यञ्] overrides @deva[अण्]. When not meaning @deva[आङ्गिरस], both @deva[वातंड्यः] and @deva[वातंडः] are possible.
"""

advanced = """
This @[sūtra] provides @deva[यञ्] for @deva[वतण्ड] specifically in @deva[आङ्गिरस] context: @deva[वातण्ड्यः]. @deva[वतण्ड] ∈ @deva[गर्गादि] (@ref[4.1.105]) and @deva[शिवादि] (@ref[4.1.112]), so would take @deva[अञ्] or @deva[अण्]. This @[sūtra]: @deva[आङ्गिरस] → only @deva[यञ्]; @[non-āṅgirasa] → both @deva[वातंड्यः] (@deva[यञ्]) and @deva[वातंडः] (@deva[अण्]).
"""

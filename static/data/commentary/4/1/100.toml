id = "4.1.100"
numericId = "41100"

[en]
simple = """
The @deva[हरित] class words (a subdivision of @deva[बिदादि]) take @deva[फक्] when they already end in @deva[अञ्]. Example: @deva[हारितायनः] (son/great-grandson of @[hārita]).
"""

standard = """
The @deva[हरितादि] words form a subdivision of @deva[बिदादि] (@ref[4.1.104]). They first take @deva[अञ्] for @deva[गोत्र], then @deva[फक्] for the next generation. @deva[हरित] + @deva[अञ्] = @deva[हारितः] (@deva[गोत्र]); @deva[हारित] + @deva[फक्] = @deva[हारितायनः] (son or great-grandson). This @deva[फक्] functions as a @deva[युवन्] affix, since by @ref[4.1.98] only one @deva[गोत्र] affix can be added, and @deva[हारित] already has @deva[अञ्].
"""

advanced = """
This @[sūtra] provides @deva[फक्] for @deva[हरितादि] (a @deva[बिदादि] subset) when already formed with @deva[अञ्] (@ref[4.1.104]). @deva[हरित] + @deva[अञ्] = @deva[हारितः] (@deva[गोत्र]); @deva[हारित] + @deva[फक्] = @deva[हारितायनः]. This @deva[फक्] has @deva[युवन्] force (not @deva[गोत्र]), since @ref[4.1.98] allows only one @deva[गोत्र] affix, and @deva[हारित] already bears @deva[अञ्].
"""

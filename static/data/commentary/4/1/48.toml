id = "4.1.48"
numericId = "41048"

[en]
simple = """
When a word designates a woman by her connection with her husband (rather than by her own qualities), the feminine affix @deva[ङीष्] (ṅīṣ) is used. For instance, @deva[गणकी] (gaṇakī) means "wife of an astrologer" (@deva[गणक], gaṇaka), and @deva[महामात्री] (mahāmātrī) means "wife of a chief minister." The key word is @deva[आख्यायाम्] (ākhyāyām, "as a designation") — the woman receives a title from her husband's role. Compare @deva[गणका] (gaṇakā, a female astrologer herself), which takes @deva[टाप्] instead.
"""

standard = """
The affix @deva[ङीष्] applies when the feminine word is a @deva[पुंयोग]-derived @deva[आख्या] (designation arising from connection with a male, specifically a husband). Thus @deva[गणकी] (wife of @deva[गणक], astrologer), @deva[महामात्री] (wife of chief minister), @deva[प्रष्ठी], @deva[प्रचरी]. When the woman herself possesses the quality: @deva[गणका] (female astrologer) — @deva[टाप्], not @deva[ङीष्]. The specification @deva[आख्यायाम्] excludes @deva[पुंयोग] in the sense of "result of union with a male" (i.e., pregnancy): forms like @deva[परिसृष्टा] and @deva[प्रजाता] take @deva[टाप्]. A @[vārtika] notes exceptions: @deva[गोपालिक] and similar words take @deva[टाप्] even for wife-sense: @deva[गोपालिका] (cowherd's wife).
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for @deva[पुंयोग]-derived @deva[आख्या] — a designation for the woman based on her husband's status. The term @deva[आख्यायाम्] is critical: it restricts @deva[पुंयोग] to naming/title, excluding the physical sense of "result of male union" (pregnancy). Thus @deva[गणकी] (wife of astrologer) vs. @deva[गणका] (female astrologer); @deva[परिसृष्टा], @deva[प्रजाता] take @deva[टाप्] (pregnancy-related, not designation). @[vārtika]: @deva[गोपालिकादि]-class takes @deva[टाप्] even for wife-sense: @deva[गोपालिका]. Another @[vārtika]: @deva[सूर्य] when denoting a celestial wife takes @deva[चाप्]: @deva[सूर्या] (divine wife, with final @deva[उदात्त]) vs. @deva[सूर्यी] (human wife, by @deva[ङीष्] under this rule). The @deva[चाप्] produces @deva[अन्तोदात्त] accent by @ref[6.1.163].
"""

id = "4.1.169"
numericId = "41169"

[en]
simple = """
After @deva[साल्वेय] and @deva[गान्धारि], @deva[अञ्] (not @deva[ञ्यङ्]) is used. Examples: @deva[साल्वेयः], @deva[गान्धारः] (son/king of @[sālveya]/@[gāndhāri]).
"""

standard = """
After @deva[साल्वेय] and @deva[गान्धारि] (both country names and @[kṣatriya] names), @deva[अञ्] (not @deva[ञ्यङ्] from @ref[4.1.171]) is used, though they have @deva[वृद्धि] in first syllable: @deva[साल्वेयः] (son/king of @[sālveya]), @deva[गान्धारः] (son/king of @[gāndhāri]). The @[vārtika] @deva[तस्य राजनि] applies—affix also denotes 'king thereof'.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] (debarring @deva[ञ्यङ्] @ref[4.1.171] despite @deva[वृद्धि]) for @deva[साल्वेय]/@deva[गान्धारि]: @deva[साल्वेयः], @deva[गान्धारः]. @[vārtika] @deva[तस्य राजनि] applies.
"""

id = "4.1.130"
numericId = "41130"

[en]
simple = """
According to Northern Grammarians, @deva[गोधा] takes @deva[आरक्] for descendant meaning. Example: @deva[गौधारः]. By implication, @deva[जड] and @deva[पण्ड] also take @deva[आरक्].
"""

standard = """
According to @deva[उदीचाम्] (Northern Grammarians), @deva[गोधा] takes @deva[आरक्]: @deva[गौधारः]. The @deva[आ] in @deva[आरक्] might seem redundant (since @deva[गोधा] ends in @deva[आ]), but its inclusion by @[pāṇini] implies other words also take this affix, where @deva[रक्] alone wouldn't suffice. By implication: @deva[जड] → @deva[जाडारः], @deva[पण्ड] → @deva[पाण्डारः]. The mention of Northern Grammarians shows respect.
"""

advanced = """
This @[sūtra] provides @deva[आरक्] for @deva[गोधा] (@deva[उदीचाम्]): @deva[गौधारः]. @deva[ज्ञापक]: @deva[आ] in @deva[आरक्] indicates extension to @deva[अकारान्त] words where @deva[रक्] alone fails—@deva[जाडारः] (@deva[जड]), @deva[पाण्डारः] (@deva[पण्ड]). @deva[उदीचां ग्रहणम्] = @deva[आदरार्थम्].
"""

id = "4.1.138"
numericId = "41138"

[en]
simple = """
After @deva[क्षत्र], @deva[घ] is used for descendant meaning. @deva[क्षत्रियः] means 'a @[kṣatriya]' (class name). The son of @deva[क्षत्र] is @deva[क्षात्रिः].
"""

standard = """
After @deva[क्षत्र], @deva[घ] (= @deva[इय]) is used: @deva[क्षत्र] + @deva[घ] = @deva[क्षत्रियः] ('a @[kṣatriya]'). This is a class/caste name, not a patronymic. The actual son of @deva[क्षत्र] would be @deva[क्षात्रिः] (by @deva[इञ्]). Note: this @deva[घ] should not be confused with the technical @deva[घ] meaning @deva[तरप्]/@deva[तमप्] (@ref[1.1.22]).
"""

advanced = """
This @[sūtra] provides @deva[घ] (= @deva[इय]) for @deva[क्षत्र]: @deva[क्षत्रियः] = @deva[जातिसंज्ञा] (caste name). Actual @deva[अपत्य]: @deva[क्षात्रिः] (@deva[इञ्]). Caution: @deva[घ] here ≠ technical @deva[घ] (@deva[तरप्]/@deva[तमप्], @ref[1.1.22]).
"""

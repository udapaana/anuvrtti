id = "4.1.153"
numericId = "41153"

[en]
simple = """
According to Northern Grammarians, @deva[इञ्] applies after @deva[सेनान्त], @deva[लक्षण], and artisan words. Examples: @deva[हारिषेणिः], @deva[लाक्षणिः], @deva[तान्तुवायिः].
"""

standard = """
According to @deva[उदीचाम्] (Northern Grammarians), @deva[इञ्] (not @deva[ण्य]) is used after @deva[सेनान्त], @deva[लक्षण], and artisan words: @deva[हारिषेणिः], @deva[लाक्षणिः], @deva[तान्तुवायिः], @deva[कौम्भकारिः]. Note: @deva[तक्षन्] (carpenter) ∈ @deva[शिवादि] (@ref[4.1.112]) → @deva[ताक्ष्णः] (@deva[अण्]) or @deva[ताक्ष्ण्यः] (@deva[ण्य]), but not @deva[इञ्]. @deva[नापित] (@deva[वृद्ध], non-@deva[गोत्र]) → @deva[नापितायनिः] (@deva[फिञ्] @ref[4.1.157] per Northern Grammarians).
"""

advanced = """
This @[sūtra] provides @deva[इञ्] (@deva[उदीचाम्]) for @deva[सेनान्त]/@deva[लक्षण]/@deva[कारि]: @deva[हारिषेणिः], @deva[लाक्षणिः], @deva[तान्तुवायिः], @deva[कौम्भकारिः]. Exclusion: @deva[तक्षन्] (@ref[4.1.112]) → @deva[ताक्ष्णः]/@deva[ताक्ष्ण्यः], not @deva[इञ्]. @deva[नापित] (@deva[वृद्ध] @deva[अगोत्र]) → @deva[नापितायनिः] (@deva[फिञ्] @ref[4.1.157], @deva[उदीचाम्]).
"""

id = "4.1.109"
numericId = "41109"

[en]
simple = """
In the feminine, @deva[यञ्] is elided after @deva[वतण्ड] when denoting a female descendant of @deva[अङ्गिरस्]. The feminine is @deva[वतण्डी].
"""

standard = """
When forming the feminine of @deva[वातण्ड्य] (@[āṅgirasa] descendant), @deva[यञ्] is elided by @deva[लुक्], and @deva[ङीन्] (@ref[4.1.73]) is added: @deva[वातण्ड्य] → @deva[वतण्ड] + @deva[ङीन्] = @deva[वतण्डी]. When not meaning @deva[आङ्गिरस], the feminine is @deva[वातंड्यायनी] (by @deva[ष्फ] under @deva[लोहितादि] @ref[4.1.18]). When @deva[वतण्ड] takes @deva[अण्] from @deva[शिवादि], feminine = @deva[वातण्डी] (no @deva[ष्यङ्] substitution @ref[4.1.78] since @deva[वतण्ड] is a @deva[ऋषि] name).
"""

advanced = """
This @[sūtra] elides @deva[यञ्] by @deva[लुक्] in feminine for @deva[वातण्ड्य] (@[āṅgirasa]): @deva[वातण्ड्य] + @deva[ङीन्] (@ref[4.1.73]) = @deva[वतण्डी]. @[non-āṅgirasa]: @deva[वातंड्यायनी] (@deva[ष्फ] @ref[4.1.18]). @deva[अण्]-formed @deva[वातण्ड]: feminine @deva[वातण्डी] (no @deva[ष्यङ्] @ref[4.1.78]—@deva[ऋषिशब्द]).
"""

id = "4.1.80"
numericId = "41080"

[en]
simple = """
The @deva[क्रौडि] class words take @deva[ष्यङ्] in the feminine (even without heavy penultimate or @deva[अण्]/@deva[इञ्]]). Examples: @deva[क्रौड्या], @deva[लाड्या].
"""

standard = """
After @deva[क्रौड्यादि] words, @deva[ष्यङ्] applies in the feminine even when conditions of @ref[4.1.78] aren't met (non-heavy penultimate, not @deva[अण्]/@deva[इञ्]-formed). Here @deva[ष्यङ्] is an augment, not a substitute. Forms: @deva[क्रौड्या], @deva[लाड्या]. The list includes: @deva[इञ्]-formed (@deva[क्रौडि], @deva[लाडि], @deva[व्याडि], @deva[आपिशालि], @deva[आपक्षिति]); @deva[अण्]-formed (@deva[चौपयत], @deva[चैटयत], @deva[सैकयत], @deva[वैल्वयत]); @deva[सौधातकि] (by @deva[इञ्] with @deva[अकङ्]-substitute @ref[4.1.97]). Special cases: @deva[सूत] takes @deva[ष्यङ्] for grown-up maiden (@deva[सूत्या]), otherwise @deva[टाप्] or @deva[ङीष्]; @deva[भोज] takes @deva[ष्यङ्] for @deva[क्षत्रिय] sense (@deva[भोज्या]).
"""

advanced = """
This @[sūtra] provides @deva[ष्यङ्] (as augment, not substitute) for @deva[क्रौड्यादि] regardless of @ref[4.1.78] conditions. @deva[क्रौड्या], @deva[लाड्या]. List: @deva[इञन्त]—@deva[क्रौडि], @deva[लाडि], @deva[व्याडि], @deva[आपिशालि], @deva[आपक्षिति]; @deva[अण्न्त]—@deva[चौपयत], @deva[चैटयत], @deva[सैकयत], @deva[वैल्वयत]; @deva[सौधातकि] (@deva[इञ्] + @deva[अकङ्] @ref[4.1.97]). Conditions: @deva[सूत युवत्याम्]—@deva[सूत्या] for mature maiden; @deva[भोज क्षत्रिये]—@deva[भोज्या] for @deva[क्षत्रिय] woman. @deva[गौकाक्ष्य] (@deva[गर्गादि] @deva[यञन्त]) also included.
"""

id = "4.1.145"
numericId = "41145"

[en]
simple = """
After @deva[भ्रातृ], @deva[व्यत्] applies when the meaning is 'enemy' (not descendant). Example: @deva[भ्रातृव्यः] (enemy).
"""

standard = """
After @deva[भ्रातृ], @deva[व्यत्] applies when the meaning is @deva[सपत्न] (enemy), not descendant: @deva[भ्रातृव्यः कण्टकः] ('the enemy is a thorn'); @deva[पाप्मना भ्रातृव्येण] ('by the sinful enemy'). The difference between @deva[व्यन्] and @deva[व्यत्] is in accent (@ref[6.1.185], @ref[6.1.197]).
"""

advanced = """
This @[sūtra] provides @deva[व्यत्] for @deva[भ्रातृ] in @deva[सपत्नार्थ] (enemy), not @deva[अपत्यार्थ]: @deva[भ्रातृव्यः] = enemy. @deva[व्यन्] vs. @deva[व्यत्] differs in @deva[स्वर] (@ref[6.1.185], @ref[6.1.197]).
"""

id = "4.1.106"
numericId = "41106"

[en]
simple = """
The words @deva[मधु] and @deva[बभ्रु] take @deva[यञ्] for @deva[गोत्र] meaning when they specifically denote @deva[ब्राह्मण] and @deva[कौशिक] respectively. Examples: @deva[माधव्यः] (@[brāhmaṇa]), @deva[बाभ्रव्यः] (@[kauśika]).
"""

standard = """
This @[sūtra] restricts when @deva[मधु] and @deva[बभ्रु] take @deva[यञ्]: @deva[मधु] + @deva[यञ्] = @deva[माधव्यः] only when meaning @deva[ब्राह्मण], otherwise @deva[माधवः] (by @deva[अण्]); @deva[बभ्रु] + @deva[यञ्] = @deva[बाभ्रव्यः] only when meaning @deva[कौशिक], otherwise @deva[बाभ्रवः]. The word @deva[बभ्रु] also appears in @deva[गर्गादि] (@ref[4.1.105]); this @[sūtra] specifies when @deva[यञ्] applies. Its inclusion in @deva[लोहितादि] subclass allows @deva[ष्फ] for feminine: @deva[बाभ्रव्यायणी].
"""

advanced = """
This @deva[नियमसूत्र] restricts @deva[यञ्] for @deva[मधु]/@deva[बभ्रु]: @deva[माधव्यः] = @deva[ब्राह्मणः] (else @deva[माधवः]); @deva[बाभ्रव्यः] = @deva[कौशिकः] (else @deva[बाभ्रवः]). @deva[बभ्रु] ∈ @deva[गर्गादि] takes @deva[यञ्] by @ref[4.1.105] anyway; this @[sūtra] specifies @deva[कौशिक]-condition. Being ∈ @deva[लोहितादि] enables @ref[4.1.18] for feminine @deva[ष्फ]: @deva[बाभ्रव्यायणी]. Better @[gaṇapāṭha] reading: @deva[बभ्रु कौशिके].
"""

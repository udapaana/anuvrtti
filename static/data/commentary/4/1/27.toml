id = "4.1.27"
numericId = "41027"

[en]
simple = """
After @deva[बहुव्रीहि] compounds beginning with a numeral and ending in @deva[दामन्] (rope) or @deva[हायन] (year), @deva[ङीप्] is used. Example: @deva[द्विदाम्नी] (bound by two ropes), @deva[द्विहायनी] (two years old).
"""

standard = """
@[bahuvrīhi] compounds with @deva[संख्या]-initial and final @deva[दामन्] or @deva[हायन] take @deva[ङीप्]. @deva[दामन्] would be subject to @ref[4.1.13] (@deva[डाप्]), @ref[4.1.11] (prohibition), and @ref[4.1.28] (optional @deva[ङीप्])—this @[sūtra] mandates @deva[ङीप्]: @deva[द्विदाम्नी], @deva[त्रिदाम्नी]. @deva[हायन] would take @deva[टाप्] (@ref[4.1.4])—here @deva[ङीप्]: @deva[द्विहायनी], @deva[त्रिहायणी]. @[vārtika]: @deva[हायन] must denote age for this rule; otherwise: @deva[द्विहायना शाला] (hall of two years' existence). Also, @deva[ण]-substitution for @deva[न] only occurs when @deva[हायन] denotes age.
"""

advanced = """
This @[sūtra] mandates @deva[ङीप्] for @deva[संख्यापूर्व]-@[bahuvrīhis] ending in @deva[दामन्] or @deva[हायन]. For @deva[दामन्]: overrides @ref[4.1.13] (@deva[डाप्]), @ref[4.1.11] (@deva[मनन्त]-prohibition), @ref[4.1.28] (optional): @deva[द्विदाम्नी], @deva[त्रिदाम्नी]. For @deva[हायन]: overrides @deva[टाप्] (@ref[4.1.4]): @deva[द्विहायनी], @deva[त्रिहायणी], @deva[चतुर्हायणी]. @[vārtika]: @deva[वयसि हायनम्]—@deva[हायन] must denote age; non-age: @deva[द्विहायना शाला] (two-year-old hall). The @deva[न] → @deva[ण] change also requires age-sense.
"""

id = "4.1.104"
numericId = "41104"

[en]
simple = """
The @deva[बिद] class words take @deva[अञ्] for @deva[गोत्र] meaning. But for non-@deva[ऋषि] words in this class, @deva[अञ्] denotes immediate descendant. Examples: @deva[बैदः] (gotra), @deva[पौत्रः] (grandson—immediate).
"""

standard = """
After @deva[बिदादि], @deva[अञ्] is used for @deva[गोत्र]. Special provision: for @deva[अनृषि] (non-sage) words in this class, @deva[अञ्] has @deva[आनन्तर्य] (immediate descendant) force. Thus @deva[पुत्र] (son), @deva[दुहितृ] (daughter), @deva[ननान्दृ] (sister-in-law) are common nouns, not @deva[ऋषि] names: @deva[पुत्र] + @deva[अञ्] = @deva[पौत्रः] (grandson—immediate); @deva[दुहितृ] + @deva[अञ्] = @deva[दौहित्रः] (daughter's son). But for @deva[ऋषि] names: @deva[बिद] + @deva[अञ्] = @deva[बैदः] (grandson or lower). The phrase @deva[अनृष्यानन्तर्ये]: @deva[अनृषि] (ablative, case-elided) + @deva[आनन्तर्य] (= @deva[अनन्तर] with @deva[ष्यङ्]). Alternative reading for @deva[काश्यपानाम्] in @deva[इन्द्रभूः सप्तमः काश्यपानाम्]: @deva[काश्यप] from @deva[अण्] (@ref[4.1.114]).
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[बिदादि] in @deva[गोत्रार्थ], with special @deva[आनन्तर्य] (immediate descendant) sense for @deva[अनृषि] members. @deva[ऋषि]-words: @deva[बैदः] (@deva[गोत्र]); @deva[अनृषि]-words (@deva[पुत्र]/@deva[दुहितृ]/@deva[ननान्दृ]): @deva[पौत्रः], @deva[दौहित्रः] (immediate). Parse: @deva[अनृष्यानन्तर्ये] = @deva[अनृषेः] (ablative, @deva[सुब्लोप]) + @deva[आनन्तर्य] (@deva[अनन्तर] + @deva[ष्यङ्] @deva[स्वार्थे]). Alternative: @deva[काश्यप] takes @deva[अञ्] here, @deva[अण्] by @ref[4.1.114]—both valid. @deva[विश्वामित्र कौशिकः] shows @deva[अञ्] despite unbroken @deva[ऋषि]-succession. @deva[बिद] → @deva[बैदि] by @ref[4.1.96] (∈ @deva[बह्वादि] @deva[आकृतिगण]), not @deva[ऋष्यण्] (@ref[4.1.114]). List: @deva[बिद], @deva[उर्व], @deva[कश्यप], @deva[कुशिक], @deva[भरद्वाज], @deva[उपमन्यु], @deva[आपस्तम्ब], @deva[शरद्वत्], @deva[शुनक], @deva[धेनु], @deva[बिन्दु], @deva[विष्णु], @deva[बुद्ध], @deva[रथीतर], @deva[निषाद], @deva[पुत्र], @deva[दुहितृ], @deva[ननान्दृ], @deva[परस्त्री] (→ @deva[परशु]: @deva[पारशवः]).
"""

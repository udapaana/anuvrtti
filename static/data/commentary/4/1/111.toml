id = "4.1.111"
numericId = "41111"

[en]
simple = """
The word @deva[भर्ग] takes @deva[फञ्] for @deva[गोत्र] meaning when it denotes a @deva[त्रैगर्त] descendant. Example: @deva[भर्गायणः] = @deva[त्रैगर्तः].
"""

standard = """
After @deva[भर्ग], @deva[फञ्] applies only when denoting @deva[त्रैगर्त] (@deva[त्रिगर्त] family): @deva[भर्ग] + @deva[फञ्] = @deva[भर्गायणः] = @deva[त्रैगर्तः]. Otherwise @deva[भार्गिः] (by @deva[इञ्] @ref[4.1.95]). This restricts @deva[फञ्] to a specific clan context.
"""

advanced = """
This @deva[नियमसूत्र] restricts @deva[फञ्] for @deva[भर्ग] to @deva[त्रैगर्त]-context: @deva[भर्गायणः] = @deva[त्रैगर्तः]. Non-Traigarta: @deva[भार्गिः] (@deva[इञ्] @ref[4.1.95]).
"""

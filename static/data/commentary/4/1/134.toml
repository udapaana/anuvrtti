id = "4.1.134"
numericId = "41134"

[en]
simple = """
After @deva[मातृष्वसृ] (mother's sister), @deva[छण्] is added and the final is elided when @deva[ढक्] follows. Examples: @deva[मातृष्वस्रीयः], @deva[मातृष्वसेयः].
"""

standard = """
The rules of @ref[4.1.132] and @ref[4.1.133] also apply to @deva[मातृष्वसृ] (maternal aunt): @deva[मातृष्वस्रीयः] (by @deva[छण्]) or @deva[मातृष्वसेयः] (by @deva[ढक्] with final elision)—son of mother's sister.
"""

advanced = """
This @[sūtra] extends @ref[4.1.132]-@ref[4.1.133] to @deva[मातृष्वसृ]: @deva[मातृष्वस्रीयः] (@deva[छण्]), @deva[मातृष्वसेयः] (@deva[ढक्] with @deva[ऋ]-@deva[लोप]).
"""

id = "4.1.43"
numericId = "41043"

[en]
simple = """
According to Eastern grammarians, the word @deva[शोण] (red/bay) takes @deva[ङीष्] optionally. Example: @deva[शोणी] or @deva[शोणा] @deva[वडवा] (red mare).
"""

standard = """
Per Eastern grammarians (@deva[प्राचाम्]), @deva[शोण] (red/bay color) optionally takes @deva[ङीष्]. Thus: @deva[शोणी वडवा] or @deva[शोणा वडवा]. By Phit. II.10, @deva[शोण] has initial @deva[उदात्त]; by @ref[4.1.40] it would always take @deva[ङीष्]. This @[sūtra] restricts (@deva[नियम]) that to Eastern grammarians' view—others allow optionality.
"""

advanced = """
This @[sūtra] is a @deva[नियम] (restriction) of @ref[4.1.40] for @deva[शोण]. By Phit. II.10 (@deva[वर्णानां...]), @deva[शोण] has initial @deva[उदात्त], thus qualifying for @deva[ङीष्] by @ref[4.1.40]. This @[sūtra] restricts: @deva[ङीष्] is @deva[प्राचाम्] (Eastern view); others permit @deva[शोणी]/@deva[शोणा] alternation.
"""

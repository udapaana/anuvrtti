id = "4.1.156"
numericId = "41156"

[en]
simple = """
After dissyllabic words ending in @deva[अण्] affix, @deva[फिञ्] is used (debarring @deva[इञ्]). Examples: @deva[कार्त्रायणिः], @deva[हार्त्रायणिः].
"""

standard = """
After dissyllabic stems ending in @deva[अण्] affix, @deva[फिञ्] (not @deva[इञ्]) is used: @deva[कार्त्रायणिः] (son of Kartra), @deva[हार्त्रायणिः] (son of Hartra). Conditions: (1) ends in @deva[अण्]—@deva[दाक्षायणः] (@deva[दाक्षि] ends in @deva[इञ्], not @deva[अण्]); (2) dissyllabic—@deva[औपगविः] (trisyllabic @deva[औपगव]). @[vārtika]: pronouns @deva[त्यदादि] optionally take @deva[फिञ्] or @deva[अण्]: @deva[त्यादायनिः] or @deva[त्यादः]; @deva[तादायनिः] or @deva[तादः].
"""

advanced = """
This @[sūtra] provides @deva[फिञ्] (debarring @deva[इञ्]) for @deva[द्व्यच् अणन्त] stems: @deva[कार्त्रायणिः], @deva[हार्त्रायणिः]. Exclusions: non-@deva[अण्]—@deva[दाक्षायणः] (@deva[इञन्त]); non-dissyllabic—@deva[औपगविः]. @[vārtika]: @deva[त्यदादि] + optional @deva[फिञ्]/@deva[अण्]: @deva[त्यादायनिः]/@deva[त्यादः], @deva[तादायनिः]/@deva[तादः].
"""

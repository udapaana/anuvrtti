id = "4.1.81"
numericId = "41081"

[en]
simple = """
The words @deva[दैवयज्ञि], @deva[शौचिवृक्षि], @deva[सात्यमुग्रि], and @deva[काण्ठेविद्धि] optionally take @deva[ष्यङ्]. Examples: @deva[दैवयज्ञ्या] or @deva[दैवयज्ञी].
"""

standard = """
After @deva[दैवयज्ञि], @deva[शौचिवृक्षि], @deva[सात्यमुग्रि], @deva[काण्ठेविद्धि] (all @deva[इञन्त]), @deva[ष्यङ्] is optional. These words end in @deva[इञ्]; the @deva[गोत्र] condition isn't required here. For @deva[गोत्र] descendants, @deva[ष्यङ्] would be compulsory by @ref[4.1.78]; this @[sūtra] makes it optional. If @deva[ष्यङ्] isn't added, @deva[ङीष्] comes by @ref[4.1.65]. Forms: @deva[दैवयज्ञ्या] or @deva[दैवयज्ञी], @deva[शौचिवृक्ष्या] or @deva[शौचिवृक्षी], @deva[सात्यमुग्र्या] or @deva[सात्यमुग्री], @deva[काण्ठेविद्ध्या] or @deva[काण्ठेविद्धी].
"""

advanced = """
This @[sūtra] makes @deva[ष्यङ्] optional for @deva[दैवयज्ञि], @deva[शौचिवृक्षि], @deva[सात्यमुग्रि], @deva[काण्ठेविद्धि] (all @deva[इञन्त]). The @deva[गोत्र] @[anuvṛtti] doesn't apply. For @deva[गोत्र]-sense: @ref[4.1.78] would make @deva[ष्यङ्] obligatory; this provides @deva[विभाषा]. For @deva[आनन्तर्य] (immediate descendant): this is a new rule. Non-@deva[ष्यङ्] option: @deva[ङीष्] by @ref[4.1.65]. Forms: @deva[दैवयज्ञ्या]/@deva[दैवयज्ञी], @deva[शौचिवृक्ष्या]/@deva[शौचिवृक्षी], @deva[सात्यमुग्र्या]/@deva[सात्यमुग्री], @deva[काण्ठेविद्ध्या]/@deva[काण्ठेविद्धी].
"""

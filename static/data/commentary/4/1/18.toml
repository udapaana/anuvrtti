id = "4.1.18"
numericId = "41018"

[en]
simple = """
For words in the @deva[लोहित] sub-class (of @deva[गर्गादि]) up through @deva[कत], the affix @deva[ष्फ] is always (not optionally) used. Example: @deva[लोहित्यायनी], @deva[बाभ्रव्यायनी].
"""

standard = """
The @deva[लोहितादि] words (a subdivision of @deva[गर्गादि] @ref[4.1.105]) through the word @deva[कत] obligatorily take @deva[ष्फ]—the option of @ref[4.1.17] doesn't apply. The @deva[कत] here is the independent @deva[प्रातिपदिक] after @deva[कपि] in the list, not @deva[कुरुकत]. Forms: @deva[लोहित्यायनी], @deva[शांशित्यायनी], @deva[बाभ्रव्यायणी]. @[kārikā] note: For @deva[ष्फ] and @deva[अण्] application, @deva[शकल] (listed after @deva[कण्व]) should be read as before @deva[कण्व] and after @deva[कत], yielding @deva[शाकल्यायनी].
"""

advanced = """
This @[sūtra] makes @deva[ष्फ] obligatory (@deva[नित्य]) for @deva[लोहितादि] through @deva[कत] (subdivision of @deva[गर्गादि]). The @deva[कत] reference is the standalone stem after @deva[कपि], not compounds like @deva[कुरुकत]. The @[kārikā] @deva[कण्वात्तु शकलः पूर्वः कतादुत्तर इष्यते] reorders @deva[शकल] for @deva[ष्फ]/@deva[अण्] purposes: @deva[शाकल्यायनी] (with @deva[ष्फ]), @deva[शकलाः] = @deva[शाकल्यस्येमे छात्राः] (with @deva[अण्]).
"""

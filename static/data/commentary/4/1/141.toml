id = "4.1.141"
numericId = "41141"

[en]
simple = """
After @deva[महाकुल], @deva[अञ्] and @deva[खञ्] optionally apply. Examples: @deva[माहाकुलः], @deva[माहाकुलीनः], @deva[महाकुलीनः].
"""

standard = """
After @deva[महाकुल], @deva[अञ्] and @deva[खञ्] are optional: @deva[माहाकुलः] (by @deva[अञ्]), @deva[माहाकुलीनः] (by @deva[खञ्]). The @deva[ख] of @ref[4.1.139] also applies: @deva[महाकुलीनः] (no @deva[वृद्धि] with @deva[ख]).
"""

advanced = """
This @[sūtra] provides optional @deva[अञ्]/@deva[खञ्] for @deva[महाकुल]: @deva[माहाकुलः] (@deva[अञ्]), @deva[माहाकुलीनः] (@deva[खञ्]). @deva[ख] (@ref[4.1.139]) also: @deva[महाकुलीनः].
"""

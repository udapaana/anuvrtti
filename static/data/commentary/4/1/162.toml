id = "4.1.162"
numericId = "41162"

[en]
simple = """
A descendant who is a grandson or lower is called @deva[गोत्र]. Example: @deva[गार्ग्यः] (gotra-descendant of Garga, starting from grandson).
"""

standard = """
A descendant (@deva[अपत्य]) who is @deva[पौत्रप्रभृति] (grandson or lower) with reference to a person is called @deva[गोत्र]. @deva[गर्ग] → son = @deva[गार्गिः] (not @deva[गोत्र]); @deva[गार्गि] → son (grandson of @deva[गर्ग]) = @deva[गार्ग्यः] (@deva[गोत्र]). Similarly @deva[वात्स्यः]. Exclusion: immediate son is not @deva[गोत्र]—@deva[कौञ्जिः], @deva[गार्गिः] are sons (@deva[पुत्र]), not @deva[गोत्र].
"""

advanced = """
This @[sūtra] defines @deva[गोत्रसंज्ञा]: @deva[पौत्रप्रभृत्यपत्यम्] (grandson+ descendant) = @deva[गोत्र]. @deva[गर्ग] → @deva[गार्गिः] (@deva[पुत्र]) → @deva[गार्ग्यः] (@deva[गोत्र]). Exclusion: @deva[पुत्र] ≠ @deva[गोत्र]—@deva[कौञ्जिः], @deva[गार्गिः].
"""

id = "4.1.64"
numericId = "41064"

[en]
simple = """
The affix @deva[ङीष्] is also used after @deva[जाति] words followed by @deva[पाक] (cooked), @deva[कर्ण] (ear), @deva[पुष्प] (flower), @deva[फल] (fruit), @deva[मूल] (root), or @deva[बाल] (youth). Examples: @deva[ओदनपाकी], @deva[शंखकर्णी], @deva[शंखपुष्पी], @deva[दासीफली], @deva[दर्भमूली], @deva[गोबाली].
"""

standard = """
The affix @deva[ङीष्] comes after @deva[जाति]-denoting words (including inherently feminine ones) when followed by @deva[पाक], @deva[कर्ण], @deva[पर्ण], @deva[पुष्प], @deva[फल], @deva[मूल], or @deva[बाल]. This extends @ref[4.1.63] to inherently feminine @deva[जाति] words. Forms: @deva[ओदनपाकी], @deva[शंखकर्णी], @deva[शालपर्णी], @deva[शंखपुष्पी], @deva[दासीफली], @deva[दर्भमूली], @deva[गोबाली]. When @deva[ङीष्] is not intended: compounds ending in @deva[फल], @deva[पुष्प], @deva[मूल] fall under @deva[अजादि] (@ref[4.1.4])—@deva[सम्फला], @deva[भस्त्रफला], @deva[सत्पुष्पा], @deva[अमूला].
"""

advanced = """
This @[sūtra] extends @deva[ङीष्] to @deva[जाति]-words (even inherently feminine) when compounded with @deva[पाक]/@deva[कर्ण]/@deva[पर्ण]/@deva[पुष्प]/@deva[फल]/@deva[मूल]/@deva[बाल]. This overcomes the @deva[स्त्रीलिङ्गत्व] restriction of @ref[4.1.63]. Forms: @deva[ओदनपाकी], @deva[शंखकर्णी], @deva[शालपर्णी], @deva[शंखपुष्पी], @deva[दासीफली], @deva[दर्भमूली], @deva[गोबाली]. Alternative: when @deva[ङीष्] not intended, @deva[फल]/@deva[पुष्प]/@deva[मूल]-finals take @deva[टाप्] under @deva[अजादि] (@ref[4.1.4]): @deva[सम्फला], @deva[भस्त्रफला], @deva[सत्पुष्पा], @deva[अमूला].
"""

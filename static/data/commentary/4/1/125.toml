id = "4.1.125"
numericId = "41125"

[en]
simple = """
After @deva[भ्रू], @deva[ढक्] is used with augment @deva[वुक्]. Example: @deva[भ्रौवेयः] (descendant of @[bhrū]).
"""

standard = """
After @deva[भ्रू], @deva[ढक्] is used with augment @deva[वुक्] added before the affix: @deva[भ्रू] + @deva[वुक्] + @deva[ढक्] (@ref[1.1.46]) = @deva[भ्रूव्] + @deva[ढक्] = @deva[भ्रौवेयः] (@ref[7.1.2]).
"""

advanced = """
This @[sūtra] provides @deva[ढक्] with @deva[वुक्]-@deva[आगम] for @deva[भ्रू]: @deva[भ्रू] + @deva[वुक्] (@ref[1.1.46]) + @deva[ढक्] = @deva[भ्रूव्] + @deva[एय] (@ref[7.1.2]) = @deva[भ्रौवेयः].
"""

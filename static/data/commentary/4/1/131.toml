id = "4.1.131"
numericId = "41131"

[en]
simple = """
Feminine words denoting low/defective persons optionally take @deva[ढ्रक्] for descendant meaning. Examples: @deva[काणेरः] or @deva[काणेयः], @deva[दासेरः] or @deva[दासेयः].
"""

standard = """
After feminine words denoting @deva[क्षुद्र] (mean, defective—physically impaired or socially low), @deva[ढ्रक्] is optional, with @deva[ढक्] as the alternative. @deva[क्षुद्रा] (feminine) + @deva[ढ्रक्] = @deva[काणेरः] (son of one-eyed woman) or @deva[काणेयः] (@deva[ढक्]); @deva[दासेरः] (son of female slave) or @deva[दासेयः]. Note: @deva[ढ्रक्] @deva[anuवृत्ति] applies here, not @deva[आरक्] (despite its immediate precedence).
"""

advanced = """
This @[sūtra] makes @deva[ढ्रक्] optional for @deva[क्षुद्रा] (feminine @deva[क्षुद्रवाचिन्]—physical/social deficiency), with @deva[ढक्] as alternative: @deva[काणेरः]/@deva[काणेयः], @deva[दासेरः]/@deva[दासेयः]. The @deva[anuवृत्ति] is @deva[ढ्रक्] (not @deva[आरक्] despite proximity).
"""

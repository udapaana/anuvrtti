id = "4.1.61"
numericId = "41061"

[en]
simple = """
The feminine affix @deva[ङीष्] is used after stems ending in @deva[वाह्]. Example: @deva[दित्यौही] (she who sustains a demon), @deva[प्रष्ठौही] (young heifer training for the plough).
"""

standard = """
After stems ending in @deva[वाह्] (formed from root @deva[वह्] with @deva[ण्वि] per @ref[3.2.64]), @deva[ङीष्] is used. The @deva[ङीष्]-@[anuvṛtti] comes from @ref[4.1.60], not @deva[ङीप्]. @deva[वाह्] never occurs independently—only as compound-final (@deva[तदन्तविधि]). Derivation: @deva[दित्य] + @deva[वाह्] + @deva[ङीष्] → @deva[दित्य] + @deva[ऊठ्] + @deva[आह्] + @deva[ङीष्] (by @ref[6.4.132]: @deva[ऊठ्] is @deva[संप्रसारण] of @deva[वह्] when @deva[भ]) → @deva[दित्य] + @deva[ऊह्] + @deva[ई] (by @ref[6.1.108]) → @deva[दित्यौही] (by @ref[6.1.89]: @deva[वृद्धि] after @deva[ऊठ्]).
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for @deva[वाह्]-final stems. The @deva[ङीष्]-@[anuvṛtti] continues from @ref[4.1.60] (not @deva[ङीप्], though nearer). @deva[वाह्] is @deva[ण्व्यन्त] (@ref[3.2.64]), never independent—@deva[तदन्तविधि] applies. Derivation: @deva[दित्यवाह्] + @deva[ङीष्] → by @ref[6.4.132] (@deva[वाह ऊठ्]—@deva[संप्रसारण] when @deva[भ]-term) → @deva[दित्य] + @deva[ऊह्] + @deva[ई] (by @ref[6.1.108] @deva[संप्रसारणाच्च]) → @deva[दित्यौही] (by @ref[6.1.89] @deva[एत्येधत्यूठ्सु]—@deva[वृद्धि] after @deva[ऊठ्]). Similarly @deva[प्रष्ठौही].
"""

id = "4.1.50"
numericId = "41050"

[en]
simple = """
After compounds ending in @deva[क्रीत] (bought) where the first member denotes the means of purchase, @deva[ङीष्] is used. Example: @deva[वस्त्रक्रीती] (female bought for cloth), @deva[वसनक्रीती].
"""

standard = """
When a compound ends in @deva[क्रीत] (bought) and the first member is the @deva[करण] (means of purchase), the feminine takes @deva[ङीष्]. Forms: @deva[वस्त्रक्रीती], @deva[वसनक्रीती]. Condition: first member must be @deva[करण]. Counter-examples: @deva[सुक्रीता], @deva[दुष्क्रीता] (well/ill-purchased—first member not @deva[करण]). Exception: @deva[धनक्रीता] in @deva[सा हितस्य धनक्रीता प्राणेभ्योपि गरीयसी]—here @deva[क्रीता] (feminine) was formed first, then compounded with @deva[धन]; the general rule @deva[गतिकारकोपपदानां कृद्भिः सहसमासवचनं प्राक् सुबुत्पत्तेः] (compound before case-ending) has exception by @ref[2.1.32] @deva[कर्तृकरणे कृता बहुलम्].
"""

advanced = """
This @[sūtra] provides @deva[ङीष्] for @deva[करणपूर्व]-@deva[क्रीतान्त] compounds. The @deva[करण] (instrument of purchase) must be the first member. @deva[वस्त्रक्रीती], @deva[वसनक्रीती]. Exclusion: @deva[सुक्रीता], @deva[दुष्क्रीता]—@deva[सु]/@deva[दुष्] aren't @deva[करण]. Anomaly @deva[धनक्रीता]: here feminine @deva[क्रीता] was formed before compounding—exception to @deva[गतिकारकोपपदानां कृद्भिः सहसमासवचनं प्राक् सुबुत्पत्तेः], permitted by @ref[2.1.32] @deva[कर्तृकरणे कृता बहुलम्] diversity.
"""

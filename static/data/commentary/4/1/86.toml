id = "4.1.86"
numericId = "41086"

[en]
simple = """
The @deva[उत्स] class words take @deva[अञ्] (instead of @deva[अण्]). Examples: @deva[औत्सः], @deva[औदपानः].
"""

standard = """
After @deva[उत्सादि] words, @deva[अञ्] comes in @deva[प्राग्दीव्यतीय] senses, debarring both @deva[अण्] (@ref[4.1.83]) and special affixes. @deva[उत्स] + @deva[अञ्] = @deva[औत्सः]; @deva[उदपान] → @deva[औदपानः]. List includes: @deva[उत्स], @deva[उदपान], @deva[विकर], @deva[विनद], @deva[महानद], @deva[महाप्राण], @deva[तरुण], @deva[पृथिवी], @deva[धेनु], @deva[पंक्ति], @deva[जगती], @deva[त्रिष्टुप्], @deva[अनुष्टुभ्], @deva[जनपद], @deva[भरत], @deva[उशीनर], @deva[ग्रीष्म], @deva[कुरु], @deva[पञ्चाल], etc. Special: @deva[ग्रीष्म] takes @deva[अञ्] only when not meaning a metre (@deva[ग्रैष्मः] 'summery', but @deva[ग्रैष्मी त्रिष्टुप्] for metre). @deva[तदन्तविधि] applies: @deva[आधेनवम्] (collection of @deva[अधेनु]s).
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[उत्सादि] in @deva[प्राग्दीव्यतीय] senses, debarring @deva[अण्] and specialized affixes. @deva[औत्सः], @deva[औदपानः]. The @deva[परिभाषा] @deva[ग्रहणवता प्रातिपदिकेन तदन्त विधिप्रतिषेधः] doesn't apply—@deva[तदन्तविधि] operates: @deva[आधेनवम्]. Special conditions: @deva[ग्रीष्म अच्छन्दसि] (non-metre → @deva[ग्रैष्मः]); @deva[उदस्थान देशे] (place → @deva[औदस्थानो देशः], else @deva[औदस्थानिः]); @deva[पृषत् दंशे] (share → @deva[पार्षतोंऽशः], else @deva[अण्]).
"""

id = "4.1.89"
numericId = "41089"

[en]
simple = """
The @deva[लुक्]-elision of @deva[गोत्र] affixes in plural (by @ref[2.4.63] etc.) is blocked when a vowel-initial @deva[प्राग्दीव्यतीय] affix follows. Example: @deva[गार्गीयाः] (disciples of @[gārgyāḥ]), not @deva[गर्गीयाः].
"""

standard = """
When @deva[गोत्र] affixes are @deva[लुक्]-elided in plural by @ref[2.4.63] ff., and a vowel-initial @deva[प्राग्दीव्यतीय] affix follows, the elision is treated as not having occurred for adding that affix. Thus @deva[गार्ग्याः] (plural, @deva[अण्] elided) + @deva[छ] (@ref[4.2.114] disciples) → base treated as @deva[गार्ग्य] → @deva[गार्गीयाः] (not @deva[गर्गीयाः]). Similarly @deva[वात्सीयाः], @deva[आत्रेयीयाः], @deva[खारपायणीयाः]. Conditions: (1) @deva[गोत्र]-affix @deva[लुक्] (not @deva[फल]-denoting @deva[लुक्] like @ref[4.3.163]—hence @deva[कौबलम्], @deva[बादरम्] retained); (2) vowel-initial affix (not @deva[गर्गरूप्यम्], @deva[गर्गमयम्]); (3) @deva[प्राग्दीव्यतीय] sense (not @deva[गर्गीयम्] 'fit for Gargas' @ref[5.1.5]).
"""

advanced = """
This @[sūtra] blocks @deva[गोत्र]-@deva[लुक्] (@ref[2.4.63] ff.) when vowel-initial @deva[प्राग्दीव्यतीय] affix follows. @deva[गार्ग्याः] (@deva[लुक्]) + @deva[छ] → base = @deva[गार्ग्य] → @deva[गार्गीयाः]. Conditions: (1) @deva[गोत्रे]—not @deva[फलादि]-@deva[लुक्] (@ref[4.3.163]): @deva[बदर्याः फलम्] = @deva[बदरम्] → @deva[बादरम्]; (2) @deva[अजादेः]—@deva[गर्गरूप्यम्], @deva[गर्गमयम्] (consonant-initial @deva[रूप्य] @ref[4.3.81], @deva[मयट्] @ref[4.3.82]); (3) @deva[प्राग्दीव्यतीय]—not @deva[हितार्थ] @ref[5.1.5]: @deva[गर्गीयम्] (fit for Gargas). Singular/dual also: @deva[बिद] → @deva[बैदः] (by @deva[अञ्] @ref[4.1.104]); plural @deva[बिदाः] (@deva[लुक्]); @deva[युवन् of बिदाः] → treat as @deva[बैद] → @deva[इञ्] → elided @ref[2.4.58] → @deva[बैदः], @deva[बैदौ]; plural @deva[बिदाः].
"""

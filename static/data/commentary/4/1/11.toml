id = "4.1.11"
numericId = "41011"

[en]
simple = """
Stems ending in @deva[मन्] don't take @deva[ङीप्]. They remain the same for feminine. Example: @deva[दामन्] (string) → @deva[दामा], @deva[दामानौ], @deva[दामानः] (same for masculine and feminine/neuter).
"""

standard = """
Though stems ending in @deva[न्] would take @deva[ङीप्] by @ref[4.1.5], stems ending specifically in @deva[मन्] are exempted. Words like @deva[दामन्] (string), @deva[पामन्] (skin disease) are neuter/feminine without @deva[ई]: @deva[दामा], @deva[दामानौ], @deva[दामानः]. The term @deva[मन्] includes both affix-formed words (@deva[मनिन्] affix) and inherent @deva[मन्]-ending words like @deva[सीमन्], @deva[महिमन्], per the @[paribhāṣā] about @deva[अन्/इन्/अस्/मन्] terms.
"""

advanced = """
This @[sūtra] prohibits @deva[ङीप्] after @deva[मनन्त] stems, overriding @ref[4.1.5]. The term @deva[मन्] by @[paribhāṣā] @deva[अनिनसमनग्रहणान्यर्थवता चानर्थकेन च तदन्तविधिं प्रयोजयन्ति] includes: (1) @deva[मनिन्]-affix-formed: @deva[दामन्] (@deva[दो] + @deva[मनिन्]), @deva[पामन्]; (2) non-affix @deva[मन्]: @deva[सीमन्], @deva[महिमन्]. Forms: @deva[दामा/दामानौ/दामानः], @deva[पामा/पामानौ/पामानः], @deva[सीमा/सीमानौ/सीमानः]. These are neuter or common gender.
"""

id = "4.1.58"
numericId = "41058"

[en]
simple = """
@deva[ङीष्] is NOT used after @deva[नख] (nail) or @deva[मुख] (face) when the compound is a proper name. Example: @deva[शूर्पणखा] (@[śūrpaṇakhā]—@[rāvaṇa]'s sister), @deva[गौरमुखा], @deva[कालमुखा].
"""

standard = """
When @deva[नख] or @deva[मुख] forms the final element of a compound that is a proper name (@deva[संज्ञा]), @deva[ङीष्] is not used. Examples: @deva[शूर्पणखा] (the @deva[न] → @deva[ण] by @ref[8.4.3]), @deva[वज्रणखा], @deva[गौरमुखा], @deva[कालमुखा]. When not a name: @deva[ताम्रमुखी कन्या] (copper-faced girl), @deva[चन्द्रमुखी] (moon-faced)—these are attributive, not names.
"""

advanced = """
This @[sūtra] prohibits @deva[ङीष्] for @deva[नख]/@deva[मुख]-final compounds when @deva[संज्ञा] (proper name). @deva[शूर्पणखा] (@deva[न] → @deva[ण] by @ref[8.4.3] @deva[पूर्वपदात् संज्ञायामगः]), @deva[वज्रणखा], @deva[गौरमुखा], @deva[कालमुखा]. Non-@deva[संज्ञा] (attributive): @deva[ताम्रमुखी कन्या], @deva[चन्द्रमुखी]—these take @deva[ङीष्].
"""

id = "4.1.17"
numericId = "41017"

[en]
simple = """
According to Eastern grammarians, the affix @deva[ष्फ] (becoming @deva[आयन]) can optionally be added after @deva[यञ्]-ending words, followed by @deva[ङीष्]. Example: @deva[गार्ग्य] → @deva[गार्ग्यायनी] or @deva[गार्गी].
"""

standard = """
Eastern grammarians (@deva[प्राचाम्]) allow optional @deva[ष्फ] after @deva[यञन्त] stems, treated as @deva[तद्धित]. The @deva[ष्] is indicatory (@ref[1.3.6]), indicating that @deva[ङीष्] follows (@ref[4.1.41]). The @deva[फ] becomes @deva[आयन] by @ref[7.1.2]. Thus: @deva[गार्ग्य] + @deva[ष्फ] + @deva[ङीष्] = @deva[गार्ग्यायनी]; @deva[वात्स्य] → @deva[वात्स्यायनी]. Alternatively: @deva[गार्गी], @deva[वात्सी]. The word @deva[सर्वत्र] from @ref[4.1.18] applies inversely here—@deva[ष्फ] can override even rules that would otherwise block it, like @ref[4.1.75] for @deva[आवट्य] → @deva[आवट्यायनी].
"""

advanced = """
Per Eastern grammarians, @deva[ष्फ] optionally follows @deva[यञन्त] stems. Technical analysis: @deva[ष्]-@deva[इत्] by @ref[1.3.6] triggers @deva[ङीष्] via @ref[4.1.41]; declaring it @deva[तद्धितसंज्ञक] ensures @deva[प्रातिपदिक]-status (@ref[1.2.46]). @deva[फ] → @deva[आयन्] by @ref[7.1.2]. Forms: @deva[गार्ग्यायनी], @deva[वात्स्यायनी]. The @[reverse-anuvṛtti] of @deva[सर्वत्र] (@ref[4.1.18]) means @deva[ष्फ] can apply even where specific rules (like @ref[4.1.75] for @deva[आवट्य] → @deva[चाप्]) would otherwise govern—thus @deva[आवट्यायनी] per Eastern view.
"""

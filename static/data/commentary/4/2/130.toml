id = "4.2.130"
numericId = "42130"

[en]
simple = """
After @deva[कुरु] and @deva[युगन्धर], @deva[वुञ्] is optional. Examples: @deva[कौरवकः] or @deva[कौरवः], @deva[यौगन्धरकः] or @deva[यौगन्धरः].
"""

standard = """
After @deva[कुरु] and @deva[युगन्धर], the affix @deva[वुञ्] comes optionally in remaining senses: @deva[कौरवकः] (@deva[वुञ्]) or @deva[कौरव॑ः] (other affix); @deva[यौगन्धरकः] or @deva[यौगन्धर॑ः]. These words denote @deva[जनपद] (inhabited countries), so @ref[4.2.125] would mandate @deva[वुञ्]; this @[sūtra] makes it optional. Note: @deva[कुरु] also occurs in @deva[कच्छादि] class @ref[4.2.133].
"""

advanced = """
This @[sūtra] provides optional @deva[वुञ्] for @deva[कुरु]/@deva[युगन्धर]: @deva[कौरवकः]/@deva[कौरवः], @deva[यौगन्धरकः]/@deva[यौगन्धरः]. @ref[4.2.125] would mandate @deva[वुञ्]; this makes optional. @deva[कुरु] in @deva[कच्छादि] @ref[4.2.133].
"""

id = "4.2.57"
numericId = "42057"

[en]
simple = """
After weapon names, @deva[ण] is used meaning 'a game played with that weapon'. Examples: @deva[दाण्डा] (stick-game), @deva[मौष्टा] (fist-game).
"""

standard = """
After names of weapons (@deva[प्रहरण]), the affix @deva[ण] comes meaning 'a game/play with that weapon' (@deva[क्रीडा]): @deva[दण्डः प्रहरणमस्यां क्रीडायाम्] = @deva[दाण्डा] (a game played with sticks); @deva[मौष्टा] (boxing—game with fists). Why 'weapon'? For non-weapons: @deva[अक्षक्रीडा] (dice-game) doesn't take the affix since dice are not weapons.
"""

advanced = """
This @[sūtra] provides @deva[ण] for @deva[प्रहरण] (weapon) in @deva[क्रीडा]-sense: @deva[दाण्डा], @deva[मौष्टा]. @deva[प्रहरण] condition required; non-weapons don't apply.
"""

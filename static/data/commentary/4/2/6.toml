id = "4.2.6"
numericId = "42006"

[en]
simple = """
After @deva[द्वन्द्व] compounds (copulative compounds) of asterism names, the affix @deva[छ] (yielding @deva[ईय]) is used — regardless of whether a specific time-portion is mentioned or not. The @deva[लुप्]-elision of @ref[4.2.4] does not apply here.

**Examples:** @deva[राधानुराधीया रात्रिः] "the @deva[राधा]-@deva[अनुराधा] night" (with specification); @deva[अद्य तिष्यपुनर्वसवीयम्] "today is the @deva[तिष्य]-@deva[पुनर्वसु] (period)" (without specification). In both cases, the affix @deva[छ] appears.
"""

standard = """
This @[vidhi] rule prescribes @deva[छ] (@deva[ईय]) after @deva[द्वन्द्व] (copulative) compounds of @deva[नक्षत्र] (asterism) names, in the sense of "time connected with those asterisms." Crucially, the affix applies whether or not a specific time-portion is indicated — unlike @ref[4.2.4], which elides the affix without specification.

**Worked examples:**
- With specification: @deva[राधानुराधीया रात्रिः] — the night when the moon transits both @[rādhā] and @[anurādhā].
- With specification: @deva[तिष्यपुनर्वसवीयमहः] — the day of @[tiṣya]-@[punarvasu].
- Without specification: @deva[अद्य राधानुराधीयम्] — today is the @[rādhā]-@[anurādhā] period.

**Key point:** @ref[4.2.4]'s @deva[लुप्] does not apply to @deva[द्वन्द्व] compounds. The compound of two asterism names takes @deva[छ] in all contexts.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[नक्षत्रेण युक्तः कालः] from @ref[4.2.3].

This rule completes the asterism-time block (@ref[4.2.3]–@ref[4.2.6]). While @ref[4.2.3] gives @deva[अण्] for single asterism names and @ref[4.2.4]–@ref[4.2.5] handle elision, this rule governs @deva[द्वन्द्व] compounds of two or more @deva[नक्षत्र]-names and prescribes @deva[छ] instead.

The reason @deva[छ] is taught separately (rather than extending @deva[अण्]) is that @deva[द्वन्द्व] compounds of asterisms are conventional designations for time-periods spanning two consecutive asterisms. The @deva[छ] affix (@deva[ईय]) distinguishes these from single-asterism derivations.

The @deva[काशिका] notes: @deva[निर्दिष्टानिर्दिष्टकालं च] — both specified and unspecified time contexts take @deva[छ], blocking @ref[4.2.4]'s @deva[लुप्]. This is because @ref[4.2.6], being more specific (it addresses @deva[द्वन्द्व]-compounds specifically), prevails as an @[apavāda].
"""

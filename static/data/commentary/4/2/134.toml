id = "4.2.134"
numericId = "42134"

[en]
simple = """
After @deva[कच्छ] etc., @deva[वुञ्] is used when meaning 'a man' or 'human attribute'. Examples: @deva[काच्छकः मनुष्यः], @deva[काच्छकं हसितम्] (Kutch-style laughter), @deva[काच्छिका चूडा].
"""

standard = """
After @deva[कच्छादि] words, the affix @deva[वुञ्] comes in 'born etc.' senses when the meaning is 'a man' or 'what exists in a man' (debarring @deva[अण्]): @deva[काच्छकः] (a man from Kutch); @deva[काच्छकमस्य हसितं जल्पितम्] (his laughter/talk is Kutch-style); @deva[काच्छिका चूडा] (Kutch-style hair-tuft). Similarly @deva[सैन्धवको मनुष्यः], @deva[सैन्धवकं हसितम्], @deva[सैन्धविका चूडा].
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[अण्]) for @deva[कच्छादि] when @deva[मनुष्य]/@deva[मनुष्यवृत्ति]: @deva[काच्छकः], @deva[काच्छकं हसितम्], @deva[काच्छिका चूडा].
"""

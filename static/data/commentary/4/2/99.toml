id = "4.2.99"
numericId = "42099"

[en]
simple = """
After @deva[कापिशी], @deva[ष्फक्] is used; feminine takes @deva[ङीष्]. Examples: @deva[कापिशायनं मधु], @deva[कापिशायनी द्राक्षा] (liquor).
"""

standard = """
After @deva[कापिशी], the affix @deva[ष्फक्] comes in remaining senses; the feminine is formed by @deva[ङीष्] (@ref[4.1.41]): @deva[कापिशायनं मधु] (@[kāpiśa] honey/wine), @deva[कापिशायनी द्राक्षा] (a type of grape-liquor). @[vārtika]: Also after @deva[बाह्लि], @deva[उर्दि], @deva[पर्दि]: @deva[बाह्लायनी], @deva[और्दायनी], @deva[पार्दायनी]. This debars @deva[वुञ्] of @ref[4.2.125].
"""

advanced = """
This @[sūtra] provides @deva[ष्फक्] for @deva[कापिशी]: @deva[कापिशायनम्], @deva[कापिशायनी] (f. by @deva[ङीष्] @ref[4.1.41]). @[vārtika]: @deva[बाह्लि]/@deva[उर्दि]/@deva[पर्दि] → @deva[बाह्लायनी] etc. Debars @deva[वुञ्] @ref[4.2.125].
"""

id = "4.2.11"
numericId = "42011"

[en]
simple = """
After @deva[पाण्डुकम्बल] etc. (housing-words), @deva[इनि] is used for 'chariot covered by'. Example: @deva[पाण्डुकम्बली रथः] (chariot covered with white woolen blanket).
"""

standard = """
After words like @deva[पाण्डुकम्बल] (white woolen blanket, royal elephant housing), the affix @deva[इनि] comes (debarring @deva[अण्]) in the sense of 'chariot surrounded by': @deva[पाण्डुकम्बलेन परिवृतो रथः] = @deva[पाण्डुकम्बली] (chariot covered with white housing). Note: The form @deva[पाण्डुकम्बलिन्] could also be derived by @deva[इनि] of @ref[5.2.115], but this @[sūtra] is needed to establish the specific 'chariot-covering' meaning.
"""

advanced = """
This @[sūtra] provides @deva[इनि] (debarring @deva[अण्]) for @deva[पाण्डुकम्बलादि] in @deva[रथ-परिवृत] sense: @deva[पाण्डुकम्बली रथः]. Note: @ref[5.2.115] @deva[इनि] gives same form, but this @[sūtra] establishes specific meaning.
"""

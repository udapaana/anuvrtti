id = "4.2.33"
numericId = "42033"

[en]
simple = """
After @deva[अग्नि] (fire-deity), @deva[ढक्] is used. Example: @deva[आग्नेयोऽष्टकपालः] (eight-dish oblation to Agni).
"""

standard = """
After the deity name @deva[अग्नि] (Fire), the affix @deva[ढक्] comes in the sense of 'that its deity': @deva[अग्निर्देवतास्य] = @deva[आग्नेयोऽष्टकपालः] (an eight-dish oblation belonging to Agni). @[vārtika]: @deva[ढक्] always comes after @deva[अग्नि] and @deva[कलि] in the various senses of @deva[प्राग्दीव्यतीय] affixes (see @ref[4.2.8]).
"""

advanced = """
This @[sūtra] provides @deva[ढक्] for @deva[अग्नि]: @deva[आग्नेयम्]. @[vārtika]: @deva[ढक्] always for @deva[अग्नि]/@deva[कलि] in all @deva[प्राग्दीव्यतीय] senses (@ref[4.2.8]).
"""

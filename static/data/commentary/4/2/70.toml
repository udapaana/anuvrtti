id = "4.2.70"
numericId = "42070"

[en]
simple = """
A place is named after whatever is found near it. Example: @deva[विदिशाया अदूरे भवम्] = @deva[वैदिशम्] (city near @[vidiśā] river).
"""

standard = """
An affix is added to a word in the genitive case meaning 'not far from' (@deva[अदूर]), the result being a place-name: @deva[विदिशाया अदूरे भवम्] = @deva[वैदिशम्] (the city near which the @[vidiśā] river flows). The word @deva[तस्य] (genitive) is supplied from @ref[4.2.69]. @deva[अदूर] = 'near, not far'.
"""

advanced = """
This @[sūtra] provides affix for @deva[तस्य अदूरे भवम्] (genitive) → place-name: @deva[वैदिशम्]. @deva[तस्य] from @ref[4.2.69] @deva[अनुवृत्ति].
"""

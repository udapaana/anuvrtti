id = "4.2.118"
numericId = "42118"

[en]
simple = """
After @deva[वृद्ध] @deva[वाहीक] village-names in @deva[उशीनर] region, @deva[ठञ्]/@deva[ञिठ्] are optional (alongside @deva[छ]). Examples: @deva[आह्वजालिकी]/@deva[लिका]/@deva[लीया], @deva[सौदर्शनिकी]/@deva[निका]/@deva[नीया].
"""

standard = """
After @deva[वृद्ध] words denoting @deva[वाहीक] villages situated in @deva[उशीनर], the affixes @deva[ठञ्] and @deva[ञिठ्] come optionally (with @deva[छ] also valid): @deva[आह्वजालिकी], @deva[आह्वजालिका], and @deva[आह्वजालीया]; @deva[सौदर्शनिकी], @deva[सौदर्शनिका], and @deva[सौदर्शनीया].
"""

advanced = """
This @[sūtra] provides optional @deva[ठञ्]/@deva[ञिठ्] for @deva[वृद्ध वाहीक-ग्राम] in @deva[उशीनर]: @deva[आह्वजालिकी]/@deva[लिका]/@deva[लीया] (@deva[छ] also).
"""

id = "4.2.126"
numericId = "42126"

[en]
simple = """
After locality-names (whether @deva[वृद्ध] or not) ending in @deva[कच्छ], @deva[अग्नि], @deva[वक्त्र], @deva[गर्त], @deva[वुञ्] is used. Examples: @deva[दारुकच्छकः], @deva[काण्डाग्नकः], @deva[ऐन्द्रवक्त्रकः], @deva[बाहुगर्तकः].
"""

standard = """
After words denoting a locality (whether @deva[वृद्ध] or not) whose second member (@deva[उत्तरपद]) is @deva[कच्छ], @deva[अग्नि], @deva[वक्त्र], or @deva[गर्त], the affix @deva[वुञ्] comes in remaining senses (debarring @deva[छ] and @deva[अण्]): @deva[दारुकच्छकः], @deva[पैप्पलीकच्छकः]; @deva[काण्डाग्नकः], @deva[वैभुजाग्नकः]; @deva[ऐन्द्रवक्त्रकः], @deva[सैन्धुवक्त्रकः]; @deva[बाहुगर्तकः], @deva[चाक्रगर्तकः]. @deva[उत्तरपद] applies to each word in the list.
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[छ]/@deva[अण्]) for @deva[देश उत्तरपद] = @deva[कच्छ]/@deva[अग्नि]/@deva[वक्त्र]/@deva[गर्त]: @deva[दारुकच्छकः], @deva[काण्डाग्नकः], @deva[ऐन्द्रवक्त्रकः], @deva[बाहुगर्तकः].
"""

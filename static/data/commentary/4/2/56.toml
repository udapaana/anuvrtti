id = "4.2.56"
numericId = "42056"

[en]
simple = """
The affix @deva[अण्] is used after a word meaning 'the object or warrior of a battle', to denote that battle. Examples: @deva[दाशराज्ञम्] (battle of ten kings), @deva[याज्ञवल्क्यम्] (battle of @[yājñavalkya]).
"""

standard = """
The affix @deva[अण्] (from @ref[4.1.83]) comes after a word denoting either the object (@deva[प्रयोजन]) or the warrior (@deva[योद्धृ]) of a battle, to denote that battle fought for that object or led by that warrior: @deva[दाशराज्ञं युद्धम्] (the Battle of Ten Kings); @deva[याज्ञवल्क्यं युद्धम्] (battle of @[yājñavalkya]). @deva[सोऽस्य] indicates nominative case of base; whole word denotes @deva[युद्ध] (battle).
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[प्रयोजन]/@deva[योद्धृ] in @deva[युद्ध]-sense: @deva[दाशराज्ञम्] (object: ten kings), @deva[याज्ञवल्क्यम्] (warrior: @[yājñavalkya]).
"""

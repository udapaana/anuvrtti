id = "4.2.89"
numericId = "42089"

[en]
simple = """
After @deva[शिखा] (crest/tuft), @deva[वलच्] is used. Example: @deva[शिखावलम्] (crested place).
"""

standard = """
After @deva[शिखा] (crest), the affix @deva[वलच्] comes in the four-fold senses: @deva[शिखावलम्] (the city @[śikhāvala], lit. 'crested as a peacock'). Note: @deva[शिखा] also takes @deva[वलच्] by @ref[5.2.111] with @deva[मतुप्]-force (@ref[5.2.94]: 'whose it is'), but THAT @deva[वलच्] is not for place-names; THIS @deva[वलच्] specifically makes locality names.
"""

advanced = """
This @[sūtra] provides @deva[वलच्] for @deva[शिखा] (place-names): @deva[शिखावलम्]. Distinguish from @ref[5.2.111] @deva[वलच्] (@deva[मतुप्]-sense, not place-names).
"""

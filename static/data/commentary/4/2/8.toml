id = "4.2.8"
numericId = "42008"

[en]
simple = """
After the name @deva[कलि], the affix @deva[ढक्] (yielding @deva[एय]) is used instead of @deva[अण्], meaning "the @deva[साम] revealed to @deva[कलि]."

**Example:** @deva[कलिना दृष्टं साम] "the @deva[साम] seen by @deva[कलि]" becomes @deva[कालेयम्], not *@deva[कालम्].

This is an exception to @ref[4.2.7]. Some scholars regard this rule as actually being a @deva[वार्त्तिक] (supplementary rule) rather than an original @deva[सूत्र] of Pāṇini.
"""

standard = """
This @[vidhi] rule overrides @ref[4.2.7] for the specific seer-name @deva[कलि], prescribing @deva[ढक्] (@deva[एय]) instead of @deva[अण्] in the "@deva[साम] seen by" sense.

**Worked example:**
- @deva[कलिना दृष्टं साम] → @deva[कालेयम्] — the @[sāma] revealed to @[kali]. Derivation: @deva[कलि] + @deva[ढक्] → @deva[वृद्धि] of first vowel → @deva[काल] + @deva[एय] = @deva[कालेय].

The @deva[कारिका] states: @deva[दृष्टे सामनि जाते च द्विरण्डिद्वा विधीयते। तीयादीकक् न विद्याया गोत्रादङ्कवदिष्यते॥] — for "seen @[sāma]" and "born" senses, @deva[अण्] or @deva[ढक्] are prescribed; for @deva[विद्या] (learning), different affixes apply.

**Note:** Some commentators treat this as a @deva[वार्त्तिक] rather than an original @deva[पाणिनीय] @deva[सूत्र].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तेन दृष्टं साम] from @ref[4.2.7]; @deva[अण्] from @ref[4.1.83].

This @[apavāda] replaces @deva[अण्] with @deva[ढक्] for @deva[कलि]. The @deva[ढ] in @deva[ढक्] triggers @deva[वृद्धि] of the first syllable (same as @deva[ण्] in @deva[अण्]), but the affix portion is @deva[एय] rather than @deva[अ].

The @deva[कारिका] is significant for understanding the broader pattern: @deva[अण्] and @deva[ढक्] alternate across multiple semantic domains (seen @[sāma], born, etc.). The @deva[वार्त्तिक] also extends @deva[ढक्] to @deva[अग्नि] and @deva[कलि] in all @deva[प्राग्दीव्यतीय] senses — see @ref[4.2.33].

Whether this is an original @deva[सूत्र] or a @deva[वार्त्तिक] is debated: the @deva[काशिका] treats it as a @deva[सूत्र], while some @deva[पद्धति] traditions classify it as supplementary.
"""

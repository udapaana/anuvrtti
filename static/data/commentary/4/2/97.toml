id = "4.2.97"
numericId = "42097"

[en]
simple = """
After @deva[नदी] etc., @deva[ढक्] is used in remaining senses. Examples: @deva[नादेयम्] (pertaining to river), @deva[माहेयम्] (earthen).
"""

standard = """
After @deva[नद्यादि] words, the affix @deva[ढक्] (@deva[एय]) comes in remaining senses (@deva[तत्र जातः] @ref[4.3.25] etc.): @deva[नादेयम्] (pertaining to a river), @deva[माहेयम्] (earthen, from @deva[मही]). The @deva[नद्यादि] list: @deva[नदी], @deva[मही], @deva[वाराणसी], @deva[श्रावस्ती], @deva[कीशाम्बी], @deva[वनकौशाम्बी], @deva[काशपरी], @deva[काशफरी], @deva[खादिरी], @deva[पूर्वनगरी], @deva[पाठा], @deva[माया], @deva[शाल्वा], etc.
"""

advanced = """
This @[sūtra] provides @deva[ढक्] for @deva[नद्यादि] in @deva[शेष]-sense: @deva[नादेयम्], @deva[माहेयम्]. List: @deva[नदी] through @deva[शाल्वा] etc.
"""

id = "4.2.142"
numericId = "42142"

[en]
simple = """
After @deva[वृद्ध] words with @deva[कन्था]/@deva[पलद]/@deva[नगर]/@deva[ग्राम]/@deva[हृद] as second member, @deva[छ] is used. Examples: @deva[दाक्षिकन्थीयम्], @deva[दाक्षिनगरीयम्], @deva[दाक्षिग्रामीयम्].
"""

standard = """
After @deva[वृद्ध] words having @deva[कन्था], @deva[पलद], @deva[नगर], @deva[ग्राम], or @deva[हृद] as the second member (@deva[उत्तरपद]), the affix @deva[छ] comes in remaining senses (debarring @deva[ठञ्]/@deva[ञिठ्] of @ref[4.2.117]). Examples: @deva[दाक्षिकन्थीयम्], @deva[माहिकिकन्थीयम्]; @deva[दाक्षिपलदीयम्], @deva[माहिकिपलदीयम्]; @deva[दाक्षिनगरीयम्], @deva[माहिकिनगरीयम्]; @deva[दाक्षिग्रामीयम्], @deva[माहिकिग्रामीयम्]; @deva[दाक्षिह्रदीयम्], @deva[माहिकिह्रदीयम्].
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[ठञ्]/@deva[ञिठ्] @ref[4.2.117]) for @deva[वृद्ध] with @deva[उत्तरपद] = @deva[कन्था]/@deva[पलद]/@deva[नगर]/@deva[ग्राम]/@deva[हृद]: @deva[दाक्षिकन्थीयम्], @deva[दाक्षिनगरीयम्], @deva[दाक्षिग्रामीयम्], @deva[दाक्षिह्रदीयम्].
"""

id = "4.2.119"
numericId = "42119"

[en]
simple = """
After @deva[उ]-ending stems denoting a locality, @deva[ठञ्] is used. Examples: @deva[तैषादकर्षुकः], @deva[शाबरजम्बुकः].
"""

standard = """
After @deva[प्रातिपदिक] (nominal stems) ending in @deva[उ] and denoting a locality (@deva[देश]), the affix @deva[ठञ्] comes in remaining senses: @deva[तैषादकर्षुकः], @deva[शाबरजम्बुकः]. The phrase @deva[वृद्धात्] does NOT govern this @[sūtra] (if it did, the next @[sūtra] wouldn't need to repeat it). Why 'denoting a locality'? For non-locality @deva[उ]-ending words: @deva[पाटवाः] (pupils of @deva[पटु]) formed by @deva[अण्].
"""

advanced = """
This @[sūtra] provides @deva[ठञ्] for @deva[उकारान्त देश]-words: @deva[तैषादकर्षुकः], @deva[शाबरजम्बुकः]. @deva[वृद्धात्] doesn't continue. Non-@deva[देश]: @deva[पाटवाः] (@deva[अण्]).
"""

id = "4.2.35"
numericId = "42035"

[en]
simple = """
After @deva[महाराज] and @deva[प्रोष्ठपद], @deva[ठञ्] is used for deity-sense. Examples: @deva[महाराजिकम्], @deva[प्रौष्ठपदिकम्].
"""

standard = """
After @deva[महाराज] and @deva[प्रोष्ठपद] (asterism), the affix @deva[ठञ्] comes in the sense of 'that its deity': @deva[महाराजो देवतास्य] = @deva[महाराजिकम्]; @deva[प्रौष्ठपदिकम्] (belonging to @[proṣṭhapada] constellation). @[vārtika]: After @deva[नवयज्ञ] etc., @deva[ठञ्] comes in sense of 'that exists in it': @deva[नावयज्ञिकः कालः], @deva[पाकयज्ञिकः]. @[vārtika]: After @deva[पूर्णमास], @deva[अण्] comes: @deva[पौर्णमासम्].
"""

advanced = """
This @[sūtra] provides @deva[ठञ्] for @deva[महाराज]/@deva[प्रोष्ठपद] in @deva[देवता]-sense: @deva[महाराजिकम्], @deva[प्रौष्ठपदिकम्]. @[vārtikas]: @deva[नवयज्ञादि] + @deva[ठञ्] (@deva[तस्मिन् वर्तते]); @deva[पूर्णमास] + @deva[अण्].
"""

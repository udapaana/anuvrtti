id = "4.2.88"
numericId = "42088"

[en]
simple = """
After @deva[नड] and @deva[शाद], @deva[ड्वलच्] is used with final-elision. Examples: @deva[नड्वलम्], @deva[शाद्वलम्].
"""

standard = """
After @deva[नड] (reed) and @deva[शाद] (grass), the affix @deva[ड्वलच्] comes in the four-fold senses, with elision of the final letter: @deva[नड्वलम्] (reed-place), @deva[शाद्वलम्] (grassy place/meadow).
"""

advanced = """
This @[sūtra] provides @deva[ड्वलच्] (with final-elision) for @deva[नड]/@deva[शाद]: @deva[नड्वलम्], @deva[शाद्वलम्].
"""

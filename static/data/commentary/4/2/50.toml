id = "4.2.50"
numericId = "42050"

[en]
simple = """
Three specific words — @deva[खल] (threshing floor), @deva[गो] (cow), and @deva[रथ] (chariot) — also take the affix @deva[य] in the "collection" sense, just like the @deva[पाशादि] words in @ref[4.2.49]. For example, @deva[खल] + @deva[य] = @deva[खल्या] (a threshing-floor area), @deva[गो] + @deva[य] = @deva[गव्या] (a cattle pasture), @deva[रथ] + @deva[य] = @deva[रथ्या] (a chariot road, a street). These three are stated separately from the @deva[पाशादि] list because Pāṇini wants the next rule (@ref[4.2.51]) to give them additional alternative affixes — something that would not be possible if they were simply folded into @deva[पाशादि].
"""

standard = """
The affix @deva[य] is separately prescribed after @deva[खल], @deva[गो], and @deva[रथ] in the @deva[समूह] (collection) sense. These three are not included in the @deva[पाशादि] of @ref[4.2.49] because @ref[4.2.51] teaches additional affixes (@deva[इनि], @deva[त्र], @deva[कट्यष्यच्]) for these very words. If they were part of @deva[पाशादि], the @[apavāda] relationship would block @ref[4.2.51]. By stating them in a separate @[sūtra], both @deva[य] and the affixes of @ref[4.2.51] become available as alternatives (@deva[विकल्प]). Examples: @deva[खलानां समूहः] = @deva[खल्या]; @deva[गवां समूहः] = @deva[गव्या]; @deva[रथानां समूहः] = @deva[रथ्या]. All forms are feminine.
"""

advanced = """
This @[sūtra] separates @deva[खल], @deva[गो], @deva[रथ] from @deva[पाशादि] (@ref[4.2.49]) to enable @ref[4.2.51] to apply alongside @deva[य]. The structural reason: if these three were in @deva[पाशादि], @ref[4.2.49] would be a single @[apavāda] blocking @ref[4.2.51]; the separate statement creates two co-equal rules, yielding @deva[विकल्प] between @deva[य] and the affixes of @ref[4.2.51]. The @[anuvṛtti] of @deva[समूहे] from @ref[4.2.37] continues. @deva[गो] undergoes @deva[अव्]-@[ādeśa] before @deva[य] by @ref[6.1.79] (@deva[वान्तो यि प्रत्यये]): @deva[गो] → @deva[गव्] + @deva[य] → @deva[गव्या]. The form @deva[रथ्या] (street) is widely attested in classical literature.
"""

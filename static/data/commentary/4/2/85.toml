id = "4.2.85"
numericId = "42085"

[en]
simple = """
The affix @deva[मतुप्] is used for river names. Examples: @deva[उदुम्बरावती], @deva[मशकावती], @deva[इक्षुमती] (rivers named after things nearby).
"""

standard = """
When a river is to be named after something found near it, the affix @deva[मतुप्] (@deva[मत्]/@deva[वत्]]) is added: @deva[उदुम्बरा॑वती] (river near fig trees), @deva[मशका॑वती] (near mosquitoes), @deva[वीरणा॑वती], @deva[पुष्करा॑वती], @deva[इक्षु॑मती] (sugarcane river), @deva[द्रु॑मती]. See @ref[6.3.119] for @deva[अ]-lengthening; @ref[6.1.219] for @deva[उदात्त] on that vowel; @ref[8.2.9].
"""

advanced = """
This @[sūtra] provides @deva[मतुप्] for river-names: @deva[उदुम्बरावती], @deva[मशकावती], @deva[इक्षुमती]. @ref[6.3.119] @deva[अ]-lengthening; @ref[6.1.219] @deva[उदात्त]; @ref[8.2.9].
"""

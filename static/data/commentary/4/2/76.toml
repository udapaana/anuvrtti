id = "4.2.76"
numericId = "42076"

[en]
simple = """
In @deva[सौवीर], @deva[साल्व], and Eastern countries, place-names are feminine. Examples: @deva[दात्तामित्री] (city founded by Dattamitra), @deva[वैधूमाग्नी], @deva[काकन्दी].
"""

standard = """
When the place is in @deva[सौवीर], @deva[साल्व], or the Eastern countries (@deva[प्राच्य]), place-names are always feminine (@deva[स्त्रीषु]): @deva[दात्तामित्री] (city founded by Dattamitra in @[sauvīra]); @deva[वैधूमाग्नी] (in @[sālva]); @deva[काकन्दी], @deva[माकन्दी], @deva[माणिचरी], @deva[जारुषी] (in Eastern countries). These qualify @deva[देशे तन्नाम्नि] from @ref[4.2.67].
"""

advanced = """
This @[sūtra] makes place-names f. in @deva[सौवीर]/@deva[साल्व]/@deva[प्राच्य]: @deva[दात्तामित्री], @deva[वैधूमाग्नी], @deva[काकन्दी], @deva[माकन्दी], @deva[माणिचरी], @deva[जारुषी]. @deva[स्त्रीषु] qualifies @ref[4.2.67] @deva[देशे तन्नाम्नि].
"""

id = "4.2.24"
numericId = "42024"

[en]
simple = """
The affix @deva[अण्] comes after a deity's name meaning 'belonging to that deity'. Examples: @deva[ऐन्द्रम्] (sacred to Indra), @deva[आदित्यम्], @deva[बार्हस्पत्यम्], @deva[प्राजापत्यम्].
"""

standard = """
The affix @deva[अण्] (from @ref[4.1.83]) comes after a deity's name (in nominative) in the genitive sense ('belonging to'): @deva[इन्द्रो देवतास्य] = @deva[ऐन्द्रम्] (oblation sacred to Indra); similarly @deva[आदित्यम्] (belonging to @[āditya]), @deva[बार्हस्पत्यम्] (to @[bṛhaspati]), @deva[प्राजापत्यम्] (to @[prajāpati]). @deva[सा] = nominative word; @deva[अस्य] = genitive sense; @deva[देवता] = deity.
"""

advanced = """
This @[sūtra] extends @deva[अण्] to @deva[देवता]-names in nominative (@deva[सा]) with genitive sense (@deva[अस्य]): @deva[ऐन्द्रम्], @deva[आदित्यम्], @deva[बार्हस्पत्यम्], @deva[प्राजापत्यम्].
"""

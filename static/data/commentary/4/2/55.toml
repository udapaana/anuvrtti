id = "4.2.55"
numericId = "42055"

[en]
simple = """
After meter names, @deva[अण्] is used meaning 'a @deva[प्रगाथ] (hymn-pair) beginning with that meter'. Example: @deva[गायत्रः प्रगाथः] (@[pragātha] beginning with @[gāyatrī]).
"""

standard = """
After names of meters (@deva[छन्दस्]), the affix @deva[अण्] comes meaning 'a @deva[प्रगाथ] (hymn-pair consisting of two complementary verses) beginning with that meter': @deva[गायत्र्या आदिः] = @deva[गायत्रः प्रगाथः] (a @[pragātha] whose first verse is in @[gāyatrī] meter). @deva[सः] = nominative word; @deva[अस्य] = genitive sense; @deva[आदिः] = 'beginning'; @deva[छन्दसः] = after meter names; @deva[प्रगाथेषु] = in @[pragātha] sense.
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[छन्दस्] (meter names) in @deva[प्रगाथ-आदि] sense: @deva[गायत्रः प्रगाथः]. @deva[प्रगाथ] = Vedic hymn-pair.
"""

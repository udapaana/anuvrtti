id = "4.2.19"
numericId = "42019"

[en]
simple = """
After @deva[उदश्वित्] (water-swollen grain), @deva[ठक्] is optionally used. Examples: @deva[औदश्वित्कम्] or @deva[औदश्वितम्].
"""

standard = """
After @deva[उदश्वित्] (grain swollen with water), the affix @deva[ठक्] comes optionally in the sense of 'prepared food': @deva[औदश्वित्कम्] (@deva[ठक्] with @deva[क्]-augment per @ref[7.3.51]) or @deva[औदश्वितम्] (@deva[अण्]). Both forms are valid.
"""

advanced = """
This @[sūtra] provides optional @deva[ठक्] for @deva[उदश्वित्]: @deva[औदश्वित्कम्] (@ref[7.3.51] @deva[क्]-augment) or @deva[औदश्वितम्] (@deva[अण्]).
"""

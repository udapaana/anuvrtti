id = "4.2.95"
numericId = "42095"

[en]
simple = """
After @deva[कत्रि] etc., @deva[ढकञ्] (@deva[एयक]) is used. Examples: @deva[कात्रेयकः], @deva[औम्भेयकः].
"""

standard = """
After @deva[कत्र्यादि] words, the affix @deva[ढकञ्] (@deva[एयक]) comes in remaining senses: @deva[कात्रेयकः], @deva[औम्भेयकः]. The @deva[कत्र्यादि] list: @deva[कत्रि], @deva[उम्भि], @deva[पुष्कर], @deva[पुष्कल], @deva[मोदन], @deva[कुम्भी], @deva[कुण्डिन], @deva[नगरी], @deva[माहिष्मती], @deva[वर्मती], @deva[उख्या], @deva[ग्राम], @deva[कुड्या] (with @deva[य]-elision), @deva[वञ्जी], @deva[भक्ति].
"""

advanced = """
This @[sūtra] provides @deva[ढकञ्] for @deva[कत्र्यादि] (15 words): @deva[कात्रेयकः], @deva[औम्भेयकः], etc.
"""

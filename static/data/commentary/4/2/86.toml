id = "4.2.86"
numericId = "42086"

[en]
simple = """
After @deva[मधु] etc., @deva[मतुप्] is used in four-fold senses (for non-rivers). Examples: @deva[मधुमान्], @deva[बिसवान्].
"""

standard = """
After @deva[मध्वादि] words, the affix @deva[मतुप्] comes in the four-fold senses for places that are NOT rivers: @deva[मधुमान्] (place with honey), @deva[बिसवान्] (with lotus stalks). The @deva[मध्वादि] list: @deva[मधु], @deva[बिस], @deva[स्थाणु], @deva[वेणु], @deva[कर्कन्धु], @deva[शमी], @deva[करीर], @deva[हिम], @deva[किशरा], @deva[शर्याण], @deva[मरुत्], @deva[वार्दाली], @deva[शर], @deva[इष्टका], @deva[आसुति], @deva[शक्ति], etc.
"""

advanced = """
This @[sūtra] provides @deva[मतुप्] for @deva[मध्वादि] (non-rivers): @deva[मधुमान्], @deva[बिसवान्]. List: @deva[मधु] through @deva[शक्ति] etc.
"""

id = "4.2.131"
numericId = "42131"

[en]
simple = """
After @deva[मद्र] and @deva[वृजि], @deva[कन्] (not @deva[वुञ्]) is used. Examples: @deva[म॑द्रकः], @deva[वृ॑जिकः].
"""

standard = """
After @deva[मद्र] and @deva[वृजि], the affix @deva[कन्] comes in remaining senses (debarring @deva[वुञ्], though these denote inhabited countries): @deva[म॑द्रकः] (born in Madra), @deva[वृ॑जिकः]. The accent mark shows @deva[आद्युदात्त].
"""

advanced = """
This @[sūtra] provides @deva[कन्] (debarring @deva[वुञ्]) for @deva[मद्र]/@deva[वृजि]: @deva[मद्रकः], @deva[वृजिकः] (both @deva[आद्युदात्त]).
"""

id = "4.2.34"
numericId = "42034"

[en]
simple = """
After time-words, the affixes from @ref[4.3.11] to @ref[4.3.53] (meaning 'who stays there') also apply in deity-sense. Example: @deva[मासिकम्] (belonging to a month-deity).
"""

standard = """
After words expressing time (@deva[काल]), the affixes taught in @ref[4.3.11]-@ref[4.3.53] (meaning 'who stays there') also apply in the sense of 'that its deity': @deva[मासे भवम्] = @deva[मासिकम्] (@deva[मास] + @deva[ठञ्]) can mean both 'occurring in a month' and 'belonging to a month-deity'. Similarly @deva[सांवत्सरिकम्] (yearly / belonging to Year-deity).
"""

advanced = """
This @[sūtra] extends @ref[4.3.11]-@ref[4.3.53] affixes (@deva[तत्र भवः]) to @deva[देवता]-sense for @deva[काल]-words: @deva[मासिकम्], @deva[सांवत्सरिकम्] (both @deva[तत्र भव] and @deva[तद्देवता] senses).
"""

id = "4.2.40"
numericId = "42040"

[en]
simple = """
After @deva[केदार] (field), @deva[यञ्] and @deva[वुञ्] are used for 'collection'. Examples: @deva[कैदार्यम्], @deva[कैदारकम्].
"""

standard = """
After @deva[केदार] (cultivated field), the affixes @deva[यञ्] and @deva[वुञ्] come in the sense of 'collection' (debarring @deva[ठक्] of @ref[4.2.47]): @deva[केदाराणां समूहः] = @deva[कैदार्यम्] (@deva[यञ्]) or @deva[कैदारकम्] (@deva[वुञ्]). @[vārtika]: @deva[यञ्] also comes after @deva[गणिका]: @deva[गाणिक्यम्] (group of courtesans).
"""

advanced = """
This @[sūtra] provides @deva[यञ्]/@deva[वुञ्] (debarring @deva[ठक्] @ref[4.2.47]) for @deva[केदार]: @deva[कैदार्यम्], @deva[कैदारकम्]. @[vārtika]: @deva[गणिका] + @deva[यञ्] = @deva[गाणिक्यम्].
"""

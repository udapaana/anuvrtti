id = "4.2.124"
numericId = "42124"

[en]
simple = """
After @deva[वृद्ध] words denoting an inhabited country (@deva[जनपद]) or its boundary, @deva[वुञ्] is used. Examples: @deva[आभिसारकः], @deva[आदर्शकः] (inhabited); @deva[औपुष्टकः], @deva[श्यामायनकः] (boundary).
"""

standard = """
After @deva[वृद्ध] words denoting an inhabited kingdom (@deva[जनपद]) or the boundary of such a kingdom (@deva[जनपदावधि]), the affix @deva[वुञ्] comes in remaining senses (debarring @deva[छ]). @deva[वृद्धात्] and @deva[देशे] are understood. @deva[जनपद] examples: @deva[आभिसारकः], @deva[आदर्शकः]. @deva[जनपदावधि] examples: @deva[औपुष्टकः], @deva[श्यामायनकः] (from uninhabited border regions @deva[औपुष्ट], @deva[श्यामायन]).
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[छ]) for @deva[वृद्ध जनपद]/@deva[जनपदावधि]: @deva[आभिसारकः], @deva[आदर्शकः] (@deva[जनपद]); @deva[औपुष्टकः], @deva[श्यामायनकः] (@deva[अवधि]).
"""

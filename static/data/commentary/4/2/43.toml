id = "4.2.43"
numericId = "42043"

[en]
simple = """
After @deva[ग्राम], @deva[जन], @deva[बन्धु], @deva[सहाय], @deva[तल्] is used for 'collection'. Examples: @deva[ग्रामता], @deva[जनता], @deva[बन्धुता], @deva[सहायता].
"""

standard = """
After @deva[ग्राम] (village), @deva[जन] (person), @deva[बन्धु] (relative), @deva[सहाय] (ally), the affix @deva[तल्] comes for 'collection': @deva[ग्रामता] (collection of villages), @deva[जनता] (populace), @deva[बन्धुता] (relatives collectively), @deva[सहायता] (allies collectively). Words ending in @deva[तल्] are all feminine. @[vārtika]: Also after @deva[गज] (elephant): @deva[गजता] (herd of elephants).
"""

advanced = """
This @[sūtra] provides @deva[तल्] for @deva[ग्राम]/@deva[जन]/@deva[बन्धु]/@deva[सहाय]: @deva[ग्रामता], @deva[जनता], @deva[बन्धुता], @deva[सहायता] (all f.). @[vārtika]: @deva[गज] + @deva[तल्] = @deva[गजता].
"""

id = "4.2.138"
numericId = "42138"

[en]
simple = """
After @deva[गह] etc., @deva[छ] is used. Examples: @deva[गहीयः] (belonging to a cave), @deva[अन्तःस्थीयः], @deva[मध्यमीयाः].
"""

standard = """
After @deva[गहादि] words, the affix @deva[छ] comes in remaining senses (debarring @deva[अण्] etc.): @deva[गहीयः] (belonging to a cave), @deva[अन्तःस्थीयः]. Special rule in the list: '@deva[मध्यमध्यमं चाण् चरणे]'—@deva[मध्य] becomes @deva[मध्यम] when @deva[छ] is added: @deva[मध्यमीयाः]. But when the sense is a Vedic school (@deva[चरण]), @deva[अण्] is used: @deva[माध्यमाः]. @deva[मध्यम] here means 'middle of the body' specifically.
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्]) for @deva[गहादि]: @deva[गहीयः], @deva[अन्तःस्थीयः]. Special: @deva[मध्य] → @deva[मध्यम] + @deva[छ] = @deva[मध्यमीयाः]; for @deva[चरण]: @deva[अण्] = @deva[माध्यमाः].
"""

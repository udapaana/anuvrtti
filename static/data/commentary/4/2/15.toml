id = "4.2.15"
numericId = "42015"

[en]
simple = """
After @deva[स्थण्डिल] (bare ground), @deva[अञ्] is used meaning 'one who has vowed to sleep thereon'. Example: @deva[स्थाण्डिलः] (ascetic who sleeps on bare ground).
"""

standard = """
After @deva[स्थण्डिल] (bare ground), the affix @deva[अञ्] comes in the sense of 'one who has taken a vow to sleep thereon': @deva[स्थण्डिले शयितुं व्रतमस्य] = @deva[स्थाण्डिलः] (one who has vowed to sleep on bare ground—an ascetic or @deva[ब्रह्मचारिन्]). Why 'vow' (@deva[व्रत]) specifically? For ordinary sleeping (without vow): @deva[स्थण्डिले शेते] (he sleeps on ground) doesn't take the affix.
"""

advanced = """
This @[sūtra] extends @deva[अञ्] to @deva[स्थण्डिल] in @deva[व्रत]-@deva[शयन] sense: @deva[स्थाण्डिलः] = vow-bound ground-sleeper. Without @deva[व्रत]: no affix (@deva[स्थण्डिले शेते]).
"""

id = "4.2.104"
numericId = "42104"

[en]
simple = """
After indeclinables (@deva[अव्यय]), @deva[त्यप्] is used. Examples: @deva[अमात्यः] (minister), @deva[इहत्यः] (here-person).
"""

standard = """
After indeclinables (@deva[अव्यय]), the affix @deva[त्यप्] comes in remaining senses. @[kārikā]: This is restricted to specific indeclinables—@deva[अमा] (together), @deva[इह] (here), @deva[क्व] (where), and those ending in @deva[तसि] (@ref[5.3.7]) or @deva[त्र] (@ref[5.3.10]). Examples: @deva[अमात्यः] (minister, lit. 'one together with'); @deva[इहत्यः] (local, of this place).
"""

advanced = """
This @[sūtra] provides @deva[त्यप्] for @deva[अव्यय]. @[kārikā] restricts to: @deva[अमा], @deva[इह], @deva[क्व], @deva[तसि]-ending (@ref[5.3.7]), @deva[त्र]-ending (@ref[5.3.10]). @deva[अमात्यः], @deva[इहत्यः].
"""

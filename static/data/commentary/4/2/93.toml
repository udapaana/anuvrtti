id = "4.2.93"
numericId = "42093"

[en]
simple = """
After @deva[राष्ट्र], @deva[घ] is used; after @deva[अवारपार], @deva[ख] is used. Examples: @deva[राष्ट्रियः], @deva[अवारपारीणः].
"""

standard = """
After @deva[राष्ट्र] (country), affix @deva[घ] comes; after @deva[अवारपार] (both banks), affix @deva[ख] comes. @deva[घ] → @deva[इय] (@ref[7.1.2]); @deva[ख] → @deva[ईन] (@ref[7.1.2]). Thus: @deva[राष्ट्रियः] (born/produced in a country); @deva[अवारपारीणः] (extending to both banks). @[vārtika]: @deva[ख] also comes when @deva[अवार] and @deva[पार] are separate or compounded inversely: @deva[अवारीणः], @deva[पारीणः], @deva[पारावारीणः].
"""

advanced = """
This @[sūtra] provides @deva[घ] for @deva[राष्ट्र] and @deva[ख] for @deva[अवारपार]: @deva[राष्ट्रियः], @deva[अवारपारीणः]. @ref[7.1.2] substitutions. @[vārtika]: @deva[अवारीणः], @deva[पारीणः], @deva[पारावारीणः].
"""

id = "4.2.31"
numericId = "42031"

[en]
simple = """
After @deva[वायु], @deva[ऋतु], @deva[पितृ], @deva[उषस्] (deity names), @deva[यत्] is used. Examples: @deva[वायव्यम्], @deva[ऋतव्यम्], @deva[पित्र्यम्], @deva[उषस्यम्].
"""

standard = """
After the deity names @deva[वायु] (Wind), @deva[ऋतु] (Season), @deva[पितृ] (Ancestors), @deva[उषस्] (Dawn), the affix @deva[यत्] comes (debarring @deva[अण्]): @deva[वायव्यम्] (belonging to Wind), @deva[ऋतव्यम्] (to Season), @deva[पित्र्यम्] (to Ancestors), @deva[उषस्यम्] (to Dawn). Derivation of @deva[पित्र्यम्]: @deva[पितृ] + @deva[यत्] = @deva[पित्] + @deva[रीङ्] + @deva[य] (@ref[7.4.27]) = @deva[पित्र्यम्] (@ref[6.4.148]). The form has @deva[आद्युदात्त] by @ref[6.1.213].
"""

advanced = """
This @[sūtra] provides @deva[यत्] (debarring @deva[अण्]) for @deva[वायु]/@deva[ऋतु]/@deva[पितृ]/@deva[उषस्]]: @deva[वायव्यम्], @deva[ऋतव्यम्], @deva[पित्र्यम्], @deva[उषस्यम्]. @deva[पितृ] + @deva[य]: @ref[7.4.27] @deva[रीङ्], @ref[6.4.148]; @ref[6.1.213] @deva[आद्युदात्त].
"""

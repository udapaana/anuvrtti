id = "4.2.46"
numericId = "42046"

[en]
simple = """
After Vedic school names, the affixes denoting 'rule of that school' (@ref[4.3.126] ff.) also apply in collection-sense. Example: @deva[कठानां धर्मः] = @deva[काठकम्].
"""

standard = """
After names of Vedic schools (@deva[चरण]) like @deva[कठ], @deva[कलाप], the affixes taught in @ref[4.3.126] ff. (denoting 'rule/doctrine of that school') also apply in the sense of 'collection thereof': @deva[कठानां धर्मः] = @deva[काठकम्] (the doctrine belonging to the @[kaṭha] collection). The word @deva[धर्म] is supplied from the @deva[इष्टि]: @deva[चरणाद्धर्माम्नाययोः].
"""

advanced = """
This @[sūtra] extends @ref[4.3.126] ff. affixes (@deva[चरण-धर्म] sense) to @deva[समूह]-sense: @deva[काठकम्]. @deva[धर्म] from @deva[इष्टि]: @deva[चरणाद्धर्माम्नाययोः].
"""

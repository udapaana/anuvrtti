id = "4.2.111"
numericId = "42111"

[en]
simple = """
After patronymics formed from @deva[कण्व] etc., @deva[अण्] is used. Example: @deva[काण्वाः] (pupils of @[kāṇva]), @deva[गौकक्षाः].
"""

standard = """
After words ending in the @deva[गोत्र] (patronymic) affix ordained for @deva[कण्वादि] words, the affix @deva[अण्] comes in remaining senses (debarring @deva[छ] @ref[4.2.114]): @deva[काण्वाः] (the pupils of @[kāṇva]); @deva[गौकक्षाः]. The word @deva[गोत्रे] doesn't qualify the sense of the base or affix—it simply means 'after a word ending with the affix ordained for @deva[गोत्र] from @[kaṇvādi] words'.
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[छ] @ref[4.2.114]) for @deva[कण्वादि-गोत्रान्त]: @deva[काण्वाः], @deva[गौकक्षाः]. @deva[गोत्रे] = after @deva[गोत्र]-affix from @[kaṇvādi].
"""

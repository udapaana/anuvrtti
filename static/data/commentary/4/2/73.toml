id = "4.2.73"
numericId = "42073"

[en]
simple = """
After polysyllabic stems, @deva[अञ्] is used when 'a well' is meant. Examples: @deva[दैर्घवरत्रः] (well built by @[dīrghavaratra]), @deva[कापिलवरत्रः].
"""

standard = """
After polysyllabic @deva[प्रातिपदिक] (nominal stems), the affix @deva[अञ्] comes (debarring @deva[अण्]) when 'a well' (@deva[कूप]) is to be designated: @deva[दीर्घवरत्रेण निर्वृत्तः कूपः] = @deva[दैर्घवरत्रः] (a well completed by @[dīrghavaratra]); similarly @deva[कापिलवरत्रः]. The 'quadruple senses' apply here to well-names.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] (debarring @deva[अण्]) for @deva[बह्वच् प्रातिपदिक] when @deva[कूप] is denoted: @deva[दैर्घवरत्रः], @deva[कापिलवरत्रः].
"""

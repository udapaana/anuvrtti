id = "4.2.59"
numericId = "42059"

[en]
simple = """
After words meaning 'subject of study', @deva[अण्] is used meaning 'one who studies/understands that'. Examples: @deva[छान्दसः], @deva[वैयाकरणः], @deva[नैरुक्तः].
"""

standard = """
The affix @deva[अण्] (from @ref[4.1.83]) comes after words denoting a subject of study, meaning 'one who has studied or understands that': @deva[छन्दोऽधीते] = @deva[छान्दसः] (one who studies prosody); @deva[वैयाकरणः] (@ref[7.3.3]) (grammarian); @deva[नैरुक्तः] (etymologist); @deva[नैमित्तः] (one who knows causes/omens). The word is in accusative sense (object of study).
"""

advanced = """
This @[sūtra] provides @deva[अण्] for study-subjects in @deva[अधीते/वेद] sense (accusative): @deva[छान्दसः], @deva[वैयाकरणः] (@ref[7.3.3]), @deva[नैरुक्तः], @deva[नैमित्तः].
"""

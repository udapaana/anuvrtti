id = "4.2.106"
numericId = "42106"

[en]
simple = """
After words ending in @deva[तीर], @deva[अञ्] is used; after words ending in @deva[रूप्य], @deva[ञ] is used. Examples: @deva[काकतीरम्], @deva[पाल्वलतीरम्], @deva[वार्करूप्यम्], @deva[शैवरूप्यम्].
"""

standard = """
After words ending in @deva[तीर] (bank), the affix @deva[अञ्] comes; after words ending in @deva[रूप्य] (silver), the affix @deva[ञ] comes, in remaining senses (debarring @deva[अण्]): @deva[काकतीरम्], @deva[पाल्वलतीरम्] (from @deva[तीर]-ending); @deva[वार्करूप्यम्], @deva[शैवरूप्यम्] (from @deva[रूप्य]-ending). Feminine: @deva[अञ्]-forms take @deva[ङीप्] (@ref[4.1.15]); @deva[ञ]-forms take @deva[टाप्] (@ref[4.1.4]). Note: @[sūtra] is NOT @deva[तीररूप्यान्तात्] to prevent applying to @deva[तदन्त] words.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[तीरान्त] and @deva[ञ] for @deva[रूप्यान्त]: @deva[काकतीरम्], @deva[वार्करूप्यम्]. @deva[अञ्] → @deva[ङीप्] (@ref[4.1.15]); @deva[ञ] → @deva[टाप्] (@ref[4.1.4]). Not @deva[तीररूप्यान्तात्] to avoid @deva[तदन्तविधि].
"""

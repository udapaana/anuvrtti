id = "4.2.96"
numericId = "42096"

[en]
simple = """
After @deva[कुल]/@deva[कुक्षि]/@deva[ग्रीवा], @deva[ढकञ्] is used with specific meanings: dog, sword, necklace. Examples: @deva[कौलेयकः] (dog), @deva[कौक्षेयकः] (sword), @deva[ग्रैवेयकः] (necklace).
"""

standard = """
After @deva[कुल] (family), @deva[कुक्षि] (belly/sheath), @deva[ग्रीवा] (neck), the affix @deva[ढकञ्] comes with specific meanings: @deva[कौलेयकः] = dog (lit. 'pertaining to family'); @deva[कौक्षेयकः] = sword (lit. 'remaining in sheath'); @deva[ग्रैवेयकः] = necklace. When NOT having these meanings, the usual remaining senses apply: @deva[कौलेयकम्] (family property), @deva[ग्रैवेयकम्] (neck ornament in general).
"""

advanced = """
This @[sūtra] provides @deva[ढकञ्] for @deva[कुल]/@deva[कुक्षि]/@deva[ग्रीवा] with specific meanings: @deva[कौलेयकः] = dog; @deva[कौक्षेयकः] = sword; @deva[ग्रैवेयकः] = necklace. Otherwise, general @deva[शेष]-sense.
"""

id = "4.2.44"
numericId = "42044"

[en]
simple = """
After words with @deva[अनुदात्त] on the first syllable, @deva[अञ्] is used for 'collection'. Examples: @deva[कापोतम्] (flock of pigeons), @deva[मायूरम्], @deva[तैत्तिरम्].
"""

standard = """
After words having @deva[अनुदात्त] (grave accent) on the first syllable, the affix @deva[अञ्] comes for 'collection': @deva[कपोतानां समूहः] = @deva[कापोतम्] (flock of pigeons); similarly @deva[मायूरम्] (flock of peacocks), @deva[तैत्तिरम्] (flock of partridges). The accent condition identifies which words take @deva[अञ्].
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[आद्यनुदात्त] words in @deva[समूह]-sense: @deva[कापोतम्], @deva[मायूरम्], @deva[तैत्तिरम्]. @deva[अनुदात्तादि] = first syllable @deva[अनुदात्त].
"""

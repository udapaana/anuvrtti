id = "4.2.22"
numericId = "42022"

[en]
simple = """
After @deva[आग्रहायणी] and @deva[अश्वत्थ] (full-moon night names), @deva[ठक्] (not @deva[अण्]) is used. Examples: @deva[आग्रहायणिको मासः], @deva[आश्वत्थिकः].
"""

standard = """
After @deva[आग्रहायणी] and @deva[अश्वत्थ] (full-moon night names in nominative), the affix @deva[ठक्] comes (debarring @deva[अण्]) in the sense of 'time-division in which it falls': @deva[आग्रहायणिको मासः] (the month called @[āgrahāyaṇika]—in which the moon is full in @[āgrahāyaṇa] asterism); similarly @deva[आश्वत्थिकः]. The words @deva[सास्मिन्पौर्णमासीति] from @ref[4.2.21] govern this @[sūtra] too.
"""

advanced = """
This @[sūtra] provides @deva[ठक्] (debarring @deva[अण्]) for @deva[आग्रहायणी]/@deva[अश्वत्थ]: @deva[आग्रहायणिकः], @deva[आश्वत्थिकः]. @ref[4.2.21] @deva[अनुवृत्ति] applies.
"""

id = "4.2.60"
numericId = "42060"

[en]
simple = """
After sacrifice names, @deva[उक्थ]-etc., and @deva[सूत्र]-ending words, @deva[ठञ्] is used for 'one who studies'. Examples: @deva[आग्निष्टोमिकः], @deva[औक्थिकः], @deva[वार्त्तिकसूत्रिकः].
"""

standard = """
After names of sacrifices, after @deva[उक्थादि] words, and after stems ending in @deva[सूत्र], the affix @deva[ठञ्] comes meaning 'one who studies/understands' (debarring @deva[अण्]): @deva[आग्निष्टोमिकः] (one who studies @[agniṣṭoma] sacrifice); @deva[वाजपेयिकः]; @deva[औक्थिकः]; @deva[लौकायतिकः]; @deva[वार्त्तिकसूत्रिकः], @deva[सांग्रहसूत्रिकः]. @deva[इष्टि]: If @deva[सूत्र]-word begins with @deva[कल्प], @deva[अण्] is added instead: @deva[कल्पसूत्रम्] → @deva[कालपसौत्रः].
"""

advanced = """
This @[sūtra] provides @deva[ठञ्] (debarring @deva[अण्]) for @deva[यज्ञ]/@deva[उक्थादि]/@deva[सूत्रान्त]: @deva[आग्निष्टोमिकः], @deva[औक्थिकः], @deva[वार्त्तिकसूत्रिकः]. @deva[इष्टि]: @deva[कल्पसूत्र] + @deva[अण्] = @deva[कालपसौत्रः].
"""

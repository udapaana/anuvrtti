id = "4.2.61"
numericId = "42061"

[en]
simple = """
After @deva[क्रम] etc., @deva[वुन्] is used for 'one who studies/knows'. Examples: @deva[क्रमकः], @deva[पदकः], @deva[शिक्षकः].
"""

standard = """
After @deva[क्रमादि] words, the affix @deva[वुन्] comes meaning 'one who studies or knows' (debarring @deva[अण्]): @deva[क्रमकः] (@ref[7.1.1]) (one who studies @deva[क्रम]/sequence), @deva[पदकः], @deva[शिक्षकः], @deva[मीमांसकः], @deva[सामकः]. The @deva[क्रमादि] list: @deva[क्रम], @deva[पद], @deva[शिक्षा], @deva[मीमांसा], @deva[सामन्].
"""

advanced = """
This @[sūtra] provides @deva[वुन्] (debarring @deva[अण्]) for @deva[क्रमादि] (5 words): @deva[क्रमकः] (@ref[7.1.1]), @deva[पदकः], @deva[शिक्षकः], @deva[मीमांसकः], @deva[सामकः].
"""

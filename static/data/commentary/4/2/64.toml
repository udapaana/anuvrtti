id = "4.2.64"
numericId = "42064"

[en]
simple = """
After titles of works named after their announcer (@deva[प्रोक्त]-affixes), the 'student' affix is elided by @deva[लुक्]. Examples: @deva[पाणिनीयः] (student of @[pāṇini]'s grammar) = @deva[पाणिनीयः] (the work itself).
"""

standard = """
After a work-title ending in an affix denoting the announcer (@deva[प्रोक्त], taught in @ref[4.3.101] ff.), the affixes meaning 'one who studies' are elided by @deva[लुक्]: @deva[पाणिनिना प्रोक्तम्] = @deva[पाणिनीयम्] (@[pāṇini]'s grammar); one who studies it is also @deva[पाणिनीयः] (affix elided). Similarly @deva[कातन्त्रम्] → student = @deva[कातन्त्रः].
"""

advanced = """
This @[sūtra] provides @deva[लुक्] of @deva[अध्येतृ]-affix after @deva[प्रोक्तप्रत्ययान्त] (work-titles from @ref[4.3.101] ff.): @deva[पाणिनीयः] (work) = @deva[पाणिनीयः] (student).
"""

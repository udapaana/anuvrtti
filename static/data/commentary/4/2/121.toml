id = "4.2.121"
numericId = "42121"

[en]
simple = """
After @deva[वृद्ध] locality-names with penultimate @deva[य] or denoting a desert, @deva[वुञ्] is used. Examples: @deva[सांकाश्यकः], @deva[काम्पिल्यकः], @deva[पारेधन्वकः], @deva[ऐरावतकः].
"""

standard = """
After @deva[वृद्ध] words denoting a locality which have @deva[य] as penultimate (@deva[उपधाय]), or after @deva[वृद्ध] words denoting a desert/waste (@deva[धन्व]), the affix @deva[वुञ्] comes in remaining senses. @deva[वृद्धात्] and @deva[देशे] are understood. @deva[उपधाय] examples: @deva[सांकाश्यकः], @deva[काम्पिल्यकः]. @deva[धन्व] examples: @deva[पारेधन्वकः], @deva[ऐरावतकः].
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] for @deva[वृद्ध देश उपधाय] or @deva[वृद्ध धन्व]: @deva[सांकाश्यकः], @deva[काम्पिल्यकः] (@deva[उपधाय]); @deva[पारेधन्वकः], @deva[ऐरावतकः] (@deva[धन्व]).
"""

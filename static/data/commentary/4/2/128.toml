id = "4.2.128"
numericId = "42128"

[en]
simple = """
After @deva[नगर] (city), @deva[वुञ्] is used when censure or skill is implied. Example: @deva[नागरकः] (knave/cunning person/skillful person).
"""

standard = """
After @deva[नगर] (city), the affix @deva[वुञ्] comes in remaining senses when the meaning implies censure (@deva[कुत्सन]) or dexterity/skill (@deva[प्रावीण्य]): @deva[नागरकः] = 'a town-bred person' → 'knave, cunning person' (censure) or 'skillful, sophisticated person' (praise). The word literally means 'city-born' but idiomatically denotes either vices or virtues of city life.
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] for @deva[नगर] in @deva[कुत्सन]/@deva[प्रावीण्य] sense: @deva[नागरकः] = knave (@deva[कुत्सन]) or skilled (@deva[प्रावीण्य]).
"""

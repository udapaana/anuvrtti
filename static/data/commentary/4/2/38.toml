id = "4.2.38"
numericId = "42038"

[en]
simple = """
After @deva[भिक्षा] etc., @deva[अण्] is used for 'collection'. Examples: @deva[भैक्षम्] (alms collected), @deva[गार्भिणम्] (group of pregnant women).
"""

standard = """
After words like @deva[भिक्षा] (alms), the affix @deva[अण्] comes in the sense of 'collection': @deva[भिक्षाणां समूहः] = @deva[भैक्षम्] (what is collected as alms). Also @deva[गर्भिणी] + @deva[अण्] = @deva[गार्भिणम्] (the masculine @deva[भ]-form is substituted when @deva[तद्धित] follows, per @ref[4.1.88]). The word @deva[अण्] is repeated in this @[sūtra] (though @deva[अनुवृत्ति] applies) to block any obstructing rules.
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[भिक्षादि] in @deva[समूह]-sense: @deva[भैक्षम्], @deva[गार्भिणम्] (m. @deva[भ]-form per @ref[4.1.88]). @deva[अण्] repeated to block other affixes.
"""

id = "4.2.83"
numericId = "42083"

[en]
simple = """
After @deva[शर्करा] (gravel/sand), the affix is optionally elided. Example: @deva[शर्करा] or @deva[शार्करम्].
"""

standard = """
After @deva[शर्करा], the four-fold affix is optionally elided by @deva[लुप्]. Why 'optionally'? @deva[शर्करा] occurs in @deva[कुमुदादि] (class 2) and @deva[वराहादि] (class 14) per @ref[4.2.80], so it must take @deva[ठच्] and @deva[कक्] there. This rule teaches that ADDITIONALLY, elision is optional: @deva[शर्करा] (elided) or @deva[शार्करम्] (with affix).
"""

advanced = """
This @[sūtra] provides optional @deva[लुप्] for @deva[शर्करा]. @deva[शर्करा] in @deva[कुमुदादि]/@deva[वराहादि] (@ref[4.2.80]) takes @deva[ठच्]/@deva[कक्]; this rule adds optional elision: @deva[शर्करा]/@deva[शार्करम्].
"""

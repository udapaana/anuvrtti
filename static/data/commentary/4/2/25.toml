id = "4.2.25"
numericId = "42025"

[en]
simple = """
When @deva[अण्] is added to @deva[क] (@[prajāpati]'s name), the final @deva[अ] becomes @deva[इ]. Example: @deva[कायम्] (oblation sacred to Ka).
"""

standard = """
When @deva[अण्] is added to the deity name @deva[क] (a name of @[prajāpati]), short @deva[इ] substitutes for the final @deva[अ]: @deva[क] + @deva[अण्] = @deva[कि] + @deva[अण्] = @deva[कै] + @deva[अ] = @deva[कायम्] (oblation sacred to Ka). Examples: @deva[कायं हविः], @deva[कायमेककपालं निर्वपेत्] (one should offer a single-dish oblation to Ka).
"""

advanced = """
This @[sūtra] provides @deva[इ]-substitution for @deva[क] + @deva[अण्]: @deva[क] → @deva[कि] → @deva[कायम्]. @deva[क] = @[prajāpati]'s name.
"""

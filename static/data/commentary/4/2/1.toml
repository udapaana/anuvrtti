id = "4.2.1"
numericId = "42001"

[en]
simple = """
The affix @deva[अण्] (continuing from @ref[4.1.83]) is added after a color-word used in the instrumental sense, meaning "dyed with that color." The base word names the dye or pigment, and the derived adjective describes whatever has been dyed with it.

**Example:** @deva[कषायेण रक्तं वस्त्रम्] "cloth dyed with @deva[कषाय] (brownish-red dye)" becomes @deva[काषायम्] "brownish-red (cloth)." Similarly, @deva[हरिद्रया रक्तम्] "dyed with turmeric" becomes @deva[हारिद्रम्], and @deva[मञ्जिष्ठया रक्तम्] "dyed with madder" becomes @deva[माञ्जिष्ठम्].

This matters because Sanskrit regularly forms adjectives from the material used in a process, and this rule governs color-dyeing specifically.
"""

standard = """
This @[vidhi] (operational rule) extends the @deva[अण्] affix (active since @ref[4.1.83] @deva[प्राग्दीव्यतोऽण्]) to words denoting colors (@deva[रागशब्द]), construed in the instrumental case, with the meaning "dyed thereby" (@deva[तेन रक्तम्]). The root @deva[रञ्ज्] means "to dye/color"; @deva[राग] denotes the coloring substance.

**Worked examples:**
- @deva[कषायेण रक्तं वस्त्रम्] → @deva[काषायम्] — cloth dyed brownish-red. @deva[कषाय] + @deva[अण्] → @deva[वृद्धि] of first vowel → @deva[काषाय].
- @deva[हरिद्रया रक्तम्] → @deva[हारिद्रम्] — turmeric-dyed.
- @deva[मञ्जिष्ठया रक्तम्] → @deva[माञ्जिष्ठम्] — madder-dyed.

**Scope:** The rule applies specifically to @deva[रञ्ज्]-based dyeing (changing white to another color), not to natural coloring. The derived word is an adjective agreeing with the dyed object.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अण्] from @ref[4.1.83] (@deva[प्राग्दीव्यतोऽण्]).

This @[sūtra] inaugurates @deva[पादचतुर्थ-द्वितीयपाद] by extending @deva[अण्] to the semantic domain @deva[तेन रक्तम्] (instrumental sense: "dyed thereby"). The @deva[रागशब्द] here denotes substances that transform white (@deva[शुक्ल]) into another color, per the @deva[काशिका]: @deva[शुक्लस्य अन्यवर्णतापादनं रागः].

The @deva[वृद्धि] substitution of the first syllable follows from the @deva[ण्]-marker in @deva[अण्] (via @ref[7.2.117]). Examples: @deva[कषाय] → @deva[काषाय], @deva[हरिद्रा] → @deva[हारिद्र], @deva[मञ्जिष्ठा] → @deva[माञ्जिष्ठ].

The @deva[काशिका] notes that @deva[रक्त] specifically requires intentional dyeing, not natural color — so @deva[कुङ्कुमेन रक्तम्] = @deva[कौङ्कुमम्], but natural redness of blood does not trigger this rule. This rule is overridden for specific words by @ref[4.2.2], which prescribes @deva[ठक्] instead.
"""

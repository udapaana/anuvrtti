id = "4.2.117"
numericId = "42117"

[en]
simple = """
After @deva[वृद्ध] village-names of @deva[वाहीक] (Panjab region), @deva[ठञ्] and @deva[ञिठ्] are used. Examples: @deva[शाकलिकी]/@deva[शाकलिका], @deva[मान्थविकी]/@deva[मान्थविका].
"""

standard = """
After @deva[वृद्ध] words denoting villages of @deva[वाहीक] (the Panjab region), the affixes @deva[ठञ्] and @deva[ञिठ्] come in remaining senses (debarring @deva[छ] @ref[4.2.114]). @deva[वृद्धात्] is read into this @[sūtra]. Examples: @deva[शाकलिकी] or @deva[शाकलिका]; @deva[मान्थविकी] or @deva[मान्थविका].
"""

advanced = """
This @[sūtra] provides @deva[ठञ्]/@deva[ञिठ्] (debarring @deva[छ] @ref[4.2.114]) for @deva[वृद्ध वाहीक-ग्राम]: @deva[शाकलिकी]/@deva[शाकलिका], @deva[मान्थविकी]/@deva[मान्थविका].
"""

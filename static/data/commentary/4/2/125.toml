id = "4.2.125"
numericId = "42125"

[en]
simple = """
After always-plural country-words (whether @deva[वृद्ध] or not), @deva[वुञ्] is used. Examples: @deva[आङ्गकः], @deva[वाङ्गकः], @deva[कालिङ्गकः] (from @deva[अङ्गाः], @deva[वङ्गाः], @deva[कलिङ्गाः]).
"""

standard = """
After words that are always plural (@deva[नित्यबहुवचन]) and denote an inhabited country (@deva[जनपद]) or its boundary—even if NOT @deva[वृद्ध]—the affix @deva[वुञ्] comes in remaining senses (debarring @deva[छ] and @deva[अण्]). @deva[जनपद] and @deva[तदवधि] are understood. Examples: @deva[आङ्गकः], @deva[वाङ्गकः], @deva[कालिङ्गकः] (from non-@deva[वृद्ध] always-plural words @deva[अङ्गाः], @deva[वङ्गाः], @deva[कलिङ्गाः]).
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[छ]/@deva[अण्]) for @deva[नित्यबहुवचन जनपद]/@deva[अवधि] (even non-@deva[वृद्ध]): @deva[आङ्गकः], @deva[वाङ्गकः], @deva[कालिङ्गकः].
"""

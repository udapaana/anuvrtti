id = "4.2.7"
numericId = "42007"

[en]
simple = """
The affix @deva[अण्] is added after a person's name, used in the instrumental case, meaning "the @deva[साम] (Sāmaveda chant) seen/revealed to that person." In Vedic tradition, hymns are "seen" by seers (@deva[ऋषि]), not composed by them.

**Example:** @deva[क्रुञ्चेन दृष्टं साम] "the @deva[साम] revealed to @deva[क्रुञ्च]" becomes @deva[क्रौञ्चम्]. Similarly: @deva[वासिष्ठम्] (revealed to @deva[वसिष्ठ]), @deva[वैश्वामित्रम्] (to @deva[विश्वामित्र]).
"""

standard = """
This @[vidhi] rule extends @deva[अण्] (from @ref[4.1.83]) to the seer-names of @deva[साम] chants, construed in the instrumental case, meaning "the @deva[साम] seen/revealed to that @deva[ऋषि]" (@deva[तेन दृष्टं साम]).

**Worked examples:**
- @deva[क्रुञ्चेन दृष्टम्] → @deva[क्रौञ्चं साम] — the @[sāma] revealed to @[kruñca].
- @deva[वसिष्ठेन दृष्टम्] → @deva[वासिष्ठम्] — to @[vasiṣṭha].
- @deva[विश्वामित्रेण दृष्टम्] → @deva[वैश्वामित्रम्] — to @[viśvāmitra].

**Scope:** This applies specifically to @deva[साम] (chant portions of the Sāmaveda), not to @deva[ऋच्] (Ṛgvedic verses) or @deva[यजुस्] (Yajurvedic formulae). The term @deva[दृष्ट] carries the technical Vedic sense of "revealed to" a seer.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अण्] from @ref[4.1.83].

This @[sūtra] opens a new semantic domain: @deva[तेन दृष्टं साम] (instrumental → seer of a @[sāma] chant). The word @deva[दृष्ट] in Vedic hermeneutics means "revealed to" rather than ordinary visual perception — @deva[ऋषि]s are @deva[मन्त्रद्रष्टार], not @deva[मन्त्रकर्तार].

@ref[4.2.8] provides @deva[ढक्] for @deva[कलि], and @ref[4.2.9] provides @deva[ड्यत्]/@deva[ड्य] for @deva[वामदेव] — both overriding @deva[अण्] for specific seers. The @deva[कारिका] cited in @ref[4.2.8] notes: @deva[दृष्टे सामनि जाते च द्विरण्डिद्वा विधीयते] — for both "seen @[sāma]" and "born" senses, @deva[अण्] or @deva[ढक्] are prescribed.

The @deva[वृद्धि] on the first syllable distinguishes these derivatives from the base @deva[ऋषि]-name: @deva[क्रुञ्च] (the seer) vs. @deva[क्रौञ्च] (his @[sāma]).
"""

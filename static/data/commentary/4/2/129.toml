id = "4.2.129"
numericId = "42129"

[en]
simple = """
After @deva[अरण्य] (forest), @deva[वुञ्] is used when meaning 'a man'. Example: @deva[आरण्यकः मनुष्यः] (forester).
"""

standard = """
After @deva[अरण्य] (forest), the affix @deva[वुञ्] comes in remaining senses when the meaning is 'a man' (debarring @deva[अण्]): @deva[आरण्यकः मनुष्यः] (a forester). @[vārtika]: @deva[वुञ्] also applies in the sense of 'way', 'lesson/doctrine' (@[upaniṣad]), 'maxim', 'game', 'man', or 'elephant': @deva[आरण्यकः पन्थाः] (forest-path), @deva[आरण्यकः अध्यायः] (@[āraṇyaka] text), @deva[आरण्यकः न्यायः], @deva[आरण्यकः विहारः], @deva[आरण्यकः मनुष्यः/हस्ती].
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[अण्]) for @deva[अरण्य] in @deva[मनुष्य]-sense: @deva[आरण्यकः]. @[vārtika]: also @deva[पन्थाः]/@deva[अध्यायः]/@deva[न्यायः]/@deva[विहारः]/@deva[मनुष्यः]/@deva[हस्ती].
"""

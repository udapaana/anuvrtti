id = "4.2.26"
numericId = "42026"

[en]
simple = """
After @deva[शुक्र] (deity name), @deva[घन्] (not @deva[अण्]) is used. Example: @deva[शुक्रियम्] (oblation belonging to @[śukra]).
"""

standard = """
After the deity name @deva[शुक्र], the affix @deva[घन्] comes (debarring @deva[अण्]) in the sense of 'that its deity': @deva[शुक्र] + @deva[घन्] = @deva[शुक्रियम्] (@ref[7.1.2]) (oblation belonging to @[śukra]). Example: @deva[शुक्रियं हविः], @deva[शुक्रियोऽध्यायः] (the chapter sacred to @[śukra]).
"""

advanced = """
This @[sūtra] provides @deva[घन्] (debarring @deva[अण्]) for @deva[शुक्र]: @deva[शुक्रियम्] (@ref[7.1.2]). @deva[घन्] = @deva[इय].
"""

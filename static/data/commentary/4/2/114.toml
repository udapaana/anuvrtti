id = "4.2.114"
numericId = "42114"

[en]
simple = """
After @deva[वृद्ध] words (having @deva[वृद्धि] in first syllable), @deva[छ] is used. Examples: @deva[गार्गीयः], @deva[वात्सीयः], @deva[शालीयः], @deva[मालीयः].
"""

standard = """
After @deva[वृद्ध] words (defined in @ref[1.1.73] ff.—having @deva[वृद्धि] in first syllable), the affix @deva[छ] (@deva[ईय]) comes in remaining senses (debarring @deva[अण्]): from @deva[गार्ग्य] → @deva[गार्गीयः] (@ref[6.4.148], @ref[6.4.152]); @deva[वात्सीयः], @deva[शालीयः], @deva[मालीयः]. The word @deva[गोत्र] doesn't govern this @[sūtra]—it's a general rule. This subsequent rule debars preceding rules in case of conflict (@ref[1.4.2]).
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्]) for @deva[वृद्ध] (@ref[1.1.73] ff.): @deva[गार्गीयः], @deva[वात्सीयः], @deva[शालीयः], @deva[मालीयः]. @ref[6.4.148], @ref[6.4.152]. General rule; @deva[गोत्र] doesn't govern.
"""

id = "4.2.103"
numericId = "42103"

[en]
simple = """
After @deva[कन्था], @deva[वुक्] is used when referring to something in @deva[वर्णु] land. Example: @deva[कान्थकम्].
"""

standard = """
After @deva[कन्था], the affix @deva[वुक्] (@deva[अक]) is added when the word treats about something found in the land of @deva[वर्णु] (a river and the country near it): @deva[कान्थकम्] (Kanthaka from @[varṇu] region). The affix denoting the country @deva[वर्णु] is elided by @ref[4.2.81].
"""

advanced = """
This @[sūtra] provides @deva[वुक्] for @deva[कन्था] in @deva[वर्णु]-context: @deva[कान्थकम्]. @deva[वर्णु]-country affix elided by @ref[4.2.81].
"""

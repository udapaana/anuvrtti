id = "4.2.116"
numericId = "42116"

[en]
simple = """
After @deva[काशि] etc., @deva[ठञ्] and @deva[ञिठ्] are used. Examples: @deva[काशिका]/@deva[काशिकी], @deva[बैदिका]/@deva[बैदिकी].
"""

standard = """
After @deva[काश्यादि] words, the affixes @deva[ठञ्] and @deva[ञिठ्] come in remaining senses. In both, @deva[ठ्] → @deva[इक]; other letters are @deva[अनुबन्ध]. The forms are same, but feminine differs: @deva[ठञ्]-forms take @deva[ङीप्] (@ref[4.1.15]); @deva[ञिठ्]-forms take @deva[टाप्] (@ref[4.1.47]). Thus: @deva[काशिका] (f. @deva[आ]) or @deva[काशिकी] (f. @deva[ई]); @deva[बैदिका] or @deva[बैदिकी].
"""

advanced = """
This @[sūtra] provides @deva[ठञ्]/@deva[ञिठ्] for @deva[काश्यादि]: @deva[काशिका]/@deva[काशिकी], @deva[बैदिका]/@deva[बैदिकी]. @deva[ठ्] → @deva[इक]. @deva[ठञ्] → @deva[ङीप्] (@ref[4.1.15]); @deva[ञिठ्] → @deva[टाप्] (@ref[4.1.47]).
"""

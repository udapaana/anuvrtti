id = "4.2.20"
numericId = "42020"

[en]
simple = """
After @deva[क्षीर] (milk), @deva[ढञ्] is used for 'prepared therein'. Example: @deva[क्षैरेयी यवागूः] (milky gruel).
"""

standard = """
After @deva[क्षीर] (milk), the affix @deva[ढञ्] (@deva[एय]) comes (debarring @deva[अण्]) in the sense of 'prepared therein': @deva[क्षीरे संस्कृताः] = @deva[क्षैरेयी यवागूः] (gruel prepared in milk, i.e., milky gruel). The feminine @deva[ई] comes from the base @deva[यवागू].
"""

advanced = """
This @[sūtra] provides @deva[ढञ्] (debarring @deva[अण्]) for @deva[क्षीर] in @deva[संस्कृत] sense: @deva[क्षैरेयी यवागूः]. @deva[ढञ्] = @deva[एय].
"""

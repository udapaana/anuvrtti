id = "4.2.52"
numericId = "42052"

[en]
simple = """
The affix @deva[अण्] is added after a word (in genitive) meaning 'whose territory/sphere', when a country is meant. Examples: @deva[वैदर्भः], @deva[माहिषिकः] (land of Vidarbha/@[mahiṣa] people).
"""

standard = """
The affix @deva[अण्] (from @ref[4.1.83]) comes after a word in the genitive case meaning 'whose sphere/territory' (@deva[विषय]), when the result denotes a country (@deva[देश]): @deva[विदर्भाणां विषयः देशः] = @deva[वैदर्भः] (Vidarbha country); @deva[माहिषिकः] (@[mahiṣa] land). The @deva[अनुवृत्ति] of @deva[समूह] (@ref[4.2.37]) doesn't continue, but @deva[तस्य] does. @deva[विषय] = sphere, domain, topic.
"""

advanced = """
This @[sūtra] extends @deva[अण्] to genitive sense @deva[तस्य विषयो देशे]: @deva[वैदर्भः], @deva[माहिषिकः]. @deva[समूह] @deva[अनुवृत्ति] stops; @deva[तस्य] continues. @deva[विषय] = territory/sphere.
"""

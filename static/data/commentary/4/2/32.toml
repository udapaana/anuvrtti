id = "4.2.32"
numericId = "42032"

[en]
simple = """
After @deva[द्यावापृथिवी], @deva[शुनासीर], @deva[मरुत्वत्], @deva[अग्निषोम], @deva[वास्तोष्पति], @deva[गृहमेधा], @deva[छ] is used. Examples: @deva[द्यावापृथिवीयम्], @deva[शुनासीरीयम्], @deva[अग्निषोमीयम्].
"""

standard = """
After the deity names @deva[द्यावापृथिवी] (Heaven-Earth), @deva[शुनासीर] (@[śuna] and @[sīra]), @deva[मरुत्वत्] (Indra with Maruts), @deva[अग्निषोम] (Agni-Soma), @deva[वास्तोष्पति] (Lord of Dwelling), @deva[गृहमेधा] (Household), the affix @deva[छ] (@deva[ईय]) comes: @deva[द्यावापृथिवीयम्] or @deva[द्यावापृथिव्यम्] (belonging to Heaven-Earth); @deva[शुनासीरीयम्] or @deva[शुनासीर्यम्]; @deva[मरुत्त्वतीयम्] or @deva[मरुत्त्वत्यम्]; @deva[अग्निषोमीयम्] or @deva[आग्निषोमम्] (@deva[अण्]).
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्]) for @deva[द्यावापृथिवी]/@deva[शुनासीर]/@deva[मरुत्वत्]/@deva[अग्निषोम]/@deva[वास्तोष्पति]/@deva[गृहमेधा]: @deva[द्यावापृथिवीयम्], @deva[शुनासीरीयम्], @deva[मरुत्त्वतीयम्], @deva[अग्निषोमीयम्], @deva[वास्तोष्पतीयम्], @deva[गृहमेधीयम्].
"""

id = "4.2.41"
numericId = "42041"

[en]
simple = """
After @deva[केदार] and @deva[कवचिन्] (armored), @deva[ठञ्] is used for 'collection'. Examples: @deva[कैदारिकम्], @deva[कावचिकम्].
"""

standard = """
After @deva[केदार] and @deva[कवचिन्] (one wearing armor), the affix @deva[ठञ्] comes in the sense of 'collection': @deva[कावचिकम्] (@ref[6.4.144]) (group of armored warriors); @deva[कैदारिकम्] (group of fields). The @deva[अनुवृत्ति] of @deva[केदार] is read here by virtue of @deva[च].
"""

advanced = """
This @[sūtra] provides @deva[ठञ्] for @deva[कवचिन्] and @deva[केदार] (by @deva[च]) in @deva[समूह]-sense: @deva[कावचिकम्] (@ref[6.4.144]), @deva[कैदारिकम्].
"""

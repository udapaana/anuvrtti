id = "4.2.133"
numericId = "42133"

[en]
simple = """
After @deva[कच्छ] etc. (place-names), @deva[अण्] is used. Examples: @deva[काच्छः], @deva[सैन्धवः], @deva[वार्णवः].
"""

standard = """
After @deva[कच्छादि] words denoting places, the affix @deva[अण्] comes in remaining senses (debarring @deva[वुञ्] etc.): @deva[काच्छः], @deva[सैन्धवः], @deva[वार्णवः]. @deva[देशे] is understood. @deva[कच्छादि] words are NOT invariable plurals (unlike @ref[4.2.125]), because @ref[4.2.134] shows they can signify humans and their habits. @deva[विजापक] in this list would also take @deva[अण्] by @ref[4.2.132] (penultimate @deva[क्]).
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[वुञ्]) for @deva[कच्छादि देश]: @deva[काच्छः], @deva[सैन्धवः], @deva[वार्णवः]. Not @deva[नित्यबहुवचन] (cf. @ref[4.2.134]). @deva[विजापक] also by @ref[4.2.132].
"""

id = "4.2.65"
numericId = "42065"

[en]
simple = """
After @[sūtra-work] titles having @deva[क्] as penultimate, the 'student' affix is elided. Examples: @deva[अष्टकाः पाणिनीयाः] (students of @[aṣṭaka] = @[aṣṭādhyāyī]).
"""

standard = """
After @[sūtra-work] titles having @deva[क्] as the penultimate letter, the affix meaning 'one who studies' is elided by @deva[लुक्]: @deva[अष्टकम्] (@[pāṇini]'s work) → students = @deva[अष्टकाः पाणिनीयाः] (those who study the @[aṣṭaka]); @deva[दशकाः वैयाघ्रपदीयाः]; @deva[त्रिकाः काशकृत्स्नाः]. @[vārtika]: Elision applies only when title is formed by a numeral (not just any @deva[क्]-penultimate word).
"""

advanced = """
This @[sūtra] provides @deva[लुक्] of @deva[अध्येतृ]-affix after @deva[उपधाक्] @[sūtra-titles]: @deva[अष्टकाः पाणिनीयाः], @deva[दशकाः वैयाघ्रपदीयाः]. @[vārtika]: only @deva[सङ्ख्या]-formed titles.
"""

id = "4.2.98"
numericId = "42098"

[en]
simple = """
After @deva[दक्षिणा], @deva[पश्चात्], @deva[पुरस्], @deva[त्यक्] is used. Examples: @deva[दाक्षिणात्यः] (southern), @deva[पाश्चात्यः] (western), @deva[पौरस्त्यः] (eastern).
"""

standard = """
After @deva[दक्षिणा] (south), @deva[पश्चात्] (west), @deva[पुरस्] (east), the affix @deva[त्यक्] (@deva[त्य]) comes in remaining senses: @deva[दाक्षिणात्यः] (pertaining to/produced in the south); @deva[पाश्चात्यः] (occidental, western); @deva[पौरस्त्यः] (oriental, eastern). @deva[अपाच्] means south in some usages.
"""

advanced = """
This @[sūtra] provides @deva[त्यक्] for @deva[दक्षिणा]/@deva[पश्चात्]/@deva[पुरस्]: @deva[दाक्षिणात्यः], @deva[पाश्चात्यः], @deva[पौरस्त्यः].
"""

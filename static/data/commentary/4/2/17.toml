id = "4.2.17"
numericId = "42017"

[en]
simple = """
After @deva[शूल] (spit) and @deva[उखा] (pot), @deva[यत्] (not @deva[अण्]) is used for 'food prepared therein'. Examples: @deva[शूल्यम्] (meat roasted on spit), @deva[उख्यम्] (flesh boiled in pot).
"""

standard = """
After @deva[शूल] (spit) and @deva[उखा] (pot), the affix @deva[यत्] comes (debarring @deva[अण्]) in the sense of 'prepared food': @deva[शूले संस्कृतम्] = @deva[शू॑ल्यम्] (meat roasted on a spit); @deva[उखायां संस्कृतम्] = @deva[उ॑ख्यम्] (flesh boiled in a pot). The accent mark shows @deva[यत्] causes initial @deva[उदात्त].
"""

advanced = """
This @[sūtra] provides @deva[यत्] (debarring @deva[अण्]) for @deva[शूल]/@deva[उखा] in @deva[संस्कृत-भक्ष्य] sense: @deva[शू॑ल्यम्], @deva[उ॑ख्यम्]. @deva[यत्] = @deva[आद्युदात्त].
"""

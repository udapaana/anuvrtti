id = "4.2.29"
numericId = "42029"

[en]
simple = """
After @deva[महेन्द्र], @deva[घ], @deva[अण्], and @deva[छ] all come. Examples: @deva[महेन्द्रियम्], @deva[माहेन्द्रम्], @deva[महेन्द्रीयम्].
"""

standard = """
After the deity name @deva[महेन्द्र] (Great Indra), the affixes @deva[घ], @deva[अण्], and @deva[छ] all come in the sense of 'that its deity': @deva[महेन्द्रियम्] (@deva[घ]), @deva[माहेन्द्रम्] (@deva[अण्]), @deva[महेन्द्रीयम्] (@deva[छ])—all meaning 'oblation sacred to Mahendra'.
"""

advanced = """
This @[sūtra] provides triple affixes for @deva[महेन्द्र]: @deva[घ] → @deva[महेन्द्रियम्]; @deva[अण्] → @deva[माहेन्द्रम्]; @deva[छ] → @deva[महेन्द्रीयम्].
"""

id = "4.2.14"
numericId = "42014"

[en]
simple = """
The affix @deva[अञ्] comes after vessel names (in locative) meaning 'food placed thereon'. Examples: @deva[शारावः], @deva[मालवकः] (rice placed on a dish/bowl).
"""

standard = """
The affix @deva[अञ्] (continuing from @ref[4.1.83]) comes after words denoting vessels (@deva[आमत्र]), when in the locative case, meaning 'food placed thereon': @deva[शरावेषूद्धृतः ओदनः] = @deva[शारावः] (boiled rice placed on dishes); @deva[मालवक] (rice on a bowl). @deva[तत्र] = 'thereon' (locative sense); @deva[आमत्र] = 'vessel'; @deva[उद्धृत] = 'placed' (lit. 'the remnants of dinner').
"""

advanced = """
This @[sūtra] extends @deva[अञ्] (@ref[4.1.83]) to @deva[आमत्र] (vessel words) in locative (@deva[तत्र उद्धृतम्]): @deva[शारावः ओदनः], @deva[मालवकः]. @deva[उद्धृत] = placed (food remnants sense).
"""

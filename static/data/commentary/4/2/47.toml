id = "4.2.47"
numericId = "42047"

[en]
simple = """
After unconscious things, and @deva[हस्ति] (elephant), @deva[धेनु] (milch cow), @deva[ठक्] is used for 'collection'. Examples: @deva[आपूपिकम्], @deva[हास्तिकम्], @deva[धेनुकम्].
"""

standard = """
After names of unconscious things (@deva[अचेतन]) and after @deva[हस्ति] (elephant), @deva[धेनु] (milch cow), the affix @deva[ठक्] comes for 'collection' (debarring @deva[अण्]/@deva[अञ्]]): @deva[अपूपानां समूहः] = @deva[आपूपिकम्] (collection of cakes); @deva[हास्तिकम्] (herd of elephants), @deva[धेनुकम्] (herd of milch cows), @deva[शाष्कुलिकम्]. @deva[ठक्] → @deva[इक्] (@ref[7.3.50]) or @deva[क] (@ref[7.3.51]). @[vārtika]: If @deva[धेनु] is preceded by @deva[नञ्], this doesn't apply: @deva[आधेनवम्] (non-milch-cow collection).
"""

advanced = """
This @[sūtra] provides @deva[ठक्] (debarring @deva[अण्]/@deva[अञ्]]) for @deva[अचेतन] and @deva[हस्ति]/@deva[धेनु]: @deva[आपूपिकम्], @deva[हास्तिकम्], @deva[धेनुकम्]. @ref[7.3.50] @deva[इक्]; @ref[7.3.51] @deva[क्]. @[vārtika]: @deva[नञ्] + @deva[धेनु] → @deva[अण्]: @deva[आधेनवम्].
"""

id = "4.2.141"
numericId = "42141"

[en]
simple = """
After @deva[वृद्ध] place-names ending in @deva[अक्]/@deva[इक्]] or with penultimate @deva[ख्], @deva[छ] is used. Examples: @deva[आरोहणकीयम्], @deva[आश्वपथिकीयम्], @deva[कौटिशिखीयम्].
"""

standard = """
After @deva[वृद्ध] words denoting a place and ending in @deva[अक्] or @deva[इक्], or having @deva[ख्] as penultimate (@deva[खोपध]), the affix @deva[छ] comes in remaining senses. @deva[देशे] must be read in. This debars @deva[अण्] of @ref[4.2.132] and the affixes of @ref[4.2.117] and @ref[4.2.123]. @deva[अकन्त] examples: @deva[आरोहणकीयम्], @deva[द्रौघणकीयम्]. @deva[इकन्त] examples: @deva[आश्वपथिकीयम्], @deva[शाल्मलिकीयम्]. @deva[खोपध] examples: @deva[कौटिशिखीयम्], @deva[आयोमुखीयम्]. @[vārtika]: @deva[सौसुकादि] words also take this rule though ending in @deva[उ].
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्] @ref[4.2.132], @ref[4.2.117], @ref[4.2.123]) for @deva[वृद्ध देश अकन्त]/@deva[इकन्त]/@deva[खोपध]: @deva[आरोहणकीयम्], @deva[आश्वपथिकीयम्], @deva[कौटिशिखीयम्]. @[vārtika]: @deva[सौसुकादि] (@deva[उकारान्त]) too.
"""

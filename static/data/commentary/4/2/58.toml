id = "4.2.58"
numericId = "42058"

[en]
simple = """
After @deva[घञ्]-ending action nouns, @deva[ञ] is used meaning 'an action occurring in that'. Examples: @deva[भोज्या] (eating activity), @deva[पाय्या] (drinking activity).
"""

standard = """
After words ending in the @deva[कृत्] affix @deva[घञ्] (action nouns), the affix @deva[ञ] comes meaning 'an action occurring in that': @deva[भोज] (@deva[घञ्]-ending) + @deva[ञ] = @deva[भोज्या] (the activity of eating); @deva[पाय्या] (drinking activity). These words are feminine (@deva[अस्यां] = f. locative in @[sūtra]). The pattern: @deva[घञ्]-stem + @deva[ञ] → feminine word denoting the action.
"""

advanced = """
This @[sūtra] provides @deva[ञ] for @deva[घञन्त] in @deva[क्रिया]-sense: @deva[भोज्या], @deva[पाय्या]. @deva[अस्यां] (f.) indicates feminine result.
"""

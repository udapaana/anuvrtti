id = "4.2.54"
numericId = "42054"

[en]
simple = """
After @deva[भौरिकि] etc., @deva[विधल्] is used; after @deva[ऐषुकारि] etc., @deva[भक्तल्] is used. Examples: @deva[भौरिकिविधः], @deva[ऐषुकारिभक्तः].
"""

standard = """
After @deva[भौरिक्यादि] words, the affix @deva[विधल्] comes; after @deva[ऐषुकार्यादि] words, @deva[भक्तल्] comes, in the sense of 'sphere/territory' (debarring @deva[अण्]): @deva[भौरिकिविधः], @deva[वैपेयविधः]; @deva[ऐषुकारिभक्तः], @deva[सारस्यायनभक्तः]. @deva[भौरिक्यादि]: @deva[भौरिकि], @deva[भौलिकि], @deva[चौपयत], @deva[चैटयत], @deva[काणेय], @deva[वाणिजक], @deva[वालिकाज्य], @deva[सैकयत], @deva[वैकयत], etc.
"""

advanced = """
This @[sūtra] provides @deva[विधल्] for @deva[भौरिक्यादि] and @deva[भक्तल्] for @deva[ऐषुकार्यादि] (debarring @deva[अण्]): @deva[भौरिकिविधः], @deva[ऐषुकारिभक्तः].
"""

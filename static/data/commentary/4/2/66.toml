id = "4.2.66"
numericId = "42066"

[en]
simple = """
After @deva[छन्दस्] (Vedas) and @deva[ब्राह्मण]-titles, the @deva[प्रोक्त]-affixes also express 'student of that'. Example: @deva[वाजसनेयिनः] (followers of @[vājasaneya] = students of that Veda).
"""

standard = """
When @deva[प्रोक्त]-affixes (@ref[4.3.101]) are added to @deva[छन्दस्] (Vedic texts) or @deva[ब्राह्मण]-titles, they also express 'one who studies/knows': @deva[वाजसनेयेन प्रोक्तम्] = @deva[वाजसनेयिनः] means both 'announced by @[vājasaneya]' AND 'students of that'. @deva[तद्विषयाणि] = 'this relation' (of @deva[अध्येतृ], the topic of this section).
"""

advanced = """
This @[sūtra] extends @deva[प्रोक्त]-affixes (@ref[4.3.101]) to @deva[अध्येतृ]-sense for @deva[छन्दस्]/@deva[ब्राह्मण]: @deva[वाजसनेयिनः] = both announcer-relation and student-relation.
"""

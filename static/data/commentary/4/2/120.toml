id = "4.2.120"
numericId = "42120"

[en]
simple = """
After @deva[वृद्ध उ]-ending locality-names of Easterners, @deva[ठञ्] is used. Examples: @deva[आढकजम्बुकः], @deva[शाकजम्बुकः], @deva[नापितवास्तुकः].
"""

standard = """
After @deva[वृद्ध] words ending in @deva[उ] and denoting localities of Eastern people (@deva[प्राच्य]), the affix @deva[ठञ्] comes in remaining senses: @deva[आढकजम्बुकः], @deva[शाकजम्बुकः], @deva[नापितवास्तुकः]. @deva[ओर्देशी] from @ref[4.2.119] is understood. This @[sūtra] makes a @deva[नियम] (restriction): for Eastern places, only @deva[वृद्ध] words take @deva[ठञ्].
"""

advanced = """
This @[sūtra] provides @deva[ठञ्] for @deva[वृद्ध उकारान्त प्राच्य-देश]: @deva[आढकजम्बुकः], @deva[शाकजम्बुकः]. @deva[नियम]: for @deva[प्राच्य], only @deva[वृद्ध] words.
"""

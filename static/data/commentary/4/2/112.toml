id = "4.2.112"
numericId = "42112"

[en]
simple = """
After family-names formed by @deva[इञ्], @deva[अण्] is used. Examples: @deva[दाक्षाः] (pupils of @[dākṣi]), @deva[प्लाक्षाः], @deva[माहकाः].
"""

standard = """
After a @deva[गोत्र] (family-name) formed by @deva[इञ्], the affix @deva[अण्] comes in remaining senses: @deva[दक्ष] → @deva[दाक्षि] (patronymic) → @deva[दाक्षाः] (pupils of @[dākṣi]); @deva[प्लाक्षाः], @deva[माहकाः]. The final @deva[इ] is elided before @deva[अण्] by @ref[6.4.148]. Why 'denoting a family-name'? For non-@deva[गोत्र] words formed by @deva[इञ्] (like @ref[4.2.80]): @deva[सौतङ्गमिः] (four-fold sense, not family), @deva[छ] applies.
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[इञन्त-गोत्र]: @deva[दाक्षाः], @deva[प्लाक्षाः]. @ref[6.4.148] @deva[इ]-elision. Non-@deva[गोत्र] @deva[इञन्त]: @deva[सौतङ्गमिः] → @deva[छ].
"""

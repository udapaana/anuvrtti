id = "4.2.79"
numericId = "42079"

[en]
simple = """
After stems with @deva[क्] as penultimate, @deva[अण्] is used. Examples: @deva[कार्णच्छिद्रिकः कूपः], @deva[कार्णवाकवम्], @deva[त्रैशङ्कवम्].
"""

standard = """
After stems having @deva[क्] as the penultimate letter (@deva[उपधाक्]), the affix @deva[अण्] comes in the four-fold senses (debarring @deva[अञ्] of @ref[4.2.71] and @ref[4.2.73]): @deva[कार्णच्छिद्रिकः कूपः] (well); @deva[कार्णवाकवम्], @deva[त्रैशङ्कवम्].
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[अञ्] @ref[4.2.71], @ref[4.2.73]) for @deva[उपधाक्] stems: @deva[कार्णच्छिद्रिकः], @deva[कार्णवाकवम्], @deva[त्रैशङ्कवम्].
"""

id = "4.2.30"
numericId = "42030"

[en]
simple = """
After @deva[सोम] (moon-deity), @deva[ट्यण्] (not @deva[अण्]) is used. Examples: @deva[सौम्यं हविः], @deva[सौमी ऋक्].
"""

standard = """
After the deity name @deva[सोम], the affix @deva[ट्यण्] comes (debarring @deva[अण्]) in the sense of 'that its deity': @deva[सौम्यं हविः] (oblation to Soma), @deva[सौम्यं सूक्तम्] (hymn to Soma). The @deva[ण्] causes @deva[वृद्धि]; the @deva[ट्] causes @deva[ङीप्] in feminine: @deva[सौम्य] + @deva[ङीप्] (@ref[4.1.15]) = @deva[सौम्] + @deva[ई] (@ref[6.4.150]) = @deva[सौमी ऋक्] (@[ṛgvedic] verse to Soma).
"""

advanced = """
This @[sūtra] provides @deva[ट्यण्] (debarring @deva[अण्]) for @deva[सोम]: @deva[सौम्यम्]. @deva[ण्] → @deva[वृद्धि]; @deva[ट्] → @deva[ङीप्] in f.: @deva[सौमी] (@ref[4.1.15], @ref[6.4.150]).
"""

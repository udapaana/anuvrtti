[en]
simple = """
After @deva[ग्राम] (village), @deva[य] and @deva[खञ्] are used. Examples: @deva[ग्राम्यः], @deva[ग्रामीणः] (rustic).
"""

standard = """
After @deva[ग्राम] (village), the affixes @deva[य] and @deva[खञ्] (@deva[ईन]) come in remaining senses: @deva[ग्राम्यः] (@deva[य]) and @deva[ग्रामीणः] (@deva[खञ्])—both meaning 'rustic, village-dweller'.
"""

advanced = """
This @[sūtra] provides @deva[य]/@deva[खञ्] for @deva[ग्राम]: @deva[ग्राम्यः], @deva[ग्रामीणः].
"""

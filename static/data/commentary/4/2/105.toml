id = "4.2.105"
numericId = "42105"

[en]
simple = """
After @deva[ऐषमस्], @deva[ह्यस्], @deva[श्वस्], @deva[त्यप्] is optionally used. Examples: @deva[ऐषमस्त्यम्]/@deva[ऐषमस्तनम्], @deva[ह्यस्त्यम्]/@deva[ह्यस्तनम्], @deva[श्वस्त्यम्]/@deva[श्वस्तनम्].
"""

standard = """
After @deva[ऐषमस्] (of yesterday), @deva[ह्यस्] (yesterday), @deva[श्वस्] (tomorrow), the affix @deva[त्यप्] optionally comes in remaining senses: @deva[ऐषमस्त्यम्] (@deva[त्यप्]) or @deva[ऐषमस्तनम्] (@ref[4.3.23]); @deva[ह्यस्त्यम्] or @deva[ह्यस्तनम्]; @deva[श्वस्त्यम्] or @deva[श्वस्तनम्] (@ref[4.3.23]) or @deva[शौवस्तिकम्] (@ref[4.3.15]). @deva[श्वस्] also takes augment @deva[तुट्], hence three forms.
"""

advanced = """
This @[sūtra] provides optional @deva[त्यप्] for @deva[ऐषमस्]/@deva[ह्यस्]/@deva[श्वस्]: @deva[ऐषमस्त्यम्]/@deva[ऐषमस्तनम्] (@ref[4.3.23]); @deva[ह्यस्त्यम्]/@deva[ह्यस्तनम्]; @deva[श्वस्त्यम्]/@deva[श्वस्तनम्]/@deva[शौवस्तिकम्] (@ref[4.3.15]). @deva[श्वस्] + @deva[तुट्].
"""

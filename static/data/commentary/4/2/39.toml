id = "4.2.39"
numericId = "42039"

[en]
simple = """
After @deva[गोत्र]-words (patronymics) and @deva[उक्ष], @deva[उष्ट्र], @deva[उरभ्र], @deva[राजन्], @deva[राजन्य], @deva[राजपुत्र], @deva[वत्स], @deva[मनुष्य], @deva[अज], @deva[वुञ्] is used for 'collection'. Examples: @deva[औपगवकम्], @deva[औक्षकम्], @deva[राजकम्].
"""

standard = """
After @deva[गोत्र]-words (patronymics in popular sense—any descendant) and after @deva[उक्ष] (bull), @deva[उष्ट्र] (camel), @deva[उरभ्र] (ram), @deva[राजन्] (king), @deva[राजन्य] (@[kṣatriya]), @deva[राजपुत्र] (prince), @deva[वत्स] (calf), @deva[मनुष्य] (human), @deva[अज] (goat), the affix @deva[वुञ्] (@deva[अक]) comes for 'collection': @deva[औपगवकम्] (@ref[6.4.144]), @deva[औक्षकम्], @deva[औष्ट्रकम्], @deva[औरभ्रकम्], @deva[राजकम्] (@ref[6.4.144]).
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] for @deva[गोत्र] (popular sense) and @deva[उक्षादि] (9 words) in @deva[समूह]-sense: @deva[औपगवकम्], @deva[औक्षकम्], @deva[राजकम्] (@ref[6.4.144] for certain forms).
"""

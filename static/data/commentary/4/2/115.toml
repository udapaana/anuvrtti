id = "4.2.115"
numericId = "42115"

[en]
simple = """
After @deva[भवत्] (a @deva[वृद्ध] word), @deva[ठक्] and @deva[छस्] are used. Examples: @deva[भावत्कः], @deva[भावतीयः].
"""

standard = """
After @deva[भवत्] (a @deva[वृद्ध] word belonging to @deva[त्यदादि] class @ref[1.1.74]), the affixes @deva[ठक्] and @deva[छस्] come in remaining senses (debarring @deva[छ] @ref[4.2.114]). The @deva[स्] in @deva[छस्] is indicatory, showing @deva[भवत्] gets @deva[पद]-designation (@ref[1.4.16]). Thus: @deva[भवत्] + @deva[ठक्] = @deva[भावत्कः]; @deva[भवत्] + @deva[छस्] = @deva[भावतीयः].
"""

advanced = """
This @[sūtra] provides @deva[ठक्]/@deva[छस्] (debarring @deva[छ] @ref[4.2.114]) for @deva[भवत्] (@deva[त्यदादि] @ref[1.1.74] = @deva[वृद्ध]): @deva[भावत्कः], @deva[भावतीयः]. @deva[स्] in @deva[छस्] → @deva[पद]-@deva[संज्ञा] (@ref[1.4.16]).
"""

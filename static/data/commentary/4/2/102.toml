[en]
simple = """
After @deva[कन्था] (patched cloth), @deva[ठक्] is used. Example: @deva[कान्थिकः].
"""

standard = """
After @deva[कन्था] (patched cloth/rag), the affix @deva[ठक्] comes in remaining senses: @deva[कान्थिकः] (relating to patched cloth).
"""

advanced = """
This @[sūtra] provides @deva[ठक्] for @deva[कन्था]: @deva[कान्थिकः].
"""

id = "4.2.113"
numericId = "42113"

[en]
simple = """
Dissyllabic @deva[इञ्]-patronymics of Eastern or @deva[भरत] people don't take @deva[अण्]; they take @deva[छ]. Examples: @deva[पौष्कीयाः], @deva[काशीयाः].
"""

standard = """
This @[sūtra] blocks @deva[अण्] (@ref[4.2.112]) for @deva[इञ्]-ending patronymics that are dissyllabic (@deva[द्व्यच्]) and denote family-names of Eastern People (@deva[प्राच्य]) or @deva[भरत]. They take @deva[छ] (@ref[4.2.114]) instead: @deva[पौष्कीयाः], @deva[काशीयाः] (from @deva[पौष्कि], @deva[काशि]).
"""

advanced = """
This @[sūtra] blocks @deva[अण्] (@ref[4.2.112]) for @deva[द्व्यच् इञन्त-गोत्र] of @deva[प्राच्य]/@deva[भरत] → @deva[छ] (@ref[4.2.114]): @deva[पौष्कीयाः], @deva[काशीयाः].
"""

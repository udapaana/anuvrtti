id = "4.2.137"
numericId = "42137"

[en]
simple = """
After locality-names ending in @deva[गर्त] (as second member), @deva[छ] is used. Examples: @deva[वृकगर्तीयम्], @deva[शृगालगर्तीयम्], @deva[श्वाविद्गर्तीयम्] (born in wolf-hole, jackal-hole, porcupine-hole).
"""

standard = """
After @deva[प्रातिपदिक] (nominal stems) denoting a place and having @deva[गर्त] (hole/pit) as the second member (@deva[उत्तरपद]), the affix @deva[छ] comes in remaining senses (debarring @deva[अण्]). @deva[देशे] is understood. This subsequent rule also debars @deva[ठञ्]/@deva[ञिठ्] of @ref[4.2.117]. Examples: @deva[वृकगर्तीयम्], @deva[शृगालगर्तीयम्], @deva[श्वाविद्गर्तीयम्] (born in a porcupine's hole etc.). The word @deva[उत्तरपद] prevents applying to words that END in @deva[गर्त] but have an affix after it.
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्], @deva[ठञ्]/@deva[ञिठ्] @ref[4.2.117]) for @deva[देश गर्तोत्तरपद]: @deva[वृकगर्तीयम्], @deva[शृगालगर्तीयम्]. @deva[उत्तरपद] excludes @deva[गर्तान्त] with following affix.
"""

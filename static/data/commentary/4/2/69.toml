id = "4.2.69"
numericId = "42069"

[en]
simple = """
After a word (in @deva[षष्ठी] (genitive)) meaning 'his dwelling-place', an affix is added for country names. Examples: @deva[शिबीनां निवासः] = @deva[शैवः] (land of @[śibis]).
"""

standard = """
After a word in the genitive case meaning 'his dwelling-place' (@deva[तस्य निवासः]), an affix is added when the result is a country name: @deva[शिबीनां निवासः देशः] = @deva[शैवः] (the country of the @[śibis]); @deva[ऋजुनावां निवासः] = @deva[आर्जुनावः]. @deva[ऋजुनावाम्] = @deva[ऋज्वीनौर्येषाम्] (those whose knees are straight).
"""

advanced = """
This @[sūtra] provides affix for @deva[तस्य निवासः] (genitive) → @deva[देशनाम]: @deva[शैवः], @deva[आर्जुनावः].
"""

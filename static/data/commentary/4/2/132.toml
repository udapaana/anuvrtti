id = "4.2.132"
numericId = "42132"

[en]
simple = """
After locality-names with penultimate @deva[क्], @deva[अण्] is used. Examples: @deva[आर्षिकः] (born in @[ṛṣikā]), @deva[माहिषिकः].
"""

standard = """
After words denoting a place and having @deva[क्] as penultimate (@deva[उपधाक्]), the affix @deva[अण्] comes in remaining senses (debarring @deva[वुञ्] for @deva[जनपद] words): @deva[आर्षिकः] (born in @deva[ऋषिकाः]), @deva[माहिषिकः]. @deva[अण्] applies even when the word ends in @deva[उ] (which would otherwise take @deva[ठञ्]).
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[वुञ्] for @deva[जनपद]) for @deva[उपधाक् देश]: @deva[आर्षिकः], @deva[माहिषिकः]. Overrides @deva[उकारान्त] @deva[ठञ्].
"""

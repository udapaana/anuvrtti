id = "4.2.21"
numericId = "42021"

[en]
simple = """
The affix @deva[अण्] comes after a full-moon night name meaning 'the time-division in which it falls'. Examples: @deva[पौष्यः मासः], @deva[माघः मासः] (the @[pauṣya] month, @[māgha] month).
"""

standard = """
The affix @deva[अण्] comes after a word denoting a full-moon night (@deva[पौर्णमासी]) in the sense of 'the time-division in which it falls': @deva[पौष्यः मासः] (the month in which the full moon falls in @[puṣya] asterism), @deva[माघः मासः] (@[māgha] month). The word @deva[स] refers to 'that' (nominative = first case per @ref[4.1.82]); @deva[अस्मिन्] = locative sense ('in which').
"""

advanced = """
This @[sūtra] extends @deva[अण्] to @deva[पौर्णमासी]-names in nominative (@deva[स]) with locative sense (@deva[अस्मिन्]): @deva[पौष्यः मासः], @deva[माघः मासः]. @deva[इति] after @deva[पौर्णमासी] = limiting condition.
"""

id = "4.2.68"
numericId = "42068"

[en]
simple = """
After a word (in @deva[तृतीया] (instrumental)) meaning 'completed by him', an affix is added for country names. Example: @deva[कुशाम्बेन निर्वृत्ता] = @deva[कौशाम्बी] (city built by @[kuśāmba]).
"""

standard = """
After a word in the instrumental case meaning 'completed/built by him' (@deva[तेन निर्वृत्त]), an affix is added when the result is a country/city name: @deva[कुशाम्बेन निर्वृत्ता] = @deva[कौशाम्बी नगरी] (the city of @[kauśāmbī], built by @[kuśāmba]); similarly @deva[हास्तिनापुरम्] (city built by Hastin). The phrase @deva[देशे तन्नाम्नि] from @ref[4.2.67] governs this and subsequent @[sūtras].
"""

advanced = """
This @[sūtra] provides affix for @deva[तेन निर्वृत्त] (instrumental) → @deva[देशनाम]: @deva[कौशाम्बी], @deva[हास्तिनापुरम्]. @ref[4.2.67] @deva[अनुवृत्ति]: @deva[देशे तन्नाम्नि].
"""

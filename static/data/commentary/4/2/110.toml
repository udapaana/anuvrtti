id = "4.2.110"
numericId = "42110"

[en]
simple = """
After words ending in @deva[प्रस्थ], after @deva[पलदी]-etc., and after words with penultimate @deva[क्], @deva[अण्] is used. Examples: @deva[माद्रीप्रस्थः], @deva[पालदः], @deva[नैलिनकः].
"""

standard = """
After words ending in @deva[प्रस्थ], after @deva[पलद्यादि] words, and after words with penultimate @deva[क्] (@deva[उपधाक्])—whether or not they are villages of Northern folk—the affix @deva[अण्] comes in remaining senses (debarring @deva[अञ्] of @ref[4.2.109]): @deva[माद्रीप्रस्थः], @deva[माहकीप्रस्थः] (from @deva[प्रस्थान्त]); @deva[पालदः], @deva[पारिषदः] (from @deva[पलद्यादि]); @deva[नैलिनकः], @deva[चैवातकः] (from @deva[उपधाक्]). @deva[पलद्यादि] words denoting @deva[वाहीक] villages don't take @deva[ठञ्] or other affixes.
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[अञ्] @ref[4.2.109]) for @deva[प्रस्थान्त]/@deva[पलद्यादि]/@deva[उपधाक्]: @deva[माद्रीप्रस्थः], @deva[पालदः], @deva[नैलिनकः]. @deva[वाहीक-ग्राम] in @deva[पलद्यादि] don't take @deva[ठञ्].
"""

id = "4.2.28"
numericId = "42028"

[en]
simple = """
Also @deva[छ] comes after @deva[अपोनप्तृ] and @deva[अपांनप्तृ]. Examples: @deva[अपोनपत्रीयम्], @deva[अपांनप्त्रीयम्].
"""

standard = """
The affix @deva[छ] (@deva[ईय]) also comes after @deva[अपोनप्तृ] and @deva[अपांनप्तृ] in the sense of 'that its deity': @deva[अपोनपत्रीयम्], @deva[अपांनप्त्रीयम्] (oblation sacred to @[aponapāt]/@[apāṃnapāt]). This is made a separate @[sūtra] (not combined with @ref[4.2.27]) to prevent @ref[1.3.10] from applying—if combined, @deva[छ] might be considered @deva[इत्] (indicatory).
"""

advanced = """
This @[sūtra] provides @deva[छ] for @deva[अपोनप्तृ]/@deva[अपांनप्तृ]: @deva[अपोनपत्रीयम्], @deva[अपांनप्त्रीयम्]. Separate @[sūtra] prevents @ref[1.3.10] (@deva[इत्]-reading of @deva[छ]).
"""

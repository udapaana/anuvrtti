id = "4.2.23"
numericId = "42023"

[en]
simple = """
After @deva[फाल्गुनी], @deva[कार्त्तिकी], @deva[चैत्री] (full-moon names), @deva[ढक्] is optionally used. Examples: @deva[फाल्गुनः] or @deva[फाल्गुनिकः], @deva[कार्तिकः] or @deva[कार्तिकिकः].
"""

standard = """
After @deva[फाल्गुनी], @deva[कार्त्तिकी], @deva[चैत्री] (full-moon night names), the affix @deva[ढक्] optionally comes (alongside @deva[अण्]) when the result is a name denoting a time-division: @deva[फाल्गुनः] (@deva[अण्]) or @deva[फाल्गुनिकः] (@deva[ढक्]); @deva[श्रावणः] or @deva[श्रावणिकः]; @deva[कार्तिकः] or @deva[कार्तिकिकः]; @deva[चैत्रः] or @deva[चैत्रिकः].
"""

advanced = """
This @[sūtra] provides optional @deva[ढक्] for @deva[फाल्गुनी]/@deva[कार्त्तिकी]/@deva[चैत्री]: @deva[फाल्गुनः]/@deva[फाल्गुनिकः], @deva[कार्तिकः]/@deva[कार्तिकिकः], @deva[चैत्रः]/@deva[चैत्रिकः].
"""

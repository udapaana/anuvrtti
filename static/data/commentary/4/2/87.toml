id = "4.2.87"
numericId = "42087"

[en]
simple = """
After @deva[कुमुद], @deva[नड], @deva[वेतस], @deva[ड्मतुप्] is used with final-elision. Examples: @deva[कुमुद्वान्], @deva[नड्वान्], @deva[वेतस्वान्].
"""

standard = """
After @deva[कुमुद] (lotus), @deva[नड] (reed), @deva[वेतस] (cane), the affix @deva[ड्मतुप्] comes in the four-fold senses, with elision of the final letter of the stem: @deva[कुमुद्वान्] (lotus-place), @deva[नड्वान्] (reed-place), @deva[वेतस्वान्]. @[vārtika]: Also after @deva[महिष] (buffalo): @deva[महिष्मान्].
"""

advanced = """
This @[sūtra] provides @deva[ड्मतुप्] (with final-elision) for @deva[कुमुद]/@deva[नड]/@deva[वेतस]: @deva[कुमुद्वान्], @deva[नड्वान्], @deva[वेतस्वान्]. @[vārtika]: @deva[महिष] → @deva[महिष्मान्].
"""

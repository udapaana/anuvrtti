id = "4.2.144"
numericId = "42144"

[en]
simple = """
After @deva[पर्वत], @deva[छ] is optional when NOT meaning 'a man'. Examples: @deva[पर्वतीयानि फलानि] or @deva[पार्वतानि फलानि] (hill fruits).
"""

standard = """
After @deva[पर्वत], the affix @deva[छ] comes optionally in remaining senses when the meaning is NOT 'a man' (@deva[अमनुष्य]): @deva[पर्वतीयानि फलानि] (@deva[छ]) or @deva[पार्वतानि फलानि] (@deva[अण्]) (hill fruits); @deva[पर्वतीयमुदकम्] or @deva[पार्वतमुदकम्] (hill water). Why 'not human'? For humans, no option: @deva[पर्वतीयो मनुष्यः] (only @deva[छ]).
"""

advanced = """
This @[sūtra] provides optional @deva[छ] for @deva[पर्वत] when @deva[अमनुष्य]: @deva[पर्वतीयानि]/@deva[पार्वतानि] @deva[फलानि]. For @deva[मनुष्य]: only @deva[छ] (@deva[पर्वतीयः]).
"""

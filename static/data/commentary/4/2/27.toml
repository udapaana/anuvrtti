id = "4.2.27"
numericId = "42027"

[en]
simple = """
After @deva[अपोनप्तृ] and @deva[अपांनप्तृ] (deity names), @deva[घ] is used. Examples: @deva[अपोनप्त्रियम्], @deva[अपांनप्त्रियम्] (oblation to @[aponaptṛ]/@[apāṃnaptṛ]).
"""

standard = """
After the deity names @deva[अपोनप्तृ] and @deva[अपांनप्तृ], the affix @deva[घ] comes (debarring @deva[अण्]) in the sense of 'that its deity': @deva[अपोनप्त्रियं हविः] (oblation to @[aponaptṛ]), @deva[अपांनप्त्रियम्]. Note: The deities @deva[अपोनपात्] and @deva[अपांनपात्] irregularly take the form ending in @deva[नप्तृ] when the affix is added.
"""

advanced = """
This @[sūtra] provides @deva[घ] (debarring @deva[अण्]) for @deva[अपोनप्तृ]/@deva[अपांनप्तृ]: @deva[अपोनप्त्रियम्], @deva[अपांनप्त्रियम्]. @deva[अपोनपात्]/@deva[अपांनपात्] → irregular @deva[नप्तृ]-form before affix.
"""

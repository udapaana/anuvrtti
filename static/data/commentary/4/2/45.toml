id = "4.2.45"
numericId = "42045"

[en]
simple = """
After @deva[खण्डिक] etc., @deva[अञ्] is used for 'collection'. Examples: @deva[खाण्डिकम्], @deva[क्षौद्रकम्], @deva[मालवम्].
"""

standard = """
After words like @deva[खण्डिक], the affix @deva[अञ्] comes for 'collection'. This applies to words with @deva[अनुदात्त] on the first syllable. @[kārikā]: @deva[अञसिद्धिरनुदात्तादेः कोऽर्थः क्षुद्रकमालवात्। गोत्राद्वुञ् न च तद्गोत्रं तदन्तान्न च सर्वतः॥] The @deva[खण्डिकादि] list ensures @deva[अञ्] even when other rules might apply.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[खण्डिकादि] in @deva[समूह]-sense. @[kārikā] discusses: @deva[अञ्] for @deva[अनुदात्तादि] purpose; @deva[क्षुद्रक]/@deva[मालव] examples; @deva[गोत्र] → @deva[वुञ्] not applying here; @deva[तदन्तविधि] issues.
"""

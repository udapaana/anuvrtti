id = "4.2.75"
numericId = "42075"

[en]
simple = """
After @deva[संकल] etc., @deva[अण्] is used in the four-fold senses. Examples: @deva[सांकलः], @deva[पौष्कलः].
"""

standard = """
After @deva[संकलादि] words, the affix @deva[अण्] comes in the four-fold senses: @deva[सांकलः], @deva[पौष्कलः]. @deva[संकल] = @deva[संगतः कलः] (gathered parts). The @deva[संकलादि] list: @deva[संकल], @deva[पुष्कल], @deva[उत्तम], @deva[उडुप], @deva[उद्वेप], @deva[उत्पुट], @deva[कुम्भ], @deva[निधान], @deva[सुदक्ष], @deva[सुदत्त], @deva[सुभूत], @deva[सुपूत], @deva[सुनेत्र], @deva[सुमङ्गल], @deva[सुपिङ्गल], etc.
"""

advanced = """
This @[sūtra] provides @deva[अण्] for @deva[संकलादि] in four senses: @deva[सांकलः], @deva[पौष्कलः]. List: @deva[संकल] through @deva[सुपिङ्गल] etc.
"""

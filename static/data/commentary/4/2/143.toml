id = "4.2.143"
numericId = "42143"

[en]
simple = """
After @deva[पर्वत] (mountain), @deva[छ] is used. Examples: @deva[पर्वतीयो राजा] (hill-king), @deva[पर्वतीयः पुरुषः] (hill man).
"""

standard = """
After @deva[पर्वत] (mountain), the affix @deva[छ] comes in remaining senses (debarring @deva[अण्]): @deva[पर्वतीयो राजा] (the hill-king); @deva[पर्वतीयः पुरुषः] (the hill man).
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्]) for @deva[पर्वत]: @deva[पर्वतीयो राजा], @deva[पर्वतीयः पुरुषः].
"""

id = "4.2.42"
numericId = "42042"

[en]
simple = """
After @deva[ब्राह्मण], @deva[माणव], @deva[वाडव], @deva[यन्] is used for 'collection'. Examples: @deva[ब्राह्मण्यम्], @deva[माणव्यम्], @deva[वाडव्यम्].
"""

standard = """
After @deva[ब्राह्मण] (Brahmin), @deva[माणव] (young Brahmin), @deva[वाडव] (relating to horses), the affix @deva[यन्] comes for 'collection': @deva[ब्राह्मण्यम्] (Brahmin community), @deva[माणव्यम्], @deva[वाडव्यम्]. The indicatory @deva[न्] makes the word @deva[आद्युदात्त] (@ref[6.1.197]). @[vārtika]: Also after @deva[पृष्ठ]: @deva[पृष्ठ्यः] (collection of backs/ridges). @[vārtika]: @deva[ख] added to @deva[अहन्] in sacrifice sense: @deva[अहीनः] (collection of sacrifice days).
"""

advanced = """
This @[sūtra] provides @deva[यन्] for @deva[ब्राह्मण]/@deva[माणव]/@deva[वाडव]: @deva[ब्राह्मण्यम्], @deva[माणव्यम्], @deva[वाडव्यम्]. @deva[न्] → @deva[आद्युदात्त] (@ref[6.1.197]). @[vārtikas]: @deva[पृष्ठ] + @deva[यन्]; @deva[अहन्] + @deva[ख] = @deva[अहीनः].
"""

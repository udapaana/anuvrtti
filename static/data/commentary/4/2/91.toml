id = "4.2.91"
numericId = "42091"

[en]
simple = """
After @deva[नड] etc., @deva[कुक्] augment is added before @deva[छ]. Examples: @deva[नडकीयम्], @deva[प्लक्षकीयम्], @deva[क्रुञ्चकीयम्], @deva[तक्षकीयम्].
"""

standard = """
After @deva[नडादि] words, the augment @deva[कुक्] (@deva[क्]) is inserted when affix @deva[छ] follows in the four-fold senses: @deva[नड] + @deva[कुक्] + @deva[छ] = @deva[नडकीयम्]; @deva[प्लक्षकीयम्]. The words @deva[क्रुञ्चा] and @deva[तक्षन्] also belong to this class: @deva[क्रुञ्चा] shortens its vowel → @deva[क्रुञ्चकीयम्]; @deva[तक्षन्] drops @deva[न्] → @deva[तक्षकीयम्].
"""

advanced = """
This @[sūtra] provides @deva[कुक्]-augment for @deva[नडादि] + @deva[छ]: @deva[नडकीयम्], @deva[प्लक्षकीयम्]. @deva[क्रुञ्चा] → vowel-shortening; @deva[तक्षन्] → @deva[न्]-elision.
"""

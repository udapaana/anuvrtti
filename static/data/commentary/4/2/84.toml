id = "4.2.84"
numericId = "42084"

[en]
simple = """
After @deva[शर्करा], @deva[ठक्] and @deva[छ] also come. Total 6 forms: @deva[शर्करा], @deva[शार्करम्], @deva[शर्करिकम्], @deva[शार्करकम्], @deva[शार्करिकम्], @deva[शार्करीयम्].
"""

standard = """
After @deva[शर्करा], the affixes @deva[ठक्] and @deva[छ] also come in the four-fold sense. Thus @deva[शर्करा] has 6 total place-name forms: (1) @deva[शर्करा] (elision @ref[4.2.83]); (2) @deva[शार्कर॑म्] (@deva[अण्]); (3) @deva[शर्करिक॑म्] (@deva[ठच्] @ref[4.2.80]); (4) @deva[शार्करक॑म्] (@deva[कक्] @ref[4.2.80]); (5) @deva[शार्करिक॑म्] (@deva[ठक्]); (6) @deva[शार्करीयम्] (@deva[छ]).
"""

advanced = """
This @[sūtra] provides @deva[ठक्]/@deva[छ] for @deva[शर्करा]. Total 6 forms: @deva[शर्करा] (@ref[4.2.83] @deva[लुप्]), @deva[शार्करम्] (@deva[अण्]), @deva[शर्करिकम्] (@ref[4.2.80] @deva[ठच्]), @deva[शार्करकम्] (@deva[कक्]), @deva[शार्करिकम्] (@deva[ठक्]), @deva[शार्करीयम्] (@deva[छ]).
"""

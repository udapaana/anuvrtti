id = "4.2.71"
numericId = "42071"

[en]
simple = """
After stems ending in @deva[उ] or @deva[ऊ], @deva[अञ्] (not @deva[अण्]) is used in the four senses. Examples: @deva[आरडवम्], @deva[काक्षतवम्], @deva[कार्कटेलवम्].
"""

standard = """
After stems ending in @deva[उ] or @deva[ऊ], the affix @deva[अञ्] comes (debarring @deva[अण्]) in the four-fold senses (@ref[4.2.67]-@ref[4.2.70]): @deva[आरडवम्] (from @deva[अरडु], a @[kṣatriya] tribe); @deva[काक्षतवम्] (from @deva[कक्षतु]); @deva[कार्कटेलवम्] (from @deva[कर्कटेलू]). Exception: @deva[इक्षु] → @deva[इक्षुमती] (river named after sugarcanes nearby—takes @deva[मतुप्] per @ref[4.2.72]).
"""

advanced = """
This @[sūtra] provides @deva[अञ्] (debarring @deva[अण्]) for @deva[उकारान्त]/@deva[ऊकारान्त] in four senses: @deva[आरडवम्], @deva[काक्षतवम्], @deva[कार्कटेलवम्]. Exception: @deva[इक्षुमती] (@deva[मतुप्]).
"""

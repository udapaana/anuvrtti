id = "4.2.12"
numericId = "42012"

[en]
simple = """
After @deva[द्वैप] and @deva[वैयाघ्र] (tiger-skin derivatives), @deva[अञ्] is used for 'chariot covered by'. Examples: @deva[दैपः], @deva[वैयाघ्रः] (chariot covered with leopard/tiger skin).
"""

standard = """
After @deva[द्वैप] (derived from @deva[द्वीपिन्] 'leopard') and @deva[वैयाघ्र] (derived from @deva[व्याघ्र] 'tiger'), the affix @deva[अञ्] comes (debarring @deva[अण्]) in the sense of 'chariot surrounded by': @deva[द्वैपेन परिवृतो रथः] = @deva[दैपः] (chariot covered with leopard skin); @deva[वैयाघ्रेण परिवृतः] = @deva[वैयाघ्रः] (chariot covered with tiger skin). The difference between @deva[अञ्] and @deva[अण्] is accent only.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] (debarring @deva[अण्]) for @deva[द्वैप]/@deva[वैयाघ्र] in @deva[रथ-परिवृत] sense: @deva[दैपः], @deva[वैयाघ्रः]. @deva[द्वैप] < @deva[द्वीपिन्] (leopard); @deva[वैयाघ्र] < @deva[व्याघ्र] (tiger). @deva[अञ्]/@deva[अण्] difference = accent.
"""

id = "4.2.139"
numericId = "42139"

[en]
simple = """
After @deva[कद्]-initial words denoting Eastern places, @deva[छ] is used. Examples: @deva[कटनगरीयम्], @deva[कटघोषीयम्], @deva[कटपल्वलीयम्].
"""

standard = """
After words beginning with @deva[कद्] (which become @deva[कट्]-initial) denoting places of the Eastern people (@deva[प्राच्य]), the affix @deva[छ] comes in remaining senses (debarring @deva[अण्]). @deva[देशे] is understood; @deva[प्राक्] qualifies @deva[देशे]. Examples: @deva[कटनगरीयम्], @deva[कटघोषीयम्], @deva[कटपल्वलीयम्].
"""

advanced = """
This @[sūtra] provides @deva[छ] (debarring @deva[अण्]) for @deva[कदादि प्राग्देश]: @deva[कटनगरीयम्], @deva[कटघोषीयम्], @deva[कटपल्वलीयम्].
"""

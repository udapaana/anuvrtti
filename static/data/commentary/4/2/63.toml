id = "4.2.63"
numericId = "42063"

[en]
simple = """
After @deva[वसन्त] etc. (season names), @deva[ठक्] is used. Examples: @deva[वासन्तिकः] (one who studies Spring-texts), @deva[वार्षिकः], @deva[शारदिकः].
"""

standard = """
After @deva[वसन्तादि] words, the affix @deva[ठक्] comes meaning 'one who studies' (debarring @deva[अण्]): @deva[वासन्तिकः] (who studies the book relating to Spring), @deva[वार्षिकः] (Rainy season), @deva[शारदिकः] (Autumn), etc. The @deva[वसन्तादि] list: @deva[वसन्त], @deva[वर्षा], @deva[शरद्], @deva[हेमन्त], @deva[शिशिर], @deva[प्रथम], @deva[गुण], @deva[चरम], @deva[अनुगुण], @deva[अपर्वन्], @deva[अथर्वन्], @deva[ग्रीष्म].
"""

advanced = """
This @[sūtra] provides @deva[ठक्] (debarring @deva[अण्]) for @deva[वसन्तादि] (12 words): @deva[वासन्तिकः], @deva[वार्षिकः], @deva[शारदिकः], @deva[हैमन्तिकः], @deva[शैशिरिकः], etc.
"""

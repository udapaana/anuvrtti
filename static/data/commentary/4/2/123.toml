id = "4.2.123"
numericId = "42123"

[en]
simple = """
After @deva[वृद्ध] Eastern locality-names with penultimate @deva[र] or ending in @deva[ई], @deva[वुञ्] is used. Examples: @deva[पाटलिपुत्रकाः], @deva[ऐकचक्रकाः], @deva[काकन्दकः], @deva[माकन्दकः].
"""

standard = """
After @deva[वृद्ध] words denoting Eastern (@deva[प्राच्य]) localities which have penultimate @deva[र] (@deva[उपधार]) or end in @deva[ई] (@deva[ईत्]), the affix @deva[वुञ्] comes in remaining senses (debarring @deva[छ]): @deva[पाटलिपुत्रकाः], @deva[ऐकचक्रकाः] (penultimate @deva[र]); @deva[काकन्दकः], @deva[माकन्दकः] (@ref[6.4.148], from @deva[काकन्दी], @deva[माकन्दी]—@deva[ई]-ending). Why Eastern? For non-Eastern: @deva[दात्तामित्रीयः] (by @deva[छ]). The @deva[त्] in @deva[ईत्] indicates @deva[इत्]-marker.
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[छ]) for @deva[वृद्ध प्राच्य-देश उपधार]/@deva[ईत्]: @deva[पाटलिपुत्रकाः] (@deva[उपधार]), @deva[काकन्दकः] (@deva[ईत्], @ref[6.4.148]). Non-@deva[प्राच्य]: @deva[दात्तामित्रीयः] (@deva[छ]).
"""

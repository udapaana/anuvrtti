id = "4.2.67"
numericId = "42067"

[en]
simple = """
An affix is added meaning 'that thing is in this place', giving the place a name. Examples: @deva[उदुम्बराः तत्र सन्ति] = @deva[औदुम्बरम्] (place where fig-trees are).
"""

standard = """
An affix is added to a word in the nominative case meaning 'that thing exists here' (@deva[तदस्मिन्नस्ति]), the result being a place-name: @deva[उदुम्बराः तत्र सन्ति] = @deva[औदुम्बरम्] (a place where fig-trees grow); @deva[तिला अस्मिन् सन्ति] = @deva[तैलम्] (oil-region); @deva[बिल्वाः सन्ति] = @deva[बैल्वम्]. @deva[तद्] = nominative; @deva[अस्मिन्] = locative sense; @deva[अस्ति] = 'exists'; @deva[इति] for precision.
"""

advanced = """
This @[sūtra] provides affix for @deva[तदस्मिन्नस्ति] (nominative) → place-name: @deva[औदुम्बरम्], @deva[तैलम्], @deva[बैल्वम्].
"""

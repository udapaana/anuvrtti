id = "4.2.62"
numericId = "42062"

[en]
simple = """
After @deva[अनुब्राह्मण] (imitation @[brāhmaṇa] text), @deva[इनि] is used. Example: @deva[अनुब्राह्मणी] (one who studies an @[anubrāhmaṇa]).
"""

standard = """
After @deva[अनुब्राह्मण] (a book imitating a @[brāhmaṇa] text), the affix @deva[इनि] comes meaning 'one who studies' (debarring @deva[अण्]): @deva[अनुब्राह्मणिन्] → @deva[अनुब्राह्मणी], @deva[अनुब्राह्मणिनौ], @deva[अनुब्राह्मणिनः]. Note: @deva[इनि] also has @deva[मतुप्] force, and by @ref[5.2.115] could denote 'possessing', but here it means 'student of'.
"""

advanced = """
This @[sūtra] provides @deva[इनि] (debarring @deva[अण्]) for @deva[अनुब्राह्मण]: @deva[अनुब्राह्मणिन्] (declension: @deva[अनुब्राह्मणी], @deva[अनुब्राह्मणिनौ], etc.). @deva[इनि] ≠ @deva[मतुप्] sense here; = @deva[अध्येतृ] sense.
"""

id = "4.2.109"
numericId = "42109"

[en]
simple = """
After polysyllabic @deva[अन्तोदात्त] village-names of Northerners, @deva[अञ्] is used. Examples: @deva[शैवपुरम्], @deva[भाण्डपुरम्].
"""

standard = """
After village-names of the Northern people (@deva[उदीच्य]) which have more than two syllables (@deva[बह्वच्]) and @deva[उदात्त] accent on the final, the affix @deva[अञ्] comes in remaining senses (debarring @deva[अण्]): @deva[शैव॑पुरम्], @deva[भा॑ण्डपुरम्]. The governing force of @deva[दिक्] ceases here. Why 'village of north-folk'? For others: @deva[माथुर॑म्] (by @deva[अण्], different accent). Why 'more than two syllables'? For dissyllables, different rules apply.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[उदीच्य-ग्राम], @deva[बह्वच्], @deva[अन्तोदात्त]: @deva[शैवपुरम्], @deva[भाण्डपुरम्]. @deva[दिक्]-@deva[अनुवृत्ति] ends. Non-@deva[उदीच्य]: @deva[माथुरम्] (@deva[अण्]).
"""

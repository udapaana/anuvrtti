id = "4.2.53"
numericId = "42053"

[en]
simple = """
After @deva[राजन्य] etc., @deva[वुञ्] is used for 'territory'. Example: @deva[राजन्यकः] (land of @[kṣatriyas]).
"""

standard = """
After @deva[राजन्यादि] words, the affix @deva[वुञ्] comes in the sense of 'territory' (debarring @deva[अण्]): @deva[राजन्यानां विषयो देशः] = @deva[राजन्यकः], @deva[दैवायनकः]. This is an @deva[आकृतिगण] (open-ended list). List includes: @deva[राजन्य], @deva[आनृत], @deva[बाभ्रव्य], @deva[शालङ्कायन], @deva[हेवयात], @deva[अव्रीड], @deva[वरत्रा], @deva[जालंधरायण], @deva[राजायन], @deva[तेलु], @deva[आत्मकामेय], @deva[अम्बरीषपुत्र], @deva[वसाति], etc.
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[अण्]) for @deva[राजन्यादि] (@deva[आकृतिगण]): @deva[राजन्यकः], @deva[दैवायनकः]. List: @deva[राजन्य] through @deva[वसाति] etc.
"""

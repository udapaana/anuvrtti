id = "4.2.108"
numericId = "42108"

[en]
simple = """
After @deva[मद्र] preceded by a direction-word, @deva[अञ्] is used. Examples: @deva[पौर्वमद्रः] (f. @deva[द्री]), @deva[आपरमद्रः] (f. @deva[द्री]).
"""

standard = """
After @deva[मद्र] (a people/region) preceded by a direction-word, the affix @deva[अञ्] comes in remaining senses: @deva[पौर्वमद्रः] (Eastern Madra), f. @deva[पौर्वमद्री]; @deva[आपरमद्रः] (Western Madra), f. @deva[आपरमद्री]. Note: Contrary to the previous @[sūtra], the initial vowel IS @deva[वृद्धि]ed by @ref[7.3.13] which makes a special exception for @deva[मद्र].
"""

advanced = """
This @[sūtra] provides @deva[अञ्] for @deva[दिक्पूर्वपद] + @deva[मद्र]: @deva[पौर्वमद्रः], @deva[आपरमद्रः]. @ref[7.3.13] special @deva[वृद्धि] for @deva[मद्र].
"""

id = "4.2.136"
numericId = "42136"

[en]
simple = """
After @deva[साल्व] etc., @deva[वुञ्] is used when meaning 'a cow' or 'barley gruel'. Examples: @deva[साल्वको गौः] (@[sālva] cow), @deva[साल्विका यवागूः] (@[sālva] barley gruel).
"""

standard = """
After @deva[साल्वादि] words, the affix @deva[वुञ्] comes in 'born etc.' senses when the meaning is 'a cow' or 'barley gruel' (debarring @deva[अण्] @ref[4.2.133]): @deva[साल्वको गौः] (cows born in @[sālva]); @deva[साल्विका यवागूः] (barley gruel of @[sālva]). In other cases: @deva[साल्वम्] (by @deva[अण्]).
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[अण्] @ref[4.2.133]) for @deva[साल्वादि] when @deva[गौ]/@deva[यवागू]: @deva[साल्वकः गौः], @deva[साल्विका यवागूः]. Otherwise @deva[साल्वम्].
"""

id = "4.2.77"
numericId = "42077"

[en]
simple = """
After @deva[सुवास्तु] etc., @deva[अण्] is used in four-fold sense. Examples: @deva[सौवास्तवम्], @deva[वार्णवम्], @deva[सौवास्तवी नदी].
"""

standard = """
After @deva[सुवास्त्वादि] words, the affix @deva[अण्] comes in the four-fold senses (debarring @deva[अञ्] that would come by @ref[4.2.71] and @ref[4.2.73]): @deva[सुवास्तोरदूरभवं नगरम्] = @deva[सौवास्तवम्]; similarly @deva[वार्णवम्]. The word @deva[अण्] is stated (though @deva[अनुवृत्ति] applies) to indicate this @[sūtra] debars @ref[4.2.85]: thus @deva[सौवास्तवी नदी] (river). List: @deva[सुवास्तु], @deva[वर्णु]...
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[अञ्] @ref[4.2.71], @ref[4.2.73]) for @deva[सुवास्त्वादि]: @deva[सौवास्तवम्], @deva[वार्णवम्]. @deva[अण्] stated to debar @ref[4.2.85]: @deva[सौवास्तवी नदी].
"""

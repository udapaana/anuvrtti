id = "4.2.72"
numericId = "42072"

[en]
simple = """
After polysyllabic stems ending in @deva[मतुप्], @deva[अञ्] is used. Examples: @deva[ऐषुकावतम्], @deva[सैध्रकावतम्].
"""

standard = """
After words ending in @deva[मतुप्] whose stem (excluding @deva[मतुप्]) is polysyllabic (@deva[बह्वच्], more than two syllables), the affix @deva[अञ्] comes (debarring @deva[अण्]) in the quadruple senses: @deva[ऐषुकावतम्] (from @deva[इषुकावत्]), @deva[सैध्रकावतम्] (from @deva[सिध्रकावत्]). Why 'polysyllabic'? For monosyllabic stems: @deva[धनुमती] → @deva[धानुष्मतम्] (@deva[अण्], not @deva[अञ्]).
"""

advanced = """
This @[sūtra] provides @deva[अञ्] (debarring @deva[अण्]) for @deva[बह्वजङ्ग] + @deva[मतुबन्त]: @deva[ऐषुकावतम्], @deva[सैध्रकावतम्]. Monosyllabic stem: @deva[धानुष्मतम्] (@deva[अण्]).
"""

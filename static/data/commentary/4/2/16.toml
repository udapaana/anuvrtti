id = "4.2.16"
numericId = "42016"

[en]
simple = """
The affix @deva[अण्] comes after a word (in locative) meaning 'food prepared therein'. Examples: @deva[भ्राष्ट्राः] (cakes fried in a pan), @deva[कालशाः], @deva[कौम्भाः].
"""

standard = """
The affix @deva[अण्] comes after a word in the locative case meaning 'granular food prepared therein': @deva[भ्राष्ट्रे संस्कृता भक्षाः] = @deva[भ्राष्ट्राः] (cakes fried in a pan); similarly @deva[कालशाः] (prepared in a pot), @deva[कौम्भाः] (prepared in a jar). Why 'food' specifically? For non-food items: @deva[पुष्पपुटे संस्कृतो मालागुणः] (garland prepared in flower-cup) doesn't take the affix.
"""

advanced = """
This @[sūtra] extends @deva[अण्] to locative sense @deva[तत्र संस्कृतं भक्ष्यम्]: @deva[भ्राष्ट्राः], @deva[कालशाः], @deva[कौम्भाः]. @deva[भक्ष्य] (food) condition required; non-food doesn't apply.
"""

id = "4.2.100"
numericId = "42100"

[en]
simple = """
After @deva[रंकु], @deva[ष्फक्] and @deva[अण्] are used for non-human beings. Examples: @deva[राङ्कवो गौः] or @deva[राङ्कवायणो गौः] (cow from @[raṅku]); @deva[राङ्कवको मनुष्यः] (human from @[raṅku]).
"""

standard = """
After @deva[रंकु], the affixes @deva[ष्फक्] and @deva[अण्] come in remaining senses when the meaning is a non-human being: @deva[राङ्कवो गौः] (@deva[अण्]) or @deva[राङ्कवायणो गौः] (@deva[ष्फक्])—cow from @[raṅku] region. For humans: @deva[राङ्कवको मनुष्यः] (by @deva[वुञ्] per @ref[4.2.134], since @deva[रंकु] is in @deva[कच्छादि] class @ref[4.2.133]).
"""

advanced = """
This @[sūtra] provides @deva[ष्फक्]/@deva[अण्] for @deva[रंकु] when non-human: @deva[राङ्कवः]/@deva[राङ्कवायणः] (@deva[गौ]). Human: @deva[राङ्कवकः] (@deva[वुञ्] @ref[4.2.134], @deva[कच्छादि] @ref[4.2.133]).
"""

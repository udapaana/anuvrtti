id = "4.2.74"
numericId = "42074"

[en]
simple = """
After any stem (for wells on north bank of @deva[विपाश] river), @deva[अञ्] is used. Examples: @deva[दात्तः कूपः] (well of Datta), @deva[गौप्तः].
"""

standard = """
After any @deva[प्रातिपदिक] (whether polysyllabic or not), the affix @deva[अञ्] comes (debarring @deva[अण्]) when denoting a well situated on the northern bank of the river @deva[विपाश] (Beas): @deva[दात्तः] (well completed by Datta), @deva[गौप्तः] (by Gupta). Why 'northern bank'? For wells on the southern bank, @deva[अण्] applies: @deva[दात्तः] → same form but different derivation.
"""

advanced = """
This @[sūtra] provides @deva[अञ्] (debarring @deva[अण्]) for any stem when @deva[कूप] on @deva[विपाशा-उत्तरतीर]: @deva[दात्तः], @deva[गौप्तः]. Southern bank: @deva[अण्].
"""

id = "4.2.122"
numericId = "42122"

[en]
simple = """
After @deva[वृद्ध] locality-names ending in @deva[प्रस्थ], @deva[पुर], or @deva[वह], @deva[वुञ्] is used. Examples: @deva[मालाप्रस्थकः], @deva[नान्दीपुरकः], @deva[पैलुवहकः].
"""

standard = """
After @deva[वृद्ध] words denoting a locality and ending in @deva[प्रस्थ], @deva[पुर], or @deva[वह], the affix @deva[वुञ्] comes in remaining senses (debarring @deva[छ] @ref[4.2.114]): @deva[मालाप्रस्थकः], @deva[नान्दीपुरकः], @deva[कान्तिपुरकः], @deva[पैलुवहकः], @deva[फाल्गुनीवहकः]. Note: @deva[पुर]-ending words would also take @deva[वुञ्] by @ref[4.2.123], but that's restricted to Eastern places; this @[sūtra] is general.
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[छ] @ref[4.2.114]) for @deva[वृद्ध देश] ending in @deva[प्रस्थ]/@deva[पुर]/@deva[वह]: @deva[मालाप्रस्थकः], @deva[नान्दीपुरकः], @deva[पैलुवहकः]. General scope (unlike @ref[4.2.123] for @deva[प्राच्य]).
"""

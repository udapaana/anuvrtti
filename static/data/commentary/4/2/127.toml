id = "4.2.127"
numericId = "42127"

[en]
simple = """
After @deva[धूम] etc. (denoting country), @deva[वुञ्] is used. Examples: @deva[धौमकः], @deva[खाण्डकः].
"""

standard = """
After @deva[धूमादि] words denoting country, the affix @deva[वुञ्] comes in remaining senses (debarring @deva[अण्] etc.): @deva[धौमकः], @deva[खाण्डकः]. Note: @deva[पाथेय] is in this list but would already take @deva[वुञ्] by @ref[4.2.121] (penultimate @deva[य]); its inclusion shows @deva[वुञ्] applies even when NOT denoting a locality. Similarly @deva[विदेह] and @deva[आनर्त] (being @deva[जनपद] names) would take @deva[वुञ्] by @ref[4.2.124].
"""

advanced = """
This @[sūtra] provides @deva[वुञ्] (debarring @deva[अण्]) for @deva[धूमादि देश]: @deva[धौमकः], @deva[खाण्डकः]. @deva[पाथेय] included shows non-@deva[देश] also; @deva[विदेह]/@deva[आनर्त] = @deva[जनपद] per @ref[4.2.124].
"""

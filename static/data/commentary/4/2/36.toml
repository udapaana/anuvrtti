id = "4.2.36"
numericId = "42036"

[en]
simple = """
The words @deva[पितृव्य] (father's brother), @deva[मातुल] (mother's brother), @deva[मातामह] (maternal grandfather), @deva[पितामह] (paternal grandfather) are irregular formations.
"""

standard = """
The relationship words @deva[पितृव्य] (father's brother), @deva[मातुल] (mother's brother), @deva[मातामह] (mother's father), @deva[पितामह] (father's father) are @deva[निपातन] (irregular formations). From these forms we infer the rules: @deva[पितृमातृभ्यां भ्रातरि व्यड् डुलचौ] (affixes @deva[व्यत्] and @deva[डुलच्] after @deva[पितृ]/@deva[मातृ] when meaning 'brother thereof'); @deva[पितृमातृभ्यां महति] (affix after @deva[पितृ]/@deva[मातृ] when meaning 'father thereof').
"""

advanced = """
This @[sūtra] is @deva[निपातन] for @deva[पितृव्य]/@deva[मातुल]/@deva[मातामह]/@deva[पितामह]. Inferred rules: @deva[पितृ]/@deva[मातृ] + @deva[व्यत्]/@deva[डुलच्] = brother; @deva[पितृ]/@deva[मातृ] + affix = grandfather. Irregular derivations for family relationship terms.
"""

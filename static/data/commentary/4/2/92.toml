id = "4.2.92"
numericId = "42092"

[en]
simple = """
The affixes taught hereafter have senses other than those above (@deva[शेष]-senses). Example: @deva[चाक्षुषम्] (visible, i.e., color perceived by eye).
"""

standard = """
The affixes taught from here onwards have @deva[शेष] (remaining) senses—meanings other than 'progeny' (@ref[4.1.92]) and the quadruple senses. @deva[शेष] = remainder. In these remaining senses, @deva[अण्] etc. apply. Example: @deva[चाक्षुषम्] (visible—color apprehended by the eye). The @deva[शेष]-senses include @deva[तत्र जातः] (@ref[4.3.25]) etc.
"""

advanced = """
This @[sūtra] introduces @deva[शेष]-senses (other than @deva[अपत्य] @ref[4.1.92] and four-fold senses). @deva[अण्] etc. apply: @deva[चाक्षुषम्]. @deva[शेष] includes @deva[तत्र जातः] (@ref[4.3.25]) etc.
"""

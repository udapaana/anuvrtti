id = "4.2.101"
numericId = "42101"

[en]
simple = """
After @deva[दिव्], @deva[प्राच्], @deva[अपाच्], @deva[उदच्], @deva[प्रत्यच्], @deva[यत्] is used. Examples: @deva[दिव्यम्], @deva[प्राच्यम्], @deva[अपाच्यम्], @deva[उदीच्यम्], @deva[प्रतीच्यम्].
"""

standard = """
After @deva[दिव्] (heaven), @deva[प्राच्] (east), @deva[अपाच्] (south), @deva[उदच्] (north), @deva[प्रत्यच्] (west), the affix @deva[यत्] comes in remaining senses: @deva[दिव्य॑म्] (heavenly), @deva[प्रा॑च्यम्] (eastern), @deva[अपाच्य॑म्] (southern), @deva[उदीच्य॑म्] (@ref[4.4.130]), @deva[प्रतीच्य॑म्] (western). For accent, see @ref[6.1.213]. When these are indeclinables denoting time, they also take @deva[त्यु]/@deva[त्युल्]: @deva[प्राक्तनम्] (@ref[4.3.25]).
"""

advanced = """
This @[sūtra] provides @deva[यत्] for @deva[दिव्]/@deva[प्राच्]/@deva[अपाच्]/@deva[उदच्]/@deva[प्रत्यच्]: @deva[दिव्यम्], @deva[प्राच्यम्], @deva[अपाच्यम्], @deva[उदीच्यम्] (@ref[4.4.130]), @deva[प्रतीच्यम्]. @ref[6.1.213] accent. @deva[त्यु]/@deva[त्युल्] for time-indeclinables.
"""

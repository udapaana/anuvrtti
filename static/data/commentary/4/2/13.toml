id = "4.2.13"
numericId = "42013"

[en]
simple = """
The word @deva[कौमार] is irregularly formed (with @deva[अण्]) meaning 'virginity' or 'first husband/wife'. Examples: @deva[कौमारो भर्ता] (first husband of a virgin), @deva[कौमारी भार्या] (wife who was a virgin at marriage).
"""

standard = """
The word @deva[कौमार] is an irregular (@deva[निपातन]) formation with @deva[अण्] meaning 'relating to virginity/maidenhood'. @deva[कौमारो भर्ता] = @deva[अपूर्वपतिं कुमारीमुपपन्नः] (husband whose wife was given as a maiden—i.e., first husband); @deva[कौमारी भार्या] = @deva[कुमारी अपूर्वपतिं प्राप्ता] (wife who, as a maiden, obtained her first husband—i.e., not a widow remarriage). @[kārikā]: @deva[कौमारापूर्ववचने कुमार्या अण्विधीयते। अपूर्वत्वं यदा तस्याः कुमार्या भवतीतिवा॥]
"""

advanced = """
This @[sūtra] is @deva[निपातन] for @deva[कौमार] (@deva[अण्]) meaning @deva[अपूर्वपति]-related virginity: @deva[कौमारो भर्ता] = first husband of maiden; @deva[कौमारी भार्या] = wife who was maiden at marriage. @[kārikā] explains @deva[अपूर्वत्व] condition.
"""

id = "4.2.90"
numericId = "42090"

[en]
simple = """
After @deva[उत्कर] etc., @deva[छ] is used. Examples: @deva[उत्करीयम्], @deva[शफरीयम्].
"""

standard = """
After @deva[उत्करादि] words, the affix @deva[छ] (@deva[ईय]) comes in the four-fold senses: @deva[उत्करीयम्] (heap-place), @deva[शफरीयम्] (fish-place). The @deva[उत्करादि] list: @deva[उत्कर], @deva[संफल], @deva[शफर], @deva[पिप्पल], @deva[पिप्पलीमूल], @deva[अश्मन्], @deva[सुवर्ण], @deva[स्थलाजिन], @deva[तिक], @deva[कितव], @deva[अणक], @deva[त्रैवण], @deva[पिचुक], @deva[अश्वत्थ], @deva[काश], @deva[क्षुद्र], @deva[भस्त्रा], @deva[शाल], @deva[जन्य], etc.
"""

advanced = """
This @[sūtra] provides @deva[छ] for @deva[उत्करादि]: @deva[उत्करीयम्], @deva[शफरीयम्]. List: @deva[उत्कर] through @deva[जन्य] etc.
"""

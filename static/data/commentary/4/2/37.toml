id = "4.2.37"
numericId = "42037"

[en]
simple = """
An affix (@deva[अण्]) is added to a word meaning 'a collection thereof'. Example: @deva[मार्जारम्] (collection of cats).
"""

standard = """
The affix @deva[अण्] (from @ref[4.1.83]) is added to a word in the genitive case meaning 'a collection thereof' (@deva[समूह]). This applies to words denoting conscious beings, not in special lists. Example: @deva[मार्जाराणां समूहः] = @deva[मार्जारम्] (collection of cats). Note: @deva[अण्] applies only where the special rules (@ref[4.2.38] onwards) do not apply.
"""

advanced = """
This @[sūtra] extends @deva[अण्] (@ref[4.1.83]) to @deva[समूह]-sense (genitive): applies to @deva[चेतन]-words not covered by special rules. @deva[अण्] is default when @ref[4.2.38] ff. don't apply.
"""

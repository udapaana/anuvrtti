id = "4.2.78"
numericId = "42078"

[en]
simple = """
After @deva[रोणी], @deva[अण्] is used. Example: @deva[रोणम्].
"""

standard = """
After @deva[रोणी], the affix @deva[अण्] comes in the four-fold senses (debarring @deva[अञ्] of @ref[4.2.74]). The word @deva[रोणी] is given in nominative (not ablative as usual) to indicate it takes @deva[अण्] under ALL circumstances—whether alone or in a compound. This exceptional @deva[प्रथमा] (nominative) form signals the unconditional nature of the rule.
"""

advanced = """
This @[sūtra] provides @deva[अण्] (debarring @deva[अञ्] @ref[4.2.74]) for @deva[रोणी]: @deva[रोणम्]. Nominative (not ablative) indicates unconditional application—alone or in compound.
"""

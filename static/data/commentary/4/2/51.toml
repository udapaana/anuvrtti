id = "4.2.51"
numericId = "42051"

[en]
simple = """
This rule gives alternative affixes for the same three words from @ref[4.2.50]: after @deva[खल] (threshing floor), add @deva[इनि]; after @deva[गो] (cow), add @deva[त्र]; after @deva[रथ] (chariot), add @deva[कट्यष्यच्]. The results: @deva[खलिनी] (a threshing-floor collection — feminine because of @deva[ङीप्] after @deva[इनि]), @deva[गोत्रा] (a cattle pen), and @deva[रथकट्या] (a chariot road). These exist as alternatives alongside the @deva[य]-forms taught in @ref[4.2.50], so for "a cattle pasture" you may say either @deva[गव्या] or @deva[गोत्रा].
"""

standard = """
Three distinct affixes are distributed across three bases: @deva[खल] + @deva[इनि] = @deva[खलिनी] (f., threshing-floor collection); @deva[गो] + @deva[त्र] = @deva[गोत्रा] (cattle pen); @deva[रथ] + @deva[कट्यष्यच्] = @deva[रथकट्या] (chariot road). The distribution follows @ref[1.3.10] (@deva[यथासंख्यमनुदेशः समानाम्]) — the first affix goes with the first base, the second with the second, and so on. These are alternatives (@deva[विकल्प]) to the @deva[य]-forms of @ref[4.2.50]. Two @[vārttikas] extend the rule: (1) @deva[इनि] also after @deva[खलादि] words: @deva[डाकिनी], @deva[कुण्डलिनी], @deva[कुटुम्बिनी]; (2) @deva[खण्डच्] after @deva[कमलादि]: @deva[कमलखण्डम्], @deva[अम्भोजखण्डम्].
"""

advanced = """
The @[sūtra] assigns @deva[इनि], @deva[त्र], and @deva[कट्यष्यच्] to @deva[खल], @deva[गो], @deva[रथ] respectively, by @ref[1.3.10] @deva[यथासंख्य] principle. These are co-optional with @deva[य] from @ref[4.2.50]. The affix @deva[कट्यष्यच्] is complex: its @deva[इत्]-letters leave @deva[कट्य] as the operative portion, yielding @deva[रथकट्या]. @deva[इनि] produces @deva[खलिन्], which takes @deva[ङीप्] (@ref[4.1.5]) → @deva[खलिनी]. @[vārttikas]: (1) @deva[खलादिभ्य इनिः] extends @deva[इनि] to a separate list — @deva[डाकिनी], @deva[कुण्डलिनी], @deva[कुटुम्बिनी]; (2) @deva[कमलादिभ्यः खण्डच्] prescribes @deva[खण्डच्] for another set — @deva[कमलखण्डम्], @deva[अम्भोजखण्डम्]. The @deva[अनुवृत्ति] of @deva[समूहे] from @ref[4.2.37] continues throughout.
"""

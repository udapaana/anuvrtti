id = "4.2.107"
numericId = "42107"

[en]
simple = """
After compounds with a direction-word as first member (when not a name), @deva[ञ] is used. Examples: @deva[पौर्वशालः] (in eastern hall), @deva[दाक्षिणशालः].
"""

standard = """
After a compound whose first member denotes direction (@deva[दिक्पूर्वपद]) and which is NOT a name (@deva[असंज्ञायाम्]), the affix @deva[ञ] comes in remaining senses (debarring @deva[अण्]); feminine in @deva[आ]: @deva[पूर्वशाला] + @deva[ञ] = @deva[पौर्वशालः] (@ref[6.4.148], @ref[7.2.117]) 'one who is in the eastern hall'; similarly @deva[दाक्षिणशालः]. @deva[असंज्ञायाम्] qualifies the base.
"""

advanced = """
This @[sūtra] provides @deva[ञ] for @deva[दिक्पूर्वपद असंज्ञा]-compounds: @deva[पौर्वशालः], @deva[दाक्षिणशालः]. @ref[6.4.148], @ref[7.2.117] apply. @deva[असंज्ञायाम्] = non-name condition.
"""

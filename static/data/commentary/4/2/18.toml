id = "4.2.18"
numericId = "42018"

[en]
simple = """
After @deva[दधि] (curd), @deva[ठक्] is used for 'prepared therein'. Example: @deva[दाधिकम्] (curd seasoned with salt/pepper).
"""

standard = """
After @deva[दधि] (curd/yogurt), the affix @deva[ठक्] comes in the sense of 'prepared therein': @deva[दधनि संस्कृतम्] = @deva[दाधिकम्] (curd itself seasoned with salt or pepper). Note: @ref[4.4.3] also gives @deva[दाधिकम्], but that means 'anything seasoned WITH curd' (@deva[दध्ना संस्कृतम्]); THIS @[sūtra] means 'curd itself prepared/seasoned' (@deva[दधनि संस्कृतम्]).
"""

advanced = """
This @[sūtra] provides @deva[ठक्] for @deva[दधि] in locative @deva[संस्कृत] sense: @deva[दाधिकम्] = curd seasoned. Contrast @ref[4.4.3] @deva[दाधिकम्] = prepared WITH curd (instrumental).
"""

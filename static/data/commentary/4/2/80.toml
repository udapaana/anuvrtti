id = "4.2.80"
numericId = "42080"

[en]
simple = """
17 classes of words take 17 specific affixes (@deva[वुञ्], @deva[ठञ्], @deva[ठ], @deva[ठच्], etc.) in the four-fold senses. Examples: @deva[कौशाम्बकम्], @deva[वारणासिकम्], @deva[पाटलिपुत्रकम्].
"""

standard = """
In the four-fold senses, 17 affixes (@deva[वुञ्], @deva[ठञ्], @deva[ठ], @deva[ठच्], @deva[इञ्], @deva[ष्कन्], @deva[ढ्यञ्], @deva[क], @deva[ऊक], @deva[ड्यञ्], @deva[ड्य], @deva[य], @deva[यक्], @deva[कण्], @deva[ढक्], @deva[कक्], @deva[ठक्]) are added to 17 corresponding word-classes. @deva[आदि] is added to each word. Examples: @deva[कौशाम्बक], @deva[पाटलिपुत्रक] (@deva[वुञ्]); @deva[वारणासिक] (@deva[ठञ्]). Assignment follows @ref[1.3.10].
"""

advanced = """
This @[sūtra] provides 17 affixes for 17 word-classes: @deva[वुञ्] for @deva[कौशाम्बादि], @deva[ठञ्] for @deva[वारणास्यादि], @deva[ठ] for @deva[नगर्यादि], @deva[ठच्] for @deva[कुमुदादि], etc. Assignment by @ref[1.3.10].
"""

id = "4.2.49"
numericId = "42049"

[en]
simple = """
When you want to express "a collection" of certain items — snares, grass, smoke, wind, and so on — Pāṇini says: add the affix @deva[य] after words in the @deva[पाशादि] (snare-etc.) list. The resulting word is always feminine and means "a collection of that thing." For example, @deva[पाश] (snare) + @deva[य] = @deva[पाश्या] — a collection of snares. Similarly, @deva[तृण] (grass) + @deva[य] = @deva[तृण्या] — a mass of grass. This matters because the @deva[पाशादि] list is a closed set of 15 words, each receiving @deva[य] instead of the default @deva[अण्] that @ref[4.2.37] would otherwise provide for the "collection" sense.
"""

standard = """
The affix @deva[य] is prescribed after words belonging to the @deva[पाशादि] class in the sense of @deva[समूह] (collection, aggregate). This overrides the default @deva[अण्] from @ref[4.2.37]. All resultant forms are feminine. Examples: @deva[पाशानां समूहः] = @deva[पाश्या] (a collection of snares); @deva[तृणानां समूहः] = @deva[तृण्या] (a mass of grass); @deva[धूमानां समूहः] = @deva[धूम्या] (a mass of smoke); @deva[वातानां समूहः] = @deva[वात्या] (a gale, lit. a collection of winds). The @deva[पाशादि] @[gaṇa] contains 15 words: @deva[पाश], @deva[तृण], @deva[धूम], @deva[वात], @deva[अङ्गार], @deva[पाढल], @deva[पोत], @deva[गल], @deva[पिटक], @deva[पिटाक], @deva[शकट], @deva[हल], @deva[मट], @deva[वन], and @deva[बालक]. Rule type: @[apavāda] (exception) to @ref[4.2.37].
"""

advanced = """
This @[sūtra] prescribes @deva[य] as an @[apavāda] to the general @deva[अण्] of @ref[4.2.37] for @deva[पाशादि] in @deva[समूह]-sense. The @[anuvṛtti] of @deva[समूहे] from @ref[4.2.37] continues. The @deva[पाशादि] is a closed @[gaṇa] (not @[ākṛtigaṇa]) of 15 items. All derivatives are feminine (@deva[स्त्रीलिङ्ग]) — the feminine gender is fixed by convention (@deva[रूढि]), not by any suffix marker. Forms: @deva[पाश्या], @deva[तृण्या], @deva[धूम्या], @deva[वात्या], @deva[अङ्गार्या], etc. The word @deva[वात्या] (whirlwind/gale) is notable as a commonly attested derivative. Cross-reference: @ref[4.2.50] separately treats @deva[खल], @deva[गो], @deva[रथ] — these are excluded from @deva[पाशादि] so that @ref[4.2.51] can provide them alternate affixes alongside @deva[य].
"""

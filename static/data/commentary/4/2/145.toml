id = "4.2.145"
numericId = "42145"

[en]
simple = """
After @deva[कृकण] and @deva[पर्ण] (when meaning @deva[भारद्वाज] country), @deva[छ] is used. Examples: @deva[कृकणीयम्], @deva[पर्णीयम्].
"""

standard = """
After @deva[कृकण] and @deva[पर्ण], when denoting the country of @deva[भारद्वाज] (not the @deva[गोत्र]), the affix @deva[छ] comes in remaining senses: @deva[कृकणीयम्], @deva[पर्णीयम्]. @deva[देशे] is understood. @deva[भारद्वाज] here means country, not lineage. Why 'denoting @[bhāradvāja] country'? Otherwise: @deva[कार्कणम्], @deva[पार्णम्] (by @deva[अण्]).
"""

advanced = """
This @[sūtra] provides @deva[छ] for @deva[कृकण]/@deva[पर्ण] when @deva[भारद्वाज-देश]: @deva[कृकणीयम्], @deva[पर्णीयम्]. @deva[भारद्वाज] = @deva[देश] (not @deva[गोत्र]). Otherwise: @deva[कार्कणम्], @deva[पार्णम्] (@deva[अण्]).
"""

id = "4.2.140"
numericId = "42140"

[en]
simple = """
Before @deva[छ], the final of @deva[राजन्] is replaced by @deva[क]. Example: @deva[राजकीयम्].
"""

standard = """
When @deva[छ] is added to @deva[राजन्], the final is replaced by @deva[क]: @deva[राजन्] + @deva[छ] → @deva[राजकीयम्]. This @[sūtra] only teaches substitution, as @deva[राजन्] would already take @deva[छ] by @ref[4.2.114]. The word @deva[देशे] doesn't govern this @[sūtra] (not applicable here).
"""

advanced = """
This @[sūtra] provides @deva[क]-substitution for @deva[राजन्] + @deva[छ]: @deva[राजकीयम्]. @deva[छ] by @ref[4.2.114]; this @[sūtra] adds substitution. @deva[देशे] doesn't apply.
"""

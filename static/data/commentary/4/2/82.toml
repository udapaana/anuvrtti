id = "4.2.82"
numericId = "42082"

[en]
simple = """
After @deva[वरण] etc., the affix is elided (for non-kingdom places). Example: @deva[वरणाः] (city near @[varaṇa]—not a kingdom).
"""

standard = """
After @deva[वरणादि] words, the quadruple-sense affix is elided by @deva[लुप्], retaining number and gender. This applies to places that are NOT kingdoms: @deva[वरणानामदूरभवं नगरम्] = @deva[वरणाः] (city near the place @[varaṇa]—not a kingdom); similarly @deva[शृङ्गी], @deva[शाल्मलयः]. The word @deva[च] extends this rule beyond kingdoms.
"""

advanced = """
This @[sūtra] provides @deva[लुप्] for @deva[वरणादि] (non-@deva[जनपद] places): @deva[वरणाः], @deva[शृङ्गी], @deva[शाल्मलयः]. @deva[च] extends beyond @ref[4.2.81]'s kingdom scope.
"""

id = "4.2.81"
numericId = "42081"

[en]
simple = """
Kingdom names are formed by @deva[लुप्]-elision when the people's name (unchanged) also names the kingdom. Example: @deva[पञ्चालाः] (the @[pañcāla] people = @[pañcāla] kingdom).
"""

standard = """
The name of a kingdom (@deva[जनपद]) is formed by @deva[लुप्]-elision of these affixes when the name of the people, without change of number or gender, also serves as the kingdom's name: @deva[पञ्चालाः] (@[pañcāla] people) = @deva[पञ्चालाः] (@[pañcāla] kingdom). Read with @ref[1.2.51]. The affix is elided, but the form remains the same as the people's name.
"""

advanced = """
This @[sūtra] provides @deva[लुप्]-elision for @deva[जनपद]-names when people-name = kingdom-name (no number/gender change): @deva[पञ्चालाः]. Read with @ref[1.2.51].
"""

id = "4.2.135"
numericId = "42135"

[en]
simple = """
After @deva[साल्व], @deva[वुञ्] is used for 'man/human attribute' EXCEPT when meaning 'foot-soldier'. Examples: @deva[साल्वको मनुष्यः], but @deva[साल्वः पत्तिः] (@[sālva] foot-soldier).
"""

standard = """
After @deva[साल्व] (in @deva[कच्छादि] class), the affix @deva[वुञ्] comes in 'born etc.' senses when meaning 'a man' or 'human attribute', PROVIDED it doesn't mean a foot-soldier (@deva[पत्ति]): @deva[साल्वको मनुष्यः] (man from @[sālva]); @deva[साल्वकमस्य हसितं जल्पितम्] (@[sālva-style] talk). But for foot-soldier: @deva[साल्वः पत्तिः] (@[sālva] foot-soldier—by @deva[अण्], not @deva[वुञ्]). This restricts @ref[4.2.134].
"""

advanced = """
This @[sūtra] restricts @ref[4.2.134] for @deva[साल्व]: @deva[वुञ्] for @deva[मनुष्य]/@deva[मनुष्यवृत्ति] (@deva[साल्वकः]), but NOT for @deva[पत्ति] (@deva[साल्वः पत्तिः] by @deva[अण्]).
"""

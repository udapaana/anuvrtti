id = "4.2.48"
numericId = "42048"

[en]
simple = """
After @deva[केश] (hair), @deva[यञ्] is optionally used; after @deva[अश्व] (horse), @deva[छ] is optionally used. Examples: @deva[कैश्यम्]/@deva[कैशिकम्], @deva[आश्वम्]/@deva[अश्वीयम्].
"""

standard = """
After @deva[केश] (hair), @deva[यञ्] optionally comes (alongside @deva[ठक्]): @deva[केशानां समूहः] = @deva[कैश्यम्] (@deva[यञ्]) or @deva[कैशिकम्] (@deva[ठक्] @ref[4.2.47]). After @deva[अश्व] (horse), @deva[छ] optionally comes: @deva[अश्वानां समूहः] = @deva[आश्वम्] (@deva[अण्] @ref[4.1.63]) or @deva[अश्वीयम्] (@deva[छ]).
"""

advanced = """
This @[sūtra] provides optional @deva[यञ्] for @deva[केश] and @deva[छ] for @deva[अश्व]: @deva[कैश्यम्]/@deva[कैशिकम्]; @deva[आश्वम्] (@ref[4.1.63])/@deva[अश्वीयम्].
"""

id = "2.3.38"
numericId = "23038"

[en]
simple = """
When an action is performed with disregard (@deva[अनादर]) for someone else's concurrent action, the person whose action is disregarded can be marked with either @deva[षष्ठी] (genitive, sixth case-ending) or @deva[सप्तमी] (locative, seventh case-ending). This produces the genitive absolute construction, an alternative to the locative absolute taught in @ref[2.3.37].

**Examples:**
- @deva[रुदतः प्राव्राजीत्] or @deva[रुदति प्राव्राजीत्] — "He renounced the world despite her weeping." The weeper's protest is disregarded; genitive (@deva[रुदतः]) and locative (@deva[रुदति]) are both acceptable.
- @deva[पश्यतो राक्षसस्य नन्दाः हताः] — "The @deva[नन्द]-s were killed while @deva[राक्षस] looked on helplessly." The genitive @deva[पश्यतो राक्षसस्य] conveys that his watching was powerless to prevent the killing.

The key distinction from the ordinary locative absolute (@ref[2.3.37]) is the element of contempt or indifference — the main agent acts in spite of, not merely during, the subsidiary action.
"""

standard = """
@deva[अनादरे षष्ठी चानुभवस्य] — When @deva[अनादर] (disregard, contempt) is expressed, @deva[षष्ठी] is optionally used alongside @deva[सप्तमी] for the participant whose action marks time.

**Rule type — @deva[विधि]:** Extends @deva[षष्ठी] as an alternative to @deva[सप्तमी] in the locative-absolute construction when disregard is present.

**Examples:**
- @deva[रुदतः प्राव्राजीत्] (genitive) / @deva[रुदति प्राव्राजीत्] (locative) — "He renounced despite her weeping."
- @deva[पश्यतो राक्षसस्य नन्दाः पशव इव हताः] — "The @deva[नन्द]-s were slaughtered like cattle while @deva[राक्षस] looked on." Genitive conveys helplessness.

**Scope:** The @deva[षष्ठी] option is available only when @deva[अनादर] is present. Without contempt or indifference, only the locative absolute (@ref[2.3.37]) applies. Both @deva[षष्ठी] and @deva[सप्तमी] remain correct when disregard is intended — the rule introduces optionality, not replacement.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सप्तमी] from @ref[2.3.36]; @deva[यस्य च भावेन भावलक्षणम्] from @ref[2.3.37]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[अनादरे षष्ठी चानुभवस्य] — When @deva[अनादर] is expressed, @deva[षष्ठी] is optionally added (@deva[च]) alongside @deva[सप्तमी] for the entity whose action (@deva[भाव]) marks the time of the main action.

**Relation to @ref[2.3.37]:** That rule teaches @deva[सप्तमी] for temporal-action constructions generally. This rule extends @deva[षष्ठी] as a co-option specifically when the main agent disregards the subsidiary participant's action. The @deva[च] in the @[sūtra] signals that @deva[सप्तमी] is not displaced — both cases are valid.

**@deva[अनादर] condition:** The genitive absolute is restricted to contexts of contempt, indifference, or helplessness. Without @deva[अनादर], only @deva[सप्तमी] applies per @ref[2.3.37].

**Examples:** @deva[रुदतः प्राव्राजीत्] / @deva[रुदति प्राव्राजीत्]; @deva[पश्यतो राक्षसस्य नन्दाः हताः].

**Cross-references:** @ref[2.3.37] (locative absolute), @ref[2.3.36] (@deva[सप्तमी] for @deva[अधिकरण]).
"""

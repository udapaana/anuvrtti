id = "2.3.44"
numericId = "23044"

[en]
simple = """
When @deva[प्रसित] (absorbed, intent) or @deva[उत्सुक] (longing, eager) express strong desire or deep absorption, the object of that desire can take either @deva[तृतीया] (instrumental, third case-ending) or @deva[सप्तमी] (locative, seventh case-ending).

**Examples:**
- @deva[निद्रायाम् उत्सुकः] or @deva[निद्रया उत्सुकः] — "longing for sleep"
- @deva[केशेषु प्रसितः] or @deva[केशैः प्रसितः] — "absorbed in hair-grooming"

Both constructions are equally correct. The locative frames the object as the domain of absorption ("absorbed in X"), while the instrumental frames it as the means or focus ("absorbed by/with X").
"""

standard = """
@deva[प्रसितोत्सुकाभ्यां तृतीया च] — With @deva[प्रसित] (intent, absorbed) and @deva[उत्सुक] (eager, longing), both @deva[तृतीया] and @deva[सप्तमी] apply for the object of desire or absorption.

**Rule type — @deva[विधि]:** Introduces @deva[तृतीया] as an option alongside @deva[सप्तमी] for these two words.

**Examples:**
- @deva[निद्रायाम् उत्सुकः] / @deva[निद्रया उत्सुकः] — "longing for sleep"
- @deva[केशेषु प्रसितः] / @deva[केशैः प्रसितः] — "absorbed in hair-grooming"
- @deva[अध्ययने प्रसितः] / @deva[अध्ययनेन प्रसितः] — "devoted to study"

**Why two cases?** The @deva[सप्तमी] treats the object as a domain (@deva[अधिकरण] — "in study"), while @deva[तृतीया] treats it as the instrument or occasion of absorption ("with/by study"). Both perspectives are valid.

**Scope:** Limited to @deva[प्रसित] and @deva[उत्सुक]. Other words of desire (like @deva[कामुक]) do not receive this @deva[तृतीया] option from this rule.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सप्तमी] from @ref[2.3.36]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[प्रसितोत्सुकाभ्यां तृतीया च] — With @deva[प्रसित] and @deva[उत्सुक], @deva[तृतीया] is added (@deva[च]) alongside @deva[सप्तमी] for the object of absorption.

**@deva[च] = co-option:** The @deva[च] signals that @deva[तृतीया] supplements rather than replaces @deva[सप्तमी]. Both cases remain available.

**Why @deva[तृतीया]?** The @deva[सप्तमी] comes naturally from @ref[2.3.36] (@deva[अधिकरण] — the domain of absorption). The @deva[तृतीया] is an additional assignment, treating the object as the @deva[करण] (instrument/means) of the emotional state. Without this rule, @deva[निद्रया उत्सुकः] would be ungrammatical since sleep is not literally an instrument.

**Contrast with @ref[2.3.40]:** That rule pairs @deva[षष्ठी] and @deva[सप्तमी] for @deva[आयुक्त]/@deva[कुशल]; this rule pairs @deva[तृतीया] and @deva[सप्तमी] for @deva[प्रसित]/@deva[उत्सुक]. The different alternative cases reflect the different semantic frames: authority/possession (@deva[षष्ठी]) vs. instrument/means (@deva[तृतीया]).

**Examples:** @deva[निद्रायाम् उत्सुकः] / @deva[निद्रया उत्सुकः]; @deva[केशेषु प्रसितः] / @deva[केशैः प्रसितः].

**Cross-references:** @ref[2.3.36] (@deva[सप्तमी] for @deva[अधिकरण]), @ref[2.3.18] (@deva[तृतीया] for @deva[करण]).
"""

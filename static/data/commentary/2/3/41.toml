id = "2.3.41"
numericId = "23041"

[en]
simple = """
When singling out one member from a group — a process called @deva[निर्धारण] (specification) — the group from which the individual is distinguished can take either @deva[षष्ठी] (genitive, sixth case-ending) or @deva[सप्तमी] (locative, seventh case-ending).

**Examples:**
- @deva[गवां कृष्णा बहुक्षीरा] or @deva[गोषु कृष्णा बहुक्षीरा] — "Among cows, the black one gives the most milk." The group "cows" takes genitive or locative.
- @deva[मनुष्याणां क्षत्रियः शूरतमः] or @deva[मनुष्येषु क्षत्रियः शूरतमः] — "Among men, the @deva[क्षत्रिय] is the bravest."

This construction picks out an individual from within its own class — "among X, this particular one stands out." The distinction is made on the basis of type, quality, or activity.
"""

standard = """
@deva[निर्धारणे च] — In @deva[निर्धारण] (specification — singling out one from a group), both @deva[षष्ठी] and @deva[सप्तमी] apply for the group.

**Rule type — @deva[विधि]:** Assigns @deva[षष्ठी] as an option alongside @deva[सप्तमी] for the group-expression in @deva[निर्धारण].

**Examples:**
- @deva[गवां कृष्णा बहुक्षीरा] / @deva[गोषु कृष्णा बहुक्षीरा] — "Among cows, the black one gives the most milk."
- @deva[मनुष्याणां क्षत्रियः शूरतमः] / @deva[मनुष्येषु क्षत्रियः शूरतमः] — "Among men, the @deva[क्षत्रिय] is bravest."

**What counts as @deva[निर्धारण]?** Per @ref[2.2.10], specification is made by @deva[जाति] (genus — e.g., @deva[क्षत्रिय] among @deva[मनुष्य]), @deva[गुण] (quality — e.g., black among cows), or @deva[क्रिया] (action — e.g., the fastest runner among athletes).

**Key condition:** The specified item must belong to the group — it is singled out from within, not compared to an external group. When the comparison is across different groups, @ref[2.3.42] applies instead.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[षष्ठी] and @deva[च] from @ref[2.3.38]; @deva[सप्तमी] from @ref[2.3.36]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[निर्धारणे च] — In @deva[निर्धारण], both @deva[षष्ठी] and @deva[सप्तमी] apply for the group from which an individual is singled out.

**Definition of @deva[निर्धारण]:** Per @ref[2.2.10], specification separates one from many by @deva[जाति] (genus), @deva[गुण] (quality), or @deva[क्रिया] (action). The specified member must be a subset of the group.

**Interaction with @ref[2.3.42]:** When the specified item is external to the comparison group (different class entirely), @deva[पञ्चमी] applies instead of @deva[षष्ठी]/@deva[सप्तमी]. This rule covers internal specification; @ref[2.3.42] covers external comparison.

**Examples:** @deva[गवां कृष्णा बहुक्षीरा] / @deva[गोषु कृष्णा बहुक्षीरा] (quality-based: black cow singled out among cows); @deva[मनुष्याणां क्षत्रियः शूरतमः] / @deva[मनुष्येषु क्षत्रियः शूरतमः] (genus-based: @deva[क्षत्रिय] singled out among humans).

**Compound formation:** When @deva[निर्धारण] is expressed through a compound, @ref[2.2.10] governs the resulting @deva[षष्ठी]-@deva[तत्पुरुष] or @deva[सप्तमी]-@deva[तत्पुरुष].

**Cross-references:** @ref[2.2.10] (definition of @deva[निर्धारण]), @ref[2.3.42] (@deva[पञ्चमी] for external comparison).
"""

id = "2.3.17"
numericId = "23017"

[en]
simple = """
With the verb @deva[मन्य] ("to consider, regard as") from the @deva[दिवादि] class, the inanimate thing to which someone is compared in contempt can optionally take the @deva[चतुर्थी] (dative) instead of the usual accusative.

**Examples:**
- @deva[न त्वा तृणाय मन्ये] "I don't consider you worth a blade of grass" — dative
- @deva[न त्वा तृणं मन्ये] — same meaning, accusative (both are valid)
- @deva[न त्वा बुसाय मन्ये] "I don't consider you worth chaff" — dative

Three conditions must hold: the verb must be @deva[दिवादि] @deva[मन्य] (not other verbs of thinking), the sense must be contempt, and the standard of comparison must be inanimate.
"""

standard = """
@deva[मन्यकर्मणि अनादरे विभाषाऽप्राणिषु] — with @deva[दिवादि] @deva[मन्य], the inanimate @deva[कर्मन्] of comparison optionally takes @deva[चतुर्थी] when expressing @deva[अवज्ञा] (contempt).

**Rule type — @deva[विभाषा]:** Optional — both @deva[द्वितीया] and @deva[चतुर्थी] are valid.

**Examples:**
- @deva[न त्वा तृणं मन्ये] / @deva[न त्वा तृणाय मन्ये] "I don't consider you worth a straw"
- @deva[न त्वा बुसं मन्ये] / @deva[न त्वा बुसाय मन्ये] "I don't consider you worth chaff"

**Three conditions:**
1. **@deva[दिवादि] @deva[मन्य]:** Only the class-4 form @deva[मन्य] (with @deva[श्यण्] @deva[विकरण]) — not @deva[तनादि] @deva[मन्]: @deva[न त्वां तृणं मन्ये] (accusative only)
2. **@deva[अनादर] (contempt):** Without contempt, no dative option — @deva[अश्मानं दृषदं मन्ये] "I consider a rock to be stone" (no contempt, accusative only)
3. **@deva[अप्राणिन्] (inanimate):** Animate comparisons take only accusative — @deva[न त्वां शृगालं मन्ये] "I don't consider you worth a jackal" (animate, no dative)

**@deva[वार्त्तिक]:** @deva[नवादि] words (@deva[नौ], @deva[काक], @deva[अन्न], @deva[शुक], @deva[शृगाल]) always take accusative even when the conditions are met.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[चतुर्थी] from @ref[2.3.13]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[मन्यकर्मणि अनादरे विभाषाऽप्राणिषु] — with @deva[दिवादि] @deva[मन्य], the inanimate object of comparison optionally takes @deva[चतुर्थी] when expressing contempt.

**Why @deva[मन्य] specifically?** The @[sūtra] uses @deva[मन्य] (the @deva[दिवादि] present stem with @deva[श्यण्]) — not the root @deva[मन्]. This excludes:
- @deva[तनादि] @deva[मन्] (class 8): @deva[न त्वां तृणं मन्ये] — no dative option
- Synonyms like @deva[चिन्तय्], @deva[बुध्]: @deva[न त्वा तृणं चिन्तयामि] — no dative

**Why @deva[अनादर]?** The contempt condition prevents the dative from applying to neutral comparisons. @deva[अश्मानं दृषदं मन्ये] "I consider a rock to be stone" — no contempt, so only accusative.

**Why @deva[अप्राणिन्]?** The restriction to inanimates prevents dative with living beings used as standards of comparison: @deva[न त्वां शृगालं मन्ये] — @deva[शृगाल] (jackal) is animate, so accusative only.

**@deva[वार्त्तिक] — @deva[नवादि] exception:** A closed list of words (@deva[नौ], @deva[काक], @deva[अन्न], @deva[शुक], @deva[शृगाल]) never takes the dative option, even when all three conditions are met. These are listed in a @deva[गण].

**Last @deva[चतुर्थी] rule:** This completes the @deva[चतुर्थी] sub-section (@ref[2.3.13]–@ref[2.3.17]). The @deva[तृतीया] section begins at @ref[2.3.18].
"""

id = "2.3.13"
numericId = "23013"

[en]
simple = """
The @deva[सम्प्रदान] (recipient — the one for whom or toward whom an action is directed) takes the @deva[चतुर्थी] (dative, fourth case-ending).

This is the core rule for the dative case. Whenever something is given to someone, done for someone, or directed at someone, that person or purpose takes the dative.

**Examples:**
- @deva[उपाध्यायाय गां ददाति] "he gives a cow to the teacher" — the teacher is the recipient
- @deva[देवदत्ताय रोचते] "it pleases @deva[देवदत्त]" — @deva[देवदत्त] is the one toward whom the pleasing is directed
- @deva[यूपाय दारु] "wood for a sacrificial post" — the post is the purpose

The dative answers the question "for whom?" or "for what purpose?"
"""

standard = """
@deva[चतुर्थी सम्प्रदाने] — @deva[चतुर्थी] expresses the @deva[सम्प्रदान]-@deva[कारक].

**Rule type — @deva[विधि]:** Assigns @deva[चतुर्थी] to the @deva[सम्प्रदान], defined at @ref[1.4.32] as @deva[कर्मणा यमभिप्रैति स सम्प्रदानम्] — "the one whom the agent intends to reach through the object."

**Core examples:**
- @deva[उपाध्यायाय गां ददाति] "gives a cow to the teacher" — @ref[1.4.32]
- @deva[देवदत्ताय रोचते] "it pleases @deva[देवदत्त]" — @ref[1.4.33]: @deva[रुच्यर्थ]
- @deva[पुष्पेभ्यः स्पृहयति] "he desires flowers" — @ref[1.4.36]: @deva[स्पृहेरीप्सित]

**@deva[वार्त्तिक] extensions — @deva[चतुर्थी] beyond core @deva[सम्प्रदान]:**
1. **Purpose (@deva[तदर्थ]):** @deva[यूपाय दारु] "wood for a post," @deva[कुण्डलाय हिरण्यम्] "gold for earrings"
2. **Tendency/result:** @deva[मूत्राय कल्पते यवागूः] "barley-gruel tends to produce urine" (with @deva[क्लृप्], @deva[सम्पद्], @deva[जन्])
3. **Portent:** @deva[वाताय कपिला विद्युत्] "reddish lightning portends wind"
4. **@deva[हित]:** @deva[गोभ्यो हितम्] "beneficial for cows"

**Scope:** This is the primary @deva[चतुर्थी] rule. Extended uses are added by @deva[वार्त्तिक]-s and by subsequent rules @ref[2.3.14]–@ref[2.3.17].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अनभिहिते] from @ref[2.3.1].

@deva[चतुर्थी सम्प्रदाने] — @deva[चतुर्थी] is assigned to the @deva[सम्प्रदान]-@deva[कारक].

**@deva[सम्प्रदान] defined — @ref[1.4.32]:** @deva[कर्मणा यमभिप्रैति स सम्प्रदानम्] — the entity toward which the agent intends to direct the object. In @deva[उपाध्यायाय गां ददाति], the agent gives the cow (object) intending to reach the teacher (recipient). The teacher is @deva[सम्प्रदान] because the object is directed toward them.

**Extended @deva[सम्प्रदान] designations:**
- @ref[1.4.33]: @deva[रुच्यर्थानां प्रीयमाणः] — with verbs of pleasing, the one who is pleased: @deva[देवदत्ताय रोचते]
- @ref[1.4.34]: @deva[श्लाघहनुङ्स्थाशपां ज्ञीप्स्यमानः] — with @deva[श्लाघ्], @deva[हन्], etc.: @deva[देवदत्ताय शपते] "he swears to @deva[देवदत्त]"
- @ref[1.4.35]: @deva[धारेरुत्तमर्णः] — with @deva[धृ] "owe": @deva[शतं देवदत्ताय धारयति]
- @ref[1.4.36]: @deva[स्पृहेरीप्सितः] — with @deva[स्पृह्] "desire": @deva[पुष्पेभ्यः स्पृहयति]

**@deva[वार्त्तिक] extensions beyond @deva[कारक]-@deva[सम्प्रदान]:**
1. @deva[तदर्थ] (purpose): @deva[यूपाय दारु] — wood destined for a post. The post is not a @deva[सम्प्रदान] in the strict sense (no agent "giving" to it), but @deva[चतुर्थी] applies by @deva[वार्त्तिक].
2. @deva[क्लृप्]-group: @deva[मूत्राय कल्पते यवागूः] — the result takes dative with verbs of "tending to become"
3. Portent: @deva[वाताय कपिला विद्युत्] — the predicted event takes dative
4. @deva[हित]/@ deva[@deva[सुख]]: @deva[गोभ्यो हितम्] — the beneficiary takes dative

**First @deva[चतुर्थी] rule:** This begins the @deva[चतुर्थी] sub-section (@ref[2.3.13]–@ref[2.3.17]). It provides the core @deva[कारक]-based assignment; subsequent rules handle specific extensions (@ref[2.3.14]: suppressed infinitive; @ref[2.3.15]: abstract purposive noun; @ref[2.3.16]: @deva[नमः]/etc.; @ref[2.3.17]: @deva[मन्य]).
"""

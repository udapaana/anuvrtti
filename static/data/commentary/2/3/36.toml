id = "2.3.36"
numericId = "23036"

[en]
simple = """
The @deva[अधिकरण] (location — the place, time, or circumstance in which an action occurs) takes @deva[सप्तमी] (locative, seventh case-ending). This same rule also allows @deva[दूर] (far) and @deva[अन्तिक] (near) to take the locative.

The locative answers "where?", "when?", or "in what context?"

**Examples:**
- @deva[कटे आस्ते] "he sits on the mat" — the mat is the physical location
- @deva[स्थाल्यां पचति] "he cooks in the pot" — the pot is where cooking happens
- @deva[प्रातः स्नाति] "he bathes in the morning" — temporal location
- @deva[दूरे ग्रामस्य] "far from the village" — @deva[दूर] in the locative
- @deva[अन्तिके ग्रामस्य] "near the village" — @deva[अन्तिक] in the locative

This is the primary rule for the locative case, just as @ref[2.3.28] is the primary rule for the ablative and @ref[2.3.18] is the primary rule for the instrumental.
"""

standard = """
@deva[सप्तम्यधिकरणे च] — @deva[सप्तमी] expresses @deva[अधिकरण] (location); @deva[दूर]/@deva[अन्तिक]-meaning words also take @deva[सप्तमी].

**Rule type — @deva[विधि]:** Core case-assignment for @deva[सप्तमी].

**@deva[अधिकरण] — @ref[1.4.45]: @deva[आधारोऽधिकरणम्]** — the substratum or locus of an action. Three types:
1. **@deva[औपश्लेषिक]** (contact): @deva[कटे आस्ते] "sits on the mat"
2. **@deva[वैषयिक]** (domain): @deva[मोक्षे इच्छा] "desire for liberation"
3. **@deva[अभिव्यापक]** (pervasion): @deva[तिलेषु तैलम्] "oil in sesame seeds"

**@deva[दूर]/@deva[अन्तिक] extension:**
- @deva[दूरे ग्रामस्य] / @deva[अन्तिके ग्रामस्य] "far from / near the village"
- This adds @deva[सप्तमी] to their already extensive case options (@ref[2.3.34]–@ref[2.3.35])

**@deva[वार्त्तिक] extensions:**
- @deva[साधु]/@deva[असाधु] govern locative of the person: @deva[मातरि साधुः] "good toward (his) mother"
- Purpose locative: @deva[चर्मणि द्वीपिनं हन्ति] "he kills the leopard for its skin"

**Scope:** This begins the @deva[सप्तमी] sub-section (@ref[2.3.36]–@ref[2.3.49]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अनभिहिते] from @ref[2.3.1]; @deva[दूरान्तिकार्थ] from @ref[2.3.34]–@ref[2.3.35].

@deva[सप्तम्यधिकरणे च] — @deva[सप्तमी] is assigned to @deva[अधिकरण]; the @deva[च] extends @deva[सप्तमी] to @deva[दूर]/@deva[अन्तिक]-meaning words.

**@deva[अधिकरण] — @ref[1.4.45]: @deva[आधारोऽधिकरणम्]:** The @deva[आधार] (substratum) in which an action takes place. Traditional sub-types:
1. @deva[औपश्लेषिक] (contact-based): @deva[कटे आस्ते]
2. @deva[वैषयिक] (domain-based): @deva[मोक्षे इच्छा], @deva[व्याकरणे पण्डितः]
3. @deva[अभिव्यापक] (pervasive): @deva[तिलेषु तैलम्]

**@deva[च] — "also":** The @deva[च] brings @deva[दूर]/@deva[अन्तिक] into the scope of @deva[सप्तमी]. Combined with @ref[2.3.34] (@deva[षष्ठी]) and @ref[2.3.35] (@deva[द्वितीया], @deva[तृतीया], @deva[पञ्चमी]), the total case inventory for @deva[दूर]/@deva[अन्तिक] is four or more cases — perhaps the widest case-flexibility in the system.

**@deva[वार्त्तिक]s:**
- @deva[साधु]/@deva[असाधु] + locative: @deva[मातरि साधुः] "good toward mother" — the locative marks the person, not a physical location
- @deva[क्त] + @deva[इनि] words: @deva[अधीती व्याकरणे] "versed in grammar" (@ref[5.2.88])
- Purpose locative: @deva[चर्मणि द्वीपिनं हन्ति] "kills the leopard for its skin"; @deva[दन्तयोर्हन्ति कुञ्जरम्] "kills the elephant for its tusks"
- Locative absolute for simultaneous actions (non-coreference): @deva[ऋद्धेषु भुञ्जानेषु दरिद्रा आसते] "while the rich eat, the poor sit"

**First @deva[सप्तमी] rule:** This opens the @deva[सप्तमी] sub-section (@ref[2.3.36]–@ref[2.3.49]).

**Cross-references:** @ref[1.4.45] (@deva[अधिकरण] definition), @ref[2.3.34]–@ref[2.3.35] (@deva[दूर]/@deva[अन्तिक] case options), @ref[2.3.37] (locative absolute).
"""

id = "2.3.27"
numericId = "23027"

[en]
simple = """
When a pronoun (@deva[सर्वनामन्], words like "who," "what," "which") is used with the word @deva[हेतु] (cause, reason), both @deva[षष्ठी] (genitive) and @deva[तृतीया] (instrumental) are allowed for the pronoun.

**Examples:**
- @deva[कस्य हेतोर्वसति] or @deva[केन हेतुना वसति] "for what reason does he dwell?"
- @deva[यस्य हेतोः] or @deva[येन हेतुना] "for which reason"

This gives speakers flexibility: they can use either the genitive (as @ref[2.3.26] requires) or the instrumental (as @ref[2.3.23] allows) when the cause-word is a pronoun.
"""

standard = """
@deva[सर्वनाम्नस्तृतीया च] — with a @deva[सर्वनामन्] (pronoun, as defined at @ref[1.1.27]) plus @deva[हेतु], both @deva[षष्ठी] and @deva[तृतीया] are possible.

**Rule type — @deva[विधि] (optional):** Adds @deva[तृतीया] as an alternative to @deva[षष्ठी] (which @ref[2.3.26] prescribes) when the cause-word is a pronoun.

**Examples:**
- @deva[कस्य हेतोर्वसति] (@deva[षष्ठी]) or @deva[केन हेतुना वसति] (@deva[तृतीया]) "for what reason does he dwell?"
- @deva[यस्य हेतोः] or @deva[येन हेतुना] "for which reason"
- @deva[तस्य हेतोः] or @deva[तेन हेतुना] "for that reason"

**Why only pronouns?** Non-pronominal nouns follow @ref[2.3.26] strictly — @deva[अन्नस्य हेतोर्वसति] only, not *@deva[अन्नेन हेतुना वसति]. Pronouns, being semantically lighter, permit either construction.

**Scope:** This is the final rule of the @deva[तृतीया] sub-section (@ref[2.3.18]–@ref[2.3.27]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अनभिहिते] from @ref[2.3.1]; @deva[हेतौ] from @ref[2.3.26].

@deva[सर्वनाम्नस्तृतीया च] — when a @deva[सर्वनामन्] is the cause-word used with @deva[हेतु], @deva[तृतीया] is additionally permitted (alongside @deva[षष्ठी] from @ref[2.3.26]).

**@deva[च] = addition:** The @deva[च] signals that @deva[तृतीया] is added to the already-applicable @deva[षष्ठी], creating a genuine option (@deva[विभाषा]).

**Examples:** @deva[कस्य हेतोर्वसति] / @deva[केन हेतुना वसति]; @deva[यस्य हेतोः] / @deva[येन हेतुना].

**Restriction to @deva[सर्वनामन्]:** Non-pronominal nouns are governed solely by @ref[2.3.26] (@deva[षष्ठी]). The option arises only for the class of words defined as @deva[सर्वनामन्] at @ref[1.1.27]: @deva[सर्वादीनि सर्वनामानि].

**@deva[वार्त्तिक]:** With synonyms of @deva[हेतु] — such as @deva[निमित्त], @deva[कारण], and @deva[प्रयोजन] — nearly all @deva[विभक्ति]s become possible: @deva[किं निमित्तम्] (@deva[प्रथमा]), @deva[केन निमित्तेन] (@deva[तृतीया]), @deva[कस्मै निमित्ताय] (@deva[चतुर्थी]), @deva[कस्मान्निमित्तात्] (@deva[पञ्चमी]), @deva[कस्मिन् निमित्ते वसति] (@deva[सप्तमी]). The same extends to @deva[प्रयोजन]: @deva[किं प्रयोजनम्], @deva[केन प्रयोजनेन], etc.

**End of @deva[तृतीया] section:** This closes the @deva[तृतीया] sub-section (@ref[2.3.18]–@ref[2.3.27]). The next rule, @ref[2.3.28], begins the @deva[पञ्चमी] sub-section.
"""

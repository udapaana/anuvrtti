id = "2.3.16"
numericId = "23016"

[en]
simple = """
With the words @deva[नमस्] ("salutation"), @deva[स्वस्ति] ("well-being"), @deva[स्वाहा] (oblation-call to gods), @deva[स्वधा] (oblation-call to ancestors), @deva[अलम्] ("enough, a match for"), and @deva[वषट्] (sacrificial exclamation), the person or entity addressed takes the @deva[चतुर्थी] (dative).

**Examples:**
- @deva[नमो देवेभ्यः] "salutation to the gods"
- @deva[स्वस्ति प्रजाभ्यः] "well-being to the people"
- @deva[स्वाहा अग्नये] "@deva[स्वाहा] to @deva[अग्नि]"
- @deva[स्वधा पितृभ्यः] "@deva[स्वधा] to the ancestors"
- @deva[अलं मल्लो मल्लाय] "a wrestler is a match for a wrestler"
- @deva[वषट् इन्द्राय] "@deva[वषट्] to @deva[इन्द्र]"

These are formulaic expressions — salutations, ritual calls, and statements of adequacy — where the dative marks the one addressed or matched.
"""

standard = """
@deva[नमःस्वस्तिस्वाहास्वधालंवषड्योगाच्च] — @deva[चतुर्थी] with @deva[नमस्], @deva[स्वस्ति], @deva[स्वाहा], @deva[स्वधा], @deva[अलम्], and @deva[वषट्].

**Rule type — @deva[विधि]:** Assigns @deva[चतुर्थी] to the noun governed by these six @deva[अव्यय]-s.

**Examples:**
- @deva[नमो देवेभ्यः] "salutation to the gods"
- @deva[स्वस्ति प्रजाभ्यः] "well-being to the people"
- @deva[स्वाहा अग्नये] "@deva[स्वाहा] to @deva[अग्नि]"
- @deva[स्वधा पितृभ्यः] "@deva[स्वधा] to the ancestors"
- @deva[अलं मल्लो मल्लाय] "a wrestler is a match for a wrestler"
- @deva[वषट् इन्द्राय] "@deva[वषट्] to @deva[इन्द्र]"

**@deva[अलम्] — extended scope:** @deva[अलम्] includes synonyms expressing sufficiency or capability: @deva[प्रभु], @deva[शक्त]. @deva[प्रभुर्देवदत्तो ग्रामाय] "@deva[देवदत्त] is capable of [managing] the village."

**@deva[च] force:** The @deva[च] indicates that @deva[चतुर्थी] applies even in benedictive contexts where @deva[षष्ठी] might otherwise be expected under @ref[2.3.73]: @deva[स्वस्ति गोभ्यो भूयात्] "may there be welfare to the cows."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[चतुर्थी] from @ref[2.3.13]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[नमःस्वस्तिस्वाहास्वधालंवषड्योगाच्च] — @deva[चतुर्थी] is assigned to words governed by @deva[नमस्], @deva[स्वस्ति], @deva[स्वाहा], @deva[स्वधा], @deva[अलम्], or @deva[वषट्].

**Not @deva[सम्प्रदान]:** The dative here is not based on the @deva[सम्प्रदान]-@deva[कारक] of @ref[1.4.32]. The gods in @deva[नमो देवेभ्यः] are not recipients of a gift; they are the addressees of a salutation. This is a non-@deva[कारक] assignment of @deva[चतुर्थी], parallel to how @ref[2.3.5] assigns non-@deva[कारक] @deva[द्वितीया].

**@deva[अलम्] and synonyms:** The @deva[काशिका] extends @deva[अलम्] to words with equivalent meaning: @deva[प्रभु] "capable," @deva[शक्त] "able." @deva[प्रभुर्देवदत्तो ग्रामाय] "@ deva[@deva[देवदत्त]] is capable of the village" — dative by this rule.

**@deva[अलम्] with @deva[प्रतिषेध] sense:** @deva[अलम्] can also mean "enough! stop!" — @deva[अलं विलम्बेन] "enough with delay." Here @deva[तृतीया] applies (not @deva[चतुर्थी]) because the sense is cessation, not adequacy.

**@deva[च] — overriding @ref[2.3.73]:** The @deva[च] ensures that @deva[चतुर्थी] prevails even in @deva[आशिष्] (benedictive) contexts, where @ref[2.3.73] would otherwise assign @deva[षष्ठी]. @deva[स्वस्ति गोभ्यो भूयात्] — @deva[चतुर्थी], not @deva[षष्ठी].

**Position in @[pāda]:** This is the penultimate @deva[चतुर्थी] rule. Together with @ref[2.3.17], it completes the @deva[चतुर्थी] sub-section (@ref[2.3.13]–@ref[2.3.17]) before the @deva[तृतीया] section begins at @ref[2.3.18].
"""

id = "2.3.5"
numericId = "23005"

[en]
simple = """
Words denoting time or distance take the @deva[द्वितीया] (accusative) when expressing complete, uninterrupted duration or extent — the action or quality persists throughout the entire time period or across the entire distance.

**Examples:**
- @deva[मासमधीते] "he studies for a whole month" — the studying fills the entire month
- @deva[क्रोशं पर्वतः] "the mountain extends a full @[krośa]" — the mountain spans the entire distance
- @deva[संवत्सरं पुष्पाः] "flowers bloom throughout the year"

If the duration is not complete — if the action happens only intermittently during the time — a different case is used: @deva[मासस्य द्विरधीते] "he studies twice during the month" (genitive).
"""

standard = """
@deva[कालमार्गवाचक] + @deva[अत्यन्तसंयोग] → @deva[द्वितीया] — @deva[कालाध्वनोरत्यन्तसंयोगे].

**Rule type — @deva[विधि]:** Assigns @deva[द्वितीया] to time/distance words in complete-duration/extent contexts.

**Time examples:**
- @deva[मासमधीते] "he studies for a full month"
- @deva[मासं कल्याणी] "prosperous throughout the month"
- @deva[संवत्सरं पुष्पाः] "flowers all year"

**Distance examples:**
- @deva[क्रोशं कुटिला नदी] "the river winds for a full @[krośa]"
- @deva[क्रोशं पर्वतः] "the mountain extends a full @[krośa]"

**@deva[अत्यन्तसंयोग] — complete continuity:** The action, quality, or entity must be continuously connected with the entire time-period or distance. Without this condition:
- @deva[मासस्य द्विरधीते] "he studies twice during the month" — genitive (@ref[2.3.50]), because the action is intermittent
- @deva[क्रोशस्य एकदेशे पर्वतः] — genitive, because the mountain covers only part of the distance
"""

advanced = """
@deva[अनुवृत्ति]: @deva[द्वितीया] from @ref[2.3.2]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[कालाध्वनोरत्यन्तसंयोगे] — @deva[द्वितीया] is assigned to @deva[काल]-words (time) and @deva[अध्वन्]-words (distance/path) when the relation is @deva[अत्यन्तसंयोग] (complete, unbroken connection).

**@deva[अत्यन्तसंयोग] defined:** The @deva[काशिका] explains @deva[अत्यन्तसंयोग] as the uninterrupted association of the action/quality/substance with every moment of the time-period or every point of the distance. @deva[मासमधीते] — studying pervades every moment of the month. @deva[क्रोशं पर्वतः] — the mountain extends through every point of the @[krośa].

**Three types of @deva[अत्यन्तसंयोग]:**
1. With @deva[क्रिया] (action): @deva[मासमधीते] — action throughout
2. With @deva[गुण] (quality): @deva[मासं कल्याणी] — quality throughout
3. With @deva[द्रव्य] (substance): @deva[संवत्सरं पुष्पाः] — substance present throughout

**Counter-examples establishing scope:**
- @deva[मासस्य द्विरधीते] — @deva[षष्ठी] by @ref[2.3.50]: the action is not continuous (only twice)
- @deva[क्रोशस्य एकदेशे पर्वतः] — @deva[षष्ठी]: the mountain covers only part

**Not @deva[कारक]:** Time and distance words here are not @deva[कर्मन्] in the strict @deva[कारक] sense. The @deva[द्वितीया] is assigned by this specific rule, not by @ref[2.3.2]. This is a non-@deva[कारक] use of the accusative — the time/distance word functions adverbially.
"""

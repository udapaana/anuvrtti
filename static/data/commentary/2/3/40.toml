id = "2.3.40"
numericId = "23040"

[en]
simple = """
When @deva[आयुक्त] (deeply engaged) or @deva[कुशल] (skilled, absorbed) are used to express complete absorption in an activity, the activity can take either @deva[षष्ठी] (genitive, sixth case-ending) or @deva[सप्तमी] (locative, seventh case-ending).

**Examples:**
- @deva[कटकरणस्य आयुक्तः] or @deva[कटकरणे आयुक्तः] — "deeply engaged in mat-making"
- @deva[कटकरणस्य कुशलः] or @deva[कटकरणे कुशलः] — "deeply skilled in mat-making"

The condition is genuine, wholehearted absorption (@deva[तत्परता]). If the engagement is casual or superficial, only @deva[सप्तमी] applies:
- @deva[आयुक्तो गौः शकटे] — "the ox is yoked to the cart" — mere physical yoking, not deep engagement, so only locative.
"""

standard = """
@deva[आयुक्तकुशलाभ्याम्] — With @deva[आयुक्त] (deeply engaged) and @deva[कुशल] (skilled/absorbed), both @deva[षष्ठी] and @deva[सप्तमी] apply when the meaning is complete absorption (@deva[तत्परता]).

**Rule type — @deva[विधि]:** Adds @deva[षष्ठी] as an option alongside @deva[सप्तमी] for these two words, conditioned on sense.

**Examples:**
- @deva[कटकरणस्य आयुक्तः] / @deva[कटकरणे आयुक्तः] — "wholly absorbed in mat-making"
- @deva[कटकरणस्य कुशलः] / @deva[कटकरणे कुशलः] — "thoroughly skilled in mat-making"

**Restriction — non-absorption sense:** When the meaning is mere contact or light connection rather than deep engagement, only @deva[सप्तमी] applies:
- @deva[आयुक्तो गौः शकटे] — "the ox is yoked to the cart" — physical yoking, not mental absorption, so @deva[षष्ठी] is not available.

**Scope:** Only these two words receive this option. Other absorption-denoting words like @deva[निरत] or @deva[मग्न] do not qualify under this rule.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[षष्ठी] and @deva[च] from @ref[2.3.38]; @deva[सप्तमी] from @ref[2.3.36]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[आयुक्तकुशलाभ्याम्] — With @deva[आयुक्त] and @deva[कुशल], both @deva[षष्ठी] and @deva[सप्तमी] apply when @deva[तत्परता] (wholehearted absorption) is meant.

**Semantic condition:** The @deva[षष्ठी]/@deva[सप्तमी] option is triggered only by the @deva[तत्परता] sense. @deva[आयुक्त] can also mean merely "attached" or "yoked" physically — in that sense, only @deva[सप्तमी] applies per @ref[2.3.36] (locative for @deva[अधिकरण]).

**Counter-example:** @deva[आयुक्तो गौः शकटे] — "the ox is yoked to the cart." Here @deva[आयुक्त] means physical attachment, not deep engagement. Only @deva[सप्तमी], no @deva[षष्ठी].

**Why specify both words separately?** @deva[आयुक्त] and @deva[कुशल] differ in nuance: @deva[आयुक्त] emphasizes sustained engagement, @deva[कुशल] emphasizes proficiency. Both share the @deva[तत्परता] condition.

**Cross-references:** @ref[2.3.36] (@deva[सप्तमी] for @deva[अधिकरण]), @ref[2.3.39] (similar @deva[षष्ठी]/@deva[सप्तमी] option with authority words).
"""

id = "2.3.23"
numericId = "23023"

[en]
simple = """
A word expressing the cause or reason for something takes the @deva[तृतीया] (instrumental).

**Examples:**
- @deva[विद्यया यशः] "fame through learning" — learning is the cause of fame
- @deva[धनेन कुलम्] "family status through wealth" — wealth is the cause
- @deva[कन्यया शोकः] "grief because of a daughter" — the daughter is the cause of grief

The instrumental answers the question "by what cause?" or "on account of what?"
"""

standard = """
@deva[हेतौ] — a word denoting @deva[हेतु] (cause/reason) takes @deva[तृतीया].

**Rule type — @deva[विधि]:** Assigns @deva[तृतीया] to the cause of a state or event.

**Examples:**
- @deva[विद्यया यशः] "fame through learning"
- @deva[धनेन कुलम्] "family standing through wealth"
- @deva[कन्यया शोकः] "grief because of a daughter"
- @deva[अन्नेन वसति] "he lives by means of food"

**@deva[हेतु] — popular sense:** The @deva[हेतु] here is used in its common, non-technical sense: anything that produces or gives rise to a result. This is distinct from the technical @deva[हेतु] of @ref[1.4.55] (@deva[तत्प्रयोजको हेतुश्च]), which designates an instigating cause that functions as an agent.

**Scope:** This applies to general causation — when the cause is not an active instigator (agent) but a condition or circumstance. When the cause is an instigating agent, @deva[तृतीया] applies via @ref[2.3.18] (@deva[कर्तृ]) instead.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तृतीया] from @ref[2.3.18]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[हेतौ] — @deva[तृतीया] is assigned to a word denoting @deva[हेतु] (cause).

**@deva[लौकिक] vs. technical @deva[हेतु]:** The @deva[काशिका] clarifies that @deva[हेतु] here is used in its popular (@deva[लौकिक]) sense — any condition or circumstance that brings about a result. This is distinct from the technical @deva[हेतु] of @ref[1.4.55] (@deva[तत्प्रयोजको हेतुश्च]), which designates an instigating cause that actively propels another agent to act.

**Distinction from @ref[2.3.18] (@deva[कर्तृ]):** When the cause is an active instigator (@deva[प्रयोजक]), it functions as @deva[कर्तृ] and takes @deva[तृतीया] under @ref[2.3.18], not this rule. The present rule covers passive, circumstantial causes — conditions that give rise to a result without active agency.

**Examples analyzed:**
- @deva[विद्यया यशः] — learning does not actively produce fame as an agent; it is the condition from which fame arises
- @deva[कन्यया शोकः] — the daughter does not intentionally cause grief; she is the circumstance of it

**Distinction from @ref[2.3.21] (@deva[इत्थम्भूतलक्षण]):** A @deva[लक्षण] (sign) reveals a state; a @deva[हेतु] (cause) produces it. @deva[जटाभिस्तापसः] — matted hair reveals asceticism (sign). @deva[विद्यया यशः] — learning produces fame (cause).

**Subsequent rules on @deva[हेतु]:** @ref[2.3.24] and @ref[2.3.25] refine the case-assignment for cause-words, permitting @deva[पञ्चमी] for specific types of causes (debt, abstract qualities).
"""

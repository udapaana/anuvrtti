id = "2.3.22"
numericId = "23022"

[en]
simple = """
With the verb @deva[सम् + ज्ञा] ("to recognize, identify"), the person or thing recognized can optionally take the @deva[तृतीया] (instrumental) instead of the usual accusative.

**Examples:**
- @deva[पित्रा संजानीते] or @deva[पितरं संजानीते] — both mean "he recognizes his father"
- @deva[मात्रा संजानीते] or @deva[मातरं संजानीते] — both mean "he recognizes his mother"

The instrumental option highlights the recognized person as the basis of recognition, while the accusative treats them as a straightforward object.
"""

standard = """
@deva[संज्ञायां विभाषा] — with @deva[सम् + ज्ञा] ("to recognize"), the @deva[कर्मन्] optionally takes @deva[तृतीया].

**Rule type — @deva[विभाषा]:** Optional — both @deva[तृतीया] and @deva[द्वितीया] are valid.

**Examples:**
- @deva[पित्रा संजानीते] / @deva[पितरं संजानीते] "he recognizes his father"
- @deva[मात्रा संजानीते] / @deva[मातरं संजानीते] "he recognizes his mother"

**Scope:** Only @deva[सम् + ज्ञा] triggers this option — not @deva[ज्ञा] alone or other compounds like @deva[प्र + ज्ञा]. @deva[पितरं जानाति] "he knows his father" — only accusative.

**Connection to @ref[2.3.21]:** Recognition involves identifying someone by their marks — this rule can be seen as an extension of the @deva[इत्थम्भूतलक्षण] principle into the verbal domain.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तृतीया] from @ref[2.3.18]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[संज्ञायां विभाषा] — with @deva[सम् + ज्ञा], the @deva[कर्मन्] optionally takes @deva[तृतीया].

**@deva[विभाषा] — free alternation:** Both @deva[तृतीया] (@deva[पित्रा संजानीते]) and @deva[द्वितीया] (@deva[पितरं संजानीते]) are equally valid. The choice is the speaker's.

**@deva[संज्ञा] — recognition, not naming:** The @deva[काशिका] takes @deva[संज्ञा] here in the sense of "recognition" or "identification" — perceiving someone as a particular person. This is not the @deva[संज्ञा] (technical term) of grammar.

**Why only @deva[सम् + ज्ञा]?** The @deva[सम्]-prefix is essential. @deva[पितरं जानाति] (bare @deva[ज्ञा]) takes only @deva[द्वितीया]. @deva[पितरं प्रजानाति] (@deva[प्र + ज्ञा]) also takes only @deva[द्वितीया]. The recognition-specific sense of @deva[संज्ञा] triggers the option.

**Semantic basis for @deva[तृतीया]:** Recognition involves identifying a person by their distinctive features — conceptually linked to @ref[2.3.21] (@deva[इत्थम्भूतलक्षण]). The instrumental frames the recognized person as the basis or ground of recognition, similar to how a mark reveals a state.

**Position:** Continues the @deva[तृतीया] extensions: @ref[2.3.18] (agent/instrument), @ref[2.3.19] (accompaniment), @ref[2.3.20] (body-part defect), @ref[2.3.21] (identifying mark), this rule (recognition verb), @ref[2.3.23] (cause).
"""

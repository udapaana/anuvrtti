id = "2.3.51"
numericId = "23051"

[en]
simple = """
When the verb @deva[ज्ञा] is used in a sense other than "to know" — such as "to engage in a ritual act" or "to act upon" — the instrument (the thing used to perform the action) takes the genitive case (@deva[षष्ठी]) instead of the usual instrumental (@deva[तृतीया]).

**Examples:**
- @deva[मधुनो जानीते] — "he performs the ritual act with honey" (honey is the instrument, but takes genitive)
- @deva[सर्पिषो जानीते] — "he performs the ritual act with ghee"

**Contrast — when @deva[ज्ञा] means "to know":**
- @deva[स्वरेण पुत्रं जानाति] — "he recognizes his son by his voice" — here the instrument @deva[स्वर] takes the regular instrumental (@deva[तृतीया]), because @deva[ज्ञा] means "to know"

The distinction turns entirely on the meaning: the ritual/performative sense triggers genitive; the cognitive sense does not.
"""

standard = """
@deva[ज्ञोऽविदर्थस्य करणे] — "of @deva[ज्ञा] when not meaning 'to know', [the @deva[षष्ठी] is used] in the @deva[करण]."

**Rule type — @deva[विधि]:** Overrides the default @deva[तृतीया] for @deva[करण] (@ref[2.3.18]) with @deva[षष्ठी] in a specific semantic context.

**Key conditions:**
1. The verb must be @deva[ज्ञा] (@deva[जानाति])
2. It must not carry the sense of @deva[अवबोधन] (cognition/knowing)
3. The word in question must fill the @deva[करण] role

**Examples:**
- @deva[मधुनो जानीते] — "he engages with honey" (@deva[मधु] is @deva[करण], takes @deva[षष्ठी])
- @deva[सर्पिषो जानीते] — "he engages with ghee"

**Counterexample:**
- @deva[स्वरेण पुत्रं जानाति] — "he knows his son by the voice" — @deva[ज्ञा] = @deva[अवबोधन], so @deva[स्वर] takes regular @deva[तृतीया]

**Non-knowing senses of @deva[ज्ञा]:** These include ritual engagement and false ascription. The @deva[आत्मनेपद] form @deva[जानीते] often marks the non-knowing sense (cf. @ref[1.3.45]).
"""

advanced = """
@deva[ज्ञोऽविदर्थस्य करणे] — @deva[अनुवृत्ति]: @deva[षष्ठी] from @ref[2.3.50], @deva[शेषे] from @ref[2.3.50].

**Structural note:** This is the first rule in the @deva[षष्ठी] section that assigns genitive to a @deva[कारक] relation (@deva[करण]). Since @deva[करण] is a @deva[कारक], it falls outside the @deva[शेष] domain of @ref[2.3.50] — hence the need for an explicit rule.

**Why @deva[अविदर्थ]?** The qualifier @deva[अविदर्थस्य] restricts the rule to non-cognitive senses of @deva[ज्ञा]. The @[kāśikā] identifies these as @deva[प्रतिपत्ति] (ritual undertaking) and @deva[मिथ्याज्ञान] (false knowledge/attribution). The connection to @ref[1.3.45] is significant: that rule assigns @deva[आत्मनेपद] to @deva[ज्ञा] in the non-knowing sense, and the @deva[आत्मनेपद] form @deva[जानीते] in the examples here confirms the semantic restriction.

**Interaction with @ref[2.3.18]:** The default rule @deva[कर्तृकरणयोस्तृतीया] (@ref[2.3.18]) assigns @deva[तृतीया] to @deva[करण]. This rule creates an exception for one specific verb-sense combination. Since @deva[शेषे] is also in @deva[अनुवृत्ति], the @deva[तृतीया] option remains available — both @deva[मधुनो जानीते] and @deva[मधुना जानीते] are grammatically valid, with the @deva[षष्ठी] form preferred.

**@deva[योगविभाग] consideration:** This rule is stated separately from the @deva[कर्मन्]-domain rules that follow (@ref[2.3.52] ff.) because it involves @deva[करण], not @deva[कर्मन्]. The shift from @deva[करणे] here to @deva[कर्मणि] in @ref[2.3.52] marks a new sub-topic.
"""

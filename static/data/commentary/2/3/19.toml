id = "2.3.19"
numericId = "23019"

[en]
simple = """
With @deva[सह] ("together with"), the person or thing that accompanies takes the @deva[तृतीया] (instrumental) — provided the accompaniment is not the main participant.

**Examples:**
- @deva[पुत्रेण सहागतः पिता] "the father came with the son" — the son accompanies, so @deva[पुत्र] takes instrumental
- @deva[पुत्रेण सार्धम्] "together with the son" — @deva[सार्धम्] is a synonym of @deva[सह]

The companion — the secondary participant — takes the instrumental. The main participant takes whatever case the verb assigns.
"""

standard = """
@deva[सहयुक्तेऽप्रधाने] — a word joined with @deva[सह] ("together with") takes @deva[तृतीया] when it denotes the accompaniment (not the principal).

**Rule type — @deva[विधि]:** Assigns @deva[तृतीया] to the non-principal companion.

**Examples:**
- @deva[पुत्रेण सहागतः पिता] "the father came with the son"
- @deva[पुत्रेण सार्धम्] "together with the son" — @deva[सार्धम्], @deva[समम्] are treated as synonyms of @deva[सह]

**@deva[अप्रधान] condition:** The word taking @deva[तृतीया] must be the subordinate companion, not the principal. In @deva[शिष्येण सहोपाध्यायस्य गौः] "the cow of the teacher who is with the student" — here context determines which is principal and which is companion.

**Implicit @deva[सह]:** @deva[सह] need not be explicitly present. @deva[पाणिनि] himself uses this in @ref[1.2.65]: @deva[वृद्धो युना] "an elder with a youth" — @deva[सह] is understood.

**Scope:** The instrumental here is not the @deva[करण]-instrumental of @ref[2.3.18]. This is a separate non-@deva[कारक] assignment of @deva[तृतीया] for accompaniment.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तृतीया] from @ref[2.3.18]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[सहयुक्तेऽप्रधाने] — @deva[तृतीया] is assigned to the non-principal word joined with @deva[सह].

**@deva[सह] and synonyms:** The @deva[काशिका] extends the rule to @deva[सार्धम्], @deva[समम्], and other words meaning "together with." The governed word takes @deva[तृतीया] regardless of which synonym is used.

**@deva[अप्रधान] — not the principal:** The condition distinguishes the companion from the main participant. In @deva[पुत्रेण सहागतः पिता], the father is the principal (@deva[प्रथमा]) and the son is the companion (@deva[तृतीया]). The principality is determined by context — who is the primary subject of the sentence.

**Implicit @deva[सह]:** @deva[सह] may be contextually understood without being expressed. @deva[पाणिनि] uses this in @ref[1.2.65]: @deva[वृद्धो युना] — @deva[युवन्] takes @deva[तृतीया] with @deva[सह] understood. This demonstrates that the rule applies to the semantic relation of accompaniment, not merely to the syntactic presence of @deva[सह].

**Not @deva[करण]:** The @deva[तृतीया] here is distinct from the @deva[कर्तृ]/@deva[करण]-based @deva[तृतीया] of @ref[2.3.18]. The companion is neither agent nor instrument — this is a non-@deva[कारक] use of @deva[तृतीया].

**@deva[सह] as @deva[कर्मप्रवचनीय]?** @deva[सह] is not listed among the @deva[कर्मप्रवचनीय]-s (@ref[1.4.83]–@ref[1.4.97]). It governs @deva[तृतीया] by this specific rule, not through the @deva[कर्मप्रवचनीय] mechanism.
"""

id = "2.3.28"
numericId = "23028"

[en]
simple = """
The @deva[अपादान] (source of separation — the fixed point from which something moves away) takes @deva[पञ्चमी] (ablative, fifth case-ending).

The ablative answers the question "from where?" or "from what?" — whether the separation is physical movement, emotional distance, or metaphorical origin.

**Examples:**
- @deva[ग्रामादागच्छति] "he comes from the village" — the village is the fixed point of departure
- @deva[वृक्षात् पत्रं पतति] "a leaf falls from the tree" — the tree is the fixed point
- @deva[वृकेभ्यो बिभेति] "he fears wolves" — fear involves mental separation from the source of danger (@ref[1.4.25])
- @deva[आचार्याद् अधीते] "he studies from the teacher" — the teacher is the source of knowledge (@ref[1.4.29])

This is the primary rule for the ablative case. All subsequent ablative rules (@ref[2.3.29]–@ref[2.3.35]) extend the ablative to additional contexts.
"""

standard = """
@deva[अपादाने पञ्चमी] — the @deva[अपादान कारक] takes @deva[पञ्चमी].

**Rule type — @deva[विधि]:** Core case-assignment for @deva[पञ्चमी].

**@deva[अपादान] — @ref[1.4.24]: @deva[ध्रुवमपायेऽपादानम्]** — the fixed point (@deva[ध्रुव]) in an act of separation (@deva[अपाय]). Extensions at @ref[1.4.25]–@ref[1.4.31] cover fear, concealment, learning, etc.

**Examples:**
- @deva[ग्रामादागच्छति] "he comes from the village" — physical separation (@ref[1.4.24])
- @deva[वृक्षात् पत्रं पतति] "a leaf falls from the tree"
- @deva[वृकेभ्यो बिभेति] "he fears wolves" — @ref[1.4.25]: @deva[भीत्रार्थानां भयहेतुः]
- @deva[आचार्याद् अधीते] "he studies from the teacher" — @ref[1.4.29]: @deva[आख्यातोपयोगे]

**Scope:** This begins the @deva[पञ्चमी] sub-section (@ref[2.3.28]–@ref[2.3.35]). It provides the core @deva[कारक]-based assignment; subsequent rules handle specific extensions (words meaning "other," "far/near," etc.).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अनभिहिते] from @ref[2.3.1].

@deva[अपादाने पञ्चमी] — @deva[पञ्चमी] is assigned to @deva[अपादान].

**@deva[अपादान] definition chain:**
- @ref[1.4.24]: @deva[ध्रुवमपायेऽपादानम्] — the fixed point in separation (core definition)
- @ref[1.4.25]: @deva[भीत्रार्थानां भयहेतुः] — source of fear: @deva[वृकेभ्यो बिभेति]
- @ref[1.4.26]: @deva[पराजेरसोढ़ः] — the one who cannot endure: @deva[उपाध्यायात् पराजयते]
- @ref[1.4.27]: @deva[वारणार्थानामीप्सितः] — the desired object in acts of prevention: @deva[पापाद् वारयति]
- @ref[1.4.28]: @deva[अपद्रवे] — fleeing: @deva[सर्पाद् बिभेति]
- @ref[1.4.29]: @deva[आख्यातोपयोगे] — learning: @deva[आचार्याद् अधीते]
- @ref[1.4.30]: @deva[जनिकर्तुः प्रकृतिः] — the material cause: @deva[मृदः घटः] "a pot from clay"
- @ref[1.4.31]: @deva[भुवः प्रभवः] — origin/source: @deva[हिमवतो गङ्गा प्रभवति] "the @deva[गङ्गा] originates from the @deva[हिमवत्]"

**@deva[अनभिहित] interaction:** The @deva[अपादान] takes @deva[पञ्चमी] only when not already expressed. In compounds like @deva[ग्रामनिर्गतः] "gone out from the village," the compound absorbs the @deva[अपादान] relation — no @deva[पञ्चमी] is needed.

**@deva[वार्त्तिक]s:** (1) When a @deva[ल्यप्]-ending participle is elided, @deva[पञ्चमी] marks the implied location: @deva[प्रासादमारुह्य प्रेक्षते] = @deva[प्रासादात् प्रेक्षते] "he looks from the palace." (2) Origin questions: @deva[कुतो भवान्? पाटलिपुत्रात्] "Whence are you? From @[pāṭaliputra]." (3) Distance measurement: @deva[गवीधूमतः साङ्काश्यं चत्वारि योजनानि] "@[sāṅkāśya] is four @[yojana]s from @[gavīdhūma]."

**First @deva[पञ्चमी] rule:** This opens the @deva[पञ्चमी] sub-section (@ref[2.3.28]–@ref[2.3.35]).
"""

id = "2.3.43"
numericId = "23043"

[en]
simple = """
When @deva[साधु] (good, well-disposed) or @deva[निपुण] (skillfully attentive) express respectful conduct toward someone, that person takes @deva[सप्तमी] (locative, seventh case-ending). However, if @deva[प्रति] or a similar word is present, @deva[द्वितीया] (accusative) is used instead.

**Examples with locative:**
- @deva[मातरि साधुः] — "He is good toward his mother."
- @deva[मातरि निपुणः] — "He is attentive toward his mother."

**Example with @deva[प्रति] (accusative instead):**
- @deva[साधुर्देवदत्तो मातरं प्रति] — "Devadatta is good toward his mother." Here @deva[प्रति] governs accusative, so locative does not apply.

The rule requires genuine deference or respect (@deva[गौरव]). A bare factual statement like @deva[साधुर्भृत्यो राज्ञः] "the servant is good to the king" — where no special respect is expressed — does not trigger this locative.
"""

standard = """
@deva[साधुनिपुणाभ्यां गौरवे प्रतिप्रत्यनुभ्यो द्वितीयाऽसञ्ज्ञायाम्] — With @deva[साधु] (good) and @deva[निपुण] (skilled/attentive), when @deva[गौरव] (respect, deference) is expressed, the person respected takes @deva[सप्तमी]. But when @deva[प्रति], @deva[परि], or @deva[अनु] is present, @deva[द्वितीया] is used instead.

**Rule type — @deva[विधि]:** Assigns @deva[सप्तमी] for the respected person with these two adjectives, with an exception for prepositional constructions.

**Examples:**
- @deva[मातरि साधुः] / @deva[मातरि निपुणः] — "good/attentive toward mother" (locative)
- @deva[साधुर्देवदत्तो मातरं प्रति] — "Devadatta is good toward his mother" (accusative with @deva[प्रति])
- @deva[मातरं परि साधुर्देवदत्तः] — same meaning, with @deva[परि]

**@deva[गौरव] condition:** The locative applies only when respectful disposition is expressed. In @deva[साधुर्भृत्यो राज्ञः] "the servant is good to the king" — a neutral statement without deference — this rule does not apply, and the genitive (@deva[राज्ञः]) comes from @ref[2.3.50].

**Scope:** Limited to @deva[साधु] and @deva[निपुण]. Other adjectives of goodness (like @deva[भद्र]) do not receive this locative option.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सप्तमी] from @ref[2.3.36]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[साधुनिपुणाभ्यां गौरवे प्रतिप्रत्यनुभ्यो द्वितीयाऽसञ्ज्ञायाम्] — With @deva[साधु] and @deva[निपुण], when @deva[गौरव] is meant, @deva[सप्तमी] applies for the respected person. When @deva[प्रति], @deva[परि], or @deva[अनु] is used, @deva[द्वितीया] applies instead.

**@deva[गौरव] as condition:** The locative is restricted to expressions of genuine deference. Factual or neutral statements about someone being "good" do not qualify — they receive @deva[षष्ठी] via @ref[2.3.50].

**@deva[प्रति]/@deva[परि]/@deva[अनु] exception:** These @deva[कर्मप्रवचनीय]-s (@ref[1.4.90]ff.) govern @deva[द्वितीया] by @ref[2.3.8], which overrides the @deva[सप्तमी] of this rule. The @[sūtra] explicitly acknowledges this to prevent conflict.

**@deva[असञ्ज्ञायाम्] condition:** The rule applies when the words are not used as proper names. If @deva[साधु] or @deva[निपुण] is a personal name, the locative assignment does not apply.

**Examples:** @deva[मातरि साधुः] (locative, with @deva[गौरव]); @deva[साधुर्देवदत्तो मातरं प्रति] (accusative, @deva[प्रति] present); @deva[साधुर्भृत्यो राज्ञः] (genitive, no @deva[गौरव]).

**Cross-references:** @ref[2.3.36] (@deva[सप्तमी] for @deva[अधिकरण]), @ref[2.3.8] (@deva[द्वितीया] with @deva[कर्मप्रवचनीय]-s), @ref[2.3.50] (@deva[षष्ठी शेषे]).
"""

id = "2.3.53"
numericId = "23053"

[en]
simple = """
When the verb @deva[कृ] (to do/make) is used in the sense of "preparing" or "imparting a new quality" — rather than creating something from scratch — the object takes the genitive case (@deva[षष्ठी]) instead of the usual accusative.

**Example:**
- @deva[एधोदकस्योपस्कुरुते] — "he prepares the firewood and water (for the sacrifice)" — the firewood and water already exist; the action is preparing them, not creating them

**Contrast — @deva[कृ] meaning "to create":**
- @deva[कटं करोति] — "he makes a mat" — here the mat is being brought into existence, so the regular accusative (@deva[द्वितीया]) is used

The distinction is between transforming or readying something that already exists (genitive) versus producing something new (accusative).
"""

standard = """
@deva[कृञः प्रतियत्ने] — "of @deva[कृञ्] in the sense of @deva[प्रतियत्न] (preparation/effort upon), [@deva[षष्ठी] is used in the @deva[कर्मन्]]."

**Rule type — @deva[विधि]:** Assigns @deva[षष्ठी] to the object of @deva[कृञ्] when it means "to prepare/transform" rather than "to create."

**Key term — @deva[प्रतियत्न]:** This refers to imparting a new quality or condition to something already existing — anointing, consecrating, refining, arranging. The @[kāśikā] glosses this as applying to actions like scenting (@deva[गन्धन]), sprinkling (@deva[अवक्षेपण]), serving (@deva[सेवन]), and similar preparatory activities (cf. @ref[1.3.32]).

**Example:**
- @deva[एधोदकस्योपस्कुरुते] — "he prepares the firewood and water" — @deva[एधोदक] takes @deva[षष्ठी] because the wood and water are being readied, not created

**Counterexample:**
- @deva[कटं करोति] — "he makes a mat" — this is creation (@deva[निर्वृत्ति]), not transformation, so @deva[द्वितीया] applies

**Optionality:** The @deva[द्वितीया] alternative remains available via @deva[शेष]: @deva[एधोदकमुपस्कुरुते] is also valid.
"""

advanced = """
@deva[कृञः प्रतियत्ने] — @deva[अनुवृत्ति]: @deva[षष्ठी] from @ref[2.3.50], @deva[शेषे] from @ref[2.3.50], @deva[कर्मणि] from @ref[2.3.52].

**Semantic restriction:** The rule specifies @deva[कृञ्] (the @deva[तनादि] root, not @deva[डुकृञ् करणे] alone but specifically with the sense defined by @ref[1.3.32]). The @deva[प्रतियत्न] sense is enumerated in @ref[1.3.32] as @deva[गन्धनावक्षेपणसेवनसाहसिक्यप्रतियत्नप्रकथनोपयोगेषु कृञः] — scenting, sprinkling, serving, daring, striving, narrating, employing. In all these, the object undergoes transformation rather than coming into existence.

**Why separate from @ref[2.3.52]?** The previous rule covers @deva[अधीगर्थ], @deva[दय्], and @deva[ईश्]. @deva[कृ] does not share their semantics, so it requires its own rule. The @deva[प्रतियत्न] condition further narrows the scope — only one particular sense of @deva[कृ] triggers @deva[षष्ठी].

**@deva[उपस्कुरुते] form:** The example uses @deva[उप] + @deva[स्] + @deva[कृ] in @deva[आत्मनेपद], consistent with @ref[1.3.32] assigning @deva[आत्मनेपद] to @deva[कृञ्] in the @deva[प्रतियत्न] sense. The @deva[आत्मनेपद] serves as a diagnostic for the relevant meaning.

**Compound formation:** In @deva[एधोदकस्य], the @deva[एध] (firewood) and @deva[उदक] (water) form a @deva[द्वन्द्व] compound, and the entire compound takes @deva[षष्ठी]. The @deva[स]-insertion between compound members follows @ref[6.1.139] (@deva[उपसर्गात् सुनोति]).
"""

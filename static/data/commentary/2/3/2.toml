id = "2.3.2"
numericId = "23002"

[en]
simple = """
When the object (@deva[कर्मन्]) of an action is not already expressed by the verb ending, it takes the @deva[द्वितीया] (accusative, second case-ending).

**Examples:**
- @deva[कटं करोति] "he makes a mat" — @deva[कटम्] is the object, marked with accusative
- @deva[ग्रामं गच्छति] "he goes to the village" — @deva[ग्रामम्] is the destination (object of motion)
- @deva[धिग् देवदत्तम्] "fie on Devadatta!" — @deva[देवदत्तम्] takes accusative governed by the particle @deva[धिक्]

The accusative is the default case for the direct object of an action.
"""

standard = """
@deva[कर्मणि द्वितीया] — the @deva[द्वितीया] (accusative) expresses @deva[कर्मन्] when @deva[अनभिहित] — @deva[कर्मणि द्वितीया].

**Rule type — @deva[विधि]:** Assigns @deva[द्वितीया विभक्ति] to the @deva[कर्मन्].

**Examples:**
- @deva[कटं करोति] "he makes a mat"
- @deva[ग्रामं गच्छति] "he goes to the village"

**Particles governing accusative:**
- @deva[उभयतः], @deva[सर्वतः] (nearness sense): @deva[उभयतो ग्रामम्] "on both sides of the village"
- @deva[धिक्]: @deva[धिग् देवदत्तम्] "fie on Devadatta!"
- Reduplicated forms: @deva[उपर्युपरि ग्रामम्] "just above the village"

**@deva[वार्त्तिक]:** Additional particles governing @deva[द्वितीया]: @deva[अभितः] "around," @deva[परितः] "around," @deva[समया] "near," @deva[निकषा] "near," @deva[हा] "alas," @deva[प्रति] "towards."

**@deva[कर्मन्] defined by @ref[1.4.49]:** @deva[कर्तुरीप्सिततमं कर्म] — the @deva[कर्मन्] is what the agent most desires to reach through the action.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अनभिहिते] from @ref[2.3.1].

@deva[कर्मणि द्वितीया] — @deva[द्वितीया विभक्ति] is assigned to @deva[कर्मन्] when @deva[अनभिहित].

**@deva[द्वितीया] = three @deva[सुप्] affixes:** The term @deva[द्वितीया] denotes the second triad of @deva[सुप्] affixes: @deva[अम्] (singular), @deva[औट्] (dual), @deva[शस्] (plural). These are the accusative endings.

**@deva[कर्मन्] — @ref[1.4.49]:** @deva[कर्तुरीप्सिततमं कर्म] — the entity most desired to be reached by the agent. In @deva[कटं करोति], @deva[कट] is what the agent most seeks to bring about. In @deva[ग्रामं गच्छति], @deva[ग्राम] is the destination the agent seeks to reach.

**Particle-governed @deva[द्वितीया]:** Several particles (@deva[निपात]) require their governed word to take @deva[द्वितीया]:
- @deva[उभयतः], @deva[सर्वतः]: with nearness sense — @deva[उभयतो ग्रामम्]
- @deva[धिक्]: @deva[धिग् देवदत्तम्]
- Reduplicated @deva[अव्यय]s: @deva[उपर्युपरि], @deva[अधोऽधः]
- @deva[वार्त्तिक]-additions: @deva[अभितः], @deva[परितः], @deva[समया], @deva[निकषा], @deva[हा], @deva[प्रति]

These particles are not @deva[कारक]-related in the strict sense — they govern @deva[द्वितीया] by direct prescription, not through @deva[कर्मन्] analysis. See @ref[1.4.49]ff. for the @deva[कर्मप्रवचनीय] designation of some of these particles.

**First @deva[विभक्ति] rule:** This is the first case-assignment rule in the section. The order of @deva[विभक्ति] assignment in @[pāda] 2.3 roughly follows: @deva[द्वितीया] (@ref[2.3.2]–@ref[2.3.12]), @deva[चतुर्थी] (@ref[2.3.13]–@ref[2.3.17]), @deva[तृतीया] (@ref[2.3.18]–@ref[2.3.27]), @deva[पञ्चमी] (@ref[2.3.28]–@ref[2.3.35]), @deva[सप्तमी] (@ref[2.3.36]–@ref[2.3.49]), @deva[षष्ठी] (@ref[2.3.50]–@ref[2.3.73]).
"""

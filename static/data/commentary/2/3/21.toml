id = "2.3.21"
numericId = "23021"

[en]
simple = """
The distinguishing mark or sign by which a person's state or identity is recognized takes the @deva[तृतीया] (instrumental).

**Examples:**
- @deva[जटाभिस्तापसः] "he is [recognized as] an ascetic by his matted hair" — the matted hair is the sign of being an ascetic
- @deva[कमण्डलुना छात्रम्] "a student [identified] by his water-pot"
- @deva[शिखया परिव्राजकम्] "a wandering monk [known] by his topknot"

The instrumental marks the visible sign that reveals what someone is — it answers "how do you recognize them?"
"""

standard = """
@deva[इत्थम्भूतलक्षणे] — the distinguishing mark (@deva[लक्षण]) indicating a state (@deva[इत्थम्भूत]) takes @deva[तृतीया].

**Rule type — @deva[विधि]:** Assigns @deva[तृतीया] to the identifying mark that reveals a condition or status.

**Examples:**
- @deva[जटाभिस्तापसः] "an ascetic by his matted hair"
- @deva[कमण्डलुना छात्रम्] "a student by his water-pot"
- @deva[छात्रेणोपाध्यायम्] "a teacher [recognized] by having a student"
- @deva[शिखया परिव्राजकम्] "a mendicant by his topknot"

**@deva[इत्थम्भूत] — "being in such a state":** The mark must indicate a particular state or identity. Counter-example: @deva[वृक्षं प्रति विद्योतनम्] "lightning toward the tree" — no state is being indicated, so @deva[तृतीया] does not apply.

**Compound exception:** @deva[कमण्डलुपाणिश्छात्रः] "a student with water-pot in hand" — the mark (@deva[कमण्डलु]) is absorbed into the compound @deva[कमण्डलुपाणि] and does not take @deva[तृतीया] externally.

**Not @deva[करण]:** The mark is not an instrument of the action — it is a sign revealing a condition. This is a distinct non-@deva[कारक] use of @deva[तृतीया].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तृतीया] from @ref[2.3.18]; @deva[अनभिहिते] from @ref[2.3.1].

@deva[इत्थम्भूतलक्षणे] — @deva[तृतीया] is assigned to the @deva[लक्षण] (distinguishing mark) that indicates @deva[इत्थम्भूत] (a particular state of being).

**@deva[इत्थम्भूत] — "being in such a state":** The @deva[काशिका] explains: the mark must be a visible sign that reveals the referent's condition or identity. @deva[जटाभिस्तापसः] — the matted hair reveals the state of being an ascetic. @deva[छात्रेणोपाध्यायम्] — the presence of a student reveals the state of being a teacher.

**@deva[लक्षण] — identifying sign:** The mark must be distinctive and contextually identifying. It is not the cause of the state (that would be @deva[हेतु] under @ref[2.3.23]) but the sign by which the state is perceived.

**Compound absorption:** When the mark is absorbed into a compound, it cannot independently take @deva[तृतीया]. @deva[कमण्डलुपाणिश्छात्रः] — @deva[कमण्डलु] is part of the @deva[बहुव्रीहि] compound @deva[कमण्डलुपाणि] and cannot be separately assigned a case.

**Distinction from @ref[2.3.23] (@deva[हेतु]):** @deva[हेतु] is the cause that produces a result; @deva[लक्षण] is the sign that reveals a state. @deva[विद्यया यशः] (@ref[2.3.23]) — learning causes fame. @deva[जटाभिस्तापसः] (this rule) — matted hair does not cause asceticism; it reveals it.

**Position in section:** Part of the progressive extension of @deva[तृतीया] beyond @deva[कर्तृ]/@deva[करण]: @ref[2.3.19] (accompaniment), @ref[2.3.20] (body-part defect), this rule (identifying mark), @ref[2.3.22] (@deva[संज्ञा]), @ref[2.3.23] (cause).
"""

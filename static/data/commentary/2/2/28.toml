id = "2.2.28"
numericId = "22028"

[en]
simple = """
The word @deva[सह] "together with" compounds with a word in the instrumental case to form @deva[बहुव्रीहि], when the companion and the accompanied participate equally in the action. In the compound, @deva[सह] is shortened to @deva[स].

**Examples:**
- @deva[सपुत्रः] "accompanied by (his) son" — @deva[पुत्रेण सह वर्तते] "he lives together with (his) son"
- @deva[सभार्यः] "(one who is) with (his) wife"

The condition is that both participants do the same thing equally — if one is serving while the other eats, the compound does not apply.
"""

standard = """
@deva[सह] + @deva[तृतीयान्त] → @deva[बहुव्रीहि] when @deva[तुल्यक्रिया] — @deva[सहेन तुल्ययोगे].

**Rule type — @deva[विधि]:** Compounding rule for @deva[सह]-@deva[बहुव्रीहि]. Last rule of the @deva[बहुव्रीहि] section.

**Examples:**
- @deva[सपुत्रः] "with son" — @deva[पुत्रेण सह यः]
- @deva[सभार्यः] "with wife"

**@deva[सह] → @deva[स]:** In the compound, @deva[सह] reduces to @deva[स]: *@deva[सहपुत्रः] → @deva[सपुत्रः].

**@deva[तुल्यक्रिया] condition:** Both the principal person and the companion must participate equally in the same action. @deva[मातृभ्यां सह भुङ्क्ते] "he eats with (his) parents" — if the parents are serving (not eating), the participation is unequal, so no compound.

**@deva[बहुव्रीहि] character:** @deva[सपुत्रः] describes a person characterized by having his son alongside — the referent is the person, not the son. This is @deva[अन्यपदार्थ].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[बहुव्रीहिः] from @ref[2.2.23]; @deva[समासः] from @ref[2.1.3].

@deva[सहेन तुल्ययोगे] (implied) — @deva[सह] compounds with a @deva[तृतीयान्त] word as @deva[बहुव्रीहि] when there is equal participation (@deva[तुल्यक्रिया]).

**@deva[सह] → @deva[स] reduction:** @deva[सह] loses its second syllable in the compound, yielding @deva[स] as a prefix: @deva[सपुत्रः], @deva[सभार्यः], @deva[ससैन्यः]. This reduction is governed by @ref[2.2.28] itself or by @ref[6.3.78].

**@deva[तुल्यक्रिया] — equal participation:** The @deva[काशिका] explains that both the principal (@deva[प्रधान]) and the companion (@deva[सहचर]) must share equally in the action. @deva[सपुत्रो भुङ्क्ते] "he eats with his son" — both eat. @deva[मातृभ्यां सह भुङ्क्ते] — if the mother serves, the action is not shared equally; no compound.

**Closing the @deva[बहुव्रीहि] section:** This is the last rule under the @deva[बहुव्रीहि] @deva[अधिकार] of @ref[2.2.23]. The section covered: general @deva[बहुव्रीहि] (@ref[2.2.24]), numerical @deva[बहुव्रीहि] (@ref[2.2.25]), directional @deva[बहुव्रीहि] (@ref[2.2.26]), reciprocal @deva[बहुव्रीहि] (@ref[2.2.27]), and @deva[सह]-@deva[बहुव्रीहि] (@ref[2.2.28]).

**@deva[बहुव्रीहि] analysis:** @deva[सपुत्रः] = @deva[सह पुत्रेण यः सः] "he who is together with his son." The compound denotes the person (external referent), not the son or the togetherness.
"""

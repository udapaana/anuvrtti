id = "2.2.18"
numericId = "22018"

[en]
simple = """
The particle @deva[कु] "bad," words called @deva[गति] (by @ref[1.4.60]–@ref[1.4.61]), and the prefixes @deva[प्रादि] (when functioning as particles, not as verb-prefixes) **must** compound with the word they modify. This is an obligatory compound.

**Examples:**
- @deva[कु]: @deva[कुपुरुषः] "a bad man"
- @deva[गति]: @deva[उररीकृतम्] "acknowledged, asserted"
- @deva[प्रादि] as particle: @deva[दुष्पुरुषः] "a bad man," @deva[सुपुरुषः] "a good man," @deva[अतिपुरुषः] "an excellent man," @deva[आपिङ्गलः] "somewhat brown"

These prefixes are so tightly bound to their base words that they cannot stand separately.
"""

standard = """
@deva[कु] + @deva[गति] + @deva[प्रादि] (as @deva[निपात]) → @deva[नित्य] @deva[तत्पुरुष] — @deva[कुगतिप्रादयः].

**Rule type — @deva[विधि] (@deva[नित्यसमास]):** Obligatory compounding for these three classes.

**@deva[कु]:** @deva[कुपुरुषः] "bad man." @deva[कु] is an @deva[अव्यय] meaning "bad, vile."

**@deva[गति]:** Words designated @deva[गति] by @ref[1.4.60]–@ref[1.4.61]. Example: @deva[उररीकृतम्] "acknowledged" — @deva[उररी] is a @deva[गति] word.

**@deva[प्रादि] as @deva[निपात]:** @deva[प्र], @deva[परा], @deva[अप], @deva[सम्], @deva[अनु], etc. function as @deva[उपसर्ग] with verbs (by @ref[1.4.59]) but as @deva[निपात] with nominals. In the @deva[निपात] use:
- @deva[दुर्] "bad": @deva[दुष्पुरुषः]
- @deva[सु] "good": @deva[सुपुरुषः]
- @deva[अति] "exceeding": @deva[अतिपुरुषः]
- @deva[आ] "slightly": @deva[आपिङ्गलः] "somewhat brown"

**Further examples:** @deva[कदुष्णम्]/@deva[कवोष्णम्] "tepid," @deva[दुष्कृतम्] "misdeed," @deva[सुकृतम्] "good deed."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3].

@deva[कुगतिप्रादयः] — @deva[कु], @deva[गति]-words, and @deva[प्रादि] (as particles) obligatorily compound as @deva[तत्पुरुष]. @deva[नित्यसमास].

**@deva[प्रादि] — dual function:** The @deva[प्रादि] particles (@deva[प्र], @deva[परा], @deva[अप], etc.) are @deva[उपसर्ग] when they co-occur with a verb (@ref[1.4.59]). When they modify nominals, they are @deva[निपात] — and this rule applies. @deva[दुष्पुरुषः] (nominal) vs. @deva[दुष्करोति] (verbal) — different mechanisms.

**@deva[गति]-@deva[कारक]-@deva[उपपद] @deva[परिभाषा]:** The @deva[काशिका] cites the @deva[परिभाषा]: @deva[गतिकारकोपपदानां कृद्भिः सह समासवचनं प्राक् सुबुत्पत्तेः] — @deva[गति], @deva[कारक], and @deva[उपपद] compound with @deva[कृत्]-bases before @deva[सुप्]-affixation. This means these compounds form at the @deva[प्रातिपदिक] level, before case-endings are added. Example: @deva[अश्वक्रीती] (f.) "bought for a horse" — the compound forms before @deva[ङीप्] is added.

**@deva[सुप् सुपा] does not continue:** The @deva[अनुवृत्ति] of @deva[सुप् सुपा] from @ref[2.1.4] should not extend here, because @deva[कु], @deva[गति], and @deva[प्रादि] are not @deva[सुबन्त] — they are @deva[अव्यय]. The compound operates on pre-inflectional bases.

**Scope:** This rule is broad — @deva[कु] compounds with any nominal (@deva[कुपुरुषः], @deva[कदुष्णम्]), @deva[गति] words compound with @deva[कृदन्त]s, and @deva[प्रादि] particles compound with both nominals and @deva[कृदन्त]s (@deva[दुष्कृतम्], @deva[सुकृतम्], @deva[अतिस्तुतम्]).
"""

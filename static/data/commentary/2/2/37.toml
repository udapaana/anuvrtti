id = "2.2.37"
numericId = "22037"

[en]
simple = """
In compounds from the @deva[आहिताग्न्यादि] list, the @deva[निष्ठा]-ending word (@deva[क्त]/@deva[क्तवतु]) may **optionally** be placed first. Both orders are valid.

**Example:**
- @deva[आहिताग्निः] or @deva[अग्न्याहितः] — "one who has consecrated the sacred fire"

The @deva[आहिताग्न्यादि] list includes compounds like @deva[आहिताग्नि], @deva[चित्तापहृत], @deva[मनोनीत], @deva[धृतराष्ट्र], @deva[जातवेदस्], and others.
"""

standard = """
@deva[आहिताग्न्यादि] — @deva[निष्ठान्त] optionally first. @deva[विभाषा] to @ref[2.2.36] — @deva[आहिताग्न्यादिषु विभाषा].

**Rule type — @deva[विभाषा] (option):** Converts @ref[2.2.36]'s obligatory @deva[निष्ठा]-first order into an option for listed compounds.

**Example:** @deva[आहिताग्निः] ~ @deva[अग्न्याहितः] "one who has consecrated fire."

**@deva[आहिताग्न्यादि] list:** @deva[आहिताग्नि], @deva[चित्तापहृत], @deva[मनोनीत], @deva[उत्तरलोमन्], @deva[आहृतार्थ], @deva[आवृतेन्द्रिय], @deva[कृतबुद्धि], @deva[कृतात्मन्], @deva[कृतमति], @deva[कृतप्रज्ञ], @deva[दत्तापराध], @deva[धृतराष्ट्र], @deva[जातवेदस्], etc.

**Effect:** When the @deva[निष्ठान्त] goes first: @deva[आहिताग्निः]. When the non-@deva[निष्ठान्त] goes first: @deva[अग्न्याहितः]. Both forms are grammatically sanctioned.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[निष्ठा] from @ref[2.2.36]; @deva[बहुव्रीहौ] from @ref[2.2.35]; @deva[पूर्वम्] from @ref[2.2.30].

@deva[आहिताग्न्यादिषु विभाषा] (implied) — in the @deva[आहिताग्न्यादि] list, @deva[निष्ठान्त] is optionally placed first.

**@deva[विभाषा] mechanism:** @ref[2.2.36] makes @deva[निष्ठान्त]-first ordering obligatory in @deva[बहुव्रीहि]. This rule converts that obligation into an option for listed compounds. When the option applies, @deva[निष्ठान्त] goes first (@deva[आहिताग्निः]). When it does not, the non-@deva[निष्ठान्त] member goes first (@deva[अग्न्याहितः]).

**@deva[आहिताग्न्यादि] — notable members:**
- @deva[आहिताग्नि] ~ @deva[अग्न्याहित] "fire-consecrator"
- @deva[धृतराष्ट्र] ~ @deva[राष्ट्रधृत] "nation-upholder" (the @[mahābhārata] figure)
- @deva[जातवेदस्] ~ @deva[वेदोजात] "one born with knowledge" (epithet of fire)

**Why an option?** These compounds are well-established in usage in both orders. @deva[धृतराष्ट्र] (with @deva[निष्ठान्त] first) is the standard form, but @deva[राष्ट्रधृत] is also valid. The @deva[गण] accommodates compounds where convention has not fixed a single order.
"""

id = "2.2.10"
numericId = "22010"

[en]
simple = """
A word in the genitive case does **not** form a compound when the genitive expresses "picking out one from among many" (@deva[निर्धारण]). This selection can be based on genus, quality, or action.

**Examples (no compound formed):**
- @deva[क्षत्रियो मनुष्याणां शूरतमः] "the @[kṣatriya] is the bravest among humans" — selection by genus (@deva[जाति])
- @deva[कृष्णा गवां सम्पन्नक्षीरतमा] "the black cow gives the most milk among cows" — selection by quality (@deva[गुण])
- @deva[धावन्नधगानां शीघ्रतमः] "the runner is the fastest among walkers" — selection by action (@deva[क्रिया])

In each case, @deva[मनुष्याणाम्], @deva[गवाम्], and @deva[अधगानाम्] remain separate — they cannot compound with the superlative word.
"""

standard = """
@deva[निर्धारणे षष्ठी] — genitive in @deva[निर्धारण] sense does not compound — @deva[न निर्धारणे].

**Rule type — @deva[प्रतिषेध] (prohibition):** Blocks @ref[2.2.8] when the genitive expresses @deva[निर्धारण].

**@deva[निर्धारण]** = selecting one entity from a group, based on:
- @deva[जाति] (genus): @deva[क्षत्रियो मनुष्याणां शूरतमः]
- @deva[गुण] (quality): @deva[कृष्णा गवां सम्पन्नक्षीरतमा]
- @deva[क्रिया] (action): @deva[धावन्नधगानां शीघ्रतमः]

**Source of the genitive:** This @deva[षष्ठी] is ordained by @ref[2.3.41] (@deva[यतश्च निर्धारणम्]) — a specific genitive rule. The compound is blocked because the genitive has a special semantic function that would be lost in compounding.

**Beginning of prohibition series:** This rule begins a series of exceptions to @ref[2.2.8]: @ref[2.2.10]–@ref[2.2.15] specify cases where @deva[षष्ठीतत्पुरुष] is prohibited.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[षष्ठी] from @ref[2.2.8]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3].

@deva[न निर्धारणे] — @deva[षष्ठी] expressing @deva[निर्धारण] does not compound.

**Why block compounding?** @deva[निर्धारण] involves a specific semantic structure: "X is the Y-est among Zs." If compounded, the "among" relationship would be obscured. @deva[मनुष्यशूरतमः] could be misread as "bravest human" (@deva[कर्मधारय]) rather than "bravest among humans" (@deva[निर्धारण]).

**Source rule:** The genitive in @deva[निर्धारण] comes from @ref[2.3.41] (@deva[यतश्च निर्धारणम्]). Since this is a @deva[प्रतिपदविधान]-@deva[षष्ठी] (genitive ordained by a specific rule), not the general @deva[शेषे षष्ठी] of @ref[2.3.50], the prohibition is motivated by the special semantic function.

**@deva[वार्त्तिक] — broader principle:** The @deva[काशिका] records a @deva[वार्त्तिक] that any @deva[प्रतिपदविधान]-@deva[षष्ठी] (genitive ordained by a rule other than @ref[2.3.50]) never compounds. Examples: @deva[सर्पिषो ज्ञानम्] "knowledge of ghee" (@deva[षष्ठी] by @ref[2.3.51]), @deva[मधुनो ज्ञानम्] "knowledge of honey" — no compound. This @deva[वार्त्तिक] generalizes the principle beyond @deva[निर्धारण] to all specific-rule genitives.

**Series of prohibitions:** @ref[2.2.10] (@deva[निर्धारण]), @ref[2.2.11] (@deva[पूरण]), @ref[2.2.12] (@deva[प्रतिनिधि]/@deva[साक्षात्कार]), @ref[2.2.13]–@ref[2.2.15] (other specific blocks) — these carve out exceptions to the general @deva[षष्ठीतत्पुरुष] of @ref[2.2.8].
"""

id = "2.2.36"
numericId = "22036"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, a word ending in @deva[निष्ठा] — that is, @deva[क्त] or @deva[क्तवतु] (as defined by @ref[1.1.26]) — is placed first.

**Examples:**
- @deva[भिन्नघटः] "one whose pot is broken" — @deva[भिन्न] (@deva[क्तान्त]) goes first
- @deva[कृतकठः] "one who has made a mat" — @deva[कृत] (@deva[क्तान्त]) goes first
- @deva[युक्तयोगः] "one devoted to yoga" — @deva[युक्त] (@deva[क्तान्त]) goes first
"""

standard = """
@deva[निष्ठान्त] (@deva[क्त]/@deva[क्तवतु]) placed first in @deva[बहुव्रीहि] — @deva[निष्ठा बहुव्रीहौ].

**Rule type — @deva[विधि] (ordering rule):** Specific to @deva[बहुव्रीहि] with participial first members.

**Examples:**
- @deva[भिन्नघटः] "one whose pot is broken" — @deva[भिन्न] (from @deva[भिद्] + @deva[क्त])
- @deva[कृतकठः] "one who has made a mat" — @deva[कृत] (from @deva[कृ] + @deva[क्त])
- @deva[युक्तयोगः] "one devoted to yoga" — @deva[युक्त] (from @deva[युज्] + @deva[क्त])

**@deva[निष्ठा] defined by @ref[1.1.26]:** The affixes @deva[क्त] and @deva[क्तवतु] together receive the designation @deva[निष्ठा]. Words ending in either affix fall under this rule.

**Relation to @ref[2.2.35]:** @ref[2.2.35] placed @deva[विशेषण] and @deva[सप्तमी] first. @deva[निष्ठान्त] words are typically @deva[विशेषण] — so this rule is a more specific version of @ref[2.2.35] targeting participial qualifiers.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[पूर्वम्] from @ref[2.2.30]; @deva[बहुव्रीहौ] from @ref[2.2.35].

@deva[निष्ठा बहुव्रीहौ] (implied) — @deva[निष्ठान्त] words (@ref[1.1.26]) are placed first in @deva[बहुव्रीहि].

**@deva[निष्ठा] = @deva[क्त] + @deva[क्तवतु]:** @ref[1.1.26] (@deva[क्तक्तवतू निष्ठा]) groups these two past-participial affixes under the designation @deva[निष्ठा]. Both denote completed action and function as @deva[विशेषण] in @deva[बहुव्रीहि].

**Specificity over @ref[2.2.35]:** @ref[2.2.35] is a general rule for adjective-first ordering. @ref[2.2.36] specifically handles @deva[निष्ठान्त] — the most common type of participial @deva[विशेषण] in @deva[बहुव्रीहि]. By citing @deva[निष्ठा] specifically, the grammar ensures these compounds are unambiguously ordered.

**Examples analyzed:**
- @deva[भिन्नघटः] = @deva[भिन्नो घटो यस्य] "he whose pot is broken"
- @deva[कृतकठः] = @deva[कृतः कठो येन] "he by whom a mat is made"

**Interaction with @ref[2.2.37]:** The next rule provides an option for the @deva[आहिताग्न्यादि] list — in those compounds, @deva[निष्ठान्त] may optionally go first or last.
"""

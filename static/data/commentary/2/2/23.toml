id = "2.2.23"
numericId = "22023"

[en]
simple = """
Any compound not already covered by the preceding rules is called @deva[बहुव्रीहि]. A @deva[बहुव्रीहि] compound refers to something **other** than what its individual words mean — the compound as a whole describes an external entity.

**Example:**
- @deva[चित्रगुः] "one who has a spotted cow" — @deva[चित्र] "spotted" + @deva[गो] "cow." The compound does not refer to a cow — it refers to a person who possesses such a cow.

The compound's meaning points outward: "the one characterized by X" rather than "X itself."
"""

standard = """
@deva[शेषो बहुव्रीहिः] — the residual compound (not @deva[अव्ययीभाव], @deva[तत्पुरुष], or @deva[द्वन्द्व]) is @deva[बहुव्रीहि].

**Rule type — @deva[संज्ञा] / @deva[अधिकार]:** Names the compound type and governs @ref[2.2.24]–@ref[2.2.28].

**Example:** @deva[चित्रगुः] "possessing a spotted cow" — @deva[चित्रा गौः यस्य सः] "he whose cow is spotted."

**Key characteristic — @deva[अन्यपदार्थ]:** The compound denotes something other than its members. Unlike @deva[तत्पुरुष] (where one member is the head), in @deva[बहुव्रीहि] neither member is the referent — an external entity is described.

**@deva[अधिकार] scope:** This rule introduces the @deva[बहुव्रीहि] section, which runs through @ref[2.2.28].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समासः] from @ref[2.1.3].

@deva[शेषो बहुव्रीहिः] — any compound that is "left over" after @deva[अव्ययीभाव] (@ref[2.1.5]–@ref[2.1.21]), @deva[तत्पुरुष] (@ref[2.1.22]–@ref[2.2.22]), and @deva[द्वन्द्व] (@ref[2.2.29]) is @deva[बहुव्रीहि].

**@deva[शेष] definition:** The @deva[काशिका] explains that @deva[शेष] means "residual" — what remains after the other compound types have been accounted for. This makes @deva[बहुव्रीहि] a catch-all category defined by exclusion.

**@deva[अन्यपदार्थ] — the defining feature:** The distinctive property of @deva[बहुव्रीहि] is that the compound denotes @deva[अन्यपदार्थ] — "the meaning of another word." @deva[चित्रगुः] denotes neither @deva[चित्र] (spotted) nor @deva[गो] (cow), but the person possessing such a cow. The referent is external to both members.

**@deva[अधिकार] scope:** This rule heads the @deva[बहुव्रीहि] section through @ref[2.2.28]. The rules within specify which combinations form @deva[बहुव्रीहि] and what case-relationships are expressed.

**Contrast with @deva[तत्पुरुष]:** In @deva[तत्पुरुष], one member (typically the second) is the head — @deva[राजपुरुषः] refers to a @deva[पुरुष]. In @deva[बहुव्रीहि], neither member is the referent — @deva[चित्रगुः] refers to a person, not mentioned in the compound at all.

**Structural parallel to @ref[2.1.22]:** Just as @ref[2.1.22] (@deva[शेषो तत्पुरुषः]) defined @deva[तत्पुरुष] as the residual after @deva[अव्ययीभाव], this rule defines @deva[बहुव्रीहि] as the residual after @deva[तत्पुरुष] and @deva[अव्ययीभाव].
"""

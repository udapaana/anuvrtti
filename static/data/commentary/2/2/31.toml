id = "2.2.31"
numericId = "22031"

[en]
simple = """
In certain listed compounds (the @deva[राजदन्तादि] list), the @deva[उपसर्जन] "subordinate member" is placed **last** instead of first — reversing the normal order given by @ref[2.2.30].

**Example:**
- @deva[राजदन्तः] "chief tooth, eyetooth" — from @deva[दन्तानां राजा] "king among teeth." Normally @deva[राजन्] (the @deva[उपसर्जन]) would go first, giving *@deva[दन्तराजः]. But this rule reverses the order: @deva[राजदन्तः].

The entire compound structure is inverted — not just the @deva[उपसर्जन] but the whole word order swaps.
"""

standard = """
@deva[राजदन्तादि] — @deva[उपसर्जन] placed last. Exception to @ref[2.2.30] — @deva[राजदन्तादिषु परम्].

**Rule type — @deva[अपवाद] (exception):** Reverses the @deva[पूर्वनिपात] of @ref[2.2.30] for listed compounds.

**Example:** @deva[राजदन्तः] "eyetooth" — @deva[दन्तानां राजा] → @deva[राजदन्तः] (not *@deva[दन्तराजः]).

**@deva[राजदन्तादि] list:** @deva[राजदन्त], @deva[राजसखि], @deva[राजश्यालक], @deva[राजभोग्य], @deva[राजभृत्य], @deva[राजाश्रय], @deva[राजर्षि], @deva[देवर्षि], @deva[ब्रह्मर्षि], and others.

**Full reversal:** The @deva[काशिका] notes that it is not merely the @deva[उपसर्जन] that moves — the entire compound is reversed. The natural @deva[षष्ठीतत्पुरुष] *@deva[दन्तराजः] becomes @deva[राजदन्तः].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समासे] from @ref[2.2.30].

@deva[राजदन्तादिषु परम्] — in the @deva[राजदन्तादि] list, the @deva[उपसर्जन] is placed last (@deva[परम्]), overriding @ref[2.2.30]'s @deva[पूर्वनिपात].

**Complete reversal:** The @deva[काशिका] emphasizes that the entire @deva[समास] is reversed — not just the @deva[उपसर्जन] position. In @deva[दन्तानां राजा], the natural compound under @ref[2.2.8] + @ref[2.2.30] would be *@deva[दन्तराजः] (genitive-word first). This rule yields @deva[राजदन्तः] — both members swap.

**@deva[राजदन्तादि] list:** Primarily @deva[राजन्]-compounds: @deva[राजदन्त] "eyetooth," @deva[राजसखि] "king's friend," @deva[राजर्षि] "royal sage." Also includes @deva[देवर्षि] "divine sage" and @deva[ब्रह्मर्षि] "brahminical sage."

**@deva[गण] character:** This is a listed @deva[गण] — the reversal applies only to the enumerated compounds. Other genitive @deva[तत्पुरुष] compounds follow the normal @ref[2.2.30] order.

**Why these compounds?** Many of these are lexicalized expressions where the reversed order has become conventional usage. @deva[राजदन्तः] (eyetooth) is a fixed term — *@deva[दन्तराजः] is not standard. The @deva[गण] accommodates established usage that contradicts the default rule.
"""

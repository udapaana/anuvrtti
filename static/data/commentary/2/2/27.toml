id = "2.2.27"
numericId = "22027"

[en]
simple = """
Two identical words, both in the locative or both in the instrumental case, form a @deva[बहुव्रीहि] compound when the meaning involves mutual fighting or grasping. A final @deva[इ] is added to the compound.

**Examples:**
- @deva[केशाकेशि] "hair-to-hair fight" — both grabbed each other's hair
- @deva[दण्डादण्डि] "stick-fight" — fighting with sticks
- @deva[मुष्टामुष्टि] "fist-fight" — fighting with fists
- @deva[कपालकपालि] "skull-to-skull" — head-butting

These compounds describe the manner of a fight by repeating the word for what is used or grasped.
"""

standard = """
@deva[सामान] (identical) words in @deva[सप्तमी] or @deva[तृतीया] → @deva[बहुव्रीहि] when @deva[ग्रहण]/@deva[युद्ध] sense — @deva[सामानाधिकरणे सप्तमीतृतीये].

**Rule type — @deva[विधि]:** Compounding rule for reciprocal-action compounds.

**Examples:**
- @deva[केशाकेशि] "fighting by seizing each other's hair" — @deva[केशेषु केशेषु गृहीत्वा] (locative)
- @deva[दण्डादण्डि] "fighting with sticks" — @deva[दण्डेन दण्डेन] (instrumental)
- @deva[मुष्टामुष्टि] "fist-fight"
- @deva[कपालकपालि] "skull-to-skull"

**Final @deva[इ]:** The compound receives a final @deva[इ] — @deva[केश] + @deva[केश] → @deva[केशाकेशि] (not *@deva[केशाकेश]).

**Semantic condition:** The meaning must involve reciprocal physical engagement — fighting, grasping, or similar mutual action. Mere repetition without this sense does not trigger the rule.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[बहुव्रीहिः] from @ref[2.2.23]; @deva[समासः] from @ref[2.1.3].

@deva[सामानाधिकरणे सप्तमीतृतीये] (implied) — identical words in @deva[सप्तमी] or @deva[तृतीया] compound as @deva[बहुव्रीहि] when the sense is @deva[तत्र भवं तेन वा] (mutual grasping/fighting).

**@deva[सामान] — identical words:** Both members are the same word, declined in the same case. @deva[केशेषु केशेषु] (locative plural of @deva[केश]) or @deva[दण्डेन दण्डेन] (instrumental of @deva[दण्ड]). The repetition expresses reciprocity: "each one's hair in the other's hand."

**Final @deva[इ] addition:** The compound receives a terminal @deva[इ] — this is an augment that marks these reciprocal compounds morphologically. @deva[केशाकेशि], @deva[दण्डादण्डि], @deva[मुष्टामुष्टि], @deva[कपालकपालि].

**@deva[बहुव्रीहि] analysis:** The compound denotes the fight/action characterized by the repeated element: @deva[केशाकेशि] = "that (fight) which involves hair-in-hair grasping." The referent (the fight or encounter) is external to both members.

**@deva[सप्तमी] vs. @deva[तृतीया]:** @deva[सप्तमी] expresses the locus of grasping (@deva[केशेषु गृहीत्वा] "having grabbed in/at the hair"); @deva[तृतीया] expresses the instrument (@deva[दण्डेन] "with a stick"). Both yield the same compound type.
"""

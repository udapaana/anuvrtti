id = "2.2.38"
numericId = "22038"

[en]
simple = """
In @deva[कर्मधारय] compounds, words from the @deva[कडारादि] list may optionally be placed first. This is the last rule of the compound section.

**Example:**
- @deva[कडारजैमिनिः] or @deva[जैमिनिकडारः] — "the tawny Jaimini"

The @deva[कडारादि] list includes colour-words and similar adjectives: @deva[कडार] "tawny," @deva[पिङ्गल] "brown," @deva[कपिल] "tawny-brown," @deva[श्याम] "dark," @deva[कृष्ण] "black," @deva[पाण्डु] "pale," and others.

This rule also marks the end of the @deva[अधिकार] of @ref[1.4.1] and @ref[2.1.3] — the entire compound system concludes here.
"""

standard = """
@deva[कडारादि] optionally first in @deva[कर्मधारय] — @deva[कडारादिषु विभाषा].

**Rule type — @deva[विभाषा] (option):** Optional ordering for listed colour-words in @deva[कर्मधारय].

**Example:** @deva[कडारजैमिनिः] ~ @deva[जैमिनिकडारः] "tawny Jaimini."

**@deva[कडारादि] list:** @deva[कडार], @deva[पिङ्गल], @deva[कपिल], @deva[श्याम], @deva[कृष्ण], @deva[पाण्डु], @deva[रोहित], @deva[नील], @deva[हरित], @deva[हारिद्र], @deva[पिशङ्ग], etc.

**End of @deva[अधिकार]:** This rule closes two governing rules:
1. @ref[1.4.1] (@deva[आ कडारात् एका संज्ञा]) — the @deva[एकसंज्ञा] @deva[अधिकार] extends up to @deva[कडार]
2. @ref[2.1.3] (@deva[समर्थः पदविधिः]) — the @deva[समर्थ] requirement for compounding ends here

The entire @deva[समास] section (from @ref[2.1.3] through @ref[2.2.38]) is now complete.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[पूर्वम्] from @ref[2.2.30].

@deva[कडारादिषु विभाषा] (implied) — in @deva[कर्मधारय], @deva[कडारादि] words are optionally placed first.

**@deva[कडारादि] — colour adjectives:** The list consists primarily of colour-words and physical descriptors: @deva[कडार] "tawny," @deva[पिङ्गल] "brown," @deva[कपिल] "reddish-brown," @deva[श्याम] "dark," @deva[कृष्ण] "black," @deva[पाण्डु] "white/pale," @deva[रोहित] "red," @deva[नील] "blue," @deva[हरित] "green," @deva[हारिद्र] "yellow," @deva[पिशङ्ग] "tawny."

**Normally in @deva[कर्मधारय]:** @ref[2.2.35] and @ref[2.1.57] place the @deva[विशेषण] (adjective) first: @deva[नीलोत्पलम्] "blue lotus." This rule creates an exception for @deva[कडारादि] words — the adjective may optionally go last: @deva[जैमिनिकडारः] as well as @deva[कडारजैमिनिः].

**Closing the @deva[समास] system:**
- @ref[1.4.1] (@deva[आ कडारात् एका संज्ञा]) — the word @deva[कडार] marks the boundary of the @deva[एकसंज्ञा] @deva[अधिकार], which governs @deva[संज्ञा]-assignment rules in @[pādas] 1.4–2.2.
- @ref[2.1.3] (@deva[समर्थः पदविधिः]) — the @deva[समर्थ] condition (semantic fitness between compound members) governs the entire @deva[समास] section. It terminates here.

**Significance of @deva[कडार]:** The word @deva[कडार] appears in both @ref[1.4.1] (as the boundary marker) and @ref[2.2.38] (as the first word of the @deva[गण]). This dual role makes it the formal endpoint of the compound system — a characteristic @[pāṇinian] structural marker.
"""

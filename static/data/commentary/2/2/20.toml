id = "2.2.20"
numericId = "22020"

[en]
simple = """
An @deva[उपपद] compounds with an indeclinable (@deva[अव्यय]) only when that @deva[अव्यय] ends in the affix @deva[अम्] (such as @deva[ण्मुल्], by @ref[3.4.26]).

**Examples:**
- @deva[स्वादुकारम्] "having made it sweet" — @deva[स्वादु] (@deva[उपपद]) + @deva[कारम्] (from @deva[कृ] + @deva[ण्मुल्])
- @deva[लवणकारम्] "having seasoned (with salt)"

**No compound with other @deva[अव्यय]s:** @deva[कालो भोक्तुम्] "it is time to eat" — @deva[भोक्तुम्] ends in @deva[उम्] (from @deva[तुमुन्], not @deva[अम्]), so no compound with @deva[काल].
"""

standard = """
@deva[उपपद] + @deva[अव्यय] → compound only when @deva[अव्यय] is @deva[अमन्त] — @deva[अमन्ते अव्ययेन].

**Rule type — @deva[विधि] (restriction):** Limits @ref[2.2.19] for @deva[अव्यय] second members.

**Examples:**
- @deva[स्वादुकारम्] "having made it sweet" — @deva[कारम्] ends in @deva[अम्] (@deva[ण्मुल्])
- @deva[लवणकारम्] "having seasoned"

**Excluded:** @deva[कालो भोक्तुम्] — @deva[तुमुन्] ends in @deva[उम्], not @deva[अम्].

**Sole-ordination condition:** The @deva[काशिका] notes that compounding requires @deva[अम्] to be the **only** affix ordained for that @deva[उपपद]-@deva[धातु] combination. When @deva[अम्] is co-ordained with @deva[क्त्वा] (by @ref[3.4.24]), no compound: *@deva[अग्रेभोजम्] — the @deva[अम्] affix is not the sole prescription.

**Scope:** This rule restricts the broad authorization of @ref[2.2.19] for indeclinable @deva[कृत्]-forms. Only @deva[ण्मुल्]-derived forms (which end in @deva[अम्]) qualify.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[उपपदम्] from @ref[2.2.19]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[नित्यम्] from @ref[2.2.18].

@deva[अमन्ते अव्ययेन] — an @deva[उपपद] compounds with an @deva[अव्यय] only when the @deva[अव्यय] ends in the affix @deva[अम्].

**Restricting @ref[2.2.19]:** @ref[2.2.19] authorized @deva[उपपद] compounds with all non-@deva[तिङ्] @deva[कृत्]-words. This rule narrows that for @deva[अव्यय] @deva[कृत्]-forms: only @deva[अम्]-final @deva[अव्यय]s (i.e., @deva[ण्मुल्]-derived forms) compound.

**@deva[तुमुन्] excluded:** @deva[तुमुन्] (@ref[3.4.26]) produces @deva[अव्यय]s ending in @deva[उम्], not @deva[अम्]. So @deva[कालो भोक्तुम्] does not compound. Similarly, @deva[क्त्वा]-derived forms do not end in @deva[अम्].

**@deva[एवकार] — sole-ordination principle:** The @deva[काशिका] applies a restrictive interpretation: @deva[अम्] must be the sole affix prescribed for the @deva[उपपद]-@deva[धातु] combination (@deva[तुल्यविधान]). Where @ref[3.4.24] co-ordains @deva[क्त्वा] alongside @deva[अम्], the @deva[अम्]-form does not compound. This prevents *@deva[अग्रेभोजम्] from being treated as a compound.

**Position in the @deva[नित्यसमास] sequence:** @ref[2.2.18] (prefix compounds), @ref[2.2.19] (@deva[उपपद] compounds), @ref[2.2.20] (restriction on @deva[अव्यय] @deva[उपपद] compounds) — together these define the obligatory pre-inflectional compound types within @deva[तत्पुरुष].
"""

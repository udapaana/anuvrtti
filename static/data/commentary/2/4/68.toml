id = "2.4.68"
numericId = "24068"

[en]
simple = """
After words in the @deva[तिककितवादि] class when used as @deva[द्वन्द्व] compounds, the @deva[गोत्र] affixes are elided in the plural.

**Example:**
- @deva[तैकायनिः] + @deva[कैतवायनिः] (in @deva[द्वन्द्व]) → @deva[तिककितवाः] (both @deva[फिञ्] affixes elided)
- @deva[बाङ्खरिः] + @deva[भाण्डीरथिः] (in @deva[द्वन्द्व]) → @deva[बङ्खरभण्डीरथाः] (both @deva[इञ्] affixes elided)
"""

standard = """
After words in the @deva[तिककितवादि] class, when used as @deva[द्वन्द्व] compounds, there is @deva[लुक्] elision of the @deva[गोत्र] affixes in the plural.

**Examples:**
1. @deva[तिक] + @deva[फिञ्] = @deva[तैकायनिः] (@ref[4.1.154]); plural @deva[तैकायनयः]
   - @deva[द्वन्द्व]: @deva[तैकायनयः] + @deva[कैतवायनयः] = @deva[तिककितवाः] (@deva[फिञ्] elided from both)

2. @deva[बङ्खर] + @deva[इञ्] = @deva[बाङ्खरिः] (@ref[4.1.95])
   - @deva[द्वन्द्व]: @deva[बाङ्खरयः] + @deva[भाण्डीरथयः] = @deva[बङ्खरभण्डीरथाः]

**@deva[तिककितवादि] class:** @deva[तिककितव], @deva[बङ्खरभण्डीरथ], @deva[उपकलमक], @deva[अग्निवेशदासेरक], etc. (11 compounds).
"""

advanced = """
After words in the @deva[तिककितवादि] class, when used as @deva[द्वन्द्व] compounds, the @deva[गोत्र] affixes undergo @deva[लुक्] elision in the plural.

@deva[तिक] + @deva[फिञ्] = @deva[तैकायनिः] (@ref[4.1.154]); plural @deva[तैकायनयः]. In @deva[द्वन्द्व]: @deva[तैकायनयः] + @deva[कैतवायनयः] = @deva[तिककितवाः] (@deva[फिञ्] elided). Similarly @deva[बाङ्खरिः] (@ref[4.1.95]) + @deva[भाण्डीरथयः] = @deva[बङ्खरभण्डीरथाः] (@deva[इञ्] elided).

The full list of @deva[द्वन्द्व] compounds: 1. @deva[तिककितवाः]. 2. @deva[बङ्खरभण्डीरथाः]. 3. @deva[उपकलमकाः] (@deva[औपकायनाः] + @deva[लाभकायमाः], @ref[4.3.99]; @deva[फक्] elided). 4. @deva[पफकनरकाः] (@deva[पाफकयः] + @deva[नारकयः], @ref[4.1.95]; @deva[इञ्] elided). 5. @deva[वकतखगुदपरिणद्भाः]. 6. @deva[उब्जककुभाः] (@deva[औब्जयः], @ref[4.1.95] + @deva[काकुभाः], @ref[4.1.112]; @deva[इञ्] and @deva[अण्] elided). 7. @deva[लङ्कशान्तमुखाः] (@deva[इञ्] elided, @ref[4.1.95]). 8. @deva[उरसलङ्कटाः] (@deva[औरसायनयः], @ref[4.1.154] + @deva[लाङ्कटयः], @ref[4.1.95]; @deva[फिञ्] and @deva[इञ्] elided). 9. @deva[भ्रष्टककषिष्टलाः] (@deva[इञ्] elided). 10. @deva[कृष्णाजिनकृष्णसुन्दराः] (@deva[इञ्] elided). 11. @deva[अग्निवेशदासेरकाः] (@deva[आग्निवेश्यः], @ref[4.1.105] + @deva[दासेरकयः], @ref[4.1.95]; both @deva[यञ्] and @deva[इञ्] elided).
"""

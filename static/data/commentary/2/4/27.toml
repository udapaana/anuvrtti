id = "2.4.27"
numericId = "24027"

[en]
simple = """
The @deva[अश्ववडव] compound takes gender of the first member (@deva[अश्व]).

**Example:** @deva[अश्ववडवौ इमौ] (masculine from @deva[अश्व])

Exception to @ref[2.4.26] (final-member rule).
"""

standard = """
The @deva[अश्ववडव] compound takes gender of its first member (@deva[अश्व]), not the final (@deva[वडव]).

**Example:** @deva[अश्ववडवौ इमौ] (masc.—from @deva[अश्व]); @deva[अश्ववडवान्], @deva[अश्ववडवैः] (all masculine)

This applies when not @deva[समाहार] (@ref[2.4.12]); if @deva[समाहार], it's neuter: @deva[अश्ववडवम्].

Exception to @ref[2.4.26].
"""

advanced = """
@deva[अश्ववडव] = gender of first member. Exception to @ref[2.4.26].

**Example:** @deva[अश्ववडवौ इमौ], @deva[अश्ववडवान्], @deva[अश्ववडवैः] (all masc.).

Not @deva[समाहार]; if @deva[समाहार] (@ref[2.4.12]), neuter: @deva[अश्ववडवम्].
"""

id = "2.4.26"
numericId = "24026"

[en]
simple = """
A @deva[द्वन्द्व] or @deva[तत्पुरुष] takes the gender of its final member.

**Examples:**
- @deva[कुक्कुटमयूर्यौ इमे] (feminine from @deva[मयूरी])
- @deva[मयूरीकुक्कुटौ इमौ] (masculine from @deva[कुक्कुट])
- @deva[अर्धपिप्पली] 'half a @[pippalī]' (feminine)
"""

standard = """
A @deva[द्वन्द्व] or @deva[तत्पुरुष] takes the gender of its final member.

**Examples:**
- @deva[कुक्कुटमयूर्यौ इमे] (fem.—from @deva[मयूरी])
- @deva[मयूरीकुक्कुटौ इमौ] (masc.—from @deva[कुक्कुट])
- @deva[अर्धपिप्पली], @deva[अर्धकोशातकी] (fem.)

This applies to @deva[इतरेतर-द्वन्द्व]; @deva[समाहार-द्वन्द्व] is always neuter.

@note[type=@[vārtika]] Exceptions: @deva[द्विगु], compounds with @deva[प्राप्त]/@deva[आपन्न]/@deva[अलम्], @deva[गति] compounds: @deva[पञ्चकपालः], @deva[प्राप्तजीविकः], @deva[आपन्नजीविकः], @deva[अलंजीविकः], @deva[निष्कौशाम्बिः].
"""

advanced = """
@deva[द्वन्द्व]/@deva[तत्पुरुष] = gender of final member. Applies to @deva[इतरेतर-द्वन्द्व]; @deva[समाहार] = neuter.

**Examples:** @deva[कुक्कुटमयूर्यौ इमे] (fem.), @deva[मयूरीकुक्कुटौ इमौ] (masc.), @deva[अर्धपिप्पली], @deva[अर्धकोशातकी].

@note[type=@[vārtika]] Exceptions: @deva[द्विगु], @deva[प्राप्त]/@deva[आपन्न]/@deva[अलम्] compounds, @deva[गति] compounds: @deva[पञ्चकपालः], @deva[प्राप्तजीविकः], @deva[निष्कौशाम्बिः].
"""

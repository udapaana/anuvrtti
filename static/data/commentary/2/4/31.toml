id = "2.4.31"
numericId = "24031"

[en]
simple = """
The @deva[अर्धर्चादि]-class words can be either masculine or neuter.

**Examples:**
- @deva[अर्धर्चः] or @deva[अर्धर्चम्] 'half verse'
- @deva[गोमयः] or @deva[गोमयम्] 'cowdung'
- @deva[पद्मः] 'treasure' / @deva[पद्मम्] 'lotus'
- @deva[धर्मः] or @deva[धर्मम्] 'duty/righteousness'
"""

standard = """
The @deva[अर्धर्चादि]-@deva[गण] words take either @deva[पुंलिङ्ग] or @deva[नपुंसकलिङ्ग]. Sometimes the gender conveys different meanings.

**Examples:**
- @deva[अर्धर्चः]/​@deva[अर्धर्चम्] 'half verse'
- @deva[गोमयः]/​@deva[गोमयम्] 'cowdung'
- @deva[पद्मः] 'treasure' vs. @deva[पद्मम्] 'lotus'
- @deva[शङ्खः] 'treasure' vs. @deva[शङ्खम्] 'conch-shell'
- @deva[सैन्धवः]/​@deva[सैन्धवम्] 'salt'
- @deva[धर्मः]/​@deva[धर्मम्] 'duty'
"""

advanced = """
The @deva[अर्धर्चादि] words take both @deva[पुंलिङ्ग] and @deva[नपुंसकलिङ्ग]: @deva[अर्धर्चः] / @deva[अर्धर्चम्] 'half a verse,' @deva[गोमयः] / @deva[गोमयम्] 'cow-dung.' In some cases the two genders convey distinct meanings: @deva[पद्मः] 'treasure' vs. @deva[पद्मम्] 'lotus'; @deva[शंखः] 'treasure' vs. @deva[शंखम्] 'conch-shell'; @deva[भूतः] / @deva[भूतम्] 'ghost.' When the word functions as a verbal noun (@deva[कृदन्त]), it takes the gender of the word it qualifies. @deva[सैन्धवः] / @deva[सैन्धवम्] 'salt'—but as a derivative meaning 'born in or belonging to the sea,' it agrees with its qualified noun. @deva[सारः] 'best' vs. @deva[सारं] 'compendium.' Similarly @deva[धर्मः] / @deva[धर्मम्].

The @deva[गण] comprises 242 words: @deva[अर्धर्च], @deva[गोमय], @deva[कषाय], @deva[कार्षापण], @deva[कुतप], @deva[कुसप], @deva[कुणप], @deva[कपाट], @deva[शङ्ख], @deva[गूथ], @deva[यूथ], @deva[ध्वज], @deva[कबन्ध], @deva[पद्म], @deva[गृह], @deva[सरक], @deva[कंस], @deva[दिवस], @deva[यूष], @deva[अन्धकार], @deva[दण्ड], @deva[कमण्डलु], @deva[मण्ड], @deva[भूत], @deva[द्वीप], @deva[द्यूत], @deva[चक्र], @deva[धर्म], @deva[कर्मन्], @deva[मोदक], @deva[शतमान], @deva[यान], @deva[नख], @deva[नखर], @deva[चरण], @deva[पुच्छ], @deva[दाडिम], @deva[हिम], @deva[रजत], @deva[सक्तु], @deva[पिधान], @deva[सार], @deva[पात्र], @deva[घृत], @deva[सैन्धव], @deva[औषध], @deva[आढक], @deva[चषक], @deva[द्रोण], @deva[खलीन], @deva[पात्रिव], @deva[षष्ठिक], @deva[वारवाण], @deva[वारवारण], @deva[प्रोथ], @deva[कपित्थ], @deva[शुष्क], @deva[शाल], @deva[शील], @deva[शूक], @deva[शुक्ल], @deva[शीधु], @deva[कवच], @deva[रेणु], @deva[ऋण], @deva[कपट], @deva[शीकर], @deva[मुसल], @deva[सुवर्ण], @deva[वर्ण], @deva[पूर्व], @deva[चमस], @deva[क्षीर], @deva[कर्ष], @deva[आकाश], @deva[अष्टापद], @deva[मङ्गल], @deva[निधन], @deva[निर्यास], @deva[जृम्भ], @deva[वृत्त], @deva[पुस्त], @deva[बुस्त], @deva[क्ष्वेडित], @deva[शृङ्ग], @deva[निगड], @deva[खल], @deva[मूलक], @deva[मधु], @deva[मूल], @deva[स्थूल], @deva[शराव], @deva[बाल], @deva[वप्र], @deva[विमान], @deva[मुख], @deva[प्रग्रीव], @deva[शूल], @deva[वज्र], @deva[कटक], @deva[कण्टक], @deva[कर्पट], @deva[शिखर], @deva[कल्क], @deva[वत्कल], @deva[नटमक], @deva[नाटमस्तक], @deva[वलय], @deva[कसुम], @deva[तृण], @deva[पङ्क], @deva[कुण्डल], @deva[किरीट], @deva[कुमुद], @deva[अर्बुद], @deva[अङ्कुश], @deva[तिमिर], @deva[आश्रम], @deva[भूषण], @deva[इल्कस], @deva[इष्वास], @deva[मुकुल], @deva[वसन्त], @deva[तटाक], @deva[तडाग], @deva[विटक], @deva[विटङ्क], @deva[विडङ्ग], @deva[पिण्याक], @deva[माष], @deva[कोश], @deva[फलक], @deva[दिन], @deva[दैवत], @deva[पिनाक], @deva[समर], @deva[स्थाणु], @deva[अनीक], @deva[उपवास], @deva[शाक], @deva[कर्पास], @deva[विशाल], @deva[चषाल], @deva[चखाल], @deva[खण्ड], @deva[दर], @deva[व
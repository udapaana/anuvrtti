id = "2.4.77"
numericId = "24077"

[en]
simple = """
The aorist affix @deva[सिच्] (@ref[3.1.44]) undergoes @deva[लुक्] elision in @deva[परस्मैपद] after @deva[गा] 'go', @deva[स्था] 'stand', @deva[घु]-class verbs (@ref[1.2.20]), @deva[पा] 'drink', and @deva[भू] 'be'.

**Examples:**
- @deva[अगात्] 'he went' (not *@deva[अगासीत्])
- @deva[अस्थात्] 'he stood'
- @deva[अदात्] 'he gave' (@deva[घु]-verb @deva[दा])
- @deva[अपात्] 'he drank'
- @deva[अभूत्] 'he was'
"""

standard = """
The aorist affix @deva[सिच्] (@ref[3.1.44]) is elided by @deva[लुक्] in @deva[परस्मैपद] after: @deva[गा] 'go' (substitute for @deva[इण्], @ref[2.4.45]), @deva[स्था] 'stand', @deva[घु]-class (@ref[1.2.20]), @deva[पा] 'drink', @deva[भू] 'be'.

**Examples:**
- @deva[अगात्] 'he went'
- @deva[अस्थात्] 'he stood'
- @deva[अदात्] 'he gave' (@deva[दा] is @deva[घु])
- @deva[अधात्] 'he held' (@deva[धा] is @deva[घु])
- @deva[अपात्] 'he drank'
- @deva[अभूत्] 'he was'

**@deva[आत्मनेपद] (no elision):** @deva[अगासातां] @deva[ग्रामौ] @deva[देवदत्तेन]

@note[type=@[vārtika]]{@deva[गा] here means the substitute for @deva[इण्], not @deva[गै] 'sing'. @deva[पा] means 'drink', not 'protect'. Thus: @deva[अगासीत्] 'he sang', @deva[अपासीत्] 'he protected'.}
"""

advanced = """
There is @deva[लुक्] elision of the affix @deva[सिच्] -- @deva[च्लेः] @deva[सिच्] @ref[3.1.44] in the @deva[परस्मैपद] after the verbs @deva[गा] 'to go', @deva[स्था] 'to stand', the verbs called @deva[घु] @deva[मृषस्तितिक्षायाम्] @ref[1.2.20], @deva[पा] 'to drink' and @deva[भू] 'to be'. @deva[गा] is the substitute of @deva[इण्] @ref[2.4.45]. @deva[सिच्] the affix of the Aorist is elided after these verbs in the @[parasmaipada] as @deva[जगात्] 'he went, @deva[अस्थात्] 'he stood,' @deva[अदात्] 'he gave,' @deva[अघात्] 'he held,' @deva[अपात्] 'he drank,' @deva[अभूत्] 'he was.' Vart:- The verbs @deva[गा] and @deva[पा] in the aphorism mean the @deva[गा] 'to go' (which is the substitute of @deva[इण्], and not @deva[गै] 'to sing,') which also assumes the form @deva[गा], and @deva[पा] 'to drink' and not @deva[पा] 'to protect.' The verbs @deva[गा] 'to sing' and @deva[पा] 'to protect' will form their Aorist with @deva[सिच्] without its elision; thus @deva[अगासीत्] 'he sang,' @deva[अपासीत्] 'he protected.' In the @[atmanepada] the @deva[सिच्] is not elided; thus @deva[अगासातां] @deva[ग्रामौ] @deva[देवदत्तेन].
"""

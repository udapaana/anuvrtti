id = "2.4.21"
numericId = "24021"

[en]
simple = """
A @deva[तत्पुरुष] ending in @deva[उपज्ञा] (invention) or @deva[उपक्रम] (commencement) is @deva[नपुंसकलिङ्ग] when expressing origin of a work.

**Examples:** @deva[पाणिन्युपज्ञम्] 'originated by @[pāṇini]', @deva[व्याड्युपज्ञम्] 'invented by @[vyāḍi]'

**Counter-example:** @deva[देवदत्तोपज्ञो रथः] (not origin of a work)
"""

standard = """
A @deva[तत्पुरुष] ending in @deva[उपज्ञा]/@deva[उपक्रम] is @deva[नपुंसकलिङ्ग] when expressing the starting point of a work first invented/commenced.

**Examples:**
- @deva[पाणिन्युपज्ञमाकालापकं व्याकरणम्] 'grammars beginning with @[pāṇini]'s invention'
- @deva[व्याड्युपज्ञं दुष्करणम्] '@[vyāḍi] invented @[duṣkaraṇa]'
- @deva[आढ्योपक्रमः प्रासादः] 'palace invented by rich folks'

**Counter-examples:**
- @deva[देवदत्तोपज्ञो रथः] (not origin of work)
- @deva[वाल्मीकिश्लोकाः] (doesn't use @deva[उपज्ञा])
"""

advanced = """
@deva[तत्पुरुष] + @deva[उपज्ञा]/@deva[उपक्रम] = @deva[नपुंसकलिङ्ग] for origin of works.

**Examples:** @deva[पाणिन्युपज्ञमाकालापकं व्याकरणम्], @deva[व्याड्युपज्ञं दुष्करणम्], @deva[आढ्योपक्रमः प्रासादः], @deva[नन्दोपक्रमाणि मानानि].

Not origin: @deva[देवदत्तोपज्ञो रथः], @deva[यज्ञदत्तोपक्रमो रथः]. Without @deva[उपज्ञा]: @deva[वाल्मीकिश्लोकाः]. Accent: @ref[6.2.14].
"""

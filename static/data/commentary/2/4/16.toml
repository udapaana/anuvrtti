id = "2.4.16"
numericId = "24016"

[en]
simple = """
A @deva[द्वन्द्व] with approximate number optionally takes @deva[एकवचन].

**Examples:**
- @deva[उपदशं दन्तोष्ठम्] or @deva[उपदशा दन्तोष्ठाः] 'nearly ten sets of teeth and lips'
"""

standard = """
A @deva[द्वन्द्व] denoting approximate number of concrete substances optionally takes @deva[एकवचन].

**Examples:**
- @deva[उपदशं दन्तोष्ठम्]/‍@deva[उपदशा दन्तोष्ठाः] 'nearly ten (9 or 11) sets of teeth and lips'
- @deva[उपदशं मार्दङ्गिकपाणविकम्]/‍@deva[उपदशा मार्दङ्गिकपाणविकाः]

Singular form = @deva[अव्ययीभाव]; proper number = @deva[बहुव्रीहि] (@ref[2.2.25]).
"""

advanced = """
@deva[द्वन्द्व] with approximate number optionally @deva[एकवचन].

**Examples:** @deva[उपदशं दन्तोष्ठम्]/‍@deva[उपदशा दन्तोष्ठाः], @deva[उपदशं मार्दङ्गिकपाणविकम्]/‍@deva[उपदशा मार्दङ्गिकपाणविकाः].

Singular = @deva[अव्ययीभाव]; proper number = @deva[बहुव्रीहि] (@ref[2.2.25]).
"""

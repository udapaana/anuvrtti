id = "2.4.74"
numericId = "24074"

[en]
simple = """
The intensive affix @deva[यङ्] (@ref[3.1.22]) is variously elided when the affix @deva[अच्] (@ref[3.1.134]) follows.

**With elision:**
- @deva[लोलुवः] 'great cutter' (from @deva[लू] 'cut' + @deva[यङ्] + @deva[अच्])
- @deva[पोपुवः] 'great purifier' (from @deva[पू] 'purify')

**Without elision:**
- Intensive forms with @deva[यङ्] retained before other affixes
"""

standard = """
The intensive affix @deva[यङ्] (@ref[3.1.22]) undergoes @deva[लुक्] elision @deva[बहुलम्] (variously) when @deva[अच्] (@ref[3.1.134]) follows.

**With @deva[यङ्] elision:**
- @deva[लोलुवः] 'great cutter' (@deva[लू] + @deva[यङ्] + @deva[अच्], @deva[यङ्] elided)
- @deva[पोपुवः] 'great purifier'
- @deva[समीत्रंसः] (from @deva[स्रंस्] 'to drop')
- @deva[दनीध्वंसः] (from @deva[ध्वंस्] 'to fall', with @deva[नी] by @ref[7.4.84])

**Elision before other affixes too:**
- @deva[शाकुनिकी] @deva[लालपीति]
- @deva[दुन्दुभिवीवदीति]

@deva[बहुलम्] allows optionality. See also @ref[1.1.4].
"""

advanced = """
And there is diversely the @deva[लुक्] elision of @deva[यङ्] -- @deva[धातोरेकाचो] @deva[हलादेः] @deva[क्रियासमभिहारे] @deva[यङ्] @ref[3.1.22], when the affix @deva[अच्] -- @deva[नन्दिग्रहिपचादिभ्यो] @deva[ल्युणिन्यचः] @ref[3.1.134], follows. By using 'diversely' there is elision of @deva[यङ्] when other affixes than @deva[अच्] follow, both in the sacred and profane literature; as @deva[लोलुवः] 'much cutter' (@deva[लोलुव] + @deva[अव्]); @deva[पोपुवः] 'much purifier' @deva[समीत्रंसः] from @deva[स्रंस] 'to drop.' @deva[दनीध्वंसः] from @deva[ध्वंस] 'to fall,' the @deva[नी] being added by @ref[7.4.84]. So also @deva[यङ्] is elided before other affixes than @deva[अच्] : thus @deva[शाकुनिकी] @deva[लालपीति] @deva[दुन्दुभिवीवदीति] @deva[॥] See also @ref[1.1.4].
"""

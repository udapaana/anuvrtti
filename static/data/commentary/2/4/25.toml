id = "2.4.25"
numericId = "24025"

[en]
simple = """
A @deva[तत्पुरुष] ending in @deva[सेना], @deva[सुरा], @deva[छाया], @deva[शाला], @deva[निशा] is optionally @deva[नपुंसकलिङ्ग] (except @deva[नञ्] and @deva[कर्मधारय]).

**Examples:** @deva[ब्राह्मणसेना]/‍@deva[ब्राह्मणसेनम्], @deva[गोशाला]/‍@deva[गोशालम्]
"""

standard = """
A @deva[तत्पुरुष] ending in @deva[सेना], @deva[सुरा], @deva[छाया], @deva[शाला], @deva[निशा] is optionally @deva[नपुंसकलिङ्ग] (excluding @deva[नञ्] and @deva[कर्मधारय]).

**Examples:**
- @deva[ब्राह्मणसेना]/‍@deva[ब्राह्मणसेनम्] '@[brāhmaṇa] army'
- @deva[यवसुरा]/‍@deva[यवसुरम्] 'barley wine'
- @deva[कुड्यच्छाया]/‍@deva[कुड्यच्छायम्] 'wall's shadow'
- @deva[गोशाला]/‍@deva[गोशालम्] 'cow house'
- @deva[श्वनिशा]/‍@deva[श्वनिशम्] 'tomorrow night'

**Exceptions:** @deva[असेना] (@deva[नञ्]), @deva[परमसेना] (@deva[कर्मधारय]).

Accent: @ref[6.2.14], @ref[6.2.123].
"""

advanced = """
@deva[तत्पुरुष] + @deva[सेना]/@deva[सुरा]/@deva[छाया]/@deva[शाला]/@deva[निशा] = optional @deva[नपुंसकलिङ्ग] (not @deva[नञ्]/@deva[कर्मधारय]).

**Examples:** @deva[ब्राह्मणसेना]/‍@deva[°म्], @deva[यवसुरा]/‍@deva[°म्], @deva[कुड्यच्छाया]/‍@deva[°म्], @deva[गोशाला]/‍@deva[°म्], @deva[श्वनिशा]/‍@deva[°म्].

Excluded: @deva[असेना] (@deva[नञ्]), @deva[परमसेना] (@deva[कर्मधारय]). Accent: @ref[6.2.14], @ref[6.2.123].
"""

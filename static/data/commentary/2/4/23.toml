id = "2.4.23"
numericId = "24023"

[en]
simple = """
A @deva[तत्पुरुष] ending in @deva[सभा] is @deva[नपुंसकलिङ्ग] when preceded by a @deva[राजन्]-synonym or non-human word.

**Examples:** @deva[इन्द्रसभम्] 'Indra's court', @deva[ईश्वरसभम्], @deva[रक्षःसभम्], @deva[पिशाचसभम्]

**Counter-examples:** @deva[राजसभा] (not synonym), @deva[देवदत्तसभा] (human)
"""

standard = """
A @deva[तत्पुरुष] ending in @deva[सभा] is @deva[नपुंसकलिङ्ग] when preceded by @deva[राजन्]-synonyms or @deva[अमनुष्य] (non-human) words.

**Examples:**
- @deva[इन्द्रसभम्] 'King's court' (@deva[इन्द्र] = @deva[राजन्]-synonym)
- @deva[ईश्वरसभम्] 'Lord's court'
- @deva[रक्षःसभम्] '@[rākṣasa] court'
- @deva[पिशाचसभम्] '@[piśāca] court'

**Counter-examples:**
- @deva[राजसभा] (@deva[राजन्] itself excluded—only synonyms; exception to @ref[1.1.68])
- @deva[देवदत्तसभा], @deva[काष्ठसभा] (human/@deva[मनुष्य])
"""

advanced = """
@deva[तत्पुरुष] + @deva[सभा] = @deva[नपुंसकलिङ्ग] after @deva[राजन्]-synonyms or @deva[अमनुष्य].

**Examples:** @deva[इन्द्रसभम्], @deva[ईश्वरसभम्], @deva[रक्षःसभम्], @deva[पिशाचसभम्].

@deva[राजसभा] excluded (only synonyms; exception to @ref[1.1.68]). Human: @deva[देवदत्तसभा], @deva[काष्ठसभा].
"""

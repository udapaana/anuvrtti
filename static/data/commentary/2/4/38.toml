id = "2.4.38"
numericId = "24038"

[en]
simple = """
The root @deva[अद्] 'to eat' is replaced by @deva[घस्ॡ] before the affixes @deva[घञ्] and @deva[अप्].

**Examples:**
- @deva[अद्] + @deva[घञ्] → @deva[घासः] 'food, grass'
- @deva[प्र] + @deva[अद्] + @deva[अप्] → @deva[प्रघसः] 'voracity'
"""

standard = """
The root @deva[अद्] 'to eat' is replaced by @deva[घस्ॡ] when @deva[घञ्] or @deva[अप्] follows.

**Examples:**
- @deva[अद्] + @deva[घञ्] = @deva[घास] + @deva[अ] = @deva[घासः] 'food, grass' (by @ref[3.3.19])
- @deva[प्र] + @deva[अद्] + @deva[अप्] = @deva[प्र] + @deva[घस] = @deva[प्रघसः] 'voracity'
"""

advanced = """
And when the affix @deva[घञ्] and @deva[अप्] follow @deva[घसॢ] is the substitute of @deva[अद्]@deva[।] @deva[घासः] 'food, grass,' @deva[अद्] + @deva[घञ्] = @deva[घास] + @deva[अ] @ref[3.3.19]. @deva[प्रघसः] 'voracity.' @deva[प्र] + @deva[अद्] + @deva[अप्] = @deva[प्र] + @deva[घस].
"""

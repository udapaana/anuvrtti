id = "2.4.9"
numericId = "24009"

[en]
simple = """
A @deva[द्वन्द्व] of animals with permanent natural enmity (@deva[शाश्वतिकविरोध]) takes @deva[एकवचन] invariably.

**Examples:**
- @deva[मार्जारमूषकम्] 'cat and rat'
- @deva[अहिनकुलम्] 'snake and mongoose'
- @deva[काकोलूकम्] 'crow and owl'
- @deva[श्वशृगालम्] 'dog and jackal'
"""

standard = """
A @deva[द्वन्द्व] of animals with @deva[शाश्वतिकविरोध] (permanent natural enmity) takes @deva[एकवचन] invariably—no optional plural.

**Examples:**
- @deva[मार्जारमूषकम्] 'cat and rat'
- @deva[अहिनकुलम्] 'snake and mongoose'
- @deva[काकोलूकम्] 'crow and owl'
- @deva[अश्वमहिषम्] 'horse and buffalo'

**Counter-example:** @deva[गौपालिशालङ्कायनाः कलहायन्ते] (temporary quarrel, not natural enmity).

The @deva[च] in the @[sūtra] = @deva[एव], making this invariable and overriding @ref[2.4.12].
"""

advanced = """
@deva[द्वन्द्व] of @deva[शाश्वतिकविरोध] (permanent enmity) animals takes @deva[एकवचन] invariably.

**Examples:** @deva[मार्जारमूषकम्], @deva[अहिनकुलम्], @deva[काकोलूकम्], @deva[श्वशृगालम्], @deva[अश्वमहिषम्].

Temporary quarrel: @deva[गौपालिशालङ्कायनाः कलहायन्ते]. @deva[च] = @deva[एव]—invariable, overrides @ref[2.4.12].
"""

id = "2.4.78"
numericId = "24078"

[en]
simple = """
The aorist affix @deva[सिच्] is optionally elided in @deva[परस्मैपद] after @deva[घ्रा] 'smell', @deva[धेट्] 'drink', @deva[शो] 'sharpen', @deva[छो] 'cut', and @deva[सो] 'destroy'.

**With elision / Without elision:**
- @deva[अघ्रात्] or @deva[अघ्रासीत्] 'he smelled'
- @deva[अधात्] or @deva[अधासीत्] 'he drank'
- @deva[अशात्] or @deva[अशासीत्] 'he sharpened'
- @deva[अच्छात्] or @deva[अच्छासीत्] 'he cut'
- @deva[असात्] or @deva[असासीत्] 'he destroyed'
"""

standard = """
The aorist affix @deva[सिच्] is OPTIONALLY elided in @deva[परस्मैपद] after: @deva[घ्रा] 'smell', @deva[धेट्] 'drink', @deva[शो] 'sharpen', @deva[छो] 'cut', @deva[सो] 'destroy'.

**Examples:**
| With elision | Without elision | Meaning |
|--------------|-----------------|----------|
| @deva[अघ्रात्] | @deva[अघ्रासीत्] | 'he smelled' |
| @deva[अधात्] | @deva[अधासीत्] | 'he drank' |
| @deva[अशात्] | @deva[अशासीत्] | 'he sharpened' |
| @deva[अच्छात्] | @deva[अच्छासीत्] | 'he cut' |
| @deva[असात्] | @deva[असासीत्] | 'he destroyed' |

**@deva[आत्मनेपद] (no option, @deva[सिच्] retained):** @deva[अघ्रासातां] @deva[सुमनसौ] @deva[देवदत्तेन]

Note: @deva[धेट्] is a @deva[घु]-verb; the previous rule would elide @deva[सिच्] mandatorily. This rule makes it optional.
"""

advanced = """
After @deva[घ्रा] 'to smell,' @deva[धेट्] 'to drink,' @deva[शो] 'to sharpen,' @deva[छो] 'to cut,' and @deva[सो] 'to destroy,' the aorist affix @deva[सिच्] is optionally elided in @deva[परस्मैपद]: @deva[अघ्रात्] / @deva[अघ्रासीत्] 'he smelled'; @deva[अधात्] / @deva[अधासीत्] 'he drank'; @deva[अशात्] / @deva[अशासीत्] 'he sharpened'; @deva[अच्छात्] / @deva[अच्छासीत्] 'he cut'; @deva[असात्] / @deva[असासीत्] 'he destroyed.'

No option is permitted in @deva[आत्मनेपद]; @deva[सिच्] is retained: @deva[अघ्रासातां सुमनसौ देवदत्तेन].

@deva[धेट्] is a @deva[घु]-verb, so @deva[सिच्] would already be mandatorily elided by the preceding rule. This @[sūtra] converts that mandatory elision into an option.
"""

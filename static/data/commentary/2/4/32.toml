id = "2.4.32"
numericId = "24032"

[en]
simple = """
When the pronoun @deva[इदम्] 'this' is used a second time in the same sentence to refer back to the same thing (@deva[अन्वादेश] 'anaphoric reference'), it is replaced by @deva[अश्] in cases from the instrumental (3rd) onward.

**Example:**
@deva[आभ्यां छात्राभ्यां रात्रिरधीता, अथो आभ्यामहरप्यधीतम्]
'These two students studied at night, and they (same students) studied by day too.'

The first @deva[आभ्याम्] is from @deva[इदम्]; the second @deva[आभ्याम्] uses the @deva[अश्] substitute.
"""

standard = """
When @deva[इदम्] 'this' is re-employed in @deva[अन्वादेश] (anaphoric reference to the same thing mentioned earlier), it is replaced by @deva[अश्] (which is @deva[अनुदात्त]) before the instrumental and subsequent case-endings.

**Examples:**
- @deva[आभ्यां छात्राभ्यां रात्रिरधीता, अथो आभ्यामहरप्यधीतम्] 'Those students studied at night, and they studied by day too.'
- @deva[अस्मै छात्राय कम्बलं देहि, अथो अस्मै शाटीमपि देहि] 'Give this student a blanket, and give him a cloth too.'

@deva[अश्] replaces the entire @deva[इदम्], not just the final @deva[म्] (by @ref[1.1.55]).
"""

advanced = """
In the room of @deva[इदम्] 'this', in the case of its re-employment in a subsequent member of the same sentence and referring to the same thing (@deva[अन्वादेश]) there is the substitution of @deva[अश्] which is @deva[अनुदात्त] (gravely accented), when the Instrumental -3rd case-affix and the rest follow. The word @deva[अन्वादेश] means literally saying (@[adesa]) 'after' (@[anu]) or after-say or re-employment. @deva[अश्] (actually @deva[अ]) replaces @deva[इदम्] in all cases except the nominative and the accusative, when @[anvadesa] or repetition is implied. @deva[अश्] replaces the whole of @deva[इदम्] by 55 and not only the final @deva[म्]. @[anvadesa] means repeating in a second sentence with reference to the preceding in which it has already been used. Both pronouns, the antecedent and the subsequent, must refer to the same object. As, @deva[आभ्याम्] @deva[छात्राभ्याम्] @deva[रात्रिरधीता], @deva[अथो] @deva[आभ्यामहरप्यधीम्] 'Those students studied in the night and they have read in the day also.' The substitute @deva[अश्] will replace @deva[इदम्], even when the latter takes the affix @deva[अकच्] @ref[5.3.71] @deva[अस्मै] @deva[छात्राय] @deva[कम्बलं] @deva[देहि], @deva[अथो] @deva[अस्मै] @deva[शाकटमपि] @deva[देहि] 'Give this student a blanket and give him also a cloth'. @deva[अस्य] @deva[छात्रस्य] @deva[शोभनं] @deva[शीलम्], @deva[अथो] @deva[अस्य] @deva[प्रभूतं] @deva[स्वम्], 'this student's conduct is excellent, and his wealth is great.' So also when the affix @deva[अकच्] @ref[5.3.71] comes after the Pronominal as @deva[इमकाभ्यां] @deva[छात्राभ्यां] @deva[रात्रिरधीता], @deva[अथो] @deva[आभ्यामहरप्यधीतम्]. The mere mentioning in a subsequent sentences is now @[anvadesa] : it is the employment again of what has been employed to direct one operation, to direct another operation. Therefore the rule does not apply here :- @deva[देवदत्तं] @deva[भोजय], @deva[इमंच] @deva[यज्ञदत्तम्] 'feed @[devadatta] and this @[yajnadatta].'
"""

id = "2.4.75"
numericId = "24075"

[en]
simple = """
After roots of the @deva[जुहोत्यादि] class (3rd conjugation), the @deva[विकरण] @deva[शप्] undergoes @deva[श्लु] elision. The @deva[श्लु] elision causes reduplication of the root.

**Examples:**
- @deva[हु] → @deva[जुहोति] 'he sacrifices' (@ref[7.1.10])
- @deva[भी] → @deva[बिभेति] 'he fears'
- @deva[निज्] → @deva[निनेक्ति] 'he purifies'
- @deva[दा] → @deva[ददाति] 'he gives'
"""

standard = """
After @deva[जुहोत्यादि] roots (3rd conjugation), the @deva[विकरण] @deva[शप्] (@ref[3.1.68]) undergoes @deva[श्लु] elision. @deva[श्लु] (unlike @deva[लुक्]) triggers reduplication.

**Examples:**
- @deva[हु] 'sacrifice' → @deva[जुहोति] (@ref[7.1.10])
- @deva[भी] 'fear' → @deva[बिभेति]
- @deva[निज्] 'purify' → @deva[निनेक्ति]
- @deva[दा] 'give' → @deva[ददाति]
- @deva[धा] 'place' → @deva[दधाति]

**Why @deva[श्लु] instead of @deva[लुक्]?** Though @deva[लुक्] already elides @deva[शप्] for @deva[अदादि], @deva[श्लु] is taught separately because it causes reduplication—a characteristic of the 3rd conjugation.
"""

advanced = """
After the verbs @deva[हू] 'to sacrifice' and others there is @deva[श्लु] elision of the @deva[विकरण] @deva[शप्] -- @deva[कर्तरि] @deva[शप्] @ref[3.1.68]. These verbs belong to the @[juhotyadi] class. @deva[जुहोति] 'he sacrifices' @ref[7.1.10]. @deva[श्लु] causes the reduplication of the root. So also @deva[बिभेति] 'he fears.' @deva[निनेक्ति] from @deva[निज्] 'to purify, he purifies.'
"""

id = "2.4.81"
numericId = "24081"

[en]
simple = """
The tense-affix (@deva[ल्]) that comes after @deva[आम्] in the periphrastic perfect (@deva[लिट्]) is elided by @deva[लुक्]. After elision, an auxiliary verb (@deva[कृ], @deva[भू], or @deva[अस्]) supplies the perfect ending.

**Examples:**
- @deva[ईहांचक्रे] 'he endeavored' (@deva[ईह्] + @deva[आम्] + perfect of @deva[कृ])
- @deva[ऊहांचक्रे] 'he guessed'
- @deva[ईक्षांचक्रे] 'he saw'
"""

standard = """
The tense-affix (@deva[ल्]) following @deva[आम्] in the periphrastic perfect (@deva[लिट्]) undergoes @deva[लुक्] elision. The perfect is then formed with auxiliaries @deva[कृ], @deva[भू], or @deva[अस्].

**Examples:**
- @deva[ईहांचक्रे] (@deva[ईह्] + @deva[आम्] + @deva[चक्रे] from @deva[कृ])
- @deva[ऊहांचक्रे]
- @deva[ईक्षांचक्रे]

**Formation:** After @deva[ईहाम्], all original tense-affixes are elided. The perfect of auxiliary @deva[कृ]/[@deva[भू]]/[@deva[अस्]] is added:
- @deva[चोरयांचकार] / @deva[चोरयांबभूव] / @deva[चोरयामास] 'he stole'

The @deva[आम्] affix is used for the periphrastic perfect by @ref[3.1.35].
"""

advanced = """
There is @deva[लुक्] elision in the room of that tense-affix (@deva[लि]) which comes after @deva[आम्] of the @deva[लिट्] (Perfect Tense). @deva[आम्] is used in forming Periphrastic Perfect @deva[ईहांचक्रे] 'he endeavoured.' Here, after the verb @deva[ईहाम्] all tense-affixes are elided, and the Perfect of @deva[कृ] is added to form its Perfect. Similarly @deva[ऊहांचक्रे], @deva[ईक्षांचक्रे] @deva[॥]
"""

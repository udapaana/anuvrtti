id = "2.4.5"
numericId = "24005"

[en]
simple = """
A @deva[द्वन्द्व] of subjects studied in sequence (not remote) takes @deva[एकवचन].

**Examples:**
- @deva[पदकक्रमकम्] 'one who studied pada and krama arrangements'
- @deva[क्रमकवार्त्तिकम्] 'one who studied krama and @[vārttika]'

**Counter-example:** @deva[याज्ञिकवैयाकरणौ] (dual—remote subjects)
"""

standard = """
A @deva[द्वन्द्व] of words denoting persons who studied subjects in sequence (not remote from each other) takes @deva[एकवचन].

**Examples:**
- @deva[पदकक्रमकम्] 'one who studied pada and krama arrangements'
- @deva[क्रमकवार्त्तिकम्] 'one who studied krama and @[vārttika]'

**Counter-examples:**
- @deva[याज्ञिकवैयाकरणौ] 'ritualist and grammarian' (remote subjects, so dual)
- @deva[पितापुत्रौ] 'father and son' (not study-order, so dual)
"""

advanced = """
@deva[द्वन्द्व] of words denoting students of sequentially-related subjects (@deva[अदूरविद्य]) takes @deva[एकवचन].

**Examples:** @deva[पदकक्रमकम्], @deva[क्रमकवार्त्तिकम्].

Not study-order: @deva[पितापुत्रौ]. Remote subjects: @deva[याज्ञिकवैयाकरणौ].
"""

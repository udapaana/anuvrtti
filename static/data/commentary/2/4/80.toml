id = "2.4.80"
numericId = "24080"

[en]
simple = """
In @deva[मन्त्र] (Vedic hymns), the aorist and perfect affixes (@deva[लि]) are elided after certain roots: @deva[घस्] 'eat', @deva[ह्वृ] 'be crooked', @deva[नश्] 'destroy', @deva[वृ] 'choose/cover', @deva[दह्] 'burn', roots ending in long @deva[आ], @deva[वृच्] 'avoid', @deva[कृ] 'make', @deva[गम्] 'go', @deva[जन्] 'be born'.

**Examples:**
- @deva[अक्षन्] @deva[पितरः] 'the fathers ate' (from @deva[घस्])
- @deva[आप्रा] @deva[द्यावापृथिवी] 'filled heaven and earth' (from @deva[प्रा])
"""

standard = """
In @deva[मन्त्र] portions of the Vedas, aorist and perfect affixes (@deva[लि]) undergo @deva[लुक्] elision after: @deva[घस्] 'eat', @deva[ह्वृ] 'be crooked', @deva[नश्] 'destroy', @deva[वृ] 'choose/cover', @deva[दह्] 'burn', @deva[आत्]-ending roots, @deva[वृच्] 'avoid', @deva[कृ] 'make', @deva[गम्] 'go', @deva[जन्] 'be born'.

**Examples from Vedas:**
- @deva[अक्षन्] @deva[पितरः] (Yajur. XIX.36, @[ṛg] I.82.2) from @deva[घस्]
- @deva[मा] @deva[हूर्मित्रस्य] from @deva[ह्वृ]
- @deva[प्रणङ्] @deva[मर्त्यस्य] (@[ṛg] I.18.3) from @deva[नश्]
- @deva[वेन] @deva[आवः] (Yajur. 13.3) from @deva[वृ]
- @deva[आधक्] (@[ṛg] VI.61.14) from @deva[दह्]
- @deva[आप्रा] @deva[द्यावापृथिवी] (@[ṛg] I.115.1) from @deva[प्रा]
- @deva[वर्क] (@[ṛg] VIII.75.12) from @deva[वृच्]
- @deva[अक्रम्] (Yajur. III.47) from @deva[कृ]
- @deva[अग्मन्] (@[ṛg] VI.1.1) from @deva[गम्]
- @deva[अज्ञत] from @deva[जन्] (@[brāhmaṇa])
"""

advanced = """
In the @deva[मन्त्र] portion of the Vedas, aorist and perfect (@deva[लि]) affixes undergo @deva[लुक्] elision after: @deva[घस्] 'to eat,' @deva[ह्वृ] 'to be crooked,' @deva[नश्] 'to destroy,' @deva[वृ] 'to choose/cover,' @deva[दह्] 'to burn,' roots ending in long @deva[आ], @deva[वृच्] 'to avoid,' @deva[कृ] 'to make,' @deva[गम्] 'to go,' and @deva[जन्] 'to be born.' The term @deva[लि] denotes both perfect and aorist affixes in the ancient grammatical tradition, or possibly all tense-affixes.

Vedic attestations: From @deva[घस्]: @deva[अक्षन् पितरोऽमी मदन्त] (Yajurveda XIX.36; also Rgveda I.82.2). From @deva[ह्वृ]: @deva[मा हूर्मित्रस्य त्वम्]. From @deva[नश्]: @deva[प्रणङ् मर्त्यस्य] (Rgveda I.18.3). @deva[वृ] includes both @deva[वृङ्] and @deva[वृञ्]: @deva[वेन आवः] (Yajurveda 13.3). From @deva[दह्]: @deva[आधक्] (Rgveda VI.61.14). @deva[आत्]-ending roots such as @deva[प्रा] 'to fill': @deva[आप्रा द्यावापृथिवी अन्तरिक्षम्] (Rgveda I.115.1). From @deva[वृच्]: @deva[वर्क] (Rgveda VIII.75.12). From @deva[कृ]: @deva[अक्रम्] (Yajurveda III.47). From @deva[गम्]: @deva[अग्मन्] (Rgveda VI.1.1). From @deva[जन्]: @deva[अज्ञत वा अस्य दन्ताः]—this is from @deva[ब्राह्मण] literature, since @deva[मन्त्र] in this @[sūtra] extends to @deva[ब्राह्मण] as well.
"""

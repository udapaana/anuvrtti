id = "2.4.40"
numericId = "24040"

[en]
simple = """
Before @deva[लिट्] (the perfect tense), @deva[अद्] 'to eat' is optionally replaced by @deva[घस्ॡ].

**Examples:**
- @deva[जक्षतुः] or @deva[आदतुः] 'they two ate'
- @deva[जक्षुः] or @deva[आदुः] 'they all ate'

The form @deva[जक्षतुः] comes from @deva[घस्] + @deva[अतुस्] through reduplication and sound changes.
"""

standard = """
Before @deva[लिट्] (perfect tense), @deva[घस्ॡ] is optionally substituted for @deva[अद्].

**Examples:**
- @deva[जक्षतुः] or @deva[आदतुः] 'they two ate'
- @deva[जक्षुः] or @deva[आदुः] 'they all ate'

**Derivation of @deva[जक्षतुः]:**
@deva[घस्] + @deva[अतुस्] → @deva[घस्] + @deva[अस्] + @deva[अतुस्] (@ref[6.1.8]) → @deva[घघस्] + @deva[अतुस्] (@ref[7.4.60]) → @deva[चघस्] + @deva[अतुस्] (@ref[7.4.62]) → @deva[जघस्] + @deva[अतुस्] (@ref[8.4.53]) → @deva[जघ्स्] + @deva[अतुस्] (@ref[6.4.98]) → @deva[जक्षतुः] (@ref[8.3.60])
"""

advanced = """
When @deva[लिट्] (Perfect Tense) follows @deva[घसॢ] is optionally the substitute of @deva[अद्]@deva[।] @deva[अघास] or @deva[आद] 'he ate,' @deva[जक्षतुः] @deva[आदतुः] 'they two ate,' @deva[जक्षुः] or @deva[आदुः] 'they all ate' The word @deva[जक्षतुः] is thus formed :- @deva[घस्] + @deva[अतुस्] = @deva[घस्] + @deva[अस्] + @deva[अतुस्] @ref[6.1.8] = @deva[घ] + @deva[घस्] +@deva[अतुस्] @ref[7.4.60] = @deva[च] + @deva[घस्] + @deva[अतुः] @ref[7.4.62] = @deva[ज] + @deva[घस्] + @deva[अतुस्] @ref[8.4.53] = @deva[ज] + @deva[घ्स्] + @deva[अतुस्] @ref[6.4.98] = @deva[जक्षतुः] @ref[8.3.60].
"""

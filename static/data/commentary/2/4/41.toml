id = "2.4.41"
numericId = "24041"

[en]
simple = """
Before @deva[लिट्] (perfect tense), the root @deva[वेञ्] 'to weave' is optionally replaced by @deva[वयि].

**With @deva[वेञ्] (no substitution):**
- @deva[ववौ] 'he wove'

**With @deva[वयि] (substitution):**
- @deva[उवाय] 'he wove'
- @deva[ऊयतुः] or @deva[ऊवतुः] 'they two wove'
- @deva[ऊयुः] or @deva[ऊवुः] 'they all wove'
"""

standard = """
Before @deva[लिट्] (perfect), @deva[वयि] is optionally substituted for @deva[वेञ्] 'to weave'. The @deva[इ] is for articulation only.

**Without substitution (@deva[वेञ्]):**
- @deva[ववौ], @deva[ववतुः], @deva[ववुः] 'he/they wove'
- Roots in @deva[ए], @deva[ऐ], @deva[ओ] are treated like @deva[आ]-final roots
- @deva[सम्प्रसारण] by @ref[6.1.17] is blocked by @ref[6.1.40]

**With substitution (@deva[वय्]):**
- @deva[उवाय] 'he wove' (the @deva[य] is not changed to @deva[इ] by @ref[6.1.38])
- @deva[ऊयतुः] or @deva[ऊवतुः] 'they two wove' (by @ref[6.1.39], @deva[व] optionally replaces @deva[य] before @deva[कित्] affixes)
"""

advanced = """
@deva[वयि] is optionally substituted for @deva[वेञ्] 'to weave' when @deva[लिट्] (perfect) follows. Two sets of forms result.

**Without substitution (@deva[वेञ्]):** Roots in @deva[ए], @deva[ऐ], @deva[ओ] are treated like @deva[आ]-final roots. @deva[वे] + @deva[णल्] = @deva[ववौ]. Full paradigm: 3rd person @deva[ववौ], @deva[ववतुः], @deva[ववुः]; 2nd person @deva[वविथ] / @deva[ववाथ], @deva[ववथुः], @deva[वव]; 1st person @deva[ववौ], @deva[वविव], @deva[वविम]. Here @deva[सम्प्रसारण] ordained by @ref[6.1.17] is blocked by @ref[6.1.40].

**With substitution (@deva[वय्]):** The @deva[इ] is for articulation only. @deva[वय्] + @deva[णल्] = @deva[वय्] + @deva[वय्] + @deva[अ] (@ref[6.1.8]) = @deva[उय्] + @deva[वय्] + @deva[अ] (@ref[6.1.17]) = @deva[उवाय]—the @deva[य] is not changed to @deva[इ] by @ref[6.1.38].

In the dual: @deva[वय्] + @deva[अतुस्] = @deva[उय्] + @deva[अतुः] (@ref[6.1.15]) = @deva[उ] + @deva[उय्] + @deva[अतुः] (@ref[7.4.60]) = @deva[ऊयतुः]. The affix @deva[अतुस्] is @deva[कित्] by @ref[1.2.5], so @deva[सम्प्रसारण] occurs before reduplication: @deva[उवाय], @deva[ऊयतुः], @deva[ऊयुः]. By @ref[6.1.39], @deva[व] may optionally replace @deva[य] before @deva[कित्] affixes: @deva[ऊयतुः] / @deva[ऊवतुः], @deva[ऊयुः] / @deva[ऊवुः].
"""

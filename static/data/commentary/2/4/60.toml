id = "2.4.60"
numericId = "24060"

[en]
simple = """
After a word ending in the @deva[गोत्र] affix @deva[इञ्] (@ref[4.1.95]), the @deva[युवन्] affix is elided when the word denotes the @deva[गोत्र] of @deva[प्राच्य] (Eastern) people.

**Example:**
- @deva[पान्नागर] + @deva[इञ्] = @deva[पान्नागरिः] 'gotra descendant of @[pannāgara]'
- The @deva[युवन्] affix @deva[फक्] (@ref[4.1.101]) is elided
- So @deva[पान्नागरिः] means both father and son

When the @deva[गोत्र] is not of @deva[प्राच्य] people, no elision: @deva[दाक्षिः] (gotra) vs. @deva[दाक्षायणः] (yuvan).
"""

standard = """
After a @deva[गोत्र] word ending in @deva[इञ्] (@ref[4.1.95]), there is @deva[लुक्] elision of the @deva[युवन्] affix when denoting the @deva[गोत्र] of @deva[प्राच्य] (Eastern) people.

**Examples:**
- @deva[पान्नागरिः] = both father and son (affix @deva[फक्] elided)
- @deva[मान्यरैषणिः] = both father and son

**No elision when not @deva[प्राच्य] @deva[गोत्र]:**
- @deva[दाक्षिः] (@deva[गोत्र])
- @deva[दाक्षायणः] (@deva[युवन्], affix retained)

The word @deva[प्राचाम्] qualifies @deva[गोत्र], not the grammarians—this is not an optional rule of Eastern grammarians.
"""

advanced = """
After a word ending in the @deva[गोत्र] affix @deva[इञ्] (@ref[4.1.95]), the @deva[युवन्] affix undergoes @deva[लुक्] elision when the @deva[गोत्र] of @deva[प्राच्य] (Eastern) people is denoted. @deva[पान्नागर] + @deva[इञ्] = @deva[पान्नागरिः] 'the @deva[गोत्र] descendant of @deva[पान्नागर]'; the @deva[युवन्] affix @deva[फक्] (@ref[4.1.101]) is then elided, so @deva[पान्नागरिः] denotes both father and son. Similarly @deva[मान्यरैषणिः] applies to both.

The word @deva[प्राचाम्] qualifies @deva[गोत्र] (understood), not the grammarians—this is not an optional rule in the opinion of Eastern grammarians.

When the @deva[गोत्र] denoted is not that of @deva[प्राच्य] people, no elision occurs: @deva[दाक्षिः] (@deva[गोत्र]) vs. @deva[दाक्षायणः] (@deva[युवन्], affix retained).
"""

id = "2.4.39"
numericId = "24039"

[en]
simple = """
In Vedic usage, @deva[घस्ॡ] replaces @deva[अद्] 'to eat' in various contexts—but not always.

**Examples where replacement occurs:**
- @deva[घस्तान्नूनम्]
- @deva[सग्धिश्चने] (Yajurveda XVIII.9)

**Example where it does not:**
- @deva[आदामद्य मध्यतो भेद उद्भृतम्]
"""

standard = """
In @deva[छन्दस्] (Vedic literature), @deva[घस्ॡ] is @deva[बहुलम्] (diversely/optionally) substituted for @deva[अद्].

**Examples with substitution:**
- @deva[घस्तान्नूनम्]
- @deva[सग्धिश्चने] (Yajurveda @[vājasaneyi] @[saṃhitā] XVIII.9)

**Example without substitution:**
- @deva[आदामद्य मध्यतो भेद उद्भृतम्]

The term @deva[बहुलम्] indicates four possibilities: (1) application where no rule requires it, (2) non-application despite a rule, (3) optional application, (4) some other result entirely.
"""

advanced = """
In @deva[छन्दस्] (Vedic literature), @deva[घस्ॡ] is @deva[बहुलम्] (diversely) substituted for @deva[अद्]: @deva[घस्तान्नूनम्]; @deva[सग्धिश्चने] (Yajurveda XVIII.9). Sometimes the substitution does not occur: @deva[आतामद्य मध्यतो भेद उद्भृतम्].

This @[sūtra] uses @deva[बहुलम्] while the next uses @deva[अन्यतरस्याम्]. The distinction is deliberate—had they been synonymous, @deva[अनुवृत्ति] of @deva[बहुलम्] into the next @[sūtra] would have sufficed. The difference is captured in the verse: @deva[क्वचित् प्रवृत्तिः क्वचिदप्रवृत्तिः, क्वचिदविभाषा क्वचिदन्यदेव । विधेर्विधानं बहुधा समीक्ष्य, चातुर्विधं बाहुलकं वदन्ति ॥] — fourfold @deva[बाहुलक] permits: (1) application without an express rule, (2) non-application despite an express rule, (3) optional application, (4) some other result entirely.

In @deva[घस्ताम्], for instance, there is no elision of the penultimate.
"""

id = "2.4.82"
numericId = "24082"

[en]
simple = """
The feminine affix @deva[आप्] and case-affixes (@deva[सुप्]) are elided by @deva[लुक्] after an @deva[अव्यय] (indeclinable).

**Examples:**
- @deva[तत्र] @deva[शालायाम्] 'in that hall'—@deva[तत्र] 'there' doesn't take feminine marking though equivalent to @deva[तस्याम्]
- @deva[कृत्वा] 'having done'—case-affix elided
- @deva[हित्वा] 'having abandoned'—case-affix elided
"""

standard = """
The feminine termination @deva[आप्] and case-affixes @deva[सुप्] undergo @deva[लुक्] elision after @deva[अव्यय] (indeclinables).

**Feminine @deva[आप्] elided:**
- @deva[तत्र] @deva[शालायाम्] 'in that hall'
- @deva[तत्र] is equivalent to @deva[तस्याम्] 'in that (fem.)' but doesn't take @deva[आप्]

**Case-affixes @deva[सुप्] elided:**
- @deva[कृत्वा] 'having done' (absolutive)
- @deva[हित्वा] 'having abandoned'

Indeclinables by definition don't inflect, so their case-endings are elided.
"""

advanced = """
The feminine termination @deva[आप्] and case-affixes @deva[सुप्] undergo @deva[लुक्] elision after an @deva[अव्यय] (indeclinable).

@deva[तत्र शालायाम्] 'in that hall': the indeclinable @deva[तत्र] 'there' does not take the feminine termination, although it is equivalent to @deva[तस्याम्] 'in that (fem.).'

@deva[कृत्वा] 'having done,' @deva[हित्वा] 'having abandoned': here the case-affixes are elided. Indeclinables by definition do not inflect, so both @deva[आप्] and @deva[सुप्] are eliminated.
"""

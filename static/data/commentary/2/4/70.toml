id = "2.4.70"
numericId = "24070"

[en]
simple = """
The @deva[गोत्र] affixes @deva[अण्] and @deva[यञ्] of the words @deva[अगस्त्य] and @deva[कौण्डिन्य] are elided in the plural, and the bases change to @deva[अगस्ति] and @deva[कुण्डिन].

**Examples:**
- @deva[आगस्त्यः] (singular) → @deva[अगस्तयः] (plural, not *@deva[आगस्त्याः])
- @deva[कौण्डिन्यः] (singular) → @deva[कुण्डिनाः] (plural, not *@deva[कौण्डिन्याः])

The base itself changes when the affix is elided.
"""

standard = """
The @deva[गोत्र] affixes @deva[अण्] (@ref[4.1.114]) and @deva[यञ्] (@ref[4.1.105]) are elided in the plural for @deva[अगस्त्य] and @deva[कौण्डिन्य], with substitute bases @deva[अगस्ति] and @deva[कुण्डिन].

**Derivation:**
- @deva[अगस्त्य] + @deva[अण्] = @deva[आगस्त्यः] 'descendant of Agastya'
  - Plural: @deva[अगस्तयः] (affix elided, base → @deva[अगस्ति])
- @deva[कौण्डिन्य] + @deva[यञ्] = @deva[कौण्डिन्यः]
  - Plural: @deva[कुण्डिनाः] (affix elided, base → @deva[कुण्डिन])

The @deva[च्] in @deva[कुण्डिनच्] is indicatory (@deva[इत्]), regulating accent by @ref[4.1.163]—middle @deva[उदात्त] is preserved in the substitute.

**No elision:** @deva[आगस्तीयाः] @deva[छात्राः] 'Agastya's pupils' (affix retained, @ref[4.2.111]).
"""

advanced = """
There is @deva[लुक्] elision of the @deva[गोत्र] affixes @deva[अण्] and @deva[यञ्] of the words @deva[अगस्त्य] , and @deva[कौणडिन्य] , when they take the plural and the words @deva[अगस्ति] and @deva[कण्डिनच्] are the substitutes of the bases so remaining after the elision. The plural of @deva[आगस्त्य] is @deva[अगस्तयः] (as if it was the plural of @deva[अगस्ति]) and of @deva[कौण्डिन्यः] is @deva[कुण्डिनाः]. The affix @deva[अण्] @ref[4.1.114] after @deva[आगस्त्य] and the affix @deva[यञ्] @ref[4.1.105] after @deva[कौण्डिन्य] are elided. The @deva[च] in @deva[कुण्डिनच्] is indicatory and regulates the accent @ref[4.1.163]; the word @deva[कुण्डिन] has @[udatta] on the middle vowel; and its substitute will also have the same accent. There is no elision however in @deva[आगस्तीयाश्छात्रा] @ref[4.1.89] @deva[कौण्डिनाश्छात्राः] (IV. 2. III).
"""

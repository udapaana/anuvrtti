id = "2.4.85"
numericId = "24085"

[en]
simple = """
The three @deva[प्रथमपुरुष] (3rd person) affixes of @deva[लुट्] (first future tense) are replaced by @deva[डा], @deva[रौ], and @deva[रस्] respectively. This applies to both @deva[परस्मैपद] and @deva[आत्मनेपद].

**@deva[परस्मैपद] examples:**
- @deva[कर्ता] 'he will do' (singular)
- @deva[कर्तारौ] 'they two will do' (dual)
- @deva[कर्तारः] 'they will do' (plural)

**@deva[आत्मनेपद] examples:**
- @deva[अध्येता] 'he will study'
- @deva[अध्येतारौ] 'they two will study'
- @deva[अध्येतारः] 'they will study'
"""

standard = """
The @deva[लुट्] (first future/periphrastic future) @deva[प्रथमपुरुष] affixes @deva[तिप्]/@deva[त] (sg.), @deva[तस्]/@deva[आताम्] (du.), @deva[झि]/@deva[झ] (pl.) are replaced by @deva[डा], @deva[रौ], and @deva[रस्] respectively.

**@deva[परस्मैपद]:**
- @deva[कृ] → @deva[कर्ता] 'he will do', @deva[कर्तारौ], @deva[कर्तारः]

**@deva[आत्मनेपद]:**
- @deva[अधि] + @deva[इ] → @deva[अध्येता], @deva[अध्येतारौ], @deva[अध्येतारः]

**Why 'in 3rd person'?** The 2nd and 1st person forms retain their regular affixes: @deva[श्वः कर्तासि] 'you will do tomorrow', @deva[श्वोऽध्येतासे] 'you will study tomorrow'.

@note[type=technical]{The @deva[ड्] in @deva[डा] is @deva[इत्] (indicatory), leaving just @deva[आ]. Thus @deva[लुट्] 3rd person forms end in @deva[ता], @deva[तारौ], @deva[तारः].}
"""

advanced = """
@deva[डा], @deva[रौ], and @deva[रस्] replace the three @deva[प्रथमपुरुष] (3rd person) affixes of @deva[लुट्] (first future) respectively, in both @deva[परस्मैपद] and @deva[आत्मनेपद].

@deva[परस्मैपद]: @deva[कर्ता] 'he will do,' @deva[कर्तारौ] 'they two will do,' @deva[कर्तारः] 'they will do.'

@deva[आत्मनेपद]: @deva[अध्येता] 'he will study,' @deva[अध्येतारौ], @deva[अध्येतारः].

The restriction to 3rd person is significant—2nd and 1st person forms retain their regular affixes: @deva[श्वः कर्तासि] 'you will do tomorrow'; @deva[श्वोऽध्येतासे] 'you will study tomorrow.'
"""

id = "2.4.19"
numericId = "24019"

[en]
simple = """
A @deva[तत्पुरुष] (except @deva[नञ्]-compound or @deva[कर्मधारय]) becomes @deva[नपुंसकलिङ्ग] in cases specified in following @[sūtras].

**Example:** @deva[ब्राह्मणसेनम्] (optional per @ref[2.4.25])

**Exceptions:** @deva[असेना] (@deva[नञ्]), @deva[परमसेना] (@deva[कर्मधारय])
"""

standard = """
A @deva[तत्पुरुष] (excluding @deva[नञ्]-compounds and @deva[कर्मधारय]) becomes @deva[नपुंसकलिङ्ग] in cases specified in following @[sūtras]. This is an @deva[अधिकार] (governing @[sūtra]).

**Example:** @deva[ब्राह्मणसेनम्]/‍@deva[ब्राह्मणसेना] (@ref[2.4.25]—optional)

**Exceptions:**
- @deva[असेना] (@deva[नञ्]-compound)
- @deva[परमसेना] (@deva[कर्मधारय])
- @deva[दृढसेनो राजा] (not @deva[तत्पुरुष])
"""

advanced = """
@deva[तत्पुरुष] (excluding @deva[नञ्]/@deva[कर्मधारय]) = @deva[नपुंसकलिङ्ग] in following @[sūtras]. @deva[अधिकार].

**Example:** @deva[ब्राह्मणसेनम्]/‍@deva[°ना] (@ref[2.4.25]).

Excluded: @deva[असेना] (@deva[नञ्]), @deva[परमसेना] (@deva[कर्मधारय]), @deva[दृढसेनो राजा] (not @deva[तत्पुरुष]).
"""

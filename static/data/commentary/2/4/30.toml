id = "2.4.30"
numericId = "24030"

[en]
simple = """
The compound @deva[अपथम्] 'wrong path' is neuter.

**Examples:**
- @deva[अपथमिदम्] 'this is a wrong path'
- @deva[अपथानि गाहते मूढः] 'the fool treads wrong paths'

**Exception:** As @deva[बहुव्रीहि], gender follows the qualified noun: @deva[अपथो देशः] 'a pathless region' (masculine).
"""

standard = """
The @deva[तत्पुरुष] compound @deva[अपथम्] 'wrong/bad path' is @deva[नपुंसकलिङ्ग].

**Examples:**
- @deva[अपथमिदम्] 'this is a bad road'
- @deva[अपथानि गाहते मूढः] 'the fool roams on wrong paths'

**Exception:** As @deva[बहुव्रीहि], gender follows the qualified noun: @deva[अपथो देशः] (masculine), @deva[अपथा नगरी] (feminine).
"""

advanced = """
The @deva[तत्-पुरुष] word @deva[अपथम्] 'a bad road', is neuter. @deva[अपथमिदम्] 'this (neuter) is a bad road' @deva[अपथानि] @deva[गाहते] @deva[मूढः] 'the fool roams on wrong roads.' But @deva[अपथोदेशः] a (masc.) 'a roadless country.' Here the compound being @[bahuvrihi] the word is masculine so; also @deva[अपथा] @deva[नगरी] @deva[॥]
"""

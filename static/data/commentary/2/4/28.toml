[en]
simple = """
In @deva[छन्दस्] (Vedas), @deva[हेमन्तशिशिरौ] and @deva[अहोरात्रे] take gender of the first member.

**Vedic:** @deva[हेमन्तशिशिरावृतूनाम्], @deva[अहोरात्राणीष्टकाः]

**Classical:** @deva[हेमन्तशिशिरे] (neuter dual)
"""

standard = """
In @deva[छन्दस्], @deva[हेमन्तशिशिरौ] and @deva[अहोरात्रे] take gender of the first member.

**Vedic examples:**
- @deva[हेमन्तशिशिरावृतूनां प्रीणामि] (masc.—from @deva[हेमन्त])
- @deva[अहोरात्राणीष्टकाः] 'days and nights are bricks'

Applies in all cases/numbers, not just dual.

**Classical:** @deva[दुःखे हेमन्तशिशिरे], @deva[अहोरात्राविमौ पुण्यौ] (follows @ref[2.4.26]).

Debars @ref[2.4.26] in Vedas.
"""

advanced = """
In @deva[छन्दस्], @deva[हेमन्तशिशिरौ]/@deva[अहोरात्रे] = gender of first member. Debars @ref[2.4.26].

**Vedic:** @deva[हेमन्तशिशिरावृतूनां प्रीणामि], @deva[अहोरात्राणीष्टकाः], @deva[पूर्वपक्षाश्चितयः], @deva[अपरपक्षाः पुरीषम्].

**Classical:** @deva[दुःखे हेमन्तशिशिरे], @deva[अहोरात्राविमौ पुण्यौ].
"""

id = "2.4.6"
numericId = "24006"

[en]
simple = """
A @deva[द्वन्द्व] of genus-names (@deva[जाति]) of non-living substances takes @deva[एकवचन].

**Examples:**
- @deva[आराशस्त्रि] 'probe and knife'
- @deva[धानाशष्कुलि] 'fried rice and barley cake'

**Counter-examples:**
- @deva[ब्राह्मणक्षत्रियौ] (living beings, dual)
- @deva[नन्दकपाञ्चजन्यौ] (proper names, not genus)
"""

standard = """
A @deva[द्वन्द्व] of @deva[जाति] (genus) names of non-living substances (@deva[द्रव्यजाति]) takes @deva[एकवचन].

**Examples:**
- @deva[आराशस्त्रि] 'probe and knife'
- @deva[धानाशष्कुलि] 'fried rice and barley cake'

**Counter-examples:**
- @deva[ब्राह्मणक्षत्रियौ] (living beings)
- @deva[नन्दकपाञ्चजन्यौ] (proper names, not @deva[जाति])
- @deva[रूपरसगन्धस्पर्शाः] (@deva[गुणजाति]—quality names)
- @deva[गमनाकुञ्चनप्रसारणानि] (@deva[क्रियाजाति]—action names)

When speaking of individual items: @deva[इह कुण्डे बदरामलकानि तिष्ठन्ति] (plural).
"""

advanced = """
@deva[द्वन्द्व] of @deva[द्रव्यजाति] (genus of substances), not living beings, takes @deva[एकवचन].

**Examples:** @deva[आराशस्त्रि], @deva[धानाशष्कुलि].

Living: @deva[ब्राह्मणक्षत्रियौ]. Proper names: @deva[नन्दकपाञ्चजन्यौ]. @deva[गुणजाति]: @deva[रूपरसगन्धस्पर्शाः]. @deva[क्रियाजाति]: @deva[गमनाकुञ्चनप्रसारणानि]. Individuals: @deva[इह कुण्डे बदरामलकानि तिष्ठन्ति].
"""

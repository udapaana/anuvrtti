id = "2.4.73"
numericId = "24073"

[en]
simple = """
In the @deva[छन्दस्] (Vedas), the @deva[विकरण] @deva[शप्] is variously elided or retained—even against the normal rules.

**Elision where not expected:**
- @deva[त्राध्वम्] @deva[नो] @deva[देवाः] (instead of @deva[त्रायध्वम्]) 'protect us, O gods!'

**Retention where elision expected (@deva[अदादि]):**
- @deva[वृत्रं] @deva[हनति] (instead of @deva[हन्ति]) 'he kills @[vṛtra]'
- @deva[अहिः] @deva[शयते] (instead of @deva[शेते]) 'the serpent lies'
"""

standard = """
In @deva[छन्दस्] (Vedic literature), @deva[शप्] elision occurs @deva[बहुलम्] 'variously'—sometimes where not normally expected, sometimes not where expected.

**@deva[शप्] retained in @deva[अदादि] verbs:**
- @deva[वृत्रं] @deva[हनति] (@[ṛg] I.32.5) instead of @deva[हन्ति]
- @deva[अहिः] @deva[शयते] instead of @deva[शेते]

**@deva[शप्] elided in non-@deva[अदादि] verbs:**
- @deva[त्राध्वम्] @deva[नो] @deva[देवाः] (@[ṛg] II.29.6) instead of @deva[त्रायध्वम्]

@deva[बहुलम्] indicates Vedic irregularity—the standard rules don't apply uniformly.
"""

advanced = """
In the @deva[छन्दस्] (Vedas) there is diversely the @deva[लुक्] elision of the @deva[विकरण] @deva[शप्] -- @deva[कर्तरि] @deva[शप्] @ref[3.1.68]. There is elision in other conjugations than @[adadi]; and there is sometimes even no elision in @[adadi] verbs. As @deva[वृत्रं] @deva[हनति] 'he kills @[vritra].' @deva[हन्] + @deva[शप्] + @deva[ति] = @deva[हनति] instead of @deva[हन्ति] @deva[।] So also, @deva[अहिः] @deva[शयते] instead of @deva[शेते]. (@[rig].V. I.32.5). In these cases the @[vikarana] @deva[शप्] has not been elided. In some cases the @deva[शप्] is elided as @deva[त्राध्वम्] @deva[नो] @deva[देवाः] instead of @deva[त्रायध्वम्] @deva[॥]
"""

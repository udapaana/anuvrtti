id = "2.4.55"
numericId = "24055"

[en]
simple = """
The substitution of @deva[ख्याञ्] for @deva[चक्षिङ्] (taught in @ref[2.4.54]) is optional when the perfect (@deva[लिट्]) follows.

**With substitution:**
- @deva[आचख्यौ], @deva[आचख्यतुः], @deva[आचख्युः] 'he told, they two told, they told'

**Without substitution:**
- @deva[आचचक्षे], @deva[आचचक्षाते], @deva[आचचक्षिरे] 'he told, they two told, they told'
"""

standard = """
The previous @[sūtra] (@ref[2.4.54]) makes @deva[ख्याञ्] replace @deva[चक्षिङ्] before all @deva[आर्धधातुक] affixes. This @[sūtra] makes it optional specifically before @deva[लिट्] (perfect).

**With @deva[ख्या]:**
- @deva[आचख्यौ], @deva[आचख्यतुः], @deva[आचख्युः] (@deva[परस्मैपद])

**Without substitution (using @deva[चक्ष्]):**
- @deva[आचचक्षे], @deva[आचचक्षाते], @deva[आचचक्षिरे] (@deva[आत्मनेपद])

Since @deva[लिट्] is also @deva[आर्धधातुक], the previous rule would require substitution. This @[sūtra] provides the option to retain @deva[चक्ष्].
"""

advanced = """
@deva[ख्याञ्] is optionally substituted for @deva[चक्षिङ्] when @deva[लिट्] (perfect) follows. Since @deva[लिट्] is also an @deva[आर्धधातुक] affix, @ref[2.4.54] would make @deva[ख्या] the mandatory substitute. This @[sūtra] introduces an option.

With substitution: @deva[आचख्यौ], @deva[आचख्यतुः], @deva[आचख्युः].

Without substitution: @deva[आचचक्षे], @deva[आचचक्षाते], @deva[आचचक्षिरे] 'he told,' etc.
"""

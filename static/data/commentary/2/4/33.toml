id = "2.4.33"
numericId = "24033"

[en]
simple = """
When @deva[एतद्] 'this' is used anaphorically (referring back to something already mentioned), it becomes @deva[अश्] before the affixes @deva[त्र] 'here/there' and @deva[तस्] 'from here/hence'. Both the substitute and the affixes are @deva[अनुदात्त] (unaccented).

**Examples:**
- @deva[एतस्मिन् ग्रामे सुखं वसामः, अथो अत्र युक्ता अधीमहे] 'We live happily in this village, so let us study diligently here.'
- @deva[एतस्माच्छात्राच्छन्दोऽधीष्व, अथो अतो व्याकरणमप्यधीष्व] 'Learn prosody from this student, and learn grammar from him too.'
"""

standard = """
When @deva[एतद्] is re-employed in @deva[अन्वादेश], it is replaced by @deva[अश्] (which is @deva[अनुदात्त]) before the affixes @deva[त्र] (@ref[5.3.10]) and @deva[तस्] (@ref[5.3.7]). These affixes also become @deva[अनुदात्त].

**Examples:**
- @deva[एतस्मिन् ग्रामे सुखं वसामः, अथो अत्र युक्ता अधीमहे] 'We live in this village; let us study here.'
- @deva[एतस्माच्छात्राच्छन्दोऽधीष्व, अथो अतो व्याकरणमप्यधीष्व] 'Learn prosody from this student, and grammar from him too.'

The repetition of @deva[अश्] (already taught in @ref[5.3.5]) indicates this @deva[अश्] of @deva[अन्वादेश] is specifically @deva[अनुदात्त].
"""

advanced = """
When @deva[एतद्] is re-employed (@deva[अन्वादेश]), the @deva[अनुदात्त] substitute @deva[अश्] replaces it before the affixes @deva[त्र] (@deva[सप्तम्यास्त्रल्], @ref[5.3.10]) and @deva[तस्] (@deva[पञ्चम्यास्तसिल्], @ref[5.3.7]). The affixes @deva[त्र] and @deva[तस्] themselves also become @deva[अनुदात्त].

@deva[अत्र] 'here' and @deva[अतस्] 'hence' appear in: @deva[एतस्मिन् ग्रामे सुखं वसामः] ; @deva[अथो अत्र युक्ता अधीमहे] 'We live in this village happily; let us study with full devotion here.' And: @deva[एतस्माच्छात्राच्छन्दोऽधीष्व], @deva[अथो अतो व्याकरणमप्यधीष्व] 'Learn Prosody from this student, and learn Grammar from him too.'

By @ref[5.3.5], @deva[अश्] is already declared as the substitute of @deva[एतद्]; its repetition in this @[sūtra] indicates that the @deva[अश्] of @deva[अन्वादेश] is specifically @deva[अनुदात्त].
"""

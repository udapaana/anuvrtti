id = "2.4.10"
numericId = "24010"

[en]
simple = """
A @deva[द्वन्द्व] of non-expelled @deva[शूद्र] classes (@deva[अनिर्वासित]) takes @deva[एकवचन].

**Examples:**
- @deva[तक्षायस्करम्] 'carpenter and blacksmith'
- @deva[रजकतन्तुवायम्] 'washerman and weaver'

**Counter-example:** @deva[चण्डालमृतपाः] (expelled classes, plural)
"""

standard = """
A @deva[द्वन्द्व] of @deva[अनिर्वासित शूद्र] (non-expelled @[śūdra] classes) takes @deva[एकवचन].

**Examples:**
- @deva[तक्षायस्करम्] 'carpenter and blacksmith'
- @deva[रजकतन्तुवायम्] 'washerman and weaver'

@deva[अनिर्वासित] = those who can share food vessels with higher classes without permanent defilement.

**Counter-example:** @deva[चण्डालमृतपाः] (expelled classes).
"""

advanced = """
@deva[द्वन्द्व] of @deva[अनिर्वासित शूद्र] takes @deva[एकवचन].

**Examples:** @deva[तक्षायस्करम्], @deva[रजकतन्तुवायम्].

@deva[अनिर्वासित] = can share food vessels without permanent defilement. Expelled: @deva[चण्डालमृतपाः].
"""

[en]
simple = """
The @deva[गवाश्वादि] (@deva[गवाश्व]-class) compounds take @deva[एकवचन].

**Examples:** @deva[गवाश्वम्] 'cow and horse', @deva[गवाविकम्], @deva[अजाविकम्], @deva[मूत्रपुरीषम्], @deva[दासीदासम्].

@note[type=@[vārtika]] Variant forms allow option: @deva[गोश्वम्] or @deva[गोश्वौ].
"""


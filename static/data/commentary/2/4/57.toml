id = "2.4.57"
numericId = "24057"

[en]
simple = """
The substitution of @deva[वी] for @deva[अज्] (taught in @ref[2.4.56]) is optional when the affix @deva[ल्युट्] follows. The word @deva[यु] in the @[sūtra] refers to @deva[ल्युट्].

**With substitution:**
- @deva[प्रवयणः] @deva[दण्डः] 'driving stick'

**Without substitution:**
- @deva[प्राजनः] @deva[दण्डः] 'driving stick'
"""

standard = """
The previous @[sūtra] (@ref[2.4.56]) makes @deva[वी] replace @deva[अज्] before @deva[आर्धधातुक] affixes. This @[sūtra] makes substitution optional before @deva[ल्युट्] (the @deva[यु] in the @[sūtra]).

**With @deva[वी]:**
- @deva[प्रवयणः] @deva[दण्डः] 'driving stick or whip'
- @deva[प्रवयणम्] @deva[आनय] 'bring the driving stick'

**Without @deva[वी]:**
- @deva[प्राजनः] @deva[दण्डः] 'driving stick'
- @deva[प्राजनम्] @deva[आनय] 'bring the driving stick'
"""

advanced = """
@deva[वी] is optionally the substitute of @deva[अज्] when the affix -- @deva[अनद्यतने] @deva[लुट्] @ref[3.3.15] etc. follows. This declares an option in case of the affix @deva[ल्युट्], the word @deva[यु] in the @[sutra] referring to this affix; as, @deva[प्रवयणः] or @deva[प्राजनो] @deva[दण्डः] 'driving stick or whip.'
"""

id = "2.4.79"
numericId = "24079"

[en]
simple = """
The aorist affix @deva[सिच्] is optionally elided after @deva[तन्] 'expand' and similar roots, when the @deva[आत्मनेपद] 2nd person affixes @deva[त] and @deva[थास्] follow.

**With elision / Without elision:**
- @deva[अतत] or @deva[अतनिष्ट] 'you expanded'
- @deva[अतथाः] or @deva[अतनिष्ठाः] 'you expanded'
- @deva[असात] or @deva[असनिष्ट] 'you gave'
- @deva[असाथाः] or @deva[असनिष्ठाः] 'you gave'
"""

standard = """
The aorist affix @deva[सिच्] is OPTIONALLY elided after @deva[तन्] 'expand' and similar roots when @deva[आत्मनेपद] 2nd person affixes @deva[त] and @deva[थास्] follow.

**Examples:**
| With elision | Without elision | Meaning |
|--------------|-----------------|----------|
| @deva[अतत] (@ref[6.4.37]) | @deva[अतनिष्ट] | 'you expanded' |
| @deva[अतथाः] | @deva[अतनिष्ठाः] | 'you expanded' |
| @deva[असात] | @deva[असनिष्ट] | 'you gave' |
| @deva[असाथाः] | @deva[असनिष्ठाः] | 'you gave' |

**Condition:** @deva[तन्] and @deva[सन्] must be @deva[आत्मनेपदी]. In @deva[परस्मैपद], @deva[सिच्] is not elided: @deva[अतनिष्ट] @deva[यूयम्] 'you expanded'.
"""

advanced = """
After @deva[तन्] 'to expand' and similar roots, @deva[सिच्] is optionally elided when the @deva[आत्मनेपद] 2nd person affixes @deva[त] and @deva[थास्] follow: @deva[अतत] (@ref[6.4.37]) / @deva[अतनिष्ट] 'you expanded'; @deva[अतथाः] / @deva[अतनिष्ठाः]. Similarly @deva[असात] / @deva[असनिष्ट] 'you gave'; @deva[असाथाः] / @deva[असनिष्ठाः].

The roots @deva[तन्] and @deva[सन्] must be @deva[आत्मनेपदी] for this option. In @deva[परस्मैपद], @deva[सिच्] is not elided: @deva[अतनिष्ट यूयम्] 'you expanded.'
"""

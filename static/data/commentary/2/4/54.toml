id = "2.4.54"
numericId = "24054"

[en]
simple = """
The root @deva[चक्षिङ्] 'to perceive, to tell' is replaced by @deva[ख्याञ्] when an @deva[आर्धधातुक] affix follows.

**Examples:**
- @deva[आख्याता] 'he will tell'
- @deva[आख्यातुम्] 'to tell'
- @deva[आख्यातव्यम्] 'must be told'
"""

standard = """
The root @deva[चक्षिङ्] 'to perceive, to tell' is replaced by @deva[ख्याञ्] when an @deva[आर्धधातुक] affix follows.

**Examples:**
- @deva[आख्याता] 'he will tell'
- @deva[आख्यातुम्] 'to tell'
- @deva[आख्यातव्यम्] 'must be told'

Since @deva[चक्षिङ्] is always @deva[आत्मनेपदी] (@ref[1.3.12]), the substitute @deva[ख्याञ्] would also be. But the @deva[ञ्] marker indicates @deva[ख्या] takes @deva[आत्मनेपद] only under conditions of @ref[1.3.72], not always.
"""

advanced = """
@deva[ख्याञ्] replaces @deva[चक्षिङ्] 'to perceive, to tell' when any @deva[आर्धधातुक] affix follows: @deva[आख्याता] 'he will tell,' @deva[आख्यातुम्] 'to tell,' @deva[आख्यातव्यम्] 'must be told.'

Since the substitute inherits the properties of the original (@ref[1.1.68]), and @deva[चक्षिङ्] is always @deva[आत्मनेपदी] (@ref[1.3.12]), @deva[ख्याञ्] would also always be @deva[आत्मनेपदी]. But then the indicatory @deva[ञ्] would have no scope. It follows that @deva[ख्याञ्] takes @deva[आत्मनेपद] only under the conditions of @ref[1.3.72], not invariably.

@deva[वार्त्तिक]: The substitute may also begin with @deva[क्श] instead of @deva[ख्य]: @deva[आक्शाता], @deva[आक्शातुम्], @deva[आक्शातव्यम्].

@deva[वार्त्तिक]: The substitution is blocked when the meaning is 'exclusion': @deva[दुर्जनाः संचक्ष्याः] 'bad men should be excluded.'

@deva[वार्त्तिक]: The substitution is blocked when the affixes @deva[अस्] and @deva[अन] follow: @deva[नृचक्षा राक्षसः] 'the @deva[राक्षस] is cruel' (Vedic; modern form @deva[नृचक्षः]; the root @deva[चक्ष्] here means 'to injure'). Similarly @deva[निचक्षणः पण्डितः] (affix @deva[अन]).

@deva[वार्त्तिक]: In denoting appellatives (not qualities) and in Vedic Sanskrit, substitutions apply diversely: @deva[अन्नम्] 'food' (@deva[जग्धि] does not replace @deva[अद्]); @deva[वधकम्] 'killer' (@deva[वध्] replaces @deva[हन्] before @deva[ण्वुल्]); @deva[गात्रम्] 'body' (@deva[गा] replaces @deva[इण्] before the @deva[उणादि] affix @deva[ष्टन्]); @deva[विचक्षणः] (@deva[चक्ष्] is not replaced by @deva[ख्या] before @deva[अन]); @deva[अजिरम्] 'courtyard' (@deva[अज्] is not replaced by @deva[वी] as @ref[2.4.56] requires).
"""

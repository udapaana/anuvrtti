[en]
simple = """
A @deva[द्वन्द्व] of small animals (@deva[क्षुद्रजन्तु]) takes @deva[एकवचन].

**Examples:**
- @deva[यूकालिक्षम्] 'louse and nit'
- @deva[दंशमशकम्] 'gnat and mosquito'
"""

standard = """
A @deva[द्वन्द्व] of @deva[क्षुद्रजन्तु] (small animals) takes @deva[एकवचन].

**Examples:**
- @deva[यूकालिक्षम्] 'louse and nit'
- @deva[दंशमशकम्] 'gnat and mosquito'

@deva[क्षुद्रजन्तु] definitions vary: invertebrates (boneless), very small animals, or all animals smaller than a mongoose.
"""


id = "2.4.35"
numericId = "24035"

[en]
simple = """
This @[sūtra] establishes that 'when an @deva[आर्धधातुक] affix follows' is to be understood in all @[sūtras] from here through @ref[2.4.58]. These rules teach various root substitutions that apply only before @deva[आर्धधातुक] affixes (like the benedictive or future), not before @deva[सार्वधातुक] affixes (like the potential).

**Example:** @ref[2.4.42] teaches that @deva[वध्] replaces @deva[हन्] before @deva[लिङ्].
- Benedictive (@deva[आशीर्लिङ्], an @deva[आर्धधातुक]): @deva[वध्यात्] 'may he kill'
- Potential (@deva[विधिलिङ्], a @deva[सार्वधातुक]): @deva[हन्यात्] 'he might kill' — no substitution
"""

standard = """
This @deva[अधिकार] @[sūtra] establishes that the phrase 'when an @deva[आर्धधातुक] affix follows' governs @[sūtras] @ref[2.4.36] through @ref[2.4.58]. The substitutions taught in these rules apply only when the triggering affix is @deva[आर्धधातुक], not @deva[सार्वधातुक].

**Example:** @ref[2.4.42] teaches @deva[वध्] as substitute for @deva[हन्] before @deva[लिङ्].
- @deva[आशीर्लिङ्] (benedictive, @deva[आर्धधातुक]): @deva[वध्यात्] 'may he kill'
- @deva[विधिलिङ्] (potential, @deva[सार्वधातुक]): @deva[हन्यात्] — @deva[हन्] unchanged

The locative @deva[आर्धधातुके] indicates the subject matter: substitutions should be made first, then the appropriate @deva[आर्धधातुक] affix applied. Thus @deva[अस्] 'to be' → @deva[भू], and then @deva[यत्] can be added (since @deva[भू] ends in a vowel, per @ref[3.1.97]): @deva[भव्यम्].
"""

advanced = """
This @deva[अधिकार] supplies the condition 'when an @deva[आर्धधातुक] affix follows' to @[sūtras] @ref[2.4.36]–@ref[2.4.58]. For instance, @ref[2.4.42] teaches that @deva[वध्] replaces @deva[हन्] before @deva[लिङ्]. With this @deva[अधिकार], the substitution applies only in the @deva[आर्धधातुक] @deva[लिङ्] (i.e. @deva[आशीर्लिङ्], the benedictive): @deva[वध्यात्] 'may he kill'—but not in the @deva[सार्वधातुक] @deva[लिङ्] (i.e. @deva[विधिलिङ्], the potential): @deva[हन्यात्] 'let him kill.'

The @deva[सप्तमी] in @deva[आर्धधातुके] does not carry the force of @ref[1.1.66] (i.e. 'when an @deva[आर्धधातुक] affix follows'). Instead, it indicates the subject matter: 'when the topic is an @deva[आर्धधातुक] affix.' The consequence is that the root substitutions taught hereafter must be performed first, and then the appropriate @deva[आर्धधातुक] affix applied to the resulting form. For example, to apply any @deva[आर्धधातुक] affix to @deva[अस्] 'to be,' one first substitutes @deva[भू], then applies the relevant affix. @deva[यत्] can then attach to @deva[भू] by @ref[3.1.97] ('after vowel-final roots, @deva[यत्] is applied'), yielding @deva[भव्यम्]—an affix that could never have been applied to consonant-final @deva[अस्]. The substitution is thus not contingent on any particular affix but on @deva[आर्धधातुक] affixes as a class.
"""

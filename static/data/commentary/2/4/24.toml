id = "2.4.24"
numericId = "24024"

[en]
simple = """
A @deva[तत्पुरुष] ending in @deva[सभा] is @deva[नपुंसकलिङ्ग] when meaning concourse (not building).

**Examples:** @deva[स्त्रीसभम्] 'gathering of women', @deva[दासीसभम्] 'gathering of slaves'

**Counter-example:** @deva[अनाथसभा] 'poorhouse' (building)
"""

standard = """
A @deva[तत्पुरुष] ending in @deva[सभा] is @deva[नपुंसकलिङ्ग] when meaning concourse/assembly (not a building).

**Examples:**
- @deva[स्त्रीसभम्] 'concourse of women'
- @deva[दासीसभम्] 'concourse of slaves'

**Counter-example:** @deva[अनाथसभा] 'the poorhouse' (a building)
"""

advanced = """
@deva[तत्पुरुष] + @deva[सभा] = @deva[नपुंसकलिङ्ग] for concourse (not building).

**Examples:** @deva[स्त्रीसभम्], @deva[दासीसभम्].

Building: @deva[अनाथसभा].
"""

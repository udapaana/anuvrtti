id = "2.4.59"
numericId = "24059"

[en]
simple = """
After words in the @deva[पैलादि] class, the @deva[युवन्] affix undergoes @deva[लुक्] elision.

**Example:**
- @deva[पीला] + @deva[अण्] = @deva[पैलः] 'descendant of @[pīla]' (@deva[गोत्र])
- The @deva[युवन्] affix @deva[फिञ्] (@ref[4.1.156]) is elided
- So @deva[पैलः] means both @deva[गोत्र] (grandfather's descendant) and @deva[युवन्] (father's descendant)

The @deva[पैलादि] class includes: @deva[पैल], @deva[शालङ्कि], @deva[सात्यकि], @deva[रावणि], and others.
"""

standard = """
After words belonging to the @deva[पैलादि] class, there is @deva[लुक्] elision of the @deva[युवन्] affix.

**Example:**
- @deva[पीला] + @deva[अण्] (@ref[4.1.118]) = @deva[पैलः] 'gotra descendant of @[pīla]'
- @deva[पैल] + @deva[फिञ्] (@ref[4.1.156]) → @deva[फिञ्] elided → @deva[पैलः]
- Thus @deva[पैलः] denotes both @deva[गोत्र] and @deva[युवन्]

**@deva[पैलादि] class:**
@deva[पैल], @deva[शालङ्कि], @deva[सात्यकि], @deva[सात्यकामि], @deva[राहवि], @deva[रावणि], @deva[औदञ्जि], @deva[दैवस्थानि], @deva[तद्राज], etc.

Some say these words are formed by @deva[इञ्] (@ref[4.1.95]), making the next rule (@ref[2.4.60]) applicable instead.
"""

advanced = """
After words in the @deva[पैलादि] class, the @deva[युवन्] affix undergoes @deva[लुक्] elision. @deva[पीला] + @deva[अण्] = @deva[पैलः] (@ref[4.1.118]) 'the @deva[गोत्र] descendant of @deva[पीला].' The @deva[युवन्] affix @deva[फिञ्] (@ref[4.1.156]) is then elided, so @deva[पैलः] denotes both @deva[गोत्र] and @deva[युवन्].

Some hold that the @deva[पैलादि] words are formed by @deva[इञ्] (@ref[4.1.95]), in which case @deva[लुक्] elision of the @deva[युवन्] affix would follow from the next rule (@ref[2.4.60]). On this view, the present @[sūtra] is limited to cases where the @deva[गोत्र] affiliation is not known—the @deva[प्राच्य] connection not being indicated.

The @deva[गण] comprises: @deva[पैल], @deva[शालङ्कि], @deva[सात्यकि], @deva[सात्यकामि], @deva[राहवि], @deva[रावणि], @deva[औदञ्जि], @deva[औदव्रजि], @deva[औदमेघि], @deva[औदव्यज्रि], @deva[औदमज्जि], @deva[औदभृज्जि], @deva[दैवस्थानि], @deva[पैङ्गलायनी], @deva[राहक्षति], @deva[भौलिङ्गि], @deva[राणि], @deva[ओदन्यि], @deva[ओद्राहमानि], @deva[औज्जिहान], @deva[औदशुद्धि], @deva[तद्राजाच्चाणः], @deva[तद्राज].
"""

id = "2.4.14"
numericId = "24014"

[en]
simple = """
The @deva[दधिपयसादि]-@deva[गण] compounds don't take @deva[एकवचन].

**Examples:** @deva[दधिपयसी] 'curd and milk', @deva[सर्पिर्मधुनी], @deva[ब्रह्मप्रजापती], @deva[उलूखलमुसले], @deva[ऋक्सामे].
"""

standard = """
The @deva[दधिपयसादि]-@deva[गण] compounds don't take @deva[एकवचन] (prohibition of singular that previous @[sūtras] would cause).

**Full list:** @deva[दधिपयसी], @deva[सर्पिर्मधुनी]/‍@deva[मधुसर्पिषी], @deva[ब्रह्मप्रजापती], @deva[शिववैश्रवणौ], @deva[स्कन्दविशाखौ], @deva[परिव्राट्कौशिकौ], @deva[प्रवर्ग्योपसदौ], @deva[शुक्लकृष्णौ], @deva[इध्माबर्हिषी], @deva[दीक्षातपसी], @deva[श्रद्धातपसी], @deva[मेधातपसी], @deva[अध्ययनतपसी], @deva[उलूखलमुसले], @deva[आद्यवसाने], @deva[श्रद्धामेधे], @deva[ऋक्सामे], @deva[वाङ्मनसे].
"""

advanced = """
@deva[दधिपयसादि]-@deva[गण]—prohibition of @deva[एकवचन]: @deva[दधिपयसी], @deva[सर्पिर्मधुनी]/‍@deva[मधुसर्पिषी], @deva[ब्रह्मप्रजापती], @deva[शिववैश्रवणौ], @deva[स्कन्दविशाखौ], @deva[परिव्राट्कौशिकौ], @deva[प्रवर्ग्योपसदौ], @deva[शुक्लकृष्णौ], @deva[इध्माबर्हिषी] (@deva[निपातनाद्दीर्घः]), @deva[दीक्षातपसी], @deva[श्रद्धातपसी], @deva[मेधातपसी], @deva[अध्ययनतपसी], @deva[उलूखलमुसले], @deva[आद्यवसाने], @deva[श्रद्धामेधे], @deva[ऋक्सामे], @deva[वाङ्मनसे].
"""

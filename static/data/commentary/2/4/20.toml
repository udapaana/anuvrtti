id = "2.4.20"
numericId = "24020"

[en]
simple = """
A @deva[तत्पुरुष] ending in @deva[कन्था] ('town'), denoting @deva[उशीनर]-region towns (as appellatives), is @deva[नपुंसकलिङ्ग].

**Examples:** @deva[सौशमिकन्थम्], @deva[आह्वरकन्थम्]

**Counter-examples:** @deva[वीरणकन्था] (not appellative), @deva[दाक्षिकन्था] (not @[uśīnara] region)
"""

standard = """
A @deva[तत्पुरुष] ending in @deva[कन्था] ('town') is @deva[नपुंसकलिङ्ग] when denoting an appellative name of a town in @deva[उशीनर] country.

**Examples:** @deva[सौशमिकन्थम्] 'town of @[sauśami]', @deva[आह्वरकन्थम्] 'town of @[āhvara]'

**Counter-examples:**
- @deva[वीरणकन्था] (not appellative)
- @deva[दाक्षिकन्था] (not in @[uśīnara] country)

Debars @ref[2.4.26]. For accent see @ref[4.2.124].
"""

advanced = """
@deva[तत्पुरुष] + @deva[कन्था] = @deva[नपुंसकलिङ्ग] when appellative in @deva[उशीनर] country.

**Examples:** @deva[सौशमिकन्थम्], @deva[आह्वरकन्थम्].

Not appellative: @deva[वीरणकन्था]. Not @[uśīnara]: @deva[दाक्षिकन्था]. Debars @ref[2.4.26]. Accent: @ref[4.2.124].
"""

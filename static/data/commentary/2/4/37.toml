id = "2.4.37"
numericId = "24037"

[en]
simple = """
The root @deva[अद्] 'to eat' is replaced by @deva[घस्ॡ] before the aorist (@deva[लुङ्]) or the desiderative (@deva[सन्]).

**Examples:**
- Aorist: @deva[अघसत्], @deva[अघसताम्], @deva[अघसन्] 'he/they ate'
- Desiderative: @deva[जिघत्सति], @deva[जिघत्सतः], @deva[जिघत्सन्ति] 'he/they wish to eat'

The @deva[ॡ] in @deva[घस्ॡ] is an indicatory marker signaling that @deva[अङ्] replaces @deva[च्लि] in the aorist (by @ref[3.1.55]).
"""

standard = """
The root @deva[अद्] 'to eat' is replaced by @deva[घस्ॡ] when @deva[लुङ्] (aorist) or @deva[सन्] (desiderative) follows.

**Aorist examples:**
- @deva[अघसत्], @deva[अघसताम्], @deva[अघसन्] 'he ate, they two ate, they all ate'

**Desiderative examples:**
- @deva[जिघत्सति], @deva[जिघत्सतः], @deva[जिघत्सन्ति] 'wishes to eat'

The @deva[ॡ] (@deva[इत्]) in @deva[घस्ॡ] indicates that the aorist takes @deva[अङ्] as the substitute for @deva[च्लि] (per @ref[3.1.55]).

@note[type=@[vārtika]] @deva[अद्] → @deva[घस्] also before @deva[अच्]: @deva[प्र] + @deva[अद्] + @deva[अच्] = @deva[प्रघसः] 'voracious'.
"""

advanced = """
@deva[घस्ॡ] replaces @deva[अद्] 'to eat' when @deva[लुङ्] (aorist) or @deva[सन्] (desiderative) follows: @deva[अघसत्], @deva[अघसताम्], @deva[अघसन्] 'he ate.' The @deva[ॡ] in @deva[घस्ॡ] is an @deva[इत्] marker indicating that @deva[अङ्] replaces @deva[च्लि] in the aorist (@ref[3.1.55]).

In the desiderative: @deva[जिघत्सति], @deva[जिघत्सतः], @deva[जिघत्सन्ति] 'wishes to eat.'

@deva[वार्त्तिक]: @deva[अद्] is also replaced by @deva[घस्] when the affix @deva[अच्] follows: @deva[प्र] + @deva[अद्] + @deva[अच्] = @deva[घस्] + @deva[अच्] = @deva[प्रघसः] 'voracious.'
"""

id = "2.4.15"
numericId = "24015"

[en]
simple = """
A @deva[द्वन्द्व] with a fixed number (@deva[संख्येय]) of concrete things doesn't take @deva[एकवचन].

**Examples:**
- @deva[दश दन्तोष्ठाः] 'ten sets of teeth and lips'
- @deva[दश मार्दङ्गिकपाणविकाः] 'ten @[drum-and-paṇava] player sets'
"""

standard = """
A @deva[द्वन्द्व] denoting a fixed number (@deva[संख्येय]) of concrete things (@deva[अधिकरण]) doesn't take @deva[एकवचन].

**Examples:**
- @deva[दश दन्तोष्ठाः] 'ten sets of teeth and lips'
- @deva[दश मार्दङ्गिकपाणविकाः] 'ten @[drum-and-paṇava] player sets'

Compare @ref[2.4.2] (body parts normally take @deva[एकवचन] (singular)).
"""

advanced = """
@deva[द्वन्द्व] with @deva[संख्येय] (fixed number) of @deva[अधिकरण] (concrete things) doesn't take @deva[एकवचन].

**Examples:** @deva[दश दन्तोष्ठाः], @deva[दश मार्दङ्गिकपाणविकाः].

Compare @ref[2.4.2].
"""

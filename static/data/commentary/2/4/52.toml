id = "2.4.52"
numericId = "24052"

[en]
simple = """
The root @deva[अस्] 'to be' is replaced by @deva[भू] when an @deva[आर्धधातुक] affix follows.

**Examples:**
- @deva[भविता] 'he will be'
- @deva[भवितुम्] 'in order to be'
- @deva[भवितव्यम्] 'must be'
- Perfect: @deva[बभूव] 'he was'

**Exception:** When @deva[अस्] serves as an auxiliary verb in the periphrastic perfect, it keeps its regular perfect forms: @deva[आस], @deva[आसतुः], @deva[आसुः].
"""

standard = """
The root @deva[अस्] 'to be' is replaced by @deva[भू] when an @deva[आर्धधातुक] affix follows. Since perfect affixes are also @deva[आर्धधातुक] (@ref[3.4.115]), the perfect of @deva[अस्] is @deva[बभूव] (same as @deva[भू]).

**Examples:**
- @deva[भविता] 'he will be' (future)
- @deva[भवितुम्] 'to be' (infinitive)
- @deva[भवितव्यम्] 'must be' (gerundive)

**Exception:** As an auxiliary in the periphrastic perfect (@ref[3.1.40]), @deva[अस्] retains its regular forms: @deva[कथयामास] 'he told.' Here @deva[अस्] forms @deva[आस], @deva[आसतुः], @deva[आसुः]—not @deva[बभूव].
"""

advanced = """
@deva[भू] replaces @deva[अस्] 'to be' when an @deva[आर्धधातुक] affix follows: @deva[भविता] 'he will be,' @deva[भवितुम्] 'to be,' @deva[भवितव्यम्] 'must be.' Since @deva[लिट्] affixes are also @deva[आर्धधातुक] (@ref[3.4.115]), the perfect of @deva[अस्] is identical to that of @deva[भू]: @deva[बभूव], etc.

An important exception arises when @deva[अस्] serves as an auxiliary in the periphrastic perfect (@ref[3.1.40]). There @deva[अस्] forms its perfect regularly: @deva[आस], @deva[आसतुः], @deva[आसुः]. This apparent violation is resolved by treating @deva[कृञ्] in @ref[3.1.40] as a @deva[प्रत्याहार] encompassing @deva[कृ], @deva[भू], and @deva[अस्]. If @deva[अस्] could not form its perfect independently, its inclusion in this @deva[प्रत्याहार] would be purposeless—hence, as an auxiliary, @deva[अस्] retains its regular perfect forms.
"""

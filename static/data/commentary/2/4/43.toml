id = "2.4.43"
numericId = "24043"

[en]
simple = """
The root @deva[हन्] 'to kill' is replaced by @deva[वध्] before @deva[लुङ्] (the aorist).

**Examples:**
- @deva[अवधीत्] 'he killed'
- @deva[अवधीष्टाम्] 'they two killed'
"""

standard = """
The root @deva[हन्] is replaced by @deva[वध्] when @deva[लुङ्] (aorist) follows.

**Examples:**
- @deva[अवधीत्] 'he killed'
- @deva[अवधीष्टाम्] 'they two killed'

The separation of this @[sūtra] from the previous (@deva[योगविभाग]) indicates that the next rule (@ref[2.4.44]) applies only to the aorist, not to the benedictive.
"""

advanced = """
And when @deva[लुङ्] (Aorist) follows @deva[वध] is the substitute of @deva[हन्]@deva[।] @deva[अवधीत्] 'he killed,' @deva[अवधीष्टाम्] 'they two killed.' The division of this aphorism from the last @[sutra] (@[yoga]-@[vibhaga]) indicates that the next rule applies to Aorist only and not to Benedictive as well. There is no option in Benedictive @[atmanepada].
"""

id = "2.4.42"
numericId = "24042"

[en]
simple = """
The root @deva[हन्] 'to kill' is replaced by @deva[वध्] before the @deva[आर्धधातुक] @deva[लिङ्] (the benedictive mood, @deva[आशीर्लिङ्]).

**Examples:**
- @deva[वध्यात्] 'may he kill'
- @deva[वध्यास्ताम्] 'may they two kill'
- @deva[वध्यासुः] 'may they all kill'

The substitute @deva[वध्] ends in short @deva[अ], which is then elided. This elision is @deva[स्थानिवत्] ('like the original'), so in the aorist @deva[अवधीत्], the @deva[अ] of @deva[वध्] does not undergo @deva[वृद्धि].
"""

standard = """
The root @deva[हन्] 'to kill' is replaced by @deva[वध्] when @deva[आर्धधातुक] @deva[लिङ्] (benedictive) follows.

**Examples:**
- @deva[वध्यात्], @deva[वध्यास्ताम्], @deva[वध्यासुः] 'may he/they kill'

The substitute @deva[वध्] ends in short @deva[अ], which is elided. This elision is @deva[स्थानिवत्] (by @ref[1.1.56]), so in forming the aorist, @deva[अवध्] + @deva[ईत्] = @deva[अवधीत्]. The zero-substitute prevents @deva[वृद्धि] of the @deva[अ] in @deva[व], which would otherwise occur by @ref[7.2.7].
"""

advanced = """
@deva[बध्] is the substitute of @deva[हन्] 'to kill' when the @deva[आर्धधातुक] @deva[लिङ्] (Benedictive) follows. @deva[वध्यात्] 'may he kill,' @deva[वध्यास्ताम्] 'may they two kill,' @deva[वध्यासुः] 'may they all kill.' The substitute @deva[वध्], ends with short @deva[अ] this @deva[अ] is elided. This elision being like the original (@[sthanivat] @ref[1.1.56]), in forming the Aorist, @deva[लुङ्], we have @deva[अवध्] + @deva[०] + @deva[ईत्] = @deva[अवधीत्]. Here zero being @[sthanivat] prevents the @[vriddhi] of @deva[अ] of @deva[व] which otherwise would have take place by @ref[7.2.7].
"""

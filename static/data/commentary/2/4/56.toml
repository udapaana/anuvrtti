id = "2.4.56"
numericId = "24056"

[en]
simple = """
The root @deva[अज्] 'to drive, to lead' is replaced by @deva[वी] when an @deva[आर्धधातुक] affix follows—except before @deva[घञ्] and @deva[अप्].

**With substitution:**
- @deva[प्रवायकः] 'driver'
- @deva[प्रवीताः] 'driven'

**Without substitution (before @deva[घञ्] or @deva[अप्]):**
- @deva[समाजः] 'assembly, society' (@deva[सम्] + @deva[अज्] + @deva[घञ्])
- @deva[समजः] 'herd of animals' (@deva[सम्] + @deva[अज्] + @deva[अप्])
"""

standard = """
The root @deva[अज्] 'to drive' is replaced by @deva[वी] when an @deva[आर्धधातुक] affix follows, with two exceptions: the affixes @deva[घञ्] (@ref[3.3.18]) and @deva[अप्] (@ref[3.3.69]).

**With @deva[वी] substitution:**
- @deva[प्रवायकः] 'driver'
- @deva[प्रवायणीयः] 'fit for driving'
- @deva[प्रवीताः] 'driven'

**Exceptions (no substitution):**
- @deva[समाजः] 'assembly' (@deva[घञ्])
- @deva[उदाजः] 'driving out' (@deva[घञ्])
- @deva[समजः] 'herd' (@deva[अप्], @ref[3.3.69])

The long @deva[ई] in @deva[वी] accounts for forms like @deva[प्रवीताः].

@note[type=@[vārtika]]{The affix @deva[क्यप्] is also excepted: @deva[समज्या] 'meeting, fame.'}
"""

advanced = """
@deva[वी] replaces @deva[अज्] 'to drive, to lead' when an @deva[आर्धधातुक] affix follows, with two exceptions: @deva[घञ्] (@deva[भावे], @ref[3.3.18]) and @deva[अप्] (@deva[समुदोरजः पशुषु], @ref[3.3.69]). Forms: @deva[प्रवायकः] 'driver,' @deva[प्रवायणीयः].

Before @deva[घञ्]: @deva[सम्] + @deva[अज्] + @deva[घञ्] = @deva[समाजः] 'assembly'; @deva[उदाजः] 'driving out.' Before @deva[अप्]: @deva[समजः] 'herd of animals'; @deva[उदजः] 'driving out of cattle' (see @ref[3.3.69]).

The long @deva[ई] in @deva[वी] accounts for forms like @deva[प्रवीताः].

@deva[वार्त्तिक]: The affix @deva[क्यप्] must also be excepted: @deva[समज्या] 'meeting, fame.'

@deva[वार्त्तिक]: The substitution is optional before @deva[आर्धधातुक] affixes beginning with a letter of the @deva[वल्] @deva[प्रत्याहार] (all consonants except @deva[य]): @deva[प्रवेता] / @deva[प्राजिता], @deva[प्रवेतुम्] / @deva[प्राजितुम्]. See @ref[6.2.144] for accent.
"""

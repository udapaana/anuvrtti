id = "2.4.49"
numericId = "24049"

[en]
simple = """
The root @deva[इङ्] 'to study' is replaced by @deva[गाङ्] before @deva[लिट्] (the perfect tense).

**Examples:**
- @deva[अधिजगे] 'he studied'
- @deva[अधिजगाते] 'they two studied'
- @deva[अधिजगिरे] 'they all studied'
"""

standard = """
The root @deva[इङ्] 'to study' is replaced by @deva[गाङ्] when @deva[लिट्] (perfect) follows.

**Examples:**
- @deva[अधिजगे], @deva[अधिजगाते], @deva[अधिजगिरे] 'he/they studied'

The substitute @deva[गाङ्] is @deva[आत्मनेपदि] like its original (by @ref[1.1.68]). The indicatory @deva[ङ्] ensures that in @ref[1.2.1], @deva[गाङ्] refers to this substitute, not the verb @deva[गा] 'to go'.

See @ref[6.4.64] and @ref[3.4.81] for the derivation.
"""

advanced = """
@deva[गाङ्] replaces @deva[इङ्] 'to study' when @deva[लिट्] (perfect) follows. By @ref[1.1.68], the substitute inherits the properties of the original, so @deva[गाङ्] would be @deva[आत्मनेपदी] even without the indicatory @deva[ङ्]. The @deva[ङ्] is added so that @deva[गाङ्] in @ref[1.2.1] refers specifically to this substitute rather than to the verb @deva[गा] 'to go.'

Forms: @deva[अधिजगे] 'he studied,' @deva[अधिजगाते], @deva[अधिजगिरे]. See @ref[6.4.64] and @ref[3.4.81].
"""

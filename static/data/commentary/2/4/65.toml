id = "2.4.65"
numericId = "24065"

[en]
simple = """
After the words @deva[अत्रि], @deva[भृगु], @deva[कुत्स], @deva[वसिष्ठ], @deva[गोतम], and @deva[अङ्गिरस्], the @deva[गोत्र] affix is elided in the plural—but not in the feminine.

**Examples:**
- @deva[आत्रेयः] (singular) → @deva[अत्रयः] (plural, affix elided)
- @deva[भार्गवः] (singular) → @deva[भृगवः] (plural, affix elided)
- @deva[कौत्सः] (singular) → @deva[कुत्साः] (plural, affix elided)

**Feminine (no elision):** @deva[आत्रेय्यः] @deva[स्त्रियः] 'the women of Atri's family'
"""

standard = """
After six specific @deva[ऋषि] names—@deva[अत्रि], @deva[भृगु], @deva[कुत्स], @deva[वसिष्ठ], @deva[गोतम], @deva[अङ्गिरस्]—the @deva[गोत्र] affix undergoes @deva[लुक्] elision in the plural (not feminine).

**Examples:**
| @deva[एकवचन] (Singular) | Plural (affix elided) |
|----------|----------------------|
| @deva[आत्रेयः] (@deva[अत्रि] + @deva[ढक्], @ref[4.1.122]) | @deva[अत्रयः] |
| @deva[भार्गवः] (@deva[भृगु] + @deva[अण्]) | @deva[भृगवः] |
| @deva[कौत्सः] | @deva[कुत्साः] |
| @deva[वासिष्ठः] | @deva[वसिष्ठाः] |

**No elision:**
- In compounds: @deva[प्रियात्रेयाः], @deva[प्रियभार्गवाः]
- In feminine: @deva[आत्रेय्यः] @deva[स्त्रियः]
"""

advanced = """
After @deva[अत्रि], @deva[भृगु], @deva[कुत्स], @deva[वसिष्ठ], @deva[गोतम], and @deva[अङ्गिरस्], the @deva[गोत्र] affix undergoes @deva[लुक्] elision in the plural, but not in the feminine.

@deva[आत्रेयः] (@deva[अत्रि] + @deva[ढक्], @ref[4.1.122]) → plural @deva[अत्रयः] (the regular plural of @deva[अत्रि]). Similarly: singular @deva[भार्गवः] (@deva[भृगु] + @deva[अण्]) → plural @deva[भृगवः]; @deva[कौत्सः] → @deva[कुत्साः]; @deva[वसिष्ठाः], @deva[गोतमाः], @deva[अङ्गिरसः].

Elision is restricted to the plural only—singular @deva[आत्रेयः], @deva[भार्गवः]; dual @deva[आत्रेयौ], @deva[भार्गवौ]; plural @deva[अत्रयः], @deva[भृगवः].

In compounds, the @deva[गोत्र] affixes are not elided: @deva[प्रियात्रेयाः], @deva[प्रियभार्गवाः]. In the feminine plural, affixes are likewise retained: @deva[आत्रेय्यः स्त्रियः].
"""

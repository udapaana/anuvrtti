id = "2.4.69"
numericId = "24069"

[en]
simple = """
After words in the @deva[उपकादि] class, the @deva[गोत्र] affix is optionally elided in the plural—whether the words are in a @deva[द्वन्द्व] compound or used separately.

**Examples:**
- @deva[औपकायनः] → plural: @deva[उपकाः] or @deva[औपकायनाः] (optional)
- @deva[लामकायनः] → plural: @deva[लमकाः] or @deva[लामकायनाः] (optional)

Three words from this class also appear in the @deva[तिककितवादि] class, where elision is mandatory in @deva[द्वन्द्व].
"""

standard = """
After words in the @deva[उपकादि] class, there is OPTIONAL @deva[लुक्] elision of the @deva[गोत्र] affix in the plural—whether used in @deva[द्वन्द्व] compound or separately.

**@deva[तिककितवादि] overlap:** Three words (@deva[उपकलमक], @deva[भ्रष्टककपिष्ठल], @deva[कृष्णाजिनकृष्णसुन्दर]) appear in both lists. In @deva[द्वन्द्व] from @deva[तिककितवादि], elision is invariable. Used separately, elision is optional per this rule.

**Examples (used separately):**
- @deva[औपकायनः] → @deva[उपकाः] or @deva[औपकायनाः]
- @deva[कापिष्ठलिः] → @deva[कपिष्ठलाः] or @deva[कापिष्ठलयः]

**@deva[उपकादि] class:** @deva[पण्डारक], @deva[गडुक], @deva[पतञ्जल], @deva[कठेरणि], @deva[काशकृत्स्न], etc. (41 words).
"""

advanced = """
After the words @deva[उपक] etc. there is optionally @deva[लुक्] elision of the @deva[गोत्र] affix when the words take the plural whether they enter into @deva[द्वन्द] compound or are used separately. Of the words belonging to this list, three have already been enumerated in the group of @[tika]-@[kitavadi] of the last @[sutra]. The elision is invariable in the @[dvandva] compound of these three, but when used separately the elision is optional. As, @deva[उपकलमकाः], @deva[भ्रष्टककपिष्ठलाः], @deva[कृष्णाजिनकृष्णसुन्दराः]. But the plurals of @deva[औपकायनयः], the @[gotra]-derivative of @deva[उपक] @ref[4.1.99] is @deva[उपकाः] or @deva[औपकायमाः]; of @deva[लामकायनः] is @deva[लमकाः] or @deva[लामकायनाः]; of @deva[भ्रष्टकि] is @deva[भ्राष्टकाः] or @deva[भ्राष्टकयः]. The plural of @deva[कापिष्ठलिः] is @deva[कपिष्टलाः] or @deva[कापिष्टलयः]. The plural of @deva[कार्ष्णाजिनिः] is @deva[कृष्णाजिनाः] or @deva[कार्ष्णाजिनयः]. The plural of @deva[कृष्णसुन्दरः] is @deva[कृष्णसुन्दराः] or @deva[कार्ष्णसुन्दरयः]. Of the rest of the words belonging to this group, there is option allowed, both when they occur in @[dvandva] compound or when used alone. They are as follow : 1. @deva[पण्डारक]. 2. @deva[अण्डारक]. 3. @deva[गडुक]. 4. @deva[सुपर्यक]. 5. @deva[सुषिष्ट]. 6. @deva[मयूरकर्ण]. 7. @deva[खारीजङ्घ]. 8. @deva[शलाबल]. 9. @deva[पतञ्जल]. 10. @deva[कठेरणि]. 11. @deva[कुपीतक]. 12. @deva[काशकृत्स्न]. 13. @deva[निदाघ]. 14. @deva[कलशीकण्ठ]. 15. @deva[दामकण्ठ]. 16. @deva[कृष्णपिंगल]. 17. @deva[कर्णक]. 18. @deva[पर्णक]. 19. @deva[जटिलक]. 20. @deva[बधिरक]. 21.@deva[जन्तुक]. 22 @deva[अनुलोम]. 23. @deva[अर्द्धपिंगलक]. 24. @deva[प्रतिलोम]. 25. @deva[प्रतान] 26. @deva[अनभिहित]. (27. @deva[चृडारक]. 28. @deva[उदङ्क] 29. @deva[सुधायुक]. 30. @deva[अबन्धक]. 31. @deva[पदञ्जल]. 32. @deva[अनुपद]. 33. @deva[अपजग्ध]. 34. @deva[कमक]. 35. @deva[लेखाभ्र] 36. @deva[कमन्दक]. 37. @deva[पिञ्चल]. 38. @deva[मसूरकर्ण] 39. @deva[मदाघ]. 40. @deva[कदामत्त]. 41. @deva[दामकण्ठ]) @deva[॥]
"""

id = "2.4.63"
numericId = "24063"

[en]
simple = """
After words in the @deva[यस्कादि] class, the @deva[गोत्र] affix undergoes @deva[लुक्] elision in the plural—but only when the plural is inherent (not from a compound) and the word is not feminine.

**Example:**
- Singular: @deva[यास्कः] (@deva[यस्क] + @deva[अण्]) 'descendant of Yaska'
- Plural: @deva[यस्काः] 'the descendants of Yaska' (affix elided)

The @deva[यस्कादि] class includes: @deva[यस्क], @deva[लह्य], @deva[द्रुह्य], @deva[अयस्थूण], @deva[मित्रयु], and others.
"""

standard = """
After words in the @deva[यस्कादि] class, the @deva[गोत्र] affix is elided by @deva[लुक्] when:
1. The word takes plural inherently (not as part of a compound)
2. The word is not feminine

**Examples:**
- @deva[यास्कः] (singular) → @deva[यस्काः] (plural, affix elided)
- @deva[लाह्यः] (singular) → @deva[लह्याः] (plural, affix elided)

**No elision:**
- In compounds: @deva[प्रिययास्काः] 'those who love @[yāska]' (affix retained)
- In feminine: @deva[यास्क्यः] (feminine plural, affix retained)

**@deva[यस्कादि] class:** @deva[यस्क], @deva[लह्य], @deva[द्रुह्य], @deva[तृणकर्ण], @deva[मित्रयु], @deva[भलन्दन], etc. (41 words).
"""

advanced = """
After the word @deva[यस्क] etc. there is the @deva[लुक्] elision of the @deva[गोत्र] affix when the word of itself and not as part of a compound epithet dependent on another word, takes the plural; but not in the feminine. @deva[यस्क] + @deva[अण्] = @deva[यास्कः] 'a descendent of @[yaska] not nearer than grandson.' In the plural, the affix is elided and the form is @deva[यस्काः] 'the decendents of @[yaska].' @deva[॥] @deva[यस्कादयः] @deva[॥] 1. @deva[यस्क]. 2. @deva[लह्य]. 3. @deva[द्रुह्य]. 4. @deva[अयस्थूण]. 5. @deva[अयःस्थूण]. 6. @deva[तृणकर्ण]. 7. @deva[सदामत्त]. 8. @deva[कम्बलहार]. 9. @deva[बहिर्याग]. 10. @deva[कर्णाढक]. 11. @deva[पर्णाढक]. 12. @deva[पिण्डी] @deva[जङ्घ]. 13. @deva[वकसस्थ]. 14. @deva[वकसक्थ]. 15. @deva[विश्रि]. 16. @deva[कुद्रि]. 17. @deva[अजबस्ति]. 18. @deva[मित्रयु] 19. @deva[रक्षोमुख]. 20. @deva[जङ्घारथ]. 21. @deva[उत्कास]. 22. @deva[कटुक], 23. @deva[मथक]. 24. @deva[मन्थक]. 25. @deva[पुष्करट्]. 26. @deva[पुष्करसट्]. 27. @deva[विषपुट]. 28. @deva[उपरिमेखल]. 29. @deva[क्रोष्टुकमान]. 30. @deva[क्रोष्टुमान]. 31. @deva[क्रोष्टुपाद]. 32. @deva[क्रोष्टुमाय]. 33. @deva[शीर्षमाय]. 34. @deva[श्वरप]. 35. @deva[पदक]. 36. @deva[वपुक]. 37. @deva[भलन्दन]. 38 @deva[भडिल]. 39. @deva[भण्डिल]. 40. @deva[भडित]. 41. @deva[भण्डिल].

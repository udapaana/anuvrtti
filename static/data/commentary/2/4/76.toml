id = "2.4.76"
numericId = "24076"

[en]
simple = """
In the @deva[छन्दस्] (Vedas), @deva[शप्] elision varies—sometimes occurring where not expected, sometimes not occurring where expected.

**Elision in non-@deva[जुहोत्यादि] verbs:**
- @deva[दाति] @deva[प्रियाणि] (instead of @deva[ददाति]) 'he gives pleasant things'
- @deva[धाति] (instead of @deva[दधाति])

**Also @deva[श्लु]-style elision in other classes:**
- @deva[पूर्णां] @deva[विवष्टि]
- @deva[जनिम] @deva[विवक्ति]
"""

standard = """
In @deva[छन्दस्] (Vedic literature), @deva[शप्] elision occurs @deva[बहुलम्] 'variously':

**Elision where not expected (@deva[जुहोत्यादि] without reduplication):**
- @deva[दाति] @deva[प्रियाणि] instead of @deva[ददाति] 'he gives'
- @deva[धाति] instead of @deva[दधाति] 'he places'

**@deva[श्लु]-style elision in non-@deva[जुहोत्यादि] verbs:**
- @deva[पूर्णां] @deva[विवष्टि]
- @deva[जनिम] @deva[विवक्ति]

The @deva[बहुलम्] indicates Vedic irregularity where rules apply inconsistently.
"""

advanced = """
In the @deva[छन्दस्] (Vedas) there is elision of the @deva[शप्] diversely. Elision does not take place where ordained, and takes place where not ordained. @deva[दाति] @deva[प्रियाणि] (instead of @deva[ददाति]) 'he gives pleasant objects,' @deva[धाति] instead of @deva[दधाति] @deva[।] So also there is @[slu]-elision of the @[vikaranas] after roots other than those belonging to the @[juhotyadi] class. Thus; @deva[पूर्णां] @deva[विवष्टि], @deva[जनिम] @deva[विवक्ति].
"""

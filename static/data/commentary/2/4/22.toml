id = "2.4.22"
numericId = "24022"

[en]
simple = """
A @deva[तत्पुरुष] ending in @deva[छाया] is @deva[नपुंसकलिङ्ग] when meaning profusion.

**Examples:** @deva[शलभच्छायम्] 'locust-darkened sky', @deva[इक्षुच्छायम्] 'sugarcane groves'

**Counter-example:** @deva[कुड्यच्छाया] 'wall's shadow' (not profusion)
"""

standard = """
A @deva[तत्पुरुष] ending in @deva[छाया] is @deva[नपुंसकलिङ्ग] when expressing profusion of the first member.

**Examples:**
- @deva[शलभच्छायम्] 'crowd of locusts darkening the sky'
- @deva[इक्षुच्छायम्] 'groves of sugarcane'

**Counter-example:** @deva[कुड्यच्छाया] 'shadow of a wall'

@ref[2.4.25] gives optional neuter; this rule makes it invariable when @deva[छाया] means profusion. Accent: @ref[6.2.14].
"""

advanced = """
@deva[तत्पुरुष] + @deva[छाया] = invariable @deva[नपुंसकलिङ्ग] for profusion.

**Examples:** @deva[शलभच्छायम्], @deva[इक्षुच्छायम्].

Not profusion: @deva[कुड्यच्छाया]. @ref[2.4.25] optional; this invariable. Accent: @ref[6.2.14].
"""

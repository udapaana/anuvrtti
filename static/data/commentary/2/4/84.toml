id = "2.4.84"
numericId = "24084"

[en]
simple = """
The @deva[आम्] substitution for instrumental (3rd case) and locative (7th case) affixes after an @deva[अव्ययीभाव] compound ending in @deva[अ] is optional (@deva[बहुलम्]).

**Examples:**
- @deva[उपकुम्भेन कृतम्] or @deva[उपकुम्भम् कृतम्] 'done by (one who is) near the pot'
- @deva[उपकुम्भे निधेहि] or @deva[उपकुम्भम् निधेहि] 'put it near the pot'

The previous @[sūtra] (@ref[2.4.83]) made @deva[आम्] obligatory for accusative/nominative; this @[sūtra] makes it optional for @deva[तृतीया] (instrumental)/locative.
"""

standard = """
The @deva[आम्] substitution taught in @ref[2.4.83] for case affixes after @deva[अव्ययीभाव] compounds ending in @deva[अ] applies optionally (@deva[बहुलम्]) to the instrumental (3rd) and locative (7th) cases.

**Examples:**
- @deva[उपकुम्भेन कृतम्] or @deva[उपकुम्भम् कृतम्] 'done by @deva[उपकुम्भ]'
- @deva[उपकुम्भे निधेहि] or @deva[उपकुम्भम् निधेहि] 'put it in @deva[उपकुम्भ]'

@note[type=@[vārtika]]{The @deva[आम्] substitution is invariable (not optional) in the locative when the @deva[अव्ययीभाव] denotes prosperity (@ref[2.1.6]), river compounds (@ref[2.1.20], @ref[2.1.21]), or numeral compounds (@ref[2.1.19]). Thus: @deva[सुमद्रम्] 'prosperous with Madras', @deva[उन्मत्तगङ्गम्] 'at the @[unmatta-gaṅgā]', @deva[एकविंशतिभारद्वाजम्] 'at the twenty-one @[bhāradvājas]'.}
"""

advanced = """
The change to @deva[अम्] of the Instrumental -3rd case and Locative -7th-case-affixes coming after an @deva[अव्ययीभाव] compound that ends in @deva[अ] , occurs diversely. @deva[उपकुम्भेन] or @deva[उपकुम्भम्] @deva[कृतं] 'done by @[upakumbha]'; @deva[उपकुम्भे] @deva[निधेहि] or @deva[उपकुम्भम्] @deva[निधेहि] 'put it in the @[upakumbha].' Vart:- The @deva[अम्] substitution is invariable and not optional in the @deva[सप्तमी] (locative) case when the @[avyayibhava] compound denotes prosperity (II.1.6.) or a compound of rivers @ref[2.1.20] and @ref[2.1.21] or a compound having a numeral for its member @ref[2.1.19]; as, @deva[सुमद्रम्] 'well or prosperous with the @[madras]'; @deva[सुमगधम्] 'well or prosperous with the @[magadhas]'; similarly @deva[उन्मत्तगङ्गम्] @deva[।] @deva[लोहितगङ्गम्] @deva[।] @deva[एकविंशतिभारद्वाजम्] @deva[।] The word 'diversely' establishes all these even without the @[vartika].
"""

id = "2.4.13"
numericId = "24013"

[en]
simple = """
A @deva[द्वन्द्व] of contrary qualities (@deva[विप्रतिषिद्ध]), not substances, optionally takes @deva[एकवचन].

**Examples:**
- @deva[शीतोष्णम्]/‍@deva[शीतोष्णे] 'cold and heat'
- @deva[सुखदुःखम्]/‍@deva[सुखदुःखे] 'pleasure and pain'

**Counter-example:** @deva[शीतोष्णे उदके] (substances—dual only)
"""

standard = """
A @deva[द्वन्द्व] of @deva[विप्रतिषिद्ध] (contrary significations), not substances, optionally takes @deva[एकवचन].

**Examples:**
- @deva[शीतोष्णम्]/‍@deva[शीतोष्णे] 'cold and heat'
- @deva[सुखदुःखम्]/‍@deva[सुखदुःखे] 'pleasure and pain'
- @deva[जीवितमरणम्]/‍@deva[जीवितमरणे] 'life and death'

**Counter-examples:**
- @deva[कामक्रोधौ] (not contrary)
- @deva[शीतोष्णे उदके] (substances)
"""

advanced = """
@deva[द्वन्द्व] of @deva[विप्रतिषिद्ध] (contraries), not substances, optionally @deva[एकवचन]. @deva[च] continues @deva[विभाषा] from previous @[sūtra].

**Examples:** @deva[शीतोष्णम्]/‍@deva[°ष्णे], @deva[सुखदुःखम्]/‍@deva[°खे], @deva[जीवितमरणम्]/‍@deva[°णे].

Not contrary: @deva[कामक्रोधौ]. Substances: @deva[शीतोष्णे उदके].
"""

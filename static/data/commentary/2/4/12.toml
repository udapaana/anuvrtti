id = "2.4.12"
numericId = "24012"

[en]
simple = """
@deva[द्वन्द्व] compounds of trees, wild animals, grass, grain, condiments, domestic beasts/birds, and @deva[अश्ववडव]/‍@deva[पूर्वापर]/‍@deva[अधरोत्तर] optionally take @deva[एकवचन].

**Examples:**
- @deva[प्लक्षन्यग्रोधम्] or @deva[प्लक्षन्यग्रोधाः] '@[plakṣa] and nyagrodha trees'
- @deva[व्रीहियवम्] or @deva[व्रीहियवाः] 'rice and barley'
"""

standard = """
@deva[द्वन्द्व] of trees, wild animals, grass, grain, condiments, domestic beasts/birds, and @deva[अश्ववडव], @deva[पूर्वापर], @deva[अधरोत्तर] optionally takes @deva[एकवचन].

**Examples:**
- @deva[प्लक्षन्यग्रोधम्]/‍@deva[प्लक्षन्यग्रोधाः] '@[plakṣa] and nyagrodha'
- @deva[रुरुपृषतम्]/‍@deva[रुरुपृषताः] 'ruru and @[pṛṣata] deer'
- @deva[कुशकाशम्]/‍@deva[कुशकाशाः] '@[kuśa] and @[kāśa] grass'
- @deva[व्रीहियवम्]/‍@deva[व्रीहियवाः] 'rice and barley'
- @deva[गोमहिषम्]/‍@deva[गोमहिषाः] 'cow and buffalo'
- @deva[अश्ववडवम्]/‍@deva[अश्ववडवाः] 'horse and mare'
- @deva[पूर्वापरम्]/‍@deva[पूर्वापरे] 'first and last'

@note[type=@[vārtika]] Singular when large quantity; dual for individuals: @deva[प्लक्षन्यग्रोधौ], @deva[व्रीहियवौ].
"""

advanced = """
@deva[द्वन्द्व] of trees, wild animals, grass, grain, condiments, domestic beasts/birds, @deva[अश्ववडव], @deva[पूर्वापर], @deva[अधरोत्तर]—optionally @deva[एकवचन].

**Examples:** @deva[प्लक्षन्यग्रोधम्]/‍@deva[°ाः], @deva[रुरुपृषतम्]/‍@deva[°ाः], @deva[कुशकाशम्]/‍@deva[°ाः], @deva[व्रीहियवम्]/‍@deva[°ाः], @deva[दधिघृतम्]/‍@deva[°ते], @deva[गोमहिषम्]/‍@deva[°षाः], @deva[तित्तिरकपिञ्जलम्]/‍@deva[°लाः], @deva[अश्ववडवम्]/‍@deva[°वाः], @deva[पूर्वापरम्]/‍@deva[°रे], @deva[अधरोत्तरम्]/‍@deva[°रे].

@note[type=@[vārtika]] Singular for large quantity; dual for individuals: @deva[प्लक्षन्यग्रोधौ], @deva[रुरुपृषतौ], @deva[हंसचक्रवाकौ], @deva[व्रीहियवौ], @deva[कुशकाशौ].
"""

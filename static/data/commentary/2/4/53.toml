id = "2.4.53"
numericId = "24053"

[en]
simple = """
The root @deva[ब्रू] 'to speak' is replaced by @deva[वचि] when an @deva[आर्धधातुक] affix follows. The @deva[इ] in @deva[वचि] is only for pronunciation and drops away.

**Examples:**
- @deva[वक्ता] 'he will speak'
- @deva[वक्तुम्] 'to speak'
- Perfect (@deva[आत्मनेपद]): @deva[ऊचे] 'he spoke'
- Future: @deva[वक्ष्यते] 'he will speak'
"""

standard = """
The root @deva[ब्रू] 'to speak' is replaced by @deva[वचि] when an @deva[आर्धधातुक] affix follows. The @deva[इ] of @deva[वचि] is for articulation only (@deva[उच्चारणार्थ]).

**Examples:**
- @deva[वक्ता] 'he will speak'
- @deva[वक्तुम्] 'to speak'

Since the substitute is treated like the original (@deva[स्थानिवद्भाव]), @deva[वच्] takes @deva[आत्मनेपद] when the fruit of action accrues to the agent (just as @deva[ब्रू] does):
- @deva[ऊचे] 'he spoke' (perfect)
- @deva[वक्ष्यते] 'he will speak' (future)
"""

advanced = """
@deva[वचि] is the substitute of @deva[ब्रू] 'to speak' when any @deva[आर्धधातुक] affix is to be supplied. @deva[वक्ता] 'he will speak,' @deva[वक्तुम्] 'in order to speak.' The @deva[इ] of @deva[वचि] is for the sake of articulation only. The substitute being like the principal, @deva[वच्] is @[atmanepadi] when the fruit of the action accrues to the agent, as @deva[ऊचे] 'he spoke,' @deva[वक्ष्यते] 'he will speak.'
"""

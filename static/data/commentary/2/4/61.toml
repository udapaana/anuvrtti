id = "2.4.61"
numericId = "24061"

[en]
simple = """
After words in the @deva[तौल्वल्यादि] class, the @deva[युवन्] affix is NOT elided. This blocks the elision that @ref[2.4.58] would otherwise cause.

**Example:**
- @deva[तौल्वलिः] (@deva[गोत्र]) and @deva[तौल्वलायनिः] (@deva[युवन्])—both forms are distinct

The @deva[तौल्वल्यादि] class includes: @deva[तौल्वलि], @deva[धारणि], @deva[पारणि], @deva[रावणि], @deva[दैलीपि], @deva[दैवति], @deva[आसुरि], @deva[नैमिषि], and others.
"""

standard = """
After words belonging to the @deva[तौल्वल्यादि] class, there is NO @deva[लुक्] elision of the @deva[युवन्] affix. This is an exception to @ref[2.4.58].

**Result:** The @deva[गोत्र] and @deva[युवन्] forms remain distinct:
- @deva[तौल्वलिः] = @deva[गोत्र] descendant
- @deva[तौल्वलायनिः] = @deva[युवन्] descendant (affix @deva[फिञ्] retained)

**@deva[तौल्वल्यादि] class:**
@deva[तौल्वलि], @deva[धारणि], @deva[पारणि], @deva[रावणि], @deva[दैलीपि], @deva[दैवति], @deva[वार्कलि], @deva[नैवति], @deva[आसुरि], @deva[नैमिषि], @deva[पौष्पि], @deva[वैकर्णि], etc. (36 words total).
"""

advanced = """

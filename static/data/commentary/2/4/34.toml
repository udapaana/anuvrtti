id = "2.4.34"
numericId = "24034"

[en]
simple = """
When @deva[इदम्] or @deva[एतद्] is used anaphorically, it becomes @deva[एन्] (which is @deva[अनुदात्त]) before: (1) accusative case, (2) instrumental singular (@deva[टा]), or (3) locative dual (@deva[ओस्]).

**Examples:**
- @deva[इमं छात्रं छन्दोऽध्यापय, अथो एनं व्याकरणमप्यध्यापय] 'Teach this student prosody, and teach him grammar too.'
- @deva[अनेन छात्रेण रात्रिरधीता, अथो एनेनाहरप्यधीतम्] 'This student studied at night, and he studied by day too.'
- @deva[अनयोः छात्रयोः शोभनं शीलम्, अथो एनयोः प्रभूतं स्वम्] 'These two students have good character, and their wealth is great.'
"""

standard = """
When @deva[इदम्] (or @deva[एतद्]) is re-employed in @deva[अन्वादेश], it is replaced by @deva[एन्] (which is @deva[अनुदात्त]) before the accusative, the instrumental singular (@deva[टा]), or the locative dual (@deva[ओस्]).

**Examples:**
- @deva[इमं छात्रं छन्दोऽध्यापय, अथो एनं व्याकरणमप्यध्यापय] 'Teach this student prosody, and teach him grammar too.'
- @deva[अनेन छात्रेण रात्रिरधीता, अथो एनेनाहरप्यधीतम्] 'This student studied at night, and he studied by day too.'

@deva[इदम्] is understood here by 'frog-leap' (@deva[मण्डूकप्लुति]) from @ref[2.4.32], skipping over @ref[2.4.33].

@note[type=@[vārtika]] The neuter singular @deva[एनत्] is also used in @deva[अन्वादेश]: @deva[इदं कुण्डमानय प्रक्षालयैनत्] 'Bring this bowl and wash it.'
"""

advanced = """
When an affix of the Accusative -2nd case or @deva[टा] - Instrumental -3rd case singular or @deva[ओश्] Locative -7th-case dual follows, @deva[एन्] which is @deva[अनुदात्त] is the substitute of @deva[इदम्] and its re-employment. The word @deva[इदम्] is also understood in this @[sutra] though it was not so in the last. This skipping is technically called 'frog-leap.' Thus:- @deva[इमं] or @deva[एतं] @deva[छात्रं] @deva[छन्दोऽध्यापय], @deva[अथो] @deva[एमं] @deva[व्याकरणमप्यध्यापय] 'teach this pupil Prosody, and teach him Grammar also,' @deva[अनेन] or @deva[एतेन] @deva[छात्रेण] @deva[रात्रिरधीता] '@deva[अथो] @deva[एनेनाहरप्यधीतम्] 'this pupil studied in the night and he studied in the day also'. @deva[अनयोः] or @deva[एतयोः] @deva[छात्रयोः] @deva[शोभनं] @deva[शीलम्], @deva[अथो] @deva[एनयोः] @deva[प्रभूतं] @deva[स्वं] 'the family of these two students is respectable and their wealth is great.' Vart:- The word @deva[एनत्] neuter and singular, is also used in @[anvadesa]: as, @deva[इदम्] @deva[कुण्डमानय] @deva[प्रक्षालयैनत्] 'bring this bowl and wash it.' The above three @[sutra] regulate the accent only of certain pronouns.
"""

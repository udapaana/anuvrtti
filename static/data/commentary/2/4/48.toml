id = "2.4.48"
numericId = "24048"

[en]
simple = """
The root @deva[इङ्] 'to study' is replaced by @deva[गमि] before @deva[सन्] (the desiderative affix).

**Examples:**
- @deva[अधिजिगांसते] 'he wishes to study'
- @deva[अधिजिगांसेते] 'they two wish to study'
- @deva[अधिजिगांसन्ते] 'they all wish to study'

The root @deva[इङ्] is always used with the prefix @deva[अधि] and takes @deva[आत्मनेपद] endings.
"""

standard = """
The root @deva[इङ्] 'to study' is replaced by @deva[गमि] when @deva[सन्] (desiderative) follows.

**Examples:**
- @deva[अधिजिगांसते], @deva[अधिजिगांसेते], @deva[अधिजिगांसन्ते] 'wishes to study'

The root @deva[इङ्] is always preceded by @deva[अधि] and is @deva[आत्मनेपदि] by @ref[1.3.12] and @ref[1.1.56].

**Derivation:** The form is derived by applying @ref[7.2.58] and @ref[6.4.16].
"""

advanced = """
And of @deva[इङ्] 'to study', @deva[गमि] is the substitute when @deva[सन्] follows. @deva[अधिजिगांसते], @deva[०सेते], @deva[०सन्ते] 'he wishes to study.' The root @deva[इङ्] is always preceded by the preposition @deva[अधि]. This will be @[atmanepadi] by (1.3. 12) and @ref[1.1.56]. The form is similarly evolved by the application of rules @ref[7.2.58] and @ref[6.4.16].
"""

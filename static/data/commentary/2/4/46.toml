id = "2.4.46"
numericId = "24046"

[en]
simple = """
The root @deva[इण्] 'to go' is replaced by @deva[गामि] before @deva[णि] (the causal affix), but only when the meaning is 'going', not 'informing'.

**Examples (meaning 'go'):**
- @deva[गमयति], @deva[गमयतः], @deva[गमयन्ति] 'he/they make (someone) go'
- @deva[अधिगामयति] 'makes (someone) attain'

**Counter-example (meaning 'inform'):**
- @deva[प्रत्याययति] 'causes to believe' — no substitution
"""

standard = """
The root @deva[इण्] 'to go' is replaced by @deva[गामि] when @deva[णि] (causal) follows, provided the meaning is 'going' (@deva[गति]), not 'informing' (@deva[बोधन]).

**Examples:**
- @deva[गमयति], @deva[गमयतः], @deva[गमयन्ति] 'makes go'
- @deva[अधिगामयति] 'makes attain'

**Counter-example:** @deva[प्रत्याययति] 'causes to believe' — the meaning here is 'informing', so @deva[इण्] remains unchanged.

The @deva[इ] in @deva[गमि] is for articulation only. This rule also applies to @deva[इक्] 'to remember': @deva[अधिगमयति].
"""

advanced = """
@deva[गामि] replaces @deva[इण्] 'to go' when the causal affix @deva[णि] follows, provided the sense is 'going' (@deva[गति]), not 'informing' (@deva[बोधन]): @deva[गमयति] 'makes him go,' @deva[गमयतः], @deva[गमयन्ति]. But @deva[प्रत्याययति] 'causes to believe'—here the meaning is 'informing,' so no substitution occurs. @deva[अधिगामयति] 'makes attain.'

The @deva[इ] in @deva[गमि] is for articulation only. This rule extends to @deva[इक्] 'to remember' as well: @deva[अधिगमयति].
"""

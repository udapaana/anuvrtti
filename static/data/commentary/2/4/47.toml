id = "2.4.47"
numericId = "24047"

[en]
simple = """
The root @deva[इण्] 'to go' is replaced by @deva[गमि] before @deva[सन्] (the desiderative affix), but only when the meaning is 'going', not 'informing'.

**Examples (meaning 'go'):**
- @deva[जिगमिषति], @deva[जिगमिषतः], @deva[जिगमिषन्ति] 'he/they wish to go'

**Counter-example (meaning 'inform'):**
- @deva[अर्थान् प्रतीषिषति] 'he wishes to inform the meaning' — no substitution

This also applies to @deva[इक्] 'to remember': @deva[अधिजिगमिषति].
"""

standard = """
The root @deva[इण्] 'to go' is replaced by @deva[गमि] when @deva[सन्] (desiderative) follows, provided the meaning is 'going', not 'informing'.

**Examples:**
- @deva[जिगमिषति], @deva[जिगमिषतः], @deva[जिगमिषन्ति] 'wishes to go'

**Counter-example:** @deva[अर्थान् प्रतीषिषति] 'he wishes to inform the meaning'

The @deva[योगविभाग] from the previous @[sūtra] indicates only @deva[सन्] continues here, not @deva[णि].

**Derivation:** @deva[सन्] + @deva[गम्] → @deva[गम्] + @deva[गम्] + @deva[स] (@ref[6.1.9]) → @deva[गगम्] + @deva[स] (@ref[7.4.60]) → @deva[जगम्] + @deva[स] (@ref[7.4.62]) → @deva[जगम्] + @deva[इट्] + @deva[स] (@ref[7.2.50]) = @deva[जिगमिष]
"""

advanced = """
And when @deva[सन्] (Desiderative) follows, @deva[गमि] is the substitute of @deva[ण्] when the sense is not that of 'informing'. @deva[जिगमिषति] 'wishes to go' @deva[जिगमिषतः], @deva[जिगमिषन्ति]. But @deva[अर्थान्] @deva[प्रतीषिषति] 'he wishes to inform the meaning.' So also with @deva[इक्], as @deva[अधिजिगमिषति]. The @[yogavibhaga] indicates that the @[anuvritti] of @deva[सन्] only runs in the next @[sutra] and not of @deva[णि]. The form is thus evolved in the @[parasmaipada]; @deva[सन्] + @deva[गम्] = @deva[गम्] + @deva[गम्] + @deva[स] @ref[6.1.9] = @deva[ग] + @deva[गम्] + @deva[स] @ref[7.4.60] = @deva[ज] + @deva[गम्] + @deva[स] @ref[7.4.62] = @deva[ज] + @deva[गम्] + @deva[इट्] + @deva[स] @ref[7.2.50] = @deva[जिगमिष], and then we add the personal terminations.
"""

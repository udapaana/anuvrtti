id = "2.4.72"
numericId = "24072"

[en]
simple = """
After roots of the @deva[अदादि] class (2nd conjugation), the @deva[विकरण] @deva[शप्] (@ref[3.1.68]) undergoes @deva[लुक्] elision. The personal endings attach directly to the root.

**Examples:**
- @deva[अद्] + @deva[ति] = @deva[अत्ति] 'he eats' (not *@deva[अदति])
- @deva[हन्] + @deva[ति] = @deva[हन्ति] 'he kills'
- @deva[द्विष्] + @deva[ति] = @deva[द्वेष्टि] 'he hates'
"""

standard = """
After @deva[अदादि] roots (2nd conjugation), the @deva[विकरण] @deva[शप्] (@ref[3.1.68]) is elided by @deva[लुक्]. Personal endings attach directly to the root.

**Examples:**
- @deva[अद्] 'eat' + @deva[शप्] + @deva[ति] → @deva[अत्ति] (no @deva[शप्])
- @deva[हन्] 'kill' → @deva[हन्ति]
- @deva[द्विष्] 'hate' → @deva[द्वेष्टि]

**Compare with 1st conjugation (@deva[भ्वादि]):**
- @deva[भू] + @deva[शप्] + @deva[ति] = @deva[भवति] (@deva[शप्] retained)

The @deva[अदादि] class includes: @deva[अद्], @deva[हन्], @deva[द्विष्], @deva[लिह्], @deva[दुह्], @deva[शास्], @deva[रुध्], @deva[विद्], @deva[ब्रू], etc.
"""

advanced = """
After @deva[अदादि] roots (2nd conjugation), the @deva[विकरण] @deva[शप्] (@deva[कर्तरि शप्], @ref[3.1.68]) undergoes @deva[लुक्] elision: @deva[अद्] + @deva[शप्] + @deva[ति] = @deva[अत्ति] 'he eats'; @deva[हन्ति] 'he kills'; @deva[द्वेष्टि] 'he hates.' In this class, personal endings attach directly to the root without an intervening @deva[विकरण].
"""

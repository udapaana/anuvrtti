id = "2.1.70"
numericId = "21070"

[en]
simple = """
The word @deva[कुमार] "young man/boy" (or @deva[कुमारी] "young woman/maiden") compounds with words from the @deva[श्रमणादि] list to form @deva[तत्पुरुष]. Both members describe the same person.

**Examples:**
- @deva[कुमारश्रमणः] "a bachelor ascetic" (masculine)
- @deva[कुमारीश्रमणा] "a maiden ascetic" (feminine)
- @deva[कुमारप्रव्रजिता] "a maiden who has taken to ascetic life"
- @deva[कुमाराध्यापकः] "a young teacher"
- @deva[कुमारपण्डितः] "a young scholar"

The @deva[श्रमणादि] list includes words like @deva[श्रमण] "ascetic," @deva[प्रव्रजिता] "renunciant," @deva[तापसी] "hermit," @deva[अध्यापक] "teacher," @deva[पण्डित] "learned," @deva[कुशल] "skilled," @deva[निपुण] "expert," and others.
"""

standard = """
@deva[कुमार] + @deva[श्रमणादि] → @deva[तत्पुरुष] in @deva[समानाधिकरण] — @deva[कुमारः श्रमणादिभिः].

**Rule type — @deva[विधि]:** Compounding rule within @deva[कर्मधारय].

**Examples:**
- @deva[कुमारश्रमणः] / @deva[कुमारीश्रमणा] "bachelor/maiden ascetic"
- @deva[कुमारीप्रव्रजिता] "a maiden renunciant"
- @deva[कुमारीकुलटा] "an unchaste maiden"
- @deva[कुमारीगर्भिणी] "a maiden who is pregnant"
- @deva[कुमाराध्यापकः] "a young teacher"
- @deva[कुमारपण्डितः] "a young scholar"

**Gender matching:** With feminine @deva[श्रमणादि] words (@deva[श्रमणा], @deva[प्रव्रजिता], @deva[कुलटा], @deva[गर्भिणी], @deva[तापसी], @deva[दासी], @deva[बन्धकी]), @deva[कुमार] takes the feminine form @deva[कुमारी]. With masculine words (@deva[अध्यापक], @deva[पण्डित], @deva[कुशल]), it stays masculine @deva[कुमार].

**@deva[श्रमणादि] list:** ~14 words including @deva[श्रमण], @deva[प्रव्रजिता], @deva[कुलटा], @deva[गर्भिणी], @deva[तापसी], @deva[दासी], @deva[बन्धकी], @deva[अध्यापक], @deva[अभिरूपक], @deva[पण्डित], @deva[मृदु], @deva[कुशल], @deva[चपल], @deva[निपुण].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[कुमारः श्रमणादिभिः] — @deva[कुमार] compounds with @deva[श्रमणादि] words as @deva[कर्मधारय] @deva[तत्पुरुष].

**Gender by @deva[प्रातिपदिकग्रहण] principle:** The @deva[काशिका] applies the @deva[परिभाषा]: @deva[प्रातिपदिकग्रहणे लिङ्गविशिष्टस्यापि ग्रहणम्]. @deva[कुमार] cited in the @[sūtra] covers both @deva[कुमार] (masc.) and @deva[कुमारी] (fem.). With feminine list members (@deva[श्रमणा], @deva[प्रव्रजिता]), @deva[कुमारी] is used; with masculine list members (@deva[अध्यापक], @deva[पण्डित]), @deva[कुमार] is used.

**@deva[श्रमणादि] — @deva[गण] list:** The list includes roles (@deva[श्रमण], @deva[प्रव्रजिता], @deva[तापसी], @deva[अध्यापक]), social descriptors (@deva[कुलटा], @deva[दासी], @deva[बन्धकी], @deva[गर्भिणी]), and qualities (@deva[अभिरूपक], @deva[पण्डित], @deva[मृदु], @deva[कुशल], @deva[चपल], @deva[निपुण]).

**Why a specific rule?** These compounds combine @deva[कुमार] with words describing life-stages or roles that are semantically surprising for a young person (asceticism, teaching, pregnancy). The specific listing ensures these compounds are formed regularly, not subject to @ref[2.1.57]'s @deva[बहुलम्].
"""

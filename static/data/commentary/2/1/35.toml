id = "2.1.35"
numericId = "21035"

[en]
simple = """
A word in the instrumental case (@deva[तृतीया]) denoting a mixing or flavoring ingredient (@deva[मिश्रीकरण]) **optionally** compounds with an edible-word (@deva[भक्ष्य]) to form @deva[तत्पुरुष].

**Examples:**
- @deva[गुडधानाः] "jaggery-barley" — barley mixed with jaggery
- @deva[गुडपृथकाः] "jaggery-flattened-rice" — flattened rice mixed with jaggery

This rule is similar to the previous one (@ref[2.1.34]), but broader: @ref[2.1.34] covered cooked food (@deva[अन्न]) with condiments (@deva[व्यञ्जन]). This rule covers any edible (@deva[भक्ष्य]) — whether hard or soft, cooked or raw — with a flavoring ingredient.
"""

standard = """
@deva[तृतीयान्त] (@deva[मिश्रीकरणवाचक]) + @deva[भक्ष्यवाचक] → @deva[विभाषा] @deva[तत्पुरुष] — @deva[भक्ष्येण मिश्रीकरणम्].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding under @ref[2.1.11].

**Examples:**
- @deva[गुडधानाः] "barley mixed with jaggery"
- @deva[गुडपृथकाः] "flattened parched rice with jaggery"

**@deva[भक्ष्य] vs @deva[अन्न]:** @deva[भक्ष्य] = any edible substance (hard or soft, cooked or uncooked). @deva[अन्न] (@ref[2.1.34]) = specifically cooked/prepared food. @deva[धाना] (parched barley) and @deva[पृथक] (flattened rice) are @deva[भक्ष्य] but not @deva[अन्न].

**@deva[मिश्रीकरण] vs @deva[व्यञ्जन]:** @deva[मिश्रीकरण] = the ingredient that flavors or refines by mixing. @deva[व्यञ्जन] (@ref[2.1.34]) = condiment that enhances cooked food. @deva[गुड] (jaggery) mixed into raw barley is @deva[मिश्रीकरण], not @deva[व्यञ्जन].

**Semantic connection:** As with @ref[2.1.34], an understood verb connects the two — @deva[मिश्रीकृत] "mixed with."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तृतीया] from @ref[2.1.30]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[भक्ष्येण मिश्रीकरणम्] — a @deva[तृतीयान्त] @deva[मिश्रीकरण] word optionally compounds with a @deva[भक्ष्य] word as @deva[तत्पुरुष].

**@ref[2.1.34]–@ref[2.1.35] as a pair:** These two rules cover the food-compound domain of @deva[तृतीया] @deva[तत्पुरुष]:
- @ref[2.1.34]: @deva[अन्न] (cooked food) + @deva[व्यञ्जन] (condiment) — @deva[दध्योदनः]
- @ref[2.1.35]: @deva[भक्ष्य] (any edible) + @deva[मिश्रीकरण] (mixing ingredient) — @deva[गुडधानाः]

The distinction is one of food type and preparation mode. @deva[अन्न] requires cooking; @deva[भक्ष्य] is broader. @deva[व्यञ्जन] enhances after preparation; @deva[मिश्रीकरण] mixes during or before.

**End of @deva[तृतीया] @deva[तत्पुरुष]:** @ref[2.1.30]–@ref[2.1.35] = six rules for @deva[तृतीया] first members. The progression: quality-causation (@ref[2.1.30]), specific word list (@ref[2.1.31]), agent/instrument with @deva[कृदन्त] (@ref[2.1.32]), hyperbolic @deva[कृत्य] (@ref[2.1.33]), food compounds (@ref[2.1.34]–@ref[2.1.35]). The next rule (@ref[2.1.36]) begins the @deva[चतुर्थी] @deva[तत्पुरुष] section.

**@deva[समर्थ] requirement:** @ref[2.1.1] applies — the two words must be semantically connected. The mixing ingredient must actually be used with that edible in conventional practice.
"""

id = "2.1.16"
numericId = "21016"

[en]
simple = """
The word @deva[अनु] **optionally** compounds with a case-inflected word to form @deva[अव्ययीभाव] when it expresses "measured extent" (@deva[ऐश्वर्य]) — how far something stretches alongside something else.

**Examples:**
- @deva[अनुगङ्गं वाराणसी] "Varanasi stretches alongside the Ganges" — the river measures the extent of the city
- @deva[अनुयमुनं मथुरा] "Mathura stretches alongside the Yamuna"

The idea is that one entity's length or extent is measured by another. The river provides the standard of measurement for the city's extent.

**No compound when @deva[अनु] does not express measured extent:** @deva[वृक्षम् अनु विद्योतते विद्युत्] "lightning toward the tree" — directional, not measuring.
"""

standard = """
@deva[अनु] in the @deva[ऐश्वर्य] (measured extent) sense + @deva[सुबन्त] → optional @deva[अव्ययीभाव] — @deva[अनुर्लक्षणे ऐश्वर्ये].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding under @ref[2.1.11].

**Examples:**
- @deva[अनुगङ्गं वाराणसी] / @deva[गङ्गाम् अनु वाराणसी] "Varanasi alongside the Ganges"
- @deva[अनुयमुनं मथुरा] "Mathura alongside the Yamuna"

**@deva[ऐश्वर्य] = "measured extent/dominion":** The governed noun (river) serves as the standard by which the subject's extent is measured. The city stretches as far as the river does — the river "rules" the measurement.

**No compound in non-@deva[ऐश्वर्य] senses:** @deva[वृक्षम् अनु विद्योतते विद्युत्] — directional (@deva[लक्षण]), not measured extent.

**@deva[अनु] across @deva[अव्ययीभाव] rules:** @ref[2.1.15] covers @deva[अनु] + @deva[समीप] (nearness); this rule covers @deva[अनु] + @deva[ऐश्वर्य] (extent). Each sense has its own rule.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[अव्ययीभावः] from @ref[2.1.5].

@deva[अनुर्लक्षणे ऐश्वर्ये] — @deva[अनु] in the @deva[ऐश्वर्य] (measured extent) sense optionally compounds as @deva[अव्ययीभाव].

**@deva[ऐश्वर्य] = "extent measured by":** The @deva[काशिका] glosses @deva[ऐश्वर्य] as the extent or dominion of an entity as measured by a reference point. In @deva[अनुगङ्गं वाराणसी], the Ganges provides the measure — the city extends as far as the river does alongside it.

**Three senses of @deva[अनु] in @deva[अव्ययीभाव]:** @ref[2.1.15] (@deva[समीप] — nearness), this rule (@deva[ऐश्वर्य] — extent), and the general @deva[पश्चात्] sense from @ref[2.1.6]. Each receives separate treatment — demonstrating how @[pāṇini] handles polysemous particles by giving each sense its own compound conditions.

**Relationship to @ref[1.4.84]–@ref[1.4.86]:** Those rules assign @deva[कर्मप्रवचनीय] status to @deva[अनु] in @deva[लक्षण], @deva[तृतीया], and @deva[हीन] senses. The @deva[अव्ययीभाव] rules here cover different senses (@deva[समीप], @deva[ऐश्वर्य]), showing the breadth of @deva[अनु]'s grammatical functions.
"""

id = "2.1.26"
numericId = "21026"

[en]
simple = """
The word @deva[खट्वा] "bedstead" in the accusative compounds with a past participle (@deva[क्त]-ending word) to form a @deva[तत्पुरुष] compound — but only when the meaning is censure (@deva[क्षेप]).

**Examples:**
- @deva[खट्वारूढः] "one who climbed into bed" → used to mean "fool, good-for-nothing"
- @deva[खट्वाप्लुतः] "one who jumped onto a bed" → same derisive meaning

**No compound without censure:** @deva[खट्वाम् आरूढः] "one who is lying on a bed" — this is a literal, neutral statement and stays uncompounded.

**Background:** Students (@deva[ब्रह्मचारिन्]) were expected to sleep on the ground. Someone who abandoned study prematurely and "took to the bed" (i.e. married life) was called @deva[खट्वारूढः]. The term became a general insult for anyone foolish or undisciplined.
"""

standard = """
@deva[खट्वा] (@deva[द्वितीयान्त]) + @deva[क्तान्त] → @deva[तत्पुरुष] when @deva[क्षेप] (censure) is intended — @deva[खट्वा द्वितीयान्तेन क्तेन क्षेपे].

**Rule type — @deva[विधि] (@deva[नित्यसमास]):** The reproachful meaning belongs to the compound as a whole — it cannot be recovered from the uncompounded phrase @deva[खट्वाम् आरूढः] (which is neutral). Since the meaning exists only in compound form, this is @deva[नित्य].

**Examples:**
- @deva[खट्वारूढः] "fool" (lit. "bed-climber")
- @deva[खट्वाप्लुतः] "fool" (lit. "bed-jumper")

**Counter-example:** @deva[खट्वाम् आरूढः] "one lying on a bed" — no @deva[क्षेप], so no compound.

**Cultural origin:** @deva[ब्रह्मचारिन्] students sleep on the ground. @deva[खट्वारूढः] originally tagged someone who abandoned studentship prematurely for married life — later generalized to mean any fool.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4]; @deva[क्तेन] from @ref[2.1.24].

@deva[खट्वा द्वितीयान्तेन क्तेन क्षेपे] — @deva[खट्वा] in @deva[द्वितीया] compounds with a @deva[क्तान्त] word as @deva[तत्पुरुष] when @deva[क्षेप] (censure) is the intended meaning.

**@deva[नित्यसमास]:** The @deva[क्षेप] meaning ("fool") is a @deva[रूढ] (conventionalized) sense of the compound — it cannot be derived compositionally. Therefore this is @deva[नित्य]: the uncompounded @deva[खट्वाम् आरूढः] yields only the literal meaning "lying on a bed," not the reproach.

**Contrast with @ref[2.1.24]:** That rule gave optional compounding for @deva[द्वितीया] + seven specific participles. This rule narrows to one specific first member (@deva[खट्वा]) with any @deva[क्तान्त], conditioned on @deva[क्षेप]. The @deva[क्तान्त] @deva[अनुवृत्ति] continues from @ref[2.1.24].

**Why separate from @ref[2.1.24]?** @ref[2.1.24] lists @deva[श्रित], @deva[अतीत], etc. — @deva[आरूढ] and @deva[प्लुत] are not among them. Without this rule, @deva[खट्वारूढः] would have no compounding authority. The @deva[क्षेप] condition further distinguishes it: @ref[2.1.24] has no semantic restriction, while this rule requires a reproachful reading.

**@deva[काशिका]:** Explains that @deva[खट्वारूढः] originally referred to a @deva[ब्रह्मचारिन्] who prematurely took to married life (@deva[खट्वाम् आरूढः गृहस्थाश्रमम् उपगतः]). The meaning was later extended by convention (@deva[रूढि]) to any foolish person.
"""

id = "2.1.17"
numericId = "21017"

[en]
simple = """
The words @deva[तिष्ठद्गु] "cow-milking time" and others in a specified list are **always** @deva[अव्ययीभाव] compounds — they cannot be analyzed as any other compound type.

These are mostly time-related or manner-related expressions that function as fixed adverbial compounds.

**Selected examples:**
- @deva[तिष्ठद्गु] "the time a cow stands still (for milking)"
- @deva[प्राह्णम्] "morning, forenoon"
- @deva[प्रदक्षिणम्] "clockwise, to the right"
- @deva[सम्प्रति] "now, at present"
- @deva[सुषमम्] "even, level"

These are listed in a @deva[गण] (class list) — their @deva[अव्ययीभाव] status is fixed by enumeration rather than by general rule.
"""

standard = """
@deva[तिष्ठद्गु] and other listed words are @deva[नित्य] @deva[अव्ययीभाव] — @deva[तिष्ठद्गुप्रभृतीनि च].

**Rule type — @deva[विधि] (@deva[नित्यसमास] by @deva[गण]):** These compounds are obligatorily @deva[अव्ययीभाव].

**@deva[च] = @deva[नियमार्थ] (restrictive):** The @deva[च] indicates these form @deva[अव्ययीभाव] only — they cannot be analyzed as @deva[तत्पुरुष], @deva[बहुव्रीहि], or any other compound type.

**Selected @deva[गण] members:** @deva[तिष्ठद्गु], @deva[वहद्गु], @deva[समभूमि], @deva[प्राह्णम्], @deva[प्ररथम्], @deva[प्रदक्षिणम्], @deva[सम्प्रति], @deva[असम्प्रति], @deva[सुषमम्], @deva[विषमम्], @deva[दुष्षमम्], @deva[पापसमम्], @deva[पुण्यसमम्].

**Irregular formations:** Many of these cannot be derived by general @deva[अव्ययीभाव] rules (@ref[2.1.6] ff.) because their internal structure does not match any of the sixteen standard senses. This @deva[गण] rule catches the remaining, irregularly formed @deva[अव्ययीभाव] compounds.

**@deva[इच्] in @deva[कर्मव्यतिहार]:** The @deva[गण] also includes the @deva[इच्] affix forms from @ref[5.4.127]: @deva[कचाकचि] "pulling each other's hair" — reciprocal action compounds.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समासः] from @ref[2.1.3]; @deva[अव्ययीभावः] from @ref[2.1.5].

@deva[तिष्ठद्गुप्रभृतीनि च] — the @deva[तिष्ठद्गु] class is @deva[नित्य] @deva[अव्ययीभाव].

**@deva[च] as @deva[नियमार्थ]:** The @deva[काशिका] explains that @deva[च] here is restrictive (@deva[नियमार्थ]) — these words are @deva[अव्ययीभाव] and nothing else. Without @deva[च], one might analyze @deva[प्रदक्षिणम्] as @deva[तत्पुरुष] or @deva[बहुव्रीहि]; the @deva[नियम] prevents this.

**@deva[विभाषा] @deva[अधिकार] overridden:** Though @ref[2.1.11] makes subsequent rules optional, the @deva[च] here makes these @deva[नित्य] — an exception to the @deva[विभाषा] heading. The listed compounds must form; the uncompounded version is ungrammatical.

**@deva[गण] as a catch-all:** The @deva[तिष्ठद्गु] @deva[गण] collects @deva[अव्ययीभाव] compounds that cannot be generated by the preceding rules (@ref[2.1.6]–@ref[2.1.16]). It functions as an enumerated residual — ensuring complete coverage of attested @deva[अव्ययीभाव] forms.

**@deva[कर्मव्यतिहार] extension:** @ref[5.4.127] teaches the @deva[इच्] affix for reciprocal action. These forms (@deva[कचाकचि] "mutual hair-pulling," @deva[मुष्टामुष्टि] "mutual fist-fighting") are included in this @deva[गण] as @deva[अव्ययीभाव].
"""

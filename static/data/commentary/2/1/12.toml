id = "2.1.12"
numericId = "21012"

[en]
simple = """
The words @deva[अप] "away from," @deva[परि] "around," @deva[बहिस्] "outside," and direction words derived from the root @deva[अञ्चु] (like @deva[प्राञ्च्] "east," @deva[उदञ्च्] "north") **optionally** compound with a word in the ablative case (@deva[पञ्चमी]) to form @deva[अव्ययीभाव].

**Examples (compound or uncompounded — both valid):**
- @deva[अपत्रिगर्तम्] or @deva[अप त्रिगर्तेभ्यः] "away from Trigarta"
- @deva[बहिर्ग्रामम्] or @deva[बहिर् ग्रामात्] "outside the village"
- @deva[प्राग्ग्रामम्] or @deva[प्राक् ग्रामात्] "east of the village"
- @deva[परित्रिगर्तम्] or @deva[परि त्रिगर्तेभ्यः] "around Trigarta"
"""

standard = """
@deva[अप], @deva[परि], @deva[बहिस्], or @deva[अञ्चु]-derivatives + @deva[पञ्चम्यन्त] → optional @deva[अव्ययीभाव] — @deva[अपबहिर्वचनाञ्चवः पञ्चम्या].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding (under @ref[2.1.11] @deva[अधिकार]).

**Examples:**
- @deva[अपत्रिगर्तं वृष्टो देवः] / @deva[अप त्रिगर्तेभ्यो वृष्टो देवः] "it rained away from Trigarta"
- @deva[बहिर्ग्रामम्] / @deva[बहिर् ग्रामात्] "outside the village"
- @deva[प्राग्ग्रामम्] / @deva[प्राक् ग्रामात्] "east of the village"

**@deva[अञ्चु]-derivatives:** Words formed from the root @deva[अञ्चु] "to go" with directional prefixes: @deva[प्राञ्च्] (east), @deva[उदञ्च्] (north), @deva[प्रत्यञ्च्] (west), @deva[अवाञ्च्] (down), etc.

**@deva[ज्ञापक] — @deva[बहिस्] governs @deva[पञ्चमी]:** This rule implies (@deva[ज्ञापक]) that @deva[बहिस्] takes the ablative, which is confirmed by @ref[2.3.29].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[अव्ययीभावः] from @ref[2.1.5].

@deva[अपबहिर्वचनाञ्चवः पञ्चम्या] — @deva[अप], @deva[बहिस्]-expressing words, and @deva[अञ्चु]-derivatives optionally compound with @deva[पञ्चम्यन्त] as @deva[अव्ययीभाव].

**@deva[पञ्चमी] requirement:** The second member must be in the ablative — the case that expresses separation or source. This matches the semantics: "away from," "outside of," "east of" all express a point from which distance is measured.

**@deva[ज्ञापक] regarding @deva[बहिस्]:** The @deva[काशिका] notes that this rule serves as an implicit indicator (@deva[ज्ञापक]) that @deva[बहिस्] governs the ablative case. @ref[2.3.29] formally teaches this, but this @deva[ज्ञापक] provides independent evidence.

**@deva[परि] overlap:** @deva[परि] appears in @ref[2.1.6] (@deva[नित्य]) for certain senses and here (@deva[विभाषा]) for the ablative-governed sense. The @deva[विभाषा] @deva[अधिकार] (@ref[2.1.11]) makes this occurrence optional. The same particle has both @deva[नित्य] and @deva[विभाषा] compound uses depending on the sense and the case of the second member.

**@deva[अञ्चु]-derivatives as @deva[अव्यय]:** The @deva[अञ्चु]-forms (@deva[प्राक्], @deva[उदक्], etc.) function as indeclinables when used adverbially, qualifying them as first members in @deva[अव्ययीभाव].
"""

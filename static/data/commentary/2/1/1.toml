id = "2.1.1"
numericId = "21001"

[en]
simple = """
Rules that operate on complete words (@deva[पदविधि]) apply only when those words are connected in meaning (@deva[समर्थ] "semantically related").

This is a foundational principle: compounding, case assignment, and similar word-level operations require that the words involved actually relate to each other in the sentence. Words that happen to be near each other but refer to different things cannot compound.

**Example:** @deva[कष्टं श्रितः] "one who has resorted to hardship" → @deva[कष्टश्रितः] — the two words are semantically connected (the hardship is what was resorted to), so they compound.

**Counter-example:** @deva[पश्य देवदत्त कष्टम्। श्रितो विष्णुमित्रो गुरुकुलम्] "Look, Devadatta, at the hardship. @[viṣṇumitra] has gone to the teacher's house." — here @deva[कष्टम्] and @deva[श्रितः] belong to different sentences, so no compound forms despite the same words appearing.

This principle does **not** restrict sound-level rules (@deva[वर्णविधि]). Sandhi applies regardless of semantic connection.
"""

standard = """
@deva[समर्थ] (semantic connection) is required for @deva[पदविधि] (word-level rules) — @deva[समर्थः पदविधिः].

**Rule type — @deva[परिभाषा]:** A governing metarule for all word-level operations.

**Three types of @deva[पदविधि]:**
1. @deva[समास] (compounding): @ref[2.1.3]–@ref[2.2.38]
2. @deva[विभक्ति] assignment (case rules): @ref[2.3.1] ff.
3. @deva[पराङ्गवद्भाव] (treating one word as part of another)

**Example:** @ref[2.1.24] allows @deva[द्वितीया] + @deva[श्रित] etc. to compound: @deva[कष्टं श्रितः] → @deva[कष्टश्रितः]. But when @deva[कष्टम्] and @deva[श्रितः] belong to different clauses, they are not @deva[समर्थ] and cannot compound.

**Not restricted — @deva[वर्णविधि]:** Sound-level rules like sandhi apply without @deva[समर्थ]. @deva[दधि] + @deva[अशान] → @deva[दध्यशान] by @ref[6.1.77], even when the words are semantically unrelated: @deva[तिष्ठतु दध्यशान त्वं शाकेन].

**@deva[समर्थ] = "connected in meaning":** The @deva[काशिका] defines this as @deva[एकार्थीभाव] — the words jointly express a single unified meaning.
"""

advanced = """
@deva[समर्थः पदविधिः] — a @deva[पदविधि] applies only to @deva[समर्थ] (semantically connected) words.

**@deva[परिभाषा] scope:** This metarule governs all of @ref[2.1.3]–@ref[2.2.38] (@deva[समास]), @ref[2.3.1] ff. (@deva[विभक्ति] assignment), and @deva[पराङ्गवद्भाव] rules. It does not restrict @deva[वर्णविधि] (sound-level operations) — sandhi by @ref[6.1.77] or @ref[6.1.76] applies regardless of semantic connection.

**@deva[समर्थ] definition:** The @deva[काशिका] gives @deva[एकार्थीभावः समर्थः] — words that jointly convey a single meaning. The @deva[महाभाष्य] discusses competing definitions: @deva[एकतिङ्] (sharing one verb), @deva[सामानाधिकरण्य] (co-reference), and @deva[एकार्थीभाव] (unified meaning). The @deva[एकार्थीभाव] definition is the broadest and most accepted.

**Examples of @deva[समर्थ] requirement across compound types:**
- @ref[2.1.24]: @deva[कष्टश्रितः] (@deva[तत्पुरुष])
- @ref[2.1.30]: @deva[शङ्कुलाखण्डः] (@deva[तृतीया]-@deva[तत्पुरुष])
- @ref[2.1.36]: @deva[यूपदारु] (@deva[चतुर्थी]-@deva[तत्पुरुष])
- @ref[2.2.8]: @deva[राजपुरुषः] (@deva[षष्ठी]-@deva[तत्पुरुष])

**@deva[पद] vs @deva[वर्ण] distinction:** The restriction to @deva[पदविधि] is critical. @deva[सन्धि] rules operate on @deva[वर्ण] (sounds), not @deva[पद] (words), so they are exempt. This is why @deva[तिष्ठतु दध्यशान त्वं शाकेन] shows sandhi between semantically unrelated words.
"""

id = "2.1.32"
numericId = "21032"

[en]
simple = """
A word in the instrumental case (@deva[तृतीया]) that denotes an agent (@deva[कर्तृ]) or instrument (@deva[करण]) compounds "diversely" (@deva[बहुलम्]) with a @deva[कृदन्त] word (a verbal derivative) to form @deva[तत्पुरुष].

**Examples:**
- @deva[अहिहतः] "killed by a snake" — the snake is the agent
- @deva[नखनिर्भिन्नः] "pierced by nails" — the nails are the instrument
- @deva[परशुच्छिन्नः] "cut by an axe" — the axe is the instrument

**"Diversely" means:** the compounding happens sometimes but not always — usage and tradition determine when it applies. For instance, @deva[दात्रेण लूनवान्] "cutting with a sickle" does not compound, even though the pattern seems to fit.
"""

standard = """
@deva[तृतीयान्त] (expressing @deva[कर्तृ] or @deva[करण] per @ref[2.3.18]) + @deva[कृदन्त] → @deva[बहुलम्] @deva[तत्पुरुष] — @deva[कर्तृकरणे कृता बहुलम्].

**Rule type — @deva[विधि] (@deva[बहुलम्]):** The @deva[बहुलम्] designation means compounding is neither obligatory nor simply optional — it operates irregularly, sometimes applying and sometimes not.

**Examples:**
- @deva[अहिहतः] "snake-killed" (@deva[कर्तृ])
- @deva[नखनिर्भिन्नः] "nail-pierced" (@deva[करण])
- @deva[परशुच्छिन्नः] "axe-cut" (@deva[करण])

**@deva[कर्तृ]/@deva[करण] condition:** The @deva[तृतीया] must express agent or instrument (as taught at @ref[2.3.18]). Counter-example: @deva[भिक्षाभिरुषितः] "dwelt with alms" — the @deva[तृतीया] here has the associative sense of @ref[2.3.21], not @ref[2.3.18], so no compound.

**@deva[बहुलम्] in practice:** Compound does NOT form: @deva[दात्रेण लूनवान्] "cutting with a sickle." Compound DOES form despite irregularity: @deva[पादहारकः] "foot-stealer," @deva[गलेचोपकः]. Usage and convention govern the exceptions.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[तृतीया] from @ref[2.1.30]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[कर्तृकरणे कृता बहुलम्] — a @deva[तृतीयान्त] word expressing @deva[कर्तृ] or @deva[करण] (per @ref[2.3.18]) compounds with a @deva[कृदन्त] diversely as @deva[तत्पुरुष].

**@deva[बहुलम्] vs @deva[विभाषा]:** @deva[विभाषा] (@ref[2.1.11]) gives a clean binary — compound or don't. @deva[बहुलम्] is weaker: it signals that the operation applies irregularly, governed by usage (@deva[प्रयोग]) rather than strict rule. The @deva[काशिका] glosses: @deva[बहुलग्रहणम् अनियमार्थम्].

**Semantic restriction — @ref[2.3.18]:** The @deva[तृतीया] must be in the @deva[कर्तृ] or @deva[करण] sense specifically. @deva[भिक्षाभिरुषितः] "dwelt with alms" — the @deva[तृतीया] is associative (@ref[2.3.21]: @deva[इत्थम्भूतलक्षणे]), not @deva[कर्तृ]/@deva[करण], so no compound.

**@deva[कृता] = @deva[कृदन्त]:** The second member must be a @deva[कृत्]-affix derivative. This covers @deva[क्त] (@deva[हत], @deva[छिन्न], @deva[भिन्न]), @deva[क्तवतु] (@deva[लूनवत्]), and other @deva[कृत्] forms. The range is broader than @ref[2.1.24]–@ref[2.1.28] (which required @deva[क्तान्त] specifically).

**Exceptions under @deva[बहुलम्]:** The @deva[काशिका] notes: compound sometimes fails despite meeting conditions (@deva[दात्रेण लूनवान्]); compound sometimes succeeds despite marginal conditions (@deva[पादहारकः], @deva[गलेचोपकः]). This flexibility accommodates established usage that a strict rule would block.

**Relation to @ref[2.1.30]:** @ref[2.1.30] required @deva[गुणवचन] as the second member. This rule broadens to @deva[कृदन्त] — a much larger class — but restricts the @deva[तृतीया] to @deva[कर्तृ]/@deva[करण] specifically.
"""

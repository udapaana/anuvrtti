id = "2.1.41"
numericId = "21041"

[en]
simple = """
A word in the locative case (@deva[सप्तमी]) **optionally** compounds with the words @deva[सिद्ध] "accomplished/perfected," @deva[शुष्क] "dried," @deva[पक्व] "cooked/ripened," or @deva[बन्ध] "bound" to form @deva[तत्पुरुष].

**Examples:**
- @deva[आतपशुष्कः] "sun-dried" (= @deva[आतपे शुष्कः] "dried in the sun")
- @deva[छायाशुष्कः] "shade-dried"
- @deva[स्थालीपक्वः] "pot-cooked" (= @deva[स्थाल्यां पक्वः] "cooked in a pot")
- @deva[कुम्भीपक्वः] "cooked in an earthen jar"
- @deva[साङ्काश्यसिद्धः] "perfected at @deva[साङ्काश्य]" (a place)
- @deva[चक्रबन्धः] "bound on the wheel"

The locative first member tells where or how the action happened — "dried **in** the sun," "cooked **in** a pot."
"""

standard = """
@deva[सप्तम्यन्त] + @deva[सिद्ध]/@deva[शुष्क]/@deva[पक्व]/@deva[बन्ध] → @deva[विभाषा] @deva[तत्पुरुष] — @deva[सिद्धशुष्कपक्वबन्धैश्च].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding under @ref[2.1.11].

**Examples:**
- @deva[आतपशुष्कः] "dried in sunlight," @deva[छायाशुष्कः] "dried in shade"
- @deva[स्थालीपक्वः] "cooked in a pot," @deva[कुम्भीपक्वः] "cooked in a jar"
- @deva[साङ्काश्यसिद्धः] "perfected at @deva[साङ्काश्य]," @deva[काम्पिल्यसिद्धः] "perfected at @deva[काम्पिल्य]"
- @deva[चक्रबन्धः] "bound on a wheel"

**Four specific words:** Unlike @ref[2.1.40] (which used a @deva[गण] list), this rule enumerates four words directly. All four are past-participial or action-result words — the locative first member specifies the location or medium of the action.

**Accent:** @ref[6.2.32] governs the accent of these compounds.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सप्तमी] from @ref[2.1.40]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[सिद्धशुष्कपक्वबन्धैश्च] — @deva[सप्तम्यन्त] optionally compounds with @deva[सिद्ध], @deva[शुष्क], @deva[पक्व], or @deva[बन्ध] as @deva[तत्पुरुष].

**@deva[च] connects to @ref[2.1.40]:** The @deva[च] adds these four words to the @deva[शौण्डादि] list from the previous rule. Both rules share the @deva[सप्तमी] first member requirement.

**Locative sense:** The @deva[सप्तमी] here expresses @deva[आधार] — the location, medium, or circumstance of the action. @deva[आतपे शुष्कः] "dried in sunlight" — the sunlight is the @deva[आधिकरण] (locus) of drying.

**Relation to @ref[2.1.32]:** The @deva[काशिका] notes that these compounds also illustrate the @deva[बहुलम्] principle of @ref[2.1.32]. That rule's broad scope (@deva[कर्तृ]/@deva[करण] with @deva[कृदन्त]) could in principle cover some of these, but this rule provides specific authority with @deva[विभाषा] rather than the irregular @deva[बहुलम्].

**Accent:** @ref[6.2.32] specifies the accent pattern for @deva[सप्तमी] @deva[तत्पुरुष] compounds with these words.
"""

id = "2.1.7"
numericId = "21007"

[en]
simple = """
The indeclinable @deva[यथा] "according to" obligatorily forms an @deva[अव्ययीभाव] compound — but **not** when it means "likeness" or "resemblance."

**Compounds (non-likeness senses):**
- @deva[यथावृद्धम्] "according to seniority" — @deva[यथावृद्धं ब्राह्मणान् आमन्त्रयस्व] "invite the Brahmins in order of seniority"
- @deva[यथाध्यापकम्] "according to each teacher"

**No compound (likeness sense):**
- @deva[यथा देवदत्तः तथा यज्ञदत्तः] "as Devadatta is, so is @[yajñadatta]" — here @deva[यथा] means "like," so it stays separate.

This rule clarifies that the @deva[यथार्थवचन] sense in @ref[2.1.6] covers three of @deva[यथा]'s four uses (correspondence, severalty, limit) but excludes resemblance.
"""

standard = """
@deva[यथा] forms obligatory @deva[अव्ययीभाव] except in the @deva[सादृश्य] (likeness) sense — @deva[यथासादृश्ये].

**Rule type — @deva[विधि] with exclusion:** @deva[नित्यसमास] for @deva[यथा] in non-likeness senses.

**Examples:**
- @deva[यथावृद्धम्] "by seniority" — @deva[अनुपूर्व्य] (sequence) sense
- @deva[यथाध्यापकम्] "per teacher" — distribution sense

**No compound:** @deva[यथा देवदत्तः तथा यज्ञदत्तः] "as Devadatta, so @[yajñadatta]" — @deva[सादृश्य] sense, no compounding.

**Clarifies @ref[2.1.6]:** The @deva[यथार्थवचन] entry in @ref[2.1.6] covers three senses of @deva[यथा]: correspondence, severalty, and limit. This rule explicitly excludes the fourth sense (@deva[सादृश्य]).

**Why exclude @deva[सादृश्य]?** In the likeness sense, @deva[यथा] correlates with @deva[तथा] in a separate clause — the two words belong to different sentences, so the @deva[समर्थ] requirement (@ref[2.1.1]) would also block compounding.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अव्ययम्] from @ref[2.1.6]; @deva[समासः] from @ref[2.1.3]; @deva[अव्ययीभावः] from @ref[2.1.5].

@deva[यथासादृश्ये] — @deva[यथा] forms @deva[अव्ययीभाव] except when expressing @deva[सादृश्य] (resemblance/likeness).

**Four senses of @deva[यथा]:** The @deva[काशिका] distinguishes:
1. @deva[अनुपूर्व्य] (sequence): @deva[यथावृद्धम्] "by order of seniority"
2. @deva[प्रत्येकम्] (severalty/distribution): @deva[यथाध्यापकम्] "per each teacher"
3. @deva[अवधि] (limit): @deva[यथायथम्] "up to a point"
4. @deva[सादृश्य] (likeness): @deva[यथा देवदत्तः तथा यज्ञदत्तः]

Only sense 4 is excluded. Senses 1–3 trigger obligatory @deva[अव्ययीभाव].

**Why a separate rule?** @ref[2.1.6] lists @deva[यथार्थवचन] as one of sixteen senses. Without this rule, one might think @deva[यथा] compounds in all its senses. This rule restricts: @deva[सादृश्य] is carved out. The @deva[सादृश्य] use of @deva[यथा] typically involves a correlative @deva[तथा] in a separate clause, making the words non-@deva[समर्थ] (@ref[2.1.1]).

**Relationship to @ref[2.1.6] sense 13:** @ref[2.1.6] separately lists @deva[सादृश्यवचन] with the example @deva[ससखि] "like a friend." That @deva[सादृश्य] sense uses @deva[स] (not @deva[यथा]), so there is no conflict — @deva[यथा] is excluded from @deva[सादृश्य], but @deva[स] is not.
"""

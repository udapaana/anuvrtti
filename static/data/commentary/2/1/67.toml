id = "2.1.67"
numericId = "21067"

[en]
simple = """
The word @deva[युवन्] "young" compounds with the words @deva[खलति] "bald," @deva[पलित] "grey-haired," @deva[वलिन] "wrinkled," and @deva[जरत्] "aged/decrepit" to form @deva[तत्पुरुष]. These compounds describe someone who has signs of old age despite being young — an unusual, noteworthy combination.

**Examples:**
- @deva[युवखलतिः] "young yet bald" (masculine), @deva[युवखलती] (feminine)
- @deva[युवपलितः] "young yet grey-haired"
- @deva[युववलिनः] "young yet wrinkled"
- @deva[युवजरन्] "young yet appearing old — prematurely aged"
"""

standard = """
@deva[युवन्] + @deva[खलति]/@deva[पलित]/@deva[वलिन]/@deva[जरत्] → @deva[तत्पुरुष] in @deva[समानाधिकरण] — @deva[युवा खलतिपलितवलिनजरतीभिः].

**Rule type — @deva[विधि]:** Compounding rule within @deva[कर्मधारय].

**Examples:**
- @deva[युवखलतिः] / @deva[युवखलती] "bald in youth"
- @deva[युवपलितः] / @deva[युवपलिता] "grey-haired in youth"
- @deva[युववलिनः] / @deva[युववलिना] "wrinkled in youth"
- @deva[युवजरन्] / @deva[युवजरती] "prematurely old"

**Semantic tension:** These words normally describe conditions of old age. Their combination with @deva[युवन्] is semantically surprising — a young person with old-age characteristics. This unusual combination motivates a specific compounding rule.

**Gender flexibility:** The @deva[काशिका] notes that @deva[जरती] in the @[sūtra] text appears in the feminine to invoke the principle @deva[प्रातिपदिकग्रहणे लिङ्गविशिष्टस्यापि ग्रहणम्] — when a @deva[प्रातिपदिक] is cited, it covers gender-variant forms too. So @deva[युवजरन्] (masc.) and @deva[युवजरती] (fem.) are both valid.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[युवा खलतिपलितवलिनजरतीभिः] — @deva[युवन्] compounds with these four words as @deva[कर्मधारय] @deva[तत्पुरुष].

**@deva[जरती] and the gender-inclusion principle:** The @[sūtra] cites @deva[जरती] (feminine of @deva[जरत्]). The @deva[काशिका] invokes the @deva[परिभाषा]: @deva[प्रातिपदिकग्रहणे लिङ्गविशिष्टस्यापि ग्रहणम्] — a @deva[प्रातिपदिक] cited in grammar covers all its gender-derived forms. So @deva[जरत्] (masc.) is also included, yielding @deva[युवजरन्].

**Why specific listing?** @ref[2.1.57] could cover this under @deva[बहुलम्], but the @deva[बहुलम्] designation makes compounding uncertain. This rule provides specific authority — for @deva[युवन्] + these four age-words, compounding is definite.

**Restricted set:** Only these four words compound with @deva[युवन्]. Other age-related words or conditions do not qualify — the rule is a closed list, not a semantic class.

**Within @deva[कर्मधारय] structure:** This rule adds to the series of specific first-member rules: @deva[पूर्वकाल] (@ref[2.1.49]), @deva[एक]/@deva[सर्व] etc. (@ref[2.1.49]), ordinals (@ref[2.1.58]), praise words (@ref[2.1.61]), @deva[कतर]/@deva[कतम] (@ref[2.1.63]), @deva[किम्] (@ref[2.1.64]), and now @deva[युवन्] (@ref[2.1.67]).
"""

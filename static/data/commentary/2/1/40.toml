id = "2.1.40"
numericId = "21040"

[en]
simple = """
A word in the locative case (@deva[सप्तमी]) **optionally** compounds with words from the @deva[शौण्डादि] list — words that express skill, expertise, addiction, or cunning in a domain — to form @deva[तत्पुरुष].

**Examples:**
- @deva[अक्षशौण्डः] "skilled/addicted in dice" (= @deva[अक्षेषु शौण्डः])
- @deva[अक्षधूर्तः] "cunning in dice"
- @deva[अक्षकितवः] "a gamester in dice"

The locative expresses the domain or field in which the person has skill or vice — "skilled **in** dice," "cunning **in** gambling."

This is the **first @deva[सप्तमी] @deva[तत्पुरुष] rule** — the @deva[पञ्चमी] section ended at @ref[2.1.39].
"""

standard = """
@deva[सप्तम्यन्त] + @deva[शौण्डादि] → @deva[विभाषा] @deva[तत्पुरुष] — @deva[सप्तमी शौण्डैः].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding under @ref[2.1.11].

**Examples:**
- @deva[अक्षशौण्डः] = @deva[अक्षेषु शौण्डः] "addicted to dice"
- @deva[अक्षधूर्तः] "cunning in dice"
- @deva[अक्षकितवः] "a gambler in dice"

**@deva[शौण्डादि] @deva[गण]:** The plural @deva[शौण्डैः] signals a class list. Members include: @deva[शौण्ड] "addicted/skilled," @deva[धूर्त] "cunning," @deva[कितव] "gamester," @deva[व्याड] "vicious," @deva[प्रवीण] "proficient," @deva[पटु] "clever," @deva[पण्डित] "learned," @deva[कुशल] "skilled," @deva[चपल] "fickle," @deva[निपुण] "expert," and others.

**Locative sense:** The @deva[सप्तमी] marks the domain of expertise or vice — the field in which the quality applies.

**Beginning of @deva[सप्तमी] section:** @ref[2.1.40]–@ref[2.1.48] cover @deva[सप्तमी] first members — the last and longest case-based @deva[तत्पुरुष] subsection.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[सप्तमी शौण्डैः] — a @deva[सप्तम्यन्त] word optionally compounds with words from the @deva[शौण्डादि] @deva[गण] as @deva[तत्पुरुष].

**@deva[शौण्डादि] list:** The @deva[गणपाठ] lists approximately 16 words: @deva[शौण्ड], @deva[धूर्त], @deva[कितव], @deva[व्याड], @deva[प्रवीण], @deva[संवीत], @deva[अन्तर्] (in place-sense), @deva[अधि], @deva[पटु] (or @deva[अधिपटु]), @deva[पण्डित], @deva[कुशल], @deva[चपल], @deva[निपुण], @deva[संव्याड], @deva[मन्य], @deva[समीर]. The @deva[बहुवचन] in @deva[शौण्डैः] indicates this is a @deva[गण]-reference, not a single word.

**Case transition:** This begins the @deva[सप्तमी] section. Note that @deva[षष्ठी] @deva[तत्पुरुष] has no dedicated rules in this section — @deva[षष्ठी] compounds are handled by the general @ref[2.2.8] (@deva[षष्ठी]) in the next @deva[पाद]. The case progression here skips from @deva[पञ्चमी] to @deva[सप्तमी].

**@deva[सप्तमी] as domain marker:** The locative here expresses @deva[आधार] — the domain in which the quality obtains. @deva[अक्षेषु शौण्डः] "addicted in (the matter of) dice." This is the @deva[विषयाधिकरण] use of @deva[सप्तमी].

**Relation to @ref[2.1.31]:** @ref[2.1.31] listed @deva[निपुण] with @deva[तृतीया] (@deva[वाङ्निपुणः] "skilled by means of speech"). Here @deva[निपुण] appears with @deva[सप्तमी] (@deva[अक्षनिपुणः] "skilled in dice"). The different cases express different semantic relationships: instrument vs. domain.
"""

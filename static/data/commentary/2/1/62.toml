id = "2.1.62"
numericId = "21062"

[en]
simple = """
A noun denoting something worthy of respect compounds with the words @deva[वृन्दारक] "eminent," @deva[नाग] "lordly (lit. elephant/serpent)," or @deva[कुञ्जर] "lordly (lit. elephant)" as second member to form @deva[तत्पुरुष]. These words express excellence or eminence — they are not used in their literal animal meanings.

**Examples:**
- @deva[गोवृन्दारकः] "an excellent bull/cow"
- @deva[अश्ववृन्दारकः] "an excellent horse"
- @deva[गोनागः] "a lordly bull"
- @deva[गोकुञ्जरः] "a magnificent bull"

**No compound with literal meaning:** @deva[सुसीमो नागः] "the serpent @deva[सुसीम]" — here @deva[नाग] means an actual serpent, not a title of eminence, so no compound.
"""

standard = """
@deva[आदरणीयवाचक] + @deva[वृन्दारक]/@deva[नाग]/@deva[कुञ्जर] → @deva[तत्पुरुष] in @deva[समानाधिकरण] — @deva[वृन्दारकनागकुञ्जरैः].

**Rule type — @deva[विधि]:** Compounding rule within @deva[कर्मधारय].

**Examples:**
- @deva[गोवृन्दारकः] "an excellent cow/bull"
- @deva[अश्ववृन्दारकः] "an excellent horse"
- @deva[गोनागः] "a lordly bull"
- @deva[गोकुञ्जरः] "a magnificent bull"

**Counter-example:** @deva[सुसीमो नागः] "the serpent @deva[सुसीम]" — @deva[नाग] used in its literal serpent-meaning, not as a laudatory epithet. No compound.

**Laudatory second member:** These three words function as titles of eminence when used figuratively. @deva[गोवृन्दारकः] does not mean "a cow that is an eminent person" but "an eminent specimen of a cow."

**Contrast with @ref[2.1.61]:** @ref[2.1.61] had five laudatory first members (@deva[सत्], @deva[महत्], etc.). This rule has three laudatory second members. Together they cover praise-compounds from both directions.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[वृन्दारकनागकुञ्जरैः] — a @deva[पूजार्ह] word compounds with @deva[वृन्दारक], @deva[नाग], or @deva[कुञ्जर] as @deva[कर्मधारय] @deva[तत्पुरुष].

**@deva[पूजार्ह] from @ref[2.1.61]:** The condition that the referent be respect-worthy continues. @deva[सुसीमो नागः] fails because @deva[नाग] is used literally (a specific serpent), not as a laudatory epithet.

**Order reversal from @ref[2.1.61]:** @ref[2.1.61] had praise-word first (@deva[महापुरुषः]). Here the praised entity comes first (@deva[गोवृन्दारकः]). The @deva[वृन्दारक]/@deva[नाग]/@deva[कुञ्जर] word is the @deva[विशेषण] (qualifier expressing eminence), but stands second — an exception to @ref[2.2.30]'s @deva[उपसर्जनं पूर्वम्] principle, justified by this rule's specific framing.

**Figurative use:** These words lose their literal animal meanings in compound. @deva[गोनागः] is not "a cow-serpent" but "a cow that is lordly." This figurative shift is the basis for the @deva[पूजार्ह] condition — without it, the compound would be meaningless.

**Relation to @ref[2.1.56]:** @ref[2.1.56] had @deva[व्याघ्रादि] (including @deva[नाग] and @deva[कुञ्जर]) as comparison standards with @deva[उपमित] first members. The difference: @ref[2.1.56] involves comparison ("man like a tiger"), while this rule involves praise ("an excellent cow"). The same words (@deva[नाग], @deva[कुञ्जर]) appear in both but with different semantic functions.
"""

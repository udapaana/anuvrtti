id = "2.1.20"
numericId = "21020"

[en]
simple = """
A numeral (@deva[सङ्ख्या]) may **optionally** compound with a river name to form @deva[अव्ययीभाव], denoting a place where multiple streams of that river meet — a confluence.

**Examples:**
- @deva[सप्तगङ्गम्] "where seven streams of the Ganges meet"
- @deva[द्वियमुनम्] "where two Yamunas meet"
- @deva[पञ्चनदम्] "where the five rivers meet" (the Punjab region)
- @deva[सप्तगोदावरम्] "where seven @[godāvarī] streams meet"

These are essentially place names formed from the number of tributaries or branches of a river that converge at a single point.
"""

standard = """
@deva[सङ्ख्या] + river name → optional @deva[अव्ययीभाव] in the @deva[समाहार] (confluence) sense — @deva[नदीभिश्च].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding under @ref[2.1.11].

**Examples:**
- @deva[सप्तगङ्गम्] "seven-Ganges confluence"
- @deva[द्वियमुनम्] "two-Yamuna confluence"
- @deva[पञ्चनदम्] "five-river confluence" (= Punjab)
- @deva[सप्तगोदावरम्] "@[seven-godāvarī] confluence"

**@deva[समाहार] = "collection/confluence":** The compound denotes the place where multiple branches of the same river come together — a geographical confluence.

**Extension of @ref[2.1.19]:** @ref[2.1.19] taught @deva[सङ्ख्या] + @deva[वंश्य] (lineage). This rule extends the same pattern to river names. The @deva[च] ("and") adds rivers to the previous rule's scope.

**Resemblance to @deva[द्विगु]:** Like @ref[2.1.19], these numeral-first compounds structurally resemble @deva[द्विगु]. Their classification as @deva[अव्ययीभाव] makes the numeral semantically principal.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सङ्ख्यया] from @ref[2.1.19]; @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[अव्ययीभावः] from @ref[2.1.5].

@deva[नदीभिश्च] — numerals also compound with river names as optional @deva[अव्ययीभाव].

**@deva[च] extends @ref[2.1.19]:** @ref[2.1.19] taught @deva[सङ्ख्या] + @deva[वंश्य]. The @deva[च] here adds @deva[नदी] (rivers) to that scope — both lineage members and river names can form numeral-first @deva[अव्ययीभाव].

**@deva[समाहार] sense:** The @deva[महाभाष्य] explains these compounds as expressing @deva[समाहार] — the collection or meeting of multiple streams. @deva[सप्तगङ्गम्] is not "seven Ganges rivers" but "the place where seven branches of the Ganges converge."

**Geographical @deva[संज्ञा]:** These compounds often function as place names: @deva[पञ्चनदम्] = Punjab (from the five rivers: @deva[विपाशा], @deva[शतद्रु], @deva[इरावती], @deva[चन्द्रभागा], @deva[वितस्ता]). The @deva[अव्ययीभाव] form is the basis for the regional name.

**@deva[द्विगु] alternative:** Without this rule, @deva[सप्तगङ्गम्] could be @deva[द्विगु] (@deva[समाहार] — "collection of seven Ganges" as @deva[तत्पुरुष] subtype). This rule's classification as @deva[अव्ययीभाव] prioritizes the numeral as the principal meaning.
"""

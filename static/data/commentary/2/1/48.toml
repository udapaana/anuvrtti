id = "2.1.48"
numericId = "21048"

[en]
simple = """
Certain listed compounds with a locative first member and a contemptuous meaning are classified as @deva[तत्पुरुष]. These are from the @deva[पात्रेसमितादि] list — a @deva[गण] (class list) of established compounds, each expressing censure.

**Examples:**
- @deva[पात्रेसमिताः] "a dish-companion" — a parasite who appears only at mealtimes
- @deva[गेहेशूरः] "a hero at home" — brave only within the house, a coward outside
- @deva[गोष्ठेपण्डितः] "a scholar in the cowshed" — learned only in trivial settings
- @deva[कूपमण्डूकः] "a well-frog" — someone with a narrow worldview

All these are contemptuous epithets — the locative marks where the person displays a quality they lack in the real world.

This is the **last case-based @deva[तत्पुरुष] rule**. The next rule (@ref[2.1.49]) begins the @deva[कर्मधारय] section.
"""

standard = """
@deva[पात्रेसमितादि] @deva[गण] → @deva[तत्पुरुष] — @deva[पात्रेसमितादयश्च].

**Rule type — @deva[विधि]:** Compounding by @deva[गण] list.

**Examples from the list:**
- @deva[पात्रेसमिताः], @deva[पात्रेबहुलाः] "a parasite" — always present at the dining plate
- @deva[कूपमण्डूकः] "well-frog" — narrow-minded
- @deva[कूपकच्छपः] "well-tortoise"
- @deva[नगरकाकः], @deva[नगरवायसः] "city-crow" — urban scavenger
- @deva[गेहेशूरः] "hero at home," @deva[गोष्ठेशूरः] "hero in the cowshed"
- @deva[गेहेनर्दी] "roarer at home," @deva[गेहेक्ष्वेडी] "hisser at home"
- @deva[गर्भेतृप्तः] "satisfied in the womb" — born lazy

**@deva[गण] list:** The @deva[पात्रेसमितादि] is a closed list of approximately 34 compounds. Many express @deva[क्षेप] (censure) — the person has the quality only in the limited setting named by the locative.

**Case retention:** Many items in this list retain the @deva[सप्तमी] case ending (@deva[अलुक्]) — @deva[पात्रे]-, @deva[गेहे]-, @deva[गोष्ठे]-.

**Accent:** These compounds are a subdivision of the @deva[युक्तारोह्यादि] class (@ref[6.2.81]), receiving @deva[उदात्त] on the first syllable of the first member.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[पात्रेसमितादयश्च] — the compounds listed in the @deva[पात्रेसमितादि] @deva[गण] are @deva[तत्पुरुष].

**@deva[गण] contents:** The list includes approximately 34 items, many with @deva[सप्तमी] @deva[अलुक्]:
- @deva[पात्रेसमिताः], @deva[पात्रेबहुलाः] (parasite)
- @deva[उदुम्बरमशकः], @deva[उदुम्बरकृमिः], @deva[उदरकृमिः] (worm-like creatures)
- @deva[कूपकच्छपः], @deva[अवटकच्छपः], @deva[कूपमण्डूकः], @deva[कुम्भमण्डूकः], @deva[उदपानमण्डूकः] (well-dwelling creatures)
- @deva[नगरकाकः], @deva[नगरवायसः] (city crows)
- @deva[गेहेशूरः], @deva[गेहेनर्दी], @deva[गेहेक्ष्वेडी], @deva[गेहेविजिती], @deva[गेहेव्याडः], @deva[गेहेमेही], @deva[गेहेदाही], @deva[गेहेदृप्तः], @deva[गेहेधृष्टः] (domestic bravado)
- @deva[गोष्ठेशूरः], @deva[गोष्ठेविजिती], @deva[गोष्ठेक्ष्वेडी], @deva[गोष्ठेपटुः], @deva[गोष्ठेपण्डितः], @deva[गोष्ठेप्रगल्भः] (cowshed bravado)

**Relation to @ref[2.1.47]:** Both rules handle @deva[सप्तमी] + @deva[क्षेप]. @ref[2.1.47] is productive (any locative + @deva[क्तान्त] with censure). This rule lists specific established compounds, some with non-@deva[क्तान्त] second members (@deva[शूर], @deva[पण्डित], @deva[मण्डूक]).

**Accent by @ref[6.2.81]:** The @deva[काशिका] notes that this @deva[गण] is a subdivision of @deva[युक्तारोह्यादि] — compounds whose first member receives initial @deva[उदात्त]. Some items could have been formed under @ref[2.1.47] with @deva[क्तान्त], but are listed here specifically for this accent purpose.

**End of case-based @deva[तत्पुरुष]:** @ref[2.1.24]–@ref[2.1.48] = 25 rules covering @deva[द्वितीया] through @deva[सप्तमी] first members. The next rule (@ref[2.1.49]) begins the @deva[कर्मधारय] subsection — appositional compounds where both members refer to the same entity.
"""

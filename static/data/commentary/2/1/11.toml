id = "2.1.11"
numericId = "21011"

[en]
simple = """
From this rule onward, compounding is **optional** (@deva[विभाषा]). The same meaning can be expressed either as a compound or as separate words.

The @deva[अव्ययीभाव] compounds taught before this rule (@ref[2.1.6]–@ref[2.1.10]) — such as @deva[सुमद्रम्] "prosperous in Madra," @deva[यथावृद्धम्] "by seniority," @deva[अक्षपरि] "unlucky throw" — are **obligatory** (@deva[नित्य]). Their meaning cannot be expressed by leaving the words uncompounded.

From this point on, both the compounded and uncompounded forms are valid:
- @deva[अपत्रिगर्तम्] = @deva[अप त्रिगर्तेभ्यः] "away from Trigarta" (both correct)
"""

standard = """
This @deva[अधिकार] introduces @deva[विभाषा] (optionality) for subsequent @deva[अव्ययीभाव] rules — @deva[विभाषा].

**Rule type — @deva[अधिकार]:** Governs @ref[2.1.12]–@ref[2.1.21], making all compounds within this range optional.

**@deva[नित्य] vs @deva[विभाषा]:**
- Before this rule (@ref[2.1.6]–@ref[2.1.10]): @deva[नित्यसमास] — compounding is obligatory; the uncompounded paraphrase either doesn't convey the same meaning or requires extra words
- After this rule (@ref[2.1.12]–@ref[2.1.21]): @deva[विभाषा] — both compounded and uncompounded forms are grammatically valid with the same meaning

**Example:** @deva[अपत्रिगर्तम्] (compound) = @deva[अप त्रिगर्तेभ्यः] (uncompounded) — both mean "away from Trigarta."

**Scope:** Through @ref[2.1.21], the end of the @deva[अव्ययीभाव] section.
"""

advanced = """
@deva[विभाषा] — @deva[अधिकार] introducing optionality for @ref[2.1.12]–@ref[2.1.21].

**@deva[नित्यसमास] vs @deva[विभाषासमास]:** The @deva[अव्ययीभाव] section is divided by this rule:
- @ref[2.1.6]–@ref[2.1.10]: @deva[नित्य] — the compound must form; the uncompounded version either fails to convey the same meaning or is ungrammatical
- @ref[2.1.12]–@ref[2.1.21]: @deva[विभाषा] — the speaker may choose either form

**@deva[वार्त्तिक] — @deva[नित्यसमासोऽव्ययीभावः]:** Some commentators argue that all @deva[अव्ययीभाव] should be @deva[नित्य]. This @deva[वार्त्तिक] is debated — the @deva[काशिका] accepts the @deva[विभाषा] @deva[अधिकार] as genuine, making rules after @ref[2.1.11] optional.

**Why @deva[नित्य] for @ref[2.1.6]–@ref[2.1.10]?** The @deva[काशिका] explains: in @deva[नित्य] compounds like @deva[सुमद्रम्] "prosperous in Madra," the uncompounded @deva[सु मद्रेषु] doesn't convey exactly the same sense — @deva[सु] as an independent @deva[अव्यय] doesn't mean "prosperous" without the compound context. In optional compounds like @deva[अपत्रिगर्तम्], the uncompounded @deva[अप त्रिगर्तेभ्यः] conveys the identical meaning.

**@deva[विभाषा] = @deva[वा]:** In @[pāṇinian] terminology, @deva[विभाषा] means "optionally" — the rule applies at the speaker's discretion.
"""

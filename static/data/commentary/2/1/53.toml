id = "2.1.53"
numericId = "21053"

[en]
simple = """
Words expressing something contemptible (@deva[कुत्सित]) compound with words expressing vileness (@deva[कुत्सन]) to form @deva[तत्पुरुष] — when both words together convey censure about the same person or thing.

**Examples:**
- @deva[वैयाकरणखसूचिः] "a worthless grammarian" — @deva[वैयाकरण] "grammarian" (the contemptible thing) + @deva[खसूचि] "head-scratcher" (the vile quality)
- @deva[याज्ञिककितवः] "a sacrificer-gamester" — one who performs sacrifices for unworthy patrons

The compound form carries a derisive force that the uncompounded phrase does not.

**No compound without contempt:** @deva[कुत्सितो ब्राह्मणः] "the bad @deva[ब्राह्मण]" — this is a straightforward negative description, not a contemptuous compound term. Both words must contribute to the censure.
"""

standard = """
@deva[कुत्सितवाचक] + @deva[कुत्सनवाचक] → @deva[तत्पुरुष] in @deva[समानाधिकरण] — @deva[कुत्सितानि कुत्सनैः].

**Rule type — @deva[विधि]:** Compounding rule within @deva[कर्मधारय].

**Examples:**
- @deva[वैयाकरणखसूचिः] — @deva[वैयाकरण] (grammarian who studies poorly) + @deva[खसूचि] (lit. "sky-pointer" — one who scratches his head and stares vacantly when asked a question)
- @deva[याज्ञिककितवः] "sacrificer-gamester" — one who performs sacrifices for undeserving patrons
- @deva[मीमांसकदुर्दुरूढः] "an unbelieving logician"

**Both members must express censure:** The contempt must be directed through the signification of both words. @deva[वैयाकरणश्चौरः] "the thief grammarian" does NOT compound — "grammarian" here is not used contemptuously, only "thief" is. Similarly @deva[कुत्सितो ब्राह्मणः] "bad @deva[ब्राह्मण]" does not compound.

**@deva[कुत्सित] vs @deva[कुत्सन]:** @deva[कुत्सित] = the thing/person viewed with contempt; @deva[कुत्सन] = the word expressing the vileness or deficiency. Both must bear a contemptuous reading.

**Order exception:** Normally in @deva[कर्मधारय], the qualifying word comes first (@ref[2.2.30]). Here, the @deva[कुत्सित] word (the qualified term) stands first, with the @deva[कुत्सन] word (the qualifier) second — an exception to the usual @deva[उपसर्जन]-first order.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[कुत्सितानि कुत्सनैः] — words expressing something contemptible compound with words expressing vileness as @deva[कर्मधारय] @deva[तत्पुरुष].

**Reversed order — exception to @ref[2.2.30]:** By @ref[2.2.30] (@deva[उपसर्जनं पूर्वम्]), the @deva[उपसर्जन] (qualifying/subordinate member) should stand first. In normal @deva[कर्मधारय], the adjective precedes: @deva[नीलोत्पलम्] "blue lotus." This rule places the @deva[कुत्सित] term (the thing contemned) first and the @deva[कुत्सन] term (the expression of vileness) second — reversing the expected order. This is precisely why this rule is stated: to authorize this exceptional ordering.

**@deva[खसूचि] etymology:** The @deva[काशिका] explains: one who, when asked a question, lacks the intelligence to answer, scratches his head (@deva[खं सूचयति] "points at the sky") and tries to divert attention. The word is a term of contempt in itself.

**@deva[वैयाकरण] as @deva[कुत्सित]:** The @deva[काशिका] asks: is "grammar" or "grammarian" contemptible? Neither intrinsically — grammar is a @deva[वेदाङ्ग], and its student is worthy. But one who studies it poorly becomes contemptible — the term @deva[वैयाकरण] is used in a secondary, contemptuous sense. This shows that @deva[कुत्सित] is a pragmatic, context-dependent reading.

**Distinction from @ref[2.1.54]:** The next rule (@ref[2.1.54]) teaches that @deva[पाप] and @deva[अणक] — themselves contempt-words — stand as first members with @deva[कुत्सन] second members. This reverses back to normal @deva[उपसर्जन]-first order for these specific words.
"""

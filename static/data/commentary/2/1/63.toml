id = "2.1.63"
numericId = "21063"

[en]
simple = """
The interrogative words @deva[कतर] "which of two" and @deva[कतम] "which of many" compound with a noun when the question is about genus or class membership (@deva[जातिपरिप्रश्न]) — asking "which one belongs to class X?"

**Examples:**
- @deva[कतरकठः] "which of the two is the @deva[कठ] (student of the @deva[कठ] branch)?"
- @deva[कतरकालापः] "which of the two is the @deva[कालाप]?"
- @deva[कतमकठः] "which of many is the @deva[कठ]?"

**No compound without genus-question:** @deva[कतरो भवतोर्देवदत्तः] "which of you two is @deva[देवदत्त]?" — this asks about identity, not genus. All belong to the same class (human), so no compound.
"""

standard = """
@deva[कतर]/@deva[कतम] + @deva[समानाधिकरण सुबन्त] → @deva[तत्पुरुष] when @deva[जातिपरिप्रश्न] (genus-inquiry) is intended — @deva[कतरकतमौ जातिपरिप्रश्ने].

**Rule type — @deva[विधि]:** Compounding rule within @deva[कर्मधारय].

**Examples:**
- @deva[कतरकठः] "which of two is the @deva[कठ]?" — asking about @deva[वेद]-branch membership
- @deva[कतमकठः] "which of many is the @deva[कठ]?"

**@deva[जातिपरिप्रश्न] condition:** The question must be about which genus or class the person belongs to. @deva[कतरो भवतोर्देवदत्तः] fails — it asks "which of you is @deva[देवदत्त]?" (an identity question, not a class question).

**@deva[कतर] vs @deva[कतम]:** @deva[कतर] = "which of two" (dual context); @deva[कतम] = "which of many" (plural context). Both require the @deva[जातिपरिप्रश्न] semantic condition.

**Accent:** @ref[6.2.57] governs the accent of these compounds.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[कतरकतमौ जातिपरिप्रश्ने] — @deva[कतर] and @deva[कतम] compound with a @deva[समानाधिकरण] @deva[सुबन्त] as @deva[कर्मधारय] @deva[तत्पुरुष] when the question is about genus.

**@deva[जातिपरिप्रश्न] = genus-inquiry:** The @deva[काशिका] explains: the question must ask which class or genus the person belongs to. @deva[कतरकठः] asks "which of these two is of the @deva[कठ] @deva[शाखा]?" — a question about @deva[जाति] (branch/school membership). @deva[कतरो भवतोर्देवदत्तः] asks about personal identity within the same @deva[जाति] — not a genus-question.

**Why mention @deva[जातिपरिप्रश्न]?** The @deva[काशिका] anticipates the objection: @deva[कतम] already inherently asks about genus (by @ref[5.2.93]). So why state the condition? Answer: to show that @deva[कतम] has other uses too — it can be a general interrogative without genus-inquiry. The explicit condition ensures that only the genus-inquiry use triggers compounding.

**Accent:** @ref[6.2.57] provides the accent rule for these interrogative compounds.

**Within the @deva[कर्मधारय] section:** This rule handles a special first member (interrogative pronoun) — joining the set of specific-first-member rules (@ref[2.1.49]: @deva[पूर्वकाल], @ref[2.1.58]: ordinals, @ref[2.1.61]: praise words).
"""

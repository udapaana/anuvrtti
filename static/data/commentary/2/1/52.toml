id = "2.1.52"
numericId = "21052"

[en]
simple = """
A compound whose first member is a numeral (@deva[सङ्ख्या]) is called @deva[द्विगु]. This is a naming rule — it gives the technical name @deva[द्विगु] to numeral-first compounds.

**Examples:**
- @deva[पञ्चकपालः] "offering in five cups" — @deva[पञ्च] (five) is the numeral first member
- @deva[पञ्चफली] "collection of five fruits"
- @deva[त्रिलोकी] "the three worlds"
- @deva[दशपूली] "aggregate of ten bundles"

The name @deva[द्विगु] literally means "two cows" (@deva[द्वि] + @deva[गो]) — the word @deva[द्विगु] is itself an example of the compound type it names.

By @ref[2.1.23], @deva[द्विगु] is classified as @deva[तत्पुरुष], which allows @deva[समासान्त] affixes (@ref[5.4.68] ff.) to apply.
"""

standard = """
@deva[सङ्ख्यापूर्वो द्विगुः] — a numeral-first compound is called @deva[द्विगु].

**Rule type — @deva[संज्ञा]:** Names the compound type.

**Examples:**
- @deva[पञ्चकपालः] "five-cup offering" — @deva[अण्] by @ref[4.2.16] applied to @deva[पञ्चकपाल]
- @deva[दशकपालः] "ten-cup offering"
- @deva[पञ्चफली] "five-fruit collection" — @deva[ङीष्] by @ref[4.1.21]
- @deva[त्रिलोकी] "the three worlds"
- @deva[दशपूली] "ten-bundle aggregate"
- @deva[द्विनावम्] "two ships" (with @deva[टच्] by @ref[5.4.99])

**Context from @ref[2.1.51]:** @deva[द्विगु] compounds arise in the @deva[तद्धितार्थ], @deva[उत्तरपद], and @deva[समाहार] contexts taught there. The @deva[समाहार] (collective) sense is the prototypical @deva[द्विगु].

**Classified as @deva[तत्पुरुष]:** By @ref[2.1.23] (@deva[द्विगुश्च]), @deva[द्विगु] receives the @deva[तत्पुरुष] designation, enabling @deva[समासान्त] affixes.

**Self-illustrating name:** @deva[द्विगु] ("two cows") is itself a numeral-first compound — the @deva[संज्ञा] exemplifies its own definition.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3].

@deva[सङ्ख्यापूर्वो द्विगुः] — a compound whose first member is @deva[सङ्ख्या] (a numeral) is called @deva[द्विगु].

**@deva[संज्ञा] rule:** This defines the @deva[द्विगु] designation. The @deva[संज्ञा] is used in downstream rules — @ref[2.4.1] (@deva[द्विगुरेकवचनम्]: @deva[द्विगु] in @deva[समाहार] sense takes singular number), @ref[5.4.68] ff. (@deva[समासान्त] affixes), and accent rules.

**@ref[2.1.23] connection:** @ref[2.1.23] (@deva[द्विगुश्च]) classifies @deva[द्विगु] as @deva[तत्पुरुष]. Without that rule, @deva[समासान्त] affixes specified for @deva[तत्पुरुष] would not apply to @deva[द्विगु]. The two rules work together: this one names, that one classifies.

**@deva[समाहार] @deva[द्विगु]:** The prototypical @deva[द्विगु] expresses @deva[समाहार] (collective) — @deva[पञ्चफली] "the five fruits as a group." @ref[2.4.1] assigns @deva[एकवचन] to such @deva[समाहार] @deva[द्विगु] — hence @deva[पञ्चफली] (singular), not @deva[पञ्चफल्यः] (plural).

**Non-@deva[समाहार] @deva[द्विगु]:** By @ref[2.1.51], @deva[द्विगु] also forms in @deva[तद्धितार्थ] and @deva[उत्तरपद] contexts, where the @deva[समाहार] sense need not be present. @deva[पाञ्चकपालः] is @deva[तद्धितार्थ]; @deva[पञ्चनावप्रियः] is @deva[उत्तरपद].

**Relation to @deva[अव्ययीभाव]:** @ref[2.1.19]–@ref[2.1.20] also had numeral-first compounds (@deva[सङ्ख्या] + @deva[वंश्य]/@deva[नदी]), but those were classified as @deva[अव्ययीभाव]. The distinction: @deva[अव्ययीभाव] makes the numeral semantically principal; @deva[द्विगु] makes the last member principal (as @deva[तत्पुरुष]).
"""

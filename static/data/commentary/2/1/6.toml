id = "2.1.6"
numericId = "21006"

[en]
simple = """
An @deva[अव्यय] (indeclinable word) **obligatorily** compounds with a semantically related case-inflected word (@deva[सुबन्त]) to form an @deva[अव्ययीभाव] compound. This rule lists sixteen senses in which the compounding is mandatory.

The sixteen senses with examples:

1. **Case-relation** (@deva[विभक्ति]): @deva[अधिस्त्रि] "concerning women"
2. **Nearness** (@deva[समीप]): @deva[उपकुम्भम्] "near the jar"
3. **Prosperity** (@deva[समृद्धि]): @deva[सुमद्रम्] "prosperous in Madra country"
4. **Adversity** (@deva[व्यृद्धि]): @deva[दुर्यवनम्] "things are bad with the Yavanas"
5. **Absence** (@deva[अभाव]): @deva[निर्मक्षिकम्] "free from flies"
6. **Departure** (@deva[अत्यय]): @deva[निर्हिमम्] "the cold season has passed"
7. **No longer** (@deva[असम्प्रति]): @deva[अतितैलृकम्] "quilt-season is over"
8. **Sound** (@deva[शब्दप्रादुर्भाव]): @deva[इतिहरि] "the cry 'Hari!'"
9. **After** (@deva[पश्चात्]): @deva[अनुरथम्] "following the chariots"
10. **Accordance** (@deva[यथा]): @deva[यथाशक्ति] "according to ability"
11. **Sequence** (@deva[आनुपूर्व्य]): @deva[अनुज्येष्ठम्] "in order of seniority"
12. **Simultaneity** (@deva[यौगपद्य]): @deva[सचक्रम्] "together with the wheel"
13. **Resemblance** (@deva[सादृश्य]): @deva[ससखि] "like a friend"
14. **Fitness** (@deva[सम्पत्ति]): @deva[सक्षत्रम्] "as warriors should be"
15. **Totality** (@deva[साकल्य]): @deva[सतृणम्] "down to the last blade of grass"
16. **Limit** (@deva[अन्त]): @deva[साग्नि] "up to the fire chapter"
"""

standard = """
An @deva[अव्यय] obligatorily (@deva[नित्यम्]) compounds with a @deva[समर्थ] @deva[सुबन्त] in sixteen senses — @deva[अव्ययं विभक्तिसमीपसमृद्धिव्यृद्ध्यर्थाभावात्ययासम्प्रतिशब्दप्रादुर्भावपश्चाद्यथानुपूर्व्ययौगपद्यसादृश्यसम्पत्तिसाकल्यान्तवचनेषु].

**Rule type — @deva[विधि] (@deva[नित्यसमास]):** Obligatory compound — when the conditions are met, compounding is not optional.

**The word @deva[वचन]:** Read with each of the sixteen terms (e.g., @deva[विभक्तिवचन], @deva[समीपवचन]). @deva[वचन] = "expressing" — the @deva[अव्यय] must express that particular sense.

**Selected examples:**
- @deva[विभक्तिवचन]: @deva[अधिस्त्रि] "concerning women" (@deva[अधि] expresses a case-relation)
- @deva[समीपवचन]: @deva[उपकुम्भम्] "near the jar" (@deva[उप] = nearness)
- @deva[अभाववचन]: @deva[निर्मक्षिकम्] "fly-free" (@deva[निर्] = absence)
- @deva[यथार्थवचन]: @deva[यथाशक्ति] "according to ability"

**@deva[नित्य] = obligatory:** Unlike many @deva[समास] rules which are optional (@deva[विकल्प]), @deva[अव्ययीभाव] in these sixteen senses is mandatory — the uncompounded form is ungrammatical.
"""

advanced = """
@deva[अव्ययं विभक्तिसमीपसमृद्धिव्यृद्ध्यर्थाभावात्ययासम्प्रतिशब्दप्रादुर्भावपश्चाद्यथानुपूर्व्ययौगपद्यसादृश्यसम्पत्तिसाकल्यान्तवचनेषु] — an @deva[अव्यय] obligatorily compounds in sixteen senses.

**@deva[अनुवृत्ति]:** @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4]; @deva[अव्ययीभावः] from @ref[2.1.5].

**@deva[नित्यसमास]:** The @deva[काशिका] classifies this as @deva[नित्य] — the compound must form. The @deva[वार्त्तिक] @deva[नित्यसमासोऽव्ययीभावः] confirms: @deva[अव्ययीभाव] is always obligatory, unlike @deva[तत्पुरुष] or @deva[बहुव्रीहि] which may be optional.

**Sixteen senses as a closed list:** This enumeration defines exactly when @deva[अव्ययीभाव] forms. If the @deva[अव्यय] + @deva[सुबन्त] combination does not fall under one of these sixteen senses, @deva[अव्ययीभाव] does not apply.

**@deva[वचन] with each term:** The word @deva[वचन] ("expressing") is compounded with each of the sixteen sense-terms. This is a @deva[समाहारद्वन्द्व]-like construction — each @deva[अव्यय] must be "expressing" the relevant sense for the compound to form.

**Interaction with @ref[2.1.7]–@ref[2.1.21]:** The subsequent rules in the @deva[अव्ययीभाव] section (@ref[2.1.7]–@ref[2.1.21]) restrict, extend, or specify particular @deva[अव्यय] + @deva[सुबन्त] combinations. This rule provides the general framework; those rules handle special cases.
"""

id = "2.1.22"
numericId = "21022"

[en]
simple = """
From this rule through @ref[2.2.23], the word @deva[तत्पुरुष] is understood in every rule. This heading introduces the second major compound type.

In a @deva[तत्पुरुष] compound, the **last member's meaning is principal** — the compound as a whole denotes the kind of thing named by the last word, qualified by the first word.

**Example:** @deva[राजपुरुषः] "king's man" — the compound denotes a @deva[पुरुष] (man), qualified as belonging to the @deva[राजन्] (king). The last word @deva[पुरुष] carries the main meaning.

@deva[कर्मधारय] (appositional compounds like @deva[नीलोत्पलम्] "blue lotus") and @deva[द्विगु] (numeral compounds like @deva[पञ्चगवम्] "five-cow group") are subtypes of @deva[तत्पुरुष].
"""

standard = """
@deva[तत्पुरुष] is @deva[अधिकार] through @ref[2.2.23] — @deva[तत्पुरुषः].

**Rule type — @deva[अधिकार]/@deva[संज्ञा]:** Names and governs the @deva[तत्पुरुष] compound section.

**@deva[तत्पुरुष] = @deva[उत्तरपदार्थप्रधान]:** The last member's meaning is principal. This contrasts with:
- @deva[अव्ययीभाव]: @deva[पूर्वपदार्थप्रधान] (first member principal)
- @deva[बहुव्रीहि]: @deva[अन्यपदार्थप्रधान] (external referent principal)
- @deva[द्वन्द्व]: @deva[उभयपदार्थप्रधान] (both members principal)

**Subtypes:**
- @deva[कर्मधारय] (appositional): @ref[2.1.49]–@ref[2.1.72]
- @deva[द्विगु] (numeral): @ref[2.1.52]

**Scope:** This @deva[अधिकार] spans the rest of this @deva[पाद] and continues into @deva[पाद] 2.2 through @ref[2.2.23].

**@[pre-pāṇinian] term:** The name @deva[तत्पुरुष] ("his man") predates @[pāṇini] — it was used by earlier grammarians as the prototypical example of this compound type.
"""

advanced = """
@deva[तत्पुरुषः] — @deva[अधिकार] through @ref[2.2.23]. The @deva[तत्पुरुष] designation applies to all compounds taught within this scope.

**Scope across @deva[पाद]:** This @deva[अधिकार] is unusual in spanning two @deva[पाद] — from @ref[2.1.22] to @ref[2.2.23]. The @deva[तत्पुरुष] section is the largest compound section, reflecting the diversity of this compound type.

**@deva[उत्तरपदार्थप्रधान]:** The @deva[काशिका] and @deva[सिद्धान्तकौमुदी] define @deva[तत्पुरुष] by the principality of the last member. In @deva[राजपुरुषः], the referent is a @deva[पुरुष]; @deva[राजन्] merely qualifies.

**Subtypes within @deva[तत्पुरुष]:**
- Case-based @deva[तत्पुरुष] (@ref[2.1.24]–@ref[2.1.48]): first member in @deva[द्वितीया] through @deva[सप्तमी]
- @deva[कर्मधारय] (@ref[2.1.49]–@ref[2.1.72]): appositional — both members refer to the same entity
- @deva[द्विगु] (@ref[2.1.52]): numeral-first compounds
- @deva[नञ् तत्पुरुष] (@ref[2.2.6]): negative compounds
- @deva[उपपद तत्पुरुष] (@ref[2.2.19]): compounds with verbal stems

**@[pre-pāṇinian] origin:** The name literally means "his (@deva[तत्]) man (@deva[पुरुष])" — the very example @deva[तत्पुरुषः] is a @deva[षष्ठी तत्पुरुष], making the term self-illustrating.
"""

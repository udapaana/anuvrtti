id = "2.1.59"
numericId = "21059"

[en]
simple = """
Words from the @deva[श्रेणि] list (including @deva[श्रेणि] "rank/class," @deva[एक] "one," @deva[पूग] "group," @deva[राशि] "heap," etc.) compound with words from the @deva[कृत] list (including @deva[कृत] "made," @deva[मित] "measured," @deva[भूत] "become," etc.) to form @deva[तत्पुरुष]. These compounds carry the sense of transformation — something that was not X has been made into X.

**Examples:**
- @deva[श्रेणिकृताः] "made into ranks" — people who were unranked, now organized into classes
- @deva[पूगकृताः] "made into groups"
- @deva[राशिकृताः] "made into heaps"

The transformation sense comes from an implied @deva[च्वि] force: "from not-X to X." @deva[श्रेणिकृताः] = @deva[अश्रेणयः श्रेण्यः कृताः] "those who were not-ranked were made ranked."
"""

standard = """
@deva[श्रेण्यादि] + @deva[कृतादि] → @deva[तत्पुरुष] in @deva[समानाधिकरण] — @deva[श्रेण्यादयः कृतादिभिः].

**Rule type — @deva[विधि] (@deva[नित्यसमास]):** Obligatory compounding by @ref[2.2.18], since these carry @deva[च्वि]-force, and @deva[च्वि]-ending words are @deva[गति] by @ref[1.4.61].

**Examples:**
- @deva[श्रेणिकृताः] "made into ranks"
- @deva[पूगकृताः] "made into groups"
- @deva[राशिकृताः] "heaped up"
- @deva[एककृताः] "made into one, unified"

**@deva[च्वि] force:** The @deva[वार्त्तिककार] explains that the @deva[श्रेण्यादि] words carry @deva[च्वि] force — expressing change of state from non-X to X. @deva[श्रेणिकृताः] = @deva[अश्रेणीः श्रेणीः कृताः] "those not in ranks were made into ranks."

**Both lists are @deva[आकृतिगण]:** The @deva[श्रेण्यादि] list (~26 words) and @deva[कृतादि] list (~22 words) are open-ended @deva[आकृतिगण] — membership is determined by the pattern, not exhaustively fixed.

**@deva[श्रेण्यादि]:** @deva[श्रेणि], @deva[एक]/@deva[ऊक], @deva[पूग], @deva[मुकुन्द]/@deva[कुन्द], @deva[राशि], @deva[निचय], @deva[विषय]/@deva[विशेष], @deva[निधन]/@deva[निधान], @deva[पर], @deva[इन्द्र], @deva[देव], @deva[मुण्ड], @deva[भूत], @deva[पण्डित], @deva[कुशल], etc.

**@deva[कृतादि]:** @deva[कृत], @deva[मित], @deva[मत], @deva[भूत], @deva[उक्त], @deva[युक्त], @deva[दृष्ट], @deva[कलित], @deva[दलित], @deva[विश्रुत], @deva[उदित], etc.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[श्रेण्यादयः कृतादिभिः] — @deva[श्रेण्यादि] words compound with @deva[कृतादि] words as @deva[कर्मधारय] @deva[तत्पुरुष].

**@deva[च्वि] force — @deva[वार्त्तिक]:** The @deva[वार्त्तिककार] specifies that the @deva[श्रेण्यादि] words carry @deva[च्वि] force for the purposes of this rule. @deva[च्वि] (@ref[5.4.50]) expresses transformation: "becoming X from not-X." @deva[श्रेणिकृताः] = @deva[अश्रेणीकृताः] "those made into ranks (from not being in ranks)."

**@deva[नित्यसमास] by @ref[2.2.18]:** @deva[च्वि]-ending words are @deva[गति] by @ref[1.4.61]. @ref[2.2.18] makes @deva[गति]-compounds @deva[नित्य]. Therefore these compounds are obligatory — the uncompounded form is not available.

**@deva[आकृतिगण]:** Both lists are open-ended. The @deva[काशिका] marks both as @deva[आकृतिगणोऽयम्] — new words fitting the pattern can join. The @deva[श्रेण्यादि] list includes class/group words (@deva[श्रेणि], @deva[पूग], @deva[राशि], @deva[निचय]) and quality/identity words (@deva[इन्द्र], @deva[देव], @deva[पण्डित], @deva[कुशल]). The @deva[कृतादि] list includes @deva[क्तान्त] words expressing transformation.

**@deva[वार्त्तिक] — @deva[शाकपार्थिवादि]:** The @deva[वार्त्तिककार] adds the @deva[शाकपार्थिवादि] list, where the second member undergoes @deva[लुक्] (deletion). @deva[शाकपार्थिवः] = @deva[शाकप्रियः पार्थिवः] "a king beloved by his people" — @deva[प्रिय] is suppressed. Also @deva[कुतपसौश्रुतम्], @deva[अजातौल्वलिः].
"""

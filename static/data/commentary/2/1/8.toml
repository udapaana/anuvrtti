id = "2.1.8"
numericId = "21008"

[en]
simple = """
The indeclinable @deva[यावत्] "as much as" obligatorily forms an @deva[अव्ययीभाव] compound when it means "exact limitation" (@deva[अवधारण]) — specifying a precise quantity.

**Compound (limitation):** @deva[यावदमत्रं ब्राह्मणान् आमन्त्रयस्व] "invite exactly as many Brahmins as there are pots" — if there are five pots, invite exactly five Brahmins. @deva[यावदमत्रम्] is the @deva[अव्ययीभाव] compound.

**No compound (duration):** @deva[यावद् दत्तं तावद् भुक्तम्] "I ate as long as food was given" — here @deva[यावत्] expresses indefinite duration, not a precise count, so no compound forms.

The distinction is between "exactly this many" (compounds) and "as long as / as much as" in a general sense (does not compound).
"""

standard = """
@deva[यावत्] forms obligatory @deva[अव्ययीभाव] in the @deva[अवधारण] (precise limitation) sense — @deva[यावदवधारणे].

**Rule type — @deva[विधि] with restriction:** @deva[नित्यसमास] for @deva[यावत्] only in the limitation sense.

**Example:** @deva[यावदमत्रम्] "exactly as many as the pots" — @deva[यावदमत्रं ब्राह्मणान् आमन्त्रयस्व] "invite Brahmins equal in number to the pots."

**No compound:** @deva[यावद् दत्तं तावद् भुक्तम्] "I ate as long as given" — indefinite duration, not precise limitation.

**@deva[अवधारण] = "exact ascertainment":** The compound forms when @deva[यावत्] restricts a quantity to a precise number. When it merely correlates with @deva[तावत्] in a general "as much...so much" construction, no compound.

**Parallel to @ref[2.1.7]:** Just as @deva[यथा] excludes @deva[सादृश्य], @deva[यावत्] excludes non-@deva[अवधारण] senses. Both rules narrow the conditions for obligatory @deva[अव्ययीभाव].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अव्ययम्] from @ref[2.1.6]; @deva[समासः] from @ref[2.1.3]; @deva[अव्ययीभावः] from @ref[2.1.5].

@deva[यावदवधारणे] — @deva[यावत्] forms @deva[अव्ययीभाव] only in the @deva[अवधारण] (precise limitation) sense.

**@deva[अवधारण] vs general correlation:** The @deva[काशिका] distinguishes:
- @deva[अवधारण]: @deva[यावदमत्रम्] — the quantity of pots exactly determines the number of Brahmins. This is a precise, countable restriction.
- Non-@deva[अवधारण]: @deva[यावद् दत्तं तावद् भुक्तम्] — "as long as...so long" is an indefinite temporal/quantitative correlation. @deva[यावत्] here correlates with @deva[तावत्] across clauses, so the words are not @deva[समर्थ] (@ref[2.1.1]).

**Pattern in @deva[अव्ययीभाव] section:** @ref[2.1.7] and this rule follow the same structure — they take an @deva[अव्यय] from the general list in @ref[2.1.6] and specify which senses trigger compounding. @deva[यथा] excludes @deva[सादृश्य]; @deva[यावत्] restricts to @deva[अवधारण].

**@deva[यावत्]-@deva[तावत्] correlation:** When @deva[यावत्] and @deva[तावत्] form a correlative pair spanning two clauses, they cannot compound because the @deva[समर्थ] condition fails — the two words serve different predicates.
"""

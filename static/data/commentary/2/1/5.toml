id = "2.1.5"
numericId = "21005"

[en]
simple = """
From this rule through @ref[2.1.21], the compounds described are called @deva[अव्ययीभाव] "becoming an indeclinable." This is a heading that governs the first major compound type.

In an @deva[अव्ययीभाव] compound, the **first member's meaning is principal** — the compound as a whole expresses the sense of the first word (usually a prefix or indeclinable), while the second word specifies the context.

The name is self-explanatory: @deva[अव्ययी] "of an indeclinable" + @deva[भाव] "becoming" — the entire compound behaves as an @deva[अव्यय] (indeclinable word), taking no case endings of its own. It typically takes a neuter singular form.

**Example:** @deva[हरि] + @deva[समीपम्] → @deva[उपहरि] "near Hari" — the prefix @deva[उप] "near" is the principal meaning; @deva[हरि] specifies near whom. The compound is indeclinable.
"""

standard = """
This @deva[अधिकार] extends through @ref[2.1.21] — @deva[अव्ययीभावः].

**Rule type — @deva[अधिकार]/@deva[संज्ञा]:** Names and governs the @deva[अव्ययीभाव] compound section.

**@deva[अव्ययीभाव] = @deva[पूर्वपदार्थप्रधान]:** The first member's meaning is principal. This distinguishes @deva[अव्ययीभाव] from:
- @deva[तत्पुरुष] (@deva[उत्तरपदार्थप्रधान] — latter member principal)
- @deva[बहुव्रीहि] (@deva[अन्यपदार्थप्रधान] — external referent principal)
- @deva[द्वन्द्व] (@deva[उभयपदार्थप्रधान] — both members principal)

**Self-descriptive name:** @deva[अव्ययी] + @deva[भाव] = "becoming an @deva[अव्यय]." The compound functions as an indeclinable, typically taking @deva[नपुंसकलिङ्ग एकवचन] by @ref[2.4.17].

**Scope:** @ref[2.1.6]–@ref[2.1.21] specify conditions for @deva[अव्ययीभाव] formation with various prefixes and indeclinables.
"""

advanced = """
@deva[अव्ययीभावः] — @deva[अधिकार] through @ref[2.1.21]. Compounds within this scope receive the @deva[अव्ययीभाव] designation.

**@deva[पूर्वपदार्थप्रधान]:** The @deva[काशिका] defines @deva[अव्ययीभाव] as the compound where the first member's meaning predominates. This is the traditional four-way classification of @deva[समास] by principal meaning:
- @deva[अव्ययीभाव]: @deva[पूर्वपदार्थप्रधान]
- @deva[तत्पुरुष]: @deva[उत्तरपदार्थप्रधान]
- @deva[बहुव्रीहि]: @deva[अन्यपदार्थप्रधान]
- @deva[द्वन्द्व]: @deva[उभयपदार्थप्रधान]

**Self-descriptive @deva[संज्ञा]:** Like @deva[कर्मप्रवचनीय] (@ref[1.4.83]), the name @deva[अव्ययीभाव] is transparent — it describes what happens (the compound becomes @deva[अव्यय]). This contrasts with arbitrary @deva[संज्ञा] like @deva[डि] or @deva[घि].

**Post-compound operations:**
- @ref[2.4.17]: @deva[अव्ययीभाव] takes @deva[नपुंसकलिङ्ग एकवचन] form
- @ref[2.4.71]: internal @deva[सुप्] endings deleted
- @ref[2.4.18]: @deva[अव्ययीभाव] is @deva[अव्यय] — exempt from case inflection

**First member = @deva[अव्यय]:** In most @deva[अव्ययीभाव] compounds, the first member is already an @deva[अव्यय] (prefix or indeclinable). The compound extends that indeclinable quality to the entire expression.
"""

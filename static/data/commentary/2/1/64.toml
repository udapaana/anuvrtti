id = "2.1.64"
numericId = "21064"

[en]
simple = """
The word @deva[किम्] "what" compounds with a noun when the meaning is contempt or dismissal (@deva[अवमान]) to form @deva[तत्पुरुष]. The compound expresses "what kind of X is this!" — implying the person or thing is unworthy of the name.

**Examples:**
- @deva[किंराजा] "what kind of king!" — said of a king who does not protect his people
- @deva[किंसखा] "what kind of friend!" — said of a friend who betrays
- @deva[किंगौः] "what kind of ox!" — said of an ox that does not carry

**No compound without contempt:** @deva[कस्य राजा] = @deva[किंराजः] "whose king" — this is a @deva[षष्ठी] @deva[तत्पुरुष] (genitive compound), a completely different construction with no contempt.
"""

standard = """
@deva[किम्] + @deva[समानाधिकरण सुबन्त] → @deva[तत्पुरुष] when @deva[अवमान] (contempt/dismissal) is intended — @deva[किमवमाने].

**Rule type — @deva[विधि]:** Compounding rule within @deva[कर्मधारय].

**Examples:**
- @deva[किंराजा] = @deva[किं राजा यो न रक्षति] "what kind of king is he who does not protect!"
- @deva[किंसखा] = @deva[किं सखा योऽभिद्रुह्यति] "what kind of friend is he who hates!"
- @deva[किंगौः] = @deva[किं गौर्यो न वहति] "what kind of ox is it that does not carry!"

**@deva[अवमान] condition:** The @deva[किम्] must express contemptuous dismissal — "what X is this!" Without contempt, no compound.

**No @deva[टच्] affix:** @deva[किंराजा] retains the final @deva[आ] of @deva[राजन्] — the @deva[समासान्त] affix @deva[टच्] (@ref[5.4.91]) does NOT apply here, blocked by @ref[5.4.70]. Otherwise the form would be @deva[किंराज] (like @deva[महाराजः]).

**Different from @deva[षष्ठी] @deva[किम्]:** @deva[किंराजः] (with @deva[ह्रस्व] @deva[अ]) = @deva[कस्य राजा] "whose king" — genitive compound. @deva[किंराजा] (with @deva[दीर्घ] @deva[आ]) = contempt compound. Different formation, different meaning.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[समानाधिकरणेन] from @ref[2.1.49]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[किमवमाने] — @deva[किम्] compounds with a @deva[समानाधिकरण] @deva[सुबन्त] as @deva[कर्मधारय] @deva[तत्पुरुष] when @deva[अवमान] is intended.

**@deva[अवमान] = contemptuous dismissal:** The compound challenges the referent's claim to the class denoted by the noun. @deva[किंराजा] implies "he does not deserve to be called a king." This is related to but distinct from @ref[2.1.53]'s @deva[कुत्सित] compounds — @deva[किम्] is an interrogative used rhetorically, not a content-word expressing vileness.

**@ref[5.4.70] blocks @deva[टच्]:** The @deva[समासान्त] affix @deva[टच्] (@ref[5.4.91]) would normally apply after @deva[राजन्] in @deva[तत्पुरुष] (as in @deva[महाराजः]). But @ref[5.4.70] blocks it for this compound, preserving @deva[किंराजा] with the @deva[राजन्]-stem's final vowel.

**Homonymy with @deva[षष्ठी]:** @deva[किंराजः] (= @deva[कस्य राजा] "whose king") is @deva[षष्ठी] @deva[तत्पुरुष]. @deva[किंराजा] (contempt) is @deva[कर्मधारय]. The @deva[काशिका] distinguishes them — the @deva[कर्मधारय] form retains the stem-final @deva[आ] of @deva[राजन्], while the @deva[षष्ठी] form shows @deva[अ].

**Pragmatic condition:** Like @ref[2.1.42] (@deva[अवज्ञा]) and @ref[2.1.47] (@deva[क्षेप]), this rule restricts compounding to a specific pragmatic reading. The interrogative @deva[किम्] in neutral use does not trigger compounding.
"""

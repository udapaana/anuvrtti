id = "2.1.38"
numericId = "21038"

[en]
simple = """
A word in the ablative case (@deva[पञ्चमी]) **optionally** compounds with the words @deva[अपेत] "departed," @deva[अपोढ] "carried away," @deva[मुक्त] "freed," @deva[पतित] "fallen," or @deva[अपत्रस्त] "frightened away" to form @deva[तत्पुरुष] — but only when the separation is **gradual** (@deva[अल्पशः]), not sudden or violent.

**Examples:**
- @deva[सुखापेतः] "departed from happiness" — a gradual loss
- @deva[स्वर्गपतितः] "fallen from heaven" — a gradual decline
- @deva[चक्रमुक्तः] "freed from the wheel (of rebirth)"

**No compound when sudden:** @deva[प्रासादात् पतितः] "fallen from a palace" — this is a sudden, violent fall, so no compound is formed.
"""

standard = """
@deva[पञ्चम्यन्त] + @deva[अपेत]/@deva[अपोढ]/@deva[मुक्त]/@deva[पतित]/@deva[अपत्रस्त] → @deva[विभाषा] @deva[तत्पुरुष], when the separation is @deva[अल्पशः] (gradual) — @deva[अपेतापोढमुक्तपतितापत्रस्तैरल्पशः].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding under @ref[2.1.11].

**Examples:**
- @deva[सुखापेतः] "gone from happiness"
- @deva[कल्पनापोढः] "carried away from (mere) fancy"
- @deva[चक्रमुक्तः] "freed from the wheel"
- @deva[स्वर्गपतितः] "fallen from heaven"
- @deva[तरङ्गापत्रस्तः] "frightened away from the waves"

**Counter-examples (sudden separation):**
- @deva[प्रासादात् पतितः] "fallen from a palace" — sudden physical fall
- @deva[भोजनादपत्रस्तः] "suddenly frightened away from eating"

**@deva[अल्पशः] condition:** The separation must be gradual, metaphorical, or non-violent. @deva[स्वर्गपतितः] is a gradual spiritual decline; @deva[प्रासादात् पतितः] is a sudden physical event.

**All five are @deva[पञ्चम्यन्त] @deva[क्तान्त]:** Each second member is a past participle expressing separation — the @deva[पञ्चमी] naturally marks the source from which one departs.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[पञ्चमी] from @ref[2.1.37]; @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[अपेतापोढमुक्तपतितापत्रस्तैरल्पशः] — @deva[पञ्चम्यन्त] optionally compounds with these five words as @deva[तत्पुरुष], restricted to gradual (@deva[अल्पशः]) separation.

**@deva[अल्पशः] — "by degrees":** The @deva[काशिका] explains that the separation must be non-violent and progressive. @deva[स्वर्गपतितः] (fallen from heaven through gradual merit-exhaustion) compounds; @deva[प्रासादात् पतितः] (sudden physical fall) does not. The condition distinguishes metaphorical/gradual separation from abrupt physical events.

**Semantic basis:** All five words denote movement away from a source — the @deva[पञ्चमी] marks the @deva[अपादान] (point of departure). The five form a natural semantic group: @deva[अपेत] (gone away), @deva[अपोढ] (carried away), @deva[मुक्त] (released from), @deva[पतित] (fallen from), @deva[अपत्रस्त] (frightened away from).

**Relation to @ref[2.1.37]:** That rule covered @deva[भय] (a noun). This rule covers five @deva[क्तान्त] words (past participles). Together they handle the main @deva[पञ्चमी] compound types: fear-source (@ref[2.1.37]) and separation-source (@ref[2.1.38]).

**Relation to @ref[2.1.24]:** @ref[2.1.24] also listed @deva[पतित] — but with @deva[द्वितीया] (accusative), where @deva[पतित] means "fallen into" (destination). Here with @deva[पञ्चमी], @deva[पतित] means "fallen from" (source). Same word, different case, different semantic direction.

**@ref[2.1.32] backup:** Even without this rule, some @deva[पञ्चमी] @deva[तत्पुरुष] compounds could form under @ref[2.1.32]'s @deva[बहुलम्]. This rule provides specific, non-@deva[बहुलम्] authority for these five words, with the @deva[अल्पशः] restriction that @ref[2.1.32] lacks.
"""

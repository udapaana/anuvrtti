id = "2.1.37"
numericId = "21037"

[en]
simple = """
A word in the ablative case (@deva[पञ्चमी]) **optionally** compounds with @deva[भय] "fear" to form @deva[तत्पुरुष]. The ablative expresses the source of the fear.

**Examples:**
- @deva[वृकभयम्] "fear of wolves" (= @deva[वृकेभ्यो भयम्])
- @deva[चौरभयम्] "fear of thieves"
- @deva[दस्युभयम्] "fear of robbers"

The ablative is natural here: fear comes **from** something, and the ablative case expresses the source.

This is the **first @deva[पञ्चमी] @deva[तत्पुरुष] rule** — the @deva[चतुर्थी] section had only one rule (@ref[2.1.36]).
"""

standard = """
@deva[पञ्चम्यन्त] + @deva[भय] → @deva[विभाषा] @deva[तत्पुरुष] — @deva[पञ्चमी भयेन].

**Rule type — @deva[विधि] (@deva[विभाषा]):** Optional compounding under @ref[2.1.11].

**Examples:**
- @deva[वृकभयम्] = @deva[वृकेभ्यो भयम्] "fear from wolves"
- @deva[चौरभयम्] "fear from thieves"
- @deva[दस्युभयम्] "fear from robbers"

**@deva[पञ्चमी] with @deva[भय]:** The ablative marks the source of fear — @deva[भय] governs @deva[पञ्चमी] by @ref[2.3.25] (@deva[विभाषा भयार्थानाम्]).

**Beginning of @deva[पञ्चमी] section:** @ref[2.1.37]–@ref[2.1.39] cover @deva[पञ्चमी] first members, starting with the specific word @deva[भय].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[तत्पुरुषः] from @ref[2.1.22]; @deva[विभाषा] from @ref[2.1.11]; @deva[समासः] from @ref[2.1.3]; @deva[सुप् सुपा] from @ref[2.1.4].

@deva[पञ्चमी भयेन] — a @deva[पञ्चम्यन्त] word optionally compounds with @deva[भय] as @deva[तत्पुरुष].

**@deva[वार्त्तिक] — extension to @deva[भय]-synonyms:** The @deva[वार्त्तिककार] extends this rule to words sharing @deva[भय]'s meaning: @deva[भीत] "frightened," @deva[भीति] "fright," @deva[भी] "fear." Thus: @deva[वृकभीतः] "frightened of wolves," @deva[वृकभीतिः] "fright from wolves," @deva[वृकभीः] "wolf-fear."

**@deva[पञ्चमी] governance:** @deva[भय] takes @deva[पञ्चमी] by @ref[2.3.25] (@deva[विभाषा भयार्थानाम्] — "optionally ablative with fear-words"). The ablative expresses @deva[अपादान] — the source from which fear arises.

**Case transition:** @deva[चतुर्थी] had only @ref[2.1.36]. @deva[पञ्चमी] has @ref[2.1.37]–@ref[2.1.39] — three rules covering @deva[भय], separation words (@deva[अपेत] etc.), and degree/distance words (@deva[स्तोक], @deva[दूर], etc.).

**Relation to @ref[2.1.32]:** The @deva[काशिका] notes that @deva[पञ्चमी] @deva[तत्पुरुष] compounds also occur more broadly through @ref[2.1.32]'s @deva[बहुलम्] provision: @deva[ग्रामनिर्गतः] "gone from the village," @deva[अधर्मजुगुप्सुः] "disgusted with unrighteousness." These operate under @deva[बहुलम्] rather than this specific rule.
"""

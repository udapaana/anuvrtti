id = "8.3.25"
numericId = "83025"

[en]
simple = """
When the verb @deva[सम्] + @deva[राज्] gets the @deva[क्विप्] pratyay, the @deva[म्] of @deva[सम्] is converted to @deva[म्] itself.
"""

standard = """
@deva[म्] of @deva[सम्] unchanged before @deva[क्विप्]-formed @deva[राज्]. @deva[सम्राट्], @deva[साम्राज्यम्]. Not: @deva[किं] @deva[राट्], @deva[संराजिता].
"""

advanced = """
@deva[म्] is substituted for @deva[म्] of @deva[सम्] before @deva[राज्] ending in @deva[क्विप्] — a self-substitution that blocks @deva[अनुस्वार] change (compare @ref[7.1.40]). Forms: @deva[सम्राट्], @deva[साम्राज्यम्]. The @deva[क्विप्] is added by @ref[3.2.61]; @deva[ज्] → @deva[ष्] by @ref[8.2.36], then → @deva[ट्] at word-end, yielding @deva[सम्राट्]. @deva[साम्राज्यम्] takes the @deva[ष्यञ्] affix (@deva[ब्राह्मणादि] class). The condition "before @deva[राज्]" excludes @deva[संयत्] (@ref[6.4.40] @deva[वार्तिक]). "Of @deva[सम्]" excludes @deva[किं] @deva[राट्] (@ref[5.4.70]). "Ending in @deva[क्विप्]" excludes @deva[संराजिता], @deva[संराजितुम्], @deva[संराजितव्यम्].
"""

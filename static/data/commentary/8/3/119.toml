id = "8.3.119"
numericId = "83119"

[en]
simple = """
In Vedic texts, when a prefix like ni or vi is separated from the verb by an augment vowel, the retroflex change in the verb is optional. Both forms with and without the retroflex are attested in Vedic tradition.
"""

standard = """
In @deva[छन्दस्], @deva[ष्त्व] is optionally applied after the @deva[उपसर्ग]s @deva[नि], @deva[वि], and @deva[अभि] even when the @deva[अट्] (augment @deva[अ]) intervenes between the prefix and the root @deva[सद्] or related verb. Thus @deva[न्यषीदत्] or @deva[न्यसीदत्] and @deva[व्यष्टौत्] or @deva[व्यस्तौत्]. This Vedic optionality contrasts with the stricter @deva[लौकिक] application of @ref[8.3.59].
"""

advanced = """
In @deva[छन्दस्], @deva[षत्व] is optionally applied after @[upasarga] @deva[नि], @deva[वि], or @deva[अभि] when the @deva[अट्] augment intervenes. Examples: @deva[न्यषीदत्] or @deva[न्यसीदत्] @deva[पिता] @deva[नः]; @deva[व्यषीदत्] or @deva[व्यसीदत्] @deva[पिता] @deva[नः]; @deva[अभ्यषीदत्] or @deva[अभ्यसीदत्].

The @[anuvrtti] of @deva[सद्] and @deva[स्वञ्ज्] from the preceding @[sutra] does not carry into this rule. It is a general rule applying to verbs beyond those two: @deva[व्यष्टौत्] or @deva[व्यस्तौत्], @deva[न्यष्टौत्], @deva[अभ्यष्टौत] or @deva[अभ्यस्तौत].
"""

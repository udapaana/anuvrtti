id = "8.3.74"
numericId = "83074"

[en]
simple = """
After the prefix pari, the s of skand optionally changes to @[ṣ], and in this case the option extends even to the past passive participle. Both forms with and without @[ṣ] are valid for all verb forms after pari.
"""

standard = """
After @deva[परि], @deva[स्कन्द्] optionally changes @deva[स् → ष्] with no restriction on @deva[निष्ठा] (@ref[8.3.74]), contrasting with @ref[8.3.73]. Both @deva[परिष्कन्ता] and @deva[परिस्कन्ता] are valid, as are @deva[परिष्कन्नः] and @deva[परिस्कन्नः] for the @deva[निष्ठा] form.
"""

advanced = """
@deva[ष्] optionally replaces the @deva[स्] of @deva[स्कन्द्] after @[upasarga] @deva[परि] in all forms, including @[nishtha]. Examples: @deva[परिष्कन्ता] or @deva[परिस्कन्ता], @deva[परिष्कन्तुम्] or @deva[परिस्कन्तुम्], @deva[परिष्कन्तव्यम्] or @deva[परिस्कन्तव्यम्]. The fact that @deva[परि] was not combined with @deva[वि] in the preceding @[sutra] (as @deva[विपरिभ्यां] @deva[स्कन्देः]) indicates that the @deva[अनिष्ठायाम्] restriction of @ref[8.3.73] does not apply here. Hence the @[nishtha] also admits the option: @deva[परिष्कन्नः] or @deva[परिस्कन्नः].
"""

id = "8.3.70"
numericId = "83070"

[en]
simple = """
Several roots — sev, sita, say, siv, sah, @[suṭ], stu, and @[svañj] — change their initial s to @[ṣ] when preceded by the prefixes pari, ni, or vi. The last two in this list also appear in the following rule covering optional cases.
"""

standard = """
After prefixes @deva[परि], @deva[नि], or @deva[वि], the @deva[स्] of @deva[सेव्], @deva[सित्], @deva[सय्], @deva[सिव्], @deva[सह्], @deva[सुट्], @deva[स्तु], and @deva[स्वञ्ज्] becomes @deva[ष्] (@ref[8.3.70]). Examples: @deva[परिषेवते], @deva[विषयः], @deva[निषहते]. The mention of @deva[स्तु] and @deva[स्वञ्ज्] here also provides the basis for the optional rule in @ref[8.3.71].
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of (1) @deva[सेव्], (2) @deva[सित], (3) @deva[सय], (4) @deva[सिव्], (5) @deva[सह], (6) the augment @deva[सुट्], (7) @deva[स्तु], and (8) @deva[स्वञ्ज्] after @[upasarga] @deva[परि], @deva[नि], or @deva[वि]. The root @deva[सेव] belongs to @[bhuadi] class; @deva[सित] is the past participle of @deva[षिञ्] @deva[बन्धने]; @deva[सय] is derived from the same root with @deva[अच्]; @deva[सिच्] is a @[divadi] root.

Examples: @deva[सेव्]—@deva[परिषेवते], @deva[निषेवते], @deva[विषेवते], @deva[पर्यषेवते], @deva[व्यषेवते], @deva[न्यषेवते], @deva[परिषिषेविषते], @deva[विषिषेविषते], @deva[निषिषेविषते]. @deva[सित]—@deva[परिषितो], @deva[विषितो], @deva[निषितः]. @deva[सय]—@deva[परिषयो], @deva[निषयो], @deva[विषयः]. @deva[सिव्]—@deva[परिषीव्यति], @deva[निषीव्यति], @deva[विषीव्यति], @deva[पर्यषीव्यत्], @deva[न्यषीव्यत्], @deva[व्यषीव्यत्], @deva[पर्यसीव्यत्], @deva[न्यसीव्यत्], @deva[व्यसीव्यत्]. @deva[सह]—@deva[परिषहते], @deva[निषहते], @deva[विषहते], @deva[पर्यषहत], @deva[न्यषहत], @deva[व्यषहत], @deva[पर्यसहत], @deva[न्यसहत], @deva[व्यसहत]. @deva[सुट्]—@deva[परिष्करोति], @deva[पर्यस्करोत्]. @deva[स्तु]—@deva[परिष्टौति], @deva[निष्टौति], @deva[विष्टौति], @deva[पर्यष्टौत्], @deva[न्यष्टौत्], @deva[व्यष्टौत्], @deva[पर्यस्तौत्], @deva[न्यस्तौत्], @deva[व्यस्तौत्]. @deva[स्वञ्ज्] (nasal elided by @ref[6.4.25])—@deva[परिष्वजते], @deva[निष्वजते], @deva[विष्वजते], @deva[पर्यष्वजत], @deva[पर्यस्वजत].

The @deva[षत्व] of @deva[स्तु] and @deva[स्वञ्ज्] is already derivable from @ref[8.3.65]. Their separate mention here serves the subsequent @[sutra] (@ref[8.3.71]), which makes the @deva[ष]-change optional when the @deva[अट्] augment intervenes: @deva[पूर्वेणैव] @deva[सिद्धे] @deva[स्तुस्वञ्जिग्रहणमुत्तरार्थम्]—@deva[अड्व्यवाये] @deva[विभाषा] @deva[यथा] @deva[स्यात्].
"""

id = "8.3.45"
numericId = "83045"

[en]
simple = """
While doing a @deva[समास], the @deva[विसर्ग] of the @deva[इस्]/@deva[उस्-प्रत्यय] when followed by a letter from @deva[कवर्ग] or @deva[पवर्ग] is always converted to a @deva[षकार] whenever the words involved in the @deva[समास] are associated with each other. However, if the @deva[पूर्वपद] of this @deva[समास] is a @deva[समास] on its own, then the @deva[षत्व] is completely prohibited.
"""

standard = """
@deva[विसर्ग] of @deva[इस्]/@deva[उस्]-ending first compound member (not preceded) → @deva[ष्] before @deva[कु]/@deva[पु]. @deva[सर्पिष्कुण्डिका], @deva[धनुष्कपालम्]. Not: @deva[परमसर्पिः] @deva[कुण्डिका].
"""

advanced = """
The @deva[विसर्ग] of an @deva[इस्]- or @deva[उस्]-ending word not preceded by another compound member (@deva[अनुत्तरपदस्थस्य]) is obligatorily changed to @deva[ष्] in a compound before a hard guttural or labial. Forms: @deva[सर्पिष्कुण्डिका], @deva[धनुष्कपालम्], @deva[सर्पिष्पानम्], @deva[धनुष्फलम्]. The @deva[अनुत्तरपद] condition excludes: @deva[परमसर्पिः] @deva[कुण्डिका], @deva[परमधनुः] @deva[कपालम्] — not even the option of @ref[8.3.44] applies here. The explicit mention of @deva[अनुत्तरपदस्थस्य] is a @deva[ज्ञापक] that the maxim @deva[प्रत्ययग्रहणे] @deva[यस्मात्] @deva[स] @deva[विहितस्तदादेस्तदन्तस्य] @deva[ग्रहणम्] does not restrict @deva[इस्]/@deva[उस्] to bare forms like @deva[सर्पिस्]/@deva[यजुस्]. Without this restriction, @deva[परमसर्पिष्करोति] / @deva[परमसर्पिः] @deva[करोति] is handled optionally by @ref[8.3.44]. The option of @ref[8.3.44] does not extend to compounds because @deva[सामर्थ्य] there means @deva[व्यपेक्षा] (syntactic correlation), not compound formation.
"""

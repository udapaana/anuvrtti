id = "8.3.71"
numericId = "83071"

[en]
simple = """
For the roots siv, sah, stu, @[svañj], and @[suṭ], the @[ṣ] change is optional when the augment @[aṭ] intervenes between the prefix and the root (as in past tense forms). Both the changed and unchanged forms are valid.
"""

standard = """
When the @deva[अट्]-augment intervenes after @deva[परि/नि/वि] and before the roots @deva[सिव्], @deva[सह्], @deva[स्तु], @deva[स्वञ्ज्], or @deva[सुट्], the @deva[ष्]-change is optional (@ref[8.3.71]). Dual forms result: @deva[पर्यषीव्यत्] or @deva[पर्यसीव्यत्] (imperfect of @deva[सिव्] after @deva[परि]); @deva[पर्यष्टौत्] or @deva[पर्यस्तौत्] (imperfect of @deva[स्तु]).
"""

advanced = """
The @deva[ष्] change may take place optionally in the @deva[सिव्] and the rest (of the last @[sūtra]) even when the augment @deva[अ] intervenes between the @deva[उपसर्ग] (Prepositions) @deva[परि] , @deva[नि] and @deva[वि] and the verb. The @deva[सिवादि] are the four roots @deva[सिव्] @deva[सह], @deva[स्तु] and @deva[स्वञ्ज], as well as the augment @deva[सुट्] @deva[॥] This is an example of @[ubhayatra]-@[vibhasha]. In the case of @deva[स्तु] and @deva[स्वञ्ज्] it is @[prapta]-@[vibhasha], in the case of others it is @[aprapta]. The examples have already been given under the preceding @[sutra], and so need not be repeated here.
"""

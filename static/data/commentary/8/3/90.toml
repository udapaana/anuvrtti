id = "8.3.90"
numericId = "83090"

[en]
simple = """
The word for 'ritually pure' that begins with the prefix prati has an irregular retroflex form, but only when it refers to a grammatical rule (sutra). In all other uses the regular form without the retroflex is correct.
"""

standard = """
The word @deva[प्रतिष्णात] is an irregular @deva[निपात] (listed form) formed when it refers to a @deva[सूत्र] in the sense of 'pure' or 'refined.' Thus @deva[प्रतिष्णातः सूत्रम्] 'a pure @[sūtra].' Outside this specific meaning, the expected form @deva[प्रतिस्नातम्] is used and no @deva[ष्त्व] applies. This is an exception to the general pattern of @ref[8.3.65].
"""

advanced = """
The form @deva[प्रतिष्णात] is an irregular @[nipata] occurring when the meaning is "@[sutra]" (i.e., @deva[शुद्धम्], pure): @deva[प्रतिष्णातः] @deva[सूत्रम्]. Without this special meaning, the regular form @deva[प्रतिस्नातम्] (bathed) applies.
"""

id = "8.3.109"
numericId = "83109"

[en]
simple = """
The verb root meaning 'to bear' or 'to overcome' takes a retroflex when it follows two specific words referring to battle and truth. The resulting compounds are used in Vedic contexts.
"""

standard = """
The @deva[स्] of @deva[सह्] is replaced by @deva[ष्] after @deva[पृतना] (battle array) and @deva[ऋत] (cosmic order/truth). Results: @deva[पृतनाषाहम्] 'overcoming battle' and @deva[ऋताषाहम्] 'overcoming with truth.' These are fixed Vedic compound forms listed as @deva[निपात]s, extending the @deva[ष्त्व] mechanism of @ref[8.3.59] to specific lexical items.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[सह्] after @deva[पृतना] and @deva[ऋत]: @deva[पृतनाषाहम्], @deva[ऋताषाहम्]. Some divide this @[sutra] into two: (1) @deva[सहेः] and (2) @deva[पृतनार्त्ताभ्यां] @deva[च], so that the rule also covers @deva[ऋतीषहः]. The @deva[इ] of @deva[ऋति] is lengthened by @ref[6.3.116] in @[samhita], and @deva[षत्व] applies only in @[samhita]; otherwise the form is @deva[ऋतिसहम्]. The particle @deva[च] in the @[sutra] extends the rule beyond the explicitly named items, validating @deva[ऋतीषहम्] as well.
"""

id = "8.3.89"
numericId = "83089"

[en]
simple = """
The verb meaning 'to bathe' takes a retroflex s when prefixed by certain words and the compound means 'expert' or 'skilled.' When it actually means 'bathed,' the original s is kept.
"""

standard = """
The @deva[स्] of @deva[स्ना] is replaced by @deva[ष्] after @deva[नि] or the word @deva[नदी] when the compound conveys the meaning of proficiency or skill. Thus @deva[निष्णातः कटकरणे] 'expert at mat-making' and @deva[नदीष्णः]. The substitution is blocked when the literal meaning 'bathed' is intended, as in @deva[निस्नातः]. The semantic restriction follows @ref[8.3.65].
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्ना] after @deva[नि] or @deva[नदी] when the resulting word denotes dexterity or expertise. Examples: @deva[निष्णातः] @deva[कटकरणे] (expert at mat-making), @deva[निष्णातो] @deva[रज्जुवर्त्तने] (expert at rope-turning); @deva[नद्यां] @deva[स्नातीति] @deva[नदीष्णः] (formed with affix @deva[क] added to @deva[स्ना] preceded by @[upapada] @deva[नदी] under @ref[3.2.4]). In the literal sense of bathing, no change: @deva[निस्नातः], @deva[नदीस्नातः] (@deva[नद्यां] @deva[स्नातः]).
"""

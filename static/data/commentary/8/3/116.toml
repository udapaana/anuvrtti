id = "8.3.116"
numericId = "83116"

[en]
simple = """
Three specific roots do not take a retroflex in their reduplicated aorist forms. One interpretation limits this restriction to prefixed forms, while another says it applies to the reduplicate syllable rather than the root.
"""

standard = """
The @deva[ष्त्व] substitution does not occur in the reduplicated @deva[लुङ्] (aorist) of @deva[स्तम्भ्], @deva[सिव्], and @deva[सह्]. Thus @deva[पर्यतस्तम्भत्], @deva[पर्यसीषिवत्], @deva[पर्यसीषहत्]. A @deva[वार्तिक] clarifies that the prohibition covers only the @@deva[द]eva[@deva[उपसर्ग]]-triggered @deva[ष्त्व], not that triggered by the @deva[अभ्यास] (reduplicate). Compare @ref[8.3.112] for the related intensive restriction.
"""

advanced = """
@deva[षत्व] does not apply in the reduplicated @deva[लुङ्] (aorist) of (1) @deva[स्तम्भ्] (which would otherwise undergo change by @ref[8.3.67]), (2) @deva[सिव्], and (3) @deva[सह्] (both governed by @ref[8.3.70]). Examples: @deva[स्तम्भ्]—@deva[पर्यतस्तम्भत्], @deva[अभ्यतस्तम्भत्]; @deva[सिव्]—@deva[पर्यसीषिवत्], @deva[न्यसीषिवत्]; @deva[सह्]—@deva[पर्यसीषहत्], @deva[व्यसीषहत्].

@[vartika]: This prohibition targets only the @deva[षत्व] triggered by the @[upasarga], not the change triggered by the @[abhyasa] (reduplicate), as the examples illustrate.
"""

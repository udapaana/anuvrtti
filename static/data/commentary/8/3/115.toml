id = "8.3.115"
numericId = "83115"

[en]
simple = """
The verb 'to bear or endure' takes a retroflex in its regular present-tense forms after a prefix. However, in a special past-tense form where the stem changes shape, the retroflex does not appear.
"""

standard = """
The @deva[ष्त्व] rule does not apply to the @deva[स्] in the @deva[सोढ्] form of the root @deva[सह्], which arises through a special @deva[आदेश] (substitution). Thus @deva[परिसोढः] and @deva[परिसोढुम्] retain @deva[स्], whereas @deva[परिषहते] (present stem @deva[सह्] without the @deva[सोढ्] change) does show @deva[ष्त्व]. See @ref[8.3.59] and @ref[8.2.36] for the @deva[सोढ्] formation.
"""

advanced = """
@deva[षत्व] does not apply to the @deva[स्] of @deva[सह्] when it assumes the @deva[सोढ] form: @deva[परिसोढः], @deva[परिसोढुम्], @deva[परिसोढव्यम्]. This is an exception to @ref[8.3.70]. When @deva[सह्] retains its base form, @deva[षत्व] applies normally: @deva[परिषहते], @deva[विषहते].
"""

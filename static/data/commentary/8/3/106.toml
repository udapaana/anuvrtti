id = "8.3.106"
numericId = "83106"

[en]
simple = """
In the Vedic language, some grammarians say that the retroflex change also applies within a compound or between compound members when the preceding element ends in certain vowels. Both forms are then acceptable.
"""

standard = """
In @deva[छन्दस्], according to some, @deva[ष्त्व] is substituted for @deva[स्] at the start of a second compound member when the first member ends in a sound belonging to @deva[इण्] or @deva[कु]. Examples: @deva[द्विषन्धिः] or @deva[द्विसन्धिः]; @deva[मधुष्ठानम्] or @deva[मधुस्थानम्]. This is a @deva[वार्तिक] extending @ref[8.3.106] to compound-internal position in Vedic texts.
"""

advanced = """
In @deva[छन्दस्], according to some (@deva[एकेषाम्]), @deva[ष्] replaces @deva[स्] at the beginning of a second word (or second compound member) when preceded by a word ending in @deva[इण्] or @deva[कु]. Examples: @deva[द्विषन्धिः] or @deva[द्विसन्धिः], @deva[त्रिषन्धिः] or @deva[त्रिसन्धिः]; @deva[मधुष्ठानम्] or @deva[मधुस्थानम्]; @deva[द्विषाहस्रं] @deva[चिन्वीत] or @deva[द्विसाहस्रं] @deva[चिन्वीत]. The term @deva[पूर्वपद] covers both the first member of a compound and a preceding word outside a compound: @deva[त्रिःषमृद्धत्वाय] or @deva[त्रिःसमृद्धत्वाय].
"""

id = "8.3.57"
numericId = "83057"

[en]
simple = """
This is an @deva[अधिकार], which goes till the end of the @deva[पाद]. The @deva[कार्य] designated in this @deva[अधिकार] happens for a @deva[स्थानी] that follows an @deva[इण्] letter or a letter from @deva[कवर्ग].
"""

standard = """
@[adhikāra]: @deva[इण्कोः] (after @deva[इ]/@deva[उ]/@deva[ऋ]/@deva[ॠ]/@deva[र्]/guttural) governs through end of chapter. @deva[सिषेव], @deva[अग्निषु], @deva[वाक्षु]. Not: @deva[दास्यति] (after @deva[आ]).
"""

advanced = """
This @deva[अधिकार] supplies the condition "after @deva[इण्] or @deva[कु]" to every rule through the end of the chapter. The @deva[प्रत्याहार] @deva[इण्] (formed with the second @deva[ण्] of @deva[लण्]) includes all vowels and semivowels except @deva[अ] and @deva[आ]; among semivowels, only @deva[र्] is practically operative. @deva[कु] denotes the @deva[क]-class gutturals. This condition feeds into @ref[8.3.59] and subsequent rules. Forms: @deva[सिषेव], @deva[सुष्वाप], @deva[अग्निषु], @deva[वायुषु], @deva[कर्तृषु], @deva[हर्तृषु], @deva[गीर्षु], @deva[धूर्षु], @deva[वाक्षु], @deva[त्वक्षु]. The @deva[इण्]/@deva[कु] condition excludes @deva[दास्यति] (affix @deva[स] of @deva[स्यति]) and @deva[असौ] (substitute @deva[स] by @ref[7.2.106]), where @deva[स] is not preceded by @deva[इण्]/@deva[कु] and hence not changed to @deva[ष].
"""

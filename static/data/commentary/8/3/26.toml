id = "8.3.26"
numericId = "83026"

[en]
simple = """
In the context of @deva[संहिता], if a @deva[पदान्तमकार] is followed by '@deva[ह्] + @deva[म्]' then that @deva[पदान्तमकार] is optionally converted to @deva[मकार].
"""

standard = """
@deva[म्] optionally unchanged before @deva[ह्म्]. @deva[किं] @deva[ह्मलयति] or @deva[किम्] @deva[ह्मलयति]. Vt: @deva[म्] → @deva[य्]/@deva[व्]/@deva[ल्] before @deva[ह्य्]/@deva[ह्व्]/@deva[ह्ल्].
"""

advanced = """
@deva[पद]-final @deva[म्] is optionally retained (as @deva[म्] rather than @deva[अनुस्वार]) before @deva[ह] followed by @deva[म्]. Forms: @deva[किं] @deva[ह्मलयति] / @deva[किम्] @deva[ह्मलयति], @deva[कथं] @deva[ह्मलयति] / @deva[कथम्] @deva[ह्मलयति]. @deva[वार्तिक]: before @deva[ह्य], @deva[ह्व], and @deva[ह्ल], the preceding @deva[म्] may become @deva[य्], @deva[व्], or @deva[ल्] respectively — @deva[किं] @deva[ह्यः] / @deva[किय्ँह्यः]; @deva[किं] @deva[ह्वलयति] / @deva[किव्ँ] @deva[ह्वलयति]; @deva[किं] @deva[ह्लादयति] / @deva[किल्ँ] @deva[ह्लादयति].
"""

id = "8.3.94"
numericId = "83094"

[en]
simple = """
The same irregular word with the retroflex also applies as the name of a Vedic meter. In other contexts referring to the spreading or width of something, the regular non-retroflex form is used.
"""

standard = """
When @deva[विष्टर] is the name of a Vedic @deva[छन्दस्] (meter), the irregular @deva[ष्त्व] form is retained: @deva[विष्टारपङ्क्तिः]. By contrast, @deva[पटस्य विस्तारः] 'the width of a cloth' uses the regular form because it carries only the literal meaning. This is a continuation of the @deva[निपात] listing begun at @ref[8.3.93].
"""

advanced = """
The irregular form @deva[विष्टर] also applies when denoting a @[chhandas] (meter). By @ref[3.3.34], @deva[विष्टार] is formed, naming the meter @deva[विष्टारपङ्क्तिः]. In the literal sense of "width" or "spreading," no @deva[षत्व]: @deva[पटस्य] @deva[विस्तारः]. This @[sutra] potentially renders @ref[3.3.34] redundant; some resolve this by holding that @ref[3.3.34] is not confined to @deva[वि], permitting forms like @deva[प्रस्तारपङ्क्तिः] and @deva[संसारपङ्क्तिः].
"""

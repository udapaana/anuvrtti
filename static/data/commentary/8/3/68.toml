id = "8.3.68"
numericId = "83068"

[en]
simple = """
The s of stambh also changes to @[ṣ] after the prefix ava, but only in two specific senses: physical support (leaning on something) or spatial contiguity (being next to something). In other senses, like being afflicted, s is retained.
"""

standard = """
This rule restricts @deva[अव] + @deva[स्तम्भ्] to two semantic contexts for @deva[ष्]-change (@ref[8.3.68]): @deva[अवलम्बन] (support/leaning) and @deva[सान्निध्य] (contiguity/nearness). Example: @deva[अवष्टभ्य] (leaning), @deva[अवष्टब्धा सेना] (army stationed nearby). In the sense of affliction (@deva[बाध]), @deva[अवस्तब्धः शीतेन] retains @deva[स्].
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्तम्भ्] after @[upasarga] @deva[अव] when the sense is @deva[आलम्बन] (support, leaning) or @deva[आविदूर्य] (contiguity, nearness). Examples: @deva[अवष्टभ्यास्ते] (remains leaning on a staff), @deva[अवष्टभ्य] @deva[तिष्ठति]; in the sense of nearness: @deva[अवष्टब्धा] @deva[सेना] (the army stationed nearby), @deva[अवष्टब्धा] @deva[शरत्] (see @ref[5.2.13]). In other senses the change does not apply: @deva[अवस्तब्धो] @deva[वृषलः] @deva[शीतेन] (the @[sudra] afflicted with cold). This @[sutra] extends @deva[षत्व] to a context where the preceding letter is not @deva[इ] or @deva[उ].
"""

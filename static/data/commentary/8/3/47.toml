id = "8.3.47"
numericId = "83047"

[en]
simple = """
While doing a @deva[समास], if the @deva[पूर्वपद] is either the word @deva[अधः] or the word @deva[शिरः] and if the the @deva[उत्तरपद] the word @deva[पद], then then the @deva[विसर्ग] of the @deva[पूर्वपद] is converted to @deva[सकार]. However, if the @deva[पूर्वपद] is itself a @deva[समास], then this @deva[सकारादेश] does not happen.
"""

standard = """
@deva[विसर्ग] of @deva[अधस्]/@deva[शिरस्] (not preceded) → @deva[स्] before @deva[पद] in compound. @deva[अधस्पदम्], @deva[शिरस्पदम्]. Not: @deva[परमशिरः] @deva[पदम्].
"""

advanced = """
@deva[स्] substitutes for the @deva[विसर्ग] of @deva[अधस्] or @deva[शिरस्] (when not preceded by another compound member) before the word @deva[पद] in composition. Forms: @deva[अधस्पदम्], @deva[शिरस्पदम्]; @deva[अधस्पदी], @deva[शिरस्पदी]. The @deva[समासे] condition excludes non-compound uses: @deva[अधः] @deva[पदम्]. The @deva[अनुत्तरपदस्थस्य] condition excludes @deva[परमशिरः] @deva[पदम्]. @deva[अधस्पदम्] is a compound formed under the @deva[मयूरव्यंसकादि] class.
"""

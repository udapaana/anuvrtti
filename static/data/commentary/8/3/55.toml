[en]
simple = """
This is an @deva[अधिकार], which goes till the end of the @deva[पाद]. For the @deva[स्थानी] that does not occur at end of a @deva[पद], the closest '@deva[मूर्धन्य]' letter comes as the @deva[आदेश].
"""

standard = """
@[adhikāra]: @deva[ष्] substitution (non-@deva[पद]-final) governs through end of @[pāda].
"""

advanced = """
Up to the end of the @deva[पद] , is throughout to be supplied the following - 'A cerebral letter substituted always in the room of …, when this letter does not stand at the end of a word'.
"""

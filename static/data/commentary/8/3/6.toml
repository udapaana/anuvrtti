[en]
simple = """
The @deva[म्] of @deva[पुम्] becomes @deva[रु] before voiceless stops followed by vowel/semivowel/nasal. Example: @deva[पुँः] @deva[क्यात्].
"""

standard = """
In @deva[पुम्] 'man', the @deva[म्] becomes @deva[रु] before @deva[खय्] consonants (voiceless stops) when followed by @deva[अच्], @deva[यण्], or nasal. This creates @deva[पुँः] or @deva[पुंः] before such sequences. The condition is phonologically specific.
"""

advanced = """
The @deva[पुमः] @deva[खय्यम्परे] condition identifies the precise environment: a voiceless stop followed by vowel, semivowel, or nasal. This complex sandhi rule reflects the stem @deva[पुम्स्]'s behavior before certain consonant clusters.
"""

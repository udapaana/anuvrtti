id = "8.3.33"
numericId = "83033"

[en]
simple = """
In the context of @deva[संहिता], when a letter of the @deva[मय्] @deva[प्रत्याहार] occurring at end of a @deva[पद] is followed by word @deva[उञ्] which in turn is followed by a @deva[स्वर], then the word @deva[उञ्] is optionally converted to a @deva[वकार].
"""

standard = """
@deva[उ] (particle) after @deva[मय्] consonant optionally → @deva[व्] before vowel. @deva[शम्वस्तु] or @deva[शमु] @deva[अस्तु], @deva[किम्वावपनम्].
"""

advanced = """
@deva[व्] optionally substitutes for the particle @deva[उ] when preceded by a @deva[मय्] consonant (all consonants except semivowels, sibilants, @deva[ह], and @deva[ञ]) and followed by a vowel. Forms: @deva[शमु] @deva[अस्तु] @deva[वेदिः] / @deva[शम्वस्तु] @deva[वेदिः], @deva[तद्] @deva[उ] @deva[अस्य] @deva[रेतः] / @deva[तद्वस्य] @deva[रेतः], @deva[किम्] @deva[उ] @deva[आवपनम्] / @deva[किम्वावपनम्]. Since @deva[उ] is @deva[प्रगृह्य] by @ref[1.1.14], it would otherwise remain unchanged; this rule optionally ordains @deva[व्]. The resulting @deva[व] is @deva[असिद्ध], so @deva[म्] is not changed to @deva[अनुस्वार] in @deva[किम्वावपनम्], @deva[शम्वस्तु] by @ref[8.3.23]. When @deva[उ] is followed by @deva[इति] and preceded by a @deva[मय्] consonant, @ref[1.1.17] makes it optionally @deva[प्रगृह्य], with possible @deva[ऊँ] substitution. This yields five forms with @deva[इति]: (1) @deva[किंविति] (@deva[यणादेश] @deva[व्] by @ref[6.1.77], with @deva[अनुस्वार] by @ref[8.3.23]); (2) @deva[किम्विति] (@deva[प्रगृह्य] @deva[उ] → @deva[व्] by this rule); (3) @deva[किमु] @deva[इति] (@deva[प्रगृह्य], no change); (4) @deva[किम्विँति] (with @deva[ऊँ] → nasal @deva[व्ँ]); (5) @deva[किम्] @deva[ऊँ] @deva[इति] (@deva[ऊँ] unchanged).
"""

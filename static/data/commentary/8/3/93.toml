id = "8.3.93"
numericId = "83093"

[en]
simple = """
A word meaning either 'tree' or 'seat' is formed irregularly with a retroflex. The same word without the retroflex means 'extension' or 'spreading out,' which is a completely different concept.
"""

standard = """
The word @deva[विष्टर] is a @deva[निपात] formed with @deva[ष्त्व] when it denotes 'tree' or 'seat.' The suffix @deva[अरन्] (@ref[3.3.34]) attaches to @deva[वि] + @deva[स्तृ], giving @deva[विष्टरो वृक्षः] and @deva[विष्टरमासनम्]. In the meaning 'spreading out,' the regular form @deva[विस्तरः] (without @deva[ष्त्व]) is used. For the parallel rule, see @ref[8.3.92].
"""

advanced = """
The form @deva[विष्टर] is an irregular @[nipata] in the senses of "tree" and "seat," formed by adding affix @deva[अप्] to @deva[स्तृ] preceded by @deva[वि]: @deva[विष्टरो] @deva[वृक्षः], @deva[विष्टरमासनम्]. In the sense of "spreading out," no @deva[षत्व]: @deva[औलपिवाक्यस्य] @deva[विस्तरः]. See @ref[3.3.33], by which @deva[अप्] is added instead of @deva[धञ्].
"""

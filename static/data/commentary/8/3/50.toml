id = "8.3.50"
numericId = "83050"

[en]
simple = """
In Vedic texts, a visarga becomes s before certain verb forms: @[kaḥ], karat, karati, @[kṛdhi], and @[kṛtaḥ]. The exception is the word @[aditiḥ], which keeps its visarga unchanged even before these forms.
"""

standard = """
In Vedic texts, @deva[विसर्ग] is replaced by @deva[स्] before the words @deva[कः], @deva[करत्], @deva[करति], @deva[कृधि], and @deva[कृतः] by @ref[8.3.50]. The word @deva[अदितिः] is specifically excluded. Examples: @deva[विश्वतस्कः], @deva[पयस्करति]; but @deva[अदितिः करत्] is left unchanged.
"""

advanced = """
@deva[विसर्ग] → @deva[स्] in @deva[छन्दस्] before the verb forms @deva[कः], @deva[करत्], @deva[करति], @deva[कृधि], and @deva[कृतः] — but not when the @deva[विसर्ग] belongs to @deva[अदितिः]. Derivations: @deva[कः] is the Aorist of @deva[कृ] with @deva[च्वि] elided (@ref[2.4.80]), @deva[ऋ] @deva[गुण]ated before @deva[तिप्], @deva[त्] elided by @ref[6.1.68], augment @deva[अट्] not added (@ref[6.4.75]) — @deva[विश्वतस्कः]. @deva[करत्] is the Aorist of @deva[कृ] with @deva[अङ्] (@ref[3.1.59]) — @deva[विश्वतस्करत्]. @deva[करति] is @deva[लट्] of @deva[कृ] with @deva[शप्] instead of @deva[उ] (Vedic anomaly) — @deva[पयस्करति]. @deva[कृधि] is the imperative of @deva[कृ]: @deva[सि] → @deva[हि], @deva[विकरण] elided, @deva[हि] → @deva[धि] by @ref[6.4.102] — @deva[उरणस्कृधि] (@deva[न] → @deva[ण] by @ref[8.4.27]). @deva[कृतम्] is the past participle — @deva[सदस्कृतम्]. The @deva[अदितिः] exclusion: @deva[यथा] @deva[नो] @deva[अदितिः] @deva[करत्] (RV I.43.2).
"""

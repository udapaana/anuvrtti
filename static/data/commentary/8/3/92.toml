id = "8.3.92"
numericId = "83092"

[en]
simple = """
The word meaning 'one who goes in front' or 'the chief' is irregularly formed with a retroflex. When the same sequence of sounds refers to a hill peak or a unit of measure, the retroflex does not appear.
"""

standard = """
The word @deva[प्रष्ठ] is a @deva[निपात] (irregularly listed form) used when it means 'a chief' or 'one going in front.' Example: @deva[प्रष्ठोऽश्वः] 'the foremost horse.' When the compound @deva[प्र] + @deva[स्थ] means a mountain peak or a measure, the standard form @deva[प्रस्थः] is used. This semantic conditioning parallels the pattern in @ref[8.3.90].
"""

advanced = """
The form @deva[प्रष्ठ] is an irregular @[nipata] when denoting "a chief" or "one who goes in front": @deva[प्रष्ठोऽश्वः] (the foremost horse). In the senses of a mountain peak or a measure, no @deva[षत्व]: @deva[प्रस्थे] @deva[हिमवतः] @deva[पुण्ये] (on the sacred peak of the @[himalaya]); @deva[प्रस्थो] @deva[व्रीहीणाम्] (a measure of barley).
"""

id = "8.3.3"
numericId = "83003"

[en]
simple = """
Before @deva[रु] followed by @deva[अट्] sounds (vowels, @deva[ह्], @deva[य्], @deva[व्], @deva[र्]), the vowel @deva[आ] becomes nasal. Example: @deva[तस्माँ] @deva[अत्र].
"""

standard = """
The @deva[अनुनासिक] @deva[आ] (@deva[आँ]) replaces @deva[आ] when @deva[रु] follows and an @deva[अट्]-@[pratyāhāra] letter (@deva[अ], @deva[इ], @deva[उ], etc., @deva[ह्], @deva[य्], @deva[व्], @deva[र्]) comes after. This creates forms like @deva[तस्माँ] @deva[अपि।] The nasalization is conditioned by the following sound.
"""

advanced = """
The @deva[आदेशप्रकृत्या] condition specifies that @deva[आ] takes nasalization in this environment. The @deva[अट्]-class includes all vowels plus @deva[य्], @deva[व्], @deva[र्], and @deva[ह्]. This nasalization is part of classical sandhi before visarga.
"""

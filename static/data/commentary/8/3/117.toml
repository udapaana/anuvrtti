id = "8.3.117"
numericId = "83117"

[en]
simple = """
The verb meaning 'to press out (soma)' does not take a retroflex in future or conditional forms, even when prefixed by words that would normally cause the change. In the perfect tense, the retroflex does appear.
"""

standard = """
The @deva[ष्त्व] rule is blocked for the @deva[स्] of @deva[सु] (@deva[सुनोति], 'to press') in the @deva[लृट्] (future) and @deva[लृङ्] (conditional), and also in the @deva[सन्]-forms (desiderative). Thus @deva[अभिसोष्यति], @deva[अभ्यसोष्यत्]. However, the @deva[लिट्] (perfect) @deva[सुषाव] does show @deva[ष्त्व]. The distinction arises from differences in stem formation across tenses. See @ref[8.3.64].
"""

advanced = """
@deva[षत्व] does not apply to the @deva[स्] of @deva[सु] (@deva[सुनोति]) in the @deva[लृट्] (future), @deva[लृङ्] (conditional), and desiderative (@deva[सन्]). Future/conditional examples: @deva[अभिसोष्यति], @deva[परिसोष्यति], @deva[अभ्यसोष्यत्], @deva[पर्यसोष्यत्].

For the desiderative, @deva[सुसूषति] is not a valid example since @ref[8.3.61] already blocks the reduplicate change; @deva[अभिसुसूषते] is also excluded by the @[niyama] of @ref[8.3.64]. The proper examples are @deva[अभिसुसूः] and @deva[निसुसूः], derived from the desiderative stem via @deva[क्विप्]—here the desiderative @deva[सन्] is not changed to @deva[ष] (@ref[8.3.61]), so the second @deva[स] (coming after the reduplicate) would otherwise undergo @deva[षत्व]; this @[sutra] blocks it.

The restriction to @deva[स्य] and @deva[सन्] contexts: in the perfect, @deva[षत्व] does apply—@deva[सुषाव].
"""

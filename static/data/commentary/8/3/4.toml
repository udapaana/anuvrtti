id = "8.3.4"
numericId = "83004"

[en]
simple = """
When nasalization is not applied, an @[anusvāra] (@deva[अं]) is added instead. Example: @deva[तस्मां] @deva[अत्र] or @deva[तस्माँ] @deva[अत्र].
"""

standard = """
The nasalization of @ref[8.3.2] being optional, when not applied, @deva[अनुस्वार] is augmented instead. Thus either @deva[तस्माँ] @deva[अत्र] (nasal vowel) or @deva[तस्मां] @deva[अत्र] (with @[anusvāra]). Both represent the nasal element.
"""

advanced = """
The @deva[पूर्वस्य] @deva[तु] @deva[वाऽनुस्वारः] rule provides the alternative when @deva[आदेश] is declined. The @deva[अनुस्वार]-augment preserves the nasal quality without modifying the vowel itself. This creates the familiar @[anusvāra-before-visarga] pattern.
"""

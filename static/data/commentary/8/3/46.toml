id = "8.3.46"
numericId = "83046"

[en]
simple = """
While doing a @deva[समास], if all the following conditions are met - 1. the @deva[पूर्वपद] ends in a @deva[विसर्ग] that follows an @deva[अकार], 2. the @deva[उत्तरपद] is either a form of the verb '@deva[कृ]', or a form of the verb '@deva[कमि]' or is one of these words - @deva[कंस]/@deva[कुम्भ]/@deva[पात्र]/@deva[कुशा]/@deva[कर्णी] 3. @deva[पू्र्वपद] is not an @deva[अव्यय] 4. @deva[पू्र्वपद] is not a @deva[समास] - then the @deva[विसर्ग] of the @deva[पूर्वपद] is converted to @deva[सकार].
"""

standard = """
@deva[विसर्ग] of @deva[अस्]-ending non-indeclinable → @deva[स्] before @deva[कृ]/@deva[कम्]/@deva[कंस]/@deva[कुम्भ]/@deva[पात्र]/@deva[कुशा]/@deva[कर्णी] in compound. @deva[अयस्कारः], @deva[पयस्कंसः]. Not: @deva[भाःकरणम्] (long @deva[आ]), @deva[श्वःकारः] (indecl.).
"""

advanced = """
@deva[स्] substitutes for the @deva[विसर्ग] of a non-indeclinable @deva[अस्]-ending word in a compound (when not preceded by another compound member) before @deva[कृ], @deva[कम्], @deva[कंस], @deva[कुम्भ], @deva[पात्र], @deva[कुशा], or @deva[कर्णी]. Forms: with @deva[कृ] — @deva[अयस्कारः], @deva[पयस्कारः] (@ref[3.2.1]); with @deva[कम्] — @deva[अयस्कामः], @deva[पयस्कामः]; with @deva[कंस] — @deva[अयस्कंसः], @deva[पयस्कंसः]; with @deva[कुम्भ] — @deva[अयस्कुम्भः], @deva[पयस्कुम्भः] (also @deva[अयस्कुम्भी], @deva[पयस्कुम्भी] by the maxim @deva[प्रातिपदिकग्रहणे] @deva[लिङ्गविशिष्टस्यापि] @deva[ग्रहणम्]); with @deva[पात्र] — @deva[अयस्पात्रम्], @deva[पयस्पात्रम्]; with @deva[कुशा] — @deva[अयस्कुशा], @deva[पयस्कुशा]; with @deva[कर्णी] — @deva[अयस्कर्णी], @deva[पयस्कर्णी]. (@deva[शुनस्कर्णः] belongs to @deva[कस्कादि] @ref[8.3.48].) The condition @deva[अतः] ("after short @deva[अ]") excludes @deva[गीःकारः], @deva[धूःकारः]. "Short @deva[अ]" excludes @deva[भाःकरणम्] (long @deva[आ]); @deva[भास्करः] is handled under @deva[कस्कादि] (@ref[8.3.48], also @ref[3.2.2]). The indeclinable exclusion yields @deva[श्वःकारः], @deva[पुनःकारः]. The @deva[समासे] condition excludes non-compound uses: @deva[यशः] @deva[करोति], @deva[पयः] @deva[करोति], @deva[यशः] @deva[कामयते]. The @deva[अनुत्तरपदस्थस्य] condition excludes @deva[परमपयः] @deva[कारः], @deva[परमपयः] @deva[कामः]. The inclusion of @deva[कंस] (derivable from root @deva[कम्] + @deva[उणादि] affix @deva[स]) is a @deva[ज्ञापक] for the maxim @deva[उणादयोऽव्युत्पन्नानि] @deva[प्रातिपदिकानि] — @deva[उणादि]-derived words are treated as underived @deva[प्रातिपदिक]s that do not trigger operations dependent on their etymological formation.
"""

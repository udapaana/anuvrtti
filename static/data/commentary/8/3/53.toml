id = "8.3.53"
numericId = "83053"

[en]
simple = """
In Vedic texts, when a visarga marks the genitive case, it changes to s before certain words: pati, putra, @[pṛṣṭha], @[pāra], pada, payas, and @[poṣa]. This creates familiar compounds found throughout the Vedas.
"""

standard = """
A @deva[षष्ठी] (genitive) @deva[विसर्ग] in Vedic becomes @deva[स्] before the words @deva[पति], @deva[पुत्र], @deva[पृष्ठ], @deva[पार], @deva[पद], @deva[पयस्], and @deva[पोष] by @ref[8.3.53]. Classic examples include @deva[वाचस्पतिम्] (lord of speech), @deva[दिवस्पुत्राय] (son of heaven), and @deva[रायस्पोषम्] (increase of wealth).
"""

advanced = """
The genitive (6th case) @deva[विसर्ग] becomes @deva[स्] in @deva[छन्दस्] before @deva[पति], @deva[पुत्र], @deva[पृष्ठ], @deva[पार], @deva[पद], @deva[पयस्], and @deva[पोष]. Forms: @deva[वाचस्पतिं] @deva[विश्वकर्माणमूतये] (RV X.81.7); @deva[दिवस्पुत्राय] @deva[सूर्याय]; @deva[दिवस्पृष्ठे] @deva[धावमानं] @deva[सुपर्णम्]; @deva[अगन्म] @deva[तमसस्पारम्]; @deva[इडस्पदे] @deva[समिध्यसे]; @deva[सूर्यं] @deva[चक्षुर्दिवस्पयः]; @deva[रायस्पोषं] @deva[यजमानेषु] @deva[धत्तम्]. The genitive condition excludes: @deva[मनुः] @deva[पुत्रेभ्यो] @deva[दायं] @deva[व्यमजत्] (where @deva[मनुः] is not genitive).
"""

id = "8.3.51"
numericId = "83051"

[en]
simple = """
In Vedic texts, when a visarga marks the ablative case and is followed by pari meaning 'from above' or 'over', it changes to s. This applies only to the sense of 'from', not when pari is used in other senses.
"""

standard = """
When a @deva[विसर्ग] is the @deva[पञ्चमी] (ablative) ending in Vedic and the following word is @deva[परि] in the sense of 'above' or 'from', it changes to @deva[स्] (@ref[8.3.51]). Example: @deva[दिवस्परि] 'from the sky'. The change does not apply where @deva[परि] is used in a non-ablative sense, as in @deva[अहिरिव भोगैः पर्येति].
"""

advanced = """
The @deva[विसर्ग] of the ablative (5th case) becomes @deva[स्] before @deva[परि] in the sense of "over" in @deva[छन्दस्]. Forms: @deva[दिवस्परि] @deva[प्रथमं] @deva[जज्ञे] (RV X.45.1), @deva[अग्निर्हिमवतस्परि]; @deva[दिवस्परि], @deva[महस्परि]. The ablative condition excludes: @deva[अहिरिव] @deva[भोगैः] @deva[पर्येति] @deva[बाहुम्]. The @deva[परि] condition excludes other preverbs: @deva[एभ्यो] @deva[वा] @deva[एतल्लोकेभ्यः] @deva[प्रजापतिः] @deva[समैरयत्]. The "over" meaning condition excludes @deva[दिवः] @deva[पृथिव्याः] @deva[प्रर्योज] @deva[उद्भृतम्] (RV VI.47.27), where @deva[परि] means "on all sides."
"""

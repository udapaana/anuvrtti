id = "8.3.88"
numericId = "83088"

[en]
simple = """
Several roots beginning with s — including one meaning 'to sleep,' one meaning 'birth,' and one meaning 'same or equal' — change that initial s to a retroflex when they follow specific prefixes. The change does not apply in certain derived nouns.
"""

standard = """
The @deva[स्] of @deva[स्वप्] (in its @deva[सुप्] form), @deva[सूति], and @deva[सम] is substituted by @deva[ष्] when preceded by the @deva[उपसर्ग]s @deva[सु], @deva[वि], @deva[निर्], or @deva[दुर्]. Examples: @deva[सुषुप्तः], @deva[विषूतिः], @deva[विषमम्]. Excluded: @deva[विस्वप्नः] (derived noun, not the verbal root form). See @ref[8.3.65] for the general triggering environment.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्वप्] (in its @deva[सुप्] form with @[samprasarana]), @deva[सूति], and @deva[सम] after @deva[सु], @deva[वि], @deva[निर्], or @deva[दुर्].

@[karika]: @deva[सुपेः] @deva[षत्वं] @deva[स्वपेर्मा] @deva[भूर्द्विसुष्वापेति] @deva[केन] @deva[न] / @deva[हलादिशेषान्न] @deva[सुपिरिष्टं] @deva[पूर्वं] @deva[प्रसारणम्] // @deva[स्थादीनां] @deva[नियमो] @deva[नात्र] @deva[प्राक्सितादुत्तरः] @deva[सुपि] / @deva[अनर्थके] @deva[विषुषुपः] @deva[षुपिभूतो] @deva[द्विरुच्यते] //

Examples for @deva[सुप्] (the @[samprasarana] form of @deva[स्वप्]): @deva[सुषुप्तः], @deva[निःषुप्तः], @deva[दुःषुप्तः]. @deva[षत्व] is taught for @deva[सुप्] specifically so it does not apply to the @deva[स्वप्] form: @deva[विस्वप्नः], @deva[विस्वप्नक्] (@ref[3.2.172]).

For @deva[सूति] (@deva[क्तिन्]-form of @deva[सू]), the rule applies only to this derivative: @deva[सुषूतिः], @deva[विषूतिः], @deva[निःषूतिः], @deva[दुःषूतिः]. The word @deva[सम] refers to the noun, not the verb @deva[सम्] @deva[वैक्लव्ये]: @deva[सुषमम्], @deva[विषमम्], @deva[निःषमम्], @deva[दुःषमम्].

In the perfect @deva[विसुष्वाप], the reduplicate @deva[स] does not undergo @deva[षत्व]. The reduplication process is: @deva[विस्वप्स्वप्], then @deva[प्]-elision gives @deva[विस्वस्वप्], then @[samprasarana] gives @deva[विसुस्वप्]—no @deva[सुप्] form exists at this stage. By @[ishti], @[samprasarana] precedes @deva[हलादिशेष] elision (see @ref[5.1.1]); otherwise @deva[व्] would also be elided alongside @deva[प्]. @ref[8.3.64] does not apply here either, since that rule is confined to roots up to @deva[सित] in @ref[8.3.70], and @deva[सुप्] falls after that boundary. Additionally, with @deva[प्] elided, bare @deva[सु] is @deva[अनर्थक], and the maxim @deva[अर्थवद्] @deva[ग्रहणे] @deva[नानर्थकस्य] applies.

For @deva[विषुषुपुः] (perfect plural): the derivation proceeds @deva[वि] + @deva[स्वप्] → @[samprasarana] → @deva[विसुप्] → @deva[षत्व] → @deva[विषुप्] → reduplication → @deva[विषुप्षुप्]. The form @deva[षुप्] (already changed) is what gets reduplicated. Though @deva[षत्व] is normally @[asiddha], for reduplication purposes it is not treated as @[asiddha] (see @ref[8.2.3] @[vartika]).
"""

id = "8.3.84"
numericId = "83084"

[en]
simple = """
The s of the word @[svasṛ] (sister) optionally changes to @[ṣ] when it appears in a compound after @[mātṛ] (mother) or @[pitṛ] (father). Both the retroflexed and non-retroflexed compound forms are valid.
"""

standard = """
After @deva[मातृ] or @deva[पितृ] in a compound, @deva[स्] of @deva[स्वसृ] optionally becomes @deva[ष्] (@ref[8.3.84]). Valid forms: @deva[मातृष्वसा] or @deva[मातृस्वसा] (mother's sister, i.e., maternal aunt); @deva[पितृष्वसा] or @deva[पितृस्वसा] (father's sister, i.e., paternal aunt). The option (@deva[वा]) reflects dialectal variation in @[pāṇinian] usage.
"""

advanced = """
@deva[ष्] is optionally substituted for the @deva[स्] of @deva[स्वसृ] after @deva[मातृ] and @deva[पितृ] in a compound. As @deva[मातृष्वसा], @deva[पितृष्वसा] @deva[॥] See @ref[6.3.24].
"""

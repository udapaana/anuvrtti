id = "8.3.42"
numericId = "83042"

[en]
simple = """
The @deva[विसर्ग] of the word @deva[तिरस्] is optionally converted to @deva[सकार] in presence of @deva[कवर्ग] / @deva[पवर्ग] letter.
"""

standard = """
@deva[विसर्ग] of @deva[गति] @deva[तिरस्] optionally → @deva[स्] before @deva[कु]/@deva[पु]. @deva[तिरस्कर्ता] or @deva[तिरः] @deva[कर्ता]. Obligatory when @deva[तिरस्] ≠ 'disappearance'.
"""

advanced = """
The @deva[विसर्ग] of @deva[गति] @deva[तिरस्] is optionally changed to @deva[स्] before a hard guttural or labial. Forms: @deva[तिरस्कर्त्ता] / @deva[तिरः] @deva[कर्त्ता], @deva[तिरस्कर्त्तुम्] / @deva[तिरः] @deva[कर्त्तुम्], @deva[तिरस्कर्त्तव्यम्] / @deva[तिरः] @deva[कर्त्तव्यम्]. The condition @deva[गतेः] is understood here as well. No option applies when @deva[तिरस्] is not used in the sense of 'disappearance' — @deva[तिरः] @deva[कृत्वा] @deva[काण्डं] @deva[गतः] (@ref[1.4.72]).
"""

id = "8.3.21"
numericId = "83021"

[en]
simple = """
A @deva[पदान्तयकार] and a @deva[पदान्तवकार] coming after an @deva[अकार] is removed when followed by the @deva[पद] @deva[उञ्] in the context of @deva[संहिता].
"""

standard = """
@deva[व्]/@deva[य्] after @deva[अ]/@deva[आ] at @deva[पद]-end obligatorily elided before @deva[उ] (particle). @deva[स] @deva[उ] @deva[एकविंशतिः]. Not: @deva[तन्त्रयुतम्] (@deva[उ] from @deva[वेञ्]).
"""

advanced = """
@deva[पद]-final @deva[व्] and @deva[य्] preceded by @deva[अ] or @deva[आ] are obligatorily elided before @deva[उ] when @deva[उ] is a @deva[पद] (the particle @deva[उञ्]), not the @deva[संप्रसारण] of root @deva[वेञ्]. Forms: @deva[स] @deva[उ] @deva[एकविंशतिः], @deva[स] @deva[उ] @deva[एकाग्निः]. The condition @deva[पदे] excludes the @deva[उञ्] obtained from @deva[वेञ्] by @deva[संप्रसारण], as in @deva[तन्त्रे] @deva[उतं] = @deva[तन्त्रयुतम्]. The @deva[संप्रसारण]-derived @deva[उ] would already be excluded by the @[lakṣaṇa]-@[pratipadokta] maxim; the word @deva[पदे] serves subsequent rules like @ref[8.3.32], ensuring that @deva[ङ्मुट्]-augment applies before a @deva[पद]-initial vowel, not before an affix-initial vowel — hence no doubling of @deva[न्] in @deva[परमदण्डिना]. This is a @deva[नित्य] rule; had it been optional, @ref[8.3.19] alone would have sufficed.
"""

id = "8.3.15"
numericId = "83015"

[en]
simple = """
@deva[र्] becomes visarga before @deva[खर्] consonants (voiceless sounds) or at pause. Example: @deva[पुनर्] @deva[करोति] → @deva[पुनः] @deva[करोति].
"""

standard = """
Word-final @deva[र्] is replaced by @deva[विसर्जनीय] (visarga) before @deva[खर्] consonants (voiceless stops and sibilants) or at @[avasāna] (pause/sentence-end). This produces @deva[पुनः], @deva[प्रातः], etc. before voiceless sounds.
"""

advanced = """
The @deva[रः] @deva[खरवसानयोर्विसर्जनीयः] rule is fundamental to Sanskrit sandhi. The visarga represents underlying @deva[र्] in these positions. Before voiced sounds, different rules apply (@deva[र्] retained or changed).
"""

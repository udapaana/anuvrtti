id = "8.3.118"
numericId = "83118"

[en]
simple = """
In perfect-tense forms of two specific roots, the retroflex does not apply to the root's initial s after the reduplicated syllable, even when that reduplicate ends in a triggering vowel. Only the prefix position triggers the change.
"""

standard = """
The @deva[ष्त्व] rule does not apply to the @deva[स्] of @deva[सद्] and @deva[स्वञ्ज्] when it follows the @deva[अभ्यास] (reduplicate syllable) in the @deva[लिट्] (perfect). Thus @deva[परिषसाद]: here the first @deva[स्] (from the @deva[उपसर्ग] @deva[परि]) does become @deva[ष्], but the root's own @deva[स्] after the reduplicate remains. Similarly @deva[परिषस्वजे]. See @ref[8.3.116] for the related aorist exception.
"""

advanced = """
@deva[षत्व] does not apply to the @deva[स्] of @deva[सद्] and @deva[स्वञ्ज्] after the @[abhyasa] in the @deva[लिट्] (perfect). In the perfect, reduplication produces two @deva[स]'s: @deva[ससाद], @deva[सस्वञ्ज]. After an @[upasarga], only the first @deva[स] becomes @deva[ष]; the second (root-initial) @deva[स] remains unchanged. Examples: @deva[अभिषसाद], @deva[परिषसाद], @deva[निषसाद], @deva[विषसाद]; @deva[परिषस्वजे], @deva[परिषस्वजाते], @deva[परिषस्वजिरे], @deva[अभिषस्वजे].

The nasal of @deva[स्वञ्ज्] is elided here despite the @deva[लिट्] affix not being @deva[कित्] (it ends in a compound vowel: @ref[6.4.24], @ref[1.2.5], @ref[1.2.6]). @deva[स्वञ्ज्] does not appear in the @[sutra] text itself but was inserted by the @[kasika] author from the @[vartika]: @deva[सदो] @deva[लिटि] @deva[प्रतिषेधे] @deva[स्वञ्जे] @deva[रूपसंख्यानं] @deva[कर्तव्यम्].
"""

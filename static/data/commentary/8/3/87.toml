id = "8.3.87"
numericId = "83087"

[en]
simple = """
When the verb 'to be' follows prefixes ending in the vowels i or u, or follows a specific particle, its initial consonant becomes retroflex before vowels or the consonant y. This does not apply in other contexts.
"""

standard = """
The @deva[स्] of the root @deva[अस्] 'to be' is changed to @deva[ष्] when preceded by an @deva[उपसर्ग] ending in @deva[इ] or @deva[उ] (as per @deva[इण्] per @ref[8.3.57]), or by @deva[प्रादुस्], when followed by a vowel or @deva[य्]. Examples: @deva[अभिषन्ति], @deva[प्रादुःषन्ति], @deva[निष्यात्]. Not applicable in @deva[दधिस्यात्] (no @deva[उपसर्ग]) or @deva[निस्तः] (@deva[त्] not @deva[य्]).
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[अस्] (to be) when preceded by an @deva[इ]/​@deva[उ]-final @[upasarga] or by @deva[प्रादुः], and followed by a vowel (@deva[अच्]) or @deva[य्]. The expression @deva[यच्] @deva[परः] means "followed by @deva[य्] or @deva[अच्]." @deva[प्रादुः] is an indeclinable meaning "evidently."

Examples: @deva[अभिषन्ति], @deva[निषन्ति], @deva[विषन्ति], @deva[प्रादुःषन्ति]; @deva[अभिष्यात्], @deva[निष्यात्], @deva[विष्यात्], @deva[प्रादुःष्यात्].

The @[upasarga] must end in @deva[इ] or @deva[उ]: @deva[दधिस्यात्] and @deva[मधुस्यात्] show no change (no @[upasarga]). The specification @deva[अस्] restricts the rule to this root alone: @deva[अनुसृतम्] and @deva[विसृतम्] are unaffected. One might argue that @deva[अस्] is unnecessary since the @[upasarga] would naturally qualify only a verb consisting of bare @deva[स्] (i.e., @deva[अस्] with @deva[अ]-elision), and @deva[प्रादुः] combines only with @deva[कृ], @deva[भू], and @deva[अस्]. The counter-argument: @deva[अनुसू] (a proper name), whose derivative @deva[आनुसेयः] (with @deva[ढक्], @[subhradi] class) yields @deva[आनुस्] + @deva[एय] after @deva[ऊ]-elision by @ref[6.4.147]. Here @deva[स्] is the sole root-element remaining, @deva[अनु] is the @[upasarga], and @deva[एय] the affix—without the explicit mention of @deva[अस्], the rule would incorrectly apply to this @deva[स्].

The condition @deva[यच्परः] (followed by a vowel or @deva[य्]) is also essential: @deva[निस्तः], @deva[विस्तः], and @deva[प्रादुस्तः] retain @deva[स्] because @deva[त्] follows.
"""

id = "8.3.1"
numericId = "83001"

[en]
simple = """
In Vedic, the affixes @deva[मत्] and @deva[वस्] become @deva[रु] in the vocative singular. Example: @deva[भवत्] → @deva[भो।]
"""

standard = """
In @deva[छन्दस्] (Vedic), the vocative singular of stems ending in @deva[मत्] or @deva[वस्] takes @deva[रु]-substitution for the final. Thus @deva[भगवत्]→@deva[भगवो], @deva[विद्वस्]→@deva[विद्वो।] This creates the distinctive Vedic vocative forms.
"""

advanced = """
The @deva[संबोधने] @deva[छन्दसि] condition restricts this to Vedic vocative. The @deva[रु]-substitution (with subsequent @[visargīkaraṇa]) produces forms different from classical Sanskrit vocatives. This is a starting rule for pada 8.3.
"""

id = "8.3.82"
numericId = "83082"

[en]
simple = """
When the word @[sthālī] (a cooking pot) appears in a compound after the word agni (fire), its initial s changes to @[ṣ]. As with the previous rules, this applies only in compounds.
"""

standard = """
The @deva[स्] of @deva[स्थाली] becomes @deva[ष्] after @deva[अग्नि] in a compound (@ref[8.3.82]), yielding @deva[अग्निष्ठाली] (a pot placed over fire). Outside a compound, @deva[अग्नेः स्थाली] (the pot of fire) retains @deva[स्]. This continues the pattern of compound-internal retroflexion rules.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of (1) @deva[स्तुत], (2) @deva[स्तोम], and (3) @deva[सोम] after @deva[अग्नि] in a compound: @deva[अग्निष्टुत्], @deva[अग्निष्टोमः], @deva[अग्नीषोमः].

By @[ishti], the @deva[इ] of @deva[अग्नि] lengthens before @deva[सोम], and @deva[षत्व] applies only after this lengthened @deva[ई]. Without lengthening, no change: @deva[अग्निसोमौ] @deva[माणवकौ]; @deva[अग्निसोमौ] @deva[तिष्ठतः] (referring to physical fire and the @[soma] plant). Without compounding: @deva[अग्नेः] @deva[सोमः].

@deva[अग्निष्टुत्] is formed with @deva[क्विप्]—the sacrifice in which @[agni] is praised (@deva[स्तूयते]). @deva[अग्निष्टोमः] names the first @deva[संस्था] of the @[soma]-@[yaga]. @deva[अग्नीषोमः] is specifically a @deva[देवता-द्वन्द्व]; where @[agni] and @[soma] are names of two boys or refer to physical fire and herb, no @deva[षत्व] applies. @[asvalayana], however, applies lengthening and @deva[षत्व] even in the latter case: @deva[अग्नीषोमौ] @deva[प्रणेष्यामि].
"""

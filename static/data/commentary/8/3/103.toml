id = "8.3.103"
numericId = "83103"

[en]
simple = """
In Vedic texts, when the consonant s appears within the interior of a verse line and is followed by the word for 'you' or the second person pronoun, it becomes retroflex. The change applies only within the same line, not across line boundaries.
"""

standard = """
In @deva[छन्दस्] (Vedic usage), the @deva[स्] occurring within the inner portion of a @deva[पाद] (verse quarter) is changed to @deva[ष्] before @deva[त्] of @deva[त्वम्] and similar words, or before @deva[युष्मद्]-forms. Examples: @deva[अग्निष्ट्वम्], @deva[अग्निष्टे]. The rule does not apply across @deva[पाद] boundaries: @deva[अग्निस्तत्] remains unchanged. This is a specifically Vedic extension of the general @ref[8.3.59] rule.
"""

advanced = """
In @deva[छन्दस्], @deva[स्] standing within the interior of a @deva[पाद] (verse quarter) changes to @deva[ष्] before @deva[त] of @deva[युष्मद्]-substitutes (@deva[त्वम्], @deva[त्वाम्], @deva[ते], @deva[तव]).

Examples: @deva[त्वम्]—@deva[अग्निष्ट्वं] @deva[नामासीत्]; @deva[त्वा]—@deva[अग्निष्ट्वो] @deva[वर्द्धयामसि]; @deva[ते]—@deva[अग्निष्टे] @deva[विश्वमानय]; @deva[तव]—@deva[अप्स्वग्ने] @deva[सधिष्टव] (@[rig] VIII.43.9); @deva[तत्]—@deva[अग्निष्टद्विश्वमापृणाति] (@[rig] X.2.4); @deva[ततक्षुस्]—@deva[द्यावापृथिवी] @deva[निष्टतक्षुषु].

The condition @deva[अन्तःपादम्] (within a @deva[पाद]): in @deva[यन्म] @deva[आत्मनो] @deva[मिन्दाभूदग्निस्तत्पुनराह] @deva[जातवेदा] @deva[विचर्षणिः], @deva[अग्निः] stands at the end of one @deva[पाद] and @deva[तत्] at the beginning of the next—the @deva[स्] of @deva[अग्निस्] is not within a single @deva[पाद], so no change.
"""

id = "8.3.95"
numericId = "83095"

[en]
simple = """
The adjective meaning 'firm' or 'steady' takes a retroflex initial consonant when it follows two specific words referring to a cow and to battle. These are fixed compound names, including the well-known hero Yudhishthira.
"""

standard = """
The @deva[स्] of @deva[स्थिर] is replaced by @deva[ष्] after @deva[गवि] and @deva[युधि] in a @deva[समास]. Thus @deva[गविष्ठिरः] 'firm as a cow' and @deva[युधिष्ठिरः] 'firm in battle.' These are @deva[निपात] forms governed by specific words listed in the @deva[गण], operating outside the general @ref[8.3.59] environment.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्थिर] after @deva[गवि] and @deva[युधि]: @deva[गविष्ठिरः], @deva[युधिष्ठिरः]. Compounding proceeds by @ref[2.1.44]; the @deva[सप्तमी] (locative) affix is not elided by @ref[6.3.9]. Although @deva[गो] does not end in a consonant, it retains its locative ending by virtue of this @[sutra].
"""

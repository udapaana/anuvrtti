id = "8.3.77"
numericId = "83077"

[en]
simple = """
The s of the root skambh always changes to @[ṣ] after the prefix vi. This is an obligatory change with no optionality, unlike some neighboring rules.
"""

standard = """
Unlike the optional rules for @deva[स्यन्द्] and @deva[स्कन्द्], the @deva[स् → ष्] change for @deva[स्कम्भ्] after @deva[वि] is obligatory (@ref[8.3.77]). Forms like @deva[विष्कभ्नाति] and @deva[विष्कम्भितुम्] always have @deva[ष्] — no alternative with @deva[स्] is allowed.
"""

advanced = """
@deva[ष्] obligatorily replaces the @deva[स्] of @deva[स्कम्भ्] after @[upasarga] @deva[वि] (no option). Examples: @deva[विष्कभ्नाति], @deva[विष्कम्भिता], @deva[विष्कम्भितुम्], @deva[विष्कम्भितव्यम्].
"""

id = "8.3.97"
numericId = "83097"

[en]
simple = """
The word element meaning 'standing' or 'position' becomes retroflex after a long list of specific preceding words. Common examples include the word for a cow-shed and the word for thumb. A later addition extends this to related word forms.
"""

standard = """
The @deva[स्] of @deva[स्थ] is substituted by @deva[ष्] after @deva[अम्ब], @deva[आम्ब], @deva[गो], @deva[भूमि], @deva[सव्य], @deva[अप्], @deva[द्वि], @deva[त्रि], @deva[कु], @deva[शेकु], @deva[शङ्कु], @deva[अङ्गु], @deva[मञ्जि], @deva[पुञ्जि], @deva[परमे], @deva[बर्हिस्], @deva[दिवि], and @deva[अग्नि]. Results: @deva[गोष्ठः], @deva[अङ्गुष्ठः], @deva[परमेष्ठी]. A @deva[वार्तिक] extends the rule to @deva[स्था], @deva[स्थिन्], and @deva[स्थृ] as well.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्थ] after: (1) @deva[अम्ब], (2) @deva[आम्ब], (3) @deva[गो], (4) @deva[भूमि], (5) @deva[सव्य], (6) @deva[अप], (7) @deva[द्वि], (8) @deva[त्रि], (9) @deva[कु], (10) @deva[शेकु], (11) @deva[शङ्कु], (12) @deva[अङ्गु], (13) @deva[मञ्जि], (14) @deva[पुञ्जि], (15) @deva[परमे], (16) @deva[बर्हिस्], (17) @deva[दिवि], and (18) @deva[अग्नि]. Results: @deva[अम्बष्ठः], @deva[आम्बष्ठः], @deva[गोष्ठः], @deva[भूमिष्ठः], @deva[सव्येष्ठः], @deva[अपष्ठः], @deva[द्विष्ठः], @deva[त्रिष्ठः], @deva[कुष्ठः], @deva[शेकुष्ठः], @deva[शङ्कुष्ठः], @deva[अङ्गुष्ठः], @deva[मञ्जिष्ठः], @deva[पुञ्जिष्ठः], @deva[परमेष्ठः], @deva[बर्हिष्ठः], @deva[दिविष्ठः], @deva[अग्निष्ठः].

The @[sutra] exhibits @deva[स्थ] in the nominative, denoting the word-form @deva[स्थ] itself—not the genitive of @deva[स्था], which would incorrectly extend the rule to @deva[गोस्थानम्], @deva[भूमिस्थानम्], etc. A @[vartika] extends the change to @deva[स्था], @deva[स्थिन्], and @deva[स्थृ] as well: @deva[सव्येष्ठाः], @deva[परमेष्ठी], @deva[सव्येष्ठा] @deva[सारथिः].
"""

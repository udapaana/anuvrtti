id = "8.3.113"
numericId = "83113"

[en]
simple = """
The verb meaning 'to drive cattle' keeps its plain s even when prefixed by words that would normally trigger a retroflex. When the same verb means 'to prohibit,' the retroflex does appear.
"""

standard = """
The @deva[ष्त्व] substitution is blocked for the @deva[स्] of @deva[सेध्] when the meaning is 'to drive' (as in @deva[अभिसेधयति गाः] 'drives the cows'). When the same root means 'to prohibit,' @deva[ष्त्व] applies: @deva[प्रतिषेधयति]. This semantic split shows that @deva[ष्त्व] is conditioned not only phonologically but also by @deva[अर्थ] (meaning), consistent with @ref[8.3.86].
"""

advanced = """
@deva[षत्व] does not apply to the @deva[स्] of @deva[सेध्] when the meaning is driving or moving. Examples: @deva[अभिसेधयति] @deva[गाः] (drives the cows), @deva[परिसेधयति] @deva[गाः]. This is an exception to @ref[8.3.65]. In the sense of prohibiting, @deva[षत्व] does apply: @deva[शिष्यमकार्यात्प्रतिषेधयति] (prevents the student from wrongdoing).
"""

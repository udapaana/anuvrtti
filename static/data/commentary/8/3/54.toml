id = "8.3.54"
numericId = "83054"

[en]
simple = """
In Vedic, the genitive visarga of the word @[iḍāyāḥ] optionally becomes s before words like pati. The change is not obligatory, so both forms are accepted in Vedic recitation.
"""

standard = """
This rule extends @ref[8.3.53] to the genitive @deva[विसर्ग] of @deva[इडाया], making the substitution optional (@deva[वा]) before @deva[पति] and related words (@ref[8.3.54]). Both @deva[इडायास्पतिः] (with the change) and @deva[इडायाः पतिः] (without) are therefore valid Vedic forms.
"""

advanced = """
@deva[स्] optionally substitutes for the genitive @deva[विसर्ग] of @deva[इडाया] before the same set (@deva[पति], @deva[पुत्र], @deva[पृष्ठ], @deva[पार], @deva[पद], @deva[पयस्], @deva[पोष]) from @ref[8.3.53], in @deva[छन्दस्]. Both forms are valid: @deva[इडायाः] @deva[पतिः] / @deva[इडायास्पतिः]; @deva[इडायाः] @deva[पुत्त्रः] / @deva[इडायास्पुत्त्रः]; @deva[इडायाः] @deva[पृष्ठम्] / @deva[इडायास्पृष्ठम्]; @deva[इडायाः] @deva[पारम्] / @deva[इडायास्पारम्]; @deva[इडायाः] @deva[पदम्] / @deva[इडायास्पदम्]; @deva[इडायाः] @deva[पयः] / @deva[इडायास्पयः]; @deva[इडायाः] @deva[पोषम्] / @deva[इडायास्पोषम्].
"""

id = "8.3.35"
numericId = "83035"

[en]
simple = """
A @deva[विसर्ग] is converted to @deva[विसर्ग] if it is followed by a @deva[खर्] letter after which a @deva[शर्] letter is present.
"""

standard = """
@deva[विसर्ग] unchanged before @deva[खर्] + @deva[शर्]. @deva[शशाः] @deva[क्षुरम्], @deva[वासः] @deva[क्षौमम्], @deva[पुरुषः] @deva[त्सरुः].
"""

advanced = """
@deva[विसर्ग] remains unchanged before a @deva[खर्] consonant that is itself followed by a @deva[शर्] (sibilant). The term @deva[शर्परे] is a @deva[बहुव्रीहि] — "that which is followed by @deva[शर्]." Forms: @deva[शशाः] @deva[क्षुरम्], @deva[पुरुषः] @deva[क्षुरम्], @deva[अद्भिः] @deva[प्साताम्], @deva[वासः] @deva[क्षौमम्], @deva[पुरुषः] @deva[त्सरुः], @deva[घनाघनः] @deva[क्षोभणश्चर्षणीनाम्]. The rule could have been stated more concisely as @deva[शर्परे] @deva[न], but the longer formulation indicates that @deva[जिह्वामूलीय] and @deva[उपध्मानीय] changes are also blocked in these contexts — as in @deva[अद्भिः] @deva[प्साताम्], @deva[वासः] @deva[क्षौमम्].
"""

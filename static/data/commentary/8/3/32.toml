id = "8.3.32"
numericId = "83032"

[en]
simple = """
In the context of @deva[संहिता], @deva[अ] @deva[ङ्]/@deva[ण्]/@deva[न्] letter occurring after a @deva[ह्रस्व] @deva[स्वर] causes a corresponding @deva[ङुट्] / @deva[णुट्] / @deva[नुट्] @deva[आगम] to an @deva[अच्] letter following it.
"""

standard = """
After @deva[पद]-final @deva[ङ्]/@deva[ण्]/@deva[न्] preceded by short vowel, @deva[ङमुट्] (same consonant) augments vowel-initial word. @deva[प्रत्यङ्ङास्ते], @deva[कुर्वन्नास्ते]. Not: @deva[प्राङास्ते] (long vowel).
"""

advanced = """
After a @deva[पद]-final @deva[ङ्], @deva[ण्], or @deva[न्] preceded by a @deva[ह्रस्व] vowel, the corresponding @deva[ङमुट्] augment (@deva[ङुट्], @deva[णुट्], or @deva[नुट्]) is obligatorily added to the following vowel-initial @deva[पद] — effectively doubling the nasal. The @deva[प्रत्याहार] @deva[ङम्] covers @deva[ङ], @deva[ण], @deva[न]; @deva[ङमुट्] is likewise a @deva[प्रत्याहार] of three augments. The term @deva[ङमः] is Ablative singular; @deva[ह्रस्वात्] qualifies it, and @deva[ङम्] qualifies the understood @deva[पदस्य] via @[tadanta]-@[vidhi]. The term @deva[अचि] is Locative but construed as Genitive for brevity and to serve subsequent rules. Forms: @deva[ङुट्] after @deva[ङ्]: @deva[प्रत्यङ्ङास्ते]. @deva[णुट्] after @deva[ण्]: @deva[वणणास्ते]. @deva[नुट्] after @deva[न्]: @deva[कुर्वन्नास्ते], @deva[कुर्वन्नवोचत्], @deva[कृषन्नास्ते], @deva[कृषन्नवोचत्]. "Ending in @deva[ङम्]" excludes @deva[त्वमास्ते]. "@deva[ह्रस्व]-preceded" excludes @deva[प्राङास्ते], @deva[भवानास्ते]. "Before a vowel" excludes @deva[प्रत्यङ्करोति]. @deva[महाभाष्य] @deva[वार्तिक]: @deva[ङमुटि] @deva[पदादिग्रहणम्] — the augment attaches to a @deva[पद]-initial vowel. Hence no @deva[नुट्] in @deva[दण्डिना] (the @deva[आ] is a case-affix, not @deva[पद]-initial). The objection that @deva[परमदण्डिन्] + @deva[आ] should receive @deva[नुट्] (since @deva[दण्डिन्] is a @deva[पद] by @deva[प्रत्ययलक्षण]) is resolved by the maxim: when an affix is elided by @deva[लुक्]/@deva[लुप्], @deva[प्रत्ययलक्षण] does not confer @deva[पद] status on the second compound member for rules applying to word-end (but does for rules applying to word-beginning, as in @deva[दधिसेचौ] where @deva[सेच्] retains @deva[पद] status for @ref[8.3.111]). The @deva[अनुवृत्ति] of @deva[पदात्] ceased at @ref[8.1.27], but @deva[पदे] from @ref[8.3.21] carries into this rule, yielding: @deva[अजादौ] @deva[पदे] @deva[ङमुड्] @deva[भवति] — the augment is added to a @deva[पद]-initial vowel only.
"""

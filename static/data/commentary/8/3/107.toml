id = "8.3.107"
numericId = "83107"

[en]
simple = """
In Vedic texts, the particle meaning 'well' or 'truly' can optionally become retroflex when it follows words ending in the vowels i or u. A Vedic example preserves this usage.
"""

standard = """
In @deva[छन्दस्], the @deva[स्] of the particle @deva[सु] is optionally changed to @deva[ष्] when preceded by a word ending in a sound from @deva[इण्] (i.e., @deva[इ] or @deva[उ]). Example: @deva[अभी षु णः सखीनाम्] from the @deva[ऋग्वेद]. This @deva[वार्तिक] handles a specific Vedic sandhi context not covered by @ref[8.3.59] in the @deva[लौकिक] grammar.
"""

advanced = """
In @deva[छन्दस्], @deva[ष्] replaces the @deva[स्] of the particle @deva[सु] when preceded by a word containing the triggering @deva[इण्] vowel. Examples: @deva[अभी] @deva[षु] @deva[णः] @deva[सखीनाम्] (@[rig] IV.31.3); @deva[ऊर्ध्वं] @deva[ऊ] @deva[षु] @deva[णः] (@[rig] I.36.13). The vowel-lengthening operates by @ref[6.3.134], and @deva[न] → @deva[ण] by @ref[8.4.27].
"""

id = "8.3.114"
numericId = "83114"

[en]
simple = """
Two specific words meaning 'firmly fixed' or 'stiffened' with the prefixes prati and nis are listed as exceptional — they do not undergo the retroflex change even though the phonological conditions are met.
"""

standard = """
The words @deva[प्रतिस्तब्ध] and @deva[निस्तब्ध] are @deva[अपवाद]s (exceptions) where @deva[ष्त्व] is not applied, despite the phonological environment qualifying under @ref[8.3.59]. The @deva[स्] of @deva[स्तब्ध] remains unchanged. These are listed irregularly, paralleling other @deva[निपात] exceptions in this section of @[adhyāya] 8.
"""

advanced = """
The words @deva[प्रतिस्तब्ध] and @deva[निस्तब्ध] are anomalous. In these words the @deva[स] is not changed to @deva[ष], though so required by @ref[8.3.67].
"""

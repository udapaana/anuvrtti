id = "8.3.38"
numericId = "83038"

[en]
simple = """
A @deva[पदान्त] @deva[विसर्ग] is converted to a @deva[सकार] when it is followed by the @deva[प्रत्ययाः] @deva[पाश्य], @deva[कल्प], @deva[क], @deva[काम्य].
"""

standard = """
@deva[विसर्ग] → @deva[स्] before non-@deva[पद]-initial @deva[कु]/@deva[पु] (i.e., affix-initial). @deva[पयस्पाशम्], @deva[पयस्काम्यति]. Not: @deva[पय]ᳶ @deva[पिबति]. Vt: Not for indeclinable @deva[विसर्ग].
"""

advanced = """
@deva[स्] substitutes for @deva[विसर्ग] before an affix-initial hard guttural or labial (i.e., @deva[अपदादौ] — not at the beginning of a @deva[पद]). The relevant affixes are @deva[पाश], @deva[कल्प], @deva[क], and @deva[काम्य]. Forms: @deva[पयस्पाशम्] (@ref[5.3.47]); @deva[पयस्कल्पम्], @deva[यशस्कल्पम्] (@ref[5.3.67]); @deva[पयस्कं], @deva[यशस्कम्] (@ref[5.3.70]); @deva[पयस्काम्यति], @deva[यशस्काम्यति] (@ref[3.1.9]). The @deva[अपदादौ] condition excludes @deva[पद]-initial cases: @deva[पय]ᳶ @deva[कामयते], @deva[पय]ᳶ @deva[पिबति]. @deva[वार्तिक] 1: The rule is blocked when the @deva[विसर्ग] belongs to an indeclinable — @deva[प्रातः] @deva[कल्पम्], @deva[पुनः] @deva[कल्पम्]. @deva[वार्तिक] 2: Only @deva[रु]-origin @deva[विसर्ग] becomes @deva[स] before @deva[काम्य] — @deva[पयस्काम्यति], @deva[यशस्काम्यति], but not @deva[गीः] @deva[काम्यति], @deva[धूः] @deva[काम्यति]. @deva[वार्तिक] 3: @deva[स] substitutes for @deva[उपध्मानीय] before a guttural. The root @deva[उ]ᳶ@deva[ज्] (@deva[आजवे], @deva[तुदादि] 20) has @deva[उपध्मानीय] as penultimate (written as @deva[उव्ज] in the @deva[धातुपाठ], where @deva[व्] represents ᳶ@deva[प]). When final @deva[ज्] → guttural, ᳶ@deva[प] → @deva[स], then @deva[स्] → @deva[द्], yielding @deva[अभ्युद्गः], @deva[समुद्गः]. These words may alternatively derive from root @deva[गम] with @deva[अभि] + @deva[उत्] / @deva[सम्] + @deva[उत्] and affix @deva[उ].
"""

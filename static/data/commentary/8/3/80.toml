id = "8.3.80"
numericId = "83080"

[en]
simple = """
When the word @[saṅga] (attachment, contact) appears in a compound after the word @[aṅguli] (finger), its initial s changes to @[ṣ]. This change only applies within a compound, not in a loose syntactic phrase.
"""

standard = """
In a compound, the @deva[स्] of @deva[सङ्ग] changes to @deva[ष्] after @deva[अङ्गुलि] (@ref[8.3.80]), giving @deva[अङ्गुलिषङ्गः] (a finger-ring or finger-contact). The rule is restricted to compounds (@deva[समास]): the phrase @deva[अङ्गुले सङ्गम्] (contact at the finger) with no compound shows no change.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[सङ्ग] after @deva[अङ्गुलि] in a compound. Examples: @deva[अङ्गुलिषङ्गः], @deva[अङ्गुलिषङ्गो] @deva[यवागूः], @deva[अङ्गुलिषङ्गो] @deva[गाः] @deva[सादयति]. Outside a compound, no change: @deva[अङ्गुले] @deva[सङ्गं] @deva[पश्य]. The word @deva[सङ्गः] is exhibited in the nominative but carries genitive force (@deva[सङ्गस्य]).
"""

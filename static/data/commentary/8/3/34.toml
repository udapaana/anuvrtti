id = "8.3.34"
numericId = "83034"

[en]
simple = """
A @deva[विसर्ग] occurring at end of a @deva[पद] is converted to a @deva[सकार] when followed by a letter from the @deva[खर्] @deva[प्रत्याहार].
"""

standard = """
@deva[विसर्ग] → @deva[स्] before @deva[खर्] + @deva[शर्] (sibilant). @deva[वृक्षश्छादयति], @deva[वृक्षस्तरति], @deva[वृक्षष्टीकते].
"""

advanced = """
@deva[स्] substitutes for @deva[विसर्ग] before a @deva[खर्] (hard consonant). The @deva[अनुवृत्ति] of @deva[खरि] is understood here. Forms: @deva[वृक्षश्छादयति], @deva[प्लक्षश्छादयति], @deva[वृक्षष्ठकारः], @deva[प्लक्षष्ठकारः], @deva[वृक्षस्थकारः], @deva[प्लक्षस्थकारः], @deva[वृक्षश्चिनोति], @deva[प्लक्षश्चिनोति], @deva[वृक्षष्टीकते], @deva[प्लक्षष्टीकते], @deva[वृक्षस्तरति], @deva[प्लक्षस्तरति]. By @ref[8.3.15], @deva[र्] becomes @deva[विसर्ग] before @deva[खर्] or at @deva[अवसान] (pause). Without further restriction, the @deva[स्]-substitution would apply at @deva[अवसान] as well (i.e., in @deva[वृक्षः], @deva[प्लक्षः]). This is prevented by two factors: the governing @deva[संहितायाम्] restricts the rule to @deva[संहिता] contexts, and the @deva[अनुवृत्ति] of @deva[खरि] ensures it applies only before @deva[खर्], not at pause.
"""

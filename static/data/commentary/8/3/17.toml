id = "8.3.17"
numericId = "83017"

[en]
simple = """
In the context of @deva[संहिता], A @deva[पदान्त] @deva[रुँ] that is present either at the end of @deva[भोस्]/@deva[भगोस्]/@deva[अघोस्], or after the letter @deva[अ]/@deva[आ] is converted to @deva[यकार] when followed by a letter from the @deva[अश्] @deva[प्रत्याहार].
"""

standard = """
@deva[रु] → @deva[य्] after @deva[भो]/@deva[भगो]/@deva[अघो]/@deva[अ]/@deva[आ] before @deva[अश्] (vowel/soft consonant). @deva[भोयत्र], @deva[कय्] @deva[आस्ते]. Not: @deva[अग्निरत्र] (no @deva[भो] etc.).
"""

advanced = """
@deva[य्] substitutes for @deva[रु]-origin @deva[र्] (not any other @deva[र्]) when preceded by @deva[भो], @deva[भगो], @deva[अघो], @deva[अ], or @deva[आ], before an @deva[अश्] letter (vowels and soft consonants). Forms: @deva[भो] @deva[अत्र], @deva[भगो] @deva[अत्र], @deva[अघो] @deva[अत्र], @deva[भो] @deva[ददाति], @deva[भगो] @deva[ददाति], @deva[अघो] @deva[ददाति]; @deva[क] @deva[आस्ते], @deva[कय्] @deva[आस्ते], @deva[ब्राह्मणा] @deva[ददाति], @deva[पुरुषा] @deva[ददाति]. The @deva[य्] may then be elided by @ref[8.3.19], @ref[8.3.20], @ref[8.3.22], etc. With @deva[य] retained: @deva[भोयत्र], @deva[भगोयत्र], @deva[अघोयत्र]. The condition "preceded by @deva[भो] etc." excludes forms like @deva[अग्निरत्र], @deva[वायुरत्र]. The @deva[अश्] condition in this @deva[सूत्र] is technically superfluous here — letters outside @deva[अश्] are @deva[खर्], before which @deva[र्] → @deva[विसर्ग] by @ref[8.3.15], and @deva[यत्व] is @deva[असिद्ध] for that purpose. The @deva[अश्] condition serves subsequent rules: in @ref[8.3.22], @deva[हलि] is qualified by @deva[अश्], restricting @deva[य]-elision to @deva[अश्] consonants only. Before non-@deva[अश्] consonants, no elision occurs — hence @deva[वृक्षव्] @deva[करोति] (from @deva[वृक्षवयति] with @deva[विच्] affix) retains @deva[व्] before @deva[क्]. The term @deva[हल्] rather than @deva[हश्] is used in @ref[8.3.22] for the sake of @ref[8.3.23], which applies to all consonants. The @deva[अश्] condition also prevents @ref[8.3.18] and @ref[8.3.19] from applying to @deva[वृक्षव्] @deva[करोति]. Since this rule targets @deva[रु]-origin @deva[र्] only, it does not apply to @deva[प्रातरत्र], @deva[पुनरत्र].
"""

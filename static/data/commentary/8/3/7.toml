id = "8.3.7"
numericId = "83007"

[en]
simple = """
Final @deva[न्] becomes @deva[रु] before @deva[छव्] consonants (@deva[छ्], @deva[ठ्], @deva[थ्], @deva[च्], @deva[ट्], @deva[त्]) followed by vowels etc. Except @deva[प्रशान्]. Example: @deva[तान्] @deva[चकार] → @deva[ताँश्चकार].
"""

standard = """
Word-final @deva[न्] (except in @deva[प्रशान्]) becomes @deva[रु] before @deva[छव्]-class consonants (@deva[छ्], @deva[ठ्], @deva[थ्], @deva[च्], @deva[ट्], @deva[त्]) when these are followed by @deva[अच्]/@deva[यण्]/nasal. This produces nasal vowel + @deva[श्]/@deva[ष्]/@deva[स्] sequences in sandhi.
"""

advanced = """
The @deva[नो] @deva[ने] @deva[छवि] condition triggers @deva[रुत्व] for final @deva[न्]. The @deva[प्रशान्] exception (@deva[प्रशान्] + @deva[छव्]) preserves the @deva[न्]. The @deva[छव्]-context creates characteristic sandhi like @deva[तान्] @deva[च] → @deva[ताँश्च] with sibilant doubling.
"""

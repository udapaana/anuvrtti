id = "8.3.91"
numericId = "83091"

[en]
simple = """
A place name that also serves as the name of an ancestral lineage founder takes an irregular retroflex form. When the same word refers simply to a physical place associated with monkeys, the regular form is used.
"""

standard = """
The word @deva[कपिष्ठल] is an irregularly listed (@deva[निपात]) form used when it denotes the founder of a @deva[गोत्र] (patronymic lineage). The @deva[पाणिनि]-derived form @deva[कापिष्ठलिः] follows. When the compound means 'land of monkeys' (@deva[कपि] + @deva[स्थल]), the regular @deva[कपिस्थलम्] is used with no @deva[ष्त्व]. Compare @ref[8.3.91]–@ref[8.3.96] for similar irregular listings.
"""

advanced = """
The form @deva[कपिष्ठल] is an irregular @[nipata] denoting the founder of a @[gotra] (patronymic lineage). The descendant: @deva[कापिष्ठलिः]. Here @[gotra] refers to the popular sense of "clan" as described in the @[pravara] lists, not the grammatical @[gotra]. In the literal meaning "land of monkeys," no @deva[षत्व]: @deva[कपिस्थलम्].
"""

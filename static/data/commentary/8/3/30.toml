id = "8.3.30"
numericId = "83030"

[en]
simple = """
In the context of @deva[संहिता], a @deva[सकार] present after a @deva[पदान्त] @deva[नकार] optionally gets a @deva[धुट्] @deva[आगम].
"""

standard = """
@deva[धुट्] optionally augments @deva[स्]-initial word after @deva[न्]. @deva[भवान्] @deva[त्साये] or @deva[भवान्] @deva[साये]. @deva[ध्] → @deva[त्] by @ref[8.4.55].
"""

advanced = """
After @deva[पद]-final @deva[न्], @deva[धुट्] is optionally augmented to a @deva[स्]-initial word. Forms: @deva[भवान्] @deva[त्साये] / @deva[भवान्] @deva[साये], @deva[महान्] @deva[त्साये] / @deva[महान्] @deva[साये]. The @deva[ध्] of the augment becomes @deva[त्] by @ref[8.4.55]. According to @deva[काशिका], the augment is stated as @deva[धुट्] rather than @deva[तुट्] because this @deva[त्] is @deva[असिद्ध] (@ref[8.2.1]) and must not be changed to @deva[रु] by @ref[8.3.7]. In @ref[8.3.29], @deva[तुट्] would have sufficed, but not here. The @deva[पदमञ्जरी], however, rejects this reasoning: @deva[न्] could never become @deva[रु] here because @deva[त्] is followed by @deva[स्], which is not an @deva[अम्] letter — @deva[अम्परे] is understood in @ref[8.3.7]. Under this view, @deva[तुट्] would have been preferable.
"""

id = "8.3.78"
numericId = "83078"

[en]
simple = """
When a verb stem ends in a sound of the @[iṇ] class (i or u type vowels), the dh of the endings @[ṣīdhvam], aorist dhvam, and perfect dhve changes to @[ḍh]. The exception is when a guttural consonant precedes, which blocks the change.
"""

standard = """
The @deva[ध्] in the suffix @deva[षीध्वम्] and in aorist and perfect @deva[ध्वम्/ध्वे] endings becomes @deva[ढ्] when the preceding stem ends in @deva[इण्] (a vowel of the @deva[इ] or @deva[उ] class) (@ref[8.3.78]). Examples: @deva[च्योषीढ्वम्], @deva[अच्योढ्वम्], @deva[चकृढ्वे]. The change is blocked by a preceding @deva[कु] (guttural), so @deva[पक्षीध्वम्] retains @deva[ध्].
"""

advanced = """
@deva[ढ्] (the retroflex) replaces @deva[ध्] of @deva[षीध्वम्] and of @deva[लुङ्] (aorist) and @deva[लिट्] (perfect) personal endings, when the @[anga] ends in @deva[इण्] (a vowel other than @deva[अ]). The term "retroflex" carries over from @ref[8.3.55]. Examples: @deva[च्योषीढ्वम्], @deva[प्लोषीढ्वम्]; aorist: @deva[अच्योढ्वम्], @deva[अप्लोढ्वम्] (@ref[8.2.25]); perfect: @deva[चकृढ्वे].

Though @deva[इण्कोः] was in @[anuvrtti] from @ref[8.3.57], the repetition of @deva[इण्] here signals that @deva[कु] (guttural) ceases to apply. After a guttural, no change: @deva[पक्षीध्वम्], @deva[यक्षीध्वम्].

The restriction to @deva[षीध्वम्], @deva[लुङ्], and @deva[लिट्] excludes @deva[लट्] and @deva[लङ्] endings: @deva[स्तुध्वे] and @deva[अस्तुध्वम्] retain @deva[ध्].

The condition @deva[अङ्गात्] (after a stem) excludes cases like @deva[परिवेविषीध्वम्] (from @deva[विष्लृ] @deva[व्याप्तौ], @[juhotyadi] class, with @[guna] of reduplicate by @ref[7.4.75] and elision of @deva[स्] of @deva[सीयुट्] by @ref[7.2.79]). Here @deva[षीध्वम्] consists of the root-final @deva[ष्] of @deva[विष्] plus the affix @deva[ईध्वम्], so the @[anga] is @deva[परिवेविष्], not @deva[परिवेवि]—the @deva[षीध्वम्] is not positioned after an @deva[इण्]-final stem. This result could also be derived without @deva[अङ्गात्] via the maxim @deva[अर्थवद्] @deva[ग्रहणे] @deva[नानर्थकस्य] (a meaningful sequence, when referred to, does not denote a meaningless combination of the same letters).
"""

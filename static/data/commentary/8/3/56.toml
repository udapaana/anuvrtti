id = "8.3.56"
numericId = "83056"

[en]
simple = """
The @deva[अपदान्त-सकार] present in the '@deva[साड्]' form of the verb @deva[सह्] is converted to @deva[षकार].
"""

standard = """
@deva[स्] of @deva[साह] (@deva[सह्] + @deva[ण्वि] = @deva[साड्]) → @deva[ष्]. @deva[जलाषाट्], @deva[तुराषाट्]. Not: @deva[जलासाहम्] (@deva[साह] form, not @deva[साड्]).
"""

advanced = """
@deva[ष्] substitutes for the @deva[स्] of @deva[साह] (from root @deva[सह्]) specifically in the @deva[साड्] form. Forms: @deva[जलाषाट्], @deva[तुराषाट्], @deva[पृतनाषाट्]. @deva[साड्] derives from @deva[सह्] + @deva[ण्वि] (@ref[7.2.63]) with @deva[वृद्धि] of the penultimate; @deva[ह] → @deva[ढ] (@ref[8.2.31]); @deva[उपपद] lengthened (@ref[6.3.137]). The word @deva[सहेः] is necessary because another @deva[साड्] exists not derived from @deva[सह्]: @deva[सह] @deva[डेन] @deva[वर्त्तते] = @deva[सडः], @deva[सडस्य] @deva[अपत्यं] = @deva[साडिः] (one whose name contains @deva[ड], like @deva[मृड]). The @deva[साड्] condition excludes the @deva[साह] form: @deva[जलासाहम्], @deva[तुरासाहम्]. The specification @deva[सः] ("for @deva[स्]") prevents @deva[ष]-change of the @deva[आ] in @deva[साड्] — @deva[ड्] is already retroflex.
"""

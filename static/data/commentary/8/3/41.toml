id = "8.3.41"
numericId = "83041"

[en]
simple = """
A @deva[विसर्ग] present after an @deva[इकार] or an @deva[उकार] which is not made from a @deva[प्रत्यय] is converted to @deva[ष] in presence of a @deva[कवर्ग] or a @deva[पवर्ग].
"""

standard = """
Non-affix @deva[विसर्ग] after @deva[इ]/@deva[उ] → @deva[ष्] before @deva[कु]/@deva[पु]. @deva[निष्कृतम्], @deva[दुष्कृतम्], @deva[बहिष्कृतम्], @deva[चतुष्कपालम्]. Not: @deva[अग्निः] @deva[करोति]. Vt: Not for @deva[पुम्]/@deva[मुहुस्]. Vt: Also after @deva[वृद्धि]/@deva[प्लुत] @deva[इ]/@deva[उ].
"""

advanced = """
@deva[ष्] substitutes for non-affix @deva[विसर्ग] preceded by @deva[इ] or @deva[उ] before a hard guttural or labial. This covers the @deva[विसर्ग] of @deva[निर्], @deva[दुर्], @deva[बहिर्], @deva[अविस्], @deva[चतुर्], and @deva[प्रादुस्]. Forms: @deva[निष्कृतम्], @deva[निष्पीतम्], @deva[दुष्कृतम्], @deva[दुष्पीतम्], @deva[बहिष्कृतम्], @deva[बहिष्पीतम्], @deva[आविष्कृतम्], @deva[आविष्पीतम्], @deva[चतुष्कृतम्], @deva[चतुष्कपालम्], @deva[चतुष्कन्दलम्], @deva[चतुष्कलम्], @deva[प्रादुष्कृतम्], @deva[प्रादुष्पीतम्]. The non-affix condition excludes @deva[अग्निः] @deva[करोति], @deva[वायुः] @deva[करोति] (where @deva[विसर्ग] is affix-derived). For @deva[मातुः] @deva[करोति], @deva[पितुः] @deva[करोति] — where the affix @deva[स्] is elided by @ref[8.2.24] and the resulting @deva[विसर्ग] is technically non-affix — the inclusion of @deva[भ्रातुष्पुत्रः] in @deva[कस्कादि] (@ref[8.3.48]) implies by @deva[ज्ञापक] that @deva[ष]-change does not occur for @deva[पितुः], @deva[मातुः], etc., only for @deva[भ्रातुः]. The reason: the @deva[विसर्ग] here follows an @deva[एकादेश] @deva[उ] (@ref[6.1.111]), not a simple @deva[उ]. @deva[वार्तिक] 1: @deva[ष]-change is blocked for @deva[पुम्] and @deva[मुहुस्] — @deva[पुंस्कामा], @deva[मुहुस्कामा]. @deva[वार्तिक] 2: @deva[ष]-change applies even when @deva[इ]/@deva[उ] undergo @deva[वृद्धि] — @deva[नैष्कुल्यम्], @deva[दौष्कुल्यम्]. @deva[वार्तिक] 3: @deva[ष]-change applies even with @deva[प्लुत] @deva[इ]/@deva[उ], and then before dentals as well — @deva[नि३ष्कुलम्], @deva[दु३ष्कुलम्] (@ref[8.2.86]), @deva[दु३ष्पुरुषः], @deva[वही३ष्टरः]. These last two @deva[वार्तिक]s may be unnecessary since @deva[वृद्धि] and @deva[प्लुत] are @deva[बहिरङ्ग] changes, and @deva[ष]-change would apply by the @deva[सूत्र] itself — except for the dental condition.
"""

id = "8.3.28"
numericId = "83028"

[en]
simple = """
In the context of @deva[संहिता], a @deva[ङकार] and a @deva[णकार] at end of a @deva[पद] optionally get @deva[कुक्] and @deva[टुक्] @deva[आगम] respectively.
"""

standard = """
Final @deva[ङ्] + @deva[कुक्], final @deva[ण्] + @deva[टुक्] optionally before sibilant. @deva[प्राङ्क्] @deva[शेते] or @deva[प्राङ्] @deva[शेते], @deva[प्राङ्क्] @deva[छेते] (@deva[छ] by @ref[8.4.63]).
"""

advanced = """
The augment @deva[कुक्] (@deva[क्]) attaches to final @deva[ङ्], and @deva[टुक्] (@deva[ट्]) to final @deva[ण्], optionally before a sibilant. Forms: @deva[प्राङ्क्] @deva[शेते] / @deva[प्राङ्] @deva[शेते]; @deva[प्राङ्क्] @deva[षष्ठः] / @deva[प्राङ्] @deva[षष्ठः]; @deva[प्राङ्क्] @deva[साये] / @deva[प्राङ्] @deva[साये]; @deva[वण्ट्] @deva[शेते] / @deva[वण्] @deva[शेते]. The indicatory @deva[क्] in @deva[कुक्] and @deva[टुक्] indicates attachment to the end of the prior word (@ref[1.1.46]), not the beginning of the following word. This placement enables @ref[8.4.63] (@deva[श] → @deva[छ] after @deva[पद]-final @deva[झय्]): @deva[प्राङ्क्] @deva[छेते]. Had @deva[क्] been prefixed to @deva[शेते] instead, the @deva[झय्] letter @deva[क्] would not be @deva[पद]-final, and @deva[छ]-change would fail — compare @deva[विरप्शिन्], where word-internal @deva[प्] (a @deva[झय्] letter) does not trigger @deva[छ]-change. @deva[विरप्शिन्] = @deva[महत्], from root @deva[रप्] with @deva[वि] and @deva[उणादि] affix @deva[शिनि]. Similarly, in @deva[प्राङ्क्] @deva[साये], @deva[स] does not become @deva[ष] by @ref[8.3.59] — had @deva[क्] been prefixed to @deva[साये], @deva[स] would no longer be @deva[पद]-initial, and @ref[8.3.111] would not protect it, yielding unwanted @deva[ष]-change. In @deva[वण्ट्] @deva[साये], @deva[स्] → @deva[ष] is blocked by @ref[8.4.42]; had @deva[ट्] been prefixed as @deva[ट्साये], @deva[ष]-change would occur by @ref[8.4.41].
"""

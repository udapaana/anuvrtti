id = "8.3.20"
numericId = "83020"

[en]
simple = """
Non-@deva[लघूच्चारण-यकार] present at end of a @deva[पद] and situated after the letter @deva[ओ] gets removed when it is followed by a letter from @deva[अश्] @deva[प्रत्याहार] in the context of @deva[संहिता].
"""

standard = """
@[gārgya]: @deva[य्] after @deva[ओ] obligatorily elided before @deva[अश्]. @deva[भो] @deva[अत्र] (not @deva[भोयत्र]). @deva[भगो] @deva[अत्र].
"""

advanced = """
According to @deva[गार्ग्य], @deva[य्] preceded by @deva[ओ] is elided before an @deva[अश्] letter (vowels and soft consonants). Since @deva[व्] cannot be preceded by @deva[ओ], only @deva[य्] is relevant here. Forms: @deva[भो] @deva[अत्र], @deva[भगो] @deva[अत्र], @deva[भो] @deva[इदम्], @deva[भगो] @deva[इदम्]. The separate statement marks this as a @deva[नित्य] (obligatory) rule, not @deva[विभाषा]. The attribution to @deva[गार्ग्य] is @[pūjārtha] (honorific). This rule prohibits the @[laghu]-@[prayatna] @deva[य्] elision that @ref[8.3.19] would otherwise cause, while still permitting the @[laghu]-@[prayatnatara] @deva[य्] of @ref[8.3.18]. Hence both @deva[भो] @deva[अत्र] and @deva[भोयत्र] are valid, as are @deva[भगो] @deva[अत्र] / @deva[भगोयत्र] and @deva[अघो] @deva[अत्र] / @deva[अघोयत्र]. According to others, all forms of @deva[य्] (heavy and light) are elided, making @deva[भोयत्र] invalid.
"""

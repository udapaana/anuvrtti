id = "8.3.23"
numericId = "83023"

[en]
simple = """
In the context of @deva[संहिता], the @deva[मकार] at the end of a @deva[पद] is converted to @deva[अनुस्वार] when it is followed by a @deva[हल्] @deva[वर्ण].
"""

standard = """
Final @deva[पद] @deva[म्] → @deva[अनुस्वार] before consonant. @deva[कुण्डं] @deva[हसति]. Not: @deva[त्वमत्र] (@deva[म्] not @deva[पद]-final), @deva[गम्यते] (internal).
"""

advanced = """
@deva[अनुस्वार] substitutes for @deva[पद]-final @deva[म्] before a consonant. Forms: @deva[कुण्डं] @deva[हसति], @deva[वनं] @deva[हसति], @deva[कुण्डं] @deva[याति], @deva[वनं] @deva[याति]. The condition @deva[हलि] is carried by @deva[अनुवृत्ति], so the rule does not apply before vowels — @deva[त्वमत्र], @deva[किमत्र]. The @deva[पद]-final condition excludes word-internal @deva[म्], as in @deva[गम्यते], @deva[रम्यते].
"""

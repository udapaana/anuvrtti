id = "8.3.9"
numericId = "83009"

[en]
simple = """
Final @deva[न्] after a long vowel optionally becomes @deva[रु] before @deva[अट्] sounds. Example: @deva[तान्] @deva[अत्र] → @deva[ताँ] @deva[अत्र] or @deva[तान्] @deva[अत्र].
"""

standard = """
When @deva[न्] follows a @deva[दीर्घ] (long) vowel and precedes @deva[अट्]-class sounds (vowels, @deva[ह्], @deva[य्], @deva[व्], @deva[र्]), the @deva[न्] optionally becomes @deva[रु]. This produces either @deva[ताँ] @deva[अत्र] or @deva[तान्] @deva[अत्र।] The option applies only after long vowels.
"""

advanced = """
The @deva[दीर्घादटि] @deva[वा] condition limits this optional @deva[रुत्व] to @[post-dīrgha] contexts. Short-vowel-preceded @deva[न्] would follow different rules. The @deva[अट्]-@[pratyāhāra] includes vowels and certain consonants as triggers.
"""

id = "8.3.108"
numericId = "83108"

[en]
simple = """
In Vedic texts, the verb root meaning 'to obtain' drops its nasal ending and the resulting s becomes retroflex when preceded by words ending in i or u vowels. When the nasal is retained, the change does not happen.
"""

standard = """
The @deva[स्] of the root @deva[सन्] is changed to @deva[ष्] in @deva[छन्दस्] when @deva[न्] is elided, under the same @deva[इण्]/@deva[कु] conditioning as @ref[8.3.57]. Examples: @deva[गोषाः] (from @deva[गो] + @deva[सन्] with @deva[न्]-loss), @deva[नृषाः]. When @deva[न्] is retained (as in @deva[गोसनिम्]), the rule does not apply, since the @deva[स्] is no longer in initial position of the Vedic word boundary.
"""

advanced = """
The @deva[स] of @deva[सन्] changes to @deva[ष] under the same @deva[इण्]/@deva[कु] conditions when its @deva[न्] is elided. Examples: @deva[गोषाः] (@[rig] IX.2.10), formed with affix @deva[विट] (@ref[3.2.67]), @deva[न्]-elision by @ref[6.4.41]; @deva[नृषाः].

When @deva[न्] is retained, no change: @deva[गोसनिं] @deva[वाचमुदीरयन्] (@[atharvaveda] III.20.10), with affix @deva[इन्] (@ref[3.2.27]). (Note however @deva[गोषणिं] at @[rig] VI.53.10.) Though @ref[8.3.106] could independently produce this @deva[षत्व], the separate statement serves as a @[niyama] (restriction). Some read @deva[गोसनिः] in the @deva[सवनादि] list (@ref[8.3.110]) and hold that the proper counterexample is @deva[सिसानयिषति].

The form @deva[सिसनीः] is derived by adding @deva[क्विप्] to the desiderative stem @deva[सिसनिस]: @deva[अ]-elision by @ref[6.4.48] gives @deva[सिसनिस्]; adding @deva[सु], the final @deva[स्] is elided by @ref[6.1.68]. The remaining final @deva[स्] (of desiderative @deva[सन्]) could become either @deva[ष्] or @deva[र्] (@deva[रु]); since @deva[षत्व] is @[asiddha], @deva[रु]-change applies, giving @deva[सिसनिर्] → @deva[सिसनीः] (lengthening by @ref[8.2.76]). The desiderative @deva[सन्] is not changed to @deva[ष] here, so @ref[8.3.61] does not govern this form. This @[niyama] function ensures @deva[षत्व] does apply in the causative @deva[शिषाणयिषति].
"""

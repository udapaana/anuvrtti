id = "8.3.72"
numericId = "83072"

[en]
simple = """
The s of the root syand changes optionally to @[ṣ] after the prefixes anu, vi, pari, abhi, and ni, but only when the subject is a non-living thing like a liquid. When a living being is the subject, the change does not apply.
"""

standard = """
The root @deva[स्यन्द्] optionally changes @deva[स् → ष्] after @deva[अनु], @deva[वि], @deva[परि], @deva[अभि], or @deva[नि] when the subject is an @deva[अचेतन] (inanimate) entity (@ref[8.3.72]). Example: @deva[अनुष्यन्दते तैलम्] (oil flows) or @deva[अनुस्यन्दते]. But for a living subject: @deva[अनुस्यन्दते मत्स्यः] (a fish flows along) — no @deva[ष्].
"""

advanced = """
@deva[ष्] optionally replaces the @deva[स्] of @deva[स्यन्द्] after @[upasarga] @deva[अनु], @deva[वि], @deva[परि], @deva[अभि], or @deva[नि] when the subject is inanimate (@deva[अप्राणि]). The root @deva[स्यन्दू] @deva[प्रस्रवणे] is @[anudatta]. Examples: @deva[अनुष्यन्दते] / @deva[अनुस्यन्दते], @deva[विष्यन्दते] / @deva[विस्यन्दते], @deva[परिष्यन्दते] / @deva[परिस्यन्दते], @deva[अभिष्यन्दते] @deva[तैलम्], @deva[निष्यन्दते].

With a living subject, the change does not apply: @deva[अनुस्यन्दते] @deva[मत्स्य] @deva[उदके]. When the subject is a @[dvandva] compound of animate and inanimate entities, the option applies: @deva[अनुस्यन्देते] or @deva[अनुष्यन्देते] @deva[मत्स्योदके] (dual by @ref[2.4.6]).

The term @deva[अप्राणिषु] functions as a @[paryudasa] (exclusion), not a @[prasajya]-@[pratishedha] (categorial negation). Under @[prasajya]-@[pratishedha], the force falls on "living," and a mixed compound containing any living entity would block @deva[षत्व] entirely. Under @[paryudasa], the force falls on "non-living," so the presence of a non-living entity in the compound suffices to trigger the option.

The @[anuvrtti] of @deva[परि], @deva[नि], and @deva[वि] carries from @ref[8.3.70]. The @[sutra] could therefore have been stated as @deva[अन्वभिभ्यां] @deva[च] @deva[स्यन्दतेरप्राणिषु], drawing in @deva[परि] etc. through @deva[च].
"""

id = "8.3.63"
numericId = "83063"

[en]
simple = """
The heading rule extends from here through rule @ref[8.3.70], meaning that the @[ṣ-change] applies even when an augment (@[aṭ]) intervenes between the prefix and the root. Both the present and past tense forms undergo the change.
"""

standard = """
This marks an @deva[अधिकार] (governing rule) extending through @ref[8.3.70] (@deva[सित्]), under which @deva[ष्] applies even when the @deva[अट्]-augment stands between @deva[उपसर्ग] and root (@ref[8.3.63]). Examples: @deva[अभिषुणोति] (present), @deva[अभ्यषुणोत्] (imperfect with @deva[अट्] augment) both show retroflexion.
"""

advanced = """
This @deva[अधिकार] governs @deva[षत्व] rules up to (but excluding) @deva[सित्] in @ref[8.3.70]. Within this domain, @deva[ष्] replaces @deva[स्] even when the @deva[अट्] augment intervenes between the @[upasarga] and the root. @ref[8.3.65] illustrates the basic change: @deva[अभिषुणोति], @deva[परिषुणोति], @deva[विषुणोति], @deva[निषुणोति]. With @deva[अट्] intervening: @deva[अभ्यषुणोत्], @deva[पर्यषुणोत्], @deva[व्यषुणोत्], @deva[न्यषुणोत्]. The particle @deva[अपि] indicates that the change applies both with and without the @deva[अट्] augment—covering present-tense forms as well as imperfect forms with the augment.
"""

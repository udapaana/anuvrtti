id = "8.3.31"
numericId = "83031"

[en]
simple = """
In the context of @deva[संहिता], a @deva[नकार] occurring at end of a @deva[पद] optionally gets a @deva[तुगागम] when followed by a @deva[शकार].
"""

standard = """
@deva[तुक्] optionally augments @deva[श्]-initial word after @deva[न्]. @deva[भवाञ्] @deva[च्छेते]. Augment added to prior word for @deva[छ]-change.
"""

advanced = """
@deva[तुक्] (@deva[त्]) is optionally augmented to the end of a @deva[न्]-final word before a @deva[श्]-initial word. Form: @deva[भवाञ्] @deva[च्छेते]. The augment is added to the prior word (not prefixed to the second) to enable @deva[श] → @deva[छ] change. A @deva[धुट्] prefixed to the second word would yield the same consonant @deva[त्], but the @deva[छ]-change would not occur since the @deva[झय्] letter would not be @deva[पद]-final. The question arises why @deva[न्] is not changed to @deva[ण्] when @deva[तुक्] makes it non-final, as in @deva[कुर्वञ्] @deva[च्छेते]. The answer requires splitting @ref[8.4.40] (@deva[स्तोः] @deva[श्चुना] @deva[श्चुः]) into two operations: (1) @deva[स्तोः] @deva[श्चुना] — @deva[स] and @deva[तु] followed by @deva[श] and @deva[चु] do not trigger @deva[ण]-change; (2) @deva[श्चुः] — the preceding @deva[स] and @deva[तु] are changed to @deva[श] and @deva[चु] respectively.
"""

id = "8.3.101"
numericId = "83101"

[en]
simple = """
The final s of certain words ending in the sounds is or us becomes retroflex when followed by a suffix beginning with t, as in comparison or superlative forms. Several specific words and suffixes are excluded.
"""

standard = """
The @deva[स्] at the end of a word in the @deva[इस्] or @deva[उस्] class (words ending in @deva[इस्] or @deva[उस्] with short vowel) is substituted by @deva[ष्] before a @deva[तद्धित] suffix beginning with @deva[त्]. Examples: @deva[सर्पिष्टरम्] (ghee + comparative), @deva[यजुष्टमम्] (superlative), @deva[चतुष्टये]. Exceptions: @deva[गीस्तरा] (long vowel), @deva[सर्पिस्साद्भवति] (suffix not starting with @deva[त्]). A @deva[वार्तिक] excludes @deva[पुम्]. See @ref[8.3.59] for the triggering environment.
"""

advanced = """
@deva[ष्] replaces the final @deva[स्] of a short-vowel @deva[इस्]/​@deva[उस्]-ending stem before a @deva[तद्धित] affix beginning with @deva[त]. The relevant affixes: @deva[तर], @deva[तम], @deva[तय], @deva[त्व], @deva[तल्], @deva[तस्], @deva[त्यप्].

Examples: @deva[तर]—@deva[सर्पिष्टरम्], @deva[यजुष्टरम्]; @deva[तम]—@deva[सर्पिष्टमम्], @deva[यजुष्टमम्]; @deva[तय]—@deva[चतुष्टये] @deva[ब्राह्मणानां] @deva[निकेताः]; @deva[त्व]—@deva[सर्पिष्ट्वम्], @deva[यजुष्ट्वम्]; @deva[तल्]—@deva[सर्पिष्टा], @deva[यजुष्टा]; @deva[तस्]—@deva[सर्पिष्टो], @deva[यजुष्टः]; @deva[त्यप्]—@deva[आविष्ट्यो] @deva[वर्द्धते].

The short-vowel condition: @deva[गीस्तरा], @deva[धूस्तरा] (long vowel, no change). The @deva[त]-initial condition: @deva[सर्पिस्साद्भवति]—though the affix @deva[सात्]'s @deva[स] is independently blocked by @ref[8.3.111], the base @deva[सर्पिस्]'s @deva[स्] also remains unchanged since the following affix does not begin with @deva[त]. The @deva[तद्धित] condition: @deva[सर्पिस्तरति] (a verb, not a @deva[तद्धित]).

@[vartika]: finite verb forms before @deva[तद्धित] affixes are excluded—@deva[भिन्द्युस्तराम्], @deva[छिन्द्युस्तराम्] (potential 3rd plural of @deva[भिद्] and @deva[छिद्] with @deva[यासुट्] augment, @deva[तरप्] by @ref[5.3.56], @deva[आम्] by @ref[5.4.11]). A further @[vartika] excludes @deva[पुंस्]: @deva[पुंस्त्वम्], @deva[पुंस्ता].
"""

id = "8.3.24"
numericId = "83024"

[en]
simple = """
In the context of @deva[संहिता], a @deva[मकार] and a @deva[नकार] which do not occur at the end of a @deva[पद] are converted to @deva[अनुस्वार] when followed by a @deva[झल्] letter.
"""

standard = """
Non-final @deva[पद] @deva[न्]/@deva[म्] → @deva[अनुस्वार] before @deva[झल्]. @deva[पयांसि], @deva[आक्रंस्यते]. Not: @deva[राजन्] @deva[भुङ्क्ष्व] (@deva[पद]-final @deva[न्]).
"""

advanced = """
@deva[अनुस्वार] substitutes for non-@deva[पद]-final @deva[न्] and @deva[म्] before a @deva[झल्] consonant. With @deva[न्] (@ref[7.1.72]): @deva[पयांसि], @deva[यशांसि], @deva[सर्पींषि], @deva[धनूंषि]. With @deva[म्]: @deva[आक्रंस्यते], @deva[आविक्रंस्यते], @deva[अधिजिगांसते]. The non-@deva[पद]-final condition excludes @deva[राजन्] @deva[भुङ्क्ष्व]. The @deva[झल्] condition excludes @deva[रम्यते], @deva[गम्यते] (where @deva[य] is not a @deva[झल्] letter).
"""

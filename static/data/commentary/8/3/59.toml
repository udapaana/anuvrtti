id = "8.3.59"
numericId = "83059"

[en]
simple = """
An @deva[अपदान्त] @deva[सकार] that was obtained either as an @deva[आदेश] or through a @deva[प्रत्यय] is converted to @deva[षकार] when it follows a letter from @deva[इण्-प्रत्याहार] or a @deva[कवर्ग].
"""

standard = """
@deva[आदेश] (substitute) @deva[स्] or affix @deva[स्] → @deva[ष्] after @deva[इण्]/@deva[कु]. @deva[सिषेव] (@deva[आदेश]), @deva[अग्निषु] (affix). Not: @deva[बिसम्बिसम्] (non-affix portion).
"""

advanced = """
@deva[ष्] substitutes for @deva[स्] that is either (a) an @deva[आदेश] (substitute for root-initial @deva[ष्] in the @deva[धातुपाठ] by @ref[6.1.64]) or (b) a portion of an affix, under the @deva[इण्कोः] (@ref[8.3.57]) and @deva[व्यवाय] (@ref[8.3.58]) conditions. The Genitive in @deva[आदेशस्य] is @deva[समानाधिकरण]-@deva[षष्ठी] ("that @deva[स्] which IS a substitute"), while in @deva[प्रत्ययस्य] it is @deva[अवयवयोग]-@deva[षष्ठी] ("that @deva[स्] which BELONGS TO an affix"). If both were @deva[अवयवयोग]-@deva[षष्ठी] ("@deva[स्] that is part of a substitute/affix"), then in @deva[द्विर्वचन] forms like @deva[बिसंबिसं], @deva[मुसलंमुसलं] (@ref[8.1.1]), @deva[स्] (being part of a substitute) would incorrectly become @deva[ष्]. Conversely, if both were @deva[समानाधिकरण]-@deva[षष्ठी] ("@deva[स्] that IS a substitute/affix"), forms like @deva[करिष्यति], @deva[हरिष्यति] would fail — @deva[स] there is part of an affix, not the whole affix. The rule would then apply only to affixes consisting entirely of @deva[स्], like @deva[सिप्] in Vedic @deva[लेट्]. This interpretation is confirmed by @ref[8.3.60]: @deva[घस्] is separately included because its @deva[स्] is part of a substitute, not itself a substitute — if @deva[आदेशस्य] meant "part of a substitute," @deva[घस्] would already be covered. Similarly, the exclusion of @deva[सात्] (@ref[5.4.52]) by @ref[8.3.111] confirms that @deva[प्रत्ययस्य] means "belonging to an affix." Substitute @deva[स्] examples: @deva[सिषेव], @deva[सुष्वाप]. Affix @deva[स्] examples: @deva[अग्निषु], @deva[वायुषु], @deva[कर्तृषु], @deva[हर्तृषु]; @deva[वक्षत्] (@deva[इन्द्रो] @deva[मा] @deva[वक्षत्]), @deva[यक्षत्] (@deva[स] @deva[देवान्] @deva[यक्षत्]) — where @deva[स्] is the entire affix @deva[सिप्], the maxim @deva[व्यपदेशिवदेकस्मिन्] applies. These derive from @deva[वच्] and @deva[यज्] in @deva[लेट्] with @deva[तिप्]; @deva[इ] elided (@ref[3.4.97]); augment @deva[अट्] (@ref[3.4.94]); affix @deva[सिप्] (@ref[3.1.34]); @deva[च्] of @deva[वच्] → guttural; @deva[ज्] of @deva[यज्] → @deva[ष्] → guttural. The @deva[उणादि] word @deva[अक्षरम्] (@deva[अश्] + @deva[सर], @deva[उणादि] III.70) complies with this rule, but @deva[कूसरम्] and @deva[धूसरम्] (@deva[उणादि] III.73, same affix @deva[सर]) do not.
"""

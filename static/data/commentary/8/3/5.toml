id = "8.3.5"
numericId = "83005"

[en]
simple = """
The @deva[म्] of @deva[स्म्] becomes @deva[रु] before @deva[सुट्] augment. Example: @deva[अस्मान्] + @deva[सु] → @deva[अस्माँः] @deva[सु].
"""

standard = """
When the @deva[सुट्] augment follows, the @deva[म्] of @deva[स्म्] (as in @deva[अस्मान्]) becomes @deva[रु], triggering nasal vowel or @[anusvāra] on the preceding @deva[अ]. This affects certain Vedic and emphatic forms with the @deva[सु]-particle.
"""

advanced = """
The @deva[स्मो] @deva[रुः] @deva[सुटि] @deva[संहितायाम्] rule applies in continuous speech. The @deva[सुट्]-augment context is specific. The resulting @deva[अँ] or @deva[अं] before @deva[रु] creates the nasal-visarga sequence in these formations.
"""

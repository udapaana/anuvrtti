id = "8.3.62"
numericId = "83062"

[en]
simple = """
For causative desideratives of the roots svid, svad, and sah, the reduplicated s remains unchanged and does not become @[ṣ]. These roots are specifically excluded from the retroflexion rule.
"""

standard = """
The causative desideratives of @deva[स्विद्], @deva[स्वद्], and @deva[सह्] are exempted from the @deva[स् → ष्] change in the reduplicate (@ref[8.3.62]). Forms like @deva[सिस्वेदयिषति] and @deva[सिसाहयिषति] retain @deva[स्] in the reduplicate, unlike causative desideratives of @deva[ष]-initial roots covered by @ref[8.3.61].
"""

advanced = """
@deva[स] is substituted for the @deva[स्] after the reduplicate of @deva[षण्] Desiderative of the Causatives of 1. @deva[स्विद्] 2. @deva[स्वद्] and 3. @deva[सह्]@deva[।] The @deva[स] substitute of @deva[स्] debars the cerebral change. In other words, the @deva[स] of these roots remains unchanged. As @deva[सिस्वेदयिषति], @deva[सिस्वादयिषति] and @deva[सिसाहयिषति] @deva[॥]
"""

id = "8.3.110"
numericId = "83110"

[en]
simple = """
The retroflex substitution is blocked in several situations: when the r sound immediately follows the s, and in the case of specific roots and word classes. Normal s is preserved in all these contexts.
"""

standard = """
The @deva[ष्त्व] substitution is prohibited when @deva[र्] follows the @deva[स्], and also for the roots @deva[सृप], @deva[सृज], @deva[स्पृश], @deva[स्पृह], and words in the @deva[सवनादि] @deva[गण]. Examples of blocked substitution: @deva[विस्रब्धः] (@deva[र्] follows), @deva[विसृपः] (root @deva[सृप्]), @deva[सवने सवने] (@deva[सवनादि]). These are exceptions carved out from the general @ref[8.3.59] environment.
"""

advanced = """
@deva[षत्व] is blocked when @deva[र्] follows the @deva[स्], and also for roots (1) @deva[सृप्], (2) @deva[सृज्], (3) @deva[स्पृश्], (4) @deva[स्पृह्], and (5) the @deva[सवनादि] @[gana].

Examples with @deva[र्] following: @deva[विस्रंसिकायाः] @deva[काण्डं] @deva[जुहोति] (from @deva[ण्वुल्], @ref[3.3.109]); @deva[विस्रब्धः] @deva[कथयति] (from @deva[सृम्भु] @deva[विश्वासे], @deva[इट्] blocked by @ref[7.2.15], nasal elided by @ref[6.4.24] before @[nishtha] @deva[त]).

Root examples: @deva[सृप्]—@deva[पुरा] @deva[क्रूरस्य] @deva[विसृपः] (affix @deva[कसुन्], @ref[3.4.17]); @deva[सृज्]—@deva[वाचो] @deva[विसर्जनात्]; @deva[स्पृश्]—@deva[विविस्पृशम्]; @deva[स्पृह्]—@deva[निस्पृहं] @deva[कथयति].

The @deva[सवनादि] list: (1) @deva[सवने] @deva[सवने], (2) @deva[सूते] @deva[सूते], (3) @deva[सोमे] @deva[सोमे], (4) @deva[सवनमुखे] @deva[सवनमुखे], (5) @deva[किंसः] @deva[किंसः] (@deva[किंस्यतीति] @deva[किंसः]), (6) @deva[अनुसवनम्], (7) @deva[गोसनिम्], (8) @deva[अश्वसनिम्]. An alternate enumeration adds: (9) @deva[संज्ञायां] @deva[बृहस्पतिसवः], (10) @deva[शकुनिसवनम्], (11) @deva[संवत्सरे] @deva[संवत्सरे], (12) @deva[बिसम्], (13) @deva[किंसम्]/​@deva[किसम्], (14) @deva[मुसलम्].
"""

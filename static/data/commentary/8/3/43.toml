id = "8.3.43"
numericId = "83043"

[en]
simple = """
For the words @deva[द्विस्] (= twice), @deva[त्रिस्] (= thrice), and @deva[चतुर्] = (four times) which are used to indicate frequency, their @deva[विसर्ग] when followed by a letter from @deva[कवर्ग] or @deva[पवर्ग] is optionally converted to @deva[ष्].
"""

standard = """
@deva[विसर्ग] of @deva[द्विस्]/@deva[त्रिस्]/@deva[चतुर्] (numeral adverbs) optionally → @deva[ष्] before @deva[कु]/@deva[पु]. @deva[द्विष्करोति] or @deva[द्विः] @deva[करोति]. But @deva[चतुष्कपालम्] obligatory (@ref[8.3.41]).
"""

advanced = """
@deva[ष्] optionally substitutes for the @deva[विसर्ग] of @deva[द्विस्], @deva[त्रिस्], and @deva[चतुर्] when used as numeral adverbs (@deva[कृत्वोर्थ]) before a hard guttural or labial. The affix @deva[सुच्] (@deva[स्]) is added by @ref[5.4.18]. Forms: @deva[द्विः] @deva[करोति] / @deva[द्विष्करोति], @deva[त्रिः] @deva[करोति] / @deva[त्रिष्करोति], @deva[चतुः] @deva[करोति] / @deva[चतुष्करोति]; similarly @deva[द्विः]/@deva[त्रिः]/@deva[चतुः] @deva[पचति] / @deva[द्विष्]/@deva[त्रिष्]/@deva[चतुष्पचति]. The @deva[कृत्वोर्थे] condition excludes @deva[चतुष्कपालम्] and @deva[चतुष्कण्टकम्], where @deva[ष] is obligatory by @ref[8.3.41]. This rule is an @deva[उभयत्र]-@deva[विभाषा]: for @deva[चतुर्] the @deva[विसर्ग] is non-affix, so @ref[8.3.41] would make @deva[ष] obligatory — this rule makes it optional (@deva[प्राप्त]-@deva[विभाषा]); for @deva[द्विस्]/@deva[त्रिस्] the @deva[विसर्ग] belongs to the affix @deva[सुच्], so @ref[8.3.41] would not apply — this rule introduces @deva[ष] optionally (@deva[अप्राप्त]-@deva[विभाषा]). The @deva[अनुवृत्ति] of @deva[इ]/@deva[उ] from @ref[8.3.41] requires the @deva[विसर्ग] to be preceded by @deva[इ] or @deva[उ], excluding @deva[पञ्चकृत्वः] @deva[करोति] (preceded by @deva[अ]). @deva[पतञ्जलि] considers the words @deva[द्विस्त्रिश्चतुर्] redundant — the simple @deva[सूत्र] @deva[कृत्वोऽर्थे] would suffice since no other numeral adverbs have penultimate @deva[इ]/@deva[उ]. The word @deva[कृत्वोर्थे] qualifies the understood @deva[पद] via @deva[तदन्त]-@deva[विधि], yielding: "the @deva[विसर्ग] of a word in the sense of a numeral adverb, preceded by @deva[इ]/@deva[उ], is optionally changed to @deva[स्]/@deva[ष्]." The @deva[काशिका] disagrees: without mentioning @deva[चतुर्] explicitly, its @deva[विसर्ग] (from @deva[र्], not @deva[सुच्]) would remain under compulsory @deva[ष] by @ref[8.3.41], since this rule would be @deva[असिद्ध] for @ref[8.3.41] under @ref[8.2.1]. This can be answered by the principle @deva[प्रकरणे] @deva[प्रकरणमसिद्धं] @deva[न] @deva[योगे] @deva[योगः] — rules within the same topic are not @deva[असिद्ध] to each other. Alternatively, this rule is an @deva[अपवाद] to @ref[8.3.41], and an @deva[अपवाद] is never @deva[असिद्ध] to the @deva[उत्सर्ग].
"""

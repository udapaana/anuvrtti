id = "8.3.96"
numericId = "83096"

[en]
simple = """
The word meaning 'flat ground' or 'plateau' takes a retroflex when it follows certain prefixes including vi, ku, shami, and pari. The rule applies only when the preceding vowel is short; a long vowel blocks the change.
"""

standard = """
The @deva[स्] of @deva[स्थल] is substituted by @deva[ष्] after @deva[वि], @deva[कु], @deva[शमि], and @deva[परि]. Examples: @deva[विष्ठलम्], @deva[कुष्ठलम्], @deva[शमिष्ठलम्], @deva[परिष्ठलम्]. The substitution is blocked after long @deva[ई]: @deva[शमीस्थलम्] (correct). The conditioning vowel must fall within @deva[इण्] (short @deva[इ] or @deva[उ]) per @ref[8.3.57].
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्थल] after @deva[वि], @deva[कु], @deva[शमि], and @deva[परि]: @deva[विष्ठलम्], @deva[कुष्ठलम्], @deva[शमिष्ठलम्], @deva[परिष्ठलम्]. @deva[वि], @deva[कु], and @deva[परि] compound under @ref[2.2.18]; @deva[शमी] takes a genitive by @ref[6.3.63]. The @[sutra] exhibits @deva[शमि] with short @deva[इ], indicating that when @deva[इ] is not shortened, @deva[षत्व] does not apply: @deva[शमीस्थलम्].
"""

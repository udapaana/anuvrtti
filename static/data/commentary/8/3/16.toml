id = "8.3.16"
numericId = "83016"

[en]
simple = """
In presence of the @deva[सुप्] @deva[प्रत्यय] of @deva[सप्तमी-बहुवचन], a @deva[पदान्त] @deva[र्-वर्ण] is converted to a @deva[विसर्ग] only if that @deva[र्] is generated from @deva[रुँ], and not otherwise.
"""

standard = """
Only @deva[रु] (not other @deva[र्]) → @deva[विसर्ग] before @deva[सु] (loc. pl.). @deva[पयःसु], @deva[यशःसु]. But @deva[गीर्षु], @deva[भूर्षु] (@deva[र्] not from @deva[रु]).
"""

advanced = """
@deva[विसर्जनीय] substitutes for @deva[रु]-origin @deva[र्] (not any other @deva[र्]) before the locative plural affix @deva[सु]. Forms: @deva[पयःसु], @deva[सर्प्पिःषु], @deva[यशःसु]. The separate statement as a @deva[नियम] restricts the operation to @deva[रु] alone — other @deva[र्] remains unchanged, as in @deva[गीर्षु], @deva[भूर्षु]. In @deva[पयस्] etc., the @deva[स्] first becomes @deva[रु] by @ref[8.2.66].
"""

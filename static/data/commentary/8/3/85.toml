id = "8.3.85"
numericId = "83085"

[en]
simple = """
The initial consonant of the word for 'father's sister' or 'mother's sister' can optionally change to a retroflex sound when it follows certain possessive forms. Both forms are correct: with or without the change.
"""

standard = """
The @deva[स्] of @deva[स्वसृ] is optionally substituted by @deva[ष्] when it follows @deva[मातुर्] or @deva[पितुर्] (genitive forms with @deva[विसर्ग]) in a @deva[समास] (compound). The result is @deva[मातुःष्वसा] or optionally @deva[मातुःस्वसा]. See @ref[8.3.59] for the general rule triggering this substitution.
"""

advanced = """
@deva[ष्] optionally replaces the @deva[स्] of @deva[स्वसृ] after @deva[मातुर्] or @deva[पितुर्] in a compound: @deva[मातुःस्वसा] or @deva[मातुःष्वसा]; @deva[पितुःस्वसा] or @deva[पितुःष्वसा].

Both @deva[मातुर्] and @deva[पितुर्] end in @deva[र्], which becomes @[visarga] by @ref[8.2.24]. The @[sutra] itself exhibits @deva[पितुर्] with @deva[र्], and @deva[मातुः] is understood as @deva[र्]-final by @deva[साहचर्य] (association). When @deva[र्] changes to @[visarga], and @[visarga] to @deva[स्] by @ref[8.3.36], @deva[षत्व] still applies by the maxim @deva[एकदेशविकृतस्यानन्यत्वात्]—a form that has undergone partial modification does not become something fundamentally different from its original. The words are therefore treated as @deva[र्]-final throughout. (If treated as @deva[स्]-final, the rule would not apply after @[visarga]; if treated as @[visarga]-final, the form @deva[पितुर्भ्याम्] with @deva[र्] before @deva[भ्याम्] would be unexplainable.)

The compound condition (@deva[समासे]) carries over: in a syntactic phrase, @deva[मातुः] @deva[स्वसा], no @deva[षत्व] applies.
"""

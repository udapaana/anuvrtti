id = "8.3.65"
numericId = "83065"

[en]
simple = """
When a prefix ending in i or u is followed by certain roots beginning with s, that s changes to @[ṣ]. The roots covered include su, so, stu, stubh, @[sthā], senay, sedh, sic, @[sañj], and @[svañj]. The rule applies only after a prefix, not after other words.
"""

standard = """
After an @deva[उपसर्ग] (prefix) ending in @deva[इ] or @deva[उ], the @deva[स्] of roots @deva[सू], @deva[सो], @deva[स्तु], @deva[स्तुभ्], @deva[स्था], @deva[सेनय्], @deva[सेध्], @deva[सिच्], @deva[सञ्ज्], and @deva[स्वञ्ज्] changes to @deva[ष्] (@ref[8.3.65]). Examples: @deva[अभिषुणोति], @deva[परिषिञ्चति], @deva[अभिष्टौति]. The change does not occur after non-prefix words like @deva[दधि] in @deva[दधि सिञ्चति].
"""

advanced = """
@deva[ष्] replaces @deva[स्] after @deva[इ] or @deva[उ] of an @[upasarga] for the following roots: (1) @deva[सू] (@deva[सुनोति]), (2) @deva[सू] (@deva[सवति]), (3) @deva[सो] (@deva[स्यति]—@deva[ओतः] @deva[श्यनि] @ref[7.3.71]), (4) @deva[स्तु] (@deva[स्तौति]—@deva[उतो] @deva[वृद्धिर्लुकि] @deva[हलि] @ref[7.3.89]), (5) @deva[स्तुभ] (@deva[स्तोभते]), (6) @deva[स्था], (7) @deva[सेनय] (denominative), (8) @deva[सिध्] (@deva[सेधति]), (9) @deva[सिच्], (10) @deva[सञ्ज्], and (11) @deva[स्वञ्ज्].

Paradigmatic examples: @deva[अभिषुणोति], @deva[परिषुणोति], @deva[अभ्यषुणोत्], @deva[पर्यषुणोत्]; @deva[अभिषुवति], @deva[परिषुवति], @deva[अभ्यषुवत्], @deva[पर्यषुवत्]; @deva[अभिष्यति], @deva[परिष्यति], @deva[अभ्यष्यत्], @deva[पर्यष्यत्]; @deva[अभिष्टौति], @deva[परिष्टौति], @deva[अभ्यष्टौत्]; @deva[अभिष्टोभते], @deva[परिष्टोभते], @deva[अभ्यष्टोभत], @deva[पर्यष्टोभत]; @deva[अभिष्ठास्यति], @deva[परिष्ठास्यति], @deva[अभ्यष्ठात्], @deva[पर्यष्ठात्], @deva[अभितष्ठौ], @deva[परितष्ठौ]; @deva[अभिषेणयति], @deva[परिषेणयति], @deva[अभ्यषेणयत्], @deva[पर्यषेणयत्], @deva[अभिषिषेणयिषति], @deva[परिषिषेणयिषति]; @deva[अभिषेधति], @deva[परिषेधति], @deva[अभ्यषेधत्], @deva[पर्यषेधत्]; @deva[अभिषिञ्चति], @deva[परिषिञ्चति], @deva[अभ्यषिञ्चत्], @deva[पर्यषिञ्चत्], @deva[अभिषिषिक्षति], @deva[परिषिषिक्षति]; @deva[अभिषजति], @deva[परिषजति], @deva[अभ्यषजत्], @deva[पर्यषजत्], @deva[अभिषिषङ्क्षति], @deva[परिषिषङ्क्षति]; @deva[अभिष्वजते], @deva[परिष्वजते], @deva[अभ्यष्वजत], @deva[पर्यष्वजत], @deva[अभिषिष्वङ्क्षते], @deva[परिषिष्वङ्क्षते].

The root @deva[सिध्] is exhibited as @deva[सेध] (with @deva[शप्] @[vikarana]) to debar @deva[सिध्]—@deva[सिध्यति]. @deva[सेध] @deva[इति] @deva[शब्विकरणनिर्द्देशः] @deva[सिध्यति] @deva[निवृत्त्यर्थः].

The condition @deva[उपसर्गात्] is essential: @deva[दधि] @deva[सिञ्चति] and @deva[मधु] @deva[सिञ्चति] show no change (@ref[8.3.111]). In @deva[निःसेचको] @deva[देशः] (@deva[निर्गता] @deva[सेचका] @deva[अस्माद्] @deva[देशात्]), @deva[निः] is an @[upasarga] to the noun @deva[सेचक], not to @deva[सिच्]. Similarly, in @deva[अभिसावकीयति], @deva[अभि] attaches to the denominative @deva[सावकीय] (derived @deva[सु] → @deva[सावक] via @deva[ण्वुल्] → @deva[सावकीय] via @deva[क्यच्]), not to the root @deva[सु] directly. If the @[upasarga] is added to the root first, the rule applies: @deva[अभिषावकीयति]. Likewise the causative @deva[अभिषावयति], where the @[upasarga] joins the root @deva[सु] rather than the derived causative stem @deva[सावय].

The roots @deva[षुञ्] (@[svadi]), @deva[षु] @deva[प्रेरणे] (@[tudadi]), @deva[षो] @deva[अन्तकर्मणि] (@[divadi]), @deva[ष्टुञ्] @deva[स्तुतौ] (@[adadi]), and @deva[ष्टुभ] @deva[स्तंभे] (@[bhuadi]) are exhibited in their inflected forms, indicating the rule does not extend to their @deva[यङ्] @deva[लुक्] forms—@deva[अभिसोषवाति] (see @ref[7.1.6] for the @deva[श्तिप्]-exhibited root principle). By contrast, roots like @deva[सिच्], not so exhibited, do undergo @deva[षत्व] even in @deva[यङ्] @deva[लुक्]: @deva[अभिषेषिचीति].

The @[upasarga] need not end in @deva[इ] or @deva[उ] for this rule: @deva[निष्षुणोति] and @deva[दुष्षुणोति] (with @[upasarga] @deva[निस्] and @deva[दुस्]) also show the change.
"""

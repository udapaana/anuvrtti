id = "8.3.60"
numericId = "83060"

[en]
simple = """
The @deva[सकार] of the verb roots @deva[शास्]/@deva[वस्]/@deva[घस्] is converted to @deva[षकार] when it follows a letter from the @deva[इण्-प्रत्याहार] or the @deva[कवर्ग].
"""

standard = """
@deva[स्] of @deva[शास्]/@deva[वस्] (dwell)/@deva[घस्] → @deva[ष्] after @deva[इण्]/@deva[कु]. @deva[अन्वशिषत्], @deva[उषितः], @deva[जक्षुः]. Not: @deva[शास्ति], @deva[वसति] (no @deva[इण्]/@deva[कु] precedes).
"""

advanced = """
@deva[ष्] substitutes for the @deva[स्] of @deva[शास्], @deva[वस्] ("to dwell"), and @deva[घस्] when preceded by an @deva[इण्] vowel or guttural. From @deva[शास्] (Aorist: @deva[च्लि] → @deva[अङ्] by @ref[3.1.56], @deva[आ] → @deva[इ] by @ref[6.4.34]): @deva[अन्वशिषत्], @deva[अन्वशिषताम्], @deva[अन्वशिषन्]; also @deva[शिष्टः], @deva[शिष्टवान्]. From @deva[वस्] (@deva[संप्रसारण] by @ref[6.1.15], @deva[यजादि] class): @deva[उषितः], @deva[उषितवान्], @deva[उषित्वा]. From @deva[घस्] (substitute of @deva[अद्] by @ref[2.4.40], penultimate @deva[अ] elided by @ref[6.4.98]): @deva[जक्षतुः], @deva[जक्षुः] (Perfect); @deva[अक्षन्] in @deva[अक्षन्नमीमदन्त] @deva[पितरः] (RV I.82.2) — Aorist of @deva[अद्], @deva[घस्] substituted by @ref[2.4.37], Aorist sign elided by @ref[2.4.80]. This rule covers cases not handled by @ref[8.3.59]: the @deva[स्] in @deva[घस्] is part of a substitute, not itself a substitute (which is what @deva[आदेशस्य] in @ref[8.3.59] requires). The @deva[इण्कोः] condition applies here as well, excluding @deva[शास्ति], @deva[वसति], and @deva[जघास] (where no @deva[इण्]/@deva[कु] precedes the @deva[स्]).
"""

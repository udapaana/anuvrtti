id = "8.3.36"
numericId = "83036"

[en]
simple = """
When a @deva[विसर्ग] is followed by a letter from the @deva[शर्प्रत्याहार], the @deva[विसर्ग] optionally remains as @deva[विसर्ग].
"""

standard = """
@deva[विसर्ग] optionally unchanged before @deva[शर्] (sibilant). @deva[वृक्षः] @deva[शेते] or @deva[वृक्षश्शेते]. Vt: Before @deva[शर्] + @deva[खर्], @deva[विसर्ग] optionally elided.
"""

advanced = """
The @deva[विसर्ग] is optionally the substitute of @deva[विसर्ग] when followed by a sibilant (@deva[शर्]). As @deva[वृक्षः] @deva[शेते] or @deva[वृक्षश्शेते], @deva[प्लक्षः] @deva[शेते] or @deva[प्लक्षश्शेते], @deva[वृक्षः] @deva[षण्डे] or @deva[वृक्षषण्डे], @deva[वृक्षः] @deva[साये] or @deva[वृक्षस्साये] @deva[॥] Cf. @ref[8.4.40], @ref[8.4.41], for @deva[श्] and @deva[ष्] @deva[॥] Vart:- When the sibilant is followed by a hard consonant, there is optionally the elision of the preceding @[visarga]. As @deva[वृक्षा] @deva[स्थातारः] or @deva[वृक्षाः] @deva[स्थातारः] or @deva[वृक्षास्स्थातारः] @deva[॥]
"""

id = "8.3.11"
numericId = "83011"

[en]
simple = """
The @deva[न्] of @deva[स्वतवान्] becomes @deva[रु] before @deva[पायु]. Example: @deva[स्वतवाँ] @deva[पायु].
"""

standard = """
In the Vedic compound @deva[स्वतवान्] @deva[पायुः], the @deva[न्] becomes @deva[रु], producing @deva[स्वतवाँ] @deva[पायुः।] This is a specific Vedic form (@[ṛgveda] IV.2.6). The rule applies to this particular lexical combination.
"""

advanced = """
The @deva[स्वतवानं] @deva[पायौ] @[nipātana] specifies this exact Vedic phrase. The form @deva[स्वतवान्] derives from √@deva[तन्] with @deva[नुम्] (@ref[7.1.80]). This illustrates how @[pāṇini] records specific Vedic usages.
"""

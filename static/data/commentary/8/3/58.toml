id = "8.3.58"
numericId = "83058"

[en]
simple = """
The @deva[षकारादेश] mandated in the @deva[इण्कोः] @deva[अधिकार] happens even when at most one of @deva[अनुस्वार]/@deva[विसर्ग]/@deva[शकार]/@deva[षकार]/@deva[सकार] appears between the @deva[इण्]/@deva[कुवर्ग] @deva[वर्ण] and the @deva[सकार].
"""

standard = """
@deva[ष्] substitution applies even when @deva[नुम्]/@deva[विसर्ग]/sibilant intervenes. @deva[सर्पींषि] (@deva[नुम्]), @deva[सर्पिःषु] (@deva[विसर्ग]), @deva[सर्पिष्षु] (sibilant). Not: @deva[निंस्से] (two intervene).
"""

advanced = """
The @deva[ष]-substitution applies even when @deva[नुम्] (@deva[न्]), @deva[विसर्जनीय], or a sibilant intervenes singly between the @deva[इण्]/@deva[कु] trigger and the @deva[स्]. (1) @deva[नुम्] intervening: @deva[सर्पींषि], @deva[यजूंषि], @deva[हवींषि] (@ref[7.1.72], @ref[6.4.10]). (2) @deva[विसर्जनीय] intervening: @deva[सर्पिःषु], @deva[यजुःषु], @deva[हविःषु] (@ref[8.3.36]). (3) Sibilant intervening: @deva[सर्पिष्षु], @deva[यजुष्षु], @deva[हविष्षु]. The @deva[ष]-change applies only with single intervention, not multiple. Hence not in @deva[निंस्से], @deva[निंस्स्वे] (from root @deva[निंस्] "to kiss"), where both @deva[नुम्] and @deva[स्] (@ref[3.4.91]) intervene. The @deva[इण्कोः] being Ablative requires immediate succession; this rule relaxes that for these specified interveners.
"""

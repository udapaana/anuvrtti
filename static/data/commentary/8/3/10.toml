id = "8.3.10"
numericId = "83010"

[en]
simple = """
The @deva[न्] of @deva[नॄन्] optionally becomes @deva[रु] before @deva[प्]. Example: @deva[नॄँः] @deva[पाहि] or @deva[नॄन्] @deva[पाहि].
"""

standard = """
The specific form @deva[नॄन्] (accusative plural of @deva[नृ] 'man') optionally takes @deva[रु] for its final @deva[न्] before @deva[प्]. Thus @deva[नॄँः] @deva[पाहि] 'protect men' or @deva[नॄन्] @deva[पाहि।] This is a specific lexical application.
"""

advanced = """
The @deva[नॄणां] @deva[पे] condition is a @[nipātana] for this particular form and following consonant. The option reflects attested variation in Vedic texts. The @deva[नॄन्] form is accusative plural of the stem @deva[नृ]-.
"""

id = "8.3.66"
numericId = "83066"

[en]
simple = """
The s of the root sad changes to @[ṣ] when preceded by a prefix ending in i or u, except after the prefix prati. This exception for prati is unique to this root.
"""

standard = """
The @deva[स्] of root @deva[सद्] changes to @deva[ष्] after @deva[इ/उ]-final @deva[उपसर्ग] (@ref[8.3.66]), with the specific exception of @deva[प्रति]. Examples: @deva[निषीदति], @deva[विषसाद] (perfect). The form @deva[प्रतिसीदति] retains @deva[स्], showing that @deva[प्रति] is blocked even though it ends in @deva[इ].
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[सद्] after an @deva[इ]/​@deva[उ]-final @[upasarga], excluding @deva[प्रति]. The word @deva[सदिः] appears in the nominative but carries genitive force. Examples: @deva[निषीदति], @deva[विषीदति], @deva[न्यषीदत्], @deva[व्यषीदत्]; in the perfect: @deva[निषसाद], @deva[विषसाद] (the second @deva[स] remains unchanged by @ref[8.3.118]). The @deva[प्रति] exception: @deva[प्रतिसीदति]. Bohtlingk notes the @[sutra] reading @deva[सदेरप्रतेः] as given by @[sayanacharya] in his @[rig] @[veda] VI.13 commentary. Panini, however, regularly uses the nominative with genitive force, as at @ref[8.3.80].
"""

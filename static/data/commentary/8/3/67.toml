id = "8.3.67"
numericId = "83067"

[en]
simple = """
The s of the root stambh changes to @[ṣ] when preceded by any prefix ending in i or u, including prati. Unlike sad, there is no exception for prati with this root.
"""

standard = """
Unlike @deva[सद्] (@ref[8.3.66]), the root @deva[स्तम्भ्] undergoes @deva[स् → ष्] after @deva[प्रति] as well as other @deva[इ/उ]-final prefixes (@ref[8.3.67]). Examples: @deva[अभिष्टभ्नाति], @deva[प्रतिष्टभ्नाति] (note @deva[प्रति] does trigger the change), @deva[परितष्टम्भ] (perfect).
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्तम्भ्] after an @deva[इ]/​@deva[उ]-final @[upasarga]. Examples: @deva[अभिष्टभ्नाति], @deva[परिष्टभ्नाति], @deva[अभ्यष्टभ्नात्], @deva[पर्यष्टभ्नात्], @deva[अभितष्टम्भ], @deva[परितष्टम्भ]. The exclusion @deva[अप्रतेः] from the preceding @[sutra] (@ref[8.3.66]) does not carry over here, so the change applies after @deva[प्रति] as well: @deva[प्रतिष्टभ्नाति], @deva[प्रत्यष्टभ्नात्], @deva[प्रत्यतितष्टम्भ].
"""

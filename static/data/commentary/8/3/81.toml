id = "8.3.81"
numericId = "83081"

[en]
simple = """
When the word @[sthāna] (place, position) appears in a compound after the word @[bhīru] (a coward or timid person), its s changes to @[ṣ]. Again, the change is limited to compound formation.
"""

standard = """
In a compound, @deva[स्] of @deva[स्थानम्] becomes @deva[ष्] after @deva[भीरु] (@ref[8.3.81]), giving @deva[भीरुष्ठानम्] (the standing place of a coward, or a shelter). The syntactic phrase @deva[भीरोः स्थानम्] (the place of a coward) does not trigger the change, confirming the @deva[समास]-only condition.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्थानम्] after @deva[भीरु] in a compound: @deva[भीरुष्ठानम्]. The compound condition (@deva[समासे]) carries over; without compounding: @deva[भीरोः] @deva[स्थानं] @deva[पश्य].
"""

id = "8.3.79"
numericId = "83079"

[en]
simple = """
When the @[iṭ] augment (an inserted i) stands between a stem ending in @[iṇ] and the suffix dhvam, the @[ḍh] change is optional. Both forms, with and without the retroflex, are valid.
"""

standard = """
When @deva[इट्]-augment intervenes between an @deva[इण्]-final stem and @deva[ध्वम्/ध्वे], the change to @deva[ढ्] is optional (@ref[8.3.79]). Examples: @deva[लविषीढ्वम्] or @deva[लविषीध्वम्] (with the @deva[ष्] of @deva[षीध्वम्] and optional @deva[ढ्]); @deva[अलविढ्वम्] or @deva[अलविध्वम्] (aorist). The @deva[इट्] augment creates the environment that makes the rule optional here.
"""

advanced = """
@deva[ढ्] optionally replaces @deva[ध्] of @deva[षीध्वम्] and of @deva[लुङ्]/@deva[लिट्] endings when the @deva[इट्] augment intervenes and the stem ends in an @deva[इण्] vowel. Examples: @deva[लू] + @deva[इट्] + @deva[षीध्वम्] = @deva[लविषीध्वम्] or @deva[लविषीढ्वम्]; similarly @deva[पविषीध्वम्] or @deva[पविषीढ्वम्] from @deva[पू]. Aorist: @deva[अलविध्वम्] or @deva[अलविढ्वम्]. Perfect: @deva[लुलुविध्वे] or @deva[लुलुविढ्वे].

The @deva[इण्] carried in @[anuvrtti] qualifies @deva[इट्]: the stem must end in an @deva[इण्] vowel, followed by @deva[इट्], followed by the @deva[ध]-initial ending. If the stem does not end in @deva[इण्], the rule does not apply: @deva[आसिषीध्वम्] (from @deva[आस] @deva[उपवेशने]).

A disputed case: @deva[उपदिदीयिद्ध्वे] (from @deva[दीङ्] @deva[क्षये], perfect with @deva[इट्] by @ref[7.2.13] and @deva[युट्] by @ref[6.4.63]). One view holds that since @deva[युट्] intervenes between the @deva[ई]-final stem and @deva[इट्], the rule does not apply and no optional @deva[ढ] arises. The other view holds that @deva[अङ्गात्] has ceased in @[anuvrtti] while @deva[इण्] alone continues, so there is no intervention issue and the optional @deva[ढ] does apply.
"""

id = "8.3.48"
numericId = "83048"

[en]
simple = """
For the words in the @deva[कस्कादिगण], the @deva[विसर्ग] is to be converted to @deva[षकार] / @deva[सकार] as shown for each word.
"""

standard = """
@deva[कस्कादि] class: @deva[ष्]/@deva[स्] before @deva[कु]/@deva[पु]. @deva[कस्कः], @deva[भ्रातुष्पुत्रः], @deva[शुनस्कर्णः], @deva[सर्पिष्कुण्डिका]. Unlisted changes refer to this class.
"""

advanced = """
@deva[स्] or @deva[ष्] substitutes for @deva[विसर्ग] before a hard guttural or labial in the @deva[कस्कादि] class — an @deva[अपवाद] to @ref[8.3.37]. @deva[ष्] applies after @deva[इ]/@deva[उ], @deva[स्] elsewhere. Members: 1. @deva[कस्कः]; 2. @deva[कौतस्कुतः] (@deva[अण्] of @deva[कुत] @deva[आगतः]); 3. @deva[भ्रातुष्पुत्रः] (@ref[6.3.23]); 4. @deva[शुनस्कर्णः] (@ref[6.3.21]); 5. @deva[सद्यस्कालः]; 6. @deva[सद्यस्क्री] (from @deva[क्री] with @deva[क्विप्], @deva[संपदादि] class); 7. @deva[साद्यस्क्रः] (from @deva[सद्यस्क्री], @deva[तत्रभवः] @deva[क्रतुः]); 8. @deva[कांस्कान्] (@deva[रु] by @ref[8.3.12]); 9. @deva[सर्पिष्कुण्डिका]; 10. @deva[चतुष्कपालम्]; 11. @deva[धनुष्कपालम्]; 12. @deva[बर्हिष्पूलम्]; 13. @deva[यजुष्पात्रम्]; 14. @deva[अयस्काण्डः]; 15. @deva[मेदस्पिण्डः]. Items 9-13 are exceptions to @ref[8.3.45], allowing @deva[ष] even when @deva[सर्पिस्] etc. are preceded by another word — @deva[परमसर्पिष्कुण्डिका] (counter-example to @ref[8.3.45] is then @deva[परमसर्पिः] @deva[फलम्] per the @deva[पारायणिक]s, or @deva[परमसर्पिः] @deva[कुण्डिका] per the @deva[महाभाष्य]). These listed words also ensure @deva[ष]-change regardless of syntactic correlation (@deva[व्यपेक्षा]) or compounding: (1) without correlation — @deva[तिष्ठतु] @deva[सर्पिष्कुण्डिकामानय]; (2) with correlation — @deva[इदं] @deva[सर्पिष्कुण्डिकायाः]; (3) in compound — @deva[सर्पिष्कुण्डिका]. Where correlation exists without compounding, @deva[ष] would be optional by @ref[8.3.44], but the listing here makes it obligatory. This is an @deva[आकृतिगण] — any @deva[विसर्ग] → @deva[स]/@deva[ष] change not governed by another rule is to be referred to this class. The term @deva[उपचार] denotes the @deva[स्]/@deva[ष्] replacing @deva[विसर्ग].
"""

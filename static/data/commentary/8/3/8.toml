id = "8.3.8"
numericId = "83008"

[en]
simple = """
In @[ṛgveda] verses, the previous @deva[रु]-rule is optional. Example: @deva[तान्] @deva[च] or @deva[ताँश्च].
"""

standard = """
For @deva[ऋच्]-verses specifically, the @deva[न्] → @deva[रु] substitution before @deva[छव्] is @deva[विभाषा] (optional). Thus both @deva[तान्] @deva[च] and @deva[ताँश्च] are valid in @[ṛgvedic] context. This reflects Vedic orthographic variation.
"""

advanced = """
The @deva[ऋचि] @deva[उभयथा] condition creates optionality specific to @[ṛgveda]. Classical Sanskrit would apply the rule obligatorily, but Vedic preserves both forms. This accounts for manuscript variations in Vedic texts.
"""

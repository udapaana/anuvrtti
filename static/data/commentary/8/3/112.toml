id = "8.3.112"
numericId = "83112"

[en]
simple = """
The verb meaning 'to sprinkle' does not take a retroflex when it is reduplicated to form an intensive. In the desiderative (wanting to sprinkle), however, the retroflex does appear.
"""

standard = """
The @deva[ष्त्व] rule is not applied to the @deva[स्] of @deva[सिच्] in the @deva[यङ्] (intensive) form. Thus @deva[सेसिच्यते] and @deva[अभिसेसिच्यते]. However, the desiderative (@deva[सन्]-suffix) form @deva[अभिषिषिक्षति] does show @deva[ष्त्व] because the @deva[स्] there is in a different structural position. The distinction follows from the @deva[अभ्यास] (reduplicate) analysis and @ref[8.3.64].
"""

advanced = """
@deva[षत्व] does not apply to the @deva[स्] of @deva[सिच्] in the @deva[यङ्] (intensive): @deva[सेसिच्यते], @deva[अभिसेसिच्यते]. One might argue that the reduplicate @deva[स] should become @deva[ष] by @ref[8.3.65] (since @deva[सिच्] is listed there), and the root @deva[स] by @ref[8.3.64], overriding @ref[8.3.111] (@deva[पदादि] @deva[स]) and this rule—yielding @deva[अभिषेषिच्यते]. However, @ref[8.3.65] overrides only the @deva[पदादि] @deva[स] prohibition of @ref[8.3.111], not this rule's prohibition. This @[sutra]'s blocking force is universal for the intensive.

In the desiderative, the change does apply: @deva[अभिषिषिक्षति].
"""

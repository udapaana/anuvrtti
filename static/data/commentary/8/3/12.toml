id = "8.3.12"
numericId = "83012"

[en]
simple = """
The @deva[न्] of @deva[कान्] becomes @deva[रु] when followed by repeated @deva[कान्] (@deva[आम्रेडित]). Example: @deva[काँः] @deva[कान्].
"""

standard = """
When @deva[कान्] is followed by its @deva[आम्रेडित] (reduplicated) form @deva[कान्], the first @deva[कान्]'s @deva[न्] becomes @deva[रु]: @deva[काँः] @deva[कान्।] This applies to the emphatic/repetitive usage of the interrogative.
"""

advanced = """
The @deva[कानाम्रेडिते] condition identifies the specific reduplicated context. The interrogative @deva[कान्] 'which ones' in repetition (@deva[कान्] @deva[कान्]) triggers this @deva[रुत्व]. This closes the @deva[अनुनासिक]-@[adhikāra] section.
"""

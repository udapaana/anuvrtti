id = "8.3.83"
numericId = "83083"

[en]
simple = """
The s of the word stoma changes to @[ṣ] when it appears in a compound after jyotis (light) or @[āyus] (life/age). The famous Vedic sacrifice @[jyotiṣṭoma] gets its name from this rule.
"""

standard = """
In a compound, @deva[स्] of @deva[स्तोम] becomes @deva[ष्] after @deva[ज्योतिस्] or @deva[आयुस्] (@ref[8.3.83]). This gives the well-known Vedic sacrifice names @deva[ज्योतिष्टोमः] and @deva[आयुष्टोमः]. Outside a compound, @deva[ज्योतिः स्तोमम्] (a stoma of light) retains @deva[स्], showing the compound restriction.
"""

advanced = """
@deva[ष्] is substituted for the @deva[स्] of @deva[स्तोम] after @deva[ज्योतिस्] and @deva[आयुस्] in a compound. As @deva[ज्योतिष्टोमः], @deva[आयुष्टोमः], but @deva[ज्योतिः] @deva[स्तोमं] @deva[दर्शयति] where there is no compounding.
"""

id = "8.3.44"
numericId = "83044"

[en]
simple = """
The @deva[विसर्ग] of the @deva[इस्]/@deva[उस्-प्रत्यय] when followed by a letter from @deva[कवर्ग] or @deva[पवर्ग] is optionally converted to a @deva[षकार] whenever the words involved in the @deva[सन्धि] are associated with each other.
"""

standard = """
@deva[विसर्ग] of @deva[इस्]/@deva[उस्]-ending words optionally → @deva[ष्] before @deva[कु]/@deva[पु] when words syntactically connected. @deva[सर्पिष्करोति] or @deva[सर्पिः] @deva[करोति]. Not: @deva[तिष्ठतु] @deva[सर्पिः] @deva[पिब] @deva[त्वम्].
"""

advanced = """
@deva[ष्] optionally substitutes for the @deva[विसर्ग] of @deva[इस्]- and @deva[उस्]-ending words before a hard guttural or labial, when the two words are syntactically correlated (@deva[सामर्थ्य]). Forms: @deva[सर्पिष्करोति] / @deva[सर्पिः] @deva[करोति], @deva[यजुष्करोति] / @deva[यजुः] @deva[करोति]. The @deva[सामर्थ्य] condition excludes cases without syntactic connection: in @deva[तिष्ठतु] @deva[सर्पिः], @deva[पिब] @deva[त्वमुदकम्], @deva[सर्पिः] is construed with @deva[तिष्ठतु], not with @deva[पिब]. Here @deva[सामर्थ्य] means @deva[व्यपेक्षा] (@deva[आकाङ्क्षा]) — the syntactical requirement of one word for another to complete the sense — not the @deva[ऐकार्थ्य] (co-denotation) of compounds under @ref[2.1.1]. Despite being a @deva[पदविधि] where @deva[समर्थ] (@ref[2.1.1]) is understood, the use of a distinct term @deva[सामर्थ्य] here signals a different scope. @deva[व्यपेक्षा] is defined as @deva[नानाभूतयोः] @deva[पदार्थयोर्यौ] @deva[शब्दौ] @deva[तयोर्यो] @deva[योगः] — the syntactic union of two words expressing two distinct ideas.
"""

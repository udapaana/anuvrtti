id = "8.3.49"
numericId = "83049"

[en]
simple = """
In Vedic texts, a visarga may optionally become s before words starting with ku or pu. This change does not apply when the next word begins with pra or when the same word is repeated. So you can say either @[ayaspātram] or @[ayaḥ] @[pātram], but not agnis pra @[vidvān].
"""

standard = """
In Vedic usage, @deva[विसर्ग] optionally becomes @deva[स्] before words beginning with @deva[कु] or @deva[पु] by this rule (@ref[8.3.49]). The change is blocked when the following word starts with @deva[प्र] or when a @deva[द्विरुक्त] (reduplicated) word follows. Example: @deva[अयस्पात्रम्] or @deva[अयः पात्रम्]; but @deva[अग्निः प्र विद्वान्] remains unchanged.
"""

advanced = """
@deva[स्] optionally substitutes for @deva[विसर्ग] before a hard guttural or labial in @deva[छन्दस्], but not before @deva[प्र] or a reduplicated word (@deva[द्विरुक्त]). Form: @deva[अयः] @deva[पात्रम्] / @deva[अयस्पात्रम्] (non-compound). In compounds, @deva[स] is obligatory by @ref[8.3.46], since the option here is @deva[असिद्ध] for that rule. Under the maxim @deva[प्रकरणे] @deva[प्रकरणमसिद्धं] @deva[न] @deva[योगे] @deva[योगः], however, both rules belong to the same topic and are not @deva[असिद्ध] to each other — compound examples could then fall under this rule too, but @ref[8.3.46] would still make @deva[स] obligatory. Additional forms: @deva[विश्वतस्पात्रम्] / @deva[विश्वतः] @deva[पात्रम्] (where @deva[विश्वतः] is indeclinable, so @ref[8.3.46] does not apply); @deva[उरु] @deva[णः] @deva[कारः] / @deva[उरु] @deva[ण] @deva[स्कारः] (where @deva[नस्] substitutes for @deva[अस्मद्], @deva[न] → @deva[ण] by @ref[8.4.27], @deva[कारः] is @deva[घञ्]-formed). The exclusion of @deva[प्र] and @deva[द्विरुक्त]: @deva[अग्निः] @deva[प्र] @deva[विद्वान्] (AV V.26.1), @deva[पुरुषः] @deva[पुरुषः] @deva[परि]. In @deva[सूर्यरश्मिर्हरिकेशः] @deva[पुरस्तात्] (RV X.139.1) and @deva[स] @deva[नः] @deva[पावकः] (RV I.12.10), @deva[स]-change has not occurred — all rules being optional in the Vedas.
"""

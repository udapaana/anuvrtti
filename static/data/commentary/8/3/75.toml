id = "8.3.75"
numericId = "83075"

[en]
simple = """
According to the eastern Bharata grammarians, the compound pariskanda does not undergo the @[ṣ] change. This is a dialectal or school-based variation from the rule in @ref[8.3.74].
"""

standard = """
This is a dialectal note: the eastern @deva[भरत] grammarians hold that @deva[परिस्कन्द] always retains @deva[स्] without the @deva[ष्]-change (@ref[8.3.75]), overriding the option granted in @ref[8.3.74]. This reflects regional or scholastic variation in how the @deva[अष्टाध्यायी] is applied.
"""

advanced = """
The word @deva[परिस्कन्द] is used without the cerebral change in the country of Eastern Bharata. This is an anomaly. The @deva[ष] required by the last @[sutra] is prohibited. The other form is @deva[परिष्कन्दः] @deva[॥] The word @deva[परिस्कन्द] is formed by the affix @deva[अच्] or it is a @[nishtha], the @deva[त] being elided. The word @deva[भरत] qualifies the word @deva[प्राच्य] @deva[॥] Prof. Bohtlingk translates it "@deva[परिस्कन्द] is seen in the usage of the Eastern People and the @[bharata]". He bases his construction on the @[sutras] @ref[2.4.66], and @ref[4.2.113], where @deva[प्राच्यभरतेषु] means "the Eastern People and @[bharata]".
"""

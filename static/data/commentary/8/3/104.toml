id = "8.3.104"
numericId = "83104"

[en]
simple = """
According to some grammarians, the same retroflex rule that applies within a verse line also extends to the Yajurveda, making the change optional in that Vedic tradition.
"""

standard = """
Some grammarians hold that the substitution described in @ref[8.3.103] (retroflex within a @deva[पाद]) extends to the @deva[यजुर्वेद] as well. This makes the change optional: @deva[अर्चिर्भिष्ट्वम्] or @deva[अर्चिर्भिस्त्वम्]. This @deva[वार्तिक] reflects differing textual traditions regarding the scope of Vedic sandhi rules.
"""

advanced = """
According to some, the change of @ref[8.3.103] extends to the @deva[यजुर्वेद] as well, yielding optional forms: @deva[अर्चिर्भिष्ट्वम्] or @deva[अर्चिर्भिस्त्वम्]; @deva[अग्निष्टेग्रम्] or @deva[अग्निस्तेग्रम्]; @deva[अग्निष्टत्] or @deva[अग्निस्तत्]; @deva[अर्चिर्भिष्टतक्षुः] or @deva[अर्चिर्भिस्ततक्षुः].
"""

id = "8.3.39"
numericId = "83039"

[en]
simple = """
A @deva[पदान्त] @deva[विसर्ग] which comes after a letter from the @deva[इण्] @deva[प्रत्याहार], and which is followed by @deva[प्रत्ययाः] - @deva[पाश्य], @deva[कल्प], @deva[क], @deva[काम्य] - is converted to a @deva[षकार].
"""

standard = """
@deva[विसर्ग] after @deva[इ]/@deva[उ] → @deva[ष्] before non-@deva[पद]-initial @deva[कु]/@deva[पु]. @deva[सर्पिष्पाशम्], @deva[यजुष्कल्पम्]. Not: @deva[अग्निः] @deva[करोति] (@deva[पद]-initial).
"""

advanced = """
@deva[ष्] substitutes for @deva[विसर्ग] preceded by @deva[इ] or @deva[उ] before an affix-initial hard guttural or labial. The @deva[अपदादौ] condition is understood from @ref[8.3.38]; the relevant affixes are again @deva[पाश], @deva[कल्प], @deva[क], @deva[काम्य]. Forms: @deva[सर्पिष्पाशम्], @deva[यजुष्पाशम्], @deva[सर्पिष्कल्पम्], @deva[यजुष्कल्पम्], @deva[सर्पिष्कम्], @deva[यजुष्कम्]; @deva[सर्पिष्काम्यति], @deva[यजुष्काम्यति]. The affix condition excludes @deva[पद]-initial cases: @deva[अग्निः] @deva[करोति], @deva[वायुः] @deva[करोति], @deva[अग्निः] @deva[पचति], @deva[वायुः] @deva[पचति]. The affix must begin with guttural/labial, hence not @deva[सर्पिस्ते], @deva[यजुस्ते]. In succeeding rules, both @deva[स] (@ref[8.3.38]) and @deva[इणः] @deva[षः] (this rule) carry as @deva[अनुवृत्ति]: @deva[विसर्ग] → @deva[ष] after @deva[इ]/@deva[उ], → @deva[स] otherwise. According to some, this rule ordains @deva[ष्] in place of the @deva[स्] taught in @ref[8.3.38], not directly replacing @deva[विसर्ग].
"""

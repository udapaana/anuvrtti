id = "8.3.98"
numericId = "83098"

[en]
simple = """
A class of words called the sushama-adi group all undergo retroflex substitution. These are listed as a fixed group, and the substitution is treated as applying throughout this group by convention.
"""

standard = """
The @deva[ष्त्व] substitution applies throughout the @deva[सुषामादि] @deva[गण] (a listed class of words), which is an @deva[आकृतिगण] (open-ended class defined by its typical members). Examples: @deva[सुषामा], @deva[निःषामा], @deva[सुष्ठु], @deva[गौरिषक्थः], @deva[हरिषेणः]. This group captures cases where @deva[ष्त्व] applies to @deva[स्] preceded by @deva[इण्] or @deva[कु] sounds in compound contexts. See @ref[8.3.99] for the linked rule.
"""

advanced = """
@deva[ष्] replaces @deva[स्] throughout the @deva[सुषामादि] @[gana] (@deva[आकृतिगण], an open-ended class). @deva[सुषामा] @deva[ब्राह्मणः] = @deva[शोभनम्] @deva[साम] @deva[यस्य] @deva[असौ]. The enumerated members: (1) @deva[सुषामा], (2) @deva[निःषामा], (3) @deva[दुःषामा], (4) @deva[सुषेधः], (5) @deva[निषेधः]/​@deva[निःषेधः], (6) @deva[दुःषेधः], (7) @deva[सुषन्धिः], (8) @deva[निःषन्धिः]/​@deva[निषन्धिः], (9) @deva[दुःषन्धिः], (10) @deva[सुष्ठु], (11) @deva[दुष्ठु], (12) @deva[गौरिषक्थः] (@deva[संज्ञायाम्]), (13) @deva[प्रतिष्णिका], (14) @deva[जलाषाहम्], (15) @deva[नौषेचनम्]/​@deva[नौषेवनम्], (16) @deva[दुन्दुभिषेवणम्]/​@deva[दुन्दुभिषेचनम्], (17) @deva[एति] @deva[संज्ञायामगात्], (18) @deva[हरिषेणः], (19) @deva[नक्षत्राद्वा], @deva[रोहिणीषेणः].

Some of these would be blocked by @ref[8.3.111]; others would never undergo @deva[षत्व] by general rules—hence their inclusion. Here @deva[सु] functions as a @[karmapravachaniya] (@ref[1.4.94]), and @deva[निर्]/​@deva[दुर्] are not @[upasarga]s (they qualify as such only with verbs @deva[गम्] and @deva[क्री]), so @ref[8.3.65] does not apply to @deva[सेध] preceded by @deva[निर्]/​@deva[दुर्]. The forms @deva[निःषेधः] and @deva[दुःषेधः] = @deva[निर्गतः] @deva[सेधः] / @deva[दुर्गतः] @deva[सेधः]; @deva[सेध] is a @deva[घञ्]-derivative from @deva[षिधू] @deva[हिंसासंराद्ध्योः] (or from @deva[षिध] @deva[गत्याम्], included here to block @ref[8.3.113]).

@deva[सुषन्धिः] and @deva[दुःषन्धिः] derive from @deva[धा] + @deva[सम्] with affix @deva[कि] (@ref[3.3.92]), where the @deva[स] of @deva[सम्] undergoes @deva[षत्व]. @deva[सुष्ठु] and @deva[दुष्ठु] are @[unadi] formations (@[unadi] I.25). @deva[गौरिषक्थः] is a @[bahuvrihi] with @deva[षत्व] of @deva[सक्थि] and @[samasanta] @deva[षच्] (@ref[5.4.113]), the long @deva[ई] shortened by @ref[6.3.63]. @deva[प्रतिष्णिका] is formed from @deva[प्रति] + @deva[स्ना] + @deva[अङ्] (@ref[3.3.106]), giving @deva[प्रतिष्णा] with @deva[टाप्], then @deva[क] by @ref[5.3.73], @deva[आ]-shortening by @ref[7.4.13], and @deva[इ] by @ref[7.3.44]. @deva[नौषेचनम्] is a @deva[ल्युट्]-derivative from @deva[सिच्]; @deva[दुन्दुभिषेवणम्] likewise from @deva[सेवति] or @deva[सीव्यति].
"""

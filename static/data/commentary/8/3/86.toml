id = "8.3.86"
numericId = "83086"

[en]
simple = """
The initial consonant of the verb meaning 'to sound' can optionally become retroflex after a double prefix, but only when the compound refers to a vowel quality called visarga, not when it refers to the actual act of sounding.
"""

standard = """
The @deva[स्] of @deva[स्तन्] is optionally substituted by @deva[ष्] after the double @deva[उपसर्ग] @deva[अभिनिस्] when the compound denotes @deva[विसर्ग] (a phonetic quality). Thus @deva[अभिनिष्टानः वर्णः] or @deva[अभिनिस्तानः]. The substitution is blocked when @deva[स्तन्] means 'to make a sound' (@deva[अभिनिस्तनति]). Compare @ref[8.3.65].
"""

advanced = """
@deva[ष्] optionally replaces the @deva[स्] of @deva[स्तन्] after the compound @[upasarga] @deva[अभि] + @deva[निस्] when the resulting word denotes a particular phonetic element (@deva[विसर्ग]). Examples: @deva[अभिनिष्टानो] @deva[वर्णः] or @deva[अभिनिस्तानो] @deva[वर्णः]; @deva[अभिनिष्टानो] @deva[विसर्जनीयः] or @deva[अभिनिस्तानो] @deva[विसर्जनीयः]. The change requires both prefixes together, not either one separately.

@[apastamba] uses this term: @deva[द्व्यक्षरं] @deva[चतुरक्षरं] @deva[वा] @deva[नामपूर्वमाख्यातोत्तरं] @deva[दीर्घभिनिष्टान्तं], @deva[घोषवदाद्यन्तरन्तस्थम्]—a name should be two or four syllables, with a noun as its first part and a verb as its second, ending in a long vowel or @[visarga] (@[abhinishtana]), with a sonant initial and a semivowel in its body. Names like @deva[द्रविणोदा] and @deva[वरिवोदा] satisfy these conditions.

In the sense of actual sounding, the change does not apply: @deva[अभिनिस्तनति] @deva[मृदङ्गः]. The @[anuvrtti] of @deva[समासे] ceases from this point.
"""

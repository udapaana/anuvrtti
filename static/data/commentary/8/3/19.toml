id = "8.3.19"
numericId = "83019"

[en]
simple = """
According to Shakalya, a @deva[वकार]/@deva[यकार] present at end of a @deva[पद] and situated after @deva[अ]/@deva[आ] gets removed when it is followed by a letter from @deva[अश्] @deva[प्रत्याहार] in the context of @deva[संहिता].
"""

standard = """
@[śākalya]: @deva[व्]/@deva[य्] after @deva[अ]/@deva[आ] at @deva[पद]-end optionally elided before @deva[अश्]. @deva[क] @deva[आस्ते] or @deva[कयास्ते].
"""

advanced = """
According to @deva[शाकल्य], @deva[पद]-final @deva[व्] and @deva[य्] preceded by @deva[अ] or @deva[आ] are elided before an @deva[अश्] letter (vowels and soft consonants). Forms: @deva[क] @deva[आस्ते] / @deva[कयास्ते], @deva[काक] @deva[आस्ते] / @deva[काकयास्ते], @deva[अस्मा] @deva[उद्धर] / @deva[अस्मायुद्धर], @deva[द्वावत्र] / @deva[द्वा] @deva[अत्र], @deva[असावादित्यः] / @deva[असा] @deva[आदित्यः]. The attribution to @deva[शाकल्य] makes this an optional rule. Combined with @ref[8.3.18], three outcomes arise: full @deva[व्]/@deva[य्], light @deva[व्]/@deva[य्] (@deva[शाकटायन]), or elision (@deva[शाकल्य]). When @deva[व्]/@deva[य्] are preceded by @deva[ओ], elision is obligatory by the next rule @ref[8.3.20].
"""

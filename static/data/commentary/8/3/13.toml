id = "8.3.13"
numericId = "83013"

[en]
simple = """
When @deva[ढ्] is followed by @deva[ढ्], the first @deva[ढ्] is deleted. Example: @deva[षोढा] + @deva[ढौकते] → @deva[षोढौकते].
"""

standard = """
The lopa (deletion) of @deva[ढ्] occurs when another @deva[ढ्] follows in @deva[संहिता]. This simplifies the geminate @deva[ढ्ढ्] to single @deva[ढ्]. Example contexts involve compounds or sandhi creating @deva[ढ्]-sequences.
"""

advanced = """
The @deva[ढो] @deva[ढे] @deva[लोपः] rule handles the rare @deva[ढ्ढ्] cluster by deleting the first member. Though in the @deva[पद]-@[adhikāra] section, this applies in @deva[संहिता]. The rule prevents the difficult geminate retroflex aspirate.
"""

id = "8.3.73"
numericId = "83073"

[en]
simple = """
The s of the root skand optionally changes to @[ṣ] after the prefix vi. However, this optional change is blocked in past passive participle forms (@[niṣṭhā]). So the participle form always keeps s.
"""

standard = """
The root @deva[स्कन्द्] optionally takes @deva[ष्] after @deva[वि] (@ref[8.3.73]), giving @deva[विष्कन्ता] or @deva[विस्कन्ता]. The option is specifically excluded in @deva[निष्ठा] (past passive participle) forms, so @deva[विस्कन्नः] is the only valid participle — @deva[ष्] is not permitted there.
"""

advanced = """
@deva[ष्] optionally replaces the @deva[स्] of @deva[स्कन्द्] after @[upasarga] @deva[वि], but not in @[nishtha] forms (@deva[त] and @deva[तवत्] participles). The root is @deva[स्कन्दिर्] @deva[गति] @deva[शोषणयोः]. Examples: @deva[विष्कन्ता] or @deva[विस्कन्ता], @deva[विष्कन्तुम्] or @deva[विस्कन्तुम्], @deva[विष्कन्तव्यम्] or @deva[विस्कन्तव्यम्]. The @[nishtha] exclusion: @deva[विस्कन्नः] (only this form, no option).
"""

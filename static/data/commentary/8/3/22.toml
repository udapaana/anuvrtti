id = "8.3.22"
numericId = "83022"

[en]
simple = """
In the context of @deva[संहिता], all the grammarians say that the normal @deva[यकार] as well as the @deva[लघु-उच्चारण-यकार] is removed when it is followed by a @deva[हल्]-letter, provided that such a @deva[यकार] occurs at end of a @deva[पद] and comes after the letter @deva[अ] , or if such a @deva[यकार] occurs at the end of the words @deva[भोस्], @deva[भगोस्], or @deva[अघोस्].
"""

standard = """
All @[ācāryas]: @deva[य्] after @deva[भो]/@deva[भगो]/@deva[अघो]/@deva[अ]/@deva[आ] elided before consonant. @deva[भो] @deva[हसति], @deva[वृक्षा] @deva[हसन्ति].
"""

advanced = """
According to all @deva[आचार्य]s, @deva[य्] preceded by @deva[भो], @deva[भगो], @deva[अघो], @deva[अ], or @deva[आ] is elided before a consonant. Forms: @deva[भो] @deva[हसति], @deva[भगो] @deva[हसति], @deva[अघो] @deva[हसति]; @deva[भो] @deva[याति], @deva[भगो] @deva[याति], @deva[अघो] @deva[याति], @deva[वृक्षा] @deva[हसन्ति]. Although the @deva[अनुवृत्ति] of both @deva[व्] and @deva[य्] carries into this rule, only @deva[य्] is practically relevant — after @deva[भो], @deva[भगो], @deva[अघो] only @deva[य्] occurs, and @deva[व्] can appear only after @deva[अ]/@deva[आ], with the sole example being @deva[वृक्षव्] @deva[करोति] (@ref[8.3.17]). There, @deva[व्] is not elided because @deva[अशि] qualifies @deva[हलि] in this rule. The hypothetical @deva[वृक्षव्] @deva[हसति] (where @deva[ह] is an @deva[अश्] letter) has no attestation; @deva[पतञ्जलि] notes in his commentary on the @deva[प्रत्याहार] @deva[सूत्र] @deva[लण्] that no word can end in @deva[ह्], @deva[य्], @deva[र्], @deva[व्], or @deva[ल्]. The term @deva[सर्वेषाम्] indicates that even @ref[8.3.18] (lighter articulation) does not apply — @deva[लोप] occurs here as well.
"""

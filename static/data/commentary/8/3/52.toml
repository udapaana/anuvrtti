id = "8.3.52"
numericId = "83052"

[en]
simple = """
In Vedic texts, when an ablative visarga precedes the word @[pātu], it may optionally become s. The change is variable — different Vedic recensions or contexts may preserve the visarga instead.
"""

standard = """
This rule marks an optional (@deva[वा]) substitution of @deva[विसर्ग] by @deva[स्] before @deva[पातु] when that @deva[विसर्ग] is the @deva[पञ्चमी] ending in Vedic (@ref[8.3.52]). Example: @deva[दिवस्पातु]. In some recensions, @deva[परिषदः पातु] also shows the change, indicating the rule's variable scope across Vedic texts.
"""

advanced = """
@deva[स्] optionally substitutes for the ablative @deva[विसर्ग] before @deva[पातु] in @deva[छन्दस्]. Forms: @deva[दिवस्पातु], @deva[राज्ञस्पातु]. The change is variable — in some recensions it does not occur, as @deva[परिषदः] @deva[पातु].
"""

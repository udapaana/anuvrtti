id = "8.3.69"
numericId = "83069"

[en]
simple = """
The s of the root svan changes to @[ṣ] after the prefixes vi and ava, but only when the meaning is the smacking or slurping sound made while eating. For other meanings of the same root, like a drum sounding, s stays unchanged.
"""

standard = """
The root @deva[स्वन्] changes @deva[स् → ष्] after @deva[वि] or @deva[अव] only in the specific sense of eating noisily (@deva[भक्षणे]) (@ref[8.3.69]). Example: @deva[विष्वणति] (makes a smacking sound while eating). When @deva[स्वन्] means a general sound, as in @deva[विस्वनति मृदङ्गः], the @deva[ष्] change does not apply.
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[स्वन्] after @deva[वि] and @deva[अव] specifically in the sense of smacking while eating (@deva[भक्षणे]). Examples: @deva[विष्वणति], @deva[व्यष्वणत्], @deva[विषष्वाण]; @deva[अवष्वणति], @deva[अवाष्वणत्], @deva[अवषष्वाण]. In the general sense of sounding, the change does not apply: @deva[विस्वनति] @deva[मृदङ्गः] (the drum sounds).
"""

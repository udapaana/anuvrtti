id = "8.3.27"
numericId = "83027"

[en]
simple = """
In the context of @deva[संहिता], if a @deva[पदान्तमकार] is followed by '@deva[ह्] + @deva[न्]' then that @deva[पदान्तमकार] is optionally converted to @deva[नकार].
"""

standard = """
@deva[म्] optionally → @deva[न्] before @deva[ह्न्]. @deva[किम्] @deva[ह्नुते] or @deva[किन्] @deva[ह्नुते].
"""

advanced = """
@deva[न्] is optionally substituted for @deva[म्] when it is followed by @deva[ह] which has a @deva[न] after it. @deva[म्] becomes @deva[न्] before a word beginning with @deva[ह्न]; as @deva[किम्] @deva[ह्नुते] or @deva[किं] @deva[ह्नुते] 'what withholds'. @deva[कथम्] @deva[ह्नुते] or @deva[कथं] @deva[ह्नुते] @deva[॥]
"""

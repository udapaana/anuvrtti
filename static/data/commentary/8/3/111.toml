id = "8.3.111"
numericId = "83111"

[en]
simple = """
The retroflex change does not happen to the suffix sat or to any s that stands at the very beginning of an independent word. Only s within a compound or after a prefix is subject to the change.
"""

standard = """
The @deva[ष्त्व] rule does not apply to the @deva[तद्धित] affix @deva[सात्] (as in @deva[अग्निसात्]) or to a @deva[स्] that stands at the beginning of an independent @deva[पद] (word). Thus @deva[दधि सिञ्चति]: @deva[दधि] ends in @deva[इ], but the following @deva[स्] is @deva[पद]-initial and so remains. This exception is rooted in the structural condition at @ref[8.3.59].
"""

advanced = """
@deva[षत्व] does not apply to the affix @deva[सात्] or to @deva[स्] standing at the beginning of a @deva[पद] (word). The affix @deva[सात्] (ordained by @ref[5.4.52]) would otherwise undergo @deva[षत्व] by @ref[8.3.59]; this @[sutra] prevents that. The @deva[पदादि] @deva[स] refers to roots listed with @deva[ष] in the @[dhatupatha] for which @deva[स] has been substituted at word-initial position—also an exception to @ref[8.3.59]. Examples: @deva[अग्निसात्], @deva[दधिसात्], @deva[मधुसात्]; @deva[दधि] @deva[सिञ्चति], @deva[मधु] @deva[सिञ्चति].
"""

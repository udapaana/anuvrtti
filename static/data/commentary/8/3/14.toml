id = "8.3.14"
numericId = "83014"

[en]
simple = """
When @deva[र्] is followed by @deva[र्], the first @deva[र्] is deleted. Example: @deva[पुनर्] @deva[रमते] → @deva[पुन] @deva[रमते].
"""

standard = """
In @deva[संहिता], when @deva[र्] precedes another @deva[र्], the first @deva[र्] undergoes lopa. Thus @deva[पुनर्] @deva[रमते] → @deva[पुनरमते।] This eliminates the @deva[र्र्] geminate, simplifying pronunciation.
"""

advanced = """
The @deva[रो] @deva[रि] rule parallels the preceding @deva[ढ्]-rule. The @deva[र्]-lopa before @deva[र्] is standard sandhi. Note that this differs from @deva[रो] @deva[रि] → @deva[रोरि] which would apply to visarga + @deva[र] (handled by @ref[8.3.17]).
"""

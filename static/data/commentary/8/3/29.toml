id = "8.3.29"
numericId = "83029"

[en]
simple = """
In the context of @deva[संहिता], a @deva[सकार] present after a @deva[पदान्त] @deva[डकार] optionally gets a @deva[धुट्] @deva[आगम].
"""

standard = """
@deva[धुट्] optionally augments @deva[स्]-initial word after @deva[ड्]. @deva[श्वलिट्] @deva[त्साये] or @deva[श्वलिट्] @deva[साये].
"""

advanced = """
After a @deva[पद]-final @deva[ड्], the augment @deva[धुट्] (@deva[ध्]) is optionally added to the beginning of a @deva[स्]-initial word. Forms: @deva[श्वलिट्] @deva[त्साये] / @deva[श्वलिट्] @deva[साये], @deva[मधुलिट्] @deva[त्साये] / @deva[मधुलिट्] @deva[साये]. The term @deva[डः] is Ablative singular (not Genitive) by the maxim @deva[उभयनिर्देशे] @deva[पञ्चमी] @deva[निर्देशो] @deva[बलीयान्]. The augment is @deva[धुट्] (added to the second word) rather than @deva[धुक्] (added to the first) to prevent @deva[ष्टु]-change by @ref[8.4.41]; at the beginning of the second word, @ref[8.4.42] blocks that change. Derivation: the @deva[ह] of @deva[श्वलिह्] becomes @deva[ढ] by @ref[8.2.31], then @deva[ड्] by @ref[8.2.39]; the @deva[ध] of the augment becomes @deva[त] by @ref[8.4.55], and @deva[ड्] → @deva[ट्] by the same rule.
"""

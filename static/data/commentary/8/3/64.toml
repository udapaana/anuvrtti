id = "8.3.64"
numericId = "83064"

[en]
simple = """
For roots of the @[sthā] class (beginning with sth), the @[ṣ] change applies not just to the root itself but also to the reduplicated syllable in perfect tense. The entire reduplicate shifts to @[ṣ] as a consequence.
"""

standard = """
Under the @deva[सित्] @deva[अधिकार] (@ref[8.3.63]), roots of the @deva[स्था]-class undergo @deva[स् → ष्] both in the root and in the reduplicate of the @deva[लिट्] (perfect) (@ref[8.3.64]). Examples: @deva[परितष्ठौ] (perfect of @deva[स्था] after @deva[परि]), @deva[अभिषिषेणयिषति] (desiderative causative with @[ṣ] in both reduplicate and root).
"""

advanced = """
For roots from @deva[स्था] through @deva[सेव्] (i.e., spanning @ref[8.3.65] to @ref[8.3.70], up to @deva[सित्] exclusive), @deva[ष्] replaces @deva[स्] even when the @[abhyasa] intervenes, and the @deva[स] of the @[abhyasa] itself also changes to @deva[ष]. The @[sutra] makes two statements: (1) a @[vidhi] that @deva[षत्व] applies despite an intervening reduplicate, and (2) a @[niyama] that the reduplicate @deva[स] of these roots (and no others) becomes @deva[ष].

Example with intervening @[abhyasa]: @deva[परितष्ठौ], where @deva[त] (the @[abhyasa]) stands between the @[upasarga] and the root. This extends even to roots not listed with @deva[ष] in the @[dhatupatha]: @deva[अभिषिषेणयिषति], @deva[परिषिषेणयिषति] (@deva[सेनया] @deva[अभियातुमिच्छन्ति]). It also covers @[abhyasa] syllables ending in @deva[अ], as in @deva[अभितष्ठौ]—here the @deva[स्] would not otherwise change to @deva[ष] by @ref[8.3.59] since @deva[अ] (not @deva[इ] or @deva[उ]) precedes.

A further function of this @[sutra] is to override the @[niyama] of @ref[8.3.61]: forms like @deva[अभिषिषिक्षति] and @deva[परिषिषिक्षति] are permitted. The @[niyama] force of @deva[अभ्यासस्य] restricts the reduplicate @deva[षत्व] to @deva[स्था]-class roots only. Counterexample: @deva[अभिसुसूषति] from @deva[षू] @deva[प्रेरणे] with @deva[सन्] (augment debarred by @ref[7.2.12])—the root @deva[स्] remains unchanged by the @[niyama] of @ref[8.3.61], and the reduplicate @deva[स्] stays unchanged by the restriction of this @[sutra].
"""

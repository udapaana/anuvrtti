id = "8.3.100"
numericId = "83100"

[en]
simple = """
When a word meaning 'army' follows the name of a lunar mansion in a personal name, the initial s of that word optionally becomes retroflex. Both pronunciations are accepted.
"""

standard = """
The @deva[ष्त्व] substitution is optional when the prior member of the compound is the name of a @deva[नक्षत्र] (lunar mansion). Thus @deva[रोहिणिषेणः] or @deva[रोहिणिसेनः] are both correct. This optionality contrasts with the obligatory substitution in @ref[8.3.99] and reflects a loosening of the rule specifically for @deva[नक्षत्र] names.
"""

advanced = """
@deva[ष्] optionally replaces @deva[स्] when the preceding compound member is the name of a @deva[नक्षत्र] (lunar mansion): @deva[रोहिणिषेणः] or @deva[रोहिणिसेनः], @deva[भरणिषेणः] or @deva[भरणिसेनः]. The @deva[ग्]-exclusion still applies: @deva[शतभिषक्सेनः] (not @deva[षेनः]).

Both @ref[8.3.99] and @ref[8.3.100] are essentially @[gana]-@[sutra]s read within the @deva[सुषामादि] @[gana]; the @[kasika] author elevated them to independent @[sutra] status. All @deva[षत्व] changes not derivable from a specific rule should be classified under this @deva[सुषामादि] @[gana].
"""

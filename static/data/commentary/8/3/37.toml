id = "8.3.37"
numericId = "83037"

[en]
simple = """
When a @deva[विसर्ग] is followed by a @deva[ककार] or a @deva[खकार], it is converted either to a @deva[जिह्वामूलीय] or to a @deva[विसर्ग]. When a @deva[विसर्ग] is followed by a @deva[पकार] or a @deva[फकार], it is converted either to a @deva[उपध्मानीय] or to a @deva[विसर्ग].
"""

standard = """
@deva[विसर्ग] optionally → @deva[जिह्वामूलीय] (ᳵ) before @deva[क]/@deva[ख], @deva[उपध्मानीय] (ᳶ) before @deva[प]/@deva[फ]. @deva[वृक्ष]ᳵ@deva[करोति] or @deva[वृक्षः] @deva[करोति].
"""

advanced = """
@deva[जिह्वामूलीय] (ᳵ) and @deva[उपध्मानीय] (ᳶ) optionally substitute for @deva[विसर्ग] before hard gutturals and labials respectively. Forms: @deva[वृक्ष]ᳵ@deva[करोति] / @deva[वृक्षः] @deva[करोति], @deva[वृक्ष]ᳵ@deva[खनति] / @deva[वृक्षः] @deva[खनति], @deva[वृक्ष]ᳶ@deva[पचति] / @deva[वृक्षः] @deva[पचति], @deva[वृक्ष]ᳶ@deva[फलति] / @deva[वृक्षः] @deva[फलति]. The @deva[क] and @deva[प] in ᳵ@deva[क] and ᳶ@deva[प] serve pronunciation only; the actual substitutes are two archaic sibilants belonging to the @deva[क]- and @deva[प]-classes respectively. This rule applies where @ref[8.3.34] does not, and defers to @ref[8.3.35] (which is not debarred). No @deva[विप्रतिषेध] arises between @ref[8.3.35] and this rule because of @deva[असिद्धत्व] (@ref[8.2.1]) — each rule in the @deva[त्रिपादी] operates independently, ignoring subsequent rules. Some split the @deva[सूत्र] into two: (1) @deva[कुप्वोः] — @deva[विसर्ग] remains @deva[विसर्ग] before a guttural/labial followed by a sibilant; (2) ᳵ@deva[क] ᳶ@deva[पौ] @deva[च] — @deva[जिह्वामूलीय] and @deva[उपध्मानीय] substitute for @deva[विसर्ग] before gutturals and labials in all other cases.
"""

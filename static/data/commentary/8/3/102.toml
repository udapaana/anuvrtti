id = "8.3.102"
numericId = "83102"

[en]
simple = """
The prefix nis before the verb meaning 'to heat' produces a retroflex, but only when the action happens once. If the word means heating again and again, the original s is kept.
"""

standard = """
The @deva[स्] of @deva[निस्] is substituted by @deva[ष्] before the root @deva[तप्] when the compound does not carry the sense of repeated action. Thus @deva[निष्टपति] means 'heats once.' When the sense is repetitive (@deva[पुनःपुनः तापन]), the form @deva[निस्तपति] is used. This semantic distinction is governed by @deva[अभिधान] (denotational) conditions similar to those in @ref[8.3.86].
"""

advanced = """
@deva[ष्] replaces the @deva[स्] of @deva[निस्] before @deva[तप्] when the sense is not repeated heating (@deva[आसेवन]). @deva[निष्टपति] @deva[सुवर्णम्] = @deva[सकृत्] @deva[अग्निम्] @deva[स्पर्शयति] (puts gold into fire once). In the sense of repeated heating: @deva[निस्तपति] @deva[सुवर्णं] @deva[सुवर्णकारः] = @deva[पुनः] @deva[पुनरग्निं] @deva[स्पर्शयति]. The Vedic forms @deva[निष्टप्तं] @deva[रक्षः] and @deva[निष्टप्ता] @deva[अरातयः] show @deva[षत्व] either as a Vedic irregularity or because repeated action is not implied.
"""

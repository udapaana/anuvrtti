id = "8.3.2"
numericId = "83002"

[en]
simple = """
From here until @ref[8.3.12], rules concern optional nasalization of vowels before @deva[रु]. Example: @deva[अ] → @deva[अँ].
"""

standard = """
This @deva[अधिकार] establishes that following rules (through @ref[8.3.12]) deal with @deva[अनुनासिक] (nasal vowel) substitution for vowels preceding @deva[रु]. The nasalization is @deva[विभाषा] (optional). This governs nasal vowel sandhi.
"""

advanced = """
The @deva[अट्कुप्वाङ्नुम्व्यवायेऽपि] @[adhikāra] indicates that nasalization can occur even with intervening elements. The scope extends to @ref[8.3.12] (@deva[कानाम्रेडिते]). This establishes the nasal-before-@deva[रु] rule domain.
"""

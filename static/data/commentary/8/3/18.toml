id = "8.3.18"
numericId = "83018"

[en]
simple = """
In the context of @deva[संहिता], according to @deva[शाकटायन], the @deva[पदान्त-वकार] and @deva[पदान्त-यकार], when followed by a letter from @deva[अश्-प्रत्याहार] are converted respectively to @deva[लघु-उच्चारण-वकार] and @deva[लघु-उच्चारण-यकार].
"""

standard = """
@[śākaṭāyana]: @deva[व्]/@deva[य्] after @deva[अ]/@deva[आ] at @deva[पद]-end pronounced with lighter articulation before @deva[अश्]. @deva[भोयत्र] (light @deva[य्]).
"""

advanced = """
According to @deva[शाकटायन], @deva[पद]-final @deva[व्] and @deva[य्] (in @deva[भोय्], @deva[भगोय्], @deva[अघोय्], or after @deva[अ]/@deva[आ]) receive @[laghu]-@[prayatna]-@[tara] (lighter articulation) before an @deva[अश्] letter. The term @[laghu]-@[prayatna]-@[tara] denotes an effort of minimal muscular contact between the articulatory organ and its place of pronunciation — the consonant is effectively slurred. The lighter @deva[व्] replaces the full @deva[व्], and lighter @deva[य्] replaces the full @deva[य्]. Forms: @deva[भोयत्र], @deva[भगोयत्र], @deva[अघोयत्र], @deva[कयास्ते] / @deva[क] @deva[आस्ते], @deva[अस्मायुद्धर] / @deva[अस्मा] @deva[उद्धर], @deva[असावादित्यः] / @deva[असा] @deva[आदित्यः], @deva[द्वावत्र] / @deva[द्वा] @deva[अत्र], @deva[द्वावानय] / @deva[द्वा] @deva[आनय].
"""

id = "8.3.40"
numericId = "83040"

[en]
simple = """
The @deva[विसर्ग] of @deva[गतिसंज्ञक] @deva[नमस्] and @deva[पुरस्] words is converted to @deva[सकार] when followed by @deva[कवर्ग] letter or a @deva[पवर्ग] letter.
"""

standard = """
@deva[विसर्ग] of @deva[गति] @deva[नमस्]/@deva[पुरस्] → @deva[स्] before @deva[कु]/@deva[पु]. @deva[नमस्कर्ता], @deva[पुरस्कर्ता]. Not: @deva[पुरः] @deva[करोति] (@deva[पुरः] as noun).
"""

advanced = """
@deva[स्] substitutes for the @deva[विसर्ग] of @deva[नमस्] and @deva[पुरस्] before a hard guttural or labial, provided these words are @deva[गति] — @deva[नमस्] is @deva[गति] by @ref[1.4.74], @deva[पुरस्] by @ref[1.4.67]. Forms: @deva[नमस्कर्त्ता], @deva[नमस्कर्तुम्], @deva[नमस्कर्त्तव्यम्]; @deva[पुरस्कर्त्ता], @deva[पुरस्कर्तुम्], @deva[पुरस्कर्त्तव्यम्]. The @deva[गति] condition excludes the noun @deva[पुरः] (accusative plural of @deva[पूः]): @deva[पूःकरोति], @deva[पुरौ] @deva[करोति], @deva[पुरः] @deva[करोति]. The @deva[अनुवृत्ति] of @deva[अपदादौ] ceases with this rule.
"""

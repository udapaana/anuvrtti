id = "8.3.105"
numericId = "83105"

[en]
simple = """
In Vedic language, according to some grammarians, the words for 'praised' and 'praise-chant' optionally take a retroflex in certain phonetic environments where the normal rule would apply.
"""

standard = """
In @deva[छन्दस्], some grammarians hold that @deva[ष्त्व] is optionally substituted for the @deva[स्] of @deva[स्तुत] and @deva[स्तोम]. Thus @deva[त्रिभिष्टुतः] or @deva[त्रिभिस्तुतः], and @deva[गोष्टोमम्] or @deva[गोस्तोमम्]. This is another @deva[वार्तिक] expanding Vedic sandhi options beyond the scope of @ref[8.3.103].
"""

advanced = """
In @deva[छन्दस्], according to some, @deva[ष्] optionally replaces the @deva[स्] of @deva[स्तुत] and @deva[स्तोम]: @deva[त्रिभिष्टुतस्य] or @deva[त्रिभिस्तुतस्य]; @deva[गोष्टोमं] @deva[षोडशिनम्] or @deva[गोस्तोमं] @deva[षोडशिनम्]. This change could already be derived from the general rule in @ref[8.3.106]; the separate mention of @deva[स्तुत] and @deva[स्तोम] is an amplification. The term @deva[छन्दसि] from this @[sutra] governs the following @[sutra] as well.
"""

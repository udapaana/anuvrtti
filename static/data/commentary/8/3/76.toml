id = "8.3.76"
numericId = "83076"

[en]
simple = """
The s of the roots sphur and sphul optionally changes to @[ṣ] after the prefixes nis, ni, and vi. Both the changed form with @[ṣ] and the unchanged form with s are grammatically acceptable.
"""

standard = """
After @deva[निस्], @deva[नि], or @deva[वि], the @deva[स्] of @deva[स्फुर्] and @deva[स्फुल्] optionally becomes @deva[ष्] (@ref[8.3.76]). Examples: @deva[निष्स्फुरति] or @deva[निस्स्फुरति]; @deva[विष्फुलति] or @deva[विस्फुलति]. The option (@deva[वा]) means both forms are accepted without one being preferred.
"""

advanced = """
@deva[ष्] optionally replaces the @deva[स्] of @deva[स्फुर्] and @deva[स्फुल्] after @[upasarga] @deva[निस्], @deva[नि], or @deva[वि]. Examples for @deva[स्फुर्]: @deva[निष्ष्फुरति] or @deva[निस्स्फुरति], @deva[निष्फुरति] or @deva[निस्फुरति], @deva[विष्फुरति] or @deva[विस्फुरति]. For @deva[स्फुल्]: @deva[निष्ष्फुलति] or @deva[निस्स्फुलति], @deva[निष्फुलति] or @deva[निस्फुलति], @deva[विष्फुलति] or @deva[विस्फुलति].
"""

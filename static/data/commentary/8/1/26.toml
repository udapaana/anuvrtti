id = "8.1.26"
numericId = "81026"

[en]
simple = """
When a @deva[प्रथमा] (nominative) (itself preceded by another word) precedes the pronoun, the substitution is optional. @deva[ग्रामे] @deva[कम्बलस्ते] or @deva[कम्बलस्तव].
"""

standard = """
After @deva[पदपूर्व] @deva[प्रथमा] (nominative preceded by word), pronoun substitution is optional. @deva[ग्रामे] @deva[कम्बलस्ते] or @deva[कम्बलस्तव।] @deva[विभाषा] allows both forms.
"""

advanced = """
@deva[विभाषा] for @deva[आदेश] after @deva[पदपूर्व]-@deva[प्रथमा]. When nominative itself has a preceding @deva[पद], the pronoun substitution becomes optional. @deva[ग्रामे] @deva[कम्बलस्ते]/@deva[कम्बलस्तव] both valid. The layered @deva[पद]-structure creates optionality.
"""

id = "8.1.2"
numericId = "81002"

[en]
simple = """
When a word is said twice, the second occurrence is called @deva[अम्रेडित] (the repeated one). Example: @deva[चौर] @deva[चौर] 'thief! thief!'
"""

standard = """
@deva[द्विरुक्त] (twice-spoken): the @deva[उत्तर] (latter) occurrence = @deva[अम्रेडित]. @deva[चौर] @deva[चौर३], @deva[वृषल] @deva[वृषल३] @deva[दस्यो३] show the repeated word. This technical term identifies the second element in doubling.
"""

advanced = """
@deva[अम्रेडित]-@deva[संज्ञा] for the @deva[परस्मात्] (subsequent) in @deva[द्विर्वचन]. @deva[चौर] @deva[चौर३], @deva[वृषल] @deva[वृषल३] @deva[दस्यो३] @deva[घातयिष्यामि] show usage. The @deva[३] indicates pluti (prolongation). @deva[अम्रेडित] receives special accent treatment (@ref[8.1.3]) and behaves distinctly from the first occurrence.
"""

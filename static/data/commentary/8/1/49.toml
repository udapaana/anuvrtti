id = "8.1.49"
numericId = "81049"

[en]
simple = """
After @deva[आहो] or @deva[उताहो] (when nothing precedes them), the immediately following verb retains accent. @deva[आहो] @deva[पचति] (accented).
"""

standard = """
@deva[तिङन्त] retains accent after @deva[अपदपूर्व] @deva[साक्षात्] @deva[आहो]/@deva[उताहो]. @deva[आहो] @deva[पचति꣡], @deva[उताहो] @deva[गच्छति꣡।] Immediate following with no intervening word.
"""

advanced = """
Accent-retention after @deva[अपदपूर्व] + @deva[साक्षात्] (immediate) @deva[आहो]/@deva[उताहो]. @deva[निघात]-@deva[प्रतिषेध] (accent loss blocked). @deva[आहो] @deva[पचति], @deva[उताहो] @deva[गच्छति] show accented verbs. The disjunctive particles signal alternatives with maintained accent.
"""

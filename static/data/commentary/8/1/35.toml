id = "8.1.35"
numericId = "81035"

[en]
simple = """
In Vedic, the verb optionally retains accent with @deva[हि] when correlating with another verb. Sometimes one verb is accented, sometimes the other.
"""

standard = """
Vedic @deva[बहुलम्]: @deva[तिङन्त] with @deva[हि] may retain accent when correlating with another verb. @deva[छन्दस्] shows variation: sometimes first verb accented, sometimes second, sometimes both.
"""

advanced = """
@deva[छान्दस] @deva[बहुलम्] for @deva[हि] with correlated verbs. When two verbs stand in correlation with @deva[हि], accent patterns vary: @deva[एकतरस्य] or @deva[उभयोः] possible. Vedic allows multiple patterns not standardized in classical usage.
"""

id = "8.1.19"
numericId = "81019"

[en]
simple = """
All syllables of a @deva[सम्बोधन] (vocative) become unaccented when a word precedes and it's not at verse-beginning. @deva[पचसि] @deva[देवदत्त] — @deva[देवदत्त] is gravely accented.
"""

standard = """
@deva[संबोधन] (vocative) → @deva[सर्वानुदात्त] when @deva[पदपूर्व] (word-preceded) and @deva[अपादादि] (non-initial). @deva[पचसि] @deva[दे॒व॒द॒त्त॒] shows complete grave accent. Initial vocatives retain original accent.
"""

advanced = """
@deva[संबोधन] receives @deva[सर्वानुदात्त] when: (1) @deva[पदपूर्व] (preceded by a word), (2) @deva[अपादादि] (not at @deva[पाद] beginning). @deva[पचसि] @deva[दे॒व॒द॒त्त॒], @deva[पचसि] @deva[य॒ज्ञ॒द॒त्त॒] show all syllables grave-accented. @deva[पादादि] vocatives (sentence-initial) retain original accent pattern.
"""

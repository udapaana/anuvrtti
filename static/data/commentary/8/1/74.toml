id = "8.1.74"
numericId = "81074"

[en]
simple = """
When the preceding @deva[सम्बोधन] (vocative) is plural and the following is specific, the 'as-if-absent' treatment is optional. @deva[हे] @deva[ब्राह्मणाः] @deva[देवदत्त] (optional treatment).
"""

standard = """
@deva[बहुवचन]-@deva[आमन्त्रित] + @deva[विशेष]-@deva[आमन्त्रित] → optional @deva[असत्त्व]. @deva[विभाषा]: @deva[हे] @deva[ब्राह्मणाः] @deva[देवदत्त] — the plural vocative optionally treated as absent for the specific one.
"""

advanced = """
@deva[विभाषा] for @deva[असत्त्व] when @deva[बहुवचन]-@deva[आमन्त्रित] precedes @deva[विशेष]-@deva[वाचक]-@deva[समानाधिकरण]-@deva[आमन्त्रित]. @deva[हे] @deva[ब्राह्मणाः] @deva[देवदत्त] allows optional treatment: either the plural vocative affects the specific one, or it's treated as absent. This refines 8.1.73.
"""

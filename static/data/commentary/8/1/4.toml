id = "8.1.4"
numericId = "81004"

[en]
simple = """
Whole words are doubled (@deva[अम्रेडित]) when expressing 'always' or 'each/every'. @deva[प्रतिदिवं] @deva[दिवम्] 'day by day', @deva[ग्रामं] @deva[ग्रामम्] 'village by village'.
"""

standard = """
@deva[द्विर्वचन] for @deva[सातत्य] (always) and @deva[प्रत्येक] (each/distributive). Finite verbs and @deva[कृदन्त] indeclinables express 'always': @deva[पचति] @deva[पचति] 'always cooks'. Nouns show distribution: @deva[ग्रामं] @deva[ग्रामम्] 'each village'.
"""

advanced = """
@deva[सातत्य] (continuity) and @deva[प्रत्येक] (distribution) trigger @deva[द्विर्वचन]. @deva[तिङन्त] and @deva[कृदन्त]-@deva[अव्यय] for @deva[सातत्य]; @deva[सुबन्त] for @deva[प्रत्येक]. @deva[प्रतिदिवं] @deva[दिवम्], @deva[ग्रामं] @deva[ग्रामम्], @deva[पचति] @deva[पचति] demonstrate the semantic categories triggering repetition.
"""

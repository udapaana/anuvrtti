id = "8.1.45"
numericId = "81045"

[en]
simple = """
When @deva[किम्] is omitted in an action-question, the verb may optionally retain accent. @deva[पचसि]? (questioning tone, accented or not).
"""

standard = """
@deva[क्रियाप्रश्न] without @deva[किम्] (elided) → optional verb accent. @deva[पचसि]? @deva[गच्छसि]? The question is implied; @deva[विभाषा] allows accent or @deva[अनुदात्त].
"""

advanced = """
@deva[विभाषा] when @deva[किम्] elided (@deva[लुप्त]) in @deva[क्रियाप्रश्न]. The interrogative sense is conveyed without explicit @deva[किम्]. @deva[पचसि]? @deva[गच्छसि]? show optional accent. Intonation and context signal the question; grammar allows both accent patterns.
"""

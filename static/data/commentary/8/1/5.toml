id = "8.1.5"
numericId = "81005"

[en]
simple = """
The word @deva[परि] 'around/except' is doubled when meaning 'with the exception of'. @deva[परि] @deva[परि] @deva[त्रिगर्त्तेभ्यो] @deva[वृष्टो] @deva[देवः] 'it rained except around the Trigartas'.
"""

standard = """
@deva[परि] + @deva[परि] for @deva[व्यतिरेक] (exception) meaning. @deva[परि] @deva[परि] @deva[त्रिगर्त्तेभ्यो] @deva[वृष्टो] @deva[देवः] 'the god rained, excepting around the Trigartas'. The doubling signals the exclusion sense.
"""

advanced = """
@deva[परि] @deva[द्विर्वचन] for @deva[व्यतिरेक] (exception/exclusion). @deva[परि] @deva[परि] @deva[त्रिगर्त्तेभ्यो] @deva[वृष्टो] @deva[देवः] (refs @ref[1.4.88], @ref[2.3.10]). The doubled @deva[परि] specifically marks the 'except for' meaning, distinguishing from simple 'around' sense of single @deva[परि].
"""

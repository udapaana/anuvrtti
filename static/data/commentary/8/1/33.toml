id = "8.1.33"
numericId = "81033"

[en]
simple = """
The finite verb retains accent with @deva[अङ्ग] when used in friendly assertion. @deva[अङ्ग] @deva[कुरु] 'come on, do it!'
"""

standard = """
@deva[तिङन्त] retains accent with @deva[अङ्ग] in @deva[अप्रतिलोम] (friendly/non-hostile) assertion. @deva[अङ्ग] @deva[कुरु꣡] 'please do!', @deva[अङ्ग] @deva[पच꣡।] Friendly urging with @deva[अङ्ग] keeps verb accented.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with @deva[अङ्ग] in @deva[अप्रतिलोम]-@deva[अर्थ]. @deva[प्रतिलोम] = hostile/injurious; @deva[अप्रतिलोम] = friendly. @deva[अङ्ग] @deva[कुरु꣡], @deva[अङ्ग] @deva[पच꣡] show friendly exhortation. The accent signals benevolent intention.
"""

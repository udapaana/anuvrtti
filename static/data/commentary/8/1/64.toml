id = "8.1.64"
numericId = "81064"

[en]
simple = """
In Vedic, with @deva[वै] and @deva[वाव], the first verb optionally retains accent. @deva[अहर्वै] @deva[देवानाम्] @deva[आसीत्] (@deva[आसीत्] accented or not).
"""

standard = """
Vedic: @deva[वै]/@deva[वाव] → optional first-verb accent. @deva[अहर्वै] @deva[देवानाम्] @deva[आ꣡सीत्] or @deva[आ॒सी॒त्।] @deva[विभाषा] in @deva[छन्दस्] for these emphatic particles.
"""

advanced = """
@deva[छान्दस] @deva[विभाषा] for first @deva[तिङन्त] with @deva[वै]/@deva[वाव]. @deva[अहर्वै] @deva[देवानाम्] @deva[आसीत्] shows optional accent. These emphatic Vedic particles create optionality not found in classical usage.
"""

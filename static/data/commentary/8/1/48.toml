id = "8.1.48"
numericId = "81048"

[en]
simple = """
After @deva[किम्]-forms followed by @deva[चित्], when no word precedes, the verb retains accent. @deva[किंचित्] @deva[पचति] (accented).
"""

standard = """
@deva[तिङन्त] retains accent after @deva[अपदपूर्व] @deva[किम्]-@deva[वृत्त] + @deva[चित्]. @deva[किंचित्] @deva[पचति꣡], @deva[कश्चित्] @deva[गच्छति꣡।] The indefinite pronoun formation preserves verb accent.
"""

advanced = """
Accent-retention for @deva[तिङन्त] after @deva[अपदपूर्व] @deva[किम्]-@deva[वृत्त] (@deva[किम्] + @deva[चित्]). @deva[किंचित्], @deva[कश्चित्], @deva[कश्चन] as indefinites: @deva[किंचित्] @deva[पचति], @deva[कश्चित्] @deva[गच्छति] show accented verbs. @deva[अपदपूर्व] condition essential.
"""

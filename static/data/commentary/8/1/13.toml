id = "8.1.13"
numericId = "81013"

[en]
simple = """
@deva[प्रिय] 'dear' and @deva[सुख] 'pleasant' are optionally doubled when meaning 'easily, without difficulty'. @deva[प्रियप्रियम्] or @deva[प्रियम्] 'easily'.
"""

standard = """
@deva[प्रिय]/@deva[सुख] @deva[द्विर्वचन] (optional) for @deva[अकृच्छ्र] (without difficulty). @deva[प्रियप्रियम्] 'easily, pleasantly', @deva[सुखसुखम्] 'comfortably'. @deva[विभाषा]: single form also valid with same meaning.
"""

advanced = """
@deva[विभाषा] for @deva[प्रिय]/@deva[सुख] @deva[द्विर्वचन] in @deva[अकृच्छ्रार्थ] (ease, absence of difficulty). @deva[कृच्छ्र] = difficulty/sorrow; @deva[अकृच्छ्र] = its absence. @deva[प्रियप्रियम्]/@deva[प्रियम्], @deva[सुखसुखम्]/@deva[सुखम्] both valid. @deva[कर्मधारयवत्] treatment applies when doubled.
"""

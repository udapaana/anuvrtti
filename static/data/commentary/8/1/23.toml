id = "8.1.23"
numericId = "81023"

[en]
simple = """
The singular accusative of @deva[युष्मद्] and @deva[अस्मद्] become @deva[त्वा] and @deva[मा]. @deva[त्वां] → @deva[त्वा], @deva[माम्] → @deva[मा].
"""

standard = """
@deva[युष्मद्]/@deva[अस्मद्] @deva[एकवचन] @deva[द्वितीया] → @deva[त्वा]/@deva[मा]. @deva[त्वा] @deva[पश्यामि] 'I see you', @deva[मा] @deva[पश्य] 'see me'. These replace @deva[त्वाम्] and @deva[माम्] as enclitics when @deva[पदपूर्व].
"""

advanced = """
@deva[एकवचन] @deva[द्वितीया] @deva[आदेश]: @deva[युष्मद्] → @deva[त्वा], @deva[अस्मद्] → @deva[मा]. @deva[त्वा]/@deva[मा] replace full forms @deva[त्वाम्]/@deva[माम्] as post-word enclitics. @deva[पदपूर्व] + @deva[अनुदात्त] conditions apply. These short accusative forms are characteristic of connected speech.
"""

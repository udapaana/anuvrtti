id = "8.1.61"
numericId = "81061"

[en]
simple = """
With @deva[अह], the first verb retains accent when referring to various commissions/tasks. @deva[देवदत्तः] @deva[पचति] @deva[अह] (assigning tasks, @deva[पचति] accented).
"""

standard = """
@deva[अह] + @deva[विनियोग] (commission/assignment) → first @deva[तिङन्त] accented. @deva[देवदत्तः] @deva[पचति꣡] @deva[अह] 'Devadatta cooks, you see' (distributing tasks). Also applies with @deva[क्षिया]-@deva[गर्हा] (@ref[8.1.60]).
"""

advanced = """
Accent-retention for first @deva[तिङन्त] with @deva[अह] in @deva[विनियोगार्थ] (various commissions/assignments). @deva[विनियोग] = sending/appointing. @deva[देवदत्तः] @deva[पचति] @deva[अह], @deva[यज्ञदत्तः] @deva[पठति] @deva[अह] show accented first verbs when assigning different tasks to different people.
"""

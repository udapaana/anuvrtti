id = "8.1.8"
numericId = "81008"

[en]
simple = """
A @deva[सम्बोधन] (vocative) at sentence-beginning is doubled when expressing envy, praise, anger, blame, or threat. @deva[हे] @deva[देवदत्त] @deva[देवदत्त]! (calling angrily).
"""

standard = """
@deva[वाक्यादि]-@deva[संबोधन] @deva[द्विर्वचन] for @deva[असूया] (envy), @deva[प्रशंसा] (praise), @deva[क्रोध] (anger), @deva[निन्दा] (blame), @deva[भर्त्सना] (threat). The doubled vocative signals emotional intensity of address.
"""

advanced = """
@deva[वाक्य]-@deva[आदि] @deva[संबोधन] receives @deva[द्विर्वचन] when speaker's emotion is: @deva[असूया], @deva[प्रशंसा], @deva[क्रोध], @deva[निन्दा], or @deva[भर्त्सना]. The repeated vocative (@deva[हे] @deva[देवदत्त] @deva[देवदत्त]) signals intensity. @deva[वाक्य] = @deva[एकवाक्यार्थबोधक]-@deva[पदसमूह]; the vocative must be sentence-initial.
"""

id = "8.1.20"
numericId = "81020"

[en]
simple = """
The dual forms of @deva[युष्मद्] 'you' and @deva[अस्मद्] 'I/we' become @deva[वाम्] and @deva[नौ] respectively. @deva[वां] @deva[ददामि], @deva[नौ] @deva[ददाति].
"""

standard = """
@deva[युष्मद्]/@deva[अस्मद्] @deva[द्विवचन] → @deva[वाम्]/@deva[नौ] substitution. @deva[वां] @deva[ददामि] 'I give to you two', @deva[नौ] @deva[ददाति] 'gives to us two'. All three @deva[अधिकार]s apply: @deva[पदस्य], @deva[पदात्], @deva[अनुदात्तं] @deva[सर्वम्].
"""

advanced = """
@deva[द्विवचन]-@deva[आदेश]: @deva[युष्मद्] → @deva[वाम्], @deva[अस्मद्] → @deva[नौ]. These substitute for accusative/dative/genitive dual. @deva[पदपूर्व] and @deva[अनुदात्त] conditions (from @ref[8.1.16]-18) govern when substitution applies. @deva[वां], @deva[नौ] are enclitic forms in connected speech.
"""

id = "8.1.46"
numericId = "81046"

[en]
simple = """
With @deva[एहिमन्ये] used in mockery, the following @deva[लृट्] (future) retains accent. @deva[एहि] @deva[मन्ये] @deva[भोक्ष्यसे] 'come, I suppose you'll eat!' (derisive).
"""

standard = """
@deva[तिङन्त] (@deva[लृट्]) retains accent after @deva[एहिमन्ये] in @deva[प्रहास] (mockery/derision). @deva[एहि] @deva[मन्ये] @deva[भोक्ष्य꣡से।] The @deva[मन्ये] adds ironic/mocking tone; future verb stays accented.
"""

advanced = """
Accent-retention for @deva[लृट्] with @deva[एहि] + @deva[मन्ये] in @deva[प्रहासार्थ] (derision). @deva[प्रहास] = great laughter, mockery. @deva[एहि] @deva[मन्ये] @deva[भोक्ष्यसे] 'come, I think you'll eat!' (sarcastic). @deva[बहुलम्] indicates varied Vedic patterns.
"""

id = "8.1.43"
numericId = "81043"

[en]
simple = """
The verb optionally retains accent with @deva[ननु] when asking permission. @deva[ननु] @deva[गच्छामि] 'may I go?' (accented or not).
"""

standard = """
@deva[तिङन्त] with @deva[ननु] in @deva[अनुज्ञा]-@deva[एषणा] (permission-seeking) → optional accent. @deva[ननु] @deva[गच्छामि] 'may I go?' @deva[विभाषा] allows both accented and unaccented forms.
"""

advanced = """
@deva[विभाषा] for @deva[ननु] in @deva[अनुज्ञार्थ]-@deva[एषणा] (asking permission). @deva[एषणा] = asking; @deva[अनुज्ञा] = permission. @deva[ननु] @deva[गच्छामि], @deva[ननु] @deva[पचामि] show optional accent. The permission-request context creates optionality.
"""

id = "8.1.47"
numericId = "81047"

[en]
simple = """
After @deva[जातु] (if not preceded by another word), the verb optionally retains accent. @deva[जातु] @deva[भोक्ष्यसे] 'ever will you eat?' (accented or not).
"""

standard = """
@deva[तिङन्त] with @deva[अपदपूर्व] @deva[जातु] → optional accent. @deva[जा꣡तु] @deva[भोक्ष्य꣡से] or @deva[जातु] @deva[भो॒क्ष्य॒से॒।] @deva[विभाषा] when @deva[जातु] is sentence-initial.
"""

advanced = """
@deva[विभाषा] for @deva[जातु] when @deva[अपदपूर्व] (no preceding word). @deva[जातु] @deva[भोक्ष्यसे], @deva[जातु] @deva[अध्येष्यसे] allow optional verb accent. When @deva[जातु] is preceded by a @deva[पद], different patterns apply per @ref[8.1.28].
"""

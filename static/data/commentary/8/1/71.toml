id = "8.1.71"
numericId = "81071"

[en]
simple = """
A @deva[गति] becomes unaccented when followed by an accented finite verb. @deva[यत्] @deva[प्रपचति] — @deva[प्र] is unaccented.
"""

standard = """
@deva[गति] + @deva[उदात्त]-@deva[तिङन्त] → @deva[गति] @deva[अनुदात्त]. @deva[यत्] @deva[प्र॒प꣡चति] shows prefix unaccented before accented verb. @deva[यत्] @deva[प्रकरोति] similarly.
"""

advanced = """
@deva[अनुदात्त] for @deva[गति] before @deva[उदात्त]-@deva[तिङन्त]. @deva[यत्] @deva[प्रपचति], @deva[यत्] @deva[प्रकरोति] show gravely-accented prefix before accented verb. When the verb retains accent (per various rules), the preceding @deva[गति] loses its accent.
"""

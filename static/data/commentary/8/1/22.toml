id = "8.1.22"
numericId = "81022"

[en]
simple = """
The singular genitive and dative of @deva[युष्मद्] and @deva[अस्मद्] become @deva[ते] and @deva[मे]. @deva[तव] → @deva[ते], @deva[मम] → @deva[मे].
"""

standard = """
@deva[युष्मद्]/@deva[अस्मद्] @deva[एकवचन] @deva[षष्ठी]/@deva[चतुर्थी] → @deva[ते]/@deva[मे]. @deva[ते] @deva[ददामि] 'I give to you', @deva[मे] @deva[देहि] 'give to me'. These replace @deva[तव]/@deva[तुभ्यम्] and @deva[मम]/@deva[मह्यम्] as enclitics.
"""

advanced = """
@deva[एकवचन] @deva[षष्ठी]/@deva[चतुर्थी] @deva[आदेश]: @deva[युष्मद्] → @deva[ते], @deva[अस्मद्] → @deva[मे]. @deva[ते] replaces @deva[तव] (gen.) and @deva[तुभ्यम्] (dat.); @deva[मे] replaces @deva[मम] (gen.) and @deva[मह्यम्] (dat.). @deva[पदपूर्व] + @deva[अनुदात्त] conditions from @deva[अधिकार]. These are common enclitic forms.
"""

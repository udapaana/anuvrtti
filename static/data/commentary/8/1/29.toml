id = "8.1.29"
numericId = "81029"

[en]
simple = """
Exception: the @deva[लुट्] (periphrastic future) retains its accent even when preceded by a non-verb. @deva[देवदत्तः] @deva[कर्ता] (accented).
"""

standard = """
@deva[लुट्] (second future with @deva[तासि]) → no @deva[अनुदात्त]. @deva[देवदत्तः] @deva[कर्ता] retains accent despite being verb after non-verb. This restricts @ref[8.1.28]'s scope.
"""

advanced = """
Exception to @ref[8.1.28]: @deva[लुट्] (@deva[तासि]-future) retains accent after @deva[अ]-@deva[तिङन्त]. @deva[देवदत्तः] @deva[कर्ता] 'Devadatta will do' shows @deva[कर्ता] accented. The periphrastic future's nominal character may explain this exception—it behaves more like a noun phrase.
"""

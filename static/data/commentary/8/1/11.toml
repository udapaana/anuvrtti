id = "8.1.11"
numericId = "81011"

[en]
simple = """
In the following rules, doubled words are treated like @deva[कर्मधारय] compounds. This enables case-elision and masculine treatment.
"""

standard = """
@deva[अधिकार]: following @deva[द्विरुक्त] forms = @deva[कर्मधारय]-@deva[वत्]. @deva[कर्मधारय] treatment means: @deva[सुप्]-@deva[लुक्] (case elision by @ref[2.4.71]), @deva[पुंवत्] (masculine-like for first member), @deva[उत्तरपद]-accent.
"""

advanced = """
@deva[कर्मधारयवत्] @deva[अधिकार] for subsequent doubled forms. Effects: (1) @deva[सुप्]-@deva[लुक्] per @ref[2.4.71], (2) @deva[पुंवद्भाव] for @deva[पूर्वपद], (3) @deva[उत्तरपद]-@deva[प्रकृतिस्वरत्व]. This grammatical treatment applies to 8.1.12ff, enabling compounds from repeated words.
"""

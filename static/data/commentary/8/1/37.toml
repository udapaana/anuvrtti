id = "8.1.37"
numericId = "81037"

[en]
simple = """
Exception: when @deva[यावत्]/@deva[यथा] immediately precede the verb and denote praise, the verb loses accent. @deva[यावत्] @deva[पचति] (unaccented, praising).
"""

standard = """
@deva[यावत्]/@deva[यथा] + verb (immediate, @deva[स्तुति] sense) → verb @deva[अनुदात्त]. @deva[यावत्] @deva[प॒च॒ति॒], @deva[यथा] @deva[प॒च॒ति॒] 'how well he cooks!' The praise context removes accent.
"""

advanced = """
Exception to @ref[8.1.36]: @deva[स्तुत्यर्थ] (praise) + @deva[साक्षात्] (immediate) @deva[यावत्]/@deva[यथा] → @deva[तिङन्त] @deva[अनुदात्त]. @deva[यावत्] @deva[प॒च॒ति॒] 'how excellently he cooks!' The @deva[स्तुति] (laudatory) meaning conditions accent loss despite the particles.
"""

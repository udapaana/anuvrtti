id = "8.1.10"
numericId = "81010"

[en]
simple = """
A word is doubled and treated like @deva[बहुव्रीहि] when expressing mental distress. @deva[गतगतः] 'gone, gone—alas!'
"""

standard = """
@deva[मनोविकार] (mental distress/affliction) triggers @deva[द्विर्वचन] + @deva[बहुव्रीहि]-@deva[वत्]. @deva[गत꣡गतः] 'gone, gone to my sorrow', @deva[नष्टनष्टः] 'lost, lost alas'. The doubling with @[bahuvrīhi] treatment expresses lamentation.
"""

advanced = """
@deva[अनुशय] (remorse/distress) over an event → @deva[द्विर्वचन] + @deva[बहुव्रीहिवत्]. @deva[गतगतः], @deva[नष्टनष्टः], @deva[मृतमृतः] express @deva[अनुतापात्मक] repetition. The @deva[बहुव्रीहि] treatment (@deva[सुप्]-@deva[लुक्], @deva[पुंवत्]) applies. The accent mark (@deva[꣡]) may indicate special intonation.
"""

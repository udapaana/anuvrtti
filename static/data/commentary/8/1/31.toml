id = "8.1.31"
numericId = "81031"

[en]
simple = """
The finite verb retains accent when connected with @deva[नह] used for forbidding. @deva[नहि] @deva[पचति] 'indeed he does cook!' (rejecting a denial).
"""

standard = """
@deva[तिङन्त] retains accent with @deva[नह] in @deva[प्रतिषेध] (forbidding/rejection). When someone denies, and another insists: @deva[नहि] @deva[पचति] 'he certainly does cook!' The verb stays accented.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with @deva[नह] in @deva[प्रतिषेध]-@deva[अर्थ]. Context: A urges, B rejects insultingly, A responds with @deva[नह] + accented verb. @deva[नहि] @deva[पचति], @deva[नहि] @deva[गच्छति] show the insistent assertion pattern with maintained accent.
"""

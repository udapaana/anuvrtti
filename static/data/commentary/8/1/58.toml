id = "8.1.58"
numericId = "81058"

[en]
simple = """
A verb not preceded by @deva[गति] retains accent before @deva[च], @deva[वा], @deva[ह], @deva[अह], @deva[एव]. @deva[पचति] @deva[च], @deva[पचति] @deva[वा] (accented).
"""

standard = """
@deva[अगति]-@deva[पूर्व] @deva[तिङन्त] retains accent before @deva[च]/@deva[वा]/@deva[ह]/@deva[अह]/@deva[एव]. @deva[पचति꣡] @deva[च], @deva[पचति꣡] @deva[वा।] These particles (from @ref[8.1.24]) preserve accent on non-@deva[गति]-preceded verbs.
"""

advanced = """
Accent-retention for @deva[अगतिपूर्व]-@deva[तिङन्त] before @deva[च]/@deva[वा]/@deva[ह]/@deva[अह]/@deva[एव] (the @deva[चवाहाहैव] group of @ref[8.1.24]). @deva[पचति] @deva[च], @deva[पचति] @deva[वा], @deva[पचति] @deva[ह], @deva[पचति] @deva[एव] show accented verbs. The particles don't cause @deva[अनुदात्त] when no @deva[गति] precedes.
"""

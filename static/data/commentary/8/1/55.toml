id = "8.1.55"
numericId = "81055"

[en]
simple = """
After @deva[आम्] (separated by at most one word), the vocative retains accent when the addressee is not near. @deva[आम्] @deva[पचसि] @deva[देवदत्त] (@deva[देवदत्त] accented).
"""

standard = """
@deva[आम्] + (max 1 word) + @deva[आमन्त्रित] → accent retained for @deva[असन्निहित] (not near). @deva[आम्] @deva[पचसि] @deva[देव꣡दत्त꣡३] 'yes, you cook, O Devadatta!' (distant address).
"""

advanced = """
Accent-retention for @deva[आमन्त्रित] after @deva[आम्] with @deva[एकपद]-@deva[व्यवधान] (max one word between) when @deva[असन्निहित] (addressee not present). @deva[आम्] @deva[पचसि] @deva[देवदत्त]³ shows vocative accented. The @deva[३] indicates @deva[प्लुति] (prolongation) for calling afar.
"""

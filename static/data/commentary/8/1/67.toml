id = "8.1.67"
numericId = "81067"

[en]
simple = """
After praise-words of the @deva[काष्ठादि] class, the praised word becomes unaccented. @deva[सुकाष्ठम्] (the @deva[काष्ठ] is unaccented as praised object).
"""

standard = """
@deva[काष्ठादि]-@deva[स्तुति]-@deva[पद] + @deva[स्तुत्य] → @deva[स्तुत्य] @deva[अनुदात्त]. In compounds where first member praises, the praised second member loses accent. @deva[सुकाष्ठम्] shows unaccented @deva[काष्ठ].
"""

advanced = """
@deva[अनुदात्त] for @deva[स्तुत्य] (praised element) after @deva[काष्ठादि] @deva[स्तुति]-@deva[पूर्वपद]. @deva[काष्ठादि] is a @deva[गण] of praise-expressing compound first-members. The praised element (@deva[उत्तरपद]) becomes gravely accented, marking it as the object of praise.
"""

id = "8.1.72"
numericId = "81072"

[en]
simple = """
A preceding @deva[सम्बोधन] (vocative) is treated as non-existent for accent and pronoun-enclitic purposes. @deva[हे] @deva[देवदत्त] @deva[पचसि] @deva[ते] — @deva[ते] allowed despite vocative.
"""

standard = """
@deva[आमन्त्रित] (vocative) = @deva[असत्]-@deva[वत्] (as if absent) for @deva[स्वर] and @deva[युष्मद्]/@deva[अस्मद्]-@deva[आदेश]. The vocative doesn't count as a 'preceding word' for these rules. @deva[पदपूर्व] conditions ignore vocatives.
"""

advanced = """
@deva[असत्त्व] (non-existence treatment) for preceding @deva[आमन्त्रित] regarding @deva[स्वर] (accent) and @deva[सर्वनाम]-@deva[आदेश] (pronoun substitutions). @deva[हे] @deva[देवदत्त] @deva[पचसि] @deva[ते] — the @deva[ते]-substitution applies as if @deva[हे] @deva[देवदत्त] weren't there. Vocatives don't trigger @deva[पदपूर्व] conditions.
"""

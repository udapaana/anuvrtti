id = "8.1.42"
numericId = "81042"

[en]
simple = """
The verb optionally retains accent with @deva[पुरा] when meaning 'haste/before'. @deva[पुरा] @deva[पचति] (accented or not) 'cook quickly!'
"""

standard = """
@deva[तिङन्त] with @deva[पुरा] in @deva[परीप्सा] (haste/urgency) → optional accent. @deva[पुरा] @deva[पचति] 'cook before/quickly!' @deva[विभाषा] allows accented or unaccented verb.
"""

advanced = """
@deva[विभाषा] for @deva[पुरा] in @deva[परीप्सा]-@deva[अर्थ] (@deva[त्वरा] 'haste'). @deva[पुरा] = 'before/quickly'. @deva[पुरा] @deva[पचति], @deva[पुरा] @deva[गच्छति] may have accented or unaccented verb. The urgency/temporal-priority meaning conditions optionality.
"""

id = "8.1.6"
numericId = "81006"

[en]
simple = """
The prefixes @deva[प्र], @deva[सम्], @deva[उ], and @deva[उत्] are doubled to complete a poetic foot (@deva[पाद]). @deva[प्र] @deva[प्रायमग्निभरतस्य]... (@[ṛg] VII.8.4).
"""

standard = """
@deva[प्र]/@deva[सम्]/@deva[उ]/@deva[उत्] @deva[द्विर्वचन] for @deva[छन्दोबल] (metrical completion). @deva[प्र] @deva[प्रायमग्निभरतस्य] @deva[शृण्वे] (@[ṛg] VII.8.4), @deva[सं] @deva[समिद्भिरजते] (@[ṛg] IV.6.3). Doubling fills out the verse meter.
"""

advanced = """
@deva[पादपूरण] (foot-completion) triggers @deva[द्विर्वचन] of @deva[प्र]/@deva[सम्]/@deva[उ]/@deva[उत्]. @deva[प्र] @deva[प्रायम्]°, @deva[सं] @deva[समिद्भिर्]° show Vedic usage. The doubling is metrical—these prefixes repeat when the verse needs additional syllables. This is @deva[छान्दस] (Vedic) usage.
"""

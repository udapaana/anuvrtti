id = "8.1.50"
numericId = "81050"

[en]
simple = """
When @deva[आहो]/@deva[उताहो] don't immediately precede the verb, accent is optional. @deva[आहो] @deva[देवदत्तः] @deva[पचति] (accented or not).
"""

standard = """
@deva[आहो]/@deva[उताहो] + intervening word + verb → optional accent. @deva[आहो] @deva[देवदत्तः] @deva[प꣡चति] or @deva[प॒च॒ति॒।] @deva[विभाषा] when not immediately preceding.
"""

advanced = """
@deva[विभाषा] when @deva[आहो]/@deva[उताहो] are @deva[असाक्षात्] (non-immediate). @deva[आहो] @deva[देवदत्तः] @deva[पचति] allows both accented and unaccented verb. Contrast @ref[8.1.49] (immediate = obligatory accent retention).
"""

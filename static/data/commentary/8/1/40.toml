id = "8.1.40"
numericId = "81040"

[en]
simple = """
The verb retains accent with @deva[अहो] when meaning praise. @deva[अहो] @deva[देवदत्तः] @deva[पचति] @deva[शोभनं] 'oh, Devadatta cooks beautifully!'
"""

standard = """
@deva[तिङन्त] retains accent with @deva[अहो] in @deva[स्तुति]. @deva[अहो] @deva[देवदत्तः] @deva[प꣡चति] @deva[शोभनं], @deva[अहो] @deva[विष्णुमित्रः] @deva[करो꣡ति।] The exclamatory @deva[अहो] with praise preserves accent.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with @deva[अहो] in @deva[स्तुत्यर्थ]. @deva[अहो] @deva[देवदत्तः] @deva[पचति] @deva[शोभनं], @deva[अहो] @deva[विष्णुमित्रः] @deva[करोति] show accented verbs. The admiration context (@deva[अहो] + praise) maintains verb accent distinctively.
"""

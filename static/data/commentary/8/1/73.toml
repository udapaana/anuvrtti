id = "8.1.73"
numericId = "81073"

[en]
simple = """
Exception: a preceding @deva[सम्बोधन] (vocative) with general meaning is not treated as non-existent for a following specific vocative in apposition. @deva[हे] @deva[ब्राह्मणा] @deva[देवदत्त] — both vocatives apply normally.
"""

standard = """
@deva[सामान्य]-@deva[आमन्त्रित] + @deva[विशेष]-@deva[आमन्त्रित] (apposition) → first vocative not @deva[असत्]-@deva[वत्]. @deva[हे] @deva[ब्राह्मणाः] @deva[देवदत्त] 'O Brahmins, Devadatta!' — the general vocative affects the specific one.
"""

advanced = """
Exception to @ref[8.1.72]: @deva[सामान्य]-@deva[वाचक] @deva[आमन्त्रित] retains @deva[सत्त्व] (existence-treatment) for following @deva[समानाधिकरण] (appositional) @deva[आमन्त्रित]. @deva[हे] @deva[ब्राह्मणाः] @deva[देवदत्त] shows general-term vocative not ignored for specific @deva[सम्बोधन] (vocative). The apposition creates a connected address.
"""

id = "8.1.63"
numericId = "81063"

[en]
simple = """
When @deva[च], @deva[वा], @deva[ह], @deva[अह], or @deva[एव] are elided, the first verb optionally retains accent. @deva[पचति] (accented or not, from @deva[पचति] @deva[च] with @deva[लोप]).
"""

standard = """
@deva[चवाहाहैव] @deva[लोप] → optional first-verb accent. @deva[पचति꣡] or @deva[प॒च॒ति॒] (when underlying @deva[च] is elided). @deva[विभाषा] applies to elided-conjunction contexts.
"""

advanced = """
@deva[विभाषा] for first-@deva[तिङन्त] when @deva[चवाहाहैव] (@ref[8.1.24] group) undergoes @deva[लोप]. @deva[पचति] (from @deva[पचति] @deva[च]), @deva[गच्छति] (from @deva[गच्छति] @deva[वा]) allow optional accent. The underlying conjunction's elision creates optionality.
"""

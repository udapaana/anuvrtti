id = "8.1.54"
numericId = "81054"

[en]
simple = """
A prefixed non-first-person imperative may optionally retain accent with @deva[हन्त]. @deva[हन्त] @deva[प्रपच] (accented or not).
"""

standard = """
@deva[हन्त] + @deva[उपसर्गयुक्त] @deva[लोट्] (@deva[अ]-@deva[प्रथमपुरुष]) → optional accent. @deva[हन्त] @deva[प्र꣡पच] or @deva[प्र॒प॒च॒।] Different from @deva[गत्यर्थ]-@deva[लोट्] context.
"""

advanced = """
@deva[विभाषा] for @deva[उपसर्गयुक्त] @deva[अप्रथमपुरुष]-@deva[लोट्] with @deva[हन्त]. This extends optionality beyond @deva[गत्यर्थ]-@deva[लोट्] contexts (@ref[8.1.51]-53). @deva[हन्त] @deva[प्रपच], @deva[हन्त] @deva[प्रगच्छ] allow optional accent.
"""

id = "8.1.28"
numericId = "81028"

[en]
simple = """
A finite verb becomes unaccented when preceded by a non-verb word. @deva[देवदत्तः] @deva[पचति] — @deva[पचति] loses accent.
"""

standard = """
@deva[तिङन्त] → @deva[अनुदात्त] when preceded by @deva[अ]-@deva[तिङन्त] @deva[पद]. @deva[देवदत्तः] @deva[प॒च॒ति॒] shows the verb gravely accented. This is fundamental to Vedic/Sanskrit prosody.
"""

advanced = """
@deva[तिङन्त] receives @deva[सर्वानुदात्त] when @deva[पदपूर्व] is @deva[अ]-@deva[तिङन्त]. @deva[देवदत्तः] @deva[प॒च॒ति॒] demonstrates. This rule shapes Vedic sentence prosody: verbs lose accent after subjects/objects. Only initial verbs or verb+verb sequences retain accent.
"""

id = "8.1.69"
numericId = "81069"

[en]
simple = """
A verb with its @deva[गति] becomes unaccented when followed by a noun denoting the action's fault (except @deva[गोत्रादि]). @deva[दुष्पचति] @deva[कुण्डम्] (unaccented, faulty cooking).
"""

standard = """
@deva[तिङन्त] + @deva[गति] → @deva[अनुदात्त] when followed by @deva[दोष]-@deva[वाचक] (fault-denoting) noun, excluding @deva[गोत्रादि]. The verb loses accent when the following noun criticizes the action.
"""

advanced = """
@deva[अनुदात्त] for @deva[सगति]-@deva[तिङन्त] when followed by @deva[क्रिया]-@deva[दोष]-@deva[वाचक]-@deva[सुबन्त] (fault-naming noun), excepting @deva[गोत्रादि]. @deva[दुष्पचति] @deva[कुण्डम्] 'cooks the pot badly' shows unaccented verb. The criticism-noun conditions accent loss.
"""

id = "8.1.3"
numericId = "81003"

[en]
simple = """
The @deva[अम्रेडित] (repeated word) receives grave accent (@deva[अनुदात्त]). @deva[भुङ्क्ते] @deva[भुङ्क्ते] — the second is gravely accented.
"""

standard = """
@deva[अम्रेडित] → @deva[अनुदात्त] (grave accent). @deva[भुङ्क्ते] @deva[भु॒ङ्क्ते॒] shows the second word's vowels all become @deva[अनुदात्त]. @deva[पशून्] @deva[प॒शू॒न्] similarly. This distinguishes repeated from original.
"""

advanced = """
@deva[अनुदात्तत्व] for @deva[अम्रेडित]: all vowels become @deva[अनुदात्त]. @deva[भुङ्क्ते] @deva[भु॒ङ्क्ते॒], @deva[पशून्] @deva[प॒शू॒न्] demonstrate. This accent rule creates the characteristic prosody of doubled expressions. The original retains its accent; the @deva[अम्रेडित] takes grave throughout.
"""

id = "8.1.36"
numericId = "81036"

[en]
simple = """
The finite verb retains accent with @deva[यावत्] and @deva[यथा]. @deva[यावद्] @deva[भुङ्क्ते], @deva[यथा] @deva[भुङ्क्ते] — verb accented.
"""

standard = """
@deva[तिङन्त] retains accent with @deva[यावत्]/@deva[यथा]. @deva[यावद्] @deva[भुङ्क्ते꣡], @deva[यथा] @deva[भुङ्क्ते꣡], @deva[यावदधीते꣡], @deva[यथाधीते꣡।] These correlative/comparative particles preserve verb accent.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with @deva[यावत्] (as long as/until) and @deva[यथा] (as/like). @deva[यावद्] @deva[भुङ्क्ते꣡], @deva[यथा] @deva[भुङ्क्ते꣡] show accented verbs. These particles create correlative constructions where verb accent is maintained.
"""

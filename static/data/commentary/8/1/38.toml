id = "8.1.38"
numericId = "81038"

[en]
simple = """
The verb also loses accent when @deva[यावत्]/@deva[यथा] precede through an intervening prefix (@deva[उपसर्ग]) in praise context. @deva[यावत्] @deva[प्रपचति] (unaccented).
"""

standard = """
@deva[यावत्]/@deva[यथा] + @deva[उपसर्ग] + verb (@deva[स्तुति]) → verb @deva[अनुदात्त]. @deva[यावत्] @deva[प्रप॒च॒ति॒], @deva[यथा] @deva[प्रप॒च॒ति॒।] The @deva[उपसर्ग] doesn't block accent loss in praise context.
"""

advanced = """
Extension of @ref[8.1.37]: @deva[उपसर्ग]-@deva[व्यवधान] (prefix intervention) doesn't block @deva[अनुदात्त] when @deva[स्तुत्यर्थ]. @deva[यावत्] @deva[प्रपचति], @deva[यथा] @deva[प्रगच्छति] show unaccented verbs despite prefix. The praise meaning governs regardless of prefix presence.
"""

id = "8.1.44"
numericId = "81044"

[en]
simple = """
The verb optionally retains accent with @deva[किम्] when asking about an action, if no prefix or negation precedes. @deva[किं] @deva[पचसि]? (accented or not).
"""

standard = """
@deva[तिङन्त] with @deva[किम्] in @deva[क्रियाप्रश्न] (action-question) → optional accent, when @deva[अनुपसर्ग] and @deva[अप्रतिषेध]. @deva[किं] @deva[पचसि] 'are you cooking?' @deva[विभाषा].
"""

advanced = """
@deva[विभाषा] for @deva[किम्] in @deva[क्रियाप्रश्न] when: (1) @deva[अनुपसर्ग] (no prefix on verb), (2) @deva[अप्रतिषेध] (no negation). @deva[किं] @deva[पचसि], @deva[किं] @deva[गच्छसि] allow optional accent. With prefix (@deva[किं] @deva[प्रपचसि]) or negation (@deva[किं] @deva[न] @deva[पचसि]), different rules apply.
"""

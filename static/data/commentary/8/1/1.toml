[en]
simple = """
This is a heading rule: from here through @ref[8.1.15], 'the whole word is repeated' applies. This governs doubling/repetition rules.
"""

standard = """
@deva[अधिकार]: @deva[सर्वस्य] @deva[द्वे] (whole word repeated) extends through @deva[यथास्वे] @deva[यथायथम्] (@ref[8.1.15]). The following @[sūtras] define when and how words are doubled for various semantic effects.
"""

advanced = """
This @deva[अधिकार] establishes the domain for @deva[द्विर्वचन] (doubling) rules. @deva[सर्वस्य] @deva[द्वे] means complete word repetition. The section covers @deva[अम्रेडित] (@ref[8.1.2]-3), distributive/intensive repetition (8.1.4ff), and compound-like doubled forms. Scope: @ref[8.1.1]-15.
"""

[en]
simple = """
This is a heading rule: from here through @ref[8.3.54], 'of/to a word' (@deva[पदस्य]) applies to all following rules.
"""

standard = """
@deva[अधिकार]: @deva[पदस्य] extends through @deva[इडाया] @deva[वा] (@ref[8.3.54]). All subsequent rules operate on @deva[पद] (word) level. This establishes the domain for word-level phonological operations.
"""

advanced = """
@deva[पदस्य] @deva[अधिकार]: scope through @ref[8.3.54]. '@deva[पद]' as defined in @ref[1.4.14]-17 (@deva[सुप्तिङन्तम्]). All rules in this section apply to complete @deva[पद] units. This is the broadest @deva[अधिकार] of the @[tripādi], governing accent, @deva[संधि], and consonant changes at word boundaries.
"""

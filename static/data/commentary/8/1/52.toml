id = "8.1.52"
numericId = "81052"

[en]
simple = """
An imperative following a motion-verb imperative retains accent when subject/object overlap. @deva[आगच्छ] @deva[पच] 'come and cook!' (@deva[पच] accented).
"""

standard = """
@deva[गत्यर्थ] @deva[लोट्] + @deva[लोट्] → second @deva[लोट्] accented when @deva[अनन्य]-@deva[कारक]. @deva[आगच्छ] @deva[प꣡च], @deva[एहि] @deva[गृहा꣡ण।] Sequential imperatives with shared participant.
"""

advanced = """
Accent-retention for @deva[लोट्] after @deva[गत्यर्थ] @deva[लोट्] when @deva[अनन्य]-@deva[कारक]. @deva[आगच्छ] @deva[पच], @deva[एहि] @deva[गृहाण] show accented second imperatives. The motion + action sequence with same agent maintains accent on the action verb.
"""

id = "8.1.24"
numericId = "81024"

[en]
simple = """
The pronoun substitutions (@deva[ते], @deva[मे], etc.) don't apply when @deva[च], @deva[वा], @deva[ह], @deva[अह], or @deva[एव] follows the pronoun. @deva[ग्रामस्तव] @deva[च] (not *@deva[ग्रामस्ते] @deva[च]).
"""

standard = """
No @deva[आदेश] when @deva[सर्वनाम] followed by @deva[च]/@deva[वा]/@deva[ह]/@deva[अह]/@deva[एव]. @deva[ग्रामस्तव] @deva[च] 'and of your village' (not *@deva[तेच]). These particles block the enclitic substitution.
"""

advanced = """
Exception to @ref[8.1.20]-23: pronoun substitutions blocked when @deva[च] (and), @deva[वा] (or), @deva[ह] (oh!), @deva[अह] (wonderful), @deva[एव] (only) follow. @deva[ग्रामस्तव] @deva[च], @deva[तव] @deva[वा] demonstrate. The particles' presence maintains full pronoun forms.
"""

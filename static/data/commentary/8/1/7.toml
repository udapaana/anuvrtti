id = "8.1.7"
numericId = "81007"

[en]
simple = """
@deva[उपरि] 'above', @deva[अधि] 'over', and @deva[अधस्] 'below' are doubled when expressing continuous nearness. @deva[उपर्युपरि] @deva[दुःखम्] 'sorrow upon sorrow'.
"""

standard = """
@deva[उपरि]/@deva[अधि]/@deva[अधस्] @deva[द्विर्वचन] for @deva[अव्यवहित] @deva[सामीप्य] (uninterrupted proximity). @deva[उपर्युपरि] @deva[दुःखम्] 'sorrow heaped upon sorrow', @deva[अध्यधि], @deva[अधोऽधः।] The doubling intensifies the spatial/temporal nearness.
"""

advanced = """
@deva[सामीप्य] (proximity) in time or space triggers @deva[द्विर्वचन] for @deva[उपरि]/@deva[अधि]/@deva[अधस्]. @deva[उपर्युपरि], @deva[अध्यधि], @deva[अधोऽधः] express intensive/cumulative nearness. The repetition creates compounds meaning 'one upon another' or 'continuously above/below'.
"""

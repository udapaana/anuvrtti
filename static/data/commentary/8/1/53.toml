id = "8.1.53"
numericId = "81053"

[en]
simple = """
A prefixed non-first-person imperative after a motion-verb imperative optionally retains accent. @deva[आगच्छ] @deva[प्रपच] (accented or not).
"""

standard = """
@deva[गत्यर्थ] @deva[लोट्] + @deva[उपसर्गयुक्त] @deva[लोट्] (@deva[अ]-@deva[प्रथमपुरुष]) → optional accent when @deva[अनन्य]-@deva[कारक]. @deva[आगच्छ] @deva[प्र꣡पच] or @deva[प्र॒प॒च॒।] @deva[विभाषा].
"""

advanced = """
@deva[विभाषा] for @deva[उपसर्गयुक्त] @deva[अप्रथमपुरुष]-@deva[लोट्] after @deva[गत्यर्थ] @deva[लोट्] when @deva[अनन्य]-@deva[कारक]. The prefix + non-1st-person conditions create optionality. @deva[आगच्छ] @deva[प्रपच] allows both accent patterns.
"""

id = "8.1.27"
numericId = "81027"

[en]
simple = """
Words like @deva[गोत्र] become unaccented after a finite verb when expressing contempt or repetition. @deva[पचति] @deva[गोत्रम्] (contemptuous).
"""

standard = """
@deva[गोत्रादि] → @deva[अनुदात्त] after @deva[तिङन्त] for @deva[अवज्ञा] (contempt) or @deva[पुनरुक्त] (repetition). @deva[पचति] @deva[गो॒त्र॒म्], @deva[जल्पति] @deva[गो॒त्र॒म्] show grave accent expressing disdain or redundancy.
"""

advanced = """
@deva[गोत्रादि] receive @deva[सर्वानुदात्त] after @deva[तिङन्त] when: (1) @deva[अवज्ञा] (contempt/disdain), or (2) @deva[पुनरुक्त] (repetitive mention). @deva[पचति] @deva[गो॒त्र॒म्] shows grave accent. The accent pattern signals speaker's dismissive attitude or marks information as already known.
"""

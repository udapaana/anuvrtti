id = "8.1.62"
numericId = "81062"

[en]
simple = """
When @deva[च] or @deva[अह] is elided and @deva[एव] (with limiting force) replaces them, the first verb still retains accent. @deva[पचत्येव] (accented, from @deva[पचति] @deva[च] with @deva[लोप]).
"""

standard = """
@deva[च]/@deva[अह] @deva[लोप] + @deva[एव] (@deva[अवधारण]) → first @deva[तिङन्त] accented. @deva[पचत्ये꣡व], @deva[गच्छत्ये꣡व] show accent when @deva[एव] replaces elided conjunctions with limiting force.
"""

advanced = """
Accent-retention when @deva[च]/@deva[अह] undergo @deva[लोप] and @deva[एव] (@deva[अवधारण] = limitation) takes their place. The @deva[लोप] occurs in specific contexts; @deva[एव] then carries limiting/exclusive meaning. @deva[पचत्येव], @deva[गच्छत्येव] maintain first-verb accent despite conjunction elision.
"""

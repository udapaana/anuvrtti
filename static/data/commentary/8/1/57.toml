id = "8.1.57"
numericId = "81057"

[en]
simple = """
A verb not preceded by @deva[गति] (per @ref[1.4.60]) retains accent before @deva[चन], @deva[चिद्], @deva[इव], and @deva[गोत्रादि]. @deva[पचति] @deva[चन], @deva[पचति] @deva[चित्] (accented).
"""

standard = """
@deva[अगति]-@deva[पूर्व] @deva[तिङन्त] retains accent before @deva[चन]/@deva[चिद्]/@deva[इव]/@deva[गोत्रादि]. @deva[पचति꣡] @deva[चन], @deva[पचति꣡] @deva[चित्], @deva[पचति꣡] @deva[इव।] No @deva[गति]-prefix on verb.
"""

advanced = """
Accent-retention for @deva[अगतिपूर्व]-@deva[तिङन्त] before @deva[चन], @deva[चिद्], @deva[इव], @deva[गोत्रादि]. @deva[गति] = @deva[उपसर्ग] + @deva[कर्मप्रवचनीय] per @ref[1.4.60]. @deva[पचति] @deva[चन], @deva[पचति] @deva[चिद्], @deva[पचति] @deva[इव], @deva[पचति] @deva[गोत्रम्] show accented verbs when no @deva[गति] precedes.
"""

id = "8.1.65"
numericId = "81065"

[en]
simple = """
In Vedic, with @deva[एक] and @deva[अन्य] (meaning 'one...the other'), the first verb optionally retains accent.
"""

standard = """
Vedic: @deva[एक]/@deva[अन्य] (correlative 'one...other') → optional first-verb accent. @deva[एक] @deva[पचति꣡] @deva[अन्य] @deva[पठति] or @deva[एक] @deva[प॒च॒ति॒।] @deva[विभाषा] for this contrastive pattern.
"""

advanced = """
@deva[छान्दस] @deva[विभाषा] for first @deva[तिङन्त] with @deva[एक]...@deva[अन्य] (@deva[समानार्थ] correlative). When @deva[एक] and @deva[अन्य] contrast ('one does X, another does Y'), first verb optionally retains accent. This correlative construction has Vedic optionality.
"""

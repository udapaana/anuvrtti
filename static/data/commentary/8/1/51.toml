id = "8.1.51"
numericId = "81051"

[en]
simple = """
The @deva[लृट्] (future) retains accent after an imperative of a motion verb when subject/object overlap. @deva[आगच्छ] @deva[भोक्ष्यसे] 'come, you will eat!' (accented).
"""

standard = """
@deva[गत्यर्थ] @deva[लोट्] + @deva[लृट्] → @deva[लृट्] accented when @deva[कारक] (subject/object) not wholly different. @deva[आगच्छ] @deva[भोक्ष्य꣡से] 'come and eat'. Same agent for both verbs.
"""

advanced = """
Accent-retention for @deva[लृट्] after @deva[गत्यर्थ] @deva[लोट्] when @deva[अनन्य]-@deva[कारक] (shared participant). @deva[आगच्छ] @deva[भोक्ष्यसे], @deva[एहि] @deva[पठिष्यसि] show accented futures. The motion imperative + future sequence with same subject preserves accent.
"""

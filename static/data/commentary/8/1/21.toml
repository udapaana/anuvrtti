id = "8.1.21"
numericId = "81021"

[en]
simple = """
The plural genitive, dative, and accusative of @deva[युष्मद्] and @deva[अस्मद्] become @deva[वस्] and @deva[नस्]. @deva[वो] @deva[ददामि], @deva[नः] @deva[पश्य].
"""

standard = """
@deva[युष्मद्]/@deva[अस्मद्] @deva[बहुवचन] (gen./dat./acc.) → @deva[वस्]/@deva[नस्]. @deva[वो] @deva[ददामि] 'I give to you all', @deva[नो] @deva[ददाति] 'gives to us', @deva[नः] @deva[पश्य] 'see us'. @deva[पदपूर्व] + @deva[अनुदात्त] required.
"""

advanced = """
@deva[बहुवचन]-@deva[आदेश] for @deva[षष्ठी]/@deva[चतुर्थी]/@deva[द्वितीया]: @deva[युष्मद्] → @deva[वस्], @deva[अस्मद्] → @deva[नस्]. Conditions: @deva[पदपूर्व] (word-preceded), @deva[अनुदात्त] (non-initial). @deva[वस्]/@deva[नस्] are enclitic plural forms replacing fuller @deva[युष्माकम्]/@deva[अस्माकम्], @deva[युष्मभ्यम्]/@deva[अस्मभ्यम्], @deva[युष्मान्]/@deva[अस्मान्].
"""

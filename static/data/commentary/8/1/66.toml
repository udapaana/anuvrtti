id = "8.1.66"
numericId = "81066"

[en]
simple = """
With @deva[यद्] in all its forms, the verb always retains accent. @deva[यद्] @deva[पचति], @deva[यस्मात्] @deva[गच्छति] (verbs accented).
"""

standard = """
@deva[यद्]-@deva[सर्वविभक्ति] → @deva[तिङन्त] always accented. @deva[यद्] @deva[पचति꣡], @deva[यस्मात्] @deva[गच्छति꣡], @deva[यत्र] @deva[तिष्ठति꣡।] All case-forms of @deva[यद्] preserve verb accent.
"""

advanced = """
@deva[नित्य] accent-retention for @deva[तिङन्त] with @deva[यद्]-@deva[सर्वविभक्ति] (all cases of @deva[यद्]). This ends the @deva[प्रथमा] and @deva[छन्दसि] conditions of preceding @[sūtras]. @deva[यद्] @deva[पचति], @deva[यस्य] @deva[गच्छति], @deva[यस्मात्] @deva[तिष्ठति] show universally accented verbs with relative pronoun.
"""

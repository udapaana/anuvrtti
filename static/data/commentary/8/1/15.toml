[en]
simple = """
The word @deva[द्वन्द्वम्] is irregularly formed when meaning 'secret', 'limit', 'separation', 'sacrificial vessel use', or 'manifestation'.
"""

standard = """
@deva[द्वन्द्वम्] = @deva[निपातन] in specific meanings: @deva[रहस्य] (secret), @deva[मर्यादा] (limit), @deva[विभाग] (separation), @deva[पात्रप्रयोग] (vessel use), @deva[आविर्भाव] (manifestation). The doubled form is irregular.
"""

advanced = """
@deva[निपातन] for @deva[द्वन्द्वम्] in five semantic contexts: @deva[रहस्य], @deva[मर्यादा], @deva[विभाग], @deva[पात्रप्रयोग], @deva[आविर्भाव]. @deva[द्वन्द्व] normally means 'pair/copulative compound'; these specialized meanings require irregular @deva[द्वन्द्वम्] formation. The form is listed, not rule-derived.
"""

[en]
simple = """
With @deva[अहो] in non-praise contexts, the verb optionally retains accent. @deva[अहो] @deva[पचति] (accented or not).
"""

standard = """
@deva[तिङन्त] with @deva[अहो] in @deva[शेष] (remaining/non-praise) meanings → optional accent. @deva[विभाषा]: @deva[अहो] @deva[पचति] accented or unaccented. Non-laudatory @deva[अहो] allows both patterns.
"""

advanced = """
@deva[विभाषा] for @deva[अहो] in @deva[अ]-@deva[स्तुत्यर्थ] (@deva[शेष]). 'Remaining' includes surprise, dismay, etc.—non-praise uses of @deva[अहो]. Verb accent optional: @deva[अहो] @deva[पचति] (accented) or @deva[अहो] @deva[प॒च॒ति॒] (unaccented) both valid.
"""

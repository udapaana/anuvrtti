id = "8.1.30"
numericId = "81030"

[en]
simple = """
The finite verb retains accent when connected with particles: @deva[यत्], @deva[यदि], @deva[हन्त], @deva[कुवित्], @deva[नेत्], etc. @deva[यत्पचति] (accented).
"""

standard = """
@deva[तिङन्त] retains accent with @deva[यत्]/@deva[यदि]/@deva[हन्त]/@deva[कुवित्]/@deva[नेत्]/etc. These particles form a construction where the verb keeps its accent. @deva[यत्] @deva[पचति], @deva[यदि] @deva[गच्छति] show accented verbs.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with specific particles: @deva[यत्] (that/because), @deva[यदि] (if), @deva[हन्त] (also/oh), @deva[कुवित्] (well), @deva[नेत्] (lest), @deva[चेत्] (if), etc. These create constructions where @ref[8.1.28]'s @deva[अनुदात्त] is blocked. The particles semantically subordinate or mark the verb specially.
"""

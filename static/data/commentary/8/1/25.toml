id = "8.1.25"
numericId = "81025"

[en]
simple = """
The substitutions also don't apply with verbs meaning 'to see' when non-physical seeing is meant. @deva[मां] @deva[पश्य] remains (not @deva[मा]) for intellectual seeing.
"""

standard = """
No @deva[आदेश] with @deva[पश्यार्थ] (seeing) verbs when @deva[अचाक्षुष] (non-physical) seeing. Intellectual/mental perception blocks the enclitic substitution. @deva[मां] @deva[पश्य] for 'understand me' vs. @deva[मा] @deva[पश्य] for 'look at me'.
"""

advanced = """
Exception for @deva[पश्यार्थ] (@deva[दर्शनार्थ]) verbs in @deva[अचाक्षुष] (non-ocular) meaning. @deva[चाक्षुष] = physical eye-seeing; @deva[अचाक्षुष] = mental understanding. @deva[मां] @deva[पश्य] (understand me) vs. @deva[मा] @deva[पश्य] (physically see me). Semantic distinction conditions phonological form.
"""

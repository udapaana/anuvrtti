id = "8.1.18"
numericId = "81018"

[en]
simple = """
This heading rule: through @ref[8.1.74], words become unaccented (@deva[अनुदात्त]) when not at the beginning of a verse-half (@deva[पादादि]).
"""

standard = """
@deva[अधिकार]: @deva[अनुदात्तं] @deva[सर्वम्] @deva[अपादादौ] extends through @ref[8.1.74]. Non-initial (non-@deva[पादादि]) words lose accent. This governs Vedic accent patterns in connected speech.
"""

advanced = """
@deva[अनुदात्तं] @deva[सर्वम्] @deva[अपादादौ] @deva[अधिकार] through @ref[8.1.74]. @deva[पादादि] = beginning of verse-foot. Words not at @deva[पादादि] position become fully @deva[अनुदात्त] (gravely accented). This fundamental accent rule shapes Vedic recitation prosody.
"""

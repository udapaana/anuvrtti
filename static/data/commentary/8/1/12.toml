id = "8.1.12"
numericId = "81012"

[en]
simple = """
Adjectives are doubled to express 'somewhat, to a limited degree'. @deva[शीतशीतम्] 'somewhat cold', @deva[मृदुमृदु] 'somewhat soft'.
"""

standard = """
@deva[विशेषण] @deva[द्विर्वचन] for @deva[ईषदर्थ] (slight degree) + @deva[कर्मधारयवत्]. @deva[शीतशीतम्] 'a bit cold', @deva[मृदुमृदु] 'rather soft'. The doubling limits the attribute to partial/moderate degree.
"""

advanced = """
@deva[ईषदर्थ] (slight/limited degree) triggers @deva[विशेषण] @deva[द्विर्वचन] + @deva[कर्मधारयवत्]. @deva[शीतशीतम्], @deva[मृदुमृदु], @deva[उष्णोष्णम्] express 'somewhat X'. Per @ref[8.1.11], the @deva[कर्मधारय] treatment applies: case elision, @deva[उत्तरपद]-accent. The repetition grammaticalizes a moderating sense.
"""

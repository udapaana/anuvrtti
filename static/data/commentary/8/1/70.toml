id = "8.1.70"
numericId = "81070"

[en]
simple = """
A @deva[गति] (prefix) becomes unaccented when followed by another @deva[गति]. @deva[अभ्युद्धरति] — @deva[अभि] is unaccented before @deva[उद्].
"""

standard = """
@deva[गति] + @deva[गति] → first @deva[गति] @deva[अनुदात्त]. @deva[अभ्यु꣡द्धरति] shows @deva[अभि॒] gravely accented before @deva[उद्]. @deva[समुदामयति], @deva[अभिसंपर्याहरति] similarly.
"""

advanced = """
@deva[अनुदात्त] for @deva[गति] before following @deva[गति]. In prefix sequences: @deva[अभ्युद्धरति] (@deva[अभि॒] + @deva[उद्]), @deva[सम्॒उदामयति], @deva[अभि॒सं॒पर्याहरति]. Each preceding @deva[गति] loses accent to the following one. Only the final @deva[गति] before the verb retains accent.
"""

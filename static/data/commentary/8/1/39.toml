id = "8.1.39"
numericId = "81039"

[en]
simple = """
The verb retains accent with @deva[तु], @deva[पश्य], @deva[पश्यत], and @deva[अह] when meaning praise. @deva[माणवकस्तु] @deva[भुङ्क्ते] @deva[शोभनम्] 'the boy eats well!'
"""

standard = """
@deva[तिङन्त] retains accent with @deva[तु]/@deva[पश्य]/@deva[पश्यत]/@deva[अह] in @deva[स्तुति] (praise). @deva[माणवकस्तु] @deva[भुङ्क्ते꣡] @deva[शोभनम्], @deva[पश्य] @deva[पचति꣡।] Praising particles preserve verb accent.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with @deva[तु]/@deva[पश्य]/@deva[पश्यत]/@deva[अह] in @deva[स्तुत्यर्थ]. @deva[माणवकस्तु] @deva[भुङ्क्ते꣡] @deva[शोभनम्], @deva[पश्य] @deva[करोति꣡।] These particles in laudatory context maintain accent. Contrast with @ref[8.1.37]-38 where @deva[यावत्]/@deva[यथा] + @deva[स्तुति] loses accent.
"""

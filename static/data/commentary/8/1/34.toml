id = "8.1.34"
numericId = "81034"

[en]
simple = """
The finite verb retains accent with @deva[हि] when used in friendly assertion. @deva[स] @deva[हि] @deva[कुरु] 'indeed, do it!'
"""

standard = """
@deva[तिङन्त] retains accent with @deva[हि] in @deva[अप्रतिलोम] (friendly) assertion. @deva[स] @deva[हि] @deva[कुरु꣡], @deva[सहि] @deva[पच꣡], @deva[सहि] @deva[पठ꣡।] Friendly encouragement with @deva[हि] preserves accent.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with @deva[हि] in @deva[अप्रतिलोम]-@deva[अर्थ]. @deva[स] @deva[हि] @deva[कुरु꣡], @deva[सहि] @deva[पच꣡] show friendly urging with accented verb. This parallels @ref[8.1.33] (@deva[अङ्ग]). When @deva[हि] is hostile, regular @deva[अनुदात्त] applies.
"""

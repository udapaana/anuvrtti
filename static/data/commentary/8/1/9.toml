id = "8.1.9"
numericId = "81009"

[en]
simple = """
When @deva[एक] is doubled, it behaves like a @deva[बहुव्रीहि] compound member. @deva[एकैकः] 'one by one' (like a @[bahuvrīhi]).
"""

standard = """
@deva[एक] + @deva[एक] → @deva[बहुव्रीहि]-@deva[वत्]. @deva[एकैकः] treated as @[bahuvrīhi] for case-elision and masculine gender. This creates distributive 'one each, one by one' forms following compound rules.
"""

advanced = """
@deva[एक] @deva[द्विर्वचन] = @deva[बहुव्रीहिवत्]. The @deva[बहुव्रीहि] treatment: (1) @deva[सुप्]-@deva[लुक्] (case elision per @ref[2.4.71]), (2) @deva[पुंवत्] (masculine-like). @deva[एकैकः], @deva[एकैका], @deva[एकैकम्] decline like @[bahuvrīhi] compound. This grammatical treatment enables distributive expressions.
"""

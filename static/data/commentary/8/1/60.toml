id = "8.1.60"
numericId = "81060"

[en]
simple = """
With @deva[ह], the first verb retains accent when reprimanding a breach of custom. @deva[देवदत्तः] @deva[पचति] @deva[ह] (reprimanding, @deva[पचति] accented).
"""

standard = """
@deva[ह] + @deva[क्षिया]-@deva[गर्हा] (censuring breach of custom) → first @deva[तिङन्त] accented. @deva[देवदत्तः] @deva[पचति꣡] @deva[ह] 'Devadatta cooks, you know!' (reproaching impropriety).
"""

advanced = """
Accent-retention for first @deva[तिङन्त] with @deva[ह] in @deva[क्षिया]-@deva[गर्हार्थ] (censuring breach of duty/custom). @deva[क्षिया] = error, impropriety. @deva[देवदत्तः] @deva[पचति] @deva[ह] shows accented verb when @deva[ह] signals reproof of misconduct.
"""

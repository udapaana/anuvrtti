id = "8.1.14"
numericId = "81014"

[en]
simple = """
The word @deva[यथायथम्] 'respectively, fittingly' is irregularly formed. It means 'according to one's own nature'.
"""

standard = """
@deva[यथायथम्] = @deva[निपातन] (irregular formation) for @deva[यथास्व] (according to each's own). 'Respectively, properly, fittingly' — each thing according to its nature. Marks end of @deva[द्विर्वचन] @deva[अधिकार].
"""

advanced = """
@deva[निपातन]: @deva[यथायथम्] for @deva[यथास्वार्थ] (according to each one's own nature). @deva[यथास्व] = one's own nature/what is natural. This irregularly-formed doubled adverb concludes the @deva[सर्वस्य] @deva[द्वे] @deva[अधिकार] (@ref[8.1.1]-15). Standard derivation would not produce this form.
"""

id = "8.1.56"
numericId = "81056"

[en]
simple = """
In Vedic, a verb followed by @deva[यत्], @deva[हि], or @deva[तु] retains accent. @deva[पचति] @deva[यत्], @deva[पचति] @deva[हि] (Vedic, verb accented).
"""

standard = """
Vedic: @deva[तिङन्त] retains accent when followed by @deva[यत्]/@deva[हि]/@deva[तु]. @deva[पचति꣡] @deva[यत्], @deva[पचति꣡] @deva[हि], @deva[पचति꣡] @deva[तु।] The post-posed particles preserve verb accent in @deva[छन्दस्].
"""

advanced = """
@deva[छान्दस] accent-retention for @deva[तिङन्त] + @deva[यत्]/@deva[हि]/@deva[तु] (following). @deva[पचति] @deva[यत्], @deva[पचति] @deva[हि], @deva[पचति] @deva[तु] show Vedic patterns. Note: @deva[आमन्त्रित] @deva[अनुवृत्ति] doesn't apply here—this is about verbs with following particles.
"""

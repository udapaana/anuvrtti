id = "8.1.68"
numericId = "81068"

[en]
simple = """
A praised verb becomes unaccented even along with its preceding @deva[गति] (prefix). @deva[सु] @deva[प्रपचति] (whole unit unaccented when praised).
"""

standard = """
@deva[स्तुति]-@deva[पद] + (@deva[गति] +) @deva[तिङन्त] → whole unit @deva[अनुदात्त]. @deva[सु] @deva[प्रपचति] 'cooks excellently' — both prefix and verb lose accent when the verbal action is praised.
"""

advanced = """
@deva[अनुदात्त] for @deva[तिङन्त] + @deva[सगति] (with preceding prefix) when praised. Whether verb has @deva[गति]-prefix or not, the praised verbal complex becomes gravely accented. @deva[सु] @deva[प्रपचति], @deva[सु] @deva[प्रगच्छति] show entire unit unaccented.
"""

id = "8.1.59"
numericId = "81059"

[en]
simple = """
With @deva[च] and @deva[वा], only the first verb retains accent. @deva[गर्दभः] @deva[पचति] @deva[च] @deva[पठति] (@deva[पचति] accented, @deva[पठति] not).
"""

standard = """
Multiple verbs with @deva[च]/@deva[वा] → only first verb accented. @deva[गर्दभः] @deva[पचति꣡] @deva[च] @deva[पठ॒ति॒।] The @deva[अगतेः] condition of @ref[8.1.58] doesn't apply here.
"""

advanced = """
First-verb-only accent with @deva[च]/@deva[वा]. @deva[गर्दभः] @deva[पचति꣡] @deva[च] @deva[पठति] shows first verb accented, second unaccented. The conjunction creates a sequence where only the initial verb maintains accent. @deva[अगतेः] @deva[अनुवृत्ति] doesn't continue from @ref[8.1.58].
"""

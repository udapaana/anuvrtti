id = "8.1.32"
numericId = "81032"

[en]
simple = """
The finite verb retains accent with @deva[सत्य] when asking a question. @deva[सत्यं] @deva[भोक्ष्यसे] 'truly, will you eat?'
"""

standard = """
@deva[तिङन्त] retains accent with @deva[सत्य] in @deva[प्रश्न] (question). @deva[सत्यं] @deva[भोक्ष्य꣡से] 'truly will you eat?', @deva[सत्यमध्येष्यसे।] The truth-questioning context preserves verb accent.
"""

advanced = """
Accent-retention for @deva[तिङन्त] with @deva[सत्य] in @deva[प्रश्नार्थ]. @deva[सत्यं] @deva[भोक्ष्यसे], @deva[सत्यमध्येष्यसे] show accented verbs. The accent marks genuine inquiry. Non-question uses of @deva[सत्य] follow regular rules.
"""

id = "8.2.99"
numericId = "82099"

[en]
simple = """
Sentences expressing assent, promise, or listening take @deva[प्लुत] on the final syllable. Example: @deva[करिष्यामि३] 'I will do it'.
"""

standard = """
In @deva[प्रतिश्रवण] (assent/promise/acknowledgment) contexts, the sentence-final syllable becomes @deva[प्लुत]. Example: @deva[एवम्] @deva[अस्तु३] 'so be it', @deva[करिष्यामि३] 'I shall do it'. The prolongation marks commitment or acknowledgment.
"""

advanced = """
The @deva[प्रतिश्रवणे] condition covers agreement (@deva[अनुमति]), promise (@deva[प्रतिज्ञा]), and listening acknowledgment. The @deva[प्लुत] signals the speaker's engagement with the interlocutor's request or statement.
"""

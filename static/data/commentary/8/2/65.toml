id = "8.2.65"
numericId = "82065"

[en]
simple = """
Root-final @deva[म्] becomes @deva[न्] before affixes beginning with @deva[म्] or @deva[व्]. Example: √@deva[गम्] + @deva[म] → @deva[अगन्म] 'we went'.
"""

standard = """
Before @deva[म्]- or @deva[व्]-initial affixes, @deva[धातु]-final @deva[म्] becomes @deva[न्]. The imperfect forms illustrate: @deva[गम्]+@deva[म]→@deva[अगन्म], @deva[गम्]+@deva[व]→@deva[अगन्व]. This anticipatory @deva[नत्व] prevents the @deva[म्म्]/@deva[म्व्] clusters.
"""

advanced = """
The @deva[मवोः] context identifies the triggering affixes (1st plural @deva[म], 1st dual @deva[व] of imperfect/aorist). The @deva[नत्व] dissimilation avoids difficult labial clusters. This feeds subsequent consonant sandhi operations.
"""

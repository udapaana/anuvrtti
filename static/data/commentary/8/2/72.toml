id = "8.2.72"
numericId = "82072"

[en]
simple = """
The final @deva[स्] of @deva[वस्]-ending words, and finals of @deva[स्रंस्], @deva[ध्वंस्], @deva[अनडुह्] become @deva[द्]. Example: @deva[विद्वान्] → @deva[विद्वद्भिः].
"""

standard = """
Word-final @deva[स्] of @deva[वसु]-pratyaya forms (like @deva[विद्वस्]) and the roots @deva[स्रंस्], @deva[ध्वंस्], plus @deva[अनडुह्], become @deva[द्] at @deva[पदान्त]. This yields @deva[विद्वद्भिः], @deva[स्रंसद्], @deva[ध्वंसद्], @deva[अनड्वद्भिः] (instrumental plural).
"""

advanced = """
The @deva[दत्व] applies to perfect active participle stems (@deva[विद्वस्]-type) and these specific roots/stems. The @deva[अनडुह्] (bull) is included though its final is @deva[ह्] not @deva[स्]. This creates the characteristic @deva[द्]-forms before vowel-initial suffixes.
"""

id = "8.2.26"
numericId = "82026"

[en]
simple = """
@deva[स्] drops when preceded by @deva[झल्] (non-nasal, non-semivowel consonant) and followed by @deva[झल्]-initial affix. @deva[अभित्सत्] → @deva[अभित्त] (@deva[स्] between @deva[झल्] consonants drops).
"""

standard = """
@deva[झल्] + @deva[स्] + @deva[झल्]-@deva[आदि] → @deva[स्]-@deva[लोप]. @deva[अभित्सत्] → @deva[अभित्त] 'split' (@deva[स्] between @deva[त्] and @deva[त्] drops). The sibilant deletes in @deva[झल्]-@deva[स्]-@deva[झल्] sequence.
"""

advanced = """
@deva[स्]-@deva[लोप] when: (1) preceded by @deva[झल्] (stops/fricatives, excluding nasals/semivowels), (2) followed by @deva[झल्]-initial affix. @deva[अभित्सत्] → @deva[अभित्त], @deva[अधुक्षत्] → @deva[अधुक्त] demonstrate. The phonological environment triggers sibilant deletion.
"""

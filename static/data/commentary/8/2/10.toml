id = "8.2.10"
numericId = "82010"

[en]
simple = """
The @deva[म्] of @deva[मत्] becomes @deva[व्] after stems ending in a mute consonant (stops). @deva[अग्निचित्वान्], @deva[विद्युत्वान्].
"""

standard = """
@deva[मूक]-@deva[व्यञ्जन]-@deva[अन्त] (stop-final) + @deva[मत्] → @deva[म्]→@deva[व्]. @deva[अग्निचित्] + @deva[मत्] → @deva[अग्निचित्वान्], @deva[विद्युत्] + @deva[मत्] → @deva[विद्युत्वान्।] Mute consonants (@deva[क्]-@deva[ट्]-@deva[त्]-@deva[प्] classes) trigger the change.
"""

advanced = """
@deva[व्]-@deva[आदेश] for @deva[मत्]-@deva[म्] after @deva[मूकान्त] (mute/stop-final stems). @deva[अग्निचित्वान्], @deva[उदश्वित्वान्], @deva[विद्युत्वान्] show @deva[व्] after final stops. The phonological environment (voiceless stop) conditions this variant of possessive affix.
"""

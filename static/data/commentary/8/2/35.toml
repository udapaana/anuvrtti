id = "8.2.35"
numericId = "82035"

[en]
simple = """
The root @deva[आह्] 'to say' changes @deva[ह्] to @deva[थ्] before hard consonants. Example: @deva[आत्थ] 'you said'.
"""

standard = """
The defective root @deva[आह्] (used only in perfect tense) shows @deva[थ्]-substitution for @deva[ह्] before @deva[झल्] consonants. The form @deva[आत्थ] (second person singular perfect) illustrates this. Note: @deva[पद]-final position is not mentioned, as @deva[आह्] never occurs word-finally.
"""

advanced = """
The @deva[आहः] restriction excludes @deva[पदान्त] because this root appears only in specific @[liṭ] forms (@deva[आह], @deva[आहतुः], @deva[आहुः], @deva[आत्थ], etc.). The unique @deva[थ्]-substitution (voiceless aspirate dental) is peculiar to this root, perhaps preserving an archaic alternation.
"""

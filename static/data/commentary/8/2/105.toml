id = "8.2.105"
numericId = "82105"

[en]
simple = """
In questions or narrations, non-final words may also take @deva[स्वरित] @deva[प्लुत]. Example: @deva[किं] @deva[देवदत्ता३] @deva[करोति].
"""

standard = """
In @deva[प्रश्न] (question) and @deva[आख्यान] (narration), not only sentence-final but also mid-sentence words may take @deva[स्वरित] @deva[प्लुत]. This allows emphatic prolongation of key terms within the sentence.
"""

advanced = """
The @deva[प्रश्ने] @deva[च] @deva[आख्याने] @deva[पदस्य] condition extends @deva[प्लुत] beyond sentence-final position. The @deva[अन्त्यस्य] @deva[च] means 'and also final.' This permits rhetorical emphasis through mid-sentence @deva[प्लुत] in these contexts.
"""

[en]
simple = """
These names are irregular formations: @deva[आसन्दीवत्], @deva[अष्ठीवत्], @deva[चक्रीवत्], @deva[कक्षीवत्], @deva[रुमण्वत्], @deva[चर्मण्वती].
"""

standard = """
@deva[निपातन] (irregular listing): @deva[आसन्दीवत्], @deva[अष्ठीवत्], @deva[चक्रीवत्], @deva[कक्षीवत्], @deva[रुमण्वत्], @deva[चर्मण्वती]. These names show irregular @deva[व्]-substitution not derivable by standard rules.
"""

advanced = """
@deva[निपातन] for six names: @deva[आसन्दीवत्], @deva[अष्ठीवत्], @deva[चक्रीवत्], @deva[कक्षीवत्], @deva[रुमण्वत्], @deva[चर्मण्वती]. These show @deva[व्] where phonological rules wouldn't predict it. The @deva[मनोरमा] verse (@deva[आसन्द्यष्ठीचक्रकक्षीरुमाम्॥] @deva[चर्मणी] @deva[च]) lists them.
"""

id = "8.2.47"
numericId = "82047"

[en]
simple = """
The root @deva[श्यै] 'to congeal' takes @deva[न्] for participial @deva[त्], except when meaning 'cold'. Example: @deva[शीनं] @deva[घृतम्] 'congealed ghee'.
"""

standard = """
The @[niṣṭhā] @deva[त्] of √@deva[श्यै] becomes @deva[न्], yielding @deva[शीन] (with @deva[य]-loss and vowel changes). However, when the meaning is 'cold' (@deva[शीत]), the regular @deva[त्]-form is retained. Thus @deva[शीनं] @deva[घृतम्] 'solidified ghee' but @deva[शीतः] 'cold'.
"""

advanced = """
This semantic restriction (@deva[शीते] @deva[नेति] @deva[वक्तव्यम्]) is a @deva[निषेध] preventing @deva[नत्व] in the 'cold' sense. The two meanings ('congeal' vs 'cold') are distinguished by the participial form. The @deva[श्यै]→@deva[शीन] transformation involves multiple phonological steps.
"""

id = "8.2.71"
numericId = "82071"

[en]
simple = """
In Vedic, both @deva[रु] and @deva[र्] may replace the final of @deva[भुवस्] when used as a @deva[महाव्याहृति]. Example: @deva[भुवरित्यन्तरिक्षम्].
"""

standard = """
The sacred utterance @deva[भुवस्] (one of the @deva[व्याहृतियाँ]: @deva[भूर्], @deva[भुवर्], @deva[स्वर्]) optionally takes @deva[रुत्व] or @deva[र्]-substitution in Vedic contexts. Thus @deva[भुवर्] or @deva[भुव] @deva[इति] with the meaning 'atmosphere'.
"""

advanced = """
The @deva[महाव्याहृतौ] condition restricts this to ritual contexts where @deva[भुवस्] functions as a sacred syllable. The @deva[व्याहृतियाँ] (@deva[भूस्], @deva[भुवस्], @deva[स्वस्]) have special phonological treatment in Vedic recitation.
"""

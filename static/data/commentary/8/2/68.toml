id = "8.2.68"
numericId = "82068"

[en]
simple = """
The @deva[न्] of @deva[अहन्] 'day' becomes @deva[रु] at word-end (in the wider sense). Example: @deva[अहोभ्याम्] 'by two days'.
"""

standard = """
Word-final (@deva[पद]) @deva[न्] of @deva[अहन्] becomes @deva[रु] before case endings. This produces @deva[अहोभ्याम्], @deva[अहोभिः], @deva[अहोभ्यः] with the characteristic @deva[ओ] (from @deva[अर्]+case). The @deva[रुत्व] applies in the broader @deva[पद] sense (before suffixes).
"""

advanced = """
The @deva[अहन्]-specific @deva[रुत्व] in the wider @deva[पद] sense creates forms where @deva[र्]+vowel→@deva[ओ] by standard sandhi. This distinguishes the oblique stem (@deva[अहर्]/@deva[अहो]-) from nominative @deva[अहर्] (next rule). The form @deva[अहन्] in the @[sūtra] shows the underlying stem.
"""

id = "8.2.38"
numericId = "82038"

[en]
simple = """
In the reduplicated form @deva[दध] (from √@deva[धा]), the initial @deva[द्] becomes @deva[ध्] before @deva[त्], @deva[थ्], @deva[स्], and @deva[ध्वम्]. Example: @deva[दधाति] → @deva[धत्से] 'you place'.
"""

standard = """
The reduplicative @deva[द्] of @deva[दध]- (from √@deva[धा] 'to place') becomes aspirated @deva[ध्] before affixes beginning with @deva[त्], @deva[थ्], @deva[स्], or the ending @deva[ध्वम्]. This yields forms like @deva[धत्से], @deva[धत्स्व], @deva[धत्थः]. The rule applies only to this specific reduplicated base.
"""

advanced = """
This @deva[दध]-specific aspiration rule applies when the root's aspiration would otherwise be lost before these consonants. It's another instance of aspiration preservation, but limited to the perfect/present reduplication of √@deva[धा]. The @deva[तथोः] context targets specific personal endings.
"""

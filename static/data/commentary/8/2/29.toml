id = "8.2.29"
numericId = "82029"

[en]
simple = """
Cluster-initial @deva[स्] or @deva[क्] drops before @deva[झल्]-affix or at word-end. @deva[स्कम्भ्] → @deva[स्तभ्नाति] (@deva[क्] drops), @deva[तस्थ्] → @deva[तस्थ] (second @deva[स्] → @deva[थ्] sequence simplified).
"""

standard = """
@deva[संयोग]-@deva[आदि] @deva[स्]/@deva[क्] + @deva[झल्]-@deva[आदि]/@deva[पद]-@deva[अन्त] → @deva[स्]/@deva[क्]-@deva[लोप]. Initial @deva[स्] or @deva[क्] in cluster drops before @deva[झल्] or finally. This simplifies complex clusters.
"""

advanced = """
@deva[स्]/@deva[क्]-@deva[लोप] when: (1) initial in @deva[संयोग] (cluster), (2) before @deva[झल्]-@deva[आदि] @deva[प्रत्यय] or @deva[पद]-@deva[अन्त]. @deva[स्कम्भ्], @deva[स्तभ्], and similar show simplification. The cluster-initial sibilant or velar stop deletes in these environments.
"""

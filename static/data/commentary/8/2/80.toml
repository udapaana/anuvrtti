id = "8.2.80"
numericId = "82080"

[en]
simple = """
In forms of @deva[अदस्] 'that' not ending in @deva[स्], the vowel after @deva[द्] becomes @deva[उ]/@deva[ऊ], and @deva[द्] becomes @deva[म्]. Example: @deva[अमुम्].
"""

standard = """
The pronoun @deva[अदस्] undergoes special changes in non-@deva[स्] forms: the post-@deva[द्] vowel becomes @deva[उ] or @deva[ऊ], and @deva[द्] changes to @deva[म्]. This produces paradigm forms like @deva[अमुम्] (accusative), @deva[अमुष्मै] (dative). The transformation is unique to this pronoun.
"""

advanced = """
The @deva[असावत्र] condition excludes nominative/vocative @deva[स्]-ending forms. The dual substitution (vowel → @deva[उ]/@deva[ऊ] and @deva[द्] → @deva[म्]) creates the distinctive @deva[अमु]- stem. This @[nipātana] reflects the pronoun's irregular declension.
"""

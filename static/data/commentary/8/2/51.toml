id = "8.2.51"
numericId = "82051"

[en]
simple = """
The root @deva[शुष्] 'to dry' takes @deva[क्] instead of @deva[त्] for the participle. Example: @deva[शुष्कः] 'dry'.
"""

standard = """
The @[niṣṭhā] affix after √@deva[शुष्] becomes @deva[क्] rather than @deva[त्] or @deva[न्]. This produces the common adjective @deva[शुष्कः], @deva[शुष्कवान्] 'dried, dry'. This is an exceptional substitution unique to this root.
"""

advanced = """
The @deva[कः] substitution for @deva[निष्ठा] is rare. The resulting @deva[शुष्क] is treated as a standard participle despite the irregular affix. This @[nipātana] may preserve an archaic formation or reflect influence from related forms.
"""

id = "8.2.53"
numericId = "82053"

[en]
simple = """
The root @deva[क्षै] 'to decay' takes @deva[म्] instead of @deva[त्] for the participle. Example: @deva[क्षामः] 'emaciated'.
"""

standard = """
The @[niṣṭhā] affix after √@deva[क्षै] becomes @deva[म्] rather than @deva[त्]. This produces @deva[क्षामः], @deva[क्षामवान्] 'wasted, thin, emaciated'. The @deva[आम] form is distinctive to this root.
"""

advanced = """
The @deva[मः] substitution is another rare @deva[निष्ठा] replacement. The resulting @deva[क्षाम] functions participially and adjectivally. The root @deva[क्षै] (@deva[क्षा]) relates to diminishment, and the participle describes the resulting state.
"""

id = "8.2.88"
numericId = "82088"

[en]
simple = """
In sacrificial contexts, the vowel of @deva[ये] becomes @deva[प्लुत]. Example: @deva[ये३] @deva[यजामहे].
"""

standard = """
During @deva[यज्ञकर्म] (sacrificial ritual), the relative pronoun @deva[ये] takes @deva[प्लुत]. This distinguishes ritual usage from ordinary speech. The form @deva[ये३यजामहे] shows the prolonged address to deities.
"""

advanced = """
The @deva[यज्ञकर्मणि] condition restricts this to actual sacrifice. Outside ritual, @deva[ये] @deva[यजामहे] has normal vowel length. The @deva[प्लुत] serves as a ritual marker distinguishing sacred from secular speech.
"""

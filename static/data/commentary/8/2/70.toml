id = "8.2.70"
numericId = "82070"

[en]
simple = """
In Vedic, both @deva[रु] and @deva[र्] may replace the finals of @deva[अमनस्], @deva[ऊधस्], and @deva[अवस्]. Example: @deva[अम्नरेव] or @deva[अम्न] @deva[एव].
"""

standard = """
The Chandas allows optional @deva[रुत्व] or @deva[र्]-substitution for these three stems: @deva[अमनस्]→@deva[अमनर्]/@deva[अम्नो], @deva[ऊधस्]→@deva[ऊधर्]/@deva[ऊधो], @deva[अवस्]→@deva[अवर्]/@deva[अवो]. Both forms are attested in Vedic texts.
"""

advanced = """
This Vedic @deva[विभाषा] extends the @deva[अहन्]-type alternation to additional @deva[स्]-stems. The optionality reflects the broader phonological variation in Vedic Sanskrit compared to classical norms.
"""

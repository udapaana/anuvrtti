id = "8.2.102"
numericId = "82102"

[en]
simple = """
The words @deva[उपरि], @deva[स्विद्], and @deva[आसीद्] take @deva[अनुदात्त] @deva[प्लुत] on their final vowel. Example: @deva[उपरि३].
"""

standard = """
These three words exceptionally take @deva[अनुदात्त] @deva[प्लुत]: @deva[उपरि३] 'above', @deva[स्विद्]→@deva[स्वी३] 'perhaps/indeed', @deva[आसीद्]→@deva[आसी३] 'was'. The @deva[प्लुत] would apply by general rules, but this specifies the @deva[अनुदात्त] accent.
"""

advanced = """
The @deva[उपरिस्विदासीदाम्] specification adds these forms to the @deva[अनुदात्त] @deva[प्लुत] category. The accent specification is significant because otherwise @deva[प्लुत] might default to @deva[उदात्त]. These forms have distinctive prosodic behavior.
"""

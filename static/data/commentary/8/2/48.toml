id = "8.2.48"
numericId = "82048"

[en]
simple = """
The root @deva[अञ्च्] 'to go, bend' takes @deva[न्] for participial @deva[त्], except with ablative sense. Example: @deva[समक्न] 'assembled'.
"""

standard = """
The @[niṣṭhā] of √@deva[अञ्च्] becomes @deva[न्] in forms like @deva[प्रत्यक्न], @deva[समक्न]. But when the sense involves separation (ablative/fifth case relation), the regular @deva[त्]-form @deva[अक्त] is used. This distinguishes directional from separative meanings.
"""

advanced = """
The @deva[पञ्चमीयुक्तात्] exception blocks @deva[नत्व] when the compound implies ablative relationship. The root @deva[अञ्च्] with prefixes indicates direction (@deva[प्रत्यञ्च्], @deva[समञ्च्]), but ablative contexts require the standard @deva[त्]-participle.
"""

id = "8.2.107"
numericId = "82107"

[en]
simple = """
Non-@deva[प्रगृह्य] diphthongs taking @deva[प्लुत] (except in distant calling) may show the prolonged element separately. Example: @deva[ए] → @deva[अइ३].
"""

standard = """
When diphthongs that are not @deva[प्रगृह्य] (per @ref[1.1.11] etc.) take @deva[प्लुत] in contexts other than distant calling (@deva[दूरात्] @deva[आह्वान]), the @deva[इ]/@deva[उ] component can manifest as a prolonged separate element. This specifies the phonetic realization.
"""

advanced = """
The @deva[अप्रगृह्यस्य] @deva[अदूराद्धूते] condition excludes both @deva[प्रगृह्य] vowels and the distant-calling context from this specific realization. The rule clarifies how diphthong @deva[प्लुत] is pronounced in various pragmatic contexts.
"""

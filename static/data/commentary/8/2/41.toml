id = "8.2.41"
numericId = "82041"

[en]
simple = """
The consonants @deva[ष्] and @deva[ढ्] become @deva[क्] before @deva[स्]. Example: √@deva[विष्] → @deva[विवेक्ष्यते] 'will enter'.
"""

standard = """
Before the sibilant @deva[स्], both @deva[ष्] (retroflex sibilant) and @deva[ढ्] (retroflex aspirate stop) are replaced by @deva[क्]. This yields @deva[विवेक्ष्यति] from @deva[विष्]+@deva[स्यति] and forms like @deva[अलिक्षत्] from @deva[लिह्]+@deva[स]+@deva[त] (via @deva[ढ्]→@deva[क्]).
"""

advanced = """
The @deva[कत्व] before @deva[स्] resolves cluster difficulties with retroflex consonants. The @deva[ष्] of roots like @deva[विष्] and the @deva[ढ्] derived from @deva[ह्] (via @ref[8.2.31]) both undergo this substitution. This creates the characteristic @deva[क्ष्] cluster in desiderative and future forms.
"""

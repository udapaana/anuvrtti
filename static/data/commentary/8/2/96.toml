id = "8.2.96"
numericId = "82096"

[en]
simple = """
A finite verb with @deva[अङ्ग] expressing threat becomes @deva[प्लुत] when requiring another sentence. Example: @deva[अङ्ग] @deva[करोष्या३].
"""

standard = """
When @deva[अङ्ग] accompanies a finite verb in a threat that awaits completion (@deva[अपेक्षित]), the verb-final becomes @deva[प्लुत]. Example: @deva[अङ्ग] @deva[करोष्या३]... (implying 'and then see what happens'). The incomplete threat intensifies through prolongation.
"""

advanced = """
The @deva[अङ्गवत्तिङि] @deva[अपेक्षिते] condition specifies threats requiring a consequent clause. The @deva[अङ्ग] particle marks informal address; the @deva[प्लुत] sustains the threatening tone pending the unspoken consequence.
"""

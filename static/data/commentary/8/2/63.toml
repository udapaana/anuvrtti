id = "8.2.63"
numericId = "82063"

[en]
simple = """
The final @deva[नश्] optionally becomes a guttural at word-end. Example: @deva[जीवनड्] or @deva[जीवनश्].
"""

standard = """
Word-final @deva[नश्] may optionally undergo @deva[कुत्व], yielding forms with final @deva[ड्] alongside the unchanged @deva[श्]. The Vedic example @deva[जीवनडाहुतिः] shows the guttural option. This @deva[विभाषा] allows both forms.
"""

advanced = """
The optional @deva[कुत्व] for @deva[नश्] creates variant @deva[पद]-final forms. The @deva[ग]uttural alternative (@deva[जीवनड्]) coexists with the palatal (@deva[जीवनश्]). This optionality reflects dialectal or stylistic variation in the language.
"""

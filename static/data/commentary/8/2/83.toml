id = "8.2.83"
numericId = "82083"

[en]
simple = """
When responding to a respectful greeting (not from a @deva[शूद्र]), the final vowel becomes @deva[प्लुत] with acute accent. Example: @deva[भो३ः].
"""

standard = """
In responding to @deva[अभिवादन] (respectful salutation), the sentence-final vowel takes @deva[प्लुत] prolongation and @[udātta] accent. The @deva[शूद्र] exception reflects social hierarchy in classical usage. The prolongation shows formal acknowledgment.
"""

advanced = """
The @deva[अभिवादने] @deva[शूद्रमनाख्यायाम्] specifies the social context. The @deva[प्लुत]+@deva[उदात्त] marks the formal response. The @deva[शूद्र] exception (@deva[अमनाख्यायाम्]) reflects @[varṇa-based] conventions of the period.
"""

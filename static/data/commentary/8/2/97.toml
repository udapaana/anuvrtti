id = "8.2.97"
numericId = "82097"

[en]
simple = """
When deliberating between alternatives, the sentence-final syllable becomes @deva[प्लुत]. Example: @deva[किं] @deva[करवाणि] @deva[नु] @deva[करवाणि३].
"""

standard = """
In expressions of @deva[विचारण] (deliberation), weighing alternatives, the final syllable takes @deva[प्लुत]. Example: @deva[किं] @deva[करवाणि] @deva[नु] @deva[करवाणि३] 'Should I do it or not?' The prolongation reflects the suspended decision.
"""

advanced = """
The @deva[विचारणे] condition covers @deva[तर्क] (reasoning) contexts where the speaker weighs options. The @deva[प्लुत] marks the deliberative prosody, characteristic of thoughtful consideration of alternatives.
"""

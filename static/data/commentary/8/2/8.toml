id = "8.2.8"
numericId = "82008"

[en]
simple = """
Exception: the @deva[न्] is NOT deleted in locative and vocative singular. @deva[राजनि] (loc.), @deva[हे] @deva[राजन्] (voc.) — @deva[न्] stays.
"""

standard = """
@deva[सप्तमी]-@deva[एकवचन] and @deva[संबोधन]-@deva[एकवचन] block @deva[न]-@deva[लोप]. @deva[राजनि] 'in the king', @deva[हे] @deva[राजन्] 'O king!' retain the nasal. These cases are exceptions to @ref[8.2.7].
"""

advanced = """
Exception to @ref[8.2.7]: @deva[न्] retained in @deva[ङि] (loc. sg.) and @deva[संबोधन] (voc. sg.). @deva[राजनि], @deva[आत्मनि]; @deva[हे] @deva[राजन्], @deva[हे] @deva[आत्मन्] show preserved @deva[न्]. The locative and vocative singular uniquely maintain the stem-final nasal.
"""

id = "8.2.25"
numericId = "82025"

[en]
simple = """
The @deva[स्] is dropped before affixes beginning with @deva[ध्]. @deva[स्रस्] + @deva[धि] → @deva[स्रध्धि] (with @deva[स्]-lopa).
"""

standard = """
@deva[स्] + @deva[ध्]-@deva[आदि] @deva[प्रत्यय] → @deva[स्]-@deva[लोप]. @deva[स्रस्धि] → @deva[स्रध्धि] (@deva[स्] drops before @deva[ध्]). The sibilant deletes before the dental aspirate affix.
"""

advanced = """
@deva[स्]-@deva[लोप] before @deva[ध्]-@deva[आदि] @deva[प्रत्यय]. @[kārikā] explains: @deva[धि]-context for @deva[सिच्]-@deva[लोप] relates to @deva[चकार] forms. The @deva[स्] of @deva[सिच्] or stem-final @deva[स्] drops when @deva[ध्] follows. @deva[आशाध्वम्] shows the pattern with subsequent changes.
"""

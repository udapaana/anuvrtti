id = "8.2.76"
numericId = "82076"

[en]
simple = """
A short @deva[इ] or @deva[उ] before final @deva[र्] or @deva[व्] is lengthened at word-end. Example: √@deva[गिर्] → @deva[गीः] 'speech'.
"""

standard = """
When a root ending in @deva[र्] or @deva[व्] stands at @deva[पदान्त], the preceding short @deva[इ] or @deva[उ] becomes long. This produces @deva[गीः] (√@deva[गिर्]), @deva[धूः] (√@deva[धुर्]), @deva[पूः] (√@deva[पुर्]), @deva[आशीः] (√@deva[शास्] with @deva[आ]). The lengthening compensates for final position.
"""

advanced = """
The @deva[र्वोरुपधाया] @deva[दीर्घः] applies at true @deva[पद]-boundary. The compensatory lengthening (@deva[उपधादीर्घ]) preserves syllable weight when the final consonant is in weak position. This feeds into subsequent sandhi rules.
"""

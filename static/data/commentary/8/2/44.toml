id = "8.2.44"
numericId = "82044"

[en]
simple = """
From √@deva[लू] 'to cut' onwards (a list of roots), the participial @deva[त्] becomes @deva[न्]. Example: @deva[लूनः] 'cut'.
"""

standard = """
The roots in the @deva[लू]-@deva[आदि] list (starting from √@deva[लूञ्] in the @[kryādi] class) take @deva[न्]-substitution for @[niṣṭhā] @deva[त्]. This produces @deva[लूनः], @deva[पूनः], @deva[दूनः], @deva[ऊन], @deva[क्लिन्न], etc. The list is enumerated in the @[dhātupāṭha].
"""

advanced = """
The @deva[ल्वादिभ्यः] reference points to a specific @[gaṇa] beginning with @deva[लूञ्] @deva[छेदने] (@[kryādi] class). These are @deva[आकारान्त] or @deva[ई]/@deva[ऊकारान्त] roots that exceptionally take @deva[नत्व]. The @[gaṇa] must be consulted for the complete list.
"""

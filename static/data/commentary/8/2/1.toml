id = "8.2.1"
numericId = "82001"

[en]
simple = """
This is the @[tripādi] heading: everything taught from here to the end is 'not yet taken effect' (@deva[असिद्ध]) for preceding rules. This is the @deva[पूर्वत्रासिद्ध] @deva[अधिकार].
"""

standard = """
@deva[अधिकार]: @deva[पूर्वत्रासिद्ध] extends through the end of the @[aṣṭādhyāyī] (@ref[8.4.68]). Rules in this section are treated as 'not operative' when earlier rules apply. This creates ordered rule application.
"""

advanced = """
@deva[पूर्वत्रासिद्ध] @deva[अधिकार]: governs the entire @[tripādi] (@ref[8.2.1]-@ref[8.4.68]). For any rule X applying, later rules Y are @deva[असिद्ध] (as if not yet applied). This prevents later operations from feeding earlier ones, creating the characteristic 'simultaneous' application effect of the @[tripādi] section.
"""

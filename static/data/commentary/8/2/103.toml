id = "8.2.103"
numericId = "82103"

[en]
simple = """
In doubled vocatives expressing envy, praise, anger, or blame, the first vocative's final becomes @deva[स्वरित] @deva[प्लुत]. Example: @deva[देवदत्ता३] @deva[देवदत्त].
"""

standard = """
When identical vocatives are doubled sentence-initially for @deva[असूया] (envy), @deva[संमाने] (praise), @deva[क्रोध] (anger), or @deva[उपालम्भ] (blame), the first vocative's final takes @deva[प्लुत] with @deva[स्वरित] accent. This marks emotional address.
"""

advanced = """
The @deva[असूयासंमाने] etc. condition covers emotional contexts. The @deva[स्वरित] (circumflex) @deva[प्लुत] on the first doubled vocative creates distinctive emotional prosody, signaling the speaker's attitude.
"""

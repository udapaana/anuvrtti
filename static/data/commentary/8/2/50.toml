id = "8.2.50"
numericId = "82050"

[en]
simple = """
The word @deva[निर्वाण] 'extinguished' takes @deva[न्] for @deva[त्], except when meaning 'wind'. Example: @deva[निर्वाणः] @deva[दीपः] 'extinguished lamp'.
"""

standard = """
The participle from √@deva[वा] 'to blow' with @deva[निस्] takes @deva[न्]-substitution in the sense of 'extinguished, ceased'. But when the meaning relates to wind itself, the regular form applies. The term @deva[निर्वाण] famously denotes spiritual extinction.
"""

advanced = """
This rule produces the celebrated term @deva[निर्वाण] (cessation, liberation) from @deva[निस्]+√@deva[वा]+@deva[क्त]. The @deva[वाते] @deva[नेति] exception preserves forms relating to actual wind. The philosophical significance of @deva[निर्वाण] makes this an important @[nipātana].
"""

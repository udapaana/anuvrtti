id = "8.2.21"
numericId = "82021"

[en]
simple = """
Before vowel-initial affixes, @deva[र्] optionally becomes @deva[ल्]. @deva[निगिरति] or @deva[निगिलति], @deva[निगरणम्] or @deva[निगलनम्].
"""

standard = """
@deva[र्] + @deva[अच्]-@deva[आदि] @deva[प्रत्यय] → optional @deva[ल्]-@deva[आदेश]. @deva[गॄ] → @deva[निगिरति]/@deva[निगिलति] 'swallows', @deva[निगरणम्]/@deva[निगलनम्] 'swallowing'. @deva[विभाषा] allows both forms.
"""

advanced = """
@deva[विभाषा] for @deva[र्]→@deva[ल्] before @deva[अजादि] (vowel-initial) affixes. @deva[निगिरति]/@deva[निगिलति], @deva[निगरणम्]/@deva[निगलनम्], @deva[निगारकः]/@deva[निगालकः] demonstrate optionality. This expands on @deva[गॄ]'s flexible @deva[र्]/@deva[ल्] alternation before vowels.
"""

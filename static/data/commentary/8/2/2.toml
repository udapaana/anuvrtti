id = "8.2.2"
numericId = "82002"

[en]
simple = """
The elision of final @deva[न्] (from @ref[8.2.7]) is treated as @deva[असिद्ध] for case-endings, taddhita affixes, and compounds. The @deva[न्] is 'still there' for those rules.
"""

standard = """
@deva[न]-@deva[लोप] (@ref[8.2.7]) = @deva[असिद्ध] for: (1) @deva[सुप्], (2) @deva[तद्धित], (3) @deva[समास] rules. Though @deva[न्] is deleted, these operations proceed as if the @deva[न्] were present. This prevents cascading effects.
"""

advanced = """
Specific @deva[असिद्धत्व] for @deva[प्रातिपदिकान्त] @deva[न]-@deva[लोप] (@ref[8.2.7]): case-endings (@deva[सुप्]), taddhita affixes, and compound rules (@deva[समास]) treat the elision as not-yet-occurred. @deva[राजन्] + @deva[सु] → @deva[राजा], but taddhita sees @deva[राजन्]-stem. This ordering prevents premature application.
"""

id = "8.2.45"
numericId = "82045"

[en]
simple = """
Roots marked with @deva[ओ] in the @[dhātupāṭha] take @deva[न्] for participial @deva[त्]. Example: √@deva[लग्] (@deva[ओलग्]) → @deva[लग्नः] 'attached'.
"""

standard = """
The indicatory @deva[ओ] (@deva[ओकार] @deva[इत्]) in the @[dhātupāṭha] marks roots whose @[niṣṭhā] @deva[त्] becomes @deva[न्]. Examples: @deva[ओलस्ज्]→@deva[लग्न], @deva[ओविज्]→@deva[विग्न], @deva[ओश्लिष्]→@deva[श्लिष्ण]. The @deva[ओ] is purely a grammatical marker, not pronounced.
"""

advanced = """
The @deva[ओदितः] condition uses the anubandha system to mark exceptional @deva[नत्व]. The @deva[ओ]-@deva[इत्] is a convention allowing @[pāṇini] to identify scattered roots requiring this treatment without listing them. The roots themselves drop the @deva[ओ] in actual usage.
"""

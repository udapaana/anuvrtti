id = "8.2.100"
numericId = "82100"

[en]
simple = """
In questions and praise, the final vowel becomes @deva[प्लुत] but unaccented (@deva[अनुदात्त]). Example: @deva[किं] @deva[करोषि३].
"""

standard = """
Question-final (@deva[प्रश्नान्त]) and praise-final (@deva[स्तुत्यन्त]) vowels take @deva[प्लुत] with @deva[अनुदात्त] (low) accent, not @deva[उदात्त]. This distinguishes interrogative and laudatory prosody from other @deva[प्लुत] contexts.
"""

advanced = """
The @deva[प्रश्ने] @deva[च] @deva[स्तुत्याम्] @deva[अनुदात्तं] condition specifies the accent departure. The @deva[अनुदात्त] @deva[प्लुत] creates rising or neutral intonation for questions/praise, contrasting with the @deva[उदात्त] @deva[प्लुत] of other contexts.
"""

id = "8.2.62"
numericId = "82062"

[en]
simple = """
Stems formed with @deva[क्विन्] under rules like @ref[3.2.58] change their final consonant to a guttural at word-end. Example: @deva[दृक्] 'sight'.
"""

standard = """
The @deva[क्विन्]-derived stems (from rules like @deva[स्पृशोऽनुदके] @deva[क्विन्] @ref[3.2.58]) undergo @deva[कुत्व] (gutturalization) of the final consonant at @deva[पदान्त]. Thus @deva[दृश्]→@deva[दृक्], @deva[स्पृश्]→@deva[स्पृक्], @deva[दिश्]→@deva[दिक्] when word-final.
"""

advanced = """
The @deva[कुत्व] applies specifically to @deva[क्विन्]-pratyaya forms at @deva[पद]-boundary. The conversion of palatals and other finals to gutturals (@deva[क्], @deva[ग्]) creates the characteristic forms @deva[दृक्], @deva[दिक्], @deva[स्पृक्] used in compounds and absolute positions.
"""

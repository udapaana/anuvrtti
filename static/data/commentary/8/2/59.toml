id = "8.2.59"
numericId = "82059"

[en]
simple = """
The word @deva[भित्त] means 'a fragment, portion', formed irregularly from √@deva[भिद्]. Example: @deva[भित्तम्] 'piece'.
"""

standard = """
The participle @deva[भित्त] from √@deva[भिद्] 'to split' retains @deva[त्] in the specific meaning of 'fragment, portion'. In other senses, the regular form applies. The term denotes something broken off as a piece.
"""

advanced = """
The @deva[शकलार्थे] restriction specifies that @deva[भित्त] with retained @deva[त्] means 'fragment' (@deva[शकल]). In general 'split' meanings, @deva[भिन्न] is standard. This semantic @[nipātana] distinguishes @deva[भित्त] 'wall/portion' from @deva[भिन्न] 'broken/split'.
"""

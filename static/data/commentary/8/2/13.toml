id = "8.2.13"
numericId = "82013"

[en]
simple = """
@deva[उदन्वान्] 'ocean' is irregularly formed from @deva[उदक] (water) + @deva[मत्]. The ocean is 'possessing waters'.
"""

standard = """
@deva[उदक] + @deva[मत्] → @deva[उदन्वान्] (irregular). 'Ocean' = 'possessor of waters'. The expected form would differ; this is @deva[निपातन]. Also a @deva[ऋषि]-name (controller of waters).
"""

advanced = """
@deva[निपातन]: @deva[उदन्वान्] from @deva[उदक] + @deva[मत्] for @deva[समुद्र] (ocean). The derivation shows irregular @deva[न्] + @deva[व्] sequence. The name also applies to a @deva[ऋषि] (@deva[उदकस्वामी] 'water-lord'). Regular derivation would yield different form.
"""

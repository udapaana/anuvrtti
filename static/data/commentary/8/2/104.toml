id = "8.2.104"
numericId = "82104"

[en]
simple = """
Verbs censuring impoliteness, or expressing benediction/command, take @deva[स्वरित] @deva[प्लुत] when incomplete. Example: @deva[भवतु] @deva[ते] @deva[श्रेया३].
"""

standard = """
When a finite verb censures breach of etiquette (@deva[मर्यादातिक्रम]), or expresses benediction (@deva[आशिष्]) or command (@deva[अधीष्ट]), and requires another sentence, it takes @deva[स्वरित] @deva[प्लुत]. This marks formal/emotional speech acts.
"""

advanced = """
The @deva[मर्यादातिक्रमे], @deva[आशीष्यधीष्टयोः] contexts specify formal speech acts. The @deva[अपेक्षित] (requiring completion) condition applies. The @deva[स्वरित] @deva[प्लुत] marks these as socially significant utterances.
"""

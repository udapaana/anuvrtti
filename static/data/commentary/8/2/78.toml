id = "8.2.78"
numericId = "82078"

[en]
simple = """
Short @deva[इ]/@deva[उ] before penultimate @deva[र्]/@deva[व्] is also lengthened before consonants. Example: √@deva[ऊर्णु] → @deva[ऊर्णोति].
"""

standard = """
When @deva[र्] or @deva[व्] is penultimate (@deva[उपोत्तम]) and followed by a consonant, the preceding short @deva[इ]/@deva[उ] lengthens. This extends the @deva[दीर्घ] rule to a slightly different structural context within the root.
"""

advanced = """
This rule handles cases where the @deva[र्]/@deva[व्] is not final but penultimate, with a following consonant. The structural condition @deva[रेफव्योरुपधायाः] @deva[हलि] ensures lengthening in these complex cluster environments.
"""

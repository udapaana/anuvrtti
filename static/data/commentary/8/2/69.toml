id = "8.2.69"
numericId = "82069"

[en]
simple = """
When no case ending follows, @deva[न्] of @deva[अहन्] becomes @deva[र्]. Example: @deva[अहर्] @deva[ददाति] 'day gives'.
"""

standard = """
At absolute word-end (@deva[अप्रत्यय] = without following suffix), the @deva[न्] of @deva[अहन्] becomes simple @deva[र्] (not @deva[रु]). This yields @deva[अहर्] in sentence-final position or before consonants: @deva[अहर्ददाति], @deva[अहर्भुङ्क्ते].
"""

advanced = """
The @deva[अप्रत्यये] condition distinguishes this from the @deva[रु]-substitution before case endings. The @deva[र्]-form appears in compounds and before consonant-initial words. This creates the paradigm: nom. @deva[अहर्], inst. @deva[अह्ना]/@deva[अहोभ्याम्].
"""

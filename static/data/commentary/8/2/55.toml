id = "8.2.55"
numericId = "82055"

[en]
simple = """
The irregular participles @deva[फुल्ल], @deva[क्षीब], @deva[कृश], and @deva[उल्लाघ] are formed only without prefixes. Example: @deva[फुल्लः] 'blossomed'.
"""

standard = """
These four @[nipātana] forms—@deva[फुल्ल] (blossomed), @deva[क्षीब] (intoxicated), @deva[कृश] (lean), @deva[उल्लाघ] (healthy)—occur only when the root lacks a prefix. With prefixes, regular formations apply: @deva[विफलितः] not *@deva[विफुल्लः].
"""

advanced = """
The @deva[अनुपसर्गात्] condition restricts these irregular formations to unprefixed contexts. Each represents a unique phonological development: @deva[फुल्ल] from √@deva[फल्], @deva[क्षीब] from √@deva[क्षिब्], @deva[कृश] from √@deva[कृश्], @deva[उल्लाघ] from √@deva[लाघ्] with @deva[उद्]-.
"""

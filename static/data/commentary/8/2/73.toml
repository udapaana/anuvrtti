id = "8.2.73"
numericId = "82073"

[en]
simple = """
Root-final @deva[स्] (except √@deva[अस्] 'to be') becomes @deva[द्] before the ending @deva[ति] at word-end. Example: @deva[अचकाः] → @deva[अचकाद्].
"""

standard = """
Before the personal ending @deva[ति] (appearing as @deva[त्]), @[dhātu-final] @deva[स्] becomes @deva[द्] at @deva[पदान्त]. The root @deva[अस्] 'to be' is excepted. Thus perfect forms like @deva[अचकास्]+@deva[त]→@deva[अचकाद्] undergo this @deva[दत्व].
"""

advanced = """
The @deva[असः] exception preserves forms of √@deva[अस्]. The @deva[तौ] refers to the @deva[ति]-ending (3rd singular) reduced to @deva[त्] in certain perfect forms. This @deva[दत्व] creates the characteristic word-final @deva[द्] in these verbal forms.
"""

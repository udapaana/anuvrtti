id = "8.2.58"
numericId = "82058"

[en]
simple = """
The word @deva[वित्त] means 'wealth' and 'renowned', formed irregularly from √@deva[विद्]. Example: @deva[वित्तम्] 'wealth'.
"""

standard = """
The participle @deva[वित्त] from √@deva[विद्ल्] (@[tudādi], 'to find') retains @deva[त्] despite conditions for @deva[नत्व]. It means both 'found/obtained' → 'wealth' and 'known' → 'renowned'. The regular form would be @deva[विन्न].
"""

advanced = """
This @[nipātana] specifies that @deva[वित्त] (not @deva[विन्न]) expresses these particular meanings. The semantic specification (@deva[वेदने] @deva[च]) connects the form to 'knowing/finding'. This distinguishes @deva[वित्त] 'wealth' from @deva[विन्न] (optional form of √@deva[विद्]).
"""

id = "8.2.33"
numericId = "82033"

[en]
simple = """
The roots @deva[द्रुह्], @deva[मुह्], @deva[ष्णुह्], and @deva[ष्णिह्] optionally change @deva[ह्] to @deva[ध्]. Example: @deva[द्रुग्धा] or @deva[द्रूढा] 'hated'.
"""

standard = """
These four roots permit optional @deva[ध्]-substitution for @deva[ह्] before @deva[झल्] or at word-end. The alternative is the regular @deva[ढ्]-substitution. Hence dual forms: @deva[द्रुग्धा]/@deva[द्रूढा], @deva[मुग्धा]/@deva[मूढा], @deva[स्नुग्धा]/@deva[स्नूढा], @deva[स्निग्धा]/@deva[स्नीढा].
"""

advanced = """
The @deva[विभाषा] allows speakers to choose between the general @deva[ढत्व] (@ref[8.2.31]) and this specific @deva[धत्व]. The four roots form a closed @[gaṇa]. Note the initial @deva[ष्] of @deva[ष्णुह्] and @deva[ष्णिह्] is indicatory (@deva[इट्]), yielding @deva[स्नुह्] and @deva[स्निह्].
"""

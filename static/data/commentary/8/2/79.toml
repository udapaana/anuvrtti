id = "8.2.79"
numericId = "82079"

[en]
simple = """
The lengthening does not apply when a @deva[य्] follows the @deva[र्]/@deva[व्]-ending stem (@deva[भ]-@deva[संज्ञा]). Example: @deva[स्तरि]-@deva[य]- not *@deva[स्तारि]-@deva[य]-.
"""

standard = """
When the nominal stem ending in @deva[र्]/@deva[व्] is followed by @deva[य्] (@deva[भ]-@[saṃjñā] context, as in denominatives), the @deva[उपधादीर्घ] is blocked. This prevents forms like *@deva[स्तारीयति]; instead @deva[स्तरीयति]. The @deva[भ]-context creates an exception.
"""

advanced = """
The @deva[भसंज्ञायाम्] exception identifies denominative and similar formations where @deva[य्] follows the stem. The blocking prevents over-application of @deva[दीर्घ] in these derived verbal contexts.
"""

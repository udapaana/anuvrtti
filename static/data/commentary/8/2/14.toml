id = "8.2.14"
numericId = "82014"

[en]
simple = """
@deva[राजन्वान्] is irregularly formed when meaning 'well-governed'. @deva[राजन्वान्] @deva[देशः] 'a land with good kingship'.
"""

standard = """
@deva[राजन्] + @deva[मत्] → @deva[राजन्वान्] in @deva[सुराज्य] (good governance) sense. @deva[राजन्वान्] @deva[देशः] 'well-governed land', @deva[राजन्वती] @deva[पृथ्वी] 'well-ruled earth'. The @deva[मतुप्] affix shows irregular @deva[व्].
"""

advanced = """
@deva[निपातन]: @deva[राजन्वान्]/@deva[राजन्वती] for @deva[सुराज्य]-@deva[अर्थ] (good kingship). @deva[राजन्वान्] @deva[देशः], @deva[राजन्वती] @deva[पृथ्वी] show 'having a good king'. The irregular @deva[व्] (instead of expected @deva[म्]) is semantically conditioned—applies only in the 'good governance' meaning.
"""

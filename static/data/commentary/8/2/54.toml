id = "8.2.54"
numericId = "82054"

[en]
simple = """
The root @deva[स्त्यै] 'to collect' optionally takes @deva[म्] for @deva[त्] when preceded by @deva[प्र]. Example: @deva[प्रस्तीमः] or @deva[प्रस्तीतः].
"""

standard = """
With the prefix @deva[प्र], the @[niṣṭhā] of √@deva[स्त्यै] optionally becomes @deva[म्]. This allows either @deva[प्रस्तीमः] or the regular @deva[प्रस्तीतः]. Without @deva[प्र], the option does not apply. The @deva[विभाषा] indicates free variation.
"""

advanced = """
The @deva[प्रादेः] condition limits the optional @deva[मत्व] to the prefixed form. The @deva[स्त्यै] root with @deva[प्र]- means 'to spread, expand' or 'to collect', and both participial forms are grammatically valid.
"""

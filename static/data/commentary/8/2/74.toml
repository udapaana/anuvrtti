id = "8.2.74"
numericId = "82074"

[en]
simple = """
Root-final @deva[स्] optionally becomes @deva[द्] or @deva[रु] before the ending @deva[सि] at word-end. Example: @deva[अचकास्] or @deva[अचकार्].
"""

standard = """
Before the @deva[सि] ending (2nd singular), @[dhātu-final] @deva[स्] optionally becomes @deva[द्] or @deva[रु]. This @deva[विभाषा] produces @deva[अचकास्]/@deva[अचकार्]/@deva[अचकाद्] as alternative forms. The optionality allows stylistic variation.
"""

advanced = """
The @deva[सेः] context identifies the 2nd singular ending. The triple option (@deva[स्] retained, or @deva[द्], or @deva[रु]) creates variant paradigm forms. The @deva[रु]-option connects to the general @deva[रुत्व] of @deva[स्]-finals.
"""

id = "8.2.4"
numericId = "82004"

[en]
simple = """
An @deva[अनुदात्त] (grave) vowel becomes @deva[स्वरित] (circumflex) when following a semivowel that replaced an @deva[उदात्त] or @deva[स्वरित] vowel. @deva[प्रैति] = @deva[प्र] + @deva[एति].
"""

standard = """
@deva[अनुदात्त] → @deva[स्वरित] after @deva[यण्] (semivowel) that substituted @deva[उदात्त]/@deva[स्वरित]. @deva[इ]/@deva[उ]/@deva[ऋ]/@deva[ऌ] → @deva[य्]/@deva[व्]/@deva[र्]/@deva[ल्] (with accent), then following @deva[अनुदात्त] takes @deva[स्वरित]. @deva[प्रैति], @deva[द्यौः] show this pattern.
"""

advanced = """
@deva[स्वरित]-@deva[आदेश] for @deva[अनुदात्त] following @deva[यण्]-substitute of @deva[उदात्त]/@deva[स्वरित]. The semivowel (@deva[यण्]) 'transfers' high accent to the following vowel as @deva[स्वरित]. @deva[प्र] + @deva[एति] → @deva[प्रैति] (@deva[ए] is @deva[स्वरित]). This accent-spreading rule shapes Vedic prosody.
"""

id = "8.2.86"
numericId = "82086"

[en]
simple = """
A prosodially long vowel (except @deva[ऋ]) can become @deva[प्लुत] even if not sentence-final. Example: @deva[हे३] becomes prolonged.
"""

standard = """
Long vowels (@deva[गुरु]) other than @deva[ऋ] may take @deva[प्लुत] substitution in the calling contexts, even in non-final position. The @deva[एकैकस्य] indicates one vowel at a time. This allows mid-word @deva[प्लुत] in address forms.
"""

advanced = """
The @deva[गुरोरनृतः] condition restricts @deva[प्लुत] to @deva[गुरु] (heavy) syllables, excluding @deva[ऋ]. The @deva[एकैक] specification prevents multiple simultaneous @deva[प्लुत]s. This creates the characteristic prolonged address forms.
"""

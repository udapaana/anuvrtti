id = "8.2.3"
numericId = "82003"

[en]
simple = """
Exception: the rule replacing @deva[दस्] of @deva[अदस्] with @deva[मु] (@ref[8.2.80]) is NOT treated as @deva[असिद्ध]. @deva[अमुष्य] shows the @deva[मु]-replacement as fully operative.
"""

standard = """
@deva[अदसो] @deva[असेर्दादु] @deva[दो] @deva[मः] (@ref[8.2.80]) is not @deva[असिद्ध]. The @deva[मु]-substitute for @deva[दस्] in @deva[अदस्] is treated as fully applied. @deva[अमुष्य], @deva[अमूषाम्] show the substitution operative for further rules.
"""

advanced = """
Exception to @deva[असिद्धत्व]: @ref[8.2.80] (@deva[दस्] → @deva[मु] in @deva[अदस्]) is @deva[सिद्ध] (operative). @deva[अमुष्य], @deva[अमूषाम्] demonstrate: the @deva[मु]-replacement is visible to subsequent rules. This exception ensures proper @deva[प्रत्यय]-application to the @deva[अदस्]-stem.
"""

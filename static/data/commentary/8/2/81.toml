id = "8.2.81"
numericId = "82081"

[en]
simple = """
In plural forms of @deva[अदस्], the @deva[ए] after @deva[द्] becomes @deva[ई], and @deva[द्] becomes @deva[म्]. Example: @deva[अमी] 'those'.
"""

standard = """
For plural reference, @deva[अदस्] changes @deva[ए] (after @deva[द्]) to @deva[ई] and @deva[द्] to @deva[म्], yielding @deva[अमी] (nominative plural). This builds on the previous rule's pattern but with @deva[ई] for plurality. The form represents 'those' (masculine/feminine @deva[बहुवचन] (plural)).
"""

advanced = """
The @deva[बहुवचने] condition specifies plural context. The @deva[ए]→@deva[ई] change distinguishes plural from singular/dual (where @deva[उ]/@deva[ऊ] apply). The complete paradigm shows @deva[अमी] (m.pl.), @deva[अमूः] (f.pl.), @deva[अमूनि] (n.pl.).
"""

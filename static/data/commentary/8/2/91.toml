id = "8.2.91"
numericId = "82091"

[en]
simple = """
In sacrifice, the first syllable of @deva[ब्रूहि], @deva[प्रेष्य], @deva[श्रौषट्], and @deva[आवह] becomes @deva[प्लुत]. Example: @deva[ब्रू३हि].
"""

standard = """
During @deva[यज्ञकर्म], these four ritual calls take @deva[प्लुत] on their initial syllable: @deva[ब्रू३हि] (speak!), @deva[प्रे३ष्य] (impel!), @deva[श्रौ३षट्] (may he hear!), @deva[आ३वह] (bring!). These are priest-to-priest communications in the sacrifice.
"""

advanced = """
The @deva[यज्ञकर्मणि] @deva[आद्युदात्त] applies specifically to these four ritual imperatives. The @deva[आदि] (initial) syllable @deva[प्लुत] distinguishes these from ordinary usage. Each term has specific ritual function in the @deva[यज्ञ] procedure.
"""

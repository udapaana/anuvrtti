id = "8.2.11"
numericId = "82011"

[en]
simple = """
The @deva[म्] of @deva[मत्] becomes @deva[व्] when the resulting word is a proper name. @deva[आहीवती], @deva[कपीवती] — names with @deva[मत्] → @deva[वत्].
"""

standard = """
@deva[संज्ञा] (proper name) + @deva[मत्] → @deva[म्]→@deva[व्]. @deva[आहीवती], @deva[कपीवती], @deva[ऋषीवती], @deva[सुनीवती] are names with @deva[व्]-substitution. Long vowel by @ref[6.3.120].
"""

advanced = """
@deva[व्]-@deva[आदेश] for @deva[मत्]-@deva[म्] in @deva[संज्ञा]-@deva[कार्य] (name formation). @deva[आहीवती], @deva[कपीवती], @deva[ऋषीवती] show @deva[व्] where regular rules might give @deva[म्]. The name-context overrides normal phonological conditioning. @deva[ई]-@deva[दीर्घ] per @ref[6.3.120] also applies.
"""

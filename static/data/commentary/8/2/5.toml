id = "8.2.5"
numericId = "82005"

[en]
simple = """
When an @deva[अनुदात्त] vowel combines with an @deva[उदात्त] vowel (@deva[एकादेश]), the result is @deva[उदात्त]. @deva[अ॒] + @deva[आ꣡] = @deva[आ꣡] (accented).
"""

standard = """
@deva[अनुदात्त] + @deva[उदात्त] → @deva[एकादेश] is @deva[उदात्त]. When sandhi combines unaccented and accented vowels, the single substitute retains the acute. @deva[क॒] + @deva[ऐ꣡] = @deva[कै꣡] shows @deva[उदात्त] result.
"""

advanced = """
@deva[एकादेश]-@deva[स्वर]: @deva[अनुदात्त] + @deva[उदात्त] combination yields @deva[उदात्त] single substitute. The acute accent prevails in vowel sandhi. @deva[क॒] + @deva[ऐ꣡] → @deva[कै꣡]; @deva[ग॒] + @deva[ओ꣡] → @deva[गो꣡]. This preserves lexically significant accent through sandhi.
"""

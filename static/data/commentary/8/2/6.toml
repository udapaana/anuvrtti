id = "8.2.6"
numericId = "82006"

[en]
simple = """
When an @deva[अनुदात्त] vowel at word-beginning combines with @deva[उदात्त], the result is optionally @deva[स्वरित] or @deva[उदात्त]. @deva[वनेऽत्र] or @deva[वन] @deva[एत्र].
"""

standard = """
@deva[पदादि]-@deva[अनुदात्त] + @deva[उदात्त] → optional @deva[स्वरित]/@deva[उदात्त] @deva[एकादेश]. Word-initial position creates optionality. @deva[वनेऽत्र] (@deva[स्वरित]) or @deva[वनएत्र] (@deva[उदात्त]) both valid.
"""

advanced = """
@deva[विभाषा] for @deva[पदादि]-@deva[अनुदात्त] + @deva[उदात्त] @deva[एकादेश]: either @deva[स्वरित] or @deva[उदात्त]. The word-initial position of the @deva[अनुदात्त] creates optionality absent in non-initial positions (@ref[8.2.5]). @deva[वनेऽत्र], @deva[वृक्षेऽत्र] show optional accent patterns.
"""

id = "8.2.16"
numericId = "82016"

[en]
simple = """
In Vedic, @deva[मत्] receives @deva[नुट्] augment after @deva[अन्]-final stems. @deva[अक्षण्वन्तः], @deva[कर्णवन्तः].
"""

standard = """
Vedic: @deva[अन्]-@deva[अन्त] + @deva[मत्] → @deva[नुट्]-@deva[आगम]. @deva[अक्षन्] + @deva[मत्] → @deva[अक्षण्वन्तः] 'having eyes', @deva[कर्णवन्तः] 'having ears'. The @deva[न्]-augment appears in @deva[छन्दस्].
"""

advanced = """
@deva[छान्दस] @deva[नुट्]-@deva[आगम] for @deva[मत्] after @deva[अन्]-@deva[अन्त] (@deva[न्]-final stems). @deva[अक्षण्वन्तः], @deva[कर्णवन्तः], @deva[अस्थन्वन्तम्] show @deva[न्] inserted before @deva[मत्]. Classical Sanskrit lacks this augmentation; it's Vedic-specific.
"""

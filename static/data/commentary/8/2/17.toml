id = "8.2.17"
numericId = "82017"

[en]
simple = """
In Vedic, the affixes @deva[तर] and @deva[तम] receive @deva[नुट्] after @deva[न्]-final stems. @deva[सुपथिन्तरः], @deva[सुपथिन्तमः].
"""

standard = """
Vedic: @deva[न्]-@deva[अन्त] + @deva[तरप्]/@deva[तमप्] → @deva[नुट्]-@deva[आगम]. @deva[सुपथिन्] + @deva[तर] → @deva[सुपथिन्तरः] 'better path', @deva[सुपथिन्तमः] 'best path'. The @deva[घ]-affixes take @deva[नुट्] in @deva[छन्दस्].
"""

advanced = """
@deva[छान्दस] @deva[नुट्]-@deva[आगम] for @deva[घ] (@deva[तरप्]/@deva[तमप्]) after @deva[न्]-@deva[अन्त]. @deva[सुपथिन्तरः], @deva[सुपथिन्तमः] show comparative/superlative with @deva[न्]-augment. @deva[तरप्] and @deva[तमप्] are called @deva[घ] (per @ref[1.1.22]). Vedic preserves this archaic augmentation.
"""

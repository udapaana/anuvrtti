id = "8.2.77"
numericId = "82077"

[en]
simple = """
Before consonant-initial affixes, @deva[इ] or @deva[उ] before root-final @deva[र्]/@deva[व्] is lengthened. Example: √@deva[स्तृ] → @deva[स्तीर्ण] 'spread'.
"""

standard = """
The penultimate @deva[इ]/@deva[उ] of @deva[र्]/@deva[व्]-final roots lengthens before @deva[हल्]-initial (consonant-beginning) affixes. Examples: @deva[स्तृ]→@deva[स्तीर्ण], @deva[गुर्]→@deva[गूर्ण], @deva[शीर्]→@deva[विशीर्ण]. This applies to verbal and participial formations.
"""

advanced = """
The @deva[हलि] condition triggers @deva[उपधादीर्घ] before consonantal suffixes. This complements the @deva[पदान्त] lengthening of the previous rule. Together they ensure the root vowel is long in these phonological contexts.
"""

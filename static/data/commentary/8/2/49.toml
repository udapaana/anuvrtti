id = "8.2.49"
numericId = "82049"

[en]
simple = """
The root @deva[दिव्] 'to play' takes @deva[न्] for participial @deva[त्], except when meaning 'gambling'. Example: @deva[द्यून] 'sported'.
"""

standard = """
The @[niṣṭhā] of √@deva[दिव्] (@deva[द्यु]) becomes @deva[न्] as in @deva[द्यून], but not when the context is gambling (@deva[विजिगीषा] 'desire to win'). In gambling contexts, the regular form @deva[द्यूत] is used. This semantic distinction affects morphology.
"""

advanced = """
The @deva[देवने] @deva[नेति] exception preserves @deva[द्यूत] in gambling contexts while allowing @deva[द्यून] in general 'play' meanings. The @deva[विजिगीषा] reference indicates the competitive/wagering sense where standard @deva[त्]-form applies.
"""

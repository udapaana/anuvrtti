id = "8.2.19"
numericId = "82019"

[en]
simple = """
The @deva[र्] of a preposition becomes @deva[ल्] when @deva[अयते] follows. @deva[प्र] + @deva[अयते] → @deva[प्लायते] 'flees'.
"""

standard = """
@deva[उपसर्ग]-@deva[र्] + @deva[अयते] → @deva[ल्]-@deva[आदेश]. @deva[परा] + @deva[अयते] → @deva[पलायते] 'flees', @deva[प्र] + @deva[अयते] → @deva[प्लायते]. The @deva[र्]→@deva[ल्] occurs specifically before @deva[अयते].
"""

advanced = """
@deva[ल्]-@deva[आदेश] for @deva[उपसर्ग]-@deva[र्] before @deva[अयते]. @deva[पलायते] (@deva[परा] + @deva[अय]), @deva[प्लायते] (@deva[प्र] + @deva[अय]) show the change. The question arises whether @deva[अयति] qualifies @deva[र्] or @deva[उपसर्ग]—the rule applies to prefix-final @deva[र्] before this specific verb form.
"""

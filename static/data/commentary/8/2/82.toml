id = "8.2.82"
numericId = "82082"

[en]
simple = """
Until the end of this section, rules concern @deva[प्लुत] (prolonged) vowels with @deva[उदात्त] (acute) accent at sentence-end.
"""

standard = """
This @deva[अधिकार] establishes that remaining rules in this @deva[पाद] concern @deva[प्लुत]-vowel substitution with @[udātta] accent for sentence-final vowels. The @deva[प्लुत] is a prolonged vowel (3 moras) marked with @deva[३].
"""

advanced = """
The @deva[प्लुतः] @deva[प्रग्राह्यः] @deva[अचो] @deva[अन्त्यात्] @deva[पदात्] @deva[परः] @[adhikāra] governs @ref[8.2.83]-108. The @deva[प्लुत] (trimoraic prolongation) and @deva[उदात्त] accent apply to final vowels in specific pragmatic contexts (calling, responding, etc.).
"""

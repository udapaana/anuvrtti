id = "8.2.28"
numericId = "82028"

[en]
simple = """
@deva[स्] drops after @deva[इट्] augment if @deva[ईट्] augment follows. Aorist of @deva[लू]: @deva[अलाविस्] + @deva[ईट्] → @deva[स्]-lopa → @deva[अलावीत्].
"""

standard = """
@deva[इट्] + @deva[स्] + @deva[ईट्] → @deva[स्]-@deva[लोप]. @deva[लू]-aorist: @deva[अलाविस्] + @deva[ईट्] → @deva[अलावि] + @deva[ईट्] → @deva[अलावीत्।] The sibilant between the two augments deletes.
"""

advanced = """
@deva[स्]-@deva[लोप] in @deva[इट्]-@deva[स्]-@deva[ईट्] sequence. Aorist derivation: @deva[लू] → @deva[अलाविष्ट्] (with @deva[इट्], @deva[ईट्] per @ref[3.1.44], @ref[7.2.35]). The @deva[स्] (from @deva[सिच्]) deletes when sandwiched between @deva[इट्] (@deva[इ]) and @deva[ईट्] (@deva[ई]) augments.
"""

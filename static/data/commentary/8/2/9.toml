id = "8.2.9"
numericId = "82009"

[en]
simple = """
The @deva[म्] of the affix @deva[मत्] becomes @deva[व्] after stems ending in @deva[म्], @deva[अ]/@deva[आ], or having these in penultimate position—but not after @deva[ई]. @deva[श्रीमत्] stays, but @deva[भगवत्] (from @deva[भग] + @deva[मत्]).
"""

standard = """
@deva[मत्]-@deva[म्] → @deva[व्] after: @deva[म्]-@deva[अन्त], @deva[अ]/@deva[आ]-@deva[अन्त], or @deva[म्]/@deva[अ]/@deva[आ]-@deva[उपधा] stems (excluding @deva[ई]-@deva[अन्त]). @deva[भग] + @deva[मत्] → @deva[भगवत्], @deva[यशस्] + @deva[मत्] → @deva[यशस्वत्।] But @deva[श्री] + @deva[मत्] → @deva[श्रीमत्] (@deva[ई] blocks).
"""

advanced = """
@deva[व्]-@deva[आदेश] for @deva[मत्]-@deva[म्] when @deva[अङ्ग] ends in @deva[म्]/@deva[अ]/@deva[आ] or has these as @deva[उपधा], excluding @deva[ई]-@deva[अन्त]. @deva[भगवत्] (@deva[भग]), @deva[यशस्वत्] (@deva[यशस्]), @deva[विद्वत्]/@deva[विद्वान्] (@deva[विद्]). But @deva[श्रीमत्], @deva[लक्ष्मीमत्] retain @deva[म्] after @deva[ई]. This shapes possessive adjective formation.
"""

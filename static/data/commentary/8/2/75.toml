id = "8.2.75"
numericId = "82075"

[en]
simple = """
Root-final @deva[द्] optionally becomes @deva[द्] (no change) or @deva[रु] before the ending @deva[सि] at word-end. Example: @deva[अभिनत्] or @deva[अभिनर्].
"""

standard = """
Before @deva[सि], @[dhātu-final] @deva[द्] optionally takes @deva[रु]-substitution or remains unchanged. Thus forms like @deva[अभिनद्]+@deva[सि] yield @deva[अभिनत्]/@deva[अभिनर्] (with visarga before pause). The option applies to @deva[द्]-final roots.
"""

advanced = """
This extends the preceding rule's optionality to @deva[द्]-finals. The @deva[रु]-option for @deva[द्] is unusual and creates the @deva[र्]-visarga alternant. Both forms are grammatically valid in the relevant verbal paradigms.
"""

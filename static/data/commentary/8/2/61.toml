[en]
simple = """
In the Vedas, irregular participles include @deva[नसत्त], @deva[निषत्त], @deva[अनुत्त], @deva[प्रतूर्त], @deva[सूर्त], and @deva[गूर्त]. These are archaic formations.
"""

standard = """
The Chandas preserves these irregular kta-participles: @deva[नसत्त] (√@deva[सद्] with @deva[न]), @deva[निषत्त] (√@deva[सद्] with @deva[नि]), @deva[अनुत्त] (√@deva[वद्] with @deva[अ] negative), @deva[प्रतूर्त] (√@deva[तुर्]), @deva[सूर्त] (√@deva[सुर्]), @deva[गूर्त] (√@deva[गुर्]). These forms differ from classical Sanskrit norms.
"""

advanced = """
These Vedic @[nipātanas] show archaic morphology not predictable by standard rules. The forms preserve older participial formations, some with irregular @deva[त्]-retention or unique vowel grades. They function as authorities for Vedic usage only.
"""

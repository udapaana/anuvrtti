id = "8.2.106"
numericId = "82106"

[en]
simple = """
When diphthongs @deva[ए]/@deva[ओ] become @deva[प्लुत], their second element (@deva[इ]/@deva[उ]) is prolonged. Example: @deva[ए] → @deva[अइ३], @deva[ओ] → @deva[अउ३].
"""

standard = """
For the diphthongs @deva[ए], @deva[ऐ], @deva[ओ], @deva[औ], the @deva[प्लुत] applies to the final component (@deva[इ] or @deva[उ]). Thus @deva[ए] becomes @deva[अइ३], @deva[ओ] becomes @deva[अउ३]. The diphthong is analyzed as @deva[अ]+@deva[इ] or @deva[अ]+@deva[उ], and the second element takes the prolongation.
"""

advanced = """
The @deva[एदोतः] @deva[अन्त्यस्य] condition specifies that in diphthong @deva[प्लुत], the @deva[उत्तरस्य] (latter) element—the @deva[इ] or @deva[उ] component—receives the trimoraic extension. This phonetic analysis underlies Vedic recitation practice.
"""

id = "8.2.93"
numericId = "82093"

[en]
simple = """
The particle @deva[हि] at the end of an answer optionally becomes @deva[प्लुत]. Example: @deva[अकार्षं] @deva[ही३] or @deva[अकार्षं] @deva[हि].
"""

standard = """
When @deva[हि] appears sentence-finally in an answer to a question, it may optionally take @deva[प्लुत]. Thus to 'Did you make the mat?' one may answer @deva[अकार्षं] @deva[ही३] or @deva[अकार्षं] @deva[हि।] The @deva[विभाषा] allows either form.
"""

advanced = """
The @deva[प्रतिवचने] @deva[वा] condition identifies the answering context. The optional @deva[प्लुत] on @deva[हि] adds emphasis or confirmation to the response. This pragmatic optionality reflects conversational variation.
"""

id = "8.2.39"
numericId = "82039"

[en]
simple = """
At word-end, hard consonants become their corresponding soft unaspirated forms (@deva[ज्], @deva[ब्], @deva[ग्], @deva[ड्], @deva[द्]). Example: @deva[वाच्] → @deva[वाग्] 'speech'.
"""

standard = """
All obstruents (@deva[झल्]) at @deva[पदान्त] are replaced by the corresponding third-class consonant (@deva[जश्]): @deva[क्]→@deva[ग्], @deva[च्]→@deva[ज्], @deva[ट्]→@deva[ड्], @deva[त्]→@deva[द्], @deva[प्]→@deva[ब्]. Examples: @deva[वाक्]→@deva[वाग्], @deva[सम्राज्]→@deva[सम्राट्] (→@deva[सम्राड्] before voiced), @deva[विद्युत्]→@deva[विद्युद्].
"""

advanced = """
The @deva[जश्त्व] rule (@deva[जशः] replacement) is fundamental to @deva[पद]-final phonology. It devoices aspirates and voices all obstruents. This feeds into subsequent sandhi rules. The @deva[झलां] context means all stops and sibilants undergo this neutralization.
"""

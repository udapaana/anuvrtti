id = "8.2.31"
numericId = "82031"

[en]
simple = """
@deva[ह्] becomes @deva[ढ्] before hard consonants and at word-end. This applies after vowels other than @deva[अ]/@deva[आ]. Example: @deva[सह्] → @deva[सोढा] 'having endured'.
"""

standard = """
The sibilant @deva[ह्] is replaced by the voiced aspirate retroflex @deva[ढ्] when followed by @deva[झल्] consonants or at @deva[पद]-final position. The condition requires a preceding non-@deva[अ] vowel. Forms: @deva[सोढा], @deva[सोढुम्], @deva[सोढव्यम्] from √@deva[सह्].
"""

advanced = """
This @deva[ढत्व] rule (@deva[ढो] @deva[ढे] @deva[लोपः] @ref[8.3.13] being asiddha here) applies to final @deva[ह्] after non-@deva[अ] vowels. The @deva[ढ्] then undergoes further changes per subsequent rules. The @deva[झल्] context excludes nasals and semivowels, targeting only obstruents.
"""

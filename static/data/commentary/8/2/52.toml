id = "8.2.52"
numericId = "82052"

[en]
simple = """
The root @deva[पच्] 'to cook' takes @deva[व्] instead of @deva[त्] for the participle. Example: @deva[पक्वः] 'cooked, ripe'.
"""

standard = """
The @[niṣṭhā] affix after √@deva[पच्] becomes @deva[व्] rather than @deva[त्]. This produces @deva[पक्वः], @deva[पक्ववान्] 'cooked, ripened, mature'. The @deva[क्व] form is distinctive and common in Sanskrit.
"""

advanced = """
The @deva[वः] substitution creates the characteristic @deva[पक्व] form. Despite the irregular affix, the form functions as a standard kta-participle. The meaning extends from 'cooked' to 'ripe' and metaphorically to 'mature' or 'experienced'.
"""

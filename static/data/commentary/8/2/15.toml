id = "8.2.15"
numericId = "82015"

[en]
simple = """
In Vedic, @deva[म्] of @deva[मत्] becomes @deva[व्] after stems ending in @deva[इ]/@deva[ई] or @deva[र्]. @deva[हरिवान्], @deva[मातरिवान्] (Vedic forms).
"""

standard = """
Vedic: @deva[इ]/@deva[ई]/@deva[र्]-@deva[अन्त] + @deva[मत्] → @deva[म्]→@deva[व्]. @deva[हरिवान्] (from @deva[हरि]), @deva[मातरिवान्] (from @deva[मातृ]). @deva[छन्दस्] allows this substitution not found in classical Sanskrit.
"""

advanced = """
@deva[छान्दस] @deva[व्]-@deva[आदेश] for @deva[मत्]-@deva[म्] after @deva[इ]/@deva[ई]-@deva[अन्त] and @deva[र्]-@deva[अन्त] (@deva[रेफ]-final). @deva[हरिवान्], @deva[रातिवान्] (@deva[इ]-final); @deva[मातरिवान्], @deva[भ्रातरिवान्] (@deva[र्]-final). Classical Sanskrit would retain @deva[म्] in these contexts; Vedic allows @deva[व्].
"""

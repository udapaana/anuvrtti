id = "8.2.60"
numericId = "82060"

[en]
simple = """
The word @deva[ऋण] 'debt' is formed irregularly from √@deva[ऋ] with @deva[न्] for @deva[त्]. Example: @deva[ऋणम्] 'debt'.
"""

standard = """
The participle from √@deva[ऋ] 'to go' takes irregular @deva[न्]-substitution specifically in the meaning 'debt'. The terms @deva[अधमर्ण] 'debtor' and @deva[उत्तमर्ण] 'creditor' derive from this. The formation is a @[nipātana].
"""

advanced = """
The @deva[ऋणे] restriction limits this @deva[नत्व] to the 'debt' sense. The compound analysis: @deva[अधमः] @deva[ऋणे] 'inferior in debt' = debtor; @deva[उत्तमः] @deva[ऋणे] 'superior in debt' = creditor. The irregular formation preserves the specialized term.
"""

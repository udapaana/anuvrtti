id = "8.2.84"
numericId = "82084"

[en]
simple = """
When calling someone from a distance, the final vowel becomes @deva[प्लुत] with acute accent. Example: @deva[देवदत्ता३].
"""

standard = """
Distance-calling (@deva[दूरात्]) triggers @deva[प्लुत] and @[udātta] on the sentence-final vowel. The prolongation carries the voice over distance. Examples: @deva[हे] @deva[देवदत्ता३], @deva[भो] @deva[गाो३।] The acoustic function is to project the call.
"""

advanced = """
The @deva[दूरात्] @deva[आह्वाने] condition specifies the pragmatic context. The @deva[प्लुत] (@deva[३] symbol) indicates trimoraic length for carrying power. This is one of several address-related @deva[प्लुत] rules.
"""

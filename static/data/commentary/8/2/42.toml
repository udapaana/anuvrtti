id = "8.2.42"
numericId = "82042"

[en]
simple = """
After @deva[र्] and @deva[द्], the participial @deva[त्] becomes @deva[न्], and preceding @deva[द्] also becomes @deva[न्]. Example: @deva[छर्द्] + @deva[त] → @deva[छन्न] 'vomited'.
"""

standard = """
Following @deva[र्] or @deva[द्], the @deva[त्] of @[niṣṭhā] affixes (@deva[क्त], @deva[क्तवतु]) becomes @deva[न्]. When preceded by @deva[द्], that @deva[द्] also becomes @deva[न्]. Thus: @deva[छर्द्]+@deva[त]→@deva[छर्न्न]→@deva[छन्न], @deva[आर्द्]+@deva[त]→@deva[आर्न्न]→@deva[आर्द्र]→@deva[आर्न] (via further rules).
"""

advanced = """
The @deva[रदाभ्यां] condition creates the characteristic @deva[न्न] sequence in participles. The @deva[द्] preceding the affix also assimilates to @deva[न्]. This double @deva[नत्व] (both @deva[द्]→@deva[न्] and @deva[त्]→@deva[न्]) distinguishes these forms from simple @deva[त]→@deva[न] substitution.
"""

id = "8.2.67"
numericId = "82067"

[en]
simple = """
The nominative forms of @deva[अवयाः], @deva[श्वेतवाः], and @deva[पुरोडाः] also take the @deva[रु] substitution.
"""

standard = """
These three nominative singular forms—@deva[अवयाः] (from @deva[अव]+@deva[यज्]), @deva[श्वेतवाः] (from @deva[श्वेत]+@deva[वह्]), @deva[पुरोडाः] (from @deva[पुरस्]+@deva[दा])—undergo the same @deva[रुत्व] as regular @deva[स्]-finals. They become @deva[अवयार्], @deva[श्वेतवार्], @deva[पुरोडार्] in sandhi.
"""

advanced = """
These forms derive from @deva[क्विन्]-stems with irregular nominatives. The rule extends @deva[रुत्व] to their @deva[आस्]-endings despite the unusual formation. Each compound has specialized ritual or descriptive meaning.
"""

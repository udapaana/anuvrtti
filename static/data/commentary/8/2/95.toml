id = "8.2.95"
numericId = "82095"

[en]
simple = """
In a repeated vocative expressing threat, the final syllable becomes @deva[प्लुत]. Example: @deva[देवदत्त] @deva[देवदत्ता३].
"""

standard = """
When a vocative is repeated (@deva[आम्रेडित]) to express threat (per @ref[8.1.8]), the final syllable of the second occurrence takes @deva[प्लुत]. Thus @deva[देवदत्त] @deva[देवदत्ता३] conveys threatening address. The prolongation intensifies the menace.
"""

advanced = """
The @deva[तर्जने] @deva[आम्रेडितस्य] condition links to @ref[8.1.8] (vocative repetition for threat). The @deva[प्लुत] falls on the repeated vocative's end, marking the threatening prosody. This creates a distinctive warning intonation.
"""

id = "8.2.23"
numericId = "82023"

[en]
simple = """
When a word ends in a double consonant, the last consonant drops. @deva[गोमान्त्] → @deva[गोमान्], @deva[कृतवान्त्] → @deva[कृतवान्].
"""

standard = """
@deva[संयुक्त]-@deva[अन्त] @deva[पद] → @deva[अन्त्य]-@deva[व्यञ्जन]-@deva[लोप]. @deva[गोमान्त्] → @deva[गोमान्], @deva[यवमान्त्] → @deva[यवमान्], @deva[कृतवान्त्] → @deva[कृतवान्।] Final cluster reduces to single consonant.
"""

advanced = """
@deva[अन्त्य]-@deva[लोप] for @deva[पद]-@deva[अन्त] @deva[संयुक्त] (final conjunct). @deva[गोमान्], @deva[यवमान्], @deva[कृतवान्], @deva[हतवान्] show final @deva[त्]-elision. In @deva[श्रेयान्], @deva[भूयान्], the @deva[र्] + @deva[उ] (@deva[रु]-@deva[आगम]) still counts, so @deva[न्] drops. This shapes word-final phonology.
"""

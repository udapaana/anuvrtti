numericId = "82094"

[en]
simple = """
When reasserting something after refutation, the final syllable optionally becomes @deva[प्लुत], expressing censure.
"""

standard = """
In debate (@deva[वाद]), when the victor reasserts a position that was wrongly refuted (@deva[निग्रह]), the sentence-final syllable optionally takes @deva[प्लुत]. This marks the triumphant restatement with implied censure of the opponent.
"""

advanced = """
The @deva[निगृहीतस्य] @deva[प्रत्याख्याने] context is from @deva[शास्त्रार्थ] (philosophical debate). The @deva[प्लुत] signals the speaker's vindication. The optional nature allows stylistic choice in expressing the rebuttal's force.
"""

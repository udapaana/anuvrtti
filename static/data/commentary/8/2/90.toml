id = "8.2.90"
numericId = "82090"

[en]
simple = """
The final vowel of @deva[याज्या] mantras in sacrifice becomes @deva[प्लुत] with acute accent. Example: ...@deva[अग्नये३].
"""

standard = """
Mantras designated as @deva[याज्या] (offerings) in sacrificial ritual take @deva[प्लुत] and @[udātta] on their final vowel. These are specific verses used during offering. Example: @deva[स्तोमैर्विधेमाग्नये३।]
"""

advanced = """
The @deva[याज्याः] condition identifies a specific mantra category used during ritual offerings. The @deva[प्लुत]+@deva[उदात्त] marks these utterances for their ritual function, distinguishing them from other mantra types.
"""

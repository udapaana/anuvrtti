id = "8.2.7"
numericId = "82007"

[en]
simple = """
Final @deva[न्] of a nominal stem (@deva[पद]) is deleted. @deva[राजन्] + @deva[सु] → @deva[राजा] (@deva[न्] drops). This is the main @deva[न]-@deva[लोप] rule.
"""

standard = """
@deva[प्रातिपदिक]-@deva[अन्त]-@deva[न्] (in @deva[पद] context) → @deva[लोप]. @deva[राजन्] + @deva[सु] → @deva[राजा], @deva[आत्मन्] + @deva[सु] → @deva[आत्मा।] The stem-final nasal deletes before case endings. @deva[पदस्य] (@ref[8.1.16]) provides the @deva[पद] context.
"""

advanced = """
@deva[न]-@deva[लोप] for @deva[पद]-@deva[भूत] @deva[प्रातिपदिकान्त]-@deva[न्]. @deva[राजन्] → @deva[राजा], @deva[ब्रह्मन्] → @deva[ब्रह्मा], @deva[आत्मन्] → @deva[आत्मा।] The @deva[पद] status (per @ref[1.4.14]-17, @deva[सुप्तिङन्तम्]) conditions elision. This shapes the characteristic nominative singular of @deva[न]-stems.
"""

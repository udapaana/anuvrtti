id = "8.2.22"
numericId = "82022"

[en]
simple = """
The @deva[र्] of @deva[परि] optionally becomes @deva[ल्] before @deva[घ] and @deva[अङ्क]. @deva[परिघः] or @deva[पलिघः], @deva[पर्यङ्कः] or @deva[पल्यङ्कः].
"""

standard = """
@deva[परि] + @deva[घ]/@deva[अङ्क] → optional @deva[र्]→@deva[ल्]. @deva[परिघः] 'iron bar' or @deva[पलिघः], @deva[पर्यङ्कः] 'bed' or @deva[पल्यङ्कः।] @deva[विभाषा] with these specific following elements.
"""

advanced = """
@deva[विभाषा] for @deva[परि]-@deva[र्]→@deva[ल्] before @deva[घ] (the word @deva[घ], not affix) and @deva[अङ्क]. @deva[परिघः]/@deva[पलिघः], @deva[पर्यङ्कः]/@deva[पल्यङ्कः] show optional alternation. @deva[घ] here means the word-form @deva[घ] (iron bar), not the grammatical term.
"""

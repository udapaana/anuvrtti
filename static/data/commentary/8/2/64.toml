id = "8.2.64"
numericId = "82064"

[en]
simple = """
At word-end, the final @deva[म्] of a root becomes @deva[न्]. Example: √@deva[शम्] → @deva[प्रशान्] 'calmed'.
"""

standard = """
Root-final @deva[म्] is replaced by @deva[न्] at @deva[पदान्त]. With @deva[क्विप्]-affix forms: @deva[शम्]→@deva[प्रशान्], @deva[तम्]→@deva[प्रतान्], @deva[दम्]→@deva[प्रदान्]. This @deva[नत्व] applies specifically to @deva[धातु]-final @deva[म्], not nominal stems.
"""

advanced = """
The @deva[धातोः] condition restricts this substitution to verbal roots. The resulting @deva[न्] then undergoes regular sandhi. This @deva[नत्व] is distinct from other @deva[म्]→@deva[न्] changes and applies in the @[tripādi]'s @deva[पूर्वत्रासिद्ध] domain.
"""

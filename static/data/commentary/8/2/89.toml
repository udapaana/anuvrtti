id = "8.2.89"
numericId = "82089"

[en]
simple = """
In sacrifice, @deva[ओ३म्] replaces the final vowel and any following consonant of a sentence. Example: ...@deva[स्वाहो३म्].
"""

standard = """
During @deva[यज्ञकर्म], sentence-final vowel plus any following consonant is replaced by @deva[ओ३म्]. This creates ritual endings like ...@deva[स्वाहो३म्।] The substitution is a comprehensive sentence-final marker.
"""

advanced = """
The @deva[यज्ञकर्मणि] @deva[ओमो३म्] rule replaces @deva[अन्त्यस्याचः] @deva[सहित] with @deva[प्लुत] @deva[ओम्]. This ritual transformation affects the sentence terminus, creating the characteristic sacrificial chant ending.
"""

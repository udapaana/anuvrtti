id = "8.2.92"
numericId = "82092"

[en]
simple = """
In orders to the @[agnīdhra] priest, both the first and second syllables become @deva[प्लुत]. Example: @deva[आ३ग्नी३ध्र].
"""

standard = """
When addressing the @deva[अग्नीध्र] priest (fire-kindler) with commands, both the initial and following syllable take @deva[प्लुत]. This double prolongation marks specific priest-address. The @deva[अग्नीध्र] is one of the principal @deva[ऋत्विज्]s.
"""

advanced = """
The @deva[अग्नीध्रप्रेषणे] @deva[उत्तरश्च] condition creates the unusual double @deva[प्लुत]. The @deva[अग्नीध्र] handles fire-related duties under the @deva[अध्वर्यु]. The distinctive calling pattern identifies this specific ritual address.
"""

id = "8.2.85"
numericId = "82085"

[en]
simple = """
When @deva[है] or @deva[हे] is used for distant calling, only @deva[है]/@deva[हे] (not the following word) gets @deva[प्लुत]. Example: @deva[है३] @deva[देवदत्त].
"""

standard = """
The interjections @deva[है] and @deva[हे] take @deva[प्लुत] themselves when used in @deva[दूरात्] @deva[आह्वान]. The following name remains unaffected. Thus @deva[है३] @deva[देवदत्त], @deva[हे३] @deva[चैत्र।] This localizes the prolongation to the call-particle.
"""

advanced = """
The @deva[है]-@deva[हयोर्वा] rule makes the interjection bear the @deva[प्लुत] rather than the name. This is pragmatically sensible—the attention-getting particle carries the prolongation while the name remains clear.
"""

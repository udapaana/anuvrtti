id = "8.2.30"
numericId = "82030"

[en]
simple = """
A palatal (@deva[च्], @deva[छ्], @deva[ज्], @deva[झ्]) becomes the corresponding guttural (@deva[क्], @deva[ख्], @deva[ग्], @deva[घ्]) before @deva[झल्]-affix or word-finally. @deva[पच्] + @deva[ता] → @deva[पक्ता], @deva[वाच्] → @deva[वाक्].
"""

standard = """
@deva[चवर्ग] → @deva[कवर्ग] before @deva[झल्]-@deva[आदि]/@deva[पद]-@deva[अन्त]. @deva[पच्] + @deva[ता] → @deva[पक्ता] 'cooker', @deva[वाच्] → @deva[वाक्] 'speech'. Palatals revert to gutturals in these positions (@deva[कुत्व]).
"""

advanced = """
@deva[कुत्व] (guttural substitution) for @deva[चवर्ग] before @deva[झल्]-@deva[आदि] @deva[प्रत्यय] or @deva[पद]-@deva[अन्त]. @deva[पक्ता], @deva[पक्तुम्], @deva[पक्तव्यम्]; @deva[वाक्] show @deva[च]→@deva[क], @deva[ज]→@deva[ग], etc. This systematic depalatalization creates characteristic stem-final and pre-affix forms.
"""

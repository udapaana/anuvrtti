id = "8.2.57"
numericId = "82057"

[en]
simple = """
The roots @deva[ध्या], @deva[ख्या], @deva[पॄ], @deva[मूर्छ्], and @deva[मद्] do not take @deva[न्] for participial @deva[त्]. Example: @deva[ध्यातः] not *@deva[ध्यानः].
"""

standard = """
Despite meeting conditions for @deva[नत्व], these five roots retain the regular @deva[त्]: @deva[ध्यातः] 'meditated', @deva[ख्यातः] 'famous', @deva[पूर्तः] 'filled', @deva[मूर्तः] 'solidified', @deva[मत्तः] 'intoxicated'. This blocks potentially expected @deva[न्]-forms.
"""

advanced = """
This prohibition (@deva[ध्याख्या]...) prevents incorrect analogies. While @deva[ध्या] begins with a conjunct containing semivowel @deva[य्] (which might trigger @ref[8.2.43]), this @deva[सूत्र] explicitly blocks @deva[नत्व]. The exception preserves traditional forms.
"""

id = "8.2.98"
numericId = "82098"

[en]
simple = """
In ordinary speech, only the first alternative's final vowel becomes @deva[प्लुत]. Example: @deva[करवाणि३] @deva[नु] @deva[करवाणि].
"""

standard = """
The previous rule's application to both alternatives is restricted to Vedic. In @deva[लोक] (common speech), only the @deva[पूर्वस्य] (first alternative) takes @deva[प्लुत]: @deva[करवाणि३] @deva[नु] @deva[करवाणि।] This is a @deva[नियम] (restriction).
"""

advanced = """
The @deva[लोके] @deva[पूर्वस्य] creates a classical Sanskrit restriction. The Vedic usage (both alternatives @deva[प्लुत]) differs from @deva[लौकिक] (ordinary) usage (only first). This @deva[नियम] standardizes deliberative prosody for classical language.
"""

id = "8.2.56"
numericId = "82056"

[en]
simple = """
The roots @deva[नुद्], @deva[विद्], @deva[उन्द्], @deva[त्रा], @deva[घ्रा], and @deva[ह्री] optionally take @deva[न्] for participial @deva[त्]. Example: @deva[नुन्नः] or @deva[नुत्तः].
"""

standard = """
These six roots permit optional @deva[नत्व] for @[niṣṭhā]: @deva[नुद्]→@deva[नुन्न]/@deva[नुत्त], @deva[विद्]→@deva[विन्न]/@deva[वित्त], @deva[उन्द्]→@deva[उन्न]/@deva[उत्त], @deva[त्रा]→@deva[त्राण]/@deva[त्रात], @deva[घ्रा]→@deva[घ्राण]/@deva[घ्रात], @deva[ह्री]→@deva[ह्रीण]/@deva[ह्रीत]. The @deva[विभाषा] allows free choice between forms.
"""

advanced = """
This @[gaṇa] of six roots (@deva[नुदविदेति]) shows optional @deva[नत्व]. The common forms include @deva[नुन्न] 'pushed', @deva[विन्न] 'known' (archaic), @deva[त्राण] 'protected', @deva[घ्राण] 'smelled'. The option provides stylistic variation.
"""

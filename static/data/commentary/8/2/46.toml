id = "8.2.46"
numericId = "82046"

[en]
simple = """
The root @deva[क्षि] 'to destroy' takes @deva[न्] for participial @deva[त्] when its vowel is lengthened. Example: @deva[क्षीणः] 'wasted away'.
"""

standard = """
When √@deva[क्षि] undergoes vowel lengthening (@deva[इ]→@deva[ई]), the @[niṣṭhā] @deva[त्] becomes @deva[न्]. This produces @deva[क्षीणः], @deva[क्षीणवान्] with the characteristic long vowel plus @deva[न्]. The lengthening condition distinguishes this from other forms of the root.
"""

advanced = """
The @deva[दीर्घः] condition specifies that @deva[नत्व] applies only when the root vowel is lengthened, which occurs in the passive/intransitive participle. Active transitive forms may differ. The @deva[क्षीण] form is common in contexts of diminishment or exhaustion.
"""

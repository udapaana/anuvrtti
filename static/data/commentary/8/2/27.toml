id = "8.2.27"
numericId = "82027"

[en]
simple = """
@deva[स्] drops before @deva[झल्]-initial affix when preceded by a short-vowel stem. @deva[अहसत्] → @deva[अहत्] (@deva[स्] after short @deva[अ], before @deva[त्]).
"""

standard = """
@deva[ह्रस्व]-@deva[अङ्ग] + @deva[स्] + @deva[झल्]-@deva[आदि] → @deva[स्]-@deva[लोप]. @deva[अहसत्] → @deva[अहत्] 'struck'. The stem-final short vowel + @deva[स्] sequence loses @deva[स्] before @deva[झल्] affix.
"""

advanced = """
@deva[स्]-@deva[लोप] when: (1) @deva[अङ्ग] ends in @deva[ह्रस्व] (short vowel), (2) followed by @deva[झल्]-initial @deva[प्रत्यय]. @deva[अहसत्] → @deva[अहत्], @deva[अमृष्ट] → @deva[अमृत्] show the pattern. The short vowel conditions sibilant deletion before stops.
"""

id = "8.2.87"
numericId = "82087"

[en]
simple = """
The vowel of @deva[ओम्] becomes @deva[प्लुत] at the beginning of a sacred text. Example: @deva[ओ३म्] @deva[अग्निमीळे].
"""

standard = """
When @deva[ओम्] begins a mantra or Vedic recitation (@deva[अभ्यादान]), its vowel takes @deva[प्लुत]. The sacred syllable is thus pronounced @deva[ओ३म्] with trimoraic length. This marks the solemn commencement of recitation.
"""

advanced = """
The @deva[अभ्यादाने] condition specifies mantra-initiation context. The @deva[ओंकार] @deva[प्लुत] is ritually significant, marking the beginning of sacred recitation. The prolongation adds solemnity to the @deva[प्रणव].
"""

id = "8.2.43"
numericId = "82043"

[en]
simple = """
Roots starting with a consonant cluster containing a semivowel and ending in @deva[आ] take @deva[न्] for participial @deva[त्]. Example: √@deva[म्ला] → @deva[म्लान] 'withered'.
"""

standard = """
When a root ends in @deva[आ] and begins with a conjunct consonant containing a semivowel (@deva[य्], @deva[र्], @deva[ल्], @deva[व्]), the @deva[त्] of @[niṣṭhā] becomes @deva[न्]. Examples: @deva[म्ला]→@deva[म्लान], @deva[ध्या]→@deva[ध्यान], @deva[स्ना]→@deva[स्नान]. The semivowel must be in the initial cluster.
"""

advanced = """
The @deva[संयोगादेः] condition requires the initial conjunct, while @deva[यणः] specifies a semivowel component. This targets roots like @deva[म्ला], @deva[ध्या], @deva[ध्रा] where the cluster structure plus @deva[आ]-ending triggers @deva[नत्व]. The @deva[आतः] restricts to @deva[आकारान्त] roots.
"""

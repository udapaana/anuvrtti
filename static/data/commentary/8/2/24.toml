id = "8.2.24"
numericId = "82024"

[en]
simple = """
Exception: when the conjunct is @deva[र्] + @deva[स्], only the @deva[स्] is dropped, not the @deva[र्]. Nom. pl. of @deva[अक्षि]: @deva[अक्षिर्स्] → @deva[अक्षाः] (not *@deva[अक्षाः] with @deva[र्]-loss).
"""

standard = """
@deva[र्] + @deva[स्] @deva[संयुक्त] → @deva[स्]-only @deva[लोप] (@deva[र्] retained). @deva[अक्षिर्स्] → *@deva[अक्षार्ः] → @deva[अक्षाः], @deva[अत्सा] for @deva[अत्सार्।] Only @deva[स्] after @deva[र्] is deleted, preserving the @deva[र्].
"""

advanced = """
Exception to @ref[8.2.23]: in @deva[र्] + @deva[स्] final cluster, only @deva[स्] undergoes @deva[लोप]. @deva[अक्षाः], @deva[अत्साः] show @deva[र्] preserved (with subsequent changes). The @deva[र्] + @deva[स्] sequence receives special treatment—@deva[र्] stays, @deva[स्] goes.
"""

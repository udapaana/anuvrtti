id = "8.2.101"
numericId = "82101"

[en]
simple = """
With the particle @deva[चित्] expressing comparison, the final vowel becomes @deva[प्लुत] and @deva[अनुदात्त]. Example: @deva[सिंह] @deva[इव] @deva[चित्३].
"""

standard = """
When @deva[चित्] is used comparatively (@deva[उपमार्थे]), the sentence-final vowel takes @deva[प्लुत] with @deva[अनुदात्त] accent. This marks comparative expressions distinctively. The prolongation emphasizes the comparison.
"""

advanced = """
The @deva[चिति] @deva[उपमार्थे] condition identifies @deva[चित्] in simile contexts. The @deva[अनुदात्त] @deva[प्लुत] prosody distinguishes comparison from other uses of @deva[चित्]. The particle adds indefinite or emphatic force to the comparison.
"""

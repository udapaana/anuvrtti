[en]
simple = """
The @deva[र्] of @deva[गॄ] becomes @deva[ल्] in the intensive. @deva[गॄ] → @deva[जेगिल्]: @deva[निजेगिल्यते] 'swallows repeatedly'.
"""

standard = """
@deva[गॄ] + @deva[यङ्] (intensive) → @deva[र्]→@deva[ल्]. @deva[निजेगिल्यते], @deva[निजेगिल्येते], @deva[निजेगिल्यन्ते।] The intensive reduplication plus @deva[ल्]-substitution creates this form.
"""

advanced = """
@deva[ल्]-@deva[आदेश] for @deva[गॄ]'s @deva[र्] in @deva[यङ्] (intensive). @deva[निजेगिल्यते] 'swallows continuously' shows @deva[गॄ] → @deva[गिल्] with intensive reduplication (@deva[जे]). The root takes @deva[यङ्] for continuous/excessive action meaning.
"""

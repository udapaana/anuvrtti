id = "8.2.40"
numericId = "82040"

[en]
simple = """
After voiced aspirates (@deva[झष्]), the consonants @deva[त्]/@deva[थ्] become @deva[ध्]. But not after the root @deva[धा]. Example: @deva[लब्ध] 'obtained'.
"""

standard = """
When @deva[त्] or @deva[थ्] follows a @deva[झष्] consonant (@deva[झ्], @deva[भ्], @deva[घ्], @deva[ढ्], @deva[ध्]), it becomes @deva[ध्]. This voice assimilation produces @deva[लब्ध] from @deva[लभ्]+@deva[त], @deva[दुग्ध] from @deva[दुह्]+@deva[त]. The @deva[दधः] exception prevents *@deva[दध्धे] for @deva[दत्ते].
"""

advanced = """
This assimilatory @deva[धत्व] ensures voice agreement between consecutive consonants. The @deva[दध]-exception (@deva[आद्दधः]) prevents the reduplicated form @deva[दध]- from triggering this change, preserving forms like @deva[दत्ते] rather than *@deva[दध्धे].
"""

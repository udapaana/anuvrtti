id = "8.2.36"
numericId = "82036"

[en]
simple = """
Final consonants of roots like @deva[व्रश्च्], @deva[सृज्], @deva[यज्] become @deva[ष्ट्] or @deva[श्]. The @deva[छ्] and @deva[श्] also become @deva[ष्ट्]. Example: @deva[वृष्टः] 'rained'.
"""

standard = """
The root-finals of @deva[व्रश्च्], @deva[भ्रस्ज्], @deva[सृज्], @deva[मृज्], @deva[यज्], @deva[राज्], @deva[भ्राज्], plus @deva[छ्] and @deva[श्] elsewhere, take @deva[ष्ट्]-substitution (or @deva[श्] in specific contexts). This produces @deva[वृष्टः], @deva[भृष्टः], @deva[सृष्टः], @deva[मृष्टः], @deva[इष्टः], @deva[विराट्], @deva[भ्राट्].
"""

advanced = """
This complex rule handles multiple root-finals before @deva[झल्]/@deva[पदान्त]. The @deva[ष्ट्] outcome involves retroflexion plus devoicing. The seven roots form a @[gaṇa] (@deva[व्रश्चादि]). The separate mention of @deva[छ्] and @deva[श्] extends the rule beyond these specific roots.
"""

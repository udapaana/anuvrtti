id = "8.2.18"
numericId = "82018"

[en]
simple = """
The @deva[र्] of root @deva[कृप्] becomes @deva[ल्]. @deva[कृप्] → @deva[क्लृप्] in forms like @deva[क्लृप्यते], @deva[कल्पते].
"""

standard = """
@deva[कृप्] → @deva[ल्]-@deva[आदेश] for @deva[र्]. The @deva[र्] (whether single or in cluster @deva[ऋ]) becomes @deva[ल्]. @deva[क्लृप्यते] 'is fit', @deva[कल्पते] 'arranges'. This shapes the root's conjugation.
"""

advanced = """
@deva[ल्]-@deva[आदेश] for @deva[कृप्]'s @deva[र्] (including @deva[ऋ]-vowel component). @deva[कृप्] → @deva[क्लृप्]: @deva[क्लृप्यते], @deva[कल्पते], @deva[कल्प्यते] demonstrate. The @deva[र्]→@deva[ल्] change is comprehensive, affecting all derivatives of this 'be fit/arrange' root.
"""

id = "8.2.34"
numericId = "82034"

[en]
simple = """
The root @deva[नह्] 'to bind' changes @deva[ह्] to @deva[ध्] before hard consonants and at word-end. Example: @deva[नद्धा] 'bound'.
"""

standard = """
Unlike the optional rule for @deva[द्रुह्] etc., @deva[नह्] obligatorily takes @deva[ध्]-substitution for its final @deva[ह्]. Forms: @deva[नद्धा], @deva[नद्धुम्], @deva[नद्धव्यम्], @deva[नद्धः]. This blocks the general @deva[ढत्व] rule.
"""

advanced = """
The @deva[नह्]-specific @deva[धत्व] is @deva[नित्य] (obligatory), contrasting with the preceding @deva[विभाषा]. The resulting @deva[नद्ध] shows the regular @deva[ह्]→@deva[ध्] followed by voice assimilation. This root's special treatment may reflect historical phonological patterns.
"""

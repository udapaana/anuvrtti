id = "8.2.37"
numericId = "82037"

[en]
simple = """
In monosyllabic roots ending in aspirates (@deva[झ्], @deva[भ्], etc.), initial @deva[ब्]/@deva[ग्]/@deva[ड्]/@deva[द्] become @deva[भ्]/@deva[घ्]/@deva[ढ्]/@deva[ध्]. Example: √@deva[बुध्] → @deva[भुत्सते] 'awakens'.
"""

standard = """
When a monosyllabic root begins with @deva[ब्], @deva[ग्], @deva[ड्], or @deva[द्] and ends in an aspirate (@deva[झष्]), the initial consonant gains aspiration before @deva[झल्]/@deva[पदान्त]. This compensatory aspiration preserves the root's aspiration feature: @deva[बुध्]→@deva[भुत्], @deva[दघ्]→@deva[धक्].
"""

advanced = """
This is Grassmann's Law in reverse—when final aspiration is lost (before @deva[झल्] or at @deva[पदान्त]), it migrates to the initial consonant. The @deva[एकाचः] condition limits this to monosyllables. The @deva[बगडदादिः] specifies which initials can receive aspiration.
"""

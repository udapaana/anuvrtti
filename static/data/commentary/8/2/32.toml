id = "8.2.32"
numericId = "82032"

[en]
simple = """
In roots beginning with @deva[द्], the @deva[ह्] becomes @deva[ध्] before hard consonants and at word-end. Example: √@deva[दह्] → @deva[दग्धा] 'burned'.
"""

standard = """
Roots with initial @deva[द्] show @deva[ध्]-substitution for final @deva[ह्] in @deva[झल्]/@deva[पद] contexts. This produces forms like @deva[दग्धा], @deva[दग्धुम्], @deva[दग्धव्यम्]. The initial @deva[द्] distinguishes these from the general @deva[ढ्]-rule of the previous sutra.
"""

advanced = """
The @deva[दादेः] condition identifies a specific root class where retroflex @deva[ढ्] would violate dissimilation expectations. The @deva[ध्]-substitution maintains dental consistency with the initial consonant, a phonological harmony principle.
"""

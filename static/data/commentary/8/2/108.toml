id = "8.2.108"
numericId = "82108"

[en]
simple = """
When followed by a vowel in @deva[संहिता], the @deva[इ]/@deva[उ] of diphthongs become @deva[य्]/@deva[व्]. Example: @deva[ए]+@deva[अ] → @deva[अय्]+@deva[अ] = @deva[अया].
"""

standard = """
In continuous speech (@deva[संहिता]), when a vowel follows these diphthong elements, @deva[इ] becomes @deva[य्] and @deva[उ] becomes @deva[व्]. Thus @deva[ते]+@deva[अत्र] → @deva[तय्]+@deva[अत्र] = @deva[तयत्र] (Vedic sandhi). This is a special Vedic pronunciation rule.
"""

advanced = """
The @deva[यणावेतावचि] @deva[संहितायाम्] rule converts the diphthong's second element to a semivowel before following vowels. This creates Vedic sandhi forms distinct from classical Sanskrit. The rule applies within the @deva[संहिता] (continuous recitation) context.
"""

id = "8.2.66"
numericId = "82066"

[en]
simple = """
Final @deva[स्] and the @deva[ष्] of @deva[ससजुष्] become @deva[रु] (@deva[र्] with visarga) at word-end. Example: @deva[अग्निः] → @deva[अग्निर्] before vowels.
"""

standard = """
Word-final @deva[स्] undergoes @deva[रुत्व], becoming @deva[र्] (written as @deva[विसर्ग] before pause). The compound @deva[ससजुष्] also takes this change. Thus @deva[अग्निस्]→@deva[अग्निर्]/@deva[अग्निः], @deva[सजूस्]→@deva[सजूर्]. This is fundamental to Sanskrit sandhi.
"""

advanced = """
The @deva[रुत्व] rule (@deva[रु] substitution) is central to @deva[पद]-final phonology. The @deva[रु] notation represents @deva[र्] with latent @deva[उ] (for sandhi purposes). The specific mention of @deva[ससजुष्] extends the rule to this irregular Vedic compound.
"""

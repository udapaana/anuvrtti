id = "8.4.44"
numericId = "84044"

[en]
simple = """
A @deva[तवर्गीय] letter following a @deva[शकार] does not undergo @deva[श्चुत्वम्].
"""

standard = """
After @deva[श्], @deva[तु] not → @deva[चु]. @deva[प्रश्नः], @deva[विश्नः] (exception to @ref[8.4.40]).
"""

advanced = """
@deva[तु] (dental) does not become palatal after @deva[श्]. The words @deva[न] and @deva[तोः] continue by @[anuvritti]. This is an exception to @ref[8.4.40]. Derivation: @deva[प्रच्छ] + @deva[न] (@ref[3.3.90]) = @deva[प्रश्] + @deva[न] (@ref[6.4.19]) = @deva[प्रश्नः]; similarly @deva[विश्नः].
"""

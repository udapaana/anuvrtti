id = "8.4.2"
numericId = "84002"

[en]
simple = """
a @deva[नकार] occurring after @deva[ष्] or @deva[र्] in the same @deva[पद] is converted to a @deva[णकार] even when it is separated from the @deva[ष्] or @deva[र्] by one or more letters from the @deva[अट्] @deva[प्रत्याहार], @deva[कवर्ग], @deva[पवर्ग], @deva[आङ्] , or @deva[अनुस्वार].
"""

standard = """
@deva[ण्] substitution applies when @deva[अट्] (vowel/@deva[ह्]/@deva[य्]/@deva[व्]/@deva[र्])/@deva[कु]/@deva[पु]/@deva[आङ्]/@deva[नुम्] intervenes. @deva[करणम्], @deva[अर्केण], @deva[दर्पेण], @deva[पर्याणद्धम्], @deva[वृंहणम्].
"""

advanced = """
@deva[ण्] replaces @deva[न्] even when separated from the triggering @deva[र्]/@deva[ष्] by intervening @deva[अट्] letters (vowels, @deva[ह्], @deva[य्], @deva[व्], @deva[र्]), gutturals (@deva[कु]), labials (@deva[पु]), the particle @deva[आङ्], or the augment @deva[नुम्]. @deva[अट्] intervention: @deva[करणम्], @deva[हरणम्], @deva[किरिणा], @deva[गिरिणा], @deva[कुरुणा], @deva[गुरुणा]. Guttural (@deva[कु]) intervention: @deva[अर्केण], @deva[मूर्खेण], @deva[गर्गेण], @deva[अर्घेण]. Labial (@deva[पु]) intervention: @deva[दर्पेण], @deva[रेफेण], @deva[गर्भेण], @deva[चर्म्मणा], @deva[वर्मणा]. @deva[आङ्] intervention: @deva[पर्याणद्धम्] (from @deva[नह्], @ref[8.2.34]), @deva[निराणद्धम्] (cf. @ref[8.4.14]). Although @deva[आ] is a vowel already included in @deva[अट्], its separate mention in the @[sutra] signals that the @deva[समानपद] restriction of @ref[8.4.1] does not apply when @deva[आङ्] intervenes — the rule extends across word boundaries in that case. @deva[नुम्] (@deva[अनुस्वार]) intervention: @deva[वृंहणम्], @deva[वृंहणीयम्] (from @deva[वृहि] @deva[वृद्धौ]; @deva[नुम्] added because the root is @deva[इदित्] by @ref[7.1.58], then @deva[न्] → @deva[अनुस्वार] by @ref[8.3.24]). The term @deva[नुम्] in the @[sutra] is co-extensive with @deva[अनुस्वार], not limited to the augment proper — otherwise words like @deva[तृंहणं] (from @deva[तृंह] / @deva[स्तृंह] @deva[हिंसार्थे]), where the @deva[अनुस्वार] is original rather than derived from @deva[नुम्], would be excluded. Conversely, where @deva[नुम्] has not become @deva[अनुस्वार], the rule does not apply: @deva[प्रेन्वनम्], @deva[प्रेन्वनीयम्] (from @deva[इविः] @deva[प्रीणनार्थः]). These interveners may combine freely: in @deva[अर्केण], both a guttural and a vowel stand between @deva[र] and @deva[न]. For @deva[ष]-triggered cases, see @ref[8.3.58].
"""

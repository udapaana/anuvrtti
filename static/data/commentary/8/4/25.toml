id = "8.4.25"
numericId = "84025"

[en]
simple = """
The @deva[नकार] of @deva[अयन] is converted to @deva[णकार] when this word follows the word '@deva[अन्तर्]'. But this @deva[णत्व] does not happen if the resultant word indicates the name of a place.
"""

standard = """
@deva[न्] of @deva[अयन] → @deva[ण्] after @deva[अन्तर्] (not meaning 'country'). @deva[अन्तरयणम्]. Not: @deva[अन्तरयनो] @deva[देशः].
"""

advanced = """
@deva[न] of @deva[अयन] → @deva[ण] after @deva[अन्तर्], provided the compound does not denote a country. Example: @deva[अन्तरयणं] @deva[शोभनम्]. Counter-example: @deva[अन्तरयनो] @deva[देशः]. The @deva[णत्व] here would already follow from @ref[8.4.29]; this separate @[sutra] serves the @deva[आदेश] (country-restriction) purpose. @deva[अयन] is formed by @deva[ल्युट्] added to @deva[अय्] (= @deva[इण्]).
"""

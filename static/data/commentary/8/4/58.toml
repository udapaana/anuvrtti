id = "8.4.58"
numericId = "84058"

[en]
simple = """
An @deva[अनुस्वार] when followed by a @deva[यय्] @deva[वर्ण] is converted to the @deva[परसवर्ण].
"""

standard = """
@deva[अनुस्वार] → homogeneous nasal before @deva[यय्] (stops). @deva[शङ्किता] (@deva[ं] → @deva[ङ्]), @deva[उञ्छिता] (@deva[ं] → @deva[ञ्]), @deva[कुण्डिता], @deva[नन्दिता], @deva[कम्पिता].
"""

advanced = """
@deva[अनुस्वार] → homogeneous nasal before @deva[यय्] (stop consonants). The @deva[अनुस्वार] becomes @deva[ङ्] before gutturals, @deva[ञ्] before palatals, @deva[ण्] before cerebrals, @deva[न्] before dentals, @deva[म्] before labials. Examples: @deva[शङ्किता], @deva[शङ्कितुम्], @deva[शङ्कितव्यम्] (from @deva[शकि] @deva[शङ्कायाम्]); @deva[उञ्छिता] (from @deva[उञ्छि]); @deva[कुण्डिता] (from @deva[कुदि] @deva[दाहे]); @deva[नन्दिता] (from @deva[टुनदि] @deva[समृद्धौ]); @deva[कम्पिता] (from @deva[कपि] @deva[चलने]). These roots are @deva[उदित्], so @deva[नुम्] is added; @deva[न्] → @deva[अनुस्वार] by @ref[8.3.24]; the @deva[अनुस्वार] then assimilates by this rule. The @deva[यय्] condition: when @deva[यय्] does not follow, no change — @deva[आक्रंस्यते], @deva[आचिक्रंस्यते]. In @deva[कुर्वन्ति] and @deva[वृषन्ति], @deva[न] is not changed to @deva[ण] despite @ref[8.4.2], because @deva[णत्व] is @[asiddha]: by the prior rule @ref[8.3.24], @deva[न] first becomes @deva[अनुस्वार] (per @ref[8.2.1]); this @deva[अनुस्वार] is then restored to @deva[न] by the present rule (@deva[न] being homogeneous with the following dental); and this restoration being itself @deva[असिद्ध], @deva[णत्व] never finds its target.
"""

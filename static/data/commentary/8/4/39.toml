id = "8.4.39"
numericId = "84039"

[en]
simple = """
Certain words listed in the @[kṣubhnādi] class are exempt from the @[n-to-ṇ] change that would otherwise be expected. These include forms like @[kṣubhnāti] (present tense of @[kṣubh]), the compound @[nṛnamana], names like @[harinandī] and Girinagara, and forms like @[śaraniveśaḥ]. This is an open-ended (@[ākṛtigaṇa]) class.
"""

standard = """
Words in the @deva[क्षुभ्नादि] list are exempt from @deva[णत्व] despite meeting the usual triggering conditions. The prohibition (from @ref[8.4.34]) applies: to @deva[क्षुभ्नाति] and its paradigm (@ref[1.1.57]); to @deva[नृनमनः] (expected by @ref[8.4.3] and @ref[8.4.26]); to @deva[नन्दिन्], @deva[नन्दन], @deva[नगर] as second members in @deva[संज्ञा]-compounds — @deva[हरिनन्दी], @deva[हरिनन्दनः], @deva[गिरिनगरम्]; to @deva[परिनर्त्तनम्], @deva[शरनिवेशः] @ref[8.4.3]; and after @deva[आचार्य]: @deva[आचार्यभोगीनः]. The @deva[इरिकादि] words also block change in @deva[वन]-compounds: @deva[इरिकावनम्], @deva[कुबेरवनम्]. This is an @deva[आकृतिगण] (open class by example).
"""

advanced = """
Words in the @deva[क्षुभ्नादि] list are exempt from @deva[णत्व] despite meeting the usual conditions. The prohibition (@deva[न] from @ref[8.4.34]) applies to: @deva[क्षुभ्नाति] and its paradigm (@deva[क्षुभ्नीतः], @deva[क्षुभ्नन्ति] — vowel-substitutes treated as equivalent by @ref[1.1.57]). @deva[नृनमनः] (where change was expected by @ref[8.4.3] and @ref[8.4.26]). @deva[नन्दिन्], @deva[नन्दन], @deva[नगर] as second members in @deva[संज्ञा] compounds: @deva[हरिनन्दी], @deva[हरिनन्दनः], @deva[गिरिनगरम्]. @deva[नृत्] with intensive @deva[यङ्]: @deva[नरीनृत्यते]. @deva[तृप्नु] (@deva[तृप्नोति]). @deva[नर्तन], @deva[गहन], @deva[नन्दन], @deva[निवेश], @deva[निवास], @deva[अग्नि], @deva[अनूप] as second members: @deva[परिनर्त्तनम्], @deva[परिगहनम्] (expected by @ref[8.4.3]); @deva[परिनन्दनम्] (contrary to @ref[8.4.14]); @deva[शरनिवेशः], @deva[शरनिवासः], @deva[शराग्निः], @deva[दर्भानूपः] — all @deva[संज्ञा]s. After @deva[आचार्य]: @deva[आचार्यभोगीनः], @deva[आचार्यानी]. @deva[इरिकादि] words (@deva[इरिका], @deva[तिमिर], @deva[समीर], @deva[कुबेर], @deva[हरि], @deva[कर्मार]) followed by @deva[वन] do not trigger the change in @deva[संज्ञा] compounds. This is an @deva[आकृतिगण] (open class). Full list: 1 @deva[क्षुभ्ना], 2 @deva[नृनमन], 3 @deva[नन्दिन्], 4 @deva[नन्दन], 5 @deva[नगर] (@deva[एतान्युत्तरपदानि] @deva[संज्ञायां] @deva[प्रयोजयन्ति]); 6 @deva[हरिनन्दी], 7 @deva[हरिनन्दनः], 8 @deva[गिरिनगरम्]; 9 @deva[नृतिर्यङि] — @deva[नरीनृत्यते]; 10 @deva[नर्तन], 11 @deva[गहन], 12 @deva[नन्दन], 13 @deva[निवेश], 14 @deva[निवास], 15 @deva[अग्नि], 16 @deva[अनूप] (@deva[एतान्युत्तरपदानि] @deva[प्रयोजयन्ति]); 17 @deva[परिनर्तनम्], 18 @deva[परिगहनम्], 19 @deva[परिनन्दनम्], 20 @deva[शरनिवेषः], 21 @deva[शरनिवासः], 22 @deva[शराग्निः], 23 @deva[दर्भानूपः]; 24 @deva[आचार्यादणत्वं] @deva[च] — @deva[आचार्यभोगीनः]; 25 @deva[तृप्नु]; 26 @deva[नरनगर]; 27 @deva[गिरिनदी]; 28 @deva[गृहनमन]; 29 @deva[चतुर्हायन]; 30 @deva[इरिकादीनि] @deva[वनोत्तरपदानि] @deva[संज्ञायाम्]. @deva[आकृतिगण].
"""

id = "8.4.53"
numericId = "84053"

[en]
simple = """
A @deva[झल्]-letter is converted to a corresponding @deva[जश्]-letter when followed by a @deva[झश्] letter.
"""

standard = """
@deva[जश्त्व]: @deva[झल्] → @deva[जश्] (voiced unaspirated) before @deva[झश्] (voiced). @deva[लब्धा], @deva[दोग्धा], @deva[बोद्धा]. Not: @deva[दत्तः] (@deva[त] follows).
"""

advanced = """
@deva[झल्] → @deva[जश्] (voiced unaspirated) before @deva[झश्] (voiced consonant). This is the well-known @deva[जश्त्व] rule: a mute becomes its voiced unaspirated counterpart before a voiced mute. Examples: @deva[लभ्] + @deva[ता] = @deva[लब्धा], @deva[लब्धुम्], @deva[लब्धव्यम्]; @deva[दोग्धा], @deva[दोग्धुम्], @deva[दोग्धव्यम्]; @deva[बोद्धा], @deva[बोद्धुम्], @deva[बोद्धव्यम्]. The @deva[झशि] condition: when the following letter is not @deva[झश्], no change — @deva[दत्तः], @deva[दत्थः], @deva[दध्मः].
"""

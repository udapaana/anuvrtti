id = "8.4.35"
numericId = "84035"

[en]
simple = """
When a @[ṣ] occurs at the end of a pada (word boundary), the n that follows does not change to retroflex @[ṇ]. So nis + @[pāna] gives @[niṣpānam] (with visarga → @[ṣ] at the word boundary) and the n remains unchanged. Compare @[nirṇayaḥ], where the @[ṣ] is not pada-final and so the change does occur.
"""

standard = """
The @deva[न्] is not replaced by @deva[ण] after @deva[ष्] that is @deva[पदान्त] (final in a @deva[पद]); this debars @ref[8.4.29]. Thus @deva[निष्पानम्], @deva[दुष्पानम्] (visarga → @deva[ष्] by @ref[8.3.41]); @deva[सर्पिष्पानम्] (@ref[8.3.45]); @deva[यजुष्पानम्] @ref[2.1.32]. The condition @deva[पदान्तात्] excludes internal @deva[ष्] as in @deva[कुष्णाति], @deva[पुष्णाति], and also compounds where @deva[ष्] occurs within (not at the boundary of) the first member — hence @deva[निर्णयः] is unaffected because the @deva[ष्] there is not @deva[पदान्त]. @deva[पदान्त] is a locative @[tatpuruṣa]: '@deva[ष्] at the boundary of a @deva[पद]'.
"""

advanced = """
After @deva[पद]-final @deva[ष्], @deva[न्] is not changed to @deva[ण]. This debars @ref[8.4.29]. Examples: @deva[निष्पानम्], @deva[दुष्पानम्] (@deva[विसर्ग] → @deva[ष्] by @ref[8.3.41]); @deva[सर्पिष्पानम्] (genitive compound, contra @ref[2.2.14]); @deva[यजुष्पानम्] (@ref[2.1.32]) — @deva[ष] in the last two by @ref[8.3.45], debarring @ref[8.4.10]. The condition @deva[षात्] excludes non-@deva[ष] triggers: @deva[निर्णयः] (where @deva[र्], not @deva[ष्], precedes). The condition @deva[पदान्तात्] excludes word-internal @deva[ष्]: @deva[कुष्णाति], @deva[पुष्णाति] (where @deva[ष्] is not @deva[पद]-boundary). The compound @deva[पदान्त] is a locative @[tatpurusha] (@deva[पदे] @deva[अन्त], 'at the boundary of a @deva[पद]'), not 'final of a @deva[पद]'. Hence @deva[सुसर्पिष्केण] and @deva[सुयजुष्केण] (@deva[क] by @ref[5.4.154]; @deva[सुसर्पिष्क] is a @[bahuvrihi] from @deva[शोभनं] @deva[सर्पिरस्य]; @deva[ष] by @ref[8.3.39]) do not trigger this prohibition: before @deva[क], @deva[सुसर्पिस्] is a @deva[पद] by @ref[1.4.17] and @deva[ष्] is @deva[पद]-final, but it is not final of a preceding member followed by another @deva[पद]. The rule applies specifically to compounds where @deva[ष्] is final in the first member.
"""

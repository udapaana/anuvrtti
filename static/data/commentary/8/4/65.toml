id = "8.4.65"
numericId = "84065"

[en]
simple = """
A @deva[झर्] letter coming after an @deva[हल्] letter is optionally deleted if it is followed by a @deva[सवर्ण] @deva[झर्] letter.
"""

standard = """
After consonant, @deva[झर्] (mute/sibilant) optionally elided when homogeneous follows. @deva[प्रत्तम्] (from 4 @deva[त्]s). Not: @deva[शार्ङ्गम्] (@deva[ङ्] not @deva[झर्]).
"""

advanced = """
A @deva[झर्] (mute or sibilant) preceded by a consonant (@deva[हल्]) and followed by a homogeneous @deva[झर्] is optionally elided. @deva[हलः] continues by @[anuvritti]. Example: @deva[प्रत्त्तम्], @deva[अवत्त्तम्] — three @deva[त]s (one substituted for @deva[आ] by @ref[7.4.47], one from @deva[चर्त्व] change of @deva[द] → @deva[त], one from the affix @deva[क्त]); a fourth arises by doubling (@ref[8.4.47]); one or two middle ones may be dropped. @deva[मरुत्त्त्त]: four @deva[त]s (@deva[मरुत्] + @deva[दा] + @deva[क्त] → @deva[मरुत्] + @deva[द्त्] + @deva[त] by @ref[7.4.47], @deva[मरुत्] treated as @deva[उपसर्ग] per @ref[1.4.59] @[vartika]); a fifth from doubling, and one to three middle ones may be elided. The @deva[झरः] condition: @deva[शार्ङ्गम्] — @deva[ङ्] is not @deva[झर्], so not elided despite following a @deva[झर्]. The @deva[झरि] condition: in @deva[प्रियपञ्ञ्चः] (@[bahuvrihi] = @deva[प्रियाः] @deva[पञ्चास्य]; @deva[प्रिय] first by @ref[2.2.35] @[vartika]; @deva[अ] elided by @ref[6.4.134]; @deva[न्] → @deva[ञ्]), @deva[च्] is a @deva[झर्] preceded by @deva[हल्] and followed by homogeneous @deva[ञ्], but @deva[ञ्] is not @deva[झर्], so @deva[च्] is not elided. The @deva[सवर्णे] condition: @deva[तर्प्तु], @deva[तर्प्तम्] — @deva[प्] and @deva[त्] are not homogeneous, so no elision. The use of @deva[सवर्णे] avoids the mutual-correspondence rule (@ref[1.3.10]); otherwise @deva[शिण्ढि] and @deva[पिण्ढि] (imperative 2nd sg. of @deva[शिष्] and @deva[पिष्]; @deva[अ] of @deva[श्नम्] elided by @ref[6.4.111], @deva[हि] → @deva[धि] by @ref[6.4.101], @deva[ष्] → @deva[ड्] by @ref[8.4.53], @deva[न्] → @deva[अनुस्वार] by @ref[8.3.24] → @deva[ण्] by @ref[8.4.58], @deva[ध] → @deva[ढ], @deva[ड्] elided before @deva[ढ] by this rule) could not be derived.
"""

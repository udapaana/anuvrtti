id = "8.4.36"
numericId = "84036"

[en]
simple = """
When the root @[naś] ('to perish') ends in @[ṣ] — as happens in the past participle @[naṣṭa] — its initial n does not change to retroflex @[ṇ]. So pra + @[naṣṭa] gives @[pranaṣṭaḥ], not @[praṇaṣṭaḥ]. But in present tense forms like @[praṇaśyati], where @[naś] ends in @[ś] (not @[ṣ]), the normal change does apply.
"""

standard = """
The @deva[न] of the root @deva[नश्] is not replaced by @deva[ण] when the root ends in @deva[ष्] — i.e. in the @deva[निष्ठा] form where @deva[श्] → @deva[ष्] via @ref[8.2.36]: @deva[प्रनष्टः], @deva[परिनष्टः]. The @deva[नुम्] added by @ref[7.1.60] is elided @ref[6.4.24], and @deva[श्] → @deva[ष्] @ref[8.2.36]. When @deva[नश्] does not end in @deva[ष्], the change is regular: @deva[प्रणश्यति] @ref[8.4.29]. The word @deva[अन्त] in the @[sutra] ensures that even when the @deva[ष्] has been subsequently changed to @deva[क्] (by @ref[8.2.41] in @deva[प्रनङ्क्ष्यति]), the prohibition still applies, because the root had passed through a @deva[ष्]-final stage.
"""

advanced = """
@deva[न] of @deva[नश्] ('perish') is not changed to @deva[ण] when the root ends in @deva[ष्] — i.e., in the @deva[निष्ठा] form where @deva[श्] → @deva[ष्] by @ref[8.2.36]. Examples: @deva[प्रनष्टः], @deva[परिनष्टः] (@deva[नुम्] by @ref[7.1.60] is elided by @ref[6.4.24]; @deva[श्] → @deva[ष्] by @ref[8.2.36]). When @deva[नश्] does not end in @deva[ष्], the regular change applies: @deva[प्रणश्यति], @deva[परिणश्यति]. The term @deva[अन्त] ('ending') ensures the prohibition extends to forms where @deva[ष्] has been subsequently transformed — as in @deva[प्रनङ्क्ष्यति], where @deva[श्] → @deva[ष्] by @ref[8.2.36] and then @deva[ष्] → @deva[क्] by @ref[8.2.41], with @deva[नुम्] by @ref[7.1.60]. Though the @deva[ष्] is no longer visible, the root passed through a @deva[ष्]-final stage, and the prohibition applies.
"""

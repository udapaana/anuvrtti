id = "8.4.14"
numericId = "84014"

[en]
simple = """
A @deva[धातु] which has @deva[णकार] in the @deva[औपदेशिक] form get @deva[णत्वम्] in presence of an @deva[उपसर्ग] that has @deva[रेफ] or @deva[षकार].
"""

standard = """
@deva[न्] of @deva[णोपदेश] root → @deva[ण्] after @deva[उपसर्ग] (even non-compound). @deva[प्रणमति], @deva[प्रणायकः]. Not: @deva[प्रनायकः] (@deva[प्र] = @[nipāta]), @deva[प्रनर्दति] (root @deva[नर्द्]).
"""

advanced = """
@deva[न] → @deva[ण] in a @deva[णोपदेश] root (one listed with initial @deva[ण] in the @[dhatupatha]) when preceded by an @deva[उपसर्ग] containing a trigger — even outside a @deva[समास]. Examples: @deva[प्रणमति] ('he bows'), @deva[परिणमति], @deva[प्रणायकः] ('a leader'), @deva[परिणायकः]. The @deva[उपसर्ग] condition excludes @deva[प्रनायकः] (= @deva[प्रगता] @deva[नायका] @deva[अस्माद्] @deva[देशात्], 'a country without a leader'), where @deva[प्र] functions as a @[nipata], not an @deva[उपसर्ग] — it qualifies the understood @deva[गत], not the root @deva[नी] (see @ref[1.4.57]–@ref[1.4.59]). The term @deva[असमासे] ('even outside a compound') is needed because the @[anuvritti] of @deva[पूर्वपद] from the preceding section would otherwise restrict the rule to compounds; @deva[असमासे] terminates that @[adhikara]. The @deva[णोपदेश] condition excludes roots listed with @deva[न] in the @[dhatupatha]: @deva[प्रनर्दति], @deva[प्रनर्दितुम्], @deva[प्रनर्दकः] (from @deva[नर्द]). Eight such @deva[न]-initial roots exist: @deva[नर्द्], @deva[नाट्], @deva[नाथ्], @deva[नाध्], @deva[नन्द्], @deva[नक्क्], @deva[नॄ], @deva[नृत्] (see @ref[6.1.65]).
"""

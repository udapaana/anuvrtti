id = "8.4.51"
numericId = "84051"

[en]
simple = """
According to @deva[शाकल्य], a @deva[यर्] letter is never duplicated.
"""

standard = """
@[śākalya]: No doubling anywhere. @deva[अर्कः], @deva[ब्रह्मा] (no doubling).
"""

advanced = """
According to the opinion of @deva[शाकल्य] , there is reduplication no where. As @deva[अर्कः], @deva[मर्कः], @deva[ब्रह्मा], @deva[अपह्नुते] @deva[॥]
"""

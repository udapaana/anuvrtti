id = "8.4.8"
numericId = "84008"

[en]
simple = """
The n in the word @[vāhana] ('vehicle, cart') changes to retroflex @[ṇ] when a compound's first member — which names the thing being carried — contains a change-causing letter. So @[ikṣu] ('sugarcane') + @[vāhana] gives @[ikṣuvāhaṇam] ('a sugarcane-cart'). The rule applies only when the compound means 'a vehicle for carrying X', not when it means 'a vehicle belonging to X'.
"""

standard = """
The @deva[न] of @deva[वाहन] is replaced by @deva[ण] when the first member of the compound denotes the object being transported (@deva[आहित]) and contains a @deva[णत्व]-inducing letter. Examples: @deva[इक्षुवाहणम्] 'sugarcane-cart', @deva[शरवाहणम्], @deva[दर्भवाहणम्]. The semantic condition excludes @deva[दाक्षिवाहणम्] ('@[dakṣi]'s vehicle') where the first member expresses ownership, not the thing carried @ref[8.4.3]. The word @deva[वाहन] is derived from @deva[वह्] + @deva[ल्युट्]; its penultimate lengthening is licensed by this rule's @[nipatana].
"""

advanced = """
@deva[न] of @deva[वाहन] → @deva[ण] when the @deva[पूर्वपद] contains a triggering letter and denotes the object being transported (@deva[आहित] — the thing placed on a cart and carried). Examples: @deva[इक्षुवाहणम्] ('sugarcane-cart'), @deva[शरवाहणम्] ('reed-cart'), @deva[दर्भवाहणम्] ('hay-cart'). The semantic condition excludes @deva[दाक्षिवाहणम्] ('a vehicle belonging to @[dakshi]'), where the first member denotes the owner, not the cargo. @deva[वाहन] is derived from @deva[वह्] + @deva[ल्युट्]; the penultimate lengthening is licensed by this @[sutra]'s @[nipatana].
"""

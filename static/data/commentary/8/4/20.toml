id = "8.4.20"
numericId = "84020"

[en]
simple = """
When the verb @deva[अन्] (@deva[प्राणने]) is used along with a @deva[रेफ]/@deva[षकारयुक्त] @deva[उपसर्ग] (like @deva[प्र] or @deva[परा]), its @deva[नकार] becomes @deva[णकार] when it appears at the end of a @deva[पद].
"""

standard = """
@deva[न्] of @deva[अन्] → @deva[ण्] at @deva[पद]-end (exception to @ref[8.4.37]). @deva[हे] @deva[प्राण्]! @deva[हे] @deva[पराण्]!
"""

advanced = """
The @deva[न] of the verb @deva[अन्] 'to breathe', is changed to @deva[ण] , when preceded by an @deva[उपसर्ग] competent to produce the change, provided it occurs at the end of a @deva[पद]@deva[।] As @deva[हे] @deva[प्राण्] ! @deva[हे] @deva[पराण्] ! This rule is an exception to @ref[8.4.37] sub, by which final @deva[न्] in a @[pada] is not changed into @deva[ण] @deva[॥] The word @deva[अन्तः] in the @[sutra] is to be understood to be equivalent to @deva[पदान्तः], and the rule applies when the word is in the vocative case. According to some @deva[अन्तः] is taken to be a part of the last @[sutra], and has the meaning of 'proximity'. That is the @deva[न] is changed to @deva[ण], if the @deva[र] is not separated from the @deva[न्] by more than one letter. Therefore there is no change in @deva[परि] + @deva[अनिति] = @deva[पर्यनिति] @deva[॥] In this view, another @deva[अन्त] should be taken for the sake of final @deva[न्], in @deva[हे] @deva[प्राण्] @deva[॥] According to others the form @deva[पर्यणिति] is valid, and they do not connect @deva[अन्तः] with the last @[sutra]. The word @deva[प्राण्] is a @deva[क्विप्] formed word, and the @deva[न्] final is not elided in the Vocative Singular because of the prohibition of @ref[8.2.8]; in every other place, when the @deva[न्] is @[padanta], it would be dropped; and therefore the illustration is given with @deva[सम्बोधन] (Vocative) singular, which alone satisfies the requirements of this @[sutra].
"""

id = "8.4.43"
numericId = "84043"

[en]
simple = """
A @deva[तवर्ग] letter which is followed by a @deva[षकार] does not undergo @deva[ष्टुत्वम्].
"""

standard = """
Before @deva[ष्], @deva[तु] not → @deva[टु]. @deva[अग्निचित्षण्डे], @deva[भवान्षण्डे].
"""

advanced = """
In the room of @deva[तु] there is not a cerebral substitute, when @deva[ष्] follows. The word @deva[न] is to be read into the aphorism. As, @deva[अग्निचित्] + @deva[षण्डे] = @deva[अग्निचित्षण्डे] @deva[॥] @deva[भवान्षण्डे], @deva[महान्षण्डे] @deva[॥]
"""

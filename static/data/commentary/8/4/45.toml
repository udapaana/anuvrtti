id = "8.4.45"
numericId = "84045"

[en]
simple = """
A @deva[यर्] letter occurring at end of a @deva[पद] is optionally converted to an @deva[अनुनासिक] when it is followed by an @deva[अनुनासिक].
"""

standard = """
@deva[पद]-final @deva[यर्] (consonant except @deva[ह्]) optionally → nasal before nasal. @deva[वाग्नयति] or @deva[वाङ्नयति]. Vt: Obligatory before affixes @deva[मय]/@deva[मात्र]. @deva[वाङ्मात्रम्].
"""

advanced = """
@deva[पद]-final @deva[यर्] (every consonant except @deva[ह]) optionally → nasal homologue before a following nasal. @deva[पदान्त] continues by @[anuvritti]. Examples: @deva[वाक्] + @deva[नयति] = @deva[वाग्नयति] or @deva[वाङ्नयति]; @deva[अग्निचिद्नयति] or @deva[अग्निचिन्नयति]; @deva[त्रिष्टुब्नयति] or @deva[त्रिष्टुम्नयति]; @deva[श्वलिण्नयति] or @deva[श्वलिड्नयति]. The @deva[पद]-final condition: non-@deva[पद]-final consonants do not undergo optionality — @deva[वेद्] + @deva[मि] = @deva[वेद्मि] (no option), @deva[क्षुभ्नाति] (no option). Vt: When a @deva[प्रत्यय] follows, the nasalization is obligatory in secular usage: @deva[वाक्] + @deva[मात्रम्] = @deva[वाङ्मात्रम्], @deva[कियन्मात्रम्]. This obligatory change applies only before the affixes @deva[मय] and @deva[मात्र], not before every nasal-initial affix.
"""

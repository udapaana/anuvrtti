id = "8.4.12"
numericId = "84012"

[en]
simple = """
For a @deva[समस्तपद], a @deva[रेफ] or a @deva[षकार] present in the @deva[पूर्वपद] causes the @deva[णत्व] of the @deva[नकार] present in the @deva[एकाच्] @deva[उत्तरपद] whenever the @deva[नकार] is (1) at end of a @deva[प्रातिपदिक], or (2) created due to a @deva[नुमागम], or (3) part of a @deva[विभक्ति].
"""

standard = """
In monosyllabic second member, @deva[प्रातिपदिकान्त]/@deva[नुम्]/@deva[विभक्ति] @deva[न्] → @deva[ण्] (obligatory). @deva[वृत्रहणौ], @deva[क्षीरपाणि], @deva[क्षीरापेण].
"""

advanced = """
In a compound whose second member is monosyllabic (@deva[एकाच्]), @deva[न] → @deva[ण] obligatorily when the @deva[न] is @deva[प्रातिपदिकान्त], @deva[नुम्], or part of a @deva[विभक्ति], and the first member contains a trigger. @deva[प्रातिपदिकान्त]: @deva[वृत्रहणौ], @deva[वृत्रहणः] ('the @[vritra]-killer'). @deva[नुम्]: @deva[क्षीरपाणि] ('drinkers of milk'), @deva[सुरापाणि] ('drinkers of wine') — @deva[नुम्] by @ref[7.3.88]. @deva[विभक्ति]: @deva[क्षीरापेण], @deva[सुरापेण]. The repetition of @deva[ण] in this @[sutra], despite its @[anuvritti] from the preceding context, signals that this rule is obligatory — the @[anuvritti] of @deva[वा] ('optional') from @ref[8.4.11] ceases here.
"""

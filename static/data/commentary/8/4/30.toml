id = "8.4.30"
numericId = "84030"

[en]
simple = """
When a @[kṛt] suffix is added after a causative verb (@[ṇyanta]) and the root follows a change-causing upasarga, the @[n-to-ṇ] change is optional. So pra + @[yāpana] (causative of @[yā]) gives either @[prayāpaṇam] or @[prayāpanam]. This contrasts with the obligatory change for non-causative roots under the previous rule.
"""

standard = """
The @deva[न] of a @deva[कृत्] affix ordained after a @deva[णयन्त] (causative) verb is optionally changed to @deva[ण] when following a @deva[णत्व]-triggering @deva[उपसर्ग]. Thus @deva[प्रयापणम्] or @deva[प्रयापनम्], @deva[प्रयाप्यमाणम्] or @deva[प्रयाप्यमानम्] @ref[8.4.29]. The term @deva[विहितं] ('ordained') in the explanation signals that the @deva[कृत्] affix need not directly follow @deva[णि]; an intervening affix like @deva[यक्] does not block the rule — hence @deva[प्रयाप्यमाणम्] qualifies despite @deva[यक्] intervening @ref[1.1.72].
"""

advanced = """
@deva[न] of a @deva[कृत्] affix ordained after a @deva[णयन्त] (causative) verb optionally → @deva[ण] after a triggering @deva[उपसर्ग]. Examples: @deva[प्रयापणम्] or @deva[प्रयापनम्], @deva[परियापणम्] or @deva[परियापनम्], @deva[प्रयाप्यमाणम्] or @deva[प्रयाप्यमानम्], @deva[प्रयापणीयम्] or @deva[प्रयापनीयं], @deva[अप्रयापणिः] or @deva[अप्रयापनिः], @deva[प्रयापिणौ] or @deva[प्रयापिनौ]. The term @deva[विहितं] ('ordained') signals that the @deva[कृत्] affix need not immediately follow @deva[णि] — an intervening affix like @deva[यक्] does not block the rule (hence @deva[प्रयाप्यमाणम्] qualifies). Although the ablative @deva[णेः] would ordinarily require immediate succession by @ref[1.1.72], @deva[विहितं] overrides this.
"""

id = "8.4.28"
numericId = "84028"

[en]
simple = """
The n of both forms of nas (the pronoun and the substitute for @[nāsikā], 'nose') variably changes to @[ṇ] when it follows an upasarga (verbal prefix) containing a change-causing letter. So pra + nas gives @[praṇaḥ] or @[pranaḥ] (both occur in the Veda). The word bahulam in the rule means this also applies outside Vedic texts — as in @[praṇasam] ('nose-face').
"""

standard = """
The @deva[न] of @deva[नस्] — both the pronominal @deva[नस्] and the @deva[नासिका]-substitute @ref[5.4.119] — undergoes @deva[बहुल] (variable) change to @deva[ण] after a @deva[णत्व]-triggering @deva[उपसर्ग]. This means the change is not obligatory: @deva[प्रणः] @deva[शूद्रः] and @deva[प्र] @deva[नो] @deva[मुञ्चतम्] both occur in Vedic @ref[8.4.27]. Because @deva[बहुलम्] overrides the @deva[छन्दस्] restriction, secular usage is also covered: @deva[प्रणसम्] @deva[मुखम्] ('nose-face'). The @[mahābhāṣya] amends @[pāṇini]'s original @[sūtra] @deva[उपसर्गादनोत्परः] due to dual readings of @deva[ओत्पर].
"""

advanced = """
@deva[न] of @deva[नस्] — both the pronominal form and the @deva[नासिका]-substitute (@ref[5.4.119]) — undergoes @deva[बहुल] (variable) change to @deva[ण] after a triggering @deva[उपसर्ग]. The change sometimes applies (@deva[प्रणः] @deva[शूद्रः], @deva[प्रणसः], @deva[प्रणो] @deva[राजा]) and sometimes does not (@deva[प्र] @deva[नो] @deva[मुञ्चतम्]). The term @deva[बहुलम्] overrides the @deva[छन्दस्] restriction, extending the rule to secular usage: @deva[प्रणसं] @deva[मुखम्] ('nose-face'). This @[sutra] is not @[panini]'s original formulation; his was @deva[उपसर्गादनोत्परः] ('after an @deva[उपसर्ग], @deva[न] of @deva[नस्] when not preceded by or followed by @deva[ओ] → @deva[ण्]'). The @[mahabhashya] amends it because @deva[ओत्परः] is ambiguous: it could mean @deva[ओकारात्] @deva[परः] ('coming after @deva[ओ]') or @deva[ओकारः] @deva[परोऽस्मात्] ('followed by @deva[ओ]'). Under the first reading, @deva[णत्व] would wrongly apply in @deva[प्रनो] @deva[मुञ्चतं]; under the second, it would wrongly fail in @deva[प्रणोवनिर्देवता]. The Vedic evidence shows both @deva[प्रणः] and @deva[प्रनः], both @deva[प्रणो] and @deva[प्रनो] — hence the amended @deva[बहुल] formulation.
"""

id = "8.4.3"
numericId = "84003"

[en]
simple = """
For a @deva[समस्तपद] which is defined as a @deva[संज्ञा], The @deva[र्] and @deva[ष्] present in the @deva[पूर्वपद] causes the @deva[णत्वम्] of @deva[नकार] from the @deva[उत्तरपद], as long as there is no @deva[गकार] in between.
"""

standard = """
In compound names (not ending in @deva[ग्]), @deva[पूर्वपद] with @deva[र्]/@deva[ष्] causes @deva[ण्] in @deva[उत्तरपद]. @deva[द्रुणसः], @deva[खरणसः], @deva[शूर्पणखा]. Not: @deva[चर्मनासिकः], @deva[ऋगयनम्].
"""

advanced = """
@deva[न्] → @deva[ण्] when the triggering letter stands in the @deva[पूर्वपद] of a compound that is a @deva[संज्ञा] (proper name), provided the @deva[पूर्वपद] does not end in @deva[ग]. Examples: @deva[द्रुणसः], @deva[वार्द्ध्रीणसः] (a kind of antelope), @deva[खरणसः], @deva[शूर्पणखा] (see @ref[5.4.118], @ref[4.1.58]). The @deva[संज्ञा] condition excludes @deva[चर्मनासिकः]; the @deva[अगः] condition excludes @deva[ऋगयनम्]. On one view, this @[sutra] is a @deva[नियम] (restrictive rule), not a @deva[विधि]. Since a compound is a @deva[समानपद] per @ref[8.4.1], @deva[णत्व] would otherwise apply universally; this @[sutra] restricts it to @deva[संज्ञा] compounds, excluding forms like @deva[चर्मनासिका]. The term @deva[पूर्वपद] is relational, implying an @deva[उत्तरपद] — the trigger must be in the first member and the @deva[न] in the second. The rule therefore does not cover @deva[तद्धित] formations, where the affix is not a @[pada] and hence not an @deva[उत्तरपद]: @deva[खरपस्यापत्यं] = @deva[खारपायणः] (@ref[4.1.99]), where @deva[णत्व] applies regardless of the @deva[संज्ञा] condition. Similarly @deva[मातृभोगीणः] (with @deva[ख] affix). When both trigger and @deva[न] occur in the @deva[पूर्वपद] itself, as in @deva[करणप्रियः], the general rule @ref[8.4.1] governs. The @deva[ग]-proviso prohibits only the @deva[णत्व] change, not the restrictive character of the @[sutra]. On the alternative view, this is a @deva[विधि] (original enunciation). Proponents argue that @deva[समानपद] in @ref[8.4.1] means an integral, indivisible word; a compound, being divisible into @deva[पूर्वपद] and @deva[उत्तरपद], is not @deva[समानपद], so this @[sutra] introduces a new rule for compounds. On this analysis the @[sutra] divides into two: @deva[पूर्वपदात् संज्ञायाम्] as one rule, and @deva[अगः] as another, so that @deva[ग]-intervention blocks @deva[णत्व] across all relevant rules.
"""

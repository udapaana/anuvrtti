id = "8.4.38"
numericId = "84038"

[en]
simple = """
The @[n-to-ṇ] change does not occur when a full word (pada) intervenes between the change-causing letter and the n. For example, in @[māṣakumbhavāpena], the word kumbha comes between @[māṣa] (with the change-causing letter) and @[vāpa], so the n stays unchanged. A @[vārttika] makes an exception for taddhita derivatives.
"""

standard = """
Intervening @deva[पद]-separation (@deva[पदव्यवाय]) blocks @deva[णत्व]: the trigger and the @deva[न] must be in adjacent @deva[पद]s. Thus @deva[माषकुम्भवापेन] (@deva[कुम्भ] intervenes), @deva[चतुरङ्गयोगेन] (@deva[अङ्ग] intervenes), @deva[प्रावनद्धम्] (@deva[अव] intervenes) @ref[8.4.3]. A @[vartika] exempts @deva[तद्धित] formations: in @deva[आर्द्रगोमयेण], the @deva[पद] @deva[गो] (taking @deva[मयट्] @ref[4.3.145]) intervenes, yet @deva[णत्व] applies because it is a @deva[तद्धित] context. The @[mahābhāṣya] reads @deva[पदव्यवाय] as a @deva[सप्तमी]-@[tatpuruṣa]: '@deva[व्यवाय] within a @deva[पद]'.
"""

advanced = """
@deva[णत्व] is blocked when a @deva[पद] intervenes between the trigger and the @deva[न्]. The compound @deva[पदव्यवाय] = @deva[पदेन] @deva[व्यवाय] ('separation by a @deva[पद]'). Examples: @deva[माषकुम्भवापेन] (@deva[कुम्भ] intervenes), @deva[चतुरङ्गयोगेन] (@deva[अङ्ग] intervenes), @deva[प्रावनद्धम्], @deva[पर्यवनद्धम्] (@deva[अव] intervenes), @deva[प्रगान्नयामः], @deva[परिगान्नयामः]. Vt: The prohibition does not apply in @deva[तद्धित] formations — @deva[आर्द्रगोमयेण], @deva[शुष्कगोमयेण] (where @deva[गो] takes @deva[मयट्] by @ref[4.3.145] and is a @deva[पद] by @ref[1.4.17], intervening between @deva[मय] and the first word). The @[mahabhashya], however, does not accept this @[vartika]; according to it, @deva[पदव्यवाय] = @deva[पदे] @deva[व्यवाय] (a @deva[सप्तमी]-@[tatpurusha]: 'intervention within a @deva[पद]').
"""

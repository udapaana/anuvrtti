id = "8.4.40"
numericId = "84040"

[en]
simple = """
In the context of @deva[संहिता], A @deva[सकार] and a @deva[तवर्ग] letter are converted (respectively) to a @deva[शकार] and @deva[चवर्ग] letter when associated with a @deva[शकार] or a @deva[चवर्ग] letter.
"""

standard = """
@deva[श्चुत्व]: @deva[स्]/@deva[तु] before or after @deva[श्]/@deva[चु] → @deva[श्]/@deva[चु]. @deva[वृक्षश्शेते], @deva[वृक्षश्चिनोति], @deva[अग्निचिच्छेते], @deva[यज्ञः], @deva[मज्जति].
"""

advanced = """
The letters @deva[स्] and the dentals when coming in contact with @deva[श्] and the palatals, are changed to @deva[श्] and palatals respectively. The rule of @deva[यथासंख्य] does not apply here with regard to first part @deva[स्तो] @deva[श्चुना] @deva[॥] The @deva[स] in contact with @deva[श] is changed to @deva[श] but it is also so changed when in contact with letters of @deva[च] class. Similarly letters of @deva[त] class coming in contact with @deva[श] or a letter of @deva[च] class, are changed to @deva[च] class. The rule of @deva[यथासंख्यं], however, applies to the substitutes, namely @deva[स] is changed to @deva[श], and @deva[तु] to @deva[चु] @deva[॥] Ist. @deva[स] in contact with @deva[श] : as, @deva[वृक्षस्] + @deva[शेते] = @deva[वृक्षश्शेते], so also @deva[प्लक्षश्शेते] @deva[॥] 2nd. @deva[स] in contact with @deva[चु] :- as, @deva[वृक्षस्] + @deva[चिनोति] = @deva[वृक्षश्चिनोति], @deva[प्लक्षश्चिनोति], @deva[वृक्षश्छादयति], @deva[प्लक्षश्छादयति] @deva[॥] 3rd. @deva[तु] with @deva[श] :- @deva[अग्निचित्] + @deva[शेते] = @deva[अग्निचिच्छेते], so @deva[सोमसुच्छेते] @deva[॥] 4th. @deva[तु] with @deva[चु] :- @deva[अग्निचित्] + @deva[चिनोति] = @deva[अग्निचिच्] @deva[चिनोति], so also @deva[सोमसुच्चिनोति], @deva[अग्निचिच्छादयति], @deva[अग्निचिज्जयति], @deva[अग्निचिज्] @deva[झकारम्], @deva[सोमसुच्छादयति], @deva[सोमसुज्जयति], @deva[सोमसुज्झकारम्], @deva[अग्निचिज्जकारः], @deva[सोमसुज्जकारः] @deva[॥] Similarly @deva[मस्ज्] gives @deva[मज्जति], the @deva[स] is changed to @deva[द्] by @deva[झलां] @deva[जश्] @deva[झशि] @ref[8.4.53], and then this @deva[द्] is changed to a palatal i. e. to @deva[ज्] here; and @deva[द्] obtained by @deva[जश्] rule is not considered @[asiddha] here. See @ref[8.2.3]. So also from @deva[भ्रस्ज्] we have @deva[भृज्जति] @deva[॥] 5th. @deva[चकार] followed by @deva[तकारः] as, @deva[यज्] + @deva[न] @ref[3.3.90] = @deva[यज] + @deva[ञ्] = @deva[यज्ञः], @deva[याच्] + @deva[न] = @deva[याच्ञा] @deva[॥] In fact the instrumental case @deva[श्चुना] shows that the mere contact of @deva[स] and @deva[तु] with @deva[श] and @deva[चु] is enough to induce the change, whether @deva[स्तु] is followed by @deva[श्चु], or @deva[श्चु] be followed by @deva[स्तु] @deva[॥] Other examples of mere contact are :- 5th. (a) @deva[स] followed by @deva[चु] is changed into @deva[शः] as, @deva[भ्रस्ज्] + @deva[ति] = @deva[भृस्ज्] + @deva[श] + @deva[ति] @ref[3.1.77] @ref[6.1.16] = @deva[भृस्ज] + @deva[ति] = @deva[भृदज्] + @deva[ति] = @ref[8.4.53] = @deva[भृज्जति] @deva[॥] Similarly @deva[मस्ज] forms @deva[मज्जति], @deva[व्रश्च] forms @deva[वृश्चति] @deva[॥] The aphorism @deva[शात्] @ref[8.4.44] which prohibits the change of @deva[तु] into @deva[चु] when following the letter @deva[श], indicates by implication that the rule of mutual correspondence according to the order of enunciation @ref[1.3.10] does not hold good here. Had the @[sutra] been @deva[स्तो] @deva[श्चोः] @deva[श्चुः] i. e. instead of instrumental, had there been the @deva[सप्तमी] (locative) case, then the rule would not have applied to cases covered by the fifth clause.
"""

id = "8.4.23"
numericId = "84023"

[en]
simple = """
When the word @deva[हन्] comes after an @deva[उपसर्ग] containing a @deva[रेफ], and when the @deva[नकार] of @deva[हन्] is preceded by a @deva[ह्रस्व] @deva[अकार], this @deva[नकार] is optionally converted to @deva[णकार] in presence of a @deva[प्रत्यय] that begins with a @deva[वकार] or a @deva[मकार].
"""

standard = """
Before @deva[व्]/@deva[म्], @deva[न्] of @deva[हन्] optionally → @deva[ण्] after change-causing @deva[उपसर्ग]. @deva[प्रहण्वः] or @deva[प्रहन्वः], @deva[प्रहण्मः] or @deva[प्रहन्मः].
"""

advanced = """
Before @deva[व्] or @deva[म्], @deva[न] of @deva[हन्] optionally → @deva[ण] after a triggering @deva[उपसर्ग]. Examples: @deva[प्रहण्वः] or @deva[प्रहन्वः], @deva[परिहण्वः] or @deva[परिहन्वः], @deva[प्रहण्मः] or @deva[प्रहन्मः], @deva[परिहण्मः] or @deva[परिहन्मः]. This @[sutra] introduces optionality where the preceding rule (@ref[8.4.22]) would have made the change obligatory.
"""

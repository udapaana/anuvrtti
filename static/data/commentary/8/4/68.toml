id = "8.4.68"
numericId = "84068"

[en]
simple = """
The @deva[ह्रस्वः] @deva[अकारः] which was being treated as @deva[विवृत] during the @deva[प्रक्रिया] now becomes @deva[संवृतः] for @deva[प्रयोग].
"""

standard = """
Short @deva[अ] (treated as @deva[विवृत]/open throughout grammar) is now @deva[संवृत]/contracted in actual pronunciation. End of @deva[अष्टाध्यायी].
"""

advanced = """
Short @deva[अ], treated as @deva[विवृत] (open) throughout the grammar, is now restored to its natural @deva[संवृत] (contracted) articulation in actual pronunciation. Throughout the @[ashtadhyayi], short @deva[अ] was treated as @deva[विवृत] — identical in aperture to long @deva[आ] — to preserve the @deva[सवर्ण] (homogeneity) between them per @ref[1.1.9], without which rules depending on that homogeneity would fail. This closing @[sutra] — @deva[अ] @deva[अ] — restores the phonetic reality: in actual speech, the articulatory organ for short @deva[अ] is @deva[संवृत]. Examples: @deva[वृक्षः], @deva[प्लक्षः]. Long @deva[आ] and @deva[प्लुत] @deva[आ३] are not included — only the six varieties of short one-@[matra] @deva[अ] (@deva[अ]@deva[꣡], @deva[अ॒], @deva[अ॑], @deva[अँ]@deva[꣡], @deva[अँ], @deva[अँ॑]) are converted to their contracted counterparts. See @ref[1.1.9].
"""

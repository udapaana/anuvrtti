id = "8.4.50"
numericId = "84050"

[en]
simple = """
According to @deva[शाकटायन], when three or more letters are joined using a @deva[संयोग], the @deva[द्वित्वम्] does not happen.
"""

standard = """
@[śākaṭāyana]: No doubling when 3+ consonants cluster. @deva[इन्द्रः], @deva[राष्ट्रम्] (no doubling).
"""

advanced = """
According to the option of @deva[शाकटायन] , the doubling does not take place when the conjunct consonants are three or more in number. A @deva[इन्द्रः], @deva[चन्द्रः], @deva[उष्ट्रः], @deva[राष्ट्रम्], @deva[भ्राष्ट्रम्] @deva[॥]
"""

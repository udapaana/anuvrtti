id = "8.4.22"
numericId = "84022"

[en]
simple = """
When the word @deva[हन्] comes after an @deva[उपसर्ग] containing a @deva[रेफ], the @deva[नकार] of @deva[हन्] is converted to @deva[णकार] only if that @deva[नकार] is preceded by an @deva[अकार], not otherwise.
"""

standard = """
@deva[अ]-preceded @deva[न्] of @deva[हन्] → @deva[ण्] after change-causing @deva[उपसर्ग]. @deva[प्रहण्यते], @deva[परिहणनम्]. Not: @deva[प्रघ्नन्ति] (@deva[अ] elided), @deva[प्रघानि] (long @deva[आ]).
"""

advanced = """
@deva[न] of @deva[हन्] → @deva[ण] after a triggering @deva[उपसर्ग], but only when the @deva[न] is preceded by short @deva[अ]. Examples: @deva[प्रहण्यते], @deva[परिहण्यते], @deva[प्रहणनम्], @deva[परिहणनम्]. When @deva[अ] is elided, the change does not apply: @deva[प्रघ्नन्ति], @deva[परिघ्नन्ति] (@ref[6.4.98], @ref[8.3.54]). When @deva[न] is preceded by long @deva[आ] rather than short @deva[अ], the change is also blocked: @deva[प्रघानि] (aorist of @deva[हन्] by @deva[चिण्], @ref[3.1.60] — @deva[प्रहन्] + @deva[चिण्] = @deva[प्रघन्] + @deva[चिण्] by @ref[8.3.54] = @deva[प्रघानि]), @deva[पर्यघानि].
"""

id = "8.4.55"
numericId = "84055"

[en]
simple = """
A @deva[झल्]-letter is converted to a corresponding @deva[चर्]-letter when followed by a @deva[खर्]-letter.
"""

standard = """
@deva[चर्त्व]: @deva[झल्] → @deva[चर्] (unvoiced unaspirated) before @deva[खर्] (voiceless). @deva[भेत्ता], @deva[युयुत्सते].
"""

advanced = """
@deva[झल्] → @deva[चर्] (voiceless unaspirated) before @deva[खर्] (voiceless consonant). @deva[झलां] and @deva[चरः] continue from @ref[8.4.54]. Examples: @deva[भेद्] + @deva[ता] = @deva[भेत्ता], @deva[भेत्तुम्], @deva[भेत्तव्यम्]; @deva[युयुध्] + @deva[सते] = @deva[युयुत्सते]; @deva[आरिप्सते], @deva[आलिप्सते] (from @deva[रभ्] and @deva[लभ्]; @deva[इस्] substituted for @deva[अ] by @ref[7.4.54], yielding @deva[रिस्भ्स्] and @deva[लिस्भ्स्]; first @deva[स] elided by @ref[8.2.29]).
"""

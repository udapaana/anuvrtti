id = "8.4.64"
numericId = "84064"

[en]
simple = """
A @deva[यम्]-letter sandwiched between a @deva[हल्]-letter (on left) and the same @deva[यम्]-letter (on right) is optionally removed.
"""

standard = """
After consonant, @deva[यम्] (semivowel/nasal) optionally elided when same follows. @deva[शय्या] or @deva[शय्य्या]. Not: @deva[अन्नम्] (vowel before).
"""

advanced = """
A @deva[यम्] letter (semivowel or nasal) following a consonant (@deva[हल्]) is optionally elided when the same @deva[यम्] letter follows it. @deva[अन्यतरस्याम्] is to be read into the @[sutra]. Example: @deva[शय्य्या] or @deva[शय्या] — the middle @deva[य्] is elided. In @deva[शय्या] there are three @deva[य]s: one from @deva[क्यप्] (@ref[3.3.99]), one from @deva[अयङ्] (@ref[7.4.22]), and one from doubling (@ref[8.4.47]). @deva[आदित्य्य] (doubled @deva[य] by @[vartika] under @ref[8.4.47]) or @deva[आदित्य] ('son of @[aditi]'): two @deva[य]s from @deva[ण्य] (@ref[4.1.85]) plus doubling; a third @deva[य] arises by @ref[8.4.47], and one or both middle @deva[य]s may be elided — @deva[आदित्यः] or @deva[आदित्य्य]. The @deva[हलः] condition: when preceded by a vowel, not by a consonant, the rule does not apply — @deva[अन्नम्]. The @deva[यमाम्] condition: the elided letter must be a @deva[यम्] — @deva[अग्ग्निः], @deva[अर्घ्यम्] (@ref[5.4.25]) are unaffected because @deva[घ] is not @deva[यम्]. The @deva[यमि] condition: the following letter must also be @deva[यम्] — @deva[शार्ङ्गम्] is unaffected because @deva[ङ्] is not followed by a @deva[यम्] letter.
"""

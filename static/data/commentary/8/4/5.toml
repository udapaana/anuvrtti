id = "8.4.5"
numericId = "84005"

[en]
simple = """
The n in vana becomes retroflex @[ṇ] after a further set of words — prefixes like pra, nir, antar and plant names like @[śara], @[ikṣu], @[plakṣa], @[āmra], @[kārṣya], khadira, and @[pīyūkṣā] — even when the compound is not a proper name. Examples include @[pravaṇe] and @[ikṣuvaṇam].
"""

standard = """
The @deva[न] of @deva[वन] is replaced by @deva[ण] after the words @deva[प्र], @deva[निर्], @deva[अन्तर्], @deva[शर], @deva[इक्षु], @deva[प्लक्ष], @deva[आम्र], @deva[कार्ष्य], @deva[खदिर], and @deva[पीयूक्षा], even when the resulting compound is not a @deva[संज्ञा]. The @deva[प्रादि] compounds @deva[प्रवणम्] and @deva[निर्वणम्] illustrate the prefixes; @deva[इक्षुवणम्] and @deva[आम्रवणम्] illustrate the plant-name compounds formed by @deva[षष्ठी]-@[tatpurusha] @ref[8.4.3].
"""

advanced = """
@deva[न] of @deva[वन] → @deva[ण] even outside @deva[संज्ञा] compounds when preceded by @deva[प्र], @deva[निर्], @deva[अन्तर], @deva[शर], @deva[इक्षु], @deva[प्लक्ष], @deva[आम्र], @deva[कार्ष्य], @deva[खदिर], or @deva[पीयूक्षा]. Examples: @deva[प्रवणे] @deva[यष्टम्], @deva[निर्वणे] @deva[प्रतिधीयते], @deva[अन्तर्वणे], @deva[शरवणम्], @deva[इक्षुवणम्], @deva[प्लक्षवणम्], @deva[आम्रवणम्], @deva[कार्ष्यवणम्], @deva[खदिरवणम्], @deva[पीयुक्षावणम्]. @deva[प्रवणं] and @deva[निर्वणं] are @deva[प्रादि] compounds; @deva[अन्तर्वणं] is an @[avyayibhava] in the sense of a case-affix; the rest are @deva[षष्ठी]-@[tatpurusha] compounds.
"""

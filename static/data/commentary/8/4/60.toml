id = "8.4.60"
numericId = "84060"

[en]
simple = """
A letter of @deva[तवर्ग] is converted to a @deva[परसवर्ण] when followed by a @deva[लकार].
"""

standard = """
@deva[तु] → @deva[ल] before @deva[ल्]. @deva[अग्निचिल्लुनाति], @deva[भवाँल्लुनाति].
"""

advanced = """
@deva[तु] (dental) → homogeneous substitute (= @deva[ल]) before @deva[ल्]. Examples: @deva[अग्निचित्] + @deva[लुनाति] = @deva[अग्निचिल्लुनाति]; @deva[सोमसुल्लुनाति]. @deva[भवान्] + @deva[लुनाति] = @deva[भवाँल्लुनाति]; @deva[महाँल्लुनाति]. In the case of @deva[त], the substitute is pure @deva[ल]; for dento-nasal @deva[न्], the substitute is nasal @deva[लँ].
"""

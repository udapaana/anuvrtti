id = "8.4.47"
numericId = "84047"

[en]
simple = """
The @deva[यर्] letter that follows an @deva[अच्] letter but is not followed by an @deva[अच्] letter is optionally duplicated.
"""

standard = """
@deva[यर्] doubled after vowel when no vowel follows. @deva[दध्ध्यत्र], @deva[मद्ध्वत्र]. Vt: @deva[मय्] doubled after @deva[यण्]. Vt: @deva[खय्] doubled after @deva[शर्]. Vt: @deva[यर्] doubled at pause.
"""

advanced = """
@deva[यर्] (all consonants except @deva[ह]) is reduplicated after a vowel when no vowel follows. @deva[अचः] and @deva[यरः] continue by @[anuvritti]. Examples: @deva[दधि] + @deva[अत्र] = @deva[दध्य्] + @deva[अत्र] (@ref[6.1.77]) → @deva[दद्ध्यत्र] (with @deva[जश्त्व] by @ref[8.4.53]); similarly @deva[मद्ध्वत्र]. The @deva[अचः] condition: @deva[स्मितम्], @deva[स्मातम्] — no vowel precedes, so no reduplication. Vt: @deva[यणो] @deva[मयो] @deva[द्वे] @deva[भवतः]. Two readings: (1) @deva[मय्] letters reduplicate after @deva[यण्] — @deva[उल्क्का], @deva[वाल्मीकः]; (2) @deva[यण्] letters reduplicate after @deva[मय्] — @deva[दध्य्यत्र], @deva[मध्व्वत्र]. Vt: @deva[शरः] @deva[खयो] @deva[द्वे] @deva[भवतः]. Similarly: (1) @deva[खय्] reduplicated after @deva[शर्] — @deva[स्थ्थाल], @deva[स्थ्थात]; (2) @deva[शर्] reduplicated after @deva[खय्] — @deva[वत्स्सरः], @deva[अप्स्सराः]. Vt: @deva[अवसाने] @deva[च] @deva[यरो] @deva[द्वे] @deva[भवतः] — @deva[यर्] is reduplicated at a pause: @deva[वाक्क्], @deva[त्वक्क्], @deva[षट्ट्], @deva[तत्त्]. These reduplications are more curiosities than practicalities.
"""

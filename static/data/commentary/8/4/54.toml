id = "8.4.54"
numericId = "84054"

[en]
simple = """
A @deva[झल्] letter present in an @deva[अभ्यास] is converted either to a @deva[जश्] letter or a @deva[चर्] letter as appropriate.
"""

standard = """
In reduplicate, @deva[झल्] → @deva[चर्] (unvoiced unaspirated) or @deva[जश्]. @deva[चिखनिषति] (@deva[ख] → @deva[च]), @deva[बुभूषति] (@deva[भ] → @deva[ब]), @deva[चिचीषति] (@deva[च] unchanged).
"""

advanced = """
In the @deva[अभ्यास] (reduplicate syllable), @deva[झल्] → @deva[चर्] (voiceless unaspirated) or @deva[जश्] (voiced unaspirated). The word @deva[च] draws @deva[जश्] into the @[sutra] alongside @deva[चर्]. By the @deva[स्थानिवत्] principle (@ref[1.1.50]): @deva[जश्] replaces voiced mutes, @deva[चर्] replaces voiceless mutes — in effect, all aspirates become unaspirated in the reduplicate. Examples: @deva[चिखनिषति] (@deva[सन्] + @deva[खन्]; @deva[ख] → @deva[छ] by @ref[7.4.62], then @deva[छ] → @deva[च] by this rule); @deva[चिच्छिषति], @deva[टिठकारयिषति], @deva[तिष्ठासति], @deva[पिफकारयिषति], @deva[बुभूषति], @deva[जिघत्सति], @deva[डुढौकिषते]. Original @deva[चर्] letters remain unchanged: @deva[चिचीषति], @deva[टिटीकिषते], @deva[तितनिषति]. Original @deva[जश्] letters likewise remain: @deva[जिजनिषति], @deva[बुबुधे], @deva[ददौ], @deva[डिड्ये]. More precisely, @deva[चर्] replaces @deva[चर्] and @deva[जश्] replaces @deva[जश्].
"""

id = "8.4.67"
numericId = "84067"

[en]
simple = """
According to the mainstream grammarians, an @[anudātta] vowel does not change to svarita when it is followed by an @[udātta] or svarita — this blocks the preceding rule for most environments. However, three ancient authorities (@[gārgya], @[kāśyapa], and @[gālava]) permit the change even in those positions. The sutra's choice of the word udaya ('arising') instead of para ('following') is seen as an auspicious ending to the @[aṣṭādhyāyī].
"""

standard = """
The general rule of @ref[8.4.66] is suspended when the @deva[अनुदात्त] is followed by an @deva[उदात्त] or @deva[स्वरित] — giving @deva[उदात्तोदयः] or @deva[स्वरितोदयः] — except in the view of @deva[गार्ग्य], @deva[काश्यप], and @deva[गाल्व], who permit the @deva[स्वरित] change in these contexts too. Thus @deva[गा]@deva[꣡]@deva[र्ग्यस्त]@deva[꣡]@deva[त्र॑]: before the @deva[लित्]-accented @deva[उदात्त] @deva[त]@deva[꣡]@deva[त्र], the @deva[य] of @deva[गार्ग्य] remains @deva[अनुदात्त] for most @deva[आचार्य]s but becomes @deva[स्वरित] for those three @ref[8.4.66]. The @[sutra]'s use of @deva[उदय] (= @deva[पर] in older grammarians' terminology) rather than @deva[पर] is an auspicious literary choice marking the close of the @[ashtadhyayi] — @deva[वृद्धि] opens @ref[1.1.1] and @deva[उदय] closes.
"""

advanced = """
The @deva[स्वरित]-substitution of @ref[8.4.66] is suspended when the @deva[अनुदात्त] is followed by an @deva[उदात्त] (@deva[उदात्तोदय]) or a @deva[स्वरित] (@deva[स्वरितोदय]) — except in the view of @deva[गार्ग्य], @deva[काश्यप], and @deva[गाल्व], who permit the change even then. The term @deva[उदय] = @deva[पर] in the terminology of ancient grammarians; @deva[उदात्तोदय] and @deva[स्वरितोदय] are @[bahuvrihi] compounds. @deva[उदात्तोदय] examples: @deva[गा]@deva[꣡]@deva[र्ग्यस्त]@deva[꣡]@deva[त्र॑], @deva[वा]@deva[꣡]@deva[त्स्य॒] @deva[स्त]@deva[꣡]@deva[त्र॑] — @deva[त]@deva[꣡]@deva[त्र] is first-acute by @deva[लित्] accent; before this @deva[उदात्त], the @deva[य] does not become @deva[स्वरित]. @deva[स्वरितोदय] examples: @deva[गा]@deva[꣡]@deva[र्ग्यः॒॑] @deva[क्व॑], @deva[वा]@deva[꣡]@deva[त्स्यः॒॑] @deva[क्व॑] — @deva[क्व] is @deva[स्वरित] by @deva[तित्] affix @deva[अत्] (@ref[5.3.12]); before this @deva[स्वरित], the preceding @deva[य] does not become @deva[स्वरित]. For @deva[गार्ग्य], @deva[काश्यप], and @deva[गाल्व], the change does take place: @deva[गार्ग्यः॑] @deva[क्व॑], @deva[गा]@deva[꣡]@deva[र्ग्य॑स्तत्र]. The use of @deva[उदय] ('rising') rather than the shorter @deva[पर] is an auspicious choice marking the close of the @[ashtadhyayi] — @deva[वृद्धि] ('increase') opens @ref[1.1.1], @deva[शिव] ('well-wisher') appears in the middle (@ref[4.4.143]), and @deva[उदय] closes. The naming of those three @deva[आचार्य]s is @deva[पूजार्थम्] (honorific).
"""

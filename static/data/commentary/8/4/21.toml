id = "8.4.21"
numericId = "84021"

[en]
simple = """
When the verb @deva[अन्] (@deva[प्राणने]) is used along with a @deva[रेफ]/@deva[षकारयुक्त] @deva[उपसर्ग] (like @deva[प्र] or @deva[परा]), and when such a verb undergoes a @deva[द्वित्व], then both of the @deva[नकार]s become @deva[णकार].
"""

standard = """
@deva[न्] of @deva[मन्] (think) → @deva[ण्] after change-causing @deva[उपसर्ग]. @deva[प्रमाणं], @deva[विमाणं]. Not: @deva[प्रमन्यते] (different root).
"""

advanced = """
Both @deva[न]s become @deva[ण] in reduplicated forms of @deva[अन्] after a triggering @deva[उपसर्ग]. Desiderative: @deva[प्राणिणिषति], @deva[पराणिणिषति]. Causative aorist: @deva[प्राणिणत्], @deva[पराणिणत्]. If the maxim @deva[पूर्वत्रासिद्धीयमद्विर्वचने] were applied, a dilemma arises: in @deva[प्रानि] + @deva[स] + @deva[ति], both @deva[सन्]-reduplication and @deva[णत्व] are required. If @deva[णत्व] is @[asiddha] and reduplication applies first, the reduplicate @deva[णि] intervenes between @deva[प्र] and the root-@deva[न्], blocking @deva[णत्व] on the second @deva[न]. Alternatively, if @deva[णत्व] applies first (@deva[प्राणि] + @deva[स] + @deva[ति]) and the reduplicate copies @deva[णि], the correct form @deva[प्राणिणिषति] emerges even without this @[sutra]. The @[sutra] is nevertheless needed: it serves as a @[jnapaka] that the maxim @deva[पूर्वत्रासिद्ध] is @[anitya] (not universally applicable). This @[anitya] status also accounts for the form @deva[औजढत्], where @deva[हत्] is reduplicated (see @ref[8.2.1]).
"""

id = "8.4.61"
numericId = "84061"

[en]
simple = """
The @deva[स्था] and @deva[स्तम्भ्] are converted to @deva[पूर्वसवर्ण] when they follow the upasarga @deva[उत्] @deva[।]
"""

standard = """
After @deva[उद्], @deva[स्] of @deva[स्था]/@deva[स्तम्भ्] → dental (@deva[थ्]). @deva[उत्थाता], @deva[उत्तम्भिता]. Not: @deva[उत्स्नात]. Vt: Vedic @deva[उत्कन्दः] (@deva[स्कन्द्]).
"""

advanced = """
After @deva[उद्], the @deva[स्] of @deva[स्था] or @deva[स्तम्भ्] is replaced by a letter homogeneous with the preceding consonant (i.e., a dental replaces @deva[स्]). Derivation: @deva[उद्] + @deva[स्थाता] → @deva[उद्] + @deva[थ्थाता] → @deva[उद्] + @deva[थाता] (@ref[8.4.65]) → @deva[उत्] + @deva[थाता] (@ref[8.4.55]) = @deva[उत्थाता], @deva[उत्थातुम्], @deva[उत्थातव्यम्] (see @ref[1.1.67], @ref[1.1.54]). With @deva[स्तम्भ्]: @deva[उत्तम्भिता], @deva[उत्तम्भितुम्]. The rule is restricted to @deva[स्था] and @deva[स्तम्भ्] — counter-example: @deva[उत्स्नात]. Vt: In the @deva[छन्दस्], the substitution also applies to @deva[स्कन्द] after @deva[उद्]: @deva[अग्रे] @deva[दूरमुत्कन्दः]. Vt: Also when denoting a disease: @deva[उत्कन्दको] @deva[नाम] @deva[रोगः] — though this form may alternatively derive from the root @deva[कन्द] rather than @deva[स्कन्द].
"""

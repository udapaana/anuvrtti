id = "8.4.33"
numericId = "84033"

[en]
simple = """
The initial n of the roots @[niś], @[nikṣ], and nind optionally changes to retroflex @[ṇ] when preceded by a change-causing upasarga, giving forms like @[praṇiṃsanam] or @[praniṃsanam]. This overrides the otherwise obligatory change that these roots would undergo because they are listed in the @[dhātupāṭha] with an initial @[ṇ].
"""

standard = """
The @deva[न्] of the roots @deva[निस्], @deva[निक्ष], and @deva[निन्द] is optionally changed to @deva[ण] after a @deva[णत्व]-inducing @deva[उपसर्ग]: @deva[प्रणिंसनम्] or @deva[प्रनिंसनम्], @deva[प्रणिक्षणम्] or @deva[प्रनिक्षणम्], @deva[प्रणिन्दनम्] or @deva[प्रनिन्दनम्] @ref[8.4.14]. These roots are listed with initial @deva[ण] in the @[dhatupatha] (@deva[णिसि] 'to kiss', @deva[णिक्षि] @deva[रोषणे], @deva[णिदि] @deva[कुत्सायाम्]), so @ref[8.4.14] would make the change obligatory; this @[sutra] overrides that by permitting the non-retroflex form as well.
"""

advanced = """
@deva[न्] of @deva[निस्], @deva[निक्ष], and @deva[निन्द] optionally → @deva[ण] after a triggering @deva[उपसर्ग]. Examples: @deva[प्रणिंसनम्] or @deva[प्रनिंसनम्], @deva[प्रणिक्षणम्] or @deva[प्रनिक्षणम्], @deva[प्रणिन्दनम्] or @deva[प्रनिन्दनम्]. These roots are listed with initial @deva[ण] in the @[dhatupatha] (@deva[णिसि] 'to kiss', @deva[णिक्षि] @deva[रोषणे], @deva[णिदि] @deva[कुत्सायाम्]), so @ref[8.4.14] would make the change obligatory. This @[sutra] overrides that by permitting the non-retroflex form as well.
"""

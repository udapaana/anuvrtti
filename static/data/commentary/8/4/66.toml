id = "8.4.66"
numericId = "84066"

[en]
simple = """
An @[anudātta] (low-pitch) vowel that immediately follows an @[udātta] (high-pitch) vowel in connected speech receives a svarita (mixed) accent. This is why the initial @[ī] of @[īle] in @[agnimīle] becomes svarita — the preceding i of agni is @[udātta]. Similarly the a of the present-tense suffix -a- in Pacati becomes svarita after the root's @[udātta].
"""

standard = """
An @deva[अनुदात्त] vowel following an @deva[उदात्त] is replaced by @deva[स्वरित]. In @deva[अग्निम्] + @deva[ईले] → @deva[अग्नि॑मीले], the @deva[ई] (@[anudātta] by @ref[8.1.28]) becomes @deva[स्वरित] after the @deva[उदात्त] @deva[इ] of @deva[अग्नि]. Similarly @deva[गा]@deva[꣡]@deva[र्ग्यः॑] and @deva[वा]@deva[꣡]@deva[त्स्यः॑] (formed with @deva[यञ्] @ref[4.1.105], @deva[ञित्] so root-acute, final @deva[अनुदात्त] → @deva[स्वरित]); and @deva[प]@deva[꣡]@deva[च॑ति] where @deva[शप्] and @deva[तिप्] are @deva[अनुदात्त] @ref[8.4.3]. Rule @ref[6.1.158] does not override this @deva[स्वरित], because the present rule is @deva[असिद्ध] for that purpose @ref[8.2.1], so both accents are audible.
"""

advanced = """
@deva[अनुदात्त] vowel → @deva[स्वरित] when it follows an @deva[उदात्त] vowel. Example: @deva[अग्निम्] + @deva[ईले] = @deva[अग्नि॑मीले] — @deva[ई], which was @deva[अनुदात्त] by @ref[8.1.28], becomes @deva[स्वरित] after the @deva[उदात्त] @deva[इ] of @deva[अग्नि]. Similarly @deva[गा]@deva[꣡]@deva[र्ग्यः॑], @deva[वा]@deva[꣡]@deva[त्स्यः॑] — @deva[यञ्] added by @ref[4.1.105], being @deva[ञित्] the words are first-acute; the final @deva[अनुदात्त] becomes @deva[स्वरित]. Also @deva[प]@deva[꣡]@deva[च॑ति] and @deva[प]@deva[꣡]@deva[ठ॑ति] — @deva[शप्] and @deva[तिप्] are @deva[अनुदात्त], the root carries @deva[उदात्त], and the @deva[अ] of @deva[शप्] becomes @deva[स्वरित]. @ref[6.1.158] does not convert this @deva[स्वरित] back to @deva[अनुदात्त], because for the purposes of that rule the present @deva[स्वरित]-substitution is @deva[असिद्ध] (@ref[8.2.1]). Both @deva[उदात्त] and @deva[स्वरित] accents are therefore heard.
"""

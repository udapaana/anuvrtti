id = "8.4.24"
numericId = "84024"

[en]
simple = """
The @deva[नकार] of @deva[हन्] is converted to @deva[णकार] when this word follows the word '@deva[अन्तर्]' and when this @deva[नकार] is preceded by a @deva[ह्रस्व] @deva[अकार]. But this @deva[णत्व] does not happen if the resultant word indicates the name of a place.
"""

standard = """
@deva[अ]-preceded @deva[न्] of @deva[हन्] → @deva[ण्] after @deva[अन्तर्] (not meaning 'country'). @deva[अन्तर्हण्यते]. Not: @deva[अन्तर्हननी] @deva[देशः].
"""

advanced = """
@deva[न] (preceded by short @deva[अ]) of @deva[हन्] → @deva[ण] after @deva[अन्तर्], provided the resulting word does not denote a country (@deva[अदेश]). Examples: @deva[अन्तर्हण्यते], @deva[अन्तर्हणनं]. Counter-example: @deva[अन्तर्हननी] @deva[देशः] (denoting a place). The condition @deva[अत्पूर्वस्य] from @ref[8.4.22] continues here: when @deva[अ] is elided, no change — @deva[अन्तर्घ्नन्ति]; when @deva[न] follows long @deva[आ], no change — @deva[अन्तरघानि]. @deva[अन्तर्] qualifies as an @deva[उपसर्ग] for @deva[णत्व] purposes by the @[vartika] under @ref[1.4.65], so @ref[8.4.22] would already produce the change. This @[sutra] restricts it: the change applies only when the word does not mean a country.
"""

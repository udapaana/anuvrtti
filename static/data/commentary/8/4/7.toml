id = "8.4.7"
numericId = "84007"

[en]
simple = """
When the word ahna (a substitute for ahan, 'day') is the second member of a compound, and the first member ends in short a and contains a change-causing sound, the n of ahna changes to @[ṇ]. This gives forms like @[pūrvāhṇaḥ] ('forenoon') and @[aparāhṇaḥ] ('afternoon'). The first member must end in a — compounds with prefixes like nir do not qualify.
"""

standard = """
The @deva[न] of @deva[अह्न] (the @[samasanta] substitute for @deva[अहन्] by @ref[5.4.88]) becomes @deva[ण] when the prior compound member ends in @deva[अ] and contains a @deva[णत्व]-triggering letter. Hence @deva[पूर्वाह्णः] and @deva[अपराह्णः] but not @deva[निरह्नः] (prior member ends in @deva[र्], not @deva[अ]) @ref[8.4.3]. The @[sutra]'s use of @deva[अह्नः] as nominative — not genitive of @deva[अहन्] — follows the convention of exhibiting the @deva[sthānin] in nominative, as in @ref[8.4.4]. The feminine @deva[दीर्घाह्नी] is a @[bahuvrīhi], not a @[tatpuruṣa], and so @deva[टच्] does not apply @ref[5.4.91].
"""

advanced = """
@deva[न] of @deva[अहन्] (in its @deva[समासान्त] substitute form @deva[अह्न], @ref[5.4.88]) → @deva[ण] when preceded by a word ending in @deva[अ] that contains a @deva[णत्व]-triggering letter. Examples: @deva[पूर्वाह्णः] ('forenoon'), @deva[अपराह्णः] ('afternoon'). The condition 'ending in @deva[अ]' excludes @deva[निरह्नः] and @deva[दुरह्नः]. Since the @[sutra] cites @deva[अह्न] (ending in @deva[अ]), the rule does not extend to other forms — hence @deva[दीर्घाह्नी] @deva[शरत्] is unaffected. The word @deva[अह्नः] in the @[sutra] is nominative, not genitive of @deva[अहन्], following the convention that @[sthanin]s are cited in the nominative (compare @deva[वनं] in @ref[8.4.4], @deva[वाहनं] in @ref[8.4.8]). Derivational sequence: compounding by @ref[2.2.1], then @deva[समासान्त] @deva[टच्] (@ref[5.4.91]), then @deva[अह्न]-substitution (@ref[5.4.88]). @deva[दीर्घाह्नी] is a @[bahuvrihi], not a @[tatpurusha], so @deva[टच्] does not apply; feminine @deva[ङीप्] is by @ref[4.1.28], and elision of @deva[अ] of @deva[अहन्] by @ref[6.4.134].
"""

id = "8.4.17"
numericId = "84017"

[en]
simple = """
A @deva[णत्वनिमित्तक] @deva[उपसर्ग] causes the @deva[णत्व] of the @deva[उपसर्ग] '@deva[नि]' attached to the following verbs - @deva[गद्], @deva[नद्], @deva[पत्], @deva[पद्], @deva[मा], @deva[सो], @deva[हन्], @deva[या], @deva[वा], @deva[द्रा], @deva[प्सा], @deva[वप्], @deva[वह्], @deva[शम्], @deva[चि], @deva[दिह्] , and also for @deva[घुसंज्ञक] verbs.
"""

standard = """
@deva[नि] → @deva[णि] after change-causing @deva[उपसर्ग] before @deva[गद]/@deva[नद]/@deva[पत]/@deva[पद]/@deva[घु] verbs/@deva[मा]/@deva[सो]/@deva[हन्]/@deva[या]/@deva[वा]/@deva[द्रा]/@deva[प्सा]/@deva[वप्]/@deva[वह्]/@deva[शम्]/@deva[चि]/@deva[दिह्]. @deva[प्रणिगदति], @deva[प्रणिददाति]. @[iṣṭi]: Also when @deva[अट्] intervenes.
"""

advanced = """
@deva[न्] of the prefix @deva[नि] → @deva[ण] after a triggering @deva[उपसर्ग], when the following root is one of: @deva[गद्] ('speak'), @deva[नद्] ('be happy'), @deva[पत्] ('fall'), @deva[पद्] ('go'); the @deva[घु] verbs; @deva[मा] ('measure'), @deva[सो] ('destroy'), @deva[हन्] ('kill'), @deva[या] ('go'), @deva[वा] ('blow'), @deva[द्रा] ('flee'), @deva[प्सा] ('eat'), @deva[वप्] ('weave'), @deva[वह्] ('bear'), @deva[शम्] ('be tranquil'), @deva[चि] ('collect'), @deva[दिह्] ('anoint'). Examples: @deva[गद्] — @deva[प्रणिगदति], @deva[परिणिगदति]. @deva[नद्] — @deva[प्रणिनदति], @deva[परिणिनदति]. @deva[पत्] — @deva[प्रणिपतति], @deva[परिणिपतति]. @deva[पद्] — @deva[प्रणिपद्यते], @deva[परिणिपद्यते]. @deva[घु] — @deva[प्रणिददाति], @deva[परिणिददाति], @deva[प्रणिदधाति], @deva[परिणिदधाति]. @deva[माङ्] — @deva[प्रणिमिमीते], @deva[परिणिमिमीते]. @deva[मेङ्] — @deva[प्रणिमयते], @deva[परिणिमयते]. @[ishti]: the term @deva[मा] in the @[sutra] covers both @deva[माङ्] and @deva[मेङ्], not @deva[मी]/@deva[मि]/@deva[मा] @deva[माने] (which also yield the form @deva[मा] by @ref[6.1.50]). @deva[सो] — @deva[प्रणिष्यति], @deva[परिणिष्यति]. @deva[हन्] — @deva[प्रणिहन्ति], @deva[परिणिहन्ति]. @deva[या] — @deva[प्रणियाति], @deva[परिणियाति]. @deva[वा] — @deva[प्रणिवाति], @deva[परिणिवाति]. @deva[द्रा] — @deva[प्रणिद्राति], @deva[परिणिद्राति]. @deva[प्सा] — @deva[प्रणिप्साति], @deva[परिणिप्साति]. (The last five roots belong to the @[adadi] class.) @deva[वप्] — @deva[प्रणिवपति], @deva[परिणिवपति]. @deva[वह्] — @deva[प्रणिवहति], @deva[परिणिवहति]. @deva[शम्] — @deva[प्रणिशाम्यति], @deva[परिणिशाम्यति] (@ref[7.3.74]). @deva[चि] — @deva[प्रणिचिनोति], @deva[परिणिचिनोति]. @deva[दिह्] — @deva[प्रणिदेग्धि], @deva[परिणिदेग्धि]. @[ishti]: the change applies even when augment @deva[अट्] intervenes: @deva[प्रण्यगदत्], @deva[परिण्यगदत्]. The roots are exhibited in their conjugated forms in the @[sutra] to indicate that the rule does not apply to @deva[यङ्] @deva[लुक्] forms (@ref[7.1.6]).
"""

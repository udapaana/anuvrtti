id = "8.4.4"
numericId = "84004"

[en]
simple = """
The n sound at the end of the word vana ('forest') changes to retroflex @[ṇ] when certain specific place-names come before it in a compound: @[puragā], @[miśrakā], @[sidhrakā], @[śārikā], @[koṭarā], and Agre. This produces forms like @[puragāvaṇam] and Agre­@[vaṇam]. The rule is restrictive — it applies only to these listed names, not to other compounds like Kuberavana.
"""

standard = """
The @deva[न] of @deva[वन] becomes @deva[ण] when the compound's first member is one of six specified proper nouns: @deva[पुरगा], @deva[मिश्रका], @deva[सिध्रका], @deva[शारिका], @deva[कोटरा], or @deva[अग्रे], and the whole compound is a @deva[संज्ञा] (proper name). The terms @deva[पूर्वपदात्] and @deva[संज्ञायाम्] carry over from @ref[8.4.3]. This is a @deva[नियम] (restrictive) rule: only these six words trigger the change, so @deva[कुबेरवनम्] and @deva[शतधारवनम्] remain unchanged. Final vowel lengthening in the examples is by @ref[6.3.117].
"""

advanced = """
@deva[न] of @deva[वन] → @deva[ण] when preceded by @deva[पुरगा], @deva[मिश्रका], @deva[सिध्रका], @deva[शारिका], @deva[कोटरा], or @deva[अग्रे] as first members, with @deva[पूर्वपदात्] and @deva[संज्ञायाम्] continuing from @ref[8.4.3]. Examples: @deva[पुरगावणम्], @deva[मिश्रकावणम्], @deva[सिध्रकावणं], @deva[कोटरावणम्], @deva[अग्रेवणम्] (@ref[2.2.31]), @deva[शारिकावणम्]. Final lengthening is by @ref[6.3.117]. Though @deva[अग्रेवणं] is not a @deva[संज्ञा], @ref[6.3.9] applies and the case-affix is retained because it appears in the @[rajadantadi] list (@ref[2.2.31]). The @deva[णत्व] here would already follow from the preceding rule; the separate enunciation for @deva[वन] marks this as a @deva[नियम] — the change applies only after these listed words and no others. Counter-examples: @deva[कुबेरवनं], @deva[शतधारवनम्], @deva[असिपत्रवनम्].
"""

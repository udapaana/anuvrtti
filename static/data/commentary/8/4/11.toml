id = "8.4.11"
numericId = "84011"

[en]
simple = """
Optionally, a word-stem-final n, the augment num, or a case-ending n in a compound can change to retroflex @[ṇ] when the first member contains a change-causing letter. Examples include dual forms like @[māṣavāpiṇau] or @[māṣavāpinau], and instrumental @[māṣavāpeṇa] or @[māṣavāpena]. A @[vārttika] excludes the @[yuvā] class of words.
"""

standard = """
Optionally, @deva[ण] replaces @deva[न] when it is (a) @deva[प्रातिपदिकान्त] — stem-final, as @deva[माषवापिणौ] or @deva[माषवापिनौ] (@deva[णिनि] @ref[3.2.81]); (b) the augment @deva[नुम्] — as @deva[माषवापाणि] or @deva[माषवापानि] (@ref[7.1.72]); or (c) a @deva[विभक्ति] @deva[न] — as @deva[माषवापेण] or @deva[माषवापेन] @ref[8.4.3]. Composition precedes case-affixation per @ref[2.2.19], making @deva[वापिन्] a @deva[प्रातिपदिकान्त] before @deva[ङीप्] is added. The @[vartika] prohibits the change in @deva[युवा]-class words such as @deva[आर्ययूना].
"""

advanced = """
Optionally, @deva[ण] replaces @deva[न] when it is (a) @deva[प्रातिपदिकान्त] (stem-final), (b) the augment @deva[नुम्], or (c) part of a @deva[विभक्ति] (case-affix), and the trigger occurs in the @deva[पूर्वपद] of the compound. (a) @deva[प्रातिपदिकान्त]: @deva[माषवापिणौ] or @deva[माषवापिनौ] (from @deva[माषवापिन्], '@[masha]-sowing', formed by @deva[णिनि] under @ref[3.2.81]). (b) @deva[नुम्]: @deva[माषवापाणि] or @deva[माषवापानि], @deva[व्रीहिवापाणि] or @deva[व्रीहिवापानि] (nominative plural neuter; @deva[नुम्] added by @ref[7.1.72], from @deva[माषान्] @deva[वपयन्ति] = @deva[माषवाप] with @deva[कर्मणि] @deva[अण्], plural @deva[शि] by @ref[7.1.20]). (c) @deva[विभक्ति]: @deva[माषवापेण] or @deva[माषवापेन], @deva[व्रीहिवापेण] or @deva[व्रीहिवापेन]. Here @deva[प्रातिपदिकान्त] specifically means 'final in a @[pratipadika] that is the second member of a compound whose first member contains the trigger'. The change therefore does not apply in @deva[गर्गभगिनी] ('the sister of @[garga]', where @deva[न्] is stem-final in a simple word). But @deva[गर्गभगिणी] — derived from @deva[गर्गभगः] + adjectival @deva[इन्] → @deva[इनी], meaning 'enjoying the share of @[garga]' — undergoes obligatory change, parallel to @deva[मातृभोगीणः]. Composition precedes case-affixation per @ref[2.2.19]: @deva[गति], @deva[कारक], and @deva[उपपद] compound with @deva[कृत्]-ending bases before @deva[सुप्] or feminine affixes are added. So @deva[माषवापिन्] (@deva[माष] + @deva[वापिन्]) compounds first, making @deva[वापिन्] a @deva[प्रातिपदिकान्त] in @deva[न्]; the feminine affix is added afterward. Similarly, @deva[नुम्] counts as the end-portion of the full compound, not of the second member alone. Vt: The change is prohibited for @deva[युवा]-class words: @deva[आर्ययूना] (@ref[6.4.133]), @deva[क्षत्रिययूना]. @deva[प्रपक्वानि] is a @[gati]-@[samasa]; @deva[दीर्घाह्नी] @deva[शरत्] remains unchanged.
"""

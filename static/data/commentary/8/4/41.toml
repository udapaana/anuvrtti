id = "8.4.41"
numericId = "84041"

[en]
simple = """
In the context of @deva[संहिता], A @deva[सकार] and a @deva[तवर्ग] letter are converted (respectively) to a @deva[षकार] and @deva[टवर्ग] letter when associated with a @deva[षकार] or a @deva[टवर्ग] letter.
"""

standard = """
@deva[ष्टुत्व]: @deva[स्]/@deva[तु] before or after @deva[ष्]/@deva[टु] → @deva[ष्]/@deva[टु]. @deva[वृक्षष्षण्डे], @deva[वृक्षष्टीकते], @deva[पेष्टा], @deva[अग्निचिट्टीकते], @deva[अट्टति].
"""

advanced = """
The letters @deva[स्] and the dentals when coming in contact with @deva[ष्] and the cerebrals, are changed to @deva[ष्] and cerebrals respectively. The word @deva[स्तोः] is to be read into the @[sutra]. Here also there is absence of mutual correspondence according to the order of enumeration. (1) @deva[स] with @deva[ष] as, @deva[वृक्षस्] + @deva[षण्डे] = @deva[वृक्षष्षण्डे]; @deva[प्लक्षष्षण्डे] @deva[॥] (2) @deva[स] with @deva[टु], as, @deva[वृक्षस्] + @deva[टीकते] = @deva[वृक्षष्टीकते], @deva[वृक्षष्ठकारः], @deva[प्लक्षष्टीकते] and @deva[प्लक्षष्ठकारः] @deva[॥] (3) @deva[तु] with @deva[ष] as @deva[पेष्] + @deva[ता] = @deva[पेष्टा], @deva[पेष्टुम्], @deva[पेष्ठव्यम्], @deva[कृषीष्ट], @deva[कृषीष्ठाः] (@[atmanepadi], Aorist 2nd person dual). (4) @deva[तु] with @deva[टु], as, @deva[अग्निचित्] + @deva[टीकते] = @deva[अग्निचिट्टीकते], @deva[सोमसुट्टीकते], @deva[अग्निचिट्ठकारः], @deva[अग्निचिड्] @deva[डीनः], @deva[अग्निचिटढौकते], @deva[अग्निचिण्णकार], @deva[सोमसुट्ठकारः], @deva[सोमसुड्डीनः], @deva[सोमसुटढौकते], @deva[सोमसुण्] @deva[णकारः] @deva[॥] The root @deva[अत्ट] @deva[अतिक्रमणहिंसयोः], and @deva[अद्ड] @deva[अभियोगे], are read in the @[dhatupatha] with @deva[त्] and @deva[द्] penultimate, in order that when the affix @deva[क्विप्] is added to them, the final @deva[ट] and @deva[ड] being elided by @deva[संयोगान्त] rule, the derivatives will be @deva[अत्] and @deva[अद्] ending in @deva[त्] and @deva[द्] @deva[॥] Another reason is that the @[sutra] @ref[6.1.3], should apply to their reduplicate. In these roots the @deva[त] and @deva[द] are changed, as @deva[अट्टति] and @deva[अड्डति] @deva[॥]
"""

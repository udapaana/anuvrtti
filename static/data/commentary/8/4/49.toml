id = "8.4.49"
numericId = "84049"

[en]
simple = """
A @deva[शर्]-letter does not undergo @deva[द्वित्वम्] when followed by an @deva[अच्] letter.
"""

standard = """
Sibilant not doubled before vowel. @deva[कर्षति], @deva[आकर्षः]. But @deva[दर्श्श्यते] (no vowel follows).
"""

advanced = """
A sibilant (@deva[शर्]) is not reduplicated when a vowel follows. @deva[न] continues from the preceding context, debarring @ref[8.4.46]. Examples: @deva[कर्षति], @deva[वर्षति], @deva[आकर्षः], @deva[अक्षदर्शः]. When no vowel follows, reduplication applies: @deva[दर्श्श्यते].
"""

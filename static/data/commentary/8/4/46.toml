id = "8.4.46"
numericId = "84046"

[en]
simple = """
If @deva[र्] or @deva[ह्] is present after @deva[अच्] letter, then a @deva[यर्] letter occurring after such a @deva[र्] or @deva[ह्] is optionally duplicated.
"""

standard = """
@deva[यर्] doubled after vowel + @deva[र्]/@deva[ह्]. @deva[अर्क्कः], @deva[ब्रह्म्मा], @deva[अपह्न्नुते]. Not: @deva[ह्नुते] (no vowel before).
"""

advanced = """
@deva[यर्] (all consonants except @deva[ह]) is reduplicated after @deva[र्] or @deva[ह्], when these follow a vowel. @deva[यर्] continues from the previous @[sutra]; according to some, @deva[वा] also continues, making this optional. Examples: @deva[अर्क्कः], @deva[मर्क्कः], @deva[ब्रह्म्मा], @deva[अपह्न्नुते]. The @deva[अचः] condition: when no vowel precedes @deva[र्]/@deva[ह्], reduplication does not apply — @deva[ह्नुते], @deva[ह्मलयति].
"""

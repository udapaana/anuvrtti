id = "8.4.15"
numericId = "84015"

[en]
simple = """
The @deva[नकार] associated with the forms of the verbs @deva[हि] and @deva[मी] is converted to @deva[णकार] in presence of a @deva[रेफयुक्त] @deva[उपसर्ग].
"""

standard = """
@deva[न्] of @deva[हिनु]/@deva[मीना] → @deva[ण्] after change-causing @deva[उपसर्ग]. @deva[प्रहिणोति], @deva[प्रमीणाति].
"""

advanced = """
@deva[न] of @deva[हिनु] and @deva[मीना] → @deva[ण] after an @deva[उपसर्ग] containing a trigger. Examples: @deva[प्रहिणोति], @deva[प्रहिणुतः], @deva[प्रमीणाति], @deva[प्रमीणीतः]. @deva[हि] belongs to the @[svadi] class and takes @[vikarana] @deva[नु] (technically @deva[श्नु]); @deva[मी] belongs to the @[kryadi] class and takes @deva[श्ना]. The @[sutra] cites the roots with @[vikarana]s already attached. When @deva[नु] alternates as @deva[नो] or @deva[ना] as @deva[नी], the rule still applies, since the substitute of a vowel is treated as equivalent to the original (@ref[1.1.57]).
"""

id = "8.4.59"
numericId = "84059"

[en]
simple = """
An @deva[अनुस्वार] occurring at end of a @deva[पद] when followed by a @deva[यय्] @deva[वर्ण] is optionally converted to the @deva[परसवर्ण].
"""

standard = """
@deva[पद]-final @deva[अनुस्वार] optionally → homogeneous nasal. @deva[तं] @deva[कथं] or @deva[तङ्कथञ्].
"""

advanced = """
@deva[पद]-final @deva[अनुस्वार] optionally → homogeneous nasal before @deva[यय्]. Example: @deva[तं] @deva[कथं] @deva[चित्रपक्षं] @deva[डयमानं] @deva[नभःस्थं] @deva[पुरुषोऽवधीत्] or @deva[तङ्कथञ्चित्रपक्षण्डयमानन्नभः] @deva[स्थम्पुरुषोऽवधीत्].
"""

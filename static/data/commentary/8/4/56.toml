id = "8.4.56"
numericId = "84056"

[en]
simple = """
A @deva[झल्] letter is optionally converted to a corresponding @deva[चर्] -letter when it is not followed by any other letter.
"""

standard = """
At pause, @deva[झल्] optionally → @deva[चर्]. @deva[वाक्] or @deva[वाग्], @deva[श्वलिट्] or @deva[श्वलिड्].
"""

advanced = """
@deva[झल्] optionally → @deva[चर्] at @deva[अवसान] (pause). @deva[झलां] @deva[चर्] continues by @[anuvritti]. By @ref[8.2.39], only a non-aspirate voiced consonant can stand word-finally; this rule permits a voiceless unaspirated consonant as well at pause. Examples: @deva[वाक्] or @deva[वाग्], @deva[त्वक्] or @deva[त्वग्], @deva[श्वलिट्] or @deva[श्वलिड्], @deva[त्रिष्टुप्] or @deva[त्रिष्टुब्].
"""

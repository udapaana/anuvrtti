id = "8.4.57"
numericId = "84057"

[en]
simple = """
The @deva[अण्] letter of a non-@deva[प्रगृह्य] word becomes @deva[अनुनासिक] optionally when it is followed by an @deva[अवसान].
"""

standard = """
Non-@deva[प्रगृह्य] @deva[अण्] (@deva[अ]/@deva[इ]/@deva[उ] short/long) optionally nasal at pause. @deva[दधिँ] or @deva[दधि], @deva[मधुँ] or @deva[मधु]. Not: @deva[अग्नी] (@deva[प्रगृह्य]).
"""

advanced = """
Non-@deva[प्रगृह्य] @deva[अण्] vowels (@deva[अ], @deva[इ], @deva[उ], short and long) optionally → @deva[अनुनासिक] at @deva[अवसान] (pause). The @deva[अण्] @[pratyahara] uses the first @deva[ण्]. Examples: @deva[दधिँ] or @deva[दधि], @deva[मधुँ] or @deva[मधु], @deva[कुमारीँ] or @deva[कुमारी]. The @deva[अण्] condition excludes @deva[ऋ]-class vowels: @deva[कर्तृ], @deva[हर्तृ] remain unchanged. The non-@deva[प्रगृह्य] condition excludes @deva[अग्नी], @deva[वायू] (which are @deva[प्रगृह्य] by @ref[1.1.11]).
"""

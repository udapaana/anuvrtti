id = "8.4.52"
numericId = "84052"

[en]
simple = """
According to various experts, a @deva[यर्]-letter following a @deva[दीर्घ] letter does not undergo @deva[द्वित्वम्].
"""

standard = """
All teachers: No doubling after long vowel. @deva[दात्रम्], @deva[पात्रम्], @deva[सूत्रम्].
"""

advanced = """
According to the opinion of all the Teachers, there is no doubling after a long vowel. As @deva[दात्रम्], @deva[पात्रम्], @deva[मूत्रम्], @deva[सूत्रम्] @deva[॥]
"""

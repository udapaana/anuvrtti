id = "8.4.19"
numericId = "84019"

[en]
simple = """
The @deva[नकार] of the verb '@deva[अन्] (@deva[प्राणने])' becomes @deva[णकार] when the verb is used along with an @deva[उपसर्ग] that could cause the @deva[णत्व] to happen (like @deva[प्र] or @deva[परा]).
"""

standard = """
@deva[न्] of @deva[अन्] (breathe) → @deva[ण्] after change-causing @deva[उपसर्ग]. @deva[प्राणिति], @deva[पराणिति].
"""

advanced = """
@deva[न] of @deva[अन्] ('to breathe') → @deva[ण] after a triggering @deva[उपसर्ग]. @deva[प्र] + @deva[अनिति] = @deva[प्राणिति] ('he breathes'), @deva[पराणिति]. For the @deva[इट्] augment, see @ref[7.2.76].
"""

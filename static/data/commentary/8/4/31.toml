id = "8.4.31"
numericId = "84031"

[en]
simple = """
When a @[kṛt] suffix (with vowel-preceded n) is added to a root that starts with a consonant and has an ic vowel as its penultimate, the change of n to @[ṇ] is optional after a change-causing upasarga. Pra + kopana (from kup) gives either @[prakopanṇam] or Prakopanam. Roots beginning with vowels fall under the previous obligatory rule.
"""

standard = """
The @deva[न] of a vowel-preceded @deva[कृत्] affix optionally becomes @deva[ण] after a @deva[णत्व]-triggering @deva[उपसर्ग] when the root begins with a consonant (@deva[हलादि]) and has an @deva[इच्] penultimate (@deva[इजुपध]). Thus @deva[प्रकोपणम्] or @deva[प्रकोपनम्] @ref[8.4.29]. The condition @deva[हलः] here means @deva[हलादेः] (beginning with @deva[हल्]), not @deva[हलन्तात्] — vowel-initial roots like @deva[ईह] and @deva[ऊह] fall under the obligatory rule @ref[8.4.29]: @deva[प्रेहणम्], @deva[प्रोहणम्]. The condition @deva[इजुपधात्] excludes @deva[प्रवपणम्] (no @deva[इच्] penultimate), where the change remains obligatory.
"""

advanced = """
@deva[न्] (preceded by a vowel) of a @deva[कृत्] affix optionally → @deva[ण्] after a triggering @deva[उपसर्ग], when the root begins with a consonant (@deva[हलादि]) and has a penultimate @deva[इच्] vowel (@deva[इजुपध]). The condition @deva[कृत्यचः] continues from @ref[8.4.29]. Examples: @deva[प्रकोपणम्] or @deva[प्रकोपनम्], @deva[परिकोपणम्] or @deva[परिकोपनम्]. The @deva[हलादि] condition excludes vowel-initial roots, where the change remains obligatory under @ref[8.4.29]: @deva[प्रेहणम्] (from @deva[ईह] @deva[चेष्टायाम्]), @deva[प्रोहणम्] (from @deva[ऊह] @deva[वितर्के]). The @deva[इजुपध] condition excludes roots without penultimate @deva[इच्], where the change is also obligatory: @deva[प्रवपणम्], @deva[परिवपणम्]. Under @ref[8.4.29] the change was obligatory; this rule introduces optionality. The vowel-precedence condition still applies — compare @deva[परिभुग्नः] where @deva[न] follows a consonant. The term @deva[हलः] must be read as @deva[हलादेः] ('beginning with @deva[हल्]'), not @deva[हलन्तात्] — since an @deva[इजुपध] root necessarily ends in a consonant, @deva[हलन्तात्] would add nothing.
"""

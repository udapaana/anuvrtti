id = "8.4.18"
numericId = "84018"

[en]
simple = """
A @deva[णत्वनिमित्तक] @deva[उपसर्ग] causes an optional @deva[णत्व] of the @deva[उपसर्ग] '@deva[नि]' attached to the verbs that are not @deva[ककारादि], not @deva[खकारादि], not @deva[षकारान्त] and not mentioned in <<@deva[नेर्गदनद]..>> @ref[8.4.16] sutra.
"""

standard = """
@deva[नि] optionally → @deva[णि] after change-causing @deva[उपसर्ग] before other verbs (not @deva[क]/@deva[ख]-initial or @deva[ष]-final in @deva[उपदेश]). @deva[प्रणिपचति] or @deva[प्रनिपचति]. Not: @deva[प्रनिकरोति], @deva[प्रनिपिनष्टि].
"""

advanced = """
For the remaining verbs (those not listed in @ref[8.4.17]), @deva[न] of @deva[नि] is optionally replaced by @deva[ण] after a triggering @deva[उपसर्ग], provided the root in its @deva[उपदेश] (original @[dhatupatha] listing) neither begins with @deva[क]/@deva[ख] nor ends in @deva[ष]. @deva[नेः] and @deva[उपसर्गात्] continue by @[anuvritti]. Examples: @deva[प्रणिपचति] or @deva[प्रनिपचति], @deva[प्रणिभिनत्ति] or @deva[प्रनिभिनत्ति]. The @deva[क]/@deva[ख]-initial exclusion blocks: @deva[प्रनिकरोति], @deva[प्रनिखादति]. The @deva[ष]-final exclusion blocks: @deva[प्रनिपिनष्टि]. The qualification @deva[उपदेशे] ensures that the prohibition tracks the @[dhatupatha] form, not the inflected form — so @deva[प्रनिचकार] and @deva[प्रनिचखाद] remain blocked (despite the reduplicated forms not beginning with @deva[क]/@deva[ख]), and @deva[प्रनिपेक्ष्यति] remains blocked (despite @deva[पिष्] ending in @deva[क्] by @ref[8.2.41] — in @deva[उपदेश] it ends in @deva[ष्]). Conversely, @deva[प्रणिवेष्टा] and @deva[प्रणिवेक्ष्यति] from @deva[विश्] undergo the change — though the current form ends in @deva[ष्] (by @ref[8.2.36]), the @deva[उपदेश] form ends in @deva[श्].
"""

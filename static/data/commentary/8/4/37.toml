id = "8.4.37"
numericId = "84037"

[en]
simple = """
A @deva[नकार] occurring at end of a @deva[पद] does not get @deva[णत्वम्] @deva[।]
"""

standard = """
@deva[पद]-final @deva[न्] not → @deva[ण्]. @deva[वृक्षान्], @deva[अरीन्], @deva[गिरीन्].
"""

advanced = """
@deva[पद]-final @deva[न्] does not undergo @deva[णत्व]. Examples: @deva[वृक्षान्], @deva[प्लक्षान्], @deva[अरीन्], @deva[गिरीन्].
"""

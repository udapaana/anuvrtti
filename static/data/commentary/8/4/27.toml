id = "8.4.27"
numericId = "84027"

[en]
simple = """
In Vedic, the n of the enclitic pronoun nas ('us') changes to retroflex @[ṇ] when it follows a verbal root containing r or @[ṣ], or follows the words uru or su. Examples come from @[ṛgvedic] hymns: @[rakṣāṇaḥ], @[śikṣāṇaḥ], @[uruṇaskṛdhi], and @[abhīṣuṇaḥ].
"""

standard = """
In the @deva[छन्दस्], the @deva[न] of the pronominal enclitic @deva[नस्] (substitute of @deva[अस्मद्] @ref[8.1.21]) becomes @deva[ण] after a @deva[धातु] containing @deva[र्] or @deva[ष्] (@deva[धातुस्थ]), or after the words @deva[उरु] and @deva[षु] (@deva[सुञ्] with @deva[ष]-change). @[ṛgvedic] examples: @deva[अग्ने] @deva[रक्षाणः] (VII.15.13), @deva[शिक्षाणः], @deva[उरुणस्कृधि] (VIII.75.11), @deva[अभीषुणः] (IV.31.3) @ref[8.4.3]. The lengthening in @deva[अभीषु] is by @ref[6.3.134]; @deva[कृधि] is the imperative of @deva[कृ] @ref[6.4.102]. The next @[sutra] treats both @deva[नस्]-forms.
"""

advanced = """
In the @deva[छन्दस्], @deva[न] of the pronominal enclitic @deva[नस्] (substitute of @deva[अस्मद्] by @ref[8.1.21]) → @deva[ण] after a @deva[धातु] containing @deva[र्] or @deva[ष्] (@deva[धातुस्थ]), or after @deva[उरु] or @deva[षु] (= @deva[सुञ्], exhibited with @deva[ष]-change). @[rgvedic] examples: @deva[अग्ने] @deva[रक्षाणः] (RV VII.15.13, 'protect us'), @deva[शिक्षा] @deva[णो] @deva[अस्मिन्] (RV VII.32.26, 'teach us this'). After @deva[उरु]: @deva[उरुणस्कृधि] (RV VIII.75.11). After @deva[षु]: @deva[अभीषुणः] @deva[सखीनाम्] (RV IV.31.3), @deva[ऊर्ध्व] @deva[ऊषुणः] @deva[ऊतये] (RV I.36.13). The @deva[नस्] here is strictly the pronominal form, not the @deva[नासिका]-substitute @deva[नस्] (the next @[sutra] covers both). @deva[षु] does not mean the locative plural affix @deva[सु] — hence @deva[इन्द्रो] @deva[धता] @deva[गृहेषु] @deva[नः] is unaffected. @deva[रक्षा] is 2nd person singular imperative with lengthening by @ref[6.3.135]; @deva[शिक्ष्] has the sense of @deva[दान] in the @[veda]; @deva[कृधि] is the imperative of @deva[कृ] (@ref[6.4.102]); @deva[विसर्ग] of @deva[नः] → @deva[स्] by @ref[8.3.50]. Lengthening in @deva[अभीषु] is by @ref[6.3.134].
"""

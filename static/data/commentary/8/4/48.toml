id = "8.4.48"
numericId = "84048"

[en]
simple = """
The @deva[तकार] of the word @deva[पुत्रादिनी] does not get a @deva[द्वित्व] when this word is used while shouting / while talking in angry tone.
"""

standard = """
@deva[पुत्र] letters not doubled before @deva[आदिनी] when cursing. @deva[पुत्रादिनी] (curse). But @deva[पुत्र्त्रादिनी] @deva[व्याघ्री] (description). Vt: Optional before @deva[हत]/@deva[जग्ध].
"""

advanced = """
Reduplication of the letters of @deva[पुत्र] does not occur when @deva[आदिनी] follows in the sense of reviling (@deva[आक्रोश]). This debars the reduplication required by the preceding @[sutra]. Example: @deva[पुत्रादिनी] @deva[त्वमसि] @deva[पापे] ('you are an eater of your own son' — used as an abusive epithet). When the word describes a factual attribute rather than a curse, reduplication applies: @deva[पुत्रादिनी] @deva[व्याघ्री] ('a tigress that eats her young' = @deva[शिशुमारी] @deva[व्याघ्री]). Vt: The same applies when @deva[पुत्र] precedes @deva[पुत्रादिनी]: @deva[पुत्र] @deva[पुत्रादिनी] @deva[त्वमसि] @deva[पापे]; also @deva[पुत्रपौत्रादिनी]. Vt: Before @deva[हत] and @deva[जग्ध], the reduplication is optional: @deva[पुत्रहती] or @deva[पुत्र्त्रहती], @deva[पुत्रजग्धी] or @deva[पुत्र्त्रजग्धी]. Vt: According to @[acharya] @[paushkarasadi], @deva[चय्] letters are replaced by the second letter of their class before a @deva[शर्] letter: @deva[वत्सः] → @deva[वथ्सः], @deva[अक्षरम्] → @deva[अख्रम्], @deva[अप्सरा] → @deva[अफ्सरा].
"""

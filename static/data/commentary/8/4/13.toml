id = "8.4.13"
numericId = "84013"

[en]
simple = """
When the second member of a compound itself contains a guttural consonant (k-class), then the @[n-to-ṇ] change in stem-final, num-augment, or case-ending positions becomes obligatory rather than optional. Examples are @[vastrayugiṇau] (dual) and @[vastrayugāṇi] (plural neuter).
"""

standard = """
In a compound whose second member contains a guttural (@deva[क]-class) letter, the replacement of @deva[न] by @deva[ण] in @deva[प्रातिपदिकान्त], @deva[नुम्], or @deva[विभक्ति] positions is obligatory — unlike the optional rule of @ref[8.4.11]. Thus @deva[वस्त्रयुगिणौ], @deva[स्वर्गकामिणौ] (@deva[प्रातिपदिकान्त]); @deva[वस्त्रयुगाणि], @deva[खरयुगाणि] (@deva[नुम्]); @deva[वस्त्रयुगेण], @deva[खरयुगेण] (@deva[विभक्ति]) @ref[8.4.3]. The compound @deva[वस्त्रयुगिन्] is formed by first applying @deva[इनि] to @deva[युग] and then compounding with @deva[वस्त्र], making the final @deva[न्] a @deva[प्रातिपदिकान्त] in the second member.
"""

advanced = """
When the second member of a compound contains a guttural (@deva[क]-class letter), @deva[न] → @deva[ण] obligatorily in @deva[प्रातिपदिकान्त], @deva[नुम्], or @deva[विभक्ति] positions — even if the second member is polysyllabic (unlike @ref[8.4.12] which requires monosyllabicity). @deva[प्रातिपदिकान्त]: @deva[वस्त्रयुगिणौ], @deva[वस्त्रयुगिणः], @deva[स्वर्गकामिणौ], @deva[वृषगामिणौ]. @deva[नुम्]: @deva[वस्त्रयुगाणि], @deva[खरयुगाणि]. @deva[विभक्ति]: @deva[वस्त्रयुगेण], @deva[खरयुगेण]. In @deva[वस्त्रयुगिणौ], the affix @deva[इनि] is first added to @deva[युग], then the resulting @deva[युगिन्] is compounded with @deva[वस्त्र] — making @deva[न्] the @deva[प्रातिपदिकान्त] of the second member.
"""

id = "8.4.29"
numericId = "84029"

[en]
simple = """
When a @[kṛt] suffix that comes after a vowel is attached to a verbal root that follows a change-causing upasarga, the n in that suffix changes to retroflex @[ṇ]. This covers suffixes like -ana (yu), -@[māna], -@[anīya], -ani, -ini, and @[niṣṭhā] substitutes. Examples include @[prayāṇam], @[prayāyamāṇam], @[prayāṇīyam], and @[prahīṇaḥ].
"""

standard = """
The @deva[न] of a vowel-preceded @deva[कृत्] affix becomes @deva[ण] when the verb follows a @deva[णत्व]-inducing @deva[उपसर्ग]. The affected affixes are @deva[अन] (@deva[यु]), @deva[मान] (@deva[शानच्] etc. @ref[7.2.82]), @deva[अनीय] @ref[3.1.96], @deva[अनि] @ref[3.3.111], @deva[इनि] (@deva[णिनि] @ref[3.2.78]), and @deva[निष्ठा]-substitutes @ref[8.2.42]. Examples by affix: @deva[प्रयाणम्], @deva[प्रयायमाणम्], @deva[प्रयाणीयम्], @deva[अप्रयाणि], @deva[प्रयायिणौ], @deva[प्रहीणः] (long @deva[ई] by @ref[6.4.66]) @ref[8.4.3]. The condition @deva[अचः] ('preceded by a vowel') excludes @deva[प्रभुग्नः] where @deva[न] follows a consonant @ref[7.2.45]. The @[vartika] adds @deva[निर्विण्णः] to this rule.
"""

advanced = """
@deva[न] of a vowel-preceded @deva[कृत्] affix → @deva[ण] after a triggering @deva[उपसर्ग]. The affected @deva[कृत्] affixes are: @deva[अन] (@deva[यु]) — @deva[प्रयाणम्], @deva[परिमाणम्], @deva[प्रमाणम्], @deva[परियाणम्]. @deva[मान] (@deva[शानच्] etc., @ref[7.2.82]) — @deva[प्रयायमाणम्], @deva[परियायमाणम्]. @deva[अनीय] (@ref[3.1.96]) — @deva[प्रयाणीयम्], @deva[परियाणीयम्]. @deva[अनि] (@ref[3.3.111]) — @deva[अप्रयाणि], @deva[अपरियाणि]. @deva[इनि] (@deva[णिनि], @ref[3.2.78]) — @deva[प्रयायिणौ], @deva[परियायिणौ]. @deva[निष्ठा]-substitutes (@ref[8.2.42]) — @deva[प्रहीणः], @deva[परिहीणः], @deva[प्रहीणवान्], @deva[परिहीणवान्] (long @deva[ई] by @ref[6.4.66]). The condition @deva[अचः] ('preceded by a vowel') excludes forms where @deva[न] follows a consonant: @deva[प्रभुग्नः], @deva[परिभुग्नः] (@deva[निष्ठा] of @deva[भुज्]; derivation: @deva[भुज्] + @deva[क्त] → @deva[भुज्] + @deva[न] by @ref[7.2.45] — root listed as @deva[भुजो] @deva[कौटिल्ये] with indicatory @deva[ओ] — → @deva[भुग्न] by @ref[8.2.30]). Vt: @deva[निर्विण्णः] should be enumerated here: @deva[निर्विण्णोस्मि] @deva[खलसंगेन].
"""

id = "8.4.63"
numericId = "84063"

[en]
simple = """
A @deva[शकार] sandwiched between a @deva[झय्] letter on the left and an @deva[अट्] letter on the right is optionally converted to a @deva[छकार].
"""

standard = """
After @deva[झय्] (voiceless), @deva[श्] optionally → @deva[छ्] when @deva[अट्] (@deva[अम्] by Vt) follows. @deva[वाक्छेते] or @deva[वाक्शेते]. Vt: Also before @deva[ल]/nasals. @deva[तच्छ्लोकेन].
"""

advanced = """
@deva[श्] optionally → @deva[छ्] after a voiceless mute (@deva[झय्], but practically surd mutes), when an @deva[अट्] letter (vowel, @deva[य्], @deva[व्], @deva[र्]) follows. @deva[झय्] and @deva[अन्यतरस्याम्] continue by @[anuvritti]. Examples: @deva[वाक्] + @deva[शेते] = @deva[वाक्छेते] or @deva[वाक्शेते]; @deva[अग्निचिच्छेते] or @deva[अग्निचित्] @deva[शेते]; @deva[श्वलिट्] @deva[शेते] or @deva[छेते]; @deva[त्रिष्टुप्छेते] or @deva[शेते]. Vt: The @[sutra] should specify @deva[अम्] @[pratyahara] (not just @deva[अट्]) as the following environment, extending the rule to @deva[ल] and nasals: @deva[तत्] @deva[श्लोकेन] = @deva[तच्] @deva[छ्लोकेन]; @deva[तच्छ्मश्रुणा].
"""

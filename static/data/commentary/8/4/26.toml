id = "8.4.26"
numericId = "84026"

[en]
simple = """
In Vedic texts, when a word ending in short @[ṛ] stands before another word containing n, the n changes to retroflex @[ṇ] — even when there is a hiatus (avagraha) between the two words in the @[padapāṭha]. Examples are @[pitṛyāṇam] and @[nṛmaṇāḥ] (read as @[nṛ] + @[maṇāḥ] in the @[padapāṭha]).
"""

standard = """
In the @deva[छन्दस्], @deva[न] of a following word becomes @deva[ण] after a short @deva[ऋ]-final word even when the two are separated by @deva[अवग्रह] (hiatus as marked in @[padapatha]). The general @[sandhi] rules operate only in @deva[संहिता], but this rule extends the @deva[णत्व] to @[pada]-state separation: @deva[नृ] @deva[मणाः] → @deva[नृमणाः], @deva[पितृ] @deva[याणम्] → @deva[पितृयाणम्] @ref[8.4.3]. The condition 'capable of @[avagraha]' restricts the trigger to word-final @deva[ऋ], not @deva[ऋ] in the interior of a word. The scope of @deva[संहिता] from @ref[8.2.108] governs the chapter.
"""

advanced = """
In the @deva[छन्दस्], @deva[न] of a following word → @deva[ण] after a short @deva[ऋ]-final prior word, even when @deva[अवग्रह] (hiatus) separates them in the @[padapatha]. Examples: @deva[नृमणाः] (separated as @deva[नृ] | @deva[मणाः] in @[padapatha]), @deva[पितृयाणम्] (@deva[पितृ] | @deva[याणम्]). The term @deva[अवगृह्यते] (= @deva[विच्छिद्य] @deva[पठ्यते]) refers to the @[padapatha] word-boundary. @deva[ऋ] here necessarily means 'a word ending in @deva[ऋ]', since @deva[ऋ] alone cannot be a @deva[पूर्वपद]. Ordinarily, @deva[णत्व] applies only in @deva[संहिता] (conjunction), and the @deva[ण] produced in @deva[संहिता] would not survive into @[pada]-reading. This @[sutra] is an exception: the @deva[ण] is retained even in the @deva[अवग्रह] state. The term @deva[अवग्रह] also delimits scope: only a word-final @deva[ऋ] (capable of @deva[अवग्रह]) triggers the change, not a word-internal @deva[ऋ]. The @deva[संहिता] of @ref[8.2.108] continues to regulate all rules through the end of the work.
"""

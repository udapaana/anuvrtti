id = "8.4.34"
numericId = "84034"

[en]
simple = """
The n of a @[kṛt] suffix does not change to retroflex @[ṇ], even after a change-causing upasarga, when the suffix is attached to the roots @[bhā], @[bhū], @[pū], kami, gami, @[pyāyi], or vep. This is an exception to the general rule. So pra + @[bhāna] stays @[prabhānam], and pra + gamana stays Pragamanam.
"""

standard = """
The @deva[न] of a @deva[कृत्] affix does not become @deva[ण] when added to @deva[भा], @deva[भू], @deva[पू] (specifically @deva[पूञ्], not @deva[पूङ्] which does change), @deva[कमि], @deva[गमि], @deva[प्यायि], or @deva[वेप्], despite a @deva[णत्व]-triggering @deva[उपसर्ग] — an exception to @ref[8.4.29]. Thus @deva[प्रभानम्], @deva[प्रभवनम्], @deva[प्रपवनम्], @deva[प्रकमनम्], @deva[प्रगमनम्], @deva[प्रप्यायनम्], @deva[प्रवेपनम्] @ref[8.4.3]. A @[vartika] extends this prohibition to the causatives of these roots: @deva[प्रभापनम्], @deva[परिभापनम्] etc.
"""

advanced = """
@deva[न] of a @deva[कृत्] affix is not changed to @deva[ण] — despite a triggering @deva[उपसर्ग] — when the affix is added to: @deva[भा] ('shine'), @deva[भू] ('be'), @deva[पू] ('purify'), @deva[कमि] ('be brilliant'), @deva[गमि] ('go'), @deva[प्यायि] ('increase'), @deva[वेप्] ('shake'). This is an exception to @ref[8.4.29]. Examples: @deva[भा] — @deva[प्रभानम्], @deva[परिभानम्]. @deva[भू] — @deva[प्रभवनम्], @deva[परिभवनम्]. @deva[पू] — @deva[प्रपवनम्], @deva[परिपवनम्]. @[ishti]: @deva[पू] here means @deva[पूञ्], not @deva[पूङ्]; with @deva[पूङ्] the change is obligatory: @deva[प्रपवणं] @deva[सोमस्य]. @deva[कमि] — @deva[प्रकमनम्], @deva[परिकमनम्]. @deva[गमि] — @deva[प्रगमनम्], @deva[परिगमनम्]. @deva[प्यायि] — @deva[प्रप्यायनम्], @deva[परिप्यायनम्]. @deva[वेप्] — @deva[प्रवेपनम्], @deva[परिवेपनम्]. Vt: The prohibition extends to the causatives of these roots as well: @deva[प्रभापनम्], @deva[परिभापनम्].
"""

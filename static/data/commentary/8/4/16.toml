id = "8.4.16"
numericId = "84016"

[en]
simple = """
A @deva[रेफ] present in an @deva[उपसर्ग] causes the @deva[णत्व] of @deva[नकार] of the '@deva[आनि]' @deva[प्रत्यय] of @deva[लोट्-लकार].
"""

standard = """
@deva[न्] of @deva[आनि] (imperative 1st person) → @deva[ण्] after change-causing @deva[उपसर्ग]. @deva[प्रवपाणि], @deva[प्रयाणि]. Not: @deva[प्रवपानि] @deva[मासानि] (neuter pl.).
"""

advanced = """
@deva[न] of @deva[आनि] (the imperative first-person termination) → @deva[ण] after a triggering letter in an @deva[उपसर्ग]. Examples: @deva[प्रवपाणि], @deva[परिवपाणि], @deva[प्रयाणि], @deva[परियाणि]. The imperative condition excludes the neuter plural @deva[आनि]: @deva[प्रवपानि] @deva[मासानि] (= @deva[प्रकृष्टा] @deva[वपा] @deva[येषु] @deva[तानि]). According to @[padamanjari], the explicit mention of @deva[लोट्] in the @[sutra] is redundant — @deva[आनि] would denote the imperative affix by the maxim @deva[अर्थवद्] @deva[ग्रहणे]. Moreover, in the nominal @deva[प्रवपानि], @deva[प्र] is not an @deva[उपसर्ग] at all, per the principle @deva[यत्] @deva[क्रियायुक्ताः] @deva[प्रादयस्तं] @deva[प्रति] @deva[गति-उपसर्ग-संज्ञे] @deva[भवतः].
"""

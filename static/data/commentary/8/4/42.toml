id = "8.4.42"
numericId = "84042"

[en]
simple = """
Except when followed by the @deva[प्रत्यय] @deva[नाम्], a @deva[पदान्तटवर्ग] letter does not cause the @deva[ष्टुत्वम्] of @deva[सकार] or a @deva[तवर्ग] letter that follows it.
"""

standard = """
After @deva[पद]-final @deva[टु], @deva[स्तु] not → @deva[ष्टु] (except @deva[नाम्]). @deva[श्वलिट्साये], @deva[श्वलिट्तरति]. But @deva[षण्णाम्], @deva[षण्णवतिः], @deva[षण्णगरी].
"""

advanced = """
After @deva[पद]-final @deva[टु], the dental-to-cerebral change (@deva[स्तु] → @deva[ष्टु]) does not apply, except before the affix @deva[नाम्]. Examples: @deva[श्वलिट्] + @deva[साये] = @deva[श्वलिट्साये], @deva[मधुलिट्साये], @deva[श्वलिट्तरति], @deva[मधुलिट्तरति]. The @deva[पदान्तात्] condition: non-@deva[पद]-final @deva[टु] does trigger the change — @deva[ईड्] + @deva[ते] = @deva[ईट्टे]. The @deva[टोः] condition: other cerebrals like @deva[ष्] do trigger the change — @deva[सर्पिष्] + @deva[तमम्] = @deva[सर्पिष्टमम्]. The @deva[नाम्] exception: @deva[षट्] + @deva[नाम्] = @deva[षण्णाम्]. Vt: The exception extends beyond @deva[नाम्] to include @deva[नवति] and @deva[नगरी]: @deva[षण्णाम्] ('of six'), @deva[षण्णवतिः] ('ninety-six'), @deva[षण्णगरी] ('six cities').
"""

id = "8.4.6"
numericId = "84006"

[en]
simple = """
When the first member of a vana compound is the name of a herb (@[oṣadhi]) or perennial tree (vanaspati) that contains a change-causing letter, the retroflex change of n to @[ṇ] is optional. So @[dūrvā] ('grass') gives either @[dūrvāvaṇam] or @[dūrvāvanam]. A @[vārttika] limits this option to two- or three-syllable first members only.
"""

standard = """
The @deva[न] of @deva[वन] is optionally replaced by @deva[ण] when the @deva[पूर्वपद] denotes an @deva[ओषधि] (annual herb) or @deva[वनस्पति] (perennial tree) and contains a letter capable of producing @deva[णत्व]. Thus @deva[दूर्वावणम्] or @deva[दूर्वावनम्], @deva[मूर्वावणम्] or @deva[मूर्वावनम्]; @deva[शिरीषवणम्] or @deva[शिरीषवनम्] @ref[8.4.3]. A @[vartika] restricts the optional rule to di- and trisyllabic first members, so @deva[देवदारुवनम्] (four syllables) is unchanged. A second @[vartika] prohibits the change after @deva[द्वारका] etc.
"""

advanced = """
@deva[न] of @deva[वन] is optionally replaced by @deva[ण] when the @deva[पूर्वपद] denotes an @deva[ओषधि] (annual herb) or @deva[वनस्पति] (perennial tree) and contains a @deva[णत्व]-triggering letter. @[karika]: @deva[फली] @deva[वनस्पतिर्ज्ञेयो] @deva[वृक्षाः] @deva[पुष्पफलोपगाः] @deva[।] @deva[ओषधः] @deva[फलपाकान्ता] @deva[लता] @deva[गुल्माश्च] @deva[वीरुधः] @deva[॥] @deva[ओषधि] examples: @deva[दूर्वावनम्] or @deva[दूर्वावणम्], @deva[मूर्वावणम्] or @deva[मूर्वावनम्]. @deva[वनस्पति] examples: @deva[शिरीषवनं] or @deva[शिरीषवणम्], @deva[बदरीवणं] or @deva[बदरीवनं]. Vt: The option is limited to di- and trisyllabic first members; four-syllable words like @deva[देवदारुवनम्] and @deva[भद्रदारुवनम्] do not undergo the change. Vt: The change is also prohibited after @deva[द्वारका] etc.: @deva[द्वरिकावनम्], @deva[तिमिरकावनम्]. Though botanically @deva[वृक्ष] (flower-and-fruit-bearing tree) differs from @deva[वनस्पति] (apparently flowerless fruit-bearer like @[udumbara]), the term @deva[वनस्पति] in this @[sutra] encompasses @deva[वृक्ष] as well. @[karika]: @deva[वनस्पति] = tree bearing fruit without visible flower; @deva[वृक्ष] = tree with both flower and fruit; @deva[ओषधि] = annual herb dying after fruit ripens; creepers and shrubs = @deva[वीरुधः].
"""

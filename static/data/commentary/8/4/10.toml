id = "8.4.10"
numericId = "84010"

[en]
simple = """
When a compound with @[pāna] ('drinking') expresses either the abstract act of drinking or the instrument used for drinking, the @[n-to-ṇ] change is optional. So 'drinking of milk' may be @[kṣīrapāṇam] or @[kṣīrapānam], and 'a cup for drinking milk' may be @[kṣīrapāṇaḥ] or @[kṣīrapānaḥ]. A @[vārttika] extends this optionality to compounds like Girinadi.
"""

standard = """
Where the @deva[पान]-compound expresses @deva[भाव] (the action of drinking) or @deva[करण] (the instrument for drinking), the replacement of @deva[न] by @deva[ण] is optional, in contrast to the obligatory change in @deva[जनपद] compounds @ref[8.4.9]. Thus @deva[क्षीरपाणम्] or @deva[क्षीरपानम्] (@deva[भाव]), @deva[क्षीरपाणः] or @deva[क्षीरपानः] @deva[कंसः] (@deva[करण]) @ref[8.4.3]. A @[vartika] adds optionality for @deva[गिरिनदी] etc.: @deva[गिरिणदी] or @deva[गिरिनदी], @deva[चक्रणितम्बा] or @deva[चक्रनितम्बा].
"""

advanced = """
When the @deva[पान]-compound expresses @deva[भाव] (the action) or @deva[करण] (the instrument), @deva[न्] → @deva[ण] is optional, in contrast to the obligatory change for @deva[जनपद] compounds under @ref[8.4.9]. @deva[भाव] examples: @deva[क्षीरपाणम्] or @deva[क्षीरपानम्] ('drinking of milk'), @deva[कषायपानम्] or @deva[कषायपाणम्], @deva[सुरापाणम्] or @deva[सुरापानम्]. @deva[करण] example: @deva[क्षीरपाणः] or @deva[क्षीरपानः] @deva[कंसः] ('a vessel for drinking milk'). Vt: Optionality extends to @deva[गिरिनदी] etc.: @deva[गिरिनदी] or @deva[गिरिणदी], @deva[चक्रनदी] or @deva[चक्रणदी], @deva[चक्रनितम्बा] or @deva[चक्रणितम्बा].
"""

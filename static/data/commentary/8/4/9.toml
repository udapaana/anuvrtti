id = "8.4.9"
numericId = "84009"

[en]
simple = """
When the word @[pāna] ('drinking') is the second member and the compound denotes a people or country known by their drinking habit, the n changes to retroflex @[ṇ]. So 'the milk-drinking Usinara people' is @[kṣīrapāṇā] @[usinārāḥ]. The change does not occur when the compound simply names a drink, not a people.
"""

standard = """
The @deva[न] of @deva[पान] (formed by @deva[ल्युट्] @ref[3.3.113]) becomes @deva[ण] when the compound's first member contains a @deva[णत्व]-trigger and the whole compound designates a @deva[जनपद] (people or country). Thus @deva[क्षीरपाणा] @deva[उशीनराः], @deva[सुरापाणाः] @deva[प्राच्याः], @deva[सौवीरपाणा] @deva[बाह्लीकाः] @ref[8.4.3]. The country names apply to persons through metonymy. The counter-example @deva[दक्षिपानम्] ('the drink of the @[dakṣis]') lacks the @deva[जनपद] meaning and therefore does not undergo the change.
"""

advanced = """
@deva[न] of @deva[पान] (formed by @deva[ल्युट्], @ref[3.3.113]) → @deva[ण] when it is the second member and the first member contains a triggering letter, provided the whole compound denotes a @deva[जनपद] (country or people). Examples: @deva[क्षीरपाणा] @deva[उशीनराः] (= @deva[क्षीरपाणं] @deva[येषां], 'the milk-drinking @[usinaras]'), @deva[सुरापाणाः] @deva[प्राच्याः] ('the wine-drinking @[prachyas]'), @deva[सौवीरपाणा] @deva[बाह्लीकाः] ('the @[sauvira]-drinking @[bahlikas]'), @deva[कषायपाणा] @deva[गान्धाराः]. The @deva[जनपद] condition excludes @deva[दक्षिपानं] ('drink of the @[dakshis]'). The @deva[जनपद] names apply to persons through metonymy.
"""

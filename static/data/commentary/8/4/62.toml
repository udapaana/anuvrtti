id = "8.4.62"
numericId = "84062"

[en]
simple = """
A @deva[हकार] following a @deva[झय्] letter is optionally converted to the @deva[पूर्वसवर्ण] (i.e. @deva[वर्गचतुर्थ]).
"""

standard = """
After @deva[झय्] (voiced mute), @deva[ह्] optionally → homogeneous. @deva[वाग्घसति] or @deva[वाग्हसति]. Not: @deva[प्राङ्हसति] (@deva[ङ्] not @deva[झय्]).
"""

advanced = """
@deva[ह्] optionally → homogeneous with the preceding letter, after @deva[झय्] (voiced mute). Although @deva[झय्] technically includes all mutes, in practice only voiced mutes trigger this rule. Examples: @deva[वाक्] + @deva[हसति] = @deva[वाग्घसति] or @deva[वाग्हसति]; @deva[श्वलिड्] @deva[ढसति] or @deva[हसति]; @deva[अग्निचिद्] @deva[धसति] or @deva[हसति]; @deva[त्रिष्टुब्] @deva[भसति] or @deva[हसति]; @deva[सोमसुद्] @deva[धसति] or @deva[हसति]. The @deva[झय्] condition excludes nasals: @deva[प्राङ्] @deva[हसति], @deva[भवान्] @deva[हसति] — no change.
"""

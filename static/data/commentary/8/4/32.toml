id = "8.4.32"
numericId = "84032"

[en]
simple = """
A @[kṛt] suffix added to a root that begins with an ic vowel, contains the augment num internally, and ends with a consonant, undergoes obligatory @[n-to-ṇ] change when preceded by a change-causing upasarga. Examples are @[preṅkhaṇam] and @[preṅgaṇam]. This creates a restriction (niyama): other num-containing roots do not get this obligatory change.
"""

standard = """
The @deva[न] of a @deva[कृत्] affix is obligatorily changed to @deva[ण] when the root is @deva[इजादि] (vowel-initial @deva[इच्]), @deva[सनुम्] (contains @deva[नुम्] augment by being @deva[इदित्]), and @deva[हलन्त] (consonant-final), preceded by a @deva[णत्व]-triggering @deva[उपसर्ग]. Examples: @deva[प्रेङ्खणम्] from @deva[इखि] @deva[गत्यर्थः], @deva[प्रेङ्गणम्], @deva[प्रोम्भणम्] @ref[8.4.31]. This rule creates a @deva[नियम]: change is obligatory here but not for other @deva[सनुम्] roots like @deva[मगि], giving @deva[प्रमङ्गनम्] unchanged @ref[8.4.30]. The word @deva[हलः] here means @deva[हलन्तात्] (contrary to @ref[8.4.31]) because an @deva[इजादि] root cannot begin with @deva[हल्].
"""

advanced = """
@deva[न्] of a @deva[कृत्] affix → @deva[ण्] obligatorily after a triggering @deva[उपसर्ग], when the root is @deva[इजादि] (begins with an @deva[इच्] vowel), @deva[सनुम्] (contains the @deva[नुम्] augment, being @deva[इदित्]), and @deva[हलन्त] (ends in a consonant). The term @deva[हलः] continues from @ref[8.4.31] but is now construed as @deva[हलन्तात्] ('from a consonant-final root') per @ref[1.1.72] — since an @deva[इजादि] root cannot begin with @deva[हल्], the @deva[हलादेः] reading of the previous @[sutra] would be impossible here. Examples: @deva[प्रेङ्खणम्], @deva[परेङ्खणम्] (from @deva[इखि] @deva[गत्यर्थः]; @deva[नुम्] added because @deva[इदित्]); @deva[प्रेङ्गणम्], @deva[परेङ्गणम्]; @deva[प्रोम्भणम्], @deva[परोम्भणम्] (in @deva[उम्भ] @deva[पूरणे] the nasal is part of the root). This @[sutra] is a @deva[नियम]: only for @deva[इजादि] @deva[सनुम्] roots is the change obligatory; other @deva[सनुम्] roots do not get it — @deva[प्रमङ्गनम्], @deva[परिमङ्गनम्] (from @deva[मगि] @deva[सर्पणे]) remain unchanged. The rule does not affect @ref[8.4.30] on @deva[ण्यन्त] verbs, which cannot be considered consonant-final: the @deva[कृत्] affix is ordained after vowel-final @deva[णि], and the vowel is elided only after affixation.
"""

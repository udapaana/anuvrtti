id = "7.3.53"
numericId = "73053"

[en]
simple = """
Words like @deva[न्यङ्कु], @deva[मद्गु] show guttural substitution as listed exceptions.
"""

standard = """
@deva[न्यङ्क्वादि] @deva[गण] shows guttural in listed words. @deva[न्यङ्कु] (from @deva[अञ्च्] + @deva[उ] with @deva[नि] prefix), @deva[मद्गु] demonstrate exceptional @deva[कुत्व]. These are enumerated forms where guttural appears.
"""

advanced = """
@deva[न्यङ्क्वादि] is a @deva[गण] (list) receiving @deva[कुत्व]. @deva[न्यङ्कु] derives from @deva[नि] + @deva[अञ्च्] + @deva[उ] (@[uṇādi] I.17) with guttural substitution. @deva[मद्गु] similarly shows the change. The listing captures forms where @deva[कुत्व] applies beyond regular conditioning environments.
"""

id = "7.3.61"
numericId = "73061"

[en]
simple = """
The words @deva[भुज्] 'arm' and @deva[न्युब्ज] 'a bodily disease' irregularly keep their @deva[ज्] before @deva[घञ्], not changing to guttural.
"""

standard = """
@deva[भुज्] and @deva[न्युब्ज] are exceptions to @ref[7.3.52]. Before @deva[घञ्], their final @deva[ज्] remains unchanged. @deva[भुजः] 'arm' (@deva[भुज्यते] @deva[अनेन]), @deva[न्युब्जः] preserve palatal despite the @deva[धित्] affix context.
"""

advanced = """
Irregular formations: @deva[भुज्] + @deva[घञ्] → @deva[भुजः] (not *@deva[भुगः]) and @deva[न्युब्ज] + @deva[घञ्] → @deva[न्युब्जः]. These resist the @deva[कुत्व] of @ref[7.3.52]. The retention of @deva[ज्] in these specific nouns is listed as exception to the general palatal→guttural rule before @deva[धित्].
"""

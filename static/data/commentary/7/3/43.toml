id = "7.3.43"
numericId = "73043"

[en]
simple = """
The root @deva[रुह्] 'to grow/mount' optionally changes its final to @deva[प्] in the causative. Both @deva[रोपयति] and @deva[रोहयति] are valid.
"""

standard = """
@deva[रुह्] + @deva[णि] → optional @deva[प्]-@deva[आदेश] for final @deva[ह्]. @deva[व्रीहीन्] @deva[रोपयति] or @deva[रोहयति] 'causes rice to grow'. @deva[विभाषा] allows both forms: @deva[ह्]→@deva[प्] (@deva[रोपयति]) or unchanged (@deva[रोहयति]).
"""

advanced = """
@deva[विभाषा] (optionality) for @deva[रुह्] before @deva[णि]: @deva[ह्]→@deva[प्] or no change. @deva[रोपयति] (with substitution) and @deva[रोहयति] (without) are both valid causatives. The @[padamañjarī] notes this @[sūtra] could be structured differently, but the practical result is doublet causative forms.
"""

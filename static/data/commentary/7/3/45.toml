id = "7.3.45"
numericId = "73045"

[en]
simple = """
The @deva[अ]→@deva[इ] change doesn't apply to @deva[य] and @deva[स] with augment @deva[क्] before feminine @deva[आ]. So @deva[यका] and @deva[सका] remain (not *@deva[यिका], *@deva[सिका]).
"""

standard = """
@deva[य] and @deva[स] with @deva[क्]-@deva[आगम] don't undergo @deva[अ]→@deva[इ] before feminine @deva[आ]. @deva[यक] + @deva[आ] → @deva[यका] (not @deva[यिका]), @deva[सक] + @deva[आ] → @deva[सका] (not @deva[सिका]). These are exceptions to @ref[7.3.44]'s transformation.
"""

advanced = """
The exception covers @deva[य्] and @deva[स्] with @deva[क्]-augment forming @deva[यक] and @deva[सक]. Despite @ref[7.3.44], these retain @deva[अ] before feminine @deva[आ]: @deva[यका], @deva[सका]. The @deva[य] and @deva[स] are the simple particles/roots; their @deva[क्]-augmented forms resist the @deva[इ]-substitution that applies elsewhere.
"""

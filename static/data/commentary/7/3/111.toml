id = "7.3.111"
numericId = "73111"

[en]
simple = """
For @deva[घि]-stems (like @deva[अग्नि], @deva[वायु]), @deva[इ]/@deva[उ] takes @deva[गुण] in dative, ablative, and genitive singular. @deva[अग्नये], @deva[अग्नेः].
"""

standard = """
@deva[घि]-@deva[संज्ञक] @deva[इ]/@deva[उ]-@deva[अन्त] + @deva[चतुर्थी]/@deva[पञ्चमी]/@deva[षष्ठी] @deva[एक]. → @deva[गुण]. @deva[अग्नि] → @deva[अग्नये] (dat.), @deva[अग्नेः] (abl./gen.), @deva[वायु] → @deva[वायवे], @deva[वायोः]. @deva[घि]-classification triggers strengthening.
"""

advanced = """
@deva[घि] (non-feminine @deva[इ]/@deva[उ]-finals per @ref[1.4.7]) receive @deva[गुण] before singular dative/ablative/genitive. @deva[अग्नये], @deva[अग्नेः]; @deva[वायवे], @deva[वायोः]; @deva[पटवे], @deva[पटोः]. The @deva[गुण] (@deva[इ]→@deva[ए], @deva[उ]→@deva[ओ]) plus case endings creates characteristic masculine/neuter paradigm forms.
"""

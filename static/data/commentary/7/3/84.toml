id = "7.3.84"
numericId = "73084"

[en]
simple = """
Stem-final @deva[इक्] vowels (@deva[इ]/@deva[ई]/@deva[उ]/@deva[ऊ]/@deva[ऋ]/@deva[ॠ]/@deva[ऌ]) take @deva[गुण] before @deva[सार्वधातुक] and @deva[आर्धधातुक] affixes. This is the main @deva[गुण] rule.
"""

standard = """
@deva[इक्]-@deva[अन्त] @deva[अङ्ग] + @deva[सार्वधातुक]/@deva[आर्धधातुक] → @deva[गुण]. @deva[नी]→@deva[ने] (@deva[नयति]), @deva[भू]→@deva[भो] (@deva[भवति]), @deva[कृ]→@deva[कर्] (@deva[करोति]). This central rule governs vowel strengthening in verbal conjugation.
"""

advanced = """
Core @deva[गुणविधि]: @deva[इक्]-finals strengthen before @deva[सार्वधातुक] and @deva[आर्धधातुक]. This covers present, future, infinitive, etc. formations. @deva[इ]→@deva[ए], @deva[ई]→@deva[ए], @deva[उ]→@deva[ओ], @deva[ऊ]→@deva[ओ], @deva[ऋ]→@deva[अर्], @deva[ॠ]→@deva[अर्], @deva[ऌ]→@deva[अल्]. Exceptions and overrides follow in subsequent @[sūtras].
"""

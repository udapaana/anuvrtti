id = "7.3.48"
numericId = "73048"

[en]
simple = """
Further elaboration of the Northern view that shortened @deva[आ]→@deva[अ] doesn't undergo @deva[इ]-substitution before feminine markers.
"""

standard = """
Completes the @deva[उदीचाम्] position on shortened vowels. The @deva[अ] from @ref[7.4.13]'s operation remains @deva[अ] (not @deva[इ]) before feminine @deva[आ]. This is a @[three-sūtra] elaboration of regional grammatical difference.
"""

advanced = """
The extended discussion (@ref[7.3.46]-48) of @deva[उदीचाम्] views shows the text's attention to dialectal variation. These @[sūtras] collectively establish that shortened feminine vowels follow different paths than inherent vowels in the Northern tradition.
"""

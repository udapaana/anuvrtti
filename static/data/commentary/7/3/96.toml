id = "7.3.96"
numericId = "73096"

[en]
simple = """
A single-consonant @deva[सार्वधातुक] takes @deva[ईट्] augment after @deva[अस्] (@deva[अस्ति]) and after the aorist marker @deva[सिच्]. @deva[आसीत्], @deva[अकार्षीत्].
"""

standard = """
@deva[अस्]/@deva[सिच्] + @deva[हलेकाचर] @deva[सार्व]. → @deva[ईट्]-@deva[आगम]. @deva[आसीत्] 'was' (@deva[अस्] + @deva[ईट्] + @deva[त्]), @deva[आसीः] (2sg). Aorist: @deva[अकार्षीत्], @deva[अकार्षीः] show @deva[ईट्] after @deva[सिच्]. Long @deva[ई] distinguishes this augment.
"""

advanced = """
@deva[ईट्] (long @deva[ई]) augments single-consonant @deva[सार्वधातुक] after @deva[अस्] and @deva[सिच्]. @deva[आसात्] (with @deva[आट्] per some), @deva[आसीत्], @deva[आसीः] show @deva[अस्]-forms. @deva[सिच्]-aorist: @deva[अकार्षीत्], @deva[अलावीत्]. The @deva[ईट्] creates characteristic imperfect/aorist forms distinct from @deva[इट्]-augmented roots.
"""

id = "7.3.39"
numericId = "73039"

[en]
simple = """
The roots @deva[ली] and @deva[ला] optionally add @deva[नुक्] and @deva[लुक्] respectively before @deva[णि] when meaning 'melting fat'. Examples: @deva[विलीनयति]/@deva[विलायति]/@deva[विलापयति].
"""

standard = """
@deva[ली] + @deva[णि] → optional @deva[नुक्]-@deva[आगम] for melting sense: @deva[विलीनयति] or @deva[विलाययति।] @deva[ला] + @deva[णि] → optional @deva[लुक्] (elision): @deva[विलालयति] or @deva[विलापयति।] The '@deva[घृतादि]-@deva[विलयन]' (melting fat) meaning conditions these options.
"""

advanced = """
@deva[घृतादि]-@deva[विलयन] (melting fatty substances like ghee) triggers optional augments: @deva[ली] gets @deva[नुक्] (@deva[न्]), @deva[ला] gets @deva[लुक्] (elision). This creates variant causatives: @deva[विलीनयति]/@deva[विलाययति] for @deva[ली]; @deva[विलालयति]/@deva[विलापयति] for @deva[ला]. Non-melting senses may follow different patterns.
"""

id = "7.3.110"
numericId = "73110"

[en]
simple = """
Final @deva[ऋ] takes @deva[गुण] in locative singular and in strong cases. @deva[मातरि] 'in mother', @deva[माता] 'mother' (nom.).
"""

standard = """
@deva[ऋकारान्त] + @deva[सप्तमी] @deva[एक]./@deva[सर्वनामस्थान] → @deva[गुण]. @deva[मातृ] → @deva[मातरि] (loc. sg.), @deva[माता] (nom. sg.), @deva[मातरम्] (acc. sg.). Strong cases and locative receive strengthening.
"""

advanced = """
@deva[ऋ]-final stems receive @deva[गुण] in two environments: @deva[सप्तमी] @deva[एकवचन] (locative singular) and @deva[सर्वनामस्थान] (strong cases: nom./acc./voc. sg./du./pl. for some). @deva[मातरि], @deva[पितरि], @deva[कर्तरि]; @deva[माता], @deva[पिता], @deva[कर्ता] demonstrate the @deva[गुण] (@deva[ऋ]→@deva[अर्]).
"""

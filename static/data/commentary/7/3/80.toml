id = "7.3.80"
numericId = "73080"

[en]
simple = """
The @deva[पू]-class roots (@deva[पूञ्] etc.) shorten their vowel before @deva[शित्] affixes. @deva[पूञ्] → @deva[पुनाति].
"""

standard = """
@deva[पूआदि] roots + @deva[शित्] → @deva[ह्रस्व]. This subgroup of @[kryādi] class (@deva[पूञ्] to @deva[प्लुङ्]) shortens long vowels before @[vikaraṇa]. @deva[पूञ्] @deva[पवने] → @deva[पुनाति] 'purifies'. The shortening is characteristic of this subdivision.
"""

advanced = """
@deva[पूआदि] (@deva[क्र्यादि] subdivision from @deva[पूञ्] to @deva[प्लुङ्]) undergo @deva[ह्रस्वन] before @deva[शित्]. Long vowels shorten: @deva[पू]→@deva[पु], @deva[लू]→@deva[लु], etc. @deva[पुनाति], @deva[लुनाति] show the pattern. This group-specific shortening contrasts with lengthening in other root classes (@ref[7.3.74]-76).
"""

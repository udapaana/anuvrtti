id = "7.3.42"
numericId = "73042"

[en]
simple = """
The root @deva[शद्] changes its final to @deva[त्] in the causative, except when meaning 'to drive'. @deva[शातयति] 'causes to fall' but @deva[शादयति] 'causes to drive'.
"""

standard = """
@deva[शद्] + @deva[णि] → @deva[त्]-@deva[आदेश] for final @deva[द्] (non-@deva[प्रेषण] sense). @deva[शद्] → @deva[शात्] + @deva[णि] → @deva[शातयति] 'causes flowers/fruits to fall'. But @deva[शादयति] for 'driving cattle'. Meaning distinguishes the stem-final.
"""

advanced = """
Semantic conditioning: @deva[शद्] 'to fall' → @deva[शात्]-causative (@deva[द्]→@deva[त्]). @deva[शद्] 'to drive' → @deva[शाद्]-causative (no change). @deva[पुष्पाणि] @deva[शातयति], @deva[फलानि] @deva[शातयति] (falling sense). @deva[गाः] @deva[शादयति] (driving sense). The @deva[प्रेषण] (driving) meaning blocks the @deva[त्]-substitution.
"""

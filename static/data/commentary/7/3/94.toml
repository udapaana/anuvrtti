[en]
simple = """
In the intensive (@deva[यङ्]), consonant-initial @deva[पित्] @deva[सार्वधातुक] optionally takes @deva[इट्] augment. @deva[लालपीति] or @deva[लालप्ति].
"""

standard = """
@deva[यङन्त] (intensive) + @deva[हलादि] @deva[पित्] @deva[सार्व]. → optional @deva[इट्]. @deva[लालपीति] or @deva[लालप्ति] 'babbles repeatedly'. @deva[विभाषा] allows both augmented and non-augmented intensive forms.
"""

advanced = """
@deva[यङ्] (intensive) formations: optional @deva[इट्] before @deva[हलादि] @deva[पित्] @deva[सार्वधातुक]. @deva[लालपीति] (with @deva[इट्]) and @deva[लालप्ति] (without) both valid. @deva[दुन्दुभिर्दुन्दुभीति] similarly. The optionality creates variant intensive paradigms in the tradition.
"""

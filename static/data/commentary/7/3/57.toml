id = "7.3.57"
numericId = "73057"

[en]
simple = """
The @deva[ज्] of @deva[जि] 'to conquer' becomes guttural after reduplication in desiderative and perfect. Examples: @deva[जिगीषति], @deva[जिगाय].
"""

standard = """
@deva[जि] + reduplication → @deva[ज्]→@deva[ग्] in @deva[सन्] (desiderative) and @deva[लिट्] (perfect). @deva[जिगीषति] 'desires to conquer', @deva[जिगाय] 'conquered'. The guttural shift is restricted to these two formations.
"""

advanced = """
@deva[जि] undergoes @deva[ज्]→@deva[ग्] (@deva[कुत्व]) post-reduplication specifically in @deva[सन्] and @deva[लिट्]. Desiderative: @deva[जिगीषति] (@deva[जि]-@deva[गी]-@deva[ष]); perfect: @deva[जिगाय] (@deva[जि]-@deva[गा]). Other reduplicated forms may not show this: the rule specifically names desiderative and perfect as the triggering contexts.
"""

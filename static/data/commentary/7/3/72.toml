id = "7.3.72"
numericId = "73072"

[en]
simple = """
The @deva[अ] of the aorist marker @deva[कस्] is dropped before vowel-initial endings. @deva[दुह्] + @deva[कस्] + @deva[आताम्] → @deva[अधुक्षाताम्].
"""

standard = """
Aorist @deva[कस्] → @deva[अ]-@deva[लोप] before @deva[अजादि] (vowel-initial) endings. @deva[अधुक्षाताम्], @deva[अधुक्षाथाम्], @deva[अधुक्षि] from @deva[दुह्]. The @deva[कस्]→@deva[क्स्] before vowels, then @deva[स्] undergoes changes.
"""

advanced = """
@deva[कस्]-aorist @deva[अ] elides before vowel-initial @deva[तिङ्]. @deva[दुह्] + @deva[कस्] + @deva[आताम्] → @deva[अधुक्षाताम्]. The elision prevents hiatus and creates the distinctive @deva[क्ष]-aorist forms. @deva[अधुक्षि] shows first person; the pattern extends across paradigm before vowel endings.
"""

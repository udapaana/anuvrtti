id = "7.3.8"
numericId = "73008"

[en]
simple = """
A compound beginning with @deva[श्वन्] (dog) followed by the taddhita affix @deva[इञ्] doesn't follow the @deva[द्वारादि] rules of @ref[7.3.4].
"""

standard = """
When @deva[श्वन्] is @deva[पूर्वपद] (first compound member) and @deva[इञ्] follows, the compound is exempt from @ref[7.3.4]'s @deva[द्वारादि] provisions. This means neither the prohibition nor the @deva[ऐ]-augment applies. @deva[श्वन्]-initial compounds with @deva[इञ्] follow alternative derivation.
"""

advanced = """
The combination of @deva[श्वन्] as compound-initial + @deva[इञ्] affix creates a special domain. @deva[द्वारादीनां] @deva[च] (@ref[7.3.4]) otherwise governs certain compound formations with @deva[ऐ]-augment. This exemption allows @deva[श्वन्]-compounds to derive without that special treatment, following more general rules for taddhita.
"""

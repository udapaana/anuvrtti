id = "7.3.74"
numericId = "73074"

[en]
simple = """
Before the fourth-class marker @deva[श्यन्], the root vowel lengthens for @deva[शम्] and the seven roots following it. @deva[शाम्यति], @deva[ताम्यति], @deva[दाम्यति].
"""

standard = """
@deva[शमादि] (@deva[शम्] etc., 7 roots) + @deva[श्यन्] → @deva[दीर्घ] of root vowel. @deva[शम्] → @deva[शाम्यति] 'becomes calm', @deva[तम्] → @deva[ताम्यति] 'is exhausted', @deva[दम्] → @deva[दाम्यति] 'is tamed'. The short vowel lengthens before @deva[श्यन्].
"""

advanced = """
@deva[शमादि]-@deva[सप्तक] (seven roots starting with @deva[शम्]) undergo @deva[दीर्घन] before @deva[श्यन्]. @deva[शम्]→@deva[शाम्], @deva[तम्]→@deva[ताम्], @deva[दम्]→@deva[दाम्], @deva[श्रम्]→@deva[श्राम्], etc. The lengthening distinguishes these 4th-class roots. @deva[शाम्यति], @deva[ताम्यति], @deva[दाम्यति], @deva[श्राम्यति] show the pattern.
"""

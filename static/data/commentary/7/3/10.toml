id = "7.3.10"
numericId = "73010"

[en]
simple = """
This is a heading rule: from here through @ref[7.3.31], @deva[वृद्धि] applies to the first vowel of the second member in compounds.
"""

standard = """
@deva[अधिकार] (governing rule): @deva[उत्तरपदवृद्धि] ('@deva[वृद्धि] of second compound member') applies from @ref[7.3.10] through @ref[7.3.31]. The following @[sūtras] specify which compounds receive this strengthening of the @deva[उत्तरपद]'s initial vowel before taddhita affixes.
"""

advanced = """
This @deva[अधिकार] establishes the domain for compound-internal @deva[वृद्धि] rules. The scope extends to @deva[यथातथयथापुरयोः] @deva[पर्यायेण] (@ref[7.3.31]). Within this section, individual @[sūtras] specify conditions under which the second compound member's @deva[आदि] (first) vowel undergoes @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita.
"""

id = "7.3.83"
numericId = "73083"

[en]
simple = """
Before the imperfect third-plural ending @deva[जुस्] (@deva[उस्]), final @deva[इ]/@deva[ई]/@deva[उ]/@deva[ऊ]/@deva[ऋ]/@deva[ॠ]/@deva[ऌ] vowels take @deva[गुण]. @deva[अभवन्] (@deva[भू]→@deva[भो]), @deva[अकुर्वन्] (@deva[कृ]→@deva[कुर्]).
"""

standard = """
@deva[इक्]-final @deva[अङ्ग] + @deva[जुस्] (3pl impf.) → @deva[गुण]. @deva[भू] → @deva[भो] → @deva[अभवन्], @deva[कृ] → @deva[कर्] → @deva[अकुर्वन्]. The third-plural imperfect triggers strengthening of stem-final vowels in this class.
"""

advanced = """
@deva[जुस्]-triggered @deva[गुण] for @deva[इक्] (@deva[इ]/@deva[ई]/@deva[उ]/@deva[ऊ]/@deva[ऋ]/@deva[ॠ]/@deva[ऌ]) finals. Imperfect 3pl ending @deva[जुस्] (realized as @deva[उस्]) conditions strengthening: @deva[भू]→@deva[भो] (@deva[अभवन्]), @deva[कृ]→@deva[कर्] (@deva[अकुर्वन्]), @deva[नी]→@deva[ने] (@deva[अनयन्]). This paradigm-specific @deva[गुण] creates distinct 3pl forms.
"""

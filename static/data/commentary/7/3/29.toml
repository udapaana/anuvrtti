id = "7.3.29"
numericId = "73029"

[en]
simple = """
When a @deva[ञित्]/@deva[णित्]/@deva[कित्] affix is added to a derivative already formed with @deva[ढ], the original base's first vowel still gets @deva[वृद्धि].
"""

standard = """
Secondary derivation from @deva[ढ]-derivatives before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita maintains @deva[वृद्धि] of the original base. The strengthening persists through multiple derivational layers. This ensures consistent treatment across derivative generations.
"""

advanced = """
@deva[पुनःप्रत्यय] (re-affixation) context: when a @deva[ढ]-derived form receives another @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita, the original base's @deva[वृद्धि] pattern continues. This rule prevents loss of strengthening in multi-stage derivations. The @deva[यत्] (from which) indicates the source-derivative relationship.
"""

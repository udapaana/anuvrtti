id = "7.3.28"
numericId = "73028"

[en]
simple = """
Before the affix @deva[ढ] (@deva[एय]), @deva[प्रवाहण]'s second member gets @deva[वृद्धि], and optionally the first member (@deva[प्र]) also. So @deva[प्रावाहणेयः] or @deva[प्रवाहणेयः].
"""

standard = """
@deva[प्रवाहण] + @deva[ढ] (@deva[एय]) → @deva[प्रावाहणेयः] or @deva[प्रवाहणेयः]. The @deva[उत्तरपद] (@deva[वाहण]) always gets @deva[वृद्धि]. The @deva[पूर्वपद] (@deva[प्र]) optionally gets @deva[वृद्धि]. This creates two valid patronymic forms from the name @deva[प्रवाहण].
"""

advanced = """
@deva[ढ]-affix (@deva[एय]) triggers obligatory @deva[उत्तरपद]-@deva[वृद्धि] but optional @deva[पूर्वपद]-@deva[वृद्धि] for @deva[प्रवाहण]. @deva[वाहण]→@deva[वाहण] is fixed; @deva[प्र]→@deva[प्रा] is @deva[विकल्प]. This creates doublet forms for descendants of @deva[प्रवाहण]: @deva[प्रावाहणेयः] (full strengthening) and @deva[प्रवाहणेयः] (partial).
"""

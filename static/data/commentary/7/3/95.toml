id = "7.3.95"
numericId = "73095"

[en]
simple = """
After @deva[तु], @deva[रु], @deva[स्तु], @deva[शम्], and @deva[अम्], consonant-initial @deva[सार्वधातुक] optionally takes @deva[इट्]. @deva[तवीति]/@deva[तोति], @deva[रवीति]/@deva[रोति].
"""

standard = """
@deva[तु]/@deva[रु]/@deva[स्तु]/@deva[शम्]/@deva[अम्] + @deva[हलादि] @deva[सार्व]. → optional @deva[इट्]. @deva[तु] → @deva[तवीति] or @deva[तोति], @deva[रु] → @deva[रवीति] or @deva[रोति], @deva[स्तु] → @deva[स्तवीति] or @deva[स्तौति]. @deva[विभाषा] creates doublet forms.
"""

advanced = """
@deva[विभाषा] for @deva[इट्] after @deva[तु], @deva[रु], @deva[स्तु], @deva[शम्], @deva[अम्]. Both augmented (@deva[तवीति], @deva[स्तवीति]) and non-augmented (@deva[तोति], @deva[स्तौति] showing @deva[गुण]/@deva[वृद्धि]) forms are valid. The roots show parallel optional behavior, creating paradigmatic variants across these five.
"""

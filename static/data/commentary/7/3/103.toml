id = "7.3.103"
numericId = "73103"

[en]
simple = """
Before plural case endings beginning with @deva[भ्] or @deva[स्], final @deva[अ] of a nominal stem becomes @deva[ए]. @deva[वृक्षेभ्यः], @deva[वृक्षेषु].
"""

standard = """
@deva[अकारान्त] + @deva[झल्]-initial (@deva[भ्]/@deva[स्]) @deva[बहुवचन] @deva[सुप्] → @deva[ए]-@deva[आदेश]. @deva[वृक्ष] + @deva[भ्यस्] → @deva[वृक्षेभ्यः] (dat./abl. pl.), @deva[वृक्ष] + @deva[सु] → @deva[वृक्षेषु] (loc. pl.). The @deva[अ]→@deva[ए] change marks plural.
"""

advanced = """
@deva[ए]-@deva[आदेश] for @deva[अकारान्त] before @deva[झलादि] plural case endings. @deva[वृक्षेभ्यः] (dat./abl. pl.), @deva[वृक्षेषु] (loc. pl.) show @deva[अ]→@deva[ए]. This distinguishes plural from singular/dual forms where different sandhi applies. The @deva[ए] marks the plural case environment specifically.
"""

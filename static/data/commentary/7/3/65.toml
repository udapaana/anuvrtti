id = "7.3.65"
numericId = "73065"

[en]
simple = """
Before the affix @deva[ण्य], there's no guttural change when the meaning is 'must absolutely be done'. Examples: @deva[अवश्य] @deva[पाच्यम्], @deva[अवश्य] @deva[वाच्यम्].
"""

standard = """
@deva[अवश्य] (absolute necessity) + root + @deva[ण्य] → no @deva[कुत्व]. @deva[अवश्य] @deva[पाच्यम्] 'must absolutely be cooked', @deva[अवश्य] @deva[वाच्यम्] 'must absolutely be said'. The @deva[कर्तव्य] (obligatory) sense blocks guttural substitution.
"""

advanced = """
@deva[अवश्यकार्य] (absolute obligation) context exempts @deva[ण्य] from triggering @deva[कुत्व]. @deva[पाच्यम्], @deva[वाच्यम्], @deva[रेच्यम्] retain palatals when preceded by @deva[अवश्य] indicating necessity. This semantic restriction modulates @ref[7.3.52]'s otherwise general application.
"""

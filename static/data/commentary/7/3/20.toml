id = "7.3.20"
numericId = "73020"

[en]
simple = """
In compounds like @deva[अनुशतिका] and others in this list, both members get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes.
"""

standard = """
The @deva[अनुशतिकादि] @deva[गण] (list starting with @deva[अनुशतिका]) receives @deva[उभयपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. Both first and second compound members undergo strengthening. This extends the double-@deva[वृद्धि] pattern to a defined class of compounds.
"""

advanced = """
@deva[अनुशतिकादि] functions as a @deva[गण] (enumerated list) where @deva[उभयपद]-@deva[वृद्धि] applies. This parallels @ref[7.3.19]'s @deva[हृद्]/@deva[भग]/@deva[सिन्धु] cases but covers additional compound types. The @deva[गण]-based specification allows extension to listed items without stating each individually.
"""

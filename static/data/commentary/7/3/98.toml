id = "7.3.98"
numericId = "73098"

[en]
simple = """
After @deva[रुद्] and four following roots, @deva[ईट्] augment comes before single-consonant endings. @deva[अरोदीत्], @deva[अस्वपीत्], @deva[अश्वसीत्].
"""

standard = """
@deva[रुदादि] (@deva[रुद्], @deva[स्वप्], @deva[श्वस्], @deva[अन्], @deva[प्राण्]) + @deva[हलेकाचर] → @deva[ईट्]. @deva[अरोदीत्] 'wept', @deva[अस्वपीत्] 'slept', @deva[अश्वसीत्] 'breathed', @deva[आनीत्] 'breathed'. These five roots receive long @deva[ईट्] augment.
"""

advanced = """
@deva[रुदादि]-@deva[पञ्चक] (five roots starting with @deva[रुद्]) receive @deva[ईट्] before @deva[हलेकाचर] (single consonant). @deva[अरोदीत्]/@deva[अरोदीः], @deva[अस्वपीत्]/@deva[अस्वपीः], @deva[अश्वसीत्]/@deva[अश्वसीः], @deva[आनीत्]/@deva[आनीः], @deva[अप्राणीत्]/@deva[अप्राणीः]. The @deva[ईट्] with long vowel creates their characteristic forms.
"""

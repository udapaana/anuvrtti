id = "7.3.3"
numericId = "73003"

[en]
simple = """
Grammar compounds (@deva[व्याकरण] type) don't get @deva[वृद्धि] when the first part ends in @deva[य्] or @deva[व्]. So @deva[वैयाकरण] comes from @deva[व्याकरण] without double @deva[वृद्धि].
"""

standard = """
Continuing from @ref[7.3.2], compounds like @deva[व्याकरण]-derivatives don't undergo @deva[वृद्धि] of the second member when preceded by -@deva[य्]/-@deva[व्] ending first members. @deva[वैयाकरणः] shows the base vowel preserved (not *@deva[व्यैया]°). The rule prevents over-application of strengthening.
"""

advanced = """
This extends the @deva[पदान्त]-@deva[य्]/@deva[व्] prohibition. In @deva[व्याकरण] + @deva[ठक्] → @deva[वैयाकरण], the @deva[आ] of @deva[आकरण] stays unchanged. Without this @[sūtra], @ref[7.2.117] might trigger @deva[वृद्धि] → *@deva[वैयाकरण]. The distinction matters for technical grammar terms and compounds where first member has semivowel ending.
"""

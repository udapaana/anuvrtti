id = "7.3.38"
numericId = "73038"

[en]
simple = """
The root @deva[वा] adds @deva[जुक्] (@deva[ज्]) before @deva[णि] when the causative means 'shaking'. Example: @deva[उपवाजयति] 'causes to shake with wings'. Otherwise: @deva[वापयति] 'causes to weave'.
"""

standard = """
@deva[वा] + @deva[णि] → @deva[जुक्]-@deva[आगम] when meaning @deva[प्रेरण] (shaking/fanning). @deva[पक्षेण] @deva[उपवाजयति] 'shakes with wing'. But @deva[वा] in weaving sense: @deva[आ] @deva[वापयति] @deva[केशान्] 'causes to arrange hair'. Semantic distinction conditions the augment.
"""

advanced = """
@deva[जुक्] (@deva[ज्]-@deva[आगम]) is semantically conditioned: @deva[वा] 'to shake/fan' receives it before @deva[णि]. This creates @deva[वाज्]-causative for agitation meaning. @deva[वा] 'to weave' lacks the augment: @deva[वाप]°. The semantic split: @deva[उपवाजयति] (shaking) vs. @deva[वापयति] (weaving) shows meaning-dependent morphology.
"""

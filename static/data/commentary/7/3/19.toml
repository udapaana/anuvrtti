id = "7.3.19"
numericId = "73019"

[en]
simple = """
In compounds ending with @deva[हृद्] (lake), @deva[भग] (fortune), or @deva[सिन्धु] (river), both members get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[कपिलवास्तुहार्दकः].
"""

standard = """
Compounds with @deva[हृद्], @deva[भग], or @deva[सिन्धु] as final member receive @deva[उभयपद]-@deva[वृद्धि] (strengthening of both members) before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. This differs from regular @deva[उत्तरपद]-only strengthening. Example derivations show both first and second members undergoing @deva[वृद्धि].
"""

advanced = """
The @deva[उभयपद] specification means both @deva[पूर्वपद] and @deva[उत्तरपद] undergo @deva[आदि]-@deva[वृद्धि]. This is exceptional—most rules strengthen only @deva[उत्तरपद]. @deva[हृद्], @deva[भग], @deva[सिन्धु] as compound-finals trigger this double strengthening. Geographical and fortune-related terms receive special phonological treatment.
"""

id = "7.3.116"
numericId = "73116"

[en]
simple = """
After @deva[नदी]-class and certain other feminine stems, locative singular @deva[इ] becomes @deva[आम्]. @deva[नद्याम्] 'in the river'.
"""

standard = """
@deva[नदी]/@deva[आप्]/@deva[ऊङ्]-@deva[अन्त] + @deva[सप्तमी] @deva[एक]. @deva[इ] → @deva[आम्]-@deva[आदेश]. @deva[नदी] + @deva[इ] → @deva[नद्याम्], @deva[वधू] + @deva[इ] → @deva[वध्वाम्]. The locative marker @deva[इ] is replaced by @deva[आम्].
"""

advanced = """
@deva[आम्]-@deva[आदेश] for locative @deva[इ] after @deva[नदी]/@deva[आप्]/@deva[ऊङ्]-stems. @deva[नद्याम्] (@deva[नदी]), @deva[वध्वाम्] (@deva[वधू]), @deva[कुमार्याम्] (@deva[कुमारी]). The replacement @deva[इ]→@deva[आम्] creates distinctive feminine locative singular forms, contrasting with masculine @deva[इ]-retention.
"""

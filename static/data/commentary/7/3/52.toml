id = "7.3.52"
numericId = "73052"

[en]
simple = """
The final @deva[च्] or @deva[ज्] of a root becomes a guttural (@deva[क्]/@deva[ग्]) before affixes with @deva[ध्] marker or before @deva[ण्यत्]. Examples: @deva[पाक] from @deva[पच्], @deva[त्याग] from @deva[त्यज्].
"""

standard = """
Root-final @deva[च्]/@deva[ज्] → corresponding guttural (@deva[क्]/@deva[ग्]) before @deva[धित्] affixes and @deva[ण्यत्]. @deva[पच्] → @deva[पाक] (before @deva[घञ्]), @deva[त्यज्] → @deva[त्यागः] (before @deva[घञ्]). The palatal→guttural shift creates nominal derivatives.
"""

advanced = """
@deva[कुत्व] (guttural substitution) for root-final @deva[च्]/@deva[ज्] before @deva[धित्] and @deva[ण्यत्]. @deva[च्]→@deva[क्], @deva[ज्]→@deva[ग्] transformation. @deva[धित्] includes @deva[घञ्], etc. @deva[पाक], @deva[त्याग], @deva[भोग] demonstrate: palatal root-finals shift to guttural in these derivative contexts. This is a systematic consonant change.
"""

id = "7.3.5"
numericId = "73005"

[en]
simple = """
The word @deva[न्यग्रोध] by itself (not in a compound) gets @deva[ऐ] placed before its @deva[य्] when followed by a @deva[ञित्]/@deva[णित्]/@deva[कित्] affix. Result: @deva[नैयग्रोधि].
"""

standard = """
This specifies @deva[न्यग्रोध] as a standalone (@deva[असमास]) base receiving the @deva[ऐ]-augment before @deva[य्] per @ref[7.3.4]. When @deva[न्यग्रोध] takes @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita, @deva[ऐ] appears before @deva[य्]: @deva[नैयग्रोधिकः] 'relating to the banyan tree'. Compound usage may differ.
"""

advanced = """
The @deva[असमास] condition distinguishes standalone @deva[न्यग्रोध] from its compound occurrences. The augment @deva[ऐ] before @deva[य्] follows @ref[7.3.4]'s mechanism. This yields @deva[नैयग्रोध]° derivatives. When @deva[न्यग्रोध] appears as compound member, different rules may apply, hence the explicit @deva[असमास] specification.
"""

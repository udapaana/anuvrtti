id = "7.3.36"
numericId = "73036"

[en]
simple = """
Roots @deva[ऋ], @deva[ह्री], @deva[व्ली], @deva[री], @deva[क्नुय्], @deva[क्ष्माय्], and roots ending in long @deva[आ] add @deva[पुक्] (@deva[प्]) before @deva[ञित्]/@deva[णित्] affixes.
"""

standard = """
The listed roots (@deva[ऋ], @deva[ह्री], @deva[व्ली], @deva[री], @deva[क्नुय्], @deva[क्ष्माय्]) and @deva[दीर्घ]-@deva[आ]-final roots receive @deva[पुक्]-@deva[आगम] (@deva[प्]) before @deva[ञित्]/@deva[णित्] affixes. The augment @deva[प्] inserts between root and affix. This modification precedes @[vṛddhi] application.
"""

advanced = """
@deva[पुक्] (@deva[प्]-@deva[आगम]) applies to a defined set: six listed roots plus @deva[दीर्घ]-@deva[आ]-finals. The augment appears before @deva[ञित्]/@deva[णित्] affixes, affecting the stem shape prior to other operations. This @deva[आगम] creates stems like @deva[आर्प]°, @deva[ह्रेप]°, etc. in derivative formations.
"""

id = "7.3.71"
numericId = "73071"

[en]
simple = """
Stems ending in @deva[ओ] lose their final before the fourth-class marker @deva[श्यन्]. @deva[मी] (@deva[ओ]-final) + @deva[श्यन्] → @deva[मिश्यति].
"""

standard = """
@deva[ओ]-@deva[अन्त] @deva[अङ्ग] + @deva[श्यन्] (@[divādi-gaṇa] marker) → @deva[लोप] of @deva[ओ]. @deva[शो] → @deva[श] + @deva[श्यन्] → @deva[अवच्छयति]; similar: @deva[मिश्यति]. The final @deva[ओ] drops before the class characteristic.
"""

advanced = """
@deva[ओकारान्त] stems lose their final before @deva[श्यन्] (4th class @[vikaraṇa]). This affects roots/stems like @deva[शो], where @deva[ओ] elides: @deva[श] + @deva[श्य] → @deva[श्यति] forms. @deva[अवच्छयति], @deva[मिश्यति] demonstrate. The elision creates the characteristic @[divādi] conjugation pattern.
"""

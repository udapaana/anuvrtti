id = "7.3.6"
numericId = "73006"

[en]
simple = """
Words expressing reciprocity (like @deva[मिथस्] 'mutually') are exempt from the @deva[य्]/@deva[व्] prohibition and augment rules of @ref[7.3.3].
"""

standard = """
The @deva[सप्रतिक्रिय] condition (expressing reciprocal action) removes words from the scope of @ref[7.3.3]'s prohibition and augment. @deva[मिथस्] and similar reciprocity-expressing terms follow regular @deva[वृद्धि] patterns instead of the special @deva[य्]/@deva[व्] treatment.
"""

advanced = """
@deva[सप्रतिक्रिय] ('with reciprocal action') defines a semantic condition. Words conveying mutual or reciprocal meaning are exempt from @deva[न] @deva[य्वाभ्याम्] @deva[पदान्ताभ्याम्] (@ref[7.3.3]). This allows standard @deva[वृद्धि] to apply. The exemption recognizes that reciprocity terms have distinct derivational needs.
"""

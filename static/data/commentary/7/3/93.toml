id = "7.3.93"
numericId = "73093"

[en]
simple = """
The root @deva[ब्रू] adds @deva[इट्] before consonant-initial @deva[पित्] @deva[सार्वधातुक]. @deva[ब्रवीति], @deva[ब्रवीषि], @deva[ब्रवीमि].
"""

standard = """
@deva[ब्रू] + @deva[हलादि] @deva[पित्] @deva[सार्व]. → @deva[इट्]-@deva[आगम]. @deva[ब्रू] → @deva[ब्रवी]° (@deva[ऊ] + @deva[इ] → @deva[वी]). @deva[ब्रवीति] 'speaks', @deva[ब्रवीषि], @deva[ब्रवीमि], @deva[अब्रवीत्]. But: @deva[ब्रूते] (vowel-initial) has no augment.
"""

advanced = """
@deva[इट्]-@deva[आगम] for @deva[ब्रू] before @deva[हलादि] @deva[पित्] @deva[सार्वधातुक] creates @deva[ब्रवी]- stem. @deva[ऊ] + @deva[इट्] → @deva[वी] (semivowel + @deva[ई]). @deva[ब्रवीति], @deva[ब्रवीषि], @deva[ब्रवीमि], @deva[अब्रवीत्] show the pattern. Vowel-initial endings (@deva[ब्रूते], @deva[ब्रूवन्ति]) lack the augment, showing conditioning.
"""

id = "7.3.99"
numericId = "73099"

[en]
simple = """
According to @[gārgya] and @[gālava], the five @deva[रुद्]-roots take @deva[अट्] augment (not @deva[ईट्]) before single-consonant endings. @deva[अरोदत्].
"""

standard = """
@deva[गार्ग्य]/@deva[गालव] view: @deva[रुदादि] + @deva[हलेकाचर] → @deva[अट्]-@deva[आगम]. @deva[अरोदत्] (not @deva[अरोदीत्]), @deva[अस्वपत्], etc. Alternative analysis using @deva[अ]-augment instead of @deva[ई]. Regional/scholarly variation.
"""

advanced = """
@deva[आचार्य]-@deva[मत]: @deva[गार्ग्य] and @deva[गालव] analyze @deva[रुदादि] with @deva[अट्] (not @deva[ईट्]). This yields @deva[अरोदत्] vs. @deva[अरोदीत्], showing different augment traditions. The @[aṣṭādhyāyī] records both analyses, demonstrating the text's attention to grammatical diversity among authorities.
"""

id = "7.3.21"
numericId = "73021"

[en]
simple = """
In dvandva compounds of deity names, both members get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[मित्रावरुण] → @deva[मैत्रावारुणः].
"""

standard = """
@deva[द्वन्द्व] @deva[समास] of @deva[देवता] (deity) names receives @deva[उभयपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[मित्रावरुण] + @deva[अण्] → @deva[मैत्रावारुणः] shows both @deva[मित्र]→@deva[मैत्र] and @deva[वरुण]→@deva[वारुण] strengthened. Divine name pairs undergo systematic double strengthening.
"""

advanced = """
@deva[देवता] @deva[द्वन्द्व] (deity copulative compounds) receive special treatment. Both members' @deva[आदि] vowels take @deva[वृद्धि], unlike regular compounds where only @deva[उत्तरपद] strengthens. This reflects the ritual/sacred context where divine names maintain formal integrity through equal phonological marking.
"""

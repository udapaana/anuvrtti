id = "7.3.104"
numericId = "73104"

[en]
simple = """
Before the case ending @deva[ओस्] (genitive/locative dual), final @deva[अ] becomes @deva[ए]. @deva[वृक्षयोः].
"""

standard = """
@deva[अकारान्त] + @deva[ओस्] (gen./loc. dual) → @deva[ए]-@deva[आदेश]. @deva[वृक्ष] + @deva[ओस्] → @deva[वृक्षयोः] (gen. dual 'of two trees', loc. dual 'in two trees'). The @deva[अ]→@deva[ए] change plus @deva[ओस्] → @deva[योः].
"""

advanced = """
@deva[ओस्] (gen./loc. dual) triggers @deva[ए]-@deva[आदेश] for preceding @deva[अ]. @deva[वृक्षयोः], @deva[प्लक्षयोः] show the pattern. The resulting @deva[एओस्] → @deva[अयोः] by sandhi. This @deva[ए]-substitution parallels @ref[7.3.103]'s plural marking but applies specifically to dual @deva[ओस्].
"""

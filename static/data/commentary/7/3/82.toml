id = "7.3.82"
numericId = "73082"

[en]
simple = """
The root @deva[मिद्] takes @deva[गुण] of its @deva[इ] before @deva[शित्] affixes. @deva[मेद्यति] 'becomes fat'.
"""

standard = """
@deva[मिद्] + @deva[शित्] → @deva[गुण] (@deva[इ]→@deva[ए]). @deva[मेद्यति], @deva[मेद्यतः], @deva[मेद्यन्ति] 'become fat'. Only @deva[मिद्] (not all @deva[इद्]-ending roots) gets this. Compare: @deva[स्विद्यन्ति] (no @deva[गुण]).
"""

advanced = """
Root-specific @deva[गुण]: @deva[मिद्] + @deva[शित्] → @deva[मेद्]°. This differs from @deva[स्विद्], @deva[क्षिद्], etc. which don't strengthen: @deva[स्विद्यन्ति], @deva[क्षिद्यन्ति] retain @deva[इ]. The singling out of @deva[मिद्] creates its distinctive conjugation @deva[मेद्यति] in the @[divādi] class.
"""

id = "7.3.106"
numericId = "73106"

[en]
simple = """
In the vocative singular, feminine @deva[आ]-ending becomes @deva[ए]. @deva[हे] @deva[खट्वे] 'O couch!', @deva[हे] @deva[बहुराजे] 'O [having] many kings!'
"""

standard = """
Feminine @deva[आङ्] + @deva[संबोधन] @deva[एकवचन] → @deva[ए]-@deva[आदेश]. @deva[खट्वा] → @deva[हे] @deva[खट्वे], @deva[बहुराजा] → @deva[हे] @deva[बहुराजे], @deva[कारीषगन्ध्या] → @deva[हे] @deva[कारीषगन्ध्ये]. The vocative changes feminine @deva[आ] to @deva[ए].
"""

advanced = """
@deva[आङन्त] (feminine @deva[आ]-affix) receives @deva[ए]-@deva[आदेश] in @deva[संबोधन] @deva[एकवचन] (vocative singular). @deva[खट्वे], @deva[बहुराजे], @deva[कारीषगन्ध्ये] demonstrate. This creates the characteristic feminine @deva[सम्बोधन] (vocative) ending distinct from masculine/neuter patterns.
"""

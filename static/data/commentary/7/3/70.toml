id = "7.3.70"
numericId = "73070"

[en]
simple = """
The final vowel of @deva[दा] and @deva[धा] (@deva[धु]-class roots) may optionally be dropped in Vedic @deva[लेट्] (subjunctive). @deva[दधद्रत्ना], @deva[दद्].
"""

standard = """
@deva[दा]/@deva[धा] + @deva[लेट्] → optional @deva[लोप] (elision) of final @deva[आ]. Vedic forms: @deva[दधद्रत्ना] @deva[दाशुषे] (@[ṛg] I.35.8), @deva[सामो] @deva[ददद्] @deva[गृणते]. @deva[विभाषा] allows both elided and full forms in Vedic subjunctive.
"""

advanced = """
Vedic optionality: @deva[दा]/@deva[धा] finals may elide before @deva[लेट्] personal endings. @deva[दधत्], @deva[ददत्] show elision; full forms also occur. This @deva[विभाषा] reflects Vedic flexibility. @deva[लेट्] is the subjunctive mood marker; the rule captures archaic morphological variation.
"""

id = "7.3.100"
numericId = "73100"

[en]
simple = """
After @deva[अद्] 'to eat', all grammarians agree that @deva[अट्] augment comes before single-consonant @deva[सार्वधातुक]. @deva[आदत्], @deva[आदः].
"""

standard = """
@deva[अद्] + @deva[हलेकाचर] → @deva[अट्]-@deva[आगम] (universal). @deva[आदत्] 'ate' (3sg), @deva[आदः] (2sg). Unlike the optional readings for @deva[रुदादि], all teachers (@deva[सर्वेषाम्]) accept @deva[अट्] for @deva[अद्].
"""

advanced = """
@deva[सर्वेषाम्] indicates universal acceptance: @deva[अद्] + @deva[हलेकाचर] @deva[सार्व]. → @deva[अट्]. @deva[आदत्], @deva[आदः] show the @deva[अ]-augment. This contrasts with the @deva[गार्ग्य]/@deva[गालव] debate on @deva[रुदादि] (@ref[7.3.99]). For @deva[अद्], no scholarly disagreement exists—@deva[अट्] is standard.
"""

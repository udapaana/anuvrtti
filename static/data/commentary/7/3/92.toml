id = "7.3.92"
numericId = "73092"

[en]
simple = """
The stem @deva[तृणह्] adds @deva[इ] after its @deva[अ] before consonant-initial @deva[पित्] @deva[सार्वधातुक]. @deva[तृणेढि], @deva[तृणेक्षि].
"""

standard = """
@deva[तृणह्] + @deva[हलादि] @deva[पित्] @deva[सार्व]. → @deva[इट्]-@deva[आगम] after @deva[अ]. @deva[तृणह्] → @deva[तृणेह्] (@deva[अ] + @deva[इ] → @deva[ए]). @deva[तृणेढि], @deva[तृणेक्षि], @deva[तृणेह्मि], @deva[अतृणेट्]. The @deva[इ]-augment creates the distinctive stem.
"""

advanced = """
@deva[इट्]-@deva[आगम] for @deva[तृणह्] (@deva[अकारान्त]) before @deva[हलादि] @deva[पित्] @deva[सार्वधातुक]. The augment after @deva[अ] yields @deva[ए] (@deva[अ] + @deva[इ] → @deva[ए] by sandhi). @deva[तृणेढि] (2sg imperative), @deva[तृणेक्षि], @deva[तृणेह्मि] show the pattern. This root-specific augmentation creates its characteristic conjugation.
"""

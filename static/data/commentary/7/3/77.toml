id = "7.3.77"
numericId = "73077"

[en]
simple = """
The roots @deva[इष्], @deva[गम्], and @deva[यम्] replace their final with @deva[छ्] before present-tense markers (@deva[शित्]). @deva[इच्छति], @deva[गच्छति], @deva[यच्छति].
"""

standard = """
@deva[इष्]/@deva[गम्]/@deva[यम्] + @deva[शित्] → @deva[छ्]-@deva[आदेश] for final. @deva[इष्] → @deva[इच्छति] 'desires', @deva[गम्] → @deva[गच्छति] 'goes', @deva[यम्] → @deva[यच्छति] 'restrains'. The substitution creates distinctive present stems.
"""

advanced = """
@deva[छ्]-@deva[आदेश] for root-finals: @deva[इष्] (@deva[ष्]→@deva[छ्]), @deva[गम्] (@deva[म्]→@deva[छ्]), @deva[यम्] (@deva[म्]→@deva[छ्]) before @deva[शित्] @deva[विकरण]. This creates @deva[इच्छ]°, @deva[गच्छ]°, @deva[यच्छ]° present stems. The change is characteristic of these high-frequency roots, distinguishing them from regular conjugation patterns.
"""

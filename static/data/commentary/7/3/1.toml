id = "7.3.1"
numericId = "73001"

[en]
simple = """
Before certain taddhita affixes (marked with @deva[ञ्], @deva[ण्], or @deva[क्]), specific words like @deva[देविका] get @deva[आ] instead of the usual @deva[वृद्धि] for their first vowel.
"""

standard = """
This @[sūtra] lists exceptions to the standard @deva[वृद्धि] substitution before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita affixes. Words like @deva[देविका], @deva[अरिष्टा] receive only @deva[आ] (not @deva[ऐ]) as their first vowel change. This headingless enumeration establishes special treatment for designated bases.
"""

advanced = """
The rule provides @deva[आदेश] of @deva[आ] in place of expected @deva[वृद्धि] for listed words when followed by @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. Standard @ref[7.2.117] would give @deva[वृद्धि], but this list overrides it. Examples: @deva[देविका] → @deva[दैविक] (where @deva[ए]→@deva[ऐ] would be expected but @deva[अ]→@deva[आ] occurs in special cases). The enumeration (@deva[गण]) functions as exception-holder for the general @deva[वृद्धि]-@[adhikāra].
"""

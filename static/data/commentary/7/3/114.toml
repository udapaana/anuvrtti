id = "7.3.114"
numericId = "73114"

[en]
simple = """
After feminine pronominal @deva[आ]-stems, dative/ablative/genitive singular gets @deva[स्याट्] augment, and the stem's @deva[आ] becomes @deva[ए]. @deva[तस्यै], @deva[तस्याः].
"""

standard = """
@deva[सर्वनाम] feminine @deva[आकारान्त] + @deva[चतुर्थी]/@deva[पञ्चमी]/@deva[षष्ठी] @deva[एक]. → @deva[स्याट्]-@deva[आगम] + @deva[आ]→@deva[ए]. @deva[तद्] (fem. @deva[सा]) → @deva[तस्यै] (dat.), @deva[तस्याः] (abl./gen.). Pronominal feminines use @deva[स्या] instead of @deva[या].
"""

advanced = """
@deva[सर्वनामस्थानीय] feminine @deva[आ]-stems receive @deva[स्याट्] (not @deva[याट्]) + @deva[अकार]-lopa (@deva[आ]→@deva[ए]). @deva[सा] (fem. of @deva[तद्]) → @deva[तस्यै], @deva[तस्याः]; @deva[या] (fem. of @deva[यद्]) → @deva[यस्यै], @deva[यस्याः]. The @deva[स्या]-augment distinguishes pronominal feminines from regular @deva[आ]-stems (@ref[7.3.113]).
"""

id = "7.3.78"
numericId = "73078"

[en]
simple = """
Before @deva[शित्] affixes, special stem substitutions occur: @deva[पा]→@deva[पिब्], @deva[घ्रा]→@deva[जिघ्र], @deva[ध्मा]→@deva[धम्], @deva[स्था]→@deva[तिष्ठ्], and others.
"""

standard = """
Listed root replacements before @deva[शित्]: @deva[पा] 'drink' → @deva[पिब्] (@deva[पिबति]), @deva[घ्रा] 'smell' → @deva[जिघ्र] (@deva[जिघ्रति]), @deva[ध्मा] 'blow' → @deva[धम्] (@deva[धमति]), @deva[स्था] 'stand' → @deva[तिष्ठ्] (@deva[तिष्ठति]). These are suppletion-like stem changes.
"""

advanced = """
Suppletive-type @deva[आदेश] before @deva[शित्]: @deva[पा]→@deva[पिब्], @deva[घ्रा]→@deva[जिघ्र], @deva[ध्मा]→@deva[धम्], @deva[स्था]→@deva[तिष्ठ्], @deva[पा]→@deva[पश्य], etc. These create present stems radically different from the root. @deva[जिघ्रति] shows reduplication; @deva[तिष्ठति] shows infixing. These irregularities are memorized as standard patterns.
"""

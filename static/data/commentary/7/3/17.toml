id = "7.3.17"
numericId = "73017"

[en]
simple = """
After a number, words meaning 'mass/measure' (except @deva[शाण]) get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[द्विपलम्] → @deva[द्वैपालिकः].
"""

standard = """
@deva[संख्या] + @deva[परिमाण] (measure words, excluding @deva[शाण]) compounds receive @deva[उत्तरपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[पल], @deva[द्रोण] etc. as measures take strengthening: @deva[द्विपल] + @deva[ठक्] → @deva[द्वैपालिकः]. @deva[शाण] (a specific measure) is explicitly excepted.
"""

advanced = """
@deva[परिमाण] covers mass/measure/quantity terms. The @deva[शाण] exception (@deva[अशाणे]) preserves that measure word's base form. Other measurement units follow regular @deva[वृद्धि]: @deva[पल]→@deva[पाल], @deva[द्रोण]→@deva[द्रोण], etc. in @deva[उत्तरपद] position after numerals. This integrates quantitative compounds into the strengthening system.
"""

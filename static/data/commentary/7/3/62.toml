id = "7.3.62"
numericId = "73062"

[en]
simple = """
The words @deva[प्रयाज] and @deva[अनुयाज] meaning 'portion of sacrifice' irregularly keep their @deva[ज्] with @deva[घञ्], not becoming guttural.
"""

standard = """
@deva[प्रयाज] and @deva[अनुयाज] (from @deva[यज्] 'to sacrifice' + @deva[घञ्]) retain @deva[ज्] in sacrificial terminology. These technical terms preserve palatal despite @deva[धित्] affix. Meaning-specific: only 'sacrifice portion' sense.
"""

advanced = """
@deva[प्र]/@deva[अनु] + @deva[यज्] + @deva[घञ्] → @deva[प्रयाज]/@deva[अनुयाज] with @deva[ज्] retained. The @deva[यजति]-derived ritual terms resist @deva[कुत्व] (@ref[7.3.52]). This is semantically restricted to @deva[हविर्भाग] (sacrificial portion) meaning. Other @deva[यज्] derivatives may follow regular guttural substitution.
"""

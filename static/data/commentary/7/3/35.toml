id = "7.3.35"
numericId = "73035"

[en]
simple = """
The roots @deva[जन्] 'to be born' and @deva[वध्] 'to kill' don't get @deva[वृद्धि] before @deva[चिण्] or @deva[ञित्]/@deva[णित्] @deva[कृत्] affixes. Examples: @deva[अजनि], @deva[घातः].
"""

standard = """
@deva[जन्] and @deva[वध्] are exempt from @deva[वृद्धि] before @deva[चिण्] aorist and @deva[ञित्]/@deva[णित्] @deva[कृत्]. @deva[जन्] + @deva[चिण्] → @deva[अजनि] (not *@deva[अजानि]). @deva[वध्] derives without strengthening in these contexts. These exceptions preserve base vowel quality.
"""

advanced = """
@deva[जन्] and @deva[वध्] receive special exception status. @deva[वध्] here refers to the verbal base, not the @deva[हन्]-replacement (which does strengthen per @ref[7.3.32]). The exemption affects aorist and specified @deva[कृत्] formations. These roots maintain their @deva[उपधा] vowel unchanged despite otherwise @[vṛddhi-triggering] affixes.
"""

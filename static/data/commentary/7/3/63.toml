id = "7.3.63"
numericId = "73063"

[en]
simple = """
The root @deva[वञ्च्] doesn't change its @deva[च्] to guttural when meaning 'going'. So @deva[वञ्च्यम्] 'to be gone'. But in 'crooked' sense: @deva[वाङ्क्यम्].
"""

standard = """
@deva[वञ्च्] in @deva[गति] (going) sense → no @deva[कुत्व]. @deva[वञ्च्यं] @deva[वञ्चन्ति] @deva[वणिजः] 'merchants go to what is to be gone to'. But @deva[वाङ्क्यं] @deva[काष्ठम्] 'crooked wood' shows guttural. Meaning distinguishes the substitution.
"""

advanced = """
@deva[गत्यर्थ] @deva[वञ्च्] is exempt from @deva[कुत्व] (@ref[7.3.52]): @deva[वञ्च्यम्] retains @deva[च्]. Non-motion sense (@deva[कौटिल्य] 'crookedness') takes regular @deva[गुत्त]ural: @deva[वाङ्क्यम्]. The semantic condition on phonological change: 'going' blocks substitution, 'crooked' allows it.
"""

id = "7.3.88"
numericId = "73088"

[en]
simple = """
The roots @deva[भू] and @deva[सु] don't take @deva[गुण] before directly following @deva[सार्वधातुक] personal endings. @deva[अभूत्], @deva[अभूः], @deva[सुवै].
"""

standard = """
@deva[भू]/@deva[सु] + @deva[सार्वधातुक] @deva[तिङ्] (direct) → no @deva[गुण]. @deva[अभूत्] 'became' (not *@deva[अभोत्]), @deva[अभूः], @deva[अभुवम्]; @deva[सुवै], @deva[सुवावहै]. When personal endings directly follow, @deva[ऊ] remains unstrengthened.
"""

advanced = """
@deva[प्रत्ययसाक्षात्] condition: @deva[भू] and @deva[सु] resist @deva[गुण] when @deva[सार्वधातुक] @deva[तिङ्] immediately follows. @deva[अभूत्], @deva[सुवै] show @deva[ऊ] retained. This contrasts with mediated contexts where @deva[गुण] may apply. The 'immediate following' criterion is crucial for blocking.
"""

id = "7.3.101"
numericId = "73101"

[en]
simple = """
The final @deva[अ] of a tense-stem lengthens to @deva[आ] before @deva[सार्वधातुक] affixes beginning with @deva[व्] or @deva[म्]. @deva[भवाव], @deva[भवाम].
"""

standard = """
Tense @deva[अङ्ग]-final @deva[अ] + @deva[यञ्]-initial (@deva[व्]/@deva[म्]) @deva[सार्व]. → @deva[आ]-@deva[आदेश]. @deva[भव] + @deva[वः] → @deva[भवावः] 'we two become', @deva[भव] + @deva[मः] → @deva[भवामः] 'we become'. The @deva[दीर्घ] accommodates these endings.
"""

advanced = """
@deva[लाडन्त] (tense-stem) @deva[अकारान्त] receives @deva[दीर्घ] before @deva[यञादि] (@deva[व्]/@deva[म्] initial) @deva[सार्वधातुक]. @deva[भवावः], @deva[भवामः]; @deva[पचावः], @deva[पचामः] demonstrate. The lengthening @deva[अ]→@deva[आ] before dual/plural 1st person creates characteristic first-person forms.
"""

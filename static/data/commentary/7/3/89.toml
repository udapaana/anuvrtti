id = "7.3.89"
numericId = "73089"

[en]
simple = """
Short-@deva[उ]-final roots that lose their @[vikaraṇa] (@deva[लुक्]) take @deva[वृद्धि] before consonant-initial @deva[पित्] @deva[सार्वधातुक]. @deva[स्तु] → @deva[स्तौ] (@deva[स्तौति]).
"""

standard = """
@deva[ह्रस्व]-@deva[उ]-@deva[अन्त] @deva[धातु] + @deva[लुक्]-@[vikaraṇa] + @deva[पित्] @deva[सार्वधातुक] (@deva[हलादि]) → @deva[वृद्धि]. @deva[स्तु] → @deva[स्तौति] 'praises'. The @[vikaraṇa-elision] triggers @deva[वृद्धि] instead of regular @deva[गुण]. @deva[उ]→@deva[औ] strengthening.
"""

advanced = """
@deva[लुगन्त] (@[vikaraṇa-elided]) @deva[ह्रस्व]-@deva[उ]-finals receive @deva[वृद्धि] before @deva[हलादि] @deva[पित्] @deva[सार्वधातुक]. @deva[स्तु], @deva[स्तु]-class roots: @deva[स्तौति] (@deva[उ]→@deva[औ]). The @deva[लुक्] condition specifies when @[vikaraṇa] drops (@deva[अदादि] class); then @deva[वृद्धि] applies instead of the usual @deva[गुण], creating distinctive stems.
"""

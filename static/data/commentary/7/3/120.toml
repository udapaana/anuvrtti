id = "7.3.120"
numericId = "73120"

[en]
simple = """
After non-feminine @deva[घि]-stems, instrumental singular @deva[आ] becomes @deva[ना]. @deva[अग्निना] 'by fire', @deva[वायुना] 'by wind'.
"""

standard = """
@deva[अ]-@deva[स्त्री] @deva[घि]-@deva[अङ्ग] + @deva[तृतीया] @deva[आ] → @deva[ना]-@deva[आदेश]. @deva[अग्नि] + @deva[आ] → @deva[अग्निना], @deva[वायु] + @deva[आ] → @deva[वायुना], @deva[पटु] + @deva[आ] → @deva[पटुना]. The instrumental gets @deva[ना] instead of simple @deva[आ].
"""

advanced = """
@deva[ना]-@deva[आदेश] for instrumental @deva[आ] after non-feminine @deva[घि]-stems. @deva[अग्निना], @deva[वायुना], @deva[पटुना] demonstrate. Feminine @deva[घि]-stems (if any) would not receive this. The @deva[ना] creates distinctive masculine/neuter instrumental singular forms for the @deva[घि]-class.
"""

id = "7.3.105"
numericId = "73105"

[en]
simple = """
Before @deva[ओस्] and before instrumental @deva[आ], the feminine @deva[आ]-ending becomes @deva[ए]. @deva[सेनयोः], @deva[सेनया].
"""

standard = """
Feminine @deva[आङ्] (@deva[आ]-ending) + @deva[ओस्]/@deva[आ] (instr.) → @deva[ए]-@deva[आदेश]. @deva[सेना] + @deva[ओस्] → @deva[सेनयोः] (gen./loc. dual), @deva[सेना] + @deva[आ] → @deva[सेनया] (instr. sg.). The feminine @deva[आ]→@deva[ए] before these endings.
"""

advanced = """
@deva[आङ्] (feminine @deva[आ]-affix) receives @deva[ए]-@deva[आदेश] before @deva[ओस्] (dual) and @deva[आ] (instr. sg.). @deva[सेनयोः], @deva[लतयोः] (dual); @deva[सेनया], @deva[लतया] (instrumental). The @deva[आ]→@deva[ए] + following vowel creates the feminine paradigm's characteristic forms. This extends @ref[7.3.104]'s principle to feminine stems.
"""

id = "7.3.119"
numericId = "73119"

[en]
simple = """
After @deva[घि]-stems (non-feminine short @deva[इ]/@deva[उ]), locative @deva[इ] becomes @deva[औ] and dative @deva[ए] becomes @deva[ऐ]. @deva[अग्नौ] 'in fire', @deva[अग्नये] 'for fire'.
"""

standard = """
@deva[घि]-@deva[अङ्ग] + @deva[सप्तमी] @deva[इ] → @deva[औ]; @deva[चतुर्थी] @deva[ए] → @deva[ऐ]. @deva[अग्नि] → @deva[अग्नौ] (loc.), @deva[अग्नये] → shows @deva[गुण]. @deva[वायु] → @deva[वायौ] (loc.), @deva[वायवे]. The @deva[घि]-class gets these special substitutions.
"""

advanced = """
@deva[घि]-stems receive @deva[औ] for locative @deva[इ] (after @deva[गुण]: @deva[ए]+@deva[इ]→@deva[औ]) and @deva[ऐ] for dative (after @deva[गुण]: @deva[ए]→@deva[ऐ]). @deva[अग्नौ], @deva[वायौ], @deva[पटौ] (locative); @deva[अग्नये], @deva[वायवे] (dative with @deva[गुण]). This creates the characteristic masculine/neuter paradigm for @deva[घि]-classified stems.
"""

id = "7.3.47"
numericId = "73047"

[en]
simple = """
Continuation of the Northern grammarians' view on shortened @deva[आ]→@deva[अ] not becoming @deva[इ] before feminine endings.
"""

standard = """
Further specification of the @deva[उदीचाम्] position from @ref[7.3.46]. The shortened @deva[अ] from feminine @deva[आ] resists @deva[इ]-substitution. This maintains distinction between inherent and derived short @deva[अ] in the system.
"""

advanced = """
This continues @ref[7.3.46]'s @deva[उदीचाम्] exception. The grammatical tradition preserves the origin of the short vowel: derived @deva[अ] (from @deva[आ]-shortening) behaves differently from base @deva[अ]. Northern schools track this derivational history in applying 7.3.44.
"""

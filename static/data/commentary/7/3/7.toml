id = "7.3.7"
numericId = "73007"

[en]
simple = """
Words like @deva[स्वागत] are also exempt from the @deva[य्]/@deva[व्] prohibition. So @deva[स्वागत] + @deva[इञ्] becomes @deva[स्वागतिक] normally.
"""

standard = """
This extends @ref[7.3.6]'s exemption to @deva[स्वागतादि] (@deva[स्वागत] etc.). Despite containing -@deva[व]-, these words undergo regular @deva[वृद्धि] rather than the @deva[ऐ]-augment or prohibition of @ref[7.3.3]. @deva[स्वागत] + taddhita follows standard patterns.
"""

advanced = """
The @deva[स्वागतादि] @deva[गण] (list starting with @deva[स्वागत]) receives exemption parallel to @deva[सप्रतिक्रिय] words. Though @deva[स्वागत] has internal @deva[व], the special @deva[य्वाभ्याम्] treatment doesn't apply. Standard @deva[वृद्धि] or its absence follows regular rules for this class. The @deva[गण] functions as exception-list.
"""

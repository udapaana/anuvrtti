id = "7.3.4"
numericId = "73004"

[en]
simple = """
After @deva[य्] or @deva[व्] within a word (not at word-end), instead of @deva[वृद्धि] the vowels @deva[ऐ] and @deva[औ] are added before the @deva[य्]/@deva[व्]. So @deva[न्यग्रोध] becomes @deva[नैयग्रोधि].
"""

standard = """
When @deva[य्] or @deva[व्] is internal (not @deva[पदान्त]), the expected @deva[वृद्धि] is replaced by prefixing @deva[ऐ] or @deva[औ] before that semivowel. This creates augmentation rather than substitution: @deva[न्यग्रोध] → @deva[नैयग्रोधि] shows @deva[ऐ] inserted before @deva[य्]. The @deva[ऐच्] functions as @deva[आगम] (augment).
"""

advanced = """
The @deva[अैच्] (@deva[ऐ]/@deva[औ]) serves as augment (@deva[आगम]) rather than replacement (@deva[आदेश]). Placed @deva[पूर्व] (before) the @deva[य्]/@deva[व्], it creates the strengthening effect differently from standard @deva[वृद्धि]. @deva[न्यग्रोध] + @deva[इञ्] → @deva[नैयग्रोधि] demonstrates: instead of *@deva[न्यैग्रोधि] (vowel @deva[वृद्धि]), we get @deva[ऐ] before @deva[य्]. This applies when @deva[य्]/@deva[व्] is not at @deva[पद]-boundary.
"""

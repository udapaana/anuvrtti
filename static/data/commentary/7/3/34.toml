id = "7.3.34"
numericId = "73034"

[en]
simple = """
Roots ending in @deva[म्] with acute accent don't get @deva[वृद्धि] before @deva[चिण्] or @deva[ञित्]/@deva[णित्] @deva[कृत्] affixes. Example: @deva[गम्] stays with @deva[अ], not @deva[आ].
"""

standard = """
@deva[उदात्त]-@deva[स्वरित] @deva[म्]-@deva[अन्त] roots are exempt from @deva[वृद्धि] before @deva[चिण्] and @deva[ञित्]/@deva[णित्] @deva[कृत्] affixes. @deva[गम्] (accented) doesn't strengthen: @deva[अगमि] (not *@deva[अगामि]). The accent condition restricts which @deva[म्]-final roots undergo strengthening.
"""

advanced = """
The @deva[उदात्त]/@deva[स्वरित] accent condition on @deva[म्]-@deva[अन्त] roots blocks the expected @deva[वृद्धि]. This creates paradigmatic distinctions: accented @deva[म्]-finals maintain base vowel, while others may strengthen. The rule shows accent's role in morphophonological conditioning beyond pitch.
"""

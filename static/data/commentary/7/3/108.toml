id = "7.3.108"
numericId = "73108"

[en]
simple = """
Short @deva[इ] and @deva[उ] at the end of nominal stems take @deva[गुण] in vocative singular. @deva[हे] @deva[अग्ने], @deva[हे] @deva[वायो], @deva[हे] @deva[पटो].
"""

standard = """
@deva[ह्रस्व]-@deva[इ]/@deva[उ]-@deva[अन्त] @deva[प्रातिपदिक] + @deva[संबोधन] @deva[एक]. → @deva[गुण]. @deva[अग्नि] → @deva[हे] @deva[अग्ने] 'O fire!', @deva[वायु] → @deva[हे] @deva[वायो] 'O wind!', @deva[पटु] → @deva[हे] @deva[पटो]. The short vowel strengthens in vocative.
"""

advanced = """
@deva[गुण] for @deva[ह्रस्व] @deva[इ]/@deva[उ] finals in @deva[संबोधन] @deva[एकवचन]. @deva[इ]→@deva[ए] (@deva[अग्ने]), @deva[उ]→@deva[ओ] (@deva[वायो], @deva[पटो]). Long vowels don't change: @deva[नदी] → @deva[हे] @deva[नदि] (shortened by @ref[6.1.69], not @deva[गुण]). The rule specifically targets short stem-final vowels.
"""

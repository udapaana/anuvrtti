id = "7.3.102"
numericId = "73102"

[en]
simple = """
Before case endings beginning with @deva[य्] or @deva[भ्], the final vowel of a nominal stem lengthens. @deva[वृक्षाय] (dative), @deva[वृक्षाभिः] (instr. pl.).
"""

standard = """
@deva[सुबन्त] @deva[अङ्ग]-final + @deva[यञ्]-initial (@deva[य्]/@deva[भ्]) @deva[सुप्] → @deva[दीर्घ]. @deva[वृक्ष] + @deva[ए] → @deva[वृक्षाय] (dat.), @deva[वृक्ष] + @deva[भिस्] → @deva[वृक्षाभिः] (instr. pl.). Nominal stem-finals lengthen before these case markers.
"""

advanced = """
@deva[यञादि] (@deva[य्]/@deva[भ्]-initial) case endings trigger @deva[दीर्घ] of preceding @deva[अङ्ग]-final. @deva[वृक्षाय] (dat. sg., @deva[ए]→@deva[आय]), @deva[वृक्षाभिः] (instr. pl., @deva[अ]→@deva[आ] before @deva[भिस्]), @deva[वृक्षाभ्याम्] (instr./dat. dual). This systematic lengthening creates characteristic nominal paradigm forms.
"""

id = "7.3.64"
numericId = "73064"

[en]
simple = """
The word @deva[ओक] is formed irregularly from @deva[उच्] + @deva[क] affix, with both @deva[गुण] and guttural change. Example: @deva[न्योकः] 'bird'.
"""

standard = """
@deva[उच्] + @deva[क] (@deva[अ]) → @deva[ओक] irregularly. Two anomalies: @deva[च्]→@deva[क्] (guttural) and @deva[उ]→@deva[ओ] (@deva[गुण]). @deva[न्योकः] 'bird, nest' shows both changes. This is a listed irregular formation.
"""

advanced = """
@deva[ओक] from @deva[उच्] shows exceptional derivation: both @deva[कुत्व] (@deva[च्]→@deva[क्]) and @deva[गुणन] (@deva[उ]→@deva[ओ]) occur with @deva[क]-affix. @deva[न्योकः] 'bird/nest' demonstrates. The irregularity is morphological—neither change is expected by general rules for this affix combination.
"""

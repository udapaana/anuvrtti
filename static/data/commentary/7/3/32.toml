id = "7.3.32"
numericId = "73032"

[en]
simple = """
The root @deva[हन्] 'to kill' changes its @deva[न्] to @deva[त्] before @deva[ञित्]/@deva[णित्] affixes that cause @deva[वृद्धि]. The penultimate @deva[अ] also gets @deva[वृद्धि]. Example: @deva[हातकः] 'killer'.
"""

standard = """
@deva[हन्] + @deva[ञित्]/@deva[णित्] → @deva[त्]-@deva[आदेश] for final @deva[न्], plus @deva[वृद्धि] of penultimate @deva[अ]→@deva[आ]. @deva[हन्] → @deva[हात्]. The @deva[उपधा] (penultimate) @deva[अ] strengthens to @deva[आ]. @deva[हातकः], @deva[घातकः] show this double modification before the affix.
"""

advanced = """
Two simultaneous operations: (1) @deva[न्]→@deva[त्] replacement for @deva[हन्]'s final, (2) @deva[उपधा]-@deva[वृद्धि] @deva[अ]→@deva[आ]. These apply before @deva[ञित्]/@deva[णित्] affixes triggering @deva[वृद्धि]. The modification creates @deva[घात]-/@deva[हात]- bases for derivatives. This is a stem-internal change beyond simple vowel strengthening.
"""

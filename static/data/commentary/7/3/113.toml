id = "7.3.113"
numericId = "73113"

[en]
simple = """
After feminine @deva[आ]-stems, the dative/ablative/genitive singular endings receive @deva[याट्] augment. @deva[खट्वायै], @deva[खट्वायाः].
"""

standard = """
Feminine @deva[आकारान्त] + @deva[चतुर्थी]/@deva[पञ्चमी]/@deva[षष्ठी] @deva[एक]. → @deva[याट्]-@deva[आगम]. @deva[खट्वा] + @deva[ए] → @deva[खट्वायै] (dat.), @deva[खट्वा] + @deva[अस्] → @deva[खट्वायाः] (abl./gen.). The @deva[य्]+@deva[आ] augment intervenes.
"""

advanced = """
@deva[याट्]-@deva[आगम] for feminine @deva[आ]-finals before singular dat./abl./gen. @deva[खट्वायै], @deva[खट्वायाः]; @deva[सेनायै], @deva[सेनायाः] demonstrate. The @deva[या]-augment creates the characteristic feminine @[ā-stem] case forms (@deva[आ] + @deva[या] + ending), distinguishing from masculine/neuter patterns.
"""

id = "7.3.107"
numericId = "73107"

[en]
simple = """
In vocative singular, feminine @deva[आ] optionally shortens for 'mother' sense and for @deva[नदी]-class words. @deva[हे] @deva[अम्ब] or @deva[हे] @deva[अम्बे].
"""

standard = """
Feminine @deva[आ] → @deva[ह्रस्व] (optional) in vocative singular for @deva[मातृ]-@deva[अर्थ] ('mother' meaning) and @deva[नदी] stems. @deva[अम्बा] → @deva[हे] @deva[अम्ब] or @deva[हे] @deva[अम्बे।] Affectionate/intimate address allows shortened form.
"""

advanced = """
@deva[विभाषा] for @deva[ह्रस्व] in vocative: @deva[मातृवत्] (like 'mother') meaning and @deva[नदी]-@deva[संज्ञक] stems. @deva[अम्बा] 'mother' → @deva[अम्ब]/@deva[अम्बे] both valid. The optional shortening expresses endearment or familiarity, contrasting with the standard @deva[ए]-ending.
"""

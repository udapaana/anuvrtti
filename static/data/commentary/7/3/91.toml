id = "7.3.91"
numericId = "73091"

[en]
simple = """
Before a single-consonant @deva[पित्] @deva[सार्वधातुक] affix, @deva[ऊर्णु] takes @deva[गुण]. @deva[प्रोर्णोत्], @deva[प्रौर्णोः].
"""

standard = """
@deva[ऊर्णु] + @deva[हलेकाचर] (single-consonant) @deva[पित्] @deva[सार्व]. → @deva[गुण]. @deva[प्रोर्णोत्], @deva[प्रौर्णोः] show @deva[ओ]-strengthening. This complements @ref[7.3.90]'s optional @deva[वृद्धि] by specifying @deva[गुण] for single-consonant endings.
"""

advanced = """
@deva[हलेकाचर] (single consonant) condition for @deva[ऊर्णु]: @deva[गुण] applies. This interacts with @ref[7.3.90] (multi-consonant contexts). Single-consonant @deva[सार्वधातुक] like @deva[त्], @deva[ः] receive @deva[गुण]-formed stem: @deva[प्रोर्णोत्], @deva[प्रौर्णोः]. The conditioning refines @deva[ऊर्णु]'s paradigm distribution.
"""

id = "7.3.26"
numericId = "73026"

[en]
simple = """
After @deva[अर्ध] (half), words meaning 'mass/measure' get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[अर्धपल] → @deva[आर्धपालिकः].
"""

standard = """
@deva[अर्ध] + @deva[परिमाण] compounds receive @deva[उत्तरपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[अर्ध] + @deva[पल] + @deva[ठक्] → @deva[आर्धपालिकः] 'relating to half a pala'. The measure word's initial vowel strengthens after @deva[अर्ध].
"""

advanced = """
@deva[अर्ध] as @deva[पूर्वपद] with @deva[परिमाण] @deva[उत्तरपद] triggers @deva[वृद्धि] of the measure term. This parallels @deva[संख्या] + @deva[परिमाण] (@ref[7.3.17]) but specifically for @deva[अर्ध]. Half-measure compounds receive systematic strengthening, integrating fractional quantities into the @deva[वृद्धि] system.
"""

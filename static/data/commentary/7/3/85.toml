id = "7.3.85"
numericId = "73085"

[en]
simple = """
The root @deva[जागृ] always takes @deva[गुण], except before @deva[वि] affix, @deva[चिण्] (aorist), and @deva[णल्] (perfect 3sg). @deva[जागर्ति], but @deva[जागरिष्यति].
"""

standard = """
@deva[जागृ] → @deva[गुण] (@deva[ऋ]→@deva[अर्]) except before @deva[वि]/@deva[चिण्]/@deva[णल्]. @deva[जागर्ति] 'wakes' shows @deva[गुण]. Exceptions: @deva[जागरिष्यति] (before future), @deva[अजागरीत्] (@deva[चिण्]), @deva[जजागार] (@deva[णल्] retains @deva[ऋ]). Limited contexts block strengthening.
"""

advanced = """
@deva[जागृ] receives @deva[गुण] except in three environments: @deva[वि]-affix, @deva[चिण्]-aorist, @deva[णल्]-perfect. Regular @deva[गुण]: @deva[जागर्ति], @deva[जागृतः]. Exceptions preserve @deva[ऋ]: @deva[जागरिष्यति] (with @deva[इ]-augment), @deva[अजागरीत्] (@deva[चिण्] aorist), @deva[जजागार] (perfect 3sg). The rule shows @deva[जागृ]'s distinctive paradigm.
"""

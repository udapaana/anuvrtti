id = "7.3.54"
numericId = "73054"

[en]
simple = """
The @deva[ह्] of @deva[हन्] 'to kill' becomes a guttural before @deva[ञित्]/@deva[णित्] affixes and before @deva[न्]. Examples: @deva[घातयति], @deva[घातकः], @deva[हन्ति]→@deva[घ्नन्ति].
"""

standard = """
@deva[हन्] → @deva[ह्]→@deva[घ्] (guttural) before @deva[ञित्]/@deva[णित्] and @deva[न्]. @deva[हन्] + @deva[णिच्] → @deva[घातयति], @deva[हन्] + @deva[ण्वुल्] → @deva[घातकः]. Before @deva[न्]: @deva[हन्ति] → forms with @deva[घ्न्]. The @deva[ह्] becomes guttural @deva[घ्] systematically.
"""

advanced = """
@deva[हन्] undergoes @deva[ह्]→@deva[घ्] (@deva[कुत्व]) before @deva[ञित्]/@deva[णित्] affixes and before @deva[न्]. Causative: @deva[घातयति]; agent noun: @deva[घातकः]. Before @deva[न्]-initial: @deva[हन्] + @deva[अन्ति] → @deva[घ्नन्ति]. This interacts with @ref[7.3.32]'s @deva[त्]-substitution for @deva[न्], creating @deva[घात]-stems in derivatives.
"""

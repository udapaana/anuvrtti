id = "7.3.25"
numericId = "73025"

[en]
simple = """
Compounds ending in @deva[जङ्गल] (jungle), @deva[धेनु] (cow), or @deva[गव] (cattle) get @deva[वृद्धि] of the second member before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes.
"""

standard = """
Compounds with @deva[जङ्गल], @deva[धेनु], or @deva[गव] as @deva[उत्तरपद] receive @deva[उत्तरपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. These animal/terrain terms take strengthening in compound-final position. Standard @deva[उत्तरपद]-only @deva[वृद्धि] applies here.
"""

advanced = """
@deva[जङ्गल]/@deva[धेनु]/@deva[गव] as @deva[उत्तरपद] trigger single-member @deva[वृद्धि] (not @deva[उभयपद]). This differs from @ref[7.3.19]-24's double strengthening. The terms cover pastoral/geographical vocabulary: @deva[जङ्गल] 'forest/jungle', @deva[धेनु] 'milch cow', @deva[गव] 'cattle'. Their compound derivatives follow regular @deva[उत्तरपद] strengthening.
"""

id = "7.3.81"
numericId = "73081"

[en]
simple = """
In Vedic (@deva[छन्दस्]), the root @deva[मी] is shortened before @deva[शित्] affixes. Vedic: @deva[प्रमिनन्ति] @deva[व्रतानि] (@[ṛg] X.10.5).
"""

standard = """
@deva[मी] + @deva[शित्] → @deva[ह्रस्व] in Vedic. @deva[प्रमिनन्ति] @deva[व्रतानि] 'they violate the ordinances'. The @deva[ई]→@deva[इ] shortening is Vedic-restricted; classical usage may differ. @deva[छन्दस्] indicates scriptural language.
"""

advanced = """
@deva[छान्दस] (Vedic) restriction: @deva[मी] shortens before @deva[शित्]. @deva[प्रमिनन्ति] (@[ṛg] X.10.5) shows @deva[मि]-form. The @deva[न]→@deva[ण] change (@deva[प्रमिणन्ति] per @[kāśikā]) follows regular @deva[ण]-rules. This Vedic morphology may not apply in classical Sanskrit, where @deva[मी] conjugates differently.
"""

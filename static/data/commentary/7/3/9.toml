id = "7.3.9"
numericId = "73009"

[en]
simple = """
When @deva[श्वन्] (dog) is followed by @deva[पद] (foot), the rule @ref[7.3.4] applies optionally. So you can form either @deva[श्वापदम्] or @deva[शौवापदम्].
"""

standard = """
The @deva[श्वन्] + @deva[पद] compound allows optional application of @ref[7.3.4]. With the rule: @deva[शौवापदम्] (with @deva[ऐ]/@deva[औ] augment before @deva[व्]). Without: @deva[श्वापदम्] (regular form). This @deva[विभाषा] gives both forms as valid derivatives meaning 'of/relating to a beast'.
"""

advanced = """
@deva[विभाषा] creates optionality for @deva[श्वापद] (wild beast, lit. 'dog-footed'). The augment application yields @deva[शौवापद]° forms; non-application yields @deva[श्वापद]°. Both are correct when @deva[श्वन्] + @deva[पद] combine. This reflects dialectal or stylistic variation in the derivational tradition.
"""

id = "7.3.33"
numericId = "73033"

[en]
simple = """
Roots ending in @deva[आ] add @deva[युक्] (@deva[य्]) before the aorist marker @deva[चिण्], which also causes @deva[वृद्धि]. Example: @deva[दा] → @deva[अदायि] 'was given'.
"""

standard = """
@deva[आ]-final @deva[धातु] + @deva[चिण्] (aorist) → @deva[युक्]-@deva[आगम] (@deva[य्]) + @deva[वृद्धि]. @deva[दा] + @deva[चिण्] → @deva[अदायि।] @deva[स्था] → @deva[अस्थायि।] The augment @deva[य्] appears between the @deva[आ]-stem and @deva[चिण्], and the root vowel undergoes @deva[वृद्धि] (@deva[आ]→@deva[आ] already maximal).
"""

advanced = """
@deva[युक्] (@deva[य्]-@deva[आगम]) inserts before @deva[चिण्] for @deva[आ]-final roots. Since @deva[आ] is already @[vṛddhi-grade], the strengthening is vacuous, but the rule establishes the pattern. @deva[अदायि], @deva[अस्थायि] show the passive aorist formation: @deva[धातु] + @deva[युक्] + @deva[चिण्] with appropriate vowel treatment.
"""

id = "7.3.56"
numericId = "73056"

[en]
simple = """
The @deva[ह्] of @deva[हि] (@deva[हिनोति]) becomes guttural after reduplication, but not in the reduplicated aorist. Examples: @deva[जिघीषति], @deva[प्रजिघाय], but @deva[अजिहिषत].
"""

standard = """
@deva[हि] (fifth class) + reduplication → @deva[ह्]→@deva[घ्], except in @deva[चङ्] (reduplicated aorist). @deva[जिघीषति] (desiderative), @deva[प्रजिघाय] (perfect). But aorist: @deva[अजिहिषत] (no @deva[कुत्व]). Tense distinction affects the substitution.
"""

advanced = """
@deva[हि] receives @deva[कुत्व] (@deva[ह्]→@deva[ज्]/@deva[घ्]) after @deva[अभ्यास], with @deva[चङ्]-aorist exception. Desiderative: @deva[जिघीषति]; perfect: @deva[प्रजिघाय] show the change. Reduplicated aorist @deva[अजिहिषत] retains @deva[ह्], blocking @deva[कुत्व]. The @deva[चङ्] formation is specifically excluded from the guttural shift.
"""

id = "7.3.87"
numericId = "73087"

[en]
simple = """
In reduplicated forms, the light @deva[इक्] vowel of the reduplicant doesn't take @deva[गुण] before vowel-initial @deva[कित्]/@deva[ङित्] @deva[सार्वधातुक] affixes.
"""

standard = """
Reduplicated stem: @deva[अभ्यास] (reduplicant) with @deva[लघु] @deva[इक्] → no @deva[गुण] before @deva[अजादि] @deva[कित्]/@deva[ङित्] @deva[सार्वधातुक]. @deva[बबभूव] shows reduplicant @deva[ब] unchanged. The reduplicant's vowel is exempt from strengthening.
"""

advanced = """
@deva[अभ्यास]-@deva[लघु]-@deva[इक्] is exempt from @deva[गुण] before @deva[अजादि] @deva[कित्]/@deva[ङित्] @deva[सार्वधातुक]. In perfect/intensive reduplication, the short @deva[इक्] of the doubled syllable stays unstrengthened. This prevents @deva[गुण] in the reduplicant while allowing it in the root portion. @deva[बबभूव], @deva[ततान] show patterns.
"""

id = "7.3.118"
numericId = "73118"

[en]
simple = """
After short @deva[इ]/@deva[उ] stems that are not @deva[नदी] or @deva[घि], locative @deva[इ] optionally becomes @deva[आम्] or takes @deva[गुण]+@deva[इ]. @deva[मुनौ] or @deva[मुनयि] or @deva[मुन्याम्].
"""

standard = """
@deva[अ]-@deva[नदी] @deva[अ]-@deva[घि] @deva[ह्रस्व]-@deva[इ]/@deva[उ]-@deva[अन्त] + @deva[सप्तमी] → @deva[विभाषा] @deva[आम्] @deva[या] @deva[गुण]+@deva[इ]. @deva[मुनि] → @deva[मुनौ] (@deva[गुण]), @deva[मुनयि], or @deva[मुन्याम्] (@deva[आम्]). Three-way optionality for these stems.
"""

advanced = """
@deva[विभाषा] for non-@deva[नदी] non-@deva[घि] @deva[ह्रस्व]-@deva[इ]/@deva[उ] stems in locative: @deva[आम्] (@deva[मुन्याम्]), @deva[गुण]-@deva[औ] (@deva[मुनौ]), or @deva[गुण]-@deva[अयि]/@deva[अवि] (@deva[मुनयि]). This creates three valid locative forms for masculine @deva[इ]/@deva[उ]-stems that don't fit @deva[नदी] or @deva[घि] categories.
"""

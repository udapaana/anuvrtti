id = "7.3.15"
numericId = "73015"

[en]
simple = """
After a number, the words @deva[संवत्सर] (year) and other numerals get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Examples: @deva[द्विसंवत्सर] → @deva[द्विसांवत्सरिकः], @deva[द्विषष्ठि] → @deva[द्वैषाष्ठिकः].
"""

standard = """
When @deva[संख्या] (numeral) precedes @deva[संवत्सर] or another @deva[संख्या] in compound, the @deva[उत्तरपद] receives @deva[आदि]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[द्वि] + @deva[संवत्सर] + @deva[ठक्] → @deva[द्विसांवत्सरिकः] 'biennial'. @deva[द्वि] + @deva[षष्ठि] + @deva[ठक्] → @deva[द्वैषाष्ठिकः]. Number-based compounds strengthen systematically.
"""

advanced = """
@deva[संख्या] as @deva[पूर्वपद] triggers strengthening of @deva[संवत्सर] and @deva[संख्या] @deva[उत्तरपद]s. This covers year-compounds and numerical compounds (@deva[द्विषष्ठि] 'two-sixties'). The @deva[वृद्धि] applies to @deva[उत्तरपद]-@deva[आदि] per @ref[7.3.10]'s scope. Examples show temporal (@deva[संवत्सर]) and pure numerical (@deva[षष्ठि]) bases both undergoing strengthening in this construction.
"""

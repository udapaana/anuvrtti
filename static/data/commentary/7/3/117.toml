id = "7.3.117"
numericId = "73117"

[en]
simple = """
After all feminine stems ending in short @deva[इ]/@deva[उ] (called @deva[नदी]), @deva[आम्] replaces locative @deva[इ]. @deva[मत्याम्], @deva[श्रियाम्].
"""

standard = """
Feminine @deva[ह्रस्व]-@deva[इ]/@deva[उ]-@deva[अन्त] (@deva[नदी]-class) + @deva[सप्तमी] @deva[इ] → @deva[आम्]. @deva[मति] → @deva[मत्याम्], @deva[श्री] → @deva[श्रियाम्]. All such feminine stems receive the @deva[आम्]-locative.
"""

advanced = """
Extension of @ref[7.3.116]: all feminine @deva[ह्रस्व]-@deva[इ]/@deva[उ] stems (@deva[नदी]-@deva[संज्ञक]) receive @deva[आम्] for locative @deva[इ]. @deva[मत्याम्], @deva[बुद्ध्याम्]; @deva[श्रियाम्], @deva[भ्रियाम्]. The @deva[आम्]-substitution is comprehensive for this class, creating uniform feminine @deva[सप्तमी] (locative) singular formation.
"""

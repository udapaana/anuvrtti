id = "7.3.115"
numericId = "73115"

[en]
simple = """
After @deva[द्वितीया] (second) and @deva[तृतीया] (third), the @deva[स्याट्] augment is optional. @deva[द्वितीयस्यै] or @deva[द्वितीयायै].
"""

standard = """
@deva[द्वितीया]/@deva[तृतीया] + @deva[चतुर्थी]/@deva[पञ्चमी]/@deva[षष्ठी] @deva[एक]. → optional @deva[स्याट्]. @deva[द्वितीयस्यै] or @deva[द्वितीयायै], @deva[तृतीयस्याः] or @deva[तृतीयायाः]. @deva[विभाषा] allows both pronominal and regular feminine patterns.
"""

advanced = """
@deva[विभाषा] for @deva[स्याट्] with @deva[द्वितीया]/@deva[तृतीया]: both pronominal (@deva[स्यात्]) and nominal (@deva[याट्]) augments valid. @deva[द्वितीयस्यै]/@deva[द्वितीयायै], @deva[तृतीयस्याः]/@deva[तृतीयायाः]. These ordinals show optional pronominal behavior, creating doublet paradigms.
"""

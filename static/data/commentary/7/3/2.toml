id = "7.3.2"
numericId = "73002"

[en]
simple = """
In compounds, when the prior member ends in @deva[य्] or @deva[व्] at word-end, the second member doesn't get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes.
"""

standard = """
This prohibits @deva[आदि]-@deva[वृद्धि] of the @deva[उत्तरपद] (second compound member) when the @deva[पूर्वपद] ends in @deva[य्] or @deva[व्] at its @deva[पद] boundary. Thus compounds with -@deva[य] or -@deva[व] final first members preserve the original vowel of the second member before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita.
"""

advanced = """
The condition @deva[पदान्त] restricts to morphological word-final @deva[य्]/@deva[व्], not internal occurrences. This blocks @deva[वृद्धि] that would otherwise apply by @ref[7.2.117]. Example: from a compound where @deva[पूर्वपद] ends in -@deva[य] + @deva[उत्तरपद], the derivation proceeds without strengthening. The @deva[ऐच्] augment mentioned in @ref[7.3.3]-4 is also blocked.
"""

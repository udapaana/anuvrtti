id = "7.3.46"
numericId = "73046"

[en]
simple = """
According to Northern grammarians, the @deva[अ] obtained by shortening feminine @deva[आ] (per @ref[7.4.13]) doesn't change to @deva[इ] before feminine @deva[आ]. Regional grammatical variation.
"""

standard = """
@deva[उदीचाम्] (Northern) view: when @deva[आ] is shortened to @deva[अ] by @ref[7.4.13] (@deva[के] @deva[अणः]), this derived @deva[अ] before @deva[क्] doesn't become @deva[इ] before feminine @deva[आ]. This blocks @ref[7.3.44]'s application to shortened vowels.
"""

advanced = """
Regional tradition (@deva[उदीचाम्]) opinion: the @deva[ह्रस्व] @deva[अ] resulting from @ref[7.4.13]'s shortening is exempt from @ref[7.3.44]'s @deva[इ]-substitution. This creates variant feminine forms depending on grammatical school. The derived @deva[अ] differs from original @deva[अ] in rule application.
"""

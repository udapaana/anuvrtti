id = "7.3.24"
numericId = "73024"

[en]
simple = """
In compounds that are names of cities or countries, both members get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[काशिकौशलः] from @deva[काशिकोसल].
"""

standard = """
@deva[नगर] (city) and @deva[जनपद] (country) name-compounds receive @deva[उभयपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[काशिकोसल] + @deva[अण्] → @deva[काशिकौशलः] shows both members strengthened. Geographical proper names undergo double strengthening.
"""

advanced = """
Place-name compounds (@deva[नगर]/@deva[जनपद]-@deva[संज्ञा]) join deity dvandvas (@ref[7.3.21]) in receiving @deva[उभयपद]-@deva[वृद्धि]. This reflects the formal register of geographical terminology. Both members' initial vowels undergo strengthening, creating distinctive derived forms for place-based adjectives/nouns.
"""

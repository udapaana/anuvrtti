id = "7.3.12"
numericId = "73012"

[en]
simple = """
After @deva[सु] (good), @deva[सर्व] (all), or @deva[अर्ध] (half), a country name's first vowel gets @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[सुपाञ्चाल] → @deva[सौपाञ्चालकः].
"""

standard = """
When @deva[सु]/@deva[सर्व]/@deva[अर्ध] precedes a @deva[जनपद] (country/region name) in compound, the @deva[जनपद] takes @deva[आदि]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[सु] + @deva[पाञ्चाल] + @deva[ठक्] → @deva[सौपाञ्चालकः] 'of the excellent @[pāñcāla] region'. The three prefixes trigger identical strengthening.
"""

advanced = """
The enumeration @deva[सु]/@deva[सर्व]/@deva[अर्ध] covers evaluative and quantifying prefixes with @deva[जनपद]. @deva[वृद्धि] of @deva[उत्तरपद]-@deva[आदि] applies per @ref[7.3.10]'s @[adhikāra]. @deva[सौपाञ्चालकः], @deva[सार्वपाञ्चालकः], @deva[आर्धपाञ्चालकः] all show the country name strengthened. This rule integrates geographical terms into the compound @deva[वृद्धि] system.
"""

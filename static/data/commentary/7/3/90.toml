id = "7.3.90"
numericId = "73090"

[en]
simple = """
The root @deva[ऊर्णु] optionally takes @deva[वृद्धि] before consonant-initial @deva[पित्] @deva[सार्वधातुक]. @deva[प्रोर्णोति] or @deva[प्रोर्णौति].
"""

standard = """
@deva[ऊर्णु] + @deva[पित्] @deva[सार्व]. (@deva[हलादि]) → optional @deva[वृद्धि]. @deva[प्रोर्णोति] (@deva[गुण]) or @deva[प्रोर्णौति] (@deva[वृद्धि]) both valid. @deva[विभाषा] creates doublet forms for this root's present system.
"""

advanced = """
@deva[विभाषा] for @deva[ऊर्णु] before @deva[हलादि] @deva[पित्] @deva[सार्वधातुक]: either @deva[गुण] (@deva[ओ]) or @deva[वृद्धि] (@deva[औ]). @deva[प्रोर्णोति]/@deva[प्रोर्णौति], @deva[प्रोर्णोषि]/@deva[प्रोर्णौषि] show the alternation. The optionality distinguishes @deva[ऊर्णु] from the obligatory @deva[वृद्धि] of @ref[7.3.89]'s @deva[ह्रस्व]-@deva[उ] roots.
"""

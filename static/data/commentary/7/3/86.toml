id = "7.3.86"
numericId = "73086"

[en]
simple = """
Causative stems that take @deva[पुक्]-augment (from roots like @deva[अर्ति], @deva[ह्री], etc.) undergo @deva[गुण] before @deva[सार्वधातुक] and @deva[आर्धधातुक].
"""

standard = """
@deva[पुगन्त] (@deva[पुक्]-augmented) causatives + @deva[सार्व]./@deva[आर्ध]. → @deva[गुण]. Roots taking @deva[पुक्] per @ref[7.3.36] (@deva[ऋ], @deva[ह्री], @deva[व्ली], etc.) form causatives that then undergo @deva[गुण] strengthening. The augment-plus-@deva[गुण] creates characteristic causative stems.
"""

advanced = """
@deva[पुगन्त]-@deva[णिज्] stems (causatives with @deva[पुक्] from @ref[7.3.36]) receive @deva[गुण] before @deva[सार्वधातुक]/@deva[आर्धधातुक]. @deva[ऋ], @deva[ह्री], @deva[व्ली], @deva[री], @deva[क्नुय्], @deva[क्ष्माय्], and @deva[दीर्घ]-@deva[आ] roots form causatives with @deva[प्], then these stems strengthen. This extends @deva[गुण] application to derived causative bases.
"""

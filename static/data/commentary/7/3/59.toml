id = "7.3.59"
numericId = "73059"

[en]
simple = """
Roots beginning with a guttural don't have their final @deva[च्]/@deva[ज्] become guttural before @deva[धित्] or @deva[ण्यत्]. Examples: @deva[कूज]→@deva[कूजः] (not *@deva[कूगः]).
"""

standard = """
@deva[कादि] (guttural-initial) roots with final @deva[च्]/@deva[ज्] → no @deva[कुत्व] before @deva[धित्]/@deva[ण्यत्]. @deva[कूज] remains @deva[कूजः], not *@deva[कूगः।] The initial guttural blocks final-guttural substitution, avoiding excessive @deva[कुत्व].
"""

advanced = """
@deva[कादि] condition: roots already beginning with @deva[क्]/@deva[ख्]/@deva[ग्]/@deva[घ्] are exempt from @ref[7.3.52]'s @deva[कुत्व]. This prevents double-guttural formations. @deva[कूज]→@deva[कूजः] (not *@deva[कूगः]) preserves the palatal final. The prohibition maintains phonological balance—one guttural is sufficient.
"""

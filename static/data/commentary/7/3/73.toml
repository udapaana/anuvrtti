id = "7.3.73"
numericId = "73073"

[en]
simple = """
The entire @deva[क्स] affix optionally drops before dental-initial @deva[आत्मनेपद] endings after @deva[दुह्], @deva[दिह्], @deva[लिह्], @deva[गुह्]. @deva[अधुक्षत] or @deva[अदुग्ध].
"""

standard = """
@deva[दुह्]/@deva[दिह्]/@deva[लिह्]/@deva[गुह्] + @deva[क्स] + @deva[तादि] (dental-initial @[ātmane].) → optional @deva[क्स]-@deva[लोप]. @deva[अधुक्षत] or @deva[अदुग्ध] both valid. @deva[विभाषा] creates doublet aorist forms for these four roots.
"""

advanced = """
@deva[विभाषा] for @deva[क्स]-elision: @deva[दुह्], @deva[दिह्], @deva[लिह्], @deva[गुह्] before dental-initial @[ātmanepada] endings. @deva[अधुक्षत] (with @deva[क्स]) or @deva[अदुग्ध] (without, showing @deva[धातु]-form changes) are both correct. The optionality reflects variant aorist paradigms for these @deva[ह्]-final roots.
"""

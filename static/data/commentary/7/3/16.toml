id = "7.3.16"
numericId = "73016"

[en]
simple = """
After a number, the word @deva[वर्ष] (year) gets @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes, but only when not referring to future time. Example: @deva[द्विवार्षिकः] 'biennial'.
"""

standard = """
@deva[संख्या] + @deva[वर्ष] compounds receive @deva[उत्तरपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita when the meaning is non-future (@deva[अनागत]). @deva[द्वि] + @deva[वर्ष] + @deva[ठक्] → @deva[द्विवार्षिकः] 'relating to two years (past/present)'. Future reference blocks this strengthening.
"""

advanced = """
The @deva[अनागत] condition restricts @deva[वृद्धि] to past or present temporal reference. Future-oriented compounds (@deva[भविष्यत्काल]) don't undergo strengthening. This semantic restriction on a phonological rule shows context-sensitivity. @deva[वर्ष] differs from @deva[संवत्सर] (@ref[7.3.15]) in having this temporal limitation.
"""

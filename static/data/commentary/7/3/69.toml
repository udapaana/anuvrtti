id = "7.3.69"
numericId = "73069"

[en]
simple = """
The word @deva[भोज्य] keeps its @deva[ज्] when meaning 'eatable'. @deva[भोज्य] @deva[ओदनः] 'eatable rice', @deva[भोज्या] @deva[यवागू] 'eatable gruel'.
"""

standard = """
@deva[भुज्] 'to eat' + @deva[ण्यत्] → @deva[भोज्य] with @deva[ज्] retained in @deva[खाद्य] (eatable) sense. @deva[भोज्य] @deva[ओदनः], @deva[भोज्या] @deva[यवागू] show preservation of palatal for food-related derivatives. Semantic restriction to edibility.
"""

advanced = """
@deva[भुज्] + @deva[ण्यत्] → @deva[भोज्य] preserves @deva[ज्] in @deva[खाद्यार्थ] (edible meaning). This exception to @deva[कुत्व] (@ref[7.3.52]) is semantically conditioned. @deva[भोज्य] 'food, enjoyable' retains the palatal; other @deva[भुज्]-derivatives may take guttural per context and meaning.
"""

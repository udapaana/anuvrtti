id = "7.3.22"
numericId = "73022"

[en]
simple = """
Exception: when @deva[इन्द्र] is the second member of a deity dvandva, it doesn't get @deva[वृद्धि]. Example: @deva[वायवैन्द्रः] (not *@deva[वायवैन्द्रः] with double @deva[वृद्धि] of @deva[इन्द्र]).
"""

standard = """
In @deva[देवता] @deva[द्वन्द्व], @deva[इन्द्र] as @deva[उत्तरपद] is exempt from @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[वायुइन्द्र] + @deva[अण्] → @deva[वायवैन्द्रः] shows @deva[वायु] strengthened but @deva[इन्द्र] unchanged. This exception to @ref[7.3.21] preserves @deva[इन्द्र]'s base form.
"""

advanced = """
@deva[इन्द्र] receives exceptional treatment (@deva[अनिन्द्रस्य]) in second position of deity dvandvas. While the first deity name undergoes @deva[वृद्धि] per @ref[7.3.21], @deva[इन्द्र]'s initial vowel remains unchanged. This may reflect @deva[इन्द्र]'s prominence or phonological distinctiveness in the tradition.
"""

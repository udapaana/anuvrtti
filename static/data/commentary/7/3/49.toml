id = "7.3.49"
numericId = "73049"

[en]
simple = """
Other teachers say: when @deva[आ] is substituted for the shortened @deva[अ] of feminines, standard rules apply. A competing grammatical view.
"""

standard = """
@deva[आचार्यान्तर] (other teachers) view: the @deva[अ] obtained by shortening takes @deva[आ] substitution in certain contexts. This contrasts with the @deva[उदीचाम्] position of @ref[7.3.46]-48, showing debate among grammatical authorities.
"""

advanced = """
@deva[आचार्यान्तर] represents non-Northern opinion. Where @deva[उदीचाम्] block @deva[इ]-substitution for shortened @deva[अ], other teachers allow @deva[आ]-substitution. This shows the @[aṣṭādhyāyī] recording multiple valid analytical traditions for feminine formation.
"""

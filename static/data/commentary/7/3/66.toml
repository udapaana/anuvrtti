id = "7.3.66"
numericId = "73066"

[en]
simple = """
The roots @deva[यज्], @deva[याच्], @deva[रुच्], @deva[प्रवच्], and @deva[ऋच्] don't change their palatals before @deva[ण्यत्]. Examples: @deva[याज्यम्], @deva[वाच्यम्], @deva[ऋच्यम्].
"""

standard = """
Listed roots @deva[यज्]/@deva[याच्]/@deva[रुच्]/@deva[प्रवच्]/@deva[ऋच्] + @deva[ण्यत्] → no @deva[कुत्व]. @deva[याज्यम्] 'to be sacrificed', @deva[याच्यम्] 'to be asked', @deva[रुच्यम्] 'pleasing'. These retain palatal finals before @deva[ण्यत्] as exceptions to @ref[7.3.52].
"""

advanced = """
Enumerated exception to @deva[कुत्व] before @deva[ण्यत्]: @deva[यज्], @deva[याच्], @deva[रुच्], @deva[प्रवच्], @deva[ऋच्] preserve their final palatals. @deva[याज्यम्], @deva[याच्यम्], @deva[रुच्यम्], @deva[प्रवाच्यम्], @deva[ऋच्यम्] all show @deva[ज्]/@deva[च्] retention. This list exempts specific verbal roots from the general palatal→guttural rule.
"""

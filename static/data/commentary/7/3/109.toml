id = "7.3.109"
numericId = "73109"

[en]
simple = """
Before the nominative plural ending @deva[अस्], short final vowels of nominal stems take @deva[गुण]. @deva[अग्नयः], @deva[वायवः], @deva[धेनवः].
"""

standard = """
@deva[ह्रस्व]-@deva[अन्त] @deva[प्रातिपदिक] + @deva[जस्] (nom. pl.) → @deva[गुण]. @deva[अग्नि] → @deva[अग्नयः] 'fires', @deva[वायु] → @deva[वायवः] 'winds', @deva[धेनु] → @deva[धेनवः] 'cows'. The plural nominative triggers strengthening.
"""

advanced = """
@deva[प्रथमा] @deva[बहुवचन] @deva[जस्] triggers @deva[गुण] of preceding @deva[ह्रस्व] finals. @deva[इ]→@deva[ए] (+ @deva[अस्] → @deva[अयः]), @deva[उ]→@deva[ओ] (+ @deva[अस्] → @deva[अवः]). @deva[अग्नयः], @deva[वायवः], @deva[पटवः], @deva[धेनवः], @deva[बुद्धयः] demonstrate. This creates the characteristic plural @deva[प्रथमा] (nominative) forms for short-vowel stems.
"""

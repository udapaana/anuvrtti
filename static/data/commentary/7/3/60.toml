id = "7.3.60"
numericId = "73060"

[en]
simple = """
The roots @deva[अज्] 'to drive' and @deva[व्रज्] 'to go' don't have their @deva[ज्] become guttural before @deva[धित्] or @deva[ण्यत्]. So: @deva[अजः], @deva[व्रजः] (not *@deva[अगः], *@deva[व्रगः]).
"""

standard = """
@deva[अज्] and @deva[व्रज्] are exceptions to @ref[7.3.52]. Their final @deva[ज्] remains unchanged before @deva[धित्]/@deva[ण्यत्]. @deva[अजः] 'driving', @deva[व्रजः] 'going'—the palatal is preserved. These roots resist @deva[कुत्व] despite the general rule.
"""

advanced = """
Specific exception for @deva[अज्]/@deva[व्रज्] from @deva[कुत्व] (@ref[7.3.52]). Despite final @deva[ज्] and @deva[धित्]/@deva[ण्यत्] following, these roots retain the palatal: @deva[अजः], @deva[व्रजः]. The exception may reflect phonological, semantic, or traditional factors distinguishing these motion verbs.
"""

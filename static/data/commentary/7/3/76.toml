id = "7.3.76"
numericId = "73076"

[en]
simple = """
The root @deva[क्रम्] lengthens its vowel before @deva[शित्] affixes in parasmaipada only. @deva[क्रामति], @deva[क्रामतः], @deva[क्रामन्ति]. But @[ātmanepada]: @deva[आक्रमते].
"""

standard = """
@deva[क्रम्] + @deva[शित्] (parasmai.) → @deva[दीर्घ]. @deva[क्रामति] 'steps'. The lengthening is voice-restricted: parasmaipada gets @deva[अ]→@deva[आ], but @[ātmanepada] @deva[आक्रमते] retains short vowel. Voice distinction conditions the change.
"""

advanced = """
@deva[परस्मैपद]-restriction on @deva[क्रम्]'s @deva[दीर्घन] before @deva[शित्]. @deva[क्रामति], @deva[क्रामतः], @deva[क्रामन्ति] (parasmai.) show lengthening. @deva[आक्रमते] (@[ātmane].) shows short @deva[अ] preserved. This voice-based conditioning distinguishes @deva[क्रम्] from the unrestricted lengthening of @ref[7.3.74]-75.
"""

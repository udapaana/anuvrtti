id = "7.3.14"
numericId = "73014"

[en]
simple = """
After a direction word, names of villages or cities in the eastern region get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[पूर्वपाटलिपुत्र] → @deva[पौर्वपाटलिपुत्रकः].
"""

standard = """
When @deva[दिक्] (direction) precedes @deva[ग्राम] (village) or @deva[नगर] (city) names of @deva[प्राच्य] (eastern) regions, the place name receives @deva[आदि]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[पूर्वपाटलिपुत्र] + @deva[ठक्] → @deva[पौर्वपाटलिपुत्रकः]. Eastern settlements receive this special treatment.
"""

advanced = """
@deva[प्राच्य] (eastern) restricts the rule to settlements of that direction. @deva[ग्राम] and @deva[नगर] as categories cover villages and cities. The strengthening follows @ref[7.3.10]'s @deva[उत्तरपद]-@deva[वृद्धि] @[adhikāra]. This reflects the grammatical tradition's attention to regional distinctions in place-name derivations. Non-eastern settlements may follow different patterns.
"""

id = "7.3.75"
numericId = "73075"

[en]
simple = """
Before other class markers (@deva[शित्]), the roots @deva[ष्ठिव्], @deva[क्लम्], and @deva[आचम्] lengthen their vowels. @deva[ष्ठीवति], @deva[क्लामति], @deva[आचामति].
"""

standard = """
@deva[ष्ठिव्]/@deva[क्लम्]/@deva[आचम्] + @deva[शित्] (any class marker) → @deva[दीर्घ] of root vowel. @deva[ष्ठिव्] → @deva[ष्ठीवति] 'spits', @deva[क्लम्] → @deva[क्लामति] 'is weary', @deva[आचम्] → @deva[आचामति] 'sips'. Lengthening occurs before @[vikaraṇa].
"""

advanced = """
@deva[शित्] (any @deva[विकरण] with @deva[श्] indicatory) triggers @deva[दीर्घन] for @deva[ष्ठिव्], @deva[क्लम्], @deva[आचम्]. @deva[इ]→@deva[ई] (@deva[ष्ठीवति]), @deva[अ]→@deva[आ] (@deva[क्लामति], @deva[आचामति]). This extends @ref[7.3.74]'s principle to these three roots with broader affix scope—any @deva[शित्]-marked class affix triggers the lengthening.
"""

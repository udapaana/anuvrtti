id = "7.3.58"
numericId = "73058"

[en]
simple = """
The @deva[च्] of @deva[चि] 'to collect' optionally becomes guttural after reduplication in desiderative and perfect. Both @deva[चिचीषति]/@deva[चिकीषति] and @deva[चिचाय]/@deva[चिकाय] are valid.
"""

standard = """
@deva[चि] + reduplication → optional @deva[च्]→@deva[क्] in @deva[सन्] and @deva[लिट्]. Desiderative: @deva[चिचीषति] or @deva[चिकीषति।] Perfect: @deva[चिचाय] or @deva[चिकाय।] @deva[विभाषा] creates doublet forms for this root.
"""

advanced = """
@deva[विभाषा] (optionality) for @deva[चि]'s @deva[कुत्व] post-reduplication in @deva[सन्]/@deva[लिट्]. Both palatal-retaining (@deva[चिचीषति], @deva[चिचाय]) and guttural-shifted (@deva[चिकीषति], @deva[चिकाय]) forms are correct. This contrasts with @deva[जि] (@ref[7.3.57]) where the shift is obligatory.
"""

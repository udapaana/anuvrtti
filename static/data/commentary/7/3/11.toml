id = "7.3.11"
numericId = "73011"

[en]
simple = """
When a word meaning a part of something precedes a season name, the season word gets @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[पूर्वशरद्] → @deva[पौर्वशारदः].
"""

standard = """
In compounds where @deva[अवयव] (part) + @deva[ऋतु] (season), the @deva[ऋतु]-denoting @deva[उत्तरपद] receives @deva[आदि]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[पूर्वशरद्] 'first part of autumn' + @deva[अण्] → @deva[पौर्वशारदः]. The part-whole semantic relationship triggers this strengthening.
"""

advanced = """
@deva[अवयव] here means constituent or part, creating compounds like 'first-autumn', 'latter-spring'. When such part-designating @deva[पूर्वपद] precedes an @deva[ऋतु] term, the season word's initial vowel takes @deva[वृद्धि]. This follows the @deva[उत्तरपद]-@deva[वृद्धि] @[adhikāra] of @ref[7.3.10]. Examples show @deva[शरद्] → @deva[शारद्], etc.
"""

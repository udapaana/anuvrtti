id = "7.3.13"
numericId = "73013"

[en]
simple = """
After a direction word, country names (except @deva[मद्र]) get @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. Example: @deva[पूर्वपाञ्चाल] → @deva[पौर्वपाञ्चालकः]. But @deva[मद्र] stays: @deva[पौर्वमद्रः].
"""

standard = """
@deva[दिक्] (direction) + @deva[जनपद] compounds receive @deva[उत्तरपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita, with @deva[मद्र] as exception. @deva[पूर्वपाञ्चाल] + @deva[ठक्] → @deva[पौर्वपाञ्चालकः] shows strengthening. But @deva[पूर्वमद्र] + @deva[अण्] → @deva[पौर्वमद्रः] (no @deva[वृद्धि] of @deva[मद्र]). The exception preserves @deva[मद्र]'s form.
"""

advanced = """
The @deva[मद्र] exception (@deva[अमद्रे]) prevents @deva[वृद्धि] of this specific @deva[जनपद] when preceded by @deva[दिक्]-terms. Other region names follow regular strengthening: @deva[पाञ्चाल]→@deva[पाञ्चाल] etc. in @deva[उत्तरपद] position. The reason for @deva[मद्र]'s exception may be phonological or traditional. @deva[दिक्]-compounds otherwise systematically strengthen geographical terms.
"""

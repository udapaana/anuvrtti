id = "7.3.50"
numericId = "73050"

[en]
simple = """
The @deva[ठ] of taddhita affixes is replaced by @deva[इक्]. Examples: @deva[आक्षिकः], @deva[शालाकिकः], @deva[लावणिकः].
"""

standard = """
@deva[ठ]-@deva[आदि] taddhita → @deva[इक्]-@deva[आदेश]. @deva[ठक्] becomes @deva[इक] (the @deva[ठ]→@deva[इ], @deva[क्] remains). @deva[आक्ष] + @deva[ठक्] → @deva[आक्षिकः] 'relating to dice', @deva[शालाक] + @deva[ठक्] → @deva[शालाकिकः]. The substitution affects the initial consonant of @deva[ठ]-affixes.
"""

advanced = """
@deva[ठादि] (initial @deva[ठ]) of taddhita affixes receives @deva[इक्] substitution. This transforms @deva[ठक्]→@deva[इक], @deva[ठञ्]→@deva[इक], etc. The substitution @deva[इक्] replaces @deva[ठ], not the whole affix. @deva[आक्षिकः], @deva[लावणिकः] demonstrate: the base + @deva[इक] + remaining affix portions.
"""

id = "7.3.55"
numericId = "73055"

[en]
simple = """
The @deva[ह्] of @deva[हन्] also becomes guttural after reduplication. Examples: @deva[जिघांसति] (desiderative), @deva[जघान] (perfect).
"""

standard = """
@deva[हन्] + reduplication → @deva[ह्]→@deva[घ्] (@deva[कुत्व]). @deva[जिघांसति] (desiderative: @deva[जि]-@deva[घान्]-@deva[स]), @deva[जघान] (perfect: @deva[ज]-@deva[घान]). The guttural shift applies when reduplication has occurred, extending 7.3.54.
"""

advanced = """
@deva[अभ्यास] (reduplication) triggers @deva[कुत्व] for @deva[हन्]'s @deva[ह्]. Desiderative @deva[जिघांसति] shows reduplicated stem with @deva[घ्]. Perfect @deva[जघान] likewise. The conditioning is: when reduplication precedes and appropriate affixes follow, @deva[ह्]→@deva[घ्] occurs. @deva[जङ्घन्यते] (intensive) also shows this.
"""

id = "7.3.27"
numericId = "73027"

[en]
simple = """
When @deva[अर्ध] precedes a measure word starting with short @deva[अ], the @deva[वृद्धि] is optional. So @deva[आर्धाढकिकः] and @deva[आर्धढकिकः] are both valid.
"""

standard = """
@deva[अर्ध] + @deva[ह्रस्व]-@deva[अ]-initial @deva[परिमाण] compounds take optional @deva[उत्तरपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[अर्ध] + @deva[आढक] + @deva[ठक्] → @deva[आर्धाढकिकः] or @deva[आर्धढकिकः]. The short @deva[अ] condition triggers @deva[विभाषा] (optionality).
"""

advanced = """
@deva[ह्रस्व] @deva[अ] (short @deva[अ]) as @deva[उत्तरपद]-@deva[आदि] creates optionality for @deva[वृद्धि]. The short vowel condition differentiates from other initial vowels. Both strengthened and unstrengthened forms are valid: @deva[आर्धाढकिकः] (with @deva[वृद्धि]) and @deva[आर्धढकिकः] (without). This phonological condition modulates the rule's application.
"""

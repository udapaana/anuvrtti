id = "7.3.31"
numericId = "73031"

[en]
simple = """
The compounds @deva[यथातथ] and @deva[यथापुर] can optionally have @deva[वृद्धि] of either the first or second member before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes. This ends the @deva[उत्तरपद]-@deva[वृद्धि] section.
"""

standard = """
@deva[यथातथ] and @deva[यथापुर] receive @deva[पर्याय] (alternating) @deva[वृद्धि]: either @deva[पूर्वपद] or @deva[उत्तरपद] strengthens, but not both. @deva[याथातथिकः] or @deva[यथाताथिकः] both valid. This @[sūtra] closes the @[adhikāra] from @ref[7.3.10].
"""

advanced = """
@deva[पर्यायेण] indicates alternation—@deva[वृद्धि] applies to one member or the other, not simultaneously. This creates variant forms: @deva[याथातथ]° (@deva[पूर्वपद]-@deva[वृद्धि]) vs. @deva[यथाताथ]° (@deva[उत्तरपद]-@deva[वृद्धि]). The rule concludes the compound-@deva[वृद्धि] section initiated at @ref[7.3.10], covering copulative and compound strengthening patterns.
"""

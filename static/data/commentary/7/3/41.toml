id = "7.3.41"
numericId = "73041"

[en]
simple = """
The root @deva[स्फाय्] changes its final to @deva[व्] in the causative. Result: @deva[स्फावयति] 'causes to swell'.
"""

standard = """
@deva[स्फाय्] + @deva[णि] → @deva[व्]-@deva[आदेश] for final @deva[य्]. @deva[स्फाय्] → @deva[स्फाव्] + @deva[णि] → @deva[स्फावयति।] The @deva[य्]→@deva[व्] substitution occurs specifically in causative formation for this root.
"""

advanced = """
Final-replacement (@deva[अन्त्यादेश]): @deva[स्फाय्] loses @deva[य्] and gains @deva[व्] before @deva[णि]. This yields @deva[स्फावयति] 'causes to swell/prosper'. The change is root-specific to @deva[स्फाय्], creating a distinctive causative stem @deva[स्फाव]° not derived through regular augmentation.
"""

id = "7.3.23"
numericId = "73023"

[en]
simple = """
In deity dvandvas, when @deva[वरुण] is the second member, it optionally gets @deva[वृद्धि]. So both @deva[मैत्रावारुणः] and @deva[मैत्रवारुणः] are valid.
"""

standard = """
@deva[वरुण] as @deva[उत्तरपद] in @deva[देवता] @deva[द्वन्द्व] takes optional @deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[मित्रावरुण] + @deva[अण्] → @deva[मैत्रावारुणः] (with @deva[वृद्धि]) or @deva[मैत्रवारुणः] (without). @deva[विभाषा] allows both forms for @deva[वरुण]-final deity pairs.
"""

advanced = """
@deva[वरुण] receives @deva[विभाषा] (optionality) treatment unlike @deva[इन्द्र]'s complete exemption (@ref[7.3.22]). Both strengthened and unstrengthened forms of @deva[वरुण] are valid in @deva[देवता] @deva[द्वन्द्व]. This creates dialectal or stylistic variants: @deva[मैत्रावारुणः] and @deva[मैत्रवारुणः] are equally correct derivations.
"""

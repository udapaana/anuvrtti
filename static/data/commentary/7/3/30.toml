id = "7.3.30"
numericId = "73030"

[en]
simple = """
Words like @deva[शुचि], @deva[ईश्वर], and @deva[क्षेत्रज्ञ] always get @deva[वृद्धि] of their first vowel before @deva[ञित्]/@deva[णित्]/@deva[कित्] affixes, regardless of compound status.
"""

standard = """
The @deva[शुच्यादि] @deva[गण] (list including @deva[शुचि], @deva[ईश्वर], @deva[क्षेत्रज्ञ]) receives mandatory @deva[आदि]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita. @deva[शुचि] → @deva[शौचि]°, @deva[ईश्वर] → @deva[ऐश्वर]°, @deva[क्षेत्रज्ञ] → @deva[क्षैत्रज्ञ]°. @deva[नित्य] (always) applies regardless of compound context.
"""

advanced = """
@deva[शुच्यादि] functions as @deva[गण] with @deva[नित्य]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्]. Unlike conditional rules, these words always strengthen. The list includes terms of purity (@deva[शुचि]), lordship (@deva[ईश्वर]), and knowledge (@deva[क्षेत्रज्ञ]). @deva[नित्य] overrides any exceptions that might otherwise block @deva[वृद्धि].
"""

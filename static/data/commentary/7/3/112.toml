id = "7.3.112"
numericId = "73112"

[en]
simple = """
After @deva[नदी]-class stems, the dative/ablative/genitive singular endings receive @deva[आट्] augment. @deva[नद्यै], @deva[नद्याः].
"""

standard = """
@deva[नदी]-@deva[संज्ञक] + @deva[चतुर्थी]/@deva[पञ्चमी]/@deva[षष्ठी] @deva[एक]. → @deva[आट्]-@deva[आगम]. @deva[नदी] + @deva[ए] → @deva[नद्यै] (dat.), @deva[नदी] + @deva[अस्] → @deva[नद्याः] (abl./gen.). The augment precedes the case ending.
"""

advanced = """
@deva[आट्]-@deva[आगम] for @deva[नदी]-stems (feminine @deva[ई]-finals per @ref[1.4.3]) before singular dat./abl./gen. endings. @deva[नद्यै] (@deva[ई] + @deva[आट्] + @deva[ए] → @deva[यै]), @deva[नद्याः] (@deva[ई] + @deva[आट्] + @deva[अस्] → @deva[याः]). The @deva[आ]-augment creates distinctive feminine case forms, contrasting with @deva[घि]-patterns (@ref[7.3.111]).
"""

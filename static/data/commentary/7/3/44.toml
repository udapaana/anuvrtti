id = "7.3.44"
numericId = "73044"

[en]
simple = """
When the feminine marker @deva[आ] follows, the @deva[अ] before @deva[क्] of an affix changes to @deva[इ], but not after case endings. Example: @deva[पचन्तिका] (from @deva[पचन्त] + @deva[क] + @deva[आ]).
"""

standard = """
Affix-@deva[क्] preceded by @deva[अ] → @deva[इ] before feminine @deva[आ], when not following @deva[विभक्ति] (case ending). The @deva[अ]→@deva[इ] change applies within derived words. @deva[पचन्तिका] shows the transformation: @deva[अ] before @deva[क] changes to @deva[इ].
"""

advanced = """
The rule targets @deva[टित्] @deva[क्] (@deva[क्] with @deva[ट्] marker) preceded by @deva[अ]. Before feminine @deva[आ], @deva[अ]→@deva[इ] occurs. The @deva[अविभक्तौ] condition excludes case-affix contexts. This creates feminine forms like @deva[पचन्तिका], @deva[नर्तकिका] where the penultimate @deva[अ] before @deva[क] shifts to @deva[इ] for feminine derivation.
"""

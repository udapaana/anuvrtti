id = "7.3.79"
numericId = "73079"

[en]
simple = """
Before @deva[शित्] affixes, @deva[ज्ञा] 'to know' and @deva[जन्] 'to be born' become @deva[जा]. @deva[जानाति], @deva[जायते].
"""

standard = """
@deva[ज्ञा]/@deva[जन्] + @deva[शित्] → @deva[जा]-@deva[आदेश]. @deva[ज्ञा] → @deva[जा] → @deva[जानाति] 'knows' (with @deva[ना]-@[vikaraṇa]), @deva[जन्] → @deva[जा] → @deva[जायते] 'is born'. Both roots share the @deva[जा] replacement before class markers.
"""

advanced = """
@deva[जा]-@deva[आदेश] for @deva[ज्ञा] and @deva[जन्] (@[divādi] @deva[जन्] meaning 'production', not @[tanādi]). @deva[जानाति] shows @deva[ज्ञा] + @deva[ना] + @deva[ति] with @deva[ज्ञा]→@deva[जा]. @deva[जायते] shows @deva[जन्] + @deva[य] + @deva[ते] with @deva[जन्]→@deva[जा]. The common replacement creates parallel conjugation stems despite different root forms.
"""

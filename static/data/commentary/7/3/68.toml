id = "7.3.68"
numericId = "73068"

[en]
simple = """
The words @deva[प्रयोज्य] and @deva[नियोज्य] keep their @deva[ज्] when meaning 'capable of being employed'. @deva[प्रयोज्यः] = @deva[प्रयोक्तुं] @deva[शक्यः].
"""

standard = """
@deva[प्र]/@deva[नि] + @deva[युज्] + @deva[ण्यत्] → @deva[ज्] retained in @deva[शक्य] (ability) sense. @deva[प्रयोज्यः] 'employable', @deva[नियोज्यः] 'assignable'. But other senses may take guttural. Semantic restriction to @deva[शक्यार्थ].
"""

advanced = """
@deva[शक्यार्थ] (ability meaning) for @deva[प्रयोज्य]/@deva[नियोज्य] blocks @deva[कुत्व]. @deva[प्रयोक्तुं] @deva[शक्यः] = @deva[प्रयोज्यः] 'capable of being employed'. The @deva[ज्] is preserved in this derivative. Non-@deva[शक्य] meanings (like @deva[प्रयोगः]) may follow different patterns per @ref[7.3.52].
"""

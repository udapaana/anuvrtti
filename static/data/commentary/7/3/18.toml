id = "7.3.18"
numericId = "73018"

[en]
simple = """
In words like @deva[प्रोष्ठपद] and its synonyms, when followed by an affix meaning 'born at that time', the second member gets @deva[वृद्धि]. Example: @deva[प्रौष्ठपदिकः] 'born during @[proṣṭhapada]'.
"""

standard = """
@deva[प्रोष्ठपद] (a lunar mansion) and synonyms receive @deva[उत्तरपद]-@deva[वृद्धि] before @deva[ञित्]/@deva[णित्]/@deva[कित्] taddhita with @deva[तत्र] @deva[जात] meaning. @deva[प्रोष्ठपद] + @deva[ठक्] (@deva[तत्र] @deva[जात]) → @deva[प्रौष्ठपदिकः] 'one born during that constellation'. Birth-reference triggers strengthening.
"""

advanced = """
The @deva[तत्र] @deva[जात] (born there/then) semantic condition restricts to natal contexts. @deva[प्रोष्ठपद] and @deva[तत्सहचर] (synonymous terms) for the asterism take @deva[वृद्धि] of @deva[उत्तरपद] when the taddhita denotes birth-time. This covers lunar mansion terminology in astrological/calendrical derivations.
"""

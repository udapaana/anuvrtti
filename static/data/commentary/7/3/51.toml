id = "7.3.51"
numericId = "73051"

[en]
simple = """
After stems ending in @deva[इस्], @deva[उस्], @deva[उ]/@deva[ऊ], @deva[ॠ], or @deva[त्], @deva[ठ] becomes @deva[क]. Examples: @deva[सार्पिष्कः], @deva[धानुष्कः], @deva[पितृकः].
"""

standard = """
Stems ending in @deva[इस्]/@deva[उस्]/@deva[उ]/@deva[ऊ]/@deva[ॠ]/@deva[त्] + @deva[ठ] → @deva[क्]-@deva[आदेश] for @deva[ठ]. @deva[सर्पिस्] + @deva[ठ] → @deva[सार्पिष्कः], @deva[धनुस्] + @deva[ठ] → @deva[धानुष्कः], @deva[पितृ] + @deva[ठ] → @deva[पितृकः]. The stem-final conditions the @deva[ठ]→@deva[क] change.
"""

advanced = """
@deva[ठ]-substitution by @deva[क्] after specific stem-finals: @deva[इस्], @deva[उस्], @deva[उ]/@deva[ऊ], @deva[ॠ], @deva[त्]. This differs from @ref[7.3.50]'s @deva[इक्]-substitution. @deva[सार्पिष्कः] (from @deva[सर्पिस्]), @deva[धानुष्कः] (from @deva[धनुस्]), @deva[पितृकः] (from @deva[पितृ]) show @deva[क्] replacing @deva[ठ] without @deva[इ]-insertion.
"""

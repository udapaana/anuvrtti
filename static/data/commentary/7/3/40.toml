id = "7.3.40"
numericId = "73040"

[en]
simple = """
The root @deva[भी] 'to fear' adds @deva[षुक्] (@deva[ष्]) before @deva[णि] when fear is caused directly by the agent. Example: @deva[मुण्डो] @deva[भीषयते] 'the bald one frightens'.
"""

standard = """
@deva[भी] + @deva[णि] → @deva[षुक्]-@deva[आगम] when the causative agent directly causes fear. @deva[भी] + @deva[षुक्] + @deva[णि] → @deva[भीषयति।] @deva[मुण्डो] @deva[भीषयते], @deva[जटिलो] @deva[भीषयते] 'the bald/matted-hair one frightens'. Direct causation triggers the @deva[ष्]-augment.
"""

advanced = """
@deva[षुक्] (@deva[ष्]-@deva[आगम]) applies to @deva[भी] before @deva[णि] in @deva[हेतु]-@deva[प्रयोग] (direct causation) context. The agent's appearance or nature directly instills fear: @deva[भीषयति]. This contrasts with indirect causation which may use different formation. The @deva[षुक्]-causative is stylistically marked for immediate fear-induction.
"""

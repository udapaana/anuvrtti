id = "7.3.37"
numericId = "73037"

[en]
simple = """
The roots @deva[शा], @deva[छा], @deva[सा], @deva[ह्वा], @deva[वे], and @deva[पा] add @deva[युक्] (@deva[य्]) before the causative affix @deva[णि]. Examples: @deva[निशाययति], @deva[आच्छाययति].
"""

standard = """
@deva[शा]/@deva[छा]/@deva[सा]/@deva[ह्वा]/@deva[वे]/@deva[पा] + @deva[णि] (causative) → @deva[युक्]-@deva[आगम] (@deva[य्]). @deva[शा] + @deva[णि] → @deva[शाय] + @deva[इ] → @deva[शाययति।] The @deva[य्] augment intervenes before @deva[णि]. @deva[निशाययति] 'causes to lie down', @deva[आह्वाययति] 'causes to call'.
"""

advanced = """
@deva[युक्] insertion for these six roots before @deva[णि] creates causative stems: @deva[शाय]°, @deva[छाय]°, @deva[साय]°, @deva[ह्वाय]°, @deva[वाय]°, @deva[पाय]°. The augment appears in the causative paradigm: @deva[निशाययति], @deva[आच्छाययति], @deva[आसाययति], @deva[आह्वाययति], @deva[वाययति], @deva[पाययति]. This distinguishes their causatives from other formations.
"""

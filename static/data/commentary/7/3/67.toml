id = "7.3.67"
numericId = "73067"

[en]
simple = """
The root @deva[वच्] keeps its @deva[च्] before @deva[ण्यत्] when not meaning 'word/speech'. @deva[वाच्यम्] @deva[आह] (criticizes) vs. @deva[वाक्यम्] @deva[आह] (says a sentence).
"""

standard = """
@deva[वच्] + @deva[ण्यत्] → no @deva[कुत्व] when not @deva[शब्द] (word) meaning. @deva[वाच्यम्] @deva[आह] 'says what is blameworthy' (criticism sense). But @deva[अवघुषितं] @deva[वाक्यम्] @deva[आह] 'says the proclaimed sentence' (speech meaning) has guttural.
"""

advanced = """
@deva[अशब्द] (non-word/speech) sense of @deva[वच्] blocks @deva[कुत्व] before @deva[ण्यत्]. @deva[वाच्यम्] in criticism/blame sense retains @deva[च्]. @deva[वाक्यम्] in 'sentence/utterance' sense takes the guttural. The semantic split: non-speech derivatives preserve palatal; speech derivatives take guttural.
"""

id = "7.4.19"
numericId = "74019"

[en]
simple = """
The root @deva[पत्] 'to fall' adds @deva[प्] augment after its vowel in @deva[अङ्]-aorist. @deva[अपप्तत्].
"""

standard = """
@deva[पत्] + @deva[अङ्] → @deva[प्]-@deva[आगम] after @deva[अ]. @deva[पत्] → @deva[पप्त्] → @deva[अपप्तत्] 'fell'. The augment creates gemination of @deva[प्], distinctive to this root's aorist.
"""

advanced = """
@deva[प्]-@deva[आगम] for @deva[पत्] in @deva[अङ्]-aorist: the augment inserts after the root-vowel, creating @deva[पप्त्] stem. @deva[अपप्तत्], @deva[अपप्तताम्], @deva[अपप्तन्] show the doubled @deva[प्]. This irregular augmentation marks @deva[पत्]'s aorist distinctively.
"""

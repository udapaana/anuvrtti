id = "7.4.82"
numericId = "74082"

[en]
simple = """
In intensive (@deva[यङ्], expressed or elided), reduplicant @deva[इ]/@deva[ई] and @deva[उ]/@deva[ऊ] take @deva[गुण]. @deva[चेचीयते], @deva[बोभूयते].
"""

standard = """
@deva[यङ्] (intensive) @deva[अभ्यास]-@deva[इक्] (@deva[इ]/@deva[ई]/@deva[उ]/@deva[ऊ]) → @deva[गुण]. @deva[चि] → @deva[चेचीयते] 'gathers repeatedly', @deva[भू] → @deva[बोभूयते] 'becomes repeatedly'. Strengthening in intensive reduplicant.
"""

advanced = """
@deva[यङ्]-triggered @deva[गुण] for @deva[अभ्यास]-@deva[इ]/@deva[ई]/@deva[उ]/@deva[ऊ] (whether @deva[यङ्] expressed or elided). @deva[चेचीयते], @deva[चेकीयते] (@deva[चि]); @deva[बोभूयते], @deva[बोभवीति] (@deva[भू]). @deva[इ]→@deva[ए], @deva[उ]→@deva[ओ] in reduplicant creates intensive stems.
"""

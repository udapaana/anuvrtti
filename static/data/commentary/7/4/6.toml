id = "7.4.6"
numericId = "74006"

[en]
simple = """
For @deva[घ्रा] 'to smell' in causative aorist, the penultimate optionally becomes @deva[इ]. @deva[अजिघ्रिपत्] or @deva[अजिघ्रपत्].
"""

standard = """
@deva[घ्रा] + @deva[णि] + @deva[चङ्] → optional @deva[उपधा]→@deva[इ]. @deva[घ्रापय]° → @deva[जिघ्रिप]° or @deva[जिघ्रप]° (with shortening). @deva[अजिघ्रिपत्] or @deva[अजिघ्रपत्] both valid. @deva[विभाषा] allows two forms.
"""

advanced = """
@deva[विभाषा] for @deva[घ्रा]-causative @deva[उपधा] in @deva[चङ्]: either @deva[इ]-@deva[आदेश] (@deva[अजिघ्रिपत्]) or regular @deva[ह्रस्व] (@deva[अजिघ्रपत्]). This parallels @deva[स्था] (@ref[7.4.5]) but with optionality. Both forms are correct causative aorists.
"""

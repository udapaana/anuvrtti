id = "7.4.62"
numericId = "74062"

[en]
simple = """
Gutturals and @deva[ह्] in the reduplicant become palatals. @deva[चकार] (from @deva[कृ]), @deva[जगाम] (from @deva[गम्]), @deva[जहार] (from @deva[हृ]).
"""

standard = """
@deva[अभ्यास]-@deva[कवर्ग]/@deva[ह्] → @deva[चवर्ग]. @deva[कृ] → @deva[चकार] 'did', @deva[गम्] → @deva[जगाम] 'went', @deva[हन्] → @deva[जघान] 'killed', @deva[हृ] → @deva[जहार] 'carried'. Gutturals and @deva[ह्] shift to corresponding palatals.
"""

advanced = """
@deva[चुत्व] for @deva[अभ्यास]: @deva[क]→@deva[च], @deva[ख]→@deva[छ], @deva[ग]→@deva[ज], @deva[घ]→@deva[झ], @deva[ह]→@deva[ज]. @deva[चकार] (@deva[कृ]), @deva[जगाम] (@deva[गम्]), @deva[जघान] (@deva[हन्]), @deva[जहार] (@deva[हृ]), @deva[जिहीर्षति] (@deva[हृ]-desid.). This palatal substitution is regular in reduplication.
"""

id = "7.4.45"
numericId = "74045"

[en]
simple = """
Five Vedic forms are irregularly formed: @deva[सुधित], @deva[वसुधित], @deva[नेमधित], @deva[धिष्व], and @deva[धिषीय].
"""

standard = """
Vedic irregulars from @deva[धा]: @deva[सुधित] 'well-placed', @deva[वसुधित] 'wealth-placed', @deva[नेमधित] 'half-placed', @deva[धिष्व] (imperative), @deva[धिषीय] (optative). These show Vedic @deva[धि]-stem.
"""

advanced = """
@deva[निपातन] for Vedic @deva[धा]-derivatives: @deva[सुधित], @deva[वसुधित], @deva[नेमधित] as compounds with @deva[धित]; @deva[धिष्व] (2sg imperative), @deva[धिषीय] (1sg optative). These irregular formations preserve archaic Vedic morphology not derivable by classical rules.
"""

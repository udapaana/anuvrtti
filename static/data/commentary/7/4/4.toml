id = "7.4.4"
numericId = "74004"

[en]
simple = """
For @deva[पा] 'to drink' in causative aorist, the penultimate vowel is deleted and the reduplicant gets long @deva[ई]. @deva[अपीपयत्].
"""

standard = """
@deva[पा] + @deva[णि] + @deva[चङ्] → @deva[उपधा]-@deva[लोप] + @deva[अभ्यास]-@deva[ई]. @deva[पाय]° → @deva[अपीपयत्] (not *@deva[अपापयत्]). The vowel deletes entirely, and reduplicant @deva[इ]→@deva[ई]. Special treatment for @deva[पा]-causative aorist.
"""

advanced = """
@deva[पा]-causative @deva[चङ्]: two operations—(1) @deva[उपधा]-@deva[लोप] (@deva[आ] deleted), (2) @deva[अभ्यास]-@deva[दीर्घ] (@deva[इ]→@deva[ई]). @deva[अपीपयत्], @deva[अपीपयताम्], @deva[अपीपयन्] demonstrate. This creates a distinctive form where shortening becomes deletion plus compensatory lengthening in the reduplicant.
"""

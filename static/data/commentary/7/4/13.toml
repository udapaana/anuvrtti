id = "7.4.13"
numericId = "74013"

[en]
simple = """
Before the affix @deva[क], preceding @deva[आ], @deva[ई], and @deva[ऊ] are shortened. @deva[ज्ञका] (from @deva[ज्ञा]), @deva[कुमारिका] (from @deva[कुमारी]).
"""

standard = """
@deva[अण्] (@deva[आ]/@deva[ई]/@deva[ऊ]) + @deva[क] → @deva[ह्रस्व]. @deva[ज्ञा] + @deva[क] → @deva[ज्ञका], @deva[कुमारी] + @deva[क] → @deva[कुमारिका], @deva[ब्रह्मबन्धू] + @deva[क] → @deva[ब्रह्मबन्धुका]. Long vowels shorten before @deva[क]-affix.
"""

advanced = """
@deva[ह्रस्व] for @deva[अण्] (@deva[आ], @deva[ई], @deva[ऊ]) before @deva[क]. @deva[ज्ञका] (@deva[ज्ञा]→@deva[ज्ञ]), @deva[कुमारिका] (@deva[ई]→@deva[इ]), @deva[किशोरिका], @deva[ब्रह्मबन्धुका] (@deva[ऊ]→@deva[उ]). This phonological shortening applies systematically before the diminutive/qualifying @deva[क]-affix.
"""

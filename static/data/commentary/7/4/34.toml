[en]
simple = """
The denominatives @deva[अशनाय] 'to be hungry', @deva[उदन्य] 'to be thirsty', and @deva[धनाय] 'to be greedy' are irregularly formed.
"""

standard = """
Irregular denominatives: @deva[अशनायति] 'is hungry' (from @deva[अशन] 'food'), @deva[उदन्यति] 'is thirsty' (from @deva[उदन्] 'water'), @deva[धनायति] 'is greedy' (from @deva[धन] 'wealth'). These don't follow regular @deva[क्यच्] patterns.
"""

advanced = """
@deva[निपातन] (irregular listing): @deva[अशनाय], @deva[उदन्य], @deva[धनाय] as denominative stems. @deva[अशनायति] (hunger), @deva[उदन्यति] (thirst), @deva[धनायति] (greed for wealth). The -@deva[आय]/-@deva[य] formations are irregular, not derivable by standard @deva[क्यच्] rules.
"""

id = "7.4.90"
numericId = "74090"

[en]
simple = """
In intensive, roots with penultimate @deva[ऋ] add @deva[री] to their reduplicant. @deva[वरीवृत्यते] (from @deva[वृत्]).
"""

standard = """
@deva[ऋ]-@deva[उपधा] @deva[धातु] + @deva[यङ्] → @deva[री]-@deva[आगम] to @deva[अभ्यास]. @deva[वृत्] → @deva[वरीवृत्यते] 'turns repeatedly', @deva[तृप्] → @deva[तरीतृप्यते] 'is satisfied repeatedly'. The @deva[री] extends the reduplicant.
"""

advanced = """
@deva[री]-@deva[आगम] for @deva[यङ्]/@deva[यङ्लुक्] @deva[अभ्यास] when root has @deva[ऋ] at @deva[उपधा] (penultimate). @deva[वरीवृत्यते]/@deva[वरीवृतीति] (@deva[वृत्]), @deva[तरीतृप्यते]/@deva[तरीतृपीति] (@deva[तृप्]), @deva[चरीकृष्यते] (@deva[कृष्]). The @deva[री] creates characteristic intensive reduplicants for @deva[ऋ]-penultimate roots.
"""

id = "7.4.7"
numericId = "74007"

[en]
simple = """
For causatives with @deva[ऋ]/@deva[ॠ] penultimate, short @deva[ऋ] is optionally substituted in reduplicated aorist. @deva[अचीचरत्] or @deva[अचीचृतत्].
"""

standard = """
@deva[ऋ]/@deva[ॠ]-@deva[उपधा] @deva[णिजन्त] + @deva[चङ्] → optional @deva[ऋ]-@deva[आदेश]. @deva[कृ]-caus.: @deva[अचीचरत्] (with @deva[अर्]) or @deva[अचीचृतत्] (with @deva[ऋ]). This debars the regular @deva[इर्]/@deva[अर्] treatment, allowing @deva[ऋ] to remain.
"""

advanced = """
@deva[विभाषा] for @deva[ऋ]/@deva[ॠ]-@deva[उपधा] in @deva[णिजन्त]-@deva[चङ्]: either @deva[ह्रस्व]-@deva[ऋ] or @deva[अर्]/@deva[इर्] per @ref[7.3.101]. @deva[अचीचृतत्] (@deva[ऋ] retained) vs. @deva[अचीचरत्] (@deva[अर्] substitution). This creates parallel causative aorist paradigms for @deva[ऋ]-penultimate causatives.
"""

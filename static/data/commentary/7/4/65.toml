@deva[निपातन] for 18 Vedic reduplicated forms: @deva[दाधर्ति] (@deva[धृ]), @deva[दर्धर्ति], @deva[दर्धर्षि], @deva[बोभूतु] (@deva[भू]), @deva[तेतिक्ते] (@deva[तिज्]), @deva[अलर्षि], etc. These preserve archaic or dialectal Vedic patterns not derivable by classical rules.

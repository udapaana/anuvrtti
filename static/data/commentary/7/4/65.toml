Vedic irregular reduplications listed: @deva[दाधर्ति], @deva[दर्धर्ति], @deva[दर्धर्षि], @deva[बोभूतु], @deva[तेतिक्ते], @deva[अलर्षि], etc. These forms don't follow standard reduplication rules.

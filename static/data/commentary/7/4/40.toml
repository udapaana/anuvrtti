id = "7.4.40"
numericId = "74040"

[en]
simple = """
The roots @deva[दो], @deva[सो], @deva[मा], and @deva[स्था] substitute @deva[इ] for their final before @deva[कित्] affixes beginning with @deva[त्]. @deva[निर्दितः], @deva[सितः].
"""

standard = """
@deva[दो]/@deva[सो]/@deva[मा]/@deva[स्था] + @deva[कित्] @deva[त्]-@deva[आदि] → @deva[इ]-@deva[आदेश]. @deva[दो] + @deva[क्त] → @deva[दितः] 'cut', @deva[सो] + @deva[क्त] → @deva[सितः] 'bound', @deva[मा] + @deva[क्त] → @deva[मितः] 'measured', @deva[स्था] + @deva[क्त] → @deva[स्थितः] 'stood'.
"""

advanced = """
@deva[इ]-@deva[आदेश] for @deva[दो]/@deva[सो]/@deva[मा]/@deva[स्था] before @deva[कित्] @deva[त्]-initial affixes. @deva[निर्दितः] (@deva[दो]), @deva[सितः] (@deva[सो]), @deva[मितः] (@deva[मा]), @deva[स्थितः] (@deva[स्था]). The @deva[आ]/@deva[ओ]→@deva[इ] substitution creates these past participle stems. Also applies to @deva[क्त्वा]: @deva[दित्वा], @deva[सित्वा], etc.
"""

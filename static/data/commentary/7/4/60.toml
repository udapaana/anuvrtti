id = "7.4.60"
numericId = "74060"

[en]
simple = """
In the reduplicant, only the first consonant is kept; the rest are dropped. @deva[पपाच] (from @deva[पच्]), @deva[मम्लौ] (from @deva[म्लै]).
"""

standard = """
@deva[अभ्यास]: only first consonant retained. @deva[पच्] → @deva[पपाच] 'cooked' (@deva[प्] only), @deva[म्लै] → @deva[मम्लौ] 'wilted' (@deva[म्] only). Conjuncts in reduplicant reduce to single consonant.
"""

advanced = """
@deva[अभ्यास]: @deva[आदि]-@deva[व्यञ्जन] retained, @deva[शेष]-@deva[लोप]. @deva[पपाच] (@deva[पच्]), @deva[ममौ] (@deva[मा]), @deva[जग्लौ] (@deva[ग्लै]), @deva[मम्लौ] (@deva[म्लै]). Conjunct-initial roots reduce: @deva[ग्ल]→@deva[ग्], @deva[म्ल]→@deva[म्]. This creates the characteristic light reduplicant structure.
"""

id = "7.4.43"
numericId = "74043"

[en]
simple = """
@deva[हा] (@deva[जहाति]) 'to abandon' optionally becomes @deva[हि] before @deva[क्त्वा]. @deva[हित्वा] or @deva[हात्वा] 'having abandoned'.
"""

standard = """
@deva[हा] + @deva[क्त्वा] → optional @deva[हि]-@deva[आदेश]. @deva[हित्वा] @deva[राज्यं] @deva[वनं] @deva[गतः] 'having abandoned the kingdom, went to forest'. Both @deva[हित्वा] and @deva[हात्वा] valid gerunds.
"""

advanced = """
@deva[विभाषा] for @deva[हा] → @deva[हि] before @deva[क्त्वा] specifically. @deva[हित्वा] (with @deva[हि]) more common; @deva[हात्वा] (without substitution) also valid. This optionality applies only to @deva[क्त्वा], not other @deva[कित्] @deva[त्]-initials for this root.
"""

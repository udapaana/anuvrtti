id = "7.4.84"
numericId = "74084"

[en]
simple = """
In intensive, @deva[वञ्च्], @deva[सृ], @deva[ध्वंस्], @deva[भ्रंश्], etc. add @deva[नीक्] augment to their reduplicant. @deva[वनीवंच्यते], @deva[सनीसृप्यते].
"""

standard = """
Listed roots + @deva[यङ्] → @deva[नीक्]-@deva[आगम] to @deva[अभ्यास]. @deva[वञ्च्] → @deva[वनीवंच्यते], @deva[सृ] → @deva[सनीसृप्यते], @deva[ध्वंस्] → @deva[दनीध्वंस्यते]. The @deva[नी]-augment extends the reduplicant.
"""

advanced = """
@deva[नीक्] (@deva[नी]-@deva[आगम]) for intensive @deva[अभ्यास] of @deva[वञ्च्]/@deva[सृ]/@deva[ध्वंस्]/@deva[भ्रंश्]/@deva[कस्]/@deva[पत्]/@deva[पद्]/@deva[स्कन्द्]. @deva[वनीवंच्यते], @deva[सनीसृप्यते], @deva[दनीध्वंस्यते], etc. The @deva[नी] extends the reduplicant, creating distinctive intensive stems.
"""

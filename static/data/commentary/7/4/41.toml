id = "7.4.41"
numericId = "74041"

[en]
simple = """
@deva[शा] (@deva[शो]) and @deva[छा] (@deva[छो]) optionally take @deva[इ] before @deva[कित्] @deva[त्]-initial affixes. @deva[शितः] or @deva[शातः], @deva[छितः] or @deva[छातः].
"""

standard = """
@deva[शा]/@deva[छा] + @deva[कित्] @deva[त्]-@deva[आदि] → optional @deva[इ]-@deva[आदेश]. @deva[शो] + @deva[क्त] → @deva[शितः] or @deva[शातः], @deva[छो] + @deva[क्त] → @deva[छितः] or @deva[छातः]. @deva[विभाषा] creates both forms.
"""

advanced = """
@deva[विभाषा] for @deva[शा] (@deva[शो])/@deva[छा] (@deva[छो]) before @deva[कित्] @deva[त्]-initial: optional @deva[इ]-@deva[आदेश]. @deva[शितः]/@deva[शातः], @deva[छितः]/@deva[छातः] both valid. This extends @ref[7.4.40]'s pattern with optionality for these two roots.
"""

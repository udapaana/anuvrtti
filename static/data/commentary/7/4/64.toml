id = "7.4.64"
numericId = "74064"

[en]
simple = """
In Vedic intensive of @deva[कृष्] 'to draw', the guttural reduplicant is not replaced by palatal. @deva[करीकृष्यते] (Vedic).
"""

standard = """
Vedic @deva[कृष्] (intensive) → no @deva[चुत्व]. @deva[करीकृष्यते] @deva[यज्ञकुणपः]. Otherwise (classical): @deva[चरीकृष्यते] with palatal. @deva[छन्दस्] preserves guttural.
"""

advanced = """
@deva[छान्दस] exception to @ref[7.4.62]: @deva[कृष्] in @deva[यङ्] keeps @deva[क्] in Vedic. @deva[करीकृष्यते] is Vedic form; @deva[चरीकृष्यते] is classical with @deva[चुत्व]. The Vedic tradition preserves archaic reduplication without palatal shift.
"""

id = "7.4.94"
numericId = "74094"

[en]
simple = """
In causative reduplicated aorist, the prosodially short vowel of the reduplicant is lengthened. @deva[अचीकरत्] (long @deva[ई] in reduplicant).
"""

standard = """
@deva[णिजन्त] + @deva[चङ्] → @deva[अभ्यास]-@deva[ह्रस्व] → @deva[दीर्घ] (when root has @deva[लघु]-@deva[स्वर], @deva[अनन्त्यलोप]). @deva[अचीकरत्] 'caused to do' shows @deva[ई] (lengthened from @deva[इ]). The reduplicant vowel extends.
"""

advanced = """
@deva[दीर्घन] for @deva[चङ्]-@deva[अभ्यास] @deva[ह्रस्व] when conditions of @ref[7.4.93] met. @deva[अचीकरत्] (@deva[इ]→@deva[ई]), @deva[अपीपचत्] (@deva[इ]→@deva[ई]), @deva[अबीभवत्] (@deva[इ]→@deva[ई]). The lengthening operates on the already-formed desiderative-type reduplicant, creating characteristic causative aorist stems.
"""

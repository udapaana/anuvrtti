id = "7.4.16"
numericId = "74016"

[en]
simple = """
Roots ending in @deva[ऋ]/@deva[ॠ] and @deva[दृश्] 'to see' take @deva[गुण] before the aorist affix @deva[अङ्]. @deva[अकरत्], @deva[अदर्शत्].
"""

standard = """
@deva[ऋकारान्त]/@deva[ॠकारान्त]/@deva[दृश्] + @deva[अङ्] (aorist) → @deva[गुण]. @deva[कृ] → @deva[अकरत्] 'did', @deva[दृश्] → @deva[अदर्शत्] 'saw'. The vowel strengthens before this aorist marker.
"""

advanced = """
@deva[अङ्]-aorist @deva[गुण] for @deva[ऋ]/@deva[ॠ]-finals and @deva[दृश्]. @deva[कृ]: @deva[अकरत्], @deva[अकरताम्], @deva[अकरन्]; @deva[दृश्]: @deva[अदर्शत्], @deva[अदर्शताम्], @deva[अदर्शन्]. The @deva[गुण] (@deva[ऋ]→@deva[अर्], @deva[ऋश्]→@deva[अर्श्]) creates characteristic @deva[अङ्]-aorist forms for these roots.
"""

id = "7.4.25"
numericId = "74025"

[en]
simple = """
Before @deva[कित्]/@deva[ङित्] @deva[य्]-initial affixes (not @deva[कृत्] or @deva[सार्वधातुक]), stem-final vowels lengthen. @deva[चिक्रीयते] (intensive).
"""

standard = """
@deva[अङ्ग]-final vowel + @deva[कित्]/@deva[ङित्] @deva[य्]-@deva[आदि] (@deva[अ]-@deva[कृत्], @deva[अ]-@deva[सार्वधातुक]) → @deva[दीर्घ]. Intensive: @deva[चिक्रीयते] (@deva[कृ] + @deva[यङ्]). The vowel lengthens before these specific affixes.
"""

advanced = """
@deva[दीर्घ] for @deva[अङ्ग]-finals before @deva[कित्]/@deva[ङित्] @deva[य्]-initial non-@deva[कृत्], non-@deva[सार्वधातुक]. @deva[चिक्रीयते], @deva[बोभूयते] (intensive @deva[यङ्]) show lengthening. The affix-class restriction (@deva[अ]-@deva[कृत्], @deva[अ]-@deva[सार्वधातुक]) limits where this @deva[दीर्घ] applies.
"""

id = "7.4.36"
numericId = "74036"

[en]
simple = """
In Vedic, @deva[दुरस्यु], @deva[द्रविणस्यु], @deva[वृषण्यति], and @deva[रिषण्यति] are irregularly formed denominatives.
"""

standard = """
Vedic irregular denominatives: @deva[दुरस्युः] 'hates' (@deva[दुरस्यति]), @deva[द्रविणस्युः] 'desires wealth', @deva[वृषण्यति] 'acts like a bull', @deva[रिषण्यति] 'injures'. These show Vedic morphology.
"""

advanced = """
@deva[छान्दस] @deva[निपातन]: @deva[दुरस्यु] (from @deva[दुर्]), @deva[द्रविणस्यु] (from @deva[द्रविण]), @deva[वृषण्यति] (from @deva[वृषन्]), @deva[रिषण्यति] (from @deva[रिष्]). The @deva[स्यु]/@deva[अण्य] suffixes are Vedic-specific denominative formations not found in classical Sanskrit.
"""

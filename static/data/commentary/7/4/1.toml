id = "7.4.1"
numericId = "74001"

[en]
simple = """
The penultimate vowel of a causative stem is shortened before the reduplicated aorist marker @deva[चङ्]. @deva[अबीभवत्] (from @deva[भू]-causative).
"""

standard = """
@deva[णिजन्त] (causative) @deva[उपधा] + @deva[चङ्] (reduplicated aorist) → @deva[ह्रस्व]. @deva[भावयति] → @deva[अबीभवत्] 'caused to become'. The long penultimate vowel shortens in this aorist formation.
"""

advanced = """
@deva[उपधा]-@deva[ह्रस्व] for @deva[णिजन्त] before @deva[चङ्]. @deva[भावय]° → @deva[बीभव]° (@deva[आ]→@deva[अ]), @deva[पातय]° → @deva[पीपत]° (@deva[आ]→@deva[अ]). The reduplicated causative aorist systematically shortens the causative stem's penultimate vowel. This creates characteristic @deva[चङ्]-aorist forms.
"""

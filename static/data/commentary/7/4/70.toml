id = "7.4.70"
numericId = "74070"

[en]
simple = """
The initial @deva[अ] of the reduplicant lengthens in the perfect. @deva[आस] 'sat' (from @deva[अस्]), @deva[आह] 'said' (from @deva[अह्]).
"""

standard = """
@deva[अभ्यास]-@deva[आदि]-@deva[अ] → @deva[आ] in @deva[लिट्]. @deva[अस्] → @deva[आस] 'sat', @deva[अह्] → @deva[आह] 'said'. This debars the expected @deva[अ]+@deva[अ]→@deva[आ] sandhi substitute (@ref[6.1.97]).
"""

advanced = """
@deva[लिट्] @deva[दीर्घ] for @deva[आदि]-@deva[अ] of @deva[अभ्यास]. @deva[आस] (@deva[अस्]), @deva[आह] (@deva[अह्]), @deva[आन] (@deva[अन्]) demonstrate. The lengthening is not sandhi but a morphological operation specific to perfect reduplication of @deva[अ]-initial roots.
"""

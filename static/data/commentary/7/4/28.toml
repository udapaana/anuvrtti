id = "7.4.28"
numericId = "74028"

[en]
simple = """
Final short @deva[ऋ] becomes @deva[रि] before present @deva[अ] (@deva[श]), passive @deva[य्], and benedictive @deva[यास्]. @deva[क्रियते], @deva[क्रियात्].
"""

standard = """
@deva[ह्रस्व]-@deva[ऋ]-@deva[अन्त] @deva[धातु] + @deva[श] (present)/@deva[य्] (passive)/@deva[यास्] (benedictive) → @deva[रि]-@deva[आदेश]. @deva[कृ] → @deva[क्रियते] (passive), @deva[क्रियात्] (benedictive). The @deva[ऋ]→@deva[रि] creates these forms.
"""

advanced = """
@deva[रि]-@deva[आदेश] for @deva[ह्रस्व]-@deva[ऋ]-final roots before: @deva[श] (present @[vikaraṇa]), @deva[य्] (passive), @deva[यास्] (benedictive). @deva[क्रियते], @deva[क्रियात्]; @deva[स्त्रियते]; @deva[ह्रियात्] demonstrate. This covers three specific morphological contexts for the @deva[ऋ]→@deva[रि] change.
"""

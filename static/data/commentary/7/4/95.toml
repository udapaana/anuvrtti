id = "7.4.95"
numericId = "74095"

[en]
simple = """
For @deva[स्मृ], @deva[दॄ], @deva[त्वर], @deva[प्रथ], @deva[म्रद], @deva[स्तॄ], and @deva[स्पश्] in causative aorist, the reduplicant vowel becomes @deva[अ]. @deva[असस्मरत्], @deva[अतत्वरत्].
"""

standard = """
Listed roots + @deva[णि] + @deva[चङ्] → @deva[अभ्यास]-vowel→@deva[अ]. @deva[स्मृ] → @deva[असस्मरत्] (not @deva[अससमृरत्]), @deva[त्वर] → @deva[अतत्वरत्], @deva[प्रथ] → @deva[अपप्रथत्]. Short @deva[अ] in reduplicant for these roots.
"""

advanced = """
@deva[अ]-@deva[आदेश] for @deva[चङ्]-@deva[अभ्यास] of @deva[स्मृ]/@deva[दॄ]/@deva[त्वर]/@deva[प्रथ]/@deva[म्रद]/@deva[स्तॄ]/@deva[स्पश्]. @deva[असस्मरत्], @deva[अददरत्], @deva[अतत्वरत्], @deva[अपप्रथत्], @deva[अममृदत्], @deva[अतस्तरत्], @deva[अपस्पशत्]. These specific roots take @deva[अ] instead of expected @deva[इ]/@deva[ई] in causative aorist reduplicant.
"""

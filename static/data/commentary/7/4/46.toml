id = "7.4.46"
numericId = "74046"

[en]
simple = """
The @deva[घु]-root @deva[दा] 'to give' becomes @deva[दद्] before @deva[कित्] affixes beginning with @deva[त्]. @deva[दत्तः] 'given', @deva[दत्तवान्].
"""

standard = """
@deva[घु]-@deva[दा] + @deva[कित्] @deva[त्]-@deva[आदि] → @deva[दद्]-@deva[आदेश]. @deva[दा] + @deva[क्त] → @deva[दत्तः], @deva[दा] + @deva[क्त्वा] → @deva[दत्त्वा]. The @deva[दा]→@deva[दद्] substitution before these affixes.
"""

advanced = """
@deva[दद्]-@deva[आदेश] for @deva[घु]-classified @deva[दा] (per @ref[1.1.20]) before @deva[कित्] @deva[त्]-initial. @deva[दत्तः], @deva[दत्तवान्], @deva[दत्त्वा] show the pattern. The doubling of @deva[द्] creates the characteristic past participle and gerund forms.
"""

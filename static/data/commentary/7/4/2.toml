id = "7.4.2"
numericId = "74002"

[en]
simple = """
The shortening doesn't apply to denominative stems that have lost a simple ending. @deva[शण्ड्यमानयत्] keeps its vowel.
"""

standard = """
@deva[लुप्त]-@deva[प्रत्यय] @deva[नामधातु] + @deva[चङ्] → no @deva[उपधा]-@deva[ह्रस्व]. When a denominative has lost its ending, the shortening of @ref[7.4.1] doesn't apply. These forms preserve their vowel length.
"""

advanced = """
Exception to @ref[7.4.1]: denominatives (@deva[नामधातु]) with elided (@deva[लुप्त]) simple endings resist @deva[उपधा]-shortening before @deva[चङ्]. The derivational history matters: the lost affix blocks the regular @deva[ह्रस्व] operation. Such stems conjugate in reduplicated aorist without shortening.
"""

id = "7.4.42"
numericId = "74042"

[en]
simple = """
@deva[धा] (@deva[दधाति]) optionally becomes @deva[हि] before @deva[कित्] @deva[त्]-initial affixes. @deva[हितः] 'placed', @deva[हितवत्], @deva[हित्वा].
"""

standard = """
@deva[धा] + @deva[कित्] @deva[त्]-@deva[आदि] → optional @deva[हि]-@deva[आदेश]. @deva[धा] → @deva[हितः] or @deva[धातः] (with @deva[हित]- more common), @deva[हितवत्], @deva[हित्वा]. The @deva[धा]→@deva[हि] substitution is traditional.
"""

advanced = """
@deva[विभाषा] for @deva[धा] → @deva[हि] before @deva[कित्] @deva[त्]-initial. @deva[हितः], @deva[हितवत्], @deva[हित्वा] show @deva[हि]-substitution. The transformation @deva[धा]→@deva[हि] creates the common @deva[हित]- stem. Both forms technically valid, but @deva[हित]- predominates in usage.
"""

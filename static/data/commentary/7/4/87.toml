id = "7.4.87"
numericId = "74087"

[en]
simple = """
In intensive, @deva[चर्] and @deva[फल्] add @deva[नुक्] after their reduplicant. @deva[चंचूर्यते], @deva[पंफुल्यते].
"""

standard = """
@deva[चर्]/@deva[फल्] + @deva[यङ्] → @deva[नुक्]-@deva[आगम] after @deva[अभ्यास]. @deva[चंचूर्यते] and @deva[चंचूरीति] 'moves repeatedly', @deva[पंफुल्यते] and @deva[पंफुलीति] 'blossoms repeatedly'. Both expressed and elided @deva[यङ्] forms.
"""

advanced = """
@deva[नुक्] for @deva[चर्]/@deva[फल्] intensive @deva[अभ्यास]. @deva[चंचूर्यते] (@deva[यङ्]), @deva[चंचूरीति] (@deva[यङ्लुक्]); @deva[पंफुल्यते], @deva[पंफुलीति]. The lengthening (@deva[ऊ], @deva[उ]) also occurs. These two roots receive special nasal augmentation in intensive.
"""

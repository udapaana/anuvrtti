id = "7.4.97"
numericId = "74097"

[en]
simple = """
For @deva[गण्] in causative aorist, the reduplicant vowel optionally becomes long @deva[ई]. @deva[अजीगणत्] or @deva[अजगणत्].
"""

standard = """
@deva[गण्] + @deva[णि] + @deva[चङ्] → optional @deva[ई]-@deva[आदेश] for @deva[अभ्यास]. @deva[अजीगणत्] (with @deva[ई]) or @deva[अजगणत्] (with @deva[अ]). The @deva[गण्] root allows both long @deva[ई] and short @deva[अ] in reduplicant.
"""

advanced = """
@deva[विभाषा] for @deva[गण्] @deva[चङ्]-@deva[अभ्यास]: @deva[ई] or @deva[अ]. @deva[अजीगणत्] (long @deva[ई]-reduplicant) and @deva[अजगणत्] (short @deva[अ]-reduplicant) both valid. @deva[गण्] ends in @deva[अ] (elided by @ref[6.4.48] before @deva[णि]), creating this optionality in causative aorist formation.
"""

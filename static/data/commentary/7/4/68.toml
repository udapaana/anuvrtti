id = "7.4.68"
numericId = "74068"

[en]
simple = """
In the perfect of @deva[व्यथ्] 'to suffer', the semivowel of the reduplicant vocalizes. @deva[विव्यथे].
"""

standard = """
@deva[व्यथ्] (@deva[लिट्]) @deva[अभ्यास]: @deva[य्]→@deva[इ]. @deva[विव्यथे] 'suffered', @deva[विव्यथाते], @deva[विव्यथिरे]. The @deva[य्] of reduplicant becomes vowel @deva[इ] in perfect.
"""

advanced = """
@deva[लिट्]-specific @deva[सम्प्रसारण] for @deva[व्यथ्] @deva[अभ्यास]. @deva[विव्यथे], @deva[विव्यथाते], @deva[विव्यथिरे] show @deva[इ] (from @deva[य्]). This vocalization is specific to perfect tense; other forms may retain @deva[य्].
"""

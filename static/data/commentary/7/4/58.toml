id = "7.4.58"
numericId = "74058"

[en]
simple = """
Under the conditions of @ref[7.4.54]-57, the reduplicant is dropped. @deva[लिप्सते] (not *@deva[लिलिप्सते]).
"""

standard = """
When @deva[इस्]/@deva[ई] substitution occurs per @ref[7.4.54]-57, @deva[अभ्यास]-@deva[लोप] follows. @deva[लभ्] + @deva[सन्] → @deva[लिप्सते] (no reduplication visible), not *@deva[लिलिप्सते]. The reduplicant elides.
"""

advanced = """
@deva[अभ्यास]-@deva[लोप] follows @deva[इस्]/@deva[ई]-@deva[आदेश] of @ref[7.4.54]-57. @deva[लिप्सते], @deva[ईप्सति], @deva[शिक्षति] show no overt reduplication because it's elided. The @deva[इस्]/@deva[ई] already marks desiderative, making reduplication redundant and thus dropped.
"""

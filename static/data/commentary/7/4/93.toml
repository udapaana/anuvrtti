id = "7.4.93"
numericId = "74093"

[en]
simple = """
In the reduplicated causative aorist (@deva[चङ्]), the reduplicant follows desiderative patterns when the root vowel is light and the root hasn't lost its final. @deva[अचीकरत्].
"""

standard = """
@deva[णिजन्त] + @deva[चङ्] (causative reduplicated aorist): @deva[अभ्यास] follows @deva[सन्]-pattern when root has @deva[लघु] vowel and no @deva[अन्त्यलोप]. @deva[अचीकरत्] 'caused to do' (@deva[कृ]-causative). Desiderative-type reduplication.
"""

advanced = """
@deva[चङ्]-aorist @deva[अभ्यास] = @deva[सन्]-@deva[अभ्यास] when: (1) @deva[लघु]-@deva[स्वर] (light vowel) root, (2) @deva[अनन्त्यलोप] (no final-vowel loss before @deva[णि]). @deva[अचीकरत्] (@deva[कृ]), @deva[अपीपचत्] (@deva[पच्]) show desiderative-like reduplication in causative aorist. Complex conditioning.
"""

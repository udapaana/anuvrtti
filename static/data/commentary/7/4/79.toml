id = "7.4.79"
numericId = "74079"

[en]
simple = """
In the desiderative, the final short @deva[अ] of the reduplicant becomes @deva[इ]. @deva[पिपक्षति] (from @deva[पच्]), @deva[तिष्ठासति] (from @deva[स्था]).
"""

standard = """
@deva[सन्] (desiderative) @deva[अभ्यास]-final-@deva[अ] → @deva[इ]. @deva[पच्] → @deva[पिपक्षति] 'wants to cook', @deva[स्था] → @deva[तिष्ठासति] 'wants to stand'. Short @deva[अ] of reduplicant changes to @deva[इ].
"""

advanced = """
@deva[सन्]-triggered @deva[इ]-@deva[आदेश] for @deva[अभ्यास]-@deva[अन्त्य]-@deva[ह्रस्व]-@deva[अ]. @deva[पिपक्षति] (@deva[पच्]), @deva[यियक्षति] (@deva[यज्]), @deva[तिष्ठासति] (@deva[स्था]), @deva[पिपासति] (@deva[पा]). The final @deva[अ]→@deva[इ] creates characteristic desiderative reduplicants. Long @deva[आ] stays: @deva[जिघांसति].
"""

id = "7.4.89"
numericId = "74089"

[en]
simple = """
For @deva[चर्] and @deva[फल्], the root vowel becomes @deva[उ] before @deva[त्]-initial affixes. @deva[चूर्तिः], @deva[प्रफुल्तिः].
"""

standard = """
@deva[चर्]/@deva[फल्] + @deva[त्]-@deva[आदि] → vowel→@deva[उ]. @deva[चर्] + @deva[ति] → @deva[चूर्तिः] 'movement', @deva[फल्] + @deva[ति] → @deva[प्रफुल्तिः] 'blossoming'. The @deva[अ]→@deva[उ] change before @deva[त्]-affixes.
"""

advanced = """
@deva[उ]-@deva[आदेश] for @deva[चर्]/@deva[फल्] vowel before @deva[त्]-initial affixes. @deva[चूर्तिः] (@deva[चर्] + @deva[ति]), @deva[प्रफुल्तिः] (@deva[फल्] + @deva[ति]), @deva[प्रफुल्तः]. This extends the @deva[उ]-substitution of @ref[7.4.88] to nominal derivatives with @deva[त्]-affixes.
"""

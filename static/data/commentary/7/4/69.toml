id = "7.4.69"
numericId = "74069"

[en]
simple = """
For root @deva[इ] (@deva[एति]), the reduplicant vowel lengthens before @deva[कित्] perfect endings. @deva[ईयतुः], @deva[ईयुः].
"""

standard = """
@deva[इ] + @deva[लिट्] (@deva[कित्] endings) → @deva[अभ्यास]-@deva[दीर्घ]. @deva[ईयतुः] 'they two went', @deva[ईयुः] 'they went'. The short @deva[इ] of reduplicant becomes long @deva[ई].
"""

advanced = """
@deva[कित्]-@deva[लिट्] triggers @deva[दीर्घ] for @deva[इ]'s @deva[अभ्यास]. @deva[ईयतुः], @deva[ईयुः] show long @deva[ई] in reduplicant before @deva[कित्] endings (@deva[तुस्], @deva[उस्]). Non-@deva[कित्] endings (@deva[इयाय] 1sg) may show short vowel.
"""

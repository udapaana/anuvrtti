id = "7.4.55"
numericId = "74055"

[en]
simple = """
The roots @deva[आप्], @deva[ज्ञपि], and @deva[ऋध्] take long @deva[ई] before @deva[स्]-initial desiderative @deva[सन्]. @deva[ईप्सति] 'desires to obtain'.
"""

standard = """
@deva[आप्]/@deva[ज्ञपि]/@deva[ऋध्] + @deva[स्]-@deva[आदि] @deva[सन्] → @deva[ई]-@deva[आदेश]. @deva[आप्] → @deva[ईप्सति], @deva[ज्ञपि] → @deva[जिज्ञापयिषति], @deva[ऋध्] → @deva[ईर्त्सति]. Long @deva[ई] substitutes for root vowel.
"""

advanced = """
@deva[ई]-@deva[आदेश] for @deva[आप्], @deva[ज्ञपि] (causative base), @deva[ऋध्] before @deva[स्]-initial @deva[सन्]. @deva[ईप्सति] (@deva[आप्]), @deva[ईर्त्सति] (@deva[ऋध्]) show the @deva[ई]. The @deva[स्]-initial condition restricts when this long-vowel substitution applies.
"""

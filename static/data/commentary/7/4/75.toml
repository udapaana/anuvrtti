[en]
simple = """
In the reduplicated present (@deva[श्लु]-class) of @deva[निज्], @deva[विज्], and @deva[विष्], the reduplicant takes @deva[गुण]. @deva[नेनेक्ति], @deva[वेवेक्ति], @deva[वेवेष्टि].
"""

standard = """
@deva[निज्]/@deva[विज्]/@deva[विष्] (@deva[श्लु]-present) → @deva[अभ्यास]-@deva[गुण]. @deva[निज्] → @deva[नेनेक्ति] 'washes', @deva[विज्] → @deva[वेवेक्ति] 'separates', @deva[विष्] → @deva[वेवेष्टि] 'serves'. The @deva[इ]→@deva[ए] in reduplicant.
"""

advanced = """
@deva[श्लु]-@deva[विकरण] @deva[गुण] for @deva[निज्]/@deva[विज्]/@deva[विष्] @deva[अभ्यास]. @deva[नेनेक्ति], @deva[वेवेक्ति], @deva[वेवेष्टि] show @deva[ए] in reduplicant. The 3rd-class (reduplicated present) formation strengthens these roots' reduplicants specifically.
"""

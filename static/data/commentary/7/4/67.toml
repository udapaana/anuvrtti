id = "7.4.67"
numericId = "74067"

[en]
simple = """
In reduplication of @deva[द्युत्] and causative @deva[स्वापि], the semivowel vocalizes. @deva[विद्युतत्], @deva[सुष्वाप].
"""

standard = """
@deva[द्युत्]/@deva[स्वापि] (@deva[स्वप्]-causative) @deva[अभ्यास]: semivowel → vowel. @deva[द्युत्] → @deva[विद्युतत्] (@deva[य्]→@deva[इ]), @deva[स्वापि] → @deva[सुष्वाप] (@deva[व्]→@deva[उ]). The @deva[य्]/@deva[व्] of reduplicant becomes @deva[इ]/@deva[उ].
"""

advanced = """
@deva[सम्प्रसारण] for @deva[अभ्यास] of @deva[द्युत्]/@deva[स्वापि]. @deva[विद्युतत्] (@deva[द्युत्]), @deva[विद्योतिषते] (desid.); @deva[सुष्वाप], @deva[सुष्वापयिषति] (@deva[स्वप्]-causative). The semivowel-vocalization creates these forms.
"""

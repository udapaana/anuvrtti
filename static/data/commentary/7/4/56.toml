id = "7.4.56"
numericId = "74056"

[en]
simple = """
The root @deva[दम्भ्] takes either @deva[इ] or @deva[ई] before @deva[स्]-initial desiderative @deva[सन्]. @deva[धिप्सति] or @deva[धीप्सति].
"""

standard = """
@deva[दम्भ्] + @deva[स्]-@deva[आदि] @deva[सन्] → @deva[इ] or @deva[ई]-@deva[आदेश] (optional). @deva[धिप्सति] or @deva[धीप्सति] 'desires to deceive'. @deva[विभाषा] allows both vowel lengths.
"""

advanced = """
@deva[विभाषा] for @deva[दम्भ्] before @deva[स्]-initial @deva[सन्]: either @deva[इ] or @deva[ई]. @deva[धिप्सति] (short) and @deva[धीप्सति] (long) both valid desideratives. This optionality contrasts with @ref[7.4.55]'s obligatory @deva[ई] for other roots.
"""

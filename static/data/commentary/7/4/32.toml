id = "7.4.32"
numericId = "74032"

[en]
simple = """
Before the adverbial affix @deva[च्वि], final @deva[अ] or @deva[आ] of nominal stems becomes @deva[ई]. @deva[शुक्लीभवति] 'becomes white'.
"""

standard = """
@deva[अ]/@deva[आ]-@deva[अन्त] @deva[प्रातिपदिक] + @deva[च्वि] → @deva[ई]-@deva[आदेश]. @deva[शुक्ल] → @deva[शुक्लीभवति], @deva[कृष्ण] → @deva[कृष्णीकरोति]. The final vowel becomes @deva[ई] in this adverbial formation.
"""

advanced = """
@deva[च्वि]-triggered @deva[ई]-@deva[आदेश] for @deva[अ]/@deva[आ]-finals. @deva[शुक्लीभवति], @deva[कृष्णीकरोति], @deva[नीलीभूत] demonstrate. The @deva[च्वि] formation (@deva[अभूततद्भावे]) expresses 'becoming X' with @deva[भू]/@deva[कृ]/@deva[अस्], using this @deva[ई]-ending stem.
"""

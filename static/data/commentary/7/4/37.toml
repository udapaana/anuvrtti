id = "7.4.37"
numericId = "74037"

[en]
simple = """
In Vedic, @deva[अश्व] and @deva[अघ] take @deva[आ] before denominative @deva[क्यच्]. @deva[अश्वायन्तो], @deva[अघायति].
"""

standard = """
Vedic: @deva[अश्व]/@deva[अघ] + @deva[क्यच्] → @deva[आ]-@deva[आदेश] (not @deva[ई]). @deva[अश्वायन्तो] (@[ṛg] VII.32.23) 'desiring horses', @deva[अघायति] 'wishes evil'. Vedic uses @deva[आ] instead of classical @deva[ई].
"""

advanced = """
@deva[छान्दस] @deva[आ]-@deva[आदेश] for @deva[अश्व]/@deva[अघ] before @deva[क्यच्]. @deva[अश्वायन्तो] @deva[मघवन्] (@[ṛgveda]), @deva[अघायति] demonstrate Vedic denominative with @deva[आ]. This contrasts with classical @deva[अश्वीयति], @deva[अघीयति] (if formed).
"""

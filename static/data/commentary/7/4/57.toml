id = "7.4.57"
numericId = "74057"

[en]
simple = """
For intransitive @deva[मुच्], @deva[गुण] of the vowel is optional before @deva[अनिट्] desiderative @deva[सन्]. @deva[मोक्षते] or @deva[मुक्षते].
"""

standard = """
@deva[अकर्मक] @deva[मुच्] + @deva[अनिट्] @deva[सन्] → optional @deva[गुण]. @deva[मोक्षते] 'desires to be freed' or @deva[मुक्षते]. The intransitive meaning conditions this optionality.
"""

advanced = """
@deva[विभाषा] @deva[गुण] for @deva[अकर्मक] (intransitive) @deva[मुच्] before @deva[अनिट्] @deva[सन्]. @deva[मोक्षते] (with @deva[गुण]) or @deva[मुक्षते] (without) both valid. @deva[सकर्मक] (transitive) @deva[मुच्] may follow different pattern. The grammatical voice affects the desiderative formation.
"""

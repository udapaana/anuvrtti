id = "7.4.80"
numericId = "74080"

[en]
simple = """
In desiderative, reduplicant @deva[उ]/@deva[ऊ] becomes @deva[इ] before labials, semivowels, or @deva[ज्] when followed by @deva[अ]/@deva[आ]. @deva[सुषुप्सति] → @deva[सिषुप्सति].
"""

standard = """
@deva[सन्] @deva[अभ्यास]-@deva[उ]/@deva[ऊ] → @deva[इ] before labial/semivowel/@deva[ज्] + @deva[अ]/@deva[आ]. @deva[स्वप्] → @deva[सुषुप्सति] or @deva[सिषुप्सति], @deva[मुच्] → @deva[मुमुक्षते]. Specific consonant contexts trigger this change.
"""

advanced = """
Conditional @deva[इ]-@deva[आदेश] for @deva[उ]/@deva[ऊ]-@deva[अभ्यास] in @deva[सन्]: before @deva[ओष्ठ्य] (labial), @deva[अन्तःस्थ] (semivowel), or @deva[ज्] when @deva[अ]/@deva[आ] follows. @deva[सुषुप्सति]/@deva[सिषुप्सति] (@deva[स्वप्]), @deva[मुमुक्षते] (@deva[मुच्]). The phonological environment determines applicability.
"""

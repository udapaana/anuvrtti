id = "7.4.52"
numericId = "74052"

[en]
simple = """
The @deva[स्] of @deva[तास्] and @deva[अस्] becomes @deva[ह्] before the ending @deva[ए]. @deva[कर्ताहे], @deva[व्यतिहे].
"""

standard = """
@deva[तास्]/@deva[अस्] + @deva[ए] → @deva[स्]→@deva[ह्]. @deva[कर्ता] + @deva[ए] → @deva[कर्ताहे] 'we two will do', @deva[अस्] + @deva[ए] → @deva[हे] (in @deva[व्यतिहे]). The @deva[स्]→@deva[ह्] substitution before @deva[ए].
"""

advanced = """
@deva[ह्]-@deva[आदेश] for @deva[तास्]/@deva[अस्] before @deva[ए] (1du @[ātmanepada]). @deva[कर्ताहे], @deva[व्यतिहे] show @deva[स्]→@deva[ह्]. This specific substitution creates the distinctive first-person dual middle ending in future and present of @deva[अस्].
"""

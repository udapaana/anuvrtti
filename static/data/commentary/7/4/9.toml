id = "7.4.9"
numericId = "74009"

[en]
simple = """
The root @deva[दे] (@deva[दयते]) 'to protect' becomes @deva[दिगि] in the perfect (@deva[लिट्]). @deva[अव] @deva[दिग्ये], @deva[अव] @deva[दिग्याते].
"""

standard = """
@deva[देङ्] + @deva[लिट्] → @deva[दिगि]-@deva[आदेश]. @deva[दयते] 'protects' → @deva[दिग्ये], @deva[दिग्याते], @deva[दिग्यिरे] in perfect. The suppletive stem @deva[दिगि] replaces @deva[दे] in this tense.
"""

advanced = """
@deva[आदेश]: @deva[देङ्] → @deva[दिगि] in @deva[लिट्]. @deva[अव] @deva[दिग्ये] (1sg), @deva[अव] @deva[दिग्याते] (3du), @deva[अव] @deva[दिग्यिरे] (3pl) show the perfect paradigm. This suppletive replacement creates a distinctive perfect stem for the 'protect' meaning of @deva[दे].
"""

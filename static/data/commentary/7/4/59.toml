id = "7.4.59"
numericId = "74059"

[en]
simple = """
The long vowel of the reduplicant is shortened. @deva[डुढौकिषते] (from @deva[ढौक्]), @deva[तुत्रौकिषते] (from @deva[त्रौक्]).
"""

standard = """
@deva[अभ्यास] (reduplicant) @deva[दीर्घ] → @deva[ह्रस्व]. @deva[ढौक्] → @deva[डुढौकिषते] (desiderative), @deva[त्रौक्] → @deva[तुत्रौकिषते]. The reduplicant's long vowel shortens.
"""

advanced = """
@deva[ह्रस्व] for @deva[अभ्यास]-vowel: long vowels in reduplicant shorten. @deva[डुढौकिषते], @deva[तुत्रौकिषते] (desideratives); @deva[डुढौके], @deva[तुत्रौके] (perfects) demonstrate. @[vārttika]: shortening occurs in any @deva[अभ्यासावयव] (reduplicant portion).
"""

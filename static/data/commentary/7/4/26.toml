id = "7.4.26"
numericId = "74026"

[en]
simple = """
Before the adverbial affix @deva[च्वि], stem-final vowels lengthen. @deva[शुक्लीभवति] 'becomes white'.
"""

standard = """
@deva[अङ्ग]-final vowel + @deva[च्वि] (@deva[अभूततद्भाव] adverbial) → @deva[दीर्घ]. @deva[शुक्ल] + @deva[च्वि] → @deva[शुक्ली] + @deva[भवति] → @deva[शुक्लीभवति]. The @deva[च्वि] context triggers lengthening.
"""

advanced = """
@deva[च्वि]-triggered @deva[दीर्घ]: stems like @deva[शुक्ल] lengthen final vowel before @deva[च्वि]. @deva[शुक्लीभवति], @deva[कृष्णीकरोति], @deva[नीलीभूत] demonstrate. The adverbial formation (@deva[अभूततद्भावे]) uses this lengthened stem with @deva[भू]/@deva[कृ]/@deva[अस्].
"""

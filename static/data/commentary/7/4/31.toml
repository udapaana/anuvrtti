id = "7.4.31"
numericId = "74031"

[en]
simple = """
In the intensive, @deva[घ्रा] and @deva[ध्मा] substitute long @deva[ई] for their vowel. @deva[जेघ्रीयते], @deva[देध्मीयते].
"""

standard = """
@deva[घ्रा]/@deva[ध्मा] + @deva[यङ्] (intensive) → @deva[ई]-@deva[आदेश]. @deva[जेघ्रीयते] 'smells repeatedly', @deva[देध्मीयते] 'blows repeatedly'. The long @deva[ई] creates the intensive stem.
"""

advanced = """
@deva[ई]-@deva[आदेश] for @deva[घ्रा]/@deva[ध्मा] in @deva[यङ्] (intensive). @deva[जेघ्रीयते] (@deva[घ्रा]), @deva[देध्मीयते] (@deva[ध्मा]) show @deva[आ]→@deva[ई]. The long @deva[ई] enables subsequent operations in intensive formation. This specific substitution distinguishes these roots' intensives.
"""

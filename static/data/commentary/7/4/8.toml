id = "7.4.8"
numericId = "74008"

[en]
simple = """
In Vedic (@deva[छन्दस्]), short @deva[ऋ] is always substituted for causative @deva[ऋ]/@deva[ॠ] penultimate in reduplicated aorist. @deva[अवीवृधत्].
"""

standard = """
Vedic: @deva[ऋ]/@deva[ॠ]-@deva[उपधा] @deva[णिजन्त] + @deva[चङ्] → obligatory @deva[ऋ]. @deva[अवीवृधत्] (@deva[वृध्]-caus.), @deva[अचूचुरत्] (@deva[चुर्]-caus.). @deva[छन्दस्] makes the @deva[ऋ]-substitution invariable, unlike classical optionality (@ref[7.4.7]).
"""

advanced = """
@deva[छान्दस] @deva[नित्य]: @deva[ऋ]/@deva[ॠ]→@deva[ऋ] in @deva[णिजन्त]-@deva[चङ्] without optionality. @deva[अवीवृधत्], @deva[अदीधृतत्] show Vedic consistency. This contrasts with classical @deva[विभाषा] (@ref[7.4.7]). Vedic grammar preserves the short @deva[ऋ] more regularly in these formations.
"""

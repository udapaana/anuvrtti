id = "7.4.92"
numericId = "74092"

[en]
simple = """
Short-@deva[ऋ]-final roots in elided intensive get @deva[रि], @deva[र्], and @deva[रि] augments. @deva[चर्करीति], @deva[चर्कर्ति], @deva[चर्करिति] (from @deva[कृ]).
"""

standard = """
@deva[ह्रस्व]-@deva[ऋ]-@deva[अन्त] + @deva[यङ्लुक्] → @deva[रिक्]/@deva[रुक्]/@deva[रिक्] augments as @deva[रि]/@deva[र्]/@deva[रि]. @deva[कृ] → @deva[चर्करीति], @deva[चर्कर्ति], @deva[चर्करिति] 'does repeatedly'. Three augment forms available.
"""

advanced = """
@deva[यङ्लुक्] for @deva[ह्रस्व]-@deva[ऋकारान्त]: @deva[रीक्] → @deva[री], @deva[रुक्] → @deva[र्], @deva[रिक्] → @deva[रि] as augments. @deva[चर्करीति]/@deva[चर्कर्ति]/@deva[चर्करिति] (@deva[कृ]), @deva[तर्तरीति]/@deva[तर्तर्ति]/@deva[तर्तरिति] (@deva[तृ]). @[kārikā]: @deva[किरतिं] @deva[चर्करतिं] @deva[च]... lists variant formations.
"""

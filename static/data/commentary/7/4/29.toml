id = "7.4.29"
numericId = "74029"

[en]
simple = """
Roots @deva[ऋ] and conjunct-preceded @deva[ऋ]-finals take @deva[गुण] before passive @deva[य्]. @deva[अर्यते], @deva[स्मर्यते].
"""

standard = """
@deva[ऋ] (@deva[अर्ति])/@deva[संयोगपूर्वक] @deva[ऋकारान्त] + @deva[य्] (passive) → @deva[गुण]. @deva[ऋ] → @deva[अर्यते], @deva[स्मृ] → @deva[स्मर्यते]. The @deva[गुण] (@deva[ऋ]→@deva[अर्]) occurs in passive for these roots.
"""

advanced = """
Passive-@deva[य्]-triggered @deva[गुण] for @deva[ऋ] (root) and @deva[संयोगपूर्वक]-@deva[ऋ]-finals. @deva[अर्यते] (@deva[ऋ]), @deva[स्मर्यते] (@deva[स्मृ]), @deva[स्तर्यते] (@deva[स्तृ]). The conjunct-condition (like @deva[स्म्], @deva[स्त्]) allows @deva[गुण] instead of @deva[रि]-substitution (@ref[7.4.28]) for these roots.
"""

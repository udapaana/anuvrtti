id = "7.4.63"
numericId = "74063"

[en]
simple = """
In the intensive of @deva[कु] (@deva[कवते]) 'to sound', the guttural is not replaced by palatal. @deva[कोकूयते] (not *@deva[चोकूयते]).
"""

standard = """
@deva[कु] (intensive) → no @deva[चुत्व]. @deva[कोकूयते] @deva[उष्ट्रः] 'the camel sounds repeatedly', @deva[खरः] @deva[कोकूयते]. The reduplicant keeps @deva[क्], not shifting to @deva[च्].
"""

advanced = """
Exception to @ref[7.4.62]: @deva[कु] in @deva[यङ्] (intensive) retains guttural. @deva[कोकूयते] shows @deva[क]-reduplicant preserved. This is specific to the 'sounding' root @deva[कु] in intensive formation; other forms may follow regular @deva[चुत्व].
"""

id = "7.4.49"
numericId = "74049"

[en]
simple = """
Root-final @deva[स्] becomes @deva[त्] before @deva[आर्धधातुक] affixes beginning with @deva[स्]. @deva[वस्] → @deva[वत्स्यति] 'will dwell'.
"""

standard = """
@deva[स्]-@deva[अन्त] @deva[धातु] + @deva[स्]-@deva[आदि] @deva[आर्धधातुक] → @deva[स्]→@deva[त्]. @deva[वस्] + @deva[स्यति] → @deva[वत्स्यति], @deva[घस्] + @deva[सन्] → @deva[जिघत्सति]. The @deva[स्]→@deva[त्] before another @deva[स्] creates these forms.
"""

advanced = """
@deva[त्]-@deva[आदेश] for root-final @deva[स्] before @deva[स्]-initial @deva[आर्धधातुक]. @deva[वत्स्यति] (future), @deva[विवत्सति] (desiderative of @deva[वस्]), @deva[जिघत्सति] (desiderative of @deva[घस्]). The assimilation creates the characteristic @deva[त्स्] cluster.
"""

id = "7.4.23"
numericId = "74023"

[en]
simple = """
When a prefix precedes, @deva[ऊह्] shortens its @deva[ऊ] before @deva[कित्]/@deva[ङित्] @deva[य्]-initial affixes. @deva[समुह्यते].
"""

standard = """
@deva[उपसर्ग] + @deva[ऊह्] + @deva[कित्]/@deva[ङित्] @deva[य्]-@deva[आदि] → @deva[ह्रस्व]. @deva[समुह्यते] 'is moved together', @deva[प्रोह्यते]. The prefix conditions the shortening; without prefix, @deva[ऊ] may remain.
"""

advanced = """
@deva[उपसर्गपूर्वक] condition: @deva[ऊह्] + @deva[कित्]/@deva[ङित्] @deva[य्]-initial → @deva[ऊ]→@deva[उ]. @deva[समुह्यते], @deva[प्रोह्यते], @deva[अवोह्यते] show shortened vowel. Without prefix, different patterns may apply. The prefix triggers the shortening specifically.
"""

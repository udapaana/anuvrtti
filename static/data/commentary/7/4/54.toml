id = "7.4.54"
numericId = "74054"

[en]
simple = """
Before desiderative @deva[सन्], the roots @deva[मी], @deva[मा], @deva[धा], @deva[रभ्], @deva[लभ्], @deva[शक्], @deva[पत्], @deva[पद्], and @deva[दा] take @deva[इस्] substitute for their vowel. @deva[लिप्सते] 'desires to obtain'.
"""

standard = """
Listed roots + @deva[सन्] (desiderative) → @deva[इस्]-@deva[आदेश]. @deva[लभ्] → @deva[लिप्सते] 'wants to get', @deva[शक्] → @deva[शिक्षति] 'wants to be able', @deva[पत्] → @deva[पित्सति]. The vowel becomes @deva[इस्].
"""

advanced = """
@deva[इस्]-@deva[आदेश] for @deva[मी]/@deva[मा]/@deva[धा]/@deva[रभ्]/@deva[लभ्]/@deva[शक्]/@deva[पत्]/@deva[पद्]/@deva[दा] before @deva[सन्]. @deva[लिप्सते] (@deva[लभ्]), @deva[शिक्षति] (@deva[शक्]), @deva[पित्सति] (@deva[पत्]), @deva[दित्सति] (@deva[दा]). The @deva[इस्]-substitution with reduplication creates characteristic desiderative stems.
"""

id = "7.4.51"
numericId = "74051"

[en]
simple = """
The @deva[स्] of @deva[तास्] and @deva[अस्] is dropped before @deva[र्]-initial affixes. @deva[कर्तारौ], @deva[कर्तारः].
"""

standard = """
@deva[तास्]/@deva[अस्] + @deva[र्]-@deva[आदि] → @deva[स्]-@deva[लोप]. @deva[कर्ता] + @deva[रौ] → @deva[कर्तारौ] 'two doers', @deva[कर्ता] + @deva[रः] → @deva[कर्तारः] 'doers'. The @deva[स्] elides before @deva[र्].
"""

advanced = """
@deva[स्]-@deva[लोप] for @deva[तास्]/@deva[अस्] before @deva[र्]-initial affixes. @deva[कर्तारौ] (dual), @deva[कर्तारः] (plural); @deva[अध्येतारौ], @deva[अध्येतारः] demonstrate. This parallels @ref[7.4.50]'s @deva[स्]-initial elision, extending to @deva[र्]-initial contexts.
"""

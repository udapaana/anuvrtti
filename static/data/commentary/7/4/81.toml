id = "7.4.81"
numericId = "74081"

[en]
simple = """
For @deva[स्रु], @deva[श्रु], @deva[द्रु], @deva[प्रु], @deva[प्लु], and @deva[च्यु] in desiderative, reduplicant @deva[उ] optionally becomes @deva[इ] when semivowel is followed by @deva[ऋ]. @deva[सुस्रूषते] or @deva[सिस्रूषते].
"""

standard = """
Listed roots + @deva[सन्]: optional @deva[उ]→@deva[इ] for @deva[अभ्यास] when semivowel+@deva[ऋ] follows. @deva[स्रु] → @deva[सुस्रूषते] or @deva[सिस्रूषते], @deva[श्रु] → @deva[शुश्रूषते] or @deva[शिश्रूषते]. @deva[विभाषा] allows both.
"""

advanced = """
@deva[विभाषा] for @deva[स्रु]/@deva[श्रु]/@deva[द्रु]/@deva[प्रु]/@deva[प्लु]/@deva[च्यु] @deva[अभ्यास]-@deva[उ] before semivowel+@deva[ऋ] in @deva[सन्]. @deva[सुस्रूषते]/@deva[सिस्रूषते], @deva[शुश्रूषते]/@deva[शिश्रूषते], @deva[दुद्रूषते]/@deva[दिद्रूषते]. Both forms valid; the @deva[ऋ]-following condition triggers optionality.
"""

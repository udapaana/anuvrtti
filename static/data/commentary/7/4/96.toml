id = "7.4.96"
numericId = "74096"

[en]
simple = """
For @deva[वेष्ट्] and @deva[चेष्ट्] in causative aorist, the reduplicant vowel optionally becomes @deva[अ]. @deva[अववेष्टत्] or @deva[अविवेष्टत्].
"""

standard = """
@deva[वेष्ट्]/@deva[चेष्ट्] + @deva[णि] + @deva[चङ्] → optional @deva[अ]-@deva[आदेश] for @deva[अभ्यास]. @deva[वेष्ट्] → @deva[अववेष्टत्] or @deva[अविवेष्टत्], @deva[चेष्ट्] → @deva[अचचेष्टत्] or @deva[अचिचेष्टत्]. @deva[विभाषा] allows both forms.
"""

advanced = """
@deva[विभाषा] for @deva[वेष्ट्]/@deva[चेष्ट्] @deva[चङ्]-@deva[अभ्यास]: optional @deva[अ]-@deva[आदेश]. @deva[अववेष्टत्]/@deva[अविवेष्टत्] (@deva[वेष्ट्]), @deva[अचचेष्टत्]/@deva[अचिचेष्टत्] (@deva[चेष्ट्]). Both @deva[अ]-reduplicant and standard @deva[इ]-reduplicant forms are valid for these two roots.
"""

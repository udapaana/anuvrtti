id = "7.4.74"
numericId = "74074"

[en]
simple = """
In Vedic, @deva[सू] 'to produce' forms perfect @deva[ससूव] irregularly (not @deva[सुषूव]).
"""

standard = """
Vedic @deva[सू] → @deva[ससूव] (perfect). @deva[ससूव] @deva[स्थविरं] @deva[विपश्चिताम्]. Classical would be @deva[सुषूव]. The Vedic form shows @deva[स]-reduplicant without @deva[षत्व].
"""

advanced = """
@deva[छान्दस] @deva[निपातन]: @deva[सू] → @deva[ससूव] in @deva[लिट्]. Vedic preserves @deva[स्] without @deva[षत्व] after @deva[उ]. Classical @deva[सुषूव] shows regular @deva[ष्] (per @ref[8.3.59]). This Vedic form is listed as irregular.
"""

id = "7.4.17"
numericId = "74017"

[en]
simple = """
The root @deva[अस्] 'to be' (@deva[अस्यते]) adds @deva[थुक्] augment before aorist @deva[अङ्]. @deva[आस्थत्].
"""

standard = """
@deva[अस्] + @deva[अङ्] → @deva[थुक्]-@deva[आगम]. @deva[आस्थत्], @deva[आस्थताम्], @deva[आस्थन्]. The @deva[थ्]-augment appears between the stem and aorist marker, creating this root's characteristic aorist.
"""

advanced = """
@deva[थुक्] (@deva[थ्]) augmentation for @deva[अस्यते] (4th class @deva[अस्]) before @deva[अङ्]-aorist. @deva[आस्थत्], @deva[आस्थताम्], @deva[आस्थन्] show the pattern. This distinguishes the 4th-class @deva[अस्] 'to throw' from @deva[अस्] 'to be' in aorist formation.
"""

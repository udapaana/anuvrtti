id = "7.4.33"
numericId = "74033"

[en]
simple = """
Before the denominative affix @deva[क्यच्], final @deva[अ] or @deva[आ] becomes @deva[ई]. @deva[पुत्रीयति] 'desires a son'.
"""

standard = """
@deva[अ]/@deva[आ]-@deva[अन्त] @deva[प्रातिपदिक] + @deva[क्यच्] (denominative) → @deva[ई]-@deva[आदेश]. @deva[पुत्र] → @deva[पुत्रीयति], @deva[खट्वा] → @deva[खट्वीयति], @deva[माला] → @deva[मालीयति]. Denominatives take this @deva[ई]-stem.
"""

advanced = """
@deva[क्यच्]-triggered @deva[ई]-@deva[आदेश] for @deva[अ]/@deva[आ]-finals in denominatives. @deva[पुत्रीयति] 'wants a son', @deva[घटीयति] 'wants a pot', @deva[खट्वीयति], @deva[मालीयति] show the pattern. The @deva[ई] creates characteristic denominative verb stems.
"""

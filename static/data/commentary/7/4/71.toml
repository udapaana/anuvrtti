id = "7.4.71"
numericId = "74071"

[en]
simple = """
After the lengthened @deva[आ] of the reduplicant, consonant-cluster-final roots add @deva[नुट्] before their @deva[अ]. @deva[आनञ्ज] (from @deva[अञ्ज्]).
"""

standard = """
@deva[आ]-@deva[अभ्यास] + @deva[ह्रस्व]-@deva[अ] + @deva[संयुक्त] → @deva[नुट्]-@deva[आगम]. @deva[अञ्च्] → @deva[आनञ्च] 'bent', @deva[अञ्ज्] → @deva[आनञ्ज] 'anointed'. The @deva[न्] augment appears after lengthened reduplicant.
"""

advanced = """
@deva[नुट्] (@deva[न्]-@deva[आगम]) for @deva[आदि]-@deva[अ] roots after @deva[अभ्यास]-@deva[दीर्घ] when root ends in @deva[संयुक्त] (conjunct). @deva[आनञ्च] (@deva[अञ्च्]), @deva[आनञ्ज] (@deva[अञ्ज्]) show @deva[आ] + @deva[न्] + @deva[अ] + @deva[ञ्च्]/@deva[ञ्ज्] structure in perfect.
"""

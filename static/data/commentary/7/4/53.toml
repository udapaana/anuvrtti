id = "7.4.53"
numericId = "74053"

[en]
simple = """
The final of @deva[दीधी] and @deva[वेवी] drops before affixes beginning with @deva[य्], @deva[इ], or @deva[ई]. @deva[आदीध्य], @deva[आवेव्य].
"""

standard = """
@deva[दीधी]/@deva[वेवी] + @deva[य्]/@deva[इ]/@deva[ई]-@deva[आदि] → @deva[अन्त]-@deva[लोप]. @deva[आदीधी] + @deva[य] → @deva[आदीध्य] 'having shone', @deva[आवेवी] + @deva[य] → @deva[आवेव्य]. The final @deva[ई] drops before these.
"""

advanced = """
@deva[अन्त]-@deva[लोप] for @deva[दीधी]/@deva[वेवी] intensive stems before @deva[य्]/@deva[इ]/@deva[ई]-initial. @deva[आदीध्य] (gerund), @deva[आदीध्यते] (present); @deva[आवेव्य], @deva[आवेव्यते] demonstrate. The elision of @deva[ई] creates these intensive verb forms.
"""

id = "7.4.78"
numericId = "74078"

[en]
simple = """
In Vedic, the reduplicant vowel variously becomes @deva[इ] in reduplicated present forms. @deva[विवष्टि], @deva[दधाति].
"""

standard = """
Vedic @deva[बहुलम्]: @deva[इ]-@deva[आदेश] for @deva[श्लु] @deva[अभ्यास]. @deva[पूर्णां] @deva[विवष्टि] (@deva[वश्]), @deva[जनिमा] @deva[दधाति] (@deva[धा]). @deva[छन्दस्] shows varied reduplicant patterns not always matching classical rules.
"""

advanced = """
@deva[छान्दस] @deva[बहुलम्] for @deva[श्लु]-@deva[अभ्यास] @deva[इ]-substitution. @deva[विवष्टि] (@deva[वश्]), @deva[दधाति] show Vedic variety. 'Diversely' (@deva[बहुलम्]) indicates multiple patterns exist in Vedic literature for reduplicated present formations.
"""

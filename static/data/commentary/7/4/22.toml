id = "7.4.22"
numericId = "74022"

[en]
simple = """
Before @deva[कित्]/@deva[ङित्] affixes beginning with @deva[य्], @deva[शी]'s @deva[ई] becomes @deva[अय्]. @deva[शय्यते] (passive), @deva[शाशय्यते] (intensive).
"""

standard = """
@deva[शी] + @deva[कित्]/@deva[ङित्] @deva[य्]-@deva[आदि] → @deva[अय्]-@deva[आदेश] for @deva[ई]. @deva[शी] + @deva[यक्] → @deva[शय्यते] 'is lain upon', @deva[शी] + @deva[यङ्] → @deva[शाशय्यते]. The @deva[ई]→@deva[अय्] creates the @deva[य्य] gemination.
"""

advanced = """
@deva[अय्]-@deva[आदेश] for @deva[शी]'s @deva[ई] before @deva[कित्]/@deva[ङित्] @deva[य्]-initial affixes. @deva[शय्यते] (passive @deva[यक्]), @deva[शाशय्यते] (intensive @deva[यङ्]). The transformation @deva[ई]→@deva[अय्] + @deva[य्] → @deva[य्य] creates the characteristic geminate @deva[य्]. This rule governs passive and intensive of @deva[शी].
"""

id = "7.4.77"
numericId = "74077"

[en]
simple = """
In the reduplicated present of @deva[ऋ] and @deva[पृ], the reduplicant vowel becomes @deva[इ]. @deva[इयर्ति], @deva[पिपर्ति].
"""

standard = """
@deva[ऋ]/@deva[पृ] (@deva[श्लु]-present) → @deva[अभ्यास]-vowel→@deva[इ]. @deva[ऋ] → @deva[इयर्ति] @deva[धूमम्] 'the smoke rises', @deva[पृ] → @deva[पिपर्ति] @deva[सोमम्] 'fills the soma'. The @deva[ऋ] of reduplicant becomes @deva[इ].
"""

advanced = """
@deva[इ]-@deva[आदेश] for @deva[ऋ]/@deva[पृ] @deva[अभ्यास] in @deva[श्लु]. @deva[इयर्ति] (@deva[ऋ]), @deva[पिपर्ति] (@deva[पृ]) show @deva[इ]-reduplicant. This parallels @ref[7.4.76] for these @deva[ऋ]-containing roots in 3rd conjugation class.
"""

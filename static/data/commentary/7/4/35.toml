id = "7.4.35"
numericId = "74035"

[en]
simple = """
In Vedic, the lengthening/@deva[ई]-substitution rules don't apply, except for @deva[पुत्र]. Vedic: @deva[वृषायते] (not @deva[वृषीयते]).
"""

standard = """
@deva[छन्दस्]: no @deva[दीर्घ]/@deva[ई]-@deva[आदेश] before denominative affixes, except @deva[पुत्र] → @deva[पुत्रीयति]. @deva[वृषायते] (Vedic, not *@deva[वृषीयते]). @deva[पुत्र] exceptionally follows classical pattern.
"""

advanced = """
Vedic exception to @ref[7.4.32]-33: denominatives preserve short/original vowels. @deva[वृषायते], @deva[अश्वायते] show @deva[आ]-formation (not @deva[ई]). @deva[पुत्र] is specifically exempted from this Vedic exception—@deva[पुत्रीयति] applies even in Vedas.
"""

id = "7.4.3"
numericId = "74003"

[en]
simple = """
For roots @deva[भ्राज्], @deva[भास्], @deva[भाष्], @deva[दीप्], and others, the penultimate shortening in causative aorist is optional. @deva[अबिभ्राजत्] or @deva[अबीभ्राजत्].
"""

standard = """
@deva[भ्राजादि] (listed roots) + @deva[णि] + @deva[चङ्] → optional @deva[उपधा]-@deva[ह्रस्व]. @deva[भ्राज्]-causative: @deva[अबिभ्राजत्] or @deva[अबीभ्राजत्], @deva[भास्]: @deva[अबिभासत्] or @deva[अबीभासत्]. @deva[विभाषा] creates doublet aorist forms.
"""

advanced = """
@deva[विभाषा] for @deva[भ्राजादि]: @deva[भ्राज्], @deva[भास्], @deva[भाष्], @deva[दीप्], etc. in @deva[णिजन्त]-@deva[चङ्]. Both shortened and unshortened @deva[उपधा] valid. @deva[अबिभ्राजत्]/@deva[अबीभ्राजत्], @deva[अबिभासत्]/@deva[अबीभासत्]. This list creates optional paradigms alongside the obligatory shortening of @ref[7.4.1].
"""

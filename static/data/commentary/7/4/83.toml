id = "7.4.83"
numericId = "74083"

[en]
simple = """
In intensive, the @deva[अ] of the reduplicant lengthens when no @deva[कित्] augment is added. @deva[पापच्यते] (not *@deva[पपच्यते]).
"""

standard = """
@deva[यङ्] @deva[अभ्यास]-@deva[अ] → @deva[आ] (when no @deva[कित्]-@deva[आगम]). @deva[पच्] → @deva[पापच्यते] 'cooks repeatedly', @deva[दह्] → @deva[दादह्यते]. The @deva[अ]→@deva[आ] lengthening marks the intensive.
"""

advanced = """
@deva[यङ्]/@deva[यङ्लुक्] @deva[अभ्यास]-@deva[अ] → @deva[दीर्घ] when @deva[अकित्]-@deva[आगम]. @deva[पापच्यते], @deva[दादह्यते], @deva[याय] @deva[जते] (@deva[यज्]). The condition 'no @deva[कित्]-augment' (@deva[अनुदात्त]) restricts when lengthening occurs. Intensive reduplicants show characteristic long @deva[आ].
"""

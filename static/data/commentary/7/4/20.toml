id = "7.4.20"
numericId = "74020"

[en]
simple = """
The root @deva[वच्] adds @deva[उ] augment after its @deva[अ] in @deva[अङ्]-aorist. @deva[अवोचत्] 'said'.
"""

standard = """
@deva[वच्] + @deva[अङ्] → @deva[उ]-@deva[आगम] after @deva[अ]. @deva[वच्] → @deva[वोच्] (@deva[अ] + @deva[उ] → @deva[ओ]) → @deva[अवोचत्]. The augment creates the @deva[ओ]-vowel characteristic of this aorist.
"""

advanced = """
@deva[उ]-@deva[आगम] for @deva[वच्] in @deva[अङ्]-aorist: @deva[अ] + @deva[उ] → @deva[ओ] by sandhi, yielding @deva[वोच्]-stem. @deva[अवोचत्], @deva[अवोचताम्], @deva[अवोचन्] 'said' demonstrate. This creates @deva[वच्]'s distinctive aorist with @deva[ओ]-grade.
"""

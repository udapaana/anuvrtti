id = "7.4.72"
numericId = "74072"

[en]
simple = """
For @deva[अश्] (@deva[अश्नोति]) 'to obtain', @deva[नुट्] is added after the lengthened reduplicant @deva[आ]. @deva[आनश].
"""

standard = """
@deva[अश्] + @deva[लिट्] → @deva[नुट्]-@deva[आगम] after @deva[दीर्घ]-@deva[अभ्यास]. @deva[आ] + @deva[न्] + @deva[अश्] → @deva[आनश] 'obtained'. This applies specifically to 5th-class @deva[अश्].
"""

advanced = """
@deva[नुट्] for @deva[अश्] (@deva[अश्नोति]) in @deva[लिट्]: @deva[आनश], @deva[आनशतुः], @deva[आनशुः]. The augment @deva[न्] appears after @deva[आ]-reduplicant, before @deva[अश्]. This rule specifies @deva[अश्नोति] (5th class 'obtain'), not other @deva[अश्] homonyms.
"""

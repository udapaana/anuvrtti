id = "7.4.10"
numericId = "74010"

[en]
simple = """
Roots ending in short @deva[ऋ] with preceding conjunct consonant take @deva[गुण] in the perfect. @deva[स्वृ] → @deva[सस्वरतुः].
"""

standard = """
@deva[संयोग]-@deva[पूर्व] @deva[ह्रस्व]-@deva[ऋ]-@deva[अन्त] + @deva[लिट्] → @deva[गुण]. @deva[स्वृ] → @deva[सस्वरतुः], @deva[सस्वरुः]; @deva[ध्वृ] → @deva[दध्वरतुः]. The conjunct-preceded short @deva[ऋ] strengthens to @deva[अर्] in perfect.
"""

advanced = """
@deva[लिट्] @deva[गुण] for @deva[संयोगपूर्वक] @deva[ह्रस्व]-@deva[ऋकारान्त] roots. @deva[स्वृ]: @deva[सस्वरतुः], @deva[सस्वरुः]; @deva[ध्वृ]: @deva[दध्वरतुः], @deva[दध्वरुः]. The @deva[गुण] (@deva[ऋ]→@deva[अर्]) applies specifically to this phonological environment—conjunct + short @deva[ऋ]—in perfect tense.
"""

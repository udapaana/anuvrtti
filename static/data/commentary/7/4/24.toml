id = "7.4.24"
numericId = "74024"

[en]
simple = """
When prefixed, @deva[इ] (@deva[एति]) shortens its vowel before benedictive @deva[यास्]. @deva[उदियात्], @deva[समियात्].
"""

standard = """
@deva[उपसर्ग] + @deva[इ] + @deva[यास्] (benedictive) → @deva[ह्रस्व]. @deva[उद्] + @deva[इ] → @deva[उदियात्] 'may it rise', @deva[सम्] + @deva[इ] → @deva[समियात्]. The benedictive context with prefix triggers shortening.
"""

advanced = """
@deva[उपसर्गपूर्वक] @deva[इ] (@deva[एति]) + @deva[यास्] (@deva[आशीर्लिङ्]) → @deva[ई]→@deva[इ] (though shown as @deva[इ]→short). @deva[उदियात्], @deva[समियात्], @deva[प्रतियात्] demonstrate. The benedictive @deva[आशीर्लिङ्] with @deva[यास्]-augment receives this special treatment when prefixed.
"""

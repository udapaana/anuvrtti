id = "7.4.5"
numericId = "74005"

[en]
simple = """
For @deva[स्था] 'to stand' in causative aorist, the penultimate becomes @deva[इ]. @deva[अतिष्ठिपत्].
"""

standard = """
@deva[स्था] + @deva[णि] + @deva[चङ्] → @deva[उपधा]→@deva[इ]. @deva[स्थापय]° → @deva[तिष्ठिप]° → @deva[अतिष्ठिपत्] 'caused to stand'. The @deva[आ]→@deva[इ] substitution is specific to this root's causative aorist.
"""

advanced = """
@deva[इ]-@deva[आदेश] for @deva[स्था]-causative @deva[उपधा] in @deva[चङ्]: @deva[स्थापय]° → @deva[तिष्ठिप]° (@deva[आ]→@deva[इ]). @deva[अतिष्ठिपत्], @deva[अतिष्ठिपताम्], @deva[अतिष्ठिपन्] show the pattern. This goes beyond mere shortening (@ref[7.4.1])—a qualitative vowel change to @deva[इ].
"""

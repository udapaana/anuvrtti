id = "7.4.86"
numericId = "74086"

[en]
simple = """
In intensive, @deva[जप्], @deva[जभ्], @deva[दह्], @deva[दश्], @deva[भञ्ज्], and @deva[पश्] add @deva[नुक्] after their reduplicant. @deva[जंजप्यते], @deva[दंदश्यते].
"""

standard = """
@deva[जप्]/@deva[जभ्]/@deva[दह्]/@deva[दश्]/@deva[भञ्ज्]/@deva[पश्] + @deva[यङ्] → @deva[नुक्]-@deva[आगम] after @deva[अभ्यास]. @deva[जंजप्यते] 'mutters repeatedly', @deva[दंदह्यते] 'burns repeatedly', @deva[दंदश्यते] 'bites repeatedly'.
"""

advanced = """
@deva[नुक्] for intensive @deva[अभ्यास] of @deva[जप्]/@deva[जभ्]/@deva[दह्]/@deva[दश्]/@deva[भञ्ज्]/@deva[पश्]. @deva[जंजप्यते]/@deva[जंजभ्यते], @deva[दंदह्यते]/@deva[दंदश्यते], @deva[बंभञ्ज्यते], @deva[पंपश्यते]. These specific roots receive the nasal augment in intensive formation.
"""

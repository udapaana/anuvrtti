id = "7.4.61"
numericId = "74061"

[en]
simple = """
When a sibilant precedes in the reduplicant, only the hard consonant (aspirate/unaspirate) is kept; others drop. @deva[चुश्च्योतिषति].
"""

standard = """
@deva[स्]-@deva[पूर्व] @deva[अभ्यास]: only @deva[खर्] (hard stops) retained. @deva[श्च्युत्] → @deva[चुश्च्योतिषति] (desiderative), @deva[स्तम्भ्] → @deva[तिष्टम्भिषते]. Sibilant+stop sequences reduce to stop only.
"""

advanced = """
@deva[अभ्यास] with @deva[स्]-@deva[पूर्व] consonants: @deva[खर्]-only retention. @deva[चुश्च्योतिषति] (@deva[श्च्युत्]), @deva[तिष्टम्भिषते] (@deva[स्तम्भ्]) show @deva[स्]→lopa after the sibilant-stop sequence reduces. This refines @ref[7.4.60]'s consonant reduction for sibilant contexts.
"""

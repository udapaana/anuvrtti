id = "7.4.48"
numericId = "74048"

[en]
simple = """
The word @deva[अप्] 'water' changes its final to @deva[त्] before case endings beginning with @deva[भ्]. @deva[अद्भ्याम्], @deva[अद्भिः], @deva[अद्भ्यः].
"""

standard = """
@deva[अप्] + @deva[भ्]-@deva[आदि] @deva[सुप्] → @deva[प्]→@deva[त्]. @deva[अप्] + @deva[भ्याम्] → @deva[अद्भ्याम्] (instr./dat. dual), @deva[अप्] + @deva[भिस्] → @deva[अद्भिः] (instr. pl.), @deva[अप्] + @deva[भ्यस्] → @deva[अद्भ्यः] (dat./abl. pl.).
"""

advanced = """
@deva[त्]-@deva[आदेश] for @deva[अप्]'s final @deva[प्] before @deva[भ्]-initial case endings. @deva[अद्भ्याम्], @deva[अद्भिः], @deva[अद्भ्यः] show @deva[प्]→@deva[द्] (t-class stop). This irregular stem change creates the distinctive paradigm for 'water' in plural/@deva[द्विवचन] (dual) cases.
"""

id = "7.4.39"
numericId = "74039"

[en]
simple = """
In @[ṛgveda], the final of @deva[कवि], @deva[अध्वर], and @deva[पृतना] is dropped before denominative @deva[क्यच्]. @deva[कव्यन्तः].
"""

standard = """
@[ṛgvedic]: @deva[कवि]/@deva[अध्वर]/@deva[पृतना] + @deva[क्यच्] → @deva[लोप] of final. @deva[कव्यन्तः] 'acting as sages', @deva[अध्वर्यते], @deva[पृतन्यति]. The stem-final elides in these Vedic denominatives.
"""

advanced = """
@deva[ऋग्]-specific @deva[अन्त]-@deva[लोप] for @deva[कवि], @deva[अध्वर], @deva[पृतना] before @deva[क्यच्]. @deva[कव्यन्तः] @deva[सुमनसः] shows @deva[कवि]→@deva[कव्]°. This elision creates shorter denominative stems in @[ṛgvedic] usage. The forms may not appear in all recensions.
"""

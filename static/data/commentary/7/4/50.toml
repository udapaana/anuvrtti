id = "7.4.50"
numericId = "74050"

[en]
simple = """
The @deva[स्] of future marker @deva[तास्] and root @deva[अस्] 'to be' is dropped before @deva[स्]-initial affixes. @deva[कर्तासि], @deva[त्वमसि].
"""

standard = """
@deva[तास्]/@deva[अस्] + @deva[स्]-@deva[आदि] → @deva[स्]-@deva[लोप]. @deva[कर्ता] + @deva[सि] → @deva[कर्तासि] 'you will do', @deva[अस्] + @deva[सि] → @deva[असि] 'you are'. The final @deva[स्] elides before another @deva[स्].
"""

advanced = """
@deva[स्]-@deva[लोप] for @deva[तास्] (future marker) and @deva[अस्] (root) before @deva[स्]-initial. @deva[कर्तासि], @deva[कर्तास्मः]; @deva[असि], @deva[अस्मि] demonstrate. The elision prevents geminate @deva[स्स्] and creates characteristic verb forms.
"""

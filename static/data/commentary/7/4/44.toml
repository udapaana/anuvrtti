id = "7.4.44"
numericId = "74044"

[en]
simple = """
In Vedic, @deva[हा] optionally becomes @deva[हि] before @deva[क्त्वा]. @deva[हित्वा] @deva[शरीरं] or @deva[हात्वा] @deva[शरीरं].
"""

standard = """
Vedic @deva[हा] + @deva[क्त्वा] → optional @deva[हि]-@deva[आदेश]. @deva[हित्वा] @deva[शरीरं] @deva[यातव्यम्] or @deva[हात्वा] @deva[शरीरं]. @deva[छन्दस्] allows both forms, extending classical optionality.
"""

advanced = """
@deva[छान्दस] extension of @ref[7.4.43]: @deva[हा] → @deva[हि] optional before @deva[क्त्वा] in Vedas. Both @deva[हित्वा] and @deva[हात्वा] appear in Vedic literature. The long @deva[आ] in @deva[हात्वा] preserved as variant.
"""

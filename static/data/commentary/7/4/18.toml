id = "7.4.18"
numericId = "74018"

[en]
simple = """
The root @deva[श्वि] takes @deva[अ]-substitute for its final in @deva[अङ्]-aorist. @deva[अश्वत्].
"""

standard = """
@deva[श्वि] + @deva[अङ्] → @deva[अ]-@deva[आदेश] for @deva[इ]. @deva[अश्वत्], @deva[अश्वताम्], @deva[अश्वन्]. The vowel @deva[इ] is replaced by @deva[अ], creating the aorist stem.
"""

advanced = """
@deva[अ]-@deva[आदेश] for @deva[श्वि]'s final @deva[इ] before @deva[अङ्]: @deva[श्वि] → @deva[श्व] + @deva[अङ्] (@deva[अ]) → @deva[अश्वत्]. The stem-@deva[अ] and affix-@deva[अ] merge. @deva[अश्वत्], @deva[अश्वताम्], @deva[अश्वन्] form the paradigm for this 'swell' root's aorist.
"""

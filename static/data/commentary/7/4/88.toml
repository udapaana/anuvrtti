id = "7.4.88"
numericId = "74088"

[en]
simple = """
In intensive, the subsequent (root) @deva[अ] becomes @deva[उ]. @deva[चंचूर्यते] (root @deva[अ]→@deva[ऊ]).
"""

standard = """
@deva[यङ्] root-@deva[अ] → @deva[उ] (not reduplicant-@deva[अ]). @deva[चर्] → @deva[चंचूर्यते] (@deva[अ]→@deva[ऊ]), @deva[फल्] → @deva[पंफुल्यते] (@deva[अ]→@deva[उ]). The root vowel strengthens to @deva[उ] in intensive.
"""

advanced = """
@deva[उ]-@deva[आदेश] for @deva[परस्मात्] (subsequent/root) @deva[अ] in @deva[यङ्]/@deva[यङ्लुक्]. Examples from @ref[7.4.87]: @deva[चंचूर्यते] shows root-@deva[अ]→@deva[ऊ] (with @[dīrgha]); @deva[पंफुल्यते] shows @deva[अ]→@deva[उ]. This affects the root vowel, not the reduplicant.
"""

id = "7.4.66"
numericId = "74066"

[en]
simple = """
In the reduplicant, @deva[ऋ] or @deva[ॠ] is replaced by @deva[अर्]. @deva[ववृते], @deva[ववृधे], @deva[नर्नर्त्ति].
"""

standard = """
@deva[अभ्यास]-@deva[ऋ]/@deva[ॠ] → @deva[अर्]. @deva[वृत्] → @deva[ववृते] 'turned' (reduplicant shows @deva[अ], not @deva[ऋ]), @deva[वृध्] → @deva[ववृधे], @deva[नृत्] → @deva[नर्नर्त्ति] (intensive). The @deva[र्] is separated.
"""

advanced = """
@deva[उरण्] @deva[रपर] (@ref[1.1.51]): @deva[अभ्यास]-@deva[ऋ]/@deva[ॠ] → @deva[अर्]. @deva[ववृते] (@deva[वृत्]), @deva[ववृधे] (@deva[वृध्]), @deva[शशृधे] (@deva[शृध्]), @deva[नर्नर्त्ति], @deva[नरिनर्त्ति] (@deva[नृत्]-intensive). The @deva[ऋ] splits to @deva[अ]+@deva[र्] in reduplicant position.
"""

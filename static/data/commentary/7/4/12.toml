id = "7.4.12"
numericId = "74012"

[en]
simple = """
For @deva[क्र्यादि] roots @deva[शॄ], @deva[दॄ], and @deva[पॄ], the vowel may optionally shorten in perfect. @deva[शशार] or @deva[शशर].
"""

standard = """
@deva[क्र्यादि] @deva[शॄ]/@deva[दॄ]/@deva[पॄ] + @deva[लिट्] → optional @deva[ह्रस्व]. @deva[शॄ] → @deva[शशार] or @deva[शशर], @deva[दॄ] → @deva[ददार] or @deva[ददर], @deva[पॄ] → @deva[पपार] or @deva[पपर]. @deva[विभाषा] creates doublet perfect forms.
"""

advanced = """
@deva[विभाषा] for 9th-class @deva[शॄ]/@deva[दॄ]/@deva[पॄ] in @deva[लिट्]: optional @deva[ऊ]→@deva[उ] shortening. @deva[शशार]/@deva[शशर] 'tore', @deva[ददार]/@deva[ददर] 'split', @deva[पपार]/@deva[पपर] 'protected'. The optionality creates variant perfect paradigms for these three roots.
"""

id = "7.4.76"
numericId = "74076"

[en]
simple = """
In the reduplicated present (@deva[श्लु]-class) of @deva[भृ], @deva[मा] (@deva[माङ्]), and @deva[हा] (@deva[ओहाङ्]), the reduplicant vowel becomes @deva[इ]. @deva[बिभर्ति], @deva[मिमाति].
"""

standard = """
@deva[भृ]/@deva[माङ्]/@deva[ओहाङ्] (@deva[श्लु]-present) → @deva[अभ्यास]-vowel→@deva[इ]. @deva[भृ] → @deva[बिभर्ति] 'bears', @deva[मा] → @deva[मिमाति] 'measures', @deva[हा] → @deva[जिहाति] 'abandons'. The @deva[इ] replaces expected vowel.
"""

advanced = """
@deva[इ]-@deva[आदेश] for @deva[अभ्यास] of @deva[भृ]/@deva[माङ्]/@deva[ओहाङ्] in @deva[श्लु] (3rd class). @deva[बिभर्ति] (@deva[भृ]), @deva[मिमाति] (@deva[मा]), @deva[जिहाति] (@deva[हा]). The reduplicant takes @deva[इ] despite original vowels @deva[ऋ]/@deva[आ]. This creates their characteristic present stems.
"""

id = "7.4.91"
numericId = "74091"

[en]
simple = """
For @deva[ऋ]-penultimate roots, the augments apply only when intensive @deva[यङ्] is elided (@deva[यङ्लुक्]). @deva[नर्नर्ति], @deva[वरिवर्ति], @deva[वरीवर्ति].
"""

standard = """
@deva[ऋ]-@deva[उपधा] + @deva[यङ्लुक्] (elided intensive) → @deva[री]/@deva[रि]/@deva[र्]-@deva[आगम] options. @deva[नृत्] → @deva[नर्नर्ति], @deva[नरिनर्ति], @deva[नरीनर्ति]; @deva[वृत्] → @deva[वर्वर्ति], @deva[वरिवर्ति], @deva[वरीवर्ति]. Multiple forms when @deva[यङ्] is dropped.
"""

advanced = """
@deva[यङ्लुक्]-specific: @deva[ऋ]-@deva[उपधा] roots receive @deva[रीक्]/@deva[रुक्]/@deva[रिक्] augments (as @deva[रि]/@deva[र्]/@deva[री]) only when @deva[यङ्] is elided. @deva[नर्नर्ति]/@deva[नरिनर्ति]/@deva[नरीनर्ति] (@deva[नृत्]), @deva[वर्वर्ति]/@deva[वरिवर्ति]/@deva[वरीवर्ति] (@deva[वृत्]). The augment choice creates variant intensive forms.
"""

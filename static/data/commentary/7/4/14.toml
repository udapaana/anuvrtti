id = "7.4.14"
numericId = "74014"

[en]
simple = """
But before the compound-final affix @deva[कप्] after @[bahuvrīhi], @deva[अण्] vowels are not shortened. @deva[बहुकुमारीकः], @deva[बहुवधूकः].
"""

standard = """
@deva[बहुव्रीहि] + @deva[कप्] (@deva[समासान्त]) → no @deva[ह्रस्व] of @deva[अण्]. @deva[बहुकुमारीकः] 'having many maidens', @deva[बहुवधूकः] 'having many brides'. The compound-final context blocks shortening.
"""

advanced = """
Exception to @ref[7.4.13]: @deva[बहुव्रीहि]-@deva[समासान्त] @deva[कप्] doesn't trigger @deva[अण्]-shortening. @deva[बहुकुमारीकः], @deva[बहुवृषलीकः], @deva[बहुवधूकः] preserve long vowels. The @deva[समासान्त] environment distinguishes this from regular @deva[क]-affix shortening.
"""

id = "7.4.85"
numericId = "74085"

[en]
simple = """
In intensive, nasal-final roots add @deva[नुक्] after short @deva[अ] of reduplicant. @deva[तन्तन्यते] (from @deva[तन्]).
"""

standard = """
Nasal-final @deva[धातु] + @deva[यङ्] → @deva[नुक्]-@deva[आगम] after @deva[अभ्यास]-@deva[ह्रस्व]-@deva[अ]. @deva[तन्] → @deva[तन्तन्यते] 'stretches repeatedly', @deva[गन्] → @deva[गंगन्यते]. The @deva[न्]-augment appears after short @deva[अ].
"""

advanced = """
@deva[नुक्] (@deva[न्]) for @deva[यङ्]/@deva[यङ्लुक्] when root ends in @deva[अनुस्वार] (nasal). @deva[तन्तन्यते]/@deva[तंतन्ति] (@deva[तन्]), @deva[गंगन्यते]/@deva[गंगंति] (@deva[गन्]). The @deva[अभ्यास]-@deva[ह्रस्व]-@deva[अ] condition restricts to short-@deva[अ] reduplicants receiving the nasal augment.
"""

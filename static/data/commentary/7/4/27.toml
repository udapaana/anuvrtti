id = "7.4.27"
numericId = "74027"

[en]
simple = """
Final short @deva[ऋ] becomes @deva[री] before non-@deva[कृत्], non-@deva[सार्वधातुक] @deva[य्]-initial affixes and @deva[च्वि]. @deva[कर्त्रीयते].
"""

standard = """
@deva[ह्रस्व] @deva[ऋ]-@deva[अन्त] + @deva[य्]-@deva[आदि] (@deva[अ]-@deva[कृत्], @deva[अ]-@deva[सार्वधातुक])/@deva[च्वि] → @deva[री]-@deva[आदेश]. @deva[कर्तृ] → @deva[कर्त्रीयते], @deva[पितृ] → @deva[पित्रीकृत्य]. The @deva[ऋ] becomes @deva[री] in these contexts.
"""

advanced = """
@deva[री]-@deva[आदेश] for @deva[ह्रस्व]-@deva[ऋ] before specified @deva[य्]-initials and @deva[च्वि]. @deva[कर्त्रीयते], @deva[नेत्रीकृत्य], @deva[पित्रीभवति] show @deva[ऋ]→@deva[री]. This transformation is restricted to non-@deva[कृत्], non-@deva[सार्वधातुक] affixes, plus @deva[च्वि] specifically.
"""

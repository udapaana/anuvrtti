id = "7.4.11"
numericId = "74011"

[en]
simple = """
The roots @deva[ऋच्छ्], @deva[ॠ], and roots ending in long @deva[ॠ] take @deva[गुण] in the perfect. @deva[आनर्च्छ], @deva[आरतुः].
"""

standard = """
@deva[ऋच्छ्]/@deva[ॠ]/@deva[ॠकारान्त] + @deva[लिट्] → @deva[गुण]. @deva[ऋच्छ्] → @deva[आनर्च्छ], @deva[आनर्च्छतुः]; @deva[ॠ] 'to go' → @deva[आरतुः], @deva[आरुः]. These roots strengthen in perfect despite general non-@deva[गुण] patterns.
"""

advanced = """
@deva[लिट्] @deva[गुण] for @deva[ऋच्छ्], @deva[ॠ], and @deva[दीर्घ]-@deva[ॠ]-finals. @deva[आनर्च्छ] (@deva[ऋच्छ्]), @deva[आनर्च्छतुः], @deva[आनर्च्छुः]; @deva[आर] (@deva[ॠ]), @deva[आरतुः], @deva[आरुः]. This rule specifies @deva[गुण] where it might not otherwise apply, covering these specific @deva[ऋ]-containing roots in perfect.
"""

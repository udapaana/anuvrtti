id = "7.4.47"
numericId = "74047"

[en]
simple = """
When a vowel-ending prefix precedes, @deva[घु]-roots take @deva[त्] substitution before @deva[कित्] @deva[त्]-initial affixes. @deva[प्रत्तः] (@deva[प्र]+@deva[दा]+@deva[क्त]).
"""

standard = """
@deva[अच्]-@deva[अन्त] @deva[उपसर्ग] + @deva[घु] + @deva[कित्] @deva[त्]-@deva[आदि] → @deva[त्]-@deva[आदेश]. @deva[प्र] + @deva[दा] + @deva[क्त] → @deva[प्रत्तः] 'given forth', @deva[नि] + @deva[धा] + @deva[क्त] → @deva[निहितः]. The prefix conditions the substitution.
"""

advanced = """
@deva[उपसर्गपूर्वक] condition: @deva[अच्]-@deva[अन्त] (vowel-final) prefix + @deva[घु] → @deva[त्]-@deva[आदेश] before @deva[कित्] @deva[त्]-initial. @deva[प्रत्तः] (@deva[प्र]+@deva[दा]), @deva[निहितः] (@deva[नि]+@deva[धा]) demonstrate. The vowel-ending prefix triggers this specific substitution pattern for @deva[घु]-roots.
"""

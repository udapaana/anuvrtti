id = "7.4.73"
numericId = "74073"

[en]
simple = """
For @deva[भू] 'to be', the reduplicant vowel becomes @deva[अ] in the perfect. @deva[बभूव] 'became'.
"""

standard = """
@deva[भू] + @deva[लिट्] → @deva[अभ्यास]-vowel→@deva[अ]. @deva[बभूव] 'became', @deva[बभूवतुः], @deva[बभूवुः], @deva[बभूवे]. The expected @deva[ऊ] or @deva[उ] of reduplicant becomes @deva[अ].
"""

advanced = """
@deva[अ]-@deva[आदेश] for @deva[भू]'s @deva[अभ्यास] in @deva[लिट्]. @deva[बभूव], @deva[बभूवतुः], @deva[बभूवुः] (parasmai.); @deva[बभूवे] (@[ātmane].). The @deva[अ] (not @deva[उ]) creates the characteristic perfect of @deva[भू]. Other tenses show regular @deva[भ्] reduplication.
"""

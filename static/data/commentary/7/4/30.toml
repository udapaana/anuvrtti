id = "7.4.30"
numericId = "74030"

[en]
simple = """
Conjunct-preceded @deva[ऋ]-final roots take @deva[गुण] before intensive @deva[यङ्]. @deva[अरार्यते], @deva[स्मर्यते] (intensive).
"""

standard = """
@deva[संयोगपूर्वक] @deva[ऋकारान्त] + @deva[यङ्] (intensive) → @deva[गुण]. @deva[स्मृ] → @deva[सास्मर्यते], @deva[स्तृ] → @deva[तास्तर्यते] (intensive). The @deva[गुण] applies in intensive formation.
"""

advanced = """
@deva[यङ्]-triggered @deva[गुण] for @deva[संयोगपूर्वक]-@deva[ऋ]-finals in intensive (frequentative). @deva[सास्मर्यते], @deva[तास्तर्यते], @deva[चाचर्यते] show @deva[ऋ]→@deva[अर्] @deva[गुण] with intensive reduplication. This parallels @ref[7.4.29]'s passive pattern for the intensive context.
"""

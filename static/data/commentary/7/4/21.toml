id = "7.4.21"
numericId = "74021"

[en]
simple = """
The root @deva[शी] 'to lie' takes @deva[गुण] before @deva[सार्वधातुक] affixes. @deva[शेते] 'lies', @deva[शयाते], but @deva[शिश्ये] (@deva[आर्धधातुक]).
"""

standard = """
@deva[शी] + @deva[सार्वधातुक] → @deva[गुण]. @deva[शेते] (3sg present), @deva[शयाते] (3du), @deva[शेरते] (3pl). But @deva[शिश्ये] (perfect, @deva[आर्धधातुक]) retains @deva[ई]. The @deva[गुण] is tense-specific.
"""

advanced = """
@deva[सार्वधातुक]-triggered @deva[गुण] for @deva[शी] (@deva[ई]→@deva[ए]). @deva[शेते], @deva[शयाते], @deva[शेरते] in present. Perfect @deva[शिश्ये] (@deva[आर्धधातुक]) shows no @deva[गुण]—the distinction is affix-class based. This governs @deva[शी]'s present vs. perfect vowel patterns.
"""

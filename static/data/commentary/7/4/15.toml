id = "7.4.15"
numericId = "74015"

[en]
simple = """
Feminine @deva[आ]-stems optionally resist shortening before @deva[कप्]. @deva[बहुखट्वाकः] or @deva[बहुखट्वकः].
"""

standard = """
Feminine @deva[आकारान्त] + @deva[कप्] → optional @deva[ह्रस्व]. @deva[बहुखट्वाकः] or @deva[बहुखट्वकः], @deva[बहुमालाकः] or @deva[बहुमालकः]. @deva[विभाषा] allows both shortened and unshortened forms.
"""

advanced = """
@deva[विभाषा] for feminine @deva[आ] before @deva[कप्]: @deva[बहुखट्वाकः]/@deva[बहुखट्वकः], @deva[बहुमालाकः]/@deva[बहुमालकः]. This creates optionality specifically for @deva[आ]-feminine compounds with @deva[कप्], contrasting with @ref[7.4.14]'s obligatory non-shortening for @deva[ई]/@deva[ऊ].
"""

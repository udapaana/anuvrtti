id = "7.2.111"
numericId = "72111"

[en]
simple = """
In masculine nominative singular, @deva[अय्] replaces the @deva[इद्] of @deva[इदम्]. @deva[अयम्] 'this (m.)'.
"""

standard = """
For @deva[इदम्] in @deva[पुंल्लिङ्ग] @deva[प्रथमा]-@deva[एकवचन]: @deva[इद्] → @deva[अय्]: @deva[इदम्] → @deva[अयम्]. Compare: @deva[अयं] @deva[ब्राह्मणः] (m.), @deva[इयं] @deva[ब्राह्मणी] (f.).
"""

advanced = """
The @deva[इद्]→@deva[अय्] substitution replaces two sounds (@deva[इद्]) with two (@deva[अय्]). Combined with @deva[म्]-retention (@ref[7.2.108]), this creates @deva[अयम्]. The masculine/feminine split: @deva[अय्] (m., @ref[7.2.111]) vs. @deva[य्] (f., @ref[7.2.110]), both keeping final @deva[म्].
"""

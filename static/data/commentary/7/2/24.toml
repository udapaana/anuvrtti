id = "7.2.24"
numericId = "72024"

[en]
simple = """
Participle of @deva[अर्द्] doesn't take @deva[इट्] when preceded by @deva[सम्], @deva[नि], or @deva[वि]. @deva[समर्णः] 'plagued', @deva[न्यर्णः], @deva[व्यर्णः].
"""

standard = """
With prefixes @deva[सम्]/@deva[नि]/@deva[वि], @deva[अर्द्] + @deva[क्त] = @deva[अर्ण] (@deva[अनिट्], with @deva[द] → @deva[ण]): @deva[समर्णः], @deva[न्यर्णः], @deva[व्यर्णः]. Without these prefixes: @deva[अर्दितः] (@deva[सेट्]). Different root: @deva[समेधितः] (@deva[एध्], not @deva[अर्द्]).
"""

advanced = """
The three prefixes condition @deva[अनिट्] + @deva[द] → @deva[ण] change: @deva[सम्] + @deva[अर्द्] + @deva[क्त] → @deva[समर्ण]. Without prefix: @deva[अर्द्] + @deva[क्त] → @deva[अर्दित]. The restriction is @deva[उपसर्ग]-specific, not general—other prefixes would give @deva[अर्दित] forms. Note @deva[द] → @deva[ण] is also part of the irregularity.
"""

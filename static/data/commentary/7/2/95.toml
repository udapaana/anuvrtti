id = "7.2.95"
numericId = "72095"

[en]
simple = """
In dative singular, @deva[तुभ्य] replaces @deva[युष्म्] and @deva[मह्य] replaces @deva[अस्म्]. @deva[तुभ्यम्], @deva[मह्यम्].
"""

standard = """
For @deva[चतुर्थी]-@deva[एकवचन] (dative singular): @deva[युष्म्] → @deva[तुभ्य] (@deva[तुभ्यम्]), @deva[अस्म्] → @deva[मह्य] (@deva[मह्यम्]). Compounds: @deva[परमतुभ्यम्], @deva[परममह्यम्], @deva[अतितुभ्यम्], @deva[अतिमह्यम्].
"""

advanced = """
These suppletive forms are unique to the dative singular. The @deva[द्] + case-ending operations follow: @deva[तुभ्य] + @deva[द्] + @deva[ए] → @deva[तुभ्य] + @deva[अम्] (by @ref[7.1.27] @deva[आ]-substitute) → @deva[तुभ्यम्]. The compound forms show the full substitute.
"""

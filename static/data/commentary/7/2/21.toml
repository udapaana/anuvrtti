id = "7.2.21"
numericId = "72021"

[en]
simple = """
The irregular participle @deva[परिवृढ] from @deva[परि] + @deva[वृंह्] means 'Lord'. Other senses: @deva[परिवृहितम्], @deva[परिवृंहितम्].
"""

standard = """
@deva[परिवृढ] is irregular (like @deva[दृढ]) from @deva[वृह्]/@deva[वृंह्] with @deva[परि]-, meaning 'Lord'. Formation parallels @deva[दृढ]: @deva[ह]-elision first (anomalous), then derivation. Other meanings: @deva[परिवृहितम्], @deva[परिवृंहितम्]. Derivatives: @deva[परिव्रढयति], @deva[पारिवृढीकन्या].
"""

advanced = """
The @deva[ह]-elision occurs first (as anomaly), enabling further derivatives: @deva[परिव्रढय्य] (@deva[ल्यप्]), @deva[परिव्रढयति] (@deva[णिच्]). Though the full noun is @deva[परिवृढ], @deva[णिच्] is added to the @deva[ह]-elided form. The meaning '@deva[ईश्वर]' (Lord) restricts this irregular formation; other senses use regular @deva[सेट्] forms.
"""

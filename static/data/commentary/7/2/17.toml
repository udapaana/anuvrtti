id = "7.2.17"
numericId = "72017"

[en]
simple = """
After @deva[आदित्] roots, participle affixes optionally take @deva[इट्] when the sense is @deva[भाव] (impersonal) or @deva[आदि] (beginning of action). @deva[मिन्नम्] or @deva[मेदितम्] @deva[अनेन].
"""

standard = """
In @deva[भाव] (impersonal passive) or @deva[आदि] (inceptive) senses, @deva[आदित्] roots optionally take @deva[इट्] before @deva[निष्ठा]: @deva[मिन्नमनेन]/@deva[मेदितमनेन] (impersonal), @deva[प्रमिन्नः]/@deva[प्रमेदितः] (inceptive). The @deva[शौनक] school allows option even in passive sense for @deva[शक्]: @deva[शकितो]/@deva[शक्तो] @deva[घटः] @deva[कर्तुम्].
"""

advanced = """
This creates @deva[विकल्प] for @deva[आदित्] roots in two semantic contexts: (1) @deva[भाव]-@deva[प्रधान] (agent not prominent): @deva[मिन्नमनेन]/@deva[मेदितमनेन]; (2) @deva[क्रिया]-@deva[आदि] (action's beginning): @deva[प्रमिन्नः]/@deva[प्रमेदितः]. The @deva[शौनक]-@deva[मत] extends this option to @deva[कर्मणि] (passive) for @deva[शक्]: @deva[शकितो] @deva[घटः] @deva[कर्तुम्] alongside @deva[शक्तो] @deva[घटः].
"""

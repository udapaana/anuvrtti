id = "7.2.117"
numericId = "72117"

[en]
simple = """
Before @deva[ञित्] or @deva[णित्] taddhita affixes, @[vṛddhi] replaces the first vowel of the stem. @deva[गर्ग] + @deva[यञ्] → @deva[गार्ग्यः], @deva[उपगु] + @deva[अण्] → @deva[औपगवः].
"""

standard = """
For @deva[तद्धित] @deva[ञित्]/@deva[णित्] affixes, @deva[आदि]-@deva[स्वर] → @[vṛddhi]: @deva[गर्ग] + @deva[यञ्] → @deva[गार्ग्यः]; @deva[वत्स] → @deva[वात्स्यः]; @deva[दक्ष] + @deva[इञ्] → @deva[दाक्षिः]; @deva[उपगु] + @deva[अण्] → @deva[औपगवः]. This overrides @ref[7.2.115]-116.
"""

advanced = """
The @deva[तद्धित]-specific rule gives first-vowel @[vṛddhi], superseding final-vowel (@ref[7.2.115]) or penultimate (@ref[7.2.116]) rules. Examples: @deva[त्वष्ट्] + @deva[र] → @deva[त्वाष्ट्रः] (not *@deva[त्वष्ट्रः]); @deva[जगत्] + @deva[अण्] → @deva[जागतः]. The @deva[आदि] (first) vowel is strengthened regardless of position.
"""

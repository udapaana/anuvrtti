id = "7.2.76"
numericId = "72076"

[en]
simple = """
A consonant-initial (except @deva[य्]) @[sārvadhātuka] affix takes @deva[इट्] after @deva[रुद्] and four following roots (@deva[रुधादि]). @deva[रोदिति] 'weeps', @deva[स्वपिति] 'sleeps'.
"""

standard = """
For @deva[रुधादि] @deva[रुद्] + four followers, @deva[वल्]-initial @[sārvadhātuka] takes @deva[इट्]: @deva[रुद्] → @deva[रोदिति]; @deva[स्वप्] → @deva[स्वपिति]; @deva[श्वस्] → @deva[श्वसिति]; @deva[प्राण्] → @deva[प्राणिति]; @deva[जक्ष्] → @deva[जक्षिति]. But @deva[जागृ] (beyond five): @deva[जागर्ति]. Before @[ārdhadhātuka]: @deva[स्वप्ता]. Before vowel-initial: @deva[रुदन्ति].
"""

advanced = """
This establishes @[sārvadhātuka] @deva[इट्] for five specific @deva[रुधादि] roots. The restriction: @deva[वल्]-initial (consonant except @deva[य्]) + @[sārvadhātuka]. @deva[जागृ] is excluded (sixth in sequence): @deva[जागर्ति] (no @deva[इट्]). @[ārdhadhātuka] follows different rules: @deva[स्वप्ता]. Vowel-initial @[sārvadhātuka]: @deva[रुदन्ति] (no @deva[इट्] needed—vowel initial).
"""

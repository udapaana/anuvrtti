id = "7.2.89"
numericId = "72089"

[en]
simple = """
Before vowel-initial non-substitute case-endings, @deva[य] replaces the final of @deva[युष्मद्] and @deva[अस्मद्]. @deva[त्वया], @deva[मया], @deva[त्वयि], @deva[मयि].
"""

standard = """
For @deva[युष्मद्]/@deva[अस्मद्], @deva[द्] → @deva[य] before @deva[अजादि] @deva[अनादेश] (vowel-initial, non-substitute) @deva[सुप्]: @deva[त्वया] (inst.), @deva[मया], @deva[त्वयि] (loc.), @deva[मयि], @deva[युवयोः] (gen./loc.du.), @deva[आवयोः]. Before @deva[हलादि]: @deva[युवाभ्याम्], @deva[आवाभ्याम्] (@ref[7.2.86]'s @deva[आ] applies).
"""

advanced = """
This is @deva[अपवाद] to @ref[7.2.86] (which gives @deva[आ]). Conditions: @deva[अचि] (vowel-initial), @deva[अनादेशे] (non-substitute). If @ref[7.2.86] had @deva[हलि]-anuvrtti, this @deva[अचि] rule would be the general rule. The interaction: @ref[7.2.86] (@deva[आ], general) → @ref[7.2.89] (@deva[य], for vowel-initial).
"""

id = "7.2.52"
numericId = "72052"

[en]
simple = """
@deva[क्त्वा], @deva[क्त], and @deva[क्तवतु] invariably take @deva[इट्] after @deva[वस्] 'dwell' and @deva[क्षुध्]. @deva[उषित्वा], @deva[उषितः]; @deva[क्षुधित्वा], @deva[क्षुधितः].
"""

standard = """
After @deva[वस्] 'to dwell' and @deva[क्षुध्] 'to be hungry', these affixes are @deva[नित्य]-@deva[सेट्]: @deva[उषित्वा], @deva[उषितः], @deva[उषितवान्]; @deva[क्षुधित्वा], @deva[क्षुधितः], @deva[क्षुधितवान्]. The @deva[इट्]-repetition makes it obligatory, not optional.
"""

advanced = """
The @deva[अदादि] @deva[वस्] 'to dwell' is listed as @deva[सेट्]. The @deva[इट्]-repetition stops the 'optionally' (@deva[विभाषा]) anuvrtti from @ref[7.2.51], making this @deva[नित्य]. Both roots become invariably @deva[सेट्] for these three affixes regardless of other rules.
"""

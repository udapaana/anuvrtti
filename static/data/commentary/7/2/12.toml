id = "7.2.12"
numericId = "72012"

[en]
simple = """
The desiderative @deva[सन्] doesn't take @deva[इट्] after @deva[ऊक्]-final roots, @deva[ग्रह्], and @deva[गुह्]. @deva[जिघृक्षति] 'wishes to seize', @deva[जुघुक्षति] 'wishes to hide'.
"""

standard = """
Before @deva[सन्] (desiderative), these are @deva[अनिट्]: (1) @deva[ऊक्]-finals (@deva[उ]/@deva[ऊ]/@deva[ऋ]/@deva[ॠ]): @deva[रुरूषति], @deva[लुलूषति]; (2) @deva[ग्रह्]: @deva[जिघृक्षति]; (3) @deva[गुह्]: @deva[जुघुक्षति]. The @deva[श्रि]-anuvrtti doesn't apply (@deva[श्रि] has option by @ref[6.2.4]).
"""

advanced = """
Normally @deva[ग्रह्] would be @deva[सेट्], and @deva[गुह्] (@deva[ऊदित्]) would be optionally @deva[सेट्] by @ref[7.2.44]. This @[sūtra] makes both @deva[अनिट्] specifically before @deva[सन्]. Derivation: @deva[ग्रह्] + @deva[सन्] → @deva[जि] + @deva[घृ] + @deva[क्ष] → @deva[जिघृक्षति] (with @deva[घुक्]-treatment). The @deva[ऊक्]-finals follow naturally: @deva[कृ] + @deva[सन्] → @deva[चिकीर्षति].
"""

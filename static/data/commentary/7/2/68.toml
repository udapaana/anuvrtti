id = "7.2.68"
numericId = "72068"

[en]
simple = """
The perfect participle @deva[वस्] optionally takes @deva[इट्] after @deva[गम्], @deva[हन्], @deva[विद्] 'know', @deva[विश्]. @deva[जग्मिवान्] or @deva[जगन्वान्].
"""

standard = """
Optional @deva[इट्] for @deva[वस्] after: @deva[गम्] → @deva[जग्मिवान्]/@deva[जगन्वान्] (@deva[म]→@deva[न] by @ref[8.2.64]); @deva[हन्] → @deva[जघ्निवान्]/@deva[जघन्वान्]; @deva[विद्] 'know' (@deva[तुदादि]) → @deva[विविदिवान्]/@deva[विविद्वान्]; @deva[विश्] → @deva[विविशिवान्]/@deva[विविश्वान्].
"""

advanced = """
The @deva[विद्] here is @deva[तुदादि] @deva[विद्] 'to acquire', grouped with @deva[विश्] (both with @deva[इ] as root vowel). The @deva[अनिट्] forms show characteristic changes: @deva[म]→@deva[न] (@deva[जगन्वान्]), retention of full consonant (@deva[विविद्वान्]). The doublets reflect optional morphological patterns in perfect participle formation.
"""

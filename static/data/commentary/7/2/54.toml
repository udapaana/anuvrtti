id = "7.2.54"
numericId = "72054"

[en]
simple = """
@deva[क्त्वा], @deva[क्त], and @deva[क्तवतु] take @deva[इट्] after @deva[तुदादि] @deva[लुभ्] when meaning 'entangled/confused'. @deva[विलुभिताः] @deva[केशाः] 'tangled hair'.
"""

standard = """
With @deva[विमोहन] (entanglement/confusion) meaning, @deva[तुदादि] @deva[लुभ्] takes @deva[इट्]: @deva[लुभित्वा]/@deva[लोभित्वा], @deva[विलुभिताः] @deva[केशाः], @deva[विलुभितः] @deva[सीमन्तः], @deva[विलुभितानि] @deva[पदानि]. @deva[विमोहनम्] = @deva[आकुलीकरणम्] 'making confused'.
"""

advanced = """
@deva[लुभ्] being in @ref[7.2.48]'s list would have optional @deva[इट्] for @deva[त]-initial affixes, making @deva[निष्ठा] always @deva[अनिट्] by @ref[7.2.15]. This @[sūtra] ensures @deva[इट्] for the 'entanglement' meaning specifically. The meaning-restriction (@deva[विमोहने]) distinguishes from other senses of @deva[लुभ्].
"""

id = "7.2.9"
numericId = "72009"

[en]
simple = """
These @[kṛt] affixes don't take @deva[इट्]: @deva[ति], @deva[तु], @deva[त्र], @deva[त], @deva[थ], @deva[सि], @deva[सु], @deva[सर], @deva[क], @deva[स]. @deva[क्तिच्] → @deva[तन्तिः], @deva[क्त] → @deva[दीप्तः].
"""

standard = """
Ten affix-initials are @deva[अनिट्]: @deva[क्तिच्] → @deva[तन्तिः] (not *@deva[तनितिः]); @deva[तुन्] → @deva[सक्तुः]; @deva[ष्ट्रन्] → @deva[पत्त्रम्]; @deva[क्त] → @deva[दीप्तः]; @deva[क्थन्] → @deva[रथः]; @deva[सिच्] (aorist); @deva[तुसुन्]; @deva[सरन्]; @deva[कन्]; @deva[सन्]. Compare: @deva[तनिता], @deva[पतितुम्] (other affixes with @deva[इट्]).
"""

advanced = """
This list specifies @deva[अनिट्] @[kṛt] affixes by initial consonant. Examples: (1) @deva[ति]: @deva[क्तिच्]/@deva[क्तिन्] → @deva[तन्तिः], @deva[दीप्तिः]; (2) @deva[तु]: @deva[तुन्] → @deva[सक्तुः]; (3) @deva[त्र]: @deva[ष्ट्रन्] → @deva[पत्त्रम्]; (4) @deva[त]: @deva[क्त] → @deva[दीप्तः], @deva[मुष्टः]; (5) @deva[थ]: @deva[क्थन्] → @deva[रथः]; (6-10) various @deva[सि]/@deva[सु]/@deva[सर]/@deva[क]/@deva[स]-initial affixes. This creates the core @deva[अनिट्]-@[kṛt] classification.
"""

The form @deva[ससनिवांसम्] violates several expected rules: (1) @deva[इट्] added (unexpected for this root), (2) @deva[अ] not changed to @deva[ए] (expected before @deva[इट्]), (3) reduplicate retained (usually elided before @deva[वस्]). This is a @deva[निपातन] specific to the Vedic phrase @deva[सनिं] @deva[ससनिवांसम्]. Classical: @deva[सैनिवांसम्].

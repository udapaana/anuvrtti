standard = """
Vedic irregular: @deva[ससनिवांसम्] (from @deva[सन्]) in @deva[अञ्जित्वाग्ने] @deva[सनिं] @deva[ससनिवांसम्]. Irregularities: @deva[इट्] added, no @deva[अ]→@deva[ए] change, no reduplicate elision before @deva[वस्]. In non-Vedic: @deva[सैनिवांसम्]. When not preceded by @deva[सनिम्]: @deva[संनिवांसम्].

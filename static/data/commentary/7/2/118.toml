id = "7.2.118"
numericId = "72118"

[en]
simple = """
Before @deva[कित्] taddhita affixes, @[vṛddhi] replaces the first vowel of the stem. @deva[नड] + @deva[फक्] → @deva[नाडायन्], @deva[अक्षि] + @deva[ठक्] → @deva[आक्षिकः].
"""

standard = """
For @deva[तद्धित] @deva[कित्] affixes, @deva[आदि]-@deva[स्वर] → @[vṛddhi]: @deva[नड] + @deva[फक्] → @deva[नाडायन्] (@ref[4.1.99]); @deva[चर] → @deva[चारायणः]; @deva[अक्षि] + @deva[ठक्] → @deva[आक्षिकः] (@ref[4.4.1]); @deva[शाला] + @deva[ठक्] → @deva[शालाकिकः].
"""

advanced = """
This extends @ref[7.2.117]'s pattern to @deva[कित्] taddhitas. The @deva[फक्], @deva[ठक्], and similar @deva[कित्] affixes trigger first-vowel @[vṛddhi]. Combined with @ref[7.2.117], this covers all taddhita affixes with @deva[ञ्], @deva[ण्], or @deva[क्] markers as triggering @deva[आदि]-@[vṛddhi].
"""

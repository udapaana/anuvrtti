id = "7.2.28"
numericId = "72028"

[en]
simple = """
Participle affixes optionally take @deva[इट्] after @deva[रुष्], @deva[अम्], @deva[त्वर्], @deva[संघुष्], @deva[आस्वन्]. @deva[रुष्टः] or @deva[रुषितः] 'angry'.
"""

standard = """
These roots have optional @deva[इट्] before @deva[निष्ठा]: @deva[रुष्टः]/@deva[रुषितः], @deva[अभ्यान्तः]/@deva[अभ्यमितः], @deva[तूर्णः]/@deva[त्वरितः], @deva[संघुष्टः]/@deva[संघुषितः], @deva[आस्वान्तः]/@deva[आस्वनितः]. @deva[रुष्] would be @deva[नित्य]-@deva[अनिट्] by @ref[7.2.15] (via @ref[7.2.48]), so this enables the option.
"""

advanced = """
@deva[रुष्] is optionally @deva[सेट्] by @ref[7.2.48], making it @deva[नित्य]-@deva[अनिट्] before @deva[निष्ठा] by @ref[7.2.15]. This @[sūtra] overrides that to allow @deva[विकल्प]. @deva[त्वर्] appears as @deva[त्वर] in @deva[धातुपाठ], also by @ref[7.2.48] optionally @deva[सेट्]. The forms @deva[तूर्ण] (@deva[ऊ] from @[vṛddhi], @deva[र्]-metathesis) and @deva[त्वरित] show the two patterns.
"""

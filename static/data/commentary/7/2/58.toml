id = "7.2.58"
numericId = "72058"

[en]
simple = """
@deva[स्]-initial @[ārdhadhātuka] affixes take @deva[इट्] after @deva[गम्] 'to go' in parasmaipada. @deva[गमिष्यति], @deva[अगमिष्यत्], @deva[जिगमिषति].
"""

standard = """
For @deva[गम्] in parasmaipada, @deva[स्]-initial affixes are @deva[नित्य]-@deva[सेट्]: @deva[गमिष्यति] (future), @deva[अगमिष्यत्] (conditional), @deva[जिगमिषति] (desiderative). @deva[इट्]-repetition = invariable. In @[ātmanepada]: @deva[संगंसीष्ट]/@deva[संगसीष्ट], @deva[संगंस्यते], etc. (different pattern).
"""

advanced = """
The parasmaipada restriction isolates the @deva[सेट्] behavior. @[ātmanepada] shows different patterns: @deva[संगंसीष्ट] (with nasal), @deva[संजिगंसते] (desiderative), etc. The @deva[गम्]-lengthening (@deva[गाम्]) occurs in certain @[ātmanepada] forms. This voice-based asymmetry is characteristic of @deva[गम्].
"""

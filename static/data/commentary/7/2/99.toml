id = "7.2.99"
numericId = "72099"

[en]
simple = """
In feminine, @deva[तिसृ] replaces @deva[त्रि] and @deva[चतसृ] replaces @deva[चतुर्] before case-endings. @deva[तिस्रः], @deva[चतस्रः], @deva[तिसृभिः], @deva[चतसृभिः].
"""

standard = """
For @deva[स्त्रीलिङ्ग] (feminine), before @deva[विभक्ति]: @deva[त्रि] → @deva[तिसृ] (@deva[तिस्रः], @deva[तिसृभिः]), @deva[चतुर्] → @deva[चतसृ] (@deva[चतस्रः], @deva[चतसृभिः]). Not in masculine/neuter: @deva[त्रयः], @deva[चत्वारः], @deva[त्रीणि], @deva[चत्वारि].
"""

advanced = """
The @deva[स्त्रियाम्] condition qualifies @deva[त्रि]/@deva[चतुर्], not @deva[अङ्ग]—so even when the @[aṅga] refers to masculine items but requires feminine agreement, the substitution applies. This creates the distinctive feminine numeral paradigm: @deva[तिस्र]-, @deva[चतस्र]-.
"""

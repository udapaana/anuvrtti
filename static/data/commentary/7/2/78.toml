id = "7.2.78"
numericId = "72078"

[en]
simple = """
The @[sārvadhātuka] @deva[से] and @deva[ध्वे] take @deva[इट्] after @deva[अदादि] @deva[ईड्] and @deva[जन्]. @deva[ईडिषे], @deva[ईडिध्वे], @deva[जनिषे], @deva[जनिध्वे].
"""

standard = """
For @deva[ईड्] and @deva[जन्], @deva[से] and @deva[ध्वे] take @deva[इट्]: @deva[ईडिध्वे], @deva[ईडिध्वम्], @deva[ईडिषे], @deva[ईडिष्व]; @deva[जनिध्वे], @deva[जनिध्वम्], @deva[जनिषे], @deva[जनिष्व]. @deva[जन्] here is @deva[जनी] (IV.41) with @deva[श्यन्] elided as Vedic irregularity.
"""

advanced = """
Two endings: @deva[से] (2nd sg.) and @deva[ध्वे] (2nd pl.). For @deva[जन्] (@deva[दिवादि] @deva[जनी]), the @deva[श्यन्]-@[vikaraṇa] is elided as Vedic irregularity, allowing direct @deva[इट्]-insertion. The @deva[ध्वे] → @deva[ध्वम्] change in imperative follows standard patterns. This extends @ref[7.2.77]'s scope to include @deva[ध्वे] and add @deva[जन्].
"""

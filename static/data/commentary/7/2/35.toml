id = "7.2.35"
numericId = "72035"

[en]
simple = """
An @[ārdhadhātuka] affix beginning with a consonant (except @deva[य्]) takes the @deva[इट्] augment. @deva[लू] → @deva[लविता], @deva[लवितुम्], @deva[लवितव्यम्].
"""

standard = """
This is the core @deva[इट्]-augment rule: @[ārdhadhātuka] affixes starting with @deva[वल्] (consonants except @deva[य्]) take @deva[इट्]: @deva[लविता], @deva[लवितुम्], @deva[लवितव्यम्]; @deva[पविता], @deva[पवितुम्], @deva[पवितव्यम्]. Not for @[sārvadhātuka]: @deva[आस्ते], @deva[वस्ते] (no @deva[इट्]).
"""

advanced = """
The @deva[वलादि] (@deva[वल्]-initial = consonant except @deva[य्]) condition plus @deva[आर्धधातुक] status triggers @deva[इट्]. The @deva[नियम] of @ref[7.2.76] (@deva[इट्] for @[sārvadhātuka] of @deva[रुधादि]) prevents this rule from blocking @[sārvadhātuka] @deva[इट्]. This establishes the default @deva[सेट्] behavior for @[ārdhadhātuka] affixes, with exceptions in prior @[sūtras].
"""

id = "7.2.73"
numericId = "72073"

[en]
simple = """
The parasmaipada @deva[स्]-aorist with @deva[सक्] augment takes @deva[इट्] after @deva[यम्], @deva[रम्], @deva[नम्], and @deva[आ]-final roots. @deva[अयंसीत्], @deva[व्यरंसीत्], @deva[अपासीत्].
"""

standard = """
For @deva[यम्]/@deva[रम्]/@deva[नम्] and @deva[आकार]-finals, parasmaipada @deva[सिच्] + @deva[सक्] is @deva[सेट्]: @deva[यम्] → @deva[अयंसीत्], @deva[अयंसिष्टाम्], @deva[अयंसिषुः]; @deva[रम्] (with @deva[वि]/@deva[आ]) → @deva[व्यरंसीत्]; @deva[नम्] → @deva[अनंसीत्]; @deva[आ]-finals → @deva[अपासीत्], @deva[अदासीत्].
"""

advanced = """
The @deva[सक्]-augment (@deva[सकार] at end) + @deva[इट्] creates the -@deva[ंसी]- pattern. @deva[रम्] is parasmaipada only with @deva[वि]/@deva[आ] (@ref[1.3.83]). The @deva[आकारान्त] class includes @deva[पा], @deva[दा], etc.: @deva[अपासीत्] (@deva[पा]), @deva[अदासीत्] (@deva[दा]), with @deva[सक्] + @deva[इट्] mandatory. This specific morphological combination is mandated for these roots.
"""

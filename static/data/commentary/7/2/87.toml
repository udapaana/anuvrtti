id = "7.2.87"
numericId = "72087"

[en]
simple = """
Before accusative case-endings, @deva[आ] replaces the final of @deva[युष्मद्] and @deva[अस्मद्]. @deva[त्वाम्], @deva[माम्], @deva[युवाम्], @deva[आवाम्], @deva[युष्मान्], @deva[अस्मान्].
"""

standard = """
For @deva[युष्मद्]/@deva[अस्मद्], @deva[द्] → @deva[आ] before @deva[द्वितीया] (accusative): @deva[त्वाम्] (sg.), @deva[युवाम्] (du.), @deva[युष्मान्] (pl.); @deva[माम्], @deva[आवाम्], @deva[अस्मान्]. This applies even to substitute endings (unlike @ref[7.2.86]).
"""

advanced = """
This extends @deva[आ]-substitution to accusative, including substitute endings. The stem changes (@deva[त्व]/@deva[म] for sg., @deva[युव]/@deva[आव] for du., by @ref[7.2.97]) combine with @deva[आ]: @deva[त्व] + @deva[आ] + @deva[अम्] → @deva[त्वाम्]. Cross-references: @ref[7.2.28]-29 (stem substitutes), @ref[7.2.92], 7.2.97.
"""

id = "7.2.51"
numericId = "72051"

[en]
simple = """
@deva[क्त्वा], @deva[क्त], and @deva[क्तवतु] optionally take @deva[इट्] after @deva[पू]. @deva[पूत्वा] or @deva[पवित्वा], @deva[पूतः] or @deva[पवितः].
"""

standard = """
After @deva[पू] 'to purify', optional @deva[इट्]: @deva[पूत्वा]/@deva[पवित्वा], @deva[अतिपूतः]/@deva[अतिपवितः] (@deva[सोमः]), @deva[पूतवान्]/@deva[पवितवान्]. This allows option where @ref[7.2.11] would have prohibited @deva[इट्]. See also 1.2.22.
"""

advanced = """
By @ref[7.2.11], @deva[पू] as @deva[एकाच्] @deva[ऊक्]-final would be @deva[अनिट्] before @deva[फित्] affixes. This @[sūtra] creates @deva[विकल्प] specifically for these three affixes. The semantic example @deva[सोमोऽतिपूतः]/@deva[अतिपवितः] shows both forms in ritual context.
"""

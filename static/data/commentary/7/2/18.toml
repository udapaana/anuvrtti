id = "7.2.18"
numericId = "72018"

[en]
simple = """
These words are formed without @deva[इट्] only in specific senses: @deva[क्षुब्ध] 'churning stick', @deva[स्वान्त] 'mind', @deva[ध्वान्त] 'darkness', @deva[लग्न] 'attached', etc.
"""

standard = """
Specific meaning-restricted @deva[अनिट्] forms: (1) @deva[क्षुब्ध] = churning stick (not 'agitated' → @deva[क्षुभित]); (2) @deva[स्वान्त] = mind; (3) @deva[ध्वान्त] = darkness; (4) @deva[लग्न] = attached; (5) @deva[म्लिष्ट] = indistinct; (6) @deva[विरब्ध] = musical note; (7) @deva[फाण्ट] = effortless; (8) @deva[बाढ] = excessive.
"""

advanced = """
These are @deva[अर्थ]-@deva[नियम] (meaning-restrictions): the @deva[अनिट्] form has a specialized meaning, while the @deva[सेट्] form has the general meaning. @deva[क्षुब्ध] (churning stick) vs. @deva[क्षुभित] (disturbed); @deva[ध्वान्त] (darkness as noun) vs. @deva[ध्वनित] (sounded). This lexical split shows how phonological variants acquire semantic specialization.
"""

id = "7.2.72"
numericId = "72072"

[en]
simple = """
The parasmaipada @deva[स्]-aorist (@deva[सिच्]) takes @deva[इट्] after @deva[स्तु], @deva[सु], and @deva[धूञ्]. @deva[आस्तावीत्], @deva[असावीत्], @deva[अधावीत्].
"""

standard = """
In parasmaipada, @deva[सिच्] is @deva[सेट्] for: @deva[स्तु] → @deva[आस्तावीत्]; @deva[सु] → @deva[असावीत्]; @deva[धूञ्] → @deva[अधावीत्]. In @[ātmanepada]: @deva[अस्तोष्ट], @deva[असोष्ट], @deva[आधोष्ट]/@deva[अधविष्ट] (different pattern). Exception to @ref[7.2.10] and 7.2.44.
"""

advanced = """
These roots would be @deva[अनिट्] by @ref[7.2.10] (@deva[एकाच्]+@deva[अनुदात्त]) or optionally @deva[सेट्] by @ref[7.2.44] (@deva[ऊदित्]). This @[sūtra] mandates @deva[सेट्] for parasmaipada @deva[सिच्] specifically. The voice asymmetry: parasmaipada = @deva[सेट्] (@deva[आस्तावीत्]); @[ātmanepada] = @deva[अनिट्] or optional (@deva[अस्तोष्ट]).
"""

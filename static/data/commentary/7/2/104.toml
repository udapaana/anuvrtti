id = "7.2.104"
numericId = "72104"

[en]
simple = """
Before @deva[त]-initial or @deva[ह]-initial case-endings, @deva[कु] replaces @deva[किम्]. @deva[कुतः], @deva[कुत्र], @deva[कुह].
"""

standard = """
For @deva[किम्] before @deva[ति]-@deva[आदि] (@deva[त]-initial) or @deva[ह]-initial @deva[विभक्ति]: @deva[कु] replaces @deva[किम्]: @deva[कुतः] (@ref[5.3.7]), @deva[कुत्र] (@ref[5.3.13]), @deva[कुह]. The @deva[ति] means 'beginning with @deva[त]'.
"""

advanced = """
The @deva[त]/@deva[ह]-initial endings include ablative-type forms (@deva[तस्]) and locative variants (@deva[त्र], @deva[ह]). The @deva[कु]-substitute creates the characteristic interrogative adverbs: @deva[कुतः] 'whence', @deva[कुत्र] 'where', @deva[कुह] 'where' (Vedic). These are frozen forms with case-like meanings.
"""

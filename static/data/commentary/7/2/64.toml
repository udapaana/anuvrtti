id = "7.2.64"
numericId = "72064"

[en]
simple = """
In Vedic, these irregular perfect forms occur: @deva[बभूथ] (for @deva[बभूविथ]), @deva[आततन्थ] (for @deva[आतेनिथ]), @deva[जगृभ] (for @deva[जगृहिम]), @deva[ववर्थ] (for @deva[ववरिथ]).
"""

standard = """
Vedic irregular perfect forms: @deva[बभूथ] = @deva[बभूविथ] (@deva[त्वं] @deva[हि] @deva[होता] @deva[प्रथमो] @deva[बभूथ]); @deva[आततन्थ] = @deva[आतेनिथ] (@deva[येनान्तरिक्षभुर्वाततन्थ]); @deva[जगृभ] = @deva[जगृहिम]; @deva[ववर्थ] = @deva[ववरिथ] (@deva[ववर्थ] @deva[त्वं] @deva[हि] @deva[ज्योतिषा]). These show @deva[इट्]-absence or stem irregularities.
"""

advanced = """
These @deva[निपातन] forms show: @deva[बभूथ] (no @deva[इट्], @deva[वि] elision); @deva[आततन्थ] (@deva[त] for @deva[इट्], @deva[न] for @deva[न्]); @deva[जगृभ] (@deva[म] → @deva[भ], no @deva[इट्]); @deva[ववर्थ] (for @deva[ववरिथ], also a @deva[नियम] for @deva[वृ] per @ref[7.2.13]). The Vedic forms preserve archaic perfect morphology that differs from classical patterns.
"""

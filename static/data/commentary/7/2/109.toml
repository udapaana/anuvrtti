id = "7.2.109"
numericId = "72109"

[en]
simple = """
Before case-endings, @deva[म्] replaces the @deva[द्] of @deva[इदम्]. @deva[इमौ], @deva[इमे], @deva[इमम्], @deva[इमान्].
"""

standard = """
For @deva[इदम्] before @deva[विभक्ति]: @deva[द्] → @deva[म्]: @deva[इदम्] + @deva[अम्] → @deva[इद] + @deva[अ] (@ref[7.2.102]) + @deva[अम्] → @deva[इम] + @deva[अ] (@ref[7.2.109]) + @deva[अम्] → @deva[इमम्] (@ref[6.1.97], @ref[6.1.107]). Similarly: @deva[इमौ], @deva[इमे], @deva[इमान्].
"""

advanced = """
Derivation: @deva[इदम्] + @deva[औ] → @deva[इद] + @deva[अ] + @deva[औ] (@ref[7.2.102]) → @deva[इम] + @deva[अ] + @deva[औ] (@deva[द्]→@deva[म्], @ref[7.2.109]) → @deva[इमौ] (sandhi). This @deva[द्]→@deva[म्] creates the characteristic @deva[इम]- stem seen in most cases of @deva[इदम्].
"""

id = "7.2.62"
numericId = "72062"

[en]
simple = """
After short @deva[अ]-roots (in @deva[धातुपाठ]) that are @deva[अनिट्] before @deva[तास्], the perfect @deva[थल्] is also @deva[अनिट्]. @deva[पक्ता] → @deva[पपक्थ], @deva[शक्ता] → @deva[शशक्थ].
"""

standard = """
For @deva[धातुपाठ]-original short-@deva[अ] roots that invariably lack @deva[इट्] before @deva[तास्], @deva[थल्] also lacks @deva[इट्]: @deva[पक्ता] (future) → @deva[पपक्थ] (perfect); @deva[यष्टा] → @deva[इयष्ठ]; @deva[शक्ता] → @deva[शशक्थ]. The 'original' condition matters.
"""

advanced = """
The @deva[उपदेश] (original listing) condition distinguishes: @deva[धातुपाठ]-original @deva[अकार] (@deva[पच्], @deva[यज्], @deva[शक्]) → @deva[अनिट्]. But derived @deva[अकार] (from @[guṇa] of @deva[इ]/@deva[उ]) doesn't count: roots like @deva[चि] → @deva[चय्] (derived @deva[अ]) don't fall under this. The @deva[तास्]-@deva[अनिट्] → @deva[थल्]-@deva[अनिट्] correlation continues.
"""

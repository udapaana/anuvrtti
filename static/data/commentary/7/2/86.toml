id = "7.2.86"
numericId = "72086"

[en]
simple = """
Before non-substitute case-endings, @deva[आ] replaces the final of @deva[युष्मद्] and @deva[अस्मद्]. @deva[युष्माभिः], @deva[अस्माभिः], @deva[युष्मासु], @deva[अस्मासु].
"""

standard = """
For @deva[युष्मद्]/@deva[अस्मद्], @deva[द्] → @deva[आ] before original (non-substitute) @deva[सुप्]: @deva[युष्माभिः], @deva[अस्माभिः], @deva[युष्मासु], @deva[अस्मासु]. Before substitute endings (@ref[7.1.27] etc.): @deva[युष्मत्], @deva[अस्मत्] (@ref[7.1.31]—no @deva[आ]).
"""

advanced = """
The @deva[अनादेशे] condition: only original case-endings, not substitutes (like @deva[अत्] for @deva[भ्यस्] in @ref[7.1.31]). If @deva[हलि] were read from @ref[7.2.85], @deva[अनादेशे] would be redundant. Since it's stated, @deva[हलि]-anuvrtti is not meant here. This rule is general (@deva[उत्सर्ग]), with @ref[7.2.89] as exception (@deva[अपवाद]).
"""

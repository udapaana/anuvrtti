id = "7.2.91"
numericId = "72091"

[en]
simple = """
The substitutes taught through @ref[7.2.98] replace the portion of @deva[युष्मद्] and @deva[अस्मद्] up to @deva[म्] (i.e., @deva[युष्म्] and @deva[अस्म्]). @deva[युवाम्] = @deva[युव] replaces @deva[युष्म्].
"""

standard = """
Substitutes in @ref[7.2.92]-98 replace @deva[युष्म्] and @deva[अस्म्] (up to @deva[म्]): @deva[युव]/@deva[आव] (dual) replace @deva[युष्म्]/@deva[अस्म्], giving @deva[युवाम्], @deva[आवाम्]. The final @deva[द्] remains for further operations. Why 'up to @deva[म्]'? See @deva[युवकाम्], @deva[आवकाम्] (with @deva[अकच्]).
"""

advanced = """
This @[adhikāra] defines the scope of replacement: @deva[युष्म्] and @deva[अस्म्] (the portion before final @deva[द्]). The @deva[द्] is then handled by @ref[7.2.86]-90. The @deva[अकच्]-augmented forms (@deva[युवकाम्]) show the @deva[म्]-boundary: @deva[अकच्] attaches after @deva[म्], so @deva[युव] replaces only @deva[युष्म्], leaving @deva[क] + @deva[द्] for @deva[अकच्] + @deva[द्]-lopa.
"""

id = "7.2.94"
numericId = "72094"

[en]
simple = """
In nominative singular, @deva[त्व] replaces @deva[युष्म्] and @deva[अह] replaces @deva[अस्म्]. @deva[त्वम्], @deva[अहम्].
"""

standard = """
For @deva[प्रथमा]-@deva[एकवचन] (nominative singular): @deva[युष्म्] → @deva[त्व] (@deva[त्वम्]), @deva[अस्म्] → @deva[अह] (@deva[अहम्]). Compounds: @deva[परमत्वम्], @deva[परमाहम्], @deva[अतित्वम्], @deva[अत्यहम्]. See @ref[7.1.28], @ref[6.1.97], 6.1.107.
"""

advanced = """
The @deva[अह] substitute for @deva[अस्म्] creates the distinctive first-person form. Cross-references: @ref[7.1.28] (ending operations), @ref[6.1.97]-107 (sandhi). Compound forms show @deva[त्व]/@deva[अह] in prior position: @deva[अतित्वम्] = @deva[अतिक्रान्तः] @deva[त्वम्].
"""

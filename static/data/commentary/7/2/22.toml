id = "7.2.22"
numericId = "72022"

[en]
simple = """
Participle of @deva[कष्] doesn't take @deva[इट्] when meaning 'difficult' or 'impenetrable'. @deva[कष्टोऽग्निः] 'fire-worship is difficult', @deva[कष्टानि] @deva[वनानि] 'impervious forests'.
"""

standard = """
@deva[कष्] + @deva[क्त] = @deva[कष्ट] (@deva[अनिट्]) only for 'difficult/impenetrable': @deva[कष्टोऽग्निः] (fire-ritual is difficult), @deva[कष्टं] @deva[व्याकरणम्] (grammar is difficult), @deva[कष्टानि] @deva[वनानि] (impervious forests). Otherwise: @deva[कषित] (general meaning).
"""

advanced = """
The @deva[कष्ट]/@deva[कषित] split follows meaning: @deva[कष्ट] is lexicalized for 'difficulty/inaccessibility', while @deva[कषित] retains the verbal 'rubbed/scratched' sense. The famous example: @deva[कष्टोऽग्निः], @deva[कष्टं] @deva[व्याकरणं], @deva[ततोऽपि] @deva[कष्टतराणि] @deva[सामानि] 'fire-worship is hard, grammar harder, @[sāmaveda] hardest.'
"""

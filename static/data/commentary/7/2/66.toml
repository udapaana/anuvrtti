id = "7.2.66"
numericId = "72066"

[en]
simple = """
The perfect ending @deva[थल्] takes @deva[इट्] after @deva[अद्], @deva[ॠ], and @deva[व्यय्]. @deva[आदिथ] 'you ate', @deva[आरिथ] 'you went', @deva[संविव्ययिथ].
"""

standard = """
After these roots, @deva[थल्] is @deva[नित्य]-@deva[सेट्]: @deva[अद्] → @deva[आदिथ]; @deva[ॠ] → @deva[आरिथ]; @deva[व्यय्] → @deva[संविव्ययिथ]. By @ref[7.2.63], @deva[अद्] and @deva[व्यय्] would be optional; @deva[ॠ] never @deva[सेट्]—so this mandates @deva[इट्]. The @deva[इट्]-repetition = invariable.
"""

advanced = """
The @deva[व्येञ्] root doesn't change to @deva[व्या] (@ref[6.1.46]) in perfect: hence @deva[व्यय्] → @deva[विव्ययिथ]. By @[bhāradvāja]'s view (@ref[7.2.63]), @deva[अद्] and @deva[व्यय्] would be optionally @deva[सेट्], and @deva[ॠ] never @deva[सेट्]. This @[sūtra] overrides both, making all three @deva[नित्य]-@deva[सेट्] for @deva[थल्].
"""

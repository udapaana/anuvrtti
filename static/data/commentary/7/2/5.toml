id = "7.2.5"
numericId = "72005"

[en]
simple = """
No @[vṛddhi] before @deva[इट्]-augmented parasmaipada @deva[स्]-aorist for: @deva[ह्]/@deva[म्]/@deva[य्]-final stems, @deva[क्षण्], @deva[श्वस्], @deva[जागृ], @deva[णि]-derivatives, @deva[श्वि], and @deva[ए]-marker roots. @deva[अग्रहीत्], @deva[अचोरयीत्].
"""

standard = """
These categories lack @[vṛddhi] before @deva[सेट्] parasmaipada @deva[सिच्]: (1) @deva[ह]-ending: @deva[ग्रह्] → @deva[अग्रहीत्]; (2) @deva[म]-ending: @deva[स्यम्] → @deva[अस्यमीत्]; (3) @deva[य]-ending: @deva[व्यय्] → @deva[अव्ययीत्]; (4) @deva[क्षण्] → @deva[अक्षणीत्]; (5) @deva[श्वस्] → @deva[अश्वसीत्]; (6) @deva[जागृ] → @deva[अजागरीत्]; (7) @deva[णिच्]-causatives: @deva[अचोरयीत्]; (8) @deva[श्वि]; (9) @deva[एदित्] roots.
"""

advanced = """
This creates a detailed exception list for @deva[सेट्]-aorist @[vṛddhi]. The categories: @deva[हम्य]-final (phonological), specific roots (@deva[क्षण्], @deva[श्वस्], @deva[जागृ], @deva[श्वि]), morphological (@deva[णिच्]-derivatives), and marked (@deva[एदित्]). These form the '@[no-vṛddhi]' class even when @deva[इट्] is present, creating @deva[अग्रहीत्] (not *@deva[अग्राहीत्]), @deva[अचोरयीत्] (not *@deva[अचोरायीत्]).
"""

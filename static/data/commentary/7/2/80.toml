id = "7.2.80"
numericId = "72080"

[en]
simple = """
After a short-@deva[अ]-ending present stem, @deva[इय्] replaces the @[sārvadhātuka] @deva[या] (from @deva[यासुट्]). @deva[पच्] → @deva[पचेत्], @deva[पचेयुः].
"""

standard = """
For @deva[अकारान्त] (short-@deva[अ]-final) present stems, @deva[या] (of @deva[यासुट्]) → @deva[इय्]: @deva[पच्] + @deva[अ] + @deva[या] + @deva[त्] → @deva[पचेत्] (@deva[य्] elided by @ref[6.1.66]); @deva[पचेताम्], @deva[पचेयुः] (@ref[6.1.96] @deva[पररूप] blocked). Not for non-@deva[अ] stems: @deva[चिनुयात्].
"""

advanced = """
The @deva[या] → @deva[इय्] substitution + @deva[य्]-elision (@ref[6.1.66] before consonant) creates -@deva[ए]-: @deva[पच्] + @deva[अ] + @deva[इय्] + @deva[त्] → @deva[पच्] + @deva[ए] + @deva[त्] → @deva[पचेत्]. Before vowel (@deva[पचेयुः]), @deva[य्] remains but @ref[6.1.96] @deva[पररूप] is blocked. Non-@deva[अ] stems (@deva[चिनु]-, @deva[कुरु]-) retain @deva[या]: @deva[चिनुयात्], @deva[कुर्यात्].
"""

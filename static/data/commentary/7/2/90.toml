id = "7.2.90"
numericId = "72090"

[en]
simple = """
In remaining cases, the final of @deva[युष्मद्] and @deva[अस्मद्] is elided. @deva[त्वम्], @deva[अहम्], @deva[तुभ्यम्], @deva[मह्यम्], @deva[तव], @deva[मम].
"""

standard = """
Where neither @deva[आ] (@ref[7.2.86]-88) nor @deva[य] (@ref[7.2.89]) applies, @deva[द्]-elision occurs: nominatives (@deva[त्वम्], @deva[अहम्], @deva[यूयम्], @deva[वयम्]), datives (@deva[तुभ्यम्], @deva[मह्यम्], @deva[युष्मभ्यम्], @deva[अस्मभ्यम्]), ablatives (@deva[त्वत्], @deva[मत्]), genitives (@deva[तव], @deva[मम], @deva[युष्माकम्], @deva[अस्माकम्]).
"""

advanced = """
The @deva[शेष] (remainder) category: singular/plural of nominative, dative, ablative, genitive—wherever @deva[आ]/@deva[य] substitution doesn't apply. The paradigm is completed by various stem-substitutions (@ref[7.2.97] etc.): @deva[त्व]/@deva[म] (sg.), @deva[युव]/@deva[आव] (du.), @deva[युष्म]/@deva[अस्म] (pl.). Final @deva[द्] is simply elided before these endings.
"""

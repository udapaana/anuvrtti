id = "7.2.13"
numericId = "72013"

[en]
simple = """
Perfect (@deva[लिट्]) endings don't take @deva[इट्] after @deva[कृ], @deva[सृ], @deva[भृ], @deva[वृ], @deva[स्तु], @deva[द्रु], @deva[स्रु], @deva[श्रु]. @deva[चकृव], @deva[चकृम] 'we did'.
"""

standard = """
In @deva[लिट्] (perfect), these eight roots are @deva[अनिट्]: @deva[कृ] (@deva[चकृव], @deva[चकृम]), @deva[सृ] (@deva[ससृव], @deva[ससृम]), @deva[भृ] (@deva[बभृव], @deva[बभृम]), @deva[वृञ्] (@deva[ववृव], @deva[ववृम]), @deva[वृङ्] (@deva[ववृवहे], @deva[ववृमहे]), @deva[स्तु] (@deva[तुष्टुव], @deva[तुष्टुम]), @deva[द्रु] (@deva[दुद्रुव], @deva[दुद्रुम]), @deva[स्रु] (@deva[सुस्रुव], @deva[सुस्रुम]), @deva[श्रु] (@deva[शुश्रुव], @deva[शुश्रुम]).
"""

advanced = """
This creates the distinctive weak-stem perfect forms for these common roots. Without this, @deva[इट्] would give *@deva[चकरिव] (@deva[कृ]), *@deva[बभरिव] (@deva[भृ]). Both @deva[वृञ्] (parasmaipada) and @deva[वृङ्] (@[ātmanepada]) are included. The list covers the most frequent @deva[ऋ]/@deva[उ]-final roots needing special @deva[लिट्] treatment.
"""

id = "7.2.77"
numericId = "72077"

[en]
simple = """
The @[sārvadhātuka] @deva[से] (2nd person present/imperative @[ātmanepada]) takes @deva[इट्] after @deva[अदादि] @deva[ईश्]. @deva[ईशिषे], @deva[ईशिष्व].
"""

standard = """
For @deva[ईश्] (@deva[अदादि]), the ending @deva[से] takes @deva[इट्]: @deva[ईशिषे] (present), @deva[ईशिष्व] (imperative, @deva[से]→@deva[स्व] by @ref[3.4.91], @ref[3.4.80]). The @deva[से] is exhibited without case-ending in the @[sūtra].
"""

advanced = """
The @deva[से] represents the 2nd singular @[ātmanepada] marker. In present (@deva[लट्]): @deva[ईशिषे]; in imperative (@deva[लोट्]): @deva[से]→@deva[स्व] (@ref[3.4.91]), giving @deva[ईशिष्व]. This @deva[इट्]-insertion specifically for @deva[ईश्] creates the characteristic -@deva[इष]- pattern before these endings.
"""

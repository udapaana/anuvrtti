id = "7.2.88"
numericId = "72088"

[en]
simple = """
In non-Vedic language, @deva[आ] replaces the final of @deva[युष्मद्] and @deva[अस्मद्] before nominative dual endings. @deva[युवाम्], @deva[आवाम्].
"""

standard = """
In @deva[लौकिक] (classical), @deva[द्] → @deva[आ] before @deva[प्रथमा]-@deva[द्विवचन] (nominative dual): @deva[युवाम्], @deva[आवाम्]. Not nominative sg./pl.: @deva[त्वम्], @deva[अहम्], @deva[यूयम्], @deva[वयम्]. In Vedic: @deva[युवम्], @deva[आवम्] (no @deva[आ]).
"""

advanced = """
The @deva[अलुक्] condition specifies non-Vedic. Vedic preserves shorter forms: @deva[युवं] @deva[वस्त्राणि] @deva[पीवसा] @deva[वसाथे] (@deva[युवम्]), similarly @deva[आवम्]. The nominative dual specifically requires @deva[आ] in classical: @deva[युव] + @deva[आ] + @deva[औ] → @deva[युवाम्]. Other nominatives (sg./pl.) don't: @deva[त्वम्], @deva[यूयम्].
"""

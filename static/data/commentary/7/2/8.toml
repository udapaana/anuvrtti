id = "7.2.8"
numericId = "72008"

[en]
simple = """
The @deva[इट्] augment is NOT added to @[kṛt] affixes beginning with @deva[वश्] (voiced non-nasal consonants). @deva[ईश्वरः] (no @deva[इट्]) vs. @deva[ईशिता] (with @deva[इट्]).
"""

standard = """
@[kṛt] affixes beginning with @deva[वश्] @[pratyāhāra] (@deva[व], @deva[र], @deva[ल], @deva[म], @deva[न] and other voiced consonants) don't take @deva[इट्]: √@deva[ईश्] + @deva[वरच्] → @deva[ईश्वरः] (not *@deva[ईशिवरः]); √@deva[दीप्] + @deva[रम्] → @deva[दीप्रम्] (not *@deva[दीपिरम्]). But non-@deva[वश्]-initial @[kṛt] affixes take @deva[इट्]: @deva[ईशिता], @deva[दीपितुम्].
"""

advanced = """
The @deva[वश्] @[pratyāhāra] is somewhat imprecise—effectively covers @deva[व], @deva[र], (@deva[ल]), @deva[म], @deva[न]. No @[kṛt] affix begins with other @deva[वश्] letters. This creates the @deva[सेट्]/@deva[अनिट्] distinction for @[kṛt] affixes: @deva[वश्]-initial = @deva[अनिट्], others potentially @deva[सेट्]. Examples: @deva[ईश्] + @deva[वरच्] (@deva[अनिट्]) → @deva[ईश्वरः]; @deva[ईश्] + @deva[तृच्] (@deva[सेट्]) → @deva[ईशिता].
"""

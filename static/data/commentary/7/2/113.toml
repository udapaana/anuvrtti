id = "7.2.113"
numericId = "72113"

[en]
simple = """
Before consonant-initial case-endings, the @deva[इद्] of @deva[इदम्] is elided. @deva[आभ्याम्], @deva[एभिः], @deva[एषाम्], @deva[एषु].
"""

standard = """
For @deva[इदम्] before @deva[हलादि] @deva[विभक्ति], @deva[इद्]-@deva[लोप]: @deva[इदम्] → @deva[आभ्याम्], @deva[एभिः], @deva[एभ्यः], @deva[एषाम्], @deva[एषु]. The @deva[म्] → @deva[अ] (@ref[7.2.102]), then @deva[अ] + @deva[अ] → @deva[आ] (@ref[6.1.97]). Not just final letter—whole @deva[इद्] is elided.
"""

advanced = """
The @ref[1.1.52] rule (substitute replaces final only) doesn't apply here, per maxim @deva[मानर्थके] @deva[अलोऽन्त्यविधिः] 'when meaningless, not just final'. Eliding only @deva[द्] would leave @deva[इ], serving no purpose. So entire @deva[इद्] drops: @deva[इदम्] + @deva[भ्याम्] → @deva[आभ्याम्].
"""

id = "7.2.60"
numericId = "72060"

[en]
simple = """
Parasmaipada @deva[स्]-initial @[ārdhadhātuka] affixes and @deva[तास्] don't take @deva[इट्] after @deva[कॢप्]. @deva[कल्प्स्यति], @deva[कल्प्ता].
"""

standard = """
For @deva[कॢप्], parasmaipada @deva[स्]-initial and @deva[तास्] (periphrastic future) are @deva[अनिट्]: @deva[कल्प्ता], @deva[कल्प्स्यति], @deva[अकल्प्स्यत्], @deva[चिक्लृप्सति]. @[ātmanepada]: @deva[कल्पितासे], @deva[कल्पिषीष्ट], @deva[कल्पिष्यते], @deva[चिकल्पिषते] (@deva[सेट्]).
"""

advanced = """
The @deva[तास्]-inclusion extends beyond just @deva[स्]-initial. @deva[कॢप्] shows voice-conditioned @deva[इट्]: parasmaipada = @deva[अनिट्], @[ātmanepada] = @deva[सेट्]. The forms @deva[चिक्लृप्सति] (parasmaipada desiderative, @deva[अनिट्]) vs. @deva[चिकल्पिषते] (@[ātmanepada], @deva[सेट्]) illustrate this split.
"""

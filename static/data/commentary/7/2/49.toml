id = "7.2.49"
numericId = "72049"

[en]
simple = """
The desiderative @deva[सन्] optionally takes @deva[इट्] after @deva[इव्]-ending roots, and after @deva[ऋधु], @deva[भ्रस्ज्], @deva[दम्भु], @deva[श्रि], @deva[स्वृ], @deva[यु], @deva[ऊर्णु], @deva[भृ], @deva[ज्ञप्], @deva[सन्].
"""

standard = """
Before @deva[सन्], optional @deva[इट्] for: @deva[इव्]-finals: @deva[दिदेविषति]/@deva[दुद्यूषति], @deva[सिसेविषति]/@deva[सुस्यूषति]; @deva[ऋध्]: @deva[अर्दिधिषति]/@deva[ईर्त्सति]; @deva[भ्रस्ज्]: @deva[बिभ्रज्जिषति]/@deva[बिभ्रक्षति]; and others including @deva[भृ], @deva[ज्ञप्], @deva[सन्] (reduplicated desiderative).
"""

advanced = """
The @deva[इव्]-@deva[अन्त] class (@deva[देव्], @deva[सेव्], etc.) plus ten specific roots show desiderative @deva[इट्]-@deva[विकल्प]. The forms with @deva[इट्] show full root; without @deva[इट्], root undergoes @deva[सम्प्रसारण] (@deva[देव्] → @deva[दुद्यूष]). For @deva[सन्] itself (reduplicated): @deva[सिसनिषति]/@deva[सिसंसति] (desire to obtain).
"""

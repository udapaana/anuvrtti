id = "7.2.33"
numericId = "72033"

[en]
simple = """
In Vedic, @deva[ह्वरित्] is formed from @deva[ह्वृ] with @[guṇa] and @deva[इट्] when referring to soma. @deva[मा] @deva[नः] @deva[सोमो] @deva[ह्वरितः] 'may our soma not be deceived'.
"""

standard = """
When referring to soma, @deva[ह्वृ] takes @[guṇa] + @deva[इट्] in Vedic: @deva[ह्वरितः] (instead of @deva[ह्रुत] or @deva[ह्वृत]). Examples: @deva[मा] @deva[नः] @deva[सोमो] @deva[ह्वरितो], @deva[विह्वरितस्त्वम्].
"""

advanced = """
This @deva[सोम]-@deva[विषय] (soma-context) condition creates a third Vedic variant: (1) @deva[ह्रुत] (@ref[7.2.31]), (2) @deva[ह्वृत] (@ref[7.2.32] exception), (3) @deva[ह्वरित] (soma-specific with @[guṇa] + @deva[इट्]). The semantic conditioning (@deva[सोम] reference) determining morphology is a characteristic Vedic feature.
"""

id = "7.2.36"
numericId = "72036"

[en]
simple = """
@deva[स्नु] and @deva[क्रम्] take @deva[इट्] before @deva[वलादि] @[ārdhadhātuka] only when NOT occasioning @[ātmanepada]. @deva[स्नोता] but @deva[स्नुते] (no @deva[इट्] in @[ātmanepada-triggering] context).
"""

standard = """
For @deva[स्नु] and @deva[क्रम्], @deva[इट्] applies only when parasmaipada is used (not when the root itself triggers @[ātmanepada]): @deva[स्नोता], @deva[क्रमिता] (parasmaipada context); but when root triggers @[ātmanepada], no @deva[इट्]. Both roots are @deva[उदात्त], so would normally get @deva[इट्].
"""

advanced = """
This is a @deva[नियम] (restriction): @deva[स्नु]/@deva[क्रम्] being @deva[उदात्त] would take @deva[इट्] by default (@ref[7.2.35]). The condition @deva[अनात्मनेपदे] means: when the root doesn't require @[ātmanepada] by its inherent nature (@ref[1.3.72] etc.), @deva[इट्] applies. When the root mandates @[ātmanepada], @deva[इट्] is blocked. This creates context-sensitive @deva[इट्] behavior.
"""

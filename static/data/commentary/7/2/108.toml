id = "7.2.108"
numericId = "72108"

[en]
simple = """
In nominative singular, @deva[म्] replaces the final @deva[म्] of @deva[इदम्]. @deva[इयम्], @deva[अयम्].
"""

standard = """
For @deva[इदम्] in @deva[प्रथमा]-@deva[एकवचन]: @deva[म्] → @deva[म्] (same letter). Purpose: to prevent @deva[अ]-substitution (@ref[7.2.102]). The @deva[सु] is elided (@ref[6.1.68]), and @deva[य] substitution follows (@ref[7.2.110]-111).
"""

advanced = """
The @deva[म्]→@deva[म्] (@deva[तुल्य]-substitute) blocks @ref[7.2.102]'s @deva[अ]-replacement. Without this, @deva[इदम्] would become @deva[इद] + @deva[अ] → @deva[इद]. The @deva[म्]-retention allows subsequent rules: @deva[इदम्] → @deva[इयम्] (feminine, @ref[7.2.110]) or @deva[अयम्] (masculine, @ref[7.2.111]).
"""

id = "7.2.14"
numericId = "72014"

[en]
simple = """
The participle affixes @deva[क्त] and @deva[क्तवतु] don't take @deva[इट्] after @deva[श्वि] and @deva[ईदित्] (roots with indicatory @deva[ई]). @deva[शूनः] 'swollen', @deva[लग्नः] 'attached'.
"""

standard = """
Before @deva[निष्ठा] (@deva[क्त]/@deva[क्तवतु]), these are @deva[अनिट्]: (1) @deva[श्वि]: @deva[शूनः], @deva[शूनवान्]; (2) @deva[ईदित्] roots: @deva[लग्नः] (@deva[लगी]), @deva[उद्विग्नः] (@deva[विजी]), @deva[दीप्तः] (@deva[दीपी]). The indicatory @deva[ओ] (in @deva[ओलेजी], @deva[ओविजी]) triggers @deva[त] → @deva[न] change (@ref[8.2.45]).
"""

advanced = """
The @deva[ईदित्] (@deva[ई] as @deva[इत्]) marking indicates @deva[अनिट्] before @deva[निष्ठा]. In @deva[धातुपाठ], @deva[डीङ्] is classed with @deva[ओदित्] roots, making it @deva[ईदित्] equivalent. The @deva[त] → @deva[न] change (@deva[शूनः], @deva[लग्नः], @deva[विग्नः]) is triggered by @deva[ओ]-marker (@ref[8.2.45]), a separate but related phenomenon.
"""

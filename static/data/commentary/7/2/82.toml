id = "7.2.82"
numericId = "72082"

[en]
simple = """
Before the participial ending @deva[आन], a short-@deva[अ]-ending stem gets the augment @deva[मुक्] (= @deva[म्]). @deva[पचमानः], @deva[यजमानः].
"""

standard = """
The @deva[मुक्]-augment (= @deva[म्]) is added to @deva[अकारान्त] stems before @deva[आन] (@deva[शानच्]): @deva[पच्] + @deva[अ] + @deva[म्] + @deva[आन] + @deva[स्] → @deva[पचमानः]; @deva[यज्] + @deva[अ] + @deva[म्] + @deva[आन] + @deva[स्] → @deva[यजमानः]. The @deva[मुक्] belongs to @deva[अ], not to the stem.
"""

advanced = """
@deva[मुक्] is part of @deva[अ] (the @[vikaraṇa]), not the @[aṅga]. If @deva[मुक्] were part of the @[aṅga], it would make the stem @deva[हलन्त] (consonant-final), affecting accent: @ref[6.1.186] makes @deva[ल]-@[sārvadhātuka] affixes @[anudātta] after consonant-final stems. By attaching @deva[मुक्] to @deva[अ], the stem remains @deva[अकारान्त], preserving correct accent.
"""

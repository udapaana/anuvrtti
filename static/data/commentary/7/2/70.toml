id = "7.2.70"
numericId = "72070"

[en]
simple = """
The future/conditional @deva[स्य] takes @deva[इट्] after short @deva[ऋ]-final roots and after @deva[हन्]. @deva[करिष्यति], @deva[हरिष्यति], @deva[हनिष्यति].
"""

standard = """
Before @deva[स्य] (future/conditional), these are @deva[नित्य]-@deva[सेट्]: @deva[ऋत्]-finals (short @deva[ऋ]): @deva[करिष्यति], @deva[हरिष्यति]; @deva[हन्]: @deva[हनिष्यति]. Also @deva[स्वृ] is always @deva[सेट्] before @deva[स्य] despite being optional elsewhere (@ref[7.2.44]): @deva[स्वरिष्यति].
"""

advanced = """
The @deva[ऋत्] (short @deva[ऋ]-final) class includes @deva[कृ], @deva[हृ], etc. The @deva[स्वृ] specification means: before @deva[स्य], always @deva[सेट्] (@deva[स्वरिष्यति]), even though @ref[7.2.44] makes it optional before other affixes. Conditional forms parallel: @deva[अकरिष्यत्], @deva[अहरिष्यत्], @deva[अहनिष्यत्].
"""

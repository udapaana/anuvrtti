id = "7.2.3"
numericId = "72003"

[en]
simple = """
In parasmaipada @deva[स्]-aorist, @[vṛddhi] applies to @deva[वद्], @deva[व्रज्], and to any vowel of consonant-ending stems. @deva[अवादीत्] 'he spoke', @deva[अभैत्सीत्] 'he split'.
"""

standard = """
Before parasmaipada @deva[सिच्]: (1) @deva[वद्]/@deva[व्रज्] obligatorily take @[vṛddhi]: @deva[अवादीत्], @deva[अव्राजीत्] (blocking @ref[7.2.7]'s option); (2) all @deva[हलन्त] (consonant-final) stems take @[vṛddhi] regardless of vowel type: @deva[अपाक्षीत्] (@deva[पच्]), @deva[अभैत्सीत्] (@deva[भिद्]), @deva[अच्छैत्सीत्] (@deva[छिद्]), @deva[अरौत्सीत्] (@deva[रुध्]).
"""

advanced = """
The @deva[योग]-@deva[विभाग] (@[sūtra-splitting]) technique: @deva[वद्]/@deva[व्रज्] are specified for @deva[निश्चित]-@[vṛddhi] (no option), while @deva[हलन्त] stems get universal @[vṛddhi] (@deva[अविशेष]). This prevents optional forms like *@deva[अवदीत्]. The @deva[हलन्त] category includes all consonant-finals: @deva[अ], @deva[इ], @deva[उ] vowels all get @[vṛddhi] (@deva[अपाक्षीत्], @deva[अभैत्सीत्], @deva[अरौत्सीत्]).
"""

id = "7.2.57"
numericId = "72057"

[en]
simple = """
@deva[स्]-initial @[ārdhadhātuka] affixes (except @deva[सिच्]) optionally take @deva[इट्] after @deva[कृत्], @deva[चृत्], @deva[छृद्], @deva[तृद्], @deva[नृत्]. @deva[कर्त्स्यति] or @deva[करिष्यति].
"""

standard = """
Before @deva[स्]-initial (not @deva[सिच्]) affixes, optional @deva[इट्] for: @deva[कृत्] (@deva[तुदादि]/@deva[रुधादि]): @deva[कर्त्स्यति]/@deva[करिष्यति]; @deva[चृत्] (@deva[तुदादि]); @deva[छृद्] (@deva[रुधादि]); @deva[तृद्] (@deva[तुदादि]); @deva[नृत्] (@deva[दिवादि]). @deva[स]-aorist (@deva[सिच्]) excluded.
"""

advanced = """
The @deva[स्]-initial affixes include future @deva[स्य], desiderative @deva[सन्], but exclude @deva[सिच्] (aorist). For @deva[कृत्]: @deva[कर्त्स्यति] (@deva[अनिट्])/@deva[करिष्यति] (@deva[सेट्]) in future; @deva[अकर्त्सीत्]/@deva[अकरिष्यत्] in conditional. Both @deva[तुदादि] @deva[कृत्] 'to cut' and @deva[रुधादि] @deva[कृत्] 'to spin' are covered.
"""

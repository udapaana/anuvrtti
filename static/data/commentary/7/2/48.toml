id = "7.2.48"
numericId = "72048"

[en]
simple = """
@deva[त]-initial @[ārdhadhātuka] affixes optionally take @deva[इट्] after @deva[इष्], @deva[सह्], @deva[लुभ्], @deva[रुष्], @deva[रिष्]. @deva[एष्टा] or @deva[एषिता].
"""

standard = """
Before @deva[त]-initial affixes, these five roots have optional @deva[इट्]: @deva[इष्] 'wish' (VI.59): @deva[एष्टा]/@deva[एषिता]; @deva[सह्]: @deva[सोढा]/@deva[सहिता]; @deva[लुभ्]: @deva[लोब्धा]/@deva[लोभिता]; @deva[रुष्]: @deva[रुष्टा]/@deva[रुषिता]; @deva[रिष्]: @deva[रिष्टा]/@deva[रिषिता]. Not @deva[इष्] 'send' (IV.19): always @deva[प्रेषिता].
"""

advanced = """
The @deva[इष्] here is @deva[तुदादि] @deva[इष्] 'to wish', not @deva[दिवादि] @deva[इष्] 'to send' or @deva[क्र्यादि] @deva[इष्] 'to repeat'. The @deva[दिवादि] @deva[इष्] is invariably @deva[सेट्]: @deva[प्रेषिता], @deva[प्रेषितुम्], @deva[प्रेषितव्यम्]. The @deva[त]-initial restriction (not just @deva[वल्]) narrows the scope to affixes like @deva[तृच्], @deva[तुमुन्], @deva[तव्य].
"""

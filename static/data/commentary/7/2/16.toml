id = "7.2.16"
numericId = "72016"

[en]
simple = """
Participle affixes don't take @deva[इट्] after roots with indicatory @deva[आ] (@deva[आदित्]). @deva[मिदा] → @deva[मिन्नः] 'fat', @deva[स्विदा] → @deva[स्विन्नः] 'sweated'.
"""

standard = """
Roots marked with @deva[आ] (@deva[आदित्]) are @deva[अनिट्] before @deva[निष्ठा] (@deva[क्त]/@deva[क्तवतु]): @deva[ञिमिदा] → @deva[मिन्नः], @deva[मिन्नवान्]; @deva[ञिक्ष्विदा] → @deva[क्ष्विण्णः]; @deva[ञिष्विदा] → @deva[स्विन्नः]. The @deva[च] implies other @deva[आदित्] roots: @deva[आश्वस्तः] (@deva[श्वस्]), @deva[वान्तः] (@deva[वम्]).
"""

advanced = """
The @deva[आ]-marker (indicatory) signals @deva[अनिट्] before @deva[निष्ठा]. This could combine with @ref[7.2.17] as @deva[आदितश्च] @deva[विभाषा] @deva[भावादौ], but separation allows clearer statement. The @deva[च] extends to all @deva[आदित्] roots in @deva[धातुपाठ]. Note the @deva[त] → @deva[न] change in @deva[मिन्न], @deva[स्विन्न] (by @ref[8.2.45] for certain roots).
"""

id = "7.2.27"
numericId = "72027"

[en]
simple = """
These causative participles optionally take @deva[इट्]: @deva[दान्त], @deva[शान्त], @deva[पूर्ण], @deva[दस्त], @deva[स्पष्ट], @deva[छन्न], @deva[ज्ञप्त]. Alternatives: @deva[दमितः], @deva[शमितः], etc.
"""

standard = """
Seven causative participles show optional @deva[इट्] (= optional @deva[णिच्]-@deva[लोप]): @deva[दान्त]/@deva[दमितः] (@deva[दम्]), @deva[शान्त]/@deva[शमितः] (@deva[शम्]), @deva[पूर्ण]/@deva[पूरितः] (@deva[पॄ]), @deva[दस्त]/@deva[दासितः] (@deva[दंश्]), @deva[स्पष्ट]/@deva[स्पाशितः] (@deva[स्पश्]), @deva[छन्न]/@deva[छादितः] (@deva[छद्]), @deva[ज्ञप्त]/@deva[ज्ञपितः] (@deva[ज्ञप्]).
"""

advanced = """
These can derive from either causative base (with @deva[णिच्]) or primary root directly. The @deva[अनिट्] forms show @deva[णिच्]-@deva[लोप] (causative marker deletion): @deva[दम्] + @deva[णिच्] + @deva[क्त] → @deva[दान्त] (@deva[णिच्] elided). The @deva[सेट्] forms retain causative: @deva[दम्] + @deva[णिच्] + @deva[इ] + @deva[त] → @deva[दमितः]. Both are grammatically valid.
"""

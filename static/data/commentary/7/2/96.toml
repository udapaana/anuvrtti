id = "7.2.96"
numericId = "72096"

[en]
simple = """
In genitive singular, @deva[तव] replaces @deva[युष्म्] and @deva[मम] replaces @deva[अस्म्]. @deva[तव], @deva[मम].
"""

standard = """
For @deva[षष्ठी]-@deva[एकवचन] (genitive singular): @deva[युष्म्] → @deva[तव], @deva[अस्म्] → @deva[मम]. The @deva[द्] is elided by @ref[7.2.90], and the ending simplifies: @deva[तव] + @deva[द्] + @deva[अस्] → @deva[तव] + @deva[अ] (by @ref[7.1.27]) → @deva[तव] (@ref[6.1.97]). Compounds: @deva[परमतव], @deva[परममम].
"""

advanced = """
Derivation: @deva[युष्मद्] + @deva[ङस्] → @deva[तव] + @deva[द्] + @deva[ङस्] → @deva[तव] + @deva[द्] + @deva[अ] (@ref[7.1.27]) → @deva[तव] + @deva[अ] (@ref[7.2.90] @deva[द्]-lopa) → @deva[तव] (@ref[6.1.97] coalescence). The genitive singular forms are distinctive, lacking the -@deva[म्] of other singular cases.
"""

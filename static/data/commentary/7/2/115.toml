id = "7.2.115"
numericId = "72115"

[en]
simple = """
Before @deva[ञित्] or @deva[णित्] affixes, @[vṛddhi] replaces the final vowel of the stem. @deva[गो] → @deva[गौः] (@deva[णित्] ending), @deva[कृ] → @deva[कारः] (@deva[घञ्]).
"""

standard = """
Before @deva[ञित्]/@deva[णित्] affixes, @deva[अन्त्य]-@deva[स्वर] → @[vṛddhi]: @deva[निचाय] → @deva[निचायः] (@ref[3.3.20]); @deva[गो] → @deva[गौः], @deva[गावौ], @deva[गावः] (@ref[7.1.90] @deva[णित्]); @deva[सखि] → @deva[सखायौ], @deva[सखायः] (@ref[7.1.92] @deva[णित्]); @deva[जि] → @deva[जैत्रम्] (@deva[ष्ट्रण्] @deva[उणादि]).
"""

advanced = """
The @deva[ञित्]/@deva[णित्] markers trigger final-vowel @[vṛddhi]. Examples: @deva[घञ्] (@deva[कारः], @deva[हारः]), @deva[णित्] case-endings (@ref[7.1.90] for @deva[गो], @ref[7.1.92] for @deva[सखि]). The @deva[ष्ट्रण्] (@deva[उणादि]) creates forms like @deva[जैत्रम्], @deva[यौत्रम्]. This is final-vowel @[vṛddhi], unlike @ref[7.2.116]-117.
"""

id = "7.2.61"
numericId = "72061"

[en]
simple = """
After vowel-ending roots that are @deva[अनिट्] before @deva[तास्] (periphrastic future), the perfect ending @deva[थल्] is also @deva[अनिट्]. @deva[याता] → @deva[ययाथ] 'you went'.
"""

standard = """
For @deva[अच्]-final (vowel-ending) roots that invariably lack @deva[इट्] before @deva[तास्], the perfect @deva[थल्] also lacks @deva[इट्]: @deva[याता] (future) → @deva[ययाथ] (perfect); @deva[स्थाता] → @deva[तस्थाथ]/@deva[तस्थिथ]. The @deva[तास्]-behavior determines @deva[थल्]-behavior.
"""

advanced = """
This extends @deva[तास्]'s @deva[अनिट्] status to @deva[थल्] for @deva[स्वरान्त] (vowel-final) roots. If @deva[तास्] is @deva[नित्य]-@deva[अनिट्] for a vowel-final root, @deva[थल्] follows. Examples: @deva[या] → @deva[याता] (future), @deva[ययाथ] (perfect 2nd sg.); @deva[स्था] → @deva[स्थाता], @deva[तस्थाथ]/@deva[तस्थिथ]. The @deva[तास्]-@deva[थल्] parallelism simplifies conjugation patterns.
"""

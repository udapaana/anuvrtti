id = "7.2.110"
numericId = "72110"

[en]
simple = """
In feminine nominative singular, @deva[य्] replaces the @deva[द्] of @deva[इदम्]. @deva[इयम्] 'this (f.)'.
"""

standard = """
For @deva[इदम्] in @deva[स्त्रीलिङ्ग] @deva[प्रथमा]-@deva[एकवचन]: @deva[द्] → @deva[य्]: @deva[इदम्] → @deva[इयम्]. This is feminine-specific; masculine uses 7.2.111. Neuter has @deva[सु]-@deva[लोप] (@deva[स्वमोर्नपुंसक]), so no form remains.
"""

advanced = """
The feminine restriction: subsequent @ref[7.2.111] is masculine-specific, and neuter lacks nominative singular ending (@deva[स्वमोर्नपुंसकात्]). Thus @deva[इयम्] is specifically feminine: @deva[इयं] @deva[ब्राह्मणी]. The @deva[य्]-substitute + @deva[म्]-retention (@ref[7.2.108]) gives @deva[इयम्].
"""

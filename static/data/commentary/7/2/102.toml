id = "7.2.102"
numericId = "72102"

[en]
simple = """
Before case-endings (@deva[विभक्ति]), @deva[अ] replaces the final of @deva[त्यद्] etc. @deva[त्यद्] → @deva[त्यः], @deva[तद्] → @deva[सः], @deva[यद्] → @deva[यः].
"""

standard = """
For @deva[त्यदादि] (extending to @deva[द्वि]), final → @deva[अ] before @deva[विभक्ति]: @deva[त्यद्] → @deva[त्य] (@deva[त्यः], @deva[त्यौ], @deva[त्ये]); @deva[तद्] → @deva[त] (@deva[सः], @deva[तौ], @deva[ते]); @deva[यद्] → @deva[य] (@deva[यः], @deva[यौ], @deva[ये]); @deva[एतद्] → @deva[एत] (@deva[एषः], @deva[एतौ], @deva[एते]); @deva[इदम्] → @deva[इम] (@deva[अयम्], @deva[इमौ], @deva[इमे]); @deva[अदस्] → @deva[अम] (@deva[असौ], @deva[अमू], @deva[अमी]); @deva[द्वि] → @deva[द्व] (@deva[द्वौ], @deva[द्वाभ्याम्]).
"""

advanced = """
The @deva[त्यदादि] class extends through @deva[द्वि]. The @deva[अ]-substitute enables subsequent sandhi: @deva[तद्] + @deva[अ] + @deva[स्] → @deva[त] + @deva[अ] + @deva[स्] → @deva[सः] (@deva[त]→@deva[स] by @ref[7.2.106]). The various demonstratives show this pattern with their individual irregularities (@deva[इदम्] → @deva[अयम्] with @deva[अ]-augment, etc.).
"""

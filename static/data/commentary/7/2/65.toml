id = "7.2.65"
numericId = "72065"

[en]
simple = """
The perfect ending @deva[थल्] takes @deva[इट्] after @deva[सृज्] and @deva[दृश्]. @deva[ससर्जिथ] or @deva[सस्रष्ठ], @deva[ददर्शिथ] or @deva[दद्रष्ठ].
"""

standard = """
After @deva[सृज्] and @deva[दृश्], @deva[थल्] optionally takes @deva[इट्]: @deva[सृज्] → @deva[ससर्जिथ]/@deva[सस्रष्ठ]; @deva[दृश्] → @deva[ददर्शिथ]/@deva[दद्रष्ठ]. The @deva[अम्]-augment (@ref[6.1.58]) applies in the @deva[इट्] forms. Both forms are valid.
"""

advanced = """
The option creates doublets: with @deva[इट्] (@deva[ससर्जिथ], @deva[ददर्शिथ], showing @[guṇa] + @deva[इट्]) vs. without @deva[इट्] (@deva[सस्रष्ठ], @deva[दद्रष्ठ], showing @deva[सम्प्रसारण] + consonant changes). The @ref[6.1.58] @deva[अम्]-augment is triggered by the @deva[इट्]-forms. Both patterns are grammatically correct.
"""

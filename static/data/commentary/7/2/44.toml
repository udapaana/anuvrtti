id = "7.2.44"
numericId = "72044"

[en]
simple = """
@deva[वलादि] @[ārdhadhātuka] affixes optionally take @deva[इट्] after @deva[स्वृ], the two @deva[सू] roots, @deva[धूञ्], and @deva[ऊदित्] roots. @deva[स्वरिता] or @deva[स्वर्त्ता], @deva[धोता] or @deva[धविता].
"""

standard = """
Optional @deva[इट्] for: (1) @deva[स्वृ]: @deva[स्वरिता]/@deva[स्वर्त्ता]; (2) @deva[सू] (@deva[सूति]): @deva[प्रसोता]/@deva[प्रसविता]; (3) @deva[सू] (@deva[सूयति]): @deva[सोता]/@deva[सविता]; (4) @deva[धूञ्]: @deva[धोता]/@deva[धविता]; (5) @deva[ऊदित्] roots: @deva[विगाढा]/@deva[विगाहिता] (@deva[गाहू]), @deva[गोप्ता]/@deva[गोपिता] (@deva[गुपू]).
"""

advanced = """
This defines the 'optionally @deva[सेट्]' class: @deva[स्वृ], both @deva[सू] roots (different conjugations), @deva[धूञ्], and all @deva[ऊदित्] (roots with indicatory @deva[ऊ] in @deva[धातुपाठ]). The @deva[ऊदित्] class includes @deva[गाहू], @deva[गुपू], etc. These create doublets: one with @[guṇa]/@[vṛddhi] + no @deva[इट्], one with @deva[इट्].
"""

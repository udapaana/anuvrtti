id = "7.2.47"
numericId = "72047"

[en]
simple = """
The participle affixes @deva[क्त] and @deva[क्तवतु] invariably take @deva[इट्] after @deva[निर्] + @deva[कुष्]. @deva[निष्कुषितः], @deva[निष्कुषितवान्].
"""

standard = """
Before @deva[निष्ठा] (@deva[क्त]/@deva[क्तवतु]), @deva[निर्] + @deva[कुष्] is @deva[नित्य]-@deva[सेट्]: @deva[निष्कुषितः], @deva[निष्कुषितवान्]. The explicit @deva[इट्] makes it obligatory, unlike @ref[7.2.46]'s option for other affixes. Without this, @ref[7.2.15] would block @deva[इट्].
"""

advanced = """
The @deva[इट्]-repetition signals @deva[नित्य] (invariable) application. By @ref[7.2.46], @deva[कुष्] is optionally @deva[सेट्], which would make it @deva[नित्य]-@deva[अनिट्] before @deva[निष्ठा] by @ref[7.2.15]. This @[sūtra] overrides that, mandating @deva[इट्] for the participle specifically. The next @[sūtra] (@ref[7.2.48]) reverts to option.
"""

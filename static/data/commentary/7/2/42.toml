id = "7.2.42"
numericId = "72042"

[en]
simple = """
The @deva[इट्] is optional in @[ātmanepada] benedictive and @deva[स्]-aorist after @deva[वृ] and @deva[ॠ]-ending roots. @deva[वृषीष्ट] or @deva[वरिषीष्ट], @deva[अवृत] or @deva[अवरिष्ट].
"""

standard = """
In @[ātmanepada] @deva[आशीर्लिङ्] and @deva[सिच्], @deva[वृ]/@deva[ॠ]-finals optionally take @deva[इट्]: benedictive: @deva[वृषीष्ट]/@deva[वरिषीष्ट], @deva[प्रावृषीष्ट]/@deva[प्रावरिषीष्ट]; aorist: @deva[अवृत]/@deva[अवरिष्ट]/@deva[अवरीष्ट], @deva[आस्तीर्ष्ट]/@deva[आस्तरिष्ट]/@deva[आस्तरीष्ट].
"""

advanced = """
The @[ātmanepada] condition enables @deva[इट्]-@deva[विकल्प] for these two tenses. Combined with @ref[7.2.38]'s length option for @deva[इट्], this creates multiple forms: @deva[आशीर्लिङ्] (2 forms), @deva[सिच्] (3 forms with length option). Parasmaipada would give different results: @deva[आशीर्लिङ्] uses @ref[7.2.39] (no lengthening), @deva[सिच्] uses @ref[7.2.40] (short only).
"""

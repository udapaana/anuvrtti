id = "7.2.23"
numericId = "72023"

[en]
simple = """
Participle of @deva[घुष्] doesn't take @deva[इट्] except when meaning 'proclaimed'. @deva[घुष्टा] @deva[रज्जुः] 'rubbed rope' but @deva[अवघुषितं] @deva[वाक्यम्] 'proclaimed statement'.
"""

standard = """
@deva[घुष्] + @deva[क्त] = @deva[घुष्ट] (@deva[अनिट्]) for meanings other than 'proclaimed': @deva[घुष्टा] @deva[रज्जुः] (rubbed rope), @deva[घुष्टो] @deva[पादः] (rubbed foot). For 'proclaimed' (@deva[विशब्दन]): @deva[अवघुषितं] @deva[वाक्यमाह] (with @deva[इट्]).
"""

advanced = """
Two roots: @deva[घुषिर्] @deva[अविशब्दने] (@[bhvādi] 1.683) and @deva[घुषिर्] @deva[विशब्दने] (@[curādi] X.187). The @deva[अविशब्दन] meaning (not proclaiming = rubbing, etc.) is @deva[अनिट्]: @deva[घुष्ट]. The @deva[विशब्दन] meaning (proclaiming) is @deva[सेट्]: @deva[घुषित]. This splits the homonymous roots by @deva[इट्]-behavior.
"""

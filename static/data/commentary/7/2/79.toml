id = "7.2.79"
numericId = "72079"

[en]
simple = """
In @[sārvadhātuka] @[liṅ] (potential), the non-final @deva[स्] (from @deva[यासुट्], @deva[सुट्], @deva[सीयुट्]) is elided. @deva[कुर्यात्], @deva[कुर्वीत].
"""

standard = """
The @deva[स्] of augments @deva[यासुट्], @deva[सुट्], @deva[सीयुट्] is elided in @[sārvadhātuka] @[liṅ]: @deva[कृ] + @deva[यास्] + @deva[त्] → @deva[कुर्यात्] (@deva[स्] elided); @deva[कृ] + @deva[सीय] + @deva[त] → @deva[कुर्वीत]. Final @deva[स्] retained: @deva[कुर्युः], @deva[कुर्याः]. In @[āśīrliṅ]: @deva[क्रियात्] (@deva[स्] not elided).
"""

advanced = """
The condition @deva[अनन्त्य] (non-final) preserves final @deva[स्]: @deva[कुर्युः] (-@deva[उः] has no @deva[स्], but @deva[कुर्याः] keeps final @deva[स्]). The @[sārvadhātuka] restriction distinguishes from @[āśīrliṅ] (@[ārdhadhātuka]): @deva[क्रियात्], @deva[क्रियास्ताम्] (@deva[स्] retained). Paradigm: @deva[कुर्यात्], @deva[कुर्याताम्], @deva[कुर्युः]; @deva[कुर्वीत], @deva[कुर्वीयाताम्], @deva[कुर्वीरन्].
"""

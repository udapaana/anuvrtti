id = "7.2.100"
numericId = "72100"

[en]
simple = """
Before vowel-initial case-endings, @deva[र्] replaces @deva[ऋ] of @deva[तिसृ] and @deva[चतसृ]. @deva[तिस्रः], @deva[चतस्रः] (nom. pl. feminine).
"""

standard = """
For @deva[तिसृ]/@deva[चतसृ] before @deva[अजादि] @deva[विभक्ति], @deva[ऋ] → @deva[र्]: @deva[तिस्रस्तिष्ठन्ति], @deva[चतस्रस्तिष्ठन्ति]; @deva[तिस्रः] @deva[पश्य], @deva[चतस्रः] @deva[पश्य]. Compounds: @deva[प्रियतिस्रः], @deva[प्रियचतस्रः].
"""

advanced = """
This supersedes @ref[6.1.102] (which would give single long substitute). The @deva[र्]-substitute before vowel: @deva[तिसृ] + @deva[अस्] → @deva[तिस्र्] + @deva[अस्] → @deva[तिस्रः] (with visarga). Compound examples: @deva[प्रियतिस्र] @deva[आनय], @deva[प्रियतिस्रि] @deva[निधेहि] (before consonant, @deva[ऋ] retained).
"""

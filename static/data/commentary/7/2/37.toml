id = "7.2.37"
numericId = "72037"

[en]
simple = """
After @deva[ग्रह्], the @deva[इट्] augment is lengthened (except in perfect). @deva[ग्रह्] → @deva[ग्रहीता], @deva[ग्रहीतुम्] (long @deva[ई]), but @deva[जगृहिव] (short @deva[इ] in perfect).
"""

standard = """
The @deva[इट्] of @ref[7.2.35] becomes @deva[ईट्] (long) after @deva[ग्रह्], except in @deva[लिट्]: @deva[ग्रहीता], @deva[ग्रहीतुम्], @deva[ग्रहीतव्यम्] (@[ī]). But perfect: @deva[जगृहिव], @deva[जगृहिम] (short i). This doesn't affect @deva[चिण्वत्]-@deva[इट्] (@ref[6.4.62]): @deva[ग्राहिता], @deva[ग्रहिष्यते].
"""

advanced = """
The lengthening applies specifically to @ref[7.2.35]'s @deva[इट्], not to @deva[इट्] from other sources (like @ref[6.4.62]'s @deva[चिण्वद्भाव]). The @deva[लिट्]-exception preserves @deva[जगृहिव] (perfect 1st dual). Derivation: @deva[ग्रह्] + @deva[तृच्] → @deva[ग्रह्] + @deva[इ] + @deva[तृ] → @deva[ग्रह्] + @deva[ई] + @deva[तृ] → @deva[ग्रहीतृ] → @deva[ग्रहीता].
"""

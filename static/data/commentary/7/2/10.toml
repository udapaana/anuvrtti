id = "7.2.10"
numericId = "72010"

[en]
simple = """
The @deva[इट्] augment is not added after monosyllabic, @[anudātta] (unaccented) roots. These are the '@deva[अनिट्]' roots proper.
"""

standard = """
Roots that are: (1) @deva[एकाच्] (monosyllabic in @deva[धातुपाठ]), and (2) @deva[अनुदात्त] (without svara marking), are @deva[अनिट्]. The @deva[अनिट्]-@deva[कारिका] lists them: vowel-final roots, @deva[भृ]-class, @deva[वृञ्]/@deva[वृङ्], @deva[श्वि], @deva[डीङ्], @deva[इ]-class (@deva[इण्]), @deva[शीङ्]/@deva[श्रिञ्], certain @deva[गणस्थ] roots, @deva[ऊ]-finals, and specific others.
"""

advanced = """
The @deva[कारिका] systematizes @deva[अनिट्] roots: @deva[अनिट्स्वरान्तो] @deva[भवति] (vowel-finals are @deva[अनिट्]), plus @deva[भृ]-class (@deva[अदन्तभॄदन्तभृताम्]), @deva[वृञ्]/@deva[वृङ्], @deva[श्वि]/@deva[डीङ्], @deva[इ]-class, @deva[शीङ्]/@deva[श्रिञ्], @deva[गणस्थ] @deva[ऊ]-finals, etc. These roots never take @deva[इट्] before consonant-initial affixes: @deva[कृ] → @deva[कर्तुम्] (not *@deva[करितुम्]), @deva[भृ] → @deva[भर्तुम्].
"""

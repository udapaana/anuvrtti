id = "7.2.1"
numericId = "72001"

[en]
simple = """
Before the aorist @deva[स्] (@deva[सिच्]), parasmaipada endings cause @[vṛddhi] of the final @deva[इक्] vowel. @deva[नी] → @deva[नै]: @deva[अनैषीत्] 'he led', @deva[कृ] → @deva[कार्]: @deva[अकार्षीत्] 'he did'.
"""

standard = """
In parasmaipada @deva[स्]-aorist (@deva[लुङ्] with @deva[सिच्]), the stem's final @deva[इक्] (@deva[इ]/@deva[उ]/@deva[ऋ], short or long per @ref[1.1.3]) undergoes @[vṛddhi]: @deva[अचैषीत्] (@deva[चि]), @deva[अनैषीत्] (@deva[नी]), @deva[अलावीत्] (@deva[लू]), @deva[अपावीत्] (@deva[पू]), @deva[अकार्षीत्] (@deva[कृ]), @deva[अहार्षीत्] (@deva[हृ]).
"""

advanced = """
The @deva[इक्] is understood from @ref[1.1.3]. The @[vṛddhi] (not @[guṇa]) is express (@deva[प्रत्यक्ष]), overriding the @[antaraṅga] @[guṇa] rule. Derivation: @deva[नी] + @deva[लुङ्] → @deva[अ] + @deva[नी] + @deva[सिच्] + @deva[त्] → @deva[अ] + @deva[नै] + @deva[स्] + @deva[ई] + @deva[त्] → @deva[अनैषीत्] (with @deva[षत्व] by @ref[8.3.59]). The parasmaipada restriction means @[ātmanepada] uses different patterns.
"""

id = "7.2.81"
numericId = "72081"

[en]
simple = """
After a short-@deva[अ]-ending stem, @deva[इय्] replaces the @deva[आ] of @deva[ङित्] @[sārvadhātuka] endings (@deva[आते], @deva[आथे], @deva[आताम्], @deva[आथाम्]). @deva[पचेते], @deva[पचेथे].
"""

standard = """
For @deva[अकारान्त] stems, the @deva[आ] of @deva[ङित्] endings → @deva[इय्]: @deva[आते] → @deva[एते] (@deva[पचेते]), @deva[आथे] → @deva[एथे] (@deva[पचेथे]), @deva[आताम्] → @deva[एताम्] (@deva[पचेताम्]), @deva[आथाम्] → @deva[एथाम्] (@deva[पचेथाम्]). @deva[य्]-elision by @ref[6.1.66].
"""

advanced = """
The @deva[ङित्] (@deva[ङ्]-marked) endings @deva[आते]/@deva[आथे] (present) and @deva[आताम्]/@deva[आथाम्] (imperfect/potential) have their @deva[आ] replaced by @deva[इय्] after @deva[अकारान्त]. Combined with @deva[य्]-elision: @deva[अ] + @deva[इय्] → @deva[ए]. Why @deva[दीर्घ]-@deva[आ] specified? Short @deva[आ] (if existed) wouldn't undergo this. Future forms also: @deva[दास्येते], @deva[दास्यथे].
"""

id = "7.2.46"
numericId = "72046"

[en]
simple = """
@deva[वलादि] @[ārdhadhātuka] affixes optionally take @deva[इट्] after @deva[कुष्] when preceded by @deva[निर्]. @deva[निष्कोष्टा] or @deva[निष्कोषिता].
"""

standard = """
With @deva[निर्] prefix, @deva[कुष्] optionally takes @deva[इट्] before @deva[वलादि] @[ārdhadhātuka]: @deva[निष्कोष्टा]/@deva[निष्कोषिता], @deva[निष्कोष्टुम्]/@deva[निष्कोषितुम्], @deva[निष्कोष्टव्यम्]/@deva[निष्कोषितव्यम्]. Without @deva[निर्]: @deva[कोषिता], @deva[कोषितुम्], @deva[कोषितव्यम्] only (@deva[सेट्] by default).
"""

advanced = """
The specification @deva[निर्] (not @deva[निस्]) indicates a distinct preposition. The @deva[स्]-form @deva[निस्] would give different sandhi. With @deva[निर्]: optional @deva[अनिट्]/@deva[सेट्]; without prefix: only @deva[सेट्]. This prefix-conditioned @deva[विकल्प] is specific to @deva[कुष्].
"""

id = "7.2.74"
numericId = "72074"

[en]
simple = """
The desiderative @deva[सन्] takes @deva[इट्] after @deva[स्मिङ्], @deva[पूङ्], @deva[ऋ], @deva[अञ्जू], @deva[अशू]. @deva[सिस्मयिषते], @deva[पिपविषते], @deva[अरिरिषति].
"""

standard = """
Before @deva[सन्], these are @deva[सेट्]: @deva[स्मिङ्] → @deva[सिस्मयिषते]; @deva[पूङ्] → @deva[पिपविषते] (@ref[7.4.80]); @deva[ऋ] → @deva[अरिरिषति]; @deva[अञ्जू] → @deva[अञ्जिजिषति] (@ref[6.1.2]-3); @deva[अशू] (@deva[स्वादि]) → @deva[अशिशिषते]. Not @deva[पूञ्] (different root): @deva[पुपूषति].
"""

advanced = """
Distinctions: @deva[पूङ्] (this rule, @deva[सेट्]: @deva[पिपविषते]) vs. @deva[पूञ्] (not this rule, @deva[अनिट्]: @deva[पुपूषति]). The @deva[अश्] here is @deva[स्वादि] @deva[अश्] 'to eat', not @deva[क्र्यादि] @deva[अश्] 'to pervade' (which is always @deva[सेट्] anyway). The @ref[6.1.2]-3 reference for @deva[अञ्जू] addresses the reduplication pattern.
"""

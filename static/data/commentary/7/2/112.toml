id = "7.2.112"
numericId = "72112"

[en]
simple = """
From instrumental singular onward, @deva[अन] replaces the @deva[इद्] of @deva[इदम्] (unless @deva[अकच्] is added). @deva[अनेन], @deva[अनयोः].
"""

standard = """
For @deva[इदम्] from @deva[तृतीया]-@deva[एकवचन] onward (@deva[आप्] = @deva[टा] to @deva[सुप्] range), @deva[इद्] → @deva[अन] (when no @deva[अकच्]): @deva[अनेन] (inst.), @deva[अनयोः] (gen./loc.du.). With @deva[अकच्]: @deva[इमकेन], @deva[इमकयोः] (not @deva[अन]).
"""

advanced = """
The @deva[आप्] @[pratyāhāra] spans @deva[टा] (instrumental sg.) to @deva[सुप्] (locative pl.). The @deva[अकच्] (@ref[5.3.71]) exception: when emphatic @deva[अकच्] is added, @deva[इम]- stem (from @ref[7.2.109]) is used: @deva[इमक] → @deva[इमकेन]. Otherwise @deva[अन]: @deva[इद] + @deva[अन] → @deva[अन] (with @deva[इद्]-lopa).
"""

id = "7.2.38"
numericId = "72038"

[en]
simple = """
After @deva[वृ] and @deva[ॠ]-ending roots, the @deva[इट्] is optionally lengthened (except in perfect). @deva[वरिता] or @deva[वरीता], @deva[तरिता] or @deva[तरीता].
"""

standard = """
Optional @deva[ई] for @deva[इट्] after @deva[वृ] (both @deva[वृञ्] and @deva[वृङ्]) and @deva[ॠ]-finals, except @deva[लिट्]: @deva[वरिता]/@deva[वरीता], @deva[प्रावरिता]/@deva[प्रावरीता]; @deva[तरिता]/@deva[तरीता], @deva[आस्तरिता]/@deva[आस्तरीता]. Not for @deva[कृ]/@deva[हृ] (short @deva[ऋ]): @deva[करिष्यति], @deva[हरिष्यति]. Not in @deva[लिट्]: @deva[ववरिथ], @deva[तैरिथ].
"""

advanced = """
The condition is @deva[वृत्] (specifically @deva[वृ]) plus @deva[ॠकारान्त] (long @deva[ॠ]-final roots). Short @deva[ऋ]-finals (@deva[कृ], @deva[हृ]) are excluded: @deva[करिष्यति], @deva[हरिष्यति] (no lengthening). The option creates doublets: @deva[तरिता]/@deva[तरीता], @deva[स्तरिता]/@deva[स्तरीता]. Perfect forms retain short @deva[इ]: @deva[ववरिथ], @deva[तैरिथ].
"""

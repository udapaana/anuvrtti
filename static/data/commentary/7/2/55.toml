id = "7.2.55"
numericId = "72055"

[en]
simple = """
@deva[क्त्वा] takes @deva[इट्] after @deva[जॄ] and @deva[व्रश्च्]. @deva[जरित्वा] or @deva[जरीत्वा], @deva[व्रश्चित्वा].
"""

standard = """
Before @deva[क्त्वा] only: @deva[जॄ] takes @deva[इट्] (with optional lengthening by @ref[7.2.38]): @deva[जरित्वा]/@deva[जरीत्वा]; @deva[व्रश्च्] takes @deva[इट्]: @deva[व्रश्चित्वा]. @deva[जॄ] was prohibited by @ref[7.2.11]; @deva[व्रश्च्] (@deva[ऊदित्]) would be optionally @deva[सेट्] by @ref[7.2.44].
"""

advanced = """
The @deva[क्त्वा]-specific mention stops the anuvrtti of @deva[क्त]/@deva[क्तवतु]. @deva[जॄ] as @deva[ॠ]-final would be @deva[अनिट्] by @ref[7.2.11]; this enables @deva[इट्]. @deva[व्रश्च्] (@deva[व्रश्चू] in @deva[धातुपाठ]) being @deva[ऊदित्] has @ref[7.2.44]'s option, but this makes it specifically @deva[सेट्] for @deva[क्त्वा]. The length option (@deva[जरित्वा]/@deva[जरीत्वा]) follows 7.2.38.
"""

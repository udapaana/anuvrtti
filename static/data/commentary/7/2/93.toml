id = "7.2.93"
numericId = "72093"

[en]
simple = """
In nominative plural, @deva[यूय] replaces @deva[युष्म्] and @deva[वय] replaces @deva[अस्म्]. @deva[यूयम्], @deva[वयम्].
"""

standard = """
For @deva[प्रथमा]-@deva[बहुवचन] (nominative plural): @deva[युष्म्] → @deva[यूय] (@deva[यूयम्]), @deva[अस्म्] → @deva[वय] (@deva[वयम्]). Compounds: @deva[परमयूयम्], @deva[परमवयम्], @deva[अतियूयम्], @deva[अतिवयम्]. The @deva[तदन्त]-@deva[विधि] applies per @deva[अङ्गाधिकारे] @deva[तस्य] @deva[च] @deva[तदुत्तरपदस्य] @deva[च].
"""

advanced = """
After @deva[यूय]/@deva[वय] substitution, @deva[द्] is elided by @ref[7.2.90], and @deva[म्] (nominative ending) attaches. The @deva[तदन्त]-@deva[विधि] (@ref[7.3.10]) allows compound application. Derivation: @deva[युष्मद्] + @deva[जस्] → @deva[यूय] + @deva[द्] + @deva[अम्] → @deva[यूय] + @deva[अम्] (@deva[द्]-lopa) → @deva[यूयम्].
"""

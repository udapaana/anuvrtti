id = "7.2.85"
numericId = "72085"

[en]
simple = """
Before consonant-initial case-endings, @deva[आ] replaces the final of @deva[रै] 'wealth'. @deva[राभ्याम्], @deva[राभिः].
"""

standard = """
For @deva[रै], @deva[ऐ] → @deva[आ] before @deva[हलादि] (consonant-initial) @deva[सुप्]: @deva[राभ्याम्], @deva[राभिः]. Before @deva[अजादि] (vowel-initial): @deva[रायौ], @deva[रायः] (no change). Before @deva[तद्धित]: @deva[रैत्वम्], @deva[रैता] (no change).
"""

advanced = """
The condition @deva[हलादि] @deva[विभक्ति] restricts this to consonant-initial case-endings. The @deva[दिफ्थोंग] @deva[ऐ] → @deva[आ] creates the stem @deva[रा]- before -@deva[भ्याम्], -@deva[भिः], etc. Vowel-initial endings retain @deva[ऐ] with @deva[य्]-insertion: @deva[राय्] + @deva[औ] → @deva[रायौ]. Taddhita affixes don't trigger: @deva[रैत्वम्].
"""

id = "7.2.59"
numericId = "72059"

[en]
simple = """
Parasmaipada @deva[स्]-initial @[ārdhadhātuka] affixes don't take @deva[इट्] after @deva[वृत्] and three following roots (@deva[वृध्], @deva[शृध्], @deva[स्यन्द्]). @deva[वर्त्स्यति], @deva[शर्त्स्यति].
"""

standard = """
In parasmaipada, @deva[स्]-initial affixes are @deva[अनिट्] for: @deva[वृत्] → @deva[वर्त्स्यति], @deva[विवृत्सति]; @deva[वृध्] → @deva[वर्त्स्यति], @deva[विवृत्सति]; @deva[शृधू] → @deva[शर्त्स्यति], @deva[शिशृत्सति]; @deva[स्यन्दू] → @deva[स्यन्त्स्यति], @deva[सिस्यन्त्सति].
"""

advanced = """
The @deva[वृदादि] (@deva[वृत्] + three followers) class is @deva[अनिट्] before parasmaipada @deva[स्]-initial affixes. In @[ātmanepada], these would take @deva[इट्]: @deva[वर्तिष्यते], @deva[वर्धिष्यते], etc. This creates a voice-asymmetry similar to @ref[7.2.58] but in reverse (@deva[अनिट्] in parasmaipada, @deva[सेट्] in @[ātmanepada]).
"""

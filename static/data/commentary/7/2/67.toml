id = "7.2.67"
numericId = "72067"

[en]
simple = """
The perfect participle @deva[वस्] takes @deva[इट्] when the reduplicated stem is monosyllabic, or after @deva[आ]-final roots, or after @deva[घस्]. @deva[पेचिवान्], @deva[तस्थिवान्], @deva[जक्षिवान्].
"""

standard = """
The @deva[वस्] (@deva[क्वसु]) affix takes @deva[इट्] when: (1) reduplicated stem = @deva[एकाच्] (monosyllabic): @deva[आदिवान्], @deva[ओशिवान्], @deva[पेचिवान्], @deva[शेकिवान्]; (2) after @deva[आकार]-final: @deva[तस्थिवान्]; (3) after @deva[घस्]: @deva[जक्षिवान्].
"""

advanced = """
The @deva[एकाच्] condition: when reduplication + root = one syllable. In @deva[आद्] (@deva[अ]+@deva[अद्]→@deva[आद्]), @deva[ओश्] (@deva[अ]+@deva[उश्]→@deva[ओश्]), the coalescence creates monosyllables. In @deva[पेच्], @deva[शेक्] (from @deva[पच्], @deva[शक्]), the reduplicate is elided, leaving monosyllable. These + @deva[आ]-finals + @deva[घस्] constitute the @deva[इट्]-taking class for @deva[वस्].
"""

id = "7.2.92"
numericId = "72092"

[en]
simple = """
In dual, @deva[युव] replaces @deva[युष्म्] and @deva[आव] replaces @deva[अस्म्]. @deva[युवाम्], @deva[आवाम्], @deva[युवाभ्याम्], @deva[आवाभ्याम्], @deva[युवयोः], @deva[आवयोः].
"""

standard = """
For @deva[द्विवचन] (dual), @deva[युष्म्] → @deva[युव], @deva[अस्म्] → @deva[आव]: nominative/accusative @deva[युवाम्]/@deva[आवाम्], instrumental @deva[युवाभ्याम्]/@deva[आवाभ्याम्], genitive/locative @deva[युवयोः]/@deva[आवयोः]. Compounds retain this: @deva[अतियुवाम्] = @deva[अतिक्रान्तं] @deva[युवाम्].
"""

advanced = """
The @deva[द्विवचन] (dual) substitution applies even in compounds where duality is prominent, unless another substitute (@ref[7.2.94] etc.) intervenes. Examples: @deva[अतियुवाम्], @deva[अत्यावाम्] (accusative); @deva[अतियुवान्], @deva[अत्यावान्] (accusative plural of compound). The @deva[तदन्त]-@deva[विधि] extends application to compounds.
"""

id = "7.2.11"
numericId = "72011"

[en]
simple = """
@deva[फित्] (affixes with indicatory @deva[फ्]) don't take @deva[इट्] after @deva[श्रि] or after monosyllabic @deva[ऊक्]-final (@deva[उ]/@deva[ऊ]/@deva[ऋ]/@deva[ॠ]) roots. @deva[श्रित्वा], @deva[कृत्वा], @deva[भृतः].
"""

standard = """
After @deva[श्रि] or @deva[एकाच्] @deva[ऊक्]-final (@deva[उ]/@deva[ऊ]/@deva[ऋ]/@deva[ॠ]) roots, @deva[फित्] affixes (@deva[क्त], @deva[क्त्वा], etc.) are @deva[अनिट्]: @deva[श्रित्वा], @deva[श्रितः]; @deva[युत्वा], @deva[युतः]; @deva[लूत्वा], @deva[लूतः]; @deva[कृत्वा], @deva[कृतः]; @deva[भृत्वा], @deva[भृतः].
"""

advanced = """
The @deva[कारिका] notes: @deva[वाच्य] @deva[ऊर्णोर्नुवद्भावो]—for @deva[ऊर्णु], the @deva[नुवत्] (@deva[नु]-like) treatment must be stated. The @deva[एकाच्] restriction and @deva[आम्]-prohibition serve to correctly delimit the @deva[अनिट्] scope. @deva[फित्] affixes include @deva[क्त], @deva[क्त्वा], @deva[क्तवतु] with their indicatory @deva[फ्] marking @deva[अनिट्] behavior after these root classes.
"""

id = "7.2.26"
numericId = "72026"

[en]
simple = """
@deva[वृत्त] is formed from causative of @deva[वृत्] meaning 'studied/read', without @deva[इट्] and with @deva[णिच्]-elision. @deva[वृत्तो] @deva[गुणो] @deva[देवदत्तेन] 'Devadatta has studied the @[guṇa] section'.
"""

standard = """
From √@deva[वृत्] (causative) meaning 'studied/recited': @deva[वृत्त] (no @deva[इट्], @deva[णिच्]-@deva[लुक्]). Examples: @deva[वृत्तो] @deva[गुणो] @deva[देवदत्तेन], @deva[वृत्तं] @deva[पारायणम्]. When not meaning 'read': @deva[वर्त्तितम्] (regular causative participle).
"""

advanced = """
The root @deva[वृत्] is intransitive; the causative makes it transitive (reading = causing something to be gone through). The irregularities: (1) no @deva[इट्], (2) @deva[णिच्]-@deva[लोप] (causative marker elided). The term '@deva[गुण]-@deva[पाठ]' refers to a Vedic recitation style. Other meanings of @deva[वृत्]-causative: @deva[वर्त्तितम्].
"""

id = "7.2.53"
numericId = "72053"

[en]
simple = """
@deva[क्त्वा], @deva[क्त], and @deva[क्तवतु] take @deva[इट्] after @deva[अञ्च्] when meaning 'to honor'. @deva[अञ्चित्वा] @deva[जानु] @deva[जुहोति], @deva[अञ्चिता] @deva[अस्य] @deva[गुरवः].
"""

standard = """
With @deva[पूजा] (honor) meaning, @deva[अञ्च्] takes @deva[इट्] before these affixes: @deva[अञ्चित्वा] @deva[जानु] @deva[जुहोति] 'having bent the knee, he offers'; @deva[अञ्चिता] @deva[अस्य] @deva[गुरवः] 'his teachers are honored' (@ref[3.2.188], @ref[6.4.30], @ref[2.3.67]).
"""

advanced = """
@deva[अञ्चु] being @deva[उदित्] would optionally take @deva[इट्] for @deva[क्त्वा] by @ref[7.2.56], triggering @ref[7.2.15]'s @deva[अनिट्] for @deva[निष्ठा]. This @[sūtra] makes @deva[इट्] obligatory in the @deva[पूजार्थ] context. The construction '@deva[अञ्चित्वा] @deva[जानु]' shows the absolutive with bent knee in ritual worship.
"""

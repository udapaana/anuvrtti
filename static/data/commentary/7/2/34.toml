id = "7.2.34"
numericId = "72034"

[en]
simple = """
In Vedic, these irregular forms occur (some with @deva[इट्], some without): @deva[ग्रसित], @deva[स्कभित], @deva[स्तभित], @deva[चत्त], @deva[विकस्त], @deva[तरुतृ], @deva[उज्ज्वलिति], etc.
"""

standard = """
Vedic shows irregular @deva[इट्]/@deva[अनिट्] distribution: with @deva[इट्]: @deva[ग्रसित], @deva[स्कभित], @deva[स्तभित], @deva[उत्तभित]; without @deva[इट्]: @deva[चत्त], @deva[विकस्त], @deva[विशस्तृ], @deva[शंस्तृ], @deva[शास्तृ]. Agent nouns: @deva[तरुतृ]/@deva[तरूतृ], @deva[वरुतृ]/@deva[वरूतृ]. Finite verbs: @deva[उज्ज्वलिति], @deva[क्षरिति], @deva[क्षमिति], @deva[वमिति], @deva[अमिति].
"""

advanced = """
This catalogs 19 Vedic irregularities: items 1-4 (@deva[ग्रसित] etc.) have unusual @deva[इट्]; 5-6 (@deva[चत्त], @deva[विकस्त]) lack expected @deva[इट्]; 7-9 (@deva[विशस्तृ] etc.) are agent nouns; 10-15 show vowel-length variants (@deva[तरुतृ]/@deva[तरूतृ]); 16-19 are finite forms with irregular @deva[इट्]. The @deva[बहुलम्] principle covers such Vedic diversity.
"""

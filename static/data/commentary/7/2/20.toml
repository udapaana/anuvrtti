id = "7.2.20"
numericId = "72020"

[en]
simple = """
The irregular participle @deva[दृढ] from @deva[दृंह्] means 'stout, strong'. In other senses: @deva[दृंहितम्] or @deva[दृहितम्].
"""

standard = """
@deva[दृढ] is an irregular @deva[अनिट्] form from @deva[दृह्]/@deva[दृंह्] + @deva[क्त], meaning 'stout/strong'. Formation: @deva[ह]-elision, nasal-elision, @deva[त] → @deva[ढ] change, no @deva[इट्]. Other meanings use regular forms: @deva[दृंहितम्]/@deva[दृहितम्] (with @deva[इट्]).
"""

advanced = """
Two roots exist: @deva[दृह्] (1.769, without nasal) and @deva[दृंह्] (1.770, with nasal). @deva[दृढ] derives from either by: (1) @deva[ह्]-lopa, (2) nasal-lopa, (3) @deva[त] → @deva[ढ], (4) no @deva[इट्]. The @deva[स्थैर्य] (firmness) vs. @deva[अस्थैर्य] (lack of firmness) semantic distinction: @deva[दृढ] = firm; @deva[दृंहित]/@deva[दृहित] = made firm (causative sense).
"""

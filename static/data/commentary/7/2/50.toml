id = "7.2.50"
numericId = "72050"

[en]
simple = """
@deva[क्त्वा], @deva[क्त], and @deva[क्तवतु] optionally take @deva[इट्] after @deva[क्लिश्]. @deva[क्लिष्ट्वा] or @deva[क्लिशित्वा], @deva[क्लिष्टः] or @deva[क्लिशितः].
"""

standard = """
After @deva[क्लिश्], these affixes have optional @deva[इट्]: @deva[क्लिष्ट्वा]/@deva[क्लिशित्वा], @deva[क्लिष्टः]/@deva[क्लिशितः], @deva[क्लिष्टवान्]/@deva[क्लिशितवान्]. @deva[क्लिशू] (IX.50 with @deva[ऊदित्]) would be optional for @deva[क्त्वा] by @ref[7.2.44] but always @deva[अनिट्] for @deva[निष्ठा] by @ref[7.2.15]; this enables the option for all three.
"""

advanced = """
Two @deva[क्लिश्] roots exist: @deva[क्लिशू] (@deva[क्र्यादि], @deva[ऊदित्]) and @deva[क्लिश्] (@deva[दिवादि], @deva[उपतापे]). The @deva[ऊदित्] status creates optional @deva[सेट्] by @ref[7.2.44], which triggers @deva[नित्य]-@deva[अनिट्] for @deva[निष्ठा] by @ref[7.2.15]. This @[sūtra] overrides that pattern, allowing @deva[इट्]-@deva[विकल्प] for all three affixes.
"""

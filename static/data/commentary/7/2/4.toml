id = "7.2.4"
numericId = "72004"

[en]
simple = """
Consonant-ending stems do NOT get @[vṛddhi] when @deva[सिच्] takes the @deva[इट्] augment. @deva[देव्] + @deva[इट्] → @deva[अदेवीत्] (not *@deva[अदैवीत्]).
"""

standard = """
When @deva[सिच्] becomes @deva[सेट्] (with @deva[इट्]), @deva[हलन्त] stems lack @[vṛddhi]: @deva[अदेवीत्] (@deva[देव्]), @deva[असेवीत्] (@deva[सेव्]), @deva[अकोषीत्] (@deva[कुष्]), @deva[अमोषीत्] (@deva[मुष्]). But @deva[अच्]-ending roots still get @[vṛddhi]: @deva[अलावीत्] (@deva[लू], vowel-final).
"""

advanced = """
This restricts @ref[7.2.3]'s @deva[हलन्त]-@[vṛddhi] to @deva[अनिट्] contexts. Question: doesn't @deva[लू] become @deva[लव्] (consonant-final) after @[guṇa]? Answer: the express @[vṛddhi] overrides @[antaraṅga] @[guṇa], so @deva[लू] remains vowel-final for this rule's purpose. Result: @deva[हलन्त] + @deva[इट्] = no @[vṛddhi]; @deva[अच्] + @deva[इट्] or @deva[अनिट्] = @[vṛddhi].
"""

id = "7.2.32"
numericId = "72032"

[en]
simple = """
In Vedic, @deva[अपरिह्वृता] is an irregular form where the @deva[ह्रु] substitution does NOT occur. @deva[अपरिह्वृताः] @deva[सनुयाम] @deva[वाजम्].
"""

standard = """
Exception to @ref[7.2.31]: in @deva[अपरिह्वृता], the expected @deva[ह्रु] substitution doesn't happen. @[ṛg] Veda I.100.19: @deva[अपरिह्वृताः] @deva[सनुयाम] @deva[वाजम्] 'may we win the prize undeceived.'
"""

advanced = """
This @deva[निपातन] (irregular form) blocks @ref[7.2.31]'s @deva[ह्वर्] → @deva[ह्रु] in this specific word. The preservation of @deva[ह्वृ] (with @[vṛddhi] vowel) creates the form @deva[अपरिह्वृता] rather than expected *@deva[अपरिह्रुता]. Such Vedic irregularities are catalogued as exceptions to general rules.
"""

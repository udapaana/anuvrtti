id = "7.2.56"
numericId = "72056"

[en]
simple = """
@deva[क्त्वा] optionally takes @deva[इट्] after roots with indicatory short @deva[उ] (@deva[उदित्]). @deva[शमित्वा] or @deva[शान्त्वा], @deva[तमित्वा] or @deva[तान्त्वा].
"""

standard = """
@deva[उदित्] (short @deva[उ] as @deva[इत्]) roots have optional @deva[इट्] before @deva[क्त्वा]: @deva[शमु] → @deva[शमित्वा]/@deva[शान्त्वा]; @deva[तमु] → @deva[तमित्वा]/@deva[तान्त्वा]; @deva[दमु] → @deva[दमित्वा]/@deva[दान्त्वा]. The @deva[अनिट्] forms show nasal + @deva[त] changes.
"""

advanced = """
The @deva[उदित्] class (roots with @deva[इत्] @deva[उ] in @deva[धातुपाठ]) differs from @deva[ऊदित्] (long @deva[ऊ]). For @deva[क्त्वा] specifically: @deva[इट्] optional. The @deva[अनिट्] alternatives show characteristic changes: @deva[शम्] → @deva[शान्त्वा] (@deva[म] → @deva[न] before @deva[त]), @deva[तम्] → @deva[तान्त्वा], @deva[दम्] → @deva[दान्त्वा]. This @deva[विकल्प] doesn't extend to @deva[क्त]/@deva[क्तवतु].
"""

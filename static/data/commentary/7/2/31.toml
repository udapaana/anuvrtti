id = "7.2.31"
numericId = "72031"

[en]
simple = """
In Vedic, @deva[ह्रु] replaces @deva[ह्वर्] before the participle affix. @deva[ह्वर्] → @deva[ह्रुतः] 'deceived' (Vedic), @deva[ह्वृतम्] (classical).
"""

standard = """
In @deva[छन्दस्], @deva[ह्वर्] becomes @deva[ह्रु] before @deva[निष्ठा]: @deva[ह्रुतस्य] @deva[चाह्रुतस्य] @deva[च], @deva[आह्रुतमसि] @deva[हविर्धानम्] (@[vāj]. @[saṃ]. I.9). Classical Sanskrit uses @deva[ह्वृतम्] without this substitution.
"""

advanced = """
The @deva[ह्वर्] → @deva[ह्रु] substitution is Veda-specific, showing archaic phonology. The root @deva[ह्वर्]/@deva[ह्वृ] 'to deceive' takes this special treatment only before @deva[क्त]/@deva[क्तवतु] in Vedic. Classical forms: @deva[ह्वृत] (from @deva[ह्वृ] directly). This creates a Vedic/Classical split in participle formation.
"""

id = "7.2.105"
numericId = "72105"

[en]
simple = """
Before the ending @deva[अत्], @deva[कु] replaces @deva[किम्]. @deva[क्व] @deva[गमिष्यसि] 'where will you go?'
"""

standard = """
For @deva[किम्] before @deva[अत्] (locative), @deva[कु] replaces: @deva[कु] + @deva[अत्] → @deva[क्व] (by @deva[उ] + @deva[अ] → @deva[व]). If @ref[7.2.104]'s @deva[कु] were used, it would cause @[guṇa] (*@deva[को] + @deva[अ]). This separate @deva[कु]-substitute avoids @[guṇa].
"""

advanced = """
Why separate @[sūtra]? The @deva[कु] of @ref[7.2.104] before @deva[अ] would trigger @[guṇa]: @deva[कु] + @deva[अ] → @deva[को] (@ref[6.1.87]). But @deva[क्व] shows no @[guṇa]. Hence this specific @deva[कु] before @deva[अत्]. The form @deva[क्व] (not *@deva[को]) requires this separate rule. @deva[अकच्]-augmented @deva[किम्] also takes this: @deva[किमक] → @deva[कुक] before @deva[अत्].
"""

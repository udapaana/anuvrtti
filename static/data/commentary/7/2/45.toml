id = "7.2.45"
numericId = "72045"

[en]
simple = """
@deva[वलादि] @[ārdhadhātuka] affixes optionally take @deva[इट्] after @deva[रध्] and the seven following roots (@deva[दिवादि] 91-94). @deva[रधिता] or @deva[रद्धा], @deva[नशिता] or @deva[नंष्टा].
"""

standard = """
Optional @deva[इट्] for @deva[रध्] and seven following @deva[दिवादि] roots: @deva[रधिता]/@deva[रद्धा]; @deva[नशिता]/@deva[नंष्टा] (@ref[7.1.60] @deva[नुम्]); @deva[तर्पिता]/@deva[त्रप्ता]/@deva[तर्प्ता] (@ref[6.1.59] @deva[अम्]); @deva[दर्पिता]/@deva[द्रप्ता]/@deva[दर्प्ता]; @deva[द्रोहिता]/@deva[द्रोग्धा]/@deva[द्रोढा] (@ref[8.2.33]); @deva[मोहिता]/@deva[मोग्धा]/@deva[मोढा]; @deva[स्नोढा]/@deva[स्नेहिता].
"""

advanced = """
The @deva[रधादि] class (@deva[दिवादि] @[gaṇa] items 91-94) shows optional @deva[इट्] + various phonological changes. Multiple forms arise: @deva[रध्] (2 forms), @deva[नश्] (2, with @deva[नुम्]), @deva[तृप्] (3, with @deva[अम्]-augment), @deva[दृप्] (3), @deva[द्रुह्] (3, with @deva[ढत्व]), @deva[मुह्] (3, with @deva[ढत्व]), @deva[स्निह्] (2). The complexity reflects intersecting rules.
"""

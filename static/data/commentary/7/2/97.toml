id = "7.2.97"
numericId = "72097"

[en]
simple = """
In remaining singular cases, @deva[त्व] replaces @deva[युष्म्] and @deva[म] replaces @deva[अस्म्]. @deva[त्वाम्], @deva[माम्], @deva[त्वया], @deva[मया], @deva[त्वत्], @deva[मत्], @deva[त्वयि], @deva[मयि].
"""

standard = """
For @deva[शेष]-@deva[एकवचन] (remaining singular: accusative, instrumental, ablative, locative): @deva[युष्म्] → @deva[त्व], @deva[अस्म्] → @deva[म]: @deva[त्वाम्]/@deva[माम्] (acc.), @deva[त्वया]/@deva[मया] (inst.), @deva[त्वत्]/@deva[मत्] (abl.), @deva[त्वयि]/@deva[मयि] (loc.). Compounds follow sense: @deva[अतित्वाम्], @deva[अतिमाम्].
"""

advanced = """
The @deva[शेष] covers cases not handled by @ref[7.2.94]-96. Compound examples by sense: @deva[अतित्वम्] (@deva[अतिक्रान्तः] @deva[त्वाम्] 'surpassing you'), @deva[अतिमाम्]; plural compounds: @deva[अतित्वान्], @deva[अतिमान्]. The @deva[म]-substitute for @deva[अस्म्] is the minimal suppletive form.
"""

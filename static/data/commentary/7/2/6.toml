id = "7.2.6"
numericId = "72006"

[en]
simple = """
For @deva[ऊर्णु] 'to cover', @[vṛddhi] is optional before @deva[इट्]-augmented parasmaipada @deva[स्]-aorist. @deva[प्रौर्णावीत्] or @deva[प्रौर्णवीत्].
"""

standard = """
The root @deva[ऊर्णु] has optional @[vṛddhi] before @deva[सेट्] parasmaipada @deva[सिच्]: @deva[प्रौर्णावीत्] (with @[vṛddhi]) or @deva[प्रौर्णवीत्] (without). This option applies when @deva[सिच्] is not @deva[ङित्]; when @deva[ङित्] (by optional @ref[1.2.6]), @deva[उवङ्] substitution gives @deva[प्रौर्णुवीत्] (@ref[6.4.77]).
"""

advanced = """
Three possibilities for @deva[ऊर्णु] + @deva[लुङ्]: (1) @deva[सिच्] not @deva[ङित्], with @[vṛddhi]: @deva[प्रौर्णावीत्]; (2) @deva[सिच्] not @deva[ङित्], without @[vṛddhi]: @deva[प्रौर्णवीत्]; (3) @deva[सिच्] @deva[ङित्] (@ref[1.2.6] option): @deva[प्रौर्णुवीत्] (@deva[उवङ्]-substitute by @ref[6.4.77], no @[guṇa]/@[vṛddhi]). The initial @deva[औ] is from @deva[आ]-prefix + @deva[ऊर्णु] (@deva[आ] + @deva[ऊ] → @deva[औ] by @[vṛddhi] sandhi).
"""

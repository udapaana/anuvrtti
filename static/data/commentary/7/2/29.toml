id = "7.2.29"
numericId = "72029"

[en]
simple = """
Participle of @deva[हृष्] optionally takes @deva[इट्] when the word @deva[लोमन्] 'hair' (or synonym) is in construction. @deva[हृष्टानि] or @deva[हृषितानि] @deva[लोमानि] 'hair standing on end'.
"""

standard = """
With @deva[लोमन्] or synonym (@deva[केश] etc.) in construction, @deva[हृष्] + @deva[क्त] is optional: @deva[हृष्टानि] @deva[लोमानि] / @deva[हृषितानि] @deva[लोमानि], @deva[हृष्टाः] @deva[केशाः] / @deva[हृषिताः] @deva[केशाः]. @deva[हृष्] (@deva[हृषु]) with @deva[उदित्] would be @deva[नित्य]-@deva[अनिट्] before @deva[निष्ठा] by @ref[7.2.15].
"""

advanced = """
@deva[हृष्] is @deva[उदित्] (@deva[हृषु] in @deva[धातुपाठ]), making it optionally @deva[सेट्] by @ref[7.2.56], hence @deva[नित्य]-@deva[अनिट्] before @deva[निष्ठा] by @ref[7.2.15]. This @[sūtra] enables @deva[विकल्प] specifically when hair-words are involved (@deva[लोम्ना] @deva[सहचरिते]). The semantic connection: hair bristling from excitement/fear.
"""

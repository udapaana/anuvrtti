id = "7.2.40"
numericId = "72040"

[en]
simple = """
After @deva[वृ] and @deva[ॠ]-ending roots, the @deva[इट्] is NOT lengthened in parasmaipada @deva[स्]-aorist. @deva[प्रावारिष्टाम्], @deva[अतारिष्टाम्] (short @deva[इ]).
"""

standard = """
In parasmaipada @deva[सिच्] (@deva[स्]-aorist), no @deva[ई]-lengthening for @deva[वृ]/@deva[ॠ]-finals: @deva[प्रावारिष्टाम्], @deva[प्रावारिषुः]; @deva[अतारिष्टाम्] (from @deva[तॄ]); @deva[आस्तारिष्टाम्], @deva[आस्तारिषुः]. But @[ātmanepada] allows option: @deva[प्रावरिष्ट]/@deva[प्रावरीष्ट].
"""

advanced = """
The parasmaipada-specific restriction: @deva[सिच्] + @deva[परस्मैपद] = no lengthening option. The @[ātmanepada] forms retain @ref[7.2.38]'s option: @deva[प्रावरिष्ट] or @deva[प्रावरीष्ट]. This creates a voice-based asymmetry in the aorist: parasmaipada (short only) vs. @[ātmanepada] (optional length).
"""

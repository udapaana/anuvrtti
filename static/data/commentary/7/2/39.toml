id = "7.2.39"
numericId = "72039"

[en]
simple = """
After @deva[वृ] and @deva[ॠ]-ending roots, the @deva[इट्] is NOT lengthened in the benedictive (@[āśīrliṅ]). @deva[विवरिषीष्ठ], @deva[आस्तरिषीष्ठ] (short @deva[इ] only).
"""

standard = """
In benedictive (@deva[आशीर्लिङ्]), no @deva[ई]-lengthening for @deva[वृ]/@deva[ॠ]-finals: @deva[विवरिषीष्ठ], @deva[प्रावरिषीष्ठ], @deva[आस्तरिषीष्ठ], @deva[विस्तरिषीष्ठ]. The @deva[इट्] remains short despite @ref[7.2.38]'s general option.
"""

advanced = """
This excepts @deva[आशीर्लिङ्] from @ref[7.2.38]'s optional lengthening. The benedictive forms consistently show short @deva[इ]: @deva[विवरिषीष्ठ] (not *@deva[विवरीषीष्ठ]). This maintains uniformity in the benedictive paradigm for these root classes, unlike the variation in other tenses.
"""

id = "7.2.30"
numericId = "72030"

[en]
simple = """
The form @deva[अपचित] from @deva[अप] + @deva[चाय्] 'to fear/honor' also has an alternative with @deva[इट्]: @deva[अपचायितः].
"""

standard = """
@deva[अपचित] (from @deva[अप] + @deva[चाय्] with irregular @deva[चाय्] → @deva[चि] before @deva[क्त]) also allows @deva[अपचायितः]: @deva[अपचितो]/@deva[अपचायितोऽनेन] @deva[गुरुः] 'the teacher is feared by him'. For 'honor' sense, the participle must be @deva[कर्मणि] (passive voice).
"""

advanced = """
The root @deva[चाय्] (1.9.9) means 'to honor, fear, see'. Before @deva[क्त], @deva[चाय्] irregularly becomes @deva[चि]: @deva[अप] + @deva[चि] + @deva[त] → @deva[अपचित]. The alternative @deva[अपचायित] retains the full root + @deva[इट्]. The semantic distinction: for 'fear' both forms work; for 'honor', the passive (@deva[कर्मणि]) construction is required.
"""

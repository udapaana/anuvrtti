id = "7.2.116"
numericId = "72116"

[en]
simple = """
Before @deva[ञित्] or @deva[णित्] affixes, @[vṛddhi] replaces the penultimate @deva[अ] of a consonant-ending stem. @deva[पच्] → @deva[पाकः] (@deva[घञ्]), @deva[पाचकः] (@deva[ण्वुल्]).
"""

standard = """
For @deva[हलन्त] stems with @deva[उपधा]-@deva[अ], before @deva[ञित्]/@deva[णित्]: @deva[अ] → @deva[आ] (@[vṛddhi]): @deva[पाकः], @deva[त्यागः], @deva[यागः] (@deva[घञ्]); @deva[पाचि] (@deva[णिच्] causative); @deva[पाचकः] (@deva[ण्वुल्]). Not for non-@deva[अ] penultimate: @deva[भेदयति], @deva[भेदकः] (@deva[इ]-penultimate, only @[guṇa]).
"""

advanced = """
Conditions: (1) @deva[हलन्त] (consonant-final stem), (2) @deva[अ] as @deva[उपधा] (penultimate). With @deva[इ]/@deva[उ] penultimate: only @[guṇa] (@deva[भिद्] → @deva[भेदक], not *@deva[भैदक]). This complements @ref[7.2.115] (final vowel) for stems where penultimate @deva[अ] is the relevant vowel.
"""

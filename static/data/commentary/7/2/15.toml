id = "7.2.15"
numericId = "72015"

[en]
simple = """
Roots that are optionally @deva[सेट्] before other affixes are invariably @deva[अनिट्] before @deva[निष्ठा] (@deva[क्त]/@deva[क्तवतु]). @deva[धू] → @deva[विधूतः] (always, never *@deva[विधूइतः]).
"""

standard = """
If a root takes @deva[इट्] optionally elsewhere (by @ref[7.2.44] for @deva[धू]-class, @ref[7.2.56] for others), it is strictly @deva[अनिट्] before @deva[निष्ठा]: @deva[विधूतः], @deva[विधूतवान्] (@deva[धू]); @deva[गूढः], @deva[गूढवान्] (@deva[गुह्]). No optional forms exist for these participles.
"""

advanced = """
This is a @deva[नियम] (restriction): optional @deva[सेट्] roots → @deva[नित्य] @deva[अनिट्] before @deva[निष्ठा]. The @deva[धू]-class (@ref[7.2.44]: @deva[धू] etc. optionally @deva[सेट्] before @deva[वल्]-initial affixes) and similar optional classes (@ref[7.2.56]) become invariably @deva[अनिट्] for @deva[क्त]/@deva[क्तवतु]. This eliminates doublets like *@deva[विधूइतः]/*@deva[विधूतः], giving only @deva[विधूतः].
"""

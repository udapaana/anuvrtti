id = "7.2.101"
numericId = "72101"

[en]
simple = """
Optionally, @deva[जरस्] replaces @deva[जरा] before vowel-initial case-endings. @deva[जरया] or @deva[जरसा], @deva[जरायै] or @deva[जरसे].
"""

standard = """
For @deva[जरा] 'old age', optional @deva[जरस्]-substitution before @deva[अजादि] @deva[विभक्ति]: @deva[जरया]/@deva[जरसा] (inst.), @deva[जरायै]/@deva[जरसे] (dat.). Before @deva[हलादि]: only @deva[जराभ्याम्], @deva[जराभिः]. Neuter plural with @deva[नुम्]: @deva[अतिजरांसि].
"""

advanced = """
The option creates doublets: @deva[आ]-stem (@deva[जरया], @deva[जरायै]) vs. @deva[अस्]-stem (@deva[जरसा], @deva[जरसे]). Before consonant-initial endings, only @deva[आ]-stem: @deva[जराभ्याम्]. The neuter plural (for @[bahuvrīhi] compounds) shows @deva[जरस्] + @deva[नुम्] + @deva[इ] → @deva[जरांसि] (@ref[7.1.72]).
"""

id = "7.2.2"
numericId = "72002"

[en]
simple = """
Short @deva[अ] followed by root-final @deva[र्] or @deva[ल्] also gets @[vṛddhi] before parasmaipada @deva[स्]-aorist. @deva[क्षर्] → @deva[अक्षारीत्] 'it flowed', @deva[ज्वल्] → @deva[अज्वालीत्] 'it blazed'.
"""

standard = """
When short @deva[अ] immediately precedes final @deva[र्]/@deva[ल्] of the root, @[vṛddhi] applies before parasmaipada @deva[सिच्]: @deva[क्षर्] → @deva[अक्षारीत्], @deva[त्सर्] → @deva[अत्सारीत्], @deva[ज्वल्] → @deva[अज्वालीत्], @deva[ह्मल्] → @deva[अह्मालीत्]. This overrides @ref[7.2.7]'s option.
"""

advanced = """
The '@deva[अन्त]' means proximity—@deva[अ] is adjacent to final @deva[र्]/@deva[ल्]. This blocks the @ref[7.2.7] option for such roots. Only short @deva[अ] qualifies: @deva[न्यखारीत्] (@deva[आ] is long, no special @[vṛddhi] rule needed), @deva[न्यमीलीत्] (@deva[ई], not @deva[अ]). The @deva[र्]/@deva[ल्] specification excludes: @deva[मा] @deva[भवानशीत्] (final @deva[श्]), @deva[मा] @deva[भवानटीत्] (final @deva[ट्]).
"""

id = "7.2.63"
numericId = "72063"

[en]
simple = """
According to @[bhāradvāja], only short @deva[ऋ]-final roots that are @deva[अनिट्] before @deva[तास्] have @deva[थल्] also @deva[अनिट्]. @deva[स्मर्त्ता] → @deva[सस्मर्थ].
"""

standard = """
@[bhāradvāja]'s view: only @deva[ऋत्] (short @deva[ऋ]-final) @deva[अनिट्]-@deva[तास्] roots have @deva[अनिट्]-@deva[थल्]: @deva[स्मर्त्ता] → @deva[सस्मर्थ]; @deva[ध्वर्त्ता] → @deva[दध्वर्थ]. The @deva[ऋ]-roots are already covered by @ref[7.2.61]; this restricts others.
"""

advanced = """
This is @deva[आचार्य]-@deva[मत] (teacher's opinion) creating a @deva[नियम]. @[bhāradvāja] restricts @ref[7.2.62]'s scope: only @deva[ऋत्]-finals get the @deva[तास्]-@deva[थल्] parallelism, excluding other consonant-finals. Thus @deva[अद्], @deva[पच्] (@ref[7.2.62] examples) would have optional @deva[इट्] under this view. The mainstream accepts @ref[7.2.62] broadly.
"""

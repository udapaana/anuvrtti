id = "7.2.71"
numericId = "72071"

[en]
simple = """
The @deva[स्]-aorist (@deva[सिच्]) always takes @deva[इट्] after @deva[रुधादि] @deva[अञ्ज्]. @deva[आञ्जीत्], @deva[आञ्जिष्टाम्], @deva[आञ्जिषुः].
"""

standard = """
For @deva[रुधादि] @deva[अञ्ज्] (@deva[अञ्जू]), @deva[सिच्] is @deva[नित्य]-@deva[सेट्]: @deva[आञ्जीत्], @deva[आञ्जिष्टाम्], @deva[आञ्जिषुः]. But other affixes follow @ref[7.2.44] (optional due to @deva[ऊदित्]): @deva[अङ्क्ता]/@deva[अञ्जिता]. The aorist is specifically mandated @deva[सेट्].
"""

advanced = """
@deva[अञ्जू] being @deva[ऊदित्] would have optional @deva[इट्] by @ref[7.2.44] generally. This @[sūtra] makes @deva[सिच्] specifically @deva[नित्य]-@deva[सेट्] for this root. The distinction: aorist (@deva[आञ्जीत्] only) vs. other tenses (@deva[अङ्क्ता]/@deva[अञ्जिता] optional). This isolates aorist behavior from general root behavior.
"""

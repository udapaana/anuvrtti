id = "7.2.106"
numericId = "72106"

[en]
simple = """
In nominative singular, @deva[स्] replaces the non-final @deva[त्]/@deva[द्] of @deva[त्यदादि]. @deva[तद्] → @deva[सः], @deva[एतद्] → @deva[एषः].
"""

standard = """
For @deva[त्यदादि] in @deva[प्रथमा]-@deva[एकवचन], non-final @deva[त्]/@deva[द्] → @deva[स्]: @deva[त्यद्] → @deva[त्य] + @deva[अ] (@ref[7.2.102]) → @deva[स्य] + @deva[अ] → @deva[स्यः]; @deva[तद्] → @deva[त] + @deva[अ] → @deva[स] + @deva[अ] → @deva[सः]; @deva[एतद्] → @deva[एत] + @deva[अ] → @deva[एस] + @deva[अ] → @deva[एषः] (with @deva[षत्व]).
"""

advanced = """
The @deva[अनन्त्य] (non-final) condition means the stem-internal @deva[त्]/@deva[द्] changes, not the final. Derivation: @deva[तद्] + @deva[सु] → @deva[त] + @deva[अ] + @deva[सु] (@ref[7.2.102]) → @deva[स] + @deva[अ] + @deva[स्] (@ref[7.2.106]) → @deva[सः] (@ref[6.1.97]). For @deva[एतद्]: @deva[एत] → @deva[एस] (before @deva[अ]) → @deva[एष] (@deva[षत्व], @ref[8.3.59]) → @deva[एषः].
"""

id = "7.2.25"
numericId = "72025"

[en]
simple = """
Participle of @deva[अर्द्] doesn't take @deva[इट्] when preceded by @deva[अभि] and meaning 'near'. @deva[अभ्यर्णा] @deva[सेना] 'army nearby'.
"""

standard = """
With @deva[अभि] + meaning 'near' (@deva[आविदूर्य]), @deva[अर्द्] + @deva[क्त] = @deva[अभ्यर्ण] (@deva[अनिट्]): @deva[अभ्यर्णा] @deva[सेना], @deva[अभ्यर्णा] @deva[शरत्] (autumn nearby). For other meanings: @deva[अभ्यर्दितो] @deva[वृषलः] @deva[शीतेन] 'the @[śūdra] was plagued by cold'.
"""

advanced = """
The double condition: @deva[अभि] prefix + @deva[आविदूर्य] (nearness) meaning. @deva[आविदूर्य] is the opposite of @deva[विदूर] (remote): @deva[अविदूर] → @deva[आविदूर्य] (state of being non-remote). When meaning @deva[पीडा] (affliction) instead of nearness, the regular @deva[सेट्] form @deva[अभ्यर्दित] applies.
"""

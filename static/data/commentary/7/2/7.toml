id = "7.2.7"
numericId = "72007"

[en]
simple = """
Short @deva[अ] of a root optionally gets @[vṛddhi] before @deva[इट्]-augmented parasmaipada @deva[स्]-aorist, if the stem starts with a consonant and @deva[अ] is light (followed by single consonant). @deva[अकणीत्] or @deva[अकाणीत्].
"""

standard = """
When: (1) short @deva[अ], (2) consonant-initial stem, (3) @deva[अ] is @deva[लघु] (followed by single consonant), @[vṛddhi] is optional before @deva[सेट्] parasmaipada @deva[सिच्]: @deva[अकणीत्]/@deva[अकाणीत्], @deva[अरणीत्]/@deva[अराणीत्]. Not for other vowels: @deva[अदेवीत्], @deva[असेवीत्] (@deva[इ]/@deva[ए], not @deva[अ]).
"""

advanced = """
Three conditions must be met: @deva[अतः] (short @deva[अ]), @deva[हलादेः] (consonant-initial stem), @deva[लघूपधात्] (light penultimate—@deva[अ] followed by one consonant). Without @deva[अतः], the @[sūtra] would wrongly ordain @[vṛddhi] for all vowels. The option creates doublets for this specific class: roots like @deva[कण्], @deva[रण्] with structure CaC-.
"""

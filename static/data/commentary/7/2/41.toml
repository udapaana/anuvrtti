id = "7.2.41"
numericId = "72041"

[en]
simple = """
The desiderative @deva[सन्] optionally takes @deva[इट्] (with optional lengthening) after @deva[वृ] and @deva[ॠ]-ending roots. @deva[वुवूर्षति] or @deva[विवरिषति] or @deva[विवरीषति].
"""

standard = """
Before @deva[सन्], @deva[वृ]/@deva[ॠ]-finals have three possibilities: (1) no @deva[इट्]: @deva[वुवूर्षति], @deva[तितीर्षति]; (2) @deva[इट्] short: @deva[विवरिषति], @deva[तितरिषति]; (3) @deva[इट्] long: @deva[विवरीषति], @deva[तितरीषति]. With prefixes: @deva[प्रावुवूर्षति]/@deva[प्राविवरिषति]/@deva[प्राविवरीषति].
"""

advanced = """
The @deva[सनि] condition creates a three-way split for @deva[वृ]/@deva[ॠ]-finals: (1) @deva[अनिट्] following standard rule, (2) @deva[सेट्] with short @deva[इ], (3) @deva[सेट्] with long @deva[ई]. The compound forms show all three: @deva[आतिस्तीर्षति] (@deva[अनिट्]), @deva[आतिस्तरिषति] (@deva[इट्]), @deva[आतिस्तरीषति] (@deva[ईट्]). @[padamañjarī] notes the first form's validity issue.
"""

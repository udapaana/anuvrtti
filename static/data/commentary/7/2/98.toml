id = "7.2.98"
numericId = "72098"

[en]
simple = """
When signifying a single individual, @deva[त्व] replaces @deva[युष्म्] and @deva[म] replaces @deva[अस्म्] even before affixes or in compounds. @deva[त्वदीयः], @deva[मदीयः], @deva[त्वत्तरः], @deva[मत्तरः].
"""

standard = """
For @deva[एकार्थ] (single-individual reference), @deva[त्व]/@deva[म] substitutes apply before @deva[प्रत्यय] (affixes) and @deva[उत्तरपद] (following compound members): @deva[त्वदीयः] (@deva[छ]-affix, @ref[4.2.114]), @deva[मदीयः]; @deva[त्वत्तरः] (= @deva[अतिशयेन] @deva[त्वम्]), @deva[त्वद्यति] (= @deva[त्वामिच्छति]), @deva[मद्यते] (= @deva[मामिवाचरते]).
"""

advanced = """
The @deva[एकार्थ] condition restricts to singular reference. With @deva[प्रत्यय]: @deva[त्वदीय] (@ref[1.1.74] @deva[तद्धित]), @deva[त्वद्यति] (@deva[क्यच्]-denominative). With @deva[उत्तरपद]: @deva[तव] @deva[गृहम्] → @deva[त्वद्गृहम्]. This extends the singular substitutes beyond case-endings to derivative formations.
"""

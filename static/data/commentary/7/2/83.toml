id = "7.2.83"
numericId = "72083"

[en]
simple = """
After @deva[आस्], @deva[ई] replaces the @deva[आ] of @deva[आन]. @deva[आस्] + @deva[आन] → @deva[आसीनः] 'seated'.
"""

standard = """
For @deva[आस्] 'to sit', the @deva[आ] of @deva[आन] becomes @deva[ई]: @deva[आस्] + @deva[आन] → @deva[आसीन] (@deva[आसीनो] @deva[यजते]). By @ref[1.1.54], the first letter of the following element after ablative @deva[आसः] (i.e., @deva[आ] of @deva[आन]) is replaced.
"""

advanced = """
The @deva[आने] (@ref[7.2.82]) should be read as @deva[षष्ठी] (genitive) here, not @deva[सप्तमी] (locative). The @ref[1.1.54] reference: when a substitute is ordained 'after X' (@deva[पञ्चमी] (ablative)), it replaces the first sound of the following. Thus @deva[आ] of @deva[आन] → @deva[ई] after @deva[आस्], giving the unique form @deva[आसीन].
"""

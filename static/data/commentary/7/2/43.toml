id = "7.2.43"
numericId = "72043"

[en]
simple = """
The @deva[इट्] is optional in @[ātmanepada] benedictive and @deva[स्]-aorist after short @deva[ऋ]-final roots with initial conjunct consonant. @deva[ध्वृषीष्ट] or @deva[ध्वरिषीष्ट].
"""

standard = """
For @deva[संयोगादि] (conjunct-initial) short @deva[ऋ]-final roots, optional @deva[इट्] in @[ātmanepada] @deva[आशीर्लिङ्]/@deva[सिच्]: @deva[ध्वृषीष्ट]/@deva[ध्वरिषीष्ट], @deva[स्मृषीष्ट]/@deva[स्मरिषीष्ट]; @deva[अध्वृषाताम्]/@deva[अध्वरिषाताम्]. Not for non-conjunct: @deva[च्योषीष्ट], @deva[कृषीष्ट] (no option).
"""

advanced = """
Two conditions: (1) @deva[ऋत्] (short @deva[ऋ], not @deva[ॠ]), (2) @deva[संयोगादि] (initial cluster). Thus @deva[ध्वृ], @deva[स्मृ] qualify. Roots like @deva[च्यु], @deva[प्लु] (@deva[उ]-final) or @deva[कृ] (simple initial) don't: @deva[च्योषीष्ट], @deva[प्लोषीष्ट]; @deva[अच्योष्ट], @deva[अप्लोष्ट]; @deva[कृषीष्ट] only. This isolates the cluster-initial short @deva[ऋ] class.
"""

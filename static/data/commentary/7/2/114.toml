id = "7.2.114"
numericId = "72114"

[en]
simple = """
Before affixes, @[vṛddhi] replaces the root vowel of @deva[मृज्]. @deva[मृज्] → @deva[मार्ज्]: @deva[मार्ष्टा], @deva[मार्ष्टुम्], @deva[मार्ष्टव्यम्].
"""

standard = """
For root @deva[मृज्], @deva[ऋ] → @deva[आर्] (@[vṛddhi]) before affixes: @deva[मार्ष्टा], @deva[मार्ष्टुम्], @deva[मार्ष्टव्यम्]. This is for verbal affixes (@deva[धातु]-@deva[प्रत्यय]), not nominal: @deva[कंसपरिमृड्भ्याम्], @deva[मृड्भिः] (no @[vṛddhi]).
"""

advanced = """
The @deva[मृज्] is a @deva[धातु] (root), so affixes here are those following roots. The @deva[विभक्ति]-anuvrtti from earlier @[sūtras] has ceased. Before @deva[प्रातिपदिक] affixes (@deva[भ्याम्] etc. after compound), no @[vṛddhi]: @deva[कंसपरिमृड्भ्याम्]. The @[vṛddhi] applies to verbal derivatives only.
"""

id = "7.2.19"
numericId = "72019"

[en]
simple = """
Participles of @deva[धृष्] and @deva[शस्] don't take @deva[इट्] when meaning 'bold/impudent'. @deva[धृष्टः] 'bold', @deva[विशस्तः] 'arrogant'.
"""

standard = """
When meaning 'bold/impudent/arrogant', @deva[धृष्] and @deva[शस्] are @deva[अनिट्]: @deva[धृष्टः], @deva[विशस्तः]. @deva[धृष्] is @deva[ञिधृषा] (@ref[5.2.2]) with @deva[आदित्], so already @deva[अनिट्] by @ref[7.2.16]; @deva[शस्] is @deva[शसु] (1.763) with @deva[उदित्], optionally @deva[सेट्] by @ref[7.2.56], made @deva[अनिट्] here.
"""

advanced = """
The semantic condition '@deva[प्रागल्भ्य]' (boldness/impudence) restricts the @deva[अनिट्] form. @deva[धृष्] (@deva[ञिधृषा]) being @deva[आदित्] would be @deva[अनिट्] anyway by @ref[7.2.16]; the specification here confirms the meaning. @deva[शस्] (@deva[शसु]) being @deva[उदित्] has optional @deva[इट्] by @ref[7.2.56], but this rule makes it @deva[अनिट्] for the 'arrogant' sense.
"""

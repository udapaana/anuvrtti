id = "7.2.84"
numericId = "72084"

[en]
simple = """
Before case-endings, @deva[आ] replaces the final of @deva[अष्टन्] 'eight'. @deva[अष्टाभिः], @deva[अष्टानाम्]. Optionally: @deva[अष्टभिः].
"""

standard = """
For @deva[अष्टन्], @deva[न्] → @deva[आ] before @deva[सुप्] (case-endings): @deva[अष्टाभिः], @deva[अष्टाभ्यः], @deva[अष्टानाम्], @deva[अष्टासु]. Not before taddhita: @deva[अष्टत्वम्], @deva[अष्टता] (@deva[न्] retained). This is optional: also @deva[अष्टभिः], @deva[अष्टभ्यः].
"""

advanced = """
The @deva[आ] in the @[sūtra] is the specific letter @deva[आ], not the generic @deva[आ]-class (which would include all @deva[आ]-diphthongs). The optionality creates doublets: @deva[अष्टाभिः]/@deva[अष्टभिः]. The @deva[विभक्ति] (case-ending) condition excludes @deva[तद्धित] (derivational affixes): @deva[अष्टत्वम्] retains @deva[न्].
"""

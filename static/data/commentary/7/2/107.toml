id = "7.2.107"
numericId = "72107"

[en]
simple = """
For @deva[अदस्], @deva[औ] replaces the final @deva[स्], and the nominative @deva[सु] is elided. @deva[अदस्] → @deva[असौ].
"""

standard = """
For @deva[अदस्] in @deva[प्रथमा]-@deva[एकवचन]: @deva[स्] → @deva[औ], @deva[सु]-@deva[लोप]: @deva[अदस्] + @deva[सु] → @deva[अद] + @deva[अ] (@ref[7.2.102]) + @deva[सु] → @deva[अद] + @deva[औ] (@deva[स्]→@deva[औ]) + @deva[०] (@deva[सु]-lopa) → @deva[असौ]. The @[kārikā] explains why @deva[सु]-elision is stated.
"""

advanced = """
The @[kārikā] addresses: why state @deva[सु]-@deva[लोप] separately? If @deva[औ] simply replaced @deva[स्], @deva[संबुद्धि]-elision (after short vowel) wouldn't apply (since @deva[औ] is long). Also, @deva[झलि] rules (@deva[आप्]→@deva[ए] etc.) and @deva[प्रत्ययस्थ]-@deva[कादित्व]/@deva[शी]-@deva[भाव] would mis-apply. Hence explicit @deva[सु]-@deva[लोप] is stated.
"""

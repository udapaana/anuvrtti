id = "7.2.75"
numericId = "72075"

[en]
simple = """
The desiderative @deva[सन्] takes @deva[इट्] after @deva[तुदादि] @deva[कॄ] and four following roots (@deva[गॄ], @deva[दॄ], @deva[धॄ], @deva[प्रच्छ्]). @deva[चिकरिषति], @deva[जिगरिषति], @deva[पिप्रच्छिषति].
"""

standard = """
For @deva[कॄ] and four followers (@deva[तुदादि] @deva[गण]), @deva[सन्] is @deva[सेट्]: @deva[कॄ] → @deva[चिकरिषति]; @deva[गॄ] → @deva[जिगरिषति]; @deva[दॄ] → @deva[दिदरिषते]; @deva[धॄ] → @deva[दिधरिषते]; @deva[प्रच्छ्] → @deva[पिप्रच्छिषति] (@ref[1.2.8], @ref[6.1.16]). Not @deva[सृज्] (next in @[gaṇa]): @deva[सिसृक्षति].
"""

advanced = """
@deva[कॄ]/@deva[गॄ] would have optional @deva[इट्] + optional lengthening by @ref[7.2.41]/38. This makes @deva[इट्] obligatory and short (no lengthening option). The @deva[प्रच्छ्] form @deva[पिप्रच्छिषति] shows reduplication rules (@ref[1.2.8], @ref[6.1.16]). @deva[सृज्] excluded: @deva[सिसृक्षति] (@deva[अनिट्]).
"""

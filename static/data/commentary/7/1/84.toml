id = "7.1.84"
numericId = "71084"

[en]
simple = """
Before nominative singular @deva[सु], @deva[औ] replaces the final of @deva[दिव्] 'sky'. @deva[दिव्] + @deva[सु] → @deva[द्यौः] 'sky, heaven'.
"""

standard = """
The nominal stem @deva[दिव्] takes @deva[औ] before @deva[सु]: @deva[दिव्] + @deva[सु] → @deva[द्यौः]. This is the @deva[प्रातिपदिक] @deva[दिव्] (not the @deva[धातु] @deva[दिवु] with indicatory @deva[उ]). The verbal derivative gives different forms: @deva[दिवु] → @deva[द्यु] → @deva[द्युः] (as in @deva[अक्षद्युः]).
"""

advanced = """
Distinguish: @deva[प्रातिपदिक] @deva[दिव्] (this rule) → @deva[द्यौः]; @deva[धातु] @deva[दिवु] (with @deva[इत्] @deva[उ]) → @deva[द्यु]-stem → @deva[द्युः], @deva[अक्षद्युः]. The @deva[औ]-substitute creates the distinctive nominative @deva[द्यौः] while other cases use @deva[दिव्]-stem: @deva[द्यावौ] (du.), @deva[दिवः] (pl.), @deva[दिवम्] (acc.), @deva[दिवा] (inst.), @deva[दिवे]/@deva[दिवस्] (dat./gen.).
"""

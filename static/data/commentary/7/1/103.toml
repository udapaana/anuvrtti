id = "7.1.103"
numericId = "71103"

[en]
simple = """
In Vedic, the @deva[उर्]-substitution for @deva[ॠ] is irregular—occurring even without labials, or not occurring with labials. @deva[ततुरिः] (from @deva[तॄ]), @deva[पप्रि] (from @deva[पॄ], no @deva[उर्]).
"""

standard = """
Vedic shows @deva[बहुलम्] (diverse) application: @deva[उर्] without labial: @deva[ततुरिः] (@deva[तॄ]), @deva[जगुरिः] (@deva[गॄ]); no @deva[उर्] despite labial: @deva[पप्रितमम्] (@deva[पॄ]). Also regular: @deva[पपुरिः] (@deva[पॄ] with @deva[उर्]). All with @deva[किन्] affix (@ref[3.1.171]).
"""

advanced = """
The @deva[छन्दस्] diversity (@deva[बहुलम्]) allows exceptions both ways: @deva[तॄ] → @deva[ततुरिः] (@deva[उर्] without labial), @deva[गॄ] → @deva[जगुरिः] (same); but @deva[पॄ] → @deva[पप्रि] (no @deva[उर्] despite labial) alongside @deva[पपुरिः] (regular @deva[उर्]). These @deva[किन्]-derivatives (@ref[3.1.171]) show archaic morphology preserved in Vedic formulae.
"""

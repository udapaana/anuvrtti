id = "7.1.70"
numericId = "71070"

[en]
simple = """
Stems with indicatory @deva[उ], @deva[ऋ], or @deva[लृ] (except roots), and the stem @deva[अञ्च्], take @deva[नुम्] in strong cases. @deva[भवत्] → @deva[भवान्] (nom. sg.), @deva[श्रेयस्] → @deva[श्रेयान्].
"""

standard = """
In @deva[सर्वनामस्थान] (strong cases), @deva[उगित्]/@deva[ऋत्]/@deva[लृत्] affixes and @deva[अञ्च्] take @deva[नुम्]: @deva[भवत्] (@deva[डवतुप्]) → @deva[भवान्], @deva[भवन्तौ], @deva[भवन्तः]; @deva[श्रेयस्] (@deva[ईयसुन्]) → @deva[श्रेयान्]; @deva[पचत्] (@deva[शतृ]) → @deva[पचन्]; @deva[अञ्च्] → @deva[प्राङ्], @deva[प्राञ्चौ].
"""

advanced = """
The @deva[उगित्] category includes affixes like @deva[डवतुप्] (@deva[भवतु]), @deva[ईयसुन्] (@deva[श्रेयस्]), @deva[शतृ] (indicatory @deva[ऋ]). Roots are excluded (@deva[धातु]-exception), so @deva[विद्] (root) doesn't get @deva[नुम्] here. The @deva[अञ्च्]-stem @deva[प्राञ्च्] shows: @deva[प्राङ्] (nom. sg. with @deva[नुम्] + visarga changes), @deva[प्राञ्चौ], @deva[प्राञ्चः]. Strong cases = nominative/accusative singular/dual/@deva[बहुवचन] (plural) (for masculines).
"""

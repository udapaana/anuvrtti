id = "7.1.82"
numericId = "71082"

[en]
simple = """
The stem @deva[अनडुह्] takes @deva[नुम्] before the nominative singular @deva[सु]. @deva[अनडुह्] → @deva[अनड्वान्] 'bull'.
"""

standard = """
Before @deva[सु] (nominative/vocative singular), @deva[अनडुह्] takes @deva[नुम्]: First @deva[आ]-augment (@ref[7.1.98]) gives @deva[अनड्वाह्], then @deva[नुम्] → @deva[अनड्वान्] (with @deva[ह्]-elision by @ref[8.2.23], @deva[सु]-elision by @ref[6.1.68]). Vocative: @deva[अनड्वन्] (with @deva[अ] by @ref[7.1.99]).
"""

advanced = """
Derivation: @deva[अनडुह्] + @deva[सु] → @deva[अनड्वाह्] (@deva[आ]-augment by @ref[7.1.98]) → @deva[अनड्वान्ह्] (@deva[नुम्] after @deva[आ]) → @deva[अनड्वान्] (@deva[ह्]-lopa by @ref[8.2.23], @deva[स्]-lopa). Vocative: @deva[अनडुह्] + @deva[सु] → @deva[अनड्वह्] (@deva[अ]-augment by @ref[7.1.99]) → @deva[अनड्वन्ह्] → @deva[अनड्वन्]. The dual/plural follow the @deva[आ]-augmented strong stem: @deva[अनड्वाहौ], @deva[अनड्वाहः].
"""

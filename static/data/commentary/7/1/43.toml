id = "7.1.43"
numericId = "71043"

[en]
simple = """
In Vedic, @deva[यजध्वम्] + @deva[एनम्] irregularly becomes @deva[यजध्वैनम्], with @deva[म्] dropping before @deva[ए]. 'Worship him!'
"""

standard = """
A specific Vedic sandhi: @deva[यजध्वम्] @deva[एनम्] → @deva[यजध्वैनम्] (@[ṛg] Veda VIII.2.37). The final @deva[म्] of @deva[यजध्वम्] is elided before @deva[एनम्], and the vowels combine: @deva[ध्व] + @deva[ऐनम्]. Some read @deva[यजध्यैनम्] with @deva[व] → @deva[य] change.
"""

advanced = """
This @[nipātana] (irregular form) demonstrates Vedic sandhi freedom. The @deva[म्]-elision before a vowel is unexpected (normally @deva[म्] → @[anusvāra] + vowel). The @[kāśikā]'s suggestion of @deva[व] → @deva[य] change is rejected by @[bhaṭṭoji] @[dīkṣita]. The form @deva[यजध्वैनं] @deva[प्रियमेधाः] shows ritual invocation style.
"""

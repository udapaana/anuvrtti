id = "7.1.30"
numericId = "71030"

[en]
simple = """
After @deva[युष्मद्]//@deva[अस्मद्], dative plural @deva[भ्यस्] becomes @deva[भ्यम्]: @deva[युष्मभ्यम्] 'to you all', @deva[अस्मभ्यम्] 'to us'.
"""

standard = """
The dative/ablative plural ending @deva[भ्यस्] is replaced by @deva[भ्यम्] after @deva[युष्मद्] and @deva[अस्मद्]. The @deva[द्] of the stem is retained here. Thus @deva[युष्मभ्यम्] 'to/for you all', @deva[अस्मभ्यम्] 'to/for us'.
"""

advanced = """
The substitution @deva[भ्यस्] → @deva[भ्यम्] is complete replacement (not just @deva[स्] → @deva[म्]). This creates distinction from ablative which uses @deva[अत्] (@deva[युष्मत्], @deva[अस्मत्] by @ref[7.2.89]). The @[sūtra] is carefully worded to show whole-ending replacement.
"""

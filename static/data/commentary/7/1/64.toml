id = "7.1.64"
numericId = "71064"

[en]
simple = """
Similarly, @deva[लभ्] 'obtain' takes @deva[नुम्] before vowel-initial affixes, except @deva[शप्] and @deva[लिट्]. @deva[लम्भयति] (causative), but @deva[लभते] (present), @deva[लेभे] (perfect).
"""

standard = """
Before @deva[अजादि] affixes (excluding @deva[शप्]/@deva[लिट्]), @deva[लभ्] → @deva[लम्भ्]: @deva[लम्भयति], @deva[लम्भकः], @deva[साधुलम्भी]. But: @deva[लभते] (@deva[शप्]), @deva[लेभे] (@deva[लिट्]), @deva[लब्धा] (@deva[हलादि]). This @[sūtra] is separate from @ref[7.1.63] for subsequent rules.
"""

advanced = """
Separating @deva[लभ्] from @deva[रभ्] enables the specific rules @ref[7.1.65]-69 applying only to @deva[लभ्]. The pattern parallels @deva[रभ्]: @deva[नुम्] before @deva[अजादि] except @deva[शप्]/@deva[लिट्]. Derivation: @deva[लभ्] + @deva[णिच्] → @deva[लम्भ्] + @deva[इ] → @deva[लम्भयति]; but @deva[लभ्] + @deva[शप्] → @deva[लभते] (basic present stem).
"""

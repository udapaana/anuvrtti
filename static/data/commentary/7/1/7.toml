id = "7.1.7"
numericId = "71007"

[en]
simple = """
After √@deva[विद्] 'to know' (the @deva[वेत्ति] root), @deva[रुट्] is optional: @deva[संविदते] or @deva[संविद्रते].
"""

standard = """
The root @deva[विद्] (@[adādi], meaning 'to know', giving @deva[वेत्ति]) optionally takes the @deva[रुट्] augment before @deva[अत्]. Both forms are correct: @deva[संविदते]//@deva[संविद्रते], @deva[संविदताम्]//@deva[संविद्रताम्].
"""

advanced = """
This @deva[विद्] is the @[adādi] root (class 2) meaning 'to know' — distinct from @deva[विद्] 'to find' (@[tudādi]) and @deva[विद्] 'to exist' (@[divādi]). The optional @deva[र्] creates dialectal variants. Only the 'know' meaning triggers this option.
"""

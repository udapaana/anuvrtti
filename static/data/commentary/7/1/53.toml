id = "7.1.53"
numericId = "71053"

[en]
simple = """
Before the genitive plural affix, @deva[त्रि] becomes @deva[त्रय]. @deva[त्रि] + @deva[आम्] → @deva[त्रयाणाम्] 'of three'.
"""

standard = """
The numeral @deva[त्रि] takes the substitute @deva[त्रय] before genitive plural @deva[आम्]: @deva[त्रि] → @deva[त्रय] + @deva[आम्] → @deva[त्रयाणाम्]. The Vedic form @deva[त्रीणाम्] appears: @deva[त्रीणामपि] @deva[समुद्राणाम्].
"""

advanced = """
The @deva[त्रय]-substitute creates the regular genitive plural @deva[त्रयाणाम्] (with @deva[नुम्] by @ref[7.1.54]). The Vedic alternative @deva[त्रीणाम्] preserves the original stem with direct @deva[नुम्] insertion. This @deva[त्रि]/@deva[त्रय] alternation parallels other stem-modifications before case-endings.
"""

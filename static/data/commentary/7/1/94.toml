id = "7.1.94"
numericId = "71094"

[en]
simple = """
Before nominative singular @deva[सु] (not vocative), @deva[अन्] replaces the final of @deva[ऋ]-ending stems, and of @deva[उशनस्], @deva[पुरुदंशस्], @deva[अनेहस्]. @deva[कर्तृ] → @deva[कर्ता] 'doer', @deva[पिता] 'father'.
"""

standard = """
In @deva[प्रथमा]-@deva[एकवचन] (not @deva[संबोधन]), @deva[अनङ्] replaces: (1) final @deva[ऋ] of stems: @deva[कर्ता], @deva[हर्ता], @deva[माता], @deva[पिता], @deva[भ्राता]; (2) final @deva[स्] of @deva[उशनस्], @deva[पुरुदंशस्], @deva[अनेहस्]: @deva[उशना], @deva[पुरुदंशा], @deva[अनेहा].
"""

advanced = """
The @[kārikā] notes vocative variants for @deva[उशनस्]: @deva[संबोधने] @deva[तूशनसस्त्रिरूपं]—three forms (@deva[स]-ending, @deva[न्]-ending, or zero-ending). The @deva[ऋ]-final stems (@deva[तृच्], @deva[तृन्] affixes) show: @deva[कर्तृ] + @deva[अन्] + @deva[स्] → @deva[कर्ता] (@deva[ऋ] replaced, then @deva[न्स्] → @[ā]). The neuter @deva[ऋ]-finals (e.g., @deva[व्याघ्रपद] with @deva[वरिष्ठ] reading) follow different patterns.
"""

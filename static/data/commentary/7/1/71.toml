id = "7.1.71"
numericId = "71071"

[en]
simple = """
The stem @deva[युज्] 'yoked' takes @deva[नुम्] in strong cases when not in a compound. @deva[युङ्], @deva[युञ्जौ], @deva[युञ्जः]. But in compound: @deva[अश्वयुक्], @deva[अश्वयुजौ].
"""

standard = """
The nominal stem @deva[युज्] (from √@deva[युज्] 'to join', @deva[रुधादि]) takes @deva[नुम्] in @deva[सर्वनामस्थान] when not compounded: @deva[युङ्] (@ref[8.2.23]), @deva[युञ्जौ], @deva[युञ्जः]. In compounds: @deva[अश्वयुक्], @deva[अश्वयुजौ], @deva[अश्वयुजः] (no @deva[नुम्]).
"""

advanced = """
This applies to the @deva[प्रातिपदिक] @deva[युज्] (noun 'one who yokes'), not √@deva[युज्] @deva[समाधौ] (@deva[दिवादि] 68). Hence not *@deva[युजमापन्ना] @deva[ऋषयः]. The compound restriction: @deva[अश्वयुज्] (horse-yoker) keeps the simple stem. Derivation: @deva[युज्] + @deva[सु] → @deva[युङ्] + @deva[स्] → @deva[युङ्] (with @deva[ज्] → @deva[ङ्] before @deva[स्], then @deva[स्]-elision).
"""

id = "7.1.28"
numericId = "71028"

[en]
simple = """
After @deva[युष्मद्]//@deva[अस्मद्], dative @deva[ङे] and nominative/accusative endings become @deva[अम्]: @deva[त्वाम्] 'you', @deva[माम्] 'me'.
"""

standard = """
For @deva[युष्मद्] and @deva[अस्मद्]: (1) dative singular @deva[ङे] → @deva[अम्]: @deva[तुभ्यम्] 'to you', @deva[मह्यम्] 'to me'; (2) nominative/accusative singular → @deva[अम्]: @deva[त्वम्] 'you', @deva[त्वाम्] 'you (acc)', @deva[अहम्] 'I', @deva[माम्] 'me'.
"""

advanced = """
The @deva[अम्] substitute creates the distinctive personal pronoun forms. Nominative uses different stem alternants (@deva[त्व], @deva[अह]) than accusative (@deva[त्वा], @deva[मा]). The dative adds @deva[भ्य] before @deva[अम्] by @ref[7.2.89].
"""

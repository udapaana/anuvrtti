id = "7.1.87"
numericId = "71087"

[en]
simple = """
In strong cases, @deva[न्थ्] replaces @deva[थ्] of @deva[पथिन्] and @deva[मथिन्]. @deva[पथन्] → @deva[पन्थन्]: @deva[पन्थाः], @deva[पन्थानौ], @deva[पन्थानः].
"""

standard = """
In @deva[सर्वनामस्थान], @deva[थ्] → @deva[न्थ्] for @deva[पथिन्]/@deva[मथिन्]: @deva[पथन्] → @deva[पन्थन्], @deva[मथन्] → @deva[मन्थन्]. Combined with @ref[7.1.86]: @deva[पन्थाः], @deva[पन्थानौ], @deva[पन्थानः]; @deva[मन्थाः], @deva[मन्थानौ], @deva[मन्थानः].
"""

advanced = """
This creates the nasal-stop cluster: @deva[थ] → @deva[न्थ]. The full strong-case derivation: @deva[पथिन्] → @deva[पथन्] (@ref[7.1.86]) → @deva[पन्थन्] (@ref[7.1.87]) → @deva[पन्थान्] (@deva[नुम्] by @ref[7.1.70] via @deva[असुङ्] analogy, or @deva[अनङ्]). The @deva[न्थ]-conjunct is characteristic of these two stems only—@deva[ऋभुक्षिन्] has @deva[क्ष], not @deva[थ].
"""

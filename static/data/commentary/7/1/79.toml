id = "7.1.79"
numericId = "71079"

[en]
simple = """
In neuter nouns, @deva[शतृ] after a reduplicated stem optionally takes @deva[नुम्]. @deva[ददति] or @deva[ददन्ति] @deva[कुलानि] 'giving families'.
"""

standard = """
For neuter @deva[शतृ]-participles after @deva[अभ्यस्त] stems, @deva[नुम्] is optional in @deva[सर्वनामस्थान]: @deva[ददति]/@deva[ददन्ति] @deva[कुलानि], @deva[दधति]/@deva[दधन्ति] @deva[कुलानि], @deva[जक्षति]/@deva[जक्षन्ति] @deva[कुलानि], @deva[जाग्रति]/@deva[जाग्रन्ति] @deva[कुलानि].
"""

advanced = """
This provides @deva[विकल्प] for neuters, modifying @ref[7.1.78]'s prohibition. The masculine/feminine forms (@ref[7.1.78]) strictly lack @deva[नुम्]: @deva[ददत्] only. But neuter plurals allow both: @deva[ददति] (without @deva[नुम्]) and @deva[ददन्ति] (with @deva[नुम्]). This reflects the general neuter tendency toward @deva[नुम्] in strong cases (@ref[7.1.72]).
"""

id = "7.1.26"
numericId = "71026"

[en]
simple = """
In Vedic, @deva[इतर] doesn't take @deva[अत्] — it uses regular @deva[अम्]: @deva[इतरम्].
"""

standard = """
Exception for @deva[छन्दस्] (Vedic): @deva[इतर] retains regular neuter endings (@deva[इतरम्]) instead of @deva[इतरत्]. Vedic preserves archaic forms. Classical Sanskrit uses @deva[इतरत्].
"""

advanced = """
This Vedic exception shows @deva[इतर] wasn't originally in the @deva[अत्]-taking class. The pronominal @deva[अत्] ending spread analogically to @deva[इतर] in classical Sanskrit. @[chandas] rules preserve earlier patterns.
"""

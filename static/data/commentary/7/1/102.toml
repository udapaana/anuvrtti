id = "7.1.102"
numericId = "71102"

[en]
simple = """
When preceded by a labial consonant (of the root), @deva[ॠ] becomes @deva[उर्] instead of @deva[इर्]. @deva[पॄ] → @deva[पूर्]: @deva[पूर्त], @deva[मुमूर्षति].
"""

standard = """
After root-internal labials (@deva[प]/@deva[फ]/@deva[ब]/@deva[भ]/@deva[म]/@deva[व]), @deva[ॠ] → @deva[उर्]: @deva[पॄ] → @deva[पूर्त] (@deva[पूर्त], @deva[पुपूर्षति]); @deva[मॄ] → @deva[मूर्] (@deva[मुमूर्षति]); @deva[वॄ] → @deva[वूर्] (@deva[वुवूर्षति]). Lengthening by @ref[8.2.77]. The labial must be root-internal, not external.
"""

advanced = """
The @deva[ओष्ठ्य] (labial) condition includes @deva[व] (@deva[दन्त्योष्ठ्य]). Examples: @deva[पॄ] → @deva[पूर्त], @deva[पुपूर्षति]; @deva[वॄ] → @deva[वुवूर्षति] @deva[ऋत्विजम्], @deva[प्रावुवूर्षति] @deva[कम्बलम्]. But @deva[सम्] + @deva[ॠ] doesn't trigger @deva[उर्] because @deva[म्] is external (@deva[उपसर्ग]), not root-internal: @deva[सम्] + @deva[ॠ] → @deva[समृ]- (not *@deva[समुर्]-).
"""

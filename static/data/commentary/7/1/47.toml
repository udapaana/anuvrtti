id = "7.1.47"
numericId = "71047"

[en]
simple = """
In Vedic, the absolutive @deva[क्त्वा] takes @deva[य] as an augment at the end. @deva[दत्वा] → @deva[दत्वाय] 'having given'.
"""

standard = """
The Vedic absolutive shows @deva[क्त्वा] + @deva[य]: @deva[दत्वाय] @deva[सविता] @deva[धियः] (for @deva[दत्वा]). This @deva[य]-augment is distinct from the @deva[ल्यप्] substitution of @ref[7.1.37]-38, which requires a compound context.
"""

advanced = """
This @[sūtra] is placed here (not after @ref[7.1.38]) because it lacks the @deva[समास]-anuvrtti of those rules. The @deva[य]-augment applies to simple (non-compound) @deva[क्त्वा] forms: @deva[दत्वाय], @deva[कृत्वाय]. This creates a distinctively Vedic absolutive pattern that coexists with standard @deva[दत्वा] forms.
"""

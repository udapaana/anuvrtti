id = "7.1.36"
numericId = "71036"

[en]
simple = """
After @deva[विद्] 'to know', @deva[वसु] replaces the present participle @deva[शतृ]. @deva[विद्] + @deva[शतृ] → @deva[विद्वस्], nominative @deva[विद्वान्] 'one who knows'.
"""

standard = """
The root @deva[विद्] 'to know' takes @deva[वसु] instead of @deva[शतृ] for its present participle: @deva[विद्] + @deva[वसु] → @deva[विद्वस्]. Nominative forms: @deva[विद्वान्] (sg), @deva[विद्वांसौ] (du), @deva[विद्वांसः] (pl). The @deva[उ] in @deva[वसु] triggers @deva[नुम्] augment in strong cases (@ref[7.1.70]).
"""

advanced = """
The @deva[वसु] substitution creates the irregular @deva[विद्वस्] stem. Since @deva[शतृ] has indicatory @deva[ऋ] (making it @deva[ऋत्]/@deva[उगित्]), its substitute @deva[वसु] is also treated as @deva[उगित्] by @ref[1.1.56], triggering @deva[नुम्] in strong cases (@ref[7.1.70]) and unaccented @deva[ई] in feminine (@deva[विदुषी]). The perfect participle @deva[क्वसु] (→ @deva[विद्वस्]) follows the same pattern.
"""

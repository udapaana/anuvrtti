id = "7.1.86"
numericId = "71086"

[en]
simple = """
In strong cases, @deva[अ] replaces the @deva[इ] of @deva[पथिन्], @deva[मथिन्], @deva[ऋभुक्षिन्]. @deva[पथिन्] → @deva[पथन्]: @deva[पन्थानौ], @deva[पन्थानः], @deva[पन्थानम्].
"""

standard = """
In @deva[सर्वनामस्थान], @deva[इ] → @deva[अ]: @deva[पथिन्] → @deva[पथन्] (then → @deva[पन्थान्] with @ref[7.1.87]). Paradigm: @deva[पन्थाः] (nom.sg.), @deva[पन्थानौ] (nom.du.), @deva[पन्थानः] (nom.pl.), @deva[पन्थानम्] (acc.sg.). Similarly @deva[मन्थान]-, @deva[ऋभुक्षाण]-.
"""

advanced = """
The @deva[अ]-substitute preceded by @deva[आ] (@ref[7.1.85]) triggers the notation @deva[आदिति] @deva[वर्तमाने] @deva[पुनरद्वचनं] @deva[षपूर्वार्थम्]—the explicit @deva[अ]-mention enables the @deva[ष]/@deva[ण] alternation in @deva[ऋभुक्षिन्]: @deva[ऋभुक्षाणम्] (with retroflexion) or @deva[ऋभुक्षणम्] (Vedic variant without). The @[kārikā] notes this optional lengthening in @deva[निगम] (Vedic) contexts.
"""

id = "7.1.95"
numericId = "71095"

[en]
simple = """
In strong cases (except vocative singular), @deva[क्रोष्टु] 'jackal' is treated as if it were @deva[क्रोष्टृ] (@deva[तृच्]-ending). @deva[क्रोष्टा], @deva[क्रोष्टारौ], @deva[क्रोष्टारः].
"""

standard = """
The stem @deva[क्रोष्टु] behaves like @deva[तृच्]-ending @deva[क्रोष्टृ] in @deva[सर्वनामस्थान] (excluding vocative singular): @deva[क्रोष्टा] (nom.sg.), @deva[क्रोष्टारौ] (nom.du.), @deva[क्रोष्टारः] (nom.pl.), @deva[क्रोष्टारम्] (acc.sg.). But weak: @deva[क्रोष्टून्] (acc.pl.); vocative: @deva[हे] @deva[क्रोष्टो].
"""

advanced = """
The @deva[तृच्]-treatment (@deva[तृज्वत्]) applies to strong cases: @deva[क्रोष्टु] → @deva[क्रोष्टृ] → @deva[क्रोष्टा] (with @deva[अनङ्] by @ref[7.1.94]). The accent follows @deva[तृच्] pattern (final @[udātta]). Weak cases retain @deva[उ]: @deva[क्रोष्टून्], @deva[क्रोष्टुभिः]. Some grammarians place @deva[क्रोष्टु] in @deva[गौरादि] (@ref[4.1.41]), treating it as inherently @deva[तृच्]-ending.
"""

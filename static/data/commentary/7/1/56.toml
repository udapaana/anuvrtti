id = "7.1.56"
numericId = "71056"

[en]
simple = """
In Vedic, @deva[श्री] and @deva[ग्रामणी] take @deva[नुम्] before genitive plural @deva[आम्]. @deva[श्रीणाम्] 'of glories', @deva[ग्रामणीनाम्] 'of village chiefs'.
"""

standard = """
Vedic usage: @deva[श्री] + @deva[नुम्] + @deva[आम्] → @deva[श्रीणाम्] (@deva[श्रीणामुदारो] @deva[धरुणो] @deva[रयीणाम्]), @deva[ग्रामणी] + @deva[नुम्] + @deva[आम्] → @deva[ग्रामणीनाम्] (@deva[अन्यत्र] @deva[सूतग्रामणीनाम्]). This parallels the optional @deva[नदी] status of @deva[श्री] in @ref[1.4.5].
"""

advanced = """
This @[sūtra] might seem redundant since @deva[श्री] is optionally @deva[नदी] by @ref[1.4.5] (which would give @deva[श्रीणाम्] anyway). The solution: the @ref[1.4.5] option is @deva[व्यवस्थित]-@deva[विभाषा]—always @deva[नदी] in Vedic, optional elsewhere. For @deva[सूतग्रामणीनाम्], the compound @deva[सूतश्च] @deva[ग्रामणीश्च] allows the @deva[नुम्] treatment.
"""

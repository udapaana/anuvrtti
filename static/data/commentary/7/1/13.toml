id = "7.1.13"
numericId = "71013"

[en]
simple = """
After @deva[अ]-stems, the dative @deva[ङे] becomes @deva[य]: @deva[देवाय] 'to/for the god'.
"""

standard = """
The dative singular ending @deva[ङे] is replaced by @deva[य] after @deva[अ]-ending stems. Combined with lengthening of the stem-final @deva[अ] → @deva[आ] (by @ref[7.3.102]), this gives @deva[देवाय], @deva[रामाय]. The @deva[य] directly replaces @deva[ए].
"""

advanced = """
The @deva[य] substitute creates the @deva[आय] dative ending characteristic of @deva[अ]-stems. The stem-final lengthening is handled by @ref[7.3.102] (@deva[सुपि च]). For non-@deva[अ] stems, @deva[ङे] → @deva[ए] remains: @deva[अग्नये], @deva[पित्रे].
"""

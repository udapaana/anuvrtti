id = "7.1.51"
numericId = "71051"

[en]
simple = """
The augment @deva[अस्] (@deva[असुक्]) is added to @deva[अश्व], @deva[क्षीर], @deva[वृष], @deva[लवण] before the denominative @deva[क्यच्] when expressing desire. @deva[अश्वस्यति] 'desires horses'.
"""

standard = """
When expressing the subject's delight/desire, these nouns + @deva[असुक्] + @deva[क्यच्]: @deva[अश्व] + @deva[अस्] + @deva[य] → @deva[अश्वस्यति] (mare desiring horses), @deva[क्षीरस्यति] (child desiring milk), @deva[वृषस्यति] (cow desiring bull), @deva[लवणस्यत्युष्ट्रः] (camel desiring salt).
"""

advanced = """
This denominative formation expresses @deva[कामे] 'desire/delight': X-@deva[स्यति] = 'X desires/delights in'. The @deva[असुक्] augment distinguishes desire-denominatives from simple denominatives: @deva[अश्वस्यति] (desires horses) vs. @deva[अश्वीयति] (acts like a horse). The @deva[छन्दसि]-anuvrtti does not continue here—this is classical usage.
"""

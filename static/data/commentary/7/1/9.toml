id = "7.1.9"
numericId = "71009"

[en]
simple = """
After an @deva[अ]-ending stem, the instrumental plural @deva[भिस्] becomes @deva[ऐस्]: @deva[देवैः] 'by the gods'.
"""

standard = """
The case-ending @deva[भिस्] (instrumental plural) is replaced by @deva[ऐस्] after stems ending in short @deva[अ]. Thus @deva[देव] + @deva[भिस्] → @deva[देव] + @deva[ऐस्] → @deva[देवैः]. This combines with the stem-final @deva[अ] to form the characteristic @deva[ऐः] ending.
"""

advanced = """
This substitution is specific to @deva[अ]-stems (masculine/neuter @deva[अकारान्त]). The @deva[ऐ] diphthong results from @deva[अ] + @deva[ऐ] → @deva[ऐ] by @ref[6.1.88]. Other stems keep @deva[भिस्]: @deva[अग्निभिः], @deva[नदीभिः]. This is a major declensional marker distinguishing @deva[अ]-stems.
"""

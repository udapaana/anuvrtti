id = "7.1.27"
numericId = "71027"

[en]
simple = """
After @deva[युष्मद्] 'you' and @deva[अस्मद्] 'I/we', genitive @deva[ङस्] becomes @deva[अश्]: @deva[तव] 'your', @deva[मम] 'my'.
"""

standard = """
The genitive singular ending @deva[ङस्] (= @deva[अस्]) is replaced by @deva[अश्] after the pronoun stems @deva[युष्मद्] and @deva[अस्मद्]. The @deva[श्] is @[it]. Combined with stem changes, this gives @deva[तव] 'your' and @deva[मम] 'my'.
"""

advanced = """
The @deva[अश्] substitution (being @[śit]) replaces the whole ending. Stem @deva[युष्मद्] → @deva[त्व] (by @ref[7.2.97]), + @deva[अ] → @deva[तव]. Stem @deva[अस्मद्] → @deva[म] (by @ref[7.2.92]), + @deva[अ] → @deva[मम]. These are the basic possessive forms.
"""

id = "7.1.61"
numericId = "71061"

[en]
simple = """
The roots @deva[रध्] and @deva[जभ्] take @deva[नुम्] before affixes beginning with a vowel. @deva[रध्] → @deva[रन्ध्]: @deva[रन्धयति] 'subdues', @deva[जभ्] → @deva[जम्भ्]: @deva[जम्भयति] 'destroys'.
"""

standard = """
Before vowel-initial affixes, @deva[रध्] and @deva[जभ्] insert @deva[नुम्]: @deva[रन्धयति], @deva[रन्धकः], @deva[साधुरन्धी]; @deva[जम्भयति], @deva[जम्भकः], @deva[साधुजम्भी]. The @deva[नुम्] supersedes @[vṛddhi]. But before consonant-initial: @deva[रद्धा], @deva[जभ्यम्] (no @deva[नुम्]).
"""

advanced = """
The @deva[नुम्] insertion creates @deva[रन्ध्]/@deva[जम्भ्] stems before @deva[अजादि] affixes. Though @[vṛddhi] is a subsequent rule, @deva[नुम्] takes precedence (@deva[पूर्वविप्रतिषेध]). Examples: @deva[रन्धो] @deva[वर्तते] (denominative), @deva[जम्भंजम्भम्] (@deva[णमुल्] intensive). The @deva[हलादि] restriction blocks @deva[नुम्] in @deva[रद्धा] (@deva[क्त]), @deva[जभ्यम्] (@deva[ण्यत्]).
"""

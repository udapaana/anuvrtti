id = "7.1.40"
numericId = "71040"

[en]
simple = """
In Vedic language, @deva[म्] (with @deva[श्]) replaces the aorist first person @deva[अम्]. @deva[वृत्रम्] @deva[अवधिम्] → @deva[वर्धी] @deva[वृत्रम्] 'I slew @[vṛtra]'.
"""

standard = """
In the Vedas, the 1st person singular aorist ending @deva[अम्] (from @deva[मिप्]) is replaced by @deva[मश्] (= @deva[म्] with indicatory @deva[श्]): @deva[अवधिम्] → @deva[वर्धी]. The @deva[श्] indicates whole-replacement (@ref[1.1.55]), and the @deva[अट्] augment may be diversely elided (@ref[6.4.75]).
"""

advanced = """
The @deva[मश्] substitution reflects archaic Vedic aorist morphology. The indicatory @deva[श्] triggers @deva[सर्व]-@deva[आदेश] (whole replacement) per @ref[1.1.55]. Examples: @deva[क्रमीम्] @deva[वृक्षस्य] @deva[शाखाम्] (@[ṛg] Veda). The irregular augment elision (@deva[अट्] @deva[लुक्]) seen in @deva[वर्धी] (for @deva[अवधिम्]) is licensed by @ref[6.4.75]'s Vedic flexibility.
"""

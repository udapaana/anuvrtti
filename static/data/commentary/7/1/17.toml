id = "7.1.17"
numericId = "71017"

[en]
simple = """
After pronominal @deva[अ]-stems, the nominative plural @deva[जस्] becomes @deva[शी] (= @deva[ई]): @deva[ते] 'those'.
"""

standard = """
The nominative plural ending @deva[जस्] is replaced by @deva[शी] (pronounced @deva[ई]) after @[sarvanāman] stems ending in @deva[अ]. Thus @deva[सर्व] + @deva[जस्] → @deva[सर्व] + @deva[ई] → @deva[सर्वे] 'all'. Similarly @deva[ते] 'those', @deva[ये] 'who', @deva[के] 'which?'.
"""

advanced = """
The @deva[श्] in @deva[शी] is @[it] (marker), leaving @deva[ई]. Combined with stem-final @deva[अ] → @deva[ए] (by @[guṇa] sandhi). This creates the distinctive pronominal nominative plural in @deva[ए] vs. nominal @deva[आः]. The @deva[शित्] marking prevents @[guṇa] of a following vowel.
"""

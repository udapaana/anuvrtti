id = "7.1.62"
numericId = "71062"

[en]
simple = """
The root @deva[रध्] does not take @deva[नुम्] before @deva[सेट्] (@deva[इट्]-initial) affixes, except in perfect (@deva[लिट्]). @deva[रधिता], @deva[रधितुम्] (no @deva[नुम्]), but @deva[ररन्धिव] (perfect, with @deva[नुम्]).
"""

standard = """
Before @deva[इडादि] (@deva[सेट्]) affixes, @deva[रध्] lacks @deva[नुम्]: @deva[रधिता], @deva[रधितुम्], @deva[रधितव्यम्]. But before @deva[अनिट्] affixes: @deva[रन्धनम्], @deva[रन्धकः] (with @deva[नुम्]). In perfect: @deva[ररन्धिव], @deva[ररन्धिम] (@deva[नुम्] applies despite @deva[इट्]).
"""

advanced = """
The @deva[इडादि] exception prevents @deva[नुम्] in @deva[सेट्] forms: @deva[रध्] + @deva[इता] → @deva[रधिता]. But @deva[लिट्] is excepted: @deva[रध्] + @deva[लिट्] → @deva[र] + @deva[रन्ध्] + @deva[इव] → @deva[ररन्धिव]. With @deva[नुम्], @deva[रन्ध्] becomes @deva[संयोगान्त], so @deva[लिट्] affixes aren't @deva[कित्] (@ref[1.2.5]), preserving the nasal (no elision by @ref[6.4.24]). Without @deva[नुम्]: @deva[रध्] + @deva[लिट्] → @deva[रेधतुः] (@deva[कित्]-treatment).
"""

id = "7.1.20"
numericId = "71020"

[en]
simple = """
After neuter stems, the plural nominative @deva[जस्] and accusative @deva[शस्] become @deva[शि] (= @deva[इ]): @deva[कुण्डानि] 'pots'.
"""

standard = """
Neuter plural nominative (@deva[जस्]) and accusative (@deva[शस्]) are replaced by @deva[शि] (= @deva[इ]). Thus @deva[कुण्ड] + @deva[जस्]//@deva[शस्] → @deva[कुण्ड] + @deva[इ] → @deva[कुण्डानि]. The @deva[इ] combines with stem-final to give characteristic @deva[आनि]//@deva[ईनि]//@deva[ऊनि] endings.
"""

advanced = """
The @deva[श्] is @[it]; only @deva[इ] is pronounced. Neuter plurals: @deva[अ]-stems → @deva[आनि] (@deva[वनानि]), @deva[इ]-stems → @deva[ईनि] (@deva[वारीणि]), @deva[उ]-stems → @deva[ऊनि] (@deva[मधूनि]). The @deva[नुम्] augment (by @ref[7.1.72]) creates the nasal.
"""

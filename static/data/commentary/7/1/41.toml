id = "7.1.41"
numericId = "71041"

[en]
simple = """
In Vedic language, the @deva[त्] of @[ātmanepada] endings is elided. @deva[दुह्] + @deva[त] → @deva[अदुह्र] (for @deva[अदुहत]) 'they milked'.
"""

standard = """
Vedic permits dropping the @deva[त्] in @[ātmanepada] endings: @deva[अदुहत] → @deva[अदुह्र], @deva[शेते] → @deva[शये]. Examples: @deva[देवा] @deva[अदुह्र] 'the gods milked', @deva[दक्षिणतः] @deva[शये] 'he lies to the right'. The @deva[अपि] anuvrtti makes this optional.
"""

advanced = """
The @deva[त]-elision creates distinctive Vedic middle forms: @deva[दुह्] + @deva[झ] (3rd pl.) → @deva[अदुह्र] (for @deva[अदुहत]). The optional nature (from @deva[अपि] anuvrtti) allows both: Vedic @deva[अदुह्र] alongside classical @deva[अदुहत]. This reflects the Vedic middle's phonological reduction that was later standardized with full @deva[त्] retention.
"""

id = "7.1.57"
numericId = "71057"

[en]
simple = """
After @deva[गो] at the end of a @[ṛg] verse, @deva[नुम्] comes before genitive plural @deva[आम्]. @deva[गोनाम्] 'of cows' (verse-final) but @deva[गवाम्] (elsewhere).
"""

standard = """
In Vedic, @deva[गो] takes @deva[नुम्] when verse-final: @deva[शूरगोनाम्] (@deva[विद्माहि] @deva[त्वा] @deva[सत्पतिं] @deva[शूरगोनाम्]). But verse-initially: @deva[गवां] @deva[गोत्रमुदसृजो] (standard form without @deva[नुम्]). Exceptions exist: @deva[गोपतिं] @deva[गवाम्] even verse-finally.
"""

advanced = """
The @deva[ऋच्]-ending condition (@deva[पादान्त]) creates a metrical/stylistic distinction. The maxim 'all rules have Vedic exceptions' (@deva[सर्वत्र] @deva[विभाषा] @deva[छन्दसि]) allows exceptions like verse-final @deva[गवाम्]: @deva[हन्तारं] @deva[शत्रूणां] @deva[कृधि] @deva[विराजं] @deva[गोपतिं] @deva[गवाम्]. This reflects the flexibility of Vedic composition.
"""

id = "7.1.45"
numericId = "71045"

[en]
simple = """
In Vedic, @deva[त], @deva[तन], and @deva[थन] also replace the 2nd plural imperative @deva[त]. @deva[शृणुत] → @deva[शृणोत] 'hear ye!', @deva[धत्त] → @deva[दधातन] 'place ye!'
"""

standard = """
Additional Vedic 2nd plural imperative substitutes: (1) @deva[त] with strengthening (@deva[शृणुत] → @deva[शृणोत]), (2) @deva[तन] (@deva[धत्त] → @deva[दधातन]), (3) @deva[थन] (@deva[जुषत] → @deva[जुजुष्टन]). The indicatory @deva[प्] on these substitutes triggers stem-strengthening.
"""

advanced = """
The @deva[पित्] nature of these substitutes (indicated by @deva[प्]) triggers stem-strengthening (@[guṇa]/@[vṛddhi]) rather than weakening. Thus @deva[शृणु] → @deva[शृणो] (@[guṇa] of @deva[उ]) + @deva[त] = @deva[शृणोत], and @deva[दधा] (strong stem) + @deva[तन] = @deva[दधातन]. The @deva[थन] variant (@deva[जुजुष्टन] for @deva[जुषत] with @deva[श्लु]-@[vikaraṇa]) shows the variety of Vedic imperative morphology.
"""

id = "7.1.81"
numericId = "71081"

[en]
simple = """
After stems with @deva[शप्] or @deva[श्यन्] @[vikaraṇa], @deva[शतृ] obligatorily takes @deva[नुम्] before neuter @deva[शी] and feminine @deva[ई]. @deva[पचन्ती] 'cooking' (f., mandatory).
"""

standard = """
When @deva[शतृ] follows a @deva[शबन्त] (@deva[शप्]-ending) or @deva[श्यनन्त] (@deva[श्यन्]-ending) stem, @deva[नुम्] is @deva[नित्य] (obligatory) before @deva[शी]/@deva[ङीप्]: @deva[पचन्ती] @deva[कुले], @deva[पचन्ती] @deva[ब्राह्मणी]; @deva[दीव्यन्ती], @deva[सीव्यन्ती]. The @deva[नित्य] blocks the @deva[वा] (option) from @ref[7.1.79].
"""

advanced = """
The @deva[नित्य] stops the anuvrtti of @deva[वा] from @ref[7.1.79]. This distinguishes: @deva[भ्वादि] (@deva[शप्]): @deva[पचन्ती] only (not *@deva[पचती]); @deva[दिवादि] (@deva[श्यन्]): @deva[दीव्यन्ती] only. But @deva[तुदादि] (@deva[श], not @deva[शप्]): @deva[तुदती]/@deva[तुदन्ती] (optional). The @deva[विकरण]-specific conditioning reflects phonological patterns in present-stem formation.
"""

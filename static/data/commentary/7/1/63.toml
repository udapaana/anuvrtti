id = "7.1.63"
numericId = "71063"

[en]
simple = """
The root @deva[रभ्] 'begin' takes @deva[नुम्] before vowel-initial affixes, except @deva[शप्] and @deva[लिट्]. @deva[आरम्भयति] (causative), but @deva[आरभते] (present), @deva[आरेभे] (perfect).
"""

standard = """
Before @deva[अजादि] affixes (excluding @deva[शप्] and @deva[लिट्]), @deva[रभ्] → @deva[रम्भ्]: @deva[आरम्भयति], @deva[आरम्भकः], @deva[साध्वारम्भी], @deva[आरम्भमारम्भम्]. But: @deva[आरभते] (@deva[शप्]), @deva[आरेभे] (@deva[लिट्]), @deva[आरब्धा] (@deva[हलादि]—consonant-initial).
"""

advanced = """
The @deva[शप्]/@deva[लिट्] exceptions preserve the basic present and perfect forms: @deva[आ] + @deva[रभ्] + @deva[शप्] → @deva[आरभते] (no @deva[नुम्]); @deva[आ] + @deva[रभ्] + @deva[लिट्] → @deva[आरेभे] (no @deva[नुम्], with @deva[सम्प्रसारण]). The @deva[नुम्] applies to causative (@deva[णिच्]), noun-derivatives (@deva[घञ्] etc.), and intensive (@deva[णमुल्]): @deva[आरम्भो] @deva[वर्तते].
"""

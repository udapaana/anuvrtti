id = "7.1.3"
numericId = "71003"

[en]
simple = """
@deva[झ्] in an affix becomes @deva[अन्त्]. This gives the 3rd plural ending @deva[अन्ति] from @deva[झि].
"""

standard = """
The consonant @deva[झ्] appearing in any affix is replaced by @deva[अन्त्]. Thus @deva[झि] (3pl @[parasmaipada]) → @deva[अन्ति], and @deva[झ] (3pl imperative) → @deva[अन्त]. Examples: @deva[भवन्ति] 'they are', @deva[कुर्वन्ति] 'they do'.
"""

advanced = """
This is the primary rule for 3rd plural endings. @deva[झ्] is the placeholder in the ending lists (@ref[3.4.78]): @deva[झि] for @[laṭ]/etc., @deva[झ] for @[loṭ]. The substitution @deva[झ्] → @deva[अन्त्] applies universally, but subsequent rules modify this in specific environments (reduplicated stems, @[ātmanepada], etc.).
"""

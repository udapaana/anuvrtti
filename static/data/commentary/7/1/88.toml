id = "7.1.88"
numericId = "71088"

[en]
simple = """
Before weak vowel-initial case endings, the final vowel and following consonant of @deva[पथिन्], @deva[मथिन्], @deva[ऋभुक्षिन्] are dropped. @deva[पथिन्] → @deva[पथ्]: @deva[पथा] 'by path', @deva[पथे] 'to path'.
"""

standard = """
Before @deva[भ]-@deva[संज्ञक] @deva[अजादि] endings (weak cases with vowel-initial affixes), the @deva[इन्] of these stems is elided: @deva[पथिन्] → @deva[पथ्]: @deva[पथः] (gen.), @deva[पथा] (inst.), @deva[पथे] (dat.); @deva[मथः], @deva[मथा], @deva[मथे]; @deva[ऋभुक्षः], @deva[ऋभुक्षा], @deva[ऋभुक्षे].
"""

advanced = """
The @deva[भ]-@deva[संज्ञा] (@ref[1.4.18]: @deva[यचि] @deva[भम्]) marks the stem before weak vowel-initial endings. The elision removes @deva[इन्] (vowel + consonant): @deva[पथिन्] → @deva[पथ्]. This creates the weak stem for instrumental/dative/genitive: @deva[पथा], @deva[पथे], @deva[पथः]. The @deva[सर्वनामस्थान]-anuvrtti doesn't apply here—this is specifically @deva[अभ]-cases.
"""

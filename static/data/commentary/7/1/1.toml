id = "7.1.1"
numericId = "71001"

[en]
simple = """
The markers @deva[यु] and @deva[वु] in affixes are replaced by @deva[अन] and @deva[अक] respectively. This rule begins the affix-substitution section.
"""

standard = """
When the indicatory letters @deva[यु] and @deva[वु] appear in an affix listing, they are replaced: @deva[यु] → @deva[अन], @deva[वु] → @deva[अक]. For example, @deva[तृचु] (from the @deva[छन्दस्] listing) becomes @deva[तृच] + @deva[अक] = @deva[तृचक]. This @[adhikāra] governs through @ref[7.1.35].
"""

advanced = """
This @[sūtra] opens the @[pratyayādeśa] (affix-substitution) section. The markers @deva[यु] and @deva[वु] encode phonological information in affix listings. @deva[यु] → @deva[अन] appears in affixes like @deva[शानच्] (originally @deva[शानय्]) where the final becomes @deva[आन]. @deva[वु] → @deva[अक] appears in affixes like @deva[ण्वुल्] → @deva[अक]. The @[adhikāra] extends to @ref[7.1.35], covering all affix-internal substitutions.
"""

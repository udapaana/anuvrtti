id = "7.1.10"
numericId = "71010"

[en]
simple = """
In Vedic, @deva[ऐस्] substitution varies — sometimes it applies to non-@deva[अ] stems, sometimes @deva[भिस्] stays after @deva[अ]-stems.
"""

standard = """
Vedic shows variation: @deva[ऐस्] may appear after non-@deva[अ] stems (@deva[नद्यैः] for @deva[नदीभिः]), and @deva[भिस्] may remain after @deva[अ]-stems (@deva[देवेभिः] for @deva[देवैः]). @[bahula] 'variously' marks this Vedic freedom.
"""

advanced = """
Vedic @deva[तृतीया] (instrumental) plurals show archaic variation. Forms like @deva[देवेभिः] preserve the original @deva[भिस्], while analogical @deva[ऐस्] spread to other stems. This @[bahula] rule documents Vedic diversity without prescribing a single norm.
"""

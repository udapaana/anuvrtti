id = "7.1.74"
numericId = "71074"

[en]
simple = """
According to @[gāvala], a neuter @deva[इक्]-final stem with an equivalent masculine form follows masculine declension from instrumental onward. @deva[ग्रामणि] (neut.) → @deva[ग्रामणिना] or @deva[ग्रामण्या].
"""

standard = """
Per @[gāvala]'s opinion, neuter @deva[इक्]-final stems with @deva[समान] masculine equivalents decline like the masculine from instrumental (@deva[तृतीया]) onward: @deva[ग्रामणि] (neut.) with masculine @deva[ग्रामणी] → instrumental @deva[ग्रामणिना] or @deva[ग्रामण्या] (no shortening, no @deva[नुम्]).
"""

advanced = """
This is @deva[आचार्य]-@deva[मत] (teacher's opinion): when neuter X corresponds to masculine X (@deva[समानरूप]), the neuter follows masculine patterns in @deva[तृतीयादि] (instrumental and following cases). Example: @deva[ग्रामणि] (neut. 'village-leadership') ≈ @deva[ग्रामणी] (masc. 'village-leader'). The option (@deva[ग्रामणिना]/@deva[ग्रामण्या]) reflects the two possible analyses.
"""

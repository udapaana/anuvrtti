id = "7.1.65"
numericId = "71065"

[en]
simple = """
When preceded by @deva[आ], the root @deva[लभ्] takes @deva[नुम्] before @deva[य]-initial affixes. @deva[आ] + @deva[लभ्] → @deva[आलम्भ्यो] @deva[गौः] 'a cow to be obtained'.
"""

standard = """
With @deva[उपसर्ग] @deva[आ], @deva[लभ्] takes @deva[नुम्] before @deva[य]-affixes: @deva[आ] + @deva[लभ्] + @deva[ण्यत्] → @deva[आलम्भ्यः]. The @deva[नुम्] is added before the affix, making @deva[लभ्] → @deva[लम्भ्] (no longer @deva[अकारोपधा]), so @deva[ण्यत्] (@ref[3.1.124]) applies instead of @deva[यत्] (@ref[3.1.98]).
"""

advanced = """
The timing is crucial: @deva[नुम्] first → @deva[लम्भ्], then affix selection. Since @deva[लम्भ्] isn't @deva[अकारोपधा], @deva[यत्] (@ref[3.1.98] for @deva[अकारोपधा] roots) doesn't apply; instead @deva[ण्यत्] (@ref[3.1.124] for other roots). Both yield @deva[आलम्भ्य], but differ in accent and feminine formation. Without this rule: @deva[आ] + @deva[लभ्] + @deva[यत्] → @deva[आलभ्य].
"""

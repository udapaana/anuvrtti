id = "7.1.48"
numericId = "71048"

[en]
simple = """
In Vedic, @deva[इष्ट्वीनम्] is an irregular form for @deva[इष्ट्वा] (from @deva[यज्] 'sacrifice'). Similarly @deva[पीत्वीनम्] for @deva[पीत्वा].
"""

standard = """
The absolutive @deva[इष्ट्वा] (from @deva[यज्] + @deva[क्त्वा]) shows the irregular Vedic form @deva[इष्ट्वीनम्], where @deva[आ] is replaced by @deva[ईनम्]: @deva[इष्ट्वीनं] @deva[देवान्] 'having worshipped the gods'. The @deva[च] indicates similar forms like @deva[पीत्वीनम्].
"""

advanced = """
This @[nipātana] (irregular form) replaces the final @deva[आ] of @deva[क्त्वा] with @deva[ईनम्]. The form @deva[इष्ट्वीनम्] (@deva[इष्] + @deva[क्त्वा] → @deva[इष्ट्व्] + @deva[ईनम्]) appears in Vedic ritual texts. The @deva[च] signals the class includes @deva[पीत्वीनम्] (from @deva[पा] 'drink') and potentially others, showing productive Vedic absolutive morphology.
"""

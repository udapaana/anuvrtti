id = "7.1.76"
numericId = "71076"

[en]
simple = """
In Vedic, @deva[अस्थि], @deva[दधि], @deva[सक्थि], @deva[अक्षि] also take the @deva[अन्] substitute before consonant-initial endings. @deva[दधीचो] @deva[अस्थभिः] 'with @[dadhīci]'s bones'.
"""

standard = """
In the Vedas, the @deva[अनङ्] substitute (@ref[7.1.75]) extends beyond @deva[अजादि] endings to @deva[हलादि] (consonant-initial) endings: @deva[इन्द्रो] @deva[दधीचो] @deva[अस्थभिः], @deva[भद्रं] @deva[पश्येमाक्षभिः]. Also extends to cases before instrumental.
"""

advanced = """
The Vedic extension applies the @deva[अनङ्] substitute in contexts beyond @ref[7.1.75]'s @deva[तृतीयादि] @deva[अजादि] scope. The examples show consonant-initial endings (@deva[अस्थभिः] with instrumental -@deva[भिस्]) and pre-instrumental cases. This reflects Vedic declensional freedom where these four stems show broader @deva[अन्]-stem behavior.
"""

id = "7.1.35"
numericId = "71035"

[en]
simple = """
In blessing/benediction, @deva[तातङ्] optionally replaces @deva[तु] and @deva[हि] (imperative). @deva[जीव] + @deva[तु] → @deva[जीवतात्] 'may he live!', @deva[जीव] + @deva[हि] → @deva[जीवतात्] 'may you live!'
"""

standard = """
When expressing a wish (@deva[आशिष्]), the imperative endings @deva[तु] (3rd person) and @deva[हि] (2nd person) may optionally become @deva[तातङ्]: @deva[जीवतात्] @deva[भवान्] 'may you live!' or @deva[जीवतु] @deva[भवान्]. The @deva[ङ्] prevents @[guṇa]/@[vṛddhi] (@ref[1.1.5]), and the substitute replaces the whole affix.
"""

advanced = """
The @deva[तातङ्] substitution is optional (@deva[अन्यतरस्याम्]) and requires benedictive sense (@deva[आशिषि]). The indicatory @deva[ङ्] serves two purposes: blocking @[guṇa]/@[vṛddhi] by @ref[1.1.5], and making the substitute non-@deva[पित्] despite replacing a @deva[पित्] affix. This allows the benedictive to be distinguished from ordinary imperatives: @deva[जीवतात्] vs. @deva[जीवतु]/@deva[जीव].
"""

id = "7.1.5"
numericId = "71005"

[en]
simple = """
In @[ātmanepada], @deva[झ्] becomes @deva[अत्] when the stem doesn't end in @deva[अ].
"""

standard = """
For @[ātmanepada] endings after a stem not ending in @deva[अ], @deva[झ्] → @deva[अत्]. Examples: @deva[चिन्वते] 'they gather' (√@deva[चि] class 5), @deva[लुनते] 'they cut' (√@deva[लू] class 9). Compare with @deva[अ]-ending stems: @deva[भवन्ते] (where @deva[झ्] → @deva[अन्त्] → @deva[अन्ते]).
"""

advanced = """
This rule applies to @[ātmanepada] 3pl (@deva[झ] → @deva[अते], @deva[अताम्], etc.) when the @[aṅga] ends in a consonant or non-@deva[अ] vowel. The condition '@deva[अनत्]' means 'not ending in @deva[अत्]' — i.e., not an @deva[अ]-stem. Class 5, 8, 9 verbs and consonant-final roots trigger this. @deva[अ]-stems take the regular @deva[अन्ते] by @ref[7.1.3].
"""

id = "7.1.12"
numericId = "71012"

[en]
simple = """
After @deva[अ]-stems: instrumental @deva[टा] → @deva[इन्] (giving @deva[एन]), ablative @deva[ङसि] → @deva[आत्], genitive @deva[ङस्] → @deva[स्य].
"""

standard = """
Three case-ending substitutions for @deva[अ]-stems: (1) @deva[टा] → @deva[इना] (@deva[देवेन] 'by the god'), (2) @deva[ङसि] → @deva[आत्] (@deva[देवात्] 'from the god'), (3) @deva[ङस्] → @deva[स्य] (@deva[देवस्य] 'of the god'). These create the characteristic @deva[अ]-stem singular endings.
"""

advanced = """
This @[sūtra] accounts for the distinctive singular case forms of @deva[अकारान्त] stems. The @deva[इना] substitute combines with stem-final @deva[अ] → @deva[एन] (by @deva[अ] + @deva[इ] → @deva[ए]). The @deva[आत्] and @deva[स्य] substitutes are direct. These endings contrast with consonant stems which retain @deva[आ], @deva[अस्], @deva[अस्].
"""

id = "7.1.4"
numericId = "71004"

[en]
simple = """
After a reduplicated stem (@deva[अभ्यस्त]), @deva[झ्] becomes @deva[अत्] instead of @deva[अन्त्].
"""

standard = """
When the verbal stem is @[abhyasta] (reduplicated), @deva[झ्] → @deva[अत्] rather than @deva[अन्त्]. Examples: @deva[दधति] 'they place' (not *@deva[दधन्ति]), @deva[बिभ्रति] 'they bear', @deva[जुह्वति] 'they offer'. This @deva[अत्] is later replaced by @deva[उस्] to give @deva[ददुः], @deva[बिभ्रुः].
"""

advanced = """
The @[abhyasta] stems include: (1) perfect stems like @deva[चकृ], (2) intensive stems, (3) reduplicated presents like @deva[दधा], @deva[बिभृ], @deva[जुहु]. The shortened ending @deva[अत्] (vs. @deva[अन्त्]) is characteristic of these archaic formations. By @ref[7.1.4], this @deva[अत्] becomes @deva[उस्] in the perfect: @deva[चक्रुः], @deva[ददुः].
"""

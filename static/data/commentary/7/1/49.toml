id = "7.1.49"
numericId = "71049"

[en]
simple = """
In Vedic, forms like @deva[स्नात्वी] appear for @deva[स्नात्वा]. @deva[स्नात्वी] @deva[मलादिव] 'as if having bathed from dirt', @deva[पीत्वी] @deva[सोमस्य] 'having drunk soma'.
"""

standard = """
Vedic absolutives show @deva[आ] → @deva[ई]: @deva[स्नात्वा] → @deva[स्नात्वी], @deva[पीत्वा] → @deva[पीत्वी]. Examples: @deva[स्नात्वी] @deva[मलादिव] (for @deva[स्नात्वा]), @deva[पीत्वी] @deva[सोमस्य] @deva[वावृधे] (for @deva[पीत्वा]). The @deva[आदि] indicates forms 'of this type'.
"""

advanced = """
The @deva[स्नात्व्यादि] class shows @deva[आ] → @deva[ई] replacement in Vedic absolutives. The term @deva[आदि] means 'having this form' rather than 'et cetera', specifying the morphological pattern. Examples: @deva[स्नात्वी], @deva[पीत्वी], @deva[कृत्वी]. This @deva[ई]-ending absolutive is an archaic Vedic feature.
"""

id = "7.1.98"
numericId = "71098"

[en]
simple = """
In strong cases, @deva[चतुर्] and @deva[अनडुह्] receive the augment @deva[आ] (with @[udātta]) after @deva[उ]. @deva[चतुर्] → @deva[चत्वार्] 'four', @deva[अनडुह्] → @deva[अनड्वाह्] 'bull'.
"""

standard = """
In @deva[सर्वनामस्थान], @deva[आम्] (= @[udātta] @deva[आ]) is inserted after @deva[उ]: @deva[चतुर्] → @deva[चत्वार्] (@deva[चत्वारः], etc.); @deva[अनडुह्] → @deva[अनड्वाह्] (@deva[अनड्वान्], @deva[अनड्वाहौ], @deva[अनड्वाहः], @deva[अनड्वाहम्]). Compounds follow: @deva[प्रियचत्वारः], @deva[प्रियानड्वान्].
"""

advanced = """
The @deva[आ]-augment creates the strong stem: @deva[चतुर्] + @deva[आ] → @deva[चत्वार्] (with @deva[उ] → @deva[व्] before @deva[आ]); @deva[अनडुह्] + @deva[आ] → @deva[अनड्वाह्] (@deva[उ] → @deva[व्]). The @[vārttika] notes feminine @deva[अनडुह्] has optional treatment. The @[udātta] on @deva[आ] shifts the accent pattern in these strong forms.
"""

id = "7.1.8"
numericId = "71008"

[en]
simple = """
In Vedic, the @deva[रुट्] augment applies variably (not restricted to @deva[शी] and @deva[विद्]).
"""

standard = """
The @deva[छन्दस्] (Vedic literature) shows @deva[रुट्] after other roots too: @deva[अदुह्र] 'they milked' (√@deva[दुह्] + @deva[झ] → @deva[दुह्] + @deva[रत्]). @deva[बहुलम्] 'variously' indicates Vedic forms don't follow the strict @deva[भाषा] rules.
"""

advanced = """
Vedic preserves archaic patterns where @deva[रुट्] was more productive. Forms like @deva[अदुह्र], @deva[अरिह्र] show this augment with roots that don't take it in classical Sanskrit. The @[bahula] designation marks Vedic-only usage.
"""

id = "7.1.72"
numericId = "71072"

[en]
simple = """
Neuter stems ending in a consonant (except nasals/semivowels) or in a vowel take @deva[नुम्] in strong cases. @deva[यशस्] → @deva[यशांसि] 'glories', @deva[वन] → @deva[वनानि] 'forests'.
"""

standard = """
Neuter stems get @deva[नुम्] in @deva[सर्वनामस्थान] if ending in: (1) consonant other than @deva[यण्] (semivowel) or nasal: @deva[यशांसि], @deva[पयांसि]; (2) vowel: @deva[कुण्डानि], @deva[वनानि], @deva[त्रपूणि]. Not: @deva[बहुपुरि], @deva[चत्वारि], @deva[अहानि] (semivowel/nasal-final).
"""

advanced = """
The @deva[अयणवन्त] (non-semivowel, non-nasal) restriction excludes: @deva[बहुपुरि] (@deva[र्]-final), @deva[बहुधुरि], @deva[विमलदिवि], @deva[चत्वारि] (@deva[र्]-final), @deva[अहानि] (@deva[न्]-final by @ref[7.1.98]). Neuters with @deva[उगित्] affixes get @deva[नुम्] by @ref[7.1.70] instead. This rule creates the characteristic -@deva[ंसि]/-@deva[आनि] neuter plural pattern.
"""

id = "7.1.68"
numericId = "71068"

[en]
simple = """
But when only @deva[सु] or @deva[दुस्] precedes (without another @deva[उपसर्ग]), @deva[लभ्] does NOT take @deva[नुम्] before @deva[खल्]/@deva[घञ्]. @deva[सुलभम्] 'easy to obtain', @deva[दुर्लभम्] 'hard to obtain'.
"""

standard = """
When @deva[सु]/@deva[दुस्] alone precedes (@deva[केवल]), no @deva[नुम्] before @deva[खल्]/@deva[घञ्]: @deva[सुलभम्], @deva[दुर्लभम्] (@deva[खल्]); @deva[सुलाभः], @deva[दुर्लाभः] (@deva[घञ्]). But with additional preposition: @deva[सुप्रलम्भः], @deva[दुष्प्रलम्भः] (@deva[नुम्] applies by @ref[7.1.67]).
"""

advanced = """
The word @deva[केवल] indicates @deva[सु]/@deva[दुस्] alone, without another @deva[उपसर्ग]. The instrumental @deva[सुदुर्भ्याम्] (not ablative) necessitates @deva[केवल]. Rule interaction: @ref[7.1.67] requires @deva[उपसर्ग] for @deva[नुम्]; @ref[7.1.68] excepts @deva[केवल] @deva[सु]/@deva[दुस्]. Result: @deva[सु] + @deva[लभ्] + @deva[खल्] → @deva[सुलभ] (no @deva[नुम्]); @deva[सु] + @deva[प्र] + @deva[लभ्] + @deva[खल्] → @deva[सुप्रलम्भ] (@deva[नुम्]).
"""

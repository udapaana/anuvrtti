id = "7.1.50"
numericId = "71050"

[en]
simple = """
In Vedic, after stems ending in @deva[अ]/@deva[आ], the nominative plural @deva[अस्] takes the augment @deva[असुक्] (= @deva[अस्]). @deva[ब्राह्मणाः] → @deva[ब्राह्मणासः] 'brahmins'.
"""

standard = """
The Vedic nominative plural shows @deva[अस्] + @deva[असुक्] (augment @deva[अस्]): @deva[ब्राह्मणाः] → @deva[ब्राह्मणासः], @deva[सोम्याः] → @deva[सोम्यासः], @deva[पूर्वे] → @deva[पूर्वासः]. Examples: @deva[ब्राह्मणासः] @deva[पितरः] @deva[सोम्यासः] (@[ṛg] VI.75.10).
"""

advanced = """
The @deva[असुक्] augment creates the characteristically Vedic -@deva[आसः] nominative plural (vs. classical -@deva[आः]). After @deva[अ]-stems: @deva[पूर्वासः], @deva[उपरासः] (@[ṛg] X.15.2); after @deva[आ]-stems: @deva[ब्राह्मणासः]. The form @deva[पुतासः] (@[ṛg] I.3.4) shows this doesn't trigger @deva[जस्] → @deva[शी] (@ref[7.1.17]) since the augment follows the case-ending.
"""

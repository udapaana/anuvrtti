id = "7.1.78"
numericId = "71078"

[en]
simple = """
After a reduplicated stem, the participle @deva[शतृ] does not take @deva[नुम्] in strong cases. @deva[दा] → @deva[ददत्] (not *@deva[ददन्त्]): @deva[ददत्], @deva[ददतौ], @deva[ददतः] 'giving'.
"""

standard = """
The @deva[शतृ] participle after @deva[अभ्यस्त] (reduplicated) stems lacks @deva[नुम्] in @deva[सर्वनामस्थान]: @deva[ददत्] (from @deva[दा]), @deva[जक्षत्] (from @deva[घस्]), @deva[जाग्रत्] (from @deva[जागृ]). Nominatives: @deva[ददत्], @deva[ददतौ], @deva[ददतः] (not *@deva[ददन्], *@deva[ददन्तौ]).
"""

advanced = """
This excepts @ref[7.1.70] (@deva[उगित्] takes @deva[नुम्]) for reduplicated stems. @deva[शतृ] has indicatory @deva[ऋ] (@deva[ऋत्]), normally triggering @deva[नुम्]. But after @deva[अभ्यस्त]: @deva[दा] + @deva[शप्] + @deva[शतृ] → @deva[ददत्] (with reduplication). The negation @deva[न] applies to @deva[नुम्] (understood from @ref[7.1.70]), not to @deva[ई] (@ref[7.1.77]), since @deva[ई] never applies to @deva[शतृ].
"""

id = "7.1.15"
numericId = "71015"

[en]
simple = """
After pronominal @deva[अ]-stems: ablative @deva[ङसि] → @deva[स्मात्], locative @deva[ङि] → @deva[स्मिन्].
"""

standard = """
Two more pronominal substitutions: (1) @deva[ङसि] (ablative) → @deva[स्मात्]: @deva[तस्मात्] 'from that', @deva[यस्मात्] 'from which'. (2) @deva[ङि] (locative) → @deva[स्मिन्]: @deva[तस्मिन्] 'in that', @deva[यस्मिन्] 'in which'. These @deva[स्म्]-forms mark pronominal declension.
"""

advanced = """
The @deva[स्मात्]//@deva[स्मिन्] endings continue the pronominal pattern started in @ref[7.1.14]. Together, rules @ref[7.1.14]-15 give the characteristic @[sarvanāman] singular oblique endings: dative @deva[स्मै], ablative @deva[स्मात्], locative @deva[स्मिन्]. Non-@deva[अ] pronouns and non-pronominals use the regular endings.
"""

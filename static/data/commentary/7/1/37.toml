id = "7.1.37"
numericId = "71037"

[en]
simple = """
In a compound with a non-@deva[नञ्] indeclinable as first member, @deva[ल्यप्] replaces @deva[क्त्वा]. @deva[प्र] + @deva[कृत्वा] → @deva[प्रकृत्य] 'having done forth'.
"""

standard = """
When an indeclinable (except @deva[नञ्]) precedes, the absolutive @deva[क्त्वा] becomes @deva[ल्यप्] (= @deva[य]): @deva[प्र] + @deva[कृत्वा] → @deva[प्रकृत्य], @deva[प्र] + @deva[हृत्वा] → @deva[प्रहृत्य]. The @deva[तुक्] augment applies by @ref[6.1.71]. This creates the compound absolutive form.
"""

advanced = """
The @deva[समास] requirement means the upasarga must compound with the verb: @deva[प्र] + @deva[कृ] + @deva[ल्यप्] → @deva[प्रकृत्य] (compounding by @ref[2.2.18]). The @deva[नञ्] exception preserves @deva[अकृत्वा] 'not having done' (no compounding with negative). The @deva[ल्यप्] form with @deva[तुक्] augment (@deva[कृ] + @deva[य] → @deva[कृत्य]) creates the characteristic -@deva[त्य] ending of compound absolutives.
"""

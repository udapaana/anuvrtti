id = "7.1.97"
numericId = "71097"

[en]
simple = """
From instrumental onward, before vowel-initial endings, @deva[क्रोष्टु] may optionally be treated as @deva[तृच्]-ending. @deva[क्रोष्ट्रा] or @deva[क्रोष्टुना] 'by jackal'.
"""

standard = """
Before @deva[अजादि] endings (instrumental onward), @deva[क्रोष्टु] optionally follows @deva[तृच्]-declension: @deva[क्रोष्ट्रा]/@deva[क्रोष्टुना] (inst.), @deva[क्रोष्ट्रे]/@deva[क्रोष्टवे] (dat.), @deva[क्रोष्टुः]/@deva[क्रोष्टोः] (gen.), @deva[क्रोष्टरि]/@deva[क्रोष्टौ] (loc.). But accusative plural: @deva[क्रोष्टून्] only; consonant-initial: @deva[क्रोष्टुभ्याम्].
"""

advanced = """
The @[vārttika] notes @deva[नुम्]/@deva[नुट्] augments supersede @deva[तृच्]-treatment in some forms. The option creates parallel paradigms: @deva[तृच्]-like (@deva[क्रोष्ट्रा], @deva[क्रोष्ट्रे], @deva[क्रोष्ट्रोः]) vs. @deva[उ]-stem (@deva[क्रोष्टुना], @deva[क्रोष्टवे], @deva[क्रोष्ट्वोः]). Accusative plural @deva[क्रोष्टून्] shows the @deva[उ]-stem prevails there.
"""

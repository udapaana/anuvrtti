id = "7.1.32"
numericId = "71032"

[en]
simple = """
The @deva[अत्] substitution also applies in ablative singular. @deva[युष्मद्] → @deva[त्वत्] 'from you', @deva[अस्मद्] → @deva[मत्] 'from me'.
"""

standard = """
Extends @ref[7.1.31] to singular: @deva[अत्] replaces the ablative singular ending too. But first, @deva[त्व] and @deva[म] replace the pronominal stems by @ref[7.2.97]: @deva[युष्मद्] → @deva[त्व], @deva[अस्मद्] → @deva[म]. Then @deva[त्व] + @deva[अत्] → @deva[त्वत्], @deva[म] + @deva[अत्] → @deva[मत्] by @ref[6.1.97].
"""

advanced = """
This extension to singular completes the @deva[पञ्चमी] (ablative) paradigm for personal pronouns. The stem-substitution @deva[त्व]/@deva[म] (by @ref[7.2.97]) occurs before the case-ending replacement: @deva[युष्मद्] → @deva[त्व] → @deva[त्व] + @deva[अत्] → @deva[त्वत्]; @deva[अस्मद्] → @deva[म] → @deva[म] + @deva[अत्] → @deva[मत्]. The identical ending @deva[अत्] for both singular and plural creates formal simplicity but relies on context for number distinction.
"""

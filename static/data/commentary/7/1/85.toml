id = "7.1.85"
numericId = "71085"

[en]
simple = """
Before nominative singular @deva[सु], @deva[आत्] (= @deva[आ]) replaces the final of @deva[पथिन्], @deva[मथिन्], and @deva[ऋभुक्षिन्]. @deva[पथिन्] → @deva[पन्थाः] 'path'.
"""

standard = """
The stems @deva[पथिन्], @deva[मथिन्], @deva[ऋभुक्षिन्] take @deva[आ]-substitute (@deva[आत्] = @deva[आ]) before @deva[सु]: @deva[पन्थाः], @deva[मन्थाः], @deva[ऋभुक्षाः]. Though the replaced @deva[न्] is nasal, the substitute @deva[आ] is pure (not nasalized), per the @[paribhāṣā].
"""

advanced = """
The @deva[आ] is not nasalized despite replacing a nasal (@deva[न्]), following @deva[भाव्यमानेन] @deva[सवर्णानां] @deva[ग्रहणं] @deva[न] @deva[भवति] 'a letter not yet manifested doesn't include its @[savarṇas]'. The @deva[न्थ] cluster (@ref[7.1.87]) and @deva[इ] → @deva[अ] (@ref[7.1.86]) also apply: @deva[पथिन्] → @deva[पथन्] (@ref[7.1.86]) → @deva[पन्थन्] (@ref[7.1.87]) → @deva[पन्था] (@ref[7.1.85]) + @deva[स्] → @deva[पन्थाः].
"""

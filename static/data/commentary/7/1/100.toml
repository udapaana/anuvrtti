id = "7.1.100"
numericId = "71100"

[en]
simple = """
Final long @deva[ॠ] of a root is replaced by @deva[इर्]. @deva[कॄ] → @deva[किर्]: @deva[किरति] 'scatters', @deva[गॄ] → @deva[गिर्]: @deva[गिरति] 'swallows'.
"""

standard = """
Root-final @deva[ॠ] becomes @deva[इर्] (with @deva[र]-para by @ref[1.1.51]): @deva[कॄ] (@deva[तुदादि]) → @deva[किर्] → @deva[किरति]; @deva[गॄ] → @deva[गिर्] → @deva[गिरति]. Also: @deva[स्तॄ] → @deva[स्तीर्ण] (with lengthening by @ref[8.2.77]). Not for nominals: @deva[पितॄणाम्], @deva[मातॄणाम्] (@deva[ॠ] retained).
"""

advanced = """
The @deva[इर्]-substitute applies to @deva[धातु]-final @deva[ॠ] only, not @deva[प्रातिपदिक]. Derivation: @deva[कॄ] + @deva[शप्] + @deva[ति] → @deva[किर्] + @deva[अ] + @deva[ति] → @deva[किरति]. Derivative roots also: @deva[कॄ] + @deva[सन्] → @deva[चिकीर्ष] → @deva[चिकीर्षति] (desiderative). The @deva[र्] is '@deva[र]-@deva[पर]' (followed by @deva[र्]) per @ref[1.1.51], ensuring proper sequencing.
"""

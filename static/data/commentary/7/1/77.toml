id = "7.1.77"
numericId = "71077"

[en]
simple = """
In Vedic, for @deva[अस्थि], @deva[दधि], @deva[सक्थि], @deva[अक्षि], @[udātta] @deva[ई] replaces the final before dual endings. @deva[अक्षी] @deva[ते] @deva[इन्द्रपिङ्गले] 'your two tawny eyes, O Indra'.
"""

standard = """
In the Vedas, these four neuters take @[udātta] @deva[ई] before dual affixes: @deva[अक्षी] @deva[ते] @deva[इन्द्रपिङ्गले], @deva[अक्षीभ्यां] @deva[ते] @deva[नासिकाभ्याम्]. The @deva[नुम्] of @ref[7.1.73] is blocked because this @deva[ई]-substitution supersedes it.
"""

advanced = """
This @[sūtra] takes precedence over @ref[7.1.73] (@deva[नुम्] before @deva[अच्]): once superseded, @ref[7.1.73] doesn't reapply (@deva[एकदेशविकृतं] @deva[अनन्यत्]). Thus @deva[अक्षि] + @deva[औ] → @deva[अक्षी] (@deva[ई]-substitute), not *@deva[अक्षिणी] (@deva[नुम्] + @deva[औ]). The @[udātta] accent on @deva[ई] marks the Vedic dual forms distinctively.
"""

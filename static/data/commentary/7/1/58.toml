id = "7.1.58"
numericId = "71058"

[en]
simple = """
Roots with indicatory @deva[इ] (@deva[इदित्]) receive @deva[नुम्] after their vowel. @deva[कुडि] → @deva[कुण्ड्]: @deva[कुण्डितृ], @deva[कुण्डितुम्].
"""

standard = """
Roots marked with indicatory @deva[इ] (@deva[इदित्]) insert @deva[नुम्] after their vowel: @deva[कुडि] → @deva[कुण्ड्] (@deva[कुण्डितृ], @deva[कुण्डितुम्], @deva[कुण्डितव्यम्]), @deva[हुडि] → @deva[हुण्ड्] (@deva[हुण्डितृ], @deva[हुण्डितुम्]). But @deva[पच्], @deva[पठ्] (where @deva[इ] is part of the root, not @deva[इत्]) show no nasal.
"""

advanced = """
The @deva[इत्]-marker @deva[इ] signals inherent nasalization. The @deva[नुम्] is added from the root's inception (@deva[धात्वारम्भ]), affecting all derivatives. By @ref[3.3.103], roots ending in consonant (@deva[हल्]) after @deva[इदित्] treatment take @deva[आ] in feminine: @deva[कुण्ड्] → @deva[कुण्डा]. This creates systematic nasal-infixed root variants.
"""

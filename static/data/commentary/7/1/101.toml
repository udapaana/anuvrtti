id = "7.1.101"
numericId = "71101"

[en]
simple = """
Penultimate (not final) long @deva[ॠ] of a root is also replaced by @deva[इर्]. @deva[कॄत्] → @deva[कीर्त्]: @deva[कीर्तयति] 'praises'.
"""

standard = """
Root-penultimate @deva[ॠ] also becomes @deva[इर्]: @deva[कॄत्] → @deva[कीर्त्] → @deva[कीर्तयति], @deva[कीर्तयतः], @deva[कीर्तयन्ति]. The lengthening (@deva[कीर्] not @deva[किर्]) follows 8.2.77.
"""

advanced = """
This extends @ref[7.1.100] to @deva[उपधा] (penultimate) position: @deva[कॄत्] has @deva[ॠ] as penultimate (before @deva[त्]). The derivation: @deva[कॄत्] + @deva[णिच्] → @deva[कीर्त्] + @deva[इ] → @deva[कीर्तयति]. The @ref[8.2.77] lengthening applies to both final and penultimate @deva[इर्]-substitutes, creating the long @deva[ई] in @deva[कीर्त्], @deva[स्तीर्ण], etc.
"""

id = "7.1.34"
numericId = "71034"

[en]
simple = """
For roots ending in long @deva[आ], @deva[औ] replaces the perfect @deva[णल्] ending. @deva[पा] 'drink' → @deva[पपौ] 'drank', @deva[स्था] 'stand' → @deva[तस्थौ] 'stood'.
"""

standard = """
In perfect tense (@deva[लिट्]), roots ending in @deva[आ] take @deva[औ] instead of @deva[णल्] (1st/3rd singular). @deva[पा] + @deva[लिट्] → @deva[प] + @deva[प] + @deva[अ] → @deva[पपौ]; @deva[स्था] + @deva[लिट्] → @deva[त] + @deva[स्थ] + @deva[अ] → @deva[तस्थौ]. The replacement occurs after reduplication.
"""

advanced = """
Three operations compete at @deva[पा] + @deva[णल्]: reduplication (@ref[6.1.8]), lengthening (@ref[7.2.116]), and this @deva[औ]-substitution. By the principle that replacement is stronger, @deva[औ] applies: @deva[पा] + @deva[अ] → @deva[पौ], giving @deva[पपौ]. Similarly @deva[ग्लै] (→@deva[ग्ला] by @ref[7.2.31]) → @deva[जग्लौ], @deva[म्लै] (→@deva[म्ला]) → @deva[मम्लौ]. The @deva[औ] is treated as @deva[अनेकाल्] substitute replacing the whole ending (@ref[1.1.55]).
"""

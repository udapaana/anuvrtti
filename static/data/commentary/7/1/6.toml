id = "7.1.6"
numericId = "71006"

[en]
simple = """
After √@deva[शी] 'to lie', the @deva[अत्] ending gets @deva[र्] added: @deva[शेरते] 'they lie'.
"""

standard = """
The root @deva[शीङ्] 'to lie, sleep' takes augment @deva[रुट्] (= @deva[र्]) before the @deva[अत्] substitute, giving @deva[रत्]. Thus @deva[शेरते], @deva[शेरताम्], @deva[अशेरत]. The @deva[र्] attaches to the beginning of @deva[अत्] (as @[ṭit] augments are initial).
"""

advanced = """
The @deva[रुट्] augment is @[ṭit] (initial-attaching) by @ref[1.1.46]. This creates the distinctive @deva[रत्] ending unique to @deva[शीङ्]. The rule distinguishes @deva[शीङ्] from the homophonous @deva[शी] 'to sharpen'. Historical note: this @deva[र्] may preserve an archaic stem form.
"""

id = "7.1.16"
numericId = "71016"

[en]
simple = """
The pronominal endings @deva[स्मात्] and @deva[स्मिन्] are optional after @deva[पूर्व] and the eight words that follow it in the list.
"""

standard = """
For the nine words @deva[पूर्व], @deva[पर], @deva[अवर], @deva[दक्षिण], @deva[उत्तर], @deva[अपर], @deva[अधर], @deva[स्व], @deva[अन्तर] (listed at @ref[1.1.34]), the pronominal ablative @deva[स्मात्] and locative @deva[स्मिन्] are optional. Thus @deva[पूर्वस्मात्] or @deva[पूर्वात्], @deva[पूर्वस्मिन्] or @deva[पूर्वे].
"""

advanced = """
These nine words optionally follow pronominal declension by @ref[1.1.34]. This rule extends the optional @deva[स्म्]-endings from @ref[7.1.15] to them. When used as @[sarvanāman] (in distributive or relative sense), pronominal endings are preferred; when used as ordinary adjectives, nominal endings may be used.
"""

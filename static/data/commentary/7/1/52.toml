id = "7.1.52"
numericId = "71052"

[en]
simple = """
After pronominal stems ending in @deva[अ]/@deva[आ], the genitive plural @deva[आम्] takes augment @deva[स्] at the beginning. @deva[सर्व] + @deva[आम्] → @deva[सर्वेषाम्] 'of all'.
"""

standard = """
Pronouns (@deva[सर्वनामन्]) ending in @deva[अ]/@deva[आ] take @deva[सुट्] before @deva[आम्] (genitive plural): @deva[सर्वेषाम्], @deva[विश्वेषाम्], @deva[येषाम्], @deva[तेषाम्] (masculine); @deva[सर्वासाम्], @deva[यासाम्], @deva[तासाम्] (feminine). But @deva[भवताम्] (from @deva[भवत्]) lacks this augment.
"""

advanced = """
The @deva[सुट्] augment applies to true pronouns (@deva[सर्वादि] per @ref[1.1.27]), not to pronominal adjectives like @deva[भवत्]. The @deva[आत्] from @ref[7.1.50] carries over. This @deva[आम्] is the genitive plural ending, not the locative singular @deva[आम्] of @ref[7.3.116] (which takes @deva[याट्]/@deva[आट्]). Result: @deva[सर्व] + @deva[स्] + @deva[आम्] → @deva[सर्वेषाम्].
"""

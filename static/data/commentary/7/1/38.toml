id = "7.1.38"
numericId = "71038"

[en]
simple = """
In Vedic language, @deva[क्त्वा] itself (not just @deva[ल्यप्]) can remain after an indeclinable compound. @deva[प्र] + @deva[कृत्वा] → @deva[प्रकृत्वा] or @deva[प्रकृत्य].
"""

standard = """
In the Vedas (@deva[छन्दस्]), both forms are valid: the @deva[ल्यप्] substitution of @ref[7.1.37] is optional. Thus @deva[कृष्णं] @deva[वासः] @deva[परिधापयित्वा] (Vedic) alongside @deva[उद्धृत्य] (standard). The @deva[अपि] anuvrtti from @ref[7.1.37] makes this optional.
"""

advanced = """
The Vedic optionality preserves archaic @deva[क्त्वा] forms in compounds: @deva[परिधापयित्वा], @deva[प्रत्यर्थयित्वा]. The @[sūtra] could simply say '@deva[वा] @deva[छन्दसि]' but the fuller form indicates distinct conditions apply. This flexibility reflects the Vedic language's preservation of older morphological patterns alongside innovations.
"""

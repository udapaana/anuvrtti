id = "7.1.33"
numericId = "71033"

[en]
simple = """
For @deva[युष्मद्] and @deva[अस्मद्] in genitive plural, @deva[आकम्] replaces @deva[साम्]. @deva[युष्मद्] → @deva[युष्माकम्] 'of you all', @deva[अस्मद्] → @deva[अस्माकम्] 'of us'.
"""

standard = """
The genitive plural ending @deva[साम्] (= @deva[आम्] with augment @deva[स्] from @ref[7.1.52]) becomes @deva[आकम्]: @deva[युष्म] + @deva[आकम्] → @deva[युष्माकम्], @deva[अस्म] + @deva[आकम्] → @deva[अस्माकम्]. The @[sūtra] says @deva[साम्] (not @deva[आम्]) to indicate this applies after the augment @deva[स्] is added.
"""

advanced = """
The specification @deva[साम्] rather than @deva[आम्] is significant: it shows the substitution applies to the augmented form (@deva[आम्] + @deva[सुट्] = @deva[साम्]). The resulting @deva[आकम्] ending is unique to these pronouns. Derivation: @deva[युष्मद्] loses @deva[द्] → @deva[युष्म], then @deva[युष्म] + @deva[आकम्] → @deva[युष्माकम्]. The @deva[क्] in @deva[आकम्] is characteristic of these pronominal genitives.
"""

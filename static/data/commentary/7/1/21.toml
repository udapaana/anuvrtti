id = "7.1.21"
numericId = "71021"

[en]
simple = """
After @deva[अष्ट] 'eight' (in the form @deva[अष्टा]), the nominative/accusative ending becomes @deva[औ]: @deva[अष्टौ].
"""

standard = """
The numeral @deva[अष्टन्] takes the form @deva[अष्टा] before case endings (by @ref[7.2.84]). After this @deva[अष्टा], the nominative/accusative plural ending is replaced by @deva[औ]. Result: @deva[अष्टौ] 'eight' (used for all three genders).
"""

advanced = """
The @deva[औश्] substitute (with @[it] @deva[श्]) gives @deva[औ]. This is unique to @deva[अष्टन्] — other numerals follow different patterns. The form @deva[अष्टौ] is invariable for nominative and accusative across all genders, unlike @deva[पञ्च] etc.
"""

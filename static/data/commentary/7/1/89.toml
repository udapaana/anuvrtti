id = "7.1.89"
numericId = "71089"

[en]
simple = """
In strong cases, @deva[असुङ्] (= @deva[अस्]) replaces the final of @deva[पुंस्]. @deva[पुंस्] → @deva[पुमस्] → @deva[पुमान्] 'man' (nominative singular).
"""

standard = """
In @deva[सर्वनामस्थान], the @deva[स्] of @deva[पुंस्] is replaced by @deva[अस्] (@deva[असुङ्]): @deva[पुंस्] → @deva[पुमस्] (@[anusvāra] becomes @deva[म्]). The @deva[उ] in @deva[असुङ्] signals @deva[नुम्] addition (@ref[7.1.70]): @deva[पुमान्], @deva[पुमांसौ], @deva[पुमांसः].
"""

advanced = """
Derivation: @deva[पुंस्] (from @deva[पा] + @deva[डुम्सुन्], @[uṇādi] IV.178) → @deva[पुमस्] (@deva[असुङ्] in strong cases). The @deva[उ] of @deva[असुङ्] triggers @deva[नुम्] (@ref[7.1.70]), making it @deva[उगित्]: @deva[पुमस्] + @deva[नुम्] → @deva[पुमान्स्] → @deva[पुमान्] (@deva[स्]-lopa). The substitution occurs ab initio (@deva[प्रकृतिवद्भाव]), affecting all strong-case operations from the start.
"""

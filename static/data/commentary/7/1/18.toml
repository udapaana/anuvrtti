id = "7.1.18"
numericId = "71018"

[en]
simple = """
After feminine @deva[आ]-stems, the dual ending @deva[औ] (nominative/accusative) becomes @deva[ई]: @deva[रामे] 'two @[rāmās]'.
"""

standard = """
The dual nominative/accusative ending @deva[औ] is replaced by @deva[ई] after stems ending in the feminine affix @deva[आप्] (i.e., @deva[आ]-ending feminines). Thus @deva[रामा] + @deva[औ] → @deva[रामे] 'two @[rāmās]', @deva[सीते] 'two @[sītās]'.
"""

advanced = """
This applies specifically to @deva[आप्]-derived feminines (by @ref[4.1.4]), not to stems that happen to end in @deva[आ]. The @deva[औङ्] in the @[sūtra] indicates the @deva[औ] ending. Combined with stem-final @deva[आ] + @deva[ई] → @deva[ए] (by @ref[6.1.87] @[guṇa]).
"""

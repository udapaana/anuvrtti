id = "7.1.14"
numericId = "71014"

[en]
simple = """
After pronominal @deva[अ]-stems, dative @deva[ङे] becomes @deva[स्मै]: @deva[तस्मै] 'to that one'.
"""

standard = """
For @[sarvanāman] (pronouns) ending in @deva[अ], the dative singular takes @deva[स्मै] instead of @deva[य]. Examples: @deva[सर्वस्मै] 'to all', @deva[तस्मै] 'to that', @deva[यस्मै] 'to whom', @deva[कस्मै] 'to whom?'. But @deva[भवते] (from @deva[भवत्], not @deva[अ]-final) keeps @deva[ए].
"""

advanced = """
This distinguishes pronominal declension from nominal. The @deva[स्मै] ending is unique to @[sarvanāman] @deva[अ]-stems. When pronominal stems take @deva[अश्]-substitute (by @ref[7.2.102]), they no longer end in @deva[अ] and take regular @deva[ए]. The @deva[स्म्] element appears across pronominal oblique cases.
"""

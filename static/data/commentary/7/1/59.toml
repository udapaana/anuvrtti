id = "7.1.59"
numericId = "71059"

[en]
simple = """
Roots in the @deva[मुच्]-class (@deva[तुदादि]) take @deva[नुम्] before the @deva[श] @[vikaraṇa]. @deva[मुच्] + @deva[श] → @deva[मुञ्चति] 'releases', @deva[सिच्] + @deva[श] → @deva[सिञ्चति] 'sprinkles'.
"""

standard = """
The @deva[मुचादि] roots of the 6th class (@deva[तुदादि]) insert @deva[नुम्] before @deva[श] (class marker): @deva[मुच्] → @deva[मुञ्चति], @deva[लुप्] → @deva[लुम्पति], @deva[विद्] → @deva[विन्दति], @deva[लिप्] → @deva[लिम्पति], @deva[सिच्] → @deva[सिञ्चति], @deva[कृत्] → @deva[कृन्तति]. But not before other affixes: @deva[मोक्ता], @deva[मोक्तुम्].
"""

advanced = """
The @deva[मुचादि] is an @deva[अन्तर्गण] (sub-class) within @deva[तुदादि]. The @deva[नुम्] applies only before @deva[श] (the @deva[तुदादि] @[vikaraṇa]), not before other affixes. The @deva[वार्त्तिक] adds @deva[तृम्फ्] etc. to the list. Non-@deva[मुचादि] @deva[तुदादि] roots lack this: @deva[तुदति], @deva[नुदति]. The nasal creates the characteristic present-tense conjugation pattern.
"""

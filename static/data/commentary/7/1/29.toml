id = "7.1.29"
numericId = "71029"

[en]
simple = """
After @deva[युष्मद्]//@deva[अस्मद्], the accusative plural @deva[शस्] gets @deva[न्] for @deva[स्]: @deva[युष्मान्] 'you all', @deva[अस्मान्] 'us'.
"""

standard = """
The @deva[स्] of accusative plural @deva[शस्] becomes @deva[न्] after @deva[युष्मद्] and @deva[अस्मद्]. Combined with stem changes and vowel lengthening: @deva[युष्मान्] 'you (pl. acc)', @deva[अस्मान्] 'us'.
"""

advanced = """
The change @deva[शस्] → @deva[शन्] (i.e., @deva[स्] → @deva[न्]) gives the characteristic @deva[आन्] ending. The @deva[द्] of the stem deletes by @ref[7.2.90]. The preceding @deva[अ] lengthens to @deva[आ] by @ref[7.2.90]. Result: @deva[युष्म्] + @deva[आन्] = @deva[युष्मान्].
"""

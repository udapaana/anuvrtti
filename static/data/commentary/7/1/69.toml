id = "7.1.69"
numericId = "71069"

[en]
simple = """
Without any @deva[उपसर्ग], @deva[लभ्] optionally takes @deva[नुम्] before @deva[चिण्] (aorist) and @deva[णमुल्]. @deva[अलाभि] or @deva[अलम्भि], @deva[लाभंलाभम्] or @deva[लम्भंलम्भम्].
"""

standard = """
When no preposition precedes, @deva[लभ्] has optional @deva[नुम्] before @deva[चिण्]/@deva[णमुल्]: @deva[अलाभि]/@deva[अलम्भि] (aorist passive), @deva[लाभंलाभम्]/@deva[लम्भंलम्भम्] (intensive). With preposition, @deva[नुम्] is obligatory: @deva[प्रालम्भि], @deva[प्रलम्भम्] (no option).
"""

advanced = """
This is @deva[व्यवस्थित]-@deva[विभाषा]: option only without @deva[उपसर्ग]. The conditioning: @deva[अनुपसर्ग] → @deva[विकल्प] (@deva[अलाभि]/@deva[अलम्भि]); @deva[सोपसर्ग] → @deva[नित्य] @deva[नुम्] (@deva[प्रालम्भि] only). The @deva[णमुल्] forms show the intensive/frequentative: @deva[लाभंलाभम्] 'obtaining repeatedly' vs. @deva[लम्भंलम्भम्].
"""

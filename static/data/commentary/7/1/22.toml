id = "7.1.22"
numericId = "71022"

[en]
simple = """
After numerals called @deva[षट्] (5, 6, 7, 8, 9, 10), the nominative/accusative plural endings are deleted: @deva[पञ्च] 'five'.
"""

standard = """
The @deva[षट्]-class numerals (@deva[पञ्चन्], @deva[षष्], @deva[सप्तन्], @deva[अष्टन्], @deva[नवन्], @deva[दशन्], defined at @ref[1.1.24]) lose their nominative/@deva[द्वितीया] (accusative) plural endings by @[luk] (deletion). Thus @deva[पञ्च] 'five', @deva[षट्] 'six', @deva[सप्त] 'seven'.
"""

advanced = """
@[luk] is complete deletion with loss of affix properties (vs. @[lopa]). These numerals thus appear as bare stems in @deva[प्रथमा] (nominative)/accusative. They're used for all three genders. The @deva[न्] of @deva[पञ्चन्] etc. is deleted by @ref[6.4.134].
"""

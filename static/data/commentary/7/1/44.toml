id = "7.1.44"
numericId = "71044"

[en]
simple = """
In Vedic, @deva[तात्] replaces the 2nd person plural imperative @deva[त]. @deva[खनत] → @deva[खनतात्] 'dig ye!'
"""

standard = """
The Vedic imperative shows @deva[त] → @deva[तात्] in 2nd plural: @deva[कृणुत] → @deva[कृणुतात्], @deva[खनत] → @deva[खनतात्]. Examples from Aitareya @[brāhmaṇa]: @deva[गात्रं] @deva[कृणुतात्], @deva[खनतात्] @deva[ऊवध्ये] @deva[गोहं] @deva[पार्थिवम्].
"""

advanced = """
The @deva[तात्] ending extends the benedictive-style form (cf. @deva[तातङ्] in @ref[7.1.35]) to the 2nd plural imperative. This creates formal/emphatic imperatives in ritual contexts: @deva[संसृजतात्] (= @deva[संसृजत]), @deva[गमयतात्] (= @deva[गमयत]). The parallel with @deva[तातङ्] suggests a productive Vedic pattern for emphatic command/blessing.
"""

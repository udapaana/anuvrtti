id = "7.1.55"
numericId = "71055"

[en]
simple = """
The augment @deva[नुम्] (= @deva[न्]) comes before @deva[आम्] after @deva[षट्]-class numerals and @deva[चतुर्]. @deva[षष्] + @deva[आम्] → @deva[षण्णाम्], @deva[पञ्चानाम्], @deva[चतुर्णाम्].
"""

standard = """
Numerals called @deva[षट्] (5-19, and multiples of 10) plus @deva[चतुर्] take @deva[नुम्] before @deva[आम्]: @deva[षण्णाम्] (with @deva[ष्] + @deva[न्] → @deva[ण्ण्]), @deva[पञ्चानाम्], @deva[सप्तानाम्], @deva[दशानाम्], @deva[चतुर्णाम्]. @deva[चतुर्] is specified separately since @deva[र्]-ending numerals aren't @deva[षट्].
"""

advanced = """
The @deva[षट्]-@deva[संज्ञा] covers @deva[पञ्चन्] through @deva[नवदशन्] and the decades. Since @deva[चतुर्] ends in @deva[र्] (not included in @deva[षट्]), it needs explicit mention. In compounds: @deva[परमषण्णाम्], @deva[परमपञ्चानाम्], @deva[परमचतुर्णाम्] (numeral as head), but @deva[प्रियषषाम्], @deva[प्रियपञ्चाम्], @deva[प्रियचतुराम्] (numeral as subordinate—no @deva[नुम्]).
"""

id = "7.1.19"
numericId = "71019"

[en]
simple = """
After neuter stems too, dual @deva[औ] becomes @deva[ई]: @deva[कुण्डे] 'two pots', @deva[फले] 'two fruits'.
"""

standard = """
Neuter stems also take @deva[ई] for dual nominative/accusative @deva[औ]. Thus @deva[कुण्ड] + @deva[औ] → @deva[कुण्ड] + @deva[ई] → @deva[कुण्डे] 'two pots'. This parallels the feminine pattern but applies to all neuters regardless of final vowel.
"""

advanced = """
The neuter dual in @deva[ई] is universal: @deva[फले] (a-stem), @deva[वारिणी] (i-stem), @deva[मधुनी] (u-stem). The @deva[ई] ending triggers various stem-final changes. This is distinct from the masculine dual in @deva[औ] (@deva[रामौ]).
"""

id = "7.1.75"
numericId = "71075"

[en]
simple = """
For @deva[अस्थि], @deva[दधि], @deva[सक्थि], and @deva[अक्षि], the substitute @deva[अन्] (with @[udātta]) replaces the final before vowel-initial endings from instrumental onward. @deva[अस्थि] → @deva[अस्थ्ना] 'by bone'.
"""

standard = """
Before @deva[अजादि] endings (instrumental onward), these four neuters take @deva[अनङ्] (= @deva[अन्] with @[udātta]): @deva[अस्थि] → @deva[अस्थ्ना], @deva[अस्थ्ने]; @deva[दधि] → @deva[दध्ना], @deva[दध्ने]; @deva[सक्थि] → @deva[सक्थ्ना]; @deva[अक्षि] → @deva[अक्ष्णा]. The stem gets @deva[भ]-@deva[संज्ञा], triggering @deva[इ]-elision.
"""

advanced = """
The @[udātta-marked] @deva[अनङ्] overrides the original accent (@deva[अस्थि] has initial @[udātta]). The @deva[भ]-designation (by being @deva[अनङ्]-ending) triggers the elision of preceding @deva[इ]: @deva[अस्थि] + @deva[अन्] → @deva[अस्थ्न्] (@deva[इ]-lopa). Paradigm: @deva[अस्थि] (nom.), @deva[अस्थ्ना] (inst.), @deva[अस्थ्ने] (dat.), @deva[अस्थ्नः] (gen./abl.), @deva[अस्थ्नि]/@deva[अस्थनि] (loc.).
"""

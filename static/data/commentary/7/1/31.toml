id = "7.1.31"
numericId = "71031"

[en]
simple = """
For @deva[युष्मद्] and @deva[अस्मद्] in ablative plural, @deva[अत्] replaces @deva[भ्यस्]. @deva[युष्मद्] + @deva[भ्यस्] → @deva[युष्मत्] 'from you all', @deva[अस्मद्] + @deva[भ्यस्] → @deva[अस्मत्] 'from us'.
"""

standard = """
This @[sūtra] provides the @deva[पञ्चमी] (ablative) plural ending for the personal pronouns. The ending @deva[भ्यस्] is replaced by @deva[अत्]: @deva[युष्मद्] + @deva[अत्] → @deva[युष्मत्] (with @deva[द्] elided by @ref[7.2.95]), @deva[अस्मद्] + @deva[अत्] → @deva[अस्मत्]. The vowel-final sandhi follows 6.1.97.
"""

advanced = """
The substitution @deva[अत्] for @deva[भ्यस्] in ablative plural creates the distinctive personal pronoun forms. The derivation: @deva[युष्मद्] loses its final @deva[द्] before @deva[भ्यस्] by @ref[7.2.95], then @deva[भ्यस्] → @deva[अत्], and @deva[युष्म] + @deva[अत्] → @deva[युष्मत्] by @ref[6.1.97] (@deva[सम्प्रसारण]-sandhi). Similarly @deva[अस्मद्] → @deva[अस्मत्]. This parallels the genitive plural form in @ref[7.1.33].
"""

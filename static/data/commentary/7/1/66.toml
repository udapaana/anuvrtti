id = "7.1.66"
numericId = "71066"

[en]
simple = """
When preceded by @deva[उप], @deva[लभ्] takes @deva[नुम्] before @deva[य]-affixes if something praiseworthy is meant. @deva[उपलम्भ्या] @deva[विद्या] 'knowledge to be acquired' (praiseworthy).
"""

standard = """
With @deva[उप] and @deva[प्रशंसा] (praise) sense: @deva[लभ्] + @deva[नुम्] + @deva[ण्यत्] → @deva[उपलम्भ्य] (@deva[उपलम्भ्या] @deva[विद्या], @deva[उपलम्भ्यानि] @deva[धनानि]). These have @deva[स्वरित] on the final. Without praise: @deva[उपलभ्यम्] (@deva[यत्]) 'something obtainable from this low person'.
"""

advanced = """
The @deva[प्रशंस्यार्थ] condition distinguishes: @deva[उपलम्भ्या] @deva[विद्या] (praiseworthy knowledge, @deva[ण्यत्] with @deva[नुम्]) vs. @deva[उपलभ्यमस्माद्] @deva[वृषलात्] @deva[किंचित्] (mere obtaining from a @[śūdra], @deva[यत्] without @deva[नुम्]). The semantic distinction determines morphological choice—a rare meaning-conditioned rule.
"""

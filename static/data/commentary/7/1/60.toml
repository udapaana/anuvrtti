id = "7.1.60"
numericId = "71060"

[en]
simple = """
The roots @deva[मस्ज्] and @deva[नश्] take @deva[नुम्] before affixes starting with a non-semivowel, non-nasal consonant. @deva[मस्ज्] → @deva[मङ्क्ता], @deva[नश्] → @deva[नंष्टा].
"""

standard = """
Before affixes beginning with @deva[झल्] (stops and sibilants, excluding semivowels and nasals): @deva[मस्ज्] + @deva[तृच्] → @deva[मङ्क्ता], @deva[मङ्क्तुम्], @deva[मङ्क्तव्यम्]; @deva[नश्] + @deva[तृच्] → @deva[नंष्टा], @deva[नंष्टुम्]. But before @deva[य]/@deva[न]: @deva[मज्जनम्], @deva[नशिता]. And @deva[मग्न] by @ref[6.4.32].
"""

advanced = """
The @deva[झलादि] condition excludes @deva[यण्] (semivowels) and nasals from triggering @deva[नुम्]: hence @deva[मज्जनम्] (before @deva[न]), not *@deva[मञ्जनम्]. Derivation: @deva[मस्ज्] + @deva[तृ] → @deva[मस्न्ज्] + @deva[तृ] → @deva[मस्ङ्ज्] + @deva[तृ] (@deva[न्] → @[anusvāra] → @deva[ङ्]) → @deva[मङ्क्तृ] (@deva[स्]-elision by @ref[8.2.29], @deva[ज्] → @deva[क्]). The participle @deva[मग्न] shows special treatment by @ref[6.4.32].
"""

id = "7.1.42"
numericId = "71042"

[en]
simple = """
In Vedic language, @deva[ध्वात्] replaces the ending @deva[ध्वम्]. @deva[वारयध्वम्] → @deva[वारयध्वात्] 'ward off (ye)!'
"""

standard = """
The Vedic substitution @deva[ध्वम्] → @deva[ध्वात्] appears in forms like @deva[वारयध्वात्] (Aitareya @[brāhmaṇa] II.6.14) for classical @deva[वारयध्वम्]. This adds a final @deva[त्] to the 2nd person plural middle ending.
"""

advanced = """
The @deva[ध्वात्] substitution is confined to specific Vedic contexts, particularly @[brāhmaṇa] prose. The added @deva[त्] may reflect emphasis or formality in ritual injunctions: @deva[अन्तरेव] @deva[ऊष्माणं] @deva[वारयध्वात्] 'ward off the heat from within'. This parallels other Vedic @deva[त्]-extensions like @deva[तात्] (@ref[7.1.35]).
"""

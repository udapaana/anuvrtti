id = "7.1.67"
numericId = "71067"

[en]
simple = """
When preceded by any @deva[उपसर्ग], @deva[लभ्] takes @deva[नुम्] before @deva[खल्] and @deva[घञ्]. @deva[प्रलम्भः] 'deception', @deva[विप्रलम्भः] 'separation'.
"""

standard = """
With any preposition, @deva[लभ्] + @deva[नुम्] before @deva[खल्]/@deva[घञ्]: @deva[ईषत्प्रलम्भः], @deva[सुप्रलम्भः], @deva[दुष्प्रलम्भः] (@deva[खल्]); @deva[प्रलम्भः], @deva[विप्रलम्भः] (@deva[घञ्]). This is a @deva[नियम] restricting @ref[7.1.64]: before @deva[खल्]/@deva[घञ्], @deva[नुम्] requires a preposition.
"""

advanced = """
This restricts the general @deva[अजादि] rule (@ref[7.1.64]) for @deva[खल्]/@deva[घञ्] specifically. Without preposition: @deva[ईषल्लभः] (@deva[खल्], no @deva[नुम्]), @deva[लाभो] @deva[वर्तते] (@deva[घञ्], no @deva[नुम्]). With preposition: @deva[सुप्रलम्भः], @deva[प्रलम्भः]. The @deva[नियम] establishes: @deva[खल्]/@deva[घञ्] get @deva[नुम्] only when @deva[उपसर्गपूर्व].
"""

id = "7.1.25"
numericId = "71025"

[en]
simple = """
After @deva[डतर], @deva[डतम], @deva[अन्य], @deva[अन्यतर], @deva[इतर], the nominative/accusative singular takes @deva[अत्]: @deva[कतरत्] 'which of two?'.
"""

standard = """
Five pronominal neuters — stems formed with @deva[डतर] (comparative), @deva[डतम] (superlative), plus @deva[अन्य] 'other', @deva[अन्यतर] 'one of two', @deva[इतर] 'the other' — take @deva[अत्] (written @deva[अड्]) for nominative/accusative singular. Thus @deva[कतरत्] 'which of two?', @deva[यतरत्], @deva[अन्यत्].
"""

advanced = """
The @deva[ड्] in @deva[अड्] is @[it]; the ending is @deva[अत्]. This replaces both @deva[सु] and @deva[अम्] (by @ref[1.1.55] @deva[अनेकाल्शित्सर्वस्य]). These forms show distinctive pronominal neuter singular. The @deva[त्] surfaces as @deva[द्] before vowels.
"""

id = "7.1.73"
numericId = "71073"

[en]
simple = """
Neuter stems ending in @deva[इ], @deva[उ], @deva[ऋ], or @deva[ऌ] (not @deva[अ]) take @deva[नुम्] before vowel-initial case affixes. @deva[त्रपु] + @deva[इ] → @deva[त्रपुणी] 'two pieces of tin'.
"""

standard = """
Before @deva[अजादि] case-endings, neuter @deva[इक्]-final (not @deva[अ]) stems take @deva[नुम्]: @deva[त्रपुणी], @deva[जतुनी] (dual); @deva[मधुना], @deva[वारिणा] (instrumental). The @deva[न्] + following vowel creates the characteristic -@deva[ण]-/-@deva[न]- pattern.
"""

advanced = """
This complements @ref[7.1.72] (strong cases) for weak cases. The @deva[इको] @deva[ऽचि] condition: @deva[इक्]-ending (@deva[इ]/@deva[उ]/@deva[ऋ]/@deva[ऌ]) neuters before vowel case-affixes. The @[kārikā] addresses: why @deva[न्] before vowel (@deva[अचि]) but not consonant (@deva[व्यञ्जने])? Because the audible vowel (@deva[श्रूयमाण] @deva[स्वर]) survives even with @deva[लोप] elsewhere.
"""

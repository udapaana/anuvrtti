id = "7.1.54"
numericId = "71054"

[en]
simple = """
The augment @deva[नुम्] (= @deva[न्]) is added before @deva[आम्] (genitive plural) after: short-vowel stems, @deva[नदी]-stems, and feminine @deva[आ]-stems. @deva[वृक्ष] + @deva[आम्] → @deva[वृक्षाणाम्].
"""

standard = """
The @deva[नुम्] augment inserts before @deva[आम्] after: (1) short-vowel stems: @deva[वृक्षाणाम्], @deva[अग्नीणाम्], @deva[वायूनाम्], @deva[कर्तॄणाम्]; (2) @deva[नदी]-stems: @deva[कुमारीणाम्], @deva[गौरीणाम्], @deva[लक्ष्मीणाम्]; (3) feminine @deva[आ]-stems: @deva[रमाणाम्], @deva[सेनानाम्].
"""

advanced = """
The three categories receiving @deva[नुम्] are: @deva[ह्रस्व]-ending (short @deva[अ]/@deva[इ]/@deva[उ]/@deva[ऋ]), @deva[नदी]-@deva[संज्ञक] (@ref[1.4.3]-6: feminine @deva[ई]/@deva[ऊ] stems with specific conditions), and @deva[स्त्री]-@deva[प्रत्ययान्त] (feminine @deva[आ]-affixes like @deva[टाप्]/@deva[डाप्]/@deva[चाप्]). This creates the characteristic -@deva[आणाम्]/-@deva[ईणाम्]/-@deva[ऊणाम्] genitive plural pattern.
"""

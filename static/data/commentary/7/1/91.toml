id = "7.1.91"
numericId = "71091"

[en]
simple = """
The 1st person singular perfect ending optionally acts as @deva[णित्] (triggering @[vṛddhi]). @deva[चकार] or @deva[चकर] 'I did', @deva[पपाच] or @deva[पपच] 'I cooked'.
"""

standard = """
In @deva[लिट्] (perfect tense), the @deva[उत्तम]-@deva[एकवचन] (1st singular) ending optionally has @deva[णित्] status, causing optional @[vṛddhi]: @deva[अहं] @deva[चकार]/@deva[चकर], @deva[अहं] @deva[पपाच]/@deva[पपच]. Without @deva[णित्], no @[vṛddhi]; with @deva[णित्], @[vṛddhi] applies.
"""

advanced = """
The @deva[विकल्प] allows both strengthened and unstrengthened forms in 1st singular perfect. The @deva[णित्] treatment triggers @[vṛddhi] of the root vowel: @deva[कृ] → @deva[कार] (@[vṛddhi]), @deva[कर] (@[guṇa] only). This optional @[vṛddhi] distinguishes some 1st @deva[एकवचन] (singular) perfects from 3rd @deva[एकवचन] (singular) (which always has @[vṛddhi] in strong forms).
"""

id = "7.1.99"
numericId = "71099"

[en]
simple = """
In vocative singular, @deva[चतुर्] and @deva[अनडुह्] receive augment @deva[अ] (not @deva[आ]) after @deva[उ]. @deva[हे] @deva[प्रियचत्वः], @deva[हे] @deva[प्रियनड्वन्].
"""

standard = """
In @deva[संबोधन]-@deva[एकवचन], @deva[अ] (not @deva[आ]) is inserted: @deva[चतुर्] → @deva[चत्वर्] (@deva[हे] @deva[प्रियचत्वः] in @[bahuvrīhi]); @deva[अनडुह्] → @deva[अनड्वह्] → @deva[अनड्वन्] (@deva[हे] @deva[प्रियनड्वन्]). This overrides @ref[7.1.98]'s @deva[आ] for vocative.
"""

advanced = """
The vocative-specific @deva[अ]-augment distinguishes: strong cases (@deva[आ]: @deva[अनड्वाहौ]) vs. vocative (@deva[अ]: @deva[अनड्वन्]). For @deva[चतुर्] in @[bahuvrīhi] compounds: @deva[हे] @deva[प्रियचत्वः] (one whose beloved are four). The shorter @deva[अ] creates the distinctive vocative pattern, paralleling other @deva[सम्बोधन] (vocative) shortenings.
"""

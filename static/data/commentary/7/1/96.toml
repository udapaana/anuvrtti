id = "7.1.96"
numericId = "71096"

[en]
simple = """
In feminine, @deva[क्रोष्टु] is treated as @deva[तृच्]-ending before all case endings. @deva[क्रोष्ट्री] 'female jackal' (all cases).
"""

standard = """
For feminine @deva[क्रोष्टु], the @deva[तृच्]-treatment extends to all cases (not just strong): @deva[क्रोष्ट्री] (nom.), @deva[क्रोष्ट्रीभ्याम्] (inst.du.), @deva[क्रोष्ट्रीभिः] (inst.pl.). This goes beyond @ref[7.1.95]'s strong-case limitation.
"""

advanced = """
This extends @deva[तृज्वत्] to all feminine cases: @deva[क्रोष्टु] (fem.) → @deva[क्रोष्ट्री] throughout the paradigm. The feminine affix @deva[ङीप्] applies to the @deva[तृच्]-treated stem: @deva[क्रोष्टृ] + @deva[ङीप्] → @deva[क्रोष्ट्री]. Some read @deva[क्रोष्टु] in @deva[गौरादि], making this treatment inherent rather than requiring separate rules.
"""

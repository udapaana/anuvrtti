id = "7.1.93"
numericId = "71093"

[en]
simple = """
Before nominative singular @deva[सु] (not vocative), @deva[अन्] replaces the @deva[इ] of @deva[सखि]. @deva[सखि] → @deva[सखा] 'friend' (nominative).
"""

standard = """
In @deva[प्रथमा]-@deva[एकवचन] (not @deva[संबोधन]), @deva[सखि] takes @deva[अनङ्] (= @deva[अन्]) replacing @deva[इ]: @deva[सखि] + @deva[सु] → @deva[सखा] + @deva[स्] → @deva[सखा] (with @deva[स्]-elision). But vocative: @deva[हे] @deva[सखे] (no @deva[अनङ्]).
"""

advanced = """
The @deva[अनङ्]-substitute creates the distinctive nominative @deva[सखा]. Derivation: @deva[सखि] → @deva[सख्] + @deva[अन्] + @deva[स्] → @deva[सखान्] + @deva[स्] → @deva[सखा] (@deva[न्]-elision before @deva[स्], @deva[स्]-elision). The vocative singular @deva[हे] @deva[सखे] uses @[guṇa] (@deva[इ] → @deva[ए]) without @deva[अनङ्]. This parallels the @deva[ऋ]-final stems (@ref[7.1.94]).
"""

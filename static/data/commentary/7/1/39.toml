id = "7.1.39"
numericId = "71039"

[en]
simple = """
In Vedic language, various irregular case-endings appear: @deva[स्] for plural, elision of endings, homogeneous vowel lengthening, @deva[आ], @deva[आत्], @deva[शे] (= @deva[ए]), @deva[या], @deva[डा], and others.
"""

standard = """
The Vedas show diverse case-ending substitutions: (1) singular @deva[स्] for plural @deva[अस्], (2) total elision (@deva[लुक्]), (3) vowel lengthening matching the stem, (4) @deva[आ], (5) @deva[आत्], (6) @deva[शे] (= @deva[ए]) for nominative plural, (7) @deva[या], (8) @deva[डा] with stem-final elision. These create archaic declensional forms.
"""

advanced = """
This @[sūtra] catalogs Vedic nominal irregularities. Examples: singular ending for plural (@deva[देवाः] → @deva[देवस्]), complete elision creating bare stems, @[savarna-dīrgha] making stem-final long, @deva[शे] for plural (@deva[अस्मे] = @deva[अस्माकम्]), or @deva[आत्] for ablative. These reflect the pre-classical flexibility of case-marking that was later regularized in @[pāṇinian] Sanskrit.
"""

id = "7.1.46"
numericId = "71046"

[en]
simple = """
In Vedic, the 1st person plural ending @deva[मस्] becomes @deva[मसि]. @deva[दीपयामः] → @deva[दीपयामसि] 'we kindle', @deva[भञ्जयामः] → @deva[भञ्जयामसि] 'we break'.
"""

standard = """
The Vedic @deva[मस्] → @deva[मसि] adds @deva[इ] to the 1st plural ending: @deva[दीपयामसि] (for @deva[दीपयामः]), @deva[भञ्जयामसि] (for @deva[भञ्जयामः]), @deva[वासयामसि] (for @deva[वासयामः]). This creates the characteristic -@deva[मसि] ending of Vedic 1st plurals.
"""

advanced = """
The @deva[इ]-augment on @deva[मस्] creates the archaic Vedic ending -@deva[मसि], distinct from classical -@deva[मः]. Examples: @deva[पुनस्त्वां] @deva[दीपयामसि], @deva[शलभं] @deva[भञ्जयामसि], @deva[त्वयि] @deva[रात्रिं] @deva[वासयामसि]. This may reflect an older Indo-Iranian verbal morphology preserved in the Vedic language.
"""

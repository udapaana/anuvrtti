id = "7.1.11"
numericId = "71011"

[en]
simple = """
The pronouns @deva[इदम्] and @deva[अदस्] don't take @deva[ऐस्] — they keep @deva[भिस्]: @deva[एभिः], @deva[अमीभिः].
"""

standard = """
Exception to @ref[7.1.9]: @deva[इदम्] and @deva[अदस्] retain @deva[भिस्] in the instrumental plural. @deva[इदम्] → @deva[एभिः] 'by these', @deva[अदस्] → @deva[अमीभिः] 'by those'. But if they end in @deva[क] (as @deva[इमक], @deva[अमुक]), then @deva[ऐस्] applies: @deva[इमकैः], @deva[अमुकैः].
"""

advanced = """
The '@deva[अकोः]' exception means 'except when ending in @deva[क]'. The stems @deva[इदम्]//@deva[अदस्] have suppletive instrumental forms. When the @deva[क]-final variants @deva[इमक]//@deva[अमुक] are used (by @ref[7.2.102]), they behave as regular @deva[अ]-stems taking @deva[ऐस्].
"""

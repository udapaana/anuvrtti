id = "7.1.2"
numericId = "71002"

[en]
simple = """
The initial consonants @deva[फ्], @deva[ढ्], @deva[ख्], @deva[छ्], @deva[घ्] in affixes are replaced by @deva[आयन्], @deva[एय], @deva[ईन], @deva[ईय], @deva[इय] respectively.
"""

standard = """
When these consonants begin an affix: @deva[फ्] → @deva[आयन्], @deva[ढ्] → @deva[एय], @deva[ख्] → @deva[ईन], @deva[छ्] → @deva[ईय], @deva[घ्] → @deva[इय]. Example: @deva[नड] + @deva[फक्] → @deva[नाडायनः] 'descendant of @[naḍa]'. The @deva[फ्] of @deva[फक्] becomes @deva[आयन्].
"""

advanced = """
This rule handles patronymic and similar affixes. The five substitutions create common derivative endings: @deva[फक्] → @deva[आयन] (patronymics like @deva[दाक्षायणः]), @deva[ढक्] → @deva[एय] (@deva[कौन्तेयः]), @deva[खञ्] → @deva[ईन] (@deva[कुलीनः]), @deva[छ] → @deva[ईय] (@deva[पाण्डवीयः]), @deva[घ] → @deva[इय]. These markers encode the actual pronounced forms of @[taddhita] affixes.
"""

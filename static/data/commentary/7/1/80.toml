id = "7.1.80"
numericId = "71080"

[en]
simple = """
After verbal stems ending in @deva[अ]/@deva[आ], @deva[शतृ] optionally takes @deva[नुम्] before neuter @deva[शी] and feminine @deva[ई]. @deva[तुदती] or @deva[तुदन्ती] 'striking' (f.), @deva[याती] or @deva[यान्ती] 'going' (f.).
"""

standard = """
When @deva[शतृ] follows an @deva[अकारान्त]/@deva[आकारान्त] verbal stem, @deva[नुम्] is optional before @deva[शी] (neuter) and @deva[ङीप्] (feminine): @deva[तुदती]/@deva[तुदन्ती] @deva[कुले] (neut.), @deva[तुदती]/@deva[तुदन्ती] @deva[ब्राह्मणी] (fem.); @deva[याती]/@deva[यान्ती], @deva[करिष्यती]/@deva[करिष्यन्ती].
"""

advanced = """
The @deva[अकारान्त]/@deva[आकारान्त] condition covers: @deva[तुद्]-class (@deva[तुदत्], stem in @deva[अ] via @deva[शप्]), @deva[या]-class (@deva[यात्], stem in @deva[आ]), and futures (@deva[करिष्यत्], stem in @deva[अ] via @deva[स्य]). Before @deva[शी] (neuter strong case ending) and @deva[ङीप्] (feminine affix), both forms are valid: @deva[तुदती] (no @deva[नुम्]) and @deva[तुदन्ती] (with @deva[नुम्]).
"""

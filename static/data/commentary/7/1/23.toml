id = "7.1.23"
numericId = "71023"

[en]
simple = """
After neuter stems, the singular nominative @deva[सु] and accusative @deva[अम्] are deleted: @deva[दधि] 'yogurt', @deva[मधु] 'honey'.
"""

standard = """
Neuter singular nominative (@deva[सु]) and accusative (@deva[अम्]) endings are deleted after neuter stems. Thus @deva[दधि] + @deva[सु]//@deva[अम्] → @deva[दधि] 'yogurt', @deva[मधु] → @deva[मधु] 'honey'. The bare stem serves as nominative and @deva[द्वितीया] (accusative).
"""

advanced = """
This @[luk] deletion applies to non-@deva[अ] neuters: @deva[इ]-stems (@deva[वारि]), @deva[उ]-stems (@deva[मधु]), consonant stems (@deva[जगत्]). For @deva[अ]-neuters, rule @ref[7.1.24] applies instead. The identical @deva[प्रथमा] (nominative)/accusative singular is characteristic of neuters.
"""

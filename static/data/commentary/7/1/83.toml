id = "7.1.83"
numericId = "71083"

[en]
simple = """
In Vedic, @deva[दृश्], @deva[स्वस्], and @deva[स्वतवस्] take @deva[नुम्] before nominative singular @deva[सु]. @deva[ईदृश्] → @deva[ईदृङ्] 'such', @deva[स्वस्] → @deva[स्ववान्] 'wealthy'.
"""

standard = """
Vedic nominative singulars: @deva[दृश्] + @deva[नुम्] + @deva[सु] → @deva[ईदृङ्], @deva[तादृङ्], @deva[यादृङ्], @deva[सदृङ्] (with @deva[श्]-elision by @ref[8.2.23], @deva[न्] → @deva[ङ्] by @ref[8.2.62]); @deva[स्वस्] + @deva[नुम्] + @deva[सु] → @deva[स्ववान्] (with lengthening by @ref[6.4.14]); @deva[स्वतवस्] → @deva[स्वतवान्].
"""

advanced = """
For @deva[दृश्]-stems (@deva[ईदृश्] etc. by @ref[3.2.60]): the @deva[श्]-final gets elided (@ref[8.2.23]), and @deva[न्] becomes @deva[ङ्] before @deva[क्] (@ref[8.2.62]): @deva[ईदृश्] + @deva[न्] + @deva[स्] → @deva[ईदृङ्क्स्] → @deva[ईदृङ्] (@deva[क्]-elision). For @deva[स्वस्]/@deva[स्वतवस्]: @deva[नुम्] + @deva[व] lengthening (@ref[6.4.14]) gives @deva[स्ववान्], @deva[स्वतवान्]. These are specifically Vedic forms.
"""

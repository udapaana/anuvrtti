id = "7.1.24"
numericId = "71024"

[en]
simple = """
After neuter @deva[अ]-stems, both @deva[सु] and @deva[अम्] become @deva[अम्]: @deva[कुण्डम्] 'pot', @deva[वनम्] 'forest'.
"""

standard = """
For neuter stems ending in @deva[अ], the nominative singular @deva[सु] and accusative @deva[अम्] are both replaced by @deva[अम्]. Thus @deva[कुण्ड] + @deva[सु]//@deva[अम्] → @deva[कुण्डम्], @deva[वन] → @deva[वनम्]. This gives the characteristic @deva[अम्] ending.
"""

advanced = """
This contrasts with masculine @deva[अ]-stems where @deva[सु] → @deva[स्] (nominative @deva[रामस्] → @deva[रामः]) and @deva[अम्] → @deva[अम्] (accusative @deva[रामम्]). The neuter uses @deva[अम्] for both cases, merging nominative and accusative as in other neuters.
"""

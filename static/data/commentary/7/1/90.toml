id = "7.1.90"
numericId = "71090"

[en]
simple = """
After @deva[गो] 'cow', strong case endings are treated as @deva[णित्] (causing @[vṛddhi]). @deva[गो] + @deva[औ] → @deva[गावौ] (dual), @deva[गो] + @deva[अस्] → @deva[गावः] (plural).
"""

standard = """
The @deva[सर्वनामस्थान] affixes after @deva[गो] are @deva[णित्] (as if marked with @deva[ण्]), triggering @[vṛddhi]: @deva[गो] → @deva[गौ] → @deva[गौः] (nom.sg.); @deva[गो] + @deva[औ] → @deva[गावौ] (du.); @deva[गो] + @deva[अस्] → @deva[गावः] (pl.). The @deva[त्] in @deva[गोत्] restricts this to the @deva[गो] form, not @deva[गु] (as in @deva[चित्रगुः]).
"""

advanced = """
The @deva[णित्] treatment gives @[vṛddhi]: @deva[ओ] → @deva[औ] in @deva[गौः]. For dual/plural, the @deva[औ]-diphthong + vowel → @deva[आव्] by sandhi: @deva[गो] + @deva[औ] → @deva[गौ] + @deva[औ] → @deva[गाव्] + @deva[औ] → @deva[गावौ]. In compounds like @deva[चित्रगु], the form is @deva[गु] (not @deva[गो]), so this rule doesn't apply: @deva[चित्रगुः]. But vocative compounds revert: @deva[हे] @deva[चित्रगो], @deva[हे] @deva[शबलगवः] (by @deva[अङ्गवृत्ते] @deva[पुनर्वृत्ताव्] @deva[अविधिर्] @deva[निष्ठितस्य]).
"""

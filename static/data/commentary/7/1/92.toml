id = "7.1.92"
numericId = "71092"

[en]
simple = """
After @deva[सखि] 'friend', strong case endings (except vocative singular) are @deva[णित्]. @deva[सखि] + @deva[औ] → @deva[सखायौ] 'two friends', but @deva[हे] @deva[सखे] 'O friend!'
"""

standard = """
For @deva[सखि], @deva[सर्वनामस्थान] endings (excluding @deva[संबोधन]-@deva[एकवचन]) are @deva[णित्], triggering @[vṛddhi]: @deva[इ] → @deva[ऐ] → @deva[आय्]. Forms: @deva[सखायौ] (du.), @deva[सखायः] (pl.). But vocative singular: @deva[हे] @deva[सखे] (no @[vṛddhi]).
"""

advanced = """
The @deva[णित्] treatment gives @[vṛddhi]: @deva[सखि] → @deva[सखाय्] (@deva[इ] → @deva[ऐ] = @deva[आय्] by @[ayādeśa]). Strong cases: @deva[सखायौ], @deva[सखायः], @deva[सखायम्]. The vocative singular exception preserves @deva[हे] @deva[सखे] (@[guṇa] only: @deva[इ] → @deva[ए]). The nominative singular uses @deva[अनङ्] (@ref[7.1.93]), not this @[vṛddhi] rule.
"""

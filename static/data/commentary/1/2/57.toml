id = "1.2.57"
numericId = "12057"

[en]
simple = """
Similarly, rules formally defining tense (@deva[काल]) and subordination (@deva[उपसर्जन]) need not be taught — people understand these concepts from everyday usage.

Ordinary speakers use past, present, and future tenses correctly without knowing grammatical definitions of what counts as "today's time" versus "past time." And people naturally understand the concept of being "secondary" or "subordinate" without a formal definition.
"""

standard = """
Rules defining @deva[काल] (tense) and @deva[उपसर्जन] (subordination) are unnecessary — they follow from common understanding.

**@deva[काल] (tense):** Some @deva[आचार्य]s defined @deva[अद्यतन] (today's time) as "from waking to sleeping" or "midnight to midnight." But ordinary speakers use tenses correctly without such formal boundaries.

**@deva[उपसर्जन] (subordination):** People naturally say @deva[वयमत्र गृहे उपसर्जनम्] "we are secondary in this household" — the concept needs no grammatical definition.

**Other rules left unstated:**
- @deva[बहुव्रीहि] denotes possession ("one who has X")
- @deva[द्वन्द्व] includes the meaning of both members
- @deva[अव्ययीभाव] is governed by its first member

All of these are understood from usage, not from explicit rules.
"""

advanced = """
@deva[कालोपसर्जनं चैव न सिध्यति प्रयोजनम्] — @deva[काल] and @deva[उपसर्जन] definitions are similarly unnecessary.

**Continuing from @ref[1.2.56]:** The theme is that many things grammar might try to define are better left to convention. Tense boundaries and the concept of "subordinate" are understood pre-grammatically.

**@deva[अद्यतन काल] definitions rejected:**
- "From lawful waking to lawful sleeping" (@deva[विहितोत्थानाद्विहितशयनात्])
- "Midnight to midnight"
Both are attempts to formally define what speakers already know intuitively.

**@deva[उपसर्जन]:** @ref[1.2.43]–@ref[1.2.44] gave formal definitions of @deva[उपसर्जन] in compound rules. This rule suggests those are pedagogically useful but not strictly necessary — the concept is pre-theoretical.

**Semantic rules @deva[पाणिनि] does not teach:**
- @deva[बहुव्रीहि] denotes the possessor: @deva[बहुव्रीहिर्यस्य] → "one who has much rice"
- @deva[द्वन्द्व] denotes both members: @deva[रामकृष्णौ] → "Rama and Krishna"
- @deva[अव्ययीभाव] is governed by @deva[पूर्वपद]: @deva[उपनदि] → "near the river"

These are "understood" (@deva[सिद्ध]) from usage and need no rule.
"""

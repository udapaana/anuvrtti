id = "1.2.53"
numericId = "12053"

[en]
simple = """
The gender and number rules of @ref[1.2.51]–@ref[1.2.52] need not actually be formally taught — they follow from convention (@deva[संज्ञा]), not from grammatical derivation. Words have fixed genders and numbers simply because that is how people use them.

**Examples of conventional gender/number:**
- @deva[दाराः] "wife" — masculine plural in form, though referring to a single female
- @deva[आपः] "water" — always feminine plural
- @deva[गृहाः] "house" — always plural
- @deva[वर्षाः] "rains" — always plural

These forms are not derived by any grammatical rule — they are established by usage. Similarly, country names like @deva[पञ्चालाः] and @deva[कुरवः] are conventional proper nouns.
"""

standard = """
The gender/number agreement described in @ref[1.2.51]–@ref[1.2.52] is conventional (@deva[संज्ञा]), not strictly grammatical derivation. This @deva[सूत्र] qualifies the previous two rules.

**Implication:** Words like @deva[पञ्चालाः] (country name, m. pl.) and @deva[कुरवः] are simply proper nouns whose form is fixed by usage — they do not need to be analyzed as @deva[लुप्]-derivatives.

**Conventional forms (no grammatical derivation):**
- @deva[दाराः] "wife" — masculine plural, female referent
- @deva[आपः] "water" — feminine plural always
- @deva[गृहाः] "house," @deva[वर्षाः] "rains," @deva[सिकताः] "sand" — always plural

**Significance:** This is a philosophical observation within the grammar — usage (@deva[लोकव्यवहार]) is the ultimate authority for gender and number, not derivational analysis.
"""

advanced = """
@deva[संज्ञैव न चेद्विद्यमाने] — these rules need not be taught; they are convention (@deva[संज्ञा]).

**Meta-grammatical observation:** This rule (along with @ref[1.2.54]–@ref[1.2.55]) represents a philosophical strand within the @deva[अष्टाध्यायी] — a self-aware note that certain rules exist for theoretical completeness rather than practical necessity.

**The argument:** Gender and number for words like @deva[दाराः], @deva[आपः], @deva[पञ्चालाः] are determined by convention, not by the @deva[लुप्]-elision mechanism of @ref[1.2.51]. Speakers know these forms from usage — no grammatical rule "generates" them.

**@deva[संज्ञा] vs. @deva[योग]:** The distinction between conventional meaning (@deva[रूढि]/@deva[संज्ञा]) and etymological/derivational meaning (@deva[योग]) is central to Indian linguistic philosophy. This rule favors convention.

**Scope:** Rules @ref[1.2.53]–@ref[1.2.55] form a connected argument that builds progressively: convention suffices (@ref[1.2.53]) → derivation is unnecessarily complex (@ref[1.2.54]) → etymology would predict wrong results (@ref[1.2.55]).
"""

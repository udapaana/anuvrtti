id = "1.2.16"
numericId = "12016"

[en]
simple = """
After the root @deva[यम्] "to restrain" — when it means "to espouse" or "to accept in marriage" — the aorist affix @deva[सिच्] in @deva[आत्मनेपद] (middle voice) is optionally treated as @deva[कित्]. When @deva[कित्], the nasal @deva[म्] drops; when not, it stays. Both forms are correct.

**Both valid:**
- @deva[उपायत कन्याम्] "he espoused the girl" (nasal dropped)
- @deva[उपायंस्त कन्याम्] "he espoused the girl" (nasal retained)

Compare with @ref[1.2.15]: "divulging" sense → obligatory @deva[कित्]. "Espousing" sense → optional @deva[कित्].
"""

standard = """
@deva[सिच्] in @deva[आत्मनेपद] is optionally @deva[कित्] after @deva[यम्] in the sense of @deva[उपयमन] (espousing/accepting in marriage). This is a @deva[विभाषा] rule.

**Both forms valid:** @deva[उपायत कन्याम्] or @deva[उपायंस्त कन्याम्] "he espoused the girl."

**Why @deva[आत्मनेपद]?** @deva[यम्] with @deva[उप] takes @deva[आत्मनेपद] in the marriage sense by @ref[1.3.56].

**Comparison with @ref[1.2.15]:**
- @deva[गन्धन] (divulging): obligatory @deva[कित्] → only @deva[उदायत]
- @deva[उपयमन] (espousing): optional @deva[कित्] → @deva[उपायत] or @deva[उपायंस्त]

Both are meaning-restricted rules for the same root @deva[यम्], but with different degrees of obligation.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कित्] from @ref[1.2.5]; @deva[सिच्] from @ref[1.2.14]; @deva[आत्मनेपदेषु] from @ref[1.2.11]; @deva[यम्] from @ref[1.2.15].

@deva[उपयमने विभाषा] — @deva[सिच्] @deva[आत्मनेपद] is optionally @deva[कित्] after @deva[यम्] in the @deva[उपयमन] sense.

**The two @deva[यम्] rules compared:**
| Rule | Meaning | @deva[कित्] status |
|------|---------|-------------------|
| @ref[1.2.15] | @deva[गन्धन] (divulging) | Obligatory |
| @ref[1.2.16] (this) | @deva[उपयमन] (espousing) | Optional |

**Why the difference?** The @deva[गन्धन] sense always appears with nasal deletion in attested usage. The @deva[उपयमन] sense shows variation — both forms are found.

**@deva[उपयमन]:** "Accepting in marriage" — specifically the act of taking a bride. @deva[यम्] with @deva[उप] + @deva[आत्मनेपद] by @ref[1.3.56].

**Forms:** @deva[उपायत कन्याम्] (3sg, nasal dropped) ~ @deva[उपायंस्त कन्याम्] (nasal retained). Also: @deva[उपायत भार्याम्] ~ @deva[उपायंस्त भार्याम्].
"""

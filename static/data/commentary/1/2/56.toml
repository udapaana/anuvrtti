id = "1.2.56"
numericId = "12056"

[en]
simple = """
The principle that a compound's meaning comes from its principal member (@deva[प्रधान]), or that a derivative's meaning comes from its affix (@deva[प्रत्यय]), need not be formally taught — meaning is established by everyday usage.

A person who knows no grammar still understands that @deva[राजपुरुषः] means "king's man" — not "king" and not just "any man." This understanding comes from how people actually use the word, not from analyzing which member is "principal."

The same applies to words formed with affixes: @deva[औपगवः] is understood as "son of a cowherd" without knowing which affix carries which meaning.
"""

standard = """
Rules deriving meaning from the @deva[प्रधान] (principal member of a compound) or from the @deva[प्रत्यय] (affix) need not be taught — meaning is established by convention.

**The rejected view:** Some early grammarians held that:
- Compound meaning = the principal member's meaning
- Derivative meaning = the affix's meaning

**@deva[पाणिनि]'s position:** A person with no grammar training understands @deva[राजपुरुषम् आनय] "bring the king's man" — they bring a specific type of person, not a king or any random person. Meaning comes from usage (@deva[संकेत]), not from grammatical decomposition.

**Similarly for derivatives:** @deva[औपगवम् आनय] "bring the cowherd's son" — understood without knowing the @deva[तद्धित] affix @deva[अण्] or its theoretical meaning.
"""

advanced = """
@deva[प्रधानप्रत्ययार्थयोरर्थे न स्वरूपस्य] — rules making meaning depend on @deva[प्रधान] or @deva[प्रत्यय] need not be taught.

**Continuing the convention-over-derivation theme:** This extends the argument of @ref[1.2.53]–@ref[1.2.55] (where @deva[लुप्]-derivation was deemed unnecessary for place names) to the general question of compound and derivative semantics.

**Two rejected doctrines:**
1. @deva[प्रधानार्थ]: "The compound denotes the meaning of its principal member" — e.g., @deva[राजपुरुषः] means what @deva[पुरुषः] (the principal) means
2. @deva[प्रत्ययार्थ]: "The derivative denotes what the affix means" — e.g., @deva[औपगवः] means what @deva[अण्] (patronymic affix) denotes

**@deva[पाणिनि]'s refutation:** Meaning is a matter of @deva[प्रमाणान्तर] (other means of knowledge — namely, convention and usage), not a matter for grammar to legislate. Grammar generates forms; convention assigns them meanings.

**This cluster** (@ref[1.2.56]–@ref[1.2.57]) extends the earlier @deva[रूढि]-over-@deva[योग] argument to compound semantics and tense definitions. After this, the topic shifts to number (@deva[वचन]) rules at @ref[1.2.58].
"""

id = "1.2.33"
numericId = "12033"

[en]
simple = """
When calling someone from a distance, the entire utterance is spoken in a flat, uniform pitch called @deva[एकश्रुति] (monotone). The normal three accents — @deva[उदात्त] (high), @deva[अनुदात्त] (low), @deva[स्वरित] (circumflex) — all disappear. The voice maintains one level throughout.

**From a distance (monotone):** @deva[आगच्छ भो माणवक देवदत्ता३] "Come, O boy Devadatta!" — flat pitch, with the final vowel prolonged (@deva[प्लुत])

**Close by (normal accents):** @deva[आगच्छ भो माणवक देवदत्त] — regular accent pattern preserved

The word @deva[संबुद्धि] here means "calling from afar" — not the grammatical term for the vocative singular case.
"""

standard = """
In @deva[संबुद्धि] (addressing from a distance), the tone becomes @deva[एकश्रुति] (monotone) — a uniform pitch devoid of all three accent types.

**@deva[एकश्रुति] defined:** A recitative tone with no accent distinctions. It is sometimes described as a fourth tonal category, though technically it is the absence of the three accents.

**@deva[संबुद्धि] here:** Not the technical grammatical term (vocative singular ending), but the pragmatic act of calling someone from afar.

**Examples:**
- From distance: @deva[आगच्छ भो माणवक देवदत्ता३] "Come, O boy Devadatta!" — monotone + @deva[प्लुत] on final vowel (by @ref[8.2.84])
- Not from distance: @deva[आगच्छ भो माणवक देवदत्त] — normal accents retained

**Connection to @deva[प्लुत]:** When calling from a distance, the final vowel of the name becomes @deva[प्लुत] (three @deva[मात्रा]s) by @ref[8.2.84] (@deva[दूराद्धूते च]). @deva[एकश्रुति] and @deva[प्लुत] often co-occur in this context.
"""

advanced = """
@deva[एकश्रुतिः दूरात् संबुद्धौ] — when addressing from a distance, the tone is @deva[एकश्रुति].

**@deva[एकश्रुति] as a tonal category:** Some grammarians treat @deva[एकश्रुति] as a fourth accent alongside @deva[उदात्त], @deva[अनुदात्त], and @deva[स्वरित]. Others view it as the absence of accent — a neutral baseline. @deva[पाणिनि] does not explicitly define it as a @deva[संज्ञा] in the way @ref[1.2.29]–@ref[1.2.31] define the other three.

**@deva[संबुद्धि] disambiguation:** The @deva[काशिका] clarifies that @deva[संबुद्धि] here means @deva[संबोधनम्] (the act of calling) — not the @deva[संबुद्धि] @deva[विभक्ति] (vocative singular ending by @ref[2.3.49]). The trigger is pragmatic distance, not grammatical case.

**@deva[प्लुत] co-occurrence:** By @ref[8.2.84] (@deva[दूराद्धूते च]), the final vowel becomes @deva[प्लुत] when calling from afar. So distant calling produces two effects: (1) @deva[एकश्रुति] on the whole utterance, (2) @deva[प्लुत] on the final vowel of the name.

**This rule begins a short section** (@ref[1.2.33]–@ref[1.2.35]) on @deva[एकश्रुति] — where monotone overrides the accent system. @ref[1.2.34] extends it to sacrificial recitation; @ref[1.2.35] creates an exception for @deva[वषट्].
"""

id = "1.2.29"
numericId = "12029"

[en]
simple = """
A vowel pronounced with a raised pitch is called @deva[उदात्त] (acute accent). This is the "high" tone — the voice rises when producing it.

**Example:** In the word @deva[अग्निः] "fire," the vowel @deva[इ] carries the @deva[उदात्त] accent.

Sanskrit has a pitch-accent system (not a stress-accent system like English). The @deva[उदात्त] syllable is the one where the voice rises. This tonal distinction is preserved in Vedic recitation, where correct accent is essential for ritual.
"""

standard = """
A vowel perceived as high-pitched is @deva[उदात्त] (acute). This is a @deva[संज्ञा] (definitional) rule — one of three accent designations (@deva[उदात्त], @deva[अनुदात्त], @deva[स्वरित]).

**Phonetic description:** The voice is raised, produced from the upper portion of the place of articulation, with contraction of the vocal apparatus.

**In notation:** @deva[उदात्त] is typically unmarked in Vedic texts (or marked with a vertical line above).

**Examples:**
- @deva[अग्निः] — @deva[इ] is @deva[उदात्त]
- @deva[कर्तव्यम्] (from @deva[कृ] + @deva[तव्यम्]) — the first vowel of the affix receives @deva[उदात्त] by @ref[3.1.3]

**Grammatical significance:** Many rules in the @deva[अष्टाध्यायी] assign or track @deva[उदात्त] accent. By @ref[3.1.3], the first vowel of an affix is @deva[उदात्त]. By @ref[6.1.159], roots are marked with accent position in the @deva[धातुपाठ].
"""

advanced = """
@deva[उच्चैरुदात्तः] — a vowel pronounced high is @deva[उदात्त].

**@deva[संज्ञा] rule:** This defines @deva[उदात्त] as one of three accent types. The other two follow: @deva[अनुदात्त] (@ref[1.2.30]) and @deva[स्वरित] (@ref[1.2.31]).

**Phonetic tradition:** The @deva[प्रातिशाख्य]s describe @deva[उदात्त] as produced with raised larynx and tension. The @deva[शिक्षा] texts specify it arises from the upper portion (@deva[उच्च]) of the place of articulation.

**Accent in the grammar:** The @deva[अष्टाध्यायी] tracks accent throughout its derivational system:
- @ref[3.1.3]: the first vowel of a @deva[प्रत्यय] is @deva[उदात्त]
- @ref[6.1.159]–@ref[6.1.163]: root accent assignments
- @ref[6.1.185]–@ref[6.1.223]: accent in compounds
- @ref[8.1.18]–@ref[8.1.71]: accent in sentences (@deva[पदमन्त्राधिकार])

**@deva[उदात्त] vs. indicatory accent:** The indicatory @deva[उदात्त] on affixes (e.g., @deva[ण] in @deva[तव्यण्]) serves a different function — it marks the affix as having certain properties (like @deva[वृद्धि]-triggering by @ref[7.2.115]). This is distinct from the phonological @deva[उदात्त] defined here.

**Modern relevance:** While accent distinctions are largely lost in spoken Classical Sanskrit, they remain active in Vedic recitation traditions and are essential for understanding the @deva[अष्टाध्यायी]'s accent rules.
"""

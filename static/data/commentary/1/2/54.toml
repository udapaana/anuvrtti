id = "1.2.54"
numericId = "12054"

[en]
simple = """
The rules about @deva[लुप्]-elision (from @ref[4.2.81]–@ref[4.2.82]) need not be formally taught, because the etymological meanings they assume are not current in actual usage.

**Example:** The city name @deva[वरणाः] could be derived as: "@deva[वरण] trees grow nearby" + affix meaning "vicinity" → @deva[लुप्]-elided → @deva[वरणाः]. But the city may have no @deva[वरण] trees at all. The derivation is artificial.

It is simpler to treat @deva[वरणाः], @deva[पञ्चालाः], and similar words as conventional proper nouns whose meaning is established by usage, not etymology.
"""

standard = """
The @deva[लुप्]-elision rules need not be taught — the etymological connection between the base word and the derived place name is not current in usage.

**The problem:** Deriving @deva[वरणाः] (city name) from @deva[वरण] (a type of tree) via @ref[4.2.69]–@ref[4.2.70] (vicinity rules) and @ref[4.2.81]–@ref[4.2.82] (@deva[लुप्]-elision) produces an etymological analysis: "the place where @deva[वरण] trees grow." But the city may lack such trees entirely.

**The solution:** Treat such words as @deva[रूढि] (conventional names) — their meaning comes from established usage, not from the meaning of their component parts.

**Affected rules:** @ref[4.2.69] (@deva[तस्य निवासः]) and @ref[4.2.70] (@deva[अदूरभवञ्च]) become unnecessary for explaining these place names.
"""

advanced = """
@deva[लुपि चार्थवच्चेत्] — the @deva[लुप्] rules need not be taught when the etymological meaning is not current.

**Continuing the argument from @ref[1.2.53]:** Convention was sufficient for gender/number. Now the argument extends: the entire @deva[लुप्]-derivation mechanism is unnecessary for place names. The etymological analysis (@deva[योग]) assumes a connection (trees → place) that may not exist in reality.

**The derivational chain being rejected:**
1. @deva[वरण] (trees) + @deva[अण्] (@ref[4.2.69], "place where X lives/grows") → @deva[वारणः]
2. @deva[लुप्] by @ref[4.2.81] → @deva[वरणाः] (retaining gender/number of base)

This multi-step analysis is declared unnecessary — @deva[वरणाः] is simply a name.

**@deva[रूढि] vs. @deva[योग]:** This rule explicitly favors @deva[रूढि] (convention) over @deva[योग] (etymology) for proper nouns. The principle @deva[रूढिर्योगमपहरति] ("convention overrides etymology") is implicit here.

**The next rule** (@ref[1.2.55]) will give the final argument: if etymology controlled meaning, words should disappear when their etymological basis vanishes — but they do not.
"""

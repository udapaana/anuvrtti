id = "1.2.34"
numericId = "12034"

[en]
simple = """
During sacrificial rites (@deva[यज्ञकर्म]), Vedic @deva[मन्त्र]s (sacred formulae) are recited in @deva[एकश्रुति] (monotone) — the same flat pitch used when calling from a distance (@ref[1.2.33]). The normal three accents disappear.

**Three exceptions keep their accents:**
1. **@deva[जप]** — whispered or low-voice repetition of @deva[मन्त्र]s
2. **@deva[न्यूङ्ख]** — the sixteen varieties of @deva[ओम्] used in ritual
3. **@deva[साम]** — melodic chanting of @deva[सामवेद] hymns

Outside of sacrifice — in ordinary study or recitation — @deva[मन्त्र]s retain their proper three-fold accents.
"""

standard = """
In @deva[यज्ञकर्म] (sacrificial rites), @deva[मन्त्र] recitation is @deva[एकश्रुति] (monotone), extending the rule of @ref[1.2.33]. Three contexts are excepted and retain accents:

1. **@deva[जप]:** Whispered repetition — accents preserved at low volume
2. **@deva[न्यूङ्ख]:** The sixteen varieties of @deva[ओम्] — some @deva[उदात्त], some @deva[अनुदात्त], each with specific accent
3. **@deva[साम]:** Melodic chanting from the @deva[सामवेद] — musical tones override monotone

**Example with accents preserved (@deva[जप]):** @deva[समाग्ने वर्चो विहवेष्वस्तु] — whispered with proper accent pattern

**Ordinary reading:** Outside sacrifice, @deva[मन्त्र]s must have their proper accents. @deva[एकश्रुति] is specific to the ritual performance context.
"""

advanced = """
@deva[यज्ञकर्मण्यजपन्यूङ्खसामसु] — in @deva[यज्ञकर्म], @deva[एकश्रुति] applies to @deva[मन्त्र] recitation except in @deva[जप], @deva[न्यूङ्ख], and @deva[साम].

**Extending @ref[1.2.33]:** That rule established @deva[एकश्रुति] for calling from a distance. This rule extends the same monotone to a different context — sacrificial recitation. The @deva[अनुवृत्ति] of @deva[एकश्रुति] carries from @ref[1.2.33].

**The three exceptions analyzed:**
1. **@deva[जप]:** In whispered @deva[मन्त्र] repetition, the performer must maintain accent distinctions. @deva[जप] is typically inaudible to others — the accent serves the performer's own ritual precision.
2. **@deva[न्यूङ्ख]:** Sixteen specific intonations of @deva[ओम्] (@deva[प्रणव]) used at ritual junctures. Each has its own designated accent pattern.
3. **@deva[साम]:** @deva[सामवेद] chanting uses a musical scale (seven notes: @deva[क्रुष्ट], @deva[प्रथम], @deva[द्वितीय], @deva[तृतीय], @deva[मन्द्र], @deva[मध्यम], @deva[अतिस्वार्य]) that overrides the three-accent system entirely.

**Ritual vs. study:** The distinction between @deva[यज्ञकर्म] (ritual performance) and @deva[अध्ययन] (study/recitation) is fundamental. During study, all @deva[मन्त्र]s retain their @deva[उदात्त]/@deva[अनुदात्त]/@deva[स्वरित] pattern. Only during actual sacrifice does @deva[एकश्रुति] apply.

**Scope within the @deva[अष्टाध्यायी]:** This rule primarily governs Vedic usage. The accent rules of @ref[8.1.18]–@ref[8.1.71] handle accent in ordinary (non-sacrificial) connected speech.
"""

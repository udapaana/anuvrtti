id = "1.2.60"
numericId = "12060"

[en]
simple = """
The two asterisms (star groups) @deva[फाल्गुनी] and @deva[प्रोष्ठपदा] — each consisting of a pair of stars — normally take the dual. But the plural can optionally be used with the same meaning.

**Both valid:**
- @deva[उदिते पूर्वे फल्गुन्यौ] (dual) "the former @deva[फाल्गुनी]s have risen"
- @deva[उदिताः पूर्वाः फल्गुन्यः] (plural) — same meaning

Similarly for @deva[प्रोष्ठपदा]: @deva[पूर्वे प्रोष्ठपदे] (dual) or @deva[पूर्वाः प्रोष्ठपदाः] (plural).

**Only as star names:** When @deva[फल्गुनी] is used as a personal name (e.g., two girls named @deva[फल्गुनी]), only the normal dual applies: @deva[फल्गुन्यौ माणविके].
"""

standard = """
The dual of the asterisms @deva[फाल्गुनी] and @deva[प्रोष्ठपदा] optionally takes plural. This is a @deva[विभाषा] rule for number, extending @ref[1.2.58].

**Examples (both valid):**
- @deva[उदिते पूर्वे फल्गुन्यौ] (dual) or @deva[उदिताः पूर्वाः फल्गुन्यः] (plural)
- @deva[पूर्वे प्रोष्ठपदे] (dual) or @deva[पूर्वाः प्रोष्ठपदाः] (plural)

**Restriction — asterism names only:** When these words are used as personal names (not star names), only the logical number applies: @deva[फल्गुन्यौ माणविके] "two girls named @deva[फल्गुनी]" — dual only.

**Connection to @ref[1.2.58]:** The @deva[च] in the @deva[सूत्र] draws @deva[द्वयोः] (for two) from the context of @ref[1.2.58], extending the optional plural to dual referents for these specific star names.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[बहुवचन] and @deva[अन्यतरस्याम्] from @ref[1.2.58]; @deva[द्वयोः] from @ref[1.2.59].

@deva[फाल्गुनीप्रोष्ठपदानां च] — the dual of @deva[फाल्गुनी] and @deva[प्रोष्ठपदा] optionally takes plural.

**@deva[नक्षत्र]-specific rule:** Each of these asterisms consists of a pair of stars, hence their natural dual. The optional plural is permitted because, as celestial bodies, they may be conceived of collectively (like @deva[जाति] words — @ref[1.2.58]).

**@deva[नक्षत्र] names vs. personal names:** The option applies only when these words denote the asterisms. As personal names (@deva[फल्गुन्यौ माणविके] "two girls"), the normal dual applies — no optional plural.

**Position in the number section:** Rules @ref[1.2.58]–@ref[1.2.73] progressively cover number alternations:
- @ref[1.2.58]: @deva[जाति] words — singular → optional plural
- @ref[1.2.59]: @deva[अस्मद्] — singular/dual → optional plural
- @ref[1.2.60] (this): @deva[फाल्गुनी]/@deva[प्रोष्ठपदा] — dual → optional plural
- @ref[1.2.61]–@ref[1.2.73]: further number designations
"""

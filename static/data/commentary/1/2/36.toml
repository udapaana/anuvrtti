id = "1.2.36"
numericId = "12036"

[en]
simple = """
When reciting Vedic texts (@deva[छन्दस्]) outside of sacrifice, the use of @deva[एकश्रुति] (monotone) is optional. You may recite with the proper three-fold accents or in a flat monotone — both are acceptable.

**Both valid for Vedic recitation:**
- @deva[अग्निमीले पुरोहितम्] with proper @deva[उदात्त]/@deva[अनुदात्त]/@deva[स्वरित] accents
- @deva[अग्निमीले पुरोहितम्] in @deva[एकश्रुति] (monotone)

This extends the @deva[एकश्रुति] option beyond sacrifice (@ref[1.2.34]) to ordinary Vedic study and recitation.
"""

standard = """
In @deva[छन्दस्] (Vedic texts), @deva[एकश्रुति] is optional (@deva[विभाषा]). This applies to ordinary recitation — not just sacrifice.

**Why @deva[विभाषा] instead of @deva[वा]?** Using @deva[वा] by @deva[अनुवृत्ति] from @ref[1.2.35] would carry @deva[यज्ञकर्मणि] into this rule, limiting the option to sacrifice. The explicit @deva[विभाषा] breaks that @deva[अनुवृत्ति] and extends the option to all Vedic recitation.

**Distribution (according to some authorities):**
- @deva[मन्त्र] portions: accents preferred
- @deva[ब्राह्मण] portions: some hold @deva[एकश्रुति] is obligatory, not merely optional

**Both valid:** @deva[अग्निमीले पुरोहितम्] — with accents or in monotone.
"""

advanced = """
@deva[विभाषा छन्दसि] — @deva[एकश्रुति] is optional in @deva[छन्दस्].

**@deva[अनुवृत्ति]:** @deva[एकश्रुति] from @ref[1.2.33].

**@deva[विभाषा] vs. @deva[वा]:** This is a key @deva[अनुवृत्ति] discontinuity. If @deva[वा] (from @ref[1.2.35]) continued, the @deva[यज्ञकर्मणि] restriction would persist, limiting the option to sacrifice. @deva[पाणिनि] explicitly restates @deva[विभाषा] to break the @deva[अनुवृत्ति] chain and apply the option to all @deva[छन्दस्] contexts.

**@deva[मन्त्र] vs. @deva[ब्राह्मण]:** The @deva[काशिका] reports a view that @deva[ब्राह्मण] texts are always @deva[एकश्रुति] (no option — the @deva[विभाषा] applies only to @deva[मन्त्र] portions). This is a minority view; the rule as stated makes no such distinction.

**Scope within the accent section:** Rules @ref[1.2.33]–@ref[1.2.36] form a progressive expansion of @deva[एकश्रुति]:
1. @ref[1.2.33]: calling from a distance → @deva[एकश्रुति]
2. @ref[1.2.34]: sacrificial recitation → @deva[एकश्रुति] (with exceptions)
3. @ref[1.2.35]: @deva[वषट्] — optional exception
4. @ref[1.2.36] (this): all Vedic recitation → optionally @deva[एकश्रुति]
"""

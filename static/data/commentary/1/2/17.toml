id = "1.2.17"
numericId = "12017"

[en]
simple = """
After the root @deva[स्था] "to stand" and the @deva[घु] roots (@deva[दा] "to give," @deva[धा] "to place," and others), the aorist affix @deva[सिच्] in @deva[आत्मनेपद] (middle voice) is treated as @deva[कित्]. The long @deva[आ] of these roots shortens to @deva[इ] before the aorist endings.

**Examples:**
- @deva[उपास्थित] "he worshipped" (from @deva[स्था] with @deva[उप])
- @deva[अदित] "he gave" (from @deva[दा])
- @deva[अधित] "he placed" (from @deva[धा])

Without the @deva[कित्] treatment, these roots would keep their @deva[आ] and produce wrong forms.
"""

standard = """
@deva[सिच्] in @deva[आत्मनेपद] is @deva[कित्] after @deva[स्था] and @deva[घु] roots. These roots undergo @deva[आ] → @deva[इ] substitution before the aorist endings.

**@deva[घु] roots** (defined at @ref[1.1.20]): @deva[दा] "to give," @deva[धा] "to place," @deva[दो] "to cut," @deva[दै] "to pity," @deva[धे] "to suck."

**Forms:**
- @deva[स्था]: @deva[उपास्थित] (3sg), @deva[उपास्थिषाताम्] (3du), @deva[उपास्थिषत] (3pl) — "he worshipped"
- @deva[दा]: @deva[अदित] "he gave"
- @deva[धा]: @deva[अधित] "he placed"

**Why @deva[आत्मनेपद]?** @deva[स्था] with @deva[उप] takes @deva[आत्मनेपद] by @ref[1.3.22]. @deva[दा] and @deva[धा] take @deva[आत्मनेपद] in certain @deva[उपसर्ग] combinations.

**The @deva[आ] → @deva[इ] change:** Before @deva[कित्] aorist endings, @deva[आ] is replaced by @deva[इ] (by @ref[6.4.113]). This is specific to the aorist @deva[आत्मनेपद] context.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कित्] from @ref[1.2.5]; @deva[सिच्] from @ref[1.2.14]; @deva[आत्मनेपदेषु] from @ref[1.2.11].

@deva[स्थाघोश्च] — @deva[सिच्] @deva[आत्मनेपद] is @deva[कित्] after @deva[स्था] and @deva[घु] roots.

**@deva[घु] roots** (@ref[1.1.20]): @deva[डुदाञ्], @deva[दाण्], @deva[दो], @deva[देङ्], @deva[डुधाञ्], @deva[धेट्]. All have @deva[आ] as their operative vowel.

**The @deva[आ] → @deva[इ] substitution:** By @ref[6.4.113], the @deva[आ] of @deva[स्था]/@deva[घु] roots is replaced by @deva[इ] before @deva[कित्] @deva[सिच्] in @deva[आत्मनेपद]. This is not a general @deva[कित्] effect but a specific substitution rule triggered by the @deva[कित्] designation here.

**Derivation of @deva[उपास्थित]:**
@deva[उप] + @deva[अट्] + @deva[स्था] + @deva[सिच्] + @deva[त]:
1. @deva[आ] → @deva[इ] by @ref[6.4.113]
2. @deva[सिच्] elided by @ref[8.2.27]
3. → @deva[उपास्थित]

**This is the last root-specific @deva[कित्] rule for @deva[सिच्].** The sequence @ref[1.2.14]–@ref[1.2.17] covers: @deva[हन्] (@ref[1.2.14]), @deva[यम्] in @deva[गन्धन] sense (@ref[1.2.15]), @deva[यम्] in @deva[उपयमन] sense (@ref[1.2.16]), and @deva[स्था]/@deva[घु] (this rule). After this, the @deva[कित्] extension topic shifts to @deva[क्त्वा] and @deva[निष्ठा].
"""

id = "1.2.52"
numericId = "12052"

[en]
simple = """
Adjectives describing @deva[लुप्]-derived words (from @ref[1.2.51]) also match in gender and number. But if the noun being described is a @deva[जाति] (class noun — a word that denotes a category), the adjective follows the class noun's own gender and number instead.

**Adjective agrees with @deva[लुप्]-word:**
@deva[पञ्चालाः रमणीयाः बह्वन्नाः] "the pleasant, food-rich @deva[पञ्चाल]s" — adjectives are masculine plural, matching @deva[पञ्चालाः]

**Class noun — adjective follows it instead:**
@deva[पञ्चालाः जनपदः] "the @deva[पञ्चाल] country" — @deva[जनपद] is a class noun (singular masculine), so @deva[रमणीयः] would also be singular masculine, not matching the plural @deva[पञ्चालाः].
"""

standard = """
Adjectives of @deva[लुप्]-derived words agree in gender/number, except when the described noun is a @deva[जाति] (class noun).

**Agreement with @deva[लुप्]-word:**
@deva[पञ्चालाः रमणीयाः बह्वन्नाः बहुक्षीरघृताः] "the pleasant @deva[पञ्चाल]s, rich in food, milk, and ghee" — all adjectives masculine plural

**@deva[जाति] — no agreement:**
@deva[पञ्चालाः जनपदः] "the @deva[पञ्चाल] country" — @deva[जनपद] is a class noun with its own gender/number (m. sg.), so @deva[रमणीयः] agrees with @deva[जनपद], not @deva[पञ्चालाः].

**Indirect qualification:**
@deva[पञ्चालाः जनपदो रमणीयो बह्वन्नः] — @deva[रमणीयः] and @deva[बह्वन्नः] qualify @deva[जनपद] (m. sg.), not @deva[पञ्चालाः] (m. pl.).

**What is @deva[जाति]?** A word denoting a class or category by its form — applicable to individual instances without special grammatical instruction.
"""

advanced = """
@deva[विशेषणं विशेष्येण बहुलम्] — adjectives of @deva[लुप्]-derived words agree in gender/number, but not with @deva[जाति] (class nouns).

**@deva[अनुवृत्ति]:** @deva[लुप्] from @ref[1.2.51]; @deva[व्यक्ति] and @deva[वचन] from @ref[1.2.51].

**The @deva[जाति] exception:** When the descriptive noun is a class term (@deva[जाति]), it retains its own gender/number. @deva[जनपदः] (m. sg.) does not become @deva[जनपदाः] (m. pl.) just because it describes @deva[पञ्चालाः]. The adjective then agrees with the class noun, not the @deva[लुप्]-word.

**@deva[बहुलम्] ("variously"):** The @deva[काशिका] notes that this agreement is not absolute — it is @deva[बहुल] (variable), admitting exceptions in actual usage.

**This rule, with @ref[1.2.51] and @ref[1.2.53]–@ref[1.2.55]**, forms a cluster on the relationship between grammatical derivation and conventional usage. The next three rules will argue that the entire @deva[लुप्]-based analysis is unnecessary — these forms are simply conventional names.
"""

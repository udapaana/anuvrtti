id = "1.2.25"
numericId = "12025"

[en]
simple = """
According to the sage @deva[काश्यप], the @deva[सेट्] @deva[क्त्वा] ("having done") is optionally @deva[कित्] after three roots: @deva[तृष्] "to thirst," @deva[मृष्] "to sprinkle," and @deva[कृश्] "to become lean." When @deva[कित्], @deva[गुण] (vowel strengthening) is blocked and @deva[ऋ] stays unchanged.

**Both forms valid:**
- @deva[तृषित्वा] or @deva[तर्षित्वा] "having thirsted"
- @deva[मृषित्वा] or @deva[मर्षित्वा] "having sprinkled"
- @deva[कृशित्वा] or @deva[कर्शित्वा] "having become lean"

The mention of a sage's name in a grammatical rule is a mark of respect for that teacher's authority.
"""

standard = """
According to @deva[काश्यप], @deva[सेट्] @deva[क्त्वा] is optionally @deva[कित्] after @deva[तृष्] "to thirst," @deva[मृष्] "to sprinkle," and @deva[कृश्] "to become lean." @deva[विभाषा] continues from @ref[1.2.23].

**Forms (both valid):**
- @deva[तृष्]: @deva[तृषित्वा] (@deva[कित्], no @deva[गुण]) ~ @deva[तर्षित्वा] (not @deva[कित्], @deva[गुण]: @deva[ऋ] → @deva[अर्])
- @deva[मृष्]: @deva[मृषित्वा] ~ @deva[मर्षित्वा]
- @deva[कृश्]: @deva[कृशित्वा] ~ @deva[कर्शित्वा]

**@deva[कित्] effect:** All three roots have @deva[उपधा] @deva[ऋ]. When @deva[कित्], @deva[गुण] is blocked (by @ref[1.1.5]), so @deva[ऋ] remains. When not @deva[कित्], @deva[गुण] applies: @deva[ऋ] → @deva[अर्].

**Naming @deva[काश्यप]:** The mention of a sage's name (@deva[पूजार्थम्]) indicates respect for this authority. It does not change the rule's force — the @deva[विभाषा] already carries from @ref[1.2.23].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कित्] from @ref[1.2.5]; @deva[सेट्] @deva[क्त्वा] from @ref[1.2.22]; @deva[विभाषा] from @ref[1.2.23].

@deva[तृषिमृषिकृशेः काश्यपस्य] — @deva[सेट्] @deva[क्त्वा] is optionally @deva[कित्] after @deva[तृष्], @deva[मृष्], and @deva[कृश्], according to @deva[काश्यप].

**@deva[पूजार्थम्] (honorific mention):** @deva[पाणिनि] occasionally names other grammarians to acknowledge their contribution. The @deva[काश्यप] attribution here means this particular optional treatment was noted or emphasized by that teacher. The @deva[विभाषा] is not new — it continues from @ref[1.2.23].

**Relationship to @ref[1.2.18]:** @ref[1.2.18] states that @deva[सेट्] @deva[क्त्वा] is not @deva[कित्]. Rules @ref[1.2.23]–@ref[1.2.25] create exceptions: they optionally restore @deva[कित्] status for specific root classes. So the logic is:
1. @ref[1.2.18]: @deva[सेट्] @deva[क्त्वा] → not @deva[कित्] (general rule)
2. @ref[1.2.23]–@ref[1.2.25]: after certain roots → optionally @deva[कित्] again (exceptions)

**End of the @deva[क्त्वा] optional @deva[कित्] cluster.** After this rule, the @deva[अधिकार] moves to new topics. The sequence @ref[1.2.18]–@ref[1.2.25] forms a complete unit: general removal of @deva[कित्] from @deva[सेट्] @deva[क्त्वा], followed by root-specific re-introductions.

**All three roots have @deva[ऋ] @deva[उपधा]:** Unlike @ref[1.2.23] (nasal deletion) and @ref[1.2.24] (mixed effects), here the @deva[कित्] effect is uniformly @deva[गुण]-blocking for @deva[ऋ].
"""

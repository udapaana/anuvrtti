id = "1.2.15"
numericId = "12015"

[en]
simple = """
After the root @deva[यम्] "to restrain" — but only when it means "to divulge" or "to reveal something hidden" — the aorist affix @deva[सिच्] in @deva[आत्मनेपद] (middle voice) is treated as @deva[कित्]. The nasal @deva[म्] drops (by @ref[6.4.37]).

**Divulging sense:** @deva[उदायत] "he divulged" — the @deva[म्] of @deva[यम्] drops.

**Other senses — not @deva[कित्]:** @deva[उदायंस्त पादम्] "he raised the foot" — @deva[यम्] means "to raise" here, so the nasal stays.

This is a meaning-restricted rule: the same root with the same affix behaves differently depending on its meaning.
"""

standard = """
@deva[सिच्] in @deva[आत्मनेपद] is @deva[कित्] after @deva[यम्] in the sense of @deva[गन्धन] (divulging/revealing what was concealed).

**Forms (divulging sense):** @deva[उदायत] (3sg), @deva[उदायसाताम्] (3du), @deva[उदायसत] (3pl). The @deva[सिच्] is elided by @ref[8.2.27]; the nasal drops by @ref[6.4.37].

**Why @deva[आत्मनेपद]?** @deva[यम्] with @deva[आङ्] takes @deva[आत्मनेपद] by @ref[1.3.28].

**Other senses — not @deva[कित्]:**
- @deva[उदायंस्त पादम्] "he raised the foot" — meaning is "to raise," not "to divulge" → nasal retained
- @deva[उदायंस्त कूपाद् उदकम्] "he raised water from the well" → nasal retained

**Meaning-restriction (@deva[अर्थनियम]):** This is one of the rules where the same phonological form receives different treatment based on semantics. The grammar can condition operations on meaning, not just form.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कित्] from @ref[1.2.5]; @deva[सिच्] from @ref[1.2.14]; @deva[आत्मनेपदेषु] from @ref[1.2.11].

@deva[यमो गन्धने] — @deva[सिच्] @deva[आत्मनेपद] is @deva[कित्] after @deva[यम्] in the @deva[गन्धन] sense.

**@deva[गन्धन]:** "Divulging" or "revealing what was concealed" (@deva[गूढस्य प्रकाशनम्]). This restricts the rule to a specific semantic context.

**Derivation:** @deva[उद्] + @deva[आ] + @deva[यम्] + @deva[अट्] + @deva[सिच्] + @deva[त]:
1. @deva[म्] deleted by @ref[6.4.37] (before @deva[कित्])
2. @deva[सिच्] elided by @ref[8.2.27] (short vowel + @deva[झल्] base)
3. → @deva[उदायत]

**Non-@deva[गन्धन] sense:** @deva[उदायंस्त] — nasal retained, @deva[सिच्] not elided → different aorist form.

**Semantic conditioning in @deva[पाणिनि]:** Rules like this show that the @deva[अष्टाध्यायी] does not operate purely on form. When the grammar says @deva[गन्धने], it imports a meaning criterion into what is otherwise a morphophonological rule. This is relatively rare but demonstrates the grammar's capacity for semantic sensitivity.

**@deva[आत्मनेपद] motivation:** @deva[यम्] with @deva[आङ्] is @deva[आत्मनेपदी] by @ref[1.3.28]. Also by @ref[1.3.75] when combined with @deva[सम्], @deva[उद्], or @deva[आङ्].
"""

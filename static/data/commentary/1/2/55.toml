id = "1.2.55"
numericId = "12055"

[en]
simple = """
If etymological meaning truly determined a word's usage, then a word should disappear when its etymological basis no longer exists. But that does not happen.

**Example:** If @deva[पञ्चालाः] meant "the land where the @deva[पञ्चाल] people live," then the name should vanish when they no longer live there. But the name persists regardless — proving that the word is a conventional name (@deva[रूढि]), not an active etymological description.

This is the final argument: proper nouns like @deva[पञ्चालाः] and @deva[कुरवः] are fixed by usage, not by derivation. Complex @deva[लुप्]-analysis is unnecessary.
"""

standard = """
If etymological meaning controlled usage, words would vanish when their etymological basis becomes absent. Since they persist, they are conventional names.

**The argument:** @deva[पञ्चालाः] as "land of @deva[पञ्चाल] people" should cease to apply when the people depart. But place names persist independently of their etymological origin.

**Conclusion:** Such words are @deva[रूढि] — their meaning is fixed by convention, not by the meaning of their component parts. The @deva[लुप्]-derivation of @ref[1.2.51] and the @deva[तद्धित] rules it depends on are pedagogically interesting but not practically necessary.

**End of the @deva[लुप्]-convention cluster:** Rules @ref[1.2.51]–@ref[1.2.55] form a connected discussion:
1. @ref[1.2.51]: @deva[लुप्]-words retain gender/number
2. @ref[1.2.52]: adjectives agree accordingly
3. @ref[1.2.53]: but this is convention, not grammar
4. @ref[1.2.54]: the derivation is unnecessarily complex
5. @ref[1.2.55] (this): etymology would predict wrong results
"""

advanced = """
@deva[योगस्य प्रसिद्धिश्चेत् तदभावे शब्दाभावः] — if etymological meaning were authoritative, the word should vanish when that meaning is absent.

**Final argument in the @deva[रूढि] vs. @deva[योग] discussion:** This rule presents a reductio ad absurdum. If @deva[पञ्चालाः] derives from "where @deva[पञ्चाल] people live," then:
- When @deva[पञ्चाल] people leave → the name should cease
- But the name persists → etymology is not the basis of meaning
- Therefore the word is @deva[रूढि] (conventional)

**Philosophical significance:** This cluster (@ref[1.2.51]–@ref[1.2.55]) is one of the few places where the @deva[अष्टाध्यायी] engages in meta-linguistic philosophy within its own rule system. The discussion anticipates later debates in Indian linguistic thought (@deva[नैयायिक] and @deva[मीमांसक] schools) about the relationship between words and meanings.

**@deva[रूढिर्योगमपहरति]:** "Convention overrides etymology" — this principle, later formalized, is essentially what these five rules argue.

**After this, the topic shifts** to the @deva[गण] (number) definitions beginning at @ref[1.2.56] — a completely different subject within the @deva[संज्ञा] section.
"""

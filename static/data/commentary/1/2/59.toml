id = "1.2.59"
numericId = "12059"

[en]
simple = """
The plural form of @deva[अस्मद्] ("I/we") can optionally be used when the speaker is just one person or two people. A single speaker may say @deva[वयं ब्रूमः] "we say" instead of @deva[अहं ब्रवीमि] "I say." Two speakers may use @deva[वयं ब्रूमः] instead of @deva[आवां ब्रूवः] "we two say."

This is the "royal we" or "respectful plural" — using plural forms for a single person.

**Exception:** When the speaker identifies themselves with a specific name or attribute, only singular is used: @deva[अहं देवदत्तो ब्रवीमि] "I, Devadatta, say" — not *@deva[वयं देवदत्तो ब्रूमः].
"""

standard = """
The plural of @deva[अस्मद्] optionally expresses singular or dual meaning. This allows one person to use "we" and two people to use "we" (instead of "we two").

**Examples:**
- One person: @deva[अहं ब्रवीमि] or @deva[वयं ब्रूमः] "I say"
- Two people: @deva[आवां ब्रूवः] or @deva[वयं ब्रूमः] "we two say"

**Exception with attribute:** When the speaker is qualified by a name or descriptor, only singular: @deva[अहं गार्ग्यो ब्रवीमि] "I, descendant of @deva[गर्ग], say." The specific identification restricts number to singular.

**Extended to @deva[युष्मद्] with @deva[गुरु]:** By a @deva[वार्त्तिक], "master" allows plural for singular: @deva[त्वं मे गुरुः] or @deva[यूयं मे गुरवः] "you are my master."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[बहुवचन] and @deva[अन्यतरस्याम्] from @ref[1.2.58].

@deva[अस्मदो द्वयोश्च] — the plural of @deva[अस्मद्] optionally expresses singular or dual.

**Scope:** @ref[1.2.58] covered @deva[जाति] words with @deva[एकस्मिन्] (one → plural). This rule extends the optional number alternation to @deva[अस्मद्] (first person pronoun) for both @deva[एक] (one) and @deva[द्वि] (two) referents.

**Blocking condition:** When the speaker is specifically identified by an attribute (@deva[विशेषण]), the number is restricted: @deva[अहं देवदत्तो ब्रवीमि] — the attribute @deva[देवदत्तः] singles out one person, blocking the plural option.

**@deva[वार्त्तिक] extension:** @deva[गुरुश्च युष्मदि] — when addressing one's teacher, @deva[युष्मद्] (second person) also allows plural for singular: @deva[यूयं मे गुरवः] = @deva[त्वं मे गुरुः]. This is the honorific plural — addressing a respected person as "you (plural)."

**Pragmatic context:** The "royal we" and "respectful you (plural)" are cross-linguistic phenomena. @deva[पाणिनि] formalizes what is essentially a sociolinguistic convention within the grammatical system.
"""

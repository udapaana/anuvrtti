id = "1.2.41"
numericId = "12041"

[en]
simple = """
An affix (@deva[प्रत्यय]) that consists of just a single sound is called @deva[अपृक्त] ("unjoined" or "isolated"). Many affixes appear to have multiple letters, but after removing their indicatory letters (@deva[इत्]), only one real sound remains — that makes them @deva[अपृक्त].

**Examples:**
- @deva[त्] in @deva[असेधीत्] "he prevented" — the aorist ending is a single @deva[त्]
- @deva[व्] from @deva[क्विन्] — the @deva[क्], @deva[इ], and @deva[न्] are all indicatory; only @deva[व्] is real

**Not @deva[अपृक्त]:** @deva[दृ] + @deva[विन्] → @deva[दर्विः] "ladle" — @deva[विन्] has two real sounds (@deva[व्] and @deva[इ]), so it is not single-letter.
"""

standard = """
A single-sound affix is @deva[अपृक्त]. This is a @deva[संज्ञा] (definitional) rule.

**Examples:**
- @deva[त्] in @deva[असेधीत्] (aorist 3rd singular)
- @deva[व्] from @deva[क्विन्]: after removing @deva[इत्] letters (@deva[क्] by @ref[1.3.8], @deva[इ] by @ref[1.3.2], @deva[न्] by @ref[1.3.3]), only @deva[व्] remains

**Why it matters — @ref[6.1.67]:** @deva[अपृक्त] @deva[व्] is elided:
- @deva[घृतस्पृश्] + @deva[क्विन्] (by @ref[3.2.58]) → @deva[घृतस्पृक्] + @deva[व्] → @deva[व्] elided → @deva[घृतस्पृक्]
- @deva[अंशभज्] + @deva[ण्वि] (by @ref[3.2.62]) → @deva[अंशभाक्]

**Not @deva[अपृक्त]:** @deva[दृ] + @deva[विन्] → @deva[दर्विः] "ladle" — @deva[विन्] has two real sounds (@deva[व्] and @deva[इ]), so @ref[6.1.67] does not apply and @deva[व्] survives.
"""

advanced = """
@deva[एकाल् प्रत्ययोऽपृक्तः] — a single-sound affix is @deva[अपृक्त].

**@deva[संज्ञा] rule:** Defines a term used primarily in @ref[6.1.67] (@deva[वेरपृक्तस्य]) for elision of single-letter @deva[व्] affixes, and in @ref[8.2.26]–@ref[8.2.27] for elision of single-letter @deva[सिच्] in certain environments.

**@deva[एकाल्] after @deva[इत्]-removal:** The count of "one sound" is after stripping indicatory letters. So @deva[क्विन्] (three written letters) is @deva[अपृक्त] because only @deva[व्] is real. But @deva[विन्] (two real sounds: @deva[व्] + @deva[इ]) is not @deva[अपृक्त].

**Applications:**
- @ref[6.1.67] (@deva[वेरपृक्तस्य]): @deva[अपृक्त] @deva[व्] is elided — @deva[घृतस्पृश्] + @deva[क्विन्] → @deva[घृतस्पृक्]
- @ref[8.2.26]–@ref[8.2.27]: @deva[सिच्] (= @deva[स्], a single sound) is elided in certain aorist contexts — its @deva[अपृक्त] status is relevant to the elision conditions

**Topic shift:** This rule begins a new section of @deva[संज्ञा] rules. The accent rules of @ref[1.2.27]–@ref[1.2.40] are complete. From here through @ref[1.2.73], the rules define key grammatical categories: @deva[अपृक्त], @deva[कर्मधारय], @deva[उपसर्जन], @deva[प्रातिपदिक], and the @deva[गण] (number) designations.
"""

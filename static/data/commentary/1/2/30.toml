id = "1.2.30"
numericId = "12030"

[en]
simple = """
A vowel pronounced with a lowered pitch is called @deva[अनुदात्त] (grave accent). This is the "low" tone — the voice drops when producing it.

**Example:** In @deva[अग्निः] "fire," the vowel @deva[अ] carries @deva[अनुदात्त] accent (while the @deva[इ] is @deva[उदात्त]).

Most syllables in a Sanskrit word are @deva[अनुदात्त]. The @deva[उदात्त] syllable stands out as the accent-bearing one; everything else falls to @deva[अनुदात्त].
"""

standard = """
A vowel perceived as low-pitched is @deva[अनुदात्त] (grave). This is a @deva[संज्ञा] rule, the second of three accent definitions.

**Phonetic description:** The voice is lowered, produced from the lower portion of the place of articulation, with relaxed vocal apparatus.

**In notation:** @deva[अनुदात्त] is marked with a horizontal line below the syllable in Vedic texts.

**Examples:**
- @deva[अग्निः] — the @deva[अ] is @deva[अनुदात्त]
- @deva[कर्तव्यम्] — syllables other than the accented one are @deva[अनुदात्त]

**Grammatical significance:** By @ref[3.1.4], @deva[सुप्] (nominal) and @deva[पित्] affixes are @deva[अनुदात्त]. Many rules assign @deva[अनुदात्त] to mark the "default" tonal level from which @deva[उदात्त] rises.
"""

advanced = """
@deva[नीचैरनुदात्तः] — a vowel pronounced low is @deva[अनुदात्त].

**@deva[संज्ञा] rule:** Companion to @ref[1.2.29] (@deva[उदात्त]). Together with @ref[1.2.31] (@deva[स्वरित]), these three rules define the complete tonal system.

**@deva[अनुदात्त] as default:** In the Vedic accent system, @deva[अनुदात्त] is the unmarked or baseline pitch. A word typically has one @deva[उदात्त] syllable; all others are @deva[अनुदात्त] (or @deva[स्वरित] immediately following @deva[उदात्त]).

**Key accent-assigning rules:**
- @ref[3.1.4]: @deva[सुप्] affixes and @deva[पित्] affixes are @deva[अनुदात्त]
- @ref[6.1.158]: @deva[अनुदात्त] assignment in certain compound types
- @ref[8.1.18]: @deva[अनुदात्त] in @deva[तिङ्] (finite verbs) in main clauses

**Role of @deva[अनुदात्तोपदेश]:** The term @deva[अनुदात्तोपदेश] (listed as @deva[अनुदात्त] in the @deva[धातुपाठ]) appears in important rules like @ref[6.4.37] — where it triggers nasal deletion before @deva[कित्] affixes. Here, @deva[अनुदात्त] refers to the accent marking of the root in its listing, not the phonological accent in speech.

**Phonetic tradition:** The @deva[शिक्षा] texts describe @deva[अनुदात्त] as soft, sweet, and produced with an expanded larynx — the opposite of the tense, raised @deva[उदात्त].
"""

id = "1.2.35"
numericId = "12035"

[en]
simple = """
The ritual exclamation @deva[वषट्] (actually pronounced @deva[वौषट्]) may optionally be spoken with a raised tone (@deva[उदात्त]) even during sacrifice, where @deva[एकश्रुति] (monotone) normally applies (@ref[1.2.34]).

**Both valid in sacrifice:**
- @deva[वौषट्] with @deva[उदात्त] accent (raised tone)
- @deva[वौषट्] in @deva[एकश्रुति] (monotone, like the rest of the recitation)

@deva[वौषट्] is the exclamation the priest makes when offering into the fire. It is one of the most important ritual utterances in Vedic sacrifice.
"""

standard = """
The word @deva[वषट्] (pronounced @deva[वौषट्]) may optionally take @deva[उदात्त] accent in @deva[यज्ञकर्म], overriding the @deva[एकश्रुति] of @ref[1.2.34]. This is a @deva[विभाषा] rule.

**Both valid:** @deva[सोमस्याग्ने वीही३ वौषट्] (monotone) or with @deva[उदात्त] on @deva[वौषट्]

**Why @deva[वषट्] not @deva[वौषट्]?** The @deva[सूत्र] uses the form @deva[वषट्] even though the actual pronunciation is @deva[वौषट्] — a noted instance of @deva[पाणिनि]'s compressed formulation style.

**Scope:** This exception applies only to @deva[वषट्]. Other ritual exclamations (@deva[स्वाहा], @deva[वौषट्], @deva[स्वधा]) in the same context follow the general @deva[एकश्रुति] rule unless separately excepted.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[एकश्रुति] from @ref[1.2.33]; @deva[यज्ञकर्म] from @ref[1.2.34].

@deva[वषट्कारस्य विभाषा] — @deva[वषट्] optionally takes @deva[उदात्त] in @deva[यज्ञकर्म] (despite the @deva[एकश्रुति] of @ref[1.2.34]).

**@deva[वषट्कार]:** The ritual exclamation accompanying the oblation into the fire. The @deva[अध्वर्यु] priest says @deva[वौषट्] at the moment of offering. Its acoustic prominence — whether accented or monotone — is a matter of ritual tradition.

**@deva[वषट्] vs. @deva[वौषट्]:** The @deva[काशिका] notes @deva[विचित्राः हि सूत्रस्य कृतिः पाणिनेः] — "@deva[पाणिनि]'s formulations are cryptic." The compressed form @deva[वषट्] stands for the actually pronounced @deva[वौषट्].

**End of the accent/tone section.** Rules @ref[1.2.27]–@ref[1.2.35] form a complete unit:
- @ref[1.2.27]: vowel duration definitions (@deva[ह्रस्व], @deva[दीर्घ], @deva[प्लुत])
- @ref[1.2.28]: duration terms target vowels only
- @ref[1.2.29]–@ref[1.2.31]: accent definitions (@deva[उदात्त], @deva[अनुदात्त], @deva[स्वरित])
- @ref[1.2.32]: internal structure of @deva[स्वरित]
- @ref[1.2.33]–@ref[1.2.35]: @deva[एकश्रुति] (monotone) rules

After this, the @deva[अधिकार] shifts to the @deva[पद] (word) definitions beginning at @ref[1.2.36].
"""

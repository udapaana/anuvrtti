id = "1.2.62"
numericId = "12062"

[en]
simple = """
The asterism @deva[विशाखा] — a pair of stars — normally takes the dual. But in Vedic usage (@deva[छन्दस्]), the singular may optionally be used instead.

**Vedic (both valid):**
- @deva[विशाखा नक्षत्रम्] (singular) "the @deva[विशाखा] asterism"
- @deva[विशाखे नक्षत्रम्] (dual)

The presiding deities of @deva[विशाखा] are @deva[इन्द्राग्नी] (Indra and Agni).

**Classical Sanskrit:** Only the dual @deva[विशाखे] is used.

**Not as a star name:** @deva[विशाखे माणविके] "two girls named @deva[विशाखा]" — dual only (the option applies only to the asterism).
"""

standard = """
In @deva[छन्दस्] (Vedic), the dual @deva[विशाखा] (asterism) optionally takes singular with dual meaning. This parallels @ref[1.2.61] for @deva[पुनर्वसू].

**Vedic forms (both valid):**
- @deva[विशाखा नक्षत्रम्] (singular)
- @deva[विशाखे नक्षत्रमिन्द्राग्नी देवता] (dual) "the @deva[विशाखा] asterism, with @deva[इन्द्राग्नी] as deities"

**Classical Sanskrit:** Only @deva[विशाखे] (dual).

**Restriction — asterism only:** @deva[विशाखे माणविके] "two girls named @deva[विशाखा]" — dual only, no singular option.

**Pattern with @ref[1.2.61]:** Both @deva[पुनर्वसू] and @deva[विशाखा] receive optional singular in Vedic. The @deva[अन्यतरस्याम्] continues from @ref[1.2.58], and @deva[छन्दसि] continues from @ref[1.2.61].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[नक्षत्र] from @ref[1.2.60]; @deva[अन्यतरस्याम्] from @ref[1.2.58]; @deva[छन्दसि] and @deva[एकवचन] from @ref[1.2.61].

@deva[विशाखयोः] — in @deva[छन्दस्], the dual @deva[विशाखा] optionally takes singular.

**Identical pattern to @ref[1.2.61]:** Both rules give a Vedic-only singular option for a naturally dual asterism. @deva[पाणिनि] states them separately (rather than combining into a list) because each has its own @deva[सूत्र] in the tradition.

**@deva[छन्दस्] restriction:** Like @ref[1.2.61], this option is limited to Vedic. In classical usage, @deva[विशाखा] is always dual.

**Asterism number rules — complete picture:**
| Rule | Asterism | Alternation | Scope |
|------|----------|-------------|-------|
| @ref[1.2.60] | @deva[फाल्गुनी], @deva[प्रोष्ठपदा] | dual → optional plural | Classical + Vedic |
| @ref[1.2.61] | @deva[पुनर्वसू] | dual → optional singular | Vedic only |
| @ref[1.2.62] (this) | @deva[विशाखा] | dual → optional singular | Vedic only |

**Direction of number alternation:** @ref[1.2.60] expands (dual → plural), while @ref[1.2.61]–@ref[1.2.62] contract (dual → singular). The Vedic tradition allows greater freedom in number usage for star names.

**Transition:** @ref[1.2.63] continues with asterism-number rules but shifts to @deva[द्वन्द्व] compounds, mandating dual for @deva[तिष्यपुनर्वसू].
"""

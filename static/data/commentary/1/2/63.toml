id = "1.2.63"
numericId = "12063"

[en]
simple = """
When the asterisms @deva[तिष्य] (one star) and @deva[पुनर्वसू] (two stars) form a @deva[द्वन्द्व] compound (a pairing), the result is always dual — even though the total is three stars.

**Example:**
- @deva[उदितौ तिष्यपुनर्वसू] "@[tiṣya] and Punarvasu have risen" (dual, not plural)

Logically three stars should give plural, but this rule mandates dual.

**Synonyms included:** @deva[पुष्य] and @deva[सिद्ध] are synonyms of @deva[तिष्य], so @deva[पुष्यपुनर्वसू] and @deva[सिद्धपुनर्वसू] also take dual.

**Not as star names:** @deva[तिष्यपुनर्वसवो माणवकाः] "boys named @deva[तिष्य] and @deva[पुनर्वसु]" — plural, because they are personal names, not asterisms.
"""

standard = """
In @deva[द्वन्द्व] compounds of @deva[तिष्य] and @deva[पुनर्वसू] (asterisms), dual always replaces the expected plural. The word @deva[नित्यम्] makes this obligatory — no option.

**Example:**
- @deva[उदितौ तिष्यपुनर्वसू दृश्येते] (dual) — three stars, but dual form

**Why plural is expected:** @deva[तिष्य] is one star and @deva[पुनर्वसू] is a pair (two stars). A @deva[द्वन्द्व] of three items normally takes plural. This rule overrides that.

**Synonyms:** The @deva[सूत्र] repeats @deva[नक्षत्र] to include @deva[पुष्य] and @deva[सिद्ध] (synonyms of @deva[तिष्य]): @deva[पुष्यपुनर्वसू], @deva[सिद्धपुनर्वसू] — both take dual.

**Restrictions:**
1. **Not personal names:** @deva[तिष्यपुनर्वसवो माणवकाः] "boys named @deva[तिष्य] and @deva[पुनर्वसु]" — plural
2. **Not @deva[बहुव्रीहि]:** @deva[तिष्यपुनर्वसवः] (adjectival use) — plural
3. **Singular @deva[द्वन्द्व] unaffected:** @deva[तिष्यपुनर्वसु इदम्] (neuter singular @deva[द्वन्द्व]) — permitted

**@deva[नित्यम्] vs. @deva[अन्यतरस्याम्]:** The word @deva[नित्यम्] blocks the option (@deva[विकल्प]) from @ref[1.2.58]. This dual is mandatory, not optional.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[नक्षत्र] from @ref[1.2.60].

@deva[तिष्यपुनर्वसोर्नक्षत्रद्वन्द्वे नित्यम्] — in @deva[द्वन्द्व] of the asterisms @deva[तिष्य] and @deva[पुनर्वसू], dual is always used (not plural).

**The number problem:** @deva[तिष्य] = 1 star, @deva[पुनर्वसू] = 2 stars. Total = 3. By @ref[1.2.58], @deva[जाति] words can optionally take plural for singular. Here @deva[नित्यम्] overrides that: the @deva[द्वन्द्व] is obligatorily dual.

**Repetition of @deva[नक्षत्र]:** The @deva[सूत्र] says @deva[नक्षत्र] again (though it continues from @ref[1.2.60]) to extend the rule to synonyms of @deva[तिष्य] — namely @deva[पुष्य] and @deva[सिद्ध]. This is a @deva[ज्ञापक] (implicit indication) that every @deva[द्वन्द्व] optionally admits singular form.

**@deva[नित्यम्] and @deva[विकल्प]:** @deva[नित्यम्] cancels the @deva[अन्यतरस्याम्] (option) that has been running since @ref[1.2.58]. Without @deva[नित्यम्], the dual would be merely optional.

**Contrast with other star @deva[द्वन्द्व]s:**
- @deva[विशाखानुराधाः] "@[viśākhā] and @[anurādhā]" — plural (no special rule)
- @deva[तिष्यपुनर्वसू] — dual (this rule)

**Position in the section:** This is the last asterism-specific number rule. From @ref[1.2.64] onward, the topic shifts to @deva[एकशेष] (retention of one among identicals).
"""

id = "1.4.94"
numericId = "14094"

[en]
simple = """
The word @deva[सु] "well" is @deva[कर्मप्रवचनीय] "action-qualifier" when expressing respect toward the person addressed.

When a speaker uses @deva[सु] to honor someone — saying "excellently done by your honor" — it is not a verb prefix but an independent particle.

**Examples:**
- @deva[सुस्तुतं भवता] "excellently praised by your honor"
- @deva[सुसिक्तं भवता] "excellently sprinkled by your honor"

**Contrast — no respect:** @deva[सुषिक्तं किं तवात्र] "has your place been well sprinkled?" — here @deva[सु] is a simple @deva[उपसर्ग] "verb prefix" (no honorific intent), so @deva[स] becomes @deva[ष] by @ref[8.3.65].

Notice: @deva[सुसिक्तम्] (respectful, no @deva[ष]) vs @deva[सुषिक्तम्] (neutral, @deva[ष]-change). The designation determines the phonology.
"""

standard = """
@deva[सु] is @deva[कर्मप्रवचनीय] when expressing @deva[पूजा] (respect/honor) — @deva[सुः पूजायाम्].

**Rule type — @deva[संज्ञा]:** @deva[कर्मप्रवचनीय] in the respectful sense only.

**Examples:**
- @deva[सुस्तुतं भवता] "excellently praised by your honor"
- @deva[सुसिक्तं भवता] "excellently sprinkled by your honor"

**Contrast:** @deva[सुषिक्तं किं तवात्र] "has your place been well sprinkled?" — no respect, so @deva[सु] = @deva[उपसर्ग], triggering @deva[स] → @deva[ष] by @ref[8.3.65].

**Phonological diagnostic:** The presence or absence of @deva[ष]-substitution reveals the speaker's intent:
- @deva[सुसिक्तम्] — @deva[कर्मप्रवचनीय] (respectful) → no @deva[ष]
- @deva[सुषिक्तम्] — @deva[उपसर्ग] (neutral) → @deva[ष] applies

**@deva[पूजा] = "honor, respect":** The particle @deva[सु] acquires @deva[कर्मप्रवचनीय] status only when the speaker intends to honor the addressee. The same word @deva[सु] in non-respectful contexts remains @deva[उपसर्ग].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[सुः पूजायाम्] — @deva[सु] is @deva[कर्मप्रवचनीय] in the @deva[पूजा] (respect) sense.

**Speaker's intent determines designation:** This rule makes grammatical classification depend on pragmatic intent — the same phonological string @deva[सु] + verb receives different designations based on whether the speaker intends respect. This is one of the clearest cases in the @deva[अष्टाध्यायी] where @deva[विवक्षा] (speaker's intention) drives formal grammar.

**@deva[एकासंज्ञा] and @ref[8.3.65]:** When @deva[सु] is @deva[कर्मप्रवचनीय], @ref[1.4.1] prevents it from simultaneously being @deva[उपसर्ग]. Since @ref[8.3.65] (@deva[ष]-substitution) is triggered specifically by @deva[उपसर्ग] status, the @deva[कर्मप्रवचनीय] designation blocks the phonological change. Result: @deva[सुसिक्तम्] (not @deva[सुषिक्तम्]).

**Practical consequence:** A listener hearing @deva[सुसिक्तम्] (without @deva[ष]) understands the speaker is being respectful. Hearing @deva[सुषिक्तम्] (with @deva[ष]) indicates a neutral, factual statement. Phonology encodes politeness.

**@deva[सु] as @deva[प्रादि]:** @deva[सु] belongs to the @deva[प्रादि] list (@ref[1.4.58]), making it eligible for both @deva[उपसर्ग] (@ref[1.4.59]) and @deva[कर्मप्रवचनीय] (this rule). The sense determines which designation applies.
"""

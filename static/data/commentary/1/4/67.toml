id = "1.4.67"
numericId = "14067"

[en]
simple = """
The indeclinable word @deva[पुरस्] "in front, before" is called @deva[गति] when combined with a verb.

@deva[पुरस्] combines with verbs like @deva[कृ] "to make" to mean "to place in front" or "to honor."

**Examples:**
- @deva[पुरस्कृत्य] "having placed in front / having honored"
- @deva[पुरस्कृतम्] "placed in front / honored"

**Contrast:** When @deva[पुर्] is a declinable noun meaning "city" — @deva[पुरः कृत्वा] "having made a city" — it is not @deva[गति], and the gerund is @deva[कृत्वा] (not @deva[कृत्य]).
"""

standard = """
The indeclinable @deva[पुरस्] with a verb is @deva[गति] — @deva[पुरसोऽव्ययस्य].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Restricted to the indeclinable form @deva[पुरस्], not the noun @deva[पुर्].

**Examples:**
- @deva[पुरस्कृत्य] "having honored" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[पुरस्कृतम्] "honored" (accent by @ref[6.2.49])
- @deva[यत्पुरस्करोति] "when he honors" (accent by @ref[8.2.71])

**@deva[पुरस्] formation:** @deva[पूर्व] + @deva[असि] (by @ref[5.3.39]) → @deva[पुरस्]. It is @deva[अव्यय] (indeclinable) by @ref[1.1.38].

**@deva[अव्यय] restriction:** The rule specifies @deva[अव्ययस्य] — only the indeclinable @deva[पुरस्] qualifies. The noun @deva[पुर्] "city" (nominative @deva[पूः], genitive @deva[पुरः]) is declinable and does not receive @deva[गति].

**Contrast:** @deva[पुरः कृत्वा काण्डं गतः] — @deva[पुरः] is the genitive/ablative of the noun @deva[पुर्], not the indeclinable → no @deva[गति] → @deva[कृत्वा].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[पुरसोऽव्ययस्य] — the indeclinable @deva[पुरस्] is @deva[गति].

**@deva[अव्यय] qualifier — disambiguation:** Without @deva[अव्ययस्य], the rule could be misapplied to the noun @deva[पुर्] "city" (which also has a form @deva[पुरः]). The explicit restriction to the indeclinable form prevents this.

**Phonological effect — @deva[विसर्ग]:** @deva[पुरस्] ends in @deva[स्], which becomes @deva[विसर्ग] (@deva[पुरः]) in certain environments. Before @deva[क] of @deva[कृ], the @deva[विसर्ग] becomes @deva[स्] by @ref[8.3.40]: @deva[पुरस्कृत्य].

**@deva[गति] vs @deva[उपसर्ग]:** @deva[पुरस्] is not in the @deva[प्रादिगण], so it cannot be @deva[उपसर्ग]. It receives only @deva[गति] status. This means @deva[पुरस्] triggers @deva[ल्यप्] (@ref[7.1.37]) and accent rules, but not @deva[ण]-substitution (@ref[8.4.14], which requires @deva[उपसर्ग]).

**Pattern:** @ref[1.4.67]–@ref[1.4.68] add specific indeclinables (@deva[पुरस्], @deva[अस्तम्]) to @deva[गति] — words that behave like prefixes in compound expressions.
"""

id = "1.4.66"
numericId = "14066"

[en]
simple = """
The words @deva[कणे] and @deva[मनस्] are called @deva[गति] when they express "satiation" — satisfying a desire so completely that one is revolted or done with it.

**Examples (@deva[गति] — satiation sense):**
- @deva[कणेहत्य पयः पिबति] "he drinks milk to utter satisfaction"
- @deva[मनोहत्य पयः पिबति] "he drinks milk until completely sated"

The compound with @deva[हन्] "to strike/destroy (desire)" expresses consuming something until the craving is killed.

**Contrast (not @deva[गति]):**
- @deva[कणे हत्वा गतः] "having struck the grain, he went" — @deva[कणे] here refers to grain literally, not satiation.
"""

standard = """
@deva[कणे] and @deva[मनस्] with a verb are @deva[गति] when meaning @deva[श्रद्धाप्रतीघात] (satiation, desire-quenching) — @deva[कणेमनसी श्रद्धाप्रतीघाते].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Meaning-restricted to the satiation sense.

**Examples:**
- @deva[कणेहत्य पयः पिबति] "he drinks milk to complete satiation" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[मनोहत्य पयः पिबति] "he drinks milk until the heart's desire is destroyed"

**@deva[श्रद्धाप्रतीघात] = "striking down of desire":** @deva[श्रद्धा] (desire/appetite) + @deva[प्रतीघात] (striking back). The expression means consuming until the desire itself is destroyed — a state beyond mere satisfaction.

**Contrast:**
- @deva[कणे हत्वा गतः] — @deva[कणे] = "grain" (locative), not satiation → not @deva[गति] → @deva[हत्वा] (not @deva[हत्य])
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[कणेमनसी श्रद्धाप्रतीघाते] — @deva[कणे] and @deva[मनस्] are @deva[गति] in the sense of desire-satiation.

**@deva[श्रद्धाप्रतीघात] analysis:** @deva[श्रद्धा] here means "appetite/desire" (not its more common meaning of "faith"). @deva[प्रतीघात] = "counter-striking." The compound describes the destruction of desire through excess — consuming until one is revolted. This is an idiomatic compound restricted to specific cultural usage.

**Dual @deva[गति] words:** Both @deva[कणे] (from @deva[कण] "grain/particle") and @deva[मनस्] ("mind/heart") serve as @deva[गति] in this expression. @deva[कणेहन्] and @deva[मनोहन्] are essentially synonymous in this context — both express "destroying (the appetite for) grain/food."

**Diagnostic:** @deva[कणेहत्य] (compound, @deva[ल्यप्]) = satiation sense, @deva[गति] applies. @deva[कणे हत्वा] (separate, @deva[त्वा]) = literal sense, @deva[गति] does not apply.

**Continuing pattern:** Like @ref[1.4.63]–@ref[1.4.65], this rule adds semantically restricted words to the @deva[गति] class. The @deva[गति] section (@ref[1.4.60]–@ref[1.4.79]) is the longest subsection within the @deva[निपात] @deva[अधिकार].
"""

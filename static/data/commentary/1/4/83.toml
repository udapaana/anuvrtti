id = "1.4.83"
numericId = "14083"

[en]
simple = """
From this rule through @ref[1.4.97], certain particles are called @deva[कर्मप्रवचनीय] "action-qualifier."

A @deva[कर्मप्रवचनीय] is a particle that qualifies the action of a verb — similar to an adverb. Unlike @deva[उपसर्ग] (which directly modifies the verb's meaning), a @deva[कर्मप्रवचनीय] operates on the action itself, often governing a noun in a particular case.

The name breaks down as: @deva[कर्म] "action" + @deva[प्रवचनीय] "that which speaks about" — a word that "speaks about" or qualifies the action.

**Example:**
- @deva[सुस्तुतं भवता] "well-praised by you" — @deva[सु] qualifies the praising. Since @deva[सु] is @deva[कर्मप्रवचनीय] (not @deva[उपसर्ग]), certain phonological rules like @deva[ष]-substitution do not apply.
"""

standard = """
From here through @ref[1.4.97], certain particles are @deva[कर्मप्रवचनीय] — @deva[कर्मप्रवचनीयाः].

**Rule type — @deva[अधिकार] (heading):** Governs @ref[1.4.83]–@ref[1.4.97]. Particles described in this range receive the @deva[कर्मप्रवचनीय] designation.

**Example:**
- @deva[सुस्तुतं भवता] "well-praised by you" — @deva[सु] is @deva[कर्मप्रवचनीय], not @deva[उपसर्ग]

**Distinction from @deva[उपसर्ग]/@deva[गति]:**
- @deva[उपसर्ग]: modifies verb meaning directly (prefix-verb compound)
- @deva[गति]: triggers compounding effects (@deva[ल्यप्], accent)
- @deva[कर्मप्रवचनीय]: qualifies the action adverbially and governs a noun's case

**Case governance:** @deva[कर्मप्रवचनीय] particles govern the accusative of their associated noun by @ref[2.3.8]. This is their distinctive grammatical property.

**Phonological consequence:** @deva[कर्मप्रवचनीय] status blocks @deva[उपसर्ग]-specific rules like @deva[ष]-substitution (@ref[8.3.65]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[निपाताः] from @ref[1.4.56].

@deva[कर्मप्रवचनीयाः] — (the following are) @deva[कर्मप्रवचनीय].

**@deva[अधिकार] scope:** @ref[1.4.83]–@ref[1.4.97]. This is the third major subsection within the @deva[निपात] @deva[अधिकार] (@ref[1.4.56]–@ref[1.4.97]), after the @deva[निपात] definition (@ref[1.4.57]–@ref[1.4.58]) and the @deva[गति]/@deva[उपसर्ग] section (@ref[1.4.59]–@ref[1.4.82]).

**@deva[कर्मप्रवचनीय] properties:**
1. Governs accusative by @ref[2.3.8]
2. Does not trigger @deva[उपसर्ग]-specific phonological rules
3. Is also @deva[निपात] (under the @ref[1.4.56] @deva[अधिकार])
4. Is NOT @deva[उपसर्ग] or @deva[गति] — these designations are mutually exclusive in context

**Same words, different roles:** Many @deva[कर्मप्रवचनीय] words (@deva[अनु], @deva[अभि], @deva[प्रति], etc.) are also @deva[प्रादि] words. Whether a word is @deva[उपसर्ग] (with verb) or @deva[कर्मप्रवचनीय] (qualifying action independently) depends on its syntactic function in the sentence.

**@deva[सुस्तुतम्] example:** @deva[सु] + @deva[स्तुतम्] — if @deva[सु] were @deva[उपसर्ग], @ref[8.3.65] would change @deva[स] to @deva[ष] (giving @deva[सुष्टुतम्]). Since @deva[सु] is @deva[कर्मप्रवचनीय] here, the change does not occur — @deva[सुस्तुतम्] remains.
"""

id = "1.4.87"
numericId = "14087"

[en]
simple = """
The word @deva[उप] is @deva[कर्मप्रवचनीय] "action-qualifier" when expressing superiority or inferiority in a comparison.

**Examples:**
- @deva[उपखार्यां द्रोणः] "a @deva[द्रोण] exceeds a @deva[खारी]" — the inferior measure (@deva[खारी]) takes locative
- @deva[उप शाकटायनं वैयाकरणाः] "grammarians are inferior to @deva[शाकटायन]" — the superior person takes accusative

@deva[उप] can mark either direction of the comparison depending on context.
"""

standard = """
@deva[उप] is @deva[कर्मप्रवचनीय] when expressing superiority or inferiority — @deva[उपो ऽधिके च].

**Rule type — @deva[संज्ञा]:** Assigns @deva[कर्मप्रवचनीय] to @deva[उप] in comparative sense.

**Examples:**
- @deva[उपखार्यां द्रोणः] "a @deva[द्रोण] exceeds a @deva[खारी]" — inferior in locative by @ref[2.3.9]
- @deva[उप निष्के कार्षापणः] "a @deva[कार्षापण] exceeds a @deva[निष्क]"
- @deva[उप शाकटायनं वैयाकरणाः] "grammarians are inferior to @deva[शाकटायन]" — superior in accusative

**Dual case governance:**
- The inferior entity takes @deva[सप्तमी] (locative) by @ref[2.3.9]
- The superior entity takes @deva[द्वितीया] (accusative) by @ref[2.3.8]

**@deva[अधिक] = "superior, in excess":** The rule mentions @deva[अधिके] to cover the superiority sense specifically. The inferiority sense is included by the @deva[कर्मप्रवचनीय] heading.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[उपो ऽधिके च] — @deva[उप] is @deva[कर्मप्रवचनीय] in comparative (superiority/inferiority) sense.

**Dual-case system:** @deva[उप] as @deva[कर्मप्रवचनीय] uniquely governs two different cases:
- Locative for the inferior term (@ref[2.3.9]): @deva[उपखार्यां द्रोणः]
- Accusative for the superior term (@ref[2.3.8]): @deva[उप शाकटायनं वैयाकरणाः]

This dual-case behavior distinguishes @deva[उप] from other @deva[कर्मप्रवचनीय] particles, which typically govern only accusative.

**Overlap with @deva[अनु] (@ref[1.4.86]):** Both @deva[अनु] and @deva[उप] serve as comparative particles. @deva[अनु] focuses on inferiority; @deva[उप] covers both directions.

**@deva[खारी] and @deva[द्रोण]:** These are traditional measures of volume. A @deva[द्रोण] exceeds a @deva[खारी] — the comparison is between quantities, with @deva[उप] marking the relationship.
"""

id = "1.4.90"
numericId = "14090"

[en]
simple = """
The words @deva[प्रति] "toward," @deva[परि] "around," and @deva[अनु] "after" are @deva[कर्मप्रवचनीय] "action-qualifiers" when expressing direction, circumstance, share, or distribution.

These three particles serve multiple functions:

**Examples:**
1. **Direction:** @deva[वृक्षं प्रति विद्योतते विद्युत्] "lightning flashes toward the tree"
2. **Circumstance:** @deva[साधुर्देवदत्तो मातरं प्रति] "Devadatta is good as regards his mother"
3. **Share:** @deva[हरं प्रति हलाहलम्] "the poison fell to Hara's share"
4. **Distribution:** @deva[वृक्षं वृक्षं प्रति सिञ्चति] "he waters tree after tree"

In each case, the governed noun takes the accusative.
"""

standard = """
@deva[प्रति], @deva[परि], and @deva[अनु] are @deva[कर्मप्रवचनीय] when expressing @deva[लक्षण] (direction), circumstance, @deva[भाग] (share), or @deva[ईप्सा] (distribution) — @deva[प्रतिपर्यनवस्तद्विषये].

**Rule type — @deva[संज्ञा]:** @deva[कर्मप्रवचनीय] in four senses for three particles.

**Examples:**
1. @deva[लक्षण] (direction): @deva[वृक्षं प्रति विद्योतते विद्युत्] "lightning toward the tree"
2. Circumstance: @deva[साधुर्देवदत्तो मातरं प्रति] "Devadatta is good regarding his mother"
3. @deva[भाग] (share): @deva[हरं प्रति हलाहलम्] "poison falls to Hara's share"
4. @deva[ईप्सा] (distribution): @deva[वृक्षं वृक्षं प्रति सिञ्चति] "he waters tree by tree"

**All three interchangeable:** @deva[प्रति], @deva[परि], and @deva[अनु] are equivalent in these functions: @deva[वृक्षं प्रति] = @deva[वृक्षं परि] = @deva[वृक्षम् अनु] (in directional sense).

**Case governance:** Accusative by @ref[2.3.8] for all four senses.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[प्रतिपर्यनवस्तद्विषये] — @deva[प्रति], @deva[परि], and @deva[अनु] are @deva[कर्मप्रवचनीय] in their respective domains.

**Four semantic functions:**
1. **@deva[लक्षण] (directional sign):** @deva[वृक्षं प्रति विद्योतते] — the tree is the target-direction of lightning
2. **Circumstance (@deva[विषय]):** @deva[मातरं प्रति साधुः] — the mother is the domain in which goodness applies
3. **@deva[भाग] (share/portion):** @deva[हरं प्रति हलाहलम्] — the poison is Hara's allocated share
4. **@deva[ईप्सा] (distribution/pervasion):** @deva[वृक्षं वृक्षम्] — the iterative construction expresses tree-by-tree application

**Multiple @deva[कर्मप्रवचनीय] designations for same particle:** @deva[अनु] already has @deva[कर्मप्रवचनीय] designations from @ref[1.4.84]–@ref[1.4.86]. @deva[परि] has one from @ref[1.4.88] (exclusion). This rule adds further senses — the particles accumulate @deva[कर्मप्रवचनीय] functions across multiple rules.

**@deva[प्रति] as the prototypical @deva[कर्मप्रवचनीय]:** Among the three, @deva[प्रति] is most commonly encountered in these functions, especially in the "regarding" sense (@deva[मातरं प्रति]).
"""

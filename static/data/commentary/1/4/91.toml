id = "1.4.91"
numericId = "14091"

[en]
simple = """
The word @deva[अभि] "toward" is @deva[कर्मप्रवचनीय] "action-qualifier" when expressing direction, circumstance, or distribution — but **not** when expressing "share."

This rule gives @deva[अभि] almost the same range as @deva[प्रति], @deva[परि], and @deva[अनु] in the previous rule (@ref[1.4.90]), but with one sense excluded.

**Examples:**
1. **Direction:** @deva[वृक्षमभि विद्योतते विद्युत्] "lightning flashes toward the tree"
2. **Circumstance:** @deva[मातरमभि साधुर्देवदत्तः] "Devadatta is good as regards his mother"

**Not @deva[कर्मप्रवचनीय] for share:** @deva[यदत्र ममाभिष्यात् तद् दीयताम्] "give what falls to my share" — here @deva[अभि] is an @deva[उपसर्ग] (verb prefix), not a @deva[कर्मप्रवचनीय].
"""

standard = """
@deva[अभि] is @deva[कर्मप्रवचनीय] for @deva[लक्षण] (direction), circumstance, and @deva[ईप्सा] (distribution) — but not for @deva[भाग] (share) — @deva[अभिरभागे].

**Rule type — @deva[संज्ञा]:** @deva[कर्मप्रवचनीय] in three of the four senses from @ref[1.4.90].

**Examples:**
1. @deva[लक्षण]: @deva[वृक्षमभि विद्योतते विद्युत्] "lightning toward the tree"
2. Circumstance: @deva[मातरमभि साधुर्देवदत्तः] "good regarding his mother"

**@deva[भाग] excluded:** @deva[यदत्र ममाभिष्यात् तद् दीयताम्] "give what falls to my share" — @deva[अभि] here is @deva[उपसर्ग], not @deva[कर्मप्रवचनीय].

**Phonological test:** When @deva[अभि] is @deva[उपसर्ग], @deva[स] → @deva[ष] by @ref[8.3.65] (as in @deva[अभिष्यात्]). When @deva[कर्मप्रवचनीय], no such substitution occurs.

**Case governance:** Accusative by @ref[2.3.8] for all three senses.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[अभिरभागे] — @deva[अभि] is @deva[कर्मप्रवचनीय] in the senses from @ref[1.4.90] except @deva[भाग] (share).

**Three senses retained, one excluded:** @ref[1.4.90] assigns @deva[कर्मप्रवचनीय] to @deva[प्रति], @deva[परि], and @deva[अनु] in four senses: @deva[लक्षण], circumstance, @deva[भाग], and @deva[ईप्सा]. This rule extends three of those to @deva[अभि] but explicitly excludes @deva[भाग] with @deva[अभागे].

**Why exclude @deva[भाग]?** In the share sense, @deva[अभि] combines with a verb (@deva[अभिष्यात्] from @deva[अभि] + @deva[अस्]), making it @deva[उपसर्ग] by @ref[1.4.59]. The @deva[कर्मप्रवचनीय] designation would conflict with its @deva[उपसर्ग] function, so the rule excludes this sense.

**@deva[उपसर्ग] vs @deva[कर्मप्रवचनीय] diagnostic:** @deva[अभिष्यात्] shows @deva[स] → @deva[ष] by @ref[8.3.65], confirming @deva[उपसर्ग] status. In @deva[कर्मप्रवचनीय] usage, no @deva[ष]-substitution occurs — the same phonological test as @deva[परि] in @ref[1.4.88].

**Relationship to @ref[1.4.90]:** @deva[अभि] nearly matches @deva[प्रति]/etc. but the @deva[भाग] exclusion shows that @deva[कर्मप्रवचनीय] designations are finely calibrated — not all particles serve all senses.
"""

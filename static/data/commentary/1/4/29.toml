id = "1.4.29"
numericId = "14029"

[en]
simple = """
With verbs of formal learning or systematic study, the teacher (the source from whom knowledge is acquired) is called @deva[अपादान] "ablative source."

**Examples:**
- @deva[उपाध्यायादधीते] "he studies from the teacher" (@deva[उपाध्याय] is @deva[अपादान])
- @deva[उपाध्यायादागमयति] "he acquires knowledge from the teacher"

Knowledge metaphorically "departs" from the teacher to the student. The teacher is the fixed source from which learning flows.

**Distinct from casual hearing:** With verbs of simple hearing, the source takes the genitive (not ablative):
- @deva[नटस्य शृणोति] "he hears the actor" (genitive — not @deva[अपादान])
"""

standard = """
With formal learning verbs (@deva[अधि] + @deva[इ] "to study," @deva[आ] + @deva[गम्] "to acquire knowledge"), the teacher is @deva[अपादान] — @deva[आख्यातोपयोगे].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.24]:** Knowledge flows from teacher to student — the teacher is the fixed source.

**Examples:**
- @deva[उपाध्यायादधीते] "he studies from the teacher"
- @deva[उपाध्यायादागमयति] "he acquires knowledge from the teacher"

**@deva[आख्यातोपयोग] = "systematic teaching/learning":** Formal instruction, not casual hearing or passive reception.

**Distinction — formal vs casual:**
- Formal learning: @deva[उपाध्यायादधीते] (ablative — @deva[अपादान])
- Casual hearing: @deva[नटस्य शृणोति] (genitive — not @deva[अपादान])

**Scope:** The rule covers the teacher as source. The subject studied (Vedas, grammar, etc.) may be @deva[कर्मन्] (accusative).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अपादान] from @ref[1.4.24]; @deva[कारके] from @ref[1.4.23].

@deva[आख्यातोपयोगे] — in systematic teaching/learning, the teacher is @deva[अपादान].

**Knowledge as departure:** The teacher is a repository of knowledge. When learning occurs, knowledge "departs" from the teacher — the teacher remains the fixed source (@deva[ध्रुव]), fulfilling @ref[1.4.24]'s core definition.

**@deva[आख्यातोपयोग] interpretation:** @deva[कात्यायन] glosses this as @deva[आख्यानं प्रत्यक्षकथनम्] — direct, systematic exposition, as opposed to incidental hearing.

**Formal vs casual distinction:**
- @deva[अधीते] (formal study): ablative — teacher is @deva[अपादान]
- @deva[शृणोति] (hearing): genitive — source is @deva[सम्बन्ध], not @deva[कारक]

This distinction shows that @deva[कारक] assignment is meaning-dependent: the same physical scenario (receiving knowledge from X) gets different case marking depending on the verb's implication of formality.

**@deva[अपादान] series position:** Eighth extension (@ref[1.4.24]–@ref[1.4.31]).
"""

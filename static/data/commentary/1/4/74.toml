id = "1.4.74"
numericId = "14074"

[en]
simple = """
Words like @deva[साक्षात्] "before one's eyes, evidently" and @deva[मिथ्या] "falsely" are optionally @deva[गति] when combined with @deva[कृ] "to make."

These words express making something what it was not before — making something evident, making something false, etc.

**Examples (both valid):**
- @deva[साक्षात्कृत्य] "having made manifest" (compound — @deva[गति])
- @deva[साक्षात् कृत्वा] "having made manifest" (separate — no @deva[गति])
- @deva[मिथ्याकृत्य] "having falsified" or @deva[मिथ्या कृत्वा]

The compound form is more common in literary Sanskrit, especially @deva[साक्षात्कृ] "to realize, to make visible."
"""

standard = """
@deva[साक्षात्] etc. with @deva[कृ] are optionally @deva[गति] — @deva[साक्षात्प्रभृतीनि च].

**Rule type — @deva[विभाषा] extension of @deva[गति]:** Both compound and separate forms are valid.

**Examples:**
- @deva[साक्षात्कृत्य] / @deva[साक्षात् कृत्वा] "having realized/made evident"
- @deva[मिथ्याकृत्य] / @deva[मिथ्या कृत्वा] "having falsified"

**@deva[प्रभृति] = "etc.":** The list includes @deva[साक्षात्], @deva[मिथ्या], and similar adverbs that express transformation — making something into a state it was not in before.

**@deva[च्वि]-like force:** These words imply a @deva[च्वि] transformation — "making X what was not-X." @deva[साक्षात्कृ] = "making visible what was hidden"; @deva[मिथ्याकृ] = "making false what was true."

**Restriction to @deva[कृ]:** Like @ref[1.4.73], the @deva[गति] status applies specifically with @deva[कृ].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[विभाषा] from @ref[1.4.72]; @deva[क्रियायोगे] from @ref[1.4.59].

@deva[साक्षात्प्रभृतीनि च] — @deva[साक्षात्] and similar words are optionally @deva[गति] with @deva[कृ].

**@deva[प्रभृति] = "beginning with":** The rule covers @deva[साक्षात्] and a set of similar adverbs. The @deva[काशिका] includes @deva[मिथ्या] "falsely," @deva[आविस्] "openly," and others expressing states or qualities that can be "made" by @deva[कृ].

**@deva[च्वि] parallel:** By @deva[वार्त्तिक], these words carry @deva[च्वि]-like force — expressing transformation to an opposite state. @deva[साक्षात्] (visible) implies the thing was hidden; @deva[मिथ्या] (false) implies it was true. This is semantically parallel to @deva[च्वि] (@ref[5.4.50]) but without the formal @deva[च्वि] affix.

**Lexicalized compounds:** @deva[साक्षात्कार] "realization, direct perception" is a major philosophical term in Indian thought. Its compound formation is licensed by this @deva[गति] rule.

**Optional block continues:** This is part of the @ref[1.4.72]–@ref[1.4.79] optional @deva[गति] series.
"""

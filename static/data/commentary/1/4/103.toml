id = "1.4.103"
numericId = "14103"

[en]
simple = """
The @deva[सुप्] case endings (used with nouns, adjectives, and pronouns) also have the same three number names:

1. **@deva[एकवचन] "singular"** — one: @deva[रामः] "@[rāma]"
2. **@deva[द्विवचन] "dual"** — two: @deva[रामौ] "the two @[rāmas]"
3. **@deva[बहुवचन] "plural"** — many: @deva[रामाः] "the @[rāmas]"

There are twenty-one @deva[सुप्] endings total: seven cases, each with three numbers. This rule extends the number terminology from verb endings (@ref[1.4.102]) to noun endings.
"""

standard = """
The @deva[सुप्] endings also use @deva[एकवचन], @deva[द्विवचन], @deva[बहुवचन] — @deva[सुपः].

**Rule type — @deva[संज्ञा]:** Extends the @deva[वचन] names from @ref[1.4.102] to nominal endings.

**@deva[सुप्] structure:** Twenty-one endings (the @deva[प्रत्याहार] from @deva[सु] to @deva[प्]) arranged in seven triads (one per case):
- @deva[प्रथमा]: @deva[सु], @deva[औ], @deva[जस्]
- @deva[द्वितीया]: @deva[अम्], @deva[औट्], @deva[शस्]
- Through @deva[सप्तमी]: @deva[ङि], @deva[ओस्], @deva[सुप्]

Within each triad: first = @deva[एकवचन], second = @deva[द्विवचन], third = @deva[बहुवचन].

**Parallel to @ref[1.4.102]:** Just as @deva[तिङ्] triads get @deva[वचन] names, @deva[सुप्] triads get the same names. Together, both rules cover the entire inflectional system of Sanskrit.

**Result:** 7 cases × 3 numbers = 21 @deva[सुप्] endings, each identifiable by case and number.
"""

advanced = """
@deva[सुपः] — the @deva[सुप्] endings also receive the @deva[एकवचन]/etc. designations from @ref[1.4.102].

**@deva[अनुवृत्ति]:** @deva[एकवचनद्विवचनबहुवचनानि] from @ref[1.4.102]; @deva[एकशः] from @ref[1.4.102].

**Why a separate rule?** @ref[1.4.102] applies to @deva[तिङ्] endings (verbal). This rule extends the same @deva[संज्ञा] to @deva[सुप्] (nominal). A single rule could not cover both because @deva[तिङ्] and @deva[सुप्] are distinct @deva[प्रत्याहार] groups with different internal structures (person-based vs case-based triads).

**@deva[विभक्ति] for @deva[सुप्]:** By @ref[1.4.104], each @deva[सुप्] triad is a @deva[विभक्ति]. Combined with the case names (@deva[प्रथमा] through @deva[सप्तमी]), this gives the standard terminology: @deva[प्रथमा विभक्ति एकवचन] = nominative singular = the affix @deva[सु].

**Twenty-one endings:** The @deva[सुप्] @deva[प्रत्याहार] covers @deva[सु], @deva[औ], @deva[जस्], @deva[अम्], @deva[औट्], @deva[शस्], @deva[टा], @deva[भ्याम्], @deva[भिस्], @deva[ङे], @deva[भ्याम्], @deva[भ्यस्], @deva[ङसि], @deva[भ्याम्], @deva[भ्यस्], @deva[ङस्], @deva[ओस्], @deva[आम्], @deva[ङि], @deva[ओस्], @deva[सुप्] — introduced at @ref[4.1.2].
"""

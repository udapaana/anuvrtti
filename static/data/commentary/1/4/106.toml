id = "1.4.106"
numericId = "14106"

[en]
simple = """
When speaking ironically or mockingly, a special person-shift occurs: the verb @deva[मन्] "to think" takes first-person form (@deva[मन्ये] "I think"), while the dependent verb takes second-person form.

**Example (ironic):** @deva[एहि मन्ये ओदनं भोक्ष्यसे] "Come along — I suppose you'll eat the rice!" — said sarcastically, implying the person will not actually eat.

Here @deva[मन्ये] "I think" is first person, and @deva[भोक्ष्यसे] "you will eat" is second person, even though the thought belongs to the addressee.

**Normal (non-ironic):** @deva[एहि मन्यसे ओदनं भोक्ष्ये] "Come, you think 'I will eat rice'" — here person agreement is regular: @deva[मन्यसे] "you think" (2nd person) and @deva[भोक्ष्ये] "I will eat" (1st person, the addressee's thought).

The ironic construction flips the persons to signal mockery.
"""

standard = """
In @deva[प्रहास] (ironic/mocking speech), @deva[मन्] takes @deva[उत्तम एकवचन] and the dependent verb takes @deva[मध्यम] — @deva[प्रहासे च मन्योपपदे मन्यतेरुत्तम एकवचनम्].

**Rule type — @deva[विधि]:** Special person-assignment overriding normal agreement.

**Example (ironic):** @deva[एहि मन्ये ओदनं भोक्ष्यसे] "Come, I suppose you'll eat the rice" — mocking; the speaker attributes a thought to the addressee sarcastically.

**Normal:** @deva[एहि मन्यसे ओदनं भोक्ष्ये] "Come, you think 'I will eat'" — standard person agreement.

**Person shift:** Without this rule, @deva[मन्] would agree with the thinker (the addressee = @deva[मध्यम]), and the embedded verb would agree with its own subject. The ironic construction reverses this — @deva[मन्] becomes @deva[उत्तम] (as if the speaker is the thinker) and the embedded verb becomes @deva[मध्यम] (addressing the listener directly).

**@deva[प्रहास] = "mockery, irony":** This rule is conditioned on the speaker's communicative intent — one of the rare cases where pragmatic context directly alters morphological form.
"""

advanced = """
@deva[प्रहासे च मन्योपपदे मन्यतेरुत्तम एकवचनम्] — in @deva[प्रहास] (irony), when @deva[मन्] is the governing verb, it takes @deva[उत्तम एकवचन], and the dependent verb takes @deva[मध्यम].

**Position in the person system:** This rule is an exception to the normal person-assignment rules of @ref[1.4.105] and @ref[1.4.107]. Normally, @deva[मन्] would agree with its subject: if the addressee is thinking, @deva[मन्यसे] (2nd person). This rule overrides that agreement when the pragmatic condition of @deva[प्रहास] is met.

**@deva[विवक्षा]-dependent rule:** Like @ref[1.4.94] (@deva[सु] in respect), this rule makes grammatical form dependent on speaker intent. The same proposition can be expressed with normal agreement (non-ironic) or with reversed persons (ironic) — the morphology encodes the speech act.

**@deva[मन्ये] as parenthetical:** In the ironic construction, @deva[मन्ये] functions almost as a parenthetical — "I suppose" — rather than as the main predicate. The speaker takes ownership of the thought (@deva[उत्तम]) while directing the content at the addressee (@deva[मध्यम]).

**Scope:** The rule is narrow — it applies only to @deva[मन्] "to think" in ironic contexts, not to other verbs of thinking or speech. This specificity reflects the conventionalized nature of this particular ironic construction in classical Sanskrit.
"""

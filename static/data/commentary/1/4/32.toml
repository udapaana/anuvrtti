id = "1.4.32"
numericId = "14032"

[en]
simple = """
The person to whom the giver intends to transfer the object is called @deva[सम्प्रदान] "recipient."

When you give something, there are three participants: the giver, the thing given, and the receiver. The receiver — the person you want to connect with the gift — is the @deva[सम्प्रदान].

**Examples:**
- @deva[उपाध्यायाय गां ददाति] "he gives the cow to the teacher" (@deva[उपाध्याय] is @deva[सम्प्रदान])
- @deva[माणवकाय भिक्षां ददाति] "he gives alms to the boy"

The @deva[सम्प्रदान] takes the fourth case ending (@deva[चतुर्थी]) — the dative case.
"""

standard = """
The person the giver intends to connect with the object of giving is @deva[सम्प्रदान] — @deva[कर्मणा यमभिप्रैति स सम्प्रदानम्].

**Rule type — @deva[संज्ञा]:** Defines the second @deva[कारक] in @deva[पाणिनि]'s order — the recipient.

**Examples:**
- @deva[उपाध्यायाय गां ददाति] "he gives the cow to the teacher"
- @deva[माणवकाय भिक्षां ददाति] "he gives alms to the boy"

**Case marking:** @deva[सम्प्रदान] takes @deva[चतुर्थी] (4th case / dative) by @ref[2.3.13].

**Definition analysis:** @deva[कर्मणा यमभिप्रैति] — "whom one intends to reach by means of the @deva[कर्मन्] (object)." The giver wants the gift to reach the recipient. The recipient is the goal of the transfer.

**Scope:** This is the general definition. @ref[1.4.33]–@ref[1.4.41] extend @deva[सम्प्रदान] to non-giving contexts (pleasing, praising, owing, etc.).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कारके] from @ref[1.4.23].

@deva[कर्मणा यमभिप्रैति स सम्प्रदानम्] — the entity one intends to reach through the @deva[कर्मन्] is @deva[सम्प्रदान].

**Core definition:** @deva[सम्प्रदान] is the intended terminus of the gift-giving action. The giver (@deva[कर्ता]) seeks to connect the gift (@deva[कर्मन्]) with the recipient (@deva[सम्प्रदान]).

**@deva[अभिप्रैति] = "intends to reach":** The giver's intention is crucial. If one gives without intending the object to reach a specific person, that person may not be @deva[सम्प्रदान].

**@deva[सम्प्रदान] → @deva[चतुर्थी]:** @ref[2.3.13] maps @deva[सम्प्रदान] to the dative case.

**@deva[सम्प्रदान] extension series (@ref[1.4.32]–@ref[1.4.41]):**
- @ref[1.4.32] (this): general giving (core)
- @ref[1.4.33]: pleasing (@deva[रुच्]-sense)
- @ref[1.4.34]: praising/cursing
- @ref[1.4.35]: owing
- @ref[1.4.36]: anger/offense
- @ref[1.4.37]–@ref[1.4.41]: further extensions

**Order significance:** @deva[सम्प्रदान] is defined after @deva[अपादान]. By @ref[1.4.2], in a conflict, @deva[सम्प्रदान] (later) prevails over @deva[अपादान] (earlier).
"""

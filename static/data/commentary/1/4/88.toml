id = "1.4.88"
numericId = "14088"

[en]
simple = """
The words @deva[अप] "away from" and @deva[परि] "around, beyond" are @deva[कर्मप्रवचनीय] "action-qualifiers" when meaning "exclusion" or "except."

When something happens everywhere except a certain place, @deva[अप] or @deva[परि] marks the excluded item. The excluded noun takes the ablative case.

**Examples:**
- @deva[अपत्रिगर्तेभ्यो वृष्टो देवः] "it rained except for Trigarta"
- @deva[परित्रिगर्तेभ्यो वृष्टो देवः] "it rained except for Trigarta"

**Contrast (not exclusion):** @deva[ओदनं परिषिञ्चति] "he sprinkles the rice" — here @deva[परि] is @deva[उपसर्ग] (prefix to the verb), so @deva[स] becomes @deva[ष] by @ref[8.3.65].
"""

standard = """
@deva[अप] and @deva[परि] are @deva[कर्मप्रवचनीय] when expressing exclusion — @deva[अपपरी वर्जने].

**Rule type — @deva[संज्ञा]:** @deva[कर्मप्रवचनीय] in the exclusion sense.

**Examples:**
- @deva[अपत्रिगर्तेभ्यो वृष्टो देवः] "it rained except for Trigarta" (Trigarta excluded)
- @deva[परित्रिगर्तेभ्यो वृष्टो देवः] "same meaning"

**Case governance:** The excluded noun takes @deva[पञ्चमी] (ablative) by @ref[2.3.10].

**@deva[वर्जन] = "exclusion":** The particle marks what is left out from a general statement.

**Contrast — @deva[परि] as @deva[उपसर्ग]:**
- @deva[ओदनं परिषिञ्चति] "he sprinkles the rice" — @deva[परि] is @deva[उपसर्ग] → @deva[स] → @deva[ष] by @ref[8.3.65]
- @deva[परित्रिगर्तेभ्यः] — @deva[परि] is @deva[कर्मप्रवचनीय] → no @deva[ष]-substitution

The designation determines whether phonological rules triggered by @deva[उपसर्ग] apply.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[अपपरी वर्जने] — @deva[अप] and @deva[परि] are @deva[कर्मप्रवचनीय] in the @deva[वर्जन] (exclusion) sense.

**Ablative governance:** @ref[2.3.10] assigns ablative to nouns governed by @deva[कर्मप्रवचनीय] in the exclusion sense. This contrasts with the typical accusative governance of other @deva[कर्मप्रवचनीय] rules (@ref[2.3.8]).

**@deva[उपसर्ग] vs @deva[कर्मप्रवचनीय] — phonological test:** The critical practical difference is @deva[ष]-substitution (@ref[8.3.65]). When @deva[परि] is @deva[उपसर्ग]: @deva[परिषिञ्चति] (@deva[स] → @deva[ष]). When @deva[कर्मप्रवचनीय]: @deva[परित्रिगर्तेभ्यः] (no @deva[ष]-substitution, because no @deva[उपसर्ग] status). This is the diagnostic the tradition uses.

**@deva[अप] and @deva[परि] overlap:** Both particles serve identical exclusion functions here. They are interchangeable in this context — @deva[अपत्रिगर्तेभ्यः] = @deva[परित्रिगर्तेभ्यः].
"""

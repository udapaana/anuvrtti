id = "1.4.97"
numericId = "14097"

[en]
simple = """
The word @deva[अधि] "over" is @deva[कर्मप्रवचनीय] "action-qualifier" when expressing lordship or sovereignty.

@deva[अधि] marks the ruler-subject relationship, and the governed noun takes the locative case.

**Examples:**
- @deva[अधि ब्रह्मदत्ते पञ्चालाः] "the @[pañcāla] people have Brahmadatta as their lord" — the lord (@deva[ब्रह्मदत्त]) takes locative
- @deva[अधि पञ्चालेषु ब्रह्मदत्तः] "Brahmadatta rules over the @[pañcāla] people" — the domain (@deva[पञ्चालाः]) takes locative

Either the ruler or the ruled can take the locative — the relationship is the same either way.

This is the **last** @deva[कर्मप्रवचनीय] rule. The @deva[कर्मप्रवचनीय] section runs from @ref[1.4.83] to this rule.
"""

standard = """
@deva[अधि] is @deva[कर्मप्रवचनीय] for @deva[ईश्वर] (lordship/sovereignty) — @deva[अधिरीश्वरे].

**Rule type — @deva[संज्ञा]:** Final @deva[कर्मप्रवचनीय] rule, closing the section begun at @ref[1.4.83].

**Examples:**
- @deva[अधि ब्रह्मदत्ते पञ्चालाः] "the @[pañcālas] have Brahmadatta as lord" — lord in locative
- @deva[अधि पञ्चालेषु ब्रह्मदत्तः] "Brahmadatta rules over the @[pañcālas]" — domain in locative

**Case governance:** Locative (@deva[सप्तमी]) by @ref[2.3.9]. Either the ruler or the ruled territory/people may take the locative — the construction is flexible.

**@deva[ईश्वर] = "lord, sovereign":** @deva[अधि] expresses a power relationship. The locative marks whichever entity is being characterized — the lord who possesses sovereignty, or the domain over which sovereignty extends.

**@deva[अधि] across multiple rules:** @deva[अधि] has @deva[कर्मप्रवचनीय] status from @ref[1.4.93] (expletive) and this rule (lordship) — two different functions.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[अधिरीश्वरे] — @deva[अधि] is @deva[कर्मप्रवचनीय] in the @deva[ईश्वर] (lordship) sense. This is the final rule in the @deva[कर्मप्रवचनीय] section (@ref[1.4.83]–@ref[1.4.97]).

**Dual locative construction:** Unlike most @deva[कर्मप्रवचनीय] rules which govern accusative (@ref[2.3.8]) or ablative (@ref[2.3.10]–@ref[2.3.11]), this rule governs locative by @ref[2.3.9]. The locative can mark either term in the lordship relationship:
- @deva[अधि ब्रह्मदत्ते] — the lord takes locative (the people are subject-nominative)
- @deva[अधि पञ्चालेषु] — the domain takes locative (the lord is subject-nominative)

This flexibility parallels @deva[उप] in @ref[1.4.87], which also governs different cases for different readings.

**Section summary — @deva[कर्मप्रवचनीय] (@ref[1.4.83]–@ref[1.4.97]):** Fifteen rules assign @deva[कर्मप्रवचनीय] status to particles in specific senses. The particles are: @deva[अनु], @deva[उप], @deva[अप], @deva[परि], @deva[आ], @deva[प्रति], @deva[अभि], @deva[अधि], @deva[सु], @deva[अति], @deva[अपि]. Case governance varies: accusative (@ref[2.3.8]), locative (@ref[2.3.9]), ablative (@ref[2.3.10]–@ref[2.3.11]).

**@ref[1.4.1] @deva[एकासंज्ञा] throughout:** The entire @deva[कर्मप्रवचनीय] section depends on @ref[1.4.1] to prevent particles from simultaneously being @deva[उपसर्ग] or @deva[गति]. This mutual exclusion drives the phonological diagnostics (especially @deva[ष]-substitution by @ref[8.3.65]) that the tradition uses to distinguish the designations.
"""

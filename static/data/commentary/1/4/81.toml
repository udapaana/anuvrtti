id = "1.4.81"
numericId = "14081"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), @deva[गति] and @deva[उपसर्ग] words may follow the verb instead of preceding it.

In classical Sanskrit, the prefix always comes before the verb (by @ref[1.4.80]). But in Vedic Sanskrit, the prefix can come after.

**Example:**
- Vedic: @deva[आयातम् उप] "come ye" — @deva[उप] follows the verb @deva[आयातम्]
- Classical equivalent: @deva[उपायातम्] — @deva[उप] precedes

This is one of several special freedoms of Vedic word order.
"""

standard = """
In @deva[छन्दस्] (Vedic texts), @deva[गति] and @deva[उपसर्ग] may follow the verb — @deva[छन्दस्यनुपरिणयोरन्यतरस्याम्].

**Rule type — @deva[विभाषा] (Vedic option):** Overrides @ref[1.4.80]'s pre-verbal requirement for Vedic usage.

**Example:**
- @deva[वायविन्द्रश्च सुन्वत आयातमुपनिष्कृतम्] "O @[vāyu] and Indra, come to the prepared offering" (@deva[ऋग्वेद] I.2.6) — @deva[उप] follows @deva[आयातम्]

**Contrast (classical):** @deva[उपायातम्] — prefix must precede.

**Vedic license:** This reflects the freer word order of Vedic Sanskrit, where metrical and stylistic considerations allowed prefix-verb separation and reordering.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[उपसर्गाः] from @ref[1.4.59]; @deva[प्राग्धातोः] from @ref[1.4.80].

@deva[छन्दस्यनुपरिणयोरन्यतरस्याम्] — in @deva[छन्दस्], @deva[गति]/@deva[उपसर्ग] optionally follow the verb.

**@deva[छन्दस्] scope:** Applies only in Vedic texts — @deva[ऋग्वेद], @deva[यजुर्वेद], @deva[सामवेद], @deva[अथर्ववेद], and @deva[ब्राह्मण] literature. Classical Sanskrit (@deva[भाषा]) follows @ref[1.4.80] strictly.

**Vedic @deva[त्मेसिस]:** The phenomenon of prefix-verb separation in Vedic Sanskrit is well-documented. @ref[1.4.81]–@ref[1.4.82] together license both postposition and separation — the two main deviations from classical prefix-verb unity.

**@deva[अन्यतरस्याम्] = "optionally":** Even in Vedic, the classical pre-verbal position is also valid. The option goes both ways.
"""

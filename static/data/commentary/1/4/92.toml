id = "1.4.92"
numericId = "14092"

[en]
simple = """
The word @deva[प्रति] is @deva[कर्मप्रवचनीय] "action-qualifier" when meaning "representative of" or "in exchange for."

These are two new senses beyond those already assigned to @deva[प्रति] in @ref[1.4.90].

**Examples:**
1. **Representative:** @deva[अभिमन्युरर्जुनतः प्रति] "Abhimanyu represents Arjuna" — Abhimanyu stands in for Arjuna
2. **Exchange:** @deva[माषानस्मै तिलेभ्यः प्रतियच्छति] "he gives @[māṣa] beans in exchange for sesame seeds"

In both cases, the noun governed by @deva[प्रति] takes the ablative case — unlike the accusative seen in @ref[1.4.90].
"""

standard = """
@deva[प्रति] is @deva[कर्मप्रवचनीय] for @deva[प्रतिनिधि] (representative) and @deva[प्रतिदान] (exchange) — @deva[प्रतिः प्रतिनिधिप्रतिदाने च].

**Rule type — @deva[संज्ञा]:** Two additional @deva[कर्मप्रवचनीय] senses for @deva[प्रति].

**Examples:**
1. @deva[प्रतिनिधि]: @deva[अभिमन्युरर्जुनतः प्रति] "Abhimanyu is Arjuna's representative"
2. @deva[प्रतिदान]: @deva[माषानस्मै तिलेभ्यः प्रतियच्छति] "gives beans in exchange for sesame"

**Case governance:** Ablative (@deva[पञ्चमी]) by @ref[2.3.11] — the person or thing being replaced/exchanged takes the ablative. This contrasts with the accusative governance of @ref[1.4.90].

**Accumulation of senses:** @deva[प्रति] now has six @deva[कर्मप्रवचनीय] functions — four from @ref[1.4.90] (@deva[लक्षण], circumstance, @deva[भाग], @deva[ईप्सा]) plus two here (@deva[प्रतिनिधि], @deva[प्रतिदान]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[प्रतिः प्रतिनिधिप्रतिदाने च] — @deva[प्रति] is @deva[कर्मप्रवचनीय] in the representative and exchange senses.

**Ablative governance — @ref[2.3.11]:** This is one of the few @deva[कर्मप्रवचनीय] rules that triggers ablative rather than accusative. @ref[2.3.11] specifically assigns @deva[पञ्चमी] to the noun governed by @deva[कर्मप्रवचनीय] in the @deva[प्रतिनिधि] and @deva[प्रतिदान] senses. The person replaced (@deva[अर्जुनतः]) or the thing exchanged (@deva[तिलेभ्यः]) takes ablative.

**@deva[प्रतिनिधि] = "standing in for":** The representative takes the subject position; the person represented takes ablative with @deva[प्रति]. This construction expresses substitution — one entity filling another's role.

**@deva[प्रतिदान] = "giving back in return":** The item given in exchange is the direct object; the original item takes ablative with @deva[प्रति]. This expresses commercial or ritual exchange.

**Most @deva[कर्मप्रवचनीय] senses for any particle:** With six total functions across @ref[1.4.90] and this rule, @deva[प्रति] is the most versatile @deva[कर्मप्रवचनीय] particle in the system.
"""

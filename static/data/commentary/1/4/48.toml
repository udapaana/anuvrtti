id = "1.4.48"
numericId = "14048"

[en]
simple = """
With @deva[उप] "near," @deva[अनु] "along," @deva[आ] "toward," or @deva[अधि] "upon" combined with @deva[वस्] "to dwell" — the place of dwelling takes the accusative case instead of the locative.

**Examples:**
- @deva[ग्राममुपवसति सेना] "the army encamps near the village" (accusative)
- @deva[पर्वतमनुवसति] "he dwells along the mountain"
- @deva[पर्वतमधिवसति] "he dwells upon the mountain"

**Exception:** When @deva[उप] + @deva[वस्] means "to fast" (religious observance), the location stays in the locative: @deva[ग्रामे उपवसति] "he fasts in the village."
"""

standard = """
With @deva[उप]/@deva[अनु]/@deva[आङ्]/@deva[अधि] + @deva[वस्] "to dwell," the location is @deva[कर्मन्] — @deva[उपान्वध्याङ्वसः].

**Rule type — @deva[अपवाद] (exception) to @ref[1.4.45]:** The dwelling-place, normally @deva[अधिकरण], becomes @deva[कर्मन्] (accusative).

**Examples:**
- @deva[ग्राममुपवसति सेना] "the army encamps near the village" (@deva[कर्मन्])
- @deva[पर्वतमनुवसति] "he dwells along the mountain"
- @deva[पर्वतमध्यवसति] "he inhabits the mountain"

**@deva[उपवास] exception:** When @deva[उप] + @deva[वस्] means "to fast" (@deva[उपवास]), the location remains @deva[अधिकरण] (locative): @deva[ग्रामे उपवसति] "he fasts in the village." The @deva[कर्मन्] assignment applies only in the dwelling sense.

**Four prefixes:** @deva[उप] (near), @deva[अनु] (along), @deva[आङ्] (toward), @deva[अधि] (upon) — each adds a directional nuance that makes the location more of a target than a backdrop.

**End of @deva[अधिकरण] section:** This closes the @deva[अधिकरण] series (@ref[1.4.45]–@ref[1.4.48]). @ref[1.4.49] begins the @deva[कर्मन्] definition.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्म] from @ref[1.4.46]; @deva[कारके] from @ref[1.4.23].

@deva[उपान्वध्याङ्वसः] — with @deva[उप]/@deva[अनु]/@deva[अधि]/@deva[आङ्] + @deva[वस्], the location is @deva[कर्मन्].

**Prefix-by-prefix semantics:**
- @deva[उपवस्]: "to dwell near" — @deva[ग्राममुपवसति] (encamping near)
- @deva[अनुवस्]: "to dwell along/following" — @deva[पर्वतमनुवसति] (dwelling alongside)
- @deva[अध्यवस्]: "to dwell upon" — @deva[पर्वतमध्यवसति] (inhabiting)
- @deva[आवस्]: "to dwell toward/in" — @deva[ग्राममावसति] (residing in)

**@deva[उपवास] exception analysis:** @deva[उपवस्] in the sense of fasting (@deva[उपवास]) does not promote the location to @deva[कर्मन्]. This is because fasting is not directed at a location — the person fasts regardless of where they are. The location is merely incidental, hence @deva[अधिकरण] (locative).

**Completing the @deva[अधिकरण] section (@ref[1.4.45]–@ref[1.4.48]):**
- @ref[1.4.45]: core definition (@deva[आधार])
- @ref[1.4.46]: @deva[अधि] + @deva[शी]/@deva[स्था]/@deva[आस्] → @deva[कर्मन्] (obligatory)
- @ref[1.4.47]: @deva[अभिनिविश्] → @deva[कर्मन्] (optional)
- @ref[1.4.48] (this): prefixed @deva[वस्] → @deva[कर्मन्] (obligatory, with exception)

**Pattern:** The @deva[अधिकरण] exceptions share a common feature — preverbs that transform static verbs of position/dwelling into dynamic verbs of occupation/engagement, promoting the location from background (@deva[अधिकरण]) to target (@deva[कर्मन्]).
"""

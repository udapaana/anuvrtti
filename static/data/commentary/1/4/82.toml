id = "1.4.82"
numericId = "14082"

[en]
simple = """
In the Vedas (@deva[छन्दस्]), @deva[गति] and @deva[उपसर्ग] words may be separated from the verb by other words.

In classical Sanskrit, a prefix like @deva[उप] must be directly attached to the verb. In Vedic Sanskrit, other words can intervene between the prefix and the verb.

**Example:**
- Vedic: @deva[उप प्रयोभिः आगतम्] "approach with pleasures" — @deva[उप] is separated from @deva[आगतम्] by @deva[प्रयोभिः]
- Classical equivalent: @deva[उपागतम् प्रयोभिः] — prefix attached to verb

This Vedic flexibility is called @deva[त्मेसिस] ("cutting apart") in linguistic terminology.
"""

standard = """
In @deva[छन्दस्], @deva[गति]/@deva[उपसर्ग] may be separated from the verb by intervening words — @deva[छन्दसि व्यत्ययो बहुलम्].

**Rule type — @deva[छन्दस्] (Vedic license):** Permits prefix-verb separation not allowed in classical usage.

**Example:**
- @deva[उप प्रयोभिर् आगतम्] "approach with pleasures" (@deva[ऋग्वेद] I.2.4) — @deva[उप] is separated from @deva[आगतम्] by @deva[प्रयोभिः]

**Classical contrast:** @deva[उपागतम्] — prefix immediately adjacent to verb.

**Companion to @ref[1.4.81]:** @ref[1.4.81] allows post-verbal position; this rule allows separation with intervening words. Together they characterize the freer Vedic prefix syntax.

**@deva[त्मेसिस]:** The technical term for prefix-verb separation. Common in @deva[ऋग्वेद], decreasing in later Vedic texts, and absent in classical Sanskrit.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[उपसर्गाः] from @ref[1.4.59]; @deva[छन्दसि] from @ref[1.4.81].

@deva[छन्दसि व्यत्ययो बहुलम्] — in @deva[छन्दस्], transposition (separation) is frequent.

**@deva[बहुलम्] = "frequently":** This is stronger than @deva[विभाषा] (optional). The @deva[बहुलम्] designation acknowledges that Vedic separation is widespread and cannot be predicted by strict rules — it is a productive pattern, not an exception.

**Vedic prefix syntax:** The @deva[ऋग्वेद] shows extensive @deva[त्मेसिस]: @deva[अग्निम् ईडे पुरोहितम्] (I.1.1) — no @deva[उपसर्ग] here, but the principle extends to prefixed forms. This freedom gradually decreased: @deva[ब्राह्मण] texts show less separation, @deva[सूत्र] texts almost none.

**Completing the Vedic prefix rules:** @ref[1.4.80]–@ref[1.4.82] form a triplet: @ref[1.4.80] (classical: prefixes precede), @ref[1.4.81] (Vedic: may follow), @ref[1.4.82] (Vedic: may be separated). Together they provide a complete account of prefix position across registers.

**Transition:** @ref[1.4.83] begins the @deva[कर्मप्रवचनीय] section — particles that govern case relations.
"""

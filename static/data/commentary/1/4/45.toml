id = "1.4.45"
numericId = "14045"

[en]
simple = """
The location where an action takes place — whether the agent or the object is situated there — is called @deva[अधिकरण] "locus."

Every action happens somewhere. The place, surface, or container that supports the action is the @deva[अधिकरण]. It takes the seventh case ending (@deva[सप्तमी], the locative case).

**Examples:**
- @deva[कटे आस्ते] "he sits on the mat" (@deva[कट] "mat" is @deva[अधिकरण])
- @deva[स्थाल्यां पचति] "he cooks in the pot" (@deva[स्थाली] "pot" is @deva[अधिकरण])
- @deva[ग्रामे वसति] "he lives in the village" (@deva[ग्राम] "village" is @deva[अधिकरण])

The mat supports the sitter, the pot contains the cooking, the village houses the resident — each is the locus of the action.
"""

standard = """
The site that supports an action — where the agent or object is located — is @deva[अधिकरण] — @deva[आधारोऽधिकरणम्].

**Rule type — @deva[संज्ञा]:** Defines the fourth @deva[कारक] — the locus.

**Examples:**
- @deva[कटे आस्ते] "he sits on the mat" (agent on @deva[अधिकरण])
- @deva[स्थाल्यां पचति] "he cooks in the pot" (object in @deva[अधिकरण])
- @deva[ग्रामे वसति] "he lives in the village"

**@deva[आधार] = "support, container, locus":** The entity that "holds" or "contains" the action. Three types recognized by tradition:
1. @deva[औपश्लेषिक] — contact-based ("on the mat")
2. @deva[वैषयिक] — domain-based ("skilled in grammar")
3. @deva[अभिव्यापक] — pervasive ("oil in sesame seeds")

**Case marking:** @deva[अधिकरण] takes @deva[सप्तमी] (locative, 7th case) by @ref[2.3.36].

**Scope:** The @deva[अधिकरण] is neither agent nor object — it is the background location. If the location is actively involved in the action, it may be @deva[कर्ता] or @deva[कर्मन्] instead.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कारके] from @ref[1.4.23].

@deva[आधारोऽधिकरणम्] — the support/container is @deva[अधिकरण].

**Three subtypes of @deva[आधार]:** The @deva[काशिका] and @deva[सिद्धान्तकौमुदी] distinguish:
1. @deva[औपश्लेषिक] (contact): @deva[कटे आस्ते] — the mat physically supports the agent
2. @deva[वैषयिक] (domain): @deva[मोक्षे इच्छा] — "desire in/for liberation" — the domain of desire
3. @deva[अभिव्यापक] (pervasive): @deva[तिलेषु तैलम्] — "oil in sesame seeds" — the oil pervades the seeds

**@deva[अधिकरण] → @deva[सप्तमी]:** @ref[2.3.36] assigns locative case. But @deva[सप्तमी] also has non-@deva[कारक] uses (e.g., @deva[सति सप्तमी] "locative absolute"), so not every locative is @deva[अधिकरण].

**Short @deva[अधिकरण] section:** Like @deva[करण], the @deva[अधिकरण] section is brief (@ref[1.4.45]–@ref[1.4.48]). The broad definition via @deva[आधार] covers most cases, with only three extensions needed.

**@deva[कारक] sequence so far:**
1. @deva[अपादान] (@ref[1.4.24]–@ref[1.4.31]) — 8 rules
2. @deva[सम्प्रदान] (@ref[1.4.32]–@ref[1.4.41]) — 10 rules
3. @deva[करण] (@ref[1.4.42]–@ref[1.4.44]) — 3 rules
4. @deva[अधिकरण] (@ref[1.4.45]–@ref[1.4.48]) — 4 rules
5. @deva[कर्मन्] (@ref[1.4.49]–@ref[1.4.53]) — next
6. @deva[कर्ता] (@ref[1.4.54]–@ref[1.4.55]) — last

**Order significance:** @deva[अधिकरण] is defined after @deva[करण]. By @ref[1.4.2], in a conflict, @deva[अधिकरण] prevails over @deva[करण].
"""

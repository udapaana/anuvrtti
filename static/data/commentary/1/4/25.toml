id = "1.4.25"
numericId = "14025"

[en]
simple = """
With verbs meaning "to fear" or "to protect," the source of the danger is called @deva[अपादान] "ablative source."

When you fear something, the thing feared is what you metaphorically "depart from" — you shrink away from it. When you protect someone, you guard them from a threat.

**Fear:**
- @deva[चौरेभ्यो बिभेति] "he fears thieves" (@deva[चौर] is @deva[अपादान])
- @deva[चौरेभ्य उद्विजते] "he is disturbed by thieves"

**Protection:**
- @deva[चौरेभ्यस्त्रायते] "he protects from thieves"
- @deva[चौरेभ्यो रक्षति] "he guards from thieves"

Note: the place where fear occurs takes the locative, not ablative: @deva[अरण्ये बिभेति] "he fears in the forest" — the forest is where he is, not what he fears.
"""

standard = """
With verbs of fear (@deva[भी], @deva[उद्विज्]) or protection (@deva[त्रै], @deva[रक्ष्]), the source of danger is @deva[अपादान] — @deva[भीत्रार्थानां भयहेतुः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.24]:** Extends @deva[अपादान] from physical departure to psychological/protective "departure" — the entity one recoils from or guards against.

**Fear:**
- @deva[चौरेभ्यो बिभेति] "he fears thieves"
- @deva[चौरेभ्य उद्विजते] "he is disturbed by thieves"

**Protection:**
- @deva[चौरेभ्यस्त्रायते] "he protects from thieves"
- @deva[चौरेभ्यो रक्षति] "he guards from thieves"

**Distinction — place vs source:** The place of fear takes @deva[सप्तमी] (locative): @deva[अरण्ये बिभेति] "he fears in the forest." The source of fear takes @deva[पञ्चमी] (ablative): @deva[चौरेभ्यो बिभेति].

**@deva[भयहेतुः] = "cause of fear":** The @deva[अपादान] is the entity that triggers fear or from which protection is needed — not the emotion itself.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अपादान] from @ref[1.4.24]; @deva[कारके] from @ref[1.4.23].

@deva[भीत्रार्थानां भयहेतुः] — with @deva[भी]/@deva[त्रा]-meaning verbs, the cause of fear is @deva[अपादान].

**Metaphorical @deva[अपाय]:** No physical departure occurs in fear. The "separation" is psychological — the mind recoils from the feared object. @deva[पाणिनि] extends @deva[अपादान] from literal departure (@ref[1.4.24]) to this figurative sense.

**@deva[भीत्रार्थ] = verbs meaning fear or protection:** This covers:
- @deva[भी] "to fear"
- @deva[उद्विज्] "to be disturbed"
- @deva[त्रै] "to protect"
- @deva[रक्ष्] "to guard"
- Any verb with comparable meaning

**@deva[भयहेतु] vs @deva[भयस्थान]:** The @deva[भयहेतु] (cause of fear — thieves, snake, etc.) is @deva[अपादान] (ablative). The @deva[भयस्थान] (place of fear — forest, darkness) is @deva[अधिकरण] (locative).

**@deva[अपादान] extension series (@ref[1.4.24]–@ref[1.4.31]):**
- @ref[1.4.24]: physical departure (core)
- @ref[1.4.25] (this): fear/protection
- @ref[1.4.26]: concealment
- @ref[1.4.27]–@ref[1.4.28]: learning, birth
- @ref[1.4.29]–@ref[1.4.31]: comparison, distance, temporal "before"
"""

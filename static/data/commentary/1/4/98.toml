id = "1.4.98"
numericId = "14098"

[en]
simple = """
@deva[अधि] is **optionally** @deva[कर्मप्रवचनीय] when the verb @deva[कृ] "to do" follows.

When someone says "what he will do regarding me," @deva[अधि] can be treated either as @deva[कर्मप्रवचनीय] or as @deva[गति] "preverb." The choice affects accent.

**Example:**
- @deva[यदत्र मामधि करिष्यति] "what he will do regarding me"

If @deva[अधि] is @deva[गति], the accent follows @deva[गति] rules. If @deva[कर्मप्रवचनीय], a different accent pattern applies. Both are correct.
"""

standard = """
@deva[अधि] is optionally @deva[कर्मप्रवचनीय] when @deva[कृ] follows — @deva[अधिश्च कर्मप्रवचनीयः करोतौ वा].

**Rule type — @deva[विकल्प] (option):** @deva[अधि] may be @deva[कर्मप्रवचनीय] or @deva[गति] before @deva[कृ].

**Example:** @deva[यदत्र मामधि करिष्यति] "what he will do regarding me"

**Two analyses:**
1. @deva[अधि] = @deva[गति] → accent by @ref[8.1.71] (@deva[गति]-specific accent rule)
2. @deva[अधि] = @deva[कर्मप्रवचनीय] → different accent pattern

**Why optional?** With @deva[कृ], @deva[अधि] expresses lordship (making it @deva[कर्मप्रवचनीय] by @ref[1.4.97]) but also combines with the verb (making it @deva[गति] by @ref[1.4.60]). Since both designations are justified, the rule allows either.

**Practical consequence:** The option produces two valid accentual forms of the same sentence — both are grammatically correct.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83].

@deva[अधिश्च कर्मप्रवचनीयः करोतौ वा] — @deva[अधि] is optionally @deva[कर्मप्रवचनीय] before @deva[कृ].

**Position after @ref[1.4.97]:** This rule appears after the @deva[कर्मप्रवचनीय] section formally ends at @ref[1.4.97]. It is a supplementary rule that revisits @deva[अधि] specifically in combination with @deva[कृ], where the semantic overlap between @deva[गति] and @deva[कर्मप्रवचनीय] creates genuine ambiguity.

**@ref[1.4.1] @deva[एकासंज्ञा] and the option:** Normally @ref[1.4.1] forces a single designation. This rule explicitly grants a @deva[विकल्प] — the speaker chooses whether @deva[अधि] + @deva[कृ] is a @deva[गति]-verb combination or a @deva[कर्मप्रवचनीय]-governed construction. The choice manifests as different Vedic accent patterns.

**Accent difference:** When @deva[अधि] is @deva[गति], @ref[8.1.71] assigns a specific accent to the @deva[गति]-verb unit. When @deva[कर्मप्रवचनीय], @deva[अधि] is independent of the verb, and standard sentence accent applies. This is primarily relevant for Vedic recitation.

**@deva[अधि] + @deva[कृ] = "to exercise lordship":** The combination @deva[अधिकृ] "to place over, to authorize" is common enough that the grammar must address its dual analysis. The @deva[विकल्प] acknowledges both as legitimate.
"""

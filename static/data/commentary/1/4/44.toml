id = "1.4.44"
numericId = "14044"

[en]
simple = """
With @deva[परि] + @deva[क्री] "to hire," the wages or price of hiring can optionally be treated as @deva[सम्प्रदान] "recipient" (dative) instead of @deva[करण] "instrument" (instrumental).

When someone is hired for a price, the wages can be expressed two ways:

**Examples:**
- @deva[शताय परिक्रीणीते] "hired for a hundred" (dative — wages as @deva[सम्प्रदान])
- @deva[शतेन परिक्रीणीते] "hired for a hundred" (instrumental — wages as @deva[करण])

Both constructions are valid. This applies specifically to hiring for service, not to buying outright.
"""

standard = """
With @deva[परि] + @deva[क्री] "to hire," the wages are optionally @deva[सम्प्रदान] — @deva[परिक्रयणे सम्प्रदानमन्यतरस्याम्].

**Rule type — @deva[विभाषा] (option):** The wages, normally @deva[करण] (by @ref[1.4.42]), may alternatively be treated as @deva[सम्प्रदान].

**Examples:**
- @deva[शताय परिक्रीणीते] "hired for a hundred" (@deva[सम्प्रदान], dative)
- @deva[शतेन परिक्रीणीते] "hired for a hundred" (@deva[करण], instrumental)
- @deva[सहस्राय परिक्रीतः] "hired for a thousand" (@deva[सम्प्रदान], dative)

**@deva[परिक्रयण] = "hiring":** The rule specifically covers @deva[परिक्री] in the sense of hiring for wages, not outright purchase. With plain @deva[क्री] "to buy," the price is @deva[करण] only.

**@deva[अन्यतरस्याम्] = "optionally":** Both dative and instrumental are grammatically correct. The choice is free variation — no semantic distinction between the two constructions.

**End of @deva[करण] section:** This closes the short @deva[करण] series (@ref[1.4.42]–@ref[1.4.44]). @ref[1.4.45] begins @deva[अधिकरण].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[करणम्] from @ref[1.4.42]; @deva[कारके] from @ref[1.4.23].

@deva[परिक्रयणे सम्प्रदानमन्यतरस्याम्] — with @deva[परिक्री] (hiring), the wages are optionally @deva[सम्प्रदान].

**Dual @deva[कारक] possibility:** When the option is exercised, wages = @deva[सम्प्रदान] → @deva[चतुर्थी] (by @ref[2.3.13]). When not exercised, wages = @deva[करण] → @deva[तृतीया] (by @ref[2.3.18]). This is one of the rare cases where a single participant can be assigned two different @deva[कारक]s by option.

**@deva[परिक्रयण] vs @deva[क्रयण]:** The @deva[परि] prefix creates the "hiring" meaning — temporary engagement for wages. Plain @deva[क्री] means "to purchase" — permanent transfer. The @deva[सम्प्रदान] option exists only for hiring because the wages "go toward" the service (like giving), while a purchase price is purely instrumental.

**Parallel with @ref[1.4.43]:** Both rules create @deva[कारक] alternations within the @deva[करण] section. @ref[1.4.43] alternates @deva[करण]/@deva[कर्मन्] for gaming; this alternates @deva[करण]/@deva[सम्प्रदान] for hiring. Together they show that @deva[करण] boundaries are not rigid.

**Completing the @deva[करण] section (@ref[1.4.42]–@ref[1.4.44]):** The shortest @deva[कारक] section — just three rules. @deva[करण]'s broad definition via @deva[साधकतम] requires few extensions. @ref[1.4.45] begins @deva[अधिकरण] (locus).
"""

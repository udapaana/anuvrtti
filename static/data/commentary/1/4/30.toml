id = "1.4.30"
numericId = "14030"

[en]
simple = """
With the verb @deva[जन्] "to be born, to be produced," the material source from which something originates is called @deva[अपादान] "ablative source."

When something is born or created from a material, that material is the @deva[अपादान] — the fixed starting point from which the product "departs."

**Examples:**
- @deva[शृङ्गाच्छरो जायते] "the arrow is produced from horn" (@deva[शृङ्ग] is @deva[अपादान])
- @deva[गोमयाद् वृश्चिको जायते] "the scorpion is produced from cowdung" (@deva[गोमय] is @deva[अपादान])

The material remains (conceptually fixed) while the product emerges from it.
"""

standard = """
With @deva[जन्] "to be born/produced," the material source is @deva[अपादान] — @deva[जनिकर्तुः प्रकृतिः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.24]:** The product "departs" from its material source — the raw material is the @deva[ध्रुव] (fixed point).

**Examples:**
- @deva[शृङ्गाच्छरो जायते] "the arrow is produced from horn"
- @deva[गोमयाद् वृश्चिको जायते] "the scorpion arises from cowdung"

**@deva[प्रकृति] = "material cause":** Not the agent of production, but the substance from which something emerges. Horn → arrow; cowdung → scorpion.

**@deva[जनिकर्तुः] = "of the agent of @deva[जन्]":** The product is the @deva[कर्ता] of the intransitive @deva[जन्] ("X is born"). Its material source (@deva[प्रकृति]) is @deva[अपादान].

**Scope:** Applies to @deva[जन्] specifically. Other verbs of creation (like @deva[कृ] "to make") don't automatically assign @deva[अपादान] to their material — that may be @deva[करण] instead.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अपादान] from @ref[1.4.24]; @deva[कारके] from @ref[1.4.23].

@deva[जनिकर्तुः प्रकृतिः] — the material source (@deva[प्रकृति]) of the agent of @deva[जन्] is @deva[अपादान].

**@deva[जनिकर्तृ] analysis:** @deva[जन्] is @deva[अकर्मक] (intransitive) — "X is born." X is the @deva[कर्ता] of @deva[जन्]. The @deva[प्रकृति] (material source) of this @deva[कर्ता] is @deva[अपादान].

**@deva[प्रकृति] vs @deva[करण]:** When @deva[कृ] is used ("he makes an arrow from horn"), the horn might be @deva[करण] (instrument). With @deva[जन्] ("the arrow is born from horn"), the horn is @deva[अपादान] — a departure source, not an instrument.

**Semantic basis:** In @deva[जन्], the product emerges from the material. The material is the @deva[ध्रुव] (fixed base) from which the product "departs" — a transformation rather than a spatial movement, but structurally parallel.

**@deva[अपादान] extensions nearly complete:** @ref[1.4.24]–@ref[1.4.30] covers: departure, fear, unbearableness, prevention, concealment, learning, and material origin. @ref[1.4.31] adds one more (standard of comparison) before the section moves to @deva[सम्प्रदान].
"""

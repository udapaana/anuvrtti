id = "1.4.42"
numericId = "14042"

[en]
simple = """
The most effective means of accomplishing an action is called @deva[करण] "instrument."

Every action involves tools or means. Among all the contributing factors, the one that helps most directly is the @deva[करण]. It takes the third case ending (@deva[तृतीया], the instrumental case).

**Examples:**
- @deva[दात्रेण लुनाति] "he cuts with a sickle" (@deva[दात्र] "sickle" is @deva[करण])
- @deva[परशुना छिनत्ति] "he splits with an axe" (@deva[परशु] "axe" is @deva[करण])
- @deva[चक्षुषा पश्यति] "he sees with the eyes" (@deva[चक्षुस्] "eye" is @deva[करण])

The sickle, the axe, the eyes — each is the primary means through which the action succeeds.
"""

standard = """
The most effective auxiliary in accomplishing the action is @deva[करण] — @deva[साधकतमं करणम्].

**Rule type — @deva[संज्ञा]:** Defines the third @deva[कारक] — the instrument.

**Examples:**
- @deva[दात्रेण लुनाति] "he cuts with a sickle"
- @deva[परशुना छिनत्ति] "he splits with an axe"
- @deva[चक्षुषा पश्यति] "he sees with the eyes"

**@deva[साधकतम] = "most instrumental":** The @deva[तमप्] (superlative) suffix is key. Among all contributors to the action, @deva[करण] is the most directly effective. The agent (@deva[कर्ता]) is also a @deva[साधक] (contributor), but @deva[करण] is the tool through which the agent acts.

**Case marking:** @deva[करण] takes @deva[तृतीया] (instrumental, 3rd case) by @ref[2.3.18].

**@deva[करण] vs @deva[कर्ता]:** Both contribute to the action, but @deva[कर्ता] is the independent agent (@ref[1.4.54]) while @deva[करण] is the most effective subordinate means.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कारके] from @ref[1.4.23].

@deva[साधकतमं करणम्] — the most effective means is @deva[करण].

**@deva[तमप्] and the hierarchy of contributors:** Every action has multiple @deva[साधक]s (contributors) — agent, instrument, location, etc. The @deva[तमप्] suffix restricts @deva[करण] to the single most effective one among the non-agent contributors. This superlative creates a hierarchy: among tools, one is most instrumental.

**@deva[करण] → @deva[तृतीया]:** @ref[2.3.18] maps @deva[करण] to the instrumental case. The @deva[तृतीया] also marks @deva[कर्ता] in passive constructions (@ref[2.3.18]), creating an overlap that the tradition carefully distinguishes.

**Short @deva[करण] section:** Unlike @deva[अपादान] (8 rules) and @deva[सम्प्रदान] (10 rules), @deva[करण] has only three rules: this core definition (@ref[1.4.42]), @deva[दिव्] exception (@ref[1.4.43]), and @deva[परिक्री] exception (@ref[1.4.44]). The instrument concept requires fewer extensions because its semantic scope is already broad via @deva[साधकतम].

**@deva[कारक] order:** @deva[करण] is defined after @deva[सम्प्रदान] (@ref[1.4.32]) and before @deva[अधिकरण] (@ref[1.4.45]). By @ref[1.4.2], in a conflict, the later-defined @deva[कारक] prevails.

**Philosophical note:** The @deva[काशिका] discusses whether @deva[करण] is the physical tool or the capacity (@deva[शक्ति]) within it. The prevailing view: @deva[करण] is the tool itself, not an abstract quality.
"""

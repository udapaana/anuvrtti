id = "1.4.80"
numericId = "14080"

[en]
simple = """
Words called @deva[गति] and @deva[उपसर्ग] are placed before the verb — they are prefixes, not suffixes.

This rule establishes the basic word order: the prefix comes first, then the verb.

**Examples:**
- @deva[प्र] + @deva[गच्छति] → @deva[प्रगच्छति] "he goes forth"
- @deva[सत्] + @deva[करोति] → @deva[सत्करोति] "he honors"
- @deva[अलम्] + @deva[करोति] → @deva[अलंकरोति] "he adorns"

All the preceding examples from @ref[1.4.59]–@ref[1.4.79] illustrate this pre-verbal placement.
"""

standard = """
@deva[गति] and @deva[उपसर्ग] are placed before the verb (@deva[प्राक्]) — @deva[ते प्राग्धातोः].

**Rule type — @deva[विधि] (operational rule):** Establishes the positional relationship between prefixes and the verbal root.

**@deva[ते] = "they":** Refers to both @deva[गति] (from @ref[1.4.60]) and @deva[उपसर्ग] (from @ref[1.4.59]). Both types precede the @deva[धातु] (verbal root).

**Examples:**
- @deva[प्रगच्छति] "goes forth"
- @deva[सत्करोति] "honors"
- @deva[अलंकरोति] "adorns"
- @deva[अस्तंगच्छति] "sets (of the sun)"

**Significance:** This rule confirms that Sanskrit prefixes precede the verb. In Vedic Sanskrit, prefixes could be separated from the verb (@deva[त्मेसिस]); this rule represents the classical pattern of tight prefix-verb unity.

**Scope:** Applies to all words designated @deva[गति] (@ref[1.4.60]–@ref[1.4.79]) and @deva[उपसर्ग] (@ref[1.4.59]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[उपसर्गाः] from @ref[1.4.59].

@deva[ते प्राग्धातोः] — they (= @deva[गति] and @deva[उपसर्ग]) are placed before the @deva[धातु].

**@deva[प्राग्धातोः] = "before the root":** This positions @deva[गति]/@deva[उपसर्ग] immediately before the verbal element. In compound formation (@ref[2.2.18]), the @deva[गति] element comes first.

**Vedic vs. Classical:** In Vedic Sanskrit, @deva[उपसर्ग]s could be separated from the verb by intervening words (@deva[त्मेसिस]). The @deva[काशिका] notes that this rule describes the normal (@deva[पदक्रम]) position — pre-verbal — while Vedic separation is a distinct phenomenon.

**Operational consequences:**
- Compound formation (@ref[2.2.18]): @deva[गति] + verb form a compound
- @ref[7.1.37]: @deva[त्वा] → @deva[ल्यप्] when @deva[गति] precedes in compound
- @ref[8.2.71]: verb loses accent after @deva[गति]

**Transitional rule:** This closes the @deva[गति]/@deva[उपसर्ग] subsection. @ref[1.4.81]–@ref[1.4.82] introduce miscellaneous @deva[संज्ञा]s (@deva[दत्], @deva[स्थ], @deva[ग], @deva[घु]) before @ref[1.4.83] opens the @deva[कर्मप्रवचनीय] section.
"""

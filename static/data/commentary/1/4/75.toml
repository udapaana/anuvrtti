id = "1.4.75"
numericId = "14075"

[en]
simple = """
The words @deva[उरसि] "in the heart" and @deva[मनसि] "in the mind" are optionally @deva[गति] when combined with @deva[कृ] "to make" — but only in the figurative sense of "taking to heart" or "keeping in mind," NOT when literally placing something on the chest or in the mind.

**Examples (figurative — @deva[गति] optional):**
- @deva[उरसिकृत्य] or @deva[उरसि कृत्वा] "having taken to heart"
- @deva[मनसिकृत्य] or @deva[मनसि कृत्वा] "having kept in mind"

**Contrast (literal placement — no @deva[गति]):**
- @deva[उरसि कृत्वा पाणिं शेते] "he lies having placed his hand on his chest" — physical placement, not @deva[गति].
"""

standard = """
@deva[उरसि] and @deva[मनसि] with @deva[कृ] are optionally @deva[गति] when NOT meaning literal placement — @deva[उरसिमनसी अनिधाने].

**Rule type — @deva[विभाषा] extension of @deva[गति]:** Restricted to the figurative (non-placement) sense.

**Examples:**
- @deva[उरसिकृत्य] / @deva[उरसि कृत्वा] "having taken to heart"
- @deva[मनसिकृत्य] / @deva[मनसि कृत्वा] "having kept in mind, having resolved"

**@deva[अनिधान] = "not placing":** When @deva[उरसि कृ] or @deva[मनसि कृ] means literal physical placement (@deva[निधान]), @deva[गति] does not apply.

**Contrast:**
- @deva[उरसि कृत्वा पाणिं शेते] — physical placement of hand on chest → @deva[निधान] → not @deva[गति]
- @deva[मनसि कृत्वा वचनं ध्यायति] — placing words in mind (literal) → @deva[निधान] → not @deva[गति]

**@deva[मनसिकृ] in philosophy:** @deva[मनसिकार] (= @deva[मनसिकृत्य]) "mental attention, mindfulness" is a key term in Buddhist and Brahmanical philosophical texts. The @deva[गति] designation enables this compound.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[विभाषा] from @ref[1.4.72]; @deva[क्रियायोगे] from @ref[1.4.59].

@deva[उरसिमनसी अनिधाने] — @deva[उरसि] and @deva[मनसि] are optionally @deva[गति] when not meaning literal placement.

**@deva[निधान] vs @deva[अनिधान]:** @deva[निधान] = "depositing, placing down" — a physical or concrete act. @deva[अनिधान] = the absence of this — figurative use. The distinction:
- Figurative: @deva[उरसिकृत्य] "cherishing" / @deva[मनसिकृत्य] "attending to mentally"
- Literal: @deva[उरसि कृत्वा पाणिम्] "placing the hand on the chest"

**Locative forms as @deva[गति]:** @deva[उरसि] and @deva[मनसि] are locative case forms (of @deva[उरस्] and @deva[मनस्]). This is unusual — most @deva[गति] words are indeclinables or stems, not inflected forms. The @deva[गति] designation freezes these locatives as compound-forming elements.

**Philosophical significance:** @deva[मनसिकार] "attention, mental application" is a technical term across Indian philosophical systems. In Buddhism (@deva[योनिशो मनसिकार] "proper attention") it is foundational. The @deva[गति] rule enables this compound's formation.

**Optional block nearing end:** This is among the last rules in the @ref[1.4.72]–@ref[1.4.79] optional @deva[गति] series.
"""

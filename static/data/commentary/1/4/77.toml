id = "1.4.77"
numericId = "14077"

[en]
simple = """
The words @deva[हस्ते] "in the hand" and @deva[पाणौ] "in the palm" are always @deva[गति] (not optional) when combined with @deva[कृ] "to make" — but only when meaning "marriage" (taking the hand in marriage).

In the Vedic marriage ritual, the groom takes the bride's hand. This act of @deva[पाणिग्रहण] (hand-grasping) is expressed through these compounds.

**Examples:**
- @deva[पाणौकृत्य] "having married (taken the hand)"
- @deva[हस्तेकृत्य] "having married"

**Contrast (literal — no @deva[गति]):**
- @deva[हस्ते कृत्वा कार्षापणं गतः] "having placed a coin in his hand, he went" — physical placement, not marriage.
"""

standard = """
@deva[हस्ते] and @deva[पाणौ] with @deva[कृ] are obligatorily @deva[गति] when meaning @deva[पाणिग्रहण] (marriage) — @deva[हस्तेपाणावनिधाने च].

**Rule type — @deva[नित्यगति] (obligatory @deva[गति]):** Unlike the preceding optional rules, this one makes @deva[गति] obligatory in the marriage sense. The compound must form.

**Examples:**
- @deva[पाणौकृत्य] "having married" (@deva[ल्यप्] by @ref[7.1.37] — obligatory)
- @deva[हस्तेकृत्य] "having married"

**@deva[अनिधान] = "not placement":** Continues from @ref[1.4.75]. Physical hand-placement (giving someone a coin) is @deva[निधान] — not @deva[गति].

**Contrast:** @deva[हस्ते कृत्वा कार्षापणं गतः] — physical placement → @deva[निधान] → not @deva[गति] → @deva[कृत्वा].

**Obligatory vs. optional:** @ref[1.4.75]–@ref[1.4.76] are optional @deva[गति]. This rule is obligatory for the marriage sense — the compound @deva[पाणौकृत्य] must form, not @deva[पाणौ कृत्वा].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[अनिधाने] from @ref[1.4.75]; @deva[क्रियायोगे] from @ref[1.4.59].

@deva[हस्तेपाणावनिधाने च] — @deva[हस्ते] and @deva[पाणौ] are @deva[नित्यगति] (obligatory @deva[गति]) in @deva[अनिधान] (non-placement = marriage) sense.

**@deva[नित्य] vs @deva[विभाषा]:** The @deva[विभाषा] from @ref[1.4.72] does NOT carry forward here. This rule establishes obligatory @deva[गति] — a stronger designation. The tradition interprets the rule as @deva[नित्यगति] because it specifies these words separately from the optional block.

**@deva[पाणिग्रहण] — cultural context:** The ritual act of grasping the bride's hand is central to Vedic marriage. @deva[पाणौकृ] is a technical term for this ritual act. The obligatory compound reflects its status as a fixed cultural expression.

**Shift from optional to obligatory:** @ref[1.4.72]–@ref[1.4.76] are optional. @ref[1.4.77]–@ref[1.4.79] return to obligatory @deva[गति] for specific meanings. The alternation between optional and obligatory shows that @deva[पाणिनि] calibrated compound-formation rules to match actual usage patterns.
"""

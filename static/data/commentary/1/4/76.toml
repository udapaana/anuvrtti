id = "1.4.76"
numericId = "14076"

[en]
simple = """
The words @deva[मध्ये] "in the middle," @deva[पदे] "in position/step," and @deva[निवचने] "in silence" are optionally @deva[गति] when combined with @deva[कृ] "to make" — but only in figurative use, NOT literal placement.

**Examples (figurative — @deva[गति] optional):**
- @deva[मध्येकृत्य] or @deva[मध्ये कृत्वा] "having interposed / having mediated"
- @deva[पदेकृत्य] or @deva[पदे कृत्वा] "having placed in position (figuratively)"
- @deva[निवचनेकृत्य] or @deva[निवचने कृत्वा] "having rendered speechless"

**Contrast (literal placement — no @deva[गति]):**
- @deva[हस्तिनः पदे कृत्वा शिरः शेते] "he lies having placed his head at the elephant's foot" — physical placement, not @deva[गति].
"""

standard = """
@deva[मध्ये], @deva[पदे], and @deva[निवचने] with @deva[कृ] are optionally @deva[गति] when not meaning literal placement — @deva[मध्येपदेनिवचने च].

**Rule type — @deva[विभाषा] extension of @deva[गति]:** Continues the @deva[अनिधान] (non-placement) condition from @ref[1.4.75].

**Examples:**
- @deva[मध्येकृत्य] / @deva[मध्ये कृत्वा] "having interposed"
- @deva[पदेकृत्य] / @deva[पदे कृत्वा] "having placed in position"
- @deva[निवचनेकृत्य] / @deva[निवचने कृत्वा] "having silenced"

**@deva[अनिधान] continues:** By @deva[अनुवृत्ति] from @ref[1.4.75], the non-placement condition applies. Physical, literal placement of something "in the middle" or "at the foot" does not trigger @deva[गति].

**Contrast:** @deva[हस्तिनः पदे कृत्वा शिरः शेते] — literal placement → @deva[निधान] → not @deva[गति].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[विभाषा] from @ref[1.4.72]; @deva[अनिधाने] from @ref[1.4.75]; @deva[क्रियायोगे] from @ref[1.4.59].

@deva[मध्येपदेनिवचने च] — @deva[मध्ये], @deva[पदे], and @deva[निवचने] are optionally @deva[गति] with @deva[कृ] (in non-placement sense).

**Locative forms as @deva[गति]:** Like @ref[1.4.75] (@deva[उरसि]/@deva[मनसि]), these are locative case forms that become @deva[गति]. The pattern of frozen locatives compounding with @deva[कृ] is a distinctive feature of this part of the grammar.

**@deva[निवचन] = "silence, speechlessness":** @deva[निवचनेकृ] means "to render speechless" — a figurative expression. The literal reading ("placing in silence") is excluded by @deva[अनिधान].

**Diagnostic:** @deva[मध्येकृत्य] (compound, @deva[ल्यप्]) = figurative, @deva[गति] applied. @deva[मध्ये कृत्वा] = either literal (not @deva[गति]) or figurative with the non-@deva[गति] option exercised.
"""

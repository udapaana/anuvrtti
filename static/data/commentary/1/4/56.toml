id = "1.4.56"
numericId = "14056"

[en]
simple = """
From this rule through @ref[1.4.97], the words described are called @deva[प्राग्रीश्वरान्निपाताः] — that is, @deva[निपात] "particle."

This is a heading rule (@deva[अधिकार]) that opens a new section. Everything defined from here to @ref[1.4.97] receives the designation @deva[निपात]. Particles are words that don't refer to things or actions — they are function words like "and," "or," "not," "indeed," etc.

The words called @deva[गति] "motion-prefix," @deva[उपसर्ग] "verbal prefix," and @deva[कर्मप्रवचनीय] "case-relation indicator" in the following rules also carry the @deva[निपात] label alongside their more specific names.
"""

standard = """
From here through @ref[1.4.97], the items described are @deva[निपात] — @deva[प्राग्रीश्वरान्निपाताः].

**Rule type — @deva[अधिकार] (heading):** Governs @ref[1.4.56]–@ref[1.4.97]. Every word designated in this range receives the @deva[निपात] label.

**@deva[प्राग्रीश्वरात्] = "up to (but not including) the @deva[ईश्वर] section":** The @deva[निपात] @deva[अधिकार] extends until @ref[1.4.97]. @ref[1.4.98] begins a new topic.

**Scope:** The @deva[निपात] designation applies to:
- @deva[चादि] words (@ref[1.4.57])
- @deva[प्रादि] words (@ref[1.4.58])
- @deva[उपसर्ग] (@ref[1.4.59])
- @deva[गति] (@ref[1.4.60]–@ref[1.4.79])
- @deva[कर्मप्रवचनीय] (@ref[1.4.83]–@ref[1.4.97])

**Multiple designations:** Words in this range may carry @deva[निपात] alongside other names (@deva[उपसर्ग], @deva[गति], @deva[कर्मप्रवचनीय]). The @deva[निपात] designation is the umbrella term.
"""

advanced = """
@deva[प्राग्रीश्वरान्निपाताः] — items described up to the @deva[ईश्वर] boundary are @deva[निपात].

**@deva[अधिकार] mechanics:** This is a boundary-marking @deva[अधिकार]. The term @deva[प्राग्रीश्वरात्] sets the endpoint — the @deva[निपात] @deva[अधिकार] runs until the topic shifts. The tradition identifies @ref[1.4.97] as the last rule under this heading.

**@deva[निपात] properties:** The @deva[निपात] designation triggers several rules:
- @deva[निपात] words are @deva[अव्यय] (indeclinables) by @ref[1.1.37]
- They undergo specific accent rules (@ref[8.1.18]ff)
- They interact with compound formation rules

**Hierarchy of designations:**
- @deva[निपात] — broadest: all particles (@ref[1.4.56]–@ref[1.4.97])
- @deva[गति] — narrower: prefix-like words with verbs (@ref[1.4.60]ff)
- @deva[उपसर्ग] — narrowest: @deva[प्रादि] specifically with verbs (@ref[1.4.59])
- @deva[कर्मप्रवचनीय] — separate: case-governing particles (@ref[1.4.83]ff)

A @deva[प्रादि] word with a verb is simultaneously @deva[निपात], @deva[उपसर्ग], and @deva[गति] — three @deva[संज्ञा]s at once. @ref[1.4.1] (@deva[एकसंज्ञा]) does not apply here because these designations serve different operational purposes.

**Transition from @deva[कारक]:** @ref[1.4.55] closed the @deva[कारक] section. This rule begins a completely different domain — particles and prefixes.
"""

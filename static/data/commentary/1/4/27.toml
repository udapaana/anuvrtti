id = "1.4.27"
numericId = "14027"

[en]
simple = """
With verbs of prevention or warding off, the desired object from which someone is blocked is called @deva[अपादान] "ablative source."

When you stop a cow from eating barley, the barley — which the cow desires — is the @deva[अपादान].

**Examples:**
- @deva[यवेभ्यो गां वारयति] "he wards the cow off from the barley" (@deva[यव] is @deva[अपादान])
- @deva[यवेभ्यो गां निवर्तयति] "he turns the cow back from the barley"

The place where the prevention happens takes the locative: @deva[गां वारयति क्षेत्रे] "he wards off the cow in the field."
"""

standard = """
With verbs of prevention (@deva[वृ], @deva[निवृत्]), the desired object from which one is blocked is @deva[अपादान] — @deva[वारणार्थानामीप्सितः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.24]:** The prevented entity "departs" from its goal — the goal (desired object) is @deva[अपादान].

**Examples:**
- @deva[यवेभ्यो गां वारयति] "he wards the cow off from the barley"
- @deva[यवेभ्यो गां निवर्तयति] "he turns the cow back from the barley"

**@deva[ईप्सित] = "desired":** The barley is what the cow desires. The prevention creates separation between the cow and its desired object.

**Place of prevention → locative:** @deva[गां वारयति क्षेत्रे] "he wards off the cow in the field" — the field is @deva[अधिकरण], not @deva[अपादान].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अपादान] from @ref[1.4.24]; @deva[कारके] from @ref[1.4.23].

@deva[वारणार्थानामीप्सितः] — with prevention verbs, the desired object is @deva[अपादान].

**@deva[ईप्सित] condition:** The blocked entity (cow) desires the @deva[अपादान] (barley). Prevention creates a separation between the agent and its goal — structurally parallel to physical departure.

**Verbs covered:** @deva[वृ] "to ward off," @deva[निवृत्] "to turn back," and any verb with @deva[वारणार्थ] (prevention meaning).

**Three-way analysis of the sentence @deva[यवेभ्यो गां वारयति]:**
- @deva[गाम्] = @deva[कर्मन्] (accusative — the entity acted upon)
- @deva[यवेभ्यः] = @deva[अपादान] (ablative — the desired goal from which blocked)
- Subject = @deva[कर्तृ] (nominative — the preventer)

**@deva[अपादान] series position:** Sixth extension. The progression shows increasingly abstract "departures" — from physical space to desires.
"""

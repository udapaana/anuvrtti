id = "1.4.73"
numericId = "14073"

[en]
simple = """
The words @deva[उपाजे] and @deva[अन्वाजे] — both meaning "supporting the weak" or "giving supplementary assistance" — are optionally @deva[गति] when combined with @deva[कृ] "to make."

**Examples (both valid):**
- @deva[उपाजेकृत्य] "having given support" (compound — @deva[गति])
- @deva[उपाजे कृत्वा] "having given support" (separate — no @deva[गति])
- @deva[अन्वाजेकृत्य] or @deva[अन्वाजे कृत्वा]

These words describe the act of giving additional help or support to someone who is struggling.
"""

standard = """
@deva[उपाजे] and @deva[अन्वाजे] with @deva[कृ] are optionally @deva[गति] — @deva[उपाजेऽन्वाजे च].

**Rule type — @deva[विभाषा] extension of @deva[गति]:** Both forms (compound and separate) are grammatically valid.

**Examples:**
- @deva[उपाजेकृत्य] / @deva[उपाजे कृत्वा] "having given supplementary support"
- @deva[अन्वाजेकृत्य] / @deva[अन्वाजे कृत्वा] "having given additional help"

**@deva[उपाजे] and @deva[अन्वाजे]:** Both mean "supporting/assisting the weak" — @deva[उप] + @deva[आजे] "driving alongside" (helping someone along). These are specialized terms for charitable or assistive acts.

**Restriction to @deva[कृ]:** The @deva[गति] designation applies only with @deva[कृ], not with other verbs. This follows the pattern of several @deva[गति] rules that specify particular verb combinations.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[विभाषा] from @ref[1.4.72]; @deva[क्रियायोगे] from @ref[1.4.59].

@deva[उपाजेऽन्वाजे च] — @deva[उपाजे] and @deva[अन्वाजे] are optionally @deva[गति] (with @deva[कृ]).

**@deva[विभाषा] continuation:** The optionality from @ref[1.4.72] continues by @deva[अनुवृत्ति]. Several consecutive rules (@ref[1.4.72]–@ref[1.4.79]) establish optional @deva[गति] for various words with specific verbs.

**Semantic domain:** @deva[उपाजे] and @deva[अन्वाजे] belong to a specialized vocabulary of charitable support — giving additional aid to someone weak or struggling. The @deva[गति] designation allows these expressions to compound with @deva[कृ] for a more integrated expression.

**@deva[गति] section structure — optional block:** @ref[1.4.72]–@ref[1.4.79] form a contiguous block of optional @deva[गति] rules, each adding specific words. The optionality means speakers had genuine choice in how to express these concepts — compound or periphrastic.
"""

id = "1.4.84"
numericId = "14084"

[en]
simple = """
The word @deva[अनु] is @deva[कर्मप्रवचनीय] "action-qualifier" when it indicates an attendant circumstance or sign — meaning "after," "in consequence of," or "indicated by."

When @deva[अनु] connects an event to its attendant circumstance, the associated noun takes the accusative case.

**Example:**
- @deva[जपम् अनु प्रावर्षत्] "it rained after (in consequence of) the prayers" — the prayers were the sign or circumstance that accompanied the rain

Here @deva[अनु] is not a verbal prefix but an independent particle qualifying the relationship between the rain and the prayers.
"""

standard = """
@deva[अनु] is @deva[कर्मप्रवचनीय] when denoting @deva[लक्षण] (sign, attendant circumstance) — @deva[अनुर्लक्षणे].

**Rule type — @deva[संज्ञा]:** Assigns @deva[कर्मप्रवचनीय] to @deva[अनु] in a specific meaning.

**Examples:**
- @deva[जपम् अनु प्रावर्षत्] "it rained in consequence of the prayers"
- @deva[अगस्त्यम् अनु असिंचत् प्रजाः] "people sprinkled water after Canopus (the star) rose"

**@deva[लक्षण] = "sign, invariable accompaniment":** The noun governed by @deva[अनु] names the event or phenomenon that invariably accompanies the main action. The prayers are the "sign" of rain — whenever there are prayers, rain follows.

**Case governance:** The governed noun takes accusative by @ref[2.3.8] — @deva[जपम्] (accusative), not @deva[जपेन] (instrumental).

**Distinct from @deva[उपसर्ग]:** When @deva[अनु] is @deva[उपसर्ग] (e.g., @deva[अनुगच्छति] "follows"), it modifies the verb directly. As @deva[कर्मप्रवचनीय], it stands independently, governing a noun.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[अनुर्लक्षणे] — @deva[अनु] is @deva[कर्मप्रवचनीय] in the @deva[लक्षण] (sign/attendant circumstance) sense.

**@deva[लक्षण] = invariable concomitant:** The @deva[काशिका] defines @deva[लक्षण] as @deva[नित्यसमवाय] — "invariable co-occurrence." The prayers always accompany rain in the context described. @deva[अनु] marks this temporal/causal relationship.

**Case interaction with @ref[2.3.8] and @ref[2.3.23]:** @deva[कर्मप्रवचनीय] governs accusative by @ref[2.3.8]. But @deva[हेतु] (cause) normally takes instrumental by @ref[2.3.23]. The separate @deva[कर्मप्रवचनीय] designation for @deva[अनु] prevents @ref[2.3.23] from overriding @ref[2.3.8] — ensuring the accusative is retained even when @deva[अनु] expresses cause.

**@deva[कर्मप्रवचनीय] series begins:** @ref[1.4.84]–@ref[1.4.97] assign @deva[कर्मप्रवचनीय] to various particles in specific meanings. @deva[अनु] appears in multiple rules (@ref[1.4.84]–@ref[1.4.86]) for different senses.
"""

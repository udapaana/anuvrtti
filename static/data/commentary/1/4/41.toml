id = "1.4.41"
numericId = "14041"

[en]
simple = """
With @deva[अनु] + @deva[गॄ] or @deva[प्रति] + @deva[गॄ] meaning "to encourage by repeating" or "to respond to," the person being encouraged or responded to is called @deva[सम्प्रदान] "recipient."

In Vedic ritual, when a priest chants, the other priests may repeat or respond to his words as encouragement. The original chanter — the person being supported — is the @deva[सम्प्रदान].

**Examples:**
- @deva[होत्रे अनुगृणाति] "he encourages the @deva[होतृ] (by repeating his chant)"
- @deva[होत्रे प्रतिगृणाति] "he responds to the @deva[होतृ]"

The @deva[होतृ] (the invoking priest) takes the dative — the encouragement or response is directed toward him.
"""

standard = """
With @deva[अनु]/@deva[प्रति] + @deva[गॄ] "to encourage by repeating/responding," the prior agent (the original chanter) is @deva[सम्प्रदान] — @deva[अनुप्रतिगृणश्च].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.32]:** The person being encouraged "receives" the supportive repetition — the responsive chant is directed toward them.

**Examples:**
- @deva[होत्रे अनुगृणाति] "he encourages the @deva[होतृ] by repeating"
- @deva[होत्रे प्रतिगृणाति] "he responds to the @deva[होतृ]"
- @deva[अध्वर्यवे प्रतिगृणाति] "he responds to the @deva[अध्वर्यु]"

**@deva[पूर्वस्य कर्ता] (from @ref[1.4.40]):** Like @ref[1.4.40], the @deva[सम्प्रदान] is the agent of a prior action — the person who first chanted, to whom the response is directed.

**Prefix requirement:** @deva[गॄ] alone means "to sing/chant." Only with @deva[अनु] ("following") or @deva[प्रति] ("in response") does it acquire the responsive meaning that triggers @deva[सम्प्रदान].

**Final @deva[सम्प्रदान] extension:** This closes the @deva[सम्प्रदान] series (@ref[1.4.32]–@ref[1.4.41]). The grammar moves to @deva[करण] at @ref[1.4.42].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सम्प्रदान] from @ref[1.4.32]; @deva[पूर्वस्य कर्ता] from @ref[1.4.40]; @deva[कारके] from @ref[1.4.23].

@deva[अनुप्रतिगृणश्च] — and with @deva[अनु]/@deva[प्रति] + @deva[गॄ], the prior agent is @deva[सम्प्रदान].

**@deva[च] = "and":** The @deva[च] continues the @deva[पूर्वस्य कर्ता] condition from @ref[1.4.40]. Both @ref[1.4.40] and this rule share the same structural pattern: two-action scenarios where the agent of the prior action becomes @deva[सम्प्रदान] of the responsive action.

**Vedic ritual context:** @deva[अनुगॄ] and @deva[प्रतिगॄ] are specifically ritual terms. The @deva[उद्गातृ] (chanting priest) responds to the @deva[होतृ]'s invocation — the @deva[होतृ] "receives" the supporting chant.

**Completing the @deva[सम्प्रदान] series (@ref[1.4.32]–@ref[1.4.41]):**
1. @ref[1.4.32]: giving (core definition)
2. @ref[1.4.33]: pleasing (@deva[रुच्]-sense)
3. @ref[1.4.34]: communication (@deva[श्लाघ्]/@deva[ह्नु]/@deva[स्था]/@deva[शप्])
4. @ref[1.4.35]: owing (@deva[धारय्])
5. @ref[1.4.36]: desire (@deva[स्पृह्])
6. @ref[1.4.37]: hostility (@deva[क्रुध्]/@deva[द्रुह्]/@deva[ईर्ष्य]/@deva[असूय])
7. @ref[1.4.38]: exception — prefixed @deva[क्रुध्]/@deva[द्रुह्] → @deva[कर्मन्]
8. @ref[1.4.39]: divination (@deva[राध्]/@deva[ईक्ष्])
9. @ref[1.4.40]: promising (@deva[प्रतिश्रु]/@deva[आश्रु])
10. @ref[1.4.41] (this): ritual response (@deva[अनुगॄ]/@deva[प्रतिगॄ])

**Transition:** @ref[1.4.42] begins the @deva[करण] (instrument) section — the third @deva[कारक].
"""

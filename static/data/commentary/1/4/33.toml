id = "1.4.33"
numericId = "14033"

[en]
simple = """
With verbs meaning "to please" or "to taste good to," the person who is pleased is called @deva[सम्प्रदान] "recipient."

When something pleases someone, the pleased person receives the pleasant experience — making them the @deva[सम्प्रदान].

**Examples:**
- @deva[देवदत्ताय रोचते मोदकः] "the sweet pleases Devadatta" (@deva[देवदत्त] is @deva[सम्प्रदान])
- @deva[यज्ञदत्ताय स्वदते अपूपः] "the cake tastes good to @[yajñadatta]"

Here the sweet or cake is the subject (nominative), and the pleased person takes the dative — the characteristic pattern of "experiencer" constructions in Sanskrit.
"""

standard = """
With @deva[रुच्]-meaning verbs ("to please"), the one pleased is @deva[सम्प्रदान] — @deva[रुच्यर्थानां प्रीयमाणः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.32]:** No giving occurs here, but the pleased person "receives" pleasure — metaphorically parallel to receiving a gift.

**Examples:**
- @deva[देवदत्ताय रोचते मोदकः] "the sweet pleases Devadatta"
- @deva[यज्ञदत्ताय स्वदते अपूपः] "the cake tastes good to @[yajñadatta]"

**Verbs covered:** @deva[रुच्] "to please," @deva[स्वद्] "to taste good," and any verb with @deva[रुच्यर्थ] (pleasing meaning).

**Sentence structure:** The thing that pleases is the nominative subject; the pleased person takes @deva[चतुर्थी] (dative). This is an "experiencer dative" construction.

**@deva[प्रीयमाण] = "one being pleased":** The experiencer of pleasure is @deva[सम्प्रदान], not @deva[कर्मन्].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सम्प्रदान] from @ref[1.4.32]; @deva[कारके] from @ref[1.4.23].

@deva[रुच्यर्थानां प्रीयमाणः] — with verbs meaning "to please," the pleased entity is @deva[सम्प्रदान].

**Experiencer as @deva[सम्प्रदान]:** In @deva[देवदत्ताय रोचते मोदकः], Devadatta is the experiencer of pleasure. He is not the agent (the sweet is the grammatical subject) nor the object. He "receives" pleasure — hence @deva[सम्प्रदान].

**Why not @deva[कर्मन्]?** In languages like English, "X pleases Y" makes Y the object. In @deva[पाणिनि]'s analysis, Y is @deva[सम्प्रदान] (dative) because pleasure is "given" to Y — the verb denotes transfer of an experience.

**@deva[सम्प्रदान] extension pattern:** @ref[1.4.32] defines @deva[सम्प्रदान] through giving. Extensions (@ref[1.4.33]–@ref[1.4.41]) broaden it to other "receiving" scenarios: receiving pleasure (this), receiving praise, receiving a debt, etc.
"""

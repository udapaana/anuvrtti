id = "1.4.34"
numericId = "14034"

[en]
simple = """
With the verbs @deva[श्लाघ्] "to praise," @deva[ह्नु] "to conceal," @deva[स्था] "to resolve/vow," and @deva[शप्] "to curse," the person to whom the act is directed — the intended audience — is called @deva[सम्प्रदान] "recipient."

**Examples:**
- @deva[देवदत्ताय श्लाघते] "he praises (for Devadatta to know)"
- @deva[देवदत्ताय ह्नुते] "he conceals (from Devadatta)"
- @deva[देवदत्ताय शपते] "he curses (for Devadatta to hear)"

In each case, the person in the dative is the intended recipient of the information — the one meant to know about the praise, concealment, vow, or curse.
"""

standard = """
With @deva[श्लाघ्] "praise," @deva[ह्नु] "conceal," @deva[स्था] "resolve/vow," @deva[शप्] "curse" — the person one intends to inform is @deva[सम्प्रदान] — @deva[श्लाघह्नुस्थाशपां ज्ञीप्सामाणः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.32]:** The recipient of these acts "receives" the information — praise, concealment, vow, or curse.

**Examples:**
- @deva[देवदत्ताय श्लाघते] "he praises (intending Devadatta to know)"
- @deva[देवदत्ताय ह्नुते] "he conceals (from/regarding Devadatta)"
- @deva[देवदत्ताय शपते] "he curses"

**@deva[ज्ञीप्सामान] = "intending to make known":** The @deva[सम्प्रदान] is the target audience — the person the speaker wants to inform. The act of praising, concealing, vowing, or cursing is directed at this person.

**Four verbs — one pattern:** All four share the structure of a communicative act directed toward an addressee.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सम्प्रदान] from @ref[1.4.32]; @deva[कारके] from @ref[1.4.23].

@deva[श्लाघह्नुस्थाशपां ज्ञीप्सामाणः] — with @deva[श्लाघ्]/@deva[ह्नु]/@deva[स्था]/@deva[शप्], the person one intends to inform is @deva[सम्प्रदान].

**@deva[ज्ञीप्सामान] = desiderative of @deva[ज्ञापय्]:** "Wishing to make known." The @deva[सम्प्रदान] is the intended recipient of knowledge about the action. This is a communicative @deva[सम्प्रदान] — different from the giving-based definition of @ref[1.4.32].

**Verb-by-verb analysis:**
- @deva[श्लाघ्]: "he praises to/before X" — X receives the praise
- @deva[ह्नु]: "he conceals from X" — X is the one from whom something is hidden (recipient of concealment)
- @deva[स्था]: "he vows before X" — X witnesses/receives the vow
- @deva[शप्]: "he curses X" — X receives the curse

**Why these four together?** All involve a speech act with an intended audience. The @deva[सम्प्रदान] is not the beneficiary of the action but the target of communication.

**@deva[सम्प्रदान] series position:** Third extension. The pattern broadens from material giving (@ref[1.4.32]) to experiential "giving" (@ref[1.4.33]) to communicative "giving" (this).
"""

id = "1.4.26"
numericId = "14026"

[en]
simple = """
With @deva[परा] + @deva[जि] meaning "to find unbearable" or "to recoil from," the thing found unbearable is called @deva[अपादान] "ablative source."

**Example:**
- @deva[अध्ययनात् पराजयते] "he finds study unbearable" (@deva[अध्ययन] is @deva[अपादान])

The idea is that the person mentally "departs from" or recoils from the unbearable thing.

**Different meaning — different role:** When @deva[परा] + @deva[जि] means "to defeat," the defeated entity is the object (@deva[कर्मन्]), not @deva[अपादान]:
- @deva[शत्रून् पराजयते] "he defeats the enemies" (accusative — @deva[कर्मन्])
"""

standard = """
With @deva[परा] + @deva[जि] in the sense of "finding unbearable," the unbearable entity is @deva[अपादान] — @deva[पराजेरसहने].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.24]:** Adds a figurative "recoiling from" sense to @deva[अपादान].

**Example:** @deva[अध्ययनात् पराजयते] "he finds study unbearable" (@deva[अध्ययन] = @deva[अपादान] → @deva[पञ्चमी])

**Meaning restriction — @deva[असहन]:** Only when @deva[पराजि] means "to find unbearable / to recoil from." In the "defeat" sense, the object is @deva[कर्मन्]:
- @deva[शत्रून् पराजयते] "he defeats the enemies" (accusative)

**Semantic logic:** "Finding X unbearable" involves psychological withdrawal from X — a metaphorical departure. This parallels the fear extension in @ref[1.4.25].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अपादान] from @ref[1.4.24]; @deva[कारके] from @ref[1.4.23].

@deva[पराजेरसहने] — with @deva[परा] + @deva[जि] meaning @deva[असहन] (not bearing), the unbearable entity is @deva[अपादान].

**Meaning-conditioned @deva[कारक]:** This rule applies only in the @deva[असहन] sense. The same verb @deva[पराजि] in the "defeat" sense takes @deva[कर्मन्] (accusative):
- @deva[असहन]: @deva[अध्ययनात् पराजयते] (ablative)
- Defeat: @deva[शत्रून् पराजयते] (accusative)

**Pattern of @deva[अपादान] extensions:** @ref[1.4.24]–@ref[1.4.31] progressively extend @deva[अपादान] from physical departure to psychological states:
- @ref[1.4.24]: physical departure
- @ref[1.4.25]: fear/protection
- @ref[1.4.26] (this): finding unbearable
- @ref[1.4.27]: prevention
- @ref[1.4.28]: concealment
- @ref[1.4.29]: formal learning
- @ref[1.4.30]: material origin (@deva[जन्])
"""

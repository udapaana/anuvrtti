id = "1.4.96"
numericId = "14096"

[en]
simple = """
The word @deva[अपि] is @deva[कर्मप्रवचनीय] "action-qualifier" in five senses:

1. **Understood word:** @deva[सर्पिषोऽपि स्यात्] "there may be a drop of ghee" — a word like "drop" is implied
2. **Possibility:** @deva[अपि सिञ्चेत् मूलकसहस्रम्] "he might water a thousand radishes" — expressing what could happen
3. **Permission:** @deva[अपि सिञ्च] "sprinkle if you like" — granting leave to act
4. **Censure:** expressing disapproval
5. **Collection:** @deva[अपि स्तुहि अपि सिञ्च] "both praise and sprinkle" — combining actions

Because @deva[अपि] is @deva[कर्मप्रवचनीय] (not @deva[उपसर्ग]), @deva[स] does not become @deva[ष].
"""

standard = """
@deva[अपि] is @deva[कर्मप्रवचनीय] in five senses — @deva[अपिः पदार्थसम्भावनान्वसर्गगर्हासमुच्चयेषु].

**Rule type — @deva[संज्ञा]:** @deva[कर्मप्रवचनीय] in five distinct functions.

**Five senses:**
1. @deva[पदार्थ] (implied word): @deva[सर्पिषोऽपि स्यात्] "there may be a drop of ghee" — @deva[अपि] suggests an unstated quantity word
2. @deva[संभावन] (possibility): @deva[अपि सिञ्चेत् मूलकसहस्रम्] "he might water a thousand radishes" — potential mood
3. @deva[अन्वसर्ग] (permission): @deva[अपि सिञ्च] "sprinkle if you like" — imperative mood
4. @deva[गर्हा] (censure): expressing disapproval or reproach
5. @deva[समुच्चय] (collection): @deva[अपि स्तुहि अपि सिञ्च] "both praise and sprinkle" — combining multiple actions

**Phonological consequence:** As @deva[कर्मप्रवचनीय], @deva[अपि] does not trigger @deva[स] → @deva[ष] by @ref[8.3.65]. Compare @deva[अपि सिञ्च] (no @deva[ष]) — if @deva[अपि] were @deva[उपसर्ग], the form would be @deva[अपि षिञ्च].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[अपिः पदार्थसम्भावनान्वसर्गगर्हासमुच्चयेषु] — @deva[अपि] is @deva[कर्मप्रवचनीय] in five senses.

**Most senses for any @deva[कर्मप्रवचनीय] particle (in a single rule):** While @deva[प्रति] accumulates six senses across @ref[1.4.90] and @ref[1.4.92], @deva[अपि] receives five in this one rule — the largest single-rule enumeration in the @deva[कर्मप्रवचनीय] section.

**Mood correlations:** The @deva[काशिका] notes that @deva[संभावन] correlates with @deva[विधिलिङ्] (potential mood — @deva[सिञ्चेत्]), while @deva[अन्वसर्ग] correlates with @deva[लोट्] (imperative — @deva[सिञ्च]). The verbal mood helps disambiguate which sense of @deva[अपि] is intended.

**@deva[पदार्थ] = "implied word":** This is a unique function — @deva[अपि] signals that a word is understood but unstated. In @deva[सर्पिषोऽपि स्यात्], the quantity word (like @deva[बिन्दु] "drop") is elided. This function is not found with any other @deva[कर्मप्रवचनीय] particle.

**@deva[समुच्चय] and @deva[निपात] overlap:** @deva[अपि] in the @deva[समुच्चय] sense functions like a conjunction ("both...and"). This overlaps with its @deva[निपात] function from @ref[1.4.57]. The @deva[कर्मप्रवचनीय] designation here ensures it does not acquire @deva[उपसर्ग] status when used conjunctionally near a verb.
"""

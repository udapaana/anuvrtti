id = "1.4.24"
numericId = "14024"

[en]
simple = """
The fixed point from which departure takes place is called @deva[अपादान] "ablative source."

When something moves away from a place, the place it leaves is the @deva[अपादान]. The key condition is that the source must be fixed (stationary) — the moving thing departs from it.

**Examples:**
- @deva[ग्रामादागच्छति] "he comes from the village" (@deva[ग्राम] is @deva[अपादान])
- @deva[पर्वतादवरोहति] "he descends from the mountain" (@deva[पर्वत] is @deva[अपादान])
- @deva[रथात् पतितः] "fallen from the chariot" (@deva[रथ] is @deva[अपादान])

The @deva[अपादान] takes the fifth case ending (@deva[पञ्चमी]) — the ablative case.
"""

standard = """
The fixed point from which departure occurs is @deva[अपादान] — @deva[ध्रुवमपायेऽपादानम्].

**Rule type — @deva[संज्ञा]:** Defines the first @deva[कारक] — the source of separation.

**Two conditions:**
1. @deva[ध्रुव] — the source must be fixed/stationary
2. @deva[अपाय] — separation/departure must occur from it

**Examples:**
- @deva[ग्रामादागच्छति] "he comes from the village"
- @deva[पर्वतादवरोहति] "he descends from the mountain"
- @deva[रथात् पतितः] "fallen from the chariot"
- @deva[वृक्षात् पर्णं पतति] "the leaf falls from the tree"

**Case marking:** @deva[अपादान] takes @deva[पञ्चमी] (5th case / ablative) by @ref[2.3.28].

**@deva[ध्रुव] condition:** The source must be relatively stationary. In @deva[ग्रामादागच्छति], the village stays put while the person departs. If both are moving, the relationship is different.

**Scope:** This is the general definition. @ref[1.4.25]–@ref[1.4.31] extend @deva[अपादान] to specific non-movement contexts (fear, learning, etc.).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कारके] from @ref[1.4.23].

@deva[ध्रुवमपायेऽपादानम्] — the fixed point in separation is @deva[अपादान].

**Core @deva[कारक] definition:** @deva[अपादान] is the first @deva[कारक] defined. Its placement first means it has the widest scope but lowest priority in conflicts (by @ref[1.4.2]).

**@deva[ध्रुव] = fixed/stationary:** This is a relative term. The source is "fixed" relative to the departing entity. In @deva[वृक्षात् पर्णं पतति], the tree is fixed relative to the falling leaf.

**@deva[अपाय] = separation/departure:** The technical term @deva[अपाय] encompasses physical departure, falling, emerging, and figurative separation.

**Extensions (@ref[1.4.25]–@ref[1.4.31]):** @deva[पाणिनि] extends @deva[अपादान] to non-physical "departures":
- @ref[1.4.25]: source of fear/protection
- @ref[1.4.26]: source of concealment
- @ref[1.4.27]: teacher (source of knowledge)
- @ref[1.4.28]: born from (@deva[जन्] + origin)
- @ref[1.4.29]: standard of comparison
- @ref[1.4.30]: distant point
- @ref[1.4.31]: @deva[पूर्व] "before" in temporal sense

**@deva[अपादान] → @deva[पञ्चमी]:** The mapping is established by @ref[2.3.28] (@deva[अपादाने पञ्चमी]).
"""

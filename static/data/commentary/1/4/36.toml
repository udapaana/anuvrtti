id = "1.4.36"
numericId = "14036"

[en]
simple = """
With the verb @deva[स्पृह्] "to desire, to long for," the thing desired is called @deva[सम्प्रदान] "recipient."

When you long for something, that thing is the @deva[सम्प्रदान] (recipient) — your desire is directed toward it, as if you are "giving" your longing to the object.

**Examples:**
- @deva[पुष्पेभ्यः स्पृहयति] "he longs for flowers" (@deva[पुष्प] is @deva[सम्प्रदान])
- @deva[फलेभ्यः स्पृहयति] "he longs for fruits"

The desired object takes the dative case — the longing flows toward it.
"""

standard = """
With @deva[स्पृह्] "to desire," the object of desire is @deva[सम्प्रदान] — @deva[स्पृहेरीप्सितः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.32]:** The desired thing "receives" the longing — desire flows toward the object.

**Examples:**
- @deva[पुष्पेभ्यः स्पृहयति] "he longs for flowers"
- @deva[फलेभ्यः स्पृहयति] "he longs for fruits"
- @deva[रत्नेभ्यः स्पृहयति] "he longs for gems"

**@deva[ईप्सित] = "desired":** The term specifies the object of longing, not the person who desires. The desirer is @deva[कर्ता]; the desired thing is @deva[सम्प्रदान].

**Case marking:** The desired object takes @deva[चतुर्थी] (dative) by @ref[2.3.13]. Note the plural dative in the examples — @deva[स्पृह्] typically governs dative plural.

**Why not @deva[कर्मन्]?** With most desire-verbs, the desired object is @deva[कर्मन्] (accusative). @deva[स्पृह्] is special — its object takes dative, not accusative.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सम्प्रदान] from @ref[1.4.32]; @deva[कारके] from @ref[1.4.23].

@deva[स्पृहेरीप्सितः] — with @deva[स्पृह्], the desired thing is @deva[सम्प्रदान].

**@deva[ईप्सित] = desiderative sense:** From @deva[ईप्स्] (desiderative of @deva[आप्] "to obtain") — "that which one wishes to obtain." This distinguishes the object of longing from other participants.

**Contrast with other desire-verbs:** @deva[इष्] "to desire" and @deva[कम्] "to want" take @deva[कर्मन्] (accusative). Only @deva[स्पृह्] assigns @deva[सम्प्रदान] to its object. This is a verb-specific @deva[कारक] assignment — the semantic role depends on the particular @deva[धातु].

**@deva[सम्प्रदान] series position:** Fifth extension. The pattern now extends from giving (@ref[1.4.32]) through pleasing (@ref[1.4.33]), communication (@ref[1.4.34]), owing (@ref[1.4.35]), to desire (this). Each broadens the "receiving" metaphor further.

**Scope:** Restricted to @deva[स्पृह्] specifically. The @deva[कारक] assignment does not extend to synonyms — only this root governs dative for its object.
"""

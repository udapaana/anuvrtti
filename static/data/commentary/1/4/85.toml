id = "1.4.85"
numericId = "14085"

[en]
simple = """
The word @deva[अनु] is @deva[कर्मप्रवचनीय] "action-qualifier" when it conveys the sense of the instrumental case — meaning "alongside" or "along."

When @deva[अनु] means "alongside," the associated noun takes the accusative case (even though the meaning is "with" or "alongside," which would normally be instrumental).

**Examples:**
- @deva[नदीम् अनु अवसिता सेना] "the army encamped alongside the river"
- @deva[पर्वतम् अनु अवसिता सेना] "the army encamped along the mountain"

@deva[नदीम्] and @deva[पर्वतम्] are accusative, governed by @deva[अनु] as @deva[कर्मप्रवचनीय], even though the meaning is "alongside."
"""

standard = """
@deva[अनु] is @deva[कर्मप्रवचनीय] when expressing @deva[तृतीया]-sense (instrumental — "alongside, with") — @deva[अनुर्तृतीयासमर्थे].

**Rule type — @deva[संज्ञा]:** @deva[अनु] as @deva[कर्मप्रवचनीय] in a second meaning (after @ref[1.4.84]).

**Examples:**
- @deva[नदीम् अनु अवसिता सेना] "the army encamped alongside the river"
- @deva[पर्वतम् अनु अवसिता सेना] "the army encamped along the mountain"

**Case override:** The meaning is instrumental ("alongside"), but the governed noun takes accusative — @deva[नदीम्] not @deva[नद्या]. The @deva[कर्मप्रवचनीय] designation overrides the expected case mapping.

**Second @deva[अनु] rule:** @ref[1.4.84] covers @deva[अनु] in @deva[लक्षण] sense. This rule covers @deva[अनु] in @deva[तृतीया] sense. The particle has multiple @deva[कर्मप्रवचनीय] functions.

**Contrast with @deva[उपसर्ग]:** @deva[अनुवसति] (with verb) — @deva[अनु] is @deva[उपसर्ग]. @deva[नदीम् अनु अवसिता] (independent) — @deva[अनु] is @deva[कर्मप्रवचनीय].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[अनुर्तृतीयासमर्थे] — @deva[अनु] is @deva[कर्मप्रवचनीय] when conveying @deva[तृतीया]-sense ("with, alongside").

**@deva[तृतीयासमर्थ] = "having the capacity of the instrumental":** The meaning is instrumental (accompaniment, proximity), but the governed noun takes accusative by @ref[2.3.8] (the @deva[कर्मप्रवचनीय] case rule). This creates a mismatch between semantic role and case — a hallmark of @deva[कर्मप्रवचनीय] constructions.

**Multiple @deva[कर्मप्रवचनीय] functions of @deva[अनु]:**
- @ref[1.4.84]: @deva[लक्षण] (sign/circumstance) — @deva[जपम् अनु प्रावर्षत्]
- @ref[1.4.85] (this): @deva[तृतीया]-sense (alongside) — @deva[नदीम् अनु]
- @ref[1.4.86]: further sense of @deva[अनु]

Each captures a different syntactic function of the same particle.

**@deva[कर्मप्रवचनीय] vs @deva[उपसर्ग] — same word, different analysis:**
- @deva[नदीम् अनुवसति] — @deva[अनु] is @deva[उपसर्ग] (prefix to @deva[वस्])
- @deva[नदीम् अनु अवसिता] — @deva[अनु] is @deva[कर्मप्रवचनीय] (independent particle)
The syntactic structure determines the designation.
"""

id = "1.4.68"
numericId = "14068"

[en]
simple = """
The indeclinable word @deva[अस्तम्] "setting, disappearing" is called @deva[गति] when combined with a verb.

@deva[अस्तम्] is used primarily with @deva[गम्] "to go" and @deva[इ] "to go" to describe the setting of the sun or the disappearance of things.

**Examples:**
- @deva[अस्तंगत्य सविता पुनरुदेति] "the sun, having set, rises again"
- @deva[अस्तंगतानि धनानि] "riches that have vanished"

The @deva[गति] designation ensures the compound forms correctly — @deva[अस्तंगत्य] (with @deva[ल्यप्]) rather than @deva[अस्तं गत्वा] (separate words with @deva[त्वा]).
"""

standard = """
The indeclinable @deva[अस्तम्] with a verb is @deva[गति] — @deva[अस्तमव्ययस्य].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Like @ref[1.4.67] (@deva[पुरस्]), restricted to the indeclinable form.

**Examples:**
- @deva[अस्तंगत्य] "having set/disappeared" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[अस्तंगतानि धनानि] "vanished riches"
- @deva[यदस्तं गच्छति] "when it sets" (accent by @ref[8.2.71])

**@deva[अस्तम्] formation:** @deva[अव्यय] by @ref[1.1.39] (words ending in @deva[म्] are indeclinable). Etymologically related to @deva[अस्त] "setting, home."

**Primary usage:** @deva[अस्तम्] + @deva[गम्]/@deva[इ] = "to set" (of sun, moon) or "to disappear" (of wealth, fortune). A very common expression in literary Sanskrit.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[अस्तमव्ययस्य] — the indeclinable @deva[अस्तम्] is @deva[गति].

**@deva[अव्यय] qualifier:** Parallels @ref[1.4.67] — the restriction to the indeclinable form prevents confusion with any declinable homonym. @deva[अस्तम्] is @deva[अव्यय] by @ref[1.1.39] (@deva[म्]-final indeclinables).

**@deva[गति] effects:**
- @ref[2.2.18]: compounds with verb (@deva[अस्तंगम्])
- @ref[7.1.37]: @deva[त्वा] → @deva[ल्यप्] (@deva[अस्तंगत्य])
- @ref[6.2.49]: accent retention (@deva[अस्तंगतम्])

**@deva[अस्तंगम्] as a lexicalized compound:** This expression is extremely productive in Sanskrit — @deva[अस्तमयः] "sunset," @deva[अस्तंगत] "set/vanished." The @deva[गति] designation ensures all these forms have proper compound behavior.

**Pair with @ref[1.4.67]:** Both rules add specific indeclinables to @deva[गति] using the same @deva[अव्ययस्य] qualifier. @ref[1.4.69] continues with @deva[अच्छ].
"""

id = "1.4.65"
numericId = "14065"

[en]
simple = """
The word @deva[अन्तर्] "within" is called @deva[गति] when it means "non-acceptance" or "abandoning."

When @deva[अन्तर्] is used in the sense of rejecting, discarding, or abandoning, it combines with a verb as @deva[गति]. In its usual spatial sense ("inside"), it is not @deva[गति].

**Examples (@deva[गति] — abandonment sense):**
- @deva[अन्तर्हत्य गृहं गतः] "having abandoned (the life), he went home"
- @deva[अन्तर्हतम् अनृतम्] "falsehood has been abandoned"

**Contrast (not @deva[गति] — spatial sense):**
- @deva[अन्तर्हत्वा मूषिकां श्येनो गतः] "the hawk, having seized the mouse inside, went" — @deva[अन्तर्] means "within," so no @deva[गति]; the gerund is @deva[हत्वा], not @deva[हत्य].
"""

standard = """
@deva[अन्तर्] with a verb is @deva[गति] when meaning "non-acceptance" or "abandonment" (@deva[अपरिग्रह]) — @deva[अन्तरपरिग्रहे].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Meaning-restricted to the abandonment sense.

**Examples:**
- @deva[अन्तर्हत्य] "having abandoned" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[अन्तर्हतम्] "abandoned" (accent by @ref[6.2.49])
- @deva[यदन्तर्हन्ति] "when he abandons" (accent by @ref[8.2.71])

**Contrast:**
- @deva[अन्तर्हत्वा मूषिकां श्येनो गतः] — @deva[अन्तर्] = "inside" → not @deva[गति] → @deva[हत्वा] (not @deva[हत्य])

**@deva[अपरिग्रह] = "non-grasping, abandonment":** This specific meaning triggers @deva[गति]. The spatial meaning "within" does not.

**@deva[वार्त्तिक] — @deva[अन्तर्] as @deva[उपसर्ग]:** By @deva[वार्त्तिक], @deva[अन्तर्] also functions as @deva[उपसर्ग] in certain forms: @deva[अन्तर्धा] (@ref[3.3.106]), @deva[अन्तर्धिः] (@ref[3.3.92]), @deva[अन्तर्णयति] (with @deva[ण]-substitution by @ref[8.4.14]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[अन्तरपरिग्रहे] — @deva[अन्तर्] is @deva[गति] in the sense of @deva[अपरिग्रह] (non-acceptance, abandonment).

**@deva[अन्तर्] — not in the @deva[प्रादिगण]:** @deva[अन्तर्] is absent from the twenty @deva[प्रादि] words, so it cannot be @deva[उपसर्ग] by @ref[1.4.59]. This rule gives it @deva[गति] status (with meaning restriction), which provides the main compound-forming benefits without @deva[उपसर्ग]-specific effects.

**@deva[वार्त्तिक] extension to @deva[उपसर्ग]:** Despite not being @deva[प्रादि], @deva[अन्तर्] is treated as @deva[उपसर्ग] by @deva[वार्त्तिक] for specific derivations:
- @ref[3.3.106]: @deva[अन्तर्धा] "to conceal" (requires @deva[उपसर्ग])
- @ref[3.3.92]: @deva[अन्तर्धिः] "concealment"
- @ref[8.4.14]: @deva[अन्तर्णयति] (@deva[ण]-substitution requires @deva[उपसर्ग])

**Semantic polysemy:** @deva[अन्तर्] means "within," "between," or "among" in most contexts. The @deva[अपरिग्रह] meaning ("abandoning") is specialized and triggers different grammatical behavior — compound formation vs. separate words.

**Pattern continues:** @ref[1.4.66]ff add more words to the @deva[गति] inventory — @deva[अस्तम्] "to sunset," @deva[अच्छ] "toward," etc.
"""

id = "1.4.46"
numericId = "14046"

[en]
simple = """
With @deva[अधि] + @deva[शी] "to lie upon," @deva[स्था] "to stand upon," or @deva[आस्] "to sit upon" — the location takes the accusative case instead of the locative.

Normally a location is @deva[अधिकरण] (locative). But when @deva[अधि] combines with these three verbs of position, the location becomes @deva[कर्मन्] "object" (accusative) — because the meaning shifts from mere location to "ruling over" or "presiding over."

**Examples:**
- @deva[ग्राममधिशेते] "he rules over the village" (@deva[ग्राम] is @deva[कर्मन्], accusative)
- @deva[ग्राममधितिष्ठति] "he presides over the village"
- @deva[ग्राममध्यास्ते] "he occupies the village"

The village is not just where the action happens — it is what is acted upon.
"""

standard = """
With @deva[अधि] + @deva[शी]/@deva[स्था]/@deva[आस्], the location is @deva[कर्मन्] (accusative) — @deva[अधिशीङ्स्थासां कर्म].

**Rule type — @deva[अपवाद] (exception) to @ref[1.4.45]:** Overrides the @deva[अधिकरण] assignment — the location becomes @deva[कर्मन्] instead.

**Examples:**
- @deva[ग्राममधिशेते] "he rules the village" (@deva[कर्मन्], accusative)
- @deva[ग्राममधितिष्ठति] "he presides over the village"
- @deva[ग्राममध्यास्ते] "he occupies the village"

**Semantic shift:** @deva[अधि] transforms these positional verbs from static ("lying/standing/sitting at") to dynamic/authoritative ("ruling/presiding/occupying"). The location becomes the target of the action, not its backdrop.

**Case consequence:** The location takes @deva[द्वितीया] (accusative) by @ref[2.3.2], not @deva[सप्तमी] (locative).

**Passivization:** Since the location is @deva[कर्मन्], it can become the subject in passive: @deva[ग्रामोऽधिशय्यते] "the village is ruled over."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कारके] from @ref[1.4.23]. @deva[अधिकरण] from @ref[1.4.45] is overridden, not continued.

@deva[अधिशीङ्स्थासां कर्म] — with @deva[अधि] + @deva[शीङ्]/@deva[स्था]/@deva[आस्], the location is @deva[कर्मन्].

**@deva[शीङ्] specification:** The @[sūtra] names @deva[शीङ्] (with @deva[ङ]-marker indicating @deva[आत्मनेपद] by @ref[1.3.12]), not just @deva[शी]. This confirms that @deva[अधिशेते] is @deva[आत्मनेपद].

**@deva[अधिकरण] → @deva[कर्मन्] shift:** The location, which would be @deva[अधिकरण] (locative) by @ref[1.4.45], becomes @deva[कर्मन्] (accusative) when the verb acquires an authoritative/governing meaning through @deva[अधि]. This is a preverb-driven @deva[कारक] reassignment — the same participant changes roles based on the prefix.

**Contrast with @ref[1.4.48]:** @ref[1.4.48] makes a similar @deva[कर्मन्] assignment for prefixed @deva[वस्] "to dwell." Together, @ref[1.4.46]–@ref[1.4.48] form a set of location-to-object promotions within the @deva[अधिकरण] section.

**Interaction with @ref[1.4.2]:** If both @deva[अधिकरण] (@ref[1.4.45]) and @deva[कर्मन्] (this rule) could apply, this rule wins as the more specific (@deva[अपवाद]). The @deva[विप्रतिषेध] metarule is unnecessary.
"""

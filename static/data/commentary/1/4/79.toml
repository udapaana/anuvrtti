id = "1.4.79"
numericId = "14079"

[en]
simple = """
The words @deva[जीविका] "livelihood" and @deva[उपनिषद्] "secret teaching" are @deva[गति] when combined with @deva[कृ] "to make" and meaning "resemblance" — treating something AS IF it were a livelihood or an @deva[उपनिषद्].

**Examples:**
- @deva[जीविकाकृत्य] "having treated it like a livelihood"
- @deva[उपनिषत्कृत्य] "having treated it like a secret teaching"

**Contrast (literal — no @deva[गति]):**
- @deva[जीविकां कृत्वा गतः] "having earned his livelihood, he went" — literal livelihood, not resemblance.
"""

standard = """
@deva[जीविका] and @deva[उपनिषद्] with @deva[कृ] are @deva[गति] when meaning @deva[सादृश्य] (resemblance, "treating as") — @deva[जीविकोपनिषदौ सादृश्ये].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Meaning-restricted to the resemblance/comparison sense.

**Examples:**
- @deva[जीविकाकृत्य] "having treated as a livelihood" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[उपनिषत्कृत्य] "having treated as a secret teaching"

**@deva[सादृश्य] = "resemblance, treating as":** The speaker treats an activity as if it were a livelihood or secret teaching, without it actually being one. @deva[जीविकाकृत्य विद्याम्] "having treated learning as (if it were) a livelihood."

**Contrast:** @deva[जीविकां कृत्वा गतः] — actual livelihood → not @deva[सादृश्य] → not @deva[गति] → @deva[कृत्वा].

**Final @deva[गति] extension:** This closes the @deva[गति] series (@ref[1.4.60]–@ref[1.4.79]). @ref[1.4.80] states the positional rule for all @deva[गति]/@deva[उपसर्ग].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[जीविकोपनिषदौ सादृश्ये] — @deva[जीविका] and @deva[उपनिषद्] are @deva[गति] in the @deva[सादृश्य] (resemblance) sense.

**@deva[सादृश्य] = simile/comparison:** These compounds express figurative comparison — treating X as if it were Y. This is semantically similar to @deva[इव] "like" but expressed through compound formation rather than a particle.

**Completing the @deva[गति] section (@ref[1.4.60]–@ref[1.4.79]):**
The section adds @deva[गति] to progressively more words:
- @ref[1.4.60]: @deva[प्रादि] with verbs (baseline)
- @ref[1.4.61]: @deva[ऊर्यादि]/@deva[च्वि]/@deva[डाच्]
- @ref[1.4.62]–@ref[1.4.66]: semantically conditioned words (onomatopoeia, @deva[सत्], @deva[अलम्], @deva[अन्तर्], @deva[कणे]/@deva[मनस्])
- @ref[1.4.67]–@ref[1.4.70]: specific indeclinables (@deva[पुरस्], @deva[अस्तम्], @deva[अच्छ], @deva[अदस्])
- @ref[1.4.71]–@ref[1.4.79]: @deva[तिरस्], locatives, and specialized words — mix of obligatory and optional

**Transition:** @ref[1.4.80] states the word-order rule: @deva[गति]/@deva[उपसर्ग] precede the verb. @ref[1.4.81]–@ref[1.4.82] cover @deva[दत्], @deva[स्थ], @deva[ग], @deva[घु] designations. @ref[1.4.83]ff begins @deva[कर्मप्रवचनीय].
"""

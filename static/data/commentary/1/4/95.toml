id = "1.4.95"
numericId = "14095"

[en]
simple = """
The word @deva[अति] "beyond, excessively" is @deva[कर्मप्रवचनीय] "action-qualifier" when meaning "excessively" or when expressing respect.

Like @deva[सु] in the previous rule, @deva[अति] can honor the addressee. It also covers excess — doing more than necessary.

**Examples:**
1. **Excess:** @deva[अतिसिक्तं भवता] "abundantly sprinkled by your honor" — more water than needed
2. **Respect:** @deva[अतिस्तुतं भवता] "excellently praised by your honor"

Because @deva[अति] is @deva[कर्मप्रवचनीय] (not @deva[उपसर्ग]), @deva[स] does not become @deva[ष] — just like @deva[सु] in @ref[1.4.94].
"""

standard = """
@deva[अति] is @deva[कर्मप्रवचनीय] for @deva[अतिक्रमण] (excess) and @deva[पूजा] (respect) — @deva[अतिरतिक्रमणे च].

**Rule type — @deva[संज्ञा]:** @deva[कर्मप्रवचनीय] in two senses.

**Examples:**
1. @deva[अतिक्रमण]: @deva[अतिसिक्तं भवता] "abundantly sprinkled by your honor" — exceeding what was needed
2. @deva[पूजा]: @deva[अतिस्तुतं भवता] "excellently praised by your honor"

**The @deva[च] draws @deva[पूजा]:** The word @deva[च] "and" in the @deva[सूत्र] brings in @deva[पूजा] from @ref[1.4.94], adding respect as a second sense alongside excess.

**Phonological effect:** As @deva[कर्मप्रवचनीय], @deva[अति] does not trigger @deva[स] → @deva[ष] by @ref[8.3.65]. Compare: @deva[अतिसिक्तम्] (@deva[कर्मप्रवचनीय], no @deva[ष]) vs @deva[अतिषिक्तम्] (if @deva[उपसर्ग], @deva[ष] would apply).

**@deva[अतिक्रमण] = "going beyond, exceeding":** The action exceeds its normal scope — more than required. This is distinct from simple intensity.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56]; @deva[पूजायाम्] from @ref[1.4.94].

@deva[अतिरतिक्रमणे च] — @deva[अति] is @deva[कर्मप्रवचनीय] for @deva[अतिक्रमण] (excess) and (by @deva[च]) @deva[पूजा] (respect, drawn from @ref[1.4.94]).

**@deva[च] as @deva[अनुवृत्ति] marker:** The @deva[च] explicitly signals that @deva[पूजा] from the previous rule continues into this one. Without @deva[च], only @deva[अतिक्रमण] would apply. This is a common technique in the @deva[अष्टाध्यायी] — @deva[च] pulls a term from a neighboring rule.

**Two senses, one diagnostic:** Both @deva[अतिक्रमण] and @deva[पूजा] share the same grammatical consequence: @deva[अति] is @deva[कर्मप्रवचनीय], not @deva[उपसर्ग], blocking @ref[8.3.65]. The distinction between the two senses is semantic, not formal.

**Pair with @ref[1.4.94]:** @deva[सु] (@ref[1.4.94]) and @deva[अति] (this rule) form a natural pair — both express praise/respect, both block @deva[ष]-substitution. @deva[अति] adds the excess sense that @deva[सु] lacks.

**@deva[अति] as @deva[प्रादि]:** Like @deva[सु], @deva[अति] belongs to the @deva[प्रादि] group (@ref[1.4.58]) and is eligible for @deva[उपसर्ग] status by @ref[1.4.59]. This rule carves out specific senses where it is instead @deva[कर्मप्रवचनीय].
"""

id = "1.4.40"
numericId = "14040"

[en]
simple = """
With @deva[प्रति] + @deva[श्रु] or @deva[आ] + @deva[श्रु] meaning "to promise," the person to whom the promise is made is called @deva[सम्प्रदान] "recipient."

A promise is always directed at someone — the person who asked first and now receives the assurance. That person is the @deva[सम्प्रदान].

**Examples:**
- @deva[देवदत्ताय प्रतिशृणोति] "he promises Devadatta"
- @deva[देवदत्ताय आशृणोति] "he promises Devadatta"

@deva[देवदत्त] takes the dative — he is the one who receives the promise.
"""

standard = """
With @deva[प्रति] + @deva[श्रु] or @deva[आङ्] + @deva[श्रु] "to promise," the person who originally made the request (the prior agent, @deva[पूर्वकालीन]) is @deva[सम्प्रदान] — @deva[प्रत्याङ्भ्यां श्रुवः पूर्वस्य कर्ता].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.32]:** The promisee "receives" the promise — a verbal commitment is directed toward them.

**Examples:**
- @deva[देवदत्ताय प्रतिशृणोति] "he promises Devadatta"
- @deva[देवदत्ताय आशृणोति] "he promises Devadatta"
- @deva[याज्ञदत्ताय प्रतिशृणोति भोजनम्] "he promises food to @[yajñadatta]"

**@deva[पूर्वस्य कर्ता] = "the agent of the prior action":** The promisee is the person who first requested something. The promise is a response to that prior request. The @deva[कर्ता] of the prior asking becomes the @deva[सम्प्रदान] of the promising.

**Prefix requirement:** @deva[श्रु] alone means "to hear." Only with @deva[प्रति] or @deva[आङ्] does it mean "to promise." The @deva[कारक] assignment is contingent on the prefix.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सम्प्रदान] from @ref[1.4.32]; @deva[कारके] from @ref[1.4.23].

@deva[प्रत्याङ्भ्यां श्रुवः पूर्वस्य कर्ता] — with @deva[प्रति]/@deva[आङ्] + @deva[श्रु], the agent of the prior action is @deva[सम्प्रदान].

**@deva[पूर्वस्य कर्ता] — two-action analysis:** This rule presupposes two actions: (1) a prior request by person A, and (2) a promise by person B in response. The @deva[कर्ता] of action (1) — the requester — becomes the @deva[सम्प्रदान] of action (2). This is a cross-action @deva[कारक] assignment — the role in one sentence depends on participation in a prior event.

**@deva[प्रतिश्रु] vs @deva[आश्रु]:** Both compounds mean "to promise," but @deva[प्रतिश्रु] emphasizes the responsive nature ("hearing back") while @deva[आश्रु] emphasizes acceptance ("hearing toward"). Both govern dative for the promisee.

**Contrast with @ref[1.4.34]:** The communicative verbs in @ref[1.4.34] (@deva[श्लाघ्], @deva[ह्नु], @deva[स्था], @deva[शप्]) direct information toward the @deva[सम्प्रदान]. Promising directs a commitment — a different speech act, requiring a separate rule.

**@deva[सम्प्रदान] series nearing completion:** This is the eighth extension. After @ref[1.4.41] (purpose-infinitive), the @deva[सम्प्रदान] section closes and the grammar moves to @deva[करण] (@ref[1.4.42]).
"""

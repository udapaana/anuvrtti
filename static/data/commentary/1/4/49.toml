id = "1.4.49"
numericId = "14049"

[en]
simple = """
What the agent most wants to reach or accomplish through the action is called @deva[कर्मन्] "object."

In any action, there is something the doer is trying to affect or achieve. That target — the thing the agent most desires to reach — is the @deva[कर्मन्]. It takes the second case ending (@deva[द्वितीया], the accusative case).

**Examples:**
- @deva[कटं करोति] "he makes a mat" (@deva[कट] "mat" is @deva[कर्मन्] — what he wants to produce)
- @deva[ग्रामं गच्छति] "he goes to the village" (@deva[ग्राम] "village" is @deva[कर्मन्] — where he wants to reach)
- @deva[ओदनं पचति] "he cooks rice" (@deva[ओदन] "rice" is @deva[कर्मन्] — what he wants to cook)

The @deva[कर्मन्] is defined by the agent's intention, not by the nature of the object itself.
"""

standard = """
What the agent most desires to reach through the action is @deva[कर्मन्] — @deva[कर्तुरीप्सिततमं कर्म].

**Rule type — @deva[संज्ञा]:** Defines the fifth @deva[कारक] — the object.

**Examples:**
- @deva[कटं करोति] "he makes a mat" (product — @deva[निर्वर्त्य कर्म])
- @deva[ग्रामं गच्छति] "he goes to the village" (destination — @deva[प्राप्य कर्म])
- @deva[ओदनं पचति] "he cooks rice" (affected object — @deva[विकार्य कर्म])

**@deva[ईप्सिततम] = "most desired to reach":** Two components — @deva[ईप्सित] (desired, from desiderative of @deva[आप्] "to obtain") and @deva[तमप्] (superlative). The @deva[कर्मन्] is the single entity the agent most intends to affect.

**Case marking:** @deva[कर्मन्] takes @deva[द्वितीया] (accusative, 2nd case) by @ref[2.3.2].

**@deva[कर्मन्] subtypes:** Tradition recognizes: @deva[निर्वर्त्य] (produced — "makes a mat"), @deva[विकार्य] (transformed — "cooks rice"), and @deva[प्राप्य] (reached — "goes to the village").

**Intention-based definition:** The agent's desire (@deva[ईप्सा]) determines @deva[कर्मन्]. In @deva[माषेषु अश्वं बध्नाति] "he ties the horse in the gram-field," both the horse and gram are involved — but the agent intends the horse, so @deva[अश्व] is @deva[कर्मन्].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कारके] from @ref[1.4.23].

@deva[कर्तुरीप्सिततमं कर्म] — that which the agent most desires to reach is @deva[कर्मन्].

**@deva[ईप्सिततम] analysis:** @deva[ईप्स्] = desiderative of @deva[आप्] "to obtain" → "wishing to obtain." @deva[तमप्] = superlative. The double specification — desire + superlative — creates a precise criterion: among all things the agent wishes to affect, @deva[कर्मन्] is the primary target.

**Why @deva[तमप्]?** Without the superlative, every affected entity would be @deva[कर्मन्]. The @deva[तमप्] selects the most directly affected. In double-object constructions (@deva[गां दोग्धि पयः] "he milks the cow for milk"), @deva[तमप्] selects the primary object — here @deva[गाम्] "cow" (the entity most directly acted upon).

**@deva[कर्मन्] and @ref[1.4.50]:** This rule covers intended objects. @ref[1.4.50] extends @deva[कर्मन्] to unintended objects (like accidentally eating poison). Together they ensure @deva[कर्मन्] covers both intentional and unintentional targets.

**@deva[कारक] order placement:** @deva[कर्मन्] is defined after @deva[अधिकरण] (@ref[1.4.45]). By @ref[1.4.2], @deva[कर्मन्] prevails over @deva[अधिकरण] in a conflict.

**@deva[कर्मन्] section scope:** @ref[1.4.49]–@ref[1.4.53] — five rules covering the core definition (this), unintended objects (@ref[1.4.50]), causative objects (@ref[1.4.51]–@ref[1.4.52]), and movement verbs (@ref[1.4.53]).
"""

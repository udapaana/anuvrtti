id = "1.4.86"
numericId = "14086"

[en]
simple = """
The word @deva[अनु] is @deva[कर्मप्रवचनीय] "action-qualifier" when meaning "inferior to" or "subordinate to."

When @deva[अनु] compares two things and marks the superior one, the superior takes the accusative case.

**Example:**
- @deva[अनुशाकटायनं वैयाकरणाः] "grammarians are inferior to @deva[शाकटायन]" — @deva[शाकटायन] (the superior grammarian) takes accusative, governed by @deva[अनु]

This is a comparative construction: everyone else ranks below @deva[शाकटायन].
"""

standard = """
@deva[अनु] is @deva[कर्मप्रवचनीय] when meaning @deva[हीन] (inferiority/subordination) — @deva[अनुर्हीने].

**Rule type — @deva[संज्ञा]:** Third @deva[कर्मप्रवचनीय] sense of @deva[अनु] (after @ref[1.4.84] @deva[लक्षण] and @ref[1.4.85] @deva[तृतीया]-sense).

**Example:**
- @deva[अनुशाकटायनं वैयाकरणाः] "grammarians are inferior to @deva[शाकटायन]"

**@deva[हीन] = "inferior, less than":** @deva[अनु] here expresses a ranking — the governed noun (in accusative) is the standard of comparison. Everything else is inferior to it.

**Case:** The superior entity takes accusative by @ref[2.3.8].

**Three senses of @deva[अनु] as @deva[कर्मप्रवचनीय]:**
1. @ref[1.4.84]: @deva[लक्षण] — sign/circumstance
2. @ref[1.4.85]: @deva[तृतीया]-sense — "alongside"
3. @ref[1.4.86] (this): @deva[हीन] — "inferior to"
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[अनुर्हीने] — @deva[अनु] is @deva[कर्मप्रवचनीय] in the @deva[हीन] (inferiority) sense.

**Comparative @deva[कर्मप्रवचनीय]:** @deva[अनु] here functions like a comparative particle — it establishes a ranking. The standard of comparison (the superior entity) takes accusative; the inferior entities are expressed in the nominative (subject).

**Three rules for @deva[अनु]:** @ref[1.4.84]–@ref[1.4.86] show how one particle can have multiple @deva[कर्मप्रवचनीय] functions. Each sense governs a different syntactic relationship, but all share the @deva[कर्मप्रवचनीय] designation and its accusative case governance.

**Overlap with @ref[1.4.87]:** @ref[1.4.87] assigns @deva[कर्मप्रवचनीय] to @deva[उप] for similar superiority/inferiority senses. @deva[अनु] and @deva[उप] partially overlap in this comparative function.
"""

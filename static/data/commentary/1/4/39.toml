id = "1.4.39"
numericId = "14039"

[en]
simple = """
With @deva[राध्] "to propitiate, to be favorable" and @deva[ईक्ष्] "to examine" — when used in the sense of fortune-telling or divination — the person whose fortune is being told is called @deva[सम्प्रदान] "recipient."

When an astrologer examines someone's fortune, the client "receives" the prediction. That client is the @deva[सम्प्रदान].

**Examples:**
- @deva[देवदत्ताय राध्यति गर्गः] "Garga is favorable to Devadatta" (i.e., Garga divines good fortune for Devadatta)
- @deva[देवदत्ताय ईक्षते गर्गः] "Garga examines Devadatta's fortune"

@deva[देवदत्त] takes the dative — he is the one who receives the divination.
"""

standard = """
With @deva[राध्] and @deva[ईक्ष्] in the sense of fortune-telling, the person for whom divination is performed is @deva[सम्प्रदान] — @deva[राधीक्ष्योर्यस्य विप्रश्नः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.32]:** The person "receives" the fortune-telling — the prediction is directed toward them.

**Examples:**
- @deva[देवदत्ताय राध्यति गर्गः] "Garga is favorable (divines well) for Devadatta"
- @deva[देवदत्ताय ईक्षते गर्गः] "Garga examines fortune for Devadatta"

**@deva[विप्रश्न] = "fortune-telling, divination":** The rule applies only in this specific sense. @deva[ईक्ष्] in its general sense "to see/look" does not trigger this @deva[सम्प्रदान] assignment.

**Scope restriction:** Both verbs must be used in the @deva[विप्रश्न] context. @deva[राध्] in its general sense "to succeed/accomplish" and @deva[ईक्ष्] in its general sense "to look" take their usual @deva[कारक] assignments.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सम्प्रदान] from @ref[1.4.32]; @deva[कारके] from @ref[1.4.23].

@deva[राधीक्ष्योर्यस्य विप्रश्नः] — with @deva[राध्]/@deva[ईक्ष्] in divination, the person whose fortune is told is @deva[सम्प्रदान].

**@deva[विप्रश्न] = "inquiry about fortune":** This is a technical restriction. The @[sūtra] does not apply to all uses of @deva[राध्] and @deva[ईक्ष्] — only when the context involves @deva[विप्रश्न] (divination, astrological consultation). The meaning-restriction limits the @deva[कारक] assignment to a specific semantic domain.

**Why separate from @ref[1.4.37]?** The emotional verbs in @ref[1.4.37] share a semantic class (hostility). @deva[राध्] and @deva[ईक्ष्] in divination share a different pattern — the client receives a service (prediction), not an emotion. The @deva[सम्प्रदान] is the beneficiary of the diviner's act.

**@deva[गर्ग]:** The @deva[काशिका] names @deva[गर्ग] as the traditional astrologer in examples for this rule — reflecting the cultural context of Vedic-period fortune-telling practices.

**@deva[सम्प्रदान] series position:** Seventh extension. After giving (@ref[1.4.32]), pleasing (@ref[1.4.33]), communication (@ref[1.4.34]), owing (@ref[1.4.35]), desire (@ref[1.4.36]), hostility (@ref[1.4.37]), the pattern now covers divination — each extending the metaphor of "directing an act toward a recipient."
"""

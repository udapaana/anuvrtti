id = "1.4.35"
numericId = "14035"

[en]
simple = """
With the verb @deva[धारय्] "to owe," the creditor — the person to whom a debt is owed — is called @deva[सम्प्रदान] "recipient."

When you owe money to someone, that person is the @deva[सम्प्रदान] (recipient) because the debt is "owed toward" them — they are the intended receiver of the repayment.

**Example:**
- @deva[देवदत्ताय शतं धारयति] "he owes a hundred to Devadatta" (@deva[देवदत्त] is @deva[सम्प्रदान])

@deva[देवदत्त] takes the dative case because the debt is directed toward him — he is the one who will eventually "receive" the repayment.
"""

standard = """
With @deva[धारय्] "to owe," the creditor (@deva[उत्तमर्ण] "one to whom a debt is owed") is @deva[सम्प्रदान] — @deva[धारेरुत्तमर्णः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.32]:** The creditor "receives" the debt obligation — metaphorically parallel to receiving a gift.

**Examples:**
- @deva[देवदत्ताय शतं धारयति] "he owes a hundred to Devadatta"
- @deva[यज्ञदत्ताय सहस्रं धारयति] "he owes a thousand to @[yajñadatta]"

**Key terms:**
- @deva[उत्तमर्ण] = "superior creditor" — the one who holds the debt
- @deva[अधमर्ण] = "debtor" — the one who owes (this is the @deva[कर्ता])

**Case marking:** The creditor takes @deva[चतुर्थी] (dative) by @ref[2.3.13]. The amount owed is @deva[कर्मन्] (accusative).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सम्प्रदान] from @ref[1.4.32]; @deva[कारके] from @ref[1.4.23].

@deva[धारेरुत्तमर्णः] — with @deva[धारय्], the creditor is @deva[सम्प्रदान].

**@deva[धारय्] = causal of @deva[धृ]:** "To hold (a debt)" — the debtor "holds" an obligation directed toward the creditor. The creditor is the terminus of the debt, parallel to the recipient of a gift in @ref[1.4.32].

**@deva[उत्तमर्ण] vs @deva[अधमर्ण]:** @deva[उत्तम] + @deva[ऋण] = "superior in debt" (creditor); @deva[अधम] + @deva[ऋण] = "inferior in debt" (debtor). The creditor is @deva[सम्प्रदान] because the debt flows toward him.

**Why not @deva[कर्मन्]?** The creditor is not the object of the owing — the amount (@deva[शतम्]) is @deva[कर्मन्]. The creditor is the goal toward whom the obligation is directed, hence @deva[सम्प्रदान].

**@deva[सम्प्रदान] series position:** Fourth extension after @ref[1.4.32] (giving), @ref[1.4.33] (pleasing), @ref[1.4.34] (communicative acts). The pattern extends from physical giving to financial obligation.
"""

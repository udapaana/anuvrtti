id = "1.4.64"
numericId = "14064"

[en]
simple = """
The word @deva[अलम्] is called @deva[गति] when it means "ornament" or "adornment."

@deva[अलम्] has several meanings: "enough," "capable," "don't," and "ornament." Only in the "ornament" sense does it combine with a verb as @deva[गति].

**Examples (@deva[गति] — ornament sense):**
- @deva[अलंकृत्य] "having adorned"
- @deva[अलंकृतम्] "adorned"

**Contrast (not @deva[गति] — other senses):**
- @deva[अलं भुक्त्वा व्रजति] "having eaten enough, he goes" — @deva[अलम्] means "enough," so no @deva[गति]; the gerund is @deva[भुक्त्वा] (separate), not a compound.
"""

standard = """
@deva[अलम्] with a verb is @deva[गति] when meaning "ornament" (@deva[भूषण]) — @deva[अलंभूषणे].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Meaning-restricted to the ornamental sense only.

**Examples:**
- @deva[अलंकृत्य] "having adorned" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[अलंकृतम्] "adorned" (accent by @ref[6.2.49])
- @deva[यदलंकरोति] "when he adorns" (accent by @ref[8.2.71])

**Four senses of @deva[अलम्]:**
1. @deva[निषेध] (prohibition): @deva[अलं विवादेन] "enough with the argument"
2. @deva[समर्थ] (capable): @deva[अलं देवदत्तो भारवहनाय] "Devadatta is capable of carrying the load"
3. @deva[पर्याप्त] (sufficient): @deva[अलं भुक्त्वा] "having eaten enough"
4. @deva[भूषण] (ornament): @deva[अलंकृत्य] "having adorned" — only this triggers @deva[गति]

**Scope:** The @deva[गति] designation is tied to meaning, not form. The same word @deva[अलम्] is @deva[गति] or not depending on how the speaker uses it.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[अलंभूषणे] — @deva[अलम्] is @deva[गति] in the @deva[भूषण] (ornament) sense.

**Meaning-restriction pattern:** Like @ref[1.4.63] (@deva[सत्]/@deva[असत्] in respect sense) and @ref[1.4.65] (@deva[अन्तर्] in abandonment sense), the @deva[गति] status depends on the specific meaning intended. This creates a polysemy-sensitive grammar — the same form triggers different syntactic behavior depending on meaning.

**@deva[अलम्] in @deva[अलंकार] tradition:** @deva[अलम्] + @deva[कृ] → @deva[अलंकृ] "to ornament" is the etymological basis of @deva[अलंकार] "ornament, figure of speech" — a term central to Sanskrit poetics. The @deva[गति] designation ensures this compound forms correctly.

**Diagnostic test:** @deva[अलंकृत्य] (compound, @deva[ल्यप्]) vs. @deva[अलं कृत्वा] (separate, @deva[त्वा]). If the speaker means "ornament," the first is correct; if "enough," the second.

**@deva[गति] section structure:** @ref[1.4.61]–@ref[1.4.79] progressively add words to the @deva[गति] class, each with specific semantic or contextual conditions. The rules form an expanding inventory of compound-forming prefixes.
"""

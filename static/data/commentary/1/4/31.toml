id = "1.4.31"
numericId = "14031"

[en]
simple = """
With @deva[भू] "to become, to originate" (especially with the prefix @deva[प्र]), the source of origin is called @deva[अपादान] "ablative source."

Rivers originate from mountains; things come into being from their sources. The source is the @deva[अपादान].

**Examples:**
- @deva[हिमवतो गङ्गा प्रभवति] "the Ganges originates from the Himalayas" (@deva[हिमवत्] is @deva[अपादान])
- @deva[काश्मीरेभ्यो वितस्ता प्रभवति] "the Jhelum originates from Kashmir"

This parallels @ref[1.4.30] (@deva[जन्] "to be born"), but @deva[भू] covers a broader sense of "originating" or "arising."
"""

standard = """
With @deva[भू] "to originate," the source of origin is @deva[अपादान] — @deva[भुवः प्रभवः].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.24]:** The entity emerges from its source — the source is the @deva[ध्रुव] (fixed point).

**Examples:**
- @deva[हिमवतो गङ्गा प्रभवति] "the Ganges has its source in the Himalayas"
- @deva[काश्मीरेभ्यो वितस्ता प्रभवति] "the Jhelum has its source in Kashmir"

**Parallel to @ref[1.4.30]:** @ref[1.4.30] covers @deva[जन्] (birth/production from material). This rule covers @deva[भू] (arising/originating from a place or source).

**@deva[प्रभव] = "source of origin":** Typically @deva[प्र] + @deva[भू], meaning "to spring forth from." The source (mountain, region) is @deva[अपादान].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अपादान] from @ref[1.4.24]; @deva[कारके] from @ref[1.4.23].

@deva[भुवः प्रभवः] — with @deva[भू], the source of origination is @deva[अपादान].

**Completing the @deva[अपादान] series (@ref[1.4.24]–@ref[1.4.31]):** This is the final extension. The full series covers:
1. @ref[1.4.24]: physical departure (core definition)
2. @ref[1.4.25]: fear/protection
3. @ref[1.4.26]: finding unbearable
4. @ref[1.4.27]: prevention
5. @ref[1.4.28]: concealment
6. @ref[1.4.29]: formal learning
7. @ref[1.4.30]: birth (@deva[जन्])
8. @ref[1.4.31] (this): origination (@deva[भू])

**@deva[जन्] vs @deva[भू]:** @ref[1.4.30] uses @deva[प्रकृति] (material cause) — "the arrow is born from horn." This rule uses @deva[प्रभव] (place of origin) — "the Ganges originates from the Himalayas." The distinction is material vs spatial source.

**Transition:** @ref[1.4.32] begins the @deva[सम्प्रदान] (recipient) section — the second @deva[कारक] in @deva[पाणिनि]'s order.
"""

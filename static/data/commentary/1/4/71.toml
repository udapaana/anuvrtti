id = "1.4.71"
numericId = "14071"

[en]
simple = """
The word @deva[तिरस्] "across, hidden" is called @deva[गति] when it means "disappearance."

When @deva[तिरस्] combines with verbs like @deva[भू] "to become" or @deva[धा] "to place" to express vanishing or becoming hidden, it is @deva[गति].

**Examples:**
- @deva[तिरोभूय] "having disappeared"
- @deva[तिरोभूतम्] "disappeared"
- @deva[तिरोधीय] "having concealed"

**Contrast:** @deva[तिरो भूत्वा अस्थितः] "having stood apart" — here @deva[तिरस्] means "aside/apart," not "disappearance," so it is not @deva[गति]; the gerund is @deva[भूत्वा] (not @deva[भूय]).
"""

standard = """
@deva[तिरस्] with a verb is @deva[गति] when meaning @deva[तिरोधान] (disappearance/concealment) — @deva[तिरसोऽन्तर्धौ].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Meaning-restricted to the concealment sense.

**Examples:**
- @deva[तिरोभूय] "having disappeared" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[तिरोभूतम्] "disappeared" (accent by @ref[6.2.49])
- @deva[यत्तिरोभवति] "when it disappears" (accent by @ref[8.2.71])

**@deva[अन्तर्धि] = "concealment, disappearance":** Only in this specific sense does @deva[तिरस्] become @deva[गति]. The word also means "aside," "across," "obliquely" — none of which trigger @deva[गति].

**Contrast:** @deva[तिरो भूत्वा अस्थितः] — @deva[तिरस्] = "apart/aside" → not @deva[गति] → @deva[भूत्वा]

**Note:** @ref[1.4.72] adds that @deva[तिरस्] + @deva[कृ] is only optionally @deva[गति], creating a split: obligatory with @deva[भू]/@deva[धा], optional with @deva[कृ].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[तिरसोऽन्तर्धौ] — @deva[तिरस्] is @deva[गति] in the sense of @deva[अन्तर्धि] (concealment/disappearance).

**@deva[तिरस्] phonology:** Stem @deva[तिरस्] → @deva[तिरः] (before voiceless consonants) / @deva[तिरो] (before voiced consonants by @ref[8.3.17]). Hence: @deva[तिरोभूय], @deva[तिरोभूतम्], but @deva[तिरस्कृत्य]/@deva[तिरःकृत्य].

**Split with @ref[1.4.72]:** This rule makes @deva[गति] obligatory for @deva[तिरस्] + verbs (in @deva[अन्तर्धि] sense). @ref[1.4.72] specifically makes @deva[तिरस्] + @deva[कृ] optional. The split is deliberate: @deva[तिरोभूय] (always compound) vs. @deva[तिरस्कृत्य] or @deva[तिरस्कृत्वा] (either form valid).

**@deva[तिरोधान] and @deva[तिरोभाव]:** Both are common Sanskrit terms for "disappearance" — formed precisely because @deva[तिरस्] is @deva[गति] with @deva[धा] and @deva[भू]. The @deva[गति] designation underlies these lexicalized compounds.
"""

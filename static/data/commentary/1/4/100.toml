id = "1.4.100"
numericId = "14100"

[en]
simple = """
The nine endings in the @deva[तङ्] group, plus the participle affixes @deva[शानच्] and @deva[कानच्], are called @deva[आत्मनेपद] "middle endings" — literally "words for oneself."

| Person | Singular | Dual | Plural |
|--------|----------|------|--------|
| 3rd | @deva[त] | @deva[आताम्] | @deva[झ] |
| 2nd | @deva[थास्] | @deva[आथाम्] | @deva[ध्वम्] |
| 1st | @deva[इट्] | @deva[वहि] | @deva[महिङ्] |

The participle affixes @deva[शानच्] and @deva[कानच्] are also @deva[आत्मनेपद].

Together with @ref[1.4.99] (@deva[परस्मैपद]), this completes the naming of all eighteen verb endings.
"""

standard = """
The @deva[तङ्] affixes and @deva[आन]-ending affixes (@deva[शानच्], @deva[कानच्]) are called @deva[आत्मनेपद] — @deva[तङानावात्मनेपदम्].

**Rule type — @deva[संज्ञा]:** Names the second set of nine @deva[ल]-replacement endings.

**@deva[आत्मनेपद] endings (the @deva[तङ्] @deva[प्रत्याहार]):**
- 3rd person: @deva[त], @deva[आताम्], @deva[झ]
- 2nd person: @deva[थास्], @deva[आथाम्], @deva[ध्वम्]
- 1st person: @deva[इट्], @deva[वहि], @deva[महिङ्]

**Participle affixes:** @deva[शानच्] (present middle participle, @ref[3.2.124]) and @deva[कानच्] (perfect middle participle, @ref[3.2.106]) are also @deva[आत्मनेपद].

**@deva[तङ्] @deva[प्रत्याहार]:** The abbreviation @deva[तङ्] covers all nine middle endings from @deva[त] to @deva[महिङ्], using the @deva[ङ्] marker of @deva[महिङ्] as the closing element.

**Paired with @ref[1.4.99]:** @deva[परस्मैपद] (@ref[1.4.99]) + @deva[आत्मनेपद] (this rule) = the complete set of eighteen @deva[तिङ्] endings that replace @deva[ल].
"""

advanced = """
@deva[तङानावात्मनेपदम्] — the @deva[तङ्] affixes and @deva[आन]-ending affixes are @deva[आत्मनेपद].

**@deva[आत्मनेपद] = "word for oneself":** The name implies the action benefits the agent. By @ref[1.3.72] (@deva[स्वरितञितः कर्त्रभिप्राये क्रियाफले]), @deva[आत्मनेपद] is used when the fruit of the action accrues to the agent. However, in many cases (@deva[यङ्], passives, @deva[सन्नन्त]), @deva[आत्मनेपद] is obligatory regardless of semantic orientation.

**@deva[आन] affixes:** @deva[शानच्] gives present/future middle participles (@deva[पचमान] "cooking for oneself"), @deva[कानच्] gives perfect middle participles (@deva[पचान] from the perfect). Both end in @deva[आन], hence the compound @deva[तङानौ] in the @deva[सूत्र].

**Distribution rules (@ref[1.3.12]–@ref[1.3.93]):** The @deva[आत्मनेपद]/@deva[परस्मैपद] choice is governed by an elaborate system:
- @ref[1.3.12]–@ref[1.3.71]: specific verb roots take @deva[आत्मनेपद]
- @ref[1.3.72]: agent-oriented fruit → @deva[आत्मनेपद]
- @ref[1.3.78]: default → @deva[परस्मैपद]
- Some roots are @deva[उभयपदिन्] (taking either set)

**@deva[तिङ्] @deva[प्रत्याहार]:** The eighteen endings collectively form the @deva[तिङ्] abbreviation (from @deva[तिप्] to @deva[महिङ्]). By @ref[1.4.14], a @deva[तिङ्]-ending word is called @deva[पद] — a fundamental classification in the grammar.
"""

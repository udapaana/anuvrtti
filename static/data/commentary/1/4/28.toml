id = "1.4.28"
numericId = "14028"

[en]
simple = """
With verbs of concealment or hiding, the person from whose sight one hides is called @deva[अपादान] "ablative source."

When you hide from your teacher, the teacher — from whom you conceal yourself — is the @deva[अपादान].

**Examples:**
- @deva[उपाध्यायादन्तर्धत्ते] "he hides from the teacher" (@deva[उपाध्याय] is @deva[अपादान])
- @deva[उपाध्यायान्निलीयते] "he conceals himself from the teacher"

Note: with verbs of "not wishing to see," the object takes the accusative (not ablative):
- @deva[चौरान् न दिदृक्षते] "he does not wish to see the thieves" (@deva[चौर] is @deva[कर्मन्])
"""

standard = """
With concealment verbs (@deva[अन्तर्धा] "to hide," @deva[निली] "to conceal oneself"), the person from whose sight one hides is @deva[अपादान] — @deva[अन्तर्धौ येनादर्शनमिच्छति].

**Rule type — @deva[संज्ञा] extension of @ref[1.4.24]:** Hiding involves "departing from" someone's visual field.

**Examples:**
- @deva[उपाध्यायादन्तर्धत्ते] "he hides from the teacher"
- @deva[उपाध्यायान्निलीयते] "he conceals himself from the teacher"

**@deva[अदर्शनमिच्छति] = "desires non-seeing":** The hider wants to avoid being seen by the @deva[अपादान]. The separation is visual — departing from someone's line of sight.

**Distinct from not-wishing-to-see:** With @deva[दिदृक्ष्] (desiderative of @deva[दृश्]), the object is @deva[कर्मन्] (accusative): @deva[चौरान् न दिदृक्षते] "he doesn't wish to see the thieves."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अपादान] from @ref[1.4.24]; @deva[कारके] from @ref[1.4.23].

@deva[अन्तर्धौ येनादर्शनमिच्छति] — with concealment, the entity from whose sight one hides is @deva[अपादान].

**Visual departure:** The hider "departs" from the other's visual field. The @deva[अपादान] is the person avoided — the one whose sight (@deva[दर्शन]) the hider wishes to escape.

**Verb scope:**
- @deva[अन्तर्धा] "to hide" (transitive)
- @deva[निली] "to conceal oneself" (intransitive)
- Any verb carrying @deva[अन्तर्धान] meaning

**Distinction — hiding vs not-wishing-to-see:** The difference lies in whose perspective controls:
- Hiding: the hider departs from the other's sight → @deva[अपादान] (ablative)
- Not-wishing-to-see: the subject avoids seeing → @deva[कर्मन्] (accusative)

**@deva[अपादान] series:** This is the seventh extension. All extensions share a common structure: X separates from Y, where Y is relatively "fixed" — here, the teacher's position/sight is the fixed reference point.
"""

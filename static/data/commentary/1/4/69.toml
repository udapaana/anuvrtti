id = "1.4.69"
numericId = "14069"

[en]
simple = """
The indeclinable word @deva[अच्छ] "toward, before" is called @deva[गति] when combined with verbs of motion or @deva[वद्] "to speak."

@deva[अच्छ] means the same as @deva[अभि] "toward" and combines with verbs to express approaching or addressing.

**Examples:**
- @deva[अच्छगत्य] "having gone toward"
- @deva[अच्छोद्य] "having addressed / having spoken to"

**Contrast:** When @deva[अच्छ] is an adjective meaning "clear/transparent" — @deva[उदकम् अच्छं गच्छति] "he goes to clear water" — it is not @deva[गति]. Here @deva[अच्छ] describes the water, not the direction of motion.
"""

standard = """
The indeclinable @deva[अच्छ] with verbs of motion (@deva[गत्यर्थ]) or @deva[वद्] "to speak" is @deva[गति] — @deva[अच्छगत्यर्थवदयोः].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Restricted to motion verbs and @deva[वद्].

**Examples:**
- @deva[अच्छगत्य] "having gone toward" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[अच्छगतम्] "approached" (accent by @ref[6.2.49])
- @deva[अच्छोद्य] "having addressed" (@deva[उद्] from @deva[वद्] + @deva[ल्यप्])
- @deva[यदच्छवदति] "when he addresses"

**@deva[अच्छ] ≈ @deva[अभि]:** @deva[अच्छ] functions as a synonym of the @deva[उपसर्ग] @deva[अभि] "toward." But since @deva[अच्छ] is not in the @deva[प्रादिगण], it cannot be @deva[उपसर्ग] — it receives @deva[गति] instead.

**Verb restriction:** Only motion verbs and @deva[वद्] trigger @deva[गति]. With other verbs, @deva[अच्छ] does not compound.

**Contrast:** @deva[उदकम् अच्छं गच्छति] — @deva[अच्छ] = "clear" (adjective modifying @deva[उदक]) → not @deva[गति].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[अच्छगत्यर्थवदयोः] — @deva[अच्छ] is @deva[गति] with motion-verbs and @deva[वद्].

**Double restriction:** This rule has both a word-restriction (@deva[अच्छ] only) and a verb-restriction (motion + @deva[वद्] only). Most @deva[गति] rules restrict the prefix word; this one also restricts the verb class.

**@deva[गत्यर्थ] = "having the meaning of motion":** This includes @deva[गम्] "to go," @deva[इ] "to go," @deva[चल्] "to move," @deva[या] "to go," @deva[व्रज्] "to walk," etc. The coverage is semantic, not a closed list.

**@deva[वद्] inclusion:** @deva[वद्] "to speak" is specifically named because addressing someone is metaphorically "going toward" them with words. This extends @deva[अच्छ]'s directional force to speech acts.

**Homophony issue:** @deva[अच्छ] as @deva[गति] (indeclinable, "toward") vs. @deva[अच्छ] as adjective ("clear/transparent"). The grammatical behavior differs: @deva[गति] triggers compounding (@deva[अच्छगत्य]); the adjective does not (@deva[अच्छं गत्वा]).

**Non-@deva[उपसर्ग] status:** @deva[अच्छ] is absent from the @deva[प्रादिगण]. It is @deva[गति] and @deva[निपात] only — not @deva[उपसर्ग]. Therefore it does not trigger @deva[ण]-substitution or other @deva[उपसर्ग]-specific rules.
"""

id = "1.4.70"
numericId = "14070"

[en]
simple = """
The pronoun @deva[अदस्] "that" is called @deva[गति] when it is used reflexively — that is, when it does NOT point to something external.

In its demonstrative use ("that thing over there"), @deva[अदस्] is not @deva[गति]. But in a reflexive or non-pointing use, it compounds with the verb.

**Examples (@deva[गति] — non-demonstrative):**
- @deva[अदःकृत्य] "having done that (to oneself / abstractly)"
- @deva[अदःकृतम्] "that which was done"

**Contrast (not @deva[गति] — demonstrative):**
- @deva[अदः कृत्वा काण्डं गतः] "having done that (pointing), he went" — @deva[अदस्] points to an external referent → not @deva[गति] → @deva[कृत्वा] (not @deva[कृत्य]).
"""

standard = """
@deva[अदस्] with a verb is @deva[गति] when used non-demonstratively (@deva[अनुपदेश]) — @deva[अदसोऽनुपदेशे].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Restricted to the non-pointing, reflexive use.

**Examples:**
- @deva[अदःकृत्य] "having done that" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[अदःकृतम्] "done" (accent by @ref[6.2.49])
- @deva[यददःकरोति] "when he does that" (accent by @ref[8.2.71])

**@deva[अनुपदेश] = "not pointing out / not addressing":** When @deva[अदस्] is used demonstratively ("that one there"), it retains its deictic force and stays separate from the verb. In its non-deictic, abstract use, it compounds.

**Contrast:**
- @deva[अदः कृत्वा काण्डं गतः] — @deva[अदस्] points to a specific referent → demonstrative → not @deva[गति] → @deva[कृत्वा]

**Unusual @deva[गति]:** @deva[अदस्] is a pronoun, not a typical prefix or adverb. Its inclusion in @deva[गति] shows that the category is broader than "verbal prefixes."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[अदसोऽनुपदेशे] — @deva[अदस्] is @deva[गति] when not used demonstratively.

**@deva[उपदेश] vs @deva[अनुपदेश]:** @deva[उपदेश] here means "pointing out to another" — the deictic function of demonstratives. @deva[अनुपदेश] is the absence of this function — the pronoun is used abstractly or reflexively rather than to identify an external referent.

**Pronoun as @deva[गति]:** This is an unusual @deva[गति] designation — most @deva[गति] words are adverbs or prefix-like particles. @deva[अदस्] as @deva[गति] shows that the @deva[गति] category is functionally defined (words that compound with verbs and trigger @deva[ल्यप्]/accent effects), not morphologically restricted to a particular word class.

**Form in compound:** @deva[अदस्] appears as @deva[अदः] in compound (@deva[अदःकृत्य]). The @deva[विसर्ग] is the standard sandhi form of stem-final @deva[स्].

**@deva[गति] section midpoint:** This rule falls roughly in the middle of the @deva[गति] subsection (@ref[1.4.60]–@ref[1.4.79]). The remaining rules add further words — @deva[तिरस्] "across," @deva[साक्षात्] "before one's eyes," directional words, etc.
"""

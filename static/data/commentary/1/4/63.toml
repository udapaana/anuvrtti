id = "1.4.63"
numericId = "14063"

[en]
simple = """
The words @deva[सत्] "good" and @deva[असत्] "bad" are called @deva[गति] when they mean "respect" or "disrespect" respectively.

When @deva[सत्] means "honoring" and @deva[असत्] means "dishonoring," they combine with a verb as @deva[गति]. In other senses (like "real" or "unreal"), they are not @deva[गति].

**Examples (@deva[गति] — respect/disrespect sense):**
- @deva[सत्कृत्य] "having honored"
- @deva[असत्कृत्य] "having dishonored"

**Contrast (not @deva[गति] — "real" sense):**
- @deva[सत् कृत्वा काण्डं गतः] "having made it real, he went" — here @deva[सत्] means "real/existent," so it is not @deva[गति]; the gerund is @deva[कृत्वा], not @deva[कृत्य].
"""

standard = """
@deva[सत्] and @deva[असत्] with a verb are @deva[गति] when meaning "respect" (@deva[सत्कार]) or "disrespect" (@deva[असत्कार]) — @deva[सत्कारे च].

**Rule type — @deva[संज्ञा] extension of @deva[गति]:** Semantic restriction limits @deva[गति] to the honor/dishonor meaning.

**Examples:**
- @deva[सत्कृत्य] "having honored" (@deva[ल्यप्] by @ref[7.1.37])
- @deva[सत्कृतम्] "honored" (accent by @ref[6.2.49])
- @deva[यत्सत्करोति] "when he honors" (accent by @ref[8.2.71])
- @deva[असत्कृत्य] "having dishonored"

**Contrast:**
- @deva[सत् कृत्वा काण्डं गतः] — @deva[सत्] = "real/existent" → not @deva[गति] → no compound → @deva[कृत्वा] (not @deva[कृत्य])

**Meaning restriction:** @deva[सत्] has multiple senses: "existent," "good," "respectable." Only in the @deva[सत्कार] (honoring) sense does @deva[गति] apply. Similarly @deva[असत्] only in the disrespect sense.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[सत्कारे च] — @deva[सत्]/@deva[असत्] are @deva[गति] in the sense of respect/disrespect.

**@deva[सत्कार] = "honoring, treating with respect":** The compound @deva[सत्कृ] means "to honor" and @deva[असत्कृ] means "to dishonor." When @deva[सत्]/@deva[असत्] carry this specific meaning, they are @deva[गति] and compound with the verb. In other meanings (@deva[सत्] = "existent," "good"), no compounding — @deva[सत्] remains a separate word.

**Diagnostic:** The test for @deva[गति] status is the gerund form. @deva[सत्कृत्य] (compound, @deva[ल्यप्]) = @deva[गति] applies. @deva[सत् कृत्वा] (separate, @deva[त्वा]) = @deva[गति] does not apply.

**Pattern in @ref[1.4.61]–@ref[1.4.79]:** Many @deva[गति] extensions are meaning-restricted. @ref[1.4.62] (onomatopoeia, with @deva[इति]-condition), this rule (@deva[सत्कार] sense), @ref[1.4.64] (@deva[अलम्] in ornament sense), @ref[1.4.65] (@deva[अन्तर्] in abandonment sense) — each adds @deva[गति] under a specific semantic condition.
"""

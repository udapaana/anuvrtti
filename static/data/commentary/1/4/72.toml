id = "1.4.72"
numericId = "14072"

[en]
simple = """
@deva[तिरस्] with @deva[कृ] "to make" is optionally @deva[गति] (when meaning "disappearance/concealment").

While @ref[1.4.71] makes @deva[तिरस्] obligatorily @deva[गति] with verbs like @deva[भू] and @deva[धा], with @deva[कृ] the speaker has a choice.

**Examples (both valid):**
- @deva[तिरस्कृत्य] "having concealed" (compound — @deva[गति] option)
- @deva[तिरस्कृत्वा] "having concealed" (separate — non-@deva[गति] option)

**Contrast (not concealment):**
- @deva[तिरः कृत्वा काष्ठं तिष्ठति] "having laid aside the stick, he stands" — @deva[तिरस्] = "aside," not concealment → not @deva[गति].
"""

standard = """
@deva[तिरस्] + @deva[कृ] is optionally @deva[गति] — @deva[तिरसः कृञः].

**Rule type — @deva[विभाषा] (option) modifying @ref[1.4.71]:** While @ref[1.4.71] makes @deva[तिरस्] obligatorily @deva[गति] in the concealment sense, this rule makes it optional specifically with @deva[कृ].

**Examples:**
- @deva[तिरस्कृत्य] or @deva[तिरःकृत्य] — compound form (@deva[गति] applied; @deva[ल्यप्])
- @deva[तिरस्कृत्वा] or @deva[तिरःकृत्वा] — separate form (no @deva[गति]; @deva[त्वा])

**@deva[विसर्ग] alternation:** @deva[तिरस्] before @deva[क] → @deva[तिरस्कृत्य] (by @ref[8.3.40]) or @deva[तिरःकृत्य] (by @ref[8.3.42], optionally).

**Contrast:** @deva[तिरः कृत्वा काष्ठं तिष्ठति] — @deva[तिरस्] = "aside" (not concealment) → not @deva[गति] regardless.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[अन्तर्धौ] from @ref[1.4.71]; @deva[क्रियायोगे] from @ref[1.4.59].

@deva[तिरसः कृञः] — @deva[तिरस्] with @deva[कृ] is optionally @deva[गति].

**@deva[प्राप्तविभाषा]:** @ref[1.4.71] already grants @deva[गति] to @deva[तिरस्] in the concealment sense. This rule restricts that grant specifically for @deva[कृ], making it optional. This is a @deva[प्राप्तविभाषा] — the option arises where the general rule would otherwise apply obligatorily.

**Why single out @deva[कृ]?** @deva[तिरोभूय] "having disappeared" (with @deva[भू]) is always a compound. But @deva[तिरस्कृत्य]/@deva[तिरस्कृत्वा] "having concealed" (with @deva[कृ]) allows both forms. The distinction may reflect usage patterns — @deva[तिरोभू] was more lexicalized than @deva[तिरस्कृ].

**Phonological note — @ref[8.3.42]:** The @deva[विसर्ग] of @deva[तिरस्] before @deva[क] of @deva[कृ] optionally becomes @deva[स्] (giving @deva[तिरस्कृत्य]) or remains @deva[विसर्ग] (giving @deva[तिरःकृत्य]). This phonological option is independent of the @deva[गति] option.
"""

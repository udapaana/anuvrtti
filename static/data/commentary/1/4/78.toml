id = "1.4.78"
numericId = "14078"

[en]
simple = """
The indeclinable word @deva[प्राध्वम्] is always @deva[गति] when combined with @deva[कृ] "to make" and meaning "binding."

@deva[प्राध्वम्] normally means "suitably, favorably." Only in the specialized sense of "binding" or "tying" does it obligatorily compound with @deva[कृ].

**Example:**
- @deva[प्राध्वंकृत्य] "having bound"

**Contrast:**
- @deva[प्राध्वं कृत्वा शकटं गतः] "having made the cart suitable, he went" — "suitable" sense, not "binding" → not @deva[गति].
"""

standard = """
The indeclinable @deva[प्राध्वम्] with @deva[कृ] is obligatorily @deva[गति] when meaning @deva[बन्धन] (binding) — @deva[प्राध्वं बन्धने].

**Rule type — @deva[नित्यगति] (obligatory @deva[गति]):** Meaning-restricted to the binding sense.

**Example:**
- @deva[प्राध्वंकृत्य] "having bound" (@deva[ल्यप्] by @ref[7.1.37])

**@deva[प्राध्वम्] = @deva[अव्यय]:** Indeclinable by @ref[1.1.39] (@deva[म्]-final). Its usual meaning is "suitably" or "favorably."

**@deva[बन्धन] restriction:** Only the "binding" meaning triggers @deva[गति]. The "suitable" meaning does not.

**Contrast:** @deva[प्राध्वं कृत्वा शकटं गतः] — "making suitable" → not @deva[बन्धन] → not @deva[गति] → @deva[कृत्वा].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[गतिः] from @ref[1.4.60]; @deva[क्रियायोगे] from @ref[1.4.59]; @deva[निपाताः] from @ref[1.4.56].

@deva[प्राध्वं बन्धने] — @deva[प्राध्वम्] is @deva[नित्यगति] in the @deva[बन्धन] (binding) sense.

**Semantic shift:** @deva[प्राध्वम्] from its root meaning of "path-related" or "suitable" to "binding" represents a specialized usage. The @deva[गति] designation captures this lexicalized meaning — @deva[प्राध्वंकृ] as a compound verb meaning "to bind."

**Obligatory status:** Like @ref[1.4.77], this returns to obligatory @deva[गति] after the optional block. The compound @deva[प्राध्वंकृत्य] must form when binding is meant — @deva[प्राध्वं कृत्वा] is not available for this sense.

**@deva[गति] section nearing end:** @ref[1.4.79] is the final @deva[गति] extension rule. @ref[1.4.80] then states the positional rule for @deva[गति]/@deva[उपसर्ग] (they precede the verb).
"""

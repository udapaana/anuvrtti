id = "1.4.89"
numericId = "14089"

[en]
simple = """
The word @deva[आङ्] (shortened form of @deva[आ]) is @deva[कर्मप्रवचनीय] "action-qualifier" when expressing a limit — either "up to and including" or "up to but not including."

@deva[आ] marks boundaries: how far something extends.

**Examples:**
- @deva[आपाटलिपुत्राद् वृष्टो देवः] "it rained up to (but not including) @deva[पाटलिपुत्र]" (ablative — exclusive limit)
- @deva[आपाटलिपुत्रं वृष्टो देवः] "it rained up to (and including) @deva[पाटलिपुत्र]" (accusative — inclusive limit)
- @deva[आकुमारं यशः पाणिनेः] "@deva[पाणिनि]'s fame reaches even to children"

The case of the limit-noun tells you whether the limit is included or excluded.
"""

standard = """
@deva[आङ्] is @deva[कर्मप्रवचनीय] when expressing @deva[मर्यादा] (limit) — @deva[आङ् मर्यादावचने].

**Rule type — @deva[संज्ञा]:** @deva[कर्मप्रवचनीय] in the limit-expression sense.

**Examples:**
- @deva[आपाटलिपुत्राद् वृष्टो देवः] "rained up to (excluding) @deva[पाटलिपुत्र]" — ablative for exclusive limit
- @deva[आपाटलिपुत्रं वृष्टो देवः] "rained up to (including) @deva[पाटलिपुत्र]" — accusative for inclusive limit
- @deva[आकुमारं यशः पाणिनेः] "fame extending even to children"

**Dual case system:**
- Exclusive limit: ablative (@deva[पञ्चमी]) by @ref[2.3.10]
- Inclusive limit: accusative (@deva[द्वितीया]) by @ref[2.3.8]

**@deva[मर्यादा] = "boundary, limit":** @deva[आ] marks spatial, temporal, or social boundaries. The case of the limit-noun signals inclusion or exclusion.

**Not @deva[कर्मप्रवचनीय] in other senses:** When @deva[आ] means "slightly" (@deva[आपाण्डरम्] "slightly pale") or is an @deva[उपसर्ग] (@deva[आगच्छति] "comes"), it is not @deva[कर्मप्रवचनीय].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्मप्रवचनीयाः] from @ref[1.4.83]; @deva[निपाताः] from @ref[1.4.56].

@deva[आङ् मर्यादावचने] — @deva[आङ्] is @deva[कर्मप्रवचनीय] when expressing @deva[मर्यादा] (limit/boundary).

**@deva[मर्यादा] = "limit":** The @deva[काशिका] distinguishes:
- @deva[मर्यादाभिविधि] (inclusive): the limit is included → accusative
- @deva[मर्यादापरिसमाप्ति] (exclusive): the limit is excluded → ablative

**Case split — @ref[2.3.8] vs @ref[2.3.10]:** When @deva[आ] governs accusative (@ref[2.3.8]), the limit is included in the scope. When it governs ablative (@ref[2.3.10]), the limit marks where the scope ends (exclusive). The speaker's choice of case communicates the inclusion/exclusion distinction.

**@deva[आकुमारम्] example:** @deva[पाणिनि]'s fame extends even to children — the boundary is the most unlikely group (children), emphasizing the extent. The accusative @deva[कुमारम्] is inclusive — children themselves know of his fame.

**Not @deva[कर्मप्रवचनीय] when @deva[ईषत्]-sense:** @deva[आ] meaning "slightly" (@deva[आपाण्डर] "slightly pale," @deva[आनील] "slightly blue") is not @deva[कर्मप्रवचनीय] — it is @deva[गति] or @deva[उपसर्ग] in those contexts.
"""

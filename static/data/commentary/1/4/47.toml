id = "1.4.47"
numericId = "14047"

[en]
simple = """
With @deva[अभि] + @deva[नि] + @deva[विश्] "to enter, to resort to, to become attached to," the location can optionally be treated as @deva[कर्मन्] "object" (accusative) instead of @deva[अधिकरण] "locus" (locative).

**Examples:**
- @deva[ग्राममभिनिविशते] "he resorts to the village" (accusative — location as @deva[कर्मन्])
- @deva[ग्रामे अभिनिविशते] "he settles in the village" (locative — location as @deva[अधिकरण])

Both constructions are valid. The accusative emphasizes the location as the target of the action; the locative treats it as the backdrop.
"""

standard = """
With @deva[अभि] + @deva[नि] + @deva[विश्] "to resort to/become attached to," the location is optionally @deva[कर्मन्] — @deva[अभिनिविशश्च].

**Rule type — @deva[विभाषा] (option) overriding @ref[1.4.45]:** The location, normally @deva[अधिकरण], may optionally be treated as @deva[कर्मन्].

**Examples:**
- @deva[ग्राममभिनिविशते] "he resorts to the village" (@deva[कर्मन्], accusative)
- @deva[ग्रामे अभिनिविशते] "he settles in the village" (@deva[अधिकरण], locative)

**Both prefixes required:** The rule requires both @deva[अभि] and @deva[नि] together. @deva[अभि] + @deva[विश्] alone or @deva[नि] + @deva[विश्] alone do not trigger this option.

**@deva[च] = "and/also":** Continues the pattern of location-to-@deva[कर्मन्] promotion from @ref[1.4.46], but here it is optional rather than obligatory.

**Contrast with @ref[1.4.46]:** @ref[1.4.46] (@deva[अधि] + @deva[शी]/@deva[स्था]/@deva[आस्]) makes @deva[कर्मन्] obligatory. This rule makes it optional — the speaker may choose either construction.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[कर्म] from @ref[1.4.46]; @deva[कारके] from @ref[1.4.23].

@deva[अभिनिविशश्च] — and with @deva[अभिनिविश्], the location is optionally @deva[कर्मन्].

**@deva[विभाषा] by context:** The optionality is understood from the @deva[च] particle, which implies "also" — adding this verb to the @deva[कर्मन्] pattern of @ref[1.4.46] but with freedom to retain @deva[अधिकरण].

**Double-prefix requirement:** @deva[अभि] + @deva[नि] + @deva[विश्] is a compound-prefixed verb. The @deva[कारक] reassignment depends on both preverbs acting together. This demonstrates that @deva[कारक] assignment can be sensitive to specific prefix combinations, not just individual prefixes.

**Semantic range:** @deva[अभिनिविश्] covers "resorting to," "settling in," and "becoming attached to." The accusative construction emphasizes directed action (resorting to a place), while the locative emphasizes static location (being in a place). The @deva[कारक] choice reflects the speaker's construal.

**@deva[अधिकरण] section structure:** @ref[1.4.45] defines @deva[अधिकरण]; @ref[1.4.46]–@ref[1.4.48] carve out exceptions where locations become @deva[कर्मन्]. This rule is the middle member — the only optional one.
"""

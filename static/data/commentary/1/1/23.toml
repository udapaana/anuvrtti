id = "1.1.23"
numericId = "11023"

[en]
simple = """
The words @deva[बहु] "many" and @deva[गण] "group," plus any word ending in the affixes @deva[वतुप्] or @deva[डति], are called @deva[संख्या] (numeral). This technical label enables special affixes that express "how many times," "in how many ways," and similar meanings.

**Examples of @deva[संख्या] words:**
- @deva[बहु] "many," @deva[गण] "group"
- @deva[वतुप्]-ending: @deva[तावत्] "so much," @deva[यावत्] "as much," @deva[एतावत्] "this much"
- @deva[डति]-ending: @deva[कति] "how many," @deva[तति] "so many"

**What being @deva[संख्या] enables:** @deva[बहु] + @deva[कृत्वसुच्] → @deva[बहुकृत्वः] "many times." @deva[बहु] + @deva[धा] → @deva[बहुधा] "in many ways."
"""

standard = """
This @deva[संज्ञासूत्र] defines @deva[संख्या]: the words @deva[बहु] "many" and @deva[गण] "group," plus words ending in @deva[वतुप्] (@ref[5.2.39]) or @deva[डति] (@ref[5.2.41]).

The @deva[उ] in @deva[वतुप्] and @deva[ड] in @deva[डति] are @deva[इत्]; the actual affixes are @deva[वत्] and @deva[अति].

**@deva[वतुप्] words:** @deva[तावत्] "so much," @deva[यावत्] "as much," @deva[एतावत्] "this much"

**@deva[डति] words:** @deva[कति] "how many," @deva[तति] "so many"

**Effect — enables specific affixes:**
- @deva[कृत्वसुच्] (@ref[5.4.17]): @deva[बहुकृत्वः] "many times"
- @deva[धा] (@ref[5.3.42]): @deva[बहुधा] "in many ways"
- @deva[शस्] (@ref[5.4.43]): @deva[बहुशः] "in large quantities"

**Semantic restriction:** When @deva[बहु] or @deva[गण] are used in non-numerical senses (e.g., @deva[बहु] meaning "important" or @deva[गण] meaning "multitude" without counting), they are not @deva[संख्या] and these affixes do not apply.
"""

advanced = """
@deva[अनुवृत्ति]: None — this is an independent @deva[संज्ञासूत्र].

@deva[बहुगणवतुडति संख्या] — @deva[बहु], @deva[गण], and words in @deva[वतुप्]/@deva[डति] are @deva[संख्या].

**@deva[वतुप्] (@ref[5.2.39]):** @deva[तावत्], @deva[यावत्], @deva[एतावत्], @deva[कियत्]
**@deva[डति] (@ref[5.2.41]):** @deva[कति], @deva[तति], @deva[यति]

**Rules that reference @deva[संख्या]:**
- @ref[5.4.17] (@deva[कृत्वसुच्]): @deva[बहुकृत्वः] "many times"
- @ref[5.3.42] (@deva[धा]): @deva[बहुधा] "in many ways"
- @ref[5.1.22] (@deva[क]): @deva[बहुकः] "manifold"
- @ref[5.4.43] (@deva[शस्]): @deva[बहुशः], @deva[गणशः]
- @ref[1.1.24]: @deva[संख्या] words ending in @deva[ष्]/@deva[न्] become @deva[षट्]
- @ref[2.1.51]: @deva[संख्या] forms @deva[द्विगु] compounds

**Why @deva[बहु] and @deva[गण] are listed separately:** These words do not end in @deva[वतुप्] or @deva[डति], so they would not qualify through the affix conditions alone. They are explicitly included because they function as quantity-words.

**@deva[वार्त्तिक]:** @deva[अर्ध] "half" in compounds with ordinal affixes (@deva[पूरण]) is @deva[संख्या] for @deva[समास] and @deva[कन्] purposes: @deva[अर्धपञ्चम] "4½" → @deva[अर्धपञ्चमशूर्पः] (a @deva[द्विगु] compound by @ref[2.1.51]).

**Semantic restriction:** @deva[बहु] meaning "important" or @deva[गण] meaning "assemblage" without numerical force are not @deva[संख्या]. The designation requires the numerical sense.
"""

id = "1.1.38"
numericId = "11038"

[en]
simple = """
Words formed by @deva[तद्धित] (secondary derivation) affixes that do not take all seven case endings are also @deva[अव्यय] (indeclinables). These are words derived from nouns that have a fixed case meaning — they cannot be declined further.

**Examples:** @deva[ततः] "from there/thence" (always ablative sense), @deva[तत्र] "there" (always locative sense), @deva[तदा] "then," @deva[यदा] "when," @deva[सर्वदा] "always."

These words carry their case meaning built in and do not need or accept additional endings.
"""

standard = """
@deva[तद्धित]-derived words that are @deva[असर्वविभक्ति] (not taking all case endings) are @deva[अव्यय].

**Examples:**
- @deva[ततः] "thence" (ablative sense, from @deva[तद्]) — cannot take dative, locative, etc.
- @deva[तत्र] "there" (locative sense)
- @deva[यतः] "whence," @deva[यत्र] "where"
- @deva[तदा] "then," @deva[यदा] "when," @deva[सर्वदा] "always"

**@deva[सर्वविभक्ति] vs. @deva[असर्वविभक्ति]:** A @deva[सर्वविभक्ति] word takes all seven @deva[विभक्ति]s (case endings) and is therefore a regular declinable noun. An @deva[असर्वविभक्ति] word is restricted to one or few cases and qualifies as @deva[अव्यय].

**What this excludes:** @deva[तद्धित]-derived words that do take all cases (like patronymics: @deva[दाशरथिः] "son of @deva[दशरथ]") are not @deva[अव्यय].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अव्ययम्] from @ref[1.1.37].

@deva[तद्धिताश्चासर्वविभक्तिः] — @deva[तद्धित]-derived words not taking all @deva[विभक्ति]s are @deva[अव्यय].

**Examples:** @deva[ततः] (abl. only), @deva[तत्र] (loc. only), @deva[यतः], @deva[यत्र], @deva[तदा], @deva[यदा], @deva[सर्वदा].

**@deva[असर्वविभक्ति] defined:** A word is @deva[असर्वविभक्ति] if it inherently expresses only one case relationship and cannot be further inflected. @deva[ततः] always means "from there" — it cannot be put in the dative or locative.

**Contrast with @deva[सर्वविभक्ति] @deva[तद्धित]:** Patronymics like @deva[दाशरथिः] take all cases: @deva[दाशरथेः] (gen.), @deva[दाशरथये] (dat.), etc. These are not @deva[अव्यय].

**Interaction with @ref[2.4.82]:** Once classified as @deva[अव्यय], @deva[सुप्] endings are deleted by @ref[2.4.82]. The word retains its derived form without further inflection.

**Position:** This extends the @deva[अव्यय] definition from @ref[1.1.37] to cover derived adverbs.
"""

id = "1.1.39"
numericId = "11039"

[en]
simple = """
Words formed by @deva[कृत्] (primary derivation) affixes that end in @deva[म्] or in @deva[ए], @deva[ओ], @deva[ऐ], @deva[औ] are @deva[अव्यय] (indeclinables). These are verb-derived forms that function as infinitives or verbal adverbs.

**Ending in @deva[म्]:** @deva[दातुम्] "to give" (from @deva[दा] + @deva[तुमुन्]), @deva[स्मारम्] "while remembering" (from @deva[स्मृ] + @deva[णमुल्]).

**Ending in @deva[ए/ऐ]:** @deva[जीवसे] "to live," @deva[पिबध्यै] "to drink" — Vedic infinitive forms.
"""

standard = """
@deva[कृत्]-derived words (@ref[3.1.93]) ending in @deva[म्] or @deva[एच्] (@deva[ए], @deva[ओ], @deva[ऐ], @deva[औ]) are @deva[अव्यय].

**@deva[म्]-final affixes:**
- @deva[तुमुन्] → @deva[दातुम्] "to give," @deva[कर्तुम्] "to do"
- @deva[णमुल्] (@ref[3.3.10]) → @deva[स्मारम्] "while remembering"
- @ref[3.4.26]: @deva[स्वादुंकारम्]

**@deva[एच्]-final affixes:**
- @deva[से] (@ref[3.4.9]) → @deva[वक्षे] "to speak"
- @deva[केन्] (@ref[3.4.2]) → @deva[दृशे] "to see"
- @deva[जीवसे] (RV III.36.10)

**@deva[अन्त] = @deva[औपदेशिक]:** The @deva[म्] or @deva[एच्] must be part of the original affix form, not a case ending. @deva[आधये] (dative singular of @deva[आधि]) ends in @deva[ए] but is not @deva[अव्यय] — the @deva[ए] is a case ending, not part of a @deva[कृत्] affix.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अव्ययम्] from @ref[1.1.37].

@deva[कृन्मेजन्तः] — @deva[कृत्]-derived words ending in @deva[म्] or @deva[एच्] are @deva[अव्यय].

**@deva[म्]-final:** @deva[तुमुन्] → @deva[दातुम्]; @deva[णमुल्] → @deva[स्मारम्], @deva[स्वादुंकारम्] (@ref[3.4.26]).

**@deva[एच्]-final:** @deva[से] (@ref[3.4.9]) → @deva[वक्षे]; @deva[केन्] (@ref[3.4.2]) → @deva[दृशे]; @deva[जीवसे] (RV III.36.10).

**@deva[अन्त] = @deva[औपदेशिक]:** As with @ref[1.1.24], the terminal sound must be part of the cited (@deva[उपदेश]) form of the affix, not derived. This excludes:
- @deva[आधये] — dative of @deva[आधि] (the @deva[ए] is a @deva[सुप्] ending)
- @deva[चिकीर्षवे] — dative of @deva[चिकीर्षु]
- @deva[कुम्भकारेभ्यः] — @deva[ए] is in the @deva[सुप्] ending

**Scope of @deva[कृत्]:** @ref[3.1.93] defines @deva[कृत्] as affixes added directly to verbal roots. This excludes @deva[तद्धित] (which are covered by @ref[1.1.38]).
"""

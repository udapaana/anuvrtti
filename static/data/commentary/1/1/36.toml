id = "1.1.36"
numericId = "11036"

[en]
simple = """
The word @deva[अन्तर] is optionally @deva[सर्वनाम] (pronominal) before the nominative plural ending — but only when it means "outer" or "undergarment." When @deva[अन्तर] means "between" or "interior," it is not @deva[सर्वनाम] and declines regularly.

**"Outer" (option applies):** @deva[अन्तरे गृहाः] or @deva[अन्तराः गृहाः] "outer houses" — both correct.

**"Undergarment" (option applies):** @deva[अन्तरे शाटकाः] or @deva[अन्तराः शाटकाः] "undergarments."

**"Between" (no option):** @deva[ग्रामयोरन्तरे वसति] "he lives between the two villages" — regular declension only.
"""

standard = """
@deva[अन्तर] is optionally @deva[सर्वनाम] before @deva[जस्] when meaning @deva[बहिर्योग] "outer" or @deva[उपसंव्यान] "undergarment."

**Option:** @deva[अन्तरे गृहाः] ~ @deva[अन्तराः गृहाः]; @deva[अन्तरे शाटकाः] ~ @deva[अन्तराः शाटकाः].

**Not @deva[सर्वनाम] ("between"):** @deva[ग्रामयोरन्तरे वसति] — regular locative.

**Position in the series:** This is the last rule in the @deva[सर्वनाम] block that began at @ref[1.1.27]. After this, the grammar moves to a new topic (@deva[अव्यय]).

**@deva[वार्त्तिक]:** @deva[अन्तर] qualifying @deva[पुरि] "city" is not @deva[सर्वनाम]: @deva[अन्तरायां पुरि वसति] "he lives outside the city."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[विभाषा जसि] from @ref[1.1.32]; @deva[सर्वनामानि] from @ref[1.1.27].

@deva[अन्तरं बहिर्योगोपसंव्यानयोः] — @deva[अन्तर] is optionally @deva[सर्वनाम] before @deva[जस्] when meaning @deva[बहिर्योग] "outer" or @deva[उपसंव्यान] "undergarment."

**Option:** @deva[अन्तरे] ~ @deva[अन्तराः].

**Excluded senses:** @deva[अन्तर] meaning "between" or "interior" — not @deva[सर्वनाम]: @deva[ग्रामयोरन्तरे].

**@deva[वार्त्तिक] 1:** @deva[अन्तर] qualifying @deva[पुरि] is not @deva[सर्वनाम]: @deva[अन्तरायां पुरि वसति].

**@deva[वार्त्तिक] 2:** @deva[तीय]-words (@deva[द्वितीय], @deva[तृतीय]) are optionally @deva[सर्वनाम] before @deva[ङित्] singular endings (dat., abl., gen., loc.): @deva[द्वितीयस्मै] ~ @deva[द्वितीयाय]. This extends the @deva[सर्वनाम] option beyond the @deva[जसि] context.

**End of the @deva[सर्वनाम] section:** @ref[1.1.27]–@ref[1.1.36] collectively define @deva[सर्वनाम] status and all its compound-specific exceptions and nom. pl. options. From @ref[1.1.37], the grammar moves to @deva[अव्यय] (indeclinables).
"""

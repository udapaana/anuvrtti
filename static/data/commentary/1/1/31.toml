id = "1.1.31"
numericId = "11031"

[en]
simple = """
In @deva[द्वन्द्व] (copulative) compounds — where two or more words are listed together — words from the @deva[सर्वनाम] list lose their pronominal declension. They take regular endings instead.

**Example:** @deva[वर्णाश्रमेतर] "castes, orders, and others" — genitive plural @deva[वर्णाश्रमेतराणाम्] (regular), not *@deva[वर्णाश्रमेतरेषाम्] (pronominal). Even though @deva[इतर] "other" is normally a @deva[सर्वनाम], inside the @deva[द्वन्द्व] it behaves like an ordinary noun.
"""

standard = """
@deva[सर्वादि] words in @deva[द्वन्द्व] compounds are not @deva[सर्वनाम] — they take regular declension.

**Examples:** @deva[वर्णाश्रमेतराणाम्] "of castes, orders, and others" (not *@deva[इतरेषाम्]). @deva[पूर्वापराणाम्] "of the eastern and western (ones)."

**The @deva[च] signals closure:** The @deva[च] in @deva[द्वन्द्वे च] marks the end of the series of prohibitions that began at @ref[1.1.29].

**Partial exception:** @ref[1.1.32] reintroduces an option before @deva[जस्] (nominative plural) — so the prohibition here is absolute for all cases except nom. pl., where @ref[1.1.32] allows optionality.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सर्वनामानि] from @ref[1.1.27]; @deva[न] from @ref[1.1.29].

@deva[द्वन्द्वे च] — @deva[सर्वादि] words in @deva[द्वन्द्व] are not @deva[सर्वनाम].

**Examples:** @deva[वर्णाश्रमेतराणाम्], @deva[पूर्वापराणाम्].

**The @deva[च]:** Marks the end of the prohibition series (@ref[1.1.29] @deva[बहुव्रीहि], @ref[1.1.30] @deva[तृतीया]-@deva[समास], @ref[1.1.31] @deva[द्वन्द्व]). Together, these three rules deny @deva[सर्वनाम] status in the major compound types where it could otherwise extend via @ref[1.1.72].

**Interaction with @ref[1.1.32]:** @ref[1.1.32] immediately creates an option before @deva[जस्] (nom. pl.), partially overriding this rule. So the prohibition is absolute for all cases except nom. pl.

**Contrast with @ref[1.1.28]:** Directional @deva[बहुव्रीहि] gets an option (@ref[1.1.28]); directional @deva[द्वन्द्व] does not — the prohibition here is unconditional (except for the @deva[जस्] option of @ref[1.1.32]).
"""

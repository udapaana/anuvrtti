id = "1.1.41"
numericId = "11041"

[en]
simple = """
@deva[अव्ययीभाव] compounds — where an indeclinable word governs the meaning — are themselves @deva[अव्यय] (indeclinables). The compound as a whole does not change form for case, gender, or number.

**Examples:** @deva[अधिहरि] "upon @deva[हरि]," @deva[अनुरूपम्] "accordingly," @deva[उपाग्नि] "near the fire."

These compounds typically appear in neuter form. Because they are @deva[अव्यय], case endings are deleted: you say @deva[उपाग्नि] in every context, whether it would be nominative, accusative, or locative.
"""

standard = """
@deva[अव्ययीभाव] compounds are @deva[अव्यय]. The @deva[च] ("and") connects this to the preceding @deva[अव्यय] rules and marks the end of the @deva[अव्यय] section.

**Examples:** @deva[अधिहरि] "upon @deva[हरि]," @deva[अनुरूपम्] "accordingly," @deva[उपाग्नि] "near the fire."

**Effects of @deva[अव्यय] status:**
1. @ref[2.4.82] (@deva[अव्ययादाप्सुपः]): @deva[सुप्] endings and @deva[आप्] (feminine marker) are deleted
2. @ref[2.4.17]: the compound takes neuter gender
3. The compound remains uninflected across all syntactic environments

**What is an @deva[अव्ययीभाव]?** A compound where an @deva[अव्यय] (indeclinable prefix like @deva[अधि], @deva[उप], @deva[अनु]) is the governing member, and a noun follows. Defined at @ref[2.1.6].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[अव्ययम्] from @ref[1.1.37].

@deva[अव्ययीभावश्च] — @deva[अव्ययीभाव] compounds are also @deva[अव्यय]. The @deva[च] marks the end of the @deva[अव्यय] definition series (@ref[1.1.37]–@ref[1.1.41]).

**Examples:** @deva[अधिहरि], @deva[अनुरूपम्], @deva[उपाग्नि], @deva[प्रत्यग्नि].

**Consequences of @deva[अव्यय] status:**
- @ref[2.4.82]: @deva[सुप्] and @deva[आप्] are deleted — @deva[उपाग्नि प्रत्यग्नि शालाभाः पतन्ति]
- @ref[2.4.17]: neuter gender assignment
- @ref[2.4.18]: accent follows the @deva[अव्ययीभाव] pattern

**Definition of @deva[अव्ययीभाव]:** @ref[2.1.6] (@deva[अव्ययं विभक्तिसमीपसमृद्धि...]) defines @deva[अव्ययीभाव] as a compound where the @deva[अव्यय] first member governs. The compound as a whole expresses the meaning of the @deva[अव्यय] — a locational, temporal, or relational sense.

**Complete @deva[अव्यय] coverage:** @ref[1.1.37]–@ref[1.1.41] now exhaustively define @deva[अव्यय]:
- @ref[1.1.37]: @deva[स्वरादि] and @deva[निपात]
- @ref[1.1.38]: @deva[असर्वविभक्ति] @deva[तद्धित] words
- @ref[1.1.39]: @deva[कृत्] words ending in @deva[म्]/@deva[एच्]
- @ref[1.1.40]: @deva[क्त्वा]/@deva[तोसुन्]/@deva[कसुन्] words
- @ref[1.1.41]: @deva[अव्ययीभाव] compounds
"""

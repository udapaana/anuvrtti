id = "1.1.27"
numericId = "11027"

[en]
simple = """
The word @deva[सर्व] "all" and a list of related words are called @deva[सर्वनाम] (pronouns). These words follow special declension patterns — their case endings differ from ordinary nouns.

**Key @deva[सर्वनाम] words:** @deva[सर्व] "all," @deva[विश्व] "every," @deva[उभ] "both," @deva[अन्य] "other," @deva[तद्] "that," @deva[यद्] "which," @deva[इदम्] "this," @deva[किम्] "what/who," @deva[एक] "one," @deva[युष्मद्] "you," @deva[अस्मद्] "I/we."

**Example:** The dative of @deva[सर्व] is @deva[सर्वस्मै] "to all" — not *@deva[सर्वाय], which is what you would expect if it declined like an ordinary @deva[अ]-stem noun (compare @deva[नराय] "to a man").
"""

standard = """
This @deva[संज्ञासूत्र] declares the @deva[सर्वादि] words (listed in the @deva[गणपाठ]) as @deva[सर्वनाम]. They take pronominal declension endings instead of ordinary nominal ones.

**The @deva[सर्वादिगण] includes:** @deva[सर्व], @deva[विश्व], @deva[उभ], @deva[उभय], @deva[डतर]-words (@deva[कतर] "which of two"), @deva[डतम]-words (@deva[कतम] "which of many"), @deva[अन्य], @deva[अन्यतर], @deva[इतर], @deva[त्वत्], @deva[नेम], @deva[सम], @deva[त्यद्], @deva[तद्], @deva[यद्], @deva[एतद्], @deva[इदम्], @deva[अदस्], @deva[एक], @deva[द्वि], @deva[युष्मद्], @deva[अस्मद्], @deva[भवत्], @deva[किम्].

**Declension differences (masculine @deva[अ]-stems):**
- Dative: @deva[सर्वस्मै] vs. @deva[नराय]
- Ablative: @deva[सर्वस्मात्] vs. @deva[नरात्]
- Locative: @deva[सर्वस्मिन्] vs. @deva[नरे]
- Nom. pl.: @deva[सर्वे] vs. @deva[नराः]

**Conditional members:** Directional words (@deva[पूर्व], @deva[पर], @deva[उत्तर], @deva[दक्षिण], @deva[अपर], @deva[अवर], @deva[अधर]) are @deva[सर्वनाम] only when indicating relative position, not as proper names. @deva[स्व] is @deva[सर्वनाम] only when meaning "own," not "kinsman" or "wealth."
"""

advanced = """
@deva[अनुवृत्ति]: None — this is an independent @deva[संज्ञासूत्र].

@deva[सर्वादीनि सर्वनामानि] — @deva[सर्व] and the words enumerated in the @deva[सर्वादिगण] are @deva[सर्वनाम].

**The @deva[सर्वादिगण]:** @deva[सर्व], @deva[विश्व], @deva[उभ], @deva[उभय], @deva[डतर]/@deva[डतम]-words, @deva[अन्य], @deva[अन्यतर], @deva[इतर], @deva[त्वत्], @deva[त्व], @deva[नेम], @deva[सम], @deva[सिम], @deva[त्यद्], @deva[तद्], @deva[यद्], @deva[एतद्], @deva[इदम्], @deva[अदस्], @deva[एक], @deva[द्वि], @deva[युष्मद्], @deva[अस्मद्], @deva[भवत्], @deva[किम्].

**Conditional members:**
- @deva[पूर्व], @deva[पर], @deva[अवर], @deva[दक्षिण], @deva[उत्तर], @deva[अपर], @deva[अधर]: @deva[सर्वनाम] only in relational sense (direction/position), not as proper names
- @deva[स्व]: @deva[सर्वनाम] only as "own," not "kinsman" or "wealth"
- @deva[अन्तर]: @deva[सर्वनाम] only as "outer"/"undergarment"

**Pronominal declension pattern:** @deva[सर्वे] (nom. pl.) vs. @deva[नराः]; @deva[सर्वस्मै] vs. @deva[नराय]; @deva[सर्वस्मात्] vs. @deva[नरात्]; @deva[सर्वस्मिन्] vs. @deva[नरे]; @deva[सर्वेषाम्] vs. @deva[नराणाम्].

**As proper names:** When used as names or appellatives, these words are not @deva[सर्वनाम]: @deva[सर्वाय देहि] "give to @deva[सर्व] (a person named Sarva)" — regular declension. As @deva[उपसर्जन] (subordinate member in compounds): @deva[अतिसर्वाय देहि] "give to the Supreme" — again regular.

**@deva[उभ]:** Always dual. Listed for @deva[अकच्] (@ref[5.3.71]): @deva[उभकौ].

**Series context:** @ref[1.1.27]–@ref[1.1.33] form a block defining @deva[सर्वनाम] designation and its exceptions in compound contexts (@deva[बहुव्रीहि], @deva[तत्पुरुष], @deva[द्वन्द्व]).
"""

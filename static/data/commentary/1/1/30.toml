id = "1.1.30"
numericId = "11030"

[en]
simple = """
In @deva[तृतीया]-@deva[तत्पुरुष] compounds (where the first member expresses an instrumental relationship), @deva[सर्वनाम] words lose their pronominal declension. They take regular endings instead.

**Example:** @deva[मासपूर्व] means "prior by a month" (@deva[मासेन पूर्वः]). Even though @deva[पूर्व] is normally a @deva[सर्वनाम], in this compound it declines regularly: dative @deva[मासपूर्वाय] (not *@deva[मासपूर्वस्मै]).
"""

standard = """
Another exception to pronominal declension: @deva[सर्वादि] words in @deva[तृतीया]-@deva[समास] (@ref[2.1.31]) decline regularly.

**Examples:** @deva[मासपूर्वाय] "to one who is prior by a month," @deva[संवत्सरपूर्वाय] "to one who is prior by a year."

**Specific to @ref[2.1.31]:** This rule targets compounds formed under @ref[2.1.31] (instrumental @deva[तत्पुरुष] with @deva[पूर्व], @deva[सदृश], @deva[सम], etc.). General @deva[तृतीया]-@deva[तत्पुरुष] under @ref[2.1.32] retains pronominal declension: @deva[त्वयका कृतम्], @deva[मयका कृतम्].

**Why @deva[समास] is stated:** Extends the rule beyond compounds to non-compound constructions with the same sense: @deva[मासेन पूर्वाय] — even the uncompounded phrase takes regular declension.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[सर्वनामानि] from @ref[1.1.27]; @deva[न] from @ref[1.1.29].

@deva[तृतीयासमासे] — @deva[सर्वादि] words in @deva[तृतीया]-@deva[समास] are not @deva[सर्वनाम].

**Scope — @ref[2.1.31] only:** The @deva[तृतीया]-@deva[समास] here refers specifically to compounds formed under @ref[2.1.31] (@deva[तृतीया तत्पुरुषे] with @deva[पूर्व], @deva[सदृश], @deva[सम], @deva[ऊन], etc.). It does not extend to general @deva[तृतीया]-@deva[तत्पुरुष] under @ref[2.1.32], where pronominal declension is retained: @deva[त्वयका कृतम्], @deva[मयका कृतम्].

**Examples:** @deva[मासपूर्वाय], @deva[संवत्सरपूर्वाय].

**Why @deva[समास] is stated explicitly:** The @deva[काशिका] notes that @deva[समास] here extends the prohibition to the non-compound paraphrase as well: @deva[मासेन पूर्वाय] — even when @deva[पूर्व] stands alone with an instrumental qualifier, it loses @deva[सर्वनाम] status if the relationship is equivalent to @ref[2.1.31].

**Position in the series:** This continues the compound-specific exceptions begun at @ref[1.1.29] (@deva[बहुव्रीहि]) and continued at @ref[1.1.31] (@deva[द्वन्द्व]).
"""

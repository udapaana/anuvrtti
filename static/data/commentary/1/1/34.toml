id = "1.1.34"
numericId = "11034"

[en]
simple = """
The seven directional words — @deva[पूर्व] "east/prior," @deva[पर] "far/other," @deva[अवर] "near/lower," @deva[दक्षिण] "south/right," @deva[उत्तर] "north/upper," @deva[अपर] "west/later," @deva[अधर] "below" — are optionally @deva[सर्वनाम] before the nominative plural ending. But only when they indicate relative position, not when used as proper names.

**Relational (option applies):** @deva[दक्षिणे] or @deva[दक्षिणाः] "the southern ones" — both correct.

**As a name (no option):** @deva[उत्तराः कुरवः] "the Northern @deva[कुरु]s" — regular declension only, because @deva[उत्तर] is part of a fixed name.
"""

standard = """
The seven directional words (already in the @deva[सर्वादि] list) are optionally @deva[सर्वनाम] before @deva[जस्], but only when expressing relative position (@deva[व्यवस्था]), not as proper names (@deva[संज्ञा]).

**Option (relational):** @deva[पूर्वे] ~ @deva[पूर्वाः], @deva[दक्षिणे] ~ @deva[दक्षिणाः], @deva[उत्तरे] ~ @deva[उत्तराः].

**No option (names):** @deva[उत्तराः कुरवः] "the Northern @deva[कुरु]s" — regular only.

**No option (other senses):** @deva[दक्षिणाः] @deva[इमे गायकाः] "these clever minstrels" — @deva[दक्षिण] means "clever" here, not "southern."

**@deva[प्राप्तविभाषा]:** These words are already @deva[सर्वनाम] by @ref[1.1.27]. The option here restricts pronominal behavior to optional in nom. pl.; other cases remain pronominal.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[विभाषा जसि] from @ref[1.1.32]; @deva[सर्वनामानि] from @ref[1.1.27].

@deva[पूर्वपरावरदक्षिणोत्तरापराधराणि व्यवस्थायामसंज्ञायाम्] — these seven words are optionally @deva[सर्वनाम] before @deva[जस्] when expressing @deva[व्यवस्था] (relative position) and not used as @deva[संज्ञा] (proper names).

**Option:** @deva[पूर्वे] ~ @deva[पूर्वाः]; @deva[उत्तरे] ~ @deva[उत्तराः].

**@deva[संज्ञा] exclusion:** @deva[उत्तराः कुरवः] — no option. The compound @deva[उत्तराः कुरवः] is a fixed name, not a relational description.

**@deva[व्यवस्था] condition:** Implies a reference point (@deva[अवधि]). @deva[पूर्वे] "the eastern ones" is relational — eastern relative to something. Without a reference point, the sense is not @deva[व्यवस्था].

**@deva[प्राप्तविभाषा]:** All seven are already @deva[सर्वनाम] by @ref[1.1.27]. This rule's option applies only to nom. pl.; other cases maintain full pronominal declension.

**Non-directional senses excluded:** When @deva[दक्षिण] means "clever" or "courteous," it is not expressing @deva[व्यवस्था], so the option does not apply — regular declension only.
"""

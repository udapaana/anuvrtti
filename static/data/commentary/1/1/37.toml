id = "1.1.37"
numericId = "11037"

[en]
simple = """
The words @deva[स्वर्] "heaven" and others listed in a grammatical catalogue, plus @deva[निपात]s (particles), are called @deva[अव्यय] (indeclinables). These words never change form — they don't take case endings, gender markers, or number suffixes.

**Examples from the @deva[स्वरादि] list:** @deva[स्वर्] "heaven," @deva[प्रातर्] "morning," @deva[पुनर्] "again," @deva[उच्चैः] "high/loud," @deva[नीचैः] "low/softly," @deva[दिवा] "by day," @deva[रात्रौ] "by night," @deva[नमः] "reverence," @deva[बहिः] "outside," @deva[स्वयम्] "oneself."

**Examples of @deva[निपात]s:** @deva[च] "and," @deva[वा] "or," @deva[ह] (emphatic), @deva[एव] "indeed," @deva[न] "not."
"""

standard = """
This @deva[संज्ञासूत्र] defines @deva[अव्यय]: the @deva[स्वरादि] words (from the @deva[गणपाठ]) and @deva[निपात]s (@ref[1.4.56]–@ref[1.4.97]) are indeclinable. They remain unchanged across gender, case, and number.

**@deva[स्वरादि] list includes:** @deva[स्वर्], @deva[अन्तर्], @deva[प्रातर्], @deva[पुनर्], @deva[उच्चैः], @deva[नीचैः], @deva[शनैः], @deva[पृथक्], @deva[ह्यः], @deva[श्वः], @deva[दिवा], @deva[रात्रौ], @deva[सायम्], @deva[चिरम्], @deva[ईषत्], @deva[तूष्णीम्], @deva[बहिः], @deva[स्वयम्], @deva[वृथा], @deva[नक्तम्], @deva[नमः], @deva[अलम्].

**Why this matters:** @deva[अव्यय] words do not take @deva[सुप्] (case) endings. By @ref[2.4.82] (@deva[अव्ययादाप्सुपः]), @deva[सुप्] is deleted after @deva[अव्यय]. This is why @deva[स्वर्] stays @deva[स्वर्] in all contexts.

**Additional @deva[अव्यय] sources:** @ref[1.1.38]–@ref[1.1.41] extend @deva[अव्यय] to other word classes (certain @deva[तद्धित] and @deva[कृत्] formations, @deva[अव्ययीभाव] compounds).
"""

advanced = """
@deva[अनुवृत्ति]: None — this begins the @deva[अव्यय] section.

@deva[स्वरादिनिपातमव्ययम्] — @deva[स्वरादि] (@deva[गणपाठ]) and @deva[निपात] (@ref[1.4.56]–@ref[1.4.97]) are @deva[अव्यय].

**@deva[स्वरादि] list (selected):** @deva[स्वर्], @deva[अन्तर्], @deva[प्रातर्], @deva[पुनर्], @deva[सनुतर्], @deva[उच्चैः], @deva[नीचैः], @deva[शनैः], @deva[ऋधक्], @deva[ऋते], @deva[युगपत्], @deva[आरात्], @deva[पृथक्], @deva[ह्यः], @deva[श्वः], @deva[दिवा], @deva[रात्रौ], @deva[सायम्], @deva[चिरम्], @deva[मनाक्], @deva[ईषत्], @deva[शश्वत्], @deva[तूष्णीम्], @deva[बहिः], @deva[समया], @deva[स्वयम्], @deva[वृथा], @deva[नक्तम्], @deva[नञ्], @deva[अद्धा], @deva[मा].

**Consequence of @deva[अव्यय] status:** @ref[2.4.82] (@deva[अव्ययादाप्सुपः]) deletes @deva[सुप्] endings. @ref[2.4.83] deletes @deva[आप्] (feminine marker). So @deva[अव्यय] words undergo no inflection.

**The @deva[अव्यय] section:** @ref[1.1.37]–@ref[1.1.41] collectively define @deva[अव्यय]:
- @ref[1.1.37]: @deva[स्वरादि] and @deva[निपात]
- @ref[1.1.38]: @deva[तद्धित]-derived words not taking all cases
- @ref[1.1.39]: @deva[कृत्]-derived words ending in @deva[म्] or @deva[एच्]
- @ref[1.1.40]: @deva[क्त्वा]-, @deva[तोसुन्]-, @deva[कसुन्]-words
- @ref[1.1.41]: @deva[अव्ययीभाव] compounds

**@deva[निपात] overlap:** @deva[निपात]s are defined at @ref[1.4.56]–@ref[1.4.97]. Some overlap with the @deva[स्वरादि] list. The dual specification ensures comprehensive coverage.
"""

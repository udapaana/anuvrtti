id = "1.3.38"
numericId = "13038"

[en]
simple = """
The verb @deva[क्रम्] "to step, to proceed" takes @deva[आत्मनेपद] when used in three special senses:

1. **Continuity / facility** (@deva[वृत्ति]): @deva[ऋक्ष्वस्य क्रमते बुद्धिः] "his intellect moves smoothly through the @deva[ऋग्वेद]"
2. **Energy / determination** (@deva[सर्ग]): @deva[व्याकरणाध्ययनाय क्रमते] "he exerts himself to study grammar"
3. **Development / growth** (@deva[उपचय]): @deva[अस्मिन् शास्त्राणि क्रमन्ते] "the sciences develop in him"

In ordinary senses (physical stepping, walking away), @deva[परस्मैपद] applies: @deva[अपक्रामति] "he walks away."

This root (@deva[क्रम्]) governs the next five rules as well (@ref[1.3.39]–@ref[1.3.43]).
"""

standard = """
After @deva[क्रम्] meaning @deva[वृत्ति] (continuity/facility), @deva[सर्ग]/@deva[प्रयत्न] (energy/effort), or @deva[उपचय]/@deva[तायन] (development/growth), @deva[आत्मनेपद].

**Examples:**
- @deva[ऋक्ष्वस्य क्रमते बुद्धिः] "his intellect proceeds through the @deva[ऋग्वेद]" (@deva[वृत्ति])
- @deva[व्याकरणाध्ययनाय क्रमते] "he exerts for grammar study" (@deva[सर्ग])
- @deva[अस्मिन् शास्त्राणि क्रमन्ते] "the sciences develop in him" (@deva[उपचय])

**@deva[परस्मैपद] (physical stepping):**
- @deva[अपक्रामति] "he walks away"
- @deva[क्रामति] "he steps"

**@deva[क्रम्]-series begins:** @deva[क्रम्] carries forward as @deva[अनुवृत्ति] through @ref[1.3.39] (@deva[उप]/@deva[पर] + @deva[क्रम्]), @ref[1.3.40] (@deva[आ] + @deva[क्रम्] for luminaries), @ref[1.3.41]–@ref[1.3.43] (further prefix + meaning conditions). This is the longest single-root sequence in the @deva[आत्मनेपद] section.

**Three senses defined:**
- @deva[वृत्ति]: smooth, unhindered progression — the mind flowing through a text
- @deva[सर्ग]: directed energy, purposeful effort
- @deva[उपचय]: accumulation, growth, development over time
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[वृत्तिसर्गतायनेषु क्रमः] — after @deva[क्रम्] in @deva[वृत्ति]/@deva[सर्ग]/@deva[उपचय] senses, @deva[आत्मनेपद].

**@deva[क्रम्]-series (@ref[1.3.38]–@ref[1.3.43]):** @deva[पाणिनि] devotes six rules to @deva[क्रम्] — the longest sequence for any single root in the @deva[आत्मनेपद] section:
- @ref[1.3.38] (this): three meaning-based conditions (no prefix required)
- @ref[1.3.39]: @deva[उप]/@deva[पर] + @deva[क्रम्] with same senses
- @ref[1.3.40]: @deva[आ] + @deva[क्रम्] for rising luminaries
- @ref[1.3.41]–@ref[1.3.43]: further prefix + meaning specifications

**Why so many rules?** @deva[क्रम्] is @deva[परस्मैपदिन्] by default (not @deva[ञित्] or @deva[अनुदात्तेत्]). Its @deva[आत्मनेपद] uses are entirely prefix- and meaning-conditioned, requiring explicit enumeration.

**@deva[वृत्ति] vs. @deva[उपचय]:** @deva[वृत्ति] denotes smooth continuation (the mind flowing through a text), while @deva[उपचय] denotes accumulation or growth (sciences developing in a student). Both represent states where the action's result stays with the agent.

**Default:** Without these meanings, @deva[क्रम्] is @deva[परस्मैपदिन्]: @deva[अपक्रामति], @deva[संक्रामति], @deva[क्रामति]. Physical stepping and spatial movement retain @deva[परस्मैपद].
"""

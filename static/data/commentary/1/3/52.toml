id = "1.3.52"
numericId = "13052"

[en]
simple = """
The verb @deva[गॄ] "to swallow" takes @deva[आत्मनेपद] when preceded by @deva[सम्] and meaning "to promise" or "to acknowledge."

**@deva[आत्मनेपद] (promising):**
- @deva[शतं संगिरते] "he promises a hundred"

**@deva[परस्मैपद] (swallowing):**
- @deva[संगिरति ग्रासम्] "he swallows the morsel"

The literal meaning of "swallowing" remains @deva[परस्मैपद]; only the extended meaning of "promising" (metaphorically "taking in" an obligation) triggers @deva[आत्मनेपद].
"""

standard = """
After @deva[सम्] + @deva[गॄ] meaning "to promise/acknowledge," @deva[आत्मनेपद].

**Promising — @deva[आत्मनेपद]:**
- @deva[शतं संगिरते] "he promises a hundred rupees"

**Swallowing — @deva[परस्मैपद]:**
- @deva[संगिरति ग्रासम्] "he swallows the morsel"

**Meaning split:** @deva[सम्] + @deva[गॄ] has two senses: literal "swallowing together" (@deva[परस्मैपद]) and figurative "promising/acknowledging" (@deva[आत्मनेपद]). Only the figurative sense triggers the override.

**Relation to @ref[1.3.51]:** The previous rule gave @deva[आत्मनेपद] for @deva[अव] + @deva[गॄ] unconditionally. Here, @deva[सम्] + @deva[गॄ] requires the specific "promise" meaning — showing that different prefixes with the same root receive different treatment.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[समः प्रतिज्ञायाम्] — after @deva[सम्] + @deva[गॄ] in the sense of @deva[प्रतिज्ञा] (promise), @deva[आत्मनेपद].

**Contrast with @ref[1.3.51]:** @deva[अव] + @deva[गॄ] takes @deva[आत्मनेपद] unconditionally. @deva[सम्] + @deva[गॄ] requires the "promise" meaning. This shows @deva[पाणिनि]'s precision: each prefix receives exactly the conditions it needs.

**Semantic motivation:** Promising is inherently self-binding — the agent takes an obligation upon himself. This metaphorical "swallowing" of responsibility aligns with @deva[आत्मनेपद]. Literal swallowing, by contrast, is a physical action directed at an external object.

**@deva[गॄ] coverage:** @ref[1.3.51] (@deva[अव], unconditional) and @ref[1.3.52] (this: @deva[सम्], promising) complete the @deva[गॄ]-specific rules. Other prefix combinations follow the default @ref[1.3.78].
"""

id = "1.3.41"
numericId = "13041"

[en]
simple = """
The verb @deva[क्रम्] "to step" takes @deva[आत्मनेपद] when preceded by @deva[वि] and meaning "to pace" — the special stepping movement of horses.

**@deva[आत्मनेपद] (pacing):**
- @deva[वाजी विक्रमते] "the horse paces"

**@deva[परस्मैपद] (other meanings of @deva[वि] + @deva[क्रम्]):**
- @deva[विक्रामति अजिनसन्धिः] "the fold of the antelope skin ruptures"

The term @deva[विक्रमण] refers specifically to the placing of footsteps (@deva[पादविक्षेप]) — the deliberate, rhythmic stepping of a horse.
"""

standard = """
After @deva[वि] + @deva[क्रम्] meaning @deva[पादविक्षेप] (placing of footsteps, pacing), @deva[आत्मनेपद].

**Pacing — @deva[आत्मनेपद]:**
- @deva[वाजी विक्रमते] "the horse paces"

**Other senses — @deva[परस्मैपद]:**
- @deva[विक्रामति अजिनसन्धिः] "the antelope-skin fold ruptures"

**Not redundant with @deva[धातुपाठ]:** Though the @deva[धातुपाठ] lists @deva[पादविहरण]/@deva[पादविक्षेप] as meanings for @deva[क्रम्], roots have uses beyond their listed meanings. This rule specifically ties @deva[पादविक्षेप] to @deva[आत्मनेपद] with the prefix @deva[वि].

**@deva[क्रम्]-series position:** Fourth of six rules (@ref[1.3.38]–@ref[1.3.43]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[क्रमः] from @ref[1.3.38].

@deva[विपादे विक्रमणे] — after @deva[वि] + @deva[क्रम्] meaning @deva[पादविक्षेप], @deva[आत्मनेपद].

**Relation to @ref[1.3.38]:** @ref[1.3.38] gives @deva[आत्मनेपद] for @deva[वृत्ति]/@deva[सर्ग]/@deva[उपचय]. @deva[पादविक्षेप] does not fall under any of those three senses — it is a distinct physical action (rhythmic stepping). A separate rule is needed.

**Not redundant with @deva[धातुपाठ]:** The @deva[धातुपाठ] lists @deva[पादविक्षेप] as a meaning of @deva[क्रम्], but the @deva[धातुपाठ] does not determine @deva[पद] assignment. @deva[पद] assignment is governed by rules in @ref[1.3.12]–@ref[1.3.93]. This rule ensures @deva[वि] + @deva[क्रम्] in this sense takes @deva[आत्मनेपद] rather than the default @deva[परस्मैपद].

**Semantic note:** Pacing is an inherent bodily activity of the horse — self-directed movement where the result stays with the agent, naturally aligning with @deva[आत्मनेपद].

**@deva[क्रम्]-series:** @ref[1.3.38] (three senses), @ref[1.3.39] (@deva[उप]/@deva[पर]), @ref[1.3.40] (@deva[आ] + luminary), @ref[1.3.41] (this: @deva[वि] + pacing), @ref[1.3.42] (@deva[प्र]/@deva[उप] + @deva[वि] + begin), @ref[1.3.43] (prefixless optional).
"""

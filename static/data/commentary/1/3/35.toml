id = "1.3.35"
numericId = "13035"

[en]
simple = """
The verb @deva[कृ] "to do" takes @deva[आत्मनेपद] when preceded by @deva[वि] and used without an object — meaning "to move about, to behave."

**Examples:**
- @deva[विकुर्वन्ते सैन्धवाः] "the horses move about gracefully"
- @deva[ओदनस्य पूर्णाः छात्राः विकुर्वन्ते] "the students, full of rice, wander aimlessly"

When @deva[वि] + @deva[कृ] is transitive (with a non-sound object), @deva[परस्मैपद] applies: @deva[चित्तं विकरोति] "he disturbs the mind."
"""

standard = """
After @deva[वि] + @deva[कृ] used intransitively, @deva[आत्मनेपद].

**Intransitive — @deva[आत्मनेपद]:**
- @deva[विकुर्वन्ते सैन्धवाः] "the horses move about gracefully"
- @deva[ओदनस्य पूर्णाः छात्राः विकुर्वन्ते] "the students, sated with rice, act freely"

**Transitive (non-sound) — @deva[परस्मैपद]:**
- @deva[चित्तं विकरोति] "he disturbs the mind"

**Relation to @ref[1.3.34]:** The previous rule gave @deva[आत्मनेपद] for @deva[वि] + @deva[कृ] with a sound-object. This rule extends @deva[आत्मनेपद] to intransitive uses — "moving about, behaving, acting freely" — where no object is present at all.

**@deva[कृ]-series complete:** This is the last of four rules (@ref[1.3.32]–@ref[1.3.35]) governing @deva[आत्मनेपद] for @deva[कृ]. Together they cover: seven special meanings, @deva[अधि] + "overcome," @deva[वि] + sound-object, and @deva[वि] + intransitive.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[कृञः] from @ref[1.3.32]; @deva[वि] from @ref[1.3.34].

@deva[अकर्मकाच्च] — after @deva[वि] + @deva[कृ] used intransitively, @deva[आत्मनेपद].

**@deva[च] = addition:** The @deva[च] in the @deva[सूत्र] adds this condition alongside @ref[1.3.34] (sound-object). @deva[वि] + @deva[कृ] thus takes @deva[आत्मनेपद] in two cases: (1) when the object is sound, (2) when there is no object at all.

**Intransitive @deva[विकृ]:** Without an object, @deva[वि] + @deva[कृ] means "to move about freely, to behave, to act as one pleases." The action is entirely self-contained — no external object receives the result — naturally motivating @deva[आत्मनेपद].

**@deva[कृ]-series complete (@ref[1.3.32]–@ref[1.3.35]):**
- @ref[1.3.32]: seven meaning-based overrides (no prefix required)
- @ref[1.3.33]: @deva[अधि] + @deva[प्रसहन]
- @ref[1.3.34]: @deva[वि] + @deva[शब्दकर्मन्]
- @ref[1.3.35] (this): @deva[वि] + @deva[अकर्मक]

**Default reminder:** In all other uses, @deva[कृ] as @deva[ञित्] (@deva[उभयपदिन्]) follows @ref[1.3.72]: @deva[आत्मनेपद] when the agent benefits, @deva[परस्मैपद] otherwise.

**Transition:** @ref[1.3.36] moves to a new root (@deva[सृज्]), continuing the pattern of prefix + meaning conditions for @deva[आत्मनेपद].
"""

id = "1.3.70"
numericId = "13070"

[en]
simple = """
Causatives of @deva[ली] "to melt, to stick" take @deva[आत्मनेपद] when meaning "to show respect" (@deva[सम्मानन]), "to subdue" (@deva[शालीनीकरण]), or "to deceive" (@deva[प्रलम्भन]).

**@deva[आत्मनेपद]:**
- @deva[जटाभिः आलापयते] "he gains respect through his matted hair" (@deva[सम्मानन])
- @deva[श्येनो वर्तिकाम् उल्लापयते] "the hawk subdues the partridge" (@deva[शालीनीकरण])
- @deva[कस्त्वाम् उल्लापयते] "who deceives you?" (@deva[प्रलम्भन])

**@deva[परस्मैपद] (other senses):**
- @deva[बालकम् उल्लापयति] "he makes the child melt/dissolve"
"""

standard = """
After causatives of @deva[ली] meaning @deva[सम्मानन] (gaining respect), @deva[शालीनीकरण] (subduing/making docile), or @deva[प्रलम्भन] (deceiving), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**@deva[आत्मनेपद]:**
- @deva[जटाभिः आलापयते] "he gains respect through matted hair" (@deva[सम्मानन])
- @deva[श्येनो वर्तिकाम् उल्लापयते] "the hawk subdues the partridge" (@deva[शालीनीकरण])
- @deva[कस्त्वाम् उल्लापयते] "who deceives you?" (@deva[प्रलम्भन])

**@deva[परस्मैपद] (other senses):**
- @deva[बालकम् उल्लापयति]

**@deva[च] includes @deva[प्रलम्भन]:** The @deva[च] in this @deva[सूत्र] carries @deva[प्रलम्भन] from @ref[1.3.69]. Three senses are listed here (@deva[सम्मानन], @deva[शालीनीकरण]), and the @deva[च] adds the fourth (@deva[प्रलम्भन]).

**Which @deva[ली]?** Both @deva[ली] of @deva[दिवादि] class ("to stick/cling") and @deva[ली] of @deva[क्र्यादि] class ("to melt") are covered. @ref[6.1.51] allows optional @deva[ई] → @deva[आ] substitution for @deva[ली], but with these three senses the substitution is obligatory.

**Causative subsection complete:** @ref[1.3.67]–@ref[1.3.70] cover causative-specific @deva[पद] rules.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[प्रलम्भने] from @ref[1.3.69].

@deva[लीयतेर्निष्ठानिकाचकल्कलेषु च] — after causatives of @deva[ली] in @deva[सम्मानन]/@deva[शालीनीकरण]/@deva[प्रलम्भन], @deva[आत्मनेपद].

**@deva[च] = @deva[प्रलम्भन] inclusion:** The @deva[च] draws @deva[प्रलम्भन] from @ref[1.3.69] into this rule, giving three senses total. Without @deva[च], only @deva[सम्मानन] and @deva[शालीनीकरण] would trigger @deva[आत्मनेपद].

**@ref[6.1.51] interaction — @deva[व्यवस्थितविभाषा]:** @ref[6.1.51] optionally substitutes @deva[आ] for @deva[ई] in @deva[ली] before causative @deva[णिच्]: @deva[ली] → @deva[ला] + @deva[णिच्] → @deva[लापयते]. With the three @deva[आत्मनेपद] senses, this substitution is obligatory (@deva[व्यवस्थितविभाषा]) — the option is resolved by meaning.

**Both @deva[ली] roots:**
- @deva[ली] (@deva[दिवादि]): "to stick, to cling"
- @deva[ली] (@deva[क्र्यादि]): "to melt, to dissolve"
Both are covered because both can express the three qualifying senses in their causative forms.

**Causative block complete (@ref[1.3.67]–@ref[1.3.70]):**
- @ref[1.3.67]: general causative @deva[पद] principle
- @ref[1.3.68]: @deva[भी]/@deva[स्मि] (direct fear/wonder)
- @ref[1.3.69]: @deva[गृध्]/@deva[वञ्च्] (deception)
- @ref[1.3.70] (this): @deva[ली] (respect/subdue/deceive)

**Transition:** @ref[1.3.71] begins the final section — general @deva[पद]-assignment rules covering @deva[मिथ्योपपद], @deva[स्वरितञित्], and @deva[शेष].
"""

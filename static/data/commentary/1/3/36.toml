id = "1.3.36"
numericId = "13036"

[en]
simple = """
The verb @deva[नी] "to lead" takes @deva[आत्मनेपद] when used in seven special senses — even when the action benefits someone else:

1. **Guiding worthily** (@deva[सम्मानन]): @deva[नयते चर्वी लोकायते] "the teacher instructs in the @deva[लोकायत] system"
2. **Lifting up** (@deva[उत्सञ्जन]): @deva[माणवकम् उदानयते] "he lifts up the boy"
3. **Making one a teacher** (@deva[आचार्यकरण]): @deva[माणवकम् उपनयते] "he initiates the boy (as his pupil)"
4. **Determining truth** (@deva[ज्ञान]): @deva[पदार्थं निर्णयते] "he ascertains the meaning"
5. **Employing on wages** (@deva[भृति]): @deva[कर्मकारान् उपनयते] "he employs servants"
6. **Paying a debt** (@deva[विगणन]): @deva[मद्राः करं विनयन्ते] "the Madras pay their tax"
7. **Giving in charity** (@deva[व्यय]): @deva[शतं विनयते] "he devotes a hundred to merit"

In ordinary senses, @deva[नी] takes @deva[परस्मैपद]: @deva[अजां नयति ग्रामम्] "he leads the goat to the village."
"""

standard = """
After @deva[नी] in the senses of @deva[सम्मानन] (guiding worthily), @deva[उत्सञ्जन] (lifting), @deva[आचार्यकरण] (initiating as pupil), @deva[ज्ञान] (determining), @deva[भृति] (employing), @deva[विगणन] (paying debt), or @deva[व्यय] (charitable giving), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**Examples:**
- @deva[नयते चर्वी लोकायते] "the teacher instructs in @deva[लोकायत]" (@deva[सम्मानन])
- @deva[माणवकम् उपनयते] "he initiates the boy" (@deva[आचार्यकरण])
- @deva[कर्मकारान् उपनयते] "he employs servants on wages" (@deva[भृति])
- @deva[मद्राः करं विनयन्ते] "the Madras pay their tax" (@deva[विगणन])
- @deva[शतं विनयते] "he devotes a hundred to religious acts" (@deva[व्यय])

**@deva[परस्मैपद] (ordinary leading):**
- @deva[अजां नयति ग्रामम्] "he leads the goat to the village"

**@deva[आचार्यकरण] explained:** The agent brings the pupil near himself, establishing the teacher-student relationship — @deva[माणवकम् उपनयते] literally means "he leads (the boy) toward himself (as teacher)."

**Parallels @ref[1.3.32]:** Like the seven meanings for @deva[कृ], @deva[नी] has seven specialized senses overriding the default @deva[पद] assignment.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[सम्मानोन्मननाचार्यकरणज्ञानभृतिविगणनव्ययेषु नयतेः] — after @deva[नी] in these seven senses, @deva[आत्मनेपद].

**@deva[नी] as @deva[उभयपदिन्]:** @deva[नी] (@deva[णीञ् प्रापणे]) is @deva[ञित्], so by @ref[1.3.72] it takes @deva[आत्मनेपद] only when the agent benefits. This rule overrides the @deva[स्वार्थ] condition for seven conventionalized meanings.

**@deva[आचार्यकरण]:** The compound means "making oneself an @deva[आचार्य]" — the agent brings the pupil to himself, establishing the ritual and educational relationship. This inherently involves the agent, but the rule applies even when a third party initiates the ceremony.

**Comparison with @ref[1.3.32] (@deva[कृ]):** Both rules list exactly seven meaning-based overrides for a @deva[ञित्] root. @deva[पाणिनि] treats @deva[कृ] and @deva[नी] similarly — versatile roots whose prefixed/specialized senses require individual @deva[पद] assignment.

**@deva[नी]-series:** @ref[1.3.36] (this: seven meanings) and @ref[1.3.37] (incorporeal agent-resident object) complete the @deva[नी]-specific rules. After @ref[1.3.37], the grammar moves to @deva[क्रम्] (@ref[1.3.38]–@ref[1.3.43]).
"""

id = "1.3.47"
numericId = "13047"

[en]
simple = """
The verb @deva[वद्] "to speak" takes @deva[आत्मनेपद] when used in six special senses — even when the action benefits someone else:

1. **Showing brilliance** (@deva[भासन]): @deva[वदते चर्वी लोकायते] "the teacher illuminates the @deva[लोकायत] system"
2. **Pacifying** (@deva[उपसंभाषा]): @deva[कर्मकारान् उपवदते] "he cajoles the servants"
3. **Knowing completely** (@deva[ज्ञान]): @deva[सर्वं वदते] "he knows everything"
4. **Striving** (@deva[यत्न]): @deva[क्षेत्रे वदते] "he toils in the field"
5. **Disagreeing** (@deva[विमति]): @deva[क्षेत्रे विवदन्ते] "they disagree about the field"
6. **Flattering / enticing** (@deva[उपमन्त्रण]): @deva[कुलभार्याम् उपवदते] "he entices a respectable wife"

In ordinary senses (simply speaking), @deva[परस्मैपद] applies: @deva[यत् किञ्चिद् वदति] "he says something."
"""

standard = """
After @deva[वद्] in the senses of @deva[भासन] (brilliance), @deva[उपसंभाषा] (pacifying), @deva[ज्ञान] (knowing), @deva[यत्न] (striving), @deva[विमति] (disagreeing), or @deva[उपमन्त्रण] (flattering), @deva[आत्मनेपद].

**Examples:**
- @deva[वदते चर्वी लोकायते] "the @deva[चार्वी] illuminates the @deva[लोकायत]" (@deva[भासन])
- @deva[कर्मकारान् उपवदते] "he conciliates the servants" (@deva[उपसंभाषा])
- @deva[क्षेत्रे वदते] "he labors in the field" (@deva[यत्न])
- @deva[क्षेत्रे विवदन्ते] "they dispute the field" (@deva[विमति])
- @deva[परदारान् उपवदते] "he seduces another's wife" (@deva[उपमन्त्रण])

**@deva[परस्मैपद] (ordinary speaking):**
- @deva[यत् किञ्चिद् वदति] "he says something"

**@deva[वद्]-series begins:** @deva[वद्] is @deva[परस्मैपदिन्] by @ref[1.3.78]. @ref[1.3.47]–@ref[1.3.50] list meaning-specific overrides for @deva[आत्मनेपद]. This is the general rule; the next three provide further conditions.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[भासनोपसंभाषाज्ञानयत्नविमत्युपमन्त्रणेषु वदः] — after @deva[वद्] in these six senses, @deva[आत्मनेपद].

**@deva[वद्] as @deva[परस्मैपदिन्]:** @deva[वद्] ("to speak") is not @deva[अनुदात्तेत्] or @deva[ञित्], so it falls under @ref[1.3.78] by default. These six senses override that default, each representing a usage where the speaking activity is self-directed or self-benefiting.

**Six senses analyzed:**
- @deva[भासन]: not mere speaking but demonstrating mastery — the speaker "shines" through discourse
- @deva[उपसंभाषा]: persuasive/consoling speech directed at winning over
- @deva[ज्ञान]: speaking as evidence of thorough knowledge
- @deva[यत्न]: metaphorical — "laboring" (originally "speaking" extended to effort)
- @deva[विमति]: disagreement — speech in opposition
- @deva[उपमन्त्रण]: flattery/enticement — self-interested persuasion

**@deva[वद्]-series (@ref[1.3.47]–@ref[1.3.50]):**
- @ref[1.3.47] (this): six meaning-based overrides
- @ref[1.3.48]: articulate speech in chorus
- @ref[1.3.49]: @deva[अनु] + @deva[वद्] intransitively (echoing)
- @ref[1.3.50]: contradiction (optional)

**Parallel to @ref[1.3.32]/@ref[1.3.36]:** Like @deva[कृ] and @deva[नी], @deva[वद्] receives a multi-meaning override as the first rule of its series, followed by specific prefix + meaning rules.
"""

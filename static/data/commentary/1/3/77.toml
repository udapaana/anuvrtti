id = "1.3.77"
numericId = "13077"

[en]
simple = """
When an accompanying word (@deva[उपपद]) already indicates that the fruit of the action accrues to the agent, @deva[आत्मनेपद] becomes optional — either @deva[आत्मनेपद] or @deva[परस्मैपद] may be used.

**Both are correct:**
- @deva[स्वं यज्ञं यजते] / @deva[स्वं यज्ञं यजति] "he sacrifices his own sacrifice"
- @deva[स्वं कटं कुरुते] / @deva[स्वं कटं करोति] "he makes his own mat"
- @deva[स्वम् ओदनं पाचयते] / @deva[स्वम् ओदनं पाचयति] "he cooks his own rice"

The word @deva[स्व] "one's own" makes explicit that the agent benefits. Since the @deva[उपपद] already conveys this information, the verb no longer needs @deva[आत्मनेपद] to signal it — hence the option.
"""

standard = """
When an @deva[उपपद] indicates @deva[क्रियाफल] accruing to @deva[कर्ता], @deva[आत्मनेपद] is optional.

**Both valid:**
- @deva[स्वं यज्ञं यजते] / @deva[यजति] "he sacrifices his own sacrifice"
- @deva[स्वं कटं कुरुते] / @deva[करोति] "he makes his own mat"
- @deva[स्वम् ओदनं पाचयते] / @deva[पाचयति] "he cooks his own rice"

**Why optional?** By @ref[1.3.72], @deva[स्वरितेत्]/@deva[ञित्] roots take @deva[आत्मनेपद] when the fruit accrues to the agent. Normally the verb ending itself signals this. When an @deva[उपपद] like @deva[स्व] already makes the self-benefit explicit, the communicative burden on the verb ending is removed — either @deva[पद] suffices.

**Scope:** Applies to all @deva[उभयपदिन्] verbs governed by @ref[1.3.72]–@ref[1.3.76]. The @deva[उपपद] must clearly indicate agent-benefit (e.g., @deva[स्व], @deva[आत्मन्]).

**@deva[स्वार्थ] block complete:** @ref[1.3.72]–@ref[1.3.77] form the complete @deva[कर्त्रभिप्राय] (agent-benefit) section.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[कर्त्रभिप्राये क्रियाफले] from @ref[1.3.72].

@deva[उपपदे कर्त्रभिप्राय क्रियाफलं विभाषा] — when an @deva[उपपद] indicates agent-benefit, @deva[पद] is optional.

**Information-theoretic basis:** @deva[आत्मनेपद] in the @deva[स्वार्थ] context serves to signal that the agent benefits. When an @deva[उपपद] (@deva[स्व], @deva[आत्मन्], etc.) already encodes this information, the signal in the verb ending becomes redundant. Redundancy permits optionality.

**Scope of optionality:** This applies only to @deva[उभयपदिन्] verbs whose @deva[आत्मनेपद] is conditioned by @deva[कर्त्रभिप्राय] (@ref[1.3.72]–@ref[1.3.76]). It does not create optionality for:
- @ref[1.3.12] roots (@deva[अनुदात्तेत्]/@deva[ङित्]) — always @deva[आत्मनेपद]
- @ref[1.3.17]–@ref[1.3.71] specific overrides — @deva[आत्मनेपद] is unconditional

**@deva[उपपद] requirement:** The @deva[उपपद] must clearly and independently indicate that the fruit goes to the agent. Mere contextual implication is insufficient.

**@deva[स्वार्थ] section complete (@ref[1.3.72]–@ref[1.3.77]):** This rule closes the @deva[कर्त्रभिप्राय] block. @ref[1.3.78] follows with the @deva[शेष] (residual default) — @deva[परस्मैपद] for all remaining cases.
"""

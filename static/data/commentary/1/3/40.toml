id = "1.3.40"
numericId = "13040"

[en]
simple = """
The verb @deva[क्रम्] "to step" takes @deva[आत्मनेपद] when preceded by @deva[आ] and meaning "the rising of a heavenly body."

**@deva[आत्मनेपद] (rising of luminaries):**
- @deva[आक्रमते सूर्यः] "the sun rises"
- @deva[आक्रमते चन्द्रमाः] "the moon rises"
- @deva[आक्रमन्त ज्योतींषि] "the stars rise"

**@deva[परस्मैपद] (other meanings of @deva[आ] + @deva[क्रम्]):**
- @deva[आक्रामति माणवकः कुतपम्] "the boy attacks the ox"

**@deva[परस्मैपद] (non-luminaries rising):**
- @deva[आक्रामति धूमो हर्म्यतलात्] "smoke rises from the rooftop"

Only the rising of celestial bodies (@deva[ज्योतिस्]) triggers @deva[आत्मनेपद].
"""

standard = """
After @deva[आङ्] + @deva[क्रम्] meaning the rising of a heavenly body (@deva[ज्योतिस्]), @deva[आत्मनेपद].

**Luminaries rising — @deva[आत्मनेपद]:**
- @deva[आक्रमते सूर्यः] "the sun rises"
- @deva[आक्रमते चन्द्रमाः] "the moon rises"
- @deva[आक्रमन्त ज्योतींषि] "the stars rise"

**Other senses — @deva[परस्मैपद]:**
- @deva[आक्रामति माणवकः कुतपम्] "the boy attacks the ox"

**@deva[वार्त्तिक] — @deva[ज्योतिस्] restriction:** The ascending must refer to heavenly bodies specifically. Non-luminaries rising take @deva[परस्मैपद]: @deva[आक्रामति धूमो हर्म्यतलात्] "smoke rises from the rooftop."

**Note:** This rule does not carry forward the @deva[वृत्ति]/@deva[सर्ग]/@deva[उपचय] condition from @ref[1.3.38]. It introduces an entirely new meaning condition — the rising of luminaries — specific to the prefix @deva[आ].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[क्रमः] from @ref[1.3.38].

@deva[आङ उद्गमने] — after @deva[आङ्] + @deva[क्रम्] meaning rising (of a luminary), @deva[आत्मनेपद].

**New meaning condition:** Unlike @ref[1.3.38]–@ref[1.3.39] which use @deva[वृत्ति]/@deva[सर्ग]/@deva[उपचय], this rule introduces @deva[उद्गमन] (rising, ascending) as the operative meaning. The three senses from @ref[1.3.38] do not carry forward here.

**@deva[वार्त्तिक] — @deva[ज्योतिषामेव]:** Only @deva[ज्योतिस्] (luminaries: sun, moon, stars, planets) qualify. The ascending of non-luminaries (smoke, birds, people climbing) takes @deva[परस्मैपद]. This restriction is not stated in the @deva[सूत्र] itself but supplied by @deva[वार्त्तिक].

**Semantic motivation:** The rising of celestial bodies is an inherent, self-contained process — the sun rises by its own nature, not for an external purpose. This self-directed quality motivates @deva[आत्मनेपद].

**@deva[क्रम्]-series position:** Third of six rules. @ref[1.3.38] (prefixless, three senses), @ref[1.3.39] (@deva[उप]/@deva[पर], three senses), @ref[1.3.40] (this: @deva[आ], luminary-rising), @ref[1.3.41]–@ref[1.3.43] (further conditions).
"""

id = "1.3.85"
numericId = "13085"

[en]
simple = """
When @deva[उप] + @deva[रम्] "to cease" is used intransitively (without an object), the choice between @deva[परस्मैपद] (active endings) and @deva[आत्मनेपद] (reflexive endings) is optional.

**Both are correct:**
- @deva[उपरमति] "he ceases" (@deva[परस्मैपद])
- @deva[उपरमते] "he ceases" (@deva[आत्मनेपद])

**Example in context:**
- @deva[यावद् भुक्तम् उपरमति] / @deva[उपरमते] "he stopped while it was being eaten"

The previous rule (@ref[1.3.84]) requires @deva[परस्मैपद] for @deva[उप] + @deva[रम्] absolutely. This rule relaxes that requirement when there is no object — if the ceasing is self-contained, either set of endings may be used.
"""

standard = """
After @deva[उप] + @deva[रम्] used intransitively (@deva[अकर्मक]), @deva[परस्मैपद] is optional — @deva[विभाषा].

**Both valid:**
- @deva[उपरमति] "he ceases" (@deva[परस्मैपद])
- @deva[उपरमते] "he ceases" (@deva[आत्मनेपद])

**Transitive — @ref[1.3.84] applies mandatorily:**
- @deva[देवदत्तम् उपरमति] "he causes Devadatta to desist" (@deva[परस्मैपद] only)

**Rule type — @deva[विभाषा] modifying @ref[1.3.84]:** @ref[1.3.84] mandates @deva[परस्मैपद] for @deva[उप] + @deva[रम्]. This rule introduces optionality for the intransitive case. In the @deva[परस्मैपद] option, @ref[1.3.84] applies; in the @deva[आत्मनेपद] option, the root's natural @deva[आत्मनेपद] from @ref[1.3.12] reasserts.

**Scope:** Only intransitive @deva[उप] + @deva[रम्]. The three prefixes in @ref[1.3.83] (@deva[वि], @deva[आ], @deva[परि]) remain mandatory @deva[परस्मैपद] — this optionality does not extend to them.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[परस्मैपदम्] from @ref[1.3.78]; @deva[उप] and @deva[रम्] from @ref[1.3.84].

@deva[अकर्मकाच्च] — also when @deva[उप] + @deva[रम्] is intransitive, @deva[विभाषा].

**Modification of @ref[1.3.84]:** @ref[1.3.84] mandates @deva[परस्मैपद] for all uses of @deva[उप] + @deva[रम्]. This rule carves out an exception: when the verb is @deva[अकर्मक] (intransitive), the @deva[पद] assignment becomes optional.

**Option analysis:**
- @deva[परस्मैपद] option: @ref[1.3.84] applies
- @deva[आत्मनेपद] option: @ref[1.3.12] reasserts (since @deva[रम्] is @deva[अनुदात्तेत्])

**Why intransitive specifically?** Transitive @deva[उपरमति] carries causative force ("he causes X to desist") — the action is outward-directed, favoring @deva[परस्मैपद]. Intransitive @deva[उपरमति]/@deva[उपरमते] "he ceases" is self-directed — the agent stops himself — making @deva[आत्मनेपद] equally natural.

**@deva[रम्] series complete (@ref[1.3.83]–@ref[1.3.85]):**
- @ref[1.3.83]: @deva[वि]/@deva[आ]/@deva[परि] → mandatory @deva[परस्मैपद]
- @ref[1.3.84]: @deva[उप] → mandatory @deva[परस्मैपद]
- @ref[1.3.85] (this): @deva[उप] + intransitive → @deva[विभाषा]

**End of @deva[लौकिक] overrides:** @ref[1.3.79]–@ref[1.3.85] complete the @deva[परस्मैपद] override section for classical Sanskrit. @ref[1.3.86] onward deals with @deva[वैदिक] (Vedic) optionalities.
"""

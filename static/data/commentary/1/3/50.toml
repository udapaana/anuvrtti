id = "1.3.50"
numericId = "13050"

[en]
simple = """
The verb @deva[वद्] "to speak" optionally takes @deva[आत्मनेपद] when meaning "to contradict each other."

**Both are correct:**
- @deva[विप्रवदन्ते वैद्याः] "the doctors disagree" (@deva[आत्मनेपद])
- @deva[विप्रवदन्ति वैद्याः] "the doctors disagree" (@deva[परस्मैपद])

The speakers must be capable of articulate speech and must be contradicting simultaneously (not in sequence). Birds quarreling take only @deva[परस्मैपद]: @deva[विप्रवदन्ति शकुनयः] "the birds quarrel."
"""

standard = """
After @deva[वद्] meaning "mutual contradiction," @deva[आत्मनेपद] is optional.

**Both valid:**
- @deva[विप्रवदन्ते वैद्याः] / @deva[विप्रवदन्ति वैद्याः] "the doctors disagree"

**@deva[परस्मैपद] only — conditions not met:**
- @deva[विप्रवदन्ति शकुनयः] "the birds quarrel" (not @deva[व्यक्तवाच्])
- @deva[क्रमेण वैद्यो वैद्येन सह विप्रवदन्ति] "doctors argue in turn" (not @deva[समुच्चारण])

**Conditions from @ref[1.3.48] apply:** @deva[व्यक्तवाच्] (articulate speech) and @deva[समुच्चारण] (simultaneous speaking) must both hold for the option to be available. Without them, only @deva[परस्मैपद].

**Optionality:** Unlike @ref[1.3.48] (obligatory for chorus) and @ref[1.3.49] (obligatory for echoing), contradiction gives a genuine choice between @deva[आत्मनेपद] and @deva[परस्मैपद].

**@deva[वद्]-series complete:** @ref[1.3.47] (six senses), @ref[1.3.48] (chorus), @ref[1.3.49] (echoing), @ref[1.3.50] (this: contradiction, optional).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[व्यक्तवाचाम्] and @deva[समुच्चारणे] from @ref[1.3.48].

@deva[विप्रतिषेधे] — when @deva[वद्] means mutual contradiction, @deva[आत्मनेपद] is optional.

**@deva[विप्रतिषेध] = mutual opposition:** Two or more parties contradicting each other simultaneously. This is a specific discourse pattern distinct from @ref[1.3.48]'s group speech and @ref[1.3.49]'s echoing.

**Why optional?** @ref[1.3.48] makes chorus-speaking obligatorily @deva[आत्मनेपद]; @ref[1.3.49] makes echoing obligatory. Contradiction, however, involves opposition rather than harmony — the self-directed quality is less clear, so the grammar allows both @deva[पद]s.

**@deva[व्यक्तवाच्] and @deva[समुच्चारण] as @deva[अनुवृत्ति]:** Both conditions from @ref[1.3.48] carry forward. Without articulate speakers contradicting simultaneously, the option is unavailable and only @deva[परस्मैपद] applies.

**@deva[वद्]-series summary (@ref[1.3.47]–@ref[1.3.50]):**
- @ref[1.3.47]: six meaning-based overrides → obligatory @deva[आत्मनेपद]
- @ref[1.3.48]: @deva[व्यक्तवाच्] + @deva[समुच्चारण] → obligatory
- @ref[1.3.49]: @deva[अनु] + intransitive echoing → obligatory
- @ref[1.3.50] (this): contradiction → optional

**Transition:** @ref[1.3.51] begins a new section with @deva[मे]/@deva[ह्रा].
"""

id = "1.3.32"
numericId = "13032"

[en]
simple = """
The verb @deva[कृ] "to do" takes @deva[आत्मनेपद] when used in seven special senses — even when the action benefits someone else:

1. **Divulging maliciously** (@deva[गन्धन]): @deva[उत्कुरुते] "he informs against someone"
2. **Reviling** (@deva[अवक्षेपण]): @deva[अपकुरुते] "he reviles"
3. **Serving** (@deva[सेवन]): @deva[गणिकाम् अनुकुरुते] "he serves the courtesan"
4. **Using violence** (@deva[साहसिक्य]): @deva[परदारान् प्रकुरुते] "he outrages another's wife"
5. **Causing change** (@deva[प्रतियत्न]): @deva[एधोदकस्य उपस्कुरुते] "the fuel heats the water"
6. **Reciting** (@deva[प्रकथन]): @deva[गाथाः प्रकुरुते] "he recites stories"
7. **Working toward a goal** (@deva[उपयोग]): @deva[शतं प्रकुरुते] "he devotes a hundred to merit"

In ordinary senses, @deva[कृ] takes @deva[परस्मैपद]: @deva[कटं करोति] "he makes a mat."
"""

standard = """
After @deva[कृ] in the senses of @deva[गन्धन] (malicious divulging), @deva[अवक्षेपण] (reviling), @deva[सेवन] (serving), @deva[साहसिक्य] (violence), @deva[प्रतियत्न] (causing change), @deva[प्रकथन] (reciting), or @deva[उपयोग] (purposeful action), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**Examples:**
- @deva[उत्कुरुते] "he informs against" (@deva[गन्धन])
- @deva[गणिकाम् अनुकुरुते] "he serves the courtesan" (@deva[सेवन])
- @deva[एधोदकस्य उपस्कुरुते] "the fuel heats the water" (@deva[प्रतियत्न])
- @deva[गाथाः प्रकुरुते] "he recites stories" (@deva[प्रकथन])

**@deva[परस्मैपद] (ordinary doing):**
- @deva[कटं करोति] "he makes a mat"

**@deva[प्रतियत्न] with @deva[उप]:** @deva[सुट्] is inserted by @ref[6.1.139], giving @deva[उपस्कुरुते]. The object takes @deva[षष्ठी] (genitive) by @ref[2.3.53]: @deva[एधोदकस्य].

**@deva[कृ]-series begins:** @deva[कृ] is understood as @deva[अनुवृत्ति] in the next three rules (@ref[1.3.33]–@ref[1.3.35]), each adding further conditions for @deva[आत्मनेपद].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[गन्धनावक्षेपणसेवनसाहसिक्यप्रतियत्नप्रकथनोपयोगेषु कृञः] — after @deva[कृ] in these seven meanings, @deva[आत्मनेपद].

**Seven specialized senses:** Each represents a conventionalized use of @deva[कृ] where the action's nature inherently involves the agent:
- @deva[गन्धन]: malicious exposure — the agent is personally engaged in the act of informing
- @deva[सेवन]: service — the servant's identity is defined by the action
- @deva[प्रतियत्न]: imparting a new quality — the agent causes transformation (not mere making)
- @deva[उपयोग]: purposeful devotion — the agent directs resources toward a goal

**@deva[प्रतियत्न] mechanics:** With @deva[उप], @deva[सुट्]-@deva[आगम] applies by @ref[6.1.139]: @deva[उप + स् + कुरुते] → @deva[उपस्कुरुते]. The object takes @deva[षष्ठी] by @ref[2.3.53] because the @deva[कर्मन्] is simultaneously the locus of transformation.

**@deva[कृ]-series (@ref[1.3.32]–@ref[1.3.35]):** @deva[पाणिनि] devotes four rules to @deva[कृ]:
- @ref[1.3.32] (this): seven meaning-specific overrides
- @ref[1.3.33]: @deva[अधि] + @deva[कृ] "to overcome"
- @ref[1.3.34]: @deva[वि] + @deva[कृ] with sound as object
- @ref[1.3.35]: @deva[वि] + @deva[कृ] intransitively
@deva[कृ] carries forward as @deva[अनुवृत्ति] through all four.

**Default:** @deva[कृ] is @deva[तनादिगण] with @deva[ञ्]-marker (@deva[डुकृञ्]), making it @deva[उभयपदिन्] by @ref[1.3.72]. These rules override the @deva[स्वार्थ] condition — @deva[आत्मनेपद] applies even when the agent does not benefit.
"""

id = "1.3.74"
numericId = "13074"

[en]
simple = """
Causative verbs (formed with @deva[णिच्]) take @deva[आत्मनेपद] when the fruit of the action accrues to the agent (the person causing the action).

**@deva[आत्मनेपद] (causer benefits):**
- @deva[कटं कारयते] "he has a mat made for himself"
- @deva[ओदनं पाचयते] "he has rice cooked for himself"

**@deva[परस्मैपद] (causer acts for another):**
- @deva[कटं कारयति परस्य] "he has another's mat made"
- @deva[ओदनं पाचयति] "he has rice cooked for another"

This is the general rule for causatives — when the causer benefits, @deva[आत्मनेपद]; when another benefits, @deva[परस्मैपद].
"""

standard = """
After @deva[णिच्] (causative), @deva[आत्मनेपद] when the @deva[क्रियाफल] accrues to the @deva[कर्ता] (causer).

**Causer benefits — @deva[आत्मनेपद]:**
- @deva[कटं कारयते] "he has a mat made for himself"
- @deva[ओदनं पाचयते] "he has rice cooked for himself"

**Causer acts for another — @deva[परस्मैपद]:**
- @deva[कटं कारयति परस्य] "he has a mat made for another"

**Relation to @ref[1.3.72]:** @deva[णिच्] is @deva[स्वरितेत्] (svarita-marked), so causatives are already covered by @ref[1.3.72]. This rule appears to be restating the same principle — commentators explain it as either emphasizing the causative case or as covering situations where @ref[1.3.72] might not clearly apply.

**Relation to @ref[1.3.67]:** @ref[1.3.67] covered causatives where the original object becomes the causal agent (fruit not accruing to causer). This rule (@ref[1.3.74]) covers the opposite — the causer himself benefits. Together they address both directions of the causative @deva[पद] split.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[कर्त्रभिप्राये क्रियाफले] from @ref[1.3.72].

@deva[णेरणिच्] — after @deva[णिच्], @deva[आत्मनेपद] when the fruit accrues to the agent.

**Apparently redundant with @ref[1.3.72]:** Since @deva[णिच्] is @deva[स्वरितेत्], @ref[1.3.72] already governs its @deva[पद] assignment. Why a separate rule?

**Commentarial explanations:**
- @deva[काशिका]: The rule ensures that @deva[णिच्]-derived roots follow @deva[स्वार्थ] independently of the primitive root's @deva[पद] classification. Even if the primitive is @deva[आत्मनेपदिन्] by @ref[1.3.12], the causative gets @deva[उभयपदिन्] treatment.
- @deva[सिद्धान्तकौमुदी]: The rule prevents misapplication — without it, one might extend @ref[1.3.12]'s unconditional @deva[आत्मनेपद] to causatives of @deva[अनुदात्तेत्]/@deva[ङित्] roots.

**Interaction with @ref[1.3.67]:** @ref[1.3.67] and @ref[1.3.74] divide causative @deva[पद] assignment:
- @ref[1.3.67]: object-becomes-agent, fruit not to causer → @deva[आत्मनेपद]
- @ref[1.3.74] (this): fruit accrues to causer → @deva[आत्मनेपद]
- Neither condition: @deva[परस्मैपद]

**@deva[स्वार्थ] block position:** Third in the @deva[कर्त्रभिप्राय] series (@ref[1.3.72]–@ref[1.3.77]).
"""

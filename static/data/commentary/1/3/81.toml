id = "1.3.81"
numericId = "13081"

[en]
simple = """
The verb @deva[वह्] "to carry" takes @deva[परस्मैपद] (active endings) when preceded by @deva[प्र] "forth" — even when the fruit of the action accrues to the agent.

**@deva[परस्मैपद] (always with @deva[प्र]):**
- @deva[प्रवहति] "it flows, he carries forth"
- @deva[नदी प्रवहति] "the river flows"

**@deva[आत्मनेपद] (other prefixes, agent benefits):**
- @deva[आवहते] "he brings (toward himself)"
- @deva[उद्वहते] "he marries (takes up for himself)"

@deva[वह्] normally allows both sets of endings depending on who benefits from the action. But when @deva[प्र] is prefixed — directing the carrying outward — @deva[परस्मैपद] is mandatory.
"""

standard = """
After @deva[प्र] + @deva[वह्], @deva[परस्मैपद] — even when the fruit accrues to the agent.

**Always @deva[परस्मैपद]:**
- @deva[प्रवहति] "it flows / he carries forth"
- @deva[नदी प्रवहति] "the river flows"

**Other prefixes — @ref[1.3.72] applies:**
- @deva[आवहते] "he brings" (agent benefits → @deva[आत्मनेपद])
- @deva[उद्वहते] "he marries" (agent benefits → @deva[आत्मनेपद])

**Rule type — @deva[अपवाद]:** @deva[वह्] is @deva[स्वरितेत्], making it @deva[उभयपदिन्] by @ref[1.3.72]. This rule forcibly assigns @deva[परस्मैपद] for the prefix @deva[प्र], overriding the @deva[स्वार्थ] condition.

**Semantic motivation:** @deva[प्र] "forth" directs the carrying outward — flowing, conveying forward. The result moves away from the agent, making @deva[परस्मैपद] natural.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[परस्मैपदम्] from @ref[1.3.78].

@deva[प्रावहः] — after @deva[प्र] + @deva[वह्], @deva[परस्मैपद].

**Override of @ref[1.3.72]:** @deva[वह्] is @deva[स्वरितेत्], so @ref[1.3.72] makes it @deva[उभयपदिन्] with the @deva[स्वार्थ] condition. @deva[प्र] strips the @deva[आत्मनेपद] option entirely.

**Semantic motivation:** @deva[प्र] denotes forward motion — carrying forth, flowing. The action's result moves away from the agent, aligning with @deva[परस्मैपद].

**@deva[परस्मैपद] override section:** Third in the series. @ref[1.3.79] (@deva[अनु]/@deva[परा] + @deva[कृ]), @ref[1.3.80] (@deva[अभि]/@deva[प्रति]/@deva[अति] + @deva[क्षिप्]), @ref[1.3.81] (this: @deva[प्र] + @deva[वह्]), @ref[1.3.82] (@deva[परि] + @deva[मृष्]).

**@deva[वार्त्तिक]:** @deva[परिवहति] is also attested — some authorities extend this override to @deva[परि] + @deva[वह्] as well.
"""

id = "1.3.33"
numericId = "13033"

[en]
simple = """
The verb @deva[कृ] "to do" takes @deva[आत्मनेपद] when preceded by @deva[अधि] and meaning "to overcome, to not be defeated."

**@deva[आत्मनेपद] (overcoming):**
- @deva[तम् अधिचक्रे] "he overcame him"
- @deva[अधिकुरुते शत्रून्] "he overcomes enemies"

**@deva[परस्मैपद] (other senses of @deva[अधि] + @deva[कृ]):**
- @deva[अर्थम् अधिकरोति] "he learns the meaning"

Only the "overcoming" sense triggers @deva[आत्मनेपद].
"""

standard = """
After @deva[अधि] + @deva[कृ] meaning @deva[प्रसहन] (overcoming, not being defeated), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**Overcoming — @deva[आत्मनेपद]:**
- @deva[तम् अधिचक्रे] "he overcame him" (@deva[लिट्])
- @deva[अधिकुरुते शत्रून्] "he overcomes enemies"

**Other senses — @deva[परस्मैपद]:**
- @deva[अर्थम् अधिकरोति] "he learns/masters the meaning"

**Why a separate rule?** @deva[अधि] + @deva[कृ] has multiple meanings: "to overcome" and "to master/learn." The @deva[प्रसहन] sense specifically involves dominating or prevailing over an opponent — only this triggers @deva[आत्मनेपद].

**@deva[कृ] as @deva[अनुवृत्ति]:** @deva[कृ] carries forward from @ref[1.3.32] and continues through @ref[1.3.34]–@ref[1.3.35].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[कृञः] from @ref[1.3.32].

@deva[अधिकरणे प्रसहनम्] — after @deva[अधि] + @deva[कृ] in the sense of @deva[प्रसहन] (prevailing over), @deva[आत्मनेपद].

**Why not fold into @ref[1.3.32]?** @ref[1.3.32] lists seven meanings without prefix specification. Here, @deva[अधि] as a prefix gives @deva[कृ] a distinctive meaning (@deva[प्रसहन]) that does not fall under any of the seven. A separate rule is needed to assign @deva[आत्मनेपद] to this prefix + meaning combination.

**@deva[प्रसहन] vs. @deva[अधिकरण]:** @deva[अधि] + @deva[कृ] can mean "to overcome" (@deva[प्रसहन]) or "to master/study" (mere @deva[अधिकरण] in the sense of application). Only @deva[प्रसहन] — dominating, prevailing, not being defeated — qualifies.

**@deva[कृ]-series position:** Second of four @deva[कृ] rules. @ref[1.3.32] (seven meanings), @ref[1.3.33] (this: @deva[अधि] + overcome), @ref[1.3.34] (@deva[वि] + sound-object), @ref[1.3.35] (@deva[वि] + intransitive).
"""

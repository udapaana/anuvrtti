id = "1.3.56"
numericId = "13056"

[en]
simple = """
The verb @deva[यम्] "to restrain / to give" takes @deva[आत्मनेपद] when preceded by @deva[उप] and meaning "to espouse" — to accept someone as one's own.

**@deva[आत्मनेपद] (marrying):**
- @deva[भार्याम् उपयच्छते] "he marries his wife"

**@deva[परस्मैपद] (not making one's own):**
- @deva[देवदत्तो यज्ञदत्तस्य भार्याम् उपयच्छति] "Devadatta has illicit relations with @[yajñadatta]'s wife"

The key distinction is @deva[स्वकरण] — "making one's own." When the agent legitimately takes someone as his own (marriage), @deva[आत्मनेपद] applies. When the relationship is illicit, @deva[परस्मैपद].
"""

standard = """
After @deva[उप] + @deva[यम्] meaning @deva[स्वकरण] (making one's own, espousing), @deva[आत्मनेपद].

**Espousing — @deva[आत्मनेपद]:**
- @deva[भार्याम् उपयच्छते] "he marries his wife"

**Not @deva[स्वकरण] — @deva[परस्मैपद]:**
- @deva[देवदत्तो यज्ञदत्तस्य भार्याम् उपयच्छति] "Devadatta has illicit relations with @[yajñadatta]'s wife"

**@deva[स्वकरण] defined:** Making one's own what was not previously one's own — specifically, legitimate marriage. The @deva[महाभाष्य] clarifies: the woman must not already belong to another.

**@deva[यम्] is @deva[परस्मैपदिन्]:** By @ref[1.3.78], @deva[यम्] defaults to @deva[परस्मैपद]. This rule creates a meaning-specific override for the marriage context with @deva[उप].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[उपयमने स्वकरणे] — after @deva[उप] + @deva[यम्] meaning @deva[स्वकरण] (making one's own), @deva[आत्मनेपद].

**@deva[स्वकरण] in @deva[महाभाष्य]:** @deva[पतञ्जलि] defines @deva[स्वकरण] as "making one's own what was not previously one's own" — specifically legitimate marriage. The condition excludes illicit relations, where the woman belongs to another.

**Semantic motivation:** Marriage is the paradigmatic self-directed action — the agent takes someone for himself. The @deva[आत्मनेपद] directly reflects this "for oneself" quality. Illicit conduct, by contrast, does not establish genuine ownership.

**Standalone rule:** @deva[यम्] appeared earlier with @deva[आ] in @ref[1.3.28] (intransitive condition from the @deva[अकर्मक] block). Here @deva[उप] + @deva[यम्] receives its own rule based on a completely different meaning condition — showing that the same root can be treated by multiple independent rules.

**Transition:** @ref[1.3.57] shifts to desiderative formations, opening a new subsection.
"""

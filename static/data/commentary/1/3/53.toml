id = "1.3.53"
numericId = "13053"

[en]
simple = """
The verb @deva[चर्] "to move, to walk" takes @deva[आत्मनेपद] when preceded by @deva[उद्] and used without an object — meaning "to stray" or "to transgress."

**@deva[आत्मनेपद] (intransitive — straying):**
- @deva[गेहम् उच्चरते] "he strays from home"
- @deva[गुरुवचनम् उच्चरते] "he transgresses his guru's words"

**@deva[परस्मैपद] (transitive):**
- @deva[बाष्पम् उच्चरति] "the vapor rises"

In the examples above, @deva[गेहम्] and @deva[गुरुवचनम्] are not direct objects but indicate what is transgressed — the verb is intransitive in sense.
"""

standard = """
After @deva[उद्] + @deva[चर्] used intransitively, @deva[आत्मनेपद].

**Intransitive (straying/transgressing) — @deva[आत्मनेपद]:**
- @deva[गेहम् उच्चरते] "he strays from home"
- @deva[गुरुवचनम् उच्चरते] "he transgresses his guru's commands"

**Transitive — @deva[परस्मैपद]:**
- @deva[बाष्पम् उच्चरति] "the vapor rises" (vapor = object)

**@deva[अकर्मक] condition:** The accusatives @deva[गेहम्] and @deva[गुरुवचनम्] are not true objects but express the scope of transgression — the verb remains intransitive. When @deva[उद्] + @deva[चर्] takes a genuine object (something being moved), @deva[परस्मैपद] applies.

**@deva[चर्]-series begins:** @ref[1.3.53] (this) and @ref[1.3.54] form a two-rule block for @deva[चर्] with different prefix + condition combinations.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[उदश्चराकर्मकात्] — after @deva[उद्] + @deva[चर्] used intransitively, @deva[आत्मनेपद].

**Apparent objects:** @deva[गेहम् उच्चरते] — @deva[गेहम्] appears to be an accusative object but actually functions as the limit of transgression (comparable to @deva[अधिकरण]). The verb describes the agent's behavior (straying, transgressing), not an action performed on the house. Hence @deva[अकर्मक].

**Contrast with transitive @deva[उच्चरति]:** When @deva[उद्] + @deva[चर्] means "to emit, to send up" — e.g., @deva[बाष्पम् उच्चरति] "the vapor rises/is emitted" — the accusative is a genuine @deva[कर्मन्], and @deva[परस्मैपद] applies.

**Semantic pattern:** Intransitive @deva[उच्चर्] denotes personal deviation or transgression — the action's consequence falls on the agent himself — motivating @deva[आत्मनेपद]. Transitive @deva[उच्चर्] directs the action outward.

**@deva[चर्]-series:** @ref[1.3.53] (this: @deva[उद्] + intransitive) and @ref[1.3.54] (@deva[सम्] + instrumental).
"""

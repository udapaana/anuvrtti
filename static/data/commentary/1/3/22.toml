id = "1.3.22"
numericId = "13022"

[en]
simple = """
The verb @deva[स्था] "to stand" takes @deva[आत्मनेपद] when preceded by @deva[सम्], @deva[अव], @deva[प्र], or @deva[वि].

**Examples:**
- @deva[संतिष्ठते] "he stays, abides"
- @deva[अवतिष्ठते] "he waits patiently"
- @deva[प्रतिष्ठते] "he sets forth, is established"
- @deva[वितिष्ठते] "he perseveres, stands apart"

Without these prefixes, @deva[स्था] takes @deva[परस्मैपद]: @deva[तिष्ठति] "he stands."
"""

standard = """
After @deva[सम्]/@deva[अव]/@deva[प्र]/@deva[वि] + @deva[स्था] "to stand," @deva[आत्मनेपद].

**Examples:**
- @deva[संतिष्ठते] "he abides"
- @deva[अवतिष्ठते] "he waits"
- @deva[प्रतिष्ठते] "he is established"
- @deva[वितिष्ठते] "he perseveres"

**@deva[वार्त्तिक] — @deva[आ] + @deva[स्था] "solemn declaration":** @deva[आस्थास्ये] "I shall solemnly resort to" — @deva[आत्मनेपद] when expressing determination or solemn resolve.

**Beginning the @deva[स्था]-series:** @ref[1.3.22]–@ref[1.3.25] form a group of rules for @deva[स्था] with various prefixes and meanings. @deva[स्था] is one of the most versatile roots, changing meaning dramatically with different prefixes.

**Default:** @deva[स्था] without a qualifying prefix is @deva[परस्मैपदिन्]: @deva[तिष्ठति].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[समवप्रविभ्यः स्थः] — after @deva[सम्]/@deva[अव]/@deva[प्र]/@deva[वि] + @deva[स्था], @deva[आत्मनेपद].

**@deva[स्था]-series (@ref[1.3.22]–@ref[1.3.25]):** @deva[पाणिनि] devotes four rules to @deva[स्था] because this root combines with prefixes to produce a wide range of meanings, each with its own @deva[पद] assignment:
- @ref[1.3.22] (this): @deva[सम्]/@deva[अव]/@deva[प्र]/@deva[वि] → @deva[आत्मनेपद] (always)
- @ref[1.3.23]: prefixless @deva[स्था] in @deva[प्रकाशन]/@deva[स्थेयाख्य] sense → @deva[आत्मनेपद]
- @ref[1.3.24]: @deva[उद्] + @deva[स्था] (not "rising") → @deva[आत्मनेपद]
- @ref[1.3.25]: @deva[उप] + @deva[स्था] "worship" → @deva[आत्मनेपद]

**@deva[वार्त्तिक] — @deva[आस्था]:** @deva[आ] + @deva[स्था] in the sense of solemn declaration takes @deva[आत्मनेपद]: @deva[जलं विषं वा तव कारणादास्थास्ये] "for your sake I shall resort to water or poison."

**Semantic motivation:** Each of these prefixed forms denotes an action whose result primarily concerns the agent: "abiding" (@deva[सम्]), "waiting" (@deva[अव]), "being established" (@deva[प्र]), "persevering" (@deva[वि]). The self-directed nature motivates @deva[आत्मनेपद].
"""

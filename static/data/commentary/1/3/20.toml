id = "1.3.20"
numericId = "13020"

[en]
simple = """
The verb @deva[दा] "to give" takes @deva[आत्मनेपद] when preceded by @deva[आ] — except when it means "to open the mouth."

**@deva[आत्मनेपद] (receiving, acquiring):**
- @deva[विद्यामादत्ते] "he acquires knowledge"

**@deva[परस्मैपद] (opening the mouth):**
- @deva[आस्यं व्याददाति] "he opens his mouth"
- @deva[विपादिकां व्याददाति] "he opens the tumor" (metaphorical opening)
- @deva[कूलं व्याददाति नदी] "the river breaks the bank"

The meaning "to open" (@deva[व्यादान]) reverses the benefit direction — the action goes outward rather than toward the agent.
"""

standard = """
After @deva[आङ्] + @deva[दा] "to give," @deva[आत्मनेपद] — except when meaning "to open the mouth" (@deva[व्यादान]).

**@deva[आत्मनेपद]:**
- @deva[विद्यामादत्ते] "he acquires knowledge"
- @deva[आददते गां सोमक्रयणीम्] "he takes the cow for buying soma"

**@deva[परस्मैपद] — @deva[व्यादान] (opening):**
- @deva[आस्यं व्याददाति] "he opens his mouth"
- @deva[विपादिकां व्याददाति] "he opens the tumor"
- @deva[कूलं व्याददाति नदी] "the river breaks the bank"

**@deva[वार्त्तिक] — own body vs. another's:** When opening another's body part: @deva[व्याददते पिपीलिकाः पतङ्गस्य मुखम्] "ants open the locust's mouth" — @deva[आत्मनेपद], because the action is directed at another (not one's own mouth).

**@deva[दा] root:** @deva[डुदाञ्] is @deva[उभयपदिन्] (@deva[ञित्] by @ref[1.3.72]). @deva[आ] + @deva[दा] shifts meaning from "give" to "take/receive" — the fruit now accrues to the agent, motivating obligatory @deva[आत्मनेपद].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[आङो दोऽनास्यविहरणे] — after @deva[आङ्] + @deva[दा], @deva[आत्मनेपद] — except in @deva[आस्यविहरण] (opening the mouth).

**Semantic split:** @deva[आ] + @deva[दा] has two distinct meanings:
1. "To take, receive, acquire" (@deva[आदान]) → @deva[आत्मनेपद]
2. "To open (the mouth)" (@deva[व्यादान]) → @deva[परस्मैपद]

The rule assigns @deva[आत्मनेपद] only to meaning (1). Meaning (2) reverts to the default.

**@deva[आस्यविहरण] scope:** The @deva[वार्त्तिक]s expand "opening the mouth" to include metaphorical opening: tumors, riverbanks, etc. — any action of splitting or parting. But when the opening is done to another being's body (@deva[व्याददते पिपीलिकाः पतङ्गस्य मुखम्]), @deva[आत्मनेपद] returns.

**Why the exception?** @deva[व्यादान] (opening) is an outward-directed action — the agent spreads something apart for display or access. The fruit does not return to the agent. @deva[आदान] (taking) is inward-directed — the agent acquires something. This self-benefiting nature aligns with the @deva[आत्मनेपद] principle.

**Relation to @ref[1.3.72]:** @deva[डुदाञ्] is @deva[ञित्] → @deva[उभयपदिन्]. @deva[आ] + @deva[दा] makes @deva[आत्मनेपद] obligatory (not optional), overriding the @deva[स्वार्थ] condition — except for @deva[व्यादान], where the override does not apply.
"""

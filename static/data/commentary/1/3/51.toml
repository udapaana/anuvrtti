id = "1.3.51"
numericId = "13051"

[en]
simple = """
The verb @deva[गॄ] "to swallow" takes @deva[आत्मनेपद] when preceded by @deva[अव].

**@deva[आत्मनेपद]:**
- @deva[अवगिरते] "he swallows"

**@deva[परस्मैपद] (without @deva[अव]):**
- @deva[गिरति] "he swallows"

This is @deva[गॄ] of the @deva[तुदादि] class (meaning "to swallow"), not @deva[गॄ] of the @deva[क्र्यादि] class (meaning "to make sound"), which does not combine with @deva[अव].
"""

standard = """
After @deva[अव] + @deva[गॄ] "to swallow" (@deva[तुदादिगण]), @deva[आत्मनेपद].

**@deva[आत्मनेपद]:**
- @deva[अवगिरते] "he swallows"

**@deva[परस्मैपद] (without prefix):**
- @deva[गिरति] "he swallows" (by @ref[1.3.78])

**Which @deva[गॄ]?** @deva[गॄ] "to swallow" belongs to @deva[तुदादिगण] (6th class). @deva[गॄ] "to make sound" belongs to @deva[क्र्यादिगण] (9th class) and does not take @deva[अव] as prefix. No ambiguity arises in practice.

**Prefix-only override:** @deva[गॄ] is @deva[परस्मैपदिन्] by default. The prefix @deva[अव] alone triggers @deva[आत्मनेपद] — no additional meaning condition is required (unlike many preceding rules).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[अवगिरः] — after @deva[अव] + @deva[गॄ], @deva[आत्मनेपद].

**Unconditional prefix override:** Unlike @ref[1.3.44]–@ref[1.3.50] which require specific meanings, this rule triggers purely on the prefix @deva[अव] — no meaning condition, no transitivity condition. This returns to the simpler pattern of @ref[1.3.17]–@ref[1.3.22].

**@deva[गॄ] identification:** @deva[गॄ] (@deva[गॄ निगरणे], @deva[तुदादि]) means "to swallow." @deva[गॄ] (@deva[गॄ शब्दे], @deva[क्र्यादि]) means "to make sound." The @deva[तुदादि] root combines with @deva[अव] in the sense of swallowing down; the @deva[क्र्यादि] root does not.

**Semantic motivation:** @deva[अवगिरते] — "swallowing down" is an inherently self-directed action: the agent takes something into himself. This self-containment motivates @deva[आत्मनेपद].

**Transition:** @ref[1.3.52] continues with @deva[गॄ] under @deva[सम्] prefix in the "promise" meaning.
"""

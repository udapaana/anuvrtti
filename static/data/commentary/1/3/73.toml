id = "1.3.73"
numericId = "13073"

[en]
simple = """
The verb @deva[वद्] "to speak" takes @deva[आत्मनेपद] when preceded by @deva[अप] and the fruit of the action accrues to the agent.

**@deva[आत्मनेपद] (agent benefits):**
- @deva[धनकामो न्यायम् अपवदते] "the wealth-seeker forsakes justice" — he abandons justice for his own gain

**@deva[परस्मैपद] (agent does not benefit):**
- @deva[अपवदति] "he speaks ill of (for another's benefit)"

Since @deva[वद्] is ordinarily @deva[परस्मैपदिन्] (by @ref[1.3.78]), this rule treats @deva[अप] + @deva[वद्] as @deva[उभयपदिन्] with the @deva[स्वार्थ] condition.
"""

standard = """
After @deva[अप] + @deva[वद्], @deva[आत्मनेपद] when the @deva[क्रियाफल] accrues to the @deva[कर्ता].

**Agent benefits — @deva[आत्मनेपद]:**
- @deva[धनकामो न्यायम् अपवदते] "the wealth-seeker forsakes justice (for his own gain)"

**Agent does not benefit — @deva[परस्मैपद]:**
- @deva[अपवदति]

**Why needed?** @deva[वद्] is @deva[परस्मैपदिन्] by default (@ref[1.3.78]). @ref[1.3.47] already gave @deva[आत्मनेपद] for @deva[वद्] in six special senses, but "forsaking/abandoning" with @deva[अप] is not among them. This rule adds @deva[अप] + @deva[वद्] as @deva[उभयपदिन्] — @deva[आत्मनेपद] when the agent benefits.

**Relation to @ref[1.3.72]:** This rule parallels @ref[1.3.72] in structure — it conditions @deva[आत्मनेपद] on the agent benefiting. But while @ref[1.3.72] applies to @deva[स्वरितेत्]/@deva[ञित्] roots generally, this rule specifically makes @deva[अप] + @deva[वद्] behave like an @deva[उभयपदिन्].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[कर्त्रभिप्राये क्रियाफले] from @ref[1.3.72].

@deva[अपवदस्य] — after @deva[अप] + @deva[वद्], @deva[आत्मनेपद] when the fruit accrues to the agent.

**Converting @deva[परस्मैपदिन्] to @deva[उभयपदिन्]:** @deva[वद्] is @deva[परस्मैपदिन्] by @ref[1.3.78]. This rule elevates @deva[अप] + @deva[वद्] to @deva[उभयपदिन्] status — it can take either @deva[पद] depending on who benefits. This is different from @ref[1.3.47], which gave obligatory @deva[आत्मनेपद] regardless of benefit.

**@deva[कर्त्रभिप्राये] continues:** The agent-benefit condition (@deva[कर्त्रभिप्राये क्रियाफले]) from @ref[1.3.72] carries forward as @deva[अनुवृत्ति], governing this and subsequent rules.

**Position:** This rule sits between @ref[1.3.72] (general @deva[उभयपदिन्] rule) and @ref[1.3.74] (causative @deva[स्वार्थ] rule), all sharing the @deva[कर्त्रभिप्राय] condition. Together @ref[1.3.72]–@ref[1.3.77] form the @deva[स्वार्थ]-conditioned block.
"""

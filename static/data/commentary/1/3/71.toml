id = "1.3.71"
numericId = "13071"

[en]
simple = """
The causative of @deva[कृ] "to do" takes @deva[आत्मनेपद] when @deva[मिथ्या] "incorrectly" is the accompanying word (@deva[उपपद]) and the action is habitual — repeated wrong pronunciation or performance.

**@deva[आत्मनेपद] (habitual wrong action):**
- @deva[पदं मिथ्या कारयते] "he habitually pronounces the word wrongly"

**@deva[परस्मैपद] — conditions not met:**
- @deva[पदं सुष्ठु कारयति] "he pronounces the word correctly" (not @deva[मिथ्या])
- @deva[पदं मिथ्या वाचयति] "he recites the word wrongly" (not @deva[कृ])
- @deva[पदं मिथ्या कारयति] "he pronounces wrongly once" (not habitual)

All three conditions must be met: (1) @deva[मिथ्या] as @deva[उपपद], (2) causative of @deva[कृ] specifically, (3) habitual sense (@deva[अभ्यास]).
"""

standard = """
After causative of @deva[कृ] with @deva[मिथ्या] as @deva[उपपद] meaning @deva[अभ्यास] (habitual wrong action), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**@deva[आत्मनेपद]:**
- @deva[पदं मिथ्या कारयते] "he habitually mispronounces the word"

**@deva[परस्मैपद] — any condition fails:**
- Different @deva[उपपद]: @deva[सुष्ठु कारयति]
- Different verb: @deva[मिथ्या वाचयति]
- Single occurrence (not habitual): @deva[मिथ्या कारयति]

**Three conditions:**
1. @deva[मिथ्या] must be the @deva[उपपद] (accompanying word modifying the verb)
2. The verb must be causative @deva[कृ] (@deva[कारयते])
3. The action must be habitual (@deva[अभ्यास]) — repeated wrong performance

**Position:** Last of the specific @deva[आत्मनेपद] rules before the general rules at @ref[1.3.72].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[मिथ्योपपदात् कृञोऽभ्यासे] — after causative of @deva[कृ] with @deva[मिथ्या] as @deva[उपपद] in the @deva[अभ्यास] sense, @deva[आत्मनेपद].

**Triple condition — most restrictive rule:** This rule requires the simultaneous presence of: (1) a specific @deva[उपपद] (@deva[मिथ्या]), (2) a specific root in causative form (@deva[कृ] + @deva[णिच्]), (3) a specific aspectual meaning (@deva[अभ्यास] — habituality). This is the most narrowly conditioned rule in the @deva[आत्मनेपद] section.

**@deva[अभ्यास] = habituality:** Not a single mispronunciation but repeated, habitual wrong performance. The habitual quality means the agent's nature is characterized by this fault — a self-defining trait, motivating @deva[आत्मनेपद].

**Transition to general rules:** This is the last specific @deva[आत्मनेपद] rule. @ref[1.3.72] begins the general framework — @deva[स्वरितञित्] roots with @deva[स्वार्थ] condition — that governs all @deva[उभयपदिन्] roots not covered by @ref[1.3.12]–@ref[1.3.71].
"""

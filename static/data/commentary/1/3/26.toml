id = "1.3.26"
numericId = "13026"

[en]
simple = """
The verb @deva[स्था] preceded by @deva[उप] takes @deva[आत्मनेपद] when used intransitively — meaning "to be present at, to attend" (especially at mealtimes or ceremonies).

**@deva[आत्मनेपद] (attending, being present):**
- @deva[भोजनकाले उपतिष्ठते] "he stands ready at mealtime"
- @deva[यावदभुक्तमुपतिष्ठते] "he is present whenever it is time to eat"

**@deva[परस्मैपद] (transitive — approaching someone):**
- @deva[राजानमुपतिष्ठति] "he approaches the king"

The key word @deva[अकर्मक] ("intransitive") carries forward into the next three rules (@ref[1.3.27]–@ref[1.3.29]).
"""

standard = """
After @deva[उप] + @deva[स्था] used intransitively ("to attend"), @deva[आत्मनेपद].

**Intransitive (attending):**
- @deva[भोजनकाले उपतिष्ठते] "he stands ready at mealtime"
- @deva[यावदभुक्तमुपतिष्ठते] "he is present at eating time"

**Transitive (approaching) — @deva[परस्मैपद]:**
- @deva[राजानमुपतिष्ठति] "he approaches the king"

**@deva[अकर्मक] as @deva[अनुवृत्ति]:** The intransitivity condition continues through @ref[1.3.27] (@deva[उद्]/@deva[वि] + @deva[तप्]), @ref[1.3.28] (@deva[आ] + @deva[यम्]/@deva[हन्]), and @ref[1.3.29] (@deva[सम्] + seven roots). All require intransitive usage for @deva[आत्मनेपद].

**Relation to @ref[1.3.25]:** The previous rule gave @deva[आत्मनेपद] for @deva[उप] + @deva[स्था] in the "worship" meaning. This rule adds the "attending" meaning, with the intransitivity condition.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[उपोपविश्यकर्मकात्] — after @deva[उप] + @deva[स्था] used intransitively, @deva[आत्मनेपद].

**@deva[अकर्मक] section begins:** This rule introduces the @deva[अकर्मक] (intransitive) condition that governs @ref[1.3.26]–@ref[1.3.29]. The transitivity of the verb determines @deva[पद] assignment — intransitive use triggers @deva[आत्मनेपद], transitive use reverts to default.

**Why intransitivity matters:** When a verb is intransitive, the action's result necessarily stays with the agent (there is no external object to receive it). This self-containment of the action's fruit aligns naturally with @deva[आत्मनेपद].

**@deva[उप] + @deva[स्था] — three rules total:**
- @ref[1.3.25]: "worship" meaning → @deva[आत्मनेपद]
- @ref[1.3.26] (this): intransitive "attending" → @deva[आत्मनेपद]
- Default: transitive "approaching" → @deva[परस्मैपद]

**Transition:** @ref[1.3.27]–@ref[1.3.29] extend the @deva[अकर्मक] condition to other prefix + root combinations (@deva[तप्], @deva[यम्], @deva[हन्], and seven roots with @deva[सम्]).
"""

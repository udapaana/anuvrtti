id = "1.3.39"
numericId = "13039"

[en]
simple = """
The verb @deva[क्रम्] "to step" takes @deva[आत्मनेपद] when preceded by @deva[उप] or @deva[पर] and used in the senses of continuity, energy, or development (the three senses from the previous rule).

**@deva[आत्मनेपद]:**
- @deva[उपक्रमते] "he commences, begins (with effort)"
- @deva[पराक्रमते] "he exerts, shows valor"

**@deva[परस्मैपद] (other senses with same prefixes):**
- @deva[उपक्रामति] "he approaches" (physical movement)
- @deva[पराक्रामति] "he steps over"

**@deva[परस्मैपद] (other prefixes, even with these senses):**
- @deva[संक्रामति] "he progresses" (@deva[सम्] is not listed)

Only @deva[उप] and @deva[पर] qualify, and only in the three senses from @ref[1.3.38].
"""

standard = """
After @deva[उप]/@deva[पर] + @deva[क्रम्] with @deva[वृत्ति]/@deva[सर्ग]/@deva[उपचय] senses, @deva[आत्मनेपद].

**@deva[आत्मनेपद]:**
- @deva[उपक्रमते] "he commences" (@deva[सर्ग] — purposeful effort)
- @deva[पराक्रमते] "he exerts, shows valor" (@deva[सर्ग])

**@deva[परस्मैपद] — wrong sense:**
- @deva[उपक्रामति] "he approaches" (physical, not @deva[वृत्ति]/@deva[सर्ग]/@deva[उपचय])

**@deva[परस्मैपद] — wrong prefix:**
- @deva[संक्रामति] "he progresses" (@deva[सम्] not listed, even with matching sense)

**Why a separate rule?** @ref[1.3.38] gives @deva[आत्मनेपद] for prefixless @deva[क्रम्] in these senses. This rule extends the same condition to @deva[उप] and @deva[पर] specifically — other prefixes like @deva[सम्], @deva[अप], @deva[प्र] do not qualify.

**@deva[क्रम्] as @deva[अनुवृत्ति]:** @deva[क्रम्] carries forward from @ref[1.3.38] through @ref[1.3.43].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[क्रमः] from @ref[1.3.38]; @deva[वृत्तिसर्गतायनेषु] from @ref[1.3.38].

@deva[उपपरभ्याम्] — after @deva[उप]/@deva[पर] + @deva[क्रम्] with the three senses, @deva[आत्मनेपद].

**Prefix restriction:** @ref[1.3.38] covered prefixless @deva[क्रम्]. This rule specifically adds @deva[उप] and @deva[पर]. The need for a separate rule shows that other prefixes (@deva[सम्], @deva[अप], @deva[प्र], @deva[वि], etc.) do not trigger @deva[आत्मनेपद] even in these senses — they remain @deva[परस्मैपदिन्].

**@deva[पराक्रमते] — a common form:** This is one of the most frequently encountered @deva[आत्मनेपद] forms of @deva[क्रम्] in classical literature, denoting "valor" or "heroic exertion" — a quintessentially self-directed action.

**Sense overlap:** Both @deva[उप] + @deva[क्रम्] and @deva[पर] + @deva[क्रम्] can express physical motion ("approach," "step over"), which takes @deva[परस्मैपद]. The @deva[वृत्ति]/@deva[सर्ग]/@deva[उपचय] condition disambiguates.

**@deva[क्रम्]-series position:** Second of six rules. @ref[1.3.40] next addresses @deva[आ] + @deva[क्रम्] for rising luminaries.
"""

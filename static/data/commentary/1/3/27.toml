id = "1.3.27"
numericId = "13027"

[en]
simple = """
The verb @deva[तप्] "to heat / to shine" takes @deva[आत्मनेपद] when preceded by @deva[उद्] or @deva[वि] and used without an object — meaning "to shine, to excel."

**@deva[आत्मनेपद] (intransitive — shining):**
- @deva[उत्तपते विद्याया] "he shines with learning"
- @deva[वितपते विद्याया] "he excels in knowledge"

**@deva[परस्मैपद] (transitive — heating):**
- @deva[सुवर्णकारः सुवर्णम् उत्तपति] "the goldsmith heats gold"

The intransitivity condition (@deva[अकर्मक]) carries forward from @ref[1.3.26].
"""

standard = """
After @deva[उद्]/@deva[वि] + @deva[तप्] used intransitively, @deva[आत्मनेपद].

**Intransitive (shining, excelling) — @deva[आत्मनेपद]:**
- @deva[उत्तपते विद्याया] "he shines with learning"
- @deva[वितपते] "he excels"

**Transitive (heating) — @deva[परस्मैपद]:**
- @deva[सुवर्णकारः सुवर्णम् उत्तपति] "the goldsmith heats gold"
- @deva[अग्निरुत्तपति] "the fire heats"

**@deva[अकर्मक] as @deva[अनुवृत्ति]:** The intransitivity condition continues from @ref[1.3.26] and governs this rule and @ref[1.3.28]–@ref[1.3.29].

**@deva[वार्त्तिक] — @deva[स्वाङ्ग] exception:** When the object is the agent's own limb, @deva[आत्मनेपद] applies even transitively: @deva[उत्तपते पाणिम्] "he heats his own hand." But with another person's limb: @deva[यज्ञदत्तस्य पृष्ठम् उत्तपति] — @deva[परस्मैपद].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[अकर्मकात्] from @ref[1.3.26].

@deva[उद्विभ्यां तपः] — after @deva[उद्]/@deva[वि] + @deva[तप्] used intransitively, @deva[आत्मनेपद].

**Transitivity split:** @deva[तप्] with @deva[उद्]/@deva[वि] has two distinct meanings: intransitive "to shine, excel" (@deva[आत्मनेपद]) vs. transitive "to heat something" (@deva[परस्मैपद]). The @deva[अकर्मक] condition from @ref[1.3.26] makes this distinction operative.

**@deva[वार्त्तिक] — @deva[स्वाङ्गकर्मक] extension:** When the object is the agent's own body part (@deva[स्वाङ्ग]), the verb is treated as quasi-intransitive and takes @deva[आत्मनेपद]: @deva[उत्तपते पाणिम्] "he heats his own hand." But acting on another's limb restores @deva[परस्मैपद]: @deva[देवदत्तो यज्ञदत्तस्य पृष्ठम् उत्तपति]. This @deva[स्वाङ्ग] principle recurs at @ref[1.3.28].

**@deva[अकर्मक] section:** @ref[1.3.26] (@deva[उप] + @deva[स्था]), @ref[1.3.27] (this: @deva[उद्]/@deva[वि] + @deva[तप्]), @ref[1.3.28] (@deva[आ] + @deva[यम्]/@deva[हन्]), @ref[1.3.29] (@deva[सम्] + seven roots) — all require intransitive usage for @deva[आत्मनेपद]. @ref[1.3.30] breaks this pattern by dropping the @deva[अकर्मक] condition.
"""

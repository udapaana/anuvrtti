id = "1.3.54"
numericId = "13054"

[en]
simple = """
The verb @deva[चर्] "to move" takes @deva[आत्मनेपद] when preceded by @deva[सम्] and accompanied by a word in the instrumental case (@deva[तृतीया]) — expressing the means of travel.

**@deva[आत्मनेपद] (with instrumental):**
- @deva[अश्वेन संचरते] "he rides on horseback"
- @deva[रथेन संचरते] "he travels by chariot"

**@deva[परस्मैपद] (without instrumental):**
- @deva[उभौ लोकौ संचरति] "he wanders through both worlds"

The instrumental must be explicitly stated in the sentence. If only implied, @deva[परस्मैपद] applies.
"""

standard = """
After @deva[सम्] + @deva[चर्] with an explicit @deva[तृतीया] (instrumental) noun, @deva[आत्मनेपद].

**With instrumental — @deva[आत्मनेपद]:**
- @deva[अश्वेन संचरते] "he rides on a horse"
- @deva[रथेन संचरते] "he travels by chariot"

**Without instrumental — @deva[परस्मैपद]:**
- @deva[उभौ लोकौ संचरति इमं चामुं च देवल] "O Devala, you wander through both worlds"

**Explicit instrumental required:** The instrumental-case noun must actually appear in the sentence. An implied or understood instrumental does not trigger @deva[आत्मनेपद].

**Syntactic condition:** This is one of the few rules in this section where a case-form in the sentence (@deva[तृतीया]) triggers @deva[पद] assignment, rather than just the verb's meaning or prefix.

**@deva[चर्]-series complete:** @ref[1.3.53] (@deva[उद्] + intransitive) and @ref[1.3.54] (this: @deva[सम्] + instrumental) cover the @deva[चर्]-specific rules.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[समस्तृतीयायुक्ते] — after @deva[सम्] + @deva[चर्] when a @deva[तृतीया]-marked word is present, @deva[आत्मनेपद].

**Syntactic trigger:** Unlike most rules in this section which depend on verbal meaning or prefix alone, this rule depends on the syntactic presence of a @deva[तृतीया]-marked noun. The instrumental expresses the vehicle or means of locomotion.

**Explicit vs. implied:** The @deva[तृतीया] must be overtly expressed (@deva[उपात्त]). @deva[उभौ लोकौ संचरति] — even if one can infer a means of travel, the absence of an explicit instrumental means @deva[परस्मैपद] applies.

**Semantic motivation:** Traveling by means of a vehicle is a self-benefiting action — the agent uses the vehicle for his own movement. The explicit instrumental highlights this self-directed use, motivating @deva[आत्मनेपद].

**@deva[सम्] in this @deva[सूत्र]:** Some commentators note that @deva[सम्] here takes @deva[षष्ठी] (relates to @deva[चर्] as "of @deva[सम्]-prefixed @deva[चर्]"), not @deva[पञ्चमी] ("after @deva[सम्]"). This allows other prefixes to intervene — e.g., @deva[संप्रचरते] with @deva[प्र] between @deva[सम्] and @deva[चर्] — while still qualifying.

**@deva[चर्]-series:** @ref[1.3.53] (@deva[उद्] + @deva[अकर्मक]) and @ref[1.3.54] (this: @deva[सम्] + @deva[तृतीया]).
"""

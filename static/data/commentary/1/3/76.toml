id = "1.3.76"
numericId = "13076"

[en]
simple = """
The verb @deva[ज्ञा] "to know" takes @deva[आत्मनेपद] when used without any prefix and the fruit of the action accrues to the agent — that is, when the knowing benefits the knower.

**@deva[आत्मनेपद] (agent benefits, no prefix):**
- @deva[गां जानीते] "he recognizes his cow"
- @deva[अश्वं जानीते] "he recognizes his horse"

**@deva[परस्मैपद] — with prefix:**
- @deva[स्वर्गं लोकं न प्रजानाति मूढः] "the fool does not know the heavenly world" (@deva[प्र] prefix present)

**@deva[परस्मैपद] — fruit not to agent:**
- @deva[देवदत्तस्य गां जानाति] "he recognizes Devadatta's cow" (benefit goes to Devadatta)
"""

standard = """
After @deva[ज्ञा] without @deva[उपसर्ग], @deva[आत्मनेपद] when the @deva[क्रियाफल] accrues to the @deva[कर्ता].

**Agent benefits — @deva[आत्मनेपद]:**
- @deva[गां जानीते] "he recognizes his cow"
- @deva[अश्वं जानीते] "he recognizes his horse"

**With @deva[उपसर्ग] — other rules apply:**
- @deva[न प्रजानाति] "he doesn't know" (governed by @ref[1.3.78] or @ref[1.3.46])

**Fruit not to agent — @deva[परस्मैपद]:**
- @deva[देवदत्तस्य गां जानाति] "he identifies Devadatta's cow"

**Relation to prior @deva[ज्ञा] rules:** @ref[1.3.44]–@ref[1.3.46] gave @deva[आत्मनेपद] for specific meanings (denial, intransitive, @deva[सम्]/@deva[प्रति]) without the @deva[स्वार्थ] condition. This rule covers the remaining case: prefixless @deva[ज्ञा] with the @deva[स्वार्थ] condition, making it @deva[उभयपदिन्].

**@deva[ज्ञा] is @deva[परस्मैपदिन्]:** By @ref[1.3.78], @deva[ज्ञा] defaults to @deva[परस्मैपद]. This rule converts prefixless @deva[ज्ञा] to @deva[उभयपदिन्] when the agent benefits.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[कर्त्रभिप्राये क्रियाफले] from @ref[1.3.72].

@deva[अनुपसर्गज्ञः] — after @deva[ज्ञा] without @deva[उपसर्ग], @deva[आत्मनेपद] when the fruit accrues to the agent.

**Converting @deva[परस्मैपदिन्] to @deva[उभयपदिन्]:** @deva[ज्ञा] is neither @deva[अनुदात्तेत्]/@deva[ङित्] (→ @ref[1.3.12]) nor @deva[स्वरितेत्]/@deva[ञित्] (→ @ref[1.3.72]). By @ref[1.3.78], it defaults to @deva[परस्मैपदिन्]. This rule specifically makes prefixless @deva[ज्ञा] @deva[उभयपदिन्] with the @deva[स्वार्थ] condition.

**@deva[ज्ञा] coverage summary:**
- @ref[1.3.44]: denial → @deva[आत्मनेपद] (unconditional)
- @ref[1.3.45]: intransitive → @deva[आत्मनेपद] (unconditional)
- @ref[1.3.46]: @deva[सम्]/@deva[प्रति] (not grief) → @deva[आत्मनेपद] (unconditional)
- @ref[1.3.57]: desiderative → @deva[आत्मनेपद] (unconditional)
- @ref[1.3.76] (this): prefixless + agent benefits → @deva[आत्मनेपद] (@deva[स्वार्थ] condition)
- Default: @deva[परस्मैपद] by @ref[1.3.78]

**@deva[स्वार्थ] block position:** Fifth in the series (@ref[1.3.72]–@ref[1.3.77]).
"""

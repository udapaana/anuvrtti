id = "1.3.48"
numericId = "13048"

[en]
simple = """
The verb @deva[वद्] "to speak" takes @deva[आत्मनेपद] when meaning "articulate beings speaking together" — people speaking in chorus or in proper discourse.

**@deva[आत्मनेपद] (articulate chorus):**
- @deva[संप्रवदन्ते ब्राह्मणाः] "the @deva[ब्राह्मण]s are speaking together (in proper Sanskrit)"

**@deva[परस्मैपद] — conditions not met:**
- @deva[संप्रवदन्ति कुक्कुटाः] "the roosters crow together" (not articulate speech — animals)
- @deva[ब्राह्मणो वदति] "the @deva[ब्राह्मण] speaks" (single speaker, not chorus)

Two conditions must be met: (1) the speakers must be capable of articulate speech (@deva[व्यक्तवाच्]), and (2) they must be speaking simultaneously (@deva[समुच्चारण]).
"""

standard = """
After @deva[वद्] meaning @deva[व्यक्तवाच्] (articulate speech) with @deva[समुच्चारण] (speaking together/simultaneously), @deva[आत्मनेपद].

**@deva[आत्मनेपद]:**
- @deva[संप्रवदन्ते ब्राह्मणाः] "the @deva[ब्राह्मण]s discourse together"

**@deva[परस्मैपद] — condition fails:**
- @deva[संप्रवदन्ति कुक्कुटाः] — animals (fails @deva[व्यक्तवाच्])
- @deva[ब्राह्मणो वदति] — single speaker (fails @deva[समुच्चारण])

**Double condition:**
1. @deva[व्यक्तवाच्]: articulate, meaningful speech — only humans qualify
2. @deva[समुच्चारण]: speaking simultaneously or in group discourse

**@deva[व्यक्तवाच्] continues:** This condition carries forward into @ref[1.3.49] and @ref[1.3.50], which also require articulate speech for @deva[आत्मनेपद].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[व्यक्तवाचां समुच्चारणे] — after @deva[वद्] when articulate speakers speak together, @deva[आत्मनेपद].

**@deva[व्यक्तवाच्] as @deva[अनुवृत्ति]:** This condition carries into @ref[1.3.49] (echoing) and @ref[1.3.50] (contradicting). All three rules require human, articulate speech — animal sounds and non-articulate noise are excluded.

**@deva[समुच्चारण] defined:** Simultaneous or concurrent utterance. Multiple speakers engaged in discourse, recitation, or debate at the same time. Sequential speech (one after another) does not qualify.

**Relation to @ref[1.3.47]:** @ref[1.3.47] already lists @deva[भासन] (brilliance in discourse) as triggering @deva[आत्मनेपद]. This rule adds a separate condition — group articulate speech — which is not dependent on the six senses of @ref[1.3.47]. A group of @deva[ब्राह्मण]s reciting together need not be "showing brilliance" per se.

**Why both conditions?** Without @deva[व्यक्तवाच्], roosters crowing would qualify. Without @deva[समुच्चारण], a single speaker would qualify. The intersection ensures @deva[आत्मनेपद] only for the specific social act of articulate group discourse.

**@deva[वद्]-series position:** Second of four rules. @ref[1.3.47] (six senses), @ref[1.3.48] (this: chorus), @ref[1.3.49] (@deva[अनु] + echo), @ref[1.3.50] (contradiction, optional).
"""

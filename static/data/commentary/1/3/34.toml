id = "1.3.34"
numericId = "13034"

[en]
simple = """
The verb @deva[कृ] "to do" takes @deva[आत्मनेपद] when preceded by @deva[वि] and the object is a sound.

**@deva[आत्मनेपद] (making sounds):**
- @deva[क्रोष्टा विकुरुते स्वरान्] "the bird makes sounds"
- @deva[ध्वाङ्क्षो विकुरुते स्वरान्] "the crow makes sounds"

**@deva[परस्मैपद] (other objects):**
- @deva[चित्तं विकरोति कामः] "desire disturbs the mind"

Only when the object is sound (@deva[शब्द]) does @deva[आत्मनेपद] apply.
"""

standard = """
After @deva[वि] + @deva[कृ] when the object is @deva[शब्द] (sound), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**Sound as object — @deva[आत्मनेपद]:**
- @deva[क्रोष्टा विकुरुते स्वरान्] "the bird produces sounds"
- @deva[ध्वाङ्क्षो विकुरुते स्वरान्] "the crow produces sounds"

**Non-sound object — @deva[परस्मैपद]:**
- @deva[चित्तं विकरोति कामः] "desire disturbs the mind"

**@deva[कर्मन्] here:** @deva[कर्मन्] means the grammatical object (@deva[कारक]), not "activity" as in @ref[1.3.24]. The object must specifically be a sound — @deva[स्वर], @deva[शब्द], @deva[ध्वनि], etc.

**@deva[वि] continues:** The prefix @deva[वि] carries forward into the next rule (@ref[1.3.35]), which gives @deva[आत्मनेपद] for @deva[वि] + @deva[कृ] used intransitively.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[कृञः] from @ref[1.3.32].

@deva[विकृशब्दे] — after @deva[वि] + @deva[कृ] when the object (@deva[कर्मन्]) is @deva[शब्द], @deva[आत्मनेपद].

**@deva[कर्मन्] = @deva[कारक]:** Here @deva[कर्मन्] refers to the grammatical object (accusative), not "action/activity" as in @ref[1.3.24] (@deva[ऊर्ध्वकर्मन्]). The distinction matters: this rule requires an actual object noun denoting sound.

**Semantic motivation:** Sound-production by animals and birds is an inherent, self-directed activity — the agent naturally produces sounds as part of its own nature. This self-containment motivates @deva[आत्मनेपद].

**@deva[वि] as @deva[अनुवृत्ति]:** @deva[वि] carries into @ref[1.3.35], which adds the intransitive condition. Together, @ref[1.3.34]–@ref[1.3.35] cover two distinct conditions for @deva[वि] + @deva[कृ]: sound-object (this rule) and intransitive use (next rule).

**@deva[कृ]-series position:** Third of four rules. @ref[1.3.32] (seven meanings), @ref[1.3.33] (@deva[अधि] + overcome), @ref[1.3.34] (this: @deva[वि] + sound-object), @ref[1.3.35] (@deva[वि] + intransitive).
"""

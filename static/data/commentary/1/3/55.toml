id = "1.3.55"
numericId = "13055"

[en]
simple = """
The verb @deva[दा] "to give" takes @deva[आत्मनेपद] when preceded by @deva[सम्] and accompanied by an instrumental (@deva[तृतीया]) that has the sense of a recipient (dative).

**@deva[आत्मनेपद] (instrumental with dative sense):**
- @deva[दास्या संप्रयच्छते] "he gives (so as to entice) the female servant"
- @deva[वृषल्या संप्रयच्छते] "he gives (to entice) the prostitute"

**@deva[परस्मैपद] (instrumental as instrument):**
- @deva[पाणिना संप्रयच्छति] "he gives with his hand"

The rule applies when the instrumental-case word actually represents the person to whom something is given (dative meaning), not a physical instrument.
"""

standard = """
After @deva[सम्] + @deva[दा] with a @deva[तृतीया]-marked word having @deva[चतुर्थी]-sense (dative), @deva[आत्मनेपद].

**@deva[तृतीया] with dative sense — @deva[आत्मनेपद]:**
- @deva[दास्या संप्रयच्छते] "he gives to entice the female servant"
- @deva[वृषल्या संप्रयच्छते] "he gives to entice the prostitute"

**@deva[तृतीया] as instrument — @deva[परस्मैपद]:**
- @deva[पाणिना संप्रयच्छति] "he gives with his hand"

**@deva[तृतीया] with @deva[चतुर्थी]-sense:** The instrumental case (@deva[तृतीया]) normally expresses the instrument. Here, the person marked with @deva[तृतीया] is actually the recipient — the giving is directed toward them. This displaced dative triggers @deva[आत्मनेपद].

**@deva[वार्त्तिक] — immoral context:** Commentators note this applies particularly in contexts of immoral conduct — giving gifts to entice someone inappropriately.

**@deva[सम्] allows intervention:** @deva[सम्] relates to @deva[दा] as @deva[षष्ठी] (not @deva[पञ्चमी]), so @deva[प्र] can intervene: @deva[संप्रयच्छते] (= @deva[सम्] + @deva[प्र] + @deva[दा]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[दाणश्चतुर्थ्यर्थे तृतीयायुक्ते] — after @deva[सम्] + @deva[दा] when a @deva[तृतीया]-marked word has @deva[चतुर्थी]-sense, @deva[आत्मनेपद].

**Case-displacement:** The @deva[तृतीया]-marked word is syntactically instrumental but semantically dative — the person is the recipient, not the instrument. This case-displacement pattern is rare in the @deva[आत्मनेपद] rules.

**@deva[षष्ठी]-reading of @deva[सम्]:** @deva[सम्] in this rule takes @deva[षष्ठी] (genitive) — "of @deva[सम्]-prefixed @deva[दा]" — rather than @deva[पञ्चमी] (ablative) — "after @deva[सम्]." This allows other prefixes to intervene between @deva[सम्] and @deva[दा]: @deva[सम्] + @deva[प्र] + @deva[दा] → @deva[संप्रयच्छते].

**Semantic motivation:** Giving with the intent to entice involves self-interest — the agent gives for his own purposes (seduction, manipulation). The @deva[आत्मनेपद] reflects this self-directed motive.

**Comparison with @ref[1.3.54]:** Both rules condition @deva[आत्मनेपद] on the presence of a @deva[तृतीया]-marked word. @ref[1.3.54] (@deva[सम्] + @deva[चर्]) requires genuine instrumental (vehicle); @ref[1.3.55] (this: @deva[सम्] + @deva[दा]) requires displaced dative. The syntactic trigger is the same case-form but with different semantic roles.

**Transition:** @ref[1.3.56] moves to a new set of roots and conditions.
"""

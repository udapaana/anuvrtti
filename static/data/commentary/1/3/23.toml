id = "1.3.23"
numericId = "13023"

[en]
simple = """
The verb @deva[स्था] (without any prefix) takes @deva[आत्मनेपद] when meaning:

1. **Disclosing one's intentions** (@deva[प्रकाशन]) — making one's wishes known to another
2. **Acting as arbitrator** (@deva[स्थेयाख्य]) — settling a dispute or making an award

**Examples:**
- @deva[तिष्ठते जायापत्ये] "the wife makes her wish known to the husband"
- @deva[त्वयि तिष्ठते] "he refers the matter to you (for settlement)"
- @deva[संशय्य कर्णादिषु तिष्ठते यः] "he who, when in doubt, has recourse to @deva[कर्ण] as judge"

In all other meanings, @deva[स्था] without a prefix takes @deva[परस्मैपद]: @deva[तिष्ठति] "he stands."
"""

standard = """
Prefixless @deva[स्था] takes @deva[आत्मनेपद] when meaning @deva[प्रकाशन] (disclosing intentions) or @deva[स्थेयाख्य] (arbitration).

**@deva[प्रकाशन]:** Making one's inner wish or intention known to another.
- @deva[तिष्ठते जायापत्ये] "the wife discloses her wish to the husband"

**@deva[स्थेयाख्य]:** Acting as a @deva[स्थेय] (arbitrator) — one to whom a dispute is referred.
- @deva[त्वयि तिष्ठते] "he refers to you for settlement"
- @deva[संशय्य कर्णादिषु तिष्ठते यः] "he who resorts to @deva[कर्ण] as umpire"

**Other meanings — @deva[परस्मैपद]:** @deva[तिष्ठति] "he stands" (physical standing).

**@deva[स्थेयाख्य] compound:** @deva[स्थेय] (arbitrator, one in whom one "stands") + @deva[आख्य] (named) — the meaning of acting as a named arbitrator.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[स्थः प्रकाशनस्थेयाख्ययोः] — prefixless @deva[स्था] takes @deva[आत्मनेपद] in @deva[प्रकाशन] and @deva[स्थेयाख्य] meanings.

**Meaning-conditioned @deva[पद] assignment:** Unlike @ref[1.3.22] (prefix-conditioned), this rule is meaning-conditioned. The same root @deva[स्था] without any prefix takes different @deva[पद]s depending on its semantic context.

**@deva[प्रकाशन] semantics:** The action of disclosing benefits the agent (the discloser) — they achieve their communicative goal. This self-directed benefit motivates @deva[आत्मनेपद].

**@deva[स्थेयाख्य] semantics:** The arbitrator "stands" as the authority — the resolution accrues to or through the arbitrator's judgment. Again, the agent-directed nature triggers @deva[आत्मनेपद].

**Position in @deva[स्था]-series:** @ref[1.3.22] handles prefix-specific assignments. @ref[1.3.23] (this) handles prefixless @deva[स्था] with specific meanings. @ref[1.3.24]–@ref[1.3.25] return to prefix-specific rules (@deva[उद्] + @deva[स्था], @deva[उप] + @deva[स्था]).
"""

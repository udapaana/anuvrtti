id = "1.3.59"
numericId = "13059"

[en]
simple = """
The desiderative of @deva[श्रु] "to hear" does NOT take @deva[आत्मनेपद] when preceded by @deva[प्रति] or @deva[आ] — it reverts to @deva[परस्मैपद].

**@deva[परस्मैपद] (with @deva[प्रति] or @deva[आ]):**
- @deva[प्रतिशुश्रूषति] "he wishes to answer"
- @deva[आशुश्रूषति] "he wishes to listen"

**@deva[आत्मनेपद] (without these prefixes):**
- @deva[शुश्रूषते] "he wishes to serve" (by @ref[1.3.57])

This is an exception to @ref[1.3.57], which ordinarily gives @deva[आत्मनेपद] to all desideratives of @deva[श्रु].
"""

standard = """
After @deva[प्रति]/@deva[आङ्] + desiderative of @deva[श्रु], @deva[आत्मनेपद] does NOT apply — @deva[परस्मैपद] instead. Exception to @ref[1.3.57].

**@deva[परस्मैपद]:**
- @deva[प्रतिशुश्रूषति] "he wishes to answer"
- @deva[आशुश्रूषति] "he wishes to listen"

**Without these prefixes — @deva[आत्मनेपद] by @ref[1.3.57]:**
- @deva[शुश्रूषते] "he wishes to serve"

**@deva[उपसर्ग] vs. @deva[कर्मप्रवचनीय]:** @deva[प्रति] and @deva[आ] must function as @deva[उपसर्ग]s (verbal prefixes) for this exception to apply. As @deva[कर्मप्रवचनीय]s (governing a noun), they do not block @deva[आत्मनेपद]: @deva[देवदत्तं प्रतिशुश्रूषते] — @deva[प्रति] governs @deva[देवदत्तम्], not the verb → @deva[आत्मनेपद] applies.

**Exception pair with @ref[1.3.58]:** Both rules carve out prefix-specific exceptions to @ref[1.3.57] — @ref[1.3.58] for @deva[ज्ञा], @ref[1.3.59] (this) for @deva[श्रु].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[सनः] from @ref[1.3.57].

@deva[प्रत्याङ्भ्यां श्रुवः] — after @deva[प्रति]/@deva[आङ्] + desiderative of @deva[श्रु], @deva[आत्मनेपद] is NOT used.

**@deva[अपवाद] to @ref[1.3.57]:** Blocks @deva[आत्मनेपद] for @deva[श्रु]-desideratives with @deva[प्रति] or @deva[आ] as @deva[उपसर्ग].

**@deva[उपसर्ग] vs. @deva[कर्मप्रवचनीय]:** The distinction is critical. @deva[प्रति] as @deva[उपसर्ग] modifies the verb → exception applies → @deva[परस्मैपद]. @deva[प्रति] as @deva[कर्मप्रवचनीय] governs a noun (@deva[देवदत्तं प्रति]) → exception does not apply → @deva[आत्मनेपद] by @ref[1.3.57]. This distinction is established by @ref[1.4.59] (defining @deva[उपसर्ग]).

**Semantic motivation:** @deva[प्रतिशुश्रूषति] "he wishes to answer/respond" and @deva[आशुश्रूषति] "he wishes to listen to" are outward-directed hearing activities — directed at answering or attending to something external. The self-directed quality of @deva[शुश्रूषते] "he wishes to serve (for himself)" is diminished.

**Desiderative exceptions complete:** @ref[1.3.57] (general rule), @ref[1.3.58] (@deva[अनु] + @deva[ज्ञा] exception), @ref[1.3.59] (this: @deva[प्रति]/@deva[आ] + @deva[श्रु] exception). @deva[स्मृ] and @deva[दृश्] desideratives have no exceptions.
"""

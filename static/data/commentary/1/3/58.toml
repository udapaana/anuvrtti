id = "1.3.58"
numericId = "13058"

[en]
simple = """
The desiderative of @deva[ज्ञा] "to know" does NOT take @deva[आत्मनेपद] when preceded by @deva[अनु] — it reverts to @deva[परस्मैपद].

**@deva[परस्मैपद] (with @deva[अनु]):**
- @deva[पुत्रम् अनुजिज्ञासति] "he wishes to inquire about the son"

**@deva[आत्मनेपद] (without @deva[अनु]):**
- @deva[धर्मं जिज्ञासते] "he wishes to know dharma" (by @ref[1.3.57])

This is an exception to @ref[1.3.57], which ordinarily gives @deva[आत्मनेपद] to all desideratives of @deva[ज्ञा].
"""

standard = """
After @deva[अनु] + desiderative of @deva[ज्ञा], @deva[आत्मनेपद] does NOT apply — @deva[परस्मैपद] instead. Exception to @ref[1.3.57].

**@deva[परस्मैपद]:**
- @deva[पुत्रम् अनुजिज्ञासति] "he wishes to inquire about the son"

**Without @deva[अनु] — @deva[आत्मनेपद] by @ref[1.3.57]:**
- @deva[जिज्ञासते] "he wishes to know"

**Rule type:** @deva[प्रतिषेध] (prohibition) — blocks the @deva[आत्मनेपद] of @ref[1.3.57] specifically for the @deva[अनु]-prefixed desiderative of @deva[ज्ञा].

**Scope:** Only the desiderative is affected. @deva[अनु] + primitive @deva[ज्ञा] follows its own rules (@ref[1.3.44]–@ref[1.3.46] or default @ref[1.3.78]).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[सनः] from @ref[1.3.57].

@deva[अनुज्ञः] — after @deva[अनु] + desiderative of @deva[ज्ञा], @deva[आत्मनेपद] is NOT used.

**@deva[अपवाद] to @ref[1.3.57]:** @ref[1.3.57] gives @deva[आत्मनेपद] to all @deva[ज्ञा]-desideratives. This rule excepts the @deva[अनु]-prefixed form, reverting it to @deva[परस्मैपद] by @ref[1.3.78].

**Semantic motivation:** @deva[अनुजिज्ञासति] means "he wishes to inquire about/after" — a transitive, outward-directed inquiry about someone or something. The self-directed quality of "wishing to know" is diminished with @deva[अनु], which directs the knowing toward an external target.

**Interaction with @ref[1.3.45]:** @ref[1.3.45] gives @deva[आत्मनेपद] for intransitive @deva[ज्ञा]. This prohibition applies only to the desiderative (@deva[सन्]-formation), not the primitive root. The primitive @deva[अनु] + @deva[ज्ञा] follows its own rules independently.

**Exception pair:** @ref[1.3.58] (this) and @ref[1.3.59] form exceptions to @ref[1.3.57] — one for @deva[ज्ञा], one for @deva[श्रु].
"""

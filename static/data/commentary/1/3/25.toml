id = "1.3.25"
numericId = "13025"

[en]
simple = """
The verb @deva[स्था] preceded by @deva[उप] takes @deva[आत्मनेपद] when meaning "to worship with hymns."

**@deva[आत्मनेपद] (worship):**
- @deva[ऐन्द्र्या गार्हपत्यमुपतिष्ठते] "he worships the @deva[गार्हपत्य] fire with the @deva[ऐन्द्री] hymn"

**@deva[परस्मैपद] (other meanings — "to approach"):**
- @deva[भर्तारमुपतिष्ठति यौवनेन] "she approaches the husband through her youth"

The distinction is ritual worship versus ordinary approaching.
"""

standard = """
After @deva[उप] + @deva[स्था] meaning "to worship" (@deva[मन्त्रपूर्वकोपस्थान]), @deva[आत्मनेपद].

**@deva[आत्मनेपद]:**
- @deva[ऐन्द्र्या गार्हपत्यमुपतिष्ठते] "he worships the @deva[गार्हपत्य] fire with the @deva[ऐन्द्री] hymn"

**@deva[परस्मैपद] (other meanings):**
- @deva[भर्तारमुपतिष्ठति यौवनेन] "she approaches the husband through youth"

**@deva[वार्त्तिक] — extended meanings also take @deva[आत्मनेपद]:**
1. @deva[देवपूजा] (deity worship): @deva[आदित्यमुपतिष्ठते] "he worships the sun"
2. @deva[सङ्गतिकरण] (joining): @deva[पतिमुपतिष्ठते नारी] "the woman joins her husband"
3. @deva[मित्रीकरण] (befriending): @deva[सन्तमुपतिष्ठते साधुः] "the good man befriends the noble"
4. @deva[पथ] (path leading to): @deva[अयं पन्थाः स्रुघ्नमुपतिष्ठते] "this road leads to @deva[स्रुघ्न]"

**@deva[वार्त्तिक] — optional @deva[आत्मनेपद]:** When meaning "desire to obtain": @deva[भिक्षुको ब्राह्मणकुलमुपतिष्ठते] or @deva[उपतिष्ठति] — both valid.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[उपाच्च] — after @deva[उप] + @deva[स्था] (in worship sense), @deva[आत्मनेपद].

**Completing the @deva[स्था]-series:** This is the last of four @deva[स्था]-specific rules:
- @ref[1.3.22]: @deva[सम्]/@deva[अव]/@deva[प्र]/@deva[वि] + @deva[स्था] → always @deva[आत्मनेपद]
- @ref[1.3.23]: prefixless @deva[स्था] in disclosure/arbitration sense → @deva[आत्मनेपद]
- @ref[1.3.24]: @deva[उद्] + @deva[स्था] (not "rising") → @deva[आत्मनेपद]
- @ref[1.3.25] (this): @deva[उप] + @deva[स्था] "worship" → @deva[आत्मनेपद]

**@deva[वार्त्तिक] expansion:** The @deva[वार्त्तिक]s substantially expand this rule, adding @deva[देवपूजा], @deva[सङ्गतिकरण], @deva[मित्रीकरण], and @deva[पथ] meanings. This suggests that @deva[उप] + @deva[स्था] has a strong tendency toward @deva[आत्मनेपद] in most meanings — the @deva[सूत्र] names only "worship" but practice extends further.

**Optional case:** "Desire to obtain" (@deva[भिक्षुको ब्राह्मणकुलमुपतिष्ठते/उपतिष्ठति]) admits both @deva[पद]s — a @deva[विकल्प] reflecting uncertain direction of benefit.

**Transition:** After the @deva[स्था]-series, @ref[1.3.26] onward continue with meaning-specific @deva[आत्मनेपद] rules for other roots and constructions.
"""

id = "1.3.65"
numericId = "13065"

[en]
simple = """
The verb @deva[क्ष्णु] "to sharpen, to whet" takes @deva[आत्मनेपद] when preceded by @deva[सम्].

**@deva[आत्मनेपद]:**
- @deva[संक्ष्णुते शस्त्रम्] "he whets the weapon"
- @deva[संक्ष्णुवाते] "they two whet"
- @deva[संक्ष्णुवते] "they all whet"

**@deva[परस्मैपद] (without @deva[सम्]):**
- @deva[क्ष्णौति] "he sharpens"
"""

standard = """
After @deva[सम्] + @deva[क्ष्णु] "to sharpen," @deva[आत्मनेपद].

**@deva[आत्मनेपद]:**
- @deva[संक्ष्णुते शस्त्रम्] "he whets the weapon"

**@deva[परस्मैपद] (without @deva[सम्]):**
- @deva[क्ष्णौति] "he sharpens"

**Why not under @ref[1.3.29]?** @ref[1.3.29] listed seven roots taking @deva[आत्मनेपद] with @deva[सम्] intransitively. @deva[क्ष्णु] is transitive here (taking @deva[शस्त्रम्] as object) — the @deva[अकर्मक] condition of @ref[1.3.29] would exclude it. A separate rule is needed.

**Unconditional prefix override:** No meaning condition — the prefix @deva[सम्] alone triggers @deva[आत्मनेपद] for @deva[क्ष्णु], regardless of transitivity.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[समः क्ष्णुवः] — after @deva[सम्] + @deva[क्ष्णु], @deva[आत्मनेपद].

**Distinct from @ref[1.3.29]:** @ref[1.3.29] governs @deva[सम्] + seven roots under the @deva[अकर्मक] condition (from @ref[1.3.26]). @deva[क्ष्णु] "to sharpen" is characteristically transitive (it takes an object like @deva[शस्त्रम्]). Including it under @ref[1.3.29] would be incorrect because the @deva[अकर्मक] condition would block application.

**Semantic motivation:** Sharpening thoroughly (@deva[सम्] + @deva[क्ष्णु]) — whetting a weapon completely — is an action done for the agent's own benefit (preparing one's own weapon). This self-directed quality motivates @deva[आत्मनेपद].

**Simple prefix override:** Like @ref[1.3.51] (@deva[अव] + @deva[गॄ]), this rule conditions purely on prefix, with no additional meaning or transitivity requirement. The prefix @deva[सम्] alone is sufficient.

**Position:** This rule appears among miscellaneous prefix + root combinations between the desiderative/auxiliary rules (@ref[1.3.57]–@ref[1.3.63]) and the general @deva[पद]-assignment rules that follow.
"""

id = "1.3.44"
numericId = "13044"

[en]
simple = """
The verb @deva[ज्ञा] "to know" takes @deva[आत्मनेपद] when meaning "to deny" — typically with a prefix conveying negation or concealment.

**@deva[आत्मनेपद] (denying):**
- @deva[अपजानीते] "he denies"
- @deva[शतम् अपजानीते] "he denies a debt of a hundred"
- @deva[सहस्रम् अपजानीते] "he denies a thousand"

**@deva[परस्मैपद] (knowing):**
- @deva[न त्वं किञ्चिदपि जानासि] "you know nothing"

@deva[ज्ञा] normally takes @deva[परस्मैपद] (by @ref[1.3.78]). Only the "denial" sense shifts it to @deva[आत्मनेपद].
"""

standard = """
After @deva[ज्ञा] meaning "to deny" (@deva[अपह्नव] — denial, deception), @deva[आत्मनेपद].

**Denying — @deva[आत्मनेपद]:**
- @deva[अपजानीते] "he denies"
- @deva[शतम् अपजानीते] "he denies the hundred-rupee debt"

**Knowing — @deva[परस्मैपद]:**
- @deva[न त्वं किञ्चिदपि जानासि] "you don't know anything"
- @deva[जानाति धर्मम्] "he knows dharma"

**@deva[ज्ञा] is @deva[परस्मैपदिन्]:** By @ref[1.3.78], @deva[शेषात् कर्तरि परस्मैपदम्] — roots not covered by prior @deva[आत्मनेपद] rules take @deva[परस्मैपद] in active. @deva[ज्ञा] falls under this default. This rule creates a meaning-specific override.

**@deva[ज्ञा]-series begins:** @ref[1.3.44] (this: denial) and @ref[1.3.45] (intransitive) form a two-rule block for @deva[ज्ञा].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[ज्ञोऽविदर्थस्य] — after @deva[ज्ञा] in the sense of @deva[अपह्नव] (denial, not-knowing), @deva[आत्मनेपद].

**@deva[अविदर्थ] = denial:** The compound @deva[अविदर्थ] means "the sense of not-knowing" — i.e., denial, disavowal, or concealment of knowledge. This is not simply ignorance but active denial, typically with @deva[अप] prefix.

**Override of @ref[1.3.78]:** @deva[ज्ञा] is @deva[परस्मैपदिन्] by default (it is neither @deva[अनुदात्तेत्] nor @deva[ञित्]). This rule, being more specific (meaning-conditioned), overrides the general @ref[1.3.78] by @deva[विशेषापवाद] principle.

**Semantic motivation:** Denial is inherently self-directed — the agent conceals knowledge for his own benefit or protection. This self-interest aligns with @deva[आत्मनेपद].

**@deva[ज्ञा]-series:** @ref[1.3.44] (this: denial) and @ref[1.3.45] (intransitive) cover two overrides. After these, @deva[ज्ञा] reverts to @deva[परस्मैपद] in all other senses.
"""

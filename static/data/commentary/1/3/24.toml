id = "1.3.24"
numericId = "13024"

[en]
simple = """
The verb @deva[स्था] preceded by @deva[उद्] takes @deva[आत्मनेपद] — except when meaning "to rise from a seat."

**@deva[आत्मनेपद] (effort, striving):**
- @deva[गेहे उत्तिष्ठते] "he strives for the household"
- @deva[कुटुम्बे उत्तिष्ठते] "he exerts himself for the family"

**@deva[परस्मैपद] (rising from a seat):**
- @deva[आसनादुत्तिष्ठति] "he rises from the seat"

The word @deva[कर्मन्] in the @deva[सूत्र] means "activity/effort," not the grammatical term "object."
"""

standard = """
After @deva[उद्] + @deva[स्था] (not meaning "to rise from a seat"), @deva[आत्मनेपद].

**@deva[आत्मनेपद] — @deva[ईहा] (effort):**
- @deva[गेहे उत्तिष्ठते] "he strives for the household"
- @deva[कुटुम्बे उत्तिष्ठते] "he exerts for family"

**@deva[परस्मैपद] — physical rising:**
- @deva[आसनादुत्तिष्ठति] "he rises from seat"

**@deva[कर्मन्] = action/effort:** The @deva[सूत्र] uses @deva[कर्मन्] in the non-technical sense of "activity," distinguishing effort-directed @deva[उत्था] from physical rising.

**@deva[वार्त्तिक]:** @deva[उद्] must express @deva[ईहा] (desire/effort). Without this sense: @deva[अस्माद्ग्रामात्शतमुत्तिष्ठति] "a hundred arises from this village" — @deva[परस्मैपद] (no personal effort).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[उदो ऽनूर्ध्वकर्मणि] — after @deva[उद्] + @deva[स्था], @deva[आत्मनेपद] — except when the action is @deva[ऊर्ध्वकर्मन्] (upward movement, i.e., rising).

**@deva[ऊर्ध्वकर्मन्]:** Physical upward movement — rising from a seat or lying position. This meaning takes @deva[परस्मैपद].

**All other meanings:** "Striving," "engaging in effort," "undertaking activity" — these take @deva[आत्मनेपद]. The agent exerts himself for his own benefit.

**@deva[वार्त्तिक] — @deva[ईहा] requirement:** The @deva[आत्मनेपद] applies only when @deva[उद्] + @deva[स्था] expresses personal desire or effort (@deva[ईहा]). Impersonal "arising" (@deva[शतमुत्तिष्ठति]) is @deva[परस्मैपद].

**Pattern:** This is a meaning-exception rule — the same prefix + root combination (@deva[उद्] + @deva[स्था]) takes different @deva[पद]s depending on meaning. Compare @ref[1.3.20] (@deva[आ] + @deva[दा] with "opening mouth" exception) and @ref[1.3.25] (@deva[उप] + @deva[स्था] with "worship" condition).
"""

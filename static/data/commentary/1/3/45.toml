id = "1.3.45"
numericId = "13045"

[en]
simple = """
The verb @deva[ज्ञा] "to know" takes @deva[आत्मनेपद] when used without an object — even when the action benefits someone else.

**@deva[आत्मनेपद] (intransitive):**
- @deva[सर्पिषो जानीते] "he engages in sacrifice with ghee"
- @deva[मधुनो जानीते] "he engages with honey"

Here @deva[सर्पिस्] ("ghee") is not the object of knowing but the instrument of the sacrifice. The genitive case is used (by @ref[2.3.51]) because @deva[ज्ञा] here means "to experience/engage" rather than "to know."

**@deva[परस्मैपद] (transitive — knowing):**
- @deva[स्वरेण पुत्रं जानाति] "he recognizes his son by his voice"
"""

standard = """
After @deva[ज्ञा] used intransitively, @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**Intransitive — @deva[आत्मनेपद]:**
- @deva[सर्पिषो जानीते] "he engages with ghee (in sacrifice)"
- @deva[मधुनो जानीते] "he engages with honey"

**Transitive — @deva[परस्मैपद]:**
- @deva[स्वरेण पुत्रं जानाति] "he recognizes his son by voice"

**Genitive for instrument:** @deva[सर्पिस्] is the @deva[करण] (instrument) of the sacrifice, not the @deva[कर्मन्] (object). The genitive case (@deva[षष्ठी]) is assigned by @ref[2.3.51] (@deva[ज्ञोऽविदर्थस्य करणे]) — a special rule for @deva[ज्ञा] in non-knowledge senses where the instrument takes genitive.

**@deva[ज्ञा]-series complete:** @ref[1.3.44] (denial) and @ref[1.3.45] (this: intransitive) exhaust the @deva[आत्मनेपद] overrides for @deva[ज्ञा]. In all other uses, @deva[ज्ञा] is @deva[परस्मैपदिन्] by @ref[1.3.78].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[अकर्मकाच्च] — after @deva[ज्ञा] used intransitively, @deva[आत्मनेपद].

**@deva[अकर्मक] @deva[ज्ञा]:** In its ordinary sense, @deva[ज्ञा] is transitive (takes an object of knowledge). Here, @deva[ज्ञा] shifts to an intransitive sense — "to engage in, to experience" — where no direct object (@deva[कर्मन्]) is present. The genitive-marked noun (@deva[सर्पिषः]) is the @deva[करण], not the @deva[कर्मन्].

**@ref[2.3.51] connection:** @deva[ज्ञोऽविदर्थस्य करणे] assigns @deva[षष्ठी] to the @deva[करण] when @deva[ज्ञा] is used in its non-knowledge sense. This confirms the intransitive reading: if @deva[सर्पिस्] were the @deva[कर्मन्], it would take @deva[द्वितीया] (accusative), not @deva[षष्ठी].

**Semantic shift:** @deva[ज्ञा] moves from "to know (an object)" to "to engage in (an activity)." Without an object, the action's result stays with the agent — motivating @deva[आत्मनेपद].

**@deva[ज्ञा]-series summary:**
- @ref[1.3.44]: @deva[अपह्नव] (denial) → @deva[आत्मनेपद]
- @ref[1.3.45] (this): @deva[अकर्मक] (intransitive) → @deva[आत्मनेपद]
- Default (@ref[1.3.78]): all other senses → @deva[परस्मैपद]

**Transition:** @ref[1.3.46] begins a new section on @deva[सम्प्रदान]-conditioned @deva[आत्मनेपद] with @deva[श्रु].
"""

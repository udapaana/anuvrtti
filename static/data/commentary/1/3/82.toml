id = "1.3.82"
numericId = "13082"

[en]
simple = """
The verb @deva[मृष्] "to endure, tolerate" takes @deva[परस्मैपद] (active endings) when preceded by @deva[परि] "around" — even when the fruit of the action accrues to the agent.

**@deva[परस्मैपद] (always with @deva[परि]):**
- @deva[परिमृष्यति] "he endures, he tolerates"

**@deva[आत्मनेपद] (other prefixes, agent benefits):**
- @deva[आमृष्यते] "he touches"

@deva[मृष्] normally allows both sets of endings depending on who benefits. But with @deva[परि] — enduring or bearing something — @deva[परस्मैपद] is mandatory.
"""

standard = """
After @deva[परि] + @deva[मृष्], @deva[परस्मैपद] — even when the fruit accrues to the agent.

**Always @deva[परस्मैपद]:**
- @deva[परिमृष्यति] "he endures / tolerates"

**Other prefixes — @ref[1.3.72] applies:**
- @deva[आमृष्यते] "he touches" (agent benefits → @deva[आत्मनेपद])

**Rule type — @deva[अपवाद]:** @deva[मृष्] is @deva[स्वरितेत्], making it @deva[उभयपदिन्] by @ref[1.3.72]. This rule forcibly assigns @deva[परस्मैपद] for @deva[परि], overriding the @deva[स्वार्थ] condition.

**Semantic motivation:** @deva[परि] + @deva[मृष्] "to endure" involves bearing or putting up with something — the result is directed outward (toward the thing endured), making @deva[परस्मैपद] natural.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[परस्मैपदम्] from @ref[1.3.78].

@deva[परिमृषः] — after @deva[परि] + @deva[मृष्], @deva[परस्मैपद].

**Override of @ref[1.3.72]:** @deva[मृष्] is @deva[स्वरितेत्], so @ref[1.3.72] makes it @deva[उभयपदिन्]. @deva[परि] strips the @deva[आत्मनेपद] option.

**@deva[परस्मैपद] override section:** Fourth in the series. @ref[1.3.79] (@deva[अनु]/@deva[परा] + @deva[कृ]), @ref[1.3.80] (three prefixes + @deva[क्षिप्]), @ref[1.3.81] (@deva[प्र] + @deva[वह्]), @ref[1.3.82] (this: @deva[परि] + @deva[मृष्]).

**@deva[वार्त्तिक]:** Some grammarians include @deva[परि] + @deva[वह्] under this rule as well: @deva[परिवहति] "he carries around." This extends the @deva[परस्मैपद] override from @ref[1.3.81] (@deva[प्र] + @deva[वह्]) to @deva[परि] + @deva[वह्].

**End of @deva[स्वरितेत्] overrides:** @ref[1.3.79]–@ref[1.3.82] all override @ref[1.3.72] for specific prefix + root combinations. @ref[1.3.83] shifts to overriding @ref[1.3.12] (@deva[अनुदात्तेत्] roots).
"""

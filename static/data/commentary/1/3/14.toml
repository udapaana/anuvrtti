id = "1.3.14"
numericId = "13014"

[en]
simple = """
When a verb expresses reciprocal action (@deva[व्यतिहार] — one person performing another's duty or action), @deva[आत्मनेपद] is used, even in active voice.

**Examples:**
- @deva[व्यतिपचन्ते] "they cook for each other" (each does the other's cooking)
- @deva[व्यतिलुनते] "he cuts (performing another's task)"

**Without reciprocity — @deva[परस्मैपद]:**
- @deva[लुनन्ति] "they cut" (no interchange of roles)

The prefix @deva[वि] + @deva[अति] (= @deva[व्यति]) typically signals reciprocity.
"""

standard = """
When expressing @deva[व्यतिहार] (reciprocal interchange of action), @deva[आत्मनेपद] is used even in @deva[कर्तरि] (agent as subject).

**@deva[व्यतिहार]:** Each participant performs an action that belongs to another — an interchange of roles or duties.

**Examples:**
- @deva[व्यतिपचन्ते] "they cook for each other"
- @deva[व्यतिलुनते] "he cuts (another's duty)"

**Without reciprocity:** @deva[लुनन्ति] "they cut" — @deva[परस्मैपद] (no role-interchange).

**@deva[कर्तरि] context:** This adds to the @deva[भाव]/@deva[कर्मन्] assignment at @ref[1.3.13]. Here, the agent is the subject (@deva[कर्तरि]), but the reciprocal meaning triggers @deva[आत्मनेपद] anyway.

**Continues into @ref[1.3.15]–@ref[1.3.16]:** The @deva[व्यतिहार] context governs the next two rules, which create exceptions for verbs of motion/injury and for verbs meaning "to call."
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[कर्तरि कर्मव्यतिहारे] — in @deva[कर्तरि], when there is @deva[कर्मव्यतिहार] (reciprocal interchange of action), @deva[आत्मनेपद] is used.

**@deva[कर्मव्यतिहार] defined:** One person performs the action that properly belongs to another, and vice versa. This is not mere simultaneity but genuine role-interchange.

**Why @deva[आत्मनेपद]?** In reciprocal action, the fruit of the action returns to the agent (since each is simultaneously agent and beneficiary). This aligns with the general principle that @deva[आत्मनेपद] marks action whose fruit accrues to the agent (@ref[1.3.72]).

**@deva[कर्तरि] specification:** @ref[1.3.13] assigned @deva[आत्मनेपद] for @deva[भाव]/@deva[कर्मन्]. This rule extends @deva[आत्मनेपद] into the @deva[कर्तरि] domain — a domain that would otherwise follow the root's inherent @deva[पद] assignment.

**Exceptions follow:** @ref[1.3.15] excludes verbs of motion and injury from this rule. @ref[1.3.16] excludes verbs meaning "to call." These exceptions revert the affected verbs to @deva[परस्मैपद] even in @deva[व्यतिहार] contexts.

**@deva[व्यतिहार] as @deva[अनुवृत्ति]:** The term @deva[व्यतिहार] carries forward into @ref[1.3.15] and @ref[1.3.16], creating a mini-section on reciprocal-action @deva[पद] assignment.
"""

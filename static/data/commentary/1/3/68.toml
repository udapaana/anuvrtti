id = "1.3.68"
numericId = "13068"

[en]
simple = """
Causatives of @deva[भी] "to fear" and @deva[स्मि] "to wonder" take @deva[आत्मनेपद] when the fear or wonder is caused directly by the agent's own nature — not through an instrument.

**@deva[आत्मनेपद] (direct causation by agent):**
- @deva[जटिलो भीषयते] "the ascetic (with matted hair) frightens" — his very appearance causes fear
- @deva[मुण्डो विस्मापयते] "the shaven-headed one amazes" — his appearance itself amazes

**@deva[परस्मैपद] (causation through an instrument):**
- @deva[कुञ्चिकया एनं भाययति] "he frightens him with the key" — the key, not the person, is the source
- @deva[रूपेण विस्माययति] "he amazes with (a specific) form"
"""

standard = """
After causatives of @deva[भी]/@deva[स्मि], @deva[आत्मनेपद] applies when fear/wonder is directly produced by the @deva[हेतु] (causative agent) — the agent's own nature or presence causes the effect.

**Direct causation (@deva[हेतुभय]) — @deva[आत्मनेपद]:**
- @deva[जटिलो भीषयते] "the ascetic frightens (by his presence)"
- @deva[मुण्डो विस्मापयते] "the shaven one amazes (by his appearance)"

**Instrumental causation — @deva[परस्मैपद]:**
- @deva[कुञ्चिकया एनं भाययति] "he frightens with the key"
- @deva[रूपेण विस्माययति] "he amazes through form"

**@deva[हेतुभय] defined:** @deva[हेतु] (defined at @ref[1.4.55] as @deva[स्वतन्त्रः कर्ता]) directly produces fear/wonder. When fear arises from the agent's inherent nature (not mediated by an instrument), @deva[आत्मनेपद] applies.

**Causative subsection:** @ref[1.3.67] (general causative @deva[पद] rule), @ref[1.3.68] (this: @deva[भी]/@deva[स्मि] causatives), @ref[1.3.69]–@ref[1.3.70] (further causative-specific rules).
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[भीस्मयोर्हेतुभये] — after causatives of @deva[भी]/@deva[स्मि] in @deva[हेतुभय] (fear/wonder produced by the agent), @deva[आत्मनेपद].

**@deva[हेतुभय] vs. instrumental causation:** The distinction is whether the agent himself is the source of fear/wonder (@deva[हेतुभय]) or whether an external instrument mediates the effect. In @deva[जटिलो भीषयते], the ascetic's appearance inherently causes fear — no separate instrument is involved. In @deva[कुञ्चिकया भाययति], the key is the fear-source, not the person wielding it.

**@deva[हेतु] = @deva[स्वतन्त्रः कर्ता]:** @ref[1.4.55] defines @deva[हेतु] as the independent agent. When the @deva[हेतु] directly causes fear through his own nature, the self-directed quality of the action motivates @deva[आत्मनेपद].

**Causative block:** @ref[1.3.67]–@ref[1.3.70] form a causative-specific subsection:
- @ref[1.3.67]: general causative @deva[पद] rule (object-becomes-agent)
- @ref[1.3.68] (this): @deva[भी]/@deva[स्मि] causatives (direct fear/wonder)
- @ref[1.3.69]: @deva[गृध्]/@deva[वञ्च्] causatives (deception)
- @ref[1.3.70]: @deva[ली] causatives (respect/subdue/deceive)
"""

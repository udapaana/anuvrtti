id = "1.3.28"
numericId = "13028"

[en]
simple = """
The verbs @deva[यम्] "to restrain" and @deva[हन्] "to strike" take @deva[आत्मनेपद] when preceded by @deva[आ] and used without an object.

**@deva[आत्मनेपद] (intransitive):**
- @deva[आयच्छते] "it stretches, extends (by itself)"
- @deva[आहते] "it strikes (resounds)"

**@deva[परस्मैपद] (transitive):**
- @deva[आयच्छति कूपाद् रज्जुम्] "he draws up the rope from the well"

The intransitivity condition (@deva[अकर्मक]) carries forward from @ref[1.3.26].
"""

standard = """
After @deva[आङ्] + @deva[यम्]/@deva[हन्] used intransitively, @deva[आत्मनेपद].

**Intransitive — @deva[आत्मनेपद]:**
- @deva[आयच्छते] "it extends (by itself)"
- @deva[आहते] "it resounds"

**Transitive — @deva[परस्मैपद]:**
- @deva[आयच्छति रज्जुम्] "he draws up the rope"
- @deva[आहन्ति शत्रुम्] "he strikes the enemy"

**Derivations:**
- @deva[आ + यम् + शप् + ते] → @deva[आयच्छते] (by @ref[7.3.77])
- @deva[आ + हन् + ते] → @deva[आहते] (by @ref[6.4.37])

**@deva[वार्त्तिक] — @deva[स्वाङ्ग] exception:** When the object is the agent's own limb, @deva[आत्मनेपद] applies even transitively: @deva[आयच्छते पाणिम्] "he extends his own hand." With another's limb: @deva[आहन्ति शिरः परकीयम्] — @deva[परस्मैपद].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[अकर्मकात्] from @ref[1.3.26].

@deva[आङो यमहनः] — after @deva[आङ्] + @deva[यम्]/@deva[हन्] used intransitively, @deva[आत्मनेपद].

**Two roots, one prefix:** Both @deva[यम्] and @deva[हन्] are @deva[परस्मैपदिन्] roots. With @deva[आ], their intransitive uses ("extending by itself," "resounding") direct the action's result back to the agent, motivating @deva[आत्मनेपद].

**@deva[वार्त्तिक] — @deva[स्वाङ्गकर्मक]:** Same principle as @ref[1.3.27]: acting on one's own limb counts as quasi-intransitive. @deva[आयच्छते पाणिम्] "he extends his own hand" — @deva[आत्मनेपद]. But @deva[आहन्ति शिरः परकीयम्] "he strikes another's head" — @deva[परस्मैपद]. The @deva[स्वाङ्ग] @deva[वार्त्तिक] applies across the @deva[अकर्मक] section (@ref[1.3.26]–@ref[1.3.29]).

**Derivation notes:** @deva[आयच्छते] shows @deva[शप्]-insertion with @ref[7.3.77] replacing @deva[म्] of @deva[यम्] with @deva[च्छ्]. @deva[आहते] shows @deva[हन्] losing @deva[न्] before @deva[ते] by @ref[6.4.37].

**@deva[अकर्मक] section position:** Third of four rules (@ref[1.3.26]–@ref[1.3.29]) governed by the intransitivity condition. @ref[1.3.30] begins a new section without @deva[अकर्मक].
"""

id = "1.3.69"
numericId = "13069"

[en]
simple = """
Causatives of @deva[गृध्] "to covet" and @deva[वञ्च्] "to go/move" take @deva[आत्मनेपद] when meaning "to deceive" (@deva[प्रलम्भन]).

**@deva[आत्मनेपद] (deceiving):**
- @deva[माणवकं गर्धयते] "he deceives the boy"
- @deva[माणवकं वञ्चयते] "he cheats the boy"

**@deva[परस्मैपद] (other causative meanings):**
- @deva[श्वानं गर्धयति] "he makes the dog bark/covet"
- @deva[अहिं वञ्चयति] "he makes the snake move away / avoids the snake"

Only the "deception" sense triggers @deva[आत्मनेपद].
"""

standard = """
After causatives of @deva[गृध्]/@deva[वञ्च्] meaning @deva[प्रलम्भन] (deceiving), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**Deceiving — @deva[आत्मनेपद]:**
- @deva[माणवकं गर्धयते] "he deceives the boy"
- @deva[माणवकं वञ्चयते] "he cheats the boy"

**Other senses — @deva[परस्मैपद]:**
- @deva[श्वानं गर्धयति] "he makes the dog covet"
- @deva[अहिं वञ्चयति] "he avoids the snake"

**@deva[प्रलम्भन] defined:** Deception, cheating, misleading someone. The causative root shifts from "making someone covet/move" to "tricking someone" — a meaning-specific @deva[पद] override.

**@deva[प्रलम्भन] continues:** The deception meaning carries into @ref[1.3.70], where causatives of @deva[ली] also take @deva[आत्मनेपद] in the @deva[प्रलम्भन] sense.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[गृधिवञ्चिप्रलम्भने] — after causatives of @deva[गृध्]/@deva[वञ्च्] meaning @deva[प्रलम्भन], @deva[आत्मनेपद].

**Causative meaning shift:** @deva[गृध्] primitively means "to covet"; its causative means "to make covet" or, metaphorically, "to deceive (by creating false desire)." @deva[वञ्च्] primitively means "to go/move"; its causative means "to make move" or "to deceive (by leading astray)." Only the @deva[प्रलम्भन] sense triggers @deva[आत्मनेपद].

**@deva[प्रलम्भन] as @deva[अनुवृत्ति]:** The deception meaning carries into @ref[1.3.70] via the @deva[च] particle, which adds @deva[प्रलम्भन] to the three senses listed there for @deva[ली].

**Semantic motivation:** Deception is inherently self-interested — the deceiver acts for his own benefit through misleading another. This self-directed quality motivates @deva[आत्मनेपद].

**Causative subsection position:** Third of four causative-specific rules. @ref[1.3.67] (general), @ref[1.3.68] (@deva[भी]/@deva[स्मि]), @ref[1.3.69] (this: @deva[गृध्]/@deva[वञ्च्]), @ref[1.3.70] (@deva[ली]).
"""

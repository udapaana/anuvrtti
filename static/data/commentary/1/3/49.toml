id = "1.3.49"
numericId = "13049"

[en]
simple = """
The verb @deva[वद्] "to speak" takes @deva[आत्मनेपद] when preceded by @deva[अनु], used without an object, and meaning "to echo" or "to imitate speech."

**@deva[आत्मनेपद] (echoing):**
- @deva[अनुवदते कठः कलापस्य] "the @deva[कठ] student echoes the @deva[कलाप] student"

**@deva[परस्मैपद] — conditions not met:**
- @deva[पूर्वमेव यजुः उदितम् अनुवदति] "he repeats the @deva[यजुर्वेद] (that he learned)" — transitive (has an object)
- @deva[अनुवदति वीणा] "the lute resounds" — not articulate speech (a musical instrument)

The speaker must be capable of articulate speech (@deva[व्यक्तवाच्], continuing from @ref[1.3.48]) and the verb must be intransitive.
"""

standard = """
After @deva[अनु] + @deva[वद्] used intransitively meaning @deva[सदृशोच्चारण] (speaking similarly, echoing), @deva[आत्मनेपद].

**@deva[आत्मनेपद] (echoing — intransitive):**
- @deva[अनुवदते कठः कलापस्य] "the @deva[कठ] imitates the @deva[कलाप]'s speech"

**@deva[परस्मैपद] — transitive:**
- @deva[यजुः अनुवदति] "he repeats the @deva[यजुस्]" (object present)

**@deva[परस्मैपद] — not @deva[व्यक्तवाच्]:**
- @deva[अनुवदति वीणा] "the lute resounds" (instrument, not articulate speech)

**Three conditions:**
1. @deva[अनु] prefix present
2. @deva[अकर्मक] — intransitive (no direct object)
3. @deva[व्यक्तवाच्] — articulate speaker (continues from @ref[1.3.48])

**@deva[अनु] = "similarly":** The prefix conveys imitation or echoing — speaking in the same manner as another, not simple repetition of a text.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[व्यक्तवाचाम्] from @ref[1.3.48].

@deva[अनुपूर्वस्याकर्मकात् सदृशोच्चारणे] — after @deva[अनु] + @deva[वद्] intransitively meaning "speaking similarly," @deva[आत्मनेपद].

**Triple condition:** This rule requires: (1) @deva[अनु] prefix, (2) intransitive use, (3) @deva[व्यक्तवाच्] (from @ref[1.3.48]). If any fails, @deva[परस्मैपद] applies.

**@deva[सदृशोच्चारण] vs. repetition:** @deva[सदृशोच्चारण] is imitative speech — echoing another's manner of speaking. This differs from @deva[पुनरुक्ति] (simple repetition of a text), which is transitive (@deva[यजुः अनुवदति]) and takes @deva[परस्मैपद].

**@deva[व्यक्तवाच्] as @deva[अनुवृत्ति]:** The articulate-speech condition from @ref[1.3.48] carries into both @ref[1.3.49] (this) and @ref[1.3.50]. A lute (@deva[वीणा]) or animal cannot "echo" in the relevant sense.

**@deva[वद्]-series position:** Third of four rules. @ref[1.3.47] (six senses), @ref[1.3.48] (chorus), @ref[1.3.49] (this: echoing), @ref[1.3.50] (contradiction, optional).
"""

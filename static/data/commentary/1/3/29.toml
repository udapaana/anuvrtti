id = "1.3.29"
numericId = "13029"

[en]
simple = """
Seven verbs — @deva[गम्] "to go," @deva[ऋच्छ्] "to go / become hard," @deva[प्रच्छ्] "to ask," @deva[स्वर्] "to sound," @deva[ऋ] "to go," @deva[श्रु] "to hear," @deva[विद्] "to know" — take @deva[आत्मनेपद] when preceded by @deva[सम्] and used without an object.

**@deva[आत्मनेपद] (intransitive):**
- @deva[संगच्छते] "they come together, agree"
- @deva[संपृच्छते] "he greets, inquires after"
- @deva[संविदते] "he knows together"

**@deva[परस्मैपद] (transitive):**
- @deva[ग्रामं संगच्छति] "he goes to the village"

This is the last rule where the intransitivity condition from @ref[1.3.26] applies.
"""

standard = """
After @deva[सम्] + @deva[गम्]/@deva[ऋच्छ्]/@deva[प्रच्छ्]/@deva[स्वर्]/@deva[ऋ]/@deva[श्रु]/@deva[विद्] used intransitively, @deva[आत्मनेपद].

**Examples — @deva[आत्मनेपद]:**
- @deva[संगच्छते] "they meet, agree"
- @deva[समृच्छते] "he falls in with"
- @deva[संपृच्छते] "he inquires"
- @deva[संस्वरते] "they sound together"
- @deva[संश्रूयते] "it is heard"
- @deva[संवित्ते] "he knows"

**Transitive — @deva[परस्मैपद]:**
- @deva[ग्रामं संगच्छति] "he goes to the village"

**@deva[ऋ] restriction:** @deva[ऋ] (from @deva[भ्वादि] and @deva[जुहोत्यादि]) takes @deva[आत्मनेपद] only in @deva[लुङ्]: @deva[समरन्त] "they went together."

**@deva[वार्त्तिक] — @deva[दृश्] extension:** @deva[सम्] + @deva[दृश्] intransitively also takes @deva[आत्मनेपद]: @deva[संपश्यते] "he sees (intransitively)." Transitive: @deva[ग्रामं संपश्यति] — @deva[परस्मैपद].

**End of @deva[अकर्मक] section:** This is the last rule governed by the intransitivity condition from @ref[1.3.26]. From @ref[1.3.30] onward, @deva[अकर्मक] no longer applies.
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12]; @deva[अकर्मकात्] from @ref[1.3.26].

@deva[समो गम्यृच्छिप्रच्छिस्वरत्यर्तिशृविदिभ्यः] — after @deva[सम्] + these seven roots used intransitively, @deva[आत्मनेपद].

**Seven roots, one prefix:** @deva[पाणिनि] groups all @deva[सम्]-prefixed roots requiring the @deva[अकर्मक] condition into a single rule. Each root shifts meaning with @deva[सम्]: @deva[गम्] → "meet/agree," @deva[प्रच्छ्] → "greet," @deva[विद्] → "know jointly," etc. The intransitive uses denote states or mutual actions whose results stay with the agent.

**@deva[ऋ] in @deva[लुङ्] only:** @deva[ऋ] appears in both @deva[भ्वादि] and @deva[जुहोत्यादि] @deva[गण]s. Its @deva[आत्मनेपद] with @deva[सम्] is restricted to @deva[लुङ्]: @deva[सम् + ऋ + अङ् + त] → @deva[समृत]; plural @deva[समरन्त] (by @ref[7.4.16]).

**@deva[विद्] specification:** Must be @deva[विद्] "to know" (@deva[अदन्त], @deva[अदादिगण]), not @deva[विद्] "to acquire" (@deva[तुदादिगण]).

**@deva[वार्त्तिक] — @deva[दृश्] addition:** @deva[सम्] + @deva[दृश्] intransitively → @deva[आत्मनेपद]: @deva[संपश्यते]. Transitive: @deva[ग्रामं संपश्यति] — @deva[परस्मैपद]. This supplements the @deva[सूत्र]'s list by one root.

**@deva[अकर्मक] section complete:** @ref[1.3.26]–@ref[1.3.29] form a block of four rules governed by the intransitivity condition. @ref[1.3.30] opens a new section where @deva[आत्मनेपद] applies regardless of transitivity, since @deva[ह्वे] is @deva[ञित्] (@deva[उभयपदिन्]) and the prefix simply overrides the @deva[स्वार्थ] condition.
"""

id = "1.3.64"
numericId = "13064"

[en]
simple = """
The verb @deva[युज्] "to join, to yoke" takes @deva[आत्मनेपद] when preceded by @deva[प्र] or @deva[उप] — except when referring to sacrificial vessels.

**@deva[आत्मनेपद] (yoking, employing, using):**
- @deva[प्रयुङ्क्ते] "he yokes, employs"
- @deva[उपयुङ्क्ते] "he uses"

**@deva[परस्मैपद] (sacrificial vessels):**
- @deva[द्वन्द्वं न्यञ्चि पात्राणि प्रयुनक्ति] "he prepares the sacrificial vessels"

In all other contexts with @deva[प्र] or @deva[उप], @deva[आत्मनेपद] applies even when the action benefits someone else.
"""

standard = """
After @deva[प्र]/@deva[उप] + @deva[युज्] (not with sacrificial vessels), @deva[आत्मनेपद] — even when the fruit does not accrue to the agent.

**@deva[आत्मनेपद]:**
- @deva[प्रयुङ्क्ते] "he employs/yokes"
- @deva[उपयुङ्क्ते] "he uses/enjoys"

**Exception — sacrificial vessels → @deva[परस्मैपद]:**
- @deva[चमसान् प्रयुनक्ति] "he prepares the cups"
- @deva[पात्राणि प्रयुनक्ति] "he prepares the vessels"

**@deva[युजिर्] is @deva[स्वरितेत्]:** Being @deva[स्वरितेत्], @deva[युज्] is @deva[उभयपदिन्] by @ref[1.3.72] — @deva[आत्मनेपद] when the agent benefits. This rule extends @deva[आत्मनेपद] to all uses with @deva[प्र]/@deva[उप] (overriding the @deva[स्वार्थ] condition), except for the ritual context.

**@deva[वार्त्तिक] — broader prefix coverage:** All @deva[उपसर्ग]s except @deva[सम्], @deva[निर्], and @deva[दुर्] trigger @deva[आत्मनेपद]: @deva[उद्युङ्क्ते], @deva[नियुङ्क्ते]. With @deva[सम्]/@deva[निर्]/@deva[दुर्]: @deva[संयुनक्ति] — @deva[परस्मैपद].
"""

advanced = """
@deva[अनुवृत्ति]: @deva[आत्मनेपदम्] from @ref[1.3.12].

@deva[प्रोपाभ्यां युजेरपात्रे] — after @deva[प्र]/@deva[उप] + @deva[युज्] (not with sacrificial vessels), @deva[आत्मनेपद].

**Ritual exception:** @deva[अपात्रे] excludes the context of preparing/arranging sacrificial vessels (@deva[पात्र]). In Vedic ritual, the arrangement of cups and vessels is a formal, outward-directed activity — not self-benefiting — hence @deva[परस्मैपद].

**@deva[स्वरितेत्] override:** @deva[युजिर्] (@deva[योगे]) is @deva[स्वरितेत्], making it @deva[उभयपदिन्] by @ref[1.3.72] with the @deva[स्वार्थ] condition. This rule removes the @deva[स्वार्थ] restriction for @deva[प्र] and @deva[उप] — @deva[आत्मनेपद] becomes unconditional (except for vessels).

**@deva[वार्त्तिक] — prefix generalization:** The @deva[वार्त्तिक] extends @deva[आत्मनेपद] to all @deva[उपसर्ग]s beginning or ending with a vowel — effectively all except @deva[सम्], @deva[निर्], and @deva[दुर्] (which are consonant-final/initial). This significantly broadens the @deva[सूत्र]'s scope.

**Which @deva[युज्]?** @deva[युजिर् योगे] (@deva[रुधादि], 7th class) — "to join/yoke." Not @deva[युज् समाधौ] (@deva[दिवादि], 4th class) — "to meditate."
"""

id = "6.4.43"
numericId = "64043"

[en]
simple = """
For roots @deva[जन्], @deva[सन्], and @deva[खन्], the substitution of long @deva[आ] is optional before affixes beginning with @deva[य] that are marked @deva[क्] or @deva[ङ्]. So both @deva[जायते] (with @deva[आ]) and @deva[जन्यते] (without) are correct.
"""

standard = """
Before @deva[य]-initial affixes marked @deva[कित्]/@deva[ङित्] (such as the Passive @deva[यक्] and Intensive @deva[यङ्]), @deva[जन्], @deva[सन्], and @deva[खन्] optionally substitute @deva[आ] for the nasal. Thus @deva[जायते] or @deva[जन्यते] (Passive); @deva[जाजायते] or @deva[जञ्जन्यते] (Intensive). The @deva[विभाषा] applies equally to both @deva[यक्] and @deva[यङ्] environments. See @ref[6.4.43].
"""

advanced = """
Long @deva[आ] optionally substitutes for the final nasal of @deva[जन्], @deva[सन्], and @deva[खन्] before @deva[य]-initial affixes marked @deva[कित्] or @deva[ङित्]. With @deva[यक्] (passive): @deva[जायते] or @deva[जन्यते]; @deva[सायते] or @deva[सन्यते]; @deva[खायते] or @deva[खन्यते]. With @deva[यङ्] (intensive): @deva[जाजायते] or @deva[जज्जन्यते]; @deva[सासायते] or @deva[संसन्यते]; @deva[चाखायते] or @deva[चङ्खन्यते]. Before the @deva[विकरण] @deva[श्यन्] of the 4th conjugation (which is @deva[ङित्] by @ref[1.2.4]), @deva[जा] is invariably substituted for @deva[जन्] by @ref[7.3.79] — no option is permitted there.
"""

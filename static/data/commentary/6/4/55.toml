id = "6.4.55"
numericId = "64055"

[en]
simple = """
Before certain suffixes — @deva[आम्], @deva[अन्त], @deva[आलु], @deva[आय्य], @deva[इत्नु], @deva[इष्णु] — the @deva[इ] of a causative @deva[णि] is replaced by @deva[अय्]. This @deva[अय्] substitution is what gives causative verbs their recognizable '-aya-' shape in many derived forms. Example: @deva[कारि + आम्] → @deva[कारयाम्] → @deva[कारयां चकार]; @deva[स्पृह् + आलु] → @deva[स्पृहयालुः] ('desirous').
"""

standard = """
The rule substitutes @deva[अय्] for @deva[इ] of @deva[णि] (causative marker) before the affixes @deva[आम्], @deva[अन्त], @deva[आलु], @deva[आय्य], @deva[इत्नु], and @deva[इष्णु]. This @deva[अय्] then combines with the preceding base vowel (already @[vṛddhi-strengthened]) to produce the '-aya-' sequence visible in periphrastic and participial causatives. Examples: @deva[कारयां चकार] (periphrastic perfect), @deva[हारयां चकार]; @deva[गण्डयन्तः] (present participle); @deva[स्पृहयालुः] 'desirous'. Compare @ref[6.4.56] where the same substitution applies before @deva[ल्यप्] under additional conditions.
"""

advanced = """
@deva[अय्] replaces the @deva[इ] of @deva[णि] before the affixes @deva[आम्], @deva[अन्त], @deva[आलु], @deva[आय्य], @deva[इत्नु], and @deva[इष्णु]. Examples: @deva[कारयां] @deva[चकार], @deva[हारयां] @deva[चकार]; @deva[गण्डयन्तः], @deva[मण्डयन्तः] (formed with @[uṇādi] affix @deva[झच्], where @deva[झ] = @deva[अन्त], added to @deva[गंड] and @deva[मंड]); @deva[स्पृहयालुः] (with @deva[आलु]); @deva[स्पृहयाय्यः], @deva[गृहयाय्यः] (with @deva[आय्य]); @deva[स्तनायत्नुः] (with @deva[इत्नु]); @deva[पोषयिष्णुः] (with @deva[इष्णु]). Strictly, this @[sūtra] is dispensable: @deva[इ] of @deva[णि] would undergo @[guṇa] to @deva[ए], then resolve to @deva[अय्] by @[sandhi] before these affixes. The explicit teaching here serves the subsequent @[sūtra], where no @[sandhi] rule could produce the @deva[अय्] substitution.
"""

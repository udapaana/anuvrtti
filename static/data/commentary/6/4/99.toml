id = "6.4.99"
numericId = "64099"

[en]
simple = """
In Vedic Sanskrit, the root vowel of @deva[तन्] ('to stretch') and @deva[पत्] ('to fall') is elided before a vowel-initial @deva[आर्धधातुक] affix that bears indicatory @deva[क्] or @deva[ङ्]. This elision is Vedic-only; classical Sanskrit shows different forms. Example: @deva[वि + तन् + इरे] → @deva[वितत्निरे] (Vedic perfect 3pl); @deva[पत् + इमः] → @deva[पप्तिमः].
"""

standard = """
A Vedic rule elides the internal vowel of @deva[तन्] and @deva[पत्] before @deva[क्]/@deva[ङ्]-marked @deva[आर्धधातुक] affixes beginning with a vowel. After elision, the remaining consonants form a cluster: @deva[तन्] → @deva[त्न्], @deva[पत्] → @deva[प्त्]. Vedic attestations: @deva[वितत्निरे कवयः] (Rigveda), @deva[पप्तिमः]. Classical Sanskrit: @deva[वितेनिरे], @deva[पेतिमः] — no elision, @[guṇa] applies instead.
"""

advanced = """
In the @deva[छन्दस्] (Vedas) the root-vowel of @deva[तन्] and @deva[पत्] is elided before an affix beginning with a vowel, when it has an indicatory @deva[क्] or @deva[ङ्] @deva[।] As @deva[वितत्निरे] @deva[कवयः], @deva[शकुना] @deva[इव] @deva[पप्तिमः] @deva[॥] In secular language @deva[वितेनिरे], @deva[पेतिम्] @deva[॥]
"""

id = "6.4.79"
numericId = "64079"

[en]
simple = """
The word '@deva[स्त्री]' gets an @deva[इयङ्-आदेश] when followed by an @deva[अजादि] @deva[प्रत्यय].
"""

standard = """
@deva[इयङ्] for @deva[ई] of @deva[स्त्री] before vowel. @deva[स्त्रियौ], @deva[स्त्रियः].
"""

advanced = """
@deva[इवङ्] is substituted for the @deva[ई] of @deva[स्त्री] before an affix beginning with a vowel. As @deva[स्त्री], @deva[स्त्रियौ], @deva[स्त्रियः]; but @deva[स्त्रीणाम्] the @deva[न्] being added by a subsequent rule, supersedes this rule. The making this a separate @[sutra] is for the sake of the subsequent aphorisms.
"""

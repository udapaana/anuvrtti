id = "6.4.118"
numericId = "64118"

[en]
simple = """
The last letter of @deva[हा] is removed when followed by a @deva[यकारादि] @deva[प्रत्यय].
"""

standard = """
Final of @deva[हा] elided before @deva[य्]-initial @[sārvadhātuka] @deva[क्]/@deva[ङित्]. @deva[जह्यात्], @deva[जह्युः].
"""

advanced = """
The final vowel of the stem of @deva[हा] (@deva[जुहोत्यादिगणः], 3rd conjugation) is elided before a @deva[य्]-initial @deva[सार्वधातुक] @deva[कित्] or @deva[ङित्] affix. Forms: @deva[जह्यात्], @deva[जह्याताम्], @deva[जह्युः].
"""

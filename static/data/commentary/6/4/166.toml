id = "6.4.166"
numericId = "64166"

[en]
simple = """
When the @deva[इन्] ending of a stem is preceded by a conjunct consonant (a cluster of two or more consonants), the @deva[इन्] remains unchanged before the @deva[तद्धित] @deva[अण्] affix. So @deva[शाङ्किन्] (preceded by @deva[ङ्क्]) gives @deva[शाङ्किनः], @deva[यद्रिन्] gives @deva[याद्रिणः], and @deva[वज्जिन्] gives @deva[वाज्जिणः]. The presence of a consonant cluster protects the @deva[इन्] from alteration.
"""

standard = """
This rule states that when the @deva[इन्]-final @deva[भ] stem has a conjunct consonant (@deva[संयुक्त]) immediately preceding @deva[इन्], the @deva[इन्] is retained intact before @deva[अण्], whether Patronymic or otherwise. The conditioning environment is: @deva[भ] stem + @deva[इन्] preceded by @deva[संयुक्त व्यञ्जन] + @deva[अण्] following. Forms: @deva[शाङ्किनः] (from @deva[शाङ्किन्] with cluster @deva[ङ्क्]); @deva[याद्रिणः] (from @deva[याद्रिन्] with @deva[द्र्]); @deva[वाज्जिणः] (from @deva[वाज्जिन्] with @deva[ज्ज्]). The rule thus creates a phonological blocking condition: consonant-cluster environments shield the @deva[इन्] from the changes that @deva[अण्] would otherwise trigger.
"""

advanced = """
The @deva[इन्] of a stem ending in @deva[इन्] remains unchanged before @deva[अण्] when preceded by a conjunct consonant. Examples: @deva[शाङ्किनेऽपत्यं] = @deva[शाङ्किनः], @deva[याद्रिणः], @deva[वाज्जिणः].
"""

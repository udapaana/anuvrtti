id = "6.4.144"
numericId = "64144"

[en]
simple = """
The @deva[टिसंज्ञक] of a @deva[नकारान्त] @deva[भसंज्ञक] @deva[अङ्ग] is removed when followed by a @deva[तद्धितप्रत्यय].
"""

standard = """
@deva[न्]-ending @deva[भ]: @deva[अन्] elided before taddhita. @deva[आग्निशर्मिः] (from @deva[अग्निशर्मन्]).
"""

advanced = """
The @deva[टि] (final @deva[न्] with the vowel preceding it) of a @deva[भ] stem ending in @deva[न्] is elided before a @deva[तद्धित] affix. Examples: @deva[आग्निशर्म्मिः], @deva[औडुलोमिः], @deva[सारलोमिः] — from @deva[अग्निशर्मन्], @deva[उडुलोमन्], @deva[सरलोमन्] with @deva[इञ्] (by @ref[4.1.96]). The restriction to @deva[न्]-final: @deva[सात्वतः] (not @deva[न्]-final, no @deva[टि] elision). The restriction to @deva[तद्धित]: @deva[शर्मणा], @deva[शर्मणे] (case affixes, not @deva[तद्धित]). @[vārtika]: @deva[टि] elision before @deva[तद्धित] also applies to: (1) @deva[सब्रह्मचारिन्] → @deva[साब्रह्मचाराः] (by @ref[4.3.120]), (2) @deva[पीठसर्पिन्] → @deva[पैठसर्पाः] (by @ref[4.3.120]), (3) @deva[कलापिन्] → @deva[कालापाः] (by @ref[4.3.108], @ref[4.2.59]), (4) @deva[कुथुमिन्] → @deva[कौथुमाः] (by @ref[4.3.101]), (5) @deva[तैतिलिन्] → @deva[तैतिलाः] (by @ref[4.3.116]), (6) @deva[जाजलिन्] → @deva[जाजलाः] (by @ref[4.2.59]), (7) @deva[लाङ्गलिन्] → @deva[लाङ्गलाः], (8) @deva[शिलालिन्] → @deva[शैलालाः], (9) @deva[शिखण्डिन्] → @deva[शैखण्डाः], (10) @deva[सुकरसद्मन्] → @deva[सौकर] @deva[सद्माः], (11) @deva[सुपर्वन्] → @deva[सौपर्वाः]. Those ending in @deva[इन्] elide @deva[इन्] despite @ref[6.4.164]; those in @deva[अन्] contradict @ref[6.4.167]. @[vārtika]: @deva[अश्मन्] loses @deva[अन्] before a @deva[तद्धित] meaning "prepared therewith" — @deva[आश्मः]; otherwise @deva[आश्मनः]. @[vārtika]: @deva[चर्मन्] loses @deva[अन्] when meaning "sheath/purse" — @deva[चार्म] @deva[कोशः] (by @ref[4.3.134]); otherwise @deva[चार्मणः]. @[vārtika]: @deva[श्वन्] loses @deva[अन्] when the sense is "to contract" — @deva[शौवः] @deva[संकोचः] (by @ref[4.3.120]); otherwise @deva[शौवनः]. @[vārtika]: indeclinables undergo @deva[टि] elision — @deva[सायंप्रातिकः], @deva[पौनः] @deva[पुनिकः], @deva[बाह्यः], @deva[कौतस्कुतः] (with @deva[ठञ्] by @ref[4.3.11]). But not before @deva[व्यु] and @deva[व्युल्]: @deva[आरातीयः], @deva[शाश्वतिकः]. Pāṇini himself demonstrates the exception for @deva[शाश्वतिक] by using it in @ref[2.4.9]; similarly @deva[शाश्वतम्].
"""

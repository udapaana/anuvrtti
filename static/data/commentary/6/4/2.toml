id = "6.4.2"
numericId = "64002"

[en]
simple = """
When a verb root undergoes @deva[सम्प्रसारण] — where a semivowel (@deva[य्], @deva[व्], @deva[र्], @deva[ल्]) is replaced by its corresponding vowel (@deva[इ], @deva[उ], @deva[ऋ], @deva[ऌ]) — the resulting vowel at the end of the stem is lengthened if a consonant of that same stem precedes it. For example: root @deva[ह्वा] 'to call' → semivowel @deva[व्] becomes @deva[उ] → preceded by stem consonant @deva[ह्] → lengthened to @deva[ऊ] → past passive @deva[हूतः] 'called'.
"""

standard = """
@[sūtra] @ref[6.4.2] states that a @deva[सम्प्रसारण] vowel (a short vowel substituted for a semivowel by @ref[6.1.17]) at the end of an @deva[अङ्ग] is lengthened when preceded by a consonant belonging to that same stem. The @deva[अङ्गस्य] @[adhikāra] from @ref[6.4.1] applies. Derivation: @deva[ह्वा] + @deva[क्त] → @deva[ह्] + @deva[उ] + @deva[त] (@[samprasāraṇa] of @deva[व्] by @ref[6.1.17]) → @deva[ह] + @deva[ऊ] + @deva[त] (lengthening here, @deva[ह्] is a stem consonant) → @deva[हूत] → @deva[हूतः]. Similarly @deva[ज्या] → @deva[जीतः] (@deva[य्] → @deva[इ] → @deva[ई]), @deva[व्या] → @deva[संवीतः]. Contrast: @deva[उ] + @deva[त] (root @deva[ऊ] 'to protect') — the @[samprasāraṇa] vowel has no preceding stem consonant, so no lengthening: @deva[उतः].
"""

advanced = """
The @deva[दीर्घ] substitute replaces a @deva[सम्प्रसारण] vowel (@deva[अ], @deva[इ], or @deva[उ]) at the end of an @deva[अङ्ग] when preceded by a consonant belonging to that stem. Both @deva[दीर्घ] and @deva[अण्] carry over from @ref[6.3.111], and @deva[संप्रसारण] from @ref[6.3.139]. Examples: @deva[हूतः] from @deva[ह्वा], @deva[जीनः] from @deva[ज्या], @deva[संवीतः] from @deva[व्या]. The condition 'preceded by a consonant' excludes @deva[उतः] and @deva[उतवान्] from @deva[वेञ्], where no stem consonant precedes the @deva[सम्प्रसारण] vowel. The requirement that the preceding consonant belong to the stem excludes @deva[निरुतम्], where @deva[र] belongs to the @deva[उपसर्ग] @deva[निर्], not the @deva[अङ्ग] — hence @deva[उ] is not lengthened. The condition 'at the end of a stem' excludes @deva[विद्धः] and @deva[विचितः] from @deva[व्यध्] and @deva[व्यच्], where @deva[इ] is stem-medial. The restriction to @deva[अ], @deva[इ], and @deva[उ] (substitutes of semivowels) excludes @deva[तृतीयः], where @deva[त्रि] vocalises to @deva[तृ] (@deva[ऋ] replacing @deva[र्] before affix @deva[तीय], @ref[5.2.55]) — @deva[ऋ] does not undergo lengthening. Alternatively, the absence of lengthening in @deva[तृतीय] is an irregularity sanctioned by the @deva[सूत्रकार] himself, as in @ref[2.1.30]. The word @deva[अङ्ग] must be read twice in this @deva[सूत्र]: once to qualify @deva[हल्] (the preceding consonant), and once to qualify the @deva[सम्प्रसारण] vowels @deva[अ], @deva[इ], @deva[उ].
"""

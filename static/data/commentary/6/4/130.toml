id = "6.4.130"
numericId = "64130"

[en]
simple = """
The @deva[भसंज्ञक] @deva[अङ्ग] of the word @deva[पाद्] gets @deva[पद्] as @deva[आदेश].
"""

standard = """
@deva[पाद] → @deva[पद्] when @deva[भ]. @deva[द्विपदः], @deva[त्रिपदा].
"""

advanced = """
@deva[पद्] replaces @deva[पाद] when the stem is @deva[भ]. The substitute replaces the entire form @deva[पाद्], not just the final, by the maxim @deva[निर्दिश्यमानस्यादेशा] @deva[भवन्ति] ("substitutes replace what is actually enunciated"). Examples: @deva[द्विपदः] @deva[पश्य], @deva[द्विपदा], @deva[द्विपदे], @deva[द्विपदिकां] @deva[ददाति] (by @ref[5.4.1]), @deva[त्रिपदिकां] @deva[ददाति], @deva[वैयाघ्रपद्यः].
"""

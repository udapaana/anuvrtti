id = "6.4.159"
numericId = "64159"

[en]
simple = """
After @deva[बहु] ("many"), the superlative suffix @deva[इष्ठ] takes an additional augment @deva[यिट्], and @deva[बहु] is replaced by @deva[भू]. The result is @deva[भूयिष्ठः] ("most/very many"). This parallels the treatment of @deva[बहु] before @deva[इमन्] and @deva[ईयस्] in the preceding rule.
"""

standard = """
For the superlative suffix @deva[इष्ठ] after @deva[बहु]: (1) the augment @deva[यिट्] is inserted before @deva[इष्ठ], and (2) the base @deva[बहु] is replaced by @deva[भू]. The augment @deva[यिट्] supplies the intervening @deva[य्] to yield @deva[भू-य-इष्ठ] → @deva[भूयिष्ठः] ("most"). This rule is the @deva[इष्ठ] counterpart to the @deva[इमन्]/@deva[ईयस्] treatment of @deva[बहु] in the preceding rule, and together they account for all three degree-suffix formations with @deva[बहु]. The substitution @deva[भू] for @deva[बहु] is suppletive.
"""

advanced = """
After @deva[बहु] , the augment @deva[यिट्] is added to @deva[इष्ठ] and @deva[भू] is the substitute of @deva[बहु]@deva[।] As @deva[भूयिष्ठः] @deva[॥] This augment @deva[यिट्] debars the @[lopa] substitution, of the last @[sutra], in the case of @deva[इष्ठ] @deva[॥] The @deva[इ] in @deva[यिट्] is for the sake of pronunciative, the augment being @deva[य] @deva[॥] Or @deva[इष्ठ] may be taken to have lost its @deva[इ] by the foregoing @[sutra], and to the @deva[ष्ठ], the augment @deva[यि] may be added.
"""

id = "6.4.18"
numericId = "64018"

[en]
simple = """
The @deva[उपधा] letter of the verb-root '@deva[क्रम्]' undergoes an optional @deva[दीर्घादेश] when followed by a @deva[झलादि] @deva[क्त्वा] @deva[प्रत्यय].
"""

standard = """
@deva[क्रम्] penultimate optionally lengthened before @[iṭ-less] @deva[क्त्वा]. @deva[क्रान्त्वा] or @deva[क्रन्त्वा].
"""

advanced = """
The @deva[उपधा] of @deva[क्रम्] is optionally lengthened before @deva[क्त्वा] without @deva[इट्]: @deva[क्रन्त्वा] or @deva[क्रान्त्वा]. With the @deva[इट्] augment, only @deva[क्रमित्वा] is possible. When @deva[क्त्वा] is replaced by @deva[ल्यप्], the rule does not apply: @deva[प्रक्रम्य], @deva[उपक्रम्य]. This follows the maxim @deva[अन्तरङ्गानपि] @deva[विधीन्] @deva[बहिरङ्गोल्यप्] @deva[बाधते] — the @deva[बहिरङ्ग] substitution of @deva[ल्यप्] supersedes even @deva[अन्तरङ्ग] rules.
"""

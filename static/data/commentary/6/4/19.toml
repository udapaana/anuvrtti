id = "6.4.19"
numericId = "64019"

[en]
simple = """
The last '@deva[त्छ्]' of an @deva[अङ्ग] is converted to '@deva[श्]', and the last '@deva[व्]' of an @deva[अङ्ग] is converted to '@deva[ऊठ्]' when followed by an @deva[अनुनासिकादि] or @deva[झलादि] @deva[प्रत्यय] that is either @deva[कित्] or @deva[ङित्] @deva[।]
"""

standard = """
@deva[च्छ] → @deva[श्], @deva[व] → @deva[ऊठ्] before nasal-initial and @deva[क्वि]/@deva[झलादि] @deva[क्]/@deva[ङित्]. @deva[प्रश्नः], @deva[स्थोनः].
"""

advanced = """
@deva[श्] substitutes for @deva[च्छ] (including the @deva[तुक्] augment), and @deva[ऊठ्] substitutes for @deva[व्], before nasal-initial affixes as well as before @deva[क्वि] and @deva[झलादि] @deva[कित्]/@deva[ङित्] affixes (continuing from @ref[6.4.15]). @deva[च्छ] → @deva[श्]: @deva[प्रश्नः] and @deva[विश्नः] from @deva[प्रच्छ] and @deva[विच्छ] with affix @deva[नङ्] (@ref[3.3.90]). @deva[व्] → @deva[ऊठ्]: from root @deva[सिव्] — @deva[सिव्] + @deva[न] (@deva[उणादि] III.9) = @deva[सि] + @deva[ऊ] + @deva[न] = @deva[स्थू] + @deva[न] = @deva[स्थोनः] (@ref[7.3.84]). The @deva[ऊ] substitution must precede @deva[गुण] (@ref[7.3.86]); otherwise the derivation would yield @deva[सिव्] + @deva[न] = @deva[सेव्] + @deva[न] = @deva[से] + @deva[ऊ] + @deva[न]. With @deva[ऊ] already substituted, @deva[सन्धि] produces @deva[सि] + @deva[ऊ] = @deva[स्थू], since semivowel substitution is @deva[अन्तरङ्ग] and of wider scope than @deva[गुण]; the maxim @deva[वार्णादाङ्ग] @deva[बलीयो] @deva[भवति] ('an @deva[अङ्ग] operation is stronger than a @deva[सन्धि] operation') does not apply here. Before @deva[क्वि]: @deva[शब्दप्राश्] (from @deva[प्रच्छ] + @deva[क्विप्], @deva[उणादि] II.57 — no @deva[सम्प्रसारण] of @deva[र], @deva[अ] lengthened, @deva[च्छ] → @deva[श]); similarly @deva[गोविश्]. For @deva[व] → @deva[ऊ] before @deva[क्वि]: @deva[अक्षद्यूः], @deva[हिरण्यद्यूः] (@deva[दिव्] + @deva[क्विप्] = @deva[दि] + @deva[ऊ] = @deva[द्यूः]). Here the @deva[ऊ] substitution is @deva[बहिरङ्ग], and @deva[इ] → @deva[य] is @deva[अन्तरङ्ग]; by the maxim @deva[असिद्धं] @deva[बहिरङ्गमन्तरङ्गे], @deva[ऊ] should be treated as non-existent, blocking @deva[य]-substitution. However, this maxim is overridden by @deva[नाजानन्तर्ये] @deva[बहिष्ट्व] @deva[प्रक्लृप्तिः] — a @deva[बहिरङ्ग] operation is not so treated when the @deva[अन्तरङ्ग] operation depends on the immediate adjacency of a vowel and another element. Before @deva[झलादि] affixes: @deva[प्रच्छ] + @deva[क्त] = @deva[पृष्टः], @deva[पृष्टवान्] (@deva[क्तवतु]), @deva[पृष्ट्वा] (@deva[क्त्वा]) — @deva[च्छ] → @deva[श], @deva[सम्प्रसारण] by @ref[6.1.16], @deva[श] → @deva[ष] by @ref[8.2.36]. Similarly @deva[व] → @deva[ऊ]: @deva[द्यूतः], @deva[द्यूतवान्], @deva[द्यूत्वा]. When affixes are neither @deva[कित्] nor @deva[ङित्], the rule does not apply: @deva[द्युभ्याम्], @deva[द्युभिः]. Some do not read @deva[कित्]/@deva[ङित्] into this @deva[सूत्र], explaining @deva[द्युभ्याम्] and @deva[द्युभिः] instead by @ref[6.1.131] (short @deva[उ] for @deva[व] of @deva[दिव्]). In @ref[8.2.36] (@deva[छशां] @deva[ष]), @deva[छ] need not be read, since this @deva[सूत्र] already ordains @deva[श] everywhere in place of @deva[छ]. The @deva[इत्] marker @deva[ठ्] in @deva[ऊठ्] serves to distinguish this @deva[ऊ] in rules like @ref[6.1.89] (@deva[एत्ये] @deva[धत्यूठ्] @deva[सु]); similarly @deva[ठ्] appears in @ref[6.4.132] (@deva[वाह] @deva[ऊंठ्]).
"""

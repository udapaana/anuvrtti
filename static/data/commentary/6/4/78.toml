id = "6.4.78"
numericId = "64078"

[en]
simple = """
An @deva[इवर्ण] and an @deva[उवर्ण] occurring at end of an @deva[अभ्यास] respectively get @deva[इयङ्] and @deva[उवङ्] @deva[आदेश] when followed by an @deva[असवर्ण] letter.
"""

standard = """
@deva[इयङ्]/@deva[उवङ्] for reduplicate @deva[इ]/@deva[उ] before @[non-savarṇa] vowel. @deva[इयेष], @deva[उवोष].
"""

advanced = """
@deva[इयङ्] and @deva[उवङ्] replace the @deva[इ] and @deva[उ] of an @deva[अभ्यास] (reduplicate) before a non-homogeneous (@deva[असवर्ण]) vowel: @deva[इयेष], @deva[उवोष], @deva[इयर्त्ति] (@ref[7.4.77]). Before homogeneous vowels, no substitution: @deva[ईषतुः], @deva[ईषुः], @deva[ऊषतुः], @deva[ऊषुः]. Before non-vowels: @deva[इयाय], @deva[उवाय].
"""

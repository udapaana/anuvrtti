id = "6.4.65"
numericId = "64065"

[en]
simple = """
Before the @deva[कृत्] suffix @deva[यत्] (used to form gerundives meaning 'to be done'), the final @deva[आ] of a verbal stem is replaced by @deva[ई]. This produces the '-eya' ending seen in several Sanskrit gerundives. Example: @deva[दा] → @deva[देयम्] 'to be given'; @deva[धा] → @deva[धेयम्]; @deva[हा] → @deva[हेयम्].
"""

standard = """
The final @deva[आ] of a verbal stem undergoes substitution by @deva[ई] specifically before the @deva[कृत्] affix @deva[यत्] (future passive participle / gerundive). The @deva[ई] + @deva[य] sequence contracts in sandhi to give the characteristic @deva[ए] + @deva[य] = '-eya' pattern. Examples: @deva[दा] → @deva[देयम्] 'to be given', @deva[धा] → @deva[धेयम्] 'to be held', @deva[हा] → @deva[हेयम्] 'to be abandoned', @deva[स्तेन्] → @deva[स्तेयम्] 'theft'. This rule is distinct from the @deva[ई] substitution before @deva[आर्धधातुक] treated in @ref[6.4.66].
"""

advanced = """
The final @deva[आ] of an @deva[अङ्ग] is replaced by @deva[ई] before the @deva[कृत्] affix @deva[यत्]: @deva[देयम्], @deva[धेयम्], @deva[हेयम्], @deva[स्तेयम्]. The resulting @deva[ई] then undergoes @[guṇa] by @ref[7.3.84].
"""

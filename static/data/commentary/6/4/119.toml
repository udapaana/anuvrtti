id = "6.4.119"
numericId = "64119"

[en]
simple = """
The @deva[घु-संज्ञक] verb roots and the verb root @deva[अस्] get an @deva[एकार] as @deva[आदेश] when followed by the '@deva[हि]' @deva[प्रत्यय]. Also, @deva[अभ्यास], if present, is removed.
"""

standard = """
@deva[दा]/@deva[धा] (@deva[घु]): @deva[आ] → @deva[ए] before @deva[हि]; @deva[अस्] @deva[स] → @deva[ए]; reduplicate elided. @deva[देहि], @deva[धेहि], @deva[एधि].
"""

advanced = """
@deva[ए] replaces the final vowel of the @deva[घु] roots @deva[दा] and @deva[धा], and the @deva[स्] of @deva[अस्], before the Imperative ending @deva[हि]; the reduplicated syllable of @deva[दा] and @deva[धा] is simultaneously elided. Forms: @deva[देहि] (from @deva[दा]), @deva[धेहि] (from @deva[धा]), @deva[एधि] (from @deva[अस्] — @deva[स] elided by this rule, @deva[अ] elided by @ref[6.4.111]). The @deva[लोप] prescribed here is treated as having indicatory @deva[श्], so that the entire @[abhyāsa] (not merely its final letter, per @ref[1.1.55]) is elided.
"""

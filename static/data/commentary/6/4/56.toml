id = "6.4.56"
numericId = "64056"

[en]
simple = """
When a causative verb takes the absolutive suffix @deva[ल्यप्] and the root vowel preceding @deva[णि] is light (@deva[लघु]), the @deva[इ] of @deva[णि] is replaced by @deva[अय्]. If the vowel is heavy, no replacement occurs. Example: @deva[प्र + शम् + णि + ल्यप्] → @deva[प्रशमय्य] (light vowel); but @deva[प्रपात्य] from @deva[पा] (heavy vowel).
"""

standard = """
Before the absolutive @deva[ल्यप्], @deva[अय्] replaces @deva[इ] of @deva[णि] when the vowel immediately preceding the causative suffix is @deva[लघु] (short/light). The heavy-vowel condition (as in @deva[पा] → @deva[प्रपात्य]) blocks this substitution because @ref[6.4.92] supplies an alternate treatment. Thus @deva[प्रशमय्य गतः] 'having calmed', @deva[प्रगणय्य] 'having counted'. Compare @ref[6.4.55] for the same @deva[अय्] substitution before @deva[आम्] and similar affixes.
"""

advanced = """
@deva[अय्] replaces the @deva[इ] of @deva[णि] before the absolutive @deva[ल्यप्] when the vowel preceding @deva[इ] is @deva[लघु] (light): @deva[प्रशमय्य] @deva[गतः], @deva[संदमय्य] @deva[गतः], @deva[प्रवेभिदय्य], @deva[प्रगणय्य]. When the preceding vowel is long, @ref[6.4.51] applies instead: @deva[प्रपात्य] @deva[गतः]. The shortening, @deva[य]-elision, and @deva[अ]-elision involved in these derivations must not be treated as @[asiddha], since their loci of operation differ. Derivation: @deva[शम्] + @deva[णिच्] = @deva[शामि]; the @deva[आ] is shortened to @deva[अ] by @ref[6.4.92], yielding @deva[शमि] — this shortening is not @[asiddha], for if it were, no @deva[लघुपूर्व] condition would obtain and this rule could not apply. Similarly, the Intensive root @deva[वेभिद्य] has its @deva[य] elided by @ref[6.4.49]; this elision is not @[asiddha], since otherwise @deva[इ] of @deva[भि] would not count as @deva[लघु]. Likewise, the @deva[अ]-elision in @deva[गण] (a root ending in @deva[अ] — see @deva[धातुपाठ] @deva[चुरादि] 309) is not @[asiddha] for the same reason.
"""

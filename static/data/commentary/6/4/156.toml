id = "6.4.156"
numericId = "64156"

[en]
simple = """
For six adjectives — @deva[स्थूल] ("fat"), @deva[दूर] ("far"), @deva[युवन्] ("young"), @deva[ह्रस्व] ("short"), @deva[क्षिप्र] ("quick"), and @deva[क्षुद्र] ("small") — before the degree suffixes @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्], the final semivowel and whatever follows it are elided, and then the first vowel of the stem undergoes @deva[गुण] strengthening. So @deva[स्थूल] → @deva[स्थविष्ठः] ("fattest") and @deva[दूर] → @deva[दविष्ठः] ("farthest"). The @deva[गुण] step changes @deva[उ] to @deva[अव].
"""

standard = """
For the six stems @deva[स्थूल], @deva[दूर], @deva[युवन्], @deva[ह्रस्व], @deva[क्षिप्र], @deva[क्षुद्र] before @deva[इष्ठ]/@deva[इमन्]/@deva[ईयस्]: (1) the penultimate semivowel (@deva[य्]/@deva[व्]) together with what follows is elided, and (2) the initial vowel of the stem undergoes @deva[गुण] substitution. For @deva[स्थूल] (@deva[स्थ्+ऊ+ल]): semivowel @deva[ल] + what follows elided; @deva[ऊ] → @deva[गुण] @deva[ओ] → [@deva[अव]: @deva[स्थविष्ठः], @deva[स्थवीयान्]. For @deva[दूर]: @deva[दविष्ठः], @deva[दवीयान्]. The combined elision and @deva[गुण] substitution is specific to this set and does not apply to other @deva[ऊ]-final stems.
"""

advanced = """
Before @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्], the last semi-vowel and everything following it is elided, and @[guṇa] replaces the first vowel, in six stems: @deva[स्थूल], @deva[दूर], @deva[युवन्], @deva[ह्रस्व], @deva[क्षिप्र], @deva[क्षुद्र]. The elided portions are: @deva[ल], @deva[र], @deva[वन्], @deva[व], @deva[र], @deva[र] respectively. Forms: @deva[स्थविष्ठः], @deva[स्थवीयान्]; @deva[दविष्ठः], @deva[दवीयान्]; @deva[यविष्ठ], @deva[यवीयान्]; @deva[ह्रसिष्ठः], @deva[ह्रसीयान्], @deva[ह्रसिमा]; @deva[क्षेपिष्ठः], @deva[क्षपीयान्], @deva[क्षेपिमा]. The stems @deva[ह्रस्व], @deva[क्षिप्र], and @deva[क्षुद्र] belong to the @[pṛthvādi] class and take @deva[इमन्] (by @ref[5.1.122]): @deva[क्षोदिष्ठः], @deva[क्षोदायान्], @deva[क्षोदिमा]. The specification @deva[परं] in @deva[यणादिपरं] ("the last semi-vowel") ensures the first semi-vowel of @deva[युवन्] (@deva[य] of @deva[यु]) and @deva[ह्रस्व] (@deva[र] of @deva[ह्र]) is not elided. The word @deva[पूर्व] is used for clarity.
"""

id = "6.4.70"
numericId = "64070"

[en]
simple = """
For root @deva[मा] ('to measure'), the final @deva[आ] may optionally be replaced by short @deva[इ] before the absolutive @deva[ल्यप्]. When the substitution applies, the result ends in @deva[-इत्य]; without it, @deva[आ] is retained. Example: @deva[अप + मा + ल्यप्] → @deva[अपमित्य] or @deva[अपमाय] ('having measured away').
"""

standard = """
This optional (@deva[वा]) rule permits @deva[इ] substitution for the @deva[आ] of @deva[मा] before absolutive @deva[ल्यप्], even though @ref[6.4.69] blocks @deva[ई]-substitution. The result @deva[अपमित्य] (with @deva[इ]) stands alongside the regular @deva[अपमाय] (with @deva[आ] retained). The @deva[त्] of @deva[ल्यप्] then attaches to the @deva[इ], yielding the '-itya' absolutive ending. Note the contrast: @deva[ई] (long) is blocked by @ref[6.4.69], but short @deva[इ] is available optionally under this separate rule.
"""

advanced = """
Short @deva[इ] optionally replaces the final @deva[आ] of @deva[मा] (@deva[मयति]) before @deva[ल्यप्]: @deva[अपमित्य] or @deva[अपमाय].
"""

id = "6.4.27"
numericId = "64027"

[en]
simple = """
When followed by the @deva[घञ्-प्रत्यय] in the meaning of @deva[भाव] or @deva[करण] the @deva[उपधा-नकार] of the verb root @deva[रञ्ज्] is removed.
"""

standard = """
Intensive @deva[य] elided after nasal elision. @deva[बोभूयात्] → @deva[बोभूयात्].
"""

advanced = """
The penultimate nasal of @deva[रञ्ज्] is elided before @deva[घञ्] when the resulting word expresses @deva[भाव] (state) or @deva[करण] (instrument): @deva[रागः] ('passion', 'color', or 'coloring substance'). @deva[आश्चर्यो] @deva[रागः] and @deva[विचित्र] @deva[रागः] denote @deva[भाव]; @deva[रज्यतेऽनेनिति] @deva[रागः] denotes @deva[करण]. The @deva[घञ्] is added by @ref[3.3.121], and @deva[च्] changes to @deva[क्] by @ref[7.3.52]. When the meaning is @deva[अधिकरण] (locus), the nasal is retained: @deva[रङ्गः] = @deva[रजन्ति] @deva[तस्मिन्] ('a theatre').
"""

id = "6.4.97"
numericId = "64097"

[en]
simple = """
The long @deva[आ] of @deva[छादि] (stem of @deva[छद्]) is shortened before the @[unādi] and other affixes @deva[इस्], @deva[मन्], @deva[त्रन्], and @deva[क्वि]. This produces the set of familiar Sanskrit words for 'covering' objects. Example: @deva[छाद् + इस्] → @deva[छदिस्] 'awning/tent'; @deva[छाद् + मन्] → @deva[छद्मन्] 'disguise'; @deva[छाद् + त्रन्] → @deva[छत्रम्] 'umbrella'.
"""

standard = """
Before the affixes @deva[इस्], @deva[मन्], and @deva[त्रन्] (all @[unādi] affixes) and @deva[क्वि], the penultimate @deva[आ] of @deva[छादि] undergoes shortening. These affixes derive nouns and the shortening is obligatory in each case. Derived forms: @deva[छदिस्] 'tent/canopy', @deva[छद्मन्] 'deception/disguise', @deva[छत्रम्] 'umbrella/parasol'. Compare @ref[6.4.96] for the same root's behavior before @deva[घ].
"""

advanced = """
The penultimate of @deva[छादि] is shortened before the affixes @deva[इस्], @deva[मन्], @deva[त्रन्], and @deva[क्वि]: @deva[छदिस्], @deva[छद्मन्] (neuter), @deva[छत्रम्], @deva[धामच्छत्], @deva[उपच्छत्]. The first three (@deva[इस्], @deva[मन्], @deva[त्रन्]) are @[uṇādi] affixes.
"""

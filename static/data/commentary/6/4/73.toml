id = "6.4.73"
numericId = "64073"

[en]
simple = """
In @deva[वेदाः] , even the verbs that are not @deva[अजादि] can be seen to get @deva[आट्-आगम] for @deva[लुङ्लकार], @deva[लङ्लकार], and @deva[लृङ्लकार].
"""

standard = """
Vedic: @deva[आट्] diversely applied. @deva[आवः], @deva[आनक्].
"""

advanced = """
In the @deva[छन्दस्], @deva[आट्] is used more broadly — it appears before both vowel-initial and consonant-initial roots: @deva[आवः] (aorist of @deva[वृञ्], affix elided by @ref[2.4.80]), @deva[आनक्] (from @deva[नश्], @ref[2.4.80]), and @deva[आयुनक्] (imperfect of @deva[युञ्]).
"""

id = "6.4.32"
numericId = "64032"

[en]
simple = """
The @deva[उपधा] @deva[नकार] of the @deva[जकारान्त] verb roots and the verb root '@deva[नश्]' is optionally removed when followed by the @deva[क्त्वा] @deva[प्रत्यय].
"""

standard = """
Nasal elided before @deva[सन्] when reduplicated. @deva[जिगमिषति].
"""

advanced = """
The nasal is optionally elided before @deva[क्त्वा] in @deva[ज्]-final roots and in @deva[नश्]: @deva[रङ्क्त्वा] or @deva[रक्त्वा], @deva[भङ्क्त्वा] or @deva[भक्त्वा], @deva[नष्ट्वा] or @deva[नंष्ट्वा]. For the @deva[न्] augment in @deva[नश्], see @ref[7.1.60]. When @deva[इट्] is added: @deva[नशित्वा].
"""

id = "6.4.44"
numericId = "64044"

[en]
simple = """
For the root @deva[तन्] ('to extend'), the substitution of long @deva[आ] for the nasal is optional before the Passive suffix @deva[यक्]. Both @deva[तायते] and @deva[तन्यते] are valid. However, before the Intensive @deva[यङ्], only @deva[तन्तन्यते] is correct.
"""

standard = """
The optional @deva[आ]-substitution applies to @deva[तन्] before the Passive @deva[यक्]: @deva[तायते] or @deva[तन्यते]. But with the Intensive @deva[यङ्], the option is withdrawn — @deva[तन्तन्यते] is the only form. This differential treatment reflects the @[vyavasthita-vibhāṣā] principle: the option is positionally restricted. See @ref[6.4.44].
"""

advanced = """
Long @deva[आ] optionally substitutes for the final nasal of @deva[तन्] before the passive @deva[यक्]: @deva[तायते] or @deva[तन्यते]. Before the intensive @deva[यङ्], however, no option is permitted: only @deva[तन्तन्यते].
"""

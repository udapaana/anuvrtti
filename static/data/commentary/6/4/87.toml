id = "6.4.87"
numericId = "64087"

[en]
simple = """
The @deva[उवर्ण] of an @deva[अनेकाच्-अङ्ग] of '@deva[हु]' @deva[तथा] '@deva[श्नु]' undergoes a @deva[यणादेश], provided that this @deva[उवर्ण] does not follow a @deva[संयोग].
"""

standard = """
@deva[व्] for @deva[उ] of @deva[हु]/@deva[श्नु] before vowel-initial @[sārvadhātuka] (polysyllabic, no conjunct). @deva[जुह्वति], @deva[सुन्वन्ति].
"""

advanced = """
Semivowel @deva[व्] replaces the @deva[उ] of @deva[हु] and of @deva[नु] (@deva[विकरण] of @deva[स्वादिगण], 5th conjugation) before a vowel-initial @deva[सार्वधातुक] affix (@deva[तिङ्शित्सार्वधातुकम्] @ref[3.4.113]), when the @deva[अङ्ग] is polysyllabic and @deva[उ] is not preceded by a conjunct consonant. From @deva[हु]: @deva[जुह्वति], @deva[जुह्वतु], @deva[अजुह्वन्]. From @deva[सु] (with @deva[श्नु]): @deva[सुन्वन्ति], @deva[सुन्वन्तु], @deva[असुन्वन्]. The restriction to @deva[हु]/@deva[श्नु] excludes Intensive bases: @deva[योयुवति], @deva[रोरुवति] (from Intensive stems with @deva[यङ्] elided). The elision of @deva[यङ्] in secular literature is itself a @[jñāpaka] of this aphorism — no other polysyllabic @deva[उ]-final root without preceding conjunct takes a @deva[सार्वधातुक] affix, and the preceding rule covers only @deva[आर्धधातुक] affixes. Before @deva[आर्धधातुक], @ref[6.4.77] applies instead: @deva[जुहुवतुः], @deva[जुहुवुः]. The conjunct condition excludes @deva[आप्नुवन्ति], @deva[राध्नुवन्ति], where @deva[उ] follows a conjunct.
"""

id = "6.4.86"
numericId = "64086"

[en]
simple = """
In @deva[वेदाः], the words @deva[भू] and @deva[सुधी] might or might not undergo a @deva[यणादेश] when followed by an @deva[अजादि] @deva[सुप्] @deva[प्रत्यय].
"""

standard = """
Vedic: @deva[भू]/@deva[सुधी] optionally take semivowel. @deva[विभ्वम्] or @deva[विभुवम्].
"""

advanced = """
In the @deva[छन्दस्] (Vedas), in the case of a @deva[अङ्ग] (stem) in @deva[भू] or the word @deva[सुधी] , are found sometimes the @deva[इवङ्] and @deva[उवङ्] and sometimes the semi-vowel substitution. As @deva[विभ्वम्], @deva[विभुवम्], @deva[सुध्यः] and @deva[सुधियः]; @deva[वनेषु] @deva[चित्रं] @deva[विभ्वं] @deva[विशे], @deva[विशे] @deva[विभुवम्], @deva[सुध्यो] @deva[हव्यमग्ने], @deva[सुधियो] @deva[हव्यमग्ने] @deva[॥]
"""

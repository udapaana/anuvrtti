id = "6.4.145"
numericId = "64145"

[en]
simple = """
The @deva[अ] at the beginning of @deva[अहन्] ("day") is dropped only when the compound-forming suffixes @deva[ट] or @deva[ख] follow. This gives @deva[द्व्यहः] ("a two-day period") with @deva[टच्] (see @ref[5.4.91]) and @deva[द्व्यहीनः] ("lasting two days") with @deva[ख] (see @ref[5.1.87]). Before any other @deva[तद्धित] suffix, @deva[अहन्] keeps its full form.
"""

standard = """
The initial @deva[अ] of @deva[अहन्] undergoes elision (@deva[लोप]) only in the conditioning environment of the @deva[तद्धित] affixes @deva[ट] (= @deva[टच्], @ref[5.4.91]) and @deva[ख] (@ref[5.1.87]). Thus @deva[द्व्यहः] and @deva[त्र्यहः] with @deva[टच्]; @deva[द्व्यहीनः] and @deva[त्र्यहीनः] with @deva[ख]. Before all other @deva[तद्धित] suffixes, @deva[अहन्] retains its final @deva[अन्] and the initial @deva[अ] without elision — the rule is thus strictly limited to these two suffixes. This specificity prevents over-application to derivatives like @deva[आह्निकम्].
"""

advanced = """
The @deva[अन्] of @deva[अहन्] is elided only before the affixes @deva[ट] and @deva[ख]. Examples: @deva[द्वे] @deva[अहनी] @deva[समाहूते] = @deva[द्व्यहः], @deva[त्र्यहः] (with @deva[टच्] by @ref[5.4.91]); @deva[द्वे] @deva[अहनी] @deva[अधीष्टो] @deva[भृतो] @deva[भूतो] @deva[भावी] @deva[वा] = @deva[द्व्यहीनः], @deva[त्र्यहीनः] (with @deva[ख] by @ref[5.1.87]). @[vārtika]: @deva[ख] is added to @deva[अहन्] in the sense of @deva[तस्य] @deva[समूहः] when referring to a sacrifice — @deva[अह्नां] @deva[समूहः] @deva[क्रतुः] = @deva[अहीनः] (by @ref[4.2.42]). Although @deva[अन्] of @deva[अहन्] would have been elided by the preceding rule as well before @deva[ट] and @deva[ख], this @[sūtra] is restrictive (@deva[नियम]): @deva[अहन्] does not lose @deva[अन्] before any other @deva[तद्धित] affix — @deva[अह्ना] @deva[निर्वृत्तम्] = @deva[आह्निकम्] (with @deva[ठञ्] by @ref[5.1.79]). The word @deva[एव] underscores this restriction. Moreover, @deva[अहन्] is not the only stem that loses @deva[अन्] before @deva[ट] and @deva[ख] — this is inferred from the exception made for @[ātman] and @[adhvan] before @deva[ख] in @ref[7.4.169].
"""

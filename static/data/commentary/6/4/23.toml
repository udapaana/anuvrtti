id = "6.4.23"
numericId = "64023"

[en]
simple = """
The nasal inserted into 7th-conjugation roots (via @deva[श्नम्]) is deleted before @deva[आर्धधातुक] suffixes that begin with a @deva[झल्]-consonant. For example, @deva[रुध्] with @deva[श्नम्] loses the nasal before @deva[क्त] to give @deva[रुद्धः] (past passive participle).
"""

standard = """
Roots of the @deva[रुधादिगण] (7th conjugation) take the @deva[गणविकरण] @deva[श्नम्] (infixed nasal). This nasal is elided before any @deva[आर्धधातुक] affix beginning with a @deva[झल्]-consonant. So @deva[रुध्] + @deva[श्नम्] + @deva[क्त] → elision of @deva[न्] → @deva[रुद्धः]. Similarly @deva[अञ्ज्] → @deva[अनक्ति] (present, nasal retained) but @deva[अक्तः] (past passive, nasal elided). See @ref[6.4.23].
"""

advanced = """
The @deva[न] that follows the @deva[गणविकरण] @deva[श्नम्] (infixed nasal of the @deva[रुधादिगण], 7th conjugation) is elided. Derivation: @deva[अञ्ज्] + @deva[श्नम्] + @deva[तिप्] = @deva[अनञ्ज्] + @deva[ति] (@ref[1.1.47]) = @deva[अनज्] + @deva[ति] (this rule) = @deva[अनक्ति]; similarly @deva[भनक्ति] from @deva[भञ्ज] ('to break') and @deva[हिनस्ति] from @deva[हिन्स्] ('to injure'). The @deva[सूत्र] specifies @deva[श्न] (not merely @deva[न]) to restrict it to the technical @deva[विकरण] @deva[श्नम्], excluding any ordinary @deva[श]-@deva[न] sequence. In @deva[यज्ञानाम्] and @deva[यत्नानाम्], the @deva[न] of @deva[नाम्] is not elided after the @deva[न] of @deva[यज्ञ] or @deva[यत्न] (the lengthening of @deva[अ] by @ref[7.3.102], being @deva[स्थानिवत्], would not block elision). Likewise in @deva[विश्नानाम्] and @deva[प्रश्नानाम्] (@deva[विश्न] + @deva[नाम्], @deva[प्रश्न] + @deva[नाम्]), the @deva[न] of @deva[नाम्] is not elided after @deva[श्न] of @deva[विश्न] — because the @deva[श्न] here is not the technical @deva[विकरण] but an ordinary letter-combination. The @deva[प्रतिपदोक्त] maxim applies: @deva[लक्षणप्रतिपदोक्तयोः] @deva[प्रतिपदोक्तस्यैव] @deva[ग्रहणम्].
"""

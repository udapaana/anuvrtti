id = "6.4.30"
numericId = "64030"

[en]
simple = """
When used in the meaning of 'to pray', the @deva[नकार] of the verb root @deva[अञ्च्] is not removed.
"""

standard = """
Nasal elided before @deva[च्वि]. @deva[शुचीभूत] → @deva[शुचीभूत].
"""

advanced = """
The nasal of @deva[अञ्च्] is not elided when the meaning is 'to honour': @deva[अञ्चिता] @deva[अस्य] @deva[गुरवः], @deva[अञ्चितमिव] @deva[शिरो] @deva[वहति]. The @deva[इट्] augment is added by @ref[7.2.53]. When the sense is not 'honouring', the nasal is elided: @deva[उदक्तमुदकं] @deva[कुपात्] ('the water was drawn from the well') — here @deva[इट्] is prohibited by @ref[7.2.15].
"""

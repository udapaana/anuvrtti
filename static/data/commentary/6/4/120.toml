id = "6.4.120"
numericId = "64120"

[en]
simple = """
When followed by a @deva[कित्-प्रत्यय] of @deva[लिट्-लकार], The @deva[अकारः] of an @deva[अङ्गम्] is converted to @deva[एकार], and the @deva[अभ्यास] is removed; provided that there is no @deva[संयोग] before as well as after this @deva[अकार], and that the first letter of the @deva[अङ्गम्] is not changed due to any @deva[आदेश].
"""

standard = """
In perfect: @deva[अ] → @deva[ए] between simple consonants (no substituted @[abhyāsa] consonant); @[abhyāsa] elided. @deva[पेचतुः], @deva[पेचुः].
"""

advanced = """
@deva[ए] replaces the short @deva[अ] of a verbal stem standing between two simple (non-conjunct) consonants, before @deva[कित्] personal endings of @deva[लिट्] (by @deva[असंयोगाल्लिट्] @deva[कित्], @ref[1.2.5]), provided no different consonant has been substituted in the reduplicate; the @[abhyāsa] is simultaneously elided. Examples: @deva[रेणतुः], @deva[रेणुः], @deva[येमतुः], @deva[येमुः], @deva[पेचतुः], @deva[पेचुः], @deva[देभतुः], @deva[देभुः]. The restriction to @deva[अ] excludes: @deva[दिदिवतुः], @deva[दिदिवुः] (vowel is @deva[इ]). The restriction to short @deva[अ] excludes: @deva[ररासे], @deva[ररासाते], @deva[ररासिरे]. The requirement of simple (non-conjunct) consonants excludes: @deva[ररक्षतुः], @deva[ररक्षुः] — though some consider this example inapt since by @ref[1.2.5] the Perfect affixes are not @deva[कित्] after a conjunct, and prefer @deva[तत्सरतुः], @deva[तत्सरुः]. The condition "no substituted consonant in the reduplicate" excludes: @deva[चकणतुः], @deva[चकणुः], @deva[जगणतुः], @deva[जगणुः], @deva[बभणतुः], @deva[बभणुः]. The substitution meant is one caused by Perfect reduplication specifically; therefore the rule applies to @deva[नेमतुः], @deva[नेमुः], @deva[सेहे], @deva[सेहाते], @deva[सेहिरे] — even though @deva[णम्] and @deva[षह्] are the roots, and @deva[ण्] → @deva[न] and @deva[ष्] → @deva[स] are general changes. The @deva[जश्]/@deva[चर्] substitution in the reduplicate (by @ref[8.4.54], read with @ref[8.2.1]) is not treated as @[asiddha] here — it counts as a substitution making the stem @deva[आदेशादि], as implied by the special exception for @deva[फल्] and @deva[भज्] in @ref[6.4.122]. However, if the substitute letter is identical in form to the original (as with @deva[पच्], where the @deva[चर्] substitute of @deva[प] is @deva[प] itself), the stem is not @deva[आदेशादि]. This is learned from the @[jñāpaka] of @ref[6.4.126], which makes exception for @deva[शस्] and @deva[दद्]. Before non-@deva[कित्]/non-@deva[ङित्] affixes, the rule does not apply: @deva[अहं] @deva[पपच], @deva[अहं] @deva[पपठ]. @[vārtika]: @deva[ए] replaces the @deva[अ] of @deva[दम्भ] under the same conditions — @deva[देभतुः], @deva[देभुः]; the nasal elision by @ref[6.4.24] would be @[asiddha] by @ref[6.4.22], hence this @[vārtika] is needed. @[vārtika]: @deva[ए] replaces the @deva[अ] of @deva[नश] and @deva[मन] before non-@deva[लिट्] affixes — @deva[अनेशम्] (Aorist in @deva[अङ्] of @deva[नश्], a @[puṣādi] root by @ref[3.1.55]), @deva[मेनका] (by @deva[वुन्], @ref[3.1.150]). The @[Padamañjarī] gives @deva[अनेशन्] (3rd plural), citing @deva[अनेशन्नस्येषवः]. @[vārtika]: in the Vedas, @deva[ए] replaces the @deva[अ] of @deva[अम्] and @deva[पच्] before non-Perfect affixes — @deva[व्येमानम्] (@deva[वि] + @deva[अम्] + @deva[चानश्], augment @deva[मुक्] dropped); @deva[पेचिरन्] (for @deva[पचेरन्], Imperfect of @deva[पच्]; the shortening is a Vedic irregularity). @[vārtika]: similarly for @deva[यज्] and @deva[वप] — @deva[आयेजे] and @deva[आवेपे] (Vedic Imperfect forms, with augment @deva[आट्] by @ref[6.4.73]).
"""

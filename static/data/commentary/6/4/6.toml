id = "6.4.6"
numericId = "64006"

[en]
simple = """
In presence of the @deva[नाम्] @deva[प्रत्यय], the last letter of the word @deva[नृ] becomes @deva[दीर्घ] optionally.
"""

standard = """
@deva[नृ] optionally lengthened before @deva[नाम्]. @deva[नॄणाम्] or @deva[नृणाम्].
"""

advanced = """
So also @deva[नृ] before the Genitive 6th-Case plural @deva[नाम्] is optionally lengthened. As @deva[त्वं] @deva[नॄणां] @deva[नृपते], and @deva[त्वं] @deva[नृणां] @deva[नृपते] @deva[॥] According to some this option is confined to the Vedas, according to others, it extends to secular literature also.
"""

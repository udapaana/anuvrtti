id = "6.4.158"
numericId = "64158"

[en]
simple = """
After the adjective @deva[बहु] ("many/much"), the initial @deva[इ] of the suffix @deva[इमन्] and the initial @deva[ई] of @deva[ईयस्] are elided, and @deva[बहु] itself is replaced by @deva[भू]. This gives @deva[भूयान्] ("more") from @deva[ईयस्] and @deva[भूमा] ("abundance") from @deva[इमन्]. The substitution @deva[भू] for @deva[बहु] is an irregular but fixed formation.
"""

standard = """
When @deva[बहु] is the base, two changes apply before @deva[इमन्] and @deva[ईयस्]: (1) the initial @deva[इ]/@deva[ई] of the respective suffix is elided, and (2) the stem @deva[बहु] is replaced by @deva[भू]. The combined effect: @deva[बहु] + @deva[ईयस्] → @deva[भू] + @deva[यस्] → @deva[भूयान्] (comparative, "more"); @deva[बहु] + @deva[इमन्] → @deva[भू] + @deva[मन्] → @deva[भूमा] (abstract, "abundance"). This is an idiosyncratic rule specific to @deva[बहु] and represents a suppletive formation rather than regular phonological derivation. See @ref[6.4.159] for the @deva[इष्ठ] counterpart.
"""

advanced = """
The initial @deva[इ] and @deva[ई] of @deva[इमन्] and @deva[ईयस्] are elided after @deva[बहु], and @deva[भू] replaces @deva[बहु]. Forms: @deva[भूयान्], @deva[भूमा]. For @deva[इष्ठ], the following rule (@ref[6.4.159]) applies instead. By @ref[1.1.54] and @ref[1.1.67], @deva[बहोः] being in the Ablative indicates that the first letter of the following term (@deva[इ] or @deva[ई]) is elided. @deva[बहु] belongs to the @[pṛthvādi] class and takes @deva[इमन्] (by @ref[5.1.122]). The repetition of @deva[बहोः] in the @[sūtra] identifies the @[sthānin] for which @deva[भू] is substituted — without this, @deva[भू] would have been read as replacing the affixes themselves.
"""

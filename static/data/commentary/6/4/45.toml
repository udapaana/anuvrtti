id = "6.4.45"
numericId = "64045"

[en]
simple = """
For the root @deva[सन्] ('to give/bestow'), long @deva[आ] is optionally substituted before the suffix @deva[क्तिच्], and the nasal may also optionally be elided. This gives three possible forms: @deva[सातिः], @deva[सन्तिः], and @deva[सतिः].
"""

standard = """
The rule uses @deva[अन्यतरस्याम्] to allow double optionality for @deva[सन्] before @deva[क्तिच्]: the @deva[आ]-substitution may apply or not, and the nasal may be elided or not. This yields @deva[सातिः] (@deva[आ] substituted, nasal gone), @deva[सन्तिः] (neither change), and @deva[सतिः] (nasal elided, @deva[आ] not substituted). The three-way optionality is unusual. See @ref[6.4.45].
"""

advanced = """
Long @deva[आ] optionally substitutes for the final nasal of @deva[सन्] before @deva[क्तिच्], and the nasal may also optionally be elided. This yields three forms: @deva[सातिः]@deva[꣡] (@deva[आ]-substitution), @deva[सन्तिः]@deva[꣡] (nasal retained, no @deva[आ]), @deva[सतिः]@deva[꣡] (nasal elided, no @deva[आ]). The term @deva[अन्यतरस्याम्] ('optionally') is used explicitly for clarity, since the @deva[विभाषा] of @ref[6.4.43] could have been read in by @deva[अनुवृत्ति] — it dispels any doubt that @deva[विभाषा] might have ceased with the preceding @deva[सूत्र].
"""

id = "6.4.125"
numericId = "64125"

[en]
simple = """
Seven roots — @deva[फण्] ("to go"), @deva[राज्] ("to shine"), @deva[भ्राज्], @deva[भ्राश्], @deva[भ्लाश्], @deva[स्याम्], and @deva[स्वन्] ("to sound") — optionally replace their vowel @deva[अ] or @deva[आ] with @deva[ए] in the Perfect tense. The reduplicated syllable is dropped when this occurs. Both forms are valid: @deva[फेणतुः] or @deva[पफणतुः], @deva[रेजतुः] or @deva[रराजतुः] ("the two shone").
"""

standard = """
For the seven roots @deva[फण्], @deva[राज्], @deva[भ्राज्], @deva[भ्राश्], @deva[भ्लाश्], @deva[स्याम्], and @deva[स्वन्], @deva[ए] optionally replaces @deva[अ] (or @deva[आ] where it occurs) and the @deva[अभ्यास] is elided, before @deva[क्]- or @deva[ङ्]-marked @deva[लिट्] affixes and before @deva[इट्]-augmented @deva[थल्]. The conditioning environment thus spans both the dual/plural @deva[क्]/[@deva[ङ्]] affixes and second-person singular @deva[इट्]-@deva[थल्]] of the Perfect. Optional forms: @deva[फेणतुः]/@deva[पफणतुः], @deva[रेजतुः]/@deva[रराजतुः]. The rule explicitly covers both @deva[अ]- and @deva[आ]-vowelled roots in this set.
"""

advanced = """
@deva[ए] optionally replaces @deva[अ] and @deva[आ] in the seven @[phaṇādi] roots — @deva[फण्], @deva[राज्], @deva[भ्राज्], @deva[भ्राश्], @deva[भ्लाश्], @deva[स्याम्], and @deva[स्वन्] — with simultaneous @[abhyāsa]-elision, before @deva[कित्]/@deva[ङित्] @deva[लिट्] affixes and @deva[इट्]-augmented @deva[थल्]. With substitution / without: @deva[फेणतुः], @deva[फेणुः], @deva[फेणिथ] / @deva[पफणतुः], @deva[पफणुः], @deva[पफणिथ]; @deva[रेजतुः], @deva[रेजुः], @deva[रेजिथ] / @deva[रराजतुः], @deva[रराजुः], @deva[रराजिथ]; @deva[भ्रेजे], @deva[भ्रेजाते], @deva[भ्रेजिरे] / @deva[बभ्राजे], @deva[बभ्राजाते], @deva[बभ्राजिरे]; @deva[भ्रेशे], @deva[भ्रेशाते], @deva[भ्रेशिरे] / @deva[बभ्राशे], @deva[बभ्राशाते], @deva[बभ्राशिरे]; @deva[भ्लेशे], @deva[भ्लेशाते], @deva[भ्लेशिरे] / @deva[बभ्लाशाते], @deva[बभ्लाशाते], @deva[बभ्लाशिरे]; @deva[स्येमतुः], @deva[स्येमुः], @deva[स्येमिथ] / @deva[सस्यमतुः], @deva[सत्यमुः], @deva[सस्यमिथः]; @deva[स्वेनतुः], @deva[स्वेनुः], @deva[स्वेनिथ] / @deva[सस्वनतुः], @deva[सस्वनुः], @deva[सस्वनिथ]. The restriction to these seven excludes other roots: @deva[दध्वनतुः], @deva[दध्वनुः], @deva[दध्वनिथ]. The @[phaṇādi] is a subdivision of @[bhvādi] (entries 873-879).
"""

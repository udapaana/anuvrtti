id = "6.4.105"
numericId = "64105"

[en]
simple = """
The '@deva[हि]' @deva[प्रत्यय] that follows an @deva[अदन्त] @deva[अङ्ग] is removed.
"""

standard = """
@deva[हि] elided after stem-final short @deva[अ]. @deva[पच], @deva[गच्छ].
"""

advanced = """
The Imperative affix @deva[हि] is elided after a stem ending in short @deva[अ]. Examples: @deva[पच], @deva[पठ], @deva[गच्छ], @deva[धाव]. After stems ending in @deva[उ], @deva[हि] is retained: @deva[युहि], @deva[रुहि]. The restriction to short @deva[अ] excludes stems ending in long @deva[आ]: @deva[लुनीहि], @deva[पुनीहि] (@deva[लुना] + @deva[हि], where the @deva[ई] substitution by @ref[6.4.113] is treated as @[asiddha]) — @deva[हि] is not elided after @deva[आ].
"""

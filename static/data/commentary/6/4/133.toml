id = "6.4.133"
numericId = "64133"

[en]
simple = """
The @deva[भसंज्ञक] @deva[अङ्ग] of @deva[श्वन्] , @deva[युवन्] and @deva[मघवन्] undergoes @deva[सम्प्रसारणम्] when followed by a @deva[प्रत्यय] which is not a @deva[तद्धितप्रत्यय].
"""

standard = """
@deva[श्वन्]/@deva[युवन्]/@deva[मघवन्]: @deva[व] → @[samprasāraṇa] (not before taddhita). @deva[शुनः], @deva[यूनः]. But: @deva[शौवनम्].
"""

advanced = """
The @deva[व] of @deva[श्वन्], @deva[युवन्], and @deva[मघवन्] undergoes @[samprasāraṇa], but not before a @deva[तद्धित] affix. Examples: @deva[शुनः], @deva[शुना], @deva[शुने]; @deva[यूनः], @deva[यूना], @deva[यूने]; @deva[मघोनः], @deva[मघोना], @deva[मघोने]. Before @[taddhita] affixes, @[samprasāraṇa] is blocked: @deva[शौवनं] @deva[मांसम्], @deva[यौवनं] @deva[वर्त्तते], @deva[माघवनः] @deva[स्थालीपाकः]. @deva[शौवन] is formed with @deva[अञ्] (by @ref[4.3.154]), @deva[औ] added by @ref[7.3.4] since @deva[श्वन] belongs to the @[dvārādi] class. The @[samprasāraṇa] applies only to forms ending in @deva[न्], not when they become feminine or lose the @deva[न्]: @deva[युवतीः] @deva[पश्य]; @deva[मघवतः], @deva[मघवते], @deva[मघवता]. The word @deva[अनः] from the next @[sūtra] also qualifies this rule.
"""

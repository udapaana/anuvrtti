id = "6.4.96"
numericId = "64096"

[en]
simple = """
The long @deva[आ] in the 10th-class root @deva[छद्] ('to cover') is shortened before the nominal suffix @deva[घ], provided the root is not preceded by two preverbs. When two preverbs precede, shortening does not apply. Example: @deva[उरस् + छद् + घ] → @deva[उरश्छदः] 'chest-cover'; @deva[प्र + छद् + घ] → @deva[प्रच्छदः]; but @deva[सम् + उप + छाद् + घ] → @deva[समुपच्छादः].
"""

standard = """
Root @deva[छद्] in the 10th class has a causative/denominative stem @deva[छादि]; before the nominal affix @deva[घ] (per @ref[3.3.118]), this @deva[आ] is shortened to @deva[अ] unless the root is doubly prefixed. The double-preverb exception is unusual and reflects a specific lexicalized form. Single-preverb compounds: @deva[उरश्छदः] 'breastplate', @deva[प्रच्छदः] 'cover', @deva[दन्तच्छदः] 'lip (tooth-cover)'. Double-preverb: @deva[समुपच्छादः] retains the long @deva[आ].
"""

advanced = """
The penultimate of @deva[चुरादि] root @deva[छद्] (@deva[छादि]) is shortened before the affix @deva[घ] (@deva[पुंसि] @deva[संज्ञायां] @deva[घः] @deva[प्रायेण] @ref[3.3.118]), provided the root is not preceded by two or more prepositions: @deva[उरश्छदः], @deva[प्रच्छदः], @deva[दन्तच्छदः]. With two prepositions, shortening is blocked: @deva[समुपच्छादः]; similarly with more than two: @deva[समुपातिच्छादः]. The @deva[णि]-elision of @deva[छादि] by @ref[6.4.51] must not be treated as @[asiddha] (@ref[6.4.22]) or @[sthānivat] (@ref[1.1.57]) — otherwise no penultimate would remain to be shortened. @[vārttika]: the prohibition regarding @deva[द्वि] (two prepositions) extends to greater numbers as well.
"""

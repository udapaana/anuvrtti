id = "6.4.5"
numericId = "64005"

[en]
simple = """
In presence of the @deva[नाम्] @deva[प्रत्यय], the last letter of the @deva[अङ्ग] might or might not be made @deva[दीर्घ] in @deva[वेदाः].
"""

standard = """
Vedic: @deva[तिसृ]/@deva[चतसृ] optionally lengthened. @deva[तिसृणाम्] or @deva[तिसॄणाम्].
"""

advanced = """
In the @deva[छन्दस्] (Vedas) the finals of @deva[तिसृ] and @deva[चतसृ] are found in both ways, before the Genitive 6th-Case plural @deva[नाम्]@deva[।] In some places they are seen as lengthened, in others not. As @deva[तिसृण] @deva[मध्यंदिने] or @deva[तिसॄणाम] @deva[मध्यंदिने] @deva[॥] So also @deva[चतसृणाम्] and @deva[चतसॄणाम्] @deva[॥]
"""

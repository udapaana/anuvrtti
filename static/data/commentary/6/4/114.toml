id = "6.4.114"
numericId = "64114"

[en]
simple = """
The @deva[आकार] of the verb root '@deva[दरिद्रा]' is converted to @deva[ह्रस्व-इकार] when followed by @deva[हलादि-सार्वधातुक] @deva[कित्]/@deva[ङित्-प्रत्यय].
"""

standard = """
@deva[आ] of @deva[दरिद्रा] → @deva[इ] before consonant-initial @[sārvadhātuka] @deva[क्]/@deva[ङित्]. @deva[दरिद्रितः].
"""

advanced = """
@deva[इ] replaces the @deva[आ] of @deva[दरिद्रा] before a consonant-initial @deva[सार्वधातुक] @deva[कित्] or @deva[ङित्] affix. @[kārikā]: @deva[न] @deva[दरिद्रायके] @deva[लोपो] @deva[दरिद्राणे] @deva[च] @deva[नेष्यते] @deva[।] @deva[दिदरिद्रासतीत्येके] @deva[दिदरिद्रिषतीति] @deva[वा]. Forms: @deva[दरिद्रितः], @deva[दरिद्रिथः], @deva[दरिद्रिवः], @deva[दरिद्रिमः]. Before a vowel-initial affix, @deva[आ] is elided by @ref[6.4.112]: @deva[दरिद्रति]. Before a non-@deva[ङित्] affix, @deva[आ] is retained: @deva[दरिद्राति]. @[vārtika]: the final of @deva[दरिद्रा] is elided before an @[ārdhadhātuka] affix, and this elision is treated as @[siddha] for purposes of affix selection — @deva[दरिद्रा] losing @deva[आ] becomes @deva[दरिद्र], and affixes appropriate to a consonant-final root apply (e.g., general @deva[अच्] by @ref[3.1.134], not @deva[ण] by @ref[3.1.141], which requires final long @deva[आ]). Hence @deva[दरिद्रः]. @[kārikā]: elision does not occur in @deva[दरिद्रायक] and @deva[दरिद्राण]; the Desiderative may be either @deva[दिदरिद्रासति] or @deva[दिदरिद्विषति]. The @[Siddhāntakaumudī] formulates: @deva[आ] of @deva[दरिद्रा] is treated as elided before @[ārdhadhātuka] affixes, optionally before @deva[लुङ्] (Aorist), and not at all before @deva[सन्] (Desiderative), @deva[ण्वुल्], and @deva[ल्युट्]. @[vārtika]: in the Aorist, elision is optional — @deva[अदरिद्रीत्] or @deva[अदरिद्रासीत्] (the latter by @ref[7.2.73] with elision of @deva[सिच्]). The form @deva[दरिद्रस्य] in the @[sūtra] is Vedic, with the root shortened from @deva[दरिद्रा] to @deva[दरिद्र].
"""

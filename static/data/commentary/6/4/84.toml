id = "6.4.84"
numericId = "64084"

[en]
simple = """
The word @deva[वर्षाभू] gets a @deva[यणादेश] when followed by an @deva[अजादि-सुप्-प्रत्यय].
"""

standard = """
@deva[व्] for @deva[वर्षाभू] @deva[ऊ] before @deva[सुप्]. @deva[वर्षाभ्वौ].
"""

advanced = """
The semi-vowel @deva[व्] is substituted for the @deva[ऊ] of @deva[वर्षाभू] also when a case-affix beginning with a vowel follows. As @deva[वर्षाभ्वौ], @deva[वर्षाभ्वः] @deva[॥] @deva[वर्षाभू] 'what is born in the rains, a kind of herb.' This is an exception to the subsequent rule. Vart:- The semi-vowel substitution takes place when @deva[दृन्], @deva[कार] and @deva[पुनर्] precede @deva[भू]; as @deva[दृन्भ्वौ], @deva[दृन्भवः], @deva[पुनर्भ्वौ], @deva[पुनर्भ्वः], @deva[कारभ्वौ] (@deva[काराभ्वौ]), @deva[कारभ्वः] (@deva[काराभ्वः]) @deva[॥]
"""

id = "6.4.24"
numericId = "64024"

[en]
simple = """
The @deva[उपधा] @deva[नकार] of an @deva[अङ्ग] that is @deva[अनिदित्] and @deva[हलन्त] is removed in presence of a @deva[कित्] or a @deva[ङित्-प्रत्यय].
"""

standard = """
Stem nasal elided before any @deva[आर्धधातुक] when stem ends in @deva[अञ्च्]. @deva[प्राचः], @deva[प्राचा].
"""

advanced = """
In a consonant-final @deva[अङ्ग] whose penultimate @deva[न्] is original to the root (not added by @ref[7.1.58] due to an indicatory @deva[इ] — @deva[इदितो] @deva[नुम्] @deva[धातोः]), the @deva[न्] is elided before @deva[कित्] or @deva[ङित्] affixes. From @deva[स्रन्स्] and @deva[ध्वन्स्]: @deva[स्रस्तः] and @deva[ध्वस्तः] (with @deva[क्त]), @deva[स्रस्यते] and @deva[ध्वस्यते] (with @deva[यक्]), @deva[सनीस्रस्यते] and @deva[दनीध्वस्यते] (with @deva[यङ्], @deva[नी] added by @ref[7.4.84]). But @deva[नन्द्यते] and @deva[नानन्द्यते] retain the nasal — root @deva[टुणदि] @deva[समृद्धौ] has an indicatory @deva[इ] and its @deva[न] is added by @ref[7.1.58], so the condition @deva[अनिदित्] excludes it. The condition 'consonant-final' excludes @deva[नीयते] and @deva[नेनीयते] from @deva[नी], which has a penultimate nasal but ends in a vowel. The condition 'penultimate' excludes @deva[नह्यते] and @deva[नानह्यते]. The condition '@deva[कित्]/@deva[ङित्]' excludes @deva[स्रंसनं] and @deva[ध्वंसनं] (with @deva[ल्युट्]). @[vārttika]: @deva[लङ्ग] (@deva[लगि]) and @deva[कम्प्] (@deva[कपि]) are exceptions when meaning 'to feel pain/difficulty' and 'a bodily disease' — though shown with indicatory @deva[इ] in the @deva[धातुपाठ], they retain the nasal: @deva[विलगितः] and @deva[विकपितः]; without those meanings, @deva[विलङ्कितं] and @deva[विकम्पितं]. @[vārttika]: The causative of @deva[रञ्ज] loses its nasal when meaning 'to hunt deer': @deva[रजयति] @deva[मृगान्]; but @deva[रञ्जयति] @deva[वस्त्राणि] ('he colors the clothes'). @[vārttika]: @deva[रञ्ज] loses its nasal before @deva[घिनुण्]: @deva[रागी]. @[vārttika]: @deva[रजकः], @deva[रजनम्], and @deva[रजः] are formed from @deva[रञ्ज] by nasal elision.
"""

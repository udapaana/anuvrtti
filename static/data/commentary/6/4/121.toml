id = "6.4.121"
numericId = "64121"

[en]
simple = """
In the Perfect tense (@deva[लिट्]), when the ending @deva[थल्] carries the augment @deva[इट्], the vowel @deva[अ] of the verb stem is replaced by @deva[ए] and the reduplicated syllable is dropped. So from @deva[पच्] ("to cook") we get @deva[पेचिथ] ("you cooked") and from @deva[शक्] ("to be able") we get @deva[शेकिथ]. This only applies when no letter substitution has occurred in the reduplicate.
"""

standard = """
This rule operates on verbal @deva[अङ्ग] stems whose reduplication syllable (@deva[अभ्यास]) has undergone no letter substitution: the vowel @deva[अ] of the stem is replaced by @deva[ए] and the @deva[अभ्यास] is elided before @deva[लिट्] @deva[थल्] with augment @deva[इट्]. The form @deva[पेचिथ] arises from @deva[पच्] + @deva[थल्] (with @deva[इट्]): the stem vowel @deva[अ] becomes @deva[ए] and the @deva[अभ्यास] @deva[प] is dropped. Similarly @deva[शेकिथ] from @deva[शक्]. The condition that the @deva[अभ्यास] be unaltered is critical: if any substitution has taken place in the reduplicate, the rule is blocked.
"""

advanced = """
@deva[ए] replaces the @deva[अ] of a verbal stem standing between two simple consonants, when @deva[लिट्] ending @deva[थल्] with augment @deva[इट्] follows, provided no different consonant has been substituted in the reduplicate; the @[abhyāsa] is simultaneously elided. Examples: @deva[पेचिथ], @deva[शेकिथ]. Counterexamples: @deva[पपक्थ] (before @[anit] @deva[थ]); @deva[दिदेविथ] (vowel is @deva[इ], not @deva[अ]); @deva[ततक्षिथ], @deva[ररक्षिथ] (@deva[अ] not between simple consonants); @deva[चकणिथ], @deva[बभणिथ] (reduplicate has substitutes @deva[च] and @deva[ब] differing from original @deva[क] and @deva[भ]). This rule applies even when the affix is not @deva[कित्] — @deva[थल्] is mentioned in the @[sūtra] merely for clarity, since no non-@[kit] Perfect ending other than @deva[थल्] can take @deva[इट्].
"""

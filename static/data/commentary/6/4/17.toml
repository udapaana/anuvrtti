id = "6.4.17"
numericId = "64017"

[en]
simple = """
For the root @deva[तन्] ('to extend'), lengthening before the Desiderative @deva[सन्] (without @deva[इट्]) is optional. Both @deva[तितांसति] (with lengthening) and @deva[तितंसति] (without) are valid. But when @deva[इट्] is added, only @deva[तितनिषति] is used.
"""

standard = """
Unlike other roots covered by the previous rule, @deva[तन्] allows optional (@deva[विभाषा]) lengthening before @deva[सन्] without @deva[इट्]: both @deva[तितांसति] and @deva[तितंसति] are acceptable. However, when @deva[इट्] is inserted (by @ref[7.2.49]), the form is fixed as @deva[तितनिषति] — no alternative is possible there. The optionality is thus limited to the @deva[अनिट्] context. See @ref[6.4.17].
"""

advanced = """
Lengthening of the @deva[अङ्ग] vowel of @deva[तन्] is optional before the Desiderative @deva[सन्] when @deva[सन्] lacks the @deva[इट्] augment: @deva[तितांसति] or @deva[तितंसति]. When @deva[इट्] is added (by @ref[7.2.49] @deva[वार्त्तिक], optionally), only @deva[तितनिषति] is available — no alternative applies.
"""

id = "6.4.74"
numericId = "64074"

[en]
simple = """
In presence of the @deva[अव्यय] @deva[माङ्], the @deva[अडागमः] / @deva[आडागमः] does not happen even in case of @deva[लुङ्लकार], @deva[लङ्लकार], and @deva[लृङ्लकार]
"""

standard = """
With prohibitive @deva[मा]: no augment. @deva[मा] @deva[भवान्] @deva[कार्षीत्].
"""

advanced = """
When the prohibitive particle @deva[मा] (@deva[माङ्]) is present, the augment @deva[अट्] or @deva[आट्] is not added in the aorist, imperfect, or conditional: @deva[मा] @deva[भवान्] @deva[कार्षीत्], @deva[मा] @deva[भवान्] @deva[हार्षीत्], @deva[मा] @deva[स्म] @deva[करोत्], @deva[मा] @deva[स्म] @deva[हरत्], @deva[मा] @deva[भवानीहिष्ट], @deva[मा] @deva[भवानीक्षिष्ट], @deva[मा] @deva[स्म] @deva[भवानीहत], @deva[मा] @deva[स्म] @deva[भवानीक्षत].
"""

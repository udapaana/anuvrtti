id = "6.4.39"
numericId = "64039"

[en]
simple = """
The substitution @deva[घ्न] for @deva[हन्] is also optionally available before the suffix @deva[णिनि] ('one who habitually does'). Thus both @deva[गोघ्नः] and @deva[गोहन्ता] are valid for 'one who kills cows'.
"""

standard = """
Before the affix @deva[क्तिच्], the @deva[अनुदात्त]-nasal-final roots and @deva[तनादि] neither elide the nasal nor lengthen the root vowel. Thus @deva[यन्तिः], @deva[तन्तिः] show the nasal intact and the vowel short. This contrasts with the @deva[क्त] and @deva[ल्यप्] environments where elision does occur. See @ref[6.4.39].
"""

advanced = """
Before the affix @deva[क्तिच्], the above roots (@deva[अनुदात्तोपदेश] nasal-final, @deva[वन्], @deva[तनादि]) neither elide their nasal nor lengthen their root-vowel: @deva[यन्ति]@deva[꣡], @deva[तन्ति]@deva[꣡], @deva[वन्ति]@deva[꣡]. The lengthening that @ref[6.4.15] would otherwise produce (when the nasal is not elided) is also blocked.
"""

id = "6.4.90"
numericId = "64090"

[en]
simple = """
The @deva[उपधा] letter of the verb root @deva[दुष्] is converted to @deva[ऊकार] when followed by the @deva[णिच्] @deva[प्रत्यय].
"""

standard = """
@deva[दोष्] @deva[ओ] → @deva[ऊ] before @deva[णि]. @deva[दूषयति].
"""

advanced = """
The penultimate @deva[ओ] of @deva[दोष्] (from root @deva[दुष्]) is replaced by @deva[ऊ] before the causative @deva[णि]: @deva[दूषयति], @deva[दूषयतः], @deva[दूषयन्ति]. The root is cited in its @[guṇa]-strengthened form @deva[दोष] for the same reasons as @deva[गोह्] in the preceding rule. Without @deva[णि]: @deva[दोषो] @deva[वर्त्तते].
"""

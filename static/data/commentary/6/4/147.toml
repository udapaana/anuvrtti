id = "6.4.147"
numericId = "64147"

[en]
simple = """
The last letter of an @deva[उवर्णान्त-भसंज्ञक] word is removed when followed by a @deva[ढकारादि-तद्धितप्रत्यय]. But this does not happen for the word '@deva[कद्रू]'.
"""

standard = """
@deva[उ]/@deva[ऊ] of @deva[भ] elided before @deva[ढ] (@deva[एय]). @deva[कामण्डलेयः]. But: @deva[काट्रवेयः].
"""

advanced = """
The @deva[उ] or @deva[ऊ] of a @deva[भ] stem is elided before the affix @deva[एय] (@deva[ढ]), except for the stem @deva[कट्रू]. Examples: @deva[कामण्डलेयः], @deva[शैतिवाहेयः], @deva[जाम्बेयः], @deva[माद्रवाहेयः]. Exception: @deva[काट्रवेयो] @deva[मन्त्रमपश्यत्] (from @deva[कट्रू], no elision).
"""

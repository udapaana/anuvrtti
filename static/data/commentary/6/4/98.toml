id = "6.4.98"
numericId = "64098"

[en]
simple = """
The @deva[उपधा] letter of the verb roots @deva[गम्], @deva[हन्], @deva[जन्], @deva[खन्], @deva[घस्] is removed when followed by a @deva[कित्] / @deva[ङित्] @deva[प्रत्यय], except for the @deva[अङ्] @deva[प्रत्यय].
"""

standard = """
Root vowel of @deva[गम्]/@deva[जन्]/@deva[खन्]/@deva[घस्] elided before vowel-initial @deva[क्]/@deva[ङित्] (not @deva[अङ्]). @deva[जग्मुः], @deva[जज्ञे]. But: @deva[अगमत्].
"""

advanced = """
The root-vowel (@deva[उपधा]) of @deva[गम्], @deva[हन्], @deva[जन्], @deva[खन्], and @deva[घस्] is elided before a vowel-initial affix bearing indicatory @deva[क्] or @deva[ङ्], but not before the aorist affix @deva[अङ्]: @deva[जग्मतुः], @deva[जग्मुः]; @deva[जघ्नतुः], @deva[जघ्नुः]; @deva[जज्ञे], @deva[जज्ञाते], @deva[जज्ञिरे]; @deva[चख्नतुः], @deva[चख्नुः]; @deva[जक्षतुः], @deva[जक्षुः]; @deva[अक्षन्नमीमदन्तपितरः]. The @deva[कित्]/@deva[ङित्] condition: without it, no elision — @deva[गमनम्], @deva[हननम्]. The @deva[अङ्]-exception: @deva[अगमत्], @deva[अघसत्]. The vowel-initial condition: before consonant-initial affixes, no elision — @deva[गम्यते], @deva[हन्यते].
"""

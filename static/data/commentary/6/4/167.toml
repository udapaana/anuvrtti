id = "6.4.167"
numericId = "64167"

[en]
simple = """
When a stem ending in @deva[अन्] is in the @deva[भ] position, its @deva[अन्] remains unchanged before the @deva[तद्धित] @deva[अण्] affix, whether @deva[अण्] is Patronymic or not. So @deva[सामन्] ("hymn") gives @deva[सामानः], @deva[वेमन्] gives @deva[वैमनः], and @deva[सुत्वन्] gives @deva[सौत्वनः]. In all these cases the @deva[अन्] cluster of the base is preserved in the derivative.
"""

standard = """
For @deva[भ] stems in @deva[अन्], the general expectation before @deva[अण्] would be some modification of the stem-final @deva[अन्]; this rule suspends any such change unconditionally, regardless of whether @deva[अण्] is Patronymic (@deva[गोत्र]) or non-Patronymic. The conditioning environment: @deva[भ] + @deva[अन्]-final stem + @deva[अण्] following. Forms: @deva[सामानः] (from @deva[सामन्]), @deva[वैमनः] (from @deva[वेमन्]), @deva[सौत्वनः] (from @deva[सुत्वन्]). This parallels the @deva[इन्]-preservation rules (preceding @[sūtras]) but applies universally to @deva[अण्] of both types.
"""

advanced = """
The syllable @deva[अन्] of a @deva[अङ्ग] (stem) ending in @deva[अन्] remains unchanged before @deva[अण्] affix whether Patronymic or otherwise. As @deva[सामानः], @deva[वैमनः], @deva[सौत्वनः], @deva[जैत्वनः], from @deva[सामन्], @deva[वेमन्], @deva[सुत्वन्] and @deva[जित्वन्] @deva[॥]
"""

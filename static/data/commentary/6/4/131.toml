id = "6.4.131"
numericId = "64131"

[en]
simple = """
A @deva[भसंज्ञक] @deva[अङ्ग] ending in a @deva[वसुँ] @deva[प्रत्यय] undergoes @deva[सम्प्रसारणम्].
"""

standard = """
@[samprasāraṇa]: @deva[वस्] @deva[व] → @deva[उ] when @deva[भ]. @deva[विदुषा], @deva[पेचुषः].
"""

advanced = """
The semi-vowel @deva[व] of the affix @deva[वस्] (@deva[वंस्]) undergoes @[samprasāraṇa] to @deva[उ] when the stem is @deva[भ]. Examples: @deva[विदुषः] @deva[पश्य], @deva[विदुषा], @deva[विदुषे]; @deva[पेचुषः] @deva[पश्य], @deva[पेचुषा], @deva[पेचुषे]; @deva[ययुषः] @deva[पश्य]. For purposes of @deva[आ]-elision by @ref[6.4.64], the @[samprasāraṇa] under this rule is not treated as @[asiddha] (by @ref[6.4.22]). Derivation: @deva[पा] + @deva[क्वसु] (by @ref[3.2.107]) → @deva[पपा] + @deva[वस्] → @deva[पपा] + @deva[उस्] + @deva[शस्] (by @ref[6.4.131], @ref[6.1.108]). If @deva[उ] were treated as @[asiddha], the affix would not begin with a vowel, and @ref[6.4.64] (requiring @deva[आ]-elision) could not apply; but since @[samprasāraṇa] is not @[asiddha] here: @deva[पप्] + @deva[उस्] + @deva[अस्] → @deva[पपुषः] @deva[पश्य]. In the Nominative (where the stem is not @deva[भ]): @deva[पपा] + @deva[वस्] + @deva[स्] → @deva[पपी] + @deva[वस्] + @deva[स] (by @ref[6.4.66]) → @deva[पपीवान्] (by @ref[7.1.70], @ref[6.4.10], @ref[6.1.68], @ref[8.2.23]). The affix @deva[क्वसु] is included within @deva[वसु] for @[samprasāraṇa] purposes.
"""

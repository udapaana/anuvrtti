id = "6.4.12"
numericId = "64012"

[en]
simple = """
For the words @deva[हन्], @deva[पूषन्] and @deva[अर्यमन्], and for also the words that end in '@deva[इन्]', the @deva[उपधादीर्घ] happens only in case of the '@deva[शि]' @deva[प्रत्यय], and not in case of other @deva[सर्वनामस्थानप्रत्ययाः].
"""

standard = """
Penultimate lengthened in @deva[इन्]/@deva[हन्]/@deva[पूषन्]/@deva[अर्यमन्] before @deva[शि]. @deva[बहुदण्डीनि], @deva[बहुवृत्रहाणि].
"""

advanced = """
The @deva[उपधा] vowel is lengthened before the affix @deva[शि] (nominative/accusative plural) when the @deva[अङ्ग] ends in @deva[इन्], @deva[हन्], @deva[पूषन्], or @deva[अर्यमन्]. By the maxim @deva[अन्], @deva[इन्], @deva[अस्], @deva[मन] @deva[ग्रहणान्यर्थवता] @deva[चानर्थकेन] @deva[च] @deva[तदन्त] @deva[विधिं] @deva[प्रयोजयन्ति] (see also @ref[6.4.14]), @deva[इन्] denotes 'words ending in @deva[इन्]'. The remaining items — @deva[हन्], @deva[पूषन्], @deva[अर्यमन्] — take the neuter plural @deva[शि] only as members of compounds: @deva[हन्] is formed by @deva[क्विप्] from root @deva[हन्] and requires a prior member (@ref[3.2.87]); @deva[पूषन्] and @deva[अर्यमन्] are masculine and admit @deva[शि] only within neuter compounds. Examples: @deva[बहुदण्डीनि], @deva[बहुच्छत्रीणि], @deva[बहुवृत्रहाणि], @deva[बहुभ्रूणहाणि], @deva[बहुपूषाणि], @deva[बह्वर्यमाणि]. This @deva[सूत्र] is a @deva[नियम]: @deva[सिद्धे] @deva[सत्यारम्भो] @deva[नियमार्थः] — @deva[इन्हन्पूषार्यम्णामुपधायाः] @deva[शावेव] @deva[दीर्घो] @deva[भवति] @deva[नान्यत्र]. Though @ref[6.4.8] could produce lengthening in all strong cases, the specific mention of these stems restricts lengthening to @deva[शि] alone — in other strong cases, no lengthening: @deva[दण्डिनौ], @deva[छत्रिणौ], @deva[वृत्रहणौ], @deva[पूषणौ], @deva[अर्यमणौ]. @[kārikā]: (1) By @deva[योगविभाग], this @deva[सूत्र] splits into two parts — @deva[इन्] @deva[हन्] @deva[पूषार्यम्णाम्] and @deva[शौ] — yielding two @deva[नियम]s: (a) penultimate lengthening in strong cases only for these stems, (b) lengthening before @deva[शि] only. This preserves the form @deva[भ्रूणहनि] (locative singular) used by the @deva[आचार्य], since @ref[6.4.15] would otherwise lengthen. (2) Alternatively, if the @deva[अनुवृत्ति] of @deva[सर्वनामस्थान] is dropped, the rule applies to @deva[शि] without treating it as a @deva[सर्वनामस्थान] — no conflict arises with @deva[वृत्रहायते]/@deva[भ्रूणहायते] (@deva[क्यङ्] denominatives, @ref[7.4.25]), since those involve non-penultimate operations. (3) If @deva[सर्वनामस्थान] is read in by @deva[अनुवृत्ति], the mention of @deva[शि] restricts the @deva[सर्वनामस्थान] scope for @deva[इन्]-ending stems to @deva[शि] alone. Note: @deva[शि] is the neuter plural affix (@ref[7.1.20]), a @deva[सर्वनामस्थान] by @ref[1.1.42]. Since the neuter has no other @deva[सर्वनामस्थान], this is a general @deva[नियम], not limited to neuter — @deva[नपुंसकस्य] should not be imported. Otherwise @deva[भ्रूणहनि] @deva[ब्राह्मणकुले] would lack lengthening entirely, and non-neuter stems would also be wrongly affected. For @deva[हन्]-ending stems, the subsequent @ref[6.4.15] (lengthening before @deva[कित्]/@deva[ङित्]) is blocked by this @deva[नियम]: locative singular is @deva[वृत्रहनि], @deva[भ्रूणहनि]. Rules not relating to the @deva[उपधा] remain unaffected: @deva[वृत्रहायते], @deva[भ्रूणहायते] (@deva[क्यङ्]).
"""

id = "6.4.129"
numericId = "64129"

[en]
simple = """
All the rules starting from this sutra, till the end of the sixth chapter are being told for a @deva[भसंज्ञक].
"""

standard = """
@[adhikāra]: Following rules apply to @deva[भ]-designated stems (weak cases).
"""

advanced = """
This is an @deva[अधिकार]: all rules from here to the end of this @deva[अध्याय] apply to nominal stems designated @deva[भ] (by @deva[यचि] @deva[भम्] @ref[1.4.18], @deva[तसौ] @deva[मत्वर्थे] @ref[1.4.19]). For instance, @ref[6.4.130] prescribes @deva[पद्] as substitute for @deva[पाद्] — this substitution occurs when @deva[पाद्] receives the @deva[भ] designation. Examples: @deva[द्विपदः] @deva[पश्य], @deva[द्विपदा] @deva[कृतम्] (weak cases, @deva[भ] applies); but @deva[द्विपादौ], @deva[दिपादः] (in @[sarvānāmasthāna] cases, where @deva[भ] does not apply).
"""

id = "6.4.175"
numericId = "64175"

[en]
simple = """
In Vedic usage, six words are formed irregularly: @deva[ऋत्व्य], @deva[वास्त्व्य], @deva[वास्त्व], @deva[माध्वी], and @deva[हिरण्यय], among others. For example, @deva[माध्वी] is the feminine adjective meaning "sweet / of honey," derived from @deva[मधु], and @deva[हिरण्यय] means "golden," derived from @deva[हिरण्य]. These forms appear only in Vedic texts and are listed as special stipulated formations.
"""

standard = """
Six @[chandas] (Vedic) forms are listed as @[nipātana] (stipulated irregulars): @deva[ऋत्व्य] from @deva[ऋतु], @deva[वास्त्व्य] and @deva[वास्त्व] from @deva[वास्तु], @deva[माध्वी] from @deva[मधु], and @deva[हिरण्यय] from @deva[हिरण्य]. In @deva[वास्त्व्य], the terminal @deva[उ] of @deva[वास्तु] undergoes substitution to @deva[व्] before the @deva[यत्] affix — a sandhi not predicted by standard @[pratyaya] rules for this stem. @deva[माध्वी] takes the @deva[अण्] affix in the feminine (yielding @deva[ई] via @[ṅīp]), irregularly lengthening, and @deva[हिरण्यय] is formed with @deva[मयट्] but with the @deva[म] elided, an elision not otherwise sanctioned. All six are confined to Vedic usage and accepted purely on the authority of @[chandas] occurrence.
"""

advanced = """
In the @deva[छन्दस्] (Vedas) the following are irregularly formed 1. @deva[ऋत्व्य] 2. @deva[वास्त्व्य] 3.4. @deva[वास्त्व] 5. @deva[माध्वी] and 6. @deva[हिरण्यय]@deva[।] The word @deva[ऋत्व्य] is derived from @deva[ऋतु], and @deva[वास्त्व्य] from @deva[वास्तु] with the affix @deva[यत्], @deva[उ] being changed to @deva[व] @deva[॥] @deva[ऋतौ] @deva[भवम्] = @deva[ऋत्व्यम्], @deva[वास्तौ] @deva[भवम्] = @deva[वास्त्व्यम्] @deva[॥] @deva[वास्त्व] is from @deva[वस्तु], as @deva[वस्तुनि] @deva[भवः] = @deva[वात्स्वः] with the affix @deva[अण्] @deva[॥] @deva[माध्वी] from @deva[मधु] with the affix @deva[अण्] in the feminine, as @deva[माध्वीर्नः] @deva[सन्त्वोषधीः] @deva[॥] @deva[हिरण्यय] is from @deva[हिरण्य] with the affix @deva[मयट्], there @deva[म] being elided.
"""

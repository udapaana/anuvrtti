id = "6.4.107"
numericId = "64107"

[en]
simple = """
The @deva[उकार] which occurs at end of a @deva[प्रत्यय] is optionally deleted when followed by a @deva[मकार] / @deva[वकार] , provided that a @deva[संयोग] is not present immediately before this @deva[उकार].
"""

standard = """
@deva[विकरण] @deva[उ] optionally elided before @deva[म्]/@deva[व्]-initial (no conjunct). @deva[सुन्वः] or @deva[सुनुवः].
"""

advanced = """
The @deva[उ] of @deva[विकरण] @deva[उ] and @deva[श्नु], when not preceded by a conjunct consonant, may optionally be elided before a personal affix beginning with @deva[म्] or @deva[व्]. Examples: @deva[सुन्वः] or @deva[सुनुवः], @deva[सुन्मः] or @deva[सुनुमः], @deva[तन्वः] or @deva[तनुवः], @deva[तन्मः] or @deva[तनुमः]. The @deva[उ] must belong to the affix, not the root — hence no elision in @deva[युवः], @deva[युमः]. When preceded by a conjunct consonant, elision is blocked: @deva[शक्नुवः], @deva[शक्नुमः] only. The use of @deva[लोप] (rather than @deva[लुक्], which was already available by @[anuvṛtti]) is significant: @deva[लुक्], @deva[श्लु], and @deva[लुप्] elide the entire affix, whereas @[lopa] elides only the final letter. If the whole affix were elided, forms like @deva[सुन्वः] could not arise. Furthermore, in @deva[कुर्व] and @deva[कुर्म] (formed by @[guṇa] of @deva[कृ]), @deva[लुक्] would have prevented @[guṇa] by @ref[1.1.63]; but @deva[लोप] permits @[guṇa] by @ref[1.1.62].
"""

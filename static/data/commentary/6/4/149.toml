id = "6.4.149"
numericId = "64149"

[en]
simple = """
The stems @deva[सूर्य] ("sun"), @deva[तिष्य] (a star name), @deva[अगस्त्य] (a sage's name), and @deva[मत्स्य] ("fish") lose their penultimate @deva[य्] before a @deva[तद्धित] suffix when in the @deva[भ] position. For example, @deva[सूर्य] → @deva[सौरी] ("daughter of the sun") and @deva[अगस्त्य] → @deva[आगस्ती]. This rule also applies to derivatives of these words when they are in the @deva[भ] position.
"""

standard = """
In @deva[भ]-position stems, the penultimate @deva[य्] of @deva[सूर्य], @deva[तिष्य], @deva[अगस्त्य], and @deva[मत्स्य] (and their derivatives when in @deva[भ] position) is elided before any @deva[तद्धित] affix. The @deva[भ] position arises when the stem is followed by a case suffix beginning with a vowel (i.e., it is in a weak case environment for @deva[तद्धित] derivation purposes). Results: @deva[सूर्य] → @deva[सौरी], @deva[तिष्य] → @deva[तैषी], @deva[अगस्त्य] → @deva[आगस्ती], @deva[मत्स्य] → @deva[मत्सी]. The elision of penultimate @deva[य्] is thus a special provision for these four roots beyond the general @deva[य्]-elision rules.
"""

advanced = """
The penultimate @deva[य्] of @deva[सूर्य], @deva[तिष्य], @deva[अगस्त्य], and @deva[मत्स्य] — and their derivatives when in the @deva[भ] position — is elided before a @deva[तद्धित] affix. Derivation of @deva[सौरी]: @deva[सूर्य] + @deva[अण्] (by @ref[4.3.112]) = @deva[सौर्य]; then + @deva[ई] of @deva[ङीप्] → @deva[सौरी], as in @deva[सौरी] @deva[बलाका]. From @deva[तिष्य]: @deva[तैषमहः], @deva[तैषी] @deva[रात्रिः]. From @deva[अगस्त्य]: @deva[अगस्त्यस्यापत्यं] @deva[स्त्री] = @deva[आगस्ती] (by @ref[4.1.114]), @deva[आगस्तीयः]. From @deva[मत्स्य]: @deva[मत्सी] (with @deva[ङीष्], @[gaurādi] class by @ref[4.1.40]). The rule extends to derivatives (not just the base words themselves in @deva[भ]) — if limited to base words only, @deva[सौरी] @deva[बलाका] could not arise, since before @deva[ई] it is @deva[सौर्य] (not @deva[सूर्य]) that is @deva[भ]. This illustrates @ref[6.4.22]: the @[asiddha] principle requires the same @deva[आश्रय]. @deva[सौर्य] + @deva[ई] → @deva[सौर्य्] + @deva[अ]-@[lopa] + @deva[ई] → @deva[सौरी]. The earlier @[lopa] (@deva[अ] of @deva[सूर्य] before @deva[अण्]) has a different @deva[आश्रय] and is therefore not @[asiddha] for @deva[य]-elision; but the @[lopa] of @deva[अ] before @deva[ई] has the same @deva[आश्रय], so it is @[asiddha] — @deva[य्] retains its @[upadhā] status and is elided. The @[sthānivat] principle cannot assist here, being set aside for @deva[यलोप] (see @ref[1.1.58]). The restriction to penultimate @deva[य्] is significant: @deva[मत्स्यचरी] (@deva[चरट्] added to @deva[मत्सी] by @ref[5.3.53], @deva[मत्सी] → masculine @deva[मत्स्य] by @ref[6.4.35], + @deva[ङीप्] by @ref[4.1.15]) — here @deva[य] is not penultimate, so no elision. The mention of @deva[य] serves subsequent @[sūtra]s; @deva[उपधायाः] alone would suffice here. @[vārtika]s restrict the generality: (1) @deva[य] of @deva[मत्स्य] is elided only before feminine @deva[ई] — not in @deva[मत्स्यस्येदं] @deva[मांसं] = @deva[मात्स्यम्]. (2) @deva[सूर्य] and @deva[अगस्त्य] undergo elision before @deva[छ] and feminine @deva[ई]: @deva[सौरीयः], @deva[सौरी], @deva[आगस्तीयः], @deva[आगस्ती] — but not in @deva[सौर्यं] @deva[चरुं] @deva[निर्वपेत्] or @deva[आगस्त्य] with Patronymic @deva[अण्] (by @ref[4.1.114]). (3) @deva[तिष्य] and @deva[पुष्य] when referring to asterisms: @deva[तिष्येण] @deva[नक्षत्रेण] @deva[युक्तः] @deva[कालः] = @deva[तैषः], @deva[पौषः] (by @ref[4.2.3]). (4) @deva[अन्तिक] before @deva[तसि]: @deva[क] is elided with first-syllable acute — @deva[अन्तितः] in @deva[अन्तितो] @deva[न] @deva[दूरात्] (by @ref[5.4.45]). (5) Before @deva[तम]: @deva[अन्तमः] or @deva[अन्तितमः], in @deva[अग्रे] @deva[त्वं] @deva[नो] @deva[अन्तिमः] @deva[अन्तितमे] @deva[अवरोहति]. (6) @deva[क]-elision of @deva[अन्तिक] applies diversely before the second compound member: @deva[अन्तिके] @deva[सीदति] = @deva[अन्तिषत्] (@deva[स] → @deva[ष] by @ref[8.3.106]). (7) Elision applies before affix @deva[य] as well: @deva[अन्तियः] (Atharva-veda; @deva[अन्तिके] @deva[भवः], with @deva[यत्] by @ref[4.4.110]).
"""

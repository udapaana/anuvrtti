id = "6.4.83"
numericId = "64083"

[en]
simple = """
An @deva[उवर्ण] occurring at end of an a @deva[असंयोगपूर्व] @deva[धातु] which in turn occurs at end of an @deva[अनेकाच्] @deva[अङ्ग] is converted to @deva[यण्] letter when followed by a @deva[सुप्] @deva[अजादिप्रत्यय].
"""

standard = """
@deva[व्] for polysyllabic @[dhātu-]@deva[ऊ] before @deva[सुप्]. @deva[खलप्वौ], @deva[शतस्वौ].
"""

advanced = """
Before a vowel-initial @deva[सुप्] (case-affix), semivowel @deva[व्] replaces the final @deva[ऊ] of an @deva[अनेकाच्] @deva[अङ्ग] ending in a root whose @deva[ऊ] is not preceded by a root-internal conjunct. No roots end in short @deva[उ] at stem-final, so only @deva[ऊ] is relevant. Examples: @deva[खलपू] ('sweeper') → dual @deva[खलप्वौ], plural @deva[खलप्वः]; @deva[शतस्वौ], @deva[शतस्वः]; @deva[सकृल्लू] → @deva[सकृल्ल्वौ], @deva[सकृल्ल्वः]. Before tense-affixes (non-@deva[सुप्]): @deva[लुलुवतुः], @deva[लुलुवः] (by @deva[उवङ्]). Monosyllabic stems: @deva[लू] → @deva[लुवौ], @deva[लुवः] (by @deva[उवङ्]). Root-internal conjunct blocks the rule: @deva[कटप्रू] → @deva[कटप्रुवौ], @deva[कटप्रुवः]. When the first member is neither @deva[गति] nor @deva[कारक]: @deva[परमलूः] → @deva[परमलुवौ], @deva[परमलुवः].
"""

id = "6.4.75"
numericId = "64075"

[en]
simple = """
In @deva[वेदाः], the @deva[अडागम] @deva[आडागम] may or may not be seen done in presence of @deva[माङ्].
"""

standard = """
Vedic diversity: augment with @deva[मा] or without @deva[मा]. @deva[मा] @deva[अभित्थाः]; @deva[जनिष्ठा] @deva[उग्रः].
"""

advanced = """
In the @deva[छन्दस्], the augment @deva[अट्]/@deva[आट्] is applied diversely: it sometimes appears even with @deva[मा], and is sometimes omitted even without @deva[मा]. Without @deva[मा] yet without augment: @deva[जनिष्ठा] @deva[उग्रः] (RV X.73.1), @deva[काममूनयीत्] (RV I.53.3), @deva[काममर्दयीत्]. With @deva[मा] yet with augment retained: @deva[मा] @deva[वः] @deva[क्षेत्रे] @deva[परबीजान्यवाप्सुः], @deva[मा] @deva[अभित्थाः], @deva[मा] @deva[आवः].
"""

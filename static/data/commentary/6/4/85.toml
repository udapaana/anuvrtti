id = "6.4.85"
numericId = "64085"

[en]
simple = """
The words @deva[भू] and @deva[सुधी] do not undergo @deva[यणादेश] when followed by @deva[अजादि] @deva[सुप्] @deva[प्रत्यय].
"""

standard = """
@deva[भू]/@deva[सुधी]: no semivowel substitution. @deva[प्रतिभुवौ], @deva[सुधियौ].
"""

advanced = """
Semivowel (@deva[यण्]) substitution does not apply to stems ending in @deva[भू] or to the word @deva[सुधी] before vowel-initial affixes. Instead, @deva[उवङ्]/@deva[इयङ्] applies (@ref[6.4.77]): @deva[प्रतिभू] → @deva[प्रतिभुवौ], @deva[प्रतिभुवः]; @deva[सुधी] → @deva[सुधियौ], @deva[सुधियः].
"""

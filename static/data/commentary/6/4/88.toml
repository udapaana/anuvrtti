id = "6.4.88"
numericId = "64088"

[en]
simple = """
The verb root '@deva[भू]' gets a @deva[वुक्] @deva[आगम] when followed by an @deva[अजादि-प्रत्यय] of @deva[लुङ्लकार] or @deva[लिट्लकार].
"""

standard = """
@deva[भू] gets @deva[व्] (@deva[वुक्]) before aorist/perfect vowel-initial. @deva[अभूवम्], @deva[बभूव].
"""

advanced = """
Root @deva[भू] receives the augment @deva[व्] (@deva[वुक्]) before vowel-initial tense-affixes of the aorist (@deva[लुङ्]) and perfect (@deva[लिट्]): @deva[अभूवन्], @deva[अभूवम्]; @deva[बभूव], @deva[बभूवतुः], @deva[बभूवुः].
"""

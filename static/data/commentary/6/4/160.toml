id = "6.4.160"
numericId = "64160"

[en]
simple = """
After the substitute stem @deva[ज्य] (which replaces @deva[प्रशस्य], "praiseworthy"), the initial @deva[ई] of the comparative suffix @deva[ईयस्] is changed to @deva[आ]. This gives @deva[ज्यायान्] ("better", the comparative of "good/praiseworthy"). The substitute @deva[ज्य] for @deva[प्रशस्य] is established at @ref[5.3.61].
"""

standard = """
The rule specifies that after @deva[ज्य] (the substitute of @deva[प्रशस्य] by @ref[5.3.61]), the first sound of @deva[ईयस्] — namely @deva[ई] — is replaced by @deva[आ]. The conditioning environment is: base = @deva[ज्य] + suffix = @deva[ईयस्]; the phonological change is @deva[ई] → @deva[आ] at the juncture. Result: @deva[ज्य] + @deva[आयस्] → @deva[ज्यायान्] (comparative of "good"). This forms an irregular comparative alongside the superlative @deva[ज्येष्ठः] ("eldest/best"), and the pair reflects suppletive degree-marking for the notion of "praiseworthy/good."
"""

advanced = """
@deva[आ] is substituted for the first letter of @deva[ईयस्] after @deva[ज्य]@deva[।] As @deva[ज्यायान्] @deva[॥] @deva[ज्य] is substituted for @deva[प्रशस्य] by @ref[5.3.61]. '@[lopa]' being shut out by the intervening @deva[यिट्] @ref[6.4.159], the @deva[आत्] is read in this @[sutra]. If the @[anuvritti] of '@[lopa]' were present here, then the @deva[अ] of @deva[ज्य] would be lengthened before @deva[यस्] by @ref[7.4.25], and we would get the form @deva[ज्यायान्] @deva[॥] The peculiar construction of this @[sutra] indicates the existence of the following maxim:- @deva[अङ्गवृत्ते] @deva[पुनर्वृत्तावविधिः] "when an operation which is taught in the @[angadhikara] (VI.4, end-VII.4, end) has taken place, and another operation of the @[angadhikara] is subsequently applicable, this latter operation is not allowed to take place." In @ref[7.4.25], however, @deva[क्ङित्] is understood, and lengthening could not have taken place by that rule.
"""

id = "6.4.25"
numericId = "64025"

[en]
simple = """
The @deva[उपधा-नकार] of the verbs @deva[दंश्], @deva[सञ्ज्] and @deva[स्वञ्ज्] is removed in presence of the @deva[विकरणप्रत्यय] @deva[शप्] @deva[।]
"""

standard = """
Dative/ablative/genitive/locative singular endings in @deva[इ] after nasal-elided stem: @deva[य्] inserted. @deva[प्राच्ये], @deva[प्राच्यः].
"""

advanced = """
The nasal of @deva[दंश्], @deva[सञ्ज्], and @deva[स्वञ्ज्] is elided before the @deva[गणविकरण] @deva[शप्] of the @deva[भ्वादिगण] (1st conjugation). Examples: @deva[दशति], @deva[सजति], @deva[परिष्वजते]. For the change of @deva[स्] to @deva[ष] in @deva[स्वञ्ज्], see @ref[8.3.65].
"""

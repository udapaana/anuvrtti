id = "6.4.126"
numericId = "64126"

[en]
simple = """
The @deva[ए]-substitution rule does not apply to the roots @deva[शस्] ("to cut"), @deva[दद्] ("to give"), or any root beginning with @deva[व्]. It also does not apply when the @deva[अ] in the stem is itself the result of a @deva[कित्] or @deva[ङित्] substitution. So @deva[विशशसतुः], @deva[दददे], and @deva[ववमतुः] all retain normal reduplication with no @deva[अभ्यास]-elision.
"""

standard = """
This rule states the exceptions to the preceding @deva[ए]-substitution rules: the @deva[अभ्यास]-elision and @deva[ए]-substitution do not apply to @deva[शस्], @deva[दद्], @deva[व्]-initial roots, or to stems where @deva[अ] arises from a @deva[कित्] or @deva[ङित्] substitution. The rationale for @deva[व्]-initial roots is that reduplication over an initial @deva[व्] produces phonological complications, and the grammarian prefers to preserve the standard form. Forms: @deva[विशशसतुः] (from @deva[शस्] with @deva[वि]), @deva[दददे] (from @deva[दद्]), @deva[ववमतुः] (from @deva[वम्]). All show regular reduplication without @deva[ए] substitution.
"""

advanced = """
@deva[ए]-substitution and @[abhyāsa]-elision do not apply to: (1) @deva[शस्], (2) @deva[दद्], (3) roots beginning with @deva[व्], or (4) stems where @deva[अ] results from a @deva[कित्]/@deva[ङित्] substitution (@[guṇa]). From @deva[शस्]: @deva[विशशसतुः], @deva[विशशसुः], @deva[विशशसिथे]. From @deva[दद्]: @deva[दददे], @deva[दददाते], @deva[दददिर]. From @deva[व्]-initial roots: @deva[ववमतुः], @deva[ववमुः], @deva[ववमिथ]. Where @deva[अ] arises from @[guṇa]: @deva[विशशरतुः], @deva[विशशरुः], @deva[विशशरिथ], @deva[लुलविथ], @deva[पुपविथ]. The principle: @deva[गुणशब्दाभिनिर्वृत्तस्यार्शब्दस्यौकारस्य] @deva[चायमकार] @deva[इति] @deva[एत्वं] @deva[प्रतिषिध्यते] — the @deva[अ] produced by @[guṇa] is excluded. This @deva[अ] may arise from @[guṇa] of @deva[ऋ] (as @deva[कृ] → @deva[कर्]) or from @[guṇa] of @deva[उ] → @deva[ओ] → @deva[अव्] (as @deva[लु] → @deva[लव]).
"""

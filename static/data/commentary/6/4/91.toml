id = "6.4.91"
numericId = "64091"

[en]
simple = """
To indicate impurification of mind / intellect, the @deva[उपधा] letter of the verb root @deva[दुष्] is optionally converted to @deva[ऊकार] when followed by the @deva[णिच्] @deva[प्रत्यय].
"""

standard = """
@deva[दोष्] @deva[ओ] → @deva[ऊ] optionally when mental disturbance meant. @deva[चित्तं] @deva[दूषयति] or @deva[दोषयति].
"""

advanced = """
The @deva[ओ] of @deva[दोष्] is optionally replaced by @deva[ऊ] when the sense is that of the disturbing of the mind. As @deva[चित्तं] or @deva[प्रज्ञां] @deva[दूषयति] or @deva[दोषयति] @deva[॥] Otherwise @deva[साधनं] @deva[दूषयति] when mental agitation is not meant.
"""

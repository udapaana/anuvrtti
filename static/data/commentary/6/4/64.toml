id = "6.4.64"
numericId = "64064"

[en]
simple = """
The final @deva[आ] of a root is elided before an @deva[आर्धधातुक] affix that either takes the augment @deva[इट्] or begins with a vowel and bears indicatory @deva[क्] or @deva[ङ्]. This is a major rule governing the perfect and other @deva[आर्धधातुक] forms of @deva[आ]-final roots. Example: @deva[पा] + perfect 2sg @deva[थल्] → @deva[पपिथ]; @deva[दा] → @deva[ददतुः].
"""

standard = """
This rule elides the terminal @deva[आ] of a verbal root in two environments: (1) before an @deva[आर्धधातुक] affix that takes augment @deva[इट्], or (2) before a @deva[क्]/@deva[ङ्]-marked @deva[आर्धधातुक] that begins with a vowel. The result is that the root appears without its final @deva[आ], allowing the affix to attach directly to the preceding consonant cluster. Examples: @deva[पपिथ] (perfect 2sg of @deva[पा] 'to drink'), @deva[तस्थिथ] (of @deva[स्था] 'to stand'), @deva[ददतुः] (of @deva[दा] 'to give'), @deva[गोदः] (a derived form). Compare @ref[6.4.66] for the substitution of @deva[ई] in a subset of these roots.
"""

advanced = """
The final @deva[आ] of a root is elided before an @deva[आर्धधातुक] affix that takes augment @deva[इट्], and also before one that begins with a vowel and has indicatory @deva[क्] or @deva[ङ्]. With @deva[इट्]-augmented affixes: @deva[पपिथ], @deva[तस्थिथ]. With @deva[कित्] affixes (by @ref[1.2.5]): @deva[पपतुः], @deva[पपुः], @deva[तस्थतुः], @deva[तस्थुः]; @deva[गोदः], @deva[कम्बलदः] (with affix @deva[क] by @ref[3.2.3]); @deva[प्रदा] (fem.), @deva[प्रधा] (fem.) by @deva[अङ्] @ref[3.3.106]. Before @deva[सार्वधातुक] affixes, @deva[आ] is not elided: @deva[यान्ति], @deva[वान्ति]. The forms @deva[व्यत्यरे] and @deva[व्यत्यले] are imperfect 1st person singular @deva[आत्मनेपद] of @deva[रा] and @deva[ला] with affix @deva[इट्]. When the affix does not begin with a vowel, no elision occurs: @deva[ग्लायते], @deva[दासीय].
"""

id = "6.4.15"
numericId = "64015"

[en]
simple = """
If an @deva[अङ्ग] ends in an @deva[अनुनासिक], the @deva[उपधा] letter of that @deva[अङ्ग] becomes @deva[दीर्घ] in presence of a @deva[क्विप्-प्रत्यय], @deva[झलादि-कित्-प्रत्यय] and a @deva[झलादि-ङित्-प्रत्यय].
"""

standard = """
Penultimate lengthened in nasal-ending before @deva[क्वि] and @deva[झलादि] @deva[क्]/@deva[ङित्]. @deva[शान्तः], @deva[शान्त्वा].
"""

advanced = """
The @deva[उपधा] vowel of a nasal-final @deva[अङ्ग] is lengthened before @deva[क्वि] and before @deva[झलादि] affixes marked @deva[कित्] or @deva[ङित्]. Before @deva[क्वि]: @deva[प्रशान्] and @deva[प्रतान्] from roots @deva[शम्] and @deva[तम्] (by @ref[8.2.64]). Before @deva[झलादि] @deva[कित्] affixes: @deva[शान्तः] (with @deva[क्त]), @deva[शान्तवान्] (with @deva[क्तवतु]), @deva[शान्त्वा] (with @deva[क्त्वा]), @deva[शान्तिः] (with @deva[क्तिन्]). Before @deva[झलादि] @deva[ङित्] affixes: @deva[शंशान्तः] and @deva[तन्तान्तः], formed with @deva[तस्] (3rd person dual) added to the intensive stems of @deva[शम्] and @deva[तम्]; @deva[तस्] is @deva[ङित्] by @ref[1.2.4]. The condition 'nasal-final' excludes @deva[ओदनपक्], @deva[पक्वः], @deva[पक्ववान्]. The condition '@deva[क्वि] or @deva[झलादि]' excludes @deva[गम्यते], @deva[रम्यते]. The condition '@deva[कित्]/@deva[ङित्]' excludes @deva[गन्ता] and @deva[रन्ता].
"""

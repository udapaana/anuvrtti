id = "6.4.127"
numericId = "64127"

[en]
simple = """
The stem @deva[अर्वन्] ("a horse") normally adds @deva[त्] after the @deva[न्] (forming @deva[अर्वन्त्]) in all cases except the Nominative singular and when combined with the negative particle @deva[नञ्]. So in the dual we get @deva[अर्वन्तौ] and in the plural @deva[अर्वन्तः]. But the Nominative singular remains @deva[अर्वा], and with @deva[नञ्] the form is @deva[अनर्वाणौ].
"""

standard = """
This rule substitutes @deva[तृ] (i.e., adds @deva[त्]) for the final @deva[न्] of @deva[अर्वन्] in all strong-case forms, conditioning the paradigm to take @deva[अर्वन्त्] as the @deva[भ] stem base. The exceptions are the Nominative singular (where the final @deva[न्] is weakened differently, giving @deva[अर्वा]) and compounds with @deva[नञ्] (giving @deva[अनर्वाणौ] with a different stem). Thus: @deva[अर्वन्तौ] (Nom. dual), @deva[अर्वन्तः] (Nom. pl.), @deva[अर्वन्तम्] (Acc. sg.), but @deva[अर्वा] (Nom. sg.). The @deva[नञ्]-compound exceptions reflect a separate morphological treatment of negative compounds in Sanskrit.
"""

advanced = """
@deva[तृ] replaces the final of the stem @deva[अर्वन्], except in the Nominative singular and when compounded with @deva[नञ्]. The actual substitute is @deva[त्]; the @deva[ऋ] serves to make the affix @deva[उगित्], triggering the @deva[नुम्] augment in @[sarvānāmasthāna] cases by @ref[7.1.70]. Paradigm: @deva[अर्वन्तौ], @deva[अर्वन्तः], @deva[अर्वन्तम्], @deva[अर्वन्तौ], @deva[अर्वतः], @deva[अर्वता], @deva[अर्वद्भ्याम्], @deva[अर्वद्भिः], @deva[अर्वती], @deva[आर्वतम्]. Nominative singular: @deva[अर्वा] (exception). With @deva[नञ्]: @deva[अनर्वाणौ], @deva[अनर्वाणः], @deva[अनर्वाणं] @deva[वृषभं] @deva[मन्द्रजिह्वम्] (exception).
"""

id = "6.4.137"
numericId = "64137"

[en]
simple = """
For a @deva[भसंज्ञक] @deva[अङ्ग] which ends in an '@deva[अन्]', and also contains a @deva[मकारान्त] / @deva[वकारान्त] @deva[संयोगवर्ण] before this @deva[अन्], the '@deva[अ]' of @deva[अन्] does not get omitted.
"""

standard = """
Consonant-preceded @deva[वन्]/@deva[मन्]: @deva[अ] not elided. @deva[पर्वणा], @deva[चर्मणा].
"""

advanced = """
The @deva[अ] of @deva[अन्] is not elided when the @deva[भ] stem ends in @deva[वन्] or @deva[मन्] with a consonant preceding @deva[व्] or @deva[म्]. Examples: @deva[पर्वणा], @deva[पर्वण], @deva[अथर्वणा], @deva[अथर्वणे]; @deva[चर्मणा], @deva[चर्मणे]. When @deva[व्]/@deva[म्] is not preceded by a consonant, elision applies: @deva[प्रतिदीव्ना], @deva[प्रतिदीव्ने]; @deva[साम्ना], @deva[साम्ने]. The restriction to @deva[वन्]/@deva[मन्] stems means other @deva[अन्]-final stems undergo elision: @deva[तक्ष्णा], @deva[तक्ष्णे].
"""

id = "6.4.66"
numericId = "64066"

[en]
simple = """
For a specific set of roots — the @deva[घु] class (@deva[दा], @deva[धा]), @deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा] (@deva[जुहाति] type), and @deva[सा] — the final @deva[आ] becomes @deva[ई] before a consonant-initial @deva[आर्धधातुक] suffix marked with @deva[क्] or @deva[ङ्]. This produces the passive and related forms with '-@[ī-]' in the stem. Example: @deva[दा] → @deva[दीयते] 'is given'; @deva[पा] → @deva[पीयते] 'is drunk'.
"""

standard = """
The rule substitutes @deva[ई] for final @deva[आ] in @deva[घु]-roots (@deva[दा], @deva[धा]) and roots @deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा] (the @deva[जुहाति] class), and @deva[सा], when a consonant-initial @deva[आर्धधातुक] affix with @deva[क्]/@deva[ङ्] follows. The consonant-initial restriction distinguishes this rule from @ref[6.4.64] (which handles vowel-initial affixes and @deva[इट्]-taking affixes). Results: @deva[दीयते] 'is given' (@deva[दा] + @deva[य] + @deva[ते]), @deva[पीयते] 'is drunk'. The @deva[ई] substitution is blocked before @deva[ल्यप्] by @ref[6.4.69].
"""

advanced = """
@deva[ई] replaces the final @deva[आ] of @deva[घु]-roots (@deva[दा], @deva[धा]) and of @deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा] (@deva[जुहाति]-class), and @deva[सा] (@deva[सो]) before a consonant-initial @deva[आर्धधातुक] affix with indicatory @deva[क्] or @deva[ङ्]. With @deva[यक्]: @deva[दीयते], @deva[धीयते]. With @deva[यङ्]: @deva[देदीयते], @deva[वेघीयते]. Further: @deva[मीयते], @deva[मेमीयते], @deva[स्थीयते], @deva[तेष्ठीयते], @deva[गीयते], @deva[जेगीयते], @deva[अध्यगीष्ट], @deva[अध्यगीषाताम्], @deva[अध्यगीषत], @deva[पीयते], @deva[पेपीयते], @deva[हीयते], @deva[जेहीयते], @deva[अवसीयते], @deva[अवसेसीयते]. The @deva[पा] intended here is @deva[भ्वादि] @deva[पा] 'to drink', not @deva[अदादि] @deva[पा] 'to protect' (whose @deva[शप्] is elided, giving @deva[पायते]). Similarly @deva[हा] here is the @deva[जुहाति]-class root, not @deva[जिहीयते] (whose form is @deva[हायते]). The consonant-initial restriction (@deva[हल्]) is critical: before vowel-initial affixes, @ref[6.4.64] applies instead — @deva[ददतुः], @deva[ददुः]. Without @deva[हल्], @deva[ई]-substitution would override @deva[आ]-elision even before vowel affixes @deva[अतु]/  @deva[उस्]. The use of @deva[हल्] thus serves as a @[jñāpaka] that @[vipratisedha] (@ref[1.4.2]) operates within this @[asiddha] section (@ref[6.4.22]): @deva[ई]-substitution supersedes @deva[आ]-@[lopa]. Before non-@deva[कित्]/non-@deva[ङित्] affixes: @deva[दाता], @deva[धाता].
"""

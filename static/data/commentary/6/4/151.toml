id = "6.4.151"
numericId = "64151"

[en]
simple = """
The @deva[य्] of a Patronymic suffix, when preceded by a consonant in the stem, is dropped before any @deva[तद्धित] suffix that does not begin with @deva[आ]. So @deva[गार्ग्य] → @deva[गार्गकम्] (with suffix @deva[कन्]) and @deva[वात्स्य] → @deva[वात्सकम्]. But when the following @deva[तद्धित] suffix begins with @deva[आ], the @deva[य्] is retained: @deva[गार्ग्यायणः], @deva[वात्स्यायनः].
"""

standard = """
In a @deva[भ] stem formed with a Patronymic affix, the consonant-preceded @deva[य्] of that affix is elided before a @deva[तद्धित] suffix that is not @deva[आ]-initial (@deva[आदि]). The conditioning environment has two components: (1) the @deva[य्] belongs to a Patronymic @deva[तद्धित] affix, (2) it is preceded by a consonant, and (3) the following @deva[तद्धित] does not begin with @deva[आ]. When all three hold: @deva[गार्ग्य] → @deva[गार्गकम्], @deva[वात्स्य] → @deva[वात्सकम्]. When the subsequent affix begins with @deva[आ], the @deva[य्] is preserved: @deva[गार्ग्यायणः] (with @deva[फक्] @deva[आयन]), @deva[वात्स्यायनः]. The @deva[आ]-initial exception reflects sandhi-preserving behaviour.
"""

advanced = """
The consonant-preceded @deva[य्] of a Patronymic affix is elided before a @deva[तद्धित] that does not begin with long @deva[आ]. Examples: @deva[गर्गाणां] @deva[समूहः] = @deva[गार्गकम्] (from @deva[गार्ग्य]), @deva[वात्सकम्] (from @deva[वात्स्य]; @ref[4.2.37]--@ref[4.2.40]). The restriction to Patronymic @deva[य]: @deva[सांकाश्यकः], @deva[काम्पिल्यकः] (by @ref[4.2.80]; non-Patronymic @deva[य], no elision). The repetition of @deva[तद्धित] in the @[sūtra] indicates that elision occasionally extends to non-Patronymic @deva[य] as well: @deva[सामी] @deva[इष्टिः]. Before @deva[आ]-initial @deva[तद्धित], @deva[य] is retained: @deva[गार्ग्यायणः], @deva[वात्स्यायनः]. The consonant-precedence condition excludes: @deva[कारिकेयस्यापत्यं] = @deva[कारिकेयिः]. The restriction to @deva[तद्धित] (not case affixes): @deva[गार्ग्ययोः], @deva[वात्स्ययोः] (Genitive/Locative dual, no elision).
"""

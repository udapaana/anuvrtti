id = "6.4.48"
numericId = "64048"

[en]
simple = """
The final @deva[अ] of a verbal stem (@deva[अङ्ग]) is deleted before an @deva[आर्धधातुक] affix. For example, from the Desiderative stem @deva[चिकीर्ष] (ending in @deva[अ]), the @deva[अ] is dropped before @deva[तृच्] to give @deva[चिकीर्षिता].
"""

standard = """
Under the @[adhikāra] of @ref[6.4.46], the final @deva[अ] of a verbal @deva[अङ्ग] is elided before @deva[आर्धधातुक] affixes. Thus Desiderative stem @deva[चिकीर्ष] → @deva[चिकीर्ष्] + @deva[इता] → @deva[चिकीर्षिता], @deva[चिकीर्षितुम्]. Similarly @deva[धिन्व्] → @deva[धिनुतः], @deva[कृण्व्] → @deva[कृणुतः] (where stem-final @deva[अ] is removed). See @ref[6.4.48].
"""

advanced = """
The final @deva[अ] of an @deva[अङ्ग] is elided before an @deva[आर्धधातुक] affix: @deva[चिकीर्षिता], @deva[चिकीर्षितुम्], @deva[चिकीर्षितव्यम्] from Desiderative @deva[चिकीर्ष]. Similarly @deva[धिनुतः] and @deva[कृणुतः] from @deva[धिन्व्] and @deva[कृण्व्]: @deva[धिन्व्] + @deva[उ] @ref[3.1.80] = @deva[धिन्] + @deva[अ] + @deva[उ] = @deva[धिन्] + @deva[उ] (the @deva[अ] elided before @deva[आर्धधातुक] @deva[उ]) = @deva[धिनु], whence 3rd person dual @deva[धिनुतः]. The addition of @deva[अ] by @ref[3.1.80] and its subsequent elision here is not redundant: the elided @deva[अ], being @[sthānivat], blocks @[guṇa] of @deva[धि]. So too @deva[कृणुतः] — see @ref[3.1.80]. The rule specifies @deva[अ] only — @deva[इ] and @deva[उ] are not elided, as in @deva[चेता], @deva[स्रोता]. The @deva[त्] in @deva[अतः] restricts to short @deva[अ]; long @deva[आ] is unaffected: @deva[याता], @deva[वाता]. Before @deva[सार्वधातुक] or @deva[तद्धित] affixes, no elision occurs: @deva[वृक्षत्वम्], @deva[वृक्षता]. @[vārttika]: this @deva[अ]-elision overrides subsequent @[vṛddhi] and lengthening rules — @deva[चिकीर्षकः], @deva[जिहीर्षकः], @deva[चिकीर्ष्यते], @deva[जिहीर्ष्यते].
"""

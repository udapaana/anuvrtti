id = "6.4.142"
numericId = "64142"

[en]
simple = """
The '@deva[ति]' of the @deva[भसंज्ञक] '@deva[विंशति]' word is removed.
"""

standard = """
@deva[विंशति] @deva[ति] elided before @deva[ड]-marked affix. @deva[विंशकः], @deva[एकविंशः].
"""

advanced = """
The @deva[ति] of the @deva[भ] stem @deva[विंशति] is elided before an affix with indicatory @deva[ड्]. Examples: @deva[विंशकः] = @deva[विंशत्या] @deva[क्रीतः] (with @deva[ड्वुन्] by @ref[5.1.24]); @deva[विंशं] @deva[शतम्] (@deva[विंशतेः] @deva[पूरणो] @deva[विंशः], with @deva[डट] by @ref[5.2.43]); @deva[एकविंशः]. Without indicatory @deva[ड्], @deva[ति] is retained: @deva[विंशत्या].
"""

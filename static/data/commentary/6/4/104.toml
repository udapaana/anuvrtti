id = "6.4.104"
numericId = "64104"

[en]
simple = """
The @deva[तिङ्] @deva[प्रत्यय] that follows the @deva[चिण्] @deva[विकरणप्रत्यय] undergoes a @deva[लुक्].
"""

standard = """
Personal endings elided after @deva[चिण्]. @deva[अहारि], @deva[अकारि].
"""

advanced = """
The personal endings are elided after @deva[चिण्] , the 3rd person singular Passive of Aorist. As @deva[अहारि], @deva[अलावि], @deva[अकारि], @deva[अपाचि] @deva[॥] So also @deva[अकारितराम्], @deva[अहारितमाम्], here the elision of the personal affix @deva[त] @ref[3.1.60] of the Aorist being considered as @[asiddha], the affixes @deva[तरप्] and @deva[तमप्] are not elided: though if the @[sutra] were to be literally interpreted, every affix after @deva[चिण्], ought to be elided. Or the word @deva[क्ङिति] is understood here; so that @deva[कित्] and @deva[ङित्] affixes of @deva[चिण्] are elided and not every affix.
"""

id = "6.4.143"
numericId = "64143"

[en]
simple = """
The '@deva[टि]'component of a @deva[भसंज्ञक] @deva[अङ्ग] is removed when followed by a @deva[डित्] @deva[प्रत्यय].
"""

standard = """
@deva[टि] (final vowel + following consonant) elided before @deva[ड]-marked affix. @deva[कुमुद्वत्], @deva[त्रिंशकः].
"""

advanced = """
Before an affix with indicatory @deva[ड्], the @deva[टि] (final vowel plus any following consonants) of the stem is elided. Examples: @deva[कुमुद्वत्], @deva[नड्वत्], @deva[वेतस्वत्] (with @deva[ड्मतुप्] by @ref[4.2.87]); @deva[त्रिंशता] @deva[क्रीतः] = @deva[त्रिंशकः] (with @deva[ड्वुन्] by @ref[5.1.24]). The rule extends to non-@deva[भ] bases as well, since the indicatory @deva[ड] must be given effect: @deva[उपसरजः], @deva[मन्दुरजः] (by @ref[3.2.97], with @[kṛt] affix @deva[उ]).
"""

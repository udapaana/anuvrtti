id = "6.4.71"
numericId = "64071"

[en]
simple = """
In case of the @deva[लुङ्लकार], @deva[लङ्लकार] and @deva[लृङ्लकार], the @deva[अङ्ग] gets an '@deva[अट्]' @deva[आगम], which is also @deva[उदात्त].
"""

standard = """
@deva[अट्] (@[udātta]) augments verbal stem in aorist/imperfect/conditional. @deva[अकार्षीत्], @deva[अकरोत्].
"""

advanced = """
The @deva[उदात्त]-accented augment @deva[अट्] is prefixed to the verbal @deva[अङ्ग] in the aorist (@deva[लुङ्]), imperfect (@deva[लङ्]), and conditional (@deva[लृङ्]): @deva[अकार्षीत्], @deva[अहार्षीत्], @deva[अकरोत्], @deva[अहरत्], @deva[अकरिष्यत्], @deva[अहरिष्यत्].
"""

id = "6.4.36"
numericId = "64036"

[en]
simple = """
The '@deva[हन्]' @deva[धातु] gets the '@deva[ज]' @deva[आदेश] when followed by the @deva[हि-प्रत्यय] of @deva[लोट्लकार].
"""

standard = """
@deva[हन्] → @deva[ज] before @deva[आर्धधातुक]. @deva[हत] → @deva[जघान].
"""

advanced = """
@deva[ज] substitutes for the entire root @deva[हन्] before the imperative affix @deva[हि]: @deva[जहि] @deva[शत्रून्].
"""

id = "6.4.134"
numericId = "64134"

[en]
simple = """
If a @deva[भसंज्ञक] @deva[अङ्ग] ends in the word '@deva[अन्]' then the '@deva[अ]' of this '@deva[अन्]' is omitted.
"""

standard = """
@deva[अन्]-ending @deva[भ]: @deva[अ] elided. @deva[राज्ञः], @deva[राज्ञा].
"""

advanced = """
Of a @deva[भ] @deva[अङ्ग] (stem) ending in @deva[अन्] , the @deva[अ] is elided. As @deva[राज्ञः] @deva[पश्य], @deva[राज्ञा], @deva[राज्ञे], @deva[तक्ष्णः] @deva[पश्य], @deva[तक्ष्णा] and @deva[तक्ष्णे] @deva[॥] Vart:- The elision takes place of a stem which actually ends in @deva[न्], therefore, it does not take place here, @deva[राजकीयम्] @deva[॥]
"""

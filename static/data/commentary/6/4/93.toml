id = "6.4.93"
numericId = "64093"

[en]
simple = """
For causatives of @deva[मित्]-marked roots, the penultimate vowel may optionally be lengthened before the passive aorist @deva[चिण्] and the absolutive @deva[णमुल्]. Both short and long vowel forms are accepted. Example: causative of @deva[शम्] (a @deva[मित्] root) → @deva[अशमि] or @deva[अशामि]; of @deva[तम्] → @deva[अतमि] or @deva[अतामि].
"""

standard = """
Roots marked @deva[मित्] (having indicatory @deva[म्]) have short penultimate vowels; their causatives normally retain this shortness. This rule optionally lengthens that penultimate before @deva[चिण्] (passive aorist 3sg) and @deva[णमुल्] (absolutive affix @deva[अम्]). The optionality (@deva[वा]) produces doublets: @deva[अशमि] ~ @deva[अशामि], @deva[अतमि] ~ @deva[अतामि]. Compare @ref[6.4.92] for non-optional penultimate treatment in causatives.
"""

advanced = """
The penultimate of a @deva[मित्]-root causative may optionally be lengthened before the passive aorist @deva[चिण्] (@deva[इ]) and the absolutive @deva[णमुल्] (@deva[अम्]): @deva[अशमि] or @deva[अशामि], @deva[अतमि] or @deva[अतामि] (with @deva[चिण्]); @deva[शमंशमम्] or @deva[शामंशामम्], @deva[तमंतमम्] or @deva[तामंतामम्] (with @deva[णमुल्]). The word @deva[दीर्घ] in the @[sūtra] is essential: it makes this a @deva[दीर्घविधि] (rule teaching lengthening), not merely a @deva[ह्रस्वविकल्पविधि] (optional shortening). The distinction matters for double causatives. If this were merely optional shortening, the @[lopa]-substitute of @deva[णि] would be @[sthānivat], and in the double causative (as @deva[शमयन्तं] @deva[प्रयुङ्क्ते]), the first @deva[णि] would intervene between the @deva[मित्] @deva[अङ्ग] and @deva[चिण्]/@deva[णमुल्], blocking the option — only compulsory shortening by the preceding @[sūtra] would remain, with no lengthening possible. As a @deva[दीर्घविधि], however, the @[lopa]-substitute of @deva[णि] is not @[sthānivat] (by @ref[1.1.58]), permitting double-causative forms. The simple roots @deva[शम्] and @deva[तम्] (@deva[दिवादि]) do not lengthen before @deva[चिण्] and @deva[णमुल्] by @ref[7.3.34] — this rule applies only to their derivative causative stems (@deva[शमि], @deva[तमि]). Derivation: @deva[शमि] + @deva[चिण्] → @deva[शम्] + @deva[चिण्] (@deva[इ] of @deva[णि] elided by @ref[6.4.51]) → @deva[अशामि] or @deva[अशमि]. For the double causative: @deva[शमि] + @deva[णि] = @deva[शम्] + @deva[इ] (@ref[6.4.51]) = @deva[शामि] (the @[lopa]-@[ādeśa] is not @[sthānivat] for @deva[दीर्घ] by @ref[1.1.58]); then with @deva[चिण्]: @deva[अशामि]; with @deva[णमुल्]: @deva[शामम्]. The short forms cannot be obtained from this path, since the @[lopa]-@[ādeśa] would then be @[sthānivat] — hence the necessity of @deva[दीर्घ]. Full paradigm of double causative of @deva[शम्]: @deva[अशमि] or @deva[अशामि], @deva[शमंशमम्] or @deva[शामंशामम्]. From Intensive-causative @deva[शंशमयति]: @deva[अशंशमि] or @deva[अशंशामि], @deva[शंशमंशंशमम्] or @deva[शंशामंशंशामम्]. The Intensive derivation: @deva[शमि] + @deva[यङ्] → (reduplication by @ref[6.1.9]) @deva[शशमि] + @deva[यङ्] → @ref[7.4.60] @deva[शंशमि] + @deva[यङ्] (@deva[नुक्] by @ref[7.4.85]) → @deva[शंशम्] + @deva[य] (@ref[6.4.51]) = @deva[शंशम्य]; adding @deva[णिच्]: @deva[शंशम्] + @deva[य] + @deva[इ] → @deva[अ]-elision (@ref[6.4.48]) → @deva[य्]-elision (@ref[6.4.49]) = @deva[शंशमि].
"""

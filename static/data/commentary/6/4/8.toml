id = "6.4.8"
numericId = "64008"

[en]
simple = """
The @deva[उपधा] letter of a @deva[नकारान्त] @deva[अङ्ग] becomes @deva[दीर्घ] when followed by a @deva[प्रत्यय] which is a @deva[सर्वनामस्थान] other than @deva[सम्बोधन-एकवचन].
"""

standard = """
Penultimate lengthened in @deva[न्]-ending in strong cases (not vocative singular). @deva[राजा], @deva[राजानौ]. But: @deva[हे] @deva[राजन्].
"""

advanced = """
The @deva[उपधा] vowel of a @deva[न्]-final @deva[अङ्ग] is lengthened before @deva[सर्वनामस्थान] affixes, excluding vocative singular. Examples: @deva[राजा], @deva[राजानौ], @deva[राजानः], @deva[राजानम्], @deva[राजानौ]; also @deva[सामानि] @deva[तिष्ठन्ति]. The nominative singular @deva[राजा] derives from @deva[राजान्स्] — @deva[स्] elided by @ref[6.1.68], @deva[म्] by @ref[8.2.7]. The restriction to @deva[सर्वनामस्थान] excludes weak cases: @deva[राजनि] (locative singular), @deva[सामनि] (locative singular). The exclusion of vocative singular yields @deva[हे] @deva[राजन्], @deva[हे] @deva[तक्षन्].
"""

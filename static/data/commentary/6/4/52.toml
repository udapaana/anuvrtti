id = "6.4.52"
numericId = "64052"

[en]
simple = """
The entire @deva[णि] causative suffix is dropped before past-participle affixes @deva[क्त] and @deva[क्तवतु] when they take the augment @deva[इट्]. This produces the characteristic '-ita' ending of causative past participles. Example: @deva[कारि + क्त] → @deva[कारितम्] ('caused to be done').
"""

standard = """
When @deva[क्त] or @deva[क्तवतु] follow a causative stem and those affixes take the augment @deva[इट्], the suffix @deva[णि] itself (not just its @deva[इ]) is deleted. The @deva[इट्] of the affix provides the vowel heard in the final form. Thus @deva[कारितम्] 'caused', @deva[हारितम्] 'caused to carry', @deva[गणितम्] 'counted', @deva[लक्षितम्] 'noticed'. Exception: @deva[संज्ञपितः] — when the phonological conditions differ, @deva[णि] is retained. See @ref[6.4.51] for the related elision of just @deva[इ].
"""

advanced = """
The entire affix @deva[णि] is elided before @deva[क्त] and @deva[क्तवतु] when these take the augment @deva[इट्]: @deva[कारितम्], @deva[हारितम्], @deva[गणितम्], @deva[लक्षितम्]. When @deva[इट्] is absent, @deva[णि] is retained — @deva[संज्ञपितः] @deva[पशुः], the past participle of the causative where @deva[इ] belongs to the causative marker itself. By @ref[7.2.15] read with @ref[7.2.49], @deva[ज्ञप्] takes no @deva[इट्] augment in the @deva[निष्ठा]. One might object that @ref[7.2.15] applies only to monosyllabic roots (@ref[7.2.10]), and causative @deva[ज्ञपि] being disyllabic would always receive @deva[इट्], making the condition @deva[सेटि] redundant. However, @deva[सेटि] fixes the ordering: @deva[इट्] must be added first, then @deva[णि] is elided. If @deva[णि] were elided first, @deva[कारि] + @deva[त] → @deva[कार्] + @deva[त], and @deva[कार्] being monosyllabic could not receive @deva[इट्] by @ref[7.2.10]. The correct sequence is therefore @deva[इट्]-addition followed by @deva[णि]-elision. For @deva[ज्ञपितः] see also @ref[7.2.27].
"""

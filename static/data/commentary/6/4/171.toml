id = "6.4.171"
numericId = "64171"

[en]
simple = """
From @deva[ब्रह्मन्] ("the Absolute" or "sacred power"), the @deva[तद्धित] affix @deva[अण्] forms @deva[ब्राह्म] — with the @deva[अन्] dropped — when the meaning is not that of the @deva[ब्राह्मण] caste (@deva[जाति]). So @deva[ब्राह्मो गर्भः] means "a divine embryo" and @deva[ब्राह्मं हविः] means "an oblation connected with Brahman". When referring to the caste, however, the normal form @deva[ब्राह्मणः] is used.
"""

standard = """
This rule specifies that @deva[ब्रह्मन्] forms the irregular derivative @deva[ब्राह्म] (with @deva[अण्] and elision of @deva[अन्]) in both Patronymic and non-Patronymic senses, provided the meaning does not involve the @deva[जाति] (caste) of Brahmins. The conditioning environment: base = @deva[ब्रह्मन्], affix = @deva[अण्] (Patronymic or otherwise), meaning ≠ @deva[ब्राह्मणजाति]. Non-@deva[जाति] forms: @deva[ब्राह्मो गर्भः] ("divine birth"), @deva[ब्राह्मं हविः] ("Brahman-related oblation"). When @deva[जाति] is intended, the @deva[अन्] is retained: @deva[ब्राह्मणः] ("a Brahmin"). The semantic distinction between the cosmic/ritual sense and the social/caste sense is thus grammatically marked.
"""

advanced = """
@deva[ब्राह्म] is formed irregularly from @deva[ब्रह्मन्] when the meaning is not @deva[जाति] (caste). The @[sūtra] has two components: (1) @deva[ब्राह्मः] — the final @deva[अन्] of @deva[ब्रह्मन्] is elided when @deva[अण्] (whether Patronymic or otherwise) follows. Examples: @deva[ब्राह्मो] @deva[गर्भः], @deva[ब्राह्मं] @deva[हविः], @deva[ब्राह्ममस्त्रम्]; @deva[ब्राह्मो] @deva[नारदः]. (2) @deva[अजातौ] — when the Patronymic denotes @deva[जाति], @deva[अन्] is not elided: @deva[ब्रह्मणोऽपत्यं] = @deva[ब्राह्मणः] ("a Brāhmaṇa"). When @deva[जाति] is expressed but @deva[अण्] is not Patronymic, @deva[अन्] is still elided: @deva[ब्राह्मी] @deva[औषधिः].
"""

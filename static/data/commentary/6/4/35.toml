id = "6.4.35"
numericId = "64035"

[en]
simple = """
The @deva[शास्-धातु] gets the '@deva[शा]' @deva[आदेश] when followed by the @deva[हि-प्रत्यय] of @deva[लोट्लकार].
"""

standard = """
@deva[शम्]/@deva[तम्]/@deva[दम्]/@deva[श्रन्थ्]/@deva[ग्रन्थ्] nasals not elided before @deva[क्त]. @deva[शान्तः].
"""

advanced = """
Before the imperative affix @deva[हि], @deva[शा] substitutes for the entire root @deva[शास्]: @deva[अनुशाधि], @deva[प्रशाधि]. @deva[हि] becomes @deva[धि] by @ref[6.4.101] (see @ref[6.4.22] for @deva[असिद्ध] interaction). The @deva[अनुवृत्ति] of @deva[उपधायाः] does not apply here — @deva[शा] replaces the full root @deva[शास्], not just its penultimate vowel. The @deva[अनुवृत्ति] of @deva[कित्]/@deva[ङित्] is also absent, so the substitution applies even when @deva[हि] is @deva[पित्] (@ref[3.4.88]), despite a @deva[पित्] @deva[सार्वधातुक] not being @deva[ङित्] by @ref[1.2.4]. In @deva[छन्दस्], @deva[शाधि] appears with @deva[उदात्त] on the first syllable — possible only when @deva[धि] is @deva[पित्] and consequently @deva[अनुदात्त] (@ref[3.1.4]).
"""

id = "6.4.7"
numericId = "64007"

[en]
simple = """
The @deva[उपधा] of the @deva[नकारान्त] words becomes @deva[दीर्घ] when the @deva[नकारान्त] word is followed by the @deva[नाम्-प्रत्यय].
"""

standard = """
Penultimate lengthened in @deva[न्]-ending before @deva[नाम्]. @deva[पञ्चानाम्], @deva[सप्तानाम्], @deva[दशानाम्].
"""

advanced = """
The @deva[उपधा] vowel of a @deva[न्]-final @deva[अङ्ग] is lengthened before the affix @deva[नाम्]. Derivation: @deva[पञ्चन्] + @deva[नाम्] (@ref[7.1.55]) → @deva[पञ्चान्] + @deva[माम्] (@ref[6.4.7]) → @deva[पञ्चानाम्] (@ref[8.2.7]); similarly @deva[सप्तानाम्], @deva[नवानाम्], @deva[दशानाम्]. The condition '@deva[न्]-final' excludes @deva[चतुर्णाम्]. The form @deva[चर्म्मणाम्] is also unaffected, since its genitive plural affix is @deva[आम्] without @deva[नुट्], not @deva[नाम्].
"""

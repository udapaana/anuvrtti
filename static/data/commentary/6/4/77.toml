id = "6.4.77"
numericId = "64077"

[en]
simple = """
When followed by an @deva[अजादि] @deva[प्रत्यय], the ending @deva[इवर्ण] and the @deva[उवर्ण] are converted respectively to @deva[इयङ्] / @deva[उवङ्] @deva[आदेश]s for a) @deva[विकरणप्रत्यय] @deva[श्नु], b) Any @deva[धातु], and c) The word @deva[भ्रू].
"""

standard = """
@deva[इय्]/@deva[उव्] for @deva[इ]/@deva[ई]/@deva[उ]/@deva[ऊ] of @deva[श्नु]/roots/@deva[भ्रू] before vowel. @deva[आप्नुवन्ति], @deva[भ्रुवौ].
"""

advanced = """
Before a vowel-initial affix, @deva[इय्] replaces @deva[इ]/@deva[ई] and @deva[उव्] replaces @deva[उ]/@deva[ऊ] in three contexts: (a) @deva[उ] of @deva[नु] (the @deva[विकरण] of @deva[स्वादिगण], 5th conjugation), (b) final @deva[इ]/@deva[ई]/@deva[उ]/@deva[ऊ] of a root, and (c) @deva[ऊ] of @deva[भ्रू]. Examples from 5th class: @deva[आप्नुवन्ति], @deva[राध्नुवन्ति], @deva[शक्नुवन्ति]. From roots: @deva[चिक्षियतुः], @deva[ललुवतुः], @deva[लुलुवुः], @deva[नियौ], @deva[नियः], @deva[लुवौ], @deva[लुवः]. From @deva[भ्रू]: @deva[भ्रुवौ], @deva[भ्रुवः]. Before consonant-initial affixes, no substitution: @deva[आप्नुयात्], @deva[शक्नुयात्], @deva[राध्नुयात्]. The rule is restricted to @deva[श्नु], roots, and @deva[भ्रू] — non-root stems are excluded: @deva[लक्ष्यै], @deva[लक्ष्याः], @deva[वध्वै], @deva[वध्वाः]. Only @deva[इ]/@deva[उ] vowels are targeted, not @deva[ऋ]: @deva[चक्रतुः], @deva[चक्रुः]. @[vārttika]: @[guṇa] (@ref[7.3.84]) and @[vṛddhi] (@ref[7.2.115]) override @deva[इयङ्]/@deva[उवङ्] — @deva[चि] → @deva[चयनम्], @deva[चायकः]; @deva[लू] → @deva[लवनम्], @deva[लावकः] (with @deva[ल्युट्] and @deva[ण्वुल्]). @[vārttika]: in the @deva[छन्दस्], @deva[इयङ्]/@deva[उवङ्] substitution applies diversely to @deva[तन्] etc.: @deva[तन्वं] @deva[पुषेम] or @deva[तनुवं] @deva[पुषेम]; @deva[विषुवं] @deva[पुषेम]; @deva[स्वर्गो] @deva[लोकः] or @deva[सुवर्गो] @deva[लोकः]; @deva[त्र्यम्बकं] @deva[यजामहे] or @deva[त्रियम्बकं] @deva[यजामहे].
"""

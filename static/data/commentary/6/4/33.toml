id = "6.4.33"
numericId = "64033"

[en]
simple = """
The nasal of @deva[भञ्ज] ('to break') may optionally be elided before the suffix @deva[क्त्वा] (absolutive) when @deva[इट्] is not added. The form without nasal is @deva[भित्त्वा]; with nasal it is @deva[भिन्त्वा].
"""

standard = """
This rule teaches optional (@deva[विभाषा]) nasal elision in @deva[भञ्ज] before @deva[चिण्]-Aorist Passive: @deva[अभाजि] or @deva[अभञ्जि]. It is an @[aprapta-vibhāṣā] — the option is introduced here for the first time for this context, since earlier rules would not have granted it. The @deva[न्] of @deva[भञ्ज] is thus optionally silent before @deva[झलादि] @deva[आर्धधातुक]. See @ref[6.4.33].
"""

advanced = """
The nasal of @deva[भञ्ज्] is optionally elided before the @deva[चिण्]-aorist passive (3rd person): @deva[अभाजि] or @deva[अभञ्जि]. This is an @deva[अप्राप्तविभाषा] — it introduces nasal elision for this context for the first time, since no prior rule would have granted it.
"""

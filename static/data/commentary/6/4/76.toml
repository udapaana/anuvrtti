id = "6.4.76"
numericId = "64076"

[en]
simple = """
In Vedic Sanskrit, @deva[रे] may substitute for the regular @deva[इरे] ending of the 3rd person plural perfect @[ātmanepada]. This is an archaism not found in classical Sanskrit. Example: @deva[धा] + perfect 3pl → @deva[दध्रे] (Vedic), versus @deva[दधिरे] (classical).
"""

standard = """
The rule substitutes @deva[रे] for @deva[इरे] (3pl perfect @[ātmanepada]) in Vedic texts (@deva[छन्दसि]). The option (@deva[वा]) means @deva[इरे] also remains valid in Vedic. The @deva[आ]-elision of @ref[6.4.64] applies first, then @deva[रे] attaches: @deva[धा] → @deva[दध्] (reduplication + @deva[आ]-elision) + @deva[रे] = @deva[दध्रे], attested in @[rigveda] X.82.5. Classical Sanskrit retains only @deva[दधिरे].
"""

advanced = """
In the @deva[छन्दस्], @deva[रे] optionally replaces @deva[इरे] (3pl perfect @deva[आत्मनेपद]): @deva[कं] @deva[स्विद्गर्भं] @deva[प्रथमं] @deva[दध्रे] @deva[आपः] (RV X.82.5), @deva[या] @deva[स्य] @deva[परिदध्रे]. In @deva[दध्रे], the @deva[आ] of @deva[धा] is elided before @deva[इरे] by @ref[6.4.64], the @deva[रे]-substitution being treated as @[asiddha] (@ref[6.4.22]) for purposes of that @deva[आ]-elision. The substitution does not always occur: @deva[परमाया] @deva[धियोग्निर्म्माणि] @deva[चक्रिरे]. For @deva[सेट्] roots, @deva[इट्] is first added to @deva[रे], making it @deva[इरे]; then @deva[रे] is substituted again for this @deva[इरे], restoring the original form. The @[sūtra] uses the dual @deva[इरयोः] to indicate this cyclic process: @deva[रे] → @deva[इरे] → @deva[रे].
"""

id = "6.4.168"
numericId = "64168"

[en]
simple = """
When a stem ending in @deva[अन्] is in the @deva[भ] position, the @deva[अन्] is kept unchanged before a @deva[तद्धित] suffix beginning with @deva[य्], provided the suffix does not express abstract existence in an occupation or quality (@deva[भाव]/[@deva[कर्म]] sense). So @deva[सामन्] → @deva[सामन्यः] and @deva[ब्राह्मण] → @deva[ब्राह्मण्यः] (retaining @deva[अन्]). But @deva[राजन्] + @deva[यक्] in the @deva[भाव] sense gives @deva[राज्यम्] ("kingship"), where the @deva[अन्] is altered.
"""

standard = """
This rule preserves @deva[अन्] of a @deva[भ] stem before @deva[य्]-initial @deva[तद्धित] affixes when the derivation is not in the @deva[भाव]/@deva[कर्म] (@[abstract existence]) sense. The conditioning environment: @deva[भ] + @deva[अन्]-final stem + @deva[य्]-initial @deva[तद्धित] + non-@deva[भाव]/[@deva[कर्म]] meaning. When these conditions hold: @deva[सामन्] → @deva[सामन्यः], @deva[ब्राह्मण] → @deva[ब्राह्मण्यः]. When the derivation expresses abstract quality/occupation (i.e., the @deva[भाव] sense), the @deva[अन्] is subject to change: @deva[राजन्] + @deva[यक्] → @deva[राज्यम्] ("kingship"). The semantic condition is thus the key discriminator.
"""

advanced = """
The @deva[अन्] of a stem ending in @deva[अन्] remains unchanged before a @deva[य्]-initial @deva[तद्धित] affix, provided the derivation does not denote abstract existence in an occupation or quality (@deva[भाव]/@deva[कर्म]). Examples: @deva[सामसु] @deva[साधुः] = @deva[सामन्यः]; @deva[ब्राह्मण्यः]. In the @deva[भाव]/@deva[कर्म] sense, @deva[अन्] is altered: @deva[राज्ञो] @deva[भावः] @deva[कर्म] @deva[वा] = @deva[राज्यम्] (@deva[राजन्] belongs to the @[purohitādi] class and takes @deva[यक्] by @ref[5.1.128]).
"""

id = "6.4.60"
numericId = "64060"

[en]
simple = """
The @deva[इ] of @deva[क्षि] is lengthened to @deva[ई] before the past participle @deva[क्त], except when the form carries the meaning of the future passive participle @deva[ण्यत्]. When used in the imperishability sense (equivalent to @deva[ण्यत्] meaning), the short @deva[इ] is retained. Example: @deva[प्रक्षीणः] 'wasted away' (normal sense); @deva[अक्षितम्] 'imperishable' (@deva[ण्यत्] sense).
"""

standard = """
Long @deva[ई] substitutes for @deva[इ] of @deva[क्षि] before @deva[क्त] when the participle has its ordinary past-passive meaning. When @deva[क्त] is used in the sense of @deva[ण्यत्] (a future passive participle expressing 'worthy of' or 'imperishable'), the lengthening is blocked. Thus @deva[प्रक्षीणः] 'one who has wasted away' vs. @deva[अक्षितम्] 'indestructible'. This semantic conditioning is unusual and makes this rule a notable exception to the broader lengthening at @ref[6.4.59].
"""

advanced = """
Long @deva[ई] replaces @deva[इ] of @deva[क्षि] before the past participle @deva[क्त], provided @deva[क्त] does not carry the sense of the future passive participle @deva[ण्यत्] (which denotes condition or object). When @deva[क्त] has its ordinary past-participial sense, lengthening applies: @deva[आक्षीणः], @deva[प्रक्षीणः], @deva[परिक्षीणः] — all with active meaning. Here @deva[क्त] is added to intransitive @deva[क्षि] to denote the agent by @ref[3.4.72]: @deva[प्रक्षीणमिदं] @deva[देवदत्तस्य] 'this is the spot where Devadatta perished' (locative force by @ref[3.4.76]). When @deva[क्त] carries @deva[ण्यत्]-force, no lengthening occurs: @deva[अक्षितमसिमामेक्षेष्ठाः], where @deva[अक्षितम्] means 'imperishable'. Since the vowel remains short, @deva[त] is not changed to @deva[ण] by @ref[8.2.46].
"""

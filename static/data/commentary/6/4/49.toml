id = "6.4.49"
numericId = "64049"

[en]
simple = """
When a verbal stem ends in @deva[य] and that @deva[य] is preceded by a consonant, the @deva[य] is also deleted before an @deva[आर्धधातुक] affix. For example, from the Intensive stem @deva[बेभिद्य], the @deva[य] is dropped to give @deva[बेभिदिता].
"""

standard = """
This extends the elision of @ref[6.4.48] to @deva[य]-final stems: when a consonant precedes the final @deva[य] of a verbal @deva[अङ्ग], that @deva[य] is elided before @deva[आर्धधातुक] affixes. Thus from Intensive stem @deva[बेभिद्य]: @deva[बेभिद्य] → @deva[बेभिद्] + @deva[इता] → @deva[बेभिदिता], @deva[बेभिदितुम्]. The Genitive @deva[यस्य] in the @[sūtra] identifies @deva[य] as the target of elision. See @ref[6.4.49].
"""

advanced = """
When a consonant precedes the final @deva[य] (= @deva[य्] + @deva[अ]) of a verbal @deva[अङ्ग], that @deva[य] is elided before an @deva[आर्धधातुक] affix: @deva[बेभिदिता], @deva[बेभिदितुम्], @deva[बेभिदितव्यम्] from Intensive stem @deva[बेभिद्य]. The @[sūtra] gives @deva[यस्य] (genitive singular of @deva[य], i.e. the two letters @deva[य्] @deva[अ]). Under @deva[अलोऽन्त्यस्य] @ref[1.1.52], only @deva[अ] should be targeted for elision — but since @deva[अ]-elision already follows from the preceding rule @ref[6.4.48], this @[sūtra] must teach the elision of @deva[य] as a whole (@deva[संघात]). Alternatively, @deva[हलः] can be read as ablative, and by @ref[1.1.54] the first letter @deva[य] is elided. The target is the conjunct @deva[य] (= @deva[य्] + @deva[अ]), not bare @deva[य्] — roots where @deva[य्] lacks a following @deva[अ] are unaffected: @deva[ईर्ष्यिता], @deva[मव्यिता], @deva[शुच्यिता] from @deva[ईर्ष्य्], @deva[मव्य्], @deva[शुच्य्] (@deva[भ्वादि] 541–546). The consonant-preceded condition excludes cases like @deva[लोलूयिता], @deva[पोपूयिता] where a vowel precedes.
"""

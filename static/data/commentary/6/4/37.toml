id = "6.4.37"
numericId = "64037"

[en]
simple = """
1) For the verb roots that end in an @deva[अनुनासिक] letter and have an @deva[अनुदात्त] @deva[स्वर] in the @deva[उपदेश], 2) For the verb root @deva[वन्], and 3) For the verb roots that end in an @deva[अनुनासिक] letter and belong to the @deva[तनोत्यादिगण], The @deva[अनुनासिक] is removed when the verb is followed by a @deva[झलादि] @deva[कित्] /@deva[ङित्] @deva[प्रत्यय].
"""

standard = """
@deva[न्] of @deva[हन्] elided before @deva[ङित्] @deva[आर्धधातुक]. @deva[हतः].
"""

advanced = """
The final nasal of @deva[अनुदात्तोपदेश] roots (roots listed with @deva[अनुदात्त] accent in the @deva[धातुपाठ]), of @deva[वन्], and of the @deva[तनादिगण] (8th conjugation) is elided before @deva[झलादि] affixes marked @deva[कित्] or @deva[ङित्]. From @deva[यम्]: @deva[यत्वा] (@deva[क्त्वा]), @deva[यतः] (@deva[क्त]), @deva[यतवान्] (@deva[क्तवतु]), @deva[यतिः] (@deva[क्तिन्]). Similarly @deva[रम्] → @deva[रत्वा], @deva[रतः], @deva[रतवान्], @deva[रतिः]. The roots @deva[यम्], @deva[रम्], @deva[नम्], @deva[गम्], @deva[हन्], and @deva[मन्] are treated as @deva[अनुदात्त] for this rule despite their @deva[धातुपाठ] accent. For @deva[वन्]: @deva[वतिः] (with @deva[क्तिन्]); before @deva[क्तिच्] the nasal is not elided — @deva[वन्ति] (@ref[6.4.39]); before other @deva[झलादि] affixes, @deva[वन्] retains @deva[न्] since those affixes take @deva[इट्]. The @deva[तनादि] roots number ten: @deva[तन्], @deva[सन्], @deva[क्षण्], @deva[क्षिण्], @deva[ऋण्], @deva[तृण्], @deva[घृण्], @deva[वन्], @deva[मन्], @deva[कृञ्]. Of these, @deva[सन्] also takes long @deva[आ] (@ref[6.4.45]). Examples: @deva[तन्] → @deva[ततः], @deva[ततवान्]; @deva[क्षण्] → @deva[क्षतः], @deva[क्षतवान्]; @deva[ऋण्] → @deva[ऋतः], @deva[ऋतवान्]; @deva[तृण्] → @deva[तृतः], @deva[तृतवान्]; @deva[घृण्] → @deva[घृतः], @deva[घृतवान्]; @deva[वन्] → @deva[वतः], @deva[वतवान्]; @deva[मन्] → @deva[मतः], @deva[मतवान्]. The condition '@deva[कित्]/@deva[ङित्]' excludes @deva[यन्ता] and @deva[यन्तव्यम्]. The condition '@deva[झलादि]' excludes @deva[गम्यते] and @deva[रम्यते]. Roots not ending in a nasal are excluded: @deva[पक्वः], @deva[पक्ववान्]. Roots not @deva[अनुदात्त] in @deva[उपदेश] retain the nasal: @deva[शान्तः], @deva[शान्तवान्]; @deva[तान्तः], @deva[तान्तवान्]; @deva[दान्तः], @deva[दान्तवान्]. The specification '@deva[अनुदात्त] by @deva[उपदेश]' allows the rule to apply to @deva[गम्] (→ @deva[गतिः]) but not @deva[शम्] (→ @deva[शान्तः]). Although @deva[गतिः] carries @deva[उदात्त] on the first syllable, this is a secondary accent from @deva[क्तिन्], not the @deva[उपदेश] accent — it does not prevent nasal elision. Conversely, @deva[शम्] is @deva[उदात्त] in @deva[उपदेश] and nowhere else listed as @deva[अनुदात्त], so it retains its nasal.
"""

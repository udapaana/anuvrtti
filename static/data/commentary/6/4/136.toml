id = "6.4.136"
numericId = "64136"

[en]
simple = """
If a @deva[भसंज्ञक] @deva[अङ्ग] end in the word '@deva[अन्]' and is followed by the @deva[ङि] or @deva[शी] @deva[प्रत्यय], then the '@deva[अ]' of this '@deva[अन्]' is omitted optionally.
"""

standard = """
@deva[अन्]-ending: @deva[अ] optionally elided before locative @deva[इ]/@deva[शी] (neuter dual). @deva[राज्ञि] or @deva[राजनि].
"""

advanced = """
In a @deva[अङ्ग] (stem) ending in @deva[अन्] , the @deva[अ] is optionally elided before the Locative -7th case ending @deva[इ] before the ending @deva[शी] (@deva[ई]) of the Nominative 1st-Case and Accusative-2nd case dual Neuter. As @deva[राज्ञि] or @deva[राजनि], @deva[साम्नि] or @deva[सामनि], @deva[साम्नी] or @deva[सामनी] @ref[7.1.19].
"""

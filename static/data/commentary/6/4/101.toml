id = "6.4.101"
numericId = "64101"

[en]
simple = """
The '@deva[हि]' @deva[प्रत्यय] that follows the verb root '@deva[हु]' or a @deva[झल्] letter is converted to '@deva[धि]'.
"""

standard = """
@deva[धि] replaces @deva[हि] after @deva[हु] and @deva[झल्] consonant (@[iṭ-less]). @deva[जुहुधि], @deva[भिन्धि].
"""

advanced = """
@deva[धि] replaces the Imperative affix @deva[हि] after @deva[हु] and after a @deva[झल्] consonant (i.e., stops and spirants, excluding semi-vowels and nasals), provided @deva[हि] does not take the augment @deva[इट्]. After @deva[हु]: @deva[जुहुधि]. After @deva[झल्] consonants: @deva[भिद्] → @deva[भिन्धि], @deva[छिन्] → @deva[छिन्धि]. The rule does not apply when the stem ends in a non-@deva[झल्] sound, as in @deva[क्रीणीहि], @deva[प्रीणीहि] (by @ref[6.4.113]). The substitution is restricted to @deva[हि] alone — not other endings, as shown by @deva[जुहुताम्]. The @[anuvṛtti] of @deva[हलि] ensures that when @deva[हि] takes @deva[इट्] (becoming vowel-initial), the rule is blocked: @deva[रुदिहि], @deva[स्वपिहि]. When @deva[हि] is replaced by @deva[तात्] (by @ref[7.1.35]), as in @deva[जुहुतात्] and @deva[भिन्तात्], the @deva[धि] substitution does not occur, because @deva[तात्] is a later rule, and by the principle @deva[सकृद्गतौ] @deva[विप्रतिषेधे] @deva[यद्बाधितं] @deva[तद्बाधितमेव] — once a rule is superseded in mutual conflict, it remains superseded. When @deva[अकच्] is added by @ref[5.3.71], @deva[धि] substitution does apply: @deva[भिन्द्धकि], @deva[छिन्द्धकि]. This is accounted for by the maxim @deva[पुनः] @deva[प्रसङ्ग] @deva[विज्ञानात्] @deva[सिद्धम्] — a preceding rule may reapply after being superseded by a subsequent rule.
"""

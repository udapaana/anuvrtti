id = "6.4.26"
numericId = "64026"

[en]
simple = """
The @deva[उपधा-नकार] of the verb @deva[रञ्ज्] is removed in presence of the @deva[विकरणप्रत्यय] @deva[शप्].
"""

standard = """
@deva[य्] insertion before @deva[इ] optional after @deva[तिरश्च्]. @deva[तिरश्चे] or @deva[तिरश्च्ये].
"""

advanced = """
The nasal of @deva[रञ्ज्] is likewise elided before @deva[शप्]: @deva[रजति], @deva[रजतः], @deva[रजन्ति]. This rule is separated from the preceding (@ref[6.4.25]) so that the @deva[अनुवृत्ति] of @deva[रञ्ज्] alone — not @deva[दंश्] etc. — carries into the subsequent @deva[सूत्र]s.
"""

id = "6.4.148"
numericId = "64148"

[en]
simple = """
The @deva[अकार] and @deva[इकार] of a @deva[भसंज्ञक] @deva[अङ्ग] is removed when followed by a @deva[तद्धितप्रत्यय] or an @deva[ईकार].
"""

standard = """
@deva[अ]/@deva[इ] of @deva[भ] elided before taddhita. @deva[दाक्षी], @deva[आत्रेयः], @deva[कुमारी].
"""

advanced = """
The final @deva[अ] and @deva[इ] (both long and short) of a @deva[भ] stem are elided before a @deva[तद्धित] affix (including feminine @deva[ई]). Examples with @deva[इ]: @deva[दाक्षी], @deva[प्लाक्षी], @deva[सखी] (from @deva[दाक्षि], @deva[प्लाक्षि], @deva[सखि] + feminine @deva[ई] by @ref[4.1.65]). These forms could also arise by simple @[sandhi] (@deva[दाक्षि] + @deva[ई] = @deva[दाक्षी]), but explicit @deva[इ]-elision is necessary to handle forms like @deva[अतिसखि]. From @deva[सखी] (formed by @deva[ङीष्] under @ref[4.1.62]), the compound @deva[सखीमतिक्रान्तः] = @deva[अतिसखि] (final shortened by @ref[1.2.48]; @deva[टच्] by @ref[5.4.91] applies to masculine @deva[सखि], not feminine @deva[सखी]). Without explicit @deva[इ]-elision, @deva[सखि] + @deva[ई] → @deva[सखी] would be an @[ekādeśa] by @ref[6.1.85], making it @[sthānivat] for @deva[इ] of @deva[सखि] — then @deva[अतिसखि] would be non-@deva[घि] (by @ref[1.4.7], since @deva[सखि] is excluded from @deva[घि]), blocking @deva[अतिसखेः] in Ablative/Genitive singular. Elision avoids this. Short @deva[इ] elided before @deva[तद्धित]: @deva[दुलि] → @deva[दौलेयः], @deva[वलि] → @deva[वालेयः], @deva[अत्रि] → @deva[आत्रेयः]. @deva[अ] elided before feminine @deva[ई]: @deva[कुमार] → @deva[कुमारी], @deva[गौर] → @deva[गौरी], @deva[शार्ङ्गरव] → @deva[शार्ङ्गरवी]. @deva[अ] and @deva[आ] elided before @deva[तद्धित]: @deva[दक्ष] → @deva[दाक्षि], @deva[प्लक्ष] → @deva[प्लाक्षिः], @deva[चूड] → @deva[चौडिः], @deva[बलाका] → @deva[बालाकिः], @deva[सुमित्रा] → @deva[सौमित्रिः]. @[vārtika]: when @deva[ई] (@deva[शी]) is a substitute for @deva[औ] (by @ref[7.1.18]) — the Nominative/Accusative dual neuter or certain feminine @deva[आ]-stems — the preceding @deva[इ] and @deva[अ] are not elided. The stem before such @deva[ई] is also @deva[भ] by @ref[1.4.18] for neuter nouns: @deva[काण्ड] + @deva[ई] = @deva[काण्डे]; @deva[कुड्ये]; @deva[सौर्य] + @deva[ई] = @deva[सौर्ये] (@deva[य] would have been elided by @ref[6.4.149] without this @[vārtika]). @[vārtika]: @deva[इयङ्] and @deva[उवङ्] are superseded when they would apply simultaneously with this @[lopa]. @deva[इयङ्]/@deva[उवङ्] operate freely in @deva[श्री]/@deva[भ्रू] + @deva[औ]/@deva[अस्] (@deva[जस्]): @deva[श्रियौ], @deva[श्रियः], @deva[भ्रुवौ], @deva[भ्रुवः]. @[Lopa] operates freely in @deva[कमण्डलू] → @deva[कामण्डलेयः] (with @deva[ढञ्] by @ref[4.1.135]), @deva[भाद्रवाहेयः]. In @deva[वत्सप्री] + @deva[ढञ्] (by @ref[4.1.135]), both @ref[6.4.77] and @ref[6.4.148] compete; the former is superseded, yielding @deva[वात्सप्रेयः] (@deva[वत्सं] @deva[प्रीणाति] = @deva[वत्सप्रीः], @deva[तस्यापत्यं]); similarly @deva[लैखाभ्रेयः] (with @deva[ढक्], @[śubhrādi] class by @ref[4.1.123]).
"""

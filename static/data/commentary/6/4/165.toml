id = "6.4.165"
numericId = "64165"

[en]
simple = """
Five specific stems — @deva[गाथिन्] ("singer of hymns"), @deva[विदथिन्] ("one skilled in assemblies"), @deva[केशिन्] ("long-haired"), @deva[गणिन्] ("leader of a group"), and @deva[पणिन्] ("a trader") — retain their @deva[इन्] unchanged even before the Patronymic @deva[अण्] affix. So the Patronymics are @deva[गाथिनः], @deva[वैदथिनः], @deva[कैशिनः], @deva[गाणिनः], and @deva[पाणिनः] (the grammarian @[pāṇini]'s name). This is an exception to the general rule that would alter @deva[इन्] before a Patronymic @deva[अण्].
"""

standard = """
While the general rule retains @deva[इन्] before non-Patronymic @deva[अण्] only, these five stems — @deva[गाथिन्], @deva[विदथिन्], @deva[केशिन्], @deva[गणिन्], @deva[पणिन्] — are exceptional in that they also retain @deva[इन्] before the Patronymic @deva[अण्] (@deva[गोत्र]-@deva[अण्]). Patronymic @deva[अण्] ordinarily triggers elision or modification of stem-final @deva[इन्], but this rule blocks that for these five. The resulting Patronymic forms: @deva[गाथिनः], @deva[वैदथिनः], @deva[कैशिनः], @deva[गाणिनः], @deva[पाणिनः]. Notably, @deva[पाणिनः] is the Patronymic of @deva[पणिन्] and gives us the name of the grammarian @[pāṇini].
"""

advanced = """
The five stems @deva[गाथिन्], @deva[विदथिन्], @deva[केशिन्], @deva[गणिन्], and @deva[पणिन्] retain @deva[इन्] unchanged even before the Patronymic @deva[अण्] (overriding the general rule). Patronymic forms: @deva[गाथिनोऽपत्यं] = @deva[गाथिनः], @deva[वैदथिनः], @deva[कैशिनः], @deva[गाणिनः], @deva[पाणिनः].
"""

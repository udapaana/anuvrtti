id = "6.4.111"
numericId = "64111"

[en]
simple = """
The @deva[अकार] of the '@deva[श्नम्]' @deva[विकरण] and of the verb root '@deva[अस्]' is removed when followed by a @deva[सार्वधातुक] @deva[किति] / @deva[ङित्] @deva[प्रत्यय].
"""

standard = """
@deva[अ] of @deva[श्न]/@deva[अस्] elided before @[sārvadhātuka] @deva[क्]/@deva[ङित्]. @deva[रुन्धति], @deva[सन्ति].
"""

advanced = """
Before a @deva[सार्वधातुक] @deva[कित्] or @deva[ङित्] affix, the @deva[अ] of @deva[श्न] (the @deva[विकरण] of the @[rudhādi] class) and of the root @deva[अस्] is elided. From @deva[श्न]: @deva[रुन्धः], @deva[रुन्धति], @deva[भिन्तः], @deva[भिन्दन्ति]. From @deva[अस्]: @deva[स्तः], @deva[सन्ति]. Before non-@deva[कित्]/non-@deva[ङित्] affixes, the @deva[अ] is retained: @deva[भिनत्ति], @deva[अस्ति]. The compound @deva[श्न] + @deva[अस्] should yield @deva[श्नास्], but the @[sūtra] reads @deva[श्नस्] — the @deva[पररूप] single substitution here is an irregularity.
"""

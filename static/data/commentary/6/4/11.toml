id = "6.4.11"
numericId = "64011"

[en]
simple = """
The @deva[उपधा] letter of the words @deva[अप्], @deva[स्वसृ], @deva[नप्तृ], @deva[नेष्टृ], @deva[त्वष्टृ], @deva[क्षत्तृ], @deva[होतृ], @deva[पोतृ], and @deva[प्रशातृ], and also of the words ending in a @deva[तृन्] or @deva[तृच्] @deva[प्रत्यय] becomes @deva[दीर्घ] in presence of a @deva[प्रत्यय] that is also a @deva[सर्वनामस्थान], other than @deva[सम्बोधन-एकवचन].
"""

standard = """
Penultimate lengthened in @deva[अप्]/@deva[तृन्]/@deva[तृच्]/@deva[स्वसृ]/@deva[नप्तृ]/@deva[नेष्टृ] etc. in strong cases. @deva[कर्तारौ], @deva[स्वसारौ], @deva[होतारः].
"""

advanced = """
Before @deva[सर्वनामस्थान] affixes (excluding vocative singular), the @deva[उपधा] vowel is lengthened in @deva[अप्], in stems formed by @deva[तृन्] and @deva[तृच्], and in the listed nouns: @deva[स्वसृ], @deva[नप्तृ], @deva[नेष्टृ], @deva[त्वष्टृ], @deva[क्षत्तृ], @deva[होतृ], @deva[पोतृ], and @deva[प्रशास्तृ]. For @deva[अप्]: @deva[आपः] @deva[तिष्ठन्ति]; some extend this even to compounds — @deva[बह्वाम्पि] @deva[तडागानि]. The @deva[समासान्त] rule is not applied because it is @deva[अनित्य]; even if treated as @deva[नित्य], lengthening occurs without @deva[नुम्]-addition: @deva[तत्र] @deva[समासान्तो] @deva[विधिरनित्य] @deva[इति] @deva[समासान्तो] @deva[न] @deva[क्रियते] @deva[।] @deva[नित्यमपि] @deva[च] @deva[नुममकृत्वा] @deva[दीर्घत्वमिष्यते]. With @deva[तृन्]: @deva[कर्त्तारौ] @deva[कटान्], @deva[वदितारौ] @deva[जनापवादान्], @deva[कर्त्तारः]. With @deva[तृच्]: @deva[कर्त्तारौ] @deva[कटस्य], @deva[कर्त्तारः], @deva[हर्त्तारौ] @deva[भारस्य], @deva[हर्त्तारः]. The individual stems: @deva[स्वसृ] → @deva[स्वसा], @deva[स्वसारौ], @deva[स्वसारः]; @deva[नप्तृ] → @deva[नप्ता], @deva[नप्तारौ], @deva[नप्तारः]; @deva[नेष्टृ] → @deva[नेष्टारौ], @deva[नेष्टारः]; @deva[त्वष्टृ] → @deva[त्वष्टारौ], @deva[त्वष्टारः]; @deva[क्षत्तृ] → @deva[क्षत्तारौ], @deva[क्षत्तारः]; @deva[होतृ] → @deva[होतारौ], @deva[होतारः]; @deva[पोतृ] → @deva[पोतारौ], @deva[पोतारः]; @deva[प्रशास्तृ] → @deva[प्रशास्तारौ], @deva[प्रशास्तारः]. If @deva[नप्तृ] etc. are treated as @deva[रूढि] (non-derived), their enumeration serves as @deva[विधि] (injunction); if treated as derived via @deva[उणादि] affixes, their enumeration serves as @deva[नियम] (restriction), preventing the rule from governing similarly formed words: @deva[नप्त्रादीनां] @deva[ग्रहणमप्युत्पत्तिपक्षे] @deva[विध्यर्थम्] @deva[।] @deva[व्युत्पत्तिपक्षे] @deva[नियमार्थम्] @deva[।] @deva[एवंभूतानामन्येषां] @deva[संज्ञाशब्दानां] @deva[दीर्घो] @deva[मा] @deva[भूदिति]. Hence @deva[पितरौ], @deva[पितरः], @deva[मातरौ], @deva[मातरः] are excluded. The vocative singular exception produces @deva[हे] @deva[कर्त्तः], @deva[हे] @deva[स्वसः]. In all the above, @deva[अर्] substitutes for @deva[ऋ] by @ref[7.3.110].
"""

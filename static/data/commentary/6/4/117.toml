id = "6.4.117"
numericId = "64117"

[en]
simple = """
The verb root '@deva[हा]' gets an optional @deva[इकारादेश] or an @deva[आकारादेश] when followed by the @deva[प्रत्यय] '@deva[हि]'.
"""

standard = """
@deva[आ]/@deva[इ] optionally for @deva[हा] before @deva[हि]. @deva[जहाहि], @deva[जहिहि], or @deva[जहीहि].
"""

advanced = """
@deva[आ] and @deva[इ] are optionally substituted for the final of the stem of @deva[हा] (@deva[जुहोत्यादिगणः], 3rd conjugation) before the Imperative ending @deva[हि]. Three forms result: @deva[जहाहि] (with @deva[आ]), @deva[जहिहि] (with @deva[इ]), or @deva[जहीहि] (by @ref[6.4.113]).
"""

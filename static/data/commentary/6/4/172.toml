id = "6.4.172"
numericId = "64172"

[en]
simple = """
The word @deva[कार्म] means "one habitually engaged in or prompt at work." It is formed irregularly from @deva[कर्मन्] by dropping the final @deva[अन्] syllable. For example, @deva[कार्म] (one accustomed to action) contrasts with the regular possessive @deva[कार्मणम्] (belonging to action, as in @deva[कर्मणः इदम्]).
"""

standard = """
The derivative @deva[कार्म] is formed from @deva[कर्मन्] by the @deva[ण] affix in the @[tachchhilika] (habitual-agent) sense per @ref[4.4.62], with the final @deva[अन्] of the base elided under @ref[6.4.144]. However, because @deva[ण्] and @deva[अण्] affixes in the @[tachchhilika] sense are treated as a single class, the rule @ref[6.4.167] would normally block the elision of @deva[अन्]; the form @deva[कार्म] is thus an irregular exception, establishing the maxim: @deva[ताच्छीलिके णेऽण् कृतानि भवन्ति] (derivations made with @deva[ण्] count as made with @deva[अण्] in habitual contexts). When the sense is merely "belonging to action" rather than habitual, the regular form @deva[कार्मणम्] is produced instead (@deva[कर्मणः इदम्]).
"""

advanced = """
@deva[कार्म] is irregularly formed from @deva[कर्मन्] with elision of final @deva[अन्] when the sense is "accustomed to or prompt in that occupation" (@[tāccḥīlika]). The affix is @deva[ण] (by @ref[4.4.62]). By @ref[6.4.144], the form @deva[कार्म] appears to be regular, but @deva[ण्] and @deva[अण्] affixes in the @[tāccḥīlika] sense are treated as equivalent, so @ref[6.4.167] would ordinarily prevent @deva[अन्]-elision. This proves the existence of the maxim @deva[ताच्छीलिके] @deva[णेऽण्] @deva[कृतानि] @deva[भवन्ति] — "operations triggered by @deva[अण्] also apply when @deva[ण] is added in the @[tāccḥīlika] sense." Accordingly, @deva[ङीप्] is added to @deva[ण]-formed words in the feminine just as for @deva[अण्]-formed words: @deva[चौरी], @deva[तापसी], etc. (The @deva[ण] of @ref[5.2.101] and @ref[3.1.140] is excepted.) Without the @[tāccḥīlika] sense, @deva[अन्] is retained: @deva[कर्मणः] @deva[इदम्] = @deva[कार्मणम्].
"""

id = "6.4.50"
numericId = "64050"

[en]
simple = """
When a @deva[क्य] (denominative) suffix follows a consonant, its @deva[य] may optionally drop before an @deva[आर्धधातुक] affix. This gives two equally valid forms. Example: @deva[समिध् + क्य + इता] → @deva[समिध्यिता] or @deva[समिधिता] ('one who kindles').
"""

standard = """
The rule optionally elides @deva[य] of the denominative affix @deva[क्य] (covering both @deva[क्यच्] and @deva[क्यङ्]) when the preceding sound is a consonant and the following affix is @deva[आर्धधातुक]. The optionality (@deva[वा]) means both the elided and un-elided forms are grammatical. Thus from @deva[समिध्] 'fuel': @deva[समिध्यिता] (with @deva[य]) or @deva[समिधिता] (without @deva[य]); similarly @deva[दृषद्यिता] or @deva[दृषदिता] from @deva[दृषद्] 'stone'. Compare @ref[6.4.49] which handles the non-optional elision context.
"""

advanced = """
The elision of @deva[य] in a Denominative @deva[अङ्ग] formed with @deva[क्य] (covering both @deva[क्यच्] and @deva[क्यङ्]) is optional when preceded by a consonant and followed by an @deva[आर्धधातुक] affix: @deva[समिध्यिता] or @deva[समिधिता], @deva[दृषद्यिता] or @deva[दृषदिता] (meaning @deva[समिधमात्मन] @deva[इच्छति] or @deva[समिध] @deva[इवाचरति]).
"""

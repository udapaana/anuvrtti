id = "6.4.122"
numericId = "64122"

[en]
simple = """
Four roots — @deva[तॄ] ("to cross"), @deva[फल्] ("to bear fruit"), @deva[भज्] ("to share"), and @deva[त्रप्] ("to be ashamed") — change their vowel @deva[अ] to @deva[ए] in the Perfect tense (@deva[लिट्]), and the reduplicated syllable is dropped. This happens before Perfect affixes marked with @deva[क्] or @deva[ङ्], and also before @deva[थल्] with augment @deva[इट्]. The resulting forms are @deva[तेरतुः] ("the two crossed"), @deva[फेलतुः], @deva[भेजतुः], and @deva[त्रेपे].
"""

standard = """
For the four roots @deva[तॄ], @deva[फल्], @deva[भज्], and @deva[त्रप्], @deva[ए] is substituted for the @deva[अ] of the @deva[अङ्ग] and the @deva[अभ्यास] is elided in the @deva[लिट्] before affixes that are @deva[क्-] or @deva[ङ्-]marked, and also before @deva[थल्] carrying augment @deva[इट्]. The conditioning environment is the @deva[लिट्] paradigm: @deva[क्]-marked affixes trigger the change in dual/plural forms, while @deva[इट्]-augmented @deva[थल्] triggers it in the second-person singular. Thus @deva[तेरतुः] (dual third person), @deva[फेलतुः], @deva[भेजतुः], @deva[त्रेपे] (middle first). The elision of the @deva[अभ्यास] distinguishes these from unaffected Perfect forms.
"""

advanced = """
@deva[ए] replaces @deva[अ] in the roots @deva[तॄ], @deva[फल], @deva[भज], and @deva[त्रप], with simultaneous @[abhyāsa]-elision, before @deva[कित्]/@deva[ङित्] @deva[लिट्] affixes and before @deva[इट्]-augmented @deva[थल्]. Forms: @deva[तेरतुः], @deva[तेरुः], @deva[तेरिथ]; @deva[फेलतुः], @deva[फेलुः], @deva[फेलिथ]; @deva[भेजतु], @deva[भेजुः], @deva[भेजिथ]; @deva[त्रेपे], @deva[त्रेपते], @deva[त्रेपिरे]. Each root overrides a different condition of @ref[6.4.120]: for @deva[तॄ], the @deva[अ] is obtained by @[guṇa] (normally blocked by @ref[6.4.126]); for @deva[फल्] and @deva[भज्], the reduplicate has a different substitute consonant; for @deva[त्रप], the @deva[अ] does not stand between two simple consonants. @[vārtika]: the rule extends to @deva[श्रन्थ] as well — @deva[श्रेथतुः], @deva[श्रेथुः].
"""

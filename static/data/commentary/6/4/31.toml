id = "6.4.31"
numericId = "64031"

[en]
simple = """
In presence of the @deva[क्त्वा] @deva[प्रत्यय], the @deva[उपधा-नकार] of the verb roots @deva[स्कन्द्] and @deva[स्यन्द्] is not removed.
"""

standard = """
Nasal elided before @deva[णि] in certain roots. @deva[गमयति] (not @deva[गंमयति]).
"""

advanced = """
@deva[स्कन्द्] and @deva[स्यन्द्] retain their nasal before @deva[क्त्वा]: @deva[स्कन्त्वा]; @deva[स्यन्दित्वा] or @deva[स्यन्त्वा] — the @deva[इट्] augment is added when @deva[स्यन्द्] is treated as having an indicatory @deva[ऊ] in the @deva[धातुपाठ]. When @deva[इट्] is added, @deva[क्त्वा] ceases to be @deva[कित्] by @ref[1.2.18], and no nasal-elision rule applies.
"""

id = "6.4.4"
numericId = "64004"

[en]
simple = """
The words @deva[तिसृ] and @deva[चतसृ] do not become @deva[दीर्घ] in presence of the @deva[नाम्] @deva[प्रत्यय].
"""

standard = """
@deva[तिसृ]/@deva[चतसृ] finals not lengthened before @deva[नाम्]. @deva[तिसृणाम्], @deva[चतसृणाम्].
"""

advanced = """
The finals of @deva[तिसृ] and @deva[चतसृ] are not lengthened before @deva[नाम्] (having the augment @deva[नुट्]). As @deva[तिसृणाम्], @deva[चतसृणाम्] @deva[॥] The very fact of this prohibition proves by implication that the final @deva[ऋ] of these words is not changed to @deva[र] before a genitive plural, @ref[7.2.100] notwithstanding. In fact @deva[नुट्] is added before scope is given to that rule, and thus the preceding rule @ref[7.1.54] prevents the application of the subsequent rule @ref[7.2.100].
"""

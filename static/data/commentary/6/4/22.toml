id = "6.4.22"
numericId = "64022"

[en]
simple = """
All the sutras present from here onward till the the end of this @deva[पाद] should be considered as @deva[असिद्ध] towards each other when they are invoked in such a way that their @deva[आश्रय]s are exactly the same.
"""

standard = """
@[adhikāra]: Following rules considered @deva[असिद्ध] (non-existent) for each other.
"""

advanced = """
This is an @deva[अधिकार] @deva[सूत्र]. Any change an @deva[अङ्ग] undergoes by rules from @ref[6.4.22] through @ref[6.4.129] (@deva[भस्य]) is treated as @deva[असिद्ध] (not having taken effect) when applying any other rule within this same section. According to Bohtlingk, the @deva[असिद्धवत्] extends to @ref[6.4.129]; according to @deva[काशिका], it extends to the end of the chapter. The term @deva[आभात्] means 'up to @deva[भ]', i.e., up to @ref[6.4.129] where @deva[भ] occurs. The word @deva[अत्र] requires that two rules share the same @deva[आश्रय] (place of operation); where their loci differ, they are not @deva[असिद्ध] to each other. The word @deva[असिद्ध] entails that a general rule (@deva[उत्सर्ग]) takes effect as if no special rule had applied, and that a substitution (@deva[आदेश]) taught by one rule is treated as not having occurred when applying another. Application: in forming @deva[एधि] and @deva[शाधि] (imperative 2nd person), @deva[ए] substitutes for @deva[अस्] ('to be') by @ref[6.4.119] and @deva[शा] for @deva[शास्] by @ref[6.4.35]; then @deva[धि] is added by @ref[6.4.101], which requires a @deva[झल्]-final root. Since @deva[अस्] and @deva[शास्] are @deva[झल्]-final but their substitutes @deva[ए] and @deva[शा] are vowel-final, the @deva[असिद्ध] principle treats the substitution as not having occurred for purposes of @ref[6.4.101]. Similarly, @deva[आगाहि] (Vedic imperative; @deva[शप्] elided by @ref[2.4.73]) and @deva[जहि] (from @deva[हन्]; @deva[ज] substituted by @ref[6.4.36]) — the stems @deva[आग] and @deva[ज] end in @deva[अ], which would trigger elision of @deva[हि] by @ref[6.4.105], but the substitution is @deva[असिद्ध], so @deva[हि] is retained. The restriction @deva[आभात्] ('up to @ref[6.4.129]') means that for rules outside this section, changes within it are not treated as @deva[असिद्ध]. In @deva[अभाजि] and @deva[रागः] (from @deva[भञ्ज्] and @deva[रञ्ज्]), the nasal is elided by @ref[6.4.27]/@ref[6.4.28] and @ref[6.4.33] before @deva[घञ्] and @deva[चिण्], yielding stems @deva[रज्] and @deva[भज्]; @ref[7.2.116] then applies @deva[वृद्धि] to the penultimate @deva[अ]. If the nasal elision were @deva[असिद्ध] for @ref[7.2.116], @deva[अ] would not be @deva[उपधा] and could not take @deva[वृद्धि]. The word @deva[अत्र] ensures @deva[असिद्ध] status applies only when rules share the same @deva[आश्रय]. In @deva[पा] + @deva[वस्] (@deva[क्वसु]) + @deva[अस्] (@deva[शस्], accusative plural) = @deva[पपा] + @deva[उस्] + @deva[अस्] (@ref[6.4.131], @deva[सम्प्रसारण] of @deva[व]): if @deva[उ] were @deva[असिद्ध] for @ref[6.4.64], @deva[आ] of @deva[पा] could not be elided (no following vowel). But @deva[उ] is not @deva[असिद्ध] here — different @deva[आश्रय] — so @deva[आ] is elided: @deva[पपुषः] @deva[पश्य]. Similarly @deva[चि] + @deva[वस्] + @deva[अस्] = @deva[चिचि] + @deva[उस्] + @deva[अस्]: @deva[उ] is not @deva[असिद्ध], and @ref[6.4.82] applies (@deva[य्] substitution): @deva[चिच्युषः] @deva[पश्य]. And @deva[लू] + @deva[वस्] + @deva[अस्] = @deva[लुलू] + @deva[उस्] + @deva[अस्]: @deva[ऊ] of @deva[लू] becomes @deva[उव्] by @ref[6.4.77]: @deva[लुलुवुषः]. In all three, the @deva[आ]-elision/@deva[य]-substitution/@deva[उव्]-substitution relates to @deva[वस्], while @deva[सम्प्रसारण] of @deva[व] relates to @deva[अस्] (making the stem @deva[भ]) — different @deva[आश्रय]s. The maxim @deva[असिद्धं] @deva[बहिरङ्गमन्तरङ्गे] does not override this, because the special @deva[आभीय] @deva[असिद्ध] principle governs this section — @deva[अन्तरङ्ग]/@deva[बहिरङ्ग] relations do not simultaneously coexist with mutual @deva[असिद्ध] status. @[vārttika]: The substitutes @deva[वुक्] (@ref[6.4.88]) and @deva[युट्] (@ref[6.4.63]) are exceptions — they are not treated as @deva[असिद्ध], so @ref[6.4.77] (@deva[उवङ्]) and @ref[6.4.82] (@deva[य्]-substitution) do not apply simultaneously with them. Hence @deva[भू] → @deva[बभूव], @deva[बभूवतुः], @deva[बभूवः] (with @deva[वुक्], no @deva[उवङ्]); @deva[दीङ्] → @deva[उपदिदीये], @deva[उपदिदीयाते], @deva[उपदिदीयिरे] (with @deva[युट्], no @deva[यणादेश]). The @deva[आ] in @deva[आभात्] is limit-inclusive, so the @deva[असिद्ध] principle extends to the @deva[सूत्र]s governed by @deva[भ].
"""

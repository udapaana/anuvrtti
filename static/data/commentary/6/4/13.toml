id = "6.4.13"
numericId = "64013"

[en]
simple = """
For the words @deva[हन्], @deva[पूषन्] and @deva[अर्यमन्], and for also the words that end in '@deva[इन्]', the @deva[उपधादीर्घ] happens in case of the @deva[सुँ-प्रत्यय] of @deva[प्रथमा-एकवचन].
"""

standard = """
Penultimate lengthened in @deva[इन्]/@deva[हन्]/@deva[पूषन्]/@deva[अर्यमन्] before nominative @deva[सु] (not vocative). @deva[दण्डी], @deva[पूषा]. But: @deva[हे] @deva[दण्डिन्].
"""

advanced = """
The @deva[उपधा] vowel of stems ending in @deva[इन्], @deva[हन्], @deva[पूषन्], or @deva[अर्यमन्] is lengthened before the nominative singular @deva[सु], but not in vocative singular. Examples: @deva[दण्डी], @deva[वृत्रहा], @deva[पूषा], @deva[अर्यमा] — @deva[न्] is elided by @ref[8.2.7], and the case-affix by @ref[6.1.68]. In vocative singular: @deva[हे] @deva[दण्डिन्], @deva[हे] @deva[पूषन्], @deva[हे] @deva[वृत्रहन्], @deva[हे] @deva[अर्यमन्].
"""

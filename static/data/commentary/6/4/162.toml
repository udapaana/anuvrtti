id = "6.4.162"
numericId = "64162"

[en]
simple = """
In Vedic usage, the @deva[ऋ] of @deva[ऋजु] ("straight") may optionally be replaced by @deva[र्] before the degree suffixes @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्]. So both @deva[रजिष्ठः] ("most straight", with change) and @deva[ऋजिष्ठः] (without change) are valid in Vedic texts. This is an optional Vedic-only variant of the general @deva[ऋ] → @deva[र्] rule.
"""

standard = """
This rule extends the @deva[ऋ] → @deva[र्] substitution optionally to the Vedic stem @deva[ऋजु] before @deva[इष्ठ]/@deva[इमन्]/@deva[ईयस्]. In the general language (see the preceding rule), only six specific stems undergo this change mandatorily. For @deva[ऋजु] in Vedic contexts, the change is @deva[विकल्प] (optional): @deva[रजिष्ठः] (with @deva[ऋ] → @deva[र्]) alongside @deva[ऋजिष्ठः] (without change). The optionality and Vedic restriction together set this rule apart from the mandatory six-stem rule, reflecting the more permissive phonological environment of Vedic Sanskrit.
"""

advanced = """
Before the affixes 1. @deva[इष्ठ] 2. @deva[इमन्] and 3. @deva[ईयस्] , the @deva[ऋ] of @deva[ऋजु] may optionally be changed to @deva[र्] , in the @deva[छन्दस्] (Vedas). As @deva[रजिष्ठः] and @deva[ऋजिष्ठः], in @deva[रजिष्ठमेति] @deva[पन्थानम्], @deva[त्वमृजिष्ठः] @deva[॥]
"""

id = "6.4.20"
numericId = "64020"

[en]
simple = """
In roots like @deva[ज्वर्], @deva[त्वर्], @deva[श्रिव्], @deva[अव], and @deva[मव्], the substitute @deva[ऊठ्] replaces both the penultimate vowel and the consonant @deva[व्] before certain affixes. This gives forms like @deva[जूः], @deva[तूः], @deva[श्रूतः], @deva[ऊतिः], @deva[मूतः].
"""

standard = """
Before @deva[क्वि] and @deva[झलादि] affixes marked @deva[ङित्] or @deva[कित्], the substitution @deva[ऊठ्] applies to roots @deva[ज्वर्], @deva[त्वर्], @deva[श्रिव्], @deva[अव], and @deva[मव्]. The @deva[ऊठ्] replaces both the penultimate vowel and @deva[व्] together. Results: @deva[ज्वर्] → @deva[जूः], @deva[त्वर्] → @deva[तूः], @deva[श्रिव्] → @deva[श्रूतः], @deva[अव] → @deva[ऊतिः], @deva[मव्] → @deva[मूतः]. See @ref[6.4.20].
"""

advanced = """
Before the affixes governed by @ref[6.4.15] (@deva[क्वि] and @deva[झलादि] @deva[कित्]/@deva[ङित्]), @deva[ऊठ्] substitutes as a single replacement (@deva[एकादेश]) for both the final consonant and the adjacent vowel in roots @deva[ज्वर्], @deva[त्वर्], @deva[श्रिव्], @deva[अव्], and @deva[मव्]. Examples: @deva[ज्वर्] → @deva[जूः], @deva[जूरौ], @deva[जूरः], @deva[जूर्त्तिः]; @deva[त्वर्] → @deva[तूः], @deva[तूरौ], @deva[तूरः], @deva[तूर्त्तिः]; @deva[श्रिव्] → @deva[श्रूः], @deva[श्रुवौ], @deva[श्रुवः], @deva[श्रूतः], @deva[श्रूतवान्], @deva[श्रूतिः]; @deva[अव्] → @deva[ऊः], @deva[उवौ], @deva[उवः], @deva[ऊतिः]; @deva[मव्] → @deva[मूः], @deva[मुवौ], @deva[मुवः], @deva[मूतः], @deva[मूतवान्], @deva[मूतिः]. @deva[ज्वरत्वरोरुपधा] @deva[वकारात्] @deva[परा], @deva[श्रिव्य] @deva[वमवां] @deva[पूर्वा] — in @deva[ज्वर्] and @deva[त्वर्], @deva[ऊ] replaces @deva[व्] together with the @deva[अ] following it; in @deva[श्रिव्], @deva[अव्], and @deva[मव्], it replaces @deva[व्] together with the vowel (@deva[इ] or @deva[अ]) preceding it. An alternate reading gives @deva[स्रिव्].
"""

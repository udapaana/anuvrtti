id = "6.4.69"
numericId = "64069"

[en]
simple = """
The @deva[ई] substitution prescribed for @deva[घु]-roots and @deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा], @deva[सा] does NOT apply before the absolutive @deva[ल्यप्]. These roots retain their @deva[आ] before @deva[ल्यप्]. Example: @deva[दा] → @deva[प्रदाय] ('having given'), not @deva[*प्रदीय]; @deva[मा] → @deva[प्रमाय]; @deva[पा] → @deva[प्रपाय].
"""

standard = """
This rule blocks the @deva[ई]-substitution of @ref[6.4.66] specifically before @deva[ल्यप्] (the absolutive affix used after a preverb). Without this blocking rule, @deva[प्रदाय] would incorrectly become @deva[*प्रदीय]. The @deva[आ] is thus preserved for all the listed roots: @deva[प्रदाय] 'having given', @deva[प्रमाय] 'having measured', @deva[प्रस्थाय] 'having set out', @deva[प्रगाय] 'having sung'. Compare @ref[6.4.70] which allows optional @deva[इ]-substitution for @deva[मा] in a different context.
"""

advanced = """
The @deva[ई]-substitution of @ref[6.4.66] is blocked before the absolutive @deva[ल्यप्] for all the roots covered there — @deva[घु]-roots (@deva[दा], @deva[धा]), @deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा] (@deva[जुहाति]), and @deva[सा]: @deva[प्रदाय], @deva[प्रधाय], @deva[प्रमाय], @deva[प्रस्थाय], @deva[प्रगाय], @deva[प्रपाय], @deva[प्रहाय], @deva[अवसाय]. The affix @deva[ल्यप्], as the substitute of @deva[क्त्वा], is @deva[कित्] by @ref[1.1.56].
"""

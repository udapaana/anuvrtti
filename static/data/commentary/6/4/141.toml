id = "6.4.141"
numericId = "64141"

[en]
simple = """
In Vedic hymns (@deva[मन्त्र]-s), the first syllable @deva[आ] of the word @deva[आत्मन्] ("self") is dropped when the Instrumental singular ending follows, giving @deva[त्मना] instead of @deva[आत्मना]. An example from Vedic usage: @deva[त्मना देवेभ्यः] ("by [one's] self for the gods"). Outside Vedic contexts, the full form @deva[आत्मना] is always used.
"""

standard = """
This rule applies exclusively in @deva[मन्त्र] contexts: the initial @deva[आ] of @deva[आत्मन्] is elided (@deva[लोप]) when the Instrumental third-case singular affix (@deva[तृतीया एकवचन]) follows, yielding @deva[त्मना]. The conditioning environment is twofold: (1) the word must be @deva[आत्मन्] and (2) the context must be a Vedic mantra. In ordinary (@deva[लौकिक]) usage, the elision rule is suspended and @deva[आत्मना] is the required form. This reflects the well-established @[pāṇinian] principle that certain rules operate only in Vedic domains.
"""

advanced = """
In @deva[मन्त्र] contexts, the initial syllable of @deva[आत्मन्] is elided before the Instrumental singular affix (@deva[आङ्], the ancient grammarians' term for the Instrumental singular ending). Examples: @deva[त्मना] @deva[देवेभ्यः], @deva[त्मना] @deva[सोमेषु]. The restriction to @deva[मन्त्र] contexts means the elision does not apply in ordinary usage: @deva[आत्मनो] @deva[कृतम्]. The restriction to the Instrumental singular: @deva[यदात्मन] @deva[स्तन्नो] @deva[वरिष्ठा] (other cases retain @deva[आ]). @[vārtika]: the elision of @deva[आ] in @deva[आत्मन्] is found in other cases as well, though less frequently than in the Instrumental — @deva[त्मन्यासमञ्जत] @deva[मह्यम्].
"""

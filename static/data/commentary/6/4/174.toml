id = "6.4.174"
numericId = "64174"

[en]
simple = """
This rule lists eleven words that are formed irregularly and cannot be derived by the standard rules of @[pāṇinian] grammar. They include @deva[दाण्डिनायन] (descendant of @[daṇḍin]), @deva[हास्तिनायन] (of Hastin), @deva[अथर्वणिक] (relating to the Atharvaveda), @deva[मैत्रेय] (of Mitra), and @deva[हिरण्मया] (golden), among others. These are accepted as established usage (@[sādhu]) and are simply listed for the learner to memorise.
"""

standard = """
The @[sūtra] enumerates eleven @[apasiddha] (irregular) formations that deviate from the expected derivational rules: @deva[दाण्डिनायन], @deva[हास्तिनायन], @deva[अथर्वणिक], @deva[जैह्माशिनेय], @deva[वाशिनायनि], @deva[भ्रौणहत्य], @deva[धैवत्य], @deva[सरवै], @deva[अक्ष्वाक], @deva[मैत्रेय], and @deva[हिरण्मया]. Each departs from what the standard @[taddhita] rules would yield — for instance, @deva[दाण्डिनायन] has an unexpected @deva[आयन] extension, and @deva[हिरण्मया] shows elision not predicted by the standard @deva[मयट्] rule. Because no single rule accounts for all of them, they are listed together as @[nipātana] (stipulated forms), meaning the grammarian records them as correct rather than deriving them.
"""

advanced = """
The following eleven forms are irregular (@[nipātana]):

(1-2) @deva[दाण्डिनायन] and @deva[हास्तिनायन], from @deva[दण्डिन्] and @deva[हस्तिन्] of the @deva[नडादि] class, with @deva[फक्] (by @ref[4.2.91]). If not belonging to that class, the affix is irregular: @deva[दण्डिनोऽपत्यं] = @deva[दाण्डिनायनः], etc. The final @deva[इन्] is not elided.

(3) @deva[अथर्वणिक], from @deva[अथर्वन्] (of @[vasantādi] class, by @ref[4.2.63]). The work of the @deva[अथर्वन्] ṛṣi is also called @deva[अथर्वन्]; one who studies it is @deva[अथर्वणिक] — the final is not elided before @deva[इक्].

(4-5) @deva[जैह्माशिनेय] and @deva[वाशिनायनि], from @deva[जिह्माशिन्] and @deva[वासिन्] — the former with @deva[ढक्] of @[śubhrādi] class (by @ref[4.1.123]), the latter with @deva[फिञ्] (by @ref[4.1.157]). The stem finals are not dropped.

(6-7) @deva[भ्रौणहत्य] and @deva[धैवत्य], from @deva[भ्रूणहन्] and @deva[धीवन्] with @deva[ष्यञ्], @deva[न्] replaced by @deva[त]: @deva[भ्रूणघ्नो] @deva[भावः], @deva[धीव्नो] @deva[भावः]. By @ref[7.3.32], @deva[हन्] takes @deva[त] before affixes with indicatory @deva[ण]/@deva[ञ्], but that rule is confined to affixes after roots (not @deva[तद्धित]), and does not apply to forms like @deva[भ्रौणघ्नी], @deva[वार्त्रघ्नः]. The @deva[त] in @deva[भ्रौणहत्य] is therefore an irregularity.

(8) @deva[सारव], from @deva[सरयू] with @deva[अण्], final @deva[अयू] elided: @deva[सरय्वां] @deva[भवः] = @deva[सारवमुदकं].

(9) @deva[ऐक्ष्वाक], from @deva[इक्ष्वाकु] — either with @deva[अञ्] (by @ref[4.1.168]) or @deva[अण्] (by @ref[4.2.132]: @deva[ईक्ष्वाकुषु] @deva[जनपदेषु] @deva[भवः]). The irregularity is the elision of final @deva[उ]. The @[sūtra] reads the word once without accent (@[ekaśruti]), covering both accentual variants.

(10) @deva[मैत्रेय], from @deva[मित्रयु] of @[gṛṣṭyādi] class (by @ref[4.1.136]) with @deva[ढञ्]: @deva[मित्रयु] + @deva[एय]. @ref[6.4.146] would require @[guṇa] but also prevents it, requiring @[lopa] of @deva[उ]; @ref[7.3.2] would require @deva[इय] for @deva[यु]. The irregularity is total elision of @deva[यु]: @deva[मैत्रेय]. The @deva[अ] cannot be elided by @ref[6.4.148] before @deva[एय], as the @[lopa] of @deva[यु] is @[asiddha] by @ref[6.4.22]; but the result is the same, since @deva[अ] + @deva[ए] = @deva[ए] by @ref[6.1.97]. The plural is @deva[मित्रयवः] (plural of @deva[मित्रयु], by @[yāskādi] class, @ref[2.4.63]). An alternative form @deva[मैत्रेयिक] is formed under @ref[7.3.2]. If @deva[मित्रयु] were placed in @[bidādi] class (@ref[4.1.104]), @deva[अञ्] would yield @deva[मैत्रेय] regularly (@deva[मित्रयु] + @deva[अञ्] → @deva[मित्र] + @deva[इय] by @ref[7.3.2] + @deva[अ] → @deva[मैत्रेयः]), and @[yāskādi] inclusion would be unnecessary. However, the @deva[संघ] derivative then requires @deva[अण्] (by @ref[4.3.127]) rather than the needed @deva[वुञ्] (by @ref[4.3.126]): @deva[मैत्रेयकः] @deva[संघः].

(11) @deva[हिरण्मय], from @deva[हिरण्य] with @deva[मयट्], @deva[य] elided: @deva[हिरण्यस्य] @deva[विकारः] = @deva[हिरण्मयः].
"""

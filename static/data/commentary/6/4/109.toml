id = "6.4.109"
numericId = "64109"

[en]
simple = """
The @deva[उकार] occurring at end of a @deva[प्रत्यय] that is attached to the verb root @deva[कृ] is removed when followed by a @deva[यकार].
"""

standard = """
@deva[कुरु] @deva[उ] elided before @deva[य्]-initial. @deva[कुर्यात्], @deva[कुर्युः].
"""

advanced = """
The affix @deva[उ] of the stem @deva[कुरु] is obligatorily elided before a personal ending beginning with @deva[य्]. Forms: @deva[कुर्यात्], @deva[कुर्याताम्], @deva[कुर्युः]. The augment @deva[यासुट्] is treated as part of the affix, making the personal ending @deva[य्]-initial for purposes of this rule.
"""

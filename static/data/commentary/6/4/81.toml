id = "6.4.81"
numericId = "64081"

[en]
simple = """
The verb root @deva[इण्] gets a @deva[यणादेश] when followed by an @deva[अच्] letter.
"""

standard = """
@deva[य्] for @deva[इ] of @deva[इण्] before vowel. @deva[यन्ति], @deva[यन्तु]. Superseded by @[guṇa]: @deva[अयनम्].
"""

advanced = """
The @deva[इ] of root @deva[इण्] (@deva[एति]) is replaced by semivowel @deva[य्] before a vowel-initial affix: @deva[यन्ति], @deva[यन्तु], @deva[आयन्]. This supersedes @deva[इयङ्]-substitution but is itself overridden by @[vṛddhi] (@ref[7.2.115]) and @[guṇa] (@ref[7.3.84]), following the maxim @deva[मध्येऽपवादाः] @deva[पूर्वान्] @deva[विधीन्] @deva[बाधन्ते], @deva[नोत्तरान्] — "@[apavāda] rules supersede only the preceding general rules, not the subsequent ones." Hence @deva[अयनम्] and @deva[आयकः].
"""

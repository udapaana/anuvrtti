id = "6.4.46"
numericId = "64046"

[en]
simple = """
This @[sūtra] is an @deva[अधिकार] (governing rule): it announces that all @[sūtras] from here through @ref[6.4.68] apply specifically 'before an @deva[आर्धधातुक] affix.' Any operation stated in this section must be understood to occur before @deva[आर्धधातुक] suffixes.
"""

standard = """
This is an @[adhikāra] @[sūtra] whose scope extends from @ref[6.4.46] to @ref[6.4.68] (inclusive). The words @deva[आर्धधातुकस्येट्] govern all subsequent rules in this section, meaning every operation taught there applies specifically before @deva[आर्धधातुक] affixes. This restricts the application of those rules: they do not apply before @deva[सार्वधातुक] affixes. See @ref[6.4.46].
"""

advanced = """
This @deva[अधिकार] extends from @ref[6.4.46] through @ref[6.4.68] inclusive. The phrase "before an @deva[आर्धधातुक] affix" (@deva[आर्द्धधातुकं] @deva[शेषः] @ref[3.4.114]) must be supplied in every @[sūtra] within this range. The @deva[लुक्]-elision of @deva[शप्] after @deva[अदादि] roots implies that @deva[शप्] is never subject to @[lopa]. The operations governed by this @[adhikāra] are: (1) @deva[अतोलोपः] — elision of stem-final @deva[अ] before @deva[आर्धधातुक], as @deva[चिकीर्षिता], @deva[चिकीर्षितुम्] (but not before @deva[सार्वधातुक]: @deva[भवति], @deva[भवतः]); (2) @deva[यलोपः] — elision of @deva[य] by @ref[6.4.49]–@ref[6.4.50], as @deva[बेभिदिता], @deva[बेभिदितुम्] from Intensive @deva[बेभिद्य] (before @deva[सार्वधातुक]: @deva[बेभिद्यते], @deva[चेच्छिद्यते]); (3) @deva[णिलोपः] — elision of @deva[णि] by @ref[6.4.51], as @deva[कारणा], @deva[हारणा], @deva[पाच्यते] (@deva[पाचि] + @deva[यक्] + @deva[ते] = @deva[पाच्यते]), @deva[याज्यते] (before @deva[सार्वधातुक]: @deva[पाचयति], @deva[याजयति], @deva[कारयति], @deva[हारयति]); (4) @deva[आल्लोपः] — elision of @deva[आ] by @ref[6.4.64], as @deva[पपतुः], @deva[पपुः], @deva[ववतुः], @deva[ववुः] (before @deva[सार्वधातुक]: @deva[यान्ति], @deva[वान्ति]); (5) @deva[ईत्वम्] — substitution of @deva[ई] for @deva[आ] by @ref[6.4.65], as @deva[धीयते], @deva[दीयते] (before @deva[सार्वधातुक]: @deva[अदाताम्], @deva[अधाताम्]); (6) @deva[एत्वम्] — substitution of @deva[ए] for @deva[आ] by @ref[6.4.68], confined to @deva[आशीर्लिङ्], as @deva[स्नेयात्], @deva[ग्लेयात्] (before @deva[सार्वधातुक]: @deva[स्नायात्], @deva[ग्लायात्]); (7) @deva[चिण्वद्भावः] @deva[सीयुटि] — treatment as passive aorist @deva[चिण्] by @ref[6.4.62], as @deva[कारिषीट], @deva[हारिषीट] (before @deva[सार्वधातुक]: @deva[क्रियेत], @deva[ह्रियेत]). The @[kāśikā] verse summarizes: @deva[अतो] @deva[लोपो] @deva[यलोपश्च] @deva[णिलोपश्च] @deva[प्रयोजनम्] @deva[।] @deva[आल्लोप] @deva[ईत्वमेत्वं] @deva[च] @deva[चिण्वभावश्च] @deva[सीयुटि] @deva[॥]
"""

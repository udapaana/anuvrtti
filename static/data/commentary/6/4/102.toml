id = "6.4.102"
numericId = "64102"

[en]
simple = """
In Vedic Sanskrit, the imperative suffix @deva[हि] is replaced by @deva[धि] after the roots @deva[श्रु] ('to hear'), @deva[शृणु], @deva[पॄ] ('to fill'), @deva[कृ] ('to do'), and @deva[वृ] ('to choose'). This @deva[धि] ending is characteristic of Vedic imperative forms and does not occur in classical Sanskrit. Example: @deva[श्रु + धि] → @deva[श्रुधि] 'hear!'; @deva[पॄ + धि] → @deva[पूर्धि]; @deva[कृ + धि] → @deva[कुरुधि].
"""

standard = """
The Vedic rule substitutes @deva[धि] for @deva[हि] (2sg imperative Parasmaipada) after five roots: @deva[श्रु], @deva[शृणु] (a special form of @deva[श्रु]), @deva[पॄ], @deva[कृ], and @deva[वृ]. The change is restricted to @deva[छन्दसि] (Vedic domain); in secular Sanskrit @deva[श्रृणु], @deva[कुरु] etc. are used with @deva[हि] or zero ending. Attested Vedic imperatives: @deva[श्रुधि] 'hear!', @deva[शृणुधि], @deva[पूर्धि] 'fill!', @deva[कुरुधि] 'do!', @deva[अवावृधि] 'grow!'. The substitution of @deva[धि] preserves an older Indo-European imperative ending.
"""

advanced = """
@deva[धि] is substituted for the Imperative affix @deva[हि] in the @deva[छन्दस्] (Vedas) after 1. @deva[श्रु] 2. @deva[शृणु] 3. @deva[पॄ] 4. @deva[कृ] and 5. @deva[वृ]@deva[।] As @deva[श्रुधी] @deva[हविमिन्द्र], @deva[शृणुधी], @deva[गिरः], @deva[पूर्धि], @deva[उरुकृदुरुणस्कृ] and @deva[अवावृधि], @deva[॥] In @deva[शृणुधी], the @deva[हि] is not elided after the @deva[उ] of @deva[णु] as it was required by @ref[6.4.106], since the present aphorism specifically mentions it. The lengthening takes place by @ref[6.3.137]. The forms other than @deva[शृणुधि] are irregular; @deva[शप्] being added diversely by @ref[3.1.85], and then elided diversely by @deva[बहुलं] @deva[छन्दसि] @ref[2.4.73]
"""

id = "6.4.54"
numericId = "64054"

[en]
simple = """
The word @deva[शमिता] ('one who slaughters a sacrificial animal') is irregularly formed by dropping @deva[णि] before an @deva[इट्]-augmented suffix. This form is valid only in the specialized sacrificial context. In non-ritual speech the regular form @deva[शमयिता] is used instead.
"""

standard = """
This rule carves out an exception: for root @deva[शम्] in its causative, @deva[णि] is elided before an @deva[इट्]-taking affix specifically when the meaning is sacrificial (@deva[आलम्भने]). The technical environment mirrors @ref[6.4.52] but the lexical restriction to the ritual sense limits applicability. Result: @deva[शमिता] used in contexts like @deva[शृतं हविः शमितः] ('the oblation properly prepared by the sacrificer'). Outside this semantic domain, @deva[शमयिता] applies.
"""

advanced = """
@deva[शमिता] is formed by irregular elision of @deva[णि] before an @deva[इट्]-augmented affix, restricted to the sacrificial sense (@deva[आलम्भने]): @deva[शृतं] @deva[हविः] @deva[शमितः] (formed with @deva[तृच्], in the vocative). Outside the sacrificial context, the regular form @deva[शमयितः] applies: @deva[शृतं] @deva[हविः] @deva[शमयितः]. See @[Śatapatha] @[Brāhmaṇa] III.8.3–5.
"""

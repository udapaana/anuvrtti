id = "6.4.53"
numericId = "64053"

[en]
simple = """
In Vedic mantras, @deva[जनिता] is an irregular form where @deva[णि] is dropped before @deva[तृ] with @deva[इट्], even though the general rule does not allow this. In ordinary Sanskrit the regular form is @deva[जनयिता] ('progenitor'). Example from the Rigveda: @deva[यो नः पिता जनिता].
"""

standard = """
This @deva[सूत्र] is an exception to @ref[6.4.51]: in mantras, @deva[णि] is elided before @deva[तृ] when that affix takes @deva[इट्], yielding @deva[जनिता] rather than the expected @deva[जनयिता]. The restriction to mantras (@deva[मन्त्रे]) signals this is a Vedic irregularity. The Rigvedic phrase @deva[यो नः पिता जनिता] illustrates the usage. Outside Vedic contexts, @deva[जनयिता] is the only accepted form.
"""

advanced = """
In @deva[मन्त्र] usage, @deva[जनिता] is formed by irregular elision of @deva[णि] before the affix @deva[तृ] with augment @deva[इट्]: @deva[यो] @deva[नः] @deva[पिता] @deva[जनिता]. In secular literature, the regular form is @deva[जनयिता]. This constitutes an exception to @ref[6.4.51].
"""

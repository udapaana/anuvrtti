id = "6.4.157"
numericId = "64157"

[en]
simple = """
Before the degree suffixes @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्], certain adjectives are replaced entirely by special substitute stems. For example, @deva[प्रिय] ("dear") becomes @deva[प्र], @deva[उरु] ("broad") becomes @deva[वर्], and @deva[गुरु] ("heavy") becomes @deva[गर्]. This gives forms like @deva[प्रेष्ठः] ("dearest"), @deva[वरिष्ठः] ("broadest/best"), and @deva[गरिष्ठः] ("heaviest").
"""

standard = """
This rule lists the special whole-stem substitutions (@deva[आदेश]) that apply before @deva[इष्ठ]/@deva[इमन्]/@deva[ईयस्]: @deva[प्र] for @deva[प्रिय], @deva[स्थ] for @deva[स्थिर], @deva[स्फ] for @deva[स्फिर], @deva[वर्] for @deva[उरु], @deva[बह] for @deva[बहुल], @deva[गर्] for @deva[गुरु], @deva[वर्ष] for @deva[वृद्ध], @deva[त्रप्] for @deva[तृप्], @deva[द्राघ] for @deva[दीर्घ], @deva[वृन्द] for @deva[वृन्दारक]. These substitutions are @deva[सर्वादेश] (total replacements) of the base before the degree suffix. Resulting forms: @deva[प्रेष्ठः] (from @deva[प्र]+@deva[इष्ठ]), @deva[वरिष्ठः], @deva[गरिष्ठः], @deva[द्राघिष्ठः], etc. Each substitute is chosen to optimize the phonological fit with the following degree suffix.
"""

advanced = """
Before @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्], the following total stem substitutions apply: @deva[प्र] for @deva[प्रिय], @deva[स्थ] for @deva[स्थिर], @deva[स्फ] for @deva[स्फिर], @deva[वर्] for @deva[उरु], @deva[बह] for @deva[बहुल], @deva[गर्] for @deva[गुरु], @deva[वर्ष] for @deva[वृद्ध], @deva[त्रप्] for @deva[तृप्], @deva[द्राघ] for @deva[दीर्घ], @deva[वृन्द] for @deva[वृन्दारक]. Forms: @deva[प्रेष्ठः], @deva[प्रेमा], @deva[प्रेयान्]; @deva[स्थेष्ठः], @deva[स्थेयान्], @deva[स्थेमा]; @deva[स्फेष्ठः], @deva[स्फेयान्]; @deva[वरिष्ठः], @deva[वरिमा], @deva[वरीयान्]; @deva[बंहिष्ठः], @deva[बंहीयान्], @deva[बंहिमा]; @deva[गरिष्ठः], @deva[गरीयान्], @deva[गरिमा]; @deva[वर्षिष्ठः], @deva[वर्षीयान्]; @deva[त्रपिष्ठः], @deva[त्रपीयान्]; @deva[द्राघिष्ठः], @deva[द्राघीयान्], @deva[द्राघिमा]; @deva[वृन्दिष्ठः], @deva[वृन्दीयान्]. @deva[प्रियोरुगुरुबहुलदीर्घाः] @deva[पृथ्वादिषु] @deva[पठ्यन्ते], @deva[तेनान्येषामिमनिज्] @deva[न] @deva[भवतीति] @deva[नोदाह्रियते] — of the above, @deva[प्रिय], @deva[उरु], @deva[गुरु], and @deva[बहुल] are read in the @[pṛthvādi] class and take @deva[इमन्] (by @ref[5.1.122]); others do not.
"""

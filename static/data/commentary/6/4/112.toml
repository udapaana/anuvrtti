id = "6.4.112"
numericId = "64112"

[en]
simple = """
The @deva[आकार] of the @deva[विकरण] @deva[श्ना] and also of an @deva[अभ्यस्त] is removed when followed by a @deva[सार्वधातुक] @deva[कित्] and @deva[ङित्] @deva[प्रत्यय].
"""

standard = """
@deva[आ] of @deva[श्ना]/reduplicate elided before vowel-initial @[sārvadhātuka] @deva[क्]/@deva[ङित्]. @deva[लुनते], @deva[मिमते].
"""

advanced = """
Before a vowel-initial @deva[सार्वधातुक] @deva[कित्] or @deva[ङित्] affix, the long @deva[आ] of @deva[श्ना] (the @deva[विकरण] of the @deva[क्र्यादिगणः], 9th conjugation) and of reduplicate stems is elided. From @deva[श्ना]: @deva[लुनते], @deva[लुनताम्], @deva[अलुनत]. From reduplicates: @deva[मिमते], @deva[मिमताम्], @deva[अमिमत], @deva[संजिहते], @deva[संजिहताम्], @deva[समजिहत]. The restriction to @deva[श्ना] and reduplicates excludes forms like @deva[यान्ति], @deva[वान्ति]. The restriction to long @deva[आ] excludes @deva[बिभ्रति]. Before non-@deva[कित्]/non-@deva[ङित्] affixes, @deva[आ] is retained: @deva[अलुनात्], @deva[अजहात्].
"""

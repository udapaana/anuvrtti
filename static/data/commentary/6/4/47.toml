id = "6.4.47"
numericId = "64047"

[en]
simple = """
When followed by an @deva[आर्धधातुक] @deva[प्रत्यय], @deva[रेफ] and the @deva[उपधावर्ण] of the the verb root gets the '@deva[रम्]' @deva[आगम].
"""

standard = """
Special perfect forms. @deva[जग्राह].
"""

advanced = """
@deva[रम्] optionally replaces @deva[र्] and the @deva[उपधा] @deva[स्] of root @deva[भ्रस्ज] before an @deva[आर्धधातुक] affix. Both @deva[र्] and @deva[स्] are superseded, and the substitute, bearing indicatory @deva[म्], is placed after the final vowel by @ref[1.1.49]. Derivation: @deva[भ्रस्ज] + @deva[तृ] = @deva[भर्ज्] + @deva[तृ] = @deva[भर्ष्टा] (with @deva[ज] → @deva[ष] by @ref[8.2.36] and @deva[त] → @deva[ट] by @ref[8.4.41]). The alternative form is @deva[भ्रष्टा]. Similarly @deva[भर्ष्टुम्] / @deva[भ्रष्टुम्], @deva[भर्ष्टव्यम्] / @deva[भ्रष्टव्यम्], @deva[भ्रज्जनम्] / @deva[भर्ज्जनम्]. However, @deva[भृष्टः] and @deva[भृष्टवान्] follow @ref[6.1.16] despite this rule. The word @deva[उपदेश] from @ref[6.4.37] carries forward, so the rule applies only to root @deva[भ्रस्ज] as listed in the @deva[धातुपाठ], not to derivative stems — the Intensive (@deva[यङ्]) form is @deva[बरीभृज्यते].
"""

id = "6.4.72"
numericId = "64072"

[en]
simple = """
For the @deva[लुङ्लकार], @deva[लङ्लकार] and @deva[लृङ्लकार], an @deva[अजादि] @deva[अङ्ग] gets an @deva[आट्-आगम], which is also @deva[उदात्त].
"""

standard = """
@deva[आट्] augments vowel-initial verbal stem. @deva[ऐक्षिष्ट], @deva[औव्जीत्].
"""

advanced = """
The @deva[उदात्त]-accented augment @deva[आट्] is prefixed to a vowel-initial verbal @deva[अङ्ग] in the aorist, imperfect, and conditional: @deva[ऐक्षिष्ट], @deva[ऐक्षत], @deva[ऐक्षिष्यत]; @deva[औव्जीत्], @deva[औव्जत्], @deva[औव्जिष्यत्]; @deva[ऐहिष्ट], @deva[ऐहत], @deva[ऐहिष्यत]; @deva[औम्भीत्], @deva[औम्भत्], @deva[औम्भिष्यत्]. The @[vṛddhi] results from @ref[6.1.90]. The passive imperfect (@deva[लङ्]) of @deva[यज्], @deva[वप्], and @deva[वह] takes @deva[आट्] (not @deva[अट्]): @deva[ऐज्यत], @deva[औप्यत], @deva[औह्यत]. The derivation proceeds as follows: imperfect affixes are added first, then @deva[यक्] (passive marker) is appended, causing semivowel vocalization — @deva[इज्यत], @deva[उप्यत], @deva[उह्यत] (@ref[6.1.15]). The stems now begin with a vowel and therefore take @deva[आट्]. Tense-affix addition, being @[antaraṅga], precedes the augment; @deva[यक्], being @[nitya], takes precedence over the augment, which is @[anitya]. The @[anitya] status of @deva[आट्] follows from the maxim: @deva[शब्दान्तरस्य] @deva[प्राप्नुवन्] @deva[विधिरनित्यो] @deva[भवति] — "a rule whose target word-form would change due to another simultaneously applicable rule is @[anitya]."
"""

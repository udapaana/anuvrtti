id = "6.4.113"
numericId = "64113"

[en]
simple = """
The @deva[आकार] of the @deva[विकरण] @deva[श्ना] and also of an @deva[अभ्यस्त] is converted to @deva[ई] when followed by a @deva[हलादि] @deva[सार्वधातुक] @deva[कित्] and @deva[ङित्] @deva[प्रत्यय]. But this does not happen for the verb roots that get the term '@deva[घु]'.
"""

standard = """
@deva[आ] of @deva[श्ना]/reduplicate → @deva[ई] before consonant-initial @[sārvadhātuka] @deva[क्]/@deva[ङित्] (not @deva[घु]). @deva[लुनीते], @deva[मिमीते]. But: @deva[दत्तः].
"""

advanced = """
Before a consonant-initial @deva[सार्वधातुक] @deva[कित्] or @deva[ङित्] affix, the @deva[आ] of @deva[श्ना] (the @deva[विकरण] of the @deva[क्र्यादिगणः], 9th conjugation) and of reduplicate stems is replaced by @deva[ई], except when the root is a @deva[घु] verb (@deva[दा], @deva[धा]). From @deva[श्ना]: @deva[लुनीतः], @deva[पुनीतः], @deva[लुनीथः], @deva[पुनीथः], @deva[लुनीते], @deva[पुनीते]. From reduplicates: @deva[मिमीते], @deva[मिमीषे], @deva[मिमीध्वे], @deva[संजिहीते], @deva[संजिहीषे], @deva[संजिहीध्वे]. Before vowel-initial affixes, @deva[आ] is elided instead (by @ref[6.4.112]): @deva[लुनन्ति], @deva[मिमते]. The @deva[घु] exception yields: @deva[दत्तः], @deva[धत्तः]. Before non-@deva[कित्]/non-@deva[ङित्] affixes, @deva[आ] is retained: @deva[लुनाति], @deva[जहाति].
"""

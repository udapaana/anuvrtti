id = "6.4.138"
numericId = "64138"

[en]
simple = """
The @deva[अकार] of the word @deva[अच्] that occurs at end of a @deva[भसंज्ञक] @deva[अङ्ग] is omitted if this '@deva[अच्]' happens to be derived from the @deva[धातु] @deva[अञ्च्] (@deva[गतौ]).
"""

standard = """
@deva[अञ्च्] @deva[अ] elided when @deva[भ]. @deva[दधीचः], @deva[मधूचा].
"""

advanced = """
The @deva[अ] of @deva[अच्] (from @deva[अञ्च्]) is elided when the stem is @deva[भ]. Examples: @deva[दधीचः] @deva[पश्य], @deva[दधीचा], @deva[दधीचे]; @deva[मधूचः] @deva[पश्य], @deva[मधूचा], @deva[मधूचे]. The lengthening of the first compound member occurs by @ref[6.3.138]; @deva[न्] of @deva[अञ्च] is elided by @ref[6.4.24].
"""

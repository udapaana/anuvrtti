id = "6.4.3"
numericId = "64003"

[en]
simple = """
In presence of the @deva[नाम्] @deva[प्रत्यय], the last letter of the @deva[अङ्ग] becomes @deva[दीर्घ].
"""

standard = """
Final lengthened before genitive plural @deva[नाम्]. @deva[अग्नीनाम्], @deva[वायूनाम्], @deva[कर्तॄणाम्].
"""

advanced = """
The @deva[दीर्घ] substitute replaces the final vowel of the @deva[अङ्ग] before the genitive plural affix @deva[नाम्] (i.e., @deva[आम्] with the augment @deva[नुट्]). @[kārikā]: @deva[नामि] @deva[दीर्घ] @deva[आमि] @deva[चेत्स्यात्कृते] @deva[दीर्घे] @deva[नुत्] @deva[भवेत्] @deva[।] @deva[वचनाद्यत्र] @deva[तन्नास्ति], @deva[नोपधायाश्च] @deva[चर्म्मणाम्]. Examples: @deva[अग्नीनाम्], @deva[वायूनाम्], @deva[कत्तॄणाम्], @deva[हर्त्तॄणाम्]. The @deva[अनुवृत्ति] of @deva[अण्] from @ref[6.3.111] ceases here. The augment @deva[नुट्] (@ref[7.1.54]) in @deva[नाम्] is relevant for subsequent rules such as @ref[6.4.7], and the lengthening occurs after @deva[नुट्] has been added to the genitive affix @deva[आम्] — if lengthening applied first, @deva[नुट्] would have no occasion to attach, since it is conditioned on short-vowel stems.
"""

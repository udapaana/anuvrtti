id = "6.4.28"
numericId = "64028"

[en]
simple = """
In the @deva[यङ्लुक्] (Intensive without @deva[य]), a @deva[य] that was added for the Intensive is later elided. For example, from the Intensive stem @deva[बोभू] of @deva[भू], the @deva[य] (part of @deva[यङ्]) is elided before certain endings.
"""

standard = """
In @deva[यङ्लुक्] formation, the @deva[य] of the Intensive affix @deva[यङ्] is elided. This rule also governs the word @deva[स्यद्] ('speed'), derived from @deva[स्यन्द] via @deva[घञ्] with nasal elision and @deva[वृद्धि]. The elision of @deva[य] in the Intensive stem is what allows direct personal endings to attach to the reduplicated base. See @ref[6.4.28].
"""

advanced = """
The word @deva[स्यद्] is formed from @deva[स्यन्द्] + @deva[घञ्] in the sense of 'speed'. The nasal is elided and @deva[वृद्धि] is irregularly blocked. Although the @deva[आर्धधातुक] affix @deva[घञ्] causes elision of part of the root (@deva[न्] of @deva[स्यन्द्]), @ref[1.1.4] does not apply here — that rule prohibits @deva[गुण]/@deva[वृद्धि] only for @deva[इक्] vowels, whereas the blocked @deva[वृद्धि] concerns @deva[अ]. The prevention is an irregularity not governed by @ref[1.1.4]. Examples: @deva[गोस्यदः], @deva[अश्वस्यदः] ('cow-speed', 'horse-speed'). When the nasal is retained: @deva[तैलस्यन्दः] and @deva[घृतस्यन्दः] ('dripping of oil or ghee').
"""

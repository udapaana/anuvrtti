id = "6.4.59"
numericId = "64059"

[en]
simple = """
The short @deva[इ] of root @deva[क्षि] ('to waste, diminish') becomes long @deva[ई] before the absolutive suffix @deva[ल्यप्]. This applies in classical Sanskrit without restriction. Example: @deva[प्र + क्षि + ल्यप्] → @deva[प्रक्षीय] ('having wasted away').
"""

standard = """
This rule extends the vowel-lengthening pattern to root @deva[क्षि]: its @deva[इ] is replaced by long @deva[ई] before absolutive @deva[ल्यप्]. The environment is straightforward: no additional conditions on the preceding consonant or semantics. Examples: @deva[प्रक्षीय], @deva[उपक्षीय] 'having diminished'. Related lengthening before @deva[क्त] is treated separately in @ref[6.4.60].
"""

advanced = """
A long is substituted for the @deva[इ] of @deva[क्षि] before the Absolutive affix @deva[ल्यप्]@deva[।] As @deva[प्रक्षीय], @deva[उपक्षीय] @deva[॥]
"""

id = "6.4.106"
numericId = "64106"

[en]
simple = """
The '@deva[हि]' @deva[प्रत्यय] that follows an @deva[उकार] is deleted, provided - a) The @deva[उकार] occurs at end of a @deva[प्रत्यय], and b) A @deva[संयोग] is not present immediately before this @deva[उकार].
"""

standard = """
@deva[हि] elided after @deva[विकरण] @deva[उ] without preceding conjunct. @deva[चिनु], @deva[कुरु]. But: @deva[प्राप्नुहि].
"""

advanced = """
The Imperative affix @deva[हि] is elided after the @deva[उ] of a @deva[विकरण] (@deva[उ] or @deva[श्नु]) used in forming the present stem, provided @deva[उ] is not preceded by a conjunct consonant. Examples: @deva[चिनु], @deva[सुनु], @deva[कुरु]. The @deva[उ] must belong to the @[vikaraṇa], not the root — hence @deva[रुहि] and @deva[युहि] (where @deva[उ] is part of the root) retain @deva[हि]. After a different vowel: @deva[लुनीहि], @deva[सुनीहि]. When @deva[उ] is preceded by a conjunct consonant, @deva[हि] is retained: @deva[प्राप्नुहि], @deva[राध्नुहि], @deva[तक्ष्णुहि]. @[vārtika]: the elision of @deva[हि] after @deva[उ] of @deva[उ]/@deva[श्नु] is optional in Vedic usage: @deva[आतनुहि] @deva[यातुधानान्], @deva[धिनुहि] @deva[यज्ञपतिम्], @deva[तेन] @deva[मा] @deva[भागिनं] @deva[कृणुहि].
"""

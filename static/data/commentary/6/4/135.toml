id = "6.4.135"
numericId = "64135"

[en]
simple = """
The @deva[उपधा-अकार] of a @deva[भसंज्ञकस्य] @deva[अङ्ग] is omitted in presence of an @deva[अण्-प्रत्यय], if the @deva[अङ्ग] ends in one of (1) @deva[षन्], (2) @deva[हन्] or (3) @deva[धृतराजन्] .
"""

standard = """
@deva[ष]-preceded @deva[अन्] and @deva[हन्]/@deva[धृतराजन्]: @deva[अ] elided before @deva[अण्]. @deva[औक्ष्णः], @deva[भ्रौणघ्नः].
"""

advanced = """
The @deva[अ] of the @deva[भ] stem is elided before the affix @deva[अण्] when the stem ends in @deva[अन्] preceded by @deva[ष], or is @deva[हन्] or @deva[धृतराजन्]. Examples: @deva[औक्ष्णः], @deva[ताक्ष्णः], @deva[भ्रौनघ्नः], @deva[धार्तराज्ञः]. Without @deva[ष] preceding: @deva[सामनः], @deva[वैमन] (no elision). The restriction to @deva[अण्] is significant: before other affixes, @deva[अ] is retained — @deva[ताक्षण्यः]. The restriction to @deva[ष]-preceded stems excludes @deva[सामन्] and @deva[विमन्] (→ @deva[सामनः], @deva[वैमनः] with @deva[अण्]), where @ref[6.4.167] keeps the stems unchanged.
"""

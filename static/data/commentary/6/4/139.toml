id = "6.4.139"
numericId = "64139"

[en]
simple = """
If the word @deva[अच्] - (1) happens to be derived from the @deva[धातु] @deva[अञ्च्] (@deva[गतौ]) , (2) follows the word @deva[उद्], and (3) gets the @deva[भसंज्ञा], then the @deva[अकार] of @deva[अच्] is converted to @deva[ईकार].
"""

standard = """
@deva[उत्] + @deva[अञ्च्]: @deva[अ] → @deva[ई] when @deva[भ]. @deva[उदीचः], @deva[उदीचा].
"""

advanced = """
The long @deva[ई] is substituted for the @deva[अ] of @deva[अच्] (@deva[अञ्च्] ) after the word @deva[उत्] when the @deva[अङ्ग] (stem) is @deva[भ]@deva[।] As @deva[उदीचः], @deva[उदीचा], @deva[उदीचे] @deva[॥]
"""

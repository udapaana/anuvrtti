id = "6.4.153"
numericId = "64153"

[en]
simple = """
For stems in the @deva[बिल्वकादि] group ("@deva[बिल्वक] etc."), the @deva[तद्धित] affix @deva[छ] is dropped when the stem is in the @deva[भ] position and another @deva[तद्धित] affix follows. So @deva[बिल्वकीयाः] (with @deva[छ]) becomes @deva[बैल्वकाः] (with @deva[छ] elided but the augment @deva[क] retained). Note that only @deva[छ] is dropped, not the @deva[क] augment.
"""

standard = """
In @deva[भ]-position @deva[अङ्ग] stems belonging to the @deva[बिल्वकादि] list, the @deva[तद्धित] affix @deva[छ] (which appears as @deva[ईय] after the stem) is elided before a subsequent @deva[तद्धित] affix. The elision targets only @deva[छ] itself; the augment @deva[क] that was added to the base remains. Thus @deva[बिल्वक] + @deva[छ] gives intermediate @deva[बिल्वकीयाः], but before another @deva[तद्धित] affix the @deva[छ] is elided: @deva[बैल्वकाः]. The retention of @deva[क] distinguishes this elision from full suffix-drop and is critical for correct derivation.
"""

advanced = """
The affix @deva[छ] of the @deva[भ] stems in the @deva[बिल्वकादि] group is elided before a @deva[तद्धित] affix. The @deva[बिल्व] etc. are a subdivision of the @[nadādi] class (by @ref[4.2.91]), and augment @deva[क] is added to them by @ref[4.2.91]. With @deva[क], the affix @deva[छ] is elided. Derivation: @deva[बिल्वा] @deva[यस्यां] @deva[सन्ति] = @deva[बिल्वकीयाः]; @deva[तस्यां] @deva[भवाः] (by @ref[4.3.53]) = @deva[बैल्वकाः]. Similarly: @deva[वेणुकीयाः] → @deva[वैणुकाः], @deva[वैत्रकीयाः] → @deva[वैत्रकाः], @deva[वेतसकीयाः] → @deva[वैतसकाः], @deva[तृणकीयाः] → @deva[तार्णकाः], @deva[इक्षुकीयाः] → @deva[ऐक्षुकाः], @deva[काष्ठकीयाः] → @deva[काष्ठकाः], @deva[कपोतकीयाः] → @deva[कापोतकाः]. For @deva[क्रुंचा], the final is shortened by the @[vārtika] @deva[क्रुञ्चा] @deva[ह्रस्वत्वं] @deva[च]: @deva[क्रुञ्चकीयाः] → @deva[क्रौञ्चकाः]. The specific mention of @deva[छ] ensures that only the affix is elided, not the augment @deva[क] — otherwise @deva[क] would also have been lost by the maxim @deva[संनियोगशिष्टानामन्यतरापाये] @deva[उभयोरप्यभावः] ("when one of two jointly taught items disappears, both disappear"). The use of @deva[लुक्] indicates elision of the entire affix @deva[ईय], not merely @deva[य].
"""

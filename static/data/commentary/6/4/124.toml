id = "6.4.124"
numericId = "64124"

[en]
simple = """
Three roots — @deva[जर्] (@deva[जॄ], "to age"), @deva[भ्रम्] ("to wander"), and @deva[त्रस्] ("to tremble") — optionally change @deva[अ] to @deva[ए] in the Perfect tense (@deva[लिट्]), with the reduplicated syllable optionally dropped. The change is optional, so both forms are correct: @deva[जेरतुः] or @deva[जजरतुः] ("the two aged"), @deva[भ्रेमतुः] or @deva[बभ्रमतुः], @deva[त्रेसतुः] or @deva[तत्रसतुः]. The choice is up to the speaker.
"""

standard = """
For the three roots @deva[जर्] (@deva[जॄ]), @deva[भ्रम्], and @deva[त्रस्], the substitution of @deva[ए] for @deva[अ] and elision of the @deva[अभ्यास] before @deva[क्]- or @deva[ङ्]-marked @deva[लिट्] affixes is optional (@deva[वा]). When the substitution applies: @deva[जेरतुः], @deva[भ्रेमतुः], @deva[त्रेसतुः]. When it does not apply, normal reduplication is retained: @deva[जजरतुः], @deva[बभ्रमतुः], @deva[तत्रसतुः]. This optionality distinguishes these roots from those treated mandatorily in the preceding rules.
"""

advanced = """
@deva[ए] optionally replaces @deva[अ] in the roots @deva[जर्] (@deva[जॄ]), @deva[भ्रम], and @deva[त्रस्], with simultaneous @[abhyāsa]-elision, before @deva[कित्]/@deva[ङित्] @deva[लिट्] affixes. With @deva[ए]-substitution: @deva[जेरतुः], @deva[जेरुः], @deva[जेरिथ]; @deva[भ्रेमतुः], @deva[भ्रेमुः], @deva[भ्रेमिथ]; @deva[त्रेसतुः], @deva[त्रेसुः], @deva[त्रेसिथ]. Without: @deva[जजरतुः], @deva[अजरुः], @deva[जजरिथ]; @deva[बभ्रमतुः], @deva[बभ्रमुः], @deva[बभ्रमिथ]; @deva[तत्रसतुः], @deva[तत्रसुः], @deva[तत्रसिथ].
"""

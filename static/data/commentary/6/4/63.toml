id = "6.4.63"
numericId = "64063"

[en]
simple = """
The root @deva[दीङ्] ('to decay') receives the augment @deva[युट्] before an @deva[आर्धधातुक] affix that begins with a vowel and bears indicatory @deva[क्] or @deva[ङ्]. This @deva[युट्] is inserted between the reduplicated stem and the affix. Example: @deva[उप + दीङ्] in perfect @[ātmanepada] → @deva[उपदिदीये], @deva[उपदिदीयाते], @deva[उपदिदीयिरे].
"""

standard = """
The augment @deva[युट्] is added to the stem of @deva[दीङ्] before @deva[आर्धधातुक] affixes that are both vowel-initial and carry indicatory @deva[क्] or @deva[ङ्] (the @[kit/ṅit] markers). The @deva[युट्] prevents hiatus and supplies the @deva[य] seen in perfect @[ātmanepada] forms. Without this augment, forms like @deva[उपदिदीए] would be expected — unacceptable by phonological convention. The correct paradigm: @deva[उपदिदीये] (1sg), @deva[उपदिदीयाते] (3du), @deva[उपदिदीयिरे] (3pl).
"""

advanced = """
@deva[युट्] augments the stem of @deva[दीङ्] before an @deva[आर्धधातुक] affix that begins with a vowel and bears indicatory @deva[क्] or @deva[ङ्]: @deva[उपदिदीये], @deva[उपदिदीयाते], @deva[उपदिदीयिरे]. The personal ending is @deva[कित्] by @ref[1.2.5]. Since @deva[दीङः] is in the ablative, the augment attaches to the affix. This augment must not be treated as @[asiddha] (@ref[6.4.22]) for the purposes of semi-vowel substitution under @ref[6.4.82] — if that substitution were permitted, the augment would serve no purpose. The @deva[कित्]/@deva[ङित्] restriction accounts for forms like @deva[उपदानम्], where no @deva[युट्] is added.
"""

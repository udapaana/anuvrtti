id = "6.4.34"
numericId = "64034"

[en]
simple = """
For the root @deva[शास्] ('to instruct'), the vowel @deva[आ] is replaced by @deva[ई] before the @deva[अङ्]-Aorist and before affixes marked @deva[क्] or @deva[ङ्]. For example, @deva[अन्वशिषत्] (Aorist) and @deva[शिष्टः] (past passive participle with @deva[क्त]).
"""

standard = """
The rule substitutes @deva[ई] for the vowel of @deva[शास्] in two environments: before the @deva[अङ्]-Aorist, and before @deva[आर्धधातुक] affixes beginning with a consonant marked @deva[क्] or @deva[ङ्]. Thus @deva[शास्] → @deva[शिस्] before @deva[क्त] → @deva[शिष्टः] (via @deva[ष्टुत्व]); and @deva[अन्वशिषत्] in the Aorist. The rule is restricted by @deva[झलादि]-condition. See @ref[6.4.34].
"""

advanced = """
Before the @deva[अङ्]-aorist and before @deva[झलादि] affixes marked @deva[कित्] or @deva[ङित्], @deva[ई] substitutes for the vowel of @deva[शास्]. @deva[अङ्]-aorist: @deva[अन्वशिषत्], @deva[अन्वशिषताम्], @deva[अन्वशिषन्]. @deva[कित्]/@deva[ङित्] affixes: @deva[शिष्टः] (with @deva[क्त]), @deva[शिष्टवान्] (with @deva[क्तवतु]), @deva[तौ] @deva[शिष्टः], @deva[वयं] @deva[शिष्मः] (with tense-affixes @deva[तः] and @deva[मः], which are @deva[ङित्] by @ref[1.2.4]). The @deva[स] changes to @deva[ष] by @ref[8.3.60]. The restriction to @deva[अङ्]-aorist and consonant-initial affixes excludes present and perfect forms: @deva[शासति], @deva[शशासतु], @deva[शशासुः]. @[vārttika]: @deva[इ] substitutes for the vowel of @deva[शास्] before @deva[क्वि]: @deva[आर्यशीः] (= @deva[आर्यान्] @deva[शास्ति]), @deva[मित्रशीः]. Derivation: @deva[शास्] + @deva[क्वि] = @deva[शिस्] = @deva[शिर] = @deva[शीः] (short @deva[इ] lengthened by @ref[8.2.76]). The @deva[शास्] in question is the second @deva[अदादि] root (@deva[शासु] @deva[अनुशिष्टौ]), which takes the @deva[अङ्]-aorist — not the @deva[भ्वादि] or the first @deva[अदादि] @deva[शास] (@deva[आङ] @deva[शासु] @deva[इच्छायाम्]); hence not @deva[आशास्ते] or @deva[आशास्यमानः]. @[vārttika]: Before @deva[क्विप्], however, even the latter @deva[शास्] undergoes the change: @deva[आशीः], @deva[आशिषौ], @deva[आशिषः]. Alternatively, this is an irregular form indicated by the author through @deva[क्षियाशीः] in @ref[8.2.104].
"""

id = "6.4.92"
numericId = "64092"

[en]
simple = """
The @deva[उपधा] letter of a @deva[मित्संज्ञक] @deva[अङ्ग] becomes @deva[ह्रस्व] when followed by the @deva[णिच्] @deva[प्रत्यय].
"""

standard = """
@deva[मित्] roots retain short penultimate before @deva[णि]. @deva[घटयति], @deva[शमयति], @deva[ज्ञपयति].
"""

advanced = """
Roots bearing indicatory @deva[म्] (@deva[मित्]) retain their penultimate vowel as short before the causative @deva[णि]. The @deva[मित्] roots comprise the @deva[घटादि] subdivision of @deva[भ्वादि] (800–873) and all roots ending in @deva[अम्] such as @deva[शम्] and @deva[तम्] of the @deva[दिवादि] class: @deva[घटयति], @deva[व्यथयति], @deva[जनयति], @deva[रजयति], @deva[शमयति], @deva[ज्ञपयति]. Some grammarians read the @deva[अनुवृत्ति] of "optionally" from the preceding @[sūtra] into this one, making it a @[vyavasthita]-@[vibhāṣā] (limited option). This accounts for forms like @deva[उत्क्रामयति] and @deva[संक्रामयति].
"""

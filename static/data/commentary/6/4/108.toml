id = "6.4.108"
numericId = "64108"

[en]
simple = """
The @deva[उकार] occurring at end of a @deva[प्रत्यय] that is attached to the verb root @deva[कृ] is removed when followed by a @deva[मकार] or a @deva[वकार].
"""

standard = """
@deva[उ] elision obligatory in @deva[कृ] before @deva[म्]/@deva[व्]. @deva[कुर्वः], @deva[कुर्मः].
"""

advanced = """
The elision of @deva[उ] before @deva[व्] and @deva[म्] is obligatory for @deva[कृ] ("to make," @deva[करोति]). Forms: @deva[कुर्वः] and @deva[कुर्मः]. Derivation: @deva[कृ] + @deva[उ] + @deva[व] → @deva[कुर्] + @deva[उ] + @deva[वः] (by @ref[6.4.110]) → @deva[कुर्] + @deva[०] + @deva[वः] (by @ref[6.4.108]). Since the @[lopa] is not @[sthānivat] when a vowel is to be lengthened (@ref[1.1.58]), @deva[उ] of @deva[कु] would ordinarily be lengthened by @ref[8.2.77]; this contingency is prevented by @ref[8.2.79].
"""

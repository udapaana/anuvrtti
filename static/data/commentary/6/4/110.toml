id = "6.4.110"
numericId = "64110"

[en]
simple = """
If an @deva[अङ्ग] of verb root @deva[कृ] ends in an @deva[उकारान्त] @deva[प्रत्यय], then the @deva[अकार] of that @deva[अङ्ग] is converted to @deva[उकार] when followed by a @deva[कित्] / @deva[ङित्] @deva[प्रत्यय].
"""

standard = """
Short @deva[उ] for @[guṇated] @deva[कृ] + @deva[उ] before @[sārvadhātuka] @deva[क्]/@deva[ङित्]. @deva[कुरुतः], @deva[कुर्वन्ति].
"""

advanced = """
Before a @deva[सार्वधातुक] affix with indicatory @deva[क्] or @deva[ङ्], short @deva[उ] replaces the @deva[अ] of @deva[गुण]-ated @deva[कृ] ("to make," @deva[कर्] + @deva[उ]). Derivation: @deva[कृ] + @deva[उ] + @deva[तस्] → @deva[कर्] + @deva[उ] + @deva[तस्] (by @ref[7.3.84]) → @deva[कुर्] + @deva[उ] + @deva[तस्] → @deva[कुरुतः] (by @ref[6.4.110]); @deva[तस्] is @deva[ङित्] by @ref[1.2.4]. Similarly @deva[कुर्वन्ति] and @deva[कुरु]. The condition "before a @[sārvadhātuka]" allows the rule to apply even when the @[sārvadhātuka] affix has been elided but its effect persists — as in @deva[कुरु], where @deva[हि] is elided but its presence is still operative. The @deva[त्] in @deva[उत्] (the @[pratyāhāra] form) indicates that this @deva[उ] is not subject to @[guṇa] by @ref[7.3.86]. When the affix is not @deva[कित्] or @deva[ङित्]: @deva[करोति], @deva[करोषि], @deva[करोमि] (by @ref[1.2.4]).
"""

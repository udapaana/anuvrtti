id = "6.4.103"
numericId = "64103"

[en]
simple = """
In Vedic texts, the Imperative ending @deva[हि] is replaced by @deva[धि] when it carries the marker @deva[पित्] (making it non-@deva[ङित्]). For example, from the root @deva[रन्ध्] we get @deva[रारन्धि] ("constrain!") and from @deva[युध्] we get @deva[युयोधि] ("fight!"). When @deva[हि] is @deva[ङित्], this replacement does not apply, as in @deva[प्रीणीहि] ("please!").
"""

standard = """
By this rule, @deva[धि] replaces the second-person singular Imperative @deva[लोट्] affix @deva[हि] when that affix is @deva[पित्] and therefore not @deva[ङित्] (by @ref[1.2.4]). The condition @deva[पित्] arises in Vedic usage under @ref[3.4.88]. The substitution yields forms like @deva[रारन्धि] (from @deva[रन्ध्]), @deva[यन्धि] (from @deva[यन्ध्]), and @deva[युयोधि] (from @deva[युध्]). The conditioning environment is thus: Vedic @deva[लोट्] second singular, affix carrying @deva[पित्], which by @ref[1.2.4] is not @deva[ङित्]. When @deva[हि] is @deva[ङित्] (as in @deva[प्रीणीहि]), the rule does not apply.
"""

advanced = """
@deva[धि] replaces the Imperative affix @deva[हि] when the tense-affix is not @deva[ङित्]. Under @ref[3.4.88], @deva[हि] is also @deva[पित्] in the Vedas, and when @deva[पित्], it is not @deva[ङित्] by @ref[1.2.4]. Examples: @deva[रारन्धि], @deva[यन्धि], and @deva[युयोधि], attested in @deva[सोमरारन्धि] @deva[अस्मभ्यं] @deva[तद्धर्यश्व] @deva[प्रयन्धि], @deva[युयोध्यस्मज्] @deva[जुहुराणमेनः]. When the affix is @deva[ङित्], the substitution is blocked: @deva[प्रीणीहि]. @deva[रारन्धि] is an irregular @[parasmaipadī] form of @deva[रम्] — @deva[शप्] is replaced by @deva[श्लु], and the reduplicate is lengthened as a Vedic form; @deva[म्] is not elided by @ref[6.4.37] since the affix is not @deva[ङित्]. @deva[प्रयन्धि] derives from @deva[यम] with @deva[शप्] elided. @deva[युयोधि] derives from @deva[यु] (@deva[यौति]) with @deva[शप्] replaced by @deva[श्लु].
"""

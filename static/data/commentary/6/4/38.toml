id = "6.4.38"
numericId = "64038"

[en]
simple = """
Before the suffix @deva[क्विप्], the root @deva[हन्] ('to strike/kill') changes its form so that @deva[हत] becomes @deva[घ्न]. This gives compounds like @deva[गोघ्नः] ('cow-killer') and @deva[ब्रह्मघ्नः] ('brahmin-killer').
"""

standard = """
Roots marked @deva[अनुदात्त] that end in a nasal, along with @deva[वन] and the @deva[तनादि] group, optionally elide their nasal before the @deva[ल्यप्] absolutive affix. This is @[vyavasthita-vibhāṣā]: the option is fixed to only @deva[म्]-final roots, while other nasal-final roots always elide. For @deva[हन्], the special substitution produces @deva[घ्न] in compounds. See @ref[6.4.38].
"""

advanced = """
The nasal of the above roots (@deva[अनुदात्तोपदेश] nasal-final, @deva[वन्], and @deva[तनादि]) is optionally elided before the absolutive @deva[ल्यप्]. This is a @deva[व्यवस्थितविभाषा]: the option applies only to @deva[म्]-final roots; for roots ending in other nasals, elision is compulsory. With option: @deva[प्रयत्य] or @deva[प्रयम्य], @deva[प्ररत्य] or @deva[प्ररम्य], @deva[प्रणत्य] or @deva[प्रणम्य], @deva[आगत्य] or @deva[आगम्य]. Without option (compulsory elision): @deva[आहत्य], @deva[प्रमत्य], @deva[प्रवत्य], @deva[प्रक्षत्य].
"""

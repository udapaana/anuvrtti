id = "6.4.42"
numericId = "64042"

[en]
simple = """
The final consonants of @deva[जन्], @deva[सन्], and @deva[खन्] are replaced by long @deva[आ] before the Desiderative @deva[सन्] (when it begins with a consonant) and other @deva[झलादि] affixes marked @deva[क्] or @deva[ङ्]. For example, @deva[जन्] + @deva[क्त] → @deva[जातः].
"""

standard = """
For roots @deva[जन्], @deva[सन्], and @deva[खन्], long @deva[आ] substitutes for the root-final before @deva[झलादि] @deva[आर्धधातुक] affixes marked @deva[कित्] or @deva[ङित्], and before the consonant-initial Desiderative @deva[सन्]. Thus @deva[जन्] + @deva[क्त] → @deva[जातः]; @deva[जन्] + @deva[तुमुन्] → @deva[जातुम्] (if applicable). Note that this @deva[आ] is not merely lengthening but full substitution of the nasal. See @ref[6.4.42].
"""

advanced = """
Long @deva[आ] substitutes for the final nasal of @deva[जन्], @deva[सन्], and @deva[खन्] before the consonant-initial Desiderative @deva[सन्] and before any @deva[झलादि] affix marked @deva[कित्] or @deva[ङित्]. Examples: @deva[जातः], @deva[जातवान्], @deva[जातिः]; @deva[सातः], @deva[सातवान्], @deva[सातिः], @deva[सिषासति]; @deva[खातः], @deva[खातवान्], @deva[खातिः]. For @deva[जन्] and @deva[खन्], the Desiderative takes @deva[इट्] (ceasing to be consonant-initial), so the nasal is not replaced: @deva[जिजनिषति], @deva[चिखनिषति]. For @deva[सन्], the Desiderative optionally takes @deva[इट्] (@ref[7.2.49]), yielding two forms: @deva[सिषासति] (without @deva[इट्], @deva[आ]-substitution) and @deva[सिसनिषति] (with @deva[इट्]). The Desiderative is thus mentioned in the @deva[सूत्र] specifically for @deva[सन्]. The compound @deva[सन्झलोः] can be parsed two ways: (1) 'Desiderative beginning with a consonant' — then @deva[झलादि] @deva[कित्]/@deva[ङित्] from preceding @deva[सूत्र]s completes the sense; (2) 'Desiderative or @deva[झलादि] affix' — then @deva[झल्] from preceding rules qualifies the Desiderative. Alternatively, the @deva[सूत्र] divides into two: (a) before @deva[झलादि] @deva[कित्]/@deva[ङित्], long @deva[आ] replaces @deva[न्] of @deva[जन्]/@deva[सन्]/@deva[खन्]; (b) the same applies before the Desiderative without @deva[इट्]. The nasal of @deva[सन्] would otherwise be simply elided by @ref[6.4.37] (@deva[तनादि] class), but the @deva[आ]-substitution of this @deva[सूत्र] prevails by @deva[विप्रतिषेधे] @deva[परं] @deva[कार्यम्] (@ref[1.4.2]). Although within the @deva[असिद्ध] section (@ref[6.4.22]) one rule is @deva[असिद्ध] for another's operation, the @deva[विप्रतिषेध] maxim still determines which rule supersedes — as evidenced by @ref[6.4.66], where @deva[हल्] overrides the @deva[लोप] of @deva[आ] in @ref[6.4.64] and substitutes long @deva[ई] instead.
"""

id = "6.4.116"
numericId = "64116"

[en]
simple = """
The verb root '@deva[हा]' is converted to @deva[ह्रस्व-इकार] when followed by @deva[हलादि-सार्वधातुक] @deva[कित्]/@deva[ङित्-प्रत्यय].
"""

standard = """
@deva[आ] of @deva[हा] (@[juhotyādi]) optionally → @deva[इ] before consonant-initial @[sārvadhātuka] @deva[क्]/@deva[ङित्]. @deva[जहितः] or @deva[जहीतः].
"""

advanced = """
Short @deva[इ] optionally replaces the @deva[आ] of @deva[हा] (@deva[जुहोत्यादिगणः], 3rd conjugation) before a consonant-initial @deva[सार्वधातुक] @deva[कित्] or @deva[ङित्] affix. Forms: @deva[जहितः] or @deva[जहीतः] (by @ref[6.4.113]), @deva[जहिथः] or @deva[जहीथः] (by @ref[6.4.113]). Before a vowel-initial affix: @deva[जहति]. Before a non-@deva[ङित्] affix: @deva[जहाति]. Before an @[ārdhadhātuka] affix: @deva[हीयते], @deva[जिहीयते]. This rule is separated from the preceding one to serve as the basis for subsequent @[sūtra]s.
"""

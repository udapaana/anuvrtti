id = "6.4.14"
numericId = "64014"

[en]
simple = """
The @deva[उपधा] of the words ending in either @deva[मत्], @deva[वत्], or @deva[अस्] becomes @deva[दीर्घ] in presence of the @deva[सुँ-प्रत्यय] of @deva[प्रथमा] @deva[एकवचन], provided these words do not end in a @deva[धातु].
"""

standard = """
Penultimate lengthened in @deva[अतु]/@deva[अस्] (@[non-dhātu]) in nominative singular (not vocative). @deva[भवान्], @deva[गोमान्], @deva[सुयशाः].
"""

advanced = """
In nominative singular (excluding vocative singular), the @deva[उपधा] vowel is lengthened in @deva[अङ्ग]s ending in @deva[अतु] and @deva[अस्], provided the @deva[अस्] does not belong to a @deva[धातु]. For @deva[अतु]-stems: @deva[भवान्] (with @deva[डवतुप्], @deva[उणादि] 1.63, from @deva[भा] 'to shine'), @deva[कृतवान्] (with @deva[क्तवतु]); @deva[गोमान्] and @deva[यवमान्] (with @deva[मतुप्]). The @deva[नुम्] augment (@deva[न्]) is added by @ref[7.1.70] after lengthening — if added before, the vowel would no longer be penultimate and could not undergo @deva[दीर्घ]. For @deva[अस्]-stems: @deva[सुपयाः], @deva[सुयशाः], @deva[सुश्रोताः]. The condition 'not belonging to a @deva[धातु]' excludes @deva[पिण्डग्रः] (where @deva[स्] belongs to root @deva[ग्रस्] — @deva[पिण्डं] @deva[ग्रसते]) and @deva[चर्मवः] (@deva[चर्म] @deva[वस्ते]). Non-meaningful @deva[अस्] is also included, by the maxim: @deva[अनिनस्मन्] @deva[ग्रहानि] @deva[अर्थवता] @deva[चानर्थकेन] @deva[च] @deva[तदन्तविधिं] @deva[प्रयोजयन्ति] — when @deva[अम्], @deva[इन्], @deva[अस्], or @deva[मन्] are employed in grammatical rules (@ref[1.1.72]), they denote items ending in these sequences whether meaningful or not. The term @deva[अतु]-final covers both forms as originally stated (@deva[उपदेश]) — @deva[डवतु], @deva[क्तवतु] — and forms that assume @deva[अतु] shape in application, such as @deva[मतुप्] (stated as @deva[अतुप्] in @deva[उपदेश] but becoming @deva[अतु] in @deva[प्रयोग]). In vocative singular, the rule does not apply: @deva[हे] @deva[गोमन्], @deva[हे] @deva[सुपयः].
"""

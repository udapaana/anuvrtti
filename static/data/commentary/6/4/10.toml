id = "6.4.10"
numericId = "64010"

[en]
simple = """
The @deva[स्वर] preceding the @deva[नकार] from (a) @deva[महत्] and (b) any word that ends in @deva[न्स्] - becomes @deva[दीर्घ] in presence of @deva[प्रत्यय] that is also a @deva[सर्वनामस्थान], other than @deva[सम्बोधन-एकवचन].
"""

standard = """
Penultimate lengthened in @deva[नंस्]/@deva[महत्] in strong cases (not vocative). @deva[श्रेयान्], @deva[महान्]. But: @deva[हे] @deva[श्रेयन्].
"""

advanced = """
Before @deva[सर्वनामस्थान] affixes (excluding vocative singular), the @deva[उपधा] vowel is lengthened in stems ending in @deva[न्स्] (nasal + @deva[स्]) and in @deva[महत्]. A @deva[न्स्]-final stem lengthens its penultimate before the first five case affixes: @deva[श्रेयान्], @deva[श्रेयांसौ], @deva[श्रेयांसः], @deva[श्रेयांसि], @deva[पयांसि], @deva[यशांसि]. For @deva[महत्]: @deva[महान्], @deva[महान्तौ], @deva[महान्तः]. In vocative singular: @deva[हे] @deva[श्रेयन्], @deva[हे] @deva[महन्]. The nasal is inserted by @ref[7.1.70].
"""

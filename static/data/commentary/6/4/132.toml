id = "6.4.132"
numericId = "64132"

[en]
simple = """
@deva[भसंज्ञक] @deva[वाह्] is converted to '@deva[ऊठ्]' by @deva[सम्प्रसारणम्].
"""

standard = """
Compound @deva[वाह्]: @deva[व] → @deva[ऊठ्] when @deva[भ]. @deva[प्रष्ठौहः].
"""

advanced = """
The @deva[व] of @deva[वाह्] undergoes @[samprasāraṇa] to @deva[ऊ] (@deva[ऊठ्]) when the compound stem is @deva[भ]. The stem @deva[वाह्] is formed by @deva[ण्वि] (by @ref[3.2.64]) and cannot stand alone — it must be preceded by an @[upapada], hence only compound forms arise. Examples: @deva[प्रष्ठौहः], @deva[प्रष्ठौहा], @deva[प्रष्ठौहे]; @deva[दित्यौहः], @deva[दित्यौहा], @deva[दित्यौहे]. By @ref[6.1.108], @deva[ऊ] + @deva[आ] (of @deva[वा]) = @deva[ऊ]; then @deva[प्रष्ठ] + @deva[उह्] → @deva[प्रष्ठौहः] (with @[vṛddhi] by @ref[6.1.89]). The same form could be derived by simple @[samprasāraṇa]: @deva[प्रष्ठ] + @deva[वह्] + @deva[शस्] → @deva[प्रष्ठ] + @deva[उह्] + @deva[अस्] (by @ref[6.1.108]) → @deva[प्रष्ठ] + @deva[ओह्] + @deva[अस्] (@[guṇa] by @deva[ण्वि], @ref[3.2.64]) → @deva[प्रष्ठौहः] (by @ref[6.1.88]). Since @deva[ण्वि] is added to @deva[वह्] only when the preceding member ends in @deva[अ], @deva[अ] + @deva[ओ] always yields @deva[औ]. The special @[samprasāraṇa] to @deva[ऊठ्] implies the maxim @deva[असिद्धं] @deva[बहिरङ्गमन्तरङ्गे]: @[samprasāraṇa], being a @[bahiraṅga] operation, is treated as @[asiddha] for @[guṇa] (an @[antaraṅga] operation), preventing the form @deva[ओह].
"""

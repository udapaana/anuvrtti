id = "6.4.9"
numericId = "64009"

[en]
simple = """
When followed by a @deva[प्रत्यय] which is a @deva[सर्वनामस्थान] other than @deva[सम्बोधन-एकवचन], the @deva[उपधा] @deva[स्वर] of a @deva[नकारान्त] @deva[अङ्ग] becomes optionally @deva[दीर्घ] in @deva[वेदाः], if that @deva[उपधा] @deva[स्वर] is preceded by a @deva[षकार].
"""

standard = """
Vedic: optional lengthening after @deva[ष] before @[sarvanāmasthāna]. @deva[तक्षाणं] or @deva[तक्षणम्].
"""

advanced = """
In @deva[छन्दस्], the @deva[उपधा] lengthening of a @deva[न्]-final @deva[अङ्ग] before @deva[सर्वनामस्थान] affixes is optional when @deva[ष] precedes the penultimate vowel. Both @deva[तक्षाणं] and @deva[तक्षणं] are attested: @deva[स] @deva[तक्षाणं] @deva[तिष्ठन्तमब्रवीत्]; similarly @deva[ऋभुक्षाणं] or @deva[ऋभुक्षणमिन्द्रम्]. The restriction to @deva[छन्दस्] means that in @deva[भाषा] (ordinary usage), lengthening is invariable: @deva[तक्षा], @deva[तक्षाणौ], @deva[तक्षाणः].
"""

id = "6.4.146"
numericId = "64146"

[en]
simple = """
An @deva[उवर्णान्त] @deva[भसंज्ञक] undergoes a @deva[गुणादेश] when followed by a @deva[तद्धितप्रत्यय].
"""

standard = """
@deva[उ]/@deva[ऊ] of @deva[भ] → @[guṇa] before taddhita. @deva[बाभ्रव्यः] (from @deva[बभ्रू]).
"""

advanced = """
@[Guṇa] replaces @deva[उ] or @deva[ऊ] of a @deva[भ] stem before a @deva[तद्धित] affix. Examples: @deva[बाभ्रव्यः] (from @deva[बभ्रू]), @deva[माण्डव्यः] (from @deva[मण्डु]), @deva[शङ्कव्यं] @deva[दारु] (from @deva[शंकु]), @deva[पिचव्यः] @deva[कार्पासः] (from @deva[पिचु]), @deva[कमण्डलव्या] @deva[मृत्तिका] (from @deva[कमण्डलू]), @deva[परशव्यमयः], @deva[औपगवः], @deva[कापटवः]. The use of the technical term @deva[गुणः] (rather than the simpler formulation @deva[ओरोत्], "let @deva[ओ] replace @deva[उ]/@deva[ऊ]") implies the maxim @deva[संज्ञा] @deva[पूर्वको] @deva[विधिरनित्यः] — a rule denoted by a technical term is not universally valid. The rule is therefore @[anitya], permitting forms like @deva[स्वायंभुवः] (from @deva[स्वयंभू]) without @[guṇa]. See also @ref[7.4.30].
"""

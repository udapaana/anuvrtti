id = "6.4.40"
numericId = "64040"

[en]
simple = """
The nasal of the roots @deva[हन्] ('to strike') and @deva[गम्] ('to go') is always deleted before the suffix @deva[क्विप्]. For example, @deva[प्र] + @deva[हन्] + @deva[क्विप्] → @deva[प्राघ्], and @deva[सम्] + @deva[गम्] + @deva[क्विप्] → @deva[संगः].
"""

standard = """
The nasal of @deva[गम्] is unconditionally elided before @deva[क्वि]. Thus @deva[अङ्ग] + @deva[गम्] + @deva[क्वि] → @deva[अङ्ग] + @deva[ग] + @deva[त्] → @deva[अङ्गगत्]. Similarly @deva[संयत्], @deva[परीतत्]. A @[vārttika] extends this to @deva[हन्] and related roots. The elision is @[nitya] (not optional) here, unlike the optional elision in @ref[6.4.38]. See @ref[6.4.40].
"""

advanced = """
The nasal of @deva[गम्] is unconditionally elided before @deva[क्वि]: @deva[अङ्गगत्], @deva[कलिङ्गगत्], @deva[अध्वगतो] @deva[हरयः]. The @deva[त्] is added by @ref[6.1.71]. @[vārttika]: The rule extends to @deva[गम्] 'and the rest' — elision applies in @deva[संयत्], @deva[परीतत्] as well. @[vārttika]: The nasal of @deva[गम्] etc. is also elided before @deva[ऊङ्]: @deva[अग्रेगूः], @deva[अग्रेभ्रूः].
"""

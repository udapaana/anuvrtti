id = "6.4.62"
numericId = "64062"

[en]
simple = """
Before the future (@deva[स्य]), aorist (@deva[सिच्]), benedictive (@deva[सीयुट्]), and periphrastic future (@deva[तासि]) suffixes in passive/impersonal voice, vowel-final roots may optionally undergo the same shortening that normally occurs before @deva[चिण्]. This gives two sets of forms. Example: @deva[चि] → @deva[चायिष्यते] (no shortening) or @deva[चेष्यते] (with shortening, via @deva[चिण्]-treatment).
"""

standard = """
In @deva[भाव] (impersonal) and @deva[कर्म] (passive) constructions, the rule optionally extends the phonological treatment prescribed before @deva[चिण्] to also apply before @deva[स्य], @deva[सिच्], @deva[सीयुट्], and @deva[तासि]. The @deva[चिण्]-treatment typically shortens or modifies the stem vowel. For @deva[चि] 'to gather': @deva[चायिष्यते] (without the extension) or @deva[चेष्यते] (with it). The optionality (@deva[वा]) means both the extended and unextended forms are valid across these four tense-mood affixes.
"""

advanced = """
Before @deva[स्य] (future/conditional), @deva[सिच्] (s-aorist), @deva[सीयुट्] (benedictive), and @deva[तासि] (periphrastic future) in @deva[भाव] (impersonal) and @deva[कर्म] (passive) voice, the following stems are optionally treated like the passive aorist @deva[चिण्]: (1) roots ending in a vowel in @deva[उपदेश], (2) @deva[हन्], (3) @deva[ग्रह्], (4) @deva[दृश्]. When so treated, they receive augment @deva[इट्] (added to the affix, not the stem). The @[kārikā] summarizes the effects: @deva[चिण्वद्] @deva[वृद्धिर्युक्] @deva[च] @deva[हन्तेश्च] @deva[घत्वं] @deva[दीर्घश्चोक्तो] @deva[यो] @deva[मितां] @deva[चिणीति] @deva[।] @deva[इट्] @deva[चासिद्धस्तेन] @deva[मे] @deva[लुप्यते] @deva[णि]- @deva[र्नित्यश्चायं] @deva[वलनिमित्तोऽविघाती] — i.e. @[vṛddhi] applies as in @deva[चिण्] (@ref[7.2.116], @ref[7.3.34]); @deva[युक्] augment is added (@ref[7.3.33]); @deva[घ] replaces @deva[ह] of @deva[हन्] (@ref[7.3.54]); @deva[मित्]-roots optionally lengthen their vowel (@ref[6.4.93]); and @deva[इट्]-addition being @[asiddha] by @ref[6.4.22], @deva[णि] is elided by @ref[6.4.51]. This @deva[इट्] is added without the restrictions of @ref[7.2.35] and related rules. (1) Vowel-final roots with @deva[स्य]: @deva[चि] → @deva[चायिष्यते] or @deva[चेष्यते], @deva[अचायिष्यत] or @deva[अचेष्यत]; @deva[दा] → @deva[दायिष्यते] or @deva[दास्यते], @deva[अदायिष्यत] or @deva[अदास्यत]; @deva[शमि] yields three forms — @deva[शामिष्यते] or @deva[शमिष्यते] (causative elided by @ref[6.4.51] with @deva[इट्] @[asiddha]; @deva[शम्] being @deva[मित्], optional lengthening by @ref[6.4.93]) and @deva[शमयिष्यते] (when not treated as @deva[चिण्], causative retained, penultimate shortened by @ref[6.4.92]). With @deva[सिच्]: @deva[अचायिषाताम्] or @deva[अचेषाताम्], @deva[अदायिषाताम्] or @deva[अदिषाताम्], @deva[अशामिषाताम्] or @deva[अशमिषाताम्]. With @deva[सीयुट्]: @deva[चायिषीष्ट] or @deva[चेषीष्ट], @deva[दायिषीष्ट] or @deva[दासीष्ट], @deva[शामिषीष्ट] or @deva[शमिषीष्ट]. With @deva[तासि]: @deva[चायिता] or @deva[चेता], @deva[दायिता] or @deva[दाता], @deva[शामिता] or @deva[शमिता]. The @deva[चिण्] models: @deva[अचायि], @deva[अदायि] (@ref[7.3.33]), @deva[अशमि]/@deva[अशामि] (@ref[7.3.34], @ref[6.4.93]). (2) @deva[हन्]: future @deva[घानिष्यते] or @deva[हनिष्यते]; conditional @deva[अघानिष्यत] or @deva[अहनिष्यत]; aorist @deva[अघानिषाताम्] or @deva[अवधिषाताम्] and @deva[अहसाताम्] (@ref[2.4.44]); benedictive @deva[घानिषीष्ट] or @deva[वधिषीष्ट]; periphrastic future @deva[घामिता] or @deva[हन्ता]. The @deva[चिण्] model is @deva[अघानि]. (3) @deva[ग्रह्]: future @deva[ग्राहिष्यते] or @deva[ग्रहीष्यते]; conditional @deva[अग्राहिष्यत] or @deva[अग्रहीष्यत]; aorist @deva[अग्राहिषाताम्] or @deva[अग्रहीषाताम्]; benedictive @deva[ग्राहिषीष्ट] or @deva[ग्रहिषीष्ट]; periphrastic future @deva[ग्राहिता] or @deva[ग्रहिता] (lengthening of @deva[ही] by @ref[7.2.37]). The @deva[चिण्] model is @deva[अग्राहि]. (4) @deva[दृश्]: future @deva[दर्शिष्यते] or @deva[द्रक्ष्यते]; conditional @deva[अदर्शिष्यत] or @deva[अद्रक्ष्यत]; aorist @deva[अदर्शिषाताम्] or @deva[अदृक्षाताम्]; benedictive @deva[दर्शिषीष्ट] or @deva[द्रक्षीष्ट]; periphrastic future @deva[दर्शिता] or @deva[द्रष्टा]. The @deva[चिण्] model is @deva[अदर्शि]. The restriction to @deva[स्य] etc. is shown by @deva[चेतव्यम्], @deva[दातव्यम्] (before other affixes, no @deva[चिण्]-treatment). The @deva[भाव]/@deva[कर्म] restriction holds: @deva[चेष्यते], @deva[दास्यते]. The @deva[उपदेश] condition ensures the rule covers @deva[कारिष्यते] — though @deva[कार्] ends in a consonant after @[guṇa], its original enunciation ends in a vowel. Since this @[atideśa] is stated with respect to @deva[अङ्ग], substitutes like @deva[वध] and @deva[गा] (@ref[2.4.42]–@ref[2.4.45], @ref[2.4.50]) do not apply under @deva[चिण्]-treatment, per the @[kāśikā]. Forms: @deva[हनिष्यते]/@deva[घानिष्यते], @deva[एष्यते] or @deva[आयिष्यते], @deva[अध्येष्यते] or @deva[अध्यायिष्यते].
"""

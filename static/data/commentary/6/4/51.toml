id = "6.4.51"
numericId = "64051"

[en]
simple = """
The @deva[इ] vowel of a causative (@deva[णि]) suffix is dropped before an @deva[आर्धधातुक] affix that does not take the augment @deva[इट्]. This prevents unwanted sandhi changes like @[guṇa] or @[vṛddhi] that would otherwise occur. Example: @deva[कारि] (causative stem) + @deva[ल्] → @deva[अततक्षत्], @deva[अरराजत्].
"""

standard = """
Before an @deva[आर्धधातुक] affix that does not receive the augment @deva[इट्], the @deva[इ] of the causative marker @deva[णि] is elided (by @[lopa]). Without this elision, the @deva[इ] would trigger @deva[इयङ्] substitution or @[guṇa]/@[vṛddhi] changes under other rules. The environment is thus: causative stem ending in @deva[णि] + @deva[आर्धधातुक] (anit). Examples: @deva[अततक्षत्] (from @deva[तक्ष्] causative), @deva[अरराजत्] (from @deva[राज्] causative). Contrast @ref[6.4.52] where @deva[णि] itself (not just its @deva[इ]) is dropped.
"""

advanced = """
The @deva[इ] of a causative @deva[अङ्ग] formed with @deva[णि] is elided before an @deva[आर्धधातुक] affix that does not take the augment @deva[इट्]. This elision debars @deva[इयङ्]-substitution, semi-vowel @deva[य], @[guṇa], @[vṛddhi], and lengthening. Examples: @deva[अततक्षत्], @deva[अररक्षत्], @deva[आशिशत्], @deva[कारणा], @deva[हारणा], @deva[कारकः], @deva[हारकः], @deva[कार्यते], @deva[हार्यते], and @deva[ज्ञीप्सति] (for aorist stem-shortening see @ref[7.4.1]). Before @deva[इट्]-augmented affixes the @deva[इ] is retained: @deva[कारयिता], @deva[हारयिता].
"""

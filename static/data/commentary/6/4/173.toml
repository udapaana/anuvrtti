id = "6.4.173"
numericId = "64173"

[en]
simple = """
The stem @deva[उक्षन्] (bull) forms the adjective @deva[औक्ष] when the meaning is not "descendant of an ox." For instance, @deva[औक्षं पटम्] means "a cloth (marked or associated) with a bull." When the meaning is "son/descendant," the form is instead @deva[औक्ष्णः], where the final @deva[अ] of the base is elided.
"""

standard = """
From the @[an]-final stem @deva[उक्षन्], the @deva[अण्] affix produces @deva[औक्ष] in non-@[apatya] (non-descendant) senses, as in @deva[औक्षं पटम्] ("a bull-cloth"). In the @[apatya] (descendant) sense, the form is @deva[औक्ष्णः] (@deva[उक्ष्णोऽपत्यम्], "son of the bull"), where elision of the final @deva[अ] of @deva[उक्ष्ण्] applies under @ref[6.4.135]. The contrast between @deva[औक्ष] and @deva[औक्ष्णः] thus illustrates how the semantic category (@[apatya] vs. non-@[apatya]) determines which form of the base is preserved before the suffix.
"""

advanced = """
From @deva[उक्षन्] is formed @deva[औक्ष] when not meaning a descendant. As @deva[औक्षं] @deva[पटम्] but @deva[औक्ष्णः] = @deva[उक्ष्णोऽपत्यम्], the @deva[अ] is elided in the latter example by @ref[6.4.135].
"""

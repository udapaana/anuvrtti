id = "6.4.68"
numericId = "64068"

[en]
simple = """
For roots other than those listed in @ref[6.4.66] whose stems begin with a conjunct consonant, the final @deva[आ] may optionally become @deva[ए] in the Benedictive active. Both the modified and unmodified forms are accepted. Example: @deva[ग्ला] → @deva[ग्लेयात्] or @deva[ग्लायात्] ('may he wither'); @deva[म्ला] → @deva[म्लेयात्] or @deva[म्लायात्].
"""

standard = """
This extends the @deva[ए]-substitution of @ref[6.4.67] optionally to roots not covered there, provided the root stem begins with a conjunct consonant (@deva[संयोगादि]). The optionality (@deva[वा]) means both @deva[आ] retention and @deva[ए] substitution are valid in the Benedictive Parasmaipada. Examples: @deva[ग्ला] 'to wither' → @deva[ग्लेयात्] or @deva[ग्लायात्]; @deva[म्ला] 'to wilt' → @deva[म्लेयात्] or @deva[म्लायात्]. The conjunct-initial condition (@deva[संयोगादेः]) is the key differentiator from the obligatory rule.
"""

advanced = """
For roots other than those listed in @ref[6.4.66] (@deva[घुमास्थागापाजहातिसां] @deva[हलि]), @deva[ए] optionally replaces final @deva[आ] in the benedictive active, provided the root begins with a conjunct consonant (@deva[संयोगादि]). Of the roots in @ref[6.4.66], only @deva[स्था] could have been affected by this rule; it is explicitly excluded by @deva[अन्यस्य]: @deva[ग्लेयात्] or @deva[ग्लायात्], @deva[म्लेयात्] or @deva[म्लायात्] — but only @deva[स्थेयात्] (by @ref[6.4.66]), and @deva[यायात्] (no conjunct-initial). The phrase @deva[क्ङिति] is understood here, restricting the rule to @deva[परस्मैपद] affixes (@ref[3.4.104]); in @deva[आत्मनेपद]: @deva[ग्लासिष्ट]. The conjunct must belong to the root itself as @deva[अङ्ग] — in @deva[निर्वायात्] (from @deva[निर्] + @deva[वा]), the @deva[र्व] cluster does not qualify, since @deva[र्] belongs to the preposition, not the root.
"""

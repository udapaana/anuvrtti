id = "6.4.57"
numericId = "64057"

[en]
simple = """
After root @deva[आप्] ('to obtain'), the @deva[इ] of @deva[णि] may optionally become @deva[अय्] before the absolutive @deva[ल्यप्]. Both resulting forms are acceptable. Example: @deva[प्र + आप् + णि + ल्यप्] → @deva[प्रापय्य] or @deva[प्राप्य] ('having caused to obtain').
"""

standard = """
This rule provides an optional (@deva[वा]) @deva[अय्] substitution for @deva[इ] of @deva[णि] before @deva[ल्यप्] specifically after root @deva[आप्]. The optionality distinguishes it from the general light-vowel rule of @ref[6.4.56]. The scope is limited: it applies only to the primary root @deva[आप्], not to the substitute @deva[आप्] used for @deva[इङ्] (@deva[अध्यापयति]). Results: @deva[प्रापय्य गतः] or @deva[प्राप्य गतः] 'having caused to reach'.
"""

advanced = """
@deva[अय्] optionally replaces the @deva[इ] of @deva[णि] before the absolutive @deva[ल्यप्] after root @deva[आप्]: @deva[प्रापय्य] or @deva[प्राप्य] @deva[गतः]. This does not extend to the @deva[आप्] that substitutes for @deva[इङ्] — there the form is @deva[अप्याप्य] @deva[गतः] (@ref[6.1.48], @ref[7.3.36]). The maxim of @[pratipadokta] governs here.
"""

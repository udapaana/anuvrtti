id = "6.4.115"
numericId = "64115"

[en]
simple = """
The last letter of the @deva[अङ्ग] of verb root '@deva[भी]' is optionally converted to @deva[ह्रस्व-इकार] when followed by @deva[हलादि-सार्वधातुक] @deva[कित्]/@deva[ङित्-प्रत्यय].
"""

standard = """
@deva[ई] of @deva[भी] optionally → @deva[इ] before consonant-initial @[sārvadhātuka] @deva[क्]/@deva[ङित्]. @deva[बिभितः] or @deva[बिभीतः].
"""

advanced = """
Short @deva[इ] optionally replaces the @deva[ई] of @deva[भी] before a consonant-initial @deva[सार्वधातुक] @deva[कित्] or @deva[ङित्] affix. Forms (with both options): @deva[बिभितः] / @deva[बिभीतः], @deva[बिभिथः] / @deva[बिभीथः], @deva[बिभिवः] / @deva[बिभीवः], @deva[बिभिमः] / @deva[बिभीमः]. Before a vowel-initial affix: @deva[बिभ्यति]. Before a non-@deva[ङित्] affix: @deva[बिभेति]. Before an @[ārdhadhātuka] affix: @deva[भीयते].
"""

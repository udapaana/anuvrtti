id = "6.4.128"
numericId = "64128"

[en]
simple = """
The stem @deva[मघवन्] (an epithet of Indra) takes various different forms in its paradigm. In the Nominative singular it becomes @deva[मघवान्], in the dual @deva[मघवन्तौ], in the plural @deva[मघवन्तः], and in the Accusative singular @deva[मघवन्तम्]. In the Genitive we find @deva[मघवतः] and in the Instrumental @deva[मघवता].
"""

standard = """
The rule specifies that @deva[तृ] is substituted diversely (@deva[विभाषा]) for the final segment of @deva[मघवन्], accounting for the multiple stem forms seen across the paradigm. The strong stem @deva[मघवन्त्] appears in: @deva[मघवान्] (Nom. sg. with @deva[नुम्]), @deva[मघवन्तौ] (Nom. du.), @deva[मघवन्तः] (Nom. pl.), @deva[मघवन्तम्] (Acc. sg.). The weak stem yields: @deva[मघवतः] (Gen. sg.), @deva[मघवता] (Instr. sg.). The feminine @deva[मघवती] and the derivative @deva[माघवतम्] follow from the @deva[त्]-bearing base, demonstrating how the substitution feeds subsequent derivations.
"""

advanced = """
@deva[तृ] is diversely substituted for the final of @deva[मघवन्]@deva[।] As @deva[मघवान्], @deva[मघवन्तौ], @deva[मघवन्तः], @deva[मघवन्तम्], @deva[मघवन्तौ], @deva[मघवतः], @deva[मघवता], @deva[मघवती], @deva[माघवतम्], @deva[॥] @deva[न] @deva[च] @deva[भवति], @deva[मघवा], @deva[मघवानौ], @deva[मघवानः], @deva[मघवानम्], @deva[मघवानौ], @deva[मघोनः], @deva[मघोना], @deva[मघवभ्याम्], @deva[मघवभिः], @deva[मघोनी], @deva[माघवनम्] @deva[॥]
"""

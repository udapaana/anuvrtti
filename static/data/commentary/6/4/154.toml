id = "6.4.154"
numericId = "64154"

[en]
simple = """
The affix @deva[तृ] (the agentive suffix meaning "one who does") is dropped before the superlative suffix @deva[इष्ठन्], the abstract-noun suffix @deva[इमनिच्], and the comparative suffix @deva[ईयसुन्]. So from @deva[कर्तृ] ("doer") we get @deva[करिष्ठः] ("most adept at doing") and from @deva[दोग्धृ] we get @deva[दोहीयसी] (@deva[धेनुः], "a better-milking cow"). This allows the degree suffixes to attach directly to the verbal root.
"""

standard = """
Before the @[comparative] suffix @deva[ईयसुन्] and the @[superlative] suffix @deva[इष्ठन्], as well as the abstract @deva[इमनिच्], the agentive @deva[तद्धित] suffix @deva[तृ] is elided from the @deva[भ] stem. The conditioning environment is: the stem ends in @deva[तृ] (agentive) and one of @deva[इष्ठ]/[@deva[इमन्]/@deva[ईयस्]] follows. Results: @deva[करिष्ठः] (from @deva[कर्तृ] + @deva[इष्ठ]), @deva[विजयिष्ठः], @deva[वहिष्ठः], @deva[दोहीयसी]. The elision of @deva[तृ] prevents an awkward consonant cluster and allows the degree suffix to attach cleanly to the root vowel.
"""

advanced = """
The affix @deva[तृ] is elided before @deva[इष्ठन्], @deva[इमनिच्], and @deva[ईयसुन्]. Examples: @deva[करिष्ठः], @deva[विजयिष्ठः], @deva[वहिष्ठः], @deva[दोहीयसी] @deva[धेनुः]. The entire affix @deva[तृ] is elided — without this, only the @deva[टि] would have been elided by the following rules. The @[anuvṛtti] of @deva[लुक्] from the preceding @[sūtra] is not read here: had elision occurred by @deva[लुक्], the affix markers would disappear by @ref[1.1.63], and @[guṇa] in @deva[विजयिष्ठ] and @deva[करिष्ठ] would be lost. See @ref[5.1.122] and @ref[5.3.59] for these affixes. @deva[इमन्] is included in this @[sūtra] for the sake of the subsequent rule, as no actual combination of @deva[तृ] + @deva[इमन्] exists; @deva[तृ] is followed by @deva[इष्ठ] and @deva[ईयस्] (by @ref[5.3.59]).
"""

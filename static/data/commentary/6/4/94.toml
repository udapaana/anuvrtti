id = "6.4.94"
numericId = "64094"

[en]
simple = """
The penultimate vowel of a causative stem is shortened before the compound-forming affix @deva[खच्]. Long vowels in the causative base are thus reduced when @deva[खच्] attaches. Example: @deva[द्विष् + णि + खच्] → @deva[द्विषन्तपः] 'tormentor of enemies'; @deva[पर + तप् causative + खच्] → @deva[परंतपः].
"""

standard = """
When the secondary affix @deva[खच्] follows a causative stem, the penultimate vowel of that stem undergoes shortening (@deva[ह्रस्व]). The @deva[खच्] affix is used to form agent nouns and bahuvrihi-style compounds; see @ref[3.2.29] and @ref[3.2.41] for its application. Results: @deva[द्विषन्तपः] 'one who torments enemies', @deva[परंतपः] 'scorcher of foes', @deva[पुरंदरः] 'city-breaker'. Without this rule, the long causative vowel would remain, giving unattested forms.
"""

advanced = """
The penultimate vowel of a causative @deva[अङ्ग] is shortened before the affix @deva[खच्]: @deva[द्विषन्तपः], @deva[परंतपः], @deva[पुरंदरः]. See @ref[3.2.29] and @ref[3.2.41] for @deva[खच्]-application.
"""

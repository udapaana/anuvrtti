id = "6.4.80"
numericId = "64080"

[en]
simple = """
The word '@deva[स्त्री]' gets an @deva[इयङ्-आदेश] optionally when followed by @deva[अम्] @deva[प्रत्यय] or @deva[शस्] @deva[प्रत्यय].
"""

standard = """
@deva[इयङ्] optional for @deva[स्त्री] before @deva[अम्]/@deva[शस्]. @deva[स्त्रीं] or @deva[स्त्रियम्].
"""

advanced = """
@deva[इयङ्] substitution for the @deva[ई] of @deva[स्त्री] is optional before the accusative case-endings @deva[अम्] and @deva[शस्] (@deva[अस्]): @deva[स्त्रीं] @deva[पश्य] or @deva[स्त्रियं] @deva[पश्य]; @deva[स्त्रीः] @deva[पश्य] or @deva[स्त्रियः] @deva[पश्य].
"""

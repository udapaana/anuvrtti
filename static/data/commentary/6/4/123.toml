id = "6.4.123"
numericId = "64123"

[en]
simple = """
The root @deva[राध्] ("to accomplish") changes its @deva[आ] to @deva[ए] and drops its reduplicated syllable in the Perfect tense, but only when the meaning is "to hurt someone." So we get @deva[अपरेधतुः] ("the two harmed") with the prefix @deva[अप]. In any other sense of @deva[राध्], the normal Perfect form @deva[रराधतुः] is used instead.
"""

standard = """
This rule restricts the @deva[ए]-substitution and @deva[अभ्यास]-elision in the @deva[लिट्] for the root @deva[राध्] to those contexts where the verb carries the meaning of harming (@deva[अपकार]). The conditioning environment is: @deva[लिट्] affixes that are @deva[क्]- or @deva[ङ्]-marked, or @deva[थल्] with augment @deva[इट्], plus the semantic restriction to the "hurt" sense. In the intended sense, @deva[आ] of @deva[राध्] becomes @deva[ए] and the @deva[अभ्यास] is dropped, yielding @deva[अपरेधतुः]. Outside the "hurt" meaning, the standard reduplication is retained: @deva[रराधतुः].
"""

advanced = """
@deva[ए] replaces the @deva[आ] of @deva[राध] — with simultaneous @[abhyāsa]-elision — before @deva[कित्]/@deva[ङित्] @deva[लिट्] affixes and @deva[इट्]-augmented @deva[थल्], but only when the meaning is "to hurt." Forms: @deva[अपरेधतुः], @deva[अपरेधुः], @deva[अपरेधिथ]. In other senses: @deva[रराधतुः], @deva[रराधुः], @deva[रराधिथ] (standard reduplication retained). Since the long @deva[आ] of @deva[राध] is being replaced, the @[anuvṛtti] of short @deva[अ] (@deva[अतः] from @ref[6.4.120]) is not appropriate. Either the @[anuvṛtti] of @deva[आ] from @ref[6.4.112] applies, or @deva[एकहलमध्ये] is read as "whatever stands between two simple consonants in @deva[राध्] is replaced by @deva[ए]."
"""

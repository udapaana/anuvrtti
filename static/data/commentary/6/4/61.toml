id = "6.4.61"
numericId = "64061"

[en]
simple = """
In expressions of curse or lamentation, the @deva[इ] of @deva[क्षि] may optionally be lengthened to @deva[ई] before @deva[क्त]. Both forms with and without lengthening are acceptable in this emotional register. Example: @deva[क्षीणायुरेधि] or @deva[क्षितायुरेधि] ('may your life be exhausted!').
"""

standard = """
This optional (@deva[वा]) lengthening of @deva[इ] → @deva[ई] in @deva[क्षि] before @deva[क्त] is restricted to contexts of imprecation (@deva[शापे]) or expressions of misery (@deva[दैन्ये]). Outside these registers, only the standard forms from @ref[6.4.60] apply. The two allowed results: @deva[क्षीणायुरेधि] (with lengthening) or @deva[क्षितायुरेधि] (without) — both mean 'may your life force be depleted'. The option reflects that affective/imprecatory language licenses additional phonological variation.
"""

advanced = """
The lengthening of @deva[इ] to @deva[ई] in @deva[क्षि] before @deva[क्त] (outside @deva[ण्यत्]-sense) becomes optional when the context involves imprecation (@deva[शाप]) or a miserable condition (@deva[दैन्य]): @deva[क्षितायुरेधि] or @deva[क्षीणायुरेधि], @deva[क्षितकः] or @deva[क्षीणकः], @deva[क्षितोयं] @deva[तपस्वी] or @deva[क्षीणोऽयं] @deva[तपस्वी]. Outside imprecation or misery contexts, only the lengthened form is valid: @deva[क्षीणश्चन्द्रः].
"""

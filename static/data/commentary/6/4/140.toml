id = "6.4.140"
numericId = "64140"

[en]
simple = """
The ending @deva[आकार] of the @deva[भसंज्ञक] @deva[अङ्ग] of an @deva[आकारान्त] @deva[धातु] is removed.
"""

standard = """
@[dhātu-final] @deva[आ] of @deva[भ] elided. @deva[कीलालपः] (from @deva[कीलालपा]).
"""

advanced = """
The final @deva[आ] of a @deva[भ] stem is elided when the stem ends in a root (@deva[धातु]). Examples: @deva[कीलालपः] @deva[पश्य], @deva[कीलालपा], @deva[कीलालपे]; @deva[शुभंयः] @deva[पश्य], @deva[शुभंया], @deva[शुभंये] — from @deva[कीलालपा] and @deva[शुभंया]. The restriction "of a root" excludes non-root-final stems: @deva[खट्वाः] @deva[पश्य], @deva[मालाः] @deva[पश्य]. This @[sūtra] should be parsed as two parts — (1) @deva[आतः] (2) @deva[धातोः] — so that the long @deva[आ] in general may be elided. Pāṇini himself declines @deva[क्त्वा] and @deva[श्ना] with @deva[आ]-elision: see @ref[7.1.37] (@deva[क्त्वो] @deva[ल्यप्]) and @ref[3.1.83] (@deva[श्नः] @deva[शानच्]).
"""

id = "6.4.95"
numericId = "64095"

[en]
simple = """
For the causative of root @deva[ह्लद्] ('to be glad'), the penultimate vowel is shortened before the past participle affixes @deva[क्त] and @deva[क्तवतु]. This shortening is obligatory (not optional) for this root. Example: @deva[प्र + ह्लादि + क्त] → @deva[प्रह्लन्नः] ('delighted'); @deva[प्रह्लन्नवान्] with @deva[क्तवतु].
"""

standard = """
The causative stem of @deva[ह्लद्] is @deva[ह्लादि] (with long @deva[आ]); before @deva[क्त] and @deva[क्तवतु] this @deva[आ] is shortened by this rule. Shortening + consonant assimilation yields @deva[प्रह्लन्नः]. Before other affixes the long @deva[आ] is retained: @deva[प्रह्लादयति] 'causes delight'. When @deva[क्तिन्] follows, the form is @deva[प्रह्लत्तिः]. This rule is a specific exception carved from the general causative behavior.
"""

advanced = """
The penultimate of the causative of @deva[ह्लद्] (@deva[ह्लादि]) is shortened before the participle affixes @deva[क्त] and @deva[क्तवतु]: @deva[प्रह्लन्नः], @deva[प्रह्लन्नवान्]. Before non-@deva[निष्ठा] affixes, the long vowel is retained: @deva[प्रह्लादयति]. The rule extends to @deva[क्तिन्] as well: @deva[प्रह्लत्तिः]. This is achieved by splitting the aphorism into two parts: (1) @deva[ह्लादः] and (2) @deva[निष्ठायाम्].
"""

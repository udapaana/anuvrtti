id = "6.4.89"
numericId = "64089"

[en]
simple = """
When the @deva[उपधा] of verb root @deva[गुह्] has a chance of undergoing a @deva[गुणादेश] while followed by an @deva[अजादिप्रत्यय], the @deva[गुणादेश] is blocked and the @deva[उपधा] becomes @deva[दीर्घ] instead.
"""

standard = """
@deva[गोह्] (from @deva[गुह्]) penultimate @deva[ओ] → @deva[ऊ] before vowel. @deva[निगूहति], @deva[गूहः].
"""

advanced = """
The penultimate @deva[ओ] of the @[guṇa]-strengthened stem @deva[गोह्] (from root @deva[गुह्]) is replaced by @deva[ऊ] before a vowel-initial affix: @deva[निगूहति], @deva[निगूहकः], @deva[साधुनिगूहिन्], @deva[निगूहम्], @deva[निगूहन्ति], @deva[गूहो] @deva[वर्तते]. The specification "penultimate" restricts the substitution to that position. The @[sūtra] uses the form @deva[गोह्] to block application where @deva[गुह्] has not undergone @[guṇa] — hence no substitution in @deva[निजुगुहतुः], @deva[निजुगुहुः]. Before consonant-initial affixes, no change: @deva[निगोढा], @deva[निगोढुम्]. An alternative view holds that @deva[गोह] is cited to prevent the @deva[अय्]-substitution of @deva[णि] before @deva[ल्यप्]: @deva[निगाहि] + @deva[ल्यप्] = @deva[निगूह्य] (@ref[6.4.56] not applied), since treating the @deva[ऊ]-substitution as @[asiddha] (@ref[6.4.22]) would have triggered @deva[अय्], with @deva[गूह्] appearing to have a light penultimate. Per the @[kāśikā], however, the @deva[ऊ]-substitution is not @[asiddha] here because the loci of operation differ.
"""

id = "6.4.82"
numericId = "64082"

[en]
simple = """
An @deva[इवर्ण] occurring at end of an a @deva[असंयोगपूर्व] @deva[धातु] which in turn occurs at end of an @deva[अनेकाच्] @deva[अङ्ग] is converted to @deva[यण्] letter when followed by an @deva[अजादिप्रत्यय].
"""

standard = """
Semivowel for monosyllabic @deva[इ]/@deva[ई] without preceding conjunct. @deva[निन्यतुः], @deva[ग्रामण्यौ].
"""

advanced = """
A semivowel (@deva[यण्]) replaces the final @deva[इ] or @deva[ई] of a root before a vowel-initial affix, when (a) the @deva[अङ्ग] contains more than one syllable (@deva[अनेकाच्]), and (b) the @deva[इ]/@deva[ई] is not preceded by a conjunct consonant forming part of the root (@deva[असंयोगपूर्व]). The word @deva[धातोः] is understood here; @deva[संयोग] is qualified by it — only root-internal conjuncts count. Examples: @deva[निन्यतुः], @deva[निन्युः] (root @deva[नी] with @deva[गति] @deva[नि]), @deva[उन्न्यौ], @deva[उन्न्यः] (with @deva[उत्]), @deva[ग्रामण्यौ], @deva[ग्रामण्यः] (with @deva[कारक]-@deva[उपपद] @deva[ग्राम]). The rule does not apply when the preceding word is neither @deva[गति] nor @deva[कारक]: @deva[परमनी] → @deva[परमनियौ], @deva[परमनियः] (by @deva[इयङ्]). Restriction to @deva[इ]/@deva[ई]: @deva[ऊ]-final @deva[लुलू] takes @deva[उवङ्] instead — @deva[लुलुवतुः], @deva[लुलुवः] (see next @[sūtra]). The polysyllabic condition: monosyllabic @deva[नी] gives @deva[नियौ], @deva[नियः] (by @deva[इयङ्]). The @deva[असंयोगपूर्व] condition: @deva[यवक्री] → @deva[यवक्रियौ], @deva[यवक्रियः] (by @deva[इयङ्], since @deva[ई] follows a root-internal conjunct). For @deva[उन्नी], the conjunct @deva[न्न्] does not block the rule because one @deva[न्] belongs to the @deva[उपसर्ग] @deva[उत्], not to the root: @deva[उन्न्यौ], @deva[उन्न्यः]. The term @deva[असंयोगपूर्व] qualifies the vowel @deva[ई], not the word @deva[अङ्ग].
"""

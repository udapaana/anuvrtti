id = "6.4.163"
numericId = "64163"

[en]
simple = """
A @deva[भ] stem that consists of only one syllable (monosyllabic) retains its original form without any change before the degree suffixes @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्]. When deriving from @deva[स्रग्विन्] ("wearing a garland") or @deva[स्रुग्वत्] ("having a ladle"), the @deva[विन्] or @deva[मतुप्] affix is first elided, leaving the monosyllabic @deva[भ] stem, which then takes the degree suffix directly. The result is @deva[स्रजिष्ठः] ("most garlanded") and @deva[स्रुचिष्टः].
"""

standard = """
For monosyllabic @deva[भ] stems, no preparatory change (no @deva[टि]-elision, no @deva[गुण], no @deva[ऋ] → @deva[र्]) applies before @deva[इष्ठ]/@deva[इमन्]/@deva[ईयस्]; the stem is used as-is. In practice, the stems @deva[स्रग्विन्] and @deva[स्रुग्वत्] first have their @deva[विन्]/@deva[मतुप्] affixes elided (see relevant @deva[भ]-elision rules), leaving monosyllabic @deva[स्रज्] and @deva[स्रुच्] respectively. These monosyllabic remnants then combine directly with degree suffixes: @deva[स्रजिष्ठः] ("most garlanded"), @deva[स्रुचिष्टः] ("having the greatest ladle"). The rule thus prevents the over-application of modification rules to already-minimal stems.
"""

advanced = """
A monosyllabic @deva[भ] stem retains its original form unchanged before @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्]. From @deva[स्रग्विन्]: @deva[विन्] is elided by @ref[5.3.65], leaving monosyllabic @deva[स्रज्] — then @deva[स्रजिष्ठः], @deva[स्रजीयान्], @deva[स्रजयति] (causative, formed on the model of @deva[इष्ठ] by the @[vārtika] under @ref[6.4.155]). From @deva[स्रुग्वत्]: @deva[मतुप्] elided — @deva[स्रुचिष्टः], @deva[स्रुचीयान्], @deva[स्रुचयति]. The restriction to monosyllabic stems is significant: @deva[वसिष्ठः] (from polysyllabic @deva[वसुमत्]) undergoes @deva[टि]-elision by @ref[6.4.155]. This rule is an exception to @ref[6.4.155]. @[vārtika]: @deva[राजन्य], @deva[मनुष्य], and @deva[युवन्] retain their original form before the affix @deva[अक] — @deva[राजन्यानां] @deva[समूहः] = @deva[राजन्यकम्], @deva[मानुष्यकम्] (blocking @deva[य]-elision by @ref[6.4.15]). Similarly @deva[यूनो] @deva[भावः] = @deva[यौवनिकः] (with @deva[वुञ्] by @ref[5.1.133], superseding @ref[6.4.144]).
"""

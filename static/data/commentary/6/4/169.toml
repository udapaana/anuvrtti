id = "6.4.169"
numericId = "64169"

[en]
simple = """
The stems @deva[आत्मन्] ("self") and @deva[अध्वन्] ("path") keep their final @deva[अन्] unchanged before the @deva[तद्धित] affix @deva[ख]. So @deva[आत्मन्] + @deva[ख] (see @ref[5.1.9]) gives @deva[आत्मनीनः] ("self-possessed") and @deva[अध्वन्] + @deva[ख] (see @ref[5.2.16]) gives @deva[अध्वनीनः] ("pertaining to a path"). Without this rule, the @deva[अन्] might be altered before @deva[ख].
"""

standard = """
This rule specifically preserves the @deva[अन्] of @deva[आत्मन्] and @deva[अध्वन्] before the @deva[तद्धित] affix @deva[ख], in contrast to the general principle that might elide or alter stem-final @deva[अन्] in @deva[भ]-position. The conditioning environment: stem = @deva[आत्मन्] or @deva[अध्वन्], in @deva[भ] position, followed by @deva[ख]. Results: @deva[आत्मनीनः] (@ref[5.1.9]) and @deva[अध्वनीनः] (@ref[5.2.16]). The specificity of the two stems (rather than a general rule) indicates that other @deva[अन्]-final stems do not necessarily retain @deva[अन्] before @deva[ख], making this an enumerated exception.
"""

advanced = """
The finals of @deva[आत्मन्] and @deva[अध्वन्] remain unchanged before the affix @deva[ख]. Examples: @deva[आत्मने] @deva[हितं] = @deva[आत्मनीनः] (by @ref[5.1.9]); @deva[अध्वानमलङ्गामी] = @deva[अध्वनीनः] (by @ref[5.2.16]). In other contexts, @deva[अन्] is altered: @deva[प्रत्यात्मम्] (formed by @[samāsānta] @deva[टच्] added to @[avyayībhāva] by @ref[5.4.108]) and @deva[प्राध्वम्] (by @deva[अच्], @ref[5.4.85]).
"""

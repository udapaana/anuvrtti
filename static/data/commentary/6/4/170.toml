id = "6.4.170"
numericId = "64170"

[en]
simple = """
For stems ending in @deva[मन्] (where @deva[म्] precedes @deva[अन्]), except @deva[वर्मन्] ("armour"), the @deva[अन्] does NOT remain unchanged before the Patronymic @deva[अण्]. So @deva[सुषामन्] → @deva[सौषामः] and @deva[चन्द्रसामन्] → @deva[चान्द्रसामः] (the @deva[अन्] is elided). The exception @deva[वर्मन्] follows a different pattern.
"""

standard = """
This rule creates a specific exception to the @deva[अन्]-preservation rule for @deva[भ] stems: when a stem ends in @deva[मन्] (with @deva[म्] immediately before @deva[अन्]), the @deva[अन्] is NOT preserved before the Patronymic @deva[अण्] (unless the stem is @deva[वर्मन्]). The conditioning environment: @deva[भ] stem ending in @deva[मन्] with @deva[म्] contiguous to @deva[अन्], followed by Patronymic @deva[अण्], and stem ≠ @deva[वर्मन्]. Results: @deva[सुषामन्] → @deva[सौषामः] (Patronymic from @deva[सुषामन्]), @deva[चन्द्रसामन्] → @deva[चान्द्रसामः]. The exception for @deva[वर्मन्] reflects a lexical irregularity preserved in the grammatical tradition.
"""

advanced = """
For stems ending in @deva[अन्] preceded by @deva[म्] (except @deva[वर्मन्]), @deva[अन्] does not remain unchanged before the Patronymic @deva[अण्] — it is elided. Examples: @deva[सुषाम्णोऽपत्यं] = @deva[सौषामः]; @deva[चान्द्रसामः] (from @deva[चन्द्रसामन्]). The restriction to @deva[म्]-preceded: @deva[सोत्वनः] (preceded by @deva[व], @deva[अन्] unchanged). The restriction to Patronymic @deva[अण्]: @deva[चर्मणा] @deva[परिवृतो] @deva[रथः] = @deva[चामर्णः] (@deva[अन्] unchanged by @ref[6.4.167]). The @deva[वर्मन्] exception: @deva[चक्रवर्मणोऽपत्यं] = @deva[चाकवर्मणः] (@deva[अन्] retained). @[vārtika]: optionally in @deva[हितनामन्] — @deva[हितनाम्नोऽपत्यं] = @deva[हैतनामः] or @deva[हैतनामनः].
"""

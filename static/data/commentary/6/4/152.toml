id = "6.4.152"
numericId = "64152"

[en]
simple = """
The @deva[य्] of a Patronymic suffix, when preceded by a consonant, is dropped before the Denominative affix @deva[क्य] and the adverbial @deva[च्वि] suffix. So from @deva[वात्स्य] we get @deva[वात्सीयति] ("he acts as a @[vātsa]") with @deva[क्य], and @deva[वात्सीभूतः] ("having become like a @[vātsa]") with @deva[च्वि]. Similarly @deva[गार्ग्य] gives @deva[गार्गीयति] and @deva[गार्गीभूतः].
"""

standard = """
This rule extends the elision of consonant-preceded Patronymic @deva[य्] to two additional conditioning environments: the @[denominative] affix @deva[क्य] and the adverbial @deva[च्वि]. Before @deva[क्य]: @deva[वात्स्य] → @deva[वात्सीयति]/@deva[वात्सीयते], @deva[गार्ग्य] → @deva[गार्गीयति]/@deva[गार्गीयते]. Before @deva[च्वि]: @deva[गार्ग्य] → @deva[गार्गीभूतः], @deva[वात्स्य] → @deva[वात्सीभूतः]. The elision in these environments parallels that before @deva[तद्धित] affixes (see adjacent rules), reflecting the grammarian's systematic treatment of @deva[य्]-drop across multiple suffix types.
"""

advanced = """
The consonant-preceded @deva[य्] of a Patronymic affix is also elided before the Denominative affix @deva[क्य] and the adverbial affix @deva[च्वि]. Before @deva[क्य]: @deva[वात्सीयति] / @deva[वात्सीयते], @deva[गार्गीयति] / @deva[गार्गीयते]. Before @deva[च्वि]: @deva[गार्गीभूतः], @deva[वात्सीभूतः]. When @deva[य] is not Patronymic: @deva[सांकाश्यायते], @deva[सांकाश्यीभूतः] (no elision). When @deva[य] is not preceded by a consonant: @deva[कारिकेयीयति], @deva[कारिकेयीभूतः] (no elision).
"""

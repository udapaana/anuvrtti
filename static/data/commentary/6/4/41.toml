id = "6.4.41"
numericId = "64041"

[en]
simple = """
A stem ending in a nasal, when followed by the affixes @deva[विट्] or @deva[वन्], always replaces the nasal with a long @deva[आ]. For example, @deva[जन्] ('to be born') + @deva[वन्] → @deva[जावन्] → compound @deva[गोजाः] ('born of a cow').
"""

standard = """
Before the affixes @deva[विट्] and @deva[वन्], nasal-final stems substitute long @deva[आ] for the nasal — unconditionally (no @deva[विभाषा]). Thus @deva[जन्] → @deva[जा] + @deva[वन्] → @deva[जावन्] in @deva[अब्जाः], @deva[गोजाः]; @deva[खन्] → @deva[खा] → @deva[गोषाः] (with @deva[ष]/@deva[स] alternation). The @deva[आ] substitution is for the entire nasal, not just lengthening. See @ref[6.4.41].
"""

advanced = """
A nasal-final stem substitutes long @deva[आ] for its nasal before the affixes @deva[विट्] or @deva[वन्] — unconditionally. Examples with @deva[विट्] (added by @ref[3.2.67], fully elided): @deva[अब्जाः], @deva[गोजाः], @deva[ऋतजाः], @deva[अद्रिजाः], @deva[गोषाः] (@deva[गोषा] @deva[इन्द्रोनृषा] @deva[असि], @deva[ऋग्वेद] V), @deva[कूपखाः], @deva[शतखाः], @deva[सहस्रखाः], @deva[दधिकाः], @deva[अग्रेगा] @deva[उन्नेतणाम्]. The @deva[स] of @deva[सन्] changes to @deva[ष] by @ref[8.3.108] in @deva[गोषा]. With @deva[वन्] (@ref[3.2.75]): @deva[विजावा], @deva[अग्रेजावा]. The repetition of the word @deva[अनुनासिक] in this @deva[सूत्र] signals that the @deva[अनुदात्तोपदेश] limitation from @ref[6.4.37] does not apply here.
"""

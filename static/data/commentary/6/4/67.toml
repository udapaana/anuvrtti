id = "6.4.67"
numericId = "64067"

[en]
simple = """
For the same roots covered in the previous rule (@deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा], @deva[सा]), the final @deva[आ] becomes @deva[ए] in the Benedictive (@deva[आशीर्लिङ्]) active voice. This @deva[ए] substitution is exclusive to the benedictive and does not apply in other moods. Example: @deva[दा] → @deva[देयात्] 'may he give'; @deva[स्था] → @deva[स्थेयात्]; @deva[पा] → @deva[पेयात्].
"""

standard = """
In the @[benedictive] (@deva[आशीर्लिङ्]) Parasmaipada (active) forms, the final @deva[आ] of @deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा], and @deva[सा] is replaced by @deva[ए]. The rule applies only in the active voice — the passive benedictive uses the form derived under @ref[6.4.66]. Full paradigm sampler: @deva[देयात्] 'may he give', @deva[मेयात्], @deva[स्थेयात्] 'may he stand', @deva[गेयात्] 'may he go', @deva[पेयात्] 'may he drink'. The @deva[ए] substitution is extended optionally to other conjunct-initial roots by @ref[6.4.68].
"""

advanced = """
@deva[ए] replaces the final @deva[आ] of @deva[घु]-roots and @deva[मा], @deva[स्था], @deva[गा], @deva[पा], @deva[हा] (@deva[जुहाति]), @deva[सा] (@deva[सो]) in the benedictive (@deva[आशीर्लिङ्]) active: @deva[देयात्], @deva[मेयात्], @deva[धेयात्], @deva[स्थेयात्], @deva[गेयात्], @deva[पेयात्], @deva[अवसेयात्]. Before non-@deva[कित्] and non-@deva[ङित्] affixes: @deva[दासीष्ट], @deva[धासीष्ट]. The @deva[लिङ्] here denotes @deva[आशीर्लिङ्] (precative), whose personal endings are @deva[आर्धधातुक] by @ref[3.4.116]. Since only the @deva[परस्मैपद] affixes of the benedictive are @deva[कित्] (@ref[3.4.104]), this rule does not extend to @deva[आत्मनेपद] precative forms.
"""

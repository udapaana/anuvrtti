id = "6.4.29"
numericId = "64029"

[en]
simple = """
The nasal consonant is elided before @deva[क्विप्] and similar zero-suffix affixes in certain roots. This produces irregular-looking forms such as @deva[अवोद], @deva[एध], @deva[ओद्म], @deva[प्रश्रथ], and @deva[हिमश्रथ].
"""

standard = """
Certain roots show irregular elision of the nasal before @deva[क्वि] and zero-affixes, yielding forms not derivable by the regular phonological rules alone. The examples listed — @deva[अवोद] (from @deva[उन्द्]), @deva[एध] (from @deva[इन्ध्]), @deva[ओद्म] (from @deva[उन्द्] + @deva[म]), @deva[प्रश्रथ], @deva[हिमश्रथ] — are treated as established usage. See @ref[6.4.29].
"""

advanced = """
The forms @deva[अवोद], @deva[एध], @deva[ओद्म], @deva[प्रश्रथ], and @deva[हिमश्रथ] are irregularly formed with nasal elision. @deva[उन्द्]: @deva[अव] + @deva[उन्द्] + @deva[घञ्] = @deva[अवोदः]. @deva[इन्ध्] + @deva[घञ्] = @deva[एधः] — the @deva[गुण] here is irregular, since @ref[1.1.4] would have blocked it. @deva[उन्द्] + @deva[मन्] = @deva[ओद्म] (@deva[उणादि] @deva[मन्]). @deva[प्र] + @deva[श्रन्थ्] + @deva[घञ्] = @deva[प्रश्रथः] — the irregularity is the absence of @deva[वृद्धि]. Similarly @deva[हिमश्रथः].
"""

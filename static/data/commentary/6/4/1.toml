id = "6.4.1"
numericId = "64001"

[en]
simple = """
From this @[sūtra] through the end of @[adhyāya] 7, every rule applies to a stem (@deva[अङ्ग]) — the base form of a word before its endings are added. This is a governing rule (@[adhikāra]) that sets the scope for hundreds of operations: vowel changes, consonant alternations, augments, and replacements all target the stem itself, not the suffix or the whole word.
"""

standard = """
This is an @[adhikāra] @[sūtra]: the genitive @deva[अङ्गस्य] ('of the stem') governs all rules from @ref[6.4.1] through the end of @[adhyāya] 7 (@ref[7.4.97]). An @deva[अङ्ग] is a word-base that has taken at least one affix yet is still in its pre-final form, i.e., before the case or personal ending is added (defined at @ref[1.4.13]). All following operations — lengthening (@deva[दीर्घ]), deletion (@deva[लोप]), augment (@deva[आगम]), substitution (@deva[आदेश]) — apply specifically to the @deva[अङ्ग], not to the affix or the whole word. For example, @ref[6.4.2] lengthens the @deva[सम्प्रसारण] vowel of the stem: @deva[ह्वा] → @deva[हूतः], @deva[ज्या] → @deva[जीतः].
"""

advanced = """
This @deva[अधिकार] governs all rules from @ref[6.4.1] through the end of @deva[अध्याय] 7 (@ref[7.4.97]). In @ref[6.4.2], the @deva[सम्प्रसारण] vowel is lengthened: @deva[हूतः], @deva[जीतः], @deva[संवीतः] — the vowel preceded by a stem consonant undergoes @deva[दीर्घ]. In @deva[निर्] + @deva[वेञ्] + @deva[क्त] = @deva[निरुक्तम्], the vowel @deva[उ] is not lengthened because @deva[निर्] is an @[upasarga], not part of the @deva[अङ्ग]; likewise @deva[दुरुतम्]. In @ref[6.4.3], the final vowel is lengthened before @deva[नाम्]: @deva[अग्नीनाम्], @deva[वायूनाम्]. But not @deva[क्रिमिणाम्] @deva[पश्य] or @deva[पामनां] @deva[पश्य], since @deva[मि] and @deva[म] are not stem-finals — the stems are @deva[क्रिमिणा] and @deva[पामना] ('female having @deva[क्रिमि] or @deva[पामन्]'), formed by the @deva[न] affix (@ref[5.2.100]); @deva[क्रिमिणाम्] and @deva[पामनाम्] are accusative singular. In @ref[7.1.9], after @deva[अ], @deva[भिस्] becomes @deva[ऐस्]: @deva[वृक्षैः], @deva[प्लक्षैः]. The @deva[अ] must be final in an @deva[अङ्ग] — not in @deva[ब्राह्मणभिस्सा] or @deva[ओदनभिस्सदा], where @deva[भिस] does not follow an @deva[अङ्ग] (@deva[भिस्स] = boiled rice, @deva[भिस्सदा] = @deva[दधिः]). The maxim @deva[अर्थवद्ग्रहणे] @deva[नानर्थकस्य] does not apply here, for otherwise this @deva[सूत्र] would be unnecessary — in @ref[6.4.3], @deva[नाम्] as a meaningful affix would suffice without specifying @deva[अङ्ग]. The word @deva[अङ्गस्य] must be read into subsequent @deva[सूत्र]s for the following reasons: (1) @deva[सन्]/@deva[सम्प्रसारण] @deva[दीर्घ]: @ref[6.4.16] lengthens the vowel before @deva[सन्] — @deva[विवीषति] — but not in @deva[दधि] @deva[सनोति], where @deva[इ] of @deva[दधि] is not part of the @deva[अङ्ग]; similarly @deva[निरुक्त] as shown above. (2) @deva[एत्व] in @ref[6.4.68]: the optional @deva[आ] → @deva[ए] change applies to the @deva[अङ्ग] — @deva[ग्लेयात्] or @deva[ग्लायात्] — but not @deva[निर्यायात्] or @deva[निर्वायात्], where @deva[र्] belongs to the @deva[उपसर्ग], not the @deva[अङ्ग]. (3) @deva[तु] → @deva[तात्] in @ref[7.1.35]: @deva[तु] must be part of the @deva[अङ्ग] — @deva[जीवतु]/​@deva[जीवतात्] — not the particle @deva[तु] in @deva[जीव] @deva[तु] @deva[त्वम्]. (4) @deva[इयङ्]/@deva[उवङ्] substitution in @ref[6.4.77]: not applicable in @deva[श्यर्थम्] or @deva[वर्यम्]. (5) @deva[नुट्] augment in @ref[7.1.54]: not in @deva[कुमारी] @deva[आमिति] @deva[आह]. (6) Vowel shortening: @ref[7.4.13] shortens @deva[अण्] vowels before @deva[क] in the @deva[अङ्ग] — @deva[कुमारिका] — but not in @deva[कुमारी] @deva[कस्मै] @deva[स्पृहयति] or @deva[कुमारीकं]. (7) @deva[तत्व]: @ref[7.4.48] changes @deva[प्] to @deva[त्] in @deva[अप्] before @deva[भ] when @deva[अप्] is an @deva[अङ्ग] — @deva[अद्भिः] — but not @deva[अद्भारः], where @deva[अप्] is not @deva[अङ्ग]. In summary: @deva[सन्] @deva[सम्प्रसारण] @deva[दीर्घत्वैत्वतातार्ङयङुवङ्नुट] @deva[ह्रस्वत्व] @deva[तत्वे] @deva[च] @deva[अङ्गस्येत्यधिकारे] @deva[प्रयोजनं]. The genitive @deva[अङ्गस्य] does not carry only the @deva[स्थाने] @deva[योगः] force of @ref[1.1.49] but a broader relational sense. Alternatively, @deva[अङ्गस्य] functions as a bare @deva[प्रातिपदिक] without case-force, to be read with whatever case the context of each subsequent @deva[सूत्र] demands. In @ref[7.1.9] (@deva[अतो] @deva[भिस] @deva[ऐस्]), it is ablative: @deva[अकारान्ताद्] @deva[अङ्गाद्] @deva[भिसः] @deva[ऐस्]. It carries @deva[स्थानषष्ठी] force in @ref[6.4.36] (@deva[हन्तेर्ज], whole-word replacement), @deva[अवयवषष्ठी] force in @ref[6.4.89] (@deva[ऊदुपधाया] @deva[गोहः]), and @deva[निमित्तनिमित्ति] @deva[सम्बन्ध] in @ref[7.1.1] (@deva[युवोरनाकौ]).
"""

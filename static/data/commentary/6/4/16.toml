id = "6.4.16"
numericId = "64016"

[en]
simple = """
The stem vowel of a vowel-ending root, and of the roots @deva[हन्] and @deva[गम्], is lengthened before the Desiderative suffix @deva[सन्] when @deva[सन्] does not take the augment @deva[इट्]. For example, @deva[विवीषति] ('desires to enter') and @deva[जिघांसति] ('desires to kill').
"""

standard = """
Before the Desiderative affix @deva[सन्] that begins with a consonant (i.e., is @deva[झलादि], having no @deva[इट्] augment), the stem vowel of any vowel-ending @deva[अङ्ग] is lengthened, as are @deva[हन्] and @deva[गम्] specifically. Thus @deva[विश्] → @deva[विवीषति] (long @deva[ई]), @deva[हन्] → @deva[जिघांसति] (long @deva[आ]). This falls under the @[adhikāra] of @ref[6.4.1]. See @ref[6.4.16].
"""

advanced = """
The stem vowel is lengthened in vowel-final @deva[अङ्ग]s, as well as in @deva[हन्] and @deva[गम्], when the Desiderative @deva[सन्] follows as @deva[झलादि] (without the @deva[इट्] augment). For vowel-final roots: @deva[विवीषति], @deva[तुष्टूषति], @deva[चिकीर्षति], @deva[जिहीर्षति] (@ref[7.1.100]). For @deva[हन्] and @deva[गम्]: @deva[जिघांसति], @deva[अधिजिगांसते]. @[vārttika]: The rule applies specifically to the @deva[गम्] that substitutes for @deva[इङ्] (@ref[2.4.48], 'to study') — not to @deva[गम्] 'to go', hence not @deva[संजिगंसते] @deva[वत्सो] @deva[मात्रा] (cf. @ref[7.2.58]). In @deva[छन्दस्], however, @deva[स्वर्गे] @deva[लोकं] @deva[समजिगांसत्] shows lengthening even for @deva[गम्] 'to go', by @ref[6.3.137]. Alternatively, @deva[अच्] need not be read into the @deva[सूत्र] at all — reading it as @deva[हनगमां] @deva[सनि] ('lengthening of the stem before Desiderative @deva[सन्]') naturally applies to vowel-final stems (consonants cannot be lengthened), and extends to @deva[गम्] as a substitute of the vowel-stem @deva[इ] — eliminating the need for the @deva[वार्त्तिक].
"""

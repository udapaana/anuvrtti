id = "6.4.58"
numericId = "64058"

[en]
simple = """
In Vedic Sanskrit, the vowel @deva[उ] in roots @deva[यु] ('to join') and @deva[प्लु] ('to float') is lengthened to @deva[ऊ] before the absolutive @deva[ल्यप्]. This lengthening is a Vedic-only feature not found in classical Sanskrit. Examples: @deva[वियूय] ('having separated'), @deva[परिप्लूय] ('having floated around').
"""

standard = """
A Vedic-specific rule substitutes long @deva[ऊ] for @deva[उ] in @deva[यु] and @deva[प्लु] before the absolutive @deva[ल्यप्]. In classical Sanskrit, no such lengthening occurs: @deva[संयुत्य], @deva[आप्लुत्य] are the standard forms. The restriction to @deva[छन्दसि] (Vedic domain) marks this as an archaism preserved in the mantras. Compare @ref[6.4.59] for a similar lengthening applying to @deva[क्षि].
"""

advanced = """
In the @deva[छन्दस्], long @deva[ऊ] replaces @deva[उ] in roots @deva[यु] and @deva[प्लु]: @deva[दान्त्यनुपूर्वं] @deva[वियूय]; @deva[यत्रा] @deva[यो] @deva[दक्षिणा] @deva[परिप्लूय]. In secular literature, no lengthening occurs: @deva[संपुत्य], @deva[आप्लुत्य].
"""

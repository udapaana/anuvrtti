id = "6.4.161"
numericId = "64161"

[en]
simple = """
In six specific adjectives with @deva[ऋ] as their stem vowel — @deva[पृथु] ("wide"), @deva[मृदु] ("soft"), @deva[भृश] ("intense"), @deva[कृश] ("thin"), @deva[दृढ] ("firm"), @deva[परिवृढ] ("mighty") — the @deva[ऋ] is replaced by @deva[र्] before the degree suffixes @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्], provided that @deva[ऋ] is short and is preceded by a consonant. So @deva[पृथु] → @deva[प्रथिष्ठः] ("widest") and @deva[मृदु] → @deva[म्रदिष्टः] ("softest"). The @deva[ऋ] → @deva[र्] change creates a consonant cluster with the preceding consonant.
"""

standard = """
This rule applies to six stems — @deva[पृथु], @deva[मृदु], @deva[भृश], @deva[कृश], @deva[दृढ], @deva[परिवृढ] — before @deva[इष्ठ]/@deva[इमन्]/@deva[ईयस्]: when the vowel @deva[ऋ] is both (1) preceded by a consonant and (2) prosodially short (not @deva[दीर्घ]), it is substituted by @deva[र्]. The substitution converts @deva[ऋ] to the semivowel @deva[र्], forming a consonant cluster with the preceding consonant. Thus: @deva[पृथु] → @deva[प्रथ्] + @deva[इष्ठ] → @deva[प्रथिष्ठः]; @deva[मृदु] → @deva[म्रद्] + @deva[इष्ट] → @deva[म्रदिष्टः]. The prosodial-length condition excludes @deva[ऋ] that is phonologically long, preserving their regular treatment.
"""

advanced = """
Before @deva[इष्ठ], @deva[इमन्], and @deva[ईयस्], @deva[र्] replaces @deva[ऋ] in the stem when @deva[ऋ] is preceded by a consonant and is prosodially short (not lengthened by a following double consonant). @[kārikā]: @deva[पृथुं] @deva[मृदुं] @deva[भृशं] @deva[चैव] @deva[कृशं] @deva[च] @deva[दृढमेव] @deva[च] @deva[।] @deva[परिपूर्वं] @deva[वृढं] @deva[चैव] @deva[षडेतान्] @deva[रविधौ] @deva[स्मरेत्]. Forms: @deva[प्रथिष्ठः], @deva[प्रथीयान्], @deva[प्रथिमा] (from @deva[पृथु], by @ref[5.1.122]); @deva[म्रदिष्टः], @deva[म्रदीयान्], @deva[म्रदिमा]. The restriction to @deva[ऋ] excludes other vowels: @deva[पटिष्ठः] (no @deva[ऋ]). The consonant-precedence condition excludes: @deva[ऋजिष्ठः], @deva[ऋजीयान्] (@deva[ऋ] not preceded by consonant). The prosodial-shortness condition excludes: @deva[कृष्णिष्ठः], @deva[कृष्णीयान्], @deva[कृष्णिमा] (@deva[ऋ] lengthened by following cluster). The rule applies exclusively to these six stems: @deva[पृथु], @deva[मृदु], @deva[भृश], @deva[कृश], @deva[दृढ], @deva[परिवृढ]. It does not apply to @deva[कृत], @deva[मातृ], @deva[भ्रातृ], etc.: @deva[कृतमाचष्टे] = @deva[कृतयति], @deva[मातरमाचष्टे] = @deva[मातयति], @deva[भ्रातरमाचष्टे] = @deva[भ्रातयति].
"""

id = "6.1.156"
numericId = "61156"

[en]
simple = """
The word @deva[कारस्कर] means 'a tree' (a type of timber tree). It is formed with @deva[सुट्]. When not meaning the tree, the form without @deva[सुट्] is @deva[कारकर] ('doer/maker').
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[कारस्कर] meaning 'a tree' (used for timber). The derivation: @deva[कार] + @deva[कृ] + @deva[ट] (@ref[3.2.21]) with @deva[सुट्] → @deva[कारस्करः]. Without the tree meaning, @deva[कारकरः] ('maker of makers/skilled artisan') lacks @deva[सुट्]. Some grammarians don't recognize this as a @deva[सुट्] formation.
"""

advanced = """
The @deva[वृक्षे] restriction makes @deva[सुट्] obligatory only for the botanical meaning. The derivation with @deva[ट] affix (@ref[3.2.21]) produces an agent noun; @deva[सुट्] then distinguishes the tree name. The @deva[केचित्] ('some') reference indicates variant analyses—some treat @deva[कारस्कर] as having different morphological structure. The tree is identified as @deva[वञ्जुल] or similar timber species.
"""

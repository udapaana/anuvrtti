id = "6.1.85"
numericId = "61085"

[en]
simple = """
The single substitute (@deva[एकादेश]) is treated as both the final of the preceding form and the initial of the following form.
"""

standard = """
The @deva[एकादेश] shares properties of both replaced elements: it's considered the @deva[अन्त्य] (final) of the preceding and @deva[आदि] (initial) of the following. Since the @deva[स्थानिन्] (replaced element) in @deva[एकादेश] is the combination of both, this rule clarifies its @deva[द्विवचन] (dual) nature.
"""

advanced = """
This @deva[अतिदेश] defines the @deva[एकादेश]'s status: @deva[पूर्वान्त] and @deva[परादि] simultaneously. The @deva[स्थानिवद्भाव] issue: in @deva[एकादेश], the @deva[स्थानिन्] = @deva[पूर्व] + @deva[पर] combined. This rule ensures the substitute inherits properties of both—final of first, initial of second. Operations depending on either position can apply.
"""

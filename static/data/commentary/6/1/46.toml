id = "6.1.46"
numericId = "61046"

[en]
simple = """
The diphthong of @deva[व्ये] (to cover) does not become @deva[आ] before Perfect affixes. Examples: @deva[संविव्याय], @deva[संविव्ययिथ].
"""

standard = """
Before @deva[लिट्], @deva[व्ये] retains its diphthong (no @deva[आ]-substitution by @ref[6.1.45]): @deva[संविव्याय], @deva[संविव्ययिथ]. The @deva[अभ्यास] vocalizes by @ref[6.1.17]. The @deva[वृद्धि] in @deva[संविव्याय] occurs by @ref[7.2.115] before @deva[णित्] affix @deva[णल्].
"""

advanced = """
This @deva[प्रतिषेध] blocks @ref[6.1.45] @deva[एच् → आ] for @deva[व्ये] before @deva[लिट्]. Derivation: @deva[सम्] + @deva[व्ये] → @deva[विव्ये] (reduplication, @deva[अभ्यास]-@deva[संप्रसारण] by @ref[6.1.17]) → @deva[संविव्याय] (@deva[वृद्धि] by @ref[7.2.115] before @deva[णित् णल्]). Weak: @deva[संविव्ययिथ]. The @deva[ए] doesn't become @deva[आ].
"""

id = "6.1.113"
numericId = "61113"

[en]
simple = """
When @deva[रु] (the @deva[र्] that replaces final @deva[स्]) has short @deva[अ] both before and after it, @deva[उ] becomes the substitute. So @deva[रामस् + अत्र] becomes @deva[रामोऽत्र] where @deva[अ + उ] → @deva[ओ].
"""

standard = """
This @[sūtra] handles sandhi involving @deva[रु]—the @deva[र्] + inherent @deva[उ] that replaces word-final @deva[स्] by @ref[8.2.66]. When non-@deva[प्लुत] (non-prolonged) @deva[अ] occurs both before and after @deva[रु], @deva[उ] is the single substitute. Thus @deva[रामस् + अत्र] → @deva[रामर् + अत्र] → @deva[राम + उ + अत्र] → @deva[रामोऽत्र] (with @deva[अ + उ] → @deva[ओ] by @deva[गुण]).
"""

advanced = """
The technical sequence is: @deva[स्] → @deva[रु] (@ref[8.2.66]), then @deva[अ-रु-अ] → @deva[अ-उ-zero]. The @deva[अप्लुत] condition excludes @deva[प्लुत] (prolonged) vowels used in Vedic calling. The phrase @deva[पूर्वपरयोः] indicates both flanking vowels must be short @deva[अ]. This @deva[उ]-substitution then undergoes @deva[गुण] with the preceding @deva[अ] to yield @deva[ओ]. The subsequent @deva[अ] is elided, shown by @deva[अवग्रह].
"""

id = "6.1.125"
numericId = "61125"

[en]
simple = """
@deva[प्लुत] vowels (prolonged for calling, like @deva[आ३]) and @deva[प्रगृह्य] vowels (marked for non-sandhi, like dual endings) remain unchanged when followed by another vowel. So @deva[देवदत्ता३ + एहि] stays as @deva[देवदत्ता३ एहि].
"""

standard = """
This @[sūtra] establishes that @deva[प्लुत] (prolonged, @ref[8.2.82]) and @deva[प्रगृह्य] (held apart, @ref[1.1.11]-@ref[1.1.19]) vowels undergo @deva[प्रकृतिभाव]—they resist sandhi with following vowels. Examples: @deva[देवदत्ता३ एहि] (calling with @deva[प्लुत]); @deva[हरी एतौ] (dual @deva[ई] is @deva[प्रगृह्य]).
"""

advanced = """
Both @deva[प्लुत] and @deva[प्रगृह्य] are prosodically or morphologically marked vowels that retain their identity across word boundaries. @deva[प्लुत] involves trimoraic lengthening for vocative/calling contexts. @deva[प्रगृह्य] includes dual endings (@deva[ई], @deva[ऊ], @deva[ए] of dual), particles (@deva[आ], @deva[उ], @deva[ओ] exclamatory), and certain forms. This rule prevents their phonological 'absorption' in sandhi.
"""

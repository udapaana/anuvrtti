id = "6.1.40"
numericId = "61040"

[en]
simple = """
The semivowel of @deva[वे] (to weave) is not vocalized in the Perfect. Examples: @deva[ववौ] (he wove), @deva[ववतुः], @deva[ववुः].
"""

standard = """
The root @deva[वे] belongs to @deva[यजादि] and would normally vocalize before @deva[कित्] by @ref[6.1.15], and its @deva[अभ्यास] would vocalize before non-@deva[कित्] by @ref[6.1.17]. Both are prohibited here: @deva[ववौ], @deva[ववतुः], @deva[ववुः].
"""

advanced = """
This @deva[प्रतिषेध] blocks two @deva[संप्रसारण] sources for @deva[वे उतौ] (weaving): (1) @ref[6.1.15] @deva[यजादि]-@deva[संप्रसारण] before @deva[कित्]; (2) @ref[6.1.17] @deva[अभ्यास]-@deva[संप्रसारण] before non-@deva[कित्] @deva[लिट्]. Result: @deva[वे] → @deva[ववे] → @deva[ववौ] (@deva[गुण]), @deva[ववतुः], @deva[ववुः]. No @deva[व्] → @deva[उ] anywhere.
"""

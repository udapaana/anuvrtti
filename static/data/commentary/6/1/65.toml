id = "6.1.65"
numericId = "61065"

[en]
simple = """
A root listed with initial @deva[ण्] in the @deva[धातुपाठ] substitutes @deva[न्] for that @deva[ण्]. Examples: @deva[णीञ्] → @deva[नयति]; @deva[णम्] → @deva[नमति]; @deva[णह्] → @deva[नह्यति].
"""

standard = """
Roots with @deva[उपदेश]-initial @deva[ण्] change it to @deva[न्]: @deva[णी] → @deva[नयति]; @deva[णम्] → @deva[नमति]; @deva[णह्] → @deva[नह्यति]. Not for non-initial: @deva[अण्] → @deva[अणति]. Not for denominatives: @deva[णकारमिच्छति] → @deva[णकारीयति]. By @ref[8.4.14], these roots revert to @deva[ण्] after certain prefixes.
"""

advanced = """
Similar to @ref[6.1.64], roots are listed with @deva[ण्] for @ref[8.4.14] @deva[णत्व] after @deva[रषाभ्याम्]: @deva[प्रणमति], @deva[प्रणयति]. @deva[धात्वादेः] understood: only initial @deva[ण्]. @deva[नामधातु] excluded: @deva[णकारीयति]. All @deva[णादि] roots: @deva[णी], @deva[णम्], @deva[णह्], etc.
"""

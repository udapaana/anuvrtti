id = "6.1.82"
numericId = "61082"

[en]
simple = """
@deva[क्रय्य] (saleable) shows @deva[ए] → @deva[अय्] when meaning 'put up for sale'. Example: @deva[क्रय्या गौः] (a cow for sale). Otherwise: @deva[क्रेयं नो धान्यम्] (we need to buy grain).
"""

standard = """
The root @deva[क्री] + @deva[यत्] shows @deva[ए] → @deva[अय्] when meaning 'offered for sale' (@deva[तदर्थ] = for buying): @deva[क्रय्या गौः], @deva[क्रय्यः कम्बलः]. When meaning 'to be bought' (necessity): @deva[क्रेयं नो धान्यं न चास्ति क्रय्यम्] 'we need to buy grain, but none is for sale'.
"""

advanced = """
This @deva[नियम] for @deva[क्री + यत्]: @deva[विक्रयार्थ] (for sale): @deva[क्रय्यम्] (with @deva[ए] → @deva[अय्]). @deva[क्रयार्थ] (to be bought): @deva[क्रेयम्] (standard). The minimal pair: @deva[क्रय्यम्] = 'saleable'; @deva[क्रेयम्] = 'needing to be purchased'.
"""

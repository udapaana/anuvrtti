id = "6.1.155"
numericId = "61155"

[en]
simple = """
The words @deva[कास्तर] and @deva[अजस्तुन्द] are names of cities, formed with @deva[सुट्]. When not referring to cities, the forms without @deva[सुट्] are @deva[कातीर] ('bank/shore') and @deva[अजतुन्द] ('goat-belly').
"""

standard = """
This @[sūtra] provides @deva[सुट्] for city names @deva[कास्तर] and @deva[अजस्तुन्द]. Without the city-name meaning: @deva[कातीरम्] means 'having a slight bank' (@deva[ईषत् तीरम्]); @deva[अजतुन्दम्] means 'having a belly like a goat's' (@deva[अजस्येव तुन्दम्]). The @deva[सुट्] marks the proper noun status.
"""

advanced = """
The @deva[सुट्] creates semantic distinction: with @deva[सुट्], these are toponyms (place names); without, they are descriptive compounds. @deva[कास्तर] (city) vs. @deva[कातीर] (shore-related); @deva[अजस्तुन्द] (city) vs. @deva[अजतुन्द] (goat-bellied). This exemplifies how @deva[सुट्] can function as a proper-noun marker in certain lexical items.
"""

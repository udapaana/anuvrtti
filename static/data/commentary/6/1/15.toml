id = "6.1.15"
numericId = "61015"

[en]
simple = """
The roots @deva[वच्], @deva[स्वप्], and the @deva[यजादि] group undergo @deva[संप्रसारण] (semivowel → vowel) before @deva[कित्] affixes. Examples: @deva[वच्] + @deva[क्त] → @deva[उक्त]; @deva[स्वप्] → @deva[सुप्त]; @deva[यज्] → @deva[इष्ट].
"""

standard = """
The @deva[ष्यङ्] @deva[अनुवृत्ति] does not continue here. @deva[वच्] includes both @deva[वच् परिभाषणे] (II.54) and the @deva[वच्]-substitute of @deva[ब्रू] (@ref[2.4.53]). @deva[स्वप्] is @deva[ञिष्वप् शये] (II.59). @deva[यजादि] are the last nine roots of @deva[भ्वादि गण]: @deva[यज्], @deva[वप्], @deva[वह्], @deva[वस्], @deva[वे], @deva[व्ये], @deva[ह्वे], @deva[वद्], @deva[श्वि]. Examples: @deva[उक्त], @deva[सुप्त], @deva[इष्ट], @deva[उप्त], @deva[ऊढ], @deva[उषित], @deva[उत], @deva[ऊत], @deva[हूत], @deva[उदित], @deva[शून].
"""

advanced = """
@deva[संप्रसारण] occurs for @deva[वच्]/@deva[स्वप्]/@deva[यजादि] before @deva[कित्] affixes. @deva[यजादि] (9 roots from @deva[भ्वादि] end): @deva[यज्], @deva[वप्], @deva[वह्], @deva[वस्], @deva[वे], @deva[व्ये], @deva[ह्वे], @deva[वद्], @deva[श्वि]. Derivations: @deva[वच्] → @deva[उच्] → @deva[उक्त] (@deva[च्] → @deva[क्] by @ref[8.2.30]); @deva[स्वप्] → @deva[सुप्] → @deva[सुप्त]; @deva[यज्] → @deva[इज्] → @deva[इष्ट] (@deva[ज्] → @deva[ष्] by @ref[8.2.36]); @deva[वप्] → @deva[उप्त]; @deva[वह्] → @deva[उह्] → @deva[ऊढ] (@deva[ह्] → @deva[ढ्], @deva[दीर्घ] by @ref[6.4.2]). The @deva[कित्] affixes include @deva[क्त], @deva[क्त्वा], @deva[क्तिन्], etc.
"""

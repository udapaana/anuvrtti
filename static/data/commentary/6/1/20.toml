id = "6.1.20"
numericId = "61020"

[en]
simple = """
The root @deva[वश्] does NOT undergo @deva[संप्रसारण] before @deva[यङ्]. Example: @deva[वावश्यते] (shines intensely), not @deva[*वोशुय्यते].
"""

standard = """
This is an exception to @ref[6.1.16] for the Intensive. Before @deva[यङ्], @deva[वश्] retains its semivowel: @deva[वावश्यते], @deva[वावश्येते], @deva[वावश्यन्ते]. Before @deva[कित्] affixes, @deva[संप्रसारण] still applies: @deva[उष्टः], @deva[उशन्ति].
"""

advanced = """
This @[sūtra] blocks @ref[6.1.16] @deva[संप्रसारण] for @deva[वश्] specifically before @deva[यङ्]. The Intensive forms: @deva[वावश्यते], @deva[वावश्येते], @deva[वावश्यन्ते]. The @deva[कित्]-triggered @deva[संप्रसारण] remains: @deva[उष्टः] (@deva[क्त]), @deva[उशन्ति] (@deva[शतृ] is @deva[ङित्]). This preserves the distinct Intensive formation for this root.
"""

id = "6.1.84"
numericId = "61084"

[en]
simple = """
From this @[sūtra] through @ref[6.1.111], the phrase 'a single substitute replaces both the preceding and following' should be understood. This governs @deva[एकादेश] (single-substitute) rules.
"""

standard = """
This @deva[अधिकार] extends through @ref[6.1.111]. In all @deva[एकादेश] rules within this section, one element replaces two consecutive elements—the preceding and following merge into a single substitute. Example: @ref[6.1.87] teaches @deva[गुण] for @deva[अ/आ] + vowel: @deva[तव] + @deva[इदम्] → @deva[तवेदम्].
"""

advanced = """
This @deva[अधिकार] (@deva[पूर्वपरयोरेकादेशः]) governs @ref[6.1.84]-@ref[6.1.111]. The @deva[एकादेश] replaces both @deva[पूर्व] (preceding) and @deva[पर] (following). Example: @deva[अ + इ] → @deva[ए] (@deva[गुण] by @ref[6.1.87])—the @deva[ए] replaces both @deva[अ] and @deva[इ].
"""

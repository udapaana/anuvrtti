id = "6.1.181"
numericId = "61181"

[en]
simple = """
In Classical Sanskrit (@deva[भाषा]), the accent rule for numerals (@ref[6.1.179]-@ref[6.1.180]) is optional. The case endings after @deva[षट्], @deva[त्रि], and @deva[चतुर्] may or may not take the penultimate accent.
"""

standard = """
This @[sūtra] makes @ref[6.1.179]-@ref[6.1.180]'s numeral accent rules optional in @deva[भाषा] (Classical/secular language). The @deva[झलादि] (consonant-initial) case endings after @deva[षट्], @deva[त्रि], @deva[चतुर्] may have penultimate accent or not. Vedic strictly applies the rules; Classical allows variation.
"""

advanced = """
The @deva[भाषायां विभाषा] indicates that Classical Sanskrit relaxes the mandatory numeral accent patterns. In Vedic, @ref[6.1.179]-@ref[6.1.180] apply strictly; in @deva[भाषा], either accented or unaccented endings are acceptable. This reflects the general loss of distinctive accent in Classical Sanskrit, where these rules become optional markers rather than obligatory features.
"""

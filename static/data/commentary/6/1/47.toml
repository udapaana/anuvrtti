id = "6.1.47"
numericId = "61047"

[en]
simple = """
The roots @deva[स्फुर्] and @deva[स्फुल्] (to move/throb) substitute @deva[आ] for their diphthong before @deva[घञ्]. Examples: @deva[विस्फारः] (not @deva[विस्फोरः]); @deva[विस्फालः] (not @deva[विस्फोलः]).
"""

standard = """
Before @deva[घञ्], @deva[स्फुर्] and @deva[स्फुल्] take @deva[आ] for the @deva[ओ] that arises from @deva[गुण]: @deva[विस्फारः], @deva[विस्फालः]. By @ref[8.3.76], @deva[स] optionally becomes @deva[ष] after @deva[वि]: @deva[विष्फारः], @deva[विष्फालः].
"""

advanced = """
This @[sūtra] forces @deva[ओ] → @deva[आ] for @deva[स्फुर्]/@deva[स्फुल्] before @deva[घञ्]. Process: @deva[स्फुर्] → @deva[स्फोर्] (@deva[गुण]) → @deva[स्फार्] (@deva[ओ] → @deva[आ]) + @deva[अ] (@deva[घञ्]) → @deva[विस्फारः]. Optional @deva[षत्व] by @ref[8.3.76]: @deva[विष्फारः]. Similarly @deva[विस्फालः]/@deva[विष्फालः].
"""

id = "6.1.171"
numericId = "61171"

[en]
simple = """
The same non-strong case endings have acute accent after stems ending in @deva[वाह्] ('carrying'), after @deva[इदम्] ('this'), after @deva[पद्]-group stems, after @deva[अप्] ('water'), and after @deva[पुंस्] ('man').
"""

standard = """
This @[sūtra] extends @deva[उदात्त] on @deva[असर्वनामस्थान] endings to several stem types: @deva[वाह्]-final (@deva[देववाह्]), @deva[इदम्] (demonstrative), @deva[पदादि] (stems from @ref[6.1.63]'s group), @deva[अप्] ('water'), and @deva[पुंस्] ('man'). These stems take accented endings in weak cases.
"""

advanced = """
The listing @deva[वाहि इदमि पदादीनां षष्ठ्यन्तादाकारात् अपो पुंसः] enumerates: (1) @deva[वाह्]-finals like @deva[देववाह्], (2) @deva[इदम्] (declines irregularly), (3) @deva[पदादि] group through @ref[6.1.63], (4) @deva[अप्] (water, plural only), (5) @deva[पुंस्] (man). Each has @deva[उदात्त] on @deva[असर्वनामस्थान] endings. These represent irregular accent patterns for specific stems.
"""

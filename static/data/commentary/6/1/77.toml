id = "6.1.77"
numericId = "61077"

[en]
simple = """
The vowels @deva[इ], @deva[उ], @deva[ऋ], @deva[ऌ] (short or long) become @deva[य्], @deva[व्], @deva[र्], @deva[ल्] respectively when followed by a dissimilar vowel. Examples: @deva[दधि] + @deva[अत्र] → @deva[दध्यत्र]; @deva[मधु] + @deva[अत्र] → @deva[मध्वत्र].
"""

standard = """
The @deva[इक्] vowels (@deva[इ], @deva[उ], @deva[ऋ], @deva[ऌ], long or short) become their corresponding semivowels before a following vowel: @deva[इ/ई] → @deva[य्]; @deva[उ/ऊ] → @deva[व्]; @deva[ऋ/ॠ] → @deva[र्]; @deva[ऌ] → @deva[ल्]. Examples: @deva[दध्यत्र], @deva[मध्वत्र], @deva[कर्त्रर्थम्], @deva[हर्त्रर्थम्], @deva[लाकृति]. This is restricted by @ref[6.1.101]—not when followed by a vowel of the same class.
"""

advanced = """
This @deva[यण्]-sandhi applies to @deva[इक्] (@deva[इ उ ऋ ऌ], short/long) before @deva[अच्]. Restriction by @ref[6.1.101]: not before @deva[सवर्ण]. Thus @deva[इ] + @deva[इ] → @deva[ई] (not @deva[*यि]). Examples: @deva[दधि + अत्र] → @deva[दध्यत्र]; @deva[मधु + अत्र] → @deva[मध्वत्र]; @deva[कर्तृ + अर्थम्] → @deva[कर्त्रर्थम्]; @deva[ऌ] + @deva[आकृति] → @deva[लाकृति].
"""

id = "6.1.91"
numericId = "61091"

[en]
simple = """
@deva[वृद्धि] is the single substitute when @deva[अ/आ] of a prefix (@deva[उपसर्ग]) is followed by short @deva[ऋ] of a verb. Examples: @deva[उप] + @deva[ऋच्छति] → @deva[उपार्च्छति]; @deva[प्र] + @deva[ऋच्छति] → @deva[प्रार्च्छति].
"""

standard = """
When an @deva[उपसर्ग] ending in @deva[अ/आ] precedes a @deva[धातु] beginning with @deva[ऋ], @deva[वृद्धि] (@deva[आर्]) replaces both. This overrides @deva[गुण] (@ref[6.1.87]). Examples: @deva[उपार्च्छति], @deva[प्रार्च्छति], @deva[उपाध्रोति]. Not for non-@deva[उपसर्ग]: @deva[खट्वा] + @deva[ऋच्छति] → @deva[खट्वर्च्छति] (@deva[गुण], not @deva[वृद्धि]).
"""

advanced = """
@deva[आत्] and @deva[उपसर्गात्] understood. @deva[उपसर्ग] + @deva[ह्रस्व ऋ धातु] → @deva[वृद्धि आर्]. This supersedes @ref[6.1.87] @deva[गुण]. Examples: @deva[उप + ऋच्छति] → @deva[उपार्च्छति]; @deva[प्र + ऋच्छति] → @deva[प्रार्च्छति]; @deva[उप + अध्रोति] → @deva[उपाध्रोति]. Non-@deva[उपसर्ग] triggers @deva[गुण]: @deva[खट्वर्च्छति].
"""

id = "6.1.208"
numericId = "61208"

[en]
simple = """
The word @deva[रिक्त] ('empty') may optionally have acute accent on the first syllable. So @deva[रि꣡क्तः] or @deva[रिक्त꣡ः] are both valid.
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] for @deva[रिक्त] ('empty', from @deva[रिच्] 'to empty'). Both @deva[रि꣡क्तः] (first-syllable accent) and @deva[रिक्त꣡ः] (default participle accent) are acceptable. This overrides @ref[6.1.204]-@ref[6.1.205].
"""

advanced = """
The @deva[रिक्तस्य वा] provides @deva[विकल्प] for @deva[रिक्त]. The optionality means either @deva[आद्युदात्त] (@deva[रि꣡क्त]) or default @deva[निष्ठा] accent (@deva[रिक्त꣡]) applies. This @deva[अपवाद] to @ref[6.1.204]-@ref[6.1.205] shows lexical accent variation for this specific participle.
"""

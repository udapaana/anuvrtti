id = "6.1.16"
numericId = "61016"

[en]
simple = """
The roots @deva[ग्रह्], @deva[ज्या], @deva[वय्], @deva[व्यध्], @deva[वश्], @deva[व्यच्], @deva[व्रश्च्], @deva[प्रच्छ्], and @deva[भ्रस्ज्] undergo @deva[संप्रसारण] before @deva[कित्] or @deva[ङित्] affixes. Examples: @deva[गृहीतः], @deva[जीर्णः], @deva[उतः], @deva[विद्धः], @deva[उशितः], @deva[पृष्टः], @deva[भृष्टः].
"""

standard = """
These nine roots (@deva[ग्रहादि]) undergo @deva[संप्रसारण] before @deva[कित्]/@deva[ङित्] affixes (the @deva[च] in @[sūtra] brings @deva[किति] from @ref[6.1.15]). Examples: @deva[ग्रह्] → @deva[गृहीतः], @deva[गृह्णाति] (@ref[1.2.4]); @deva[ज्या] → @deva[जीर्णः] (@deva[न]-substitution by @ref[8.2.45]); @deva[वय्] → @deva[उतः]; @deva[व्यध्] → @deva[विद्धः]; @deva[वश्] → @deva[उशितः]; @deva[व्यच्] → @deva[विचितः]; @deva[व्रश्च्] → @deva[वृक्णः]; @deva[प्रच्छ्] → @deva[पृष्टः]; @deva[भ्रस्ज्] → @deva[भृष्टः].
"""

advanced = """
The @deva[ग्रहादि] class (9 roots) takes @deva[संप्रसारण] before @deva[कित्]/@deva[ङित्]. The @deva[च] draws @deva[किति] from @ref[6.1.15]. Derivations: @deva[ग्रह्] → @deva[गृह्] → @deva[गृहीतः] (@deva[इट्] by @ref[7.2.37]); @deva[ज्या] → @deva[जि] → @deva[जीर्णः] (@deva[दीर्घ] @ref[6.4.2], @deva[त] → @deva[न] @ref[8.2.45]); @deva[वय्] → @deva[उय्] → @deva[उतः]; @deva[व्यध्] → @deva[विध्] → @deva[विद्धः]; @deva[वश्] → @deva[उश्] → @deva[उशितः]; @deva[व्यच्] → @deva[विच्] → @deva[विचितः]; @deva[व्रश्च्] → @deva[वृश्च्] → @deva[वृक्णः] (@deva[श्च्] → @deva[क्] by @ref[8.2.36]); @deva[प्रच्छ्] → @deva[पृच्छ्] → @deva[पृष्टः]; @deva[भ्रस्ज्] → @deva[भृस्ज्] → @deva[भृष्टः]. Also @deva[ङित्]: @deva[गृह्णाति] (@ref[1.2.4]).
"""

id = "6.1.92"
numericId = "61092"

[en]
simple = """
According to @[āpiśali], @deva[वृद्धि] is optional when @deva[अ/आ] of a prefix is followed by @deva[ऋ] of a denominative verb. Examples: @deva[उपार्षभीयति] or @deva[उपर्षभीयति]; @deva[उपाल्कारीयति] or @deva[उपल्कारीयति].
"""

standard = """
For @deva[नामधातु] (denominative) beginning with @deva[ऋ], @deva[वृद्धि] after @deva[उपसर्ग] is optional per @[āpiśali]: @deva[उपार्षभीयति] or @deva[उपर्षभीयति]; @deva[उपाल्कारीयति] or @deva[उपल्कारीयति]. The @deva[ऋ] and @deva[ऌ] are @deva[सवर्ण], so @deva[ऋ] in @ref[6.1.91] includes @deva[ऌ]. @[āpiśali]'s name is honorary; @deva[वा] alone would suffice.
"""

advanced = """
This @deva[आपिशलि-विभाषा] for @deva[नामधातु]: @deva[उपसर्ग] + @deva[ऋ/ऌ-आदि नामधातु] → optional @deva[वृद्धि]. @deva[ऋषभ] → @deva[ऋषभीय] (denominative) → @deva[उपार्षभीयति]/@deva[उपर्षभीयति]. @deva[ऋ-ऌ सावर्ण्य] extends the rule to @deva[ऌ]-initial. The grammarian's name adds authority but doesn't change the @deva[विभाषा] function.
"""

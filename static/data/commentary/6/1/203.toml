id = "6.1.203"
numericId = "61203"

[en]
simple = """
The words @deva[वृष] ('bull'), @deva[जन] ('person'), @deva[ज्वर] ('fever'), and others in this list have acute accent on the first syllable. So @deva[व꣡ृषः], @deva[ज꣡नः], @deva[ज्व꣡रः].
"""

standard = """
This @[sūtra] lists @deva[वृषादि] words with @deva[आद्युदात्त]: @deva[व꣡ृषः] ('bull'), @deva[ज꣡नः] ('person'), @deva[ज्व꣡रः] ('fever'), @deva[ग्र꣡हः] ('planet/seizure'), @deva[ह꣡यः] ('horse'), etc. These @deva[घञ्]-formations exceptionally take first-syllable accent.
"""

advanced = """
The @deva[वृषादि] @deva[गण] lists @deva[घञ्]-derivatives with @deva[आद्युदात्त] instead of the usual @deva[घञ्] accent pattern. The list includes: @deva[वृष], @deva[जन], @deva[ज्वर], @deva[ग्रह], @deva[हय], etc. These are @deva[निपातन] (listed forms) whose accent must be memorized. The @deva[आदि] ('etc.') indicates an open-ended @deva[गण].
"""

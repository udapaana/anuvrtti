id = "6.1.132"
numericId = "61132"

[en]
simple = """
After @deva[एतद्] ('this') and @deva[तद्] ('that'), the nominative singular @deva[स्] is dropped before a consonant—except when combined with @deva[क] affixes or @deva[चिद्/चन]. So @deva[एतद् + स्] + consonant = @deva[एतद्] (not @deva[एतस्]).
"""

standard = """
This @[sūtra] provides @deva[सु]-lopa (nominative @deva[स्] deletion) for @deva[एतद्] and @deva[तद्] before consonants. The rule excludes @deva[क]-affixed forms (@ref[5.3.71]) and @deva[चिद्]/@deva[चन] combinations. Thus @deva[एतद्] before consonant = @deva[एतद्] (not @deva[एषः/तस्]). Examples: @deva[एतद् ब्रह्म], @deva[तद् विष्णोः].
"""

advanced = """
The @deva[हल्] condition (before consonants) triggers @deva[सु]-lopa, yielding the bare stem. The exceptions (@deva[अकि चिन्तेः]) preserve @deva[स्] in forms like @deva[एषः किम्], @deva[स चिद्]. The @deva[तसिलुकि] reference (@ref[5.3.7]) concerns adverbial formations. This rule creates the neuter-like nominative forms @deva[तद्], @deva[एतद्] before consonants, distinct from masculine @deva[सः], @deva[एषः].
"""

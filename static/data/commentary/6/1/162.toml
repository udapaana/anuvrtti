id = "6.1.162"
numericId = "61162"

[en]
simple = """
A verb root has acute accent (@deva[उदात्त]) on its final syllable. So @deva[पच्] ('to cook') is accented @deva[प꣡च्], and in forms like @deva[प꣡चति], the root syllable carries the high tone.
"""

standard = """
This @[sūtra] establishes that @deva[धातु] (verb roots) are @deva[अन्तोदात्त] (final-syllable accented). Examples: @deva[प꣡चति], @deva[प꣡ठति], @deva[ऊर्णो꣡ति], @deva[गोपाय꣡ति], @deva[या꣡ति]. The @deva[अन्त] from context means the root's final vowel/syllable bears @deva[उदात्त].
"""

advanced = """
This fundamental rule assigns @deva[अन्तोदात्त] to all @deva[धातु]. The examples show monosyllabic (@deva[पच्], @deva[पठ्], @deva[या]) and polysyllabic (@deva[ऊर्णु], @deva[गोपाय]) roots—all with final accent. This accent may surface or be overridden depending on affixes. The @deva[धातुस्वर] serves as the base accent for verbal derivation; @deva[कृत्/तद्धित] affixes may impose their own accent patterns.
"""

id = "6.1.185"
numericId = "61185"

[en]
simple = """
An affix with indicatory @deva[त्] produces @deva[स्वरित] (circumflex) accent. So @deva[यत्] (affix) gives @deva[चिकीर्ष्य॑म्] ('desirable to do') with circumflex on the affix syllable.
"""

standard = """
This @[sūtra] assigns @deva[स्वरित] (circumflex) to @deva[तित्] affixes (those with @deva[त्] as @deva[इत्]). Examples: @deva[यत्] (@ref[3.1.97]) → @deva[चिकी॒र्ष्य॑म्], @deva[जिही॒र्ष्य॑म्]; @deva[ण्यत्] → @deva[कार्य॑म्], @deva[हार्य॑म्]. The @deva[त्] marker indicates circumflex accent.
"""

advanced = """
The @deva[तित्] marker class includes @deva[यत्], @deva[ण्यत्], @deva[क्यप्], and similar affixes. The @deva[स्वरित] accent is the 'mixed' or 'falling' tone, combining @deva[उदात्त] and @deva[अनुदात्त]. In Vedic recitation, @deva[स्वरित] syllables have a distinctive contour. Forms like @deva[कार्य॑म्] show the @deva[स्वरित] on the affix-containing syllable.
"""

id = "6.1.94"
numericId = "61094"

[en]
simple = """
For @deva[अ/आ] of a prefix + @deva[ए/ओ] of a verbal root, the second vowel (@deva[पररूप]) is the single substitute. Examples: @deva[उप] + @deva[एलयति] → @deva[उपेलयति]; @deva[प्र] + @deva[ओषति] → @deva[प्रोषति].
"""

standard = """
When @deva[उपसर्ग]-final @deva[अ/आ] precedes @deva[ए/ओ]-initial @deva[धातु], @deva[पररूप] (the second vowel) replaces both: @deva[उप + एलयति] → @deva[उपेलयति]; @deva[प्र + एलयति] → @deva[प्रेलयति]; @deva[उप + ओषति] → @deva[उपोषति]; @deva[प्र + ओषति] → @deva[प्रोषति]. This overrides @deva[वृद्धि] (@ref[6.1.88]). Some extend @ref[6.1.92] optionality here.
"""

advanced = """
@deva[आत्] and @deva[उपसर्गाद् धातौ] understood. @deva[उपसर्ग (अत्/आत्)] + @deva[धातु (एच् आदि)] → @deva[पररूप]. Overrides @ref[6.1.88] @deva[वृद्धि]. @deva[उपेलयति], @deva[प्रेलयति], @deva[उपोषति], @deva[प्रोषति]. Some read @ref[6.1.92] @deva[विभाषा] here: @deva[उपैलयति]/@deva[उपेलयति] optionally.
"""

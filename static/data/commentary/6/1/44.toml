id = "6.1.44"
numericId = "61044"

[en]
simple = """
When @deva[व्ये] is preceded by @deva[परि], @deva[संप्रसारण] before @deva[ल्यप्] is optional. Examples: @deva[परिवीय यूपम्] or @deva[परिव्याय].
"""

standard = """
With @deva[परि], @deva[व्ये] optionally vocalizes before @deva[ल्यप्]: @deva[परिवीय यूपम्] (with @deva[संप्रसारण]) or @deva[परिव्याय] (without). The @deva[तुक्]-augment (@ref[6.1.71]) is blocked by @ref[6.4.2] which causes vowel lengthening instead.
"""

advanced = """
This @deva[विभाषा] for @deva[परि] + @deva[व्ये] + @deva[ल्यप्]: with @deva[संप्रसारण]: @deva[व्ये] → @deva[वि] → @deva[वी] (@ref[6.4.2] lengthening) + @deva[य] → @deva[परिवीय]. Without: @deva[परिव्याय]. The @deva[तुक्]-augment (@ref[6.1.71]) is debarred by @ref[6.4.2] being @deva[परसूत्र] (subsequent @[sūtra] takes precedence).
"""

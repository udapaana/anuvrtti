id = "6.1.107"
numericId = "61107"

[en]
simple = """
When a simple vowel (@deva[अक्]) is followed by the @deva[अ] of the accusative ending @deva[अम्], the first vowel remains as the single substitute. So @deva[वृक्ष + अम्] becomes @deva[वृक्षम्], not @deva[वृक्षाम्].
"""

standard = """
This @[sūtra] specifies @deva[पूर्वरूप] (retention of the first vowel as the single substitute) when any simple vowel (@deva[अक्] = @deva[अ इ उ ऋ ऌ]) is followed by the @deva[अ] of the accusative ending @deva[अम्]. The term @deva[अक्] continues from @ref[6.1.101]. Example: @deva[वृक्ष + अम्] → @deva[वृक्षम्], where the stem-final @deva[अ] absorbs the case-ending @deva[अ] without becoming @deva[आ].
"""

advanced = """
This rule prevents @deva[सवर्णदीर्घ] (@ref[6.1.101]) from applying to accusative @deva[अम्]. Without this exception, @deva[अ + अ] would yield @deva[आ], producing incorrect forms like @deva[*वृक्षाम्]. The restriction to @deva[अमि] (locative of @deva[अम्]) is significant—it applies only when the @deva[अ] belongs to this specific case-affix, not to @deva[अ] in general. The @deva[एकादेश] here is @deva[पूर्वरूप], maintaining the stem vowel's quality.
"""

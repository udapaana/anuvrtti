id = "6.1.39"
numericId = "61039"

[en]
simple = """
Before @deva[कित्] affixes of @deva[लिट्], @deva[व्] may optionally substitute for @deva[य्] in @deva[वय्]. Examples: @deva[ऊयतुः] or @deva[ऊवतुः]; @deva[ऊयुः] or @deva[ऊवुः].
"""

standard = """
For @deva[वय्] (substitute of @deva[वे]), before @deva[कित्] Perfect affixes, @deva[य्] → @deva[व्] is optional: @deva[ऊयतुः] or @deva[ऊवतुः], @deva[ऊयुः] or @deva[ऊवुः]. According to @[patañjali], the @[sūtra] could simply be @deva[अन्यतरस्यां किति वेञः]—with @deva[संप्रसारण] prohibited, we get @deva[ववतुः], @deva[ववुः]; without prohibition, we get the standard forms.
"""

advanced = """
This @deva[विकल्प] allows @deva[य्] → @deva[व्] for @deva[वय्] before @deva[किल्लिट्]. The @deva[वश्चास्य] phrase may be redundant per @[patañjali]: @deva[अन्यतरस्यां किति वेञः] suffices. Without @deva[संप्रसारण]-prohibition (@ref[6.1.38]): @deva[वय्] → @deva[ववय्] → @deva[उवय्] → @deva[उवातुः]? No—@ref[6.1.38] blocks this. With @deva[व्]-substitution option: @deva[ऊवतुः]. Without: @deva[ऊयतुः].
"""

id = "6.1.142"
numericId = "61142"

[en]
simple = """
The @deva[सुट्] augment is added when @deva[अप + कृ] means 'the scraping of earth by animals or birds'. So @deva[अपस्किरते] describes a horse or bird scratching the ground.
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[अप + कृ] specifically when referring to the scratching or scraping of earth by four-footed animals or birds (@deva[चतुष्पाद्] or @deva[पक्षिन्]). Example: @deva[अपस्किरते अश्वः] 'the horse scrapes (the ground)'; @deva[अपस्किरति पक्षी] 'the bird scratches'.
"""

advanced = """
This highly specific semantic condition—earth-scraping by animals/birds—shows how @deva[सुट्] rules can target narrow lexical domains. The @deva[अप] preverb (away/off) + @deva[कृ] (make/do) yields 'to scrape away'. The restriction to @deva[भूलेखन] (earth-marking) by @deva[चतुष्पाद्/पक्षिन्] suggests this was a recognized technical term, perhaps in veterinary or zoological contexts.
"""

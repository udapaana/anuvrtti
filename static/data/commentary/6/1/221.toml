id = "6.1.221"
numericId = "61221"

[en]
simple = """
Names ending in @deva[ईवती] have acute accent on the last syllable. So @deva[अहीवती꣡], @deva[कृषीवती꣡], @deva[मुनीवती꣡] all have final accent.
"""

standard = """
This @[sūtra] assigns @deva[अन्तोदात्त] to @deva[संज्ञा] ending in @deva[ईवती]. Examples: @deva[अहीवती꣡] ('having serpents'), @deva[कृषीवती꣡] ('having farmers'), @deva[मुनीवती꣡] ('having sages'). These feminine names have final-syllable accent.
"""

advanced = """
The @deva[ईवत्यन्तानाम् अन्तोदात्तः] parallels @ref[6.1.220] for @deva[ईवती]-final names. The @deva[ई] (from @deva[इन्]-stem feminines) + @deva[वती] creates @deva[ईवती]. Names like @deva[अहीवती꣡], @deva[कृषीवती꣡] take final accent. Together with @ref[6.1.220], these rules govern @deva[वती]-ending place names.
"""

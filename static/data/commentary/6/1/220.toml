id = "6.1.220"
numericId = "61220"

[en]
simple = """
Names ending in @deva[अवती] have acute accent on the last syllable. So @deva[अजिरवती꣡], @deva[खदिरवती꣡], @deva[हंसवती꣡] all have final accent.
"""

standard = """
This @[sūtra] assigns @deva[अन्तोदात्त] to @deva[संज्ञा] (names) ending in @deva[अवती]. Examples: @deva[अजिरवती꣡], @deva[खदिरवती꣡], @deva[हंसवती꣡], @deva[कारण्डवती꣡]. These feminine place names have final-syllable accent.
"""

advanced = """
The @deva[अवत्यन्तानाम् अन्तोदात्तः] assigns final accent to @deva[अवती]-final names. These @deva[मतुप्] + @deva[ङीप्] formations would normally follow @deva[ङीप्] accent; this @[sūtra] overrides to give @deva[अन्तोदात्त]. River/place names: @deva[अजिरवती꣡], @deva[खदिरवती꣡], @deva[हंसवती꣡]. The @deva[अवती] ending (not @deva[आवती]) distinguishes from @ref[6.1.219].
"""

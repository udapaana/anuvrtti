id = "6.1.102"
numericId = "61102"

[en]
simple = """
For a simple vowel of a nominal stem + vowel of nominative/accusative endings, @deva[पूर्वरूप] (long vowel matching the first) is the substitute. Examples: @deva[अग्नि] + @deva[औ] → @deva[अग्नी]; @deva[वायु] + @deva[अम्] → @deva[वायुम्].
"""

standard = """
When @deva[प्रातिपदिक]-final @deva[अक्] precedes a vowel of @deva[प्रथमा/द्वितीया] (nominative/accusative), the long vowel of the first (@deva[पूर्वरूप]) replaces both: @deva[अग्नि + औ] → @deva[अग्नी]; @deva[वायु + अम्] → @deva[वायुम्] → @deva[वायुम्]. This differs from @ref[6.1.101] which uses @deva[सवर्णदीर्घ].
"""

advanced = """
@deva[अकः] and @deva[दीर्घः] understood. @deva[प्रातिपदिक (अक् अन्त)] + @deva[प्रथमा/द्वितीया (अच् आदि)] → @deva[पूर्वस्य दीर्घः]. @deva[अग्नि + औ] → @deva[अग्नी] (not @deva[*अग्न्यौ]); @deva[वायु + अस्] → @deva[वायूः]. This @deva[पूर्वरूप] (first-vowel-like) differs from @deva[सवर्णदीर्घ] in treating dissimilar combinations.
"""

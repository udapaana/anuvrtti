id = "6.1.212"
numericId = "61212"

[en]
simple = """
The pronouns @deva[युष्मद्] and @deva[अस्मद्] have acute accent on the first syllable in the dative singular. So @deva[तु꣡भ्यम्] ('to you') and @deva[म꣡ह्यम्] ('to me') have initial accent. The shortened forms @deva[ते] and @deva[मे] are different.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[युष्मद्/अस्मद्] in dative singular when appearing as @deva[तुभ्यम्/मह्यम्]. Examples: @deva[तु꣡भ्यम्] ('for you'), @deva[म꣡ह्यम्] ('for me'). The enclitic @deva[ते/मे] forms are excluded.
"""

advanced = """
The @deva[चतुर्थ्येकवचने] condition targets dative singular. Full forms @deva[तुभ्यम्], @deva[मह्यम्] take @deva[आद्युदात्त]: @deva[तु꣡भ्यम्], @deva[म꣡ह्यम्]. Combined with @ref[6.1.211], this establishes first-syllable accent for full-form personal pronouns in gen/dat singular. The @deva[ते/मे] clitics remain outside this accent domain.
"""

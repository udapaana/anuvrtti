id = "6.1.153"
numericId = "61153"

[en]
simple = """
The words @deva[प्रस्कण्व] and @deva[हरिश्चन्द्र] are names of Vedic sages (@deva[ऋषि]), formed with the @deva[सुट्] augment. These are proper names that take @deva[सुट्] irregularly.
"""

standard = """
This @[sūtra] lists @deva[प्रस्कण्व] and @deva[हरिश्चन्द्र] as @deva[ऋषि] names formed with @deva[सुट्]. Thus: @deva[प्र + स् + कण्व] → @deva[प्रस्कण्व]; @deva[हरि + स् + चन्द्र] → @deva[हरिश्चन्द्र]. The @deva[सुट्] in @deva[हरिश्चन्द्र] follows the short-vowel condition from @ref[6.1.151].
"""

advanced = """
These are @deva[निपातन] (listed formations) for specific @deva[ऋषि] names. @deva[प्रस्कण्व] shows @deva[सुट्] after @deva[प्र] (ending in @deva[अ]). @deva[हरिश्चन्द्र] has @deva[सुट्] after @deva[हरि] (ending in short @deva[इ]), fulfilling @ref[6.1.151]'s condition. The @deva[ऋषि] designation restricts these to the famous seers of that name; other @deva[हरिश्चन्द्र] compounds without @deva[सुट्] exist for different referents.
"""

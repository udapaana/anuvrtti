id = "6.1.14"
numericId = "61014"

[en]
simple = """
The @deva[य्] of @deva[ष्यङ्] undergoes @deva[संप्रसारण] when @deva[बन्धु] follows in a @deva[बहुव्रीहि] compound. Example: @deva[कारीषगन्ध्याबन्धुरस्य] → @deva[कारीषगन्धीबन्धुः] (one whose relative has that fragrance).
"""

standard = """
Unlike @ref[6.1.13] (which requires @deva[तत्पुरुष]), this rule specifically requires @deva[बहुव्रीहि] for @deva[बन्धु]. Example: @deva[कारीषगन्धीबन्धुः], @deva[कौमुदगन्धीबन्धुः]. In @deva[तत्पुरुष] (meaning 'the relative of X'), no @deva[संप्रसारण]: @deva[कारीषगन्ध्याबन्धुः]. @[vārtika]: Optionally before @deva[मातृ]: @deva[कारीषगन्धीमाता] or @deva[कारीषगन्ध्यामाता].
"""

advanced = """
This extends @deva[संप्रसारण] to @deva[बहुव्रीहि] with @deva[बन्धु]. The @deva[तत्पुरुष]/@deva[बहुव्रीहि] distinction matters: @deva[कारीषगन्ध्याया बन्धुः] (TP) = @deva[कारीषगन्ध्याबन्धुः]; @deva[कारीषगन्ध्या बन्धुर्यस्य] (BV) = @deva[कारीषगन्धीबन्धुः]. Like @ref[6.1.13]: @deva[परमकारीषगन्धीबन्धुः], but @deva[अतिकारीषगन्ध्याबन्धुः] (@deva[उपसर्जन]). @[vārtika] @deva[मातृ वा]: @deva[कारीषगन्धीमाता]/@deva[कारीषगन्ध्यामाता]. Not compound-final: @deva[कारीषगन्ध्याबन्धुकुलम्].
"""

id = "6.1.192"
numericId = "61192"

[en]
simple = """
The roots @deva[भी] ('fear'), @deva[ह्री] ('be ashamed'), @deva[भृ] ('bear'), @deva[हु] ('sacrifice'), and several others have acute accent on the first syllable (or their reduplicate) before @deva[सार्वधातुक] endings. So @deva[बि꣡भेति], @deva[जि꣡ह्रेति], @deva[बि꣡भर्ति].
"""

standard = """
This @[sūtra] lists roots with @deva[आद्युदात्त] before @deva[सार्वधातुक] endings: @deva[भी], @deva[ह्री], @deva[भृ], @deva[हु], @deva[मद्], @deva[जन्], @deva[धन्], @deva[दरिद्रा], @deva[जागृ]. Their reduplicated forms also show first-syllable accent. Examples: @deva[बि꣡भेति], @deva[जि꣡ह्रेति], @deva[बि꣡भर्ति], @deva[जु꣡होति].
"""

advanced = """
The @deva[भीह्रीभृहुमद्जन्धन्दरिद्राजागृणां च] list specifies roots with @deva[आद्युदात्त] in @deva[सार्वधातुक] contexts. The @deva[द्विर्वचने च] extends this to their reduplicated stems. These roots (and reduplicates) place accent on the first syllable: @deva[बि꣡भेति], @deva[जि꣡ह्रेति], @deva[बि꣡भर्ति], @deva[जु꣡होति], @deva[म꣡त्ति], @deva[जा꣡यते], @deva[धा꣡न्यते], @deva[दा꣡रिद्र्यते], @deva[जा꣡गर्ति].
"""

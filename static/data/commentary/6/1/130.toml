id = "6.1.130"
numericId = "61130"

[en]
simple = """
According to @deva[चाक्रवर्मण], a @deva[प्लुत] @deva[ई३] before a vowel can be treated as a regular vowel. So @deva[अस्तु ही३ + इति] can become @deva[अस्तु हीत्यब्रवीत्] or remain @deva[अस्तु ही३ इति].
"""

standard = """
This @[sūtra] presents @deva[चाक्रवर्मण]'s opinion that @deva[प्लुत] @deva[ई] (@deva[ई३]) may optionally undergo regular sandhi when followed by a vowel. Thus @deva[ही३ + इति] can yield either @deva[हीति] (with sandhi) or @deva[ही३ इति] (preserving @deva[प्लुत]). The @deva[वा] indicates optionality.
"""

advanced = """
The @deva[चाक्रवर्मण] reference indicates another grammatical authority with a specific view on @deva[प्लुत] treatment. This contrasts with @ref[6.1.125] which makes @deva[प्रकृतिभाव] general for @deva[प्लुत]. Here, optionality allows the speaker/reciter to choose between prosodic marking (@deva[प्लुत] preserved) and smooth sandhi. Such @deva[आचार्यमत] rules document variant analyses.
"""

id = "6.1.152"
numericId = "61152"

[en]
simple = """
The root @deva[कश्] ('to go, to punish') gets the @deva[सुट्] augment when preceded by @deva[प्रति]. So @deva[प्रति + कश्] becomes @deva[प्रतिष्कश्], yielding forms like @deva[प्रतिष्कशः] ('one who punishes in return').
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[प्रति + कश्]. The root @deva[कश्] means 'to go' or 'to punish'. With @deva[सुट्]: @deva[प्रति + स् + कश्] → @deva[प्रतिष्कश्] (with @deva[ष्] by @deva[षत्व]). The derived noun @deva[प्रतिष्कशः] appears in the verse: @deva[ग्राममद्य प्रवेक्ष्यामि प्रतिष्कशो मम प्रहर्ता].
"""

advanced = """
The @deva[प्रति + कश्] combination with @deva[सुट्] is lexically specified. The @deva[ष्] results from @deva[सुट्] + @deva[क्] after @deva[इ], yielding @deva[ष्क] by @deva[षत्व] (@ref[8.3.59]). This is near the end of the @deva[स्कोः] @deva[अधिकार]. The meaning 'retaliatory punisher' fits @deva[प्रति] ('against/in return') + @deva[कश्] ('punish').
"""

id = "6.1.148"
numericId = "61148"

[en]
simple = """
The word @deva[अवस्कर] ('excrement, refuse') is formed with @deva[सुट्]. It refers to ejected matter or waste.
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[अवस्कर] meaning 'excrement' or 'refuse' (@deva[वचस्क] = @deva[कुत्सित] 'despised'). The derivation: @deva[अव + कृ] + @deva[अप्] with @deva[सुट्] → @deva[अवस्कर]. The word applies to ejected or waste matter.
"""

advanced = """
The @deva[अव] prefix (down, away) + @deva[कृ] (make) + @deva[सुट्] + @deva[अप्] (@[kṛt] affix, @ref[3.3.57]) yields @deva[अवस्कर]. The meaning 'that which is made/cast away' → 'excrement, refuse'. The @deva[वचस्क] gloss (having bad appearance/lustre) indicates the pejorative sense. This is specialized vocabulary where @deva[सुट्] distinguishes the taboo meaning from neutral @deva[अवकार] (scattering).
"""

id = "6.1.11"
numericId = "61011"

[en]
simple = """
When @deva[चङ्] (Aorist of causatives) follows, a root that is not already reduplicated undergoes reduplication. Examples: @deva[पच्] (causative) → @deva[अपीपचत्]; @deva[पठ्] → @deva[अपीपठत्].
"""

standard = """
@deva[चङ्] is the Aorist (@deva[लुङ्]) affix for @deva[णिजन्त] (causative) roots. Examples: @deva[अपीपचत्], @deva[अपीपठत्] (@ref[7.4.93], @ref[7.4.94]). Vowel-initial roots: @deva[आटिटत्] (from @deva[अट्]), @deva[आशिशत्] (from @deva[अश्]), @deva[आर्दिदत्] (from @deva[अर्द्]). The order of operations: (1) elide @deva[णि] (@ref[6.4.51]), (2) shorten penultimate (@ref[7.4.4]), (3) reduplicate.
"""

advanced = """
This @deva[चङ्] reduplication requires specific operation sequence: (1) @deva[णि]-@deva[लोप] by @ref[6.4.51]; (2) @deva[उपधाह्रस्व] by @ref[7.4.4]; (3) @deva[द्वित्व]. If reduplicated first, the shortened vowel would be @deva[स्थानिवत्] by @ref[1.1.56], blocking @deva[सन्वद्भाव] (@ref[7.4.93]). But @ref[1.1.57] prevents this: @deva[स्थानिवद्भाव] applies only for operations on something @deva[अनादिष्ट] (before the substitute). The @deva[लघु] vowel is @deva[आदिष्ट], so @deva[सन्वद्भाव] proceeds: @deva[अपीपचत्] (like @deva[पिपक्षति]).
"""

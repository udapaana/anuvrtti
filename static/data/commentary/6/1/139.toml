id = "6.1.139"
numericId = "61139"

[en]
simple = """
The @deva[सुट्] augment is added when @deva[उप + कृ] means 'to take pains for', 'to prepare', or 'to supply what is missing in discourse'. So @deva[उपस्करः] means 'effort/preparation' or 'supplying ellipsis'.
"""

standard = """
This @[sūtra] specifies @deva[सुट्] for @deva[उप + कृ] in three senses: (1) @deva[परिश्रम] 'taking pains', (2) @deva[सम्भार] 'preparation/provision', (3) @deva[वाक्यसमाप्ति] 'completing a sentence by supplying ellipsis'. Examples: @deva[उपस्कारः] 'effort', @deva[उपस्कृतम्] 'prepared/furnished'.
"""

advanced = """
The three meanings—@deva[परिश्रम] (exertion), @deva[सम्भार] (preparation), @deva[वाक्यसमाप्ति] (discourse completion)—represent specialized uses of @deva[उप + कृ]. The @deva[वाक्यसमाप्ति] sense is particularly interesting: it refers to the grammatical/rhetorical act of supplying understood elements in elliptical expressions. The @deva[सुट्] marks these as technical vocabulary items distinct from basic @deva[उपकृ] 'to benefit'.
"""

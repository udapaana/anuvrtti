id = "6.1.10"
numericId = "61010"

[en]
simple = """
When @deva[श्लु] applies (deleting @deva[शप्] for third-class roots), a root that is not already reduplicated undergoes reduplication. Examples: @deva[हु] → @deva[जुहोति] (he offers); @deva[भी] → @deva[बिभेति] (he fears).
"""

standard = """
@deva[श्लु] is the @deva[विकरण] marker for @deva[जुहोत्यादि] (third-class roots), causing @deva[शप्]-elision. Reduplication applies to the @deva[अनभ्यस्त] root: @deva[जुहोति] (from @deva[हु]), @deva[बिभेति] (from @deva[भी]), @deva[जिह्रेति] (from @deva[ह्री]). The reduplication follows @ref[6.1.1] or @ref[6.1.2] based on whether the root is consonant-initial or vowel-initial.
"""

advanced = """
@deva[श्लु] (@ref[2.4.75]) causes @deva[शप्]-@deva[लुक्] for @deva[जुहोत्यादि गण]. This triggers @deva[द्वित्व] of @deva[अनभ्यस्त धातु]. Examples: @deva[हु] → @deva[जुहु] → @deva[जुहोति] (@deva[गुण]); @deva[भी] → @deva[बिभी] → @deva[बिभेति]; @deva[ह्री] → @deva[जिह्री] → @deva[जिह्रेति]. The @deva[अभ्यास]-modifications (@ref[7.4.59]-@ref[7.4.60]) apply: @deva[ह] → @deva[ज] by @ref[7.4.62], vowel shortening by @ref[7.4.59].
"""

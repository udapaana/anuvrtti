id = "6.1.150"
numericId = "61150"

[en]
simple = """
The word @deva[विष्किर] (a type of bird that scatters food while eating) is optionally formed with @deva[सुट्]. Without @deva[सुट्], the form is @deva[विकिर].
"""

standard = """
This @[sūtra] provides optional @deva[सुट्] for @deva[विष्किर/विकिर] denoting a type of bird. The @deva[विभाषा] indicates both forms are valid: @deva[विष्किर] (with @deva[सुट्]) and @deva[विकिर] (without). These birds are characterized by scattering their food while eating.
"""

advanced = """
The @deva[वि + कॄ] (scatter) base describes birds that scatter food/grain while feeding. The @deva[विभाषा] allows @deva[विष्किर] (with @deva[सुट्]) alongside @deva[विकिर] (without). The verse (@deva[सर्वे शकुनयो भक्ष्या विष्किराः...]) indicates these birds are edible. This optionality in a technical term (ornithological vocabulary) shows lexical variation that @[pāṇini] accommodates rather than prescribes.
"""

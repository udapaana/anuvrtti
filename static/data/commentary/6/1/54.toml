id = "6.1.54"
numericId = "61054"

[en]
simple = """
The causatives of @deva[चि] (to gather) and @deva[स्फुर्] (to throb) optionally substitute @deva[आ] for their diphthong. Examples: @deva[चापयति] or @deva[चाययति]; @deva[स्फारयति] or @deva[स्फोरयति].
"""

standard = """
In @deva[णिजन्त], @deva[चि] and @deva[स्फुर्] optionally take @deva[ए/ओ] → @deva[आ]: @deva[चि] → @deva[चापयति] or @deva[चाययति] (@deva[प्]-augment by @ref[7.3.36]); @deva[स्फुर्] → @deva[स्फारयति] or @deva[स्फोरयति].
"""

advanced = """
This @deva[विभाषा] for @deva[णिजन्त]: @deva[चि चयने] → @deva[चै] (@deva[वृद्धि]) → optionally @deva[चा] + @deva[णि] → @deva[चापयति] (with @deva[पुक्]) or @deva[चाययति] (without, but @deva[य्] augment). @deva[स्फुर् सञ्चलने] → @deva[स्फोर्] (@deva[गुण]) → optionally @deva[स्फार्] + @deva[णि] → @deva[स्फारयति]/@deva[स्फोरयति].
"""

id = "6.1.78"
numericId = "61078"

[en]
simple = """
The diphthongs @deva[ए], @deva[ऐ], @deva[ओ], @deva[औ] become @deva[अय्], @deva[आय्], @deva[अव्], @deva[आव्] respectively when followed by a vowel. Examples: @deva[चे] + @deva[अन] → @deva[चयनम्]; @deva[लो] + @deva[अन] → @deva[लवनम्].
"""

standard = """
The @deva[एच्] diphthongs take @deva[अय्/आय्/अव्/आव्] substitutes before vowels: @deva[ए] → @deva[अय्]; @deva[ऐ] → @deva[आय्]; @deva[ओ] → @deva[अव्]; @deva[औ] → @deva[आव्]. Examples: @deva[चि] + @deva[ल्युट्] → @deva[चे] + @deva[अन] → @deva[चयनम्]; @deva[लो] + @deva[अन] → @deva[लवनम्]; @deva[चै] + @deva[अक] → @deva[चायकः]; @deva[लौ] + @deva[अक] → @deva[लावकः].
"""

advanced = """
This @deva[अयादि]-sandhi: @deva[एच्] (@deva[ए ऐ ओ औ]) + @deva[अच्] → @deva[अय्/आय्/अव्/आव्] + vowel. Examples: @deva[चे + अन] → @deva[चयनम्]; @deva[लो + अन] → @deva[लवनम्]; @deva[कयेते] (dual of @deva[के]); @deva[व्ययेते]; @deva[याववरुणद्धि]; @deva[रु + युच्] (@ref[3.2.148]) → @deva[रो + अन] → @deva[रवणः].
"""

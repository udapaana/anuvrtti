id = "6.1.48"
numericId = "61048"

[en]
simple = """
The causatives of @deva[क्री] (to buy), @deva[इ] (to study), and @deva[जि] (to conquer) substitute @deva[आ] for their diphthong. Examples: @deva[क्रापयति], @deva[अध्यापयति], @deva[जापयति].
"""

standard = """
In @deva[णिजन्त], these roots take @deva[आ] for their @deva[ए/ऐ] diphthong: @deva[क्री] → @deva[क्रापयति]; @deva[इ] (with @deva[अधि]) → @deva[अध्यापयति]; @deva[जि] → @deva[जापयति]. The @deva[प्]-augment comes by @ref[7.3.36] since these roots now end in long @deva[आ].
"""

advanced = """
These @deva[णिजन्त] forms take @deva[ए/ऐ] → @deva[आ]: @deva[क्री] → @deva[क्रै] (@deva[वृद्धि]) → @deva[क्रा] + @deva[णि] → @deva[क्रापयति] (@deva[प्] by @ref[7.3.36]); @deva[इ] → @deva[ऐ] → @deva[आ] + @deva[णि] → @deva[आपयति] → @deva[अध्यापयति]; @deva[जि] → @deva[जै] → @deva[जा] + @deva[णि] → @deva[जापयति]. The @deva[आकारान्त] triggers @deva[पुक्]-augment.
"""

id = "6.1.195"
numericId = "61195"

[en]
simple = """
Roots listed in the @deva[धातुपाठ] with a final vowel may optionally have acute on the first syllable before passive @deva[यक्], when the verb's subject is also the agent of feeling/perception. So @deva[ज्ञायते] ('is known/feels') can be @deva[ज्ञा꣡यते].
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] for vowel-final roots (in @deva[धातुपाठ]) before @deva[यक्] (passive marker) when the meaning is @deva[भाव] (impersonal) or the subject is also the experiencer. Example: @deva[ज्ञायते] ('is known' or 'one feels/knows') → optional @deva[ज्ञा꣡यते].
"""

advanced = """
The @deva[अजन्ताद्धातोः यकि कर्तर्यनुप्रयुज्यमाने] condition: (1) @deva[अजन्त] root (vowel-final in @deva[धातुपाठ]), (2) @deva[यक्] (passive @ref[3.1.67]), (3) @deva[कर्ता अनुप्रयुज्यमान] (agent is the experiencing subject). This covers @deva[भावे यक्] and middle-voice-like passives. Forms like @deva[ज्ञायते], @deva[श्रूयते] show optional @deva[आद्युदात्त]: @deva[ज्ञा꣡यते/ज्ञाय꣡ते].
"""

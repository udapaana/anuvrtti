id = "6.1.122"
numericId = "61122"

[en]
simple = """
After @deva[गो] ('cow'), the following @deva[अ] may optionally be kept separate—both in Vedic and Classical Sanskrit. So @deva[गो + अग्रम्] can be either @deva[गोऽग्रम्] (with sandhi) or @deva[गो अग्रम्] (without).
"""

standard = """
This @[sūtra] provides an optional @deva[प्रकृतिभाव] for @deva[गो] followed by @deva[अ]. The @deva[वा] indicates optionality, and @deva[सर्वत्र] extends this to both Vedic and Classical usage. Thus @deva[गो + अग्रम्] → @deva[गोऽग्रम्] (with @deva[पूर्वरूप]) or @deva[गो अग्रम्] (hiatus preserved). Both forms are grammatically correct.
"""

advanced = """
The @deva[सर्वत्र] ('everywhere') is significant—most Vedic options are restricted to @deva[छन्दस्], but this extends to @deva[भाषा] (Classical Sanskrit). This reflects the special status of @deva[गो] as an archaic, high-frequency stem with preserved variant behaviors. The optional hiatus may have stylistic or metrical motivations even in classical contexts.
"""

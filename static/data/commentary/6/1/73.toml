id = "6.1.73"
numericId = "61073"

[en]
simple = """
A preceding short vowel takes @deva[तुक्]-augment (@deva[त्]) when @deva[छ] follows in continuous speech. Examples: @deva[इच्छति], @deva[गच्छति]. The @deva[त्] becomes @deva[च्] by @ref[8.4.40].
"""

standard = """
Before @deva[छ] in @deva[संहिता], a short vowel takes @deva[तुक्]: @deva[इष्] + @deva[छ] → @deva[इ] + @deva[त्] + @deva[छ] → @deva[इच्छति] (@deva[त्] → @deva[च्] by @ref[8.4.40]); @deva[गम्] + @deva[छ] → @deva[गच्छति]. The @deva[त्] augments the vowel itself, not the syllable—so in @deva[चिच्छिदतुः], @deva[चिच्छिदुः], the @deva[त्] is part of @deva[इ], not the @deva[अभ्यास] @deva[चि], avoiding @ref[7.4.60] elision.
"""

advanced = """
The @deva[तुक्] is @deva[स्वरस्य आगम], not @deva[प्रातिपदिकस्य]. This matters for @deva[अभ्यस्त] forms: in @deva[चिच्छिद्], the @deva[त्] belongs to @deva[इ]-vowel, not to @deva[अभ्यास चि]. Thus @ref[7.4.60] (@deva[हलादिः शेषः]) doesn't elide it. Process: @deva[छिद्] → @deva[चिछिद्] (reduplication) → @deva[चित्छिद्] (@deva[तुक्]) → @deva[चिच्छिद्] (@ref[8.4.40]).
"""

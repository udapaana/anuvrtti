id = "6.1.196"
numericId = "61196"

[en]
simple = """
Before the perfect ending @deva[थ] (2nd person singular) when it takes the @deva[इ] augment, the accent can fall on the first syllable, on the @deva[इ], or on the penultimate syllable. So @deva[चकर्थ] with @deva[इ] can be @deva[च꣡करिथ], @deva[चकरि꣡थ], or @deva[चक꣡रिथ].
"""

standard = """
This @[sūtra] provides three accent options for @deva[लिट्] (perfect) 2sg @deva[थ] with @deva[इट्] augment: (1) @deva[आद्युदात्त] (first syllable), (2) @deva[इट्]-accent, (3) @deva[उपोत्तम] (penultimate). Example: @deva[चकर्थ] + @deva[इ] → @deva[च꣡करिथ] or @deva[चकरि꣡थ] or @deva[चक꣡रिथ]. All three are valid.
"""

advanced = """
The @deva[थस्येडादौ] condition: @deva[थ] of @deva[लिट्] 2sg when preceded by @deva[इट्] augment. The triple option (@deva[आदेरिट उपोत्तमस्य वा]) allows: (1) @deva[आदि]-accent (@deva[च꣡करिथ]), (2) @deva[इट्]-accent (@deva[चकरि꣡थ]), (3) @deva[उपोत्तम]-accent (@deva[चक꣡रिथ]). This extensive optionality reflects variant accent traditions for perfect 2sg forms with @deva[इट्].
"""

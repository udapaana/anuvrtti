id = "6.1.179"
numericId = "61179"

[en]
simple = """
Case endings beginning with a consonant receive acute accent after the numerals called @deva[षट्] (six, seven, etc. per @ref[1.1.24]), as well as after @deva[त्रि] ('three') and @deva[चतुर्] ('four'). So @deva[षड्भिः] has accent on the ending.
"""

standard = """
This @[sūtra] assigns @deva[उदात्त] to consonant-initial case endings (@deva[हलादि]) after @deva[षट्]-group numerals (@ref[1.1.24]: @deva[षष्, सप्तन्, अष्टन्, नवन्, दशन्]) and @deva[त्रि/चतुर्]. Examples: @deva[षड्भि꣡ः], @deva[त्रिभि꣡ः], @deva[चतुर्भि꣡ः]. The @deva[अन्तोदात्त] context continues.
"""

advanced = """
The @deva[षट्संज्ञात्] references @ref[1.1.24]'s @deva[षट्] designation for numerals 6-10. These plus @deva[त्रि/चतुर्] take @deva[उदात्त] on @deva[हलादि] endings (@deva[भिस्], @deva[भ्याम्], @deva[भ्यस्], @deva[सु]). This numeral-specific accent pattern affects only consonant-initial case markers, contrasting with @deva[अजादि] (vowel-initial) endings.
"""

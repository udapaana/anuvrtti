id = "6.1.172"
numericId = "61172"

[en]
simple = """
The non-strong case endings after @deva[अष्टन्] ('eight') have acute accent when it takes the form @deva[अष्टा]. So @deva[अष्टाभिः] has accent on the ending.
"""

standard = """
This @[sūtra] assigns @deva[उदात्त] to @deva[असर्वनामस्थान] endings after @deva[अष्टन्] when it appears as @deva[अष्टा]. The numeral 'eight' has alternate forms: @deva[अष्ट] and @deva[अष्टा] in accusative plural and weak cases. When @deva[अष्टा] appears, the endings are accented: @deva[अष्टाभि꣡ः].
"""

advanced = """
The @deva[अष्टाभावे] condition specifies the @deva[अष्टा] allomorph. @deva[अष्टन्] shows stem alternation: @deva[अष्ट/अष्टा/अष्टौ]. When @deva[आ]-augmented form @deva[अष्टा] precedes weak endings, those endings take @deva[उदात्त]. This creates paradigm-internal accent variation: @deva[अष्टौ꣡] (nom/acc) vs. @deva[अष्टाभि꣡ः] (inst.). The @deva[अष्टा]-form triggers the accent shift.
"""

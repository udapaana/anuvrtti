id = "6.1.109"
numericId = "61109"

[en]
simple = """
When @deva[ए] or @deva[ओ] at the end of a word (@deva[पद]) is followed by short @deva[अ], the @deva[ए] or @deva[ओ] is retained and the @deva[अ] is dropped. So @deva[अग्ने + अत्र] becomes @deva[अग्नेऽत्र] (written with @deva[ऽ] showing the dropped @deva[अ]).
"""

standard = """
This @[sūtra] establishes @deva[पूर्वरूप] for @deva[पद]-final @deva[ए/ओ] followed by short @deva[अ]. The @deva[ए] or @deva[ओ] remains unchanged and the following @deva[अ] undergoes @deva[लोप] (deletion). The @deva[अवग्रह] sign (@deva[ऽ]) marks this elision in writing. Examples: @deva[अग्ने + अत्र] → @deva[अग्नेऽत्र]; @deva[विष्णो + अव] → @deva[विष्णोऽव]. This applies only at word boundaries (@deva[पदान्त]).
"""

advanced = """
The term @deva[पदान्तात्] restricts this rule to word-final position, distinguishing it from @ref[6.1.110] which handles word-internal contexts. The @deva[पूर्वरूप एकादेश] here differs from typical coalescence—the first element is retained in toto while the second undergoes complete @deva[लोप]. The @deva[ह्रस्व] specification excludes long @deva[आ], which triggers different sandhi (@ref[6.1.88] @deva[वृद्धि]). This rule is essential for Vedic recitation and classical verse.
"""

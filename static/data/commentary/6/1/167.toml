id = "6.1.167"
numericId = "61167"

[en]
simple = """
The word @deva[चतुर्] ('four') has acute accent on its final syllable when followed by the accusative plural ending. So @deva[चतुरः] (acc. pl.) is accented @deva[च॒तु꣡रः].
"""

standard = """
This @[sūtra] provides @deva[अन्तोदात्त] for @deva[चतुर्] in accusative plural. The form @deva[चतुर꣡ः] has accent on @deva[तु]. The feminine @deva[चतस्रः] follows a different pattern. The @deva[शसि] (accusative plural marker) triggers this accent shift.
"""

advanced = """
The @deva[शसि] condition specifies accusative plural context. @deva[चतुर्] + @deva[शस्] → @deva[चतुरः] with @deva[अन्तोदात्त]. The feminine @deva[चतसृ] is mentioned to distinguish it—@deva[चतस्रः] may have different accent treatment. This numeral-specific accent rule shows the complexity of @deva[संख्या] (numeral) accent patterns in Vedic.
"""

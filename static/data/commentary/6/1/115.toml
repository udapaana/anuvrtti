id = "6.1.115"
numericId = "61115"

[en]
simple = """
In the middle of a Vedic verse, @deva[ए] or @deva[ओ] and the following @deva[अ] can both be kept separate (no sandhi) unless @deva[अ] is followed by @deva[ख्] or @deva[फ्]. So @deva[ते अग्नये] can remain as two syllables in the middle of a verse.
"""

standard = """
This @[sūtra] provides a Vedic exception: in the @deva[अर्धर्च] (half-verse/middle), @deva[ए/ओ] and the following @deva[अ] retain their original forms (@deva[प्रकृतिभाव])—no @deva[पूर्वरूप] sandhi applies. This preserves meter. The exception is when @deva[अ] is followed by @deva[खफ्] (aspirated voiceless stops @deva[ख्] or @deva[फ्]), where sandhi still applies.
"""

advanced = """
The @deva[अर्धर्चः पदवत्] principle treats the verse-middle as having @deva[पद]-like boundaries. The @deva[प्रकृतिभाव] (retention of original form) is a Vedic license for metrical preservation. The @deva[खफोः] exception suggests these consonant clusters historically resisted hiatus. This rule interacts with Vedic recitation traditions (@deva[शाखा]-specific practices) and reflects the descriptive cataloging of attested forms in Vedic literature.
"""

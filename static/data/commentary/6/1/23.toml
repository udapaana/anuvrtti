id = "6.1.23"
numericId = "61023"

[en]
simple = """
The root @deva[स्त्याय्] (or @deva[ष्ट्याय्]) undergoes @deva[संप्रसारण] before @deva[निष्ठा] when preceded by @deva[प्र]. Example: @deva[प्रस्तीतः] (spread out).
"""

standard = """
Both @deva[स्त्यै] and @deva[ष्ट्यै] (which become @deva[स्त्या]) take @deva[संप्रसारण] before @deva[निष्ठा] after @deva[प्र]. Derivation: @deva[प्र] + @deva[स्त्या] + @deva[क्त] → @deva[प्र] + @deva[स्ति] + @deva[त] (@deva[संप्रसारण]) → @deva[प्रस्तीतः] (@deva[दीर्घ] by @ref[6.4.2]). Forms: @deva[प्रस्तीतः], @deva[प्रस्तीतवान्]. The @deva[त] of @deva[निष्ठा] remains (not @deva[न]-substitute).
"""

advanced = """
This continues the @deva[निष्ठायाम्] @deva[अधिकार]. The @deva[स्फी] @deva[अनुवृत्ति] does not continue. Both @deva[स्त्यै शब्दसंघातयोः] and @deva[ष्ट्यै शब्दसंघातयोः] are included as @deva[स्त्या]. Derivation: @deva[प्र] + @deva[स्त्या] + @deva[त] → @deva[प्र] + @deva[स्ति] + @deva[त] (@deva[य] → @deva[इ]) → @deva[प्रस्ति] + @deva[त] → @deva[प्रस्तीत] (@ref[6.1.108] @deva[इत्], @ref[6.4.2] @deva[दीर्घ]) → @deva[प्रस्तीतः]. The @deva[पूर्व] specification indicates @deva[उपसर्ग] must directly precede.
"""

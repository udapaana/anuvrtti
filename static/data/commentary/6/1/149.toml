id = "6.1.149"
numericId = "61149"

[en]
simple = """
The word @deva[अपस्कर] ('part of a chariot') is formed with @deva[सुट्]. It refers to a component or accessory of a chariot.
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[अपस्कर] meaning 'a part of a chariot' (@deva[रथाङ्ग]). The derivation: @deva[अप + कृ] + @deva[अप्] with @deva[सुट्] → @deva[अपस्कर]. The word refers to chariot accessories, fittings, or components.
"""

advanced = """
The @deva[अप + कृ] base with @deva[सुट्] and @deva[अप्] affix (@ref[3.3.57]) yields @deva[अपस्कर]. The meaning 'that which is made separately' → 'accessory part' fits chariot components that are attached to the main structure. Compare @deva[उपस्कर] (furniture, household articles). The @deva[रथाङ्ग] gloss specifies the chariot-part meaning, distinguishing this from other @deva[अप + कृ] derivatives.
"""

id = "6.1.164"
numericId = "61164"

[en]
simple = """
A stem formed with a @deva[तद्धित] affix that has indicatory @deva[च्] gets acute accent on the final syllable. So @deva[काञ्जायनाः꣡], formed with @deva[च्फञ्] (@ref[4.1.98]), has final accent.
"""

standard = """
This @[sūtra] specifies @deva[अन्तोदात्त] for @deva[तद्धित] formations with @deva[चित्] (indicatory @deva[च्]). Example: @deva[काञ्जायन꣡] formed by @deva[च्फञ्] (@ref[4.1.98])—the @deva[च्] triggers final accent. Similarly @deva[कुञ्ज + च्फञ्] → @deva[कौञ्जायन꣡] with final @deva[उदात्त].
"""

advanced = """
The @deva[तद्धित]-specific @deva[चित्] rule complements @ref[6.1.163]. Affixes like @deva[च्फञ्] (@ref[4.1.98]) carry @deva[च्] as accent marker. The @deva[तद्धिते] specification distinguishes these from @deva[कृत्]-affix @deva[चित्] forms. Patronymic formations like @deva[काञ्जायन], @deva[कौञ्जायन] show the @deva[अन्तोदात्त] pattern. The @deva[च्] is elided by @deva[इत्संज्ञा] (@ref[1.3.3]) after marking accent.
"""

id = "6.1.174"
numericId = "61174"

[en]
simple = """
The same endings have acute accent when a semivowel (@deva[यण्]) replaces the accented final vowel of the stem, and a consonant precedes that semivowel. So @deva[कर्तृ] + @deva[ई] → @deva[कर्त्री꣡] (accent on @deva[ई]).
"""

standard = """
This @[sūtra] extends accent to @deva[ङीप्] and @deva[अजादि असर्वनामस्थान] endings when: (1) the stem's final @deva[उदात्त] vowel becomes @deva[यण्] (semivowel), (2) a consonant precedes. Example: @deva[कर्तृ꣡] + @deva[ई] → @deva[कर्त्र्] + @deva[ई] → @deva[कर्त्री꣡]. The @deva[ऋ] → @deva[र्] change leaves the ending accented.
"""

advanced = """
The @deva[यणादेश] (semivowel substitution by @ref[6.1.77]) of an @deva[उदात्त] vowel triggers this. When @deva[इ उ ऋ ऌ] (final, accented) becomes @deva[य् व् र् ल्] before a vowel, and a consonant precedes, the following ending inherits accent. @deva[कर्तृ꣡] → @deva[कर्त्री꣡]; @deva[भवतृ꣡] → @deva[भवत्री꣡]. The @deva[हल्] condition requires a preceding consonant cluster.
"""

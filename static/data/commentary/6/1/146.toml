id = "6.1.146"
numericId = "61146"

[en]
simple = """
The word @deva[आस्पद] ('place, position, abode') is formed with @deva[सुट्]. It means a firm place, position, or rank.
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[आस्पद] meaning 'place' or 'position' (@deva[प्रतिष्ठा]). The word @deva[आ + पद] with @deva[सुट्] → @deva[आस्पद]. Examples: @deva[आस्पदम्] 'a place/abode'; @deva[यशस्वी आस्पदम्] 'position of glory'. The @deva[प्रतिष्ठा] gloss indicates 'established position, rank, dignity'.
"""

advanced = """
The @deva[आस्पद] formation shows @deva[आ] (prefix meaning 'towards/up to') + @deva[सुट्] + @deva[पद] (foot/step). The resultant meaning 'place where one sets foot' → 'position, abode, basis' is compositionally transparent. The @deva[सुट्] is obligatory in this formation; @deva[*आपद] without @deva[सुट्] has different meaning ('misfortune'). This distinguishes @deva[आस्पद] (position) from @deva[आपद्] (calamity).
"""

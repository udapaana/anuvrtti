id = "6.1.88"
numericId = "61088"

[en]
simple = """
@deva[वृद्धि] (@deva[ऐ], @deva[औ]) is the single substitute when @deva[अ] or @deva[आ] is followed by a diphthong. Examples: @deva[ब्रह्म] + @deva[एडका] → @deva[ब्रह्मैडका]; @deva[खट्वा] + @deva[एव] → @deva[खट्वैव].
"""

standard = """
When @deva[अ/आ] precedes a diphthong (@deva[एच्]: @deva[ए], @deva[ऐ], @deva[ओ], @deva[औ]), @deva[वृद्धि] replaces both: @deva[अ/आ + ए/ऐ] → @deva[ऐ]; @deva[अ/आ + ओ/औ] → @deva[औ]. This overrides @ref[6.1.87] @deva[गुण]. Examples: @deva[ब्रह्म + एडका] → @deva[ब्रह्मैडका]; @deva[खट्वा + ऐषति] → @deva[खट्वैषति]; @deva[भानु + ओजः] → @deva[भानौजः].
"""

advanced = """
This @deva[वृद्धि-एकादेश] for @deva[अत्] + @deva[एच्] supersedes @ref[6.1.87] @deva[गुण]. Results: @deva[अ/आ + ए] → @deva[ऐ]; @deva[अ/आ + ऐ] → @deva[ऐ]; @deva[अ/आ + ओ] → @deva[औ]; @deva[अ/आ + औ] → @deva[औ]. The @deva[आत्] indicates @deva[अ/आ] as preceding. Examples: @deva[ब्रह्मैडका], @deva[खट्वैव], @deva[परमौदनम्].
"""

id = "6.1.189"
numericId = "61189"

[en]
simple = """
Reduplicated verbs have acute accent on the first syllable when followed by a vowel-initial @deva[सार्वधातुक] personal ending (the vowel not being @deva[नुट्]). So @deva[जु꣡होति] has initial accent.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to reduplicated (@deva[द्वित्व]) verb forms before @deva[सार्वधातुक] @deva[अजादि] endings (excluding @deva[नुट्]-augmented forms). Examples: @deva[जु꣡होति], @deva[बि꣡भर्ति], @deva[दधा꣡ति]. The reduplication syllable (first) takes the @deva[उदात्त].
"""

advanced = """
The @deva[द्विर्वचने] condition targets reduplicated stems (from @ref[6.1.1]-@ref[6.1.12]). The @deva[अजादौ अनुण्] specifies: vowel-initial @deva[सार्वधातुक] ending where the vowel isn't @deva[नुट्] (@ref[7.1.58]). The @deva[आद्युदात्त] falls on the @deva[अभ्यास] (reduplicated syllable). This covers @deva[जुहोत्यादि]-class verbs and reduplicated perfects.
"""

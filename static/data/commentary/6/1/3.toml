id = "6.1.3"
numericId = "61003"

[en]
simple = """
When reduplicating the second syllable, the consonants @deva[न्], @deva[द्], and @deva[र्] at the start of a cluster are not copied. Example: @deva[उन्द्] + @deva[सन्] → @deva[उन्दिदिषति] (not @deva[उन्दिन्दिषति]).
"""

standard = """
The consonants @deva[न्], @deva[द्], @deva[र्] as @deva[संयोगादि] (cluster-initial) in the second syllable are excluded from reduplication. Examples: @deva[उन्दिदिषति] (from @deva[उन्द्]), @deva[अड्डिडिषति] (from @deva[अड्ड्]), @deva[अर्चिचिषति] (from @deva[अर्च्]). @[vārtika]: @deva[ब्] is also excluded: @deva[उब्जिजिषति]. @[vārtika]: @deva[र्] before @deva[य्] is NOT excluded: @deva[अरार्यते] (Intensive of @deva[ॠ]).
"""

advanced = """
This @[sūtra] prohibits @deva[द्वित्व] of @deva[न्], @deva[द्], @deva[र्] when @deva[संयोगादि] in @deva[द्वितीयैकाच्]. @deva[अजादेः] continues from @ref[6.1.2]. Examples: @deva[उन्दिदिषति], @deva[अड्डिडिषति], @deva[अर्चिचिषति]. @[vārtika] @deva[बकारस्य च]: @deva[उब्जिजिषति]. This applies when @deva[ब्] is @deva[उपदेश]-original; if @deva[द्] → @deva[ब्] by substitution, no prohibition. @[vārtika] @deva[रेफस्य यकारे]: @deva[र्य] allows @deva[र्]-reduplication: @deva[अरार्यते] (@deva[ॠ] + @deva[यङ्]). @[vārtika] @deva[ईर्ष्य]-forms: @deva[ईर्ष्यिषिषति] or @deva[ईर्ष्यियिषति]. @[vārtika]: @deva[कण्डूयादि] reduplicate third syllable: @deva[कण्डूयियिषति].
"""

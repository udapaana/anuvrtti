id = "6.1.134"
numericId = "61134"

[en]
simple = """
The nominative ending of @deva[सस्] ('he') is dropped before a vowel if this makes the verse meter correct. This is a Vedic rule for metrical adjustment.
"""

standard = """
This @[sūtra] allows @deva[सु]-lopa for @deva[सस्] (an archaic nominative 'he') before vowels when meter requires it. The condition @deva[पादपूरणे] ('for completing the verse-foot') makes this metrically conditioned. Example: @deva[स एष दाशरथी रामः] where @deva[स] (not @deva[सः]) fits the meter.
"""

advanced = """
The form @deva[सस्] is an archaic nominative that alternates with @deva[सः]. The @deva[पादपूरण] condition makes this a metrical license—the deletion occurs when retaining @deva[स्] would violate prosodic requirements. The @deva[कारिका] quoted provides examples showing @deva[स] fitting specific meters. Such rules document the interaction between grammar and Vedic prosody.
"""

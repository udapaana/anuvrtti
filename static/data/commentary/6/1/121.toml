id = "6.1.121"
numericId = "61121"

[en]
simple = """
In the Yajurveda, when the @deva[अनुदात्त] (grave-accented) @deva[अ] of @deva[अवपथाः] follows @deva[ए] or @deva[ओ], both vowels retain their original forms. So @deva[रुद्रेभ्यो अवपथाः] maintains the hiatus.
"""

standard = """
This @[sūtra] specifies a Yajurveda @deva[प्रकृतिभाव] for the word @deva[अवपथाः] ('portions'). When its initial @deva[अनुदात्त] @deva[अ] follows @deva[ए/ओ], no sandhi occurs. Example: @deva[त्री रुद्रेभ्यो अवपथाः]—the @deva[ओ] of @deva[रुद्रेभ्यो] and @deva[अ] of @deva[अवपथाः] are both preserved.
"""

advanced = """
This is a lexically specific @deva[प्रकृतिभाव] rule for Yajurveda. The @deva[अनुदात्त] condition indicates tonal specification—the @deva[अ] must bear the grave accent. The word @deva[अवपथाः] appears in specific Yajurveda mantras where hiatus is required for proper recitation. Such rules document the phonological peculiarities of transmitted Vedic texts.
"""

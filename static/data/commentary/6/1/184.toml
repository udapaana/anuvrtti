id = "6.1.184"
numericId = "61184"

[en]
simple = """
After @deva[नृ] ('man'), case endings beginning with @deva[भ्] or @deva[स्] are optionally unaccented. So @deva[नृभिः] can be either @deva[नृ꣡भिः] (stem-accented) or @deva[नृभि꣡ः] (ending-accented).
"""

standard = """
This @[sūtra] provides optional @deva[अनुदात्त] for @deva[भस्]-initial endings after @deva[नृ]. The @deva[विभाषा] allows both patterns: @deva[नृ꣡भिः] (ending unaccented) or @deva[नृभि꣡ः] (ending accented by @ref[6.1.168]). Similarly @deva[नृभ्यः], @deva[नृभ्याम्], @deva[नृषु].
"""

advanced = """
The @deva[नृञः] (ablative of @deva[नृ]) indicates the stem @deva[नृ] ('man'). The @deva[विभाषा] creates optionality between @ref[6.1.168]'s accent (ending-accent) and @ref[6.1.183]'s pattern (stem-accent). Both @deva[नृ꣡भिः] and @deva[नृभि꣡ः] are valid. This @deva[विकल्प] reflects variant accent traditions for this stem.
"""

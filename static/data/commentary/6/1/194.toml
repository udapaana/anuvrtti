id = "6.1.194"
numericId = "61194"

[en]
simple = """
When the absolutive affix @deva[णमुल्] follows, the first syllable may optionally have acute accent. So @deva[लोलूयम्] ('repeatedly cutting') can be @deva[लो꣡लूयम्] or @deva[लोलू꣡यम्].
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] before @deva[णमुल्] (absolutive affix @ref[3.4.21]). Example: @deva[लोलूयम्] can be @deva[लो꣡लूयम्] (first-syllable accent) or @deva[लोलू꣡यम्] (pre-affix accent by @ref[6.1.193]). The reduplicated stem @deva[लोलू] shows optional accent placement.
"""

advanced = """
The @deva[णमुलि] context addresses @deva[णमुल्] (@ref[3.4.21]), which normally triggers @ref[6.1.193]'s @deva[लित्] accent (penultimate). This @[sūtra] adds optional @deva[आद्युदात्त]. For @deva[लोलूयम्] (from @deva[लू] 'cut' with reduplication), either @deva[लो꣡लूयम्] (initial) or @deva[लोलू꣡यम्] (pre-affix) is valid. The optionality reflects variant accent traditions.
"""

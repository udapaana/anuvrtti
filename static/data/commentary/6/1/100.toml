id = "6.1.100"
numericId = "61100"

[en]
simple = """
In a doubled sound-imitation word with @deva[आ]-affix (causing @deva[अत्]-elision), @deva[पररूप] is obligatory: the second member's initial replaces both. Example: @deva[पटत्पटत्] + @deva[डाच्] → @deva[पटपटा].
"""

standard = """
When @deva[डाच्] (@ref[5.4.57]) is added to doubled @deva[अव्यक्तानुकरण], causing @deva[अत्]-elision, the consonant junction undergoes @deva[पररूप]: @deva[पटत्पटत्] + @deva[डाच्] → @deva[पटत्पटा] → @deva[पट् + प्] → @deva[प्] (second consonant replaces both) → @deva[पटपटा]. Similarly @deva[दमदमा].
"""

advanced = """
This @[vārtika-origin] rule: @deva[आम्रेडित] + @deva[डाच्] (@ref[5.4.57]) → @deva[अदन्त-लोप], then @deva[त् + प्] → @deva[प्] (@deva[पररूप]). @deva[पटत्पटत्] → @deva[पटत्पट् + आ] → @deva[पट् + प् + पटा] → @deva[प्] replaces @deva[त् + प्] → @deva[पटपटा करोति]. The @deva[डाच्] triggers doubling by @ref[5.4.57] @deva[स्वरितेनाधिकारः].
"""

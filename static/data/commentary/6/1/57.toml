id = "6.1.57"
numericId = "61057"

[en]
simple = """
The causative of @deva[स्मि] (to smile/wonder) invariably substitutes @deva[आ] for its diphthong when astonishment is caused directly by the causer. Example: @deva[मुण्डो विस्मापयते] (the bald one amazes).
"""

standard = """
Unlike @ref[6.1.56] (optional), @deva[स्मि] takes obligatory @deva[ए] → @deva[आ] when the @deva[हेतु] directly causes wonder: @deva[मुण्डो जटिलो वा विस्मापयते]. For indirect cause: @deva[कुञ्चिकयैनं विस्माययति]. The word @deva[भय] here means @deva[स्मय] (wonder), as in @ref[1.3.68].
"""

advanced = """
This @deva[नित्य] rule (@deva[विभाषा] doesn't continue) applies to @deva[स्मि विस्मये] causative with @deva[हेतुभय] (= @deva[हेतुस्मय], wonder caused by @deva[हेतु]). Direct cause: @deva[विस्मापयते] (invariable @deva[आ]). Indirect: @deva[विस्माययति]. The @deva[भय] → @deva[स्मय] semantic extension follows @ref[1.3.68].
"""

id = "6.1.138"
numericId = "61138"

[en]
simple = """
The @deva[सुट्] augment is also added when @deva[सम्], @deva[परि], or @deva[उप] + @deva[कृ] means 'to combine/bring together'. So @deva[सम् + कृ] = @deva[संस्कृ] meaning 'to combine' (as in @deva[समवाय] 'assemblage').
"""

standard = """
This @[sūtra] extends @deva[सुट्] to the 'combining' sense (@deva[समवाये]). When @deva[सम्/परि/उप] + @deva[कृ] means 'to assemble, collect, combine', @deva[सुट्] applies. The term @deva[समवाय] indicates bringing together disparate elements. Example: @deva[संस्कुर्वन्ति] 'they combine/gather together'.
"""

advanced = """
The @deva[समवाय] sense (combination, assemblage) is semantically related to but distinct from @deva[अलङ्कार] (adornment). Both involve 'bringing together' but with different outcomes—aesthetic refinement vs. physical collection. The @deva[सुट्] augment in both contexts marks the preverb-verb combination as a lexicalized unit with specialized meaning, distinguishing it from compositional @deva[सम् + कृ] without @deva[सुट्].
"""

id = "6.1.112"
numericId = "61112"

[en]
simple = """
For @deva[सखि] ('friend') and @deva[पति] ('lord/husband'), when the final @deva[इ] becomes @deva[य्] before @deva[अस्], @deva[उ] substitutes for the @deva[अ]. So @deva[सखि] + @deva[अस्] → @deva[सख्युः] and @deva[पति] + @deva[अस्] → @deva[पत्युः].
"""

standard = """
This @[sūtra] provides the special genitive/ablative forms of @deva[सखि] and @deva[पति]. When the stem-final @deva[इ] becomes @deva[य्] (by @ref[6.1.77] @deva[इको यणचि]), the @deva[अ] of @deva[अस्] is replaced by @deva[उ]. Thus: @deva[सखि + अस्] → @deva[सख्य् + अस्] → @deva[सख्य् + उस्] → @deva[सख्युः]. Similarly @deva[पति + अस्] → @deva[पत्युः].
"""

advanced = """
The condition @deva[यि च] ('when @deva[य्] is substituted for @deva[इ]') is crucial—the @deva[उ]-substitution depends on prior @deva[यण्]-sandhi. This creates a two-step derivation: first @deva[इ] → @deva[य्] before the vowel of @deva[अस्], then @deva[अ] → @deva[उ]. These forms are archaic remnants; @deva[सखि] and @deva[पति] show irregular declension patterns that @[pāṇini] accommodates through specific rules. Compare @deva[पत्युः] vs. regular @deva[कवेः].
"""

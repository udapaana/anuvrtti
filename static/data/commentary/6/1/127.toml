id = "6.1.127"
numericId = "61127"

[en]
simple = """
According to @deva[शाकल्य], simple vowels (except @deva[अ]) keep their form before a different vowel—long vowels become short. So @deva[ददाति + ईश्वरः] can stay as @deva[ददाति ईश्वरः] (with @deva[इ] shortened if originally long).
"""

standard = """
This @[sūtra] presents @deva[शाकल्य]'s view: @deva[इ उ ऋ ऌ] (simple vowels excluding @deva[अ]) retain their form before a non-homogeneous (@deva[असवर्ण]) vowel, with long vowels shortened. This is an alternative to standard @deva[यण्] sandhi. So @deva[ददाती + ईश्वरः] → @deva[ददाति ईश्वरः] (not @deva[ददात्यीश्वरः]).
"""

advanced = """
The @deva[शाकल्य] school represents a @deva[शाखा]-specific tradition, likely the @[śākala] recension of @[ṛgveda]. The @deva[ह्रस्वः] condition means long @deva[ई ऊ] become short @deva[इ उ] to satisfy @deva[प्रकृतिभाव]. This preserves syllable count while avoiding @deva[यण्] glide formation. Such variant treatments document the diversity of Vedic phonological traditions.
"""

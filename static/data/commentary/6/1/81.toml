id = "6.1.81"
numericId = "61081"

[en]
simple = """
The forms @deva[क्षय्य] (conquerable) and @deva[जय्य] (defeatable) show @deva[ए] → @deva[अय्] only when meaning 'possible to do'. Examples: @deva[क्षय्यः] = @deva[शक्यः क्षेतुम्]. Otherwise: @deva[क्षेयं पापम्], @deva[जेयो वृषलः].
"""

standard = """
The roots @deva[क्षि]/@deva[जि] + @deva[यत्] (@ref[3.1.97]) show @deva[ए] → @deva[अय्] when meaning 'able to be done' (@deva[शक्य]): @deva[क्षय्यः] = @deva[शक्यः क्षेतुम्]; @deva[जय्यः] = @deva[शक्यो जेतुम्]. For 'necessary' (@deva[कर्तव्य]) meaning: @deva[क्षेयं पापम्], @deva[जेयो वृषलः]—no @deva[अय्]-substitution.
"""

advanced = """
This restricts @ref[6.1.78] for @deva[क्षि क्षये]/@deva[जि] @deva[जये] + @deva[यत्]. @deva[शक्यार्थ] (possibility): @deva[क्षय्यः], @deva[जय्यः] (with @deva[ए] → @deva[अय्]). @deva[कर्तव्यार्थ] (necessity): @deva[क्षेयम्], @deva[जेयः] (standard @deva[ए] retained). The semantic condition controls the phonological outcome.
"""

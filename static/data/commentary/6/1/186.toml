id = "6.1.186"
numericId = "61186"

[en]
simple = """
The personal endings (verb terminations) and their substitutes are unaccented when they are @deva[सार्वधातुक] and follow the periphrastic future marker @deva[तास्], @deva[लिट्] (perfect), or the prohibitive @deva[माङ्].
"""

standard = """
This @[sūtra] assigns @deva[अनुदात्त] to @deva[सार्वधातुक] @deva[तिङ्] endings (and substitutes per @ref[3.2.124]-@ref[3.2.126]) after: (1) @deva[तास्] (periphrastic future), (2) @deva[लिट्] (perfect), (3) @deva[माङ्] (prohibitive particle). The endings lose their inherent accent in these contexts.
"""

advanced = """
The @deva[तासिलिट्माङ्क्षु] domain includes three contexts: @deva[तास्] (@deva[लुट्]-marker for periphrastic future), @deva[लिट्] (perfect tense), and @deva[माङ्] (prohibitive 'don't'). In all three, @deva[सार्वधातुक] @deva[तिङ्] (@ref[3.4.113]) and their @deva[आदेश] (@ref[3.2.124]-@ref[3.2.126]) become @deva[अनुदात्त]. This creates accent patterns like @deva[कर्ता꣡सि], @deva[चकार꣡], @deva[मा कार्षीः꣡].
"""

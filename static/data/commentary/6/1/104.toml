id = "6.1.104"
numericId = "61104"

[en]
simple = """
@deva[पूर्वरूप दीर्घ] (@ref[6.1.102]) doesn't apply when @deva[अ/आ] is followed by a non-@deva[अ] vowel of nominative/accusative. Examples: @deva[वृक्षौ], @deva[खट्वे]—here @deva[गुण/वृद्धि] apply instead.
"""

standard = """
When @deva[अत्/आत्] precedes an @deva[इच्] (vowel other than @deva[अ]) of @deva[प्रथमा/द्वितीया], @ref[6.1.102] doesn't apply; @ref[6.1.87] etc. do: @deva[वृक्षौ], @deva[प्लक्षौ] (@deva[वृद्धि]); @deva[खट्वे], @deva[कुण्डे] (@deva[गुण]). If followed by @deva[अ]: @deva[वृक्षाः] (@ref[6.1.102] applies). Non-@deva[अ/आ] stems: @deva[अग्नी] (by @ref[6.1.102]).
"""

advanced = """
This @deva[प्रतिषेध] blocks @ref[6.1.102] for @deva[अत्/आत् + इच् (सुपि)]. @deva[इच्] = vowels except @deva[अ]. @deva[वृक्ष + औ] → @deva[वृक्षौ] (not @deva[*वृक्षा], by @ref[6.1.88] @deva[वृद्धि]); @deva[खट्वा + ए] → @deva[खट्वे] (@ref[6.1.87] @deva[गुण]). @deva[अत् + अ]: @deva[वृक्षाः] (@ref[6.1.102] applies). Non-@deva[अत्]: @deva[अग्नि + औ] → @deva[अग्नी] (@ref[6.1.102]).
"""

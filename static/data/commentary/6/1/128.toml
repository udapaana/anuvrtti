id = "6.1.128"
numericId = "61128"

[en]
simple = """
According to @deva[शाकल्य], a simple vowel before @deva[ऋ] retains its form (with long becoming short). So @deva[खट्वा + ऋश्यः] can be @deva[खट्वा ऋश्यः] in @[śākala] recitation.
"""

standard = """
This @[sūtra] extends @deva[शाकल्य]'s @deva[प्रकृतिभाव] rule to contexts where @deva[ऋ] follows. A simple vowel before @deva[ऋ] is retained (long → short). Example: @deva[खट्वा ऋश्यः] (not @deva[खट्वार्श्यः]), @deva[कुमारि ऋषभः] (not @deva[कुमार्यृषभः]). This is a Vedic option.
"""

advanced = """
The @deva[ऋकारे] specification separates this from @ref[6.1.127]. While @ref[6.1.127] handles non-homogeneous vowels generally, this @[sūtra] specifically addresses @deva[ऋ]-following contexts. The @deva[ऋ] vowel has special phonological behavior (its semivowel @deva[र्] creates complex clusters), motivating a separate rule. @deva[शाकल्य]'s tradition thus permits hiatus before @deva[ऋ].
"""

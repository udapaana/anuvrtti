id = "6.1.193"
numericId = "61193"

[en]
simple = """
An affix with indicatory @deva[ल्] causes acute accent on the syllable immediately before it. So @deva[ण्वुल्] gives @deva[चिकी꣡र्षकः] with accent on the syllable before the affix.
"""

standard = """
This @[sūtra] assigns @deva[उदात्त] to the @deva[उपोत्तम] (penultimate/pre-affix) syllable when a @deva[लित्] affix follows. Example: @deva[ण्वुल्] (@ref[3.1.133]) → @deva[चिकी꣡र्षकः], @deva[जिही꣡र्षकः]. The @deva[ल्] marker indicates accent falls on the syllable just before the affix.
"""

advanced = """
The @deva[लिति उपोत्तमम्] rule: @deva[लित्] affixes (with indicatory @deva[ल्]) trigger @deva[उदात्त] on the immediately preceding syllable. @deva[ण्वुल्] examples: @deva[चिकी꣡र्षकः] (accent on @deva[की]), @deva[जिही꣡र्षकः] (on @deva[ही]). The @deva[उपोत्तम] is the syllable right before the affix begins. This complements @deva[तित्] (@deva[स्वरित]) and @deva[कित्/चित्] (@deva[अन्तोदात्त]) markers.
"""

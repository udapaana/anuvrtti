id = "6.1.25"
numericId = "61025"

[en]
simple = """
@deva[श्याय्] undergoes @deva[संप्रसारण] before @deva[निष्ठा] when preceded by @deva[प्रति], regardless of meaning. Example: @deva[प्रतिशीनः], @deva[प्रतिशीनवान्].
"""

standard = """
Unlike @ref[6.1.24] which requires specific meanings, when @deva[प्रति] precedes @deva[श्याय्], @deva[संप्रसारण] occurs before @deva[निष्ठा] unconditionally: @deva[प्रतिशीनः], @deva[प्रतिशीनवान्]. The meaning restriction of the previous @[sūtra] doesn't apply here.
"""

advanced = """
This @[sūtra] removes the semantic restriction of @ref[6.1.24] when @deva[प्रति] is the @deva[उपसर्ग]. Derivation: @deva[प्रति] + @deva[श्या] + @deva[त] → @deva[प्रति] + @deva[शि] + @deva[त] → @deva[प्रतिशीत] (@ref[6.4.2]) → @deva[प्रतिशीन] (@ref[8.2.47]). The @deva[त] → @deva[न] substitution applies. Forms: @deva[प्रतिशीनः], @deva[प्रतिशीनवान्]. Any meaning of @deva[प्रतिश्याय्] qualifies.
"""

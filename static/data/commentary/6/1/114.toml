id = "6.1.114"
numericId = "61114"

[en]
simple = """
When @deva[रु] has short @deva[अ] before it and is followed by a soft consonant (voiced stop, nasal, semivowel, or @deva[ह]), @deva[उ] substitutes for the @deva[रु]. So @deva[रामस् + गच्छति] becomes @deva[रामो गच्छति].
"""

standard = """
This @[sūtra] extends the @deva[उ]-substitution for @deva[रु] to contexts where a soft consonant (@deva[हशि] = voiced stops, nasals, semivowels, @deva[ह]) follows. The preceding @deva[अ] must be short and non-@deva[प्लुत]. Thus @deva[रामस् + गच्छति] → @deva[रामरु + गच्छति] → @deva[राम + उ + गच्छति] → @deva[रामो गच्छति]. The @deva[उ] combines with @deva[अ] by @deva[गुण] to give @deva[ओ].
"""

advanced = """
The @deva[हश्] @[pratyāhāra] includes all voiced consonants except @deva[ल्] (some include @deva[ल्]). This rule works in tandem with @ref[6.1.113]—both convert @deva[रु] to @deva[उ] under slightly different phonological conditions. The @deva[अप्लुत] restriction again excludes Vedic prolonged vowels. After @deva[उ]-substitution, standard @deva[गुण] sandhi (@ref[6.1.87]) applies, yielding @deva[ओ]. The @deva[रु] itself disappears entirely.
"""

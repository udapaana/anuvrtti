id = "6.1.215"
numericId = "61215"

[en]
simple = """
The words @deva[वेणु] ('bamboo/flute') and @deva[इन्धान] ('fuel/kindling') may optionally have acute accent on the first syllable. So @deva[वे꣡णुः] or @deva[वेणु꣡ः]; @deva[इ꣡न्धानः] or @deva[इन्धा꣡नः].
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] for @deva[वेणु] and @deva[इन्धान]. For @deva[वेणु]: @deva[वे꣡णुः] or @deva[वेणु꣡ः]. For @deva[इन्धान]: @deva[इ꣡न्धानः], @deva[इन्धा꣡नः], or @deva[इन्धान꣡ः]. Multiple accent variants are acceptable.
"""

advanced = """
The @deva[वेण्विन्धानयोः वा] provides @deva[विभाषा] (optionality). @deva[वेणु] has two options; @deva[इन्धान] (a @deva[शानच्] participle from @deva[इन्ध्] 'kindle') shows three possible accents reflecting different analyses. The optionality documents variant pronunciations in the tradition. Both are @deva[निपातन]-like forms with flexible accent.
"""

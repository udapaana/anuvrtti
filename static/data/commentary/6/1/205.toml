id = "6.1.205"
numericId = "61205"

[en]
simple = """
A two-syllable past participle in @deva[त] (@deva[निष्ठा]) has acute accent on the first syllable when it's a name, unless the first syllable has @deva[आ]. So @deva[गु꣡प्तः] ('Gupta'), @deva[बु꣡द्धः] ('Buddha'), but not @deva[*आ꣡प्तः].
"""

standard = """
This @[sūtra] provides @deva[आद्युदात्त] for disyllabic @deva[निष्ठा] (@deva[त]-participle) names, excluding those with initial @deva[आ]. Examples: @deva[गु꣡प्तः], @deva[बु꣡द्धः], @deva[मु꣡क्तः] (as names). Forms with @deva[आ] like @deva[आप्त], @deva[दात] don't take this accent.
"""

advanced = """
The @deva[द्व्यच्छो निष्ठायाम् अनाकारस्य] conditions: (1) @deva[द्व्यच्] (two syllables), (2) @deva[निष्ठा] (@deva[क्त/क्तवतु] participle), (3) @deva[संज्ञा] (name), (4) @deva[अनाकार] (no initial @deva[आ]). Forms meeting all conditions get @deva[आद्युदात्त]: @deva[गु꣡प्त], @deva[बु꣡द्ध], @deva[मु꣡क्त]. The @deva[आ]-exclusion prevents @deva[*आ꣡प्त].
"""

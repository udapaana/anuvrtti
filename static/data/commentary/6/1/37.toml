id = "6.1.37"
numericId = "61037"

[en]
simple = """
When a semivowel has undergone @deva[संप्रसारण], another semivowel preceding it in the same word does not undergo @deva[संप्रसारण]. Example: @deva[व्यध्] → @deva[विद्धः] (not @deva[*उइद्धः]).
"""

standard = """
If @deva[य्] in @deva[व्यध्] is vocalized to @deva[इ], the preceding @deva[व्] is not vocalized to @deva[उ]: @deva[विद्धः]. Similarly: @deva[व्यच्] → @deva[विचितः]; @deva[व्येञ्] → @deva[संवीतः]. Though the @deva[संप्रसारण] rule doesn't specify which semivowel, the maxim applies: perform the operation on the letter nearest to the operator (@deva[प्रत्यय]).
"""

advanced = """
This @deva[प्रतिषेध] prevents cascading @deva[संप्रसारण]. The principle: @deva[संप्रसारणाश्रये संप्रसारणं न भवति]—a semivowel dependent on (i.e., preceding) an already-vocalized semivowel doesn't vocalize. The selection principle: the semivowel nearest to the @deva[प्रत्यय] vocalizes first (@deva[अन्त्यस्य विधिः]). Examples: @deva[व्यध्] → @deva[विध्] (@deva[य्] → @deva[इ]) → @deva[विद्धः]; @deva[व्यच्] → @deva[विचितः]; @deva[व्ये] → @deva[संवीतः].
"""

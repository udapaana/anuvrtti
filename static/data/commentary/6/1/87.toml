id = "6.1.87"
numericId = "61087"

[en]
simple = """
@deva[गुण] (@deva[ए], @deva[ओ], @deva[अर्], @deva[अल्]) is the single substitute when @deva[अ] or @deva[आ] is followed by a simple vowel. Examples: @deva[तव] + @deva[इदम्] → @deva[तवेदम्]; @deva[खट्वा] + @deva[इन्द्रः] → @deva[खट्वेन्द्रः].
"""

standard = """
When @deva[अ/आ] precedes a simple vowel (@deva[अच्]), @deva[गुण] replaces both: @deva[अ/आ + इ/ई] → @deva[ए]; @deva[अ/आ + उ/ऊ] → @deva[ओ]; @deva[अ/आ + ऋ/ॠ] → @deva[अर्]; @deva[अ/आ + ऌ] → @deva[अल्]. Examples: @deva[तव + इदम्] → @deva[तवेदम्]; @deva[खट्वा + इन्द्रः] → @deva[खट्वेन्द्रः]; @deva[तव + ईहते] → @deva[तवेहते].
"""

advanced = """
This @deva[गुण-एकादेश] for @deva[अत्] (@deva[अ/आ]) + @deva[अच्] (@deva[इक्] or @deva[अ]). The @deva[आत्] from @ref[6.1.88] is understood. Results: @deva[अ/आ + इ/ई] → @deva[ए]; @deva[अ/आ + उ/ऊ] → @deva[ओ]; @deva[अ/आ + ऋ/ॠ] → @deva[अर्]; @deva[अ/आ + ऌ] → @deva[अल्]; @deva[अ/आ + अ] → @deva[आ] (@deva[सवर्णदीर्घ] by @ref[6.1.101]).
"""

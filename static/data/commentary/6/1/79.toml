id = "6.1.79"
numericId = "61079"

[en]
simple = """
The @deva[व्]-ending substitutes (@deva[अव्], @deva[आव्]) also apply before affixes beginning with @deva[य्]. Examples: @deva[बाभ्रव्यः] (descendant of @deva[बभ्रु]); @deva[माण्डव्यः].
"""

standard = """
The @deva[अव्]/@deva[आव्] substitutes (for @deva[ओ]/@deva[औ]) apply before @deva[य]-initial affixes: @deva[बभ्रु] + @deva[यञ्] → @deva[बाभ्रो] + @deva[य] → @deva[बाभ्रव्यः] (@ref[6.4.146], @ref[4.1.105]). Similarly @deva[माण्डव्यः], @deva[काण्व्यः]. The @deva[य]-initial affixes include @deva[यञ्], @deva[यत्], etc.
"""

advanced = """
This extends @deva[अव्/आव्]-substitution to @deva[यादि प्रत्यय] (not just @deva[अजादि]). The @deva[वान्त] (@deva[व्]-final = @deva[अव्], @deva[आव्]) substitutes apply: @deva[बभ्रु] → @deva[बाभ्रो] (@deva[वृद्धि]) + @deva[य] (@deva[यञ्]) → @deva[बाभ्रव्यः]. @deva[ओ/औ] → @deva[अव्/आव्] before @deva[यञ्/यत्/ष्यञ्] etc.
"""

id = "6.1.133"
numericId = "61133"

[en]
simple = """
In Vedic literature, the nominative singular ending after @deva[स्य] is optionally deleted before a consonant. So Vedic phrases may show @deva[स्य] without the @deva[स्] ending before consonant-initial words.
"""

standard = """
This @[sūtra] provides a Vedic option for @deva[सु]-lopa (nominative @deva[स्] elision) after forms ending in @deva[स्य]. The @deva[विभाषा] indicates optionality, and @deva[छन्दसि] restricts it to Vedic. Example: @deva[उत स्य वाजी] (@[ṛgveda]) where @deva[स्य] (for @deva[स्यः]) appears before consonant @deva[व्].
"""

advanced = """
The @deva[स्य] here likely refers to forms of the demonstrative or relative with @deva[स्य]-ending (genitive-like forms repurposed nominatively, or stem forms). The @deva[विभाषा] allows both @deva[स्यः] (with @deva[सु]) and @deva[स्य] (without) before consonants. This documents Vedic morphological variation that doesn't survive into Classical Sanskrit.
"""

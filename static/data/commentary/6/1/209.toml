id = "6.1.209"
numericId = "61209"

[en]
simple = """
In Vedic literature (@deva[छन्दस्]), the words @deva[जुष्ट] ('enjoyed/favored') and @deva[अर्पित] ('placed/offered') may optionally have acute accent on the first syllable. So @deva[जु꣡ष्टः] or @deva[जुष्ट꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] for @deva[जुष्ट] and @deva[अर्पित] in Vedic (@deva[छन्दसि]). Both forms are attested: @deva[जु꣡ष्टः/जुष्ट꣡ः], @deva[अ꣡र्पितः/अर्पित꣡ः]. The @deva[विभाषा] indicates variant readings in Vedic texts.
"""

advanced = """
The @deva[छन्दसि जुष्टार्पितयोः विभाषा] documents Vedic accent variation for these participles. @deva[जुष्ट] (from @deva[जुष्] 'enjoy') and @deva[अर्पित] (from @deva[ऋ] 'go' causative) show @deva[आद्युदात्त] optionally in Vedic. This reflects recension-specific differences in transmitted Vedic texts.
"""

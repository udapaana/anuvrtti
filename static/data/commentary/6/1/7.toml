id = "6.1.7"
numericId = "61007"

[en]
simple = """
For roots like @deva[तुज्], the short vowel in the @deva[अभ्यास] becomes long (in Vedic). Example: @deva[तुज्] → @deva[तूतुजानः] (urging); @deva[मह्] → @deva[मामहानः]. This lengthening does not occur in ordinary Sanskrit: @deva[तुतोज].
"""

standard = """
The @deva[तुजादि] class lengthens the @deva[अभ्यास] vowel, but only in Vedic before specific affixes. No formal list exists—@deva[आदि] means 'and similar'. Vedic examples: @deva[तूतुजानः] (@deva[तुज्] + @deva[कानच्] @ref[3.2.106]), @deva[मामहानः], @deva[दाधार], @deva[मीमाय]. In @deva[लौकिक] Sanskrit: @deva[तुतोज शबलान् हरीन्]—no lengthening.
"""

advanced = """
No @deva[गण] list exists for @deva[तुजादि]; @deva[आदि] indicates analogical extension. Vedic forms with lengthened @deva[अभ्यास]: @deva[तूतुजानः] (RV @ref[1.3.6]), @deva[मामहानः], @deva[स तूताव]. This lengthening occurs only in @deva[छन्दस्] before specific @deva[प्रत्यय] (like @deva[कानच्]). @deva[लौकिक] forms retain short @deva[अभ्यास]: @deva[तुतोज], @deva[ममाह]. The principle: wherever a long @deva[अभ्यास] vowel appears in Veda, it's valid by this @deva[सूत्र].
"""

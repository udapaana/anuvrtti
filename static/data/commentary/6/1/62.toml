id = "6.1.62"
numericId = "61062"

[en]
simple = """
@deva[शीर्ष] (not @deva[शीर्षन्]) substitutes for @deva[शिरस्] when a @deva[तद्धित] affix beginning with a vowel follows. Examples: @deva[हस्तिशिरसोऽपत्यम्] → @deva[हास्तिशीर्षिः]; @deva[स्थूलशिरस इदम्] → @deva[स्थौलशीर्षम्].
"""

standard = """
Before @deva[अजादि तद्धित], @deva[शिरस्] → @deva[शीर्ष] (not @deva[शीर्षन्]): @deva[हास्तिशीर्षिः] (patronymic with @deva[इञ्] @ref[4.1.96]); @deva[स्थौलशीर्षम्]. If @deva[शीर्षन्] were used, @ref[6.4.168] would retain @deva[न्], giving wrong forms. For feminine @deva[हास्तिशीर्षिः] + @deva[ष्यङ्]: proper forms result.
"""

advanced = """
The choice of @deva[शीर्ष] (not @deva[शीर्षन्]) avoids @ref[6.4.168] issues. With @deva[शीर्षन्], @deva[न्] would persist before @deva[अजादि], blocking correct derivations. Examples: @deva[हस्तिशिरस्] + @deva[इञ्] → @deva[हास्तिशीर्षिः] (@deva[वृद्धि] of both); @deva[स्थूलशिरस्] + @deva[अण्] → @deva[स्थौलशीर्षम्]. Feminine @deva[हास्तिशीर्षिः] + @deva[ष्यङ्] requires @deva[शीर्ष]-base.
"""

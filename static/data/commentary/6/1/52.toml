id = "6.1.52"
numericId = "61052"

[en]
simple = """
In Vedic, the root @deva[खिद्] (to suffer pain) optionally substitutes @deva[आ] for its diphthong. Examples: @deva[चिखाद] or @deva[चिखेद] (Perfect).
"""

standard = """
In @deva[छन्दस्], @deva[खिद्] has optional @deva[ए] → @deva[आ]: @deva[चित्तं चिखाद] or @deva[चित्तं चिखेद] (Perfect). In @deva[लौकिक]: @deva[खेदयति] (causative)—the option is only Vedic.
"""

advanced = """
This @deva[छान्दस विभाषा] for @deva[खिद् दैन्ये]: the @deva[गुण ए] optionally → @deva[आ] in Vedic. Perfect forms: @deva[चिखाद]/@deva[चिखेद]. In secular Sanskrit, only standard forms: @deva[खेदयति] (@deva[णिजन्त]). The option doesn't extend to @deva[भाषा].
"""

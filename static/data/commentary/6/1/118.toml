[en]
simple = """
In the Yajurveda, the short @deva[अ] is preserved (not absorbed) after @deva[आपो], @deva[जुषाणो], @deva[वृष्णो], @deva[वर्षिष्ठे], and in @deva[अम्बे अम्बाले] before @deva[अम्बिके]. So these maintain hiatus in Yajurveda recitation.
"""

standard = """
This @[sūtra] lists specific Yajurveda contexts where @deva[प्रकृतिभाव] applies—the short @deva[अ] following @deva[ए/ओ] is retained rather than undergoing @deva[पूर्वरूप] sandhi. The words include: @deva[आपो + अ...], @deva[जुषाणो + अ...], @deva[वृष्णो + अ...], @deva[वर्षिष्ठे + अ...], and the sequence @deva[अम्बे अम्बाले + अम्बिके].
"""

advanced = """
These are lexically specified @deva[प्रकृतिभाव] contexts in Yajurveda @[saṃhitā] passages. The list reflects actual textual occurrences where hiatus is preserved in the transmitted tradition. The @deva[अम्बे अम्बाले अम्बिके] sequence is from a specific mantra. Such rules serve as a phonological annotation of the Vedic text, ensuring correct recitation according to the Yajurveda tradition.
"""

id = "6.1.170"
numericId = "61170"

[en]
simple = """
In Vedic literature, case endings other than @deva[सर्वनामस्थान] (strong cases) receive acute accent when the stem ends in @deva[अञ्च्] ('going towards'). So @deva[प्राच्] ('eastern') in non-strong cases has accented endings.
"""

standard = """
This @[sūtra] assigns @deva[उदात्त] to @deva[असर्वनामस्थान] (weak/middle) case-endings after @deva[अञ्च्]-final stems in Vedic. Stems like @deva[प्राच्], @deva[प्रत्यच्], @deva[उदच्] take accented endings in instrumental, etc. The @deva[सर्वनामस्थान] (nominative, accusative, vocative) are excluded.
"""

advanced = """
The @deva[छन्दसि] restricts this to Vedic usage. @deva[अञ्चि] (locative of @deva[अञ्च्]) indicates stems ending in @deva[अञ्च्] like directional words. The @deva[असर्वनामस्थान] specification targets @deva[भिस्/ङे/ङसि/आम्/सुप्] endings. This creates an accent pattern specific to @deva[अञ्च्]-stems in Vedic, distinguishing them from their Classical counterparts.
"""

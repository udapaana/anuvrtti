id = "6.1.147"
numericId = "61147"

[en]
simple = """
The word @deva[आश्चर्य] ('wonder, marvel') is formed with @deva[सुट्]. It means something unusual or extraordinary.
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[आश्चर्य] meaning 'unusual' or 'wonderful' (@deva[अद्भुत]). The derivation: @deva[आ + चर्] + @deva[यत्] with @deva[सुट्] → @deva[आश्चर्य]. The word describes something that causes wonder due to its extraordinary nature.
"""

advanced = """
The @deva[आ + चर्] base means 'to move towards/approach'. With @deva[यत्] (@[kṛt] affix) and @deva[सुट्], the derived @deva[आश्चर्य] means 'that which is approached with wonder' or 'that towards which one moves in amazement'. The @deva[सुट्] is integral to the standard form; @deva[*आचर्य] without @deva[सुट्] would mean 'to be approached/practiced' (different sense). The @deva[अद्भुत] gloss confirms the 'wonderful' meaning.
"""

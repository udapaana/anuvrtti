id = "6.1.187"
numericId = "61187"

[en]
simple = """
In the @deva[सिच्] aorist, the first syllable may optionally have acute accent. So @deva[अकार्षीत्] ('he did') can be @deva[अ꣡कार्षीत्] with initial accent, or have accent elsewhere.
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] (initial-syllable accent) for @deva[सिच्] aorist (@deva[लुङ्] with @deva[सिच्] marker). Forms like @deva[अकार्षीत्] can have @deva[अ꣡कार्षीत्] (first-syllable accent) optionally. The @deva[उदात्त] is understood from context.
"""

advanced = """
The @deva[सिचि] condition targets @deva[लुङ्] forms with @deva[सिच्] (@ref[3.1.44]). The @deva[आदेः विभाषा] allows @deva[आद्युदात्त] as an option. Examples: @deva[मा हि का꣡र्ष्टाम्] (initial accent) vs. default accent. This optionality may reflect dialectal or stylistic variation in aorist accent patterns.
"""

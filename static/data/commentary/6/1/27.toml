id = "6.1.27"
numericId = "61027"

[en]
simple = """
@deva[शृ] optionally substitutes for @deva[श्राय्] (to cook) before @deva[निष्ठा] @deva[क्त]. Example: @deva[शृतं क्षीरम्] (cooked milk) or @deva[श्रातम्]. The substitution is invariable in certain contexts.
"""

standard = """
The roots @deva[श्रै पाके] (@deva[भ्वादि]), @deva[श्रा पाके] (@deva[अदादि]), and @deva[श्रा पाके] (@deva[घटादि]) all substitute @deva[शृ] before @deva[निष्ठा क्त]. This is @deva[व्यवस्थितविभाषा] (regulated option): @deva[शृतं क्षीरम्], @deva[शृतं हविः]. Applies to both causative and non-causative. When the option doesn't apply: @deva[श्रातः].
"""

advanced = """
This @deva[व्यवस्थितविभाषा] teaches @deva[शृ] for @deva[श्रा] before @deva[निष्ठा]. Three @deva[श्रा]-roots are covered: @deva[श्रै पाके] (@deva[भ्वादि]), @deva[श्रा पाके] (@deva[अदादि] 3), @deva[श्रा पाके] (@deva[घटादि]). The @deva[शृ] applies to @deva[णिजन्त] too. Derivation: @deva[श्रा] → @deva[शृ] + @deva[त] → @deva[शृतम्]. The 'regulated' nature: @deva[शृ] is standard in most contexts; @deva[श्रात] appears in specific usages. Examples: @deva[शृतं क्षीरम्], @deva[शृतं हविः].
"""

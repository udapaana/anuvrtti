id = "6.1.90"
numericId = "61090"

[en]
simple = """
@deva[वृद्धि] is the single substitute when the augment @deva[आट्] is followed by any vowel. Examples: @deva[ईक्ष्] → @deva[ऐक्षिष्ट] (Aorist); @deva[ऐक्षत]; @deva[ऐक्षिष्यत] (Conditional).
"""

standard = """
The @deva[आट्]-augment (@ref[6.4.72]) added to vowel-initial roots in @deva[लङ्] (Imperfect), Aorist, and Conditional combines with the following vowel as @deva[वृद्धि]: @deva[आट्] + @deva[इ] → @deva[ऐ]; @deva[आट्] + @deva[उ] → @deva[औ]. Examples: @deva[ईक्ष्] → @deva[ऐक्षिष्ट], @deva[ऐक्षत], @deva[ऐक्षिष्यत]; @deva[उभ्] → @deva[औभत्].
"""

advanced = """
The @deva[एचि] @deva[अनुवृत्ति] ceases; @deva[अचि] continues. @deva[आट्] (@ref[6.4.72]) + any @deva[अच्] → @deva[वृद्धि]: @deva[आ + इ/ई] → @deva[ऐ]; @deva[आ + उ/ऊ] → @deva[औ]; @deva[आ + ऋ] → @deva[आर्]; @deva[आ + ए] → @deva[ऐ]; @deva[आ + ओ] → @deva[औ]. Examples: @deva[ऐक्षिष्ट] (@deva[लुङ्]), @deva[ऐक्षत] (@deva[लङ्]), @deva[ऐक्षिष्यत] (@deva[लृङ्]).
"""

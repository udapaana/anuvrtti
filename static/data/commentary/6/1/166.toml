id = "6.1.166"
numericId = "61166"

[en]
simple = """
The nominative plural of @deva[तिस्] ('three', feminine) has acute accent on the final syllable. So @deva[तिस्रः] is accented @deva[ति॒स्र꣡ः]. This overrides the usual @deva[स्वरित] accent rule.
"""

standard = """
This @[sūtra] assigns @deva[अन्तोदात्त] to the nominative plural @deva[जस्] when added to @deva[तिसृ] (feminine 'three'). The form @deva[तिस्र꣡ः] has final accent. This overrides the @deva[स्वरित] that @ref[8.2.4] would otherwise assign. The @deva[तिस्] here refers to the feminine stem @deva[तिसृ].
"""

advanced = """
The @deva[जसि] specification targets nominative plural specifically. @deva[तिसृ] (feminine of @deva[त्रि]) + @deva[जस्] → @deva[तिस्रः]. The @deva[अन्तोदात्त] blocks @deva[जात्यन्तरात्] @deva[स्वरितः] (@ref[8.2.4]). This is a @deva[व्यवस्था] (special provision) for the feminine numeral 'three' in nominative plural, ensuring @deva[तिस्र꣡ः] rather than @deva[*तिस्रः॑].
"""

id = "6.1.135"
numericId = "61135"

[en]
simple = """
From this @[sūtra] through @ref[6.1.157], understand that '@deva[स्] is added before @deva[क]'. This is an @deva[अधिकार] (governing rule) that controls the following @[sūtras].
"""

standard = """
This is an @deva[अधिकार] @[sūtra] establishing that rules @ref[6.1.135]-@ref[6.1.157] concern the augment @deva[सुट्] (the @deva[स्] added before @deva[क]). The @deva[स्कोः] refers to @deva[स्] before @deva[क], and this @deva[स्] is the @deva[सुट्] augment. All following @[sūtras] until @ref[6.1.157] operate within this domain.
"""

advanced = """
The @deva[अधिकार] mechanism allows @[pāṇini] to state a governing condition once rather than repeating it. The @deva[स्कोः पूर्वस्य] means 'of the @deva[स्] (augment) before @deva[क्]'. This @deva[सुट्] augment appears before @deva[कृत्] affixes beginning with @deva[क्] under specific conditions. The scope extends to @ref[6.1.157], after which new @deva[अधिकार] conditions apply. This section covers @deva[सुट्]-augmentation rules.
"""

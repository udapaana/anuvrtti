id = "6.1.74"
numericId = "61074"

[en]
simple = """
The particles @deva[आ] and @deva[मा] take @deva[तुक्]-augment when @deva[छ] follows in continuous speech. Examples: @deva[आच्छाया] (partial shade); @deva[आच्छादयति]; @deva[माच्छिनत्ति] (don't cut).
"""

standard = """
The particle @deva[आ] (with meanings: slightly, verbal prefix, inceptive limit, exclusive limit) and prohibitive @deva[मा] obligatorily take @deva[तुक्] before @deva[छ]. This makes obligatory what @ref[6.1.76] would make optional: @deva[आ] + @deva[छाया] → @deva[आच्छाया]; @deva[आ] + @deva[छादयति] → @deva[आच्छादयति]; @deva[मा] + @deva[छिनत्ति] → @deva[माच्छिनत्ति].
"""

advanced = """
This @deva[नित्य] rule overrides @ref[6.1.76] @deva[विभाषा]. @deva[आ] has four senses: (1) @deva[ईषत्] (slightly): @deva[आच्छाया] 'partial shade'; (2) @deva[क्रियायोग] (prefix): @deva[आच्छादयति]; (3) @deva[अभिविधि] (inceptive): @deva[आच्छायायाः]; (4) @deva[मर्यादा] (limit): @deva[आच्छायम्]. @deva[मा] = prohibitive: @deva[माच्छिनत्ति].
"""

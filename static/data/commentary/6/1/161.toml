id = "6.1.161"
numericId = "61161"

[en]
simple = """
An unaccented vowel gets acute accent when the accented vowel that preceded it is deleted. So when @deva[कुमार꣡] + @deva[ई॒] combine and the @deva[अ] is deleted, the @deva[ई] receives the accent: @deva[कुमा॒री꣡].
"""

standard = """
This @[sūtra] provides that an @deva[अनुदात्त] vowel acquires @deva[उदात्त] when the preceding @deva[उदात्त] vowel undergoes @deva[लोप] (deletion). Example: @deva[कुमार꣡] (accent on @deva[रा]) + @deva[ई॒] → @deva[कुमारी꣡] (accent shifts to @deva[ई] after @deva[अ]-deletion). The accent 'transfers' to the surviving vowel.
"""

advanced = """
The @deva[उदात्तात्] @deva[लोपे] condition specifies: when an @deva[उदात्त] vowel is deleted, its accent transfers to the following @deva[अनुदात्त]. This is @deva[स्वरसन्धि]—accent behavior in vowel coalescence. In @deva[कुमार + ई], the final @deva[अ] of @deva[कुमार꣡] (which would bear accent after the stem) is elided, and the @deva[ई] inherits the @deva[उदात्त]. This preserves one accent per word (@ref[6.1.158]).
"""

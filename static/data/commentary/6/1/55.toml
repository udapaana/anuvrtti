id = "6.1.55"
numericId = "61055"

[en]
simple = """
The causative of @deva[वी] (to go/conceive) optionally substitutes @deva[आ] for its diphthong when meaning 'to impregnate'. Example: @deva[प्रवापयति] or @deva[प्रवाययति] (he causes to conceive).
"""

standard = """
The root @deva[वी] (@deva[अदादि] 39, meaning 'go/conceive/shine/eat/desire') takes optional @deva[ए] → @deva[आ] in causative when meaning 'to cause conception': @deva[प्र] + @deva[वी] + @deva[णि] → @deva[प्रवापयति] or @deva[प्रवाययति] = @deva[गर्भे ग्राहयति] (causes to receive embryo).
"""

advanced = """
The semantic condition @deva[प्रजने] restricts this to conception meaning. @deva[वी गतौ, प्रजने, व्याप्तौ, खादने, कान्तौ] (@deva[अदादि] 39). Causative: @deva[वी] → @deva[वै] (@deva[वृद्धि]) → optionally @deva[वा] + @deva[णि] → @deva[प्रवापयति] (with @deva[पुक्]) or @deva[प्रवाययति]. @deva[प्रजन] = @deva[गर्भग्रहण] leading to birth.
"""

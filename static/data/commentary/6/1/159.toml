id = "6.1.159"
numericId = "61159"

[en]
simple = """
A stem formed with the @deva[कृत्] affix @deva[घञ्] has @deva[उदात्त] (acute accent) on its final syllable if it comes from the root @deva[कृष्] ('to drag/plow') or contains a long @deva[आ]. So @deva[कर्षः] ('plowing') and @deva[दावः] ('fire') have final accent.
"""

standard = """
This @[sūtra] specifies final-syllable @deva[उदात्त] for @deva[घञ्]-derived stems in two cases: (1) from root @deva[कृष्] 'to plow/drag', (2) when containing long @deva[आ]. Examples: @deva[कर्षः꣡] (from @deva[कृष्]), @deva[दावः꣡] (from @deva[दु] with @deva[आ]). Otherwise, @deva[घञ्] stems typically have initial accent.
"""

advanced = """
The @deva[घञ्] affix normally produces stems with accent on the first syllable (@deva[आद्युदात्त]). This @[sūtra] provides exceptions: @deva[कृष्] derivatives and @deva[आकारवत्] (@deva[आ]-containing) forms take @deva[अन्तोदात्त] (final accent). The @deva[कृष्] specification includes @deva[कर्षः] ('plowing'), while @deva[दीर्घात्] covers forms like @deva[दावः], @deva[भावः] where @deva[आ] appears.
"""

id = "6.1.17"
numericId = "61017"

[en]
simple = """
The @deva[अभ्यास] (reduplicate) of @deva[वाच्यादि] (@ref[6.1.15]) and @deva[ग्रहादि] (@ref[6.1.16]) roots also undergoes @deva[संप्रसारण] before @deva[लिट्] affixes. Examples: @deva[वच्] → @deva[उवाच]; @deva[स्वप्] → @deva[सुष्वाप]; @deva[यज्] → @deva[इयाज]; @deva[ग्रह्] → @deva[जग्राह].
"""

standard = """
In the Perfect, the @deva[अभ्यास] of @deva[वाच्यादि] and @deva[ग्रहादि] roots undergoes @deva[संप्रसारण]. Examples: @deva[वच्] → @deva[उवाच], @deva[उवचिथ]; @deva[स्वप्] → @deva[सुष्वाप], @deva[सुष्वपिथ]; @deva[यज्] → @deva[इयाज], @deva[इयजिथ]; @deva[वप्] → @deva[उवाप], @deva[उवपिथ]. For @deva[ग्रहादि]: @deva[ग्रह्] → @deva[जग्राह], @deva[जग्रहिथ]; @deva[ज्या] → @deva[जिज्यौ], @deva[जिज्यिथ]; @deva[व्यध्] → @deva[विव्याध], @deva[विविधिथ]; @deva[प्रच्छ्] → @deva[पप्रच्छ], @deva[पपृच्छिथ].
"""

advanced = """
This @[sūtra] extends @deva[संप्रसारण] to the @deva[अभ्यास] of @deva[वाच्यादि]/@deva[ग्रहादि] before @deva[लिट्]. For @deva[वाच्यादि]: @deva[वच्] reduplicates to @deva[ववच्], then @deva[अभ्यास]-@deva[संप्रसारण] → @deva[उवच्] → @deva[उवाच] (@deva[गुण]). Similarly @deva[सुष्वाप], @deva[इयाज], @deva[उवाप]. For @deva[ग्रहादि]: @deva[ग्रह्] → @deva[जग्रह्] (@deva[ग्] → @deva[ज्] by @ref[7.4.62]) → @deva[जग्राह]; @deva[ज्या] → @deva[जिज्या] → @deva[जिज्यौ]; @deva[व्यध्] → @deva[विव्यध्] → @deva[विव्याध]; @deva[भ्रस्ज्] → @deva[बभ्रस्ज्] → @deva[बभ्रज्ज] → @deva[बभर्ज] (@ref[8.2.36], @ref[8.4.53]).
"""

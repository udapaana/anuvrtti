id = "6.1.13"
numericId = "61013"

[en]
simple = """
The @deva[य्] of the affix @deva[ष्यङ्] undergoes @deva[संप्रसारण] (becomes @deva[इ]) when @deva[पुत्र] or @deva[पति] follows in a @deva[तत्पुरुष] compound. Example: @deva[कारीषगन्ध्या] + @deva[पुत्र] → @deva[कारीषगन्धीपुत्रः].
"""

standard = """
The feminine affix @deva[ष्यङ्] (@ref[4.1.78]) has its @deva[य्] vocalized to @deva[इ] before @deva[पुत्र]/@deva[पति] in @deva[तत्पुरुष]. The @deva[आ] merges into @deva[इ] (@ref[6.1.108]), then @deva[इ] lengthens (@ref[6.3.139]): @deva[कारीषगन्ध्या] → @deva[कारीषगन्धीपुत्रः], @deva[कारीषगन्धीपतिः]. Not for other feminines: @deva[इभ्यापुत्रः], @deva[क्षत्रियापुत्रः]. Not with other second members: @deva[कारीषगन्ध्याकुलम्]. Not in @deva[बहुव्रीहि]: @deva[कारीषगन्ध्यापतिरयं ग्रामः].
"""

advanced = """
This @deva[संप्रसारण] applies to @deva[ष्यङ्] (= @deva[य] + @deva[चाप्] @deva[आ], see @ref[4.1.77]-@ref[4.1.78]) before @deva[पुत्र]/@deva[पति] in @deva[तत्पुरुष]. The @deva[प्रत्ययग्रहण] maxim normally means 'word ending in that affix', but for @deva[स्त्रीप्रत्यय], the rule @deva[स्त्रीप्रत्यये चानुपसर्जने न] allows non-initial application: @deva[परमकारीषगन्धीपुत्रः]. When @deva[उपसर्जन]: @deva[अतिकारीषगन्ध्यापुत्रः] (no @deva[संप्रसारण]). Applies only with simple @deva[पुत्र]/@deva[पति], not compounds: @deva[कारीषगन्ध्यापुत्रकुलम्], @deva[कारीषगन्ध्यापरमपुत्रः].
"""

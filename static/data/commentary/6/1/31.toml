id = "6.1.31"
numericId = "61031"

[en]
simple = """
The causative of @deva[श्वि] optionally undergoes @deva[संप्रसारण] before @deva[सन्] (Desiderative) and @deva[चङ्] (Aorist). Examples: @deva[शुशावयिषति] or @deva[शिश्वाययिषति]; @deva[अशूशवत्] or @deva[अशिश्वयत्].
"""

standard = """
For the @deva[णिजन्त] (causative) of @deva[श्वि], @deva[संप्रसारण] is optional before @deva[सन्] and @deva[चङ्]. Desiderative: @deva[शुशावयिषति] (with @deva[संप्रसारण]) or @deva[शिश्वाययिषति] (without). Aorist: @deva[अशूशवत्] or @deva[अशिश्वयत्]. By the maxim @deva[संप्रसारणं संप्रसारणाश्रयं च बलीयो भवति], when @deva[संप्रसारण] applies, the @deva[अभ्यास] also gets it.
"""

advanced = """
This extends @ref[6.1.30] @deva[विभाषा] to @deva[णिजन्त श्वि] before @deva[सन्]/@deva[चङ्]. With @deva[संप्रसारण]: @deva[श्वि] → @deva[शु] (causative @deva[शावि]) → @deva[शुशावयिषति] (@deva[सनन्त]), @deva[अशूशवत्] (@deva[चङ्]). Without: @deva[शिश्वाययिषति], @deva[अशिश्वयत्]. The maxim @deva[संप्रसारणं संप्रसारणाश्रयं च बलीयः] ensures @deva[अभ्यास] also undergoes @deva[संप्रसारण] when the base does.
"""

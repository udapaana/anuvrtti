id = "6.1.169"
numericId = "61169"

[en]
simple = """
The same case endings (@deva[तृतीया] (instrumental) and following) may optionally take acute accent when a monosyllabic word with final accent appears at the end of a compound, and the compound can be easily analyzed. So in @deva[सुराज्] ('good king'), the case endings may or may not be accented.
"""

standard = """
This @[sūtra] extends @ref[6.1.168]'s accent rule optionally to @deva[समासान्त] (compound-final) monosyllables that are @deva[अन्तोदात्त] and @deva[सुविभक्तिक] (easily analyzable). Thus @deva[सुराज्] + case ending → optional accent on the ending. The @deva[वा] indicates the accent is optional in these compound contexts.
"""

advanced = """
The @deva[अन्तोदात्तस्य समासस्य सुविभक्तिकस्य] qualifies: the compound must have final accent, and be 'easily divisible' into components. The @deva[विभाषा] allows both accented and unaccented case-endings. @deva[सुविभक्तिक] likely means the compound analysis is transparent. This extends monosyllabic accent behavior to compound-final positions with optionality.
"""

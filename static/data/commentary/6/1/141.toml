id = "6.1.141"
numericId = "61141"

[en]
simple = """
The @deva[सुट्] augment is added when @deva[उप + कृ] or @deva[प्रति + कृ] means 'to cause suffering/affliction'. So @deva[उपस्कीर्णम्] or @deva[प्रतिस्कीर्णम्] means 'afflicted/tormented'.
"""

standard = """
This @[sūtra] extends @deva[सुट्] to @deva[उप/प्रति + कृ] when meaning 'to afflict' or 'cause suffering' (@deva[पीडा]). The forms @deva[उपस्कीर्णम्] and @deva[प्रतिस्कीर्णम्] are past participles meaning 'one who has been afflicted/tormented'. This adds @deva[प्रति] to the eligible preverbs for this semantic domain.
"""

advanced = """
The @deva[पीडार्थ] (affliction sense) creates forms like @deva[उपस्कीर्ण/प्रतिस्कीर्ण]. The @deva[कीर्ण] portion shows the past passive participle of @deva[कॄ] 'to scatter' (distinct from @deva[कृ] 'to make'). However, the @deva[सुट्] context suggests @deva[कृ]-based derivation. The semantic shift to 'affliction' may involve the notion of 'being worked upon' or 'undone' by the action.
"""

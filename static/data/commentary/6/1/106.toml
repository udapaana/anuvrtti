id = "6.1.106"
numericId = "61106"

[en]
simple = """
In Vedic literature, when @deva[इ], @deva[उ], @deva[ऋ], or @deva[ऌ] is followed by a similar vowel, the long vowel substitute is optional rather than required. So @deva[मरुत् + ईः] can become either @deva[मारुतीः] (with long @deva[ई]) or @deva[मारुत्यः] (with @deva[य्] + @deva[अः]).
"""

standard = """
This @[sūtra] provides a Vedic option (@deva[वा]) for the cases covered by @ref[6.1.101]-@ref[6.1.105]. Where Classical Sanskrit requires the long vowel substitute (@deva[सवर्णदीर्घ]), Vedic usage permits either the long substitute or the regular @deva[यण्] sandhi. Thus @deva[मरुत् + ईः] → @deva[मारुतीः] (long substitute) or @deva[मारुत्यः] (@deva[यण्] sandhi). Similarly @deva[पिण्डि + ईः] → @deva[पिण्डीः] or @deva[पिण्ड्यः].
"""

advanced = """
The @deva[छन्दसि वा] indicates that Vedic texts preserve archaic flexibility in sandhi. The @deva[सवर्णदीर्घ] rules (@ref[6.1.101]-@ref[6.1.105]) are later standardizations; Vedic mantras often show @deva[यण्] sandhi where Classical grammar mandates coalescence. This explains variant readings in @[saṃhitā] texts. The option (@deva[विकल्प]) reflects the descriptive nature of @[pāṇini]'s Vedic rules—documenting attested forms rather than prescribing a single outcome.
"""

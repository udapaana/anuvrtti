id = "6.1.222"
numericId = "61222"

[en]
simple = """
In compounds ending in @deva[अञ्च्] ('going towards'), the final vowel of the preceding word has acute accent in weak cases where only @deva[च्] of @deva[अञ्च्] remains. So @deva[दधीचः] (from @deva[दधि + अञ्च्]) in weak cases has @deva[द꣡धीचः].
"""

standard = """
This @[sūtra] assigns accent to the final vowel of the first compound member in @deva[अञ्च्]-final @deva[समास], specifically in @deva[असर्वनामस्थान] (weak) cases where @deva[अञ्च्] reduces to @deva[च्]. Example: @deva[दधीच] (weak stem) → @deva[द꣡धीचः] with accent on the preceding vowel.
"""

advanced = """
The @deva[अञ्च्यन्ते चीवि पूर्वस्य आचः] rule: in @deva[अञ्च्]-final compounds, when @deva[अञ्च्] → @deva[च्] (in @deva[अङ्गकार्य]), the @deva[अच्] (vowel) immediately preceding takes @deva[उदात्त]. Forms like @deva[दधीच] (from @deva[दधि + अञ्च्]) show @deva[द꣡धीचः] in oblique cases. This affects directional compounds in their weak forms.
"""

id = "6.1.41"
numericId = "61041"

[en]
simple = """
The semivowel of @deva[वे] (to weave) is not vocalized before @deva[ल्यप्]. Examples: @deva[प्रवाय] (having woven), @deva[उपवाय].
"""

standard = """
Before @deva[ल्यप्] (absolutive with prefix), @deva[वे] doesn't undergo @deva[संप्रसारण]: @deva[प्रवाय], @deva[उपवाय]. This @[sūtra] is separated from @ref[6.1.40] so that @deva[ल्यपि] can run as @deva[अनुवृत्ति] into subsequent @[sūtras].
"""

advanced = """
This extends the @deva[संप्रसारण]-prohibition to @deva[ल्यप्] for @deva[वे उतौ]. Derivation: @deva[प्र] + @deva[वे] + @deva[ल्यप्] → @deva[प्रवाय] (@deva[ए] → @deva[आय्] by @ref[6.1.45], no @deva[संप्रसारण]). The separation serves @deva[अनुवृत्ति] purposes: @ref[6.1.42]-@ref[6.1.44] need @deva[ल्यपि] but not @deva[लिटि].
"""

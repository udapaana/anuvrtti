id = "6.1.35"
numericId = "61035"

[en]
simple = """
In Vedic, @deva[की] diversely substitutes for @deva[चाय्]. Examples: @deva[निचिक्युः] (they observed); but also @deva[निचाय्यः] (to be observed) without substitution.
"""

standard = """
The @deva[छन्दस्] shows variation in @deva[चाय्] → @deva[की] substitution. With substitution: @deva[विधुना निचिक्युः], @deva[नान्यं चिक्युर्न निचिक्युरन्यम्]—these are Perfect forms with @deva[उस्] ending. Without: @deva[अग्निर्ज्योतिर्निचाय्यः].
"""

advanced = """
Vedic @deva[विकल्प] for @deva[चाय्] → @deva[की]: the Perfect @deva[उस्]-forms show substitution (@deva[निचिक्युः], @deva[चिक्युः]), while the @deva[ण्यत्]-form @deva[निचाय्यः] retains the base. This complements @ref[6.1.21] which taught obligatory @deva[की] before @deva[यङ्]; in @deva[छन्दस्], the substitution extends to other forms but optionally.
"""

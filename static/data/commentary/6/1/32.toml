id = "6.1.32"
numericId = "61032"

[en]
simple = """
The causative of @deva[ह्वे] (to call) undergoes @deva[संप्रसारण] before @deva[सन्] and @deva[चङ्]. Examples: @deva[जुहावयिषति] (desires to cause to call); @deva[अजूहवत्] (caused to call—Aorist).
"""

standard = """
Unlike @ref[6.1.31] (optional), @deva[संप्रसारण] is obligatory for @deva[णिजन्त ह्वे] before @deva[सन्]/@deva[चङ्]. Desiderative: @deva[जुहावयिषति], @deva[जुहावयिषतः], @deva[जुहावयिषन्ति]. Aorist: @deva[अजूहवत्], @deva[अजूहवताम्], @deva[अजूहवन्]. The root @deva[ह्वा] doesn't take @deva[य]-augment (@ref[7.3.37]) before @deva[णि] because @deva[संप्रसारण] is stronger.
"""

advanced = """
The repetition of @deva[संप्रसारण] (though @deva[अनुवृत्ति] was present) indicates the maxim's force extends here. @deva[ह्वे] → @deva[हु] (@deva[संप्रसारण]) → causative @deva[हावि] → @deva[जुहावयिषति] (@deva[सन्]), @deva[अजूहवत्] (@deva[चङ्]). The @deva[य]-augment of @ref[7.3.37] is blocked because @deva[संप्रसारण] takes precedence. This and @ref[6.1.33] were originally one @[sūtra], divided by @[vārtika] authority.
"""

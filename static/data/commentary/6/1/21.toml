id = "6.1.21"
numericId = "61021"

[en]
simple = """
@deva[की] substitutes for the root @deva[चाय्] (to observe/worship) before @deva[यङ्]. Example: @deva[चेकीयते] (observes intensely). The long @deva[ई] is retained even when @deva[यङ्] is elided: @deva[चेकीतः].
"""

standard = """
The substitute @deva[की] (with long @deva[ई]) replaces @deva[चाय्] before @deva[यङ्]: @deva[चेकीयते], @deva[चेकीयेते], @deva[चेकीयन्ते]. The long vowel in @deva[की] signals retention even in @deva[यङ्लुक्] forms: @deva[चेकीतः] (participle). If short @deva[कि] were taught, forms like @deva[चेकीयते] would still be valid, but @deva[चेकितः] would result in @deva[यङ्लुक्].
"""

advanced = """
This @deva[आदेश] teaches @deva[की] (not @deva[कि]) for @deva[चायृ चयने] before @deva[यङ्]. Derivation: @deva[चाय्] → @deva[की] → @deva[चि की] (reduplication) → @deva[चेकी] (@deva[गुण]) + @deva[य] → @deva[चेकीयते]. The @deva[दीर्घ ई] is @deva[ज्ञापक] that length persists in @deva[यङ्लुक्]: @deva[चेकीतः]. Had @deva[कि] been taught, @deva[चेकीयते] would still form (by @ref[7.4.25]), but @deva[यङ्लुक्] would give @deva[चेकितः]. The explicit @deva[ई] ensures @deva[चेकीतः].
"""

id = "6.1.219"
numericId = "61219"

[en]
simple = """
The @deva[आ] that appears before the affix @deva[मत्] has acute accent when the word is a feminine name. So place names like @deva[अदुम्बरा꣡वती] ('having @deva[उदुम्बर] trees') have accent on the @deva[आ] before @deva[वती].
"""

standard = """
This @[sūtra] assigns @deva[उदात्त] to the @deva[आ] preceding @deva[मतुप्/वतुप्] in feminine @deva[संज्ञा] (names). Examples: @deva[अदुम्बरा꣡वती], @deva[पुष्करा꣡वती], @deva[शरा꣡वती] (@ref[4.2.86])—place names with accent on @deva[आ] before @deva[वती].
"""

advanced = """
The @deva[मति स्त्रियां संज्ञायाम् आः] rule: in feminine @deva[संज्ञा] with @deva[मतुप्], the @deva[आ] (from @deva[टाप्]) before @deva[वती] takes @deva[उदात्त]. River names like @deva[शरा꣡वती] show this pattern. The @deva[स्त्रियां संज्ञायाम्] restricts to feminine proper nouns, typically geographical names.
"""

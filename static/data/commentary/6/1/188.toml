id = "6.1.188"
numericId = "61188"

[en]
simple = """
The first syllable may optionally have acute accent when a @deva[सार्वधातुक] personal ending beginning with a vowel (not @deva[इट्]) follows a verb. So @deva[पचेत्] can be @deva[प꣡चेत्] or have accent elsewhere.
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] when @deva[सार्वधातुक] @deva[तिङ्] begins with a vowel (excluding @deva[इट्] augment). The @deva[अजादौ] condition: endings like @deva[इ], @deva[ए], @deva[आ] (but not augment @deva[इट्]) trigger optional initial accent. Example: @deva[प꣡चेत्] or default @deva[पचे꣡त्].
"""

advanced = """
The @deva[अजादौ अनिडि] restricts to vowel-initial @deva[सार्वधातुक] endings where the vowel isn't @deva[इट्] (@ref[7.2.35]). The @deva[तिङि] specifies personal endings. Forms like @deva[पचेत्], @deva[जुहोति] have optional @deva[आद्युदात्त]. The @deva[इट्] exclusion prevents applying this to augmented forms where @deva[इट्] creates the vowel-initial appearance.
"""

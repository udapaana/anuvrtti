id = "6.1.66"
numericId = "61066"

[en]
simple = """
Final @deva[व्] or @deva[य्] of a stem is elided when followed by any consonant except @deva[य्]. Examples: @deva[दिव्] → @deva[दिदिवान्] (Perfect participle); @deva[ऊय्] + @deva[त] → @deva[ऊतम्] (woven).
"""

standard = """
Before @deva[वल्] consonants (all consonants except @deva[य्]), final @deva[व्]/@deva[य्] of any stem is elided: @deva[दिव्] + @deva[क्वसु] → @deva[दिव्दिव्वस्] → @deva[दिदिवस्] → @deva[दिदिवान्]; @deva[ऊय्] + @deva[त] → @deva[ऊतम्]; @deva[क्नूय्] + @deva[त] → @deva[क्नूतम्]. Affix @deva[ढ] also triggers: @deva[विद्युत्] + @deva[ढ] → @deva[वैद्युतः].
"""

advanced = """
This @deva[लोप] applies to @deva[व्य्]-final stems (root or otherwise) before @deva[वल्] (= @deva[हल्] minus @deva[य्]). Examples: @deva[दिव्] + @deva[क्वसु] → reduplication → @deva[दिव्दिव्वस्] → @deva[दिदि] + @deva[व्] + @deva[वस्] → @deva[दिदिवस्] (@deva[व्]-@deva[लोप] before @deva[व्]); @deva[ऊय्] + @deva[क्त] → @deva[ऊतम्]; Taddhita @deva[ढ]: @deva[विद्युत्] + @deva[ढ] → @deva[वैद्युतः].
"""

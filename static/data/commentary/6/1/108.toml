id = "6.1.108"
numericId = "61108"

[en]
simple = """
When a vowelized semivowel (@deva[य् इ उ ऋ ऌ] becoming a vowel through @deva[सम्प्रसारण]) is followed by another vowel, the first vowel is retained as the single substitute. So in @deva[इज्यते], the @deva[इ] (from @deva[य्]) combines with following @deva[अ] to give just @deva[इ].
"""

standard = """
This @[sūtra] applies @deva[पूर्वरूप] when a @deva[सम्प्रसारण] vowel (a semivowel that has become @deva[इ उ ऋ ऌ] per @ref[1.1.45]) is followed by any vowel. The @deva[पूर्व] (first) continues from the previous @[sūtra]. When @deva[यज् + य] undergoes @deva[सम्प्रसारण] to @deva[इज् + य], then @deva[इ + अ] → @deva[इ] (not @deva[ए] or @deva[या]). Hence @deva[इज्यते] 'is sacrificed'.
"""

advanced = """
The @deva[सम्प्रसारण] vowels have a special phonological status—they are underlying semivowels that surface as vowels in specific morphological contexts. When such a derived vowel meets a following vowel, @deva[पूर्वरूप] applies rather than the usual sandhi rules (@deva[गुण], @deva[वृद्धि], or @deva[यण्]). This preserves the morphological identity of the @deva[सम्प्रसारण] segment. The rule interacts with @ref[6.1.17] and the @deva[सम्प्रसारण] rules of @ref[6.1.13]-@ref[6.1.16].
"""

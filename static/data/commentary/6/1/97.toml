id = "6.1.97"
numericId = "61097"

[en]
simple = """
For non-@deva[पद]-final short @deva[अ] + a @deva[गुण] vowel, @deva[पररूप] (the @deva[गुण]) is the substitute. Examples: @deva[पच] + @deva[अन्ति] → @deva[पचन्ति]; @deva[पच] + @deva[ए] → @deva[पचे].
"""

standard = """
When short @deva[अ] (not @deva[पदान्त]) precedes a @deva[गुण] vowel (@deva[अ], @deva[ए], @deva[ओ]), @deva[पररूप] replaces both: @deva[पच + अन्ति] → @deva[पचन्ति]; @deva[यज + अन्ति] → @deva[यजन्ति]; @deva[पच + ए] → @deva[पचे]. This overrides @deva[सवर्णदीर्घ] (@ref[6.1.101]). Not for @deva[आ]: @deva[या + अन्ति] → @deva[यान्ति] (lengthening).
"""

advanced = """
This @deva[पररूप] for @deva[ह्रस्व अ + गुण] (non-@deva[पदान्त]). @deva[गुण] = @deva[अ], @deva[ए], @deva[ओ]. @deva[पच + शप् + अन्ति] → @deva[पच + अन्ति] → @deva[पचन्ति]. Overrides @ref[6.1.101] @deva[दीर्घ]. Also overrides @ref[6.1.88] @deva[वृद्धि]: @deva[पच + ए] → @deva[पचे] (not @deva[*पचै]). @deva[दीर्घ अ] excluded: @deva[या + अन्ति] → @deva[यान्ति].
"""

id = "6.1.163"
numericId = "61163"

[en]
simple = """
A stem formed with an affix, augment, or substitute that has indicatory @deva[च्] gets acute accent on the final syllable. So @deva[भङ्गुर꣡म्] ('fragile'), @deva[भासुर꣡म्] ('shining'), @deva[मेदुर꣡म्] ('fat') have final accent because their @deva[उरच्] affix has @deva[च्] as @deva[इत्].
"""

standard = """
This @[sūtra] assigns @deva[अन्तोदात्त] to stems formed by affixes (or augments/substitutes) with @deva[चित्] (indicatory @deva[च्]). The @deva[उरच्] affix in @deva[भङ्गुर꣡], @deva[भासुर꣡], @deva[मेदुर꣡] has @deva[च्] as @deva[इत्], triggering final accent. The @deva[च्] is a marker for this accent pattern.
"""

advanced = """
The @deva[चित्] marker indicates @deva[अन्तोदात्त] across various formations. The @deva[प्रत्यय/आगम/आदेश] with @deva[चित्] impose final accent on the derived stem. @deva[उरच्] examples: @deva[भङ्गुर] (from @deva[भञ्ज्]), @deva[भासुर] (from @deva[भास्]), @deva[मेदुर] (from @deva[मिद्]). The @deva[च्] is purely diacritic—it marks accent behavior, not phonological content. Compare with @deva[कित्]/@deva[ङित्]] markers for other purposes.
"""

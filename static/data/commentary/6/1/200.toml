id = "6.1.200"
numericId = "61200"

[en]
simple = """
The Vedic infinitive ending @deva[तवै] has acute accent on both the first and last syllables simultaneously. So @deva[कर्तवै] ('to do') is @deva[क꣡र्तवै꣡] with two accents.
"""

standard = """
This @[sūtra] assigns double accent (@deva[आद्युदात्त] and @deva[अन्तोदात्त]) to infinitives in @deva[तवै]. Forms like @deva[क꣡र्तवै꣡], @deva[ह꣡र्तवै꣡] have accent on both first and last syllables. This is exceptional—normally one word has one accent (@ref[6.1.158]).
"""

advanced = """
The @deva[तवैकारयोः] (= @deva[तवै]) infinitive shows @deva[उभयतोदात्त] (double accent), an exception to @ref[6.1.158]'s one-accent rule. The @deva[तवै] is a Vedic infinitive marker (cf. @deva[तुमुन्] in Classical). Forms @deva[क꣡र्तवै꣡], @deva[ह꣡र्तवै꣡] preserve archaic dual accent. This likely reflects underlying compound structure or Vedic prosodic requirements.
"""

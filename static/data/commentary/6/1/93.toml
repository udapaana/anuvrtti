id = "6.1.93"
numericId = "61093"

[en]
simple = """
For @deva[ओ] of a nominal stem + @deva[अ] of accusative @deva[अम्]/@deva[अस्], @deva[आ] is the single substitute. Examples: @deva[गो] + @deva[अम्] → @deva[गाम्]; @deva[गो] + @deva[अस्] → @deva[गाः].
"""

standard = """
When @deva[प्रातिपदिक]-final @deva[ओ] is followed by @deva[अ] of accusative endings @deva[अम्]/@deva[अस्], @deva[आ] replaces both: @deva[गो + अम्] → @deva[गाम्]; @deva[गो + अस्] → @deva[गाः]. This overrides @deva[वृद्धि] (@ref[7.1.90]). Also @deva[द्यो] → @deva[द्याम्], @deva[द्याः]. The compound @deva[औतः] = @deva[आ] + @deva[ओतः].
"""

advanced = """
This @deva[एकादेश] teaches @deva[ओ + अ (अम्/अस्)] → @deva[आ]. Overrides @ref[7.1.90] @deva[वृद्धि]. @deva[गो + अम्] → @deva[गाम्]; @deva[गो + अस्] → @deva[गाः]. @deva[द्यौस्] (also @deva[ओकारान्त प्रातिपदिक]): @deva[द्याम्], @deva[द्याः]. The @deva[सार्वनामस्थान] affixes are @deva[णित्] after @deva[द्यौ] too (@ref[7.1.90]), but this rule takes precedence.
"""

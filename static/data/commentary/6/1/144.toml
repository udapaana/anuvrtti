[en]
simple = """
The word @deva[अपस्पराः] (meaning 'uninterrupted action') is formed with the @deva[सुट्] augment. This describes continuous, unbroken activity.
"""

standard = """
This @[sūtra] provides @deva[सुट्] for the formation @deva[अपस्पराः] when meaning 'uninterrupted' or 'continuous' action (@deva[अवशम्]). The @deva[कारिका] (verse) quoted gives usage guidelines. The word describes activity that proceeds without cessation or break.
"""

advanced = """
The @deva[अवशम्] gloss suggests 'without ceasing/pause'. The @deva[अप + स्पृ] base with @deva[सुट्] yields a form meaning 'that which touches/reaches continuously'. The @deva[कारिका] (@deva[लुम्पेदवश्यमः कृत्ये...]) provides metrical instruction on usage. This is another lexically specific @deva[सुट्] rule for a particular semantic domain.
"""

id = "6.1.175"
numericId = "61175"

[en]
simple = """
The previous accent rule does not apply when the vowel is the feminine affix @deva[ऊ] (@ref[4.1.66]) or the final vowel of a verb root. So @deva[कारू] + @deva[आ] endings don't shift accent to the endings.
"""

standard = """
This @[sūtra] excepts @deva[ऊ] of @ref[4.1.66] (feminine @deva[ऊ]-affix) and @deva[धातु]-final vowels from @ref[6.1.174]. After @deva[यणादेश] of these @deva[उदात्त] vowels, the endings don't take accent. So @deva[कारू꣡] → @deva[कारू꣡स्] (not @deva[कारूस्꣡]); the @deva[ऊ]-origin blocks accent transfer.
"""

advanced = """
The @deva[ऊ॒कालस्य धात्वन्तस्य च] exception protects: (1) @deva[ऊ] from @ref[4.1.66]—feminine stems like @deva[कारू], @deva[श्वश्रू]; (2) @deva[धातु]-final vowels in verbal stems. When these @deva[उदात्त] vowels undergo @deva[यण्], @ref[6.1.174] doesn't apply. The accent stays on the stem, not the ending. This preserves @deva[कारू꣡]-type accent patterns.
"""

id = "6.1.214"
numericId = "61214"

[en]
simple = """
The roots @deva[ईड्] ('praise'), @deva[वन्द्] ('worship'), @deva[वृ] ('choose'), @deva[शंस्] ('praise'), and @deva[दुह्] ('milk') have acute accent on the first syllable when followed by the affix @deva[ण्यत्]. So @deva[ई꣡ड्यम्] ('praiseworthy'), @deva[व꣡न्द्यम्] ('worshipable').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[ण्यत्]-derivatives of five roots: @deva[ईड्], @deva[वन्द्], @deva[वृ], @deva[शंस्], @deva[दुह्]. Examples: @deva[ई꣡ड्यम्], @deva[व꣡न्द्यम्], @deva[व꣡र्यम्], @deva[श꣡स्यम्], @deva[दो꣡ह्यम्]. These take first-syllable rather than default @deva[ण्यत्] accent.
"""

advanced = """
The @deva[ईड्वन्दवृशंसदुहां ण्यति] lists five roots with exceptional @deva[आद्युदात्त] before @deva[ण्यत्] (potential passive participle). The default @deva[ण्यत्] accent would differ; these forms override it: @deva[ई꣡ड्य], @deva[व꣡न्द्य], @deva[व꣡र्य/वा꣡र्य], @deva[श꣡स्य], @deva[दो꣡ह्य]. This is a lexically specified accent exception for gerundive formations.
"""

id = "6.1.75"
numericId = "61075"

[en]
simple = """
A long vowel takes @deva[तुक्]-augment when @deva[छ] follows in continuous speech. Examples: @deva[ह्रीच्छति], @deva[म्लेच्छति], @deva[विचाच्छायते].
"""

standard = """
Before @deva[छ] in @deva[संहिता], @deva[दीर्घ] vowels take @deva[तुक्]: @deva[ह्री] + @deva[छ] → @deva[ह्रीच्छति]; @deva[म्लेच्छ] + @deva[ति] → @deva[म्लेच्छति]; @deva[विचा] + @deva[छाय] → @deva[विचाच्छायते]. The augment belongs to the long vowel itself, not the whole syllable.
"""

advanced = """
This extends @deva[तुक्] to @deva[दीर्घ] before @deva[छ]. The @deva[स्वरस्य आगम] principle continues: @deva[त्] augments the vowel, not the @deva[पद]. Examples: @deva[ह्री भये] → @deva[ह्रीच्छति]; @deva[म्लेच्छ्] → @deva[म्लेच्छति]; @deva[अपचाच्छायते], @deva[विचाच्छायते] (causative-intensive).
"""

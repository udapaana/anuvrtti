id = "6.1.61"
numericId = "61061"

[en]
simple = """
@deva[शीर्षन्] substitutes for @deva[शिरस्] when a @deva[तद्धित] affix beginning with @deva[य] follows. Examples: @deva[शीर्षण्यः स्वरः] (head-related tone); @deva[शीर्षण्यो हि मुख्यो भवति].
"""

standard = """
Before @deva[यादि तद्धित], @deva[शिरस्] → @deva[शीर्षन्]: the affix @deva[यत्] (@ref[4.3.55]) follows. The @deva[शीर्षन्] retains its form before @deva[यत्]—the final @deva[अन्] is not elided. Examples: @deva[शीर्षण्यः], @deva[शीर्षण्यम्].
"""

advanced = """
This @deva[आदेश] is inferred from context (the @deva[स्थानिन्] @deva[शिरस्] is not stated). Before @deva[यादि तद्धित] (e.g., @deva[यत्] by @ref[4.3.55]): @deva[शिरस्] → @deva[शीर्षन्]. The @deva[अन्] final is retained: @deva[शीर्षण्यः], not @deva[*शीर्ष्यः]. This differs from @ref[6.1.62] which gives @deva[शीर्ष] (not @deva[शीर्षन्]) before @deva[अजादि].
"""

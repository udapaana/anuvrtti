id = "6.1.136"
numericId = "61136"

[en]
simple = """
The @deva[सुट्] augment (@deva[स्]) is added before @deva[क्] even when the @deva[अट्] augment or a reduplicated syllable comes between the preverb and the verb. So @deva[सम् + अकरोत्] gets @deva[सुट्]: @deva[समस्करोत्].
"""

standard = """
This @[sūtra] clarifies that @deva[सुट्]-augmentation applies even when @deva[अट्] (past tense augment, @ref[6.4.71]) or the @deva[अभ्यास] (reduplicate) intervenes between the @deva[उपसर्ग] and @deva[कृ]. Thus @deva[सम् + अ + करोत्] → @deva[सम् + अ + स् + करोत्] → @deva[समस्करोत्]. The @deva[सुट्] appears before @deva[क्] regardless of intervening elements.
"""

advanced = """
The @deva[अटि अभ्यासे च] phrase addresses potential doubt: one might think @deva[सुट्] requires immediate contact between @deva[उपसर्ग] and @deva[क्]. This @[sūtra] confirms @deva[सुट्] applies even with intervening @deva[अट्] (imperfect/aorist augment) or @deva[अभ्यास] (perfect/intensive reduplication). The @deva[व्यवधान] (intervention) does not block @deva[सुट्]. Examples: @deva[समस्करोत्] (imperfect), @deva[समस्कुर्वन्] (present participle with preverb).
"""

id = "6.1.2"
numericId = "61002"

[en]
simple = """
For vowel-initial roots with multiple syllables, the second syllable is reduplicated, not the first. Example: @deva[अट्] + @deva[सन्] → @deva[अटिटिषति] (desires to roam); @deva[ॠ] + @deva[सन्] → @deva[अरिरिषति] (desires to go).
"""

standard = """
This rule debars first-syllable reduplication for @deva[अजादि अनेकाच्] roots (vowel-initial, polysyllabic). The @deva[सनन्त] @deva[अटिष] (@deva[अट्] + @deva[इट्] + @deva[सन्] by @ref[7.2.35]) reduplicates @deva[टिष्]: @deva[अटिटिषति]. Similarly @deva[अशिशिषति], @deva[अरिरिषति]. For @deva[ॠ]: @deva[ॠ] + @deva[सन्] → @deva[अर] + @deva[इ] + @deva[स] (@ref[7.3.84], @ref[6.1.51]). Rule @ref[1.1.59] doesn't apply here since @deva[इट्] (the vowel affix) is itself undergoing an operation and cannot trigger @deva[स्थानिवद्भाव].
"""

advanced = """
This @[sūtra] provides @deva[द्वितीयस्य द्वित्व] for @deva[अजादि अनेकाच्] roots. The word @deva[अजादेः] is a @deva[बहुव्रीहि] (Genitive): 'of that whose beginning is a vowel'. Some take it as @deva[कर्मधारय] (Ablative): 'the syllable after the initial vowel'. The @deva[इट्]-augment doesn't trigger @ref[1.1.59] because @deva[कार्यमनुभवन्हि कार्यी निमित्ततया नाश्रीयते]—what undergoes an operation cannot simultaneously cause another. Example: @deva[शीङ्] → @deva[शयिता]—@deva[ङित्]-prohibition (@ref[1.1.5]) doesn't apply since the root is itself @deva[कार्यी].
"""

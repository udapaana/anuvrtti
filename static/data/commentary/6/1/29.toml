id = "6.1.29"
numericId = "61029"

[en]
simple = """
@deva[पी] substitutes for @deva[प्याय्] before @deva[लिट्] (Perfect) and @deva[यङ्] (Intensive). Examples: @deva[आपिप्ये] (has swollen); @deva[पेपीयते] (swells intensely).
"""

standard = """
The @deva[विभाषा] (option) of @ref[6.1.28] does not continue here—@deva[पी] is obligatory before @deva[लिट्] and @deva[यङ्]. Perfect forms: @deva[आपिप्ये], @deva[आपिप्याते], @deva[आपिप्यिरे]. The substitution occurs before reduplication by @deva[पुनःप्रसङ्ग] maxim. Intensive: @deva[पेपीयते].
"""

advanced = """
The @deva[च] draws @deva[प्यायः पी] from @ref[6.1.28]; @deva[विभाषा] does not continue. @deva[लिट्] forms: @deva[प्याय्] → @deva[पी] → @deva[पिपी] (reduplication) → @deva[आपिप्ये] (with @deva[आङ्]), @deva[आपिप्याते], @deva[आपिप्यिरे]. Though @deva[पी] is @deva[परनिमित्त], reduplication still applies by @deva[पुनःप्रसङ्गविज्ञान]. @deva[यङ्] forms: @deva[पेपीयते]. The substitution is invariable here regardless of @deva[उपसर्ग].
"""

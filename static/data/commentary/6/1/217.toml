id = "6.1.217"
numericId = "61217"

[en]
simple = """
Words formed with an affix having indicatory @deva[र्] have acute accent on the penultimate (second-to-last) syllable, if the word has more than two syllables. So @deva[ण्वुल्]-derivatives like @deva[कारक꣡ः] have penultimate accent.
"""

standard = """
This @[sūtra] assigns @deva[उपोत्तमोदात्त] (penultimate accent) to @deva[रित्] affixes when the resulting word is @deva[त्र्यादि] (three+ syllables). Example: @deva[कार꣡कः] ('doer'). The @deva[र्] marker indicates this accent pattern for polysyllabic derivatives.
"""

advanced = """
The @deva[रिति त्र्यादौ उपोत्तमम्] conditions: (1) @deva[रित्] affix (indicatory @deva[र्]), (2) @deva[त्र्यादि] (three or more syllables). The penultimate (@deva[उपोत्तम]) syllable takes @deva[उदात्त]. Disyllabic forms don't qualify (no 'penultimate' distinct from first/last). The @deva[र्] marker class includes several @deva[कृत्] and @deva[तद्धित] affixes.
"""

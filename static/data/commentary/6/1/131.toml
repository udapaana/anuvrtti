id = "6.1.131"
numericId = "61131"

[en]
simple = """
The stem @deva[दिव्] ('heaven/sky') has its final replaced by @deva[उ] when it forms a @deva[पद] (complete word). So @deva[दिव्] becomes @deva[द्यु] in compounds like @deva[द्युलोकः] ('heavenly world').
"""

standard = """
This @[sūtra] provides @deva[उ]-substitution for the final of @deva[दिव्] in @deva[पद] contexts. The stem @deva[दिव्] ('heaven') → @deva[द्यु] when forming a complete word. Thus @deva[दिव् + लोकः] → @deva[द्युलोकः]. The @deva[पद] condition (from @deva[पदान्त]) indicates this applies at word-level, including before @deva[सुप्] endings.
"""

advanced = """
The @deva[दिव्] stem shows suppletive alternation: @deva[दिव्] ~ @deva[द्यु] ~ @deva[द्यो]. This rule generates the @deva[द्यु]-form by replacing the final segment with @deva[उ]. The @deva[पद]-condition from @ref[1.4.14] triggers this in word-final and pre-compound contexts. Compare @deva[द्युलोकः] vs. @deva[दिवि] (locative with @deva[दिव्] stem). The stem alternation reflects Proto-Indo-European ablaut patterns.
"""

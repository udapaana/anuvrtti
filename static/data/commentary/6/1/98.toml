id = "6.1.98"
numericId = "61098"

[en]
simple = """
The @deva[इ] of @deva[इति] is the single substitute for @deva[अत्] (of a sound-imitation word) + @deva[इति]. Examples: @deva[पटत्] + @deva[इति] → @deva[पटिति]; @deva[घटत्] + @deva[इति] → @deva[घटिति].
"""

standard = """
For @deva[अव्यक्तानुकरण] (inarticulate sound imitation) words ending in @deva[अत्] + @deva[इति], @deva[इ] (of @deva[इति]) replaces both: @deva[पटत् + इति] → @deva[पटिति]; @deva[घटत् + इति] → @deva[घटिति]; @deva[झटत् + इति] → @deva[झटिति]; @deva[छमत् + इति] → @deva[छमिति]. Not for other words: @deva[हसत् + इति] → @deva[हसदिति].
"""

advanced = """
This @deva[इकार-एकादेश] applies to @deva[अव्यक्तानुकरण + इति]. @deva[अव्यक्त] = inarticulate sound; @deva[अनुकरण] = imitation. @deva[पटत् + इति] → @deva[पटिति] (the @deva[अत्] of @deva[पटत्] + @deva[इ] of @deva[इति] → @deva[इ]). Non-imitative: @deva[हसत् + इति] → @deva[हसदिति] (standard sandhi).
"""

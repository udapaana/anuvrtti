id = "6.1.111"
numericId = "61111"

[en]
simple = """
When @deva[ऋ] is followed by the @deva[अ] of the ablative/genitive ending @deva[अस्], short @deva[उ] becomes the single substitute. So @deva[होतृ + अस्] becomes @deva[होतुः] (genitive 'of the invoker').
"""

standard = """
This @[sūtra] specifies that @deva[उ] (short) replaces the sequence @deva[ऋ + अ] when the @deva[अ] belongs to @deva[अस्] (ablative/genitive singular). This is a special @deva[एकादेश] rule overriding the expected @deva[अर्] (@ref[6.1.77]). Example: @deva[होतृ + अस्] → @deva[होतुर्] + @deva[स्] → @deva[होतुः]. The @deva[उ] combines with @deva[र्] to give @deva[उर्], then @deva[स्] becomes @deva[विसर्ग].
"""

advanced = """
This rule creates a unique sandhi outcome for @deva[ऋ]-final stems in the ablative/genitive. The expected @deva[गुण] (@deva[ऋ + अ] → @deva[अर्]) is blocked in favor of @deva[उ]-substitution. The @deva[ह्रस्व] specification (@deva[उः]) indicates short @deva[उ], contrasting with potential @deva[ऊ]. The resultant @deva[उर्] + @deva[स्] → @deva[उः] involves @deva[रुत्व] (@ref[8.2.66]) and subsequent @deva[विसर्ग]. This paradigm is distinctive for agent nouns in @deva[तृ].
"""

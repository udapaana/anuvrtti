id = "6.1.36"
numericId = "61036"

[en]
simple = """
In Vedic, these irregular forms occur: @deva[अपस्पृधेथाम्] (you two competed), @deva[आनृचुः], @deva[आनृशुः], @deva[चिच्युषे], @deva[तित्याज], @deva[श्रातः], @deva[श्रितम्], @deva[आशीः], @deva[आशीर्तः].
"""

standard = """
Vedic irregular forms: @deva[अपस्पृधेथाम्] (from @deva[स्पर्ध्], Imperfect 2nd dual @[ātm].—reduplication, @deva[र्]-vocalization, @deva[अ]-elision); @deva[आनृचुः] (from @deva[अर्च्]); @deva[आनृशुः] (from @deva[ऋश्]); @deva[चिच्युषे] (from @deva[च्यु]); @deva[तित्याज] (from @deva[त्यज्]—Perfect with irregular @deva[अभ्यास]); @deva[श्रातः] (from @deva[श्रा]); @deva[श्रितम्]; @deva[आशीः] (from @deva[आशास्]); @deva[आशीर्तः]. In @deva[लौकिक]: @deva[अस्पर्धेथाम्].
"""

advanced = """
These are @deva[निपातन] forms for @deva[छन्दस्]: (1) @deva[अपस्पृधेथाम्] = @deva[अप] + @deva[स्पर्ध्] + @deva[एथाम्] (@deva[लङ्] 2nd dual @[ātm].), with @deva[द्वित्व], @deva[र्]-@deva[संप्रसारण], @deva[अ]-@deva[लोप]; (2) @deva[आनृचुः] = Perfect of @deva[अर्च्] with @deva[र्]-@deva[संप्रसारण]; (3) @deva[चिच्युषे] = @deva[च्यु] + @deva[क्वसु]; (4) @deva[तित्याज] = @deva[त्यज्] Perfect with @deva[इ]-@deva[अभ्यास]; (5) @deva[श्रातः] = @deva[श्रा] + @deva[क्त] without @ref[6.1.27] @deva[शृ]; (6) @deva[आशीः] = irregular @deva[आशास्]. @deva[लौकिक] forms differ.
"""

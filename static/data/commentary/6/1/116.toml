id = "6.1.116"
numericId = "61116"

[en]
simple = """
In the middle of a Vedic verse, @deva[ए] or @deva[ओ] retains its form before certain words beginning with @deva[अव्] or @deva[अय्]: specifically before @deva[वाम], @deva[वस्], @deva[वः], @deva[यः], and @deva[यम्]. So @deva[ते अवाम] stays unsandhi-ed.
"""

standard = """
This @[sūtra] lists specific words where @deva[प्रकृतिभाव] applies in mid-verse even though the @deva[अ] is followed by @deva[व्] or @deva[य्]. The words are @deva[अवाम्], @deva[अवस्], @deva[अवः], @deva[अयः], and @deva[अयम्]. These retain hiatus: @deva[ए/ओ] remains unchanged and the following @deva[अ] is preserved. This is a Vedic metrical license.
"""

advanced = """
This rule carves out exceptions to @ref[6.1.115]. While @ref[6.1.115] allows @deva[प्रकृतिभाव] generally in mid-verse, one might expect @deva[य्/व्] following @deva[अ] to trigger different treatment. This @[sūtra] confirms that even with these semivowel-initial continuations, the listed words preserve hiatus. The specific vocabulary suggests these forms were metrically significant in attested Vedic passages.
"""

id = "6.1.173"
numericId = "61173"

[en]
simple = """
After a participle formed with @deva[अत्] that has acute accent on the final, the feminine suffix @deva[ई] and vowel-initial case endings (except strong cases) receive acute accent when preceded by a consonant. So @deva[पचत्] + @deva[ई] → @deva[पचन्ती꣡].
"""

standard = """
This @[sūtra] provides @deva[उदात्त] for @deva[ङीप्] (@deva[ई]) and vowel-initial @deva[असर्वनामस्थान] endings after @deva[अदन्त] (ending in @deva[अत्]) participles that are @deva[अन्तोदात्त], when a consonant precedes. Example: @deva[पचत्꣡] + @deva[ई] → @deva[पचन्ती꣡]; the @deva[ई] receives accent.
"""

advanced = """
The conditions are: (1) @deva[अन्तोदात्त] @deva[अदन्त] stem (participle in @deva[शतृ/शानच्]), (2) consonant (@deva[हल्]) precedes the @deva[अत्], (3) @deva[ङीप्] or @deva[अजादि असर्वनामस्थान] follows. The @deva[ई] of @deva[ङीप्] and vowel-initial weak endings then take @deva[उदात्त]. @deva[पचन्ती꣡], @deva[कुर्वती꣡] show the pattern. The @deva[हल्] condition excludes vowel + @deva[अत्] sequences.
"""

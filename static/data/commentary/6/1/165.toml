id = "6.1.165"
numericId = "61165"

[en]
simple = """
A stem formed with a @deva[तद्धित] affix that has indicatory @deva[क्] gets acute accent on the final syllable. So @deva[नाडायनः꣡], formed with @deva[फक्] (@ref[4.1.99]), has final accent.
"""

standard = """
This @[sūtra] assigns @deva[अन्तोदात्त] to @deva[तद्धित] formations with @deva[कित्] (indicatory @deva[क्]). Example: @deva[नाडायन꣡] formed by @deva[फक्] (@ref[4.1.99])—the @deva[क्] triggers final accent. Similarly @deva[चारायण꣡] shows the pattern.
"""

advanced = """
The @deva[कित्] marker in @deva[तद्धित] signals @deva[अन्तोदात्त], parallel to @deva[चित्] in @ref[6.1.164]. Affixes like @deva[फक्] (@ref[4.1.99]) use @deva[क्] for accent marking. The @deva[तद्धिते] domain restriction maintains the pattern for nominal derivatives. Forms like @deva[नाडायन], @deva[चारायण] (both patronymics) display final accent. The @deva[क्] serves as @deva[इत्] (@ref[1.3.3]), dropping after its diacritic function.
"""

id = "6.1.213"
numericId = "61213"

[en]
simple = """
Words formed with the affix @deva[यत्] have acute accent on the first syllable if they are two-syllable words—except @deva[नाव्य] (from @deva[नौ] 'boat'), which doesn't follow this rule. So @deva[दि꣡व्य] ('divine') is accented initially.
"""

standard = """
This @[sūtra] provides @deva[आद्युदात्त] for disyllabic (@deva[द्व्यच्]) @deva[यत्]-derivatives, with @deva[नाव्य] as exception. Examples: @deva[दि꣡व्य] ('divine'), @deva[भ꣡व्य] ('future'). The word @deva[नाव्य] ('navigable') takes different accent: @deva[नाव्य꣡].
"""

advanced = """
The @deva[यति द्व्यचो नाव्यवर्जम्] conditions: (1) @deva[यत्] affix, (2) @deva[द्व्यच्] (two syllables), (3) except @deva[नाव्य]. Disyllabic @deva[यत्]-forms get @deva[आद्युदात्त]: @deva[दि꣡व्य], @deva[भ꣡व्य], @deva[स꣡व्य]. The @deva[नाव्य] exception preserves its distinct accent (@deva[नाव्य꣡] or default @deva[यत्] pattern). Trisyllabic @deva[यत्]-words follow other rules.
"""

id = "6.1.6"
numericId = "61006"

[en]
simple = """
The six roots starting with @deva[जक्ष्] are also called @deva[अभ्यस्त] even though they are not formed by reduplication: @deva[जक्ष्], @deva[जागृ], @deva[दरिद्रा], @deva[चकास्], @deva[शास्], @deva[दीधी] (and @deva[वेवी]).
"""

standard = """
These seven roots (@deva[जक्षित्यादि]) receive @deva[अभ्यस्त] designation by convention: @deva[जक्ष्] (eat), @deva[जागृ] (wake), @deva[दरिद्रा] (be poor), @deva[चकास्] (shine), @deva[शास्] (rule), @deva[दीधी] (shine), @deva[वेवी] (go). @[pāṇini] mentions six; @deva[वेवी] is the seventh. This gives them @deva[उदात्त] on first syllable: @deva[जा꣡ग्रति], @deva[ज꣡क्षति], @deva[द꣡रिद्रति], @deva[चका꣡सति], @deva[शा꣡सति], @deva[दी꣡ध्यते], @deva[वे꣡व्यते].
"""

advanced = """
This @[sūtra] extends @deva[अभ्यस्तसंज्ञा] to @deva[जक्षित्यादि] (7 roots in @deva[धातुपाठ]). Effects: (1) @deva[उदात्त] on first syllable before @deva[अनिट् सार्वधातुक अजादि] (@ref[6.1.189]); (2) @deva[झ] → @deva[अत्] (@ref[7.1.4]); (3) no @deva[नुम्]-augment in @deva[शतृ] (@ref[7.1.78]). Present participles: @deva[दीध्यत्] (not @deva[दीध्यन्त्]). The roots: @deva[जक्ष् भक्षणे], @deva[जागृ निद्राक्षये], @deva[दरिद्रा दुर्गतौ], @deva[चकास् दीप्तौ], @deva[शास् अनुशिष्टौ], @deva[दीधीङ् दीप्तौ], @deva[वेवीङ् गतौ].
"""

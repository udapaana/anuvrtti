id = "6.1.69"
numericId = "61069"

[en]
simple = """
In vocative singular, the consonant of @deva[सु] (or its @deva[अम्]-substitute) is elided after stems ending in @deva[ए], @deva[ओ], or a short vowel. Examples: @deva[हे अग्ने], @deva[हे वायो], @deva[हे देव].
"""

standard = """
The vocative uses nominative endings. After @deva[ए]/@deva[ओ]/@deva[ह्रस्व]-final stems, the @deva[हल्] portion of @deva[सु] (or @deva[अम्] substitute) is elided: @deva[अग्नि] → @deva[अग्ने] (@deva[गुण] by @ref[7.3.108]) + @deva[स्] → @deva[अग्ने] (@deva[स्]-@deva[लोप]); @deva[वायु] → @deva[वायो] + @deva[स्] → @deva[वायो]; @deva[देव] + @deva[स्] → @deva[देव].
"""

advanced = """
The @deva[अपृक्त] condition from @ref[6.1.68] doesn't continue here (its repetition there indicates). @deva[लोप] applies to @deva[हल्] of @deva[सु]/@deva[अम्] after @deva[एजन्त]/@deva[ह्रस्वान्त]. Process: @deva[गुण] by @ref[7.3.108] → @deva[ए]/@deva[ओ] ending → @deva[स्]-@deva[लोप]. Examples: @deva[हे अग्ने] (@deva[इ] → @deva[ए], @deva[स्]-@deva[लोप]); @deva[हे वायो] (@deva[उ] → @deva[ओ], @deva[स्]-@deva[लोप]); @deva[हे देव] (@deva[अ]-final, @deva[स्]-@deva[लोप]).
"""

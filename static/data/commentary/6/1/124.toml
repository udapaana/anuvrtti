id = "6.1.124"
numericId = "61124"

[en]
simple = """
The @deva[ओ] of @deva[गो] must become @deva[अव्] when followed by the vowels found in @deva[इन्द्र] (that is, @deva[इ] and @deva[अ]). So @deva[गो + इन्द्रः] must be @deva[गवेन्द्रः], not @deva[*गो इन्द्रः].
"""

standard = """
This @[sūtra] makes @deva[अव्]-substitution obligatory for @deva[गो] before the vowels @deva[इ] and @deva[अ] (the vowels in @deva[इन्द्र]). Thus: @deva[गो + इन्द्रः] → @deva[गवेन्द्रः]; @deva[गो + अन्द्र] → @deva[गवन्द्र]. The @deva[नित्य] (obligatory) nature contrasts with the optional rules in @ref[6.1.122]-@ref[6.1.123].
"""

advanced = """
The phrase @deva[इन्द्रे च] uses @deva[इन्द्र] as a @deva[उपलक्षण] (indicator) for the vowels @deva[इ] and @deva[अ]. Before these specific vowels, @deva[गो] → @deva[गव्] is mandatory, overriding the optionality of @ref[6.1.122]. This creates a split paradigm: @deva[गवेन्द्रः] (obligatory) vs. @deva[गोऽग्रम्/गवग्रम्] (optional). The rule ensures consistent forms in common compounds.
"""

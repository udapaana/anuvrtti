id = "6.1.71"
numericId = "61071"

[en]
simple = """
A root ending in a short vowel takes @deva[तुक्]-augment (@deva[त्]) when followed by a @deva[कृत्] affix marked with @deva[प्]. Examples: @deva[अग्निचित्] (fire-heaper); @deva[सोमसुत्] (soma-presser); @deva[प्रकृत्य], @deva[प्रहृत्य].
"""

standard = """
Before @deva[पित् कृत्] affixes, @deva[ह्रस्वान्त धातु] takes @deva[तुक्]: @deva[चि] + @deva[क्विप्] → @deva[चित्] → @deva[अग्निचित्]; @deva[सु] + @deva[क्विप्] → @deva[सुत्] → @deva[सोमसुत्]. With @deva[ल्यप्]: @deva[प्रकृत्य], @deva[प्रहृत्य], @deva[उपस्तुत्य]. Not for @deva[दीर्घान्त]: @deva[आलूय], @deva[ग्रामणीः]. Not for non-@deva[पित्]: @deva[कूतम्], @deva[हृतम्]. Not for @deva[तद्धित]: @deva[पटुतरः].
"""

advanced = """
The @deva[तुक्] augment applies to @deva[ह्रस्व]-final roots before @deva[पित् कृत्]. Condition check: (1) @deva[ह्रस्वान्त धातु]: @deva[चि], @deva[सु], @deva[कृ], @deva[हृ], @deva[स्तु]; (2) @deva[पित् कृत्]: @deva[क्विप्], @deva[ल्यप्]. Counter-examples: @deva[दीर्घान्त] (@deva[लू] → @deva[आलूय], no @deva[तुक्]); non-@deva[पित्] (@deva[क्त] → @deva[कूतम्], @deva[हृतम्]); @deva[तद्धित] (@deva[पटुतरः], @deva[पटुतमः]).
"""

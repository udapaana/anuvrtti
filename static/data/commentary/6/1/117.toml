id = "6.1.117"
numericId = "61117"

[en]
simple = """
In the Yajurveda, the word @deva[उरस्] (when in the form @deva[उरो]) keeps its @deva[ओ] unchanged before short @deva[अ], and the @deva[अ] is also kept. So @deva[उरो अन्तरिक्षम्] stays as two separate words.
"""

standard = """
This @[sūtra] provides a Yajurveda-specific @deva[प्रकृतिभाव] for @deva[उरो] (from @deva[उरस्] 'chest') followed by short @deva[अ]. Both vowels retain their original forms—no sandhi applies. The example @deva[उरो अन्तरिक्षम्] shows the hiatus preserved. This reflects actual Yajurveda text readings.
"""

advanced = """
The @deva[यजुषि] domain restriction marks this as a @deva[शाखा]-specific rule. The phrase @deva[उरसः उरो] indicates the particular sandhi form of @deva[उरस्] (with @deva[स्] → @deva[ओ] via @deva[रुत्व] and @deva[उत्व]). The @deva[प्रकृतिभाव] preserves both the @deva[ओ] and the following @deva[अ], maintaining a hiatus that would normally be resolved. Such rules document variant readings across Vedic recensions.
"""

id = "6.1.59"
numericId = "61059"

[en]
simple = """
Roots that are @deva[अनुदात्त] in @deva[धातुपाठ], end in a consonant, and have @deva[ऋ] as penultimate, optionally take @deva[अम्]-augment before @deva[झल्] non-@deva[कित्] affixes. Examples: @deva[तर्प्ता] or @deva[त्रप्ता]; @deva[दर्प्ता] or @deva[द्रप्ता].
"""

standard = """
For @deva[अनुदात्तोपदेश ऋदन्त] roots (penultimate @deva[ऋ], final consonant), @deva[अम्]-augment is optional before @deva[झलादि अकित्]: @deva[तृप्] → @deva[त्रप्ता] or @deva[तर्पिता] or @deva[तर्प्ता]; @deva[दृप्] → @deva[द्रप्ता] or @deva[दर्पिता] or @deva[दर्प्ता]. @deva[तृप्] and @deva[दृप्] belong to @deva[दिवादि] class.
"""

advanced = """
This @deva[विभाषा] for @deva[अनुदात्तोपदेश हलन्त ऋदुपधा] roots. @deva[तृप् तृप्तौ] (@deva[दिवादि]): with @deva[अम्]: @deva[त्रप्ता]; without, with @deva[इट्]: @deva[तर्पिता]; without @deva[अम्] or @deva[इट्]: @deva[तर्प्ता]. @deva[दृप् हर्षे मोदे च]: @deva[द्रप्ता]/@deva[दर्पिता]/@deva[दर्प्ता]. The three forms arise from different paths: @deva[अम्] blocks both @deva[गुण] and @deva[इट्].
"""

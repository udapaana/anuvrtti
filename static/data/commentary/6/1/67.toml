id = "6.1.67"
numericId = "61067"

[en]
simple = """
The affix @deva[वि] (as in @deva[क्विप्], @deva[क्विन्], @deva[ण्वि]) when reduced to single @deva[व्] is elided. Examples: @deva[ब्रह्महा] (Brahmin-killer); @deva[घृतस्पृक्] (touching ghee); @deva[अर्धभाक्] (sharing half).
"""

standard = """
Affixes containing @deva[वि] (@deva[क्विप्], @deva[क्विन्], @deva[ण्वि]) reduce to single @deva[व्], which being @deva[अपृक्त] (@ref[1.2.41]) is elided: @deva[ब्रह्महा], @deva[भ्रूणहा] (@deva[क्विप्] @ref[3.2.87]); @deva[घृतस्पृक्], @deva[तैलस्पृक्] (@deva[क्विन्] @ref[3.2.58]); @deva[अर्धभाक्], @deva[पादभाक्] (@deva[ण्वि] @ref[3.2.62]).
"""

advanced = """
The @deva[अपृक्त] (single-consonant) @deva[व्] of @deva[वि]-affixes is elided by this rule. @deva[क्विप्] forms: @deva[हन्] + @deva[क्विप्] → @deva[हन्] + @deva[व्] → @deva[हा] (@deva[व्]-@deva[लोप]) → @deva[ब्रह्महा]. @deva[क्विन्] forms: @deva[स्पृश्] + @deva[क्विन्] → @deva[स्पृक्] (@deva[श् → क्], @deva[व्]-@deva[लोप]) → @deva[घृतस्पृक्]. @deva[ण्वि] forms: @deva[भज्] + @deva[ण्वि] → @deva[भाक्] → @deva[अर्धभाक्].
"""

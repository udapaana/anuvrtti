id = "6.1.72"
numericId = "61072"

[en]
simple = """
The term @deva[संहितायाम्] (in continuous speech) governs @[sūtras] from here through @ref[6.1.157]. Sandhi rules apply when words are pronounced together without pause.
"""

standard = """
This @deva[अधिकार] extends through @ref[6.1.157]. Rules in this section apply when words are in @deva[संहिता] (unbroken utterance). Examples: @deva[दधि] + @deva[अत्र] → @deva[दध्यत्र] (@deva[इ] → @deva[य्]); @deva[मधु] + @deva[अत्र] → @deva[मध्वत्र] (@deva[उ] → @deva[व्]). With pause: @deva[दधि अत्र] (no sandhi).
"""

advanced = """
This @deva[अधिकार सूत्र] governs @ref[6.1.72]-@ref[6.1.157]. @deva[संहिता] = @deva[परः सन्निकर्षः संहिता] (@ref[1.4.109]): closest proximity of sounds. When words are pronounced without hiatus, sandhi applies: @deva[इ/उ] → @deva[य्/व्] before vowels. Without @deva[संहिता]: @deva[दधि। अत्र] (pause preserves forms).
"""

id = "6.1.218"
numericId = "61218"

[en]
simple = """
The reduplicated aorist formed with @deva[चङ्] may optionally have acute accent on the penultimate syllable if the word has more than two syllables. So @deva[अचीकरत्] can be @deva[अचीक꣡रत्] or @deva[अची꣡करत्].
"""

standard = """
This @[sūtra] provides optional @deva[उपोत्तमोदात्त] for @deva[चङ्]-aorist (@deva[लुङ्] with @deva[चङ्]) when @deva[त्र्यादि] (three+ syllables). Example: @deva[मा हि चीकर꣡ताम्] or alternative accent. The @deva[विभाषा] allows variant accent patterns.
"""

advanced = """
The @deva[चङि त्र्यादौ वोपोत्तमम्] provides optional penultimate accent for @deva[चङ्]-aorist in polysyllabic forms. The @deva[चङ्] marker (@ref[3.1.48]) produces reduplicated aorists like @deva[अचीकरत्], @deva[अजीजनत्]. The @deva[विभाषा] allows @deva[उपोत्तम] accent optionally: @deva[अचीक꣡रत्/अची꣡करत्]. This reflects variant accent traditions for these verbal forms.
"""

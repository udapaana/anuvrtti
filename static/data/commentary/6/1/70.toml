id = "6.1.70"
numericId = "61070"

[en]
simple = """
In Vedic, the neuter nominative/accusative plural ending @deva[इ] (@deva[शि]) is optionally elided. Examples: @deva[या क्षेत्रा] or @deva[यानि क्षेत्राणि]; @deva[या वना] or @deva[यानि वनानि].
"""

standard = """
In @deva[छन्दस्], the @deva[शि] ending (neuter nom./acc. plural) optionally undergoes @deva[लोप]: @deva[या क्षेत्रा] (with @deva[लोप]) or @deva[यानि क्षेत्राणि] (without); @deva[या वना] or @deva[यानि वनानि].
"""

advanced = """
This @deva[छान्दस विभाषा] allows @deva[शि]-@deva[लोप] for neuter plural. Without @deva[लोप]: @deva[यानि क्षेत्राणि] (standard). With @deva[लोप]: @deva[या क्षेत्रा] (Vedic). The demonstrative @deva[यद्] shows corresponding optional forms: @deva[या]/@deva[यानि].
"""

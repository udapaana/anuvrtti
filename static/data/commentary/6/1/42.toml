id = "6.1.42"
numericId = "61042"

[en]
simple = """
The semivowel of @deva[ज्या] (to grow old) is not vocalized before @deva[ल्यप्]. Examples: @deva[प्रज्याय], @deva[उपज्याय].
"""

standard = """
Before @deva[ल्यप्], @deva[ज्या] (belonging to @deva[ग्रहादि] @ref[6.1.16]) doesn't undergo @deva[संप्रसारण]: @deva[प्रज्याय], @deva[उपज्याय]. Without this prohibition, @deva[*प्रजीय] would result.
"""

advanced = """
@deva[ज्या जरणे] belongs to @deva[ग्रहादि] (@ref[6.1.16]), which would cause @deva[संप्रसारण] before @deva[कित्]/@deva[ङित्]. @deva[ल्यप्] is @deva[कित्] (@ref[1.2.18]). This @[sūtra] blocks: @deva[ज्या] + @deva[ल्यप्] → @deva[ज्याय] (@deva[आ] → @deva[आय्]) → @deva[प्रज्याय]. Without block: @deva[*प्रजीय].
"""

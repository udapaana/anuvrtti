id = "6.1.18"
numericId = "61018"

[en]
simple = """
The causative @deva[स्वपि] (from @deva[स्वप्] 'to sleep') undergoes @deva[संप्रसारण] before @deva[चङ्] (Aorist). Example: @deva[असूषुपत्] (he caused to sleep).
"""

standard = """
The causative @deva[स्वापि] undergoes @deva[संप्रसारण] before @deva[चङ्]. The order: (1) @deva[संप्रसारण]: @deva[स्वापि] → @deva[सुपि]; (2) @deva[णि]-elision (@ref[6.4.51]): → @deva[सुप्]; (3) @deva[गुण] of penultimate: → @deva[सोप्]; (4) shortening (@ref[7.4.1]): → @deva[सुप्]; (5) reduplication: → @deva[सुसुप्]; (6) @deva[अभ्यास]-lengthening (@ref[7.4.94]): → @deva[सूसुप्]; (7) → @deva[असूषुपत्], @deva[असूषुपताम्], @deva[असूषुपन्].
"""

advanced = """
This @[sūtra] provides @deva[संप्रसारण] for @deva[णिजन्त स्वप्] before @deva[चङ्]. The derivation sequence is critical: @deva[स्वापि] + @deva[चङ्] → @deva[सुपि] + @deva[चङ्] (@deva[संप्रसारण]) → @deva[सुप्] + @deva[चङ्] (@ref[6.4.51] @deva[णि]-@deva[लोप]) → @deva[सोप्] (@deva[गुण]) → @deva[सुप्] (@ref[7.4.1] shortening) → @deva[सुसुप्] (reduplication) → @deva[सूसुप्] (@ref[7.4.94] @deva[अभ्यास]-@deva[दीर्घ]) → @deva[असूषुपत्] (@deva[ष्] by @ref[8.3.59]). Forms: @deva[असूषुपत्], @deva[असूषुपताम्], @deva[असूषुपन्].
"""

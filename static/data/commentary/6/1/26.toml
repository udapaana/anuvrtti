id = "6.1.26"
numericId = "61026"

[en]
simple = """
@deva[श्याय्] optionally undergoes @deva[संप्रसारण] before @deva[निष्ठा] when preceded by @deva[अभि] or @deva[अव]. Examples: @deva[अभिशीनम्] or @deva[अभिश्यानम्]; @deva[अवशीनम्] or @deva[अवश्यानम्].
"""

standard = """
With @deva[अभि] or @deva[अव] preceding, @deva[संप्रसारण] is optional: @deva[अभिशीनं घृतम्] or @deva[अभिश्यानं घृतम्]; @deva[अवशीनं वृश्चिकः] or @deva[अवश्यानं वृश्चिकः]. This option applies even when the meaning is 'coagulation' or 'cold': @deva[अवशीतो वायुः] or @deva[अवश्यानो वायुः]. The @deva[पूर्व] from @ref[6.1.23] applies: @deva[अभिसंशीनम्] or @deva[अभिसंश्यानम्].
"""

advanced = """
This @deva[विभाषा] allows optional @deva[संप्रसारण] for @deva[श्याय्] with @deva[अभि]/@deva[अव]. Both forms valid: @deva[अभिशीनम्]/@deva[अभिश्यानम्], @deva[अवशीनम्]/@deva[अवश्यानम्]. The option extends to coagulation/cold meanings: @deva[अवशीनं घृतम्]/@deva[अवश्यानम्], @deva[अवशीतो वायुः]/@deva[अवश्यानः]. The @deva[पूर्व] condition from @ref[6.1.23] means intervening @deva[उपसर्ग] is allowed: @deva[अभिसंशीनम्]/@deva[अभिसंश्यानम्].
"""

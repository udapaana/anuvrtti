id = "6.1.202"
numericId = "61202"

[en]
simple = """
The word @deva[जय] ('victory') has acute accent on the first syllable when it means 'that by which one wins'. So @deva[ज꣡योऽश्वः] ('the victorious horse'). But @deva[जयो वर्तते] ('victory exists') has different accent.
"""

standard = """
This @[sūtra] provides @deva[आद्युदात्त] for @deva[जय] when meaning @deva[येन जयति] ('instrument of victory'). Example: @deva[ज꣡योऽश्वः] ('horse by which one wins'). When @deva[जय] means 'victory' abstractly, different accent applies: @deva[जयो꣡ वर्तते] ('victory prevails').
"""

advanced = """
The @deva[येन जयति] semantic condition restricts @deva[आद्युदात्त] to instrumental sense ('that by which one conquers'). The @deva[जय] as @deva[करण] (instrument) takes @deva[ज꣡य]. As @deva[भाव] (abstract 'victory'), it follows regular accent. This semantic-accent correlation shows how meaning can determine prosodic form.
"""

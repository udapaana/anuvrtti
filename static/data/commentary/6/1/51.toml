id = "6.1.51"
numericId = "61051"

[en]
simple = """
The root @deva[ली] (to adhere) optionally substitutes @deva[आ] for its diphthong before @deva[ल्यप्] or affixes demanding such substitution. Examples: @deva[संलाय] or @deva[संलीय].
"""

standard = """
For @deva[ली], the @deva[ए] (arising from @deva[गुण] of @deva[ई]) optionally becomes @deva[आ] before @deva[ल्यप्] and @deva[एजादेश]-demanding affixes: @deva[संलाय] or @deva[संलीय]. This applies to subsequent roots too: @deva[खिद्] → @deva[खेद्] → @deva[खाद्]; @deva[गुर्] → @deva[गोर्] → @deva[गार्].
"""

advanced = """
This @deva[विभाषा] applies to @deva[ली श्लेषणे] and subsequent roots. Process: @deva[ली] + @deva[ल्यप्] → @deva[ले] (@deva[गुण]) + @deva[य] → optionally @deva[ला] + @deva[य] → @deva[संलाय] or @deva[संलीय] (with @deva[दीर्घ]). Similarly for roots taught subsequently: the incipient @deva[गुण] diphthong optionally → @deva[आ].
"""

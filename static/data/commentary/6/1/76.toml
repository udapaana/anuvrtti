id = "6.1.76"
numericId = "61076"

[en]
simple = """
A long vowel at the end of a complete word (@deva[पद]) optionally takes @deva[तुक्]-augment when @deva[छ] follows. Examples: @deva[कूटीच्छाया] or @deva[कूटीछाया]; @deva[कुवलीच्छाया] or @deva[कुवलीछाया].
"""

standard = """
Unlike @ref[6.1.75] (obligatory), this rule makes @deva[तुक्] optional for @deva[पदान्त दीर्घ] before @deva[छ]: @deva[कूटीच्छाया] or @deva[कूटीछाया]. The augment belongs to the vowel, not the word. This is a @deva[पदान्त] rule, not @deva[पदविधि]—so the words need not be syntactically related (@deva[समर्थ]).
"""

advanced = """
This @deva[विभाषा] for @deva[पदान्त दीर्घ] before @deva[छ] contrasts with @ref[6.1.75] (obligatory for non-@deva[पद] context). The @deva[तुक्] is @deva[स्वरस्य], not @deva[पदस्य]. Being @deva[पदान्त]-rule (not @deva[पदविधि]), @deva[समर्थ] condition doesn't apply—unrelated words in sequence still trigger optionally.
"""

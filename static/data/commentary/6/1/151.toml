id = "6.1.151"
numericId = "61151"

[en]
simple = """
In Vedic mantras, the word @deva[चन्द्र] ('moon, shining') receives the @deva[सुट्] augment when it's the second member of a compound and is preceded by a short vowel. So @deva[सु + चन्द्र] becomes @deva[सुश्चन्द्र] ('beautifully shining').
"""

standard = """
This @[sūtra] adds @deva[सुट्] to @deva[चन्द्र] as @deva[उत्तरपद] (second compound member) in @deva[मन्त्र] contexts, when preceded by a @deva[ह्रस्व] (short) vowel. Thus @deva[सु + चन्द्र] → @deva[सुश्चन्द्रः] (Vedic). The short-vowel condition is essential; after long vowels, no @deva[सुट्] applies.
"""

advanced = """
The @deva[मन्त्रे] domain restricts this to Vedic usage. The @deva[ह्रस्वात्] condition means the first member must end in a short vowel (@deva[अ इ उ ऋ ऌ]). The @deva[सुट्] before @deva[च्] produces @deva[श्च] (with @deva[श्चुत्व]). This is one of the final @deva[सुट्] rules before the @deva[अधिकार] concludes at @ref[6.1.157]. Example: @deva[सुश्चन्द्रो युष्मान्] in Vedic texts.
"""

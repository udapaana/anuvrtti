id = "6.1.30"
numericId = "61030"

[en]
simple = """
The root @deva[श्वि] (to swell) optionally undergoes @deva[संप्रसारण] before @deva[लिट्] and @deva[यङ्]. Examples: Perfect @deva[शुशाव] or @deva[शिश्वाय]; Intensive @deva[शोश्वीयते] or @deva[शाश्वीयते].
"""

standard = """
Before @deva[लिट्], @deva[श्वि] can take @deva[संप्रसारण] (@deva[व्] → @deva[उ]) or not: @deva[शुशाव]/@deva[शिश्वाय] (strong), @deva[शुशुवतुः]/@deva[शिश्वियतुः] (weak). Before @deva[यङ्]: @deva[शोश्वीयते]/@deva[शाश्वीयते]. By @ref[6.1.15], @deva[श्वि] would take @deva[संप्रसारण] before @deva[लिट्] (@deva[कित्]) invariably; this @[sūtra] makes it optional. Before @deva[यङ्], no previous rule applied, so this teaches optional @deva[संप्रसारण].
"""

advanced = """
This @[sūtra] provides @deva[वैकल्पिक संप्रसारण] for @deva[श्वि] before @deva[लिट्]/@deva[यङ्]. For @deva[लिट्]: @ref[6.1.15] would give invariable @deva[संप्रसारण] (since @deva[लिट्] is @deva[कित्]); this makes it optional. With @deva[संप्रसारण]: @deva[श्वि] → @deva[शु] → @deva[शुशु] → @deva[शुशाव] (strong), @deva[शुशुवतुः] (weak). Without: @deva[शिश्वि] → @deva[शिश्वाय], @deva[शिश्वियतुः]. For @deva[यङ्]: no previous rule applied; this teaches optional @deva[संप्रसारण]: @deva[शोश्वीयते] (with) or @deva[शाश्वीयते] (without).
"""

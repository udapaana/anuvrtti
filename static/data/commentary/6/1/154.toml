id = "6.1.154"
numericId = "61154"

[en]
simple = """
The word @deva[मस्कर] means 'bamboo', and @deva[मस्करिन्] means 'a wandering monk' (who carries a bamboo staff). These are formed with @deva[सुट्]. Without @deva[सुट्], the form would be @deva[मकर] (a sea creature).
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[मस्कर] ('bamboo') and @deva[मस्करिन्] ('mendicant monk'). The @deva[सुट्] distinguishes these from @deva[मकर] ('sea-monster/crocodile'). The @deva[मस्करिन्] is a wandering ascetic who carries a bamboo staff (@deva[मस्कर]). These are underived nominal stems with listed @deva[सुट्].
"""

advanced = """
The semantic distinction is crucial: @deva[मस्कर] (with @deva[सुट्]) = bamboo; @deva[मकर] (without) = aquatic creature. The @deva[मस्करिन्] ('one possessing a @deva[मस्कर]') denotes Buddhist or Jain wandering monks who carried bamboo staffs. The @deva[निपातन] status means these are listed forms, not productively derived. The @deva[सुट्] serves lexical differentiation here.
"""

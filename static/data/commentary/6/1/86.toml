id = "6.1.86"
numericId = "61086"

[en]
simple = """
The @deva[एकादेश] is treated as 'not having occurred' for purposes of @deva[ष]-conversion and @deva[तुक्]-augment. Example: @deva[काँ सिचत्]—the @deva[स्] doesn't become @deva[ष्] despite following @deva[आ].
"""

standard = """
The @deva[एकादेश] is @deva[असिद्ध] (treated as not effected) for two operations: (1) @deva[षत्व] (@deva[स्] → @deva[ष्]); (2) @deva[तुक्]-augment. Thus in @deva[काँ सिचत्] (@deva[कम्] + @deva[असिचत्]), @deva[स्] doesn't become @deva[ष्] after @deva[आ] because the @deva[आ] (from @deva[अम्] + @deva[अ]) is @deva[असिद्ध] for this purpose.
"""

advanced = """
This @deva[असिद्धत्व] blocks @deva[आदेशलक्षण] operations. The principle: @deva[असिद्धवचनम् आदेशलक्षणप्रतिषेधार्थम् उत्सर्गलक्षणभावार्थं च]. For @deva[षत्व]: @deva[काँ सिचत्] (@deva[कम् + असिचत्]) → the @deva[एकादेश आ] is @deva[असिद्ध], so @deva[स्] doesn't see @deva[इक्] for @ref[8.3.59]. For @deva[तुक्]: prevents unwanted augment.
"""

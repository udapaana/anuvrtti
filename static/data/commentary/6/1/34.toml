id = "6.1.34"
numericId = "61034"

[en]
simple = """
In Vedic, @deva[ह्वे] shows diverse @deva[संप्रसारण] patterns. Examples: @deva[हुवे] (I invoke) or @deva[ह्वयामि]; @deva[हवः] (invocation).
"""

standard = """
The @deva[छन्दस्] allows variation: @deva[इन्द्राग्नी हुवे] (with @deva[संप्रसारण]—@[ātmanepada] Present 1st singular, @deva[शप्] elided, @deva[उवङ्] substitution); @deva[ह्वयामि मरुतः शिवान्] (without). Also @deva[हवः] in @deva[श्रुधीहवम्] (RV @ref[1.2.1]).
"""

advanced = """
Vedic @deva[विभाषा] for @deva[ह्वे]: @deva[हुवे] = @deva[ह्वे] → @deva[हु] (@deva[संप्रसारण]) + @deva[ए] (@[ātm]. 1s) → @deva[शप्]-@deva[लुक्] → @deva[उवङ्]-substitution → @deva[हुवे]. Without @deva[संप्रसारण]: @deva[ह्वयामि विश्वान् देवान्]. The noun @deva[हवः] (invocation) in @deva[श्रुधीहवम्] also shows @deva[संप्रसारण]. These variations are @deva[छान्दस].
"""

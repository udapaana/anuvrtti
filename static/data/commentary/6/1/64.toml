id = "6.1.64"
numericId = "61064"

[en]
simple = """
A root listed with initial @deva[ष्] in the @deva[धातुपाठ] substitutes @deva[स्] for that @deva[ष्]. Examples: @deva[षह्] → @deva[सहते]; @deva[षिच्] → @deva[सिञ्चति].
"""

standard = """
Roots with @deva[उपदेश]-initial @deva[ष्] change it to @deva[स्]: @deva[षह्] → @deva[सहते]; @deva[षिच्] → @deva[सिञ्चति]. Not for non-roots: @deva[षोडश], @deva[षडिकः], @deva[षण्डः]. Not for non-initial @deva[ष्]: @deva[कर्षति], @deva[कृषति]. Roots are listed with @deva[ष्] so @ref[8.3.59] can convert @deva[स्] back to @deva[ष्] after certain sounds.
"""

advanced = """
The @deva[धात्वादेः] condition restricts to root-initial. Process: @deva[षह्] (@deva[उपदेश]) → @deva[सह्] (@deva[ष्] → @deva[स्]) → @deva[सहते]. Purpose of listing with @deva[ष्]: enables @ref[8.3.59] @deva[षत्व] after @deva[इक्]: @deva[अभिषह्], @deva[प्रषह्]. Non-initial @deva[ष्] unaffected: @deva[कृष्] remains. Non-@deva[धातु]: @deva[षोडश] (numeral) unaffected.
"""

id = "6.1.198"
numericId = "61198"

[en]
simple = """
The @deva[सम्बोधन] (vocative) case (calling someone) has acute accent on the first syllable. So when calling @deva[देवदत्त], you say @deva[दे꣡वदत्त]! with accent on the first syllable.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[सम्बुद्धि] (vocative). Examples: @deva[दे꣡वदत्त!], @deva[दे꣡वदत्तौ!], @deva[दे꣡वदत्ताः!]. This overrides @ref[6.2.148]'s final accent. The @deva[सम्बोधन] (vocative) distinctively marks addressed entities with initial accent.
"""

advanced = """
The @deva[सम्बुद्धौ] condition targets the vocative function. The @deva[आद्युदात्त] applies regardless of the stem's inherent accent. @deva[देवदत्त꣡] (nom.) → @deva[दे꣡वदत्त] (voc.). This @deva[अपवाद] to @ref[6.2.148] creates the distinctive vocative intonation pattern. The accent shift signals the pragmatic 'calling' function in discourse.
"""

id = "6.1.157"
numericId = "61157"

[en]
simple = """
The words @deva[पारस्कर] and similar names are formed with @deva[सुट्]. These are proper names (of places, trees, etc.) that take @deva[सुट्] irregularly. This @[sūtra] concludes the @deva[स्कोः] section that began at @ref[6.1.135].
"""

standard = """
This @[sūtra] lists @deva[पारस्कर] etc. as @deva[संज्ञा] (proper names) formed with @deva[सुट्]. Examples: @deva[पारस्करः] (a country), @deva[कारस्करः] (a tree), @deva[रथस्याः] (a place name). These are @deva[निपातन] formations. This is the final @[sūtra] of the @deva[स्कोः पूर्वस्य] @deva[अधिकार] that began at @ref[6.1.135].
"""

advanced = """
The @deva[आदि] ('etc.') indicates a @deva[गण] (list) of proper names taking @deva[सुट्]. This @[sūtra] concludes the @deva[स्कोः] @deva[अधिकार]—all rules from @ref[6.1.135] through @ref[6.1.157] concerned @deva[सुट्] augmentation before @deva[क्]. The @deva[संज्ञायाम्] restriction limits these to proper nouns. The list includes geographical and botanical terms requiring memorization.
"""

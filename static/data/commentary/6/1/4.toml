id = "6.1.4"
numericId = "61004"

[en]
simple = """
Of the two copies created by reduplication, the first one is called @deva[अभ्यास] (the reduplicate). Example: in @deva[पपाच], the first @deva[प] is the @deva[अभ्यास].
"""

standard = """
The @deva[द्वे] (two) from @ref[6.1.1] is understood here in genitive: @deva[द्वयोः पूर्वः] (the first of the two). This technical term @deva[अभ्यास] is used in @ref[3.1.6], @ref[6.1.7], etc. In @deva[पपाच], the initial @deva[प] is the @deva[अभ्यास]; in @deva[जुहोति], @deva[जु] is the @deva[अभ्यास].
"""

advanced = """
This @deva[संज्ञासूत्र] defines @deva[अभ्यास] as @deva[द्वयोः पूर्वः]. The nominative @deva[द्वे] is reinterpreted as genitive for this rule. The term appears in @ref[3.1.6] (@deva[अभ्यासमतद्धितलुकि]), @ref[6.1.7] (@deva[तुजादीनां दीर्घोऽभ्यासस्य]), @ref[7.4.58]-@ref[7.4.97] (various @deva[अभ्यास]-modifications). The @deva[अभ्यास] undergoes specific changes: shortening (@ref[7.4.59]), consonant simplification (@ref[7.4.60]), etc.
"""

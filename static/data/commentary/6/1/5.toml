id = "6.1.5"
numericId = "61005"

[en]
simple = """
The two copies together—the @deva[अभ्यास] and the original—are collectively called @deva[अभ्यस्त] (the reduplicated form). Example: the whole @deva[पपाच] is @deva[अभ्यस्त].
"""

standard = """
The word @deva[उभे] (both) indicates @deva[अभ्यस्त] applies to the pair collectively, not individually. This term appears in @ref[3.4.109], @ref[6.1.32]. By @ref[6.1.189], the first vowel of an @deva[अभ्यस्त] gets @deva[उदात्त] accent: @deva[द꣡दति]. By @ref[7.1.4], @deva[अत्] replaces @deva[झ] after @deva[अभ्यस्त]: @deva[दद] + @deva[झि] → @deva[ददति].
"""

advanced = """
This @deva[संज्ञासूत्र] defines @deva[अभ्यस्त] as the collective designation of both portions. Used in: @ref[3.4.109] (@deva[सीयुट्]-prohibition), @ref[6.1.32] (@deva[लोपोऽभ्यस्तस्य]), @ref[6.1.189] (@deva[अभ्यस्तस्याद्युदात्तः]), @ref[7.1.4] (@deva[अद्भ्यस्तात्]). The accent rule means @deva[द꣡दति] has @deva[उदात्त] on first @deva[अ]. The @deva[झ] → @deva[अत्] substitution: @deva[दद] + @deva[झि] → @deva[दद] + @deva[अति] → @deva[ददति]. Also @ref[6.4.112]: @deva[ददत्].
"""

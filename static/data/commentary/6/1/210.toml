id = "6.1.210"
numericId = "61210"

[en]
simple = """
In @deva[मन्त्र] (Vedic hymns), @deva[जुष्ट] and @deva[अर्पित] always have acute accent on the first syllable. So in mantras: @deva[जु꣡ष्ट देवानाम् अ꣡र्पितं पितॄणाम्] ('favored by gods, offered to ancestors').
"""

standard = """
This @[sūtra] makes @deva[आद्युदात्त] obligatory for @deva[जुष्ट] and @deva[अर्पित] in @deva[मन्त्र] context (more specific than @deva[छन्दस्]). Unlike @ref[6.1.209]'s optionality in general Vedic, in actual hymns these always take first-syllable accent: @deva[जु꣡ष्ट], @deva[अ꣡र्पित].
"""

advanced = """
The @deva[मन्त्रे तु नित्यम्] overrides @ref[6.1.209]'s optionality for the narrower @deva[मन्त्र] domain. While @deva[छन्दस्] (general Vedic) allows @deva[विभाषा], actual @deva[मन्त्र] (hymn) usage requires @deva[आद्युदात्त]: @deva[जु꣡ष्ट देवानाम् अ꣡र्पितं पितॄणाम्]. Some authorities (@deva[केचित्]) include @deva[ब्राह्मण] texts in this @deva[नित्य] scope.
"""

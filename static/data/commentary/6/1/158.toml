id = "6.1.158"
numericId = "61158"

[en]
simple = """
In a word, all syllables except one are unaccented (@deva[अनुदात्त]). The one accented syllable carries the @deva[उदात्त] (acute) accent, while all others are low-toned. This is how Sanskrit accent works.
"""

standard = """
This @[sūtra] establishes that a @deva[पद] (word) has only one @deva[उदात्त] (acute-accented) syllable; all others are @deva[अनुदात्त] (unaccented/grave). The @deva[कारिका] explains: augments, substitutes, base, and affixes each potentially carry accent, but @deva[एकवर्जं पदस्वरः]—only one syllable in the final word retains accent.
"""

advanced = """
This @deva[परिभाषा] (interpretive rule) establishes that despite multiple potential accent-bearing elements (augments, bases, affixes), only one @deva[उदात्त] surfaces per @deva[पद]. The @deva[कारिका] (@deva[आगमस्य विकारस्य प्रकृतेः प्रत्ययस्य च। पृथक्स्वरनिवृत्त्यर्थमेकवर्जं पदस्वरः]) clarifies that accent rules prevent cumulative accents. This initiates the @deva[स्वर] (accent) section of @[pāda] 6.1.
"""

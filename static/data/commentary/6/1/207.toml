id = "6.1.207"
numericId = "61207"

[en]
simple = """
The word @deva[आशित] ('having eaten') has acute accent on the first syllable. So @deva[आ꣡शितो देवदत्तः] means 'Devadatta, having eaten' with accent on @deva[आ].
"""

standard = """
This @[sūtra] provides @deva[आद्युदात्त] for @deva[आशित] meaning 'having eaten' (from @deva[अश्] 'to eat'). The @deva[आ] prefix + @deva[शित] takes first-syllable accent: @deva[आ꣡शितः]. The active (agent-oriented) participle sense is specified.
"""

advanced = """
The @deva[आशितस्य भुक्तवतः] specifies the @deva[कर्तरि] (agent) sense of @deva[आशित] ('one who has eaten'). The @deva[आद्युदात्त] applies: @deva[आ꣡शितः]. This distinguishes from potential @deva[कर्मणि] (object) sense. The @deva[आ] of @deva[आशित] is the prefix @deva[आ] (unlike @ref[6.1.205]'s @deva[आ]-exclusion, which targets stem-initial @deva[आ]).
"""

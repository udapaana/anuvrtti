id = "6.1.206"
numericId = "61206"

[en]
simple = """
The words @deva[शुष्क] ('dry') and @deva[धृष्ट] ('bold') have acute accent on the first syllable. These are not names—they're regular adjectives with exceptional accent.
"""

standard = """
This @[sūtra] provides @deva[आद्युदात्त] for @deva[शुष्क] and @deva[धृष्ट] as non-names (@deva[असंज्ञा]). Unlike @ref[6.1.205] which requires name status, these participles take first-syllable accent in their regular adjectival use: @deva[शु꣡ष्कः] ('dry'), @deva[धृ꣡ष्टः] ('bold').
"""

advanced = """
The @deva[शुष्कधृष्टौ च] extends @deva[आद्युदात्त] beyond @ref[6.1.205]'s @deva[संज्ञा] restriction. @deva[शुष्क] (from @deva[शुष्] 'dry') and @deva[धृष्ट] (from @deva[धृष्] 'be bold') take @deva[शु꣡ष्क], @deva[धृ꣡ष्ट] in all uses, not just as names. These are @deva[निपातन] forms requiring separate memorization.
"""

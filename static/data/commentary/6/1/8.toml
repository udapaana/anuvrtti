id = "6.1.8"
numericId = "61008"

[en]
simple = """
When @deva[लिट्] (Perfect tense) affixes follow, a root that is not already reduplicated undergoes reduplication. Example: @deva[पच्] + @deva[णल्] → @deva[पपाच] (he cooked); @deva[पठ्] → @deva[पपाठ] (he recited).
"""

standard = """
The @deva[लिट्] affixes trigger reduplication of @deva[अनभ्यस्त धातु]. Examples: @deva[पपाच], @deva[पपाठ], @deva[प्रोर्णुनाव] (@deva[ऊर्णु] treated as @deva[नु] per @[vārtika]). Already-reduplicated roots don't re-reduplicate: @deva[नोनूय] (Intensive of @deva[नु]) → @deva[नोनाव] (not @deva[*नुनोनाव]). @[vārtika]: In @deva[छन्दस्], reduplication is optional: @deva[याचिषामहे] or @deva[यियाचिषामहे]. @[vārtika]: @deva[जागृ] optionally reduplicates: @deva[जागार] or @deva[जजागार].
"""

advanced = """
This @[sūtra] provides @deva[द्वित्व] for @deva[अनभ्यस्त धातु] before @deva[लिट्]. The word @deva[धातोः] is necessary because by @ref[3.4.117], @deva[लिट्] can be @deva[सार्वधातुक], taking @deva[विकरण]: @deva[श्रु] + @deva[श्नु] → @deva[शृणु]; @deva[शृणु] isn't a @deva[धातु], so no reduplication: @deva[शृन्विरे] (not @deva[*शुशृन्विरे]). The phrase @deva[अनभ्यासस्य] excludes @deva[यङन्त] forms: @deva[नोनूयतेः] @deva[लिट्] = @deva[नोनाव]. @[vārtika] @deva[छन्दसि लिटो विकल्पः]: @deva[दाति]/@deva[ददाति], @deva[धातु]/@deva[दधातु]. @[vārtika] @deva[जागृ वा]: @deva[यो जागार]/@deva[जजागार].
"""

id = "6.1.83"
numericId = "61083"

[en]
simple = """
In Vedic, @deva[भय्य] (fearful) and @deva[प्रवय्या] (for impregnation) are found. Examples: @deva[भय्यं किलासीत्]; @deva[वत्सतरी प्रवय्या].
"""

standard = """
Vedic forms: @deva[भी] + @deva[यत्] → @deva[भय्यम्] (fearable), with @deva[ए] → @deva[अय्]; @deva[प्र] + @deva[वी] + @deva[यत्] → @deva[प्रवय्या]. The @deva[यत्] on @deva[भी] has ablative force (@ref[3.3.113] @deva[बहुलम्]): @deva[बिभेति अस्मात्] = @deva[भय्यम्]. @deva[प्रवय्या] is always feminine.
"""

advanced = """
These @deva[छान्दस] forms: @deva[भी + यत्] → @deva[भे + य] → @deva[भय्यम्] (@deva[ए] → @deva[अय्]). @deva[यत्] here expresses @deva[अपादान] by @ref[3.3.113] @deva[कृत्यलुटो बहुलम्]. @deva[प्रवय्या] (always @deva[स्त्री]): @deva[प्र + वी + यत्] → @deva[प्रवे + य] → @deva[प्रवय्य] + @deva[टाप्] → @deva[प्रवय्या].
"""

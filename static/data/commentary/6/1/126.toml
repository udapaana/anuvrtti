id = "6.1.126"
numericId = "61126"

[en]
simple = """
In Vedic literature, the particle @deva[आ] becomes nasalized (@deva[आँ]) before a vowel and retains its form (no sandhi). So @deva[आँ अपः] in the @[ṛgveda] shows the nasalized @deva[आ] separate from @deva[अपः].
"""

standard = """
This @[sūtra] provides a Vedic rule for the adverb @deva[आ] (a preverb meaning 'towards'). Before a vowel, it becomes @deva[आँ] (nasalized @deva[आ], marked with @deva[अनुस्वार]) and undergoes @deva[प्रकृतिभाव]. Example from @[ṛgveda]: @deva[अभ्र आँ अपः] where @deva[आँ] remains distinct.
"""

advanced = """
The nasalization (@deva[अनुनासिक]) of @deva[आ] is a Vedic phonological feature absent in Classical Sanskrit. The @deva[प्रकृतिभाव] preserves hiatus, and the nasalization marks the morpheme boundary audibly. This rule documents a feature of Vedic pronunciation that aids in @deva[पदपाठ] (word-by-word recitation) and @deva[क्रमपाठ] (sequential recitation) traditions.
"""

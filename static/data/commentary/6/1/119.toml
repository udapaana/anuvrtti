id = "6.1.119"
numericId = "61119"

[en]
simple = """
In the Yajurveda, when @deva[अङ्गे] is followed by @deva[अङ्गे], both the @deva[ए] and the following @deva[अ] are preserved. So the phrase @deva[अङ्गे अङ्गे] maintains the hiatus.
"""

standard = """
This @[sūtra] specifies that in Yajurveda, the sequence @deva[अङ्गे + अङ्गे] ('in limb, in limb' / 'in every limb') preserves @deva[प्रकृतिभाव]. The @deva[ए] of the first @deva[अङ्गे] and the @deva[अ] of the second are both retained—no @deva[पूर्वरूप] sandhi. Example: @deva[ऐन्द्रः प्राणः अङ्गेऽङ्गे] may appear unsandhi-ed.
"""

advanced = """
The reduplication @deva[अङ्गे अङ्गे] is a distributive expression meaning 'in each and every limb.' The @deva[प्रकृतिभाव] here may be motivated by semantic and rhythmic considerations—maintaining the distinct iteration. The @deva[यजुषि] restriction confirms this is Yajurveda-specific. Such rules preserve ancient recitation practices distinct from Classical sandhi norms.
"""

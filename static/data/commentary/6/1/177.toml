id = "6.1.177"
numericId = "61177"

[en]
simple = """
After a stem that ends in a light vowel with final accent, the genitive plural ending @deva[नाम्] optionally receives acute accent. So @deva[अग्नि] + @deva[नाम्] can be either @deva[अग्नीना꣡म्] or @deva[अग्नी꣡नाम्].
"""

standard = """
This @[sūtra] provides optional @deva[उदात्त] for @deva[आम्] (genitive plural) after @deva[अन्तोदात्त लघ्वन्त] stems. The @deva[विभाषा] allows both: @deva[अग्नीना꣡म्] (accented ending) or @deva[अग्नी꣡नाम्] (stem-accented). Similarly @deva[वायूना꣡म्/वायू꣡नाम्].
"""

advanced = """
The @deva[नाम्] (genitive plural @deva[आम्] with @deva[नुट्]) shows optional accent after @deva[अन्तोदात्त लघ्वन्त]. The @deva[नुट्] augment (@ref[7.1.54]) yields @deva[नाम्]. Both accent placements are grammatical: @deva[अग्नीना꣡म्] (ending accented per this rule) or @deva[अग्नी꣡नाम्] (stem accent unchanged). This optionality reflects variant accent traditions.
"""

id = "6.1.63"
numericId = "61063"

[en]
simple = """
In weak cases (from accusative plural onward), these stems substitute: @deva[पद्] for @deva[पाद्], @deva[दत्] for @deva[दन्त], @deva[नस्] for @deva[नासिका], @deva[मास्] for @deva[मास], @deva[हृद्] for @deva[हृदय], @deva[निश्] for @deva[निशा], @deva[असन्] for @deva[असृज्], @deva[यूषन्] for @deva[यूष], @deva[दोषन्] for @deva[दोस्], @deva[यकन्] for @deva[यकृत्], @deva[शकन्] for @deva[शकृत्], @deva[उदन्] for @deva[उदक], @deva[आसन्] for @deva[आस्य].
"""

standard = """
Before @deva[भसंज्ञक] (weak) case endings, these substitutes apply: @deva[पाद्] → @deva[पद्], @deva[दन्त] → @deva[दत्], @deva[नासिका] → @deva[नस्], @deva[मास] → @deva[मास्], @deva[हृदय] → @deva[हृद्], @deva[निशा] → @deva[निश्], @deva[असृज्] → @deva[असन्], @deva[यूष] → @deva[यूषन्], @deva[दोस्] → @deva[दोषन्], @deva[यकृत्] → @deva[यकन्], @deva[शकृत्] → @deva[शकन्], @deva[उदक] → @deva[उदन्], @deva[आस्य] → @deva[आसन्]. Examples: @deva[पद्भ्याम्], @deva[दद्भिः], @deva[हृद्भिः].
"""

advanced = """
These @deva[भसंज्ञक आदेश] apply before weak endings (accusative plural onward): @deva[पाद्] → @deva[पद्]; @deva[दन्त] → @deva[दत्]; @deva[नासिका] → @deva[नस्]; @deva[मास] → @deva[मास्]; @deva[हृदय] → @deva[हृद्]; @deva[निशा] → @deva[निश्]; @deva[असृज्] → @deva[असन्]; @deva[यूष] → @deva[यूषन्]; @deva[दोस्] → @deva[दोषन्]; @deva[यकृत्] → @deva[यकन्]; @deva[शकृत्] → @deva[शकन्]; @deva[उदक] → @deva[उदन्]; @deva[आस्य]/@deva[आसन] → @deva[आसन्] (@[kāśikā] vs. @[siddhānta] @[kaumudī] differ on original).
"""

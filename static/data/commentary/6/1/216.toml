id = "6.1.216"
numericId = "61216"

[en]
simple = """
The words @deva[त्याग] ('abandonment'), @deva[राग] ('color/passion'), @deva[हास] ('laughter'), @deva[कुह] ('where?'), @deva[श्वठ] ('deceitful'), and @deva[क्रथ] ('a name') may optionally have acute accent on the first syllable. So @deva[त्या꣡गः] or @deva[त्याग꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] for six words: @deva[त्याग], @deva[राग], @deva[हास], @deva[कुह], @deva[श्वठ], @deva[क्रथ]. Each can have first-syllable or default accent: @deva[त्या꣡ग/त्याग꣡], @deva[रा꣡ग/राग꣡], etc.
"""

advanced = """
The @deva[त्यागरागहासकुहश्वठक्रथानां वा] lists six forms with @deva[आद्युदात्त विकल्प]. The @deva[घञ्]-derivatives (@deva[त्याग], @deva[राग], @deva[हास]) and other forms (@deva[कुह], @deva[श्वठ], @deva[क्रथ]) all show optional first-syllable accent. This documents lexical accent variation without prescribing a single pattern.
"""

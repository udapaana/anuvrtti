id = "6.1.197"
numericId = "61197"

[en]
simple = """
Words formed with affixes having indicatory @deva[ञ्] or @deva[न्] always have acute accent on the first syllable. So @deva[गार्ग्य] (from @deva[यञ्]) is @deva[गा꣡र्ग्य], and @deva[राज्ञ] (from @deva[ल्युट्]) is @deva[रा꣡ज्ञ].
"""

standard = """
This @[sūtra] assigns mandatory @deva[आद्युदात्त] to @deva[ञित्] and @deva[नित्] formations. Examples: @deva[यञ्] (@ref[4.1.105]) → @deva[गा꣡र्ग्य]; @deva[ल्युट्] → @deva[रा꣡ज्ञ]; @deva[अण्] → @deva[औ꣡पगव]. The @deva[ञ्/न्] markers invariably produce first-syllable accent.
"""

advanced = """
The @deva[ञ्णिति नित्यम्] makes @deva[आद्युदात्त] obligatory for @deva[ञित्/नित्] affixes. This overrides any other accent rules. Patronymics with @deva[यञ्] (@deva[गा꣡र्ग्य]), agent nouns with @deva[ल्युट्] (@deva[रा꣡ज्ञ] 'kingship'), and @deva[अण्]-derivatives (@deva[औ꣡पगव]) all show first-syllable accent. The @deva[नित्यम्] ('always') indicates no optionality.
"""

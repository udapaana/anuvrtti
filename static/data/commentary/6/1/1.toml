id = "6.1.1"
numericId = "61001"

[en]
simple = """
This @deva[अधिकार] (governing rule) controls reduplication through @ref[6.1.12]. The first single-vowel portion (@deva[एकाच्]) of a verb is doubled. Example: @deva[पच्] → @deva[पपाच] (he cooked), @deva[जागृ] → @deva[जजागार] (he awoke).
"""

standard = """
This @deva[अधिकार] extends through @ref[6.1.12], governing reduplication rules. The terms @deva[एकाचः], @deva[द्वे], and @deva[प्रथमस्य] carry forward. The 'first @deva[एकाच्]' means the first portion containing a single vowel. For polysyllabic roots like @deva[जागृ], @deva[जा] is the @deva[प्रथम एकाच्]. For monosyllabic roots like @deva[पच्], the maxim @deva[व्यपदेशिवद्भाव] applies. Reduplication occurs with @deva[लिट्] (Perfect), @deva[सन्] (Desiderative), @deva[यङ्] (Intensive), @deva[श्लु]-class, and @deva[चङ्] (Aorist).
"""

advanced = """
This @deva[अधिकार] governs @ref[6.1.1]-@ref[6.1.12]. The @deva[द्वि] indicates actual repetition (@deva[पुनरुक्ति]), not substitution of two elements—compare @ref[8.1.1]. For monosyllabic roots, @deva[व्यपदेशिवद्भाव] (@ref[1.1.59]) applies: though no 'first' portion exists, the whole root reduplicates. Derivation: @deva[पच्] + @deva[णल्] → @deva[पच् पच्] + @deva[अ] → @deva[प पाच्] + @deva[अ] (@ref[7.4.59], @ref[7.4.60]) → @deva[पपाच]. The @deva[एकाच] is defined as that which consists of one @deva[अच्] (vowel).
"""

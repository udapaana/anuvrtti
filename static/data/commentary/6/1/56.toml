id = "6.1.56"
numericId = "61056"

[en]
simple = """
The causative of @deva[भी] (to fear) optionally substitutes @deva[आ] for its diphthong when the fear is caused directly by the causer (@deva[हेतु]). Example: @deva[मुण्डो भापयते] or @deva[भीषयते].
"""

standard = """
When the @deva[हेतु] (causer, @ref[1.4.54]-@ref[1.4.55]) directly causes fear (@deva[हेतुभय]), @deva[भी] optionally takes @deva[ए] → @deva[आ] in causative: @deva[मुण्डो भापयते] (@ref[7.3.36] for @deva[प्]) or @deva[भीषयते]. If fear is indirect: only @deva[भीषयते].
"""

advanced = """
The condition @deva[हेतुभये] means the @deva[स्वतन्त्र प्रयोजक] directly causes fear. @deva[भी भये] causative: @deva[भी] → @deva[भै] → optionally @deva[भा] + @deva[णि] → @deva[भापयते] (with @deva[पुक्]). Without @deva[आ]: @deva[भीषयते] (@deva[स्]-augment by @ref[7.3.36] option). Indirect fear (e.g., via lion): only @deva[भीषयते].
"""

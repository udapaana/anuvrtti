id = "6.1.38"
numericId = "61038"

[en]
simple = """
For the substitute root @deva[वय्] (from @deva[वे] by @ref[2.4.41]), the @deva[य्] is not vocalized in the Perfect. Examples: @deva[उवाय], @deva[ऊयतुः], @deva[ऊयुः].
"""

standard = """
The root @deva[वे] becomes @deva[वय्] by @ref[2.4.41]. In the Perfect, no @deva[संप्रसारण] of @deva[य्]: @deva[उवाय] (3rd singular), @deva[ऊयतुः] (3rd dual), @deva[ऊयुः] (3rd plural). The word @deva[लिट्] is used for subsequent @[sūtras]; this rule could function without it.
"""

advanced = """
The @deva[आदेश] @deva[वय्] (from @deva[वे] by @ref[2.4.41]) doesn't take @deva[संप्रसारण] in @deva[लिट्]. Derivation: @deva[वय्] + @deva[णल्] → @deva[ववय्] (reduplication) → @deva[उवय्] (@deva[व्]-@deva[संप्रसारण] of @deva[अभ्यास]) → @deva[उवाय] (@deva[गुण]). Weak forms: @deva[ऊयतुः] (the @deva[व्] of @deva[अभ्यास] vocalizes and lengthens). The term @deva[लिटि] serves @deva[अनुवृत्ति] for @ref[6.1.39]-@ref[6.1.40].
"""

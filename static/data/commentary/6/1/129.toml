id = "6.1.129"
numericId = "61129"

[en]
simple = """
Before the word @deva[इति] in the @deva[पदपाठ] (word-by-word Vedic recitation), a @deva[प्लुत] (prolonged) vowel is treated as a regular vowel. So @deva[इति] after @deva[आ३] allows normal sandhi rules.
"""

standard = """
In @deva[पदपाठ] tradition, @deva[इति] is added after significant units for clarity. This @[sūtra] specifies that before @deva[इति], a @deva[प्लुत] vowel loses its special @deva[प्रगृह्य]-like status and behaves as a regular (@deva[अप्लुत]) vowel. Thus normal sandhi can apply between the @deva[प्लुत] vowel and @deva[इति].
"""

advanced = """
The @deva[पदपाठ] is a recitation style that separates sandhi-ed words for pedagogical clarity. The term @deva[उपस्थित] refers to the presence or addition of @deva[इति] as a marker. The rule ensures that @deva[प्लुत] marking (used for calling/emphasis) doesn't block expected sandhi in this technical recitation context. This is a meta-grammatical rule about recitation practices.
"""

id = "6.1.80"
numericId = "61080"

[en]
simple = """
For root-final @deva[ओ]/@deva[औ], @deva[अव्]/@deva[आव्] substitution before @deva[य]-initial affixes applies only when that diphthong was itself caused by the affix. Example: @deva[लू] + @deva[यत्] → @deva[लो] + @deva[य] → @deva[लव्यम्] (but @deva[भो] + @deva[य] → @deva[भाव्यम्]).
"""

standard = """
For @deva[धातु]-final @deva[ओ]/@deva[औ] before @deva[य]-initial affixes, @deva[अव्]/@deva[आव्] substitution occurs only if the diphthong arose from that very affix (@deva[तन्निमित्त]). @deva[लू] + @deva[यत्] → @deva[लो] (@deva[गुण] by @ref[7.3.84]) + @deva[य] → @deva[लव्यम्] (affix caused the @deva[गुण]). But @deva[भू] → @deva[भो] + @deva[य] → @deva[भाव्यम्] (different derivation).
"""

advanced = """
The @deva[तन्निमित्त] condition: @deva[एच्] → @deva[अव्/आव्] before @deva[यादि प्रत्यय] only if that @deva[प्रत्यय] caused the @deva[एच्]. @deva[लू] + @deva[यत्] (@ref[3.1.97]): @deva[यत्] triggers @deva[गुण] (@ref[7.3.84]) → @deva[लो] + @deva[य] → @deva[लव्यम्]. Contrast @deva[भू]: @deva[भो] arises independently → @deva[भाव्यम्] (different analysis).
"""

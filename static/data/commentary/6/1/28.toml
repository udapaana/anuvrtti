id = "6.1.28"
numericId = "61028"

[en]
simple = """
@deva[पी] optionally substitutes for @deva[प्याय्] (to swell) before @deva[निष्ठा]. Examples: @deva[पीनं मुखम्] (swollen face), @deva[पीनौ बाहू] (swollen arms). The @deva[त] becomes @deva[न] by @ref[8.2.45].
"""

standard = """
The root @deva[ओप्यायी वृद्धौ] (@deva[भ्वादि]) takes @deva[पी] before @deva[निष्ठा]. The indicatory @deva[आ] of @deva[प्यायी] triggers @deva[त] → @deva[न] by @ref[8.2.45]: @deva[पीनम्], @deva[पीनवान्]. This is @deva[व्यवस्थितविभाषा]: without @deva[उपसर्ग], substitution is invariable; with @deva[उपसर्ग], it doesn't occur: @deva[प्रप्यानः], @deva[आप्यानः].
"""

advanced = """
This @deva[व्यवस्थितविभाषा] provides @deva[पी] for @deva[प्याय्] before @deva[निष्ठा]. The root @deva[ओप्यायी वृद्धौ] has @deva[आ] as @deva[इत्], triggering @ref[8.2.45] @deva[त] → @deva[न]: @deva[पीनम्]. The regulation: (1) without @deva[उपसर्ग]: @deva[पीनम्] invariably; (2) with @deva[उपसर्ग]: @deva[प्रप्यानः], @deva[आप्यानः]—no substitution. Examples: @deva[पीनं मुखम्], @deva[पीनौ बाहू], @deva[पीनसुरः] (constellation name).
"""

id = "6.1.191"
numericId = "61191"

[en]
simple = """
The word @deva[सर्व] ('all') has acute accent on the first syllable when case endings follow. So @deva[सर्वः], @deva[सर्वाः], @deva[सर्वे] are all accented @deva[स꣡र्वः], @deva[स꣡र्वाः], @deva[स꣡र्वे].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[सर्व] ('all') before @deva[सुप्] (case endings). The first syllable @deva[सर्] takes @deva[उदात्त]: @deva[स꣡र्वः], @deva[स꣡र्वाः], @deva[स꣡र्वे]. Without case endings (in compound first position), different accent may apply: @deva[सर्वतः] etc.
"""

advanced = """
The @deva[सुपि] condition restricts this to declined forms of @deva[सर्व]. The @deva[आद्युदात्त] applies: @deva[स꣡र्वः] (nom.), @deva[स꣡र्वम्] (acc.), etc. In @deva[समास] (compound) or @deva[तद्धित] contexts, @deva[सर्व] may show different accent: @deva[सर्वतः꣡] ('from all sides'). The @deva[सुपि] ensures this rule governs only case-inflected forms.
"""

id = "6.1.145"
numericId = "61145"

[en]
simple = """
The word @deva[गोष्पद] ('cow's footprint' or 'small puddle') is formed with @deva[सुट्]. It means either a place where cows walk (or don't walk), or a measure of quantity.
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[गोष्पद] in two senses: (1) a locality visited or not visited by cows (@deva[गावः पद्यन्ते/न पद्यन्ते]), (2) a measure of quantity (a cow's footprint as a unit). Example: @deva[गोष्पदो देशः] 'a place where cows tread'; @deva[गोष्पदं जलम्] 'water (filling) a cow's footprint = tiny amount'.
"""

advanced = """
The @deva[गो + पद] compound with @deva[सुट्] yields @deva[गोष्पद]. The dual meaning—spatial (cow-trodden area) and quantitative (small measure)—shows semantic extension from literal footprint to metonymic quantity. The form @deva[गोष्पद] is used idiomatically: @deva[गोष्पदे समुद्रः] 'an ocean in a cow's footprint' = something vast appearing tiny. The @deva[सुट्] here may be etymologically motivated rather than semantically conditioned.
"""

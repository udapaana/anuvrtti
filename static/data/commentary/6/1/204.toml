id = "6.1.204"
numericId = "61204"

[en]
simple = """
A word used to indicate similarity (comparison) has acute accent on the first syllable when it's a name. So @deva[चञ्चा] (a woman named after resemblance to something) is @deva[च꣡ञ्चा].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[उपमान] (comparison-based) words when they function as @deva[संज्ञा] (names). Examples: @deva[च꣡ञ्चा], @deva[व꣡घ्रिका], @deva[ख꣡रकुटी] (names derived from resemblance). The naming function triggers first-syllable accent.
"""

advanced = """
The @deva[उपमानं संज्ञायाम्] condition: when a comparative expression becomes a proper name, @deva[आद्युदात्त] applies. Names like @deva[च꣡ञ्चा] ('restless one'), @deva[व꣡घ्रिका] ('tiger-like'), @deva[ख꣡रकुटी] ('donkey-hipped') show this pattern. The @deva[उपमान] (standard of comparison) becoming @deva[संज्ञा] (proper noun) triggers the accent shift.
"""

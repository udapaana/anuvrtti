id = "6.1.182"
numericId = "61182"

[en]
simple = """
The accent rules from @ref[6.1.168] onward don't apply to @deva[गो] ('cow'), @deva[श्वन्] ('dog'), or words ending in them. They also don't apply to stems that have @deva[नुट्] or @deva[अट्] augments before their nominative singular ending.
"""

standard = """
This @[sūtra] creates exceptions to @ref[6.1.168]-@ref[6.1.181]. The @deva[गो], @deva[श्वन्], and @deva[तदन्त] (stems ending in these) don't follow those accent rules. Additionally, stems with @deva[नुट्] or @deva[अट्] augments before @deva[सु] (nom. sg.) are excepted—these have their own accent patterns.
"""

advanced = """
The @deva[गोश्वनि तदन्ते] exception removes @deva[गो], @deva[श्वन्], and their compounds from the @deva[तृतीयादि]-accent scope. The @deva[नुडटौ च सौ] condition excepts stems where @deva[नुट्] or @deva[अट्] intervenes before nominative @deva[सु]. These stems (like @deva[मघवन्], @deva[युवन्] with @deva[नुट्]) have independent accent rules. This @deva[अपवाद] (exception) prevents conflict with their established patterns.
"""

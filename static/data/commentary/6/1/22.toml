id = "6.1.22"
numericId = "61022"

[en]
simple = """
@deva[स्फी] substitutes for @deva[स्फाय्] (to swell) before @deva[निष्ठा] affixes (@deva[क्त], @deva[क्तवतु]). Examples: @deva[स्फीतः] (swollen), @deva[स्फीतवान्]. Not before other affixes: @deva[स्फातिः] (@deva[क्तिन्]).
"""

standard = """
The substitute @deva[स्फी] replaces @deva[स्फाय्] specifically before @deva[निष्ठा] (@deva[क्त], @deva[क्तवतु]): @deva[स्फीतः], @deva[स्फीतवान्]. Before @deva[क्तिन्]: @deva[स्फातिः] (no substitution). The term @deva[निष्ठायाम्] governs subsequent @[sūtras] through @ref[6.1.29]. The feminine @deva[स्फाती भवति] uses @deva[स्फाति] + @deva[ङीप्].
"""

advanced = """
This @[sūtra] introduces the @deva[निष्ठायाम्] @deva[अधिकार] extending through @ref[6.1.29]. The @deva[आदेश] @deva[स्फी] applies only before @deva[निष्ठा] (= @deva[क्त]/@deva[क्तवतु]): @deva[स्फीतः], @deva[स्फीतवान्]. Other @deva[कृत्] affixes get the base form: @deva[स्फातिः] (@deva[क्तिन्]), @deva[स्फायितुम्] (@deva[तुमुन्]). The @deva[आ] in @deva[स्फाय्] blocks @deva[संप्रसारण]; this @deva[आदेश] provides the @deva[ई]-form directly.
"""

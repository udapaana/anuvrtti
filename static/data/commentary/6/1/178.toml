id = "6.1.178"
numericId = "61178"

[en]
simple = """
In Vedic literature, the genitive plural ending @deva[नाम्] shows varied accent after stems with feminine @deva[ई]. So @deva[अभिभञ्जतीनाम्] ('of those who break') shows @deva[अभिभञ्जतीना꣡म्] with accent on the ending.
"""

standard = """
This @[sūtra] provides Vedic accent variation for @deva[नाम्] after @deva[ङीप्]-final (feminine @deva[ई]) stems. The @deva[विभाषा] ('diversely') indicates multiple patterns exist in Vedic texts. Examples: @deva[अभिभञ्जतीना꣡म्], @deva[बह्वीना꣡म्] with accented endings.
"""

advanced = """
The @deva[छन्दसि विभाषा] indicates Vedic variation for @deva[ङीबन्त] (feminine @deva[ई]-stem) + @deva[आम्]. The attested forms show accent fluctuation: some texts preserve stem accent, others show ending accent. @deva[देवसमानाम् अभिभञ्जतीना꣡म्] illustrates the accented-ending pattern. This documents Vedic recension differences rather than prescribing a single form.
"""

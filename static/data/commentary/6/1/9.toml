id = "6.1.9"
numericId = "61009"

[en]
simple = """
When @deva[सन्] (Desiderative) or @deva[यङ्] (Intensive) affixes follow, a root that is not already reduplicated undergoes reduplication. Examples: @deva[पच्] + @deva[सन्] → @deva[पिपक्षति]; @deva[पच्] + @deva[यङ्] → @deva[पापच्यते].
"""

standard = """
The genitive @deva[सन् यङोः] means 'of a root ending in @deva[सन्] or @deva[यङ्]'. @deva[सनन्त] examples: @deva[पिपक्षति] (@ref[7.4.79]), @deva[पिपतिषति], @deva[अरिरिषति], @deva[उन्दिदिषति]. @deva[यङन्त] examples: @deva[पापच्यते] (@ref[7.4.83]), @deva[अटाट्यते], @deva[यायज्यते], @deva[अरार्यते]. Already-reduplicated roots don't re-reduplicate: @deva[जुगुप्सते] (from @deva[जुगुप्स्], already @deva[सन्]-formed), @deva[लोलूयिषते] (from Intensive @deva[लोलूय]).
"""

advanced = """
The @deva[सन् यङोः] is @deva[षष्ठी द्विवचन] (genitive dual), not @deva[सप्तमी]. Locative would mean 'when @deva[सन्]/@deva[यङ्] follow', which would exclude @deva[इट्]-augment from reduplication: @deva[अटिटिषति], @deva[अशिशिषति]. With genitive: the entire @deva[सनन्त]/@deva[यङन्त] @deva[अङ्ग] reduplicates. @deva[यङन्त] forms: @deva[पापच्यते], @deva[अटाट्यते], @deva[यायज्यते], @deva[अरार्यते], @deva[प्रोर्णोनूयते]. @deva[स्वार्थिक सन्] forms (@ref[3.1.5]) like @deva[जुगुप्स्] are already @deva[अभ्यस्त], so no re-reduplication: @deva[जुगुप्सते].
"""

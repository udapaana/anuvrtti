id = "6.1.168"
numericId = "61168"

[en]
simple = """
When a stem is monosyllabic in the locative plural, the @deva[तृतीया] (instrumental) case ending and all case endings after it (@deva[तृतीया] (instrumental), dative, ablative, genitive, locative) receive acute accent. So for @deva[राज्] ('king'), which is one syllable in @deva[राजसु], the case endings are accented.
"""

standard = """
This @[sūtra] assigns @deva[उदात्त] to case endings from instrumental onwards (@deva[तृतीयादि]) when the stem is monosyllabic in locative plural (@deva[सौ एकाच्]). The locative plural serves as the test form. For @deva[राज्]: @deva[राजसु] is monosyllabic stem + @deva[सु], so @deva[राज्ञा꣡], @deva[राज्ञे꣡], etc. have accented endings.
"""

advanced = """
The @deva[सौ एकाच्] condition uses locative plural as the diagnostic: if the stem appears monosyllabic there, the @deva[तृतीयादि] (@deva[भिस् ङे आम् ङसि सुप्]) endings take @deva[उदात्त]. The @deva[सु] in @deva[सौ] is locative plural @deva[सुप्]. This affects consonant-final monosyllables like @deva[राज्], @deva[वाच्], @deva[त्वच्] where @deva[सम्प्रसारण] doesn't add syllables.
"""

id = "6.1.137"
numericId = "61137"

[en]
simple = """
The @deva[सुट्] augment is added when @deva[सम्], @deva[परि], or @deva[उप] precede the verb @deva[कृ] and the meaning is 'to adorn/ornament'. So 'to adorn' with @deva[सम् + कृ] = @deva[संस्कृ] (as in @deva[संस्कर्ता] 'one who adorns').
"""

standard = """
This @[sūtra] conditions @deva[सुट्] on semantic grounds: when @deva[सम्], @deva[परि], or @deva[उप] + @deva[कृ] means 'to ornament/adorn' (@deva[अलङ्कारार्थ]), @deva[सुट्] is added. Examples: @deva[संस्कर्ता] ('adorner'), @deva[संस्कृतम्] ('adorned/refined'), @deva[परिष्कारः] ('ornamentation'). Without the 'adornment' sense, @deva[सुट्] may not apply.
"""

advanced = """
The semantic restriction (@deva[अलङ्कारे]) creates meaning-dependent morphology. The same verb-preverb combination may or may not take @deva[सुट्] based on intended meaning. @deva[संस्कृत] ('refined/perfected') and @deva[संस्कार] ('refinement/sacrament') both derive from this adorning sense. The @deva[सम्], @deva[परि], @deva[उप] preverbs each contribute nuances: @deva[सम्] (complete), @deva[परि] (around), @deva[उप] (near). This explains @deva[संस्कृत] as 'completely refined'.
"""

id = "6.1.103"
numericId = "61103"

[en]
simple = """
After @deva[पूर्वरूप दीर्घ] (from @ref[6.1.102]), @deva[न्] substitutes for @deva[स्] of accusative @deva[शस्] in masculine. Examples: @deva[वृक्ष] + @deva[शस्] → @deva[वृक्षान्]; @deva[अग्नि] + @deva[शस्] → @deva[अग्नीन्].
"""

standard = """
Following @ref[6.1.102] @deva[पूर्वरूप], @deva[स्] of @deva[शस्] (acc. pl.) becomes @deva[न्] in masculine: @deva[वृक्ष + शस्] → @deva[वृक्ष + अस्] → @deva[वृक्षान्]; @deva[अग्नि + शस्] → @deva[अग्नीन्]; @deva[वायु + शस्] → @deva[वायून्]; @deva[कर्तृ + शस्] → @deva[कर्तॄन्]. Masculine only—feminine @deva[चञ्चाः] (formed by @deva[कन्]-elision @ref[5.3.98]) retains form.
"""

advanced = """
This @deva[णत्व] (@deva[स् → न्]) follows @ref[6.1.102] @deva[पूर्वसवर्णदीर्घ]. Condition: @deva[पुंसि] (masculine). @deva[वृक्ष + शस्] → @deva[वृक्षा + स्] (@ref[6.1.102]) → @deva[वृक्षान्] (@deva[स् → न्]). Examples: @deva[वृक्षान्], @deva[अग्नीन्], @deva[वायून्], @deva[कर्तॄन्], @deva[होतॄन्]. @deva[चञ्चा] (potentially masculine/feminine by @ref[5.3.98]) retains feminine form even for males.
"""

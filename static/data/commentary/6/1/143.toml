id = "6.1.143"
numericId = "61143"

[en]
simple = """
The word @deva[कुस्तुम्बुरु] (a type of herb, coriander) is irregularly formed with the @deva[सुट्] augment. This is a listed exception, not derived by regular rules.
"""

standard = """
This @[sūtra] lists @deva[कुस्तुम्बुरु] as a @deva[निपातन] (irregular formation) with @deva[सुट्]. The word refers to @deva[धान्यक] (coriander). The @deva[सुट्] in this word is exceptional—it doesn't follow the semantic conditions of previous @[sūtras]. The form is simply listed as containing @deva[सुट्].
"""

advanced = """
The @deva[निपातन] status indicates that @deva[कुस्तुम्बुरु] cannot be derived through productive rules; it must be memorized. The word likely entered Sanskrit from a regional or non-Indo-Aryan source, with the @deva[स्] interpreted as @deva[सुट्] by @[pāṇinian] analysis. The identification with @deva[धान्यक] (coriander, Coriandrum sativum) provides the botanical reference.
"""

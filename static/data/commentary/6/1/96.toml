id = "6.1.96"
numericId = "61096"

[en]
simple = """
For non-@deva[पद]-final @deva[अ/आ] + @deva[उ] of the tense-affix @deva[उस्], @deva[पररूप] (@deva[उ]) is the substitute. Examples: @deva[भिन्द्या] + @deva[उस्] → @deva[भिन्द्युः]; @deva[अदा] + @deva[उस्] → @deva[अदुः].
"""

standard = """
When @deva[अ/आ] (not @deva[पदान्त]) precedes @deva[उ] of @deva[उस्]-affix (3rd plural), @deva[पररूप] (@deva[उ]) replaces both: @deva[भिन्द्या + उस्] → @deva[भिन्द्युः] (Potential); @deva[छिन्द्या + उस्] → @deva[छिन्द्युः]; @deva[अदा + उस्] → @deva[अदुः] (Imperfect of @deva[दा]). This overrides @deva[गुण] (@ref[6.1.87]).
"""

advanced = """
@deva[आत्] understood; @deva[अपदान्त] condition. @deva[उस्] = 3rd plural (@deva[झि]-substitute in certain tenses). @deva[भिन्द् + यासुट् + झि] → @deva[भिन्द्यास् + उस्] → @deva[भिन्द्या + उस्] → @deva[भिन्द्युः] (@deva[पररूप]). @deva[लङ्] of @deva[दा]: @deva[अ + दा + उस्] → @deva[अदुः]. Overrides @ref[6.1.87] @deva[गुण ओ].
"""

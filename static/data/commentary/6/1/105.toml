id = "6.1.105"
numericId = "61105"

[en]
simple = """
@deva[पूर्वरूप दीर्घ] (@ref[6.1.102]) doesn't apply when a long vowel is followed by @deva[इच्]-initial nom./acc. endings or by @deva[अस्] (nom. pl.). Examples: @deva[कुमार्यौ], @deva[कुमार्यः].
"""

standard = """
When @deva[दीर्घ]-final stems precede @deva[इच्]-initial @deva[प्रथमा/द्वितीया] endings or @deva[अस्] (nom. pl.), @ref[6.1.102] doesn't apply: @deva[कुमारी + औ] → @deva[कुमार्यौ] (@deva[ई] → @deva[य्] by @ref[6.1.77]); @deva[कुमारी + अस्] → @deva[कुमार्यः]; @deva[ब्रह्मबन्धू + औ] → @deva[ब्रह्मबन्ध्वौ]; @deva[ब्रह्मबन्धू + अस्] → @deva[ब्रह्मबन्ध्वः].
"""

advanced = """
This @deva[प्रतिषेध] for @deva[दीर्घ + इच् (सुपि)] or @deva[दीर्घ + अस् (जस्)]. @deva[कुमारी + औ] → @deva[कुमार्य् + औ] (@ref[6.1.77]) → @deva[कुमार्यौ]; @deva[कुमारी + अस्] → @deva[कुमार्यः]. @deva[ब्रह्मबन्धु + औ] → @deva[ब्रह्मबन्ध्वौ]. @ref[6.1.102] blocked because @deva[इच्] follows or @deva[जस्] follows @deva[दीर्घ].
"""

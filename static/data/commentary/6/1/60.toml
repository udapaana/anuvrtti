id = "6.1.60"
numericId = "61060"

[en]
simple = """
The word @deva[शीर्षन्] (head) occurs in Vedic. Examples: @deva[शीर्ष्णा हि तत्र सोमं क्रीतं हरन्ति]; @deva[यत्ते शीर्ष्णो दौर्भाग्यम्].
"""

standard = """
In @deva[छन्दस्], @deva[शीर्षन्] is used as another form of @deva[शिरस्] (head)—not a substitute but an alternative form, since both occur in Vedas. Vedic: @deva[शीर्ष्णा], @deva[शीर्ष्णः]. In @deva[भाषा]: only @deva[शिरः].
"""

advanced = """
This @deva[निपातन] teaches @deva[शीर्षन्] as @deva[छान्दस] for @deva[शिरस्]. Both forms coexist in Veda: @deva[शीर्ष्णा हि तत्र सोमं क्रीतं हरन्ति]; @deva[यत्ते शीर्ष्णो दौर्भाग्यम्]. It's not an @deva[आदेश] since both appear. In @deva[लौकिक]: only @deva[शिरः] (neuter @deva[असन्त]).
"""

id = "6.1.33"
numericId = "61033"

[en]
simple = """
For @deva[ह्वा], @deva[संप्रसारण] occurs in both syllables of the @deva[अभ्यस्त] (reduplicated form). Examples: Perfect @deva[जुहाव]; Intensive @deva[जोहूयते]; Desiderative @deva[जुहूषति].
"""

standard = """
The term @deva[अभ्यस्त] means both the @deva[अभ्यास] and the @deva[अभ्यस्यमान] (reduplicate and reduplicated). @deva[संप्रसारण] occurs before reduplication: @deva[ह्वा] → @deva[हु] → @deva[जुहु] → @deva[जुहाव] (Perfect), @deva[जोहूयते] (Intensive), @deva[जुहूषति] (Desiderative). This and @ref[6.1.32] were originally one @[sūtra].
"""

advanced = """
The @deva[अभ्यस्त] here = @deva[अभ्यासः अभ्यस्यमानं च]. @deva[संप्रसारण] applies pre-reduplication: @deva[ह्वा] → @deva[हु] → reduplication → @deva[जुहु] (@deva[ह] → @deva[ज] by @ref[7.4.62]) → @deva[जुहाव] (@deva[गुण], Perfect). Intensive: @deva[जोहूयते]. Desiderative: @deva[जुहूषति]. The division from @ref[6.1.32] follows @[vārtika]: @deva[ह्वाविर्भावार्थमस्य वैयात्याख्यानम्].
"""

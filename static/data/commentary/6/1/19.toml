id = "6.1.19"
numericId = "61019"

[en]
simple = """
The roots @deva[स्वप्], @deva[स्यम्], and @deva[व्ये] undergo @deva[संप्रसारण] before @deva[यङ्] (Intensive). Examples: @deva[सोषुप्यते] (sleeps intensely); @deva[सेसिम्यते]; @deva[वेवीयते].
"""

standard = """
These three roots take @deva[संप्रसारण] specifically before @deva[यङ्]: @deva[स्वप्] → @deva[सुप्] → @deva[सोषुप्यते]; @deva[स्यम्] → @deva[सिम्] → @deva[सेसिम्यते]; @deva[व्ये] → @deva[वि] → @deva[वेवीयते] (@deva[इ] lengthened by @ref[7.4.25]). Not before other affixes: @deva[स्वप्नक्] (formed by @deva[नजिङ्] @ref[3.2.172])—no @deva[संप्रसारण].
"""

advanced = """
This @[sūtra] provides @deva[यङि संप्रसारण] for @deva[स्वप्]/@deva[स्यम्]/@deva[व्ये]. Derivations: @deva[स्वप्] → @deva[सुप्] → @deva[सुप् सुप्] → @deva[सोषुप्] (@deva[गुण], @deva[ष्] by @ref[8.3.59]) + @deva[य] → @deva[सोषुप्यते]; @deva[स्यम्] → @deva[सिम्] → @deva[सेसिम्यते]; @deva[व्ये] → @deva[वि] → @deva[वेवि] → @deva[वेवीयते] (@ref[7.4.25] lengthens @deva[इ]). The restriction @deva[यङि] excludes @deva[स्वप्नक्] etc.
"""

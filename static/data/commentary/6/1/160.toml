id = "6.1.160"
numericId = "61160"

[en]
simple = """
The words @deva[उञ्छ] ('gleaning'), @deva[म्लेच्छ] ('barbarian'), @deva[जञ्ज] (a type of fighting), and @deva[जल्प] ('chatter') have acute accent on the final syllable, even though @deva[घञ्]-formations usually don't.
"""

standard = """
This @[sūtra] lists @deva[उञ्छादि] words with final @deva[उदात्त] despite being @deva[घञ्] formations. The list: @deva[उञ्छः꣡] ('gleaning grain'), @deva[म्लेच्छः꣡] ('foreigner/barbarian'), @deva[जञ्जः꣡] ('mutual fighting'), @deva[जल्पः꣡] ('idle talk'). These would normally take initial accent by @deva[घञ्] but are listed exceptions.
"""

advanced = """
The @deva[आदि] indicates a @deva[गण] of @deva[घञ्] derivatives with @deva[अन्तोदात्त] that don't fit @ref[6.1.159]'s conditions (no @deva[कृष्] or @deva[आ]). These are @deva[निपातन] (listed forms) whose accent must be memorized. The @deva[घञ्] affix typically yields @deva[आद्युदात्त]; these exceptions show lexical accent variation requiring enumeration.
"""

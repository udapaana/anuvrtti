id = "6.1.50"
numericId = "61050"

[en]
simple = """
The roots @deva[मी] (to hurt), @deva[मि] (to scatter), and @deva[दी] (to decay) substitute @deva[आ] before @deva[ल्यप्] and before affixes that demand diphthong-@deva[आ] substitution. Examples: @deva[प्रमाय], @deva[निमाय], @deva[उपदाय], @deva[प्रमातुम्].
"""

standard = """
These roots take @deva[आ] for their final: (1) before @deva[ल्यप्]: @deva[प्रमाय], @deva[निमाय], @deva[उपदाय]; (2) before @deva[अशित्] affixes demanding @deva[एच् → आ]: @deva[प्रमातुम्], @deva[प्रमातव्यम्], @deva[निमाता]. The @deva[च] indicates the substitution applies at @deva[उपदेश] stage—these roots are treated as @deva[आकारान्त].
"""

advanced = """
The @deva[च] extends @deva[आ]-substitution beyond @deva[ल्यप्] to all @deva[अशित्] affixes triggering @ref[6.1.45]. The substitution is @deva[उपदेशावस्थायाम्]—these roots function as if listed with @deva[आ]: @deva[मा], @deva[मा], @deva[दा]. Thus all @deva[आकारान्त] rules apply: @deva[प्रमाय], @deva[प्रमातुम्], @deva[प्रमातव्यम्], @deva[निमाता], @deva[उपदाता].
"""

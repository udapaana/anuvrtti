id = "6.1.12"
numericId = "61012"

[en]
simple = """
The participles @deva[दाश्वान्], @deva[साह्वान्], and @deva[मीढ्वान्] are irregular—they don't undergo reduplication and don't take the @deva[इट्] augment. Examples: @deva[दाश्वांसो दाशुषः सुतम्] (RV); @deva[साह्वान् बलाहकः].
"""

standard = """
Three irregular @deva[क्वसु]-participles (@ref[3.2.107]): @deva[दाश्वान्] (from @deva[दाशृ] 'give')—no @deva[द्वित्व], no @deva[इट्]; @deva[साह्वान्] (from @deva[सह्] 'endure')—penultimate lengthening, no @deva[द्वित्व], no @deva[इट्]; @deva[मीढ्वान्] (from @deva[मिह्] 'sprinkle')—penultimate lengthening, @deva[ह] → @deva[ढ], no @deva[द्वित्व], no @deva[इट्]. @[vārtika]: @deva[कृ]/@deva[क्लिद्] + @deva[क] reduplicate: @deva[चक्रम्], @deva[चिक्लिदम्]. @[vārtika]: @deva[चर्]/@deva[चल्]/@deva[पत्]/@deva[वद्] + @deva[अच्] with @deva[आक्] augment: @deva[चराचरः], @deva[पतापतः].
"""

advanced = """
These three @deva[क्वसु]-forms are @deva[निपातन]: @deva[दाश्वान्] (no @deva[द्वित्व]/@deva[इट्]), @deva[साह्वान्] (@deva[उपधादीर्घ], no @deva[द्वित्व]/@deva[इट्]), @deva[मीढ्वान्] (@deva[उपधादीर्घ], @deva[ह] → @deva[ढ], no @deva[द्वित्व]/@deva[इट्]). Plural @deva[दाश्वांसः] also lacks @deva[द्वित्व]. @[vārtika] @deva[कृञादीनां क]: @deva[चक्रम्], @deva[चिक्लिदम्] (@deva[घञ्]-sense). @[vārtika] @deva[चरादेः अच्] with @deva[आक्]-augment, non-elision of @deva[अभ्यास]-final consonant: @deva[चराचरः], @deva[चलाचलः], @deva[पतापतः], @deva[वदावदः]. Optionally: @deva[चरः पुरुषः]. @[vārtika] @deva[हन् + अच्]: @deva[घ]-substitute + @deva[आक्] = @deva[घनाघनः] (@ref[7.3.55]).
"""

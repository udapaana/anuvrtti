id = "6.1.223"
numericId = "61223"

[en]
simple = """
A compound word has acute accent on the last syllable. So @deva[राजपुरुषः] ('king's man') is accented @deva[राजपुरुष꣡ः] with final accent. This is the general rule for compound accent.
"""

standard = """
This @[sūtra] establishes @deva[अन्तोदात्त] as the default for @deva[समास] (compounds). Examples: @deva[राजपुरुष꣡ः], @deva[ब्राह्मणकम्बल꣡ः], @deva[कन्याखन꣡ः]. The final syllable of the compound takes @deva[उदात्त]. This is the basic compound accent rule, with many exceptions in previous @[sūtras].
"""

advanced = """
The @deva[समासस्य अन्तोदात्तः] is the default compound accent rule, applying when no specific exception applies. All compound types (@deva[तत्पुरुष], @deva[बहुव्रीहि], @deva[द्वन्द्व], @deva[अव्ययीभाव]) default to @deva[अन्तोदात्त]: @deva[राजपुरुष꣡ः], @deva[ब्राह्मणकम्बल꣡ः], @deva[राजदृष꣡त्]. This final @[sūtra] of @[pāda] 6.1 establishes the compound accent baseline that pervades Sanskrit nominal morphology.
"""

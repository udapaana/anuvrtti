id = "6.1.24"
numericId = "61024"

[en]
simple = """
The root @deva[श्याय्] (to coagulate) undergoes @deva[संप्रसारण] before @deva[निष्ठा] when meaning 'coagulation' or 'cold'. Examples: @deva[शीनं घृतम्] (coagulated ghee); @deva[शीतं वर्तते] (it is cold).
"""

standard = """
The root @deva[श्यै गतौ] takes @deva[संप्रसारण] before @deva[निष्ठा] specifically in these meanings. For 'coagulation' (@deva[द्रवमूर्त्ति]): @deva[शीनं घृतम्], @deva[शीना वसा], @deva[शीनं मेदः]—the @deva[त] becomes @deva[न] by @ref[8.2.47]. For 'cold' (@deva[शिशिरस्पर्श]): @deva[शीतं वर्तते], @deva[शीतो वायुः], @deva[शीतमुदकम्]—@deva[त] is retained.
"""

advanced = """
This @[sūtra] restricts @deva[संप्रसारण] of @deva[श्यै] to @deva[निष्ठा] with meanings @deva[द्रवमूर्त्ति] (solidification of liquid) or @deva[शिशिरस्पर्श] (cold touch). Derivation: @deva[श्या] + @deva[त] → @deva[शि] + @deva[त] → @deva[शीत] (@ref[6.4.2]). For coagulation: @deva[त] → @deva[न] by @ref[8.2.47]: @deva[शीनम्]. For cold: @deva[शीतम्]. The word @deva[शीत] 'cold' is derived here. Other meanings of @deva[श्यै] don't trigger @deva[संप्रसारण] before @deva[निष्ठा].
"""

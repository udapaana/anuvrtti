id = "6.1.53"
numericId = "61053"

[en]
simple = """
The root @deva[गुर्] (to exert) optionally substitutes @deva[आ] for its diphthong when preceded by @deva[अप] and taking @deva[णमुल्]. Examples: @deva[अपगारमपगारम्] or @deva[अपगोरमपगोरम्].
"""

standard = """
With @deva[अप] prefix, @deva[गुर्] + @deva[णमुल्] (@ref[3.4.22], reduplicated absolutive) optionally takes @deva[ओ] → @deva[आ]: @deva[अपगारमपगारम्] or @deva[अपगोरमपगोरम्]. Also by @ref[3.4.53]: @deva[अस्यपगारं युध्यन्ते] or @deva[अस्यपगोरं युध्यन्ते] (fighting with raised swords).
"""

advanced = """
This @deva[विभाषा] applies to @deva[अप] + @deva[गुर् उद्यमने] + @deva[णमुल्]. @deva[णमुल्] forms are repeated (@ref[3.4.22]). Process: @deva[गुर्] → @deva[गोर्] (@deva[गुण]) → optionally @deva[गार्] + @deva[अम्] → @deva[अपगारम्]. With @ref[3.4.53]: @deva[अस्यपगारं युध्यन्ते] 'they fight with raised swords'.
"""

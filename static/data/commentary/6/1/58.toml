id = "6.1.58"
numericId = "61058"

[en]
simple = """
The roots @deva[सृज्] (to create) and @deva[दृश्] (to see) take @deva[अम्]-augment after @deva[ऋ] before @deva[झल्] (mute/sibilant) affixes that are not @deva[कित्]. Examples: @deva[स्रष्टा], @deva[स्रष्टुम्], @deva[द्रष्टा], @deva[द्रष्टुम्].
"""

standard = """
The @deva[अम्]-augment (@deva[अ]) is added after @deva[ऋ] of @deva[सृज्]/@deva[दृश्] before @deva[झलादि अकित्] affixes: @deva[सृज्] + @deva[तृन्] → @deva[सृ] + @deva[अ] + @deva[ज्] + @deva[तृ] → @deva[स्रष्टृ] → @deva[स्रष्टा]. Similarly @deva[स्रष्टुम्], @deva[स्रष्टव्यम्], @deva[द्रष्टा], @deva[द्रष्टुम्], @deva[द्रष्टव्यम्]. This blocks @deva[गुण] (@ref[7.3.86]). Before @deva[कित्]: @deva[अस्राक्षीत्], @deva[अद्राक्षीत्].
"""

advanced = """
This @deva[आगम] teaches @deva[अम्] for @deva[सृज्]/@deva[दृश्] before @deva[झलादि अकित्]. Process: @deva[सृज्] + @deva[तृच्] → @deva[सृअज्] + @deva[तृ] (@deva[अम्]-augment) → @deva[स्रज्तृ] → @deva[स्रष्टृ] (@deva[ज् + त् → ष्ट्]). The @deva[अम्] prevents @deva[गुण] (@ref[7.3.86]). @deva[कित्] condition excludes @deva[लुङ्] (@deva[अस्राक्षीत्]) where @deva[सिच्] is @deva[कित्] by @ref[1.2.1].
"""

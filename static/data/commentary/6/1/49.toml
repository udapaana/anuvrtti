id = "6.1.49"
numericId = "61049"

[en]
simple = """
The causative of @deva[सिध्] (to accomplish) substitutes @deva[आ] for its diphthong when not referring to spiritual/otherworldly matters. Examples: @deva[अन्नं साधयति] (he prepares food); @deva[ग्रामं साधयति].
"""

standard = """
For @deva[णिजन्त सिध्], @deva[ए] → @deva[आ] applies when the meaning doesn't concern @deva[परलोक] (next world). Thus @deva[साधयति] for worldly accomplishment: @deva[अन्नं साधयति], @deva[ग्रामं साधयति]. For spiritual perfection: @deva[तपः तापसं सेधयति] (not @deva[साधयति]).
"""

advanced = """
The condition @deva[अपारलौकिके] (not pertaining to @deva[परलोक]) restricts this @deva[आदेश]. @deva[पारलौकिक] is derived by @deva[ठञ्] (@ref[5.1.109]) with double @deva[वृद्धि] (@ref[7.3.20]). When the @deva[सिध्]-meaning concerns @deva[अज्ञान] (non-sentient) objects: @deva[साधयति]. For spiritual siddhi: @deva[सेधयति] (standard causative without @deva[आ]).
"""

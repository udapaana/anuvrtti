id = "6.1.95"
numericId = "61095"

[en]
simple = """
For @deva[अ/आ] + @deva[ओ] of @deva[ओम्], or @deva[आ] (prefix @deva[आङ्]) + vowel, @deva[पररूप] is the substitute. Examples: @deva[का] + @deva[ओम्] → @deva[कोम्]; @deva[आ] + @deva[ऊढा] → @deva[ओढा] → @deva[अद्योढा].
"""

standard = """
Two cases: (1) @deva[अत्/आत्] + @deva[ओम्] → @deva[पररूप]: @deva[का + ओम्] → @deva[कोम्]; @deva[या + ओम्] → @deva[योम्] (@deva[कोमित्यवोचत्]). (2) @deva[आङ्] + vowel → @deva[पररूप]: @deva[आ + ऊढा] → @deva[ओढा] → @deva[अद्योढा], @deva[कदोढा], @deva[तदोढा]; @deva[आ + ऋश्यात्] → @deva[अर्श्यात्] → @deva[अद्यर्श्यात्].
"""

advanced = """
This @deva[पररूप] applies to: (1) @deva[अत् + ओम्] (the sacred syllable): @deva[कोम्], @deva[योम्]; (2) @deva[आङ्] (prefix @deva[आ]) + any vowel. For @deva[आङ्]: @deva[आ + ऊढा] → @deva[ओढा] (compound with @deva[अद्य] → @deva[अद्योढा]); @deva[आ + ऋश्यात्] → @deva[अर्श्यात्]. This supersedes both @deva[गुण] (@ref[6.1.87]) and @deva[वृद्धि] (@ref[6.1.88]).
"""

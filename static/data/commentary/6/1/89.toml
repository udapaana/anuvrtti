id = "6.1.89"
numericId = "61089"

[en]
simple = """
@deva[वृद्धि] is the substitute for @deva[अ/आ] + @deva[ए] of @deva[एति] (from @deva[इ] 'go') and @deva[एधति] (from @deva[एध्] 'prosper'), and for @deva[अ/आ] + @deva[ऊ] of @deva[ऊठ्] (substitute of @deva[वह्] by @ref[6.4.132]).
"""

standard = """
Special @deva[वृद्धि] cases: (1) @deva[इ गतौ] → @deva[एति]: when @deva[अ/आ] precedes, @deva[वृद्धि] applies: @deva[उप] + @deva[एति] → @deva[उपैति]; (2) @deva[एध् वृद्धौ]: @deva[प्र] + @deva[एधते] → @deva[प्रैधते]; (3) @deva[ऊठ्] (from @deva[वह्] by @ref[6.4.132]): @deva[प्र] + @deva[ऊढ] → @deva[प्रौढ]. The @deva[एच्] in @ref[6.1.88] applies to internally-changed @deva[इ] → @deva[ए].
"""

advanced = """
This @deva[वृद्धि] rule for specific forms: (1) @deva[इण् गतौ] → @deva[एति] (internal @deva[गुण]): @deva[उपैति], @deva[अध्यैति]; (2) @deva[एधृ वृद्धौ] (inherently @deva[ए]-initial): @deva[प्रैधते]; (3) @deva[वह्] → @deva[ऊठ्] (@ref[6.4.132]): @deva[प्र + ऊढ] → @deva[प्रौढः]. The @deva[एच्] of @ref[6.1.88] qualifies @deva[इ] in @deva[एति] (when @deva[गुण]-transformed).
"""

id = "6.1.120"
numericId = "61120"

[en]
simple = """
In the Yajurveda, when an @deva[अनुदात्त] (unaccented) @deva[अ] is followed by a guttural (@deva[क]-class) or @deva[ध], the preceding @deva[ए/ओ] and this @deva[अ] both retain their forms. So in certain accented passages, hiatus is preserved.
"""

standard = """
This @[sūtra] provides another Yajurveda @deva[प्रकृतिभाव] rule: when an @deva[अनुदात्त] (low-toned) @deva[अ] is followed by a guttural consonant (@deva[क्]-@deva[ङ्]) or @deva[ध्], the preceding @deva[ए/ओ] and this @deva[अ] retain original forms. The accentual condition (@deva[अनुदात्त]) ties this to specific Vedic tonal contexts.
"""

advanced = """
The specification @deva[कवर्गे धकारे च] indicates gutturals and specifically @deva[ध्] (not all dentals). The @deva[अनुदात्त] condition connects sandhi behavior to Vedic accent—a phonological feature absent in Classical Sanskrit. This rule reflects the interaction between tonal patterns and sandhi in Vedic recitation. The @deva[प्रकृतिभाव] preserves both segments, maintaining hiatus in metrically or tonally significant positions.
"""

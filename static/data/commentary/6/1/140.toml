id = "6.1.140"
numericId = "61140"

[en]
simple = """
The @deva[सुट्] augment is added when @deva[उप + कृ] means 'to cut' or 'to split'. So @deva[उपस्कारम् लुनन्ति] means 'they cut the @deva[उपस्कार]' (a part of something being split).
"""

standard = """
This @[sūtra] provides @deva[सुट्] for @deva[उप + कृ] in the sense of 'cutting' or 'splitting' (@deva[पाटन]). The @deva[उपस्कार] here refers to something being cut off or separated. Example: @deva[उपस्कारं मद्रका लुनन्ति] 'the Madrakas cut the @deva[उपस्कार]'.
"""

advanced = """
The 'cutting' sense represents a semantic extension where @deva[उप] (near/subsidiary) + @deva[कृ] (make) yields 'to make a separation' or 'cut off'. This is one of several specialized meanings for @deva[उप + कृ] that receive @deva[सुट्]. The @deva[मद्रक] reference (people of the Madra region) suggests this usage was associated with regional or technical vocabulary.
"""

id = "6.1.199"
numericId = "61199"

[en]
simple = """
The words @deva[पथिन्] ('path') and @deva[मथिन्] ('churner') have acute accent on the first syllable when strong case endings (@deva[सर्वनामस्थान]) follow. So @deva[प꣡न्थाः] (nom. sg.) has initial accent.
"""

standard = """
This @[sūtra] provides @deva[आद्युदात्त] for @deva[पथिन्] and @deva[मथिन्] before @deva[सर्वनामस्थान] (strong) case endings. These stems (formed with @deva[इनि] @[uṇādi] affix) take first-syllable accent in nominative, accusative, and vocative. Example: @deva[प꣡न्थाः] (nom. sg.), @deva[प꣡थः] (acc. pl.).
"""

advanced = """
The @deva[सर्वनामस्थाने] condition targets strong cases (nom/acc/voc). @deva[पथिन्] and @deva[मथिन्] show stem alternation (@deva[पन्थ-/पथि-/पथ-]); in strong cases, @deva[आद्युदात्त] applies: @deva[प꣡न्थाः], @deva[प꣡न्थानम्]. In weak cases, different accent may apply. These @deva[इनि]-derivatives (@deva[उणादि]) have this special accent pattern.
"""

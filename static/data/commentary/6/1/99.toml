id = "6.1.99"
numericId = "61099"

[en]
simple = """
When a sound-imitation word is doubled, @deva[इति]-sandhi (@ref[6.1.98]) doesn't apply; instead, @deva[पररूप] is optional. Examples: @deva[पटत्पटिति] (full sandhi) or @deva[पटत्पटेति] (optional).
"""

standard = """
For @deva[आम्रेडित] (doubled) sound-imitation words + @deva[इति], @ref[6.1.98] is blocked. Instead, @deva[पररूप] is optional: @deva[पटत्पटत् + इति] → @deva[पटत्पटिति] (by @ref[6.1.98] to whole) or @deva[पटत्पटेति] (optional @deva[त् + इ] → @deva[ए] for second member only). Doubling by @ref[8.1.4].
"""

advanced = """
The @deva[आम्रेडित] (reduplicated by @ref[8.1.4]) blocks direct @ref[6.1.98]. @deva[विभाषा पररूप] for @deva[त् + इ]: @deva[पटत्पटत् + इति] → @deva[पटत्पट + इ + ति] → @deva[पटत्पटेति] (optional @deva[अ + इ] → @deva[ए], or @deva[पटत्पटिति] by applying @ref[6.1.98] to the whole compound as a single @deva[अव्यक्तानुकरण]).
"""

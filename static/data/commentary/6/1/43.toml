id = "6.1.43"
numericId = "61043"

[en]
simple = """
The semivowel of @deva[व्ये] (to cover) is not vocalized before @deva[ल्यप्]. Examples: @deva[प्रव्याय], @deva[उपव्याय].
"""

standard = """
Before @deva[ल्यप्], @deva[व्ये] (also a @deva[यजादि]) doesn't undergo @deva[संप्रसारण]: @deva[प्रव्याय], @deva[उपव्याय]. This @[sūtra] is separated to allow @deva[व्ये] to run as @deva[अनुवृत्ति] into @ref[6.1.44].
"""

advanced = """
@deva[व्ये ञ् संवरणे] is @deva[यजादि] (@ref[6.1.15]). @deva[ल्यप्] is @deva[कित्]. This blocks @deva[संप्रसारण]: @deva[व्ये] + @deva[ल्यप्] → @deva[व्याय] → @deva[प्रव्याय]. The separation from @ref[6.1.42] enables @deva[व्ये] @deva[अनुवृत्ति] for @ref[6.1.44].
"""

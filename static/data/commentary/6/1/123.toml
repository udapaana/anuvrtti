id = "6.1.123"
numericId = "61123"

[en]
simple = """
According to @deva[स्फोटायन], the @deva[ओ] of @deva[गो] becomes @deva[अव्] when any vowel follows. So @deva[गो + अग्रम्] becomes @deva[गवग्रम्] under this view.
"""

standard = """
This @[sūtra] presents @deva[स्फोटायन]'s opinion (@deva[मत]) that @deva[गो] undergoes @deva[अवङ्]-substitution before any following vowel. The @deva[ओ] → @deva[अव्] change yields forms like @deva[गवाक्षः] ('cow-eye/window'), @deva[गवेन्द्रः] ('lord of cows'). This @deva[आचार्यमत] provides an alternative analysis to the standard sandhi treatment.
"""

advanced = """
The @deva[स्फोटायन] reference indicates a @[pre-pāṇinian] or alternative grammatical tradition. The @deva[अवङ्]-substitution (@deva[ओ] → @deva[अव्]) treats @deva[गो] as having an underlying @deva[गव्] form that surfaces before vowels. This 'morphophonemic' analysis competes with treating @deva[गोऽग्रम्] as regular @deva[पूर्वरूप] sandhi. Both yield valid forms; the choice is systematic preference.
"""

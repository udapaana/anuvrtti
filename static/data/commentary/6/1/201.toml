id = "6.1.201"
numericId = "61201"

[en]
simple = """
The word @deva[क्षय] ('dwelling, home') has acute accent on both the first and last syllables. So in @deva[क्षये जागृहि] ('be awake in the dwelling'), it's @deva[क्ष꣡य꣡].
"""

standard = """
This @[sūtra] provides double accent for @deva[क्षय] ('dwelling'): both @deva[क्ष꣡] and @deva[य꣡] bear @deva[उदात्त]. The word is formed with @deva[घ] affix (@ref[3.3.119]). Example: @deva[क्ष꣡ये꣡ जागृहि प्रपश्यन्] ('being awake, looking in the dwelling').
"""

advanced = """
The @deva[क्षयस्य] rule assigns @deva[उभयतोदात्त] (first and last accent) to @deva[क्षय]. The @deva[घ] affix (@ref[3.3.119]) normally produces @deva[अन्तोदात्त]; this @[sūtra] adds @deva[आद्युदात्त]. Like @ref[6.1.200], this creates exceptional double accent. The Vedic verse context suggests this is a metrically or pragmatically motivated accentuation.
"""

id = "6.1.176"
numericId = "61176"

[en]
simple = """
The affix @deva[मत्/वत्] ('possessing'), which is normally unaccented, receives acute accent when added to a stem that is @deva[अन्तोदात्त] (final-accented) and ends in a light (@deva[लघु]) vowel, or when @deva[न्] augment (@ref[8.2.16]) precedes.
"""

standard = """
This @[sūtra] gives @deva[उदात्त] to @deva[मतुप्/वतुप्] (normally @deva[अनुदात्त]) in two conditions: (1) after @deva[अन्तोदात्त लघ्वन्त] stems (final short vowel with final accent), (2) when @deva[नुट्] augment (@ref[8.2.16]) intervenes. Example: @deva[अग्नि꣡] + @deva[मत्] → @deva[अग्निम꣡त्]; the @deva[मत्] becomes accented.
"""

advanced = """
The @deva[अन्तोदात्तस्य लघ्वन्तस्य] condition: stem must end in a short (@deva[लघु]) vowel bearing @deva[उदात्त]. The @deva[नुडन्तस्य] alternative: when @deva[नुट्] (@ref[8.2.16]) is added between stem and @deva[मतुप्/वतुप्]. Either condition accents the normally @deva[अनुदात्त] @deva[मत्/वत्]. Forms: @deva[अग्निम꣡त्], @deva[वायुम꣡त्] (light final, accented) vs. @deva[धनवा꣡न्] (heavy final, unaccented @deva[वत्]).
"""

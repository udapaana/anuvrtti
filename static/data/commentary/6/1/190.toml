id = "6.1.190"
numericId = "61190"

[en]
simple = """
Reduplicated verbs have acute on the first syllable when followed by the unaccented singular personal endings (@deva[तिप्], @deva[सिप्], @deva[मिप्]). So @deva[जु꣡होति], @deva[जु꣡होषि], @deva[जु꣡होमि] all have initial accent.
"""

standard = """
This @[sūtra] extends @deva[आद्युदात्त] to reduplicated forms before @deva[अनुदात्त] singular endings @deva[तिप्/सिप्/मिप्] (3rd/2nd/1st person singular). Examples: @deva[जु꣡होति], @deva[जु꣡होषि], @deva[जु꣡होमि]. The singular @deva[परस्मैपद] endings trigger first-syllable accent.
"""

advanced = """
The @deva[तिसिमि] (= @deva[तिप् सिप् मिप्]) are @deva[अनुदात्त] singular endings. After @deva[द्विर्वचन], these endings (unlike accented @deva[थस्/थ/मस्] etc.) allow the @deva[आद्युदात्त] pattern. This complements @ref[6.1.189]'s vowel-initial condition, covering consonant-initial @deva[एकवचन] (singular) endings. The reduplication syllable remains the accent locus.
"""

id = "6.1.68"
numericId = "61068"

[en]
simple = """
After a consonant, the @deva[अपृक्त] (single-consonant) nominative @deva[स्], and @deva[ति]/@deva[सि] (reduced to @deva[त्]/@deva[स्]) are elided. Also, nominative @deva[स्] is elided after @deva[ङी] or long @deva[आप्]. Examples: @deva[प्राङ्], @deva[विद्युत्]; @deva[कुमारी], @deva[खट्वा].
"""

standard = """
After @deva[हल्] (consonant), @deva[ङी], or @deva[दीर्घ आप्]: (1) nominative @deva[सु] when @deva[अपृक्त] (→ @deva[स्]) is elided; (2) @deva[ति]/@deva[सि] when reduced to @deva[त्]/@deva[स्] is elided. Examples: @deva[प्राञ्च्] + @deva[स्] → @deva[प्राङ्]; @deva[विद्युत्] + @deva[स्] → @deva[विद्युत्]; @deva[कुमारी] + @deva[स्] → @deva[कुमारी]; @deva[खट्वा] + @deva[स्] → @deva[खट्वा].
"""

advanced = """
This @deva[लोप] has two conditions: (1) after @deva[हल्], @deva[ङी], or @deva[दीर्घाप्]: @deva[सु] (→ @deva[स्]) elided; (2) after @deva[हल्]: @deva[तिप्]/@deva[सिप्] (→ @deva[त्]/@deva[स्]) when @deva[अपृक्त] elided. @deva[हलन्त]: @deva[प्राञ्च्] + @deva[सु] → @deva[प्राङ्] (@deva[स्]-@deva[लोप], then @deva[च् → ङ्]). @deva[ङ्यन्त]: @deva[कुमारी] + @deva[सु] → @deva[कुमारी]. @deva[आबन्त]: @deva[खट्वा] + @deva[सु] → @deva[खट्वा].
"""

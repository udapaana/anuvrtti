id = "6.1.211"
numericId = "61211"

[en]
simple = """
The pronouns @deva[युष्मद्] ('you') and @deva[अस्मद्] ('I/we') have acute accent on the first syllable in the genitive singular. So @deva[त꣡व] ('your') and @deva[म꣡म] ('my') have initial accent. The shortened forms @deva[ते] and @deva[मे] are different.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[युष्मद्/अस्मद्] in genitive singular when appearing as @deva[तव/मम]. Examples: @deva[त꣡व] ('of you'), @deva[म꣡म] ('of me'). The enclitic forms @deva[ते/मे] don't receive this accent—they are typically unaccented.
"""

advanced = """
The @deva[षष्ठ्येकवचने] condition targets genitive singular. The full forms @deva[तव], @deva[मम] take @deva[आद्युदात्त]: @deva[त꣡व], @deva[म꣡म]. The enclitic alternants @deva[ते], @deva[मे] are @deva[निपात]-like and typically @deva[अनुदात्त] or @deva[एकश्रुति]. This distinction between full and clitic pronominal forms is prosodically significant.
"""

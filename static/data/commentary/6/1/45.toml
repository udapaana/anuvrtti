id = "6.1.45"
numericId = "61045"

[en]
simple = """
A root ending in a diphthong (@deva[ए], @deva[ऐ], @deva[ओ], @deva[औ]) in the @deva[धातुपाठ] substitutes @deva[आ] for that diphthong, unless a @deva[शित्] affix follows. Examples: @deva[ग्लै] → @deva[ग्लाता], @deva[ग्लातुम्]; @deva[शो] → @deva[निशाता].
"""

standard = """
Roots listed with final @deva[एच्] (diphthong: @deva[ए], @deva[ऐ], @deva[ओ], @deva[औ]) substitute @deva[आ] when no @deva[शित्] affix follows. Examples: @deva[ग्लै] → @deva[ग्लाता], @deva[ग्लातुम्], @deva[ग्लातव्यम्]; @deva[शो] → @deva[निशाता], @deva[निशातुम्]. Not for non-diphthong endings: @deva[कृ] → @deva[कर्ता]; @deva[हृ] → @deva[हर्ता].
"""

advanced = """
This @deva[आदेश] applies to @deva[उपदेशे एजन्त धातु]: @deva[एच्] (= @deva[ए], @deva[ऐ], @deva[ओ], @deva[औ]) → @deva[आ] when @deva[अशिति] (no @deva[शित्] affix). The @deva[धातोः] from @ref[6.1.8] is understood. Examples: @deva[ग्लै म्लाने] → @deva[ग्लाता], @deva[ग्लातुम्], @deva[ग्लातव्यम्]; @deva[शो तनूकरणे] → @deva[निशाता], @deva[निशातुम्], @deva[निशातव्यम्]. Counter-examples (non-@deva[एच्]): @deva[कृ] → @deva[कर्ता]; @deva[हृ] → @deva[हर्ता].
"""

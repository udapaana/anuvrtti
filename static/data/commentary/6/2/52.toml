id = "6.2.52"
numericId = "62052"

[en]
simple = """
A @deva[गति] word not ending in @deva[इ] or @deva[उ] keeps its accent immediately before a form with @deva[व्]-affix (like @deva[अञ्च्]-derivatives). So @deva[प्रा꣡ङ्] ('forward-facing'), @deva[प्र꣡त्यङ्] ('backward-facing').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[गति] (not @deva[इ/उ]-final) before @deva[व्]-affix forms. These include @deva[अञ्च्] + @deva[क्विन्] → directional words. Examples: @deva[प्रा꣡ङ्] ('eastward'), @deva[प्र꣡त्यङ्] ('westward'). The @deva[अनिकुचः] excludes @deva[इ/उ]-final @deva[गति].
"""

advanced = """
The @deva[साक्षात् वित्यनिकुचः] condition: @deva[गति] (not ending in @deva[इक्] = @deva[इ उ ऋ ऌ], specifically @deva[इ/उ] here) immediately before @deva[वित्] (@deva[व्]-marked) affixes. @deva[प्र + अञ्च् + क्विन्] → @deva[प्रा꣡ञ्च्] → @deva[प्रा꣡ङ्]. The @deva[गति] preserves accent. @deva[नि/अधि] (@deva[इ]-final) are handled separately.
"""

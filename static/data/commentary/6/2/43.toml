id = "6.2.43"
numericId = "62043"

[en]
simple = """
A word in the @deva[चतुर्थी] (dative) case (4th) as first member keeps its accent when the second member expresses what is suitable to become the first. So @deva[यूप꣡दारु] ('wood for a sacrificial post')—wood suitable for becoming a @deva[यूप].
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] when a @deva[चतुर्थी]-sense @deva[पूर्वपद] compounds with what is @deva[प्रकृत्यर्थ] (suited to become it). Example: @deva[यूप꣡दारु] ('post-wood'), @deva[कुण्डल꣡हिरण्य] ('earring-gold'). The material suited for the purpose retains first-member accent.
"""

advanced = """
The @deva[चतुर्थ्यर्थे बहुलं प्रकृत्यर्थे] condition: @deva[चतुर्थी] (dative) relationship where @deva[उत्तरपद] is @deva[प्रकृत्यर्थ] ('suited to become' the @deva[पूर्वपद]). @deva[यूप꣡दारु] = wood (suited) for (becoming) a post. The @deva[बहुलम्] indicates variability; not all such compounds follow this.
"""

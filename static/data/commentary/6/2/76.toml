id = "6.2.76"
numericId = "62076"

[en]
simple = """
A compound with @deva[अण्]-affix ending that denotes a professional person gets first-syllable accent—but not when the second term is @deva[कार] (from @deva[कृ] 'to make'). So @deva[ध꣡न्वकारः] doesn't follow this, but other professional compounds do.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[अण्]-ending compounds denoting @deva[शिल्पिन्] (professional), with @deva[कार] excepted. Professional-name compounds take first-syllable accent, but @deva[कार]-endings (like @deva[धन्वकारः] 'bow-maker') are excluded from this rule.
"""

advanced = """
The @deva[शिल्पिन्यण्यकारे] condition: @deva[अण्]-@deva[कृत्] compound denoting @deva[शिल्पिन्] takes @deva[आद्युदात्त], except when @deva[उत्तरपद] is @deva[कार] (from @deva[कृञ्]). The @deva[अकारे] exception preserves @deva[कार]-compounds' different accent. This refines @ref[6.2.75]'s official-compound rule.
"""

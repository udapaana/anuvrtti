id = "6.2.104"
numericId = "62104"

[en]
simple = """
Direction words get final-syllable accent before names of scholarly traditions derived from teachers' names. Examples: @deva[पूर्वपाणिनीयाः] 'earlier @[pāṇinīyas]', @deva[अपरपाणिनीयाः] 'later @[pāṇinīyas]', @deva[पूर्वकाशकृत्स्नाः], @deva[अपरकाशकृत्स्नाः]. Non-teacher-derived names like @deva[पूर्वशिष्याः] 'earlier students' don't qualify.
"""

standard = """
The condition @deva[आचार्यप्रभृतीनाम्] 'derived from teachers' requires the @deva[उत्तरपद] be formed from a teacher's name: @deva[पाणिनि] → @deva[पाणिनीय], @deva[काशकृत्स्न] → @deva[काशकृत्स्ना]. Compare @ref[6.2.36]. General words like @deva[शिष्य] 'student' or compositional uses like @deva[पूर्वपाणिनीयं] @deva[शास्त्रम्] 'ancient @[pāṇinian] text' don't trigger this accent.
"""

advanced = """
This rule applies to @deva[शैक्षसंज्ञा] (names of scholarly lineages). The @deva[तद्धित] derivation @deva[पाणिनि] + @deva[छ] → @deva[पाणिनीय] creates collective nouns for followers. The contrast with @deva[पूर्वपाणिनीयं] @deva[शास्त्रम्] shows that @[bahuvṛīhi]/@[tatpuruṣa] interpretations ('ancient @[pāṇinian] work') don't receive this accent—only the @deva[शिष्यसंज्ञा] (student-collective) meaning qualifies.
"""

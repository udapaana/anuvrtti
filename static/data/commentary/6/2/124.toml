id = "6.2.124"
numericId = "62124"

[en]
simple = """
In a neuter @deva[तत्पुरुष] compound ending in @deva[कन्था] 'patched garment', the word @deva[कन्था] gets first-syllable accent. Examples: @deva[सौशमिकन्थम्], @deva[आह्वरकन्थम्], @deva[चप्यकन्थम्]. These are genitive compounds. Non-neuter: @deva[दाक्षिकन्था].
"""

standard = """
Neuter @deva[तत्पुरुष] in @deva[कन्था] receives @deva[आद्युदात्त]. The word @deva[सौशमि] derives from @deva[सुशम] (one with @deva[शोभन] @deva[शम]); @deva[आह्वर] from prefix @deva[आ] + @deva[ष्ठ्वृ] + @deva[क] (@ref[3.1.136]). The neuter by @ref[3.4.20]. These are @deva[षष्ठी]-@deva[तत्पुरुष] (genitive compounds). When not neuter: @deva[दाक्षिकन्था].
"""

advanced = """
The @deva[नपुंसक] condition triggers @deva[आद्युदात्त] on @deva[कन्था]. The patronymic @deva[सौशमि] (← @deva[सुशम] 'good tranquility') and verbal derivative @deva[आह्वर] (← @deva[आ] + √@deva[ह्वृ] by @ref[3.1.136]) show @deva[षष्ठी]-@deva[समास] semantics: 'the @deva[कन्था] of X'. The neuter assignment by @ref[3.4.20] conditions the accent rule.
"""

id = "6.2.183"
numericId = "62183"

[en]
simple = """
After @deva[प्र] 'forward', a non-body-part word gets final-syllable accent when the compound is a name. Examples: @deva[प्रकोष्ठम्] (place name), @deva[प्रगृह्यम्] (name), @deva[प्रद्वारम्] (name). Body parts: @deva[प्रहस्तम्], @deva[प्रपदम्] don't qualify. Non-name: @deva[प्रपीठम्].
"""

standard = """
In @deva[संज्ञा] (name) compounds, non-@deva[स्वाङ्ग] words after @deva[प्र] receive @deva[अन्त्योदात्त]: @deva[प्रकोष्ठम्], @deva[प्रगृह्यम्], @deva[प्रद्वारम्]. Counterexamples: @deva[प्रहस्तम्], @deva[प्रपदम्] (body parts—see @ref[6.2.177]); @deva[प्रपीठम्] (not a name). The @deva[अस्वाङ्ग] condition excludes body-part nouns.
"""

advanced = """
Two conditions: (1) @deva[अस्वाङ्ग] (not body-part), excluding @ref[6.2.177]'s scope; (2) @deva[संज्ञा] (proper name). The rule applies to place names and technical terms formed with @deva[प्र]. Body parts follow @ref[6.2.177] (@deva[ध्रुव] @deva[स्वाङ्ग] + @deva[उपसर्ग] → @deva[अन्त्योदात्त]) instead.
"""

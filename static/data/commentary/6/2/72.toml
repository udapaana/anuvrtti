id = "6.2.72"
numericId = "62072"

[en]
simple = """
A word denoting the object of comparison gets first-syllable accent before @deva[गो] ('cow'), @deva[बिडाल] ('cat'), @deva[सिंह] ('lion'), or @deva[सैन्धव] ('horse'). So @deva[धा꣡न्यगवः] ('grain-like cow') or @deva[व्या꣡घ्रसिंहः] ('tiger-like lion').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[उपमान] (comparison-standard) before @deva[गो/बिडाल/सिंह/सैन्धव]. Examples: @deva[धा꣡न्यगवः] ('cow [numerous] like grain'), @deva[व्या꣡घ्रसिंहः] ('lion like a tiger'). The comparison-word gets first-syllable accent.
"""

advanced = """
The @deva[उपमानस्य गोबिडालसिंहसैन्धवेषु] condition: @deva[उपमान] + these four animals triggers @deva[आद्युदात्त]. @deva[धा꣡न्यगव] ('cows [plentiful] like grain'), @deva[व्या꣡घ्रसिंह] ('lion [fierce] like tiger'). The comparison-based compound accents the standard-of-comparison's first syllable.
"""

id = "6.2.49"
numericId = "62049"

[en]
simple = """
A @deva[गति] word (preverb like @deva[प्र], @deva[परा], etc. per @ref[1.4.60]) keeps its accent immediately before a @deva[क्त]-participle with passive meaning. So @deva[प्र꣡कृतः] ('done forth'), @deva[परा꣡कृतः] ('rejected').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[गति] (@ref[1.4.60]) immediately preceding a passive @deva[क्त]. Examples: @deva[प्र꣡कृतः] ('produced/prominent'), @deva[परा꣡कृतः] ('pushed aside'). The @deva[गति] retains its inherent accent.
"""

advanced = """
The @deva[गतिः कर्मणि क्ते] condition: @deva[गति]-class words (@ref[1.4.60]) directly before @deva[कर्मणि क्त] preserve @deva[प्रकृतिस्वर]. @deva[प्र꣡कृत], @deva[परा꣡कृत], @deva[वि꣡हित] show the pattern. The @deva[गति] must be @deva[साक्षात्] (immediate) before @deva[क्त]; intervening elements block this.
"""

id = "6.2.39"
numericId = "62039"

[en]
simple = """
The words @deva[महत्] and @deva[क्षुल्लक] ('small') keep their accent before @deva[वैश्वदेव] ('offering to all gods'). So @deva[महा꣡वैश्वदेवम्] ('great @deva[वैश्वदेव]') and @deva[क्षुल्लक꣡वैश्वदेवम्] ('small @deva[वैश्वदेव]').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[महत्] and @deva[क्षुल्लक] before @deva[वैश्वदेव]. Examples: @deva[महा꣡वैश्वदेवम्] ('major @deva[वैश्वदेव] rite'), @deva[क्षुल्लक꣡वैश्वदेवम्] ('minor @deva[वैश्वदेव] rite'). Both size-adjectives retain accent.
"""

advanced = """
The @deva[क्षुल्लकस्य च वैश्वदेवे] adds @deva[क्षुल्लक] ('small', from @deva[क्षुद्] + @deva[ल] + @deva[कन्]) to @deva[महत्] for @deva[प्रकृतिस्वर] before @deva[वैश्वदेव]. The @deva[वैश्वदेव] is a ritual offering; @deva[महा꣡वैश्वदेव] and @deva[क्षुल्लक꣡वैश्वदेव] distinguish major and minor versions.
"""

id = "6.2.34"
numericId = "62034"

[en]
simple = """
In a @deva[द्वन्द्व] compound of @deva[क्षत्रिय] (warrior) clan names in plural, the first member keeps its accent when the warrior belongs to @deva[सालंकायन] clan. So @deva[सालंकायनसात्यमुग्राः] has first-member accent.
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[द्वन्द्व] of @deva[क्षत्रिय] clan names (plural) when associated with @deva[सालंकायन]. The clan-compound retains first-member accent: @deva[सालंकायन꣡सात्यमुग्राः].
"""

advanced = """
The @deva[द्वन्द्वे क्षत्रियाख्यायां सालंकायने बहुवचने] condition: @deva[द्वन्द्व] of @deva[क्षत्रिय]-@deva[संज्ञा] (warrior clan names) in @deva[बहुवचन] with @deva[सालंकायन] connection. The @deva[सालंकायन] reference indicates a specific lineage context. These clan-name @deva[द्वन्द्व] compounds preserve @deva[पूर्वपद स्वर].
"""

id = "6.2.20"
numericId = "62020"

[en]
simple = """
The word @deva[भुवन] ('world') may optionally keep its accent before @deva[पति] meaning 'lord'. So @deva[भुवनपतिः] can be either @deva[भु꣡वनपतिः] or @deva[भुवनपति꣡ः].
"""

standard = """
This @[sūtra] makes @deva[भुवन] + @deva[पति] optionally follow @ref[6.2.18]. The compound @deva[भुवनपति] ('lord of the world') can have either @deva[प्रकृतिस्वर] (@deva[भु꣡वनपति]) or default @deva[अन्तोदात्त] (@deva[भुवनपति꣡]). The @deva[विभाषा] allows both.
"""

advanced = """
The @deva[भुवनस्य वा] provides optionality for @deva[भुवन] (formed by @deva[क्युन्] @[uṇādi] affix). While @deva[भू] is excepted by @ref[6.2.19], its derivative @deva[भुवन] has optional status. Either @deva[भु꣡वनपति] (first-member accent) or @deva[भुवनपति꣡] (final accent) is valid. This shows how derivatives may differ from their base words.
"""

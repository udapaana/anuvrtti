id = "6.2.41"
numericId = "62041"

[en]
simple = """
The word @deva[गो] ('cow') keeps its accent before @deva[साद] ('sitting'), @deva[सादि] ('rider'), and @deva[सारथि] ('charioteer'). So @deva[गो꣡सादः] ('cow-sitter'), @deva[गो꣡सादि] ('cow-rider'), @deva[गो꣡सारथि] ('cow-charioteer').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[गो] before @deva[साद/सादि/सारथि]. Examples: @deva[गो꣡सादः] ('one who mounts cows'), @deva[गो꣡सादि] ('cow-rider'), @deva[गो꣡सारथि] ('cowherd as charioteer'). The @deva[गो]-stem retains accent.
"""

advanced = """
The @deva[गोः सादसादिसारथिषु] rule: @deva[गो] preserves @deva[प्रकृतिस्वर] before these three @deva[सद्]-derived words. @deva[साद] (agent), @deva[सादि] (agent), @deva[सारथि] (charioteer) as @deva[उत्तरपद] trigger @deva[गो꣡]-accent. Compare @deva[अश्वसाद] which may follow different rules.
"""

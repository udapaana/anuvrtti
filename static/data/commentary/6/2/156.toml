id = "6.2.156"
numericId = "62156"

[en]
simple = """
Words formed with @deva[य] and @deva[यत्] affixes (not meaning 'useful for') get final-syllable accent after @deva[नञ्] when negating the attribute. Examples: @deva[अपाश्याः] 'not of the noose-group', @deva[अदन्त्यम्] 'not dental'. But @deva[अपाद्यम्] (water 'useful for feet') doesn't qualify.
"""

standard = """
After @deva[नञ्], words with @deva[य]/@deva[यत्] affixes receive @deva[अन्त्योदात्त] when @deva[अतदर्थ] (not meaning 'useful for that'). Examples: @deva[पाश्याः] 'group of nooses' (IV.2.49) → @deva[अपाश्याः]; @deva[दन्त्यम्] 'dental' (@ref[5.1.6]) → @deva[अदन्त्यम्]; @deva[अतृण्याः], @deva[अकर्ण्यम्]. Counterexample: @deva[पाद्यम्] 'water for feet' (@deva[तदर्थ] meaning) → @deva[अपाद्यम्] doesn't get this accent.
"""

advanced = """
The @deva[अतदर्थ] condition excludes @deva[य]/@deva[यत्] words with 'useful for' meaning (@deva[तदर्थ] by @ref[4.3.116]). When @deva[य] denotes collective (@deva[पाश्य] = group of nooses) or @deva[यत्] denotes location (@deva[दन्त्य] = occurring at teeth), negation triggers @deva[अन्त्योदात्त]. But @deva[पाद्य] 'foot-water' (purpose meaning) follows different accent when negated.
"""

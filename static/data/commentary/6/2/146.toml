id = "6.2.146"
numericId = "62146"

[en]
simple = """
The @deva[क्त] participle gets final-syllable accent when preceded by @deva[गति], @deva[कारक], or @deva[उपपद], if the compound is a name. Exceptions: @deva[आचित] etc. Examples: @deva[संभूतः] (@[rāmāyaṇa]'s name), @deva[उपहूतः] (@[śākalya]'s name), @deva[धनुषखाता] @deva[नदी] 'river dug by bow'.
"""

standard = """
In @deva[संज्ञा] (name) compounds, @deva[गति]/@deva[कारक]/@deva[उपपद]-preceded @deva[क्त] receives @deva[अन्त्योदात्त], overriding @ref[6.2.49]. Examples: @deva[संभूतो] @deva[रामायणः], @deva[उपहूतः] @deva[शाकल्यः], @deva[परिजग्धः] @deva[कौण्डिन्यः]. Also @deva[कारक]-compounds: @deva[धनुषखाता] @deva[नदी], @deva[कुद्दालखातम्] @deva[नगरम्], @deva[हस्तिमृदिता] @deva[भूमिः]. Exception: @deva[आचित], @deva[पर्याचित], @deva[आस्थापित] etc.
"""

advanced = """
The @deva[संज्ञा] condition extends @deva[अन्त्योदात्त] to proper names with @deva[क्त]-final @deva[उत्तरपद]. This overrides both @ref[6.2.49] (prefix accent) and @ref[6.2.48] (@deva[कारक]-preceding accent). The @deva[आचितादि] @[gaṇa] provides exceptions that retain @deva[प्रकृतिस्वर]. The @deva[कारक] examples show instrumental relationships: @deva[धनुषा] @deva[खाता] = 'dug by bow'.
"""

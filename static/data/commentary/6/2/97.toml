id = "6.2.97"
numericId = "62097"

[en]
simple = """
Before a @deva[द्विगु] compound (numeral compound), the first member gets final-syllable accent when the whole denotes a sacrifice. Examples: @deva[गर्गत्रिरात्रः] 'Garga's three-night sacrifice', @deva[कुसुरुविन्दसप्तरात्रः] 'Kusuruvinda's seven-night sacrifice'. Non-sacrifice compounds like @deva[अतिरात्रः] don't follow this rule.
"""

standard = """
The conditions require: (1) the @deva[उत्तरपद] is a @deva[द्विगु] compound like @deva[त्रिरात्र]; (2) the whole denotes @deva[यज्ञ] (sacrifice). Thus @deva[गर्गाणां] @deva[त्रिरात्रः] = @deva[गर्गत्रिरात्रः]. But @deva[अतिरात्रः] 'beyond-night ritual', formed as @deva[प्रादिसमास] with @deva[समासान्त] @deva[अच्] by @ref[5.4.87], takes final accent by @ref[6.1.163] instead.
"""

advanced = """
The @deva[यज्ञ] restriction limits this rule to sacrificial nomenclature. The @deva[द्विगु] condition requires a numeral-headed @deva[उत्तरपद]. The counterexample @deva[अतिरात्रः] shows that @deva[प्रादिसमास] with @deva[समासान्त] @deva[अच्] follows @ref[6.1.163] @deva[समासान्ते] for accent, not this rule. The genitive relationship (@deva[गर्गाणां] @deva[त्रिरात्रः]) identifies whose sacrifice is named.
"""

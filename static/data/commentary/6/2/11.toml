id = "6.2.11"
numericId = "62011"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[सदृश] ('similar') or @deva[प्रतिरूप] ('resembling') as second member, the first member keeps its accent when expressing resemblance to something. So @deva[पितृ꣡सदृशः] ('resembling the father').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[सदृश/प्रतिरूप]-final @deva[तत्पुरुष] when expressing resemblance. Examples: @deva[पितृ꣡सदृशः] ('father-like'), @deva[मातृ꣡प्रतिरूपः] ('mother-resembling'). The comparison meaning triggers first-member accent.
"""

advanced = """
The @deva[सदृशप्रतिरूपयोः सादृश्ये] condition: @deva[सदृश] and @deva[प्रतिरूप] ('resembling/similar') as @deva[उत्तरपद] in @deva[सादृश्य] (resemblance) contexts. The @deva[पूर्वपद] denotes the standard of comparison: @deva[पितृ꣡सदृश] ('like father'), @deva[मातृ꣡प्रतिरूप] ('like mother'). This relates to @ref[6.2.2]'s @deva[उपमान/उपमित] conditions.
"""

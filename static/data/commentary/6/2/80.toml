id = "6.2.80"
numericId = "62080"

[en]
simple = """
When the first member expresses something to which resemblance is shown, it gets first-syllable accent before a @deva[णिनि]-ending word. So @deva[अ꣡ग्निदायी] ('fire-like giver') or @deva[सू꣡र्यदायी] ('sun-like giver').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[उपमान] (comparison-standard) before @deva[णिनि]-ending words. The first member expressing what something resembles gets first-syllable accent. Example: @deva[अ꣡ग्निदायिन्] ('one who gives like fire').
"""

advanced = """
The @deva[उपमाने णिनौ] condition: @deva[उपमान] (standard of comparison) + @deva[णिनि]-derivative takes @deva[आद्युदात्त] on the @deva[उपमान]. @deva[अ꣡ग्निदायिन्] ('giver [generous] like fire'), @deva[सू꣡र्यदायिन्] ('giver like the sun'). The comparison-word gets first-syllable accent.
"""

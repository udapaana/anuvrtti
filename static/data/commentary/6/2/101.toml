id = "6.2.101"
numericId = "62101"

[en]
simple = """
Three words are exceptions before @deva[पुर]: @deva[हास्तिन], @deva[फलक], and @deva[मार्देय] do not get final-syllable accent. Examples: @deva[हास्तिनपुरम्] (Hastinapur), @deva[फलकपुरम्], @deva[मार्देयपुरम्]. These keep regular compound accent.
"""

standard = """
This @[sūtra] provides exceptions to @ref[6.2.99]. The cities @deva[हास्तिनपुर], @deva[फलकपुर], @deva[मार्देयपुर] don't receive @deva[पूर्वपदान्त्योदात्त] despite being Eastern names. The word @deva[मार्देय] is a patronymic from @deva[मृदु] formed by @deva[ढक्] (@deva[शुभ्रादि] class), with @deva[उ] elided by @ref[6.4.147].
"""

advanced = """
The exception @deva[न] blocks @ref[6.2.99] for these three specific city names. @deva[हास्तिनपुर] (the famous @[mahābhārata] capital) and the others maintain @deva[उत्तरपदान्त] accent. The derivation @deva[मृदु] → @deva[मार्देय] shows @deva[वृद्धि] by @deva[ढक्] followed by @deva[उ]-@deva[लोप] by @ref[6.4.147] @deva[हलो] @deva[यमां] @deva[यमि] @deva[लोपः].
"""

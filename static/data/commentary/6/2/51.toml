id = "6.2.51"
numericId = "62051"

[en]
simple = """
A @deva[गति] word keeps its accent immediately before the Vedic infinitive ending @deva[तवै], but only when the @deva[गति] doesn't end in @deva[अ]. So @deva[प्रकर्तवै] but with different accent based on @deva[गति] form.
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[गति] before @deva[तवै] infinitive (@ref[3.4.14]), but the @deva[गति] must not end in @deva[अ]. The condition @deva[अनकारस्य] excludes @deva[अ]-final @deva[गति] forms from preserving accent here.
"""

advanced = """
The @deva[साक्षात् तवै अनकारस्य] condition: @deva[गति] immediately before @deva[तवै] (Vedic infinitive) when @deva[गति] is @deva[अनकार] (not @deva[अ]-final). @deva[गति] forms like @deva[प्र], @deva[परा] (ending in @deva[आ]) qualify; forms with @deva[अ]-sandhi don't. This affects Vedic infinitive accent.
"""

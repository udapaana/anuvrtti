id = "6.2.21"
numericId = "62021"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[आशङ्का] ('apprehension'), @deva[आबाध] ('affliction'), or @deva[नेदीयस्] ('nearest') as second member, the first member keeps its accent when expressing supposition. So @deva[वृक꣡ आशङ्का] ('apprehension of wolf').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for compounds with @deva[आशङ्का/आबाध/नेदीयस्] as @deva[उत्तरपद] when expressing @deva[संभावना] ('supposition/possibility'). Example: @deva[वृक꣡ आशङ्का] ('suspecting a wolf'). The suppositional meaning triggers first-member accent.
"""

advanced = """
The @deva[आशङ्काऽऽबाधनेदीयसां संभावनम्] condition: these three words as @deva[उत्तरपद] when expressing @deva[संभावना] (conjecture/supposition). @deva[वृक꣡ आशङ्का] ('fearing/suspecting a wolf'), @deva[शत्र्व꣡ाबाध] ('affliction possibly from enemy'). The conjectural/suppositional semantic context preserves @deva[प्रकृतिस्वर].
"""

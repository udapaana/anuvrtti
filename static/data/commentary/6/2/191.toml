id = "6.2.191"
numericId = "62191"

[en]
simple = """
After @deva[अति] 'beyond', non-@deva[कृत्] words and the word @deva[पद] 'foot/verse' get final-syllable accent. Examples: @deva[अत्यङ्कुशः] @deva[नागः] 'elephant beyond the goad', @deva[अतिकशः] @deva[अश्वः] 'horse beyond the whip', @deva[अतिपदा] @deva[शक्वरी] '@[śakvarī] meter with extra foot'. @deva[कृत्]-words: @deva[अतिकारकः].
"""

standard = """
Non-@deva[कृदन्त] words and @deva[पद] receive @deva[अन्त्योदात्त] after @deva[अति]: @deva[अत्यङ्कुशो] @deva[नागः], @deva[अतिकशोऽश्वः], @deva[अतिपदा] @deva[शक्वरी]. Counterexample: @deva[अतिकारकः] (@deva[कृत्]-formed). A @[vārttika] restricts this to compounds where a verb (like √@deva[क्रम्] 'cross') is elided: @deva[शोभनी] @deva[गार्ग्यः] = @deva[अतिगार्ग्यः] (no elided verb) doesn't qualify.
"""

advanced = """
The @deva[वार्त्तिक] @deva[धात्वपेक्षायाम्] requires an understood verbal action (like 'crossing beyond') for this accent. Thus @deva[अत्यङ्कुश] implies √@deva[क्रम्] 'going beyond the goad'. But @deva[अतिगार्ग्य] 'surpassing @[gārgya]' (adjectival sense without verbal elision) doesn't take this accent.
"""

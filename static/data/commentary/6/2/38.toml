id = "6.2.38"
numericId = "62038"

[en]
simple = """
The word @deva[महत्] (in form @deva[महा] 'great') keeps its accent before @deva[व्रीहि] ('rice'), @deva[अपराह्ण] ('afternoon'), @deva[गृष्टि] ('cow'), @deva[इष्वास] ('bow'), @deva[जाबाल], @deva[भार], @deva[भारत], @deva[हरिद्रव], and @deva[तापस]. So @deva[महा꣡व्रीहिः] ('great rice').
"""

standard = """
This @[sūtra] lists specific words before which @deva[महत्] (as @deva[महा]) preserves @deva[प्रकृतिस्वर]. The list: @deva[व्रीहि], @deva[अपराह्ण], @deva[गृष्टि], @deva[इष्वास], @deva[जाबाल], @deva[भार], @deva[भारत], @deva[हरिद्रव], @deva[तापस]. Examples: @deva[महा꣡व्रीहिः], @deva[महा꣡पराह्णः].
"""

advanced = """
The @deva[महतो व्रीह्यपराह्णगृष्टीष्वासजाबालभारभारतहरिद्रवतापसेषु] lists @deva[उत्तरपद] words with which @deva[महत्] shows @deva[प्रकृतिस्वर]. These specific lexical combinations preserve @deva[महा꣡]-accent: @deva[महा꣡व्रीहि], @deva[महा꣡पराह्ण], etc. Other @deva[महा]-compounds follow default @deva[अन्तोदात्त].
"""

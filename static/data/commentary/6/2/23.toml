id = "6.2.23"
numericId = "62023"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[सविध] ('neighborhood'), @deva[सनीड] ('nest'), @deva[समर्याद] ('boundary'), @deva[सवेश] ('entrance'), or @deva[सदेश] ('region') as second member, the first member keeps its accent. So @deva[ग्राम꣡सविधम्] ('village-vicinity').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for compounds with @deva[सविध/सनीड/समर्याद/सवेश/सदेश] as @deva[उत्तरपद]. Examples: @deva[ग्राम꣡सविधम्] ('near the village'), @deva[पक्षि꣡सनीडम्] ('bird's nesting place'). These locational terms preserve first-member accent.
"""

advanced = """
The @deva[सविधसनीडसमर्यादसवेशसदेशेषु] lists five spatial terms. The @deva[स-] prefix indicates 'having/with': @deva[सविध] (with proximity), @deva[सनीड] (with nest), @deva[समर्याद] (with boundary), @deva[सवेश] (with entrance), @deva[सदेश] (with region). All preserve @deva[पूर्वपद प्रकृतिस्वर] in compounds.
"""

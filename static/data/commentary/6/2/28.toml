id = "6.2.28"
numericId = "62028"

[en]
simple = """
The first syllable of @deva[कुमार] is optionally accented when the second member denotes a group or assembly (@deva[पूग]). So @deva[कुमारसभा] can be @deva[कु꣡मारसभा] or @deva[कुमार꣡सभा].
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] for @deva[कुमार] before @deva[पूगनाम] (names of assemblies/groups). The @deva[विभाषा] allows: @deva[कु꣡मारसभा] (first-syllable accent) or @deva[कुमार꣡सभा] (@ref[6.2.26] accent). @deva[पूग] means 'multitude/guild/assembly'.
"""

advanced = """
The @deva[पूगनाम्नि वा] provides optionality for @deva[कुमार] + group-names. Either @deva[आद्युदात्त] (@deva[कु꣡मारपूग]) or @deva[प्रकृतिस्वर] (@deva[कुमार꣡पूग]) is valid. The @deva[पूग] ('guild/assembly') as @deva[उत्तरपद] triggers this option. This shows how @deva[कुमार] has special accent treatment in compounds.
"""

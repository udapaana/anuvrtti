id = "6.2.161"
numericId = "62161"

[en]
simple = """
After @deva[नञ्], words formed by @deva[तृन्] affix (like @deva[कर्तृ] → @deva[कर्ता]) and the words @deva[अन्न] 'food', @deva[तीक्ष्ण] 'sharp', and @deva[शुचि] 'pure' optionally get final-syllable accent. Examples: @deva[अकर्ता] or @deva[अकर्ता] (either accent); @deva[अनन्नम्] or @deva[अनन्नम्]; @deva[अतीक्ष्णम्] or @deva[अतीक्ष्णम्]; @deva[अशुचिः] or @deva[अशुचिः].
"""

standard = """
Optional @deva[अन्त्योदात्त] after @deva[नञ्] applies to: (1) @deva[तृन्]-ending agent nouns (@deva[अकर्ता] or @deva[अकर्ता]); (2) @deva[अन्न] (@deva[अनन्नम्] or @deva[अनन्नम्]); (3) @deva[तीक्ष्ण] (@deva[अतीक्ष्णम्] or @deva[अतीक्ष्णम्]); (4) @deva[शुचि] (@deva[अशुचिः] or @deva[अशुचिः]). The alternative is @deva[अव्यय]-accent from @ref[6.2.2] (accent on @deva[अ]).
"""

advanced = """
The @deva[विभाषा] creates alternation between @deva[अन्त्योदात्त] (this rule) and @deva[अव्यय]-@deva[पूर्वपद] accent (@ref[6.2.2]). The @deva[तृन्]-class includes all agent nouns in @deva[-तृ]. The three enumerated words (@deva[अन्न], @deva[तीक्ष्ण], @deva[शुचि]) form a closed list with optional accent. This optionality reflects acceptable variant pronunciations.
"""

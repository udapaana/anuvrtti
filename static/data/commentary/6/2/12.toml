id = "6.2.12"
numericId = "62012"

[en]
simple = """
In a @deva[तत्पुरुष] compound where the second member is a @deva[द्विगु] (numeral compound) denoting measure or quantity, the first member keeps its accent. So @deva[प꣡ञ्चगवम्] ('having five cows' worth') retains first-member accent.
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] when the @deva[उत्तरपद] is a @deva[द्विगु समास] expressing @deva[परिमाण] (measure/quantity). Example: a compound where @deva[पञ्चगव] ('five-cow [measure]') is the second member—the first member retains its accent. The measuring sense is key.
"""

advanced = """
The @deva[द्विगोश्च परिमाणे] condition: @deva[द्विगु] (@deva[समाहार] numeral compound) as @deva[उत्तरपद] when expressing @deva[परिमाण]. The @deva[द्विगु] (like @deva[पञ्चगव] 'collection of five cows' used as measure) in second position triggers @deva[पूर्वपद प्रकृतिस्वर]. This creates nested compound accent patterns.
"""

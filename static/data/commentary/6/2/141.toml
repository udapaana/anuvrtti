id = "6.2.141"
numericId = "62141"

[en]
simple = """
In a @deva[द्वन्द्व] compound of divine names, both members keep their original accents. Examples: @deva[इन्द्रासोमौ] (Indra and Soma), @deva[इन्द्रावरुणौ] (Indra and @[varuṇa]), @deva[इन्द्राबृहस्पती] (Indra and @[bṛhaspati]—three accents!).
"""

standard = """
In @deva[देवताद्वन्द्व], both members retain @deva[प्रकृतिस्वर]. The word @deva[इन्द्र] has @deva[निपातन] @deva[आद्युदात्त]; @deva[सोम] (@deva[मन्], @[uṇādi] I.140) and @deva[वरुण] (@deva[उनन्], @[uṇādi] III.53) are @deva[आद्युदात्त] by @ref[6.1.197]. Since @deva[बृहस्पति] itself has two accents (@ref[6.2.140]), @deva[इन्द्राबृहस्पती] has three accents total.
"""

advanced = """
The @deva[देवता] condition restricts this dual-accent pattern to divine names. The compound @deva[इन्द्राबृहस्पती] with three accents (one on @deva[इन्द्र], two on @deva[बृहस्पति] from @ref[6.2.140]) shows how @deva[प्रकृतिस्वर] compounds. Non-divine @deva[द्वन्द्व] like @deva[ब्राह्मणक्षत्रियौ] would follow different accent rules.
"""

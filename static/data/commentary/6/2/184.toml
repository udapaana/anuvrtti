id = "6.2.184"
numericId = "62184"

[en]
simple = """
Words like @deva[निरुदक] 'waterless', @deva[निरुपल] 'stoneless', @deva[निर्मक्षिक] 'flyless' get final-syllable accent. These can be @deva[प्रादिसमास] or @deva[बहुव्रीहि] compounds.
"""

standard = """
The @deva[निरुदकादि] @[gaṇa] receives @deva[अन्त्योदात्त]: @deva[निरुदकम्], @deva[निरुपलम्], @deva[निरुलपम्], @deva[निर्मक्षिकम्], @deva[निर्मशकम्], @deva[निष्कालकम्], @deva[निष्कालिकम्], @deva[निष्पेषम्], @deva[दुस्तरीपम्], @deva[निस्तरीपम्], etc. These may be @deva[प्रादिसमास] or @deva[बहुव्रीहि]. As @deva[अव्ययीभाव], they would take final accent by @ref[6.1.223] anyway.
"""

advanced = """
The @[gaṇa] includes: @deva[निरुदक], @deva[निरुपल], @deva[निरुलप], @deva[निर्मक्षिक], @deva[निर्मशक], @deva[निष्कालक], @deva[निष्कालिक], @deva[निष्पेष], @deva[दुस्तरीप], @deva[निस्तरीप], @deva[निस्तरीक], @deva[निरजिन], @deva[उदजिन], @deva[उपाजिन]. A @[vārttika] adds @deva[परि] + @deva[हस्त]/@deva[पाद]/@deva[केश]/@deva[कर्ष] as @deva[आकृतिगण]. Multiple compound interpretations yield same accent.
"""

id = "6.2.181"
numericId = "62181"

[en]
simple = """
The word @deva[अन्तर्] does not get final-syllable accent after the prefixes @deva[नि] and @deva[वि]. Examples: @deva[न्यन्तः] 'interior', @deva[व्यन्तः] 'interval'. The first member retains its accent; the semivowel replaces @deva[इ], then @deva[स्वरित] occurs by @ref[8.2.4].
"""

standard = """
This @[sūtra] blocks @ref[6.2.180]'s @deva[अन्त्योदात्त] for @deva[नि] + @deva[अन्तर्] and @deva[वि] + @deva[अन्तर्]. Thus @deva[न्यन्तः], @deva[व्यन्तः] retain @deva[पूर्वपद] accent. After semivowel substitution (@deva[इ] → @deva[य्]), the subsequent @deva[अनुदात्त] becomes @deva[स्वरित] by @ref[8.2.4] @deva[एकादेश] @deva[उदात्तेनोदात्तः].
"""

advanced = """
The @deva[नि]/@deva[वि]] exception to @ref[6.2.180] maintains prefix accent. The phonological sequence: (1) @deva[नि] + @deva[अन्तर्] → @deva[न्यन्तर्]; (2) prefix retains @deva[उदात्त]; (3) following @deva[अनुदात्त] becomes @deva[स्वरित] by @ref[8.2.4]. This contrasts with @deva[प्रान्त], @deva[पर्यन्त] which take @deva[उत्तरपद]-@deva[अन्त्योदात्त].
"""

id = "6.2.77"
numericId = "62077"

[en]
simple = """
An @deva[उपपद] compound with @deva[अण्]-affix ending that forms a name gets first-syllable accent—but not when the second term is @deva[कार]. So name-compounds like @deva[त꣡क्षशिलः] have first-syllable accent.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[अण्]-ending @deva[उपपद समास] when forming a @deva[संज्ञा] (name), with @deva[कार] excepted. Example: @deva[त꣡क्षशिलः] (proper name) has first-syllable accent. @deva[कार]-compounds are excluded.
"""

advanced = """
The @deva[संज्ञायाम् अण्युपपदे अकारे] condition: @deva[अण्]-ending @deva[उपपद समास] forming @deva[संज्ञा] (proper name) takes @deva[आद्युदात्त], except @deva[कार]. @deva[त꣡क्षशिल] (place name 'Taxila'), @deva[क꣡म्बलबालिन्] (personal name). The @deva[अकारे] exception consistently removes @deva[कार]-compounds.
"""

id = "6.2.172"
numericId = "62172"

[en]
simple = """
In a @deva[बहुव्रीहि] compound formed with @deva[नञ्] 'not' or @deva[सु] 'good', the final syllable of the entire compound gets acute accent. Examples: @deva[अयवः] 'barley-less (land)', @deva[अव्रीहिः] 'rice-less', @deva[सुयवः] 'good-barleyed', @deva[सुव्रीहिः] 'good-riced'.
"""

standard = """
In @deva[नञ्]/@deva[सु] @deva[बहुव्रीहि], @deva[अन्त्योदात्त] falls on the final syllable of the complete compound (including @deva[समासान्त] affixes). Examples: @deva[अयवो] @deva[देशः], @deva[अव्रीहिः], @deva[अमाषः], @deva[सुयवः], @deva[सुव्रीहिः], @deva[सुमाषः]. With @deva[समासान्त] @deva[अ] (@ref[5.4.74]): @deva[अनृचः]. The accent applies to the fully formed compound.
"""

advanced = """
The phrase @deva[समासस्य] indicates accent on the complete compound including @deva[समासान्त] affixes. Thus @deva[अनृच] (with @deva[अ] by @ref[5.4.74]) takes accent on final @deva[च], not on the underlying stem. Though both @deva[समास] and @deva[उत्तरपद] are in @deva[अनुवृत्ति], this rule specifies compound-final accent, distinct from @deva[उत्तरपद]-final accent.
"""

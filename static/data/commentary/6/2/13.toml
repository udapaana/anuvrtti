id = "6.2.13"
numericId = "62013"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[वाणिज] ('trader') as second member, the first member keeps its accent when it specifies the destination or the merchandise. So @deva[काशि꣡वाणिजः] ('trader going to @[kāśī]') or @deva[लवण꣡वाणिजः] ('salt-trader').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[वाणिज]-final @deva[तत्पुरुष] when the first member indicates @deva[देश] (destination) or @deva[पण्य] (merchandise). Examples: @deva[काशि꣡वाणिजः] ('trader bound for @[kāśī]'), @deva[लवण꣡वाणिजः] ('trader in salt').
"""

advanced = """
The @deva[वाणिजे देशे पण्ये च] condition: @deva[वाणिज] ('merchant/trader') as @deva[उत्तरपद] when @deva[पूर्वपद] specifies either @deva[देश] (place/destination) or @deva[पण्य] (trade goods). @deva[काशि꣡वाणिज] (destination-specified), @deva[लवण꣡वाणिज] (goods-specified) show @deva[प्रकृतिस्वर]. General 'trader' compounds may differ.
"""

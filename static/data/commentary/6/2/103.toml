id = "6.2.103"
numericId = "62103"

[en]
simple = """
Direction words like @deva[पूर्व] 'east' and @deva[अपर] 'west' get final-syllable accent before words denoting villages, countries, or narratives. Examples: @deva[पूर्वेषुकामशामी], @deva[पूर्वकृष्णमृत्तिका] (village), @deva[पूर्वपञ्चालाः] (country), @deva[पूर्वाधिरामम्] (story name).
"""

standard = """
Direction words (@deva[दिक्शब्द]) receive @deva[अन्त्योदात्त] before @deva[ग्राम] (village), @deva[जनपद] (country), or @deva[आख्यायिका] (narrative) names. The compounding follows @ref[2.1.50] for villages, @ref[2.1.58] for countries. After this accent, @ref[8.2.6] may optionally produce @deva[स्वरित]. The scope extends to @deva[चानराट].
"""

advanced = """
The tripartite condition—@deva[ग्राम], @deva[जनपद], @deva[आख्यायिका]—covers geographical and narrative nomenclature using directional prefixes. Compounds like @deva[पूर्वपञ्चालाः] are @deva[कर्मधारय] by @ref[2.1.58]. The accent on @deva[पूर्व]/@deva[अपर] finals, followed by grave @deva[उत्तरपद], may yield optional @deva[स्वरित] by @ref[8.2.6] @deva[उदात्तादनुदात्तस्य] @deva[स्वरितः].
"""

id = "6.2.158"
numericId = "62158"

[en]
simple = """
Words formed with @deva[अच्] and @deva[क] affixes get final-syllable accent after @deva[नञ्] when used as an insult. Example: @deva[अपचोऽयं] @deva[जाल्मः] 'this rogue doesn't cook' (implying he can but won't—greed indicated). Similarly @deva[अपठोऽयं] @deva[जाल्मः].
"""

standard = """
When @deva[आक्षेप] (abuse/censure) is intended, @deva[नञ्] + @deva[अच्]/@deva[क]-formed words receive @deva[अन्त्योदात्त]. The example @deva[अपचोऽयं] @deva[जाल्मः] 'this rogue doesn't cook' implies the person could cook but refuses (perhaps wanting more pay). This differs from @ref[6.2.157]'s incapacity meaning. Examples: @deva[अपठः], @deva[अविक्षिपः], @deva[अविलिखः].
"""

advanced = """
The @deva[आक्षेप] condition targets censure of willful non-performance, not incapacity. In @deva[अपचो] @deva[जाल्मः], the insult implies @deva[कर्तुमपि] @deva[शक्नोति] @deva[किन्तु] @deva[न] @deva[करोति] (can do but doesn't). This contrasts with @ref[6.2.157]'s @deva[अशक्ति] (genuine inability). Both yield @deva[अन्त्योदात्त] but from different semantic triggers.
"""

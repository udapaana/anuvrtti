id = "6.2.142"
numericId = "62142"

[en]
simple = """
In divine-name @deva[द्वन्द्व], the dual-accent rule doesn't apply when the second member's first syllable is @deva[अनुदात्त]—except for @deva[पृथिवी], @deva[रुद्र], @deva[पूषन्], and @deva[मन्थिन्]. Examples: @deva[इन्द्राग्नी], @deva[इन्द्रवायू] (where @deva[अग्नि] and @deva[वायु] have final acute).
"""

standard = """
When the @deva[उत्तरपद] is @deva[अनुदात्तादि] (first syllable grave), dual accent is blocked—except for @deva[पृथिवी], @deva[रुद्र], @deva[पूषन्], @deva[मन्थिन्]. Thus @deva[इन्द्राग्नी] and @deva[इन्द्रवायू] (with @deva[अन्त्योदात्त] @deva[अग्नि], @deva[वायु]) don't both retain accent. The repeated @deva[उत्तरपद] ensures the @deva[अनुदात्तादि] qualification applies to it, not to @deva[द्वन्द्व].
"""

advanced = """
The @deva[अनुदात्तादि] condition identifies words whose first syllable is grave (@deva[अनुदात्त]), blocking the @deva[उभयप्रकृतिस्वर] of @ref[6.2.141]. The four exceptions (@deva[पृथिवी], @deva[रुद्र], @deva[पूषन्], @deva[मन्थिन्]) retain dual accent despite being @deva[अनुदात्तादि]. The @deva[उत्तरपद] repetition is a technical device ensuring proper qualifier scope.
"""

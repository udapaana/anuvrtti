id = "6.2.73"
numericId = "62073"

[en]
simple = """
A word denoting the object of comparison gets first-syllable accent when the second member ends in @deva[अक] affix and the compound is a term of address. So @deva[खर꣡मूषकः] ('donkey-mouse!') as vocative has first-syllable accent.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[उपमान] before @deva[अक]-ending words when expressing @deva[आह्वान] (calling/address). Example: @deva[खर꣡मूषकः] ('O mouse like a donkey!')—the comparison-word gets first-syllable accent in @deva[सम्बोधन] (vocative)-like usage.
"""

advanced = """
The @deva[उपमानस्य अके आह्वाने] condition: @deva[उपमान] + @deva[अक]-affix word in @deva[आह्वान] (address/calling) context takes @deva[आद्युदात्त]. @deva[खर꣡मूषक] ('mouse [stupid] like a donkey!' as insult/address). The comparison-@deva[सम्बोधन] (vocative) compound accents the comparison-standard.
"""

id = "6.2.133"
numericId = "62133"

[en]
simple = """
The word @deva[पुत्र] does not get first-syllable accent when preceded by words denoting: teachers (@deva[आचार्य]), kings (@deva[राजन्]), priests (@deva[ऋत्विज्]), wife's relatives (@deva[संयुक्त]), or blood relatives (@deva[ज्ञाति]). Also synonyms of these.
"""

standard = """
Five categories block @deva[पुत्र]-@deva[आद्युदात्त]: (1) @deva[आचार्य] 'teacher'; (2) @deva[राजन्] 'king'; (3) @deva[ऋत्विज्] 'priest'; (4) @deva[संयुक्त] 'wife's relatives' (like @deva[श्याल] 'brother-in-law'); (5) @deva[ज्ञाति] 'blood relatives' (through father or mother). The term @deva[आख्या] extends this to synonyms of these words.
"""

advanced = """
The five exception categories reflect social relationships: @deva[गुरु] (teacher), @deva[राजन्] (king), @deva[याजक] (priest), @deva[श्वशुराद्] (affinal kin), and @deva[सगोत्र] (agnates/cognates). The @deva[आख्या] provision extends the exception to synonyms (@deva[उपाध्याय] for @deva[आचार्य], etc.). This creates semantic rather than purely lexical exceptions to @ref[6.2.132].
"""

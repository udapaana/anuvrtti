id = "6.2.91"
numericId = "62091"

[en]
simple = """
Six words do not get first-syllable accent before @deva[अर्म]: @deva[भूत], @deva[अधिक], @deva[संजीव], @deva[मद्र], @deva[अश्मन्], and @deva[कञ्जल]. They keep final accent instead. Examples: @deva[भूतार्मम्], @deva[अधिकार्मम्], @deva[संजीवार्मम्], @deva[मद्रार्मम्], @deva[अश्मार्मम्], @deva[कञ्जलार्मम्]—all with acute on the final by @ref[6.1.223].
"""

standard = """
This @[sūtra] lists exceptions to @ref[6.2.90]. The six words @deva[भूत], @deva[अधिक], @deva[संजीव], @deva[मद्र], @deva[अश्मन्], @deva[कञ्जल] do not receive @deva[आद्युदात्त] before @deva[अर्म]. Instead, these compounds take @deva[अन्तोदात्त] by @ref[6.1.223]. A @[vārttika] notes that in Vedic usage, words like @deva[दिवोदास] have acute on the first syllable.
"""

advanced = """
The listing @deva[भूताधिकसंजीवमद्राश्मकञ्जलानाम्] provides exceptions to the @deva[आद्युदात्त] assigned by @ref[6.2.90]. The compound @deva[मद्राश्मार्मम्] demonstrates that @deva[मद्र] and @deva[अश्मन्] can compound together before @deva[अर्म]. The Vedic @[vārttika] (@deva[दिवोदासादीनां] @deva[छन्दस्याद्युदात्तत्वम्]) indicates dialectal variation in accent patterns.
"""

id = "6.2.53"
numericId = "62053"

[en]
simple = """
The @deva[गति] words @deva[नि] and @deva[अधि] (which end in @deva[इ]) DO keep their accent before @deva[अञ्च्] with @deva[व्]-affix. So @deva[न्य꣡ङ्] ('downward'), @deva[अध्य꣡ञ्च्] ('upward').
"""

standard = """
This @[sūtra] creates an exception to @ref[6.2.52]: @deva[नि] and @deva[अधि] preserve @deva[प्रकृतिस्वर] before @deva[अञ्च्] + @deva[वित्], despite being @deva[इ]-final. Examples: @deva[न्य꣡ङ्] ('downward-facing'), @deva[अध्य꣡ञ्च्] ('upward').
"""

advanced = """
The @deva[न्यधिभ्यामञ्चेः वौ] exception: @deva[नि] and @deva[अधि] (both @deva[इ]-final) preserve @deva[प्रकृतिस्वर] before @deva[अञ्च्] + @deva[क्विन्] (@deva[व्]-marked). This overrides @ref[6.2.52]'s @deva[अनिकुचः]. @deva[नि + अञ्च्] → @deva[न्य꣡ञ्च्] → @deva[न्य꣡ङ्]; @deva[अधि + अञ्च्] → @deva[अध्य꣡ञ्च्]. Special treatment for these two @deva[गति].
"""

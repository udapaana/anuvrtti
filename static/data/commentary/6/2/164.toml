id = "6.2.164"
numericId = "62164"

[en]
simple = """
In Vedic, the final-syllable accent on @deva[स्तन] after a numeral is optional. Examples: @deva[द्विस्तना] or @deva[द्विस्तना], @deva[चतुःस्तना] or @deva[चतुःस्तना].
"""

standard = """
In @deva[छन्दस्] (Vedic), @ref[6.2.163]'s @deva[अन्त्योदात्त] on @deva[स्तन] becomes optional. Either @deva[द्विस्तना] (final accent) or @deva[द्विस्तना] (first accent) is acceptable. Similarly @deva[चतुःस्तना] or @deva[चतुःस्तना]. This reflects Vedic accent variation.
"""

advanced = """
The Vedic @deva[विभाषा] allows alternation with the general @deva[बहुव्रीहि] accent pattern. The option creates @deva[द्विस्तना] (@deva[अन्त्योदात्त] by @ref[6.2.163]) or @deva[द्विस्तना] (@deva[आद्युदात्त] by general rules). This Vedic optionality is typical of accent rules in @deva[छन्दस्] sections.
"""

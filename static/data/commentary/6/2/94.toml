id = "6.2.94"
numericId = "62094"

[en]
simple = """
Before @deva[गिरि] 'mountain' or @deva[निकाय] 'group', the first member gets final-syllable accent when the compound is a proper name. Examples: @deva[अञ्जनागिरिः], @deva[भञ्जनागिरिः] (mountain names); @deva[शापिण्डनिकायः], @deva[मौण्डिनिकायः] (group names). Non-names like @deva[परमगिरिः] 'excellent mountain' don't get this accent.
"""

standard = """
This @[sūtra] assigns @deva[अन्त्योदात्त] to the @deva[पूर्वपद] before @deva[गिरि] or @deva[निकाय] when the compound is a @deva[संज्ञा] (proper name). The finals of @deva[अञ्जन] and @deva[भञ्जन] lengthen by @ref[6.3.117] yielding @deva[अञ्जनागिरिः]. The condition @deva[संज्ञायाम्] excludes common compounds like @deva[परमगिरिः] or @deva[ब्राह्मणनिकायः].
"""

advanced = """
The @deva[संज्ञा] condition distinguishes proper names (where accent marks identity) from descriptive compounds. Mountain names like @deva[अञ्जनागिरि] and group designations like @deva[शापिण्डनिकाय] receive @deva[पूर्वपदान्त्योदात्त]. The lengthening in @deva[अञ्जनागिरि] follows @ref[6.3.117] @deva[गिरिनद्यादिभ्योऽञ्जसंज्ञायाम्]. Without the name condition, regular compound accent applies.
"""

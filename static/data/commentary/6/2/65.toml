id = "6.2.65"
numericId = "62065"

[en]
simple = """
A first member in @deva[सप्तमी] (locative) case, or denoting a tax-receiver's name, gets first-syllable accent when the second member denotes 'portion'. So @deva[शु꣡ल्कभाग] ('tax portion') has accent on @deva[शु].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[सप्तमी]-sense or @deva[शुल्कग्राहिसंज्ञा] (tax-collector name) @deva[पूर्वपद] before @deva[भाग]-meaning words. Example: @deva[शु꣡ल्कभागः] ('toll-share')—first syllable accented.
"""

advanced = """
The @deva[सप्तम्यां शुल्कग्राहिसंज्ञायां भागे] condition: @deva[सप्तमी] (locative) or @deva[शुल्कग्राहिसंज्ञा] (customs-collector title) + @deva[भाग] ('share/portion') triggers @deva[आद्युदात्त]. @deva[शु꣡ल्कभाग] ('duty-share'). The administrative/fiscal compound takes first-syllable accent.
"""

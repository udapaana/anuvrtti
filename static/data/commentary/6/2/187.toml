id = "6.2.187"
numericId = "62187"

[en]
simple = """
After @deva[अप्] 'away', the words @deva[स्फिग्] 'buttock', @deva[पूत] 'pure', @deva[वीणा] 'lute', @deva[अञ्जस्] 'straight', @deva[अध्वन्] 'path', @deva[कुक्षि] 'belly', @deva[नामन्] 'name', and plough-words get final accent. Examples: @deva[अपस्फिगम्], @deva[अपपूतम्], @deva[अपवीणम्].
"""

standard = """
Seven words plus plough-terms receive @deva[अन्त्योदात्त] after @deva[अप्]: @deva[अपस्फिगम्], @deva[अपपूतम्], @deva[अपवीणम्], @deva[अपाञ्जः], @deva[अपाध्वा] (without @deva[समासान्त] @deva[अच्] by @ref[5.4.85]; with it, accent still final since @deva[अच्] is @deva[चित्]]); @deva[अपकुक्षिः]; @deva[अपनाम]; plough-words.
"""

advanced = """
The @deva[हलवाचिन्] (plough-denoting) extension adds agricultural terms to the list. The @deva[अपाध्वन्] case shows interaction with @deva[समासान्त]: without @deva[अच्] (@ref[5.4.85]), this rule gives @deva[अन्त्योदात्त]; with @deva[अच्] (a @deva[चित्] affix), the @deva[चित्]-accent also falls on final. Either way, the accent is final.
"""

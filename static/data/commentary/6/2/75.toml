id = "6.2.75"
numericId = "62075"

[en]
simple = """
A compound with @deva[अण्]-affix second member denoting a functionary gets first-syllable accent. So @deva[छ꣡त्राध्यापकः] ('umbrella-teacher' = royal tutor) has accent on @deva[छ].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to compounds with @deva[कृत्]-affix @deva[अण्] final @deva[उत्तरपद] denoting @deva[अधिकारिन्] (official/functionary). Example: @deva[छ꣡त्राध्यापकः] ('umbrella-bearer' = royal attendant who teaches).
"""

advanced = """
The @deva[अधिकारिणि कृत्यण्] condition: @deva[अण्]-@deva[कृत्] ending word denoting @deva[अधिकारिन्] (office-holder/functionary) triggers @deva[आद्युदात्त]. @deva[छ꣡त्राध्यापक] ('umbrella-teacher'), where the first member indicates the functional context. Official-title compounds take first-syllable accent.
"""

id = "6.2.18"
numericId = "62018"

[en]
simple = """
In a @deva[तत्पुरुष] compound ending in @deva[पति] ('master/lord'), the first member keeps its accent when @deva[पति] means 'lord' or 'master'. So @deva[गृह꣡पतिः] ('house-master'), @deva[सेना꣡पतिः] ('army-commander').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[पति]-final @deva[तत्पुरुष] when @deva[पति] means @deva[ईश्वर] ('lord/master'). Examples: @deva[गृह꣡पतिः] ('householder'), @deva[सेना꣡पतिः] ('general'), @deva[नर꣡पतिः] ('king'). The lordship meaning triggers first-member accent.
"""

advanced = """
The @deva[पत्यन्ते ईश्वरे] condition: @deva[पति] as @deva[उत्तरपद] in the sense of @deva[ईश्वर] ('ruler/master'). The @deva[पूर्वपद] indicates domain of lordship: @deva[गृह꣡पति] ('house-lord'), @deva[सेना꣡पति] ('army-lord'). When @deva[पति] means 'husband' (as in @deva[जायापती]), different accent applies. The @deva[ईश्वर] sense preserves @deva[प्रकृतिस्वर].
"""

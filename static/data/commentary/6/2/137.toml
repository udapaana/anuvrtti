id = "6.2.137"
numericId = "62137"

[en]
simple = """
The word @deva[भगाल] and its synonyms at the end of a @deva[तत्पुरुष] keep their original accent. Examples: @deva[कुम्भीभगालम्], @deva[कुम्भीकपालम्], @deva[कुम्भीनदालम्]. These words have acute on the middle syllable by @[phiṭ] II.9.
"""

standard = """
The word @deva[भगाल] and synonyms (@deva[कपाल], @deva[नदाल]) retain @deva[प्रकृतिस्वर] (original accent) in @deva[तत्पुरुष]. Examples: @deva[कुम्भीभगालम्], @deva[कुम्भीकपालम्], @deva[कुम्भीनदालम्]. These words have @deva[मध्योदात्त] (middle acute) by @[phiṭ] II.9. The term @deva[प्रकृत्य] governs through @ref[6.2.143].
"""

advanced = """
This begins the @deva[प्रकृतिस्वर] section (@ref[6.2.137]-@ref[6.2.143]) where @deva[उत्तरपद] retains inherent accent. The @deva[भगाल] class (@[phiṭ] II.9 @deva[मध्योदात्त]) includes synonyms by the @[paryāya] extension. The @deva[प्रकृत्य] @deva[अनुवृत्ति] indicates that both compound members may retain original accents in certain configurations.
"""

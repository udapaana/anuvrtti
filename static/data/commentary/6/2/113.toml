id = "6.2.113"
numericId = "62113"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, @deva[कर्ण] 'ear' as second member gets first-syllable accent when the compound is a name or denotes resemblance. Name examples: @deva[कुञ्चिकर्णः], @deva[मणिकर्णः]. Resemblance: @deva[गोकर्णः] 'cow-eared', @deva[खरकर्णः] 'donkey-eared'.
"""

standard = """
This extends @deva[कर्ण]'s @deva[आद्युदात्त] to @deva[संज्ञा] (names) and @deva[उपमान] (resemblance) @deva[बहुव्रीहि]. Names: @deva[कुञ्चिकर्णः], @deva[मणिकर्णः] (proper names). Resemblance: @deva[गोकर्णः], @deva[खरकर्णः] describe persons with ears like a cow or donkey. Both conditions trigger @deva[उत्तरपदाद्युदात्त].
"""

advanced = """
The @deva[संज्ञा]/@deva[उपमान] conditions extend @ref[6.2.112]'s scope beyond @deva[वर्ण]/@deva[लक्षण]. Resemblance compounds (@deva[गोकर्ण] 'having cow-like ears') and proper names (@deva[मणिकर्ण]) both receive @deva[कर्ण]-@deva[आद्युदात्त]. The semantic overlap with @ref[6.2.112] suggests these are complementary rather than competing conditions.
"""

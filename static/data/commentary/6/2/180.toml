id = "6.2.180"
numericId = "62180"

[en]
simple = """
The word @deva[अन्तर्] 'within/between' gets final-syllable accent when preceded by a preposition. Examples: @deva[प्रान्तः] 'edge/border', @deva[पर्यन्तः] 'surrounding'. These can be @deva[बहुव्रीहि] or @deva[प्रादि] compounds.
"""

standard = """
When @deva[अन्तर्] follows an @deva[उपसर्ग], it receives @deva[अन्त्योदात्त]: @deva[प्रान्तः], @deva[पर्यन्तः]. These formations may be @deva[बहुव्रीहि] ('having its end near') or @deva[प्रादिसमास] (prefix compound). The accent falls on the final syllable of @deva[अन्तर्].
"""

advanced = """
The @deva[उपसर्ग] + @deva[अन्तर्] pattern yields @deva[अन्त्योदात्त]. The compound interpretation varies: @deva[बहुव्रीहि] @deva[प्रान्त] = 'having end near/prominent'; @deva[प्रादिसमास] treats the whole as a unit. Both yield the same accent by this rule. This complements @ref[6.2.179]'s treatment of @deva[अन्तर्] as @deva[पूर्वपद].
"""

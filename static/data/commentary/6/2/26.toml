id = "6.2.26"
numericId = "62026"

[en]
simple = """
In a @deva[कर्मधारय] compound, the word @deva[कुमार] ('young/boy') as first member keeps its original accent. So @deva[कुमार꣡कुलटा] ('young wanton woman'), @deva[कुमार꣡श्रमणा] ('young female ascetic').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[कुमार] in @deva[कर्मधारय] compounds. Examples: @deva[कुमार꣡कुलटा] ('young loose woman'), @deva[कुमार꣡श्रमणा] ('young nun'), @deva[कुमार꣡तापसी] ('young female ascetic'). The adjective @deva[कुमार] retains its accent.
"""

advanced = """
The @deva[कर्मधारये कुमारस्य] rule preserves @deva[कुमार]'s accent in @deva[कर्मधारय]. @deva[कुमार] ('young/childlike') + various nouns: @deva[कुमार꣡कुलटा], @deva[कुमार꣡श्रमणा], @deva[कुमार꣡तापसी]. The @deva[कर्मधारय] is an appositional compound where @deva[कुमार] qualifies the second member. This rule ensures the adjectival first member keeps its inherent accent.
"""

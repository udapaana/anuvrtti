id = "6.2.70"
numericId = "62070"

[en]
simple = """
A word denoting an ingredient of @deva[मैरेय] (a type of wine) gets first-syllable accent before @deva[मैरेय]. So @deva[गु꣡डमैरेयः] ('jaggery-wine') has accent on @deva[गु].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to ingredient-words before @deva[मैरेय] (a fermented drink). Example: @deva[गु꣡डमैरेयः] ('@deva[मैरेय] made from jaggery')—the ingredient gets first-syllable accent.
"""

advanced = """
The @deva[मैरेये तत्प्रकृतेः] condition: @deva[तत्प्रकृति] (ingredient/source) of @deva[मैरेय] takes @deva[आद्युदात्त]. @deva[गुड + मैरेय] = @deva[गु꣡डमैरेय] ('jaggery-based @deva[मैरेय]'). The compound specifying beverage-ingredient shows first-syllable accent on the ingredient.
"""

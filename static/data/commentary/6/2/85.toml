id = "6.2.85"
numericId = "62085"

[en]
simple = """
The first member gets first-syllable accent before @deva[घोष] ('sound/camp') and similar words in this list. So @deva[दा꣡क्षिघोषः], @deva[दा꣡क्षिकटः], @deva[दा꣡क्षिपल्वलः].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] before @deva[घोषादि] words. Examples: @deva[दा꣡क्षिघोषः] ('southern camp'), @deva[दा꣡क्षिकटः], @deva[दा꣡क्षिपल्वलः]. The @deva[आदि] indicates a @deva[गण] of place-denoting second members.
"""

advanced = """
The @deva[घोषादिषु] introduces a @deva[गण] including @deva[घोष] ('cowherds' camp'), @deva[कट], @deva[पल्वल], and similar words. Compounds with these @deva[उत्तरपद] take @deva[आद्युदात्त]: @deva[दा꣡क्षिघोष], @deva[दा꣡क्षिकट], @deva[दा꣡क्षिपल्वल]. These denote locations/settlements.
"""

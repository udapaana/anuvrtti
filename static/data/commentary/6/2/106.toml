id = "6.2.106"
numericId = "62106"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, the word @deva[विश्व] gets final-syllable accent when the compound is a name. Examples: @deva[विश्वदेवः], @deva[विश्वयशाः], @deva[विश्वमहान्]. This overrides the general rule @ref[6.2.1] that would preserve the original accent.
"""

standard = """
The word @deva[विश्व] 'all' receives @deva[अन्त्योदात्त] in @deva[बहुव्रीहि] @deva[संज्ञा] compounds, overriding @ref[6.2.1]. In @deva[विश्वदेवः] (a name), @deva[विश्व]'s final is acute. But @deva[विश्वदेवाः] (@deva[द्वन्द्व] = @deva[विश्वे] @deva[च] @deva[देवाः]) and non-name @deva[विश्वदेवः] (@deva[विश्वेदेवा] @deva[अस्य]) follow @ref[6.2.1]. Names like @deva[विश्वामित्रः] and @deva[विश्वाजिनः] have final accent.
"""

advanced = """
The @deva[संज्ञा] condition creates a three-way distinction: (1) @deva[बहुव्रीहि] names like @deva[विश्वदेवः] get @deva[पूर्वपदान्त्योदात्त]; (2) @deva[द्वन्द्व] @deva[विश्वदेवाः] retains original accent by @ref[6.2.1]; (3) non-name @deva[बहुव्रीहि] @deva[विश्वदेवः] also follows @ref[6.2.1]. The names @deva[विश्वामित्र] and @deva[विश्वाजिन] with compound-final accent demonstrate that specific proper names may follow different patterns.
"""

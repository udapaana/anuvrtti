id = "6.2.132"
numericId = "62132"

[en]
simple = """
The word @deva[पुत्र] 'son' gets first-syllable accent when following a masculine noun in a @deva[तत्पुरुष]. Examples: @deva[कौनटिपुत्रः] 'son of @[kaunaṭi]', @deva[दामकपुत्रः], @deva[माहिषपुत्रः]. Not after feminine: @deva[गार्गीपुत्रः], @deva[वात्सीपुत्रः].
"""

standard = """
When @deva[पुत्र] follows a @deva[पुंल्लिङ्ग] (masculine) word in @deva[तत्पुरुष], it receives @deva[आद्युदात्त]: @deva[कौनटिपुत्रः], @deva[दामकपुत्रः], @deva[माहिषपुत्रः]. The @deva[पुंल्लिङ्ग] condition excludes feminine @deva[पूर्वपद]: @deva[गार्गीपुत्रः], @deva[वात्सीपुत्रः] (sons named after mothers). Non-@deva[पुत्र] words don't qualify: @deva[कौनटिमातुलः].
"""

advanced = """
The @deva[पुंल्लिङ्ग] condition distinguishes patronymics (father-derived) from metronymics (mother-derived). The masculine @deva[पूर्वपद] (@deva[कौनटि] from @deva[कुनट]) triggers @deva[पुत्र]-@deva[आद्युदात्त], while feminine (@deva[गार्गी], @deva[वात्सी]) yields different accent. This reflects the asymmetry in Sanskrit naming conventions.
"""

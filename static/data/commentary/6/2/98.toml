id = "6.2.98"
numericId = "62098"

[en]
simple = """
Before @deva[सभा] 'assembly', the first member gets final-syllable accent when the compound is neuter gender. Examples: @deva[गोपालसभम्] 'cowherds' assembly', @deva[पशुपालसभम्] 'shepherds' assembly', @deva[स्त्रीसभम्] 'women's assembly'. When @deva[सभा] stays feminine, like @deva[राजसभा], this accent doesn't apply.
"""

standard = """
The neuter gender condition (@deva[नपुंसकं] @deva[यत्]) is key. The word @deva[सभा] becomes neuter by @ref[2.4.23]-@ref[2.4.24] in certain compounds. When neuter, the @deva[पूर्वपद] receives @deva[अन्त्योदात्त]: @deva[गोपालसभम्], @deva[दासीसभम्]. When @deva[सभा] remains feminine (@deva[राजसभा], @deva[ब्राह्मणसभा]), regular accent applies.
"""

advanced = """
The @deva[नपुंसक] condition ties accent to gender transformation. Rules @ref[2.4.23]-@ref[2.4.24] specify when @deva[सभा] becomes neuter in compounds. This accent rule applies only when that gender change occurs. The correlation between gender and accent reflects the compound's semantic specialization—neuter @deva[सभम्] compounds often denote specific institutional assemblies.
"""

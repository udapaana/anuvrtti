id = "6.2.54"
numericId = "62054"

[en]
simple = """
The word @deva[ईषत्] ('slightly') as first member may optionally keep its accent. So @deva[ईषत्कडारः] ('slightly brown') can be @deva[ईष꣡त्कडारः] or @deva[ईषत्कडार꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[ईषत्] as @deva[पूर्वपद]. Either @deva[ईष꣡त्कडारः] (first-member accent) or @deva[ईषत्कडार꣡ः] (final accent) is valid. Similarly @deva[ईष꣡त्पिङ्गलः/ईषत्पिङ्गल꣡ः] ('slightly tawny').
"""

advanced = """
The @deva[ईषदर्थे वा] provides @deva[विभाषा] for @deva[ईषत्] ('slightly/somewhat'). The @deva[ईषत्] + adjective compounds show optional first-member accent: @deva[ईष꣡त्कडार/ईषत्कडार꣡]. This optionality reflects the adverbial nature of @deva[ईषत्] in compounds.
"""

id = "6.2.9"
numericId = "62009"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[शारद] ('autumnal') as second member, the first member keeps its accent when @deva[शारद] has any meaning other than 'relating to autumn'. So when @deva[शारद] means 'year-old' or similar, first-member accent applies.
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[शारद]-final @deva[तत्पुरुष] when @deva[शारद] doesn't mean @deva[आर्तव] ('seasonal/autumnal'). When @deva[शारद] means 'year-old' or other non-autumnal senses, the first member retains accent. The @deva[आर्तव] (autumn-related) sense takes default accent.
"""

advanced = """
The @deva[शारदे अनार्तवे] condition: @deva[शारद] as @deva[उत्तरपद] when NOT meaning @deva[आर्तव] ('pertaining to the autumn season'). The @deva[शारद] can mean 'year/year-old' (from @deva[शरद्] 'autumn' as time-unit). In this extended sense, @deva[पूर्वपद प्रकृतिस्वर] applies. The seasonal meaning follows default @deva[अन्तोदात्त].
"""

id = "6.2.122"
numericId = "62122"

[en]
simple = """
In a @deva[द्विगु] compound (numeral determinative), five words as second member get first-syllable accent: @deva[कंस] 'cup', @deva[मन्थ] 'churned drink', @deva[शूर्प] 'winnowing basket', @deva[पाय्य] 'milk', and @deva[काण्ड] 'section'. Examples: @deva[द्विकंसः] 'bought for two cups', @deva[त्रिमन्थः], @deva[द्विशूर्पः].
"""

standard = """
In @deva[द्विगु] compounds, five @deva[उत्तरपद] receive @deva[आद्युदात्त]: @deva[कंस], @deva[मन्थ], @deva[शूर्प], @deva[पाय्य], @deva[काण्ड]. The affix @deva[टिठन्] (@ref[5.1.25]) is elided by @ref[5.1.28] in @deva[द्विकंसः] (@deva[द्वाभ्यां] @deva[कंसाभ्यां] @deva[क्रीतः]). Similarly @deva[ठक्] (@ref[4.1.19]) is elided in @deva[द्विमन्थः]; @deva[अञ्] (@ref[5.1.26]) in @deva[द्विशूर्पः].
"""

advanced = """
The @deva[द्विगु] compounds here denote price or measure. Affix elision by @ref[5.1.28] removes @deva[तद्धित] markers, leaving the bare compound. The numeral + measure-word pattern (@deva[द्विकंस] 'two-cups'-worth') shows the compositional semantics. Each @deva[उत्तरपद] receives @deva[आद्युदात्त] on its first syllable.
"""

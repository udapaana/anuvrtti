id = "6.2.59"
numericId = "62059"

[en]
simple = """
The word @deva[राजन्] ('king') optionally keeps its accent in @deva[कर्मधारय] before @deva[ब्राह्मण] or @deva[कुमार]. So @deva[राजब्राह्मणः] can be @deva[राज꣡ब्राह्मणः] or @deva[राजब्राह्मण꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[राजन्] before @deva[ब्राह्मण/कुमार] in @deva[कर्मधारय]. Examples: @deva[राज꣡ब्राह्मणः/राजब्राह्मण꣡ः] ('royal brahmin'), @deva[राज꣡कुमारः/राजकुमार꣡ः] ('prince').
"""

advanced = """
The @deva[राज्ञः] provides @deva[विभाषा] for @deva[राजन्] + @deva[ब्राह्मण/कुमार] (continuing from @ref[6.2.58]). @deva[राज꣡ब्राह्मण/राजब्राह्मण꣡] ('brahmin serving king'), @deva[राज꣡कुमार/राजकुमार꣡] ('king's son/prince'). The title @deva[राजन्] shows accent optionality with these specific nouns.
"""

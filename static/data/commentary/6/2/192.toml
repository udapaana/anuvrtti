id = "6.2.192"
numericId = "62192"

[en]
simple = """
After @deva[नि] 'down', the second member gets final-syllable accent when the meaning is 'not laying down' or 'concealing'. Examples: @deva[निमूलम्] 'roots hidden', @deva[न्यक्षम्] 'eyes hidden', @deva[नितृणम्] 'grass concealed'. 'Laying down' meaning: @deva[निवाक्], @deva[निदण्डः].
"""

standard = """
When @deva[नि] means @deva[अनिधान] (not laying down/concealment), @deva[उत्तरपद] receives @deva[अन्त्योदात्त]: @deva[निमूलम्], @deva[न्यक्षम्], @deva[नितृणम्]. These may be @deva[बहुव्रीहि] or @deva[प्रादिसमास] (as @deva[अव्ययीभाव], @ref[6.1.223] applies anyway). Counterexamples: @deva[निवाक्] (@deva[निहितवाक्] = having laid down speech), @deva[निदण्डः] (@deva[निहितदण्डः] = having laid down stick).
"""

advanced = """
The @deva[निधान]/@deva[अनिधान] (laying down/not laying down) semantic distinction governs accent. @deva[अनिधान] = @deva[अप्रकाशता] (not manifesting/concealing). The @deva[निवाक्] counterexample shows @deva[नि] in its 'placing down' sense yields different accent. The prefix @deva[नि] has dual semantics: placement vs. concealment.
"""

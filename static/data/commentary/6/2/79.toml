id = "6.2.79"
numericId = "62079"

[en]
simple = """
A compound ending in the @deva[कृत्] affix @deva[णिनि] (producing @deva[इन्]) gets first-syllable accent on its first member. So @deva[पु꣡ष्पहारी] ('flower-stealer'), @deva[फ꣡लहारी] ('fruit-stealer').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[णिनि]-ending (@deva[इन्]-affix) compounds. Examples: @deva[पु꣡ष्पहारिन्] ('flower-bearer'), @deva[फ꣡लहारिन्] ('fruit-carrier'). The @deva[णिनि] agent-noun compounds take first-syllable accent.
"""

advanced = """
The @deva[कृत्णिनौ] condition: @deva[कृत्]-affix @deva[णिनि] (@ref[3.2.78] etc.) compounds trigger @deva[आद्युदात्त] on @deva[पूर्वपद]. @deva[पु꣡ष्पहारिन्], @deva[फ꣡लहारिन्], @deva[ज꣡लधारिन्]. The @deva[इन्]-suffix agent nouns consistently take first-syllable accent in their @deva[उपपद] compounds.
"""

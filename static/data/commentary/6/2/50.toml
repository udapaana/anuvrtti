id = "6.2.50"
numericId = "62050"

[en]
simple = """
A @deva[गति] word keeps its accent immediately before a @deva[कृत्] affix that begins with @deva[त्] and has indicatory @deva[न्] but not @deva[ञ्]. So @deva[प्र꣡स्थान] ('departure'), @deva[प्र꣡दान] ('giving').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[गति] before @deva[तादि नित् अञ्ञित्] @deva[कृत्] affixes. These are @deva[त्]-initial affixes with @deva[न्] marker but not @deva[ञ्]. Examples: @deva[प्र꣡स्थान] ('setting out'), @deva[प्र꣡दान] ('giving forth').
"""

advanced = """
The @deva[साक्षात् तादौ नित्यञ्ञिति कृति] condition: @deva[गति] immediately + @deva[कृत्] that is @deva[तादि] (@deva[त्]-initial), @deva[नित्] (has @deva[न्] marker), but @deva[अञ्ञित्] (lacks @deva[ञ्]). Affixes like @deva[ल्युट्] (→ @deva[अन]) qualify: @deva[प्र꣡स्थान], @deva[प्र꣡दान]. The @deva[गति] preserves @deva[प्रकृतिस्वर].
"""

id = "6.2.33"
numericId = "62033"

[en]
simple = """
The particles @deva[परि], @deva[प्रति], @deva[उप], and @deva[अप] keep their accent in @deva[अव्ययीभाव] compounds when the second member specifies an exclusion or a portion of day/night. So @deva[प꣡रिरात्रम्] ('throughout the night').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[परि/प्रति/उप/अप] in @deva[अव्ययीभाव] when the @deva[उत्तरपद] indicates @deva[व्यावृत्ति] (exclusion) or @deva[अहोरात्रावयव] (part of day/night). Examples: @deva[प꣡रिरात्रम्] ('all night'), @deva[प्र꣡तिदिवसम्] ('daily').
"""

advanced = """
The @deva[परिप्रत्युपापः व्यावृत्तावहोरात्रावयवे च] rule: these four @deva[उपसर्ग]-like particles preserve @deva[प्रकृतिस्वर] in @deva[अव्ययीभाव] when expressing @deva[व्यावृत्ति] (distinction/exclusion) or time-portions. @deva[प꣡रिरात्र] ('through the night'), @deva[प्र꣡तिदिवस] ('each day'). The semantic conditions govern the accent.
"""

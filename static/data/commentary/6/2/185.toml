id = "6.2.185"
numericId = "62185"

[en]
simple = """
The word @deva[मुख] 'face' gets final-syllable accent after @deva[अभि] 'towards'. Example: @deva[अभिमुखम्] 'facing towards'. This applies whether @deva[बहुव्रीहि], @deva[प्रादिसमास], or @deva[अव्ययीभाव].
"""

standard = """
After @deva[अभि], @deva[मुख] receives @deva[अन्त्योदात्त]: @deva[अभिमुखम्]. This extends @ref[6.2.177] (which required @deva[ध्रुव] @deva[स्वाङ्ग]) to @deva[मुख] even when not a body part or when the compound isn't @deva[बहुव्रीहि]. As @deva[अव्ययीभाव], @ref[6.1.223] would also give final accent. Example: @deva[अभिमुखा] @deva[सरस्वती].
"""

advanced = """
This @[sūtra] generalizes beyond @ref[6.2.177]'s @deva[बहुव्रीहि] + @deva[ध्रुव] @deva[स्वाङ्ग] conditions. After @deva[अभि], @deva[मुख] takes @deva[अन्त्योदात्त] regardless of compound type or body-part meaning. The overlap with @ref[6.1.223] (for @deva[अव्ययीभाव]) confirms the accent pattern across interpretations.
"""

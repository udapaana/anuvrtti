id = "6.2.111"
numericId = "62111"

[en]
simple = """
This is a heading rule (@deva[अधिकार]). From here through @ref[6.2.136], the @[sūtras] teach that the first syllable of the second member (@deva[उत्तरपद]) gets acute accent. The word @deva[उत्तरपद] continues to the chapter's end; @deva[आदि] 'first syllable' extends to @ref[6.2.187].
"""

standard = """
This @deva[अधिकार] establishes @deva[उत्तरपदाद्युदात्त]: the @deva[उत्तरपद]'s first syllable receives acute. The scope differs: @deva[उत्तरपद] governs through chapter end, while @deva[आदि] extends only to @ref[6.2.187]. This section (@ref[6.2.111]-@ref[6.2.136]) assigns @deva[आद्युदात्त] to specific @deva[उत्तरपद] in @deva[बहुव्रीहि] compounds.
"""

advanced = """
The dual-scope @deva[अधिकार] separates @deva[उत्तरपद] (through 6.2 end) from @deva[आदि] (through @ref[6.2.187]). This technical structure allows later rules to reference @deva[उत्तरपद] accent without the 'first syllable' specification. The phrase @deva[कुण्डं] @deva[वनम्] at @ref[6.2.136] marks the @deva[आदि] section's terminus for this specific accent pattern.
"""

id = "6.2.143"
numericId = "62143"

[en]
simple = """
This is a heading rule (@deva[अधिकार]). From here to the chapter's end, the @[sūtras] teach that the last syllable of the second member (@deva[उत्तरपद]) gets acute accent. This is called @deva[उत्तरपदान्त्योदात्त].
"""

standard = """
This @deva[अधिकार] establishes @deva[उत्तरपदान्त्योदात्त] (acute on the final syllable of @deva[उत्तरपद]) for the remaining @[sūtras] of chapter 6.2. This contrasts with the earlier @ref[6.2.111] @deva[अधिकार] which assigned @deva[उत्तरपदाद्युदात्त] (accent on first syllable of @deva[उत्तरपद]).
"""

advanced = """
This @deva[अधिकार] closes the @deva[प्रकृतिस्वर] section (@ref[6.2.137]-@ref[6.2.142]) and opens the @deva[उत्तरपदान्त्योदात्त] section extending to chapter end. The systematic progression—@deva[पूर्वपदाद्युदात्त] (@ref[6.2.64]), @deva[पूर्वपदान्त्योदात्त] (@ref[6.2.92]), @deva[उत्तरपदाद्युदात्त] (@ref[6.2.111]), @deva[उत्तरपदान्त्योदात्त] (@ref[6.2.143])—covers all possible compound accent locations.
"""

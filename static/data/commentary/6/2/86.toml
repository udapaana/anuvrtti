id = "6.2.86"
numericId = "62086"

[en]
simple = """
The words @deva[छात्रि] ('student') and similar get first-syllable accent before @deva[शाला] ('hall'). So @deva[छा꣡त्रिशाला] ('students' hall'), @deva[ऐ꣡लिशाला], @deva[भा꣡ण्डिशाला].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[छात्र्यादि] before @deva[शाला] ('hall/building'). Examples: @deva[छा꣡त्रिशाला] ('student hall'), @deva[ऐ꣡लिशाला], @deva[भा꣡ण्डिशाला] ('warehouse'). Listed first members take first-syllable accent with @deva[शाला].
"""

advanced = """
The @deva[छात्र्यादीनां शालायाम्] introduces words taking @deva[आद्युदात्त] before @deva[शाला]. @deva[छा꣡त्रिशाला] ('students' quarters'), @deva[ऐ꣡लिशाला], @deva[भा꣡ण्डिशाला] ('storage hall'). The @deva[आदि] indicates a @deva[गण] of specific compounds with @deva[शाला].
"""

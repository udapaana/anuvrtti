id = "6.2.42"
numericId = "62042"

[en]
simple = """
The first member keeps its accent in specific compounds: @deva[कुरु꣡गार्हपत], @deva[रिक्त꣡गुरु], @deva[असूत꣡जरती], @deva[अश्लील꣡दृढरूपा], @deva[पारे꣡वडवा], @deva[तैतिल꣡कद्रू], @deva[पण्य꣡वेश]. These are listed exceptions.
"""

standard = """
This @[sūtra] lists specific compounds with @deva[पूर्वपद प्रकृतिस्वर]: @deva[कुरुगार्हपत], @deva[रिक्तगुरु], @deva[असूतजरती], @deva[अश्लीलदृढरूपा], @deva[पारेवडवा], @deva[तैतिलकद्रू], @deva[पण्यवेश]. Each preserves first-member accent as listed exceptions (@deva[निपातन]).
"""

advanced = """
The listing @deva[कुरुगार्हपतरिक्तगुर्वसूतजरत्यश्लीलदृढरूपापारेवडवातैतिलकद्रूःपण्यवेशाश्च] enumerates specific compounds with @deva[पूर्वपद स्वर]. These are @deva[निपातन]—they must be memorized individually. The compounds span various semantic types but share this accent pattern.
"""

id = "6.2.145"
numericId = "62145"

[en]
simple = """
The @deva[क्त] participle gets final-syllable accent when preceded by @deva[सु] 'well' or by a comparison word (@deva[उपमान]). Examples: @deva[सुकृतम्] 'well-done', @deva[सुभुक्तम्] 'well-eaten'; @deva[वृकावलुप्तम्] 'wolf-torn', @deva[सिंहविनर्दितम्] 'lion-roared'.
"""

standard = """
Two conditions trigger @deva[अन्त्योदात्त] on @deva[क्त]: (1) @deva[सु]-prefix: @deva[सुकृतम्], @deva[सुभुक्तम्], @deva[सुपीतम्]; (2) @deva[उपमान]-@deva[पूर्वपद]: @deva[वृकावलुप्तम्] 'torn as if by a wolf', @deva[शशलुप्तम्], @deva[सिंहविनर्दितम्]. This overrides @ref[6.2.49] and @ref[6.2.48]. When @deva[सु] is not @deva[गति]: @deva[सुस्तुतम्] @deva[भवता] follows different accent.
"""

advanced = """
The @deva[सु]-@deva[गति] and @deva[उपमान] conditions create @deva[अन्त्योदात्त] exceptions to the @deva[प्रकृतिस्वर] of @ref[6.2.139] (via @ref[6.2.49]) and the @deva[पूर्वपद] accents of @ref[6.2.48]. The @deva[उपमान] compounds compare the action to that of an animal: @deva[वृकावलुप्त] = 'torn in the manner of wolf-tearing'. The non-@deva[गति] @deva[सु] condition excludes cases where @deva[सु] means 'well praised'.
"""

id = "6.2.3"
numericId = "62003"

[en]
simple = """
In a @deva[तत्पुरुष] compound where one color word is compounded with another, the first member keeps its accent—except when the first word is @deva[एत] ('variegated'). So @deva[नी꣡ललोहितः] ('blue-red') keeps first-member accent.
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] when a color term (@deva[वर्णवाचिन्]) compounds with another color term. Exception: @deva[एत] ('spotted/variegated') as first member doesn't follow this. Example: @deva[नी꣡ललोहितः] ('bluish-red'). But @deva[एतलोहितः] would have different accent.
"""

advanced = """
The @deva[वर्णो वर्णेन अनेतेन] rule: color + color compounds preserve @deva[पूर्वपद स्वर], unless the first member is @deva[एत]. The @deva[अनेतेन] exception removes @deva[एत]-initial compounds from this rule. Color compounds like @deva[नी꣡ललोहित], @deva[पी꣡तलोहित] show first-member accent. The @deva[एत] exception reflects its special semantic status as 'variegated' rather than a simple color.
"""

id = "6.2.10"
numericId = "62010"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[अध्वर्यु] ('Yajurveda priest') or @deva[कषाय] ('astringent/red-brown') as second member, the first member keeps its accent when these words denote a class/genus. So @deva[प्रा꣡च्याध्वर्युः] ('eastern-style priest').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[अध्वर्यु/कषाय]-final @deva[तत्पुरुष] when these denote @deva[जाति] (genus/class). Example: @deva[प्रा꣡च्याध्वर्युः] ('priest of the eastern tradition'). The generic/class meaning triggers first-member accent.
"""

advanced = """
The @deva[अध्वर्युकषाययोर्जातौ] condition: @deva[अध्वर्यु] (adhvaryu priest) and @deva[कषाय] (astringent/color type) as @deva[उत्तरपद] when denoting @deva[जाति] (class/kind). @deva[प्रा꣡च्याध्वर्यु] refers to a priestly tradition (class), not an individual. The @deva[जाति] sense (generic) vs. individual reference determines accent.
"""

id = "6.2.4"
numericId = "62004"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[गाध] ('depth') or @deva[लवण] ('salt') as second member, the first member keeps its accent when the compound expresses measure or quantity. So @deva[श꣡म्यागाधम्] ('as deep as a @deva[शम्या] stick').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[तत्पुरुष] with @deva[गाध/लवण] as @deva[उत्तरपद] when expressing @deva[परिमाण] (measure/mass). Examples: @deva[श꣡म्यागाधम्] ('depth measured by @deva[शम्या]'), @deva[आ꣡ढकलवणम्] ('salt measure of @deva[आढक]'). The measuring sense triggers first-member accent.
"""

advanced = """
The @deva[गाधलवणयोः परिमाणे] condition restricts to measuring contexts. @deva[गाध] (depth) and @deva[लवण] (salt, used as measure) take @deva[पूर्वपद स्वर] when the first member specifies quantity. @deva[श꣡म्यागाध] = 'shaft-deep'; @deva[आ꣡ढकलवण] = '@[āḍhaka-measure] of salt'. Without the measuring sense, default @deva[अन्तोदात्त] would apply.
"""

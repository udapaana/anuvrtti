id = "6.2.61"
numericId = "62061"

[en]
simple = """
A word meaning 'always' optionally keeps its accent before a @deva[क्त]-participle. So @deva[नित्यप्रहसितः] ('always laughing') can be @deva[नि꣡त्यप्रहसितः] or @deva[नित्यप्रहसित꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[नित्यार्थ] ('always'-meaning) words before @deva[क्त]. Examples: @deva[नि꣡त्यप्रहसितः/नित्यप्रहसित꣡ः] ('constantly laughing'), @deva[सतत꣡प्रहसितः/सततप्रहसित꣡ः] ('perpetually laughing').
"""

advanced = """
The @deva[नित्यार्थे क्ते वा] condition: words expressing @deva[नित्य] ('constant/always') + @deva[क्त] show @deva[विभाषा]. @deva[नित्य], @deva[सतत], @deva[सदा] etc. before participles: @deva[नि꣡त्यप्रहसित/नित्यप्रहसित꣡]. The temporal-adverbial qualifier shows optional accent retention.
"""

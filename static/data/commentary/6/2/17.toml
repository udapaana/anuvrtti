id = "6.2.17"
numericId = "62017"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[स्वामिन्] ('owner/master') as second member, the first member keeps its accent when it denotes the thing possessed. So @deva[गो꣡स्वामी] ('cow-owner'), @deva[अ꣡श्वस्वामी] ('horse-owner').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[स्वामिन्]-final @deva[तत्पुरुष] when the first member denotes @deva[स्व] (possession). Examples: @deva[गो꣡स्वामी] ('owner of cows'), @deva[अ꣡श्वस्वामी] ('owner of horses'). The 'possessor-of-X' meaning triggers first-member accent.
"""

advanced = """
The @deva[स्वामिनि स्वस्य] condition: @deva[स्वामिन्] ('owner/lord') as @deva[उत्तरपद] when @deva[पूर्वपद] indicates @deva[स्व] (what is owned). The possessive relationship (X's owner) preserves @deva[प्रकृतिस्वर]: @deva[गो꣡स्वामिन्], @deva[अश्व꣡स्वामिन्], @deva[क्षेत्र꣡स्वामिन्]. The semantic bond between possessor and possessed drives the accent pattern.
"""

id = "6.2.123"
numericId = "62123"

[en]
simple = """
The word @deva[शाला] 'hall' at the end of a @deva[तत्पुरुष] compound gets first-syllable accent when the compound is neuter. Examples: @deva[ब्राह्मणशालम्] 'brahmin hall', @deva[क्षत्रियशालम्] 'warrior hall'. The compound becomes neuter by @ref[2.4.25].
"""

standard = """
In @deva[तत्पुरुष], neuter @deva[शाला] receives @deva[आद्युदात्त]: @deva[ब्राह्मणशालम्], @deva[क्षत्रियशालम्]. The neuter transformation follows @ref[2.4.25]. Counterexamples: @deva[बहुव्रीहि] @deva[दृढशाल] @deva[ब्राह्मणकुलम्] retains @deva[पूर्वपद] accent by @ref[6.2.1]; non-@deva[शाला] words like @deva[ब्राह्मणसेनम्] don't qualify; feminine @deva[ब्राह्मणशाला] follows different accent.
"""

advanced = """
Three conditions must hold: (1) @deva[तत्पुरुष] @deva[समास]; (2) @deva[शाला] as @deva[उत्तरपद]; (3) neuter gender by @ref[2.4.25]. The @deva[बहुव्रीहि] counterexample @deva[दृढशाल] shows that compound type matters—@deva[निष्ठा] @deva[पूर्वपद] would have @deva[अन्त्योदात्त] by @ref[6.2.1]. The feminine @deva[ब्राह्मणशाला] presumably follows different accent rules.
"""

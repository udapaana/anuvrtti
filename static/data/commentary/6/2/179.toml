id = "6.2.179"
numericId = "62179"

[en]
simple = """
After @deva[अन्तर्] 'within', the word @deva[वन] 'forest' gets final-syllable accent. Example: @deva[अन्तर्वणः] @deva[देशः] 'land within the forest'. This extends @ref[6.2.178] to the non-prefix word @deva[अन्तर्].
"""

standard = """
This @[sūtra] extends @deva[अन्त्योदात्त] on @deva[वन] to @deva[अन्तर्]-@deva[पूर्वपद]: @deva[अन्तर्वणो] @deva[देशः]. Since @deva[अन्तर्] is not an @deva[उपसर्ग] (preposition), @ref[6.2.178] wouldn't apply. This rule ensures @deva[वन] takes final accent even when the @deva[पूर्वपद] is the non-prefix @deva[अन्तर्].
"""

advanced = """
The @[sūtra] is necessary because @deva[अन्तर्] is not technically an @deva[उपसर्ग] (verbal prefix) but an @deva[अव्यय]. Thus @ref[6.2.178]'s @deva[उपसर्गात्] condition wouldn't cover @deva[अन्तर्वण]. This explicit extension shows the desired pattern extends beyond strict prefixes to semantically similar indeclinables.
"""

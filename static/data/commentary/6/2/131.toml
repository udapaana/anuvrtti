id = "6.2.131"
numericId = "62131"

[en]
simple = """
The words @deva[वर्ग्य] etc. get first-syllable accent at the end of a non-@deva[कर्मधारय] @deva[तत्पुरुष]. Examples: @deva[वासुदेववर्ग्यः] 'of @[vāsudeva]'s party', @deva[अर्जुनपक्ष्यः] 'of Arjuna's side'. In @deva[कर्मधारय]: @deva[परमवर्ग्यः].
"""

standard = """
The @deva[वर्ग्यादि] words receive @deva[आद्युदात्त] in non-@deva[कर्मधारय] @deva[तत्पुरुष]: @deva[वासुदेववर्ग्यः], @deva[वासुदेवपक्ष्यः], @deva[अर्जुनवर्ग्यः], @deva[अर्जुनपक्ष्यः]. These derive from @deva[वर्ग], @deva[पूग], @deva[गण] etc. (@deva[दिगादि] subdivision, @ref[4.3.54]) with @deva[यत्] affix. @deva[कर्मधारय] counterexample: @deva[परमवर्ग्यः].
"""

advanced = """
The @deva[वर्ग्यादि] @[gaṇa] includes @deva[यत्]-derived forms from group nouns: @deva[वर्ग] → @deva[वर्ग्य], @deva[पक्ष] → @deva[पक्ष्य], etc. The @deva[दिगादि] reference (@ref[4.3.54]) identifies the source class. The @deva[अकर्मधारय] condition parallels @ref[6.2.130], distinguishing partitive compounds (@deva[वासुदेवस्य] @deva[वर्गे]) from attributive ones.
"""

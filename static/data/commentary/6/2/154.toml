id = "6.2.154"
numericId = "62154"

[en]
simple = """
The word @deva[मिश्र] 'mixed' gets final-syllable accent after an instrumental-case word, if it has no prefix and doesn't mean 'alliance'. Examples: @deva[गुडमिश्राः] 'mixed with jaggery', @deva[तिलमिश्राः] 'mixed with sesame', @deva[सर्पिमिश्राः] 'mixed with ghee'. With prefix: @deva[गुडसंमिश्राः].
"""

standard = """
The word @deva[मिश्र] receives @deva[अन्त्योदात्त] when: (1) preceded by instrumental; (2) without @deva[उपसर्ग]; (3) not meaning compact/alliance. Examples: @deva[गुडमिश्राः], @deva[तिलमिश्राः], @deva[सर्पिमिश्राः]. Counterexamples: @deva[गुडधानाः] (not @deva[मिश्र]); @deva[गुडसंमिश्राः] (has prefix @deva[सम्]). The @deva[अनुपसर्गम्] condition here implies @ref[2.1.31] includes prefixed @deva[मिश्र] forms.
"""

advanced = """
The triple condition—@deva[तृतीया]-@deva[पूर्व], @deva[अनुपसर्ग], and non-compact meaning—restricts this @deva[अन्त्योदात्त]. The explicit @deva[अनुपसर्गम्] has a @deva[जञापक] (implicatory) function: it indicates that elsewhere (like @ref[2.1.31]) where @deva[मिश्र] is mentioned, prefixed forms are included. This subtle distinction affects compounding rules.
"""

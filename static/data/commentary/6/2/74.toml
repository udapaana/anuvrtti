id = "6.2.74"
numericId = "62074"

[en]
simple = """
A compound with @deva[अक]-ending second member denoting an Eastern people's sport gets first-syllable accent. So @deva[उ꣡लूकपक्षिकाः] ('owl-bird game') has accent on @deva[उ].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to compounds with @deva[अक]-final @deva[उत्तरपद] denoting @deva[प्राच्यक्रीडा] ('Eastern sport/game'). Example: @deva[उ꣡लूकपक्षिकाः] ('owl-bird game')—a game of Eastern regions gets first-syllable accent.
"""

advanced = """
The @deva[प्राच्यक्रीडायाम् अके] condition: @deva[अक]-ending compound denoting @deva[प्राच्य] (Eastern) @deva[क्रीडा] (sport/game) triggers @deva[आद्युदात्त]. @deva[उ꣡लूकपक्षिका] ('owl-bird [children's game]'). Regional game-names with @deva[अक]-affix show first-syllable accent.
"""

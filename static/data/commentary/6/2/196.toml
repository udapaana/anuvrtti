id = "6.2.196"
numericId = "62196"

[en]
simple = """
In a @deva[तत्पुरुष] compound, the word @deva[उत्पुच्छ] 'tail-raised' optionally gets final-syllable accent. Example: @deva[उत्पुच्छः] or @deva[उत्पुच्छः] (from @deva[उत्क्रान्तः] @deva[पुच्छात्] 'risen from the tail'). Non-@deva[तत्पुरुष]: @deva[उत्पुच्छः] (@deva[बहुव्रीहि]) doesn't have this option.
"""

standard = """
Optional @deva[अन्त्योदात्त] for @deva[उत्पुच्छ] in @deva[तत्पुरुष]: @deva[उत्पुच्छः] or @deva[उत्पुच्छः] (@ref[6.2.2] @deva[अव्यय]-accent). When derived by @deva[अच्] from @deva[उत्पुच्छयति] (@deva[पुच्छम्] @deva[उदस्यति]), @ref[6.2.144] would give final accent; this rule makes it optional there too. @deva[बहुव्रीहि] @deva[उत्पुच्छ] (@deva[उदस्तं] @deva[पुच्छम्] @deva[अस्य]) doesn't have this option.
"""

advanced = """
The optionality extends to both compound analysis (@deva[तत्पुरुष] @deva[उत्क्रान्तः] @deva[पुच्छात्]) and derivational analysis (@deva[अच्]-formed from denominative @deva[उत्पुच्छयति]). The @deva[तत्पुरुष] restriction excludes @deva[बहुव्रीहि] interpretation where different accent applies.
"""

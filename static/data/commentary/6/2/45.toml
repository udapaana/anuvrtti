id = "6.2.45"
numericId = "62045"

[en]
simple = """
A first member in @deva[चतुर्थी] (dative) sense keeps its accent before a past participle in @deva[क्त]. So @deva[गो꣡हितम्] ('done for cows'), @deva[मनुष्य꣡हितम्] ('done for humans'), @deva[गो꣡रक्षितम्] ('protected for cows').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] when @deva[चतुर्थी]-sense @deva[पूर्वपद] precedes @deva[क्त]-participle. Examples: @deva[गो꣡हितम्] ('beneficial to cows'), @deva[अश्व꣡हितम्] ('beneficial to horses'), @deva[गो꣡रक्षितम्] ('guarded for cows'). The beneficiary retains accent.
"""

advanced = """
The @deva[क्ते च] rule: @deva[चतुर्थी]-sense + @deva[क्त] (past passive participle) preserves @deva[पूर्वपद स्वर]. The @deva[क्त]-forms like @deva[हित] ('placed/beneficial'), @deva[रक्षित] ('protected') take beneficiary as @deva[पूर्वपद]: @deva[गो꣡हित], @deva[गो꣡रक्षित]. The dative relationship (done FOR X) governs accent.
"""

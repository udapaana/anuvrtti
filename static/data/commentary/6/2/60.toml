id = "6.2.60"
numericId = "62060"

[en]
simple = """
The word @deva[राजन्] in genitive case optionally keeps its accent before @deva[प्रत्येनस्] ('guilty'). So @deva[राजप्रत्येनाः] can be @deva[राज꣡प्रत्येनाः] or @deva[राजप्रत्येना꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[षष्ठी]-sense @deva[राजन्] before @deva[प्रत्येनस्]. Example: @deva[राज꣡प्रत्येनाः/राजप्रत्येना꣡ः] ('guilty against the king'). The genitive relationship (guilt toward king) shows optional accent.
"""

advanced = """
The @deva[षष्ठ्याः प्रत्येनसि वा] continues with @deva[राजन्]: @deva[षष्ठी]-sense @deva[राजन्] + @deva[प्रत्येनस्] shows @deva[विभाषा]. @deva[राज꣡प्रत्येनस्/राजप्रत्येनस्꣡] ('one guilty of offense against king'). The @deva[प्रत्येनस्] ('having sin/guilt') with genitive completes this accent-optional pattern.
"""

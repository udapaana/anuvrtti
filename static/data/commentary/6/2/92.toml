id = "6.2.92"
numericId = "62092"

[en]
simple = """
This is a heading rule (@deva[अधिकार]). From here through @ref[6.2.110], the @[sūtras] teach that the last syllable of the first member of a compound gets acute accent (@deva[उदात्त]). This is called @deva[अन्तोदात्त] because the final (@deva[अन्त]) of the first word becomes acute.
"""

standard = """
The @deva[अधिकार] phrase @deva[प्रथमानिर्दिष्टं] @deva[समास] @deva[उपसर्जनम्] @deva[अन्त्यं] @deva[उदात्तम्] governs through @ref[6.2.110]. This marks a shift from the @deva[आद्युदात्त] section to rules assigning acute to the final syllable of the @deva[पूर्वपद]. The nominative case marking (@deva[प्रथमानिर्दिष्ट]) indicates the subordinate member (@deva[उपसर्जन]) of the compound.
"""

advanced = """
This @deva[अधिकार] establishes a new accent domain. The term @deva[प्रथमानिर्दिष्ट] identifies the @deva[उपसर्जन] (subordinate compound member) through its nominative-case statement in the @[sūtra]. Within this section (@ref[6.2.92]-@ref[6.2.110]), rules assign @deva[अन्त्योदात्त] to the @deva[पूर्वपद], contrasting with the preceding @deva[आद्युदात्त] section. The scope extends to @ref[6.2.110] @deva[निष्ठोपसर्गपूर्वमन्यतरस्याम्].
"""

id = "6.2.15"
numericId = "62015"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[सुख] ('pleasure') or @deva[प्रिय] ('dear') as second member, the first member keeps its accent when the meaning is 'feels delight in' or 'is good for'. So @deva[ग꣡वां सुखम्] ('comfort of cows').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[सुख/प्रिय]-final @deva[तत्पुरुष] when meaning @deva[रमणं साधु च] ('feeling pleasure' or 'being good'). Examples: @deva[ग꣡वां सुखम्] ('cows' comfort'), @deva[ब्राह्मण꣡प्रियम्] ('dear to brahmins'). The experiencer-pleasure meaning triggers first-member accent.
"""

advanced = """
The @deva[सुखप्रिययोः रमणं साधु च] condition: @deva[सुख/प्रिय] as @deva[उत्तरपद] when expressing @deva[रमण] ('pleasure/delight') or @deva[साधु] ('good/beneficial'). The @deva[पूर्वपद] indicates who experiences pleasure or for whom something is good. @deva[ग꣡वां सुख] ('cows feel comfort'), @deva[ब्राह्मण꣡प्रिय] ('pleasing to brahmins') show the pattern.
"""

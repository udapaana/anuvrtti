id = "6.2.16"
numericId = "62016"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[सुख] ('pleasure') or @deva[प्रिय] ('dear') as second member, the first member keeps its accent when the meaning is 'agreeable to one' or 'desired by one'. So @deva[ब्राह्मण꣡सुखम्] ('agreeable to brahmins').
"""

standard = """
This @[sūtra] continues @ref[6.2.15], providing @deva[पूर्वपद प्रकृतिस्वर] for @deva[सुख/प्रिय]-final @deva[तत्पुरुष] when meaning @deva[इष्टम्] ('desired') or @deva[हितम्] ('agreeable'). Example: @deva[ब्राह्मण꣡सुखम्] ('desired by/agreeable to brahmins'). The 'desired/agreeable' sense triggers first-member accent.
"""

advanced = """
The @deva[इष्टे हिते च] condition supplements @ref[6.2.15]'s @deva[रमण साधु]. While @ref[6.2.15] covers 'feels pleasure' and 'is good', this covers 'is desired' (@deva[इष्ट]) and 'is beneficial' (@deva[हित]). The @deva[पूर्वपद] indicates the beneficiary: @deva[ब्राह्मण꣡सुख] ('comfort agreeable to brahmins'), @deva[गो꣡प्रिय] ('dear to cows').
"""

id = "6.2.115"
numericId = "62115"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, @deva[शृङ्ग] 'horn' as second member gets first-syllable accent when denoting age, a name, or resemblance. Age examples: @deva[उद्गतशृङ्गः] 'sprouted horns', @deva[द्व्यंगुलशृङ्गः] 'two-finger horns'. Name: @deva[ऋष्यशृङ्गः]. Resemblance: @deva[गोशृङ्गः] 'cow-horned'.
"""

standard = """
The word @deva[शृङ्ग] receives @deva[उत्तरपदाद्युदात्त] in @deva[वयस्] (age), @deva[संज्ञा], or @deva[उपमान] compounds. Age denotes cattle developmental stages: @deva[उद्गतशृङ्ग] 'horns emerged', @deva[अंगुलशृङ्ग] 'inch-long horns'. The name @deva[ऋष्यशृङ्ग] (the @[ṛṣi]) and resemblance @deva[मेषशृङ्ग] 'ram-horned' also qualify. Without these conditions: @deva[स्थूलशृङ्गः] 'thick-horned' takes regular accent.
"""

advanced = """
The @deva[वयसि] condition adds to @deva[संज्ञा]/@deva[उपमान], creating a three-way trigger for @deva[शृङ्ग]-@deva[आद्युदात्त]. The @deva[वयस्] usage describes cattle horn development stages (useful for age assessment). The counterexample @deva[स्थूलशृङ्गः] (describing horn size, not age/name/resemblance) shows the condition's precision. The @deva[ऋ]@[ṣi] @deva[ऋष्यशृङ्ग] exemplifies @deva[संज्ञा] usage.
"""

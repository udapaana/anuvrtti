id = "6.2.198"
numericId = "62198"

[en]
simple = """
The word @deva[सक्थ] 'thigh' optionally gets final-syllable accent when not preceded by a word ending in @deva[क्र]. Examples: @deva[गौरसक्थः] or @deva[गौरसक्थः] 'fair-thighed', @deva[श्लक्ष्णसक्थः] or @deva[श्लक्ष्णसक्थः] 'smooth-thighed'. After @deva[क्र]-ending: @deva[चक्रसक्थः] (always final accent by @deva[षच्] @ref[5.4.113]).
"""

standard = """
Optional @deva[अन्त्योदात्त] for @deva[समासान्त] @deva[सक्थ] (← @deva[सक्थि] by @ref[5.4.113]) when not preceded by @deva[क्र]-final words: @deva[गौरसक्थः] or @deva[गौरसक्थः], @deva[श्लक्ष्णसक्थः] or @deva[श्लक्ष्णसक्थः]. The words @deva[गौर] (@deva[प्रज्ञादि] @deva[अण्]) and @deva[श्लक्ष्ण] (@deva[कस्न], @[uṇādi] III.19) are @deva[अन्त्योदात्त]. After @deva[क्र]-ending words: @deva[चक्रसक्थः] always final accent (formed by @deva[षच्] @ref[5.4.113], a @deva[चित्] affix).
"""

advanced = """
The @deva[अक्रान्त] condition distinguishes @deva[क्र]-final @deva[पूर्वपद] (where @deva[षच्] @deva[चित्]-affix applies) from other @deva[पूर्वपद] (where @deva[विभाषा] operates). The @deva[सक्थि] → @deva[सक्थ] change by @ref[5.4.113] is @deva[समासान्त]. The @deva[गौर]/@deva[श्लक्ष्ण]] examples show that inherently @deva[अन्त्योदात्त] @deva[पूर्वपद] can optionally transfer or retain accent.
"""

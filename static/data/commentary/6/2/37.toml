id = "6.2.37"
numericId = "62037"

[en]
simple = """
In @deva[द्वन्द्व] compounds like @deva[कार्तकौजप] and others in this list, the first member keeps its accent. These are listed examples of @deva[द्वन्द्व] with first-member accent.
"""

standard = """
This @[sūtra] lists @deva[कार्तकौजपादि] as @deva[द्वन्द्व] compounds preserving @deva[पूर्वपद प्रकृतिस्वर]. The @deva[आदि] indicates a @deva[गण]. Words shown in dual/plural in the list are for illustrative purposes; the rule applies to the base compounds.
"""

advanced = """
The @deva[कार्तकौजपादयश्च] introduces a @deva[गण] of @deva[द्वन्द्व] compounds with @deva[पूर्वपद स्वर]. The list includes compound names of paired entities (teachers, lineages, etc.). The dual/plural endings in the @deva[गण] entries are pedagogical; the accent rule applies to the compound structure itself.
"""

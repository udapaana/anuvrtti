id = "6.2.193"
numericId = "62193"

[en]
simple = """
In a @deva[तत्पुरुष] compound, words like @deva[अंशु] 'ray', @deva[जन] 'person', @deva[राजन्] 'king' get final-syllable accent after @deva[प्रति] 'towards/each'. Examples: @deva[प्रत्यंशुः] 'ray-by-ray', @deva[प्रतिजनः] 'person-by-person', @deva[प्रतिराजा] 'each king'.
"""

standard = """
In @deva[तत्पुरुष], the @deva[अंश्वादि] @[gaṇa] receives @deva[अन्त्योदात्त] after @deva[प्रति]: @deva[प्रत्यंशुः], @deva[प्रतिजनः], @deva[प्रतिराजा]. For @deva[राजन्] without @deva[समासान्त] @deva[टच्], this rule applies; with @deva[टच्] (a @deva[चित्] affix), the accent is also final. The @[gaṇa] includes @deva[अंशु], @deva[जन], @deva[राजन्], @deva[उष्ट्र], @deva[खेटक], @deva[अजिर], @deva[आर्द्रा], @deva[श्रवण], @deva[कृत्तिका], @deva[अर्ध], etc.
"""

advanced = """
The @[gaṇa] lists: @deva[अंशु], @deva[जन], @deva[राजन्], @deva[उष्ट्र], @deva[खेटक]/@deva[रोटक], @deva[अजिर], @deva[आर्द्रा], @deva[श्रवण], @deva[कृत्तिका], @deva[अर्ध]. The @deva[राजन्] + @deva[टच्] case shows affix-based accent convergence: whether by this rule or @deva[चित्]-accent, the result is final acute.
"""

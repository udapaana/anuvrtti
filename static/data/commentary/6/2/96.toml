id = "6.2.96"
numericId = "62096"

[en]
simple = """
Before @deva[उदक] 'water', the first member gets final-syllable accent when denoting a mixture. Examples: @deva[गुडोदकम्] 'jaggery-water', @deva[तिलोदकम्] 'sesame-water'. When it's not a mixture—like @deva[शीतोदकम्] 'cold water' (describing the water itself)—this accent doesn't apply.
"""

standard = """
The condition @deva[अकेवले] means 'in the sense of mixture'. In @deva[गुडोदकम्], jaggery is mixed into water. After applying this rule's accent, @ref[8.2.6] may optionally produce @deva[स्वरित] on the combined vowel. But @deva[शीतोदकम्] 'cold water' merely describes the water's quality, not a mixture, so regular accent applies.
"""

advanced = """
The @deva[अकेवल] condition distinguishes mixtures (where an ingredient joins water) from mere descriptions. After sandhi of @deva[गुड] + @deva[उदक], the acute on @deva[गुड]'s final combines with the following grave @deva[उ], potentially yielding @deva[स्वरित] by @ref[8.2.6]. The semantic distinction: @deva[गुडोदकम्] = water with jaggery (mixture); @deva[शीतोदकम्] = water that is cold (attribute).
"""

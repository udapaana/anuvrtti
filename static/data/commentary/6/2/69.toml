id = "6.2.69"
numericId = "62069"

[en]
simple = """
The first syllable gets acute accent before @deva[गोत्र] (patronymic) names, scholar-names, and before @deva[माणव/ब्राह्मण] when the compound denotes someone devoted to study. So @deva[गा꣡र्ग्यमाणवः] ('@[gārgya] pupil').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] before @deva[गोत्र], @deva[अन्तेवासिसंज्ञा] (student-names), and @deva[माणव/ब्राह्मण] in @deva[अध्ययने] (study) context. Examples: @deva[गा꣡र्ग्यमाणवः] ('student of @[gārgya] lineage').
"""

advanced = """
The @deva[गोत्रान्तेवासिसंज्ञयोर्माणवब्राह्मणयोरध्ययने] condition: (1) @deva[गोत्र] patronymics, (2) @deva[अन्तेवासिसंज्ञा] (pupil-names), (3) @deva[माणव/ब्राह्मण] in @deva[अध्ययन] (study) sense—all trigger @deva[आद्युदात्त]. @deva[गा꣡र्ग्यमाणव] ('student named after @[gārgya]'). The educational/lineage compound takes first-syllable accent.
"""

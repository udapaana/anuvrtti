id = "6.2.100"
numericId = "62100"

[en]
simple = """
The words @deva[अरिष्ट] and @deva[गौड] get final-syllable accent before @deva[पुर]. Examples: @deva[अरिष्टपुरम्], @deva[गौडपुरम्]. The word @deva[पूर्व] 'first' in the @[sūtra] extends this to compounds like @deva[अरिष्टश्रितपुरम्], @deva[गौडभृत्यपुरम्].
"""

standard = """
This @[sūtra] specifically names @deva[अरिष्ट] and @deva[गौड] as receiving @deva[अन्त्योदात्त] before @deva[पुर], regardless of Eastern location. The term @deva[पूर्वम्] allows extension: when @deva[अरिष्ट] or @deva[गौड] is itself preceded by another word (as in @deva[अरिष्टश्रितपुर]), the entire @deva[पूर्वपद] receives this accent.
"""

advanced = """
The explicit enumeration of @deva[अरिष्ट] and @deva[गौड] suggests these city names follow the Eastern pattern regardless of actual geography. The @deva[पूर्वम्] extension mechanism allows compounds where @deva[अरिष्ट]/@deva[गौड] is itself the @deva[उत्तरपद] of the @deva[पूर्वपद]: @deva[अरिष्टश्रित] + @deva[पुर] → @deva[अरिष्टश्रितपुरम्] with accent on @deva[श्रित]'s final.
"""

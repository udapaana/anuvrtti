id = "6.2.152"
numericId = "62152"

[en]
simple = """
The word @deva[पुण्य] 'merit' gets final-syllable accent when preceded by a locative-case word. Examples: @deva[अध्ययनपुण्यम्] 'merit from study' (from @deva[अध्ययने] @deva[पुण्यम्]), @deva[वेदपुण्यम्] 'merit from Vedas'.
"""

standard = """
In @deva[सप्तमी]-@deva[तत्पुरुष], @deva[पुण्य] receives @deva[अन्त्योदात्त]: @deva[अध्ययनपुण्यम्], @deva[वेदपुण्यम्]. Compounding follows @ref[2.1.40] by @deva[योग]-@deva[विभाग] (splitting the @[sūtra]), taking @deva[सप्तमी] as one rule and @deva[शौण्डैः] as another. This overrides @ref[6.2.2] which would preserve @deva[पूर्वपद] accent. The word @deva[पुण्य] is formed by @[uṇādi] @deva[यत्].
"""

advanced = """
The locative compound @deva[अध्ययने] @deva[पुण्यम्] → @deva[अध्ययनपुण्यम्] follows @ref[2.1.40] via @deva[योगविभाग]. The @deva[अन्त्योदात्त] here supersedes @ref[6.2.2]'s @deva[अव्यय]-@deva[पूर्वपद] accent preservation. The @[uṇādi] derivation @deva[पुण्य] (← √@deva[पुण्] + @deva[यत्]) establishes the base word's formation.
"""

id = "6.2.36"
numericId = "62036"

[en]
simple = """
When names of scholars (named after their teachers) are compounded in @deva[द्वन्द्व], the first member keeps its accent. So @deva[कालापचान्दोग्याः] ('students of @[kālāpa] and @[chāndogya]') has first-member accent.
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] in @deva[द्वन्द्व] of @deva[अन्तेवासिन्]-names (pupils named after teachers). When scholars bearing teachers' names compound, the first retains accent. Example: @deva[कालाप꣡चान्दोग्याः] ('@[kālāpa] and @[chāndogya] students').
"""

advanced = """
The @deva[द्वन्द्वे अन्तेवासिनाम् आचार्योपदिष्टानाम्] condition: @deva[द्वन्द्व] of @deva[अन्तेवासिन्] (pupils/disciples) who are @deva[आचार्योपदिष्ट] (designated after teachers). The @deva[पूर्वपद] (first school-name) keeps @deva[प्रकृतिस्वर]. These compounds denote groups of students from different teaching lineages.
"""

id = "6.2.84"
numericId = "62084"

[en]
simple = """
Before @deva[ग्राम] ('village'), the first member gets first-syllable accent when the compound doesn't mean 'inhabitants'. So @deva[म꣡ल्लग्रामः] ('wrestlers' village'), @deva[व꣡णिग्ग्रामः] ('merchants' village')—but not when meaning 'the villagers'.
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] before @deva[ग्राम] when NOT denoting @deva[निवासिन्] (inhabitants). Examples: @deva[म꣡ल्लग्रामः] ('village of wrestlers'), @deva[व꣡णिग्ग्रामः] ('merchant village'). When meaning 'the residents themselves', different accent applies.
"""

advanced = """
The @deva[ग्रामे अनिवासिनि] condition: @deva[ग्राम]-compounds take @deva[आद्युदात्त] when NOT meaning @deva[निवासिन्] (inhabitants). @deva[म꣡ल्लग्राम] ('wrestlers' settlement'), @deva[व꣡णिग्ग्राम] ('traders' village'). When @deva[ग्राम] means 'the villagers' (metonymy), different accent prevails.
"""

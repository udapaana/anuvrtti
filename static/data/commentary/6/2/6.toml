id = "6.2.6"
numericId = "62006"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[चिर] ('long time') or @deva[कृच्छ्र] ('difficulty') as second member, the first member keeps its accent when it denotes something that experiences delay or difficulty. So @deva[दे꣡वचिरम्] ('long-awaited by gods').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[चिर/कृच्छ्र]-final @deva[तत्पुरुष] when the first member denotes what experiences the obstacle (@deva[उपघात]). Example: @deva[दे꣡वचिरम्] ('delayed for gods'), @deva[दे꣡वकृच्छ्रम्] ('difficult for gods'). The 'experiencer of delay/difficulty' meaning triggers first-member accent.
"""

advanced = """
The @deva[चिरकृच्छ्रयोरुपघातस्य] condition: @deva[चिर] (long duration) and @deva[कृच्छ्र] (hardship) as @deva[उत्तरपद] when the @deva[पूर्वपद] indicates the entity experiencing @deva[उपघात] (obstruction/impediment). The semantic relationship (X experiences delay/difficulty) preserves @deva[प्रकृतिस्वर]: @deva[दे꣡वचिर], @deva[दे꣡वकृच्छ्र].
"""

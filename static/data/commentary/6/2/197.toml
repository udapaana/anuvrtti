id = "6.2.197"
numericId = "62197"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, the words @deva[पाद्] 'foot', @deva[दत्] 'tooth', and @deva[मूर्धन्] 'head' optionally get final-syllable accent after @deva[द्वि] 'two' or @deva[त्रि] 'three'. Examples: @deva[द्विपात्] or @deva[द्विपात्] 'two-footed', @deva[त्रिपाद्] or @deva[त्रिपाद्], @deva[द्विदम्] or @deva[द्विदम्], @deva[द्विमूर्धा] or @deva[द्विमूर्धा].
"""

standard = """
Optional @deva[अन्त्योदात्त] for @deva[पाद्]/@deva[दत्]]/@deva[मूर्धन्]] after @deva[द्वि]/@deva[त्रि] in @deva[बहुव्रीहि]. @deva[पाद्] = @deva[पाद] with @deva[अ]-elision (@ref[5.4.140]); @deva[दत्] = substitute for @deva[दन्त] (@ref[5.4.141]). Alternations: @deva[द्विपात्]/@deva[द्विपात्]], @deva[त्रिपाद्]/@deva[त्रिपाद्]], @deva[द्विदम्]/@deva[द्विदम्]], @deva[त्रिदन्]/@deva[त्रिदन्]], @deva[द्विमूर्धा]/@deva[द्विमूर्धा]].
"""

advanced = """
The @deva[पाद्]/@deva[दत्]] forms involve @deva[समासान्त] operations (@ref[5.4.140]-@ref[5.4.141]). The @deva[विभाषा] creates alternation with @deva[पूर्वपद]-accent. The @deva[द्वि]/@deva[त्रि] condition is specific—other numerals don't trigger this option. The body-part semantics (feet, teeth, heads) may underlie this specialized rule.
"""

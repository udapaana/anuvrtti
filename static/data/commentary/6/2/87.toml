id = "6.2.87"
numericId = "62087"

[en]
simple = """
A first member without @deva[वृद्धि] in its first syllable (and not in the @deva[कर्की] list) gets first-syllable accent before @deva[प्रस्थ] ('plateau/measure'). So @deva[इ꣡न्द्रप्रस्थः] ('Indra's plateau').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] before @deva[प्रस्थ] when @deva[पूर्वपद] lacks @deva[वृद्धि] in first syllable and isn't @deva[कर्क्यादि]. Example: @deva[इ꣡न्द्रप्रस्थः] ('Indraprastha'). @deva[वृद्धि]-initial words and @deva[कर्की]-group follow different rules.
"""

advanced = """
The @deva[अवृद्धादकर्क्यादेः प्रस्थे] condition: @deva[अवृद्ध] (no @deva[वृद्धि] = @deva[आ ऐ औ] in first syllable) and not @deva[कर्क्यादि] + @deva[प्रस्थ] triggers @deva[आद्युदात्त]. @deva[इ꣡न्द्रप्रस्थ] (no @deva[वृद्धि]), but @deva[*औदुम्बरप्रस्थ] (has @deva[वृद्धि]) differs. The @deva[कर्की]-list contains exceptions.
"""

id = "6.2.150"
numericId = "62150"

[en]
simple = """
When preceded by a @deva[कारक] word (as in @ref[6.2.148]), a word ending in @deva[अन] affix gets final-syllable accent if it denotes the action (abstract) or the object (passive). Examples: @deva[ओदनभोजनम्] @deva[सुखम्] 'eating rice is pleasant', @deva[राजभोजनाः] @deva[शालयः] 'rice fit for king's eating'.
"""

standard = """
The @deva[अन]-ending words receive @deva[अन्त्योदात्त] when @deva[कारक]-preceded, in both @deva[भाव] (abstract) and @deva[कर्मवचन] (passive/objective) senses. Abstract examples: @deva[ओदनभोजनं] @deva[सुखम्], @deva[पयःपानं] @deva[सुखम्], @deva[चन्दनप्रियङ्गुकालेपनं] @deva[सुखम्]. Passive/objective: @deva[राजभोजनाः] @deva[शालयः] 'rice to be eaten by king', @deva[राजाच्छादनानि] @deva[वासांसि] 'clothes to be worn by king'.
"""

advanced = """
The @deva[कारक] condition (inherited from @ref[6.2.148]) combines with @deva[अन]-affix and @deva[भाव]/@deva[कर्मवचन] semantics. The @deva[भाव] sense is abstract verbal noun (@deva[भोजनम्] = 'the act of eating'); the @deva[कर्मवचन] sense is objective/passive adjective (@deva[राजभोजनाः] = 'to-be-eaten-by-king'). Both receive @deva[उत्तरपदान्त्योदात्त] by this @[sūtra].
"""

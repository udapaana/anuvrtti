id = "6.2.129"
numericId = "62129"

[en]
simple = """
Four words get first-syllable accent when at the end of a @deva[तत्पुरुष] denoting a name: @deva[कूल] 'bank', @deva[सूद] 'well', @deva[स्थल] 'ground', @deva[कर्ष] 'plowing'. These are village names: @deva[दाक्षिकूलम्], @deva[देवसूदम्], @deva[दाण्डायनस्थली], @deva[दाक्षिकर्षः].
"""

standard = """
In @deva[संज्ञा] (name) @deva[तत्पुरुष], @deva[कूल], @deva[सूद], @deva[स्थल], @deva[कर्ष] receive @deva[आद्युदात्त]. All are village names: @deva[दाक्षिकूलम्], @deva[आहकिकूलम्]; @deva[देवसूदम्], @deva[भाजीसूदम्]; @deva[दाण्डायनस्थली], @deva[माहकिस्थली] (feminine by @deva[ङीष्] @ref[4.1.42]); @deva[दाक्षिकर्षः]. Without name meaning: @deva[परमकूलम्].
"""

advanced = """
The @deva[संज्ञा] condition restricts this accent to proper place names (@deva[ग्रामनाम]). The feminine @deva[स्थली] (← @deva[स्थल] + @deva[ङीष्] by @ref[4.1.42]) shows gender agreement in place names. The counterexample @deva[परमकूलम्] 'best bank' (descriptive, not a name) follows regular accent. The patronymic-like @deva[पूर्वपद] (@deva[दाक्षि], @deva[आहकि]) suggests named locations belonging to lineages.
"""

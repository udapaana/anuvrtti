id = "6.2.171"
numericId = "62171"

[en]
simple = """
In a @deva[बहुव्रीहि], the word @deva[जात] 'born' optionally gets final-syllable accent after species words (except garments), time words, or @deva[सुख] etc. Examples: @deva[दन्तजातः] or @deva[दन्तजातः] 'having teeth born', @deva[मासजातः] or @deva[मासजातः], @deva[सुखजातः] or @deva[सुखजातः].
"""

standard = """
Optional @deva[अन्त्योदात्त] for @deva[जात] after @deva[जाति]/@deva[काल]/@deva[सुखादि]. Alternations: @deva[दन्तजातः] or @deva[दन्तजातः] (@[phiṭ] II.6 @deva[आद्युदात्त]); @deva[स्तनजातः] or @deva[स्तनजातः]; @deva[मासजातः] or @deva[मासजातः] (@deva[मास] first-acute by @[uṇādi]); @deva[संवत्सरजातः] or @deva[संवत्सरजातः]; @deva[सुखजातः] or @deva[सुखजातः]; @deva[दुःखजातः] or @deva[दुःखजातः].
"""

advanced = """
This @deva[विभाषा] specifically for @deva[जात] (not other @deva[निष्ठा] forms) creates option with the general @deva[बहुव्रीहि] accent. Words like @deva[दन्त], @deva[स्तन] (@[phiṭ] II.6), @deva[मास] (@[uṇādi-formed]) have inherent @deva[आद्युदात्त], which the alternative option preserves. The optionality may reflect dialectal or stylistic variation.
"""

id = "6.2.71"
numericId = "62071"

[en]
simple = """
A word denoting food gets first-syllable accent before a word denoting a suitable container for it. So @deva[भि꣡क्षावासः] ('alms-bag') has accent on @deva[भि].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[अन्न] (food) words before @deva[आधार] (container) words. Examples: @deva[भि꣡क्षावासः] ('alms-receptacle'), @deva[भ꣡क्तवासः] ('food-container'). The food-item gets first-syllable accent.
"""

advanced = """
The @deva[अन्नस्य योग्ये आधारे] condition: @deva[अन्न] ('food') + @deva[योग्य आधार] ('suitable container') triggers @deva[आद्युदात्त] on @deva[अन्न]. @deva[भि꣡क्षावास] ('alms-bag'), @deva[भ꣡क्तवास] ('rice-container'). The food-container compound accents the food-word's first syllable.
"""

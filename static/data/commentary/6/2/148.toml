id = "6.2.148"
numericId = "62148"

[en]
simple = """
Only @deva[दत्त] 'given' and @deva[श्रुत] 'heard' get final-syllable accent when preceded by a @deva[कारक] word, if the compound is a name expressing a blessing. Examples: @deva[देवदत्तः] 'god-given' (may gods give him!), @deva[विष्णुश्रुतः] '@[viṣṇu-heard]' (may @[viṣṇu] hear him!).
"""

standard = """
The restriction @deva[एव] limits @ref[6.2.146]'s scope to @deva[दत्त] and @deva[श्रुत] in @deva[कारक]-preceded @deva[आशिस्] (benediction) names. Thus @deva[देवदत्तः] (@deva[देवा] @deva[एनं] @deva[देयासुः]) and @deva[विष्णुश्रुतः] (@deva[विष्णुः] @deva[एवं] @deva[श्रूयात्]) receive @deva[अन्त्योदात्त]. But @deva[देवपालितः], though a name, follows @ref[6.2.48] since @deva[पालित] ≠ @deva[दत्त]/@deva[श्रुत]].
"""

advanced = """
This @deva[नियम] (restriction) narrows @ref[6.2.146] to two participles in @deva[आशिस्] (optative blessing) @deva[संज्ञा]. The @deva[दत्त]/@deva[श्रुत]] limitation means other @deva[क्त]-names like @deva[देवपालित] revert to @ref[6.2.48]'s @deva[पूर्वपद] accent. The @deva[आशिस्] interpretation derives names from optative sentences: @deva[देवा] @deva[दद्युः] → @deva[देवदत्त].
"""

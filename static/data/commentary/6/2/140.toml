id = "6.2.140"
numericId = "62140"

[en]
simple = """
In compounds like @deva[वनस्पति] 'lord of forest', both members keep their original accents simultaneously. Examples: @deva[वनस्पतिः] (both @deva[वन] and @deva[पति] acute on first); @deva[बृहस्पतिः] (@[bṛhaspati]); @deva[शचीपतिः] (Indra).
"""

standard = """
The @deva[वनस्पत्यादि] class retains dual accent (both @deva[पूर्वपद] and @deva[उत्तरपद] keep @deva[प्रकृतिस्वर]). In @deva[वनस्पतिः], both @deva[वन] and @deva[पति] are @deva[आद्युदात्त]; the @deva[सुट्] augment comes by @ref[6.1.157]. In @deva[बृहस्पतिः] (@deva[बृहतां] @deva[पतिः]), @deva[बृहत्] may be @deva[अन्त्योदात्त] or @deva[आद्युदात्त]. In @deva[शचीपतिः], @deva[शची] (@deva[ङीष्]-formed) is typically @deva[आद्युदात्त].
"""

advanced = """
The @deva[उभयोः] phrase indicates simultaneous accent retention—a rare pattern. The @deva[वनस्पति] formation with @deva[सुट्] by @ref[6.1.157] and the @deva[बृहस्पति]/@deva[शचीपति]] divine names form an @deva[आकृतिगण]. The variant @deva[बृहत्] accents (some: @deva[आद्युदात्त]; others: @deva[अन्त्योदात्त]) reflect grammatical debate about @deva[भ्]-initial stems.
"""

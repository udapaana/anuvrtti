id = "6.2.31"
numericId = "62031"

[en]
simple = """
In a @deva[द्विगु] compound, the first member (numeral) may optionally keep its accent before @deva[दिष्टि] or @deva[वितस्ति] ('span'). So @deva[द्विदिष्टि] can be @deva[द्वि꣡दिष्टि] or @deva[द्विदिष्टि꣡].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] in @deva[द्विगु] with @deva[दिष्टि/वितस्ति] as @deva[उत्तरपद]. Both measure terms allow either accent: @deva[द्वि꣡दिष्टि/द्विदिष्टि꣡] ('two @deva[दिष्टि]-spans'), @deva[द्वि꣡वितस्ति/द्विवितस्ति꣡] ('two spans').
"""

advanced = """
The @deva[दिष्टिवितस्त्योर्वा] provides @deva[विभाषा] for these measurement terms. @deva[दिष्टि] and @deva[वितस्ति] (both meaning 'span' as length measure) allow optional first-member accent in @deva[द्विगु]. This extends @ref[6.2.29]'s @deva[द्विगु] rules with specific optionality for span-measurements.
"""

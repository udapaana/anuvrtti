id = "6.2.46"
numericId = "62046"

[en]
simple = """
In a @deva[कर्मधारय] compound, a first member that is NOT itself a @deva[क्त]-participle keeps its accent before a @deva[क्त]-participle. So @deva[प्रिय꣡प्राप्तः] ('dear one obtained') has first-member accent, but not @deva[गतप्राप्तः] (both are participles).
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] in @deva[कर्मधारय] when a non-@deva[क्त] word precedes a @deva[क्त]-participle. Examples: @deva[प्रिय꣡प्राप्तः] ('obtained dear one'), @deva[नव꣡जातः] ('newly born'). When both members are @deva[क्त], different accent applies.
"""

advanced = """
The @deva[कर्मधारये अनिष्ठायाः क्ते] condition: @deva[कर्मधारय] with non-@deva[निष्ठा] (non-@deva[क्त/क्तवतु]) @deva[पूर्वपद] + @deva[क्त] @deva[उत्तरपद] preserves @deva[प्रकृतिस्वर]. @deva[प्रिय꣡प्राप्त], @deva[नव꣡जात] show the pattern. When @deva[पूर्वपद] is also @deva[निष्ठा], @ref[6.1.223]'s @deva[अन्तोदात्त] applies.
"""

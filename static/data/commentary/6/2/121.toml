id = "6.2.121"
numericId = "62121"

[en]
simple = """
In an @deva[अव्ययीभाव] compound, seven words as second member get first-syllable accent: @deva[कूल] 'bank', @deva[तीर] 'shore', @deva[तूल] 'cotton', @deva[मूल] 'root', @deva[शाला] 'hall', @deva[अक्ष] 'eye/axle', and @deva[सम] 'even'. Examples: @deva[परिकूलम्] 'near the bank', @deva[उपतीरम्] 'at the shore', @deva[सुषमम्] 'very even'.
"""

standard = """
Seven @deva[उत्तरपद] receive @deva[आद्युदात्त] in @deva[अव्ययीभाव] compounds: @deva[कूल], @deva[तीर], @deva[तूल], @deva[मूल], @deva[शाला], @deva[अक्ष], @deva[सम]. Examples: @deva[परिकूलम्], @deva[उपकूलम्]; @deva[परितीरम्], @deva[उपतीरम्]; @deva[परितूलम्], @deva[उपतूलम्]; @deva[परिमूलम्], @deva[उपमूलम्]; @deva[परिशालम्], @deva[उपशालम्]; @deva[उपाक्षम्], @deva[पर्यक्षम्]; @deva[सुषमम्], @deva[विषमम्], @deva[निषमम्], @deva[दुःषमम्].
"""

advanced = """
The enumeration covers locative @deva[अव्ययीभाव] with prefixes like @deva[परि], @deva[उप], @deva[सु], @deva[वि], @deva[निस्], @deva[दुस्]. The @deva[उत्तरपद] receives @deva[आद्युदात्त] regardless of the prefix. Forms like @deva[सुषमम्] 'well-balanced' and @deva[विषमम्] 'uneven' show @deva[सम] with degree prefixes. This overrides the general @deva[अव्ययीभाव] accent pattern.
"""

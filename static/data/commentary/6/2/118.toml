id = "6.2.118"
numericId = "62118"

[en]
simple = """
After @deva[सु] in a @deva[बहुव्रीहि], the words @deva[क्रतु] etc. get first-syllable accent. Examples: @deva[सुक्रतुः] 'of good will', @deva[सुदृशीकः] 'good-looking', @deva[सुप्रपूर्तिः], @deva[सुहव्यः], @deva[सुभगः] 'fortunate', @deva[सुप्रतीकः] 'handsome'.
"""

standard = """
This @[sūtra] lists the @deva[क्रत्वादि] @[gaṇa] receiving @deva[उत्तरपदाद्युदात्त] after @deva[सु] in @deva[बहुव्रीहि]. The enumerated words: @deva[क्रतु], @deva[दृशीक], @deva[प्रपूर्ति], @deva[हव्य], @deva[भग], @deva[प्रतीक]. Thus @deva[सुक्रतुः] 'having good intention', @deva[सुभगः] 'blessed with fortune'.
"""

advanced = """
The @deva[क्रत्वादि] @[gaṇa] provides a closed list for this accent rule. The compounds @deva[सुक्रतु] 'well-intentioned', @deva[सुभग] 'fortunate', @deva[सुप्रतीक] 'fair-faced' are @deva[बहुव्रीहि] with @deva[सु] as @deva[पूर्वपद]. This supplements @ref[6.2.117]'s morphological class (@deva[मन्]/@deva[अस्]-stems) with a lexical list.
"""

id = "6.2.62"
numericId = "62062"

[en]
simple = """
The word @deva[ग्राम] ('village') as first member optionally keeps its accent before a word denoting a professional or artisan. So @deva[ग्रामनापितः] ('village barber') can have either accent.
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[ग्राम] before @deva[शिल्पिन्] (artisan) terms. Examples: @deva[ग्राम꣡नापितः/ग्रामनापित꣡ः] ('village barber'), @deva[ग्राम꣡कुलालः/ग्रामकुलाल꣡ः] ('village potter').
"""

advanced = """
The @deva[ग्रामस्य शिल्पिनि वा] condition: @deva[ग्राम] + @deva[शिल्पिन्] (craftsman/professional) shows @deva[विभाषा]. @deva[ग्राम꣡नापित/ग्रामनापित꣡] ('village barber'), @deva[ग्राम꣡कुलाल/ग्रामकुलाल꣡] ('village potter'). The village-professional compound has optional first-member accent.
"""

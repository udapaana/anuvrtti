id = "6.2.169"
numericId = "62169"

[en]
simple = """
The word @deva[मुख] 'mouth' (as body part) optionally gets final-syllable accent when preceded by a @deva[क्त]-participle or a comparison word. Example: @deva[प्रक्षालितमुखः] 'washed-face' can have three accents: on @deva[ख], on @deva[त], or on @deva[प्र].
"""

standard = """
Optional @deva[अन्त्योदात्त] on @deva[स्वाङ्ग] @deva[मुख] after @deva[निष्ठा] or @deva[उपमान]. Three options for @deva[प्रक्षालितमुखः]: (1) @deva[अन्त्योदात्त] by this rule; (2) @deva[पूर्वपदान्त्योदात्त] by @ref[6.2.110]; (3) @deva[गति]-accent on @deva[प्र] by @ref[6.2.49]/@ref[6.2.1]. The alternation reflects acceptable variant pronunciations.
"""

advanced = """
The @deva[विभाषा] creates three-way alternation: (1) @deva[प्रक्षालितमुखः] (@deva[उत्तरपदान्त्योदात्त] by this rule); (2) @deva[प्रक्षालितमुखः] (@deva[पूर्वपदान्त्योदात्त] by @ref[6.2.110]); (3) @deva[प्रक्षालितमुखः] (@deva[गति]-accent by @ref[6.2.49] + @ref[6.2.1]). The @deva[उपमान] condition handles comparison compounds parallel to @deva[निष्ठा]-@deva[पूर्वपद].
"""

id = "6.2.138"
numericId = "62138"

[en]
simple = """
After @deva[शिति] 'white/grey' in a @deva[बहुव्रीहि], a disyllabic word keeps its original accent, except @deva[भसद्] 'buttocks'. Examples: @deva[शितिपादः] 'white-footed', @deva[शित्यसः] 'white-shouldered', @deva[शित्यौष्ठः] 'white-lipped'.
"""

standard = """
After @deva[शिति] in @deva[बहुव्रीहि], @deva[नित्यद्व्यच्] (always disyllabic) words retain @deva[प्रकृतिस्वर], except @deva[भसद्]. The word @deva[पाद] (@deva[वृषादि], @ref[6.1.203]) has @deva[आद्युदात्त]; @deva[अंस] and @deva[ओष्ठ] (@deva[सन्] and @deva[थम्] affixes, @[uṇādi] V.21, II.4) have @deva[आद्युदात्त] by @ref[6.1.197]. Contrast @deva[दर्शनीयपादः] where prefix affects accent.
"""

advanced = """
The @deva[शिति]-@deva[पूर्व] condition with @deva[नित्यद्व्यच्] (etymologically disyllabic) and @deva[भसद्]-exception defines a narrow class. The @deva[पाद] class (@deva[वृषादि] by @ref[6.1.203]) and @[uṇādi-formed] @deva[अंस]/@deva[ओष्ठ]] all have @deva[आद्युदात्त]. The counterexample @deva[दर्शनीयपादः] (@deva[कृदन्त] @deva[पूर्वपद]) shows that @deva[गति]/@deva[कारक] conditions (@ref[6.2.139]) would override @deva[प्रकृतिस्वर].
"""

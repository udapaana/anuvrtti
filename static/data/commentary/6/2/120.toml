id = "6.2.120"
numericId = "62120"

[en]
simple = """
In Vedic, after @deva[सु] in a @deva[बहुव्रीहि], the words @deva[वीर] 'hero' and @deva[वीर्य] 'heroism' get first-syllable accent. Examples from @[ṛgveda]: @deva[सुवीरेण] @deva[ते], @deva[सुवीर्यं] @deva[स्वश्व्यम्]. The word @deva[सुवीर्य] has acute on @deva[वी].
"""

standard = """
In @deva[छन्दस्], @deva[वीर] and @deva[वीर्य] receive @deva[उत्तरपदाद्युदात्त] after @deva[सु]. @[ṛgveda] IV.17.4: @deva[सुवीरस्ते] @deva[जनिता]; VIII.1.36: @deva[सुवीर्यं] @deva[स्वश्व्यम्]. The word @deva[वीर्य] is formed by @deva[यत्] affix and would have first-syllable accent by @ref[6.1.213], but its explicit enumeration shows that rule doesn't apply here.
"""

advanced = """
The explicit listing of @deva[वीर]/@deva[वीर्य]] indicates that @ref[6.1.213] @deva[क्त्वातोसुन्कसुनः] doesn't determine their accent in these compounds. The @deva[यत्]-derived @deva[वीर्य] would normally follow @ref[6.1.213], but this @[sūtra] specifies @deva[उत्तरपदाद्युदात्त] after @deva[सु]. The Vedic citations confirm the accent on @deva[वी] in @deva[सुवीर] and @deva[सुवीर्य].
"""

id = "6.2.47"
numericId = "62047"

[en]
simple = """
A word in accusative case (2nd) keeps its accent before a @deva[क्त]-participle when it doesn't mean separation. So @deva[कष्ट꣡श्रितः] ('gone to difficulty'), @deva[त्रिशकल꣡पतितः] ('fallen into three pieces').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[द्वितीया]-sense @deva[पूर्वपद] before @deva[क्त], excluding @deva[अपादान] (separation). Examples: @deva[कष्ट꣡श्रितः] ('resorted to hardship'), @deva[त्रिशकल꣡पतितः] ('fallen in three pieces'). Separation-meaning compounds differ.
"""

advanced = """
The @deva[द्वितीयायाः अनपादाने क्ते] condition: @deva[द्वितीया] (accusative) relationship without @deva[अपादान] (ablative/separation sense) + @deva[क्त]. @deva[कष्ट꣡श्रित] ('gone TO hardship'), @deva[त्रिशकल꣡पतित] ('fallen INTO three'). The @deva[अनपादान] restriction removes separation-meaning compounds from this rule.
"""

id = "6.2.109"
numericId = "62109"

[en]
simple = """
In a @deva[बहुव्रीहि] compound with @deva[बन्धु] 'relative' as second member, a first member ending in feminine @deva[ई] (a @deva[नदी] word) gets final-syllable accent. Examples: @deva[गार्गीबन्धुः] 'one whose relative is @[gārgī]', @deva[वात्सीबन्धुः].
"""

standard = """
When the @deva[पूर्वपद] is a @deva[नदी]-ending feminine (in @deva[ई]) and the @deva[उत्तरपद] is @deva[बन्धु], the @deva[पूर्वपद] receives @deva[अन्त्योदात्त]. The words @deva[गार्गी] and @deva[वात्सी] are formed by @deva[ङीष्] (@ref[4.1.16]) from @deva[गार्ग्य] and @deva[वात्स्य] (@deva[यञ्]-ending by @ref[4.1.105]), giving them @deva[आद्युदात्त]. This rule overrides @ref[6.2.1].
"""

advanced = """
The @deva[नदी] condition (@deva[ई]-ending feminines) specifies the morphological class triggering this accent. Patronymic feminines like @deva[गार्गी] (← @deva[गार्ग्य] + @deva[ङीष्] by @ref[4.1.16]) have inherent @deva[आद्युदात्त]. The @deva[बन्धु]-specific rule creates compounds identifying kinship: @deva[गार्गीबन्धुः] = one whose @deva[बन्धु] is a @[gārgī-clan] woman.
"""

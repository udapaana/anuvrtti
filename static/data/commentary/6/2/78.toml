id = "6.2.78"
numericId = "62078"

[en]
simple = """
The words @deva[गो] ('cow'), @deva[तन्ति] ('cord'), and @deva[यव] ('barley') get first-syllable accent before @deva[पाल] ('protector'). So @deva[गो꣡पालः] ('cowherd'), @deva[त꣡न्तिपालः] ('cord-keeper'), @deva[य꣡वपालः] ('barley-guard').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[गो/तन्ति/यव] before @deva[पाल]. Examples: @deva[गो꣡पालः] ('cow-protector'), @deva[त꣡न्तिपालः] ('rope-keeper'), @deva[य꣡वपालः] ('barley-protector'). These specific first members take first-syllable accent with @deva[पाल].
"""

advanced = """
The @deva[गोतन्तियवानां पाले] lists three words receiving @deva[आद्युदात्त] before @deva[पाल]. @deva[गो꣡पाल] ('cowherd' = @[kṛṣṇa] epithet), @deva[त꣡न्तिपाल] ('cord-keeper'), @deva[य꣡वपाल] ('barley-guard'). These specific combinations are lexically specified for first-syllable accent.
"""

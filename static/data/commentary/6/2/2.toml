id = "6.2.2"
numericId = "62002"

[en]
simple = """
In a @deva[तत्पुरुष] compound, the first member keeps its original accent when: (1) it shows resemblance, (2) it's in @deva[तृतीया] (instrumental) relation, (3) it's in locative relation, or (4) it has a comparison relationship. So @deva[देवमनुष्यः] ('god-like man') keeps the first word's accent.
"""

standard = """
This @[sūtra] provides four conditions for @deva[पूर्वपद प्रकृतिस्वर] in @deva[तत्पुरुष]: (1) @deva[उपमान] (resemblance), (2) @deva[तृतीया] (instrumental), (3) @deva[सप्तमी] (locative), (4) @deva[उपमित] (comparison target). In these semantic relationships, the first member retains its original accent. Example: @deva[दे꣡वमनुष्यः] ('man like a god').
"""

advanced = """
The @deva[तत्पुरुषे उपमानमन्तरा तृतीयासप्तम्योरुपमितश्च] lists four @deva[तत्पुरुष] configurations preserving @deva[पूर्वपद स्वर]: @deva[उपमान] ('resemblance standard'), @deva[तृतीया]-related, @deva[सप्तमी]-related, and @deva[उपमित] ('compared entity'). These semantic conditions override @ref[6.1.223]'s default. The @deva[उपमान/उपमित] distinction: @deva[उपमान] = standard of comparison; @deva[उपमित] = that which is compared.
"""

id = "6.2.107"
numericId = "62107"

[en]
simple = """
In a @deva[बहुव्रीहि] compound that's a name, the first member gets final-syllable accent before @deva[उदर] 'belly', @deva[अश्व] 'horse', or @deva[इषु] 'arrow'. Examples: @deva[वृकोदरः], @deva[दामोदरः], @deva[हर्यश्वः], @deva[यौवनाश्वः], @deva[महेषुः].
"""

standard = """
Before @deva[उदर], @deva[अश्व], or @deva[इषु] in @deva[बहुव्रीहि] names, the @deva[पूर्वपद] receives @deva[अन्त्योदात्त]. This overrides @ref[6.2.1]. The word @deva[वृक] has first-syllable accent by @[phiṭ] II.7; @deva[दाम] is formed by @deva[मनिन्] affix. Examples: @deva[वृकोदरः] 'wolf-bellied' (@[bhīma]), @deva[हर्यश्वः] 'tawny-horsed', @deva[सुवर्णपुङ्खेषुः] 'gold-feathered-arrow'.
"""

advanced = """
The enumeration @deva[उदराश्विष्वः] identifies @deva[उत्तरपद] triggering @deva[पूर्वपदान्त्योदात्त] in @deva[संज्ञा] @deva[बहुव्रीहि]. The word @deva[वृक] (@[phiṭ] II.7 @deva[आद्युदात्त]) and @deva[दाम] (@deva[मनिन्]-derived) would retain original accent by @ref[6.2.1], but @deva[संज्ञा] condition overrides. The epic name @deva[वृकोदर] (@[bhīma]) exemplifies this pattern.
"""

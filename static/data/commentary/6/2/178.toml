id = "6.2.178"
numericId = "62178"

[en]
simple = """
After a preposition, the word @deva[वन] 'forest' gets final-syllable accent in all compound types. Examples: @deva[प्रवणे] @deva[यष्टव्यम्] 'sacrifice is to be performed in the forest', @deva[निर्वणे] 'outside the forest'. The @deva[न] becomes @deva[ण] by @ref[8.4.5].
"""

standard = """
The word @deva[वन] receives @deva[अन्त्योदात्त] after @deva[उपसर्ग] in all @deva[समास] types (not just @deva[बहुव्रीहि]). Examples: @deva[प्रवणे] @deva[यष्टव्यम्], @deva[निर्वणे] @deva[प्रणिधीयते]. The @deva[न] → @deva[ण] change follows @ref[8.4.5]. The word @deva[समास] in the @[sūtra] indicates all compound types, overriding the @deva[बहुव्रीहि] @deva[अधिकार].
"""

advanced = """
The explicit @deva[समासे] extends this rule beyond @deva[बहुव्रीहि] (the current @deva[अधिकार] context) to all compound types—@deva[अव्ययीभाव], @deva[तत्पुरुष], etc. The @deva[रेफ] of @deva[प्र]/@deva[निर्]] triggers @deva[णत्व] by @ref[8.4.5]. This generalization across compound types is unusual and explicitly marked.
"""

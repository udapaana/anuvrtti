id = "6.2.163"
numericId = "62163"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, the word @deva[स्तन] 'breast' gets final-syllable accent after a numeral. Examples: @deva[द्विस्तना] 'two-breasted', @deva[त्रिस्तना] 'three-breasted', @deva[चतुःस्तनाः] 'four-breasted'. Non-numeral: @deva[दशनायस्तना] (teeth-like breasts).
"""

standard = """
In @deva[संख्या]-@deva[पूर्व] @deva[बहुव्रीहि], @deva[स्तन] receives @deva[अन्त्योदात्त]: @deva[द्विस्तना], @deva[त्रिस्तना], @deva[चतुःस्तनाः]. Counterexamples: @deva[दशनायस्तना] (non-numeral @deva[पूर्वपद]); @deva[द्विशिराः] 'two-headed' (not @deva[स्तन]). The numeral and @deva[स्तन] conditions are both essential.
"""

advanced = """
The @deva[संख्या]-@deva[पूर्व] condition restricts this @deva[अन्त्योदात्त] to numeral + @deva[स्तन] @deva[बहुव्रीहि]. The counterexample @deva[दशनायस्तना] 'having teeth-like breasts' (@deva[उपमान] compound) shows that non-numeral @deva[पूर्वपद] yields different accent. The @deva[द्विशिराः] counterexample confirms the @deva[स्तन]-specificity.
"""

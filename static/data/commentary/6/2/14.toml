id = "6.2.14"
numericId = "62014"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[मात्रा] ('measure'), @deva[उपज्ञा] ('invention'), @deva[उपक्रम] ('beginning'), or @deva[छाया] ('shadow') as second member, the first member keeps its accent when these appear as neuter forms. So @deva[यव꣡मात्रम्] ('grain-sized').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for compounds with @deva[मात्रा/उपज्ञा/उपक्रम/छाया] as @deva[उत्तरपद] when these take neuter gender (@deva[क्लीबे]). Examples: @deva[यव꣡मात्रम्] ('barley-measure'), @deva[पाणिनि꣡युपज्ञम्] ('@[pāṇini]'s invention'). The neuter form triggers first-member accent.
"""

advanced = """
The @deva[मात्रोपज्ञोपक्रमच्छायासु क्लीबे] condition lists four words requiring neuter gender for @deva[पूर्वपद प्रकृतिस्वर]. When @deva[मात्रा] → @deva[मात्र] (neut.), @deva[उपज्ञा] → @deva[उपज्ञ] (neut.), etc., the first member retains accent. @deva[यव꣡मात्र] ('grain-sized'), @deva[पाणिनि꣡युपज्ञ] ('@[pāṇini-invented]'). Feminine forms follow different accent.
"""

id = "6.2.35"
numericId = "62035"

[en]
simple = """
In a @deva[द्वन्द्व] compound, a numeral as first member keeps its accent. So @deva[ए꣡कादश] ('eleven' = 1+10), @deva[द्वा꣡दश] ('twelve' = 2+10), @deva[त्र꣡योदश] ('thirteen' = 3+10).
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for numerals in @deva[द्वन्द्व]. The compound numerals like @deva[ए꣡कादश], @deva[द्वा꣡दश], @deva[त्र꣡योदश] (or @deva[त्रयोद꣡श]) retain first-member accent. These are additive @deva[द्वन्द्व] (1+10, 2+10, etc.).
"""

advanced = """
The @deva[द्वन्द्वे संख्यस्य] rule: @deva[संख्या] (numeral) as @deva[पूर्वपद] in @deva[द्वन्द्व] preserves @deva[प्रकृतिस्वर]. The teens (11-19) are @deva[द्वन्द्व] of unit + @deva[दशन्]: @deva[ए꣡कादश], @deva[द्वा꣡दश], @deva[त्र꣡योदश/त्रयोद꣡श]. The optional accent on @deva[त्रयोदश] suggests variant patterns for certain numerals.
"""

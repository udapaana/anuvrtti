id = "6.2.64"
numericId = "62064"

[en]
simple = """
From here through @ref[6.2.91], understand that 'the first syllable gets acute accent'. This is an @deva[अधिकार] (governing rule) that controls the following @[sūtras]—they all assign first-syllable accent.
"""

standard = """
This is an @deva[अधिकार] @[sūtra]: from @ref[6.2.64] through @ref[6.2.91], the @deva[पूर्वपद] gets @deva[आद्युदात्त] (first-syllable accent). This shifts from the @deva[प्रकृतिस्वर] rules to @deva[आद्युदात्त] rules. The @deva[प्रथमा] (nominative) indicates the first member receives this accent.
"""

advanced = """
The @deva[प्रथमायाः आदिः आ भूताधिकसंजीवमद्राश्मकज्जलम्] establishes @deva[अधिकार]: rules through @ref[6.2.91] assign @deva[आद्युदात्त] to @deva[पूर्वपद]. This contrasts with earlier @deva[प्रकृतिस्वर] rules. The @deva[प्रथमायाः] indicates the nominative-case first member; @deva[आदिः] specifies first-syllable accent. A new accent-assignment domain begins.
"""

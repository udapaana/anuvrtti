id = "6.2.189"
numericId = "62189"

[en]
simple = """
After @deva[अनु] 'following', a non-principal word and the word @deva[कनीयस्] 'younger' get final-syllable accent. Examples: @deva[अनुज्येष्ठः] 'following the eldest', @deva[अनुमध्यमः] 'following the middle one', @deva[अनुकनीयम्] 'following the youngest'.
"""

standard = """
After @deva[अनु], @deva[अप्रधान] (non-principal/dependent) words receive @deva[अन्त्योदात्त]: @deva[अनुज्येष्ठः] (@deva[अनुगतो] @deva[ज्येष्ठम्]), @deva[अनुमध्यमः]. These are @deva[प्रादिसमास] where @deva[अनु] is @deva[प्रधान]. Separately, @deva[कनीयस्] takes @deva[अन्त्योदात्त]: @deva[अनुकनीयम्] (@deva[अनुगतः] @deva[कनीयान्]), even though here the @deva[उत्तरपद] is @deva[प्रधान].
"""

advanced = """
Two conditions: (1) @deva[अप्रधान] @deva[उत्तरपद] in @deva[प्रादिसमास] (where prefix is principal); (2) @deva[कनीयस्] specifically (which would be @deva[प्रधान]). The @deva[कनीयस्] enumeration is necessary because it's @deva[प्रधान]—otherwise covered by the general @deva[अप्रधान] rule. Both yield @deva[अन्त्योदात्त].
"""

id = "6.2.27"
numericId = "62027"

[en]
simple = """
In a @deva[कर्मधारय] compound of @deva[कुमार] with @deva[प्रत्येनस्] ('guilty/sinful'), the acute accent falls on the first syllable of @deva[कुमार]. So @deva[कु꣡मारप्रत्येनस्] ('guilty as a child').
"""

standard = """
This @[sūtra] specifies @deva[आद्युदात्त] for @deva[कुमार] before @deva[प्रत्येनस्] ('guilty of sin'). The form is @deva[कु꣡मारप्रत्येनस्] with accent on @deva[कु]. The @deva[प्रत्येनस्] means 'guilty/sinful' (one who has committed @deva[एनस्] 'sin').
"""

advanced = """
The @deva[प्रत्येनसि आदिः] rule: @deva[कुमार] + @deva[प्रत्येनस्] takes @deva[आद्युदात्त] (first-syllable accent) on @deva[कुमार]. This overrides @ref[6.2.26]'s general @deva[प्रकृतिस्वर] for this specific compound. @deva[कु꣡मारप्रत्येनस्] ('one who has been guilty since youth'). The @deva[प्रत्येनस्] = @deva[प्रति + एनस्] ('against + sin' = 'having sin').
"""

id = "6.2.56"
numericId = "62056"

[en]
simple = """
The word @deva[प्रथम] ('first/novice') as first member optionally keeps its accent when meaning 'beginner'. So @deva[प्रथमवैयाकरणः] ('beginning grammarian') can have either accent pattern.
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[प्रथम] meaning 'novice/beginner'. @deva[प्रथम꣡वैयाकरणः] or @deva[प्रथमवैयाकरण꣡ः] ('one just starting to study grammar'). The @deva[अभ्यर्हित] ('novice') sense allows optionality.
"""

advanced = """
The @deva[प्रथमस्य अभ्यर्हिते वा] condition: @deva[प्रथम] in @deva[अभ्यर्हित] sense ('novice', one who has just started) shows @deva[विभाषा]. @deva[संप्रति व्याकरणम् अध्येतुं प्रवृत्तः] = @deva[प्रथमवैयाकरण] ('recently begun studying grammar'). The novice meaning triggers optional accent.
"""

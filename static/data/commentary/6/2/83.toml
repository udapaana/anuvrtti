id = "6.2.83"
numericId = "62083"

[en]
simple = """
In a word of more than two syllables followed by @deva[ज] ('born'), the accent falls on the syllable before the last (penultimate). So @deva[उपस꣡रजः] ('lower-born') has accent on @deva[स].
"""

standard = """
This @[sūtra] assigns @deva[उपोत्तमोदात्त] (penultimate accent) to @deva[त्र्यादि] (3+ syllable) words before @deva[ज]. Examples: @deva[उपस꣡रजः] ('born below'), @deva[मन्दु꣡रजः] ('stable-born'). The penultimate syllable gets accent.
"""

advanced = """
The @deva[त्र्यादेरुपोत्तमं जे] condition: @deva[त्र्यादि] (three or more syllables) + @deva[ज] takes @deva[उपोत्तम] (penultimate) accent. @deva[उपस꣡रज], @deva[मन्दु꣡रज]. This contrasts with @ref[6.2.82]'s @deva[आद्युदात्त] for shorter stems. Polysyllabic @deva[ज]-compounds accent differently.
"""

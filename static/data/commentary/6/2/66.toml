id = "6.2.66"
numericId = "62066"

[en]
simple = """
A first member gets first-syllable accent when the second member denotes someone who regulates or keeps the first in order. So @deva[ग꣡वाध्यक्ष] ('cow-superintendent') has accent on @deva[ग].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] when @deva[उत्तरपद] denotes @deva[युक्त] ('regulator/keeper') of what @deva[पूर्वपद] denotes. @deva[युक्त] means 'one who manages/controls'. Example: @deva[ग꣡वाध्यक्षः] ('cattle-overseer').
"""

advanced = """
The @deva[युक्ते] condition: @deva[उत्तरपद] expressing @deva[युक्त] ('manager/controller/keeper') of @deva[पूर्वपद]. The first member (what is managed) takes @deva[आद्युदात्त]: @deva[ग꣡वाध्यक्ष] ('cattle superintendent'), @deva[अ꣡श्वाध्यक्ष] ('horse superintendent'). Administrative titles show this pattern.
"""

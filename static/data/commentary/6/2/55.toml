id = "6.2.55"
numericId = "62055"

[en]
simple = """
A first member denoting quantity of gold optionally keeps its accent before @deva[धन] ('wealth'). So @deva[द्विसुवर्णधनम्] ('two-gold-pieces worth') can be @deva[द्विसुवर्ण꣡धनम्] or @deva[द्विसुवर्णधन꣡म्].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for gold-quantity words before @deva[धन]. In @deva[कर्मधारय], @deva[द्विसुवर्ण꣡धनम्] or @deva[द्विसुवर्णधन꣡म्] ('wealth of two gold pieces') are both valid. The gold-measure + wealth combination allows optional accent.
"""

advanced = """
The @deva[सौवर्णपरिमाणस्य धने वा] condition: @deva[सौवर्णपरिमाण] (gold-quantity measure) as @deva[पूर्वपद] + @deva[धन] shows @deva[विभाषा]. @deva[द्विसुवर्ण꣡धन/द्विसुवर्णधन꣡]. This is a @deva[कर्मधारय] where the gold-amount qualifies wealth-value.
"""

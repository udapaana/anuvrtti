id = "6.2.32"
numericId = "62032"

[en]
simple = """
A word in the @deva[सप्तमी] (locative) case (7th) that doesn't denote time keeps its accent before @deva[सिद्ध] ('cooked'), @deva[शुष्क] ('dried'), @deva[पक्व] ('ripened'), or @deva[बन्ध] ('bound'). So @deva[स्थाली꣡सिद्धम्] ('cooked in a pot').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] when a non-temporal locative compounds with @deva[सिद्ध/शुष्क/पक्व/बन्ध]. Examples: @deva[स्थाली꣡सिद्धम्] ('pot-cooked'), @deva[शाखा꣡शुष्कम्] ('branch-dried'). The locative relationship (cooked IN X) preserves first-member accent.
"""

advanced = """
The @deva[सप्तम्यकालात् सिद्धशुष्कपक्वबन्धेषु] condition: @deva[सप्तमी]-ending @deva[पूर्वपद] (locative sense) that is @deva[अकाल] (non-temporal) + these four participles. @deva[स्थाली꣡सिद्ध] ('cooked in pot'), @deva[शाखा꣡शुष्क] ('dried on branch'), @deva[वृक्ष꣡पक्व] ('ripened on tree'). Time-locatives would follow different rules.
"""

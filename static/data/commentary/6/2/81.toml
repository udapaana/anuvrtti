id = "6.2.81"
numericId = "62081"

[en]
simple = """
The compounds @deva[युक्तारोहिन्] ('trained climber') and similar listed words have first-syllable accent. These are specific compound names that take @deva[आद्युदात्त].
"""

standard = """
This @[sūtra] lists @deva[युक्तारोह्यादि] compounds with @deva[आद्युदात्त]: @deva[यु꣡क्तारोही], @deva[आ꣡गतरोही], @deva[आ꣡गतयोधी], @deva[आ꣡गतवञ्ची], etc. These are @deva[णिनि]-compounds with specific first members that take first-syllable accent.
"""

advanced = """
The @deva[युक्तारोह्यादयश्च] introduces a @deva[गण] of @deva[णिनि]-compounds with @deva[आद्युदात्त]. The list includes: @deva[यु꣡क्तारोहिन्], @deva[आ꣡गतरोहिन्], @deva[आ꣡गतयोधिन्], @deva[आ꣡गतवञ्चिन्], @deva[आ꣡गतनर्दिन्], @deva[आ꣡गतग्राहिन्], @deva[यु꣡क्तग्राहिन्]. These @deva[निपातन] forms require memorization.
"""

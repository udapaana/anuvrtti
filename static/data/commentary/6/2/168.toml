id = "6.2.168"
numericId = "62168"

[en]
simple = """
The final-syllable accent on @deva[मुख] 'mouth' (from @ref[6.2.167]) doesn't apply after: indeclinables, direction words, or the words @deva[गो], @deva[महत्], @deva[स्थूल], @deva[मुष्टि], @deva[पृथु], @deva[वत्स]. Examples: @deva[उच्चैर्मुखः] (with indeclinable @deva[उच्चैः]), @deva[प्राङ्मुखः] (with direction @deva[प्राच्]), @deva[गोमुखः], @deva[महामुखः].
"""

standard = """
This @[sūtra] blocks @ref[6.2.167]'s @deva[अन्त्योदात्त]. After @deva[अव्यय]: @deva[उच्चैर्मुखः], @deva[नीचैर्मुखः] (retain @deva[अव्यय]'s final accent). After @deva[दिश्]: @deva[प्राङ्मुखः], @deva[प्रत्यङ्मुखः] (@deva[प्राङ्] has @deva[आद्युदात्त] by @ref[6.2.52]). After the six listed words: @deva[गोमुखः], @deva[महामुखः], @deva[स्थूलमुखः], @deva[मुष्टिमुखः], @deva[पृथुमुखः], @deva[वत्समुखः].
"""

advanced = """
Three exception categories: (1) @deva[अव्यय]-@deva[पूर्वपद] retaining its accent; (2) @deva[दिक्]-@deva[शब्द] with their inherent accent patterns; (3) the six enumerated words. The direction words follow @ref[6.2.52] etc. for their accent. The @deva[गवादि] list (@deva[गो], @deva[महत्], @deva[स्थूल], @deva[मुष्टि], @deva[पृथु], @deva[वत्स]) blocks @deva[मुख]-@deva[अन्त्योदात्त] specifically.
"""

id = "6.2.149"
numericId = "62149"

[en]
simple = """
The @deva[क्त] participle gets final-syllable accent when the compound means 'done by one in such a condition' (@deva[इत्थंभूत]). Examples: @deva[सुप्तप्रलपितम्] 'babbled while sleeping', @deva[उन्मत्तप्रलपितम्] 'babbled while mad', @deva[प्रमत्तगीतम्] 'sung while intoxicated'.
"""

standard = """
The @deva[इत्थंभूत] (being in such a state) condition triggers @deva[अन्त्योदात्त]. The @deva[पूर्वपद] denotes the agent's condition: @deva[सुप्तप्रलपितम्] 'babbling done while asleep', @deva[उन्मत्तप्रलपितम्] 'babbling done while mad', @deva[प्रमत्तगीतम्] 'singing done while intoxicated', @deva[विपन्नश्रुतम्] 'learning done while distressed'. These function as adjectives or abstract nouns.
"""

advanced = """
The @deva[इत्थंभूतलक्षण] compound type identifies the agent's state during the action. This @deva[अन्त्योदात्त] rule is an exception to @ref[6.2.48]. When the same words (@deva[प्रलपित] etc.) function as @deva[भाववाचक] (action nouns), they receive @deva[अन्त्योदात्त] by @ref[6.2.144] anyway. The @deva[इत्थंभूत] condition creates @deva[कर्तृविशेषण] rather than @deva[क्रियाविशेषण] semantics.
"""

id = "6.2.116"
numericId = "62116"

[en]
simple = """
After a negative particle (@deva[नञ्]), the words @deva[जर] 'old age', @deva[मर] 'death', @deva[मित्र] 'friend', and @deva[मृत] 'dead' get first-syllable accent in @deva[बहुव्रीहि]. Examples: @deva[अजरः] 'ageless', @deva[अमरः] 'deathless', @deva[अमित्रः] 'friendless/enemy', @deva[अमृतः] 'undying'.
"""

standard = """
These four words receive @deva[उत्तरपदाद्युदात्त] after @deva[नञ्] in @deva[बहुव्रीहि]: @deva[अजरः], @deva[अमरः], @deva[अमित्रः], @deva[अमृतः]. The @deva[नञ्] condition is essential—@deva[ब्राह्मणमित्रः] 'brahmin's friend' doesn't qualify. And only these four words: @deva[अशत्रुः] 'enemy-less' takes final accent by @ref[6.2.172] instead.
"""

advanced = """
The @deva[नञ्]-@deva[पूर्व] condition restricts this @deva[आद्युदात्त] to negative @deva[बहुव्रीहि] with the enumerated four words. The semantic pattern: @deva[अजर] 'free from aging', @deva[अमर] 'free from death', @deva[अमित्र] 'without friend' (hence enemy), @deva[अमृत] 'not dead/immortal'. The counterexample @deva[अशत्रु] (following @ref[6.2.172] @deva[अन्तोदात्त]) shows this is a closed list.
"""

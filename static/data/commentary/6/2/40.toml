id = "6.2.40"
numericId = "62040"

[en]
simple = """
The word @deva[उष्ट्र] ('camel') keeps its accent before @deva[सादि] ('rider') and @deva[वामि] ('vomiter'). So @deva[उ꣡ष्ट्रसादि] ('camel-rider') and @deva[उ꣡ष्ट्रवामि] ('camel that vomits').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[उष्ट्र] before @deva[सादि/वामि]. Examples: @deva[उ꣡ष्ट्रसादि] ('one who rides camels'), @deva[उ꣡ष्ट्रवामि] ('vomiting camel'). The word @deva[उष्ट्र] derives from @deva[उप्] with @deva[ष्ट्रन्] affix.
"""

advanced = """
The @deva[उष्ट्रस्य सादिवामिषु] rule: @deva[उष्ट्र] (from @deva[उप् + ष्ट्रन्]) preserves @deva[प्रकृतिस्वर] before @deva[सादि] ('rider', from @deva[सद्]) and @deva[वामि] ('vomiter', from @deva[वम्]). @deva[उ꣡ष्ट्रसादि], @deva[उ꣡ष्ट्रवामि] show the pattern. These are specific lexical compounds with exceptional accent.
"""

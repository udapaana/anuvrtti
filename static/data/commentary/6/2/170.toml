id = "6.2.170"
numericId = "62170"

[en]
simple = """
In a @deva[बहुव्रीहि], @deva[क्त]-participles get final-syllable accent after species words (except garment words), time words, or @deva[सुख] etc.—but not @deva[कृत], @deva[मित], @deva[प्रतिपन्न]. Examples: @deva[सारङ्गजग्धः] 'eaten by deer', @deva[मासजातः] 'born in a month', @deva[सुखजातः] 'born in pleasure'.
"""

standard = """
Three @deva[पूर्वपद] categories trigger @deva[अन्त्योदात्त] on @deva[निष्ठा]: (1) @deva[जाति] 'species' (not @deva[वस्त्र] 'garment'): @deva[सारङ्गजग्धः], @deva[पलाण्डुभक्षितः], @deva[सुरापीतः]; (2) @deva[काल] 'time': @deva[मासजातः], @deva[संवत्सरजातः], @deva[द्व्यहजातः]; (3) @deva[सुखादि]: @deva[सुखजातः], @deva[दुःखजातः], @deva[तृप्तजातः]. Exceptions: @deva[कृत], @deva[मित], @deva[प्रतिपन्न] don't take this accent.
"""

advanced = """
The triple condition—@deva[जाति] (excluding @deva[वस्त्र]), @deva[काल], @deva[सुखादि]—defines contexts for @deva[निष्ठा]-@deva[अन्त्योदात्त]. The @deva[वस्त्र] exception may relate to metaphorical usage. The @deva[कृत]/@deva[मित]/@deva[प्रतिपन्न] exceptions suggest specific semantic or morphological considerations blocking the general rule. The @deva[सुखादि] forms a lexical class.
"""

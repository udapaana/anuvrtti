id = "6.2.188"
numericId = "62188"

[en]
simple = """
After @deva[अधि] 'upon', a word meaning 'that which overlaps or stands upon' gets final-syllable accent. Examples: @deva[अधिदन्तः] 'tooth growing over another', @deva[अधिकर्णः] 'ear growing over ear', @deva[अधिकेशः] 'hair over hair'. Without 'standing upon': @deva[अधिकरणम्].
"""

standard = """
When denoting @deva[अधिभाव] (superimposition/overlay), @deva[उत्तरपद] after @deva[अधि] receives @deva[अन्त्योदात्त]: @deva[अधिदन्तः] (@deva[दन्तस्योपरि] @deva[योऽन्यो] @deva[दन्तो] @deva[जायते]), @deva[अधिकर्णः], @deva[अधिकेशः]. These are @deva[प्रादिसमास] or appositional compounds with elided second member. Counterexample: @deva[अधिकरणम्] (@deva[कृत्]-formed, retaining accent by @ref[6.2.139]).
"""

advanced = """
The @deva[अधिभाव] (standing upon/overlapping) condition restricts this to superimposition meanings. The counterexample @deva[अधिकरण] shows @deva[कृत्]-formed words follow @ref[6.2.139] @deva[प्रकृतिस्वर] instead. The compounds may be @deva[प्रादिसमास] or analyzed as @deva[बहुव्रीहि] with elided qualifiee.
"""

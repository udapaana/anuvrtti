id = "6.2.194"
numericId = "62194"

[en]
simple = """
In a @deva[तत्पुरुष] compound, disyllabic words and @deva[अजिन्] 'hide' get final-syllable accent after @deva[उप] 'near'—except @deva[गौर] etc. Examples: @deva[उपदेवः] 'sub-deity', @deva[उपेन्द्रः] 'Upendra', @deva[उपसोमः], @deva[उपाजिनम्]. Exceptions: @deva[उपगौरः], @deva[उपनैषः].
"""

standard = """
In @deva[तत्पुरुष], @deva[द्व्यच्] (disyllabic) words and @deva[अजिन्] receive @deva[अन्त्योदात्त] after @deva[उप]: @deva[उपदेवः] (@deva[उपगतो] @deva[देवः]), @deva[उपेन्द्रः], @deva[उपसोमः], @deva[उपहोडः], @deva[उपाजिनम्]. @deva[गौरादि] exceptions: @deva[उपगौरः], @deva[उपनैषः]/@deva[उपतैषः], @deva[उपतैलः], @deva[उपलेटः], @deva[उपलोटः], @deva[उपजिह्वा], @deva[उपकृष्णः]/@deva[कृष्णा]], @deva[उपकन्या], @deva[उपगुधः]/@deva[गुडः]], @deva[उपकल्पः], @deva[उपपाठः].
"""

advanced = """
The @deva[द्व्यच्] (two-syllable) condition with @deva[गौरादि] exceptions defines a morphophonemic class. The @[gaṇa] includes: @deva[गौर], @deva[तैष]/@deva[नैष]], @deva[तैल], @deva[लेट], @deva[लोट], @deva[जिह्वा], @deva[कृष्ण]/@deva[कृष्णा]], @deva[कन्या], @deva[गुध]/@deva[गुड]], @deva[कल्प], @deva[पाठ]. Non-@deva[तत्पुरुष] compounds don't qualify (the @deva[तत्पुरुष] condition is explicit).
"""

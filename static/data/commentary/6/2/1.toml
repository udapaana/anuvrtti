id = "6.2.1"
numericId = "62001"

[en]
simple = """
In a @deva[बहुव्रीहि] compound (possessive compound), the first member keeps its original accent. So in @deva[बहुव्रीहि] like @deva[महाराजः] ('having a great king'), the first part @deva[महा] retains the accent it had as an independent word.
"""

standard = """
This @[sūtra] establishes that in @deva[बहुव्रीहि समास], the @deva[पूर्वपद] (first member) retains its original @deva[स्वर] (accent). The compound doesn't take the default @deva[अन्तोदात्त] (@ref[6.1.223]); instead, the first member's inherent accent (@deva[उदात्त] or @deva[स्वरित]) is preserved. Example: @deva[म꣡हाराजः] retains @deva[महा]'s accent.
"""

advanced = """
The @deva[बहुव्रीहौ पूर्वपदं प्रकृतिस्वरम्] is a fundamental compound accent rule. The @deva[प्रकृतिस्वर] (original accent) of the @deva[पूर्वपद] surfaces in the compound, overriding @ref[6.1.223]'s @deva[अन्तोदात्त]. This applies to all @deva[बहुव्रीहि] types. The @deva[पूर्वपद] may itself be compound; its final accent position is preserved. This rule initiates @[pāda] 6.2's detailed compound accent section.
"""

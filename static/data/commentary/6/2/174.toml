id = "6.2.174"
numericId = "62174"

[en]
simple = """
When a @deva[नञ्]/@deva[सु]] @deva[बहुव्रीहि] with @deva[कप्] affix ends in a light vowel, the accent falls on the syllable before that light syllable. Examples: @deva[अयवकः] 'barley-less', @deva[अव्रीहिकः] 'rice-less', @deva[सुयवकः], @deva[सुव्रीहिकः].
"""

standard = """
When the @deva[उत्तरपद] ends in @deva[लघ्वच्] (light vowel) and @deva[कप्] is added, accent falls on the second-to-last syllable (before the light vowel). Examples: @deva[अयवको] @deva[देशः], @deva[अव्रीहिकः], @deva[अमाषकः], @deva[सुयवकः], @deva[सुव्रीहिकः], @deva[सुमाषकः]. The repeated @deva[पूर्व] indicates: in @ref[6.2.173], 'before @deva[कप्]'; here, 'before the light vowel before @deva[कप्]'.
"""

advanced = """
The repetition of @deva[पूर्व] clarifies the accent shift. In @ref[6.2.173], @deva[पूर्व] meant 'before @deva[कप्]' (on @deva[गुरु] syllables). Here, @deva[लघ्वच्] condition pushes accent one syllable further back. Thus @deva[अयवक] has accent on @deva[य] (before the light @deva[व]), while @deva[अकुमारीक] (@ref[6.2.173]) has accent on @deva[री] (before @deva[क]).
"""

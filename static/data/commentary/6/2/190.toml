id = "6.2.190"
numericId = "62190"

[en]
simple = """
After @deva[अनु], the word @deva[पुरुष] 'man' gets final-syllable accent when it means 'a man already mentioned' (@deva[अन्वादिष्ट]). Example: @deva[अनुपुरुषः] 'the aforementioned man'. But @deva[अनुगतः] @deva[पुरुषः] = @deva[अनुपुरुषः] (following a man) doesn't qualify.
"""

standard = """
When @deva[पुरुष] means @deva[अन्वादिष्ट] (previously mentioned, secondary reference), @deva[अनु] + @deva[पुरुष] receives @deva[अन्त्योदात्त]: @deva[अन्वादिष्टः] @deva[पुरुषः] = @deva[अनुपुरुषः]. The @deva[अन्वादिष्ट] sense = 'mentioned again' or 'of secondary importance'. Contrast: @deva[अनुगतः] @deva[पुरुषः] = @deva[अनुपुरुषः] (one who follows) takes different accent.
"""

advanced = """
The @deva[अन्वादिष्ट] semantic condition distinguishes referential mention (previously named person) from following/accompanying sense. Only the backreference meaning triggers @deva[अन्त्योदात्त]. The @deva[अनुगत] sense ('one who accompanies') follows general @deva[प्रादिसमास] accent.
"""

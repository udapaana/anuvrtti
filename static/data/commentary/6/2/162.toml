id = "6.2.162"
numericId = "62162"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, after @deva[इदम्] 'this', @deva[एतद्] 'that', or @deva[तद्] 'that', the words @deva[प्रथम] 'first' and ordinal numerals get final-syllable accent when counting occurrences. Examples: @deva[इदंप्रथमः] 'this is the first time', @deva[इदंद्वितीयः] 'this is the second time', @deva[एतत्तृतीयः].
"""

standard = """
In @deva[बहुव्रीहि] expressing @deva[कृत्वसुच्] (number of times), @deva[इदम्]/@deva[एतद्]/@deva[तद्] + @deva[प्रथम] or ordinals receive @deva[अन्त्योदात्त]. The compound @deva[इदं] @deva[प्रथमं] @deva[गमनम्] = @deva[स] @deva[इदंप्रथमः] 'this is his first time going'. Examples: @deva[इदंद्वितीयः], @deva[इदंतृतीयः], @deva[एतत्प्रथमः], @deva[एतद्द्वितीयः], @deva[तत्प्रथमः], @deva[तद्द्वितीयः].
"""

advanced = """
The @deva[कृत्वसुच्] (@deva[वारे] = number of times) condition requires the compound to mean 'nth occurrence'. The @deva[बहुव्रीहि] interpretation: @deva[इदंप्रथमः] = 'one for whom this is the first [time]'. Without the @deva[कृत्वसुच्] meaning, different accent applies. The @[sūtra] specifies @deva[प्रथम] separately since it's not a derived ordinal like @deva[द्वितीय].
"""

id = "6.2.119"
numericId = "62119"

[en]
simple = """
In Vedic, when @deva[सु] precedes a two-syllable word with first-syllable accent in a @deva[बहुव्रीहि], that word keeps its original accent. Examples from @[ṛgveda]: @deva[स्वश्वः] 'having good horses' (from @deva[अश्व]), @deva[सुरथः] 'having good chariot' (from @deva[रथ]).
"""

standard = """
In @deva[छन्दस्] (Vedic), a disyllabic @deva[आद्युदात्त] word after @deva[सु] in @deva[बहुव्रीहि] retains its first-syllable accent. @[ṛgveda] X.76.8 has @deva[स्वश्वासिन्धुः] @deva[सुरथा] @deva[सुवासा]. The words @deva[अश्व] (by @deva[क्वन्], @[uṇādi] I.151) and @deva[रथ] (by @deva[क्थन्], @[uṇādi] II.2) are inherently @deva[आद्युदात्त].
"""

advanced = """
This Vedic rule preserves original accent for @deva[द्व्यक्षर] @deva[आद्युदात्त] words after @deva[सु]. The @deva[क्वन्]-derived @deva[अश्व] and @deva[क्थन्]-derived @deva[रथ] (@[uṇādi] I.151, II.2) maintain their inherent first-syllable acute. The @[ṛgvedic] citation demonstrates that Vedic accent patterns differ from classical rules, preserving @deva[प्रकृतिस्वर] in specific compound types.
"""

id = "6.2.89"
numericId = "62089"

[en]
simple = """
The first member gets first-syllable accent before @deva[नगर] ('city'), but not when the first member is @deva[महत्] or @deva[नव], nor when referring to Eastern cities (@deva[प्राच्य]). So @deva[ह꣡स्तिनगरम्] ('@[hastināpura]'), but not @deva[महानगरम्].
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] before @deva[नगर] with exceptions: @deva[महत्/नव] as first member, and @deva[प्राच्यदेश] (Eastern land) cities are excluded. Example: @deva[ह꣡स्तिनगरम्] ('elephant-city'), but @deva[महानगर꣡म्] and Eastern city-names follow default accent.
"""

advanced = """
The @deva[नगरे अमहान्नवयोरप्राच्यदेशे] condition: @deva[नगर]-compounds take @deva[आद्युदात्त] except when @deva[पूर्वपद] is @deva[महत्/नव], or when denoting @deva[प्राच्यदेश] (Eastern region) cities. @deva[ह꣡स्तिनगर], @deva[कु꣡ञ्जनगर] but @deva[महानगर꣡], @deva[नवनगर꣡], and Eastern cities differ.
"""

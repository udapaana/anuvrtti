id = "6.2.110"
numericId = "62110"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, when a @deva[क्त]-participle with a prefix stands first, it optionally gets final-syllable accent. Example: @deva[प्रधौतमुखः] 'washed-face' can have accent on @deva[त], on final @deva[खः] (@ref[6.2.169]), or on @deva[प्र] (@ref[6.2.49], @ref[6.2.1]).
"""

standard = """
This rule gives three accent options for @deva[उपसर्गपूर्व] @deva[निष्ठा] (prefixed past participle) in @deva[बहुव्रीहि]: (1) @deva[अन्त्योदात्त] on participle's final by this rule; (2) accent on @deva[उत्तरपद]'s final by @ref[6.2.169]; (3) original prefix accent by @ref[6.2.49] and @ref[6.2.1]. Thus @deva[प्रधौतमुखः] or @deva[प्रधौतमुखः] or @deva[प्रधौतमुखः]. When @deva[मुख] means 'mouth', @ref[6.2.167] applies.
"""

advanced = """
The @deva[अन्यतरस्याम्] option creates a three-way alternation closing the @ref[6.2.92] @deva[अधिकार]. Option (1): @deva[पूर्वपदान्त्योदात्त] by this @[sūtra]; (2): @deva[उत्तरपदान्त्योदात्त] by @ref[6.2.169]; (3): @deva[प्रकृतिस्वर] on @deva[उपसर्ग] by @ref[6.2.49]/@ref[6.2.1]. The @deva[मुख] 'mouth' vs. 'face' distinction invokes @ref[6.2.167]'s optional accent on @deva[ख].
"""

id = "6.2.175"
numericId = "62175"

[en]
simple = """
A @deva[बहुव्रीहि] with @deva[बहु] 'many' follows the same accent rules as @deva[नञ्] compounds when it means abundance of what the second member denotes. Examples: @deva[बहुयवा] @deva[देशः] 'land with much barley' (like @deva[अयवः]), @deva[बहुव्रीहिः] 'much rice', @deva[बहुयवकः] (like @deva[अयवकः]).
"""

standard = """
When @deva[बहु]-@deva[पूर्व] @deva[बहुव्रीहि] denotes @deva[प्राचुर्य] (abundance) of the @deva[उत्तरपद], it follows @deva[नञ्]-compound accent rules (@ref[6.2.172] etc.). Thus @deva[बहुयवा] @deva[देशः], @deva[बहुव्रीहिः], @deva[बहुतिलः] (like @ref[6.2.172]); @deva[बहुयवकः], @deva[बहुव्रीहिकः], @deva[बहुमाषकः] (like @ref[6.2.174]).
"""

advanced = """
The @deva[प्राचुर्य] condition equates @deva[बहु] semantically with @deva[नञ्] for accent purposes—both quantify the @deva[उत्तरपद] referent. Thus @deva[बहुयव] 'having much barley' parallels @deva[अयव] 'having no barley' in accent treatment. All rules applicable to @deva[नञ्]/@deva[सु] compounds (@ref[6.2.172]-@ref[6.2.174] etc.) apply to @deva[बहु] under this condition.
"""

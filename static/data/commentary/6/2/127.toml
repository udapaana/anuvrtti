id = "6.2.127"
numericId = "62127"

[en]
simple = """
The word @deva[चीर] 'bark garment' at the end of a @deva[तत्पुरुष] gets first-syllable accent when comparison is meant. Examples: @deva[वस्त्रचीरम्] 'cloth like bark', @deva[पटचीरम्], @deva[कम्बलचीरम्]. Without comparison: @deva[परमचीरम्] 'excellent bark garment'.
"""

standard = """
When @deva[चीर] (bark garment) is used comparatively in @deva[तत्पुरुष], it receives @deva[आद्युदात्त]. The compound @deva[वस्त्रं] @deva[चीरमिव] = @deva[वस्त्रचीरम्] means 'cloth that is like @deva[चीर]' (i.e., worn, tattered). Examples: @deva[पटचीरम्], @deva[कम्बलचीरम्]. The counterexample @deva[परमचीरम्] 'best bark garment' lacks the comparative sense.
"""

advanced = """
The @deva[उपमान] condition requires @deva[चीर] to function as the comparison standard. The @deva[उपमित] @deva[तत्पुरुष] @deva[वस्त्रचीरम्] (cloth resembling bark-cloth) differs from descriptive @deva[परमचीरम्] (excellent bark-cloth). The accent distinguishes comparative from attributive semantics in @deva[चीर]-final compounds.
"""

id = "6.2.95"
numericId = "62095"

[en]
simple = """
Before @deva[कुमारी] 'maiden', the first member gets final-syllable accent when the compound denotes age. Examples: @deva[वृद्धकुमारी] 'old maid' (formed by @ref[2.1.57]), @deva[जरत्कुमारी] 'aged maiden' (from @deva[जरती] by @ref[2.1.49]). These compounds become masculine by @ref[6.3.42].
"""

standard = """
The condition @deva[वयसि] 'denoting age' is essential. Though @deva[कुमारी] by @deva[ङीप्] (@ref[4.1.20]) means 'young woman', when compounded with age-words like @deva[वृद्धा] or @deva[जरती], the combination denotes one who remains unmarried at advanced age. The apparent semantic contradiction is resolved by understanding @deva[कुमारी] as 'unmarried' rather than 'young'.
"""

advanced = """
The @deva[वयसि] condition creates a specialized compound meaning 'unmarried despite old age'. The masculine gender assignment by @ref[6.3.42] applies when the compound functions as a name. The @deva[कुमारी] originally formed by @deva[ङीप्] under @ref[4.1.20] for youthful women acquires an extended meaning 'unmarried woman' in these age-denoting compounds, resolving the apparent semantic paradox.
"""

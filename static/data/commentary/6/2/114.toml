id = "6.2.114"
numericId = "62114"

[en]
simple = """
In a @deva[बहुव्रीहि] compound denoting a name or comparison, the words @deva[कण्ठ] 'throat', @deva[पृष्ठ] 'back', @deva[ग्रीवा] 'neck', and @deva[जङ्घा] 'shank' as second member get first-syllable accent. Examples: @deva[शितिकण्ठः] (@[śiva]), @deva[नीलकण्ठः]; @deva[सुग्रीवः], @deva[दशग्रीवः] (@[rāvaṇa]).
"""

standard = """
Four body-part terms receive @deva[उत्तरपदाद्युदात्त] in @deva[संज्ञा] or @deva[उपमा] @deva[बहुव्रीहि]: @deva[कण्ठ], @deva[पृष्ठ], @deva[ग्रीवा], @deva[जङ्घा]. Names: @deva[शितिकण्ठः], @deva[नीलकण्ठः] (@[śiva] epithets); @deva[काण्डपृष्टः], @deva[नाकपृष्टः]; @deva[सुग्रीवः] (the monkey king), @deva[दशग्रीवः] (ten-necked @[rāvaṇa]). Resemblance: @deva[खरकण्ठः] 'donkey-throated', @deva[गोपृष्टः] 'cow-backed'.
"""

advanced = """
The enumeration @deva[कण्ठपृष्ठग्रीवाजङ्घाः] parallels @deva[कर्ण] in @ref[6.2.112]-@ref[6.2.113]. Epic names like @deva[सुग्रीव] (@[vālmīki]'s monkey ally) and @deva[दशग्रीव] (@[rāvaṇa]) demonstrate @deva[संज्ञा] usage. The @deva[उपमा] condition handles resemblance compounds like @deva[अश्वग्रीवः] 'horse-necked'. Both contexts trigger @deva[उत्तरपदाद्युदात्त] on the body-part term.
"""

id = "6.2.108"
numericId = "62108"

[en]
simple = """
In a @deva[बहुव्रीहि] compound expressing reproach, the first member gets final-syllable accent before @deva[उदर], @deva[अश्व], or @deva[इषु]. Examples: @deva[कुण्डोदरः] 'pot-bellied' (insult), @deva[घटोदरः], @deva[कटुकाश्वः] 'bitter-horsed', @deva[चलाचलेषुः] 'wobbly-arrowed'.
"""

standard = """
When @deva[निन्दा] (reproach) is intended, the same three words @deva[उदर], @deva[अश्व], @deva[इषु] trigger @deva[पूर्वपदान्त्योदात्त]. The word @deva[कुण्ड] has @deva[आद्युदात्त] as a neuter name (@[phiṭ] II.3); @deva[घट] is formed by @deva[अच्] (@ref[3.1.134]). Reproachful compounds like @deva[कुण्डोदरः] 'pot-belly' or @deva[स्यन्दिताश्वः] 'runny-horsed' override @ref[6.2.1].
"""

advanced = """
The @deva[निन्दा] condition parallels @deva[संज्ञा] in triggering the same accent pattern for @deva[उदर]/@deva[अश्व]/@deva[इषु] compounds. The word @deva[कुण्ड] (@[phiṭ] II.3 @deva[नपुंसकं]) and @deva[घट] (@ref[3.1.134] @deva[अच्]) would normally retain first accent. The semantic condition 'reproach' creates pejorative compounds: @deva[कुण्डोदर] implies unseemly corpulence, @deva[अनिघातेषु] implies ineffective arrows.
"""

id = "6.2.7"
numericId = "62007"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[पद] ('word/pretext') as second member, the first member keeps its accent when @deva[पद] means 'pretext' or 'contrivance'. So @deva[गो꣡पदम्] ('using cows as pretext').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[पद]-final @deva[तत्पुरुष] when @deva[पद] means @deva[अपदेश] ('pretext/contrivance'). Example: @deva[गो꣡पदम्] ('cow as pretext'). When @deva[पद] means 'foot' or 'word' literally, this rule doesn't apply.
"""

advanced = """
The @deva[पदे अपदेशस्य] condition restricts to @deva[पद] meaning 'pretext/contrivance'. The @deva[अपदेश] sense ('using X as excuse') differs from literal 'foot' or 'footprint' (@deva[गोष्पद] @ref[6.1.145]). When @deva[पूर्वपद] denotes what serves as pretext, its accent is preserved: @deva[गो꣡पद] (cow-pretext) vs. @deva[गोष्पद꣡] (cow-footprint).
"""

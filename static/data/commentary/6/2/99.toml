id = "6.2.99"
numericId = "62099"

[en]
simple = """
Before @deva[पुर] 'city', the first member gets final-syllable accent when naming an Eastern city. Examples: @deva[ललाटपुरम्], @deva[काञ्चीपुरम्], @deva[शिवदत्तपुरम्], @deva[काणिपुरम्]. Non-Eastern cities like @deva[शिवपुरम्] don't get this accent.
"""

standard = """
The condition @deva[प्राच्याम्] 'of the Eastern people' restricts this accent to Eastern city names. The East (@deva[प्राची] @deva[दिक्]) had distinctive naming conventions. Cities like @deva[ललाटपुर], @deva[काञ्चीपुर] follow this pattern. Western or other cities like @deva[शिवपुर] take regular compound accent.
"""

advanced = """
The @deva[प्राच्याम्] condition reflects regional linguistic variation in compound accent patterns. Eastern cities (@deva[प्राच्यदेशसंज्ञा]) follow @deva[पूर्वपदान्त्योदात्त], while other regions follow general rules. This geographical conditioning of accent is paralleled in other rules distinguishing @deva[प्राची] vs. @deva[उदीची] usage patterns.
"""

id = "6.2.130"
numericId = "62130"

[en]
simple = """
The word @deva[राज्य] 'kingdom' gets first-syllable accent in a non-@deva[कर्मधारय] @deva[तत्पुरुष]. Examples: @deva[ब्राह्मणराज्यम्] 'brahmin kingdom', @deva[क्षत्रियराज्यम्] 'warrior kingdom'. In @deva[कर्मधारय]: @deva[परमराज्यम्] 'supreme kingdom'. Indeclinable-headed compounds like @deva[कुराज्यम्] 'bad kingdom' follow @ref[6.2.2].
"""

standard = """
Non-@deva[कर्मधारय] @deva[तत्पुरुष] in @deva[राज्य] receives @deva[आद्युदात्त]: @deva[ब्राह्मणराज्यम्], @deva[क्षत्रियराज्यम्]. The @deva[कर्मधारय] exclusion: @deva[परमराज्यम्] takes regular accent. However, rules @ref[6.2.126]-@ref[6.2.130] are superseded by @ref[6.2.2] when @deva[अव्यय] precedes: @deva[कुचेलम्], @deva[कुराज्यम्] take prefix accent.
"""

advanced = """
The @deva[अकर्मधारय] condition distinguishes @deva[षष्ठी]-@deva[तत्पुरुष] (@deva[ब्राह्मणानां] @deva[राज्यम्]) from @deva[कर्मधारय] (@deva[परमं] @deva[राज्यम्]). The note about @ref[6.2.2] clarifies rule interaction: @deva[अव्यय] @deva[पूर्वपद] accent (@ref[6.2.2]) takes precedence over these @deva[उत्तरपद] accent rules (@ref[6.2.126]-@ref[6.2.130]), yielding @deva[कुराज्यम्] with accent on @deva[कु].
"""

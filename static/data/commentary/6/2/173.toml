id = "6.2.173"
numericId = "62173"

[en]
simple = """
In a @deva[नञ्]/@deva[सु]] @deva[बहुव्रीहि] ending in @deva[कप्] affix (by @ref[5.4.153]), the accent falls on the syllable before @deva[कप्], not on @deva[कप्] itself. Examples: @deva[अकुमारीकः] 'having no maiden', @deva[अवृषलीकः], @deva[सुकुमारीकः], @deva[सुवृषलीकः].
"""

standard = """
When @deva[समासान्त] @deva[कप्] (@ref[5.4.153] @deva[नद्यृतश्च]) is added to @deva[नञ्]/@deva[सु] @deva[बहुव्रीहि], accent shifts to the syllable before @deva[कप्] (overriding @ref[6.2.172]). Examples: @deva[अकुमारीको] @deva[देशः], @deva[अवृषलीकः], @deva[अब्रह्मबन्धूकः], @deva[सुकुमारीकः], @deva[सुवृषलीकः], @deva[सुब्रह्मबन्धूकः].
"""

advanced = """
The @deva[कप्]-@deva[प्राक्] condition creates an exception to @ref[6.2.172]. Instead of compound-final accent on @deva[क], accent falls on the vowel immediately before @deva[कप्]. This reflects the affix's secondary nature—it's added for compound formation (@ref[5.4.153]) and doesn't bear primary accent.
"""

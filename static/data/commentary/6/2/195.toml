id = "6.2.195"
numericId = "62195"

[en]
simple = """
In a @deva[तत्पुरुष] compound after @deva[सु] 'good', the second member gets final-syllable accent when the overall meaning is reproach (despite @deva[सु] being positive). Example: @deva[सुप्रत्यवसितः] 'well-rested' (sarcastically, meaning lazy). Without reproach: @deva[सुतृणेषु] 'in good grass'.
"""

standard = """
When @deva[आक्षेप] (reproach/irony) is intended despite @deva[सु]'s praise meaning, @deva[तत्पुरुष] receives @deva[अन्त्योदात्त]: @deva[इह] @deva[खल्विदानीं] @deva[सुस्थण्डिले] @deva[सुस्फिताभ्यां] @deva[सुप्रत्यवसितः] (sarcastically: 'well-rested indeed!'). Counterexamples: @deva[कुब्राह्मणः] (not @deva[सु]); @deva[सुतृणेषु] (@deva[शोभनेषु] @deva[तृणेषु], genuine praise).
"""

advanced = """
The sarcastic/ironic use of @deva[सु] creates the @deva[आक्षेप] condition. The sentence context determines reproach: @deva[सुप्रत्यवसित] praising rest while implying criticism. The @deva[वाक्यार्थ] (sentence meaning) overrides @deva[शब्दार्थ] (word meaning) for accent purposes. Genuine @deva[सु]-compounds follow other accent rules.
"""

id = "6.2.8"
numericId = "62008"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[निवात] ('windless place/shelter') as second member, the first member keeps its accent when @deva[निवात] means 'protection from wind'. So @deva[कुट्या꣡ निवातः] ('shelter of a hut').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[निवात]-final @deva[तत्पुरुष] when @deva[निवात] means @deva[वातपरीवार] ('wind-protection/shelter'). Example: @deva[कुट्या꣡निवातः] ('wind-shelter of/by a hut'). The protective-shelter meaning triggers first-member accent.
"""

advanced = """
The @deva[निवाते वातपरिवारस्य] condition: @deva[निवात] ('windless spot/shelter') as @deva[उत्तरपद] in the sense of @deva[वातपरीवार] ('wind-protection'). The @deva[पूर्वपद] indicates what provides or possesses the shelter. @deva[कुट्या꣡निवात] shows the accent pattern. Other senses of @deva[निवात] (like 'calm/quiet') wouldn't trigger this.
"""

id = "6.2.134"
numericId = "62134"

[en]
simple = """
The words @deva[चूर्ण] 'powder' etc. in a @deva[तत्पुरुष] get first-syllable accent when the first member is in @deva[षष्ठी] (genitive) case and doesn't denote a living being. Examples: @deva[मुद्गचूर्णम्] 'lentil powder', @deva[ससूरचूर्णम्]. But @deva[मत्स्यचूर्णम्] (fish = living) and @deva[परमचूर्णम्] (not genitive) don't qualify.
"""

standard = """
The @deva[चूर्णादि] words receive @deva[आद्युदात्त] when the @deva[पूर्वपद] is @deva[षष्ठी] (genitive) and @deva[अप्राणि] (non-living). Examples: @deva[मुद्गचूर्णम्], @deva[ससूरचूर्णम्]. Exceptions: @deva[मत्स्यचूर्णम्] (fish is @deva[प्राणि]); @deva[परमचूर्णम्] (@deva[कर्मधारय], not @deva[षष्ठी]). An alternative reading: @deva[अप्राण्युपग्रहात्] where @deva[उपग्रह] is the old term for @deva[षष्ठी].
"""

advanced = """
The dual condition—@deva[षष्ठी] and @deva[अप्राणि]—restricts this accent. The @deva[चूर्णादि] @[gaṇa] includes @deva[चूर्ण], @deva[करिव], @deva[करिप], etc. The alternative reading @deva[उपग्रह] for @deva[षष्ठी] reflects older grammatical terminology. The @deva[प्राणि] exception (@deva[मत्स्यचूर्ण]) shows that animate-source compounds follow different accent.
"""

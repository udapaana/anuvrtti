id = "6.2.155"
numericId = "62155"

[en]
simple = """
@deva[तद्धित]-derived words meaning 'fitted for', 'deserving', 'good for', or 'capable of' get final-syllable accent after @deva[नञ्] when the negation targets those attributes. Example: @deva[अकार्णवेष्टकिकं] @deva[मुखम्] 'a face not fitted for ear-ornaments'.
"""

standard = """
After @deva[नञ्], words formed by @deva[तद्धित] affixes expressing @deva[संपादिन्] (@ref[5.1.99]), @deva[तदर्हति] (@ref[5.1.63]), @deva[तस्मै] @deva[हितम्] (@ref[5.1.5]), or @deva[तस्मै] @deva[प्रभवति] (@ref[5.1.101]) receive @deva[अन्त्योदात्त] when negating those specific attributes. The negation must target the fitness/deservingness, not other properties.
"""

advanced = """
Four @deva[तद्धित] semantic categories trigger @deva[अन्त्योदात्त] after @deva[नञ्] when negating the attributed quality: (1) @deva[संपादिन्] 'suited for' (@ref[5.1.99]); (2) @deva[तदर्हति] 'deserving' (@ref[5.1.63]); (3) @deva[तस्मै] @deva[हितम्] 'beneficial to' (@ref[5.1.5]); (4) @deva[तस्मै] @deva[प्रभवति] 'capable of effecting' (@ref[5.1.101]). The @deva[धर्मप्रतिषेध] (attribute negation) condition ensures the accent applies only when denying fitness, not other meanings.
"""

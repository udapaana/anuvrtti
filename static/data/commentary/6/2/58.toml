id = "6.2.58"
numericId = "62058"

[en]
simple = """
The word @deva[आर्य] ('noble') optionally keeps its accent in @deva[कर्मधारय] before @deva[ब्राह्मण] or @deva[कुमार]. So @deva[आर्यब्राह्मणः] can be @deva[आर्य꣡ब्राह्मणः] or @deva[आर्यब्राह्मण꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[आर्य] before @deva[ब्राह्मण/कुमार] in @deva[कर्मधारय]. Examples: @deva[आर्य꣡ब्राह्मणः/आर्यब्राह्मण꣡ः] ('noble brahmin'), @deva[आर्य꣡कुमारः/आर्यकुमार꣡ः] ('noble youth').
"""

advanced = """
The @deva[आर्यस्य ब्राह्मणकुमारयोः कर्मधारये वा] provides @deva[विभाषा] for @deva[आर्य] + @deva[ब्राह्मण/कुमार]. These specific combinations allow optional first-member accent: @deva[आर्य꣡ब्राह्मण/आर्यब्राह्मण꣡], @deva[आर्य꣡कुमार/आर्यकुमार꣡]. The @deva[आर्य] ('noble/respectable') qualifier shows accent flexibility.
"""

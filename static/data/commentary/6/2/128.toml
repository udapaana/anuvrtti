id = "6.2.128"
numericId = "62128"

[en]
simple = """
In a @deva[तत्पुरुष] compound, the words @deva[पलल] 'meat sauce', @deva[सूप] 'soup', and @deva[शाक] 'vegetables' get first-syllable accent when the compound denotes mixing or seasoning. Examples: @deva[गुडपललम्] 'meat sauce with jaggery', @deva[घृतसूपः] 'ghee-soup', @deva[मुद्गशाकम्] 'vegetables with lentils'.
"""

standard = """
When @deva[मिश्रण] (mixing/seasoning) is denoted, @deva[पलल], @deva[सूप], @deva[शाक] receive @deva[आद्युदात्त]. The compound @deva[गुडेन] @deva[मिश्रं] @deva[पललं] = @deva[गुडपललम्]. Compounding by @ref[2.1.35]. Examples: @deva[घृतपललम्], @deva[मूलकसूपः], @deva[घृतशाकम्]. Without mixing: @deva[परमपललम्] 'excellent meat sauce'.
"""

advanced = """
The @deva[मिश्र] condition specifies that the @deva[पूर्वपद] denotes an ingredient mixed into the food. The compound @deva[गुडपलल] means '@deva[पलल] mixed with @deva[गुड]', not '@deva[पलल] of @deva[गुड]'. The compounding follows @ref[2.1.35] @deva[तृतीया] @deva[तत्कृतार्थेन] @deva[गुणवचनेन]. The counterexample @deva[परमपललम्] shows attributive (not ingredient) @deva[पूर्वपद] doesn't trigger this accent.
"""

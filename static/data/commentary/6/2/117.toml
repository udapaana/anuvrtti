id = "6.2.117"
numericId = "62117"

[en]
simple = """
After @deva[सु] 'good' in a @deva[बहुव्रीहि], stems ending in @deva[मन्] or @deva[अस्] (except @deva[लोमन्] and @deva[उषस्]) get first-syllable accent. Examples: @deva[सुकर्मन्], @deva[सुधर्मन्], @deva[सुपयस्], @deva[सुयशस्]. Also @deva[सुस्रत्] and @deva[सुध्वत्] from roots @deva[स्रंस्] and @deva[ध्वंस्] with @deva[क्विप्].
"""

standard = """
After @deva[सु], @deva[मन्]-ending and @deva[अस्]-ending stems receive @deva[उत्तरपदाद्युदात्त], excluding @deva[लोमन्] and @deva[उषस्]. Thus @deva[सुकर्मन्] 'good-actioned', @deva[सुप्रथिमन्] 'well-renowned', @deva[सुपयस्] 'good-milked', @deva[सुयशस्] 'well-famed'. Also @deva[क्विप्]-formed @deva[सुस्रत्] (← @deva[स्रंस्]) and @deva[सुध्वत्] (← @deva[ध्वंस्]), where final @deva[स्] → @deva[द्] by @ref[8.2.72].
"""

advanced = """
The @deva[मन्]/@deva[अस्]-ending condition with @deva[लोमन्]/@deva[उषस्] exceptions creates a morphologically defined class. The @deva[क्विप्]-formed stems @deva[स्रत्] (← @deva[स्रंस्]) and @deva[ध्वत्] (← @deva[ध्वंस्]) undergo @ref[8.2.72] @deva[संयोगान्तस्य] @deva[लोपः] for final @deva[स्] → @deva[द्]. This substitution is @deva[स्थानिवत्] for accent purposes, treating the derived form as if still @deva[स्]-final.
"""

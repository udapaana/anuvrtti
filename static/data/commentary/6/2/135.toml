id = "6.2.135"
numericId = "62135"

[en]
simple = """
Six words from earlier @[sūtras]—@deva[काण्ड], @deva[चीर], @deva[पलल], @deva[सूप], @deva[शाक], @deva[कूल]—also get first-syllable accent when preceded by a non-living genitive. Examples: @deva[दर्भकाण्डम्] 'darbha grass section', @deva[दर्भचीरम्] 'darbha bark cloth', @deva[तिलपललम्] 'sesame sauce'.
"""

standard = """
This extends @ref[6.2.126]-@ref[6.2.129] to @deva[अप्राणि] @deva[षष्ठी] contexts. The six words @deva[काण्ड], @deva[चीर], @deva[पलल], @deva[सूप], @deva[शाक], @deva[कूल] receive @deva[आद्युदात्त] when preceded by non-living genitives. Examples: @deva[दर्भकाण्डम्], @deva[शरकाण्डम्]; @deva[दर्भचीरम्], @deva[कुशचीरम्]. Note: @deva[चीर] here is not comparative (@ref[6.2.127]), and @deva[पलल]/@deva[सूप]/@deva[शाक] don't denote mixing (@ref[6.2.128]).
"""

advanced = """
This @[sūtra] creates a parallel triggering condition (@deva[अप्राणि] @deva[षष्ठी]) for words already covered under other conditions (@deva[निन्दा], @deva[उपमान], @deva[मिश्र], @deva[संज्ञा]). The examples @deva[दर्भचीर] (darbha-bark cloth) and @deva[तिलपलल] (sesame-sauce) show @deva[षष्ठी] semantics without the specialized meanings of @ref[6.2.126]-@ref[6.2.129]. This extends the @deva[आद्युदात्त] pattern to straightforward genitive compounds.
"""

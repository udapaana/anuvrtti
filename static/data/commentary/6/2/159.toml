id = "6.2.159"
numericId = "62159"

[en]
simple = """
When used as an insult, a negated name gets final-syllable accent. Examples: @deva[अदेवदत्तः] 'not a real Devadatta' (unworthy of the name), @deva[अयज्ञदत्तः] 'no true @[yajñadatta]', @deva[अविष्णुमित्रः] 'false @[viṣṇumitra]'.
"""

standard = """
In @deva[संज्ञा] (name) @deva[बहुव्रीहि] with @deva[आक्षेप] (censure) meaning, @deva[नञ्]-@deva[पूर्व] receives @deva[अन्त्योदात्त]. Examples: @deva[अदेवदत्तः] 'not deserving the name Devadatta', @deva[अयज्ञदत्तः], @deva[अविष्णुमित्रः]. The insult implies the person doesn't live up to the name's meaning or dignity.
"""

advanced = """
The @deva[संज्ञा] + @deva[आक्षेप] dual condition creates a specific @deva[नञ्]-compound pattern. The negation doesn't deny existence but worthiness: @deva[अदेवदत्त] = 'one who is no [real] Devadatta'. This @deva[अन्त्योदात्त] distinguishes insulting name-negation from simple negation of identity.
"""

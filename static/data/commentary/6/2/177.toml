id = "6.2.177"
numericId = "62177"

[en]
simple = """
In a @deva[बहुव्रीहि], constant body parts (except @deva[पर्शु] 'rib') get final-syllable accent after a preposition. Examples: @deva[प्रपृष्ठः] 'one whose back extends forward', @deva[प्रोदरः] 'protruding belly', @deva[प्रललाटः] 'prominent forehead'. Non-constant: @deva[उद्बाहुः] 'raised arm' doesn't qualify.
"""

standard = """
After @deva[उपसर्ग], @deva[ध्रुव] @deva[स्वाङ्ग] (constant body parts) receive @deva[अन्त्योदात्त], except @deva[पर्शु]. Examples: @deva[प्रपृष्ठः] (@deva[सततं] @deva[यस्य] @deva[प्रगतं] @deva[पृष्ठं]), @deva[प्रोदरः], @deva[प्रललाटः]. Counterexamples: @deva[दर्शनीयललाटः] (no @deva[उपसर्ग]); @deva[प्रशाखो] @deva[वृक्षः] (not body part); @deva[उद्बाहुः] @deva[क्रोशति] (arm not constant—raised only sometimes).
"""

advanced = """
The @deva[ध्रुव] condition distinguishes permanent body parts from temporarily positioned ones. Arms can be raised/lowered (@deva[अध्रुव]), but back, belly, forehead are constant (@deva[ध्रुव]). The @deva[पर्शु]-exception and the @deva[उपसर्ग] condition limit the rule's scope. Non-body parts (@deva[शाखा] 'branch') and non-prefixed compounds don't qualify.
"""

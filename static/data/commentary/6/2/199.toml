id = "6.2.199"
numericId = "62199"

[en]
simple = """
In Vedic, the second member (and other compound elements) show diverse accent patterns. A verse summarizes: the second member's first syllable, last syllable, the first member's last syllable, and the first member's first syllable—all are seen. Much variation occurs.
"""

standard = """
In @deva[छन्दस्] (Vedic), compound accent shows @deva[बहुल] (multiple) patterns. The @[kārikā] states: @deva[परादि] (second-member-initial), @deva[परान्त] (second-member-final), @deva[पूर्वान्त] (first-member-final), @deva[पूर्वादि] (first-member-initial)—all are seen. Thus @deva[अञ्चिसक्थम्] @deva[आलभेत] but @deva[लोमशसक्थः]; also @deva[ऋजुबाहुः], @deva[वाक्पतिः], @deva[चित्पतिः]. In non-Vedic, these last two would be final-acute by @ref[6.1.223].
"""

advanced = """
The @deva[छान्दस] @deva[बहुल] principle allows Vedic texts to show any of four accent positions. The @[kārikā]: @deva[परादिश्च] @deva[परान्तश्च] @deva[पूर्वान्तश्चापि] @deva[दृश्यते] | @deva[पूर्वादयश्च] @deva[दृश्यन्ते] @deva[व्यत्ययो] @deva[बहुलं] @deva[ततः] @deva[॥] The @deva[पर] 'second member' extends to @deva[सक्थ] and other words generally. Vedic license supersedes classical rules.
"""

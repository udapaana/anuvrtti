id = "6.2.44"
numericId = "62044"

[en]
simple = """
Before the word @deva[अर्थ] ('purpose/sake'), a first member in dative sense keeps its accent. So @deva[मात्र꣡र्थम्] ('for mother's sake'), @deva[देवता꣡र्थम्] ('for the deity's sake').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[चतुर्थी]-sense compounds with @deva[अर्थ]. Examples: @deva[मात्र꣡र्थम्] ('for mother'), @deva[देवता꣡र्थम्] ('for deity'), @deva[अतिथ्य꣡र्थम्] ('for guest'). The 'for X's sake' meaning preserves first-member accent.
"""

advanced = """
The @deva[अर्थे चतुर्थ्याः] rule: @deva[अर्थ] ('purpose/sake') as @deva[उत्तरपद] with @deva[चतुर्थी]-sense @deva[पूर्वपद] preserves @deva[प्रकृतिस्वर]. @deva[मातृ + अर्थ] = @deva[मात्र꣡र्थ] ('for mother'); @deva[देवता + अर्थ] = @deva[देवता꣡र्थ]. The purposive compounds retain beneficiary-accent.
"""

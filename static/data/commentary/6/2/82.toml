id = "6.2.82"
numericId = "62082"

[en]
simple = """
When the first member ends in a long vowel, or is @deva[काश] ('grass'), @deva[तुष] ('husk'), @deva[भ्राष्ट्र] ('frying pan'), or @deva[वट] ('banyan'), and is followed by @deva[ज] ('born'), it gets first-syllable accent. So @deva[प꣡द्मजः] ('lotus-born').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] before @deva[ज] ('born') when @deva[पूर्वपद] ends in @deva[दीर्घ] (long vowel) or is @deva[काश/तुष/भ्राष्ट्र/वट]. Examples: @deva[प꣡द्मजः] ('lotus-born'), @deva[का꣡शजः] ('grass-born'), @deva[व꣡टजः] ('banyan-born').
"""

advanced = """
The @deva[दीर्घान्तात् काशतुषभ्राष्ट्रवटाच्च जे] condition: @deva[दीर्घान्त] (long-vowel-final) or the four listed words + @deva[ज] trigger @deva[आद्युदात्त]. @deva[प꣡द्मज] ('lotus-born'), @deva[अ꣡ब्जज] ('water-born'), @deva[का꣡शज], @deva[तु꣡षज], @deva[भ्रा꣡ष्ट्रज], @deva[व꣡टज]. The 'born from X' compounds accent the origin-word.
"""

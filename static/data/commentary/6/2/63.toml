id = "6.2.63"
numericId = "62063"

[en]
simple = """
The word @deva[राजन्] ('king') optionally keeps its accent before a profession-word when praise is expressed. So @deva[राजनापितः] ('king's barber', praisingly) can be @deva[राज꣡नापितः] or @deva[राजनापित꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[राजन्] before profession-words in @deva[प्रशंसा] (praise) context. Examples: @deva[राज꣡नापितः/राजनापित꣡ः] ('royal barber'), @deva[राज꣡कुलालः/राजकुलाल꣡ः] ('royal potter')—when expressing honor.
"""

advanced = """
The @deva[राज्ञः प्रशंसायाम्] condition: @deva[राजन्] + profession-word in @deva[प्रशंसा] (laudatory) sense shows @deva[विभाषा]. @deva[राज꣡नापित/राजनापित꣡] when praising the barber's connection to royalty. The praise-context triggers optional accent; neutral reference may follow default.
"""

id = "6.2.166"
numericId = "62166"

[en]
simple = """
In a @deva[बहुव्रीहि] compound ending in @deva[अन्तर] 'interval', the compound gets final-syllable accent when the first word means 'that which lies between'. Examples: @deva[वस्त्रान्तरम्] 'through an intervening cloth', @deva[पटान्तरम्] 'through an intervening curtain'. Without intervening meaning: @deva[आत्मान्तरम्] 'having a different nature'.
"""

standard = """
When @deva[अन्तर] means 'intervening/separating' in @deva[बहुव्रीहि], @deva[अन्त्योदात्त] applies: @deva[वस्त्रान्तरम्] (@deva[वस्त्रम्] @deva[अन्तरं] @deva[व्यवधायकं] @deva[यस्य]), @deva[पटान्तरम्], @deva[कम्बलान्तरम्]. The @deva[पूर्वपद] denotes what lies between. Counterexample: @deva[आत्मान्तरम्] 'having a different self/nature' (where @deva[अन्तर] = 'other') doesn't qualify.
"""

advanced = """
The @deva[व्यवधान] (interposition) condition restricts @deva[अन्त्योदात्त] to compounds where @deva[अन्तर] means 'intervening space' filled by the @deva[पूर्वपद]. The counterexample @deva[आत्मान्तर] (@deva[आत्मा] @deva[स्वभावः] @deva[अन्तरः] @deva[अन्यः] @deva[यस्य]) shows @deva[अन्तर] = 'other' yields different accent. The semantic distinction is crucial.
"""

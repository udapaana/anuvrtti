id = "6.2.105"
numericId = "62105"

[en]
simple = """
Direction words and @deva[सर्व] get final-syllable accent before words that undergo @deva[वृद्धि] in their first syllable by @ref[7.3.12]. That rule applies when @deva[तद्धित] affixes with @deva[ञ्], @deva[ण्], or @deva[क्] follow compounds with @deva[सु], @deva[सर्व], or @deva[अर्ध] as first member.
"""

standard = """
This @[sūtra] connects accent assignment to the @deva[उत्तरपदवृद्धि] process of @ref[7.3.10] and @ref[7.3.12]. When @deva[तद्धित] affixes (@deva[ञ्], @deva[ण्], @deva[क्]) trigger @deva[वृद्धि] in the @deva[उत्तरपद] after @deva[सु]/@deva[सर्व]/@deva[अर्ध], the direction words and @deva[सर्व] as @deva[पूर्वपद] receive @deva[अन्त्योदात्त].
"""

advanced = """
The term @deva[उत्तरपदवृद्धिः] refers to @ref[7.3.10]-@ref[7.3.12], where @deva[तद्धित] derivation triggers @deva[वृद्धि] in the @deva[उत्तरपद]'s first vowel. The coordination of this accent rule with the @deva[वृद्धि] operation creates a phonological-morphological interface: the same compounds that undergo @deva[उत्तरपदवृद्धि] also receive @deva[पूर्वपदान्त्योदात्त].
"""

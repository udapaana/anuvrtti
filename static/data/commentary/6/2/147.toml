id = "6.2.147"
numericId = "62147"

[en]
simple = """
The words @deva[प्रवृद्ध] 'grown', @deva[प्रयुक्त] 'applied', @deva[अवहित] 'placed', @deva[खट्वारूढ] 'mounted on bed', @deva[कविशस्त] 'praised by poets' etc. have final-syllable accent. Examples: @deva[प्रवृद्धं] @deva[यानम्], @deva[प्रयुक्ताः] @deva[सक्तवः].
"""

standard = """
The @deva[प्रवृद्धादि] @[gaṇa] receives @deva[अन्त्योदात्त]: @deva[प्रवृद्धं] @deva[यानम्] 'mature vehicle', @deva[प्रवृद्धो] @deva[वृषलः] 'grown @[śūdra]', @deva[प्रयुक्ताः] @deva[सक्तवः] 'applied barley gruel', @deva[आकर्षेऽवहितः] 'placed in mine', @deva[खट्वारूढः] 'bed-mounted', @deva[कविशस्तः] 'poet-praised'. This is an @deva[आकृतिगण]; forms like @deva[पुनरुक्त] are included.
"""

advanced = """
The @deva[प्रवृद्धादि] is an @deva[आकृतिगण] (open class), allowing analogical extension. The @[gaṇapāṭha] lists these with their collocations (@deva[यान] etc.), but some hold the @deva[अन्त्योदात्त] applies even without those words. The @deva[पुनरुक्त] extension shows the productive nature of this class. The @deva[क्त]-ending connects to the @ref[6.2.143] @deva[अधिकार].
"""

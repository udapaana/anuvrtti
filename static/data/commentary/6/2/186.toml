id = "6.2.186"
numericId = "62186"

[en]
simple = """
The word @deva[मुख] 'face' gets final-syllable accent after @deva[अप्] 'away'. Examples: @deva[अपमुखम्] 'turned away', @deva[अपमुखः]. This applies to @deva[अव्ययीभाव] too, superseding @ref[6.2.33].
"""

standard = """
After @deva[अप्], @deva[मुख] receives @deva[अन्त्योदात्त]: @deva[अपमुखम्], @deva[अपमुखः]. For @deva[अव्ययीभाव] interpretation, this supersedes @ref[6.2.33]. The separation from @ref[6.2.185] allows @deva[अप्] to carry into the next @[sūtra] (@ref[6.2.187]) for additional words.
"""

advanced = """
The @[sūtra] separation from @ref[6.2.185] has technical purpose: @deva[अप्] continues into @ref[6.2.187] by @deva[अनुवृत्ति], while @deva[अभि] does not. This allows @ref[6.2.187] to specify additional words receiving @deva[अन्त्योदात्त] specifically after @deva[अप्].
"""

id = "6.2.136"
numericId = "62136"

[en]
simple = """
The word @deva[कुण्ड] at the end of a @deva[तत्पुरुष] compound gets first-syllable accent when it means 'forest' or 'thicket'. Examples: @deva[दर्भकुण्डम्] 'darbha grass thicket', @deva[शरकुण्डम्] 'reed thicket'. Without forest meaning: @deva[मृतकुण्डम्] (@deva[कुण्ड] = basin or caste name).
"""

standard = """
The word @deva[कुण्ड] primarily means 'basin' or a caste name, but here denotes 'forest/thicket' metaphorically. When @deva[कुण्ड] has this @deva[वन] meaning, it receives @deva[आद्युदात्त]: @deva[दर्भकुण्डम्], @deva[शरकुण्डम्]. The force is @deva[समुदाय] (collection): @deva[शरवणसमुदायः] = @deva[शरकुण्डम्]. The counterexample @deva[मृतकुण्डम्] lacks the forest meaning.
"""

advanced = """
This @[sūtra] concludes the @ref[6.2.111] @deva[अधिकार] for @deva[उत्तरपदाद्युदात्त]. The @deva[कुण्ड] = @deva[वन] interpretation is @deva[लाक्षणिक] (metaphorical), viewing grass/reed clusters as 'forests'. The @deva[समुदाय] sense treats the collective growth as a unit. Some grammarians consider @deva[वन] a primary meaning of @deva[कुण्ड], not metaphorical. The @deva[वनम्] in the @[sūtra] may also refer to the semantic condition.
"""

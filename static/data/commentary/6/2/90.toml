id = "6.2.90"
numericId = "62090"

[en]
simple = """
A 2-3 syllable word ending in @deva[अ] or @deva[आ] (except @deva[महा] and @deva[नव]) gets first-syllable accent before @deva[अर्म] ('ruin/disease'). So @deva[कु꣡क्षर्मः] ('belly-disease'), @deva[पा꣡दर्मः] ('foot-disease').
"""

standard = """
This @[sūtra] assigns @deva[आद्युदात्त] to @deva[द्व्यच्/त्र्यच्] (2-3 syllable) @deva[अकार/आकार]-final words before @deva[अर्म], excluding @deva[महा/नव]. Examples: @deva[कु꣡क्षर्मः], @deva[पा꣡दर्मः]. The disease-compound accents the affected part.
"""

advanced = """
The @deva[द्व्यच्स्त्र्यचोऽकारान्ताद्वा अर्मे अमहान्नवयोः] condition: 2-3 syllable @deva[अ/आ]-final words (not @deva[महा/नव]) + @deva[अर्म] ('disease/decay') take @deva[आद्युदात्त]. @deva[कु꣡क्षर्म] ('abdominal ailment'), @deva[पा꣡दर्म] ('foot disease'). The body-part/location gets first-syllable accent.
"""

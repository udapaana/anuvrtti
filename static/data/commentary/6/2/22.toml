id = "6.2.22"
numericId = "62022"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[पूर्व] ('previous/former') as second member, the first member keeps its accent when the meaning is 'this had recently been X'. So @deva[चोर꣡पूर्वः] ('formerly a thief').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[पूर्व]-final @deva[तत्पुरुष] when meaning 'recently/formerly was X'. Example: @deva[चोर꣡पूर्वः] ('one who was recently a thief'). The 'recent former state' meaning triggers first-member accent.
"""

advanced = """
The @deva[पूर्वे अद्यत्वे] condition: @deva[पूर्व] ('former') as @deva[उत्तरपद] when indicating @deva[अद्यत्व] ('recentness')—something that was X until recently. @deva[चोर꣡पूर्व] ('recently a thief'), @deva[भिक्षु꣡पूर्व] ('recently a mendicant'). The temporal meaning ('just previously') preserves @deva[प्रकृतिस्वर].
"""

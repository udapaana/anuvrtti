id = "6.2.29"
numericId = "62029"

[en]
simple = """
In a @deva[द्विगु] compound (numeral compound), the first member (numeral) keeps its accent before a stem ending in @deva[इ], @deva[उ], @deva[ऋ], or @deva[ऌ] (but not @deva[अ]) when followed by the affix @deva[टच्]. So @deva[प꣡ञ्चगवम्] keeps the numeral's accent.
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] in @deva[द्विगु] when: (1) @deva[उत्तरपद] ends in @deva[इक्] (@deva[इ] @deva[उ] @deva[ऋ] @deva[ऌ], not @deva[अ]), (2) followed by @deva[टच्] affix. Example: @deva[प꣡ञ्चगवम्] ('collection of five cows')—@deva[पञ्चन्] retains accent before @deva[गो] (@deva[इक्]-ending).
"""

advanced = """
The @deva[द्विगोरिकि टचि] condition: @deva[द्विगु समास] with @deva[इक्]-final @deva[उत्तरपद] before @deva[टच्] (@ref[5.4.77]). The @deva[इक्] = @deva[इ उ ऋ ऌ] excludes @deva[अ]-final stems. @deva[प꣡ञ्चगव] (@deva[गो] ends in @deva[इक्]), @deva[द्वि꣡मातृ] (@deva[मातृ] ends in @deva[इक्]). The @deva[टच्] makes the compound neuter collective. Numeral preserves @deva[प्रकृतिस्वर].
"""

id = "6.2.126"
numericId = "62126"

[en]
simple = """
Four words at the end of a @deva[तत्पुरुष] compound get first-syllable accent when reproach is meant: @deva[चेल] 'cloth', @deva[खेट] 'grass', @deva[कटुक] 'bitter', @deva[काण्ड] 'shaft'. Examples: @deva[पुत्रचेलम्] 'son-like rag', @deva[उपानत्खेटम्] 'sandal-like grass' (weak sandals).
"""

standard = """
In @deva[निन्दा] (reproach) compounds, @deva[चेल], @deva[खेट], @deva[कटुक], @deva[काण्ड] receive @deva[आद्युदात्त]. Examples: @deva[पुत्रचेलम्], @deva[भार्याचेलम्] (worthless like rags); @deva[उपानत्खेटम्], @deva[नगरखेटम्] (@deva[खेट] = grass, implying weakness); @deva[दधिकटुकम्] (@deva[कटुक] = unpalatable); @deva[भूतकाण्डम्], @deva[प्रजाकाण्डम्] (@deva[काण्ड] = arrow, implying harm).
"""

advanced = """
The @deva[निन्दा] condition creates pejorative comparisons. @deva[खेट] as 'grass' implies fragility (@deva[तृणवद्] @deva[दुर्बला] @deva[उपानत्] = sandals weak like grass). @deva[कटुक] implies unpalatability (@deva[अस्वादु]). @deva[काण्ड] as 'arrow' implies harm (@deva[शरनाम], @deva[सत्वपीडाकरम्]). These metaphorical extensions trigger the special accent.
"""

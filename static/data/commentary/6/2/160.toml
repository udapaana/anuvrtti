id = "6.2.160"
numericId = "62160"

[en]
simple = """
After @deva[नञ्], words formed by @deva[कृत्य] affixes (like @deva[तव्य], @deva[अनीय]), by @deva[उक] and @deva[इष्णुच्], and words like @deva[चारु] 'beautiful' get final-syllable accent. Examples: @deva[अकर्तव्यम्] 'not to be done', @deva[अनागामुकम्], @deva[अनलंकरिष्णुः] 'not adorning', @deva[अचारुः] 'unbeautiful', @deva[असाधुः] 'bad'.
"""

standard = """
Three classes receive @deva[अन्त्योदात्त] after @deva[नञ्]: (1) @deva[कृत्य] affixes (@ref[3.1.95] @deva[कृत्याः] @deva[प्राङ्] @deva[ण्वुलः]): @deva[अकर्तव्यम्], @deva[अकरणीयम्]; (2) @deva[उक]: @deva[अनागामुकम्], @deva[अनपलाषुकम्]; (3) @deva[इष्णुच्] (including @deva[खिष्णुच्]): @deva[अनलंकरिष्णुः], @deva[अनाढ्यंभविष्णुः]; (4) @deva[चार्वादि] @[gaṇa]: @deva[अचारुः], @deva[असाधुः], @deva[अयौधः].
"""

advanced = """
This @[sūtra] extends @deva[अन्त्योदात्त] to diverse @deva[नञ्]-compounds: (1) @deva[कृत्य] class by @ref[3.1.95]; (2) @deva[उक] (habitual tendency affixes); (3) @deva[इष्णुच्]/@deva[खिष्णुच्] (capable of); (4) @deva[चार्वादि] lexical class. The affixes @deva[इष्णुच्]/@deva[खिष्णुच्] are grouped together morphologically. The @deva[चार्वादि] includes evaluative adjectives that take this accent when negated.
"""

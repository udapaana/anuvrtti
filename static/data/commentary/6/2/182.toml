id = "6.2.182"
numericId = "62182"

[en]
simple = """
After @deva[परि] 'around', words denoting things that have both sides, as well as @deva[मण्डल] 'circle', get final-syllable accent. Examples: @deva[परिकूलम्] 'on both banks', @deva[परितीरम्] 'on both shores', @deva[परिमण्डलम्] 'circular'.
"""

standard = """
After @deva[परि], @deva[अभितोभाविन्] (having both sides) words and @deva[मण्डल] receive @deva[अन्त्योदात्त]: @deva[परिकूलम्], @deva[परितीरम्], @deva[परिमण्डलम्]. These may be @deva[बहुव्रीहि], @deva[प्रादिसमास], or @deva[अव्ययीभाव]. If @deva[अव्ययीभाव], this supersedes @ref[6.2.33]'s @deva[पूर्वपद]-accent. The @deva[अभितोभाविन्] condition means 'having both this side and that side'.
"""

advanced = """
The @deva[अभितोभाविन्] semantic condition identifies words denoting things with bilateral extension (banks, shores). Combined with @deva[परि] 'around', the compound indicates complete surrounding. The @deva[मण्डल] addition covers circular objects. For @deva[अव्ययीभाव] interpretation, this rule supersedes @ref[6.2.33]'s general @deva[अव्ययीभाव] accent.
"""

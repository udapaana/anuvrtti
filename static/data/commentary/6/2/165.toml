id = "6.2.165"
numericId = "62165"

[en]
simple = """
In a @deva[बहुव्रीहि] compound ending in @deva[मित्र] 'friend' or @deva[अजिन] 'hide', the compound gets final-syllable accent when it's a name. Examples: @deva[देवमित्रः] 'Devamitra', @deva[ब्रह्ममित्रः] 'Brahmamitra', @deva[वृकाजिनः] 'wolf-hide wearer', @deva[कृष्णाजिनः] 'black-hide wearer'.
"""

standard = """
In @deva[संज्ञा] @deva[बहुव्रीहि], @deva[मित्र] and @deva[अजिन] as @deva[उत्तरपद] receive @deva[अन्त्योदात्त]: @deva[देवमित्रः], @deva[ब्रह्ममित्रः], @deva[वृकाजिनः], @deva[कुलाजिनः], @deva[कृष्णाजिनः]. Without @deva[संज्ञा]: @deva[प्रियमित्रः] 'having a dear friend', @deva[महाजिनः] 'having great hide'. A @[vārttika] prohibits this for @[ṛṣi] names: @deva[विश्वामित्रः] follows @ref[6.2.106] instead.
"""

advanced = """
The @deva[संज्ञा] condition restricts @deva[अन्त्योदात्त] to proper names. The @[vārttika] @deva[ऋषिनामधेयेषु] @deva[मित्रस्य] @deva[प्रतिषेधः] blocks this rule for @[ṛṣi] names like @deva[विश्वामित्र], which instead takes @deva[पूर्वपदान्त्योदात्त] by @ref[6.2.106]. Non-name compounds like @deva[प्रियमित्र] (descriptive @deva[बहुव्रीहि]) follow general accent.
"""

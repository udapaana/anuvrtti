id = "6.2.19"
numericId = "62019"

[en]
simple = """
The words @deva[भू] ('earth'), @deva[वाक्] ('speech'), @deva[चित्] ('thought'), and @deva[दिधिषू] ('desiring') do NOT keep their original accent before @deva[पति] meaning 'master'. So @deva[भूपतिः] and @deva[वाक्पतिः] have default compound accent.
"""

standard = """
This @[sūtra] excepts @deva[भू], @deva[वाक्], @deva[चित्], and @deva[दिधिषू] from @ref[6.2.18]. These words don't preserve @deva[प्रकृतिस्वर] before @deva[पति] meaning 'lord'. So @deva[भूपति꣡ः], @deva[वाक्पति꣡ः] take default @deva[अन्तोदात्त], not first-member accent.
"""

advanced = """
The @deva[न भूवाक्चित्दिधिषूणाम्] creates exceptions to @ref[6.2.18]. Despite @deva[पति] meaning @deva[ईश्वर], these four words don't trigger @deva[पूर्वपद स्वर]: @deva[भूपति꣡] ('earth-lord'), @deva[वाक्पति꣡] ('speech-lord'), @deva[चित्पति꣡] ('mind-lord'), @deva[दिधिषूपति꣡] ('husband of a remarried woman'). These follow @ref[6.1.223]'s @deva[अन्तोदात्त].
"""

id = "6.2.125"
numericId = "62125"

[en]
simple = """
In a neuter @deva[तत्पुरुष] ending in @deva[कन्था], the words @deva[चिहण] etc. (as first member) also get first-syllable accent on themselves. Examples: @deva[चिहणकन्थम्], @deva[मडरकन्थम्], @deva[मडुरकन्थम्]. Here both the first and second members have first-syllable accent.
"""

standard = """
The repetition of @deva[आदि] (though already in @deva[अनुवृत्ति]) indicates that the @deva[पूर्वपद] @deva[चिहण] etc. also receive @deva[आद्युदात्त]. The word @deva[चिहण] derives from @deva[चित्] (√@deva[चि] + @deva[क्विप्]) + @deva[हन] (@deva[अच्] by @ref[3.1.134]). Thus @deva[चिहणकन्थम्] has accent on both @deva[चि] and @deva[क].
"""

advanced = """
The explicit @deva[आदि] indicates @deva[पूर्वपदाद्युदात्त] in addition to @deva[उत्तरपदाद्युदात्त]. The derivation @deva[चित्] + @deva[हन] (with @deva[त्] → @deva[ह्] by @deva[पूर्वसवर्ण]) yields @deva[चिहण]. The compound @deva[चिहणकन्थम्] thus shows double @deva[आद्युदात्त]—on @deva[पूर्वपद] @deva[चि] and @deva[उत्तरपद] @deva[क]—a unique pattern specified by the redundant @deva[आदि].
"""

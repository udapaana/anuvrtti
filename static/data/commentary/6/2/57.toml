id = "6.2.57"
numericId = "62057"

[en]
simple = """
The words @deva[कतर] ('which of two') and @deva[कतम] ('which of many') as first members in @deva[कर्मधारय] optionally keep their accent. So @deva[कतरकठः] can be @deva[कतर꣡कठः] or @deva[कतरकठ꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[कतर/कतम] in @deva[कर्मधारय]. Examples: @deva[कतर꣡कठः/कतरकठ꣡ः] ('which @deva[कठ]?'), @deva[कतम꣡कठः/कतमकठ꣡ः]. The interrogative-qualifiers show optional accent.
"""

advanced = """
The @deva[कतरकतमौ कर्मधारये वा] provides @deva[विभाषा] for @deva[कतर] ('which of two') and @deva[कतम] ('which of many') in @deva[कर्मधारय]. @deva[कतर꣡कठ/कतरकठ꣡], @deva[कतम꣡कठ/कतमकठ꣡]. These interrogative adjectives show accent optionality in appositional compounds.
"""

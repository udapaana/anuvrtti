id = "6.2.102"
numericId = "62102"

[en]
simple = """
Four words get final-syllable accent before @deva[बिल] 'hole': @deva[कुसूल], @deva[कूप], @deva[कुम्भ], and @deva[शाला]. Examples: @deva[कुसूलबिलम्], @deva[कूपबिलम्], @deva[कुम्भबिलम्], @deva[शालाबिलम्]. Other words like @deva[सर्प] don't get this: @deva[सर्पबिलम्].
"""

standard = """
This @[sūtra] enumerates four words receiving @deva[अन्त्योदात्त] before @deva[बिल] 'opening/hole': @deva[कुसूल] (granary), @deva[कूप] (well), @deva[कुम्भ] (pot), @deva[शाला] (hall). The counterexample @deva[सर्पबिलम्] 'snake-hole' takes regular accent. The condition @deva[बिले] is specific—@deva[कुसूलस्वामी] doesn't qualify.
"""

advanced = """
The enumeration @deva[कुसूलकूपकुम्भशालाः] identifies @deva[पूर्वपद] receiving @deva[अन्त्योदात्त] before @deva[बिल]. These compounds denote specific types of openings associated with storage structures. The counterexample @deva[कुसूलस्वामी] shows that only @deva[बिल] as @deva[उत्तरपद] triggers this accent, not other second members.
"""

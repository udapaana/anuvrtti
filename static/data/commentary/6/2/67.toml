id = "6.2.67"
numericId = "62067"

[en]
simple = """
First-syllable accent is optional when @deva[अध्यक्ष] ('superintendent') follows. So @deva[गवाध्यक्षः] can be @deva[ग꣡वाध्यक्षः] or @deva[गवाध्यक्ष꣡ः].
"""

standard = """
This @[sūtra] makes @deva[आद्युदात्त] optional before @deva[अध्यक्ष]. Either @deva[ग꣡वाध्यक्षः] (first-syllable accent by @ref[6.2.66]) or @deva[गवाध्यक्ष꣡ः] (default @deva[अन्तोदात्त]) is valid. Similarly @deva[अ꣡श्वाध्यक्षः/अश्वाध्यक्ष꣡ः].
"""

advanced = """
The @deva[अध्यक्षे वा] provides @deva[विभाषा] for @deva[अध्यक्ष] specifically. While @ref[6.2.66] assigns @deva[आद्युदात्त] to @deva[युक्त]-meaning compounds, @deva[अध्यक्ष] ('overseer') allows optionality: @deva[ग꣡वाध्यक्ष/गवाध्यक्ष꣡]. The specific word @deva[अध्यक्ष] relaxes the mandatory pattern.
"""

id = "6.2.25"
numericId = "62025"

[en]
simple = """
In a @deva[कर्मधारय] compound where the first member is a verbal noun (@deva[भाव]) and the second is an adjective from @deva[श्र] (meaning 'best'), the first member keeps its accent. So @deva[दर्शन꣡श्रेष्ठम्] ('best in appearance').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] in @deva[कर्मधारय] when: (1) @deva[पूर्वपद] is a @deva[भाव] (action noun), (2) @deva[उत्तरपद] is from root @deva[श्र] meaning 'excellent'. Example: @deva[दर्शन꣡श्रेष्ठम्] ('best in seeing/appearance').
"""

advanced = """
The @deva[कर्मधारये भावे श्र इति प्रशस्यस्य] condition: @deva[कर्मधारय] with @deva[भाव] (abstract noun) + @deva[श्र]-derivative (like @deva[श्रेष्ठ], @deva[श्रेयस्]) meaning 'excellent'. The @deva[भाव] indicates the domain of excellence: @deva[दर्शन꣡श्रेष्ठ] ('excellent in appearance'), @deva[श्रवण꣡श्रेष्ठ] ('excellent in hearing').
"""

id = "6.2.68"
numericId = "62068"

[en]
simple = """
The word @deva[पाप] ('wicked/sinful') optionally gets first-syllable accent before profession-words. So @deva[पापनापितः] can be @deva[पा꣡पनापितः] or @deva[पापनापित꣡ः].
"""

standard = """
This @[sūtra] provides optional @deva[आद्युदात्त] for @deva[पाप] before @deva[शिल्पिन्] (professional) terms. Examples: @deva[पा꣡पनापितः/पापनापित꣡ः] ('wicked barber'), @deva[पा꣡पकुलालः/पापकुलाल꣡ः] ('sinful potter').
"""

advanced = """
The @deva[पापस्य शिल्पिनि वा] provides @deva[विभाषा] for @deva[पाप] + @deva[शिल्पिन्]. @deva[पा꣡पनापित/पापनापित꣡] ('wicked barber'), @deva[पा꣡पकुलाल/पापकुलाल꣡] ('evil potter'). The pejorative @deva[पाप] + profession compound shows optional first-syllable accent.
"""

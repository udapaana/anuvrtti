id = "6.2.167"
numericId = "62167"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, the word @deva[मुख] 'mouth/face' gets final-syllable accent when it means the actual body part, not metaphorically. Examples: @deva[गौरमुखः] 'fair-faced', @deva[भद्रमुखः] 'auspicious-faced'. Metaphorical: @deva[दीर्घमुखा] @deva[शाला] 'hall with long entrance' (where @deva[मुख] = door).
"""

standard = """
When @deva[मुख] denotes @deva[स्वाङ्ग] (actual body part) in @deva[बहुव्रीहि], @deva[अन्त्योदात्त] applies: @deva[गौरमुखः], @deva[भद्रमुखः]. The @deva[स्वाङ्ग] condition (@ref[3.4.54]) means 'non-liquid substance actually found in living beings'. Counterexample: @deva[दीर्घमुखा] @deva[शाला] where @deva[मुख] means 'entrance/door' metaphorically.
"""

advanced = """
The @deva[स्वाङ्ग] condition (defined at @ref[3.4.54]) distinguishes literal body-part usage from metaphorical extensions. The @deva[मुख] 'entrance' meaning (@deva[अङ्गभूत] but not @deva[स्वाङ्ग]) doesn't trigger this @deva[अन्त्योदात्त]. This semantic restriction parallels other body-part accent rules in compound formation.
"""

id = "6.2.176"
numericId = "62176"

[en]
simple = """
In a @deva[बहु]-initial @deva[बहुव्रीहि], words like @deva[गुण] 'strand', @deva[अक्षर] 'syllable', @deva[अध्याय] 'chapter' don't get final accent when they denote parts/ingredients. Examples: @deva[बहुगुणाः] @deva[रज्जुः] 'rope of many strands', @deva[बह्वक्षरं] @deva[पदम्] 'word of many syllables'. But @deva[बहुगुणः] @deva[ब्राह्मणः] 'brahmin of many qualities' takes final accent.
"""

standard = """
The @deva[गुणादि] @[gaṇa] doesn't take @deva[अन्त्योदात्त] after @deva[बहु] when denoting @deva[अवयव] (component parts). Examples: @deva[बहुगुणाः] @deva[रज्जुः] (strands as rope parts), @deva[बह्वक्षरं] @deva[पदम्] (syllables as word parts), @deva[बहुच्छन्दोमानम्], @deva[बह्वध्यायः]. This is an @deva[आकृतिगण]. Counterexample: @deva[बहुगुणो] @deva[ब्राह्मणः] (qualities, not parts) takes final accent.
"""

advanced = """
The @deva[अवयव] condition distinguishes parts from qualities. @deva[गुण] as 'strand' (rope component) differs from @deva[गुण] as 'quality' (brahmin attribute). The @deva[आकृतिगण] includes @deva[गुण], @deva[अक्षर], @deva[अध्याय], @deva[सूक्त], @deva[छन्दोमान]—all denoting compositional units. When these denote ingredients/parts, they follow @ref[6.2.1] instead of @ref[6.2.175].
"""

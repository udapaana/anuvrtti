id = "6.2.30"
numericId = "62030"

[en]
simple = """
In a @deva[द्विगु] compound, the word @deva[बहु] ('many') may optionally keep its accent before @deva[इक्]-ending stems, time words, or @deva[कपाल] ('skull/pot'). So @deva[बहुगवम्] can be @deva[ब꣡हुगवम्] or @deva[बहुगव꣡म्].
"""

standard = """
This @[sūtra] provides optional @deva[प्रकृतिस्वर] for @deva[बहु] in @deva[द्विगु] before: (1) @deva[इक्]-final stems, (2) @deva[काल] (time) words, (3) @deva[कपाल]. Examples: @deva[ब꣡हुगवम्/बहुगव꣡म्] ('many cows'), @deva[ब꣡हुकालम्/बहुकाल꣡म्] ('long time').
"""

advanced = """
The @deva[बह्वल्पयोरिकि कालकपालयोश्च वा] provides optionality for @deva[बहु] (and likely @deva[अल्प]) before specified second members. The @deva[विभाषा] allows @deva[प्रकृतिस्वर] or default accent. @deva[बहु] + @deva[इक्]-stem, @deva[काल], or @deva[कपाल]: both accents valid. This extends @ref[6.2.29]'s @deva[द्विगु] rule with optionality for @deva[बहु].
"""

id = "6.2.144"
numericId = "62144"

[en]
simple = """
Verbal nouns ending in @deva[थ], @deva[अथ], @deva[घञ्], @deva[क्त], @deva[अच्], @deva[अप्], @deva[इत्र], or @deva[क] get final-syllable accent when preceded by @deva[गति], @deva[कारक], or @deva[उपपद]. Examples: @deva[सुनीथः], @deva[अवभृथः], @deva[आवसथः], @deva[प्रत्ययः].
"""

standard = """
Eight @deva[कृत्] affixes receive @deva[उत्तरपदान्त्योदात्त] when preceded by @deva[गति]/@deva[कारक]/@deva[उपपद]: @deva[थ] (@deva[सुनीथः], @deva[अवभृथः] by @deva[क्थन्], @[uṇādi] II.2-3); @deva[अथ] (@deva[आवसथः], @deva[उपवसथः]); @deva[घञ्] (@deva[प्रत्ययः], @deva[प्रकारः]); @deva[क्त]; @deva[अच्]; @deva[अप्]; @deva[इत्र]; @deva[क]. This overrides @ref[6.2.139]'s @deva[प्रकृतिस्वर].
"""

advanced = """
This @[sūtra] carves out exceptions to @ref[6.2.139]'s @deva[प्रकृतिस्वर] for the eight enumerated affixes. The @[uṇādi-formed] @deva[सुनीथ]/@deva[अवभृथ]] (@deva[क्थन्]) would have @deva[आद्युदात्त] by @ref[6.2.139], but this rule assigns @deva[अन्त्योदात्त]. The @deva[गति]/@deva[कारक]/@deva[उपपद] condition from @ref[6.2.139] is inherited (@deva[गतिकारकोपपदात्] @deva[कृत्]).
"""

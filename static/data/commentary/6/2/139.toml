id = "6.2.139"
numericId = "62139"

[en]
simple = """
In a @deva[तत्पुरुष], a word ending in a @deva[कृत्] affix keeps its original accent when preceded by a @deva[गति] (verbal prefix), a @deva[कारक] (case-related word), or an @deva[उपपद] (governing nominal). Examples: @deva[प्रकारकः], @deva[प्रकरणम्], @deva[इध्मव्रश्चनः].
"""

standard = """
In @deva[गति]/@deva[कारक]/@deva[उपपद] @deva[तत्पुरुष], @deva[कृदन्त] words retain @deva[प्रकृतिस्वर]. With @deva[गति]: @deva[प्रकारकः], @deva[प्रहारकः], @deva[प्रकरणम्], @deva[प्रहरणम्] (compounded by @ref[2.2.18]). With @deva[कारक]: @deva[इध्मव्रश्चनः] (wood-cutter). The @deva[गति] is defined at @ref[1.4.60]; @deva[उपपद] at @ref[3.1.92] (@deva[तत्रोपपदं] @deva[सप्तमीस्थम्]).
"""

advanced = """
This foundational rule assigns @deva[प्रकृतिस्वर] to @deva[कृदन्त] @deva[उत्तरपद] when the @deva[पूर्वपद] is @deva[गति], @deva[कारक], or @deva[उपपद]. The @deva[गति] reference (@ref[1.4.60] @deva[गतिश्च]) includes @deva[प्रादि] prefixes. The @deva[कारक] condition covers instrumental, locative, etc. relationships. The @deva[उपपद] condition (@ref[3.1.92]) handles governing nominals that trigger verbal noun formation.
"""

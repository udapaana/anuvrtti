id = "6.2.157"
numericId = "62157"

[en]
simple = """
Words formed with @deva[अच्] and @deva[क] affixes get final-syllable accent after @deva[नञ्] when meaning 'not capable'. Examples: @deva[अपचः] 'unable to cook' (from @deva[य] @deva[पक्तुं] @deva[न] @deva[शक्नोति]), @deva[अजयः] 'unable to conquer', @deva[अपठः] 'unable to recite'.
"""

standard = """
The @deva[अच्]/@deva[क] @deva[कृत्]-formed words receive @deva[अन्त्योदात्त] after @deva[नञ्] when expressing @deva[अशक्ति] (incapacity). Examples: @deva[अपचः], @deva[अजयः], @deva[अपठः], @deva[अविक्षिपः], @deva[अविलिखः] (by @ref[3.1.134]). Counterexamples: @deva[अपचो] @deva[दीक्षितः] 'initiated one who doesn't cook'—not from incapacity but from vow. Similarly @deva[अपचः] @deva[परिव्राजकः] 'wandering ascetic'.
"""

advanced = """
The @deva[अशक्ति] condition distinguishes physical incapacity from vow-based abstention. A @deva[दीक्षित] or @deva[परिव्राजक] doesn't cook due to religious vows, not inability. The @deva[अच्]/@deva[क] affixes (@ref[3.1.134]) form agent nouns; when negated with incapacity meaning, they receive @deva[अन्त्योदात्त]. Without the incapacity meaning, different accent applies.
"""

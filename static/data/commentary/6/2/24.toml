id = "6.2.24"
numericId = "62024"

[en]
simple = """
Words like @deva[विस्पष्ट] ('clearly'), @deva[विचित्र] ('variegated'), @deva[व्यक्त] ('manifest') keep their accent when followed by an adjective in a compound. So @deva[वि꣡स्पष्टकटुकम्] ('clearly pungent').
"""

standard = """
This @[sūtra] provides @deva[प्रकृतिस्वर] for @deva[विस्पष्टादि] words when compounded with an adjective (@deva[विशेषण]). Examples: @deva[वि꣡स्पष्टकटुकम्] ('manifestly pungent'), @deva[वि꣡चित्रकटुकम्] ('variously pungent'). These adverb-like first members retain their accent.
"""

advanced = """
The @deva[विस्पष्टादीनि विशेषणे] rule: @deva[विस्पष्ट] etc. as @deva[पूर्वपद] before adjectives preserve @deva[प्रकृतिस्वर]. The @deva[आदि] indicates a @deva[गण] including @deva[विस्पष्ट], @deva[विचित्र], @deva[व्यक्त]. These function as intensifiers/qualifiers: @deva[वि꣡स्पष्टकटुक] ('clearly/distinctly sharp'). The adverbial-adjective compound retains first-member accent.
"""

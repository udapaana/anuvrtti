id = "6.2.151"
numericId = "62151"

[en]
simple = """
Words ending in @deva[मन्] or @deva[क्तिन्] affixes, plus @deva[व्याख्यान] 'explanation', @deva[शयन] 'bed', @deva[आसन] 'seat', @deva[स्थान] 'place', @deva[क्रीत] 'bought', and the @deva[याजक] class get final-syllable accent when preceded by a @deva[कारक] word. Examples: @deva[रथवर्त्मन्] 'chariot-path', @deva[पाणिनिकृतिः] '@[pāṇini]'s composition', @deva[राजशयनम्] 'royal bed'.
"""

standard = """
When preceded by @deva[कारक], these words receive @deva[अन्त्योदात्त]: @deva[मन्]-ending (@deva[रथवर्त्मन्], @deva[शकटवर्मन्]); @deva[क्तिन्]-ending (@deva[पाणिनिकृतिः], @deva[आपिशालिकृतिः]); @deva[व्याख्यान] (@deva[ऋगयनव्याख्यानम्], @deva[छन्दोव्याख्यानम्]); @deva[शयन] (@deva[राजशयनम्], @deva[ब्राह्मणशयनम्]); @deva[आसन] (@deva[राजासनम्]); @deva[स्थान]; @deva[क्रीत]; and @deva[याजकादि].
"""

advanced = """
This @[sūtra] extends @deva[अन्त्योदात्त] to multiple morphological classes in @deva[कारक]-@deva[तत्पुरुष]: (1) @deva[मन्]-ending action nouns; (2) @deva[क्तिन्]-ending abstract nouns; (3) five enumerated words; (4) the @deva[याजकादि] @[gaṇa]. The @deva[कारक] condition (instrumental, locative, etc.) from @ref[6.2.139] is presupposed. This overrides the @deva[प्रकृतिस्वर] that would otherwise apply.
"""

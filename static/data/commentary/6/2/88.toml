id = "6.2.88"
numericId = "62088"

[en]
simple = """
The words @deva[माला] ('garland') and similar get first-syllable accent before @deva[प्रस्थ], even if they have @deva[वृद्धि]. So @deva[मा꣡लाप्रस्थः], @deva[शा꣡लाप्रस्थः] despite @deva[आ] in first syllable.
"""

standard = """
This @[sūtra] allows @deva[आद्युदात्त] for @deva[मालादि] before @deva[प्रस्थ], overriding @ref[6.2.87]'s @deva[वृद्धि] restriction. Examples: @deva[मा꣡लाप्रस्थः] ('Garland-plateau'), @deva[शा꣡लाप्रस्थः] ('Hall-plateau'). These @deva[वृद्धि]-having words still take first-syllable accent.
"""

advanced = """
The @deva[मालादीनां प्रस्थे] exception: @deva[माला] etc. take @deva[आद्युदात्त] before @deva[प्रस्थ] despite having @deva[वृद्धि] (@deva[आ]). @deva[मा꣡लाप्रस्थ], @deva[शा꣡लाप्रस्थ] override @ref[6.2.87]. This @deva[गण] lists words exempted from the @deva[अवृद्ध] condition.
"""

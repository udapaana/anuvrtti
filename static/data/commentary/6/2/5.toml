id = "6.2.5"
numericId = "62005"

[en]
simple = """
In a @deva[तत्पुरुष] compound with @deva[दायाद्] ('heir') as second member, the first member keeps its accent when it denotes what is inherited. So @deva[विद्या꣡दायादः] ('heir to knowledge') and @deva[ध꣡नदायादः] ('heir to wealth').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[दायाद्]-final @deva[तत्पुरुष] when the first member denotes the @deva[दाय] (inheritance). Examples: @deva[विद्या꣡दायादः] ('inheritor of learning'), @deva[ध꣡नदायादः] ('inheritor of wealth'). The inheritance meaning triggers first-member accent.
"""

advanced = """
The @deva[दायादे दायस्य] condition: @deva[दायाद्] ('heir/inheritor') as @deva[उत्तरपद] with the first member specifying what is inherited (@deva[दाय]). The semantic relationship (X-inheritor where X = inheritance) triggers @deva[प्रकृतिस्वर]. @deva[विद्या꣡दायाद], @deva[ध꣡नदायाद] preserve first-member accent. General 'heir' sense without specified inheritance may differ.
"""

id = "6.2.112"
numericId = "62112"

[en]
simple = """
In a @deva[बहुव्रीहि] compound, the word @deva[कर्ण] 'ear' as second member gets first-syllable accent when preceded by a color word or a mark word. Examples: @deva[शुक्लकर्णः] 'white-eared', @deva[कृष्णकर्णः] 'black-eared'; @deva[दात्राकर्णः], @deva[शङ्कूकर्णः] (ears marked with scythe or stake shapes).
"""

standard = """
The word @deva[कर्ण] receives @deva[उत्तरपदाद्युदात्त] when preceded by @deva[वर्ण] (color) or @deva[लक्षण] (mark) words in @deva[बहुव्रीहि]. Color examples: @deva[शुक्लकर्णः], @deva[कृष्णकर्णः]. Mark examples: @deva[दात्राकर्णः], @deva[शङ्कूकर्णः]—marks branded on cattle ears. The lengthening in @deva[दात्रा]- and @deva[शङ्कू]- follows @ref[6.3.115].
"""

advanced = """
The dual condition @deva[वर्ण]/@deva[लक्षण] identifies cattle-branding terminology. The @deva[लक्षण] refers to identifying marks (@deva[दात्र] 'scythe', @deva[शङ्कु] 'stake') branded on ears. Vowel lengthening by @ref[6.3.115] @deva[संख्यासुपूर्वस्य] produces @deva[दात्राकर्ण], @deva[शङ्कूकर्ण]. Without these conditions, @deva[कर्ण] would follow general @deva[बहुव्रीहि] accent.
"""

id = "6.2.153"
numericId = "62153"

[en]
simple = """
Words meaning @deva[ऊन] 'deficient' and @deva[कलह] 'quarrel' get final-syllable accent when preceded by an instrumental-case word. Examples: @deva[माषोनम्] 'short by a @[māṣa]', @deva[मासविकलम्] 'deficient by a month', @deva[असिकलहः] 'sword-quarrel', @deva[वाक्कलहः] 'word-quarrel'.
"""

standard = """
When preceded by @deva[तृतीया] (instrumental), @deva[ऊन]-meaning and @deva[कलह]-meaning words receive @deva[अन्त्योदात्त]. Examples: @deva[माषोनम्], @deva[कार्षापणोनम्] (deficient by amount); @deva[मासविकलम्], @deva[कार्षापणविकलम्]; @deva[असिकलहः], @deva[वाक्कलहः]. Compounding by @ref[2.1.31]. This overrides @ref[6.2.2]. Some say @deva[अर्थ] in the @[sūtra] refers to the word-form, not the meaning.
"""

advanced = """
The dual condition—@deva[ऊनार्थ] (deficiency meaning) and @deva[कलह]—with instrumental @deva[पूर्वपद] triggers @deva[अन्त्योदात्त]. Compounding follows @ref[2.1.31] @deva[तृतीया] @deva[तत्कृतार्थेन]. The @deva[अर्थ] debate: some interpret it as 'word meaning @deva[ऊन]' (including @deva[ऊन], @deva[विकल], etc.); others as 'the word @deva[ऊन] itself'. This overrides @ref[6.2.2]'s instrumental-@deva[पूर्वपद] accent.
"""

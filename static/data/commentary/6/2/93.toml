id = "6.2.93"
numericId = "62093"

[en]
simple = """
When @deva[सर्व] means 'completely' or 'through and through' and comes before an attributive word, its final syllable gets acute accent. Examples: @deva[सर्वश्वेतः] 'completely white', @deva[सर्वकृष्णः] 'completely black', @deva[सर्वमहान्] 'completely great'.
"""

standard = """
The word @deva[सर्व] receives @deva[अन्त्योदात्त] when it precedes a @deva[विशेषण] (attributive word) in the sense of 'pervading throughout'. In @deva[सर्वश्वेतः], the whiteness pervades the entire object. But @deva[परमश्वेतः] doesn't qualify—though @deva[परम] also means extreme whiteness, it's not @deva[सर्व]. And @deva[सर्वसौवर्णः] 'made of gold' fails because @deva[सौवर्ण] names the material, not an attribute.
"""

advanced = """
The condition @deva[विशेषणे] restricts this accent to compounds where the @deva[उत्तरपद] is genuinely attributive. The distinction between @deva[सर्वश्वेतः] (qualifying) and @deva[सर्वसौवर्णः] (material-denoting) shows that @deva[द्रव्यवाचिन्] words in their primary sense don't count as @deva[विशेषण] here. The counterexample @deva[परमश्वेतः] demonstrates that only @deva[सर्व] triggers this accent, not semantically similar words.
"""

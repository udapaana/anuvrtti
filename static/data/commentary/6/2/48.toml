id = "6.2.48"
numericId = "62048"

[en]
simple = """
A word in instrumental case (3rd) keeps its accent before a @deva[क्त]-participle when the @deva[क्त] has passive meaning. So @deva[अहि꣡हतः] ('killed by a snake') or @deva[रुद्र꣡हतः] ('killed by Rudra').
"""

standard = """
This @[sūtra] provides @deva[पूर्वपद प्रकृतिस्वर] for @deva[तृतीया]-sense @deva[पूर्वपद] before @deva[क्त] with @deva[कर्मणि] (passive) meaning. Examples: @deva[अहि꣡हतः] ('snake-killed'), @deva[रुद्र꣡हतः] ('Rudra-slain'). The instrumental indicates the agent in passive construction.
"""

advanced = """
The @deva[तृतीयायाः कर्मणि क्ते] condition: @deva[तृतीया] (instrumental = agent) + @deva[क्त] in @deva[कर्मणि] (passive voice). @deva[अहि꣡हत] ('killed BY snake'), @deva[रुद्र꣡हत] ('struck BY Rudra'). The passive construction with instrumental agent preserves @deva[पूर्वपद स्वर]. Active-meaning @deva[क्त] compounds differ.
"""

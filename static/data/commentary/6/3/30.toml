id = "6.3.30"
numericId = "63030"

[en]
simple = """
When @deva[दिव्] ('sky') is compounded with @deva[पृथिवी] ('earth') in a @[dvandva], it can take either of two special forms: @deva[दिवस्] or @deva[द्यावा]. This gives two valid forms: @deva[दिवस्पृथिव्यौ] and @deva[द्यावापृथिव्यौ], both meaning 'sky and earth'.
"""

standard = """
Before @deva[पृथिवी] in a @deva[द्वन्द्व] compound, @deva[दिव्] is optionally replaced by either @deva[दिवस्] or @deva[द्यावा], giving @deva[दिवस्पृथिव्यौ] or @deva[द्यावापृथिव्यौ]. The @deva[स्] in @deva[दिवस्] does not undergo the change to visarga or @deva[ह्] because the @[sūtra] itself exhibits @deva[स्], blocking the normal sandhi rules. This is an optional substitute, unlike the obligatory @deva[द्यावा] substitution in @ref[6.3.29].
"""

advanced = """
For @deva[दिव्] is also substituted @deva[दिवस्] (as well as a @deva[द्यावा]) when @deva[पृथिवी] follows in a @deva[द्वन्द] @deva[समास] of names of @deva[देवता]-s. Thus @deva[दिवस्पृथिव्यौ], @deva[द्यावापृथिव्यौ] @deva[॥] The word @deva[दिवस्] is exhibited in the aphorism as @deva[दिवस्] ending in @deva[अ], in order to indicate that the @deva[स्] of @deva[दिवस्] is not changed to @deva[ह्] or a @[visarga] or @[upadhmaniya] when followed by @deva[पृथिवी] @deva[॥] Following is an anomalous use there being no @[dvandva] compounding here. @deva[द्यावा] @deva[चिदस्मै] @deva[पृथिवी] @deva[ममेते] @deva[॥]
"""

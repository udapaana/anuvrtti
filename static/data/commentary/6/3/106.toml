id = "6.3.106"
numericId = "63106"

[en]
simple = """
Before @deva[पुरुष] (man), the substitution of @deva[का] for @deva[कु] is optional. Both forms are in use. Example: @deva[कापुरुषः] or @deva[कुपुरुषः] (a coward).
"""

standard = """
@deva[का] is optionally substituted for @deva[कु] when @deva[पुरुष] follows. Both @deva[कापुरुषः] and @deva[कुपुरुषः] are valid, meaning 'a coward or contemptible person'. However, when the meaning is specifically 'slightly a man' (@deva[ईषत्पुरुषः]), @deva[कापुरुषः] is obligatory per @ref[6.3.105].
"""

advanced = """
@deva[का] optionally substitutes for @deva[कु] when @deva[पुरुष] follows: @deva[कापुरुषः] or @deva[कुपुरुषः]. This is an @[aprapta]-@[vibhāṣā]. In the sense of @deva[ईषद्] ('slightly'), the substitution is obligatory: @deva[ईषत्] @deva[पुरुषः] = @deva[कापुरुषः].
"""

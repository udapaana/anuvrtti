id = "6.3.125"
numericId = "63125"

[en]
simple = """
@deva[अष्टन्] (eight) lengthens its final @deva[अ] to @deva[आ] before the second member of a compound when the whole compound is a proper name. This does not apply in ordinary descriptive compounds. Example: @deva[अष्टावक्रः] (name of a sage).
"""

standard = """
The final of @deva[अष्टन्] is lengthened before a second member when the compound forms a proper name (@deva[संज्ञा]). Thus @deva[अष्टावक्रः] (name of a sage), @deva[अष्टापदम्] (chessboard). But non-names like @deva[अष्टपुत्रः] 'having eight sons' and @deva[अष्टभार्यः] 'having eight wives' do not undergo lengthening.
"""

advanced = """
The final of @deva[अष्टन्] is lengthened before the second member when the compound is a proper name: @deva[अष्टावक्रः], @deva[अष्टावन्धुरः], @deva[अष्टापदम्]. Non-names remain unlengthened: @deva[अष्टपुत्रः], @deva[अष्टभार्यः].
"""

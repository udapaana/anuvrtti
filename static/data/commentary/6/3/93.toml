id = "6.3.93"
numericId = "63093"

[en]
simple = """
If the '@deva[सम्]' @deva[उपसर्ग] is followed by an @deva[लुप्तप्रत्ययान्त-अञ्च्] word, then '@deva[सम्]' is converted to '@deva[समि]'.
"""

standard = """
@deva[सम्] → @deva[समि] before @deva[अञ्च्] (with @deva[व]). @deva[सम्यक्], @deva[सम्यञ्चः].
"""

advanced = """
@deva[समि] replaces @deva[सम्] before @deva[अञ्च्] when the @deva[क्विन्] affix (@deva[व]-affix) follows (i.e., no overt affix remains): @deva[सम्यक्], @deva[सम्यञ्चौ], @deva[सम्यञ्चः].
"""

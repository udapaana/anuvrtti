id = "6.3.27"
numericId = "63027"

[en]
simple = """
In a @[dvandva] compound, when @deva[अग्नि] ('fire') is paired with @deva[सोम] or @deva[वरुण], the final @deva[इ] of @deva[अग्नि] is lengthened to @deva[ई]. So @deva[अग्नि] + @deva[सोम] becomes @deva[अग्नीषोमौ] (with @deva[ष] by sandhi).
"""

standard = """
The final @deva[इ] of @deva[अग्नि] is replaced by long @deva[ई] when @deva[सोम] or @deva[वरुण] follow in a @deva[द्वन्द्व] compound. Results: @deva[अग्नीषोमौ], @deva[अग्नीवरुणौ]. The change of @deva[स्] to @deva[ष्] in @deva[अग्नीषोमौ] is by @ref[8.3.82]. This rule is an exception to the general @deva[आनङ्] substitution of @ref[6.3.26], providing a specific lengthening instead.
"""

advanced = """
Long @deva[ई] substitutes for the final of @deva[अग्नि] when @deva[सोम] or @deva[वरुण] follows: @deva[अग्नीषोमौ], @deva[अग्नीवरुणौ]. The change of @deva[स] to @deva[ष] is by @ref[8.3.82].
"""

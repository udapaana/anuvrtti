id = "6.3.136"
numericId = "63136"

[en]
simple = """
In the @deva[ऋग्वेद], the final vowel of a particle (@deva[निपात]) is lengthened. For instance, @deva[एव] becomes @deva[एवा] and @deva[अच्छ] becomes @deva[अच्छा] in Vedic verses.
"""

standard = """
This is a general Vedic rule: in the @deva[ऋग्वेद], the final of any @deva[निपात] (uninflected particle) may be lengthened. Examples are @deva[एवा] @deva[ते] and @deva[अच्छा] @deva[जरितारः] from actual hymns. This phonological liberty reflects both metrical needs and Vedic phonological conventions. See @ref[6.3.136].
"""

advanced = """
In the @deva[ऋग्वेद], the final of a @deva[निपात] (particle) is lengthened: @deva[एवा] @deva[ते], @deva[अच्छाते], @deva[अच्छा] @deva[जरितारः] (@[ṛg] I.2.2).
"""

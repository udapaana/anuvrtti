id = "6.3.28"
numericId = "63028"

[en]
simple = """
When a @[dvandva] compound will take a @[vṛddhi] derivative (like forming a @deva[वार्ष्णेय]-type adjective from the compound), the @deva[इ] of @deva[अग्नि] stays short. So @deva[अग्नि] + @deva[वरुण] + @[vṛddhi] gives @deva[आग्निवारुणी], not @deva[आग्नीवारुणी].
"""

standard = """
When both members of a @deva[द्वन्द्व] compound take @deva[वृद्धि] (in forming a patronymic or relational adjective), the final @deva[इ] of @deva[अग्नि] retains the short vowel — it is not lengthened to @deva[ई] as in @ref[6.3.27]. Thus @deva[आग्निवारुणी] (short @deva[इ]), not @deva[आग्नीवारुणी]. A @[vārttika] states this substitution does not apply before @deva[विष्णु].
"""

advanced = """
Short @deva[इ] substitutes for the final of @deva[अग्नि] in a @deva[द्वन्द्व] @deva[समास] where both members take @deva[वृद्धि]: @deva[आग्निवारुणी] (which would otherwise require long @deva[ई] by the preceding rule) and @deva[आग्निमारुतम्] (which would otherwise take @deva[आनङ्] by @ref[6.3.26]). In context: @deva[आग्निवारुणीमनड्वाहीमालभेत], @deva[आग्निमारुतं] @deva[कर्म] @deva[क्रियेत]. The @[taddhita] affix is applied by @ref[4.2.24] (@deva[आग्नीमरुतौ] @deva[देवताऽस्य]), and both members take @[vṛddhi] by @ref[7.3.21]. When both members do not take @[vṛddhi], the rule does not apply: @deva[आग्नेन्द्रः] (@deva[अग्नि] + @deva[इन्द्र]), because @deva[इन्द्र] is excluded from @[vṛddhi] by @ref[7.3.22]. A @[vārttika] prohibits the substitution before @deva[विष्णु]: @deva[आग्नावैष्णवं] @deva[चरुं] @deva[निर्वपेत्].
"""

id = "6.3.29"
numericId = "63029"

[en]
simple = """
In a @[dvandva] compound of deity names, the word @deva[दिव्] ('sky, heaven') is replaced by the special form @deva[द्यावा]. So 'sky and earth' becomes @deva[द्यावाक्षामा] or @deva[द्यावाभूमी], not @deva[दिवक्षामा].
"""

standard = """
In a @deva[द्वन्द्व] compound of deity names, @deva[दिव्] is replaced by the substitute @deva[द्यावा] when it is the first member. Examples: @deva[द्यावाक्षामा] ('sky and earth'), @deva[द्यावाभूमी]. The substitution @deva[द्यावा] replaces the full stem @deva[दिव्] and its final @deva[व्] is absorbed into the new form. This parallels @ref[6.3.26] but provides a unique allomorphic substitute rather than a simple lengthening.
"""

advanced = """
@deva[द्यावा] substitutes for @deva[दिव्] in a @deva[द्वन्द्व] @deva[समास] of @deva[देवता] names: @deva[द्यावाक्षामा], @deva[द्यावाभूमी].
"""

id = "6.3.124"
numericId = "63124"

[en]
simple = """
When a prefix ending in @deva[इ] or @deva[उ] is followed by the root @deva[दा] in its @deva[त]-form, the prefix's final vowel is lengthened. Example: @deva[नीत्तम्] (given, from @deva[नि] + @deva[दत्त]).
"""

standard = """
A @deva[उपसर्ग] ending in @deva[इ] or @deva[उ] lengthens its final before @deva[दा] when the latter is changed to @deva[त] by @ref[7.4.47]. Thus @deva[नीत्तम्], @deva[वीत्तम्], @deva[परीत्तम्]. Contrast: @deva[प्रत्तम्], @deva[अवत्तम्] — these prefixes end in @deva[अ] and so do not undergo lengthening.
"""

advanced = """
A @deva[उपसर्ग] ending in @deva[इ] or @deva[उ] lengthens its final before @deva[दा] when @deva[दा] is replaced by @deva[त] (per @ref[7.4.47]): @deva[नीत्तम्], @deva[वीत्तम्], @deva[परीत्तम्]. Prefixes not ending in @deva[इ]/@ deva[उ] show no lengthening: @deva[प्रत्तम्], @deva[अवत्तम्]. The condition that @deva[दा] be replaced by @deva[त] is essential — in @deva[वितीर्णम्], @deva[नितीर्णम्], a different substitution occurs, so lengthening does not apply. Similarly, the substitute must begin with @deva[त]: in @deva[सुदत्तम्], @deva[दद्] replaces @deva[दा] (by @ref[7.4.46]), not @deva[त], so no lengthening.
"""

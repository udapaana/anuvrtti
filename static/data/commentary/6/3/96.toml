id = "6.3.96"
numericId = "63096"

[en]
simple = """
In Vedic texts, @deva[सह] is replaced by @deva[सध] when @deva[माद] or @deva[स्थ] follows. This produces Vedic compound words meaning 'rejoicing together' or 'standing together'. Example: @deva[सधमादः] (joint rejoicing).
"""

standard = """
This Vedic rule (@deva[छन्दस्]) substitutes @deva[सध] for @deva[सह] when @deva[माद] or @deva[स्थ] follow. The substitution applies only in Vedic usage, not in classical Sanskrit. Thus @deva[सधमादः] 'joint rejoicing', @deva[सधस्थाः] 'dwelling together'.
"""

advanced = """
In @deva[छन्दस्] (Vedic), @deva[सध] replaces @deva[सह] before @deva[माद] and @deva[स्थ]: @deva[सधमादोद्युम्न्य] @deva[एकास्ताः], @deva[सधस्थाः]. A further Vedic attestation: @deva[आत्वा] @deva[वृहन्तो] @deva[हरयो] @deva[युजाना], @deva[अर्वागिन्द्र] @deva[सधमादो] @deva[वहन्तु] (@[Ṛg] III.3.7) — @deva[सहमाद्यन्ति] @deva[देवा] @deva[अस्मिन्].
"""

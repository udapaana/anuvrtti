id = "6.3.85"
numericId = "63085"

[en]
simple = """
In common (non-Vedic) usage, @deva[समान्] becomes @deva[स] specifically before ten listed words: @deva[ज्योतिस्] (light), @deva[जनपद] (country), @deva[रात्रि] (night), @deva[गोत्र] (lineage), @deva[रूप] (form), @deva[स्थान] (place), @deva[वर्ण] (color/caste), @deva[वयस्] (age), @deva[वचन] (speech), @deva[बन्धु] (kinsman). Example: @deva[सरात्रिः] means 'of the same night.'
"""

standard = """
In non-Vedic usage, the substitution of @deva[स] for @deva[समान्] is lexically restricted to a fixed list of ten second members: @deva[ज्योतिस्], @deva[जनपद], @deva[रात्रि], @deva[गोत्र], @deva[रूप], @deva[स्थान], @deva[वर्ण], @deva[वयस्], @deva[वचन], @deva[बन्धु]. The resulting compounds — @deva[सज्योतिः], @deva[सजनपदः], @deva[सरात्रिः] — all mean 'of the same X'. This contrasts with @ref[6.3.84], which gives a broader Vedic rule.
"""

advanced = """
In non-Vedic usage, the @deva[स]-for-@deva[समान्] substitution applies before a fixed list of ten words: @deva[ज्योतिस्], @deva[जनपद], @deva[रात्रि], @deva[गोत्र], @deva[रूप], @deva[स्थान], @deva[वर्ण], @deva[वयस्], @deva[वचन], and @deva[बन्धु]. The resulting forms: @deva[सज्योतिः], @deva[सजनपदः], @deva[सरात्रिः], @deva[सनाभिः], @deva[सनामा], @deva[सगोत्रः], @deva[सरूपः], @deva[सस्थानः], @deva[सवर्णः], @deva[सवयाः], @deva[सवचनः], @deva[सबन्धुः].
"""

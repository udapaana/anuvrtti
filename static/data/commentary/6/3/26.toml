id = "6.3.26"
numericId = "63026"

[en]
simple = """
In a @[dvandva] compound of deity names, the ending of the first deity's name is replaced by @deva[आ] (the substitute called @deva[आनङ्]). So @deva[इन्द्र] + @deva[वरुण] becomes @deva[इन्द्रावरुणौ], and @deva[मित्र] + @deva[वरुण] becomes @deva[मित्रावरुणौ].
"""

standard = """
In a @deva[द्वन्द्व] compound of @[devatā] (deity) names, @deva[आनङ्] substitutes for the final of the first member. Examples: @deva[इन्द्रावरुणौ], @deva[मित्रावरुणौ], @deva[अग्निवायू] → @deva[अग्नावायू]. A @[vārttika] excludes @deva[वायु]: @deva[वायुवरुणौ] does not take the substitution. This parallels @ref[6.3.25] but applies to divine names rather than kinship terms.
"""

advanced = """
@deva[आनङ्] substitutes for the final of the first member in a @deva[द्वन्द्व] @deva[समास] of @deva[देवता] names: @deva[इन्द्रावरुणौ], @deva[इन्द्रासोमौ], @deva[इन्द्राबृहस्पती], @deva[मित्रावरुणौ]. The explicit repetition of @deva[द्वन्द्व] in this @[sūtra], despite its @[anuvṛtti] from the preceding rule, indicates the restriction to well-established Vedic pairings of deities whose companionship is recognized. The rule does not apply to compounds like @deva[ब्रह्मप्रजापति] or @deva[शिववैश्रवणौ]. A @[vārttika] prohibits the substitution with @deva[वायु] in either position, whether first or last: @deva[अग्निवायू] or @deva[वाय्वग्नी].
"""

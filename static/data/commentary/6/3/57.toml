id = "6.3.57"
numericId = "63057"

[en]
simple = """
@deva[उदक] (water) is shortened to @deva[उद] when the compound is a proper name. So @deva[उदमेघः] and @deva[उदवाहः] are personal names containing the word for 'water'.
"""

standard = """
@deva[उद] is substituted for @deva[उदक] when the compound as a whole is a proper name. Thus @deva[उदमेघः] and @deva[उदवाहः] are personal names. A @[vārttika] extends this to @deva[उद] as the second member: @deva[लोहितोदः] 'having red water'.
"""

advanced = """
@deva[उद] replaces @deva[उदक] when the compound functions as a proper name: @deva[उदमेघः] 'a person called @[udamegha]', @deva[उदवाहः] 'a person named @[udavāha]'. The well-known patronymics from these are @deva[औदमेघिः] and @deva[औदवाहिः]. The condition 'proper name' is essential — without it, the unsubstituted form @deva[उदकगिरिः] applies. @[vārttika]: @deva[उद] also replaces @deva[उदक] when it stands as the second member of a compound denoting a name: @deva[लोहितोदः], @deva[नीलोदः], @deva[क्षीरोदः].
"""

id = "6.3.31"
numericId = "63031"

[en]
simple = """
In a compound that pairs two deities, the word @deva[उषस्] (Dawn) gets the special form @deva[उषासा]. For example, @deva[उषासानक्ता] means 'Dawn and Night'.
"""

standard = """
In a @deva[देवता] @deva[द्वन्द्व] compound, @deva[उषस्] is replaced by @deva[उषासा]. This substitution applies specifically when pairing goddess names. The resulting forms are @deva[उषासासूर्यम्] 'Dawn and Sun' and @deva[उषासानक्ता] 'Dawn and Night'.
"""

advanced = """
For @deva[उषस्] is substituted @deva[उषासा] in a @deva[देवता] - @deva[द्वन्द] @deva[समास]@deva[।] Thus:- @deva[उषासासूर्यम्], @deva[उषासानक्ता] @deva[॥]
"""

id = "6.3.47"
numericId = "63047"

[en]
simple = """
The words @deva[द्वि] and @deva[अष्टन्] get an @deva[आकारादेश] in presence of a @deva[सङ्ख्याशब्द], provided that there is no @deva[बहुव्रीहि] @deva[समास] and the word @deva[अशीति] is not present.
"""

standard = """
@deva[द्वि]/@deva[अष्टन्] → @deva[द्वा]/@deva[अष्टा] before numerals (not @[bahuvrīhi], not @deva[अशीति]). @deva[द्वादश], @deva[अष्टादश]. Applies to 100.
"""

advanced = """
@deva[आत्] (@deva[आ]) replaces the final of @deva[द्वि] and @deva[अष्टन्] when another numeral follows, provided the compound is not a @deva[बहुव्रीहि] and the following numeral is not @deva[अशीति]: @deva[द्वादश], @deva[द्वाविंशतिः], @deva[द्वात्रिंशत्], @deva[अष्टादश], @deva[अष्टाविंशतिः], @deva[अष्टात्रिंशत्]. The restriction to @deva[द्वि] and @deva[अष्टन्] is significant — @deva[पञ्चदश] shows no substitution. The condition 'followed by a numeral' excludes @deva[द्वै] @deva[मातुरः] and @deva[अष्टमातुरः]. The @[bahuvrīhi] and @deva[अशीति] exclusions account for @deva[द्वित्राः], @deva[त्रिदशाः], and @deva[द्व्यशीतिः]. @[vārttika]: the rule applies only up to one hundred; it does not operate in @deva[द्विशतम्], @deva[द्विसहस्रम्], @deva[अष्टशतम्], or @deva[अष्टसहस्रम्].
"""

id = "6.3.120"
numericId = "63120"

[en]
simple = """
Words in the @deva[शर] class lengthen their final vowel before the suffix @deva[मत्] when the compound is a proper name. Example: @deva[शरावती] or @deva[वंशावती] (river names).
"""

standard = """
The final vowel of @deva[शर]-class words is lengthened before @deva[मत्] when the compound is a proper name. Thus @deva[शरावती], @deva[वंशावती]. The @deva[म] → @deva[व] in names by @ref[8.2.11]. Note that @deva[यवादि]-class words (e.g., @deva[व्रीहि]) do not undergo this lengthening, per @ref[8.2.9].
"""

advanced = """
The final vowel of @deva[शर]-class words is lengthened before @deva[मत्] when the compound is a proper name: @deva[शरावती], @deva[वंशावती]. The @deva[म] of @deva[मत्] → @deva[व] in names by @ref[8.2.11]. Words of the @deva[यवादि] class (such as @deva[व्रीहि]) do not undergo this, per @ref[8.2.9]. The class: 1 @deva[शर], 2 @deva[वंश], 3 @deva[धूम], 4 @deva[अहि], 5 @deva[कपि], 6 @deva[मणि], 7 @deva[मुनि], 8 @deva[शुचि], 9 @deva[हनु].
"""

id = "6.3.83"
numericId = "63083"

[en]
simple = """
In benedictive compounds (blessings), @deva[सह] keeps its full form — except optionally before @deva[गो], @deva[वत्स], and @deva[हल]. So @deva[सहपुत्राय] @deva[स्वस्ति] (blessings with your son) is unaltered, but @deva[सगवे] or @deva[सहगवे] (with his cow) are both acceptable.
"""

standard = """
In benedictive contexts (blessing expressions), @deva[सह] is retained as the default first member. However, the three words @deva[गो], @deva[वत्स], and @deva[हल] are exceptions: before these, @deva[स]-substitution is optional. Thus @deva[सगवे] ~ @deva[सहगवे] and @deva[सवत्साय] ~ @deva[सहवत्साय] are both grammatical. @deva[सहपुत्राय] @deva[स्वस्ति] shows the unaffected baseline form before a non-exceptional second member in a benediction.
"""

advanced = """
In benedictive contexts, @deva[सह] retains its full form: @deva[स्वस्ति] @deva[देवदत्ताय] @deva[सहपुत्राय], @deva[सहच्छात्राय], @deva[सहामात्याय]. Before @deva[गो], @deva[वत्स], and @deva[हल], however, @deva[स]-substitution is optional even in benedictions: @deva[स्वस्ति] @deva[भवते] @deva[सहगवे] or @deva[सगवे], @deva[सहवत्साय] or @deva[सवत्साय], @deva[सहहलाय] or @deva[सहलाय]. The phrase @deva[अगोवत्सहलेषु] is not part of the original @[sūtra] but was added by the @[kāśikā] from a @[vārttika].
"""

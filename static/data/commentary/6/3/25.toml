id = "6.3.25"
numericId = "63025"

[en]
simple = """
In a @[dvandva] compound joining two @deva[ऋ]-ending relationship words (like 'mother and father'), the @deva[ऋ] at the end of the first member is replaced by @deva[आ]. So @deva[मातृ] + @deva[पितृ] becomes @deva[मातापितरौ] ('mother and father'), not @deva[मातृपितरौ].
"""

standard = """
In a @deva[द्वन्द्व] compound of @deva[ऋ]-final words expressing a relationship (@[sambandha]), the final @deva[ऋ] of the first member is replaced by the substitute @deva[आनङ्] (the actual replacement is @deva[आ]; @deva[ङ्] is an @[anubandha] preventing @[samprasāraṇa]). Examples: @deva[होतापोतारौ], @deva[मातापितरौ]. The @deva[न्] in @deva[आनङ्] blocks @[samprasāraṇa] that would otherwise apply.
"""

advanced = """
In a @deva[द्वन्द्व] @deva[समास] of short-@deva[ऋ]-final words expressing a relationship through study or blood, @deva[आनङ्] substitutes for the @deva[ऋ] of the first member: @deva[होतापोतारौ], @deva[नेष्टोद्गातारौ], @deva[प्रशास्ताप्रतिहर्त्तारौ], @deva[मातापितरौ], @deva[याताननान्दरौ]. The actual substitute is @deva[आ]; the @deva[न्] in @deva[आनङ्] serves only to block @ref[1.1.51], which would otherwise insert @deva[र] after a simple vowel substitute of @deva[ऋ]. Both members must end in @deva[ऋ]: @deva[पितृपितामहौ] shows no substitution because @deva[पितामह] does not end in @deva[ऋ]. By @[anuvṛtti] of @deva[पुत्र], the @deva[ऋ] of the first member is also changed to @deva[आ] before @deva[पुत्र], even though @deva[पुत्र] does not end in @deva[ऋ]: @deva[पितापुत्रौ], @deva[मातापुत्रौ].
"""

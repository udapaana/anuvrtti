id = "6.3.4"
numericId = "63004"

[en]
simple = """
The word @deva[मनस्] ('mind') behaves specially in compounds: when the compound as a whole is a proper name, the instrumental ending (@deva[-सा], 'by the mind') is kept, giving @deva[मनसादत्ता]. But if it is just a descriptive compound and not a name, the ending is dropped normally, giving @deva[मनोदत्ता].
"""

standard = """
After @deva[मनस्], the @deva[तृतीया] (instrumental) case-affix is retained before the second compound member only when the resulting compound is a @[samjñā] (proper name). Thus @deva[मनसादत्ता], @deva[मनसागुप्ता] are names. When the compound is not a name, regular elision by @ref[2.4.71] applies: @deva[मनोदत्ता], @deva[मनोगुप्ता]. The name condition is the operative distinction.
"""

advanced = """
After @deva[मनस्], the @deva[तृतीया] (instrumental) case-affix is not elided before the second compound member when the compound is a @[samjñā] (proper name): @deva[मनसादत्ता], @deva[मनसागुप्ता], @deva[मनसासंगता]. When the compound is not a name, the affix is elided normally: @deva[मनोदत्ता], @deva[मनोगुप्ता].
"""

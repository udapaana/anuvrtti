id = "6.3.64"
numericId = "63064"

[en]
simple = """
When the abstract-noun suffix @deva[त्व] is added to a feminine stem, the long vowel of @deva[ङी] or @deva[आप्] optionally shortens. So from @deva[अजा] (she-goat) one may form @deva[अजत्वं] (with short @deva[अ]) or @deva[अजात्वं] (with long @deva[आ]).
"""

standard = """
Before the @[kṛt] affix @deva[त्व] (forming abstract nouns), the long vowel of feminine affixes @deva[ङी] and @deva[आप्] is optionally shortened. The rule yields doublets: @deva[रोहिणित्वं] beside @deva[रोहिणीत्वम्], and @deva[अजत्वं] beside @deva[अजात्वम्]. These alternations are attested in Vedic usage; the shortening does not apply in ordinary @deva[त्व]-derivatives from proper names in classical Sanskrit.
"""

advanced = """
The feminine affixes @deva[ई] and @deva[आ] (@deva[ङी] and @deva[आप्]) are optionally shortened before the affix @deva[त्व]: @deva[अजाया] @deva[भावः] = @deva[अजत्वं] or @deva[अजात्वं]; @deva[रोहिणित्वं] or @deva[रोहिणीत्वम्]. These are Vedic illustrations — proper names cannot be formed with @deva[त्व].
"""

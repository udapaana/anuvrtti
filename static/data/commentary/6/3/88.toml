id = "6.3.88"
numericId = "63088"

[en]
simple = """
@deva[समान्] optionally becomes @deva[स] before @deva[उदर] when @deva[यत्] is added, giving both @deva[सोदर्यः] and @deva[समानोदर्यः] — both meaning 'born from the same womb; a sibling.'
"""

standard = """
Before @deva[उदर] + @deva[यत्] (@ref[4.4.108]), the substitution of @deva[स] for @deva[समान्] is optional, unlike the obligatory rule at @ref[6.3.87]. This yields the doublet @deva[सोदर्यः] ~ @deva[समानोदर्यः], both meaning 'sibling' (one born from the same womb). The optionality here distinguishes this rule from the preceding @deva[तीर्थ]-rule where the substitution is obligatory.
"""

advanced = """
@deva[स] optionally replaces @deva[समान्] before @deva[उदर] when the affix @deva[यत्] follows: @deva[सोदर्यः] or @deva[समानोदर्यः] (see @ref[4.4.108]).
"""

id = "6.3.3"
numericId = "63003"

[en]
simple = """
Compounds whose first member is one of four specific neuter stems — @deva[ओजस्] ('vigor'), @deva[सहस्] ('force'), @deva[अम्भस्] ('water'), @deva[तमस्] ('darkness') — keep the instrumental ending (@deva[-सा], meaning 'by/with') instead of dropping it. The result: @deva[ओजसाकृतम्] means 'done with vigor'.
"""

standard = """
The @deva[तृतीया] (instrumental) case-affix is not elided after the stems @deva[ओजस्], @deva[सहस्], @deva[अम्भस्], and @deva[तमस्] before the second compound member. The retention overrides @ref[2.4.71]. Examples: @deva[ओजसाकृतम्], @deva[सहसाकृतम्], @deva[अम्भसाकृतम्], @deva[तमसाकृतम्]. A @[vārttika] adds @deva[अञ्जस्] (giving @deva[अञ्जसाकृतम्]) and fixes @deva[पुंसानुजः], @deva[जनुषान्धः] as names with retained instrumentals.
"""

advanced = """
The @deva[तृतीया] (instrumental) case-affix after @deva[ओजस्], @deva[सहस्], @deva[अम्भस्], and @deva[तमस्] is not elided before the second member of a compound: @deva[ओजसाकृतम्], @deva[सहसाकृतम्], @deva[अम्भसाकृतम्], @deva[तमसाकृतम्]. A @[vārttika] adds @deva[अञ्जस्] to this list: @deva[अञ्जसाकृतम्]. Another @[vārttika] includes @deva[पुंसानुजः] and @deva[जनुषान्धः]: @deva[पुंसा] @deva[हेतुनानुजः] = @deva[पुंसानुजः]; @deva[जनुषा] @deva[हेतुनाऽन्धः] = @deva[जनुषान्धः]. The word @deva[जनु] is an alternate form of @deva[जन्मन्] ('birth').
"""

id = "6.3.48"
numericId = "63048"

[en]
simple = """
The words @deva[त्रि] gets an @deva[आकारादेश] in presence of a @deva[सङ्ख्याशब्द], provided that there is no @deva[बहुव्रीहि] @deva[समास] and the word @deva[अशीति] is not present.
"""

standard = """
@deva[त्रि] → @deva[त्रयस्] before numerals (not @[bahuvrīhi], not @deva[अशीति]). @deva[त्रयोदश], @deva[त्रयोविंशतिः].
"""

advanced = """
For @deva[त्रि] is substituted @deva[त्रयस्] when another numeral follows but not in a @deva[बहुव्रीहि] @deva[समास] or before @deva[आशीतिः]@deva[।] As, @deva[त्रयोदश], @deva[त्रयोविंशतिः], @deva[त्रयस्त्रिंशत्] @deva[॥] But not in @deva[त्रैमातुरः] (the second word not being a Numeral), nor in @deva[त्रिदशाः] which is a @[bahuvrihi], @ref[2.2.25] @deva[त्र्यशीति] @deva[॥] This substitution takes place upto hundred : not here, @deva[त्रिशतम्], @deva[त्रिसहस्रम्] @deva[॥]
"""

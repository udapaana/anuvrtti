id = "6.3.1"
numericId = "63001"

[en]
simple = """
This is a heading rule (@[adhikāra]) that applies to the next several @[sūtras] up through @ref[6.3.24]. It says that when two words join into a compound, the case-ending of the first word is normally dropped — but this section carves out exceptions where the case-ending is kept. For example, @deva[स्तोकान्मुक्तः] keeps the ablative ending @deva[ात्].
"""

standard = """
This @[adhikāra] @[sūtra] establishes that @deva[अलुक्] (non-elision of case affixes) and @deva[उत्तरपदे] (before the second member of a compound) are to be supplied in all following rules through @ref[6.3.24]. Normally, by @ref[2.4.71], @deva[सुप्] (case affixes) of a @deva[प्रातिपदिक] in a compound are elided; the rules in this section override that general deletion. The scope word @deva[उत्तरपदे] extends even further, through @ref[6.4.1], as a background condition.
"""

advanced = """
This @deva[अधिकार] governs @ref[6.3.1]–@ref[6.3.24]. Two terms carry forward: @deva[अलुक्] (non-elision) and @deva[उत्तरपदे] (before the second compound member). Both jointly govern through @ref[6.3.24]; @deva[उत्तरपदे] alone extends further through @ref[6.4.1], where the @deva[अङ्ग] @deva[अधिकार] begins. Each subsequent @[sūtra] in this section specifies which case-affix and after which word is retained—the present rule supplies the framing 'non-elision before @deva[उत्तरपद]'. Example: @ref[6.3.2] specifies @deva[पञ्चमी] after @deva[स्तोक]-class words → @deva[स्तोकात्] + @deva[मुक्तः] = @deva[स्तोकान्मुक्तः]. The condition @deva[उत्तरपदे] is critical: when @deva[स्तोक] is itself the @deva[उत्तरपद], the rule does not apply—@deva[निष्क्रान्तः] + @deva[स्तोकात्] = @deva[निःस्तोकः] (normal elision). The @[paribhāṣā] of @[pratipadokta] does not override this @deva[अधिकार].
"""

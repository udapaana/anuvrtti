id = "6.3.138"
numericId = "63138"

[en]
simple = """
When the @deva[अञ्च्] word is in a state where its @deva[अकार] and @deva[नकार] have been removed, it causes the @deva[दीर्घ] of the previous @deva[अण्] letter.
"""

standard = """
Final lengthened before @deva[अञ्च] when it becomes @deva[च]. @deva[दधीचः], @deva[मधूचः].
"""

advanced = """
The final vowel of the preceding member is lengthened before @deva[अञ्च] when it assumes the form @deva[च] (having lost its nasal by @ref[6.4.24] and its @deva[अ] by @ref[6.4.138]): @deva[दधीचः] @deva[पश्य], @deva[दधीचा], @deva[दधीचे]; @deva[मधूचः] @deva[पश्य], @deva[मधूचा], @deva[मधूचे]. In @deva[दधि] + @deva[अच्], the @deva[इ] is not converted to its semivowel despite that being an @[antaraṅga] rule, because this @[sūtra] specifically ordains long @deva[ई] — and similarly @deva[दधी] + @deva[अच्], @deva[मधू] + @deva[अच्]. See also @ref[6.3.92].
"""

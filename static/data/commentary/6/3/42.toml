id = "6.3.42"
numericId = "63042"

[en]
simple = """
In a @[karmadhāraya] compound and before @deva[जातीय] or @deva[देशीय], a feminine word takes its masculine form. So @deva[पाचिका] (female cook) becomes @deva[पाचक] in @deva[पाचकवृन्दारिका].
"""

standard = """
In a @deva[कर्मधारय] compound and before the suffixes @deva[जातीय] and @deva[देशीय], the feminine (unless ending in @deva[ऊ]) becomes masculine. This rule overrides the exception at @ref[6.3.37] for words with penultimate @deva[क्]. Thus @deva[पाचकवृन्दारिका] 'a woman who is like a cook' and @deva[दत्तजातीया] 'of Datta's kind'.
"""

advanced = """
A feminine (not ending in @deva[ऊ]) with an equivalent masculine becomes masculine in a @deva[कर्मधारय] @deva[समास] and before @deva[जातीय] and @deva[देशीय]. This rule overrides the preceding exceptions. Against @ref[6.3.37] (penultimate @deva[क]): @deva[पाचकवृन्दारिका], @deva[पाचकजातीया], @deva[पाचकदेशीया]. Against @ref[6.3.38] (names and ordinals): @deva[दत्तवृन्दारिका], @deva[दत्तजातीया], @deva[दत्तदेशीया], @deva[पंचमवृन्दारिका], @deva[पंचमजातीया], @deva[पंचमदेशीया]. Against @ref[6.3.39] (@deva[वृद्धि]-causing @deva[तद्धित]): @deva[स्रौघ्नवृन्दारिका], @deva[स्रौघ्नजातीया], @deva[स्रौघ्नदेशीया]. Against @ref[6.3.40] (body-part feminines in @deva[ई]): @deva[श्लक्ष्णमुखवृन्दारिका], @deva[श्लक्ष्णमुखजातीया], @deva[श्लक्ष्णमुखदेशीया]. Against @ref[6.3.41] (class-denoting feminines): @deva[कठवृन्दारिका], @deva[कठजातीया], @deva[कठदेशीया]. The feminine must have a corresponding masculine (@deva[भाषितपुंस्क]); the rule does not apply to @deva[खट्वावृन्दारिका] since @deva[खट्वा] has no masculine counterpart, nor to feminines in @deva[ऊ] such as @deva[ब्रह्मबन्धूवृन्दारिका]. @[vārttika]: @deva[कुक्कुटी] and similar words become masculine before @deva[अण्ड] and the like: @deva[कुक्कुट्या] @deva[अण्डं] = @deva[कुक्कुटाण्डन्], @deva[भृग्याः] @deva[पदं] = @deva[भृगपदम्], @deva[मृग्याः] @deva[क्षीरं] = @deva[मृगक्षीरम्], @deva[काक्याः] @deva[शावः] = @deva[काकशावः] — though this can also be explained by treating the first member as a common-gender class word. @[vārttika]: before a word formed by a @deva[खित्] affix or the affixes @deva[तर], @deva[तम], etc. (@ref[6.3.43]), the final long vowel shortens rather than becoming masculine: @deva[कालिंमन्या] (compare @ref[6.3.66]), @deva[हरिणिंमन्या], @deva[पट्वितरा], @deva[पट्वितमा], @deva[पट्विरूपा], @deva[पट्विकल्पा], @deva[पट्विका], @deva[मृद्विका]. The words @deva[इडविट्], @deva[दरद्], @deva[पृथ], and @deva[उशिज] are country names denoting @[kṣatriya] clans; the @[tādrāja] affix (@ref[6.1.168], @ref[6.1.170]) is elided in forming their feminines (@ref[4.1.177]). When masculinized: @deva[ऐडविडवृन्दारिका], @deva[औशिजवृन्दारिका].
"""

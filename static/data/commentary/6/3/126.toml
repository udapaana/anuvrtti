id = "6.3.126"
numericId = "63126"

[en]
simple = """
In Vedic texts, @deva[अष्टन्] lengthens its final @deva[अ] before any second member of a compound, without the restriction to proper names. Example: @deva[अष्टाकपालम्] (Vedic, eight-cupped ritual vessel).
"""

standard = """
In @deva[छन्दस्] (Vedic), the final of @deva[अष्टन्] is lengthened freely before any following member, extending beyond the name-restriction of @ref[6.3.125]. Thus @deva[अष्टाकपालम्], @deva[अष्टाहिरण्या], @deva[अष्टापदी]. A @[vārttika] adds @deva[अष्टागवम्] 'a span of eight cows in yoking'.
"""

advanced = """
In @deva[छन्दस्], the final of @deva[अष्टन्] is likewise lengthened before a second member: @deva[आग्नेयमष्टाकपालं] @deva[निर्वपेत्], @deva[अष्टाहिरण्या] @deva[दक्षिणा], @deva[अष्टापदी] @deva[देवता] @deva[सुमती]. The form @deva[अष्टापदी] is the feminine (@deva[ङीप्], @ref[4.1.8]) of @deva[अष्टपात्] (@ref[5.4.138]), with @deva[अ] of @deva[पाद] elided in @[bahuvrīhi] and @deva[पद्] substituted for @deva[पात्] by @ref[6.4.130]. Vart: The final of @deva[अष्टन्] is lengthened before @deva[गो] even in classical Sanskrit when yoking is intended: @deva[अष्टागवं] @deva[शकटम्].
"""

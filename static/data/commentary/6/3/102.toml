id = "6.3.102"
numericId = "63102"

[en]
simple = """
The prefix @deva[कु] is replaced by @deva[कत्] when specifically @deva[रथ] (chariot) or @deva[वद] (speech) follows. The @deva[त्] assimilates to @deva[द्] by regular sandhi. Example: @deva[कद्रथः] (a bad chariot).
"""

standard = """
@deva[कत्] is substituted for @deva[कु] before the specific words @deva[रथ] and @deva[वद]. The final @deva[त्] voices to @deva[द्] before these voiced consonants. Thus @deva[कद्रथः] 'a bad chariot', @deva[कद्वदः] 'speaking ill'. This rule covers words not covered by @ref[6.3.101] (vowel-initial) or @ref[6.3.103] (@[tṛṇa]).
"""

advanced = """
@deva[कत्] replaces @deva[कु] specifically before @deva[रथ] and @deva[वद]: @deva[कद्रथः], @deva[कद्वदः].
"""

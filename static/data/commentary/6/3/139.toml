id = "6.3.139"
numericId = "63139"

[en]
simple = """
When a word whose consonant (semivowel) has been replaced by a vowel through @deva[सम्प्रसारण] (vowel substitution) becomes the first member of a compound, that substituted vowel is lengthened. For example, @deva[करीषगन्धि] becomes @deva[कारीषगन्धीपुत्रः] ('son of she who smells like dung').
"""

standard = """
The process of @deva[सम्प्रसारण] (@ref[6.1.13]) substitutes a vowel for a semivowel in certain roots and stems. This rule states that when the resulting stem stands as the @deva[पूर्वपद] (first member) of a compound, that substituted vowel is further lengthened. Thus @deva[करीषगन्धि] (with @deva[इ] from @deva[सम्प्रसारण]) → first member @deva[कारीषगन्धी] in @deva[कारीषगन्धीपुत्रः]. See @ref[6.3.139].
"""

advanced = """
The vowel resulting from @deva[सम्प्रसारण] (see @ref[6.1.13]) is lengthened when it stands as the first member of a compound: @deva[कारीषगन्धीपुत्रः], @deva[कारीषगन्धीपतिः], @deva[कौमुदगन्धीपतिः]. The base form @deva[करीषगन्धिः] derives from @deva[करीषस्येव] @deva[गन्धोऽस्य], with @deva[इ] added as @[samāsānta] by @ref[5.4.136] and @ref[5.4.137]. The optional shortening of @ref[6.3.61] does not apply here: that option is a restricted one, and by the @deva[परत्व] maxim ('a subsequent rule supersedes a precedent'), @ref[6.3.139] overrides @ref[6.3.61]. Nor can @ref[6.3.61] be revived through the @deva[पुनः] @deva[प्रसङ्ग] @deva[विज्ञानम्] principle, because the maxim @deva[सकृद्गता] @deva[विप्रतिषेधे] @deva[यद्बाधितं] @deva[तद्बाधितमेव] ('in mutual conflict, a rule once superseded remains superseded') prevents its reapplication.
"""

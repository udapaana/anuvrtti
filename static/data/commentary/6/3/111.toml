id = "6.3.111"
numericId = "63111"

[en]
simple = """
When a @deva[ढकार] is deleted due to a @deva[ढकार] that follows it, or when a @deva[रेफ] is deleted due to a @deva[रेफ] that follows the @deva[अण्] letter occurring before the deleted @deva[ढकार]/@deva[रेफ] becomes @deva[दीर्घ].
"""

standard = """
When @deva[ढ्]/@deva[र्] elided: preceding @deva[अ]/@deva[इ]/@deva[उ] lengthened. @deva[लीढम्], @deva[नीरक्तम्], @deva[अग्नीरथः].
"""

advanced = """
When @deva[ढ्] or @deva[र्] is elided, the preceding @deva[अ], @deva[इ], or @deva[उ] receives a corresponding long vowel substitute. With @deva[ढलोप]: @deva[लीढम्], @deva[मीढम्], @deva[उपगूढम्]. With @deva[रलोप]: @deva[निर्]-@deva[रक्तम्] = @deva[नीरक्तम्], @deva[अग्निर्] @deva[रथः] = @deva[अग्नीरथः], @deva[इन्दू] @deva[रथः], @deva[पुना] @deva[रक्तम्] @deva[वासः], @deva[प्राता] @deva[राजक्रयः]. For @deva[ढ]-elision see @ref[8.3.13]; for @deva[र्]-elision see @ref[8.3.14]. In @deva[आवृढम्], however, @deva[ऋ] is not lengthened because it falls outside the @[pratyāhāra] @deva[अण्], which covers only @deva[अ] @deva[इ] @deva[उ] (formed with the @deva[ण] of @deva[अ] @deva[इ] @deva[उ] @deva[ण्]).
"""

id = "6.3.112"
numericId = "63112"

[en]
simple = """
For the verbs @deva[सह्] and @deva[वह्], when a @deva[ढकार] is deleted due to a @deva[ढकार] that follows it, the @deva[अकार] occurring before the deleted @deva[ढकार] is converted to @deva[ओ].
"""

standard = """
When @deva[ढ्]/@deva[र्] elided after @deva[सह्]/@deva[वह्]: @deva[अ]/@deva[आ] → @deva[ओ]. @deva[सोढा], @deva[वोढा], @deva[सोढुम्], @deva[वोढुम्].
"""

advanced = """
When @deva[ढ्] or @deva[र्] is elided, @deva[ओ] substitutes for the @deva[अवर्ण] (@deva[अ] or @deva[आ]) of @deva[सह्] and @deva[वह्]: @deva[सोढा], @deva[सोढुम्], @deva[सोढव्यम्], @deva[वोढा], @deva[वोढुम्], @deva[वोढव्यम्]. The restriction to @deva[अवर्ण] is significant — in @deva[ऊढः], @deva[ऊढवान्], the preceding vowel is not @deva[अवर्ण], so @deva[ओ]-substitution does not apply. The @[sūtra] specifies @deva[अवर्ण] (including both @deva[अ] and @deva[आ]) so that the rule covers cases where the short @deva[अ] of @deva[सह]/@ deva[वह] has already undergone @[vṛddhi] to @deva[आ]: @deva[उदवोढाम्], @deva[उदवोढम्]. Had the @[sūtra] read merely @deva[अ] after the @deva[त्] of @deva[ओत्], it would denote only short @deva[अ] by @deva[तपर] convention (@ref[1.1.75]).
"""

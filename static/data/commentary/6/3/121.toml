id = "6.3.121"
numericId = "63121"

[en]
simple = """
A word ending in @deva[इ] or @deva[उ] lengthens that vowel before @deva[वह] (carrying/bearing). The word @deva[पीलु] is an explicit exception. Example: @deva[ऋषीवहम्] (carrying sages).
"""

standard = """
The final @deva[इ] or @deva[उ] of a word is lengthened before @deva[वह], except for @deva[पीलु] which is excluded. Thus @deva[ऋषीवहम्] 'carrying sages', @deva[कपीवहम्] 'carrying monkeys', @deva[मुनीवहम्]. But @deva[पीलुवहम्] (no lengthening). Words with other final vowels (non-@deva[इक्]) are unaffected: @deva[पिण्डवहम्].
"""

advanced = """
Final @deva[इ] or @deva[उ] of the preceding word is lengthened before @deva[वह], with @deva[पीलु] excepted: @deva[ऋषीवहम्], @deva[कपीवहम्], @deva[मुनीवहम्]. The restriction to @deva[इक्] vowels is essential — a word ending in another vowel shows no lengthening: @deva[पिण्डवहम्]. @deva[पीलु] is excluded: @deva[पीलुवहम्]. A @[vārttika] extends the exception to "@deva[पीलु] and the rest" — hence @deva[दारुवहम्] (also unlengthened).
"""

id = "6.3.59"
numericId = "63059"

[en]
simple = """
@deva[उदक] can optionally become @deva[उद] before a word beginning with a single consonant that names a vessel holding water. So both @deva[उदकुम्भः] and @deva[उदककुम्भः] mean 'a pot of water'.
"""

standard = """
@deva[उद] is optionally substituted for @deva[उदक] before a word that begins with a single consonant (@deva[एकहलादि]) and denotes a vessel containing water. Thus @deva[उदकुम्भः] or @deva[उदककुम्भः] 'water pot', @deva[उदपात्रम्] or @deva[उदकपात्रम्] 'water vessel'.
"""

advanced = """
@deva[उद] optionally replaces @deva[उदक] before a word beginning with a single consonant (@deva[एकहलादि]) that denotes a vessel filled with water: @deva[उदकुम्भः] or @deva[उदककुम्भः], @deva[उदपात्रम्] or @deva[उदकपात्रम्]. The condition @deva[एकहलादि] means 'beginning with a single simple consonant' — the rule does not apply to @deva[उदकस्थालम्], whose second member begins with a conjunct consonant. The condition 'vessel' excludes @deva[उदकपर्वतः], since @deva[पर्वत] is not a receptacle.
"""

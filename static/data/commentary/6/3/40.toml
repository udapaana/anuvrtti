id = "6.3.40"
numericId = "63040"

[en]
simple = """
Feminine words ending in @deva[ई] that name a body part stay feminine in compounds — except before the suffix @deva[मानिन्]. So @deva[दीर्घकेशी] stays feminine in @deva[दीर्घकेशीभार्यः], but becomes masculine in @deva[दीर्घकेशमानिनी].
"""

standard = """
A feminine in @deva[ई] that refers to a body part does not undergo masculine substitution (@ref[6.3.34]). The exception is before @deva[मानिन्], where the masculine base is used. Thus @deva[दीर्घकेशीभार्यः] 'he whose wife has long hair' keeps the feminine, but @deva[दीर्घकेशमानिनी] 'she who considers herself long-haired' uses the masculine stem @deva[दीर्घकेश].
"""

advanced = """
A feminine in @deva[ई] whose final member denotes a body part does not undergo masculine substitution, unless @deva[मानिन्] follows. Retained forms: @deva[दीर्घकेशीभार्यः], @deva[शुक्लकेशीभार्यः], @deva[दीर्घकेशीपाशा], @deva[श्लक्ष्णकेशीपाशा], @deva[दीर्घकेशीयते], @deva[श्लक्ष्णकेशीयते]. Counterexamples: @deva[पटुभार्यः] (@deva[पटु] does not denote a body part), @deva[अकेशभार्यः] (@deva[अकेशा] @deva[भार्या] does not end in long @deva[ई]). Before @deva[मानिन्], masculine substitution applies: @deva[दीर्घकेशमानिनी]. The exception @deva[अमानिनि] is added from a @[vārttika] and is not part of the original @[sūtra].
"""

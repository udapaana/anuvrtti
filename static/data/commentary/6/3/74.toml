id = "6.3.74"
numericId = "63074"

[en]
simple = """
When the negative prefix @deva[अ] (from @deva[नञ्]) is followed by a vowel-initial word in a compound, the augment @deva[नुट्] (= @deva[न्]) is inserted to prevent ambiguity. So @deva[अ] + @deva[अज] → @deva[अनजः] (not a goat), and @deva[अ] + @deva[अश्व] → @deva[अनश्वः] (not a horse).
"""

standard = """
Before vowel-initial words, the @[āgama] @deva[नुट्] is added after the @deva[अ] left by @deva[नञ्]-elision (@ref[6.3.73]), producing @deva[अन्] as the effective negative prefix. This disambiguation is necessary because *@deva[अजः] alone is already a common word (goat). The augment @deva[नुट्] carries the @deva[ट्]-indicatory marker which triggers @deva[आद्यन्तौ] (placement at the beginning), placing @deva[न्] after @deva[अ]. Examples: @deva[अनजः] (not a goat), @deva[अनश्वः] (not a horse), @deva[अनुष्ट्रः] (not a camel).
"""

advanced = """
After the @deva[न्]-elided @deva[नञ्] (i.e., after the residual @deva[अ]), the @deva[आगम] @deva[नुट्] is added to a vowel-initial second member: @deva[अनजः], @deva[अनश्वः], @deva[अनुष्ट्रः]. The use of @deva[तस्मात्] ('after that') is significant — it makes @deva[नुट्] an augment of the subsequent word, not of @deva[नञ्] itself. Had the @[sūtra] read simply @deva[नुडाचि], @deva[नुट्] would attach to @deva[अ], yielding @deva[अन्]. Then @deva[अन्] + @deva[अजः] would produce @deva[अन्रजः] (not @deva[अनजः]), since @ref[8.3.32] would double the final @deva[न्] of @deva[अन्]. To prevent this, @deva[नुट्] is ordained with regard to the second member rather than @deva[अ] or @deva[नञ्].
"""

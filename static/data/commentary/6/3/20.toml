id = "6.3.20"
numericId = "63020"

[en]
simple = """
Before the word @deva[स्थ] ('standing, situated') in everyday spoken Sanskrit, the locative ending is always dropped. So @deva[कूटस्थः] ('standing at the peak, unchanging') and @deva[विषमस्थः] ('situated in a difficult position') have no locative ending. In Vedic usage, however, retention like @deva[आखरेष्ठः] was possible.
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is not retained before @deva[स्थ] in standard (@[bhāṣā]) usage. Thus @deva[विषमस्थः], @deva[कूटस्थः] with obligatory elision. In Vedic (@[chandas]) the locative could be kept: @deva[आखरेष्ठः]. The @deva[भाषा] restriction limits this rule to post-Vedic usage, making it a register-sensitive constraint.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is not preserved before @deva[स्थ] in @[bhāṣā] (standard usage): @deva[विषमस्थः], @deva[कूटस्थः], @deva[पर्वतस्थः]. In @[chandas] (Vedic), the locative may be retained: @deva[आखरेष्ठः], as in @deva[कुष्णोस्याखरेष्ठः]. The change of @deva[स] to @deva[ष] is by @ref[8.3.106].
"""

id = "6.3.84"
numericId = "63084"

[en]
simple = """
In Vedic usage, @deva[समान्] (same, equal) is replaced by @deva[स] in compounds — except before @deva[मूर्धन्], @deva[प्रभृति], and @deva[उदर्क]. So @deva[सगर्भ्यः] means 'of the same womb' and @deva[सयूथ्यः] means 'of the same herd', but @deva[समानमूर्धा] keeps the full @deva[समान्].
"""

standard = """
In @deva[छन्दस्] (Vedic), @deva[समान्] is replaced by @deva[स] in compounds, with three exceptions: @deva[मूर्धन्], @deva[प्रभृति], and @deva[उदर्क] block the substitution. The contracted form yields @deva[सगर्भ्यः] (sharing a womb) and @deva[सयूथ्यः] (of the same herd). The retained form @deva[समानमूर्धा] shows that @deva[मूर्धन्] specifically prevents the @deva[स]-substitution. This rule is restricted to @deva[छन्दस्] — in common language, a narrower set of words triggers @deva[स]-substitution (see @ref[6.3.85]).
"""

advanced = """
In @deva[छन्दस्] (Vedic usage), @deva[स] replaces @deva[समान्], except before @deva[मूर्धन्], @deva[प्रभृति], and @deva[उदर्क]: @deva[अनुभ्राता] @deva[सगर्भ्यः], @deva[अनुसखा] @deva[सयूथ्यः], @deva[योनः] @deva[सनूत्यः] (see @ref[4.4.14]). The derivation proceeds as @deva[समानो] @deva[गर्भः] = @deva[सगर्भः], @deva[तत्र] @deva[भवः] = @deva[सगर्भ्यः] (formed by the @deva[यन्] affix, @ref[4.4.114]). The exceptions retain the full form: @deva[समानमूर्द्धा], @deva[समानप्रभृतयः], @deva[समानोदर्काः]. This substitution also occurs in secular literature: @deva[सपक्षः], @deva[साधर्म्यम्], @deva[सजातीयः].
"""

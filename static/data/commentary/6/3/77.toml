id = "6.3.77"
numericId = "63077"

[en]
simple = """
The word @deva[नग] (tree or mountain) optionally keeps the full @deva[न] of @deva[नञ्] when it does not refer to a living being. So one may say @deva[नगाः] or @deva[अगाः] for 'trees/mountains.' But when it refers to a person, only @deva[अग] is used.
"""

standard = """
The rule provides an option for @deva[नग] when @deva[न]-retention does not yield a living-being meaning: both @deva[नगाः] and @deva[अगाः] are acceptable for 'trees' or 'mountains'. When the same form would refer to a person — as in @deva[अगः] @deva[वृषलः] — only the @deva[अ]-form from regular @deva[न्]-elision (@ref[6.3.73]) is permitted. The option is thus conditioned by the semantic domain of the referent.
"""

advanced = """
The negative particle is optionally retained unchanged in @deva[नग] when the referent is not a living animate being: @deva[नगाः] or @deva[अगाः] — 'trees' or 'mountains', literally 'what do not move'. The affix @deva[ड] is added to @deva[गम्]. When the referent is animate, only the regular @deva[अ]-form applies: @deva[अगः] @deva[वृषलः] @deva[शीतेन] — no alternative form is permitted.
"""

id = "6.3.103"
numericId = "63103"

[en]
simple = """
The prefix @deva[कु] becomes @deva[कत्] before @deva[तृण] only when a specific species (not just 'bad grass') is denoted. When the meaning is simply 'bad grass', no substitution takes place. Example: @deva[कत्तृणा] (a species of grass).
"""

standard = """
@deva[कत्] substitutes for @deva[कु] before @deva[तृण] only in the reading denoting a species (@deva[जाति]). When the compound merely means 'inferior grass' (not a named species), the regular @deva[कु] is retained: @deva[कुतृणानि]. The double @deva[त्त्] in @deva[कत्तृणा] results from @deva[त्] + @deva[त्].
"""

advanced = """
@deva[कत्] is substituted for @deva[कु] when @deva[तृण] follows denoting a species. As @deva[कत्तृणा] @deva[नाम] @deva[जातिः] @deva[॥] But @deva[कुत्सितानि] @deva[तृणानि] = @deva[कुतृणानि] @deva[॥]
"""

id = "6.3.130"
numericId = "63130"

[en]
simple = """
When @deva[विश्व] compounds with @deva[मित्र] to refer to the sage @deva[विश्वामित्र], the final vowel is lengthened. The form @deva[विश्वामित्रः] refers to the famous @deva[ऋषि], while @deva[विश्वमित्रः] (short vowel) is used for an ordinary person's name.
"""

standard = """
The final vowel of @deva[विश्व] lengthens before @deva[मित्र] only when the compound is the name of the @deva[ऋषि] @deva[विश्वामित्र]. Thus @deva[विश्वामित्रः] (the sage, long @deva[आ]) versus @deva[विश्वमित्रः] (a boy's name or ordinary compound, short vowel). This is a @[nitya] (unconditional) rule for the @deva[ऋषि] referent and @[vibhāṣā] (optional) otherwise. See @ref[6.3.130].
"""

advanced = """
The final vowel of @deva[विश्व] is lengthened before @deva[मित्र] when the compound names the @deva[ऋषि]: @deva[विश्वामित्रः]. When used as an ordinary personal name (not the sage), the short vowel is retained: @deva[विश्वमित्रः].
"""

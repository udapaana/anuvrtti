id = "6.3.135"
numericId = "63135"

[en]
simple = """
In the @deva[ऋग्वेद], a tense-affix (verb ending) that ends in @deva[अ] is lengthened when the verb form has exactly two syllables. For example, @deva[विद्म] ('we know') becomes @deva[विद्मा] in the hymn @deva[विद्मा हि त्वा].
"""

standard = """
In the @deva[ऋग्वेद], the final @deva[अ] of a @deva[तिङ्]-affix (personal ending) is lengthened when the resulting verb form is disyllabic. Thus @deva[विद्म] (two syllables) → @deva[विद्मा] in @deva[विद्मा हि त्वा]. This rule does not apply if the form has more syllables. It reflects Vedic metrical conventions. See @ref[6.3.135].
"""

advanced = """
In the @deva[ऋग्वेद], a tense-affix ending in @deva[अ] is lengthened when the verb form is disyllabic: @deva[विद्मा] @deva[हि] @deva[त्वा] @deva[सत्पतिं] @deva[शूर] @deva[गोनाम्] (@[ṛg] III.42.6), @deva[विद्मा] @deva[हि] @deva[तस्य] @deva[पितरम्]. The rule does not apply when the verb has more than two syllables: @deva[देवा] @deva[भवत] @deva[वाजिनः]. Nor does it apply when the verb does not end in @deva[अ]: @deva[आ] @deva[देवान्] @deva[वक्षि] @deva[यक्षि] @deva[च].
"""

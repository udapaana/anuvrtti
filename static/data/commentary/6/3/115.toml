id = "6.3.115"
numericId = "63115"

[en]
simple = """
Before @deva[कर्ण] when it means an ear-mark cut into cattle for identifying ownership, the final vowel of the preceding word is lengthened. Certain word-classes like @deva[विष्ट] and @deva[अष्टन्] are excluded. Example: @deva[दात्राकर्णः] (sickle-ear-mark).
"""

standard = """
The final vowel of any word preceding @deva[कर्ण] is lengthened when @deva[कर्ण] denotes a cattle ear-mark (@deva[पशुकर्णलक्षण]). Thus @deva[दात्राकर्णः], @deva[द्विगुणाकर्णः]. Exception: before @deva[विष्ट], @deva[अष्टन्], @deva[पञ्चन्], @deva[मणि], @deva[भिन्न], @deva[छिन्न], @deva[छिद्र], @deva[स्रुव], the lengthening does not apply.
"""

advanced = """
The final vowel of the preceding word is lengthened before @deva[कर्ण] when it denotes a proprietorship mark on cattle ears (@deva[पशुकर्णलक्षण]), with the exception of @deva[विष्ट], @deva[अष्टन्], @deva[पञ्चन्], @deva[मणि], @deva[भिन्न], @deva[छिन्न], @deva[छिद्र], @deva[स्रुव], and @deva[स्वस्तिक]. Lengthened forms: @deva[दात्राकर्णः], @deva[द्विगुणाकर्णः], @deva[त्रिगुणाकर्णः], @deva[द्व्यङ्गुलाकर्णः], @deva[अङ्गुलाकर्णः]. The term @deva[लक्षण] refers to any identifying mark placed on animal ears. When @deva[कर्ण] does not denote such a mark, no lengthening occurs: @deva[शोभनकर्णः]. The excepted words likewise show no lengthening: @deva[विष्टकर्णः], @deva[अष्टकर्णः], @deva[पञ्चकर्णः], @deva[भिन्नकर्णः], @deva[छिन्नकर्णः], @deva[छिद्रकर्णः], @deva[स्रवकर्णः], @deva[स्वस्तिककर्णः], @deva[मणिकर्णः].
"""

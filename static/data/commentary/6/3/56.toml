id = "6.3.56"
numericId = "63056"

[en]
simple = """
@deva[पाद] optionally becomes @deva[पद्] before @deva[घोष], @deva[मिश्र], and @deva[शब्द]. So both @deva[पद्घोषः] and @deva[पादघोषः] are correct for 'the sound of footsteps'.
"""

standard = """
@deva[पद्] is optionally substituted for @deva[पाद] before @deva[घोष], @deva[मिश्र], and @deva[शब्द]. Thus @deva[पद्घोषः] or @deva[पादघोषः] 'sound of feet', @deva[पन्मिश्रः] or @deva[पादमिश्रः], @deva[पच्छब्दः] or @deva[पादशब्दः]. A @[vārttika] adds the option @deva[पन्निष्कः] or @deva[पादनिष्कः].
"""

advanced = """
@deva[पद्] optionally replaces @deva[पाद] before @deva[घोष], @deva[मिश्र], and @deva[शब्द]: @deva[पद्घोषः] or @deva[पादघोषः], @deva[पन्मिश्रः] or @deva[पादमिश्रः], @deva[पच्छब्दः] or @deva[पादशब्दः]. @[vārttika]: the option extends to @deva[निष्क] as well — @deva[पन्निष्कः] or @deva[पादनिष्कः].
"""

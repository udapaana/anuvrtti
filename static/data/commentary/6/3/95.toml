id = "6.3.95"
numericId = "63095"

[en]
simple = """
If the word '@deva[सह]' is followed by an @deva[लुप्तप्रत्ययान्त-अञ्च्] word, then '@deva[सह]' is converted to '@deva[सध्रि]'.
"""

standard = """
@deva[सह] → @deva[सध्रि] before @deva[अञ्च्] (with @deva[व]). @deva[सध्र्यङ्], @deva[सध्र्यञ्चः].
"""

advanced = """
@deva[सध्रि] replaces @deva[सह] before @deva[अञ्च्] with the @deva[क्विन्] affix (@deva[व]-affix): @deva[सध्र्यङ्], @deva[सध्र्यञ्चौ], @deva[सध्र्यञ्चः]; and @deva[सध्रीचः], @deva[सध्रीचा] (see @ref[6.3.138] for the long vowel).
"""

id = "6.3.6"
numericId = "63006"

[en]
simple = """
When @deva[आत्मन्] ('self') is the first member of a compound and the second member is an ordinal numeral (like 'fifth', 'sixth'), the instrumental ending is kept. So @deva[आत्मनापंचमः] means 'himself being the fifth' — counting the person themselves as one of the group.
"""

standard = """
The @deva[तृतीया] (instrumental) case-affix after @deva[आत्मन्] is not elided when an @deva[पूरण] (ordinal numeral) follows as the second compound member. The compounding itself is licensed by @ref[2.1.30]. Examples: @deva[आत्मनापंचमः] ('himself the fifth'), @deva[आत्मनाषष्ठः] ('himself the sixth'), describing a person counted along with others in a group.
"""

advanced = """
The @deva[तृतीया] (instrumental) case-affix after @deva[आत्मन्] is not elided when a @deva[पूरण] (ordinal numeral) follows: @deva[आत्मनापंचमः], @deva[आत्मनाषष्ठः]. The instrumental here is licensed by the @[vārttika] @deva[तृतीयाविधाने] @deva[प्रकृत्यादीनामुपसंख्यानं] on @ref[2.3.18]. Compounding is by @ref[2.1.30], via @[yoga]-@[vibhāga] of @deva[तृतीया] into a separate @[sūtra]: @deva[आत्मना] @deva[कृतः] @deva[पंचमः] = @deva[आत्मनापंचमः]. The form @deva[आत्मचतुर्थ] in @deva[जनार्दनस्त्वात्मचतुर्थ] @deva[एव] is a @[bahuvrīhi] compound: @deva[आत्मा] @deva[चतुर्थोऽस्य]. The word @deva[पूरणे] is a later addition by the @[vārtikakāra].
"""

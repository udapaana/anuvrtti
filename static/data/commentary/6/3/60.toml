id = "6.3.60"
numericId = "63060"

[en]
simple = """
@deva[उदक] can optionally become @deva[उद] before a list of specific words including @deva[मन्थ], @deva[ओदन], and others. So both @deva[उदमन्थः] and @deva[उदकमन्थः] mean 'water-stirred gruel'.
"""

standard = """
@deva[उद] is optionally substituted for @deva[उदक] before @deva[मन्थ], @deva[ओदन], @deva[सक्तु], @deva[बिन्दु], @deva[वज्र], @deva[भार], @deva[हार], @deva[वीवध], and @deva[गाह]. Thus @deva[उदमन्थः] or @deva[उदकमन्थः], @deva[उदौदनः] or @deva[उदकोदनः] 'rice cooked in water'. Compare the mandatory substitutions at @ref[6.3.58].
"""

advanced = """
@deva[उद] optionally replaces @deva[उदक] before @deva[मन्थ], @deva[ओदन], @deva[सक्तु], @deva[बिन्दु], @deva[वज्र], @deva[भार], @deva[हार], @deva[वीवध], and @deva[गाह]. Examples: @deva[उदकेन] @deva[मन्थः] = @deva[उदमन्थ] or @deva[उदकमन्थः]; @deva[उदौदनः] or @deva[उदकोदनः]; @deva[उदकेन] @deva[सक्तुः] = @deva[उदसक्तु] or @deva[उदकसक्तुः]; @deva[उदकस्य] @deva[बिन्दुः] = @deva[उदबिन्दुः] or @deva[उदकबिन्दुः]; @deva[उदकस्य] @deva[वज्रः] = @deva[उदवज्रः] or @deva[उदकवज्रः]; @deva[उदकं] @deva[बिभर्तीति] = @deva[उदभारः] or @deva[उदकभारः]; @deva[उदकं] @deva[हरतीति] = @deva[उदहारः] or @deva[उदकहारः]; @deva[उदकस्य] @deva[वीवध] = @deva[उदवीवधः] or @deva[उदकवीवधः]; @deva[उदकं] @deva[गाहत] @deva[इति] = @deva[उदगाहः] or @deva[उदकगाहः].
"""

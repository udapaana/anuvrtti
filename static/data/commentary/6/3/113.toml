id = "6.3.113"
numericId = "63113"

[en]
simple = """
Three Vedic word-forms — @deva[साढ्यै], @deva[साढ्वा], and @deva[साढा] — are listed as @[nipatana] (memorized irregulars) that cannot be derived from standard rules. Example: @deva[साढ्यै समन्तात्] (from all around).
"""

standard = """
The three forms @deva[साढ्यै], @deva[साढ्वा], and @deva[साढा] are Vedic @[nipatana] — irregularly formed words accepted by convention. They are not derivable through standard @[pāṇinian] rules and must be memorized. Thus @deva[साढ्यै समन्तात्], @deva[साढ्वा शत्रून्].
"""

advanced = """
The three forms @deva[साढ्यै], @deva[साढ्वा], and @deva[साढा] are irregular Vedic @[nipātana]: @deva[साढ्यै] @deva[समन्तात्], @deva[साढ्वा] @deva[शत्रून्]. @deva[साढ्वा] is formed with the @deva[क्त्वा] affix, the @deva[ओ]-substitution not applying; alternatively, @deva[क्त्वा] is replaced by @deva[धौ]. @deva[साढा] takes the @deva[तृच्] affix. In classical Sanskrit, the standard forms are @deva[सोढा] and @deva[सोढ्वा].
"""

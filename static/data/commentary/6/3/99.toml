id = "6.3.99"
numericId = "63099"

[en]
simple = """
@deva[अन्य] (another) receives an inserted @deva[द्] before certain following words. This insertion does not occur when @deva[अन्य] is in the genitive or instrumental case. Example: @deva[अन्यदाशीः] (blessing for another).
"""

standard = """
The augment @deva[दुक्] (i.e., @deva[द्]) is inserted after @deva[अन्य] when it is not in the @deva[षष्ठी] (genitive) or @deva[तृतीया] (instrumental), before the words @deva[आशिस्], @deva[आशा], @deva[आस्था], @deva[उत्सुक], @deva[कारक], @deva[राग], and the affix @deva[छ] (@deva[ईय]). Thus @deva[अन्यदाशीः], @deva[अन्यदाशा], @deva[अन्यदास्था], @deva[अन्यदुत्सुकः], @deva[अन्यदीयः].
"""

advanced = """
@deva[अन्य], when not in the @deva[षष्ठी] (genitive) or @deva[तृतीया] (instrumental), takes the augment @deva[दुक्] (@deva[द्]) before @deva[आशिस्], @deva[आशा], @deva[आस्था], @deva[उत्सुक], @deva[कारक], @deva[राग], and the affix @deva[छ] (@deva[ईय]). The @[kārikā] states: @deva[दुगागमोऽविशेषेण] @deva[वक्तव्यः] @deva[कारकच्छयोः] @deva[।] @deva[षष्ठीतृतीययोर्नेष्ट] @deva[आशीरादिषु] @deva[सप्तसु]. Examples: @deva[अन्या] @deva[आशीः] = @deva[अन्यदाशीः], @deva[अन्या] @deva[आशा] = @deva[अन्यदाशा], @deva[अन्या] @deva[आस्था] = @deva[अन्यदास्था], @deva[अन्य] @deva[आस्थितः] = @deva[अन्यदास्थितः], @deva[अन्य] @deva[उत्सुकः] = @deva[अन्यदुत्सुकः], @deva[अन्या] @deva[ऊतिः] = @deva[अन्यदूतिः], @deva[अन्यः] @deva[कारकः] = @deva[अन्यत्कारकः], @deva[अन्यो] @deva[रागः] = @deva[अन्यद्रागः]. With @deva[छ]: @deva[अन्यस्मिन्] @deva[भवः] = @deva[अन्यदीयः] — @deva[अन्य] belongs to the @deva[गहादि] class (@ref[4.2.138]) and takes @deva[छ]. In the genitive or instrumental, the augment is blocked: @deva[अन्यस्य] @deva[आशीः] = @deva[अन्याशीः], @deva[अन्येन] @deva[आस्थितः] = @deva[अन्यास्थितः]. However, before @deva[कारक] and @deva[छ], @deva[दुक्] applies universally regardless of case: @deva[अन्यस्य] @deva[कारकः] = @deva[अन्यत्] @deva[कारकम्], @deva[अन्यस्येदम्] = @deva[अन्यदीयम्]. The double negation in the @[sūtra] (@deva[अषष्ठी] and @deva[अतृतीया]) implies this universal application for those two items.
"""

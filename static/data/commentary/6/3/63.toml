id = "6.3.63"
numericId = "63063"

[en]
simple = """
This rule allows the long vowel of feminine suffixes @deva[ङी] and @deva[आप्] to optionally shorten in proper names and Vedic usage. For example, @deva[रेवतिपुत्रः] uses the short @deva[इ] instead of the long @deva[ई] from the name @deva[रेवती]. Sometimes the full long vowel is kept, as in @deva[नान्दीकरः].
"""

standard = """
The rule provides for @[vikalpena] (optional) shortening of the final long vowel of feminine affixes @deva[ङी] and @deva[आप्] in two contexts: proper names (@deva[संज्ञा]) and Vedic usage (@deva[छन्दस्]). In compounds such as @deva[रेवतिपुत्रः] and @deva[रोहिणिपुत्रः], the @deva[ई] of @deva[रेवती] and @deva[रोहिणी] shortens to @deva[इ]. The alternant with the long vowel is also permissible, as shown by @deva[नान्दीकरः] and @deva[नान्दीघोषः]. The Vedic example @deva[कुमारिदारा] illustrates the shortening of @deva[आप्]-final @deva[आ] to @deva[अ] in @deva[छन्दस्].
"""

advanced = """
The short is diversely substituted for the feminine affixes @deva[ई] and @deva[आ] (@deva[ङी] and @deva[आप्]) in a Name and in the @deva[छन्दस्] (Vedas). As @deva[रेवतिपुत्रः], @deva[रोहिणिपुत्रः], @deva[भरणिपुत्रः] @deva[॥] Sometimes not, as @deva[नान्दीकरः], @deva[नान्दीघोषः], @deva[नान्दीविशालः] @deva[॥] So also in the Vedas, as @deva[कुमारिदारा], @deva[प्रदर्विदा]; sometimes the shortening does not take place, as @deva[फाल्गुनीपौर्णमासी], @deva[जगतीछन्दः] @deva[॥] @deva[आप्] ending words in Name: @deva[शिलवहम्], @deva[शिलप्रस्थम्]; sometimes there is no shortening, as, @deva[लोमकागृहम्], @deva[लोमकाखण्डम्] @deva[॥] So also in the Vedas:- @deva[अजक्षीरेण] @deva[जुहोति], @deva[ऊर्णम्रदा] @deva[पृथिवीं] @deva[विश्वधायसम्] @deva[॥] Sometimes there is no shortening, as, @deva[ऊर्णासूत्रेण] @deva[कवयो] @deva[वयन्ति] @deva[॥]
"""

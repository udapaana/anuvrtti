id = "6.3.17"
numericId = "63017"

[en]
simple = """
When the first member of a compound is a word denoting a time of day or period, and the second member is a comparative suffix (@deva[तर]), superlative suffix (@deva[तम]), the word @deva[काल], or the suffix @deva[तन], the locative ending on the time word may optionally be kept. This gives pairs like @deva[पूर्वाह्णेतरे] ~ @deva[पूर्वाह्णतरे].
"""

standard = """
The @deva[सप्तमी] (locative) case-affix on a time-denoting word ending in a consonant or short @deva[अ] is optionally preserved when @deva[तरप्], @deva[तमप्], @deva[काल], or the affix @deva[तन] follow. Example: @deva[पूर्वाह्णेतरे] or @deva[पूर्वाह्णतरे] ('later than morning'). The rule targets temporal @[pūrvapadas] specifically, distinguishing them from the general optional locative retention in @ref[6.3.18].
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is optionally retained after a time-denoting stem ending in a consonant or @deva[अ] when @deva[तरप्], @deva[तमप्], the word @deva[काल], or the affix @deva[तन] follow. The affixes @deva[तर] and @deva[तम] are called @deva[घ] by @ref[1.1.22]. Examples with @deva[घ]: @deva[पूर्वाह्णतरे] or @deva[पूर्वाह्णेतरे], @deva[पूर्वाह्णेतमे] or @deva[पूर्वाह्णतमे]. With @deva[काल]: @deva[पूर्वाह्णेकाले] or @deva[पूर्वाह्णकाले]. With @deva[तन]: @deva[पूर्वाह्णेतने] or @deva[पूर्वाह्णतने]. The time-denoting condition is operative: @deva[शुक्लतरे] and @deva[शुक्लतमे] show no option because @deva[शुक्ल] is not a time word. The consonant-or-@deva[अ] condition also applies: @deva[रात्रितरायाम्] allows no option. By the general @[paribhāṣā] @deva[प्रत्ययग्रहणे] @deva[यस्मात्] @deva[स] @deva[विहितस्तदादे] @deva[स्तदन्तस्य] @deva[ग्रहणम्], an affix normally denotes the word-form ending in that affix — so @deva[थ] in @ref[6.2.144] means a word ending in @deva[थ]. But within the @deva[उत्तरपद] @[adhikāra], the maxim @deva[उत्तरपदाधिकारे] @deva[प्रत्ययग्रहणे] @deva[न] @deva[तदन्त] @deva[ग्रहणम्] applies: an affix denotes only its own form, not the word ending in it. Hence @deva[तर], @deva[तम], and @deva[तन] here refer to the affixes themselves. This is confirmed by @ref[6.3.50], where @deva[हृद्] is prescribed as the substitute of @deva[हृदय] before @deva[लेख], @deva[यत्], @deva[अण्], and @deva[लास] — if @deva[अण्] meant a word ending in @deva[अण्], specifying @deva[लेख] (which is itself formed with @deva[अण्]) would be redundant. The word @deva[काल] in the @[sūtra] denotes the word-form @deva[काल] itself. For the affix @deva[तन], see @ref[4.3.23].
"""

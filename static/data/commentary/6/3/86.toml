id = "6.3.86"
numericId = "63086"

[en]
simple = """
@deva[समान्] becomes @deva[स] before @deva[ब्रह्मचारिन्] when the compound refers to a fellow Vedic student. The resulting form @deva[सब्रह्मचारी] means 'one who undertakes the same Vedic study-vow', i.e., a classmate.
"""

standard = """
Before @deva[ब्रह्मचारिन्], @deva[समान्] is replaced by @deva[स] specifically when the compound denotes persons who share the same Vedic vow of study. The derived word @deva[सब्रह्मचारी] (= @deva[समानो] @deva[ब्रह्मचारी]) refers to a co-student in the @deva[गुरुकुल] system. This rule is a lexical specialization within the broader @deva[स]-for-@deva[समान्] paradigm; unlike @ref[6.3.85] where ten words are listed, here a single culturally specific compound is singled out.
"""

advanced = """
@deva[स] replaces @deva[समान्] before @deva[ब्रह्मचारिन्] when the referents share a common vow of Vedic study: @deva[समानो] @deva[ब्रह्मचारी] = @deva[सब्रह्मचारी]. Here @deva[ब्रह्म] denotes the Vedas, and the vow of studying them is also called @deva[ब्रह्म]; one engaged in fulfilling that vow is a @deva[ब्रह्मचारिन्]. The @deva[समान] refers to the shared vow: @deva[समाने] @deva[ब्रह्मणि] @deva[व्रतचारी] = @deva[सब्रह्मचारी]. According to @[bhaṭṭoji] @[dīkṣita], @deva[चरणे] in the @[sūtra] means @deva[शाखा] (a branch of Vedic study) — one who shares the same @deva[चरण] is a @deva[सब्रह्मचारी].
"""

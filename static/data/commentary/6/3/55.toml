id = "6.3.55"
numericId = "63055"

[en]
simple = """
@deva[पाद] becomes @deva[पद्] before the suffix @deva[शस्] when the word means a quarter of a Vedic verse. So @deva[पच्छो] @deva[गायत्रीं] @deva[शंसति] means 'he recites the @[gāyatrī] verse by quarter'. But for monetary quarters, @deva[पादशः] is used.
"""

standard = """
@deva[पद्] replaces @deva[पाद] before affix @deva[शस्] only when the sense is 'a metrical quarter of a hymn'. Thus @deva[पच्छो] @deva[गायत्रीं] @deva[शंसति] 'he recites the @[gāyatrī] by quarters'. When @deva[शस्] means 'by the fourth part' in a non-Vedic sense, @deva[पाद] is retained: @deva[पादशः] @deva[कार्षापणं] @deva[ददाति] 'he gives money in quarter-units'.
"""

advanced = """
@deva[पद्] replaces @deva[पाद] before the affix @deva[शस्] when the meaning is a metrical quarter (@deva[ऋक्]): @deva[पच्छो] @deva[गायत्रीं] @deva[शंसति] = @deva[पादं] @deva[पादं] @deva[शंसति], with @deva[शस्] added by @ref[5.4.43]. When @deva[पाद] means a monetary quarter rather than a Vedic verse-quarter, @deva[पाद] is retained: @deva[पादशः] @deva[कार्षापणं] @deva[ददाति].
"""

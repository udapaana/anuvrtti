id = "6.3.16"
numericId = "63016"

[en]
simple = """
For the words @deva[वर्ष] ('rain/year'), @deva[क्षर] ('flowing'), @deva[शर] ('arrow/reed'), and @deva[वर] ('boon/best'), when the second member is @deva[ज] ('born'), the locative ending may optionally be kept. So both @deva[वर्षेजः] and @deva[वर्षजः] are valid.
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is optionally retained after @deva[वर्ष], @deva[क्षर], @deva[शर], and @deva[वर] before @deva[ज]. This contrasts with @ref[6.3.15], where retention with @deva[प्रावृट्] etc. is obligatory. Examples: @deva[वर्षेजः] or @deva[वर्षजः], @deva[शरेजः] or @deva[शरजः]. The optionality (@[vibhāṣā]) licenses both outputs.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is optionally retained after @deva[वर्ष], @deva[क्षर], @deva[शर], and @deva[वर] when @deva[ज] follows: @deva[वर्षेजः] or @deva[वर्षजः], @deva[क्षरेजः] or @deva[क्षरजः], @deva[शरेजः] or @deva[शरजः], @deva[वरेजः] or @deva[वरजः].
"""

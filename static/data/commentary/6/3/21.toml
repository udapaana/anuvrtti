id = "6.3.21"
numericId = "63021"

[en]
simple = """
When a compound is meant to convey an insult, the genitive ending (@deva[-स्य], @deva[-अस्], meaning 'of') on the first member is kept rather than dropped. For example, @deva[चौरस्यकुलम्] means 'family of a thief' — the genitive @deva[-स्य] shows the insulting intent.
"""

standard = """
The @deva[षष्ठी] (genitive) case-affix is retained when the compound is used to express contempt or insult (@[avajñā]). Example: @deva[चौरस्यकुलम्] ('family of a thief'), @deva[वृषलस्यकुलम्]. Without insult, the affix is dropped: @deva[ब्राह्मणकुलम्]. A @[vārttika] lists additional fixed forms that retain the genitive: @deva[वाचोयुक्तिः], @deva[देवानांप्रियः], @deva[शुनःशेपः], @deva[दिवोदासः].
"""

advanced = """
The @deva[षष्ठी] (genitive) case-affix is retained when the compound expresses contempt or insult (@[avajñā]): @deva[चौरस्यकुलम्], @deva[वृषलस्यकुलम्]. Without insult, the affix is elided: @deva[ब्राह्मणकुलम्]. A @[vārttika] states that the genitive is not elided after @deva[वाक्] before @deva[युक्ति], after @deva[दिश्] before @deva[दण्ड], and after @deva[पश्यत्] before @deva[हर]: @deva[वाचोयुक्तिः], @deva[दिशोदण्डः], @deva[पश्यतोहरः]. Another @[vārttika] preserves the genitive in @deva[आमुष्यायणः], @deva[आमुष्यपुत्रिका], and @deva[आमुष्यकुलिका]. Here @deva[अमुष्य] is the genitive singular of the pronoun @deva[अदस्], enumerated in the @deva[नडादि] class (@ref[4.1.99]), taking @deva[फक्] for the patronymic: @deva[अमुष्यापत्यम्] = @deva[अमुष्यायणः]; @deva[अमुष्यपुत्रस्य] @deva[भावः] = @deva[आमुष्यपुत्रिका], formed by @deva[वुञ्] (@ref[5.1.133]); likewise @deva[आमुष्यकुलिका]. A further @[vārttika] retains the genitive in @deva[देवानांप्रियः]. The @[Siddhānta-Kaumudī] claims this applies only when the sense is 'fool', but neither the @[Mahābhāṣya] nor the @[kāśikā] supports this restriction. This was the title of the Buddhist monarch @[Aśoka], who would not have adopted it had it carried a pejorative sense. The gloss @deva[इति] @deva[च] @deva[मूर्खे] is an interpolation by @[bhaṭṭoji] @[dīkṣita]. A @[vārttika] also retains the genitive after @deva[श्वन्] before @deva[शेप], @deva[पुच्छ], and @deva[लांगुल]: @deva[शुनः] @deva[शेपः], @deva[शुनः] @deva[पुच्छः], @deva[शुनोलांगुलः]. And after @deva[दिव्] before @deva[दास]: @deva[दिवोदासः].
"""

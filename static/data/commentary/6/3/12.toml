id = "6.3.12"
numericId = "63012"

[en]
simple = """
When the first member of a compound is a body-part word (like @deva[कण्ठ] 'throat' or @deva[उरस्] 'chest'), the locative ending is kept — unless the second member is @deva[काम] ('desire'). So @deva[कण्ठेकालः] ('having a dark mark on the throat') keeps the locative, but @deva[मुखकामः] drops it.
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is not elided after body-part (@[aṅga]) words — with the exceptions @deva[मूर्धन्] and @deva[मस्तक] — before any second member except @deva[काम]. Examples retaining: @deva[कण्ठेकालः], @deva[उरसिलोमा], @deva[उदरेमणिः]. Before @deva[काम], elision occurs normally: @deva[मुखकामः]. The two excluded body parts and the @deva[काम] exception show lexical specificity within this rule.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is not elided after a body-part word (excluding @deva[मूर्धन्] and @deva[मस्तक]) before any second member other than @deva[काम]: @deva[कण्ठे] @deva[कालोऽस्य] = @deva[कण्ठेकालः], @deva[उरसिलोमा], @deva[उदरेमणिः]. The exceptions: @deva[मूर्धशिखः] and @deva[मस्तकशिखः] show normal elision for the excluded stems; @deva[मुखे] @deva[कामोऽस्य] = @deva[मुखकामः] shows elision before @deva[काम]. The rule does not apply when the first member is not a body-part word (@deva[अक्षशौण्डः]) or when it does not end in a consonant or @deva[अ] (@deva[अंगुलित्राणः], @deva[जङ्घावलिः]).
"""

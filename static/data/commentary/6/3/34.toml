id = "6.3.34"
numericId = "63034"

[en]
simple = """
When a feminine adjective directly describes another feminine noun in a compound, the adjective takes its masculine form instead. So @deva[दर्शनीया] (beautiful, fem.) becomes @deva[दर्शनीय] in @deva[दर्शनीयभार्यः] 'he who has a beautiful wife'.
"""

standard = """
A feminine word that has a genuine masculine counterpart and does not end in @deva[ऊङ्] assumes its masculine form when followed by an appositional feminine in a compound. The change is blocked before ordinal numerals and @deva[प्रिय]-class words. Thus @deva[दर्शनीयभार्यः], @deva[शुक्लाभार्यः]; but @deva[सुभार्यः] (priya-class) and @deva[पञ्चमीभार्यः] (ordinal) keep the feminine.
"""

advanced = """
A feminine word that has a genuine corresponding masculine of the same form (@deva[आकृति]) and connotation (@deva[आयाम]), and does not end in the affix @deva[ऊङ्], takes its masculine form when followed by an appositional (@deva[समानाधिकरण]) feminine word — except before @deva[पूरण] (ordinal numerals) and @deva[प्रियादि] words. Analysis of the @[sūtra] terms: @deva[स्त्रियाः] — 'for a feminine word'; @deva[पुंवद्] — 'like the masculine', meaning a masculine substitute replaces the feminine; @deva[भाषितपुंस्कात्] = @deva[भाषितपुमान्येन] — a word by which a masculine is expressed, requiring co-extensiveness in denotation between the masculine and feminine forms. A word not ending in @deva[ऊङ्] is called @deva[अनूङ्]. Such a @deva[भाषितपुंस्कादनूङ्] feminine word (a @[bahuvrīhi] compound, with the ablative affix anomalously not elided) undergoes substitution to its masculine form. Example: @deva[दर्शनीयभार्यः] (= @deva[दर्शनीयाभार्या] @deva[यस्य]) — @deva[दर्शनीया] has a corresponding masculine @deva[दर्शनीयः] of the same form and force, ends in @deva[आ] not @deva[ऊङ्], and is followed by @deva[भार्या] (feminine, appositional, not an ordinal or @deva[प्रियादि]); hence it becomes @deva[दर्शनीय]. Similarly @deva[श्लक्ष्णचूडः], @deva[दीर्घजङ्घः]. Condition checks: (1) The first word must be feminine — @deva[ग्रामणिदृष्टिः] shows no change because @deva[ग्रामणि] is not feminine. (2) It must have a corresponding masculine — @deva[खट्वाभार्यः] retains the feminine because @deva[खट्वा] has no masculine counterpart. (3) The correspondence must be in form and connotation — @deva[द्रोणीभार्यः] shows no change because @deva[द्रोण] differs in meaning from @deva[द्रोणी]. The forms @deva[गर्भिभार्यः], @deva[प्रसूतभार्यः], and @deva[प्रजातभार्यः] are anomalous. (4) The word must not end in @deva[ऊङ्] — @deva[ब्रह्मबन्धूभार्यः] retains the feminine. (5) The second member must be @deva[समानाधिकरण] — @deva[कल्याण्यामाता] = @deva[कल्याणीमाता] ('mother of Kalyani') shows no change because the relation is genitive, not appositional. (6) The second member must be feminine — @deva[कल्याणीप्रधानाः] retains the feminine because @deva[प्रधान] is neuter. (7) The second member must not be an ordinal — @deva[कल्याणीपञ्चमारात्रयः] and @deva[कल्याणीदशमाः] show no change. The ordinal must be a principal ordinal, not a secondary derivative; therefore the rule does apply in @deva[कल्याणपञ्चमीकः] @deva[पक्षः]. The @[samāsānta] affix @deva[अप्] (@ref[5.4.116]) likewise applies only to principal ordinals, so the above compound does not take @deva[अप्]. (8) The second member must not be @deva[प्रियादि] — @deva[कल्याणीप्रियः] shows no change. The @deva[प्रियादि] list: @deva[प्रिया], @deva[मनोज्ञा], @deva[कल्याणी], @deva[सुभगा], @deva[दुर्भगा], @deva[भक्ति], @deva[सचिवा], @deva[स्वा] (@deva[स्वसा]), @deva[कान्ता], @deva[क्षान्ता], @deva[समा], @deva[चपला], @deva[दुहिता], @deva[वामना] (@deva[वामा]), @deva[तनया], @deva[अम्बा]. The compound @deva[दृढभक्तिः] is anomalous.
"""

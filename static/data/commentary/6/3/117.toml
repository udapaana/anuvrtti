id = "6.3.117"
numericId = "63117"

[en]
simple = """
Words in the @deva[कोटर] class have their final vowel lengthened before @deva[वन] in compound names. Similarly, words in the @deva[किंशुलक] class lengthen before @deva[गिरि] in names. Example: @deva[कोटरावणम्] (a forest name).
"""

standard = """
The final vowel of @deva[कोटर]-class words is lengthened before @deva[वन], and of @deva[किंशुलक]-class words before @deva[गिरि], when the compound is a proper name. Thus @deva[कोटरावणम्], @deva[मिश्रकावणम्], @deva[किंशुलकागिरिः], @deva[अञ्जनागिरिः]. The internal @deva[न] → @deva[ण] applies by @ref[8.4.3].
"""

advanced = """
The final vowel of @deva[कोटर]-class words is lengthened before @deva[वन], and that of @deva[किंशुलक]-class words before @deva[गिरि], when the compound is a proper name. Examples: @deva[कोटरावणम्], @deva[मिश्रकावणम्], @deva[सिध्रकावणम्], @deva[सारिकावणम्]; @deva[किंशुलकागिरिः], @deva[अञ्जनागिरिः]. The @deva[न] of @deva[वन] becomes @deva[ण] by @ref[8.4.4]. Words not in these classes remain unaffected: @deva[असिपत्रवनम्], @deva[कृष्णगिरि]. The @deva[कोटर]-class: 1 @deva[कोटर], 2 @deva[मिश्रक], 3 @deva[सिध्रक], 4 @deva[पुरग] (@deva[पुरक]), 5 @deva[शारिक] (@deva[सारिक]). The @deva[किंशुलक]-class: 1 @deva[किंशुलुक] (@deva[किंशुलक]), 2 @deva[शाल्व] (@deva[साल्वक]), 3 @deva[नड], 4 @deva[अञ्जन], 5 @deva[मञ्जन], 6 @deva[लोहित], 7 @deva[कुक्कुट].
"""

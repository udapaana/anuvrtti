id = "6.3.73"
numericId = "63073"

[en]
simple = """
The @deva[न्] of the negative prefix @deva[नञ्] is deleted when it forms the first part of a compound, leaving only @deva[अ]. So @deva[नञ्] + @deva[ब्राह्मण] → @deva[अब्राह्मणः] (not a brahmin), and @deva[नञ्] + @deva[सुरा-पा] → @deva[असुरापः].
"""

standard = """
In @deva[नञ्-समास] (negative compounds), the initial particle @deva[नञ्] loses its @deva[न्], leaving only the vowel @deva[अ] as the negative prefix. This accounts for forms like @deva[अब्राह्मणः], @deva[अवृषलः], and @deva[असुरापः]. A @[vārttika] extends the elision to a censure context where @deva[नञ्] precedes a finite verb: @deva[अपचसि] @deva[त्वं] @deva[जाल्मः] ('you cook, O wretch!' — the @deva[न्] elision signals ironic negation).
"""

advanced = """
The @deva[न्] of @deva[नञ्] undergoes elision when @deva[नञ्] is the first member of a compound, leaving only the vowel @deva[अ]: @deva[अब्राह्मणः], @deva[अवृषलः], @deva[असुरापः], @deva[असोमपः]. A @[vārttika] extends this elision to pre-verbal position when reproach is intended: @deva[अपचसि] @deva[त्वं] @deva[जाल्मः], @deva[अकरोषि] @deva[त्वं] @deva[जाल्मः].
"""

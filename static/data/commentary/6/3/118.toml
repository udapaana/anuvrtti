id = "6.3.118"
numericId = "63118"

[en]
simple = """
Before the suffix @deva[वल] (denoting proficiency), the final vowel of the preceding word is lengthened. The words @deva[उत्साह], @deva[भ्रातृ], and @deva[पितृ] are explicitly excluded. Example: @deva[कृषीवलः] (farmer).
"""

standard = """
The final vowel is lengthened before @deva[वल] (affix taught at @ref[5.2.112]). Thus @deva[आसुतीवलः] (distiller), @deva[कृषीवलः] 'farmer', @deva[दन्तावलः] 'elephant'. A @[vārttika] excludes @deva[उत्साह], @deva[भ्रातृ], and @deva[पितृ]: @deva[उत्साहवलः], @deva[भ्रातृवलः], @deva[पितृवलः] do not lengthen.
"""

advanced = """
The final vowel of the preceding word is lengthened before the affix @deva[वल]: @deva[आसुतीवलः], @deva[कृषीवलः], @deva[दन्तावलः]. These are formed by @deva[वलच्] (@ref[5.2.112]). A @[vārttika] excludes @deva[उत्साह], @deva[भ्रातृ], and @deva[पितृ]: @deva[उत्साहवलः], @deva[भ्रातृवलः], @deva[पितृवलः] (no lengthening).
"""

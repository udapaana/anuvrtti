id = "6.3.80"
numericId = "63080"

[en]
simple = """
@deva[सह] becomes @deva[स] when the compound refers to a secondary, co-present item that is not the main object. For example, @deva[सचक्रम्] @deva[रथम्] @deva[ददाति] means 'gives a chariot along with its wheel' — the wheel is secondary but co-present.
"""

standard = """
In compounds where the second member denotes an incidentally co-present element (the 'non-obvious' secondary thing, @deva[द्वितीया]), @deva[सह] is replaced by @deva[स]. The paradigm example @deva[सचक्रम्] @deva[रथम्] @deva[ददाति] shows that the wheel (@deva[चक्र]) is secondary to the chariot (@deva[रथ]), which is the primary gift. This use of @deva[स] marks the co-present-but-non-principal participant, distinguishing it from the main referent of the action.
"""

advanced = """
@deva[स] replaces @deva[सह] when the second member refers to a non-principal co-existing object that is not directly perceived (@deva[अनुपाख्य]) but inferred. Of two things generally found together, the non-principal is called @deva[द्वितीया]; the perceived element is @deva[उपाख्य], and the inferred element is @deva[अनुपाख्य]. When the second object's existence is inferred from the first, @deva[स] attaches to that second word: @deva[साग्निः] @deva[कपोतः] — 'a pigeon indicating that a fire has occurred somewhere'; @deva[सपिशाचा] @deva[वात्या] — 'a storm-wind signaling the presence of @[piśācas]'; @deva[सराक्षसीका] @deva[शाला]. In each case, the fire, the @[piśāca], or the @[rākṣasa] is not directly perceived but inferred from the presence of the pigeon or storm.
"""

id = "6.3.37"
numericId = "63037"

[en]
simple = """
If a feminine word has a @deva[क] sound just before its final vowel — typically from certain suffixes — it does not change to masculine. So @deva[पाचिका] (female cook) stays @deva[पाचिका] in the compound @deva[पाचिकाभार्यः].
"""

standard = """
A feminine whose penultimate sound is @deva[क्] — arising from the @[kṛt] affix @deva[वु] or from a @[taddhita] — is exempt from the masculine substitution rule. Thus @deva[पाचिकाभार्यः] 'he whose wife is a cook', @deva[मद्रिकाभार्यः], and @deva[मद्रिकाकल्पा] all retain the feminine form. This blocks the operation of @ref[6.3.34].
"""

advanced = """
A feminine with penultimate @deva[क्] does not undergo masculine substitution: @deva[पाचिकाभार्यः], @deva[कारिकाभार्यः], @deva[वृजिकाभार्यः], @deva[मद्रिकाभार्यः], @deva[मद्रिकाकल्पा], @deva[मद्रिकायते], @deva[वृजिकायते], @deva[मद्रिकामानिनी], @deva[वृजिकामानिनी], @deva[वैलेपिकं] (@deva[वैलेपिकाया] @deva[धर्म्यं]). This exception applies against all preceding rules @ref[6.3.34]–@ref[6.3.36], not only @ref[6.3.34]. A @[vārttika] restricts the scope: only the @deva[क] of affix @deva[वु] and of @[taddhita] affixes blocks masculinization, not every @deva[क]. Masculine substitution therefore proceeds in @deva[पाकभार्यः] and @deva[भेकभार्यः], where @deva[पाका] means 'young' and @deva[भेकी] means 'action'.
"""

id = "6.3.78"
numericId = "63078"

[en]
simple = """
@deva[सह] (together with) is shortened to @deva[स] when it is the first member of a compound that is a proper name. So place-names like @deva[साश्वत्थम्] (with an @[aśvattha] tree) and @deva[सपलाशम्] retain the @deva[स] form, while non-names like @deva[सहयुध्वा] keep the full @deva[सह].
"""

standard = """
In @deva[संज्ञा] (proper-name) compounds, @deva[सह] is replaced by @deva[स]. This substitution is limited to names: @deva[साश्वत्थम्], @deva[सपलाशम्], @deva[सशिंशपम्] are all place or tree names. Non-name compounds such as @deva[सहयुध्वा] (fighting together) and @deva[सहकृत्वा] retain the full @deva[सह]. The contrast makes proper-name status the exclusive conditioning environment for @deva[स]-substitution under this rule.
"""

advanced = """
@deva[स] replaces @deva[सह] when the compound is a @deva[संज्ञा] (proper name): @deva[साश्वत्थम्], @deva[सपलाशम्], @deva[सशिंशपम्]. In non-name compounds, the full @deva[सह] is retained: @deva[सहयुध्वा], @deva[सहकृत्वा]. Regarding accent: @deva[सह] has @deva[उदात्त] on the first syllable (all particles bearing initial acute). The substitute @deva[स], replacing both the acute @deva[स] and the grave @deva[ह], would be expected to carry @[svarita], yet it actually retains @deva[उदात्त]: @deva[स]@deva[꣡]@deva[पुत्रः], @deva[स]@deva[꣡]@deva[भार्यः] (these are @[bahuvrīhi] compounds). In @[avyayībhāva] compounds, the @deva[समास]-accent prevails per @ref[6.1.223]: @deva[सेष्टि]@deva[꣡], @deva[सपशुबन्ध]@deva[꣡]@deva[म्].
"""

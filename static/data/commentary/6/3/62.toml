id = "6.3.62"
numericId = "63062"

[en]
simple = """
The feminine word @deva[एका] (one, fem.) is shortened to @deva[एक] before @[taddhita] suffixes and before the second member of a compound. So @deva[एकत्वम्] means 'oneness' and @deva[एकक्षीरम्] means 'sharing one milk'.
"""

standard = """
The long @deva[आ] of feminine @deva[एका] is shortened before a @[taddhita] affix and before the second member in a compound. Thus @deva[एकरूप्यम्], @deva[एकमयम्] 'made of one', @deva[एकत्वम्] 'oneness', @deva[एकक्षीरम्] 'sharing one teat', @deva[एकदुग्धम्]. The rule applies only to the feminine @deva[एका] and not to the base form @deva[एक].
"""

advanced = """
The long @deva[आ] of feminine @deva[एका] is shortened before a @deva[तद्धित] affix and before a second compound member: @deva[एकस्या] @deva[आगतं] = @deva[एकरूप्यम्], @deva[एकमयम्]; @deva[एकस्या] @deva[भावः] = @deva[एकत्वम्], @deva[एकता]; @deva[एकस्याः] @deva[क्षीरं] = @deva[एकक्षीरम्], @deva[एकदुग्धम्]. The shortening targets specifically the feminine @deva[एका] bearing the affix @deva[आ]. When @deva[एक] functions as an adjective (@deva[गुणवचन]) meaning the numeral 'one', the same forms could be derived through masculinization rules like @ref[6.3.35]; but when it means 'alone', those rules do not apply, making this @[sūtra] necessary. The word @deva[एक] appears in the @[sūtra] without a case-affix — a @[chandas] irregularity. The examples involve feminine @deva[एका], whose final can be shortened; the base @deva[एक] already has a short final, and the shortening cannot target @deva[ए] since the rule operates on the final vowel, not a vowel internal to the word.
"""

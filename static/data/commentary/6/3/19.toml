id = "6.3.19"
numericId = "63019"

[en]
simple = """
This rule restricts the optional locative retention: even where a preceding rule would allow keeping the locative ending, it must be dropped before words ending in @deva[इन्], before @deva[सिद्ध], and before derivatives of @deva[बन्ध]. So @deva[स्थण्डिलशायिन्] has no locative ending on @deva[स्थण्डिल].
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is not preserved before @deva[इन्]-final stems, before @deva[सिद्ध], and before @deva[बन्ध]-derived forms. This rule operates as an exception or restriction on the optional retention allowed elsewhere. Examples: @deva[स्थण्डिलशायिन्] (not @deva[स्थण्डिलेशायिन्]), @deva[सांकाश्यसिद्धः], @deva[चक्रबन्धकः]. The rule blocks retention that would otherwise be possible.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is not preserved before a stem ending in @deva[इन्], before @deva[सिद्ध], and before a word derived from @deva[बन्ध्]: @deva[स्थण्डिलशायिन्], @deva[सांकाश्यसिद्धः], @deva[काम्पिल्यसिद्धः], @deva[चक्रबन्धकः], @deva[चरकबन्धकः]. Compounding is by @[yoga]-@[vibhāga] of @ref[2.1.40]. Some cite @deva[चक्रबन्धः] as an illustration, with @deva[बन्ध] derived by @deva[अच्] of @ref[3.1.134]. The @deva[बन्ध] formed with @deva[घञ्] falls under @ref[6.3.13] instead. This @[sūtra] is an exception to @ref[6.3.14].
"""

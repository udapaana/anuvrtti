id = "6.3.94"
numericId = "63094"

[en]
simple = """
If the word '@deva[तिरस्]' is followed by a @deva[लुप्तप्रत्ययान्त-अञ्च्] word from which an @deva[अकार] has not been removed, then the word '@deva[तिरस्]' is converted to '@deva[तिरि]'.
"""

standard = """
@deva[तिरस्] → @deva[तिरि] before @deva[अञ्च्] (with @deva[व]) when @deva[अ] not elided. @deva[तिर्यङ्], @deva[तिर्यञ्चः]. But: @deva[तिरश्चा].
"""

advanced = """
@deva[तिरि] replaces @deva[तिरस्] before @deva[अञ्च्] with the @deva[क्विन्] affix (@deva[व]-affix), provided the @deva[अ] of @deva[अञ्च्] is not elided: @deva[तिर्यङ्], @deva[तिर्यञ्चौ], @deva[तिर्यञ्चः]. When @deva[अ] is elided (by @ref[6.4.138]), the substitution does not apply: @deva[तिरश्चा], @deva[तिरश्चे]. The term @deva[अलोपे] in the @[sūtra] is ambiguous — it can mean either 'where @deva[अ] is elided' or 'where there is no elision'. The latter interpretation is correct.
"""

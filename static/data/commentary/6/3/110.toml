id = "6.3.110"
numericId = "63110"

[en]
simple = """
When the word @deva[अह्न] appears as an @deva[उत्तरपद] in a @deva[समास] where the @deva[पूर्वपद] is either a number, or the words @deva[वि] or @deva[साय], it is optionally converted to @deva[अहन्] in presence of the @deva[प्रत्यय] @deva[ङि].
"""

standard = """
@deva[अहन्] optionally for @deva[अह्न] in locative singular after numeral/@deva[वि]/@deva[साय]. @deva[द्व्यह्नि] or @deva[द्व्यहनि].
"""

advanced = """
@deva[अहन्] optionally substitutes for @deva[अह्न] in the locative singular when preceded by a numeral, @deva[वि], or @deva[साय]. From @deva[द्वयोरह्नोर्भवः] = @deva[द्व्यह्नः], @deva[त्र्यह्नः]. The locative singular forms are @deva[द्व्यह्नि] or @deva[द्व्यहनि], @deva[त्र्यह्नि] or @deva[त्र्यहनि]; also @deva[द्व्यह्ने], @deva[त्र्यह्ने]. With @deva[वि]: @deva[व्यह्नि], @deva[व्यहनि], or @deva[व्यह्ने]. With @deva[साय]: @deva[सायाह्नि], @deva[सायाहनि], @deva[सायाह्ने]. These are @deva[एकदेशिसमास] compounds. The @[sūtra] itself serves as an indicator (@[jñāpaka]) that @deva[अहन्] may compound with words beyond numerals, @deva[वि], and @deva[साय] — yielding @deva[मध्याह्ने] = @deva[मध्यमह्नः] by @ref[2.2.1]. However, @deva[पूर्वाह्णे] and @deva[अपराह्णे] admit only the single form.
"""

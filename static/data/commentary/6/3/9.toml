id = "6.3.9"
numericId = "63009"

[en]
simple = """
In a proper name compound, the locative ending (@deva[-इ], @deva[-ए], meaning 'in' or 'at') is kept when the first member ends in a consonant or a short @deva[अ]. So @deva[युधिष्ठिरः] keeps the locative @deva[-इ] of @deva[युधि] ('in battle') rather than dropping it.
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is not elided after a stem ending in a consonant or short @deva[अ] when the resulting compound is a proper @[samjñā] (name). Examples: @deva[युधिष्ठिरः] ('firm in battle'), @deva[गविष्ठिरः], @deva[अरण्येतिलकाः]. A @[vārttika] adds @deva[हृदिस्पृक्] ('touching the heart') and @deva[दिविस्पृक्] ('touching the sky') to this class.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is not elided after a stem ending in a consonant or short @deva[अ] when the compound is a @[samjñā] (proper name): @deva[युधिष्ठिरः], @deva[त्वचिसारः], @deva[गविष्ठिरः]. Although @deva[गो] does not end in a consonant, it retains the locative ending, as @ref[8.3.95] (@deva[गवियुधिभ्यां] @deva[स्थिरः]) implies that @deva[गवि] falls under this rule. Similarly for @deva[अ]-final stems: @deva[अरण्येतिलकाः], @deva[अरण्येमाषकाः], @deva[वनेकिंशुकाः], @deva[वनेहरिद्रकाः], @deva[वनेबल्बजकाः], @deva[पूर्वाह्णेस्फोटकाः], @deva[कूपेपिशाचकाः]. The consonant-or-@deva[अ] condition is operative: @deva[नद्यां] @deva[कुक्कुटिका] = @deva[नदीकुक्कुटिका] and @deva[भूम्यां] @deva[पाशाः] = @deva[भूमिपाशाः] show no retention, since these stems end in other vowels. The @[samjñā] condition is also required: @deva[अक्षशौण्डः] shows normal elision in a non-name compound. A @[vārttika] extends retention to @deva[हृद्] and @deva[दिव्]: @deva[हृदिस्पृक्], @deva[दिविस्पृकः].
"""

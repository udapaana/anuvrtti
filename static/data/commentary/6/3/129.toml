id = "6.3.129"
numericId = "63129"

[en]
simple = """
When @deva[विश्व] compounds with @deva[नर] to form a proper name, the final vowel of @deva[विश्व] is lengthened. For example, the proper name @deva[विश्वानरः] uses the long @deva[आ], while the common word @deva[विश्वनरः] (meaning 'every man') keeps the short vowel.
"""

standard = """
This rule lengthens the final vowel of @deva[विश्व] before @deva[नर] specifically when the compound denotes a @[proper name]. The distinction is semantic: @deva[विश्वानरः] (a Name, with lengthened @deva[आ]) versus @deva[विश्वनरः] (a common compound meaning 'all men', short vowel). The rule thus applies context-sensitively, not mechanically. See @ref[6.3.129].
"""

advanced = """
The final vowel of @deva[विश्व] is lengthened before @deva[नर] when the compound is a proper name: @deva[विश्वानरः], with the patronymic @deva[वैश्वानरिः]. When the compound is not a name (@deva[विश्वे] @deva[नरा] @deva[यस्य]), the short vowel is retained: @deva[विश्वनरः].
"""

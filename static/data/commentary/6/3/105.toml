id = "6.3.105"
numericId = "63105"

[en]
simple = """
The prefix @deva[कु] is replaced by @deva[का] when the meaning is 'slightly' or 'inferior in degree'. This sense of mild diminishment triggers this special form. Example: @deva[कोष्णम्] (lukewarm — slightly hot).
"""

standard = """
@deva[का] substitutes for @deva[कु] when the sense expressed is 'slightly' or 'a little' (@deva[ईषत्]). Thus @deva[कामधुरम्] 'slightly burdened', @deva[कालवणम्] 'slightly salty', @deva[कोष्णम्] 'lukewarm'. Note that this @deva[का]-substitution applies even before vowel-initial words, superseding the @deva[कत्]-rule of @ref[6.3.101].
"""

advanced = """
@deva[का] replaces @deva[कु] when the meaning is 'slightly' (@deva[ईषत्]): @deva[कामधुरम्], @deva[कालवणम्], @deva[काम्लम्]. This substitution applies even when the second member begins with a vowel, overriding @ref[6.3.101]: @deva[कोष्णम्].
"""

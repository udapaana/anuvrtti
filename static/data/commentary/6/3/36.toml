id = "6.3.36"
numericId = "63036"

[en]
simple = """
A feminine word takes its masculine form before the denominative suffix @deva[क्यङ्] and the suffix @deva[मानिन्]. So @deva[एनी] (female deer) gives @deva[एतायते], and @deva[दर्शनीया] with @deva[मानिन्] gives @deva[दर्शनीयमानिनी] 'she who thinks herself beautiful'.
"""

standard = """
A feminine not ending in @deva[ऊङ्] with an equivalent masculine becomes masculine before the denominative @[kṛt] suffix @deva[क्यङ्] and before @deva[मानिन्]. Thus @deva[एनी] → @deva[एतायते] (she acts like a female deer), and @deva[दर्शनीया] + @deva[मानिन्] → @deva[दर्शनीयमानिनी]. The masculine base is used even though the overall word remains feminine.
"""

advanced = """
A feminine not ending in @deva[ऊङ्] that has an equivalent and uniform masculine takes the masculine form before the denominative @deva[क्यङ्] and the affix @deva[मानिन्]. From @deva[एनी]: @deva[एतायते]; from @deva[श्येनी]: @deva[श्येतायते]. Before @deva[मानिन्]: @deva[दर्शनीयमानी] @deva[अयमस्याः] 'he esteems her as handsome'; @deva[दर्शनीयमानिनी] @deva[इयम्] @deva[अस्याः] 'she esteems her as handsome'. The word @deva[मानिन्] is specified separately to cover non-feminine and non-appositional uses. Non-feminine: @deva[दर्शनीयां] @deva[मन्यते] @deva[देवदत्तो] @deva[यज्ञदत्तां] → @deva[दर्शनीयमानी] @deva[अयमस्याः]. Non-appositional: @deva[दर्शनीयां] @deva[मन्यते] @deva[देवदत्तां] @deva[यज्ञदत्ता] → @deva[दर्शनीयमानिनी] @deva[इयमस्याः].
"""

id = "6.3.53"
numericId = "63053"

[en]
simple = """
@deva[पाद] becomes @deva[पद्] before the suffix @deva[यत्] unless the meaning is 'suited for the foot'. So @deva[पद्याः] @deva[शर्कराः] means 'gravel on a footpath', but @deva[पाद्यम्] means 'water for washing feet'.
"""

standard = """
@deva[पद्] replaces @deva[पाद] before affix @deva[यत्] in all senses except 'suitable for the foot'. Thus @deva[पद्याः] @deva[शर्कराः] 'gravel trodden by feet'. But when @deva[यत्] conveys 'suited for', @deva[पाद] is retained: @deva[पाद्यम्] 'water offered for foot-washing'. See also @ref[4.4.83] for the semantic distinction.
"""

advanced = """
@deva[पद्] replaces @deva[पाद] before the affix @deva[यत्] in all senses except 'suited thereto': @deva[पादौविध्यन्ति] = @deva[पद्याः] @deva[शर्कराः], @deva[पद्याः] @deva[कण्टकाः]. When @deva[यत्] conveys 'suited thereto', @deva[पाद] is retained: @deva[पाद्यम्] = @deva[पादार्थमुदकं] (see @ref[4.4.83] and @ref[5.4.25]). @[vārttika]: before the affix @deva[इक्] in the sense 'walks thereby', @deva[पद] replaces @deva[पाद] — @deva[पादाभ्यां] @deva[चरति] = @deva[पदिकः] @ref[4.4.10] by @deva[ष्ठन्] affix. The word @deva[पाद] in this @[sūtra] refers to the actual anatomical foot; @deva[पद्] is therefore not substituted before the @deva[यत्] of @ref[5.1.34] in @deva[द्विपाद्यम्] or @deva[त्रिपाद्यम्], where @deva[पाद] denotes a measure.
"""

id = "6.3.131"
numericId = "63131"

[en]
simple = """
In a @deva[मन्त्र] (Vedic hymn), the final vowels of the words @deva[सोम], @deva[अश्व], @deva[इन्द्रिय], and @deva[विश्वदेव्य] are lengthened before the suffix @deva[मतुप्]. For example, @deva[सोमावती] ('possessing soma') and @deva[अश्वावती] ('possessing horses').
"""

standard = """
This rule applies exclusively within @deva[मन्त्र] context: the stem-final vowels of @deva[सोम], @deva[अश्व], @deva[इन्द्रिय], and @deva[विश्वदेव्य] lengthen before the possessive suffix @deva[मतुप्]. This gives @deva[सोमावती], @deva[अश्वावती], @deva[इन्द्रियावती], @deva[विश्वदेव्यावती]. Outside the @deva[मन्त्र], these words would take the short vowel before @deva[मतुप्]. See @ref[6.3.131].
"""

advanced = """
In @deva[मन्त्र] context, the final vowels of @deva[सोम], @deva[अश्व], @deva[इन्द्रिय], and @deva[विश्वदेव्य] are lengthened before @deva[मतुप्]: @deva[सोमावती], @deva[अश्वावती], @deva[इन्द्रियावती], @deva[विश्वदेव्यावती].
"""

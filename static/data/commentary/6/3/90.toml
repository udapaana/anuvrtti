id = "6.3.90"
numericId = "63090"

[en]
simple = """
Before @deva[दृग्], @deva[दृश], and @deva[वत्], the demonstrative @deva[इदम्] is replaced by @deva[ई] and the interrogative @deva[किम्] by @deva[की]. This gives @deva[ईदृक्] (like this), @deva[ईदृशः], @deva[कीदृक्] (what kind?), @deva[कीदृशः].
"""

standard = """
The pronouns @deva[इदम्] and @deva[किम्] have special substitutes @deva[ई] and @deva[की] respectively, used specifically before @deva[दृग्], @deva[दृश], and @deva[वत्]. @deva[ई] + @deva[दृग्] → @deva[ईदृक्] 'like this'; @deva[की] + @deva[दृग्] → @deva[कीदृक्] 'of what sort?'. The @deva[वत्]-forms generate @deva[इयान्] (so great, from @deva[ई]) and @deva[कियान्] (how great, from @deva[की]). These are part of the paradigmatic demonstrative-interrogative comparison vocabulary of Sanskrit.
"""

advanced = """
@deva[ई] replaces @deva[इदम्] and @deva[की] replaces @deva[किम्] before @deva[दृग्], @deva[दृश], and the affix @deva[वत्]: @deva[ईदृक्], @deva[ईदृशः], @deva[इयान्]; @deva[कीदृक्], @deva[कीदृशः], @deva[कियान्]. The @deva[वत्]-derivatives proceed as follows: @deva[ईवत्] and @deva[कीवत्] become @deva[ई] + @deva[इयत्] and @deva[की] + @deva[इयत्] by @ref[5.2.40], then the long @deva[ई] is elided by @ref[6.4.148], yielding @deva[इयत्] and @deva[कियत्]. A @[vārttika] extends the rule to @deva[दृक्ष]: @deva[ईदृक्षः] and @deva[कीदृक्षः].
"""

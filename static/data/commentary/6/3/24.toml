id = "6.3.24"
numericId = "63024"

[en]
simple = """
When an @deva[ऋ]-ending word is the first member of a compound and the second member is @deva[स्वसृ] ('sister') or @deva[पितृ] ('father'), the genitive ending may optionally be kept or dropped. So @deva[मातुःस्वसा] ('mother's sister = maternal aunt') and @deva[मातृष्वसा] are both correct.
"""

standard = """
The @deva[षष्ठी] (genitive) case-affix after an @deva[ऋ]-final stem is optionally elided before @deva[स्वसृ] and @deva[पितृ], closing the @[adhikāra] begun at @ref[6.3.1]. This gives doublets: @deva[मातुःस्वसा] ~ @deva[मातृष्वसा], @deva[पितुःस्वसा] ~ @deva[पितृष्वसा]. When the genitive is elided and @deva[स्वसृ] follows, @deva[स] → @deva[ष] by @ref[8.3.85]. This @[sūtra] is the scope-closer for the entire @deva[अलुक्] section.
"""

advanced = """
The @deva[षष्ठी] (genitive) case-affix is optionally elided after an @deva[ऋ]-final stem when @deva[स्वसृ] or @deva[पितृ] follows: @deva[मातुःस्वसा] or @deva[मातुःष्वसा] or @deva[मातृष्वसा]; @deva[पितुःस्वसा] or @deva[पितुःष्वसा] or @deva[पितृष्वसा]. When the affix is elided, @deva[स] is invariably changed to @deva[ष] by @ref[8.3.85]; when the affix is retained, the @deva[ष]-change is optional. Similarly: @deva[दुहितुः] @deva[पतिः] or @deva[दुहितृपतिः], @deva[ननान्दुः] @deva[पतिः] or @deva[ननान्दृपतिः].
"""

id = "6.3.137"
numericId = "63137"

[en]
simple = """
Beyond the specific rules listed, lengthening of a final vowel is also found in other words based on the usage of educated speakers (@deva[शिष्ट]). Examples from literature include @deva[केशाकेशि] ('seizing each other by the hair') and @deva[जलासाद्].
"""

standard = """
This rule functions as a residual category: where no prior @[sūtra] mandates lengthening, one may still lengthen the final based on @[śiṣṭa] usage — the speech of learned and authoritative users. Examples like @deva[केशाकेशि] and @deva[जलासाद्] are not derivable from earlier rules. A @[vārttika] additionally notes that @deva[श्वन्] lengthens before @deva[दन्त] etc. to yield @deva[श्वादन्त]. See @ref[6.3.137].
"""

advanced = """
Lengthening of the final vowel is found in additional words beyond the scope of the preceding rules, validated by @[śiṣṭa] usage. Where no grammatical rule ordains the lengthening but standard authors employ it, it is accepted as valid: @deva[केशाकेशि], @deva[कचाकचि], @deva[जलासाद्], @deva[नारकः], @deva[पूरुषः]. Vart: The final of @deva[श्वन्] is lengthened before @deva[दन्त], @deva[दष्ट्रा], @deva[कर्ण], @deva[कुन्द], @deva[वराह], @deva[पुच्छ], and @deva[पद]: @deva[श्वादन्तः], @deva[श्वादंष्ट्रः], @deva[श्वाकर्णः], @deva[श्वाकुन्दः], @deva[श्वावराहः], @deva[श्वापुच्छः], @deva[श्वापदः].
"""

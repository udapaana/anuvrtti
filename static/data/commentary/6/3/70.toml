id = "6.3.70"
numericId = "63070"

[en]
simple = """
The augment @deva[मुम्] is inserted after @deva[सत्य] (truth) and @deva[अगद] (medicine) when @deva[कार] follows, giving @deva[सत्यंकारः] (one who acts truly) and @deva[अगदंकारः] (medicine-maker). A @[vārttika] extends this to @deva[अस्तुंकारः] and, in Vedic, to @deva[भक्षंकार].
"""

standard = """
Before @deva[कार], the @[āgama] @deva[मुम्] is specifically inserted after @deva[सत्य] and @deva[अगद], yielding @deva[सत्यंकारः] and @deva[अगदंकारः]. A supplementary @[vārttika] extends @deva[मुम्]-insertion to @deva[अस्तु] before @deva[कार], giving @deva[अस्तुंकारः]. Another @[vārttika] adds @deva[भक्ष] before @deva[कार] in @deva[छन्दस्]: @deva[भक्षंकार]. These are lexically fixed additions to the general @deva[मुम्] rule.
"""

advanced = """
The augment @deva[मुम्] is inserted after @deva[सत्य] and @deva[अगद] when @deva[कार] follows: @deva[सत्यंकारः] (@deva[सत्यंकरोति] or @deva[सत्यस्य] @deva[कारः]); @deva[अगदंकारः]. @[vārttika]: @deva[मुम्] likewise applies to @deva[अस्तु] before @deva[कार] — @deva[अस्तुंकारः]. @[vārttika]: in Vedic, @deva[भक्ष] before @deva[कार] takes @deva[मुम्] — @deva[भक्षंकार]; in secular language, @deva[भक्षकारः]. @[vārttika]: @deva[धेनु] before @deva[भव्या] — @deva[धेनुंभव्या]. @[vārttika]: @deva[लोक] before @deva[पृण] — @deva[लोकंपृणा]. @[vārttika]: @deva[अनभ्याश] before @deva[इत्य] — @deva[अनभ्याशमित्यः]. @[vārttika]: @deva[भ्राष्ट्र] and @deva[अग्नि] before @deva[इन्धः] — @deva[भ्राष्ट्रामिन्धः], @deva[अग्निमिन्धः]. @[vārttika]: a word before @deva[गिल] takes @deva[मुम्] unless it is itself @deva[गिल] — @deva[तिमिङ्गिलः] but @deva[गिलगिलः]; before @deva[गिलगिल] too — @deva[तिमिङ्गिलगिलः]. @[vārttika]: @deva[उष्ण] and @deva[भद्र] before @deva[करण] — @deva[उष्णं] @deva[करणं], @deva[भद्रंकरणं]. @[vārttika]: @deva[पुत्रड्] optionally replaces @deva[दुहितृ] after @deva[सूत], @deva[उग्र], @deva[राज], @deva[भोज], and @deva[मेरु] — @deva[सूतपुत्री] or @deva[सूतदुहिता], @deva[उग्रपुत्री] or @deva[उग्रदुहिता], @deva[राजपुत्री] or @deva[राजदुहिता], @deva[भोजपुत्री] or @deva[भोजदुहिता], @deva[मेरुपुत्री] or @deva[मेरुदुहिता]. Some read @deva[पुत्र] in the @[śārṅgaravādi] class @ref[4.1.73], yielding feminine @deva[पुत्री] directly; this is attested elsewhere as well, as in @deva[शैलपुत्री].
"""

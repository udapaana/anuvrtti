id = "6.3.72"
numericId = "63072"

[en]
simple = """
@deva[रात्रि] (night) optionally takes @deva[मुम्] augment before @deva[कृत्]-derived words, giving @deva[रात्रिचरः] or @deva[रात्रिंचरः] (night-wanderer). However, before @deva[खित्]-affix words, the augment is obligatory: only @deva[रात्रिंमन्यः] is correct.
"""

standard = """
Before @deva[कृत्]-derived words, @deva[रात्रि] optionally receives the @[āgama] @deva[मुम्]: @deva[रात्रिचरः] ~ @deva[रात्रिंचरः], @deva[रात्रिमटः] ~ @deva[रात्र्यटः] (the latter by regular @deva[यण्]-sandhi). But before @deva[खित्]-affix compounds, the augment is mandatory by the general rule, so only @deva[रात्रिंमन्यः] is formed. This rule carves out an optional domain specifically for @deva[कृत्]-derived following words.
"""

advanced = """
The word @deva[रात्रि] optionally takes @deva[मुम्] augment before a word formed by @deva[कृत्] affix. As @deva[रात्रिचरः] or @deva[रात्रिंचरः], @deva[रात्रिमटः] or @deva[रात्र्यटः] @deva[॥] This is an @[aprapta]-@[vibhasha]. The augment is compulsory before a @[krit]-affix having an indicatory @deva[ख], As, @deva[रात्रिंमन्यः] @deva[॥]
"""

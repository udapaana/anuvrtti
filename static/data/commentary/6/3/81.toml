id = "6.3.81"
numericId = "63081"

[en]
simple = """
@deva[सह] becomes @deva[स] in an @deva[अव्ययीभाव] compound when the second member is not a time word. So @deva[सचक्रंधेहि] is correct, but @deva[सहपूर्वाह्णम्] (with time-word @deva[पूर्वाह्ण]) keeps the full @deva[सह].
"""

standard = """
In @deva[अव्ययीभाव] compounds, @deva[सह] → @deva[स] unless the second member is a @deva[कालशब्द] (time-denoting word). So @deva[सचक्रंधेहि] and @deva[मधुरं] @deva[प्राजः] use @deva[स], while @deva[सहपूर्वाह्णम्] (around the forenoon) retains @deva[सह] because @deva[पूर्वाह्ण] is a time-word. The relevant @deva[अव्ययीभाव] formation rule is @ref[2.1.5]. This time-word exception prevents the substitution that would otherwise apply.
"""

advanced = """
@deva[स] replaces @deva[सह] in an @deva[अव्ययीभाव] @deva[समास] provided the second member is not a time-denoting word: @deva[सचक्रंधेहि], @deva[मधुरं] @deva[प्राजः]. Before a @deva[कालशब्द], the full form is retained: @deva[सहपूर्वाह्णम्] — the second member @deva[पूर्वाह्ण] being a time-word (see @ref[2.1.5]).
"""

id = "6.3.58"
numericId = "63058"

[en]
simple = """
@deva[उदक] (water) is shortened to @deva[उद] before specific words like @deva[पेषं], @deva[वास], @deva[वाह], and @deva[धि]. So @deva[उदधिः] means 'ocean' (literally, that which holds water).
"""

standard = """
@deva[उद] is substituted for @deva[उदक] before @deva[पेषं], @deva[वास], @deva[वाह], and @deva[धि]. Thus @deva[उदपेषम्] 'grinding with water', @deva[उदवासः] 'watery residence', and @deva[उदधिः] 'ocean or water-jar' (from @deva[उदकं] @deva[धीयतेऽस्मिन्] 'water is held in it').
"""

advanced = """
@deva[उद] replaces @deva[उदक] before @deva[पेषं], @deva[वास], @deva[वाह], and @deva[धि]: @deva[उदपेषं] @deva[पिनष्टि] (formed by @deva[णमुल्] per @ref[3.4.38]); @deva[उदवासः] (@deva[उदकस्य] @deva[वासः]); @deva[उदवाहनः]; and @deva[उदकं] @deva[धीयतेऽस्मिन्] = @deva[उदधिः] 'a water jar'.
"""

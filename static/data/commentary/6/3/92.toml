id = "6.3.92"
numericId = "63092"

[en]
simple = """
When @deva[अञ्च्] with the @deva[व]-affix follows, the final consonant of a pronoun, of @deva[विष्वक्], or of @deva[देव] is replaced by @deva[अद्रि]. The derivation of @deva[विष्वद्र्यङ्] (going everywhere) from @deva[विष्वक्] + @deva[अञ्च्] shows how this substitution works.
"""

standard = """
Before @deva[अञ्च्] compounded with the @deva[क्विन्] affix (@deva[व]-affix context), the final consonant of the first member — whether a pronoun, @deva[विष्वक्], or @deva[देव] — is replaced by @deva[अद्रि]. The example @deva[विष्वगञ्चति] → @deva[विष्वद्र्यङ्] ('going in all directions') involves the @deva[क्विन्] affix on @deva[अञ्च्], followed by @deva[ङ्]-substitution at the end. This rule handles the morphophonological adjustment needed for these direction-compound derivations.
"""

advanced = """
@deva[अद्रि] replaces the final consonant (and what follows it) of a pronoun, @deva[विष्वक्], or @deva[देव] when @deva[अञ्च्] with the @deva[क्विन्] affix (@deva[व]-affix) follows. The derivation of @deva[विष्वद्र्यङ्] proceeds: @deva[अञ्च] + @deva[क्विन्] = @deva[अञ्च्], then @deva[नुम्]-insertion (@ref[7.1.70]), elision of the final conjunct consonant, and conversion of the final dental to guttural by @ref[8.2.62] (@deva[न्] → @deva[ङ्]), yielding @deva[अङ्]. Combined with @deva[विष्वद्रि], this gives @deva[विष्वद्र्यङ्]. Other forms: @deva[देवद्र्यङ्], @deva[तद्र्यङ्], @deva[यद्र्यङ्]. The substitutes @deva[अद्रि] and @deva[सध्रि] (@ref[6.3.95]) carry irregular final acute (@[nipātana]) to prevent the @[kṛt]-accent; when @deva[इ] becomes @deva[य्], the following vowel takes @[svarita] by @ref[8.2.4]. The restriction to @deva[विष्वक्] and @deva[देव] is necessary — with other stems the substitution does not apply: @deva[अश्वाची] = @deva[अश्वमञ्चति], where the feminine @deva[ङीप्] is added by @ref[4.1.6] @[vārttika], @deva[अ] of @deva[अच्] is elided by @ref[6.4.138], and the final of @deva[अश्व] is lengthened by @ref[6.3.138]. The condition 'when @deva[अञ्च्] follows' excludes forms like @deva[विष्वग्युक्]; the condition 'with the @deva[व]-affix' excludes @deva[विष्वगञ्चनं] (where @deva[व] is totally elided by @ref[6.1.67]). An alternate reading @deva[अप्रत्यये] (@deva[अञ्चतावप्रत्यये]) yields the same result, meaning 'when no affix follows'. The specification @deva[वप्रत्यये] / @deva[अप्रत्यये] implies that elsewhere, when a root is mentioned, it includes derived forms beginning with that root — the maxim @deva[धातुग्रहणे] @deva[तदादि] @deva[विधिरिष्यते], illustrated in @deva[अयस्कृतं] and @deva[अयस्कारः] (where @ref[8.3.46] converts @[visarga] to @deva[स्] before @deva[कृ] and its derivatives). A @[vārttika] notes diverse Vedic application before feminines: in @deva[विश्वाची] @deva[व] @deva[घृताची] @deva[च], no substitution occurs in @deva[विश्वाची], but @deva[कद्रीची] does undergo it — derived from @deva[किम्] + @deva[अञ्च्] = @deva[कद्रि] + @deva[अञ्च्], then @deva[ङीप्] is added as in @deva[अश्वाची].
"""

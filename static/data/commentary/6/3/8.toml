id = "6.3.8"
numericId = "63008"

[en]
simple = """
Similarly to the previous rule, the dative ending on @deva[पर] ('other, another') is kept when the compound is a grammatical technical term. This gives @deva[परस्मैपदम्] — the verb endings used when the action benefits someone other than the subject.
"""

standard = """
The @deva[चतुर्थी] (dative) case-affix after @deva[पर] is not elided when the compound constitutes a grammatical @[samjñā]. Thus @deva[परस्मैपदम्] (the @[parasmaipada] verb class) and @deva[परस्मभाषा] retain the dative @deva[-स्मै]. This parallels @ref[6.3.7] for @deva[आत्मन्] and applies the same name-preservation principle to @deva[पर].
"""

advanced = """
The @deva[चतुर्थी] (dative) case-affix is not elided after @deva[पर] when the compound is a grammatical @[samjñā]: @deva[परस्मैपदम्], @deva[परस्मभाषा].
"""

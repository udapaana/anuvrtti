id = "6.3.91"
numericId = "63091"

[en]
simple = """
Before @deva[दृग्], @deva[दृश], and @deva[वत्], the final vowel of pronouns is lengthened to @deva[आ]. So @deva[तद्] → @deva[ता] → @deva[तादृक्] (such, like that), @deva[यद्] → @deva[या] → @deva[यादृक्] (as, like which). These are the relative and demonstrative comparison words.
"""

standard = """
For pronominal stems other than @deva[इदम्] and @deva[किम्], the final segment is replaced by @deva[आ] before @deva[दृग्], @deva[दृश], and @deva[वत्]. Thus @deva[तद्] → @deva[तादृक्] 'such' and @deva[यद्] → @deva[यादृक्] 'as'; the @deva[वत्]-forms produce @deva[तावान्] and @deva[यावान्] (so much / as much). A @[vārttika] extends the rule to @deva[दृक्षः]: @deva[तादृक्षः]. Together with @ref[6.3.90], this rule covers the full set of comparison-pronoun substitutions.
"""

advanced = """
@deva[आ] replaces the final segment of pronouns (@deva[सर्वादीनि] @deva[सर्वनामानि], @ref[1.1.27]) before @deva[दृग्], @deva[दृश], and the affix @deva[वत्]: @deva[तादृक्], @deva[तादृशः], @deva[तावान्]; @deva[यादृक्], @deva[यादृशः], @deva[यावान्]. A @[vārttika] extends the rule to @deva[दृक्ष]: @deva[तादृक्षः] and @deva[यादृक्षः].
"""

id = "6.3.122"
numericId = "63122"

[en]
simple = """
The final vowel of a prefix (@deva[उपसर्ग]) undergoes various lengthenings before words derived with @deva[घञ्], but not when the compound denotes a person. Example: @deva[नीक्लेदः] (dampness, from @deva[नि] + @deva[क्लेद]).
"""

standard = """
The final vowel of a @deva[उपसर्ग] is variously lengthened before @deva[घञ्]-derived nominals, provided the compound does not denote a person. Thus @deva[नीक्लेदः], @deva[वीमार्गः], @deva[अपामार्गः], @deva[प्रासादः]. But words denoting persons do not trigger this lengthening, nor do compounds where the @deva[उपसर्ग] does not directly precede a @deva[घञ्]-form.
"""

advanced = """
The final vowel of a @deva[उपसर्ग] is variously lengthened before a @deva[घञ्]-derived word, provided the compound does not denote a person. Examples with lengthening: @deva[नीक्लेदः], @deva[वीमार्गः], @deva[अपामार्गः]. Without lengthening: @deva[प्रसेचः], @deva[प्रसारः]. Before @deva[साद] and @deva[कार], lengthening applies when a building is meant: @deva[प्रासादः], @deva[प्राकारः]; otherwise @deva[प्रसादः], @deva[प्रकारः]. Before @deva[वेश] and similar words, lengthening is optional: @deva[प्रतिवेशः] or @deva[प्रतीवेशः], @deva[प्रतिरोधः] or @deva[प्रतीरोधः]. When the compound denotes a human being, no lengthening occurs: @deva[निपादो] @deva[मनुष्यः].
"""

id = "6.3.45"
numericId = "63045"

[en]
simple = """
A feminine @deva[ङी] attached to a @[taddhita]-derived word may optionally be shortened before comparative suffixes, giving three possible forms. For example: @deva[श्रेयसितरा], @deva[श्रेयसीतरा], or @deva[श्रेयस्तरा].
"""

standard = """
The @deva[ङी] feminine of a word formed by a @[taddhita] affix bearing indicatory @deva[उ] or @deva[ऋ] is optionally shortened before the @deva[घ]-set of suffixes listed at @ref[6.3.43]. This yields three competing forms: the short @deva[इ], the unchanged @deva[ई], or the masculine base. Thus @deva[श्रेयसितरा] / @deva[श्रेयसीतरा] / @deva[श्रेयस्तरा] and @deva[विदुषितरा] / @deva[विदुषीतरा] / @deva[विद्वत्तरा].
"""

advanced = """
The feminine @deva[ङी] (@deva[ई]) attached to a word formed by a @deva[तद्धित] affix with indicatory @deva[उ] or @deva[ऋ] is optionally shortened before the @deva[घ]-set (@deva[घरूपकल्पचेलड्ब्रुवगोत्रमतहतेषु] @deva[ङ्योऽनेकाचो] @deva[ह्रस्वः] @ref[6.3.43]). This yields three alternatives: @deva[श्रेयसितरा] (shortened), @deva[श्रेयसीतरा] (unchanged), or @deva[श्रेयस्तरा] (masculinized); similarly @deva[विदुषितरा], @deva[विदुषीतरा], or @deva[विद्वत्तरा]. The first set derives from @deva[ईयसुन्], the second from @deva[क्वसु]. In the third alternative, masculinization applies, producing @deva[श्रेयस्तरा]; alternatively, this form can be analyzed as the comparative affix added directly to the masculine stem @deva[श्रेयस्], with the feminine affix then appended.
"""

id = "6.3.101"
numericId = "63101"

[en]
simple = """
The prefix @deva[कु] (bad/inferior) is replaced by @deva[कत्] in a @deva[तत्पुरुष] compound when the second part begins with a vowel. This is a sandhi-conditioned substitution. Example: @deva[कदन्नम्] (bad food).
"""

standard = """
In a @deva[तत्पुरुष] compound, @deva[कत्] substitutes for @deva[कु] when the following member begins with a vowel. The final @deva[त्] then voices to @deva[द्] by regular sandhi. Thus @deva[कदजः] (bad goat), @deva[कदश्वः] (bad horse), @deva[कदन्नम्] (bad food). A @[vārttika] extends this to @deva[कत्रयः].
"""

advanced = """
@deva[कत्] replaces @deva[कु] in a @deva[तत्पुरुष] @deva[समास] when the second member begins with a vowel: @deva[कदजः], @deva[कदश्वः], @deva[कदुष्ट्रः], @deva[कदन्नम्]. The @deva[तत्पुरुष] condition is essential — in a non-@deva[तत्पुरुष] context, the substitution does not occur: @deva[कूष्ट्रो] @deva[राजा]. Likewise, when the second member begins with a consonant, @deva[कु] is retained: @deva[कुब्राह्मणः], @deva[कुपुरुषः]. A @[vārttika] extends @deva[कत्]-substitution to @deva[त्रय]: @deva[कत्रयः] = @deva[कुत्सितास्त्रयः].
"""

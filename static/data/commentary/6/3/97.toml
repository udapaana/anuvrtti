id = "6.3.97"
numericId = "63097"

[en]
simple = """
After @deva[द्वि], @deva[अन्तर], or other prefixes, the word @deva[अप्] (water) takes long @deva[ई] as a substitute for its @deva[अ]. This creates compounds meaning 'island' or 'vicinity'. Example: @deva[द्वीपः] (island — literally 'two waters').
"""

standard = """
Long @deva[ई] replaces the @deva[अ] of @deva[अप्] after @deva[द्वि], @deva[अन्तर], and various @deva[उपसर्ग]s. By @ref[1.1.54], only the initial @deva[अ] is replaced, not the whole word. Thus @deva[द्वीपः] 'island', @deva[अन्तरीपः] 'peninsula', @deva[समीपम्] 'vicinity'. A @[vārttika] notes that @deva[समापम्] is not formed by this rule.
"""

advanced = """
After @deva[द्वि], @deva[अन्तर], and prepositions, long @deva[ई] replaces the @deva[अ] of @deva[अप्]. By @ref[1.1.54], @deva[ई] replaces only the first letter (@deva[अ]): @deva[द्वीपः], @deva[अन्तरीपः], @deva[नीपम्], @deva[वीपम्], @deva[समीपम्]. The @[samāsānta] @deva[अ] is added by @ref[5.4.74]. A @[vārttika] prohibits the substitution for @deva[समाप]: @deva[समापं] @deva[नाम] @deva[देवयजनम्]. According to another view, after a preposition ending in @deva[अ], the long @deva[ई] substitution does not apply: @deva[प्रापम्], @deva[परापम्]. The term @deva[उपसर्ग] strictly denotes adverbs and cannot properly apply to nouns like @deva[अप्]; in this @[sūtra] it is used loosely to mean @deva[प्र] and similar prefixes.
"""

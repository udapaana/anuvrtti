id = "6.3.75"
numericId = "63075"

[en]
simple = """
A fixed list of words — including @deva[नपात्] (grandson), @deva[नमुचि] (a demon), @deva[नकुल] (mongoose), @deva[नख] (nail), and others — retain the full @deva[न] of @deva[नञ्] without elision. These are @[nipatana] forms where the usual rule of @deva[न्]-elision does not apply.
"""

standard = """
As @[nipatana] exceptions to @ref[6.3.73], a specific set of words retains the full @deva[न] of @deva[नञ्]: @deva[नभ्राज्], @deva[नपात्], @deva[नवेदस्], @deva[नासत्या], @deva[नमुचि], @deva[नकुल], @deva[नख], @deva[नपुंसक], @deva[नक्षत्र], @deva[नक्र], @deva[नाक]. In these, the @deva[न्] elision rule is suspended and the underlying negative particle surface unchanged, often because the words have specialized mythological or anatomical meanings that require the full form.
"""

advanced = """
The Negative Particle remains unchanged in - 1. @deva[नभ्राज्] 2. @deva[नपात्] 3. @deva[नवेदस्] 4. @deva[नासत्या] (dual) 5. @deva[नमुचि] 6. @deva[नकुल] 7. @deva[नख] 8. @deva[नपुंसक] 9. @deva[नक्षत्र] 10. @deva[नक्र] and 11. @deva[नाक]@deva[।] Upto @deva[नासत्या] the words are exhibited in the Nominative case in the @[sutra], the rest are exhibited in the Locative ! @deva[नभ्राजते] = @deva[नभ्राट्], formed by @deva[क्विप्] and @deva[नञ्] composition. @deva[न] @deva[पाति] = @deva[नपात्] formed by @deva[शतृ] affix. @deva[न] @deva[वेत्ति] = @deva[नवेदा], formed by @deva[असुन्] @deva[॥] @deva[सत्सु] @deva[साधवः] = @deva[सत्याः], @deva[न] @deva[सत्याः] = @deva[असत्याः], @deva[न] @deva[असत्याः] @deva[नासत्याः] @deva[॥] @deva[न] @deva[मुञ्चति] = @deva[नमुचि], formed by @deva[कि] affix (@[unadi]), @deva[नास्य] @deva[कुलमस्ति] = @deva[नकुलः] @deva[॥] @deva[नास्य] @deva[खमस्ति] = @deva[नखम्] @deva[॥] @deva[न] @deva[स्त्री] @deva[न] @deva[पुमान्] = @deva[नपुंसकम्] @deva[॥] @deva[न] @deva[क्षरते] @deva[क्षीयते] @deva[वा] @deva[नक्षत्रम्] @deva[॥] @deva[न] @deva[क्रामति] = @deva[नक्र] by @deva[ड] affix, @deva[न] @deva[अस्मिन्] @deva[अकम्] = @deva[नाकम्] @deva[॥]
"""

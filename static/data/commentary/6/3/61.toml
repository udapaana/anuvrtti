id = "6.3.61"
numericId = "63061"

[en]
simple = """
According to the grammarian @deva[गालव], long vowels @deva[ई], @deva[ऊ], @deva[ॠ] can optionally be shortened in the first member of a compound. So both @deva[ग्रामणिपुत्रः] and @deva[ग्रामणीपुत्रः] are acceptable.
"""

standard = """
According to @deva[गालव], an optionally short vowel replaces long @deva[इक्]-vowels (@deva[ई], @deva[ऊ], @deva[ॠ]) in the first member of a compound, provided the long vowel is not the feminine suffix @deva[ङी]. Thus @deva[ग्रामणिपुत्रः] or @deva[ग्रामणीपुत्रः] 'son of the village headman', @deva[कारुपुत्रः] or @deva[कारूपुत्रः] 'son of the artisan'.
"""

advanced = """
According to @deva[गालव], a short vowel optionally replaces long @deva[इक्] vowels (@deva[ई], @deva[ऊ], @deva[ॠ]) in the first member of a compound before the second member, provided the long vowel is not the feminine affix @deva[ङी]: @deva[ग्रामणिपुत्रः] or @deva[ग्रामणीपुत्रः], @deva[ब्रह्मबन्धुपुत्रः] or @deva[ब्रह्मबन्धूपुत्रः]. The restriction to @deva[इक्] vowels is significant — @deva[खट्वापादः] and @deva[मालापादः] (with @deva[आ]) are unaffected. The exclusion of @deva[ङी] preserves @deva[गार्गीपुत्रः] and @deva[वात्सीपुत्रः]. The mention of @[gālava] by name serves as @[pūjārtha]; the @[anuvṛtti] of 'optionally' was already present. This is a @[vyavasthita] @[vibhāṣā] (restricted option) and does not apply to forms governed by @ref[6.3.139] such as @deva[कारीषगन्धीपति]. @[vārttika]: the shortening does not apply to @[avyayībhāva] compounds nor to stems taking @deva[इयङ्] or @deva[उवङ्] augments in declension — @deva[श्रीकुलम्], @deva[भ्रूकुलम्], @deva[काण्डीभूतम्], @deva[कुडपीभूतं], @deva[वृषलीभूतम्]. @[vārttika]: it does apply to @deva[भ्रुकुंस] and similar words — @deva[भ्रुकुंसः], @deva[भ्रुकुटिः]. Others hold that @deva[अ] replaces @deva[भ्रू] in these, yielding @deva[भ्रकुंसः] and @deva[भ्रकुटिः].
"""

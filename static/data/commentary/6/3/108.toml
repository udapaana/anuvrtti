id = "6.3.108"
numericId = "63108"

[en]
simple = """
In Vedic texts, before @deva[पथ] (road), @deva[कु] may be replaced by @deva[का] or @deva[कव], or remain unchanged. All three forms occur in Vedic literature. Example: @deva[कवपथः] (a bad road, Vedic).
"""

standard = """
This rule extends the @deva[का]/@deva[कव]-substitutions for @deva[कु] to the Vedic domain (@deva[छन्दस्]) before @deva[पथ]. All three forms — @deva[कवपथः], @deva[कापथः], and @deva[कुपथः] — occur in Vedic texts. In classical Sanskrit, only @deva[कापथः] is standard (via @ref[6.3.104]).
"""

advanced = """
The substitution of @deva[का] and @deva[कव] for @deva[कु] occurs in @deva[छन्दस्] before @deva[पथ]: @deva[कवपथः], @deva[कापथः], and @deva[कुपथः].
"""

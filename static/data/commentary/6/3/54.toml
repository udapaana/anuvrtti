id = "6.3.54"
numericId = "63054"

[en]
simple = """
@deva[पाद] becomes @deva[पद्] before @deva[हिम], @deva[काषिन्], and @deva[हति]. So @deva[पद्धतिः] means 'a footpath or beaten track' and @deva[पद्धिमम्] means 'cold at the foot'.
"""

standard = """
@deva[पद्] is substituted for @deva[पाद] before @deva[हिम], @deva[काषिन्], and @deva[हति]. The resulting compounds are @deva[पद्धिमम्] 'cold of foot', @deva[पत्काषिन्] 'one who scrapes with the foot', and @deva[पद्धतिः] 'footpath; established procedure'. The substitution triggers normal consonant sandhi.
"""

advanced = """
@deva[पद्] replaces @deva[पाद] before @deva[हिम], @deva[काषिन्], and @deva[हति]: @deva[पद्धिमम्] (@deva[पादस्य] @deva[शीतं]); @deva[पत्काषिन्] (@deva[पादचारिणः]), as in @deva[अथ] @deva[पत्काषिणा] @deva[यान्ति]; and @deva[पद्धतिः] (@deva[पदाभ्यां] @deva[हन्यते]).
"""

id = "6.3.65"
numericId = "63065"

[en]
simple = """
In three specific compounds, the final long vowel of the first member shortens: @deva[इष्टका] before @deva[चित], @deva[इषीका] before @deva[तूल], and @deva[माला] before @deva[भारिन्]. The results are @deva[इष्टकचितम्] (brick-pile), @deva[इषीकतूलम्] (reed-tuft), and @deva[मालभारिणी] @deva[कन्या] (garland-bearing girl).
"""

standard = """
This rule specifies three lexically conditioned shortenings: the @deva[आ] of @deva[इष्टका] shortens before @deva[चित], the @deva[आ] of @deva[इषीका] shortens before @deva[तूल], and the @deva[आ] of @deva[माला] shortens before @deva[भारिन्]. The conditioning is purely lexical — each substitution is triggered by a specific following word. The resulting forms @deva[इष्टकचितम्], @deva[इषीकतूलम्], and @deva[मालभारिणी] are @[nipatana]-style fixed compounds.
"""

advanced = """
The final long vowel shortens in three lexically specified cases: @deva[इष्टका] before @deva[चित], @deva[इषीका] before @deva[तूल], and @deva[माला] before @deva[भारिन्] — yielding @deva[इष्टकचितम्], @deva[इषीकतूलम्], and @deva[मालभारिणी] @deva[कन्या]. The @[tadanta] principle extends the rule to compounds ending in @deva[इष्टका] and the rest: @deva[पक्वेष्टकचितम्], @deva[मुञ्जेषीकतूलम्], @deva[उत्पलमालभारिणी] @deva[कन्या].
"""

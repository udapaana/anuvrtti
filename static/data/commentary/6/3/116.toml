id = "6.3.116"
numericId = "63116"

[en]
simple = """
The final vowel of a preceding word is lengthened before the roots @deva[नह्], @deva[वृत्], @deva[वृष्], @deva[व्यध्], @deva[रुच्], @deva[सह्], and @deva[तन्] when these take the zero-suffix @deva[क्वि]. Example: @deva[उपानह्] (sandal — from @deva[उप] + @deva[नह्] with @deva[क्वि]).
"""

standard = """
When the roots @deva[नह्], @deva[वृत्], @deva[वृष्], @deva[व्यध्], @deva[रुच्], @deva[सह्], and @deva[तन्] take the @deva[क्वि]-affix (zero-affix, leaving only the root), the final vowel of the preceding word is lengthened in @deva[संहिता]. Thus @deva[उपानह्] (sandal), @deva[नीवृत्] (lower garment), @deva[ममावित्] (one who bears me). The @deva[क्वि]-affix itself is deleted, leaving the bare root.
"""

advanced = """
The final vowel of the preceding word is lengthened before the roots @deva[नह्], @deva[वृत्], @deva[वृष्], @deva[व्यध्], @deva[रुच्], @deva[सह्], and @deva[तन्] when they take the @deva[क्वि] affix. With @deva[नह्]: @deva[उपानह्] (nominative singular @deva[उपानत्]), @deva[परीणत्]. With @deva[वृत्]: @deva[नीवृत्], @deva[उपावृत्]. With @deva[वृष्]: @deva[प्रावृट्], @deva[उपावृट्]. With @deva[व्यध्]: @deva[ममावित्], @deva[हृदयावित्], @deva[श्वावित्]. With @deva[रुच्]: @deva[नीरुक्], @deva[अभीरुक्]. With @deva[सह्]: @deva[ऋताषट्]. With @deva[तन्]: @deva[तरीतट्]. The nasal of @deva[गम्] is elided before @deva[क्वि] by @ref[6.4.40]; by extension, the nasal of @deva[तम्] is likewise elided. The restriction to @deva[क्वि] is essential — without it, no lengthening: @deva[परिणहनम्].
"""

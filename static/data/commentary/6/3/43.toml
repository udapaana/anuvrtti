id = "6.3.43"
numericId = "63043"

[en]
simple = """
A polysyllabic word ending in the feminine suffix @deva[ङी] gets shortened to @deva[इ] before certain comparative or descriptive suffixes. So @deva[ब्राह्मणी] becomes @deva[ब्राह्मणि] in @deva[ब्राह्मणितरा] 'more of a brahmin woman'.
"""

standard = """
Before @deva[तर], @deva[तम], @deva[रूप], @deva[कल्प], @deva[चेल], @deva[ब्रुव], @deva[गोत्र], @deva[मत], and @deva[हत], a polysyllabic word ending in @deva[ङी] and having an equivalent masculine shortens its final to @deva[इ]. Thus @deva[ब्राह्मणी] → @deva[ब्राह्मणितरा], @deva[कारी] → @deva[कारितरा], @deva[वाणिजी] → @deva[वाणिजितरा].
"""

advanced = """
Before the affixes @deva[तर], @deva[तम], @deva[रूप], @deva[कल्प], @deva[चेल] (with feminine @deva[ई]), @deva[ब्रुव], @deva[गोत्र], @deva[मत], and @deva[हत], a polysyllabic word ending in feminine @deva[ङी] with an equivalent masculine shortens its final vowel: @deva[ब्राह्मणितरा], @deva[ब्राह्मणितमा], @deva[ब्राह्मणिरूपा], @deva[ब्राह्मणिकल्पा], @deva[ब्राह्मणिचेली], @deva[ब्राह्मणिब्रुवा], @deva[ब्राह्मणिगोत्रा], @deva[ब्राह्मणिमता], @deva[ब्राह्मणिहता]. Among these, @deva[घ], @deva[रूप], and @deva[कल्प] are affixes; @deva[चेलड्] and the rest are words serving as second members. @deva[ब्रुवः] is formed by @deva[अच्] @ref[3.1.134] added to @deva[ब्रू], with @[guṇa] and @deva[वच]-substitution anomalously blocked. The condition 'ending in @deva[ङी]' excludes @deva[दत्तातरा] and @deva[गुप्तातरा]. The polysyllabic condition is needed because monosyllables optionally shorten under the next rule (@ref[6.3.44]). The requirement of a corresponding masculine excludes @deva[आमलकीतरा] and @deva[कुवलीतरा], where @deva[आमलकी] and @deva[कुवली] have no equivalent masculine.
"""

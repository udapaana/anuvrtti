id = "6.3.128"
numericId = "63128"

[en]
simple = """
The final vowel of @deva[विश्व] (all/universal) is lengthened before @deva[वसु] and @deva[राट्]. This applies specifically to the @deva[राट्] form, not other case-forms of the same stem. Example: @deva[विश्वावसुः] (name of a gandharva — all-possessing).
"""

standard = """
The final vowel of @deva[विश्व] is lengthened before @deva[वसु] and @deva[राट्] (Nominative singular of @deva[राज्]). Thus @deva[विश्वावसुः] 'the all-possessing' (a gandharva name), @deva[विश्वाराट्]. The rule is restricted to the @deva[राट्]-form; other case-forms of @deva[राज्] do not trigger lengthening: @deva[विश्वराजौ], @deva[विश्वराजः].
"""

advanced = """
The final vowel of @deva[विश्व] is lengthened before @deva[वसु] and @deva[राट्] (the nominative singular form of @deva[राज्]): @deva[विश्वावसुः], @deva[विश्वाराट्]. The rule is restricted to the @deva[राट्] form specifically; when @deva[राज्] retains its base form, no lengthening applies: @deva[विश्वराजौ], @deva[विश्वराजः].
"""

id = "6.3.109"
numericId = "63109"

[en]
simple = """
The @deva[पृषोदरादि] class covers words whose irregular spellings — with extra, missing, or altered letters — are simply accepted as given by the ancient sages. No derivation is offered; usage is the authority. Example: @deva[पृषोदरम्] (spotted belly, from @deva[पृषद्] + @deva[उदर] with letter loss).
"""

standard = """
Words in the @deva[पृषोदरादि] list display letter-deletions, augments, and mutations that are not derivable from standard grammatical rules. They are accepted on the authority of @[ṛṣi] usage. Examples include @deva[पृषोदरम्], @deva[श्मशानम्], @deva[उलूखलम्], @deva[मत्स्यः]. The principle: whatever learned men use is valid grammar, even without rule-derivation.
"""

advanced = """
The elision, augment, and mutation of letters in @deva[पृषोदर] and similar forms, though not derivable from standard grammatical rules, are accepted as valid on the authority of @[śiṣṭa] usage. The @[kārikā] states: @deva[वर्णागमो] @deva[वर्णविपर्ययश्च] @deva[द्वौ] @deva[चापरौ] @deva[वर्णविकारनाशौ] @deva[।] @deva[धातोस्तदर्थातिशयेन] @deva[योगस्तदुच्यते] @deva[पञ्चविधं] @deva[निरुक्तम्] — enumerating five types of irregular formation. The term @deva[यथोपदिष्टम्] means @deva[शिष्टैरुच्चारितानि] ('as pronounced by the learned'). Examples: @deva[पृषदुदरो] @deva[यस्य] = @deva[पृषोदरम्], @deva[पृषद्] @deva[उद्वानं] @deva[यस्य] = @deva[पृषोद्वानम्] (elision of @deva[द्]). Similarly @deva[वारिवाहकः] = @deva[बलाहकः] (@deva[वारि] replaced by @deva[व], @deva[ल] replaces @deva[व] of @deva[वाहक]); @deva[जीवनस्य] @deva[मूतः] = @deva[जीमूतः] (elision of @deva[वन]); @deva[शवानां] @deva[शयनं] = @deva[श्मशानम्] (@deva[श्म] replaces @deva[शव], @deva[शान] for @deva[शयन]); @deva[ऊर्ध्वं] @deva[खमस्य] = @deva[उलूखलम्] (@deva[उल] replaces @deva[ऊध], @deva[खल] replaces @deva[खम]); @deva[पिशिताशाः] = @deva[पिशाचः]; @deva[ब्रुवन्तोस्यां] @deva[सीदन्ति] = @deva[बृसी] (@deva[सद्] takes @deva[उट्] in locative, @deva[ब्रुव] replaced by @deva[बृ]); @deva[मह्यां] @deva[रौति] = @deva[मयूरः] (@deva[मही] replaced by @deva[मयू], final @deva[रु] elided before @deva[अच्]). The same pattern extends to @deva[अश्वत्थ], @deva[कपित्थ], and others. Vart: @deva[तीर] optionally becomes @deva[तार] after a direction-word: @deva[दक्षिणतीरम्] or @deva[दक्षिणतारम्], @deva[उत्तरतीरम्] or @deva[उत्तरतारम्]. Vart: Before the patronymic @deva[इञ्] affix, @deva[वाग्वाद] becomes @deva[वाड्वाल]: @deva[वाग्वादस्यापथ्यं] = @deva[वाड्वालिः]. Vart: The final of @deva[पथ्] changes to @deva[उ] before @deva[दतृ], @deva[दश], and @deva[धा] (in the sense of 'location'), and the initial of the second member becomes cerebral (@deva[ड]/@ deva[ढ]): @deva[षड्] @deva[दन्ता] @deva[अस्य] = @deva[षाडन्]; @deva[षोडश]; @deva[षड्धा] or @deva[षोढा] @deva[कुरु]. The @deva[उ]-addition is optional. The plural @deva[धासु] indicates @deva[धा] here means 'in many parts' (@deva[नानाधिकरण]), functioning as an affix — hence the rule does not apply to @deva[षट्] @deva[दधाति] or @deva[धयति-षड्धा]. Vart: The final of @deva[दुर्] changes to @deva[उ] before @deva[दाश], @deva[नाश], @deva[दभ], and @deva[ध्ये], with cerebralization of their initials: @deva[दुःखेन] @deva[दाश्यते], @deva[नाश्यते], @deva[दभ्यते] @deva[यः] = @deva[दूडाशः], @deva[दूणाशः], @deva[दूडभः] (in @deva[दम्भ], the nasal is also elided). @deva[दुष्टं] @deva[ध्यायति] = @deva[दूढ्यः] — here the affix @deva[क] is added to @deva[ध्या] (@deva[ध्यै]) with @[upapada] @deva[दुः] by @ref[3.1.136]. Vart: @deva[उ] substitutes for the final vowel when @deva[रुह] follows in Vedic: @deva[एहित्वं] @deva[जायेस्वो] @deva[रोहावं] (@deva[रोहाव] = imperative 1st person dual). Vart: The final of @deva[पीवस्], @deva[पयस्], and similar stems is elided in Vedic: @deva[पीवोप] @deva[वसनानां], @deva[पयोपवसनानाम्].
"""

id = "6.3.52"
numericId = "63052"

[en]
simple = """
@deva[पाद] (foot) becomes @deva[पद्] before certain words. So @deva[पादाति] becomes @deva[पदातिः] 'foot-soldier' and @deva[पदाजिः] means 'one who goes on foot'.
"""

standard = """
@deva[पद्] is substituted for @deva[पाद] before @deva[आजि], @deva[आति], @deva[ग], and @deva[उपहत]. Thus @deva[पदाजिः] 'one who walks', @deva[पदातिः] 'foot-soldier', @deva[पदगः] 'going on foot', and @deva[पदोपहतः] 'afflicted in the feet'. The substituted form @deva[पद्] undergoes normal sandhi with the following consonant.
"""

advanced = """
@deva[पद्] replaces @deva[पाद] before @deva[आजि], @deva[आति], @deva[ग], and @deva[उपहत]: @deva[पदाजिः] (@deva[पादाभ्यामजति]), @deva[पदातिः] (@deva[पादाभ्यामतति]), @deva[पदगः] (@deva[पादाभ्यां] @deva[गच्छति]), @deva[पदोपहतः] (@deva[पादेनोपहतः]). @deva[आजिः] and @deva[आतिः] are formed by @deva[इण्] from @deva[अज्] and @deva[अत्] (@[uṇādi] IV.131); irregularly, @deva[अज्] is not replaced by @deva[वी] as @ref[2.4.56] would require before this affix. Regarding accent: @deva[पाद] belongs to the @[vṛṣādi] class @ref[6.1.203] and therefore carries acute on its first syllable, but the substitute @deva[पद्] has acute on the final only in @deva[उपदेश] @ref[6.1.171]. In @deva[पदोपहतः], @deva[पद्] retains its accent by @ref[6.2.48], becoming final-acute. In @deva[पदाजिः], @deva[पदातिः], and @deva[पदगः], the acute falls on the final by @ref[6.1.223] and @[kṛt]-accent.
"""

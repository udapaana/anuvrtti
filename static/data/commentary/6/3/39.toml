id = "6.3.39"
numericId = "63039"

[en]
simple = """
A feminine formed by a @[taddhita] suffix that causes lengthening of the first syllable does not change to masculine. So @deva[स्रौघ्नी] (woman from @[śrughna]) stays feminine in @deva[स्रौघ्नीभार्यः]. But color and material meanings are exceptions.
"""

standard = """
A feminine derived by a @[taddhita] affix that causes @deva[वृद्धि] of the initial syllable is exempt from masculine substitution, except when the affix conveys the meaning 'colored with' or 'made of'. Thus @deva[स्रौघ्नीभार्यः] (wife from @[śrughna]) and @deva[माथुरीभार्यः] (wife from @[mathurā]) retain the feminine. See @ref[6.3.34] for the base rule.
"""

advanced = """
A feminine formed by a @deva[तद्धित] affix that causes @deva[वृद्धि] of the initial syllable is exempt from masculine substitution — except when the @deva[तद्धित] derivative means 'colored therewith' or 'made thereof'. Examples: @deva[स्रौघ्नीभार्यः], @deva[माथुरीभार्यः], @deva[स्रौघ्नीपाशा], @deva[माथुरीपाशा], @deva[स्रौघ्नीयते], @deva[माथुरीयते], @deva[स्रौघ्नीमानिनी], @deva[माथुरीमानिनी]. The condition 'causes @deva[वृद्धि]' is significant: @deva[मध्यमभार्यः] (@deva[मध्ये] @deva[भवा] = @deva[मध्यमा], formed by affix @deva[म] @ref[4.3.8]) undergoes masculinization because @deva[म] does not cause @[vṛddhi]. The condition '@deva[तद्धित]' is significant: @deva[काण्डलावभार्यः] (@deva[काण्डं] @deva[लुनाति] = @deva[काण्डलावी] with @deva[अण्] and @deva[ङीप्]) undergoes masculinization because @deva[अण्] here is a @[kṛt] affix, not @deva[तद्धित]. The exception for 'colored/made thereof' applies in @deva[कषायेण] @deva[रक्ता] = @deva[काषायी], giving @deva[काषायवृहतिकः]; and @deva[लोहस्य] @deva[विकारो] @deva[लौही], giving @deva[लोहेषः] @ref[4.3.134]. The compound @deva[वृद्धिनिमित्तस्य] is to be parsed as a @[bahuvrīhi] — a @deva[तद्धित] affix containing an element like @deva[ण्], @deva[ञ्], or @deva[क्] that inherently causes @[vṛddhi] — not as a @[tatpuruṣa]. This exception therefore does not cover @deva[तावद्भार्यः] or @deva[यावद्भार्यः] (@deva[तावती] @deva[भार्या] @deva[यस्य]), where the affix @deva[वतुप्] @ref[5.2.39] does not cause @[vṛddhi] by its own force but through @ref[6.3.91].
"""

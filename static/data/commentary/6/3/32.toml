id = "6.3.32"
numericId = "63032"

[en]
simple = """
Northern grammarians allow @deva[मातरपितरौ] for 'mother and father', formed by inserting an @deva[अ] into @deva[मातृ]. The more common form is @deva[मातापितरौ].
"""

standard = """
According to Northern grammarians, the compound @deva[मातरपितरौ] is valid. It is formed by substituting @deva[अरङ्] for the @deva[ऋ] of @deva[मातृ], yielding the stem @deva[मातर्]. The alternative classical form is @deva[मातापितरौ]. Compare @ref[6.3.33] for Vedic usage.
"""

advanced = """
According to Northern Grammarians @deva[मातरपितरौ] is a valid form. This is formed by @deva[अरङ्] substitution of the @deva[ऋ] of @deva[मातृ] @deva[॥] The other form is @deva[मातापितरौ] @deva[॥]
"""

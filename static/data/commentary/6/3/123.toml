id = "6.3.123"
numericId = "63123"

[en]
simple = """
A prefix ending in @deva[इ] or @deva[उ] lengthens that vowel before @deva[काश] (shining/resembling). Example: @deva[नीकाशः] (resembling, from @deva[नि] + @deva[काश]).
"""

standard = """
A @deva[उपसर्ग] ending in @deva[इ] or @deva[उ] lengthens its final before @deva[काश] (derived from root @deva[काश्] with @deva[अच्] by @ref[3.1.134]). Thus @deva[नीकाशः] 'resembling', @deva[वीकाशः], @deva[अनूकाशः]. Contrast @deva[प्रकाशः] — the prefix @deva[प्र] ends in @deva[अ], not @deva[इ]/@deva[उ], so no lengthening applies.
"""

advanced = """
A @deva[उपसर्ग] ending in @deva[इ] or @deva[उ] lengthens its final before @deva[काश]: @deva[नीकाशः], @deva[वीकाशः], @deva[अनूकाशः]. @deva[काश] is formed by the affix @deva[अच्] (@ref[3.1.134]). The restriction to @deva[इक्]-final prefixes is operative — @deva[प्रकाशः] shows no lengthening since @deva[प्र] does not end in @deva[इ] or @deva[उ].
"""

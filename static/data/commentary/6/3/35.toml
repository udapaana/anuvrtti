id = "6.3.35"
numericId = "63035"

[en]
simple = """
A feminine word shifts to its masculine form before certain adverbial suffixes like @deva[तसिल्]. For example, @deva[एनी] (a female deer) becomes @deva[एत] to form @deva[एतस्मात्], @deva[एतत्र].
"""

standard = """
A feminine word not ending in @deva[ऊङ्] that has an equivalent masculine takes its masculine form before suffixes from @deva[तसिल्] (@ref[5.3.7]) through @deva[कृत्वसुच्] (@ref[5.4.17]). Thus @deva[एनी] → masculine @deva[एत] → @deva[एतस्मात्], @deva[एतत्र]. A @[vārttika] extends this rule to before @deva[त्व] and @deva[तल्] as well.
"""

advanced = """
A @deva[भाषितपुंस्कादनूङ्] feminine word takes its masculine form before the affixes beginning with @deva[तसिल्] (@ref[5.3.7]) through @deva[कृत्वसुच्] (@ref[5.4.17]). Examples: @deva[तस्याः] @deva[शालायाः] = @deva[ततः], @deva[तस्यां] = @deva[तत्र], @deva[यस्यां] = @deva[यत्र], @deva[यस्या] = @deva[यतः]. The full list of affixes triggering this change: @deva[त्र], @deva[तस्], @deva[तरप्], @deva[तमप्], @deva[चरट्], @deva[जातीयर्], @deva[कल्पप्], @deva[देश्य], @deva[देशीयर्], @deva[रूपप्], @deva[पाशप्], @deva[थम], @deva[थाल], @deva[दा], @deva[र्हिल], @deva[तिल्], @deva[तातिल्]. Other affixes do not trigger the gender change. With @deva[तरप्], @deva[तमप्], etc.: @deva[दर्शनीयतरा], @deva[दर्शनीयतमा], @deva[पटुचरी], @deva[पटुजातीया], @deva[दर्शनीयकल्पा], @deva[दर्शनीयदेशीया], @deva[दर्शनीयरूपा], @deva[दर्शनीयपाशा]. Further: @deva[कया] @deva[प्रकृत्या] = @deva[कथम्], @deva[यया] @deva[प्रकृत्या] = @deva[यथा], @deva[तस्यां] @deva[वेलाया] = @deva[तदा], @deva[तर्हि]. A @[vārttika] states that the feminine of @deva[बहु] and @deva[अल्प] is changed to masculine before the @[taddhita] affix @deva[शस्]: @deva[बह्वीभ्यो] @deva[देहि] = @deva[बहुशो] @deva[देहि]; @deva[अल्पाभ्यो] @deva[देहि] = @deva[अल्पशो] @deva[देहि]. Another @[vārttika]: a feminine adjective takes its masculine form before @deva[त्व] and @deva[तल्]: @deva[पट्व्या] @deva[भावः] = @deva[पटुत्वम्] or @deva[पटुता]. The adjective condition is required: @deva[कठ्या] @deva[भावः] = @deva[कण्ठीत्वं] or @deva[कठीता] shows no change because @deva[कठी] is not an adjective. A further @[vārttika]: the feminine is changed to masculine before all @[taddhita] affixes except @deva[ड] when the word receives the designation @deva[भ]: @deva[हस्तिनीनां] @deva[समूहः] = @deva[हास्तिकम्]. Without the masculine change, @deva[हस्तिनी] would lose its @deva[ई] by @ref[6.4.148], but the @deva[न्] of @deva[हस्तिन्] would not be elided before the @[taddhita] affix, since the @[lopa] being @[sthānivat] would block @ref[6.4.144] (elision of the final syllable), yielding @deva[हास्तिनिकम्] instead. The @deva[ड] exception: @deva[श्यैनेयः] and @deva[रौहिनेयः] retain the feminine base (masculines being @deva[श्येत] and @deva[रोहित]). The word @deva[आग्नेयः] (= @deva[अग्नायी] @deva[देवता] @deva[अस्य] @deva[स्थालीपाकस्य]) is an exception. A @[vārttika] also applies the masculine change before @deva[ठक्] and @deva[छस्]: @deva[भवत्या] @deva[छात्राः] = @deva[भावस्काः], @deva[भवदीयाः].
"""

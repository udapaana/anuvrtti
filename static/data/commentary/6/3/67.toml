id = "6.3.67"
numericId = "63067"

[en]
simple = """
The augment @deva[मुम्] (which surfaces as @deva[म्] after a vowel) is inserted after the final vowel of @deva[अरुस्], @deva[द्विषत्], or any vowel-final stem (that is not an indeclinable) when a @deva[खित्]-affix word follows. This gives @deva[अरुन्तुदः] and @deva[द्विषन्तपः] and @deva[कालिंमन्या].
"""

standard = """
The @[āgama] @deva[मुम्] is inserted after the final vowel of (1) @deva[अरुस्], (2) @deva[द्विषत्], and (3) any vowel-final nominal stem (excluding indeclinables) when followed by a @deva[खित्]-affix word. The nasal @deva[म्] of @deva[मुम्] is placed immediately after the final vowel, causing @deva[अरुस्] → @deva[अरुम्] → @deva[अरुन्तुदः] (with the following dental assimilation). See the related @deva[खित्]-affix formations at @ref[3.2.35] and @ref[3.2.39].
"""

advanced = """
The augment @deva[मुम्] is inserted immediately after the final vowel of @deva[अरुस्], @deva[द्विषत्], and any vowel-final stem (excluding indeclinables) when a @deva[खित्]-affix word follows: @deva[अरुन्तुदः], @deva[द्विषन्तपः], @deva[कालिंमन्या] (see @ref[3.2.35], @ref[3.2.39], @ref[3.2.83]). The @deva[स्] of @deva[अरुस्] and the @deva[त्] of @deva[द्विषत्] are dropped by @ref[8.2.23]. The restriction to @deva[अरुस्] and the rest is significant — @deva[विद्वन्मन्या] shows no @deva[मुम्]. The exclusion of indeclinables accounts for @deva[दोषामन्यमहः] and @deva[दिवामन्यारात्रिः]. The use of @deva[अन्त] in @deva[अजन्त] (rather than simply @deva[अचः], which would suffice by @[tadanta]-@[vidhi]) signals that the shortening of the preceding @[sūtra] does not block @deva[मुम्], nor does @deva[मुम्] block shortening — @deva[मुम्] is inserted after shortening has already applied.
"""

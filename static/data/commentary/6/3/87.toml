id = "6.3.87"
numericId = "63087"

[en]
simple = """
@deva[समान्] becomes @deva[स] before @deva[तीर्थ] when the @deva[यत्] suffix is added. The derived form @deva[सतीर्थ्यः] means 'a fellow student at the same teacher's house', a companion in learning.
"""

standard = """
Before @deva[तीर्थ] followed by the @[kṛt] affix @deva[यत्], @deva[समान्] is replaced by @deva[स]. The compound @deva[सतीर्थ्यः] (= @deva[समाने] @deva[तीर्थे] @deva[वासी]) refers to a student sharing the same @deva[आचार्यकुल] (teacher's residence). See @ref[4.4.107] for the formation of the @deva[यत्]-affix derivative. The rule is conditioned both by the specific second-member @deva[तीर्थ] and by the presence of @deva[यत्].
"""

advanced = """
@deva[स] replaces @deva[समान्] before @deva[तीर्थ] when the affix @deva[यत्] follows: @deva[सतीर्थ्यः] = @deva[समाने] @deva[तीर्थे] @deva[वासी] — 'a fellow-student' (see @ref[4.4.107] for the @deva[यत्]-affix formation).
"""

id = "6.3.13"
numericId = "63013"

[en]
simple = """
When the second member of a compound is @deva[बन्ध] ('binding, tie'), the locative ending on the first member may either be kept or dropped — both forms are valid. Thus both @deva[हस्तेबन्धः] and @deva[हस्तबन्धः] are correct ways to say 'a tie on the hand'.
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is optionally retained after a consonant- or @deva[अ]-ending stem before @deva[बन्ध]. This optionality (@[vibhāṣā]) produces doublets: @deva[हस्तेबन्धः] ~ @deva[हस्तबन्धः], @deva[चक्रेबन्धः] ~ @deva[चक्रबन्धः]. When the affix is dropped, the regular @[aluk] prohibition is simply not applied; when retained, it is.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is optionally not elided after a consonant- or @deva[अ]-final stem before @deva[बन्ध]: @deva[हस्तेबन्धः] or @deva[हस्तबन्धः], @deva[चक्रेबन्धः] or @deva[चक्रबन्धः]. This optionality applies in two directions: with respect to the preceding rule in a @[bahuvrīhi] when the first member is a @deva[स्वाङ्ग] word, and with respect to @ref[6.3.19] in a @[tatpuruṣa] regardless of whether the first member is @deva[स्वाङ्ग] or not. The word @deva[बन्ध] is formed with @deva[घञ्]. When the first member ends in a vowel other than @deva[अ], the rule does not apply: @deva[गुप्तिबन्धः].
"""

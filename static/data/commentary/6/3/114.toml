id = "6.3.114"
numericId = "63114"

[en]
simple = """
This is a governing rule (@[adhikāra]): the phrase 'in continuous speech' (@deva[संहितायाम्]) applies to all rules through the end of this chapter. All the phonological changes that follow only occur when words are pronounced without a pause. Example: @deva[तत्र] + @deva[अस्ति] → @deva[तत्रास्ति] in @deva[संहिता].
"""

standard = """
This @[adhikāra] @[sūtra] supplies @deva[संहितायाम्] ('in @[saṃhitā], i.e., continuous phonetic sequence') to every rule until the end of the @deva[पाद]. All sandhi operations from here on apply only in connected speech, not at pausa (where phonological neutralization obtains). Contrast with isolated word pronunciation, where no sandhi applies.
"""

advanced = """
This @[adhikāra] extends through the end of the @deva[पाद], supplying @deva[संहितायाम्] ('in continuous speech') to all subsequent rules. For instance, @ref[6.3.135] declares that final @deva[अ] of a disyllabic verb is lengthened in the hymns — but only in @deva[संहिता]. In @deva[विद्माहित्वा] @deva[सत्पति] @deva[शूर] @deva[गोनाम्], the continuous reading shows the lengthening; when the words stand separately (@deva[विद्म], @deva[हि], @deva[त्वा], @deva[सत्पतिं], @deva[शूर], @deva[गोनाम्]), it does not apply.
"""

id = "6.3.107"
numericId = "63107"

[en]
simple = """
Before @deva[उष्ण] (hot), the prefix @deva[कु] can be replaced either by @deva[का] or by @deva[कव], or can remain. All three forms mean 'lukewarm'. Example: @deva[कवोष्णम्] or @deva[कोष्णम्] (lukewarm).
"""

standard = """
Both @deva[का] and @deva[कवङ्] (i.e., @deva[कव]) are optionally substituted for @deva[कु] before @deva[उष्ण]. The substitution is optional, yielding three valid forms: @deva[कवोष्णम्], @deva[कोष्णम्] (with @deva[आ] + @deva[उ] → @deva[ओ]), and @deva[कदुष्णम्] (via @ref[6.3.101]). All mean 'lukewarm'.
"""

advanced = """
@deva[का] and @deva[कवङ्] are optionally the substitutes of @deva[कु] when @deva[उष्ण] follows. As @deva[कवोष्णम्], @deva[कोष्णम्] or @deva[कदुष्णम्] @deva[॥]
"""

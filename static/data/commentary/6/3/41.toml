id = "6.3.41"
numericId = "63041"

[en]
simple = """
Feminine nouns that denote a school or branch of learning do not change to masculine in compounds. So @deva[कठी] (a woman of the @[kaṭha] school) stays feminine in @deva[कठीभार्यः].
"""

standard = """
A feminine noun expressing membership in a class or school of learning is exempt from masculine substitution (@ref[6.3.34]). Thus @deva[कठीभार्यः] and @deva[बह्वृचीभार्यः] retain the feminine. However, before @deva[मानिन्] the masculine form applies: @deva[कठमानिनी] 'she who thinks herself a @[kaṭha]'.
"""

advanced = """
A feminine denoting a class or school does not undergo masculine substitution: @deva[कठीभार्यः], @deva[बह्वृचीभार्यः], @deva[कठीपाशा], @deva[बह्वृचीपाशा], @deva[कठीयते], @deva[बह्वृचीयते]. Before @deva[मानिन्], however, the masculine form applies: @deva[कठमानिनी], @deva[बह्वृचमानिनी]. This exception does not extend to collective derivations such as @deva[हस्तिनीनां] @deva[समूहः] = @deva[हास्तिकम्].
"""

id = "6.3.82"
numericId = "63082"

[en]
simple = """
In @deva[बहुव्रीहि] compounds, @deva[सह] optionally becomes @deva[स]. So both @deva[सपुत्रः] and @deva[सहपुत्रः] are correct, both meaning 'accompanied by his son.'
"""

standard = """
In @deva[बहुव्रीहि] compounds, the substitution of @deva[स] for @deva[सह] is optional (@[vikalpena]). This yields doublets: @deva[सपुत्रः] ~ @deva[सहपुत्रः] 'having a son with him'. The optionality is attributed to the @deva[बहुव्रीहि] structure where all members are @deva[उपसर्जन] (secondary), making the compound referentially indirect and thus permitting the freer alternation of @deva[सह] and @deva[स].
"""

advanced = """
@deva[स] optionally replaces @deva[सह] when the compound is a @deva[बहुव्रीहि] @deva[समास] — a @deva[सर्वोपसर्जन] compound in which all members are secondary, the principal referent being external: @deva[सपुत्रः] or @deva[सहपुत्रः], @deva[सच्छात्रः] or @deva[सहच्छात्रः]. The condition on @[bahuvrīhi] is critical — non-@[bahuvrīhi] forms like @deva[सहयुध्वा] and @deva[सहकृत्वा] do not permit the substitution. Nor does it apply in @[bahuvrīhi] compounds such as @deva[सहकृत्वप्रियः] or @deva[सहयुद्धप्रियः].
"""

id = "6.3.133"
numericId = "63133"

[en]
simple = """
In the @deva[ऋग्वेद], the final sounds of several small words — @deva[तु], @deva[नु], @deva[घ], @deva[मक्षु] — as well as the verbal ending @deva[तङ्] and others are lengthened. For example, @deva[तू], @deva[नू], @deva[मक्षू] appear in Vedic hymns.
"""

standard = """
In @deva[ऋग्वेद] specifically, the finals of particles @deva[तु], @deva[नु], @deva[घ], @deva[मक्षु], the tense-affix @deva[तङ्], the particle @deva[कु], the suffix @deva[त्र], and the word @deva[उरुष्य] all undergo lengthening. This produces @deva[तू], @deva[नू], @deva[मक्षू] etc. The rule is confined to the @[ṛgveda] and reflects the metrical and phonological freedom of Vedic poetry. See @ref[6.3.133].
"""

advanced = """
In the @deva[ऋग्वेद], the finals of the particles @deva[तु], @deva[नु], @deva[घ], @deva[मक्षु], the tense-affix @deva[तङ्], the particle @deva[कु], the ending @deva[त्र], and the word @deva[उरुष्य] are lengthened. @deva[तु]: @deva[आ] @deva[तू] @deva[न] @deva[इन्द्र] @deva[वृत्रहन्] (@[ṛg] IV.32.1). @deva[नु]: @deva[नू] @deva[करणे]. @deva[घ]: @deva[उत] @deva[वाचा] @deva[स्थालात्]. @deva[मक्षु]: @deva[मक्षू] @deva[गोमन्तमीमहे]. @deva[तङ्]: @deva[भरता] @deva[जातवेदसम्] (@[ṛg] X.176.2) — @deva[तङ्] is the @deva[ङित्]-treated substitute @deva[त] of @deva[था], so the rule does not apply in @deva[शृणोत] @deva[ग्रावाणः] (@ref[1.2.4]). @deva[कु]: @deva[कूमनस्]. @deva[त्र]: @deva[अत्रा] @deva[गौः]. @deva[उरुष्य]: @deva[उरुष्या] @deva[णोग्नेः].
"""

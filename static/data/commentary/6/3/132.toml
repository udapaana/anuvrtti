id = "6.3.132"
numericId = "63132"

[en]
simple = """
In a @deva[मन्त्र], the final vowel of @deva[ओषधि] ('herb, plant') is lengthened before all case-endings except the Nominative. So @deva[ओषधीभिः] ('with herbs') has the long @deva[ई], but the Nominative form @deva[ओषधिः] retains the short vowel.
"""

standard = """
Within @deva[मन्त्र] usage, the stem @deva[ओषधि] shows lengthening of its final @deva[इ] before @deva[विभक्ति] (case-endings), but the Nominative singular is explicitly excluded. Thus @deva[ओषधीभिः] (Instrumental), @deva[ओषधीभ्यः] (Dative/Ablative plural), but @deva[ओषधिः] (Nominative, unchanged). The restriction to non-Nominative is stated by the @[sūtra] itself. See @ref[6.3.132].
"""

advanced = """
In @deva[मन्त्र] context, the final of @deva[ओषधि] is lengthened before case-endings, excluding the nominative: @deva[ओषधीभिरपीपतत्], @deva[नमः] @deva[पृथिव्यै] @deva[नमः] @deva[ओषधीभ्यः]. The condition 'before case-endings' is essential — in @deva[ओषधिपते] (a compound, not a case-inflected form), no lengthening occurs. The nominative exclusion is illustrated by @deva[स्थिरेयमस्त्वौषधिः], where the short vowel is retained.
"""

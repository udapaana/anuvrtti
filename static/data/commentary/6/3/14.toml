id = "6.3.14"
numericId = "63014"

[en]
simple = """
In a @[tatpuruṣa] compound where the second member is a word derived by a @[kṛt] suffix (a suffix added to a verbal root), the locative ending on the first member may optionally be kept. This gives pairs like @deva[स्तम्बेरमः] (locative kept) alongside forms without it.
"""

standard = """
In a @deva[तत्पुरुष] compound, the @deva[सप्तमी] (locative) case-affix is optionally preserved when the second member is a @deva[कृत्]-derived nominal. The option (@[vibhāṣā]) yields doublets: @deva[स्तम्बेरमः] (locative retained, 'roaming among tufts') or @deva[कुरुचरः] (locative elided). The conditioning factor is the @[kṛt] derivation of the @[uttarapada].
"""

advanced = """
In a @deva[तत्-पुरुष] @deva[समास] when the second member is a word formed with a @deva[कृत्] affix the Locative -7th case ending is optionally preserved. As @deva[स्तम्बेरमः], @deva[कर्णेजपः], but also @deva[कुरुचरः], @deva[मद्रचरः] @deva[॥]
"""

id = "6.3.10"
numericId = "63010"

[en]
simple = """
In the names of certain taxes or levies used in eastern India, the locative ending of the first member is kept in the compound when the second member begins with a consonant. For example, @deva[सूपेशाणः] is the name of a tax and keeps the locative @deva[-ए].
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is not elided after a consonant- or @deva[अ]-final stem in the name of an eastern people's (@[prācāṃ]) tax, provided the second member begins with a consonant. Examples: @deva[सूपेशाणः], @deva[दृषदिमाषकः], @deva[हलेद्विपदिका] — all names of specific tax assessments. The geographic qualifier 'eastern' limits the rule's application.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is not elided after a consonant- or short-@deva[अ]-final stem in the name of a tax of the eastern people (@[prācāṃ]) when the second member begins with a consonant: @deva[सूपेशाणः], @deva[दृषदिमाषकः], @deva[हलेद्विपदिका], @deva[हलेत्रिपदिका]. These are all names of taxes and would retain the locative by the preceding rule as well. This rule imposes a threefold @[niyama] (restriction): (1) the compound must name a tax specifically, not any dues — hence @deva[अभ्यर्हितेपशुः] = @deva[अभ्यर्हितपशुः], which names a duty but not a tax; (2) it must belong to the eastern people — hence @deva[यूथेपशुः] = @deva[यूथपशुः]; (3) the second member must begin with a consonant — hence @deva[अविकटे] @deva[उरणः] = @deva[अविकटोरणः]. Similarly @deva[नद्यां] @deva[दोहनी] = @deva[नदीदोहनी]. For the accent of these words, see @ref[6.2.65].
"""

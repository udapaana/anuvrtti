id = "6.3.15"
numericId = "63015"

[en]
simple = """
When the second member is @deva[ज] (meaning 'born'), the locative ending of the first member is always kept if that first member is @deva[प्रावृट्] ('rainy season'), @deva[काल] ('time'), or @deva[दिव्] ('sky/heaven'). So @deva[दिविजः] means 'born in heaven' and keeps the locative @deva[-इ].
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is invariably retained after @deva[प्रावृट्], @deva[काल], and @deva[दिव्] when @deva[ज] ('born') follows as the second compound member. Examples: @deva[प्रावृषिजः] ('born in the rains'), @deva[कालेजः] ('born at the right time'), @deva[दिविजः] ('born in heaven' = @deva[देव]). The retention is obligatory, unlike the optional forms in neighboring rules.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is retained after @deva[प्रावृट्], @deva[काल], and @deva[दिव्] when @deva[ज] follows: @deva[प्रावृषिजः], @deva[शरदिजः], @deva[कालेजः], @deva[दिविजः]. This @[sūtra] extends and amplifies the preceding rule.
"""

id = "6.3.44"
numericId = "63044"

[en]
simple = """
For other feminine words of the @[nadī] class (not ending in @deva[ङी]), shortening before comparative suffixes is optional. So both @deva[ब्रह्मबन्धूतरा] and @deva[ब्रह्मबन्धुतरा] are correct.
"""

standard = """
For @deva[नदी]-type feminines not derived by @deva[ङी], shortening of the long vowel before the @deva[घ]-class suffixes (@ref[6.3.43]) is optional. Thus @deva[ब्रह्मबन्धूतरा] or @deva[ब्रह्मबन्धुतरा], @deva[श्वश्रूतरा] or @deva[श्वश्रुतरा]. A @[vārttika] gives special treatment to @[kṛt]-derived @deva[नदी]-types.
"""

advanced = """
For the remaining @deva[नदी]-class feminines — defined by @deva[यू] @deva[स्त्र्याख्यौ] @deva[नदी] @ref[1.4.3] and @deva[नेयङुवङ्स्थानावस्त्री] @ref[1.4.4] — the shortening under the conditions of @ref[6.3.43] is optional. The 'remainder' (@deva[शेष]) includes feminines called @[nadī] that are not formed by @deva[ङी], and those ending in long @deva[ई] that consist of a single syllable. Examples: @deva[ब्रह्मबन्धूतरा] or @deva[ब्रह्मबन्धुतरा], @deva[वीरबन्धूतरा] or @deva[वीरबन्धुतरा], @deva[स्त्रितरा] or @deva[स्त्रीतरा], @deva[स्त्रितमा] or @deva[स्त्रीतमा]. @[vārttika]: @[nadī] words formed by @[kṛt] affixes are excepted — @deva[लक्ष्मीतरा] and @deva[तन्त्रीतरा] retain the long vowel, being formed by the @[uṇādi] affix @deva[ई] (@[uṇādi] III.158.160).
"""

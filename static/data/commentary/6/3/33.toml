id = "6.3.33"
numericId = "63033"

[en]
simple = """
In Vedic, the reversed order @deva[पितरामातरा] is valid, meaning 'father and mother'. This is an older, Vedic-only usage.
"""

standard = """
In Vedic texts, the compound @deva[पितरामातरा] with reversed order is permitted. The first member takes @deva[अङ्] substitution, and the second member @deva[मातृ] receives long @deva[आ] by @ref[7.1.39], with @[guṇa] by @ref[7.3.110]. The classical form is @deva[मातापितरौ].
"""

advanced = """
In @deva[छन्दस्] (Vedic usage), the form @deva[पितरामातरा] is valid, with reversed order of the compound members. In standard language, @deva[मातापितरौ] is the correct form. The Vedic form is derived by adding @deva[अङ्] to the first member, @deva[आ] to the second by @ref[7.1.39], and @[guṇa] by @ref[7.3.110]. Attested: @deva[आ] @deva[मा] @deva[गन्तां] @deva[पितरामातरा] @deva[च].
"""

id = "6.3.104"
numericId = "63104"

[en]
simple = """
Before @deva[पथिन्] (road) or @deva[अक्ष] (dice/axle), the prefix @deva[कु] is replaced by @deva[का]. This substitution specifically marks the sense of 'bad'. Example: @deva[कापथः] (a bad road).
"""

standard = """
@deva[का] is the substitute of @deva[कु] specifically before @deva[पथिन्] and @deva[अक्ष]. The long @deva[आ] in @deva[का] distinguishes this from the @deva[कत्]-substitutions of @ref[6.3.101]–@ref[6.3.103]. Thus @deva[कापथः] 'a bad road', @deva[काक्षः] 'bad dice play or bad axle'.
"""

advanced = """
@deva[का] replaces @deva[कु] before @deva[पथिन्] and @deva[अक्ष]: @deva[कापथः] and @deva[काक्षः].
"""

id = "6.3.50"
numericId = "63050"

[en]
simple = """
@deva[हृदय] (heart) is shortened to @deva[हृद्] before certain words. So @deva[हृदय] + @deva[लेख] gives @deva[हृल्लेखः] 'one who writes to the heart', and @deva[हृद्यम्] means 'pleasant'.
"""

standard = """
@deva[हृद्] is substituted for @deva[हृदय] before @deva[लेख] and the affixes @deva[यत्] and @deva[अण्], and also before @deva[लास]. The resulting forms are @deva[हृल्लेखः] 'one writing at heart', @deva[हृद्यम्] 'pleasant' (< @deva[हृद्] + @deva[यत्]), @deva[हार्दम्] 'belonging to the heart' (< @deva[हृद्] + @deva[अण्] with @[vṛddhi]), and @deva[हृल्लासः] 'palpitation'.
"""

advanced = """
@deva[हृद्] replaces @deva[हृदय] before @deva[लेख], the affixes @deva[यत्] and @deva[अण्], and before @deva[लास]: @deva[हृदयं] @deva[लिखति] = @deva[हृल्लेखः]; @deva[हृदयस्य] @deva[प्रियं] = @deva[हृद्यम्]; @deva[हृदयस्येदम्] = @deva[हार्दम्]; @deva[हृदयस्य] @deva[लासो] = @deva[हृल्लासः]. The word @deva[लेख] here is the @deva[अण्]-derivative from @deva[लिख्]; before the @deva[घञ्]-derivative @deva[लेख], the substitution does not apply — hence @deva[हृदयलेखः]. The separate mention of @deva[लेख] in this @[sūtra] confirms the maxim @deva[उत्तरपदाधिकारे] @deva[प्रत्ययग्रहणे] @deva[न] @deva[तदन्तग्रहणम्] (see @ref[6.3.17]).
"""

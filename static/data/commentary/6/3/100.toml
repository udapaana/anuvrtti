id = "6.3.100"
numericId = "63100"

[en]
simple = """
When @deva[अर्थ] (purpose/meaning) follows @deva[अन्य], the inserted @deva[द्] is optional. Both forms are grammatically valid. Example: @deva[अन्यदर्थः] or @deva[अन्यार्थः] (for another purpose).
"""

standard = """
The augment @deva[दुक्] (@deva[द्]) is optionally inserted after @deva[अन्य] before @deva[अर्थ], making both @deva[अन्यदर्थः] and @deva[अन्यार्थः] acceptable. This rule provides an @[vibhāṣā] (option) for the conditioning word @deva[अर्थ], unlike the mandatory insertion taught in @ref[6.3.99].
"""

advanced = """
@deva[दुक्] (@deva[द्]) is optionally the augment of @deva[अन्य] when @deva[अर्थ] follows. As @deva[अन्यदर्थः] or @deva[अन्यार्थः] @deva[॥]
"""

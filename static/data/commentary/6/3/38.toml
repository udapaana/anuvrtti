id = "6.3.38"
numericId = "63038"

[en]
simple = """
Proper names and ordinal numerals used as feminine words do not shift to their masculine forms. So @deva[दत्ता] stays feminine in @deva[दत्ताभार्यः], and @deva[पञ्चमी] stays feminine in @deva[पञ्चमीभार्यः].
"""

standard = """
The masculine substitution (@ref[6.3.34]) does not apply when the feminine word is a proper name or an ordinal numeral. Thus @deva[दत्ताभार्यः] 'he whose wife is named @[dattā]', @deva[गुप्ताभार्यः], @deva[पञ्चमीभार्यः] 'he whose wife is the fifth', and @deva[दशमीभार्यः] all preserve the feminine form.
"""

advanced = """
Masculine substitution does not apply when the feminine is a proper name or an ordinal numeral. For names: @deva[दत्ताभार्यः], @deva[गुप्ताभार्यः], @deva[दत्तापाशा], @deva[गुप्तापाशा], @deva[दत्तायते], @deva[गुप्तायते], @deva[दत्तामानिनी], @deva[गुप्तामानिनी]. For ordinals (@deva[पूरण्याः]): @deva[पञ्चमीभार्यः], @deva[दशमीभार्यः], @deva[पञ्चमीपाशा], @deva[दशमीपाशा], @deva[पञ्चमीयते], @deva[दशमीयते], @deva[पञ्चमीमानिनी], @deva[दशमीमानिनी].
"""

id = "6.3.66"
numericId = "63066"

[en]
simple = """
When a word formed with a @deva[ख]-marked suffix follows, the final vowel of the preceding member in a compound always shortens. So @deva[काली] + @deva[मन्य] → @deva[कालिंमन्या], and @deva[हरिणी] + @deva[मन्य] → @deva[हरिणिंमन्या]. Indeclinables are exempt from this shortening.
"""

standard = """
Before a word containing a @deva[खित्] (indicatory @deva[ख]) affix, the final vowel of the first compound member is invariably shortened — with the exception that the first member must not be an @[avyaya] (indeclinable). The @deva[मुम्] augment (added by @ref[6.3.67]) does not interfere with this shortening: @deva[कालिंमन्या] shows both @deva[मुम्] and the shortened @deva[इ] from @deva[काली]. This rule creates a two-step derivation: first shortening, then @deva[मुम्] insertion.
"""

advanced = """
The final vowel of the first compound member is invariably shortened when the second member is formed by a @deva[खित्] affix, provided the first member is not an indeclinable: @deva[कालिंमन्या], @deva[हरिणिंमन्या]. The @deva[मुम्] augment does not block the shortening — if it did, the rule would be superfluous. Indeclinables are exempt: @deva[दोषामन्यमहः] and @deva[दिवामन्यारात्रिः], where @deva[दोषा] and @deva[दिवा] are @[avyaya]-s, retain the long vowel. These words are formed by @deva[खश्] @ref[3.2.83]. The term @[anavyayasya] implies that @deva[खित्] here means @deva[खिदन्तः] ('ending in a @deva[खित्]-derived word'), contrary to the maxim at @ref[6.3.17]: @deva[उत्तरपदाधिकारे] @deva[प्रत्ययग्रहणे] @deva[तदन्तविधिर्नेष्यते]. An @[avyaya] can never itself take a @deva[खित्] affix, which are ordained only after @[dhātu]-s.
"""

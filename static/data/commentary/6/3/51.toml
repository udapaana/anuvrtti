id = "6.3.51"
numericId = "63051"

[en]
simple = """
@deva[हृदय] can optionally shorten to @deva[हृद्] before @deva[शोक], @deva[रोग], and the suffix @deva[ष्यङ्]. So both @deva[हृच्छोकः] and @deva[हृदयशोकः] mean 'grief of the heart'.
"""

standard = """
@deva[हृद्] is optionally substituted for @deva[हृदय] before @deva[शोक], @deva[रोग], and the affix @deva[ष्यङ्]. When the substitution applies, @[vṛddhi] further operates. Thus @deva[हृच्छोकः] or @deva[हृदयशोकः] 'heartache', @deva[सौहार्द्यम्] or @deva[सौहृदय्यम्] 'friendship'. Compare the obligatory rule at @ref[6.3.50].
"""

advanced = """
@deva[हृद्] optionally replaces @deva[हृदय] before @deva[शोक], @deva[रोग], and the affix @deva[ष्यङ्]: @deva[हृच्छोकः] or @deva[हृदयशोकः]; @deva[हृद्रोगः] or @deva[हृदयरोगः]; @deva[सौहार्द्यम्] or @deva[सौहृदय्यम्]. The affix @deva[ष्यङ्] applies because @deva[हृदय] belongs to the @[brāhmaṇādi] class (V.I.124). When @deva[हृद्] is substituted, @[vṛddhi] of both @deva[सु] and @deva[हृ] follows by @ref[7.3.19]. These forms could equally be derived from @deva[हृत्], an independent word with the same meaning as @deva[हृदय], making this @[sūtra] technically redundant.
"""

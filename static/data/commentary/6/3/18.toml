id = "6.3.18"
numericId = "63018"

[en]
simple = """
For non-time words ending in a consonant or short @deva[अ], the locative ending may optionally be kept when the second member is @deva[शय] ('lying'), @deva[वास] ('dwelling'), or @deva[वासिन्] ('dweller'). So @deva[खेशयः] ('lying in the sky') and @deva[खशयः] are both valid.
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is optionally retained after non-time-denoting consonant- or @deva[अ]-final stems before @deva[शय], @deva[वास], and @deva[वासिन्]. Examples: @deva[खेशयः] ~ @deva[खशयः], @deva[ग्रामेवासः] ~ @deva[ग्रामवासः]. A @[vārttika] adds @deva[अप्सुयोनिः] to the scope. The optionality here parallels @ref[6.3.17] but applies to words of place rather than time.
"""

advanced = """
The @deva[सप्तमी] (locative) case-affix is optionally retained before @deva[शय], @deva[वास], and @deva[वासिन्] when the preceding word does not denote time and ends in a consonant or short @deva[अ]: @deva[खेशयः] or @deva[खशयः], @deva[ग्रामेवासः] or @deva[ग्रामवासः], @deva[ग्रामेवासिन्] or @deva[ग्रामवासिन्]. After a time-denoting word, only the elided form occurs: @deva[पुर्वाह्णशयः]. After a vowel-final word other than @deva[अ], likewise no option: @deva[भूमिशयः]. A @[vārttika] adds that the locative is retained after @deva[अप्] when @deva[योनि], the affix @deva[यत्], or @deva[मतुप्] follow: @deva[अप्सुयोनिः], @deva[अप्सव्यः], @deva[अप्सुमन्तौ]. The affix @deva[यत्] is added by treating @deva[अप्] as belonging to the @deva[दिवादि] class (@deva[अप्सु] @deva[भवः], @ref[4.3.54]).
"""

id = "6.3.127"
numericId = "63127"

[en]
simple = """
The final vowel of @deva[चिति] (altar layer) is lengthened before the diminutive suffix @deva[कप्]. This applies when counting altar layers in ritual contexts. Example: @deva[एकचितीकः] (having one altar layer).
"""

standard = """
The final vowel of @deva[चिति] is lengthened before the affix @deva[कप्] (a @deva[कृत्]-suffix creating diminutives or possessives). Thus @deva[एकचितीकः] 'having one altar layer', @deva[द्विचितीकः] 'having two altar layers', @deva[त्रिचितीकः]. The context is Vedic ritual construction (@deva[चयन]).
"""

advanced = """
The final vowel of @deva[चिति] is lengthened before the affix @deva[कप्]: @deva[एकचितीकः], @deva[द्विचितीकः], @deva[त्रिचितीकः].
"""

id = "6.3.79"
numericId = "63079"

[en]
simple = """
@deva[सह] becomes @deva[स] when the compound means 'up to the end of' something. So @deva[सकलं] @deva[ज्योतिषमधीते] means 'studies astrology up to its very end', and @deva[समुहूर्तम्] means 'for a full @[muhūrta].' These are @[avyayībhāva] compounds.
"""

standard = """
Before words in an @deva[अव्ययीभाव] compound conveying the meaning 'up to the end of' (@deva[पर्यन्त]), @deva[सह] is replaced by @deva[स]. The resulting @deva[अव्ययीभाव] compounds — @deva[सकलं], @deva[समुहूर्तम्], @deva[ससंग्रहम्] — function as adverbs. The compound formation rule is @ref[2.1.6]. The substitution is conditioned jointly by the @deva[अव्ययीभाव] compound type and the 'totality' semantics.
"""

advanced = """
@deva[स] replaces @deva[सह] when the meaning is 'up to the end': @deva[सकलं] = @deva[कलान्तं] @deva[ज्योतिषमधीते]; @deva[समुहूर्तम्] = @deva[मुहूर्तान्तम्]; @deva[ससंग्रहम्] = @deva[संग्रहान्तम्] @deva[व्याकरणमधीते]. These are all @[avyayībhāva] compounds formed by @ref[2.1.6] (@deva[अन्तवचने]). Although @ref[6.3.81] prohibits @deva[स]-substitution before time-denoting words, the present @[sūtra] overrides that prohibition by anticipation when the meaning is 'up to the end of a subject'. When the sense is 'more than', the forms are @deva[सद्रोणाखारी], @deva[समाषः] @deva[कार्षापणः], @deva[सकाकिणीको] @deva[माषः].
"""

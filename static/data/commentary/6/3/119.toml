id = "6.3.119"
numericId = "63119"

[en]
simple = """
Words of more than two syllables lengthen their final vowel before the suffix @deva[मत्] when the resulting compound is a proper name. The @deva[अजिर]-class words are excepted. Example: @deva[अमरावती] (name of a city).
"""

standard = """
The final vowel of a word with more than two syllables (@deva[बहुस्वर]) is lengthened before @deva[मत्] when the compound is a @[saṃjñā] (proper name). Thus @deva[उदुम्बरावती], @deva[अमरावती], @deva[पुष्करावती]. The @deva[म] → @deva[व] in names by @ref[8.2.11]. Exception: @deva[अजिर]-class words do not undergo this lengthening.
"""

advanced = """
The final vowel of a word with more than two syllables (@deva[बहुस्वर]) is lengthened before @deva[मत्] when the compound is a proper name, excluding @deva[अजिर]-class words. Examples: @deva[उदुम्बरावती], @deva[मशकावती], @deva[वीरणावती], @deva[पुष्करावती], @deva[अमरावती] — formed by @deva[मतुप्] (@ref[4.2.85]), with @deva[मत्] → @deva[वत्] by @ref[8.2.11]. A disyllabic stem does not trigger lengthening: @deva[व्रीहिमती]. The @deva[अजिर]-class is excluded: @deva[अजिरवती], @deva[खदिरवती], @deva[पुलिनवती], @deva[हंसकारण्डवती], @deva[चक्रवाकवती]. Non-names also remain unlengthened: @deva[वलयवती]. The class: 1 @deva[अजिर], 2 @deva[खदिर], 3 @deva[पुलिन], 4 @deva[हंस], 5 @deva[कारण्डव] (@deva[हंसकारण्डव]), 6 @deva[चक्रवाक].
"""

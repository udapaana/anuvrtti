id = "6.3.22"
numericId = "63022"

[en]
simple = """
When @deva[पुत्र] ('son') is the second member of a compound and the first member's genitive is used with insulting intent, the genitive ending may optionally be kept or dropped. So both @deva[दास्याःपुत्रः] and @deva[दासीपुत्रः] ('son of a slave woman') are valid.
"""

standard = """
Before @deva[पुत्र], the @deva[षष्ठी] (genitive) case-affix is optionally retained when insult (@[avajñā]) is intended. This gives doublets: @deva[दास्याःपुत्रः] (affix retained) ~ @deva[दासीपुत्रः] (affix dropped). Without insult, only the elided form is permitted: @deva[ब्राह्मणीपुत्रः]. The optionality is specific to the @deva[पुत्र] context; @ref[6.3.21] makes retention obligatory in the general insult case.
"""

advanced = """
The @deva[षष्ठी] (genitive) case-affix is optionally retained when insult is intended and @deva[पुत्र] follows: @deva[दास्याः] @deva[पुत्रः] or @deva[दासीपुत्रः], @deva[वृषल्याः] @deva[पुत्रः] or @deva[वृषलीपुत्रः]. Without insulting intent, only the elided form is used: @deva[ब्राह्मणीपुत्रः].
"""

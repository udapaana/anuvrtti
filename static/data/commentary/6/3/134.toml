id = "6.3.134"
numericId = "63134"

[en]
simple = """
In a @deva[मन्त्र], when the first member of a compound ends in @deva[इ] or @deva[उ], that final vowel is lengthened before the particle @deva[सु]. For example, @deva[अभि] becomes @deva[अभी] before @deva[षु], giving @deva[अभी षु].
"""

standard = """
This rule operates in @deva[मन्त्र] context: the final @deva[इ] or @deva[उ] of the preceding member is lengthened before the particle @deva[सु] (which appears as @deva[षु] after certain sounds). Thus @deva[अभि] → @deva[अभी] @deva[षु], and @deva[ऊर्ध्व] → @deva[ऊर्ध्वू] @deva[षु] in the Vedic text. This lengthening is a Vedic-only phenomenon (Chandasi). See @ref[6.3.134].
"""

advanced = """
In @deva[मन्त्र] context, the final @deva[इ] or @deva[उ] of the preceding member is lengthened before the particle @deva[सु]: @deva[अभी] @deva[षु] @deva[णः] @deva[सखीनाम्] (@[ṛg] IV.31.3), @deva[उर्ध्व] @deva[ऊ] @deva[षुण] @deva[उतये] (@[ṛg] I.36.13). The @deva[स] → @deva[ष] change is by @ref[8.3.107]; @deva[न] → @deva[ण] by @ref[8.4.27].
"""

id = "6.3.98"
numericId = "63098"

[en]
simple = """
After the prefix @deva[अनु], the word @deva[अप्] (water) takes @deva[ऊ] when the meaning is a type of locality. When locality is not meant, the regular sandhi applies instead. Example: @deva[अनूपः] (marshy land near a river).
"""

standard = """
After @deva[अनु], long @deva[ऊ] substitutes for the @deva[अ] of @deva[अप्] when a @[deśa] (locality) is denoted. Thus @deva[अनूपो देशः] 'marshy riparian land'. When locality is not the meaning, @deva[ऊ]-substitution does not occur and regular phonology applies: @deva[अन्वीपम्] (no locality sense).
"""

advanced = """
After @deva[अनु], long @deva[ऊ] replaces the @deva[अ] of @deva[अप्] when a locality is denoted: @deva[अनूपो] @deva[देशः]. Without the locality sense, the substitution does not apply: @deva[अन्वीपम्]. The long @deva[ऊ] is specified to indicate the correct morphological analysis — @deva[अनु] + @deva[ऊपः] = @deva[अनूपः]. The same surface form could arise from short @deva[उ] (@deva[अनु] + @deva[उपः] = @deva[अनूपः]), but that analysis is not intended.
"""

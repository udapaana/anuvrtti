id = "6.3.89"
numericId = "63089"

[en]
simple = """
@deva[समान्] becomes @deva[स] before @deva[दृग्], @deva[दृश], and the suffix @deva[वत्], giving @deva[सदृक्] and @deva[सदृशः], both meaning 'similar, like.' A @[vārttika] extends this to @deva[दृक्षः]: @deva[सदृक्षः].
"""

standard = """
@deva[समान्] is replaced by @deva[स] before @deva[दृग्], @deva[दृश], and @deva[वत्], producing the similarity-words @deva[सदृक्], @deva[सदृशः], and @deva[सदृशम्] (used as an adverb). A @[vārttika] addition extends the rule to @deva[दृक्षः], generating @deva[सदृक्षः] with the same meaning. These forms are used pervasively in Sanskrit to express likeness and are the standard vocabulary of comparison.
"""

advanced = """
@deva[स] replaces @deva[समान्] before @deva[दृग्], @deva[दृश], and the affix @deva[वत्]: @deva[सदृक्], @deva[सदृशः]. The forms @deva[दृक्] and @deva[दृश] are derived from @deva[दृश्] by the affixes @deva[कञ्] and @deva[क्विन्] respectively under @ref[3.2.60]. A @[vārttika] extends the rule to @deva[दृक्ष] (formed by the @deva[क्स] affix under @ref[3.2.60] @[vārttika]): @deva[सदृक्षः]. The affix @deva[वतु] is included here for the sake of the subsequent @[sūtra].
"""

id = "6.3.5"
numericId = "63005"

[en]
simple = """
There is one additional word after which the instrumental ending of @deva[मनस्] is kept in a compound: the word @deva[आज्ञायिन्], meaning 'one who habitually knows or understands'. The resulting compound @deva[मनसाज्ञायिन्] means 'one who understands through the mind'.
"""

standard = """
This rule provides a supplementary retention: the @deva[तृतीया] case-affix of @deva[मनस्] is also not elided when @deva[आज्ञायिन्] follows as the second compound member. The form @deva[मनसाज्ञायिन्] ('one who is accustomed to knowing through mind') is thus valid alongside the name-based retention in the preceding rule @ref[6.3.4]. This is a lexically specific exception.
"""

advanced = """
Before @deva[आज्ञायिन्] as well, the @deva[तृतीया] (instrumental) case-affix of @deva[मनस्] is not elided: @deva[मनसाज्ञायिन्] = @deva[मनसाऽऽज्ञातुं] @deva[शीलमस्य] ('one whose habit is to know through the mind').
"""

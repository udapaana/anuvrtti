id = "6.3.69"
numericId = "63069"

[en]
simple = """
@deva[वाचंयमः] (one who controls speech) and @deva[पुरन्दरः] (Indra, destroyer of citadels) are irregular forms listed as @[nipatana] exceptions. Their final parts (@deva[याम], @deva[दार]) undergo shortening that would not otherwise be expected.
"""

standard = """
The forms @deva[वाचंयमः] and @deva[पुरन्दरः] are @[nipatana] (irregularly listed) compounds. @deva[वाचंयमः] is derived via the @deva[खच्] affix (see @ref[3.2.40]), and the shortening of @deva[याम] is licensed by @ref[6.4.94]. @deva[पुरन्दरः] from @deva[पुरं] @deva[दारयति] (destroys cities) uses the affix from @ref[3.2.42], with shortening of @deva[दार] again by @ref[6.4.94]. Both are fixed forms that are memorized rather than derived by general rules.
"""

advanced = """
@deva[वाचंयम] and @deva[पुरंदर] are irregularly formed (@[nipātana]). @deva[वाचंयमः] derives from @deva[वाचं] @deva[यमः] @deva[आस्ते] with the @deva[खच्] affix (@ref[3.2.40]). @deva[पुरन्दरः] derives from @deva[पुरं] @deva[दारयति] with the affix at @ref[3.2.42]. The shortening of @deva[याम] and @deva[दार] in both cases proceeds by @ref[6.4.94].
"""

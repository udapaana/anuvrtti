id = "6.3.2"
numericId = "63002"

[en]
simple = """
In a compound, the ablative ending (the @deva[-ात्] or @deva[-आत्] suffix meaning 'from') is kept — not dropped — when the first word is one of a specific list: @deva[स्तोक] ('a little'), @deva[अल्प] ('small'), @deva[दूर] ('far'), and similar words. So @deva[स्तोकान्मुक्तः] means 'freed from a little', with the ablative ending intact inside the compound.
"""

standard = """
The @deva[पञ्चमी] (ablative) case-affix is not elided after @deva[स्तोक] and similar words (@[stokādi]) before the second compound member, by extension of the @[adhikāra] at @ref[6.3.1]. Normally @ref[2.4.71] would delete all @deva[सुप्] affixes in compounding; this rule blocks that deletion. Examples: @deva[स्तोकान्मुक्तः], @deva[अल्पान्मुक्तः], @deva[दूरादागतः]. A @[vārttika] extends this to @deva[ब्राह्मणाच्छंसिन्].
"""

advanced = """
The @deva[पञ्चमी] (ablative) case-affix after @deva[स्तोक] etc. is not elided before the second member of a compound: @deva[स्तोकान्मुक्तः], @deva[अल्पान्मुक्तः], @deva[अन्तिकादागतः], @deva[अभ्याशादागतः], @deva[दूरादागतः], @deva[विप्रकृष्टादागतः], @deva[कृच्छ्रान्मुक्तः]. By @ref[1.2.46], a case-inflected word forming part of a compound is called @[pratipadika], and by @ref[2.4.71] the endings of a @[pratipadika] are elided. In compounding @deva[स्तोकात्] @deva[मुक्तः], the ablative ending would ordinarily be dropped; this @[sutra] prevents that. The @[stokādi] words in the dual and plural are never compounded, so this rule does not apply to them: @deva[स्तोकाभ्यां] @deva[मुक्तः] and @deva[स्तोकेभ्यः] @deva[मुक्तः] remain separate words, not forming one @[pada] (@deva[एकपद]), and therefore carry separate acute accents. The compound @deva[स्तोकान्मुक्तः], being a single compound word, has one acute by @ref[6.1.158] and @ref[6.2.144]. The compounding itself is by @ref[2.1.39]. A @[vārttika] adds @deva[ब्राह्मणाच्छंसिन्] to this class, where the ablative is likewise retained: @deva[ब्राह्मणादादाय] @deva[शंसति] = @deva[ब्राह्मणाच्छंसिन्], a type of @[ritvik] priest.
"""

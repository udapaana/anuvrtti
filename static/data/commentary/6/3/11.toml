id = "6.3.11"
numericId = "63011"

[en]
simple = """
When @deva[मध्य] ('middle') is the first member of a compound and the word @deva[गुरु] ('teacher') follows, the locative ending is kept. The result @deva[मध्येगुरुः] means 'one who has a teacher in the middle (of a group)'.
"""

standard = """
The @deva[सप्तमी] (locative) case-affix is not elided after @deva[मध्य] when @deva[गुरु] follows as the second compound member, giving @deva[मध्येगुरुः]. A @[vārttika] extends this to @deva[अन्त]: @deva[अन्तेगुरुः] ('having a teacher at the end'). Both forms describe positional relationships with a teacher.
"""

advanced = """
The Locative -7th case-affix is not elided after @deva[मध्य] when @deva[गुरु] follows. As, @deva[मध्येगुरुः] @deva[॥] Vart:- So also after @deva[अन्त]; as @deva[अन्तेगुरुः] @deva[॥]
"""

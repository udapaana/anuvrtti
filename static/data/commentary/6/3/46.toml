id = "6.3.46"
numericId = "63046"

[en]
simple = """
@deva[महत्] (great) becomes @deva[महा] when it directly describes another noun in a compound. So @deva[महत्] + @deva[देव] gives @deva[महादेवः] 'the great god'.
"""

standard = """
Before an appositional second member or before @deva[जातीय], @deva[महत्] is replaced by @deva[महा]. Thus @deva[महादेवः] 'great god', @deva[महाब्राह्मणः], @deva[महाजातीयः]. In a genitive compound the substitution does not apply: @deva[महत्पुत्रः] 'son of the great one'. A @[vārttika] adds @deva[घास], @deva[कर], and @deva[विशिष्ट] as further conditioning environments.
"""

advanced = """
@deva[आत्] (@deva[आ]) replaces the final of @deva[महत्] before an appositional second member and before @deva[जातीय]: @deva[महादेवः], @deva[महाब्राह्मणः], @deva[महाबाहुः], @deva[महाबलः], @deva[महाजातीयः]. In @deva[महतः] @deva[पुत्रः] = @deva[महत्पुत्रः] 'the son of the great man', the two words are not in apposition, so the substitution does not apply. Compounding with @deva[महत्] is governed by @ref[2.1.61]. The term @[samānādhikaraṇa] in the @[sūtra] ensures the rule covers both @[tatpuruṣa] compounds under @ref[2.1.61] and @[bahuvrīhi] compounds like @deva[महाबाहुः]; without it, the @[pratipadokta] maxim would restrict the rule to @[tatpuruṣa] alone. In @deva[महद्भूतश्चन्द्रमा] (@deva[अमहान्] @deva[महान्] @deva[संपन्नः]), the substitution does not occur because the sense of @deva[महत्] is secondary. @[vārttika]: @deva[आ] replaces the final of @deva[महत्] before @deva[घास], @deva[कर], and @deva[विशिष्ट] — with feminine @deva[महती] becoming masculine — even without apposition: @deva[महत्या] @deva[घासः] = @deva[महाघासः], @deva[महत्याः] @deva[करः] = @deva[महाकरः], @deva[महत्याविशिष्टः] = @deva[महाविशिष्टः]. @[vārttika]: @deva[आ] replaces the final of @deva[अष्टन्] before @deva[कपाल] when a sacrificial offering is meant: @deva[अष्टाकपालं] @deva[चरुं] @deva[निर्वपेत]; but @deva[अष्टकपालं] @deva[ब्राह्मणस्य] when no offering is intended. @[vārttika]: @deva[आ] replaces the final of @deva[अष्टन्] before @deva[गौ] when the meaning is 'yoked': @deva[अष्टागवेन] @deva[शकटेन]; but @deva[अष्टगवं] @deva[ब्राह्मणस्य] when yoking is not meant. The @deva[त्] in @deva[आत्] serves as a marker for distinctness.
"""

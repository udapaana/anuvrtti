id = "6.3.49"
numericId = "63049"

[en]
simple = """
The vowel changes that @deva[द्वि], @deva[त्रि], and @deva[अष्टन्] undergo before higher numeral words become optional from @deva[चत्वारिंशत्] (40) onwards. So both @deva[द्विचत्वारिंशत्] and @deva[द्वाचत्वारिंशत्] mean 'forty-two'.
"""

standard = """
The obligatory vowel substitutions for @deva[द्वि], @deva[त्रि], and @deva[अष्टन्] before numeral words become optional from @deva[चत्वारिंशत्] onward. Thus @deva[द्विचत्वारिंशत्] or @deva[द्वाचत्वारिंशत्] (42), @deva[त्रिपञ्चाशत्] or @deva[त्र्यःपञ्चाशत्] (53), @deva[अष्टपञ्चाशत्] or @deva[अष्टापञ्चाशत्] (58). Below @deva[चत्वारिंशत्] the changes are obligatory.
"""

advanced = """
The vowel substitution for @deva[द्वि], @deva[त्रि], and @deva[अष्टन्] becomes optional when @deva[चत्वारिंशत्] or any higher numeral serves as the second member: @deva[द्विचत्वारिंशत्] or @deva[द्वाचत्वारिंशत्], @deva[त्रिपञ्चाशत्] or @deva[त्र्ययःपञ्चाशत्], @deva[अष्टपञ्चाशत्] or @deva[अष्टापञ्चाशत्]. The option extends to compounds with @deva[शत]: @deva[द्विशतम्], @deva[अष्टशतम्], @deva[त्रिशतम्].
"""

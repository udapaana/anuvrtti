id = "6.3.23"
numericId = "63023"

[en]
simple = """
When the first member of a compound ends in @deva[ऋ] (like @deva[होतृ] 'offerer' or @deva[पितृ] 'father') and the relationship expressed is one of study or kinship, the genitive ending is kept. So @deva[होतुःपुत्रः] means 'son of the hotar priest', keeping the genitive @deva[-उः].
"""

standard = """
The @deva[षष्ठी] (genitive) case-affix is retained after @deva[ऋ]-final stems when the compound expresses a @[śiṣya] (student) or @[sambandha] (blood-relative) relationship. Examples: @deva[होतुःपुत्रः] ('son of the hotar'), @deva[पितुःपुत्रः] ('father's son'). Contrast @deva[आचार्यपुत्रः] where the first member does not end in @deva[ऋ] and the affix is elided normally.
"""

advanced = """
The @deva[षष्ठी] (genitive) case-affix is retained after an @deva[ऋ]-final stem expressing a @[śiṣya] (student) or @[sambandha] (blood) relationship: @deva[होतुरन्तेवासिन्], @deva[होतुः] @deva[पुत्रः], @deva[पितुरन्तेवासिन्], @deva[पितुः] @deva[पुत्रः]. The @deva[ऋ]-ending condition is operative: @deva[आचार्यपुत्रः] and @deva[मातुलपुत्रः] show normal elision because these stems do not end in @deva[ऋ]. The relationship through study or blood must hold between the first and second members; therefore the rule does not apply to @deva[होतृधनम्], @deva[पितृधनम्], @deva[होतृगृहम्], @deva[पितृगृहम्], where the second member denotes property or dwelling, not a relational term.
"""

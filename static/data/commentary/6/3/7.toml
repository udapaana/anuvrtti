id = "6.3.7"
numericId = "63007"

[en]
simple = """
When @deva[आत्मन्] ('self') forms part of a grammatical technical term and the dative ending is present, that dative ending (@deva[-ने], meaning 'for the self') is kept rather than dropped. The key example is @deva[आत्मनेपदम्] — the set of verb endings used when the action benefits the subject itself.
"""

standard = """
The @deva[चतुर्थी] (dative) case-affix after @deva[आत्मन्] is not elided when the compound is a grammatical @[samjñā] (technical term). Thus @deva[आत्मनेपदम्] (the @[ātmanepada] verb class) and @deva[आत्मनेभाषा] retain the dative @deva[-ने]. The compounding is by @[yoga-vibhāga] of @ref[2.1.36]. Without this rule, @ref[2.4.71] would delete the dative affix.
"""

advanced = """
The @deva[चतुर्थी] (dative) case-affix is not elided after @deva[आत्मन्] when the compound is a grammatical @[samjñā] (technical term): @deva[आत्मनेपदम्], @deva[आत्मनेभाषा]. Compounding is by @[yoga]-@[vibhāga] of @ref[2.1.36], and the dative carries the sense of @[tadarthya] (purpose).
"""

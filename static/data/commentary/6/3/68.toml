id = "6.3.68"
numericId = "63068"

[en]
simple = """
A monosyllabic word ending in a vowel other than @deva[अ], when followed by a @deva[खित्]-affix word, receives the augment @deva[अम्] (like the Accusative singular ending). So @deva[दिव्] (sky) becomes @deva[दिवं] in @deva[दिवंमन्यः] (one who considers himself heaven).
"""

standard = """
For monosyllabic stems ending in any vowel except @deva[अ], the augment @deva[अम्] — parallel to the Accusative @deva[अम्] suffix — is inserted before a @deva[खित्]-affix word. The example @deva[दिवंमन्यः] (from @deva[दिव्] + @[khac]-affix @deva[मन्य]) illustrates this: the final @deva[इ] of @deva[दिव्] is treated as a vowel-final monosyllable and receives @deva[अम्], yielding @deva[दिवम्] before @deva[मन्य].
"""

advanced = """
A monosyllabic word ending in any vowel other than @deva[अ] (@deva[इच्]) receives the augment @deva[अम्] — inserted as if it were the accusative singular @deva[अम्] suffix — when followed by a @deva[खित्]-affix word. The @[sūtra] is to be read with the continuation @deva[इच] @deva[एकाचोऽम्], @deva[अम्प्रत्ययवच्च]. Examples: @deva[गांमन्यः], @deva[स्त्रींमन्यः] or @deva[स्त्रियंमन्यः], @deva[श्रियंमन्यः], @deva[भ्रुवंमन्यः]. By the @[atideśa] @deva[अम्प्रत्ययवत्], all changes triggered by the accusative ending apply here: substitution of long @deva[आ] (@deva[गांमन्यः], @ref[6.1.93]); @deva[पूर्वसवर्ण] (@deva[स्त्रींमन्यः], @ref[6.1.107]); @[guṇa] (@deva[नरंमन्यः], @ref[7.3.110]); and @deva[इयङ्]/@deva[उवङ्] substitution (@deva[श्रियंमन्यः], @deva[भ्रुवंमन्यः], @ref[6.4.81]). The condition @deva[इच्] (non-@deva[अ] vowel) is significant — @deva[त्वन्मन्यः] (ending in a consonant) is unaffected. The monosyllabic condition excludes @deva[लेखाभ्रुं] @deva[मन्याः]. Since accusative @deva[अम्] is elided after neuter nouns (@ref[7.1.23]), the question arises whether this @deva[अम्] is also elided when @deva[श्री] is treated as neuter: @deva[श्रियमात्मानं] @deva[मन्यते] @deva[ब्राह्मणकुलं] = @deva[श्रियंमन्यम्] or @deva[श्रिमन्यम्]? According to @[Patañjali], the second form (@deva[श्रिमन्यम्]) is correct.
"""

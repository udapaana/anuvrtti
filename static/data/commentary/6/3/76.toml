id = "6.3.76"
numericId = "63076"

[en]
simple = """
In compounds meaning 'one less than' a number (like 'nineteen = twenty minus one'), the negative particle @deva[न] is kept and @deva[एक] receives the augment @deva[अद्] (from @deva[अदुक्]). So @deva[एक] + @deva[न] + @deva[विंशति] → @deva[एकान्नविंशतिः] (nineteen).
"""

standard = """
When @deva[एक] precedes the negative particle @deva[न] in a subtractive numerical compound, @deva[एक] takes the augment @deva[अदुक्] (giving @deva[एकाद्]) while @deva[न] is retained unchanged (no @deva[न्]-elision). The augment @deva[अदुक्] is placed at the end of @deva[एक] by the @deva[उक्]-indicatory convention. The resulting compounds — @deva[एकान्नविंशतिः] (19), @deva[एकान्नत्रिंशत्] (29), etc. — use @deva[न] as a subtractive morpheme in the counting idiom.
"""

advanced = """
The negative particle retains its full form in subtractive compounds beginning with @deva[एक], which itself takes the augment @deva[अदुक्] (@deva[अद्]): @deva[एकेन] @deva[न] @deva[विंशतिः] = @deva[एकान्नविंशतिः], @deva[एकान्नत्रिंशत्]. These are instrumental @deva[तत्पुरुष] compounds. The augment @deva[अदुक्] attaches to the final of the first member, yielding optionally two forms — @deva[एकात्] @deva[न] @deva[विंशतिः] and @deva[एकान्] @deva[न] @deva[विंशति] — by @ref[8.4.45].
"""

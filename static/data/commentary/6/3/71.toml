id = "6.3.71"
numericId = "63071"

[en]
simple = """
Before @deva[पात] when the @deva[ञ्]-marked affix is present, @deva[मुम्] augment is inserted after @deva[श्येन] (hawk) and @deva[तिल] (sesame), giving @deva[श्येनंपाता] (hawk-game) and @deva[तैलंपाता]. Without the @deva[ञ्] affix, no augment is added.
"""

standard = """
The @[āgama] @deva[मुम्] is inserted after @deva[श्येन] and @deva[तिल] specifically before @deva[पात] when the affix @deva[ञ्] (which triggers the @deva[वृद्धि] of @deva[तिल] to @deva[तैल]) is present. The compound @deva[श्येनंपाता] refers to a game named after the hawk's descent; see @ref[4.2.58] for the @deva[ञ्]-affix formation. When @deva[पात] is used without the @deva[ञ्] affix, the form is simply @deva[श्येनपातः] with no @deva[मुम्] augment.
"""

advanced = """
The @deva[आगम] @deva[मुम्] is added after @deva[श्येन] and @deva[तिल] before @deva[पात] when the affix @deva[ञ्] follows: @deva[श्येनपातोऽस्यां] @deva[क्रीडायां] = @deva[श्येनंपाता], @deva[तैलंपाता] (see @ref[4.2.58]). The condition on @deva[ञ्] is essential — without it, the plain form @deva[श्येनपातः] results, with no @deva[मुम्] augment.
"""

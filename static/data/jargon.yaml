      - "liṭ"
      - "parokṣa"
  - term: "aorist"
    termRoman: "aorist"
    category: lakara
    meaning: "General past tense (@deva[लुङ्]). Simple past without specific nuance. Sanskrit: @deva[सामान्य भूतकालः]."

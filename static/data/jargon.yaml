    meaning: "Future passive participle suffixes (@[tavya], @[anīya], @[yat]). Express obligation: 'to be done'."
    sutraRef: "3.1.96"
    related:
      - "tavya"
      - "anīya"
  - term: "अपत्य"
    termRoman: "apatya"
    category: samjna
    meaning: "Offspring or descendant. The meaning expressed by patronymic suffixes like @[aṇ], @[iñ]."
    sutraRef: "4.1.92"
  - term: "गोत्र"
    termRoman: "gotra"
    category: samjna
    meaning: "Clan or lineage. Family name passed through generations, formed with special suffixes."
    related:
      - "apatya"
  - term: "इमनिच्"
    termRoman: "imanic"
    category: pratyaya
    meaning: "Abstract noun suffix (= @[iman]). Forms nouns like @[गरिमन्] 'heaviness' with @[vṛddhi]."
    sutraRef: "5.1.120"
    related:
      - "tva"
      - "tal"
  - term: "यत्"
    termRoman: "yat"
    category: pratyaya
    meaning: "Future passive participle suffix after vowel-final roots. @[गेयम्] 'to be sung'."
    sutraRef: "3.1.97"
    related:
      - "tavya"
      - "kṛtya"
  - term: "इञ्"
    termRoman: "iñ"
    category: pratyaya
    meaning: "Patronymic suffix (= @[i]) after @[a]-final stems. @[दक्ष] → @[दाक्षिः] 'son of Daksha'."
    sutraRef: "4.1.95"
    related:
      - "aṇ"
      - "apatya"
  - term: "ढक्"
    termRoman: "ḍhak"
    category: pratyaya
    meaning: "Patronymic suffix (= @[eya]). @[कुन्ती] → @[कौन्तेयः] 'son of Kunti'."
    related:
      - "apatya"
  - term: "वल्"
    termRoman: "val"
    category: pratyahara
    meaning: "Pratyahara covering most consonants. Used in @[iṭ] augment rules (7.2.35)."
    sutraRef: "7.2.35"
  - term: "झल्"
    termRoman: "jhal"
    category: pratyahara
    meaning: "Pratyahara for obstruent consonants (stops and sibilants). Used in sandhi rules."
  - term: "पररूप"
    termRoman: "pararūpa"
    category: sandhi
    meaning: "Substitution by the following element. In @[a/ā + e/o], the @[e/o] replaces both."
    sutraRef: "6.1.94"
  - term: "पूर्वरूप"
    termRoman: "pūrvarūpa"
    category: sandhi
    meaning: "Substitution by the preceding element. The prior vowel replaces both in certain contexts."
    sutraRef: "6.1.109"
  - term: "प्रकृतिभाव"
    termRoman: "prakṛtibhāva"
    category: sandhi
    meaning: "Retention of original form. No sandhi occurs; both elements remain unchanged."
  - term: "आयादेश"
    termRoman: "āyādeśa"
    category: sandhi
    meaning: "Substitution by @[āy], @[āv], etc. Diphthongs become @[ay], @[av] before vowels."
    sutraRef: "6.1.78"
  - term: "प्रधान"
    termRoman: "pradhāna"
    category: samasa
    meaning: "Primary or principal element. In @[tatpuruṣa], the second member is @[pradhāna]."

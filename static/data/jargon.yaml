    sutraRef: "1.2.43"
    related:
      - "pradhāna"
  - term: "समाहार द्वन्द्व"
    termRoman: "samāhāra dvandva"
    category: samasa
    meaning: "Collective @[dvandva]. Members taken as a group; result is neuter singular: @[पाणिपादम्]."
    related:
      - "dvandva"
  - term: "इतरेतर द्वन्द्व"
    termRoman: "itaretara dvandva"
    category: samasa
    meaning: "Enumerative @[dvandva]. Members counted individually; result is plural: @[रामलक्ष्मणौ]."
    related:
      - "dvandva"
  - term: "विधिलिङ्"
    termRoman: "vidhiliṅ"
    category: lakara
    meaning: "Prescriptive optative. Expresses command, advice, possibility: @[भवेत्] 'should be, may be'."
    sutraRef: "3.3.161"
    related:
      - "āśīrliṅ"
      - "liṅ"
  - term: "आशीर्लिङ्"
    termRoman: "āśīrliṅ"
    category: lakara
    meaning: "Benedictive optative. Expresses blessing or wish: @[भूयात्] 'may it be!'"
    sutraRef: "3.3.173"
    related:
      - "vidhiliṅ"
      - "liṅ"
  - term: "अनद्यतन"
    termRoman: "anadyatana"
    category: lakara
    meaning: "Not of today. Time reference excluding the current day; governs @[laṅ] and @[luṭ]."
    sutraRef: "3.2.111"
  - term: "परोक्ष"
    termRoman: "parokṣa"
    category: lakara
    meaning: "Unwitnessed. Past action not seen by the speaker; expressed by @[liṭ] (perfect)."
    sutraRef: "3.2.115"
    related:
      - "liṭ"
  - term: "स्थानिवत्"
    termRoman: "sthānivat"
    category: samjna

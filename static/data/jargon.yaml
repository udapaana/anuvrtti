      - "ac"
  - term: "consonant"
    termRoman: "consonant"
    category: samjna
    meaning: "A sound requiring a vowel (@deva[व्यञ्जन], @deva[हल्]). Sanskrit has 33 consonants. Sanskrit: @deva[व्यञ्जनम्]."

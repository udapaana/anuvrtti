      - "vyañjana"
      - "hal"
  - term: "semivowel"
    termRoman: "semivowel"
    category: samjna
    meaning: "Sounds between vowels and consonants (@deva[अन्तःस्थ]): @deva[य], @deva[र], @deva[ल], @deva[व]. Sanskrit: @deva[अन्तःस्थाः]."

      - "kartari prayoga"
  - term: "middle"
    termRoman: "middle"
    category: samjna
    meaning: "Middle voice (@deva[आत्मनेपद]). Action for one's own benefit. Sanskrit: @deva[आत्मनेपदम्]."
    related:
      - "ātmanepada"
  - term: "passive"
    termRoman: "passive"
    category: samjna
    meaning: "Passive voice (@deva[कर्मणि प्रयोग]). Object becomes subject; agent in instrumental. Sanskrit: @deva[कर्मणि प्रयोगः]."

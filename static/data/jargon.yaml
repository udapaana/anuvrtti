      - "caturthī"
  - term: "ablative"
    termRoman: "ablative"
    category: vibhakti
    meaning: "Fifth case (@deva[पञ्चमी]). Used for source, separation, or comparison. Sanskrit: @deva[पञ्चमी विभक्ति]."

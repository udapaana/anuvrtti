      - "loṭ"
  - term: "optative"
    termRoman: "optative"
    category: lakara
    meaning: "Potential mood (@deva[लिङ्]). Expresses possibility, wish, or prescription. Sanskrit: @deva[विध्यर्थः]."
    related:
      - "liṅ"
      - "vidhiliṅ"
  - term: "conditional"
    termRoman: "conditional"
    category: lakara
    meaning: "Hypothetical mood (@deva[लृङ्]). Used for 'would have' scenarios. Sanskrit: @deva[सङ्केतार्थः]."
    related:
      - "lṛṅ"
  - term: "benedictive"
    termRoman: "benedictive"
    category: lakara
    meaning: "Blessing mood (@deva[आशीर्लिङ्]). Used for wishes and blessings. Sanskrit: @deva[आशिषि लिङ्]."
    related:
      - "āśīrliṅ"
  - term: "active"
    termRoman: "active"
    category: samjna
    meaning: "Active voice (@deva[परस्मैपद]). Action for another's benefit. Sanskrit: @deva[कर्तरि प्रयोगः]."

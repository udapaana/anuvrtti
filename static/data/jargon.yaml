# Pāṇinian grammatical terminology
# Edited here; loaded at runtime by src/lib/jargon.ts
#
# Fields:
#   term      — Devanagari
#   termRoman — IAST transliteration
#   category  — samjna | pratyahara | karaka | vibhakti | pratyaya | sandhi | lakara | gana | samasa | general
#   meaning   — English (may include @[...] and @deva[...] markup)
#   sutraRef  — defining sūtra id e.g. "1.1.1" (optional)
#   related   — list of termRoman keys for related terms (optional)

terms:
  - term: "संज्ञा"
    termRoman: "saṃjñā"
    category: samjna
    meaning: "Technical term or name. Panini defines many samjnas to create a precise metalanguage."
  - term: "वृद्धि"
    termRoman: "vṛddhi"
    category: samjna
    meaning: "The \"strengthened\" vowel grade: @[ā], @[ai], @[au]. Defined in 1.1.1."
    sutraRef: "1.1.1"
    related:
      - "guṇa"
  - term: "गुण"
    termRoman: "guṇa"
    category: samjna
    meaning: "The \"medium\" vowel grade: @[a], @[e], @[o]. Defined in 1.1.2."
    sutraRef: "1.1.2"
    related:
      - "vṛddhi"
  - term: "स्वर"
    termRoman: "svara"
    category: samjna
    meaning: "Vowel. Defined as the pratyahara \"@[ac]\" in 1.1.9."
    sutraRef: "1.1.9"
    related:
      - "vyañjana"
      - "ac"
  - term: "व्यञ्जन"
    termRoman: "vyañjana"
    category: samjna
    meaning: "Consonant. Defined as the pratyahara \"@[hal]\" in 1.1.10."
    sutraRef: "1.1.10"
    related:
      - "svara"
      - "hal"
  - term: "अन्तःस्थ"
    termRoman: "antaḥstha"
    category: samjna
    meaning: "Semivowel, literally 'standing between' (vowels and consonants). The four sounds @deva[य], @deva[र], @deva[ल], @deva[व] (y, r, l, v)."
    related:
      - "vyañjana"
      - "yaṇ"
  - term: "ऊष्मन्"
    termRoman: "ūṣman"
    category: samjna
    meaning: "Sibilant/fricative, literally 'heat'. The sounds @deva[श], @deva[ष], @deva[स], @deva[ह] (ś, ṣ, s, h)."
    related:
      - "vyañjana"
  - term: "अनुस्वार"
    termRoman: "anusvāra"
    category: samjna
    meaning: "The nasal sound @deva[ं] written as a dot above the line. Represents nasalization of the preceding vowel."
    related:
      - "visarga"
  - term: "सवर्ण"
    termRoman: "savarṇa"
    category: samjna
    meaning: "Homogeneous sounds - same place and effort of articulation."
    sutraRef: "1.1.9"
  - term: "आस्य"
    termRoman: "āsya"
    category: phonetics
    meaning: "Mouth; place of articulation (स्थान). Used in defining homogeneous sounds."
  - term: "प्रयत्न"
    termRoman: "prayatna"
    category: phonetics
    meaning: "Articulatory effort. Internal (आभ्यन्तर) and external (बाह्य) efforts define sound production."
  - term: "इत्"
    termRoman: "it"
    category: samjna
    meaning: "Marker letter (anubandha) that indicates grammatical properties but is deleted."
    sutraRef: "1.3.2"
    related:
      - "anubandha"
  - term: "अनुबन्ध"
    termRoman: "anubandha"
    category: samjna
    meaning: "Same as \"it\" - a marker letter attached to grammatical elements."
    related:
      - "it"
  - term: "लोप"
    termRoman: "lopa"
    category: samjna
    meaning: "Deletion or elision. Markers undergo lopa (1.3.9)."
    sutraRef: "1.3.9"
  - term: "आदेश"
    termRoman: "ādeśa"
    category: samjna
    meaning: "Substitution or replacement. One element replacing another."
    related:
      - "sthānin"
  - term: "स्थानिन्"
    termRoman: "sthānin"
    category: samjna
    meaning: "The original element that gets replaced (by an ādeśa)."
    related:
      - "ādeśa"
  - term: "प्रकृति"
    termRoman: "prakṛti"
    category: samjna
    meaning: "Base or stem to which affixes are added."
    related:
      - "pratyaya"
  - term: "धातु"
    termRoman: "dhātu"
    category: samjna
    meaning: "Verbal root. The base form of verbs listed in the Dhatupatha."
    related:
      - "prakṛti"
      - "prātipadika"
  - term: "प्रातिपदिक"
    termRoman: "prātipadika"
    category: samjna
    meaning: "Nominal stem - a meaningful base that takes case endings."
    related:
      - "dhātu"
  - term: "पद"
    termRoman: "pada"
    category: samjna
    meaning: "Word - a complete inflected form ending in sup or tiṅ."
  - term: "संहिता"
    termRoman: "saṃhitā"
    category: samjna
    meaning: "Close proximity of sounds - the domain where sandhi applies."
    sutraRef: "1.4.109"
  - term: "अधिकार"
    termRoman: "adhikāra"
    category: samjna
    meaning: "Governing rule whose scope extends over subsequent sutras."
  - term: "अनुवृत्ति"
    termRoman: "anuvṛtti"
    category: samjna
    meaning: "Continuation - when a term from a prior sutra carries forward."
  - term: "परिभाषा"
    termRoman: "paribhāṣā"
    category: samjna
    meaning: "Interpretive rule that governs how other rules are applied."
  - term: "विधि"
    termRoman: "vidhi"
    category: samjna
    meaning: "Operational rule that prescribes a grammatical operation."
  - term: "प्रत्याहार"
    termRoman: "pratyāhāra"
    category: pratyahara
    meaning: "A shorthand notation for sound groups using the Shiva Sutras."
  - term: "अच्"
    termRoman: "ac"
    category: pratyahara
    meaning: "All vowels: @[a], @[i], @[u], @[ṛ], @[ḷ], @[e], @[o], @[ai], @[au]."
  - term: "हल्"
    termRoman: "hal"
    category: pratyahara
    meaning: "All consonants."
  - term: "अण्"
    termRoman: "aṇ"
    category: pratyahara
    meaning: "Simple vowels: @[a], @[i], @[u]."
  - term: "इक्"
    termRoman: "ik"
    category: pratyahara
    meaning: "The vowels i, u, ṛ, ḷ - those that become semivowels."
    related:
      - "yaṇ"
  - term: "यण्"
    termRoman: "yaṇ"
    category: pratyahara
    meaning: "Semivowels: @[y], @[v], @[r], @[l]."
    related:
      - "ik"
  - term: "एच्"
    termRoman: "ec"
    category: pratyahara
    meaning: "Diphthongs: @[e], @[o], @[ai], @[au]."
  - term: "कारक"
    termRoman: "kāraka"
    category: karaka
    meaning: "Semantic role - the relation between a noun and the verbal action."
  - term: "कर्तृ"
    termRoman: "kartṛ"
    category: karaka
    meaning: "Agent - the independent doer of the action."
    sutraRef: "1.4.54"
  - term: "कर्मन्"
    termRoman: "karman"
    category: karaka
    meaning: "Object - what the agent most desires to attain through the action."
    sutraRef: "1.4.49"
  - term: "करण"
    termRoman: "karaṇa"
    category: karaka
    meaning: "Instrument - the most effective means of accomplishing the action."
    sutraRef: "1.4.42"
  - term: "सम्प्रदान"
    termRoman: "sampradāna"
    category: karaka
    meaning: "Recipient - the one for whom the action is intended."
    sutraRef: "1.4.32"
  - term: "अपादान"
    termRoman: "apādāna"
    category: karaka
    meaning: "Source - the fixed point from which movement occurs."
    sutraRef: "1.4.24"
  - term: "अधिकरण"
    termRoman: "adhikaraṇa"
    category: karaka
    meaning: "Locus - the location or support of the action."
    sutraRef: "1.4.45"
  - term: "विभक्ति"
    termRoman: "vibhakti"
    category: vibhakti
    meaning: "Inflectional ending - case endings (sup) or verb endings (tiṅ)."
    sutraRef: "1.4.104"
  - term: "प्रथमा"
    termRoman: "prathamā"
    category: vibhakti
    meaning: "First case (nominative) - used for the subject or naming."
  - term: "द्वितीया"
    termRoman: "dvitīyā"
    category: vibhakti
    meaning: "Second case (accusative) - used for the direct object."
  - term: "तृतीया"
    termRoman: "tṛtīyā"
    category: vibhakti
    meaning: "Third case (instrumental) - used for the instrument or agent in passive."
  - term: "चतुर्थी"
    termRoman: "caturthī"
    category: vibhakti
    meaning: "Fourth case (dative) - used for the recipient or purpose."
  - term: "पञ्चमी"
    termRoman: "pañcamī"
    category: vibhakti
    meaning: "Fifth case (ablative) - used for source or comparison."
  - term: "षष्ठी"
    termRoman: "ṣaṣṭhī"
    category: vibhakti
    meaning: "Sixth case (genitive) - used for possession or relation."
  - term: "सप्तमी"
    termRoman: "saptamī"
    category: vibhakti
    meaning: "Seventh case (locative) - used for location in space or time."
  - term: "प्रत्यय"
    termRoman: "pratyaya"
    category: pratyaya
    meaning: "Suffix or affix added after a base."
    sutraRef: "3.1.1"
  - term: "सुप्"
    termRoman: "sup"
    category: pratyaya
    meaning: "Nominal case endings (21 total: 7 cases × 3 numbers)."
    related:
      - "subanta"
  - term: "सुबन्त"
    termRoman: "subanta"
    category: samjna
    meaning: "A word ending in @[sup] (nominal endings). Declined nouns, adjectives, and pronouns. Contrasts with @[tiṅanta]."
    related:
      - "sup"
      - "tiṅanta"
      - "prātipadika"
  - term: "तिङ्"
    termRoman: "tiṅ"
    category: pratyaya
    meaning: "Verbal personal endings (18 total: 3 persons × 3 numbers × 2 padas)."
    related:
      - "tiṅanta"
  - term: "तिङन्त"
    termRoman: "tiṅanta"
    category: samjna
    meaning: "A word ending in @[tiṅ] (verbal endings). Conjugated finite verbs. Contrasts with @[subanta]."
    related:
      - "tiṅ"
      - "subanta"
      - "dhātu"
  - term: "कृत्"
    termRoman: "kṛt"
    category: pratyaya
    meaning: "Primary suffix added directly to a verbal root."
  - term: "तद्धित"
    termRoman: "taddhita"
    category: pratyaya
    meaning: "Secondary suffix added to a nominal stem."
  - term: "सन्धि"
    termRoman: "sandhi"
    category: sandhi
    meaning: "Junction - sound changes when morphemes or words combine."
  - term: "दीर्घ"
    termRoman: "dīrgha"
    category: sandhi
    meaning: "Long (vowel) - the lengthened version of a vowel."
  - term: "ह्रस्व"
    termRoman: "hrasva"
    category: sandhi
    meaning: "Short (vowel) - the basic short vowel."
  - term: "प्लुत"
    termRoman: "pluta"
    category: sandhi
    meaning: "Prolated (vowel) - extra-long, used in calling."
  - term: "लकार"
    termRoman: "lakāra"
    category: lakara
    meaning: "Tense-mood marker. The 10 lakaras indicate tense, mood, and aspect of verbs."
  - term: "लट्"
    termRoman: "laṭ"
    category: lakara
    meaning: "Present tense (vartamāna). Used for ongoing or habitual actions."
    sutraRef: "3.2.123"
  - term: "लङ्"
    termRoman: "laṅ"
    category: lakara
    meaning: "Imperfect (anadyatana-bhūta). Past tense not of today."
    sutraRef: "3.2.111"
  - term: "लोट्"
    termRoman: "loṭ"
    category: lakara
    meaning: "Imperative mood. Used for commands, requests, and blessings."
    sutraRef: "3.3.162"
  - term: "लिङ्"
    termRoman: "liṅ"
    category: lakara
    meaning: "Optative/potential mood. Has two forms: @[vidhiliṅ] (prescription) and @[āśīrliṅ] (benediction)."
    sutraRef: "3.3.161"
  - term: "लिट्"
    termRoman: "liṭ"
    category: lakara
    meaning: "Perfect tense (parokṣa-bhūta). Past not witnessed by speaker."
    sutraRef: "3.2.115"
  - term: "लुट्"
    termRoman: "luṭ"
    category: lakara
    meaning: "Periphrastic future. Future not of today."
    sutraRef: "3.3.15"
  - term: "लृट्"
    termRoman: "lṛṭ"
    category: lakara
    meaning: "Simple future. General future tense."
    sutraRef: "3.3.13"
  - term: "लुङ्"
    termRoman: "luṅ"
    category: lakara
    meaning: "Aorist (bhūta). General past tense."
    sutraRef: "3.2.110"
  - term: "लृङ्"
    termRoman: "lṛṅ"
    category: lakara
    meaning: "Conditional. Used for hypothetical conditions."
    sutraRef: "3.3.139"
  - term: "लेट्"
    termRoman: "leṭ"
    category: lakara
    meaning: "Vedic subjunctive. Found only in Vedic texts."
    sutraRef: "3.4.7"
  - term: "भूत"
    termRoman: "bhūta"
    category: lakara
    meaning: "Past time. Action already completed."
  - term: "वर्तमान"
    termRoman: "vartamāna"
    category: lakara
    meaning: "Present time. Action ongoing or habitual."
  - term: "भविष्यत्"
    termRoman: "bhaviṣyat"
    category: lakara
    meaning: "Future time. Action yet to occur."
  - term: "गण"
    termRoman: "gaṇa"
    category: gana
    meaning: "Verb class. The 10 classes determine how roots form their present stem."
  - term: "भ्वादि"
    termRoman: "bhvādi"
    category: gana
    meaning: "First class (class 1). Adds @[guṇa] and śap vikaraṇa. E.g., @[bhū] → @[bhavati]."
  - term: "अदादि"
    termRoman: "adādi"
    category: gana
    meaning: "Second class (class 2). No vikaraṇa, root directly takes endings. E.g., @[ad] → @[atti]."
  - term: "जुहोत्यादि"
    termRoman: "juhotyādi"
    category: gana
    meaning: "Third class (class 3). Reduplication without vikaraṇa. E.g., @[hu] → @[juhoti]."
  - term: "दिवादि"
    termRoman: "divādi"
    category: gana
    meaning: "Fourth class (class 4). Adds śyan vikaraṇa. E.g., @[div] → @[dīvyati]."
  - term: "स्वादि"
    termRoman: "svādi"
    category: gana
    meaning: "Fifth class (class 5). Adds śnu vikaraṇa. E.g., @[su] → @[sunoti]."
  - term: "तुदादि"
    termRoman: "tudādi"
    category: gana
    meaning: "Sixth class (class 6). Adds śa vikaraṇa (accent on ending). E.g., @[tud] → @[tudati]."
  - term: "रुधादि"
    termRoman: "rudhādi"
    category: gana
    meaning: "Seventh class (class 7). Inserts nasal (śnam) before final consonant. E.g., @[rudh] → @[ruṇaddhi]."
  - term: "तनादि"
    termRoman: "tanādi"
    category: gana
    meaning: "Eighth class (class 8). Adds u vikaraṇa. E.g., @[tan] → @[tanoti]."
  - term: "क्र्यादि"
    termRoman: "kryādi"
    category: gana
    meaning: "Ninth class (class 9). Adds śnā vikaraṇa. E.g., @[krī] → @[krīṇāti]."
  - term: "चुरादि"
    termRoman: "curādi"
    category: gana
    meaning: "Tenth class (class 10). Adds ṇic (causative-like). E.g., @[cur] → @[corayati]."
  - term: "समास"
    termRoman: "samāsa"
    category: samasa
    meaning: "Compound - multiple words joined into a single unit."
    sutraRef: "2.1.3"
  - term: "तत्पुरुष"
    termRoman: "tatpuruṣa"
    category: samasa
    meaning: "Determinative compound. The second member is primary, first qualifies it."
    sutraRef: "2.1.22"
  - term: "कर्मधारय"
    termRoman: "karmadhāraya"
    category: samasa
    meaning: "Appositional compound. Both members refer to the same thing (subset of @[tatpuruṣa])."
    sutraRef: "1.2.42"
  - term: "द्विगु"
    termRoman: "dvigu"
    category: samasa
    meaning: "Numeral compound. First member is a number (subset of @[tatpuruṣa])."
    sutraRef: "2.1.52"
  - term: "बहुव्रीहि"
    termRoman: "bahuvrīhi"
    category: samasa
    meaning: "Possessive compound. The compound denotes something having what the members describe."
    sutraRef: "2.2.23"
  - term: "द्वन्द्व"
    termRoman: "dvandva"
    category: samasa
    meaning: "Copulative compound. Members are coordinated (X and Y)."
    sutraRef: "2.2.29"
  - term: "अव्ययीभाव"
    termRoman: "avyayībhāva"
    category: samasa
    meaning: "Adverbial compound. First member is an indeclinable, result is neuter singular."
    sutraRef: "2.1.5"
  - term: "समाहार"
    termRoman: "samāhāra"
    category: samasa
    meaning: "Collective sense. When a dvandva denotes the group as a whole (neuter singular)."
  - term: "क्त"
    termRoman: "kta"
    category: pratyaya
    meaning: "Past passive participle suffix. Forms adjectives meaning 'was done' (@[niṣṭhā])."
    sutraRef: "3.2.102"
    related:
      - "ktavatu"
  - term: "क्तवतु"
    termRoman: "ktavatu"
    category: pratyaya
    meaning: "Past active participle suffix. Forms adjectives meaning 'one who did' (@[niṣṭhā])."
    sutraRef: "3.2.102"
    related:
      - "kta"
  - term: "क्त्वा"
    termRoman: "ktvā"
    category: pratyaya
    meaning: "Absolutive suffix. 'Having done X' - connects sequential actions by same agent."
    sutraRef: "3.4.21"
    related:
      - "lyap"
  - term: "ल्यप्"
    termRoman: "lyap"
    category: pratyaya
    meaning: "Absolutive suffix after upasarga. Same meaning as ktvā but used with prefixed verbs."
    sutraRef: "3.4.22"
    related:
      - "ktvā"
  - term: "तुमुन्"
    termRoman: "tumun"
    category: pratyaya
    meaning: "Infinitive suffix. Forms verbal nouns meaning 'to do'."
    sutraRef: "3.3.10"
  - term: "शतृ"
    termRoman: "śatṛ"
    category: pratyaya
    meaning: "Present active participle suffix (@[parasmaipada]). 'One who is doing'."
    sutraRef: "3.2.124"
    related:
      - "śānac"
  - term: "शानच्"
    termRoman: "śānac"
    category: pratyaya
    meaning: "Present participle suffix (@[ātmanepada]). 'One who is doing' (middle voice)."
    sutraRef: "3.2.124"
    related:
      - "śatṛ"
  - term: "तव्य"
    termRoman: "tavya"
    category: pratyaya
    meaning: "Future passive participle suffix. 'Should be done, must be done'."
    sutraRef: "3.1.96"
    related:
      - "anīya"
      - "ṇyat"
  - term: "अनीय"
    termRoman: "anīya"
    category: pratyaya
    meaning: "Future passive participle suffix. Same meaning as tavya."
    sutraRef: "3.1.96"
    related:
      - "tavya"
      - "ṇyat"
  - term: "ण्यत्"
    termRoman: "ṇyat"
    category: pratyaya
    meaning: "Future passive participle suffix (= ya). Same meaning as tavya."
    sutraRef: "3.1.124"
    related:
      - "tavya"
      - "anīya"
  - term: "तव्यत्"
    termRoman: "tavyat"
    category: pratyaya
    meaning: "Variant of tavya. Future passive participle suffix."
    related:
      - "tavya"
  - term: "विकरण"
    termRoman: "vikaraṇa"
    category: pratyaya
    meaning: "Tense-mood affix inserted between root and personal ending."
  - term: "शप्"
    termRoman: "śap"
    category: pratyaya
    meaning: "Vikaraṇa for class 1 (bhvādi). Adds @[a] to stem."
    sutraRef: "3.1.68"
  - term: "श्यन्"
    termRoman: "śyan"
    category: pratyaya
    meaning: "Vikaraṇa for class 4 (divādi). Adds @[ya] to stem."
    sutraRef: "3.1.69"
  - term: "श्नु"
    termRoman: "śnu"
    category: pratyaya
    meaning: "Vikaraṇa for class 5 (svādi). Adds @[nu]/@[no] to stem."
    sutraRef: "3.1.73"
  - term: "श्ना"
    termRoman: "śnā"
    category: pratyaya
    meaning: "Vikaraṇa for class 9 (kryādi). Adds @[nā]/@[nī] to stem."
    sutraRef: "3.1.81"
  - term: "श्नम्"
    termRoman: "śnam"
    category: pratyaya
    meaning: "Vikaraṇa for class 7 (rudhādi). Inserts nasal before final consonant."
    sutraRef: "3.1.78"
  - term: "मतुप्"
    termRoman: "matup"
    category: pratyaya
    meaning: "Possessive suffix meaning 'having X'. Forms adjectives like @[dhana] → @[dhanavat]."
    sutraRef: "5.2.94"
  - term: "तल्"
    termRoman: "tal"
    category: pratyaya
    meaning: "Abstract noun suffix (= tā). Forms feminine nouns meaning '-ness, -hood'."
    sutraRef: "5.1.119"
    related:
      - "tva"
  - term: "त्व"
    termRoman: "tva"
    category: pratyaya
    meaning: "Abstract noun suffix (= tva). Forms neuter nouns meaning '-ness, -hood'."
    sutraRef: "5.1.119"
    related:
      - "tal"
  - term: "इन्"
    termRoman: "in"
    category: pratyaya
    meaning: "Possessive suffix meaning 'having X'. Alternative to matup."
  - term: "णिच्"
    termRoman: "ṇic"
    category: pratyaya

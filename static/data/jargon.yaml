      - "pañcamī"
  - term: "genitive"
    termRoman: "genitive"
    category: vibhakti
    meaning: "Sixth case (@deva[षष्ठी]). Used for possession and various relations. Sanskrit: @deva[षष्ठी विभक्ति]."
    related:
      - "ṣaṣṭhī"
  - term: "locative"
    termRoman: "locative"
    category: vibhakti
    meaning: "Seventh case (@deva[सप्तमी]). Used for location in space or time. Sanskrit: @deva[सप्तमी विभक्ति]."
    related:
      - "saptamī"
  - term: "vocative"
    termRoman: "vocative"
    category: vibhakti

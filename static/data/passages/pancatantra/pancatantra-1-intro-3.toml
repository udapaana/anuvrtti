id = "pancatantra-1-intro-3"
source = "pancatantra"
reference = "1.intro.3"
title = "The King's Lament"
sanskrit = "किम् एभिः पुत्रैः यैः न विद्या न विनयः अधिगतः । जातमात्रः खलु गर्दभः अपि मातृपितृभ्याम् बहुमन्यते ।"
padaccheda = "किम् एभिः पुत्रैः यैः न विद्या न विनयः अधिगतः जात-मात्रः खलु गर्दभः अपि मातृ-पितृभ्याम् बहुमन्यते"
transliteration = "kim ebhiḥ putraiḥ yaiḥ na vidyā na vinayaḥ adhigataḥ | jāta-mātraḥ khalu gardabhaḥ api mātṛ-pitṛbhyām bahumanyate |"
translation = "What use are these sons by whom neither learning nor discipline has been acquired? Even a donkey, as soon as born, is valued by its mother and father."
difficulty = 2
meterInfo = "null"
prerequisiteGrammar = ["vibhakti-instrumental", "relative-clauses"]


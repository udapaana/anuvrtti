id = "pancatantra-1-lion-bull-1"
source = "pancatantra"
reference = "1.1.1"
title = "The Lion and the Bull - Opening"
sanskrit = "अस्ति मथुरायां वर्धमानो नाम वणिक् । स एकदा गाडीभ्यां बहुधनं गृहीत्वा व्यापाराय प्रस्थितः ।"
padaccheda = "अस्ति मथुरायाम् वर्धमानः नाम वणिक् सः एकदा गाडीभ्याम् बहु-धनम् गृहीत्वा व्यापाराय प्रस्थितः"
transliteration = "asti mathurāyāṃ vardhamāno nāma vaṇik | sa ekadā gāḍībhyāṃ bahu-dhanaṃ gṛhītvā vyāpārāya prasthitaḥ |"
translation = "In Mathura there is a merchant named Vardhamāna. One day, taking much wealth in two carts, he set out for trade."
difficulty = 1

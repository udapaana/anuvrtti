id = "subhasita-mitra-1"
source = "subhasitas"
reference = "mitra.1"
title = "The Test of Friendship"
sanskrit = """
आपदि मित्रपरीक्षा शूरपरीक्षा रणाङ्गणे ।
विनये वंशपरीक्षा शीलपरीक्षा धनक्षये ॥
"""
padaccheda = "आपदि मित्र-परीक्षा शूर-परीक्षा रण-अङ्गणे विनये वंश-परीक्षा शील-परीक्षा धन-क्षये"
transliteration = """
āpadi mitra-parīkṣā śūra-parīkṣā raṇāṅgaṇe |
vinaye vaṃśa-parīkṣā śīla-parīkṣā dhana-kṣaye ||
"""
translation = "In calamity is the test of a friend; in the battlefield, the test of a hero; in conduct, the test of lineage; in loss of wealth, the test of character."
difficulty = 1
meterInfo = "anuṣṭubh"
prerequisiteGrammar = ["vibhakti-locative", "compounds-tatpurusha"]


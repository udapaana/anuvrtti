id = "subhasita-kala-1"
source = "subhasitas"
reference = "kāla.1"
title = "Time Devours All"
sanskrit = """
कालः पचति भूतानि कालः संहरते प्रजाः ।
कालः सुप्तेषु जागर्ति कालो हि दुरतिक्रमः ॥
"""
padaccheda = "कालः पचति भूतानि कालः संहरते प्रजाः कालः सुप्तेषु जागर्ति कालः हि दुरतिक्रमः"
transliteration = """
kālaḥ pacati bhūtāni kālaḥ saṃharate prajāḥ |
kālaḥ supteṣu jāgarti kālo hi duratikramaḥ ||
"""
translation = "Time cooks (ripens/destroys) beings; Time gathers up creatures; Time stays awake while [all] sleep; Time indeed is hard to overcome."
difficulty = 2
meterInfo = "anuṣṭubh"
prerequisiteGrammar = ["tinganta-lat", "krt-kta", "compounds-bahuvrihi"]


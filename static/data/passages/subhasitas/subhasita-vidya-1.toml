id = "subhasita-vidya-1"
source = "subhasitas"
reference = "vidyā.1"
title = "The Fruit of Learning"
sanskrit = """
विद्या ददाति विनयं विनयाद्याति पात्रताम् ।
पात्रत्वाद्धनमाप्नोति धनाद्धर्मं ततः सुखम् ॥
"""
padaccheda = "विद्या ददाति विनयम् विनयात् याति पात्रताम् पात्रत्वात् धनम् आप्नोति धनात् धर्मम् ततः सुखम्"
transliteration = """
vidyā dadāti vinayaṃ vinayād yāti pātratām |
pātratvād dhanam āpnoti dhanād dharmaṃ tataḥ sukham ||
"""
translation = "Learning gives humility; from humility comes worthiness; from worthiness one obtains wealth; from wealth, dharma; and from that, happiness."
difficulty = 1
meterInfo = "anuṣṭubh (8 syllables per quarter)"
prerequisiteGrammar = ["vibhakti-ablative", "tinganta-lat"]


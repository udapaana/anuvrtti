id = "subhasita-satya-1"
source = "subhasitas"
reference = "satya.1"
title = "Truth and Kindness"
sanskrit = """
सत्यं ब्रूयात् प्रियं ब्रूयात् न ब्रूयात् सत्यमप्रियम् ।
प्रियं च नानृतं ब्रूयात् एष धर्मः सनातनः ॥
"""
padaccheda = "सत्यम् ब्रूयात् प्रियम् ब्रूयात् न ब्रूयात् सत्यम् अप्रियम् प्रियम् च न अनृतम् ब्रूयात् एषः धर्मः सनातनः"
transliteration = """
satyaṃ brūyāt priyaṃ brūyāt na brūyāt satyam apriyam |
priyaṃ ca nānṛtaṃ brūyāt eṣa dharmaḥ sanātanaḥ ||
"""
translation = "One should speak the truth; one should speak pleasantly; one should not speak truth that is unpleasant; nor should one speak pleasant falsehood—this is the eternal dharma."
difficulty = 2
meterInfo = "anuṣṭubh"
prerequisiteGrammar = ["tinganta-lin"]


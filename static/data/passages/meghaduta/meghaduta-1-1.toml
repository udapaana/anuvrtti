id = "meghaduta-1-1"
source = "meghaduta"
reference = "1.1"
title = "The Exiled Yakṣa"
sanskrit = """
कश्चित्कान्ताविरहगुरुणा स्वाधिकारात्प्रमत्तः
शापेनास्तंगमितमहिमा वर्षभोग्येण भर्तुः ।
यक्षश्चक्रे जनकतनयास्नानपुण्योदकेषु
स्निग्धच्छायातरुषु वसतिं रामगिर्याश्रमेषु ॥
"""
padaccheda = "कश्चित् कान्ता-विरह-गुरुणा स्व-अधिकारात् प्रमत्तः शापेन अस्तंगमित-महिमा वर्ष-भोग्येण भर्तुः यक्षः चक्रे जनक-तनया-स्नान-पुण्य-उदकेषु स्निग्ध-छाया-तरुषु वसतिम् रामगिरि-आश्रमेषु"
transliteration = """
kaścit kāntā-viraha-guruṇā svādhikārāt pramattaḥ
śāpenāstaṃgamita-mahimā varṣa-bhogyena bhartuḥ |
yakṣaś cakre janaka-tanayā-snāna-puṇyodakeṣu
snigdha-chāyā-taruṣu vasatiṃ rāmagiry-āśrameṣu ||
"""
translation = "A certain yakṣa, negligent of his duties due to the weight of separation from his beloved, his glory eclipsed by a curse from his master lasting a year, made his dwelling in the hermitages of Rāmagiri—where the waters are sanctified by Sītā's bathing, beneath trees of cool shade."
difficulty = 3
meterInfo = "mandākrāntā (17 syllables per quarter: ˘ ˘ ˘ ˘ | ˘ ¯ ¯ ¯ | ˘ ˘ ¯ ˘ ¯ ˘ ¯ ¯)"
prerequisiteGrammar = ["compounds-tatpurusha", "compounds-bahuvrihi", "vibhakti-instrumental", "vibhakti-locative"]


id = "meghaduta-1-2"
source = "meghaduta"
reference = "1.2"
title = "Months of Separation"
sanskrit = """
तस्मिन्नद्रौ कतिचिदबलाविप्रयुक्तः स कामी
नीत्वा मासान्कनकवलयभ्रंशरिक्तप्रकोष्ठः ।
आषाढस्य प्रथमदिवसे मेघमाश्लिष्टसानुं
वप्रक्रीडापरिणतगजप्रेक्षणीयं ददर्श ॥
"""
padaccheda = "तस्मिन् अद्रौ कतिचित् अबला-विप्रयुक्तः सः कामी नीत्वा मासान् कनक-वलय-भ्रंश-रिक्त-प्रकोष्ठः आषाढस्य प्रथम-दिवसे मेघम् आश्लिष्ट-सानुम् वप्र-क्रीडा-परिणत-गज-प्रेक्षणीयम् ददर्श"
transliteration = """
tasminn adrau katicit abalā-viprayuktaḥ sa kāmī
nītvā māsān kanaka-valaya-bhraṃśa-rikta-prakoṣṭhaḥ |
āṣāḍhasya prathama-divase megham āśliṣṭa-sānuṃ
vapra-krīḍā-pariṇata-gaja-prekṣaṇīyaṃ dadarśa ||
"""
translation = "On that mountain, separated from his slender wife, that love-sick one, having passed some months with forearms empty from the slipping of golden bracelets, on the first day of Āṣāḍha saw a cloud embracing the peak—resembling an elephant playfully butting a rampart."
difficulty = 3
meterInfo = "mandākrāntā"
prerequisiteGrammar = ["tinganta-lit", "krt-ktva", "compounds-tatpurusha"]


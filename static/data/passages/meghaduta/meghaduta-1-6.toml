id = "meghaduta-1-6"
source = "meghaduta"
reference = "1.6"
title = "The Request to the Cloud"
sanskrit = """
धूमज्योतिःसलिलमरुतां सन्निपातः क्व मेघः
सन्देशार्थाः क्व पटुकरणैः प्राणिभिः प्रापणीयाः ।
इत्यौत्सुक्यादपरिगणयन्गुह्यकस्तं ययाचे
कामार्ता हि प्रकृतिकृपणाश्चेतनाचेतनेषु ॥
"""
padaccheda = "धूम-ज्योतिः-सलिल-मरुताम् सन्निपातः क्व मेघः सन्देश-अर्थाः क्व पटु-करणैः प्राणिभिः प्रापणीयाः इति औत्सुक्यात् अपरिगणयन् गुह्यकः तम् ययाचे काम-आर्ताः हि प्रकृति-कृपणाः चेतन-अचेतनेषु"
transliteration = """
dhūma-jyotiḥ-salila-marutāṃ sannipātaḥ kva meghaḥ
sandeśārthāḥ kva paṭu-karaṇaiḥ prāṇibhiḥ prāpaṇīyāḥ |
ity autsukyād aparigaṇayan guhyakas taṃ yayāce
kāmārtā hi prakṛti-kṛpaṇāś cetanācetaneṣu ||
"""
translation = "Where is a cloud—a mere combination of smoke, fire, water, and wind? And where are messages, to be carried by living beings with keen senses? Yet, out of longing, not considering this, the yakṣa beseeched it—for those afflicted by love are naturally pathetic regarding both the conscious and unconscious."
difficulty = 3
meterInfo = "mandākrāntā"
prerequisiteGrammar = ["compounds-dvandva", "krt-tavya", "krt-shatr"]


[[sections.items]]
sanskrit_telugu = "వృక్షేభ్యః"
telugu_gloss = "చెట్టునుండి, వల్ల, కొఱకు"
english = "from/for the trees"

[[sections.items]]
sanskrit_telugu = "పృష్ట్వా"
telugu_gloss = "అడిగి"
english = "having asked"

[[sections.items]]
sanskrit_telugu = "పాస్యతి"
telugu_gloss = "త్రాగఁగలఁడు"
english = "will drink"

[[sections.items]]
sanskrit_telugu = "వదతి"
telugu_gloss = "చెప్పుచున్నాఁడు"
english = "says, tells"

[[sections.items]]
sanskrit_telugu = "చరతి"
telugu_gloss = "నడచుచున్నాఁడు"
english = "walks, moves"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "కిమ రే క్షీరం పాస్యసి కిం?"
english = "Hey, will you drink the milk?"
telugu = "ఏమిరా! పాలు త్రాగెదవా?"

[[sections.items]]
n = 2
sanskrit_telugu = "బాలకః వృక్షాత్ అపతత్."
english = "The boy fell from the tree."
telugu = "పిల్లవాఁడు చెట్టు నుండి పడెను."

[[sections.items]]
n = 3
sanskrit_telugu = "త్వం తత్ర మాగచ్ఛ."
english = "Do not go there."
telugu = "నీవు అక్కడికి వెళ్ళకుము."

[[sections.items]]
n = 4
sanskrit_telugu = "తే బాలకాః దోష్యం కరిష్యంతి."
english = "Those boys will prepare the sour curry."
telugu = "ఆ పిల్లలు పులుసు చేయఁగలరు."

[[sections.items]]
n = 5
sanskrit_telugu = "బ్రాహ్మణాః స్నానంకృత్వాఽతటాకాత్ అగచ్ఛంతి."
english = "The brahmins, having bathed, are coming away from the pond."
telugu = "బ్రాహ్మణులు స్నానము చేసి చెఱువు నుండి వచ్చుచున్నారు."

[[sections.items]]
n = 6
sanskrit_telugu = "అనంతరం భోజనం కరిష్యంతి."
english = "Afterwards they will eat."
telugu = "తరువాత భోజనము చేయఁగలరు."

[[sections.items]]
n = 7
sanskrit_telugu = "అహమపి స్నానార్థం గచ్ఛామి."
english = "I also am going to bathe."
telugu = "నేనును స్నానమునకు వెళ్ళుచున్నాను."

[[sections.items]]
n = 8
sanskrit_telugu = "భోజనార్థం ఆలస్యం మాకురుత."
english = "Do not be late for the meal."
telugu = "భోజనమునకు ఆలస్యము చేయకుఁడు."

[[sections.items]]
n = 9
sanskrit_telugu = "తవ జనకః ఏతావత్పర్యంతం గ్రామాత్ నాగచ్ఛత్."
english = "Your father has not yet come from the village."
telugu = "నీ తండ్రి ఇంతవఱకు ఊరినుండి రాలేదు."

[[sections.items]]
n = 10
sanskrit_telugu = "శ్వః ఆగమిష్యతి కింవా; తవానుజం ప్రక్ష్యసిచేత్ సః వదిష్యతి."
english = "Will he come tomorrow? If you ask your younger brother, he will say."
telugu = "రేపు వత్తాఁడా; నీ తమ్మునిని అడిగినచో వాఁడు చెప్పఁగలఁడు."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "ఆ పిల్లవానిని పాలు త్రాగుటకు పిలువుము."
english = "Call that boy to drink milk."
sanskrit_telugu = "తం బాలకం క్షీరం పాతుం ఆహ్వాయ."

[[sections.items]]
n = 2
telugu = "అక్కడ నామంచ మున్నదిగాని ఇట్లు తీసికొనిరమ్ము."
english = "There is my cot there; bring it like this."
sanskrit_telugu = "తత్ర మమ మంచమస్తి; ఇత్థం ఆనయ."

[[sections.items]]
n = 3
telugu = "నేను తీసికొని రాఁజాలను."
english = "I cannot bring it."
sanskrit_telugu = "అహం ఆనేతుం న శక్నోమి."

[[sections.items]]
n = 4
telugu = "మీతమ్ముఁడు తీసికొని రానిమ్ము."
english = "Let your younger brother bring it."
sanskrit_telugu = "తవ అనుజః ఆనయతు."

[[sections.items]]
n = 5
telugu = "నీవు పిల్లవానిని అడిగి అక్కడకు వెళ్ళుము."
english = "Ask the boy and go there."
sanskrit_telugu = "త్వం బాలకం పృష్ట్వా తత్ర గచ్ఛ."

[[sections.items]]
n = 6
telugu = "ఆపిల్ల లల్లరి చేయుచున్నారు."
english = "Those children are making noise."
sanskrit_telugu = "తే బాలకాః కోలాహలం కుర్వంతి."

[[sections.items]]
n = 7
telugu = "మాయొక్క పండ్లు నెవరు తిన్నారు?"
english = "Who ate our fruits?"
sanskrit_telugu = "అస్మాకం ఫలాని కః అఖాదత్?"

[[sections.items]]
n = 8
telugu = "మీరే తిన్నారుగా."
english = "You yourselves ate, didn't you."
sanskrit_telugu = "యూయమేవ అఖాదత ఖలు."

[[sections.items]]
n = 9
telugu = "అయ్యో చెట్టునుండి పండ్లు పడ్డవి."
english = "Alas, the fruits fell from the tree."
sanskrit_telugu = "బత! ఫలాని వృక్షాత్ అపతన్."

[[sections.items]]
n = 10
telugu = "మీ చెంబులో కొంచెము పాలున్నచో నేను త్రాగెదను."
english = "If there is a little milk in your vessel, I will drink it."
sanskrit_telugu = "తవ కలశే కించిత్ క్షీరమస్తి చేత్ అహం పాస్యామి."

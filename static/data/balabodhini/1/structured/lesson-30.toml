id = "balabodhini-1-30"
source = "balabodhini"
part = 1
number = 30
title_sanskrit_telugu = "త్రింశః పాఠః"
title_telugu = "ముప్పదవ పాఠము"
title_english = "Thirtieth Lesson"
grammar_focus = "instrumental pronouns mayā, asmābhiḥ, tvayā; adverbs itaḥpūrvam, itaḥparam, iti; verbs paśyati (sees), drakṣyati (will see), darśayati (shows)"


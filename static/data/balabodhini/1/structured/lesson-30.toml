[[sections.items]]
telugu = "కరణకారకము — మయా, అస్మాభిః, త్వయా; దృశ్ ధాతువు"
english = "Instrumental case forms and the verb 'to see'"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "మయా"
telugu_gloss = "నాచేత, నాతో"
english = "by me / with me"

[[sections.items]]
sanskrit_telugu = "ఇతఃపూర్వం"
telugu_gloss = "ఇంతదాక"
english = "until now"

[[sections.items]]
sanskrit_telugu = "అస్మాభిః"
telugu_gloss = "మాచేత, మాతో"
english = "by us / with us"

[[sections.items]]
sanskrit_telugu = "ఇతఃపరం"
telugu_gloss = "ఇకమీఁద"
english = "from now on"

[[sections.items]]
sanskrit_telugu = "త్వయా"
telugu_gloss = "నీచేత, నీతో"
english = "by you / with you"

[[sections.items]]
sanskrit_telugu = "ఇతి"
telugu_gloss = "అని"
english = "thus, so"

[[sections.items]]
sanskrit_telugu = "పశ్యతి"
telugu_gloss = "చూచుచున్నాఁడు"
english = "sees"

[[sections.items]]
sanskrit_telugu = "ద్రక్ష్యతి"
telugu_gloss = "చూడఁగలఁడు"
english = "will see"

[[sections.items]]
sanskrit_telugu = "దర్శయతి"
telugu_gloss = "చూపించుచున్నాఁడు"
english = "shows"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "యూయం మయా అగచ్ఛత."
english = "You all came with me."
telugu = "మీరు నాతో వచ్చిరి."

[[sections.items]]
n = 2
sanskrit_telugu = "వృక్షే ఫలాని నసంతి."
english = "There are no fruits on the tree."
telugu = "చెట్టుపై పండ్లు లేవు."

[[sections.items]]
n = 3
sanskrit_telugu = "సర్వాణి ఫలాని అపతన్."
english = "All the fruits fell."
telugu = "పండ్లు అన్నియు పడెను."

[[sections.items]]
n = 4
sanskrit_telugu = "తత్ర గోవిందః అస్తి కింవా? పశ్య."
english = "Is Govinda there? Look."
telugu = "అక్కడ గోవిందుఁడున్నాఁడా? చూడుము."

[[sections.items]]
n = 5
sanskrit_telugu = "మమ మంచం దర్శయ."
english = "Show me my cot."
telugu = "నా మంచమును చూపుము."

[[sections.items]]
n = 6
sanskrit_telugu = "తవ జనకః శ్వః అస్మాభిః ఆగమిష్యతి."
english = "Your father will come with us tomorrow."
telugu = "నీ తండ్రి రేపు మాతో వత్తాఁడు."

[[sections.items]]
n = 7
sanskrit_telugu = "పాకః కథ మస్తినా ద్రక్ష్యసి కిం?"
english = "How is the cooking? Will you not see?"
telugu = "వంట ఎట్లున్నది, చూడవా?"

[[sections.items]]
n = 8
sanskrit_telugu = "ఘటితి పాకం కురుత. ఇతి వద."
english = "Say: 'Prepare the cooking at once.'"
telugu = "'త్వరగా వంట చేయుఁడు' అని చెప్పుము."

[[sections.items]]
n = 9
sanskrit_telugu = "ఏతత్ క్షీరం పాతుం సమ్యక్ నాస్తి."
english = "This milk is not proper to drink."
telugu = "ఈ పాలు త్రాగుటకు బాగుగా లేవు."

[[sections.items]]
n = 10
sanskrit_telugu = "ఏతత్ క్షీరే లవణం అపతత్."
english = "Salt fell into this milk."
telugu = "ఈ పాలలో నుప్పు పడెను."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "ఈ పిల్లవానియొక్క యింటిని నాకు జూపుము."
english = "Show me this boy's house."
sanskrit_telugu = "ఏతస్య బాలకస్య గృహం మహ్యం దర్శయ."

[[sections.items]]
n = 2
telugu = "వాఁడు మీయింటికి వెళ్ళినా డెందుకు?"
english = "Why did he go to your house?"
sanskrit_telugu = "సః యుష్మద్గృహం కిమర్థం అగచ్ఛత్?"

[[sections.items]]
n = 3
telugu = "కొంచెము దూరముగా పామ్ము."
english = "Move a little away."
sanskrit_telugu = "కించిత్ ఆరాత్ చర."

[[sections.items]]
n = 4
telugu = "నిన్న మా మంచమును మీయింటిలో నేను చూచినాను."
english = "Yesterday I saw our cot at your house."
sanskrit_telugu = "హ్యః అహం అస్మాకం మంచం యుష్మద్గృహే అపశ్యం."

[[sections.items]]
n = 5
telugu = "కాని మాతో వత్తువా?"
english = "But will you come with us?"
sanskrit_telugu = "కింతు అస్మాభిః సహ ఆగమిష్యసి కిం?"

[[sections.items]]
n = 6
telugu = "నేను వచ్చు నెడల నిచట మాయింటి నెవరు చూతురు?"
english = "If I come, who will look after our house here?"
sanskrit_telugu = "అహం ఆగచ్ఛామి చేత్ అత్ర అస్మద్గృహం కః ద్రక్ష్యతి?"

[[sections.items]]
n = 7
telugu = "మీ తమ్ముఁ లింటిలో నున్నారుగా."
english = "Your younger brothers are at home, aren't they."
sanskrit_telugu = "తవ అనుజాః గృహే సంతి ఖలు."

[[sections.items]]
n = 8
telugu = "వారు కొందలయందు నడచుచున్నారు."
english = "They are walking on the hills."
sanskrit_telugu = "తే పర్వతేషు చరంతి."

[[sections.items]]
n = 9
telugu = "నీ వక్కడ నెందుకు నడచుచున్నావు?"
english = "Why are you walking there?"
sanskrit_telugu = "త్వం తత్ర కిమర్థం చరసి?"

[[sections.items]]
n = 10
telugu = "ఊరకయే."
english = "Just like that, for no reason."
sanskrit_telugu = "వృథైవ."

[[sections]]
type = "passage"
language = "sanskrit"
title = "గోవిందః వృక్షం దర్శయతి — Govinda shows the tree"

[[sections.items]]
n = 1
sanskrit_telugu = "గోవిందః మయా సహ వృక్షం పశ్యతి."
english = "Govinda looks at the tree together with me."

[[sections.items]]
n = 2
sanskrit_telugu = "సః మహ్యం వృక్షే ఫలాని దర్శయతి."
english = "He shows me the fruits on the tree."

[[sections.items]]
n = 3
sanskrit_telugu = "త్వయా ఏతాని ఫలాని ఇతఃపూర్వం దృష్టాని కిం?"
english = "Have these fruits been seen by you until now?"

[[sections.items]]
n = 4
sanskrit_telugu = "అస్మాభిః శ్వః సర్వాణి ఫలాని ద్రక్ష్యామః ఇతి వదామి."
english = "I say: 'We will see all the fruits tomorrow.'"

[[sections]]
type = "passage_translation"
language = "telugu"
title = "తెనుగు అనువాదము"

[[sections.items]]
n = 1
telugu = "గోవిందుఁడు నాతో కూడ చెట్టును చూచుచున్నాఁడు. వాఁడు చెట్టుపై పండ్లను నాకు జూపించుచున్నాఁడు. ఈ పండ్లు నీచేత ఇంతదాఁక చూడఁబడినవా? రేపు మనమందరు పండ్లను చూడఁగలమని చెప్పుచున్నాను."
english = "Govinda is looking at the tree together with me. He is showing me the fruits on the tree. Have these fruits been seen by you until now? I say that we will see all the fruits tomorrow."

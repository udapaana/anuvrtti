[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "దేవః కుత్రాస్తి?"
english = "Where is the god?"
telugu = "దేవుఁడు ఎక్కడ నున్నాఁడు?"

[[sections.items]]
n = 2
sanskrit_telugu = "సః అత్రాస్తి."
english = "He is here."
telugu = "వాఁడు ఇక్కడ నున్నాఁడు."

[[sections.items]]
n = 3
sanskrit_telugu = "అగ్రజః కిం కరోతి?"
english = "What is the elder brother doing?"
telugu = "అన్న ఏమి చేయుచున్నాఁడు?"

[[sections.items]]
n = 4
sanskrit_telugu = "కింవా?"
english = "Or what? What else?"
telugu = "ఏమో!"

[[sections.items]]
n = 5
sanskrit_telugu = "త్వం కిం కరోషి?"
english = "What are you doing?"
telugu = "నీవు ఏమి చేయుచున్నావు?"

[[sections.items]]
n = 6
sanskrit_telugu = "అహం అత్రాసం."
english = "I was here."
telugu = "నేను ఇక్కడ నుంటిని."

[[sections.items]]
n = 7
sanskrit_telugu = "యూయం కిమర్థం తత్ర స్థ?"
english = "Why are you all there?"
telugu = "మీరు ఎందుకు అక్కడ నున్నారు?"

[[sections.items]]
n = 8
sanskrit_telugu = "తే ఏవ తత్రాసన్ కిల."
english = "They alone were there, reportedly."
telugu = "వారే అక్కడ నుండిరట."

[[sections.items]]
n = 9
sanskrit_telugu = "యూయం తత్ర కిమర్థం నాస్థ?"
english = "Why were you all not there?"
telugu = "మీరు ఎందుకు అక్కడ నుండలేదు?"

[[sections.items]]
n = 10
sanskrit_telugu = "అహం తత్రైవాస్మి."
english = "I am there alone / I am right there."
telugu = "నే నక్కడనే యున్నాను."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "దేవుఁ డొకచోట నున్నాఁడు."
english = "A god is in one place."
sanskrit_telugu = "దేవః ఏకత్ర అస్తి."

[[sections.items]]
n = 2
telugu = "వాఁడు చాలచోట్ల నున్నాఁడు."
english = "He is in many places."
sanskrit_telugu = "సః అనేకత్ర అస్తి."

[[sections.items]]
n = 3
telugu = "మీ రిపు డెక్కడ నుంటిరి?"
english = "Where were you all just now?"
sanskrit_telugu = "యూయం ఇదానీం కుత్రాస్థ?"

[[sections.items]]
n = 4
telugu = "ఎవఁ డేమి చేయుచున్నాఁడు?"
english = "Who is doing what?"
sanskrit_telugu = "కః కిం కరోతి?"

[[sections.items]]
n = 5
telugu = "వా రందఱు నక్కడ నుండవలెను."
english = "All of them must be there."
sanskrit_telugu = "తే సర్వే తత్ర స్యుః."

[[sections.items]]
n = 6
telugu = "నీవే చేయుచున్నావేమి?"
english = "Is it only you who is doing it?"
sanskrit_telugu = "త్వమేవ కరోషి కిం వా?"

[[sections.items]]
n = 7
telugu = "మేమే ఇక్కడ నుండవలెను."
english = "We alone must be here."
sanskrit_telugu = "వయమేవ అత్ర స్యామ."

[[sections.items]]
n = 8
telugu = "ఎవ రిక్కడ లేరు?"
english = "Who is not here?"
sanskrit_telugu = "కే అత్ర న సంతి?"

[[sections.items]]
n = 9
telugu = "నీ యిక్కడ లేవట."
english = "You are reportedly not here."
sanskrit_telugu = "త్వం అత్ర నాసి కిల."

[[sections.items]]
n = 10
telugu = "నే నిక్కడనే యున్నాను."
english = "I am right here."
sanskrit_telugu = "అహం అత్రైవాస్మి."

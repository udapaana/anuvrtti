[[sections.items]]
sanskrit_telugu = "దేవః"
telugu_gloss = "దేవుఁడు"
english = "god, deity"

[[sections.items]]
sanskrit_telugu = "కిమర్థం"
telugu_gloss = "ఎందుకు?"
english = "for what purpose? why?"

[[sections.items]]
sanskrit_telugu = "కరోతి"
telugu_gloss = "చేయుచున్నాఁడు"
english = "he does / is doing"

[[sections.items]]
sanskrit_telugu = "జనకః"
telugu_gloss = "తండ్రి"
english = "father"

[[sections.items]]
sanskrit_telugu = "ఏవ"
telugu_gloss = "ఏ"
english = "indeed, only, just"

[[sections.items]]
sanskrit_telugu = "కరోషి"
telugu_gloss = "చేయుచున్నావు"
english = "you do / are doing"

[[sections.items]]
sanskrit_telugu = "అగ్రజః"
telugu_gloss = "అన్న"
english = "elder brother"

[[sections.items]]
sanskrit_telugu = "కిల"
telugu_gloss = "అట"
english = "reportedly, they say, it is said"

[[sections.items]]
sanskrit_telugu = "కరోమి"
telugu_gloss = "చేయుచున్నాను"
english = "I do / am doing"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "దేవః కుత్రాస్తి?"
english = "Where is the god?"

[[sections.items]]
n = 2
sanskrit_telugu = "సః అత్రాస్తి."
english = "He is here."

[[sections.items]]
n = 3
sanskrit_telugu = "అగ్రజః కిం కరోతి?"
english = "What is the elder brother doing?"

[[sections.items]]
n = 4
sanskrit_telugu = "కింవా?"
english = "Or what? What else?"

[[sections.items]]
n = 5
sanskrit_telugu = "త్వం కిం కరోషి?"
english = "What are you doing?"

[[sections.items]]
n = 6
sanskrit_telugu = "అహం అత్రాసం."
english = "I was here."

[[sections.items]]
n = 7
sanskrit_telugu = "యూయం కిమర్థం తత్ర స్థ?"
english = "Why are you all there?"

[[sections.items]]
n = 8
sanskrit_telugu = "తే ఏవ తత్రాసన్ కిల."
english = "They alone were there, reportedly."

[[sections.items]]
n = 9
sanskrit_telugu = "యూయం తత్ర కిమర్థం నాస్థ?"
english = "Why were you all not there?"

[[sections.items]]
n = 10
sanskrit_telugu = "అహం తత్రైవాస్మి."
english = "I am there alone / I am right there."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "దేవుఁ డొకచోట నున్నాఁడు."
english = "A god is in one place."

[[sections.items]]
n = 2
telugu = "వాఁడు చాలచోట్ల నున్నాఁడు."
english = "He is in many places."

[[sections.items]]
n = 3
telugu = "మీ రిపు డెక్కడ నుంటిరి?"
english = "Where were you all just now?"

[[sections.items]]
n = 4
telugu = "ఎవఁ డేమి చేయుచున్నాఁడు?"
english = "Who is doing what?"

[[sections.items]]
n = 5
telugu = "వా రందఱు నక్కడ నుండవలెను."
english = "All of them must be there."

[[sections.items]]
n = 6
telugu = "నీవే చేయుచున్నావేమి?"
english = "Is it only you who is doing it?"

[[sections.items]]
n = 7
telugu = "మేమే ఇక్కడ నుండవలెను."
english = "We alone must be here."

[[sections.items]]
n = 8
telugu = "ఎవ రిక్కడ లేరు?"
english = "Who is not here?"

[[sections.items]]
n = 9
telugu = "నీ యిక్కడ లేవట."
english = "You are reportedly not here."

[[sections.items]]
n = 10
telugu = "నే నిక్కడనే యున్నాను."
english = "I am right here."

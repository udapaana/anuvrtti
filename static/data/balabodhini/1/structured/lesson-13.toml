id = "balabodhini-1-13"
source = "balabodhini"
part = 1
number = 13
title_sanskrit = "త్రయోదశః పాఠః"
title_telugu = "పదుమూఁడవ పాఠము"
title_english = "Thirteenth Lesson"
grammar_focus = "kṛ imperfect plural (akuryan / akuruta / akurma); time adverbs divā (by day), tathāpi (even so), sarvathā (entirely, absolutely)"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "ప్రయాణం"
telugu_gloss = "పయనము-ను"
english = "journey, travel"

[[sections.items]]
sanskrit_telugu = "దివా"
telugu_gloss = "పగలు"
english = "during the day, by day"

[[sections.items]]
sanskrit_telugu = "దోష్యం"
telugu_gloss = "అల్లరి-ని"
english = "mischief, naughtiness"

[[sections.items]]
sanskrit_telugu = "తథాపి"
telugu_gloss = "అయినప్పటికి"
english = "even so, nevertheless, yet"

[[sections.items]]
sanskrit_telugu = "భిక్షాటనం"
telugu_gloss = "భిక్షాటనము-ను"
english = "going about for alms, mendicancy"

[[sections.items]]
sanskrit_telugu = "సర్వథా"
telugu_gloss = "బొత్తుగా"
english = "entirely, in every way, absolutely"

[[sections.items]]
sanskrit_telugu = "అకుర్యన్"
telugu_gloss = "చేసిరి"
english = "they did"

[[sections.items]]
sanskrit_telugu = "అకురుత"
telugu_gloss = "చేసితిరి"
english = "you all did"

[[sections.items]]
sanskrit_telugu = "అకుర్మ"
telugu_gloss = "చేసి'మి"
english = "we did"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "త్వం హ్యః నక్తం కుత్ర ప్రయాణ మకరోః?"
english = "Where did you travel yesterday at night?"

[[sections.items]]
n = 2
sanskrit_telugu = "బాలకాః దోష్యం కుర్వంతి."
english = "The boys are making mischief."

[[sections.items]]
n = 3
sanskrit_telugu = "తే కుత్రాపి నాసన్."
english = "They were nowhere."

[[sections.items]]
n = 4
sanskrit_telugu = "తథాపి ఏతే పాకం అకుర్యన్."
english = "Even so, these (people) cooked."

[[sections.items]]
n = 5
sanskrit_telugu = "బ్రాహ్మణాః భిక్షాటనం కుర్వంతి."
english = "The brahmins are going about for alms."

[[sections.items]]
n = 6
sanskrit_telugu = "అద్య పాకః కథ మస్తి?"
english = "How is the cooking today?"

[[sections.items]]
n = 7
sanskrit_telugu = "అద్య వ్యాపారం వయ మేవ అకుర్మ."
english = "Today we alone did the work."

[[sections.items]]
n = 8
sanskrit_telugu = "తథాపి తే కేఽపి అత్ర న సంతి."
english = "Even so, none of them are here."

[[sections.items]]
n = 9
sanskrit_telugu = "అద్య దివా సర్వథా త్వం అత్ర నాసేః."
english = "Today during the day you were absolutely not here."

[[sections.items]]
n = 10
sanskrit_telugu = "అద్య పాకం యూయం మేవ అకురుత కిం?"
english = "Did you all alone do the cooking today?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నే నెక్కడికిని పయనము చేయలేదు."
english = "I did not travel anywhere."

[[sections.items]]
n = 2
telugu = "మీరేనా వంటను చేసినది?"
english = "Was it you all who did the cooking?"

[[sections.items]]
n = 3
telugu = "మేము కాము, ఎవరో చేసినారు."
english = "Not us; someone else did it."

[[sections.items]]
n = 4
telugu = "ఇతరులు బ్రాహ్మణు లున్నారు."
english = "There are other brahmins."

[[sections.items]]
n = 5
telugu = "వా రెవరు?"
english = "Who are they?"

[[sections.items]]
n = 6
telugu = "వీరే."
english = "These very ones."

[[sections.items]]
n = 7
telugu = "నిన్న పిల్లలు అల్లరి చేసిరి."
english = "Yesterday the boys made mischief."

[[sections.items]]
n = 8
telugu = "నీవు భిక్షాటనమును చేసితివా?"
english = "Did you go about for alms?"

[[sections.items]]
n = 9
telugu = "నీ విట్లుండుము."
english = "You stay like this / remain thus."

[[sections.items]]
n = 10
telugu = "నేను నమస్కారమును చేయుచున్నాను."
english = "I am making a salutation."

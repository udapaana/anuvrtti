[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "బ్రాహ్మణః స్నానం అకరోత్."
english = "The brahmin bathed."
telugu = "బాపఁడు స్నానము చేసెను."

[[sections.items]]
n = 2
sanskrit_telugu = "అహం పాకం కరోమి."
english = "I am cooking."
telugu = "నేను వంట చేయుచున్నాను."

[[sections.items]]
n = 3
sanskrit_telugu = "త్వం స్నానం అకరోః."
english = "You bathed."
telugu = "నీవు స్నానము చేసితివి."

[[sections.items]]
n = 4
sanskrit_telugu = "బాలకాః నమస్కారం కుర్వంతి."
english = "The boys are making salutations."
telugu = "పిల్లలు నమస్కారము చేయుచున్నారు."

[[sections.items]]
n = 5
sanskrit_telugu = "అహం నమస్కారాన్ అకరవం."
english = "I made salutations."
telugu = "నేను నమస్కారములు చేసితిని."

[[sections.items]]
n = 6
sanskrit_telugu = "కే వ్యాపారం కుర్వంతి?"
english = "Who are doing business?"
telugu = "వ్యాపారమును చేయుచున్న వా రెవరు?"

[[sections.items]]
n = 7
sanskrit_telugu = "త్వం ఏకం వ్యాపారం అకరోః ఖలు?"
english = "You did one business, did you not?"
telugu = "నీవు ఒక వ్యాపారమును చేసితివి కదా?"

[[sections.items]]
n = 8
sanskrit_telugu = "త్వం కథం స్నానం అకరోః?"
english = "How did you bathe?"
telugu = "నీవు స్నానమెట్లు చేసితివి?"

[[sections.items]]
n = 9
sanskrit_telugu = "ఇత్థం అకరవం."
english = "I did it in this way."
telugu = "ఇట్లు చేసితిని."

[[sections.items]]
n = 10
sanskrit_telugu = "అహో! యూయం అద్యైవ స్నానం కురుథ కిం?"
english = "Oh! Are you all bathing only today?"
telugu = "బో రా! మీరు ఈ వేళ్టికే స్నానము చేయుచున్నారా?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మేము నమస్కారములను చేయుట లేదు."
english = "We are not making salutations."
sanskrit_telugu = "వయం నమస్కారాన్ న కుర్మః."

[[sections.items]]
n = 2
telugu = "నీవు నమస్కారములను చేసినావా?"
english = "Did you make salutations?"
sanskrit_telugu = "త్వం నమస్కారాన్ అకరోఃవా?"

[[sections.items]]
n = 3
telugu = "పిల్ల లట్లు నమస్కారములను చేయుచున్నా రేమి?"
english = "Are the boys making salutations like that?"
sanskrit_telugu = "బాలకాః ఏవం నమస్కారాన్ కుర్వంతి కిం?"

[[sections.items]]
n = 4
telugu = "ఏమో వారు పిల్లులుకదా."
english = "Well, they are children after all."
sanskrit_telugu = "తే బాలకాః ఖలు."

[[sections.items]]
n = 5
telugu = "మీరు పిల్లలు కారా?"
english = "Are you all not children?"
sanskrit_telugu = "యూయం బాలకాః న సంతివా?"

[[sections.items]]
n = 6
telugu = "మేమఱును పిల్లలమే."
english = "We too are children."
sanskrit_telugu = "వయమపి బాలకాః ఏవ స్మః."

[[sections.items]]
n = 7
telugu = "రేపు వంట యెట్లు?"
english = "How will the cooking be tomorrow?"
sanskrit_telugu = "శ్వః పాకః కథం భవిష్యతి?"

[[sections.items]]
n = 8
telugu = "దేవుఁడే యున్నాఁడు."
english = "Only God is there."
sanskrit_telugu = "దేవ ఏవాస్తి."

[[sections.items]]
n = 9
telugu = "ఈ రాత్రి భోజన మెట్లు?"
english = "How is the meal tonight?"
sanskrit_telugu = "అద్య నక్తం భోజనం కథమస్తి?"

[[sections.items]]
n = 10
telugu = "నేను ప్రొద్దునే భోజనము చేసితిని."
english = "I ate in the early morning."
sanskrit_telugu = "అహం ప్రాత ఏవ భోజనం అకరవం."

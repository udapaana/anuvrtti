sanskrit_telugu = "ఖాదథ"
telugu_gloss = "తినుచున్నారు"
english = "you all eat"

[[sections.items]]
sanskrit_telugu = "ఖాదామి"
telugu_gloss = "తినుచున్నాను"
english = "I eat"

[[sections.items]]
sanskrit_telugu = "ఖాదామః"
telugu_gloss = "తినుచున్నాము"
english = "we eat"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తస్య జనకః ఏతావత్పర్యంతం కుత్రాసీత్?"
english = "Where was his father until now?"

[[sections.items]]
n = 2
sanskrit_telugu = "అస్మద్గృహే ఆసీత్."
english = "He was at our house."

[[sections.items]]
n = 3
sanskrit_telugu = "తత్ర కిం కరోతి?"
english = "What does he do there?"

[[sections.items]]
n = 4
sanskrit_telugu = "తత్ర ఫలం ఖాదతి."
english = "He eats fruit there."

[[sections.items]]
n = 5
sanskrit_telugu = "తే కియత్పర్యంతం పాకం కుర్వంతి?"
english = "How long will they keep cooking?"

[[sections.items]]
n = 6
sanskrit_telugu = "ఏతస్య గృహం కుత్రాస్తి?"
english = "Where is this person's house?"

[[sections.items]]
n = 7
sanskrit_telugu = "యూయం ఇదానీం కిం కురుథ?"
english = "What are you all doing now?"

[[sections.items]]
n = 8
sanskrit_telugu = "వయం ఫలాని ఖాదామః."
english = "We are eating fruits."

[[sections.items]]
n = 9
sanskrit_telugu = "బాలకాః అన్నం ఖాదంతి."
english = "The boys are eating rice."

[[sections.items]]
n = 10
sanskrit_telugu = "త్వం తస్య గృహే కిం ఖాదసి?"
english = "What do you eat at his house?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "ఈపం డెవనిది?"
english = "Whose is this fruit?"

[[sections.items]]
n = 2
telugu = "ఇది నాది."
english = "This is mine."

[[sections.items]]
n = 3
telugu = "నీ చెంబులో నీ రున్నదా?"
english = "Is there water in your vessel?"

[[sections.items]]
n = 4
telugu = "నా చెంబే ఇక్కడ లేదు."
english = "My very vessel is not here."

[[sections.items]]
n = 5
telugu = "ఇతే మీ రన్నమును త్వరగా తినుచున్నారేమి?"
english = "So you are eating rice quickly, are you?"

[[sections.items]]
n = 6
telugu = "మాయింట్లో నెవరును లేరు."
english = "There is no one in our house."

[[sections.items]]
n = 7
telugu = "నేను మీకొనము వంటను చేసినాను."
english = "I cooked for your sake."

[[sections.items]]
n = 8
telugu = "వీ రెందు కిక్కడ నన్నమును తినుచున్నారు?"
english = "Why are these people eating rice here?"

[[sections.items]]
n = 9
telugu = "వా రింట్లో లేరట."
english = "They say (those people) are not at home."

[[sections.items]]
n = 10
telugu = "అందుకొసము నే నిక్కడ తినుచున్నాను."
english = "That is why I am eating here."

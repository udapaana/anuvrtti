[[sections.items]]
sanskrit_telugu = "ఏతస్య"
telugu_gloss = "వీనిది, వీనికి"
english = "of this, its"

[[sections.items]]
sanskrit_telugu = "కియత్పర్యంతం"
telugu_gloss = "ఎంతవఱకు?"
english = "how long?"

[[sections.items]]

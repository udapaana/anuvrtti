[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "ఏతే అద్య కుత్రాసన్?"
english = "Where were these (people) today?"
telugu = "వీ రివ్వేళ ఎక్కడ నుండిరి?"

[[sections.items]]
n = 2
sanskrit_telugu = "తే ఏకదా తత్రాసన్"
english = "They were there once."
telugu = "వారు ఒకప్పుడు అక్కడ నుండిరి."

[[sections.items]]
n = 3
sanskrit_telugu = "యూయం సర్వదా అత్రాస్థ"
english = "You all are always here."
telugu = "మీరు ఎల్లప్పుడు ఇక్కడ నుంటిరి."

[[sections.items]]
n = 4
sanskrit_telugu = "వయం కదా అత్రాస్మ!"
english = "When were we here!"
telugu = "మే మెప్పుడు ఇక్కడ నుంటిమి!"

[[sections.items]]
n = 5
sanskrit_telugu = "తత్ర కే ఆసన్?"
english = "Who were there?"
telugu = "అక్కడ ఎవరు నుండిరి?"

[[sections.items]]
n = 6
sanskrit_telugu = "సర్వే తత్రాసన్?"
english = "Were all (of them) there?"
telugu = "అందరు అక్కడ నుండిరా?"

[[sections.items]]
n = 7
sanskrit_telugu = "తే కే?"
english = "Who are they?"
telugu = "వా రెవరు?"

[[sections.items]]
n = 8
sanskrit_telugu = "వయం అద్య తత్ర స్మః"
english = "We are there today."
telugu = "మేము ఇవ్వేళ అక్కడ నున్నాము."

[[sections.items]]
n = 9
sanskrit_telugu = "త్వం అత్ర నాసేః"
english = "You were not here."
telugu = "నీవు ఇక్కడ లేకుంటివి."

[[sections.items]]
n = 10
sanskrit_telugu = "బత! అహం అత్రాసం"
english = "Alas! I was here."
telugu = "అయ్యో! నేను ఇక్కడ నుంటిని."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మీ రెవరు?"
english = "Who are you all?"
sanskrit_telugu = "యూయం కే?"

[[sections.items]]
n = 2
telugu = "మే మిక్కడ నుంటిమి."
english = "We were here."
sanskrit_telugu = "వయం అత్రాస్మ."

[[sections.items]]
n = 3
telugu = "ఇవ్వేళ వాఁ డక్కడ నున్నాఁడు."
english = "Today he is there."
sanskrit_telugu = "సః అద్య తత్రాస్తి."

[[sections.items]]
n = 4
telugu = "నీ వక్కడ లేవా?"
english = "Are you not there?"
sanskrit_telugu = "త్వం తత్ర నాసివా?"

[[sections.items]]
n = 5
telugu = "మే మందఱిము అక్కడ నుంటిమి."
english = "All of us were there."
sanskrit_telugu = "వయం సర్వే తత్రాస్మ."

[[sections.items]]
n = 6
telugu = "మీరందరు నక్కడ నుంటిరా?"
english = "Were all of you there?"
sanskrit_telugu = "యూయం సర్వే తత్రాస్థవా?"

[[sections.items]]
n = 7
telugu = "ఎవ రివ్వేళ నక్కడ నున్నారు?"
english = "Who are there today?"
sanskrit_telugu = "అద్య తత్ర కే సంతి?"

[[sections.items]]
n = 8
telugu = "వారు వీరు మేము అక్కడ నుంటిమి."
english = "They, these, and we were there."
sanskrit_telugu = "తే ఏతే వయం చ తత్రాస్మ."

[[sections.items]]
n = 9
telugu = "మీ రెపు డక్కడ నుంటిరి?"
english = "When were you all there?"
sanskrit_telugu = "యూయం కదా తత్రాస్థ?"

[[sections.items]]
n = 10
telugu = "మే మివ్వేళ అక్కడ నుంటిమి."
english = "We were there today."
sanskrit_telugu = "వయం అద్య తత్రాస్మ."

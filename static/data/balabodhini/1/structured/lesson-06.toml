id = "balabodhini-1-06"
source = "balabodhini"
part = 1
number = 6
title_sanskrit = "షష్ఠః పాఠః"
title_telugu = "ఆరవ పాఠము"
title_english = "Sixth Lesson"
grammar_focus = "relative pronoun ya-; prabhṛti (from, since); days: hyaḥ, śvaḥ; plural imperatives (santu, stha, asāma)"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "యః"
telugu_gloss = "ఎవఁడు (ఎవఁడైతే)"
english = "who (relative)"

[[sections.items]]
sanskrit_telugu = "అన్యః"
telugu_gloss = "ఇతరుఁడు"
english = "another, other"

[[sections.items]]
sanskrit_telugu = "స్వః"
telugu_gloss = "తాను"
english = "own; himself"

[[sections.items]]
sanskrit_telugu = "ప్రభృతి"
telugu_gloss = "మొదలుకొని, నుండి"
english = "from, since, beginning from"

[[sections.items]]
sanskrit_telugu = "శ్వః"
telugu_gloss = "రేపు"
english = "tomorrow"

[[sections.items]]
sanskrit_telugu = "హ్యః"
telugu_gloss = "నిన్న"
english = "yesterday"

[[sections.items]]
sanskrit_telugu = "సంతు"
telugu_gloss = "వారుండనిమ్ము"
english = "let them be"

[[sections.items]]
sanskrit_telugu = "స్థ"
telugu_gloss = "ఉండుఁడు"
english = "be! (you all)"

[[sections.items]]
sanskrit_telugu = "అసామ"
telugu_gloss = "వేమముండనిమ్ము"
english = "let us be"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "వయం అద్య ప్రభృతి తత్ర స్మః"
english = "We are there from today."

[[sections.items]]
n = 2
sanskrit_telugu = "యూయం శ్వః ప్రభృతి అత్రాస్థ"
english = "You all are here from tomorrow."

[[sections.items]]
n = 3
sanskrit_telugu = "హ్యః అహం తత్రాసం"
english = "Yesterday I was there."

[[sections.items]]
n = 4
sanskrit_telugu = "అన్యః తత్రనాసీత్"
english = "Another was not there."

[[sections.items]]
n = 5
sanskrit_telugu = "య స్తత్రాసీత్ సః అహం"
english = "The one who was there — that is I."

[[sections.items]]
n = 6
sanskrit_telugu = "త్వం కః?"
english = "Who are you?"

[[sections.items]]
n = 7
sanskrit_telugu = "అహం ఏకః"
english = "I am (just) one."

[[sections.items]]
n = 8
sanskrit_telugu = "కదా త్వం తత్రాసేః!"
english = "When were you there!"

[[sections.items]]
n = 9
sanskrit_telugu = "తే హ్యస్తత్రాసన్"
english = "They were there yesterday."

[[sections.items]]
n = 10
sanskrit_telugu = "తత్ర హ్యః కే ఆసన్, అద్య ప్రాతఃప్రభృతి కే సంతి?"
english = "Who were there yesterday, who are (there) from this morning today?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నిన్న నీ వక్కడ లేవా!"
english = "Were you not there yesterday!"

[[sections.items]]
n = 2
telugu = "నే నక్కడ లేను."
english = "I am not there."

[[sections.items]]
n = 3
telugu = "మేమక్కడ నుండనిమ్ము."
english = "Let us be there."

[[sections.items]]
n = 4
telugu = "వా రిక్కడ నుండనిమ్ము."
english = "Let them be here."

[[sections.items]]
n = 5
telugu = "మీరి(నాడు మొదలుకొని యెక్కడ నుంటిరి?"
english = "From today, where have you all been?"

[[sections.items]]
n = 6
telugu = "మే మిక్కడ నుంటిమి."
english = "We were here."

[[sections.items]]
n = 7
telugu = "మీ రక్కడ నుంటిరి."
english = "You all were there."

[[sections.items]]
n = 8
telugu = "వీరెక్కడనున్నారో!"
english = "Where are these people!"

[[sections.items]]
n = 9
telugu = "వారందరు నిక్కడ నుండిరి."
english = "All of them were here."

[[sections.items]]
n = 10
telugu = "ఇప్పు డక్కడ వొక్కఁ డున్నాఁడు."
english = "Now one (person) is there."

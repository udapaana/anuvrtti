id = "balabodhini-1-11"
source = "balabodhini"
part = 1
number = 11
title_sanskrit_telugu = "ఏకాదశః పాఠః"
title_telugu = "పదునొకండవ పాఠము"
title_english = "Eleventh Lesson"
grammar_focus = "nouns bālakaḥ and brāhmaṇaḥ with kṛ forms; iva (like, as); khalu (indeed, is it not); snānam and bhojanam as neuter accusative objects"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "బాలకః"
telugu_gloss = "పిల్లవాఁడు"
english = "boy, child"

[[sections.items]]
sanskrit_telugu = "ఇవ"
telugu_gloss = "వలె"
english = "like, as"

[[sections.items]]
sanskrit_telugu = "స్నానం"
telugu_gloss = "స్నానము, ను"
english = "bathing, a bath"

[[sections.items]]
sanskrit_telugu = "బ్రాహ్మణః"
telugu_gloss = "బాపఁడు"
english = "brahmin"

[[sections.items]]
sanskrit_telugu = "ఖలు"
telugu_gloss = "కదా"
english = "indeed, is it not so?"

[[sections.items]]
sanskrit_telugu = "స్నానాని"
telugu_gloss = "స్నానములు, లను"
english = "baths"

[[sections.items]]
sanskrit_telugu = "అనుజః"
telugu_gloss = "తమ్ముఁడు"
english = "younger brother"

[[sections.items]]
sanskrit_telugu = "అహో"
telugu_gloss = "బో రా!"
english = "oh! alas!"

[[sections.items]]
sanskrit_telugu = "భోజనం"
telugu_gloss = "భోజనము, ను"
english = "food, a meal"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "సర్వే బ్రాహ్మణాః తత్ర భోజనం కుర్వంతి."
english = "All the brahmins are eating there."
telugu = "బ్రాహ్మణు లందఱు అక్కడ భోజనము చేయుచున్నారు."

[[sections.items]]
n = 2
sanskrit_telugu = "వయం అత్ర భోజనం కుర్మః."
english = "We eat here."
telugu = "మేమిక్కడ భోజనము చేయుచున్నాము."

[[sections.items]]
n = 3
sanskrit_telugu = "యూయం కుత్ర స్నానం కురుథ?"
english = "Where do you all bathe?"
telugu = "మీరు స్నానము చేయువా రెక్కడ?"

[[sections.items]]
n = 4
sanskrit_telugu = "సర్వే బాలకాః తత్ర న సంతి."
english = "All the boys are not there."
telugu = "పిల్లలందఱు అక్కడ లేరు."

[[sections.items]]
n = 5
sanskrit_telugu = "అత్ర ఏకః అపి భోజనం న కరోతి."
english = "Not even one here eats."
telugu = "ఇక్కడ ఒక్కఁడు కూడ భోజనము చేయుటలేదు."

[[sections.items]]
n = 6
sanskrit_telugu = "సః బాలకః ఇవాస్తి."
english = "He is like a boy."
telugu = "వాఁడు పిల్లవానివలె నున్నాఁడు."

[[sections.items]]
n = 7
sanskrit_telugu = "ఏతే స్నానం కుర్వంతి ఖలు."
english = "These are bathing, are they not?"
telugu = "వీరు స్నానము చేయుచున్నారు కదా."

[[sections.items]]
n = 8
sanskrit_telugu = "న కుర్వంతి."
english = "They are not doing (it)."
telugu = "చేయుటలేదు."

[[sections.items]]
n = 9
sanskrit_telugu = "కిమర్థం?"
english = "Why? For what purpose?"
telugu = "ఎందుకని?"

[[sections.items]]
n = 10
sanskrit_telugu = "తే బాలకాః ఇవ సంతి."
english = "They are like boys."
telugu = "వారు పిల్లలవలె నున్నారు."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "బ్రాహ్మణు లందఱు నెక్కడ నుండిరి?"
english = "Where were all the brahmins?"
sanskrit_telugu = "సర్వే బ్రాహ్మణాః కుత్రాసన్?"

[[sections.items]]
n = 2
telugu = "వారు స్నానము చేయుచున్నారు."
english = "They are bathing."
sanskrit_telugu = "తే స్నానం కుర్వంతి."

[[sections.items]]
n = 3
telugu = "ఇవ్వేళ నిక్కడ నేమి?"
english = "What is here today?"
sanskrit_telugu = "అద్య అత్ర కిం అస్తి?"

[[sections.items]]
n = 4
telugu = "ఏమియును లేదు."
english = "There is nothing."
sanskrit_telugu = "కిమపి నాస్తి."

[[sections.items]]
n = 5
telugu = "కొందఱు పిల్లలు అక్కడ భోజనములను చేయుచున్నారు."
english = "Some boys are eating there."
sanskrit_telugu = "కతిచిత్ బాలకాః తత్ర భోజనాని కుర్వంతి."

[[sections.items]]
n = 6
telugu = "మే మందఱిమును ఇక్కడ స్నానములను చేయుచున్నాము."
english = "All of us are bathing here."
sanskrit_telugu = "వయం సర్వే అత్ర స్నానాని కుర్మః."

[[sections.items]]
n = 7
telugu = "ఎందఱు పిల్ల లిక్కడ నున్నారు?"
english = "How many boys are here?"
sanskrit_telugu = "అత్ర కతి బాలకాః సంతి?"

[[sections.items]]
n = 8
telugu = "పిల్లలందఱును ఇక్కడనే యున్నారట."
english = "All the boys are reportedly right here."
sanskrit_telugu = "సర్వే బాలకాః అత్రైవ సంతి కిల."

[[sections.items]]
n = 9
telugu = "మీరు స్నానము చేయుట లేదేమి?"
english = "Why are you all not bathing?"
sanskrit_telugu = "యూయం కిమర్థం స్నానం న కురుథ?"

[[sections.items]]
n = 10
telugu = "మీరు పిల్లలవలె నక్కడ నెందుకు భోజనములను చేయుచున్నారు? బో రా!"
english = "Why are you all eating there like boys? Shame!"
sanskrit_telugu = "అహో! యూయం బాలకా ఇవ తత్ర కిమర్థం భోజనాని కురుథ?"

id = "balabodhini-1-07"
source = "balabodhini"
part = 1
number = 7
title_sanskrit = "సప్తమః పాఠః"
title_telugu = "ఏడవ పాఠము"
title_english = "Seventh Lesson"
grammar_focus = "as-optative (syāt, syāḥ, syām); plural relative ye; kim; api (also, even)"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "యే"
telugu_gloss = "ఎవరు (ఎవరైతే)"
english = "who (relative, plural)"

[[sections.items]]
sanskrit_telugu = "అన్యే"
telugu_gloss = "ఇతరులు"
english = "others"

[[sections.items]]
sanskrit_telugu = "స్వే"
telugu_gloss = "తాము"
english = "their own; themselves"

[[sections.items]]
sanskrit_telugu = "కిం"
telugu_gloss = "ఏమి?"
english = "what?; or what?"

[[sections.items]]
sanskrit_telugu = "అపి"
telugu_gloss = "ను, యును, కూడ"
english = "also, even, too"

[[sections.items]]
sanskrit_telugu = "అనేకత్ర"
telugu_gloss = "చాల చోట్ల"
english = "in many places"

[[sections.items]]
sanskrit_telugu = "స్యాత్"
telugu_gloss = "ఉండును, వలెను, చాలును"
english = "he may be; it should be; perhaps"

[[sections.items]]
sanskrit_telugu = "స్యాః"
telugu_gloss = "ఉందువు, వలెను, చాలుదువు"
english = "you may be; you should be"

[[sections.items]]
sanskrit_telugu = "స్యాం"
telugu_gloss = "ఉందును, వలెను, చాలుదును"
english = "I may be; I should be"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "అన్యే అపి తత్ర న సంతి"
english = "Others also are not there."

[[sections.items]]
n = 2
sanskrit_telugu = "తే తత్రాసన్వా?"
english = "Were they there, or not?"

[[sections.items]]
n = 3
sanskrit_telugu = "కింవా"
english = "Or what? / What else?"

[[sections.items]]
n = 4
sanskrit_telugu = "అద్య ఏకః అపి తత్ర నాస్తి"
english = "Not even one (person) is there today."

[[sections.items]]
n = 5
sanskrit_telugu = "అహం అపి తత్ర స్యాం"
english = "I also may be there."

[[sections.items]]
n = 6
sanskrit_telugu = "త్వం శ్వః అనేకత్ర స్యాః"
english = "You may be in many places tomorrow."

[[sections.items]]
n = 7
sanskrit_telugu = "యూయం తత్ర నస్థ కిం వా?"
english = "You all are not there, or what?"

[[sections.items]]
n = 8
sanskrit_telugu = "హ్యః అత్ర త్వం అపి నాసేః"
english = "Yesterday even you were not here."

[[sections.items]]
n = 9
sanskrit_telugu = "శ్వః ప్రభృతి అహ మపి తత్ర స్యాం"
english = "From tomorrow I also may be there."

[[sections.items]]
n = 10
sanskrit_telugu = "తే స్వే తత్ర తదా ఆసన్, ఇదానీం నాసన్"
english = "They themselves were there then; now they are not."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "తామును అక్కడ లేరు."
english = "They themselves are not there."

[[sections.items]]
n = 2
telugu = "నిన్న నక్కడ నెవ రున్నారో వా రిప్పుడు లేరు."
english = "Those who were there yesterday are not (there) now."

[[sections.items]]
n = 3
telugu = "ఇవ్వేళ వాఁ డక్కడ లేఁడేమో!"
english = "Perhaps he is not there today!"

[[sections.items]]
n = 4
telugu = "ప్రొద్దున మొదలుకొని నీ వక్కడ నుండవలెను."
english = "You should be there from the morning."

[[sections.items]]
n = 5
telugu = "మే మివ్వేళ నెక్కడ నుండలేదు."
english = "We were not anywhere today."

[[sections.items]]
n = 6
telugu = "మీ రివ్వేళ నిక్కడ నున్నారు కారు."
english = "You all were not here today."

[[sections.items]]
n = 7
telugu = "వారు ఎవరో!"
english = "Who are they!"

[[sections.items]]
n = 8
telugu = "అక్కడ నితరులును చాలమంది యుండిరి."
english = "Others also, many, were there."

[[sections.items]]
n = 9
telugu = "ఏమో నే నెక్కడ నుండవలెనో."
english = "I wonder where I should be."

[[sections.items]]
n = 10
telugu = "వారందఱు నే డిక్కడ నుండలేదు."
english = "All of them were not here today."

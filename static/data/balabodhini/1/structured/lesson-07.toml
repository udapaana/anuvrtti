[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "అన్యే అపి తత్ర న సంతి"
english = "Others also are not there."
telugu = "ఇతరులును అక్కడ లేరు."

[[sections.items]]
n = 2
sanskrit_telugu = "తే తత్రాసన్వా?"
english = "Were they there, or not?"
telugu = "వారు అక్కడ నుండిరా?"

[[sections.items]]
n = 3
sanskrit_telugu = "కింవా"
english = "Or what? / What else?"
telugu = "ఏమో!"

[[sections.items]]
n = 4
sanskrit_telugu = "అద్య ఏకః అపి తత్ర నాస్తి"
english = "Not even one (person) is there today."
telugu = "ఇవ్వేళ ఒక్కఁడును అక్కడ లేఁడు."

[[sections.items]]
n = 5
sanskrit_telugu = "అహం అపి తత్ర స్యాం"
english = "I also may be there."
telugu = "నేనును అక్కడ నుండవలెను."

[[sections.items]]
n = 6
sanskrit_telugu = "త్వం శ్వః అనేకత్ర స్యాః"
english = "You may be in many places tomorrow."
telugu = "నీవు రేపు చాలచోట్ల నుండవలెను."

[[sections.items]]
n = 7
sanskrit_telugu = "యూయం తత్ర నస్థ కిం వా?"
english = "You all are not there, or what?"
telugu = "మీరు అక్కడ లేరా, ఏమో?"

[[sections.items]]
n = 8
sanskrit_telugu = "హ్యః అత్ర త్వం అపి నాసేః"
english = "Yesterday even you were not here."
telugu = "నిన్న నీవును ఇక్కడ లేకుంటివి."

[[sections.items]]
n = 9
sanskrit_telugu = "శ్వః ప్రభృతి అహ మపి తత్ర స్యాం"
english = "From tomorrow I also may be there."
telugu = "రేపు మొదలుకొని నేనును అక్కడ నుండవలెను."

[[sections.items]]
n = 10
sanskrit_telugu = "తే స్వే తత్ర తదా ఆసన్, ఇదానీం నాసన్"
english = "They themselves were there then; now they are not."
telugu = "వారు తాము అప్పుడు అక్కడ నుండిరి, ఇప్పుడు లేరు."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "తామును అక్కడ లేరు."
english = "They themselves are not there."
sanskrit_telugu = "తే స్వే అపి తత్ర న సంతి."

[[sections.items]]
n = 2
telugu = "నిన్న నక్కడ నెవ రున్నారో వా రిప్పుడు లేరు."
english = "Those who were there yesterday are not (there) now."
sanskrit_telugu = "యే హ్యస్తత్రాసన్ తే ఇదానీం నాసన్."

[[sections.items]]
n = 3
telugu = "ఇవ్వేళ వాఁ డక్కడ లేఁడేమో!"
english = "Perhaps he is not there today!"
sanskrit_telugu = "అద్య సః తత్ర న స్యాత్!"

[[sections.items]]
n = 4
telugu = "ప్రొద్దున మొదలుకొని నీ వక్కడ నుండవలెను."
english = "You should be there from the morning."
sanskrit_telugu = "ప్రాతః ప్రభృతి త్వం తత్ర స్యాః."

[[sections.items]]
n = 5
telugu = "మే మివ్వేళ నెక్కడ నుండలేదు."
english = "We were not anywhere today."
sanskrit_telugu = "వయం అద్య కుత్రాపి నాస్మ."

[[sections.items]]
n = 6
telugu = "మీ రివ్వేళ నిక్కడ నున్నారు కారు."
english = "You all were not here today."
sanskrit_telugu = "యూయం అద్య అత్ర నాస్థ."

[[sections.items]]
n = 7
telugu = "వారు ఎవరో!"
english = "Who are they!"
sanskrit_telugu = "తే కే!"

[[sections.items]]
n = 8
telugu = "అక్కడ నితరులును చాలమంది యుండిరి."
english = "Others also, many, were there."
sanskrit_telugu = "తత్ర అన్యే అపి అనేకే ఆసన్."

[[sections.items]]
n = 9
telugu = "ఏమో నే నెక్కడ నుండవలెనో."
english = "I wonder where I should be."
sanskrit_telugu = "అహం కుత్ర స్యాం కిం వా!"

[[sections.items]]
n = 10
telugu = "వారందఱు నే డిక్కడ నుండలేదు."
english = "All of them were not here today."
sanskrit_telugu = "తే సర్వే అద్య అత్ర నాసన్."

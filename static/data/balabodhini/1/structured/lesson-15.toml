id = "balabodhini-1-15"
source = "balabodhini"
part = 1
number = 15
title_sanskrit_telugu = "పంచదశః పాఠః"
title_telugu = "పదునేనవ పాఠము"
title_english = "Fifteenth Lesson"
grammar_focus = "√kṛ loṭ bahuvacana (kurvantu, kuruta, karavāma); yuṣmad-asmat-samāsa; tūṣṇīm"
sutras = ["3.3.162", "3.1.79", "6.4.106"]

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "యుష్మత్"
telugu_gloss = "మీ, మీవల్ల"
english = "your (plural) — as in yuṣmad-gṛhe, your house"

[[sections.items]]
sanskrit_telugu = "కింతు"
telugu_gloss = "కాని"
english = "but, however"

[[sections.items]]
sanskrit_telugu = "అస్మత్"
telugu_gloss = "మా, మావల్ల"
english = "our — as in asmat-gṛhe, our house"

[[sections.items]]
sanskrit_telugu = "తర్హి; చేత్"
telugu_gloss = "అయితే"
english = "then / if"

[[sections.items]]
sanskrit_telugu = "గృహం"
telugu_gloss = "ఇల్లు, ఇంటిని"
english = "house"

[[sections.items]]
sanskrit_telugu = "తూష్టీం"
telugu_gloss = "ఊరక"
english = "silently, quietly, doing nothing"

[[sections.items]]
sanskrit_telugu = "కుర్వంతు"
telugu_gloss = "చేయుదురుగాక"
english = "let them do"

[[sections.items]]
sanskrit_telugu = "కురుత"
telugu_gloss = "చేయుఁడు"
english = "do it!"

[[sections.items]]
sanskrit_telugu = "కరవామ"
telugu_gloss = "చేయుదుముగాక"
english = "let us do it"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తత్ర కిమర్థం ఆసేః?"
english = "Why were you there?"
telugu = "అక్కడ నీవెందుకు నుంటివి?"

[[sections.items]]
n = 2
sanskrit_telugu = "అహం తూష్టీం ఆసం."
english = "I was there doing nothing (silently)."
telugu = "నేను ఊరకనే యుంటిని."

[[sections.items]]
n = 3
sanskrit_telugu = "తర్హి త్వం పాకం కురు."
english = "Then you cook."
telugu = "అయితే నీవు వంట చేయుము."

[[sections.items]]
n = 4
sanskrit_telugu = "నోచేత్ వయం కరవామ."
english = "Otherwise, let us do it."
telugu = "లేకపోతే మేము చేయనిముదుము."

[[sections.items]]
n = 5
sanskrit_telugu = "చేత్కిం?"
english = "If so, what then?"
telugu = "అయితే నేమి?"

[[sections.items]]
n = 6
sanskrit_telugu = "అస్మద్గృహే శాకాని న సంతి."
english = "There are no vegetables in our house."
telugu = "మా యింట్లో కూరలు లేవు."

[[sections.items]]
n = 7
sanskrit_telugu = "తే కుత్ర సంతి వా ఖలు?"
english = "Where indeed are they then?"
telugu = "అవి యెక్కడ నున్నవి కదా?"

[[sections.items]]
n = 8
sanskrit_telugu = "తే యుష్మద్గృహే భోజనం కుర్వంతి."
english = "They are eating in your house."
telugu = "వారు మీ యింట్లో భోజనము చేయుచున్నారు."

[[sections.items]]
n = 9
sanskrit_telugu = "కుర్వంతి చే త్కుర్వంతు."
english = "If they are doing (it), let them do it."
telugu = "చేయుచున్నారయితే చేయుదురుగాక."

[[sections.items]]
n = 10
sanskrit_telugu = "యూయం తూష్టీం స్థ."
english = "You all be quiet / stay still."
telugu = "మీరు ఊరకుండుఁడు."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మీ యింట్లో నెవ రున్నారు?"
english = "Who is in your house?"
sanskrit_telugu = "యుష్మద్గృహే కే సంతి?"

[[sections.items]]
n = 2
telugu = "మా యింట్లో అందఱు పిల్లలు స్నానము చేయుచున్నారు."
english = "All the boys are bathing in our house."
sanskrit_telugu = "అస్మద్గృహే సర్వే బాలకాః స్నానం కుర్వంతి."

[[sections.items]]
n = 3
telugu = "వారు వంట చేయుదురుగాక."
english = "Let them cook."
sanskrit_telugu = "తే పాకం కుర్వంతు."

[[sections.items]]
n = 4
telugu = "నేను వంట చేసినాను."
english = "I cooked."
sanskrit_telugu = "అహం పాకం అకరవం."

[[sections.items]]
n = 5
telugu = "అయ్యో మీ రక్కడ నూరకయే యుంటిరా?"
english = "Alas! Were you all just sitting there doing nothing?"
sanskrit_telugu = "బత! యూయం తత్ర తూష్టీమేవ అస్థవా?"

[[sections.items]]
n = 6
telugu = "కొంచెము వంట చేయుఁడు."
english = "Do a little cooking."
sanskrit_telugu = "కించిత్ పాకం కురుత."

[[sections.items]]
n = 7
telugu = "నేను మొదట పలువిధములుగాఁ జేసినాను."
english = "First I did it in various ways."
sanskrit_telugu = "అహం ప్రథమం అనేకథా అకరవం."

[[sections.items]]
n = 8
telugu = "కాని వారు మా యింట్లో లేరు."
english = "But they are not in our house."
sanskrit_telugu = "కింతు తే అస్మద్గృహే న సంతి."

[[sections.items]]
n = 9
telugu = "మీ రిపుడు స్నానము చేయకుడు."
english = "Do not bathe now (you pl.)."
sanskrit_telugu = "యూయం ఇదానీం స్నానం మా కురుత."

[[sections.items]]
n = 10
telugu = "మొదట మేము స్నానము చేయనియుఁడు."
english = "First let us bathe."
sanskrit_telugu = "ప్రథమం వయం స్నానం కరవామ."

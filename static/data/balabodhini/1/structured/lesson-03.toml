[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "ఏషః తదా కుత్రాసీత్?"
english = "Where was this one then?"
telugu = "వీఁ డపు డెక్కడ నుండెను?"

[[sections.items]]
n = 2
sanskrit_telugu = "సః తదా అత్ర నాసీత్"
english = "He was not here then."
telugu = "వాఁడు అప్పుడు ఇక్కడ లేకుండెను."

[[sections.items]]
n = 3
sanskrit_telugu = "త్వం కుత్రాసేః?"
english = "Where were you?"
telugu = "నీ వెక్కడ నుంటివి?"

[[sections.items]]
n = 4
sanskrit_telugu = "అహం తత్రాసం"
english = "I was there."
telugu = "నే నక్కడ నుంటిని."

[[sections.items]]
n = 5
sanskrit_telugu = "కః తత్రాసీత్?"
english = "Who was there?"
telugu = "వాఁ డెవఁడు అక్కడ నుండెను?"

[[sections.items]]
n = 6
sanskrit_telugu = "వయం తత్ర న స్మః"
english = "We are not there."
telugu = "మేము అక్కడ లేము."

[[sections.items]]
n = 7
sanskrit_telugu = "తే తత్ర న సంతి"
english = "They are not there."
telugu = "వారు అక్కడ లేరు."

[[sections.items]]
n = 8
sanskrit_telugu = "బత సః తత్రాస్తివా?"
english = "Alas, is he there?"
telugu = "అయ్యో! వాఁ డక్కడ నున్నాఁడా?"

[[sections.items]]
n = 9
sanskrit_telugu = "ఏషః తత్ర నాస్తివా?"
english = "Is this one not there?"
telugu = "వీఁడు అక్కడ లేడా?"

[[sections.items]]
n = 10
sanskrit_telugu = "సర్వః తత్రాస్తి"
english = "Everyone is there."
telugu = "ప్రతి వాఁడు అక్కడ నున్నాఁడు."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నీ వపు డెక్కడ నుంటివి?"
english = "Where were you then?"
sanskrit_telugu = "త్వం తదా కుత్రాసేః?"

[[sections.items]]
n = 2
telugu = "నే నపు డక్కడ నుంటిని."
english = "I was there then."
sanskrit_telugu = "అహం తదా తత్రాసం."

[[sections.items]]
n = 3
telugu = "అయ్యో! వా రక్కడ నున్నారా?"
english = "Alas, are they there?"
sanskrit_telugu = "బత తే తత్ర సంతివా?"

[[sections.items]]
n = 4
telugu = "నే నిక్కడ లేకుంటిని."
english = "I was not here."
sanskrit_telugu = "అహం అత్ర నాసం."

[[sections.items]]
n = 5
telugu = "వాఁ డెవఁడు?"
english = "Who is he?"
sanskrit_telugu = "సః కః?"

[[sections.items]]
n = 6
telugu = "నీ వెవఁడవు?"
english = "Who are you?"
sanskrit_telugu = "త్వం కః?"

[[sections.items]]
n = 7
telugu = "నీ విపు డెక్కడ నున్నావు?"
english = "Where are you now?"
sanskrit_telugu = "త్వం ఇదానీం కుత్రాసి?"

[[sections.items]]
n = 8
telugu = "వా రిక్కడ నున్నారా?"
english = "Are they here?"
sanskrit_telugu = "తే అత్ర సంతివా?"

[[sections.items]]
n = 9
telugu = "మీ రిపు డెక్కడ నున్నారు?"
english = "Where are you all now?"
sanskrit_telugu = "యూయం ఇదానీం కుత్ర స్థ?"

[[sections.items]]
n = 10
telugu = "మే మిపు డిక్కడలేము."
english = "We are not here now."
sanskrit_telugu = "వయం ఇదానీం అత్ర న స్మః."

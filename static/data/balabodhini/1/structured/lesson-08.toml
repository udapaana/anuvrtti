id = "balabodhini-1-08"
source = "balabodhini"
part = 1
number = 8
title_sanskrit_telugu = "అష్టమః పాఠః"
title_telugu = "ఎనిమిదవ పాఠము"
title_english = "Eighth Lesson"
grammar_focus = "as-optative plural (syuḥ, syāta, syāma); indefinite pronouns; nocet (otherwise)"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "కశ్చిత్"
telugu_gloss = "ఒకా నొకఁడు"
english = "someone, a certain one"

[[sections.items]]
sanskrit_telugu = "ఏకత్ర"
telugu_gloss = "ఒకచోట"
english = "in one place"

[[sections.items]]
sanskrit_telugu = "కతిచిత్"
telugu_gloss = "కొందఱు, కొన్ని"
english = "some (people), a few"

[[sections.items]]
sanskrit_telugu = "మా"
telugu_gloss = "వద్దు"
english = "do not"

[[sections.items]]
sanskrit_telugu = "కించిత్, ఈషత్"
telugu_gloss = "కొంచెము"
english = "a little, somewhat"

[[sections.items]]
sanskrit_telugu = "నోచేత్"
telugu_gloss = "లేనియెడల"
english = "otherwise, if not"

[[sections.items]]
sanskrit_telugu = "స్యుః"
telugu_gloss = "ఉందురు, వలెను, చాలుదురు"
english = "they may be; they should be"

[[sections.items]]
sanskrit_telugu = "స్యాత"
telugu_gloss = "మీ రుందురు, వలెను, చాలుదురు"
english = "you all may be"

[[sections.items]]
sanskrit_telugu = "స్యామ"
telugu_gloss = "ఉందుము, వలెను, చాలుదుము"
english = "we may be"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తత్ర కశ్చిత్ స్యాత్"
english = "Someone may be there."
telugu = "అక్కడ ఒకా నొకఁడు వలెను."

[[sections.items]]
n = 2
sanskrit_telugu = "నోచేత్ యూయం తత్ర స్యాత"
english = "Otherwise you all should be there."
telugu = "లేనియెడల మీరు అక్కడ నుండవలెను."

[[sections.items]]
n = 3
sanskrit_telugu = "కతిచిత్ తత్ర సంతి"
english = "Some (people) are there."
telugu = "కొందఱు అక్కడ నున్నారు."

[[sections.items]]
n = 4
sanskrit_telugu = "వయం అత్ర స్యామ"
english = "We may be here."
telugu = "మేము ఇక్కడ నుందుము."

[[sections.items]]
n = 5
sanskrit_telugu = "తత్ర కించిత్ అపి నాస్తి"
english = "There is not even a little there."
telugu = "అక్కడ కొంచెమైనను లేదు."

[[sections.items]]
n = 6
sanskrit_telugu = "యూయం తత్ర మాస్థ"
english = "Do not be there (you pl.)."
telugu = "మీరు అక్కడ నుండవద్దు."

[[sections.items]]
n = 7
sanskrit_telugu = "కతిచిత్ అత్ర స్యుః"
english = "Some may be here."
telugu = "కొందఱు ఇక్కడ నుండవలెను."

[[sections.items]]
n = 8
sanskrit_telugu = "అత్ర కిం అపి నాస్తి"
english = "There is nothing at all here."
telugu = "ఇక్కడ ఏమియును లేదు."

[[sections.items]]
n = 9
sanskrit_telugu = "ఏతే కతిచిత్ తత్రాసన్"
english = "Some of these were there."
telugu = "వీరిలో కొందఱు అక్కడ నుండిరి."

[[sections.items]]
n = 10
sanskrit_telugu = "వయం కతిచిత్ అత్ర స్మః"
english = "Some of us are here."
telugu = "మనలో కొందఱు ఇక్కడ నున్నాము."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మీరు కొంద ఱిక్కడ నుండుఁడు."
english = "Some of you be here."
sanskrit_telugu = "యూయం కతిచిత్ అత్ర స్థ."

[[sections.items]]
n = 2
telugu = "మేము కొందఱు మక్కడ నుందుము."
english = "Some of us may be there."
sanskrit_telugu = "వయం కతిచిత్ తత్ర స్యామ."

[[sections.items]]
n = 3
telugu = "ఇక్కడ నెవరును లేరు."
english = "There is no one here."
sanskrit_telugu = "అత్ర కశ్చిత్ అపి నాస్తి."

[[sections.items]]
n = 4
telugu = "అక్కడ నిన్న నెవఁ డుండెనో ఇక్కడను వాఁ డుండవలెను."
english = "The one who was there yesterday should also be here."
sanskrit_telugu = "యః హ్యస్తత్రాసీత్ సః అత్ర అపి స్యాత్."

[[sections.items]]
n = 5
telugu = "మే మెక్కడ నుండవలెను?"
english = "Where should we be?"
sanskrit_telugu = "వయం కుత్ర స్యామ?"

[[sections.items]]
n = 6
telugu = "ఏమో వారును ఇక్కడ నుండవలెను."
english = "Perhaps they also should be here."
sanskrit_telugu = "తే అపి అత్ర స్యుః కిం వా."

[[sections.items]]
n = 7
telugu = "మీ రొకచోట నుండుఁడు."
english = "You all be in one place."
sanskrit_telugu = "యూయం ఏకత్ర స్థ."

[[sections.items]]
n = 8
telugu = "ఇప్పు డక్కడ నెవరును లేరు."
english = "Now there is no one there."
sanskrit_telugu = "ఇదానీం తత్ర కశ్చిత్ అపి నాస్తి."

[[sections.items]]
n = 9
telugu = "మీ రీవేళ రాత్రి అక్కడ నుండవలెనా?"
english = "Should you all be there tonight?"
sanskrit_telugu = "యూయం అద్య నక్తం తత్ర స్యాతవా?"

[[sections.items]]
n = 10
telugu = "లేనియెడల మే మక్కడ నుందుము."
english = "Otherwise we will be there."
sanskrit_telugu = "నోచేత్ వయం తత్ర స్యామ."

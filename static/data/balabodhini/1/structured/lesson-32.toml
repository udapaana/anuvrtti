[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "అహం మర్కటాయ అన్నం యచ్ఛామి."
english = "I give food to the monkey."
telugu = "నేను కోఁతికి అన్నమిచ్చుచున్నాను."

[[sections.items]]
n = 2
sanskrit_telugu = "త్వం తస్మై పానీయం దాస్యసి కిం?"
english = "Will you give him drinking water?"
telugu = "నీవు వానికి నీళ్ళిచ్చెదవా?"

[[sections.items]]
n = 3
sanskrit_telugu = "క్షీరం కుత్రాఽస్తివా?"
english = "Where is the milk?"
telugu = "పాలు ఎక్కడ ఉన్నవి?"

[[sections.items]]
n = 4
sanskrit_telugu = "బాలకేభ్యః అద్య ప్రాతః క్షీరం కః దాస్యతి?"
english = "Who will give milk to the boys this morning?"
telugu = "పిల్లలకు నేఁడు ప్రొద్దున పాలు ఎవఁడు ఈయఁగలఁడు?"

[[sections.items]]
n = 5
sanskrit_telugu = "త్వం శీఘ్రం గత్వా మమ జనకం స్నానం కారయ."
english = "Going quickly, get my father to bathe."
telugu = "నీవు త్వరగా వెళ్ళి నాతండ్రిని స్నానము చేయించుము."

[[sections.items]]
n = 6
sanskrit_telugu = "త్వం నచేత్ కః కారయిష్యతి?"
english = "If not you, who will get it done?"
telugu = "నీవు చేయకపోయినచో ఇంకెవఁడు చేయించఁగలఁడు?"

[[sections.items]]
n = 7
sanskrit_telugu = "గృహాత్ బహిః అనేకే బ్రాహ్మణాః సంతి."
english = "Outside the house there are many brahmins."
telugu = "ఇంటి వెలుపల చాల మంది బ్రాహ్మణులున్నారు."

[[sections.items]]
n = 8
sanskrit_telugu = "తేభ్యః సర్వేభ్యః భోజనం యచ్ఛత."
english = "Give food to all of them."
telugu = "వారందఱకు భోజనమిండు."

[[sections.items]]
n = 9
sanskrit_telugu = "తవ జనకాయ ఏషః ఫలం యచ్ఛతు."
english = "Let this one give the fruit to your father."
telugu = "ఇతఁడు నీతండ్రికి పండిచ్చుఁగాక."

[[sections.items]]
n = 10
sanskrit_telugu = "అస్తునామ. కః యచ్ఛతిచే త్కిం? తథైవ భవతు. అహం అద్యైవ ఖలు ఫలం అయచ్ఛం."
english = "Very well. What does it matter who gives? Let it be so. I myself gave the fruit today."
telugu = "కానిమ్ము. ఎవఁడిచ్చినచో నేమి? అట్లే యుండఁగాక. నేనే యీవేళ పండిచ్చినాను."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "కోఽతులు కొందలందు నడచుచున్నవి."
english = "Monkeys are walking on the hills."
sanskrit_telugu = "మర్కటాః పర్వతేషు చరంతి."

[[sections.items]]
n = 2
telugu = "చాల కోఽతులు చెట్టనుండి పడినవి."
english = "Many monkeys fell from the tree."
sanskrit_telugu = "అనేకే మర్కటాః వృక్షాత్ అపతన్."

[[sections.items]]
n = 3
telugu = "మీరు మాతో నెందుకు యుద్ధము చేయుదురు?"
english = "Why do you all fight with us?"
sanskrit_telugu = "యూయం అస్మాభిః సహ కిమర్థం యుద్ధం కురుథ?"

[[sections.items]]
n = 4
telugu = "మేము మీతో నెప్పుడును యుద్ధము చేయము."
english = "We never fight with you."
sanskrit_telugu = "వయం యుష్మాభిః సహ కదాపి యుద్ధం న కుర్మః."

[[sections.items]]
n = 5
telugu = "మీరే మాతో యుద్ధము చేయుటకు వచ్చుచున్నారు."
english = "You yourselves are coming to fight with us."
sanskrit_telugu = "యూయమేవ అస్మాభిః సహ యుద్ధం కర్తుం ఆగచ్ఛథ."

[[sections.items]]
n = 6
telugu = "వా రెవరును ఇక్కడ లేరు."
english = "None of them are here."
sanskrit_telugu = "తేషాం కశ్చిదపి అత్ర నాస్తి."

[[sections.items]]
n = 7
telugu = "ఆకొంద యంచెన్ని కోఽతులున్నవి?"
english = "How many monkeys are on that hill?"
sanskrit_telugu = "తస్మిన్ పర్వతే కతి మర్కటాః సంతి?"

[[sections.items]]
n = 8
telugu = "ఏమో ఎవఁడు చూచినాఁడు."
english = "Who knows, who has seen."
sanskrit_telugu = "కః జానాతి? కః అపశ్యత్?"

[[sections.items]]
n = 9
telugu = "అయ్యో! ఆ పిల్లి కొఱకు కొంచెము పాల నిండు."
english = "Alas! Give a little milk for that cat."
sanskrit_telugu = "బత! తస్మై మార్జాలాయ కించిత్ క్షీరం యచ్ఛ."

[[sections.items]]
n = 10
telugu = "ఇవ్వేళ నేను ఊరికి పోవలయనుగాని త్వరగా వంటను చేయించుఁడు."
english = "I must go to town today, so quickly get the cooking done."
sanskrit_telugu = "అద్య అహం గ్రామం గమిష్యామి; శీఘ్రం పాకం కారయత."

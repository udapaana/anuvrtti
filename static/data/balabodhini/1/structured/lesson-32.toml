title_english = "Thirty-Second Lesson"
grammar_focus = "dative tasmai, tebhyaḥ; ablative tasmāt, tvat, mat; gerunds bhūtvā, calitvā, uṣitvā; infinitives bhavitum, calitum, vastum; causative kārayati; yacchati/dāsyati (gives/will give)"

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "సంప్రదానకారకము — తస్మై, తేభ్యః; యమ్, దా ధాతువులు; ప్రయోజకకర్తరి — కారయతి"
english = "dative case forms; verbs 'to give'; causative forms"


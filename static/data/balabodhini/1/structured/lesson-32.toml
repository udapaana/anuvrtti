[[sections.items]]
telugu = "సంప్రదానకారకము — తస్మై, తేభ్యః; యమ్, దా ధాతువులు; ప్రయోజకకర్తరి — కారయతి"
english = "dative case forms; verbs 'to give'; causative forms"


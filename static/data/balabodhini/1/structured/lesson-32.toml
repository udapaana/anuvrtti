grammar_focus = "dative tasmai, tebhyaḥ; ablative tasmāt, tvat, mat; gerunds bhūtvā, calitvā, uṣitvā; infinitives bhavitum, calitum, vastum; causative kārayati; yacchati/dāsyati (gives/will give)"


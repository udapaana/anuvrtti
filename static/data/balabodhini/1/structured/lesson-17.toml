[[sections.items]]
words = [{ sanskrit_telugu = "కుర్యామ", telugu_gloss = "చేయుదుము (వలెను)", english = "we should do" }]
[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "అద్య పాకం కే కుర్యుః?"
english = "Who should do the cooking today?"
telugu = "ఈ వేళ వంట నెవ్వరు చేయవలెను?"

[[sections.items]]
n = 2
sanskrit_telugu = "గృహే ఘృతం నాస్తి."
english = "There is no ghee in the house."
telugu = "ఇంట్లో నెయ్యి లేదు."

[[sections.items]]
n = 3
sanskrit_telugu = "తటాకే జలం నాస్తి."
english = "There is no water in the pond."
telugu = "చెఱువులో నీ రున్నదిలేదు."

[[sections.items]]
n = 4
sanskrit_telugu = "ఆలస్యం కరోషి కిం?"
english = "Why are you delaying?"
telugu = "నీవు జాగు చేయుచున్నావేల?"

[[sections.items]]
n = 5
sanskrit_telugu = "త్వం తత్ర చిరం ఆసేః. కిమర్థం?"
english = "You were there for a long time. For what purpose?"
telugu = "నీవు అక్కడ చాలకాలముండితివి. ఎందుకు?"

[[sections.items]]
n = 6
sanskrit_telugu = "అస్మద్గజార్థం అహం తత్రాసం."
english = "I was there for the sake of our elephant."
telugu = "మా ఏనుఁగు కొనము నేను అక్కడ నుంటిని."

[[sections.items]]
n = 7
sanskrit_telugu = "దేవః పురా ప్రథమం జలం అకరోత్."
english = "The god formerly made water first."
telugu = "దేవుఁడు మునుపు మొదటగా నీరు చేసెను."

[[sections.items]]
n = 8
sanskrit_telugu = "వయం పాకం సమ్యక్ కుర్యామ."
english = "We should cook properly."
telugu = "మేము వంటను బాగుగా చేయవలెను."

[[sections.items]]
n = 9
sanskrit_telugu = "ఘృతం నాస్తిచేత్ శాకం కథం కుర్యాం?"
english = "If there is no ghee, how should I prepare the vegetables?"
telugu = "నెయ్యి లేకపోతే కూర నెట్లు చేయవలెను?"

[[sections.items]]
n = 10
sanskrit_telugu = "అస్మద్గృహే యుష్మద్జనకః తూష్టీమేవ ఆలస్యం కరోతి; త్వమపి అత్రాసి కిం? శీఘ్రం స్నానం కురు."
english = "In our house your father is idling in silence; why are you here too? Bathe quickly."
telugu = "మా యింట్లో మీ తండ్రి ఊరకే జాగు చేయుచున్నాఁడు; నీవును ఇక్కడ నేల నున్నావు? త్వరగా స్నానము చేయుము."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "ఇవ్వేళ వంట నెవరు చేయుదరో?"
english = "Who will do the cooking today?"
sanskrit_telugu = "అద్య పాకం కే కుర్యుః?"

[[sections.items]]
n = 2
telugu = "మీకొనము నేనే చేయవలెను."
english = "I alone must do it for your sake."
sanskrit_telugu = "యుష్మదర్థం అహమేవ కుర్యాం."

[[sections.items]]
n = 3
telugu = "లేకపోతే ఎవఁడు చేయును?"
english = "Otherwise who will do it?"
sanskrit_telugu = "నోచేత్ కః కుర్యాత్?"

[[sections.items]]
n = 4
telugu = "మీయబ్బ."
english = "Your father (will do it)."
sanskrit_telugu = "తవ జనకః."

[[sections.items]]
n = 5
telugu = "ఇవ్వేళ వా రందఱు మీయింట్లో నున్నా రేమి?"
english = "Are they all at your house today?"
sanskrit_telugu = "అద్య తే సర్వే యుష్మద్గృహే సంతివా?"

[[sections.items]]
n = 6
telugu = "ఏమియును లేదు; అట్లు కానిమ్ము."
english = "Nothing of the sort; let it be so."
sanskrit_telugu = "కిమపి నాస్తి; తథాస్తు."

[[sections.items]]
n = 7
telugu = "మీ పిల్లలు మా యింట్లో అన్నముకొనము నున్నారు."
english = "Your children are at our house for the sake of food."
sanskrit_telugu = "తవ బాలకాః అన్నార్థం అస్మద్గృహే సంతి."

[[sections.items]]
n = 8
telugu = "అలాగా, మీరు కొంచె మిక్కడ నుండుఁడు."
english = "Is that so? Please stay here a little while."
sanskrit_telugu = "తథావా? యూయం కించిత్ అత్రాస్థ."

[[sections.items]]
n = 9
telugu = "మీరు మంచమునం దున్నారా?"
english = "Are you on the bed?"
sanskrit_telugu = "యూయం మంచే సంతివా?"

[[sections.items]]
n = 10
telugu = "ఊరకుందుము."
english = "We will stay quiet / remain idle."
sanskrit_telugu = "వయం తూష్టీం స్యామ."

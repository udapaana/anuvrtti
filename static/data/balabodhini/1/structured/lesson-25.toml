[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "బాలకః అస్మద్గృహే అన్నం ఖాదిత్వా గృహం అగచ్ఛత్."
english = "The boy, having eaten food at our house, went home."
telugu = "పిల్లవాఁడు మాయింట్లో అన్నము తిని యింటికి వెళ్ళెను."

[[sections.items]]
n = 2
sanskrit_telugu = "అహం కూపస్య ఆరాత్ స్నానం కర్తుం అగచ్ఛం."
english = "I went near the well to bathe."
telugu = "నేను బావిదగ్గఱ స్నానముచేయుటకు వెళ్ళితిని."

[[sections.items]]
n = 3
sanskrit_telugu = "త్వం కుత్ర ఖాదితుం గచ్ఛసి?"
english = "Where are you going to eat?"
telugu = "నీవు తినుటకు యెక్కడికి వెళ్ళుచున్నావు?"

[[sections.items]]
n = 4
sanskrit_telugu = "కుత్రాపి న గచ్ఛామి."
english = "I am not going anywhere."
telugu = "నేను యెక్కడికిని వెళ్ళుటలేదు."

[[sections.items]]
n = 5
sanskrit_telugu = "అరే యుష్మద్గృహే లవణ మస్తిరే?"
english = "Hey, is there salt in your house?"
telugu = "అరే! మీయింట్లో నుప్పున్నదిగా?"

[[sections.items]]
n = 6
sanskrit_telugu = "లవణం కించిదస్తి. రామఠం సర్వథా నాస్తి."
english = "There is a little salt. Asafoetida is entirely absent."
telugu = "ఉప్పు కొంచెమున్నది. ఇంగువ అసలే లేదు."

[[sections.items]]
n = 7
sanskrit_telugu = "తర్హి శాకం కథం కరిష్యసి?"
english = "Then how will you prepare the vegetable dish?"
telugu = "అయితే కూరను యెట్లు చేయఁగలవు?"

[[sections.items]]
n = 8
sanskrit_telugu = "శాకే లవణం కిమర్థం రే?"
english = "Why is salt (needed) in the vegetable dish?"
telugu = "కూరలో నుప్పు యేమిటికిరా?"

[[sections.items]]
n = 9
sanskrit_telugu = "లవణం నాస్తి చేత్ శాకం సమ్యక్ న స్యాత్."
english = "If there is no salt, the vegetable dish would not be proper."
telugu = "ఉప్పు లేకపోతే కూర బాగుగా యుండదు."

[[sections.items]]
n = 10
sanskrit_telugu = "అతః త్వం స్నానం కృత్వా శీఘ్రం భోజనం కురు."
english = "Therefore, having bathed, quickly prepare the meal."
telugu = "అందువల్లనే నీవు స్నానముచేసి త్వరగా భోజనము చేయుము."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నీవు మీతండ్రిని ఎక్కడికి దీసికొని వెళ్ళుచున్నావు?"
english = "Where are you taking your father?"
sanskrit_telugu = "త్వం తవ జనకం కుత్ర నయసి?"

[[sections.items]]
n = 2
telugu = "నేను మాతమ్ముని మీయింటికి దీసికొని వెళ్ళుచున్నాను."
english = "I am taking my younger brother to your house."
sanskrit_telugu = "అహం అస్మదనుజం యుష్మద్గృహం నయామి."

[[sections.items]]
n = 3
telugu = "అక్కడ కెందుకు?"
english = "Why there?"
sanskrit_telugu = "తత్ర కిమర్థం?"

[[sections.items]]
n = 4
telugu = "భోజనమును చేయుటకు."
english = "To have a meal."
sanskrit_telugu = "అన్నం ఖాదితుం."

[[sections.items]]
n = 5
telugu = "అక్కడ నన్నమును తిని యిక్కడ నుందుము."
english = "Having eaten food there, we will stay here."
sanskrit_telugu = "తత్ర అన్నం ఖాదిత్వా అత్ర స్థాస్యామః."

[[sections.items]]
n = 6
telugu = "మీతమ్ముఁ డెక్కడ నున్నాఁడు?"
english = "Where is your younger brother?"
sanskrit_telugu = "తవ అనుజః కుత్రాస్తి?"

[[sections.items]]
n = 7
telugu = "వాఁడు మాయింటిలో బావిలో స్నానము చేయుచున్నాఁడు."
english = "He is bathing in the well at our house."
sanskrit_telugu = "సః అస్మద్గృహే కూపే స్నానం కరోతి."

[[sections.items]]
n = 8
telugu = "మీబావిలో నీ రున్నదిరా?"
english = "Is there water in your well?"
sanskrit_telugu = "రే! తవ కూపే జలమస్తి వా?"

[[sections.items]]
n = 9
telugu = "కొంచెమున్నది గాని బాగుగా లేదు."
english = "There is a little, but it is not good."
sanskrit_telugu = "కించిదస్తి; కింతు సమ్యక్ నాస్తి."

[[sections.items]]
n = 10
telugu = "అయితే అక్కడ నెట్లు స్నానము చేయుచున్నాఁడు?"
english = "Then how is he bathing there?"
sanskrit_telugu = "తర్హి తత్ర కథం స్నానం కరోతి?"


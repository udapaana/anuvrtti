[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "మూషకాః మార్జాలైః యుద్ధం కుర్వంతి."
english = "Rats fight with cats."
telugu = "ఎలుకలు పిల్లులతో యుద్ధము చేయుచున్నవి."

[[sections.items]]
n = 2
sanskrit_telugu = "వృక్షాః చలంతి."
english = "The trees are moving."
telugu = "చెట్లు కదలుచున్నవి."

[[sections.items]]
n = 3
sanskrit_telugu = "బాలకాః క్షీరం పీత్వా అంగణేషు చరంతి."
english = "Having drunk the milk, the boys are walking in the courtyards."
telugu = "పిల్లలు పాలు త్రాగి అంగళ్ళలో తిరుగుచున్నారు."

[[sections.items]]
n = 4
sanskrit_telugu = "శ్వః ప్రాతః అహం త్వాం ద్రష్టుం అగమిష్యామి."
english = "Tomorrow morning I will come to see you."
telugu = "రేపు ప్రొద్దున నేను నిన్ను చూడఁబోవుదును."

[[sections.items]]
n = 5
sanskrit_telugu = "త్వం అద్య మమ జనకం దృష్ట్వా అగచ్ఛ."
english = "Today, having seen my father, go."
telugu = "నీవు నేఁడు నాతండ్రిని చూచి వెళ్ళుము."

[[sections.items]]
n = 6
sanskrit_telugu = "అస్మదనుజః బ్రాహ్మణాన్ ప్రష్టుం అగచ్ఛత్."
english = "Our younger brother went to ask the brahmins."
telugu = "మా తమ్ముఁడు బ్రాహ్మణులను అడుగఁబోయెను."

[[sections.items]]
n = 7
sanskrit_telugu = "ఏతే తత్ర కిం కరిష్యంతి వా పృష్ట్వా అగచ్ఛ."
english = "Having asked what these will do there, go."
telugu = "వీరు అక్కడ ఏమి చేయఁగలరని అడిగి వెళ్ళుము."

[[sections.items]]
n = 8
sanskrit_telugu = "మాస్తు! అహమేవ గమిష్యామి; త్వం అత్ర వస."
english = "Never mind! I myself will go; you stay here."
telugu = "పోనిమ్ము! నేనే వెళ్ళుదును; నీవు ఇక్కడ నుండుము."

[[sections.items]]
n = 9
sanskrit_telugu = "ఏషః బాలకః శ్వః బ్రాహ్మణః భవిష్యతి."
english = "This boy will become a brahmin tomorrow."
telugu = "ఈ పిల్లవాఁడు రేపు బ్రాహ్మణుఁడగును."

[[sections.items]]
n = 10
sanskrit_telugu = "త్వం ఇదానీం కుత్ర గంతుం చలసివా; వద."
english = "Where are you moving to go now? Tell me."
telugu = "నీవు ఇప్పుడు ఎక్కడికి వెళ్ళఁదలఁచినావు; చెప్పుము."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మీరు మాతో యుద్ధమును చేయఁజాలుదురా?"
english = "Can you all fight with us?"
sanskrit_telugu = "యూయం అస్మాభిః సహ యుద్ధం కరిష్యథ కిం?"

[[sections.items]]
n = 2
telugu = "నే నపటికి వెళ్ళవలెను."
english = "I must go by then."
sanskrit_telugu = "అహం తావత్పర్యంతం గంతవ్యం."

[[sections.items]]
n = 3
telugu = "మీ రీ వేళ నెయ్యి తీసికొనిరావలె."
english = "You all must bring ghee at this time."
sanskrit_telugu = "యూయం ఇదానీం ఘృతం ఆనయత."

[[sections.items]]
n = 4
telugu = "వారు మా యింటిని చూడవలెను."
english = "They must see our house."
sanskrit_telugu = "తే అస్మద్గృహం ద్రష్టుం అగచ్ఛన్."

[[sections.items]]
n = 5
telugu = "ఎవరిని చూచుటకు వెళ్ళినావు?"
english = "To see whom did you go?"
sanskrit_telugu = "కం ద్రష్టుం అగచ్ఛః?"

[[sections.items]]
n = 6
telugu = "వీరిని పిలిచి మాతండ్రి నిక్కడికి రమ్మని చెప్పుము."
english = "Calling these people, tell them that our father should come here."
sanskrit_telugu = "ఏతాన్ ఆహూయ అస్మద్జనకః అత్ర ఆగచ్ఛతు ఇతి వద."

[[sections.items]]
n = 7
telugu = "పోనిమ్ము నీ వెందుకు వానితో యుద్ధము చేసినావు?"
english = "Never mind, why did you fight with him?"
sanskrit_telugu = "మాస్తు; త్వం తేన సహ కిమర్థం యుద్ధం అకరోః?"

[[sections.items]]
n = 8
telugu = "నీవు పిల్లవాఁడవుకదా."
english = "You are just a child, aren't you."
sanskrit_telugu = "త్వం బాలకః ఖలు."

[[sections.items]]
n = 9
telugu = "త్వరగా కదలుఁడు; ఎవరో వచ్చుచున్నారు."
english = "Move quickly; someone is coming."
sanskrit_telugu = "శీఘ్రం చలత; కశ్చిత్ ఆగచ్ఛతి."

[[sections.items]]
n = 10
telugu = "మన మీవేళ వారింటికి భోజనమునకు వెళ్ళవలె, త్వరగా స్నానము చేయుఁడు."
english = "We must go to their house for a meal at this time; bathe quickly."
sanskrit_telugu = "వయం ఇదానీం తేషాం గృహే భోజనార్థం గంతవ్యం; శీఘ్రం స్నానం కురుత."

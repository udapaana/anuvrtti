[[sections.items]]
sanskrit_telugu = "ఖాదేమ"
telugu_gloss = "మేము తినవలెను"
english = "we should eat"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "బాలకాః అంగణే అన్నం ఖాదంతి."
english = "The boys are eating rice in the courtyard."
telugu = "పిల్లలు మొంగిలిలో అన్నము తినుచున్నారు."

[[sections.items]]
n = 2
sanskrit_telugu = "అహం ఇదానీ మేవ శనైః స్నానం కుర్యామ్."
english = "I should bathe slowly right now."
telugu = "నేనిపుడే మెల్లగా స్నానముచేయవలెను."

[[sections.items]]
n = 3
sanskrit_telugu = "హే బ్రాహ్మణాః శనైః శనైః ఖాదత."
english = "O Brahmins, eat slowly, slowly."
telugu = "అయ్యా బ్రాహ్మణులారా! మెల్లగా మెల్లగా తినుఁడు."

[[sections.items]]
n = 4
sanskrit_telugu = "శీఘ్రం మాఖాదత."
english = "Do not eat hastily."
telugu = "త్వరగా తినకుఁడు."

[[sections.items]]
n = 5
sanskrit_telugu = "అస్మాకం బాలకాః దోష్యం కుర్వంతి."
english = "Our boys are misbehaving."
telugu = "మా పిల్లలు పులుసు వండుచున్నారు."

[[sections.items]]
n = 6
sanskrit_telugu = "యుష్మద్గామతటాకే జలం సమ్యగస్తి."
english = "There is plenty of water in your village pond."
telugu = "మీ యూరిచెఱువులో నీరు బాగుగా నున్నది."

[[sections.items]]
n = 7
sanskrit_telugu = "తత్ర సర్వదాపి తథైవ స్యాత్."
english = "May it always be so there."
telugu = "అక్కడ ఎప్పుడూ అట్లే యుండుఁగాక."

[[sections.items]]
n = 8
sanskrit_telugu = "అస్మాకం మంచః ఉచ్చైః అస్తిరే."
english = "Our bed is too high, you know."
telugu = "మా మంచమెత్తుగా నున్నదిగా."

[[sections.items]]
n = 9
sanskrit_telugu = "కించిత్ నీచైః కరిష్యసి కిం?"
english = "Will you make it a little lower?"
telugu = "కొంచెం తగ్గుగా చేయఁగలవా?"

[[sections.items]]
n = 10
sanskrit_telugu = "తథైవ కరిష్యామి; తవ మంచః కుత్రాస్తి?"
english = "I will do just so; where is your bed?"
telugu = "అట్లే చేయఁగలను; నీ మంచమెక్కడ నున్నది?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "వా రందఱును ఇవ్వేళ మాయింట్లో భోజనము చేయవలెను."
english = "All of them must take their meal at our house today."
sanskrit_telugu = "తే సర్వే అద్య అస్మద్గృహే అన్నం ఖాదేయుః."

[[sections.items]]
n = 2
telugu = "రేపు మేము మరల మీయింట్లో భోజనము చేయఁగలము."
english = "Tomorrow we will be able to take our meal at your house again."
sanskrit_telugu = "శ్వః వయం పునః యుష్మద్గృహే అన్నం ఖాదిష్యామః."

[[sections.items]]
n = 3
telugu = "అపుడు వా రెవరును ఇక్కడ లేరు."
english = "At that time none of them will be here."
sanskrit_telugu = "తదా తే కశ్చిదపి అత్ర న సంతి."

[[sections.items]]
n = 4
telugu = "అందువల్లనే మాయన్న మీయింట్లో స్నానము చేసినాఁడు."
english = "That is why our elder brother bathed at your house."
sanskrit_telugu = "తతః ఏవ అస్మదగ్రజః యుష్మద్గృహే స్నానం అకరోత్."

[[sections.items]]
n = 5
telugu = "ఇపుడు మీయింట్లో నెవరెవ రున్నారయ్యా?"
english = "Who all are in your house now, sir?"
sanskrit_telugu = "భోః! ఇదానీం యుష్మద్గృహే కే కే సంతి?"

[[sections.items]]
n = 6
telugu = "మీ యూరిలో చెఱువున్నదా?"
english = "Is there a pond in your village?"
sanskrit_telugu = "యుష్మద్గ్రామే తటాకమస్తి వా?"

[[sections.items]]
n = 7
telugu = "ఉన్నదిగాని ఇపుడు నీరు లేదు."
english = "There is one, but there is no water in it now."
sanskrit_telugu = "అస్తి; కింతు ఇదానీం జలం నాస్తి."

[[sections.items]]
n = 8
telugu = "మా యూరిలో కొందలు కూడ నున్నవి."
english = "There are also mountains in our village."
sanskrit_telugu = "అస్మద్గ్రామే పర్వతాః అపి సంతి."

[[sections.items]]
n = 9
telugu = "మీయూరిలో మాతండ్రి లేఁడా?"
english = "Is our father not in your village?"
sanskrit_telugu = "యుష్మద్గ్రామే అస్మద్జనకః న అస్తి కిం?"

[[sections.items]]
n = 10
telugu = "ఎందుకు లేఁడు? అక్కడనే యున్నాఁడుగదా?"
english = "Why would he not be? He is right there, isn't he?"
sanskrit_telugu = "కుతః నాస్తి? సః తత్రైవ అస్తి ఖలు."

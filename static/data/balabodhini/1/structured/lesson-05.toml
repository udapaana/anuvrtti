id = "balabodhini-1-05"
source = "balabodhini"
part = 1
number = 5
title_sanskrit = "పంచమః పాఠః"
title_telugu = "ఐదవ పాఠము"
title_english = "Fifth Lesson"
grammar_focus = "as-imperative (astu, edhi, asāni); numbers; time of day"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "ఏక"
telugu_gloss = "ఒకఁడు"
english = "one"

[[sections.items]]
sanskrit_telugu = "ప్రాతః"
telugu_gloss = "ప్రొద్దున"
english = "in the morning"

[[sections.items]]
sanskrit_telugu = "అస్తు"
telugu_gloss = "ఉండనీ, కానిమ్ము"
english = "let him be; so be it"

[[sections.items]]
sanskrit_telugu = "అనేకే"
telugu_gloss = "చాలమంది"
english = "many (people)"

[[sections.items]]
sanskrit_telugu = "సాయం"
telugu_gloss = "సందెవేళ"
english = "in the evening"

[[sections.items]]
sanskrit_telugu = "ఏధి"
telugu_gloss = "ఉండుము"
english = "be!"

[[sections.items]]
sanskrit_telugu = "కతి"
telugu_gloss = "ఎన్ని, ఎందరు"
english = "how many?"

[[sections.items]]
sanskrit_telugu = "నక్తం"
telugu_gloss = "రాత్రి"
english = "at night"

[[sections.items]]
sanskrit_telugu = "అసాని"
telugu_gloss = "నేనుండనిమ్ము"
english = "let me be"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తత్ర కతి సంతి?"
english = "How many are there?"
telugu = "అక్కడ ఎందరు నున్నారు?"

[[sections.items]]
n = 2
sanskrit_telugu = "ఏకః అద్య ప్రాతః తత్రాసీత్"
english = "One (person) was there this morning."
telugu = "ఇవ్వేళ ప్రొద్దున అక్కడ నొకఁ డుండెను."

[[sections.items]]
n = 3
sanskrit_telugu = "సః తత్రాస్తు"
english = "Let him be there."
telugu = "వాఁడు అక్కడ నుండనిమ్ము."

[[sections.items]]
n = 4
sanskrit_telugu = "త్వం అద్య సాయం అత్ర ఏధి"
english = "Be here this evening."
telugu = "నీవు ఇవ్వేళ సందెవేళ ఇక్కడ నుండుము."

[[sections.items]]
n = 5
sanskrit_telugu = "సాయం తత్ర అనేకే ఆసన్"
english = "Many were there in the evening."
telugu = "సందెవేళ అక్కడ చాలమంది నుండిరి."

[[sections.items]]
n = 6
sanskrit_telugu = "అహం తత్ర అసాని"
english = "Let me be there."
telugu = "నేను అక్కడ నుండనిమ్ము."

[[sections.items]]
n = 7
sanskrit_telugu = "తే సర్వే నక్తం తత్ర న సంతి"
english = "All of them are not there at night."
telugu = "వారందరు రాత్రి అక్కడ లేరు."

[[sections.items]]
n = 8
sanskrit_telugu = "యూయం అద్య నక్తం కుత్రాస్థ?"
english = "Where were you all tonight?"
telugu = "మీ రివ్వేళ రాత్రి ఎక్కడ నుంటిరి?"

[[sections.items]]
n = 9
sanskrit_telugu = "వయం సర్వే అత్రాస్మ"
english = "All of us were here."
telugu = "మేమందఱిమును ఇక్కడ నుంటిమి."

[[sections.items]]
n = 10
sanskrit_telugu = "కతి అత్రాసన్?"
english = "How many were here?"
telugu = "ఇక్కడ ఎందరు నుండిరి?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నీ వివేళ రాత్రి అక్కడ నుండు."
english = "Be there tonight."
sanskrit_telugu = "త్వం అద్య నక్తం తత్ర ఏధి."

[[sections.items]]
n = 2
telugu = "ఈవేళ ప్రొద్దున అక్కడ వెంద ఱుండిరి?"
english = "How many were there this morning?"
sanskrit_telugu = "అద్య ప్రాతః తత్ర కత్యాసన్?"

[[sections.items]]
n = 3
telugu = "అక్కడ నొకఁ డుండెను."
english = "One (person) was there."
sanskrit_telugu = "తత్ర ఏకః ఆసీత్."

[[sections.items]]
n = 4
telugu = "మీ రక్కడ నుంటిరా?"
english = "Were you all there?"
sanskrit_telugu = "యూయం తత్రాస్థవా?"

[[sections.items]]
n = 5
telugu = "మే మక్కడ లేము."
english = "We are not there."
sanskrit_telugu = "వయం తత్ర న స్మః."

[[sections.items]]
n = 6
telugu = "చాలమంది అపు డక్కడ నుండిరి."
english = "Many were there then."
sanskrit_telugu = "తదా తత్ర అనేకే ఆసన్."

[[sections.items]]
n = 7
telugu = "నే నిక్కడ నుండనిమ్ము"
english = "Let me be here."
sanskrit_telugu = "అహం అత్ర అసాని."

[[sections.items]]
n = 8
telugu = "వాఁ డిపు డెక్కడ నున్నాఁడు?"
english = "Where is he now?"
sanskrit_telugu = "సః ఇదానీం కుత్రాస్తి?"

[[sections.items]]
n = 9
telugu = "వాఁ డిక్కడ లేఁడు."
english = "He is not here."
sanskrit_telugu = "సః అత్ర నాస్తి."

[[sections.items]]
n = 10
telugu = "నీ వెపు డుంటివి?"
english = "When were you there?"
sanskrit_telugu = "త్వం కదా తత్రాసేః?"

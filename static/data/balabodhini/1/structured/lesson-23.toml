number = 23
title_sanskrit = "త్రయోవింశః పాఠః"
title_telugu = "ఇరువదిమూఁడవ పాఠము"
title_english = "Twenty-third Lesson"
grammar_focus = "khād imperative (all persons/numbers); genitive singular bālakasya and bālakānām; causal connectives kutaḥ / tataḥ / ataḥ; noun dantaḥ"

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "ప్రార్థనాద్యర్థకము — ఖాద్"
english = "Imperative of khād"

[[sections]]
type = "vocabulary"
language = "bilingual"

[[sections.items]]
sanskrit_telugu = "బాలకస్య"
telugu_gloss = "పిల్లనిది, పిల్లనికి"
english = "of the boy"

[[sections.items]]
sanskrit_telugu = "కుతః"
telugu_gloss = "ఎందువల్ల?"
english = "wherefore? from where?"

[[sections.items]]
sanskrit_telugu = "బాలకానాం"
telugu_gloss = "పిల్లలది, పిల్లలకు"
english = "of the boys"

[[sections.items]]
sanskrit_telugu = "తతః"
telugu_gloss = "అందువల్ల"
english = "therefore, from that"

[[sections.items]]
sanskrit_telugu = "దంతః"
telugu_gloss = "పల్లు"
english = "tooth"

[[sections.items]]
sanskrit_telugu = "అతః"
telugu_gloss = "ఇందువల్ల"
english = "therefore, from this"

[[sections.items]]
sanskrit_telugu = "ఖాదతు"
telugu_gloss = "తినుఁడు (ఒకఁడు)"
english = "let him eat"

[[sections.items]]
sanskrit_telugu = "ఖాదంతు"
telugu_gloss = "తినుఁడు (వారు)"
english = "let them eat"

[[sections.items]]
sanskrit_telugu = "ఖాద"
telugu_gloss = "తినుము"
english = "eat!"

[[sections.items]]
sanskrit_telugu = "ఖాదత"
telugu_gloss = "తినుఁడు"
english = "eat! (you all)"

[[sections.items]]
sanskrit_telugu = "ఖాదాని"
telugu_gloss = "తినుదును"
english = "let me eat"

[[sections.items]]
sanskrit_telugu = "ఖాదామ"
telugu_gloss = "తిందుము"
english = "let us eat"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "బాలకస్య దంతాః నాసన్."
english = "The boy had no teeth."

[[sections.items]]
n = 2
sanskrit_telugu = "ఏతే బాలకాః అన్నం ఖాదంతు."
english = "Let these boys eat rice."

[[sections.items]]
n = 3
sanskrit_telugu = "త్వమపి ఘటితి స్నానం కృత్వాఽన్నం ఖాద."
english = "You too, having bathed quickly, eat rice."

[[sections.items]]
n = 4
sanskrit_telugu = "అద్య మమాన్నం మాస్తు."
english = "Let there be no rice for me today."

[[sections.items]]
n = 5
sanskrit_telugu = "తర్హి కిం ఖాదిష్యసి?"
english = "Then what will you eat?"

[[sections.items]]
n = 6
sanskrit_telugu = "ఫలాని ఖాదిష్యామి."
english = "I will eat fruits."

[[sections.items]]
n = 7
sanskrit_telugu = "యుష్మద్గృహే ఫలాని సంతి వా?"
english = "Are there fruits in your house?"

[[sections.items]]
n = 8
sanskrit_telugu = "అనేక ఫలాని సంతి."
english = "There are many fruits."

[[sections.items]]
n = 9
sanskrit_telugu = "బాలకస్య జనకః భోజనం అకరోద్వా, న వా?"
english = "Did the boy's father eat or not?"

[[sections.items]]
n = 10
sanskrit_telugu = "సః ఇదానీం అస్మద్గృహస్య ఆరాత్ దేవస్య నమస్కారాన్ కరోతి."
english = "He is now making obeisances to the deity near our house."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నాకు పండ్లు లేవు."
english = "I have no fruits."

[[sections.items]]
n = 2
telugu = "అందువల్లనే పండ్లను తినను."
english = "That is why I do not eat fruits."

[[sections.items]]
n = 3
telugu = "అయిండ్లు మావే."
english = "Those houses are ours."

[[sections.items]]
n = 4
telugu = "మాయిండ్లు దగ్గఱగానే యున్నవి."
english = "Our houses are quite near."

[[sections.items]]
n = 5
telugu = "అమంచమం దెవరున్నారు?"
english = "Who is on that bed?"

[[sections.items]]
n = 6
telugu = "ఆ పిల్లవాఁడు తమ్ముని తిన్ని."
english = "That boy ate the younger brother's (share)."

[[sections.items]]
n = 7
telugu = "ఈ పండును వాఁడు తినినిమ్ము."
english = "Let him eat this fruit."

[[sections.items]]
n = 8
telugu = "ఆ పండును మీరు తినుఁడు."
english = "You all eat that fruit."

[[sections.items]]
n = 9
telugu = "లేకపోతే ఆపండ్లను మేము తిందుముగాక!"
english = "Otherwise let us eat those fruits!"

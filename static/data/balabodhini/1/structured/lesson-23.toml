[[sections.items]]
sanskrit_telugu = "ఖాదంతు"
telugu_gloss = "తినుఁడు (వారు)"
english = "let them eat"

[[sections.items]]
sanskrit_telugu = "ఖాద"
telugu_gloss = "తినుము"
english = "eat!"

[[sections.items]]
sanskrit_telugu = "ఖాదత"
telugu_gloss = "తినుఁడు"
english = "eat! (you all)"

[[sections.items]]
sanskrit_telugu = "ఖాదాని"
telugu_gloss = "తినుదును"
english = "let me eat"
tag = "u.p. e.v. loṭ"

[[sections.items]]
sanskrit_telugu = "ఖాదామ"
telugu_gloss = "తిందుము"
english = "let us eat"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "బాలకస్య దంతాః నాసన్."
english = "The boy had no teeth."
telugu = "పిల్లవానికి పళ్ళు లేవు."

[[sections.items]]
n = 2
sanskrit_telugu = "ఏతే బాలకాః అన్నం ఖాదంతు."
english = "Let these boys eat rice."
telugu = "ఈ పిల్లలు అన్నము తినుఁడు."

[[sections.items]]
n = 3
sanskrit_telugu = "త్వమపి ఘటితి స్నానం కృత్వాఽన్నం ఖాద."
english = "You too, having bathed quickly, eat rice."
telugu = "నీవును త్వరగా స్నానముచేసి అన్నము తినుము."

[[sections.items]]
n = 4
sanskrit_telugu = "అద్య మమాన్నం మాస్తు."
english = "Let there be no rice for me today."
telugu = "ఈ వేళ నాకు అన్నము వద్దు."

[[sections.items]]
n = 5
sanskrit_telugu = "తర్హి కిం ఖాదిష్యసి?"
english = "Then what will you eat?"
telugu = "అయితే నీవేమి తినఁగలవు?"

[[sections.items]]
n = 6
sanskrit_telugu = "ఫలాని ఖాదిష్యామి."
english = "I will eat fruits."
telugu = "పండ్లు తినఁగలను."

[[sections.items]]
n = 7
sanskrit_telugu = "యుష్మద్గృహే ఫలాని సంతి వా?"
english = "Are there fruits in your house?"
telugu = "మీయింట్లో పండ్లున్నవా?"

[[sections.items]]
n = 8
sanskrit_telugu = "అనేక ఫలాని సంతి."
english = "There are many fruits."
telugu = "చాలా పండ్లున్నవి."

[[sections.items]]
n = 9
sanskrit_telugu = "బాలకస్య జనకః భోజనం అకరోద్వా, న వా?"
english = "Did the boy's father eat or not?"
telugu = "పిల్లవాని తండ్రి భోజనము చేసినాఁడా లేదా?"

[[sections.items]]
n = 10
sanskrit_telugu = "సః ఇదానీం అస్మద్గృహస్య ఆరాత్ దేవస్య నమస్కారాన్ కరోతి."
english = "He is now making obeisances to the deity near our house."
telugu = "వాఁడిపుడు మాయింటికి దగ్గఱగా దేవునికి నమస్కారము లాచరించుచున్నాఁడు."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నాకు పండ్లు లేవు."
english = "I have no fruits."
sanskrit_telugu = "మమ ఫలాని న సంతి."

[[sections.items]]
n = 2
telugu = "అందువల్లనే పండ్లను తినను."
english = "That is why I do not eat fruits."
sanskrit_telugu = "తతః ఏవ ఫలాని న ఖాదామి."

[[sections.items]]
n = 3
telugu = "అయిం డెవరివి?"
english = "Whose is this house?"
sanskrit_telugu = "ఏతత్ గృహం కస్య?"

[[sections.items]]
n = 4
telugu = "అయిండ్లు మావే."
english = "Those houses are ours."
sanskrit_telugu = "తాని గృహాణి అస్మాకమేవ."

[[sections.items]]
n = 5
telugu = "మాయిండ్లు దగ్గఱగానే యున్నవి."
english = "Our houses are quite near."
sanskrit_telugu = "అస్మాకం గృహాణి ఆరాత్ ఏవ సంతి."

[[sections.items]]
n = 6
telugu = "అమంచమం దెవరున్నారు?"
english = "Who is on that bed?"
sanskrit_telugu = "తస్మిన్ మంచే కే సంతి?"

[[sections.items]]
n = 7
telugu = "అపిల్లవానియొక్క అన్న."
english = "That boy's elder brother."
sanskrit_telugu = "సః బాలకస్య అగ్రజః."

[[sections.items]]
n = 8
telugu = "ఈ పండును వాఁడు తినినిమ్ము."
english = "Let him eat this fruit."
sanskrit_telugu = "సః ఏతత్ ఫలం ఖాదతు."

[[sections.items]]
n = 9
telugu = "ఆ పండును మీరు తినుఁడు."
english = "You all eat that fruit."
sanskrit_telugu = "యూయం తత్ ఫలం ఖాదత."

[[sections.items]]
n = 10
telugu = "లేకపోతే ఆపండ్లను మేము తిందుముగాక!"
english = "Otherwise let us eat those fruits!"
sanskrit_telugu = "నోచేత్ తాని ఫలాని వయం ఖాదామ!"

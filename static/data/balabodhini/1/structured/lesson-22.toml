sanskrit_telugu = "ఏతేషాం"
telugu_gloss = "వీరి, వీరియొక్క"
english = "of these"

[[sections.items]]
sanskrit_telugu = "ఆరాత్"
telugu_gloss = "దూరముగా, దగ్గఱగా"
english = "from afar; near"

[[sections.items]]
sanskrit_telugu = "కేషాం"
telugu_gloss = "ఎవరి, ఎవరియొక్క?"
english = "of whom?"

[[sections.items]]
sanskrit_telugu = "సకృత్"
telugu_gloss = "ఒకమాఱు"
english = "once, one time"

[[sections.items]]
sanskrit_telugu = "అంజనం"
telugu_gloss = "కాటుక"
english = "collyrium, kohl"

[[sections.items]]
sanskrit_telugu = "కృత్వా"
telugu_gloss = "చేసి"
english = "having done"

[[sections.items]]
sanskrit_telugu = "ఖాదిష్యతి"
telugu_gloss = "తినఁగలఁడు"
english = "he will eat"

[[sections.items]]
sanskrit_telugu = "ఖాదిష్యంతి"
telugu_gloss = "తినఁగలరు"
english = "they will eat"

[[sections.items]]
sanskrit_telugu = "ఖాదిష్యసి"
telugu_gloss = "తినఁగలవు"
english = "you will eat"

[[sections.items]]
sanskrit_telugu = "ఖాదిష్యథ"
telugu_gloss = "మీరు తినఁగలరు"
english = "you all will eat"

[[sections.items]]
sanskrit_telugu = "ఖాదిష్యామి"
telugu_gloss = "తినఁగలను"
english = "I will eat"

[[sections.items]]
sanskrit_telugu = "ఖాదిష్యామః"
telugu_gloss = "తినఁగలము"
english = "we will eat"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "వయం భోజనం కృత్వా ఫలం ఖాదిష్యామః."
english = "After eating the meal, we will eat fruit."

[[sections.items]]
n = 2
sanskrit_telugu = "త్వం ఆలస్యం మా కురు."
english = "Do not delay."

[[sections.items]]
n = 3
sanskrit_telugu = "ఘటితి స్నానం కృత్వా భోజనం కురు."
english = "Having bathed quickly, take your meal."

[[sections.items]]
n = 4
sanskrit_telugu = "అస్మద్గృహే ఫలాని న సంతి."
english = "There are no fruits in our house."

[[sections.items]]
n = 5
sanskrit_telugu = "యుష్మద్గృహే అన్నం అస్తి చేత్ భోజనం కురుత."
english = "If there is rice in your house, eat your meal."

[[sections.items]]
n = 6
sanskrit_telugu = "నోచేత్ తూష్టీం స్థ."
english = "Otherwise remain silent."

[[sections.items]]
n = 7
sanskrit_telugu = "హే బ్రాహ్మణాః! కిమర్థం భిక్షాటనం కరిష్యథ?"
english = "O Brahmins! Why will you go begging?"

[[sections.items]]
n = 8
sanskrit_telugu = "అరే బాలక! అస్మద్గృహే ఫలాని సంతి; ఖాదిష్యసి కిం?"
english = "Hey boy! There are fruits in our house; will you eat?"

[[sections.items]]
n = 9
sanskrit_telugu = "కిం ఫల మస్తి?"
english = "Is there any fruit?"

[[sections.items]]
n = 10
sanskrit_telugu = "అహం ఖాదిష్యామి. అంజనం కుత్రాస్తి?"
english = "I will eat. Where is the collyrium?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "కాని మా తండ్రి యేపంది తినఁగలఁడు?"
english = "But what can our father eat?"

[[sections.items]]
n = 2
telugu = "మీరిపంటును తినరా?"
english = "Won't you eat this fruit?"

[[sections.items]]
n = 3
telugu = "మే మీ పంటును తినము."
english = "We do not eat this fruit."

[[sections.items]]
n = 4
telugu = "మీ యింట్లో పండ్లున్నవా?"
english = "Are there fruits in your house?"

[[sections.items]]
n = 5
telugu = "వీరి యింట్లో పండ్లేవు."
english = "There are no fruits in their house."

[[sections.items]]
n = 6
telugu = "ఎవరికి అన్నము లేదు? నాకు లేదు."
english = "Who has no rice? I have none."

[[sections.items]]
n = 7
telugu = "ఎందుకు లేదు?"
english = "Why is there none?"

[[sections.items]]
n = 8
telugu = "ఈ వేళ మా తమ్ముఁడు వంటను చేయలేదు."
english = "Today our younger brother did not cook."

[[sections.items]]
n = 9
telugu = "అయ్యో మా యింట్లో నున్నదిగాని త్వరగా స్నానముచేసి తినెదవా?"
english = "Oh, there is some in our house — will you come and bathe quickly and eat?"

[[sections.items]]
n = 10
telugu = "మాయింట్లో కాటుక లేదు."
english = "There is no collyrium in our house."

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "యూయం తత్ర కిం కురుథ?"
english = "What are you all doing there?"
telugu = "మీ రక్కడ నేమి చేయుచున్నారు?"

[[sections.items]]
n = 2
sanskrit_telugu = "వయం తత్రాస్మ."
english = "We are there."
telugu = "మే మక్కడ నున్నాము."

[[sections.items]]
n = 3
sanskrit_telugu = "కిమపి నాస్తి."
english = "There is nothing at all."
telugu = "ఏమియు లేదు."

[[sections.items]]
n = 4
sanskrit_telugu = "తే తత్ర కిం కుర్వంతి?"
english = "What are they doing there?"
telugu = "వా రక్కడ నేమి చేయుచున్నారు?"

[[sections.items]]
n = 5
sanskrit_telugu = "న కించిదపి."
english = "Not even a little / Nothing at all."
telugu = "కొంచెమైనను లేదు."

[[sections.items]]
n = 6
sanskrit_telugu = "వయం కిం కుర్మః?"
english = "What do we do?"
telugu = "మే మేమి చేయుదుము?"

[[sections.items]]
n = 7
sanskrit_telugu = "దేవాః కుత్రాసన్?"
english = "Where were the gods?"
telugu = "దేవులు ఎక్కడ నుండిరి?"

[[sections.items]]
n = 8
sanskrit_telugu = "కుత్రాపి నాసన్."
english = "They were nowhere."
telugu = "ఎక్కడను లేరు."

[[sections.items]]
n = 9
sanskrit_telugu = "అగ్రజాః కే?"
english = "Who are the elder brothers?"
telugu = "అన్నలు ఎవరు?"

[[sections.items]]
n = 10
sanskrit_telugu = "తే సర్వేపి అగ్రజాః."
english = "All of them are elder brothers."
telugu = "వా రందఱును అన్నలే."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "ఎవ రేమి చేయుచున్నారు?"
english = "Who is doing what?"
sanskrit_telugu = "కే కిం కుర్వంతి?"

[[sections.items]]
n = 2
telugu = "వారు మఱొక చోట నున్నారు."
english = "They are in another place."
sanskrit_telugu = "తే అన్యత్ర సంతి."

[[sections.items]]
n = 3
telugu = "అలాగా!"
english = "Is that so! / Indeed!"
sanskrit_telugu = "తథా!"

[[sections.items]]
n = 4
telugu = "అయ్యో! మీ రిక్కడ నేమి చేయుచున్నారు?"
english = "Alas! What are you all doing here?"
sanskrit_telugu = "బత! యూయం అత్ర కిం కురుథ?"

[[sections.items]]
n = 5
telugu = "ఏమియును లేదు."
english = "There is nothing at all."
sanskrit_telugu = "కిమపి నాస్తి."

[[sections.items]]
n = 6
telugu = "కొందఱు అక్కడ లేరు."
english = "Some are not there."
sanskrit_telugu = "కతిచిత్ తత్ర న సంతి."

[[sections.items]]
n = 7
telugu = "ఎందఱు లేరు?"
english = "How many are absent?"
sanskrit_telugu = "కతి న సంతి?"

[[sections.items]]
n = 8
telugu = "మే మందఱిమును ఇక్కడనే యున్నాము."
english = "All of us are right here."
sanskrit_telugu = "వయం సర్వేపి అత్రైవ స్మః."

[[sections.items]]
n = 9
telugu = "వీ రందఱును దేవులట."
english = "All of these are gods, reportedly."
sanskrit_telugu = "ఏతే సర్వేపి దేవాః కిల."

[[sections.items]]
n = 10
telugu = "మే మందఱి మేమియును చేయుట లేదు."
english = "All of us are doing nothing."
sanskrit_telugu = "వయం సర్వే కిమపి న కుర్మః."

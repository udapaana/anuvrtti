id = "balabodhini-1-00"
source = "balabodhini"
part = 1
number = 0
title_sanskrit_telugu = "శూన్యమః పాఠః"
title_telugu = "సున్నాయి పాఠము"
title_english = "Lesson 0: Script & Sounds"
grammar_focus = "Telugu script; svara; vyañjana; anusvāra; sandhi"
sutras = []

# ─────────────────────────────────────────────
# SECTION 1: Why Telugu script?
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "బాలబోధిని తెలుగు లిపిలో రాయబడినది. సంస్కృతమును తెలుగు లిపిలో చదవనేర్చుట మీ మొదటి అడుగు."
english = "The Bālabodhini is written in Telugu script. Learning to read Sanskrit in Telugu script is your first step."

# ─────────────────────────────────────────────
# SECTION 2: Vowels (svara)
# ─────────────────────────────────────────────

[[sections]]
type = "script_table"
label = "svara — vowels"
label_telugu = "స్వర — అచ్చులు"

[[sections.items]]
telugu = "అ"
iast = "a"
note = "short a — like 'u' in 'but'"

[[sections.items]]
telugu = "ఆ"
iast = "ā"
note = "long ā — like 'a' in 'father'"

[[sections.items]]
telugu = "ఇ"
iast = "i"
note = "short i — like 'i' in 'bit'"

[[sections.items]]
telugu = "ఈ"
iast = "ī"
note = "long ī — like 'ee' in 'feet'"

[[sections.items]]
telugu = "ఉ"
iast = "u"
note = "short u — like 'u' in 'put'"

[[sections.items]]
telugu = "ఊ"
iast = "ū"
note = "long ū — like 'oo' in 'food'"

[[sections.items]]
telugu = "ఋ"
iast = "ṛ"
note = "vocalic r — a syllabic r sound; no close English equivalent"

[[sections.items]]
telugu = "ఎ"
iast = "e"
note = "long e — like 'a' in 'late' (always long in Sanskrit)"

[[sections.items]]
telugu = "ఐ"
iast = "ai"
note = "diphthong — like 'ai' in 'aisle'"

[[sections.items]]
telugu = "ఒ"
iast = "o"
note = "long o — like 'o' in 'go' (always long in Sanskrit)"

[[sections.items]]
telugu = "ఔ"
iast = "au"
note = "diphthong — like 'ou' in 'loud'"

# ─────────────────────────────────────────────
# SECTION 3: Special marks
# ─────────────────────────────────────────────

[[sections]]
type = "script_table"
label = "special marks"
label_telugu = "విశేష చిహ్నములు"

[[sections.items]]
telugu = "ం"
iast = "ṃ / anusvāra"
note = "nasal resonance written as a dot above. Heard as 'n' or 'm' depending on context. E.g. అహం (ahaṃ = I)"

[[sections.items]]
telugu = "ః"
iast = "ḥ / visarga"
note = "a soft h-like breath at the end of a syllable. E.g. రామః (rāmaḥ)"

[[sections.items]]
telugu = "్"
iast = "(halanta / virāma)"
note = "a small hook below a consonant — means the consonant has no following vowel. E.g. అస్తి = అ+స్+తి"

# ─────────────────────────────────────────────
# SECTION 4: Consonants (selected)
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "సంస్కృతంలో ఐదు వర్గములు ఉన్నవి: క-వర్గ, చ-వర్గ, ట-వర్గ, త-వర్గ, ప-వర్గ."
english = "Sanskrit has five consonant groups (varga): ka-varga, ca-varga, ṭa-varga, ta-varga, pa-varga. Each has five sounds — unvoiced, unvoiced aspirated, voiced, voiced aspirated, nasal."

[[sections]]
type = "script_table"
label = "vyañjana — key consonants"
label_telugu = "వ్యంజన — ముఖ్యమైన హల్లులు"

[[sections.items]]
telugu = "క"
iast = "ka"
note = "like 'k' in 'skip'"

[[sections.items]]
telugu = "గ"
iast = "ga"
note = "like 'g' in 'go'"

[[sections.items]]
telugu = "చ"
iast = "ca"
note = "like 'ch' in 'chair'"

[[sections.items]]
telugu = "జ"
iast = "ja"
note = "like 'j' in 'jar'"

[[sections.items]]
telugu = "ట"
iast = "ṭa"
note = "retroflex — tongue curls back. No close English equivalent."

[[sections.items]]
telugu = "డ"
iast = "ḍa"
note = "voiced retroflex — tongue curls back"

[[sections.items]]
telugu = "త"
iast = "ta"
note = "dental — tongue touches teeth, softer than English 't'"

[[sections.items]]
telugu = "ద"
iast = "da"
note = "voiced dental — softer than English 'd'"

[[sections.items]]
telugu = "న"
iast = "na"
note = "dental nasal — like 'n' in 'now'"

[[sections.items]]
telugu = "ప"
iast = "pa"
note = "like 'p' in 'spin'"

[[sections.items]]
telugu = "బ"
iast = "ba"
note = "like 'b' in 'bed'"

[[sections.items]]
telugu = "మ"
iast = "ma"
note = "like 'm' in 'man'"

[[sections.items]]
telugu = "య"
iast = "ya"
note = "like 'y' in 'yes'"

[[sections.items]]
telugu = "ర"
iast = "ra"
note = "a tapped r — lighter than English 'r'"

[[sections.items]]
telugu = "ల"
iast = "la"
note = "like 'l' in 'let'"

[[sections.items]]
telugu = "వ"
iast = "va"
note = "between 'v' and 'w'"

[[sections.items]]
telugu = "శ"
iast = "śa"
note = "palatal sibilant — like 'sh' in 'ship'"

[[sections.items]]
telugu = "స"
iast = "sa"
note = "like 's' in 'sun'"

[[sections.items]]
telugu = "హ"
iast = "ha"
note = "like 'h' in 'house'"

# ─────────────────────────────────────────────
# SECTION 5: How vowel marks work
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "ప్రతి హల్లుకు 'అ' అని స్వరము ఉంటుంది. మిగతా స్వరముల గుర్తులు హల్లు యొక్క పక్కన చేర్చబడతాయి. ఉదాహరణ: క + ఇ = కి, క + ఆ = కా."
english = "Every consonant inherently has the vowel 'a'. Other vowels are written as marks attached to the consonant. Example: ka + i = ki (కి), ka + ā = kā (కా)."

[[sections]]
type = "script_table"
label = "vowel marks on క (ka)"
label_telugu = "క మీద స్వర గుర్తులు"

[[sections.items]]
telugu = "క"
iast = "ka"
note = "inherent 'a'"

[[sections.items]]
telugu = "కా"
iast = "kā"
note = "long ā mark"

[[sections.items]]
telugu = "కి"
iast = "ki"
note = "short i mark"

[[sections.items]]
telugu = "కీ"
iast = "kī"
note = "long ī mark"

[[sections.items]]
telugu = "కు"
iast = "ku"
note = "short u mark"

[[sections.items]]
telugu = "కూ"
iast = "kū"
note = "long ū mark"

[[sections.items]]
telugu = "కే"
iast = "ke"
note = "e mark"

[[sections.items]]
telugu = "కో"
iast = "ko"
note = "o mark"

# ─────────────────────────────────────────────
# SECTION 6: Reading practice
# ─────────────────────────────────────────────

[[sections]]
type = "script_table"
label = "reading practice — words from Lesson 1"
label_telugu = "చదువు అభ్యాసము — మొదటి పాఠము పదములు"

[[sections.items]]
telugu = "అస్తి"
iast = "asti"
note = "he/she/it is  (అ + స్ + తి)"

[[sections.items]]
telugu = "అసి"
iast = "asi"
note = "you are  (అ + సి)"

[[sections.items]]
telugu = "అస్మి"
iast = "asmi"
note = "I am  (అ + స్ + మి)"

[[sections.items]]
telugu = "సః"
iast = "saḥ"
note = "he  (స + ః)"

[[sections.items]]
telugu = "త్వమ్"
iast = "tvam"
note = "you  (త్ + వ + మ్)"

[[sections.items]]
telugu = "అహమ్"
iast = "aham"
note = "I  (అ + హ + మ్)"

[[sections.items]]
telugu = "తత్ర"
iast = "tatra"
note = "there  (త + త్ + ర)"

[[sections.items]]
telugu = "అత్ర"
iast = "atra"
note = "here  (అ + త్ + ర)"

[[sections.items]]
telugu = "కుత్ర"
iast = "kutra"
note = "where?  (కు + త్ + ర)"

# ─────────────────────────────────────────────
# SECTION 7: Sandhi — what you will see
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "సంధి అనగా రెండు పదముల కలయిక వలన ధ్వని మారుట. ఇది సంస్కృతంలో సహజమైన ధర్మము. మీరు ఇప్పుడు వ్యాకరణమును నేర్చుకోవడం మొదలుపెట్టినప్పుడు, పాఠ్యభాగాలలో పదములు వేరువేరుగా ఉంటాయి. సమాధానాలలో సహజ సంధి కనిపిస్తుంది."
english = "Sandhi is the blending of sounds at word boundaries — it is natural Sanskrit as it is written and spoken. In the reading sections of this book, words are deliberately kept separate so you can learn each one. In the exercise answers you will see natural sandhi. The two most common patterns you will encounter are shown below."

[[sections]]
type = "sandhi_table"
label = "svara-sandhi — the two patterns you need"
label_telugu = "స్వర సంధి — మీకు అవసరమైన రెండు నమూనాలు"

[[sections.items]]
pattern = "a + a → ā"
telugu_before = "తత్ర + అస్తి"
telugu_after = "తత్రాస్తి"
iast_before = "tatra + asti"
iast_after = "tatrāsti"
english = "Short a at end of word + short a at start of next → long ā"

[[sections.items]]
pattern = "a + ā → ā"
telugu_before = "అత్ర + ఆగచ్ఛతి"
telugu_after = "అత్రాగచ్ఛతి"
iast_before = "atra + āgacchati"
iast_after = "atrāgacchati"
english = "Short a + long ā → long ā"

[[sections.items]]
pattern = "ā + a → ā"
telugu_before = "రామా + అస్తి"
telugu_after = "రామాస్తి"
iast_before = "rāmā + asti"
iast_after = "rāmāsti"
english = "Long ā + short a → long ā"

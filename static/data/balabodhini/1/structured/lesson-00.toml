# ─────────────────────────────────────────────
# SECTION 6: Vowel marks — how syllables work
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "ప్రతి హల్లుకు 'అ' అని స్వరము ఉంటుంది. మిగతా స్వరముల గుర్తులు హల్లు యొక్క పక్కన చేర్చబడతాయి."
english = "Every consonant has an inherent 'a' vowel. Other vowels are written as marks attached to the consonant. The examples below show this with 'k' (ka, kā, ki…)."

[[sections]]
type = "script_table"
label = "vowel marks on k (ka, kā, ki…)"
label_telugu = "క మీద స్వర గుర్తులు"


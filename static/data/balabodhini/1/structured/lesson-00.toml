[[sections.items]]
iast = "ṭha"
note_english = "unvoiced retroflex aspirate"
note_telugu = "అఘోష మహాప్రాణ మూర్ధన్యము"

[[sections.items]]
iast = "ḍa"
note_english = "voiced retroflex"
note_telugu = "ఘోష మూర్ధన్యము"

[[sections.items]]
iast = "ḍha"
note_english = "voiced retroflex aspirate"
note_telugu = "ఘోష మహాప్రాణ మూర్ధన్యము"

[[sections.items]]
iast = "ṇa"
note_english = "retroflex nasal — tongue tip curls back"
note_telugu = "మూర్ధన్య అనునాసికము"

[[sections]]

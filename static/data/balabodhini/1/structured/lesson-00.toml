# ─────────────────────────────────────────────
# SECTION 7: Sandhi — what you will see
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "సంధి అనగా రెండు పదముల సంగమస్థానంలో ధ్వని మారడం — ఇది సహజ సంస్కృత వ్యాకరణ ధర్మము. పాఠ్యభాగాలలో మీరు నేర్చుకోవడానికి పదాలు వేరువేరుగా ఉంటాయి. సమాధానాలలో సహజ సంధి కనిపిస్తుంది."
english = "Sandhi is the blending of sounds at word boundaries — natural Sanskrit as written and spoken. In the reading sections words are kept separate so you can learn each one. In exercise answers you will see natural sandhi. The two most common patterns:"

[[sections]]
type = "sandhi_table"
label = "svara-sandhi — the two patterns you need"
label_telugu = "స్వర సంధి — మీకు అవసరమైన నమూనాలు"

[[sections.items]]
pattern = "a + a → ā"
iast_before = "tatra + asti"
iast_after = "tatrāsti"
english = "Short a at end of word + short a at start of next → long ā"

[[sections.items]]
pattern = "a + ā → ā"
iast_before = "atra + āgacchati"
iast_after = "atrāgacchati"
english = "Short a + long ā → long ā"

[[sections.items]]
pattern = "ā + a → ā"
iast_before = "rāmā + asti"
iast_after = "rāmāsti"
english = "Long ā + short a → long ā"

title_sanskrit_telugu = "శూన్యమః పాఠః"
title_telugu = "సున్నాయి పాఠము"
title_english = "Lesson 0: Script & Sounds"
grammar_focus = "svara; vyañjana; anusvāra; visarga; sandhi"
sutras = []

# ─────────────────────────────────────────────
# SECTION 1: Choose your script
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "పై కుడి మూలలో ఉన్న లిపి బటన్‌ను నొక్కి మీకు నచ్చిన లిపిని ఎంచుకోండి. తర్వాత ఈ పాఠం చదవండి."
english = "Use the script selector (top-right corner) to choose your preferred script — Devanagari, Telugu, IAST, or any other. The examples below will display in whichever script you select."

# ─────────────────────────────────────────────
# SECTION 2: Vowels (svara)
# ─────────────────────────────────────────────

[[sections]]
type = "script_table"
label = "svara — vowels"
label_telugu = "స్వర — అచ్చులు"

[[sections.items]]
iast = "a"
note_english = "short a — like 'u' in 'but'"
note_telugu = "హ్రస్వ అ"

[[sections.items]]
iast = "ā"
note_english = "long ā — like 'a' in 'father'"
note_telugu = "దీర్ఘ ఆ"

[[sections.items]]
iast = "i"
note_english = "short i — like 'i' in 'bit'"
note_telugu = "హ్రస్వ ఇ"

[[sections.items]]
iast = "ī"
note_english = "long ī — like 'ee' in 'feet'"
note_telugu = "దీర్ఘ ఈ"

[[sections.items]]
iast = "u"
note_english = "short u — like 'u' in 'put'"
note_telugu = "హ్రస్వ ఉ"

[[sections.items]]
iast = "ū"
note_english = "long ū — like 'oo' in 'food'"
note_telugu = "దీర్ఘ ఊ"

[[sections.items]]
iast = "ṛ"
note_english = "vocalic r — a syllabic r; no close English equivalent"
note_telugu = "స్వరాత్మక ర"

[[sections.items]]
iast = "e"
note_english = "long e — like 'a' in 'late' (always long in Sanskrit)"
note_telugu = "దీర్ఘ ఏ"

[[sections.items]]
iast = "ai"
note_english = "diphthong — like 'ai' in 'aisle'"
note_telugu = "సంధ్యక్షర ఐ"

[[sections.items]]
iast = "o"
note_english = "long o — like 'o' in 'go' (always long in Sanskrit)"
note_telugu = "దీర్ఘ ఓ"

[[sections.items]]
iast = "au"
note_english = "diphthong — like 'ou' in 'loud'"
note_telugu = "సంధ్యక్షర ఔ"

# ─────────────────────────────────────────────
# SECTION 3: Special marks
# ─────────────────────────────────────────────

[[sections]]
type = "script_table"
label = "special marks"
label_telugu = "విశేష చిహ్నములు"

[[sections.items]]
iast = "ṃ"
note_english = "anusvāra — nasal resonance; written as a dot above the letter. Sounds like 'n' or 'm' depending on context. E.g. ahaṃ (I)"
note_telugu = "అనుస్వారము — నాసిక్య ధ్వని. ఉదా: అహం (నేను)"

[[sections.items]]
iast = "ḥ"
note_english = "visarga — a soft h-like breath at end of syllable. E.g. rāmaḥ"
note_telugu = "విసర్గము — మృదువైన హ ధ్వని. ఉదా: రామః"

# ─────────────────────────────────────────────
# SECTION 4: Consonant groups
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "సంస్కృతంలో వ్యంజనాలు ఐదు వర్గాలుగా విభజించబడినాయి. ప్రతి వర్గంలో అఘోష, అఘోష మహాప్రాణ, ఘోష, ఘోష మహాప్రాణ, అనునాసిక అని ఐదు ధ్వనులు ఉన్నాయి."
english = "Sanskrit consonants are organised into five groups (varga) by place of articulation. Each has five sounds: unvoiced, unvoiced aspirate, voiced, voiced aspirate, nasal."

[[sections]]
type = "script_table"
label = "vyañjana — key consonants"
label_telugu = "వ్యంజన — ముఖ్యమైన హల్లులు"

[[sections.items]]
iast = "ka"
note_english = "velar — like 'k' in 'skip'"
note_telugu = "కంఠ్యము"

[[sections.items]]
iast = "ga"
note_english = "voiced velar — like 'g' in 'go'"
note_telugu = "ఘోష కంఠ్యము"

[[sections.items]]
iast = "ca"
note_english = "palatal — like 'ch' in 'chair'"
note_telugu = "తాలవ్యము"

[[sections.items]]
iast = "ja"
note_english = "voiced palatal — like 'j' in 'jar'"
note_telugu = "ఘోష తాలవ్యము"

[[sections.items]]
iast = "ṭa"
note_english = "retroflex — tongue curls back; no close English equivalent"
note_telugu = "మూర్ధన్యము — నాలుక వెనక్కి మడతపడుతుంది"

[[sections.items]]
iast = "ḍa"
note_english = "voiced retroflex"
note_telugu = "ఘోష మూర్ధన్యము"

[[sections.items]]
iast = "ta"
note_english = "dental — tongue touches upper teeth; softer than English 't'"
note_telugu = "దంత్యము — దంతములను స్పృశించే నాలుక"

[[sections.items]]
iast = "da"
note_english = "voiced dental — softer than English 'd'"
note_telugu = "ఘోష దంత్యము"

[[sections.items]]
iast = "na"
note_english = "dental nasal — like 'n' in 'now'"
note_telugu = "దంత్య అనునాసికము"

[[sections.items]]
iast = "pa"
note_english = "labial — like 'p' in 'spin'"
note_telugu = "ఓష్ఠ్యము"

[[sections.items]]
iast = "ba"
note_english = "voiced labial — like 'b' in 'bed'"
note_telugu = "ఘోష ఓష్ఠ్యము"

[[sections.items]]
iast = "ma"
note_english = "labial nasal — like 'm' in 'man'"
note_telugu = "ఓష్ఠ్య అనునాసికము"

[[sections.items]]
iast = "ya"
note_english = "semivowel — like 'y' in 'yes'"
note_telugu = "అంతస్థము య"

[[sections.items]]
iast = "ra"
note_english = "tapped r — lighter than English 'r'"
note_telugu = "అంతస్థము ర"

[[sections.items]]
iast = "la"
note_english = "lateral — like 'l' in 'let'"
note_telugu = "అంతస్థము ల"

[[sections.items]]
iast = "va"
note_english = "semivowel — between 'v' and 'w'"
note_telugu = "అంతస్థము వ"

[[sections.items]]
iast = "śa"
note_english = "palatal sibilant — like 'sh' in 'ship'"
note_telugu = "తాలవ్య ఊష్మము"

[[sections.items]]
iast = "sa"
note_english = "dental sibilant — like 's' in 'sun'"
note_telugu = "దంత్య ఊష్మము"

[[sections.items]]
iast = "ha"
note_english = "glottal — like 'h' in 'house'"
note_telugu = "కంఠ్య ఊష్మము"

# ─────────────────────────────────────────────
# SECTION 5: Vowel marks — how syllables work
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "ప్రతి హల్లుకు 'అ' అని స్వరము ఉంటుంది. మిగతా స్వరముల గుర్తులు హల్లు యొక్క పక్కన చేర్చబడతాయి."
english = "Every consonant has an inherent 'a' vowel. Other vowels are written as marks attached to the consonant. The examples below show this with 'k' (ka, kā, ki…)."

[[sections]]
type = "script_table"
label = "vowel marks on k (ka, kā, ki…)"
label_telugu = "క మీద స్వర గుర్తులు"

[[sections.items]]
iast = "ka"
note_english = "inherent a"
note_telugu = "స్వాభావిక అ"

[[sections.items]]
iast = "kā"
note_english = "long ā mark"
note_telugu = "దీర్ఘ ఆ గుర్తు"

[[sections.items]]
iast = "ki"
note_english = "short i mark"
note_telugu = "హ్రస్వ ఇ గుర్తు"

[[sections.items]]
iast = "kī"
note_english = "long ī mark"
note_telugu = "దీర్ఘ ఈ గుర్తు"

[[sections.items]]
iast = "ku"
note_english = "short u mark"
note_telugu = "హ్రస్వ ఉ గుర్తు"

[[sections.items]]
iast = "kū"
note_english = "long ū mark"
note_telugu = "దీర్ఘ ఊ గుర్తు"

[[sections.items]]
iast = "ke"
note_english = "e mark"
note_telugu = "ఏ గుర్తు"

[[sections.items]]
iast = "ko"
note_english = "o mark"
note_telugu = "ఓ గుర్తు"


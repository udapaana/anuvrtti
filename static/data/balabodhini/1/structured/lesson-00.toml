note_telugu = "అఘోష తాలవ్యము"

[[sections.items]]
iast = "cha"
note_english = "unvoiced aspirate — 'ch' + strong breath"
note_telugu = "అఘోష మహాప్రాణ తాలవ్యము"

[[sections.items]]
iast = "ja"
note_english = "voiced — like 'j' in 'jar'"
note_telugu = "ఘోష తాలవ్యము"

[[sections.items]]
iast = "jha"
note_english = "voiced aspirate — 'j' + breath"
note_telugu = "ఘోష మహాప్రాణ తాలవ్యము"

[[sections.items]]
iast = "ña"
note_english = "palatal nasal — like 'ny' in 'canyon'"
note_telugu = "తాలవ్య అనునాసికము"

[[sections]]
type = "script_table"
label = "ṭa-varga — retroflex consonants"
label_telugu = "ట-వర్గ — మూర్ధన్య వ్యంజనములు"

[[sections.items]]

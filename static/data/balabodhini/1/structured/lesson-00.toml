[[sections.items]]
iast = "dha"
note_english = "voiced dental aspirate — 'd' + breath"
note_telugu = "ఘోష మహాప్రాణ దంత్యము"

[[sections.items]]
iast = "na"
note_english = "dental nasal — like 'n' in 'now'"

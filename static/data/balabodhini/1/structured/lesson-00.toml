label = "svara — vowels"
label_telugu = "స్వర — అచ్చులు"

[[sections.items]]
iast = "a"
note_english = "short a — like 'u' in 'but'"
note_telugu = "హ్రస్వ అ"

[[sections.items]]
iast = "ā"
note_english = "long ā — like 'a' in 'father'"
note_telugu = "దీర్ఘ ఆ"

[[sections.items]]
iast = "i"
note_english = "short i — like 'i' in 'bit'"
note_telugu = "హ్రస్వ ఇ"

[[sections.items]]
iast = "ī"
note_english = "long ī — like 'ee' in 'feet'"
note_telugu = "దీర్ఘ ఈ"

[[sections.items]]
iast = "u"
note_english = "short u — like 'u' in 'put'"
note_telugu = "హ్రస్వ ఉ"

[[sections.items]]
iast = "ū"
note_english = "long ū — like 'oo' in 'food'"
note_telugu = "దీర్ఘ ఊ"

[[sections.items]]
iast = "ṛ"
note_english = "vocalic r — syllabic r; no close English equivalent"
note_telugu = "హ్రస్వ ఋ — స్వరాత్మక ర"

[[sections.items]]
iast = "ṝ"
note_english = "long vocalic r — rare in classical Sanskrit"
note_telugu = "దీర్ఘ ౠ — అరుదు"

[[sections.items]]
iast = "ḷ"
note_english = "vocalic l — extremely rare; only in a few Vedic roots"
note_telugu = "స్వరాత్మక ల — అతి అరుదు"

[[sections.items]]
iast = "e"
note_english = "long e — like 'a' in 'late' (always long in Sanskrit)"
note_telugu = "దీర్ఘ ఏ"

[[sections.items]]
iast = "ai"
note_english = "diphthong — like 'ai' in 'aisle'"
note_telugu = "సంధ్యక్షర ఐ"

[[sections.items]]
iast = "o"
note_english = "long o — like 'o' in 'go' (always long in Sanskrit)"
note_telugu = "దీర్ఘ ఓ"

[[sections.items]]
iast = "au"
note_english = "diphthong — like 'ou' in 'loud'"
note_telugu = "సంధ్యక్షర ఔ"

# ─────────────────────────────────────────────
# SECTION 3: Special marks
# ─────────────────────────────────────────────

[[sections]]
type = "script_table"
label = "special marks"
label_telugu = "విశేష చిహ్నములు"

[[sections.items]]
iast = "ṃ"
note_english = "anusvāra — nasal resonance; a dot above the letter. Sounds like 'n' or 'm' depending on context. E.g. ahaṃ (I)"
note_telugu = "అనుస్వారము — నాసిక్య ధ్వని. ఉదా: అహం (నేను)"

[[sections.items]]
iast = "ḥ"
note_english = "visarga — a soft h-like breath at end of syllable. E.g. rāmaḥ"
note_telugu = "విసర్గము — మృదువైన హ ధ్వని. ఉదా: రామః"

# ─────────────────────────────────────────────
# SECTION 4: Consonant groups (varga)
# ─────────────────────────────────────────────

[[sections]]
type = "grammar_note"
language = "meta"

[[sections.items]]
telugu = "సంస్కృతంలో వ్యంజనాలు ఐదు వర్గాలుగా విభజించబడినాయి — కంఠ్య (velar), తాలవ్య (palatal), మూర్ధన్య (retroflex), దంత్య (dental), ఓష్ఠ్య (labial). ప్రతి వర్గంలో ఐదు ధ్వనులు: అఘోష, అఘోష మహాప్రాణ, ఘోష, ఘోష మహాప్రాణ, అనునాసిక."
english = "Sanskrit consonants are organised into five groups (varga) by place of articulation — velar, palatal, retroflex, dental, labial. Each varga has five sounds: unvoiced, unvoiced aspirate, voiced, voiced aspirate, nasal."

[[sections]]
type = "script_table"
label = "ka-varga — velar consonants"
label_telugu = "క-వర్గ — కంఠ్య వ్యంజనములు"

[[sections.items]]
iast = "ka"
note_english = "unvoiced — like 'k' in 'skip'"
note_telugu = "అఘోష కంఠ్యము"

[[sections.items]]
iast = "kha"
note_english = "unvoiced aspirate — 'k' + breath"
note_telugu = "అఘోష మహాప్రాణ కంఠ్యము"

[[sections.items]]
iast = "ga"
note_english = "voiced — like 'g' in 'go'"
note_telugu = "ఘోష కంఠ్యము"

[[sections.items]]
iast = "gha"
note_english = "voiced aspirate — 'g' + breath"
note_telugu = "ఘోష మహాప్రాణ కంఠ్యము"

[[sections.items]]
iast = "ṅa"
note_english = "velar nasal — like 'ng' in 'sing'"
note_telugu = "కంఠ్య అనునాసికము"

[[sections]]
type = "script_table"
label = "ca-varga — palatal consonants"

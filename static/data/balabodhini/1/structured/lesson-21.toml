[[sections.items]]
sanskrit_telugu = "అఖాదం"
telugu_gloss = "తిన్నాను"
english = "I ate"

[[sections.items]]
sanskrit_telugu = "అఖాదామ"
telugu_gloss = "తిన్నాము"
english = "we ate"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "యుష్మాకం గృహే అద్య వయం అన్నం అఖాదామ."
english = "Today we ate rice at your house."

[[sections.items]]
n = 2
sanskrit_telugu = "అస్మాకం అత్రగృహ మేవ నాస్తి."
english = "We do not even have a house here."

[[sections.items]]
n = 3
sanskrit_telugu = "సః యథా అఖాదత్, త్వం అపి తథా అఖాదః."
english = "Just as he ate, you too ate in the same way."

[[sections.items]]
n = 4
sanskrit_telugu = "యూయం తత్ర వృథా కిమర్థ మాస్థ?"
english = "For what purpose were you all staying there uselessly?"

[[sections.items]]
n = 5
sanskrit_telugu = "వయం తత్ర వృథా నాస్మ."
english = "We were not there in vain."

[[sections.items]]
n = 6
sanskrit_telugu = "కింతు తేషాం గృహే స్నానం కుర్మః."
english = "But we bathed at their house."

[[sections.items]]
n = 7
sanskrit_telugu = "రే బాలక! త్వం వృథా మా ఏధి."
english = "Hey boy! Don't you come here in vain."

[[sections.items]]
n = 8
sanskrit_telugu = "యుష్మద్గృహే పాకః కియత్పర్యంతం ఆసీత్?"
english = "How long did the cooking go on at your house?"

[[sections.items]]
n = 9
sanskrit_telugu = "శాక మకుర్యన్, అన్నం కుర్వంతి."
english = "They did not prepare the vegetables; they are cooking rice."

[[sections.items]]
n = 10
sanskrit_telugu = "తే శీఘ్రు మఖాదన్."
english = "They ate quickly."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "వారు లోపల నున్నారా, వెలుపల నున్నారా?"
english = "Are they inside or outside?"

[[sections.items]]
n = 2
telugu = "వారు మా యింట్లో నింతవఱఁ కుండిరి."
english = "They were in our house until now."

[[sections.items]]
n = 3
telugu = "మే మిపుడే పండ్లను దిన్నాము."
english = "We ate the fruits just now."

[[sections.items]]
n = 4
telugu = "మీ కొసము వా రిక్కడ నున్నారు."
english = "They are here for your sake."

[[sections.items]]
n = 5
telugu = "నీ వివ్వేళ సాయంకాల మేమి తింటివి?"
english = "What did you eat this evening?"

[[sections.items]]
n = 6
telugu = "నేను వారియొక్క చెంబునందు కూరను చేసితిని."
english = "I prepared vegetables in their vessel."

[[sections.items]]
n = 7
telugu = "ఇంతవఱకు నెక్కడ నున్నావురా?"
english = "Where were you until now, boy?"

[[sections.items]]
n = 8
telugu = "మీ యింట్లోనే యుంటినిగా."
english = "I was right in your house, of course."

[[sections.items]]
n = 9
telugu = "అలాగా! వా రెవరు?"
english = "Is that so! Who are they?"

[[sections.items]]
n = 10
telugu = "నిన్న ప్రొద్దున మీయింట్లో నెవరు స్నానము చేసినారో వారే వీరు."
english = "Those who bathed in your house yesterday morning — they are these very people."

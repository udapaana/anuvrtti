english = "we will do"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "కిం తత్?"
english = "What is that?"
telugu = "అది యేమిటి?"

[[sections.items]]
n = 2
sanskrit_telugu = "తత్ మమ గృహం."
english = "That is my house."
telugu = "అది నా యిల్లు."

[[sections.items]]
n = 3
sanskrit_telugu = "తత్ కిం?"
english = "What is that?"
telugu = "అది యేమిటి?"

[[sections.items]]
n = 4
sanskrit_telugu = "తత్ జలం."
english = "That is water."
telugu = "అది నీరు."

[[sections.items]]
n = 5
sanskrit_telugu = "ఏతత్ కస్య గృహం?"
english = "Whose house is this?"
telugu = "ఇది ఎవనియొక్క యిల్లు?"

[[sections.items]]
n = 6
sanskrit_telugu = "ఏతత్ యుష్మద్గృహం."
english = "This is your house."
telugu = "ఇది మీ యిల్లు."

[[sections.items]]
n = 7
sanskrit_telugu = "తే తటాకజలే స్నానం కరిష్యంతి భోః."
english = "They will bathe in the pond water, sir."
telugu = "వారు చెఱువు నీళ్ళలో స్నానము చేయఁగలరు అయ్యా."

[[sections.items]]
n = 8
sanskrit_telugu = "యుష్మద్గృహే ఘృతం అస్తి ను?"
english = "Is there ghee in your house?"
telugu = "మీ యింట నెయ్యి ఉన్నదా?"

[[sections.items]]
n = 9
sanskrit_telugu = "నాస్తి భోః."
english = "There is none, sir."
telugu = "లేదు అయ్యా."

[[sections.items]]
n = 10
sanskrit_telugu = "తే కదా స్నానం కరిష్యంతి, కదా పాకం కరిష్యంతి?"
english = "When will they bathe, when will they cook?"
telugu = "వారు ఎపుడు స్నానము చేయఁగలరు, ఎపుడు వంట చేయఁగలరు?"

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మేము రేపు వంటను చేయఁగలము."
english = "We will be able to do the cooking tomorrow."
sanskrit_telugu = "వయం శ్వః పాకం కరిష్యామః."

[[sections.items]]
n = 2
telugu = "వీ రిపుడు చేయఁగలరు."
english = "These people can do it now."
sanskrit_telugu = "ఏతే ఇదానీం కరిష్యంతి."

[[sections.items]]
n = 3
telugu = "మీ రెపుడు చేయఁగలరు."
english = "When will you all be able to do it?"
sanskrit_telugu = "యూయం కదా కరిష్యథ?"

[[sections.items]]
n = 4
telugu = "మేము చేయనే చేయము."
english = "We will simply not do it."
sanskrit_telugu = "వయం న కుర్మః ఏవ."

[[sections.items]]
n = 5
telugu = "మీ రెందుకు చేయరు?"
english = "Why won't you all do it?"
sanskrit_telugu = "యూయం కిమర్థం న కురుథ?"

[[sections.items]]
n = 6
telugu = "మా యింట్లో నన్నముస్నవి."
english = "There is no rice in our house."
sanskrit_telugu = "అస్మద్గృహే అన్నం నాస్తి."

[[sections.items]]
n = 7
telugu = "మా పిల్లవాఁడు మీ యింట్లో నేమి చేయుచున్నాఁడయ్యా?"
english = "What is our boy doing in your house, sir?"
sanskrit_telugu = "భోః! అస్మద్బాలకః యుష్మద్గృహే కిం కరోతి?"

[[sections.items]]
n = 8
telugu = "స్నానము చేయుచున్నాఁడేమో!"
english = "He is probably bathing!"
sanskrit_telugu = "స్నానం కరోతి స్యాత్!"

[[sections.items]]
n = 9
telugu = "త్వరగా స్నానము చేయునుగాక."
english = "Let him bathe quickly."
sanskrit_telugu = "శీఘ్రం స్నానం కరోతు."

[[sections.items]]
n = 10
telugu = "వాఁడు దబ్బున చేయనియెడల నే నేమి చేయఁగలనయ్యా?"
english = "If he does not do it quickly, what can I do, sir?"
sanskrit_telugu = "భోః! సః శీఘ్రం నాకరోత్ చేత్ అహం కిం కరిష్యామి?"

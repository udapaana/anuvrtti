[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తే సర్వేపి రామాయణం పఠంతి."
english = "All of them read the Rāmāyaṇa."
telugu = "వారందఱు రామాయణమును చదువుచున్నారు."

[[sections.items]]
n = 2
sanskrit_telugu = "యూయం కిం లిఖథ?"
english = "What are you all writing?"
telugu = "మీరు ఏమి వ్రాయుచున్నారు?"

[[sections.items]]
n = 3
sanskrit_telugu = "ఏకః వానరః అస్మాన్ త్రాసయతి."
english = "A monkey is frightening us."
telugu = "ఒక కోఁతి మమ్ముఁను భయపెట్టుచున్నది."

[[sections.items]]
n = 4
sanskrit_telugu = "అరే యుష్మద్గృహే మార్జాలం కే పోషయంతి?"
english = "Hey, who is rearing the cat in your house?"
telugu = "అరె, మీ యింట్లో పిల్లిని ఎవరు పోషించుచున్నారు?"

[[sections.items]]
n = 5
sanskrit_telugu = "అస్మన్మార్జాలః ప్రతినక్తం ఏకం మూషకం మారయతి."
english = "Our cat kills a mouse every night."
telugu = "మా పిల్లి ప్రతి రాత్రి ఒక ఎలుకను చంపుచున్నది."

[[sections.items]]
n = 6
sanskrit_telugu = "పాత్రాణి సమ్యక్ ధావ."
english = "Wash the vessels properly."
telugu = "గిన్నెలను సరిగా తోమুము."

[[sections.items]]
n = 7
sanskrit_telugu = "దేవ ఏవ సర్వాన్ రక్షతి."
english = "God alone protects all."
telugu = "దేవుఁడే అందఱను రక్షించుచున్నాఁడు."

[[sections.items]]
n = 8
sanskrit_telugu = "అద్య ప్రాతః త్వం ముఖం అక్షాళయః కిం? నోచేత్ జనకః త్వాం తాడయిష్యతి."
english = "Did you wash your face this morning? Otherwise your father will beat you."
telugu = "నేఁడు ప్రొద్దున నీవు మొఖమును కడుగుకున్నావా? లేదనుకొనుము — తండ్రి నిన్ను కొట్టఁగలఁడు."

[[sections.items]]
n = 9
sanskrit_telugu = "ఘంటాం మా నాదయ."
english = "Do not ring the bell."
telugu = "గంటను మ్రోగించవద్దు."

[[sections.items]]
n = 10
sanskrit_telugu = "వైశ్యః ఘృతం తోళయతి."
english = "The merchant weighs the ghee."
telugu = "వ్యాపారస్థుఁడు నెయ్యిని తూఁచుచున్నాఁడు."

[[sections.items]]
n = 11
sanskrit_telugu = "ఏకః చోరః మాం వంచయిత్వా మమ వస్త్రాణి అచోరయత్."
english = "A thief, having deceived me, stole my clothes."
telugu = "ఒక దొంగ నన్ను మోసపుచ్చి నా బట్టలు దొంగిలించెను."

[[sections.items]]
n = 12
sanskrit_telugu = "అహం రామాయ దశ ధారయామి."
english = "I owe ten (coins) to Rāma."
telugu = "నేను రాముని దగ్గఱ పది బాకీ ఉన్నాను."

[[sections.items]]
n = 13
sanskrit_telugu = "కిమర్థం బాలకం అధః అపాతయః?"
english = "Why did you throw the boy down?"
telugu = "పిల్లవానిని కిందకు పడవేసినావేమి?"

[[sections.items]]
n = 14
sanskrit_telugu = "రామః జనకం సర్వదా తోషయతి."
english = "Rāma always pleases his father."
telugu = "రాముఁడు తండ్రిని ఎల్లప్పుడు సంతోషపెట్టుచున్నాఁడు."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నన్ను నవ్వించవద్దు."
english = "Do not make me laugh."
sanskrit_telugu = "మాం మా హాసయ."

[[sections.items]]
n = 2
telugu = "ఆయెద్దును తఱుము."
english = "Chase that bull away."
sanskrit_telugu = "తం వృషభం ద్రావయ."

[[sections.items]]
n = 3
telugu = "తల్లి తమ్మునికి పాలను త్రాగించుచున్నది."
english = "The mother is giving milk to the younger brother to drink."
sanskrit_telugu = "అంబా అనుజాయ క్షీరం పాయయతి."

[[sections.items]]
n = 4
telugu = "తరువాత పరుండఁ బెట్టఁ గలదు."
english = "She will lay (him) down to rest afterwards."
sanskrit_telugu = "పశ్చాత్ శాయయిష్యతి."

[[sections.items]]
n = 5
telugu = "ఈవేళ ఏ మేమి పండించెదవు?"
english = "What (crops) will you ripen/produce today?"
sanskrit_telugu = "అద్య త్వం కిం కిం పాకయిష్యసి?"

[[sections.items]]
n = 6
telugu = "నేను పిల్లలను చదివించుచున్నాను."
english = "I am making the children study."
sanskrit_telugu = "అహం బాలకాన్ పాఠయామి."

[[sections.items]]
n = 7
telugu = "మొదట వ్రాయింపుము."
english = "First have (it) written."
sanskrit_telugu = "ప్రథమం లేఖయ."

[[sections.items]]
n = 8
telugu = "మేము నిన్ను దూషించుట లేదు, కాని భూషించుచున్నాము."
english = "We are not insulting you, but praising you."
sanskrit_telugu = "వయం త్వాం న దూషయామః; కింతు భూషయామః."

[[sections.items]]
n = 9
telugu = "మమ్ముఁను మీరెందుకు శిక్షించెదరు?"
english = "Why do you punish us?"
sanskrit_telugu = "యూయం అస్మాన్ కిమర్థం దండయథ?"

[[sections.items]]
n = 10
telugu = "ఈ చెంబునందు నీటిని పోయుము."
english = "Pour water into this vessel."
sanskrit_telugu = "ఏతస్మిన్ కలశే జలం పూరయ."

[[sections.items]]
n = 11
telugu = "ఆ వృద్ధుని పాలించుము."
english = "Protect/serve that old man."
sanskrit_telugu = "తం వృద్ధం పాలయ."

[[sections.items]]
n = 12
telugu = "ఆ యెద్దును అడవికి తోలుము."
english = "Drive that bull to the forest."
sanskrit_telugu = "తం వృషభం వనం కోదయ."

[[sections.items]]
n = 13
telugu = "అక్కడ గడ్డిని మేపుము."
english = "Graze (the cattle on) grass there."
sanskrit_telugu = "తత్ర తృణం చారయ."

[[sections.items]]
n = 14
telugu = "వానిని గొరగవద్దు."
english = "Do not shave him."
sanskrit_telugu = "తం మా ముండయ."

[[sections.items]]
n = 15
telugu = "కాలమును గడపుఁడు."
english = "Pass the time."
sanskrit_telugu = "కాలం గమయత."

[[sections.items]]
n = 16
telugu = "నా పాదమును ఒత్తుము."
english = "Press my foot."
sanskrit_telugu = "మమ పాదం పీడయ."

[[sections.items]]
n = 17
telugu = "ఆ పిల్ల వానిని దండించుము."
english = "Punish that child."
sanskrit_telugu = "తం బాలకం దండయ."

[[sections.items]]
n = 1
sanskrit_telugu = "మండపస్య అధః ఏకః కుశమంచః అస్తి."
english = "Below the pavilion there is a rope cot."
telugu = "పందిరి క్రింద ఒక నులకమంచము ఉన్నది."

[[sections.items]]
n = 2
sanskrit_telugu = "తన్మంచే బిడాలః ఖనకేన సాకం కలహం కరోతి."
english = "On that cot the cat quarrels with the mongoose."
telugu = "ఆ మంచముమీద పిల్లి ముంగిసతోఁగూడ తగవు పెట్టుకొనుచున్నది."

[[sections.items]]
n = 3
sanskrit_telugu = "మత్కుణాః మశకాశ్చ రాత్రిందివం యుష్మద్గృహే సంచరంతి."
english = "Bedbugs and mosquitoes roam in your house day and night."
telugu = "నల్లులు దోమలు మీ యింట రేయింబవళ్ళు తిరుగుచున్నవి."

[[sections.items]]
n = 4
sanskrit_telugu = "అంబారీషం భుజిష్యం లవిత్రం ఖనిత్రం చ ఏతాని సర్వాణి ఆవరణే కుసూలసమీపే ఏకత్రైవ సంతి."
english = "The griddle, frying pan, sickle, and hoe — all these are together near the granary in the storeroom."
telugu = "మంగలము బాణలి కొడవలి గర్షపార అనువాని నన్నిటిని దొఱ్ఱిలో గాదె దగ్గఱ అన్నీ ఒకచోట నున్నవి."

[[sections.items]]
n = 5
sanskrit_telugu = "వనే యుల్లికాః అతీవ నాదం కుర్వంతి."
english = "In the forest, crickets make an extremely loud sound."
telugu = "అడవిలో కీచురాళ్ళు మిక్కిలి అరవుచున్నవి."

[[sections.items]]
n = 6
sanskrit_telugu = "బ్రాహ్మణగృహేషు పిష్టం తక్రం నవనీతం తైలం చ ఏతాని ద్రవ్యాణి సర్వదా స్యుః."
english = "In brahmin households, flour, buttermilk, butter, and oil — these things should always be present."
telugu = "బ్రాహ్మణుల ఇళ్ళలో పిండి మజ్జిగ వెన్న నూనె ఇవి ఎల్లప్పుడు నుండవలె."

[[sections.items]]
n = 7
sanskrit_telugu = "కిఞ్చ గోమయం అపి స్యాత్."
english = "And cow dung too should be there."
telugu = "ఇంతేకాకుండా ఆవుపేఁదయు నుండవలె."

[[sections.items]]
n = 8
sanskrit_telugu = "బ్రాహ్మణబాలకాః ఉపనయనాత్పూర్వం కంసేషు భోజనం కుర్యుః."
english = "Brahmin boys should eat from bronze plates before the sacred thread ceremony."
telugu = "బ్రాహ్మణ బాలుఁలు ఉపనయనమునకు ముందు కంచములలో భోజనము చేయవలె."

[[sections.items]]
n = 9
sanskrit_telugu = "పరుత్ యుష్మద్గృహే ఏకాం భస్త్రాం అవశ్యం ఖలు; సా ఇదానీం కుత్రాస్తి?"
english = "Last year there was certainly a leather bag in your house; where is it now?"
telugu = "నిరుడు మీ యింట ఒక తిత్తి తప్పకుండా ఉండెను కదా; అది ఇప్పుడు ఎక్కడ ఉన్నది?"

[[sections.items]]
n = 10
sanskrit_telugu = "గోధాః పిపీలికాః భక్షయంతి."
english = "Lizards eat ants."
telugu = "బల్లులు చీమలను తింటున్నవి."

[[sections.items]]
n = 11
sanskrit_telugu = "జలూకా మమ కనిష్ఠికాం అదశత్."
english = "A leech bit my little finger."
telugu = "జలగ నా చిటికెనవ్రేలును కఱచెను."

[[sections.items]]
n = 12
sanskrit_telugu = "ముక్తికాః దూషికాయాం పతంతి."
english = "Flies fall into the eye discharge."
telugu = "ఈఁగలు పుసిలో పడుచున్నవి."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మాయింటిచుట్టును ఉదుతలు ఎక్కువగా ఉన్నవి."
english = "There are many iguanas/lizards around our house."
sanskrit_telugu = "అస్మద్గృహస్య పరితః అనేకాః గోధాః సంతి."

[[sections.items]]
n = 2
telugu = "నిరుడు గరుడవాహనమందు గజ్జెలు ఉండెను."
english = "Last year there were ankle bells on the Garuḍa vehicle."
sanskrit_telugu = "పరుత్ గరుడవాహనే శింజాః ఆసన్."

[[sections.items]]
n = 3
telugu = "సరే మంచిది కాని అక్కడ అడ్డముగా ఆంబోతు పరుగెత్తుచున్నది; నీవు సరిగా రమ్ము."
english = "Very well, but a bull buffalo is running crosswise there; you come correctly (straight)."
sanskrit_telugu = "బాఢం; కింతు తత్ర తిర్యక్ ఢంకః ధావతి; త్వం బుజు ఆగచ్ఛ."

[[sections.items]]
n = 4
telugu = "నాకు ప్రక్కగా పెయ్యదూడ ఉన్నది."
english = "There is a heifer beside me."
sanskrit_telugu = "మమ పార్శ్వతః వత్సా అస్తి."

[[sections.items]]
n = 5
telugu = "మేకపోతు కుండెటితోఁగూడ ఆడుచున్నది."
english = "The ram is playing along with the bucket."
sanskrit_telugu = "మేషః కటాహేన సాకం క్రీడతి."

[[sections.items]]
n = 6
telugu = "నేఁటికిని వాఁడు వంకరగా నడుచుచున్నాఁడు."
english = "Even today he walks crookedly."
sanskrit_telugu = "అద్యాపి సః వక్రం చరతి."

[[sections.items]]
n = 7
telugu = "నీవు బొత్తుగా నాపనిని చేయవేమిరా!"
english = "You are not doing my work at all!"
sanskrit_telugu = "రే! త్వం సుతరాం మమ కార్యం న కరోషి!"

[[sections.items]]
n = 8
telugu = "అయ్యో పాపము; కంబలిమీద ఎలుకను పిల్లి చంపుచున్నదిరా."
english = "Alas! The cat is killing a mouse on the blanket."
sanskrit_telugu = "అహో! మార్జాలః కంబలే మూషకం మారయతి."

[[sections.items]]
n = 9
telugu = "దోమలు ఆయాంబోతును కఱుచుచున్నవి."
english = "Mosquitoes are biting that bull buffalo."
sanskrit_telugu = "మశకాః తం ఢంకం దశంతి."

[[sections.items]]
n = 10
telugu = "నీవు నాతోకూడ రావద్దు."
english = "Do not come along with me."
sanskrit_telugu = "త్వం మయా సాకం మా ఆగచ్ఛ."

[[sections.items]]
n = 11
telugu = "నల్లికల్పసాము వెన్నమీద పడ్డది."
english = "The (red ant?) fell onto the butter."
sanskrit_telugu = "పిపీలికా నవనీతే అపతత్."

[[sections.items]]
n = 12
telugu = "ఆ తిత్తిని ఇటు తెమ్ము."
english = "Bring that leather bag here."
sanskrit_telugu = "తాం భస్త్రాం అత్ర ఆనయ."

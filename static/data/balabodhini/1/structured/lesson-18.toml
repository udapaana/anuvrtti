[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తవ జనకః అద్య కిం కరోతి?"
english = "What is your father doing today?"
telugu = "నీ తండ్రి ఈవేళ నేమి చేయుచున్నాఁడు?"

[[sections.items]]
n = 2
sanskrit_telugu = "మమ జనకః గృహే నాస్తి."
english = "My father is not at home."
telugu = "నా తండ్రి ఇంట లేఁడు."

[[sections.items]]
n = 3
sanskrit_telugu = "శ్వః పాకం కః కరిష్యతి?"
english = "Who will do the cooking tomorrow?"
telugu = "రేపు వంటను ఎవఁడు చేయఁగలఁడు?"

[[sections.items]]
n = 4
sanskrit_telugu = "మమ అనుజః కరిష్యతి."
english = "My younger brother will do it."
telugu = "నా తమ్ముఁడు చేయఁగలఁడు."

[[sections.items]]
n = 5
sanskrit_telugu = "తత్ గృహం మమ."
english = "That house is mine."
telugu = "ఆ యిల్లు నాది."

[[sections.items]]
n = 6
sanskrit_telugu = "త్వం ఘటితి స్నానం కరిష్యసి. కిం?"
english = "Will you bathe quickly? Really?"
telugu = "నీవు త్వరగా స్నానము చేయఁగలవా?"

[[sections.items]]
n = 7
sanskrit_telugu = "యుష్మద్గృహం అంత రస్తి;"
english = "Your house is inside;"
telugu = "మీ యిల్లు లోపల ఉన్నది;"

[[sections.items]]
n = 8
sanskrit_telugu = "అస్మద్గృహం బహి రస్తి."
english = "our house is outside."
telugu = "మా యిల్లు వెలుపల ఉన్నది."

[[sections.items]]
n = 9
sanskrit_telugu = "సః పునః స్నానం కరిష్యతి కిల."
english = "He will bathe again, it seems."
telugu = "వాఁడు మరల స్నానము చేయఁగలఁడట."

[[sections.items]]
n = 10
sanskrit_telugu = "అహమపి కరిష్యామి శాకం పాకమపి."
english = "I too will prepare the vegetables and the meal."
telugu = "నేనును కూరను, వంటనుగూడ చేయఁగలను."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మేయిల్లెక్కడ నుండెను?"
english = "Where was our house?"
sanskrit_telugu = "అస్మద్గృహం కుత్రాసీత్?"

[[sections.items]]
n = 2
telugu = "నాయొక్క యిల్లు మునుపును అక్కడనే యుండెను."
english = "My house was right there before too."
sanskrit_telugu = "మమ గృహం పురాపి తత్రైవాసీత్."

[[sections.items]]
n = 3
telugu = "ఇపు డిక్కడ నున్నది."
english = "Now it is here."
sanskrit_telugu = "ఇదానీం అత్రాస్తి."

[[sections.items]]
n = 4
telugu = "వారు వంట నెపుడు చేయఁగలరు?"
english = "When will they be able to do the cooking?"
sanskrit_telugu = "తే కదా పాకం కరిష్యంతి?"

[[sections.items]]
n = 5
telugu = "నీవు రేపు నా కొక మంచమును చేయుము."
english = "Make a bed for me tomorrow."
sanskrit_telugu = "శ్వః మమ కృతే ఏకం మంచం కురు."

[[sections.items]]
n = 6
telugu = "ఇపుడు నీవు మరల నెందుకు స్నానము చేసినావు?"
english = "Why did you bathe again just now?"
sanskrit_telugu = "త్వం ఇదానీం పునః కిమర్థం స్నానం అకరోః?"

[[sections.items]]
n = 7
telugu = "వంటను అక్కడ చేయుచున్నారు; ఆలస్యము చేయవద్దు."
english = "They are cooking there; do not delay."
sanskrit_telugu = "తత్ర పాకం కుర్వంతి; ఆలస్యం మా కురు."

[[sections.items]]
n = 8
telugu = "నీవు వంట నిపుడు చేయవా యేమి?"
english = "Won't you do the cooking now?"
sanskrit_telugu = "త్వం ఇదానీం పాకం న కరోషి కిం?"

[[sections.items]]
n = 9
telugu = "మా యింటిలో నీరు లేదు గాన చెఱువులో స్నానము చేయుము."
english = "There is no water in our house, so bathe in the pond."
sanskrit_telugu = "అస్మద్గృహే జలం నాస్తి; తటాకే స్నానం కురు."

[[sections.items]]
n = 10
telugu = "మీపిల్ల లింటిలో నున్నారో, లేరో;"
english = "Whether your children are in the house or not;"
sanskrit_telugu = "తవ బాలకాః గృహే సంతి వా న వా;"

tag = "p.p. e.v. loṭ"

[[sections.items]]
sanskrit_telugu = "కురు"
telugu_gloss = "చేయుము"
english = "do it!"

[[sections.items]]
sanskrit_telugu = "కరవాణి"
telugu_gloss = "చేయుదును, గాక, చేయనిమ్ము"
english = "let me do it"
tag = "u.p. e.v. loṭ"

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తటాకః అత్రాస్తి కిం?"
english = "Is there a pond here?"
telugu = "ఇక్కడ చెఱువు అున్నదా?"

[[sections.items]]
n = 2
sanskrit_telugu = "తటాకే ప్రథమం స్నానం కురు."
english = "First, bathe in the pond."
telugu = "మొదట చెఱువులో స్నానము చేయుము."

[[sections.items]]
n = 3
sanskrit_telugu = "పాకం అహం కరవాణి."
english = "Let me do the cooking."
telugu = "వంట నేను చేయనిమ్ము."

[[sections.items]]
n = 4
sanskrit_telugu = "అగ్రజః శాకాని కరోతు."
english = "Let the elder brother make the vegetables."
telugu = "అన్న కూర చేయనిమ్ము."

[[sections.items]]
n = 5
sanskrit_telugu = "యూయం స్నానం అకురుత ఖలు?"
english = "You all bathed, did you not?"
telugu = "మీరు స్నానము చేసితిరి కదా?"

[[sections.items]]
n = 6
sanskrit_telugu = "వయం భోజన మపి అకుర్మ."
english = "We also ate."
telugu = "మేము భోజనమును కూడ చేసి'మి."

[[sections.items]]
n = 7
sanskrit_telugu = "తే ఇదానీం తటాకే స్నానం కుర్వంతి."
english = "They are now bathing in the pond."
telugu = "వారు ఇపుడు చెఱువులో స్నానము చేయుచున్నారు."

[[sections.items]]
n = 8
sanskrit_telugu = "బత! తే తటాకే న సంతి."
english = "Alas! They are not in the pond."
telugu = "అయ్యో! వారు చెఱువులో లేరు."

[[sections.items]]
n = 9
sanskrit_telugu = "బాలకాః తటాకే దోష్యం కుర్వంతి."
english = "The boys are making mischief in the pond."
telugu = "పిల్లలు చెఱువులో అల్లరి చేయుచున్నారు."

[[sections.items]]
n = 10
sanskrit_telugu = "తథావా, అత్ర కించిత్ ఏధి."
english = "Is that so? Come here a little."
telugu = "అలాగా, ఇక్కడికి కొంచెము రా."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "నీ వల్లరి చేయవద్దు."
english = "Do not make mischief."
sanskrit_telugu = "త్వం దోష్యం మా కురు."

[[sections.items]]
n = 2
telugu = "నే నల్లరి చేయుచున్నానా?"
english = "Am I making mischief?"
sanskrit_telugu = "అహం దోష్యం కరోమి కిం?"

[[sections.items]]
n = 3
telugu = "అక్కడ పిల్లలు చేయుచున్నారు."
english = "The boys there are doing it."
sanskrit_telugu = "తత్ర బాలకాః కుర్వంతి."

[[sections.items]]
n = 4
telugu = "వీరు చెఱువులో స్నానము చేయుచున్నారు."
english = "These are bathing in the pond."
sanskrit_telugu = "ఏతే తటాకే స్నానం కుర్వంతి."

[[sections.items]]
n = 5
telugu = "మొదట నేను కూర చేసినాను."
english = "First I made the vegetable dish."
sanskrit_telugu = "ప్రథమం అహం శాకం అకరవం."

[[sections.items]]
n = 6
telugu = "తరువాత వారు వంట చేసినారు."
english = "Afterwards they cooked."
sanskrit_telugu = "అనంతరం తే పాకం అకుర్వన్."

[[sections.items]]
n = 7
telugu = "కూర నెవరు చేసిరి?"
english = "Who made the vegetable dish?"
sanskrit_telugu = "శాకం కే అకుర్వన్?"

[[sections.items]]
n = 8
telugu = "కొందఱు బ్రాహ్మణులు."
english = "Some brahmins."
sanskrit_telugu = "కతిచిత్ బ్రాహ్మణాః."

[[sections.items]]
n = 9
telugu = "వారు పలువిధము లుగాఁ జేసిరి."
english = "They did it in various ways."
sanskrit_telugu = "తే అనేకథా అకుర్వన్."

[[sections.items]]
n = 10
telugu = "రేపు నీవును అలాగు చేయవలెను."
english = "Tomorrow you too must do it that way."
sanskrit_telugu = "శ్వః త్వమపి తథా కుర్యాః."

[[sections]]
type = "reading"
language = "sanskrit"

[[sections.items]]
n = 1
sanskrit_telugu = "తత్ర కతి బ్రాహ్మణాః సంతి?"
english = "How many brahmins are there?"
telugu = "అక్కడ ఎందఱు బ్రాహ్మణులు ఉన్నారు?"

[[sections.items]]
n = 2
sanskrit_telugu = "తత్ర ద్వౌ బ్రాహ్మణౌ స్థః."
english = "Two brahmins are there."
telugu = "అక్కడ ఇద్దరు బ్రాహ్మణులు ఉన్నారు."

[[sections.items]]
n = 3
sanskrit_telugu = "యువాం ద్వౌ హ్యః కుత్ర ఆస్తం?"
english = "Where were you two yesterday?"
telugu = "మీరిద్దరు నిన్న ఎక్కడ నుండిరి?"

[[sections.items]]
n = 4
sanskrit_telugu = "ఆవాం హ్యః యుష్మద్గృహే ఆస్వ."
english = "We two were at your house yesterday."
telugu = "మేమిద్దరము నిన్న మీ యింట నుండితిమి."

[[sections.items]]
n = 5
sanskrit_telugu = "అద్య అత్ర స్వః."
english = "Today we two are here."
telugu = "ఈవేళ మేమిద్దరము ఇక్కడ నున్నాము."

[[sections.items]]
n = 6
sanskrit_telugu = "ఏతౌ కుత్ర అగచ్ఛతాం?"
english = "Where did these two go?"
telugu = "ఈ యిద్దరు ఎక్కడికి వెళ్ళిరి?"

[[sections.items]]
n = 7
sanskrit_telugu = "స్నానార్థం అగచ్ఛతాం."
english = "They two went for bathing."
telugu = "వారిద్దరు స్నానమునకు వెళ్ళిరి."

[[sections.items]]
n = 8
sanskrit_telugu = "తత్ర ద్వే బాలికే భోజనం కురుతః."
english = "Two girls there are preparing food."
telugu = "అక్కడ ఇద్దరు ఆఁడుపిల్లలు వంట చేయుచున్నారు."

[[sections.items]]
n = 9
sanskrit_telugu = "అత్ర బాలకౌ ద్వౌ భారతం పఠతః."
english = "Two boys here are reading the Mahābhārata."
telugu = "ఇక్కడ ఇద్దరు పిల్లలు భారతమును చదువుచున్నారు."

[[sections.items]]
n = 10
sanskrit_telugu = "ఆవయోః పుత్రౌ అద్య ప్రాతః కిం అకురుతాంవా, కుత్ర అస్తాంవా?"
english = "What did our two sons do this morning, or where were they?"
telugu = "మన యిద్దరి పుత్రులు ఈవేళ ఉదయమున నేమి చేసిరో, ఎక్కడ నుండిరో?"

[[sections.items]]
n = 11
sanskrit_telugu = "ద్వౌ వాసరౌ ద్వే ఫలే భక్షయతః."
english = "For two days (they) two are eating two fruits."
telugu = "రెండు దినములు వారిద్దరు రెండు పండ్లు తినుచున్నారు."

[[sections.items]]
n = 12
sanskrit_telugu = "యువయోః పుత్రౌ భైషధం అభక్షయతాం వా?"
english = "Did your two sons take the medicine?"
telugu = "మీ యిద్దరి పుత్రులు మందు తిన్నారా?"

[[sections.items]]
n = 13
sanskrit_telugu = "నహి నహి భైషధదర్శనానుపదం కుత్ర వా అధావతాం."
english = "No no, as soon as they saw the medicine, where did they both run off to!"
telugu = "అదేమో! మందు చూచినంతనే వారిద్దరు ఎటో పరిగిడిరి."

[[sections.items]]
n = 14
sanskrit_telugu = "రామలక్ష్మణౌ అరణ్యే అనేకాన్ రాక్షసాన్ అమారయతాం."
english = "Rāma and Lakṣmaṇa killed many demons in the forest."
telugu = "రాముఁడు లక్ష్మణుఁడును అడవిలో చాల రాక్షసులను జంపిరి."

[[sections.items]]
n = 15
sanskrit_telugu = "రామః సీతాలక్ష్మణాభ్యాం సాకం వనాయ అగచ్ఛత్."
english = "Rāma went to the forest together with Sītā and Lakṣmaṇa."
telugu = "రాముఁడు సీతాలక్ష్మణులతోఁ గూడ అడవికి వెళ్ళెను."

[[sections.items]]
n = 16
sanskrit_telugu = "ద్వౌ రాక్షసౌ రామలక్ష్మణౌ అపశ్యతాం."
english = "Two demons saw Rāma and Lakṣmaṇa."
telugu = "ఇద్దరు రాక్షసులు రాముని లక్ష్మణుని చూచిరి."

[[sections.items]]
n = 17
sanskrit_telugu = "యువాం అత్ర ఉపవిశతం."
english = "You two sit down here."
telugu = "మీరిద్దరు ఇక్కడ కూర్చుండుఁడు."

[[sections.items]]
n = 18
sanskrit_telugu = "తే తత్ర వసేతాం."
english = "Those two should live there."
telugu = "వారిద్దరు అక్కడ నివసించవలె."

[[sections]]
type = "exercises"
language = "telugu"

[[sections.items]]
n = 1
telugu = "మీరిద్దరు వంటను జేయఁజాలుదురా?"
english = "Can you two cook?"
sanskrit_telugu = "యువాం పాకం కర్తుం శక్నుతః కిం?"

[[sections.items]]
n = 2
telugu = "వారిద్దరు ఎప్పుడు స్నానము చేయఁగలరు?"
english = "When will those two be able to bathe?"
sanskrit_telugu = "తౌ కదా స్నానం కరిష్యతః?"

[[sections.items]]
n = 3
telugu = "మేమిద్దరము మీయిద్దరితో రాఁగలము."
english = "We two can come with you two."
sanskrit_telugu = "ఆవాం యువాభ్యాం సహ ఆగమిష్యావః."

[[sections.items]]
n = 4
telugu = "మీయిద్దరు మాయిద్దరికొఱకు రెండుపండ్లను ఈయఁగలరా?"
english = "Can you two give two fruits for us two?"
sanskrit_telugu = "యువాం ఆవాభ్యాం ద్వే ఫలే దాస్యతః కిం?"

[[sections.items]]
n = 5
telugu = "మాయిద్దరిలో వీఁడు పెద్దవాఁడు."
english = "Of us two, this one is the elder."
sanskrit_telugu = "ఆవయోః ఏషః జ్యేష్ఠః."

[[sections.items]]
n = 6
telugu = "ఈ యిద్దరు అడపిల్లలకు పెండ్లి యెప్పుడు కాఁగలడు?"
english = "When will these two girls get married?"
sanskrit_telugu = "ఏతే ద్వే బాలికే కదా వివాహం కరిష్యతే?"

[[sections.items]]
n = 7
telugu = "వీరిద్దరికి పెండ్లియైనది."
english = "These two have been married."
sanskrit_telugu = "ఏతయోః వివాహః అభవత్."

[[sections.items]]
n = 8
telugu = "ఓఽమ్మా! నీ విట్లా రమ్ము."
english = "O Mother! Come here like this."
sanskrit_telugu = "హే అంబే! త్వం ఇత్థం ఆగచ్ఛ."

[[sections.items]]
n = 9
telugu = "ఓపిల్లదానా! మీతమ్ము లిద్దరు ఏమి చదువుచున్నారు?"
english = "O girl! What are your two younger brothers studying?"
sanskrit_telugu = "హే బాలికే! తవ అనుజౌ ద్వౌ కిం పఠతః?"

[[sections.items]]
n = 10
telugu = "ఓఽక్కా! నీవు మా యిద్దరికొఱకు భోజనమును పెట్టుము."
english = "O elder sister! Set food for us two."
sanskrit_telugu = "హే అగ్రజే! త్వం ఆవాభ్యాం భోజనం యచ్ఛ."

[[sections.items]]
n = 11
telugu = "మామగారికి ఇద్దరు సోదర లున్నారు."
english = "The father-in-law has two brothers."
sanskrit_telugu = "తస్య శ్వశురస్య ద్వౌ భ్రాతరౌ సంతి."

[[sections.items]]
n = 12
telugu = "నా కిద్దరు చెల్లెంద్రున్నారు."
english = "I have two younger sisters."
sanskrit_telugu = "మమ ద్వే అనుజే స్తః."

[[sections.items]]
n = 13
telugu = "వారిద్దరికి ఎల్లుండి పెండ్లి కాఁగలడు."
english = "Those two will get married the day after tomorrow."
sanskrit_telugu = "తయోః పరశ్వః వివాహః భవిష్యతి."

[[sections.items]]
n = 14
telugu = "మే మిద్దరము ఇప్పు డేమి చేయవలె?"
english = "What should we two do now?"
sanskrit_telugu = "ఆవాం ఇదానీం కిం కుర్వావ?"

[[sections.items]]
n = 15
telugu = "మీ రిద్దరు మాయింటిలో నుండుఁడు."
english = "You two stay in our house."
sanskrit_telugu = "యువాం అస్మద్గృహే వసతం."

[[sections]]
type = "passage"
language = "sanskrit"
title = "రామాయణము — ఉత్తరార్థము (Rāmāyaṇa — uttarārtham)"

[[sections.items]]
n = 1
sanskrit_telugu = "పురా దశరథః నామ నృపః కోసలదేశే రాజ్యం కరోతిస్మ."
english = "Long ago, a king named Daśaratha ruled the land of Kosala."

[[sections.items]]
n = 2
sanskrit_telugu = "తస్య చిరం పుత్రాః నాసన్."
english = "For a long time he had no sons."

[[sections.items]]
n = 3
sanskrit_telugu = "అనంతరం సః ఏకం యజ్ఞం అకరోత్."
english = "Afterwards he performed a sacrifice."

[[sections.items]]
n = 4
sanskrit_telugu = "తదా అగ్నికుండాత్ ఏకః దివ్యపురుషః క్షీరాన్నపాత్రేణ సాకం బహి రాగచ్ఛత్."
english = "At that time, a divine being came out from the sacrificial fire-pit along with a vessel of milk-rice."

[[sections.items]]
n = 5
sanskrit_telugu = "తం దృష్ట్వా దశరథః నమస్కారం అకరోత్."
english = "Seeing him, Daśaratha made obeisance."

[[sections.items]]
n = 6
sanskrit_telugu = "తదనంతరం దివ్యపురుషః పాయసపాత్రం దశరథాయ అయచ్ఛత్."
english = "After that, the divine being gave the vessel of pāyasa to Daśaratha."

[[sections.items]]
n = 7
sanskrit_telugu = "దశరథః తత్పాయసం స్వభార్యాభ్యః అయచ్ఛత్."
english = "Daśaratha gave that pāyasa to his wives."

[[sections.items]]
n = 8
sanskrit_telugu = "దశరథభార్యాః సర్వం పాయసం అఖాదన్."
english = "Daśaratha's wives ate all the pāyasa."

[[sections.items]]
n = 9
sanskrit_telugu = "తతః తస్య పుత్రచతుష్టయం ఉదభవత్."
english = "From this, four sons were born to him."

[[sections.items]]
n = 10
sanskrit_telugu = "తేషాం మధ్యే రామః జ్యేష్ఠః."
english = "Among them, Rāma was the eldest."

[[sections.items]]
n = 11
sanskrit_telugu = "సః బహుగుణసంపన్నః, దయానుద్రః, సత్యభాషణః, సుందరాకారః, పవిత్రచరిత్రశ్చ అభవత్."
english = "He was endowed with many virtues — compassionate, truthful in speech, handsome in form, and of pure character."

[[sections.items]]
n = 12
sanskrit_telugu = "తతః సర్వజనాః రామం దృష్ట్వా సంతోషేణ ఆసన్."
english = "Then all people, seeing Rāma, were joyful."

[[sections.items]]
n = 13
sanskrit_telugu = "ఏకదా విశ్వామిత్రః దశరథస్య గృహం ఆగత్య 'స్వాస్మై రామలక్ష్మణౌ యచ్చ' ఇతి దశరథం అపృచ్ఛత్."
english = "One day Viśvāmitra came to Daśaratha's house and asked Daśaratha: 'Give me Rāma and Lakṣmaṇa.'"

[[sections.items]]
n = 14
sanskrit_telugu = "తదా దశరథః కిమర్థ మితి ప్రశ్నం అకరోత్."
english = "Daśaratha then asked 'why?'"

[[sections.items]]
n = 15
sanskrit_telugu = "యజ్ఞసంరక్షణార్థ మితి విశ్వామిత్రః ప్రత్యుత్తరం అయచ్ఛత్."
english = "Viśvāmitra replied: 'For the protection of the sacrifice.'"

[[sections]]
type = "passage_translation"
language = "telugu"
title = "తెనుగు — రామాయణ సారాంశము"

[[sections.items]]
n = 1
telugu = "అపుడు దశరథుఁడు విశ్వామిత్రునితోఁగూడ రామలక్ష్మణులను బంపెను."
english = "Then Daśaratha sent Rāma and Lakṣmaṇa along with Viśvāmitra."

[[sections.items]]
n = 2
telugu = "పిమ్మట రాముఁడు తాటకను జంపి విశ్వామిత్రనియొక్క యజ్ఞమును బాలించెను."
english = "Afterwards Rāma killed Tāṭakā and protected Viśvāmitra's sacrifice."

[[sections.items]]
n = 3
telugu = "అంతట విశ్వామిత్రుఁడు రామలక్ష్మణుల నిద్దరిని దనతోఁగూడ జనకపత్నమునకుఁ దీసికొని చనెను."
english = "Then Viśvāmitra took both Rāma and Lakṣmaṇa along with him to Janaka's city."

[[sections.items]]
n = 4
telugu = "అక్కడ సీతయొక్క పెండ్లికొఱకు అనేకులు వచ్చిరి."
english = "There many came for Sītā's marriage."

[[sections.items]]
n = 5
telugu = "అపుడు సీత రాముని జూచి సంతోషముతో నుండెను."
english = "Then Sītā, seeing Rāma, was filled with joy."

[[sections.items]]
n = 6
telugu = "జనకుఁడు రాముని కొఱకు సీతను, లక్ష్మణని కొఱకు ఊర్మిళను ఇచ్చి పెండ్లి చేసెను."
english = "Janaka gave Sītā in marriage to Rāma, and Ūrmiḷā to Lakṣmaṇa."

[[sections.items]]
n = 7
telugu = "దశరథుఁడు తన యొక్క జనులతోఁగూడఁ బెండ్లికొసము జనకపట్టణమును గూర్చి వెళ్ళెను."
english = "Daśaratha went to Janaka's city for the wedding along with his people."

[[sections.items]]
n = 8
telugu = "పెండ్లి చక్కగా జరిగెను."
english = "The wedding took place beautifully."

[[sections.items]]
n = 9
telugu = "తరువాత దశరథుఁడు రామలక్ష్మణులతోఁ గూడ నింటికి వచ్చి బ్రాహ్మణులతోఁగూడ నుత్సవముఁజేసి రామున కు రాజ్యము నిచ్చెను."
english = "Afterwards Daśaratha came home with Rāma and Lakṣmaṇa, celebrated with the brahmins, and gave the kingdom to Rāma."

[[sections.items]]
n = 10
telugu = "రాముఁడు కొడుకులనువలెనే అందఱు జనులను సుఖముతోఁ బాలించెను."
english = "Rāma ruled all the people with happiness, as if they were his own sons."

[[sections.items]]
n = 11
telugu = "రామునియొక్క యోగ్యతను జూచి జను లందఱును సంతోషముతో నుండిరి."
english = "Seeing Rāma's excellence, all the people were joyful."

[[sections.items]]
n = 12
telugu = "రాముని యొక్క చరిత్రను వాల్మీకుఁడు రామాయణమునందు బాగుగా వ్రాసెను."
english = "Vālmīki wrote Rāma's story beautifully in the Rāmāyaṇa."

id = "balabodhini-1-27"
source = "balabodhini"
part = 1
number = 27
title_sanskrit = "సప్తవింశః పాఠః"
title_telugu = "ఇరువదియేడవ పాఠము"
title_iast = "saptaviṃśaḥ pāṭhaḥ"
title_english = "Twenty-Seventh Lesson"
grammar_focus = "infinitives gantum, netum; gerund ānīya; new verbs vadati (says), āhvāyati (calls), āhvāsyati (will call)"

[[vocabulary]]
sanskrit_telugu = "తక్రం"
telugu_gloss = "మజ్జిగ"
iast = "takraṃ"
english = "buttermilk"

[[vocabulary]]
sanskrit_telugu = "గంతుం"
telugu_gloss = "వెళ్ళుటకు"
iast = "gantuṃ"
english = "to go (infinitive of gam)"

[[vocabulary]]
sanskrit_telugu = "క్షీరం"
telugu_gloss = "పాలు"
iast = "kṣīraṃ"
english = "milk"

[[vocabulary]]
sanskrit_telugu = "నేతుం"
telugu_gloss = "తీసికొని వెళ్ళుటకు"
iast = "netuṃ"
english = "to lead/take (infinitive of nī)"

[[vocabulary]]
sanskrit_telugu = "పానీయం"
telugu_gloss = "మంచినీరు"
iast = "pānīyaṃ"
english = "drinking water"

[[vocabulary]]
sanskrit_telugu = "ఆనీయ"
telugu_gloss = "తెచ్చి"
iast = "ānīya"
english = "having brought (gerund of ā+nī)"

[[vocabulary]]
sanskrit_telugu = "వదతి"
telugu_gloss = "చెప్పుచున్నాఁడు"
iast = "vadati"
english = "says, tells (root vad)"

[[vocabulary]]
sanskrit_telugu = "ఆహ్వాయతి"
telugu_gloss = "పిలుచున్నాఁడు"
iast = "āhvāyati"
english = "calls, invites (ā+hvā)"

[[vocabulary]]
sanskrit_telugu = "ఆహ్వాస్యతి"
telugu_gloss = "పిలువఁగలఁడు"
iast = "āhvāsyati"
english = "will call (future of ā+hvā)"

[[sentences]]
n = 1
sanskrit_telugu = "అద్య క్షీరం సమ్యగస్తి."
iast = "adya kṣīraṃ samyag asti."
english = "Today there is good milk."

[[sentences]]
n = 2
sanskrit_telugu = "త్వం గత్వా క్షీర మానీయ క్షీరాన్నం కురు."
iast = "tvaṃ gatvā kṣīram ānīya kṣīrānnaṃ kuru."
english = "Going and bringing the milk, prepare rice with milk."

[[sentences]]
n = 3
sanskrit_telugu = "వయం సర్వే పానీయ మానేష్యామః."
iast = "vayaṃ sarve pānīyam āneṣyāmaḥ."
english = "We all will bring drinking water."

[[sentences]]
n = 4
sanskrit_telugu = "తక్ర మానేతుం కః అగచ్ఛత్?"
iast = "takram ānetuṃ kaḥ agacchat?"
english = "Who went to bring buttermilk?"

[[sentences]]
n = 5
sanskrit_telugu = "తే బాలకాః ఘృతార్థ మగచ్ఛన్."
iast = "te bālakāḥ ghṛtārtham agacchan."
english = "Those boys went for ghee."

[[sentences]]
n = 6
sanskrit_telugu = "గృహే కించిదపి లవణం నాస్తి."
iast = "gṛhe kiñcid api lavaṇaṃ nāsti."
english = "There is not even a little salt at home."

[[sentences]]
n = 7
sanskrit_telugu = "యూయం మమ జనకం ఆనయత."
iast = "yūyaṃ mama janakaṃ ānayadhvam."
english = "You (pl.) bring my father."

[[sentences]]
n = 8
sanskrit_telugu = "యుష్మత్కూపే జలం లవణం అస్తి."
iast = "yuṣmatkūpe jalaṃ lavaṇaṃ asti."
english = "The water in your well is salty."

[[sentences]]
n = 9
sanskrit_telugu = "త్వం స్నానం కృత్వా శీఘ్రు మాగచ్ఛ."
iast = "tvaṃ snānaṃ kṛtvā śīghram āgaccha."
english = "Having bathed, come quickly."

[[sentences]]
n = 10
sanskrit_telugu = "యూయం మమానుజం ఘటితి భోజనార్థం వదత; వయం గత్వా తథైవ వదిష్యామః."
iast = "yūyaṃ mamānujaṃ ghaṭiti bhojanārthaṃ vadata; vayaṃ gatvā tathaiva vadiṣyāmaḥ."
english = "You (pl.) tell my younger brother to come at once for food; we will go and say the same."

[[exercises]]
n = 1
telugu = "వాఁడక్కడనున్నచో పిలువుఁడు."
english = "If he is there, call him."

[[exercises]]
n = 2
telugu = "మాతండ్రి యెచట నుండెనో కొంచెము చెప్పఁడు."
english = "He will not say a little about where our father is."

[[exercises]]
n = 3
telugu = "మన యింటిలో మజ్జిగ తెచ్చుట కెవరు వెళ్ళిరి?"
english = "Who went to bring buttermilk to our house?"

[[exercises]]
n = 4
telugu = "మనమే వెళ్ళవలెను."
english = "We ourselves must go."

[[exercises]]
n = 5
telugu = "మీరు అంతవఱకు ఎక్కడికిని వెళ్ళకుఁడు."
english = "You (pl.) do not go anywhere until then."

[[exercises]]
n = 6
telugu = "మే మెక్కడికిని వెళ్ళము."
english = "We will not go anywhere."

[[exercises]]
n = 7
telugu = "ఇచ్చటనే యున్నాముగా."
english = "We are right here, aren't we."

[[exercises]]
n = 8
telugu = "అచ్చట బావి యున్నదిగాని మెల్లగా వెళ్ళుఁడు."
english = "There is a well there, so go carefully."

[[exercises]]
n = 9
telugu = "పిల్లలను అన్నము తినుటకు పిలువుఁడు."
english = "Call the children to eat."

[[exercises]]
n = 10
telugu = "ఇచట పిల్లకాయలు లేరు; వారెచట నున్నారో నీవే వెళ్ళి తీసికొనిరమ్ము."
english = "The children are not here; you yourself go wherever they are and bring them."

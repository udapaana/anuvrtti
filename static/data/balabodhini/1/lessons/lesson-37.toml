maṇḍapasya adhaḥ ekaḥ kuśamañcaḥ asti. tanmañce biḍālaḥ khanakena sākaṃ kalahaṃ karoti. matkuṇāḥ maśakāśca rātriṃdivaṃ yuṣmadgṛhe sañcaranti. ambārīṣaṃ bhujiṣyaṃ lavittraṃ khanitraṃ ca etāni sarvāṇi āvaraṇe kusūlasamīpe ekatraiva santi. vane yullikāḥ atīva nādaṃ kurvanti. brāhmaṇagṛheṣu piṣṭaṃ takraṃ navanītaṃ tailaṃ ca etāni dravyāṇi sarvadā syuḥ; kiñca gomayam api syāt. brāhmaṇa bālakāḥ upanayanātpūrvaṃ kaṃseṣu bhojanaṃ kuryuḥ. parut yuṣmadgṛhe ekāṃ bhastrāṃ avaśyaṃ khalu; sā idānīṃ kutrāsti? godhāḥ pipīlikāḥ bhakṣayanti. jalūkā mama kaniṣṭhikāṃ adaśat. muktikāḥ dūṣikāyāṃ patanti.

Translation: Under the pavilion there is a couch of kuśa grass. On that couch the cat is quarreling together with the hook/peg. Bedbugs and mosquitoes move about in your house day and night. The griddle, the frying pan, the sickle, and the hoe — all these are together in one place in the enclosure near the granary. In the forest, crickets make much noise. In brahmin households flour, buttermilk, fresh butter, and oil — these things should always be (present); and moreover cow dung too should be there. Brahmin boys before their upanayana ceremony should eat in bronze bowls. Last year there was certainly a leather bag in your house; where is it now? Lizards eat ants. A leech bit my little finger. Flies fall into the eye-discharge.

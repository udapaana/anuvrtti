notes = """
AVYAYA (INDECLINABLE) VOCABULARY
===================================

The following words do not change form regardless of their function in a sentence.

kiñca / apica     = ఇంతేకాకుండా   — moreover, and also
sākam             = తో, కూడ        — together with, along with
pārśvataḥ         = ప్రక్కగా       — sideways, to the side
parut             = గతసంవత్సరమున  — last year
kathāmapi         = అతికష్టముగా   — with great difficulty
vakram            = వంకరగా         — crookedly
aho               = బో రా!         — exclamation of surprise/wonder
nāma              = అనఁగా; అను     — named; so-called
adhaḥ             = క్రింద          — below, down
itthamapi         = ఇంకను          — still, moreover, even so
paritaḥ           = అన్నివైపుల     — on all sides, all around
upari             = పైన, మీఁద      — above, on top of
bāḍham            = సరే, మంచిది   — very well, certainly, yes
adyāpi            = నేఁటికిని      — even today, still (to this day)
he, bhoḥ          = ఓ              — O! (vocative exclamation)

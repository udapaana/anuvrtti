id = "balabodhini-1-17"
source = "balabodhini"
part = 1
number = 17
title_sanskrit = "సప్తదశః పాఠః"
title_telugu = "పదునేడవ పాఠము"
title_iast = "saptadaśaḥ pāṭhaḥ"
title_english = "Seventeenth Lesson"
grammar_focus = "kṛ optative (kuryāt, kuryāma, kuryuḥ); adverbs purā and ciram; postposition artham"

[[vocabulary]]
sanskrit_telugu = "అన్నం"
telugu_gloss = "అన్నము"
iast = "annam"
english = "cooked rice, food"

[[vocabulary]]
sanskrit_telugu = "పురా"
telugu_gloss = "మునుపు"
iast = "purā"
english = "formerly, in the past"

[[vocabulary]]
sanskrit_telugu = "ఘృతం"
telugu_gloss = "నెయ్యి"
iast = "ghṛtam"
english = "ghee, clarified butter"

[[vocabulary]]
sanskrit_telugu = "చిరం"
telugu_gloss = "చాలకాలము"
iast = "ciram"
english = "for a long time"

[[vocabulary]]
sanskrit_telugu = "ఆలస్యం"
telugu_gloss = "జాగు"
iast = "ālasyam"
english = "delay, laziness"

[[vocabulary]]
sanskrit_telugu = "అర్థం"
telugu_gloss = "కొనము (కొఱకు)"
iast = "artham"
english = "for the sake of, for"

[[vocabulary]]
sanskrit_telugu = "కుర్యుః"
telugu_gloss = "చేయుదురు (వలెను)"
iast = "kuryuḥ"
english = "they should do (optative 3rd pl.)"

[[vocabulary]]
sanskrit_telugu = "కుర్యాత్"
telugu_gloss = "చేయుఁడు (వలెను)"
iast = "kuryāt"
english = "one should do (optative 3rd sg.)"

[[vocabulary]]
sanskrit_telugu = "కుర్యామ"
telugu_gloss = "చేయుదుము (వలెను)"
iast = "kuryāma"
english = "we should do (optative 1st pl.)"

[[sentences]]
n = 1
sanskrit_telugu = "అద్య పాకం కే కుర్యుః?"
iast = "adya pākaṃ ke kuryuḥ?"
english = "Who should do the cooking today?"

[[sentences]]
n = 2
sanskrit_telugu = "గృహే ఘృతం నాస్తి."
iast = "gṛhe ghṛtaṃ nāsti."
english = "There is no ghee in the house."

[[sentences]]
n = 3
sanskrit_telugu = "తటాకే జలం నాస్తి."
iast = "taṭāke jalaṃ nāsti."
english = "There is no water in the pond."

[[sentences]]
n = 4
sanskrit_telugu = "ఆలస్యం కరోషి కిం?"
iast = "ālasyaṃ karoṣi kim?"
english = "Why are you delaying?"

[[sentences]]
n = 5
sanskrit_telugu = "త్వం తత్ర చిరం ఆసేః. కిమర్థం?"
iast = "tvaṃ tatra ciraṃ āseḥ. kimartham?"
english = "You were there for a long time. For what purpose?"

[[sentences]]
n = 6
sanskrit_telugu = "అస్మద్గజార్థం అహం తత్రాసం."
iast = "asmadgajārthaṃ ahaṃ tatrāsam."
english = "I was there for the sake of our elephant."

[[sentences]]
n = 7
sanskrit_telugu = "దేవః పురా ప్రథమం జలం అకరోత్."
iast = "devaḥ purā prathamaṃ jalaṃ akarot."
english = "The god formerly made water first."

[[sentences]]
n = 8
sanskrit_telugu = "వయం పాకం సమ్యక్ కుర్యామ."
iast = "vayaṃ pākaṃ samyak kuryāma."
english = "We should cook properly."

[[sentences]]
n = 9
sanskrit_telugu = "ఘృతం నాస్తిచేత్ శాకం కథం కుర్యాం?"
iast = "ghṛtaṃ nāsticet śākaṃ kathaṃ kuryām?"
english = "If there is no ghee, how should I prepare the vegetables?"

[[sentences]]
n = 10
sanskrit_telugu = "అస్మద్గృహే యుష్మద్జనకః తూష్టీమేవ ఆలస్యం కరోతి; త్వమపి అత్రాసి కిం? శీఘ్రం స్నానం కురు."
iast = "asmadgṛhe yuṣmadjanakḥ tūṣṭīmeva ālasyaṃ karoti; tvamapi atrāsi kim? śīghraṃ snānaṃ kuru."
english = "In our house your father is idling in silence; why are you here too? Bathe quickly."

[[exercises]]
n = 1
telugu = "ఇవ్వేళ వంట నెవరు చేయుదరో?"
english = "Who will do the cooking today?"

[[exercises]]
n = 2
telugu = "మీకొనము నేనే చేయవలెను."
english = "I alone must do it for your sake."

[[exercises]]
n = 3
telugu = "లేకపోతే ఎవఁడు చేయును?"
english = "Otherwise who will do it?"

[[exercises]]
n = 4
telugu = "మీయబ్బ."
english = "Your father (will do it)."

[[exercises]]
n = 5
telugu = "ఇవ్వేళ వా రందఱు మీయింట్లో నున్నా రేమి?"
english = "Are they all at your house today?"

[[exercises]]
n = 6
telugu = "ఏమియును లేదు; అట్లు కానిమ్ము."
english = "Nothing of the sort; let it be so."

[[exercises]]
n = 7
telugu = "మీ పిల్లలు మా యింట్లో అన్నముకొనము నున్నారు."
english = "Your children are at our house for the sake of food."

[[exercises]]
n = 8
telugu = "అలాగా, మీరు కొంచె మిక్కడ నుండుఁడు."
english = "Is that so? Please stay here a little while."

[[exercises]]
n = 9
telugu = "మీరు మంచమునం దున్నారా?"
english = "Are you on the bed?"

[[exercises]]
n = 10
telugu = "ఊరకుందుము."
english = "We will stay quiet / remain idle."

id = "balabodhini-1-25"
source = "balabodhini"
part = 1
number = 25
title_sanskrit = "పంచవింశః పాఠః"
title_telugu = "ఇరువదియైదవ పాఠము"
title_iast = "pañcaviṃśaḥ pāṭhaḥ"
title_english = "Twenty-Fifth Lesson"
grammar_focus = "gerunds in -itvā (khāditvā, kṛtvā); infinitives in -tum (khāditum, kartum); root gam (gacchati), nī (nayati), ā+gam (āgacchati)"

[[vocabulary]]
sanskrit_telugu = "కూపః"
telugu_gloss = "బావి"
iast = "kūpaḥ"
english = "well"

[[vocabulary]]
sanskrit_telugu = "ఖాదిత్వా"
telugu_gloss = "తిని"
iast = "khāditvā"
english = "having eaten (gerund)"

[[vocabulary]]
sanskrit_telugu = "రామఠం"
telugu_gloss = "ఇంగువ"
iast = "rāmaṭhaṃ"
english = "asafoetida"

[[vocabulary]]
sanskrit_telugu = "ఖాదితుం"
telugu_gloss = "తినన్, తినుటకు"
iast = "khāditum"
english = "to eat (infinitive)"

[[vocabulary]]
sanskrit_telugu = "లవణం"
telugu_gloss = "ఉప్పు"
iast = "lavaṇaṃ"
english = "salt"

[[vocabulary]]
sanskrit_telugu = "కర్తుం"
telugu_gloss = "చేయన్, చేయుటకు"
iast = "kartum"
english = "to do (infinitive)"

[[vocabulary]]
sanskrit_telugu = "గచ్ఛతి"
telugu_gloss = "వెళ్ళుచున్నాఁడు"
iast = "gacchati"
english = "goes (root gam)"

[[vocabulary]]
sanskrit_telugu = "నయతి"
telugu_gloss = "తీసికొనివెళ్ళుచున్నాఁడు"
iast = "nayati"
english = "leads, takes (root nī)"

[[vocabulary]]
sanskrit_telugu = "అగచ్ఛత్"
telugu_gloss = "వెళ్ళెను, వచ్చెను"
iast = "agacchat"
english = "went, came (imperfect of gam/ā+gam)"

[[sentences]]
n = 1
sanskrit_telugu = "బాలకః అస్మద్గృహే అన్నం ఖాదిత్వా గృహం అగచ్ఛత్."
iast = "bālakaḥ asmadgṛhe annaṃ khāditvā gṛhaṃ agacchat."
english = "The boy, having eaten food at our house, went home."

[[sentences]]
n = 2
sanskrit_telugu = "అహం కూపస్య ఆరాత్ స్నానం కర్తుం అగచ్ఛం."
iast = "ahaṃ kūpasya ārāt snānaṃ kartum agacchaṃ."
english = "I went near the well to bathe."

[[sentences]]
n = 3
sanskrit_telugu = "త్వం కుత్ర ఖాదితుం గచ్ఛసి?"
iast = "tvaṃ kutra khāditum gacchasi?"
english = "Where are you going to eat?"

[[sentences]]
n = 4
sanskrit_telugu = "కుత్రాపి న గచ్ఛామి."
iast = "kutrāpi na gacchāmi."
english = "I am not going anywhere."

[[sentences]]
n = 5
sanskrit_telugu = "అరే యుష్మద్గృహే లవణ మస్తిరే?"
iast = "are yuṣmadgṛhe lavaṇam astire?"
english = "Hey, is there salt in your house?"

[[sentences]]
n = 6
sanskrit_telugu = "లవణం కించిదస్తి. రామఠం సర్వథా నాస్తి."
iast = "lavaṇaṃ kiñcid asti. rāmaṭhaṃ sarvathā nāsti."
english = "There is a little salt. Asafoetida is entirely absent."

[[sentences]]
n = 7
sanskrit_telugu = "తర్హి శాకం కథం కరిష్యసి?"
iast = "tarhi śākaṃ kathaṃ kariṣyasi?"
english = "Then how will you prepare the vegetable dish?"

[[sentences]]
n = 8
sanskrit_telugu = "శాకే లవణం కిమర్థం రే?"
iast = "śāke lavaṇaṃ kimarthaṃ re?"
english = "Why is salt (needed) in the vegetable dish?"

[[sentences]]
n = 9
sanskrit_telugu = "లవణం నాస్తి చేత్ శాకం సమ్యక్ న స్యాత్."
iast = "lavaṇaṃ nāsti cet śākaṃ samyak na syāt."
english = "If there is no salt, the vegetable dish would not be proper."

[[sentences]]
n = 10
sanskrit_telugu = "అతః త్వం స్నానం కృత్వా శీఘ్రం భోజనం కురు."
iast = "ataḥ tvaṃ snānaṃ kṛtvā śīghraṃ bhojanaṃ kuru."
english = "Therefore, having bathed, quickly prepare the meal."

[[exercises]]
n = 1
telugu = "నీవు మీతండ్రిని ఎక్కడికి దీసికొని వెళ్ళుచున్నావు?"
english = "Where are you taking your father?"

[[exercises]]
n = 2
telugu = "నేను మాతమ్ముని మీయింటికి దీసికొని వెళ్ళుచున్నాను."
english = "I am taking my younger brother to your house."

[[exercises]]
n = 3
telugu = "అక్కడ కెందుకు?"
english = "Why there?"

[[exercises]]
n = 4
telugu = "భోజనమును చేయుటకు."
english = "To have a meal."

[[exercises]]
n = 5
telugu = "అక్కడ నన్నమును తిని యిక్కడ నుందుము."
english = "Having eaten food there, we will stay here."

[[exercises]]
n = 6
telugu = "మీతమ్ముఁ డెక్కడ నున్నాఁడు?"
english = "Where is your younger brother?"

[[exercises]]
n = 7
telugu = "వాఁడు మాయింటిలో బావిలో స్నానము చేయుచున్నాఁడు."
english = "He is bathing in the well at our house."

[[exercises]]
n = 8
telugu = "మీబావిలో నీ రున్నదిరా?"
english = "Is there water in your well?"

[[exercises]]
n = 9
telugu = "కొంచెమున్నది గాని బాగుగా లేదు."
english = "There is a little, but it is not good."

[[exercises]]
n = 10
telugu = "అయితే అక్కడ నెట్లు స్నానము చేయుచున్నాఁడు?"
english = "Then how is he bathing there?"

[[vocabulary]]
sanskrit_telugu = "స్యుః"
telugu_gloss = "ఉందురు, వలెను, చాలుదురు"
iast = "syuḥ"
english = "they may be; they should be (3pl optative)"

[[vocabulary]]
sanskrit_telugu = "స్యాత"
telugu_gloss = "మీ రుందురు, వలెను, చాలుదురు"
iast = "syāta"
english = "you (pl.) may be (2pl optative)"

[[vocabulary]]
sanskrit_telugu = "స్యామ"
telugu_gloss = "ఉందుము, వలెను, చాలుదుము"
iast = "syāma"
english = "we may be (1pl optative)"

[[sentences]]
n = 1
sanskrit_telugu = "తత్ర కశ్చిత్ స్యాత్"
iast = "tatra kaścit syāt"
english = "Someone may be there."

[[sentences]]
n = 2
sanskrit_telugu = "నోచేత్ యూయం తత్ర స్యాత"
iast = "nocet yūyam tatra syāta"
english = "Otherwise you (pl.) should be there."

[[sentences]]
n = 3
sanskrit_telugu = "కతిచిత్ తత్ర సంతి"
iast = "katicit tatra santi"
english = "Some (people) are there."

[[sentences]]
n = 4
sanskrit_telugu = "వయం అత్ర స్యామ"
iast = "vayam atra syāma"
english = "We may be here."

[[sentences]]
n = 5
sanskrit_telugu = "తత్ర కించిత్ అపి నాస్తి"
iast = "tatra kiñcit api nāsti"
english = "There is not even a little there."

[[sentences]]
n = 6
sanskrit_telugu = "యూయం తత్ర మాస్థ"
iast = "yūyam tatra māstha"
english = "Do not be there (you pl.)."

[[sentences]]
n = 7
sanskrit_telugu = "కతిచిత్ అత్ర స్యుః"
iast = "katicit atra syuḥ"
english = "Some may be here."

[[sentences]]
n = 8
sanskrit_telugu = "అత్ర కిం అపి నాస్తి"
iast = "atra kim api nāsti"
english = "There is nothing at all here."

[[sentences]]
n = 9
sanskrit_telugu = "ఏతే కతిచిత్ తత్రాసన్"
iast = "ete katicit tatrāsan"
english = "Some of these were there."

[[sentences]]
n = 10
sanskrit_telugu = "వయం కతిచిత్ అత్ర స్మః"
iast = "vayam katicit atra smaḥ"
english = "Some of us are here."

[[exercises]]
n = 1
telugu = "మీరు కొంద ఱిక్కడ నుండుఁడు."
english = "Some of you be here."

[[exercises]]
n = 2
telugu = "మేము కొందఱు మక్కడ నుందుము."
english = "Some of us may be there."

[[exercises]]
n = 3
telugu = "ఇక్కడ నెవరును లేరు."
english = "There is no one here."

[[exercises]]
n = 4
telugu = "అక్కడ నిన్న నెవఁ డుండెనో ఇక్కడను వాఁ డుండవలెను."
english = "The one who was there yesterday should also be here."

[[exercises]]
n = 5
telugu = "మే మెక్కడ నుండవలెను?"
english = "Where should we be?"

[[exercises]]
n = 6
telugu = "ఏమో వారును ఇక్కడ నుండవలెను."
english = "Perhaps they also should be here."

[[exercises]]
n = 7
telugu = "మీ రొకచోట నుండుఁడు."
english = "You (pl.) be in one place."

[[exercises]]
n = 8
telugu = "ఇప్పు డక్కడ నెవరును లేరు."
english = "Now there is no one there."

[[exercises]]
n = 9
telugu = "మీ రీవేళ రాత్రి అక్కడ నుండవలెనా?"
english = "Should you (pl.) be there tonight?"

[[exercises]]
n = 10
telugu = "లేనియెడల మే మక్కడ నుందుము."
english = "Otherwise we will be there."

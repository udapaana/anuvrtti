title_iast = "dvādaśaḥ pāṭhaḥ"
title_english = "Twelfth Lesson"
grammar_focus = "kṛ imperfect singular (akarot / akaroḥ / akaravam); manner adverbs katham (how?), evaṃ (thus), ittham (in this way)"

[[vocabulary]]
sanskrit_telugu = "పాకః"
telugu_gloss = "వంట"
iast = "pākaḥ"
english = "cooking, a cooked meal"

[[vocabulary]]
sanskrit_telugu = "కథం"
telugu_gloss = "ఎట్లు?"
iast = "katham"
english = "how? in what way?"

[[vocabulary]]
sanskrit_telugu = "అకరోత్"
telugu_gloss = "చేసెను"
iast = "akarot"
english = "he/she did (3sg imperfect of kṛ)"

[[vocabulary]]
sanskrit_telugu = "నమస్కారః"
telugu_gloss = "నమస్కారము"
iast = "namaskāraḥ"
english = "salutation, bow, namaskāra"

[[vocabulary]]
sanskrit_telugu = "ఏవం"
telugu_gloss = "ఇట్లు"
iast = "evaṃ"
english = "thus, in this way, so"

[[vocabulary]]
sanskrit_telugu = "అకరోః"
telugu_gloss = "చేసితివి"
iast = "akaroḥ"
english = "you did (2sg imperfect of kṛ)"

[[vocabulary]]
sanskrit_telugu = "వ్యాపారః"
telugu_gloss = "వ్యాపారము"
iast = "vyāpāraḥ"
english = "business, occupation, activity"

[[vocabulary]]
sanskrit_telugu = "ఇత్థం"
telugu_gloss = "ఇట్లు"
iast = "itthaṃ"
english = "in this way, thus (like this)"

[[vocabulary]]
sanskrit_telugu = "అకరవం"
telugu_gloss = "చేసితిని"
iast = "akaravam"
english = "I did (1sg imperfect of kṛ)"

[[sentences]]
n = 1
sanskrit_telugu = "బ్రాహ్మణః స్నానం అకరోత్."
iast = "brāhmaṇaḥ snānam akarot."
english = "The brahmin bathed."

[[sentences]]
n = 2
sanskrit_telugu = "అహం పాకం కరోమి."
iast = "ahaṃ pākaṃ karomi."
english = "I am cooking."

[[sentences]]
n = 3
sanskrit_telugu = "త్వం స్నానం అకరోః."
iast = "tvaṃ snānam akaroḥ."
english = "You bathed."

[[sentences]]
n = 4
sanskrit_telugu = "బాలకాః నమస్కారం కుర్వంతి."
iast = "bālakāḥ namaskāraṃ kurvanti."
english = "The boys are making salutations."

[[sentences]]
n = 5
sanskrit_telugu = "అహం నమస్కారాన్ అకరవం."
iast = "ahaṃ namaskārān akaravam."
english = "I made salutations."

[[sentences]]
n = 6
sanskrit_telugu = "కే వ్యాపారం కుర్వంతి?"
iast = "ke vyāpāraṃ kurvanti?"
english = "Who are doing business?"

[[sentences]]
n = 7
sanskrit_telugu = "త్వం ఏకం వ్యాపారం అకరోః ఖలు?"
iast = "tvaṃ ekaṃ vyāpāram akaroḥ khalu?"
english = "You did one business, did you not?"

[[sentences]]
n = 8
sanskrit_telugu = "త్వం కథం స్నానం అకరోః?"
iast = "tvaṃ kathaṃ snānam akaroḥ?"
english = "How did you bathe?"

[[sentences]]
n = 9
sanskrit_telugu = "ఇత్థం అకరవం."
iast = "itthaṃ akaravam."
english = "I did it in this way."

[[sentences]]
n = 10
sanskrit_telugu = "అహో! యూయం అద్యైవ స్నానం కురుథ కిం?"
iast = "aho! yūyam adyaiva snānaṃ kurutha kiṃ?"
english = "Oh! Are you (pl.) bathing only today?"

[[exercises]]
n = 1
telugu = "మేము నమస్కారములను చేయుట లేదు."
english = "We are not making salutations."

[[exercises]]
n = 2
telugu = "నీవు నమస్కారములను చేసినావా?"
english = "Did you make salutations?"

[[exercises]]
n = 3
telugu = "పిల్ల లట్లు నమస్కారములను చేయుచున్నా రేమి?"
english = "Are the boys making salutations like that?"

[[exercises]]
n = 4
telugu = "ఏమో వారు పిల్లులుకదా."
english = "Well, they are children after all."

[[exercises]]
n = 5
telugu = "మీరు పిల్లలు కారా?"
english = "Are you (pl.) not children?"

[[exercises]]
n = 6
telugu = "మేమఱును పిల్లలమే."
english = "We too are children."

[[exercises]]
n = 7
telugu = "రేపు వంట యెట్లు?"
english = "How will the cooking be tomorrow?"

[[exercises]]
n = 8
telugu = "దేవుఁడే యున్నాఁడు."
english = "Only God is there."

[[exercises]]
n = 9
telugu = "ఈ రాత్రి భోజన మెట్లు?"
english = "How is the meal tonight?"

[[exercises]]
n = 10
telugu = "నేను ప్రొద్దునే భోజనము చేసితిని."
english = "I ate in the early morning."

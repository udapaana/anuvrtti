notes = """
DECLENSION PARADIGMS
====================

All a-stem masculine nouns follow rāma. All a-stem neuter nouns follow phala. All ā-stem feminine nouns follow ambā.

Case names (vibhakti): prathamā (nominative), dvitīyā (accusative), tṛtīyā (instrumental), caturthī (dative), pañcamī (ablative), ṣaṣṭhī (genitive), saptamī (locative), sambodhana (vocative).

rāma (m.) — a-stem masculine
-------------------------------
            Singular            Plural
prathamā:   rāmaḥ              rāmāḥ
dvitīyā:    rāmam              rāmān
tṛtīyā:    rāmeṇa             rāmaiḥ
caturthī:   rāmāya             rāmebhyaḥ
pañcamī:    rāmāt              rāmebhyaḥ
ṣaṣṭhī:    rāmasya            rāmāṇām
saptamī:    rāme               rāmeṣu
sambodhana: he rāma!           he rāmāḥ!

phala (n.) — a-stem neuter
---------------------------
            Singular            Plural
prathamā:   phalam              phalāni
dvitīyā:    phalam              phalāni
tṛtīyā:    phalena             phalaiḥ
caturthī:   phalāya             phalebhyaḥ
pañcamī:    phalāt              phalebhyaḥ
ṣaṣṭhī:    phalasya            phalānām
saptamī:    phale               phaleṣu
sambodhana: he phala!           he phalāni!

ambā (f.) — ā-stem feminine
-----------------------------
            Singular            Plural
prathamā:   ambā                ambāḥ
dvitīyā:    ambām               ambāḥ
tṛtīyā:    ambayā              ambābhiḥ
caturthī:   ambāyai             ambābhyaḥ
pañcamī:    ambāyāḥ             ambābhyaḥ
ṣaṣṭhī:    ambāyāḥ             ambānām
saptamī:    ambāyām             ambāsu
sambodhana: he'mba!             he'mbāḥ!
"""

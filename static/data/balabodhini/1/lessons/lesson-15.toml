id = "balabodhini-1-15"
source = "balabodhini"
part = 1
number = 15
title_sanskrit = "పంచదశః పాఠః"
title_telugu = "పదునేనవ పాఠము"
title_iast = "pañcadaśaḥ pāṭhaḥ"
title_english = "Fifteenth Lesson"
grammar_focus = "kṛ imperative plural (kurvantu / kuruta / karavāma); yuṣmat/asmat possessive compounds (yuṣmad-gṛhe / asmat-gṛhe); tūṣṇīm (silently, doing nothing)"

[[vocabulary]]
sanskrit_telugu = "యుష్మత్"
telugu_gloss = "మీ, మీవల్ల"
iast = "yuṣmat"
english = "your (pl.), from you (pl.) — pronoun stem used in compounds"

[[vocabulary]]
sanskrit_telugu = "కింతు"
telugu_gloss = "కాని"
iast = "kintu"
english = "but, however"

[[vocabulary]]
sanskrit_telugu = "అస్మత్"
telugu_gloss = "మా, మావల్ల"
iast = "asmat"
english = "our, from us — pronoun stem used in compounds"

[[vocabulary]]
sanskrit_telugu = "తర్హి; చేత్"
telugu_gloss = "అయితే"
iast = "tarhi; cet"
english = "then; if (conditional particles)"

[[vocabulary]]
sanskrit_telugu = "గృహం"
telugu_gloss = "ఇల్లు, ఇంటిని"
iast = "gṛham"
english = "house, home (accusative: gṛham)"

[[vocabulary]]
sanskrit_telugu = "తూష్టీం"
telugu_gloss = "ఊరక"
iast = "tūṣṇīm"
english = "silently, quietly, doing nothing"

[[vocabulary]]
sanskrit_telugu = "కుర్వంతు"
telugu_gloss = "చేయుదురుగాక"
iast = "kurvantu"
english = "let them do; may they do (3pl imperative of kṛ)"

[[vocabulary]]
sanskrit_telugu = "కురుత"
telugu_gloss = "చేయుఁడు"
iast = "kuruta"
english = "do! (2pl imperative of kṛ)"

[[vocabulary]]
sanskrit_telugu = "కరవామ"
telugu_gloss = "చేయుదుముగాక"
iast = "karavāma"
english = "let us do; we shall do (1pl imperative of kṛ)"

[[sentences]]
n = 1
sanskrit_telugu = "తత్ర కిమర్థం ఆసేః?"
iast = "tatra kimarthaṃ āseḥ?"
english = "Why were you there?"

[[sentences]]
n = 2
sanskrit_telugu = "అహం తూష్టీం ఆసం."
iast = "ahaṃ tūṣṇīm āsam."
english = "I was there doing nothing (silently)."

[[sentences]]
n = 3
sanskrit_telugu = "తర్హి త్వం పాకం కురు."
iast = "tarhi tvaṃ pākaṃ kuru."
english = "Then you cook."

[[sentences]]
n = 4
sanskrit_telugu = "నోచేత్ వయం కరవామ."
iast = "nocet vayaṃ karavāma."
english = "Otherwise, let us do it."

[[sentences]]
n = 5
sanskrit_telugu = "చేత్కిం?"
iast = "cet kiṃ?"
english = "If so, what then?"

[[sentences]]
n = 6
sanskrit_telugu = "అస్మద్గృహే శాకాని న సంతి."
iast = "asmat-gṛhe śākāni na santi."
english = "There are no vegetables in our house."

[[sentences]]
n = 7
sanskrit_telugu = "తే కుత్ర సంతి వా ఖలు?"
iast = "te kutra santi vā khalu?"
english = "Where indeed are they then?"

[[sentences]]
n = 8
sanskrit_telugu = "తే యుష్మద్గృహే భోజనం కుర్వంతి."
iast = "te yuṣmat-gṛhe bhojanam kurvanti."
english = "They are eating in your (pl.) house."

[[sentences]]
n = 9
sanskrit_telugu = "కుర్వంతి చే త్కుర్వంతు."
iast = "kurvanti cet kurvantu."
english = "If they are doing (it), let them do it."

[[sentences]]
n = 10
sanskrit_telugu = "యూయం తూష్టీం స్థ."
iast = "yūyaṃ tūṣṇīm stha."
english = "You (pl.) be quiet / stay still."

[[exercises]]
n = 1
telugu = "మీ యింట్లో నెవ రున్నారు?"
english = "Who is in your (pl.) house?"

[[exercises]]
n = 2
telugu = "మా యింట్లో అందఱు పిల్లలు స్నానము చేయుచున్నారు."
english = "All the boys are bathing in our house."

[[exercises]]
n = 3
telugu = "వారు వంట చేయుదురుగాక."
english = "Let them cook."

[[exercises]]
n = 4
telugu = "నేను వంట చేసినాను."
english = "I cooked."

[[exercises]]
n = 5
telugu = "అయ్యో మీ రక్కడ నూరకయే యుంటిరా?"
english = "Alas! Were you (pl.) just sitting there doing nothing?"

[[exercises]]
n = 6
telugu = "కొంచెము వంట చేయుఁడు."
english = "Do a little cooking."

[[exercises]]
n = 7
telugu = "నేను మొదట పలువిధములుగాఁ జేసినాను."
english = "First I did it in various ways."

[[exercises]]
n = 8
telugu = "కాని వారు మా యింట్లో లేరు."
english = "But they are not in our house."

[[exercises]]
n = 9
telugu = "మీ రిపుడు స్నానము చేయకుడు."
english = "Do not bathe now (you pl.)."

[[exercises]]
n = 10
telugu = "మొదట మేము స్నానము చేయనియుఁడు."
english = "First let us bathe."

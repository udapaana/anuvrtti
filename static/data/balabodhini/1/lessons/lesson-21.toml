id = "balabodhini-1-21"
source = "balabodhini"
part = 1
number = 21
title_sanskrit = "ఏకవింశః పాఠః"
title_telugu = "ఇరువదియొకటవ పాఠము"
title_iast = "ekaviṃśaḥ pāṭhaḥ"
title_english = "Twenty-first Lesson"
grammar_focus = "khād imperfect (all persons/numbers); genitive plurals yuṣmākam, asmākam, teṣām; correlative yathā…tathā; adverb vṛthā; familiar address re/are"

[[vocabulary]]
sanskrit_telugu = "యుష్మాకం"
telugu_gloss = "మీకు, మీయొక్క"
iast = "yuṣmākam"
english = "your (pl.), of you (genitive of yūyam)"

[[vocabulary]]
sanskrit_telugu = "యథా"
telugu_gloss = "ఎట్లు"
iast = "yathā"
english = "as, in the way that"

[[vocabulary]]
sanskrit_telugu = "అస్మాకం"
telugu_gloss = "మాకు, మాయొక్క"
iast = "asmākam"
english = "our, of us (genitive of vayam)"

[[vocabulary]]
sanskrit_telugu = "రే, అరే"
telugu_gloss = "అరే!"
iast = "re, are"
english = "hey! (familiar address to inferiors or equals)"

[[vocabulary]]
sanskrit_telugu = "తేషాం"
telugu_gloss = "వారికి, వారియొక్క"
iast = "teṣām"
english = "their, of them (genitive of te)"

[[vocabulary]]
sanskrit_telugu = "వృథా"
telugu_gloss = "వ్యర్థముగా"
iast = "vṛthā"
english = "uselessly, in vain"

[[vocabulary]]
sanskrit_telugu = "అఖాదత్"
telugu_gloss = "తిన్నాఁడు"
iast = "akhādat"
english = "he ate (imperfect 3rd sg.)"

[[vocabulary]]
sanskrit_telugu = "అఖాదన్"
telugu_gloss = "తిన్నారు"
iast = "akhādan"
english = "they ate (imperfect 3rd pl.)"

[[vocabulary]]
sanskrit_telugu = "అఖాదః"
telugu_gloss = "తిన్నావు"
iast = "akhādaḥ"
english = "you ate (imperfect 2nd sg.)"

[[vocabulary]]
sanskrit_telugu = "అఖాదత"
telugu_gloss = "మీరు తిన్నారు"
iast = "akhādata"
english = "you (pl.) ate (imperfect 2nd pl.)"

[[vocabulary]]
sanskrit_telugu = "అఖాదం"
telugu_gloss = "తిన్నాను"
iast = "akhādam"
english = "I ate (imperfect 1st sg.)"

[[vocabulary]]
sanskrit_telugu = "అఖాదామ"
telugu_gloss = "తిన్నాము"
iast = "akhādāma"
english = "we ate (imperfect 1st pl.)"

[[sentences]]
n = 1
sanskrit_telugu = "యుష్మాకం గృహే అద్య వయం అన్నం అఖాదామ."
iast = "yuṣmākaṃ gṛhe adya vayaṃ annaṃ akhādāma."
english = "Today we ate rice at your house."

[[sentences]]
n = 2
sanskrit_telugu = "అస్మాకం అత్రగృహ మేవ నాస్తి."
iast = "asmākaṃ atragṛham eva nāsti."
english = "We do not even have a house here."

[[sentences]]
n = 3
sanskrit_telugu = "సః యథా అఖాదత్, త్వం అపి తథా అఖాదః."
iast = "saḥ yathā akhādat, tvaṃ api tathā akhādaḥ."
english = "Just as he ate, you too ate in the same way."

[[sentences]]
n = 4
sanskrit_telugu = "యూయం తత్ర వృథా కిమర్థ మాస్థ?"
iast = "yūyaṃ tatra vṛthā kimartham āstha?"
english = "For what purpose were you (pl.) staying there uselessly?"

[[sentences]]
n = 5
sanskrit_telugu = "వయం తత్ర వృథా నాస్మ."
iast = "vayaṃ tatra vṛthā nāsma."
english = "We were not there in vain."

[[sentences]]
n = 6
sanskrit_telugu = "కింతు తేషాం గృహే స్నానం కుర్మః."
iast = "kintu teṣāṃ gṛhe snānaṃ kurmaḥ."
english = "But we bathed at their house."

[[sentences]]
n = 7
sanskrit_telugu = "రే బాలక! త్వం వృథా మా ఏధి."
iast = "re bālaka! tvaṃ vṛthā mā edhi."
english = "Hey boy! Don't you come here in vain."

[[sentences]]
n = 8
sanskrit_telugu = "యుష్మద్గృహే పాకః కియత్పర్యంతం ఆసీత్?"
iast = "yuṣmadgṛhe pākaḥ kiyatparyantaṃ āsīt?"
english = "How long did the cooking go on at your house?"

[[sentences]]
n = 9
sanskrit_telugu = "శాక మకుర్యన్, అన్నం కుర్వంతి."
iast = "śākam akuryan, annaṃ kurvanti."
english = "They did not prepare the vegetables; they are cooking rice."

[[sentences]]
n = 10
sanskrit_telugu = "తే శీఘ్రు మఖాదన్."
iast = "te śīghrum akhādan."
english = "They ate quickly."

[[exercises]]
n = 1
telugu = "వారు లోపల నున్నారా, వెలుపల నున్నారా?"
english = "Are they inside or outside?"

[[exercises]]
n = 2
telugu = "వారు మా యింట్లో నింతవఱఁ కుండిరి."
english = "They were in our house until now."

[[exercises]]
n = 3
telugu = "మే మిపుడే పండ్లను దిన్నాము."
english = "We ate the fruits just now."

[[exercises]]
n = 4
telugu = "మీ కొసము వా రిక్కడ నున్నారు."
english = "They are here for your sake."

[[exercises]]
n = 5
telugu = "నీ వివ్వేళ సాయంకాల మేమి తింటివి?"
english = "What did you eat this evening?"

[[exercises]]
n = 6
telugu = "నేను వారియొక్క చెంబునందు కూరను చేసితిని."
english = "I prepared vegetables in their vessel."

[[exercises]]
n = 7
telugu = "ఇంతవఱకు నెక్కడ నున్నావురా?"
english = "Where were you until now, boy?"

[[exercises]]
n = 8
telugu = "మీ యింట్లోనే యుంటినిగా."
english = "I was right in your house, of course."

[[exercises]]
n = 9
telugu = "అలాగా! వా రెవరు?"
english = "Is that so! Who are they?"

[[exercises]]
n = 10
telugu = "నిన్న ప్రొద్దున మీయింట్లో నెవరు స్నానము చేసినారో వారే వీరు."
english = "Those who bathed in your house yesterday morning — they are these very people."

[[sentences]]
n = 1
sanskrit_telugu = "తే సర్వేపి రామాయణం పఠంతి."
iast = "te sarve'pi rāmāyaṇaṃ paṭhanti."
english = "All of them read the Rāmāyaṇa."

[[sentences]]
n = 2
sanskrit_telugu = "యూయం కిం లిఖథ?"
iast = "yūyaṃ kiṃ likhatha?"
english = "What are you (pl.) writing?"

[[sentences]]
n = 3
sanskrit_telugu = "ఏకః వానరః అస్మాన్ త్రాసయతి."
iast = "ekaḥ vānaraḥ asmān trāsayati."
english = "A monkey is frightening us."

[[sentences]]
n = 4
sanskrit_telugu = "అరే యుష్మద్గృహే మార్జాలం కే పోషయంతి?"
iast = "are yuṣmadgṛhe mārjālaṃ ke poṣayanti?"
english = "Hey, who is rearing the cat in your house?"

[[sentences]]
n = 5
sanskrit_telugu = "అస్మన్మార్జాలః ప్రతినక్తం ఏకం మూషకం మారయతి."
iast = "asmanmārjālaḥ pratinaktaṃ ekaṃ mūṣakaṃ mārayati."
english = "Our cat kills a mouse every night."

[[sentences]]
n = 6
sanskrit_telugu = "పాత్రాణి సమ్యక్ ధావ."
iast = "pātrāṇi samyak dhāva."
english = "Wash the vessels properly."

[[sentences]]
n = 7
sanskrit_telugu = "దేవ ఏవ సర్వాన్ రక్షతి."
iast = "deva eva sarvān rakṣati."
english = "God alone protects all."

[[sentences]]
n = 8
sanskrit_telugu = "అద్య ప్రాతః త్వం ముఖం అక్షాళయః కిం? నోచేత్ జనకః త్వాం తాడయిష్యతి."
iast = "adya prātaḥ tvaṃ mukhaṃ akṣāḷayaḥ kiṃ? noced janakaḥ tvāṃ tāḍayiṣyati."
english = "Did you wash your face this morning? Otherwise your father will beat you."

[[sentences]]
n = 9
sanskrit_telugu = "ఘంటాం మా నాదయ."
iast = "ghaṇṭāṃ mā nādaya."
english = "Do not ring the bell."

[[sentences]]
n = 10
sanskrit_telugu = "వైశ్యః ఘృతం తోళయతి."
iast = "vaiśyaḥ ghṛtaṃ toḷayati."
english = "The merchant weighs the ghee."

[[sentences]]
n = 11
sanskrit_telugu = "ఏకః చోరః మాం వంచయిత్వా మమ వస్త్రాణి అచోరయత్."
iast = "ekaḥ coraḥ māṃ vañcayitvā mama vastrāṇi acorayat."
english = "A thief, having deceived me, stole my clothes."

[[sentences]]
n = 12
sanskrit_telugu = "అహం రామాయ దశ ధారయామి."
iast = "ahaṃ rāmāya daśa dhārayāmi."
english = "I owe ten (coins) to Rāma."

[[sentences]]
n = 13
sanskrit_telugu = "కిమర్థం బాలకం అధః అపాతయః?"
iast = "kimarthaṃ bālakaṃ adhaḥ apātayaḥ?"
english = "Why did you throw the boy down?"

[[sentences]]
n = 14
sanskrit_telugu = "రామః జనకం సర్వదా తోషయతి."
iast = "rāmaḥ janakaṃ sarvadā toṣayati."
english = "Rāma always pleases his father."


id = "balabodhini-1-18"
source = "balabodhini"
part = 1
number = 18
title_sanskrit = "అష్టాదశః పాఠః"
title_telugu = "పదునెనిమిదవ పాఠము"
title_iast = "aṣṭādaśaḥ pāṭhaḥ"
title_english = "Eighteenth Lesson"
grammar_focus = "kṛ simple future (kariṣyati, kariṣyasi, kariṣyāmi); genitive pronouns tava and mama; adverbs bahiḥ and antaḥ"

[[vocabulary]]
sanskrit_telugu = "తవ"
telugu_gloss = "నీయొక్క, నీకు"
iast = "tava"
english = "your (genitive of tvam)"

[[vocabulary]]
sanskrit_telugu = "పునర్"
telugu_gloss = "మరల"
iast = "punar"
english = "again"

[[vocabulary]]
sanskrit_telugu = "మమ"
telugu_gloss = "నాయొక్క, నాకు"
iast = "mama"
english = "my, mine (genitive of aham)"

[[vocabulary]]
sanskrit_telugu = "బహిర్"
telugu_gloss = "వెలుపల"
iast = "bahir"
english = "outside"

[[vocabulary]]
sanskrit_telugu = "తత్"
telugu_gloss = "అది, ఆ"
iast = "tat"
english = "that"

[[vocabulary]]
sanskrit_telugu = "అంతర్"
telugu_gloss = "లోపల"
iast = "antar"
english = "inside"

[[vocabulary]]
sanskrit_telugu = "కరిష్యతి"
telugu_gloss = "చేయఁగలఁడు"
iast = "kariṣyati"
english = "he/she will do (future 3rd sg.)"

[[vocabulary]]
sanskrit_telugu = "కరిష్యసి"
telugu_gloss = "చేయఁగలవు"
iast = "kariṣyasi"
english = "you will do (future 2nd sg.)"

[[vocabulary]]
sanskrit_telugu = "కరిష్యామి"
telugu_gloss = "చేయఁగలను"
iast = "kariṣyāmi"
english = "I will do (future 1st sg.)"

[[sentences]]
n = 1
sanskrit_telugu = "తవ జనకః అద్య కిం కరోతి?"
iast = "tava janakaḥ adya kiṃ karoti?"
english = "What is your father doing today?"

[[sentences]]
n = 2
sanskrit_telugu = "మమ జనకః గృహే నాస్తి."
iast = "mama janakaḥ gṛhe nāsti."
english = "My father is not at home."

[[sentences]]
n = 3
sanskrit_telugu = "శ్వః పాకం కః కరిష్యతి?"
iast = "śvaḥ pākaṃ kaḥ kariṣyati?"
english = "Who will do the cooking tomorrow?"

[[sentences]]
n = 4
sanskrit_telugu = "మమ అనుజః కరిష్యతి."
iast = "mama anujaḥ kariṣyati."
english = "My younger brother will do it."

[[sentences]]
n = 5
sanskrit_telugu = "తత్ గృహం మమ."
iast = "tat gṛhaṃ mama."
english = "That house is mine."

[[sentences]]
n = 6
sanskrit_telugu = "త్వం ఘటితి స్నానం కరిష్యసి. కిం?"
iast = "tvaṃ ghaṭiti snānaṃ kariṣyasi. kim?"
english = "Will you bathe quickly? Really?"

[[sentences]]
n = 7
sanskrit_telugu = "యుష్మద్గృహం అంత రస్తి;"
iast = "yuṣmadgṛhaṃ antar asti;"
english = "Your house is inside;"

[[sentences]]
n = 8
sanskrit_telugu = "అస్మద్గృహం బహి రస్తి."
iast = "asmadgṛhaṃ bahir asti."
english = "our house is outside."

[[sentences]]
n = 9
sanskrit_telugu = "సః పునః స్నానం కరిష్యతి కిల."
iast = "saḥ punaḥ snānaṃ kariṣyati kila."
english = "He will bathe again, it seems."

[[sentences]]
n = 10
sanskrit_telugu = "అహమపి కరిష్యామి శాకం పాకమపి."
iast = "ahamapi kariṣyāmi śākaṃ pākamapi."
english = "I too will prepare the vegetables and the meal."

[[exercises]]
n = 1
telugu = "మేయిల్లెక్కడ నుండెను?"
english = "Where was our house?"

[[exercises]]
n = 2
telugu = "నాయొక్క యిల్లు మునుపును అక్కడనే యుండెను."
english = "My house was right there before too."

[[exercises]]
n = 3
telugu = "ఇపు డిక్కడ నున్నది."
english = "Now it is here."

[[exercises]]
n = 4
telugu = "వారు వంట నెపుడు చేయఁగలరు?"
english = "When will they be able to do the cooking?"

[[exercises]]
n = 5
telugu = "నీవు రేపు నా కొక మంచమును చేయుము."
english = "Make a bed for me tomorrow."

[[exercises]]
n = 6
telugu = "ఇపుడు నీవు మరల నెందుకు స్నానము చేసినావు?"
english = "Why did you bathe again just now?"

[[exercises]]
n = 7
telugu = "వంటను అక్కడ చేయుచున్నారు; ఆలస్యము చేయవద్దు."
english = "They are cooking there; do not delay."

[[exercises]]
n = 8
telugu = "నీవు వంట నిపుడు చేయవా యేమి?"
english = "Won't you do the cooking now?"

[[exercises]]
n = 9
telugu = "మా యింటిలో నీరు లేదు గాన చెఱువులో స్నానము చేయుము."
english = "There is no water in our house, so bathe in the pond."

[[exercises]]
n = 10
telugu = "మీపిల్ల లింటిలో నున్నారో, లేరో;"
english = "Whether your children are in the house or not;"

id = "balabodhini-1-16"
source = "balabodhini"
part = 1
number = 16
title_sanskrit = "షోడశః పాఠః"
title_telugu = "పదునాఱవ పాఠము"
title_iast = "ṣoḍaśaḥ pāṭhaḥ"
title_english = "Sixteenth Lesson"
grammar_focus = "kṛ optative singular (kuryāt / kuryāḥ / kuryām); new nouns kalaśaḥ (pot), mañcaḥ (bed), jalam (water); adverbs alam (enough), samyak (properly), śīghram (quickly)"

[[vocabulary]]
sanskrit_telugu = "కలశః"
telugu_gloss = "చెంబు"
iast = "kalaśaḥ"
english = "water pot, pitcher"

[[vocabulary]]
sanskrit_telugu = "అలం"
telugu_gloss = "చాలును"
iast = "alam"
english = "enough, sufficient; stop (used to mean 'enough of this')"

[[vocabulary]]
sanskrit_telugu = "మంచః"
telugu_gloss = "మంచము"
iast = "mañcaḥ"
english = "bed, cot"

[[vocabulary]]
sanskrit_telugu = "సమ్యక్"
telugu_gloss = "బాగుగా"
iast = "samyak"
english = "properly, well, correctly"

[[vocabulary]]
sanskrit_telugu = "జలం"
telugu_gloss = "నీరు-నీటిని"
iast = "jalam"
english = "water (accusative: jalam)"

[[vocabulary]]
sanskrit_telugu = "శీఘ్రం"
telugu_gloss = "త్వరగా"
iast = "śīghram"
english = "quickly, swiftly"

[[vocabulary]]
sanskrit_telugu = "కుర్యాత్"
telugu_gloss = "చేయును, వలెను-చాలును"
iast = "kuryāt"
english = "he/she may do; should do (3sg optative of kṛ)"

[[vocabulary]]
sanskrit_telugu = "కుర్యాః"
telugu_gloss = "చేయుదువు, వలెను-చాలుదువు"
iast = "kuryāḥ"
english = "you may do; should do (2sg optative of kṛ)"

[[vocabulary]]
sanskrit_telugu = "కుర్యాం"
telugu_gloss = "చేయుదును, వలెను-చాలుదును"
iast = "kuryām"
english = "I may do; should do (1sg optative of kṛ)"

[[sentences]]
n = 1
sanskrit_telugu = "బాలకాః మంచే ఆసన్."
iast = "bālakāḥ mañce āsan."
english = "The boys were on the bed."

[[sentences]]
n = 2
sanskrit_telugu = "కలశే జలం అస్తి వా?"
iast = "kalaśe jalam asti vā?"
english = "Is there water in the pot?"

[[sentences]]
n = 3
sanskrit_telugu = "జలం సమ్యక్ నాస్తి."
iast = "jalaṃ samyak nāsti."
english = "The water is not adequate / there is not enough water."

[[sentences]]
n = 4
sanskrit_telugu = "ఏషః అస్మద్మంచః."
iast = "eṣaḥ asmat-mañcaḥ."
english = "This is our bed."

[[sentences]]
n = 5
sanskrit_telugu = "యుష్మత్కలశాః కుత్ర సంతి?"
iast = "yuṣmat-kalaśāḥ kutra santi?"
english = "Where are your (pl.) pots?"

[[sentences]]
n = 6
sanskrit_telugu = "యూయం పాకం ఘటితి కురుత."
iast = "yūyaṃ pākaṃ ghaṭiti kuruta."
english = "You (pl.) do the cooking immediately."

[[sentences]]
n = 7
sanskrit_telugu = "అద్య శాకం కః కుర్యాత్?"
iast = "adya śākaṃ kaḥ kuryāt?"
english = "Who should make the vegetable dish today?"

[[sentences]]
n = 8
sanskrit_telugu = "త్వం శాకం కుర్యాః, అహం పాకం కుర్యాం."
iast = "tvaṃ śākaṃ kuryāḥ, ahaṃ pākaṃ kuryām."
english = "You should make the vegetables; I should do the cooking."

[[sentences]]
n = 9
sanskrit_telugu = "త్వం ఏకః ఏవ శాకం కుర్యాః కిం?"
iast = "tvaṃ ekaḥ eva śākaṃ kuryāḥ kiṃ?"
english = "Should you alone make all the vegetables?"

[[sentences]]
n = 10
sanskrit_telugu = "అహం ఏకోపి పాకం శాకమపి సమ్యగేవ కుర్యాం."
iast = "ahaṃ ekopi pākaṃ śākam api samyageva kuryām."
english = "Even alone, I should properly do both the cooking and the vegetables."

[[exercises]]
n = 1
telugu = "చాలుఁగాని మీరు త్వరగా స్నానము చేయుఁడు."
english = "Enough — now you (pl.) bathe quickly."

[[exercises]]
n = 2
telugu = "మీరు చెఱువులో స్నానము చేయవద్దు."
english = "Do not bathe in the pond (you pl.)."

[[exercises]]
n = 3
telugu = "మా యింట్లో నీ రున్నది; అక్కడ స్నానము చేయుఁడు."
english = "There is water in our house; bathe there."

[[exercises]]
n = 4
telugu = "మీ యిల్లెక్కడ నున్నది?"
english = "Where is your (pl.) house?"

[[exercises]]
n = 5
telugu = "మాయిండ్లు అక్కడ నున్నవి."
english = "Our houses are there."

[[exercises]]
n = 6
telugu = "నీవు త్వరగా భోజనము చేయవలెను."
english = "You should eat quickly."

[[exercises]]
n = 7
telugu = "నే నిపుడు చేయను."
english = "I will not do it now."

[[exercises]]
n = 8
telugu = "తరువాత చేయుదును."
english = "I will do it afterwards."

[[exercises]]
n = 9
telugu = "అక్కడ నెందఱు పిల్లలు భోజనము చేసిరి?"
english = "How many boys ate there?"

[[exercises]]
n = 10
telugu = "అక్కడ నొక్కఁడును భోజనము చేయలేదు."
english = "Not even one person ate there."

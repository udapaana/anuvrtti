grammar_focus = "Complete verb paradigms for √as (to be), √kṛ (to do), and √bhū (to become/be) across five moods: present, imperfect, imperative, optative, future"

notes = """
VERB PARADIGMS
==============

Moods covered: laṭ (present), laṅ (imperfect/past), loṭ (imperative), liṅ (optative/potential), lṛṭ (future).
Person/number: prathama (3rd), madhyama (2nd), uttama (1st) × singular and plural.

Note: All verbs listed below follow the bhū pattern except where individually noted.

√as — to be (athematic, second class)
--------------------------------------
laṭ (present):
            Singular        Plural
3rd:        asti            santi
2nd:        asi             stha
1st:        asmi            smaḥ

laṅ (imperfect):
            Singular        Plural
3rd:        āsīt            āsan
2nd:        āseḥ            āstha
1st:        āsam            āsma

loṭ (imperative):
            Singular        Plural
3rd:        astu            santu
2nd:        edhi            stha
1st:        asāni           asāma

liṅ (optative):
            Singular        Plural
3rd:        syāt            syuḥ
2nd:        syāḥ            syāta
1st:        syām            syāma

lṛṭ (future): uses √bhū — bhaviṣyati, etc. (see √bhū below)

√kṛ — to do/make (eighth class, u-class)
-----------------------------------------
laṭ (present):
            Singular        Plural
3rd:        karoti          kurvanti
2nd:        karoṣi          kurutha
1st:        karomi          kurmaḥ

laṅ (imperfect):
            Singular        Plural
3rd:        akarot          akurvan
2nd:        akaroḥ          akuruta
1st:        akaravam        akurma

loṭ (imperative):
            Singular        Plural
3rd:        karotu          kurvantu
2nd:        kuru            kuruta
1st:        karavāṇi        karavāma

liṅ (optative):
            Singular        Plural
3rd:        kuryāt          kuryuḥ
2nd:        kuryāḥ          kuryāta
1st:        kuryām          kuryāmaḥ

lṛṭ (future):
            Singular        Plural
3rd:        kariṣyati       kariṣyanti
2nd:        kariṣyasi       kariṣyatha
1st:        kariṣyāmi       kariṣyāmaḥ

√bhū — to become/be (first class, a-class)
-------------------------------------------
laṭ (present):
            Singular        Plural
3rd:        bhavati         bhavanti
2nd:        bhavasi         bhavatha
1st:        bhavāmi         bhavāmaḥ

laṅ (imperfect):
            Singular        Plural
3rd:        abhavat         abhavan
2nd:        abhavaḥ         abhavata
1st:        abhavam         abhavāma

loṭ (imperative):
            Singular        Plural
3rd:        bhavatu         bhavantu
2nd:        bhava           bhavata
1st:        bhavāni         bhavāma

liṅ (optative):
            Singular        Plural
3rd:        bhavet          bhaveyuḥ
2nd:        bhaveḥ          bhaveta
1st:        bhaveyam        bhavema

lṛṭ (future):
            Singular        Plural
3rd:        bhaviṣyati      bhaviṣyanti
2nd:        bhaviṣyasi      bhaviṣyatha
1st:        bhaviṣyāmi      bhaviṣyāmaḥ
"""

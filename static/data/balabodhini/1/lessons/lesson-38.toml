notes = """
DUAL NUMBER PARADIGMS
======================

The dual (dvivacana) refers to exactly two of something. Dual forms exist in all three genders for nouns and in all three persons for verbs.

DUAL PRONOUN DECLENSION
-----------------------

tad / saḥ (he/that; m.) — dual only
prathamā (nom.):            tau
dvitīyā (acc.):             tau
tṛtīyā/caturthī/pañcamī:  tābhyām
ṣaṣṭhī/saptamī:            tayoḥ

Note: For f./n., prathamā/dvitīyā dual uses -e (te) instead of -au (tau).
All other masculine pronouns follow the tad dual pattern.

etad (this; m.) — dual only
prathamā/dvitīyā:           etau
tṛtīyā/caturthī/pañcamī:  etābhyām
ṣaṣṭhī/saptamī:            etayoḥ

yuṣmad (you two)
prathamā/dvitīyā:           yuvām
tṛtīyā/caturthī/pañcamī:  yuvābhyām
ṣaṣṭhī/saptamī:            yuvayoḥ

asmad (we two)
prathamā/dvitīyā:           āvām
tṛtīyā/caturthī/pañcamī:  āvābhyām
ṣaṣṭhī/saptamī:            āvayoḥ

Note: The numeral dvi (two) follows the same dual pattern across all genders.
In masculine: dvau (nom./acc.); dvayor (gen./loc.); dvābhyām (inst./dat./abl.)
In feminine/neuter: dve (nom./acc.); dvayor; dvābhyām.

DUAL VERB PARADIGMS
====================

Dual appears in the middle column (between singular and plural).
Person order: 3rd / 2nd / 1st.

√as (to be)
Mood:         3rd dual     2nd dual     1st dual
laṭ (pres.):  staḥ         sthaḥ        svaḥ
laṅ (past):   āstām        āstam        āsva
loṭ (imper.): stām         stam         asāva
liṅ (opt.):   syātām       syātam       syāva
lṛṭ (fut.):   bhaviṣyataḥ  bhaviṣyathaḥ bhaviṣyāvaḥ

√kṛ (to do)
Mood:         3rd dual     2nd dual     1st dual
laṭ (pres.):  kurutaḥ      kuruthaḥ     kurvaḥ
laṅ (past):   akurutām     akurutam     akurva
loṭ (imper.): kurutām      kurutam      karavāva
liṅ (opt.):   kuryātām     kuryātam     kuryāva
lṛṭ (fut.):   kariṣyataḥ   kariṣyathaḥ  kariṣyāvaḥ

√bhū (to become/be)
Mood:         3rd dual     2nd dual     1st dual
laṭ (pres.):  bhavataḥ     bhavathaḥ    bhavāvaḥ
laṅ (past):   abhavatām    abhavatam    abhavāva
loṭ (imper.): bhavatām     bhavatam     bhavāva
liṅ (opt.):   bhavetām     bhavetam     bhaveva
lṛṭ (fut.):   bhaviṣyataḥ  bhaviṣyathaḥ bhaviṣyāvaḥ

RĀMĀYAṆA NARRATIVE (uttarārtham)
===================================

Sanskrit text (IAST):

purā daśarathaḥ nāma nṛpaḥ kosaladeśe rājyaṃ karotisma. tasya ciraṃ putrāḥ nāsan. anantaraṃ saḥ ekaṃ yajñaṃ akarot. tadā agnikuṇḍāt ekaḥ divyapuruṣaḥ kṣīrānnapātreṇa sākaṃ bahir āgacchat. taṃ dṛṣṭvā daśarathaḥ namaskāraṃ akarot. tadanantaraṃ divyapuruṣaḥ pāyasapātraṃ daśarathāya ayacchat. daśarathaḥ tatpāyasaṃ svabhāryābhyaḥ ayacchat. daśarathabhāryāḥ sarvaṃ pāyasam akhādan. tataḥ tasya putracatuṣṭayaṃ udabhavat. teṣāṃ madhye rāmaḥ jyeṣṭhaḥ. saḥ bahuguṇasaṃpannaḥ, dayānudrāḥ, satyabhāṣaṇaḥ, sundarākāraḥ, pavitracaritraśca abhavat. tataḥ sarvajanāḥ rāmaṃ dṛṣṭvā saṃtoṣeṇa āsan. ekadā viśvāmitraḥ daśarathasya gṛham āgatya 'svāsmai rāmalakṣmaṇau yaccha' iti daśaratham apṛcchat. tadā daśarathaḥ kimartham iti praśnaṃ akarot. yajñasaṃrakṣaṇārtham iti viśvāmitraḥ pratyuttaraṃ ayacchat.

English translation:

Long ago, a king named Daśaratha ruled the land of Kosala. For a long time he had no sons. Afterwards he performed a sacrifice. At that time, a divine being came out from the sacrificial fire-pit along with a vessel of milk-rice. Seeing him, Daśaratha made obeisance. After that, the divine being gave the vessel of pāyasa (sweetened rice) to Daśaratha. Daśaratha gave that pāyasa to his wives. Daśaratha's wives ate all the pāyasa. From this, four sons were born to him. Among them, Rāma was the eldest. He was endowed with many virtues — compassionate, truthful in speech, handsome in form, and of pure character. Then all people, seeing Rāma, were joyful. One day Viśvāmitra came to Daśaratha's house and asked Daśaratha: "Give me Rāma and Lakṣmaṇa." Daśaratha then asked "why?" Viśvāmitra replied: "For the protection of the sacrifice."

(Summary continuation in Telugu: Daśaratha then sent Rāma and Lakṣmaṇa along with Viśvāmitra. Afterwards Rāma killed Tāṭakā and protected Viśvāmitra's sacrifice.)
"""

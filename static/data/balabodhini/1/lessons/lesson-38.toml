[[sentences]]
n = 8
sanskrit_telugu = "తత్ర ద్వే బాలికే భోజనం కురుతః."
iast = "tatra dve bālike bhojanaṃ kurutaḥ."
english = "Two girls there are preparing food."

[[sentences]]
n = 9
sanskrit_telugu = "అత్ర బాలకౌ ద్వౌ భారతం పఠతః."
iast = "atra bālakau dvau bhārataṃ paṭhataḥ."
english = "Two boys here are reading the Mahābhārata."

[[sentences]]
n = 10
sanskrit_telugu = "ఆవయోః పుత్రౌ అద్య ప్రాతః కిం అకురుతాంవా, కుత్ర అస్తాంవా?"
iast = "āvayoḥ putrau adya prātaḥ kiṃ akurutāṃvā, kutra astāṃvā?"
english = "What did our two sons do this morning, or where were they?"

[[sentences]]
n = 11

iast = "tasmai"
english = "to/for him (dative singular)"

[[vocabulary]]
sanskrit_telugu = "భూత్వా"
telugu_gloss = "అయి"
iast = "bhūtvā"
english = "having become (gerund of bhū)"

[[vocabulary]]
sanskrit_telugu = "తస్మాత్"
telugu_gloss = "వానివలన, నుండి"
iast = "tasmāt"
english = "from him (ablative singular)"

[[vocabulary]]
sanskrit_telugu = "భవితుం"
telugu_gloss = "కాన్, అగుటకు"
iast = "bhavitum"
english = "to become (infinitive of bhū)"

[[vocabulary]]
sanskrit_telugu = "తేభ్యః"
telugu_gloss = "వారికొఱకు, వారివలన"
iast = "tebhyaḥ"
english = "to/for/from them (dative/ablative plural)"

[[vocabulary]]
sanskrit_telugu = "చలిత్వా"
telugu_gloss = "కదలి"
iast = "calitvā"
english = "having moved (gerund of cal)"

[[vocabulary]]
sanskrit_telugu = "త్వత్"
telugu_gloss = "నీ, నీవలన"
iast = "tvat"
english = "from you (ablative singular)"

[[vocabulary]]
sanskrit_telugu = "ఉషిత్వా"
telugu_gloss = "ఉండి"
iast = "uṣitvā"
english = "having stayed (gerund of vas)"

[[vocabulary]]
sanskrit_telugu = "మత్"
telugu_gloss = "నా, నావలన"
iast = "mat"
english = "from me (ablative singular)"

[[vocabulary]]
sanskrit_telugu = "వస్తుం"
telugu_gloss = "ఉండన్, ఉండుటకు"
iast = "vastum"
english = "to live/stay (infinitive of vas)"

[[vocabulary]]
sanskrit_telugu = "భవతునామ"
telugu_gloss = "కానిమ్ము"
iast = "bhavatu nāma"
english = "let it be so; very well"

[[vocabulary]]
sanskrit_telugu = "అస్తునామ"
telugu_gloss = "కానిమ్ము"
iast = "astu nāma"
english = "so be it; all right"

[[vocabulary]]
sanskrit_telugu = "చలితుం"
telugu_gloss = "కదలన్"
iast = "calitum"
english = "to move (infinitive of cal)"

[[vocabulary]]
sanskrit_telugu = "యచ్ఛతి"
telugu_gloss = "ఇచ్చుచున్నాఁడు"
iast = "yacchati"
english = "gives (root yam)"

[[vocabulary]]
sanskrit_telugu = "కారయతి"
telugu_gloss = "చేయించుచున్నాఁడు"
iast = "kārayati"
english = "causes to do, gets done (causative of kṛ)"

[[vocabulary]]
sanskrit_telugu = "దాస్యతి"
telugu_gloss = "ఈయఁగలఁడు"
iast = "dāsyati"
english = "will give (future of dā)"

[[sentences]]
n = 1
sanskrit_telugu = "అహం మర్కటాయ అన్నం యచ్ఛామి."
iast = "ahaṃ markaṭāya annaṃ yacchāmi."
english = "I give food to the monkey."

[[sentences]]
n = 2
sanskrit_telugu = "త్వం తస్మై పానీయం దాస్యసి కిం?"
iast = "tvaṃ tasmai pānīyaṃ dāsyasi kiṃ?"
english = "Will you give him drinking water?"

[[sentences]]
n = 3
sanskrit_telugu = "క్షీరం కుత్రాఽస్తివా?"
iast = "kṣīraṃ kutrā'sti vā?"
english = "Where is the milk?"

[[sentences]]
n = 4
sanskrit_telugu = "బాలకేభ్యః అద్య ప్రాతః క్షీరం కః దాస్యతి?"
iast = "bālakebhyaḥ adya prātaḥ kṣīraṃ kaḥ dāsyati?"
english = "Who will give milk to the boys this morning?"

[[sentences]]
n = 5
sanskrit_telugu = "త్వం శీఘ్రం గత్వా మమ జనకం స్నానం కారయ."
iast = "tvaṃ śīghraṃ gatvā mama janakaṃ snānaṃ kāraya."
english = "Going quickly, get my father to bathe."

[[sentences]]
n = 6
sanskrit_telugu = "త్వం నచేత్ కః కారయిష్యతి?"
iast = "tvaṃ na cet kaḥ kārayiṣyati?"
english = "If not you, who will get it done?"

[[sentences]]
n = 7
sanskrit_telugu = "గృహాత్ బహిః అనేకే బ్రాహ్మణాః సంతి."
iast = "gṛhāt bahiḥ aneke brāhmaṇāḥ santi."
english = "Outside the house there are many brahmins."

[[sentences]]
n = 8
sanskrit_telugu = "తేభ్యః సర్వేభ్యః భోజనం యచ్ఛత."
iast = "tebhyaḥ sarvebhyaḥ bhojanaṃ yacchata."
english = "Give food to all of them."

[[sentences]]
n = 9
sanskrit_telugu = "తవ జనకాయ ఏషః ఫలం యచ్ఛతు."
iast = "tava janakāya eṣaḥ phalaṃ yacchatu."
english = "Let this one give the fruit to your father."

[[sentences]]
n = 10
sanskrit_telugu = "అస్తునామ. కః యచ్ఛతిచే త్కిం? తథైవ భవతు. అహం అద్యైవ ఖలు ఫలం అయచ్ఛం."
iast = "astu nāma. kaḥ yacchati cet kiṃ? tathaiva bhavatu. ahaṃ adyaiva khalu phalaṃ ayacchaṃ."
english = "Very well. What does it matter who gives? Let it be so. I myself gave the fruit today."

[[exercises]]
n = 1
telugu = "కోఽతులు కొందలందు నడచుచున్నవి."
english = "Monkeys are walking on the hills."

[[exercises]]
n = 2
telugu = "చాల కోఽతులు చెట్టనుండి పడినవి."
english = "Many monkeys fell from the tree."

[[exercises]]
n = 3
telugu = "మీరు మాతో నెందుకు యుద్ధము చేయుదురు?"
english = "Why do you (pl.) fight with us?"

[[exercises]]
n = 4
telugu = "మేము మీతో నెప్పుడును యుద్ధము చేయము."
english = "We never fight with you."

[[exercises]]
n = 5
telugu = "మీరే మాతో యుద్ధము చేయుటకు వచ్చుచున్నారు."
english = "You yourselves are coming to fight with us."

[[exercises]]
n = 6
telugu = "వా రెవరును ఇక్కడ లేరు."
english = "None of them are here."

[[exercises]]
n = 7
telugu = "ఆకొంద యంచెన్ని కోఽతులున్నవి?"
english = "How many monkeys are on that hill?"

[[exercises]]
n = 8
telugu = "ఏమో ఎవఁడు చూచినాఁడు."
english = "Who knows, who has seen."

[[exercises]]
n = 9
telugu = "అయ్యో! ఆ పిల్లి కొఱకు కొంచెము పాల నిండు."
english = "Alas! Give a little milk for that cat."

[[exercises]]
n = 10
telugu = "ఇవ్వేళ నేను ఊరికి పోవలయనుగాని త్వరగా వంటను చేయించుఁడు."
english = "I must go to town today, so quickly get the cooking done."

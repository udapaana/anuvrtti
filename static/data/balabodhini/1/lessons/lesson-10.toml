id = "balabodhini-1-10"
source = "balabodhini"
part = 1
number = 10
title_sanskrit = "దశమః పాఠః"
title_telugu = "పదియవ పాఠము"
title_iast = "daśamaḥ pāṭhaḥ"
title_english = "Tenth Lesson"
grammar_focus = "kṛ present plural (kurvanti / kurutha / kurmaḥ); noun declension devaḥ / devam / devān (nom/acc sg and pl)"

[[vocabulary]]
sanskrit_telugu = "దేవాః"
telugu_gloss = "దేవులు"
iast = "devāḥ"
english = "gods (nominative plural)"

[[vocabulary]]
sanskrit_telugu = "అన్యత్ర"
telugu_gloss = "మఱియొక చోట"
iast = "anyatra"
english = "elsewhere, in another place"

[[vocabulary]]
sanskrit_telugu = "దేవం"
telugu_gloss = "దేవుని"
iast = "devam"
english = "god (accusative singular)"

[[vocabulary]]
sanskrit_telugu = "తథా"
telugu_gloss = "అలాగు"
iast = "tathā"
english = "so, thus, in that way"

[[vocabulary]]
sanskrit_telugu = "దేవాన్"
telugu_gloss = "దేవులను"
iast = "devān"
english = "gods (accusative plural)"

[[vocabulary]]
sanskrit_telugu = "కుర్వంతి"
telugu_gloss = "చేయుచున్నారు"
iast = "kurvanti"
english = "they do, are doing (3pl present of kṛ)"

[[vocabulary]]
sanskrit_telugu = "కురుథ"
telugu_gloss = "మీరు చేయుచున్నారు"
iast = "kurutha"
english = "you (pl.) do, are doing (2pl present of kṛ)"

[[vocabulary]]
sanskrit_telugu = "కుర్మః"
telugu_gloss = "చేయుచున్నాము"
iast = "kurmaḥ"
english = "we do, are doing (1pl present of kṛ)"

[[vocabulary]]
sanskrit_telugu = "సర్వత్ర"
telugu_gloss = "అన్నిచోట్ల"
iast = "sarvatra"
english = "everywhere, in all places"

[[sentences]]
n = 1
sanskrit_telugu = "యూయం తత్ర కిం కురుథ?"
iast = "yūyaṃ tatra kiṃ kurutha?"
english = "What are you (pl.) doing there?"

[[sentences]]
n = 2
sanskrit_telugu = "వయం తత్రాస్మ."
iast = "vayaṃ tatrāsma."
english = "We are there."

[[sentences]]
n = 3
sanskrit_telugu = "కిమపి నాస్తి."
iast = "kimapi nāsti."
english = "There is nothing at all."

[[sentences]]
n = 4
sanskrit_telugu = "తే తత్ర కిం కుర్వంతి?"
iast = "te tatra kiṃ kurvanti?"
english = "What are they doing there?"

[[sentences]]
n = 5
sanskrit_telugu = "న కించిదపి."
iast = "na kiñcidapi."
english = "Not even a little / Nothing at all."

[[sentences]]
n = 6
sanskrit_telugu = "వయం కిం కుర్మః?"
iast = "vayaṃ kiṃ kurmaḥ?"
english = "What do we do?"

[[sentences]]
n = 7
sanskrit_telugu = "దేవాః కుత్రాసన్?"
iast = "devāḥ kutrāsan?"
english = "Where were the gods?"

[[sentences]]
n = 8
sanskrit_telugu = "కుత్రాపి నాసన్."
iast = "kutrāpi nāsan."
english = "They were nowhere."

[[sentences]]
n = 9
sanskrit_telugu = "అగ్రజాః కే?"
iast = "agrajāḥ ke?"
english = "Who are the elder brothers?"

[[sentences]]
n = 10
sanskrit_telugu = "తే సర్వేపి అగ్రజాః."
iast = "te sarvepi agrajāḥ."
english = "All of them are elder brothers."

[[exercises]]
n = 1
telugu = "ఎవ రేమి చేయుచున్నారు?"
english = "Who is doing what?"

[[exercises]]
n = 2
telugu = "వారు మఱొక చోట నున్నారు."
english = "They are in another place."

[[exercises]]
n = 3
telugu = "అలాగా!"
english = "Is that so! / Indeed!"

[[exercises]]
n = 4
telugu = "అయ్యో! మీ రిక్కడ నేమి చేయుచున్నారు?"
english = "Alas! What are you (pl.) doing here?"

[[exercises]]
n = 5
telugu = "ఏమియును లేదు."
english = "There is nothing at all."

[[exercises]]
n = 6
telugu = "కొందఱు అక్కడ లేరు."
english = "Some are not there."

[[exercises]]
n = 7
telugu = "ఎందఱు లేరు?"
english = "How many are absent?"

[[exercises]]
n = 8
telugu = "మే మందఱిమును ఇక్కడనే యున్నాము."
english = "All of us are right here."

[[exercises]]
n = 9
telugu = "వీ రందఱును దేవులట."
english = "All of these are gods, reportedly."

[[exercises]]
n = 10
telugu = "మే మందఱి మేమియును చేయుట లేదు."
english = "All of us are doing nothing."

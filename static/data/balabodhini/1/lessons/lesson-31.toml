id = "balabodhini-1-31"
source = "balabodhini"
part = 1
number = 31
title_sanskrit = "ఏకత్రింశః పాఠః"
title_telugu = "ముప్పదియొకటవ పాఠము"
title_iast = "ekatriṃśaḥ pāṭhaḥ"
title_english = "Thirty-First Lesson"
grammar_focus = "instrumental yuṣmābhiḥ, mārjālena, mūṣakaiḥ; gerunds dṛṣṭvā, pītvā; infinitives draṣṭum, praṣṭum; mā'stu (let it be); verbs vasati, bhavati, calati"

[[vocabulary]]
sanskrit_telugu = "యుష్మాభిః"
telugu_gloss = "మీచేత, మీతో"
iast = "yuṣmābhiḥ"
english = "by you (pl.), with you (instrumental plural)"

[[vocabulary]]
sanskrit_telugu = "దృష్ట్వా"
telugu_gloss = "చూచి"
iast = "dṛṣṭvā"
english = "having seen (gerund of dṛś)"

[[vocabulary]]
sanskrit_telugu = "మార్జాలేన"
telugu_gloss = "పిల్లిచేత, పిల్లితో"
iast = "mārjālena"
english = "by/with the cat (instrumental)"

[[vocabulary]]
sanskrit_telugu = "ద్రష్టుం"
telugu_gloss = "చూడన్, చూచుటకు"
iast = "draṣṭum"
english = "to see (infinitive of dṛś)"

[[vocabulary]]
sanskrit_telugu = "మూషకైః"
telugu_gloss = "ఎలుకలచేత, ఎలుకలతో"
iast = "mūṣakaiḥ"
english = "by/with rats (instrumental plural)"

[[vocabulary]]
sanskrit_telugu = "ప్రష్టుం"
telugu_gloss = "అడుగన్, అడుగుటకు"
iast = "praṣṭum"
english = "to ask (infinitive of prach)"

[[vocabulary]]
sanskrit_telugu = "యుద్ధం"
telugu_gloss = "యుద్ధము"
iast = "yuddhaṃ"
english = "battle, fight"

[[vocabulary]]
sanskrit_telugu = "పీత్వా"
telugu_gloss = "త్రాగి"
iast = "pītvā"
english = "having drunk (gerund of pā)"

[[vocabulary]]
sanskrit_telugu = "మాస్తు"
telugu_gloss = "పోనిమ్ము"
iast = "māstu"
english = "let it not be; never mind"

[[vocabulary]]
sanskrit_telugu = "వసతి"
telugu_gloss = "ఉంచున్నాఁడు"
iast = "vasati"
english = "lives, stays (root vas)"

[[vocabulary]]
sanskrit_telugu = "భవతి"
telugu_gloss = "అగుచున్నాఁడు"
iast = "bhavati"
english = "becomes, is (root bhū)"

[[vocabulary]]
sanskrit_telugu = "చలతి"
telugu_gloss = "కదలుచున్నాఁడు"
iast = "calati"
english = "moves (root cal)"

[[sentences]]
n = 1
sanskrit_telugu = "మూషకాః మార్జాలైః యుద్ధం కుర్వంతి."
iast = "mūṣakāḥ mārjālaiḥ yuddhaṃ kurvanti."
english = "Rats fight with cats."

[[sentences]]
n = 2
sanskrit_telugu = "వృక్షాః చలంతి."
iast = "vṛkṣāḥ calanti."
english = "The trees are moving."

[[sentences]]
n = 3
sanskrit_telugu = "బాలకాః క్షీరం పీత్వా అంగణేషు చరంతి."
iast = "bālakāḥ kṣīraṃ pītvā aṅgaṇeṣu caranti."
english = "Having drunk the milk, the boys are walking in the courtyards."

[[sentences]]
n = 4
sanskrit_telugu = "శ్వః ప్రాతః అహం త్వాం ద్రష్టుం అగమిష్యామి."
iast = "śvaḥ prātaḥ ahaṃ tvāṃ draṣṭum agamiṣyāmi."
english = "Tomorrow morning I will come to see you."

[[sentences]]
n = 5
sanskrit_telugu = "త్వం అద్య మమ జనకం దృష్ట్వా అగచ్ఛ."
iast = "tvaṃ adya mama janakaṃ dṛṣṭvā agaccha."
english = "Today, having seen my father, go."

[[sentences]]
n = 6
sanskrit_telugu = "అస్మదనుజః బ్రాహ్మణాన్ ప్రష్టుం అగచ్ఛత్."
iast = "asmadanujaḥ brāhmaṇān praṣṭum agacchat."
english = "Our younger brother went to ask the brahmins."

[[sentences]]
n = 7
sanskrit_telugu = "ఏతే తత్ర కిం కరిష్యంతి వా పృష్ట్వా అగచ్ఛ."
iast = "ete tatra kiṃ kariṣyanti vā pṛṣṭvā agaccha."
english = "Having asked what these will do there, go."

[[sentences]]
n = 8
sanskrit_telugu = "మాస్తు! అహమేవ గమిష్యామి; త్వం అత్ర వస."
iast = "māstu! aham eva gamiṣyāmi; tvaṃ atra vasa."
english = "Never mind! I myself will go; you stay here."

[[sentences]]
n = 9
sanskrit_telugu = "ఏషః బాలకః శ్వః బ్రాహ్మణః భవిష్యతి."
iast = "eṣaḥ bālakaḥ śvaḥ brāhmaṇaḥ bhaviṣyati."
english = "This boy will become a brahmin tomorrow."

[[sentences]]
n = 10
sanskrit_telugu = "త్వం ఇదానీం కుత్ర గంతుం చలసివా; వద."
iast = "tvaṃ idānīṃ kutra gantuṃ calasi vā; vada."
english = "Where are you moving to go now? Tell me."

[[exercises]]
n = 1
telugu = "మీరు మాతో యుద్ధమును చేయఁజాలుదురా?"
english = "Can you (pl.) fight with us?"

[[exercises]]
n = 2
telugu = "నే నపటికి వెళ్ళవలెను."
english = "I must go by then."

[[exercises]]
n = 3
telugu = "మీ రీ వేళ నెయ్యి తీసికొనిరావలె."
english = "You (pl.) must bring ghee at this time."

[[exercises]]
n = 4
telugu = "వారు మా యింటిని చూడవలెను."
english = "They must see our house."

[[exercises]]
n = 5
telugu = "ఎవరిని చూచుటకు వెళ్ళినావు?"
english = "To see whom did you go?"

[[exercises]]
n = 6
telugu = "వీరిని పిలిచి మాతండ్రి నిక్కడికి రమ్మని చెప్పుము."
english = "Calling these people, tell them that our father should come here."

[[exercises]]
n = 7
telugu = "పోనిమ్ము నీ వెందుకు వానితో యుద్ధము చేసినావు?"
english = "Never mind, why did you fight with him?"

[[exercises]]
n = 8
telugu = "నీవు పిల్లవాఁడవుకదా."
english = "You are just a child, aren't you."

[[exercises]]
n = 9
telugu = "త్వరగా కదలుఁడు; ఎవరో వచ్చుచున్నారు."
english = "Move quickly; someone is coming."

[[exercises]]
n = 10
telugu = "మన మీవేళ వారింటికి భోజనమునకు వెళ్ళవలె, త్వరగా స్నానము చేయుఁడు."
english = "We must go to their house for a meal at this time; bathe quickly."

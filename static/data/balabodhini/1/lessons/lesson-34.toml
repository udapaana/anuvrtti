notes = """
PRONOUN AND QUANTIFIER PARADIGMS
==================================

Personal Pronouns
-----------------

asmad (first person: I / we)
Case:         Singular        Plural
prathamā:     aham            vayam
dvitīyā:      mām             asmān
tṛtīyā:      mayā            asmābhiḥ
caturthī:     mahyam          asmabhyam
pañcamī:      mat             asmat
ṣaṣṭhī:      mama            asmākam
saptamī:      mayi            asmāsu

yuṣmad (second person: you / you all)
Case:         Singular        Plural
prathamā:     tvam            yūyam
dvitīyā:      tvām            yuṣmān
tṛtīyā:      tvayā           yuṣmābhiḥ
caturthī:     tubhyam         yuṣmabhyam
pañcamī:      tvat            yuṣmat
ṣaṣṭhī:      tava            yuṣmākam
saptamī:      tvayi           yuṣmāsu

Pronominal Adjectives
---------------------

sarva (all/every; m.) — full paradigm
Case:         Singular        Plural
prathamā:     sarvaḥ          sarve
dvitīyā:      sarvam          sarvān
tṛtīyā:      sarveṇa         sarvaiḥ
caturthī:     sarvasmai       sarvebhyaḥ
pañcamī:      sarvasmāt       sarvebhyaḥ
ṣaṣṭhī:      sarvasya        sarveṣām
saptamī:      sarvasmin       sarveṣu

Note: yaḥ (who) and kaḥ (who?/which?) follow the sarva pattern.
eṣaḥ (this) follows the saḥ/tat pattern below.
Most pronouns follow the sarva pattern in their pronominal cases.

eka (one; m., singular only)
Case:         Singular
prathamā:     ekaḥ
dvitīyā:      ekam
tṛtīyā:      ekena
caturthī:     ekasmai
pañcamī:      ekasmāt
ṣaṣṭhī:      ekasya
saptamī:      ekasmin

kati (how many?; plural only)
Case:         Plural
prathamā:     kati
dvitīyā:      kati
tṛtīyā:      katibhiḥ
caturthī:     katibhyaḥ
pañcamī:      katibhyaḥ
ṣaṣṭhī:      katināṃ
saptamī:      katiṣu

aneka (many; plural only)
Case:         Plural
prathamā:     aneke
dvitīyā:      anekān
tṛtīyā:      anekaiḥ
caturthī:     anekebhyaḥ
pañcamī:      anekebhyaḥ
ṣaṣṭhī:      anekeṣām
saptamī:      anekeṣu

tat / saḥ (he/that; m.) — third person pronoun
Case:         Singular        Plural
prathamā:     saḥ             te
dvitīyā:      tam             tān
tṛtīyā:      tena            taiḥ
caturthī:     tasmai          tebhyaḥ
pañcamī:      tasmāt          tebhyaḥ
ṣaṣṭhī:      tasya           teṣām
saptamī:      tasmin          teṣu

Note: eṣaḥ (this, nominative) follows the saḥ declension pattern in the other cases.
"""

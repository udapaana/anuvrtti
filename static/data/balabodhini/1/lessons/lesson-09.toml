id = "balabodhini-1-09"
source = "balabodhini"
part = 1
number = 9
title_sanskrit = "నవమః పాఠః"
title_telugu = "తొమ్మిదవ పాఠము"
title_iast = "navamaḥ pāṭhaḥ"
title_english = "Ninth Lesson"
grammar_focus = "kṛ present singular (karoti / karoṣi / karomi); particles kila (reportedly) and eva (indeed, only)"

[[vocabulary]]
sanskrit_telugu = "దేవః"
telugu_gloss = "దేవుఁడు"
iast = "devaḥ"
english = "god, deity"

[[vocabulary]]
sanskrit_telugu = "కిమర్థం"
telugu_gloss = "ఎందుకు?"
iast = "kimartham"
english = "for what purpose? why?"

[[vocabulary]]
sanskrit_telugu = "కరోతి"
telugu_gloss = "చేయుచున్నాఁడు"
iast = "karoti"
english = "he/she does, is doing (3sg present of kṛ)"

[[vocabulary]]
sanskrit_telugu = "జనకః"
telugu_gloss = "తండ్రి"
iast = "janakaḥ"
english = "father"

[[vocabulary]]
sanskrit_telugu = "ఏవ"
telugu_gloss = "ఏ"
iast = "eva"
english = "indeed, only, just (emphatic particle)"

[[vocabulary]]
sanskrit_telugu = "కరోషి"
telugu_gloss = "చేయుచున్నావు"
iast = "karoṣi"
english = "you do, are doing (2sg present of kṛ)"

[[vocabulary]]
sanskrit_telugu = "అగ్రజః"
telugu_gloss = "అన్న"
iast = "agrajaḥ"
english = "elder brother (lit. born first)"

[[vocabulary]]
sanskrit_telugu = "కిల"
telugu_gloss = "అట"
iast = "kila"
english = "reportedly, they say, it is said"

[[vocabulary]]
sanskrit_telugu = "కరోమి"
telugu_gloss = "చేయుచున్నాను"
iast = "karomi"
english = "I do, am doing (1sg present of kṛ)"

[[sentences]]
n = 1
sanskrit_telugu = "దేవః కుత్రాస్తి?"
iast = "devaḥ kutrāsti?"
english = "Where is the god?"

[[sentences]]
n = 2
sanskrit_telugu = "సః అత్రాస్తి."
iast = "saḥ atrāsti."
english = "He is here."

[[sentences]]
n = 3
sanskrit_telugu = "అగ్రజః కిం కరోతి?"
iast = "agrajaḥ kiṃ karoti?"
english = "What is the elder brother doing?"

[[sentences]]
n = 4
sanskrit_telugu = "కింవా?"
iast = "kiṃ vā?"
english = "Or what? What else?"

[[sentences]]
n = 5
sanskrit_telugu = "త్వం కిం కరోషి?"
iast = "tvaṃ kiṃ karoṣi?"
english = "What are you doing?"

[[sentences]]
n = 6
sanskrit_telugu = "అహం అత్రాసం."
iast = "ahaṃ atrāsam."
english = "I was here."

[[sentences]]
n = 7
sanskrit_telugu = "యూయం కిమర్థం తత్ర స్థ?"
iast = "yūyaṃ kimarthaṃ tatra stha?"
english = "Why are you (pl.) there?"

[[sentences]]
n = 8
sanskrit_telugu = "తే ఏవ తత్రాసన్ కిల."
iast = "te eva tatrāsan kila."
english = "They alone were there, reportedly."

[[sentences]]
n = 9
sanskrit_telugu = "యూయం తత్ర కిమర్థం నాస్థ?"
iast = "yūyaṃ tatra kimarthaṃ nāstha?"
english = "Why were you (pl.) not there?"

[[sentences]]
n = 10
sanskrit_telugu = "అహం తత్రైవాస్మి."
iast = "ahaṃ tatraivāsmi."
english = "I am there alone / I am right there."

[[exercises]]
n = 1
telugu = "దేవుఁ డొకచోట నున్నాఁడు."
english = "A god is in one place."

[[exercises]]
n = 2
telugu = "వాఁడు చాలచోట్ల నున్నాఁడు."
english = "He is in many places."

[[exercises]]
n = 3
telugu = "మీ రిపు డెక్కడ నుంటిరి?"
english = "Where were you (pl.) just now?"

[[exercises]]
n = 4
telugu = "ఎవఁ డేమి చేయుచున్నాఁడు?"
english = "Who is doing what?"

[[exercises]]
n = 5
telugu = "వా రందఱు నక్కడ నుండవలెను."
english = "All of them must be there."

[[exercises]]
n = 6
telugu = "నీవే చేయుచున్నావేమి?"
english = "Is it only you who is doing it?"

[[exercises]]
n = 7
telugu = "మేమే ఇక్కడ నుండవలెను."
english = "We alone must be here."

[[exercises]]
n = 8
telugu = "ఎవ రిక్కడ లేరు?"
english = "Who is not here?"

[[exercises]]
n = 9
telugu = "నీ యిక్కడ లేవట."
english = "You are reportedly not here."

[[exercises]]
n = 10
telugu = "నే నిక్కడనే యున్నాను."
english = "I am right here."

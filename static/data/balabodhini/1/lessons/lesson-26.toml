id = "balabodhini-1-26"
source = "balabodhini"
part = 1
number = 26
title_sanskrit = "షడ్వింశః పాఠః"
title_telugu = "ఇరువదియాఱవ పాఠము"
title_iast = "ṣaḍviṃśaḥ pāṭhaḥ"
title_english = "Twenty-Sixth Lesson"
grammar_focus = "gerunds gatvā, nītvā, āgatvā; future tense gamiṣyati, neṣyati; ā+nī (ānayadhi/āneṣyāmi)"

[[vocabulary]]
sanskrit_telugu = "దోష్యం"
telugu_gloss = "పులుసు"
iast = "doṣyaṃ"
english = "sour curry, tamarind gravy"

[[vocabulary]]
sanskrit_telugu = "చక్రం"
telugu_gloss = "చింతపండు"
iast = "cakraṃ"
english = "tamarind"

[[vocabulary]]
sanskrit_telugu = "గత్వా"
telugu_gloss = "వెళ్ళి"
iast = "gatvā"
english = "having gone (gerund of gam)"

[[vocabulary]]
sanskrit_telugu = "సూపం"
telugu_gloss = "పప్పు"
iast = "sūpaṃ"
english = "lentil soup, dal"

[[vocabulary]]
sanskrit_telugu = "నీత్వా"
telugu_gloss = "తీసికొనివెళ్ళి"
iast = "nītvā"
english = "having led/taken (gerund of nī)"

[[vocabulary]]
sanskrit_telugu = "ఆగత్వా"
telugu_gloss = "వచ్చి"
iast = "āgatvā"
english = "having come (gerund of ā+gam)"

[[vocabulary]]
sanskrit_telugu = "గమిష్యతి"
telugu_gloss = "వెళ్ళుగలఁడు"
iast = "gamiṣyati"
english = "will go (future of gam)"

[[vocabulary]]
sanskrit_telugu = "నేష్యతి"
telugu_gloss = "తీసికొనివెళ్ళుగలఁడు"
iast = "neṣyati"
english = "will lead/take (future of nī)"

[[vocabulary]]
sanskrit_telugu = "ఆనయతి"
telugu_gloss = "తీసికొనివచ్చుచున్నాఁడు"
iast = "ānayati"
english = "brings (ā+nī, present)"

[[sentences]]
n = 1
sanskrit_telugu = "చోష్యే లవణం నాలం."
iast = "coṣye lavaṇaṃ nālam."
english = "Salt is not sufficient in the sour curry."

[[sentences]]
n = 2
sanskrit_telugu = "సూపం సమ్యగస్తి."
iast = "sūpaṃ samyag asti."
english = "The dal is proper (well-made)."

[[sentences]]
n = 3
sanskrit_telugu = "గృహే చక్ర మస్తి కిం?"
iast = "gṛhe cakram asti kiṃ?"
english = "Is there tamarind at home?"

[[sentences]]
n = 4
sanskrit_telugu = "త్వం తత్ర గత్వా కించిత్ చక్ర మానయ."
iast = "tvaṃ tatra gatvā kiñcit cakram ānaya."
english = "Going there, bring some tamarind."

[[sentences]]
n = 5
sanskrit_telugu = "రామః ఆనయతు; అహం రామఠం ఆనేష్యామి."
iast = "rāmaḥ ānayatu; ahaṃ rāmaṭhaṃ āneṣyāmi."
english = "Let Rāma bring (it); I will bring the asafoetida."

[[sentences]]
n = 6
sanskrit_telugu = "యూయం అస్మద్గృహం ఆగమిష్యథ కిం?"
iast = "yūyaṃ asmadgṛhaṃ āgamiṣyatha kiṃ?"
english = "Will you (pl.) come to our house?"

[[sentences]]
n = 7
sanskrit_telugu = "తథై వాగమిష్యామః."
iast = "tathaivāgamiṣyāmaḥ."
english = "We will indeed come like that."

[[sentences]]
n = 8
sanskrit_telugu = "త్వం శీఘ్రం గచ్ఛ."
iast = "tvaṃ śīghraṃ gaccha."
english = "You go quickly."

[[sentences]]
n = 9
sanskrit_telugu = "తే సర్వేపి అస్మద్గృహే భోజనార్థ మాగమిష్యంతి, సూపమపినాస్తి. కథం కరిష్యంతివా?"
iast = "te sarve'pi asmadgṛhe bhojanārtham āgamiṣyanti, sūpam api nāsti. kathaṃ kariṣyanti vā?"
english = "All of them will come to our house for a meal, and there is not even dal. How will they manage?"

[[exercises]]
n = 1
telugu = "నీవు వంటను చేయుము."
english = "You prepare the cooking."

[[exercises]]
n = 2
telugu = "నేను నీరు తేఁగలను."
english = "I can bring water."

[[exercises]]
n = 3
telugu = "తరువాత వీ రందఱును స్నానముచేసి భోజనము చేయఁగలరు."
english = "Afterwards all these people, having bathed, can eat."

[[exercises]]
n = 4
telugu = "మీరు వెళ్ళి మా తండ్రిని తీసికొనిరండు."
english = "You (pl.) go and bring our father."

[[exercises]]
n = 5
telugu = "నే నిక్కడనే యుందును."
english = "I will stay right here."

[[exercises]]
n = 6
telugu = "మీరిక్కడ నాలస్యము చేయకుఁడు."
english = "Do not be lazy here."

[[exercises]]
n = 7
telugu = "త్వరగా రండు."
english = "Come quickly."

[[exercises]]
n = 8
telugu = "నీవు మాఽన్నను తీసికొనిరమ్ము."
english = "You bring our elder brother."

[[exercises]]
n = 9
telugu = "పిల్లలను త్వరగా తీసికొనిపండు."
english = "Take the children quickly."

[[exercises]]
n = 10
telugu = "అలాగే తీసికొనిరాఁగలను."
english = "I can bring (them) just like that."

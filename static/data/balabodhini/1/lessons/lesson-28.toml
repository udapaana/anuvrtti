id = "balabodhini-1-28"
source = "balabodhini"
part = 1
number = 28
title_sanskrit = "అష్టావింశః పాఠః"
title_telugu = "ఇరువదియెనిమిదవ పాఠము"
title_iast = "aṣṭāviṃśaḥ pāṭhaḥ"
title_english = "Twenty-Eighth Lesson"
grammar_focus = "accusative pronouns tvām, mām, yuṣmān; gerund uditvā; infinitive āhvātum; new verbs pṛcchati (asks), prakṣyati (will ask), pibati (drinks)"

[[vocabulary]]
sanskrit_telugu = "త్వాం"
telugu_gloss = "నిన్ను"
iast = "tvāṃ"
english = "you (accusative singular)"

[[vocabulary]]
sanskrit_telugu = "వదితుం"
telugu_gloss = "చెప్పన్, చెప్పుటకు"
iast = "vaditum"
english = "to say, to tell (infinitive of vad)"

[[vocabulary]]
sanskrit_telugu = "మాం"
telugu_gloss = "నన్ను"
iast = "māṃ"
english = "me (accusative singular)"

[[vocabulary]]
sanskrit_telugu = "ఉదిత్వా"
telugu_gloss = "చెప్పి"
iast = "uditvā"
english = "having said (gerund of vad)"

[[vocabulary]]
sanskrit_telugu = "యుష్మాన్"
telugu_gloss = "మిమ్మును"
iast = "yuṣmān"
english = "you (accusative plural)"

[[vocabulary]]
sanskrit_telugu = "ఆహ్వాతుం"
telugu_gloss = "పిలువన్"
iast = "āhvātum"
english = "to call (infinitive of ā+hvā)"

[[vocabulary]]
sanskrit_telugu = "పృచ్ఛతి"
telugu_gloss = "అడుగుచున్నాఁడు"
iast = "pṛcchati"
english = "asks (root prach)"

[[vocabulary]]
sanskrit_telugu = "ప్రక్ష్యతి"
telugu_gloss = "అడుగఁగలఁడు"
iast = "prakṣyati"
english = "will ask (future of prach)"

[[vocabulary]]
sanskrit_telugu = "పిబతి"
telugu_gloss = "త్రాగుచున్నాఁడు"
iast = "pibati"
english = "drinks (root pā)"

[[sentences]]
n = 1
sanskrit_telugu = "మమాగ్రజః త్వా మాహ్వాయతి; శీఘ్రు మాగచ్ఛ."
iast = "mamāgrajaḥ tvām āhvāyati; śīghram āgaccha."
english = "My elder brother is calling you; come quickly."

[[sentences]]
n = 2
sanskrit_telugu = "అత్ర బాలకాః న సంతి; త్వమేవ ఉదిత్వాఽగచ్ఛ."
iast = "atra bālakāḥ na santi; tvam eva uditvā'gaccha."
english = "There are no boys here; having spoken, you yourself go."

[[sentences]]
n = 3
sanskrit_telugu = "జనకః కుత్రాస్తి నా అనుజం పృచ్ఛ."
iast = "janakaḥ kutrāsti nā anujaṃ pṛccha."
english = "Where is father? Ask the younger brother."

[[sentences]]
n = 4
sanskrit_telugu = "బాలకాః క్షీరం సర్వం అపిబన్."
iast = "bālakāḥ kṣīraṃ sarvaṃ apiban."
english = "The boys drank all the milk."

[[sentences]]
n = 5
sanskrit_telugu = "ఇదానీం యుష్మాన్ కః ప్రక్ష్యతి?"
iast = "idānīṃ yuṣmān kaḥ prakṣyati?"
english = "Now who will ask you (pl.)?"

[[sentences]]
n = 6
sanskrit_telugu = "మాం కే అపృచ్ఛన్?"
iast = "māṃ ke apṛcchan?"
english = "Who asked me?"

[[sentences]]
n = 7
sanskrit_telugu = "అరే శీఘ్రం క్షీరం పిబరే."
iast = "are śīghraṃ kṣīraṃ pibere."
english = "Hey, quickly drink the milk."

[[sentences]]
n = 8
sanskrit_telugu = "ఏషః త్వాం ఆహ్వాతు మాగచ్ఛత్."
iast = "eṣaḥ tvāṃ āhvātum āgacchat."
english = "This one came to call you."

[[sentences]]
n = 9
sanskrit_telugu = "త్వం అస్మద్గృహే భోజనార్థ మాగమిష్యసివా?"
iast = "tvaṃ asmadgṛhe bhojanārtham āgamiṣyasi vā?"
english = "Will you come to our house for a meal?"

[[sentences]]
n = 10
sanskrit_telugu = "అహం నాగమిష్యామి కింతు మమానుజ మాహ్వాయ; సః అగమిష్యతి."
iast = "ahaṃ nāgamiṣyāmi kintu mamānujam āhvāya; saḥ agamiṣyati."
english = "I will not come, but call my younger brother; he will come."

[[exercises]]
n = 1
telugu = "నా అన్నను పిలుచుటకు ఎవరు వెళ్ళినారు?"
english = "Who went to call my elder brother?"

[[exercises]]
n = 2
telugu = "ఎవరును వెళ్ళనిచో మీరే వెళ్ళుఁడు."
english = "If no one goes, you (pl.) yourselves go."

[[exercises]]
n = 3
telugu = "పిమ్మట నేనును అక్కడికి రాఁగలను."
english = "Afterwards I too can come there."

[[exercises]]
n = 4
telugu = "వా రిపుడు భోజనమునకు వత్తురో రారో; అడుగుము."
english = "Ask whether they will come for food now or not."

[[exercises]]
n = 5
telugu = "మీరే అడుగుఁడు."
english = "You (pl.) yourselves ask."

[[exercises]]
n = 6
telugu = "మీరూరకుండుఁడు; వారే వచ్చెదరు."
english = "You (pl.) be silent; they themselves will come."

[[exercises]]
n = 7
telugu = "మిమ్ముఁ నెవరు భోజనమునకు పిల్చినారు?"
english = "Who invited you (pl.) for a meal?"

[[exercises]]
n = 8
telugu = "మీఅన్న పిల్చినాఁడుగా."
english = "Your elder brother called, didn't he."

[[exercises]]
n = 9
telugu = "మా అన్న ఊరిలోనే లేఁడే; ఎట్లు పిలిచెను?"
english = "Our elder brother is not even in town; how did he call?"

[[exercises]]
n = 10
telugu = "వాఁడీవేళ వచ్చినాఁడని మాతమ్ముఁడు మా యింటిలో చెప్పినాఁడు."
english = "Our younger brother told (us) at our house that he came this time."
